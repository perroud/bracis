id: government
title: Government
description: Federal, state, municipal agencies, defense, military, intelligence, law enforcement, public administration

sub_industries:
  - id: government-federal
    title: Federal / National Government
  - id: government-state
    title: State / Provincial Government
  - id: government-municipal
    title: Municipal / Local Government
  - id: defense
    title: Defense & Military
  - id: intelligence
    title: Intelligence Services
  - id: law-enforcement
    title: Law Enforcement
  - id: public-administration
    title: Public Administration
  - id: judiciary
    title: Judiciary

mandatory_frameworks:
  # United States
  - framework_id: fisma
    condition: "US federal agency or contractor"
    regions: [united-states]
    sub_industries: [government-federal]

  - framework_id: fedramp
    condition: "Cloud service provider to US federal agencies"
    regions: [united-states]

  - framework_id: cmmc-v2
    condition: "DoD contractor handling CUI or FCI"
    regions: [united-states]
    sub_industries: [defense]

  - framework_id: itar
    condition: "Handles defense articles or technical data"
    regions: [united-states]
    sub_industries: [defense, intelligence]

  - framework_id: nist-800-53-rev5
    condition: "US federal information systems (required by FISMA)"
    regions: [united-states]
    sub_industries: [government-federal]

  - framework_id: disa-stig
    condition: "DoD information systems"
    regions: [united-states]
    sub_industries: [defense]

  # Brazil
  - framework_id: lgpd
    condition: "Any Brazilian government entity processing personal data"
    regions: [brazil]

  - framework_id: in-gsi-pr
    condition: "Brazilian federal government IT security"
    regions: [brazil]
    sub_industries: [government-federal]

  - framework_id: e-ping
    condition: "Brazilian federal government interoperability standards"
    regions: [brazil]
    sub_industries: [government-federal]

  - framework_id: e-mag
    condition: "Brazilian government web accessibility"
    regions: [brazil]

  # European Union
  - framework_id: nis2
    condition: "Essential or important entity in EU member state"
    regions: [european-union]

  - framework_id: gdpr
    condition: "Processes personal data of EU residents"
    regions: [european-union]

  # Australia
  - framework_id: ism
    condition: "Australian government information systems"
    regions: [australia]

  - framework_id: essential-eight
    condition: "Australian government baseline security"
    regions: [australia]

recommended_frameworks:
  - framework_id: nist-csf-v2
    rationale: "Risk management framework suitable for cross-agency governance"

  - framework_id: iso-27001-2022
    rationale: "International standard for ISMS, recognized globally"

  - framework_id: cis-controls-v8
    rationale: "Prioritized, actionable security controls"

  - framework_id: common-criteria
    condition: "Procuring or developing evaluated IT products"
    rationale: "International standard for IT security evaluation (ISO 15408)"

compliance_priorities:
  - classified-data-protection
  - access-control-clearance-based
  - audit-logging-immutable
  - supply-chain-integrity
  - cryptographic-key-management
  - physical-security-scif
  - personnel-security-vetting
  - incident-response-coordination
  - continuity-of-operations
  - cross-domain-solutions

techstack_considerations:
  platform_engineering:
    - "Air-gapped or disconnected environments for classified workloads"
    - "FedRAMP/IL-authorized cloud platforms only"
    - "FIPS 140-2/3 validated cryptographic modules"
    - "STIGs applied to all platform components"

  devsecops:
    - "Accredited CI/CD pipelines with chain of custody"
    - "SBOM generation and verification (SPDX/CycloneDX)"
    - "Code signing with government-issued certificates"
    - "Container hardening per DISA STIG requirements"

  secops:
    - "CDM (Continuous Diagnostics and Mitigation) integration"
    - "TIC 3.0 compliant network architecture"
    - "CISA-coordinated vulnerability disclosure"
    - "Cross-agency threat intelligence sharing (STIX/TAXII)"
