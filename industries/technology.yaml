id: technology
title: Technology
description: SaaS providers, cloud service providers, enterprise software, AI/ML companies, cybersecurity vendors

sub_industries:
  - id: saas
    title: SaaS / Cloud Services
  - id: iaas-paas
    title: IaaS / PaaS Providers
  - id: enterprise-software
    title: Enterprise Software
  - id: ai-ml
    title: Artificial Intelligence / Machine Learning
  - id: cybersecurity
    title: Cybersecurity Companies

mandatory_frameworks:
  - framework_id: soc2
    condition: "B2B SaaS or service organization handling customer data"

  - framework_id: sox
    condition: "Publicly traded technology company (US)"
    regions: [united-states]

  - framework_id: ccpa-cpra
    condition: "Meets revenue/data thresholds processing California residents' data"
    regions: [united-states]

  - framework_id: gdpr
    condition: "Processes EU citizen personal data"
    regions: [european-union]

  - framework_id: lgpd
    condition: "Processes personal data in Brazil"
    regions: [brazil]

  - framework_id: pci-dss-v4
    condition: "Processes, stores, or transmits cardholder data"
    sub_industries: [saas, iaas-paas]

  - framework_id: dora
    condition: "ICT third-party provider to EU financial entities"
    regions: [european-union]
    sub_industries: [saas, iaas-paas, enterprise-software]

  - framework_id: nis2
    condition: "Essential or important entity in EU member state"
    regions: [european-union]

  - framework_id: fedramp
    condition: "Cloud service provider to US federal agencies"
    regions: [united-states]
    sub_industries: [saas, iaas-paas]

recommended_frameworks:
  - framework_id: iso-27001-2022
    rationale: "International ISMS certification, expected by enterprise customers"

  - framework_id: iso-27701
    rationale: "Privacy information management, extension to ISO 27001 for GDPR/privacy alignment"

  - framework_id: csa-ccm-v4
    rationale: "Cloud-specific security controls, essential for CSPs and cloud-first companies"

  - framework_id: nist-800-53-rev5
    rationale: "Comprehensive control catalog, baseline for FedRAMP and enterprise security programs"

  - framework_id: nist-csf-v2
    rationale: "Risk-based framework for security program governance and board reporting"

  - framework_id: cis-controls-v8
    rationale: "Prioritized, actionable controls for rapid security maturity improvement"

  - framework_id: hitrust-csf
    condition: "Serves healthcare clients or handles health data"
    rationale: "Comprehensive certifiable framework accepted across healthcare industry"

  - framework_id: nist-800-171-rev3
    condition: "Serves defense/government clients handling CUI"
    rationale: "Required for nonfederal systems processing controlled unclassified information"

compliance_priorities:
  - data-protection-encryption-at-rest-transit
  - access-control-rbac-abac
  - multi-tenant-isolation
  - audit-logging-immutable
  - incident-response-notification
  - vulnerability-management-sla
  - supply-chain-security-sbom
  - privacy-by-design
  - third-party-risk-management
  - business-continuity-disaster-recovery

techstack_considerations:
  platform_engineering:
    - "Multi-tenant architecture with strict data isolation"
    - "Automated compliance evidence collection (SOC 2, ISO 27001)"
    - "Golden paths with security controls baked into templates"
    - "Secrets management with automated rotation (Vault, AWS Secrets Manager)"

  devsecops:
    - "SAST/DAST/SCA scanning mandatory in all CI/CD pipelines"
    - "SBOM generation and vulnerability tracking (Dependency-Track)"
    - "Container image signing and admission control policies"
    - "Feature flags with audit trail for SOX change management"

  secops:
    - "SIEM/SOAR for centralized security event monitoring"
    - "Bug bounty and responsible disclosure program"
    - "Automated compliance monitoring and drift detection"
    - "Customer-facing security trust center and certifications"
