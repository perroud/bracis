id: defense
title: Defense & Aerospace
description: Defense contractors, aerospace manufacturers, military suppliers, organizations handling CUI/FCI/classified data

sub_industries:
  - id: defense-contractors
    title: Defense Contractors (Prime & Sub)
  - id: defense-aerospace
    title: Defense Aerospace
  - id: military-suppliers
    title: Military Suppliers & Logistics
  - id: defense-it
    title: Defense IT & Cybersecurity Services
  - id: munitions
    title: Munitions & Weapons Systems

mandatory_frameworks:
  - framework_id: cmmc-v2
    condition: "DoD contractor handling CUI or FCI"
    regions: [united-states]

  - framework_id: nist-800-171-rev3
    condition: "Nonfederal system processing, storing, or transmitting CUI"
    regions: [united-states]

  - framework_id: nist-800-53-rev5
    condition: "Information systems supporting DoD missions"
    regions: [united-states]

  - framework_id: fedramp
    condition: "Cloud service provider to DoD or federal agencies"
    regions: [united-states]

  - framework_id: itar
    condition: "Manufactures, exports, or brokers defense articles or technical data"
    regions: [united-states]

  - framework_id: fisma
    condition: "Federal contractor operating federal information systems"
    regions: [united-states]

  - framework_id: disa-stig
    condition: "DoD information systems and network infrastructure"
    regions: [united-states]

  - framework_id: dfars-252-204-7012
    condition: "DoD contractor subject to DFARS cybersecurity clause"
    regions: [united-states]

  - framework_id: nis2
    condition: "Defense-related essential entity in EU member state"
    regions: [european-union]

recommended_frameworks:
  - framework_id: nist-csf-v2
    rationale: "Risk management framework aligned with DoD cybersecurity requirements"

  - framework_id: iso-27001-2022
    rationale: "International certification for global defense supply chain partners"

  - framework_id: cis-controls-v8
    rationale: "Prioritized security controls for defense network hardening"

  - framework_id: csa-ccm-v4
    condition: "Cloud-hosted defense workloads"
    rationale: "Cloud security controls for authorized cloud environments"

compliance_priorities:
  - cui-protection-marking-handling
  - access-control-clearance-based
  - cryptographic-module-fips-validation
  - audit-logging-immutable-tamper-proof
  - supply-chain-integrity-provenance
  - personnel-security-background-checks
  - physical-security-controlled-areas
  - incident-response-dod-reporting
  - configuration-management-stig-baselines
  - media-protection-sanitization

techstack_considerations:
  platform_engineering:
    - "Air-gapped or IL4/IL5 authorized cloud environments"
    - "FIPS 140-2/3 validated cryptographic modules mandatory"
    - "STIGs applied to all OS, middleware, and application components"
    - "FedRAMP High or DoD IL authorized platforms only"

  devsecops:
    - "Accredited CI/CD pipelines with full chain of custody"
    - "SBOM generation mandatory (SPDX/CycloneDX) per DoD policy"
    - "Code signing with DoD-issued PKI certificates"
    - "Container images hardened per DISA STIG and Iron Bank approved"

  secops:
    - "SIEM integration with DoD CSSP for threat sharing"
    - "72-hour incident reporting to DC3/DIBCAC"
    - "Continuous monitoring per CMMC Level 2+ requirements"
    - "Threat intelligence feeds from CISA and DoD Cyber Crime Center"
