id: healthcare
title: Healthcare
description: Hospitals, clinics, health insurers, pharmaceutical companies, medical device manufacturers, health IT

sub_industries:
  - id: hospitals
    title: Hospitals & Clinical
  - id: health-insurance
    title: Health Insurance
  - id: pharma
    title: Pharmaceutical
  - id: medical-devices
    title: Medical Devices
  - id: health-tech
    title: Health Technology / Digital Health

mandatory_frameworks:
  - framework_id: hipaa
    condition: "Covered entity or business associate handling PHI (US)"
    regions: [united-states]

  - framework_id: hitrust-csf
    condition: "Healthcare organization seeking comprehensive certification (US)"
    regions: [united-states]

  - framework_id: gdpr
    condition: "Processes EU citizen health data (special category)"
    regions: [european-union]

  - framework_id: lgpd
    condition: "Processes health data in Brazil (dados sensíveis)"
    regions: [brazil]

  - framework_id: fda-21-cfr-11
    condition: "Electronic records/signatures in FDA-regulated environment"
    regions: [united-states]
    sub_industries: [pharma, medical-devices]

  - framework_id: ccpa-cpra
    condition: "Meets thresholds processing California residents' health-related data"
    regions: [united-states]

recommended_frameworks:
  - framework_id: nist-800-53-rev5
    rationale: "Comprehensive controls, maps directly to HIPAA Security Rule"

  - framework_id: iso-27001-2022
    rationale: "International certification, demonstrates security to partners"

  - framework_id: soc2
    rationale: "Required by healthcare clients for SaaS/cloud services"

  - framework_id: nist-csf-v2
    rationale: "Risk management framework suitable for healthcare boards"

compliance_priorities:
  - phi-protection-encryption
  - access-control-role-based
  - audit-trail-immutable
  - breach-notification-timely
  - business-associate-agreements
  - minimum-necessary-principle
  - patient-consent-management
  - data-backup-and-recovery
  - workforce-training
  - physical-security-facilities
