id: financial-services
title: Financial Services
description: Banks, fintechs, payment processors, insurance, investment firms, asset managers

sub_industries:
  - id: banking
    title: Banking
  - id: fintech
    title: Fintech / Neobanks
  - id: payments
    title: Payment Processing
  - id: insurance
    title: Insurance
  - id: capital-markets
    title: Capital Markets / Investment
  - id: asset-management
    title: Asset Management

mandatory_frameworks:
  - framework_id: pci-dss-v4
    condition: "Processes, stores, or transmits cardholder data"
    sub_industries: [banking, fintech, payments]

  - framework_id: sox
    condition: "Publicly traded company (US)"
    regions: [united-states]

  - framework_id: glba
    condition: "US financial institution"
    regions: [united-states]

  - framework_id: dora
    condition: "Operates in the EU"
    regions: [european-union]
    sub_industries: [banking, fintech, insurance, capital-markets, asset-management]

  - framework_id: gdpr
    condition: "Processes EU citizen personal data"
    regions: [european-union]

  - framework_id: lgpd
    condition: "Processes personal data in Brazil"
    regions: [brazil]

  - framework_id: bacen-4893
    condition: "Financial institution regulated by Banco Central do Brasil"
    regions: [brazil]
    sub_industries: [banking, fintech, payments]

  - framework_id: basel-iii
    condition: "Banking institution"
    sub_industries: [banking]

  - framework_id: mifid-ii
    condition: "Investment services in the EU"
    regions: [european-union]
    sub_industries: [capital-markets, asset-management]

  - framework_id: psd2
    condition: "Payment services in the EU"
    regions: [european-union]
    sub_industries: [payments, fintech, banking]

  - framework_id: ccpa-cpra
    condition: "Meets revenue/data thresholds processing California residents' data"
    regions: [united-states]

  - framework_id: csa-ccm-v4
    condition: "Cloud-based financial services or SaaS platform"

recommended_frameworks:
  - framework_id: nist-800-53-rev5
    rationale: "Comprehensive security control set, widely adopted baseline"

  - framework_id: iso-27001-2022
    rationale: "International certification standard, demonstrates security posture to clients"

  - framework_id: soc2
    rationale: "Trust services criteria, essential for B2B SaaS financial products"

  - framework_id: nist-csf-v2
    rationale: "Risk-based cybersecurity framework, good for board-level reporting"

  - framework_id: cis-controls-v8
    rationale: "Prioritized security actions, good for implementation roadmap"

  - framework_id: swift-csp
    condition: "Uses SWIFT network"
    rationale: "Mandatory for SWIFT network participants"

compliance_priorities:
  - data-encryption-at-rest-and-transit
  - strong-authentication-mfa
  - audit-logging-and-monitoring
  - incident-response-and-reporting
  - third-party-risk-management
  - data-loss-prevention
  - access-control-least-privilege
  - business-continuity-disaster-recovery
  - change-management
  - vulnerability-management

techstack_considerations:
  platform_engineering:
    - "Segregation of environments (dev/staging/prod) with strict access controls"
    - "Automated compliance checks in golden paths"
    - "Secrets management with rotation policies (Vault, AWS Secrets Manager)"
    - "Infrastructure as Code with policy-as-code enforcement (OPA, Kyverno)"

  devsecops:
    - "SAST/DAST/SCA scanning in every pipeline"
    - "Container image scanning and signing"
    - "Dependency vulnerability management with SLA"
    - "Code review requirements (minimum 2 approvers for production)"

  secops:
    - "24/7 SOC monitoring for transaction fraud and security events"
    - "SIEM correlation rules for financial transaction anomalies"
    - "Automated incident response playbooks for data breaches"
    - "Threat intelligence feeds for financial sector threats"
