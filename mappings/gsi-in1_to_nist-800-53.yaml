id: gsi-in1_to_nist-800-53
title: "IN GSI/PR 1 to NIST 800-53 Rev 5 Control Mapping"
source_framework: gsi-in1
target_framework: nist-800-53-rev5
version: "1.0.0"
last_updated: "2026-04-04"
methodology: structural
description: >
  Mapeamento entre a Instrucao Normativa GSI/PR 1/2020 (estrutura de gestao de seguranca
  da informacao na APF) e o NIST SP 800-53 Rev 5. A IN1 estabelece requisitos de governanca,
  politica, gestao de riscos, continuidade, incidentes, auditoria e capacitacao que mapeiam
  diretamente para familias de controles NIST.

mappings:
  - source_control: art-1
    target_controls:
      - id: pm-1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Art. 1 (objeto e escopo da gestao de SI na APF) mapeia para PM-1 (Information
          Security Program Plan), que define o programa geral de seguranca da informacao.

  - source_control: art-6
    target_controls:
      - id: pl-1
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 6 (POSIC — Politica de SI) mapeia para PL-1 (Security Planning Policy and
          Procedures). Ambos exigem politica formal de SI aprovada pela alta administracao.

  - source_control: art-7
    target_controls:
      - id: pl-2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Art. 7 (conteudo minimo da POSIC) mapeia para PL-2 (System Security and Privacy
          Plans), que detalha o conteudo necessario dos planos de seguranca.

  - source_control: art-11
    target_controls:
      - id: pm-2
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 11 (designacao do gestor de SI) mapeia para PM-2 (Information Security
          Program Leadership Role), que exige nomeacao de lider do programa de SI.

  - source_control: art-13
    target_controls:
      - id: pm-10
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Art. 13 (comite de SI) mapeia para PM-10 (Security Authorization Process),
          que inclui governanca e supervisao do programa de seguranca.

  - source_control: art-15
    target_controls:
      - id: ir-1
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 15 (ETIR — Equipe de Tratamento de Incidentes) mapeia para IR-1 (Incident
          Response Policy and Procedures). Ambos exigem equipe dedicada de resposta a incidentes.

  - source_control: art-17
    target_controls:
      - id: ra-1
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 17 (metodologia de gestao de riscos de SI) mapeia para RA-1 (Risk Assessment
          Policy and Procedures). Ambos exigem processo formal de avaliacao de riscos.

  - source_control: art-18
    target_controls:
      - id: ra-3
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 18 (inventario e classificacao de ativos) mapeia para RA-3 (Risk Assessment),
          incluindo identificacao de ativos criticos e avaliacoes de risco associadas.

  - source_control: art-21
    target_controls:
      - id: cp-1
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 21 (plano de continuidade de negocios) mapeia para CP-1 (Contingency
          Planning Policy and Procedures). Ambos exigem plano formal de continuidade.

  - source_control: art-22
    target_controls:
      - id: cp-2
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 22 (conteudo do plano de continuidade) mapeia para CP-2 (Contingency Plan),
          detalhando os elementos obrigatorios do plano.

  - source_control: art-23
    target_controls:
      - id: cp-4
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 23 (testes do plano de continuidade) mapeia para CP-4 (Contingency Plan
          Testing), que exige testes periodicos do plano.

  - source_control: art-25
    target_controls:
      - id: ir-4
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 25 (deteccao e tratamento de incidentes) mapeia para IR-4 (Incident
          Handling), que define o processo completo de tratamento de incidentes.

  - source_control: art-27
    target_controls:
      - id: ir-6
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 27 (notificacao de incidentes ao CTIR Gov) mapeia para IR-6 (Incident
          Reporting), que exige reporte de incidentes a autoridades designadas.

  - source_control: art-31
    target_controls:
      - id: ca-2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Art. 31 (programa de auditoria de SI) mapeia para CA-2 (Control Assessments),
          que exige avaliacoes periodicas dos controles de seguranca.

  - source_control: art-33
    target_controls:
      - id: ca-7
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Art. 33 (indicadores de conformidade) mapeia para CA-7 (Continuous Monitoring),
          que exige monitoramento continuo do estado de seguranca.

  - source_control: art-36
    target_controls:
      - id: at-1
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 36 (programa de capacitacao em SI) mapeia para AT-1 (Security Awareness
          and Training Policy), que exige programa de conscientizacao e treinamento.

  - source_control: art-38
    target_controls:
      - id: at-2
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 38 (conscientizacao de todos os servidores) mapeia para AT-2 (Literacy
          Training and Awareness), que exige treinamento de conscientizacao para todos.
