id: ccpa-cpra_to_gdpr
title: "CCPA/CPRA to GDPR Control Mapping"
source_framework: ccpa-cpra
target_framework: gdpr
version: "1.0.0"
last_updated: "2026-04-03"
methodology: semantic

mappings:
  - source_control: sec-1798-100
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          CCPA §1798.100 (Right to Know / Right of Access) maps to GDPR Art. 15
          (Right of Access). Both grant data subjects the right to request and
          obtain information about the personal data collected about them,
          categories of data, purposes of processing, and third parties with
          whom data is shared. GDPR Art. 15 is slightly broader, including
          the right to obtain a copy of the data and information about
          automated decision-making.

  - source_control: sec-1798-105
    target_controls:
      - id: art-17
        relationship: equivalent-to
        confidence: 0.80
        rationale: >
          CCPA §1798.105 (Right to Delete) maps to GDPR Art. 17 (Right to
          Erasure / Right to Be Forgotten). Both grant data subjects the right
          to request deletion of their personal data. GDPR Art. 17 includes
          additional grounds for erasure (e.g., withdrawal of consent, unlawful
          processing) and imposes an obligation to notify third parties.
          CCPA provides broader business exceptions to deletion requests.

  - source_control: sec-1798-106
    target_controls:
      - id: art-16
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          CCPA §1798.106 (Right to Correct Inaccurate Personal Information),
          introduced by CPRA, maps to GDPR Art. 16 (Right to Rectification).
          Both grant data subjects the right to request correction of inaccurate
          personal data. GDPR Art. 16 additionally includes the right to have
          incomplete data completed. Note: GDPR Art. 16 control definition is
          not yet present in this project but is referenced here for mapping
          completeness.

  - source_control: sec-1798-120
    target_controls:
      - id: art-21
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CCPA §1798.120 (Right to Opt-Out of Sale or Sharing) maps to GDPR
          Art. 21 (Right to Object). CCPA focuses specifically on the sale or
          sharing of personal information, while GDPR Art. 21 is broader,
          covering objection to processing based on legitimate interests,
          direct marketing, and research/statistical purposes. The opt-out
          mechanism in CCPA is narrower but more prescriptive (e.g., "Do Not
          Sell or Share My Personal Information" link requirement).

  - source_control: sec-1798-125
    target_controls:
      - id: art-22
        relationship: intersects-with
        confidence: 0.60
        rationale: >
          CCPA §1798.125 (Non-Discrimination) maps loosely to GDPR Art. 22
          (Automated Individual Decision-Making, Including Profiling). CCPA
          prohibits businesses from discriminating against consumers who
          exercise their privacy rights (e.g., denying goods, charging
          different prices). GDPR Art. 22 addresses the right not to be
          subject to decisions based solely on automated processing. The
          overlap is partial: both protect against adverse consequences of
          data processing, but the mechanisms and scope differ significantly.

  - source_control: sec-1798-130
    target_controls:
      - id: art-13
        relationship: equivalent-to
        confidence: 0.80
        rationale: >
          CCPA §1798.130 (Notice, Disclosure, Correction, and Deletion
          Requirements) maps to GDPR Art. 13 (Information to be provided where
          personal data are collected from the data subject). Both require
          transparent disclosure of data collection practices, purposes, and
          data subject rights at or before the point of collection.
      - id: art-14
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CCPA §1798.130 also intersects with GDPR Art. 14 (Information to be
          provided where personal data have not been obtained from the data
          subject). GDPR Art. 14 addresses notice obligations when data is
          obtained from sources other than the data subject, a scenario also
          covered by CCPA's disclosure requirements for data collected
          indirectly.

  - source_control: sec-1798-150
    target_controls:
      - id: art-82
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          CCPA §1798.150 (Private Right of Action for Data Breaches) maps to
          GDPR Art. 82 (Right to Compensation and Liability). CCPA §1798.150
          is narrow: it grants consumers a private right of action only for
          data breaches resulting from a business's failure to implement
          reasonable security measures, with statutory damages of $100–$750
          per consumer per incident. GDPR Art. 82 is broader, granting the
          right to compensation for any material or non-material damage
          resulting from GDPR violations, not limited to data breaches.
