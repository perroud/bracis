id: pipeda_to_gdpr
title: "PIPEDA to GDPR Control Mapping"
source_framework: pipeda
target_framework: gdpr
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # ── principles (Fair Information Principles — Schedule 1) ───────────

  - source_control: pip-1
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.92
        rationale: >
          PIPEDA Principle 1 (Accountability) maps directly to GDPR Art. 5(2)
          accountability principle. Both require the organization/controller to
          be responsible for compliance and able to demonstrate it. PIPEDA adds
          the requirement for a designated accountability individual, while GDPR
          Art. 5(2) frames accountability as an obligation of the controller
          entity. The remaining Art. 5(1) principles (lawfulness, purpose
          limitation, minimisation, accuracy, storage limitation, integrity)
          extend beyond accountability, hence intersects-with rather than
          equivalent-to.
      - id: art-28
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          PIPEDA Principle 1 clause 4.1.3 requires organizations to remain
          accountable for personal information transferred to third-party
          processors, using contractual or other means to ensure comparable
          protection. GDPR Art. 28 is the detailed processor regulation,
          requiring Data Processing Agreements, sub-processor controls, and
          processor obligations. Both address the same core concern (controller
          responsibility over processors), but Art. 28 is far more prescriptive
          about contractual terms, audit rights, and sub-processor chains.

  - source_control: pip-2
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          PIPEDA Principle 2 (Identifying Purposes) requires that the purposes
          for collection be identified at or before collection time. GDPR
          Art. 5(1)(b) purpose limitation principle requires data to be collected
          for specified, explicit, and legitimate purposes. Both mandate purpose
          specification before collection, but GDPR adds the prohibition on
          incompatible further processing, while PIPEDA allows new purposes with
          fresh consent.
      - id: art-6
        relationship: complements
        confidence: 0.78
        rationale: >
          PIPEDA Principle 2 focuses on identifying and documenting processing
          purposes, while GDPR Art. 6 requires a legal basis for each processing
          operation. They complement each other: purpose identification (PIPEDA)
          is a precondition to establishing lawful basis (GDPR). However, PIPEDA
          does not require a legal basis taxonomy (consent, contract, legitimate
          interest, etc.) — it only requires purpose documentation.
      - id: art-30
        relationship: complements
        confidence: 0.75
        rationale: >
          PIPEDA Principle 2 clause 4.2.1 requires documenting collection
          purposes. GDPR Art. 30 requires maintaining Records of Processing
          Activities (ROPA) including processing purposes. Both mandate purpose
          documentation, but Art. 30 is broader, requiring documentation of data
          categories, recipients, transfers, retention periods, and security
          measures beyond just purposes.

  - source_control: pip-3
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          PIPEDA Principle 3 (Consent) makes consent the primary legal basis for
          collection, use, and disclosure, with enumerated exceptions. GDPR
          Art. 6 provides six co-equal legal bases, of which consent is only one.
          Both regulate when processing is lawful, but PIPEDA is consent-centric
          while GDPR allows contract, legitimate interest, legal obligation,
          vital interests, and public interest as independent bases. The overlap
          on consent requirements is strong, but the frameworks diverge on
          non-consent processing.
      - id: art-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          PIPEDA Principle 3 clause 4.3.4 prohibits tying consent to service
          delivery when collection exceeds what is needed. This aligns with GDPR
          Art. 5(1)(a) fairness principle and Art. 5(1)(c) data minimisation.
          Both prevent coercive or bundled consent practices, though GDPR frames
          this through multiple principles rather than a single consent rule.

  - source_control: pip-4
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          PIPEDA Principle 4 (Limiting Collection) is the direct equivalent of
          GDPR Art. 5(1)(c) data minimisation. Both require that personal
          information/data collection be limited to what is necessary for the
          identified purposes. Both also require that collection use fair and
          lawful means (PIPEDA 4.4.2, GDPR Art. 5(1)(a) lawfulness and
          fairness). The scope, intent, and practical implications are
          substantively equivalent.
      - id: art-25
        relationship: complements
        confidence: 0.80
        rationale: >
          PIPEDA Principle 4's collection minimization obligation complements
          GDPR Art. 25 data protection by design and by default, which requires
          that by default only necessary personal data are processed. Art. 25
          extends the concept by mandating that minimisation be embedded into
          system design from the earliest stage, while PIPEDA Principle 4 states
          the outcome requirement without prescribing design methodology.

  - source_control: pip-5
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          PIPEDA Principle 5 (Limiting Use, Disclosure, and Retention) maps to
          GDPR Art. 5(1)(b) purpose limitation (no use for incompatible
          purposes), Art. 5(1)(e) storage limitation (retention only as long as
          necessary), and Art. 5(1)(a) fairness (no unauthorized disclosure).
          Both frameworks impose the same tripartite obligation: use only for
          stated purposes, do not disclose without authority, and delete when no
          longer needed.
      - id: art-17
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PIPEDA Principle 5 clause 4.5.3 requires destruction, erasure, or
          anonymization of personal information no longer needed. GDPR Art. 17
          right to erasure provides individuals the right to request deletion
          under specific grounds. Both address data deletion, but PIPEDA frames
          it as an organizational obligation (proactive deletion when purpose
          expires), while GDPR Art. 17 frames it as an individual right
          (reactive deletion upon request). The practical outcome overlaps
          significantly.

  - source_control: pip-6
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          PIPEDA Principle 6 (Accuracy) is the direct equivalent of GDPR
          Art. 5(1)(d) accuracy principle. Both require that personal
          information/data be accurate, complete, and up to date as necessary
          for the purposes of use. Both tie accuracy requirements to the purpose
          of processing — higher-impact uses demand higher accuracy. The
          principles are substantively identical in scope and intent.

  - source_control: pip-7
    target_controls:
      - id: art-32
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          PIPEDA Principle 7 (Safeguards) and GDPR Art. 32 (Security of
          processing) are functionally equivalent. Both require security
          measures proportional to the sensitivity/risk of the data being
          processed. Both mandate physical, organizational, and technical
          safeguards. Both adopt a risk-based approach where more sensitive data
          requires stronger protection. PIPEDA clause 4.7.3 explicitly lists
          physical, organizational, and technical measures, directly paralleling
          Art. 32(1)(a)-(d).
      - id: art-25
        relationship: complements
        confidence: 0.78
        rationale: >
          PIPEDA Principle 7's requirement for security safeguards appropriate
          to sensitivity complements GDPR Art. 25's requirement for data
          protection by design and by default. Art. 25 mandates that security
          measures be embedded into processing design from inception, while
          PIPEDA Principle 7 specifies the safeguard categories without
          prescribing when in the lifecycle they must be implemented.

  - source_control: pip-8
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          PIPEDA Principle 8 (Openness) requires organizations to make privacy
          policies and practices readily available. GDPR Art. 5(1)(a)
          transparency principle requires processing to be transparent to data
          subjects. Both mandate organizational transparency about data
          practices, but GDPR Art. 5 frames transparency as one of several
          processing principles rather than a standalone openness obligation.
      - id: art-15
        relationship: complements
        confidence: 0.72
        rationale: >
          PIPEDA Principle 8 clause 4.8.2 requires making available descriptions
          of personal information held and its uses, the identity of the
          accountability officer, and means of gaining access. GDPR Art. 15
          right of access provides data subjects a right to obtain specific
          information about processing. Both serve transparency, but PIPEDA
          Principle 8 is about proactive organizational disclosure of policies,
          while Art. 15 is a reactive right to obtain information upon request.

  - source_control: pip-9
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          PIPEDA Principle 9 (Individual Access) and GDPR Art. 15 (Right of
          access) are functionally equivalent. Both grant individuals the right
          to: confirm whether data is held about them, access that data, learn
          how it has been used/disclosed, and receive information in an
          understandable format. PIPEDA requires response within 30 days; GDPR
          requires response within one month. Both allow limited exceptions.
      - id: art-17
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          PIPEDA Principle 9 clause 4.9.3 requires amendment (correction,
          deletion, or addition) of inaccurate information and propagation of
          corrections to third parties. GDPR Art. 17 right to erasure addresses
          the deletion component. The intersection is partial: PIPEDA Principle
          9 combines access, correction, and deletion into a single principle,
          while GDPR separates access (Art. 15), rectification (Art. 16), and
          erasure (Art. 17).

  - source_control: pip-10
    target_controls:
      - id: art-5
        relationship: complements
        confidence: 0.75
        rationale: >
          PIPEDA Principle 10 (Challenging Compliance) requires organizations to
          have accessible complaint procedures. GDPR Art. 5(2) accountability
          principle requires controllers to demonstrate compliance, which
          implicitly includes responding to challenges. PIPEDA Principle 10 is
          more specific about the complaint mechanism, while Art. 5(2) frames
          compliance demonstration more broadly.
      - id: art-83
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          PIPEDA Principle 10 establishes the right to challenge compliance and
          requires complaint investigation. GDPR Art. 83 establishes
          administrative fines for non-compliance. Both address enforcement
          consequences, but through different mechanisms: PIPEDA through
          organizational complaint handling and OPC investigation, GDPR through
          supervisory authority-imposed administrative fines. The compliance
          challenge (PIPEDA) and the penalty regime (GDPR) are different facets
          of enforcement.

  # ── divisions (Part 1 statutory provisions) ─────────────────────────

  - source_control: div-1-sec-6
    target_controls:
      - id: art-33
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          PIPEDA Section 10.1 (Breach of Security Safeguards) and GDPR Art. 33
          (Notification to supervisory authority) are functionally equivalent.
          Both mandate reporting data breaches to the supervisory authority.
          PIPEDA uses the "real risk of significant harm" (RROSH) threshold,
          while GDPR uses "risk to the rights and freedoms of natural persons."
          GDPR specifies a 72-hour notification window; PIPEDA requires
          reporting "as soon as feasible." Both require documenting all
          breaches, regardless of whether they meet the reporting threshold.
      - id: art-32
        relationship: complements
        confidence: 0.75
        rationale: >
          PIPEDA Section 10.1 breach notification complements GDPR Art. 32
          security of processing. Adequate security measures (Art. 32) are the
          preventive control, while breach notification (PIPEDA div-1-sec-6,
          GDPR Art. 33) is the detective/responsive control. Both address the
          same security lifecycle from different angles.

  - source_control: div-1-sec-6-1
    target_controls:
      - id: art-33
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          PIPEDA div-1-sec-6-1 (Breach Notification to Commissioner) details
          the content and timing requirements for reporting breaches to the OPC.
          GDPR Art. 33 details the content and 72-hour timing requirement for
          reporting to the supervisory authority. Both specify: description of
          the breach, number of individuals affected, description of personal
          data involved, remediation steps taken, and contact information.
          PIPEDA adds the RROSH assessment factors; GDPR adds the risk
          assessment for rights and freedoms. The requirements are substantively
          equivalent.

  - source_control: div-1-sec-6-2
    target_controls:
      - id: art-33
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          PIPEDA div-1-sec-6-2 (Breach Notification to Affected Individuals)
          addresses individual notification requirements. GDPR Art. 33 focuses
          on supervisory authority notification but references Art. 34 for
          individual notification. Since Art. 34 is not available as a control
          in this project, Art. 33 is the closest available target. Both are
          part of the breach notification regime, but div-1-sec-6-2 specifically
          addresses individual notification while Art. 33 addresses authority
          notification.
      - id: art-5
        relationship: complements
        confidence: 0.68
        rationale: >
          PIPEDA div-1-sec-6-2 breach notification to individuals supports GDPR
          Art. 5(1)(a) transparency principle. Notifying individuals of breaches
          affecting their data is a transparency obligation that enables
          individuals to take protective action. The relationship is
          complementary rather than direct because Art. 5 states the principle
          while div-1-sec-6-2 specifies a concrete notification mechanism.

  - source_control: div-1-sec-10
    target_controls:
      - id: art-83
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          PIPEDA Section 11-12 (Compliance Complaints and Audits) establishes
          the complaint mechanism and the OPC's investigative and audit powers.
          GDPR Art. 83 establishes the administrative fine framework for
          non-compliance. Both address regulatory enforcement, but through
          different mechanisms: PIPEDA through complaint investigation and
          audit, GDPR through administrative fines. Both represent the
          supervisory authority's enforcement toolkit.
      - id: art-5
        relationship: complements
        confidence: 0.72
        rationale: >
          PIPEDA div-1-sec-10 complaint and audit powers complement GDPR Art.
          5(2) accountability. The ability of the Commissioner to investigate
          and audit is the external verification of the accountability
          obligation. Organizations must maintain evidence of compliance (Art.
          5(2)) precisely because they may face Commissioner investigations
          (div-1-sec-10).

  - source_control: div-1-sec-12
    target_controls:
      - id: art-83
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          PIPEDA Section 12-13 (Commissioner Powers) details the OPC's
          investigative powers, mediation capabilities, and reporting
          obligations. GDPR Art. 83 details supervisory authority fine-imposing
          powers and considerations. Both address regulatory authority
          enforcement, but PIPEDA emphasizes investigation, mediation, and
          recommendations, while GDPR Art. 83 focuses on administrative monetary
          penalties. The PIPEDA Commissioner historically lacks order-making
          power (recommendations only), while GDPR supervisory authorities
          can impose binding fines.
      - id: art-35
        relationship: complements
        confidence: 0.65
        rationale: >
          PIPEDA div-1-sec-12 Commissioner audit powers complement GDPR Art. 35
          Data Protection Impact Assessment. The Commissioner's ability to
          examine any personal information management practice provides external
          oversight that DPIAs address proactively. Organizations conducting
          thorough DPIAs (Art. 35) are better prepared for Commissioner
          investigations (div-1-sec-12).

  - source_control: div-1-sec-14
    target_controls:
      - id: art-83
        relationship: equivalent-to
        confidence: 0.82
        rationale: >
          PIPEDA Section 14-16 (Court Remedies) and GDPR Art. 83 (Administrative
          Fines) both establish the penalty and enforcement consequences for
          non-compliance. PIPEDA uses Federal Court proceedings with damages
          (including humiliation), practice correction orders, and public
          notice. GDPR uses administrative fines up to EUR 20M or 4% of global
          turnover. Both serve the same function (deterrence and redress for
          violations), but the mechanisms differ: judicial (PIPEDA) vs.
          administrative (GDPR). The proposed CPPA would bring PIPEDA closer
          to GDPR's administrative penalty model.
      - id: art-5
        relationship: complements
        confidence: 0.70
        rationale: >
          PIPEDA div-1-sec-14 Court remedies complement GDPR Art. 5(2)
          accountability. The prospect of Court-ordered damages and corrective
          measures reinforces the accountability obligation. Technical
          compliance evidence (demonstrating compliance per Art. 5(2)) is the
          primary defense in Court proceedings (div-1-sec-14).
