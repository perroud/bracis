id: iso-27017_to_iso-27001
title: "ISO/IEC 27017:2015 to ISO/IEC 27001:2022 Control Mapping"
source_framework: iso-27017
target_framework: iso-27001-2022
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic

mappings:
  # cls5 — Information Security Policies for Cloud Services
  - source_control: cls5.1
    target_controls:
      - id: a5-1
        relationship: derived-from
        confidence: 0.92
        rationale: >
          ISO 27017 cls5.1 (Information security policies for cloud services)
          directly extends ISO 27001 A.5.1 (Policies for information security)
          by requiring cloud-specific policy additions such as shared responsibility
          delineation, data sovereignty, multi-tenancy considerations, and cloud
          service provider evaluation criteria. The base requirement for defining,
          approving, and communicating information security policies is identical.
      - id: a5-23
        relationship: complements
        confidence: 0.85
        rationale: >
          ISO 27017 cls5.1 complements A.5.23 (Information security for use of
          cloud services) by providing the specific policy content requirements
          that A.5.23 mandates organizations establish for cloud service
          acquisition, use, management, and exit.

  - source_control: cls5.2
    target_controls:
      - id: a5-1
        relationship: derived-from
        confidence: 0.90
        rationale: >
          ISO 27017 cls5.2 (Review of policies for information security in cloud
          services) extends the policy review requirement in ISO 27001 A.5.1 by
          adding cloud-specific review triggers such as changes in cloud providers,
          adoption of new cloud service models, regulatory changes affecting cloud
          data processing, and cloud security incidents.
      - id: a5-36
        relationship: complements
        confidence: 0.82
        rationale: >
          ISO 27017 cls5.2 complements A.5.36 (Compliance with policies, rules
          and standards) by specifying that cloud-specific policy reviews should
          assess whether policies adequately address current cloud risks and
          emerging cloud technologies such as serverless computing and container
          orchestration.

  # cls6 — Organization of Information Security for Cloud Services
  - source_control: cls6.1
    target_controls:
      - id: a5-2
        relationship: derived-from
        confidence: 0.92
        rationale: >
          ISO 27017 cls6.1 (Information security roles and responsibilities for
          cloud services) extends ISO 27001 A.5.2 (Information security roles and
          responsibilities) by requiring explicit documentation of the shared
          responsibility model between cloud service provider and customer,
          including the allocation of security responsibilities across IaaS,
          PaaS, and SaaS service models.
      - id: a5-23
        relationship: implements
        confidence: 0.80
        rationale: >
          ISO 27017 cls6.1 supports A.5.23 (Information security for use of cloud
          services) by defining the roles and responsibilities framework that
          A.5.23 requires organizations to establish when using cloud services,
          particularly regarding which security controls are managed by the
          provider versus the customer.

  - source_control: cls6.2
    target_controls:
      - id: a5-2
        relationship: implements
        confidence: 0.85
        rationale: >
          ISO 27017 cls6.2 (Segregation of duties in cloud environments) supports
          ISO 27001 A.5.2 by extending the segregation of duties concept to cloud
          administration, ensuring that the same person cannot provision cloud
          resources and approve their security configuration.
      - id: a5-15
        relationship: complements
        confidence: 0.78
        rationale: >
          ISO 27017 cls6.2 complements A.5.15 (Access control) by addressing
          the cloud-specific segregation requirement that administrative access
          to cloud infrastructure must be separated from access to customer data,
          enforced through cloud IAM role-based access control.

  # cls8 — Asset Management for Cloud Services
  - source_control: cls8.1
    target_controls:
      - id: a5-23
        relationship: implements
        confidence: 0.85
        rationale: >
          ISO 27017 cls8.1 (Inventory of assets in cloud services) supports
          A.5.23 (Information security for use of cloud services) by requiring
          cloud service customers to maintain an inventory of information assets
          stored in or processed by cloud services, including virtual machines,
          containers, storage, databases, and encryption keys.
      - id: a8-9
        relationship: complements
        confidence: 0.80
        rationale: >
          ISO 27017 cls8.1 complements A.8.9 (Configuration management) by
          extending asset inventory requirements to cloud-native resources such
          as serverless functions, API endpoints, and identity resources, and
          requiring cloud-native asset discovery and drift detection to identify
          shadow IT resources.

  - source_control: cls8.2
    target_controls:
      - id: a5-23
        relationship: implements
        confidence: 0.83
        rationale: >
          ISO 27017 cls8.2 (Removal of cloud service customer assets) supports
          A.5.23 by addressing the cloud service exit strategy requirement,
          specifically the secure erasure or return of customer data upon
          termination of cloud service agreements, including data in backups,
          replicas, and archives.

  # cld — Cloud-Specific Extended Controls
  - source_control: cld-6.3
    target_controls:
      - id: a5-23
        relationship: derived-from
        confidence: 0.92
        rationale: >
          ISO 27017 cld-6.3 (Relationship between cloud service customer and
          provider) is directly derived from A.5.23 (Information security for
          use of cloud services). Both address the documentation and management
          of the cloud service relationship, including security capabilities,
          geographic locations, supply chain dependencies, and shared
          responsibility models.
      - id: a5-2
        relationship: implements
        confidence: 0.78
        rationale: >
          ISO 27017 cld-6.3 supports A.5.2 (Information security roles and
          responsibilities) by requiring the cloud service provider to designate
          a point of contact for security matters and to document the security
          capabilities and features of the cloud service, enabling clear role
          allocation.

  - source_control: cld-8.1
    target_controls:
      - id: a5-23
        relationship: implements
        confidence: 0.85
        rationale: >
          ISO 27017 cld-8.1 (Removal of cloud service customer assets upon
          termination) supports A.5.23 by specifying the exit strategy
          requirements including data return in portable formats, secure
          deletion timelines, methods for cryptographic erasure, and evidence
          of deletion completion across all storage locations including backups
          and replicas.

  - source_control: cld-9.5
    target_controls:
      - id: a5-15
        relationship: derived-from
        confidence: 0.88
        rationale: >
          ISO 27017 cld-9.5 (Access control to cloud service customer data in
          shared virtual environments) is derived from A.5.15 (Access control)
          by applying access control principles to multi-tenant cloud
          environments, requiring logical isolation mechanisms to prevent
          cross-tenant data access and restricting provider personnel access
          to customer data.
      - id: a8-25
        relationship: complements
        confidence: 0.72
        rationale: >
          ISO 27017 cld-9.5 complements A.8.25 (Secure development life cycle)
          by requiring that multi-tenancy isolation controls are designed and
          tested at the application, database, and storage layers, including
          IDOR testing and tenant context validation in database queries.

  - source_control: cld-12.4
    target_controls:
      - id: a8-15
        relationship: derived-from
        confidence: 0.93
        rationale: >
          ISO 27017 cld-12.4 (Monitoring of cloud services) is directly derived
          from A.8.15 (Logging) by extending logging requirements to cloud
          environments, requiring the cloud service provider to provide audit
          logs, security event logs, and operational metrics to the cloud
          service customer, and to monitor infrastructure for events affecting
          customers.
      - id: a5-36
        relationship: implements
        confidence: 0.75
        rationale: >
          ISO 27017 cld-12.4 supports A.5.36 (Compliance with policies, rules
          and standards) by providing the monitoring capabilities necessary to
          verify ongoing compliance with cloud security policies, including
          real-time alerting, historical analysis, and forensic investigation
          capabilities.

  # cls9 — Access Control for Cloud Services
  - source_control: cls9.1
    target_controls:
      - id: a5-15
        relationship: derived-from
        confidence: 0.93
        rationale: >
          ISO 27017 cls9.1 (Access control policy for cloud services) is directly
          derived from A.5.15 (Access control). Both require establishing and
          implementing access control policies based on business and security
          requirements. cls9.1 extends this to address cloud-specific layers:
          management plane access, cloud service APIs, customer data access,
          and inter-service access, plus federation and machine-to-machine
          authentication requirements.
      - id: a5-23
        relationship: implements
        confidence: 0.82
        rationale: >
          ISO 27017 cls9.1 supports A.5.23 (Information security for use of
          cloud services) by defining the access control capabilities that cloud
          service providers must offer and cloud service customers must implement
          as part of their cloud security management.

  - source_control: cls9.2
    target_controls:
      - id: a5-15
        relationship: implements
        confidence: 0.85
        rationale: >
          ISO 27017 cls9.2 (User registration and de-registration for cloud
          services) supports A.5.15 (Access control) by specifying the user
          lifecycle management requirements for cloud environments, including
          automated provisioning/de-provisioning through SCIM, revocation of
          all tokens and keys upon de-registration, and orphaned account
          detection.
      - id: a8-9
        relationship: complements
        confidence: 0.73
        rationale: >
          ISO 27017 cls9.2 complements A.8.9 (Configuration management) by
          requiring that cloud service user identities and access configurations
          are managed through automated lifecycle processes that synchronize
          with the authoritative identity directory, preventing configuration
          drift in identity management.

  - source_control: cls9.3
    target_controls:
      - id: a5-15
        relationship: derived-from
        confidence: 0.90
        rationale: >
          ISO 27017 cls9.3 (Privileged access management for cloud services) is
          derived from A.5.15 (Access control) by adding cloud-specific privileged
          access requirements including just-in-time elevation, time-limited grants,
          multi-party approval for destructive operations, session recording, and
          enhanced monitoring for cloud management console and API access.
      - id: a5-2
        relationship: implements
        confidence: 0.78
        rationale: >
          ISO 27017 cls9.3 supports A.5.2 (Information security roles and
          responsibilities) by requiring the cloud service provider to document
          which privileged roles its staff requires and to implement controls
          preventing unauthorized customer data access through privileged
          infrastructure accounts.

  # cls10 — Cryptography for Cloud Services
  - source_control: cls10.1
    target_controls:
      - id: a8-25
        relationship: implements
        confidence: 0.78
        rationale: >
          ISO 27017 cls10.1 (Policy on the use of cryptographic controls for
          cloud services) supports A.8.25 (Secure development life cycle) by
          requiring cryptographic policies that address encryption of data at
          rest, in transit, and in use within cloud environments, which are
          foundational secure development requirements for cloud-native
          applications.
      - id: a5-1
        relationship: complements
        confidence: 0.80
        rationale: >
          ISO 27017 cls10.1 complements A.5.1 (Policies for information security)
          by requiring a topic-specific cryptographic policy that covers cloud
          provider algorithm transparency, key length requirements, and the
          assessment of whether provider-managed encryption is adequate or
          customer-managed encryption is necessary.

  - source_control: cls10.2
    target_controls:
      - id: a8-25
        relationship: implements
        confidence: 0.75
        rationale: >
          ISO 27017 cls10.2 (Key management for cloud services) supports A.8.25
          (Secure development life cycle) by requiring key lifecycle management
          policies covering generation, distribution, storage, rotation,
          revocation, and destruction of cryptographic keys in cloud environments,
          including BYOK and HYOK models for sensitive data.
      - id: a5-1
        relationship: complements
        confidence: 0.78
        rationale: >
          ISO 27017 cls10.2 complements A.5.1 (Policies for information security)
          by mandating topic-specific key management policies that define which
          key ownership model (provider-managed, BYOK, or HYOK) is required for
          each data classification level and cloud service.

  # cls12 — Operations Security for Cloud Services
  - source_control: cls12.1
    target_controls:
      - id: a8-9
        relationship: derived-from
        confidence: 0.90
        rationale: >
          ISO 27017 cls12.1 (Change management for cloud services) is derived
          from A.8.9 (Configuration management) by extending change management
          requirements to cloud environments, requiring cloud service providers
          to notify customers of changes affecting their security posture,
          and requiring authorized, tested, and documented change processes
          for both provider and customer cloud infrastructure changes.
      - id: a8-25
        relationship: implements
        confidence: 0.75
        rationale: >
          ISO 27017 cls12.1 supports A.8.25 (Secure development life cycle) by
          requiring CI/CD pipeline-based change management with approval gates,
          security testing, canary deployments, and automated rollback, which
          are integral parts of a secure cloud development lifecycle.

  - source_control: cls12.2
    target_controls:
      - id: a8-9
        relationship: implements
        confidence: 0.82
        rationale: >
          ISO 27017 cls12.2 (Capacity management for cloud services) supports
          A.8.9 (Configuration management) by requiring monitoring and management
          of cloud resource capacity levels, including configuration of resource
          quotas, budget alerts, and auto-scaling bounds to prevent uncontrolled
          resource consumption that could indicate security incidents such as
          cryptomining or denial of service preparation.
      - id: a8-15
        relationship: complements
        confidence: 0.75
        rationale: >
          ISO 27017 cls12.2 complements A.8.15 (Logging) by requiring monitoring
          of cloud resource consumption patterns and alerting on anomalies that
          may indicate security incidents, feeding capacity metrics into the
          security monitoring pipeline for correlation with other indicators.

  - source_control: cls12.3
    target_controls:
      - id: a8-15
        relationship: derived-from
        confidence: 0.95
        rationale: >
          ISO 27017 cls12.3 (Event logging and monitoring for cloud services)
          is directly derived from A.8.15 (Logging). Both require producing,
          storing, protecting, and analyzing event logs. cls12.3 extends this
          to cloud-specific requirements including management plane logging,
          data plane logging, API call capture, immutable log storage, and
          agreed retention periods between cloud service provider and customer.
      - id: a5-36
        relationship: implements
        confidence: 0.78
        rationale: >
          ISO 27017 cls12.3 supports A.5.36 (Compliance with policies, rules
          and standards) by providing the event logging infrastructure necessary
          to demonstrate compliance with cloud security policies through audit
          trails, security event correlation, and log completeness verification.
      - id: a5-23
        relationship: complements
        confidence: 0.77
        rationale: >
          ISO 27017 cls12.3 complements A.5.23 (Information security for use
          of cloud services) by specifying the logging capabilities that cloud
          service providers must offer and that cloud service customers should
          negotiate as part of cloud service agreements, including log format,
          retention, and export capabilities.

  # cls13 — Communications Security for Cloud Services
  - source_control: cls13.1
    target_controls:
      - id: a8-25
        relationship: implements
        confidence: 0.78
        rationale: >
          ISO 27017 cls13.1 (Network controls for cloud services) supports
          A.8.25 (Secure development life cycle) by requiring network security
          controls including virtual network isolation, default-deny posture,
          encrypted service-to-service communication, and private connectivity
          options, which must be incorporated into cloud application architecture
          and deployment processes.
      - id: a8-9
        relationship: complements
        confidence: 0.82
        rationale: >
          ISO 27017 cls13.1 complements A.8.9 (Configuration management) by
          requiring network configuration management including virtual private
          clouds, network security groups, firewall rules, and private endpoints,
          all managed through infrastructure-as-code with mandatory peer review
          for changes.
      - id: a5-23
        relationship: implements
        confidence: 0.80
        rationale: >
          ISO 27017 cls13.1 supports A.5.23 (Information security for use of
          cloud services) by specifying the network security capabilities that
          cloud service providers must document and communicate, and that cloud
          service customers must implement based on data classification
          requirements.

  - source_control: cls13.2
    target_controls:
      - id: a8-9
        relationship: derived-from
        confidence: 0.85
        rationale: >
          ISO 27017 cls13.2 (Segregation in networks for cloud services) is
          derived from A.8.9 (Configuration management) by extending network
          configuration requirements to cloud-specific segregation using VPCs,
          virtual networks, software-defined networking, and zero-trust network
          architectures to separate security domains, applications, and data
          classifications within cloud environments.
      - id: a5-15
        relationship: implements
        confidence: 0.78
        rationale: >
          ISO 27017 cls13.2 supports A.5.15 (Access control) by requiring
          network-level access controls that enforce multi-tenant isolation
          between cloud service customers and micro-segmentation within
          customer environments based on workload sensitivity and risk level.
