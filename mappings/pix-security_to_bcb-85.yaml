id: pix-security_to_bcb-85
title: "Pix Security to BCB 85 Control Mapping"
source_framework: pix-security
target_framework: bcb-85
version: "1.0.0"
last_updated: "2026-04-04"
methodology: structural
description: >
  Mapeamento entre os requisitos de seguranca do Pix (Resolucao BCB 1/2020) e a
  Resolucao BCB 85/2021 (seguranca cibernetica para instituicoes de pagamento).
  A BCB 85 e a norma geral de ciberseguranca para IPs; o Pix adiciona requisitos
  especificos de seguranca para o arranjo de pagamentos instantaneos.

mappings:
  - source_control: pix-05
    target_controls:
      - id: art-3
        relationship: derived-from
        confidence: 0.85
        rationale: >
          Criptografia no SPI (Sistema de Pagamentos Instantaneos) deriva da
          obrigacao geral de politica de seguranca cibernetica da BCB 85.

  - source_control: pix-06
    target_controls:
      - id: art-5
        relationship: derived-from
        confidence: 0.85
        rationale: >
          Assinatura digital de mensagens Pix no SPI complementa os requisitos
          de autenticacao e integridade de dados da BCB 85.

  - source_control: pix-07
    target_controls:
      - id: art-10
        relationship: complements
        confidence: 0.80
        rationale: >
          Seguranca do DICT (Diretorio de Identificadores de Contas Transacionais)
          complementa os requisitos de protecao de dados sensiveis da BCB 85.

  - source_control: pix-10
    target_controls:
      - id: art-7
        relationship: derived-from
        confidence: 0.85
        rationale: >
          Autenticacao do pagador nas transacoes Pix deriva dos requisitos gerais
          de autenticacao em canais eletronicos da BCB 85.

  - source_control: pix-14
    target_controls:
      - id: art-15
        relationship: complements
        confidence: 0.80
        rationale: >
          Motor antifraude Pix com regras especificas de pagamentos instantaneos
          complementa a gestao de risco cibernetico geral da BCB 85.

  - source_control: pix-15
    target_controls:
      - id: art-16
        relationship: derived-from
        confidence: 0.85
        rationale: >
          Limites transacionais Pix (horario noturno, por tipo de chave) derivam
          da obrigacao geral de controles de limites operacionais.

  - source_control: pix-16
    target_controls:
      - id: art-17
        relationship: complements
        confidence: 0.80
        rationale: >
          Bloqueio cautelar Pix (ate 72h para analise de fraude) complementa os
          procedimentos de resposta a incidentes da BCB 85.

  - source_control: pix-19
    target_controls:
      - id: art-18
        relationship: complements
        confidence: 0.75
        rationale: >
          MED (Mecanismo Especial de Devolucao) e um mecanismo especifico do Pix
          que complementa os processos de tratamento de incidentes da BCB 85.

  - source_control: pix-23
    target_controls:
      - id: art-11
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Certificados digitais ICP-Brasil para conexao ao SPI sao o mesmo
          requisito de certificacao exigido pela BCB 85 para canais criticos.

  - source_control: pix-24
    target_controls:
      - id: art-12
        relationship: derived-from
        confidence: 0.85
        rationale: >
          SLAs de disponibilidade Pix (99.5% 24/7/365) derivam e expandem
          os requisitos de continuidade de servicos da BCB 85.

  - source_control: pix-25
    target_controls:
      - id: art-13
        relationship: derived-from
        confidence: 0.85
        rationale: >
          Plano de contingencia Pix (failover, disaster recovery) deriva dos
          requisitos de continuidade de negocios da BCB 85.

  - source_control: pix-26
    target_controls:
      - id: art-19
        relationship: complements
        confidence: 0.80
        rationale: >
          Logs de auditoria Pix (5 anos, rastreabilidade fim-a-fim) complementam
          os requisitos de retencao de registros da BCB 85.
