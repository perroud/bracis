id: etsi-en-303-645_to_iec-62443
title: "ETSI EN 303 645 to IEC 62443 Control Mapping"
source_framework: etsi-en-303-645
target_framework: iec-62443
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic
description: >
  Mapping between the ETSI EN 303 645 consumer IoT cybersecurity baseline and
  the IEC 62443 industrial automation and control systems security series. Both
  frameworks address device-level security requirements but target different
  domains: ETSI focuses on consumer IoT products while IEC 62443 addresses
  industrial control systems. The overlap is strongest in authentication,
  secure communications, software integrity, attack surface reduction, and
  system resilience. IEC 62443 is generally more granular due to its
  security-level-based approach, while ETSI provides broader consumer-oriented
  provisions.

mappings:
  - source_control: pwd-1
    target_controls:
      - id: iec-3-3-fr1
        relationship: intersects-with
        confidence: 0.87
        rationale: >
          ETSI pwd-1 (No Universal Default Passwords) maps to IEC 62443 FR1
          (Identification and Authentication Control). Both require unique
          device credentials and prohibit shared default passwords. FR1
          extends further by defining tiered authentication strength per
          security level (SL-1 through SL-4), whereas pwd-1 focuses
          specifically on eliminating universal defaults in consumer IoT.
      - id: iec-4-1-3
        relationship: complements
        confidence: 0.75
        rationale: >
          The no-default-password requirement in pwd-1 complements IEC 62443
          Secure by Design (iec-4-1-3), which mandates that products ship
          in a hardened state with secure default settings including no
          default passwords.

  - source_control: pwd-2
    target_controls:
      - id: iec-3-3-fr1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ETSI pwd-2 (No Easily Guessable Credential Mechanisms) maps to
          IEC 62443 FR1 (Identification and Authentication Control). Both
          require robust authentication mechanisms that resist guessing
          attacks and provide credential management capabilities. FR1
          specifies escalating authentication strength per security level,
          while pwd-2 focuses on usability of credential change mechanisms
          and avoidance of predictable patterns.
      - id: iec-3-3-fr2
        relationship: complements
        confidence: 0.72
        rationale: >
          The requirement in pwd-2 for authentication mechanisms following
          best practice complements IEC 62443 FR2 (Use Control), which
          enforces the principle of least privilege and role-based access.
          Both address different aspects of access management but converge
          on preventing unauthorized system use.

  - source_control: vdp-1
    target_controls:
      - id: iec-4-1-1
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          ETSI vdp-1 (Vulnerability Disclosure Policy) maps to IEC 62443
          Secure Product Development Lifecycle (iec-4-1-1), which includes
          defect management, patch management, and vulnerability handling
          processes aligned with IEC 62443-4-1. Both require manufacturers
          to maintain vulnerability monitoring and response capabilities
          throughout the product lifecycle.
      - id: iec-3-3-fr6
        relationship: complements
        confidence: 0.73
        rationale: >
          The vulnerability monitoring and timely response requirements
          in vdp-1 complement IEC 62443 FR6 (Timely Response to Events),
          which mandates the capability to respond to security violations
          and report evidence. VDP-1 covers the external reporting channel
          while FR6 covers the internal detection and response mechanism.
      - id: iec-4-2-2
        relationship: complements
        confidence: 0.70
        rationale: >
          vdp-1 requires continuous vulnerability monitoring and remediation,
          which complements IEC 62443 Component Security Testing (iec-4-2-2).
          The testing framework identifies vulnerabilities proactively, while
          the VDP provides a channel for externally reported discoveries.

  - source_control: upd-1
    target_controls:
      - id: iec-3-3-fr3
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ETSI upd-1 (Securely Updateable Software) maps to IEC 62443 FR3
          (System Integrity), which requires integrity verification of
          software, firmware, and configuration changes. Both mandate
          cryptographic validation of updates before installation to
          prevent unauthorized modifications.
      - id: iec-3-3-fr7
        relationship: complements
        confidence: 0.78
        rationale: >
          The secure update mechanism in upd-1 complements IEC 62443 FR7
          (Resource Availability), specifically the patch management and
          system recovery aspects (SR-7.7). Both address the need for
          maintaining system security through timely updates while
          preserving system availability.
      - id: iec-4-1-1
        relationship: complements
        confidence: 0.75
        rationale: >
          upd-1 complements the IEC 62443 Secure Product Development
          Lifecycle (iec-4-1-1) patch management requirements. The
          development lifecycle mandates establishing patch delivery
          processes, while upd-1 specifies the device-side requirements
          for receiving and applying those patches securely.

  - source_control: upd-2
    target_controls:
      - id: iec-4-1-1
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          ETSI upd-2 (Support Period Publication) maps to IEC 62443 Secure
          Product Development Lifecycle (iec-4-1-1), which includes
          end-of-life planning for IACS components. Both require
          manufacturers to define and communicate the duration of security
          update support, enabling asset owners to plan migrations.
      - id: iec-3-3-fr7
        relationship: complements
        confidence: 0.73
        rationale: >
          The support period transparency in upd-2 complements IEC 62443
          FR7 (Resource Availability), specifically SR-7.7 regarding
          system lifecycle management. Knowing the support end-date is
          essential for planning backup, recovery, and replacement
          strategies for controlled systems.

  - source_control: ssp-1
    target_controls:
      - id: iec-3-3-fr4
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          ETSI ssp-1 (Securely Store Sensitive Security Parameters) maps
          to IEC 62443 FR4 (Data Confidentiality), which requires
          protection of credentials, keys, and sensitive configuration
          data at rest. Both mandate hardware-backed secure storage and
          prohibit hardcoded secrets, though FR4 extends to broader data
          confidentiality including process data and audit logs.
      - id: iec-3-3-fr1
        relationship: complements
        confidence: 0.78
        rationale: >
          The secure storage of authentication credentials in ssp-1
          complements IEC 62443 FR1 (Identification and Authentication
          Control), specifically the credential management aspects
          (SR-1.9). Both address the secure handling of authentication
          material, but from different angles: ssp-1 focuses on storage
          security while FR1 focuses on authentication process security.
      - id: iec-4-1-3
        relationship: complements
        confidence: 0.74
        rationale: >
          ssp-1 prohibition of hardcoded credentials complements IEC
          62443 Secure by Design (iec-4-1-3), which mandates secure
          default configurations and attack surface minimization. Both
          converge on the principle that secrets must never be embedded
          in source code or firmware binaries.

  - source_control: cse-1
    target_controls:
      - id: iec-3-3-fr4
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          ETSI cse-1 (Communicate Securely) maps to IEC 62443 FR4 (Data
          Confidentiality), which requires encryption of communications
          between zones using TLS 1.2+ and OT-specific security mechanisms.
          Both mandate standards-based cryptography for data in transit and
          prohibit deprecated algorithms, though FR4 also covers data at
          rest and industrial protocol-specific encryption.
      - id: iec-3-3-fr3
        relationship: complements
        confidence: 0.80
        rationale: >
          The requirement in cse-1 for communication integrity and
          authentication complements IEC 62443 FR3 (System Integrity),
          which mandates message authentication for inter-zone
          communications. Both address the authenticity and integrity
          of network communications, with FR3 focusing on the integrity
          verification aspect and cse-1 on confidentiality and
          encryption strength.
      - id: iec-3-3-fr5
        relationship: complements
        confidence: 0.72
        rationale: >
          cse-1 encryption requirements complement IEC 62443 FR5
          (Restricted Data Flow), which controls what communications
          are permitted between zones. FR5 governs which data flows
          are authorized, while cse-1 ensures those authorized flows
          are cryptographically protected.

  - source_control: eas-1
    target_controls:
      - id: iec-3-3-fr7
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ETSI eas-1 (Minimise Exposed Attack Surfaces) maps to IEC 62443
          FR7 (Resource Availability), specifically SR-7.1 (denial of
          service protection) and SR-7.2 (resource management). Both
          require disabling unused services and interfaces, minimizing
          code to essential functionality, and applying least privilege
          to reduce exploitability. FR7 extends to redundancy and
          recovery capabilities beyond attack surface reduction.
      - id: iec-3-3-fr2
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          The least-privilege requirement in eas-1 maps to IEC 62443 FR2
          (Use Control), which enforces assigned privileges and restricts
          execution of unauthorized software. Both mandate that software
          runs with minimal necessary privileges and that only required
          services and interfaces are enabled.
      - id: iec-4-1-3
        relationship: complements
        confidence: 0.80
        rationale: >
          eas-1 complements IEC 62443 Secure by Design (iec-4-1-3), which
          requires minimizing the attack surface, disabling unnecessary
          services by default, and implementing least privilege in the
          default configuration. Both embody the same design philosophy
          but eas-1 targets consumer IoT deployment while iec-4-1-3
          targets industrial product development.

  - source_control: swi-1
    target_controls:
      - id: iec-3-3-fr3
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          ETSI swi-1 (Ensure Software Integrity) is equivalent to IEC 62443
          FR3 (System Integrity) in the domain of software and firmware
          integrity verification. Both require secure boot mechanisms with
          cryptographic chain-of-trust, code-signing for updates, and
          detection of unauthorized software modifications. The core
          requirement — verify software authenticity before execution — is
          identical across both frameworks.
      - id: iec-4-2-1
        relationship: complements
        confidence: 0.77
        rationale: >
          swi-1 complements IEC 62443 Component Security Requirements
          (iec-4-2-1), specifically CR 3.x which defines component-level
          integrity verification requirements at each security level.
          swi-1 mandates secure boot and code signing broadly, while
          iec-4-2-1 specifies increasing integrity assurance requirements
          from SL-1 through SL-4.

  - source_control: dpd-1
    target_controls:
      - id: iec-3-3-fr4
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ETSI dpd-1 (Ensure That Personal Data Is Secure) maps to IEC
          62443 FR4 (Data Confidentiality) in the requirement to protect
          sensitive data at rest and in transit. Both mandate encryption
          and access controls for stored data. However, dpd-1 is broader
          in scope, covering consent management, data minimization, and
          GDPR compliance, which are outside FR4's industrial focus.
      - id: iec-2-1-4
        relationship: complements
        confidence: 0.72
        rationale: >
          The data protection policies required by dpd-1 complement IEC
          62443 Security Policy and Procedures (iec-2-1-4), which mandates
          documented security policies including access control and data
          handling. Both require organizational controls for data
          protection, though dpd-1 focuses on personal data rights while
          iec-2-1-4 focuses on operational technology security governance.

  - source_control: dpd-2
    target_controls:
      - id: iec-3-3-fr6
        relationship: complements
        confidence: 0.73
        rationale: >
          ETSI dpd-2 (Transparency of Personal Data Processing) complements
          IEC 62443 FR6 (Timely Response to Events), specifically the audit
          logging requirements (SR-7.6). Both require transparency about
          what data is processed and how. dpd-2 focuses on communicating
          data practices to consumers, while FR6 focuses on generating and
          storing audit records of security-relevant events for
          organizational review.
      - id: iec-2-1-4
        relationship: complements
        confidence: 0.70
        rationale: >
          The transparency and data minimization requirements in dpd-2
          complement IEC 62443 Security Policy and Procedures (iec-2-1-4),
          which requires documented policies governing data handling.
          Both mandate clear documentation of what data is collected and
          processed, though from different perspectives: consumer
          transparency versus organizational governance.

  - source_control: res-1
    target_controls:
      - id: iec-3-3-fr7
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          ETSI res-1 (Make Systems Resilient to Outages) is equivalent to
          IEC 62443 FR7 (Resource Availability) in the domain of system
          resilience and graceful degradation. Both require that systems
          maintain essential functionality during network outages, recover
          to a known good state after power loss, and implement controlled
          reconnection to prevent infrastructure overload. The core
          availability and resilience requirements are functionally
          identical.
      - id: iec-2-1-3
        relationship: complements
        confidence: 0.72
        rationale: >
          The network resilience requirements in res-1 complement IEC
          62443 System Security Architecture (iec-2-1-3), which mandates
          defense-in-depth and redundant security controls. Both address
          maintaining system functionality under degraded conditions,
          though iec-2-1-3 focuses on architectural design while res-1
          focuses on runtime behavior.

  - source_control: tel-1
    target_controls:
      - id: iec-3-3-fr6
        relationship: intersects-with
        confidence: 0.86
        rationale: >
          ETSI tel-1 (Examine System Telemetry Data) maps to IEC 62443
          FR6 (Timely Response to Events), which requires generating,
          storing, and analyzing audit logs of security-relevant events.
          Both mandate monitoring system telemetry for security anomalies
          and responding to detected threats. FR6 is more prescriptive
          about event classification and escalation procedures, while
          tel-1 focuses on fleet-level anomaly detection in IoT
          telemetry data.
      - id: iec-2-1-1
        relationship: complements
        confidence: 0.70
        rationale: >
          The security monitoring requirement in tel-1 complements IEC
          62443 Security Management System (iec-2-1-1), which includes
          continuous monitoring and key performance indicators as part
          of the CSMS. Both require ongoing security surveillance, but
          iec-2-1-1 addresses organizational management while tel-1
          focuses on technical telemetry analysis.

  - source_control: del-1
    target_controls:
      - id: iec-3-3-fr4
        relationship: complements
        confidence: 0.75
        rationale: >
          ETSI del-1 (Make It Easy for Users to Delete User Data)
          complements IEC 62443 FR4 (Data Confidentiality), specifically
          the secure data handling aspects (SR-4.3). Both address the
          protection of sensitive data, but del-1 focuses on data
          erasure and portability rights while FR4 focuses on preventing
          unauthorized disclosure during the data lifecycle.
      - id: iec-2-1-4
        relationship: complements
        confidence: 0.70
        rationale: >
          The data deletion requirements in del-1 complement IEC 62443
          Security Policy and Procedures (iec-2-1-4), which mandates
          policies for data handling throughout the IACS lifecycle
          including decommissioning. Both address end-of-life data
          management, though del-1 is consumer-facing while iec-2-1-4
          is operationally focused.

  - source_control: mnt-1
    target_controls:
      - id: iec-4-1-3
        relationship: intersects-with
        confidence: 0.84
        rationale: >
          ETSI mnt-1 (Make Installation and Maintenance Easy) maps to IEC
          62443 Secure by Design (iec-4-1-3), which mandates secure
          default configurations and least-privilege defaults so products
          ship in a hardened state. Both require that out-of-the-box
          settings are secure and that users must actively choose to
          reduce security. mnt-1 adds usability requirements for
          consumer setup flows not present in iec-4-1-3.
      - id: iec-2-1-4
        relationship: complements
        confidence: 0.73
        rationale: >
          The secure configuration guidance in mnt-1 complements IEC
          62443 Security Policy and Procedures (iec-2-1-4), which
          includes policies for configuration management and secure
          deployment. Both address ensuring systems are securely
          configured, with mnt-1 focusing on consumer usability and
          iec-2-1-4 on organizational policy enforcement.
      - id: iec-3-3-fr7
        relationship: complements
        confidence: 0.70
        rationale: >
          mnt-1 secure-by-default requirements complement IEC 62443 FR7
          (Resource Availability), specifically SR-7.6 regarding
          documentation and configuration guidance. Both aim to reduce
          misconfiguration risk that could impact system security and
          availability.

  - source_control: inp-1
    target_controls:
      - id: iec-3-3-fr3
        relationship: intersects-with
        confidence: 0.87
        rationale: >
          ETSI inp-1 (Validate Input Data) maps to IEC 62443 FR3 (System
          Integrity), specifically SR-3.5 (input validation) and SR-3.8
          (session integrity). Both require validation of all data inputs
          across user interfaces, APIs, and network communications to
          prevent injection attacks, buffer overflows, and data corruption.
          FR3 extends to industrial protocol-specific integrity
          verification, while inp-1 covers IoT-specific input channels.
      - id: iec-4-2-2
        relationship: complements
        confidence: 0.78
        rationale: >
          The input validation requirement in inp-1 complements IEC 62443
          Component Security Testing (iec-4-2-2), which mandates fuzz
          testing of all protocol parsers and input handlers. inp-1
          defines the requirement for input validation, while iec-4-2-2
          defines the testing regime to verify that validation is
          correctly implemented.
      - id: iec-4-1-1
        relationship: complements
        confidence: 0.72
        rationale: >
          inp-1 complements the IEC 62443 Secure Product Development
          Lifecycle (iec-4-1-1), which includes secure coding standards
          and security verification as development lifecycle requirements.
          Input validation is a core secure coding practice that the
          development lifecycle must enforce.
