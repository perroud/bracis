id: iso-27018_to_gdpr
title: "ISO/IEC 27018:2019 to GDPR Control Mapping"
source_framework: iso-27018
target_framework: gdpr
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic

mappings:
  - source_control: pii-a.1
    target_controls:
      - id: art-6
        relationship: implements
        confidence: 0.88
        rationale: >
          ISO 27018 pii-a.1 (Consent and choice for PII processing in the cloud)
          requires cloud processors to facilitate the exercise of PII principals'
          rights related to consent and prohibits processing PII independently of
          controller instructions. GDPR Art. 6 defines the six legal bases for
          processing, with consent (Art. 6.1.a) being the primary basis that
          pii-a.1 operationally supports. The prohibition on marketing use without
          express consent directly enforces Art. 6 consent requirements at the
          processor level.
      - id: art-28
        relationship: complements
        confidence: 0.85
        rationale: >
          pii-a.1 mandates that the cloud processor shall not process PII for any
          purpose independent of the controller's instructions, directly implementing
          GDPR Art. 28.3(a) which requires processors to process personal data only
          on documented instructions from the controller. The consent-as-not-a-
          condition-for-service requirement operationalizes the processor's obligation
          to act within the controller's mandate.
      - id: art-5
        relationship: complements
        confidence: 0.80
        rationale: >
          The consent and choice requirements in pii-a.1 support GDPR Art. 5.1(a)
          (lawfulness, fairness, and transparency) by ensuring PII is processed only
          with proper consent basis and that marketing use requires separate express
          consent that is not bundled with service provision.

  - source_control: pii-a.2
    target_controls:
      - id: art-15
        relationship: implements
        confidence: 0.87
        rationale: >
          ISO 27018 pii-a.2 (Obligation to cooperate regarding PII principals'
          rights) requires the processor to provide tools for managing access,
          rectification, erasure, and restriction rights. GDPR Art. 15 (Right of
          access) establishes the data subject's right to obtain confirmation of
          processing and access to their personal data. pii-a.2 creates the
          processor-side infrastructure enabling controllers to fulfill Art. 15
          obligations.
      - id: art-17
        relationship: implements
        confidence: 0.85
        rationale: >
          pii-a.2 explicitly requires tools for managing the right to erase PII,
          directly supporting GDPR Art. 17 (Right to erasure). The processor's
          obligation to provide self-service deletion capabilities across all
          storage systems enables the controller to fulfill erasure requests
          within the required timeframes.
      - id: art-28
        relationship: complements
        confidence: 0.85
        rationale: >
          pii-a.2's requirement that the processor not respond directly to PII
          principal requests (unless authorized) and instead forward them to the
          controller implements GDPR Art. 28.3(e), which requires the processor
          to assist the controller in ensuring compliance with data subject rights
          obligations (Articles 15-22).

  - source_control: pii-b.1
    target_controls:
      - id: art-5
        relationship: implements
        confidence: 0.90
        rationale: >
          ISO 27018 pii-b.1 (Purpose limitation for cloud PII processing) directly
          implements GDPR Art. 5.1(b) (purpose limitation principle). Both require
          that personal data be collected for specified, explicit, and legitimate
          purposes and not further processed in an incompatible manner. pii-b.1
          operationalizes this at the processor level by requiring contractual
          documentation of purposes, nature, duration, PII types, and categories
          of PII principals.
      - id: art-28
        relationship: complements
        confidence: 0.87
        rationale: >
          pii-b.1 requires that processing be limited to documented customer
          instructions and contractual terms, directly implementing GDPR Art. 28.3
          which mandates that the processing contract specify subject-matter,
          duration, nature, purpose, data types, and data subject categories. The
          requirement for contractual amendments before processing changes aligns
          with Art. 28's written authorization requirements.

  - source_control: pii-b.2
    target_controls:
      - id: art-28
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          ISO 27018 pii-b.2 (Contractual specification of processing purposes)
          is nearly equivalent to GDPR Art. 28.3 and Art. 28.9. Both require that
          the controller-processor contract specify subject-matter, duration,
          nature, purpose, data types, categories of data subjects, and rights and
          obligations. Both also require the processor to demonstrate compliance
          and allow for and contribute to audits. pii-b.2 is the ISO 27018
          implementation of the GDPR Art. 28 contractual requirements.
      - id: art-5
        relationship: complements
        confidence: 0.80
        rationale: >
          pii-b.2 supports the GDPR Art. 5.2 accountability principle by requiring
          the processor to provide sufficient information to demonstrate compliance
          and to allow for audits, enabling the controller to fulfill its
          accountability obligations.

  - source_control: pii-c.1
    target_controls:
      - id: art-5
        relationship: implements
        confidence: 0.90
        rationale: >
          ISO 27018 pii-c.1 (Data minimization in cloud PII processing) directly
          implements GDPR Art. 5.1(c) (data minimisation principle). Both require
          that processing be limited to what is adequate, relevant, and not
          excessive (ISO 27018) / limited to what is necessary (GDPR) in relation
          to the stated purposes. pii-c.1 extends this to include the processor's
          obligation to manage incidental PII in temporary files and by-products.
      - id: art-25
        relationship: implements
        confidence: 0.85
        rationale: >
          pii-c.1's requirement that cloud service design should minimize PII
          processing directly supports GDPR Art. 25 (Data protection by design
          and by default), which mandates implementing data minimisation as a
          design principle. The obligation to handle temporary files and by-products
          containing PII addresses the "by default" aspect of Art. 25.2.

  - source_control: pii-c.2
    target_controls:
      - id: art-5
        relationship: implements
        confidence: 0.87
        rationale: >
          ISO 27018 pii-c.2 (Secure erasure of temporary PII) supports GDPR
          Art. 5.1(e) (storage limitation principle) by requiring that temporary
          files containing PII be erased within documented periods. The storage
          limitation principle requires that personal data be kept no longer than
          necessary, and pii-c.2 operationalizes this for the specific category
          of incidental PII copies in logs, debug outputs, staging areas, and
          transaction logs.
      - id: art-17
        relationship: complements
        confidence: 0.82
        rationale: >
          pii-c.2's requirement for timely erasure of temporary PII across all
          system layers (logs, caches, debug outputs, staging areas) supports
          GDPR Art. 17 (Right to erasure) by ensuring that incidental PII copies
          do not persist indefinitely, which would undermine erasure requests
          fulfilled against primary storage.

  - source_control: pii-d.1
    target_controls:
      - id: art-5
        relationship: implements
        confidence: 0.90
        rationale: >
          ISO 27018 pii-d.1 (Use limitation for PII in public cloud) directly
          implements GDPR Art. 5.1(b) (purpose limitation) at the operational
          level. While Art. 5.1(b) establishes the principle, pii-d.1 enforces
          it by prohibiting the processor from using PII for its own analytics,
          data mining, profiling, direct marketing, or service improvement unless
          specifically authorized. This is the operational enforcement of the
          GDPR purpose limitation principle.
      - id: art-28
        relationship: implements
        confidence: 0.88
        rationale: >
          pii-d.1 directly implements GDPR Art. 28.3(a) (processing only on
          documented instructions) and Art. 29 (processing under the authority
          of the controller or processor). The requirement that processor
          personnel be bound by confidentiality obligations aligns with
          Art. 28.3(b)'s confidentiality commitment requirement.
      - id: art-32
        relationship: complements
        confidence: 0.78
        rationale: >
          pii-d.1's access controls, confidentiality obligations, and data loss
          prevention measures support GDPR Art. 32 (Security of processing) by
          implementing technical and organizational measures to ensure PII is
          accessible only to authorized personnel, contributing to the
          confidentiality aspect of Art. 32.1(b).

  - source_control: pii-d.2
    target_controls:
      - id: art-5
        relationship: implements
        confidence: 0.90
        rationale: >
          ISO 27018 pii-d.2 (Retention limitation and PII disposal) directly
          implements GDPR Art. 5.1(e) (storage limitation principle). Both
          require that personal data not be retained longer than necessary. pii-d.2
          operationalizes this with specific mechanisms: a retrieval window after
          contract termination, secure deletion of all copies including backups,
          and documentation of any legally required retention.
      - id: art-17
        relationship: implements
        confidence: 0.87
        rationale: >
          pii-d.2 supports GDPR Art. 17 (Right to erasure) by requiring secure
          deletion or return of all PII upon contract termination, covering all
          copies including backups. The requirement for verifiable evidence of
          disposal aligns with the controller's obligation under Art. 17 to
          demonstrate that erasure has been completed.
      - id: art-28
        relationship: complements
        confidence: 0.85
        rationale: >
          pii-d.2 directly implements GDPR Art. 28.3(g), which requires the
          processor to delete or return all personal data after the end of service
          provision, at the choice of the controller. The retrieval window and
          disposal certification requirements are operational implementations
          of this GDPR obligation.

  - source_control: pii-d.3
    target_controls:
      - id: art-28
        relationship: implements
        confidence: 0.90
        rationale: >
          ISO 27018 pii-d.3 (Disclosure limitation and sub-processor management)
          directly implements GDPR Art. 28.2 (sub-processor authorization) and
          Art. 28.4 (flow-down of obligations to sub-processors). Both require
          prior authorization before engaging sub-processors and impose the same
          data protection obligations on sub-processors as those binding the
          primary processor.
      - id: art-44
        relationship: complements
        confidence: 0.80
        rationale: >
          pii-d.3's restrictions on disclosing PII to third parties and its
          transparency requirements for government access requests support GDPR
          Art. 44's general principle for international transfers, ensuring that
          PII is not disclosed or transferred without proper authorization and
          safeguards.

  - source_control: pii-e.1
    target_controls:
      - id: art-28
        relationship: implements
        confidence: 0.90
        rationale: >
          ISO 27018 pii-e.1 (Transparency of PII processing and sub-processor
          disclosure) directly implements GDPR Art. 28.2, which requires the
          processor to inform the controller of intended sub-processor changes
          and give the controller the opportunity to object. pii-e.1 extends
          this with requirements for disclosing sub-processor identity, location,
          and processing activities.
      - id: art-44
        relationship: complements
        confidence: 0.82
        rationale: >
          pii-e.1's requirement to disclose the countries where PII may be
          processed supports GDPR Art. 44 (General principle for transfers) by
          enabling the controller to assess whether cross-border transfers comply
          with Chapter V transfer restrictions and whether adequate safeguards
          are in place for each processing location.
      - id: art-30
        relationship: complements
        confidence: 0.78
        rationale: >
          pii-e.1's transparency requirements regarding processing activities,
          sub-processor identities, and geographic locations support GDPR Art. 30
          (Records of processing activities) by providing the controller with
          information needed to maintain accurate records of processing activities,
          including recipients and transfers to third countries.

  - source_control: pii-e.2
    target_controls:
      - id: art-44
        relationship: complements
        confidence: 0.80
        rationale: >
          ISO 27018 pii-e.2 (Notification of government access and law
          enforcement requests) supports GDPR Art. 44 and related transfer
          provisions by requiring transparency about government access to
          cloud-stored PII, which is particularly relevant for cross-border
          scenarios where government demands may originate from jurisdictions
          with insufficient data protection. The transparency report requirement
          helps controllers assess transfer risks.
      - id: art-28
        relationship: complements
        confidence: 0.78
        rationale: >
          pii-e.2 supports GDPR Art. 28.3(a) by establishing that the processor
          must notify the controller of legally binding disclosure requests rather
          than unilaterally complying, maintaining the controller's oversight of
          processing activities. The requirement to challenge overbroad requests
          aligns with the processor's obligation to process only on documented
          controller instructions.
      - id: art-5
        relationship: complements
        confidence: 0.75
        rationale: >
          pii-e.2's government transparency requirements complement GDPR Art.
          5.1(a) (lawfulness, fairness, and transparency) by ensuring that
          government access to personal data is conducted transparently, with
          controller notification and published transparency reports.

  - source_control: pii-f.1
    target_controls:
      - id: art-15
        relationship: implements
        confidence: 0.90
        rationale: >
          ISO 27018 pii-f.1 (PII principal access and rectification capabilities)
          directly supports GDPR Art. 15 (Right of access) by requiring the
          processor to provide comprehensive tools, APIs, and procedures that
          enable the controller to fulfill data subject access requests. The
          requirement for structured, machine-readable format aligns with the
          Art. 15.3 obligation to provide a copy of the personal data.
      - id: art-17
        relationship: implements
        confidence: 0.87
        rationale: >
          pii-f.1 explicitly requires tools for PII erasure with cascade to all
          derived data, directly supporting GDPR Art. 17 (Right to erasure).
          The processor's obligation to provide deletion capabilities across all
          storage systems (databases, caches, backups, logs) enables the
          controller to fulfill comprehensive erasure requests.
      - id: art-28
        relationship: complements
        confidence: 0.83
        rationale: >
          pii-f.1 implements GDPR Art. 28.3(e), which requires the processor to
          assist the controller in responding to data subject rights requests
          (Articles 15-22). The requirement for SLA-backed response times and
          self-service APIs operationalizes the processor's assistance obligation.

  - source_control: pii-f.2
    target_controls:
      - id: art-5
        relationship: complements
        confidence: 0.78
        rationale: >
          ISO 27018 pii-f.2 (PII portability and interoperability) supports
          GDPR data portability rights. While Art. 20 (Right to data portability)
          is not yet defined as a control in this project, pii-f.2's requirements
          for structured, machine-readable formats and processor-to-processor
          transfer capabilities directly implement the technical infrastructure
          needed for portability. The open format requirement combats vendor
          lock-in that would impede data subject rights.
      - id: art-28
        relationship: complements
        confidence: 0.80
        rationale: >
          pii-f.2 supports GDPR Art. 28.3(g) by requiring the processor to
          provide PII retrieval capabilities in standard formats upon contract
          termination, enabling the controller to retrieve all personal data
          before disposal. The processor-to-processor transfer capability
          facilitates controller migration between processors.

  - source_control: pii-g.1
    target_controls:
      - id: art-33
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          ISO 27018 pii-g.1 (Breach notification for PII incidents) is
          functionally equivalent to GDPR Art. 33 (Notification of a personal
          data breach to the supervisory authority). Both require notification
          without undue delay upon becoming aware of a security breach. The
          notification content requirements are nearly identical: nature of breach,
          approximate number of affected principals/data subjects, categories of
          PII/personal data, likely consequences, and measures taken or proposed.
          pii-g.1 focuses on processor-to-controller notification (as required
          by Art. 33.2), while Art. 33 also covers controller-to-authority
          notification.
      - id: art-5
        relationship: complements
        confidence: 0.78
        rationale: >
          pii-g.1 supports GDPR Art. 5.1(f) (integrity and confidentiality)
          by establishing breach detection and response capabilities that protect
          against unauthorized disclosure of or access to personal data, and
          supports Art. 5.2 (accountability) by requiring documented cooperation
          in breach investigation and remediation.

  - source_control: pii-g.2
    target_controls:
      - id: art-5
        relationship: implements
        confidence: 0.90
        rationale: >
          ISO 27018 pii-g.2 (Accountability and compliance evidence) directly
          implements GDPR Art. 5.2 (accountability principle). Both require the
          ability to demonstrate compliance through records, evidence, and audit
          support. pii-g.2 operationalizes the accountability principle at the
          processor level with specific requirements for compliance evidence
          maintenance, audit rights, and third-party assessments.
      - id: art-28
        relationship: implements
        confidence: 0.88
        rationale: >
          pii-g.2 directly implements GDPR Art. 28.3(h), which requires the
          processor to make available all information necessary to demonstrate
          compliance and to allow for and contribute to audits conducted by or
          on behalf of the controller. The third-party assessment recommendation
          (ISO 27001/27018, SOC 2) provides a scalable mechanism for meeting
          Art. 28's audit requirements.
      - id: art-30
        relationship: complements
        confidence: 0.80
        rationale: >
          pii-g.2's requirement for maintaining comprehensive records of PII
          processing activities supports GDPR Art. 30 (Records of processing
          activities), which requires processors to maintain records of all
          categories of processing activities carried out on behalf of
          controllers.

  - source_control: pii-h.1
    target_controls:
      - id: art-32
        relationship: implements
        confidence: 0.92
        rationale: >
          ISO 27018 pii-h.1 (Encryption of PII in transit and at rest) directly
          implements GDPR Art. 32.1(a), which lists pseudonymisation and
          encryption of personal data as appropriate technical measures to ensure
          security. pii-h.1 specifies strong cryptographic protocols for transit,
          encryption for storage, and documented key management with customer key
          control options, providing detailed implementation guidance for Art. 32's
          encryption requirements.
      - id: art-25
        relationship: complements
        confidence: 0.82
        rationale: >
          pii-h.1's encryption-by-default approach supports GDPR Art. 25 (Data
          protection by design and by default), which identifies pseudonymisation
          as an example of a technical measure implementing data protection
          principles. Encryption at rest and in transit is a fundamental
          by-design measure for protecting personal data.

  - source_control: pii-h.2
    target_controls:
      - id: art-32
        relationship: implements
        confidence: 0.90
        rationale: >
          ISO 27018 pii-h.2 (Access control and authentication for PII systems)
          directly implements GDPR Art. 32.1(b) (ongoing confidentiality,
          integrity, availability, and resilience of processing systems). The
          least-privilege access control, multi-factor authentication, periodic
          access reviews, and comprehensive access logging are core technical
          measures for ensuring the confidentiality and integrity components
          of Art. 32.
      - id: art-5
        relationship: complements
        confidence: 0.82
        rationale: >
          pii-h.2 supports GDPR Art. 5.1(f) (integrity and confidentiality)
          by implementing access controls that protect personal data against
          unauthorized or unlawful processing. The access logging requirement
          also supports Art. 5.2 (accountability) by creating an auditable
          trail of who accessed what personal data and when.
      - id: art-28
        relationship: complements
        confidence: 0.80
        rationale: >
          pii-h.2 supports GDPR Art. 28.3(b), which requires the processor to
          ensure that authorized personnel have committed to confidentiality.
          The combination of RBAC, MFA, JIT access, and access logging
          operationalizes the processor's obligation to restrict and monitor
          personal data access by its personnel.

  - source_control: pii-ext.1
    target_controls:
      - id: art-44
        relationship: implements
        confidence: 0.90
        rationale: >
          ISO 27018 pii-ext.1 (Geographic location and cross-border PII
          transfer) directly implements GDPR Art. 44 (General principle for
          transfers) by requiring the processor to specify processing locations,
          obtain prior agreement for cross-border transfers, and ensure adequate
          safeguards including standard contractual clauses, binding corporate
          rules, or adequacy decisions. Both require that the level of protection
          is not undermined by transfers.
      - id: art-28
        relationship: complements
        confidence: 0.82
        rationale: >
          pii-ext.1 supports GDPR Art. 28 by requiring geographic transparency
          as part of the controller-processor relationship, enabling the
          controller to fulfill its transfer compliance obligations. The
          customer's ability to specify geographic restrictions operationalizes
          the controller's authority over processing locations.
      - id: art-35
        relationship: complements
        confidence: 0.72
        rationale: >
          pii-ext.1's geographic disclosure requirements complement GDPR Art. 35
          (Data protection impact assessment) by providing the controller with
          information about processing locations needed to assess risks in DPIAs,
          particularly when processing involves transfers to jurisdictions with
          different levels of data protection.

  - source_control: pii-ext.2
    target_controls:
      - id: art-17
        relationship: implements
        confidence: 0.87
        rationale: >
          ISO 27018 pii-ext.2 (PII return, transfer and secure disposal upon
          contract termination) implements the erasure and disposal aspects of
          GDPR Art. 17 (Right to erasure) in the context of contract termination.
          The requirement for secure, verifiable disposal of all PII copies,
          including backups, caches, logs, and disaster recovery systems, ensures
          comprehensive erasure as required by Art. 17.
      - id: art-28
        relationship: implements
        confidence: 0.90
        rationale: >
          pii-ext.2 directly implements GDPR Art. 28.3(g), which requires the
          processor to delete or return all personal data after the end of
          service provision, at the choice of the controller, and to delete
          existing copies unless retention is required by law. The retrieval
          period, machine-readable format, and disposal certification are
          detailed implementations of this GDPR obligation.
      - id: art-5
        relationship: complements
        confidence: 0.80
        rationale: >
          pii-ext.2 supports GDPR Art. 5.1(e) (storage limitation) by ensuring
          PII does not persist in cloud systems after the contractual basis for
          processing has ended. The disposal certification provides evidence of
          compliance with the storage limitation principle.
