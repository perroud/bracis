id: nist-privacy_to_nist-csf
title: "NIST Privacy Framework v1.0 to NIST CSF v2.0 Control Mapping"
source_framework: nist-privacy
target_framework: nist-csf-v2
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic

mappings:
  # ============================================================
  # GV-P — Governance (Privacy)
  # ============================================================

  # GV-P.01: Governance Policies, Processes, and Procedures
  - source_control: gv-p.01
    target_controls:
      - id: gv.oc-01
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          GV-P.01 establishes organizational privacy policy reflecting risk management
          priorities, roles, and legal requirements. GV.OC-01 establishes that the
          organizational mission informs cybersecurity risk management. Both define the
          top-level governance context, but GV-P.01 is privacy-specific (data processing,
          individual rights) whereas GV.OC-01 is cybersecurity-specific (threat landscape,
          business functions). They share the governance layer of linking policy to
          organizational objectives.
      - id: gv.rm-01
        relationship: complements
        confidence: 0.78
        rationale: >
          GV-P.01 requires privacy policy to reflect risk management priorities.
          GV.RM-01 establishes the risk management strategy and objectives for
          operational risk decisions. The privacy policy mandated by GV-P.01
          operationalizes within the risk management framework defined by GV.RM-01,
          complementing the cybersecurity risk strategy with privacy-specific risk
          considerations.

  # GV-P.02: Risk Management Strategy
  - source_control: gv-p.02
    target_controls:
      - id: gv.rm-01
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          GV-P.02 establishes privacy risk management priorities and risk tolerance
          for managing privacy risk consistently with enterprise risk strategy.
          GV.RM-01 establishes risk management objectives to support operational
          risk decisions. Both address the same fundamental requirement — defining
          organizational risk appetite, tolerance, and strategy — applied to privacy
          and cybersecurity domains respectively. NIST explicitly designed these
          functions to align across both frameworks.
      - id: gv.oc-01
        relationship: complements
        confidence: 0.72
        rationale: >
          GV-P.02 requires privacy risk management to align with the overall enterprise
          risk strategy. GV.OC-01 provides the organizational context (mission,
          stakeholders, dependencies) that informs that enterprise risk strategy.
          Understanding organizational context is a prerequisite for establishing
          privacy risk priorities.

  # GV-P.03: Awareness and Training
  - source_control: gv-p.03
    target_controls:
      - id: gv.oc-01
        relationship: complements
        confidence: 0.70
        rationale: >
          GV-P.03 requires privacy awareness education and role-specific training
          for workforce and third parties. GV.OC-01 establishes that the organizational
          mission informs cybersecurity risk management. While GV.OC-01 does not directly
          address training, organizational context drives training content and prioritization.
          Privacy training complements the organizational awareness implied by understanding
          the mission and its cybersecurity implications.
      - id: gv.rm-01
        relationship: complements
        confidence: 0.71
        rationale: >
          GV-P.03 privacy training supports GV.RM-01 risk management strategy by
          ensuring personnel understand their role in managing privacy risks. Trained
          personnel are essential for executing the risk management strategy effectively.
          Without privacy awareness, risk management decisions at operational levels
          will be poorly informed.

  # GV-P.04: Monitoring and Review
  - source_control: gv-p.04
    target_controls:
      - id: de.cm-01
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          GV-P.04 establishes monitoring and review of privacy controls and privacy
          posture on an ongoing basis. DE.CM-01 requires continuous monitoring of
          networks and services for adverse events. Both mandate ongoing monitoring
          programs, but GV-P.04 targets privacy control effectiveness (encryption
          status, access controls, retention enforcement) while DE.CM-01 targets
          network-level threat detection. They share the continuous monitoring
          discipline applied to different domains.
      - id: gv.rm-01
        relationship: complements
        confidence: 0.75
        rationale: >
          GV-P.04 monitoring and review feeds findings back into the risk management
          process. GV.RM-01 defines the risk management strategy that determines what
          to monitor and how to respond to findings. Privacy monitoring results inform
          risk management decisions, and the risk strategy defines monitoring priorities.

  # ============================================================
  # ID-P — Identify (Privacy)
  # ============================================================

  # ID-P.01: Inventory and Mapping — Data Processing Inventory
  - source_control: id-p.01
    target_controls:
      - id: id.am-01
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          ID-P.01 requires inventorying systems, products, and services that process
          data. ID.AM-01 requires maintaining inventories of hardware managed by the
          organization. Both mandate comprehensive asset/system inventories with
          metadata, automated discovery, and reconciliation. ID-P.01 focuses on data
          processing context (data types, purposes, flows), while ID.AM-01 focuses on
          hardware/infrastructure context (owner, location, OS). They are the same
          discipline — asset inventory — applied with privacy and cybersecurity lenses
          respectively. NIST explicitly cross-references these functions.
      - id: gv.oc-01
        relationship: complements
        confidence: 0.73
        rationale: >
          ID-P.01 data processing inventory supports GV.OC-01 organizational context
          by providing visibility into what data the organization processes and which
          systems support that processing. Understanding data processing is part of
          understanding the organizational mission and its dependencies.

  # ID-P.02: Business Environment — Privacy Values and Objectives
  - source_control: id-p.02
    target_controls:
      - id: gv.oc-01
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ID-P.02 requires identifying and communicating the organization's roles in
          the data processing ecosystem (controller, processor, sub-processor).
          GV.OC-01 requires understanding the organizational mission and stakeholder
          dependencies. Both address organizational positioning — ID-P.02 within the
          data processing ecosystem and GV.OC-01 within the broader business and
          cybersecurity context. Understanding data processing roles is a critical
          dimension of organizational context.
      - id: gv.rm-01
        relationship: complements
        confidence: 0.72
        rationale: >
          ID-P.02 identification of data processing ecosystem roles supports GV.RM-01
          risk management strategy by defining the scope and boundaries of privacy risk
          ownership. Whether the organization acts as controller or processor determines
          which risks it must manage and which are transferred to ecosystem partners.

  # ID-P.03: Risk Assessment — Privacy Risk Identification
  - source_control: id-p.03
    target_controls:
      - id: id.ra-01
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          ID-P.03 requires identifying privacy risks including likelihood and impact
          of problematic data actions on individuals. ID.RA-01 requires identifying,
          validating, and recording vulnerabilities. Both are risk identification
          activities using structured assessment methodologies. ID-P.03 evaluates
          inherent risks of data processing (even when functioning as intended),
          while ID.RA-01 evaluates technical vulnerabilities. NIST designed these
          as parallel risk assessment functions across the Privacy Framework and CSF.
      - id: gv.rm-01
        relationship: complements
        confidence: 0.78
        rationale: >
          ID-P.03 privacy risk identification feeds directly into GV.RM-01 risk
          management strategy. The risks identified through privacy impact assessments
          and DPIAs are inputs to the enterprise risk management process, informing
          risk tolerance decisions and resource allocation.

  # ID-P.04: Data Processing Ecosystem Risk Management
  - source_control: id-p.04
    target_controls:
      - id: gv.rm-01
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          ID-P.04 establishes priorities, constraints, and risk tolerances for managing
          privacy risk with third parties in the data processing ecosystem. GV.RM-01
          establishes risk management objectives for operational risk decisions. Both
          address risk management strategy, with ID-P.04 extending it to the third-party
          data processing supply chain — cloud providers, SaaS vendors, payment
          processors — requiring due diligence, data processing agreements, and
          ongoing monitoring.
      - id: id.am-01
        relationship: complements
        confidence: 0.74
        rationale: >
          ID-P.04 third-party data processing ecosystem management complements
          ID.AM-01 asset inventory by extending inventory requirements to include
          third-party integrations, sub-processors, and their data processing scope.
          A complete asset inventory must include external data processing
          relationships.
      - id: id.ra-01
        relationship: complements
        confidence: 0.75
        rationale: >
          ID-P.04 ecosystem risk management supports ID.RA-01 vulnerability
          identification by extending risk assessment to third-party components.
          Third-party privacy practices represent a vulnerability surface that
          must be assessed, monitored, and managed.

  # ============================================================
  # CT-P — Control (Privacy)
  # ============================================================

  # CT-P.01: Data Processing Policies, Processes, and Procedures
  - source_control: ct-p.01
    target_controls:
      - id: gv.oc-01
        relationship: complements
        confidence: 0.73
        rationale: >
          CT-P.01 maintains policies for managing data processing consistent with
          the organization's risk strategy. GV.OC-01 provides the organizational
          context that shapes those policies. Data processing policies operationalize
          the organizational mission requirements into enforceable privacy controls
          governing purpose limitation, data minimization, and storage limitation.
      - id: gv.rm-01
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CT-P.01 requires data processing policies consistent with the organization's
          risk strategy. GV.RM-01 defines that risk management strategy. CT-P.01
          translates risk strategy into operational data processing controls —
          authorized purposes, approval workflows, handling procedures — that
          implement the risk tolerance decisions made under GV.RM-01.
      - id: pr.ds-01
        relationship: complements
        confidence: 0.76
        rationale: >
          CT-P.01 data processing policies define purpose limitation, scope, and
          data handling procedures. PR.DS-01 protects data-at-rest confidentiality,
          integrity, and availability. CT-P.01 policies govern WHAT data processing
          is permitted, while PR.DS-01 controls HOW that data is protected during
          storage. They complement each other — processing policies without security
          controls are unenforceable, and security controls without processing
          policies lack purpose-driven context.

  # CT-P.02: Data Processing Management — Data Minimization
  - source_control: ct-p.02
    target_controls:
      - id: pr.ds-01
        relationship: intersects-with
        confidence: 0.81
        rationale: >
          CT-P.02 requires managing data consistent with risk strategy including
          limiting collection, use, and sharing to what is necessary. PR.DS-01
          protects confidentiality, integrity, and availability of data-at-rest.
          Data minimization (CT-P.02) directly reduces the attack surface and
          exposure that PR.DS-01 must protect. Less data stored means less data
          to encrypt, access-control, and monitor. Both address data management
          but from different angles — privacy (minimization) and security
          (protection).
      - id: pr.aa-01
        relationship: complements
        confidence: 0.75
        rationale: >
          CT-P.02 data minimization complements PR.AA-01 identity and access control
          by reducing the scope of data that access controls must govern. Minimizing
          data collection means fewer data access paths to manage. Both contribute
          to reducing privacy risk — CT-P.02 by limiting data volume and PR.AA-01
          by limiting who can access it.
      - id: id.am-01
        relationship: complements
        confidence: 0.70
        rationale: >
          CT-P.02 data minimization requires understanding what data exists to
          determine what can be reduced. ID.AM-01 asset inventory provides the
          foundational visibility into data stores and processing systems needed
          to identify minimization opportunities.

  # CT-P.03: Disassociated Processing
  - source_control: ct-p.03
    target_controls:
      - id: pr.ds-01
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          CT-P.03 requires disassociated processing — anonymization, pseudonymization,
          differential privacy — to sever links between data and identifiable
          individuals. PR.DS-01 protects data-at-rest confidentiality. Disassociation
          techniques are a form of data protection that reduces the impact of data
          breaches by rendering exfiltrated data less useful for re-identification.
          Both protect data but CT-P.03 targets privacy through identity separation
          while PR.DS-01 targets security through encryption and access control.
      - id: pr.aa-01
        relationship: complements
        confidence: 0.72
        rationale: >
          CT-P.03 disassociated processing supports PR.AA-01 access control by
          reducing the sensitivity of data accessible to authorized users. When data
          is pseudonymized, even authorized users accessing it for analytics cannot
          identify individuals without separate re-identification keys, adding a
          layer of privacy protection beyond access control.

  # CT-P.04: Data Retention and Disposal
  - source_control: ct-p.04
    target_controls:
      - id: pr.ds-01
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          CT-P.04 requires data destruction according to policy with established
          retention schedules and secure disposal. PR.DS-01 protects data-at-rest
          including data lifecycle management. Retention and disposal (CT-P.04) is
          the terminal phase of data protection (PR.DS-01) — data that no longer
          needs to exist must be securely destroyed to eliminate residual risk.
          Both address the data-at-rest lifecycle from different starting points.
      - id: id.am-01
        relationship: complements
        confidence: 0.71
        rationale: >
          CT-P.04 retention and disposal requires knowing where data resides to
          enforce deletion. ID.AM-01 asset inventory provides the registry of data
          stores needed to ensure retention policies reach all storage locations
          including backups, replicas, caches, and third-party systems.

  # ============================================================
  # CM-P — Communicate (Privacy)
  # ============================================================

  # CM-P.01: Communication Policies, Processes, and Procedures
  - source_control: cm-p.01
    target_controls:
      - id: gv.oc-01
        relationship: complements
        confidence: 0.74
        rationale: >
          CM-P.01 maintains policies to increase transparency of data processing
          practices and associated privacy risks. GV.OC-01 requires understanding
          and communicating organizational mission and stakeholder expectations.
          Privacy transparency (CM-P.01) complements organizational context (GV.OC-01)
          by extending communication to include data processing practices directed
          at individuals, regulators, and business partners.
      - id: gv.rm-01
        relationship: complements
        confidence: 0.70
        rationale: >
          CM-P.01 transparency policies support GV.RM-01 risk management strategy
          by ensuring that privacy risks are communicated to stakeholders who need
          to understand them. Transparent communication about data processing
          practices is part of managing privacy risk — individuals and partners
          who understand processing can make informed decisions.

  # CM-P.02: Data Processing Awareness — Privacy Notices
  - source_control: cm-p.02
    target_controls:
      - id: gv.oc-01
        relationship: complements
        confidence: 0.71
        rationale: >
          CM-P.02 requires providing individuals and organizations with accessible,
          understandable notice about how data is processed. GV.OC-01 addresses
          understanding stakeholder expectations. Privacy notices (CM-P.02) serve
          the stakeholder communication dimension of organizational context by
          informing data subjects about processing purposes, legal basis, sharing
          practices, and their rights.
      - id: pr.ds-01
        relationship: complements
        confidence: 0.70
        rationale: >
          CM-P.02 privacy notices describe data handling practices including
          retention periods, sharing, and security measures. PR.DS-01 implements
          the technical protections described in those notices. Notices create
          accountability — what the organization promises about data protection
          must be technically enforced.

  # CM-P.03: Consent Management and Individual Participation
  - source_control: cm-p.03
    target_controls:
      - id: pr.aa-01
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CM-P.03 implements mechanisms for consent, data access, correction, and
          deletion requests. PR.AA-01 manages identities, credentials, and access
          control. Both control who can access what data and under what conditions.
          CM-P.03 extends access control to data subjects themselves — enabling
          individuals to access, correct, and delete their own data — while PR.AA-01
          manages organizational access. Identity verification for data subject
          requests (CM-P.03) uses the same identity infrastructure governed by
          PR.AA-01.
      - id: pr.ds-01
        relationship: complements
        confidence: 0.74
        rationale: >
          CM-P.03 consent management and individual participation support PR.DS-01
          data security by establishing consent-based access controls. Data processing
          only occurs with valid consent, and individuals can withdraw consent to
          trigger data deletion — both of which reduce the volume of data-at-rest
          that PR.DS-01 must protect.
      - id: id.am-01
        relationship: complements
        confidence: 0.72
        rationale: >
          CM-P.03 data subject requests (access, correction, deletion) require
          knowing where an individual's data resides across all systems. ID.AM-01
          asset inventory provides the foundational data map needed to fulfill these
          requests completely — locating data across primary stores, backups,
          replicas, and third-party systems.

  # CM-P.04: Privacy Breach Communication
  - source_control: cm-p.04
    target_controls:
      - id: rs.ma-01
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          CM-P.04 maintains policies for communicating privacy breaches to affected
          individuals and stakeholders. RS.MA-01 executes the incident response plan
          in coordination with relevant third parties. Both address incident/breach
          response execution including stakeholder notification, coordination with
          external parties (regulators, affected individuals, CERT teams), and
          documented response procedures. CM-P.04 is the privacy-specific dimension
          of RS.MA-01 — breach notification is a core component of incident response.
          NIST explicitly cross-references these functions.
      - id: de.ae-01
        relationship: complements
        confidence: 0.77
        rationale: >
          CM-P.04 breach communication requires understanding the scope and impact
          of a privacy breach (what data, how many individuals, likely consequences).
          DE.AE-01 provides the adverse event analysis capability that determines
          breach scope and impact. Effective breach notification depends on the
          analysis quality — you cannot communicate what you do not understand.
      - id: rc.rp-01
        relationship: complements
        confidence: 0.73
        rationale: >
          CM-P.04 breach communication supports RC.RP-01 recovery plan execution
          by informing affected parties and enabling them to take protective actions
          (credential changes, fraud monitoring). Breach notification is both a
          legal obligation and a recovery enabler — individuals who know their data
          was compromised can mitigate personal harm.

  # ============================================================
  # PR-P — Protect (Privacy)
  # ============================================================

  # PR-P.01: Data Protection Policies, Processes, and Procedures
  - source_control: pr-p.01
    target_controls:
      - id: pr.ds-01
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          PR-P.01 maintains security and privacy policies to manage data protection
          including encryption, access control, data transfer security, and logging.
          PR.DS-01 protects confidentiality, integrity, and availability of
          data-at-rest. Both define the data protection control framework. PR-P.01
          provides the policy layer and PR.DS-01 the technical implementation — they
          are tightly coupled as policy and enforcement of the same data protection
          objective. NIST designed PR-P as the privacy extension of the CSF Protect
          function.
      - id: pr.ps-01
        relationship: intersects-with
        confidence: 0.84
        rationale: >
          PR-P.01 data protection policies include secure configuration, system
          maintenance, and technical security solutions. PR.PS-01 manages platform
          security consistent with risk strategy including hardened baselines,
          patching, and configuration monitoring. PR-P.01 policies govern the
          security posture that PR.PS-01 implements for platforms processing
          personal data.
      - id: pr.aa-01
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          PR-P.01 data protection policies include access control requirements
          and identity management standards. PR.AA-01 manages identities,
          credentials, and access control. Both address access control — PR-P.01
          establishes the privacy-informed access control policy (least privilege
          for personal data, purpose-based access) that PR.AA-01 implements
          technically.

  # PR-P.02: Identity Management, Authentication and Access Control
  - source_control: pr-p.02
    target_controls:
      - id: pr.aa-01
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          PR-P.02 requires managing access to data limited to authorized individuals,
          processes, and devices with identity and credential management. PR.AA-01
          requires managing identities and credentials for authorized users, services,
          and hardware. Both address the full identity lifecycle (provisioning,
          authentication, authorization, monitoring, deprovisioning) with MFA
          requirements and least privilege enforcement. PR-P.02 adds privacy-specific
          requirements (purpose-based access, ABAC with data sensitivity) on top of
          the same foundational identity management addressed by PR.AA-01.
      - id: pr.ds-01
        relationship: complements
        confidence: 0.76
        rationale: >
          PR-P.02 access control supports PR.DS-01 data-at-rest protection by
          ensuring only authorized entities can read, write, or delete protected
          data. Access control is a critical component of data-at-rest security —
          encryption protects against unauthorized physical access, while access
          control protects against unauthorized logical access.

  # PR-P.03: Data Security — Encryption and Integrity
  - source_control: pr-p.03
    target_controls:
      - id: pr.ds-01
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          PR-P.03 requires protecting data-at-rest, data-in-transit, and data
          integrity throughout the data lifecycle using encryption and integrity
          controls. PR.DS-01 protects confidentiality, integrity, and availability
          of data-at-rest. These controls are nearly identical in scope and
          requirements — AES-256 encryption, TLS 1.2+, integrity verification,
          key management, and DLP. PR-P.03 is the explicit privacy framework
          counterpart of PR.DS-01, applying the same data security requirements
          with emphasis on personal data protection.
      - id: pr.ps-01
        relationship: complements
        confidence: 0.76
        rationale: >
          PR-P.03 encryption and integrity controls complement PR.PS-01 platform
          security. Platform security (hardened baselines, secure configuration)
          provides the foundation on which encryption and integrity controls
          operate. Encryption is only effective if the platform hosting it is
          properly secured against configuration manipulation.

  # PR-P.04: Protective Technology — Logging and Secure Configuration
  - source_control: pr-p.04
    target_controls:
      - id: pr.ps-01
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          PR-P.04 requires managing technical security solutions for data and
          systems including secure configuration baselines, audit logging,
          intrusion detection, and system maintenance. PR.PS-01 manages platform
          hardware, software, and services consistent with risk strategy including
          hardening, patching, and configuration monitoring. Both address the
          same protective technology domain — secure system configuration and
          maintenance. PR-P.04 adds privacy-specific logging requirements (who
          accessed personal data, when, for what purpose) that extend PR.PS-01
          audit logging standards.
      - id: de.cm-01
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PR-P.04 audit logging and monitoring capabilities feed into DE.CM-01
          continuous monitoring of networks and services. The logs and monitoring
          infrastructure mandated by PR-P.04 (privacy-relevant access events,
          configuration changes) generate the telemetry that DE.CM-01 uses for
          detecting adverse events. PR-P.04 produces the data; DE.CM-01 consumes
          it for detection.
      - id: de.ae-01
        relationship: complements
        confidence: 0.75
        rationale: >
          PR-P.04 audit logging supports DE.AE-01 adverse event analysis by
          providing the log data needed to determine the impact and scope of
          security events. Privacy-aware audit logs (who accessed what personal
          data, when, and what actions were performed) are essential for assessing
          whether an adverse event constitutes a privacy breach.
      - id: pr.ds-01
        relationship: complements
        confidence: 0.78
        rationale: >
          PR-P.04 secure configuration and logging complement PR.DS-01 data-at-rest
          protection. Secure system configuration ensures the platform hosting
          protected data is hardened, and audit logging provides evidence that
          data protection controls are operating effectively.
