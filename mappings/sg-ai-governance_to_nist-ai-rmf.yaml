id: sg-ai-governance_to_nist-ai-rmf
title: "Singapore AI Governance Framework to NIST AI RMF v1.0 Control Mapping"
source_framework: sg-ai-governance
target_framework: nist-ai-rmf
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic

mappings:
  - source_control: gov-1
    target_controls:
      - id: gv-1
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          SG gov-1 (AI Governance Structure and Accountability) requires
          organizations to establish governance structures with clear roles,
          responsibilities, and reporting lines for AI deployment. NIST gv-1
          (Govern 1) similarly requires policies, processes, and practices
          for mapping, measuring, and managing AI risks to be in place and
          implemented effectively. Both mandate formal governance frameworks
          for AI, though NIST gv-1 is broader in scope, encompassing the
          entire risk management lifecycle, while SG gov-1 focuses
          specifically on organizational structure and board-level oversight.
      - id: gv-2
        relationship: intersects-with
        confidence: 0.87
        rationale: >
          SG gov-1 mandates clear accountability for AI-driven decisions,
          designation of management oversight, and established reporting
          lines. NIST gv-2 requires accountability structures ensuring
          appropriate teams and individuals are empowered, responsible, and
          trained for AI risk management. Both controls converge on
          accountability structures and role designation, though gv-2
          additionally emphasizes training and empowerment of personnel,
          while gov-1 emphasizes board-level awareness and risk reporting.
      - id: gv-4
        relationship: complements
        confidence: 0.72
        rationale: >
          SG gov-1 requires senior management to be apprised of AI use and
          attendant risks. NIST gv-4 addresses organizational culture around
          AI risk communication and documentation. gov-1's board reporting
          requirement supports the risk-aware culture that gv-4 promotes,
          though gv-4 is broader in addressing organization-wide risk
          culture rather than just top-down governance structures.

  - source_control: gov-2
    target_controls:
      - id: gv-1
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          SG gov-2 (AI Risk Management Framework) requires risk management
          measures proportionate to AI system scale, nature, and complexity,
          integrated with enterprise risk management. NIST gv-1 requires
          policies and processes for mapping, measuring, and managing AI
          risks. Both controls mandate a structured risk management approach
          for AI, and both require integration with broader organizational
          processes. The intersection is strong because both establish the
          foundational risk management framework, though NIST gv-1 also
          covers legal and regulatory compliance documentation.
      - id: mp-4
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          SG gov-2 requires identification, assessment, and prioritization
          of AI-related risks including data quality, algorithmic bias,
          security, privacy, and potential harm. NIST mp-4 (Map 4) requires
          systematic risk assessment documenting technical, societal, and
          organizational risks. Both controls address the process of
          identifying and documenting AI risks, though mp-4 focuses
          specifically on risk assessment output while gov-2 addresses the
          entire risk management lifecycle.
      - id: mp-5
        relationship: complements
        confidence: 0.78
        rationale: >
          SG gov-2 requires organizations to prioritize AI-related risks
          and implement appropriate mitigation measures. NIST mp-5 addresses
          likelihood and impact assessment for prioritizing risk management
          activities. gov-2's prioritization requirement complements mp-5's
          structured approach to risk scoring and resource allocation, with
          mp-5 providing more specific methodology for how prioritization
          should be conducted.

  - source_control: gov-3
    target_controls:
      - id: gv-3
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          SG gov-3 (AI Ethics and Values Alignment) requires adoption of
          ethics principles addressing fairness, transparency,
          explainability, accountability, safety, and human-centricity.
          NIST gv-3 prioritizes workforce diversity, equity, inclusion,
          and accessibility (DEIA) in AI risk management. Both controls
          address ethical considerations in AI, but from different angles:
          gov-3 focuses on establishing and operationalizing broad ethical
          principles, while gv-3 specifically targets workforce diversity
          and equity as enablers of ethical AI. The overlap lies in their
          shared concern for fairness and equitable outcomes.
      - id: gv-4
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          SG gov-3 requires organizations to communicate AI ethics
          principles to all relevant stakeholders and establish ethics
          review boards. NIST gv-4 requires organizational commitment to a
          culture that considers and communicates AI risk, with
          documentation and integration into decision-making. Both controls
          address the institutionalization and communication of AI
          principles, with gov-3 focusing on ethical values and gv-4 on
          risk awareness culture. The intersection is strong in their
          shared emphasis on stakeholder communication and documented
          governance processes.

  - source_control: gov-4
    target_controls:
      - id: gv-2
        relationship: complements
        confidence: 0.78
        rationale: >
          SG gov-4 (AI Knowledge and Competency Development) requires
          training programs on AI risks, ethics, and governance tailored to
          personnel roles. NIST gv-2 requires that individuals responsible
          for AI risk management are trained. Both address AI-related
          training, but gov-4 focuses broadly on building organizational AI
          competencies across all staff involved in AI decisions, while gv-2
          focuses specifically on training for those in accountability
          structures. gov-4 complements gv-2 by extending training beyond
          risk management roles to all AI-involved personnel.
      - id: gv-3
        relationship: complements
        confidence: 0.73
        rationale: >
          SG gov-4 requires building internal knowledge including
          understanding of AI capabilities and limitations. NIST gv-3
          addresses workforce diversity and inclusion in AI risk
          management. gov-4's competency development supports gv-3's goal
          of having diverse, well-informed teams capable of identifying
          biases and impacts across populations, though the primary focus
          areas differ — competency versus diversity.
      - id: gv-5
        relationship: complements
        confidence: 0.70
        rationale: >
          SG gov-4 requires staff to have sufficient understanding to
          exercise meaningful oversight over AI systems. NIST gv-5 requires
          processes for robust engagement with relevant AI actors. gov-4's
          competency requirements support effective stakeholder engagement
          by ensuring personnel have the knowledge necessary to engage
          meaningfully with AI actors, though gv-5 is broader in scope,
          addressing external stakeholder engagement beyond internal
          competency.

  - source_control: dev-1
    target_controls:
      - id: ms-1
        relationship: intersects-with
        confidence: 0.87
        rationale: >
          SG dev-1 (AI Model Testing and Validation) requires comprehensive
          testing covering functional correctness, performance, fairness,
          and robustness. NIST ms-1 (Measure 1) requires appropriate
          methods and metrics for measuring AI trustworthiness
          characteristics including validity, reliability, fairness,
          security, and safety. Both controls mandate systematic measurement
          and testing of AI systems, with significant overlap in the
          trustworthiness dimensions they cover. dev-1 focuses on
          pre-deployment validation, while ms-1 encompasses the full
          measurement framework including post-deployment monitoring.
      - id: ms-2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          SG dev-1 requires comprehensive testing including fairness
          evaluation, adversarial robustness testing, and independent
          validation for high-risk systems. NIST ms-2 (Measure 2) requires
          AI systems to be evaluated for trustworthy characteristics by
          independent teams where feasible, including red-teaming and
          adversarial testing. Both controls address independent evaluation
          and adversarial testing, with ms-2 providing stronger emphasis
          on evaluator independence and red-teaming methodology.

  - source_control: dev-2
    target_controls:
      - id: ms-3
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          SG dev-2 (AI Model Monitoring and Performance Tracking) requires
          continuous monitoring for performance degradation, data drift,
          concept drift, and emerging biases. NIST ms-3 (Measure 3)
          requires mechanisms for tracking identified AI risks over time
          through continuous monitoring. Both controls are strongly aligned
          on continuous post-deployment monitoring of AI systems, including
          drift detection, performance tracking, and threshold-based
          alerting. The intersection is very strong — both address the
          same core operational need with similar scope and specificity.
      - id: ms-4
        relationship: complements
        confidence: 0.74
        rationale: >
          SG dev-2 requires monitoring data to feed into model retraining
          decisions and governance reporting. NIST ms-4 (Measure 4)
          requires feedback about measurement efficacy to be collected and
          integrated into improvement processes. dev-2's requirement for
          monitoring-driven improvement complements ms-4's focus on
          evaluating and refining measurement approaches themselves. dev-2
          provides the monitoring data that ms-4 then evaluates for
          effectiveness.
      - id: mg-1
        relationship: complements
        confidence: 0.76
        rationale: >
          SG dev-2 requires defined thresholds triggering alerts, human
          review, or automated responses when monitoring detects issues.
          NIST mg-1 (Manage 1) requires AI risks to be prioritized,
          responded to, and managed based on assessment outputs. dev-2's
          threshold-based response mechanisms complement mg-1's broader risk
          response framework, with dev-2 providing the technical monitoring
          triggers that feed into mg-1's risk management processes.

  - source_control: dev-3
    target_controls:
      - id: gv-2
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          SG dev-3 (AI Accountability and Audit Trail) requires
          comprehensive audit trails enabling accountability and
          investigation of AI-driven decisions, capturing model inputs,
          outputs, versions, and personnel identity. NIST gv-2 (Govern 2)
          requires accountability structures ensuring appropriate teams are
          empowered and responsible. Both controls address AI
          accountability, with dev-3 focusing on the technical
          implementation of audit trails and traceability, while gv-2
          addresses the organizational accountability structures. The
          audit trails required by dev-3 directly support the
          accountability objectives of gv-2.
      - id: ms-3
        relationship: complements
        confidence: 0.77
        rationale: >
          SG dev-3 requires audit trails capturing model lifecycle logs
          tracking development and deployment history. NIST ms-3 requires
          mechanisms for tracking identified AI risks over time. dev-3's
          audit trail requirements complement ms-3's risk tracking
          mechanisms by providing the historical records and evidence base
          that enable effective risk monitoring and trend analysis.
      - id: gv-1
        relationship: complements
        confidence: 0.73
        rationale: >
          SG dev-3 requires organizations to demonstrate compliance with
          governance requirements through documented evidence. NIST gv-1
          requires governance policies and practices to be transparent
          and implemented effectively. dev-3's audit trail and evidence
          documentation requirements complement gv-1's transparency and
          effective implementation mandates by providing the mechanism
          through which governance compliance can be verified.

  - source_control: ops-1
    target_controls:
      - id: mp-2
        relationship: intersects-with
        confidence: 0.84
        rationale: >
          SG ops-1 (Risk-Proportionate Algorithm Design and Selection)
          requires algorithm selection proportionate to risk level,
          evaluating trade-offs between complexity and interpretability.
          NIST mp-2 (Map 2) requires categorization of AI systems by risk
          level, capabilities, and deployment context. Both controls
          address risk-based classification that determines the level of
          governance rigor. ops-1 focuses on algorithm selection informed
          by risk, while mp-2 addresses broader system categorization. The
          intersection lies in both requiring risk-proportionate decisions
          about AI system design and deployment.
      - id: mp-3
        relationship: complements
        confidence: 0.75
        rationale: >
          SG ops-1 requires evaluating trade-offs between model complexity
          and interpretability, with safeguards proportionate to potential
          impact. NIST mp-3 (Map 3) requires assessment of AI benefits
          and costs for individuals, groups, and society. ops-1's
          trade-off evaluation complements mp-3's broader benefit-cost
          assessment, as algorithm design choices directly affect the
          benefits and costs that mp-3 seeks to evaluate.
      - id: ms-1
        relationship: complements
        confidence: 0.72
        rationale: >
          SG ops-1 requires organizations to favor interpretable models
          for high-impact decisions or ensure complex models have robust
          explainability mechanisms. NIST ms-1 requires metrics for
          measuring AI trustworthiness including interpretability and
          explainability. ops-1's interpretability requirements complement
          ms-1's measurement framework by establishing the design-time
          considerations that ms-1 then measures and evaluates.

  - source_control: ops-2
    target_controls:
      - id: mp-1
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          SG ops-2 (Data Management and Governance for AI) requires robust
          data management including quality, representativeness, integrity,
          provenance, lineage, and access controls. NIST mp-1 (Map 1)
          requires establishing and understanding context including
          applicable laws and regulations. Both controls address the
          foundational data context: ops-2 focuses on data governance
          practices, while mp-1 addresses broader context establishment.
          The intersection lies in their shared concern for data compliance,
          regulatory requirements (PDPA/applicable laws), and documented
          data practices.
      - id: ms-1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          SG ops-2 requires data quality standards defining minimum
          requirements for completeness, accuracy, consistency, and
          timeliness. NIST ms-1 requires appropriate methods and metrics
          for measuring AI trustworthiness. ops-2's data quality metrics
          and standards directly intersect with ms-1's measurement
          framework, as data quality is a foundational trustworthiness
          characteristic. Both require defined standards, measurement
          methodologies, and threshold-based actions.
      - id: gv-6
        relationship: complements
        confidence: 0.71
        rationale: >
          SG ops-2 requires documenting data provenance and lineage,
          including for third-party data sources. NIST gv-6 addresses
          risks from third-party software and data supply chain issues.
          ops-2's data provenance and lineage requirements complement gv-6's
          supply chain risk management by providing the data tracking
          mechanisms that support third-party data risk assessment.

  - source_control: ops-3
    target_controls:
      - id: gv-1
        relationship: complements
        confidence: 0.76
        rationale: >
          SG ops-3 (Human Oversight of AI Decisions) requires appropriate
          human oversight proportionate to risk level and impact. NIST gv-1
          requires governance policies and processes to be implemented
          effectively. ops-3's human oversight requirements complement
          gv-1's governance framework by defining a specific governance
          mechanism — human-in-the-loop controls — that ensures governance
          policies translate into operational practice for AI decisions.
      - id: mg-2
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          SG ops-3 requires mechanisms for human review and intervention in
          AI-automated decisions, with sufficient information and authority
          to override AI recommendations. NIST mg-2 (Manage 2) requires
          strategies to maximize AI benefits and minimize negative impacts,
          with post-deployment monitoring plans. Both controls address
          operational mechanisms for ensuring AI systems produce beneficial
          outcomes, with ops-3 focusing specifically on human oversight as
          the mechanism and mg-2 addressing broader benefit-risk
          optimization strategies. The intersection is strong in
          post-deployment oversight and intervention capabilities.
      - id: mp-2
        relationship: complements
        confidence: 0.74
        rationale: >
          SG ops-3 distinguishes between AI-augmented and AI-automated
          decisions, calibrating human involvement to risk level. NIST mp-2
          classifies AI systems by risk level, capabilities, and deployment
          context. ops-3's classification of decision types (augmented vs.
          automated) complements mp-2's broader system categorization by
          adding a decision-mode dimension to the risk classification.

  - source_control: ops-4
    target_controls:
      - id: ms-2
        relationship: intersects-with
        confidence: 0.84
        rationale: >
          SG ops-4 (AI System Security and Resilience) requires security
          measures against adversarial attacks, data poisoning, and model
          theft, including robustness testing against adversarial inputs.
          NIST ms-2 (Measure 2) requires evaluation for trustworthy
          characteristics including adversarial robustness and security
          testing. Both controls address adversarial robustness evaluation
          and security assessment of AI systems. ops-4 covers a broader
          security scope including infrastructure protection, while ms-2
          focuses on the evaluation and testing methodology. The
          intersection is strong on adversarial testing requirements.
      - id: mg-1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          SG ops-4 requires implementing security countermeasures
          proportionate to threats and conducting AI-specific threat
          modeling. NIST mg-1 (Manage 1) requires AI risks to be
          prioritized, responded to, and managed proactively. Both controls
          address the operational response to identified AI risks, with
          ops-4 focusing specifically on security risks and
          countermeasures, while mg-1 addresses the broader risk
          response framework. ops-4's security incident response
          procedures align with mg-1's risk management processes.
      - id: mg-4
        relationship: complements
        confidence: 0.76
        rationale: >
          SG ops-4 requires AI-specific incident response procedures
          covering model compromise, data poisoning detection, and attack
          containment. NIST mg-4 (Manage 4) requires documented risk
          treatments including response, recovery, and communication plans.
          ops-4's AI security incident response requirements complement
          mg-4's broader incident management framework by providing
          AI-specific security response procedures within the overall
          incident management structure.

  - source_control: ops-5
    target_controls:
      - id: ms-1
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          SG ops-5 (Repeatability and Reproducibility of AI Outcomes)
          requires consistent data processing, model versioning, parameter
          documentation, and controls for consistent results. NIST ms-1
          (Measure 1) requires appropriate methods and metrics for
          measuring AI trustworthiness including validity and reliability.
          Both controls address reliability and consistency of AI systems.
          ops-5's reproducibility requirements directly support ms-1's
          validity and reliability measurement, as reproducible results
          are a prerequisite for meaningful measurement. The intersection
          lies in their shared concern for consistent, verifiable AI
          system behavior.
      - id: ms-3
        relationship: complements
        confidence: 0.75
        rationale: >
          SG ops-5 requires versioning of models, datasets, and
          configurations, with the ability to reconstruct system state at
          any point in time. NIST ms-3 requires mechanisms for tracking AI
          risks over time with historical records for trend analysis.
          ops-5's versioning and state reconstruction capabilities
          complement ms-3's risk tracking by providing the artifact
          management infrastructure that enables historical analysis and
          audit of AI system evolution.
      - id: gv-2
        relationship: complements
        confidence: 0.70
        rationale: >
          SG ops-5 requires maintaining audit trails of model versions,
          data versions, and configuration changes for compliance audits.
          NIST gv-2 requires accountability structures with appropriate
          teams responsible for AI risk management. ops-5's reproducibility
          and audit trail capabilities complement gv-2's accountability
          requirements by providing the technical evidence base through
          which accountability can be demonstrated and verified.

  - source_control: cust-1
    target_controls:
      - id: gv-4
        relationship: intersects-with
        confidence: 0.81
        rationale: >
          SG cust-1 (Disclosure of AI Use in Decision-Making) requires
          transparency about AI use in decisions affecting individuals,
          including general information about how the AI operates. NIST gv-4
          (Govern 4) requires organizational commitment to a culture that
          considers and communicates AI risk, with documented risk
          management processes. Both controls address transparency and
          communication about AI systems, with cust-1 focusing on
          external disclosure to affected individuals and gv-4 addressing
          internal and organizational risk communication. The intersection
          lies in their shared transparency objective, though the
          audiences differ.
      - id: mp-1
        relationship: complements
        confidence: 0.75
        rationale: >
          SG cust-1 requires disclosure proportionate to the significance
          of the decision and potential impact on individuals. NIST mp-1
          requires establishing context including intended purposes and
          applicable regulations. cust-1's context-dependent disclosure
          requirements complement mp-1's context establishment by
          operationalizing the contextual understanding into stakeholder
          communication — the context mapped in mp-1 informs what and how
          disclosure should be made under cust-1.
      - id: gv-5
        relationship: complements
        confidence: 0.73
        rationale: >
          SG cust-1 requires informing individuals that AI is being used
          and providing information about the AI system's role. NIST gv-5
          requires robust engagement with relevant AI actors and
          integration of stakeholder feedback. cust-1's disclosure
          requirements complement gv-5's stakeholder engagement by
          ensuring affected individuals have the basic information
          necessary for meaningful engagement and feedback.

  - source_control: cust-2
    target_controls:
      - id: gv-4
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          SG cust-2 (Explainability of AI-Driven Decisions) requires
          meaningful explanations of AI-driven decisions tailored to the
          audience, conveying key factors that influenced the decision.
          NIST gv-4 requires organizational teams to communicate AI risk
          with documented processes. Both controls address communication
          about AI system behavior, with cust-2 focusing on decision-level
          explanations to affected individuals and gv-4 on organizational
          risk communication. The intersection lies in their shared
          commitment to transparency through active communication about
          AI decisions and risks.
      - id: ms-2
        relationship: complements
        confidence: 0.77
        rationale: >
          SG cust-2 requires adoption of explainability techniques such as
          feature importance, counterfactual explanations, or simplified
          decision rules. NIST ms-2 requires evaluation of AI systems for
          trustworthy characteristics including explainability. cust-2's
          explainability implementation requirements complement ms-2's
          evaluation mandate — cust-2 defines what explainability
          mechanisms to implement, while ms-2 evaluates whether those
          mechanisms are effective and trustworthy.
      - id: ms-1
        relationship: complements
        confidence: 0.73
        rationale: >
          SG cust-2 requires that explainability level be commensurate
          with impact severity and individual expectations. NIST ms-1
          requires metrics for measuring AI trustworthiness including
          explainability and interpretability. cust-2's proportional
          explainability requirements complement ms-1's measurement
          framework by providing the operational context for what
          explainability metrics should capture and how thresholds
          should be calibrated based on decision impact.

  - source_control: cust-3
    target_controls:
      - id: gv-5
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          SG cust-3 (Channels for Feedback and Recourse) requires
          accessible channels for individuals to seek clarification,
          provide feedback, or request human review of AI-driven decisions.
          NIST gv-5 (Govern 5) requires processes for robust engagement
          with relevant AI actors and integration of stakeholder feedback.
          Both controls mandate structured feedback mechanisms between
          organizations and those affected by AI systems. The intersection
          is strong — both require accessible feedback channels, systematic
          feedback collection, and integration of feedback into AI system
          improvement. cust-3 adds the specific requirement for recourse
          and human review of decisions.
      - id: mg-2
        relationship: complements
        confidence: 0.76
        rationale: >
          SG cust-3 requires feedback to be systematically collected and
          used to improve AI system performance, with tracking of recourse
          request volumes and outcomes. NIST mg-2 requires strategies to
          maximize AI benefits and minimize negative impacts, with
          post-deployment monitoring. cust-3's feedback integration
          requirements complement mg-2's benefit optimization by providing
          a direct channel through which negative impacts are identified
          and improvement opportunities are surfaced.
      - id: mg-4
        relationship: complements
        confidence: 0.72
        rationale: >
          SG cust-3 requires recourse mechanisms enabling individuals to
          challenge AI decisions and have them reconsidered by qualified
          humans. NIST mg-4 requires documented risk treatments including
          response and communication plans. cust-3's recourse mechanisms
          complement mg-4's response procedures by providing the
          individual-facing component of the risk response framework —
          enabling affected parties to trigger reviews and corrections.

  - source_control: cust-4
    target_controls:
      - id: mp-2
        relationship: intersects-with
        confidence: 0.86
        rationale: >
          SG cust-4 (AI-Augmented vs AI-Automated Decision Classification)
          requires organizations to classify each AI use case as augmented
          or automated, with classification driving governance, transparency,
          and oversight levels. NIST mp-2 (Map 2) requires categorization
          of AI systems by risk level, capabilities, and deployment context.
          Both controls mandate systematic classification of AI systems
          that determines governance rigor. The intersection is strong —
          cust-4's augmented/automated classification is a specific
          instance of the broader system categorization that mp-2 requires,
          and both use classification to drive tiered governance controls.
      - id: gv-1
        relationship: complements
        confidence: 0.76
        rationale: >
          SG cust-4 requires classification to drive the level of
          governance, transparency, and human oversight applied. NIST gv-1
          requires governance policies and processes to be in place and
          implemented effectively. cust-4's classification-driven
          governance approach complements gv-1's broader governance mandate
          by providing a specific mechanism — decision-mode
          classification — for calibrating governance intensity to AI
          system characteristics.
      - id: mg-2
        relationship: complements
        confidence: 0.71
        rationale: >
          SG cust-4 requires regular review and update of classifications
          as AI systems evolve, with reclassification when the role of AI
          changes. NIST mg-2 requires post-deployment monitoring plans and
          strategies informed by relevant AI actors. cust-4's periodic
          reclassification requirement complements mg-2's post-deployment
          monitoring by ensuring that governance controls are recalibrated
          when AI system behavior or autonomy levels change over time.
