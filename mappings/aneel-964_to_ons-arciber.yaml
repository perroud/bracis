id: aneel-964_to_ons-arciber
title: "ANEEL 964 to ONS ARCiber Control Mapping"
source_framework: aneel-964
target_framework: ons-arciber
version: "1.0.0"
last_updated: "2026-04-04"
methodology: structural
description: >
  Mapeamento entre a Resolucao Normativa ANEEL 964/2021 (regulamentacao de seguranca
  cibernetica do setor eletrico) e o Procedimento de Rede ONS RO-CB.BR.01 (controles
  minimos ARCiber). O ONS ARCiber implementa os requisitos da ANEEL 964 em nivel
  operacional para agentes conectados ao SIN.

mappings:
  - source_control: art-1
    target_controls:
      - id: ctrl-01
        relationship: implements
        confidence: 0.85
        rationale: >
          ONS ctrl-01 (Politica de Seguranca Cibernetica do ARCiber) implementa o
          escopo e objeto da ANEEL 964 art-1, definindo os requisitos de politica
          aplicaveis aos agentes do SIN conforme mandato regulatorio.

  - source_control: art-2
    target_controls:
      - id: ctrl-01
        relationship: implements
        confidence: 0.75
        rationale: >
          As definicoes tecnicas estabelecidas no art-2 da ANEEL 964 fundamentam
          a terminologia e escopo da Politica de Seguranca Cibernetica do ARCiber.

  - source_control: art-3
    target_controls:
      - id: ctrl-01
        relationship: implements
        confidence: 0.80
        rationale: >
          Os principios de seguranca cibernetica do art-3 sao incorporados na
          Politica de Seguranca Cibernetica do ARCiber (ctrl-01) como base
          normativa para todos os controles operacionais do ONS.
      - id: ctrl-02
        relationship: implements
        confidence: 0.75
        rationale: >
          Os principios de seguranca do art-3 orientam a definicao de papeis e
          responsabilidades (ctrl-02) no modelo ARCiber.

  - source_control: art-4
    target_controls:
      - id: ctrl-01
        relationship: implements
        confidence: 0.95
        rationale: >
          A obrigacao de elaborar Politica de Seguranca Cibernetica (art-4) e
          diretamente implementada pelo ctrl-01, que estabelece os requisitos
          minimos de conteudo da politica para agentes do SIN.

  - source_control: art-5
    target_controls:
      - id: ctrl-01
        relationship: implements
        confidence: 0.95
        rationale: >
          O conteudo minimo obrigatorio da Politica de Seguranca Cibernetica
          definido no art-5 e operacionalizado pelo ctrl-01 do ARCiber, que
          especifica os elementos obrigatorios da politica para o setor eletrico.

  - source_control: art-6
    target_controls:
      - id: ctrl-01
        relationship: implements
        confidence: 0.85
        rationale: >
          Os requisitos de publicacao e comunicacao da politica (art-6) sao
          refletidos no ctrl-01 do ARCiber, que exige disseminacao e adocao
          formal da politica de seguranca pelos agentes conectados ao SIN.
      - id: ctrl-02
        relationship: implements
        confidence: 0.80
        rationale: >
          A comunicacao de responsabilidades prevista no art-6 conecta-se ao
          ctrl-02, que define os papeis e responsabilidades de seguranca
          cibernetica no contexto do ARCiber.

  - source_control: art-7
    target_controls:
      - id: ctrl-07
        relationship: implements
        confidence: 0.92
        rationale: >
          Os requisitos de seguranca na cadeia de suprimentos e terceiros (art-7)
          sao implementados pelo ctrl-07 (Gestao da Cadeia de Suprimentos e
          Seguranca de Terceiros no ARCiber), que detalha os controles operacionais
          aplicaveis a fornecedores e prestadores de servicos.

  - source_control: art-8
    target_controls:
      - id: ctrl-04
        relationship: implements
        confidence: 0.95
        rationale: >
          A gestao de riscos ciberneticos exigida no art-8 e diretamente
          implementada pelo ctrl-04 (Gestao de Riscos Ciberneticos do ARCiber),
          que define o processo sistematico de identificacao, avaliacao e
          tratamento de riscos para ativos do SIN.

  - source_control: art-9
    target_controls:
      - id: ctrl-20
        relationship: implements
        confidence: 0.92
        rationale: >
          A gestao de vulnerabilidades em sistemas OT e IT (art-9) e implementada
          pelo ctrl-20 (Avaliacao de Vulnerabilidades e Testes de Seguranca no
          ARCiber), que especifica os requisitos de varredura, avaliacao e
          remediacao de vulnerabilidades.
      - id: ctrl-14
        relationship: implements
        confidence: 0.88
        rationale: >
          A gestao de vulnerabilidades do art-9 tambem e operacionalizada pelo
          ctrl-14 (Gestao de Patches e Atualizacoes de Seguranca), que trata
          especificamente do ciclo de atualizacao de sistemas vulneraveis.

  - source_control: art-10
    target_controls:
      - id: ctrl-06
        relationship: implements
        confidence: 0.90
        rationale: >
          A protecao de sistemas ICS/SCADA (art-10) e implementada pelo ctrl-06
          (Segmentacao de Redes e Definicao do Perimetro Eletronico), que exige
          separacao logica entre redes OT/IT e definicao rigorosa do perimetro
          eletronico dos sistemas de controle.
      - id: ctrl-13
        relationship: implements
        confidence: 0.85
        rationale: >
          O hardening de sistemas de controle industrial previsto no art-10 e
          detalhado no ctrl-13 (Gestao de Configuracao e Hardening de Sistemas),
          que estabelece linhas de base de seguranca para sistemas do ARCiber.
      - id: ctrl-08
        relationship: implements
        confidence: 0.82
        rationale: >
          A protecao de sistemas ICS/SCADA inclui requisitos de seguranca fisica
          (art-10) implementados pelo ctrl-08 (Seguranca Fisica dos Ativos do
          ARCiber).

  - source_control: art-11
    target_controls:
      - id: ctrl-24
        relationship: implements
        confidence: 0.93
        rationale: >
          A continuidade operacional e recuperacao cibernetica (art-11) e
          implementada pelo ctrl-24 (Continuidade de Operacoes do SIN e Plano
          de Recuperacao do ARCiber), que detalha os requisitos de BCP/DRP para
          agentes do setor eletrico.
      - id: ctrl-23
        relationship: implements
        confidence: 0.88
        rationale: >
          O backup e recuperacao como componente da continuidade operacional
          (art-11) e especificamente coberto pelo ctrl-23 (Backup e Recuperacao
          de Sistemas Criticos do ARCiber).

  - source_control: art-12
    target_controls:
      - id: ctrl-21
        relationship: implements
        confidence: 0.95
        rationale: >
          O plano de resposta a incidentes ciberneticos (art-12) e diretamente
          implementado pelo ctrl-21 (Plano de Resposta a Incidentes Ciberneticos
          do ARCiber), que operacionaliza os requisitos de preparacao, deteccao,
          contencao e recuperacao para o setor eletrico.

  - source_control: art-13
    target_controls:
      - id: ctrl-22
        relationship: implements
        confidence: 0.97
        rationale: >
          A notificacao de incidentes ciberneticos a ANEEL (art-13) e
          implementada pelo ctrl-22 (Notificacao de Incidentes Ciberneticos ao
          ONS e a ANEEL), que define os procedimentos, prazos e canais de
          comunicacao obrigatorios.

  - source_control: art-14
    target_controls:
      - id: ctrl-22
        relationship: implements
        confidence: 0.85
        rationale: >
          O compartilhamento de informacoes sobre incidentes e ameacas (art-14)
          e coberto pelo ctrl-22, que inclui a notificacao ao ONS e ANEEL como
          mecanismo de compartilhamento setorial de inteligencia de ameacas.
      - id: ctrl-21
        relationship: implements
        confidence: 0.78
        rationale: >
          O processo de compartilhamento de informacoes do art-14 esta integrado
          ao plano de resposta a incidentes (ctrl-21), que inclui comunicacao
          com entidades do setor.

  - source_control: art-15
    target_controls:
      - id: ctrl-18
        relationship: implements
        confidence: 0.95
        rationale: >
          A gestao de logs e evidencias de incidentes (art-15) e implementada
          pelo ctrl-18 (Gestao de Logs e Registros de Auditoria do ARCiber),
          que detalha os requisitos de coleta, retencao e protecao de registros
          de auditoria.
      - id: ctrl-17
        relationship: implements
        confidence: 0.85
        rationale: >
          O monitoramento como base para coleta de evidencias (art-15) e coberto
          pelo ctrl-17 (Monitoramento Continuo de Seguranca Cibernetica do ARCiber).

  - source_control: art-16
    target_controls:
      - id: ctrl-02
        relationship: implements
        confidence: 0.92
        rationale: >
          As responsabilidades da alta administracao (art-16) sao implementadas
          pelo ctrl-02 (Papeis e Responsabilidades de Seguranca Cibernetica do
          ARCiber), que exige designacao formal de responsaveis e comprometimento
          da lideranca com a seguranca cibernetica.

  - source_control: art-17
    target_controls:
      - id: ctrl-01
        relationship: implements
        confidence: 0.80
        rationale: >
          O relatorio anual de seguranca cibernetica (art-17) e parte do ciclo
          de governanca operacionalizado pelo ctrl-01, que inclui requisitos de
          revisao e prestacao de contas da politica de seguranca.
      - id: ctrl-02
        relationship: implements
        confidence: 0.75
        rationale: >
          A prestacao de contas da alta administracao via relatorio anual (art-17)
          conecta-se ao ctrl-02, que estabelece as responsabilidades formais de
          reporte e accountability.

  - source_control: art-18
    target_controls:
      - id: ctrl-01
        relationship: implements
        confidence: 0.70
        rationale: >
          Os prazos de adequacao e vigencia (art-18) determinam o cronograma de
          implementacao de todos os controles, incluindo a adocao da Politica de
          Seguranca Cibernetica do ARCiber (ctrl-01).
      - id: ctrl-03
        relationship: implements
        confidence: 0.72
        rationale: >
          Os prazos de adequacao do art-18 impactam o programa de conscientizacao
          e treinamento (ctrl-03), exigindo que os agentes alcancem conformidade
          dentro dos prazos regulatorios estabelecidos.
