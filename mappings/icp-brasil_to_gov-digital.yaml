id: icp-brasil_to_gov-digital
title: "ICP-Brasil to Digital Government Act Control Mapping"
source_framework: icp-brasil
target_framework: gov-digital
version: "1.0.0"
last_updated: "2026-04-04"
methodology: structural
description: >
  Cross-framework mapping between ICP-Brasil (Infraestrutura de Chaves Publicas
  Brasileira — Law 14.063/2020 and related regulations) and the Digital Government Act
  (Lei do Governo Digital — Law 14.129/2021). ICP-Brasil establishes the electronic
  signature hierarchy and PKI infrastructure, while the Digital Government Act mandates
  digital transformation of public services, including authentication and digital identity.
  The two frameworks converge on electronic signatures for government services, digital
  identity integration via Gov.br, and interoperability standards.

mappings:
  - source_control: art-4
    target_controls:
      - id: art-13
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ICP-Brasil art-4 (Simple Electronic Signature Requirements) defines the
          baseline signature level, which requires identification of the signatory
          without advanced cryptographic assurance. Gov-Digital art-13 (Authentication
          Levels — Bronze, Silver, Gold) establishes the bronze level with basic
          identity validation against government databases. Both controls define
          the lowest assurance tier for citizen interaction with government, with
          simple signatures mapping to bronze-level authentication.

  - source_control: art-5
    target_controls:
      - id: art-13
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          ICP-Brasil art-5 (Advanced Electronic Signature Requirements) defines the
          intermediate signature level requiring stronger identity verification and
          tamper-evidence without mandating ICP-Brasil certificates. Gov-Digital art-13
          establishes the silver authentication level with enhanced identity proofing.
          Both controls occupy the same trust tier, connecting advanced signatures to
          silver-level authentication for government digital services.
      - id: art-15
        relationship: complements
        confidence: 0.80
        rationale: >
          ICP-Brasil art-5 advanced signature requirements include identity proofing
          mechanisms. Gov-Digital art-15 (Biometric Verification and Identity Proofing)
          specifies biometric methods for identity verification. Gov-Digital art-15
          complements ICP-Brasil art-5 by providing the biometric verification
          mechanisms that can be used to meet the advanced signature identity
          proofing requirements.

  - source_control: art-6
    target_controls:
      - id: art-13
        relationship: intersects-with
        confidence: 0.92
        rationale: >
          ICP-Brasil art-6 (Qualified Electronic Signature — ICP-Brasil Certificate)
          defines the highest assurance signature level requiring an ICP-Brasil digital
          certificate. Gov-Digital art-13 establishes the gold authentication level with
          the strongest identity assurance. Both controls define the maximum trust tier:
          qualified signatures with ICP-Brasil certificates correspond to gold-level
          authentication for government services.
      - id: art-11
        relationship: implements
        confidence: 0.88
        rationale: >
          ICP-Brasil art-6 qualified signatures using ICP-Brasil certificates provide
          the technical mechanism for Gov-Digital art-11 (Digital Signature and Document
          Validation), which requires government services to accept and validate digital
          signatures on electronic documents. The ICP-Brasil qualified signature
          implements the document validation infrastructure mandated by the Digital
          Government Act.

  - source_control: art-11
    target_controls:
      - id: art-5
        relationship: complements
        confidence: 0.87
        rationale: >
          ICP-Brasil art-11 (Mandatory Electronic Signatures in Government) requires
          federal government acts to accept electronic signatures at appropriate
          assurance levels. Gov-Digital art-5 (Digital-First Administrative Processes)
          mandates that administrative processes be conducted digitally. ICP-Brasil
          art-11 complements Gov-Digital art-5 by providing the electronic signature
          framework that enables digital-first government processes.
      - id: art-6
        relationship: complements
        confidence: 0.83
        rationale: >
          ICP-Brasil art-11 mandates acceptance of electronic signatures in government
          interactions. Gov-Digital art-6 (Digitization of Public Services) requires
          public services to be available digitally. ICP-Brasil art-11 complements this
          by ensuring that the signature infrastructure necessary for legally valid
          digital service delivery is in place.

  - source_control: art-13
    target_controls:
      - id: art-12
        relationship: implements
        confidence: 0.95
        rationale: >
          ICP-Brasil art-13 (Integration with Gov.br Digital Identity Platform) explicitly
          mandates integration of electronic signature mechanisms with the Gov.br
          platform. Gov-Digital art-12 (Gov.br Digital Identity Platform) establishes
          Gov.br as the unified digital identity platform for government services. The
          ICP-Brasil integration requirement directly implements the Gov.br platform
          mandate by connecting signature capabilities to the central identity system.
      - id: art-14
        relationship: complements
        confidence: 0.85
        rationale: >
          ICP-Brasil art-13 requires that citizens be able to sign documents from their
          Gov.br accounts. Gov-Digital art-14 (Single Sign-On for Government Services)
          establishes SSO across government services. ICP-Brasil art-13 complements SSO
          by adding electronic signature capability to the authenticated session,
          enabling citizens to both authenticate and sign within a single platform.

  - source_control: art-7
    target_controls:
      - id: art-11
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          ICP-Brasil art-7 (Equivalence to Handwritten Signature) establishes that
          qualified electronic signatures have the same legal validity as handwritten
          signatures. Gov-Digital art-11 (Digital Signature and Document Validation)
          requires government services to validate digital signatures on electronic
          documents. Both controls address the legal validity of electronic signatures
          in government context, with ICP-Brasil providing the legal equivalence and
          Gov-Digital requiring the validation infrastructure.

  - source_control: art-15
    target_controls:
      - id: art-16
        relationship: implements
        confidence: 0.85
        rationale: >
          ICP-Brasil art-15 (Timestamp Requirements and Interoperability) establishes
          timestamping standards and cross-system interoperability for electronic
          signatures. Gov-Digital art-16 (Digital Identity Interoperability and
          Standards) requires interoperability across government digital identity
          systems. ICP-Brasil art-15 implements the interoperability requirement by
          providing the technical standards for timestamp and signature interoperability
          across government platforms.
      - id: art-20
        relationship: complements
        confidence: 0.80
        rationale: >
          ICP-Brasil art-15 timestamp and interoperability standards complement
          Gov-Digital art-20 (Interoperability Between Government Agencies) by providing
          the cryptographic infrastructure that enables trusted data exchange and
          document validation across different government agencies and systems.

  - source_control: art-10
    target_controls:
      - id: art-8
        relationship: complements
        confidence: 0.78
        rationale: >
          ICP-Brasil art-10 (Certificate Policies and Technical Standards) defines the
          technical standards and policies governing certificate issuance and management
          within the ICP-Brasil hierarchy. Gov-Digital art-8 (Digital Service Delivery
          Standards) establishes standards for government digital services. ICP-Brasil
          art-10 complements these service delivery standards by providing the PKI
          technical framework that underpins secure digital service delivery.

  - source_control: art-8
    target_controls:
      - id: art-29
        relationship: complements
        confidence: 0.77
        rationale: >
          ICP-Brasil art-8 (Root Certification Authority and ITI Governance) establishes
          the governance structure for the PKI hierarchy, including the root CA managed
          by ITI. Gov-Digital art-29 (Shared Digital Infrastructure and Reusable
          Components) mandates shared infrastructure across government. The ICP-Brasil
          PKI infrastructure governed by art-8 is a foundational shared component that
          complements the Gov-Digital vision of reusable digital government
          infrastructure.
