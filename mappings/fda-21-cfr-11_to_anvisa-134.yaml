id: fda-21-cfr-11_to_anvisa-134
title: "FDA 21 CFR Part 11 to ANVISA IN 134/2022 Control Mapping"
source_framework: fda-21-cfr-11
target_framework: anvisa-134
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic
description: >
  Complete control-to-control mapping between FDA 21 CFR Part 11 (Electronic Records;
  Electronic Signatures) and ANVISA Instrucao Normativa 134/2022 (Sistemas Computadorizados
  em Boas Praticas de Fabricacao). Both regulations govern electronic records, electronic
  signatures, data integrity, and computerized system validation in pharmaceutical
  manufacturing. ANVISA IN 134 is the Brazilian counterpart to Part 11, explicitly
  aligned with FDA and EU GMP Annex 11 requirements but with broader scope covering
  the full computerized system lifecycle including risk management, vendor qualification,
  incident management, and continuous improvement. 20 source controls mapped to 36
  target controls across 58 mapping pairs.

mappings:
  # ── Subpart A: General Provisions ──

  - source_control: sec-11-1
    target_controls:
      - id: art-1
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          Both controls define the scope of their respective regulations for electronic
          records and computerized systems in pharmaceutical manufacturing. sec-11-1
          establishes Part 11 applicability to electronic records created, modified,
          maintained, archived, retrieved, or transmitted under FDA regulations. art-1
          establishes IN 134 applicability to all computerized systems affecting product
          quality, patient safety, or data integrity in ANVISA-regulated activities.
          The semantic overlap is near-complete, though art-1 is broader in scope
          (covering all GMP computerized systems, not only electronic records/signatures).
      - id: art-3
        relationship: complements
        confidence: 0.72
        rationale: >
          sec-11-1 scopes which records and systems are covered, while art-3 assigns
          accountability for those systems to the registration holder and manufacturer.
          Together they define what is in scope and who is responsible. art-3 adds
          explicit obligations for third-party systems and designation of a qualified
          CSV responsible person, which Part 11 does not address directly.

  - source_control: sec-11-2
    target_controls:
      - id: art-1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          sec-11-2 defines conditions under which electronic records may substitute
          paper records (for both internal records and FDA submissions). art-1 defines
          the scope of IN 134 as covering all computerized systems in GMP activities.
          Both address when electronic records are acceptable, but sec-11-2 is more
          specific about submission types (docket No. 92S-0251) while art-1 takes a
          broader systems-based approach.
      - id: art-25
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          sec-11-2 establishes equivalence between electronic and paper records under
          Part 11. art-25 establishes that electronic records are equivalent to paper
          records provided they meet integrity, traceability, and retention requirements.
          Both address the fundamental question of electronic record acceptability,
          though art-25 explicitly requires ALCOA+ compliance as a precondition for
          equivalence.

  - source_control: sec-11-3
    target_controls:
      - id: art-2
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          Both controls establish foundational definitions and terminology for their
          respective frameworks. sec-11-3 defines electronic record, electronic
          signature, digital signature, biometrics, closed system, and open system.
          art-2 defines computerized system, CSV, data integrity (ALCOA+), electronic
          record, electronic signature, audit trail, and GAMP. The core definitions
          of electronic record and electronic signature are semantically equivalent.
          art-2 adds ALCOA+ and GAMP definitions reflecting the broader lifecycle
          scope of IN 134.

  # ── Subpart B: Electronic Records — Closed Systems ──

  - source_control: sec-11-10a
    target_controls:
      - id: art-9
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          sec-11-10a requires validation of closed systems to ensure accuracy,
          reliability, consistent intended performance, and ability to discern invalid
          or altered records. art-9 requires a Validation Master Plan governing all
          computerized system validation activities. sec-11-10a mandates the act of
          validation; art-9 mandates the strategic planning document that governs
          validation. They intersect on the fundamental requirement that systems must
          be validated.
      - id: art-10
        relationship: complements
        confidence: 0.78
        rationale: >
          sec-11-10a requires system validation but does not prescribe the starting
          point. art-10 requires User Requirements Specifications (URS) as the
          foundational document before development or acquisition, including data
          integrity, audit trail, and electronic signature requirements. URS is the
          prerequisite that feeds into the validation sec-11-10a demands.
      - id: art-11
        relationship: implements
        confidence: 0.88
        rationale: >
          sec-11-10a requires validation ensuring accuracy and reliability. art-11
          specifies Installation Qualification (IQ) as the first phase of validation,
          verifying correct installation of hardware, software, network, and security
          components against specifications. IQ directly implements one component of
          the validation required by sec-11-10a.
      - id: art-12
        relationship: implements
        confidence: 0.88
        rationale: >
          sec-11-10a requires validation ensuring consistent intended performance and
          ability to discern invalid records. art-12 specifies Operational Qualification
          (OQ), testing all critical functionalities, boundary conditions, error
          handling, security, audit trails, and interfaces. OQ directly implements the
          functional validation component of sec-11-10a.
      - id: art-13
        relationship: implements
        confidence: 0.87
        rationale: >
          sec-11-10a requires validation ensuring consistent intended performance.
          art-13 specifies Performance Qualification (PQ), verifying consistent and
          reproducible operation under real production conditions with representative
          data volumes. PQ directly implements the performance validation component
          of sec-11-10a.
      - id: art-15
        relationship: complements
        confidence: 0.80
        rationale: >
          sec-11-10a requires systems to be validated. art-15 requires periodic
          revalidation to confirm systems remain in a validated state, including
          review of changes, incidents, data integrity, security controls, and
          critical functionality testing. Periodic revalidation supports ongoing
          compliance with the validation mandate of sec-11-10a.

  - source_control: sec-11-10b
    target_controls:
      - id: art-21
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          Both controls require the ability to generate accurate and complete copies
          of electronic records. sec-11-10b requires copies in both human-readable and
          electronic form suitable for agency inspection. art-21 requires printed copies
          to include metadata (copy indicator, timestamp, source system) and electronic
          copies to be verified via checksums or digital signatures. The core requirement
          is equivalent; art-21 adds specific metadata and verification mechanisms.
      - id: art-23
        relationship: complements
        confidence: 0.75
        rationale: >
          sec-11-10b requires accurate and complete record copies. art-23 establishes
          ALCOA+ principles including Accuracy, Completeness, and Availability, which
          are the data integrity foundations that make accurate copies possible.
          ALCOA+ compliance ensures the source records are reliable before copies
          are generated.

  - source_control: sec-11-10c
    target_controls:
      - id: art-24
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Both controls require protection of records for accurate retrieval throughout
          the retention period. sec-11-10c requires record protection enabling accurate
          and ready retrieval. art-24 requires documented backup and recovery procedures
          with frequency based on criticality, offsite storage, integrity verification,
          and periodic restore testing. art-24 operationalizes the protection that
          sec-11-10c mandates.
      - id: art-27
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          sec-11-10c requires records to be retrievable throughout the retention period.
          art-27 requires a retention and archival policy ensuring preservation,
          integrity, and accessibility of all GMP electronic records for the regulatory
          retention period, including migration planning for technology obsolescence.
          Both address long-term record protection; art-27 adds explicit format
          migration and secure disposal requirements.

  - source_control: sec-11-10d
    target_controls:
      - id: art-17
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          Both controls require limiting system access to authorized individuals.
          sec-11-10d mandates access limitation to authorized individuals. art-17
          mandates unique user identification, password authentication, lockout after
          failed attempts, periodic password expiration, session timeout, and
          prohibition of credential sharing. art-17 specifies the exact mechanisms
          that implement sec-11-10d's access limitation requirement. The semantic
          alignment is near-complete.
      - id: art-20
        relationship: complements
        confidence: 0.76
        rationale: >
          sec-11-10d limits access to authorized individuals. art-20 provides the
          technical security infrastructure (firewalls, network segmentation, encryption,
          intrusion detection, patching) that protects systems from unauthorized access
          via external attack vectors. art-20 complements sec-11-10d by addressing
          threat-based protections beyond user authentication.

  - source_control: sec-11-10e
    target_controls:
      - id: art-19
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Both controls are the most critical audit trail requirements in their
          respective frameworks and are semantically equivalent. sec-11-10e requires
          secure, computer-generated, time-stamped audit trails recording all create,
          modify, and delete actions, without obscuring previously recorded information,
          retained as long as the underlying records, and available for agency review.
          art-19 requires automatic, immutable, chronological audit trails recording
          user identity, timestamp (second resolution), action type, old/new values,
          and reason for change. art-19 adds that audit trails cannot be disabled or
          deleted by any user including administrators. The requirements are functionally
          equivalent with art-19 providing more prescriptive detail.

  - source_control: sec-11-10f
    target_controls:
      - id: art-12
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          sec-11-10f requires operational system checks to enforce permitted sequencing
          of steps and events. art-12 (OQ) requires testing of all critical
          functionalities, boundary conditions, and error handling. The OQ testing scope
          includes verifying that the system enforces correct operational sequencing,
          which is the specific control sec-11-10f mandates. The controls intersect on
          the requirement that systems enforce correct process flow.

  - source_control: sec-11-10g
    target_controls:
      - id: art-17
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          sec-11-10g requires authority checks ensuring only authorized individuals
          can use the system, sign records, access devices, alter records, or perform
          operations. art-17 requires access controls with unique identification and
          authentication. Both address authorization, but sec-11-10g focuses on
          granular operation-level authority while art-17 focuses on system-level
          access control mechanisms.
      - id: art-18
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          Both controls require granular role-based access to ensure users can only
          perform authorized operations. sec-11-10g requires authority checks for
          system use, signing, device access, record alteration, and specific operations.
          art-18 requires differentiated access levels, segregation of duties
          (development vs. operations, production vs. QC, administration vs. use),
          restriction of critical configuration access, and a documented access matrix
          approved by quality unit. Both enforce the principle of least privilege.

  - source_control: sec-11-10h
    target_controls:
      - id: art-22
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          sec-11-10h requires device checks to validate the source of data input or
          operational instructions. art-22 requires controls for manual data entry
          verification including double-check, automatic format/range validation, and
          alerts for out-of-specification values. Both address data input validity,
          though sec-11-10h focuses on device/source authentication while art-22
          focuses on data accuracy verification regardless of source.
      - id: art-28
        relationship: complements
        confidence: 0.75
        rationale: >
          sec-11-10h validates the source of data input from devices. art-28 validates
          the integrity of data transferred between systems (precision, completeness,
          integrity, error handling, traceability, security). art-28 extends the device
          check concept to system-to-system interfaces, ensuring data arriving from
          other systems is valid and complete.

  - source_control: sec-11-10i
    target_controls:
      - id: art-22
        relationship: intersects-with
        confidence: 0.73
        rationale: >
          sec-11-10i requires that persons who develop, maintain, or use electronic
          record systems have adequate education, training, and experience. art-22
          addresses training of operators in data entry procedures and the importance
          of verification for data integrity. Both touch on personnel competency,
          though sec-11-10i has a broader scope (developers, maintainers, and users)
          while art-22 focuses specifically on data entry operators.
      - id: art-34
        relationship: complements
        confidence: 0.75
        rationale: >
          sec-11-10i requires personnel competency for system development, maintenance,
          and use. art-34 requires documentation of the entire system lifecycle
          including training documentation (par. 1-X). Training records are the evidence
          that sec-11-10i requirements are met. art-34 ensures the documentary
          framework exists to demonstrate compliance with personnel training mandates.

  - source_control: sec-11-10j
    target_controls:
      - id: art-26
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          sec-11-10j requires written policies holding individuals accountable for
          actions under their electronic signatures, to deter falsification. art-26
          requires controls guaranteeing authenticity, integrity, and non-repudiation
          of electronic signatures, with documentation establishing legal equivalence.
          Both address accountability and anti-falsification for electronic signatures,
          with sec-11-10j emphasizing written policy and art-26 emphasizing technical
          controls and legal framework.
      - id: art-35
        relationship: complements
        confidence: 0.70
        rationale: >
          sec-11-10j requires adherence to written accountability policies. art-35
          requires auditing conformity of electronic records and signatures as part
          of the internal audit program. Audits verify adherence to the policies that
          sec-11-10j mandates, providing the enforcement mechanism for accountability.

  - source_control: sec-11-10k
    target_controls:
      - id: art-34
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          Both controls require comprehensive documentation controls for systems.
          sec-11-10k requires controls over distribution, access, and use of system
          documentation, plus revision and change control procedures maintaining a
          time-sequenced audit trail of documentation changes. art-34 requires complete
          lifecycle documentation (URS, specifications, risk assessments, qualification
          reports, SOPs, change history, incident records, training records) controlled
          by the document management system and available for ANVISA inspection. Both
          mandate version control and audit trails for documentation changes.
      - id: art-29
        relationship: complements
        confidence: 0.78
        rationale: >
          sec-11-10k requires revision and change control procedures for documentation.
          art-29 requires formal change management for validated systems, including
          risk assessment, validation impact assessment, test plans, rollback plans,
          and quality unit approval. art-29 extends documentation change control into
          full change management for the systems themselves, complementing the
          documentation focus of sec-11-10k.

  # ── Subpart B: Electronic Records — Open Systems ──

  - source_control: sec-11-30
    target_controls:
      - id: art-20
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Both controls address security measures for protecting electronic records
          in environments with elevated risk. sec-11-30 requires all Section 11.10
          controls plus additional measures such as document encryption and digital
          signature standards for open systems. art-20 requires firewall and network
          segmentation, malware protection, encryption in transit and at rest, intrusion
          detection, patching, and restriction of unauthorized software. Both mandate
          encryption and additional technical safeguards; art-20 applies these broadly
          to all GMP systems, equivalent to the open system posture of sec-11-30.
      - id: art-28
        relationship: complements
        confidence: 0.78
        rationale: >
          sec-11-30 requires ensuring authenticity, integrity, and confidentiality of
          records from creation to receipt in open systems. art-28 requires validated
          interfaces between systems ensuring precise, complete, and integral data
          transfer with encryption and mutual authentication. art-28 addresses the
          inter-system communication security that is central to open system concerns
          in sec-11-30.

  # ── Subpart B: Electronic Records — Signature Manifestations ──

  - source_control: sec-11-50
    target_controls:
      - id: art-26
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          Both controls require that signed electronic records display specific
          signature information. sec-11-50 requires the signer's printed name, date
          and time of signature, and meaning of the signature (review, approval,
          authorship). art-26 par. 1-II requires the signatory's full name and
          signature date/time, par. 1-III requires the meaning of the signature
          (approval, review, verification). The three required manifestation elements
          are semantically identical in both regulations.

  # ── Subpart B: Electronic Records — Signature/Record Linking ──

  - source_control: sec-11-70
    target_controls:
      - id: art-26
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          sec-11-70 requires signatures to be cryptographically or technically linked
          to records so they cannot be excised, copied, or transferred. art-26 par. 1-I
          requires inseparable binding between signature and record, par. 1-V prohibits
          reuse or transfer, par. 2 requires protection against post-signature
          alteration. Both mandate tamper-evident binding of signatures to records,
          though sec-11-70 is a standalone linking control while art-26 bundles linking
          with broader e-signature requirements.

  # ── Subpart C: Electronic Signatures — General Requirements ──

  - source_control: sec-11-100
    target_controls:
      - id: art-26
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          Both controls establish general requirements for electronic signatures.
          sec-11-100 requires uniqueness (one individual, never reused/reassigned),
          identity verification before issuance, and certification to FDA of legal
          equivalence. art-26 requires uniqueness (par. 1-IV), authentication at time
          of signature (par. 1-VI), and organizational documentation establishing legal
          equivalence (par. 3). Both mandate that electronic signatures are unique,
          identity-verified, and legally equivalent to handwritten signatures.
      - id: art-17
        relationship: complements
        confidence: 0.77
        rationale: >
          sec-11-100 requires unique electronic signatures not reused or reassigned.
          art-17 requires unique user identification, prohibition of credential sharing,
          and secure credential management. The access control infrastructure of art-17
          provides the technical foundation that supports the signature uniqueness and
          identity verification mandates of sec-11-100.

  # ── Subpart C: Electronic Signatures — Components and Controls ──

  - source_control: sec-11-200
    target_controls:
      - id: art-17
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          sec-11-200 requires at least two distinct identification components (ID code
          and password) for non-biometric electronic signatures, with specific session
          management rules for continuous and non-continuous signing. art-17 requires
          unique identification plus password authentication, with session timeout by
          inactivity. Both mandate multi-component authentication; sec-11-200 is
          specific to the signing act while art-17 addresses system access broadly.
      - id: art-26
        relationship: intersects-with
        confidence: 0.84
        rationale: >
          sec-11-200 specifies technical requirements for electronic signature
          components (two-factor for non-biometric, genuine owner restriction for
          biometric). art-26 requires authentication at the moment of signature and
          protection against falsification. Both address the technical mechanism of
          signature execution, though sec-11-200 provides more granular requirements
          for session continuity and multi-person collaboration safeguards.

  # ── Subpart C: Electronic Signatures — ID Code/Password Controls ──

  - source_control: sec-11-300
    target_controls:
      - id: art-17
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          Both controls mandate comprehensive credential security. sec-11-300 requires
          unique ID/password combinations, periodic checks and revision (password aging),
          loss management procedures for compromised credentials, transaction safeguards
          with immediate unauthorized use detection and reporting, and periodic device
          testing. art-17 requires unique identification, password complexity, lockout
          after failed attempts, periodic password expiration, session timeout, and
          prohibition of credential sharing. The controls are functionally equivalent
          in mandating robust credential lifecycle management.
      - id: art-18
        relationship: complements
        confidence: 0.75
        rationale: >
          sec-11-300 focuses on security and integrity of identification codes and
          passwords. art-18 extends access control into role-based differentiation and
          segregation of duties (development vs. operations, production vs. QC). While
          sec-11-300 ensures credentials are secure, art-18 ensures the permissions
          those credentials unlock follow least privilege and duty segregation principles.
      - id: art-20
        relationship: complements
        confidence: 0.74
        rationale: >
          sec-11-300 requires transaction safeguards to prevent unauthorized credential
          use and detect/report attempts. art-20 requires security monitoring, intrusion
          detection, and patching. The security infrastructure of art-20 provides the
          detection and alerting capabilities that sec-11-300's transaction safeguards
          demand.

  # ── Cross-cutting mappings for risk and lifecycle controls ──
  # FDA Part 11 does not have explicit risk management or lifecycle
  # management controls, but ANVISA IN 134 chapters 2 (Risk), 3
  # (Validation Lifecycle), 6 (Operations), and 7 (Governance) extend
  # well beyond Part 11's scope. The following mappings capture where
  # Part 11 controls implicitly depend on ANVISA lifecycle controls.

  - source_control: sec-11-10a
    target_controls:
      - id: art-4
        relationship: complements
        confidence: 0.78
        rationale: >
          sec-11-10a requires system validation. art-4 requires documented risk
          assessment for each computerized system considering impact on product quality,
          patient safety, and data integrity. Risk assessment drives the validation
          strategy and scope required by sec-11-10a. GAMP 5 risk-based validation,
          which sec-11-10a guidance references, depends on the risk assessment that
          art-4 mandates.
      - id: art-5
        relationship: complements
        confidence: 0.76
        rationale: >
          sec-11-10a requires system validation. art-5 requires classification of
          systems by GAMP category and criticality, which determines the validation
          effort. System classification per art-5 is the input that scales the
          validation effort sec-11-10a requires.
      - id: art-6
        relationship: complements
        confidence: 0.77
        rationale: >
          sec-11-10a requires validation. art-6 mandates a risk-based approach where
          validation effort is proportional to risk level (full lifecycle for high risk,
          simplified verification for low risk). art-6 provides the proportionality
          framework that makes sec-11-10a validation practical across diverse systems.
      - id: art-16
        relationship: complements
        confidence: 0.80
        rationale: >
          sec-11-10a requires validation. art-16 requires a formal validation report
          consolidating IQ/OQ/PQ results, deviation dispositions, and quality unit
          approval before the system enters GMP production use. The validation report
          is the documented evidence that sec-11-10a validation has been completed.
      - id: art-14
        relationship: complements
        confidence: 0.72
        rationale: >
          sec-11-10a requires validation of closed systems. art-14 provides a
          retrospective validation path for legacy systems that are in use without
          formal validation, using historical data to demonstrate consistent and
          reliable operation. art-14 complements sec-11-10a by addressing the
          practical reality of legacy systems that predate formal validation programs.

  - source_control: sec-11-10e
    target_controls:
      - id: art-23
        relationship: complements
        confidence: 0.82
        rationale: >
          sec-11-10e requires secure, time-stamped audit trails. art-23 establishes
          ALCOA+ principles (Attributable, Legible, Contemporaneous, Original,
          Accurate, Complete, Consistent, Enduring, Available) as the foundational
          data integrity framework. Audit trails are the primary technical control
          implementing the Attributable, Contemporaneous, and Complete principles
          of ALCOA+. The data integrity framework of art-23 provides the conceptual
          basis for the audit trail requirements of sec-11-10e.

  - source_control: sec-11-10c
    target_controls:
      - id: art-25
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          sec-11-10c requires record protection for accurate retrieval during the
          retention period. art-25 requires electronic records to be protected against
          unauthorized alteration/deletion, associated with audit trails, maintained
          in accessible/legible format during the retention period, and reproducible
          in printed form. Both address record integrity and accessibility over time;
          art-25 additionally establishes electronic record equivalence to paper.

  - source_control: sec-11-10k
    target_controls:
      - id: art-35
        relationship: complements
        confidence: 0.73
        rationale: >
          sec-11-10k requires documentation controls. art-35 requires internal audits
          of computerized systems evaluating conformity with the validation master plan,
          access controls, data integrity, change management, backups, vendor
          qualification, training, and electronic records/signatures. Audits verify
          that the documentation controls sec-11-10k mandates are being followed.

  - source_control: sec-11-30
    target_controls:
      - id: art-32
        relationship: complements
        confidence: 0.72
        rationale: >
          sec-11-30 addresses open systems where access is not controlled by the
          organization responsible for record content. art-32 requires qualification
          of suppliers of computerized systems and services (including cloud/SaaS),
          evaluating quality systems, security, audit rights, and data portability.
          Vendor qualification per art-32 is essential for managing the risks inherent
          in open systems where third parties control infrastructure.

  - source_control: sec-11-10a
    target_controls:
      - id: art-7
        relationship: complements
        confidence: 0.74
        rationale: >
          sec-11-10a requires validation ensuring system accuracy and reliability.
          art-7 requires definition and implementation of risk mitigation measures
          including technical, procedural, and organizational controls, with formal
          acceptance of residual risk by the quality unit. Risk mitigation feeds
          directly into validation by defining which controls must be verified
          during qualification.
      - id: art-8
        relationship: complements
        confidence: 0.73
        rationale: >
          sec-11-10a requires ongoing validation. art-8 requires periodic review of
          risk assessments (annually for high-risk, biennially for others) and
          extraordinary review after significant changes, security incidents, or
          regulatory changes. Periodic risk review ensures the validation basis
          remains current and triggers revalidation when the risk profile changes.

  - source_control: sec-11-10j
    target_controls:
      - id: art-36
        relationship: complements
        confidence: 0.70
        rationale: >
          sec-11-10j requires written policies and adherence to deter falsification.
          art-36 requires self-inspection and continuous improvement of the computerized
          system program, including trend analysis of incidents, deviations, and CAPAs,
          benchmarking against international standards, and reporting to senior
          management. The continuous improvement cycle of art-36 provides the governance
          mechanism that sustains the policy adherence sec-11-10j demands.

  - source_control: sec-11-10e
    target_controls:
      - id: art-29
        relationship: complements
        confidence: 0.73
        rationale: >
          sec-11-10e requires audit trails documenting time-sequenced changes.
          art-29 requires formal change management for validated systems with
          description, risk assessment, validation impact assessment, test plans,
          rollback plans, and quality unit approval. Change management provides the
          governed process within which audit trail entries are generated, ensuring
          changes to validated systems are controlled and documented.

  - source_control: sec-11-10d
    target_controls:
      - id: art-30
        relationship: complements
        confidence: 0.71
        rationale: >
          sec-11-10d limits system access to authorized individuals. art-30 requires
          contingency plans for critical systems defining alternative procedures,
          activation criteria, responsibilities, data integrity during contingency,
          and RTO. Contingency planning supports access control by ensuring that
          during system failures, alternative procedures maintain data integrity and
          appropriate access controls even in degraded operations.

  - source_control: sec-11-10b
    target_controls:
      - id: art-25
        relationship: complements
        confidence: 0.77
