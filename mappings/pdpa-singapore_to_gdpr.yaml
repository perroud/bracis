id: pdpa-singapore_to_gdpr
title: "PDPA Singapore to GDPR Control Mapping"
source_framework: pdpa-singapore
target_framework: gdpr
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic

mappings:
  - source_control: sec-2
    target_controls:
      - id: art-1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          PDPA Section 2 (Interpretation and Definitions) maps to GDPR Art. 1
          (Subject-matter and Objectives). Both establish foundational definitions
          for their respective frameworks. PDPA defines "personal data,"
          "organisation," and "data intermediary," while GDPR Art. 1 sets out
          the regulation's scope and objectives. PDPA's "personal data" definition
          is broadly comparable to GDPR's Art. 4 definition, though PDPA uniquely
          includes data "whether true or not." PDPA's "data intermediary" maps
          conceptually to GDPR's "processor" (Art. 4(8)).
      - id: art-5
        relationship: complements
        confidence: 0.72
        rationale: >
          PDPA Section 2's definition of personal data underpins the application
          of all GDPR Art. 5 processing principles. Both frameworks require a
          clear understanding of what constitutes personal data before principles
          can be applied, establishing the definitional foundation upon which
          data protection obligations rest.

  - source_control: sec-3
    target_controls:
      - id: art-1
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PDPA Section 3 (Application of the Act) maps to GDPR Art. 1
          (Subject-matter and Objectives). Both define the material and
          territorial scope of their respective data protection frameworks.
          PDPA Section 3 excludes public agencies, personal/domestic activities,
          and business contact information. GDPR Art. 1 (read with Arts. 2-3)
          similarly excludes household activities but has broader territorial
          reach through Art. 3's establishment and targeting criteria. PDPA's
          extraterritorial scope under Section 3(2) is narrower than GDPR Art. 3.

  - source_control: sec-5
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          PDPA Section 5 (Consent Obligation — Overarching Framework) maps to
          GDPR Art. 6 (Lawfulness of Processing). Both establish the legal
          conditions under which personal data may be processed. PDPA uses a
          consent-or-exception model where consent is the primary basis, while
          GDPR enumerates six co-equal legal bases. The anti-bundling provision
          in PDPA Section 5(2) parallels GDPR's requirement for freely given
          consent under Art. 7(4). PDPA's purpose notification requirement in
          Section 5(3) aligns with GDPR's transparency requirements.
      - id: art-5
        relationship: complements
        confidence: 0.78
        rationale: >
          PDPA Section 5's consent framework complements GDPR Art. 5's
          lawfulness, fairness, and transparency principles. PDPA's requirement
          to inform individuals of purposes before collection mirrors GDPR
          Art. 5(1)(a)'s transparency principle and Art. 5(1)(b)'s purpose
          limitation principle. Both frameworks mandate that data processing
          have a lawful foundation.

  - source_control: sec-10
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.87
        rationale: >
          PDPA Section 10 (Consent for Collection, Use, and Disclosure) maps
          directly to GDPR Art. 6 (Lawfulness of Processing). Both are the
          operative provisions governing lawful bases for processing. PDPA
          Section 10 requires purpose-specific consent tied to notified purposes,
          paralleling GDPR Art. 6(1)(a)'s requirement for consent to specific
          purposes. PDPA's consent withdrawal mechanism in Section 10(3)-(4)
          mirrors GDPR Art. 7(3)'s right to withdraw consent, though PDPA
          withdrawal stops future processing without mandating erasure.
      - id: art-5
        relationship: complements
        confidence: 0.75
        rationale: >
          PDPA Section 10's purpose-specific consent requirement complements GDPR
          Art. 5(1)(b)'s purpose limitation principle. Both require that data
          processing be tied to specific, declared purposes communicated to the
          individual before processing begins.

  - source_control: sec-14
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          PDPA Section 14 (Notification Obligation) maps to GDPR Art. 5(1)(a)'s
          transparency principle. Both require organizations to proactively inform
          individuals about data processing purposes. PDPA Section 14 mandates
          notification "on or before" collection, aligning with GDPR's
          requirement for transparent processing. PDPA's "reasonable person"
          standard for purpose appropriateness parallels GDPR's requirement for
          specified, explicit, and legitimate purposes under Art. 5(1)(b).
      - id: art-6
        relationship: complements
        confidence: 0.75
        rationale: >
          PDPA Section 14's notification obligation complements GDPR Art. 6 by
          ensuring that individuals are informed of purposes before data
          collection, which is a precondition for valid consent under both
          frameworks. GDPR Arts. 13-14 (not modeled as separate controls in
          this project) provide the more detailed equivalent, specifying the
          information elements that must be disclosed.

  - source_control: sec-15
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PDPA Section 15 (Deemed Consent) maps to GDPR Art. 6 (Lawfulness of
          Processing). PDPA's three forms of deemed consent (voluntary provision,
          notification-based, contractual necessity) serve analogous functions
          to GDPR's non-consent legal bases. Deemed consent by contractual
          necessity (Section 15(1B)) closely parallels GDPR Art. 6(1)(b)
          (contract performance). Deemed consent by notification (Section 15(1A))
          functionally resembles GDPR Art. 6(1)(f) (legitimate interests) with
          an opt-out mechanism, though the legal constructs differ significantly.

  - source_control: sec-17
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          PDPA Section 17 (Collection Limitation) is equivalent to GDPR
          Art. 5(1)(b)-(c), combining purpose limitation and data minimization
          principles. PDPA's requirement that data be collected only for purposes
          a "reasonable person" would consider appropriate mirrors GDPR Art.
          5(1)(b)'s purpose limitation. PDPA's necessity test ("necessary for
          that purpose") directly parallels GDPR Art. 5(1)(c)'s data
          minimization principle ("limited to what is necessary"). Both
          frameworks prohibit excessive or speculative data collection.

  - source_control: sec-18
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          PDPA Section 18 (Purpose Limitation Obligation) is equivalent to GDPR
          Art. 5(1)(b) (purpose limitation principle). Both prohibit using
          personal data for purposes incompatible with the original collection
          purpose. PDPA's "directly related purpose" test is functionally
          similar to GDPR's "compatible purpose" test under Art. 5(1)(b), though
          PDPA's test is arguably more permissive. Both require fresh consent or
          an alternative legal basis for secondary uses beyond the original or
          compatible purpose.

  - source_control: sec-21
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          PDPA Section 21 (Access to Personal Data) is equivalent to GDPR
          Art. 15 (Right of Access by the Data Subject). Both grant individuals
          the right to obtain their personal data held by the organization and
          information about how it has been used. GDPR Art. 15 is broader,
          requiring disclosure of purposes, categories, recipients, retention
          periods, existence of automated decision-making, and data sources.
          PDPA limits usage/disclosure history to the past year. Unlike GDPR,
          PDPA permits charging a reasonable fee for access requests.

  - source_control: sec-22
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          PDPA Section 22 (Correction of Personal Data) maps to GDPR Art. 5(1)(d)
          (accuracy principle). Both require organizations to maintain accurate
          personal data and provide mechanisms for individuals to request
          corrections. PDPA Section 22's correction propagation requirement
          (notifying third parties who received the data within the past year)
          parallels GDPR Art. 19's notification obligation regarding
          rectification. PDPA's unique annotation mechanism (recording the
          requested correction alongside refusal) has no direct GDPR equivalent.
      - id: art-15
        relationship: complements
        confidence: 0.73
        rationale: >
          PDPA Section 22's correction right complements GDPR Art. 15's right
          of access. GDPR Art. 16 (Right to Rectification, not separately
          modeled in this project) is the more direct equivalent, granting
          data subjects the right to have inaccurate data rectified without
          undue delay.

  - source_control: sec-23
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          PDPA Section 23 (Accuracy Obligation) is equivalent to GDPR
          Art. 5(1)(d) (accuracy principle). Both require organizations to
          make reasonable efforts to ensure personal data is accurate and
          complete. PDPA triggers the accuracy obligation specifically when
          data will be used for decision-making or disclosed to third parties,
          while GDPR Art. 5(1)(d) applies the accuracy requirement more broadly
          to all personal data, requiring erasure or rectification of inaccurate
          data "without delay." Both apply a reasonableness standard.

  - source_control: sec-24
    target_controls:
      - id: art-32
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          PDPA Section 24 (Protection Obligation) is equivalent to GDPR Art. 32
          (Security of Processing). Both require organizations to implement
          appropriate technical and organizational security measures proportionate
          to the risk. PDPA's "reasonable security arrangements" standard aligns
          with GDPR's "appropriate to the risk" standard. Both cover the full
          data lifecycle and require protection against unauthorized access,
          disclosure, modification, and loss. GDPR Art. 32 is more prescriptive,
          explicitly mentioning pseudonymization, encryption, confidentiality,
          integrity, availability, resilience, and regular testing.
      - id: art-25
        relationship: complements
        confidence: 0.75
        rationale: >
          PDPA Section 24's protection obligation complements GDPR Art. 25
          (Data Protection by Design and Default). PDPA Section 24's requirement
          for security throughout the data lifecycle aligns with Art. 25's
          mandate to implement data protection measures from the design stage.
          However, GDPR Art. 25 goes further by requiring privacy-by-default
          configurations and embedding data protection into system architecture.

  - source_control: sec-25
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          PDPA Section 25 (Retention Limitation Obligation) is equivalent to
          GDPR Art. 5(1)(e) (storage limitation principle). Both prohibit
          retaining personal data beyond the period necessary for its collection
          purpose. PDPA Section 25 requires deletion or anonymization of
          electronic data and destruction or anonymization of physical documents
          once retention is no longer justified. GDPR Art. 5(1)(e) similarly
          requires that data be kept in identifiable form only as long as
          necessary. Both recognize that other legal obligations may extend
          retention periods.
      - id: art-17
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          PDPA Section 25's disposal obligation maps to GDPR Art. 17 (Right
          to Erasure). PDPA Section 25(2) mandates deletion or anonymization
          when retention is no longer necessary, which parallels one of GDPR
          Art. 17(1)(a)'s erasure grounds (data no longer necessary for
          collection purposes). However, GDPR Art. 17 is broader, providing
          an individual-initiated right to erasure on multiple grounds, while
          PDPA Section 25 is an organization-driven retention obligation.

  - source_control: sec-26
    target_controls:
      - id: art-44
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          PDPA Section 26 (Transfer Limitation Obligation) is equivalent to
          GDPR Art. 44 (General Principle for Transfers). Both restrict
          cross-border transfers of personal data to jurisdictions that provide
          comparable/adequate protection. PDPA requires the recipient to be
          subject to laws, binding corporate rules, or agreements providing
          comparable protection, paralleling GDPR's adequacy decisions (Art. 45),
          Standard Contractual Clauses, and Binding Corporate Rules (Art. 46).
          Both provide derogations for consent, contractual necessity, and
          vital interests. GDPR's framework is more elaborate with a formal
          adequacy assessment mechanism.

  - source_control: sec-31
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.72
        rationale: >
          PDPA Section 31 (Do Not Call Registry — Prohibition on Specified
          Messages) maps to GDPR Art. 5(1)(a) (lawfulness, fairness, and
          transparency). PDPA's DNC Registry is a Singapore-specific mechanism
          for controlling unsolicited marketing communications via telephone,
          SMS, and fax. While GDPR does not have a direct DNC equivalent, the
          consent requirements for direct marketing under GDPR Art. 6(1)(a)
          and the ePrivacy Directive (not modeled) serve a similar function.
          Both frameworks require lawful basis before sending marketing
          communications to individuals.
      - id: art-6
        relationship: complements
        confidence: 0.70
        rationale: >
          PDPA Section 31's requirement for clear and unambiguous consent before
          sending marketing messages to DNC-registered numbers complements GDPR
          Art. 6's consent requirements. GDPR Art. 21(2)-(3)'s right to object
          to direct marketing processing is the closer functional equivalent,
          though it operates as an objection right rather than a registry-based
          opt-out system.

  - source_control: sec-37
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          PDPA Section 37 (DNC — Identification and Contact Information) maps
          to GDPR Art. 5(1)(a) (transparency principle). Both frameworks require
          transparency in communications with individuals. PDPA Section 37
          mandates sender identification, contact information, and opt-out
          mechanisms in all marketing messages. GDPR's transparency requirements
          under Art. 12-14 (partially captured in Art. 5) similarly require
          clear identification and communication mechanisms, though GDPR
          addresses this more broadly across all processing rather than
          specifically for marketing messages.

  - source_control: sec-26a
    target_controls:
      - id: art-33
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          PDPA Section 26A (Mandatory Data Breach Notification) is equivalent
          to GDPR Art. 33 (Notification of Breach to Supervisory Authority).
          Both mandate timely notification to the supervisory authority following
          a data breach. PDPA requires notification within 3 calendar days of
          assessment; GDPR requires notification within 72 hours of awareness.
          Both require detailed notification content including nature of breach,
          categories of data affected, number of individuals, potential
          consequences, and remediation measures. Both include a significance
          threshold — PDPA requires significant harm or 500+ affected
          individuals; GDPR requires a risk to rights and freedoms.

  - source_control: sec-26d
    target_controls:
      - id: art-15
        relationship: complements
        confidence: 0.73
        rationale: >
          PDPA Section 26D (Data Portability Obligation) complements GDPR
          Art. 15's right of access. GDPR Art. 20 (Right to Data Portability,
          not separately modeled in this project) is the direct equivalent.
          Both grant individuals the right to receive their personal data in a
          machine-readable format and have it transmitted to another organization.
          PDPA Section 26D's scope is broader than GDPR Art. 20 in that it
          includes derived data (data created from the individual's use of
          services). Unlike GDPR Art. 20, PDPA permits charging a reasonable
          fee for portability requests.
      - id: art-1
        relationship: complements
        confidence: 0.70
        rationale: >
          PDPA Section 26D's data portability right complements GDPR Art. 1's
          objective of enabling free movement of personal data. Both frameworks
          recognize that individual empowerment through data portability
          promotes competition and individual autonomy over personal data.

  - source_control: sec-29
    target_controls:
      - id: art-83
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          PDPA Section 29 (Powers of the PDPC — Directions and Enforcement)
          is equivalent to GDPR Art. 83 (General Conditions for Imposing
          Administrative Fines). Both establish the enforcement powers and
          penalty structures for their respective frameworks. PDPA's financial
          penalties (up to SGD 1,000,000 or 10% of Singapore turnover for
          large organizations) parallel GDPR's two-tier fine structure (up to
          EUR 20M or 4% of global turnover). Both regulators have investigative
          powers, can issue binding directions, and can require remedial
          actions. GDPR's penalty scope is broader (global turnover vs.
          Singapore turnover) and the maximum percentages are higher.

  - source_control: sec-48i
    target_controls:
      - id: art-28
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          PDPA Section 48I (Data Intermediary Obligations — Ninth Schedule) is
          equivalent to GDPR Art. 28 (Processor). Both govern the relationship
          between the primary organization (controller) and its data processors
          (intermediaries). Both require written contracts, restrict processing
          to contracted purposes only, impose direct security obligations on
          processors, and hold the controller responsible for ensuring processor
          compliance. GDPR Art. 28 is more prescriptive, specifying mandatory
          contract clauses including sub-processor controls, data deletion/return
          upon termination, and audit rights. PDPA's Ninth Schedule imposes
          direct protection (security) and retention obligations on data
          intermediaries.
      - id: art-32
        relationship: complements
        confidence: 0.78
        rationale: >
          PDPA Section 48I's requirement for data intermediaries to make
          "reasonable security arrangements" complements GDPR Art. 32's security
          obligations. Both frameworks extend security requirements to
          processors/intermediaries, not just controllers/organizations, ensuring
          that the security chain is maintained throughout the data processing
          ecosystem.
