id: cnsp-393_to_cnsp-381
title: "CNSP 393 to CNSP 381 Control Mapping"
source_framework: cnsp-393
target_framework: cnsp-381
version: "1.0.0"
last_updated: "2026-04-06"
methodology: structural
description: >
  Mapping between CNSP 393 (administrative sanctions and penalties framework for
  SUSEP-supervised entities) and CNSP 381 (cybersecurity policy and cloud services
  requirements). CNSP 393 defines the sanctioning regime that enforces compliance
  with CNSP 381 obligations, establishing infraction classifications, penalty types,
  due process, and governance accountability for cybersecurity non-compliance.

mappings:
  - source_control: sanc-1
    target_controls:
      - id: art-1
        relationship: complements
        confidence: 0.80
        rationale: >
          CNSP 393 sanc-1 classifies administrative infractions by severity (light,
          medium, serious, very serious). CNSP 381 art-1 defines the scope of
          cybersecurity obligations whose violation triggers these infraction
          classifications. The severity tiers apply directly to cybersecurity
          non-compliance scenarios.
      - id: art-2
        relationship: complements
        confidence: 0.80
        rationale: >
          The infraction severity classification in sanc-1 must be applied
          proportionally, consistent with the proportionality principle established
          in CNSP 381 art-2. Technology failures are assessed against the entity's
          size and risk profile when determining infraction severity.
      - id: art-3
        relationship: complements
        confidence: 0.85
        rationale: >
          Failure to implement and maintain the cybersecurity policy required by
          CNSP 381 art-3 constitutes an administrative infraction under sanc-1.
          The severity classification (medium to serious) depends on the impact
          to confidentiality, integrity, and availability.

  - source_control: sanc-2
    target_controls:
      - id: art-17
        relationship: complements
        confidence: 0.85
        rationale: >
          Obstruction of SUSEP supervision (sanc-2) directly relates to the board's
          responsibility under art-17 to ensure adherence to cybersecurity policy.
          Failure to provide SUSEP access to cybersecurity documentation, systems,
          or records constitutes obstruction regardless of the underlying matter.
      - id: art-8
        relationship: complements
        confidence: 0.90
        rationale: >
          CNSP 381 art-8 requires maintaining documentation available to SUSEP for
          5 years. Failure to maintain or provide this documentation constitutes
          obstruction of supervision under sanc-2, automatically classified as a
          serious infraction.

  - source_control: sanc-3
    target_controls:
      - id: art-3
        relationship: complements
        confidence: 0.80
        rationale: >
          Aggravating and mitigating circumstances (sanc-3) directly reference
          compliance program effectiveness as a mitigating factor. A demonstrably
          effective cybersecurity policy (art-3) with automated monitoring provides
          strong evidence for penalty mitigation.
      - id: art-9
        relationship: complements
        confidence: 0.80
        rationale: >
          The existence of a well-executed incident response plan (art-9) serves as
          evidence of compliance program effectiveness, supporting mitigating factor
          claims under sanc-3. Voluntary correction before SUSEP directive and
          effective cooperation are directly tied to incident response capabilities.

  - source_control: sanc-4
    target_controls:
      - id: art-10
        relationship: complements
        confidence: 0.95
        rationale: >
          CNSP 393 sanc-4 defines information duty violations as administrative
          infractions. CNSP 381 art-10 establishes the specific obligation to
          communicate relevant cybersecurity incidents to SUSEP. Failure to
          report incidents per art-10 constitutes an information duty violation
          under sanc-4, including the cybersecurity incident notification obligation
          (sanc-4, item V).
      - id: art-11
        relationship: complements
        confidence: 0.90
        rationale: >
          Failure to produce the annual implementation report required by art-11
          constitutes an information duty violation under sanc-4. The periodic
          reporting obligation (sanc-4, item I) encompasses the annual cybersecurity
          report submission to SUSEP.

  - source_control: sanc-5
    target_controls:
      - id: art-1
        relationship: complements
        confidence: 0.80
        rationale: >
          The penalty types and ranges defined in sanc-5 (warning through license
          revocation) apply to violations of the cybersecurity obligations established
          by CNSP 381 art-1. The penalty spectrum creates the enforcement mechanism
          for the entire cybersecurity regulatory framework.
      - id: art-3
        relationship: complements
        confidence: 0.80
        rationale: >
          Failure to implement and maintain the cybersecurity policy (art-3)
          exposes the entity to the full range of penalties defined in sanc-5.
          Systemic cybersecurity policy failures threatening solvency or
          policyholder rights can escalate to the most severe penalties
          including license revocation.

  - source_control: sanc-6
    target_controls:
      - id: art-3
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Dosimetry criteria (sanc-6) evaluate the nature and severity of
          cybersecurity policy violations (art-3). Technology evidence from
          cybersecurity controls — detection speed, remediation timelines,
          compliance monitoring data — directly influences penalty calculation
          across factors 1, 2, 6, and 10.
      - id: art-9
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          The incident response plan execution (art-9) generates evidence relevant
          to multiple dosimetry factors: harm assessment (factor 2), danger to
          protected interests (factor 6), and cooperation during proceedings
          (factor 10). Well-documented incident response supports favorable
          penalty dosimetry.

  - source_control: sanc-7
    target_controls:
      - id: art-3
        relationship: complements
        confidence: 0.75
        rationale: >
          Fine calculation mechanics (sanc-7) apply to cybersecurity policy
          violations under art-3. The daily fine accrual provision (sanc-7, item V)
          is particularly relevant for persistent cybersecurity non-compliance
          such as ongoing system availability failures or unresolved critical
          vulnerabilities.
      - id: art-9
        relationship: complements
        confidence: 0.75
        rationale: >
          The daily fine mechanism for continued non-compliance creates urgent
          financial pressure for rapid incident resolution, directly linking to
          the operational effectiveness of the incident response plan (art-9).
          Faster MTTR reduces daily fine exposure.

  - source_control: sanc-8
    target_controls:
      - id: art-17
        relationship: complements
        confidence: 0.85
        rationale: >
          Suspension, disqualification, and license revocation (sanc-8) apply to
          board members and directors responsible for cybersecurity governance
          under art-17. Board failure to approve policy, ensure adherence, or
          allocate adequate resources can trigger personal sanctions including
          suspension from supervisory roles.
      - id: art-18
        relationship: complements
        confidence: 0.90
        rationale: >
          The designated cybersecurity director (art-18) is personally subject to
          suspension (30-180 days) and disqualification (2-10 years) under sanc-8
          for failures in cybersecurity policy execution and incident response
          plan management. Cross-regulator communication of sanctions prevents
          migration to other supervised sectors.

  - source_control: sanc-9
    target_controls:
      - id: art-8
        relationship: complements
        confidence: 0.85
        rationale: >
          The administrative investigation and due process framework (sanc-9) relies
          on the documentation retention requirements of art-8. Cybersecurity
          documentation (policy, incident reports, test results, board minutes)
          retained under art-8 serves as evidence in administrative proceedings.
          Tamper-proof logging and 5-year retention directly support defense
          preparation during the 30-day defense window.
      - id: art-17
        relationship: complements
        confidence: 0.75
        rationale: >
          Due process proceedings (sanc-9) may target board members responsible
          for cybersecurity governance under art-17. Board meeting minutes and
          governance records serve as evidence of oversight diligence during
          administrative proceedings.

  - source_control: sanc-10
    target_controls:
      - id: art-9
        relationship: complements
        confidence: 0.85
        rationale: >
          Settlement agreements (sanc-10) frequently include technology-related
          obligations such as implementing specific cybersecurity controls, deploying
          monitoring systems, or strengthening the incident response plan (art-9).
          The requirement for verifiable timelines and milestones (sanc-10, item II)
          maps to the structured action plan and response procedures of art-9.
      - id: art-3
        relationship: complements
        confidence: 0.80
        rationale: >
          Settlement terms under sanc-10 may require adoption of compliance programs
          and strengthened internal controls (item III), directly mandating
          improvements to the cybersecurity policy required by art-3. Independent
          audits of cybersecurity controls are a common settlement deliverable.

  - source_control: sanc-11
    target_controls:
      - id: art-8
        relationship: complements
        confidence: 0.85
        rationale: >
          The appeals process (sanc-11) extends the relevance of documentation
          retention (art-8) well beyond the initial proceedings. Appellate timelines
          can span 2-5 years, requiring cybersecurity evidence to remain intact and
          verifiable throughout. Art-8's 5-year retention aligns with this need.
      - id: art-17
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Appeals of sanctions imposed on board members for cybersecurity governance
          failures (art-17) follow the appellate framework in sanc-11. The suspensive
          effect provisions are critical for directors facing suspension or
          disqualification related to cybersecurity oversight deficiencies.

  - source_control: sanc-12
    target_controls:
      - id: art-8
        relationship: implements
        confidence: 0.90
        rationale: >
          The 5-year statute of limitations (sanc-12) aligns directly with the
          5-year documentation retention requirement in art-8. Both provisions
          share the same temporal boundary, ensuring that cybersecurity
          documentation is preserved for the entire period during which SUSEP
          can initiate administrative proceedings. For ongoing infractions, the
          limitation clock resets daily, potentially requiring retention beyond
          5 years until the violation ceases.
      - id: art-3
        relationship: complements
        confidence: 0.75
        rationale: >
          The statute of limitations for cybersecurity policy violations (art-3)
          is governed by sanc-12. Continuous non-compliance (e.g., persistent
          absence of a cybersecurity policy) constitutes an ongoing infraction
          where the 5-year clock resets daily until the policy is implemented.

  - source_control: sanc-13
    target_controls:
      - id: art-3
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Mandatory internal controls and compliance programs (sanc-13) directly
          intersect with the cybersecurity policy requirement of art-3. The
          compliance program mandated by sanc-13 must encompass cybersecurity
          controls, and the cybersecurity policy is a component of the broader
          compliance infrastructure.
      - id: art-17
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          The board's responsibility to approve and supervise compliance programs
          (sanc-13) parallels the board's responsibility for cybersecurity policy
          approval and adherence under art-17. Both require board-level governance,
          resource allocation, and periodic effectiveness assessment.
      - id: art-6
        relationship: complements
        confidence: 0.80
        rationale: >
          The mandatory training and periodic capacity-building program for
          regulatory obligations (sanc-13, item IV) complements the cybersecurity
          training and awareness program required by art-6. Both mandate periodic
          training, evaluation, and culture development.

  - source_control: sanc-14
    target_controls:
      - id: art-10
        relationship: complements
        confidence: 0.85
        rationale: >
          Transparency and disclosure obligations (sanc-14) complement the incident
          communication requirements of art-10. Material fact communication
          (sanc-14, item IV) encompasses cybersecurity incidents that may affect
          policyholder decisions or market perception. Both controls mandate
          timely, accurate disclosure to stakeholders.
      - id: art-4
        relationship: complements
        confidence: 0.80
        rationale: >
          The requirement for clear, complete, and timely information about products
          and services (sanc-14, item I) relates to the cybersecurity policy content
          requirements of art-4, particularly information traceability controls
          (art-4, item II) and data classification (art-4, item V) that underpin
          transparency.

  - source_control: sanc-15
    target_controls:
      - id: art-8
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Record-keeping and documentation requirements (sanc-15) are functionally
          equivalent to art-8 in their core mandate. Both require maintaining
          complete, accurate documentation available to SUSEP with defined retention
          periods. Sanc-15 adds the 10-year retention for governance decisions and
          explicitly requires information systems with integrity, availability,
          confidentiality, audit trails, and access controls — which are the exact
          security properties that art-8 documentation systems must exhibit.
      - id: art-15
        relationship: complements
        confidence: 0.80
        rationale: >
          The requirement to maintain records in Brazil (sanc-15) complements
          art-15's requirement to maintain cloud service documentation and contracts
          in the country. Both ensure that regulatory records remain accessible
          within Brazilian jurisdiction regardless of where services are hosted.

  - source_control: sanc-16
    target_controls:
      - id: art-17
        relationship: complements
        confidence: 0.90
        rationale: >
          Internal audit and independent assessment requirements (sanc-16)
          complement the board's governance responsibilities under art-17.
          The annual audit of internal controls effectiveness (sanc-16, item II)
          must cover cybersecurity controls, and audit results must be reported
          to the board that is responsible for cybersecurity governance under
          art-17.
      - id: art-11
        relationship: complements
        confidence: 0.85
        rationale: >
          The periodic audit assessment of compliance program effectiveness
          (sanc-16) complements the annual implementation report (art-11).
          Both serve as accountability mechanisms — art-11 focuses on cybersecurity
          plan execution, while sanc-16 provides independent validation of control
          effectiveness through internal and external audit.

  - source_control: sanc-17
    target_controls:
      - id: art-17
        relationship: complements
        confidence: 0.95
        rationale: >
          Personal liability of directors and officers (sanc-17) directly
          complements the board governance responsibilities of art-17. Board
          members who fail to approve the cybersecurity policy, ensure adherence,
          or allocate adequate resources are personally liable under sanc-17.
          The due diligence defense requires documented evidence of active
          cybersecurity oversight.
      - id: art-18
        relationship: complements
        confidence: 0.95
        rationale: >
          The designated cybersecurity director (art-18) bears personal liability
          under sanc-17 for cybersecurity policy failures and incident response
          deficiencies. Omission in supervisory duties, approval of non-compliant
          operations, and failure to implement board decisions are all liability
          triggers that map to the director's art-18 responsibilities.

  - source_control: sanc-18
    target_controls:
      - id: art-17
        relationship: complements
        confidence: 0.85
        rationale: >
          Controlling shareholder accountability (sanc-18) complements the board's
          resource allocation responsibility under art-17 (item III). Shareholders
          who underinvest in cybersecurity infrastructure, block necessary technology
          acquisitions, or impose budget constraints that prevent adequate
          cybersecurity controls are personally liable under sanc-18, item V.
      - id: art-3
        relationship: complements
        confidence: 0.75
        rationale: >
          Controlling shareholders who prevent the entity from implementing an
          adequate cybersecurity policy (art-3) — whether through underfunding,
          blocking technology investments, or imposing conflicting priorities —
          are liable under sanc-18 for impeding regulatory compliance.

  - source_control: sanc-19
    target_controls:
      - id: art-10
        relationship: complements
        confidence: 0.95
        rationale: >
          The duty to report irregularities (sanc-19) directly complements the
          incident communication obligation of art-10. Officers, compliance staff,
          and internal auditors who discover cybersecurity incidents must report
          them to SUSEP. Failure to report a known incident is an independent
          infraction under sanc-19, item III, compounding the original art-10
          violation.
      - id: art-18
        relationship: complements
        confidence: 0.85
        rationale: >
          The designated cybersecurity director (art-18) has a personal duty under
          sanc-19 to report cybersecurity irregularities to SUSEP. The whistleblower
          protection and confidential reporting channel requirements (sanc-19,
          items IV and V) support the director's governance infrastructure.

  - source_control: sanc-20
    target_controls:
      - id: art-17
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Board oversight and governance accountability (sanc-20) is functionally
          equivalent to art-17 in establishing the board's cybersecurity governance
          responsibilities. Both mandate board approval of compliance programs,
          adequate resource allocation (human, technological, financial), and
          accountability to SUSEP. Sanc-20 extends the scope to the broader
          compliance program while art-17 focuses specifically on cybersecurity.
      - id: art-18
        relationship: complements
        confidence: 0.90
        rationale: >
          Sanc-20 requires the board to designate a director responsible for
          regulatory compliance (item III) with autonomy and adequate resources.
          This directly parallels art-18's requirement for a designated
          cybersecurity director. Both provisions ensure named accountability
          at the director level with board-guaranteed autonomy.
      - id: art-11
        relationship: complements
        confidence: 0.80
        rationale: >
          The board's duty to take timely knowledge of irregularities (sanc-20,
          item IV) and report to SUSEP on corrective measures (item VI)
          complements the annual implementation report requirement of art-11.
          The board must actively review the cybersecurity report and act on
          its findings.
