id: basel-iii_to_sox
title: "Basel III to Sarbanes-Oxley (SOX) Control Mapping"
source_framework: basel-iii
target_framework: sox
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # ──────────────────────────────────────────────
  # Capital Family
  # ──────────────────────────────────────────────

  - source_control: basel-cap-cet1
    target_controls:
      - id: sec-302
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CET1 capital ratio reporting is a material financial metric that the CEO/CFO
          must certify as fairly presented. Misstatement of CET1 components (retained
          earnings, deductions such as goodwill or deferred tax assets) directly affects
          the accuracy of financial reports under Section 302. Both controls require
          management accountability for the integrity of reported financial data, but
          Basel III focuses on prudential capital adequacy while SOX 302 addresses
          financial reporting certification broadly.
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          The internal controls over the CET1 capital calculation process — data inputs
          from trading and loan systems, RWA computation, capital deductions — fall within
          the scope of management's ICFR assessment under Section 404(a). For bank holding
          companies, CET1 ratio computation is a material financial reporting process
          requiring documented controls, testing, and annual effectiveness assessment.
      - id: sec-906
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          CET1 disclosures appear in periodic SEC filings for publicly traded bank holding
          companies. Section 906 criminal certification applies to these filings. Inaccurate
          CET1 reporting that results in materially misstated financial condition creates
          criminal liability exposure under Section 906.
      - id: itgc-access
        relationship: complements
        confidence: 0.65
        rationale: >
          CET1 calculation systems require strict access controls to prevent unauthorized
          modification of capital inputs (position data, model parameters, deduction
          calculations). SOX ITGC access controls complement Basel III by providing the
          control framework that protects the integrity of capital computation infrastructure.
      - id: sec-802
        relationship: complements
        confidence: 0.60
        rationale: >
          Basel III requires immutable audit trails for all capital calculation inputs and
          outputs. Section 802 mandates preservation of records supporting audit attestation
          and criminalizes record tampering. Both converge on the requirement for tamper-proof
          retention of capital reporting artifacts.

  - source_control: basel-cap-leverage
    target_controls:
      - id: sec-302
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          The leverage ratio is disclosed in quarterly and annual SEC filings for bank
          holding companies. CEO/CFO certification under Section 302 covers the fair
          presentation of leverage ratio data, including the total exposure measure
          (on-balance-sheet, derivatives, SFTs, off-balance-sheet items).
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Leverage ratio calculation involves aggregation of total assets and off-balance-sheet
          exposures — processes governed by internal controls over financial reporting. Section
          404(a) requires management to assess the effectiveness of these controls, which
          directly support the accuracy of leverage ratio disclosures.
      - id: itgc-operations
        relationship: complements
        confidence: 0.60
        rationale: >
          Leverage ratio monitoring requires reliable IT operations — daily batch calculations,
          data feeds from derivatives pricing systems, SFT position aggregation. SOX IT
          operations controls (job scheduling, monitoring, backup/recovery) complement Basel
          III by ensuring the operational reliability of leverage ratio computation systems.

  - source_control: basel-cap-output-floor
    target_controls:
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          The output floor requires banks to compute RWA under both internal models and
          standardised approaches in parallel and apply the 72.5% floor. This dual-track
          calculation is a complex financial reporting process requiring robust internal
          controls — model governance, parameter management, reconciliation — that fall
          within the scope of Section 404(a) ICFR assessment.
      - id: sec-302
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Output floor calculations directly impact reported capital ratios in SEC filings.
          CEO/CFO must certify the accuracy of these ratios. Any error in the floor RWA
          computation propagates to capital adequacy disclosures subject to Section 302
          certification.
      - id: itgc-change
        relationship: complements
        confidence: 0.65
        rationale: >
          Output floor calculation logic involves complex model configurations (standardised
          risk weights, correlation matrices, phase-in schedule) that must be managed through
          formal change control. SOX change management ITGCs ensure that modifications to
          floor calculation parameters are authorized, tested, and documented before
          production deployment.

  - source_control: basel-cap-tier2
    target_controls:
      - id: sec-302
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Tier 2 capital instruments (subordinated debt, eligible provisions) appear on
          the balance sheet and in capital adequacy disclosures certified by the CEO/CFO.
          Section 302 certification covers the accurate classification and measurement of
          these instruments, including amortisation calculations and eligibility assessments.
          Basel III's own legal_references confirm this relationship via the sox/sec-302 entry.
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          The process of assessing Tier 2 instrument eligibility, computing amortisation
          haircuts, and maintaining the capital instruments registry is a material financial
          reporting process subject to Section 404(a) ICFR assessment. Controls over
          instrument classification and valuation must be documented and tested annually.
          Basel III's own legal_references confirm this relationship.
      - id: sec-802
        relationship: complements
        confidence: 0.65
        rationale: >
          Capital instrument records — issuance documents, eligibility assessments,
          amortisation schedules — must be retained as audit evidence. Section 802 mandates
          minimum 5-year retention and criminalizes tampering with such records.

  # ──────────────────────────────────────────────
  # Credit Risk Family
  # ──────────────────────────────────────────────

  - source_control: basel-cr-counterparty
    target_controls:
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          SA-CCR calculations produce exposure at default (EAD) values that feed into
          credit risk RWA and ultimately capital ratio disclosures. The internal controls
          governing derivatives pricing, netting set classification, and EAD computation
          are material financial reporting processes within the scope of Section 404(a).
      - id: itgc-access
        relationship: complements
        confidence: 0.65
        rationale: >
          SA-CCR calculation parameters (supervisory factors, netting agreements, CSA terms)
          require strict access controls to prevent unauthorized manipulation that could
          understate counterparty credit risk exposure.
      - id: itgc-change
        relationship: complements
        confidence: 0.60
        rationale: >
          Changes to SA-CCR calculation logic, supervisory factor tables, and netting
          agreement configurations must follow formal change management processes to
          maintain the integrity of counterparty risk measurement.

  - source_control: basel-cr-irb
    target_controls:
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          IRB models produce PD, LGD, and EAD estimates that directly determine credit
          risk RWA and capital adequacy ratios disclosed in financial reports. Model
          governance — development, validation, approval, monitoring — constitutes a
          critical ICFR process requiring management assessment under Section 404(a).
      - id: sec-404-b
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          External auditors must evaluate the controls over IRB model governance as part
          of their ICFR attestation. Model validation reports, back-testing results, and
          supervisory approval correspondence are audit evidence supporting the auditor's
          opinion under Section 404(b).
      - id: itgc-sdlc
        relationship: complements
        confidence: 0.70
        rationale: >
          IRB model development follows a lifecycle analogous to SDLC: requirements
          (regulatory standards), design (model specification), development (statistical
          modelling), testing (validation), approval (supervisor/board), and post-
          implementation review (ongoing monitoring). SOX SDLC controls complement Basel
          III model governance requirements.
      - id: itgc-access
        relationship: complements
        confidence: 0.65
        rationale: >
          Access to training data, model code, production PD/LGD/EAD parameters, and
          capital calculation outputs must be restricted and segregated. SOX access controls
          ensure that modelling, validation, and production deployment roles are properly
          separated.

  - source_control: basel-cr-securitisation
    target_controls:
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Securitisation positions require complex capital treatment calculations
          (SEC-IRBA, SEC-ERBA, SEC-SA hierarchy) that produce RWA values material to
          capital adequacy reporting. The internal controls governing tranche classification,
          approach selection, and risk weight computation are within the scope of Section
          404(a) ICFR assessment.
      - id: sec-302
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Securitisation exposures are disclosed in financial statements and regulatory
          capital reports. CEO/CFO certification under Section 302 covers the accurate
          presentation of these exposures, including risk transfer assessments and
          capital relief claims.
      - id: sec-802
        relationship: complements
        confidence: 0.60
        rationale: >
          True-sale analyses, legal opinions supporting risk transfer, and pool-level
          data used for capital calculations constitute audit-relevant records that must
          be retained under Section 802 for at least 5 years.

  - source_control: basel-cr-standardised
    target_controls:
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          SA-CR risk weight assignments, ECAI rating lookups, LTV calculations for real
          estate, and CRM eligibility assessments are material financial reporting processes.
          Section 404(a) requires management to document and test the effectiveness of
          controls governing these processes.
      - id: itgc-change
        relationship: complements
        confidence: 0.65
        rationale: >
          Risk weight lookup tables, CRM eligibility rules, and ECAI rating integrations
          are configuration-critical components. SOX change management controls ensure that
          modifications to these parameters are authorized, tested against regulatory
          benchmarks, and documented before production implementation.
      - id: itgc-operations
        relationship: complements
        confidence: 0.60
        rationale: >
          SA-CR calculations depend on reliable daily batch operations — ECAI rating feeds,
          LTV valuation updates, CRM data refresh. SOX IT operations controls ensure these
          processes run reliably and that failures are detected and resolved promptly.

  # ──────────────────────────────────────────────
  # Governance Family
  # ──────────────────────────────────────────────

  - source_control: basel-gov-pillar2
    target_controls:
      - id: sec-302
        relationship: complements
        confidence: 0.80
        rationale: >
          ICAAP/ILAAP requires board-approved assessment of capital adequacy across all
          material risks. Section 302 requires CEO/CFO certification of internal control
          effectiveness. Both controls establish executive accountability for the accuracy
          and completeness of financial condition assessment, though Basel III focuses on
          prudential capital adequacy while SOX 302 covers financial reporting broadly.
          Basel III's own legal_references confirm this relationship.
      - id: sec-404-a
        relationship: complements
        confidence: 0.85
        rationale: >
          ICAAP is one of the most important internal control processes in a bank. The
          controls governing ICAAP data inputs, risk quantification models, stress test
          assumptions, and capital projections are material ICFR processes requiring
          Section 404(a) assessment. The annual ICAAP review cycle aligns with the annual
          ICFR assessment cycle. Basel III's own legal_references confirm this relationship.
      - id: sec-404-b
        relationship: complements
        confidence: 0.70
        rationale: >
          External auditors evaluate ICAAP-related controls as part of their ICFR
          attestation for bank holding companies. ICAAP documentation, stress test models,
          and capital planning outputs are audit evidence supporting the Section 404(b)
          opinion.
      - id: sec-906
        relationship: complements
        confidence: 0.70
        rationale: >
          ICAAP outcomes directly inform capital adequacy disclosures in SEC filings.
          Criminal certification under Section 906 attaches to these disclosures,
          creating personal liability for executives if ICAAP-derived capital data is
          materially misstated.

  - source_control: basel-gov-pillar3
    target_controls:
      - id: sec-302
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Pillar 3 market discipline disclosures and Section 302 financial reporting
          certification both require management to take responsibility for the accuracy
          and completeness of public financial disclosures. For bank holding companies,
          Pillar 3 disclosures are part of or accompany SEC filings, making Section 302
          certification directly applicable. Basel III's own legal_references classify this
          as equivalent-to.
      - id: sec-404-a
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Pillar 3 disclosure templates (OV1, CR-series, MR-series, LR-series) require
          the same level of internal control assurance as financial statements. Management
          must assess ICFR effectiveness over the processes producing Pillar 3 data.
          Both controls mandate annual assessment of control effectiveness over financial
          disclosures. Basel III's own legal_references classify this as equivalent-to.
      - id: sec-404-b
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          External auditors review the reconciliation between Pillar 3 data and financial
          statements as part of their ICFR attestation. Consistency between Pillar 3
          disclosures and audited financial statements is a key audit focus area.
      - id: sec-802
        relationship: complements
        confidence: 0.70
        rationale: >
          Pillar 3 reports must be archived for at least 10 years under Basel III
          requirements. Section 802 mandates 5-year minimum retention for audit workpapers.
          Both controls converge on the need for immutable, long-term preservation of
          disclosure-supporting records.

  - source_control: basel-gov-stress
    target_controls:
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Stress testing models and their outputs feed into capital planning and financial
          projections disclosed in SEC filings. The internal controls over stress test
          scenario selection, model calibration, and results interpretation are material
          ICFR processes within the scope of Section 404(a) assessment.
      - id: sec-302
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Stress test results inform capital adequacy disclosures and forward-looking
          statements in periodic reports. CEO/CFO certification under Section 302 covers
          the fair presentation of capital projections derived from stress testing.
      - id: itgc-sdlc
        relationship: complements
        confidence: 0.65
        rationale: >
          Stress test models require a formal development lifecycle — specification,
          implementation, validation, ongoing monitoring — analogous to SOX SDLC
          requirements. Model updates must follow documented procedures with
          appropriate testing and approval.
      - id: sec-409
        relationship: complements
        confidence: 0.60
        rationale: >
          Stress test results revealing material capital adequacy concerns may trigger
          real-time disclosure obligations under Section 409. A stress scenario indicating
          potential breach of minimum capital requirements constitutes a material change
          in financial condition requiring rapid disclosure.

  # ──────────────────────────────────────────────
  # Liquidity Family
  # ──────────────────────────────────────────────

  - source_control: basel-liq-lcr
    target_controls:
      - id: sec-302
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          LCR is a material financial metric disclosed in regulatory filings and
          annual reports for bank holding companies. CEO/CFO certification under Section
          302 covers the accurate presentation of liquidity metrics, including HQLA
          classification and net cash outflow calculations.
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          LCR computation involves complex asset classification (HQLA Level 1, 2A, 2B),
          outflow rate application, and cap calculations. The internal controls governing
          these processes are material to financial reporting and fall within the scope
          of Section 404(a) ICFR assessment.
      - id: itgc-operations
        relationship: complements
        confidence: 0.70
        rationale: >
          Daily LCR monitoring requires reliable IT operations — real-time position
          aggregation from payments systems, settlement systems, and collateral management.
          SOX IT operations controls ensure the operational availability and reliability
          of LCR computation infrastructure, including disaster recovery.
      - id: sec-409
        relationship: complements
        confidence: 0.65
        rationale: >
          An LCR falling below 100% is a material change in financial condition that may
          require rapid disclosure under Section 409. Banks must have processes to
          escalate LCR breaches to the disclosure committee for materiality assessment
          within the 4-business-day SEC timeline.

  - source_control: basel-liq-monitoring
    target_controls:
      - id: itgc-operations
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Intraday liquidity monitoring requires real-time IT infrastructure connecting
          to payment system APIs (SWIFT, TARGET2, Fedwire, CHIPS). SOX IT operations
          controls — system monitoring, incident management, disaster recovery — directly
          govern the operational reliability of payment monitoring infrastructure. Both
          controls focus on ensuring critical financial processing systems operate
          reliably.
      - id: sec-409
        relationship: complements
        confidence: 0.70
        rationale: >
          A payment system outage or intraday liquidity crisis constitutes a material
          operational event potentially requiring real-time disclosure under Section 409.
          Intraday liquidity monitoring provides the detection capability needed to
          trigger Section 409 materiality assessments.
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          Intraday liquidity metrics are reported to supervisors and may be disclosed
          in financial statements. The internal controls over payment data aggregation,
          metric calculation, and reporting are within the scope of Section 404(a)
          ICFR assessment.
      - id: itgc-access
        relationship: complements
        confidence: 0.65
        rationale: >
          Payment infrastructure represents critical national financial market
          infrastructure requiring the highest access controls. SOX access management
          controls complement Basel III by providing the control framework for
          restricting and monitoring access to payment systems.

  - source_control: basel-liq-nsfr
    target_controls:
      - id: sec-302
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          NSFR is disclosed in regulatory filings for bank holding companies. CEO/CFO
          certification under Section 302 covers the accurate presentation of structural
          funding metrics, including ASF and RSF factor assignments.
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          NSFR computation involves classification of all balance sheet items against
          ASF and RSF factor tables. The internal controls governing factor assignment
          logic, data sourcing from the general ledger, and reconciliation are material
          ICFR processes requiring Section 404(a) assessment.
      - id: itgc-change
        relationship: complements
        confidence: 0.60
        rationale: >
          ASF and RSF factor lookup tables are configuration-critical parameters.
          SOX change management controls ensure that modifications to factor tables
          (reflecting supervisory rule changes) are authorized, tested, and documented
          before production implementation.

  # ──────────────────────────────────────────────
  # Market Risk Family
  # ──────────────────────────────────────────────

  - source_control: basel-mr-frtb
    target_controls:
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          FRTB market risk capital calculations — including trading book/banking book
          boundary classification, Expected Shortfall computation, and NMRF surcharges —
          are complex financial processes with material impact on reported capital ratios.
          Section 404(a) requires management to assess internal controls over these
          processes including model governance, parameter management, and data integrity.
      - id: itgc-change
        relationship: complements
        confidence: 0.70
        rationale: >
          FRTB risk factor classifications, bucket definitions, risk weights, and
          correlation parameters are versioned configuration requiring formal change
          control. SOX change management ensures that modifications to these Basel
          Framework parameters are authorized, tested against MAR chapter specifications,
          and deployed through controlled processes.
      - id: itgc-access
        relationship: complements
        confidence: 0.65
        rationale: >
          FRTB model code and real-price observation databases are critical financial
          assets. SOX access controls ensure separation of duties between risk technology
          (engine builders), quant teams (calibrators), and risk management (reviewers).
      - id: sec-802
        relationship: complements
        confidence: 0.60
        rationale: >
          FRTB requires retention of back-testing data and NMRF observation records for
          at least 10 years. Section 802 mandates preservation of audit-relevant records.
          Both controls converge on tamper-proof long-term record retention for market
          risk capital computations.

  - source_control: basel-mr-ima
    target_controls:
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          IMA approval requires desk-level back-testing, PLA testing, and NMRF screening
          — all of which produce data material to capital adequacy reporting. The internal
          controls over these processes (ES model calibration, real-price observation
          database integrity, desk classification) are within the scope of Section 404(a)
          ICFR assessment.
      - id: sec-404-b
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          External auditors evaluate IMA model governance controls as part of their ICFR
          attestation. Back-testing results, PLA test statistics, and model validation
          reports constitute audit evidence supporting the Section 404(b) opinion on
          market risk capital accuracy.
      - id: itgc-sdlc
        relationship: complements
        confidence: 0.70
        rationale: >
          IMA model development follows a formal lifecycle: specification, statistical
          implementation, validation, supervisory approval, production deployment,
          ongoing monitoring, and redevelopment. SOX SDLC controls complement Basel III
          model governance by providing the procedural framework for model lifecycle
          management.
      - id: itgc-access
        relationship: complements
        confidence: 0.65
        rationale: >
          Real-price observation databases must be protected against tampering —
          retroactive modification would affect NMRF classifications and capital charges.
          SOX access controls ensure that write access is restricted to automated market
          data feeds, with human modifications requiring controlled exception workflows.

  - source_control: basel-mr-sa
    target_controls:
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          FRTB-SA sensitivity calculations (delta, vega, curvature) across five risk
          classes produce market risk capital charges material to financial reporting.
          The internal controls over sensitivity computation, SBM aggregation, RRAO,
          and DRC calculations are within the scope of Section 404(a) ICFR assessment.
      - id: itgc-change
        relationship: complements
        confidence: 0.70
        rationale: >
          FRTB-SA risk weights, bucket structures, and correlation parameters are
          supervisory-prescribed values requiring strict change control. SOX change
          management ensures that configuration changes reflecting Basel Framework MAR
          chapter updates are authorized, tested against BCBS worked examples, and
          deployed through four-eyes review processes.
      - id: itgc-access
        relationship: complements
        confidence: 0.65
        rationale: >
          Role-based access controls must distinguish between risk technology (engine
          builders), quant risk (configuration managers), and market risk management
          (output reviewers). SOX access controls provide the segregation of duties
          framework for FRTB-SA system governance.

  # ──────────────────────────────────────────────
  # Operational Risk Family
  # ──────────────────────────────────────────────

  - source_control: basel-or-framework
    target_controls:
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          The operational risk management framework — RCSA, KRIs, loss data collection,
          scenario analysis, three lines of defence — provides the governance structure
          for identifying and managing risks that could affect financial reporting.
          Section 404(a) ICFR assessment and Basel III ORM share the fundamental objective
          of ensuring adequate controls over processes that affect financial data integrity.
      - id: sec-302
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          ORM framework governance requires board approval and senior management
          accountability for operational risk — mirroring Section 302's executive
          certification of internal control effectiveness. Both controls establish
          management responsibility for the design and maintenance of internal controls,
          though Basel III focuses on operational risk while SOX 302 covers financial
          reporting controls broadly.
      - id: itgc-operations
        relationship: implements
        confidence: 0.80
        rationale: >
          SOX IT operations controls (incident management, system monitoring, backup/
          recovery, vulnerability management) are a specific implementation of the broader
          Basel III operational risk management framework as applied to technology
          infrastructure. Basel III ORM requires these controls; SOX ITGCs specify how
          to implement them for financial reporting systems.
      - id: itgc-access
        relationship: implements
        confidence: 0.75
        rationale: >
          SOX access management controls implement the access control component of the
          Basel III operational risk management framework for financial reporting systems.
          The RCSA process identifies access-related operational risks; SOX ITGCs specify
          the control activities to mitigate them.
      - id: sec-409
        relationship: complements
        confidence: 0.65
        rationale: >
          Material operational risk events (ransomware, payment system outage, rogue
          trader) identified through the ORM framework may trigger real-time disclosure
          obligations under Section 409 if they materially affect financial condition.

  - source_control: basel-or-sma
    target_controls:
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          SMA capital calculations use Business Indicator components derived from
          income statement data and Internal Loss Multiplier from the 10-year loss
          database. Both data sources are material financial reporting inputs requiring
          ICFR assessment under Section 404(a). Controls over BI calculation, ILD data
          quality, and SMA formula application must be documented and tested.
      - id: sec-302
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          SMA capital requirements are a material component of total regulatory capital
          disclosures in SEC filings. CEO/CFO certification under Section 302 covers
          the accurate computation and presentation of operational risk capital charges.
      - id: sec-802
        relationship: complements
        confidence: 0.70
        rationale: >
          SMA requires 10-year internal loss data retention. Section 802 mandates minimum
          5-year retention for audit-relevant records. Both controls converge on immutable,
          long-term preservation of loss event records that support capital calculations
          and audit attestation.
      - id: itgc-operations
        relationship: complements
        confidence: 0.60
        rationale: >
          ILD data collection depends on reliable ITSM integrations that automatically
          capture operational loss events from incident management systems. SOX IT
          operations controls ensure the reliability and completeness of these data feeds.

  - source_control: basel-or-tech
    target_controls:
      - id: itgc-access
        relationship: implements
        confidence: 0.85
        rationale: >
          Basel III technology and cyber operational risk controls require access
          management, authentication, and authorization controls across critical banking
          systems. SOX ITGC access controls are a direct implementation of these
          requirements for financial reporting systems — both mandate RBAC, privileged
          access restriction, periodic reviews, and segregation of duties.
      - id: itgc-change
        relationship: implements
        confidence: 0.85
        rationale: >
          Basel III operational resilience principles require controlled change management
          for critical banking systems. SOX ITGC change management controls implement
          this requirement for financial reporting systems — both mandate authorization,
          testing, approval, environment separation, and audit trails for all changes.
      - id: itgc-operations
        relationship: implements
        confidence: 0.85
        rationale: >
          Basel III requires operational resilience including system monitoring, incident
          management, disaster recovery, and vulnerability management for critical banking
          infrastructure. SOX IT operations controls implement these requirements for
          financial reporting systems with specific controls over job scheduling, backup/
          recovery, incident response, and patch management.
      - id: itgc-sdlc
        relationship: implements
        confidence: 0.80
        rationale: >
          Basel III requires security-by-design in system development for critical banking
          applications. SOX SDLC controls implement this requirement for financial
          reporting systems — both mandate security requirements in design, UAT,
          controlled data migration, and post-implementation review.
      - id: sec-409
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Basel III requires banks to report material cyber incidents to supervisors
          (e.g., 4 hours under DORA). Section 409 requires rapid SEC disclosure of material
          changes in financial condition (4 business days for cybersecurity incidents under
          SEC Rule 33-11216). Both controls address the same fundamental requirement —
