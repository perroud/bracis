id: pnciber_to_pnsi
title: "PNCiber to PNSI Control Mapping"
source_framework: pnciber
target_framework: pnsi
version: "1.0.0"
last_updated: "2026-04-04"
methodology: structural
description: >
  Mapeamento entre o Decreto 11.856/2023 (PNCiber — Politica Nacional de Ciberseguranca)
  e o Decreto 9.637/2018 (PNSI — Politica Nacional de Seguranca da Informacao). A PNCiber
  foi criada como instrumento da PNSI (art. 5 do Decreto 9.637/2018), especializando a
  dimensao de ciberseguranca dentro da politica mais ampla de seguranca da informacao.

mappings:
  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: derived-from
        confidence: 0.95
        rationale: >
          Art. 1 da PNCiber (instituicao da politica de ciberseguranca) deriva diretamente
          do art. 1 da PNSI, que institui a politica ampla de SI incluindo ciberseguranca
          como uma de suas dimensoes.

  - source_control: art-2
    target_controls:
      - id: art-2
        relationship: superset-of
        confidence: 0.90
        rationale: >
          Art. 2 da PNCiber (definicao de ciberseguranca e CIAD) estende o art. 2 da PNSI,
          especializando conceitos de seguranca da informacao para o dominio cibernetico.

  - source_control: art-3a
    target_controls:
      - id: art-3
        relationship: derived-from
        confidence: 0.90
        rationale: >
          Principios da PNCiber (soberania, prevencao, resiliencia) derivam dos principios
          da PNSI, adaptando-os ao contexto especifico de ciberseguranca.

  - source_control: art-4a
    target_controls:
      - id: art-4
        relationship: superset-of
        confidence: 0.90
        rationale: >
          Objetivos da PNCiber (protecao de infraestruturas criticas, gestao de riscos
          ciberneticos) estendem os objetivos da PNSI com foco especifico em ciberseguranca.

  - source_control: art-4b
    target_controls:
      - id: art-4
        relationship: superset-of
        confidence: 0.85
        rationale: >
          Objetivos de regulacao e desenvolvimento da industria nacional de ciberseguranca
          estendem os objetivos da PNSI de fomentar competencias nacionais em SI.

  - source_control: art-5a
    target_controls:
      - id: art-5
        relationship: implements
        confidence: 0.95
        rationale: >
          Art. 5 da PNSI preve a criacao da Estrategia Nacional de Ciberseguranca (e-Ciber)
          como instrumento. A PNCiber art. 5 materializa esse instrumento, instituindo
          e-Ciber e p-Ciber como instrumentos formais da politica.

  - source_control: art-6
    target_controls:
      - id: art-13
        relationship: complements
        confidence: 0.85
        rationale: >
          O CNCiber (Comite Nacional de Ciberseguranca, art. 6 PNCiber) complementa o
          CGeSI (Comite de Gestao de SI, art. 13 PNSI), atuando especificamente na
          dimensao cibernetica da governanca de SI.

  - source_control: art-8
    target_controls:
      - id: art-14
        relationship: complements
        confidence: 0.85
        rationale: >
          Atribuicoes do CNCiber (art. 8) complementam as atribuicoes do CGeSI (art. 14
          da PNSI), com foco em proposicao de atualizacoes a e-Ciber, avaliacao de
          cooperacao internacional e fomento a educacao cibernetica.

  - source_control: art-4c
    target_controls:
      - id: art-6
        relationship: superset-of
        confidence: 0.85
        rationale: >
          Objetivos de educacao, pesquisa e articulacao multistakeholder da PNCiber
          estendem os planos setoriais previstos no art. 6 da PNSI, trazendo dimensao
          educacional e de cooperacao ao ecossistema de ciberseguranca.
