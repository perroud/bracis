id: c5-bsi_to_iso-27017
title: "C5:2020 (BSI) to ISO/IEC 27017:2015 Control Mapping"
source_framework: c5-bsi
target_framework: iso-27017
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic

mappings:
  # SP — Security Policies
  - source_control: sp-1
    target_controls:
      - id: cls5.1
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          C5 SP-1 (Information Security Policy) requires the cloud provider to
          define, approve, publish, and communicate an information security
          policy. ISO 27017 cls5.1 (Information security policies for cloud
          services) extends the same requirement to cloud-specific contexts,
          mandating that policies address cloud-specific aspects including
          shared responsibility delineation. Both controls target the same
          fundamental objective of establishing a formal security policy
          framework for cloud services.
      - id: cls6.1
        relationship: complements
        confidence: 0.72
        rationale: >
          C5 SP-1 establishes the overarching security policy, which inherently
          includes defining security roles and responsibilities. ISO 27017
          cls6.1 (Information security roles and responsibilities for cloud
          services) specifically addresses the allocation of security
          responsibilities between provider and customer, complementing the
          policy established under SP-1.

  - source_control: sp-2
    target_controls:
      - id: cls5.2
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          C5 SP-2 (Review of Security Policies) requires periodic review of
          security policies to ensure suitability, adequacy, and effectiveness.
          ISO 27017 cls5.2 (Review of the policies for information security in
          cloud services) addresses the identical requirement with additional
          cloud-specific review triggers such as changes in cloud computing
          environment, cloud service models, and threat landscape. Both controls
          mandate documented review results and communication of policy changes.

  # OIS — Organisation of Information Security
  - source_control: ois-1
    target_controls:
      - id: cls5.1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          C5 OIS-1 (Information Security Management System) requires a formal
          ISMS covering all cloud services with documented risk assessment
          methodology. ISO 27017 cls5.1 (Information security policies for
          cloud services) requires cloud-specific security policies as part of
          the broader ISMS. The ISMS requirement in OIS-1 provides the
          management system framework within which cls5.1 policies operate.
      - id: cls6.1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          C5 OIS-1 requires the ISMS to define processes and documentation
          for security requirements. ISO 27017 cls6.1 (Information security
          roles and responsibilities) addresses the organizational aspect of
          defining and allocating security responsibilities, which is a core
          element of any ISMS implementation in a cloud context.

  - source_control: ois-2
    target_controls:
      - id: cls6.2
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          C5 OIS-2 (Segregation of Duties) requires segregation of conflicting
          duties with compensating controls where full segregation is
          impractical. ISO 27017 cls6.2 (Segregation of duties in cloud
          environments) addresses the identical requirement with cloud-specific
          guidance on separating cloud administrative access from customer data
          access. Both controls target preventing single individuals from
          controlling all aspects of critical processes.

  # HR — Human Resources
  - source_control: hr-1
    target_controls:
      - id: cls6.1
        relationship: complements
        confidence: 0.70
        rationale: >
          C5 HR-1 (Security Screening) requires background verification checks
          proportional to information classification and risk. ISO 27017 cls6.1
          (Information security roles and responsibilities) addresses the
          broader allocation of security responsibilities. Screening is a
          prerequisite for personnel fulfilling security roles in cloud
          environments. No direct equivalent exists in ISO 27017, but cls6.1
          covers the broader personnel responsibility framework.
      - id: cls9.3
        relationship: complements
        confidence: 0.70
        rationale: >
          C5 HR-1 personnel screening complements ISO 27017 cls9.3 (Privileged
          access management) because proper vetting of personnel who will hold
          privileged access roles is a prerequisite for trustworthy privileged
          access management in cloud environments.

  - source_control: hr-2
    target_controls:
      - id: cls6.1
        relationship: complements
        confidence: 0.72
        rationale: >
          C5 HR-2 (Security Awareness and Training) requires awareness
          education and training on cloud security risks, responsibilities,
          and policy compliance. ISO 27017 cls6.1 (Information security roles
          and responsibilities) requires clear communication of security
          responsibilities, which is enabled through the training programme
          mandated by HR-2. Training ensures personnel understand the roles
          and responsibilities defined under cls6.1.

  # AM — Asset Management
  - source_control: am-1
    target_controls:
      - id: cls8.1
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          C5 AM-1 (Inventory of Assets) requires identification, documentation,
          and maintenance of all assets associated with cloud services. ISO
          27017 cls8.1 (Inventory of assets in cloud services) addresses the
          same requirement with cloud-specific guidance on shared asset
          management responsibilities between provider and customer. Both
          controls mandate asset inventories covering ownership, location,
          and classification.
      - id: cld-8.1
        relationship: complements
        confidence: 0.75
        rationale: >
          ISO 27017 CLD.8.1 (Removal of cloud service customer assets upon
          termination) extends asset management to cover asset return and
          secure disposal upon service termination. C5 AM-1 asset inventory
          is a prerequisite for knowing which assets must be returned or
          deleted at contract termination.

  - source_control: am-2
    target_controls:
      - id: cls8.1
        relationship: complements
        confidence: 0.78
        rationale: >
          C5 AM-2 (Classification of Information) requires classification of
          information by legal requirements, value, criticality, and
          sensitivity. ISO 27017 cls8.1 (Inventory of assets in cloud
          services) includes asset classification as a mandatory inventory
          attribute. Classification informs the security controls applied to
          each asset in the cloud inventory.
      - id: cls10.1
        relationship: complements
        confidence: 0.73
        rationale: >
          C5 AM-2 information classification drives cryptographic control
          decisions. ISO 27017 cls10.1 (Policy on the use of cryptographic
          controls) requires that encryption measures be assessed based on
          data sensitivity. The classification established under AM-2
          determines the level of cryptographic protection required under
          cls10.1.

  # COM — Communications Security
  - source_control: com-1
    target_controls:
      - id: cls13.1
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          C5 COM-1 (Network Security Management) requires network management,
          segregation, monitoring, and protection of data in transit. ISO
          27017 cls13.1 (Network controls for cloud services) addresses
          identical requirements with cloud-specific guidance on virtual
          network isolation and provider-customer responsibilities. Both
          controls mandate defense-in-depth network controls including
          segmentation, filtering, and encryption.
      - id: cls13.2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          C5 COM-1 explicitly requires network segregation as part of network
          security management. ISO 27017 cls13.2 (Segregation in networks
          for cloud services) focuses specifically on network segregation
          between cloud customers and between security domains. COM-1 network
          segregation requirements directly intersect with cls13.2.

  - source_control: com-2
    target_controls:
      - id: cld-9.5
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          C5 COM-2 (Tenant Separation) requires logical or physical separation
          of customer data, virtualised networks, and administration
          environments. ISO 27017 CLD.9.5 (Access control to cloud service
          customer data in shared virtual environments) addresses the same
          requirement, mandating logical isolation mechanisms to prevent
          cross-tenant data access. Both controls require multi-layered
          isolation at compute, storage, and network levels with regular
          testing of effectiveness.
      - id: cls13.2
        relationship: intersects-with
        confidence: 0.84
        rationale: >
          C5 COM-2 tenant separation requires network-level isolation between
          customers. ISO 27017 cls13.2 (Segregation in networks for cloud
          services) addresses the network dimension of tenant separation,
          requiring secure isolation of each customer's network traffic from
          other customers' traffic.

  # CRY — Cryptography
  - source_control: cry-1
    target_controls:
      - id: cls10.1
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          C5 CRY-1 (Cryptographic Policy) requires a policy covering
          cryptographic controls, key management, algorithm selection, and
          key length requirements. ISO 27017 cls10.1 (Policy on the use of
          cryptographic controls for cloud services) addresses the identical
          requirement with cloud-specific guidance on provider transparency
          regarding algorithms, key lengths, and key management practices.
          Both controls mandate comprehensive cryptographic policy governance.
      - id: cls10.2
        relationship: intersects-with
        confidence: 0.87
        rationale: >
          C5 CRY-1 includes key management policy requirements covering
          generation, distribution, storage, archiving, retrieval, revocation,
          and destruction. ISO 27017 cls10.2 (Key management for cloud
          services) focuses specifically on key lifecycle management in cloud
          environments, directly intersecting with the key management aspects
          of CRY-1.

  - source_control: cry-2
    target_controls:
      - id: cls10.1
        relationship: implements
        confidence: 0.88
        rationale: >
          C5 CRY-2 (Encryption of Data at Rest and in Transit) mandates
          encryption of customer data at rest and in transit with state-of-the-art
          methods and transparency to customers. ISO 27017 cls10.1 (Policy on
          the use of cryptographic controls) requires policies addressing
          encryption of data at rest, in transit, and in use within cloud
          environments. CRY-2 provides the implementation mandate for the
          policy requirements of cls10.1.
      - id: cls10.2
        relationship: complements
        confidence: 0.76
        rationale: >
          C5 CRY-2 encryption implementation depends on proper key management.
          ISO 27017 cls10.2 (Key management for cloud services) addresses
          the key lifecycle that supports the encryption operations mandated
          by CRY-2, including customer-managed key capabilities required
          for BYOK scenarios.

  # IDM — Identity and Access Management
  - source_control: idm-1
    target_controls:
      - id: cls9.1
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          C5 IDM-1 (Access Control Policy) requires an access control policy
          based on business and security requirements with least privilege
          and regular access reviews. ISO 27017 cls9.1 (Access control policy
          for cloud services) addresses the identical requirement with
          cloud-specific guidance on provider-customer access control
          responsibilities, management of access credentials, MFA, and
          privileged access management. Both controls mandate RBAC, least
          privilege, and periodic access certification.
      - id: cls9.2
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          C5 IDM-1 requires that access rights be restricted to minimum
          necessary levels. ISO 27017 cls9.2 (User registration and
          de-registration for cloud services) addresses the formal process
          for assigning and revoking access rights, which implements the
          access control policy defined under IDM-1.
      - id: cls9.3
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          C5 IDM-1 applies to all access including privileged access. ISO
          27017 cls9.3 (Privileged access management for cloud services)
          specifically addresses the restriction and control of privileged
          access rights in cloud environments. Privileged access management
          is a subset of the overall access control policy defined in IDM-1.

  - source_control: idm-2
    target_controls:
      - id: cls9.1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          C5 IDM-2 (Multi-Factor Authentication) mandates MFA for remote
          and management plane access. ISO 27017 cls9.1 (Access control
          policy for cloud services) explicitly addresses multi-factor
          authentication as part of the cloud access control policy. MFA
          is a key implementation mechanism for the access control
          requirements in cls9.1.
      - id: cls9.3
        relationship: intersects-with
        confidence: 0.84
        rationale: >
          C5 IDM-2 requires MFA for all management plane access. ISO 27017
          cls9.3 (Privileged access management) requires enhanced
          authentication for privileged access to cloud management
          interfaces. MFA is the primary mechanism for satisfying the
          enhanced authentication requirement for privileged cloud access.
      - id: cld-9.5
        relationship: complements
        confidence: 0.73
        rationale: >
          C5 IDM-2 MFA requirements support the tenant isolation objectives
          of ISO 27017 CLD.9.5 (Access control in shared virtual
          environments). MFA strengthens the access controls that prevent
          unauthorized cross-tenant access and unauthorized provider
          personnel access to customer data.

  # OPS — Operations Security
  - source_control: ops-1
    target_controls:
      - id: cls12.1
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          C5 OPS-1 (Change Management) requires controlled change processes
          with security impact assessment, authorization, documentation, and
          testing before production deployment. ISO 27017 cls12.1 (Change
          management for cloud services) addresses the identical requirement
          with cloud-specific guidance on provider notification of changes
          affecting customer security. Both controls mandate authorized,
          tested, and documented changes with defined emergency procedures.

  - source_control: ops-2
    target_controls:
      - id: cls12.3
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          C5 OPS-2 (Logging and Monitoring) requires event log production,
          retention, integrity protection, administrator activity logging,
          and time synchronization. ISO 27017 cls12.3 (Event logging and
          monitoring for cloud services) addresses the identical requirement
          with cloud-specific guidance on provider-customer log sharing,
          agreed retention periods, and immutable log storage. Both controls
          mandate comprehensive event logging with tamper protection and
          regular review.
      - id: cld-12.4
        relationship: intersects-with
        confidence: 0.86
        rationale: >
          C5 OPS-2 logging and monitoring capabilities overlap with ISO
          27017 CLD.12.4 (Monitoring of cloud services), which extends
          monitoring to include availability, performance, and security
          monitoring with provider-customer coordination. OPS-2 focuses on
          event logging while CLD.12.4 focuses on broader monitoring
          capabilities, but both share the objective of security event
          detection and audit trail maintenance.

  # PS — Physical Security
  - source_control: ps-1
    target_controls:
      - id: cls6.1
        relationship: complements
        confidence: 0.70
        rationale: >
          C5 PS-1 (Physical Security Perimeter) requires physical access
          controls for data centres. ISO 27017 does not have a direct
          physical security control, as it focuses on cloud-specific
          information security. However, physical security responsibilities
          form part of the shared responsibility model documented under
          cls6.1 (Information security roles and responsibilities). The
          cloud provider's physical security obligations are an inherent
          part of the responsibility allocation.
      - id: cld-6.3
        relationship: complements
        confidence: 0.72
        rationale: >
          C5 PS-1 physical security controls are part of the cloud service
          provider's security capabilities that must be documented and
          communicated under ISO 27017 CLD.6.3 (Relationship between cloud
          service customer and cloud service provider). Physical security
          assurances are a key element of the provider-customer relationship
          documentation.

  - source_control: ps-2
    target_controls:
      - id: cld-6.3
        relationship: complements
        confidence: 0.71
        rationale: >
          C5 PS-2 (Protection Against Environmental Threats) requires
          physical protection against natural and man-made disasters. ISO
          27017 CLD.6.3 (Relationship between cloud service customer and
          cloud service provider) requires the provider to document security
          capabilities including geographic locations and supply chain
          relationships. Environmental protection measures are part of the
          security capabilities that the provider must communicate to the
          customer within the service relationship.
      - id: cls12.2
        relationship: complements
        confidence: 0.72
        rationale: >
          C5 PS-2 environmental protection supports service availability.
          ISO 27017 cls12.2 (Capacity management for cloud services)
          requires monitoring and managing capacity to ensure performance.
          Environmental threats directly impact capacity and availability,
          making PS-2 environmental controls complementary to cls12.2
          capacity management objectives.

  # DEV — Development Security
  - source_control: dev-1
    target_controls:
      - id: cls12.1
        relationship: complements
        confidence: 0.75
        rationale: >
          C5 DEV-1 (Secure Development Policy) requires secure coding
          practices, code review, security testing, and environment
          separation. ISO 27017 cls12.1 (Change management for cloud
          services) requires controlled changes with authorization, testing,
          and documentation. Secure development practices complement
          change management by ensuring that changes are developed securely
          before entering the change management process.
      - id: cld-9.5
        relationship: complements
        confidence: 0.70
        rationale: >
          C5 DEV-1 secure development complements ISO 27017 CLD.9.5 (Access
          control in shared virtual environments) because secure coding
          practices, particularly multi-tenancy-aware development, are
          essential for preventing cross-tenant data access through
          application-level vulnerabilities.
      - id: cld-6.3
        relationship: complements
        confidence: 0.70
        rationale: >
          C5 DEV-1 secure development practices are part of the cloud
          service provider's security capabilities documented under ISO
          27017 CLD.6.3. Customers evaluating cloud providers need
          assurance that the provider follows secure development practices,
          which forms part of the provider-customer security relationship.

  - source_control: dev-2
    target_controls:
      - id: cls12.1
        relationship: complements
        confidence: 0.73
        rationale: >
          C5 DEV-2 (Security Testing) requires SAST, DAST, and penetration
          testing before deployment. ISO 27017 cls12.1 (Change management
          for cloud services) requires that changes are tested before
          implementation. Security testing is a critical component of the
          testing phase within the change management lifecycle for cloud
          services.
      - id: cld-9.5
        relationship: complements
        confidence: 0.71
        rationale: >
          C5 DEV-2 security testing, including penetration testing of
          tenant isolation mechanisms, complements ISO 27017 CLD.9.5 (Access
          control in shared virtual environments). Regular security testing
          validates the effectiveness of the logical isolation mechanisms
          that prevent cross-tenant access.
