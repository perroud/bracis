id: nist-800-218_to_nist-800-53
title: "NIST SP 800-218 (SSDF) to NIST SP 800-53 Rev 5 Control Mapping"
source_framework: nist-800-218
target_framework: nist-800-53-rev5
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic
description: >
  Control-to-control mapping between NIST SP 800-218 (Secure Software Development
  Framework, SSDF v1.1) and NIST SP 800-53 Rev 5 (Security and Privacy Controls for
  Information Systems and Organizations). The SSDF defines practices for secure software
  development across four groups — Prepare the Organization (PO), Protect the Software (PS),
  Produce Well-Secured Software (PW), and Respond to Vulnerabilities (RV) — while NIST
  800-53 defines the security and privacy controls that organizations implement across
  information systems. This mapping identifies where SSDF practices align with, implement,
  or complement specific 800-53 controls.

mappings:
  # ═══════════════════════════════════════════════════════════════════════════
  # PREPARE THE ORGANIZATION (PO)
  # ═══════════════════════════════════════════════════════════════════════════

  # ───────────────────────────────────────────────────────────────────────────
  # PO-1: Define Security Requirements for Software Development
  # ───────────────────────────────────────────────────────────────────────────
  - source_control: po-1
    target_controls:
      - id: sa-1
        relationship: implements
        confidence: 0.92
        rationale: >
          PO-1 requires defining security requirements for software development and
          maintenance, including contractual agreements and vendor selection criteria.
          SA-1 (System and Services Acquisition Policy and Procedures) mandates the
          development and dissemination of acquisition policies that address security
          requirements in the system development lifecycle — the exact governance
          framework that PO-1 operationalizes.
      - id: sa-4
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          PO-1 requires including security requirements in contractual agreements and
          vendor selection criteria, including SBOM and vulnerability disclosure
          requirements. SA-4 (Acquisition Process) requires organizations to include
          security and privacy functional requirements, design requirements, and
          development process requirements in system acquisition contracts.
      - id: sr-3
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          PO-1 mandates communicating security requirements to third-party software
          suppliers, including SBOM and secure development attestation requirements.
          SR-3 (Supply Chain Controls and Processes) requires establishing processes to
          identify and address supply chain weaknesses and employing controls to protect
          against supply chain risks — directly overlapping with PO-1's supplier
          requirements.
      - id: pl-8
        relationship: complements
        confidence: 0.78
        rationale: >
          PO-1 requires defining security requirements that address secure design
          principles and secure coding practices across the software lifecycle.
          PL-8 (Security and Privacy Architectures) requires developing and maintaining
          security architectures that describe how security requirements are addressed,
          providing the architectural context PO-1 requirements feed into.
      - id: cm-6
        relationship: complements
        confidence: 0.72
        rationale: >
          PO-1 requires defining requirements for configuration management as part of
          software development security. CM-6 (Configuration Settings) mandates
          establishing and enforcing security configuration settings, which implements
          a subset of the requirements PO-1 defines.

  # ───────────────────────────────────────────────────────────────────────────
  # PO-2: Implement Roles and Responsibilities
  # ───────────────────────────────────────────────────────────────────────────
  - source_control: po-2
    target_controls:
      - id: at-3
        relationship: implements
        confidence: 0.90
        rationale: >
          PO-2 requires providing role-based training to personnel with security
          responsibilities, covering secure coding, secure design, security testing, and
          incident response. AT-3 (Role-Based Training) requires providing role-based
          security and privacy training to personnel with assigned security roles before
          authorizing access and at an organization-defined frequency thereafter — a
          direct semantic match.
      - id: pm-2
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          PO-2 requires defining and assigning roles and responsibilities for secure
          software development across the organization. PM-2 (Information Security
          Program Leadership Role) requires appointing a senior official responsible for
          coordinating security activities, establishing the leadership structure that
          PO-2 roles plug into.
      - id: ac-6
        relationship: complements
        confidence: 0.78
        rationale: >
          PO-2 requires implementing role-based access aligned with defined security
          responsibilities. AC-6 (Least Privilege) enforces the principle that personnel
          are authorized only the access necessary for their assigned roles and
          responsibilities — the technical enforcement of PO-2's role definitions.
      - id: ac-2
        relationship: complements
        confidence: 0.75
        rationale: >
          PO-2 defines security-related roles (security champions, code reviewers,
          release managers) that need corresponding account management. AC-2 (Account
          Management) requires managing accounts consistent with assigned roles and
          responsibilities, linking account lifecycle to the roles PO-2 defines.
      - id: ia-2
        relationship: complements
        confidence: 0.70
        rationale: >
          PO-2 assigns roles requiring authenticated access to security-critical
          systems (CI/CD, code repos, signing infrastructure). IA-2 (Identification
          and Authentication) requires uniquely identifying and authenticating
          organizational users, providing the identity foundation for PO-2's role
          assignments.

  # ───────────────────────────────────────────────────────────────────────────
  # PO-3: Implement Supporting Toolchains
  # ───────────────────────────────────────────────────────────────────────────
  - source_control: po-3
    target_controls:
      - id: sa-11
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          PO-3 requires specifying and implementing toolchains for security analysis,
          including SAST, SCA, container scanning, and SBOM generation. SA-11 (Developer
          Testing and Evaluation) requires developers to create and implement a plan for
          ongoing security and privacy assessments, employing tools and methods that
          include static analysis, dynamic analysis, and fuzz testing — the same
          toolchain capabilities PO-3 mandates.
      - id: sa-15
        relationship: implements
        confidence: 0.88
        rationale: >
          PO-3 requires specifying tools for building, testing, deploying, scanning, and
          monitoring software, and configuring them to produce security artifacts. SA-15
          (Development Process, Standards, and Tools) requires organizations to determine
          acceptable development tools and tool configurations and require developers to
          follow documented processes — PO-3 is the operational implementation of SA-15.
      - id: cm-2
        relationship: complements
        confidence: 0.75
        rationale: >
          PO-3 requires maintaining build, deployment, and testing toolchains with
          documented configurations. CM-2 (Baseline Configuration) requires maintaining
          baseline configurations under configuration control, which extends to the
          toolchain infrastructure that PO-3 establishes.
      - id: au-2
        relationship: complements
        confidence: 0.72
        rationale: >
          PO-3 requires configuring tools to generate artifacts providing evidence of
          secure development practices. AU-2 (Event Logging) requires identifying events
          to be logged, and PO-3 toolchain outputs (scan results, build provenance,
          dependency inventories) contribute to the audit evidence AU-2 governs.

  # ───────────────────────────────────────────────────────────────────────────
  # PO-4: Define and Use Criteria for Software Security Checks
  # ───────────────────────────────────────────────────────────────────────────
  - source_control: po-4
    target_controls:
      - id: sa-11
        relationship: implements
        confidence: 0.90
        rationale: >
          PO-4 requires defining criteria for security checks (code review findings,
          test results, vulnerability scan results) and enforcing them throughout the
          SDLC. SA-11 (Developer Testing and Evaluation) requires developing a test and
          evaluation plan with criteria for acceptable security findings, which is
          precisely what PO-4's quality gate criteria establish.
      - id: ca-2
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PO-4 defines minimum acceptable security standards and quality gates that
          software must pass before release. CA-2 (Control Assessments) requires
          developing assessment plans with assessment criteria and producing assessment
          reports — PO-4's release criteria function as assessment criteria for software
          security controls.
      - id: ra-5
        relationship: complements
        confidence: 0.80
        rationale: >
          PO-4 requires defining criteria for vulnerability scan results, including
          severity thresholds and remediation timelines. RA-5 (Vulnerability Monitoring
          and Scanning) requires monitoring and scanning for vulnerabilities and
          remediating discovered vulnerabilities — PO-4 defines the acceptance criteria
          against which RA-5 scan results are evaluated.
      - id: cm-6
        relationship: complements
        confidence: 0.73
        rationale: >
          PO-4 enforces that software configurations meet defined security criteria
          before progression or release. CM-6 (Configuration Settings) requires
          establishing and enforcing mandatory configuration settings, and PO-4's
          quality gates include configuration compliance checks that CM-6 defines.

  # ───────────────────────────────────────────────────────────────────────────
  # PO-5: Implement and Maintain Secure Environments for Software Development
  # ───────────────────────────────────────────────────────────────────────────
  - source_control: po-5
    target_controls:
      - id: sa-3
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          PO-5 requires protecting development environments (build, test, staging,
          distribution) from threats. SA-3 (System Development Life Cycle) requires
          managing systems using a system development life cycle that includes
          information security considerations for all phases — the environment
          protection PO-5 mandates is a core SDLC security activity SA-3 governs.
      - id: sc-7
        relationship: implements
        confidence: 0.85
        rationale: >
          PO-5 requires separating and protecting each development environment using
          network segmentation and access controls. SC-7 (Boundary Protection) requires
          monitoring and controlling communications at external and key internal
          boundaries — PO-5 applies this boundary protection specifically to development
          infrastructure.
      - id: ac-3
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PO-5 requires securing build systems, CI/CD infrastructure, and repositories
          to prevent unauthorized access. AC-3 (Access Enforcement) requires enforcing
          approved authorizations for logical access, which is the technical control
          mechanism PO-5 mandates for development environment protection.
      - id: si-4
        relationship: complements
        confidence: 0.80
        rationale: >
          PO-5 requires implementing logging and monitoring for development environments
          to detect anomalous activity and unauthorized access. SI-4 (System Monitoring)
          requires monitoring systems to detect attacks and unauthorized local, network,
          and remote connections — PO-5 extends this monitoring requirement specifically
          to development infrastructure.
      - id: au-6
        relationship: complements
        confidence: 0.73
        rationale: >
          PO-5 requires monitoring development environments and responding to anomalous
          activity. AU-6 (Audit Record Review, Analysis, and Reporting) requires
          reviewing and analyzing audit records for indicators of inappropriate or
          unusual activity — the analysis capability that makes PO-5's monitoring
          actionable.

  # ═══════════════════════════════════════════════════════════════════════════
  # PROTECT THE SOFTWARE (PS)
  # ═══════════════════════════════════════════════════════════════════════════

  # ───────────────────────────────────────────────────────────────────────────
  # PS-1: Protect All Forms of Code from Unauthorized Access
  # ───────────────────────────────────────────────────────────────────────────
  - source_control: ps-1
    target_controls:
      - id: ac-3
        relationship: implements
        confidence: 0.90
        rationale: >
          PS-1 requires protecting source code, executable code, and configuration-as-code
          from unauthorized access using access control, authentication, and authorization.
          AC-3 (Access Enforcement) requires enforcing approved authorizations for logical
          access to information and system resources — PS-1 applies AC-3 specifically to
          code repositories and development artifacts.
      - id: ac-6
        relationship: implements
        confidence: 0.88
        rationale: >
          PS-1 requires applying least privilege to code repository access, granting write
          access only to authorized personnel. AC-6 (Least Privilege) requires employing
          the principle of least privilege, allowing only authorized accesses necessary
          for assigned tasks — PS-1 is the direct application of AC-6 to code repositories.
      - id: cm-3
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          PS-1 requires branch protection rules, code reviews and approvals before merging,
          and commit signing for code integrity. CM-3 (Configuration Change Control)
          requires controlling changes to the system through formal change control
          processes including review, approval, and documentation — the exact workflow
          PS-1 mandates for code changes.
      - id: au-2
        relationship: complements
        confidence: 0.75
        rationale: >
          PS-1 requires audit logging for repository access and code changes. AU-2 (Event
          Logging) requires identifying events to be logged including access to security-
          relevant information, which encompasses the code repository audit events PS-1
          requires.
      - id: ia-2
        relationship: complements
        confidence: 0.73
        rationale: >
          PS-1 requires authentication and commit signing for all code contributors.
          IA-2 (Identification and Authentication) requires uniquely identifying and
          authenticating organizational users, providing the identity verification
          that PS-1 mandates for code repository access.

  # ───────────────────────────────────────────────────────────────────────────
  # PS-2: Provide a Mechanism for Verifying Software Release Integrity
  # ───────────────────────────────────────────────────────────────────────────
  - source_control: ps-2
    target_controls:
      - id: si-7
        relationship: implements
        confidence: 0.92
        rationale: >
          PS-2 requires cryptographically signing all software releases and providing
          verification mechanisms for integrity and authenticity. SI-7 (Software, Firmware,
          and Information Integrity) requires employing integrity verification tools to
          detect unauthorized changes to software and information — PS-2 implements SI-7
          specifically for the software release process.
      - id: sr-3
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          PS-2 requires generating provenance attestations documenting the build
          environment, inputs, and process for each release. SR-3 (Supply Chain Controls
          and Processes) requires supply chain controls to protect against supply chain
          risks — build provenance and artifact signing are key supply chain integrity
          controls that PS-2 implements within SR-3's scope.
      - id: sa-12
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PS-2 ensures software acquirers can verify that acquired software is legitimate
          and untampered. SA-12 (Supply Chain Protection) requires protecting against
          supply chain threats by employing security safeguards — artifact signing and
          provenance attestation are the specific safeguards PS-2 provides.
      - id: sc-13
        relationship: complements
        confidence: 0.78
        rationale: >
          PS-2 requires using cryptographic signatures, checksums, and strong hash
          functions (SHA-256+) for release integrity. SC-13 (Cryptographic Protection)
          requires implementing cryptography in accordance with applicable requirements
          — PS-2 applies SC-13's cryptographic controls to software release artifacts.

  # ───────────────────────────────────────────────────────────────────────────
  # PS-3: Archive and Protect Each Software Release
  # ───────────────────────────────────────────────────────────────────────────
  - source_control: ps-3
    target_controls:
      - id: au-11
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          PS-3 requires defining and implementing retention policies for archived releases
          aligned with regulatory and contractual requirements. AU-11 (Audit Record
          Retention) requires retaining audit records for an organization-defined time
          period — PS-3 extends the same retention governance to software release archives
          and their associated artifacts (SBOMs, provenance, signatures).
      - id: cp-9
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          PS-3 requires securely archiving each software release and protecting archives
          from unauthorized modification or deletion using immutable storage. CP-9
          (System Backup) requires conducting backups of system-level information and
          protecting backup confidentiality, integrity, and availability — PS-3 applies
          backup and protection principles specifically to software release artifacts.
      - id: cm-2
        relationship: complements
        confidence: 0.80
        rationale: >
          PS-3 requires archiving build configurations, source code at tagged versions,
          and dependency manifests alongside release artifacts. CM-2 (Baseline Configuration)
          requires maintaining baseline configurations — PS-3's archived release context
          preserves the configuration baselines that produced each release.
      - id: ac-3
        relationship: complements
        confidence: 0.75
        rationale: >
          PS-3 requires protecting archived releases from unauthorized modification or
          deletion using access controls. AC-3 (Access Enforcement) enforces approved
          authorizations for logical access, providing the access enforcement mechanism
          PS-3 requires for archive protection.

  # ═══════════════════════════════════════════════════════════════════════════
  # PRODUCE WELL-SECURED SOFTWARE (PW)
  # ═══════════════════════════════════════════════════════════════════════════

  # ───────────────────────────────────────────────────────────────────────────
  # PW-1: Design Software to Meet Security Requirements and Mitigate Risks
  # ───────────────────────────────────────────────────────────────────────────
  - source_control: pw-1
    target_controls:
      - id: sa-8
        relationship: implements
        confidence: 0.92
        rationale: >
          PW-1 requires applying secure design principles (least privilege, defense in
          depth, fail-safe defaults, separation of duties, minimal attack surface) to
          software architecture. SA-8 (Security and Privacy Engineering Principles)
          requires applying security and privacy engineering principles in the design,
          development, implementation, and modification of systems — PW-1 is the direct
          operational implementation of SA-8 for software.
      - id: ra-3
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          PW-1 requires using threat modeling methodologies (STRIDE, PASTA, Attack Trees)
          to identify threats and design mitigations. RA-3 (Risk Assessment) requires
          assessing security and privacy risks, considering threats and vulnerabilities
          — PW-1's threat modeling is the software-focused application of RA-3's risk
          assessment requirement.
      - id: ra-9
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PW-1 requires conducting attack surface analysis during the design phase.
          RA-9 (Criticality Analysis) requires identifying critical system components
          and functions — PW-1's attack surface analysis identifies the critical
          interfaces and components that RA-9 requires organizations to understand.
      - id: pl-8
        relationship: complements
        confidence: 0.80
        rationale: >
          PW-1 requires documenting security design decisions, threat models, and risk
          mitigations as part of architecture documentation. PL-8 (Security and Privacy
          Architectures) requires developing security architectures describing how
          security requirements are addressed — PW-1's design documentation contributes
          directly to the security architecture PL-8 mandates.

  # ───────────────────────────────────────────────────────────────────────────
  # PW-2: Review Software Design for Security Compliance
  # ───────────────────────────────────────────────────────────────────────────
  - source_control: pw-2
    target_controls:
      - id: sa-11
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          PW-2 requires conducting security-focused design reviews at key milestones and
          verifying that design addresses security requirements and threat mitigations.
          SA-11 (Developer Testing and Evaluation) requires developers to demonstrate
          execution of a plan for ongoing security assessments — design review is a
          critical assessment activity within SA-11's scope.
      - id: sa-17
        relationship: implements
        confidence: 0.88
        rationale: >
          PW-2 requires verifying that software design meets documented security
          requirements and adequately mitigates identified risks. SA-17 (Developer
          Security and Privacy Architecture and Design) requires developers to produce
          design specifications that are consistent with and supportive of the security
          architecture — PW-2's review process verifies this consistency.
      - id: ca-2
        relationship: complements
        confidence: 0.78
        rationale: >
          PW-2 requires design reviews with documented findings and tracked remediation,
          including re-review upon significant changes. CA-2 (Control Assessments)
          requires assessing controls and producing assessment reports — PW-2's design
          reviews function as pre-implementation control assessments.
      - id: sa-8
        relationship: derived-from
        confidence: 0.75
        rationale: >
          PW-2 reviews verify that design follows secure design principles. SA-8
          (Security and Privacy Engineering Principles) defines the engineering
          principles against which PW-2 reviews are conducted — PW-2's review criteria
          are derived from the principles SA-8 establishes.

  # ───────────────────────────────────────────────────────────────────────────
  # PW-4: Reuse Existing, Well-Secured Software When Feasible
  # ───────────────────────────────────────────────────────────────────────────
  - source_control: pw-4
    target_controls:
      - id: sr-3
        relationship: implements
        confidence: 0.90
        rationale: >
          PW-4 requires evaluating the security of third-party and open-source components
          before adoption and monitoring them for vulnerabilities. SR-3 (Supply Chain
          Controls and Processes) requires establishing processes to identify and address
          supply chain weaknesses — PW-4's component evaluation and monitoring directly
          implements SR-3's supply chain controls for software dependencies.
      - id: sa-4
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          PW-4 requires evaluating vulnerability history, maintenance status, and license
          compliance of components before adoption. SA-4 (Acquisition Process) requires
          including security requirements in acquisition contracts — PW-4 applies these
          acquisition security criteria to open-source and third-party component
          selection.
      - id: ra-5
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PW-4 requires monitoring all reused components for newly discovered
          vulnerabilities and remediating promptly. RA-5 (Vulnerability Monitoring and
          Scanning) requires monitoring and scanning for vulnerabilities — PW-4's
          continuous component monitoring is the software composition analysis
          specialization of RA-5.
      - id: cm-2
        relationship: complements
        confidence: 0.75
        rationale: >
          PW-4 requires maintaining a curated catalog of approved components and
          tracking all dependencies through SBOMs. CM-2 (Baseline Configuration)
          requires documenting baseline configurations — PW-4's component inventory
          and SBOM are part of the software baseline CM-2 governs.

  # ───────────────────────────────────────────────────────────────────────────
  # PW-5: Create Source Code by Adhering to Secure Coding Practices
  # ───────────────────────────────────────────────────────────────────────────
  - source_control: pw-5
    target_controls:
      - id: sa-15
        relationship: implements
        confidence: 0.92
        rationale: >
          PW-5 requires following secure coding practices including OWASP guidelines,
          CERT standards, and language-specific best practices, plus prohibiting banned
          functions. SA-15 (Development Process, Standards, and Tools) requires
          organizations to determine acceptable development standards and require
          developers to follow them — PW-5 is the direct implementation of SA-15's
          coding standards requirement.
      - id: sa-11
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          PW-5 requires implementing input validation, output encoding, parameterized
          queries, and secure error handling to prevent common vulnerability classes.
          SA-11 (Developer Testing and Evaluation) requires security testing and
          evaluation activities — PW-5's adherence to secure coding practices is
          verified through the testing SA-11 mandates.
      - id: si-10
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PW-5 explicitly requires implementing input validation to prevent injection
          and other input-related vulnerabilities. SI-10 (Information Input Validation)
          requires checking the validity of information inputs — PW-5 mandates the
          specific secure coding techniques that implement SI-10 at the application
          level.
      - id: si-11
        relationship: complements
        confidence: 0.75
        rationale: >
          PW-5 requires proper error handling as a secure coding practice. SI-11
          (Error Handling) requires generating error messages that provide necessary
          information without revealing exploitable details — PW-5's secure error
          handling practices implement SI-11's requirements in application code.

  # ───────────────────────────────────────────────────────────────────────────
  # PW-6: Configure Compilation, Interpreter, and Build Processes
  # ───────────────────────────────────────────────────────────────────────────
  - source_control: pw-6
    target_controls:
      - id: sa-15
        relationship: implements
        confidence: 0.90
        rationale: >
          PW-6 requires configuring compilation and build processes with security
          hardening flags (stack canaries, ASLR, PIE, CFI). SA-15 (Development Process,
          Standards, and Tools) requires determining acceptable development tools and
          tool configurations — PW-6's compiler hardening configuration requirements
          are a direct specialization of SA-15's tool configuration mandate.
      - id: si-7
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          PW-6 requires reproducible builds to enable independent verification of build
          integrity. SI-7 (Software, Firmware, and Information Integrity) requires
          integrity verification — PW-6's reproducible builds enable the verifiable
          correspondence between source and binary that SI-7's integrity verification
          demands.
      - id: cm-6
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          PW-6 requires enabling compiler security features and treating security-relevant
          warnings as errors. CM-6 (Configuration Settings) requires establishing and
          enforcing mandatory configuration settings for IT products — PW-6's compiler
          and build hardening flags are security configuration settings within CM-6's
          scope.
      - id: cm-2
        relationship: complements
        confidence: 0.75
        rationale: >
          PW-6 requires documented, reproducible build processes managed as code. CM-2
          (Baseline Configuration) requires maintaining baseline configurations under
          configuration control — PW-6's build configurations are part of the system
          baseline CM-2 governs.

  # ───────────────────────────────────────────────────────────────────────────
  # PW-7: Review and/or Analyze Human-Readable Code
  # ───────────────────────────────────────────────────────────────────────────
  - source_control: pw-7
    target_controls:
      - id: sa-11
        relationship: implements
        confidence: 0.92
        rationale: >
          PW-7 requires reviewing and analyzing code using peer review and automated
          SAST, including IaC scanning for misconfigurations. SA-11 (Developer Testing
          and Evaluation) requires developers to employ static analysis tools, conduct
          code reviews, and demonstrate security assessment plan execution — PW-7
          is the primary implementation vehicle for SA-11's static analysis and review
          requirements.
      - id: sa-15
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PW-7 requires configuring and maintaining SAST tools and code review processes
          within the development workflow. SA-15 (Development Process, Standards, and
          Tools) governs the development tools and processes that PW-7's code analysis
          toolchain implements.
      - id: ra-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          PW-7 uses SAST to identify security vulnerabilities in source code before
          release. RA-5 (Vulnerability Monitoring and Scanning) requires scanning for
          vulnerabilities — SAST is a pre-deployment vulnerability scanning method
          within RA-5's scope.
      - id: cm-6
        relationship: complements
        confidence: 0.73
        rationale: >
          PW-7 requires analyzing IaC, configuration files, and deployment scripts for
          security misconfigurations. CM-6 (Configuration Settings) mandates establishing
          security configuration settings — PW-7's IaC scanning verifies compliance with
          the configuration requirements CM-6 defines.

  # ───────────────────────────────────────────────────────────────────────────
  # PW-8: Test Executable Code
  # ───────────────────────────────────────────────────────────────────────────
  - source_control: pw-8
    target_controls:
      - id: sa-11
        relationship: implements
        confidence: 0.92
        rationale: >
          PW-8 requires DAST, fuzz testing, and penetration testing of executable code.
          SA-11 (Developer Testing and Evaluation) requires developers to employ dynamic
          analysis, fuzz testing, and penetration testing as part of security assessment
          — PW-8 directly implements SA-11's dynamic testing requirements.
      - id: ca-8
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          PW-8 requires penetration testing on high-risk applications before release and
          on a recurring basis. CA-8 (Penetration Testing) requires conducting penetration
          testing at an organization-defined frequency — PW-8's pre-release penetration
          testing for software directly fulfills CA-8 within the development lifecycle.
      - id: ra-5
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PW-8 requires DAST scanning on running applications to identify runtime
          vulnerabilities. RA-5 (Vulnerability Monitoring and Scanning) requires scanning
          for vulnerabilities using tools and techniques — DAST is a runtime vulnerability
          scanning method within RA-5's scope.
      - id: si-6
        relationship: complements
        confidence: 0.75
        rationale: >
          PW-8 requires testing to verify compliance with security requirements. SI-6
          (Security and Privacy Function Verification) requires verifying the correct
