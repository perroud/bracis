id: anvisa-bpf_to_anvisa-134
title: "ANVISA BPF (Boas Práticas de Fabricação) to ANVISA IN 134 Control Mapping"
source_framework: anvisa-bpf
target_framework: anvisa-134
version: "1.0.0"
last_updated: "2026-04-06"
methodology: structural
description: >
  Mapeamento entre os controles de sistemas computadorizados da RDC de Boas Práticas
  de Fabricação (ANVISA-BPF) e a Instrução Normativa nº 134 da ANVISA (ANVISA-134),
  que estabelece requisitos complementares de sistemas computadorizados para fabricação
  de medicamentos. O ANVISA-BPF foca em controles operacionais de integridade de dados,
  validação de sistemas, trilhas de auditoria, controle de acesso e infraestrutura,
  enquanto o ANVISA-134 detalha os artigos regulatórios formais para cada domínio.
  A sobreposição é elevada porque ambos regulam sistemas computadorizados em ambiente
  farmacêutico GMP, com o ANVISA-134 servindo como regulamentação detalhada e o
  ANVISA-BPF como controles derivados de implementação.

mappings:
  # ──────────────────────────────────────────────────
  # FAMÍLIA: integridade (bpf-1 a bpf-4)
  # ──────────────────────────────────────────────────

  - source_control: bpf-1
    target_controls:
      - id: art-23
        relationship: equivalent-to
        confidence: 0.97
        rationale: >
          BPF-1 (ALCOA+ Principles for Manufacturing Data) e art-23 (Princípios de
          Integridade de Dados ALCOA+) são equivalentes: ambos exigem que todos os
          dados GMP atendam aos princípios ALCOA+ — Atribuível, Legível, Contemporâneo,
          Original, Preciso, Completo, Consistente, Durável e Disponível — com
          controles técnicos e procedurais para garantir cumprimento simultâneo.
      - id: art-1
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          BPF-1 intersecta com art-1 (Objeto e Escopo) porque ambos definem o escopo
          de aplicação a todos os sistemas computadorizados que afetam qualidade do
          produto, segurança do paciente e integridade de dados.
      - id: art-25
        relationship: complements
        confidence: 0.82
        rationale: >
          BPF-1 complementa art-25 (Registros Eletrônicos) pois os princípios ALCOA+
          de dados de fabricação fundamentam os requisitos de integridade, rastreabilidade
          e retenção que registros eletrônicos devem cumprir.

  - source_control: bpf-2
    target_controls:
      - id: art-21
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          BPF-2 (Raw Data Management and True Copies) e art-21 (Impressão de Dados e
          Cópias Eletrônicas) são equivalentes: ambos exigem que cópias de registros
          eletrônicos sejam verificáveis contra o original, com checksums/hashes
          criptográficos, preservação de metadados e trilha de auditoria, e
          procedimento documentado de certificação.
      - id: art-23
        relationship: complements
        confidence: 0.80
        rationale: >
          A gestão de dados brutos do BPF-2 complementa os princípios ALCOA+ do
          art-23, pois a preservação de raw data em formato original é componente
          essencial do princípio "Original" do ALCOA+.

  - source_control: bpf-3
    target_controls:
      - id: art-25
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          BPF-3 (Electronic Batch Records) e art-25 (Registros Eletrônicos) são
          equivalentes: ambos regulam o uso de registros eletrônicos como substitutos
          de papel em ambiente GMP, exigindo integridade, rastreabilidade, proteção
          contra adulteração e associação com trilha de auditoria completa.
      - id: art-22
        relationship: complements
        confidence: 0.85
        rationale: >
          BPF-3 complementa art-22 (Entrada Manual de Dados e Verificação) porque
          o eBR exige que dados inseridos manualmente sejam verificados por segunda
          pessoa ou controles automatizados, alinhando-se aos controles de dupla
          conferência do art-22.
      - id: art-19
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          BPF-3 intersecta com art-19 (Trilha de Auditoria) porque o eBR deve manter
          trilha de auditoria como parte integrante do registro eletrônico de lote,
          registrando todas as ações de criação, modificação e exclusão.

  - source_control: bpf-4
    target_controls:
      - id: art-26
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          BPF-4 (Electronic Signatures for Manufacturing Records) e art-26 (Assinatura
          Eletrônica) são equivalentes: ambos exigem que assinaturas eletrônicas sejam
          equivalentes a manuscritas, vinculadas de forma inseparável ao registro e ao
          signatário, únicas, intransferíveis, com autenticação no momento da assinatura,
          incluindo identidade, data/hora e significado da assinatura.
      - id: art-17
        relationship: complements
        confidence: 0.75
        rationale: >
          BPF-4 complementa art-17 (Controle de Acesso e Autenticação) porque a
          autenticação exigida para assinatura eletrônica depende diretamente dos
          mecanismos de controle de acesso e identificação única do art-17.

  # ──────────────────────────────────────────────────
  # FAMÍLIA: sistemas (bpf-5 a bpf-8)
  # ──────────────────────────────────────────────────

  - source_control: bpf-5
    target_controls:
      - id: art-9
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          BPF-5 (Computerized System Validation Lifecycle) e art-9 (Plano Mestre de
          Validação) são equivalentes: ambos exigem abordagem de ciclo de vida para
          validação de sistemas computadorizados, com plano mestre contendo inventário,
          classificação, estratégia por categoria, cronograma, critérios de aceitação
          e funções/responsabilidades.
      - id: art-11
        relationship: implements
        confidence: 0.88
        rationale: >
          BPF-5 implementa art-11 (Qualificação de Instalação — IQ) como uma das
          fases do ciclo de vida de validação, verificando que o sistema está
          instalado conforme especificações.
      - id: art-12
        relationship: implements
        confidence: 0.88
        rationale: >
          BPF-5 implementa art-12 (Qualificação de Operação — OQ) como fase do
          ciclo de vida, verificando que o sistema opera conforme especificações
          funcionais.
      - id: art-13
        relationship: implements
        confidence: 0.88
        rationale: >
          BPF-5 implementa art-13 (Qualificação de Performance — PQ) como fase do
          ciclo de vida, verificando que o sistema opera de forma consistente em
          condições reais de produção.
      - id: art-16
        relationship: implements
        confidence: 0.85
        rationale: >
          BPF-5 implementa art-16 (Relatório de Validação e Liberação do Sistema)
          como etapa final do ciclo de vida, exigindo relatório que consolide
          resultados de todas as fases de qualificação.
      - id: art-10
        relationship: complements
        confidence: 0.82
        rationale: >
          BPF-5 complementa art-10 (Especificação de Requisitos de Usuário) pois
          a URS é a primeira etapa do ciclo de vida de validação, definindo funções,
          dados, interfaces e requisitos regulatórios.

  - source_control: bpf-6
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          BPF-6 (Risk-Based System Classification) e art-5 (Classificação de Sistemas
          Computadorizados) são equivalentes: ambos exigem classificação conforme
          criticidade usando metodologia baseada em risco (GAMP 5), considerando
          impacto nos atributos críticos de qualidade, segurança do paciente e
          integridade de dados, com aprovação pela unidade da qualidade.
      - id: art-4
        relationship: complements
        confidence: 0.88
        rationale: >
          BPF-6 complementa art-4 (Avaliação de Risco) pois a classificação baseada
          em risco é derivada diretamente da avaliação de risco documentada, usando
          metodologias como FMEA ou HACCP.
      - id: art-6
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          BPF-6 intersecta com art-6 (Abordagem Baseada em Risco para Ciclo de Vida)
          porque a classificação de risco determina a extensão da validação e os
          controles aplicáveis a cada sistema.

  - source_control: bpf-7
    target_controls:
      - id: art-29
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          BPF-7 (Change Management for Computerized Systems) e art-29 (Controle de
          Mudanças em Sistemas Computadorizados) são equivalentes: ambos exigem
          processo formal que avalie impacto na validação, integridade de dados e
          qualidade do produto, com descrição, justificativa, avaliação de risco,
          aprovação pela Garantia da Qualidade, plano de testes, plano de reversão
          e documentação de evidências.
      - id: art-15
        relationship: complements
        confidence: 0.75
        rationale: >
          BPF-7 complementa art-15 (Revalidação Periódica) porque mudanças
          implementadas desde a última validação devem ser revisadas como parte
          do processo de revalidação periódica.

  - source_control: bpf-8
    target_controls:
      - id: art-32
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          BPF-8 (Supplier Qualification for Computerized Systems) e art-32
          (Qualificação de Fornecedores de Sistemas e Serviços) são equivalentes:
          ambos exigem qualificação de fornecedores de sistemas, serviços de TI,
          hospedagem e nuvem, avaliando sistema de qualidade, competência técnica,
          processos de desenvolvimento, capacidade de suporte, segurança da
          informação e conformidade regulatória.
      - id: art-3
        relationship: complements
        confidence: 0.78
        rationale: >
          BPF-8 complementa art-3 (Responsabilidades do Detentor do Registro e
          Fabricante) porque a responsabilidade por sistemas operados por terceiros
          exige qualificação formal e acordos que definam responsabilidades de cada
          parte em relação à integridade de dados e validação.

  # ──────────────────────────────────────────────────
  # FAMÍLIA: audit-trail (bpf-9 a bpf-12)
  # ──────────────────────────────────────────────────

  - source_control: bpf-9
    target_controls:
      - id: art-19
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          BPF-9 (Mandatory Audit Trail for GMP Records) e art-19 (Trilha de
          Auditoria) são equivalentes: ambos exigem trilha de auditoria automática,
          inalterável e cronológica, registrando identidade do usuário, data/hora,
          tipo de ação, valor anterior e posterior, e motivo da alteração, protegida
          contra desativação, modificação ou exclusão por qualquer usuário.
      - id: art-23
        relationship: complements
        confidence: 0.72
        rationale: >
          BPF-9 complementa art-23 (Princípios ALCOA+) porque a trilha de auditoria
          é mecanismo essencial para garantir os princípios de Atribuível, Contemporâneo
          e Consistente do ALCOA+.

  - source_control: bpf-10
    target_controls:
      - id: art-19
        relationship: complements
        confidence: 0.85
        rationale: >
          BPF-10 (Audit Trail Review Procedures) complementa art-19 (Trilha de
          Auditoria): o art-19 exige a criação e registro da trilha, enquanto BPF-10
          detalha o processo obrigatório de revisão como parte da aprovação de
          registros de produção, definindo responsáveis, frequência, critérios de
          anomalias e documentação da revisão.
      - id: art-35
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          BPF-10 intersecta com art-35 (Auditoria de Sistemas Computadorizados)
          porque a revisão de trilhas de auditoria é um dos itens verificados
          durante auditorias internas de integridade de dados.

  - source_control: bpf-11
    target_controls:
      - id: art-27
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          BPF-11 (Audit Trail Retention and Archival) e art-27 (Retenção e
          Arquivamento de Dados) são equivalentes: ambos exigem preservação por
          período regulatório, legibilidade e pesquisabilidade durante todo o
          período de retenção, procedimento de migração que preserve integridade,
          verificação periódica de legibilidade e plano para obsolescência
          tecnológica.
      - id: art-19
        relationship: derived-from
        confidence: 0.80
        rationale: >
          BPF-11 é derivado do art-19 (Trilha de Auditoria) porque a trilha criada
          conforme art-19 deve ser retida conforme os requisitos de período de
          retenção de registros de BPF.

  - source_control: bpf-12
    target_controls:
      - id: art-20
        relationship: equivalent-to
        confidence: 0.88
        rationale: >
          BPF-12 (Audit Trail Protection and Tamper Evidence) e art-20 (Proteção
          contra Acesso Não Autorizado) são equivalentes no domínio de proteção de
          trilhas de auditoria: ambos exigem controles técnicos contra adulteração,
          armazenamento append-only, separação lógica/física, controles de acesso
          independentes e mecanismos de detecção de adulteração (hashes
          criptográficos, cadeia de hashes).
      - id: art-19
        relationship: complements
        confidence: 0.85
        rationale: >
          BPF-12 complementa art-19 (Trilha de Auditoria) porque a proteção contra
          adulteração é requisito complementar à criação da trilha — art-19 define
          o que registrar, BPF-12 define como proteger o que foi registrado.

  # ──────────────────────────────────────────────────
  # FAMÍLIA: acesso (bpf-13 a bpf-16)
  # ──────────────────────────────────────────────────

  - source_control: bpf-13
    target_controls:
      - id: art-18
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          BPF-13 (Role-Based Access Control for GMP Systems) e art-18 (Níveis de
          Acesso e Segregação de Funções) são equivalentes: ambos exigem perfis de
          acesso baseados em função, matriz de acesso documentada e aprovada pela
          unidade da qualidade, segregação entre funções de desenvolvimento/operação,
          produção/controle de qualidade e administração/uso, com revisão periódica.
      - id: art-17
        relationship: complements
        confidence: 0.82
        rationale: >
          BPF-13 complementa art-17 (Controle de Acesso e Autenticação) porque os
          perfis role-based são implementados sobre os mecanismos de identificação
          única e autenticação exigidos pelo art-17.

  - source_control: bpf-14
    target_controls:
      - id: art-17
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          BPF-14 (User Authentication and Password Policy) e art-17 (Controle de
          Acesso e Autenticação) são equivalentes: ambos exigem identificação única,
          autenticação por senha ou equivalente, bloqueio após tentativas falhas,
          expiração periódica de senhas, desconexão por inatividade e proibição de
          compartilhamento de credenciais.
      - id: art-20
        relationship: complements
        confidence: 0.78
        rationale: >
          BPF-14 complementa art-20 (Proteção contra Acesso Não Autorizado) porque
          a política de senhas e autenticação multifator são mecanismos de proteção
          contra acesso não autorizado exigidos pelo art-20.

  - source_control: bpf-15
    target_controls:
      - id: art-17
        relationship: complements
        confidence: 0.85
        rationale: >
          BPF-15 (User Lifecycle Management) complementa art-17 (Controle de Acesso
          e Autenticação) ao detalhar o ciclo de vida completo de usuários: criação
          de contas com solicitação formal, aprovação da Garantia da Qualidade,
          verificação de treinamento, revisão periódica de acessos, desativação
          de contas inativas e revogação em caso de desligamento.
      - id: art-18
        relationship: complements
        confidence: 0.80
        rationale: >
          BPF-15 complementa art-18 (Níveis de Acesso e Segregação de Funções) ao
          definir o processo de atribuição e revisão de perfis de acesso ao longo
          do ciclo de vida do usuário.

  - source_control: bpf-16
    target_controls:
      - id: art-18
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          BPF-16 (Segregation of Duties for Critical Operations) e art-18 (Níveis
          de Acesso e Segregação de Funções) são equivalentes no domínio de SoD:
          ambos exigem que nenhum indivíduo execute e aprove a mesma operação
          crítica, com matriz de segregação documentada, implementada tecnicamente
          e validada, cobrindo operações como fabricação/liberação, análise/aprovação,
          criação/aprovação de documentos.
      - id: art-17
        relationship: complements
        confidence: 0.72
        rationale: >
          BPF-16 complementa art-17 (Controle de Acesso e Autenticação) porque a
          segregação de funções depende da identificação única de cada usuário
          para garantir enforcement técnico.

  # ──────────────────────────────────────────────────
  # FAMÍLIA: infra (bpf-17 a bpf-20)
  # ──────────────────────────────────────────────────

  - source_control: bpf-17
    target_controls:
      - id: art-11
        relationship: equivalent-to
        confidence: 0.88
        rationale: >
          BPF-17 (IT Infrastructure Qualification for GMP Systems) e art-11
          (Qualificação de Instalação — IQ) são equivalentes: ambos exigem
          qualificação de instalação verificando que componentes de hardware,
          software, rede e configurações estão instalados conforme especificações,
          com documentação de baseline de configuração.
      - id: art-12
        relationship: complements
        confidence: 0.85
        rationale: >
          BPF-17 complementa art-12 (Qualificação de Operação — OQ) ao incluir
          qualificação operacional da infraestrutura verificando operação correta
          sob condições normais e de estresse.
      - id: art-13
        relationship: complements
        confidence: 0.82
        rationale: >
          BPF-17 complementa art-13 (Qualificação de Performance — PQ) ao incluir
          verificação de que a infraestrutura suporta a carga de trabalho real com
          desempenho aceitável.

  - source_control: bpf-18
    target_controls:
      - id: art-24
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          BPF-18 (Data Backup and Recovery) e art-24 (Backup e Recuperação de
          Dados) são equivalentes: ambos exigem procedimento documentado definindo
          frequência conforme criticidade, tipo de backup (completo/incremental/
          diferencial), local de armazenamento incluindo cópia offsite, período
          de retenção, verificação de integridade e responsáveis pela execução
          e monitoramento.

  - source_control: bpf-19
    target_controls:
      - id: art-30
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          BPF-19 (Business Continuity and Disaster Recovery for GMP Operations) e
          art-30 (Plano de Contingência e Continuidade) são equivalentes: ambos
          exigem plano documentado com identificação de sistemas críticos, análise
          de impacto no negócio, procedimentos alternativos para continuidade de
          operações GMP, critérios de ativação, funções e responsabilidades,
          requisitos de integridade de dados durante contingência e procedimentos
          de retorno à normalidade.
      - id: art-33
        relationship: complements
        confidence: 0.75
        rationale: >
          BPF-19 complementa art-33 (Gestão de Incidentes e Problemas) porque
          incidentes graves podem acionar o plano de contingência, e a gestão de
          incidentes alimenta a análise de cenários de falha para revisão do
          plano de DR.

  - source_control: bpf-20
    target_controls:
      - id: art-31
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          BPF-20 (System Decommissioning and Data Migration) e art-31 (Descontinuação
          de Sistemas Computadorizados) são equivalentes: ambos exigem processo
          formal com inventário de dados regulatórios, plano de migração/arquivamento
          com validação de integridade, verificação de completude dos dados migrados,
          preservação de trilhas de auditoria, desativação segura de acessos e
          documentação do processo.
      - id: art-27
        relationship: complements
        confidence: 0.82
        rationale: >
          BPF-20 complementa art-27 (Retenção e Arquivamento de Dados) porque a
          desativação de sistemas exige que dados migrados continuem cumprindo os
          requisitos de retenção e acessibilidade durante todo o período regulatório.
      - id: art-34
        relationship: intersects-with
        confidence: 0.72
        rationale: >
          BPF-20 intersecta com art-34 (Documentação do Ciclo de Vida de Sistemas)
          porque a desativação é a fase final do ciclo de vida que deve ser
          documentada, incluindo atualização do inventário de sistemas.

