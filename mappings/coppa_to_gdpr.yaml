id: coppa_to_gdpr
title: "COPPA to GDPR Control Mapping"
source_framework: coppa
target_framework: gdpr
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # ──────────────────────────────────────────────────────
  # FAMILY: consent
  # ──────────────────────────────────────────────────────

  - source_control: coppa-verifiable-consent
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          COPPA verifiable parental consent (16 CFR §312.5(a)) and GDPR Art. 6
          both establish lawful bases for processing personal data. COPPA requires
          affirmative parental verification before any collection from children,
          while GDPR Art. 6 defines six legal bases for processing, with consent
          (Art. 6(1)(a)) being one. GDPR Art. 8 (not yet in project) is the
          direct counterpart for children's consent, but Art. 6 provides the
          overarching lawful processing framework that COPPA's consent requirement
          maps into. Both require consent to be specific, informed, and prior to
          collection.
      - id: art-5
        relationship: complements
        confidence: 0.70
        rationale: >
          COPPA's VPC requirement reinforces GDPR Art. 5(1)(a) lawfulness,
          fairness, and transparency principles. The requirement that consent be
          obtained before collection and cover specific practices aligns with
          Art. 5(1)(b) purpose limitation. Both frameworks require the data
          subject (or their parent/guardian) to understand and authorize the
          processing before it occurs.

  - source_control: coppa-consent-methods
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          COPPA's approved VPC methods (16 CFR §312.5(b)) — credit card,
          government ID, KBA, video conference, email-plus — prescribe specific
          verification mechanisms to ensure the consenting party is the parent.
          GDPR Art. 6 requires consent to be verifiable but does not prescribe
          specific methods. COPPA is more prescriptive in its approach to consent
          verification, while GDPR leaves implementation to the controller. Both
          share the objective of ensuring the person providing consent has the
          authority to do so, especially for children (GDPR Art. 8(2) reference).
      - id: art-32
        relationship: complements
        confidence: 0.55
        rationale: >
          COPPA consent methods that involve collecting government IDs or credit
          card information create security obligations that align with GDPR
          Art. 32 security of processing. The requirement to delete government
          IDs promptly after verification and to secure payment transactions
          during consent flows reflects Art. 32's mandate for appropriate
          technical and organisational security measures.

  - source_control: coppa-consent-exceptions
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          COPPA consent exceptions (16 CFR §312.5(c)) define narrow circumstances
          where parental consent is not required — internal operations, one-time
          responses, safety, and consent-seeking. These map conceptually to GDPR
          Art. 6(1)(b) contract performance, Art. 6(1)(d) vital interests, and
          Art. 6(1)(f) legitimate interests, which provide alternative lawful
          bases beyond consent. Both frameworks recognize that not all processing
          requires explicit consent, but both constrain the exceptions narrowly.
      - id: art-5
        relationship: complements
        confidence: 0.65
        rationale: >
          COPPA's requirement that exceptions be narrowly construed and that data
          collected under exceptions be deleted when no longer needed aligns with
          GDPR Art. 5(1)(b) purpose limitation and Art. 5(1)(e) storage
          limitation. Both frameworks restrict the use of exception-based
          processing to the specific purpose that justified the exception.

  # ──────────────────────────────────────────────────────
  # FAMILY: notice
  # ──────────────────────────────────────────────────────

  - source_control: coppa-direct-notice
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          COPPA's direct notice requirement (16 CFR §312.4(c)) — requiring
          operators to notify parents before collection with specific details
          about data types, uses, and consent mechanisms — directly implements
          GDPR Art. 5(1)(a) transparency principle. Both mandate that data
          subjects (or their guardians) receive clear, specific information about
          processing before it occurs.
      - id: art-6
        relationship: complements
        confidence: 0.65
        rationale: >
          COPPA direct notice is a precondition to obtaining lawful consent,
          paralleling GDPR Art. 6(1)(a) which requires consent to be informed.
          Under both frameworks, consent obtained without adequate prior notice
          is invalid. COPPA prescribes six specific elements the notice must
          contain, while GDPR Art. 13/14 (not yet in project) detail the
          information requirements more extensively.

  - source_control: coppa-privacy-policy
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          COPPA's online privacy policy requirement (16 CFR §312.4(b)) maps
          strongly to GDPR Art. 5(1)(a) transparency principle. Both require
          controllers to publicly document their data processing practices in
          clear, accessible language. COPPA mandates specific disclosures
          (operator identity, data types, uses, third-party sharing, parental
          rights), which directly parallel the transparency and accountability
          obligations under Art. 5(1)(a) and Art. 5(2).
      - id: art-30
        relationship: complements
        confidence: 0.60
        rationale: >
          COPPA's requirement to disclose all categories of PI collected, all
          uses, and all third-party recipients in the privacy policy overlaps
          with GDPR Art. 30 records of processing activities. While Art. 30
          focuses on internal documentation for supervisory authorities and COPPA
          focuses on public-facing disclosure, both require systematic cataloging
          of processing activities, purposes, data categories, and recipients.

  # ──────────────────────────────────────────────────────
  # FAMILY: obligations
  # ──────────────────────────────────────────────────────

  - source_control: coppa-data-minimization
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          COPPA data minimization (16 CFR §312.7, §312.3(c), §312.8) — requiring
          operators to collect only what is reasonably necessary for the child to
          participate in the activity — is functionally equivalent to GDPR
          Art. 5(1)(c) data minimisation principle, which requires data to be
          adequate, relevant, and limited to what is necessary. Both impose a
          necessity test on every piece of personal data collected. COPPA is
          arguably stricter because it applies the test per-activity for
          vulnerable data subjects (children).
      - id: art-25
        relationship: complements
        confidence: 0.75
        rationale: >
          COPPA's data minimization requirement aligns with GDPR Art. 25 data
          protection by design and by default, which mandates that controllers
          implement technical and organisational measures to ensure only necessary
          personal data are processed by default. Both require minimization to be
          built into system design, not merely a policy aspiration.

  - source_control: coppa-retention
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          COPPA retention limitation (16 CFR §312.10) — requiring operators to
          retain children's PI only as long as reasonably necessary for the
          collection purpose — is functionally equivalent to GDPR Art. 5(1)(e)
          storage limitation principle, which requires data to be kept in
          identifiable form for no longer than necessary. Both mandate
          purpose-linked retention periods and secure deletion when the purpose
          is fulfilled. Both require the controller to define and enforce
          retention schedules.
      - id: art-17
        relationship: complements
        confidence: 0.70
        rationale: >
          COPPA's retention limitation complements GDPR Art. 17 right to erasure.
          While Art. 17 provides a data-subject-initiated right to deletion,
          COPPA §312.10 imposes an affirmative controller obligation to delete
          regardless of whether a request is made. Together they create both
          proactive (controller-driven) and reactive (subject-driven) deletion
          obligations.

  - source_control: coppa-security
    target_controls:
      - id: art-32
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          COPPA security requirement (16 CFR §312.8) — mandating reasonable
          procedures to protect confidentiality, security, and integrity of
          children's PI — is functionally equivalent to GDPR Art. 32 security
          of processing. Both require risk-appropriate technical and
          organisational measures including encryption, access controls,
          availability assurance, and regular security testing. Both apply a
          reasonableness standard proportional to the sensitivity of the data.
          Children's data receives heightened protection under both frameworks.
      - id: art-5
        relationship: complements
        confidence: 0.75
        rationale: >
          COPPA security obligations reinforce GDPR Art. 5(1)(f) integrity and
          confidentiality principle, which requires processing to ensure
          appropriate security including protection against unauthorised or
          unlawful processing and accidental loss, destruction, or damage. Both
          establish security as a fundamental processing principle, not merely a
          technical requirement.

  - source_control: coppa-third-party
    target_controls:
      - id: art-28
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          COPPA third-party obligations (16 CFR §312.2, §312.8, §312.4(b)(4)) —
          requiring operators to ensure third parties maintain confidentiality,
          security, and integrity of children's PI — are functionally equivalent
          to GDPR Art. 28 processor obligations. Both require: contractual
          provisions binding third parties, due diligence assessments of third
          parties' capabilities, restrictions on data use, security requirements,
          and audit rights. Both hold the primary controller/operator responsible
          for third-party actions.
      - id: art-5
        relationship: complements
        confidence: 0.65
        rationale: >
          COPPA's requirement to disclose third-party recipients in the privacy
          policy and to limit third-party data use to disclosed purposes aligns
          with GDPR Art. 5(1)(a) transparency and Art. 5(1)(b) purpose
          limitation. Both frameworks require transparency about data sharing
          and restrict third parties to the purposes communicated to the data
          subject.

  - source_control: coppa-safe-harbor
    target_controls:
      - id: art-25
        relationship: intersects-with
        confidence: 0.60
        rationale: >
          COPPA safe harbor programs (16 CFR §312.11) — FTC-approved
          self-regulatory programs that provide a compliance framework with
          independent oversight — intersect with GDPR Art. 25(3), which allows
          approved certification mechanisms to demonstrate compliance with data
          protection by design requirements. Both recognize that third-party
          certification or self-regulatory programs can serve as evidence of
          compliance, though the mechanisms differ (FTC approval vs. EU
          certification bodies).
      - id: art-5
        relationship: complements
        confidence: 0.55
        rationale: >
          COPPA safe harbor programs' requirements for independent assessment,
          disciplinary mechanisms, and annual reporting to the FTC parallel GDPR
          Art. 5(2) accountability principle, which requires controllers to
          demonstrate compliance. Both frameworks provide structured mechanisms
          for demonstrating and verifying ongoing compliance beyond mere
          self-attestation.

  # ──────────────────────────────────────────────────────
  # FAMILY: rights
  # ──────────────────────────────────────────────────────

  - source_control: coppa-parent-access
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          COPPA parent access right (16 CFR §312.6(a)) — granting parents the
          right to review specific personal information collected from their
          child — is functionally equivalent to GDPR Art. 15 right of access.
          Both grant the data subject (or their parent/guardian) the right to
          obtain confirmation of processing and access to actual personal data.
          Both require the controller to verify the requestor's identity before
          providing access and to respond free of charge. GDPR Art. 15 is
          broader in scope, including information about automated decision-making,
          data sources, and international transfers.

  - source_control: coppa-parent-revoke
    target_controls:
      - id: art-17
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          COPPA parent revocation right (16 CFR §312.6(a)(2)) — allowing parents
          to revoke consent, stop further collection, and direct deletion of
          their child's PI — is functionally equivalent to GDPR Art. 17 right
          to erasure. Both grant the right to demand deletion of personal data,
          both require the controller to propagate deletion to third parties who
          received the data, and both must be fulfilled without undue delay.
          COPPA's revocation right is unconditional for parental requests, while
          GDPR Art. 17 includes specific grounds and exceptions.
      - id: art-6
        relationship: complements
        confidence: 0.65
        rationale: >
          COPPA's consent revocation parallels GDPR Art. 6(1)(a) consent
          withdrawal. Under both frameworks, when consent is the legal basis for
          processing and consent is withdrawn, the controller must cease
          processing. GDPR explicitly states that withdrawal of consent does not
          affect the lawfulness of processing based on consent before withdrawal
          (Art. 7(3)), a nuance COPPA does not address directly.

  - source_control: coppa-no-conditioning
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.80
        rationale: >
          COPPA's prohibition on conditioning participation on excessive
          collection (16 CFR §312.7) is functionally equivalent to GDPR
          Art. 5(1)(c) data minimisation. Both prohibit collecting more personal
          data than is necessary for the specific purpose. COPPA is more explicit
          about the anti-manipulation dimension — prohibiting operators from
          using prizes, games, or feature gating to induce children to provide
          unnecessary PI — while GDPR states the principle broadly. Both require
          a per-purpose necessity analysis.
      - id: art-25
        relationship: complements
        confidence: 0.70
        rationale: >
          COPPA's anti-conditioning requirement aligns with GDPR Art. 25(2) data
          protection by default, which requires that by default only necessary
          personal data are processed and that data is not made accessible
          without the individual's intervention. Both mandate that systems be
          designed to collect the minimum data by default, preventing coercive or
          manipulative collection patterns.

  # ──────────────────────────────────────────────────────
  # FAMILY: enforcement
  # ──────────────────────────────────────────────────────

  - source_control: coppa-penalties
    target_controls:
      - id: art-83
        relationship: equivalent-to
        confidence: 0.80
        rationale: >
          COPPA civil penalties (up to $50,120 per violation per the FTC Act,
          15 U.S.C. §45) map to GDPR Art. 83 administrative fines (up to EUR 20M
          or 4% of global turnover). Both establish significant financial
          penalties for non-compliance, both consider factors like severity,
          intentionality, cooperation, and prior violations in calculating fines,
          and both frameworks have produced landmark enforcement actions
          demonstrating regulatory willingness to impose substantial penalties.
          The penalty structures differ: COPPA uses per-violation calculation
          multiplied by affected children, while GDPR uses tiered percentage-of-
          turnover caps.
      - id: art-5
        relationship: complements
        confidence: 0.55
        rationale: >
          COPPA's penalty framework reinforces GDPR Art. 5(2) accountability.
          Both frameworks create enforcement mechanisms that incentivize
          controllers to demonstrate compliance proactively. The existence of
          substantial penalties under both regimes drives the need for compliance
          evidence, audit trails, and continuous monitoring — the operational
          manifestation of the accountability principle.
