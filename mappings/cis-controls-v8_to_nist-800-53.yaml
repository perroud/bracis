id: cis-controls-v8_to_nist-800-53
title: "CIS Controls v8 to NIST SP 800-53 Rev 5 Control Mapping"
source_framework: cis-controls-v8
target_framework: nist-800-53-rev5
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # ──────────────────────────────────────────────────────────────────────
  # CIS Control 1 — Inventory and Control of Enterprise Assets
  # ──────────────────────────────────────────────────────────────────────
  - source_control: cis-1.1
    target_controls:
      - id: cm-2
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CIS 1.1 requires maintaining a detailed enterprise asset inventory.
          NIST CM-2 requires developing, documenting, and maintaining a baseline
          configuration of the system, which inherently depends on knowing what
          assets exist. Both share the need for accurate, current system component
          knowledge, though CM-2 focuses on configuration state rather than asset
          enumeration.
      - id: cm-6
        relationship: complements
        confidence: 0.65
        rationale: >
          CIS 1.1 inventories all assets that store or process data. NIST CM-6
          establishes secure configuration settings for those same components.
          The asset inventory is a prerequisite for applying and monitoring
          configuration settings, making these controls complementary.
      - id: si-4
        relationship: complements
        confidence: 0.55
        rationale: >
          CIS 1.1 requires identifying and tracking all assets connected to the
          network, including unmanaged ones. NIST SI-4 monitors systems for attacks
          and unauthorized connections. An accurate asset inventory enables
          effective system monitoring by distinguishing authorized from unauthorized
          assets.

  # ──────────────────────────────────────────────────────────────────────
  # CIS Control 2 — Inventory and Control of Software Assets
  # ──────────────────────────────────────────────────────────────────────
  - source_control: cis-2.1
    target_controls:
      - id: cm-2
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CIS 2.1 requires a detailed software inventory including version and
          deployment mechanism. NIST CM-2 requires a documented baseline
          configuration that includes installed software. Both converge on the
          need to know what software is deployed, though CM-2 frames it as part
          of baseline documentation.
      - id: cm-6
        relationship: complements
        confidence: 0.65
        rationale: >
          CIS 2.1 tracks all licensed software and its versions. NIST CM-6
          establishes secure configuration settings for system components
          including software. Knowing what software is installed (CIS 2.1) is
          a prerequisite for applying hardening configurations (CM-6).
      - id: sr-3
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          CIS 2.1 requires documenting all software including third-party
          components and their deployment mechanisms. NIST SR-3 addresses supply
          chain controls including SBOM generation, provenance verification, and
          dependency tracking. Both controls aim to maintain visibility into the
          software supply chain.

  # ──────────────────────────────────────────────────────────────────────
  # CIS Control 3 — Data Protection
  # ──────────────────────────────────────────────────────────────────────
  - source_control: cis-3.1
    target_controls:
      - id: ac-3
        relationship: complements
        confidence: 0.70
        rationale: >
          CIS 3.1 establishes a data management process addressing data
          sensitivity, ownership, and handling rules. NIST AC-3 enforces
          approved authorizations for logical access to information. Data
          classification (CIS 3.1) directly informs access enforcement
          decisions (AC-3), as access policies depend on data sensitivity
          levels.
      - id: sc-7
        relationship: complements
        confidence: 0.60
        rationale: >
          CIS 3.1 addresses data handling and disposal requirements based on
          sensitivity. NIST SC-7 monitors and controls communications at system
          boundaries. Boundary protection mechanisms enforce data handling
          policies by controlling what data crosses network boundaries,
          especially for sensitive or restricted classifications.
      - id: ac-1
        relationship: complements
        confidence: 0.60
        rationale: >
          CIS 3.1 requires a documented data management process with sensitivity
          levels and handling rules. NIST AC-1 requires developing and
          disseminating access control policy and procedures. Data classification
          policies feed directly into access control policies, making these
          controls complementary at the governance level.

  # ──────────────────────────────────────────────────────────────────────
  # CIS Control 4 — Secure Configuration of Enterprise Assets and Software
  # ──────────────────────────────────────────────────────────────────────
  - source_control: cis-4.1
    target_controls:
      - id: cm-6
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          CIS 4.1 requires establishing and maintaining a secure configuration
          process using hardened baselines. NIST CM-6 requires establishing and
          documenting configuration settings reflecting the most restrictive mode,
          implementing those settings, documenting deviations, and monitoring
          changes. Both controls address the same objective: applying and
          maintaining secure configurations across enterprise assets and software.
      - id: cm-2
        relationship: implements
        confidence: 0.85
        rationale: >
          CIS 4.1 requires secure configuration processes derived from industry
          benchmarks (CIS Benchmarks, DISA STIGs). NIST CM-2 requires developing
          and maintaining a baseline configuration under configuration control.
          The secure configuration process in CIS 4.1 directly implements the
          baseline configuration requirements of CM-2.

  # ──────────────────────────────────────────────────────────────────────
  # CIS Control 5 — Account Management
  # ──────────────────────────────────────────────────────────────────────
  - source_control: cis-5.1
    target_controls:
      - id: ac-2
        relationship: implements
        confidence: 0.90
        rationale: >
          CIS 5.1 requires maintaining an inventory of all accounts (user and
          administrator), validating active accounts quarterly, and tracking
          account attributes. NIST AC-2 comprehensively addresses account
          management including defining account types, assigning managers,
          monitoring use, and aligning with personnel processes. CIS 5.1
          directly implements the core account inventory and review requirements
          of AC-2.
      - id: ia-2
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CIS 5.1 requires inventorying all accounts and validating their
          authorization. NIST IA-2 requires uniquely identifying and
          authenticating organizational users and devices. The account inventory
          in CIS 5.1 provides the identity baseline that IA-2 authenticates
          against; both depend on knowing who should have access.
      - id: ac-6
        relationship: complements
        confidence: 0.65
        rationale: >
          CIS 5.1 requires separate tracking of user and administrator accounts
          with validation of authorization. NIST AC-6 enforces least privilege.
          A complete account inventory with role distinctions (CIS 5.1) is a
          prerequisite for implementing least privilege (AC-6), as you must know
          what access exists before you can minimize it.

  # ──────────────────────────────────────────────────────────────────────
  # CIS Control 6 — Access Management
  # ──────────────────────────────────────────────────────────────────────
  - source_control: cis-6.1
    target_controls:
      - id: ac-2
        relationship: implements
        confidence: 0.85
        rationale: >
          CIS 6.1 requires a defined process for granting access upon new hire,
          rights grant, or role change. NIST AC-2 requires approvals for account
          creation, creating accounts in accordance with policy, and aligning
          account management with personnel processes. CIS 6.1 directly
          implements the access granting aspects of AC-2.
      - id: ac-3
        relationship: implements
        confidence: 0.85
        rationale: >
          CIS 6.1 establishes a formal access granting process that enforces
          approved authorizations. NIST AC-3 requires enforcing approved
          authorizations for logical access. The access granting process in
          CIS 6.1 is the procedural mechanism that ensures AC-3 enforcement
          begins at the point of access provisioning.
      - id: ac-6
        relationship: implements
        confidence: 0.80
        rationale: >
          CIS 6.1 describes an access granting process that should implement
          least privilege by default, granting only minimum access necessary.
          NIST AC-6 requires employing the principle of least privilege. The
          access granting process is the primary mechanism through which least
          privilege is operationalized.
      - id: ac-1
        relationship: derived-from
        confidence: 0.75
        rationale: >
          CIS 6.1 requires a documented, preferably automated, access granting
          process. NIST AC-1 requires developing access control policy and
          procedures. The access granting process in CIS 6.1 is a specific
          procedure derived from the broader access control policy framework
          established by AC-1.

  # ──────────────────────────────────────────────────────────────────────
  # CIS Control 7 — Continuous Vulnerability Management
  # ──────────────────────────────────────────────────────────────────────
  - source_control: cis-7.1
    target_controls:
      - id: si-4
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CIS 7.1 requires a documented vulnerability management process covering
          identification, evaluation, prioritization, and remediation. NIST SI-4
          monitors systems for attacks, indicators of potential attacks, and
          unauthorized use. Vulnerability scanning (CIS 7.1) and system
          monitoring (SI-4) overlap in their detection capabilities, though
          SI-4 is broader and includes real-time threat monitoring.
      - id: cm-6
        relationship: complements
        confidence: 0.65
        rationale: >
          CIS 7.1 addresses vulnerability remediation including misconfiguration
          vulnerabilities. NIST CM-6 establishes and monitors secure configuration
          settings. Configuration-related vulnerabilities detected by vulnerability
          management (CIS 7.1) are remediated by correcting configuration settings
          (CM-6), making these controls complementary.
      - id: cm-2
        relationship: complements
        confidence: 0.60
        rationale: >
          CIS 7.1 requires scanning all asset types and remediating vulnerabilities.
          NIST CM-2 maintains baseline configurations that are updated when system
          components are installed or upgraded. Vulnerability remediation often
          involves updating the baseline configuration to a patched state,
          connecting these controls operationally.
      - id: ir-4
        relationship: complements
        confidence: 0.55
        rationale: >
          CIS 7.1 requires vulnerability prioritization considering exploit
          availability and asset criticality. NIST IR-4 implements incident
          handling including detection, containment, and recovery. Exploited
          vulnerabilities become incidents, making vulnerability management a
          preventive counterpart to incident handling.

  # ──────────────────────────────────────────────────────────────────────
  # CIS Control 8 — Audit Log Management
  # ──────────────────────────────────────────────────────────────────────
  - source_control: cis-8.1
    target_controls:
      - id: au-2
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          CIS 8.1 requires an audit log management process defining logging
          requirements including collection, review, and retention. NIST AU-2
          requires identifying event types for logging, coordinating logging
          with stakeholders, specifying events to log, and reviewing logged
          event types. Both controls address the same core objective: defining
          what to log, how to collect it, and maintaining the logging program.
      - id: au-6
        relationship: implements
        confidence: 0.85
        rationale: >
          CIS 8.1 requires a process addressing the review of audit logs.
          NIST AU-6 requires reviewing and analyzing audit records for
          indications of inappropriate or unusual activity and reporting
          findings. The audit log review component of CIS 8.1 directly
          implements the requirements of AU-6.
      - id: si-4
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          CIS 8.1 requires collecting and reviewing logs for security events.
          NIST SI-4 monitors systems for attacks and anomalies using techniques
          that include audit record monitoring. Both controls use log data for
          security detection, though SI-4 encompasses broader monitoring
          techniques beyond log analysis.
      - id: ir-4
        relationship: complements
        confidence: 0.60
        rationale: >
          CIS 8.1 requires log collection and review that supports security
          detection. NIST IR-4 requires incident handling capabilities including
          detection and analysis. Audit logs are a primary data source for
          incident detection and forensic investigation, making log management
          a foundational enabler of incident handling.

  # ──────────────────────────────────────────────────────────────────────
  # CIS Control 16 — Application Software Security
  # ──────────────────────────────────────────────────────────────────────
  - source_control: cis-16.1
    target_controls:
      - id: sr-3
        relationship: implements
        confidence: 0.85
        rationale: >
          CIS 16.1 requires a secure application development process addressing
          security of third-party code. NIST SR-3 requires supply chain controls
          including processes to identify and address weaknesses in supply chain
          elements. The third-party code security, SBOM generation, and
          dependency management aspects of CIS 16.1 directly implement supply
          chain risk management requirements of SR-3.
      - id: cm-6
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          CIS 16.1 requires secure coding practices and application security
          testing. NIST CM-6 requires establishing and implementing secure
          configuration settings. Application security configuration (secure
          defaults, security headers, input validation) is the intersection
          point where secure development practices meet configuration management.
      - id: si-4
        relationship: complements
        confidence: 0.60
        rationale: >
          CIS 16.1 requires application security testing procedures (SAST,
          DAST, SCA). NIST SI-4 monitors systems for attacks including at the
          application layer. Pre-production security testing (CIS 16.1)
          complements runtime system monitoring (SI-4) by catching
          vulnerabilities before they reach production.
      - id: ac-3
        relationship: complements
        confidence: 0.55
        rationale: >
          CIS 16.1 addresses secure application design standards including
          authentication and authorization code. NIST AC-3 enforces approved
          authorizations for logical access. Secure development practices
          ensure that access enforcement mechanisms in application code are
          correctly implemented, complementing the enforcement requirement
          of AC-3.
