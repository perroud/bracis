id: owasp-samm_to_owasp-asvs
title: "OWASP SAMM to OWASP ASVS Control Mapping"
source_framework: owasp-samm
target_framework: owasp-asvs
version: "1.0.0"
last_updated: "2026-04-06"
methodology: structural
description: >
  Cross-framework mapping between OWASP SAMM v2.0 (Software Assurance Maturity Model)
  and OWASP ASVS v4.0.3 (Application Security Verification Standard). SAMM defines
  the organizational maturity practices for building secure software, while ASVS defines
  the specific technical verification requirements. SAMM prescribes process-level
  activities (threat modeling, security testing, secure build); ASVS prescribes the
  concrete technical controls those activities must verify and enforce. This mapping
  traces each SAMM practice to the ASVS controls it drives, generates requirements for,
  or directly implements through its prescribed activities.

mappings:
  # ──────────────────────────────────────────────
  # GOVERNANCE
  # ──────────────────────────────────────────────

  - source_control: samm-gov-strategy
    target_controls:
      - id: v1.1.1
        relationship: complements
        confidence: 0.80
        rationale: >
          SAMM Strategy & Metrics establishes the overarching software security program,
          defines KPIs, and drives maturity assessments. ASVS V1.1.1 (Secure SDLC)
          requires a secure development lifecycle with threat modeling — the strategic
          program defined by SAMM governance provides the organizational framework
          within which the ASVS secure SDLC requirement is fulfilled.
      - id: v14.1.1
        relationship: complements
        confidence: 0.72
        rationale: >
          SAMM Strategy & Metrics tracks program effectiveness through metrics including
          build security and deployment posture. ASVS V14.1.1 (Build and Deploy
          Configuration) defines the specific technical build/deploy security requirements
          that SAMM strategy metrics would measure and improve over time.

  - source_control: samm-gov-policy
    target_controls:
      - id: v1.1.1
        relationship: complements
        confidence: 0.85
        rationale: >
          SAMM Policy & Compliance establishes software security policies, maps regulatory
          requirements to internal controls, and tracks compliance. ASVS V1.1.1 (Secure
          SDLC) is a foundational requirement that SAMM policy would mandate and enforce
          across the organization through compliance tracking mechanisms.
      - id: v14.1.1
        relationship: complements
        confidence: 0.78
        rationale: >
          SAMM Policy & Compliance enforces security standards through pipeline controls
          and compliance frameworks. ASVS V14.1.1 (Build and Deploy Configuration)
          defines specific build/deploy hardening requirements that organizational
          policy would codify and enforce as mandatory baseline standards.
      - id: v10.1.1
        relationship: complements
        confidence: 0.75
        rationale: >
          SAMM Policy & Compliance defines software security standards and enforcement
          mechanisms. ASVS V10.1.1 (Code Integrity Controls) requires code analysis
          tools, integrity verification, and branch protection — controls that
          organizational policy would mandate as part of the secure development standard.

  - source_control: samm-gov-education
    target_controls:
      - id: v1.1.1
        relationship: complements
        confidence: 0.82
        rationale: >
          SAMM Education & Guidance provides security training and security champions
          programs that build the human capability required to execute the secure SDLC
          mandated by ASVS V1.1.1. Without educated developers and security champions,
          threat modeling and security integration in the SDLC cannot succeed.
      - id: v5.1.1
        relationship: complements
        confidence: 0.70
        rationale: >
          SAMM Education & Guidance covers secure coding practices and OWASP Top 10
          training. ASVS V5.1.1 (Input Validation) represents a core secure coding
          requirement that developer education programs must teach to prevent injection
          and parameter pollution attacks.
      - id: v5.3.1
        relationship: complements
        confidence: 0.70
        rationale: >
          SAMM Education & Guidance delivers training on output encoding and injection
          prevention patterns. ASVS V5.3.1 (Output Encoding and Injection Prevention)
          defines the specific encoding techniques that security training must cover
          to prevent XSS, SQL injection, and other injection attack classes.
      - id: v6.2.1
        relationship: complements
        confidence: 0.68
        rationale: >
          SAMM Education & Guidance includes cryptographic standards in its guidance
          library. ASVS V6.2.1 (Approved Cryptographic Algorithms) defines the
          specific cryptographic requirements developers must understand — a topic
          directly covered by security training curricula.

  # ──────────────────────────────────────────────
  # DESIGN
  # ──────────────────────────────────────────────

  - source_control: samm-des-threat-assessment
    target_controls:
      - id: v1.1.1
        relationship: implements
        confidence: 0.95
        rationale: >
          SAMM Threat Assessment directly implements the ASVS V1.1.1 requirement for
          threat modeling in every design change. SAMM prescribes structured threat
          modeling using STRIDE/PASTA, risk classification, and maintained threat models
          — the exact activities V1.1.1 mandates as part of a secure SDLC.
      - id: v4.1.1
        relationship: complements
        confidence: 0.75
        rationale: >
          SAMM Threat Assessment identifies threats against trust boundaries and
          authorization models. ASVS V4.1.1 (General Access Control Design) defines
          server-side access control requirements that threat modeling outputs would
          identify and drive as security requirements.
      - id: v11.1.1
        relationship: complements
        confidence: 0.72
        rationale: >
          SAMM Threat Assessment performs risk analysis on business logic flows and
          identifies abuse scenarios. ASVS V11.1.1 (Business Logic Security) defines
          the specific business logic controls that threat models must identify and
          validate — misuse cases, workflow bypass, and anti-automation needs.

  - source_control: samm-des-security-req
    target_controls:
      - id: v1.1.1
        relationship: implements
        confidence: 0.90
        rationale: >
          SAMM Security Requirements explicitly references OWASP ASVS as a baseline
          requirements framework. The practice of eliciting, documenting, and managing
          security requirements directly implements the ASVS V1.1.1 requirement that
          security is addressed in all stages of development.
      - id: v2.1.1
        relationship: superset-of
        confidence: 0.85
        rationale: >
          SAMM Security Requirements drives the definition of authentication
          requirements for software systems. ASVS V2.1.1 (Password Length Requirements)
          is a specific authentication requirement that the SAMM requirements process
          would capture, derive from standards, and enforce as a testable requirement.
      - id: v2.2.1
        relationship: superset-of
        confidence: 0.85
        rationale: >
          SAMM Security Requirements covers anti-automation and credential protection
          requirements. ASVS V2.2.1 (General Authenticator Security) defines specific
          brute-force and credential stuffing controls that SAMM requirements elicitation
          would derive from threat models and regulatory obligations.
      - id: v2.8.1
        relationship: superset-of
        confidence: 0.82
        rationale: >
          SAMM Security Requirements derives authentication requirements from threat
          models and compliance standards. ASVS V2.8.1 (TOTP MFA) is a specific
          multi-factor authentication requirement that SAMM would capture based on
          risk classification and regulatory requirements (PCI DSS, SOC 2).
      - id: v3.1.1
        relationship: superset-of
        confidence: 0.82
        rationale: >
          SAMM Security Requirements defines session management requirements derived
          from security standards. ASVS V3.1.1 (Session Management Fundamentals)
          specifies concrete session security controls that SAMM requirements processes
          would derive from ASVS checklists and threat model outputs.
      - id: v4.1.1
        relationship: superset-of
        confidence: 0.85
        rationale: >
          SAMM Security Requirements captures access control requirements from threat
          models and regulatory obligations. ASVS V4.1.1 (General Access Control Design)
          defines specific server-side access control requirements that the SAMM
          requirements process would enumerate, prioritize, and track.
      - id: v4.2.1
        relationship: superset-of
        confidence: 0.82
        rationale: >
          SAMM Security Requirements drives IDOR prevention requirements. ASVS V4.2.1
          (Operation Level Access Control) specifies per-operation authorization checks
          that SAMM would capture as testable security requirements derived from
          threat modeling and ASVS baseline checklists.
      - id: v5.1.1
        relationship: superset-of
        confidence: 0.82
        rationale: >
          SAMM Security Requirements captures input validation requirements from OWASP
          ASVS baselines. ASVS V5.1.1 (Input Validation) defines the specific validation
          controls that SAMM requirements elicitation would include when using ASVS
          as a requirements source.
      - id: v5.2.1
        relationship: superset-of
        confidence: 0.80
        rationale: >
          SAMM Security Requirements includes output sanitization controls in its
          requirements scope. ASVS V5.2.1 (Sanitization and Sandboxing) specifies
          HTML sanitization requirements that SAMM would capture as part of ASVS-derived
          security requirements.
      - id: v5.3.1
        relationship: superset-of
        confidence: 0.82
        rationale: >
          SAMM Security Requirements derives injection prevention requirements from
          standards and threat models. ASVS V5.3.1 (Output Encoding) defines
          context-aware encoding requirements that the SAMM requirements process would
          capture and make testable.
      - id: v6.2.1
        relationship: superset-of
        confidence: 0.80
        rationale: >
          SAMM Security Requirements includes cryptographic standards in its
          requirements scope. ASVS V6.2.1 (Approved Cryptographic Algorithms) defines
          specific crypto requirements that SAMM would derive from organizational
          policy and regulatory mandates.
      - id: v9.1.1
        relationship: superset-of
        confidence: 0.80
        rationale: >
          SAMM Security Requirements captures transport security requirements. ASVS
          V9.1.1 (Client Communication Security) defines TLS enforcement requirements
          that SAMM would include as baseline security requirements derived from
          organizational standards.
      - id: v13.1.1
        relationship: superset-of
        confidence: 0.78
        rationale: >
          SAMM Security Requirements defines API security requirements from threat
          models and standards. ASVS V13.1.1 (Generic Web Service Security) specifies
          API authentication, validation, and rate limiting requirements that SAMM
          requirements processes would capture for API-based systems.

  - source_control: samm-des-security-arch
    target_controls:
      - id: v1.1.1
        relationship: complements
        confidence: 0.85
        rationale: >
          SAMM Security Architecture defines reference architectures and security
          design patterns. ASVS V1.1.1 (Secure SDLC) requires threat modeling for
          design changes — security architecture provides the approved patterns and
          principles against which those threat models are evaluated.
      - id: v4.1.1
        relationship: implements
        confidence: 0.88
        rationale: >
          SAMM Security Architecture defines standards for authentication, authorization,
          and access control patterns in reference architectures. ASVS V4.1.1 (General
          Access Control Design) requires server-side, deny-by-default access control —
          exactly the architectural pattern that SAMM security architecture prescribes
          through centralized policy decision points and approved design patterns.
      - id: v6.2.1
        relationship: implements
        confidence: 0.85
        rationale: >
          SAMM Security Architecture defines cryptographic implementation standards
          as part of the approved technology stack and reference architectures. ASVS
          V6.2.1 (Approved Cryptographic Algorithms) requires use of approved algorithms
          and libraries — SAMM security architecture operationalizes this through
          technology management and approved library lists.
      - id: v9.1.1
        relationship: implements
        confidence: 0.88
        rationale: >
          SAMM Security Architecture includes TLS configuration, network segmentation,
          and zero-trust networking in its reference architectures. ASVS V9.1.1 (Client
          Communication Security) requires TLS 1.2+ enforcement — a requirement that
          SAMM security architecture standardizes through infrastructure patterns and
          service mesh configurations.
      - id: v14.1.1
        relationship: complements
        confidence: 0.80
        rationale: >
          SAMM Security Architecture manages the approved technology list and enforces
          architectural standards through platform controls. ASVS V14.1.1 (Build and
          Deploy Configuration) requires hardened build/deploy processes — security
          architecture provides the approved patterns and technology stack that
          build/deploy configurations must follow.

  # ──────────────────────────────────────────────
  # IMPLEMENTATION
  # ──────────────────────────────────────────────

  - source_control: samm-imp-secure-build
    target_controls:
      - id: v10.1.1
        relationship: implements
        confidence: 0.92
        rationale: >
          SAMM Secure Build directly implements ASVS V10.1.1 (Code Integrity Controls)
          by prescribing SAST integration, SBOM generation, artifact signing, and
          dependency management. Both controls require code analysis tooling, build
          artifact integrity verification, and supply chain security measures.
      - id: v14.1.1
        relationship: implements
        confidence: 0.90
        rationale: >
          SAMM Secure Build prescribes standardized, automated, and secure build
          processes with CI/CD integration. ASVS V14.1.1 (Build and Deploy Configuration)
          requires secure CI/CD with integrity verification at each step — the exact
          process that SAMM Secure Build defines and operationalizes.
      - id: v1.1.1
        relationship: complements
        confidence: 0.75
        rationale: >
          SAMM Secure Build integrates security analysis (SAST, SCA) into the build
          process as part of the secure development lifecycle. ASVS V1.1.1 (Secure SDLC)
          requires security in all stages of development — secure build is the
          implementation-phase component of that lifecycle.

  - source_control: samm-imp-secure-deploy
    target_controls:
      - id: v14.1.1
        relationship: implements
        confidence: 0.93
        rationale: >
          SAMM Secure Deploy directly implements ASVS V14.1.1 (Build and Deploy
          Configuration) by prescribing deployment process security, artifact integrity
          verification, environment hardening, and server configuration standards.
          Both controls require secure, auditable deployment with access controls.
      - id: v6.2.1
        relationship: intersects-with
        confidence: 0.72
        rationale: >
          SAMM Secure Deploy prescribes secrets management using centralized vault
          solutions with encryption. ASVS V6.2.1 (Approved Cryptographic Algorithms)
          requires secure cryptographic operations — SAMM Secure Deploy implements the
          key management and secrets encryption aspects of this requirement.
      - id: v9.1.1
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          SAMM Secure Deploy includes TLS configuration as part of environment
          hardening standards. ASVS V9.1.1 (Client Communication Security) requires
          TLS enforcement — deployment processes must configure and validate TLS
          settings as part of the secure deployment procedure.

  - source_control: samm-imp-defect-mgmt
    target_controls:
      - id: v1.1.1
        relationship: complements
        confidence: 0.78
        rationale: >
          SAMM Defect Management provides the vulnerability tracking and remediation
          process that closes the feedback loop in the secure SDLC. ASVS V1.1.1
          (Secure SDLC) requires security in all development stages — defect
          management ensures that security findings are tracked, remediated, and
          drive process improvements.
      - id: v10.1.1
        relationship: intersects-with
        confidence: 0.72
        rationale: >
          SAMM Defect Management consolidates findings from SAST, SCA, and penetration
          testing into a centralized tracker. ASVS V10.1.1 (Code Integrity Controls)
          requires code analysis tools — defect management tracks and remediates the
          findings those tools produce, completing the detection-to-remediation cycle.
      - id: v7.1.1
        relationship: intersects-with
        confidence: 0.68
        rationale: >
          SAMM Defect Management tracks vulnerability metrics and generates reports
          on security posture. ASVS V7.1.1 (Log Content Requirements) requires logging
          of security events — defect management metrics and vulnerability data feed
          into the same security observability infrastructure.

  # ──────────────────────────────────────────────
  # VERIFICATION
  # ──────────────────────────────────────────────

  - source_control: samm-ver-architecture-assessment
    target_controls:
      - id: v1.1.1
        relationship: implements
        confidence: 0.88
        rationale: >
          SAMM Architecture Assessment verifies security controls in software
          architectures against threat models and security principles. ASVS V1.1.1
          (Secure SDLC) requires threat modeling and security integration in design —
          architecture assessment is the verification activity that validates those
          design-phase security activities produced correct outcomes.
      - id: v4.1.1
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          SAMM Architecture Assessment reviews authentication and authorization designs
          for correctness. ASVS V4.1.1 (General Access Control Design) requires
          server-side, deny-by-default access control — architecture assessment verifies
          these access control design patterns are correctly implemented.
      - id: v9.1.1
        relationship: intersects-with
        confidence: 0.72
        rationale: >
          SAMM Architecture Assessment reviews cryptographic implementations and
          network security designs. ASVS V9.1.1 (Client Communication Security)
          requires TLS enforcement — architecture assessment verifies TLS configuration
          and trust boundary definitions meet security standards.
      - id: v6.2.1
        relationship: intersects-with
        confidence: 0.72
        rationale: >
          SAMM Architecture Assessment reviews cryptographic implementation designs.
          ASVS V6.2.1 (Approved Cryptographic Algorithms) requires approved crypto
          algorithms — architecture assessment verifies cryptographic design choices
          comply with organizational standards.

  - source_control: samm-ver-requirements-testing
    target_controls:
      - id: v2.1.1
        relationship: implements
        confidence: 0.88
        rationale: >
          SAMM Requirements-Driven Testing derives test cases from security requirements
          including ASVS. ASVS V2.1.1 (Password Length Requirements) is a specific,
          testable requirement — requirements-driven testing creates and executes the
          test cases that verify password policy enforcement.
      - id: v2.2.1
        relationship: implements
        confidence: 0.88
        rationale: >
          SAMM Requirements-Driven Testing creates test cases from security requirements.
          ASVS V2.2.1 (General Authenticator Security) defines testable anti-automation
          requirements — requirements-driven testing verifies rate limiting, lockout, and
          brute-force protection through systematic test execution.
      - id: v2.8.1
        relationship: implements
        confidence: 0.85
        rationale: >
          SAMM Requirements-Driven Testing verifies MFA requirements through automated
          and manual test cases. ASVS V2.8.1 (TOTP MFA) defines specific OTP validation
          and MFA requirements that requirements testing would systematically verify
          including token expiry, single-use enforcement, and step-up authentication.
      - id: v3.1.1
        relationship: implements
        confidence: 0.85
        rationale: >
          SAMM Requirements-Driven Testing verifies session management controls through
          derived test cases. ASVS V3.1.1 (Session Management Fundamentals) defines
          specific testable requirements for session token handling — requirements testing
          creates tests for token entropy, server-side invalidation, and URL exposure.
      - id: v4.1.1
        relationship: implements
        confidence: 0.88
        rationale: >
          SAMM Requirements-Driven Testing creates test cases for access control
          requirements. ASVS V4.1.1 (General Access Control Design) defines testable
          access control requirements — requirements testing verifies server-side
          enforcement, deny-by-default, and fail-secure behavior.
      - id: v4.2.1
        relationship: implements
        confidence: 0.88
        rationale: >
          SAMM Requirements-Driven Testing specifically includes misuse/abuse cases
          for authorization. ASVS V4.2.1 (Operation Level Access Control) defines IDOR
          prevention requirements — requirements testing creates cross-user authorization
          tests and horizontal privilege escalation scenarios.
      - id: v5.1.1
        relationship: implements
        confidence: 0.85
        rationale: >
          SAMM Requirements-Driven Testing verifies input validation requirements.
          ASVS V5.1.1 (Input Validation) defines specific validation requirements —
          requirements testing creates test cases for parameter pollution, type
          validation, and allow-list enforcement.
      - id: v5.2.1
        relationship: implements
        confidence: 0.82
        rationale: >
          SAMM Requirements-Driven Testing verifies sanitization controls through
          test cases. ASVS V5.2.1 (Sanitization and Sandboxing) defines HTML
          sanitization requirements — requirements testing creates XSS-specific
          test suites using known bypass payloads.
      - id: v5.3.1
        relationship: implements
        confidence: 0.85
        rationale: >
          SAMM Requirements-Driven Testing verifies output encoding controls. ASVS
          V5.3.1 (Output Encoding) defines context-aware encoding requirements —
          requirements testing creates injection test cases for SQL, XSS, command
          injection, and LDAP injection prevention.
      - id: v6.2.1
        relationship: implements
        confidence: 0.80
        rationale: >
          SAMM Requirements-Driven Testing verifies cryptographic implementation
          requirements. ASVS V6.2.1 (Approved Cryptographic Algorithms) defines
          specific algorithm and mode requirements — requirements testing verifies
          approved algorithms are used and deprecated ones are rejected.
      - id: v7.1.1
        relationship: implements
        confidence: 0.80
        rationale: >
          SAMM Requirements-Driven Testing creates test cases for logging requirements.
          ASVS V7.1.1 (Log Content Requirements) defines specific logging requirements —
          requirements testing verifies security events generate appropriate log entries
          and sensitive data is excluded from logs.
      - id: v8.1.1
        relationship: implements
        confidence: 0.78
        rationale: >
          SAMM Requirements-Driven Testing verifies data protection requirements. ASVS
          V8.1.1 (General Data Protection) defines cache control and data classification
          requirements — requirements testing verifies sensitive data is not cached or
          stored in client-side mechanisms.
      - id: v9.1.1
        relationship: implements
        confidence: 0.82
        rationale: >
          SAMM Requirements-Driven Testing verifies transport security requirements.
          ASVS V9.1.1 (Client Communication Security) defines TLS enforcement
          requirements — requirements testing verifies TLS configuration, HSTS headers,
          and cipher suite compliance.
      - id: v11.1.1
        relationship: implements
        confidence: 0.82
        rationale: >
          SAMM Requirements-Driven Testing includes misuse/abuse cases that test
          business logic integrity. ASVS V11.1.1 (Business Logic Security) defines
          workflow sequencing and anti-automation requirements — requirements testing
          creates tests for step-skipping, rate limits, and transaction manipulation.
      - id: v12.1.1
        relationship: implements
        confidence: 0.78
        rationale: >
          SAMM Requirements-Driven Testing verifies file upload requirements. ASVS
          V12.1.1 (File Upload Requirements) defines specific file validation
          requirements — requirements testing creates test cases for size limits,
          type validation, and path traversal prevention.
      - id: v13.1.1
        relationship: implements
        confidence: 0.82
        rationale: >
          SAMM Requirements-Driven Testing verifies API security requirements. ASVS
          V13.1.1 (Generic Web Service Security) defines API authentication, validation,
          and rate limiting requirements — requirements testing creates test cases for
          schema enforcement, parser differential attacks, and BOLA/IDOR.

  - source_control: samm-ver-security-testing
    target_controls:
      - id: v2.2.1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          SAMM Security Testing deploys DAST and penetration testing against
          applications. ASVS V2.2.1 (General Authenticator Security) defines
          anti-automation controls that DAST scans and penetration tests specifically
          target to verify brute-force and credential stuffing protections.
      - id: v5.1.1
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          SAMM Security Testing includes DAST scanning for input validation
          vulnerabilities. ASVS V5.1.1 (Input Validation) defines validation
          requirements that DAST tools automatically test by sending malformed inputs,
          parameter pollution payloads, and boundary values.
      - id: v5.2.1
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          SAMM Security Testing includes XSS scanning in DAST and penetration testing
          scope. ASVS V5.2.1 (Sanitization and Sandboxing) defines sanitization
          requirements that DAST tools test by injecting XSS payloads and mutation
          XSS vectors into all input points.
      - id: v5.3.1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          SAMM Security Testing includes injection testing across all categories. ASVS
          V5.3.1 (Output Encoding) defines encoding requirements — DAST and penetration
          testing verify these by testing SQL injection, XSS, command injection, and
          LDAP injection against all endpoints.
      - id: v4.2.1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          SAMM Security Testing includes penetration testing targeting authorization
          flaws. ASVS V4.2.1 (Operation Level Access Control) defines IDOR prevention
          requirements that penetration testers specifically target through cross-user
          access testing and privilege escalation scenarios.
      - id: v12.1.1
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          SAMM Security Testing includes file upload attack testing in DAST and
          penetration test scope. ASVS V12.1.1 (File Upload Requirements) defines
          upload validation requirements — security testing verifies these through
          malicious file uploads, zip bombs, and path traversal attempts.
      - id: v13.1.1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          SAMM Security Testing includes API security testing in DAST scope. ASVS
          V13.1.1 (Generic Web Service Security) defines API security requirements
          that DAST tools and penetration testers target through schema violation,
          parser differential, and endpoint enumeration testing.
      - id: v11.1.1
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          SAMM Security Testing includes business logic testing in penetration test
          scope. ASVS V11.1.1 (Business Logic Security) defines logic flow controls
          that penetration testers specifically target — workflow bypass, race conditions,
          and anti-automation bypass are standard penetration test scenarios.

  # ──────────────────────────────────────────────
  # OPERATIONS
  # ──────────────────────────────────────────────

  - source_control: samm-ops-incident-mgmt
    target_controls:
      - id: v7.1.1
        relationship: implements
        confidence: 0.90
        rationale: >
          SAMM Incident Management prescribes security logging, monitoring, and alerting
          for detection and forensic investigation. ASVS V7.1.1 (Log Content Requirements)
          defines the specific log content requirements — what to log, what to exclude,
          and what context to include — that incident management processes depend on
          for effective detection and response.
      - id: v1.1.1
        relationship: complements
        confidence: 0.72
        rationale: >
          SAMM Incident Management feeds post-incident lessons back into the development
          lifecycle. ASVS V1.1.1 (Secure SDLC) requires security in all stages — incident
          management provides the operational feedback loop that improves design and
          implementation based on real-world attack data.

  - source_control: samm-ops-environment-mgmt
    target_controls:
      - id: v14.1.1
        relationship: implements
        confidence: 0.90
        rationale: >
          SAMM Environment Management prescribes configuration hardening, patch
          management, and compliance monitoring for deployment environments. ASVS V14.1.1
          (Build and Deploy Configuration) requires hardened server configuration per
          industry recommendations — environment management operationalizes these
          requirements through CIS Benchmarks, automated compliance scanning, and
          immutable infrastructure patterns.
      - id: v9.1.1
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          SAMM Environment Management includes TLS configuration and network security
          as part of environment hardening baselines. ASVS V9.1.1 (Client Communication
          Security) requires TLS 1.2+ enforcement — environment management ensures
          these TLS configurations are applied, maintained, and monitored across all
          environments.
      - id: v10.1.1
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          SAMM Environment Management ensures deployment environments enforce security
          baselines and detect configuration drift. ASVS V10.1.1 (Code Integrity
          Controls) requires integrity verification — environment management provides
          the runtime environment integrity that complements code-level integrity controls.

