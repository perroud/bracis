id: ismap_to_fedramp
title: "ISMAP to FedRAMP Control Mapping"
source_framework: ismap
target_framework: fedramp
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic

mappings:
  # ── gov (Governance) ──────────────────────────────────────────────────

  - source_control: gov-1
    target_controls:
      - id: cm-6
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISMAP gov-1 (Information Security Policy) requires the CSP to establish,
          approve, publish, and communicate an information security policy aligned
          with business objectives and applicable laws. FedRAMP cm-6 (Configuration
          Settings) requires establishing and documenting configuration settings
          reflecting the most restrictive mode consistent with operational
          requirements. Both controls mandate formally documented baselines that
          govern how security is enforced across the organization, though gov-1
          operates at the strategic policy level while cm-6 operates at the
          technical configuration level.
      - id: ca-7
        relationship: complements
        confidence: 0.75
        rationale: >
          ISMAP gov-1 requires that the information security policy be reviewed at
          planned intervals or when significant changes occur, with management
          demonstrating leadership and commitment. FedRAMP ca-7 (Continuous
          Monitoring) requires developing a system-level continuous monitoring
          strategy including ongoing control assessments and reporting. Gov-1's
          policy review cycle complements ca-7's continuous monitoring approach by
          ensuring the governing policy remains current with the control
          effectiveness data that ca-7 produces.

  - source_control: gov-2
    target_controls:
      - id: ac-2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ISMAP gov-2 (Roles, Responsibilities, and Organizational Structure)
          requires defining information security roles, establishing a CISO or
          equivalent, and implementing segregation of duties. FedRAMP ac-2 (Account
          Management) requires defining and documenting account types, assigning
          account managers, specifying authorized users with role membership, and
          aligning account management with personnel processes. Both controls
          establish the organizational and access governance structures that ensure
          proper authorization and separation of duties in cloud environments.

  # ── rm (Risk Management) ──────────────────────────────────────────────

  - source_control: rm-1
    target_controls:
      - id: ra-5
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ISMAP rm-1 (Risk Assessment) requires defining and applying an information
          security risk assessment process that identifies risks to confidentiality,
          integrity, and availability, performed at planned intervals or when
          significant changes occur. FedRAMP ra-5 (Vulnerability Monitoring and
          Scanning) requires monthly vulnerability scanning and analysis with
          defined remediation timelines. Both controls operationalize risk
          identification, though rm-1 frames it as a broad risk assessment
          methodology while ra-5 implements it through systematic vulnerability
          scanning and monitoring.
      - id: ca-7
        relationship: complements
        confidence: 0.78
        rationale: >
          ISMAP rm-1 requires that risk assessments produce consistent, valid, and
          comparable results over time. FedRAMP ca-7 (Continuous Monitoring)
          requires ongoing control assessments, correlation of assessment data, and
          response actions to address findings. Rm-1's periodic risk assessment
          cycle complements ca-7's continuous monitoring by feeding risk data into
          the ongoing assessment programme, while ca-7 provides the operational
          mechanism to track risk posture between formal assessments.

  - source_control: rm-2
    target_controls:
      - id: ra-5
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          ISMAP rm-2 (Risk Treatment) requires selecting appropriate risk treatment
          options, determining necessary controls, producing a Statement of
          Applicability, and formally accepting residual risks. FedRAMP ra-5
          requires remediation of legitimate vulnerabilities within defined
          timelines (Critical/High 30 days, Moderate 90 days, Low 180 days) and
          sharing vulnerability information. Both controls address the treatment
          of identified risks, with rm-2 at the governance level through the
          SoA and risk treatment plans, and ra-5 at the operational level through
          structured vulnerability remediation with tracked POA&M items.
      - id: ca-7
        relationship: complements
        confidence: 0.75
        rationale: >
          ISMAP rm-2 requires that risk treatment plans be formulated, approved by
          risk owners, and residual risks formally accepted. FedRAMP ca-7 requires
          ongoing monitoring of the system including response actions to address
          results of control assessments. Rm-2's risk treatment planning
          complements ca-7's continuous monitoring by establishing the treatment
          framework within which ca-7's findings are addressed and tracked through
          POA&M management.

  # ── ac (Access Control) ───────────────────────────────────────────────

  - source_control: ac-1
    target_controls:
      - id: ac-2
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          ISMAP ac-1 (Access Control Policy and User Access Management) requires
          establishing an access control policy, implementing formal user
          registration/deregistration, provisioning/revoking access rights, and
          reviewing access rights at regular intervals. FedRAMP ac-2 (Account
          Management) requires defining account types, assigning account managers,
          creating/enabling/modifying/disabling/removing accounts per policy,
          monitoring account use, and reviewing accounts annually. Both controls
          comprehensively address the access control lifecycle from policy
          definition through provisioning, monitoring, review, and deprovisioning,
          making them functionally equivalent.

  - source_control: ac-2
    target_controls:
      - id: ac-2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ISMAP ac-2 (Authentication and Multi-Factor Authentication) requires
          secure authentication mechanisms including mandatory MFA for cloud
          management consoles, administrative interfaces, and systems processing
          government data. FedRAMP ac-2 (Account Management) requires two-factor
          authentication and addresses account management controls that depend on
          strong authentication. While ISMAP ac-2 focuses specifically on
          authentication mechanisms (MFA, phishing-resistant authentication),
          FedRAMP ac-2 incorporates authentication requirements as part of the
          broader account management lifecycle, creating a strong semantic mapping.

  # ── cry (Cryptography) ────────────────────────────────────────────────

  - source_control: cry-1
    target_controls:
      - id: sc-7
        relationship: complements
        confidence: 0.78
        rationale: >
          ISMAP cry-1 (Cryptographic Controls Policy) requires implementing a
          cryptographic policy specifying approved algorithms, key lengths, and
          protocols for data at rest and in transit, with compliance to CRYPTREC
          standards. FedRAMP sc-7 (Boundary Protection) requires monitoring and
          controlling communications at managed interfaces, implementing
          subnetworks for publicly accessible components, and connecting to
          external networks only through managed interfaces. Cry-1's encryption
          requirements for data in transit directly complement sc-7's boundary
          protection by ensuring that data crossing boundaries is
          cryptographically protected.
      - id: cm-6
        relationship: complements
        confidence: 0.75
        rationale: >
          ISMAP cry-1 requires that cryptographic controls use approved algorithms
          and key lengths compliant with CRYPTREC and international standards.
          FedRAMP cm-6 (Configuration Settings) requires establishing configuration
          baselines reflecting the most restrictive mode using CIS Benchmarks or
          DISA STIGs. Cryptographic configuration (algorithm selection, key
          lengths, protocol versions) is a critical subset of the secure
          configuration baselines that cm-6 governs, making cry-1's cryptographic
          policy a complementary component of cm-6's broader configuration
          management.

  - source_control: cry-2
    target_controls:
      - id: cm-6
        relationship: complements
        confidence: 0.75
        rationale: >
          ISMAP cry-2 (Key Management) requires a key management policy covering
          the full lifecycle of cryptographic keys including generation, storage,
          rotation, and destruction, with customer-managed key options for
          government agencies. FedRAMP cm-6 (Configuration Settings) requires
          establishing and maintaining secure configuration baselines for all
          system components. Key management configuration (rotation intervals,
          storage mechanisms, HSM integration) represents a specialized domain
          within cm-6's scope of secure configuration settings, making cry-2
          a complementary control that deepens the cryptographic configuration
          requirements.
      - id: sc-7
        relationship: complements
        confidence: 0.72
        rationale: >
          ISMAP cry-2 requires that cryptographic keys used for government data
          are generated and stored within approved boundaries. FedRAMP sc-7
          (Boundary Protection) requires that connections to external networks
          occur only through managed interfaces with boundary protection devices.
          Cry-2's requirement for key generation and storage within approved
          boundaries supports sc-7's boundary protection architecture by ensuring
          that cryptographic material controlling data protection does not traverse
          or reside outside the defined security boundary.

  # ── ops (Operations) ──────────────────────────────────────────────────

  - source_control: ops-1
    target_controls:
      - id: cm-6
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          ISMAP ops-1 (Operational Procedures and Change Management) requires
          documented operating procedures and formal change management including
          risk assessment, authorization, testing, rollback capabilities, and
          post-implementation review. FedRAMP cm-6 (Configuration Settings)
          requires establishing, implementing, approving deviations from, and
          monitoring changes to configuration settings. Both controls govern how
          system configurations are established and changed, with ops-1 providing
          the overarching change management process and cm-6 defining the specific
          configuration baselines that changes are measured against.
      - id: ca-7
        relationship: complements
        confidence: 0.76
        rationale: >
          ISMAP ops-1 requires post-implementation review of changes and risk
          assessment of proposed changes. FedRAMP ca-7 (Continuous Monitoring)
          requires ongoing monitoring including change detection and analysis of
          significant changes. Ops-1's change management process complements
          ca-7's continuous monitoring by providing the governance framework
          for changes that ca-7 detects and tracks, particularly FedRAMP's
          significant change analysis requirements.

  - source_control: ops-2
    target_controls:
      - id: si-4
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          ISMAP ops-2 (Logging, Monitoring, and Vulnerability Management) requires
          producing and retaining event logs, protecting logging facilities from
          tampering, synchronizing system clocks, and evaluating technical
          vulnerabilities with timely remediation. FedRAMP si-4 (System Monitoring)
          requires monitoring the system for attacks and indicators of potential
          attacks, identifying unauthorized use through real-time monitoring,
          deploying monitoring devices strategically, and protecting monitoring
          data from unauthorized access. Both controls establish comprehensive
          system monitoring and logging requirements with integrity protections,
          making them functionally equivalent in their core intent of detecting
          security events through continuous monitoring.
      - id: ra-5
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ISMAP ops-2 requires evaluation of technical vulnerabilities and
          appropriate measures taken to address associated risks in a timely
          manner. FedRAMP ra-5 (Vulnerability Monitoring and Scanning) requires
          monthly vulnerability scanning with defined remediation timelines
          (Critical/High 30 days, Moderate 90 days, Low 180 days). Both controls
          directly address vulnerability management, with ops-2 establishing the
          general requirement and ra-5 specifying the operational scanning cadence
          and remediation SLAs.
      - id: ca-7
        relationship: complements
        confidence: 0.78
        rationale: >
          ISMAP ops-2 requires regular review of event logs and retention of log
          information. FedRAMP ca-7 (Continuous Monitoring) requires ongoing
          monitoring of system metrics with correlation and analysis of information
          generated by assessments. Ops-2's logging and monitoring outputs feed
          directly into ca-7's continuous monitoring programme, providing the data
          sources that enable ongoing control assessment and ConMon reporting.

  # ── com (Communications) ──────────────────────────────────────────────

  - source_control: com-1
    target_controls:
      - id: sc-7
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          ISMAP com-1 (Network Security Management) requires managing and
          controlling networks, segmenting networks based on classification levels,
          and protecting information in transit against unauthorized alteration,
          disclosure, and replay. FedRAMP sc-7 (Boundary Protection) requires
          monitoring and controlling communications at external and internal
          managed interfaces, implementing separated subnetworks for publicly
          accessible components, and connecting to external networks only through
          managed boundary protection devices. Both controls are functionally
          equivalent in establishing network segmentation, boundary monitoring,
          and traffic control requirements for cloud environments.

  - source_control: com-2
    target_controls:
      - id: sc-7
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          ISMAP com-2 (Data Transfer and Information Exchange Security) requires
          formal transfer policies and controls to protect information transfer
          through all communication facilities, including information transfer
          agreements with external parties. FedRAMP sc-7 (Boundary Protection)
          requires monitoring communications at managed interfaces and connecting
          to external networks only through managed boundary protection devices
          with defined security architecture. Both controls govern data flows
          across boundaries, with com-2 focusing on transfer policies and
          agreements while sc-7 focuses on the technical boundary enforcement
          mechanisms.
      - id: cm-6
        relationship: complements
        confidence: 0.70
        rationale: >
          ISMAP com-2 requires that electronic messaging be appropriately protected
          and that transfer controls enforce data sovereignty requirements. FedRAMP
          cm-6 (Configuration Settings) requires configuration baselines reflecting
          the most restrictive mode, including network device configurations that
          control data flows. Com-2's data transfer security requirements support
          cm-6 by mandating specific configuration settings for communication
          channels, including encryption requirements and geographic transfer
          restrictions that manifest as configuration settings on network and
          application components.

  # ── dev (Development) ─────────────────────────────────────────────────

  - source_control: dev-1
    target_controls:
      - id: cm-6
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISMAP dev-1 (Secure Development Policy and Lifecycle) requires rules
          for secure development, a secure SDLC with security requirements
          analysis and secure design principles, and separation of development,
          testing, and production environments. FedRAMP cm-6 (Configuration
          Settings) requires establishing and implementing configuration baselines
          for all system components. Dev-1's requirement for secure coding
          practices, secure deployment procedures, and environment separation maps
          to cm-6's mandate for documented configuration settings that enforce
          security across the system lifecycle, including development and
          deployment configurations.
      - id: ca-7
        relationship: complements
        confidence: 0.73
        rationale: >
          ISMAP dev-1 requires that security requirements be included in new
          system requirements and that the SDLC include security testing. FedRAMP
          ca-7 (Continuous Monitoring) requires ongoing control assessments and
          significant change analysis. Dev-1's secure development lifecycle
          complements ca-7 by ensuring that new development and system changes
          undergo security validation before entering the production environment
          that ca-7 monitors, particularly through the significant change process
          that triggers FedRAMP notification.

  - source_control: dev-2
    target_controls:
      - id: ra-5
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ISMAP dev-2 (Security Testing and Code Review) requires SAST, DAST,
          penetration testing at planned intervals, controlled test data, and
          enforced secure coding standards through automated tools and peer code
          review. FedRAMP ra-5 (Vulnerability Monitoring and Scanning) requires
          monthly vulnerability scanning using tools that facilitate interoperability,
          with analysis of scan reports and remediation within defined timelines.
          Both controls mandate systematic security testing through automated
          scanning tools (SAST, DAST, dependency scanning) with structured
          remediation tracking, making them strongly aligned in their security
          testing objectives.
      - id: ca-7
        relationship: complements
        confidence: 0.76
        rationale: >
          ISMAP dev-2 requires security testing at planned intervals and after
          changes, with test results retained as audit evidence. FedRAMP ca-7
          (Continuous Monitoring) requires ongoing control assessments with
          reporting to designated personnel. Dev-2's security testing outputs
          (SAST/DAST reports, penetration test results) directly feed into ca-7's
          continuous monitoring programme as evidence of ongoing control
          effectiveness and are reported as part of ConMon deliverables.

  # ── sup (Supplier Management) ────────────────────────────────────────

  - source_control: sup-1
    target_controls:
      - id: sa-9
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          ISMAP sup-1 (Supplier Security Policy and Agreements) requires
          establishing an information security policy for supplier relationships,
          agreeing security requirements with each supplier, and managing the
          ICT supply chain. FedRAMP sa-9 (External System Services) requires
          that external service providers comply with organizational security
          requirements including FedRAMP-authorized controls, with documented
          oversight and ongoing compliance monitoring. Both controls are
          functionally equivalent in establishing supply chain security governance:
          requiring security policies for supplier relationships, mandating
          security requirements in supplier agreements, and maintaining ongoing
          oversight of supplier compliance.

  - source_control: sup-2
    target_controls:
      - id: sa-9
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          ISMAP sup-2 (Supplier Service Monitoring and Change Management) requires
          regularly monitoring, reviewing, and auditing supplier service delivery,
          and managing supplier changes considering the criticality of involved
          systems. FedRAMP sa-9 (External System Services) requires employing
          security monitoring processes for external system services to ensure
          ongoing compliance, with quarterly tracking of FedRAMP authorization
          status. Both controls address ongoing supplier oversight, with sup-2
          focusing on continuous supplier monitoring and change evaluation, and
          sa-9 requiring ongoing compliance verification of external service
          providers.
      - id: ca-7
        relationship: complements
        confidence: 0.74
        rationale: >
          ISMAP sup-2 requires regular monitoring of supplier service delivery
          and evaluation of supplier changes on cloud service security. FedRAMP
          ca-7 (Continuous Monitoring) requires ongoing monitoring and reporting
          the security status of the system to designated personnel. Sup-2's
          supplier monitoring complements ca-7's continuous monitoring programme
          by extending the monitoring scope to include external service provider
          dependencies, which is critical for FedRAMP's external service risk
          reporting in ConMon deliverables.

  # ── inc (Incident Management) ────────────────────────────────────────

  - source_control: inc-1
    target_controls:
      - id: ir-6
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          ISMAP inc-1 (Incident Management Planning and Procedures) requires
          establishing management responsibilities and procedures for quick and
          effective incident response, reporting incidents through appropriate
          channels, requiring personnel to report security weaknesses, and
          defining procedures for evidence preservation. FedRAMP ir-6 (Incident
          Reporting) requires reporting suspected incidents within 1 hour, reporting
          to US-CERT, FedRAMP PMO, and the authorizing agency, with defined
          incident categories and communication procedures. Both controls
          establish comprehensive incident reporting frameworks with defined
          reporting channels, timelines, and responsibilities, making them
          functionally equivalent in their incident management objectives.
      - id: si-4
        relationship: complements
        confidence: 0.77
        rationale: >
          ISMAP inc-1 requires that information security incidents be identified
          and reported as quickly as possible, with procedures for evidence
          preservation. FedRAMP si-4 (System Monitoring) requires monitoring the
          system to detect attacks and indicators of potential attacks with
          real-time alerting capabilities. Inc-1's incident detection and
          reporting procedures complement si-4's system monitoring by providing
          the organizational response framework that acts upon the detection
          capabilities that si-4 establishes.

  - source_control: inc-2
    target_controls:
      - id: ir-6
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          ISMAP inc-2 (Incident Response, Recovery, and Lessons Learned) requires
          responding to incidents per documented procedures, using lessons learned
          to reduce future incident impact, and integrating information security
          continuity into business continuity management. FedRAMP ir-6 (Incident
          Reporting) requires updated incident reports within 7 calendar days with
          additional findings and root cause analysis. Inc-2's closed-loop incident
          management with post-incident reviews and lessons learned maps to ir-6's
          requirement for updated reporting with root cause analysis and ongoing
          incident tracking.
      - id: si-4
        relationship: complements
        confidence: 0.72
        rationale: >
          ISMAP inc-2 requires using knowledge from incident analysis to reduce
          future incident likelihood and integrating security continuity into
          business continuity. FedRAMP si-4 (System Monitoring) requires adjusting
          monitoring activity when risk changes and deploying monitoring devices
          to track specific transactions of interest. Inc-2's lessons-learned
          process supports si-4 by generating intelligence from resolved incidents
          that drives improvements to monitoring rules, detection coverage, and
          alerting thresholds.
      - id: ca-7
        relationship: complements
        confidence: 0.73
        rationale: >
          ISMAP inc-2 requires verifying information security continuity controls
          at regular intervals to ensure they remain valid and effective. FedRAMP
          ca-7 (Continuous Monitoring) requires ongoing control assessments and
          reporting the security status of the system. Inc-2's continuity testing
          complements ca-7's continuous monitoring by validating that recovery
          controls remain effective, which is a critical dimension of the overall
          control effectiveness that ca-7 tracks.

  # ── cmp (Compliance) ──────────────────────────────────────────────────

  - source_control: cmp-1
    target_controls:
      - id: ca-7
        relationship: intersects-with
        confidence: 0.87
        rationale: >
          ISMAP cmp-1 (Compliance with Legal and Regulatory Requirements) requires
          identifying, documenting, and keeping up to date all relevant legislative,
          regulatory, and contractual requirements, with continuous compliance
          monitoring and tracking findings to resolution. FedRAMP ca-7 (Continuous
          Monitoring) requires a system-level continuous monitoring strategy with
          ongoing control assessments, analysis, and reporting of security status.
          Both controls mandate continuous compliance verification with structured
          reporting, cmp-1 at the legal/regulatory level and ca-7 at the technical
          control level, creating a strong semantic mapping between regulatory
          compliance tracking and technical compliance monitoring.
      - id: cm-6
        relationship: complements
        confidence: 0.72
        rationale: >
          ISMAP cmp-1 requires ensuring compliance with legal, regulatory, and
          contractual requirements including protection of records from loss and
          unauthorized access. FedRAMP cm-6 (Configuration Settings) requires
          establishing configuration baselines using authoritative sources (CIS,
          DISA STIGs) with documented deviations. Cmp-1's regulatory compliance
          requirements support cm-6 by providing the legal basis for the
          configuration baselines that cm-6 enforces, ensuring that technical
          configurations align with applicable regulatory mandates.

  - source_control: cmp-2
    target_controls:
      - id: ca-7
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          ISMAP cmp-2 (Independent Review and Audit) requires independent review
          of the information security management approach at planned intervals,
          regular management review of compliance with policies and standards, and
          annual ISMAP assessment by an approved audit firm. FedRAMP ca-7
          (Continuous Monitoring) requires annual assessment of one-third of all
          controls rotating through the complete set over 3 years, ongoing control
          assessments, and reporting to the FedRAMP PMO and authorizing agency.
          Both controls establish structured independent assessment programmes
          with defined cadences, making them functionally equivalent in their
          assurance and audit objectives.
      - id: ra-5
        relationship: complements
        confidence: 0.74
        rationale: >
          ISMAP cmp-2 requires that information systems be regularly reviewed for
          compliance with information security policies and technical standards.
          FedRAMP ra-5 (Vulnerability Monitoring and Scanning) requires monthly
          vulnerability scanning with analysis and remediation tracking. Cmp-2's
          technical compliance reviews complement ra-5 by providing an independent
          verification layer that validates whether vulnerability management
          processes are operating effectively, particularly through the 3PAO
          assessment of vulnerability scanning practices.
