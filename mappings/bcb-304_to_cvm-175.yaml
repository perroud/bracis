id: bcb-304_to_cvm-175
title: "BCB 304 to CVM 175 Control Mapping"
source_framework: bcb-304
target_framework: cvm-175
version: "1.0.0"
last_updated: "2026-04-04"
methodology: structural
description: >
  Mapeamento entre a Resolucao BCB 304/2023 (regulamentacao de VASPs — prestadoras
  de servicos de ativos virtuais) e a Resolucao CVM 175/2022 (marco regulatorio de
  fundos de investimento, incluindo anexo normativo V sobre criptoativos). A BCB 304
  regula custodia e intermediacao de criptoativos; a CVM 175 regula fundos que
  investem nesses ativos.

mappings:
  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: complements
        confidence: 0.80
        rationale: >
          Ambos definem escopo de regulamentacao para ativos virtuais/criptoativos.
          BCB 304: VASPs e intermediarios. CVM 175: fundos de investimento.

  - source_control: art-4
    target_controls:
      - id: anx-v-art-1
        relationship: complements
        confidence: 0.85
        rationale: >
          Definicoes de ativos virtuais na BCB 304 complementam a classificacao
          de criptoativos como classe de ativo investivel no Anexo V da CVM 175.

  - source_control: art-9
    target_controls:
      - id: art-19
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Segregacao patrimonial: BCB 304 exige separacao entre ativos da VASP
          e dos clientes; CVM 175 exige custodia segregada por fundo e classe.

  - source_control: art-10
    target_controls:
      - id: art-21
        relationship: complements
        confidence: 0.80
        rationale: >
          Custodia de criptoativos (cold storage, hot wallets) na BCB 304
          complementa os requisitos de custodia qualificada da CVM 175.

  - source_control: art-12
    target_controls:
      - id: art-58
        relationship: equivalent-to
        confidence: 0.80
        rationale: >
          Governanca e controles internos: ambos exigem estrutura de governanca
          com segregacao de funcoes, compliance officer e auditoria.

  - source_control: art-14
    target_controls:
      - id: art-62
        relationship: equivalent-to
        confidence: 0.80
        rationale: >
          Auditoria independente: BCB 304 exige auditoria externa para VASPs;
          CVM 175 exige auditor independente para fundos.

  - source_control: art-15
    target_controls:
      - id: anx-v-art-4
        relationship: complements
        confidence: 0.85
        rationale: >
          PLD/FT para ativos virtuais (travel rule, KYC) na BCB 304 complementa
          os requisitos de due diligence para fundos cripto na CVM 175.

  - source_control: art-17
    target_controls:
      - id: anx-v-art-7
        relationship: complements
        confidence: 0.80
        rationale: >
          Monitoramento de transacoes suspeitas (BCB 304) complementa os
          requisitos de gestao de risco para investimentos em cripto (CVM 175).

  - source_control: art-19
    target_controls:
      - id: art-27
        relationship: complements
        confidence: 0.80
        rationale: >
          Seguranca cibernetica para VASPs (BCB 304) complementa os requisitos
          de gestao de riscos operacionais e tecnologicos da CVM 175.

  - source_control: art-22
    target_controls:
      - id: art-37
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Transparencia e divulgacao: ambos exigem informacoes claras ao
          investidor/cliente sobre riscos, taxas, termos e condicoes.

  - source_control: art-24
    target_controls:
      - id: art-43
        relationship: complements
        confidence: 0.80
        rationale: >
          Alertas de risco ao cliente (BCB 304 — volatilidade cripto) complementam
          os requisitos de fato relevante e comunicacao da CVM 175.
