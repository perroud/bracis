id: lai_to_lgpd
title: "LAI to LGPD Control Mapping"
source_framework: lai
target_framework: lgpd
version: "1.0.0"
last_updated: "2026-04-04"
methodology: structural
description: >
  Cross-framework mapping between the Lei de Acesso a Informacao (LAI — Law 12.527/2011)
  and the Lei Geral de Protecao de Dados (LGPD — Law 13.709/2018). The LAI establishes
  transparency obligations for public bodies, while the LGPD regulates personal data
  processing. The two laws intersect on personal data held by government entities: the LAI
  restricts access to personal information in public records, while the LGPD governs
  how that data is processed, shared, and protected. This mapping identifies controls
  where transparency obligations meet data protection requirements.

mappings:
  - source_control: art-21
    target_controls:
      - id: art-11
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          LAI art-21 (Protection of Personal Information in Public Records) restricts
          access to personal data relating to privacy, honor, and personal image for up
          to 100 years, requiring consent for disclosure. LGPD art-11 (Processing of
          Sensitive Personal Data) imposes additional safeguards for sensitive data
          categories. Both controls regulate the handling of personal information that
          requires heightened protection, but from opposing perspectives: LAI restricts
          disclosure, LGPD restricts processing.
      - id: art-7
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          LAI art-21 allows disclosure of personal information with the express consent
          of the data subject. LGPD art-7 (Legal Bases for Processing) establishes
          consent as one of the legal bases for data processing. Both frameworks
          recognize consent as a gateway for handling personal data, creating a direct
          intersection on consent-based data disclosure by public bodies.
      - id: art-8
        relationship: complements
        confidence: 0.80
        rationale: >
          LAI art-21 requires express consent for disclosure of personal information to
          third parties. LGPD art-8 (Consent Requirements) details the specific
          requirements for valid consent including prominence, specificity, and
          revocability. LGPD art-8 complements the LAI consent requirement by providing
          the granular rules that govern how consent must be obtained and managed.

  - source_control: art-6
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          LAI art-6 (Duty of Active Disclosure) mandates transparent information
          management while also requiring protection of personal information and
          classified data. LGPD art-6 (Principles) establishes principles including
          purpose limitation, necessity, transparency, and security. Both controls
          require organizations to balance transparency with data protection, creating
          a direct intersection at the principle level.
      - id: art-46
        relationship: complements
        confidence: 0.82
        rationale: >
          LAI art-6 requires public bodies to protect information by ensuring
          availability, authenticity, and integrity. LGPD art-46 (Security Measures)
          requires technical and administrative measures to protect personal data from
          unauthorized access, destruction, loss, or alteration. LGPD art-46
          complements the LAI information protection obligation by specifying the
          security measures that must be applied to personal data.

  - source_control: art-15
    target_controls:
      - id: art-11
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          LAI art-15 (Classification Criteria for Restricted Information) defines
          criteria for restricting access to information based on national security,
          public safety, and other state interests. LGPD art-11 (Sensitive Data)
          establishes categories of data that require additional protections. Both
          controls create classification schemes that restrict data handling, though
          LAI classifies by state interest while LGPD classifies by data sensitivity.

  - source_control: art-3
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          LAI art-3 (Guiding Principles) establishes publicity as the general rule and
          secrecy as the exception, alongside proactive disclosure and use of technology.
          LGPD art-6 (Principles) establishes transparency, free access, and data
          quality as foundational principles. Both sets of principles require
          transparency and accessibility, but LGPD adds purpose limitation and necessity
          constraints that can limit the scope of disclosure mandated by LAI.
      - id: art-9
        relationship: complements
        confidence: 0.80
        rationale: >
          LAI art-3 directs proactive disclosure of public interest information using
          technology. LGPD art-9 (Facilitated Access to Processing Information) requires
          that data subjects have easy and free access to information about how their
          data is processed. Both controls promote information accessibility, with LGPD
          art-9 complementing the LAI transparency directive by specifying what data
          processing information must be made available to individuals.

  - source_control: art-7
    target_controls:
      - id: art-18
        relationship: intersects-with
        confidence: 0.87
        rationale: >
          LAI art-7 (Right to Obtain Information) grants citizens the right to obtain
          information from public bodies, including data about government programs,
          inspections, and administrative actions. LGPD art-18 (Data Subject Rights)
          grants individuals rights including access, correction, deletion, and
          portability of their personal data. Both controls establish citizen access
          rights, but LAI focuses on public information while LGPD focuses on personal
          data, intersecting when the requested public information contains personal data.
      - id: art-19
        relationship: complements
        confidence: 0.82
        rationale: >
          LAI art-7 establishes the general right to obtain information from public
          bodies. LGPD art-19 (Confirmation of Existence and Access to Personal Data)
          specifies that data subjects may request confirmation of data processing and
          access to their personal data within defined timelines. LGPD art-19
          complements LAI art-7 by providing specific procedural requirements for
          personal data access requests.

  - source_control: art-8
    target_controls:
      - id: art-25
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          LAI art-8 (Mandatory Proactive Disclosure via Internet) requires public
          bodies to publish information in open, structured, machine-readable formats
          on the internet. LGPD art-25 (Interoperable and Structured Data Formats)
          requires personal data held by public bodies to be kept in interoperable,
          structured formats for shared use. Both controls mandate structured data
          formats for government-held information, intersecting on the technical
          standards for data availability.
      - id: art-23
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          LAI art-8 mandates proactive internet disclosure of public information. LGPD
          art-23 (Data Processing by Public Bodies) establishes that public authorities
          may process personal data only for public policy purposes and must inform
          ANPD about shared data. The intersection occurs because proactive disclosure
          under LAI must respect the LGPD constraints on publishing personal data held
          by government agencies.

  - source_control: art-23
    target_controls:
      - id: art-52
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          LAI art-23 (Conduct Subject to Sanctions) defines illicit conduct by public
          agents regarding information handling, including refusal to provide information,
          improper use, destruction, and unauthorized disclosure of personal data. LGPD
          art-52 (Administrative Sanctions) establishes the sanctions framework for
          LGPD violations. Both controls define sanctionable conduct related to
          information mishandling, with LAI targeting public agents and LGPD targeting
          data controllers and processors.

  - source_control: art-11
    target_controls:
      - id: art-19
        relationship: intersects-with
        confidence: 0.84
        rationale: >
          LAI art-11 (Response Deadlines and Procedures) establishes that public bodies
          must respond to information requests within 20 days, extendable by 10 more.
          LGPD art-19 (Confirmation of Existence and Access) requires data controllers
          to respond to data subject requests within 15 days. Both controls impose
          response timelines for citizen information requests, intersecting when a
          citizen requests personal data from a public body under either law.

  - source_control: art-20
    target_controls:
      - id: art-46
        relationship: complements
        confidence: 0.78
        rationale: >
          LAI art-20 (Handling of Classified Information) establishes controls for the
          handling, transport, and storage of classified information to prevent
          unauthorized access. LGPD art-46 (Security Measures) requires technical and
          administrative measures to protect personal data. LGPD art-46 complements LAI
          art-20 by extending security obligations to all personal data, not only
          classified information.
      - id: art-47
        relationship: complements
        confidence: 0.75
        rationale: >
          LAI art-20 requires controls over classified information throughout its
          lifecycle. LGPD art-47 (Privacy by Design) requires that data protection be
          embedded from the design phase of systems and processes. LGPD art-47
          complements LAI art-20 by requiring that information protection controls be
          integrated proactively rather than applied retroactively.

  - source_control: art-25
    target_controls:
      - id: art-52
        relationship: intersects-with
        confidence: 0.76
        rationale: >
          LAI art-25 (Oversight Mechanisms and CMRI) establishes the Mixed Commission
          for Information Reclassification as the oversight body for LAI compliance.
          LGPD art-52 (Administrative Sanctions) establishes ANPD as the enforcement
          authority for data protection violations. Both controls define oversight and
          enforcement mechanisms, intersecting when CMRI oversight involves decisions
          about personal data classification and disclosure.

  - source_control: art-9
    target_controls:
      - id: art-18
        relationship: complements
        confidence: 0.79
        rationale: >
          LAI art-9 (Citizen Information Service — SIC) requires public bodies to
          establish dedicated service points for receiving and processing information
          requests from citizens. LGPD art-18 (Data Subject Rights) grants individuals
          the right to submit requests regarding their personal data. LGPD art-18
          complements the LAI SIC requirement by specifying additional request types
          (correction, deletion, portability) that government service points must
          handle when personal data is involved.
