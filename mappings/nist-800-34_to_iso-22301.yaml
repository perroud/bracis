id: nist-800-34_to_iso-22301
title: "NIST SP 800-34 Rev 1 to ISO 22301:2019 Control Mapping"
source_framework: nist-800-34
target_framework: iso-22301
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic

mappings:
  # pol — Policy and Planning
  - source_control: pol-1
    target_controls:
      - id: cl-5.2
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          NIST pol-1 (Contingency Planning Policy) and ISO 22301 cl-5.2 (Policy)
          are functionally equivalent. Both require a formal policy statement
          approved by senior/top management that defines the organizational framework,
          objectives, and responsibilities for continuity planning. Both mandate
          policy communication to relevant personnel and periodic review. The NIST
          control is scoped to information system contingency planning whereas
          ISO 22301 addresses broader business continuity, but the policy structure,
          governance, and lifecycle requirements are directly aligned.
      - id: cl-5.3
        relationship: complements
        confidence: 0.78
        rationale: >
          NIST pol-1 requires the policy to identify roles, responsibilities, and
          assigned personnel by name. ISO 22301 cl-5.3 (Organizational roles,
          responsibilities and authorities) addresses these requirements in a
          dedicated control. The NIST control embeds role assignment within the
          policy whereas ISO 22301 treats it as a separate management system element.
      - id: cl-4.3
        relationship: complements
        confidence: 0.72
        rationale: >
          NIST pol-1 requires the policy to define the applicability of contingency
          planning across the organization. ISO 22301 cl-4.3 (Determining the scope
          of the BCMS) addresses scope definition as a prerequisite for the management
          system. The NIST policy applicability statement serves a similar purpose to
          the ISO scope definition, though ISO 22301 treats scope as a separate
          foundational element.

  - source_control: pol-2
    target_controls:
      - id: cl-8.2
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          NIST pol-2 (Business Impact Analysis) and ISO 22301 cl-8.2 (Business
          impact analysis) are directly equivalent. Both require identifying critical
          resources and activities, assessing disruption impacts over time,
          establishing recovery priorities and time frames, and identifying
          dependencies including suppliers and partners. Both mandate determining
          MTD/MTPD, RTO, and RPO for critical systems and activities. The ISO control
          additionally references minimum business continuity objectives (MBCO),
          but the core BIA process, inputs, and outputs are aligned.
      - id: cl-6.2
        relationship: complements
        confidence: 0.80
        rationale: >
          NIST pol-2 BIA outputs (RTO, RPO, MTD) directly feed into measurable
          business continuity objectives. ISO 22301 cl-6.2 (Business continuity
          objectives) requires establishing measurable objectives at relevant
          functions and levels. The BIA provides the quantitative basis for
          setting these objectives, making the two controls complementary in the
          planning process.
      - id: cl-4.1
        relationship: complements
        confidence: 0.73
        rationale: >
          NIST pol-2 requires characterizing information system requirements,
          processes, and interdependencies. ISO 22301 cl-4.1 (Understanding the
          organization and its context) requires identifying activities, supply
          chains, and relationships. Both involve understanding organizational
          dependencies, though the BIA provides a deeper quantitative analysis
          while cl-4.1 establishes broader organizational context.

  - source_control: pol-3
    target_controls:
      - id: cl-8.5
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          NIST pol-3 (Contingency Plan Development) and ISO 22301 cl-8.5 (Business
          continuity plans and procedures) are functionally equivalent. Both require
          documented plans with defined roles and responsibilities, notification and
          activation procedures, recovery and reconstitution activities, escalation
          criteria, and communication procedures. Both mandate that plans be
          actionable, accessible during disruptions, and coordinated with related
          plans. The NIST control addresses five specific plan phases
          (notification/activation, recovery, reconstitution) that align with
          ISO 22301's requirement for managing immediate consequences and resuming
          prioritized activities.
      - id: cl-8.4
        relationship: complements
        confidence: 0.82
        rationale: >
          NIST pol-3 requires documenting technical capabilities designed to support
          contingency operations, which aligns with ISO 22301 cl-8.4 (Business
          continuity strategies and solutions). The contingency plan documents the
          selected strategies whereas cl-8.4 focuses on identifying and selecting
          those strategies. Both address recovery site selection, data protection,
          and resource allocation for continuity.

  - source_control: pol-4
    target_controls:
      - id: cl-8.3
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          NIST pol-4 (Identify Preventive Controls) requires identifying controls
          that deter, detect, or reduce disruption impacts based on BIA findings.
          ISO 22301 cl-8.3 (Risk assessment) requires identifying risks, analyzing
          them, and determining appropriate treatment. Preventive controls in NIST
          represent risk treatment measures (mitigation) within the ISO risk
          assessment framework. Both use BIA outputs as inputs and aim to reduce
          the likelihood and impact of disruptions.
      - id: cl-8.4
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          NIST pol-4 identifies preventive measures such as environmental controls,
          redundancy, and access controls that map to ISO 22301 cl-8.4 (Business
          continuity strategies and solutions). The preventive controls represent
          specific strategy implementations for protecting and stabilizing
          prioritized activities and their supporting resources.
      - id: cl-6.1
        relationship: complements
        confidence: 0.75
        rationale: >
          NIST pol-4 identifies preventive measures to address disruption risks,
          which supports ISO 22301 cl-6.1 (Actions to address risks and opportunities).
          Both require systematic identification of risk mitigation actions, though
          cl-6.1 addresses risks to the BCMS itself in addition to operational risks.

  # prev — Preventive Measures
  - source_control: prev-1
    target_controls:
      - id: cl-8.4
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          NIST prev-1 (Data Backup and Storage) is a specific implementation of
          the broader business continuity strategies required by ISO 22301 cl-8.4
          (Business continuity strategies and solutions). Data backup addresses the
          technology dimension of continuity strategy — specifically data
          replication, offsite backup, and alternative access methods. The ISO
          control requires strategies that protect prioritized activities and their
          supporting resources, of which data backup is a critical component.
      - id: cl-8.3
        relationship: complements
        confidence: 0.72
        rationale: >
          NIST prev-1 backup requirements are derived from risk assessment outcomes.
          ISO 22301 cl-8.3 (Risk assessment) identifies risks of disruption to
          prioritized activities and supporting resources, including data. Backup
          strategies represent risk treatment for data loss and corruption risks
          identified through the assessment process.

  - source_control: prev-2
    target_controls:
      - id: cl-8.4
        relationship: intersects-with
        confidence: 0.87
        rationale: >
          NIST prev-2 (Alternate Storage Site) addresses geographic separation of
          backup data, which is a specific implementation of ISO 22301 cl-8.4
          (Business continuity strategies and solutions). The ISO control requires
          strategies for protecting prioritized activities and their dependencies,
          including premises and information. Alternate storage sites protect
          information availability against site-level disasters, directly
          implementing the technology and information dimensions of continuity
          strategy.
      - id: cl-8.3
        relationship: complements
        confidence: 0.70
        rationale: >
          NIST prev-2 alternate storage requirements respond to site-level disaster
          risks identified through the risk assessment process. ISO 22301 cl-8.3
          (Risk assessment) encompasses the identification and evaluation of
          geographic and environmental risks that justify alternate storage
          provisions.

  - source_control: prev-3
    target_controls:
      - id: cl-8.4
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          NIST prev-3 (Alternate Processing Site) and ISO 22301 cl-8.4 (Business
          continuity strategies and solutions) are directly aligned on the premises
          dimension of continuity strategy. Both require identifying alternate
          facilities, establishing agreements, and ensuring equivalent security
          and operational capabilities. The NIST control's classification of site
          types (cold, warm, hot, mirrored, mobile) and selection criteria based
          on RTO and budget maps directly to the ISO requirement for selecting
          strategies based on BIA and risk assessment outputs.
      - id: cl-8.5
        relationship: complements
        confidence: 0.76
        rationale: >
          NIST prev-3 requires agreements and procedures for transferring operations
          to alternate sites, which must be documented in the business continuity
          plans required by ISO 22301 cl-8.5 (Business continuity plans and
          procedures). The alternate processing site procedures become components
          of the recovery and resumption procedures within the continuity plans.

  - source_control: prev-4
    target_controls:
      - id: cl-8.4
        relationship: intersects-with
        confidence: 0.84
        rationale: >
          NIST prev-4 (Equipment and Supply Protection) addresses physical
          infrastructure protection including environmental controls,
          telecommunications redundancy, and supply chain arrangements. ISO 22301
          cl-8.4 (Business continuity strategies and solutions) requires strategies
          covering premises, technology, and suppliers. Equipment protection
          implements the technology and premises dimensions of continuity strategy.
      - id: cl-8.3
        relationship: complements
        confidence: 0.71
        rationale: >
          NIST prev-4 equipment protection measures respond to environmental and
          supply chain risks identified through the risk assessment process.
          ISO 22301 cl-8.3 (Risk assessment) encompasses identifying risks to
          supporting resources including equipment, facilities, and supply chains,
          and prev-4 controls represent treatment of those identified risks.
      - id: cl-4.1
        relationship: complements
        confidence: 0.70
        rationale: >
          NIST prev-4 requires understanding equipment dependencies, vendor
          relationships, and telecommunications infrastructure. ISO 22301 cl-4.1
          (Understanding the organization and its context) requires identifying
          activities, supply chains, and relationships that support service
          provision. Equipment dependency analysis contributes to organizational
          context understanding.

  # rec — Recovery
  - source_control: rec-1
    target_controls:
      - id: cl-8.5
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          NIST rec-1 (System Recovery Procedures) and ISO 22301 cl-8.5 (Business
          continuity plans and procedures) are directly aligned on recovery
          procedures. Both require documented, step-by-step recovery procedures
          that can be executed by qualified personnel, prioritization of recovery
          based on criticality, validation of functionality after recovery, and
          accessible documentation. The NIST control focuses on IT system recovery
          specifics (OS restoration, application installation, data restoration,
          network restoration) while ISO 22301 addresses broader activity recovery,
          but the procedural framework is equivalent.
      - id: cl-8.4
        relationship: complements
        confidence: 0.78
        rationale: >
          NIST rec-1 recovery procedures implement the strategies selected under
          ISO 22301 cl-8.4 (Business continuity strategies and solutions). The
          procedures operationalize the technology recovery strategy by defining
          how backup restoration, configuration recovery, and system validation
          are executed in practice.

  - source_control: rec-2
    target_controls:
      - id: cl-8.5
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          NIST rec-2 (System Reconstitution) addresses the return to normal
          operations, which ISO 22301 cl-8.5 (Business continuity plans and
          procedures) encompasses within the full lifecycle of disruption
          management. Both address transitioning from alternate to primary
          operations, validating readiness, and formal plan deactivation.
          The NIST control is more specific about reconstitution phases
          (facility validation, concurrent operations, formal deactivation)
          while ISO 22301 addresses reconstitution as part of the broader
          plan lifecycle.
      - id: cl-10.1
        relationship: complements
        confidence: 0.77
        rationale: >
          NIST rec-2 requires a post-event review to identify lessons learned
          after reconstitution. ISO 22301 cl-10.1 (Nonconformity and corrective
          action) provides the framework for analyzing what went wrong during
          the disruption, determining root causes, and implementing corrective
          actions. Both contribute to organizational learning from disruption
          events.
      - id: cl-10.2
        relationship: complements
        confidence: 0.72
        rationale: >
          NIST rec-2 post-event review feeds into the continual improvement
          process. ISO 22301 cl-10.2 (Continual improvement) requires using
          outputs from analysis and management review to drive BCMS improvements.
          Lessons learned from reconstitution events are a primary input to the
          improvement process.

  - source_control: rec-3
    target_controls:
      - id: cl-8.4
        relationship: intersects-with
        confidence: 0.86
        rationale: >
          NIST rec-3 (Alternate Processing and Telecommunications) addresses
          telecommunications redundancy and alternate service providers, which
          maps to the technology dimension of ISO 22301 cl-8.4 (Business
          continuity strategies and solutions). Both require identifying and
          implementing alternate capabilities to ensure continued operations.
          The NIST control specifically addresses diverse routing, redundant
          providers, and priority-of-service agreements, which are specific
          strategy implementations under the ISO framework.
      - id: cl-8.3
        relationship: complements
        confidence: 0.73
        rationale: >
          NIST rec-3 alternate telecommunications requirements respond to
          connectivity risks identified through the risk assessment. ISO 22301
          cl-8.3 (Risk assessment) identifies risks to supporting resources
          including telecommunications infrastructure. Network redundancy
          measures represent treatment of those identified risks.

  - source_control: rec-4
    target_controls:
      - id: cl-8.5
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          NIST rec-4 (Notification and Activation Procedures) and ISO 22301 cl-8.5
          (Business continuity plans and procedures) are directly aligned on the
          activation dimension. Both require defined activation criteria, notification
          chains with alternates, damage assessment procedures, escalation criteria,
          and communication procedures. ISO 22301 explicitly requires documented
          escalation and activation criteria and effective communication procedures,
          which directly corresponds to the NIST notification/activation phase
          requirements.
      - id: cl-5.3
        relationship: complements
        confidence: 0.75
        rationale: >
          NIST rec-4 defines which personnel are authorized to activate the plan
          and the notification chain, which complements ISO 22301 cl-5.3
          (Organizational roles, responsibilities and authorities). The activation
          authority and notification responsibilities represent specific role
          assignments within the broader BCMS governance structure.

  # mnt — Maintenance
  - source_control: mnt-1
    target_controls:
      - id: cl-8.6
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          NIST mnt-1 (Contingency Plan Testing) and ISO 22301 cl-8.6 (Exercise
          programme) are functionally equivalent. Both require periodic testing
          with progressively rigorous methods (tabletop/discussion through
          full-interruption/full-scale), scenario-based exercises with defined
          objectives, documented results and corrective actions, and validation
          of the entire set of continuity arrangements over time. Both mandate
          formalized post-exercise reports and integration of lessons learned
          into plan updates. The testing types described in NIST (checklist,
          walkthrough, simulation, parallel, full-interruption) correspond
          directly to the ISO exercise types (discussion-based, functional,
          full-scale).
      - id: cl-9.1
        relationship: complements
        confidence: 0.74
        rationale: >
          NIST mnt-1 test results provide performance measurement data that
          feeds into ISO 22301 cl-9.1 (Monitoring, measurement, analysis and
          evaluation). Exercise outcomes, corrective action closure rates, and
          RTO/RPO compliance during tests are key metrics for evaluating BCMS
          effectiveness.

  - source_control: mnt-2
    target_controls:
      - id: cl-8.6
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          NIST mnt-2 (Contingency Plan Training) maps to ISO 22301 cl-8.6
          (Exercise programme) as exercises inherently include training elements.
          ISO 22301 requires exercises that validate business continuity
          arrangements and build competence, which encompasses the training
          objectives of NIST mnt-2. Both require hands-on practice, role-specific
          preparation, and periodic refresher activities. However, ISO 22301
          addresses training more broadly under Clause 7 (Support) competence
          requirements, while NIST treats training as a distinct contingency
          planning activity.
      - id: cl-5.3
        relationship: complements
        confidence: 0.75
        rationale: >
          NIST mnt-2 requires training personnel on their contingency plan roles
          and responsibilities. ISO 22301 cl-5.3 (Organizational roles,
          responsibilities and authorities) requires that roles are assigned,
          communicated, and understood. Training is the mechanism that ensures
          personnel understand their assigned responsibilities, making the
          two controls complementary.
      - id: cl-8.5
        relationship: complements
        confidence: 0.73
        rationale: >
          NIST mnt-2 training covers plan activation criteria, notification
          procedures, recovery and reconstitution procedures, and backup
          locations. ISO 22301 cl-8.5 (Business continuity plans and procedures)
          defines the plans that training must cover. Training effectiveness
          directly supports plan executability during disruptions.

  - source_control: mnt-3
    target_controls:
      - id: cl-10.1
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          NIST mnt-3 (Contingency Plan Maintenance) requires updating plans based
          on test results, lessons learned, and identified deficiencies. ISO 22301
          cl-10.1 (Nonconformity and corrective action) provides the framework for
          addressing nonconformities discovered during plan reviews, tests, or
          actual events. Both require root cause analysis, corrective action
          implementation, and effectiveness verification. Plan maintenance is
          a specific application of the broader corrective action process.
      - id: cl-10.2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          NIST mnt-3 requires the contingency plan to be a living document updated
          regularly, which directly aligns with ISO 22301 cl-10.2 (Continual
          improvement). Both require systematic incorporation of lessons learned,
          test results, organizational changes, and evolving threats into the
          continuity framework. The NIST annual review cycle and change-triggered
          updates align with the ISO PDCA improvement cycle.
      - id: cl-9.3
        relationship: complements
        confidence: 0.78
        rationale: >
          NIST mnt-3 plan maintenance is informed by senior management review
          of plan effectiveness. ISO 22301 cl-9.3 (Management review) requires
          top management to review the BCMS for continuing suitability and
          effectiveness. Management review outputs (decisions on scope changes,
          resource needs, improvement initiatives) directly trigger plan
          maintenance activities.

  # tech — Technology-Specific Considerations
  - source_control: tech-1
    target_controls:
      - id: cl-8.4
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          NIST tech-1 (Client/Server and Cloud System Contingency) addresses
          technology-specific recovery strategies including multi-region
          deployment, cloud provider shared responsibility, and service-level
          agreements. ISO 22301 cl-8.4 (Business continuity strategies and
          solutions) requires strategies addressing technology dependencies
          and supporting resources. The NIST control provides specific
          implementation guidance for cloud and client/server architectures
          within the broader ISO strategy framework.
      - id: cl-8.3
        relationship: complements
        confidence: 0.74
        rationale: >
          NIST tech-1 identifies cloud-specific risks including vendor lock-in,
          shared responsibility gaps, and data portability constraints. ISO 22301
          cl-8.3 (Risk assessment) requires identifying risks to supporting
          resources. Cloud and client/server risk assessment represents a
          technology-specific application of the broader risk assessment process.
      - id: cl-4.1
        relationship: complements
        confidence: 0.72
        rationale: >
          NIST tech-1 requires understanding cloud service provider relationships,
          shared responsibility models, and technology dependencies. ISO 22301
          cl-4.1 (Understanding the organization and its context) requires
          identifying technology dependencies and external relationships that
          affect the BCMS. Cloud provider assessment contributes to organizational
          context analysis.

  - source_control: tech-2
    target_controls:
      - id: cl-8.4
        relationship: intersects-with
        confidence: 0.84
        rationale: >
          NIST tech-2 (Telecommunications System Contingency) addresses network
          infrastructure redundancy, diverse routing, and alternate service
          providers. ISO 22301 cl-8.4 (Business continuity strategies and
          solutions) encompasses telecommunications as a supporting resource
          for prioritized activities. The NIST control provides specific
          telecommunications continuity strategies (diverse routing, multiple
          providers, TSP program) that implement the technology dimension
          of the ISO strategy framework.
      - id: cl-8.3
        relationship: complements
        confidence: 0.73
        rationale: >
          NIST tech-2 requires identifying telecommunications single points of
          failure and matching redundancy to system criticality. ISO 22301 cl-8.3
          (Risk assessment) requires identifying risks to supporting resources.
          Telecommunications risk assessment is a specific domain within the
          broader risk assessment process that identifies disruption risks to
          network infrastructure.
      - id: cl-4.2
        relationship: complements
        confidence: 0.70
        rationale: >
          NIST tech-2 addresses telecommunications service level agreements
          and provider relationships. ISO 22301 cl-4.2 (Understanding the needs
          and expectations of interested parties) requires identifying
          stakeholder requirements including contractual obligations.
          Telecommunications provider agreements represent specific interested
          party relationships that affect BCMS planning.

  - source_control: tech-3
    target_controls:
      - id: cl-8.4
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          NIST tech-3 (Mainframe and Legacy System Contingency) addresses
          specialized recovery strategies for legacy platforms including hardware
          compatibility, specialized licensing, and knowledge management. ISO 22301
          cl-8.4 (Business continuity strategies and solutions) requires strategies
          that address technology dependencies. Legacy system contingency represents
          a technology-specific strategy implementation that addresses unique
          challenges of centralized, proprietary architectures within the broader
          ISO strategy framework.
      - id: cl-8.3
        relationship: complements
        confidence: 0.72
        rationale: >
          NIST tech-3 identifies legacy-specific risks including limited hardware
          availability, diminishing qualified personnel, and proprietary technology
          dependencies. ISO 22301 cl-8.3 (Risk assessment) requires identifying
          risks of disruption to supporting resources. Legacy system risk
          assessment identifies technology obsolescence and knowledge retention
          risks that may not surface in generic assessments.
      - id: cl-8.5
        relationship: complements
        confidence: 0.71
        rationale: >
          NIST tech-3 requires extremely detailed recovery procedures due to
          legacy system complexity and limited availability of qualified personnel.
          ISO 22301 cl-8.5 (Business continuity plans and procedures) requires
          plans that can be executed effectively. Legacy system recovery
          documentation standards directly support the executability requirement
          of business continuity plans.
