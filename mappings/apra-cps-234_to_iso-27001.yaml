id: apra-cps-234_to_iso-27001
title: "APRA CPS 234 to ISO 27001:2022 Control Mapping"
source_framework: apra-cps-234
target_framework: iso-27001-2022
version: "1.0.0"
last_updated: "2026-04-06"
methodology: structural
description: >
  Cross-framework mapping between APRA Prudential Standard CPS 234 (Information
  Security) and ISO/IEC 27001:2022 (Information Security Management Systems — Annex A
  controls). CPS 234 is a mandatory prudential standard for Australian Prudential
  Regulation Authority (APRA) regulated entities covering board accountability,
  information security capability, policy frameworks, asset management, control
  implementation, incident management, testing, and internal audit. ISO 27001:2022
  provides the internationally recognized baseline for information security management.
  This mapping traces each CPS 234 requirement to the corresponding ISO 27001 Annex A
  controls it intersects with, implements, or complements.

mappings:
  - source_control: cps234-15
    target_controls:
      - id: a5.1
        relationship: intersects-with
        confidence: 0.93
        rationale: >
          CPS 234 para 15 (Board Responsibilities) requires the Board to ensure
          information security is maintained commensurate with threats. A5.1 (Policies
          for information security) requires management-approved policies. Both establish
          top-level governance accountability, but CPS 234 places explicit Board-level
          obligations including ensuring roles, capability, and policy frameworks, while
          A5.1 focuses on policy definition and approval.
      - id: a5.2
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          CPS 234 para 15.a requires the Board to ensure clearly defined roles and
          responsibilities for information security functions. A5.2 (Information security
          roles and responsibilities) requires that roles and responsibilities be defined
          and allocated. CPS 234 adds Board-level oversight and approval obligations
          beyond what A5.2 requires.

  - source_control: cps234-16
    target_controls:
      - id: a5.2
        relationship: intersects-with
        confidence: 0.95
        rationale: >
          CPS 234 para 16 (Senior Management Responsibilities) requires senior management
          to define and assign information security roles with appropriate skills and
          authority. A5.2 requires roles and responsibilities to be defined and allocated
          with segregation of duties and competence. The two controls address the same
          domain from different regulatory perspectives — CPS 234 is more prescriptive
          about senior management delegation and resource adequacy.
      - id: a6.1
        relationship: complements
        confidence: 0.72
        rationale: >
          CPS 234 para 16.b requires individuals assigned information security
          responsibilities to have necessary competence. A6.1 (Screening) addresses
          background verification of personnel. While A6.1 focuses on pre-employment
          screening rather than competency for security roles, both contribute to
          ensuring qualified personnel fill security functions.

  - source_control: cps234-17
    target_controls:
      - id: a5.1
        relationship: complements
        confidence: 0.82
        rationale: >
          CPS 234 para 17 (Governing Body Oversight) requires governing bodies to
          receive sufficient information to challenge management on information security
          matters. A5.1 requires policies to be reviewed at planned intervals. CPS 234
          adds a governance scrutiny layer requiring regular reporting on security status,
          incidents, testing results, and emerging threats beyond A5.1's policy review
          scope.
      - id: a5.36
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CPS 234 para 17 requires governing bodies to assess the adequacy of information
          security. A5.36 (Compliance with policies, rules and standards) requires regular
          compliance review. Both address oversight and review of information security
          adequacy, though CPS 234 specifies governing body-level review with credible
          challenge capability.

  - source_control: cps234-18
    target_controls:
      - id: a5.2
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          CPS 234 para 18 (Information Security Function Resources) requires an
          adequately resourced information security function with skilled personnel and
          sufficient authority. A5.2 requires roles and responsibilities to be defined
          and allocated with competent individuals. CPS 234 goes further by mandating
          regular resource adequacy assessment and organizational authority for the
          security function.
      - id: a5.1
        relationship: complements
        confidence: 0.73
        rationale: >
          CPS 234 para 18.a requires the information security function to have authority
          to enforce the policy framework across all business units. A5.1 requires
          policies to be published, communicated, and acknowledged. CPS 234 addresses
          the enforcement mechanism (resourced function with authority) that makes policy
          compliance achievable.

  - source_control: cps234-19
    target_controls:
      - id: a5.1
        relationship: complements
        confidence: 0.80
        rationale: >
          CPS 234 para 19 (Information Security Capability) requires maintaining
          capability commensurate with threats. A5.1 requires an information security
          policy framework. CPS 234 para 19 addresses the operational capability (people,
          processes, technology) that implements the policy framework, making it a
          complementary operational requirement.
      - id: a8.8
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CPS 234 para 19.b requires regular evaluation of information security
          capability sufficiency, including when threat environments change. A8.8
          (Management of technical vulnerabilities) requires obtaining vulnerability
          information and evaluating exposure. Both address threat-responsive security
          posture maintenance, though CPS 234 covers broader capability while A8.8
          focuses on technical vulnerability management.
      - id: a5.36
        relationship: complements
        confidence: 0.78
        rationale: >
          CPS 234 para 19.a requires active management of information security capability
          as threats and business activities change. A5.36 requires regular compliance
          review. Both contribute to maintaining an effective security posture, with
          CPS 234 focusing on dynamic capability adjustment and A5.36 on compliance
          verification.

  - source_control: cps234-20
    target_controls:
      - id: a5.23
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          CPS 234 para 20 (Third-Party Capability Assessment) requires evaluating the
          information security capability of third parties managing information assets.
          A5.23 (Information security for use of cloud services) requires establishing
          processes for managing cloud service security risks. Both address third-party
          and supplier security, though A5.23 is cloud-specific while CPS 234 covers all
          third-party arrangements.
      - id: a5.2
        relationship: complements
        confidence: 0.70
        rationale: >
          CPS 234 para 20 requires the entity to assess third-party security capability
          commensurate with risk. A5.2 addresses roles and responsibilities including for
          external parties. CPS 234 extends the responsibility framework to require active
          capability assessment of third parties, not just role definition.

  - source_control: cps234-21
    target_controls:
      - id: a5.23
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          CPS 234 para 21 (Related Party Security) requires evaluating information
          security capability of related parties and intra-group shared services. A5.23
          addresses cloud service security management. Both cover security assessment of
          entities managing assets on behalf of the organization, though CPS 234 focuses
          on related-party (intra-group) arrangements while A5.23 targets external cloud
          services.
      - id: a5.1
        relationship: complements
        confidence: 0.72
        rationale: >
          CPS 234 para 21.b requires security controls applied to assets managed on
          behalf of other entities to be commensurate with criticality and sensitivity.
          A5.1 requires the policy framework to govern information security. CPS 234
          extends policy application to related-party shared service contexts, ensuring
          consistent control standards across entity boundaries.

  - source_control: cps234-24
    target_controls:
      - id: a5.1
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          CPS 234 para 24 (Information Security Policy Framework) requires maintaining
          a policy framework commensurate with exposures, addressing asset classification,
          control implementation, incident management, testing, and roles. A5.1 requires
          defining, approving, publishing, and communicating information security policies.
          Both controls mandate a comprehensive, management-approved policy framework.
          CPS 234 is slightly more prescriptive about minimum content but the core
          requirement is functionally equivalent.
      - id: a5.2
        relationship: complements
        confidence: 0.78
        rationale: >
          CPS 234 para 24.a requires the policy framework to address responsibilities of
          all parties with information security obligations. A5.2 requires roles and
          responsibilities to be defined. The policy framework mandated by CPS 234 para 24
          must encompass the role definitions required by A5.2.
      - id: a5.36
        relationship: complements
        confidence: 0.80
        rationale: >
          CPS 234 para 24.b requires Board or governing body approval and communication
          of the policy framework. A5.36 requires regular compliance review. CPS 234
          establishes the governance approval process that A5.36 then verifies through
          compliance monitoring.

  - source_control: cps234-25
    target_controls:
      - id: a5.1
        relationship: intersects-with
        confidence: 0.93
        rationale: >
          CPS 234 para 25 (Policy Maintenance and Review) requires at least annual review
          of the policy framework or upon material change. A5.1 requires policies to be
          reviewed at planned intervals or if significant changes occur. Both mandate
          regular policy review with trigger-based review for material changes. CPS 234
          specifies an annual minimum cadence while A5.1 leaves interval to organizational
          discretion.
      - id: a5.36
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CPS 234 para 25.a requires assessing continuing adequacy of the policy framework
          given changes to business, technology, and threats. A5.36 requires regular
          compliance review against policies and standards. Both drive ongoing assessment
          of policy adequacy and compliance, with CPS 234 focusing on policy content
          review and A5.36 on operational compliance verification.

  - source_control: cps234-26
    target_controls:
      - id: a8.1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CPS 234 para 26 (Information Asset Identification) requires classifying
          information assets by criticality and sensitivity, including assets managed by
          third parties. A8.1 (User endpoint devices) requires protection of information
          on endpoint devices. Both address asset identification and protection, though
          CPS 234 covers all information assets comprehensively while A8.1 focuses
          specifically on endpoints.
      - id: a8.9
        relationship: complements
        confidence: 0.82
        rationale: >
          CPS 234 para 26.a requires maintaining a sufficiently comprehensive inventory
          of information assets. A8.9 (Configuration management) requires established,
          documented, and monitored configurations for hardware, software, services, and
          networks. Asset inventory (CPS 234) and configuration management (A8.9) are
          complementary — you need to know what you have before you can manage its
          configuration.
      - id: a5.1
        relationship: complements
        confidence: 0.72
        rationale: >
          CPS 234 para 26 requires asset classification reflecting potential impact on
          the entity and customers. A5.1 addresses the policy framework that should
          include asset management policies. CPS 234 para 26 operationalizes the asset
          classification aspect of the broader policy framework.

  - source_control: cps234-27
    target_controls:
      - id: a8.9
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          CPS 234 para 27 (Information Asset Classification) requires a classification
          scheme considering confidentiality, integrity, and availability. A8.9 requires
          configurations including security configurations to be established and
          documented. Classification drives security configuration requirements — higher
          classification demands stricter configuration baselines. The controls intersect
          where classification determines configuration standards.
      - id: a5.1
        relationship: complements
        confidence: 0.75
        rationale: >
          CPS 234 para 27 requires classification reflecting potential impact with review
          upon material change. A5.1 requires topic-specific policies including asset
          management. CPS 234 para 27 provides the specific classification requirements
          that the broader A5.1 policy framework should incorporate.
      - id: a5.15
        relationship: complements
        confidence: 0.80
        rationale: >
          CPS 234 para 27.a requires the classification scheme to consider CIA
          requirements. A5.15 (Access control) requires access rules based on business
          and security requirements. Asset classification (CPS 234) directly informs
          access control decisions (A5.15) — higher-classified assets receive more
          restrictive access controls.

  - source_control: cps234-28
    target_controls:
      - id: a5.15
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          CPS 234 para 28 (Control Implementation) requires implementing controls
          including access management commensurate with asset criticality and lifecycle
          stage. A5.15 requires establishing access control rules based on business and
          security requirements. Both mandate risk-proportionate access controls, with
          CPS 234 explicitly requiring lifecycle-aware control implementation.
      - id: a8.9
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CPS 234 para 28.a requires controls addressing data and infrastructure
          integrity and the security of the technology operating environment. A8.9
          requires configurations to be established, documented, implemented, monitored,
          and reviewed. Both address secure configuration and operational integrity of
          technology systems.
      - id: a8.25
        relationship: complements
        confidence: 0.80
        rationale: >
          CPS 234 para 28 requires implementing information security controls throughout
          the asset lifecycle including creation. A8.25 (Secure development life cycle)
          requires rules for secure development. CPS 234 covers the full control spectrum
          including development controls, which A8.25 operationalizes in the SDLC context.
      - id: a8.15
        relationship: complements
        confidence: 0.78
        rationale: >
          CPS 234 para 28.a requires controls addressing the security of the technology
          operating environment. A8.15 (Logging) requires producing, storing, protecting,
          and analyzing logs. Logging is a critical detective control in the operating
          environment that CPS 234 para 28 implicitly requires as part of comprehensive
          control implementation.

  - source_control: cps234-29
    target_controls:
      - id: a8.8
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          CPS 234 para 29 (Controls Proportional to Criticality) requires timely
          implementation of controls commensurate with asset criticality, with escalation
          when timely remediation is not possible. A8.8 requires obtaining vulnerability
          information, evaluating exposure, and taking appropriate measures with defined
          timelines. Both mandate timely, risk-proportionate response to security gaps.
      - id: a5.1
        relationship: complements
        confidence: 0.73
        rationale: >
          CPS 234 para 29 requires escalation to the Board when controls cannot be
          implemented timely. A5.1 requires management-approved policies. CPS 234 adds
          governance escalation obligations that go beyond A5.1's policy approval
          requirements, ensuring Board visibility into control implementation gaps.
      - id: a5.36
        relationship: complements
        confidence: 0.80
        rationale: >
          CPS 234 para 29 requires controls proportionate to classification with
          compensating controls and escalation for gaps. A5.36 requires regular compliance
          review with corrective actions for non-compliance. Both drive timely remediation
          of control deficiencies, with CPS 234 adding Board escalation and APRA
          notification requirements.

  - source_control: cps234-30
    target_controls:
      - id: a8.15
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CPS 234 para 30 (Incident Detection and Response) requires robust detection
          mechanisms including monitoring of information assets. A8.15 requires logs to
          be produced, stored, protected, and analyzed. Logging is the foundational
          capability enabling the incident detection that CPS 234 mandates. Both require
          comprehensive monitoring, though CPS 234 addresses the full incident lifecycle
          while A8.15 focuses on the logging foundation.
      - id: a8.8
        relationship: complements
        confidence: 0.78
        rationale: >
          CPS 234 para 30.a requires mechanisms to detect information security incidents
          in a timely manner. A8.8 requires obtaining and evaluating vulnerability
          information. Vulnerability management (A8.8) feeds into incident detection
          (CPS 234) by identifying potential attack vectors and enabling targeted
          monitoring.
      - id: a5.1
        relationship: complements
        confidence: 0.70
        rationale: >
          CPS 234 para 30.b requires maintaining and testing incident response plans.
          A5.1 requires topic-specific policies including incident management. CPS 234
          operationalizes the incident management policy that A5.1 requires by mandating
          specific response plans, testing, and update cadences.

  - source_control: cps234-31
    target_controls:
      - id: a5.36
        relationship: complements
        confidence: 0.80
        rationale: >
          CPS 234 para 31 (Incident Notification to APRA) requires notification of
          material incidents within 72 hours and unremediated control weaknesses within
          10 business days. A5.36 requires compliance review with corrective actions.
          CPS 234 adds a regulatory notification obligation that goes beyond A5.36's
          internal compliance review, creating an external accountability mechanism.
      - id: a8.15
        relationship: complements
        confidence: 0.75
        rationale: >
          CPS 234 para 31 requires notification of material incidents with detailed
          information about affected systems and customer impact. A8.15 requires
          comprehensive logging of security-relevant events. The logging capability
          mandated by A8.15 provides the evidence base necessary for the accurate,
          substantive APRA notifications required by CPS 234 para 31.
      - id: a5.1
        relationship: complements
        confidence: 0.70
        rationale: >
          CPS 234 para 31 imposes specific regulatory notification deadlines (72 hours
          for material incidents, 10 business days for control weaknesses). A5.1 provides
          the policy framework that should include incident notification procedures.
          CPS 234 defines prescriptive notification requirements that must be incorporated
          into the A5.1 policy framework.

  - source_control: cps234-32
    target_controls:
      - id: a5.36
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          CPS 234 para 32 (Systematic Testing of Security Controls) requires a systematic
          testing program covering all control types with risk-proportionate frequency.
          A5.36 requires regular compliance review including technical compliance testing.
          Both mandate systematic verification of control effectiveness, with CPS 234
          being more prescriptive about testing scope (technical, administrative, physical)
          and risk-proportionate frequency.
      - id: a8.8
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          CPS 234 para 32 requires testing proportionate to vulnerability change rate
          and asset criticality, including third-party controls. A8.8 requires obtaining
          vulnerability information and evaluating exposure with appropriate measures.
          Both address systematic vulnerability identification and remediation, with
          CPS 234 embedding vulnerability assessment within a broader testing program.
      - id: a8.25
        relationship: complements
        confidence: 0.78
        rationale: >
          CPS 234 para 32.a requires the testing program to cover the full range of
          controls. A8.25 requires security checkpoints and testing within the development
          lifecycle. Development lifecycle security testing (A8.25) is a subset of the
          comprehensive testing program CPS 234 mandates.

  - source_control: cps234-33
    target_controls:
      - id: a5.36
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CPS 234 para 33 (Testing by Competent Specialists) requires testing by
          appropriately skilled and functionally independent specialists. A5.36 requires
          technical compliance review preferably with automated tools and specialist
          interpretation. Both address competency requirements for security assessment,
          with CPS 234 adding explicit independence requirements (testers must be
          independent from control developers).
      - id: a5.2
        relationship: complements
        confidence: 0.75
        rationale: >
          CPS 234 para 33.a requires testing personnel to have appropriate skills and
          expertise. A5.2 requires that individuals assigned security roles be competent
          and given development opportunities. CPS 234 extends competency requirements
          specifically to testing personnel with explicit independence constraints.

  - source_control: cps234-34
    target_controls:
      - id: a5.36
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          CPS 234 para 34 (Escalation of Testing Findings) requires timely escalation
          and reporting of testing results to the Board or governing body, with timely
          remediation of deficiencies. A5.36 requires compliance review with identification
          of non-compliance causes and corrective actions. Both drive a review-remediate-
          verify cycle, with CPS 234 adding Board-level escalation obligations and
          severity-based remediation timelines.
      - id: a8.8
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          CPS 234 para 34.b requires tracking remediation of deficiencies with timelines
          commensurate with severity and asset criticality. A8.8 requires taking
          appropriate measures for identified vulnerabilities including defined reaction
          timelines. Both mandate structured vulnerability remediation with risk-based
          prioritization.

  - source_control: cps234-35
    target_controls:
      - id: a5.36
        relationship: intersects-with
        confidence: 0.92
        rationale: >
          CPS 234 para 35 (Internal Audit Review) requires internal audit to review
          design and operating effectiveness of information security controls including
          third-party controls. A5.36 requires regular compliance review with corrective
          actions. Both mandate systematic assessment of control adequacy, with CPS 234
          requiring design and operating effectiveness review (not just existence) and
          extending scope to third-party and related-party controls.
      - id: a8.15
        relationship: complements
        confidence: 0.75
        rationale: >
          CPS 234 para 35 requires internal audit to assess operating effectiveness of
          controls. A8.15 requires logging of activities and events with analysis. Audit
          evidence for operating effectiveness assessment relies on the comprehensive
          logging mandated by A8.15.
      - id: a5.1
        relationship: complements
        confidence: 0.72
        rationale: >
          CPS 234 para 35.a requires internal audit to include information security
          controls in the audit universe. A5.1 requires the policy framework to be
          reviewed. Internal audit's role (CPS 234) provides independent assurance that
          the policy framework (A5.1) is not just defined but effectively implemented.

  - source_control: cps234-36
    target_controls:
      - id: a5.36
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          CPS 234 para 36 (Internal Audit Competency) requires audit personnel reviewing
          information security controls to have sufficient skills and experience. A5.36
          requires technical compliance review with specialist interpretation. Both
          require competent personnel for security assurance, with CPS 234 being more
          explicit about information security expertise requirements for auditors and
          the option to supplement with external specialists.
      - id: a5.2
        relationship: complements
        confidence: 0.77
        rationale: >
          CPS 234 para 36.a requires audit personnel to possess relevant technical
          expertise and assurance qualifications. A5.2 requires individuals assigned
          security roles to be competent. CPS 234 extends A5.2's competency requirement
          specifically to audit personnel with explicit provisions for external
          supplementation when internal expertise is insufficient.

