id: nist-800-171-rev2_to_cmmc-v2
title: "NIST 800-171 Rev 2 to CMMC v2 Control Mapping"
source_framework: nist-800-171-rev2
target_framework: cmmc-v2
version: "1.0.0"
last_updated: "2026-04-03"
methodology: semantic

mappings:
  # 03.01 — Access Control
  - source_control: "03-01"
    target_controls:
      - id: cmmc-ac
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          NIST 800-171 Family 03.01 (Access Control) maps directly to the
          CMMC v2 Access Control (AC) domain. CMMC v2 Level 2 incorporates
          all 22 NIST 800-171 access control requirements (3.1.1 through
          3.1.22) as practices within the AC domain. The mapping is nearly
          one-to-one: CMMC AC.L2-3.1.1 corresponds to NIST 3.1.1 (Limit
          system access), AC.L2-3.1.2 to NIST 3.1.2 (Limit transaction
          types), and so on through the entire family.

  # 03.03 — Audit and Accountability
  - source_control: "03-03"
    target_controls:
      - id: cmmc-au
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          NIST 800-171 Family 03.03 (Audit and Accountability) maps directly
          to the CMMC v2 Audit and Accountability (AU) domain. All 9 NIST
          800-171 audit requirements (3.3.1 through 3.3.9) are incorporated
          into CMMC v2 Level 2 as AU domain practices. This includes audit
          event creation, content, capacity, review, reduction, generation,
          protection, and correlation.

  # 03.04 — Configuration Management
  - source_control: "03-04"
    target_controls:
      - id: cmmc-cm
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          NIST 800-171 Family 03.04 (Configuration Management) maps directly
          to the CMMC v2 Configuration Management (CM) domain. All 9 NIST
          800-171 configuration management requirements (3.4.1 through 3.4.9)
          are incorporated as CMMC Level 2 practices, covering baseline
          configurations, change control, security impact analysis, access
          restrictions for change, least functionality, and software policies.

  # 03.05 — Identification and Authentication
  - source_control: "03-05"
    target_controls:
      - id: cmmc-ia
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          NIST 800-171 Family 03.05 (Identification and Authentication) maps
          directly to the CMMC v2 Identification and Authentication (IA)
          domain. All 11 NIST 800-171 IA requirements (3.5.1 through 3.5.11)
          are incorporated as CMMC Level 2 practices, covering user
          identification, authenticator management, multi-factor
          authentication, replay resistance, and identifier management.

  # 03.06 — Incident Response
  - source_control: "03-06"
    target_controls:
      - id: cmmc-ir
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          NIST 800-171 Family 03.06 (Incident Response) maps directly to the
          CMMC v2 Incident Response (IR) domain. All 3 NIST 800-171 incident
          response requirements (3.6.1 through 3.6.3) are incorporated as
          CMMC Level 2 practices, covering incident handling capabilities,
          tracking/documenting/reporting, and testing the organizational
          incident response capability.

  # 03.13 — System and Communications Protection
  - source_control: "03-13"
    target_controls:
      - id: cmmc-sc
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          NIST 800-171 Family 03.13 (System and Communications Protection)
          maps directly to the CMMC v2 System and Communications Protection
          (SC) domain. All 16 NIST 800-171 SC requirements (3.13.1 through
          3.13.16) are incorporated as CMMC Level 2 practices, covering
          boundary protection, architectural designs, network segmentation,
          CUI handling, cryptographic protections, collaborative computing
          devices, mobile code, VoIP, session authenticity, and CUI at rest.

  # 03.14 — System and Information Integrity
  - source_control: "03-14"
    target_controls:
      - id: cmmc-si
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          NIST 800-171 Family 03.14 (System and Information Integrity) maps
          directly to the CMMC v2 System and Information Integrity (SI)
          domain. All 7 NIST 800-171 SI requirements (3.14.1 through 3.14.7)
          are incorporated as CMMC Level 2 practices, covering flaw
          remediation, malicious code protection, security alerts,
          system monitoring, and handling of communications traffic
          security functions.
