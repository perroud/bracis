id: soc1_to_sox
title: "SOC 1 (SSAE 18 ICFR) to SOX Control Mapping"
source_framework: soc1
target_framework: sox
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # ============================================================
  # CONTROL ENVIRONMENT
  # ============================================================

  # soc1-ce-governance → SOX
  - source_control: soc1-ce-governance
    target_controls:
      - id: sec-302
        relationship: implements
        confidence: 0.85
        rationale: >
          SOC 1 governance controls directly implement the SOX 302
          requirement for CEO/CFO accountability over internal controls.
          SOC 1 requires the board and audit committee to exercise
          oversight of ICFR; SOX 302 requires the signing officers to
          certify that they are responsible for establishing and
          maintaining internal controls and have disclosed deficiencies
          to the audit committee. The SOC 1 governance structure is the
          mechanism through which the SOX 302 certification obligation
          is operationalized at service organizations.
      - id: sec-404-a
        relationship: implements
        confidence: 0.80
        rationale: >
          SOC 1 governance establishes the oversight structure that SOX
          404(a) requires for management's assessment of internal
          controls. The board's audit committee oversight, governance
          policies, and accountability structures in the SOC 1 control
          environment directly support the management assessment
          requirement under SOX 404(a). Both require documented
          governance structures and evidence of active oversight.
      - id: sec-906
        relationship: complements
        confidence: 0.65
        rationale: >
          SOC 1 governance structures provide the assurance foundation
          that enables CEO/CFO criminal certifications under SOX 906.
          Without effective governance, the signing officers lack the
          basis to certify that financial reports fairly present the
          issuer's financial condition. SOC 1 governance evidence
          reduces the risk of unknowing false certification.

  # soc1-ce-accountability → SOX
  - source_control: soc1-ce-accountability
    target_controls:
      - id: sec-302
        relationship: implements
        confidence: 0.80
        rationale: >
          SOC 1 accountability controls implement the SOX 302
          requirement that signing officers are responsible for
          establishing and maintaining internal controls. SOC 1
          requires clear assignment of ICFR responsibilities,
          competency verification, and corrective action for
          performance deviations — the operational mechanisms through
          which SOX 302's executive accountability mandate is executed
          at the organizational level.
      - id: sec-404-a
        relationship: complements
        confidence: 0.70
        rationale: >
          Organizational accountability and competence are foundational
          to SOX 404(a) management assessment. Without competent
          personnel who understand their ICFR responsibilities,
          management cannot credibly assess internal control
          effectiveness. SOC 1 accountability controls provide
          evidence that the human element of the control environment
          supports the SOX 404(a) assessment.
      - id: itgc-access
        relationship: complements
        confidence: 0.55
        rationale: >
          SOC 1 accountability structures define who is authorized to
          perform which functions, directly informing SOX ITGC access
          management. Role definitions, competency requirements, and
          accountability assignments drive the access provisioning and
          review processes that ITGC access controls enforce.

  # soc1-ce-ethics → SOX
  - source_control: soc1-ce-ethics
    target_controls:
      - id: sec-302
        relationship: complements
        confidence: 0.70
        rationale: >
          SOC 1 ethics and integrity controls complement SOX 302 by
          establishing the tone at the top that underpins accurate
          financial reporting. SOX 302 requires disclosure of fraud
          involving management or employees with significant ICFR roles.
          The SOC 1 ethics framework — codes of conduct, whistleblower
          channels, ethics investigations — provides the detection and
          prevention mechanisms that support the SOX 302 fraud
          disclosure requirement.
      - id: sec-906
        relationship: complements
        confidence: 0.60
        rationale: >
          SOC 1 ethics controls reduce the risk of fraudulent financial
          reporting that would expose CEO/CFO to criminal penalties
          under SOX 906. An ethical culture with effective whistleblower
          mechanisms and consistent enforcement reduces the likelihood
          that material misstatements go unreported, protecting the
          signing officers' certifications.
      - id: sec-404-a
        relationship: complements
        confidence: 0.60
        rationale: >
          Ethics and integrity form the foundation of the COSO control
          environment, which is the first component assessed under SOX
          404(a). Management's assessment of internal controls must
          consider whether the tone at the top supports effective ICFR.
          SOC 1 ethics controls provide the evidence that this
          foundational element is in place.

  # ============================================================
  # RISK ASSESSMENT
  # ============================================================

  # soc1-ra-financial-risk → SOX
  - source_control: soc1-ra-financial-risk
    target_controls:
      - id: sec-404-a
        relationship: implements
        confidence: 0.85
        rationale: >
          SOC 1 financial reporting risk identification directly
          implements the risk assessment component of SOX 404(a).
          Both require management to identify risks to financial
          reporting, assess likelihood and impact, assign risk owners,
          and use the results to design control activities. The SOC 1
          risk assessment at the service organization level feeds into
          the broader SOX 404(a) management assessment of ICFR.
      - id: sec-302
        relationship: complements
        confidence: 0.65
        rationale: >
          SOC 1 financial risk identification supports the CEO/CFO's
          ability to certify internal control effectiveness under SOX
          302. Risk assessment results inform whether significant
          deficiencies exist that must be disclosed to auditors and
          the audit committee per SOX 302(e).
      - id: sec-404-b
        relationship: complements
        confidence: 0.60
        rationale: >
          SOC 1 risk assessment provides evidence that external
          auditors evaluate under SOX 404(b) when attesting to
          management's ICFR assessment. Auditors examine whether the
          risk assessment process is systematic, documented, and drives
          control design — the same qualities required by the SOC 1
          engagement standard.

  # soc1-ra-fraud-risk → SOX
  - source_control: soc1-ra-fraud-risk
    target_controls:
      - id: sec-302
        relationship: implements
        confidence: 0.80
        rationale: >
          SOC 1 fraud risk assessment directly implements the SOX 302
          requirement to disclose fraud involving management or
          employees with significant ICFR roles. The fraud risk
          assessment identifies fraud scenarios, designs anti-fraud
          controls, and establishes detection mechanisms. Without this
          assessment, the CEO/CFO cannot fulfill their SOX 302(e)
          obligation to disclose fraud to auditors and the audit
          committee.
      - id: sec-404-a
        relationship: implements
        confidence: 0.75
        rationale: >
          Fraud risk assessment is an explicit component of the COSO
          framework used to structure the SOX 404(a) management
          assessment. SOC 1 requires consideration of management
          override, asset misappropriation, and fraudulent reporting —
          the same fraud scenarios that PCAOB AS 2201 requires auditors
          to evaluate when testing management's SOX 404(a) assessment.
      - id: sec-906
        relationship: complements
        confidence: 0.60
        rationale: >
          SOC 1 fraud risk assessment mitigates the criminal exposure
          under SOX 906 by establishing systematic fraud detection.
          Effective fraud risk assessment reduces the likelihood that
          financial reports contain fraudulent misstatements, which
          would expose the CEO/CFO to criminal penalties for false
          certifications.
      - id: itgc-access
        relationship: complements
        confidence: 0.55
        rationale: >
          SOC 1 fraud risk assessment identifies access-related fraud
          scenarios (unauthorized access to financial data, manipulation
          of transaction records) that SOX ITGC access controls must
          mitigate. The fraud risk assessment drives the design of
          access controls, particularly privileged access management
          and segregation of duties.

  # soc1-ra-change-risk → SOX
  - source_control: soc1-ra-change-risk
    target_controls:
      - id: sec-404-a
        relationship: complements
        confidence: 0.75
        rationale: >
          SOC 1 change risk assessment directly supports SOX 404(a)
          by ensuring that changes to systems, people, and processes
          are evaluated for ICFR impact. SOX 404(a) requires
          management to assess internal controls including the response
          to change. The SOC 1 change risk assessment provides the
          process through which management identifies and responds to
          changes that could undermine ICFR effectiveness.
      - id: itgc-change
        relationship: complements
        confidence: 0.70
        rationale: >
          SOC 1 change risk assessment drives the rigor of SOX ITGC
          change management. The risk assessment determines which
          changes require enhanced authorization, testing, and review —
          the risk-tiered approach that ITGC change management
          implements. Without change risk assessment, the change
          management process cannot appropriately calibrate controls
          to risk.
      - id: itgc-sdlc
        relationship: complements
        confidence: 0.55
        rationale: >
          SOC 1 change risk assessment identifies changes that qualify
          as significant system projects requiring SDLC governance.
          The risk assessment distinguishes between routine changes
          (managed by ITGC change management) and significant system
          changes (managed by ITGC SDLC), ensuring appropriate
          governance for each.

  # ============================================================
  # CONTROL ACTIVITIES
  # ============================================================

  # soc1-ca-access-controls → SOX
  - source_control: soc1-ca-access-controls
    target_controls:
      - id: itgc-access
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          SOC 1 logical access controls and SOX ITGC access management
          are equivalent controls. Both require: unique user
          identification, least privilege, formal authorization for
          access provisioning, periodic access reviews, timely
          revocation on termination, MFA for financial systems,
          prohibition of shared accounts, enhanced monitoring of
          privileged access, and annual configuration review. The
          only difference is the engagement standard (SSAE 18 vs.
          PCAOB AS 2201), but the control activities are identical.
      - id: sec-404-a
        relationship: implements
        confidence: 0.75
        rationale: >
          SOC 1 access controls are a core ITGC category that
          management must assess under SOX 404(a). Evidence of
          SOC 1 access control design and operating effectiveness
          directly supports the management assessment of ICFR.
          Access control testing results from the SOC 1 examination
          can be leveraged for the SOX 404(a) assessment.
      - id: sec-404-b
        relationship: complements
        confidence: 0.65
        rationale: >
          External auditors testing ITGCs under SOX 404(b) examine
          the same access controls that the SOC 1 examination covers.
          SOC 1 Type II access control evidence (user access reviews,
          provisioning logs, termination procedures) directly supports
          the auditor's attestation of ITGC effectiveness.

  # soc1-ca-change-mgmt → SOX
  - source_control: soc1-ca-change-mgmt
    target_controls:
      - id: itgc-change
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          SOC 1 change management and SOX ITGC change management are
          equivalent controls. Both require: formal authorization of
          changes, testing in non-production environments, approval by
          individuals independent of the developer, environment
          separation, emergency change procedures with retrospective
          review, and complete audit trails. The control populations
          and testing procedures are identical across both frameworks.
      - id: sec-404-a
        relationship: implements
        confidence: 0.75
        rationale: >
          SOC 1 change management is a core ITGC domain that
          management must assess under SOX 404(a). Change management
          evidence from the SOC 1 examination (approved change tickets,
          testing documentation, segregation of duties evidence)
          directly supports the management assessment of ICFR.
      - id: sec-404-b
        relationship: complements
        confidence: 0.65
        rationale: >
          External auditors under SOX 404(b) sample changes during
          the examination period and trace them through the complete
          lifecycle. SOC 1 Type II change management evidence directly
          supports the auditor's attestation of ITGC effectiveness.

  # soc1-ca-processing-integrity → SOX
  - source_control: soc1-ca-processing-integrity
    target_controls:
      - id: sec-404-a
        relationship: implements
        confidence: 0.85
        rationale: >
          SOC 1 processing integrity is the core control objective
          that SOX 404(a) depends upon at service organizations.
          If financial transactions are not processed completely,
          accurately, and with proper authorization, the financial
          reports based on that data cannot be relied upon.
          Processing integrity controls — input validation,
          reconciliation, exception reporting — are the application-
          level controls that SOX 404(a) requires management to assess.
      - id: sec-302
        relationship: complements
        confidence: 0.70
        rationale: >
          SOC 1 processing integrity controls enable the CEO/CFO to
          certify under SOX 302 that financial statements fairly
          present the financial condition. Processing integrity
          failures would directly undermine the accuracy of financial
          data, creating false certification risk under SOX 302.
      - id: sec-906
        relationship: complements
        confidence: 0.60
        rationale: >
          Processing integrity directly affects the accuracy of
          financial reports. SOX 906 imposes criminal penalties for
          false certifications. SOC 1 processing integrity controls
          reduce the risk that financial data is inaccurate, thereby
          mitigating criminal exposure for signing officers.
      - id: itgc-operations
        relationship: complements
        confidence: 0.60
        rationale: >
          SOC 1 processing integrity controls depend on reliable
          IT operations. Batch job monitoring, data backup, and
          system availability under ITGC Operations ensure that
          financial transactions are processed without interruption
          or data loss, supporting processing completeness.

  # soc1-ca-segregation → SOX
  - source_control: soc1-ca-segregation
    target_controls:
      - id: itgc-access
        relationship: implements
        confidence: 0.85
        rationale: >
          SOC 1 segregation of duties is implemented through SOX
          ITGC access controls. ITGC-access part (6) explicitly
          requires that segregation of duties be enforced through
          access controls to prevent incompatible functions. SOC 1
          SoD requirements (separating transaction initiation,
          authorization, recording, and custody) are technically
          enforced through the RBAC and access provisioning
          mechanisms that ITGC access governs.
      - id: itgc-change
        relationship: implements
        confidence: 0.75
        rationale: >
          SOC 1 segregation of duties is implemented in the change
          management process through ITGC-change part (3), which
          requires that the change approver be independent of the
          developer. SOC 1 SoD between development, testing, and
          operations roles is enforced through the change management
          controls defined in ITGC change.
      - id: sec-404-a
        relationship: complements
        confidence: 0.65
        rationale: >
          Segregation of duties is a fundamental internal control
          principle that management assesses under SOX 404(a). SOC 1
          SoD evidence — the SoD matrix, access review results,
          compensating controls documentation — directly supports the
          management assessment of whether the control environment
          adequately mitigates the risk of error and fraud.

  # soc1-ca-itgc-program → SOX
  - source_control: soc1-ca-itgc-program
    target_controls:
      - id: sec-404-a
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          SOC 1's comprehensive ITGC program and SOX 404(a)'s
          management assessment of internal controls are equivalent
          in scope for the IT domain. Both require: formal
          documentation of ITGC scope covering all in-scope systems,
          control objectives and activities for each ITGC domain
          (access, change, operations, SDLC), control ownership,
          annual self-assessment of effectiveness, and deficiency
          tracking. The SOC 1 ITGC program IS the IT component of
          the SOX 404(a) management assessment.
      - id: sec-404-b
        relationship: complements
        confidence: 0.75
        rationale: >
          The SOC 1 ITGC program provides the control framework that
          external auditors evaluate under SOX 404(b). The program
          documentation, control matrices, and self-assessment results
          from the SOC 1 program directly support the auditor's
          attestation engagement. Coordination between SOC 1 and SOX
          404(b) auditors maximizes reliance and reduces duplication.
      - id: itgc-access
        relationship: superset-of
        confidence: 0.80
        rationale: >
          SOC 1's ITGC program encompasses all four ITGC domains,
          including access management. ITGC access is one component
          of the broader ITGC program that SOC 1 requires service
          organizations to maintain. The program provides the
          governance framework within which individual ITGC domains
          (including access) operate.
      - id: itgc-change
        relationship: superset-of
        confidence: 0.80
        rationale: >
          SOC 1's ITGC program encompasses change management as one
          of its core domains. The ITGC program provides the governance
          structure, scope definition, and assessment methodology for
          change management controls.
      - id: itgc-operations
        relationship: superset-of
        confidence: 0.80
        rationale: >
          SOC 1's ITGC program encompasses computer operations
          (including job scheduling, backups, and incident response)
          as a core domain. The program ensures that operational
          controls are formally documented, owned, and assessed.
      - id: itgc-sdlc
        relationship: superset-of
        confidence: 0.75
        rationale: >
          SOC 1's ITGC program encompasses the system development
          lifecycle as a core domain. The program ensures that SDLC
          controls are included in the scope of ITGC assessment and
          that program development follows defined methodology.

  # soc1-ca-backup-recovery → SOX
  - source_control: soc1-ca-backup-recovery
    target_controls:
      - id: itgc-operations
        relationship: implements
        confidence: 0.85
        rationale: >
          SOC 1 backup and recovery controls directly implement ITGC
          Operations part (2), which requires data backups on a
          defined schedule with integrity verification and periodic
          restoration testing. Both controls cover: backup schedule
          definition, completion verification, integrity testing,
          retention policies, recovery procedures, RTO/RPO definition,
          and annual testing. The control activities are identical.
      - id: sec-802
        relationship: complements
        confidence: 0.60
        rationale: >
          SOC 1 backup and recovery controls support SOX 802's
          record preservation requirements. Backup data constitutes
          records that must be preserved and protected from
          unauthorized destruction. Backup encryption and access
          controls prevent tampering with financial records, and
          retention policies ensure records are available for the
          minimum 5-year period required by SOX 802.
      - id: sec-404-a
        relationship: complements
        confidence: 0.55
        rationale: >
          Backup and recovery controls are computer operations ITGCs
          that management must assess under SOX 404(a). Backup
          completion logs, restoration test results, and RTO/RPO
          achievement evidence feed into the management assessment
          of whether operational controls are effective.

  # soc1-ca-vendor-mgmt → SOX
  - source_control: soc1-ca-vendor-mgmt
    target_controls:
      - id: sec-404-a
        relationship: implements
        confidence: 0.75
        rationale: >
          SOC 1 subservice organization management implements the SOX
          404(a) requirement for management to assess controls over
          outsourced processes. Both require: identification of
          material third-party service providers, assessment of their
          controls (through SOC reports), monitoring of their ongoing
          compliance, and documentation of complementary controls.
          The inclusive/carve-out methodology in SOC 1 directly
          supports the SOX 404(a) scoping of outsourced controls.
      - id: sec-404-b
        relationship: complements
        confidence: 0.65
        rationale: >
          External auditors under SOX 404(b) evaluate management's
          oversight of subservice organizations. SOC 1 vendor
          management evidence — SOC report reviews, contractual
          requirements, monitoring documentation — provides the
          evidence that auditors examine when attesting to the
          adequacy of controls over outsourced financial processing.
      - id: itgc-sdlc
        relationship: complements
        confidence: 0.50
        rationale: >
          SOC 1 vendor management includes evaluation of third-party
          software and services used in financial processing. ITGC
          SDLC covers system acquisition processes. Vendor due
          diligence for technology service providers feeds into the
          SDLC acquisition process, ensuring that acquired systems
          meet internal control requirements.

  # ============================================================
  # INFORMATION AND COMMUNICATION
  # ============================================================

  # soc1-ic-reporting → SOX
  - source_control: soc1-ic-reporting
    target_controls:
      - id: sec-302
        relationship: implements
        confidence: 0.80
        rationale: >
          SOC 1 financial reporting information systems directly
          implement the SOX 302 requirement that financial reports
          fairly present the financial condition. SOC 1 requires
          that information systems produce accurate, complete, and
          timely financial data for user entities. This is the
          technical foundation that enables the CEO/CFO to certify
          that financial statements do not contain untrue statements
          of material fact.
      - id: sec-404-a
        relationship: implements
        confidence: 0.75
        rationale: >
          SOC 1 reporting information quality controls are application-
          level controls that management must assess under SOX 404(a).
          Data validation, completeness checks, and reconciliation
          procedures are specific control activities within the
          information and communication component of the COSO
          framework that structures the SOX 404(a) assessment.
      - id: sec-906
        relationship: complements
        confidence: 0.60
        rationale: >
          SOC 1 reporting quality controls reduce the risk that
          financial reports contain material inaccuracies, thereby
          mitigating criminal exposure for CEO/CFO certifications
          under SOX 906. If reporting systems produce inaccurate
          data, the signing officers face criminal penalties for
          certifying reports based on that data.

  # soc1-ic-disclosure → SOX
  - source_control: soc1-ic-disclosure
    target_controls:
      - id: sec-302
        relationship: implements
        confidence: 0.85
        rationale: >
          SOC 1 deficiency disclosure controls directly implement
          SOX 302(e), which requires the signing officers to disclose
          all significant deficiencies and material weaknesses to
          auditors and the audit committee. SOC 1 requires
          classification of deficiencies by severity, timely
          escalation to governance, and communication to user
          entities — the same disclosure process that SOX 302 mandates.
      - id: sec-404-a
        relationship: complements
        confidence: 0.70
        rationale: >
          SOC 1 deficiency communication supports SOX 404(a) by
          ensuring that identified control deficiencies are tracked,
          classified, and reported. The deficiency register maintained
          under SOC 1 provides direct input to the management
          assessment of whether internal controls have significant
          deficiencies or material weaknesses that must be disclosed
          in the annual report.
      - id: sec-409
        relationship: complements
        confidence: 0.55
        rationale: >
          SOC 1 deficiency communication processes support SOX 409
          real-time disclosure requirements. If a control deficiency
          constitutes a material change in the issuer's financial
          condition or operations, it must be disclosed rapidly.
          The SOC 1 deficiency classification and escalation process
          feeds the materiality assessment needed for SOX 409.

  # soc1-ic-user-controls → SOX
  - source_control: soc1-ic-user-controls
    target_controls:
      - id: sec-404-a
        relationship: complements
        confidence: 0.75
        rationale: >
          SOC 1 user entity communication is essential to SOX 404(a)
          because user entities rely on the service organization's
          system description and CUECs to scope their own management
          assessment. Without clear communication of what the service
          organization controls and what remains the user entity's
          responsibility, user entities cannot complete their SOX
          404(a) assessment of internal controls over financial
          reporting.
      - id: sec-404-b
        relationship: complements
        confidence: 0.70
        rationale: >
          External auditors of user entities under SOX 404(b) rely
          on the service organization's SOC 1 report and system
          description to evaluate the portion of ICFR that the
          service organization performs. SOC 1 user entity
          communication ensures that auditors have the information
          needed to assess complementary user entity controls.
      - id: sec-302
        relationship: complements
        confidence: 0.55
        rationale: >
          SOC 1 user entity communication supports SOX 302 at user
          entities by providing the information that user entity
          CEO/CFOs need to certify their internal controls. If the
          service organization fails to communicate material changes
          or CUECs, user entity signing officers may lack the basis
          for accurate certification.

  # ============================================================
  # MONITORING
  # ============================================================

  # soc1-mon-continuous → SOX
  - source_control: soc1-mon-continuous
    target_controls:
      - id: sec-404-a
        relationship: implements
        confidence: 0.80
        rationale: >
          SOC 1 continuous monitoring implements the monitoring
          component of the COSO framework used to structure the SOX
          404(a) management assessment. Both require ongoing
          evaluations to ascertain whether internal controls are
          present and functioning. Continuous monitoring provides
          the sustained evidence of control effectiveness that SOX
          404(a) requires, going beyond point-in-time testing to
          demonstrate year-round control operation.
      - id: itgc-operations
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          SOC 1 continuous monitoring intersects with SOX ITGC
          Operations, which requires system monitoring to detect
          conditions affecting financial data processing reliability.
          Both mandate real-time alerting, exception investigation,
          and management review of monitoring results. The operational
          monitoring infrastructure serves both control objectives.
      - id: sec-302
        relationship: complements
        confidence: 0.60
        rationale: >
          SOC 1 continuous monitoring supports the CEO/CFO's
          quarterly evaluation of internal control effectiveness
          required by SOX 302. Monitoring reports provide the evidence
          that controls operated effectively during the period,
          enabling informed certification.

  # soc1-mon-deficiency → SOX
  - source_control: soc1-mon-deficiency
    target_controls:
      - id: sec-302
        relationship: implements
        confidence: 0.80
        rationale: >
          SOC 1 deficiency identification and remediation directly
          implements SOX 302(e), which requires disclosure of
          significant deficiencies and material weaknesses to
          auditors and the audit committee. SOC 1 requires formal
          deficiency classification, root cause analysis, remediation
          tracking, and aggregation analysis — the process that
          generates the findings disclosed under SOX 302.
      - id: sec-404-a
        relationship: implements
        confidence: 0.80
        rationale: >
          SOC 1 deficiency identification is a core output of the
          monitoring component in the SOX 404(a) management assessment.
          The deficiency register, severity classifications, and
          remediation tracking directly inform management's conclusion
          about whether ICFR has significant deficiencies or material
          weaknesses that must be reported in the annual report.
      - id: sec-404-b
        relationship: complements
        confidence: 0.60
        rationale: >
          External auditors under SOX 404(b) review the deficiency
          register and remediation evidence to inform their attestation
          opinion. SOC 1 deficiency management provides auditors with
          evidence of management's responsiveness to identified
          control weaknesses, which is a key factor in the audit
          opinion.

  # soc1-mon-audit → SOX
  - source_control: soc1-mon-audit
    target_controls:
      - id: sec-404-b
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          SOC 1 internal and external audit activities are equivalent
          to SOX 404(b) auditor attestation in purpose and process.
          Both require independent audit assessment of internal
          controls, cooperation with external auditors, evidence
          provision, and tracking of audit findings. The SOC 1
          external examination by a CPA firm under SSAE 18 is the
          service organization counterpart to the SOX 404(b) audit
          under PCAOB AS 2201 at the issuer level.
      - id: sec-404-a
        relationship: implements
        confidence: 0.75
        rationale: >
          SOC 1 audit activities implement the separate evaluation
          component of the SOX 404(a) monitoring requirement. Internal
          audit provides management with independent assessment of
          ICFR effectiveness, and the results directly feed the
          management assessment. The SOC 1 annual self-assessment
          and external examination align with the SOX 404(a) annual
          assessment cycle.
      - id: sec-302
        relationship: complements
        confidence: 0.60
        rationale: >
          SOC 1 audit activities support SOX 302 by providing the
          CEO/CFO with independent evidence of control effectiveness.
          Audit findings and recommendations inform the signing
          officers' evaluation of whether significant deficiencies
          or material weaknesses exist that must be disclosed under
          SOX 302(e).

  # ============================================================
  # AVAILABILITY
  # ============================================================

  # soc1-avail-uptime → SOX
  - source_control: soc1-avail-uptime
    target_controls:
      - id: itgc-operations
        relationship: implements
        confidence: 0.80
        rationale: >
          SOC 1 system availability commitments implement ITGC
          Operations part (4), which requires monitoring to detect
          conditions affecting financial data processing reliability.
          Both controls require: availability monitoring, performance
          management, business continuity planning, disaster recovery
          testing, and capacity management. SOC 1 availability
          controls ensure that financial processing systems operate
