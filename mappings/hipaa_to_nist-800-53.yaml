id: hipaa_to_nist-800-53
title: "HIPAA to NIST SP 800-53 Rev 5 Control Mapping"
source_framework: hipaa
target_framework: nist-800-53-rev5
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # Security Rule — Administrative Safeguards

  # 164.308(a)(1) — Security Management Process
  - source_control: 164.308-a1
    target_controls:
      - id: ac-1
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          HIPAA 164.308(a)(1) requires policies and procedures to prevent, detect,
          contain, and correct security violations. NIST AC-1 requires development,
          documentation, and dissemination of access control policy and procedures.
          Both mandate a policy-driven security management approach, though HIPAA
          is broader in scope while AC-1 is specific to access control.
      - id: cm-2
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          The risk management component of 164.308(a)(1)(ii)(B) requires implementing
          security measures to reduce risks to a reasonable level. CM-2 requires
          maintaining baseline configurations under configuration control, which is
          a key risk reduction measure for system security posture.
      - id: cm-6
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          HIPAA 164.308(a)(1) risk management requires implementing security measures
          sufficient to reduce risks. CM-6 requires establishing, documenting, and
          implementing secure configuration settings, which directly implements
          risk reduction through system hardening.
      - id: au-6
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          HIPAA 164.308(a)(1)(ii)(D) requires information system activity review
          including regular review of audit logs, access reports, and security
          incident tracking reports. AU-6 requires review and analysis of system
          audit records for indications of inappropriate or unusual activity.
          Both directly mandate ongoing audit record review and reporting.
      - id: si-4
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          HIPAA 164.308(a)(1) requires procedures to detect security violations and
          review information system activity. SI-4 requires system monitoring to
          detect attacks, unauthorized connections, and unauthorized use. Both
          address continuous monitoring for security event detection.
      - id: sr-3
        relationship: complements
        confidence: 0.60
        rationale: >
          HIPAA 164.308(a)(1) risk analysis must assess all threats and
          vulnerabilities including supply chain risks. SR-3 provides specific
          supply chain controls and processes that complement the broader HIPAA
          risk management requirement by addressing a specific threat vector.

  # 164.308(a)(3) — Workforce Security
  - source_control: 164.308-a3
    target_controls:
      - id: ac-2
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          HIPAA 164.308(a)(3) requires policies to ensure workforce members have
          appropriate access and to prevent unauthorized access, including
          authorization, clearance, and termination procedures. AC-2 requires
          comprehensive account management including account lifecycle, access
          authorization, periodic review, and alignment with personnel termination
          processes. Both address the full user access lifecycle.
      - id: ac-6
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          HIPAA 164.308(a)(3) workforce clearance procedures ensure access is
          appropriate to the role. AC-6 requires employing least privilege,
          allowing only authorized accesses necessary for assigned tasks. Both
          enforce role-appropriate access, though AC-6 is more prescriptive
          about minimum necessary privilege.
      - id: ac-3
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          HIPAA 164.308(a)(3) requires preventing unauthorized workforce access
          to ePHI. AC-3 enforces approved authorizations for logical access to
          information and system resources. AC-3 provides the technical enforcement
          mechanism that implements the workforce access restrictions HIPAA requires.

  # 164.308(a)(4) — Information Access Management
  - source_control: 164.308-a4
    target_controls:
      - id: ac-1
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          HIPAA 164.308(a)(4) requires policies and procedures for authorizing
          access to ePHI. AC-1 requires developing, documenting, and disseminating
          access control policy and procedures. Both mandate a formal, documented
          approach to access authorization governance.
      - id: ac-2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          HIPAA 164.308(a)(4)(ii)(B-C) requires access authorization, establishment,
          and modification procedures. AC-2 requires comprehensive account management
          including account creation, modification, disabling, and removal with
          approvals. Both address the operational lifecycle of user access.
      - id: ac-3
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          HIPAA 164.308(a)(4) requires authorizing and controlling access to ePHI.
          AC-3 requires enforcing approved authorizations for logical access. Both
          address the enforcement of access decisions, with HIPAA including the
          clearinghouse isolation requirement and AC-3 providing the enforcement
          framework.
      - id: ac-6
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          HIPAA 164.308(a)(4) operationalizes minimum necessary access to ePHI
          through role-based access profiles. AC-6 requires employing least
          privilege for all users and processes. Both enforce the principle that
          access should be limited to what is necessary for assigned functions.
      - id: sc-7
        relationship: complements
        confidence: 0.70
        rationale: >
          HIPAA 164.308(a)(4)(ii)(A) requires isolating health care clearinghouse
          functions from the larger organization. SC-7 provides boundary protection
          through network segmentation and subnetwork isolation. SC-7 provides the
          technical means to implement the isolation HIPAA mandates.

  # 164.308(a)(5) — Security Awareness and Training
  - source_control: 164.308-a5
    target_controls:
      - id: ir-4
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          HIPAA 164.308(a)(5) requires training that includes protection from
          malicious software and login monitoring awareness. IR-4 requires
          incorporating lessons learned from incident handling into training.
          Both address the training dimension of security operations, though
          from different angles — HIPAA from proactive training, IR-4 from
          reactive lessons learned integration.
      - id: si-4
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          HIPAA 164.308(a)(5)(ii)(C) requires login monitoring procedures.
          SI-4 requires comprehensive system monitoring including detection of
          unauthorized connections and attacks. Login monitoring under HIPAA
          is a subset of the broader system monitoring capability required by SI-4.
      - id: ia-2
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          HIPAA 164.308(a)(5)(ii)(D) requires password management procedures
          for creating, changing, and safeguarding passwords. IA-2 requires
          unique identification and authentication of users. Password management
          training under HIPAA supports the authentication mechanisms IA-2 mandates.
      - id: ac-2
        relationship: complements
        confidence: 0.60
        rationale: >
          HIPAA 164.308(a)(5) requires workforce training on security policies
          including login monitoring and password management. AC-2 account
          management includes monitoring account use and reviewing accounts.
          Training ensures workforce members understand their account management
          responsibilities.

  # 164.308(a)(6) — Security Incident Procedures
  - source_control: 164.308-a6
    target_controls:
      - id: ir-4
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          HIPAA 164.308(a)(6) requires implementing policies to address security
          incidents including identification, response, mitigation, and documentation.
          IR-4 requires incident handling including preparation, detection, analysis,
          containment, eradication, and recovery. Both provide comprehensive incident
          handling requirements with near-identical scope covering the full incident
          lifecycle.
      - id: si-4
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          HIPAA 164.308(a)(6) requires identifying suspected or known security
          incidents. SI-4 requires system monitoring to detect attacks, unauthorized
          connections, and anomalies. SI-4 provides the detection capabilities that
          enable the incident identification HIPAA requires.
      - id: au-6
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          HIPAA 164.308(a)(6) requires documenting security incidents and their
          outcomes. AU-6 requires review and analysis of audit records for
          indications of inappropriate activity and reporting findings. Audit
          review and analysis is a key mechanism for incident detection and
          post-incident documentation.

  # Security Rule — Technical Safeguards

  # 164.312(a)(1) — Access Control
  - source_control: 164.312-a1
    target_controls:
      - id: ac-2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          HIPAA 164.312(a)(2)(i) requires unique user identification for tracking
          user identity. AC-2 requires defining account types, assigning account
          managers, and managing account lifecycle. Both address user identity
          management, with HIPAA mandating unique IDs and AC-2 providing the full
          account management framework.
      - id: ac-3
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          HIPAA 164.312(a)(1) requires technical access controls to allow access
          only to authorized persons or programs. AC-3 requires enforcing approved
          authorizations for logical access. Both mandate technical enforcement
          of access decisions at the system level.
      - id: ia-2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          HIPAA 164.312(a)(2)(i) requires unique user identification and tracking.
          IA-2 requires unique identification and authentication of organizational
          users, processes, and devices. Both mandate unique identification as a
          foundational security control, though IA-2 extends to processes and
          devices.
      - id: ac-6
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          HIPAA 164.312(a)(1) restricts access to those with granted access rights
          per the Information Access Management standard. AC-6 enforces least
          privilege by allowing only authorized accesses necessary for assigned
          tasks. Both limit access to authorized, necessary levels.
      - id: sc-7
        relationship: complements
        confidence: 0.65
        rationale: >
          HIPAA 164.312(a)(2)(iv) requires encryption and decryption of ePHI,
          which protects data boundaries. SC-7 provides boundary protection through
          network segmentation and controlled interfaces. Together they establish
          layered access and boundary protections for ePHI systems.

  # 164.312(b) — Audit Controls
  - source_control: 164.312-b
    target_controls:
      - id: au-2
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          HIPAA 164.312(b) requires mechanisms to record and examine activity in
          systems containing ePHI. AU-2 requires identifying event types for
          logging, specifying events to be logged, and coordinating the logging
          function. Both mandate comprehensive audit logging as a foundational
          security control for accountability and detection.
      - id: au-6
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          HIPAA 164.312(b) requires examining activity records in ePHI systems.
          AU-6 requires review and analysis of audit records for inappropriate
          or unusual activity. Both mandate not just collection but active review
          and analysis of audit data to detect security events.
      - id: si-4
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          HIPAA 164.312(b) requires recording and examining system activity.
          SI-4 requires system monitoring to detect attacks and unauthorized use.
          While 164.312(b) focuses on audit record mechanisms, SI-4 provides
          broader real-time monitoring that builds upon audit data.

  # 164.312(c)(1) — Integrity
  - source_control: 164.312-c1
    target_controls:
      - id: si-4
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          HIPAA 164.312(c)(1) requires protecting ePHI from improper alteration
          or destruction. SI-4 requires system monitoring that detects attacks
          including integrity violations. System monitoring provides the detection
          mechanism for unauthorized modifications that HIPAA's integrity
          controls aim to prevent.
      - id: cm-2
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          HIPAA 164.312(c)(1) requires protecting data from improper alteration.
          CM-2 requires maintaining baseline configurations under change control.
          Configuration baselines provide integrity assurance for system
          configurations, supporting the broader integrity protection HIPAA requires.
      - id: cm-6
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          HIPAA 164.312(c)(2) requires mechanisms to verify ePHI has not been
          altered in an unauthorized manner. CM-6 requires monitoring and
          controlling changes to configuration settings. Both address detection of
          unauthorized changes, with CM-6 focused on configurations and HIPAA
          on ePHI data integrity.
      - id: sc-7
        relationship: complements
        confidence: 0.60
        rationale: >
          HIPAA 164.312(c)(1) protects ePHI from unauthorized alteration. SC-7
          boundary protection monitors and controls communications at managed
          interfaces, preventing unauthorized modifications from external
          sources. Boundary protection complements data integrity controls by
          limiting the attack surface.
      - id: sr-3
        relationship: complements
        confidence: 0.60
        rationale: >
          HIPAA 164.312(c)(1) requires protecting ePHI integrity. SR-3 addresses
          supply chain integrity by protecting against tampering, counterfeit
          components, and malicious software insertion. Supply chain controls
          complement integrity protections by ensuring system components
          themselves have not been compromised.

  # 164.312(d) — Person or Entity Authentication
  - source_control: 164.312-d
    target_controls:
      - id: ia-2
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          HIPAA 164.312(d) requires verifying the identity of persons or entities
          seeking access to ePHI. IA-2 requires unique identification and
          authentication of organizational users, processes, and devices. Both are
          direct authentication controls with near-identical scope — verifying
          claimed identity before granting access.
      - id: ac-2
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          HIPAA 164.312(d) requires identity verification before access. AC-2
          account management provides the account infrastructure that
          authentication operates against, including account types, lifecycle
          management, and authenticator management for group accounts.

  # 164.312(e)(1) — Transmission Security
  - source_control: 164.312-e1
    target_controls:
      - id: sc-7
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          HIPAA 164.312(e)(1) requires technical measures to guard against
          unauthorized access to ePHI during transmission. SC-7 requires monitoring
          and controlling communications at managed interfaces and network
          boundaries. Both address securing data as it moves across networks,
          though SC-7 is broader in scope covering all boundary communications.
      - id: cm-6
        relationship: complements
        confidence: 0.65
        rationale: >
          HIPAA 164.312(e)(2)(ii) requires encryption of ePHI during transmission.
          CM-6 requires implementing secure configuration settings including TLS
          enforcement and cipher suite selection. Proper configuration settings
          are essential for implementing the encryption HIPAA requires for
          transmission security.
      - id: si-4
        relationship: complements
        confidence: 0.65
        rationale: >
          HIPAA 164.312(e)(2)(i) requires integrity controls to detect improper
          modification during transmission. SI-4 system monitoring includes
          network traffic analysis that can detect tampering and unauthorized
          interception during transmission.

  # Breach Notification Rule

  # 164.404 — Notification to Individuals
  - source_control: "164.404"
    target_controls:
      - id: ir-4
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          HIPAA 164.404 requires notifying individuals within 60 days of
          discovering a breach of unsecured PHI. IR-4 requires incident handling
          including detection, analysis, containment, eradication, and recovery.
          Breach notification is a post-incident activity that depends on the
          incident handling capabilities IR-4 provides. IR-4's scope extends
          beyond notification to the full incident lifecycle.
      - id: si-4
        relationship: complements
        confidence: 0.70
        rationale: >
          HIPAA 164.404 requires breach discovery as a trigger for notification.
          SI-4 system monitoring provides the detection capabilities necessary
          to discover breaches in the first place. Without effective monitoring
          (SI-4), breach discovery (164.404) may be delayed or missed entirely.
      - id: au-6
        relationship: complements
        confidence: 0.70
        rationale: >
          HIPAA 164.404 requires determining whether a breach occurred through a
          four-factor risk assessment. AU-6 requires review and analysis of audit
          records, which provides the evidentiary basis for the breach risk
          assessment. Audit record analysis enables accurate breach scope
          determination and notification content.

  # 164.408 — Notification to the Secretary
  - source_control: "164.408"
    target_controls:
      - id: ir-4
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          HIPAA 164.408 requires notifying the Secretary of HHS of breaches,
          contemporaneously for 500+ individuals and annually for smaller breaches.
          IR-4 requires incident handling with organizational coordination and
          documentation. Secretary notification is a specific external reporting
          obligation within the broader incident handling framework IR-4 provides.
      - id: au-2
        relationship: complements
        confidence: 0.65
        rationale: >
          HIPAA 164.408 requires maintaining a breach log with documentation of
          all breaches for annual submission. AU-2 requires identifying and
          specifying event types for logging. The breach log requirement aligns
          with AU-2's mandate for systematic event documentation, extending it
          to breach-specific record-keeping.
      - id: au-6
        relationship: complements
        confidence: 0.65
        rationale: >
          HIPAA 164.408 requires breach scope assessment to determine the number
          of affected individuals (the 500-individual threshold). AU-6 requires
          audit record review and analysis. Audit analysis capabilities directly
          enable the breach impact assessment required for proper Secretary
          notification.
