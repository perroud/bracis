id: gsi-in5_to_gsi-in3
title: "IN GSI/PR 5 to IN GSI/PR 3 Control Mapping"
source_framework: gsi-in5
target_framework: gsi-in3
version: "1.0.0"
last_updated: "2026-04-06"
methodology: structural
description: >
  Mapping between Instrucao Normativa GSI/PR 5/2021 (minimum security requirements
  for cloud computing in federal public administration) and Instrucao Normativa
  GSI/PR 3/2021 (operational information security management processes in APF).
  IN5 specializes cloud security requirements while IN3 covers general security
  processes including a dedicated cloud chapter (cap-12) that explicitly references IN5.

mappings:
  # ============================================================
  # CAP-1: Disposicoes Gerais (art-1 to art-4)
  # ============================================================

  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Both art-1 controls define scope and applicability for their respective
          norms within the federal public administration. IN5 art-1 scopes cloud
          computing security; IN3 art-1 scopes general information security processes.
          They share the same institutional audience (APF organs and entities).
      - id: art-55
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          IN3 art-55 (cloud security policy) explicitly references IN GSI/PR 5 as
          the governing norm for cloud security requirements, directly linking to
          IN5 art-1 scope of cloud computing security in the APF.

  - source_control: art-2
    target_controls:
      - id: art-2
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Both articles define terminology and concepts for their respective norms.
          IN5 art-2 defines cloud-specific terms (cloud computing models, IaaS,
          PaaS, SaaS); IN3 art-2 defines general security terms. The glossaries
          overlap on security-related definitions.

  - source_control: art-3
    target_controls:
      - id: art-55
        relationship: complements
        confidence: 0.85
        rationale: >
          IN5 art-3 defines cloud service models (IaaS, PaaS, SaaS) which
          complement IN3 art-55 cloud security policy that requires understanding
          of service models for risk assessment and contractual requirements.

  - source_control: art-4
    target_controls:
      - id: art-3
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Both articles define responsibilities of the information security manager.
          IN5 art-4 focuses on cloud-specific responsibilities (risk assessment for
          cloud, approving cloud usage); IN3 art-3 defines general security
          management responsibilities. The cloud security manager role in IN5
          is a specialization of the general role in IN3.
      - id: art-55
        relationship: complements
        confidence: 0.85
        rationale: >
          IN3 art-55 requires risk assessment before cloud service contracting
          and defining security requirements, complementing the cloud security
          manager responsibilities defined in IN5 art-4.

  # ============================================================
  # CAP-2: Classificacao de Dados para Nuvem (art-5 to art-8)
  # ============================================================

  - source_control: art-5
    target_controls:
      - id: art-5
        relationship: subset-of
        confidence: 0.90
        rationale: >
          IN5 art-5 (information classification for cloud) is a cloud-specific
          subset of IN3 art-5 (general asset classification). IN5 requires
          classification prior to cloud deployment, applying the same classification
          scheme defined in IN3 but scoped to cloud use cases.
      - id: art-56
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          IN3 art-56 (data classification for cloud) is the direct IN3 counterpart
          to IN5 art-5, both requiring data classification before cloud storage
          with restrictions by secrecy level (ultrasecret, secret, reserved).
      - id: art-22
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          IN3 art-22 (data classification and protection) establishes general data
          classification controls that IN5 art-5 applies specifically to data
          destined for cloud environments.

  - source_control: art-6
    target_controls:
      - id: art-56
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          IN5 art-6 (restrictions by data type for cloud models) and IN3 art-56
          both define which classification levels can be stored in which cloud
          deployment models (public, private, community, hybrid).
      - id: art-22
        relationship: complements
        confidence: 0.80
        rationale: >
          IN3 art-22 (data classification and protection) establishes general
          protection controls proportional to data sensitivity, which IN5 art-6
          complements with cloud-specific restrictions per data type and cloud model.

  - source_control: art-7
    target_controls:
      - id: art-55
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          IN5 art-7 (risk assessment for cloud migration) intersects with IN3
          art-55 which also requires risk assessment before cloud service
          contracting. Both mandate evaluation of information classification,
          legal requirements, and potential impact of security incidents.

  - source_control: art-8
    target_controls:
      - id: art-4
        relationship: subset-of
        confidence: 0.90
        rationale: >
          IN5 art-8 (inventory of data in cloud) is a cloud-specific subset of
          IN3 art-4 (general asset inventory). IN5 requires maintaining an
          inventory of all data stored or processed in cloud, as a specialization
          of the general asset inventory required by IN3.

  # ============================================================
  # CAP-3: Requisitos de Seguranca (art-9 to art-14)
  # ============================================================

  - source_control: art-9
    target_controls:
      - id: art-21
        relationship: subset-of
        confidence: 0.90
        rationale: >
          IN5 art-9 (data encryption in cloud) is a cloud-specific subset of
          IN3 art-21 (cryptography policy). IN5 mandates encryption at rest
          and in transit for cloud data, applying IN3 general cryptography
          requirements to cloud environments.
      - id: art-58
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          IN3 art-58 (cryptography and data protection in cloud) is the direct
          IN3 counterpart to IN5 art-9, both requiring encryption at rest with
          customer-managed keys and encryption in transit for all cloud
          communications.

  - source_control: art-10
    target_controls:
      - id: art-8
        relationship: subset-of
        confidence: 0.85
        rationale: >
          IN5 art-10 (authentication and access control in cloud) is a
          cloud-specific subset of IN3 art-8 (access control policy). Both
          mandate least privilege and segregation of duties; IN5 applies
          these to cloud environments specifically.
      - id: art-10
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          IN5 art-10 and IN3 art-10 both require MFA for access to critical
          systems. IN5 mandates MFA specifically for administrative and
          privileged cloud access; IN3 for general critical system access.
      - id: art-12
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          IN5 art-10 requires segregation of duties for critical cloud
          operations and privileged access management, intersecting with
          IN3 art-12 (privileged account management) which mandates
          MFA and session monitoring for privileged accounts.
      - id: art-57
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          IN3 art-57 (identity security in cloud) is the direct IN3 counterpart
          to IN5 art-10, both requiring identity federation, MFA for cloud
          console access, and least privilege for cloud roles and policies.

  - source_control: art-11
    target_controls:
      - id: art-38
        relationship: subset-of
        confidence: 0.90
        rationale: >
          IN5 art-11 (audit logs in cloud) is a cloud-specific subset of
          IN3 art-38 (logging policy). IN5 requires cloud providers to maintain
          audit logs for tracking access and operations, applying IN3 general
          logging requirements to cloud environments.
      - id: art-41
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          IN5 art-11 requires log retention and protection in cloud, intersecting
          with IN3 art-41 (log retention and protection) which mandates tamper
          protection and minimum retention periods for security logs.
      - id: art-59
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          IN3 art-59 (monitoring and audit in cloud) is the direct IN3 counterpart
          to IN5 art-11, both requiring audit log enablement, log export to
          org-controlled infrastructure, and monitoring of cloud admin activities.

  - source_control: art-12
    target_controls:
      - id: art-24
        relationship: subset-of
        confidence: 0.90
        rationale: >
          IN5 art-12 (backup and recovery in cloud) is a cloud-specific subset
          of IN3 art-24 (general backup and recovery policy). Both require
          periodic backups, geographic separation, and recovery testing; IN5
          applies these requirements to cloud-stored data.
      - id: art-60
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          IN3 art-60 (continuity and portability in cloud) intersects with IN5
          art-12 on data recovery capabilities, as both address ensuring data
          availability and recoverability in cloud environments.

  - source_control: art-13
    target_controls:
      - id: art-33
        relationship: subset-of
        confidence: 0.90
        rationale: >
          IN5 art-13 (vulnerability management in cloud) is a cloud-specific
          subset of IN3 art-33 (general vulnerability management policy). Both
          require vulnerability scanning and timely patching; IN5 scopes these
          to cloud resources under the organization's responsibility.
      - id: art-34
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          IN5 art-13 requires periodic vulnerability scanning in cloud resources,
          intersecting with IN3 art-34 (vulnerability scanning) which defines
          general scanning practices and frequencies.
      - id: art-35
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          IN5 art-13 requires timely security patch application in cloud, intersecting
          with IN3 art-35 (patch management) which establishes general patch
          management processes and timelines.
      - id: art-36
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          IN5 art-13 includes hardening of cloud environments, intersecting with
          IN3 art-36 (system hardening) which defines general hardening baselines
          and configuration standards.

  - source_control: art-14
    target_controls:
      - id: art-15
        relationship: subset-of
        confidence: 0.85
        rationale: >
          IN5 art-14 (network security and segmentation in cloud) is a
          cloud-specific subset of IN3 art-15 (general network security policy).
          Both require network segmentation by asset criticality; IN5 applies
          this to cloud virtual networks.
      - id: art-16
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          IN5 art-14 requires network segmentation for isolating cloud workloads,
          intersecting with IN3 art-16 (network segmentation) which mandates
          isolation of production, development, and DMZ networks.
      - id: art-17
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          IN5 art-14 requires firewalls and security groups with deny-all policy,
          intersecting with IN3 art-17 (firewall and traffic filtering) which
          mandates deny-by-default filtering rules.
      - id: art-18
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          IN5 art-14 includes intrusion detection in cloud, intersecting with
          IN3 art-18 (IDS/IPS) which requires monitoring at strategic network points.

  # ============================================================
  # CAP-4: Localizacao e Soberania de Dados (art-15 to art-18)
  # ============================================================

  - source_control: art-15
    target_controls:
      - id: art-55
        relationship: complements
        confidence: 0.85
        rationale: >
          IN5 art-15 (data territoriality requiring storage in national territory)
          complements IN3 art-55 (cloud security policy) which references IN5 for
          cloud-specific security requirements including data location restrictions.
      - id: art-56
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          IN5 art-15 data territoriality requirements intersect with IN3 art-56
          (data classification for cloud) as classification levels determine
          which data can be stored outside national territory.

  - source_control: art-16
    target_controls:
      - id: art-55
        relationship: complements
        confidence: 0.85
        rationale: >
          IN5 art-16 (jurisdiction and applicable legislation for cloud contracts)
          complements IN3 art-55 cloud security policy. IN5 requires Brazilian
          legislation applicability regardless of provider location, a requirement
          that IN3 art-55 references through its pointer to IN5.

  - source_control: art-17
    target_controls:
      - id: art-26
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          IN5 art-17 (international data transfer from cloud) intersects with
          IN3 art-26 (secure data transfer) as international transfer of
          cloud-stored data is a specialization of secure data transfer controls.
      - id: art-55
        relationship: complements
        confidence: 0.85
        rationale: >
          IN5 art-17 international data transfer restrictions complement IN3
          art-55 cloud security policy, adding specific conditions for when
          data may be transferred internationally from cloud environments.

  - source_control: art-18
    target_controls:
      - id: art-55
        relationship: complements
        confidence: 0.85
        rationale: >
          IN5 art-18 (storage and processing restrictions, including prohibition
          of data use for AI training or sharing with third parties) complements
          IN3 art-55 cloud security policy contractual requirements.
      - id: art-23
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          IN5 art-18 prohibitions on unauthorized data use by cloud providers
          intersect with IN3 art-23 (DLP) which monitors and blocks unauthorized
          data transfers, including those by service providers.

  # ============================================================
  # CAP-5: Requisitos Contratuais (art-19 to art-23)
  # ============================================================

  - source_control: art-19
    target_controls:
      - id: art-55
        relationship: complements
        confidence: 0.85
        rationale: >
          IN5 art-19 (SLA requirements for cloud contracts) complements IN3
          art-55 which requires defining security requirements in cloud
          procurement documents. SLA is a core contractual instrument for
          cloud security enforcement.
      - id: art-60
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          IN5 art-19 SLA requirements intersect with IN3 art-60 (continuity
          and portability in cloud) as availability SLAs are directly tied
          to business continuity planning for cloud services.

  - source_control: art-20
    target_controls:
      - id: art-55
        relationship: complements
        confidence: 0.85
        rationale: >
          IN5 art-20 (provider responsibilities including certifications and
          incident notification) complements IN3 art-55 cloud security policy
          which requires defining security requirements for cloud contracting.

  - source_control: art-21
    target_controls:
      - id: art-42
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          IN5 art-21 (audit rights for cloud environments, including access to
          SOC 2, ISO 27001, CSA STAR reports) intersects with IN3 art-42
          (security log auditing) which mandates periodic auditing of security
          records and audit trail reviews.
      - id: art-59
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          IN5 art-21 audit rights in cloud intersect with IN3 art-59 (monitoring
          and audit in cloud) which requires audit log enablement and monitoring
          capability in cloud services.

  - source_control: art-22
    target_controls:
      - id: art-60
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          IN5 art-22 (portability and reversibility for cloud contracts) and
          IN3 art-60 (continuity and portability in cloud) are equivalent controls.
          Both require data migration capability, export in open formats, and
          contractual guarantees for portability between providers.

  - source_control: art-23
    target_controls:
      - id: art-55
        relationship: complements
        confidence: 0.90
        rationale: >
          IN5 art-23 (mandatory contractual clauses for cloud services) complements
          IN3 art-55 (cloud security policy) which mandates defining security
          requirements in cloud procurement. IN5 art-23 specifies the minimum
          clauses required in cloud contracts.

  # ============================================================
  # CAP-6: Gestao e Monitoramento (art-24 to art-27)
  # ============================================================

  - source_control: art-24
    target_controls:
      - id: art-40
        relationship: subset-of
        confidence: 0.90
        rationale: >
          IN5 art-24 (continuous monitoring of cloud services) is a cloud-specific
          subset of IN3 art-40 (general continuous security monitoring). Both
          require real-time monitoring of threats and anomalies; IN5 scopes
          this to cloud service availability, security, and compliance.
      - id: art-59
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          IN5 art-24 continuous cloud monitoring intersects with IN3 art-59
          (monitoring and audit in cloud) which requires monitoring of cloud
          administration activities and audit log enablement.
      - id: art-39
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          IN5 art-24 security monitoring with threat detection intersects with
          IN3 art-39 (event correlation and SIEM) which provides the technical
          capability for correlating security events including those from cloud.

  - source_control: art-25
    target_controls:
      - id: art-55
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          IN5 art-25 (incident management for cloud environments) intersects with
          IN3 art-55 cloud security policy which requires incident response
          procedures as part of the overall cloud security framework.
      - id: art-40
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          IN5 art-25 incident detection and response in cloud intersects with
          IN3 art-40 (continuous security monitoring) which feeds the incident
          management process with detected threats and anomalies.

  - source_control: art-26
    target_controls:
      - id: art-40
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          IN5 art-26 (performance and compliance KPIs for cloud services including
          MTTD/MTTR) intersects with IN3 art-40 (continuous security monitoring)
          which provides the measurement infrastructure for security metrics.
      - id: art-59
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          IN5 art-26 compliance indicators for cloud intersect with IN3 art-59
          (monitoring and audit in cloud) which enables the audit capability
          needed to measure compliance.

  - source_control: art-27
    target_controls:
      - id: art-42
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          IN5 art-27 (periodic reports on cloud usage, compliance status, and
          incidents) intersects with IN3 art-42 (security log auditing) which
          provides the audit evidence and review processes that feed these reports.
      - id: art-59
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          IN5 art-27 periodic reporting on cloud compliance and incidents
          intersects with IN3 art-59 (monitoring and audit in cloud) which
          generates the audit data underpinning periodic cloud reports.

  # ============================================================
  # CAP-7: Disposicoes Finais (art-28 to art-30)
  # ============================================================

  - source_control: art-28
    target_controls:
      - id: art-1
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          IN5 art-28 (compliance timeline for existing cloud users, 12-month
          deadline) intersects with IN3 art-1 (scope and applicability) as both
          establish the implementation framework for their respective norms
          within the APF.

  - source_control: art-29
    target_controls:
      - id: art-1
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          IN5 art-29 (periodic norm revision considering technology evolution
          and threat landscape changes) intersects with IN3 art-1 (scope) as
          both norms are subject to periodic review by GSI/PR to maintain
          alignment with evolving security requirements.

  - source_control: art-30
    target_controls:
      - id: art-1
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          IN5 art-30 (effective date and final dispositions, cases resolved
          by GSI/PR) intersects with IN3 art-1 as both establish the
          administrative governance structure under GSI/PR for the APF.
