id: sox_to_nist-800-53-rev5
title: "SOX ITGCs to NIST 800-53 Rev 5 Control Mapping"
source_framework: sox
target_framework: nist-800-53-rev5
version: "1.0.0"
last_updated: "2026-04-03"
methodology: semantic

mappings:
  # Access Control ITGCs
  - source_control: itgc-access
    target_controls:
      - id: ac-2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          SOX ITGC Access Controls map to NIST AC-2 (Account Management).
          SOX requires that access to financially significant applications
          and data is restricted to authorized individuals. AC-2 provides
          the detailed control framework for managing accounts, including
          creation, modification, disabling, and removal.
      - id: ac-3
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          NIST AC-3 (Access Enforcement) implements the access control
          policies that SOX ITGCs require for financial systems. SOX mandates
          enforcement of logical access restrictions; AC-3 specifies the
          mechanism for enforcing approved authorizations.
      - id: ac-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          NIST AC-5 (Separation of Duties) directly supports SOX requirements
          for segregation of duties in financial processes. SOX Section 404
          specifically requires that incompatible duties are separated to
          prevent fraud and errors in financial reporting.
      - id: ac-6
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          NIST AC-6 (Least Privilege) supports SOX access control requirements
          by ensuring users have only the minimum access necessary to perform
          their job functions in financial systems.
      - id: ia-2
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          NIST IA-2 (Identification and Authentication) provides the
          authentication mechanisms required by SOX ITGCs to verify the
          identity of users accessing financial applications and data.

  # Change Management ITGCs
  - source_control: itgc-change
    target_controls:
      - id: cm-2
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          NIST CM-2 (Baseline Configuration) supports SOX change management
          requirements by establishing and maintaining documented baseline
          configurations for financial systems, enabling detection of
          unauthorized changes.
      - id: cm-3
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          NIST CM-3 (Configuration Change Control) directly maps to SOX
          ITGC change management. Both require formal change control processes
          including authorization, testing, approval, and documentation of
          changes to financially significant systems.
      - id: cm-4
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          NIST CM-4 (Impact Analyses) supports SOX requirements for assessing
          the impact of changes before implementation. SOX requires that
          changes to financial systems are tested and their impact on
          financial reporting is evaluated.
      - id: cm-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          NIST CM-5 (Access Restrictions for Change) maps to SOX requirements
          for restricting who can make changes to production financial systems.
          Both require that only authorized personnel can implement changes.
      - id: cm-6
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          NIST CM-6 (Configuration Settings) supports SOX change management
          by ensuring systems are configured according to approved settings,
          reducing risk of misconfigurations affecting financial reporting.

  # IT Operations ITGCs
  - source_control: itgc-operations
    target_controls:
      - id: si-4
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          NIST SI-4 (System Monitoring) maps to SOX IT operations requirements
          for monitoring financial systems. SOX requires that IT operations
          ensure the reliability, integrity, and availability of financial
          processing, which includes system monitoring and alerting.
      - id: si-5
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          NIST SI-5 (Security Alerts, Advisories, and Directives) supports
          SOX IT operations by ensuring awareness of security threats that
          could impact financial system integrity.
      - id: cp-9
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          NIST CP-9 (System Backup) directly supports SOX IT operations
          requirements for backup and recovery of financial data and systems.
          SOX requires that organizations can recover financial processing
          capabilities and data in the event of a disruption.
      - id: cp-10
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          NIST CP-10 (System Recovery and Reconstitution) maps to SOX
          requirements for restoring financial systems to operational state
          after disruption. Both emphasize the ability to recover processing
          capabilities within defined timeframes.

  # Software Development Life Cycle ITGCs
  - source_control: itgc-sdlc
    target_controls:
      - id: sa-3
        relationship: equivalent-to
        confidence: 0.80
        rationale: >
          NIST SA-3 (System Development Life Cycle) maps directly to SOX
          SDLC requirements. Both mandate a formal development lifecycle
          with defined phases, approvals, and controls for systems that
          process financial data.
      - id: sa-8
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          NIST SA-8 (Security and Privacy Engineering Principles) supports
          SOX SDLC requirements by ensuring that security is designed into
          financial systems from inception, reducing the risk of
          vulnerabilities that could affect financial reporting integrity.
      - id: sa-11
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          NIST SA-11 (Developer Testing and Evaluation) supports SOX SDLC
          requirements for testing financial applications before deployment.
          SOX requires validation that changes function correctly and do not
          adversely impact financial reporting.
      - id: sa-15
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          NIST SA-15 (Development Process, Standards, and Tools) provides
          the framework for standardized development practices that SOX
          ITGCs require for financially significant applications.

  # SOX Section 404(a) — Management Assessment of Internal Controls
  - source_control: sec-404-a
    target_controls:
      - id: pl-2
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          NIST PL-2 (System Security and Privacy Plans) supports SOX §404(a)
          by requiring documented security plans for information systems.
          SOX §404(a) requires management to establish and maintain an
          adequate internal control structure, which includes documented
          control frameworks and system security plans.
      - id: ca-2
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          NIST CA-2 (Control Assessments) maps directly to SOX §404(a)
          requirements for management to assess the effectiveness of internal
          controls over financial reporting. Both require periodic evaluation
          of control design and operating effectiveness.
      - id: ca-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          NIST CA-5 (Plan of Action and Milestones) supports SOX §404(a)
          by providing a mechanism to track and remediate identified control
          deficiencies, which SOX requires as part of the assessment and
          remediation process.
      - id: ca-7
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          NIST CA-7 (Continuous Monitoring) supports SOX §404(a) requirements
          for ongoing monitoring of internal controls. SOX requires that
          management continuously monitor and evaluate control effectiveness,
          not just through annual assessments.
