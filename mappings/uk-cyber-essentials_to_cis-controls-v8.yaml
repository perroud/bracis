id: uk-cyber-essentials_to_cis-controls-v8
title: "UK Cyber Essentials to CIS Controls v8 Control Mapping"
source_framework: uk-cyber-essentials
target_framework: cis-controls-v8
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # ── fw (Firewalls) ──────────────────────────────────────────────────

  - source_control: fw-1
    target_controls:
      - id: cis-4.1
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          UKCE fw-1 (Boundary Firewalls and Internet Gateways) requires that every
          internet-connected device is protected by a correctly configured firewall
          with a default-deny posture. CIS 4.1 (Establish and Maintain a Secure
          Configuration Process) establishes the overarching process for secure
          configuration of enterprise assets including network devices. Firewall
          hardening is a direct application of the secure configuration process.
          The overlap is strong on configuration security but CIS 4.1 spans far
          beyond firewalls alone.
      - id: cis-1.1
        relationship: complements
        confidence: 0.72
        rationale: >
          UKCE fw-1 implicitly requires knowing which devices connect to the
          internet so that firewall controls can be applied. CIS 1.1 (Establish
          and Maintain Detailed Enterprise Asset Inventory) provides the foundational
          asset inventory that enables identification of all devices requiring
          firewall protection. Without CIS 1.1, fw-1 cannot be comprehensively
          enforced.
      - id: cis-8.1
        relationship: complements
        confidence: 0.70
        rationale: >
          UKCE fw-1 mandates controlling and monitoring inbound and outbound
          traffic. CIS 8.1 (Establish and Maintain an Audit Log Management
          Process) provides the logging infrastructure necessary to monitor
          firewall-denied connections and anomalous traffic patterns. Firewall
          log analysis is a key use case of the audit log management process.

  - source_control: fw-2
    target_controls:
      - id: cis-4.1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          UKCE fw-2 (Firewall Rule Management and Documentation) requires an
          approval process for firewall rules, documentation of business
          justification, and timely removal of stale rules. CIS 4.1 (Establish
          and Maintain a Secure Configuration Process) establishes the broader
          secure configuration process that encompasses change management and
          documentation of configuration baselines. Firewall rule management is
          a specific instantiation of CIS 4.1's configuration management
          requirements.
      - id: cis-8.1
        relationship: complements
        confidence: 0.72
        rationale: >
          UKCE fw-2 requires auditable records of firewall rule changes,
          approvals, and removals. CIS 8.1 (Establish and Maintain an Audit
          Log Management Process) defines the logging infrastructure necessary
          to maintain this audit trail. The two controls are complementary:
          fw-2 defines what must be logged for firewalls, and CIS 8.1 defines
          how logs are managed enterprise-wide.

  - source_control: fw-3
    target_controls:
      - id: cis-4.1
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          UKCE fw-3 (Host-Based Firewalls on End-User Devices) requires
          software firewalls on devices connecting to untrusted networks, with
          configurations that users cannot disable. CIS 4.1 (Establish and
          Maintain a Secure Configuration Process) covers the secure
          configuration of end-user devices including host-based firewall
          settings as part of the hardened baseline. The intersection is
          strong on device hardening, though CIS 4.1 extends to all
          configuration aspects beyond firewalls.
      - id: cis-1.1
        relationship: complements
        confidence: 0.68
        rationale: >
          UKCE fw-3 requires host-based firewalls on all devices connecting
          to untrusted networks. CIS 1.1 (Establish and Maintain Detailed
          Enterprise Asset Inventory) provides the device inventory needed to
          identify which endpoints require host-based firewall enforcement,
          particularly remote and mobile devices. Asset visibility is a
          prerequisite for comprehensive host firewall coverage.

  # ── mp (Malware Protection) ─────────────────────────────────────────

  - source_control: mp-1
    target_controls:
      - id: cis-4.1
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          UKCE mp-1 (Anti-Malware Software Deployment and Configuration)
          mandates anti-malware with up-to-date signatures, on-access scanning,
          and web filtering. CIS 4.1 (Establish and Maintain a Secure
          Configuration Process) addresses the secure configuration of
          enterprise assets, which includes configuring endpoint protection
          software as part of the hardened baseline. The overlap exists in
          the configuration management dimension, but mp-1 is specifically
          focused on malware prevention capability rather than configuration
          processes broadly.
      - id: cis-2.1
        relationship: complements
        confidence: 0.70
        rationale: >
          UKCE mp-1 requires anti-malware software on all capable devices.
          CIS 2.1 (Establish and Maintain a Software Inventory) tracks all
          installed software, ensuring that anti-malware agents are present
          across the estate and that unauthorized software (potential malware
          vectors) is identified. Software inventory is a prerequisite for
          verifying anti-malware deployment coverage.
      - id: cis-7.1
        relationship: complements
        confidence: 0.72
        rationale: >
          UKCE mp-1 requires keeping anti-malware signatures current and
          scanning for threats. CIS 7.1 (Establish and Maintain a Vulnerability
          Management Process) defines the broader process for identifying and
          remediating vulnerabilities, which includes ensuring endpoint
          protection is current. Malware signature currency is a specific
          vulnerability management concern.

  - source_control: mp-2
    target_controls:
      - id: cis-2.1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          UKCE mp-2 (Application Allow-Listing and Sandboxing) permits only
          approved applications to execute. CIS 2.1 (Establish and Maintain a
          Software Inventory) requires a detailed inventory of all licensed
          and approved software. Application allow-listing enforces the
          software inventory's approved list at runtime. CIS 2.1 provides
          the inventory; mp-2 provides the enforcement mechanism.
      - id: cis-4.1
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          UKCE mp-2 requires configuring application allow-listing and
          sandboxing technologies. CIS 4.1 (Establish and Maintain a Secure
          Configuration Process) encompasses the configuration management
          process for these technologies. Allow-listing policy configuration
          is a specific case of secure configuration management.

  - source_control: mp-3
    target_controls:
      - id: cis-4.1
        relationship: intersects-with
        confidence: 0.72
        rationale: >
          UKCE mp-3 (Prevention of Malware Delivery Through Email and Web)
          requires email filtering, web filtering, and browser configuration
          to prevent malware delivery. CIS 4.1 (Establish and Maintain a
          Secure Configuration Process) covers the secure configuration of
          email gateways, web proxies, and browsers as enterprise assets.
          The email and web security configurations mp-3 mandates are
          applications of the CIS 4.1 secure configuration process.
      - id: cis-7.1
        relationship: complements
        confidence: 0.70
        rationale: >
          UKCE mp-3 addresses preventing malware delivery through email and
          web vectors. CIS 7.1 (Establish and Maintain a Vulnerability
          Management Process) encompasses identifying and remediating
          vulnerabilities that malware exploits. The two are complementary:
          mp-3 prevents the delivery mechanism while CIS 7.1 addresses the
          underlying vulnerabilities that malware targets.
      - id: cis-8.1
        relationship: complements
        confidence: 0.65
        rationale: >
          UKCE mp-3 mandates monitoring email gateway telemetry and web
          filtering logs for malicious activity. CIS 8.1 (Establish and
          Maintain an Audit Log Management Process) provides the logging
          infrastructure to collect, aggregate, and analyze these email and
          web security logs. Detection of malware delivery attempts depends
          on the audit log management process.

  # ── pm (Patch Management) ───────────────────────────────────────────

  - source_control: pm-1
    target_controls:
      - id: cis-7.1
        relationship: implements
        confidence: 0.92
        rationale: >
          UKCE pm-1 (Timely Patching of Operating Systems) requires applying
          critical and high-severity OS patches within 14 days and removing
          end-of-life operating systems. CIS 7.1 (Establish and Maintain a
          Vulnerability Management Process) defines the overarching
          vulnerability management process including remediation SLAs. PM-1
          directly implements CIS 7.1 for the specific domain of OS
          patching, with the 14-day SLA being a concrete instantiation of
          CIS 7.1's remediation timeline requirements.
      - id: cis-1.1
        relationship: complements
        confidence: 0.75
        rationale: >
          UKCE pm-1 requires knowing which operating systems are in use and
          their support status. CIS 1.1 (Establish and Maintain Detailed
          Enterprise Asset Inventory) provides the asset inventory that
          identifies all devices and their OS versions, enabling
          comprehensive patch management. Without asset inventory, patching
          coverage cannot be verified.

  - source_control: pm-2
    target_controls:
      - id: cis-7.1
        relationship: implements
        confidence: 0.92
        rationale: >
          UKCE pm-2 (Timely Patching of Applications and Third-Party Software)
          requires applying critical and high-severity application patches
          within 14 days and removing unsupported software. CIS 7.1 (Establish
          and Maintain a Vulnerability Management Process) defines the
          vulnerability management process that governs patch remediation.
          PM-2 implements CIS 7.1 specifically for application-layer
          vulnerabilities with concrete SLA timelines.
      - id: cis-2.1
        relationship: complements
        confidence: 0.82
        rationale: >
          UKCE pm-2 requires maintaining an inventory of all installed
          applications and their vendor support status. CIS 2.1 (Establish
          and Maintain a Software Inventory) provides this inventory,
          documenting software titles, versions, and lifecycle dates.
          Software inventory is a direct prerequisite for application
          patch management.

  - source_control: pm-3
    target_controls:
      - id: cis-2.1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          UKCE pm-3 (Unsupported Software Removal and End-of-Life Management)
          requires removing or isolating end-of-life software. CIS 2.1
          (Establish and Maintain a Software Inventory) tracks software
          lifecycle status including decommission dates. The intersection
          is strong: CIS 2.1 provides the lifecycle visibility needed to
          identify EOL software, and pm-3 mandates the remediation action
          (removal or isolation).
      - id: cis-7.1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          UKCE pm-3 addresses the risk of unsupported software that cannot
          receive security patches. CIS 7.1 (Establish and Maintain a
          Vulnerability Management Process) covers the broader vulnerability
          management lifecycle, including handling assets with unresolvable
          vulnerabilities due to vendor EOL. PM-3's isolation requirement
          for EOL software is a specific compensating control within the
          vulnerability management framework.
      - id: cis-1.1
        relationship: complements
        confidence: 0.72
        rationale: >
          UKCE pm-3 requires identifying software approaching end-of-life
          and planning replacements. CIS 1.1 (Establish and Maintain Detailed
          Enterprise Asset Inventory) provides the asset inventory that
          tracks device types and their operating systems, enabling
          identification of hardware that may be constrained to EOL
          software. Asset lifecycle planning depends on inventory accuracy.

  # ── sc (Secure Configuration) ───────────────────────────────────────

  - source_control: sc-1
    target_controls:
      - id: cis-4.1
        relationship: implements
        confidence: 0.92
        rationale: >
          UKCE sc-1 (Removal of Unnecessary Software, Services, and Accounts)
          requires minimizing attack surface by removing unnecessary components.
          CIS 4.1 (Establish and Maintain a Secure Configuration Process)
          establishes the secure configuration process that includes
          minimization of installed software, running services, and active
          accounts. SC-1 directly implements CIS 4.1's hardening requirements
          for system minimization.
      - id: cis-2.1
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          UKCE sc-1 requires that only business-necessary software is installed.
          CIS 2.1 (Establish and Maintain a Software Inventory) provides the
          authoritative list of approved software against which installed
          software can be compared. Unauthorized software identified through
          the CIS 2.1 inventory process is what sc-1 mandates removing.
      - id: cis-5.1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          UKCE sc-1 mandates removing or disabling default and unnecessary
          user accounts, including guest accounts. CIS 5.1 (Establish and
          Maintain an Inventory of Accounts) tracks all accounts and their
          authorization status. The intersection is on account lifecycle
          management: CIS 5.1 identifies which accounts exist, and sc-1
          requires removal of those that are unnecessary.

  - source_control: sc-2
    target_controls:
      - id: cis-4.1
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          UKCE sc-2 (Changing Default Passwords and Secure Authentication
          Configuration) requires changing default passwords and configuring
          strong authentication. CIS 4.1 (Establish and Maintain a Secure
          Configuration Process) includes credential configuration as part
          of the secure configuration baseline. Eliminating default
          credentials is a core secure configuration activity.
      - id: cis-6.1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          UKCE sc-2 mandates MFA where available, brute-force protection,
          and strong password policies. CIS 6.1 (Establish an Access Granting
          Process) defines the access management process including
          authentication requirements. Both controls address how users
          authenticate, though CIS 6.1 focuses on the access granting
          process while sc-2 focuses on authentication configuration
          strength.
      - id: cis-5.1
        relationship: complements
        confidence: 0.72
        rationale: >
          UKCE sc-2 requires that default accounts have passwords changed
          before deployment. CIS 5.1 (Establish and Maintain an Inventory
          of Accounts) identifies all accounts including those with default
          credentials. Account inventory enables systematic identification
          of accounts requiring credential remediation.

  - source_control: sc-3
    target_controls:
      - id: cis-4.1
        relationship: subset-of
        confidence: 0.88
        rationale: >
          UKCE sc-3 (Auto-Run and Auto-Play Disabled) is a specific secure
          configuration requirement: disabling automatic execution of media
          content. CIS 4.1 (Establish and Maintain a Secure Configuration
          Process) encompasses all secure configuration activities, of which
          disabling auto-run is a single item within the broader hardening
          baseline. SC-3 is entirely contained within the scope of CIS 4.1.
      - id: cis-2.1
        relationship: complements
        confidence: 0.62
        rationale: >
          UKCE sc-3 prevents unauthorized software from executing automatically
          via removable media. CIS 2.1 (Establish and Maintain a Software
          Inventory) tracks authorized software, and auto-run disablement
          prevents bypass of software inventory controls through physical
          media vectors. The relationship is complementary: CIS 2.1 defines
          what is authorized, and sc-3 blocks an automatic execution path
          for unauthorized code.

  # ── uac (User Access Control) ──────────────────────────────────────

  - source_control: uac-1
    target_controls:
      - id: cis-6.1
        relationship: implements
        confidence: 0.90
        rationale: >
          UKCE uac-1 (User Account Management and Principle of Least Privilege)
          requires named user accounts with minimum necessary access, prohibition
          of software installation by standard users, and timely account removal.
          CIS 6.1 (Establish an Access Granting Process) defines the process for
          granting access based on role and need. UAC-1 implements CIS 6.1's
          requirements specifically through least-privilege enforcement and
          account lifecycle management.
      - id: cis-5.1
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          UKCE uac-1 mandates that accounts are assigned to named individuals,
          removed when no longer needed, and not shared. CIS 5.1 (Establish and
          Maintain an Inventory of Accounts) requires maintaining an account
          inventory with authorization validation on a quarterly basis. Both
          controls address account lifecycle governance, with CIS 5.1 providing
          the inventory visibility and uac-1 defining the operational
          requirements.

  - source_control: uac-2
    target_controls:
      - id: cis-6.1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          UKCE uac-2 (Administrative Account Controls and Separation of Duties)
          requires separate admin accounts for administrative activities, with
          admin accounts prohibited from email and web browsing. CIS 6.1
          (Establish an Access Granting Process) defines the access granting
          process including role separation. Both controls address privilege
          management, though uac-2 provides specific operational requirements
          for admin account usage that go beyond CIS 6.1's process-level scope.
      - id: cis-5.1
        relationship: complements
        confidence: 0.78
        rationale: >
          UKCE uac-2 requires minimizing the number of administrative accounts
          and ensuring each has unique, non-shared credentials. CIS 5.1
          (Establish and Maintain an Inventory of Accounts) tracks all accounts
          including administrator accounts with their authorization status.
          The account inventory enables auditing administrative account
          counts and ownership as uac-2 requires.
      - id: cis-8.1
        relationship: complements
        confidence: 0.72
        rationale: >
          UKCE uac-2 mandates logging and monitoring all administrative account
          activity with enhanced scrutiny. CIS 8.1 (Establish and Maintain an
          Audit Log Management Process) provides the audit logging framework
          needed to capture, store, and analyze administrative actions. The
          administrative activity monitoring uac-2 requires depends on CIS
          8.1's logging infrastructure.

  - source_control: uac-3
    target_controls:
      - id: cis-6.1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          UKCE uac-3 (Multi-Factor Authentication for User and Administrative
          Access) mandates MFA for admin accounts, cloud services, and
          internet-facing services. CIS 6.1 (Establish an Access Granting
          Process) establishes the access management process that determines
          authentication requirements. MFA enforcement is a critical
          authentication control within the access granting process. Both
          controls address how strongly users must authenticate, though
          uac-3 provides specific MFA mandates while CIS 6.1 is broader.
      - id: cis-4.1
        relationship: complements
        confidence: 0.72
        rationale: >
          UKCE uac-3 requires configuring systems to enforce MFA and disable
          legacy authentication protocols that do not support it. CIS 4.1
          (Establish and Maintain a Secure Configuration Process) encompasses
          the secure configuration of authentication systems including MFA
          and legacy protocol settings. MFA configuration is a specific
          aspect of the broader secure configuration process.
      - id: cis-5.1
        relationship: complements
        confidence: 0.70
        rationale: >
          UKCE uac-3 requires tracking MFA enrollment rates and identifying
          accounts without MFA. CIS 5.1 (Establish and Maintain an Inventory
          of Accounts) provides the account inventory against which MFA
          enrollment can be measured. Without comprehensive account inventory,
          MFA coverage gaps cannot be identified.
