id: nist-800-161_to_nist-800-53
title: "NIST SP 800-161 Rev 1 to NIST SP 800-53 Rev 5 Control Mapping"
source_framework: nist-800-161
target_framework: nist-800-53-rev5
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic
description: >
  Control-to-control mapping between NIST SP 800-161 Rev 1 (Cybersecurity Supply Chain
  Risk Management Practices for Systems and Organizations) and NIST SP 800-53 Rev 5
  (Security and Privacy Controls for Information Systems and Organizations). NIST 800-161
  provides C-SCRM-specific guidance and controls that extend, specialize, and derive from
  the broader security control catalog in NIST 800-53. The SR (Supply Chain Risk Management)
  family in 800-53 serves as the primary mapping target, with additional mappings to RA
  (Risk Assessment), SA (System and Services Acquisition), PM (Program Management), IR
  (Incident Response), SI (System and Information Integrity), AU (Audit and Accountability),
  CA (Security Assessment and Authorization), PS (Personnel Security), and AT (Awareness
  and Training) families.

mappings:
  # ═══════════════════════════════════════════════════════════════════════════
  # SR — Supply Chain Risk Management Family
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: sr-1
    target_controls:
      - id: SR-1
        relationship: derived-from
        confidence: 0.95
        rationale: >
          NIST 800-161 sr-1 (C-SCRM Policy and Plan) is directly derived from NIST
          800-53 SR-1 (Supply Chain Risk Management Policy and Procedures). Both controls
          require developing, documenting, and disseminating a supply chain risk management
          policy addressing purpose, scope, roles, responsibilities, and compliance, plus
          a plan describing controls in place or planned. The 800-161 control adds C-SCRM-
          specific depth including three organizational levels and integration with the
          enterprise risk management framework.
      - id: PM-30
        relationship: complements
        confidence: 0.82
        rationale: >
          The C-SCRM policy and plan in sr-1 complements PM-30 (Supply Chain Risk
          Management Strategy) by operationalizing the strategic direction PM-30
          establishes. SR-1 focuses on policy and plan documentation while PM-30
          addresses the overarching organizational strategy for C-SCRM.
      - id: SR-3
        relationship: implements
        confidence: 0.78
        rationale: >
          The C-SCRM policy and plan provides the governance foundation that SR-3
          (Supply Chain Controls and Processes) implements at the operational level.
          SR-1 defines what controls are required; SR-3 establishes the processes
          to identify weaknesses and employ those controls.
      - id: AC-1
        relationship: intersects-with
        confidence: 0.72
        rationale: >
          Both sr-1 and AC-1 address policy development, documentation, dissemination,
          and review cycles. The C-SCRM policy may include access control requirements
          for supply chain management systems, creating an intersection in scope and
          governance methodology.

  - source_control: sr-2
    target_controls:
      - id: SR-2
        relationship: derived-from
        confidence: 0.95
        rationale: >
          NIST 800-161 sr-2 (Supply Chain Risk Assessment) is directly derived from
          NIST 800-53 SR-2 (Supply Chain Risk Management Plan). Both address assessing
          supply chain risks associated with systems, components, and services. The
          800-161 control provides deeper guidance on assessment methodology including
          counterfeits, unauthorized modifications, malicious code insertion, and
          poor development practices.
      - id: RA-3
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          Supply chain risk assessment in sr-2 maps directly to RA-3 (Risk Assessment),
          which requires conducting risk assessments that identify threats, vulnerabilities,
          and potential impact. sr-2 specializes RA-3 for the supply chain context,
          requiring assessment of risks specific to acquisition, development, maintenance,
          and disposal through the supply chain.
      - id: RA-5
        relationship: complements
        confidence: 0.75
        rationale: >
          sr-2 complements RA-5 (Vulnerability Monitoring and Scanning) by extending
          vulnerability assessment to the supply chain domain. While RA-5 focuses on
          scanning deployed systems, sr-2 assesses risks in the upstream supply chain
          including supplier development practices and component provenance.

  # ═══════════════════════════════════════════════════════════════════════════
  # SA — System and Services Acquisition Family
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: sa-1
    target_controls:
      - id: SA-4
        relationship: derived-from
        confidence: 0.92
        rationale: >
          NIST 800-161 sa-1 (Acquisition Process Security) is derived from NIST 800-53
          SA-4 (Acquisition Process), which requires including security and privacy
          requirements in acquisition contracts. sa-1 specializes SA-4 for supply chain
          risk by requiring C-SCRM criteria in solicitations, contracts, and SLAs, and
          mandating supplier evidence of compliance including security certifications
          and SBOM delivery.
      - id: SA-9
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          sa-1 maps to SA-9 (External System Services) as both address security
          requirements for externally provided services and components. SA-9 requires
          organizations to define and document security controls for external services,
          which aligns with sa-1's requirement to include C-SCRM requirements in
          service-level agreements.
      - id: SA-12
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          sa-1 maps to SA-12 (Supply Chain Protection) which requires protecting
          against supply chain threats as part of a comprehensive defense-in-breadth
          strategy. sa-1 addresses the acquisition phase of this protection by
          embedding C-SCRM requirements into the procurement process.
      - id: SR-3
        relationship: implements
        confidence: 0.78
        rationale: >
          sa-1 supports SR-3 (Supply Chain Controls and Processes) by ensuring
          that supply chain controls are embedded into the acquisition process.
          The acquisition requirements in sa-1 operationalize the controls and
          processes that SR-3 mandates for supply chain protection.

  - source_control: sa-2
    target_controls:
      - id: SR-6
        relationship: derived-from
        confidence: 0.92
        rationale: >
          NIST 800-161 sa-2 (Supplier Assessments and Monitoring) is derived from
          NIST 800-53 SR-6 (Supplier Assessments and Reviews), which requires
          assessing suppliers of critical system components and services. sa-2
          extends SR-6 by adding continuous monitoring of supplier security posture,
          establishing trustworthiness criteria, and requiring ongoing risk-based
          reassessments throughout the supplier lifecycle.
      - id: SA-9
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          sa-2 maps to SA-9 (External System Services) as supplier assessments
          are essential for evaluating external service providers. SA-9 requires
          organizations to ensure external services comply with organizational
          security requirements, and sa-2 provides the assessment methodology
          to verify that compliance.
      - id: RA-3
        relationship: complements
        confidence: 0.76
        rationale: >
          Supplier assessments and monitoring in sa-2 complement the general risk
          assessment process in RA-3 by providing supplier-specific risk data that
          feeds into the organizational risk assessment. The supplier security posture
          information generated by sa-2 assessments directly informs RA-3 risk
          determinations.

  # ═══════════════════════════════════════════════════════════════════════════
  # RA — Risk Assessment Family
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: ra-1
    target_controls:
      - id: RA-3
        relationship: derived-from
        confidence: 0.90
        rationale: >
          NIST 800-161 ra-1 (Supply Chain Threat Analysis) is derived from NIST
          800-53 RA-3 (Risk Assessment). Both require identifying threats and
          vulnerabilities that could affect organizational operations. ra-1
          specializes RA-3 for supply chain threats including nation-state actors,
          counterfeits, malicious code insertion, and insider threats within
          supply chain entities.
      - id: RA-5
        relationship: intersects-with
        confidence: 0.84
        rationale: >
          ra-1 maps to RA-5 (Vulnerability Monitoring and Scanning) as supply
          chain threat analysis includes identifying vulnerabilities in supplied
          components. While RA-5 focuses on system-level vulnerability scanning,
          ra-1 extends the scope to analyze vulnerabilities introduced through the
          supply chain including compromised upstream projects and development
          practices.
      - id: SR-2
        relationship: implements
        confidence: 0.80
        rationale: >
          Supply chain threat analysis in ra-1 supports SR-2 (Supply Chain Risk
          Management Plan) by providing the threat intelligence and analysis that
          informs the C-SCRM plan. The threat sources, events, and vulnerabilities
          identified by ra-1 are essential inputs to the risk management planning
          process SR-2 requires.

  - source_control: ra-2
    target_controls:
      - id: RA-9
        relationship: derived-from
        confidence: 0.92
        rationale: >
          NIST 800-161 ra-2 (Criticality Analysis of Supply Chain Components) is
          directly derived from NIST 800-53 RA-9 (Criticality Analysis). Both
          require identifying and prioritizing critical systems and components.
          ra-2 specializes RA-9 for the supply chain context by requiring
          criticality-based tiering of supply chain protections, with critical
          components receiving enhanced controls such as dual-sourcing and
          provenance verification.
      - id: PM-11
        relationship: complements
        confidence: 0.78
        rationale: >
          ra-2 complements PM-11 (Mission and Business Process Definition) by
          ensuring that criticality analysis considers supply chain dependencies
          essential to organizational mission functions. PM-11 defines mission
          processes, and ra-2 identifies which supply chain components are
          critical to those processes.
      - id: SA-4
        relationship: implements
        confidence: 0.74
        rationale: >
          Criticality analysis results from ra-2 support SA-4 (Acquisition Process)
          by determining which acquired components require enhanced security
          requirements in contracts. Higher-criticality components justify more
          rigorous acquisition security requirements and supplier vetting.

  # ═══════════════════════════════════════════════════════════════════════════
  # PM — Program Management Family
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: pm-1
    target_controls:
      - id: PM-30
        relationship: derived-from
        confidence: 0.93
        rationale: >
          NIST 800-161 pm-1 (C-SCRM Strategy and Implementation Plan) is derived from
          NIST 800-53 PM-30 (Supply Chain Risk Management Strategy). Both require
          developing an enterprise-level strategy for managing supply chain risks.
          pm-1 extends PM-30 by specifying governance structures across the three
          organizational levels (enterprise, mission/business process, operational)
          defined in NIST 800-161 and requiring explicit resource allocation.
      - id: PM-31
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          pm-1 maps to PM-31 (Supply Chain Risk Management Plan) which requires
          organizations to develop a plan for managing supply chain risks. pm-1
          encompasses both the strategic direction and the implementation plan,
          directly aligning with PM-31's requirement for a documented plan that
          addresses supply chain risk management activities.
      - id: PM-9
        relationship: complements
        confidence: 0.76
        rationale: >
          The C-SCRM strategy in pm-1 complements PM-9 (Risk Management Strategy) by
          extending the organizational risk management strategy to explicitly address
          supply chain risks. PM-9 provides the enterprise risk framework into which
          pm-1's C-SCRM strategy integrates.

  - source_control: pm-2
    target_controls:
      - id: PM-15
        relationship: derived-from
        confidence: 0.90
        rationale: >
          NIST 800-161 pm-2 (Supply Chain Information Sharing) is derived from NIST
          800-53 PM-15 (Security and Privacy Groups and Associations), which requires
          establishing contact with security groups and associations. pm-2 specializes
          PM-15 for supply chain threat intelligence sharing with supply chain partners,
          ISACs, and government agencies including the use of automated sharing
          mechanisms like STIX/TAXII.
      - id: PM-16
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          pm-2 maps to PM-16 (Threat Awareness Program) which requires implementing
          a threat awareness program that includes sharing threat information. pm-2
          focuses specifically on supply chain threat information sharing and
          incorporating received intelligence into C-SCRM decision-making, which
          is a specialized application of PM-16's threat awareness objectives.
      - id: SI-5
        relationship: complements
        confidence: 0.73
        rationale: >
          pm-2 complements SI-5 (Security Alerts, Advisories, and Directives) by
          establishing bidirectional channels for supply chain security advisories.
          While SI-5 addresses receiving and acting on security alerts, pm-2 extends
          this to proactive sharing of supply chain-specific threat intelligence
          with partners and communities.

  # ═══════════════════════════════════════════════════════════════════════════
  # IR — Incident Response Family
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: ir-1
    target_controls:
      - id: IR-4
        relationship: derived-from
        confidence: 0.92
        rationale: >
          NIST 800-161 ir-1 (Supply Chain Incident Response) is derived from NIST
          800-53 IR-4 (Incident Handling). Both require implementing incident handling
          capabilities covering preparation, detection, analysis, containment,
          eradication, and recovery. ir-1 specializes IR-4 for supply chain incidents
          including compromised dependencies, counterfeit components, and malicious
          upstream modifications, adding requirements for coordination with supply
          chain partners.
      - id: IR-6
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ir-1 maps to IR-6 (Incident Reporting) as supply chain incident response
          includes coordination and communication procedures with supply chain
          partners. ir-1 requires establishing notification timelines and escalation
          paths with critical suppliers, which directly implements the reporting
          aspects of IR-6 in the supply chain context.
      - id: IR-8
        relationship: implements
        confidence: 0.78
        rationale: >
          ir-1 supports IR-8 (Incident Response Plan) by providing supply chain-
          specific scenarios and coordination procedures that should be incorporated
          into the organizational incident response plan. ir-1 explicitly requires
          inclusion of supply chain scenarios in the IR plan, which IR-8 mandates
          as a documented artifact.
      - id: SR-3
        relationship: complements
        confidence: 0.74
        rationale: >
          Supply chain incident response in ir-1 complements SR-3 (Supply Chain
          Controls and Processes) by providing the response capability when supply
          chain controls fail or are circumvented. SR-3 focuses on preventive
          controls; ir-1 provides the detection and response layer.

  - source_control: ir-2
    target_controls:
      - id: IR-6
        relationship: derived-from
        confidence: 0.93
        rationale: >
          NIST 800-161 ir-2 (Supply Chain Incident Reporting and Notification) is
          directly derived from NIST 800-53 IR-6 (Incident Reporting). Both require
          establishing procedures for reporting security incidents to appropriate
          stakeholders. ir-2 specializes IR-6 for supply chain incidents by adding
          contractual notification requirements with suppliers, internal escalation
          procedures for supply chain events, and external reporting to government
          agencies and ISACs.
      - id: IR-7
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          ir-2 maps to IR-7 (Incident Response Assistance) as supply chain incident
          notification procedures enable assistance coordination. IR-7 requires
          providing incident response support resources, and ir-2 ensures that
          supply chain incidents trigger the appropriate notification chains to
          activate those resources.
      - id: IR-4
        relationship: implements
        confidence: 0.80
        rationale: >
          Supply chain incident reporting in ir-2 supports IR-4 (Incident Handling)
          by ensuring that supply chain incidents are properly reported and escalated
          within the broader incident handling process. Timely reporting is essential
          for effective containment and eradication activities that IR-4 requires.

  # ═══════════════════════════════════════════════════════════════════════════
  # SI — System and Information Integrity Family
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: si-1
    target_controls:
      - id: SI-7
        relationship: derived-from
        confidence: 0.93
        rationale: >
          NIST 800-161 si-1 (Software Supply Chain Integrity Verification) is
          derived from NIST 800-53 SI-7 (Software, Firmware, and Information
          Integrity). Both require employing integrity verification mechanisms
          to detect unauthorized changes to software and firmware. si-1 specializes
          SI-7 for the supply chain context by requiring verification at each stage
          of the supply chain (acquisition, storage, integration, deployment) using
          digital signatures, cryptographic hashes, and SLSA provenance attestations.
      - id: SR-4
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          si-1 maps to SR-4 (Provenance) which requires documenting, monitoring,
          and maintaining valid provenance of systems, components, and associated
          data. si-1's requirement for provenance attestations and chain of custody
          verification directly implements the provenance objectives of SR-4 at
          the software integrity level.
      - id: SR-11
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          si-1 maps to SR-11 (Component Authenticity) which requires developing
          and implementing anti-counterfeit policies and procedures. si-1's
          integrity verification mechanisms (digital signatures, cryptographic
          hashes) serve as technical controls to verify component authenticity
          and detect unauthorized modifications or counterfeits in software
          supply chains.
      - id: CM-6
        relationship: complements
        confidence: 0.72
        rationale: >
          si-1 complements CM-6 (Configuration Settings) as integrity verification
          of supply chain components ensures that deployed software matches approved
          secure configurations. Signed artifacts and verified provenance provide
          assurance that configuration baselines have not been tampered with
          during the supply chain transit.

  - source_control: si-2
    target_controls:
      - id: SR-4
        relationship: derived-from
        confidence: 0.90
        rationale: >
          NIST 800-161 si-2 (SBOM Management) is derived from NIST 800-53 SR-4
          (Provenance). SBOMs are a primary mechanism for documenting software
          provenance — the origin, history, and composition of software components.
          si-2's requirement to generate, maintain, and analyze SBOMs directly
          implements SR-4's mandate to maintain valid provenance records for
          systems and components.
      - id: CM-8
        relationship: intersects-with
        confidence: 0.87
        rationale: >
          si-2 maps to CM-8 (System Component Inventory) as SBOMs provide a
          granular, machine-readable inventory of all software components and
          dependencies. CM-8 requires establishing and maintaining a system
          component inventory; SBOMs fulfill this requirement at the software
          level with additional metadata including versions, licenses, and
          dependency relationships.
      - id: RA-5
        relationship: implements
        confidence: 0.78
        rationale: >
          SBOM management in si-2 supports RA-5 (Vulnerability Monitoring and
          Scanning) by enabling automated correlation of software components
          against vulnerability databases (NVD, OSV.dev). SBOMs allow rapid
          identification of exposure to newly disclosed vulnerabilities across
          the entire software portfolio.
      - id: SI-7
        relationship: complements
        confidence: 0.76
        rationale: >
          si-2 complements SI-7 (Software, Firmware, and Information Integrity)
          by providing the detailed component information needed to verify integrity.
          SBOMs document exactly what components should be present, enabling
          integrity verification mechanisms in SI-7 to detect unauthorized
          additions or modifications.

  # ═══════════════════════════════════════════════════════════════════════════
  # AU — Audit and Accountability Family
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: au-1
    target_controls:
      - id: AU-3
        relationship: derived-from
        confidence: 0.90
        rationale: >
          NIST 800-161 au-1 (Supply Chain Audit and Traceability) is derived from
          NIST 800-53 AU-3 (Content of Audit Records). Both address the content
          and completeness of audit records. au-1 specializes AU-3 for supply
          chain activities by requiring audit trails for component acquisition,
          version changes, configuration modifications, and supply chain management
          system access, with traceability from source to deployment.
      - id: AU-12
        relationship: intersects-with
        confidence: 0.87
        rationale: >
          au-1 maps to AU-12 (Audit Record Generation) which requires systems
          to generate audit records for defined events. au-1 extends AU-12's
          scope to supply chain-specific events including component acquisition
          records, provenance attestations, and transparency log entries that
          document the complete supply chain lineage.
      - id: SR-4
        relationship: implements
        confidence: 0.82
        rationale: >
          Supply chain audit and traceability in au-1 supports SR-4 (Provenance)
          by providing the audit infrastructure necessary to maintain and verify
          provenance records. Transparency logs (Sigstore Rekor) and build
          attestations (SLSA, in-toto) create immutable audit trails that
          document component provenance.
      - id: AU-6
        relationship: complements
        confidence: 0.76
        rationale: >
          au-1 complements AU-6 (Audit Record Review, Analysis, and Reporting)
          by generating the supply chain audit records that AU-6's review and
          analysis processes examine. au-1 explicitly requires reviewing supply
          chain audit records for indicators of compromise and anomalous
          activities.

  - source_control: au-2
    target_controls:
      - id: SI-4
        relationship: derived-from
        confidence: 0.90
        rationale: >
          NIST 800-161 au-2 (Supply Chain Activity Monitoring) is derived from
          NIST 800-53 SI-4 (System Monitoring). Both require continuous monitoring
          to detect attacks, anomalies, and unauthorized activities. au-2
          specializes SI-4 for supply chain monitoring including dependency
          updates, upstream project changes, supplier security events, and
          behavioral analysis of package changes.
      - id: RA-5
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          au-2 maps to RA-5 (Vulnerability Monitoring and Scanning) as continuous
          supply chain monitoring includes detecting new vulnerabilities in
          dependencies and upstream projects. au-2 extends RA-5's monitoring
          scope to include behavioral anomalies such as unexpected maintainer
          changes, code obfuscation, and dependency confusion attacks.
      - id: AU-6
        relationship: complements
        confidence: 0.78
        rationale: >
          au-2 complements AU-6 (Audit Record Review, Analysis, and Reporting)
          by providing supply chain monitoring data for analysis. au-2's
          anomaly detection and threat intelligence correlation feed into
          the audit review processes that AU-6 mandates, enabling identification
          of supply chain attack patterns.
      - id: SR-3
        relationship: implements
        confidence: 0.75
        rationale: >
          Supply chain activity monitoring in au-2 supports SR-3 (Supply Chain
          Controls and Processes) by providing the detection layer that identifies
          weaknesses and deficiencies in supply chain elements. au-2's continuous
          monitoring enables the ongoing assessment that SR-3 requires to protect
          against supply chain risks.

  # ═══════════════════════════════════════════════════════════════════════════
  # PE — Provenance and Evidence Family
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: pe-1
    target_controls:
      - id: SR-4
        relationship: derived-from
        confidence: 0.95
        rationale: >
          NIST 800-161 pe-1 (Provenance Tracking) is directly derived from NIST
          800-53 SR-4 (Provenance). Both require establishing and maintaining
          provenance records to document the origin, custody, and modification
          history of components. pe-1 provides detailed implementation guidance
          including SLSA provenance levels, in-toto attestation frameworks,
          and Sigstore transparency logs that operationalize SR-4's requirements.
      - id: SR-4(1)
        relationship: derived-from
        confidence: 0.93
        rationale: >
          pe-1 is also derived from SR-4(1) (Provenance — Identity) which
          requires establishing provenance of system components through identity
          verification. pe-1's requirement for cryptographic provenance
          attestations that record builder identity, source repository, and
          commit hash directly implements the identity provenance enhancement.
      - id: SI-7
        relationship: implements
        confidence: 0.82
        rationale: >
          Provenance tracking in pe-1 supports SI-7 (Software, Firmware, and
          Information Integrity) by providing the provenance records against
          which integrity can be verified. Provenance attestations document
          the expected origin and build process, enabling SI-7 integrity
          checks to detect deviations.
      - id: AU-3
        relationship: complements
        confidence: 0.75
        rationale: >
          pe-1 complements AU-3 (Content of Audit Records) by defining
          provenance-specific audit content including build attestations,
          transparency log entries, and chain-of-custody records. These
          provenance records extend the audit information AU-3 requires
          with supply chain-specific metadata.

  - source_control: pe-2
    target_controls:
      - id: AU-9
        relationship: derived-from
        confidence: 0.90
        rationale: >
          NIST 800-161 pe-2 (Supply Chain Evidence Collection and Preservation)
          is derived from NIST 800-53 AU-9 (Protection of Audit Information).
          Both address protecting the integrity of audit and evidence records.
          pe-2 specializes AU-9 for supply chain evidence by requiring tamper-
          evident storage, appropriate access controls, and retention periods
          for supply chain compliance artifacts including assessment reports,
          SBOMs, provenance attestations, and signing records.
      - id: AU-11
        relationship: intersects-with
        confidence: 0.87
        rationale: >
          pe-2 maps to AU-11 (Audit Record Retention) which requires retaining
          audit records for an organization-defined time period. pe-2 extends
          AU-11 to supply chain evidence specifically, requiring retention of
          supplier assessment reports, certification documents, build logs,
          and provenance attestations aligned with regulatory and contractual
          obligations.
      - id: AU-3
        relationship: implements
        confidence: 0.78
        rationale: >
          pe-2 supports AU-3 (Content of Audit Records) by defining what
          supply chain evidence must be collected and preserved. The evidence
          types pe-2 mandates (assessment reports, SBOMs, signing records,
          build logs) represent the supply chain-specific audit content that
          AU-3 should capture for compliance and forensic purposes.
      - id: SR-4
        relationship: complements
        confidence: 0.80
        rationale: >
          pe-2 complements SR-4 (Provenance) by providing the evidence
          collection and preservation infrastructure necessary to maintain
          provenance records over time. While SR-4 requires establishing
          provenance, pe-2 ensures provenance evidence is collected,
          preserved in tamper-evident formats, and available for audit
          and investigation.

  # ═══════════════════════════════════════════════════════════════════════════
  # CA — Security Assessment and Authorization Family
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: ca-1
    target_controls:
      - id: CA-2
        relationship: derived-from
        confidence: 0.92
        rationale: >
          NIST 800-161 ca-1 (Supply Chain Security Assessment) is derived from
          NIST 800-53 CA-2 (Control Assessments). Both require assessing
          security controls to determine if they are implemented correctly
          and operating as intended. ca-1 specializes CA-2 for supply chain
          controls by requiring assessment of C-SCRM controls across the
          organization and its supply chain partners, including supplier
          compliance verification through audits and evidence review.
      - id: CA-7
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ca-1 maps to CA-7 (Continuous Monitoring) which requires developing
          a continuous monitoring strategy for security controls. ca-1's
          requirement for ongoing assessment of supply chain security controls
          and automated compliance verification through CI/CD pipelines
          implements CA-7's continuous monitoring objective in the supply
          chain domain.
      - id: SR-6
        relationship: implements
        confidence: 0.78
        rationale: >
          Supply chain security assessment in ca-1 supports SR-6 (Supplier
          Assessments and Reviews) by providing the assessment methodology
