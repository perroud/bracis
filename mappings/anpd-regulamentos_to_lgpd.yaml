id: anpd-regulamentos_to_lgpd
title: "ANPD Regulations to LGPD Control Mapping"
source_framework: anpd-regulamentos
target_framework: lgpd
version: "1.0.0"
last_updated: "2026-04-04"
methodology: structural
description: >
  Cross-framework mapping between ANPD Regulations (Regulamentos da Autoridade Nacional
  de Protecao de Dados) and the LGPD (Lei Geral de Protecao de Dados — Law 13.709/2018).
  The ANPD regulations operationalize the LGPD enforcement provisions by detailing
  dosimetry methodology, administrative process procedures, incident notification
  requirements, and remediation obligations. This mapping traces each ANPD regulatory
  control to the specific LGPD articles it implements or derives from.

mappings:
  - source_control: art-1
    target_controls:
      - id: art-52
        relationship: derived-from
        confidence: 0.92
        rationale: >
          ANPD art-1 (Scope and Purpose of Enforcement Regulations) establishes the
          regulatory framework for applying LGPD sanctions. It is directly derived from
          LGPD art-52 (Administrative Sanctions), which defines the sanction types and
          delegates their detailed regulation to ANPD.

  - source_control: art-3
    target_controls:
      - id: art-52
        relationship: implements
        confidence: 0.95
        rationale: >
          ANPD art-3 (Relationship with LGPD Sanction Framework) explicitly references
          and implements the LGPD art-52 sanction framework, establishing the binding
          link between ANPD enforcement regulations and the LGPD statutory sanctions.
      - id: art-53
        relationship: implements
        confidence: 0.88
        rationale: >
          ANPD art-3 also implements LGPD art-53 (Administrative Sanction Process
          Regulation), which mandates that ANPD define the process rules for applying
          sanctions, including procedural guarantees and defense mechanisms.

  - source_control: art-5
    target_controls:
      - id: art-52
        relationship: implements
        confidence: 0.95
        rationale: >
          ANPD art-5 (Administrative Sanction Types) details the available sanction
          types directly implementing LGPD art-52, which enumerates sanctions including
          warnings, fines, publicization, data blocking, data deletion, and suspension
          of processing activities.

  - source_control: art-6
    target_controls:
      - id: art-52
        relationship: implements
        confidence: 0.97
        rationale: >
          ANPD art-6 (Dosimetry Calculation Methodology) implements the dosimetry
          criteria enumerated in LGPD art-52, paragraph 1, which lists factors such as
          severity of the violation, good faith, economic condition of the infractor,
          recidivism, degree of harm, and adoption of security mechanisms. The ANPD
          regulation operationalizes these criteria into a structured calculation method.

  - source_control: art-7
    target_controls:
      - id: art-52
        relationship: implements
        confidence: 0.90
        rationale: >
          ANPD art-7 (Aggravating Factors) specifies circumstances that increase
          sanction severity, implementing the LGPD art-52 provision that sanctions
          shall be graded according to the circumstances of the violation, including
          recidivism and intent.

  - source_control: art-8
    target_controls:
      - id: art-52
        relationship: implements
        confidence: 0.90
        rationale: >
          ANPD art-8 (Mitigating Factors) specifies circumstances that reduce sanction
          severity, implementing LGPD art-52 provisions regarding good faith, adoption
          of security policies, prompt correction, and cooperation with the authority.
      - id: art-50
        relationship: complements
        confidence: 0.80
        rationale: >
          ANPD art-8 recognizes adoption of governance and best practices as a
          mitigating factor. This complements LGPD art-50 (Good Practices and
          Governance), which encourages controllers and processors to formulate
          governance programs, as having such programs directly reduces sanction severity.

  - source_control: art-9
    target_controls:
      - id: art-52
        relationship: implements
        confidence: 0.93
        rationale: >
          ANPD art-9 (Fine Calculation Formula) provides the mathematical methodology
          for computing fine amounts, implementing LGPD art-52 which establishes the
          ceiling of 2% of revenue up to BRL 50 million per violation and requires
          proportional application.

  - source_control: art-10
    target_controls:
      - id: art-52
        relationship: implements
        confidence: 0.88
        rationale: >
          ANPD art-10 (Publicization of the Violation) details procedures for public
          disclosure of violations as a sanction, implementing LGPD art-52, item IV,
          which lists publicization as an available administrative sanction.

  - source_control: art-11
    target_controls:
      - id: art-53
        relationship: implements
        confidence: 0.92
        rationale: >
          ANPD art-11 (Investigation Procedures) establishes the investigative process
          for LGPD violations, implementing LGPD art-53 which mandates that ANPD define
          the rules for administrative sanctioning proceedings.

  - source_control: art-12
    target_controls:
      - id: art-53
        relationship: implements
        confidence: 0.93
        rationale: >
          ANPD art-12 (Due Process and Defense Rights) ensures procedural guarantees
          during enforcement actions, implementing LGPD art-53 which requires that the
          sanctioning process respect the right to full defense and adversarial
          proceedings.

  - source_control: art-13
    target_controls:
      - id: art-53
        relationship: implements
        confidence: 0.88
        rationale: >
          ANPD art-13 (Appeals and Administrative Review) establishes the appeal
          mechanisms within the sanctioning process, implementing LGPD art-53 which
          requires ANPD to define procedural rules including review mechanisms.
      - id: art-54
        relationship: complements
        confidence: 0.82
        rationale: >
          ANPD art-13 also complements LGPD art-54 (Suspension and Prohibition of
          Processing), as appeals may challenge sanctions of data processing suspension
          or prohibition, which are the most severe measures available under LGPD.

  - source_control: art-15
    target_controls:
      - id: art-53
        relationship: implements
        confidence: 0.85
        rationale: >
          ANPD art-15 (Compliance Commitment Agreement) establishes the framework for
          negotiated compliance commitments, implementing LGPD art-53 provisions for
          alternative resolution of enforcement proceedings through cooperation between
          the authority and the controller.

  - source_control: art-16
    target_controls:
      - id: art-48
        relationship: implements
        confidence: 0.97
        rationale: >
          ANPD art-16 (Notification Deadline and Obligation) establishes the 3-business-day
          notification deadline for security incidents, directly implementing LGPD art-48
          (Security Incident Communication), which mandates that controllers notify ANPD
          and affected data subjects about incidents that may cause relevant risk or harm.

  - source_control: art-17
    target_controls:
      - id: art-48
        relationship: implements
        confidence: 0.95
        rationale: >
          ANPD art-17 (Notification Content Requirements) specifies the mandatory
          content for incident notifications, implementing LGPD art-48, paragraph 1,
          which requires a minimum set of information including nature of affected data,
          data subjects involved, technical measures adopted, and risks to data subjects.

  - source_control: art-18
    target_controls:
      - id: art-48
        relationship: implements
        confidence: 0.93
        rationale: >
          ANPD art-18 (Notification to Data Subjects) details procedures for notifying
          affected individuals about security incidents, implementing LGPD art-48 which
          requires communication to data subjects when incidents may cause relevant risk
          or harm.
      - id: art-18
        relationship: complements
        confidence: 0.80
        rationale: >
          ANPD art-18 also complements LGPD art-18 (Data Subject Rights) by operationalizing
          the right of data subjects to be informed about incidents affecting their personal
          data, thereby supporting the exercise of their rights under the LGPD.

  - source_control: art-19
    target_controls:
      - id: art-48
        relationship: implements
        confidence: 0.88
        rationale: >
          ANPD art-19 (Risk Assessment Criteria for Notification) defines the criteria
          for determining whether an incident triggers the notification obligation,
          implementing the LGPD art-48 threshold of "relevant risk or harm to data
          subjects" by providing concrete assessment parameters.

  - source_control: art-22
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.90
        rationale: >
          ANPD art-22 (Remediation Measures) requires controllers to adopt containment,
          eradication, recovery, and prevention measures following a security incident.
          This implements LGPD art-46 (Security Measures), which mandates technical and
          administrative measures to protect personal data from unauthorized access,
          destruction, loss, or alteration.
      - id: art-49
        relationship: complements
        confidence: 0.78
        rationale: >
          ANPD art-22 remediation requirements complement LGPD art-49 (Structuring of
          Processing Systems), which requires systems to be structured to meet security
          requirements and best practices. Post-incident remediation serves to restore
          and improve these system-level protections.

  - source_control: art-21
    target_controls:
      - id: art-37
        relationship: implements
        confidence: 0.88
        rationale: >
          ANPD art-21 (Incident Record-Keeping) requires controllers to maintain
          detailed records of security incidents. This implements LGPD art-37 (Record
          of Processing Operations), which mandates that controllers and processors
          maintain records of their data processing activities, with incident records
          being a critical component of this obligation.

  - source_control: art-25
    target_controls:
      - id: art-50
        relationship: implements
        confidence: 0.85
        rationale: >
          ANPD art-25 (Post-Incident Review) requires controllers to conduct lessons-
          learned reviews and update security measures after incidents. This implements
          LGPD art-50 (Good Practices and Governance), which directs controllers to
          establish governance programs that include periodic review and continuous
          improvement of security and privacy practices.
