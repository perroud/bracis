id: cmn-4606_to_cmn-4557
title: "CMN 4.606 to CMN 4.557 Control Mapping"
source_framework: cmn-4606
target_framework: cmn-4557
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic
description: >
  Mapping between Resolucao CMN 4.606/2017 (compliance policy for financial
  institutions) and Resolucao CMN 4.557/2017 (integrated risk management and
  capital adequacy). Both resolutions apply to BCB-regulated institutions and
  share the same proportionality principle. CMN 4.606 establishes the compliance
  function as an oversight mechanism that monitors adherence to all regulatory
  obligations — including those imposed by CMN 4.557 itself. The compliance
  function (second line of defense) complements the risk management structure
  (also second line), while both are distinct from internal audit (third line).

mappings:
  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: complements
        confidence: 0.95
        rationale: >
          Both articles define scope and applicability to BCB-regulated financial
          institutions. CMN 4.606 art-1 establishes the compliance policy obligation;
          CMN 4.557 art-1 establishes the risk management and capital management
          structures. Both apply the proportionality principle (nature, size,
          complexity, risk profile, business model). The compliance policy (4.606)
          complements the risk management structure (4.557) as parallel governance
          requirements.
      - id: art-30
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CMN 4.606 art-1 §1 requires the compliance policy to be proportional to
          the institution's nature, size, complexity and risk profile. CMN 4.557
          art-30 formalizes the proportionality principle across all risk management
          requirements using the prudential segmentation (S1-S5). Both share the
          same calibration logic.

  - source_control: art-2
    target_controls:
      - id: art-2
        relationship: complements
        confidence: 0.85
        rationale: >
          CMN 4.606 art-2 defines compliance policy, compliance function and
          compliance officer (CCO). CMN 4.557 art-2 defines risk as events that may
          negatively affect financial results, listing credit, market, operational
          and liquidity risks. The compliance function monitors adherence to
          regulatory obligations including those related to these risk categories.
      - id: art-17
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CMN 4.606 art-2 defines the compliance function. CMN 4.557 art-17
          addresses legal and compliance risk as a subcategory of operational risk.
          The compliance function defined in 4.606 is the mechanism that manages
          the compliance risk described in 4.557 art-17.

  - source_control: art-3
    target_controls:
      - id: art-4
        relationship: complements
        confidence: 0.90
        rationale: >
          CMN 4.606 art-3 defines the minimum requirements for the compliance
          policy (objectives, management commitment, scope, responsibilities, risk
          management cycle, disciplinary measures, whistleblowing channel). CMN
          4.557 art-4 defines the risk management policy (documented strategies,
          exposure limits, mechanisms for adherence). Both establish policy-level
          governance frameworks that operate in parallel.
      - id: art-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CMN 4.606 art-3 inciso V requires the compliance policy to address
          identification, assessment, monitoring, testing and communication of
          compliance risks. CMN 4.557 art-5 requires a formal Risk Appetite
          Statement (RAS). The compliance risk assessment feeds into and is
          constrained by the RAS boundaries.

  - source_control: art-4
    target_controls:
      - id: art-15
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CMN 4.606 art-4 requires a code of conduct and conflict-of-interest
          management as part of the compliance policy. CMN 4.557 art-15 addresses
          operational risk management, which includes risks arising from inadequate
          internal processes, people and systems. Conflicts of interest and
          behavioral misconduct are people-related operational risk events.
      - id: art-26
        relationship: complements
        confidence: 0.80
        rationale: >
          CMN 4.606 art-4 requires conflict-of-interest management between the
          institution and its clients, and between administrators and the
          institution. CMN 4.557 art-26 defines the board's responsibilities
          including approving risk policies and overseeing risk governance. The
          board's oversight role must encompass the conflict-of-interest framework.

  - source_control: art-5
    target_controls:
      - id: art-26
        relationship: complements
        confidence: 0.90
        rationale: >
          CMN 4.606 art-5 requires the compliance policy to be approved by the
          board and reviewed annually or upon material changes. CMN 4.557 art-26
          assigns the board responsibility for approving risk management policies,
          the RAS, and the capital plan. Both establish the board as the ultimate
          governance authority over second-line-of-defense policies.

  - source_control: art-6
    target_controls:
      - id: art-29
        relationship: complements
        confidence: 0.85
        rationale: >
          CMN 4.606 art-6 requires the compliance policy to be broadly disclosed
          internally and published on the institution's website. CMN 4.557 art-29
          requires public disclosure of risk management information (Pillar 3
          transparency). Both impose transparency and disclosure obligations,
          though with different scopes — compliance policy for 4.606 and risk
          management information for 4.557.

  - source_control: art-7
    target_controls:
      - id: art-1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CMN 4.606 art-7 extends the compliance policy to conglomerate entities,
          subsidiaries with relevant equity stakes (>20%) and material service
          providers. CMN 4.557 art-1 establishes that risk management structures
          apply to all BCB-regulated institutions including conglomerates. Both
          address consolidated governance across corporate groups.
      - id: art-3
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CMN 4.606 art-7 extends compliance coverage to conglomerates and third
          parties. CMN 4.557 art-3 requires an integrated view of risks across all
          exposures. Compliance risk from third parties and subsidiaries must be
          included in the integrated risk view.

  - source_control: art-8
    target_controls:
      - id: art-27
        relationship: complements
        confidence: 0.90
        rationale: >
          CMN 4.606 art-8 requires the compliance function to be independent from
          business units, operations subject to compliance risk, and internal audit.
          CMN 4.557 art-27 requires the CRO to have functional independence from
          business areas. Both establish the independence principle for second-line
          functions: CCO for compliance (4.606), CRO for risk management (4.557).
          The structural requirements are parallel.
      - id: art-28
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CMN 4.606 art-8 §2 grants the compliance function unrestricted access to
          all areas, records, data, systems and information. CMN 4.557 art-28
          establishes the risk committee linked to the board. The compliance
          function's unrestricted access extends to risk committee proceedings and
          risk management data.

  - source_control: art-9
    target_controls:
      - id: art-3
        relationship: complements
        confidence: 0.85
        rationale: >
          CMN 4.606 art-9 defines the compliance function's duties: identify,
          assess, monitor, test and report compliance risks; assess regulatory
          change impact; train staff; advise on new products; prepare semiannual
          reports; maintain records. CMN 4.557 art-3 requires integrated risk
          identification, measurement, assessment, monitoring, reporting, control
          and mitigation. The compliance function's risk cycle mirrors the risk
          management cycle but focuses on compliance risk.
      - id: art-7
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CMN 4.606 art-9 inciso I requires systems and procedures to identify,
          assess, monitor, test and report compliance risks. CMN 4.557 art-7
          requires risk information systems that are compatible with the
          institution's nature and complexity. Compliance risk systems are a subset
          of the broader risk information infrastructure.
      - id: art-17
        relationship: implements
        confidence: 0.85
        rationale: >
          CMN 4.606 art-9 defines the operational duties of the compliance function
          including compliance risk management. CMN 4.557 art-17 requires management
          of legal and compliance risk within the operational risk framework. The
          compliance function under 4.606 is the mechanism that implements the
          compliance risk management required by 4.557 art-17.

  - source_control: art-10
    target_controls:
      - id: art-27
        relationship: complements
        confidence: 0.80
        rationale: >
          CMN 4.606 art-10 allows outsourcing of the compliance function under
          strict conditions (retained responsibility, technical competence, no
          conflicts, BCB access, documentation). CMN 4.557 art-27 addresses the CRO
          designation and independence. Both regulate how second-line functions
          (compliance and risk) are structured, with 4.606 explicitly addressing
          outsourcing scenarios not covered for the CRO role in 4.557.

  - source_control: art-11
    target_controls:
      - id: art-27
        relationship: complements
        confidence: 0.85
        rationale: >
          CMN 4.606 art-11 requires the compliance function to report directly to
          the CCO with timely reporting and immediate escalation of material
          compliance risks. CMN 4.557 art-27 requires the CRO to report to the
          board and maintain independence. Both establish direct reporting lines
          from second-line functions to senior governance, ensuring that neither
          compliance nor risk management is filtered through business management.
      - id: art-26
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CMN 4.606 art-11 §2 requires immediate escalation of material compliance
          risks to the CCO and, when necessary, to the board. CMN 4.557 art-26
          assigns the board responsibility for overseeing risk management. Material
          compliance risks that reach the board intersect with the board's risk
          oversight duties under 4.557.

  - source_control: art-12
    target_controls:
      - id: art-27
        relationship: complements
        confidence: 0.95
        rationale: >
          CMN 4.606 art-12 mandates designation of a statutory CCO with
          incompatibility rules (cannot hold business, operations or internal audit
          roles) and BCB notification. CMN 4.557 art-27 mandates designation of a
          CRO with functional independence from business areas, incompatibility with
          business roles, and BCB notification. Both create equivalent regulatory
          officer positions within the second line of defense, with parallel
          independence and notification requirements.

  - source_control: art-13
    target_controls:
      - id: art-27
        relationship: complements
        confidence: 0.90
        rationale: >
          CMN 4.606 art-13 defines the CCO's five responsibilities: ensure policy
          compliance, supervise the compliance function, guarantee reporting,
          assess resource adequacy, present semiannual reports to the board. CMN
          4.557 art-27 defines the CRO's responsibilities including independence,
          incompatibility rules, and BCB notification. Both establish the personal
          accountability framework for second-line officers.
      - id: art-26
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CMN 4.606 art-13 inciso V requires the CCO to present the semiannual
          compliance report directly to the board. CMN 4.557 art-26 defines the
          board's responsibilities including approving risk policies and overseeing
          risk governance. The CCO's semiannual report to the board is part of the
          board's oversight responsibility.

  - source_control: art-14
    target_controls:
      - id: art-27
        relationship: complements
        confidence: 0.95
        rationale: >
          CMN 4.606 art-14 guarantees the CCO direct board access, functional
          independence without interference, and requires BCB notification within
          30 days of the CCO's removal with stated reasons. CMN 4.557 art-27
          establishes equivalent protections for the CRO: independence from business
          areas and BCB notification. Both create parallel institutional protection
          mechanisms for second-line officers against removal or interference.
      - id: art-28
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CMN 4.606 art-14 guarantees the CCO direct access to the board. CMN 4.557
          art-28 establishes the risk committee under the board for S1 institutions.
          The CCO's direct board access may route through or interact with the risk
          committee for risk-related compliance matters.

  - source_control: art-15
    target_controls:
      - id: art-31
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          CMN 4.606 art-15 requires retention of compliance documentation for a
          minimum of five years, available for BCB inspection. CMN 4.557 art-31
          requires retention of risk management and capital management documentation
          for a minimum of five years, available for BCB inspection. Both impose
          identical retention periods, identical BCB access requirements, and
          identical scope logic (from document creation or activity completion,
          whichever is later).

  - source_control: art-16
    target_controls:
      - id: art-32
        relationship: complements
        confidence: 0.85
        rationale: >
          CMN 4.606 art-16 grants the BCB unrestricted access to compliance
          information and documents at any time, with institution-obligated response
          deadlines. CMN 4.557 art-32 grants the BCB power to establish additional
          requirements for risk management, determine additional controls, and
          request information. Both vest the BCB with supervisory authority over the
          respective domains.

  - source_control: art-17
    target_controls:
      - id: art-32
        relationship: complements
        confidence: 0.80
        rationale: >
          CMN 4.606 art-17 establishes the compliance adequacy deadline (April 1,
          2018), revokes prior provisions (CMN 3.380 Chapter VIII), and sets the
          effective date. CMN 4.557 art-32 establishes the BCB's powers for
          additional requirements, additional controls, and transitional provisions.
          Both contain final administrative and transitional provisions for their
          respective regulatory domains.

statistics:
  total_source_controls: 17
  total_target_controls: 32
  total_mappings: 28
  relationship_distribution:
    complements: 15
    intersects-with: 11
    equivalent-to: 1
    implements: 1
  coverage:
    source_controls_mapped: 17
    source_controls_unmapped: 0
    target_controls_referenced: 15
    target_controls_unreferenced: 17
  notes: >
    All 17 source controls (CMN 4.606 art-1 through art-17) are mapped to at
    least one target control. The dominant relationship type is "complements",
    reflecting that the compliance policy framework (4.606) operates alongside
    the risk management framework (4.557) as parallel second-line-of-defense
    structures. Target controls with no inbound mappings are primarily the
    specific risk-type articles (credit risk art-8 through art-11, market risk
    art-12 through art-14, liquidity risk art-19 through art-21, capital
    management art-22 through art-25), which have no direct compliance policy
    counterpart in CMN 4.606 — the compliance function oversees adherence to
    these requirements but does not replicate their substantive content.
