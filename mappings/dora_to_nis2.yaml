id: dora_to_nis2
title: "DORA to NIS2 Directive Control Mapping"
source_framework: dora
target_framework: nis2
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # ── chap-2 (ICT Risk Management) ──────────────────────────────────────

  - source_control: art-5
    target_controls:
      - id: art-20
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          DORA Art. 5 (Governance and organisation) and NIS2 Art. 20 (Governance)
          are functionally equivalent: both mandate that the management body bears
          ultimate responsibility for ICT/cybersecurity risk, must approve risk
          management measures, oversee their implementation, and can be held liable
          for failures. Both require management body members to undergo training so
          they can understand and assess cyber risk. DORA is sector-specific to
          financial entities while NIS2 applies cross-sectorally, but the governance
          obligations are substantively identical.
      - id: art-21
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          DORA Art. 5 requires the management body to approve ICT policies covering
          availability, authenticity, integrity, and confidentiality, and to allocate
          budget for digital operational resilience. NIS2 Art. 21 requires entities to
          take appropriate technical, operational, and organisational measures to manage
          network and information system risks. The intersection is in the requirement
          for organisational measures and policy establishment, though NIS2 Art. 21
          covers a much broader scope of ten specific security domains.

  - source_control: art-6
    target_controls:
      - id: art-21
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          DORA Art. 6 (ICT risk management framework) and NIS2 Art. 21 (Cybersecurity
          Risk-Management Measures) both require entities to establish comprehensive
          risk management frameworks. DORA Art. 6 mandates strategies, policies,
          procedures, ICT protocols, and tools to protect information and ICT assets,
          continuous risk identification, and periodic framework review. NIS2 Art. 21
          mandates an all-hazards approach with ten specific domains including risk
          analysis, incident handling, business continuity, and supply chain security.
          Both require proportionate, auditable frameworks that are regularly reviewed.
          The equivalence is strong because both articles serve as the foundational
          risk management requirement of their respective regulations.
      - id: art-7
        relationship: complements
        confidence: 0.60
        rationale: >
          DORA Art. 6 requires financial entities to identify and assess cyber threats
          and ICT vulnerabilities as part of the risk management framework. NIS2 Art. 7
          requires Member States to adopt national cybersecurity strategies including
          risk assessment frameworks and coordinated vulnerability disclosure policies.
          The relationship is complementary: DORA mandates entity-level risk assessment
          while NIS2 Art. 7 establishes the national-level framework within which those
          assessments operate.

  - source_control: art-7
    target_controls:
      - id: art-21
        relationship: subset-of
        confidence: 0.85
        rationale: >
          DORA Art. 7 (ICT systems, protocols and tools) requires financial entities to
          use updated, reliable, and technologically resilient ICT systems proportionate
          to their operations. NIS2 Art. 21(e) requires security in network and
          information systems acquisition, development, and maintenance, including
          vulnerability handling. DORA Art. 7 is a subset of NIS2 Art. 21 because it
          addresses one specific domain (system currency and resilience) that falls
          within the broader ten-domain framework of NIS2 Art. 21. NIS2 Art. 21 also
          covers cryptography (h), access control (i), and MFA (j) which go beyond
          DORA Art. 7's scope.
      - id: art-24
        relationship: complements
        confidence: 0.65
        rationale: >
          DORA Art. 7 requires ICT systems to be kept updated and technologically
          resilient. NIS2 Art. 24 encourages the use of European cybersecurity
          certification schemes to demonstrate compliance with certain Article 21
          requirements. The complementary relationship exists because certified ICT
          products and services (Art. 24) can serve as evidence of meeting the system
          quality and resilience requirements of DORA Art. 7.

  - source_control: art-8
    target_controls:
      - id: art-21
        relationship: subset-of
        confidence: 0.88
        rationale: >
          DORA Art. 8 (Identification) requires financial entities to identify, classify,
          and document all ICT-supported business functions, information assets, ICT
          assets, and their dependencies, including third-party service provider
          dependencies. NIS2 Art. 21 requires comprehensive risk-management measures
          including risk analysis and information system security (a), asset management
          (i), and supply chain security (d). DORA Art. 8 is a subset addressing asset
          identification and dependency mapping, which is one component of the broader
          NIS2 Art. 21 requirements. The specificity of DORA Art. 8 on legacy system
          assessment and third-party interconnection mapping exceeds NIS2's detail on
          these topics.

  - source_control: art-9
    target_controls:
      - id: art-21
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          DORA Art. 9 (Protection and prevention) and NIS2 Art. 21 share extensive
          overlap in protective security measures. DORA Art. 9 requires information
          security policies, network and infrastructure management, access control
          with least privilege, strong authentication (MFA), and encryption based on
          data classification. NIS2 Art. 21 requires policies on risk analysis and
          information system security (a), access control policies (i), MFA or
          continuous authentication (j), and cryptography policies (h). The substantive
          requirements are equivalent, with both mandating defense-in-depth controls
          covering access management, network security, authentication, and encryption.

  - source_control: art-10
    target_controls:
      - id: art-21
        relationship: subset-of
        confidence: 0.82
        rationale: >
          DORA Art. 10 (Detection) requires mechanisms for prompt detection of
          anomalous activities, ICT network performance issues, and ICT-related
          incidents, with multiple layers of control, alert thresholds, and automatic
          alert mechanisms. NIS2 Art. 21 encompasses detection implicitly through its
          requirement for policies on risk analysis and information system security (a)
          and incident handling (b), though it does not dedicate a separate article to
          detection. DORA Art. 10 is a subset that provides substantially more detail
          on detection requirements than NIS2 Art. 21 addresses for this domain.

  - source_control: art-11
    target_controls:
      - id: art-21
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          DORA Art. 11 (Response and recovery) requires comprehensive ICT business
          continuity policies, ICT response and recovery plans subject to independent
          audit, annual testing, and incident cost estimation. NIS2 Art. 21(b) and (c)
          require incident handling and business continuity including backup management,
          disaster recovery, and crisis management. Both regulations mandate tested,
          documented, and regularly updated continuity and recovery capabilities. The
          equivalence is strong on continuity and recovery obligations, though DORA
          provides more granular requirements such as mandatory independent audit
          review and aggregated annual cost estimation.

  - source_control: art-17
    target_controls:
      - id: art-21
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          DORA Art. 17 (ICT-related incident management process) requires entities to
          define, establish, and implement an incident management process covering
          detection, classification, root cause analysis, early warning indicators, and
          incident recording. NIS2 Art. 21(b) requires incident handling as one of the
          ten mandatory cybersecurity risk-management measures. The intersection is
          strong on incident management process requirements, but DORA Art. 17 is
          substantially more prescriptive about the process structure (early warning
          indicators, severity criteria, role allocation) than NIS2 Art. 21(b).
      - id: art-23
        relationship: complements
        confidence: 0.88
        rationale: >
          DORA Art. 17 establishes the internal incident management process (detect,
          classify, manage, document) that feeds into the external reporting obligations
          of NIS2 Art. 23. NIS2 Art. 23 requires notification to the CSIRT within
          24 hours (early warning), 72 hours (incident notification), and 1 month
          (final report). DORA Art. 17's internal incident management process --
          particularly its requirements for prompt detection, classification, and
          root cause analysis -- directly enables compliance with NIS2 Art. 23's
          reporting timelines. The two articles are complementary: Art. 17 handles
          internal process, Art. 23 handles external notification.

  - source_control: art-19
    target_controls:
      - id: art-23
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          DORA Art. 19 (Reporting of major ICT-related incidents) and NIS2 Art. 23
          (Reporting Obligations) are functionally equivalent incident reporting
          requirements. Both mandate multi-stage reporting to competent authorities:
          DORA requires initial notification (end of business day / 4 hours), intermediate
          report (1 week), and final report (1 month); NIS2 requires early warning
          (24 hours), incident notification (72 hours), and final report (1 month).
          Both cover content requirements for each reporting stage and address mandatory
          versus voluntary reporting thresholds. DORA is sector-specific (financial
          entities to financial supervisors) while NIS2 is cross-sectoral (essential
          and important entities to CSIRT/competent authority), but the reporting
          structure and timelines are highly aligned.
      - id: art-34
        relationship: complements
        confidence: 0.55
        rationale: >
          DORA Art. 19's reporting obligations complement NIS2 Art. 34 (Administrative
          Fines) because failure to report incidents within mandated timelines constitutes
          a compliance violation that can trigger fines. Art. 34 specifies that the nature,
          gravity, and duration of the infringement, as well as the degree of cooperation
          with the competent authority, are factors in fine calculation. Timely incident
          reporting under Art. 19 directly affects fine exposure under Art. 34.

  - source_control: art-24
    target_controls:
      - id: art-21
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          DORA Art. 24 (General requirements for digital operational resilience testing)
          requires a comprehensive testing programme including vulnerability assessments,
          penetration testing, scenario-based tests, and performance testing, conducted
          by independent parties with annual cadence. NIS2 Art. 21(f) requires policies
          and procedures to assess the effectiveness of cybersecurity risk-management
          measures. Both require systematic assessment of security control effectiveness,
          but DORA Art. 24 is significantly more prescriptive about testing types,
          independence requirements, and remediation tracking than NIS2 Art. 21(f).

  - source_control: art-26
    target_controls:
      - id: art-21
        relationship: complements
        confidence: 0.72
        rationale: >
          DORA Art. 26 (Threat-led penetration testing) requires advanced testing via
          TLPT/TIBER-EU every 3 years for systemically important financial entities,
          conducted on live production systems by certified external red teams. NIS2
          Art. 21(f) requires effectiveness assessment of cybersecurity risk-management
          measures but does not prescribe TLPT or red team testing. DORA Art. 26
          complements NIS2 Art. 21(f) by providing a specific, advanced testing
          methodology that goes beyond standard effectiveness assessment, applicable
          to entities subject to both regulations.

  - source_control: art-28
    target_controls:
      - id: art-21
        relationship: equivalent-to
        confidence: 0.88
        rationale: >
          DORA Art. 28 (ICT third-party risk management) and NIS2 Art. 21(d) (supply
          chain security) both require entities to manage risks arising from third-party
          service providers and supply chain dependencies. DORA Art. 28 mandates a
          third-party risk strategy, register of information, due diligence, ongoing
          monitoring, concentration risk analysis, and exit strategies. NIS2 Art. 21(d)
          requires security-related aspects concerning relationships between each entity
          and its direct suppliers or service providers. Both are substantively equivalent
          in requiring supply chain risk management, though DORA Art. 28 provides
          significantly more granular requirements including the mandatory register of
          information and multi-vendor strategy.
      - id: art-24
        relationship: complements
        confidence: 0.70
        rationale: >
          DORA Art. 28's requirement for managing ICT third-party risk, including
          due diligence and monitoring of service providers, complements NIS2 Art. 24's
          encouragement of European cybersecurity certification schemes. Certified ICT
          products and services (Art. 24) can serve as evidence of supplier security
          posture, supporting the due diligence requirements of DORA Art. 28. Both
          articles address trust establishment in the ICT supply chain, though from
          different angles: contractual oversight (DORA Art. 28) versus certification
          assurance (NIS2 Art. 24).
