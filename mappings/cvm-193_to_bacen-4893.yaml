id: cvm-193_to_bacen-4893
title: "CVM 193 to Bacen 4893 Control Mapping"
source_framework: cvm-193
target_framework: bacen-4893
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # ─────────────────────────────────────────────────────────────────────
  # GOVERNANCA (esg-1, esg-2, esg-3)
  # ─────────────────────────────────────────────────────────────────────

  - source_control: esg-1
    target_controls:
      - id: art-17
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CVM 193 esg-1 requires disclosure of the governance body responsible
          for overseeing sustainability-related risks and opportunities,
          including how its mandate, competence, and reporting cadence are
          structured. Bacen 4893 art-17 assigns the board of directors (or
          senior management) responsibility for approving the cybersecurity
          policy, ensuring adequate risk management structures, and approving
          the annual incident report. Both controls establish board-level
          oversight obligations over material organizational risks, though
          CVM 193 focuses on ESG/sustainability and Bacen 4893 on
          cybersecurity. The structural governance pattern is analogous:
          identification of a responsible body, formal mandate, and reporting
          mechanisms.
      - id: art-8
        relationship: intersects-with
        confidence: 0.60
        rationale: >
          CVM 193 esg-1 requires the governance body to ensure appropriate
          competencies are available and to define reporting frequency for
          sustainability matters. Bacen 4893 art-8 requires a formal
          cybersecurity governance program encompassing risk management
          processes, incident scenario definition, response procedures, and
          incident classification. Both mandate structured governance
          programs for their respective risk domains, requiring documented
          processes, oversight structures, and systematic reporting. The
          intersection lies in the governance framework design pattern, not
          in the specific risk domain.

  - source_control: esg-2
    target_controls:
      - id: art-17
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          CVM 193 esg-2 focuses on the operational management layer of ESG
          governance -- how management roles, delegation mechanisms, and
          internal controls are organized for sustainability oversight.
          Bacen 4893 art-17 assigns the board specific duties including
          ensuring the institution maintains an adequate cybersecurity risk
          management structure and sufficient human and financial resources.
          Both controls address the governance-management interface: how
          board-level accountability translates into operational management
          structures, resource allocation, and integration with existing
          corporate governance.
      - id: art-18
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          CVM 193 esg-2 requires disclosure of whether ESG oversight is
          delegated to a specific management position or committee and how
          that delegation is supervised. Bacen 4893 art-18 requires
          designation of a director responsible for the cybersecurity policy
          and incident response plan execution, who must be communicated to
          the Central Bank. Both controls establish designated management
          roles with formal accountability for specific risk domains, with
          delegation structures and conflict-of-interest provisions. The
          pattern of management delegation with board oversight is shared.

  - source_control: esg-3
    target_controls:
      - id: art-19
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          CVM 193 esg-3 requires disclosure of competence-building
          processes, incentive alignment with sustainability targets, and
          accountability mechanisms for ESG governance effectiveness.
          Bacen 4893 art-19 mandates designation of a director responsible
          for cybersecurity, who may accumulate other functions provided
          there is no conflict of interest, and may be the same director
          responsible for risk management under CMN Resolution 4,557. Both
          controls address competence, accountability, and conflict-of-interest
          management for designated responsible persons overseeing critical
          risk domains. The requirement for adequate competence and clear
          accountability structures is common to both frameworks.
      - id: art-5
        relationship: intersects-with
        confidence: 0.55
        rationale: >
          CVM 193 esg-3 addresses training and capacity-building for board
          members and management on sustainability, as well as mechanisms to
          ensure governance responsibilities are effectively fulfilled.
          Bacen 4893 art-5 requires dissemination of the cybersecurity policy
          to all employees and third-party service providers, using clear and
          accessible language appropriate to each person's role and data
          sensitivity level. Both controls establish obligations around
          awareness, training, and competence development, though in
          different domains. The overlap lies in the organizational learning
          and competence assurance pattern.

  # ─────────────────────────────────────────────────────────────────────
  # ESTRATEGIA (esg-4, esg-5, esg-6)
  # ─────────────────────────────────────────────────────────────────────

  - source_control: esg-4
    target_controls:
      - id: art-4
        relationship: intersects-with
        confidence: 0.60
        rationale: >
          CVM 193 esg-4 requires identification and disclosure of
          sustainability-related risks and opportunities that could affect
          the entity's prospects, classified by time horizon (short, medium,
          long term) and type (physical, transition). Bacen 4893 art-4
          requires the cybersecurity policy to include, at minimum, security
          objectives, vulnerability reduction procedures, incident scenarios,
          data classification, and risk assessment parameters. Both controls
          mandate systematic risk identification and characterization
          processes within their respective domains. The structural pattern
          of risk cataloguing, classification, and materiality assessment
          is shared.
      - id: art-8
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          CVM 193 esg-4 requires the entity to identify, classify, and
          assess sustainability risks using defined methodologies and time
          horizons. Bacen 4893 art-8 requires a formal cybersecurity
          governance program that includes risk management processes,
          incident scenario definition and updating, response procedures,
          and incident classification by impact and relevance. Both
          controls demand structured risk identification and assessment
          processes with documented methodologies, classification
          taxonomies, and prioritization frameworks. The risk management
          process design pattern is analogous.

  - source_control: esg-5
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.55
        rationale: >
          CVM 193 esg-5 requires disclosure of the climate transition plan
          including capital investments, business model changes, financial
          impacts, and progress tracking against previously disclosed plans.
          Bacen 4893 art-6 requires establishment of an action and incident
          response plan covering organizational adequacy actions, prevention
          and response routines, and designation of responsible areas. Both
          controls require formalized action plans with specific objectives,
          resource allocation, progress tracking, and accountability. The
          intersection lies in the strategic planning and action plan
          execution pattern, though the subject matter differs entirely
          (climate transition vs. cybersecurity readiness).

  - source_control: esg-6
    target_controls:
      - id: art-4
        relationship: intersects-with
        confidence: 0.55
        rationale: >
          CVM 193 esg-6 requires climate resilience assessment through
          scenario analysis, including Paris-aligned scenarios, assumptions
          disclosure, and strategic implications. Bacen 4893 art-4, inciso V,
          alínea (a), requires the cybersecurity policy to include
          directives for developing incident scenarios used in business
          continuity tests. Both controls require scenario-based analysis
          and stress testing as part of resilience assessment, though for
          different risk domains (climate resilience vs. cybersecurity
          resilience). The methodological pattern of scenario analysis for
          organizational resilience is shared.

  # ─────────────────────────────────────────────────────────────────────
  # RISCOS (esg-7, esg-8, esg-9)
  # ─────────────────────────────────────────────────────────────────────

  - source_control: esg-7
    target_controls:
      - id: art-8
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          CVM 193 esg-7 requires disclosure of the processes used to
          identify, assess, prioritize, and monitor sustainability risks,
          including data inputs, assessment methodologies, prioritization
          criteria, and year-over-year process changes. Bacen 4893 art-8
          requires a cybersecurity governance program with documented risk
          management processes, incident scenario definition, response
          procedures, and impact classification. Both controls mandate
          formalized, documented risk management processes with specific
          methodological requirements for identification, assessment,
          prioritization, and monitoring. The risk management lifecycle
          pattern is structurally equivalent, despite operating on different
          risk categories.
      - id: art-4
        relationship: intersects-with
        confidence: 0.60
        rationale: >
          CVM 193 esg-7 requires disclosure of risk identification inputs,
          assessment methodology (including scenario analysis), and
          prioritization approaches. Bacen 4893 art-4 specifies minimum
          policy content including vulnerability reduction procedures,
          traceability controls, incident analysis (cause, impact, effects),
          and risk assessment parameters (inciso V, alínea d). Both controls
          require the entity to establish and disclose criteria and methods
          for assessing the nature, likelihood, and magnitude of risks. The
          analytical framework for risk characterization is comparable.

  - source_control: esg-8
    target_controls:
      - id: art-8
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CVM 193 esg-8 specifically requires that sustainability risk
          management be integrated into the entity's general enterprise
          risk management processes, including risk appetite statements,
          interdependency analysis, and unified risk profiles. Bacen 4893
          art-8 requires a cybersecurity governance program that manages
          cybersecurity risks within the context of the institution's
          overall risk framework. Both controls address the integration
          of domain-specific risks (ESG or cyber) into enterprise-wide
          risk management. The principle that specialized risk categories
          must not be siloed but integrated into the enterprise risk
          framework is common to both.
      - id: art-3
        relationship: intersects-with
        confidence: 0.55
        rationale: >
          CVM 193 esg-8 requires ESG risks to be integrated with financial,
          operational, and regulatory risks, with interdependency analysis.
          Bacen 4893 art-3 requires the cybersecurity policy to be
          compatible with the institution's size, risk profile, and
          business model, and to assure confidentiality, integrity, and
          availability. Both controls establish the principle that their
          respective risk domains must be calibrated to and integrated
          with the entity's overall risk posture, not managed in isolation.

  - source_control: esg-9
    target_controls:
      - id: art-7
        relationship: intersects-with
        confidence: 0.55
        rationale: >
          CVM 193 esg-9 requires disclosure of processes for identifying,
          assessing, prioritizing, and monitoring climate-specific risks,
          distinguishing between physical and transition risks, and using
          geospatial data and value chain analysis. Bacen 4893 art-7
          specifies minimum technical controls including authentication,
          encryption, intrusion prevention and detection, vulnerability
          scanning, malware protection, access control, network segmentation,
          and backup procedures. While the specific risk domains differ
          entirely (climate vs. cyber), both controls require specialized
          technical methodologies and tools for risk assessment and
          monitoring within their respective domains. The intersection
          lies in the pattern of domain-specific, technically rigorous
          risk management processes.
      - id: art-2
        relationship: intersects-with
        confidence: 0.50
        rationale: >
          CVM 193 esg-9 requires differentiated treatment of climate risks
          by type (physical acute, physical chronic, transition), with
          tailored assessment and monitoring approaches for each category.
          Bacen 4893 art-2 establishes the proportionality principle,
          requiring controls proportional to the institution's size, risk
          profile, business model, operational complexity, and data
          sensitivity. Both controls embody the principle of risk-based
          differentiation -- that different risk profiles require different
          assessment approaches and control intensities. The proportionality
          pattern is shared.

  # ─────────────────────────────────────────────────────────────────────
  # METRICAS (esg-10, esg-11, esg-12)
  # ─────────────────────────────────────────────────────────────────────

  - source_control: esg-10
    target_controls:
      - id: art-4
        relationship: intersects-with
        confidence: 0.50
        rationale: >
          CVM 193 esg-10 requires disclosure of GHG emissions (Scope 1, 2,
          3) with detailed methodology, emission factors, and calculation
          assumptions using the GHG Protocol. Bacen 4893 art-4 requires
          the cybersecurity policy to include data classification by
          relevance (inciso V, alínea c), traceability controls for
          sensitive information (inciso III), and parameters for incident
          relevance assessment (inciso V, alínea d). Both controls require
          rigorous, standardized measurement and classification
          methodologies for their respective domains, with transparency
          about inputs, calculations, and limitations. The pattern of
          metric definition, methodology disclosure, and data governance
          is shared at a structural level.

  - source_control: esg-11
    target_controls:
      - id: art-7
        relationship: intersects-with
        confidence: 0.50
        rationale: >
          CVM 193 esg-11 requires industry-specific sustainability metrics
          based on SASB standards, cross-sector metrics, methodology
          disclosure, trend analysis, and connection to financial statements.
          Bacen 4893 art-7 requires specific technical controls and
          procedures including audit trails, secure development controls,
          and data storage security measures, all proportional to the
          institution's complexity. Both controls require the entity to
          implement domain-specific measurement, tracking, and reporting
          capabilities with defined methodologies and continuous monitoring.
          The intersection is in the pattern of structured measurement
          frameworks tailored to the entity's specific context.

  - source_control: esg-12
    target_controls:
      - id: art-11
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          CVM 193 esg-12 requires disclosure of sustainability targets,
          including metrics used, specific objectives, time periods,
          base years, interim milestones, performance tracking, target
          revisions, and third-party validation. Bacen 4893 art-11 requires
          an annual report on the implementation of the action and incident
          response plan, covering effectiveness of actions, results of
          controls, relevant incidents, and business continuity test
          results. Both controls mandate structured performance tracking
          and reporting against established plans and targets, with year-
          over-year progress analysis and accountability for results.
          The pattern of target-setting, progress monitoring, and
          periodic reporting to governance bodies is common.
      - id: art-6
        relationship: intersects-with
        confidence: 0.55
        rationale: >
          CVM 193 esg-12 requires entities to set measurable targets with
          milestones and track progress. Bacen 4893 art-6 requires an action
          plan with specific actions for organizational adequacy, prevention
          and response routines, and designated responsible areas. Both
          controls establish the requirement for concrete, measurable
          action plans with progress tracking mechanisms. The pattern of
          planned targets versus actual execution, with accountability for
          deviations, is structurally shared.

  # ─────────────────────────────────────────────────────────────────────
  # DIVULGACAO (esg-13, esg-14, esg-15)
  # ─────────────────────────────────────────────────────────────────────

  - source_control: esg-13
    target_controls:
      - id: art-11
        relationship: intersects-with
        confidence: 0.60
        rationale: >
          CVM 193 esg-13 requires publication of the sustainability report
          simultaneously with annual financial statements, covering the same
          reporting period and entity, with mandatory adoption from fiscal
          years starting January 1, 2026. Bacen 4893 art-11 requires
          preparation of an annual report on cybersecurity plan
          implementation with a December 31 base date, covering action
          effectiveness, control results, relevant incidents, and
          continuity test results. Both controls mandate annual regulatory
          reporting with defined base dates, specific content requirements,
          and governance approval processes. The annual reporting obligation
          pattern to regulatory bodies is shared.
      - id: art-10
        relationship: intersects-with
        confidence: 0.50
        rationale: >
          CVM 193 esg-13 establishes mandatory disclosure requirements to
          CVM, with specific filing formats and deadlines. Bacen 4893 art-10
          requires communication of relevant incidents to the Central Bank,
          including description, effects, actions taken, and results. Both
          controls establish mandatory communication obligations to
          regulatory authorities with defined content requirements and
          timelines. The regulatory reporting obligation pattern is shared,
          though the triggers differ (periodic reporting vs. event-driven
          reporting).

  - source_control: esg-14
    target_controls:
      - id: art-11
        relationship: intersects-with
        confidence: 0.60
        rationale: >
          CVM 193 esg-14 requires independent assurance of the sustainability
          report by a CVM-registered auditor, following ISAE 3000/3410
          standards, with phased implementation from limited to reasonable
          assurance. Bacen 4893 art-11 requires an annual report that serves
          as an accountability instrument for the board and is subject to
          BCB inspection. Both controls establish external accountability
          and assurance mechanisms for regulatory compliance reporting. The
          pattern of third-party verification, evidence-based reporting,
          and progressive maturation of assurance levels reflects shared
          principles of regulatory accountability.
      - id: art-17
        relationship: intersects-with
        confidence: 0.55
        rationale: >
          CVM 193 esg-14 requires the assurance report to be published
          alongside the sustainability report, with the auditor assessing
          IFRS S1/S2 compliance. Bacen 4893 art-17 requires the board to
          approve the annual cybersecurity report and ensure adequate risk
          management structures. Both controls establish governance-level
          accountability for the quality and reliability of regulatory
          reports, requiring senior leadership engagement in the assurance
          and approval process.

  - source_control: esg-15
    target_controls:
      - id: art-4
        relationship: intersects-with
        confidence: 0.55
        rationale: >
          CVM 193 esg-15 requires connected disclosures linking
          sustainability information to financial statements, ensuring
          consistency of assumptions, cross-references, and non-
          contradiction between reports. Bacen 4893 art-4 requires the
          cybersecurity policy to include traceability controls (inciso III),
          data classification (inciso V, alínea c), and incident analysis
          integrating cause, impact, and effects (inciso IV). Both controls
          require integration and consistency across different information
          domains, with traceability and cross-referencing mechanisms. The
          pattern of ensuring data integrity and consistency across related
          reporting systems is shared.
      - id: art-3
        relationship: intersects-with
        confidence: 0.50
        rationale: >
          CVM 193 esg-15 mandates that sustainability disclosures must not
          contradict financial statement information, requiring coherent
          assumptions across reports. Bacen 4893 art-3 requires the
          cybersecurity policy to ensure confidentiality, integrity, and
          availability of data and information systems. Both controls
          address data integrity at an institutional level -- CVM 193
          focused on cross-report consistency and Bacen 4893 on information
          system integrity. The shared principle is that organizational
          information must be reliable, consistent, and trustworthy.
