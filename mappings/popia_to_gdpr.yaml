id: popia_to_gdpr
title: "POPIA to GDPR Control Mapping"
source_framework: popia
target_framework: gdpr
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  - source_control: cond-1
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          POPIA Condition 1 (Accountability, Section 8) requires the responsible party to
          ensure compliance with all conditions for lawful processing at the time of determination
          of purpose and throughout processing. This maps directly to GDPR Art. 5(2), the
          accountability principle, which requires the controller to be responsible for and
          demonstrate compliance with all processing principles. Both impose an active,
          demonstrable compliance obligation on the data controller/responsible party.
      - id: art-25
        relationship: complements
        confidence: 0.78
        rationale: >
          POPIA Condition 1 requires compliance "at the time of the determination of the purpose
          and means of the processing," which parallels GDPR Art. 25's requirement to implement
          data protection measures "at the time of the determination of the means for processing."
          Both mandate proactive governance from the design stage, though Art. 25 is more
          prescriptive about technical measures such as pseudonymisation and data minimisation
          by default.
      - id: art-30
        relationship: complements
        confidence: 0.72
        rationale: >
          The accountability obligation in Condition 1 implicitly requires documentation of
          processing activities to demonstrate compliance, which complements GDPR Art. 30's
          explicit requirement to maintain records of processing activities. Art. 30 provides
          the specific documentation mechanism that supports the broader accountability principle.

  - source_control: cond-2
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          POPIA Condition 2 (Processing Limitation, Sections 9-12) encompasses lawfulness,
          data minimisation, consent, and direct collection. This maps to GDPR Art. 5(1)(a)
          (lawfulness, fairness, transparency), Art. 5(1)(b) (purpose limitation), and
          Art. 5(1)(c) (data minimisation). POPIA Section 10's minimality requirement is
          functionally equivalent to GDPR's data minimisation principle. Both require that
          processing be adequate, relevant, and not excessive.
      - id: art-6
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          POPIA Section 11 establishes the lawful bases for processing (consent, contractual
          necessity, legal obligation, protection of legitimate interests, public law duty,
          legitimate interests of the responsible party), which directly parallels GDPR Art. 6's
          six legal bases. The justification grounds in Section 11(1)(a)-(f) map closely to
          Art. 6(1)(a)-(f). POPIA's consent requirements mirror GDPR Art. 7. The right to
          object in Section 11(3) corresponds to GDPR Art. 21.

  - source_control: cond-3
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.94
        rationale: >
          POPIA Condition 3 (Purpose Specification, Sections 13-14) requires collection for a
          specific, explicitly defined, and lawful purpose, and limits retention to what is
          necessary. This maps directly to GDPR Art. 5(1)(b) (purpose limitation — collected
          for specified, explicit, and legitimate purposes) and Art. 5(1)(e) (storage
          limitation — kept for no longer than necessary). Both frameworks require explicit
          purpose definition at collection time and enforce retention limits.
      - id: art-17
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          POPIA Section 14 requires destruction, deletion, or de-identification of records
          once the purpose is fulfilled and retention is no longer authorised. This intersects
          with GDPR Art. 17 (right to erasure) in that both result in data deletion, but
          they differ in trigger mechanism. POPIA Section 14 is a proactive obligation on
          the responsible party tied to retention periods, while Art. 17 is a data subject-
          initiated right. POPIA Section 14(2) overlaps with Art. 17(1)(a) where data is
          no longer necessary for the original purpose.

  - source_control: cond-4
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          POPIA Condition 4 (Further Processing Limitation, Section 15) requires compatibility
          assessment before using personal information for a purpose different from the original
          collection purpose. This maps directly to GDPR Art. 5(1)(b) (purpose limitation —
          "not further processed in a manner that is incompatible with those purposes"). Both
          frameworks allow compatible further processing but require a formal assessment.
      - id: art-6
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          POPIA Section 15(3) lists specific criteria for assessing compatibility (relationship
          between purposes, nature of information, consequences, manner of collection,
          contractual obligations), which parallels GDPR Art. 6(4)'s compatibility test
          criteria (link between purposes, context of collection, nature of data, consequences,
          safeguards). Both provide a structured framework for assessing whether further
          processing is permissible without new consent.

  - source_control: cond-5
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          POPIA Condition 5 (Information Quality, Section 16) requires the responsible party
          to ensure personal information is complete, accurate, not misleading, and updated
          where necessary. This maps directly to GDPR Art. 5(1)(d) (accuracy — "accurate and,
          where necessary, kept up to date; every reasonable step must be taken to ensure that
          personal data that are inaccurate are erased or rectified without delay"). Both
          impose a proportional accuracy obligation tied to the processing purpose.

  - source_control: cond-6
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.88
        rationale: >
          POPIA Condition 6 (Openness, Sections 17-18) requires documentation of processing
          operations and notification to data subjects at collection time. The transparency
          aspect maps to GDPR Art. 5(1)(a) (transparency principle). POPIA Section 18's
          seven mandatory disclosure items correspond to GDPR Art. 13's information requirements
          when data is collected directly, and Art. 14 when obtained indirectly.
      - id: art-30
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          POPIA Section 17 requires maintaining documentation of all processing operations,
          which is functionally equivalent to GDPR Art. 30's Record of Processing Activities
          (ROPA). Both require comprehensive records of what is processed, for what purpose,
          and under what conditions. POPIA additionally links this to the PAIA manual
          requirement, adding a South African-specific public access dimension.

  - source_control: cond-7
    target_controls:
      - id: art-32
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          POPIA Condition 7 (Security Safeguards, Sections 19-22) requires appropriate
          technical and organisational measures to secure the integrity and confidentiality
          of personal information. This maps directly to GDPR Art. 32 (security of processing),
          which similarly requires appropriate measures including pseudonymisation, encryption,
          CIA assurance, and regular testing. Both adopt a risk-based approach where "appropriate"
          is judged by the nature of data, identified risks, industry standards, and cost.
          POPIA Section 19(2) mirrors Art. 32(1)(d) in requiring regular verification of
          safeguard effectiveness.
      - id: art-28
        relationship: equivalent-to
        confidence: 0.88
        rationale: >
          POPIA Sections 20-21 require operators (processors) to maintain confidentiality and
          establish equivalent security measures, governed by a written contract. This maps
          directly to GDPR Art. 28, which governs the controller-processor relationship through
          Data Processing Agreements (DPAs). Both require contractual binding of processors
          to security obligations and restrict processing to controller instructions.
      - id: art-33
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          POPIA Section 22 (within Condition 7) requires notification to the Regulator and
          data subject when personal information has been accessed by an unauthorised person.
          This intersects with GDPR Art. 33 (breach notification to supervisory authority).
          However, POPIA has no risk threshold (all breaches must be reported), while GDPR
          Art. 33 exempts breaches unlikely to result in risk. POPIA uses "as soon as
          reasonably possible" rather than GDPR's 72-hour deadline.

  - source_control: cond-8
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          POPIA Condition 8 (Data Subject Participation, Sections 23-25) grants data subjects
          the right to confirm whether personal information is held and to request access.
          This maps directly to GDPR Art. 15 (right of access), which grants the same right
          to obtain confirmation of processing and access to personal data. Both require
          identity verification before fulfillment and provision of information about
          purposes, categories, and recipients.
      - id: art-17
        relationship: equivalent-to
        confidence: 0.82
        rationale: >
          POPIA Section 24 grants the right to request correction or deletion of inaccurate,
          irrelevant, excessive, or unlawfully obtained personal information, and Section 24(2)
          allows deletion when retention is no longer authorised. This maps to GDPR Art. 17
          (right to erasure / right to be forgotten). POPIA's deletion right is narrower in
          scope — it primarily applies when data is inaccurate or retention has expired, while
          GDPR Art. 17 provides broader erasure grounds including consent withdrawal and
          objection to processing.

  - source_control: chap-3-sec-26
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          POPIA Sections 26-33 prohibit processing of special personal information (religious
          beliefs, race, trade union membership, political persuasion, health, sex life,
          biometrics, criminal behaviour) unless specific exemptions apply. This intersects
          with the GDPR Art. 5 principles framework inasmuch as Art. 5(1)(c) (data minimisation)
          and Art. 5(1)(f) (integrity and confidentiality) impose heightened obligations for
          sensitive data. However, the dedicated GDPR counterpart is Art. 9 (processing of
          special categories of personal data), which is not in the available GDPR controls set.
          POPIA's special PI categories closely mirror GDPR Art. 9(1) categories, with the
          notable addition of biometric information as a standalone category.
      - id: art-32
        relationship: complements
        confidence: 0.78
        rationale: >
          POPIA's prohibition on processing special personal information without exemptions
          implicitly requires enhanced security safeguards when processing is permitted. This
          complements GDPR Art. 32's risk-based security measures, since Art. 32(2) specifically
          requires accounting for risks from processing sensitive data. Both frameworks demand
          proportionally stronger controls for higher-sensitivity data categories.
      - id: art-35
        relationship: complements
        confidence: 0.76
        rationale: >
          Processing of special personal information under POPIA would typically trigger GDPR
          Art. 35's DPIA requirement, as Art. 35(3)(b) mandates a DPIA for "processing on a
          large scale of special categories of data." Both frameworks recognise that processing
          sensitive data demands heightened scrutiny and prior risk assessment before processing
          proceeds.

  - source_control: chap-3-sec-28
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.72
        rationale: >
          POPIA Sections 34-38 prohibit processing of children's personal information (under 18)
          unless specific exemptions apply, generally requiring consent from a competent person.
          The primary GDPR counterpart is Art. 8 (conditions applicable to child's consent in
          relation to information society services), which is not in the available GDPR controls
          set. However, this intersects with GDPR Art. 6(1)(a) on consent, as the lawful basis
          for processing children's data is modified by heightened consent requirements. POPIA
          sets the age threshold at 18, while GDPR Art. 8 sets it at 16 (with Member State
          flexibility down to 13).
      - id: art-25
        relationship: complements
        confidence: 0.70
        rationale: >
          POPIA's heightened protections for children's personal information complement GDPR
          Art. 25's data protection by design and by default requirement. Art. 25(2) mandates
          that by default only necessary personal data are processed, which is especially
          critical for children's data where enhanced minimisation, age verification, and
          parental consent mechanisms must be embedded into system design from the outset.

  - source_control: chap-5-sec-57
    target_controls:
      - id: art-5
        relationship: complements
        confidence: 0.80
        rationale: >
          POPIA Sections 60-66 empower the Information Regulator to issue or approve binding
          codes of conduct for specific sectors, which must at minimum implement POPIA's
          conditions and may impose stricter requirements. This complements GDPR Art. 5's
          processing principles by providing a mechanism for sector-specific implementation
          guidance. GDPR Arts. 40-41 (codes of conduct and monitoring, not in the available
          control set) are the direct equivalents, but codes of conduct serve as practical
          tools to demonstrate compliance with Art. 5 accountability obligations.
      - id: art-32
        relationship: complements
        confidence: 0.68
        rationale: >
          POPIA codes of conduct can prescribe sector-specific security measures beyond baseline
          requirements. GDPR Art. 32(3) explicitly states that adherence to an approved code of
          conduct under Art. 40 may be used to demonstrate compliance with security requirements.
          Both frameworks thus use codes of conduct as a compliance mechanism for security
          obligations, though the underlying regulatory structures differ.

  - source_control: chap-6-sec-60
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.88
        rationale: >
          POPIA Section 5 establishes comprehensive data subject rights including notification,
          access, correction/deletion, objection, protection from automated decision-making,
          and complaint. The access right in Section 5(b) maps directly to GDPR Art. 15 (right
          of access). Both guarantee the right to confirm whether personal data is processed
          and to obtain access to that data along with information about the processing.
      - id: art-17
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          POPIA Section 5(c) grants the right to request correction, destruction, or deletion
          of personal information, which maps to GDPR Art. 17 (right to erasure). Both establish
          the data subject's right to have their data deleted under specified conditions. POPIA
          Section 5(e) and Section 71 (right not to be subject to automated profiling with legal
          effects) parallel GDPR Art. 22 (not in available controls set), but deletion and
          correction rights directly map to Art. 17.
      - id: art-5
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          POPIA Section 5(a) (right to notification of collection and breaches) intersects with
          GDPR Art. 5(1)(a) (transparency principle). The broader rights framework in POPIA
          Section 5 supports the GDPR accountability and transparency principles by giving data
          subjects enforceable mechanisms to hold controllers accountable for lawful processing.

  - source_control: chap-7-sec-69
    target_controls:
      - id: art-5
        relationship: complements
        confidence: 0.72
        rationale: >
          POPIA Sections 39-56 establish the Information Regulator as the supervisory authority
          and require appointment of an Information Officer, with registration before processing
          commences. The direct GDPR equivalents are Arts. 37-39 (DPO designation and tasks) and
          Arts. 51-59 (supervisory authorities), which are not in the available controls set.
          However, this complements GDPR Art. 5(2) (accountability) because appointing oversight
          roles and registering with the authority are mechanisms for demonstrating accountability.
          The Information Officer role parallels the GDPR DPO role, though POPIA makes it
          mandatory for all responsible parties while GDPR requires a DPO only in specific
          circumstances.
      - id: art-35
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          POPIA's requirement that the Information Officer register with the Regulator before
          processing commences intersects with GDPR Art. 35's requirement for prior DPIA in
          high-risk processing. Both impose a pre-processing governance obligation, though the
          mechanisms differ — POPIA requires institutional registration while GDPR requires
          risk-based impact assessment. The Information Officer also plays a role in DPIA-
          equivalent assessments under POPIA.

  - source_control: chap-8-sec-72
    target_controls:
      - id: art-33
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          POPIA Section 22 requires notification to the Information Regulator and data subjects
          when personal information has been accessed or acquired by an unauthorised person.
          This maps directly to GDPR Art. 33 (notification of breach to supervisory authority).
          Both require breach notification to the supervisory authority with specific content
          requirements (nature of breach, consequences, remedial measures). Key differences:
          POPIA has no risk threshold (all breaches must be reported), while GDPR exempts
          breaches "unlikely to result in a risk." POPIA mandates notification "as soon as
          reasonably possible" rather than GDPR's 72-hour deadline. POPIA Section 22(3)
          additionally requires direct data subject notification in all cases, which under
          GDPR is governed separately by Art. 34 (only when high risk to rights and freedoms).
      - id: art-32
        relationship: complements
        confidence: 0.74
        rationale: >
          POPIA Section 22's breach notification requirements presuppose breach detection
          capabilities, which complement GDPR Art. 32's security measures. Art. 32(1)(d)
          requires regular testing and evaluation of security measures, which is a prerequisite
          for discovering breaches that trigger notification obligations under both frameworks.

  - source_control: chap-9-sec-72
    target_controls:
      - id: art-44
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          POPIA Section 72 restricts transfer of personal information to foreign countries
          unless specific conditions are met (adequate protection, consent, contractual
          necessity, binding corporate rules). This maps directly to GDPR Art. 44 (general
          principle for transfers), which similarly restricts international transfers to
          situations where adequate protection is ensured. Both frameworks share transfer
          mechanisms: adequacy assessment (POPIA 72(1)(a) / GDPR Art. 45), consent
          (POPIA 72(1)(b) / GDPR Art. 49(1)(a)), and contractual necessity (POPIA 72(1)(c) /
          GDPR Art. 49(1)(b)). POPIA's requirement that the foreign recipient's protections
          be "substantially similar" to POPIA Chapter 3 mirrors GDPR's "adequate level of
          protection" standard.

  - source_control: chap-11-sec-107
    target_controls:
      - id: art-83
        relationship: equivalent-to
        confidence: 0.82
        rationale: >
          POPIA Sections 100-106 establish criminal offences and penalties for violations
          including fines up to R10 million and imprisonment up to 10 years. This maps to
          GDPR Art. 83, which sets administrative fines up to EUR 20 million or 4% of global
          turnover. Both serve as enforcement mechanisms, but they differ fundamentally in
          structure: POPIA imposes criminal liability (including imprisonment) on individuals
          and directors, while GDPR uses administrative fines on organisations. GDPR's fines
          are proportionally higher for large enterprises (percentage of turnover), while
          POPIA's criminal penalties are individually more severe (personal imprisonment).
          POPIA Section 104's specific protection for account numbers has no direct GDPR
          equivalent.
      - id: art-5
        relationship: complements
        confidence: 0.68
        rationale: >
          POPIA's penalty regime reinforces the accountability principle by creating severe
          consequences for non-compliance with processing conditions. This complements GDPR
          Art. 5(2) (accountability), as both frameworks make controllers personally responsible
          for demonstrating compliance, with significant penalties for failure. POPIA's
          director-level liability in Section 106 particularly reinforces organisational
          accountability.
