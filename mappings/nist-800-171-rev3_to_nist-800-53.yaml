id: nist-800-171-rev3_to_nist-800-53
title: "NIST SP 800-171 Rev 3 to NIST SP 800-53 Rev 5 Control Mapping"
source_framework: nist-800-171-rev3
target_framework: nist-800-53-rev5
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # Access Control (AC) Family
  - source_control: 03.01.01
    target_controls:
      - id: ac-2
        relationship: derived-from
        confidence: 0.95
        rationale: >-
          SP 800-171 03.01.01 (Account Management) is directly derived from NIST 800-53 AC-2. Both
          require defining account types, assigning account managers, monitoring account usage, and
          aligning account management with personnel processes. The 800-171 control is a
          CUI-tailored subset of AC-2.

  - source_control: 03.01.02
    target_controls:
      - id: ac-3
        relationship: derived-from
        confidence: 0.95
        rationale: >-
          SP 800-171 03.01.02 (Access Enforcement) is directly derived from NIST 800-53 AC-3. Both
          enforce approved authorizations for logical access to information and system resources in
          accordance with access control policies.

  - source_control: 03.01.05
    target_controls:
      - id: ac-6
        relationship: derived-from
        confidence: 0.95
        rationale: >-
          SP 800-171 03.01.05 (Least Privilege) is directly derived from NIST 800-53 AC-6. Both
          require employing the principle of least privilege, allowing only authorized accesses
          necessary to accomplish assigned organizational tasks.

  # Awareness and Training (AT) Family
  - source_control: 03.02.01
    target_controls:
      - id: at-2
        relationship: derived-from
        confidence: 0.90
        rationale: >-
          SP 800-171 03.02.01 (Literacy Training and Awareness) is derived from NIST 800-53 AT-2
          (Literacy Training and Awareness). Both require security awareness training for system
          users, including recognizing and reporting indicators of insider threat, social
          engineering, and other cyber threats. The 800-171 version focuses on CUI handling
          awareness.

  # Audit and Accountability (AU) Family
  - source_control: 03.03.01
    target_controls:
      - id: au-2
        relationship: derived-from
        confidence: 0.90
        rationale: >-
          SP 800-171 03.03.01 (Event Logging) is primarily derived from NIST 800-53 AU-2 (Event
          Logging). Both require identifying event types for logging, coordinating event selection,
          and periodically reviewing logged event types.
      - id: au-3
        relationship: intersects-with
        confidence: 0.80
        rationale: "03.03.01 incorporates content requirements from AU-3 (Content of Audit Records), specifying what information audit records must contain within its event logging scope."
      - id: au-12
        relationship: intersects-with
        confidence: 0.75
        rationale: "03.03.01 incorporates audit record generation capabilities from AU-12 (Audit Record Generation), requiring the system to generate audit records for defined events."

  - source_control: 03.03.02
    target_controls:
      - id: au-3
        relationship: derived-from
        confidence: 0.95
        rationale: >-
          SP 800-171 03.03.02 (Audit Record Content) is directly derived from NIST 800-53 AU-3
          (Content of Audit Records). Both specify that audit records must contain what, when,
          where, source, outcome, and identity associated with each event.

  # Configuration Management (CM) Family
  - source_control: 03.04.01
    target_controls:
      - id: cm-2
        relationship: derived-from
        confidence: 0.95
        rationale: >-
          SP 800-171 03.04.01 (Baseline Configuration) is directly derived from NIST 800-53 CM-2
          (Baseline Configuration). Both require developing, documenting, and maintaining baseline
          configurations for systems under organizational control.

  - source_control: 03.04.02
    target_controls:
      - id: cm-6
        relationship: derived-from
        confidence: 0.95
        rationale: >-
          SP 800-171 03.04.02 (Configuration Settings) is directly derived from NIST 800-53 CM-6
          (Configuration Settings). Both require establishing and enforcing security configuration
          settings for IT products employed in organizational systems.

  # Identification and Authentication (IA) Family
  - source_control: 03.05.01
    target_controls:
      - id: ia-2
        relationship: intersects-with
        confidence: 0.85
        rationale: >-
          SP 800-171 03.05.01 (Identification) shares identification requirements with NIST 800-53
          IA-2 (Identification and Authentication). IA-2 combines identification and authentication,
          while 03.05.01 focuses specifically on the identification component — uniquely identifying
          users, processes, and devices.
      - id: ia-4
        relationship: derived-from
        confidence: 0.85
        rationale: >-
          03.05.01 is also derived from IA-4 (Identifier Management), which addresses managing
          identifiers by receiving authorization, selecting and assigning identifiers, preventing
          reuse, and disabling identifiers after inactivity.

  - source_control: 03.05.02
    target_controls:
      - id: ia-2
        relationship: intersects-with
        confidence: 0.85
        rationale: >-
          SP 800-171 03.05.02 (Authentication) shares authentication requirements with NIST 800-53
          IA-2 (Identification and Authentication). IA-2 combines identification and authentication,
          while 03.05.02 focuses specifically on the authentication component — verifying the
          identity of users, processes, and devices.
      - id: ia-5
        relationship: derived-from
        confidence: 0.85
        rationale: >-
          03.05.02 is also derived from IA-5 (Authenticator Management), which addresses managing
          authenticators including initial distribution, establishing administrative procedures,
          changing defaults, protecting authenticators, and requiring periodic changes.

  # Incident Response (IR) Family
  - source_control: 03.06.01
    target_controls:
      - id: ir-4
        relationship: derived-from
        confidence: 0.95
        rationale: >-
          SP 800-171 03.06.01 (Incident Handling) is directly derived from NIST 800-53 IR-4
          (Incident Handling). Both require implementing an incident handling capability that
          includes preparation, detection, analysis, containment, eradication, and recovery.

  - source_control: 03.06.02
    target_controls:
      - id: ir-6
        relationship: derived-from
        confidence: 0.90
        rationale: >-
          SP 800-171 03.06.02 (Incident Reporting) is derived from NIST 800-53 IR-6 (Incident
          Reporting). Both require personnel to report suspected incidents within defined time
          periods and report incident information to designated authorities. The 800-171 version
          adds the specific 72-hour CUI incident reporting requirement.

  # System and Communications Protection (SC) Family
  - source_control: 03.13.01
    target_controls:
      - id: sc-7
        relationship: derived-from
        confidence: 0.95
        rationale: >-
          SP 800-171 03.13.01 (Boundary Protection) is directly derived from NIST 800-53 SC-7
          (Boundary Protection). Both require monitoring and controlling communications at external
          managed interfaces and implementing subnetworks for publicly accessible components.

  - source_control: 03.13.02
    target_controls:
      - id: sc-8
        relationship: derived-from
        confidence: 0.85
        rationale: >-
          SP 800-171 03.13.02 (Cryptographic Protection) incorporates transmission confidentiality
          requirements from NIST 800-53 SC-8 (Transmission Confidentiality and Integrity), requiring
          cryptographic mechanisms to prevent unauthorized disclosure of CUI during transmission.
      - id: sc-12
        relationship: intersects-with
        confidence: 0.80
        rationale: >-
          03.13.02 incorporates key management requirements from SC-12 (Cryptographic Key
          Establishment and Management), requiring organizations to establish and manage
          cryptographic keys using approved processes and procedures.
      - id: sc-13
        relationship: derived-from
        confidence: 0.90
        rationale: "03.13.02 directly incorporates requirements from SC-13 (Cryptographic Protection), specifically the use of FIPS-validated cryptography to protect CUI confidentiality."
      - id: sc-28
        relationship: intersects-with
        confidence: 0.80
        rationale: >-
          03.13.02 incorporates data-at-rest protection requirements from SC-28 (Protection of
          Information at Rest), requiring cryptographic mechanisms to prevent unauthorized
          disclosure of CUI while in storage.

  # System and Information Integrity (SI) Family
  - source_control: 03.14.01
    target_controls:
      - id: si-2
        relationship: derived-from
        confidence: 0.95
        rationale: >-
          SP 800-171 03.14.01 (Flaw Remediation) is directly derived from NIST 800-53 SI-2 (Flaw
          Remediation). Both require identifying, reporting, and correcting system flaws; testing
          updates before installation; installing security-relevant updates within defined time
          periods; and incorporating flaw remediation into configuration management.

  - source_control: 03.14.02
    target_controls:
      - id: si-5
        relationship: derived-from
        confidence: 0.95
        rationale: >-
          SP 800-171 03.14.02 (Security Alerts, Advisories, and Directives) is directly derived from
          NIST 800-53 SI-5 (Security Alerts, Advisories, and Directives). Both require receiving,
          generating, disseminating, and implementing security alerts and directives from external
          organizations.

  # Supply Chain Risk Management (SR) Family
  - source_control: 03.17.01
    target_controls:
      - id: sr-2
        relationship: derived-from
        confidence: 0.90
        rationale: >-
          SP 800-171 03.17.01 (Supply Chain Risk Management Plan) is primarily derived from NIST
          800-53 SR-2 (Supply Chain Risk Management Plan). Both require developing plans for
          managing supply chain risks across the system lifecycle and reviewing/updating plans
          periodically.
      - id: sr-3
        relationship: intersects-with
        confidence: 0.80
        rationale: >-
          03.17.01 incorporates supply chain controls and processes from SR-3 (Supply Chain Controls
          and Processes), specifically the requirement to employ security safeguards and establish
          processes to identify and address supply chain weaknesses.
