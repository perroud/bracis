id: glba_to_sox
title: "GLBA to SOX Control Mapping"
source_framework: glba
target_framework: sox
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # ============================================================
  # PRIVACY RULE CONTROLS
  # ============================================================

  # glba-privacy-notice → SOX
  - source_control: glba-privacy-notice
    target_controls:
      - id: sec-302
        relationship: complements
        confidence: 0.50
        rationale: >
          GLBA privacy notice requirements complement SOX Section 302 at
          a governance level. Both require executive accountability for
          disclosures — GLBA mandates that financial institutions accurately
          describe information-sharing practices to customers, while SOX 302
          requires CEO/CFO certification that disclosures are accurate and
          complete. Privacy notice failures could constitute material
          omissions in corporate reporting, but the domains differ (consumer
          privacy vs. financial reporting).
      - id: sec-404-a
        relationship: complements
        confidence: 0.45
        rationale: >
          Privacy notice delivery and accuracy are internal processes that
          require controls. SOX 404(a) requires management to assess
          internal control effectiveness, and privacy notice management
          processes — if material to the institution's regulatory compliance
          posture — would fall within the scope of internal controls that
          management must evaluate. Both share the need for documented
          procedures, audit trails, and evidence of control effectiveness.

  # glba-opt-out → SOX
  - source_control: glba-opt-out
    target_controls:
      - id: sec-302
        relationship: complements
        confidence: 0.45
        rationale: >
          Opt-out rights management requires accurate corporate disclosure
          practices. Failure to honor opt-out elections could create material
          regulatory liability that must be disclosed under SOX 302's
          requirement for accurate and complete corporate reporting. The
          CEO/CFO must be aware of systemic opt-out compliance failures
          as a material business risk.
      - id: itgc-access
        relationship: complements
        confidence: 0.55
        rationale: >
          Opt-out enforcement requires access controls over customer data
          sharing pathways. The technical implementation of opt-out rights
          depends on the same access control infrastructure that SOX ITGC
          access management addresses — controlling who and what systems
          can access and transmit customer information. Both require
          documented authorization, periodic review, and audit trails.

  # glba-limits → SOX
  - source_control: glba-limits
    target_controls:
      - id: itgc-access
        relationship: complements
        confidence: 0.60
        rationale: >
          GLBA limits on NPI disclosure directly complement SOX access
          controls. Both controls restrict data access based on
          authorization — GLBA restricts outbound NPI flows to third
          parties, while SOX ITGC access restricts user access to
          financial systems. The underlying mechanisms are shared:
          data classification, access enforcement, audit logging,
          and periodic review of data flow pathways.
      - id: sec-404-a
        relationship: complements
        confidence: 0.50
        rationale: >
          Data flow controls and NPI disclosure limits represent internal
          controls that management must assess and maintain. SOX 404(a)
          requires evaluation of internal control effectiveness, and
          controls over data egress — particularly for regulated data
          like NPI — are part of the broader internal control structure
          that ensures the organization operates within legal boundaries,
          which affects financial risk exposure and disclosure accuracy.

  # ============================================================
  # SAFEGUARDS RULE CONTROLS
  # ============================================================

  # glba-sfg-program → SOX
  - source_control: glba-sfg-program
    target_controls:
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          GLBA's written information security program and SOX 404(a)'s
          management assessment of internal controls share significant
          structural overlap. Both require: a documented program approved
          by senior leadership, periodic assessment of control effectiveness,
          evidence of design and operating effectiveness, and management
          accountability. The GLBA program covers information security
          controls; SOX 404(a) covers internal controls over financial
          reporting. For financial institutions, these overlap substantially
          because financial reporting systems are information systems
          subject to both requirements.
      - id: sec-302
        relationship: complements
        confidence: 0.65
        rationale: >
          GLBA requires board-approved information security programs with
          executive oversight. SOX 302 requires CEO/CFO certification of
          internal control effectiveness. Both create executive accountability
          for control programs — the GLBA program is one component of the
          broader internal control environment that SOX signing officers
          must certify.
      - id: sec-404-b
        relationship: complements
        confidence: 0.55
        rationale: >
          The written information security program under GLBA provides
          auditable evidence that supports the SOX 404(b) auditor
          attestation process. External auditors evaluating IT general
          controls will examine the information security program as
          evidence of the control environment, even though their mandate
          is limited to financial reporting controls.
      - id: itgc-sdlc
        relationship: complements
        confidence: 0.50
        rationale: >
          The information security program mandates that security
          requirements be incorporated into system design and development.
          SOX ITGC SDLC requires a formal development lifecycle with
          internal control and security requirements. The GLBA program
          provides the overarching security policy that SDLC processes
          must implement.

  # glba-sfg-qualified → SOX
  - source_control: glba-sfg-qualified
    target_controls:
      - id: sec-302
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          GLBA's qualified individual (CISO) role directly intersects
          with SOX 302's executive certification responsibility. Both
          establish personal accountability for control effectiveness —
          the qualified individual oversees the information security
          program and reports to the board, while the CEO/CFO certify
          internal control effectiveness. In financial institutions, the
          qualified individual's findings directly inform the CEO/CFO's
          ability to certify controls. Both controls already cross-reference
          each other in their legal_references.
      - id: sec-404-a
        relationship: complements
        confidence: 0.60
        rationale: >
          The qualified individual's oversight of the information security
          program provides the governance structure needed for SOX 404(a)
          management assessment. The qualified individual is responsible
          for evaluating control effectiveness — the same function that
          SOX 404(a) requires of management for financial reporting
          controls. The CISO's assessment feeds into management's
          overall ICFR assessment.

  # glba-sfg-risk-assessment → SOX
  - source_control: glba-sfg-risk-assessment
    target_controls:
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Both GLBA risk assessment and SOX 404(a) require management
          to systematically identify, evaluate, and document risks to
          their respective domains. GLBA mandates written risk assessments
          covering threats to customer information; SOX 404(a) requires
          assessment of internal controls over financial reporting. For
          financial institutions, these assessments overlap because
          financial data IS customer information, and threats to
          information systems affect both data security and financial
          reporting integrity. Both require periodic updates, documented
          methodology, and management approval.
      - id: sec-302
        relationship: complements
        confidence: 0.55
        rationale: >
          GLBA risk assessment results inform the CEO/CFO's ability
          to certify the effectiveness of internal controls under SOX
          302. Identified risks and control deficiencies from the GLBA
          risk assessment may constitute significant deficiencies that
          must be disclosed to auditors and the audit committee per
          SOX 302(e).
      - id: itgc-operations
        relationship: complements
        confidence: 0.55
        rationale: >
          GLBA risk assessment evaluates risks to information systems
          including operational threats. SOX ITGC Operations ensures
          reliable system operations. The risk assessment identifies
          operational risks (system failures, backup failures, incidents)
          that ITGC Operations controls must mitigate. The risk
          assessment drives the priority and scope of operational controls.

  # glba-sfg-access-controls → SOX
  - source_control: glba-sfg-access-controls
    target_controls:
      - id: itgc-access
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          GLBA access controls and SOX ITGC access management are
          near-equivalent controls applied to overlapping but differently
          scoped populations. Both require: unique user identification,
          least privilege access, periodic access reviews, timely
          revocation on termination, segregation of duties, and physical
          access controls. The primary difference is scope — GLBA covers
          systems with customer information, SOX covers systems supporting
          financial reporting. For financial institutions, these scopes
          overlap almost entirely. The GLBA control explicitly cross-
          references SOX itgc-access in its legal_references.
      - id: sec-404-a
        relationship: complements
        confidence: 0.65
        rationale: >
          Access controls are a core component of the internal control
          structure that SOX 404(a) requires management to assess. GLBA
          access control implementation provides evidence of access
          management design and operating effectiveness that directly
          supports the SOX 404(a) management assessment of ICFR.
      - id: sec-404-b
        relationship: complements
        confidence: 0.55
        rationale: >
          External auditors testing ITGCs under SOX 404(b) will examine
          the same access controls that GLBA requires. Evidence of GLBA
          access control compliance (access reviews, provisioning logs,
          termination procedures) directly supports the auditor's
          attestation of ITGC effectiveness.

  # glba-sfg-encryption → SOX
  - source_control: glba-sfg-encryption
    target_controls:
      - id: itgc-access
        relationship: complements
        confidence: 0.60
        rationale: >
          Encryption serves as a compensating and reinforcing access
          control. GLBA's encryption requirements for NPI in transit
          and at rest complement SOX ITGC access management by adding
          a cryptographic layer of protection. Even if logical access
          controls fail, encryption prevents unauthorized data exposure.
          Both controls protect sensitive data — NPI and financial data
          respectively — with overlapping scope in financial institutions.
      - id: itgc-operations
        relationship: complements
        confidence: 0.60
        rationale: >
          Encryption key management is an operational control. SOX ITGC
          Operations covers the reliable operation of IT infrastructure,
          which includes cryptographic infrastructure. Key rotation,
          certificate management, backup encryption, and encrypted
          transmission of financial data are operational activities that
          fall under both GLBA encryption requirements and SOX ITGC
          Operations controls.
      - id: sec-802
        relationship: complements
        confidence: 0.55
        rationale: >
          GLBA encryption protects NPI at rest and in transit. SOX 802
          requires preservation of records and prohibits alteration.
          Encryption of stored records provides integrity protection
          that supports SOX 802 record preservation requirements —
          encrypted records with proper key management are more resistant
          to tampering, and cryptographic erasure must be prevented during
          retention periods.

  # glba-sfg-mfa → SOX
  - source_control: glba-sfg-mfa
    target_controls:
      - id: itgc-access
        relationship: subset-of
        confidence: 0.85
        rationale: >
          GLBA's MFA requirement is a specific authentication control
          that falls within the broader scope of SOX ITGC access
          management. SOX ITGC access requires "authentication mechanisms
          that provide reasonable assurance that users are who they
          claim to be" — MFA is the primary technical implementation
          of this requirement. GLBA mandates MFA specifically for NPI
          systems; SOX ITGC access requires strong authentication for
          financial systems. The GLBA control explicitly cross-references
          SOX itgc-access in its legal_references.
      - id: sec-404-a
        relationship: complements
        confidence: 0.50
        rationale: >
          MFA is a key technical control whose operating effectiveness
          must be evaluated as part of the SOX 404(a) management
          assessment of internal controls. MFA implementation evidence
          (enrollment rates, authentication logs, exception registers)
          feeds into the overall ITGC assessment under SOX 404(a).

  # glba-sfg-data-retention → SOX
  - source_control: glba-sfg-data-retention
    target_controls:
      - id: sec-802
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          GLBA secure data disposal and SOX 802 record retention
          address the same lifecycle problem from opposite ends. GLBA
          mandates timely disposal of customer information (maximum
          2-year retention after last use); SOX 802 mandates minimum
          5-year retention of audit workpapers and prohibits premature
          destruction of records. Both require documented retention
          policies, controlled disposal processes, and audit trails.
          Financial institutions must reconcile these overlapping but
          directionally different requirements to comply with both.
      - id: itgc-operations
        relationship: complements
        confidence: 0.60
        rationale: >
          Data retention and disposal are operational processes. SOX
          ITGC Operations covers backup, recovery, and data lifecycle
          management for financial systems. GLBA data retention
          requirements add specific disposal obligations that must be
          integrated into the operational data lifecycle management
          processes governed by ITGC Operations.
      - id: sec-404-a
        relationship: complements
        confidence: 0.45
        rationale: >
          Data retention and disposal controls are part of the internal
          control structure that SOX 404(a) requires management to
          assess. Inadequate retention or improper disposal of financial
          data could constitute an internal control deficiency affecting
          the reliability of financial reporting and audit evidence.

  # glba-sfg-change-mgmt → SOX
  - source_control: glba-sfg-change-mgmt
    target_controls:
      - id: itgc-change
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          GLBA change management and SOX ITGC change management are
          near-equivalent controls. Both require: formal change
          authorization, testing before production deployment,
          segregation of duties between development and deployment,
          emergency change procedures with retrospective approval,
          and complete audit trails. The scope differs — GLBA covers
          NPI systems, SOX covers financial reporting systems — but the
          control activities are identical. The GLBA control explicitly
          cross-references SOX itgc-change in its legal_references.
      - id: itgc-sdlc
        relationship: complements
        confidence: 0.60
        rationale: >
          GLBA change management procedures complement SOX ITGC SDLC
          by governing how individual changes are deployed, while SDLC
          governs the broader lifecycle of system projects. Both require
          testing, authorization, and documentation. GLBA change
          management feeds into the SDLC process for security-related
          changes to NPI systems.
      - id: sec-404-a
        relationship: complements
        confidence: 0.60
        rationale: >
          Change management controls are a core ITGC domain that SOX
          404(a) requires management to assess. Evidence of GLBA change
          management compliance (approval records, testing evidence,
          segregation of duties) directly supports the SOX 404(a)
          management assessment of internal controls over financial
          reporting.

  # glba-sfg-monitoring → SOX
  - source_control: glba-sfg-monitoring
    target_controls:
      - id: itgc-operations
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          GLBA continuous monitoring and SOX ITGC Operations share
          core operational requirements. Both mandate: system monitoring
          to detect failures and anomalies, activity logging, alert
          investigation and resolution, and protection of log integrity.
          SOX ITGC Operations focuses on ensuring reliable financial
          data processing; GLBA monitoring focuses on detecting attacks
          and unauthorized access to NPI. The operational infrastructure
          (SIEM, log aggregation, alerting) serves both requirements.
          The GLBA control explicitly cross-references SOX itgc-operations
          in its legal_references.
      - id: sec-802
        relationship: complements
        confidence: 0.65
        rationale: >
          GLBA requires activity logs protected from unauthorized
          modification with sufficient retention for investigations.
          SOX 802 requires immutable records preserved for at least
          5 years and criminalizes record tampering. Both demand
          tamper-evident logging infrastructure and retention policies
          that prevent premature log deletion. The GLBA monitoring
          logs are records that fall under SOX 802's protection
          requirements.
      - id: sec-409
        relationship: complements
        confidence: 0.55
        rationale: >
          GLBA monitoring detects security incidents that may require
          rapid disclosure under SOX 409. SOX 409 mandates real-time
          disclosure of material changes in financial condition, and
          the SEC cybersecurity disclosure rules require material
          incident disclosure within four business days. GLBA monitoring
          provides the detection capability that feeds the SOX 409
          materiality assessment and disclosure process.
      - id: sec-404-a
        relationship: complements
        confidence: 0.55
        rationale: >
          Continuous monitoring is a component of the internal control
          structure that SOX 404(a) requires management to assess.
          Monitoring controls provide evidence of both control operating
          effectiveness and detection of control failures — essential
          inputs to the management assessment of ICFR.

  # glba-sfg-pen-testing → SOX
  - source_control: glba-sfg-pen-testing
    target_controls:
      - id: sec-404-a
        relationship: complements
        confidence: 0.65
        rationale: >
          GLBA penetration testing and vulnerability assessments evaluate
          the effectiveness of security controls. SOX 404(a) requires
          management to assess the effectiveness of internal controls.
          Penetration test and vulnerability assessment results are key
          inputs to the management assessment — they provide independent
          evidence of whether controls are operating effectively or have
          exploitable weaknesses that could affect financial systems.
      - id: itgc-operations
        relationship: complements
        confidence: 0.60
        rationale: >
          Vulnerability management (scanning, patching, remediation) is
          an operational process under SOX ITGC Operations. GLBA
          requires regular vulnerability assessments and penetration
          testing; ITGC Operations requires that patches are evaluated,
          tested, and applied. Both require documented findings,
          prioritized remediation, and tracking to completion.
      - id: sec-404-b
        relationship: complements
        confidence: 0.50
        rationale: >
          Penetration test and vulnerability assessment reports are
          audit evidence that external auditors review when attesting
          to internal control effectiveness under SOX 404(b). These
          reports demonstrate whether the control environment is
          robust or has material weaknesses, directly informing the
          auditor's opinion.

  # glba-sfg-incident → SOX
  - source_control: glba-sfg-incident
    target_controls:
      - id: sec-409
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          GLBA incident response and SOX 409 real-time disclosure
          intersect directly for security incidents that are material
          to the company's financial condition. GLBA requires a written
          incident response plan with notification procedures; SOX 409
          requires rapid disclosure of material events. A material
          cybersecurity incident triggers both frameworks simultaneously —
          the GLBA incident response plan must include SOX disclosure
          assessment, and the SOX disclosure process depends on incident
          detection and triage from the GLBA program.
      - id: itgc-operations
        relationship: complements
        confidence: 0.65
        rationale: >
          Incident management is an operational process covered by SOX
          ITGC Operations. Both GLBA and ITGC Operations require:
          incident logging and classification, escalation procedures,
          root cause analysis, and resolution within defined SLAs. GLBA
          adds regulatory notification requirements; ITGC Operations
          focuses on ensuring incidents do not compromise financial
          data integrity.
      - id: sec-302
        relationship: complements
        confidence: 0.55
        rationale: >
          SOX 302 requires the CEO/CFO to disclose significant
          deficiencies and fraud to auditors and the audit committee.
          Security incidents discovered through GLBA incident response
          may reveal internal control deficiencies or fraud indicators
          that must be disclosed under SOX 302(e). The incident response
          plan must include escalation paths to the SOX disclosure process.
      - id: sec-404-a
        relationship: complements
        confidence: 0.55
        rationale: >
          Security incidents may reveal internal control deficiencies
          that affect the SOX 404(a) management assessment. Incident
          trends, root causes, and remediation actions are inputs to
          the management assessment of whether internal controls are
          operating effectively. A pattern of incidents may indicate
          a significant deficiency or material weakness.

  # glba-sfg-vendor → SOX
  - source_control: glba-sfg-vendor
    target_controls:
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Both GLBA vendor oversight and SOX 404(a) require management
          to assess and maintain controls over third parties that handle
          critical data. GLBA requires due diligence, contractual
          safeguards, and periodic assessment of service providers
          handling NPI. SOX 404(a) requires management to assess
          internal controls, which includes controls over outsourced
          financial processing. For financial institutions using
          third-party processors, these controls overlap significantly.
      - id: itgc-access
        relationship: complements
        confidence: 0.55
        rationale: >
          Service provider oversight includes managing third-party
          access to institutional systems and data. SOX ITGC access
          management covers access provisioning, authorization, and
          review — including service provider access to financial
          systems. GLBA vendor controls extend access management
          principles to the service provider population.
      - id: sec-404-b
        relationship: complements
        confidence: 0.50
        rationale: >
          External auditors under SOX 404(b) evaluate controls over
          outsourced service providers, including reviewing SOC reports
          and assessing complementary user entity controls. GLBA vendor
          oversight provides the governance framework that auditors
          evaluate when assessing whether management has adequate
          controls over third-party service providers.
      - id: itgc-sdlc
        relationship: complements
        confidence: 0.45
        rationale: >
          GLBA vendor oversight includes evaluating third-party software
          and services during acquisition. SOX ITGC SDLC requires
          formal processes for system acquisition and implementation.
          Vendor due diligence for technology service providers feeds
          into the SDLC process for system acquisition decisions.

  # glba-sfg-board-report → SOX
  - source_control: glba-sfg-board-report
    target_controls:
      - id: sec-302
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          GLBA board reporting and SOX 302 executive certification are
          tightly coupled governance controls. Both establish board-level
          and executive accountability for control programs — GLBA
          requires the qualified individual to report annually to the
          board on information security program status; SOX 302 requires
          the CEO/CFO to certify control effectiveness and disclose
          deficiencies. The GLBA board report informs the CEO/CFO's
          ability to certify controls, and the board's review of the
          GLBA report is evidence of governance oversight that supports
          the SOX certification. The GLBA control explicitly cross-
          references SOX sec-302 and sec-404 in its legal_references.
      - id: sec-404-a
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          The GLBA board report covers material matters including risk
          assessment results, control effectiveness, testing results,
          security incidents, and vendor arrangements — the same topics
          that management must assess under SOX 404(a). The board report
          is a governance mechanism that demonstrates management's
          ongoing assessment of internal controls, directly supporting
          the SOX 404(a) annual assessment.
      - id: sec-906
        relationship: complements
        confidence: 0.55
        rationale: >
          SOX 906 imposes criminal penalties for false CEO/CFO
          certifications. The GLBA board report provides the qualified
          individual's independent assessment that informs the CEO/CFO
          certification. If the board report identifies material
          deficiencies that the CEO/CFO fails to disclose, it creates
          criminal exposure under SOX 906. The board report serves as
          a check on the certification process.

  # ============================================================
  # PRETEXTING CONTROL
  # ============================================================

  # glba-pretexting → SOX
  - source_control: glba-pretexting
    target_controls:
      - id: itgc-access
        relationship: complements
        confidence: 0.60
        rationale: >
          Pretexting protections are anti-social-engineering controls
          that complement SOX ITGC access management. Both protect
          against unauthorized access to sensitive data — GLBA addresses
          access obtained through deception (phone calls, impersonation,
          phishing), while SOX ITGC access addresses logical and physical
          access controls. Identity verification procedures required by
          GLBA pretexting controls strengthen the authentication layer
          that SOX ITGC access relies upon.
      - id: sec-409
        relationship: complements
        confidence: 0.50
        rationale: >
          A successful pretexting attack that results in material
          customer data compromise may require real-time disclosure
          under SOX 409. The SEC cybersecurity disclosure rules require
          material incident disclosure within four business days.
          Pretexting detection and investigation capabilities feed into
          the materiality assessment and disclosure process under SOX 409.
      - id: itgc-operations
        relationship: complements
        confidence: 0.50
        rationale: >
          Pretexting detection, reporting, and investigation are
          operational security processes. SOX ITGC Operations covers
          incident management and security monitoring for financial
          systems. Pretexting attempts targeting financial system
          access must be detected, logged, investigated, and
          remediated through the same operational incident management
          processes that ITGC Operations governs.
