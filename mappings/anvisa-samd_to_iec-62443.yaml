id: anvisa-samd_to_iec-62443
title: "ANVISA SaMD to IEC 62443 Control Mapping"
source_framework: anvisa-samd
target_framework: iec-62443
version: "1.0.0"
last_updated: "2026-04-04"
methodology: structural
description: >
  Mapeamento entre os requisitos regulatorios da ANVISA para Software como Dispositivo
  Medico (SaMD) e a serie IEC 62443 (seguranca cibernetica para sistemas industriais de
  automacao e controle). A intersecao ocorre nos requisitos de seguranca cibernetica by
  design, gestao de riscos, ciclo de vida seguro de software e vigilancia pos-mercado,
  especialmente relevante para SaMD conectados a redes hospitalares e sistemas clinicos.

mappings:
  - source_control: art-8
    target_controls:
      - id: iec-4-1-3
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          ANVISA art-8 (Seguranca Cibernetica by Design para SaMD) e equivalente
          ao IEC 62443-4-1-3 (Secure by Design), pois ambos exigem que requisitos
          de seguranca cibernetica sejam incorporados desde a fase de projeto do
          produto, nao apenas adicionados posteriormente.
      - id: iec-4-1-2
        relationship: implements
        confidence: 0.85
        rationale: >
          A seguranca by design do art-8 implementa os requisitos de definicao de
          requisitos de seguranca do IEC 62443-4-1-2 (Security Requirements
          Definition), que exige documentacao formal de requisitos de seguranca
          antes do desenvolvimento.

  - source_control: art-15
    target_controls:
      - id: iec-2-1-2
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          ANVISA art-15 (Gestao de Riscos - ISO 14971) mapeia ao IEC 62443-2-1-2
          (Security Risk Assessment). Ambos exigem avaliacao sistematica de riscos,
          porem a ISO 14971 foca em riscos clinicos enquanto o IEC 62443 foca em
          riscos ciberneticos. Para SaMD conectados, ambas as perspectivas devem
          ser integradas.
      - id: iec-2-1-1
        relationship: complements
        confidence: 0.78
        rationale: >
          A gestao de riscos do art-15 complementa o IEC 62443-2-1-1 (Security
          Management System), pois o processo de gestao de riscos clinicos de
          dispositivos medicos deve estar integrado ao sistema de gestao de
          seguranca cibernetica.

  - source_control: art-16
    target_controls:
      - id: iec-2-1-2
        relationship: implements
        confidence: 0.88
        rationale: >
          ANVISA art-16 (Analise e Avaliacao de Riscos de SaMD) implementa
          parcialmente o IEC 62443-2-1-2 (Security Risk Assessment) ao exigir
          avaliacao formal de riscos para SaMD, incluindo riscos de seguranca
          cibernetica que possam impactar a seguranca do paciente.

  - source_control: art-17
    target_controls:
      - id: iec-2-1-3
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          ANVISA art-17 (Medidas de Controle e Mitigacao de Riscos) mapeia ao
          IEC 62443-2-1-3 (System Security Architecture), pois as medidas de
          mitigacao de riscos para SaMD devem considerar a arquitetura de
          seguranca do sistema, incluindo segmentacao de rede e controles de
          acesso da infraestrutura hospitalar.

  - source_control: art-10
    target_controls:
      - id: iec-4-1-1
        relationship: intersects-with
        confidence: 0.93
        rationale: >
          ANVISA art-10 (Ciclo de Vida do Software - IEC 62304) mapeia ao
          IEC 62443-4-1-1 (Secure Product Development Lifecycle). O IEC 62304
          define o ciclo de vida de software medico, enquanto o IEC 62443-4-1
          define o ciclo de vida de desenvolvimento seguro de produtos. Para SaMD,
          ambos os ciclos devem ser integrados para garantir seguranca clinica e
          cibernetica simultaneamente.

  - source_control: art-12
    target_controls:
      - id: iec-4-1-1
        relationship: complements
        confidence: 0.80
        rationale: >
          ANVISA art-12 (Processo de Desenvolvimento e Boas Praticas) complementa
          o IEC 62443-4-1-1 (Secure Product Development Lifecycle) ao exigir
          processos de desenvolvimento formais que, no contexto de SaMD conectados,
          devem incorporar praticas de desenvolvimento seguro.

  - source_control: art-13
    target_controls:
      - id: iec-4-2-2
        relationship: intersects-with
        confidence: 0.87
        rationale: >
          ANVISA art-13 (Verificacao e Validacao de Software) mapeia ao
          IEC 62443-4-2-2 (Component Security Testing). A verificacao e validacao
          de SaMD deve incluir testes de seguranca de componentes para garantir que
          vulnerabilidades ciberneticas nao comprometam a funcionalidade clinica.
      - id: iec-4-2-1
        relationship: complements
        confidence: 0.78
        rationale: >
          A verificacao e validacao do art-13 complementa o IEC 62443-4-2-1
          (Component Security Requirements), pois os requisitos de seguranca de
          componentes devem ser verificados durante o processo de validacao do SaMD.

  - source_control: art-11
    target_controls:
      - id: iec-4-1-2
        relationship: complements
        confidence: 0.80
        rationale: >
          ANVISA art-11 (Controles de Design e Documentacao Tecnica) complementa
          o IEC 62443-4-1-2 (Security Requirements Definition), pois a documentacao
          tecnica de design de SaMD deve incluir a definicao de requisitos de
          seguranca cibernetica como parte integral dos controles de design.

  - source_control: art-20
    target_controls:
      - id: iec-3-3-fr6
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          ANVISA art-20 (Vigilancia Pos-Mercado de SaMD) mapeia ao IEC 62443-3-3
          FR6 (Timely Response to Events), pois a vigilancia pos-mercado de SaMD
          inclui deteccao e resposta a eventos de seguranca cibernetica que possam
          afetar a seguranca e eficacia do dispositivo apos comercializacao.
      - id: iec-2-1-1
        relationship: complements
        confidence: 0.75
        rationale: >
          A vigilancia pos-mercado do art-20 complementa o IEC 62443-2-1-1
          (Security Management System) ao exigir monitoramento continuo que
          alimente o ciclo de gestao de seguranca com dados de campo.

  - source_control: art-21
    target_controls:
      - id: iec-3-3-fr3
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ANVISA art-21 (Gestao de Atualizacoes e Alteracoes de Registro) mapeia
          ao IEC 62443-3-3 FR3 (System Integrity), pois a gestao de patches e
          atualizacoes de SaMD deve preservar a integridade do sistema, incluindo
          verificacao de que atualizacoes nao introduzam novas vulnerabilidades.

  - source_control: art-14
    target_controls:
      - id: iec-3-3-fr3
        relationship: complements
        confidence: 0.80
        rationale: >
          ANVISA art-14 (Manutencao e Gestao de Mudancas de Software) complementa
          o IEC 62443-3-3 FR3 (System Integrity) ao exigir que mudancas de
          software sejam gerenciadas de forma controlada, preservando a integridade
          do sistema e garantindo que modificacoes nao degradem a postura de
          seguranca cibernetica.
      - id: iec-4-1-1
        relationship: implements
        confidence: 0.82
        rationale: >
          A gestao de mudancas do art-14 implementa aspectos do IEC 62443-4-1-1
          (Secure Product Development Lifecycle), pois o processo de manutencao
          e parte integral do ciclo de vida seguro do produto.

  - source_control: art-4
    target_controls:
      - id: iec-2-1-4
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          ANVISA art-4 (Obrigacoes do Fabricante de SaMD) mapeia ao IEC 62443-2-1-4
          (Security Policy and Procedures), pois as obrigacoes regulatorias do
          fabricante incluem estabelecer politicas e procedimentos de seguranca
          para o ciclo de vida completo do dispositivo medico.

  - source_control: art-9
    target_controls:
      - id: iec-3-3-fr5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ANVISA art-9 (Interoperabilidade e Padroes de Dados Clinicos) mapeia ao
          IEC 62443-3-3 FR5 (Restricted Data Flow), pois a interoperabilidade de
          SaMD com sistemas hospitalares exige controle de fluxo de dados entre
          zonas de seguranca, garantindo que interfaces clinicas nao exponham
          dados a redes nao autorizadas.
      - id: iec-3-3-fr4
        relationship: complements
        confidence: 0.78
        rationale: >
          A interoperabilidade do art-9 complementa o IEC 62443-3-3 FR4 (Data
          Confidentiality), pois a troca de dados clinicos entre sistemas deve
          preservar a confidencialidade das informacoes de saude durante toda a
          cadeia de comunicacao.
