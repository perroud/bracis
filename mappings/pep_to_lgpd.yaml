id: pep_to_lgpd
title: "PEP to LGPD Control Mapping"
source_framework: pep
target_framework: lgpd
version: "1.0.0"
last_updated: "2026-04-06"
methodology: structural
description: >
  Mapping between Resolucao CFM 1.821/2007 and complementary norms (Prontuario
  Eletronico do Paciente -- PEP) and the Lei Geral de Protecao de Dados Pessoais
  (LGPD -- Lei 13.709/2018). The PEP framework regulates electronic health records
  in Brazil, which inherently involve intensive processing of sensitive personal
  data (health data -- LGPD art. 5, II). Every PEP control has direct or indirect
  implications for LGPD compliance.

mappings:
  - source_control: art-1
    target_controls:
      - id: art-7
        relationship: complements
        confidence: 0.85
        rationale: >
          PEP art-1 authorizes digitization and electronic exchange of identified
          health information. Processing identified health data requires a legal
          basis under LGPD art-7 (e.g., health protection, legal obligation, or
          consent). The PEP establishes the regulatory authorization that serves
          as one of the legal bases for processing.
      - id: art-11
        relationship: complements
        confidence: 0.90
        rationale: >
          PEP art-1 defines the PEP as the legal repository of clinical,
          administrative, and sociodemographic information. Health data is
          classified as sensitive personal data under LGPD art-11, which
          requires specific and highlighted consent or an applicable legal
          exception for processing. The PEP framework complements this by
          establishing the regulatory context for health data processing.
      - id: art-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          PEP art-1 defines the PEP and its contents (clinical, administrative,
          sociodemographic data). LGPD art-5 defines personal data, sensitive
          personal data (including health data), and database concepts. Both
          articles provide foundational definitions that intersect in the health
          data domain.

  - source_control: art-2
    target_controls:
      - id: art-46
        relationship: complements
        confidence: 0.88
        rationale: >
          PEP art-2 requires GED systems to guarantee integrity, authenticity,
          and accessibility of digitized documents throughout the legally mandated
          retention period. LGPD art-46 requires technical and administrative
          security measures to protect personal data from unauthorized access,
          destruction, loss, or alteration. The GED integrity requirements
          directly complement the LGPD security obligations.
      - id: art-49
        relationship: complements
        confidence: 0.82
        rationale: >
          PEP art-2 mandates that digitization systems preserve legibility and
          fidelity. LGPD art-49 requires systems to be structured according to
          security requirements and good practice standards. The PEP
          digitization quality requirements complement the LGPD system
          structuring obligations.

  - source_control: art-3
    target_controls:
      - id: art-46
        relationship: complements
        confidence: 0.90
        rationale: >
          PEP art-3 defines security guarantee levels (NGS1 and NGS2) and
          mandates ICP-Brasil digital signatures. These are specific technical
          security measures that directly complement LGPD art-46, which requires
          adoption of technical measures to protect personal data. Digital
          signatures provide authentication, integrity, and non-repudiation.
      - id: art-47
        relationship: complements
        confidence: 0.78
        rationale: >
          The NGS certification levels defined in PEP art-3 require security to
          be built into the system from design. This complements LGPD art-47
          (Privacy by Design), which mandates security measures from the
          conception phase of the product or service.

  - source_control: art-4
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.88
        rationale: >
          PEP art-4 establishes SBIS/CFM certification as mandatory for PEP
          systems, covering security requirements for data protection. This
          implements LGPD art-46 by defining a formal certification framework
          that validates compliance with technical security measures for
          protecting sensitive health data.
      - id: art-50
        relationship: complements
        confidence: 0.80
        rationale: >
          The SBIS/CFM certification process (PEP art-4) is a sector-specific
          good practice and governance standard that complements LGPD art-50,
          which encourages controllers to formulate good practice rules and
          governance programs including security standards and technical
          patterns.

  - source_control: art-5
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.95
        rationale: >
          PEP art-5 specifies NGS1 security requirements: access control with
          individual authentication, audit logs, backup and recovery, data
          integrity (append-only), encryption in transit and at rest, and
          availability. These are concrete technical measures that directly
          implement LGPD art-46, which requires security measures to protect
          personal data from unauthorized access, destruction, loss, or
          alteration.
      - id: art-47
        relationship: implements
        confidence: 0.85
        rationale: >
          NGS1 requirements (PEP art-5) must be built into PEP systems from
          design, implementing LGPD art-47 which mandates that security
          measures be observed from the conception phase through execution.
      - id: art-6
        relationship: complements
        confidence: 0.82
        rationale: >
          PEP art-5 encryption and access control requirements complement
          the LGPD art-6 principles of security (inciso VII) and prevention
          (inciso VIII), which require adoption of measures to prevent damages
          from personal data processing.

  - source_control: art-6
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.95
        rationale: >
          PEP art-6 defines NGS2 requirements including ICP-Brasil digital
          certificates, per-record digital signatures, ICP-Brasil timestamps,
          and post-signature immutability. These are advanced technical security
          measures that directly implement LGPD art-46 requirements for
          protecting sensitive health data.
      - id: art-47
        relationship: implements
        confidence: 0.85
        rationale: >
          NGS2 requirements (PEP art-6) mandate security architecture from
          design (digital signature infrastructure, immutable storage), directly
          implementing LGPD art-47 Privacy by Design obligation.
      - id: art-49
        relationship: complements
        confidence: 0.80
        rationale: >
          PEP art-6 NGS2 mandates that systems be structured to support digital
          signatures and immutability. This complements LGPD art-49 which
          requires systems to be structured according to security requirements
          and good practice standards.

  - source_control: art-7
    target_controls:
      - id: art-25
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PEP art-7 requires interoperability using open standards (HL7, FHIR,
          TISS, DICOM) and standardized terminologies. LGPD art-25 requires
          data to be maintained in interoperable and structured format. Both
          articles address data interoperability, though PEP focuses on health
          data exchange and LGPD on public sector data sharing.
      - id: art-46
        relationship: complements
        confidence: 0.78
        rationale: >
          PEP art-7 interoperability requirements include secure data exchange
          between systems. Secure inter-system communication complements LGPD
          art-46 security measures, particularly protection against unauthorized
          communication of personal data.
      - id: art-18
        relationship: complements
        confidence: 0.75
        rationale: >
          PEP art-7, inciso V, requires the PEP to generate reports, discharge
          summaries, and medical documents from recorded data. This capability
          complements LGPD art-18 data subject rights, particularly the right
          to access data (inciso II), as it enables the generation of patient
          records upon request.

  - source_control: art-8
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.92
        rationale: >
          PEP art-8 mandates exclusive use of ICP-Brasil digital certificates
          for signing electronic health records, with professional council
          number as certificate attribute. This implements a specific technical
          security measure under LGPD art-46 by ensuring authenticated,
          non-repudiable access to sensitive health data.
      - id: art-47
        relationship: complements
        confidence: 0.80
        rationale: >
          The requirement for ICP-Brasil certificates integrated into the PEP
          from the design phase (PEP art-8) complements LGPD art-47 Privacy
          by Design, as authentication infrastructure must be conceived from
          the system design stage.

  - source_control: art-9
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.93
        rationale: >
          PEP art-9 mandates that every clinical record must be digitally signed
          at the moment of creation, covering all content (text, structured data,
          images, attachments). It prohibits batch or retroactive signing. These
          are specific technical integrity measures that directly implement LGPD
          art-46 protection against unauthorized alteration of personal data.
      - id: art-37
        relationship: complements
        confidence: 0.78
        rationale: >
          PEP art-9 digital signature at the moment of registration creates
          an auditable trail of who recorded what and when, complementing LGPD
          art-37 which requires maintaining a record of processing activities.

  - source_control: art-10
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.92
        rationale: >
          PEP art-10 mandates ICP-Brasil timestamps on all digitally signed
          clinical records, ensuring temporal proof of data integrity. This
          implements a specific technical security measure under LGPD art-46,
          providing cryptographic proof of data state at a specific point in
          time, protecting against unauthorized alteration.
      - id: art-37
        relationship: complements
        confidence: 0.80
        rationale: >
          ICP-Brasil timestamps (PEP art-10) provide irrefutable temporal proof
          of when records were created, complementing LGPD art-37 requirement
          for maintaining records of processing operations, especially by
          providing temporal evidence of processing activities.

  - source_control: art-11
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.92
        rationale: >
          PEP art-11 establishes that PEP with NGS2 has full legal validity,
          equivalent to paper records. This requires maintaining the
          technological infrastructure for signature and timestamp verification
          throughout the retention period. These long-term security preservation
          requirements implement LGPD art-46 obligations for technical security
          measures over the data lifecycle.
      - id: art-42
        relationship: complements
        confidence: 0.78
        rationale: >
          PEP art-11, paragrafo 2, assigns institutional responsibility for
          maintaining verification infrastructure. Failure to maintain this
          infrastructure could lead to inability to prove data integrity,
          complementing LGPD art-42 liability provisions for damages caused
          by data processing activities.
      - id: art-44
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          PEP art-11 requires maintaining verifiability of digital signatures
          and timestamps. Failure to maintain this infrastructure constitutes
          irregular data processing under LGPD art-44, which defines irregular
          processing as failing to provide the security the data subject can
          reasonably expect.

  - source_control: art-12
    target_controls:
      - id: art-15
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          PEP art-12 mandates a minimum 20-year retention period for patient
          records. LGPD art-15 defines when data processing terminates. The PEP
          retention requirement creates a legal obligation that intersects with
          LGPD art-15, as the 20-year period constitutes a legal/regulatory
          mandate that overrides general termination of processing rules.
      - id: art-16
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          PEP art-12 requires 20-year minimum retention. LGPD art-16 requires
          elimination of data after termination of processing but authorizes
          retention for legal/regulatory obligations (inciso I). The PEP
          retention requirement is the exact legal obligation referenced in
          LGPD art-16, I, that justifies continued storage of health data.
      - id: art-46
        relationship: complements
        confidence: 0.82
        rationale: >
          PEP art-12, paragrafo 3, requires maintaining data recoverability
          throughout the 20-year retention period regardless of technological
          evolution. This complements LGPD art-46 security obligations by
          requiring long-term data availability and integrity preservation.

  - source_control: art-13
    target_controls:
      - id: art-16
        relationship: implements
        confidence: 0.92
        rationale: >
          PEP art-13 mandates secure and irreversible destruction of patient
          records after the retention period, including logical and physical
          destruction of electronic data using forensic-resistant sanitization
          methods. This implements LGPD art-16 requirement for data
          elimination after termination of processing, providing the specific
          technical procedures for health data disposal.
      - id: art-15
        relationship: complements
        confidence: 0.82
        rationale: >
          PEP art-13 disposal procedures complement LGPD art-15 termination of
          processing rules by defining the formal process that occurs after
          the legally mandated retention period ends and processing terminates.
      - id: art-46
        relationship: complements
        confidence: 0.78
        rationale: >
          PEP art-13 requires formal disposal approval by the records review
          committee and destruction certificates. These administrative security
          measures complement LGPD art-46 by ensuring that data disposal is
          itself a controlled and secure process.

  - source_control: art-14
    target_controls:
      - id: art-46
        relationship: complements
        confidence: 0.85
        rationale: >
          PEP art-14 regulates microfilming and digitization of paper records
          for preservation, requiring fidelity and quality standards. These
          requirements complement LGPD art-46 security measures by ensuring
          that the conversion process maintains data integrity and
          accessibility, which are essential security properties for personal
          data.
      - id: art-16
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          PEP art-14, paragrafo 3, authorizes elimination of paper originals
          after digitization with NGS2-certified systems. This intersects with
          LGPD art-16 data elimination rules, as the paper-to-digital conversion
          involves eliminating one form of personal data storage while
          maintaining the data in another form.

  - source_control: art-15
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.90
        rationale: >
          PEP art-15 mandates a media and format migration program to ensure
          accessibility and integrity of electronic health records throughout
          the 20-year retention period. This implements LGPD art-46 by
          establishing specific long-term technical measures to protect personal
          data against loss through technological obsolescence.
      - id: art-49
        relationship: complements
        confidence: 0.82
        rationale: >
          PEP art-15 requires documented migration processes with integrity
          validation. This complements LGPD art-49 by ensuring systems remain
          structured according to security requirements and good practices
          even as technology evolves over the 20-year retention period.

  - source_control: art-16
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.95
        rationale: >
          PEP art-16 establishes access control requirements: individual
          non-transferable credentials, access restricted to professionals
          involved in patient care, segregation of duties with least privilege,
          and patient right to access their records. These directly implement
          LGPD art-46 technical security measures against unauthorized access
          to personal data.
      - id: art-18
        relationship: implements
        confidence: 0.88
        rationale: >
          PEP art-16, inciso IV, grants patients the right to access their
          medical records and request copies. This implements LGPD art-18 data
          subject rights, particularly the right to access data (inciso II)
          and the right to confirmation of processing (inciso I).
      - id: art-47
        relationship: complements
        confidence: 0.80
        rationale: >
          PEP art-16 access control architecture (RBAC, least privilege, break-
          glass) must be designed into the system from conception, complementing
          LGPD art-47 Privacy by Design requirement.
      - id: art-6
        relationship: complements
        confidence: 0.82
        rationale: >
          PEP art-16 least privilege and access restrictions complement LGPD
          art-6 principles of necessity (inciso III -- limit processing to the
          minimum necessary) and security (inciso VII -- technical and
          administrative measures to protect personal data).

  - source_control: art-17
    target_controls:
      - id: art-37
        relationship: implements
        confidence: 0.92
        rationale: >
          PEP art-17 mandates a complete and immutable audit trail recording
          all operations on patient records (user, date/time, operation type,
          data accessed, access origin). This directly implements LGPD art-37
          requirement to maintain records of processing operations, providing
          a comprehensive and immutable record of all data processing activities.
      - id: art-38
        relationship: complements
        confidence: 0.80
        rationale: >
          PEP art-17 audit trail data provides essential input for the LGPD
          art-38 Data Protection Impact Assessment (RIPD), as the audit records
          document what data is processed, by whom, and under what
          circumstances.
      - id: art-46
        relationship: implements
        confidence: 0.88
        rationale: >
          PEP art-17 immutable audit trail with 20-year retention is a specific
          technical security measure that implements LGPD art-46 requirements,
          providing accountability and traceability for all personal data
          processing operations.
      - id: art-48
        relationship: complements
        confidence: 0.78
        rationale: >
          PEP art-17 audit trail records are essential for LGPD art-48 security
          incident communication, as they enable identification of affected
          data, involved subjects, and the timeline of unauthorized access
          during incident investigation and reporting.

  - source_control: art-18
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.92
        rationale: >
          PEP art-18 mandates backup and disaster recovery policies with RPO
          maximum of 24 hours, geographically separate backup storage, and
          semiannual restoration testing. These directly implement LGPD art-46
          security measures, specifically protection against accidental
          destruction and loss of personal data.
      - id: art-47
        relationship: complements
        confidence: 0.78
        rationale: >
          PEP art-18 DR architecture requirements (geographic replication,
          encrypted backups, failover capability) must be designed into the
          system from conception, complementing LGPD art-47 Privacy by Design
          requirement for security from the design phase.
      - id: art-44
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          PEP art-18 establishes standards for backup and availability. Failure
          to meet these standards could constitute irregular data processing
          under LGPD art-44, which considers failure to provide expected
          security as irregular processing.

  - source_control: art-19
    target_controls:
      - id: art-7
        relationship: complements
        confidence: 0.85
        rationale: >
          PEP art-19 authorizes electronic medical documents (prescriptions,
          certificates, reports) signed with ICP-Brasil. Issuing these
          documents involves processing personal health data, requiring a
          legal basis under LGPD art-7. The PEP/CFM regulation provides the
          legal/regulatory framework referenced in art-7, II (legal obligation).
      - id: art-11
        relationship: complements
        confidence: 0.88
        rationale: >
          Electronic medical documents (PEP art-19) contain sensitive health
          data. LGPD art-11 governs processing of sensitive data, requiring
          specific consent or applicable legal exceptions. The CFM regulation
          provides the regulatory basis for processing health data in
          electronic medical documents.
      - id: art-46
        relationship: implements
        confidence: 0.85
        rationale: >
          PEP art-19, inciso IV, requires all electronic medical documents to
          be verifiable by third parties through a validation service. This
          implements LGPD art-46 security measures by ensuring document
          authenticity and integrity can be verified, protecting against
          unauthorized alteration or forgery.
      - id: art-6
        relationship: complements
        confidence: 0.78
        rationale: >
          PEP art-19 third-party verification service for electronic medical
          documents (QR code, validation portal) complements LGPD art-6
          transparency principle (inciso VI), enabling data subjects and
          recipients to verify the authenticity of documents containing
          personal data.

  - source_control: art-20
    target_controls:
      - id: art-6
        relationship: complements
        confidence: 0.85
        rationale: >
          PEP art-20 mandates that electronic medical documents be verifiable
          and that the issuing institution maintain a verification service for
          at least 5 years. This complements LGPD art-6 transparency principle
          (inciso VI) by ensuring that data subjects and recipients can verify
          the authenticity of documents containing their personal data.
      - id: art-46
        relationship: implements
        confidence: 0.82
        rationale: >
          PEP art-20, paragrafo 3, requires maintaining the verification
          service with high availability for the mandated period. This
          implements LGPD art-46 security measures by ensuring continued
          ability to verify document authenticity and integrity, which
          constitutes a technical measure for data protection.
      - id: art-42
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          PEP art-20 assigns responsibility to the issuing institution for
          maintaining the verification service. Failure to maintain this
          service, leading to inability to verify document authenticity,
          intersects with LGPD art-42 liability provisions, as it could
          cause damages to data subjects who rely on electronic medical
          documents.

summary:
  total_source_controls: 20
  total_target_controls_referenced: 15
  total_mappings: 53
  relationship_distribution:
    implements: 21
    complements: 25
    intersects-with: 7
  coverage:
    source_coverage: "100%"
    description: >
      All 20 PEP source controls are mapped to at least one LGPD target
      control. The primary mapping axis is LGPD art-46 (security measures),
      which is the target for most PEP controls given the framework's focus
      on technical security requirements for electronic health records. Key
      secondary mappings include art-18 (data subject rights), art-37
      (records of processing operations), art-16 (data elimination), and
      art-11 (sensitive data processing).
