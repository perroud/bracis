id: hitrust-csf_to_nist-800-53-rev5
title: "HITRUST CSF to NIST 800-53 Rev 5 Control Mapping"
source_framework: hitrust-csf
target_framework: nist-800-53-rev5
version: "1.0.0"
last_updated: "2026-04-03"
methodology: semantic

mappings:
  # Category 0 — Information Security Management Program
  - source_control: cat-0
    target_controls:
      - id: pl-1
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          HITRUST Category 0 (Information Security Management Program) maps to
          NIST PL-1 (Planning Policy and Procedures). Both require the
          establishment of a formal information security management program
          with documented policies, governance structure, and organizational
          commitment to security.
      - id: pm-1
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          NIST PM-1 (Information Security Program Plan) maps to HITRUST
          Category 0's requirement for a comprehensive information security
          management program. Both mandate a program-level plan that defines
          the structure, objectives, and governance of the security program.

  # Category 1 — Access Control
  - source_control: cat-1
    target_controls:
      - id: ac-1
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          HITRUST Category 1 (Access Control) maps to NIST AC-1 (Access
          Control Policy and Procedures). Both require documented access
          control policies that define who has access to what resources
          and under what conditions.
      - id: ac-2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          NIST AC-2 (Account Management) supports HITRUST Category 1
          requirements for managing user accounts throughout their
          lifecycle, including provisioning, modification, review,
          and deprovisioning.
      - id: ac-3
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          NIST AC-3 (Access Enforcement) implements the technical enforcement
          mechanisms required by HITRUST Category 1 for restricting access
          to information systems and data based on approved authorizations.
      - id: ac-4
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          NIST AC-4 (Information Flow Enforcement) supports HITRUST
          Category 1 by controlling the flow of information between systems,
          networks, and security domains, particularly relevant in healthcare
          environments where PHI must be tightly controlled.
      - id: ac-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          NIST AC-5 (Separation of Duties) maps to HITRUST Category 1
          requirements for segregation of duties in access control to prevent
          conflicts of interest and reduce the risk of unauthorized actions.
      - id: ac-6
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          NIST AC-6 (Least Privilege) supports HITRUST Category 1 by ensuring
          that users and processes are granted only the minimum access
          necessary, critical for protecting sensitive healthcare data.

  # Category 3 — Risk Management
  - source_control: cat-3
    target_controls:
      - id: ra-1
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          HITRUST Category 3 (Risk Management) maps to NIST RA-1 (Risk
          Assessment Policy and Procedures). Both require documented risk
          management policies and procedures, including methodologies for
          identifying, assessing, and mitigating risks to organizational
          information and systems.
      - id: ra-3
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          NIST RA-3 (Risk Assessment) directly maps to HITRUST Category 3
          requirements for conducting risk assessments. Both require
          identification of threats, vulnerabilities, likelihood,
          and impact to organizational operations and assets.

  # Category 4 — Security Policy
  - source_control: cat-4
    target_controls:
      - id: pl-1
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          HITRUST Category 4 (Security Policy) maps to NIST PL-1 (Planning
          Policy and Procedures). Both require the development, documentation,
          dissemination, and periodic review of security policies that establish
          the organizational security posture.
      - id: pl-2
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          NIST PL-2 (System Security and Privacy Plans) supports HITRUST
          Category 4 by requiring system-level security plans that implement
          the organizational security policies defined in Category 4.

  # Category 9 — Communications and Operations Management
  - source_control: cat-9
    target_controls:
      - id: cm-1
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          NIST CM-1 (Configuration Management Policy and Procedures) maps
          to HITRUST Category 9 (Communications and Operations Management)
          requirements for managing system configurations and operational
          procedures for information processing facilities.
      - id: si-3
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          NIST SI-3 (Malicious Code Protection) maps to HITRUST Category 9
          requirements for protection against malicious software, including
          detection, prevention, and recovery mechanisms.
      - id: sc-7
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          NIST SC-7 (Boundary Protection) maps to HITRUST Category 9
          network management requirements, including monitoring and
          controlling communications at external and internal boundaries
          of information systems.
      - id: au-6
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          NIST AU-6 (Audit Record Review, Analysis, and Reporting) supports
          HITRUST Category 9 requirements for monitoring and reviewing
          operational activities, audit logs, and system events for
          anomalies or security incidents.

  # Category 10 — Information Systems Acquisition, Development, and Maintenance
  - source_control: cat-10
    target_controls:
      - id: sa-3
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          NIST SA-3 (System Development Life Cycle) maps directly to HITRUST
          Category 10 (Information Systems Acquisition, Development, and
          Maintenance). Both require a formal SDLC that incorporates security
          requirements from inception through disposal.
      - id: sa-11
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          NIST SA-11 (Developer Testing and Evaluation) supports HITRUST
          Category 10 requirements for security testing during development,
          including code reviews, vulnerability scanning, and penetration
          testing of healthcare information systems.

  # Category 11 — Information Security Incident Management
  - source_control: cat-11
    target_controls:
      - id: ir-1
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          NIST IR-1 (Incident Response Policy and Procedures) maps to HITRUST
          Category 11 (Information Security Incident Management). Both require
          documented incident response policies, procedures, and organizational
          commitment to managing security incidents, including breach
          notification requirements critical in healthcare.
      - id: ir-4
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          NIST IR-4 (Incident Handling) directly maps to HITRUST Category 11
          requirements for incident handling, including preparation, detection,
          analysis, containment, eradication, and recovery processes.
      - id: ir-6
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          NIST IR-6 (Incident Reporting) supports HITRUST Category 11
          requirements for reporting security incidents to appropriate
          authorities and stakeholders, including HIPAA breach notification
          requirements.

  # Category 13 — Privacy Practices
  - source_control: cat-13
    target_controls:
      - id: privacy-family
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          HITRUST Category 13 (Privacy Practices) maps to the NIST 800-53
          Privacy control family (Appendix J). This includes controls across
          multiple privacy areas: Authority and Purpose (AP), Accountability,
          Audit, and Risk Management (AR), Data Quality and Integrity (DI),
          Data Minimization and Retention (DM), Individual Participation and
          Redress (IP), Security (SE), Transparency (TR), and Use Limitation
          (UL). HITRUST Category 13 is particularly relevant for HIPAA
          Privacy Rule compliance and maps broadly across these NIST
          privacy controls.
