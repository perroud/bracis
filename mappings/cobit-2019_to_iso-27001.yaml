id: cobit-2019_to_iso-27001
title: "COBIT 2019 to ISO/IEC 27001:2022 Control Mapping"
source_framework: cobit-2019
target_framework: iso-27001-2022
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # ──────────────────────────────────────────────
  # EDM — Evaluate, Direct and Monitor
  # ──────────────────────────────────────────────

  - source_control: edm01
    target_controls:
      - id: a5.1
        relationship: superset-of
        confidence: 0.90
        rationale: >
          EDM01 establishes the entire I&T governance framework including
          principles, processes, structures, and authority. ISO A.5.1 requires
          management-approved information security policies. EDM01 is broader
          in scope — it encompasses all governance framework design including
          security policies — making A.5.1 a subset of the governance structure
          EDM01 mandates.
      - id: a5.2
        relationship: superset-of
        confidence: 0.85
        rationale: >
          EDM01 requires defining governance structures with clarity of
          responsibilities and authority for all I&T functions. ISO A.5.2
          requires defining and allocating information security roles and
          responsibilities. EDM01's scope is broader (all I&T governance
          roles), while A.5.2 focuses specifically on security roles — a
          subset of EDM01's governance accountability requirements.
      - id: a5.36
        relationship: complements
        confidence: 0.70
        rationale: >
          EDM01 requires regular evaluation of the governance system design
          for continued effectiveness and alignment. ISO A.5.36 requires
          regular compliance reviews against established policies. EDM01's
          governance framework review and A.5.36's compliance verification
          are complementary assurance mechanisms operating at different
          organizational levels.

  - source_control: edm03
    target_controls:
      - id: a8.8
        relationship: superset-of
        confidence: 0.85
        rationale: >
          EDM03 directs enterprise-wide I&T risk optimization — defining risk
          appetite, tolerance, and ensuring risk management aligns with business
          objectives. ISO A.8.8 addresses a specific risk domain: obtaining
          vulnerability information, evaluating exposure, and taking measures.
          Vulnerability management is one component of the broader risk
          optimization EDM03 governs.
      - id: a5.1
        relationship: complements
        confidence: 0.70
        rationale: >
          EDM03 requires the board to define risk appetite and tolerance for
          I&T risk. ISO A.5.1 requires information security policies approved
          by management. Risk appetite definitions directly inform the
          security policies A.5.1 mandates, making them complementary — risk
          governance driving policy content.
      - id: a5.36
        relationship: complements
        confidence: 0.65
        rationale: >
          EDM03 requires monitoring the risk profile against defined
          thresholds and ensuring risk management practices are consistent.
          ISO A.5.36 requires regular compliance reviews against policies.
          Risk profile monitoring and compliance verification serve as
          complementary assurance mechanisms for risk governance.

  - source_control: edm05
    target_controls:
      - id: a5.1
        relationship: complements
        confidence: 0.65
        rationale: >
          EDM05 requires effective stakeholder communication regarding I&T
          governance, performance, risk, and compliance. ISO A.5.1 requires
          that security policies be communicated to and acknowledged by
          relevant personnel. Both address the communication of governance
          and security expectations to stakeholders, though EDM05 covers
          broader governance communication beyond security policies alone.
      - id: a5.2
        relationship: complements
        confidence: 0.60
        rationale: >
          EDM05 requires identifying stakeholders and ensuring their needs
          and expectations are addressed in I&T decision making. ISO A.5.2
          requires that security roles and responsibilities be defined and
          allocated. Stakeholder engagement mechanisms complement role
          definition by ensuring those assigned security roles understand
          expectations and have channels for communication.

  # ──────────────────────────────────────────────
  # APO — Align, Plan and Organize
  # ──────────────────────────────────────────────

  - source_control: apo01
    target_controls:
      - id: a5.1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          APO01 implements the management framework covering policies,
          procedures, roles, and organizational structures for all I&T
          functions. ISO A.5.1 requires information security policies
          defined, approved, and communicated. Both require a structured
          policy framework, but APO01 covers all I&T management policies
          while A.5.1 focuses specifically on security policy — their
          scope overlaps on the policy management dimension.
      - id: a5.2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          APO01 establishes organizational structures, roles, and
          responsibilities for I&T management. ISO A.5.2 requires
          defining and allocating information security roles. Both
          address role definition, but APO01 covers all I&T management
          roles while A.5.2 targets security-specific roles — they
          intersect on the security role definition dimension.
      - id: a8.9
        relationship: complements
        confidence: 0.60
        rationale: >
          APO01 requires implementing reliable and repeatable activities
          and maintaining services, infrastructure, and applications
          consistently. ISO A.8.9 requires documented configurations
          for hardware, software, services, and networks. The management
          framework's consistency requirements complement configuration
          management by providing the governance layer under which
          configuration standards operate.

  - source_control: apo02
    target_controls:
      - id: a5.1
        relationship: complements
        confidence: 0.65
        rationale: >
          APO02 defines I&T strategy aligned with enterprise strategy,
          including future direction and investment priorities. ISO A.5.1
          requires information security policies. Strategic planning
          complements security policy by ensuring policies are aligned
          with the organization's strategic direction and business
          objectives — strategy informs policy content and priorities.
      - id: a5.23
        relationship: complements
        confidence: 0.60
        rationale: >
          APO02 covers strategic technology decisions including cloud
          strategy and build-vs-buy decisions. ISO A.5.23 requires
          processes for acquisition, use, and management of cloud services
          aligned with security requirements. Strategic planning of
          technology adoption complements cloud security governance by
          defining the strategic context for cloud service selection.

  - source_control: apo04
    target_controls:
      - id: a5.23
        relationship: complements
        confidence: 0.55
        rationale: >
          APO04 manages innovation including evaluation of emerging
          technologies, services, and their business impact. ISO A.5.23
          requires security processes for cloud service acquisition and
          use. Innovation management complements cloud security governance
          by ensuring new technology adoptions (including cloud services)
          are assessed for business value alongside security implications.
      - id: a8.25
        relationship: complements
        confidence: 0.55
        rationale: >
          APO04 promotes systematic innovation through experimentation,
          prototyping, and adoption tracking. ISO A.8.25 requires rules
          for secure development of software and systems. Innovation
          practices complement secure development by introducing new
          technologies and approaches that must be evaluated through the
          security lens A.8.25 establishes.

  - source_control: apo06
    target_controls:
      - id: a5.1
        relationship: complements
        confidence: 0.55
        rationale: >
          APO06 manages I&T budgets, costs, and financial resources.
          ISO A.5.1 requires information security policies. Budget and
          cost management complements security policies by ensuring
          adequate financial resources are allocated to implement and
          maintain the security controls the policies require. Without
          budget governance, policy commitments remain unfunded.
      - id: a5.23
        relationship: complements
        confidence: 0.55
        rationale: >
          APO06 covers total cost of ownership and cost optimization
          for I&T services. ISO A.5.23 requires processes for cloud
          service management. Budget and cost management for cloud
          services (FinOps) directly supports the governance of cloud
          service acquisition and management A.5.23 mandates.

  - source_control: apo09
    target_controls:
      - id: a5.1
        relationship: complements
        confidence: 0.60
        rationale: >
          APO09 manages service agreements including SLAs, service
          catalogs, and performance monitoring. ISO A.5.1 requires
          information security policies. Service agreements complement
          security policies by translating policy requirements into
          measurable service level commitments that include security
          performance indicators.
      - id: a5.23
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          APO09 covers service level agreements and catalog management
          for all I&T services including external providers. ISO A.5.23
          requires cloud service management with defined security
          controls. Both address service agreement management with
          providers — APO09 from a general service management perspective
          and A.5.23 specifically for cloud services with security focus.
          They intersect on the cloud service agreement dimension.

  - source_control: apo12
    target_controls:
      - id: a8.8
        relationship: superset-of
        confidence: 0.85
        rationale: >
          APO12 manages the full spectrum of I&T risk — identification,
          assessment, treatment, and monitoring integrated with enterprise
          risk management. ISO A.8.8 specifically addresses technical
          vulnerability management: obtaining vulnerability information,
          evaluating exposure, and taking measures. Vulnerability
          management is a specific risk management activity that falls
          within APO12's comprehensive risk management scope.
      - id: a5.1
        relationship: complements
        confidence: 0.65
        rationale: >
          APO12 maintains a risk profile enabling informed risk-based
          decisions. ISO A.5.1 requires management-approved security
          policies. Risk management directly informs and complements
          security policies — the risk profile drives policy updates
          and ensures policies address identified risks.
      - id: a5.36
        relationship: complements
        confidence: 0.70
        rationale: >
          APO12 requires continuous identification and assessment of
          I&T risk with monitoring for continued appropriateness of
          responses. ISO A.5.36 requires regular compliance reviews
          against policies and standards. Risk management and compliance
          monitoring are complementary assurance activities — risk
          assessment validates control effectiveness while compliance
          reviews verify adherence to requirements.

  - source_control: apo13
    target_controls:
      - id: a5.1
        relationship: implements
        confidence: 0.90
        rationale: >
          APO13 requires defining and operating an ISMS including
          security policies, procedures, and controls. ISO A.5.1
          requires information security policies defined, approved,
          and communicated. APO13 directly implements the policy
          requirement of A.5.1 as part of the broader ISMS
          establishment. The ISMS mandated by APO13 is the operational
          mechanism through which A.5.1's policy requirements are
          fulfilled.
      - id: a5.2
        relationship: implements
        confidence: 0.85
        rationale: >
          APO13 requires establishing information security roles,
          responsibilities, policies, and procedures. ISO A.5.2
          requires defining and allocating information security roles.
          APO13 directly implements A.5.2's role definition requirement
          as part of ISMS establishment — ISMS governance inherently
          requires defined security roles and responsibilities.
      - id: a5.15
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          APO13 includes managing identity and access as part of
          security operations and maintaining security controls.
          ISO A.5.15 requires access control rules established and
          implemented based on business and security requirements.
          Both address access control, though APO13 frames it within
          the broader ISMS context while A.5.15 provides specific
          access control requirements.
      - id: a8.8
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          APO13 requires performing security monitoring, testing, and
          remediation activities including vulnerability management.
          ISO A.8.8 requires obtaining and evaluating technical
          vulnerability information and taking appropriate measures.
          Both address vulnerability management — APO13 as part of
          overall security management and A.8.8 as a specific
          technical control.
      - id: a5.36
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          APO13 requires monitoring the effectiveness of security
          controls within the ISMS. ISO A.5.36 requires regular
          compliance reviews against policies and standards. Both
          mandate ongoing security assurance — APO13 through ISMS
          monitoring and A.5.36 through compliance verification.
      - id: a8.25
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          APO13 encompasses security-by-design practices embedded into
          the development lifecycle as part of the ISMS. ISO A.8.25
          requires rules for secure development of software and systems.
          Both address embedding security into development practices,
          with APO13 providing the governance framework and A.8.25
          specifying development-specific security requirements.

  - source_control: apo14
    target_controls:
      - id: a5.15
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          APO14 governs data lifecycle management including data
          security, accessibility, and classification. ISO A.5.15
          requires access control rules based on business and security
          requirements. Both address controlling access to data assets,
          with APO14 framing it within data governance (data owners,
          classification) and A.5.15 defining access control rules —
          data classification directly informs access control decisions.
      - id: a5.1
        relationship: complements
        confidence: 0.65
        rationale: >
          APO14 requires data governance policies including data
          classification, quality, and protection. ISO A.5.1 requires
          information security policies. Data governance policies
          complement security policies by establishing the data
          classification foundation that security policies reference
          for protection requirements.
      - id: a8.15
        relationship: complements
        confidence: 0.60
        rationale: >
          APO14 requires maintaining data quality, integrity, and
          compliance with regulatory requirements throughout the data
          lifecycle. ISO A.8.15 requires logging of activities,
          exceptions, and events with appropriate protection and
          analysis. Logging provides the audit trail essential for
          demonstrating data governance compliance and tracking data
          access patterns that APO14 governs.

  # ──────────────────────────────────────────────
  # BAI — Build, Acquire and Implement
  # ──────────────────────────────────────────────

  - source_control: bai01
    target_controls:
      - id: a5.1
        relationship: complements
        confidence: 0.55
        rationale: >
          BAI01 manages programs in alignment with enterprise strategy,
          coordinating projects and tracking benefits realization. ISO
          A.5.1 requires management-approved security policies. Program
          management complements security policies by ensuring security
          requirements are embedded into program governance and that
          security-related programs receive appropriate oversight and
          resource allocation.
      - id: a5.2
        relationship: complements
        confidence: 0.55
        rationale: >
          BAI01 establishes program governance structures with defined
          roles, reporting, and escalation. ISO A.5.2 requires defined
          security roles and responsibilities. Program governance
          complements role definitions by ensuring security roles are
          represented in program steering committees and that security
          accountability is maintained across program components.

  - source_control: bai03
    target_controls:
      - id: a8.25
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          BAI03 manages the full solution development lifecycle —
          design, development, testing, quality assurance, and
          maintenance. ISO A.8.25 requires rules for secure development
          of software and systems including security checkpoints,
          testing, and secure coding. Both directly address software
          development lifecycle practices. BAI03 covers the entire
          SDLC while A.8.25 focuses specifically on security within
          the SDLC — they intersect significantly on secure development
          practices.
      - id: a8.28
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          BAI03 includes development and quality assurance practices
          as part of solution identification and build. ISO A.8.28
          requires applying secure coding principles to software
          development. Both address coding standards and quality —
          BAI03 from a general quality perspective and A.8.28
          specifically for security coding practices. They intersect
          on the code quality and review dimension.
      - id: a8.8
        relationship: complements
        confidence: 0.65
        rationale: >
          BAI03 covers test preparation, testing, and maintenance of
          solutions. ISO A.8.8 requires vulnerability identification,
          evaluation, and remediation. Solution testing and maintenance
          complement vulnerability management by providing the
          development context in which vulnerabilities are detected
          and remediated.

  - source_control: bai06
    target_controls:
      - id: a8.9
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          BAI06 manages all I&T changes with impact assessment,
          authorization, tracking, and documentation. ISO A.8.9
          requires configurations to be established, documented,
          monitored, and reviewed with proper change control. Both
          mandate controlled change processes — BAI06 provides the
          change management framework while A.8.9 requires that
          configuration changes follow documented procedures. They
          intersect on the change control dimension.
      - id: a5.1
        relationship: complements
        confidence: 0.65
        rationale: >
          BAI06 requires change management standards, procedures, and
          authorization processes. ISO A.5.1 requires security policies.
          Change management procedures complement security policies by
          operationalizing the policy requirement that changes to
          information processing facilities and systems are controlled.
      - id: a8.25
        relationship: complements
        confidence: 0.65
        rationale: >
          BAI06 requires change impact assessment, testing, and
          authorization for all changes. ISO A.8.25 requires security
          checkpoints within development projects and system testing.
          Change management complements secure development by providing
          the governance mechanism for controlling how development
          outputs are promoted through environments into production.
      - id: a5.15
        relationship: complements
        confidence: 0.60
        rationale: >
          BAI06 requires authorization for changes based on impact and
          risk. ISO A.5.15 requires access control rules including
          authorization requirements. Change authorization complements
          access control by ensuring that the right individuals have
          authority to approve changes, a form of access control over
          production environments.

  - source_control: bai09
    target_controls:
      - id: a8.1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          BAI09 manages I&T asset lifecycle — acquisition, deployment,
          operation, maintenance, and retirement. ISO A.8.1 requires
          protection of information on user endpoint devices. Both
          address asset management, with BAI09 covering all I&T assets
          and A.8.1 focusing specifically on endpoint devices. They
          intersect on the endpoint asset management dimension —
          tracking, securing, and maintaining endpoint devices through
          their lifecycle.
      - id: a8.8
        relationship: complements
        confidence: 0.70
        rationale: >
          BAI09 requires maintaining an asset register with complete
          inventory of I&T assets, their configurations, and software
          versions. ISO A.8.8 states that a complete asset inventory
          is a prerequisite for effective vulnerability management.
          Asset management directly complements vulnerability management
          by providing the inventory against which vulnerabilities are
          identified and tracked.
      - id: a8.9
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          BAI09 requires assets to be accounted for, tracked, and
          managed with software license compliance. ISO A.8.9 requires
          documented configurations for hardware, software, services,
          and networks. Both address knowing and tracking what
          technology assets exist and their configurations — asset
          management provides the what, configuration management
          provides the how.

  - source_control: bai10
    target_controls:
      - id: a8.9
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          BAI10 manages configuration items, baselines, CMDB, and
          configuration verification. ISO A.8.9 requires configurations
          to be established, documented, implemented, monitored, and
          reviewed against standard templates. Both address the same
          core capability: maintaining accurate, auditable, and
          controlled configurations for I&T resources. The scope,
          activities, and objectives are directly equivalent.
      - id: a8.8
        relationship: complements
        confidence: 0.65
        rationale: >
          BAI10 maintains configuration baselines and verifies
          configuration integrity. ISO A.8.8 requires understanding
          software versions and deployment state for vulnerability
          management. Accurate configuration data directly enables
          effective vulnerability assessment by providing the precise
          software inventory needed to match against vulnerability
          advisories.

  # ──────────────────────────────────────────────
  # DSS — Deliver, Service and Support
  # ──────────────────────────────────────────────

  - source_control: dss01
    target_controls:
      - id: a8.9
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          DSS01 manages I&T operational procedures, monitoring, and
          physical/virtual environment protection. ISO A.8.9 requires
          configurations to be implemented, monitored, and reviewed.
          Both address operational monitoring and environment
          management — DSS01 from an operational procedures perspective
          and A.8.9 from a configuration baseline perspective. They
          intersect on the monitoring and environment management
          dimension.
      - id: a7.1
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          DSS01 requires managing the physical environment including
          data centers, server rooms, and facility services with
          appropriate protection. ISO A.7.1 requires defined security
          perimeters to protect areas containing information assets.
          Both address physical environment protection — DSS01 from
          an operational management perspective and A.7.1 from a
          physical security perimeter perspective.
      - id: a8.15
        relationship: complements
        confidence: 0.70
        rationale: >
          DSS01 requires monitoring I&T infrastructure and executing
          operational procedures with event recording. ISO A.8.15
          requires logging of activities, exceptions, faults, and
          events. Operational monitoring generates the events that
          A.8.15's logging requirements capture — operations produce
          events, logging preserves them for analysis.

  - source_control: dss02
    target_controls:
      - id: a8.15
        relationship: complements
        confidence: 0.70
        rationale: >
          DSS02 manages incident and service request lifecycle from
          initiation through resolution, requiring classification,
          investigation, and documentation. ISO A.8.15 requires
          logging of activities, exceptions, and faults. Incident
          management depends on logs for diagnosis and investigation,
          and produces its own event records — logging and incident
          management are complementary operational capabilities.
      - id: a5.1
        relationship: complements
        confidence: 0.55
        rationale: >
          DSS02 requires defined classification schemes, prioritization
          criteria, and escalation procedures for incidents. ISO A.5.1
          requires topic-specific security policies including incident
          management. Incident management procedures operationalize
          the incident management policy component of A.5.1's security
          policy requirements.
      - id: a8.8
        relationship: complements
        confidence: 0.60
        rationale: >
          DSS02 requires incident investigation and root cause diagnosis
          as part of the resolution process. ISO A.8.8 requires
          evaluating exposure to technical vulnerabilities and taking
          measures. Incident investigation often reveals vulnerabilities
          that feed into the vulnerability management process A.8.8
          describes.

  - source_control: dss03
    target_controls:
      - id: a8.8
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          DSS03 manages problem identification, root cause analysis,
          and elimination to prevent recurring incidents. ISO A.8.8
          requires vulnerability identification, evaluation, and
          remediation. Both address the identification and elimination
          of systemic weaknesses — DSS03 through problem management
          methodology and A.8.8 through vulnerability management.
          They intersect on the root cause elimination dimension where
          problems often stem from unpatched vulnerabilities.
      - id: a8.9
        relationship: complements
        confidence: 0.60
        rationale: >
          DSS03 identifies systemic issues and implements permanent
          fixes, often requiring configuration changes. ISO A.8.9
          requires documented and controlled configurations.
          Problem resolution frequently involves configuration
          corrections that must follow the change control and
          configuration management processes A.8.9 mandates.

  - source_control: dss04
    target_controls:
      - id: a5.1
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          DSS04 manages business continuity and disaster recovery
          plans. ISO A.5.1 requires topic-specific security policies
          which typically include backup and business continuity.
          Both require organizational commitment to continuity
          planning — DSS04 as a dedicated process and A.5.1 as a
          policy foundation. They intersect on the continuity policy
          and planning dimension.
      - id: a7.1
        relationship: complements
        confidence: 0.60
        rationale: >
          DSS04 requires maintaining availability of information and
          protecting against disruptions including physical threats.
          ISO A.7.1 requires security perimeters to protect areas
          containing information assets. Physical security perimeters
          complement continuity planning by providing the physical
          protection layer that supports continuity objectives —
          preventing physical disruptions that could trigger
          continuity events.
      - id: a8.9
        relationship: complements
        confidence: 0.60
        rationale: >
          DSS04 requires defined RTO/RPO and recovery procedures for
          critical services. ISO A.8.9 requires documented configurations
          for services and networks. Configuration management complements
          continuity by ensuring recovery procedures reference accurate,
          documented configurations — you cannot recover what you have
          not documented.

  - source_control: dss05
    target_controls:
      - id: a5.15
        relationship: implements
        confidence: 0.90
        rationale: >
          DSS05 operationalizes security controls including managing
          identity, access privileges, and performing security
          monitoring. ISO A.5.15 requires access control rules
          established and implemented. DSS05 directly implements
          the access control requirements of A.5.15 — it is the
          operational process that enforces the access control rules
          A.5.15 defines.
      - id: a5.1
        relationship: implements
        confidence: 0.85
        rationale: >
          DSS05 operates security services to maintain the security
          risk level within enterprise risk appetite, implementing
          preventive, detective, and corrective controls. ISO A.5.1
          requires information security policies. DSS05 implements
          the security policy mandated by A.5.1 through operational
          security controls and services.
      - id: a8.8
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          DSS05 protects enterprise information through security
          monitoring, network security, endpoint security, and
          vulnerability management. ISO A.8.8 requires vulnerability
          identification, evaluation, and remediation. Both address
          vulnerability management — DSS05 as part of broader
          security operations and A.8.8 as a specific technical
          control requirement.
      - id: a8.1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          DSS05 manages endpoint security including protection against
          malware and device security controls. ISO A.8.1 requires
          protection of information on user endpoint devices. Both
          directly address endpoint device security — DSS05 from
          an operational security services perspective and A.8.1
          from a device-specific protection requirement.
      - id: a8.15
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          DSS05 requires performing security monitoring and maintaining
          records of security-related events. ISO A.8.15 requires
          logging of activities, exceptions, and events with protection
          and analysis. Both address security event recording and
          monitoring — DSS05 as an operational security function and
          A.8.15 as a specific logging requirement.
      - id: a7.1
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          DSS05 includes managing physical access to protect information
          systems and technology. ISO A.7.1 requires defined security
          perimeters for areas containing information assets. Both
          address physical access security — DSS05 as part of
          operational security services and A.7.1 from a perimeter
          design perspective.

  # ──────────────────────────────────────────────
  # MEA — Monitor, Evaluate and Assess
  # ──────────────────────────────────────────────

  - source_control: mea01
    target_controls:
      - id: a5.36
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          MEA01 monitors performance and conformance against targets,
          identifies deviations, and initiates corrective actions.
          ISO A.5.36 requires regular compliance reviews against
          policies and standards with corrective action tracking.
          Both address ongoing conformance monitoring and corrective
          action — MEA01 covers all I&T processes while A.5.36
          focuses on information security compliance. They intersect
          directly on the compliance monitoring and corrective action
          dimension.
      - id: a8.15
        relationship: complements
        confidence: 0.70
        rationale: >
          MEA01 requires collecting and evaluating metrics through
          systematic monitoring. ISO A.8.15 requires logging of
          activities and events with analysis. Logging provides the
