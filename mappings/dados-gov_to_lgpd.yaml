id: dados-gov_to_lgpd
title: "Dados Gov to LGPD Control Mapping"
source_framework: dados-gov
target_framework: lgpd
version: "1.0.0"
last_updated: "2026-04-06"
methodology: structural
description: >
  Cross-framework mapping between the Decreto 10.046/2019 (Dados Gov — Data Sharing
  Governance in the Federal Public Administration) and the Lei Geral de Protecao de Dados
  (LGPD — Law 13.709/2018). Decreto 10.046 governs data sharing among federal agencies,
  establishing categories of data sharing, the Citizen Base Registry, and the Central Data
  Governance Committee (CCGD). The LGPD regulates personal data processing across all
  sectors. The two norms intersect directly: Art. 11 of Decreto 10.046 explicitly mandates
  LGPD compliance for all shared personal data. This mapping identifies every Decreto 10.046
  control and its corresponding LGPD obligations, covering legal bases for government data
  sharing, data subject rights, security requirements, and accountability mechanisms.

mappings:
  - source_control: art-1
    target_controls:
      - id: art-23
        relationship: implements
        confidence: 0.90
        rationale: >
          Dados-gov art-1 defines the scope of data sharing governance within the federal
          public administration. LGPD art-23 governs personal data processing by public
          entities, requiring purpose limitation to public interest and legal competence.
          Decreto 10.046 implements the framework through which public bodies comply with
          LGPD art-23 when sharing data inter-agency.
      - id: art-7
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Dados-gov art-1 establishes data sharing governance across federal agencies. LGPD
          art-7 defines the legal bases for personal data processing, including public
          administration execution of policies (art-7 III). The data sharing governed by
          art-1 relies primarily on LGPD art-7 III as the legal basis for inter-agency
          sharing without consent.
      - id: art-26
        relationship: complements
        confidence: 0.85
        rationale: >
          Dados-gov art-1 scopes governance to inter-agency sharing within federal
          administration. LGPD art-26 regulates shared use of personal data by public
          entities, including restrictions on sharing with private entities. Dados-gov
          complements LGPD art-26 by providing the operational framework for the government
          data sharing that art-26 constrains.

  - source_control: art-2
    target_controls:
      - id: art-5
        relationship: complements
        confidence: 0.95
        rationale: >
          Dados-gov art-2 defines key terms for data sharing governance (biographical,
          biometric, and registration attributes; data custodian; data manager;
          interoperability). LGPD art-5 defines foundational terms for data protection
          (personal data, sensitive data, controller, operator, processing). The two
          definition sets are complementary: dados-gov art-2 defines biometric attributes
          that map directly to LGPD art-5 II (sensitive personal data), and the data
          custodian/manager roles parallel the controller/operator roles.
      - id: art-11
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Dados-gov art-2 defines biometric attributes (fingerprints, iris, facial
          geometry, voice). LGPD art-11 establishes the heightened protection regime for
          sensitive personal data, which includes biometric data per LGPD art-5 II. Any
          sharing of biometric attributes under dados-gov must comply with the restricted
          legal bases of LGPD art-11.

  - source_control: art-3
    target_controls:
      - id: art-6
        relationship: complements
        confidence: 0.90
        rationale: >
          Dados-gov art-3 establishes seven directives for data sharing (simplification,
          policy optimization, data quality, operational efficiency, authenticity). LGPD
          art-6 establishes ten principles for personal data processing (purpose limitation,
          adequacy, necessity, data quality, transparency, security). Both sets of
          principles must be observed simultaneously when sharing personal data between
          agencies. The data quality directive in dados-gov art-3 IV directly complements
          the data quality principle in LGPD art-6 V.
      - id: art-23
        relationship: complements
        confidence: 0.85
        rationale: >
          Dados-gov art-3 directives orient data sharing toward public service
          simplification and policy execution. LGPD art-23 requires that public sector
          data processing serve the public interest and legal competence. The directives
          of dados-gov art-3 provide the specific policy justifications that satisfy
          LGPD art-23's purpose requirement for government data sharing.

  - source_control: art-4
    target_controls:
      - id: art-7
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Dados-gov art-4 defines broad dissemination data (public, unrestricted, no
          secrecy). LGPD art-7 establishes legal bases for processing, including paragraph
          3 which states that publicly accessible personal data must still consider purpose,
          good faith, and public interest. Even broad dissemination data containing personal
          information remains subject to LGPD art-7 requirements.
      - id: art-6
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Dados-gov art-4 categorizes data for unrestricted public access without
          authentication. LGPD art-6 principles (especially purpose, adequacy, necessity)
          still apply when broad dissemination data contains personal information. The
          absence of access restrictions under dados-gov does not exempt from LGPD
          principles.

  - source_control: art-5
    target_controls:
      - id: art-7
        relationship: implements
        confidence: 0.90
        rationale: >
          Dados-gov art-5 defines restricted execution data sharing (protected data
          necessary for public policies), explicitly referencing LGPD art-11 III as the
          legal basis dispensing consent. LGPD art-7 III provides the legal basis for
          public administration to process data for policy execution. Dados-gov art-5
          implements the operational framework for exercising LGPD art-7 III in
          inter-agency data sharing.
      - id: art-11
        relationship: implements
        confidence: 0.90
        rationale: >
          Dados-gov art-5 paragraph 1 explicitly cites LGPD art-11 III to dispense
          consent for sharing protected data for public policy execution. LGPD art-11
          governs sensitive data processing, and dados-gov art-5 implements the specific
          mechanism by which sensitive data can be shared between agencies under this
          legal basis without consent.
      - id: art-26
        relationship: implements
        confidence: 0.85
        rationale: >
          Dados-gov art-5 defines the category and conditions for restricted data sharing
          between public entities. LGPD art-26 regulates shared use of personal data by
          public entities, requiring purpose limitation to policy execution. Dados-gov
          art-5 implements the detailed classification and access control framework that
          operationalizes LGPD art-26's requirements.

  - source_control: art-6
    target_controls:
      - id: art-7
        relationship: implements
        confidence: 0.85
        rationale: >
          Dados-gov art-6 defines specific data sharing requiring formal agreements with
          seven mandatory elements (purpose, data identification, security mechanisms,
          storage, retention, responsibilities, penalties). LGPD art-7 requires a valid
          legal basis for all processing. The formal agreement mechanism of dados-gov
          art-6 implements the documentation and accountability requirements that
          demonstrate compliance with LGPD legal bases for the most sensitive sharing
          categories.
      - id: art-26
        relationship: implements
        confidence: 0.90
        rationale: >
          Dados-gov art-6 requires formal authorization and written agreements for
          specific-category data sharing. LGPD art-26 governs shared use of personal
          data by public entities. The seven mandatory agreement elements in dados-gov
          art-6 directly implement the purpose limitation and safeguard requirements
          of LGPD art-26 for the most restricted sharing category.
      - id: art-46
        relationship: complements
        confidence: 0.85
        rationale: >
          Dados-gov art-6 III mandates that specific-category sharing agreements include
          information security mechanisms. LGPD art-46 requires technical and
          administrative measures to protect personal data. The security mechanism
          requirement in dados-gov art-6 directly complements LGPD art-46 by requiring
          documented security controls in each sharing agreement.

  - source_control: art-7
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Dados-gov art-7 establishes the Citizen Base Registry containing biographical,
          biometric, and registration attributes. LGPD art-5 defines personal data
          (art-5 I) and sensitive personal data including biometric data (art-5 II).
          The centralized biometric storage mandated by dados-gov art-7 paragraph 3
          directly intersects with LGPD's classification of biometric data as sensitive,
          triggering heightened protection requirements.
      - id: art-11
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Dados-gov art-7 mandates centralized storage of biometric data within federal
          administration. LGPD art-11 governs processing of sensitive personal data
          (including biometric data), requiring restricted legal bases. The Citizen Base
          Registry's biometric component must comply with the heightened protections of
          LGPD art-11 for all processing operations.
      - id: art-38
        relationship: complements
        confidence: 0.85
        rationale: >
          Dados-gov art-7 creates a centralized biometric data store with significant
          privacy implications. LGPD art-38 empowers ANPD to require Data Protection
          Impact Assessments (DPIA/RIPD). The high-risk nature of centralized biometric
          storage makes a DPIA practically mandatory under LGPD art-38, as dados-gov
          art-11 paragraph 2 explicitly requires.

  - source_control: art-8
    target_controls:
      - id: art-26
        relationship: complements
        confidence: 0.85
        rationale: >
          Dados-gov art-8 delegates to CCGD the authority to define attributes, custodians,
          interoperability standards, access conditions, and dispute resolution for the
          Citizen Base Registry. LGPD art-26 regulates shared use of personal data by
          public entities. CCGD's governance authority under dados-gov art-8 complements
          LGPD art-26 by providing the institutional mechanism that ensures data sharing
          decisions respect LGPD's purpose limitation and safeguard requirements.
      - id: art-46
        relationship: complements
        confidence: 0.80
        rationale: >
          Dados-gov art-8 III charges CCGD with defining security requirements and
          availability standards for the Citizen Base Registry. LGPD art-46 mandates
          technical and administrative security measures for personal data protection.
          CCGD's security standard-setting role under dados-gov art-8 complements LGPD
          art-46 by establishing sector-specific security baselines for government
          data sharing.

  - source_control: art-9
    target_controls:
      - id: art-26
        relationship: complements
        confidence: 0.85
        rationale: >
          Dados-gov art-9 mandates API-based data sharing via the Conecta Gov platform
          as the preferred mechanism for inter-agency sharing. LGPD art-26 regulates
          shared use of personal data by public entities. The Conecta Gov platform
          complements LGPD art-26 by providing the standardized, auditable, and
          access-controlled technical channel for government data sharing, enabling
          compliance with LGPD's purpose limitation and security requirements.
      - id: art-46
        relationship: complements
        confidence: 0.80
        rationale: >
          Dados-gov art-9 requires authenticated, API-based sharing with preferential
          use of Conecta Gov platform. LGPD art-46 requires technical and administrative
          security measures. The API-first approach with authentication mandated by
          dados-gov art-9 complements LGPD art-46 by establishing secure, traceable data
          sharing channels as opposed to insecure ad-hoc mechanisms.
      - id: art-25
        relationship: implements
        confidence: 0.85
        rationale: >
          Dados-gov art-9 mandates API-based data sharing using standardized protocols
          via the Conecta Gov interoperability platform. LGPD art-25 requires public
          sector data to be maintained in interoperable and structured formats for shared
          use. Dados-gov art-9 directly implements the interoperability mandate of LGPD
          art-25 by providing the technical platform and standards for structured data
          exchange.

  - source_control: art-10
    target_controls:
      - id: art-23
        relationship: complements
        confidence: 0.85
        rationale: >
          Dados-gov art-10 mandates publication of data catalogs on agency websites with
          description, sharing category, custodian contact, access methods, and update
          frequency. LGPD art-23 I requires public entities to publish clear information
          about their data processing activities on their websites. The data catalog
          obligation of dados-gov art-10 complements LGPD art-23's transparency
          requirement by providing structured metadata about government databases.
      - id: art-6
        relationship: complements
        confidence: 0.80
        rationale: >
          Dados-gov art-10 requires transparency about databases under government custody
          including sharing categories and access methods. LGPD art-6 VI establishes
          the transparency principle requiring clear information about data processing.
          The data catalog mandate of dados-gov art-10 complements the transparency
          principle of LGPD art-6 by creating structured, discoverable metadata about
          government data assets.

  - source_control: art-11
    target_controls:
      - id: art-7
        relationship: implements
        confidence: 0.95
        rationale: >
          Dados-gov art-11 explicitly mandates that all personal data shared under
          Decreto 10.046 must comply with LGPD (Law 13.709/2018). LGPD art-7 establishes
          the legal bases for processing. Dados-gov art-11 is the normative bridge that
          implements LGPD art-7 requirements within the data sharing governance framework,
          ensuring every sharing operation has a valid legal basis.
      - id: art-11
        relationship: implements
        confidence: 0.90
        rationale: >
          Dados-gov art-11 mandates LGPD compliance for shared personal data and
          specifically requires DPIA (via LGPD art-38) before specific-category sharing.
          LGPD art-11 governs sensitive data processing with restricted legal bases.
          Dados-gov art-11 paragraph 1 implements the secrecy obligation for received
          personal data, which directly aligns with LGPD art-11's heightened protection
          for sensitive data shared between agencies.
      - id: art-26
        relationship: implements
        confidence: 0.90
        rationale: >
          Dados-gov art-11 requires LGPD compliance for all data sharing operations.
          LGPD art-26 specifically governs shared use of personal data by public entities.
          Dados-gov art-11 is the explicit implementation clause that subjects the entire
          data sharing governance framework to LGPD art-26's requirements for government
          data sharing.
      - id: art-38
        relationship: implements
        confidence: 0.90
        rationale: >
          Dados-gov art-11 paragraph 2 explicitly mandates a Data Protection Impact
          Assessment per LGPD art-38 before specific-category data sharing. LGPD art-38
          empowers ANPD to require DPIA. Dados-gov art-11 implements LGPD art-38 by
          making the DPIA a mandatory procedural prerequisite for the most sensitive
          category of government data sharing.

  - source_control: art-12
    target_controls:
      - id: art-46
        relationship: complements
        confidence: 0.85
        rationale: >
          Dados-gov art-12 charges the Secretariat of Digital Government with defining
          interoperability standards including communication protocols, data formats,
          security standards, and availability requirements. LGPD art-46 mandates
          technical and administrative security measures. The security standards defined
          under dados-gov art-12 complement LGPD art-46 by establishing sector-specific
          technical baselines for government data sharing security.
      - id: art-25
        relationship: implements
        confidence: 0.90
        rationale: >
          Dados-gov art-12 defines interoperability standards including protocols, data
          formats, metadata standards, and controlled vocabularies. LGPD art-25 requires
          public sector data to be maintained in interoperable and structured formats.
          Dados-gov art-12 directly implements LGPD art-25's interoperability mandate
          by establishing the specific technical standards that government systems
          must follow.
      - id: art-49
        relationship: complements
        confidence: 0.80
        rationale: >
          Dados-gov art-12 mandates interoperability standards, security patterns, and
          availability requirements for data sharing systems. LGPD art-49 requires that
          systems used for personal data processing be structured to meet security
          requirements and good practice standards. The interoperability standards of
          dados-gov art-12 complement LGPD art-49 by specifying the technical standards
          that government systems must implement.

  - source_control: art-13
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.90
        rationale: >
          Dados-gov art-13 defines five custodian obligations: data integrity and
          availability, security measures against unauthorized access and data incidents,
          sharing operation logging, incident notification to CCGD, and data quality.
          LGPD art-46 mandates technical and administrative security measures to protect
          personal data. The custodian security obligations in dados-gov art-13 II
          directly implement LGPD art-46's security requirements in the government
          data sharing context.
      - id: art-48
        relationship: complements
        confidence: 0.90
        rationale: >
          Dados-gov art-13 IV requires custodians to report security incidents affecting
          custodied data to CCGD. LGPD art-48 requires controllers to report security
          incidents to ANPD and affected data subjects. The CCGD notification obligation
          in dados-gov art-13 complements the ANPD notification obligation in LGPD
          art-48, creating a dual notification pathway for government data breaches.
      - id: art-6
        relationship: complements
        confidence: 0.80
        rationale: >
          Dados-gov art-13 V requires custodians to maintain accurate, complete, and
          up-to-date shared data. LGPD art-6 V establishes the data quality principle
          requiring accuracy, clarity, relevance, and currency. The custodian's data
          quality obligation directly complements the LGPD data quality principle in
          the government data sharing context.

  - source_control: art-14
    target_controls:
      - id: art-6
        relationship: implements
        confidence: 0.90
        rationale: >
          Dados-gov art-14 I mandates that receiving agencies use shared data exclusively
          for the stated sharing purpose. LGPD art-6 I establishes the purpose limitation
          principle prohibiting processing incompatible with declared purposes. Dados-gov
          art-14 I directly implements LGPD art-6 I purpose limitation in the receiving
          agency context.
      - id: art-46
        relationship: implements
        confidence: 0.85
        rationale: >
          Dados-gov art-14 II requires receiving agencies to adopt security measures
          protecting received data against unauthorized access and data incidents. LGPD
          art-46 mandates technical and administrative security measures. Dados-gov
          art-14 II implements LGPD art-46 by extending the security obligation to
          agencies receiving shared data.
      - id: art-15
        relationship: complements
        confidence: 0.85
        rationale: >
          Dados-gov art-14 V requires receiving agencies to delete shared data after
          the sharing purpose is fulfilled, except when legal retention obligations
          exist. LGPD art-15 defines the conditions for termination of personal data
          processing including purpose fulfillment. Dados-gov art-14 V complements
          LGPD art-15 by applying the termination obligation specifically to
          inter-agency shared data.
      - id: art-16
        relationship: complements
        confidence: 0.80
        rationale: >
          Dados-gov art-14 V mandates data deletion after purpose fulfillment with
          exceptions for legal retention. LGPD art-16 requires data elimination after
          processing terminates with four specified exceptions. Dados-gov art-14 V
          complements LGPD art-16 by applying the elimination-with-exceptions rule
          to shared government data.

  - source_control: art-15
    target_controls:
      - id: art-23
        relationship: complements
        confidence: 0.80
        rationale: >
          Dados-gov art-15 establishes CCGD composition with representatives from seven
          key federal agencies (Casa Civil, CGU, ITI, IBGE, INSS, Receita Federal, SGD).
          LGPD art-23 requires public entities to designate an encarregado (DPO) and
          publish data processing information. The CCGD established by dados-gov art-15
          complements LGPD art-23 by creating the institutional governance structure
          that oversees inter-agency data sharing compliance.
      - id: art-50
        relationship: complements
        confidence: 0.80
        rationale: >
          Dados-gov art-15 creates a multi-agency governance committee for data sharing.
          LGPD art-50 encourages implementation of governance programs including
          organizational conditions, operating procedures, security standards, and risk
          mitigation mechanisms. The CCGD structure established by dados-gov art-15
          complements LGPD art-50 by providing the governance mechanism for data sharing
          best practices across the federal government.

  - source_control: art-16
    target_controls:
      - id: art-26
        relationship: complements
        confidence: 0.85
        rationale: >
          Dados-gov art-16 defines CCGD competencies including deliberation on sharing
          proposals, supplementary standards, dispute resolution, and promotion of data
          sharing. LGPD art-26 regulates shared use of personal data by public entities
          with purpose limitation. CCGD's deliberative and standard-setting authority
          under dados-gov art-16 complements LGPD art-26 by providing the governance
          mechanism that ensures data sharing decisions conform to LGPD requirements.
      - id: art-50
        relationship: complements
        confidence: 0.80
        rationale: >
          Dados-gov art-16 charges CCGD with establishing supplementary directives,
          resolving disputes, and promoting best practices for data sharing. LGPD art-50
          encourages governance programs with rules, procedures, and risk mitigation.
          The CCGD competencies under dados-gov art-16 complement LGPD art-50 by
          establishing sector-specific governance standards for federal data sharing.

  - source_control: art-17
    target_controls:
      - id: art-41
        relationship: complements
        confidence: 0.90
        rationale: >
          Dados-gov art-17 mandates each federal agency to designate a data manager
          (gestor de dados) responsible for CCGD liaison, sharing authorization,
          compliance assurance, and data quality improvement. LGPD art-41 requires
          controllers to designate an encarregado (DPO) as the communication channel
          with ANPD and data subjects. The data manager role under dados-gov art-17
          complements the DPO role under LGPD art-41, creating parallel governance
          roles for data sharing and data protection respectively.
      - id: art-6
        relationship: complements
        confidence: 0.80
        rationale: >
          Dados-gov art-17 IV charges the data manager with promoting continuous
          improvement of data quality. LGPD art-6 V establishes the data quality
          principle. The data manager's quality improvement mandate under dados-gov
          art-17 complements the LGPD data quality principle by assigning clear
          institutional accountability for data quality within each agency.

  - source_control: art-18
    target_controls:
      - id: art-50
        relationship: complements
        confidence: 0.80
        rationale: >
          Dados-gov art-18 mandates CCGD to produce internal regulations covering meeting
          procedures, decision-making processes, sharing proposal submission, and dispute
          resolution. LGPD art-50 encourages governance programs with operating
          procedures, complaint mechanisms, and risk mitigation. The CCGD internal
          regulations under dados-gov art-18 complement LGPD art-50 by formalizing the
          governance procedures for data sharing decision-making.
      - id: art-23
        relationship: complements
        confidence: 0.75
        rationale: >
          Dados-gov art-18 establishes procedural rules for CCGD operations including
          sharing proposal submission and dispute resolution. LGPD art-23 requires
          public entities to follow specific procedures for data processing, including
          prazos from LAI and administrative procedure law. The CCGD procedures under
          dados-gov art-18 complement LGPD art-23 by establishing the specific
          governance procedures for inter-agency data sharing.

  - source_control: art-19
    target_controls:
      - id: art-46
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Dados-gov art-19 establishes a one-year transition period for existing data
          sharing arrangements to comply with Decreto 10.046 requirements (classification,
          security, audit logging, catalog). LGPD art-46 requires technical and
          administrative security measures. The migration of legacy sharing arrangements
          under dados-gov art-19 intersects with LGPD art-46 because legacy arrangements
          must be upgraded to meet both Decreto 10.046 and LGPD security standards.
      - id: art-49
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Dados-gov art-19 requires adaptation of existing data sharing systems to the
          decree's requirements. LGPD art-49 requires systems to be structured to meet
          security, good practice, and governance standards. The system adaptation mandate
          of dados-gov art-19 intersects with LGPD art-49's requirement that systems be
          structured for compliance.

  - source_control: art-20
    target_controls:
      - id: art-23
        relationship: complements
        confidence: 0.75
        rationale: >
          Dados-gov art-20 revokes the previous data sharing decree (Decreto 8.789/2016)
          and consolidates the regulatory framework. LGPD art-23 governs public sector
          data processing and references compliance with applicable legislation. The
          normative consolidation under dados-gov art-20 complements LGPD art-23 by
          establishing the current authoritative framework that public entities must
          follow for data sharing alongside LGPD obligations.
      - id: art-37
        relationship: complements
        confidence: 0.75
        rationale: >
          Dados-gov art-20 establishes Decreto 10.046 as the current authoritative
          framework for data sharing, replacing prior regulations. LGPD art-37 requires
          controllers and operators to maintain records of processing activities (ROPA).
          The normative consolidation under dados-gov art-20 complements LGPD art-37 by
          clarifying the current regulatory baseline against which processing records
          for government data sharing must be maintained.

summary:
  total_source_controls: 20
  total_mappings: 48
  relationship_distribution:
    implements: 16
    complements: 24
    intersects-with: 8
  coverage: "100% — all 20 dados-gov controls mapped to at least one lgpd target"
  key_intersections:
    - "dados-gov art-11 is the central bridge, explicitly mandating LGPD compliance for all shared personal data"
    - "dados-gov art-5 directly implements LGPD art-7 III and art-11 III consent waiver for public policy execution"
    - "dados-gov art-7 (Citizen Base Registry biometric data) triggers LGPD art-11 sensitive data protections"
    - "dados-gov art-13/art-14 custodian/receiver obligations implement LGPD art-46 security and art-48 incident notification"
    - "dados-gov art-17 data manager role parallels LGPD art-41 DPO/encarregado role"
