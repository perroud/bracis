id: bacen-4893_to_cnsp-381
title: "Bacen 4893 to CNSP 381 Control Mapping"
source_framework: bacen-4893
target_framework: cnsp-381
version: "1.0.0"
last_updated: "2026-04-03"
methodology: semantic

mappings:
  - source_control: art-3
    target_controls:
      - id: art-3
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          O Art. 3 da Resolução 4.893 do Bacen exige que instituições financeiras
          implementem política de segurança cibernética compatível com porte, perfil
          de risco e modelo de negócio. O Art. 3 da Resolução CNSP 381 impõe a
          mesma obrigação para sociedades seguradoras, entidades abertas de
          previdência complementar e sociedades de capitalização. A estrutura é
          praticamente idêntica, diferindo apenas no setor regulado — financeiro
          versus securitário.

  - source_control: art-4
    target_controls:
      - id: art-4
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          O Art. 4 da Resolução 4.893 detalha o conteúdo mínimo da política de
          segurança cibernética para instituições financeiras, incluindo objetivos,
          procedimentos, controles e classificação de dados. O Art. 4 da CNSP 381
          replica essa mesma exigência para o setor de seguros, com conteúdo
          mínimo equivalente. Ambos os artigos foram redigidos com base na mesma
          estrutura normativa emanada do Conselho Monetário Nacional.

  - source_control: art-5
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          O Art. 5 da Resolução 4.893 exige que a política contemple cenários de
          incidentes considerados nos testes de continuidade de negócios. O Art. 5
          da CNSP 381 estabelece obrigação análoga para o setor securitário.
          A correspondência é alta, com variação mínima na redação adaptada ao
          contexto regulatório da Susep — ambos visam garantir que a política de
          segurança cibernética esteja alinhada com a gestão de continuidade de
          negócios da instituição.

  - source_control: art-6
    target_controls:
      - id: art-6
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          O Art. 6 da Resolução 4.893 trata da disseminação da cultura de segurança
          cibernética e capacitação do pessoal nas instituições financeiras. O Art.
          6 da CNSP 381 estabelece a mesma obrigação para o setor securitário,
          exigindo programas de conscientização e treinamento. A equivalência é
          direta na exigência de que a política de segurança seja divulgada e que
          os colaboradores sejam capacitados para sua implementação efetiva.

  - source_control: art-7
    target_controls:
      - id: art-7
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          O Art. 7 da Resolução 4.893 exige a revisão periódica da política de
          segurança cibernética pelas instituições financeiras. O Art. 7 da CNSP
          381 impõe obrigação idêntica ao setor securitário. Ambos determinam que
          a política deve ser revista com periodicidade mínima definida, levando
          em consideração mudanças nos riscos cibernéticos e na estrutura da
          instituição.

  - source_control: art-8
    target_controls:
      - id: art-8
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          O Art. 8 da Resolução 4.893 trata das exigências de documentação da
          política de segurança cibernética e dos registros associados. O Art. 8
          da CNSP 381 estabelece requisitos de documentação equivalentes para o
          setor de seguros. A correspondência é quase perfeita — ambos exigem que
          as políticas, procedimentos e controles sejam documentados e mantidos
          atualizados e acessíveis para fins de supervisão.

  - source_control: art-9
    target_controls:
      - id: art-9
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          O Art. 9 da Resolução 4.893 obriga a elaboração de plano de ação e de
          resposta a incidentes cibernéticos para instituições financeiras. O Art.
          9 da CNSP 381 impõe a mesma obrigação ao setor securitário. Ambos
          determinam que o plano deve abranger procedimentos e controles para
          tratamento de incidentes relevantes, incluindo a definição de
          responsabilidades e a previsão de comunicação às autoridades competentes.

  - source_control: art-10
    target_controls:
      - id: art-10
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          O Art. 10 da Resolução 4.893 exige a comunicação de incidentes relevantes
          ao Banco Central do Brasil. O Art. 10 da CNSP 381 obriga a comunicação
          equivalente à Susep. A estrutura da obrigação é idêntica — notificação
          tempestiva do incidente, descrição das medidas adotadas e resultados
          obtidos — diferindo apenas na autoridade supervisora destinatária da
          comunicação (BCB versus Susep).

  - source_control: art-11
    target_controls:
      - id: art-11
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          O Art. 11 da Resolução 4.893 exige a elaboração de relatório anual sobre
          a implementação do plano de ação e de resposta a incidentes, com os
          resultados obtidos. O Art. 11 da CNSP 381 impõe obrigação idêntica ao
          setor securitário. Ambos funcionam como instrumento de accountability
          perante a diretoria da instituição e o regulador, garantindo supervisão
          contínua da efetividade das medidas de segurança cibernética.

  - source_control: art-12
    target_controls:
      - id: art-12
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          O Art. 12 da Resolução 4.893 regulamenta a contratação de serviços de
          processamento e armazenamento de dados em nuvem por instituições
          financeiras, exigindo due diligence e capacidade de auditoria. O Art. 12
          da CNSP 381 estabelece requisitos análogos para o setor securitário. A
          convergência é alta — ambos exigem avaliação prévia do prestador de
          serviços, cláusulas contratuais específicas e mecanismos que assegurem o
          acesso aos dados pelo regulador.

  - source_control: art-13
    target_controls:
      - id: art-13
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          O Art. 13 da Resolução 4.893 trata dos requisitos de due diligence na
          contratação de serviços de processamento em nuvem, incluindo avaliação
          da capacidade do prestador e compatibilidade com as políticas internas.
          O Art. 13 da CNSP 381 replica essa exigência para o setor de seguros.
          Ambos visam mitigar riscos associados à terceirização de infraestrutura
          tecnológica crítica para provedores de serviços em nuvem.

  - source_control: art-14
    target_controls:
      - id: art-14
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          O Art. 14 da Resolução 4.893 estabelece que a contratação de serviços
          de processamento e armazenamento de dados no exterior deve observar a
          legislação e regulamentação vigentes. O Art. 14 da CNSP 381 impõe a
          mesma exigência ao setor securitário. A equivalência é quase total —
          ambos condicionam o armazenamento de dados em jurisdições estrangeiras
          ao cumprimento das normas de proteção de dados e às exigências de
          acesso pelas autoridades supervisoras brasileiras.

  - source_control: art-15
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          O Art. 15 da Resolução 4.893 trata da gestão de riscos associados a
          terceiros e prestadores de serviços relevantes para as instituições
          financeiras. O Art. 15 da CNSP 381 aborda a mesma temática para o setor
          securitário. A correspondência é alta, com ambos exigindo procedimentos
          de avaliação, monitoramento e gestão de riscos de terceiros que acessem
          dados ou sistemas da instituição regulada.

  - source_control: art-17
    target_controls:
      - id: art-17
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          O Art. 17 da Resolução 4.893 atribui à diretoria da instituição
          financeira a responsabilidade pela aprovação da política de segurança
          cibernética e pela execução do plano de ação e resposta a incidentes.
          O Art. 17 da CNSP 381 estabelece responsabilidades equivalentes para a
          diretoria das entidades do setor securitário. Ambos garantem que a
          governança de segurança cibernética tenha comprometimento e supervisão
          da alta administração.

  - source_control: art-19
    target_controls:
      - id: art-18
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          O Art. 19 da Resolução 4.893 exige a designação de um diretor
          responsável pela política de segurança cibernética nas instituições
          financeiras. O Art. 18 da CNSP 381 impõe obrigação equivalente para o
          setor securitário. A diferença na numeração do artigo (19 vs. 18) não
          altera a equivalência funcional — ambos exigem uma pessoa formalmente
          designada com competência e autoridade para supervisionar a implementação
          e o cumprimento da política de segurança cibernética.
