id: dpdp-india_to_gdpr
title: "DPDP Act 2023 to GDPR Control Mapping"
source_framework: dpdp-india
target_framework: gdpr
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic

mappings:
  - source_control: sec-2
    target_controls:
      - id: art-1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          DPDP Section 2 (Definitions) maps to GDPR Art. 1 (Subject-matter and Objectives)
          at a foundational level. Both establish the conceptual framework for their
          respective regulations. Section 2 defines core terms (Data Fiduciary = Controller,
          Data Principal = Data Subject, Data Processor = Processor), while Art. 1 establishes
          the regulation's scope and purpose. The terminological alignment is strong but the
          articles serve different structural functions.
      - id: art-5
        relationship: complements
        confidence: 0.75
        rationale: >
          DPDP Section 2 definitions of "personal data," "processing," and "personal data
          breach" establish the vocabulary upon which GDPR Art. 5 principles operate. The
          DPDP definition of "personal data breach" (Section 2(h)) is broader than GDPR's,
          covering unauthorized processing and loss of access in addition to unauthorized
          disclosure. The definitional scope supports the application of GDPR data protection
          principles.

  - source_control: sec-3
    target_controls:
      - id: art-1
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          DPDP Section 3 (Application of the Act) maps to GDPR Art. 1 (Subject-matter and
          Objectives). Both define the territorial and material scope of their respective
          regulations. Section 3 establishes extraterritorial application for processing
          connected to offering goods or services to Data Principals in India, mirroring
          GDPR Art. 3's extraterritorial reach for EU data subjects. Both exclude personal
          or domestic processing. The DPDP additionally excludes publicly available data,
          which GDPR does not exempt.

  - source_control: sec-4
    target_controls:
      - id: art-6
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          DPDP Section 4 (Consent of Data Principal) maps directly to GDPR Art. 6
          (Lawfulness of Processing), specifically Art. 6(1)(a) on consent. Both require
          consent to be free, specific, informed, and unambiguous with a clear affirmative
          action. The DPDP adds "unconditional" as a requirement, which GDPR implies but
          does not state explicitly. Both guarantee the right to withdraw consent. The
          DPDP's "symmetry principle" (withdrawal must be as easy as granting) is equivalent
          to GDPR Art. 7(3).
      - id: art-5
        relationship: complements
        confidence: 0.80
        rationale: >
          DPDP Section 4(3)(b) requires consent to be limited to personal data "necessary
          for such specified purpose," directly supporting GDPR Art. 5(1)(b) purpose
          limitation and Art. 5(1)(c) data minimisation principles. Both frameworks
          require purpose-specific, proportional data collection tied to consent.

  - source_control: sec-5
    target_controls:
      - id: art-5
        relationship: implements
        confidence: 0.85
        rationale: >
          DPDP Section 5 (Notice and Consent for Processing) implements GDPR Art. 5(1)(a)
          lawfulness, fairness, and transparency principle. Both require Data Fiduciaries/
          Controllers to provide clear, itemized notice to Data Principals/Data Subjects
          before or at the time of data collection. The DPDP's retroactive notice requirement
          for pre-existing processing (Section 5(2)) goes beyond GDPR Art. 5 but aligns with
          the transparency principle.
      - id: art-6
        relationship: complements
        confidence: 0.78
        rationale: >
          DPDP Section 5's notice obligation complements the lawfulness framework of GDPR
          Art. 6 by ensuring Data Principals are informed about processing purposes and
          their rights before consent is obtained. Both frameworks treat notice as a
          prerequisite for valid consent-based processing.

  - source_control: sec-6
    target_controls:
      - id: art-6
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          DPDP Section 6 (Consent Requirements and Lawful Processing) is the closest
          equivalent to GDPR Art. 6 (Lawfulness of Processing). Both establish the legal
          bases for processing personal data. DPDP simplifies to two categories (consent
          and legitimate uses), while GDPR provides six distinct bases. The consent
          standard is nearly identical: free, specific, informed, unambiguous, with
          clear affirmative action. DPDP's "legitimate uses" conceptually encompass
          GDPR's contractual necessity, legal obligation, vital interests, public
          interest, and legitimate interests.

  - source_control: sec-7
    target_controls:
      - id: art-6
        relationship: subset-of
        confidence: 0.82
        rationale: >
          DPDP Section 7 (Certain Legitimate Uses) elaborates on non-consent legal bases,
          mapping to GDPR Art. 6(1)(b)-(f). Section 7(a) voluntary provision parallels
          Art. 6(1)(b) contract performance. Section 7(b) state functions maps to
          Art. 6(1)(e) public interest/official authority. Section 7(c) legal compliance
          maps to Art. 6(1)(c) legal obligation. Sections 7(d)-(f) medical emergency and
          disaster response map to Art. 6(1)(d) vital interests. The DPDP uses an opt-out
          model for voluntary provision, while GDPR requires explicit contractual basis.

  - source_control: sec-8
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          DPDP Section 8(1)(a) (accuracy) and Section 8(2) (retention limitation) map
          directly to GDPR Art. 5(1)(d) accuracy and Art. 5(1)(e) storage limitation.
          Both require reasonable efforts for data accuracy and limit retention to the
          period necessary for the specified purpose. The DPDP's dormancy-based erasure
          trigger (Section 8(3)) goes beyond GDPR Art. 5 but reinforces the storage
          limitation principle.
      - id: art-32
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          DPDP Section 8(1)(b) (reasonable security safeguards) maps directly to GDPR
          Art. 32 (Security of Processing). Both require controllers/Data Fiduciaries to
          implement appropriate technical and organizational measures to prevent data
          breaches. The DPDP uses "reasonable security safeguards" while GDPR specifies
          measures "appropriate to the risk," but the substantive requirement is equivalent.
      - id: art-33
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          DPDP Section 8(1)(c) (breach notification to Board and Data Principals) maps
          directly to GDPR Art. 33 (Notification of Breach to Supervisory Authority).
          Both require notification to the regulatory authority upon a personal data breach.
          The DPDP additionally mandates notification to affected Data Principals in the
          same provision, while GDPR separates this into Art. 34. GDPR specifies a 72-hour
          deadline; DPDP defers the timeline to prescribed rules.
      - id: art-17
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          DPDP Section 8(1)(d) (erasure upon consent withdrawal or purpose fulfillment)
          maps directly to GDPR Art. 17 (Right to Erasure). Both require deletion of
          personal data when consent is withdrawn or the processing purpose is no longer
          served, with exceptions for legal retention obligations. The DPDP's dual trigger
          (consent withdrawal OR purpose fulfillment, whichever is earlier) is slightly
          more prescriptive than GDPR Art. 17's enumerated grounds.
      - id: art-28
        relationship: subset-of
        confidence: 0.82
        rationale: >
          DPDP Section 8(1)(g) (processor engagement under valid contract) maps to GDPR
          Art. 28 (Processor). Both require a contractual basis for engaging data processors.
          GDPR Art. 28 is substantially more detailed, specifying mandatory contract clauses
          (documented instructions, confidentiality, security measures, sub-processor
          restrictions, deletion/return, audit rights). DPDP Section 8(1)(g) establishes
          the principle but defers specifics to rules.
      - id: art-30
        relationship: complements
        confidence: 0.72
        rationale: >
          DPDP Section 8 obligations collectively complement GDPR Art. 30 (Records of
          Processing Activities). The DPDP's requirements for documenting processing
          purposes, security safeguards, retention periods, and processor relationships
          generate records that align with GDPR Art. 30 record-keeping requirements,
          although the DPDP does not explicitly mandate a formal ROPA.

  - source_control: sec-9
    target_controls:
      - id: art-35
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          DPDP Section 9(2)(c)(i) (periodic Data Protection Impact Assessment for
          Significant Data Fiduciaries) maps directly to GDPR Art. 35 (DPIA). Both require
          impact assessments evaluating processing risks to data subject rights. The DPDP
          mandates periodic DPIAs for all SDFs regardless of processing risk level, while
          GDPR Art. 35 triggers DPIAs based on high-risk processing. The DPDP approach is
          broader in application but less risk-calibrated.
      - id: art-25
        relationship: complements
        confidence: 0.78
        rationale: >
          DPDP Section 9's enhanced obligations for Significant Data Fiduciaries (DPO,
          independent auditor, periodic DPIA) support GDPR Art. 25 (Data Protection by
          Design and by Default). The institutional safeguards mandated for SDFs ensure
          that data protection is embedded in organizational governance, aligning with
          the design-and-default philosophy of Art. 25.

  - source_control: sec-10
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          DPDP Section 10 (Processing of Children's Data) maps to GDPR Art. 6 insofar as
          GDPR Art. 8 (referenced in Art. 6) addresses conditions for children's consent
          to information society services. Note: GDPR Art. 8 is not present as a separate
          control in this project. Both require parental/guardian consent for processing
          children's data. The DPDP is stricter: it applies to all processing (not just
          information society services), imposes an absolute ban on tracking and targeted
          advertising for children, and uses 18 as the age threshold versus GDPR's flexible
          13-16 range.

  - source_control: sec-11
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          DPDP Section 11(1)(a)-(b) (right to access a summary of personal data and
          identities of Data Fiduciaries/Processors with whom data was shared) maps
          directly to GDPR Art. 15 (Right of Access). Both grant data subjects the right
          to obtain information about their data and its processing. GDPR Art. 15 is
          broader, granting access to a copy of the data itself, information about
          automated decision-making, and data source information. The DPDP provides
          a summary rather than a full copy.
      - id: art-17
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          DPDP Section 11(1)(c) (right to correction and erasure) maps to GDPR Art. 17
          (Right to Erasure). Both grant data subjects the right to request erasure of
          personal data. The DPDP combines correction and erasure in a single right, while
          GDPR separates them into Art. 16 (Rectification) and Art. 17 (Erasure). The
          erasure grounds under GDPR Art. 17 are more detailed and enumerated.

  - source_control: sec-12
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          DPDP Section 12 (Duties of Data Principal) has no direct GDPR equivalent. It
          is a novel provision imposing obligations on data subjects themselves (no false
          complaints, no impersonation, no false information). The closest GDPR concept
          is Art. 5(2) accountability, but that applies to controllers, not data subjects.
          GDPR Art. 12(5) allows controllers to refuse manifestly unfounded or excessive
          requests, which indirectly addresses frivolous complaints. The relationship is
          weak but exists at the intersection of preventing abuse of rights.

  - source_control: sec-13
    target_controls:
      - id: art-15
        relationship: complements
        confidence: 0.72
        rationale: >
          DPDP Section 13 (Right to Grievance Redressal) complements GDPR Art. 15 and
          the broader GDPR rights framework. While GDPR does not mandate a specific
          internal grievance mechanism (Art. 77 provides the right to lodge a complaint
          with a supervisory authority directly), the DPDP requires Data Principals to
          first exhaust internal grievance mechanisms before escalating to the Board. This
          two-tier approach complements the GDPR rights exercise framework by adding a
          mandatory internal resolution layer.
      - id: art-83
        relationship: complements
        confidence: 0.70
        rationale: >
          DPDP Section 13's grievance escalation to the Data Protection Board complements
          GDPR Art. 83 (Administrative Fines) conceptually. Both establish enforcement
          pathways: DPDP through Board complaints and orders, GDPR through supervisory
          authority fines. The mechanisms differ structurally but serve the same
          enforcement purpose.

  - source_control: sec-14
    target_controls:
      - id: art-15
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          DPDP Section 14 (Nomination of Another Individual to Exercise Rights) has no
          direct GDPR equivalent. It addresses digital estate planning by allowing
          nomination of a person to exercise rights upon death or incapacity. GDPR Art. 15
          and other rights provisions do not address posthumous data rights. The
          intersection exists only in that both provisions concern the exercise of data
          subject rights, but DPDP extends this to nominees in a way GDPR does not
          contemplate. Some EU Member States address deceased persons' data through
          national implementing legislation.

  - source_control: sec-16
    target_controls:
      - id: art-44
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          DPDP Section 16 (Transfer of Personal Data Outside India) maps directly to GDPR
          Art. 44 (General Principle for Transfers). Both regulate cross-border transfers
          of personal data. The mechanisms differ significantly: GDPR uses an adequacy-
          plus-safeguards model (default restriction, transfers allowed via adequacy
          decisions, SCCs, or BCRs), while DPDP uses a government-controlled allowlist/
          blocklist model (default permission, transfers restricted only to specifically
          blocked countries). Despite the structural difference, both serve the same
          regulatory purpose of controlling international data flows.

  - source_control: sec-17
    target_controls:
      - id: art-6
        relationship: complements
        confidence: 0.75
        rationale: >
          DPDP Section 17 (Exemptions) partially complements GDPR Art. 6 legal bases.
          Section 17(1)(a) legal rights enforcement and 17(1)(b) judicial processing
          parallel concepts found in GDPR Art. 6(1)(c) and (e). Section 17(1)(d)(ii)
          research and statistical purposes parallels GDPR Art. 89 and the research
          exemption under Art. 5(1)(b). However, the DPDP exemptions are broader in
          scope — they exempt from the entire Act (except Section 8(3)), whereas GDPR
          provides specific derogations within individual provisions.
      - id: art-1
        relationship: intersects-with
        confidence: 0.72
        rationale: >
          DPDP Section 17's exemptions for state security, sovereignty, and public order
          intersect with GDPR Art. 1 and the broader GDPR scope provisions. GDPR Art.
          2(2) excludes processing for national security purposes from its scope entirely.
          The DPDP takes a different approach — it does not exclude state processing from
          scope but allows the Central Government to exempt specific instrumentalities via
          notification. Both recognize the tension between data protection and state
          security, but resolve it through different mechanisms.

  - source_control: sec-18
    target_controls:
      - id: art-83
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          DPDP Section 18 (Establishment of the Data Protection Board of India) maps to
          GDPR Art. 83 in the context of enforcement infrastructure. GDPR Art. 83
          presupposes the existence of independent supervisory authorities (established
          under Art. 51-52) that impose fines. The DPDP Board serves a similar enforcement
          function but is government-appointed rather than independent, a structural
          difference from GDPR's independence requirement under Art. 52. Both entities
          serve as the primary enforcement mechanism for their respective regulations.

  - source_control: sec-27
    target_controls:
      - id: art-83
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          DPDP Section 27 (Inquiry by the Board) maps to GDPR Art. 83 insofar as both
          address the enforcement investigation process. Section 27 grants the Board
          quasi-judicial powers (summoning witnesses, compelling documents, receiving
          sworn evidence) and the authority to direct remedial actions and impose penalties.
          GDPR Art. 83 addresses the conditions and criteria for imposing administrative
          fines. Both establish the procedural framework for enforcement actions, though
          the DPDP Board's civil court powers are more explicitly defined.

  - source_control: sec-33
    target_controls:
      - id: art-83
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          DPDP Section 33 (Penalties) maps directly to GDPR Art. 83 (Administrative Fines).
          Both establish graduated penalty frameworks based on violation severity. Both
          require consideration of mitigating/aggravating factors: nature, gravity, duration,
          data type, repetition, mitigation efforts, and proportionality. The key structural
          difference is that GDPR fines are revenue-based (up to 4% of global turnover),
          while DPDP uses fixed maximum amounts (up to INR 250 crore / ~USD 30M). GDPR's
          approach is more impactful for large enterprises, while DPDP's fixed caps provide
          more predictability.
