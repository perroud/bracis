id: k-isms-p_to_iso-27001-2022
title: "K-ISMS-P to ISO/IEC 27001:2022 Control Mapping"
source_framework: k-isms-p
target_framework: iso-27001-2022
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic

mappings:
  # MSE — Management System Establishment
  - source_control: mse-1
    target_controls:
      - id: a5-1
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          K-ISMS-P mse-1 (Establishment of Information Security Policy and
          Organization) directly aligns with ISO A.5.1 (Policies for Information
          Security). Both require a management-approved information security policy
          that is documented, communicated, and periodically reviewed. The K-ISMS-P
          control additionally mandates a dedicated security organization with CISO
          accountability, which maps to the ISO requirement for policy ownership and
          governance structure.
      - id: a5-2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          K-ISMS-P mse-1 requires formation of a dedicated information security
          organization with clearly assigned roles and accountability, which maps
          to ISO A.5.2 (Information Security Roles and Responsibilities). Both
          controls mandate that security responsibilities are formally defined
          and allocated, with management demonstrating commitment through resource
          allocation.
      - id: a5-36
        relationship: complements
        confidence: 0.72
        rationale: >
          The periodic management review aspect of K-ISMS-P mse-1 complements
          ISO A.5.36 (Compliance with Policies, Rules and Standards). Both require
          regular review of the information security management system to ensure
          continuing suitability. K-ISMS-P focuses on management commitment and
          review cycles; A.5.36 emphasizes compliance monitoring and corrective
          actions.

  - source_control: mse-2
    target_controls:
      - id: a8-8
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          K-ISMS-P mse-2 (Risk Assessment and Treatment) maps to ISO A.8.8
          (Management of Technical Vulnerabilities). Both require systematic
          identification and evaluation of information security risks. K-ISMS-P
          mse-2 addresses the full risk management lifecycle including risk
          registers and treatment plans, while A.8.8 focuses specifically on
          technical vulnerability identification and remediation. The overlap
          lies in the risk assessment methodology and the requirement to evaluate
          exposure to identified vulnerabilities.
      - id: a5-36
        relationship: complements
        confidence: 0.75
        rationale: >
          K-ISMS-P mse-2 risk treatment plans with assigned owners and management
          approval complement ISO A.5.36 (Compliance with Policies, Rules and
          Standards). Both require documented processes with accountable owners,
          periodic review of compliance posture, and corrective action mechanisms
          when non-compliance is detected.

  # ISP — Information Security Policy
  - source_control: isp-1
    target_controls:
      - id: a5-1
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          K-ISMS-P isp-1 (Information Security Policy Document) is a direct
          equivalent of ISO A.5.1 (Policies for Information Security). Both
          require a documented information security policy approved by top
          management, communicated to all employees, and reviewed at planned
          intervals or when significant changes occur. The scope, intent, and
          implementation requirements are functionally identical.
      - id: a5-36
        relationship: implements
        confidence: 0.78
        rationale: >
          The periodic review and update requirements of K-ISMS-P isp-1 support
          ISO A.5.36 (Compliance with Policies, Rules and Standards). isp-1
          provides the policy foundation that A.5.36 requires organizations to
          verify compliance against. Without the documented policy mandated by
          isp-1, the compliance verification process of A.5.36 has no baseline.

  - source_control: isp-2
    target_controls:
      - id: a5-36
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          K-ISMS-P isp-2 (Compliance with Legal and Regulatory Requirements)
          directly maps to ISO A.5.36 (Compliance with Policies, Rules and
          Standards). Both require identification of all applicable legal,
          regulatory, and contractual requirements, establishment of procedures
          for compliance, and periodic review of compliance status. isp-2 is
          specifically scoped to Korean regulations (PIPA, Network Act), while
          A.5.36 is jurisdiction-agnostic.
      - id: a5-1
        relationship: implements
        confidence: 0.76
        rationale: >
          K-ISMS-P isp-2 supports ISO A.5.1 (Policies for Information Security)
          by mandating that the organization's information security policy
          addresses applicable laws and regulations. A.5.1 requires policies to
          consider legal and regulatory requirements, and isp-2 provides the
          detailed compliance identification mechanism that feeds into policy
          development.

  # AC — Access Control
  - source_control: ac-1
    target_controls:
      - id: a5-15
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          K-ISMS-P ac-1 (Access Control Policy and User Registration) is a direct
          equivalent of ISO A.5.15 (Access Control). Both establish requirements
          for access control policies based on business and security requirements,
          formal user registration and de-registration processes, and access
          rights assignment based on the principle of least privilege. Both
          mandate formal authorization before granting access and prohibit
          shared accounts without explicit justification.
      - id: a5-2
        relationship: complements
        confidence: 0.73
        rationale: >
          K-ISMS-P ac-1 requirements for unique user identification and formal
          authorization processes complement ISO A.5.2 (Information Security
          Roles and Responsibilities). The access control policy mandated by
          ac-1 operationalizes the role definitions and segregation of duties
          established under A.5.2, particularly for privileged account
          management and enhanced monitoring.

  - source_control: ac-2
    target_controls:
      - id: a5-15
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          K-ISMS-P ac-2 (Network and System Access Restrictions) maps to ISO
          A.5.15 (Access Control). Both address the control of logical access
          to information systems. ac-2 focuses specifically on network
          segmentation, remote access controls, and session management, which
          are implementation details of the broader access control requirements
          in A.5.15.
      - id: a8-1
        relationship: complements
        confidence: 0.72
        rationale: >
          K-ISMS-P ac-2 remote access controls through secure channels with
          strong authentication complement ISO A.8.1 (User Endpoint Devices).
          ac-2 addresses the network security channel requirements, while
          A.8.1 addresses the endpoint device protection. Together they
          provide comprehensive remote access security covering both the
          communication channel and the device from which access is initiated.
      - id: a8-9
        relationship: complements
        confidence: 0.70
        rationale: >
          K-ISMS-P ac-2 requirements for network segmentation separating critical
          systems from general-purpose networks complement ISO A.8.9
          (Configuration Management). Network segmentation configurations are
          part of the broader configuration management discipline, and both
          controls require documented baselines and monitoring for deviations
          from the approved architecture.

  # CRY — Cryptography
  - source_control: cry-1
    target_controls:
      - id: a8-25
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          K-ISMS-P cry-1 (Cryptographic Policy and Key Management) maps to ISO
          A.8.25 (Secure Development Life Cycle). A.8.25 requires secure coding
          guidelines including proper cryptography usage, while cry-1 establishes
          the overarching cryptographic policy defining approved algorithms, key
          lengths, and protocols. The SDLC must implement the cryptographic
          standards defined by cry-1 for all software development activities.
      - id: a5-1
        relationship: implements
        confidence: 0.76
        rationale: >
          K-ISMS-P cry-1 establishes a topic-specific cryptographic policy that
          supports ISO A.5.1 (Policies for Information Security). ISO A.5.1
          guidance explicitly lists cryptography and key management among the
          topic-specific policies organizations should maintain. cry-1 provides
          the detailed cryptographic policy component of the broader information
          security policy framework required by A.5.1.
      - id: a8-28
        relationship: complements
        confidence: 0.73
        rationale: >
          K-ISMS-P cry-1 requirements for approved cryptographic algorithms
          and minimum key lengths complement ISO A.8.28 (Secure Coding).
          A.8.28 requires secure coding practices including proper cryptography
          usage; cry-1 provides the specific cryptographic standards that
          developers must follow when implementing encryption in code.

  - source_control: cry-2
    target_controls:
      - id: a8-25
        relationship: implements
        confidence: 0.77
        rationale: >
          K-ISMS-P cry-2 (Encryption of Personal Information) supports ISO
          A.8.25 (Secure Development Life Cycle). The requirement to encrypt
          specific categories of personal information (resident registration
          numbers, passport numbers, financial account numbers, biometric data)
          directly informs the security requirements that must be built into
          the software development lifecycle. A.8.25 requires security
          requirements in the specification phase, and cry-2 provides those
          requirements for personal information handling.
      - id: a5-15
        relationship: complements
        confidence: 0.72
        rationale: >
          K-ISMS-P cry-2 mandatory encryption of personal information at rest
          and in transit complements ISO A.5.15 (Access Control). Encryption
          serves as a data-level access control mechanism that protects personal
          information even if logical access controls are bypassed. Both controls
          contribute to the defense-in-depth model for protecting sensitive
          information.

  # SDS — System Development Security
  - source_control: sds-1
    target_controls:
      - id: a8-25
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          K-ISMS-P sds-1 (Secure Development Lifecycle) is a direct equivalent
          of ISO A.8.25 (Secure Development Life Cycle). Both require
          establishing secure coding standards, integrating security throughout
          the SDLC, performing security reviews at each development stage,
          and remediating vulnerabilities before production deployment. The
          scope, intent, and practical requirements are functionally identical.
      - id: a8-28
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          K-ISMS-P sds-1 secure coding standards based on recognized sources
          (OWASP, KISA guidelines) map directly to ISO A.8.28 (Secure Coding).
          Both mandate organization-wide secure coding practices, security
          testing at each development stage, and vulnerability remediation
          before production deployment. sds-1 is slightly broader in scope
          covering the entire SDLC; A.8.28 focuses specifically on the
          coding phase.
      - id: a8-8
        relationship: complements
        confidence: 0.73
        rationale: >
          K-ISMS-P sds-1 vulnerability identification and remediation during
          development complement ISO A.8.8 (Management of Technical
          Vulnerabilities). sds-1 addresses vulnerability detection during the
          development process, while A.8.8 covers vulnerability management
          across operational systems. Together they provide vulnerability
          coverage from development through production.

  - source_control: sds-2
    target_controls:
      - id: a8-9
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          K-ISMS-P sds-2 (Change Management and Test Environment Security) is
          a direct equivalent of ISO A.8.9 (Configuration Management). Both
          require formal change management procedures with security impact
          assessment, testing in non-production environments, authorized approval,
          and complete documentation. Both mandate that all modifications to
          information systems follow a controlled, auditable process.
      - id: a8-25
        relationship: implements
        confidence: 0.78
        rationale: >
          K-ISMS-P sds-2 change management procedures and test environment
          security support ISO A.8.25 (Secure Development Life Cycle). The
          secure SDLC requires a controlled change management process, and
          sds-2 provides the specific procedural controls for managing changes
          from development through production deployment.
      - id: a5-36
        relationship: complements
        confidence: 0.70
        rationale: >
          K-ISMS-P sds-2 requirements for authorized approval and documentation
          of changes complement ISO A.5.36 (Compliance with Policies, Rules and
          Standards). Change management compliance is a key area for regulatory
          review, and both controls require evidence that procedures are
          followed systematically.

  # SOM — System Operations and Management
  - source_control: som-1
    target_controls:
      - id: a8-15
        relationship: equivalent-to
        confidence: 0.94
        rationale: >
          K-ISMS-P som-1 (System and Network Monitoring) is a direct equivalent
          of ISO A.8.15 (Logging). Both require generation, protection, and
          analysis of audit logs that record activities, exceptions, and
          security events. Both mandate log retention for legally required
          periods and regular review of collected logs. The practical
          implementation requirements including log integrity protection and
          centralized collection are functionally identical.
      - id: a5-36
        relationship: implements
        confidence: 0.75
        rationale: >
          K-ISMS-P som-1 monitoring and audit logging capabilities support
          ISO A.5.36 (Compliance with Policies, Rules and Standards). The
          logging infrastructure and monitoring processes mandated by som-1
          provide the technical foundation for the compliance verification
          activities required by A.5.36. Without operational monitoring,
          compliance review is limited to manual assessment.

  - source_control: som-2
    target_controls:
      - id: a8-8
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          K-ISMS-P som-2 (Vulnerability and Patch Management) is a direct
          equivalent of ISO A.8.8 (Management of Technical Vulnerabilities).
          Both require systematic identification, assessment, and remediation
          of technical vulnerabilities. Both mandate vulnerability assessments
          at planned intervals, timely application of security patches, and
          compensating controls when immediate patching is not feasible.
          The scope and depth of requirements are functionally identical.
      - id: a8-9
        relationship: complements
        confidence: 0.74
        rationale: >
          K-ISMS-P som-2 patch testing in non-production environments before
          production deployment complements ISO A.8.9 (Configuration Management).
          Patch application modifies system configurations, and both controls
          require that changes (including patches) follow a controlled process
          with testing, approval, and documentation.

  # IM — Incident Management
  - source_control: im-1
    target_controls:
      - id: a5-1
        relationship: implements
        confidence: 0.76
        rationale: >
          K-ISMS-P im-1 (Security Incident Response Procedures) supports ISO
          A.5.1 (Policies for Information Security). ISO A.5.1 guidance
          explicitly lists information security incident management among the
          topic-specific policies organizations should maintain. im-1 provides
          the detailed incident management policy and procedures that form
          a key component of the policy framework required by A.5.1.
      - id: a8-15
        relationship: complements
        confidence: 0.74
        rationale: >
          K-ISMS-P im-1 incident detection and reporting requirements complement
          ISO A.8.15 (Logging). Effective incident response depends on the
          logging infrastructure mandated by A.8.15 for detecting security
          events, while im-1 defines what happens once events are detected.
          The incident response team uses log data for containment, investigation,
          and forensic analysis.
      - id: a5-2
        relationship: implements
        confidence: 0.73
        rationale: >
          K-ISMS-P im-1 requirement for clearly defined incident response roles
          and responsibilities supports ISO A.5.2 (Information Security Roles
          and Responsibilities). im-1 mandates a dedicated incident response
          team with specific authority and capability, which operationalizes
          the broader role definition requirements of A.5.2 for the incident
          management domain.

  - source_control: im-2
    target_controls:
      - id: a5-36
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          K-ISMS-P im-2 (Personal Information Breach Notification) maps to ISO
          A.5.36 (Compliance with Policies, Rules and Standards). Breach
          notification is a core regulatory compliance obligation under Korean
          law (PIPA, Network Act). A.5.36 requires compliance with applicable
          laws and regulatory requirements, and im-2 provides the specific
          procedural controls for meeting the Korean breach notification
          mandate within 72 hours.
      - id: a5-1
        relationship: implements
        confidence: 0.73
        rationale: >
          K-ISMS-P im-2 breach notification procedures support ISO A.5.1
          (Policies for Information Security). Breach notification policy is
          a topic-specific policy that falls within the broader policy framework
          required by A.5.1, addressing the organization's approach to managing
          the legal and reputational consequences of personal information
          breaches.

  # PIC — Personal Information Collection
  - source_control: pic-1
    target_controls:
      - id: a5-1
        relationship: implements
        confidence: 0.74
        rationale: >
          K-ISMS-P pic-1 (Lawful Collection and Consent for Personal Information)
          supports ISO A.5.1 (Policies for Information Security). While ISO
          27001:2022 does not include dedicated privacy controls (those are
          addressed by ISO 27701), A.5.1 requires topic-specific policies that
          address applicable legal requirements. Where personal information
          processing is within scope, pic-1 consent requirements contribute
          to the policy framework mandated by A.5.1.
      - id: a5-36
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          K-ISMS-P pic-1 requirements for lawful collection and informed consent
          map to ISO A.5.36 (Compliance with Policies, Rules and Standards).
          Consent management is a fundamental compliance obligation under Korean
          privacy law, and A.5.36 requires organizations to verify compliance
          with all applicable legal requirements. pic-1 provides the specific
          controls for demonstrating compliance with the PIPA consent framework.
      - id: a5-15
        relationship: complements
        confidence: 0.70
        rationale: >
          K-ISMS-P pic-1 consent-based access to personal information complements
          ISO A.5.15 (Access Control). Consent status serves as an additional
          access control criterion determining who can access what personal
          information for which purpose. Both controls restrict access to
          information assets based on authorization mechanisms, though pic-1
          focuses specifically on data subject consent as the authorization basis.

  - source_control: pic-2
    target_controls:
      - id: a5-36
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          K-ISMS-P pic-2 (Purpose Limitation and Restriction on Collection) maps
          to ISO A.5.36 (Compliance with Policies, Rules and Standards). Purpose
          limitation is a fundamental principle of Korean privacy law (PIPA),
          and compliance with this principle is a core regulatory obligation.
          A.5.36 requires regular verification that organizational practices
          comply with applicable legal requirements, and pic-2 defines the
          specific purpose limitation controls to be verified.
      - id: a5-1
        relationship: implements
        confidence: 0.74
        rationale: >
          K-ISMS-P pic-2 purpose limitation requirements support ISO A.5.1
          (Policies for Information Security). Data minimization and purpose
          limitation policies are components of the topic-specific policy
          framework required by A.5.1. pic-2 mandates documentation of
          purposes for each personal information category, which becomes
          part of the organizational information security policy.
      - id: a5-15
        relationship: complements
        confidence: 0.71
        rationale: >
          K-ISMS-P pic-2 purpose-bound data access restrictions complement
          ISO A.5.15 (Access Control). Purpose limitation adds a contextual
          dimension to access control; data collected for one purpose cannot
          be accessed for another without separate authorization. This extends
          the traditional role-based access model of A.5.15 with purpose-based
          access constraints.

  # PIP — Personal Information Processing
  - source_control: pip-1
    target_controls:
      - id: a5-36
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          K-ISMS-P pip-1 (Personal Information Processing and Retention) maps
          to ISO A.5.36 (Compliance with Policies, Rules and Standards).
          Data retention and destruction timelines are legal compliance
          obligations under Korean law, and A.5.36 requires verification
          of compliance with applicable regulations. pip-1 establishes the
          specific retention controls that organizations must implement and
          against which compliance is measured.
      - id: a5-1
        relationship: implements
        confidence: 0.75
        rationale: >
          K-ISMS-P pip-1 data retention and processing policies support
          ISO A.5.1 (Policies for Information Security). Retention policies
          are among the topic-specific policies that A.5.1 requires
          organizations to define and maintain. pip-1 provides the detailed
          data lifecycle management rules that form part of the broader
          information security policy framework.

  - source_control: pip-2
    target_controls:
      - id: a5-36
        relationship: intersects-with
        confidence: 0.81
        rationale: >
          K-ISMS-P pip-2 (Personal Information Destruction) maps to ISO A.5.36
          (Compliance with Policies, Rules and Standards). Secure data
          destruction is a regulatory compliance obligation under Korean law,
          requiring documented processes with specific methods that prevent
          recovery. A.5.36 requires compliance verification with applicable
          legal requirements, and pip-2 defines the destruction procedures
          to be verified.
      - id: a5-1
        relationship: implements
        confidence: 0.74
        rationale: >
          K-ISMS-P pip-2 destruction policies and procedures support ISO A.5.1
          (Policies for Information Security). Data destruction policy is a
          topic-specific policy within the broader information security policy
          framework required by A.5.1. pip-2 requires documented destruction
          methods, date records, and responsible parties, which constitute
          the operational policy detail expected under A.5.1.
      - id: a8-9
        relationship: complements
        confidence: 0.70
        rationale: >
          K-ISMS-P pip-2 requirements for documented destruction methods and
          irrecoverable data deletion complement ISO A.8.9 (Configuration
          Management). Destruction procedures modify system configuration state
          and must be managed through controlled processes. Both controls
          require that operational changes are documented, executed by authorized
          personnel, and verified for completeness.

  # PIR — Personal Information Rights
  - source_control: pir-1
    target_controls:
      - id: a5-36
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          K-ISMS-P pir-1 (Data Subject Access and Correction Rights) maps to
          ISO A.5.36 (Compliance with Policies, Rules and Standards). Data
          subject rights fulfillment is a core regulatory compliance obligation
          under Korean PIPA, with strict 10-day response deadlines. A.5.36
          requires organizations to verify compliance with applicable legal
          requirements, and pir-1 defines the specific controls for meeting
          data subject rights obligations.
      - id: a5-1
        relationship: implements
        confidence: 0.74
        rationale: >
          K-ISMS-P pir-1 data subject rights procedures support ISO A.5.1
          (Policies for Information Security). A.5.1 requires topic-specific
          policies addressing applicable legal requirements. Where personal
          information processing is in scope, data subject rights policies
          and procedures form an essential component of the information
          security policy framework.
      - id: a5-15
        relationship: complements
        confidence: 0.72
        rationale: >
          K-ISMS-P pir-1 requirements for identity verification before
          providing data subject access complement ISO A.5.15 (Access Control).
          The DSAR process must verify the identity of the requesting data
          subject to prevent unauthorized access to personal information,
          applying access control principles in the context of privacy rights
          fulfillment.

  - source_control: pir-2
    target_controls:
      - id: a5-36
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          K-ISMS-P pir-2 (Right to Withdraw Consent and Restrict Processing)
          maps to ISO A.5.36 (Compliance with Policies, Rules and Standards).
          Consent withdrawal rights are a fundamental compliance requirement
          under Korean PIPA. A.5.36 requires compliance with applicable legal
          obligations, and pir-2 defines the specific controls for honoring
          consent withdrawal requests with a mechanism no more burdensome than
          the original consent collection.
      - id: a5-1
        relationship: implements
        confidence: 0.73
        rationale: >
          K-ISMS-P pir-2 consent withdrawal policies support ISO A.5.1
          (Policies for Information Security). The consent management lifecycle
          including withdrawal mechanisms is a topic-specific policy required
          within the broader information security policy framework mandated
          by A.5.1. pir-2 establishes the specific requirements for how
          consent withdrawal is handled operationally.
      - id: a5-15
        relationship: complements
        confidence: 0.70
        rationale: >
          K-ISMS-P pir-2 processing cessation upon consent withdrawal
          complements ISO A.5.15 (Access Control). Consent withdrawal functions
          as an access revocation mechanism for personal information processing.
          When consent is withdrawn, all processing access to the affected data
          must cease, which operationalizes the access rights removal
          requirements of A.5.15 in a privacy context.
