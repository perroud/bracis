id: iso-42001_to_eu-ai-act
title: "ISO/IEC 42001:2023 to EU AI Act Control Mapping"
source_framework: iso-42001
target_framework: eu-ai-act
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic

mappings:
  # ── ctx (Context of the Organization) ───────────────────────────────────

  - source_control: ctx-1
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ISO 42001 ctx-1 requires the organization to determine external and internal
          issues relevant to its AI management system, including its role as AI provider,
          deployer, or developer and the potential impacts of AI systems. EU AI Act Art. 6
          establishes classification rules for high-risk AI systems based on the domain and
          context of use. Both controls require organizations to assess the context in which
          AI systems operate to determine applicable governance requirements, though Art. 6
          focuses specifically on risk classification while ctx-1 addresses broader
          organizational context.
      - id: art-9
        relationship: complements
        confidence: 0.78
        rationale: >
          ISO 42001 ctx-1's requirement to understand external and internal issues affecting
          AI systems complements Art. 9's risk management system, which must identify and
          analyze risks throughout the AI system lifecycle. Contextual understanding of the
          organization's AI landscape is a prerequisite for effective risk identification as
          mandated by Art. 9(2).

  - source_control: ctx-2
    target_controls:
      - id: art-13
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO 42001 ctx-2 requires identifying interested parties and their requirements,
          including those affected by AI outputs, regulators, and end users. Art. 13
          requires transparency and provision of information to deployers, including
          system capabilities, limitations, and performance. Both controls address the
          need to understand and communicate with stakeholders who interact with or are
          affected by AI systems.
      - id: art-14
        relationship: complements
        confidence: 0.75
        rationale: >
          ISO 42001 ctx-2's identification of interested parties affected by AI decisions
          complements Art. 14's human oversight requirements, which aim to protect the
          health, safety, and fundamental rights of those same interested parties. The
          stakeholder identification process in ctx-2 informs who benefits from the
          human oversight mechanisms mandated by Art. 14.

  - source_control: ctx-3
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          ISO 42001 ctx-3 requires determining the boundaries and applicability of the AI
          management system, identifying which AI systems, processes, and organizational
          units are in scope. Art. 6 determines which AI systems are classified as
          high-risk based on Annex I and Annex III criteria. Both controls establish the
          scope of governance — ctx-3 for the management system boundary, Art. 6 for the
          regulatory compliance boundary. Scope determination in ctx-3 directly informs
          which systems fall under Art. 6 high-risk classification.

  # ── ldr (Leadership) ───────────────────────────────────────────────────

  - source_control: ldr-1
    target_controls:
      - id: art-9
        relationship: complements
        confidence: 0.77
        rationale: >
          ISO 42001 ldr-1 requires top management to demonstrate leadership and commitment
          to the AI management system, ensuring resources and integration with business
          processes. Art. 9 mandates a risk management system that is continuous and
          lifecycle-spanning. Leadership commitment from ldr-1 provides the organizational
          authority and resource allocation necessary to sustain the risk management
          system required by Art. 9.

  - source_control: ldr-2
    target_controls:
      - id: art-9
        relationship: complements
        confidence: 0.79
        rationale: >
          ISO 42001 ldr-2 requires establishing an AI policy covering responsible
          development and use of AI, including commitments to fairness, transparency,
          accountability, safety, and privacy. Art. 9 mandates a risk management system
          with documented risk management measures. The AI policy from ldr-2 establishes
          the organizational principles and commitments that frame the risk management
          approach required by Art. 9.
      - id: art-5
        relationship: complements
        confidence: 0.73
        rationale: >
          ISO 42001 ldr-2's requirement for an AI policy that addresses responsible
          development and use of AI complements Art. 5's prohibited AI practices. The
          AI policy should explicitly incorporate the prohibited practices defined in
          Art. 5, translating regulatory prohibitions into organizational policy
          constraints that prevent deployment of prohibited AI systems.

  - source_control: ldr-3
    target_controls:
      - id: art-9
        relationship: complements
        confidence: 0.76
        rationale: >
          ISO 42001 ldr-3 requires assigning responsibilities and authorities for AI
          system development, deployment, operation, and oversight. Art. 9(4) requires
          the provider to eliminate or reduce risks through adequate design and
          development, and Art. 9(5) requires testing. Clear role definitions from ldr-3
          ensure that the personnel executing Art. 9 risk management activities have
          defined accountability.
      - id: art-14
        relationship: complements
        confidence: 0.74
        rationale: >
          ISO 42001 ldr-3's assignment of roles for AI oversight, including the authority
          to halt AI deployment when risks are unacceptable, complements Art. 14's human
          oversight requirements. Art. 14(4) requires that individuals assigned human
          oversight can override or interrupt AI system operations; ldr-3 provides the
          organizational role framework that designates who those oversight individuals are.

  # ── pln (Planning) ─────────────────────────────────────────────────────

  - source_control: pln-1
    target_controls:
      - id: art-9
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          ISO 42001 pln-1 requires determining risks and opportunities related to the AI
          management system, including AI-specific risks to individuals, groups,
          organizations, and society. Art. 9 mandates a risk management system covering
          risks to health, safety, and fundamental rights throughout the AI lifecycle.
          Both controls require systematic risk identification, evaluation, and treatment
          for AI systems, with overlapping risk domains (bias, safety, adversarial attacks,
          societal consequences). The intersection is strong but not equivalent because
          pln-1 addresses management system risks broadly while Art. 9 is specifically
          scoped to high-risk AI systems.

  - source_control: pln-2
    target_controls:
      - id: art-9
        relationship: complements
        confidence: 0.75
        rationale: >
          ISO 42001 pln-2 requires establishing measurable AI objectives consistent with
          AI policy, including fairness metrics, accuracy thresholds, and human review
          rates. Art. 9(4) requires that residual risk be judged acceptable, and Art. 9(5)
          requires testing to ensure consistent performance. The measurable objectives from
          pln-2 provide the quantitative targets against which Art. 9 risk management
          effectiveness can be evaluated.
      - id: art-15
        relationship: complements
        confidence: 0.72
        rationale: >
          ISO 42001 pln-2's requirement for measurable AI objectives including accuracy
          thresholds and performance metrics complements Art. 15's mandate that high-risk
          AI systems achieve appropriate levels of accuracy, robustness, and cybersecurity.
          The AI objectives from pln-2 operationalize the accuracy and robustness targets
          that Art. 15 requires to be declared and communicated to deployers.

  - source_control: pln-3
    target_controls:
      - id: art-9
        relationship: complements
        confidence: 0.74
        rationale: >
          ISO 42001 pln-3 requires planned change management for the AI management system,
          including assessment of consequences for model updates, data source modifications,
          and deployment configuration changes. Art. 9(1) requires that the risk management
          system be continuously updated throughout the AI lifecycle. Structured change
          management from pln-3 triggers the risk re-assessment cycles mandated by Art. 9.
      - id: art-71
        relationship: complements
        confidence: 0.71
        rationale: >
          ISO 42001 pln-3's change management process complements Art. 71's post-market
          monitoring requirements. Changes to AI systems detected through post-market
          monitoring (Art. 71) must be managed through structured change processes (pln-3),
          and vice versa — changes planned under pln-3 must be reflected in post-market
          monitoring configurations.

  # ── sup (Support) ──────────────────────────────────────────────────────

  - source_control: sup-1
    target_controls:
      - id: art-9
        relationship: complements
        confidence: 0.73
        rationale: >
          ISO 42001 sup-1 requires determining and providing resources for the AI
          management system, including AI-specific competence in data science, ML
          engineering, AI ethics, and risk management. Art. 9 mandates a risk management
          system requiring cross-functional expertise. Competent personnel from sup-1 are
          a prerequisite for executing the risk identification, analysis, and mitigation
          activities required by Art. 9.
      - id: art-14
        relationship: complements
        confidence: 0.75
        rationale: >
          ISO 42001 sup-1's competence requirements for personnel working with AI systems
          directly complement Art. 14's human oversight requirements. Art. 14(4) requires
          that human overseers properly understand AI system capabilities and limitations
          and be able to correctly interpret outputs. This demands the AI-specific
          competence that sup-1 mandates organizations to develop and verify.

  - source_control: sup-2
    target_controls:
      - id: art-13
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          ISO 42001 sup-2 requires awareness and communication about AI system
          capabilities, limitations, and potential impacts, both internally and
          externally. Art. 13 requires transparency to deployers including system
          performance characteristics, known risks, and output interpretation guidance.
          Both controls address the communication of AI system information to
          stakeholders, though sup-2 is broader (internal and external) while Art. 13
          is specifically focused on deployer-facing transparency.
      - id: art-50
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO 42001 sup-2's communication requirements, including informing stakeholders
          about AI system capabilities and limitations, intersect with Art. 50's
          transparency obligations requiring disclosure of AI interaction, synthetic
          content marking, and emotion recognition notification. Both controls mandate
          that affected persons receive meaningful information about AI systems they
          interact with.

  - source_control: sup-3
    target_controls:
      - id: art-11
        relationship: intersects-with
        confidence: 0.87
        rationale: >
          ISO 42001 sup-3 requires documented information for the AI management system,
          including model documentation, data provenance records, impact assessments, and
          decision audit trails. Art. 11 mandates technical documentation for high-risk AI
          systems per Annex IV, covering system description, development process, risk
          management, data governance, and performance evaluation. Both controls require
          comprehensive, version-controlled documentation of AI systems, with substantial
          overlap in documentation scope. The intersection is strong but not equivalent
          because sup-3 covers management system documentation broadly while Art. 11
          specifies the regulatory documentation format for high-risk systems.
      - id: art-12
        relationship: complements
        confidence: 0.78
        rationale: >
          ISO 42001 sup-3's documented information requirements, particularly for decision
          audit trails and model documentation, complement Art. 12's record-keeping
          requirements for automatic logging of AI system events. Sup-3 addresses the
          broader documentation framework while Art. 12 specifies the technical logging
          capabilities that feed into that documentation.

  # ── ops (Operation) ────────────────────────────────────────────────────

  - source_control: ops-1
    target_controls:
      - id: art-9
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          ISO 42001 ops-1 requires operational planning and control of AI system processes
          throughout the lifecycle, including control of outsourced AI processes. Art. 9
          mandates a risk management system with targeted risk management measures covering
          the entire AI lifecycle. Both controls require structured lifecycle management
          with defined criteria and controls at each stage. Ops-1's operational control of
          outsourced AI processes aligns with Art. 9's requirement to consider risks from
          third-party components.
      - id: art-53
        relationship: complements
        confidence: 0.72
        rationale: >
          ISO 42001 ops-1's requirement to control outsourced AI processes complements
          Art. 53's obligations for general-purpose AI model providers, which must provide
          documentation and information to downstream providers. When an organization uses
          GPAI models as outsourced components, ops-1's control requirements ensure that
          Art. 53 downstream provider information is properly consumed and integrated into
          operational controls.

  - source_control: ops-2
    target_controls:
      - id: art-9
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          ISO 42001 ops-2 requires AI risk assessments at planned intervals covering risks
          related to bias, transparency, safety, security, privacy, accountability, and
          societal consequences. Art. 9 mandates a risk management system covering risks
          to health, safety, and fundamental rights with continuous iterative assessment.
          Both controls require systematic risk identification, analysis, evaluation, and
          treatment for AI systems with substantially identical risk domains. The
          equivalence is strong: ops-2 operationalizes the same risk assessment process
          that Art. 9 mandates, including documented results and testing requirements.

  - source_control: ops-3
    target_controls:
      - id: art-9
        relationship: intersects-with
        confidence: 0.84
        rationale: >
          ISO 42001 ops-3 requires AI impact assessments evaluating effects on individuals,
          groups, communities, and society, covering fundamental rights, safety, and
          environmental sustainability. Art. 9(2) requires risk analysis considering risks
          to health, safety, and fundamental rights including under reasonably foreseeable
          misuse. Both controls require assessment of AI system effects on external
          stakeholders, though ops-3 explicitly includes environmental sustainability and
          broader societal impacts beyond Art. 9's health/safety/rights scope.
      - id: art-71
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO 42001 ops-3's AI system lifecycle management, including requirements for
          systems to remain fit for purpose throughout operational life, intersects with
          Art. 71's post-market monitoring requiring active collection and analysis of
          performance data throughout the system lifetime. Both controls address the
          ongoing operational management of AI systems after deployment.

  # ── perf (Performance Evaluation) ──────────────────────────────────────

  - source_control: perf-1
    target_controls:
      - id: art-9
        relationship: complements
        confidence: 0.79
        rationale: >
          ISO 42001 perf-1 requires monitoring, measurement, analysis, and evaluation of
          the AI management system, including AI-specific metrics such as model performance,
          fairness indicators, and data quality. Art. 9(5) requires testing to ensure
          high-risk AI systems perform consistently and comply with requirements. The
          monitoring infrastructure from perf-1 provides the measurement capabilities
          needed to verify that Art. 9 risk management measures remain effective.
      - id: art-12
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          ISO 42001 perf-1 requires monitoring and measurement of AI system performance
          with documented results. Art. 12 requires automatic recording of events (logs)
          enabling traceability throughout the AI system lifecycle. Both controls mandate
          systematic capture of AI system operational data, though perf-1 focuses on
          performance evaluation metrics while Art. 12 focuses on event logging for
          traceability. Together they form complementary layers of AI system observability.
      - id: art-15
        relationship: complements
        confidence: 0.77
        rationale: >
          ISO 42001 perf-1's requirement to monitor AI-specific metrics including model
          accuracy, fairness, and reliability complements Art. 15's mandate that high-risk
          AI systems achieve appropriate levels of accuracy, robustness, and cybersecurity
          throughout their lifecycle. Continuous monitoring from perf-1 is the mechanism by
          which Art. 15's lifecycle-spanning performance requirements are verified.
      - id: art-71
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ISO 42001 perf-1's continuous monitoring of AI system performance throughout
          operational life intersects substantially with Art. 71's post-market monitoring
          requirement to actively and systematically collect and analyze performance data.
          Both controls mandate ongoing performance surveillance with documented results
          and defined thresholds.

  - source_control: perf-2
    target_controls:
      - id: art-9
        relationship: complements
        confidence: 0.76
        rationale: >
          ISO 42001 perf-2 requires internal audits and management reviews of the AI
          management system, assessing conformity and effectiveness. Art. 9 mandates a
          risk management system requiring regular systematic review and updating. Internal
          audits from perf-2 provide independent verification that the risk management
          system required by Art. 9 is functioning effectively and identifying areas for
          improvement.
      - id: art-71
        relationship: complements
        confidence: 0.74
        rationale: >
          ISO 42001 perf-2's internal audit and management review processes complement
          Art. 71's post-market monitoring system by providing structured evaluation
          mechanisms that assess whether monitoring data is being properly collected,
          analyzed, and acted upon. Management reviews ensure that post-market monitoring
          findings are escalated to appropriate decision-makers.

  # ── imp (Improvement) ──────────────────────────────────────────────────

  - source_control: imp-1
    target_controls:
      - id: art-9
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          ISO 42001 imp-1 requires nonconformity and corrective action procedures for AI
          systems, including model failures, bias incidents, and safety violations.
          Art. 9(2)(c) requires evaluation of risks arising from post-market monitoring
          data, and Art. 9(4) requires adoption of appropriate risk management measures.
          Both controls address the response to AI system failures and the implementation
          of corrective measures, with imp-1 providing the management system process and
          Art. 9 providing the risk-based framework for prioritizing responses.
      - id: art-71
        relationship: intersects-with
        confidence: 0.81
        rationale: >
          ISO 42001 imp-1's nonconformity management for AI systems, including containment,
          root cause analysis, and corrective action, intersects with Art. 71's post-market
          monitoring requirement to assess the need for corrective or preventive action
          based on monitoring data. Both controls address the detection-to-correction
          feedback loop for deployed AI systems.
      - id: art-15
        relationship: complements
        confidence: 0.73
        rationale: >
          ISO 42001 imp-1's corrective action procedures for AI system failures complement
          Art. 15's requirement that high-risk AI systems maintain accuracy, robustness,
          and cybersecurity throughout their lifecycle. When performance degrades below
          Art. 15 thresholds, imp-1 provides the management process to investigate,
          correct, and prevent recurrence.

  - source_control: imp-2
    target_controls:
      - id: art-9
        relationship: complements
        confidence: 0.75
        rationale: >
          ISO 42001 imp-2 requires continual improvement of the AI management system based
          on analysis, evaluation, and management review outputs. Art. 9(1) requires the
          risk management system to be a continuous iterative process with regular review
          and updating. Continual improvement from imp-2 drives the evolution of the risk
          management system, incorporating lessons learned, emerging risks, and regulatory
          changes into Art. 9 risk management practices.
      - id: art-71
        relationship: complements
        confidence: 0.73
        rationale: >
          ISO 42001 imp-2's continual improvement process complements Art. 71's post-market
          monitoring by ensuring that monitoring findings are systematically incorporated
          into improvements to the AI management system. Post-market monitoring data from
          Art. 71 is a key input to the continual improvement cycle mandated by imp-2.

  # ── anx-a (Annex A Controls) ───────────────────────────────────────────

  - source_control: anx-a-1
    target_controls:
      - id: art-10
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          ISO 42001 anx-a-1 requires data governance and data quality policies covering
          data acquisition, labeling, preprocessing, storage, provenance, bias assessment,
          and data poisoning prevention for AI systems. Art. 10 mandates data governance
          and management practices for high-risk AI training, validation, and testing data,
          including quality criteria, bias examination, representativeness, and data gap
          identification. Both controls establish comprehensive data governance frameworks
          for AI systems with substantially identical scope: data lifecycle management,
          quality assurance, bias detection, and provenance tracking. The equivalence is
          strong as both address the same fundamental requirement — ensuring AI data meets
          quality and governance standards.
      - id: art-5
        relationship: complements
        confidence: 0.71
        rationale: >
          ISO 42001 anx-a-1's data governance requirements, particularly bias assessment
          and data quality controls, complement Art. 5's prohibited practices provisions.
          Data governance controls help prevent training datasets that would lead to
          discriminatory AI outputs (Art. 5(1)(b)) or social scoring systems (Art. 5(1)(c))
          by identifying and mitigating bias at the data level.

  - source_control: anx-a-2
    target_controls:
      - id: art-13
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          ISO 42001 anx-a-2 requires transparency, explainability, and accountability for
          AI systems, including meaningful information about capabilities, limitations,
          intended use, and decision logic, with mechanisms to challenge AI-assisted
          decisions. Art. 13 requires that high-risk AI systems be sufficiently transparent
          for deployers to interpret outputs and use them appropriately, with instructions
          covering performance, limitations, known risks, and output interpretation.
          Both controls mandate comprehensive transparency and explainability mechanisms
          for AI systems with substantially matching requirements.
      - id: art-14
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ISO 42001 anx-a-2's accountability mechanisms, including clear responsibility
          for AI outcomes and mechanisms to challenge AI-assisted decisions, intersect with
          Art. 14's human oversight requirements enabling individuals to override,
          intervene, or halt AI operations. Both controls ensure that humans retain
          meaningful control over AI system outcomes, though anx-a-2 addresses
          accountability broadly while Art. 14 specifies technical oversight mechanisms.
      - id: art-50
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO 42001 anx-a-2's transparency requirements, including providing meaningful
          information about AI system capabilities to relevant stakeholders, intersect with
          Art. 50's obligations for AI interaction disclosure, synthetic content marking,
          and emotion recognition notification. Both require that affected persons are
          informed about AI system operation, though Art. 50 specifies particular
          disclosure obligations for specific AI system types.

  - source_control: anx-a-3
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          ISO 42001 anx-a-3 requires security measures against adversarial attacks, data
          poisoning, model extraction, and unauthorized access, plus robustness under
          varying conditions including edge cases and adversarial inputs. Art. 15 mandates
          appropriate levels of accuracy, robustness, and cybersecurity for high-risk AI
          systems, with specific measures against data poisoning, model poisoning,
          adversarial examples, and model evasion. Both controls address the same
          AI-specific security and robustness threats with substantially matching technical
          requirements and mitigation measures.
      - id: art-14
        relationship: intersects-with
        confidence: 0.86
        rationale: >
          ISO 42001 anx-a-3's human oversight requirements, including the ability to
          intervene, override, or shut down AI operations with proportionate controls based
          on risk level, intersect with Art. 14's detailed human oversight requirements
          including stop buttons, override mechanisms, and automation bias countermeasures.
          Both controls mandate that humans retain the ability to meaningfully control AI
          systems, with risk-proportionate oversight mechanisms.
      - id: art-9
        relationship: implements
        confidence: 0.79
        rationale: >
          ISO 42001 anx-a-3's security and robustness measures implement specific technical
          controls that address security- and robustness-related risks identified in the
          Art. 9 risk assessment. The adversarial testing, input validation, and anomaly
          detection measures from anx-a-3 are concrete implementations of the Art. 9(5)
          testing requirements for high-risk AI systems.
