id: cfm-telemedicina_to_lgpd
title: "CFM Telemedicina to LGPD Control Mapping"
source_framework: cfm-telemedicina
target_framework: lgpd
version: "1.0.0"
last_updated: "2026-04-04"
methodology: structural
description: >
  Mapeamento entre a Resolucao CFM n. 2.314/2022 (regulamentacao da telemedicina no
  Brasil) e a Lei Geral de Protecao de Dados Pessoais (LGPD - Lei 13.709/2018). A
  telemedicina envolve tratamento intensivo de dados pessoais sensiveis de saude,
  tornando a conformidade com a LGPD um requisito direto para plataformas e servicos
  de telemedicina.

mappings:
  - source_control: art-11
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.92
        rationale: >
          CFM art-11 (Criptografia e Protecao de Dados em Transito) implementa
          diretamente o art-46 da LGPD (Medidas de Seguranca), que exige medidas
          tecnicas e administrativas para proteger dados pessoais de acessos nao
          autorizados. A criptografia em transito e uma das medidas tecnicas
          fundamentais previstas pelo art-46.
      - id: art-47
        relationship: complements
        confidence: 0.80
        rationale: >
          A exigencia de criptografia desde a concepcao da plataforma de telemedicina
          (art-11) complementa o principio de Privacy by Design do art-47 da LGPD,
          que determina que medidas de seguranca sejam observadas desde a fase de
          concepcao do produto.

  - source_control: art-12
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.93
        rationale: >
          CFM art-12 (Armazenamento Seguro de Dados de Saude) implementa o art-46
          da LGPD ao exigir que dados clinicos sejam armazenados com protecoes
          tecnicas contra acessos nao autorizados, destruicao, perda ou alteracao
          acidental. Dados de saude sao dados sensiveis, exigindo nivel elevado de
          seguranca conforme a LGPD.
      - id: art-49
        relationship: complements
        confidence: 0.78
        rationale: >
          Os requisitos de armazenamento seguro do art-12 complementam o art-49 da
          LGPD, que exige que sistemas de tratamento sejam estruturados conforme
          requisitos de seguranca e padroes de boas praticas.

  - source_control: art-13
    target_controls:
      - id: art-7
        relationship: implements
        confidence: 0.88
        rationale: >
          CFM art-13 (Conformidade com a LGPD para Dados de Saude) referencia
          diretamente as bases legais do art-7 da LGPD, exigindo que todo
          tratamento de dados em telemedicina possua fundamentacao legal adequada,
          seja por consentimento, tutela da saude ou cumprimento de obrigacao legal.
      - id: art-11
        relationship: implements
        confidence: 0.90
        rationale: >
          O art-13 do CFM implementa o regime especial do art-11 da LGPD para dados
          pessoais sensiveis, reconhecendo que dados de saude coletados em
          telemedicina sao dados sensiveis e exigem bases legais especificas
          previstas no art-11 (consentimento especifico ou hipoteses do paragrafo 2).
      - id: art-46
        relationship: implements
        confidence: 0.85
        rationale: >
          A conformidade LGPD exigida pelo art-13 do CFM abrange as medidas de
          seguranca do art-46, impondo que plataformas de telemedicina adotem
          controles tecnicos e administrativos proporcionais a sensibilidade dos
          dados de saude tratados.

  - source_control: art-14
    target_controls:
      - id: art-8
        relationship: implements
        confidence: 0.95
        rationale: >
          CFM art-14 (Consentimento Informado para Telemedicina) implementa o art-8
          da LGPD (Requisitos do Consentimento), que exige consentimento livre,
          informado e inequivoco por escrito ou meio que demonstre manifestacao de
          vontade do titular. O consentimento para telemedicina deve atender a todos
          os requisitos formais da LGPD.
      - id: art-11
        relationship: implements
        confidence: 0.88
        rationale: >
          O consentimento informado do art-14 do CFM atende ao requisito do art-11
          da LGPD de consentimento especifico e destacado para tratamento de dados
          sensiveis de saude, com finalidades especificas indicadas ao paciente.

  - source_control: art-15
    target_controls:
      - id: art-37
        relationship: complements
        confidence: 0.82
        rationale: >
          CFM art-15 (Registro Eletronico de Atendimentos) complementa o art-37 da
          LGPD (Registro das Operacoes de Tratamento), pois o registro eletronico de
          teleconsultas constitui documentacao das operacoes de tratamento de dados
          pessoais de saude que o controlador deve manter.
      - id: art-46
        relationship: complements
        confidence: 0.75
        rationale: >
          Os registros eletronicos de atendimento exigidos pelo art-15 complementam
          as medidas de seguranca do art-46, pois a integridade e a protecao desses
          registros sao essenciais para a seguranca dos dados pessoais de saude.

  - source_control: art-16
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.90
        rationale: >
          CFM art-16 (Controle de Acesso e Autenticacao) implementa o art-46 da
          LGPD ao estabelecer mecanismos de autenticacao e autorizacao que protegem
          dados pessoais de acessos nao autorizados, conforme exigido pelas medidas
          de seguranca tecnicas da LGPD.
      - id: art-38
        relationship: complements
        confidence: 0.78
        rationale: >
          Os controles de acesso do art-16 complementam o art-38 da LGPD (RIPD),
          pois a demonstracao de controles de acesso adequados e elemento essencial
          do Relatorio de Impacto a Protecao de Dados Pessoais para plataformas
          de telemedicina.
      - id: art-49
        relationship: implements
        confidence: 0.82
        rationale: >
          O controle de acesso baseado em perfis do art-16 implementa o art-49 da
          LGPD, que exige que sistemas de tratamento sejam estruturados para atender
          aos requisitos de seguranca e padroes de boas praticas.

  - source_control: art-22
    target_controls:
      - id: art-18
        relationship: complements
        confidence: 0.85
        rationale: >
          CFM art-22 (Prontuario Eletronico do Paciente em Telemedicina) complementa
          o art-18 da LGPD (Direitos do Titular), pois o PEP e o repositorio
          principal sobre o qual o titular exerce seus direitos de acesso,
          confirmacao, correcao e portabilidade de dados pessoais de saude.
      - id: art-19
        relationship: complements
        confidence: 0.80
        rationale: >
          O prontuario eletronico do art-22 complementa o art-19 da LGPD
          (Confirmacao de Existencia e Acesso a Dados), pois e por meio do PEP
          que o titular pode confirmar a existencia e acessar seus dados pessoais
          de saude em formato simplificado ou completo.

  - source_control: art-24
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.85
        rationale: >
          CFM art-24 (Assinatura Digital e Certificacao ICP-Brasil) implementa o
          art-46 da LGPD como medida tecnica de seguranca, garantindo autenticidade,
          integridade e nao-repudio dos documentos clinicos gerados em telemedicina
          por meio de certificacao digital qualificada.
      - id: art-47
        relationship: complements
        confidence: 0.78
        rationale: >
          A exigencia de assinatura digital ICP-Brasil pelo art-24 complementa o
          principio de seguranca desde a concepcao (art-47 da LGPD), incorporando
          garantias criptograficas no fluxo de documentacao clinica.

  - source_control: art-25
    target_controls:
      - id: art-15
        relationship: implements
        confidence: 0.88
        rationale: >
          CFM art-25 (Guarda e Retencao de Dados Clinicos) implementa o art-15 da
          LGPD (Termino do Tratamento), pois define os prazos e condicoes para
          retencao de dados clinicos apos o termino do atendimento, alinhando-se as
          hipoteses de conservacao previstas na LGPD.
      - id: art-16
        relationship: implements
        confidence: 0.90
        rationale: >
          Os requisitos de retencao e eventual eliminacao de dados do art-25
          implementam o art-16 da LGPD (Eliminacao dos Dados Pessoais apos
          Termino do Tratamento), que estabelece as regras para eliminacao de dados
          quando encerrado o periodo de tratamento.

  - source_control: art-26
    target_controls:
      - id: art-18
        relationship: implements
        confidence: 0.92
        rationale: >
          CFM art-26 (Portabilidade e Acesso do Paciente aos Dados) implementa
          diretamente o art-18 da LGPD (Direitos do Titular), em especial o direito
          de portabilidade dos dados a outro fornecedor de servico (inciso V) e o
          direito de acesso facilitado aos dados pessoais de saude.
      - id: art-9
        relationship: complements
        confidence: 0.78
        rationale: >
          A portabilidade e o acesso facilitado do art-26 complementam o art-9 da
          LGPD (Acesso Facilitado ao Tratamento), que garante ao titular acesso
          facilitado as informacoes sobre o tratamento de seus dados.

  - source_control: art-21
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.85
        rationale: >
          CFM art-21 (Seguranca de Rede e Infraestrutura) implementa o art-46 da
          LGPD ao exigir medidas tecnicas de protecao da infraestrutura de rede
          utilizada em telemedicina, prevenindo acessos nao autorizados e
          situacoes de destruicao ou perda de dados pessoais.
      - id: art-49
        relationship: implements
        confidence: 0.80
        rationale: >
          Os requisitos de seguranca de rede do art-21 implementam o art-49 da
          LGPD, que determina que sistemas de tratamento sejam estruturados para
          atender requisitos de seguranca e padroes de boas praticas.

  - source_control: art-28
    target_controls:
      - id: art-50
        relationship: complements
        confidence: 0.82
        rationale: >
          CFM art-28 (Auditoria de Servicos de Telemedicina) complementa o art-50
          da LGPD (Boas Praticas e Governanca), pois a auditoria periodica de
          servicos de telemedicina e um mecanismo de supervisao interna e verificacao
          de conformidade previsto nas regras de boas praticas e governanca.
      - id: art-37
        relationship: complements
        confidence: 0.78
        rationale: >
          As auditorias do art-28 complementam o art-37 da LGPD (Registro das
          Operacoes de Tratamento), pois os registros de auditoria auxiliam na
          manutencao e verificacao da documentacao obrigatoria das operacoes de
          tratamento de dados.
