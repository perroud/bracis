id: cmn-4968_to_cmn-4557
title: "CMN 4.968 to CMN 4.557 Control Mapping"
source_framework: cmn-4968
target_framework: cmn-4557
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic
description: >
  Mapping between Resolucao CMN 4.968/2021 (internal audit for financial institutions)
  and Resolucao CMN 4.557/2017 (integrated risk management and capital management).
  CMN 4.968 establishes the internal audit function (3rd line of defense) that evaluates
  the risk and capital management structures required by CMN 4.557 (1st and 2nd lines).
  Both apply to financial institutions authorized by BCB, with proportionality based on
  prudential segmentation (S1-S5). The audit function under 4.968 must cover the risk
  management, capital adequacy, governance, and reporting requirements of 4.557.

mappings:
  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: complements
        confidence: 0.90
        rationale: >
          Both define scope and applicability to financial institutions authorized by
          BCB. CMN 4.968 regulates internal audit; CMN 4.557 regulates risk and capital
          management. Together they form complementary pillars of institutional governance.

  - source_control: art-2
    target_controls:
      - id: art-2
        relationship: complements
        confidence: 0.80
        rationale: >
          CMN 4.968 art-2 defines internal audit terminology (audit activity, audit risk,
          audit universe, work program). CMN 4.557 art-2 defines risk taxonomy (credit,
          market, operational, liquidity). Both establish foundational definitions for
          their respective domains.

  - source_control: art-3
    target_controls:
      - id: art-30
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Both enshrine the proportionality principle relative to institutional size,
          risk profile, and operational complexity. CMN 4.968 art-3 applies proportionality
          to audit requirements; CMN 4.557 art-30 applies it to risk management requirements.
          Both reference prudential segmentation (S1-S5).

  - source_control: art-4
    target_controls:
      - id: art-27
        relationship: complements
        confidence: 0.85
        rationale: >
          CMN 4.968 art-4 requires internal audit independence with functional reporting
          to the board. CMN 4.557 art-27 requires CRO independence from business lines
          with direct board access. Both mandate structural independence of oversight
          functions from operational areas.
      - id: art-26
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CMN 4.968 art-4 requires audit to report functionally to the board. CMN 4.557
          art-26 defines board responsibilities including oversight of risk management.
          The board is the common governance anchor for both audit and risk functions.

  - source_control: art-5
    target_controls:
      - id: art-15
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CMN 4.968 art-5 requires auditors with technical competence including knowledge
          of audit standards. CMN 4.557 art-15 requires operational risk systems including
          RCSA and KRI. Internal auditors need competence in these risk management
          methodologies to effectively audit operational risk structures.

  - source_control: art-6
    target_controls:
      - id: art-3
        relationship: implements
        confidence: 0.85
        rationale: >
          CMN 4.968 art-6 requires risk-based audit approach, prioritizing areas of higher
          risk using institutional risk assessments. CMN 4.557 art-3 requires integrated
          risk management (identification, measurement, monitoring, control). The audit
          function implements its risk-based methodology by leveraging the risk framework
          of 4.557.
      - id: art-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CMN 4.968 art-6 requires auditors to consider risk appetite (RAS) when
          prioritizing audit work. CMN 4.557 art-5 establishes the RAS framework
          approved by the board. Audit prioritization directly depends on the RAS
          defined under 4.557.

  - source_control: art-7
    target_controls:
      - id: art-3
        relationship: complements
        confidence: 0.90
        rationale: >
          CMN 4.968 art-7 defines the minimum audit scope, which includes evaluating
          the effectiveness of internal controls and risk/capital management systems.
          CMN 4.557 art-3 requires integrated risk management. The audit scope under
          4.968 directly encompasses the structures mandated by 4.557.
      - id: art-4
        relationship: complements
        confidence: 0.85
        rationale: >
          CMN 4.968 art-7-II requires audit to evaluate compliance with internal and
          external policies. CMN 4.557 art-4 requires documented risk policies approved
          by the board. Audit verifies adherence to the risk policies defined under 4.557.
      - id: art-7
        relationship: complements
        confidence: 0.80
        rationale: >
          CMN 4.968 art-7-III requires audit to evaluate reliability and integrity of
          financial and operational information. CMN 4.557 art-7 requires risk information
          systems to produce timely and reliable reports. Audit assesses whether the risk
          information systems meet 4.557 requirements.
      - id: art-16
        relationship: complements
        confidence: 0.80
        rationale: >
          CMN 4.968 art-7-IV requires audit to evaluate protection of institutional assets
          including IT systems. CMN 4.557 art-16 requires IT and cyber risk management.
          Audit evaluates the IT/cyber risk controls mandated by 4.557.

  - source_control: art-8
    target_controls:
      - id: art-26
        relationship: complements
        confidence: 0.85
        rationale: >
          CMN 4.968 art-8 defines the Chief Audit Executive (CAE) role, appointed by and
          reporting to the board. CMN 4.557 art-26 defines board responsibilities for risk
          governance. Both establish the board as the apex of oversight, with CAE and CRO
          as complementary executive functions.
      - id: art-28
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CMN 4.968 art-8 requires the CAE to communicate audit results to the board.
          CMN 4.557 art-28 establishes the risk committee (for S1 institutions) that
          supervises CRO. Both governance bodies interact at the board level with
          overlapping oversight responsibilities.

  - source_control: art-9
    target_controls:
      - id: art-31
        relationship: complements
        confidence: 0.85
        rationale: >
          CMN 4.968 art-9 requires unrestricted audit access to all areas, records, and
          systems. CMN 4.557 art-31 requires retention of risk management documentation
          for BCB access. Both ensure institutional documentation is accessible for
          oversight purposes — audit internally and BCB externally.

  - source_control: art-10
    target_controls:
      - id: art-4
        relationship: complements
        confidence: 0.85
        rationale: >
          CMN 4.968 art-10 requires an annual audit plan covering objectives, scope,
          resources, and risk-based prioritization criteria. CMN 4.557 art-4 requires
          documented risk management policies approved annually by the board. Both demand
          formal, board-approved planning documents reviewed at least annually.
      - id: art-3
        relationship: implements
        confidence: 0.80
        rationale: >
          CMN 4.968 art-10 requires the audit plan to cover the risk management universe
          with risk-based prioritization. CMN 4.557 art-3 requires integrated risk
          management. The audit plan operationalizes independent assessment of the
          integrated risk framework.

  - source_control: art-11
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CMN 4.968 art-11 requires audit risk assessment to consider inherent risk, control
          effectiveness, and risk appetite. CMN 4.557 art-5 establishes the RAS framework.
          The audit risk assessment directly uses the RAS as an input to determine audit
          priorities.
      - id: art-6
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CMN 4.968 art-11 requires audit risk assessment to consider changes in business
          and regulatory environment. CMN 4.557 art-6 requires periodic stress testing
          under adverse scenarios. Both require assessment of environmental changes and
          their risk impact.

  - source_control: art-12
    target_controls:
      - id: art-26
        relationship: complements
        confidence: 0.90
        rationale: >
          CMN 4.968 art-12 requires board approval of the audit plan and periodic review
          for consistency with institutional risks. CMN 4.557 art-26 requires board
          approval of risk policies, RAS, risk limits, and capital plan. Both establish
          the board as the approving authority for governance documents.

  - source_control: art-13
    target_controls:
      - id: art-26
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CMN 4.968 art-13 requires adequate human, technological, and financial resources
          for internal audit, evaluated by the board. CMN 4.557 art-26-V requires the board
          to ensure adequate resources for risk and capital management. Both mandate board
          oversight of resource sufficiency for oversight functions.

  - source_control: art-14
    target_controls:
      - id: art-15
        relationship: complements
        confidence: 0.80
        rationale: >
          CMN 4.968 art-14 defines audit execution methodology (work programs with
          objectives, procedures, criteria, evidence sources). CMN 4.557 art-15 defines
          operational risk management systems (identification, measurement, RCSA, KRI).
          The audit work programs will directly test the operational risk controls required
          by 4.557.

  - source_control: art-15
    target_controls:
      - id: art-31
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          CMN 4.968 art-15 requires sufficient audit documentation (work programs,
          evidence, conclusions, area comments, action plans). CMN 4.557 art-31 requires
          retention of risk management documentation (structures, reports, minutes, loss
          events, models). Both establish comprehensive documentation requirements for
          regulatory evidence and BCB access.

  - source_control: art-16
    target_controls:
      - id: art-29
        relationship: complements
        confidence: 0.80
        rationale: >
          CMN 4.968 art-16 requires audit reports with findings, risk classifications,
          recommendations, and overall opinion, distributed to board and management.
          CMN 4.557 art-29 requires public disclosure of risk management information
          (Pillar 3). Both mandate structured reporting — audit internally and risk
          management publicly.
      - id: art-26
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CMN 4.968 art-16 requires timely distribution of audit reports to board and
          management. CMN 4.557 art-26-VI requires board approval of periodic risk
          management reports. Both establish reporting flows to the board for oversight.

  - source_control: art-17
    target_controls:
      - id: art-15
        relationship: complements
        confidence: 0.80
        rationale: >
          CMN 4.968 art-17 requires follow-up on audit recommendations implementation,
          including escalation to the board for overdue items. CMN 4.557 art-15 requires
          operational risk systems including mitigation controls. Audit follow-up ensures
          that risk control deficiencies identified during audits are actually remediated.
      - id: art-26
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CMN 4.968 art-17-II requires escalation to the board of unimplemented high-risk
          audit recommendations. CMN 4.557 art-26 defines board responsibilities for risk
          governance. The board receives escalated audit findings as part of its risk
          oversight mandate.

  - source_control: art-18
    target_controls:
      - id: art-26
        relationship: complements
        confidence: 0.90
        rationale: >
          CMN 4.968 art-18 requires the CAE to periodically report to the board on audit
          plan execution, results, recommendation status, control deficiencies, and any
          scope/independence restrictions. CMN 4.557 art-26 defines the board's
          responsibility to oversee risk management. Board receives both audit and risk
          reports to fulfill its oversight duty.
      - id: art-28
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CMN 4.968 art-18 requires periodic reporting on internal control and risk
          management deficiencies. CMN 4.557 art-28 establishes the risk committee to
          analyze risk management reports. Both reporting streams converge at the board/
          committee level for comprehensive oversight.

  - source_control: art-19
    target_controls:
      - id: art-31
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Both require document retention for a minimum of five years. CMN 4.968 art-19
          applies to audit documentation (work papers, reports). CMN 4.557 art-31 applies
          to risk management documentation (structures, reports, minutes, loss events,
          models). Both require integrity, security, and retrievability for BCB supervision.

  - source_control: art-20
    target_controls:
      - id: art-31
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          CMN 4.968 art-20 requires unrestricted BCB access to all audit documentation.
          CMN 4.557 art-31 requires risk documentation to be available to BCB. Both
          establish BCB supervisory access rights with mandatory compliance on timelines
          set by the regulator.

  - source_control: art-21
    target_controls:
      - id: art-27
        relationship: complements
        confidence: 0.75
        rationale: >
          CMN 4.968 art-21 allows outsourcing of internal audit while maintaining
          institutional responsibility and independence. CMN 4.557 art-27 requires CRO
          designation with independence from business lines. Both address governance of
          oversight functions, requiring independence regardless of organizational model
          (in-house or outsourced for audit; dedicated executive for risk).

  - source_control: art-22
    target_controls:
      - id: art-32
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Both are transitional and effectiveness provisions. CMN 4.968 art-22 sets the
          compliance deadline for audit requirements. CMN 4.557 art-32 establishes BCB
          authority for additional requirements and transitional provisions. Both define
          regulatory timelines and BCB discretionary powers.
