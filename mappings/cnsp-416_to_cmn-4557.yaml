id: cnsp-416_to_cmn-4557
title: "CNSP 416 to CMN 4.557 Control Mapping"
source_framework: cnsp-416
target_framework: cmn-4557
version: "1.0.0"
last_updated: "2026-04-03"
methodology: semantic
description: >
  Mapeamento entre a Resolucao CNSP 416/2021 (SCI, EGR e auditoria interna para o
  mercado segurador) e a Resolucao CMN 4.557/2017 (gestao integrada de riscos para
  instituicoes financeiras). Ambas regulamentam controles internos, gestao de riscos e
  auditoria com estrutura equivalente, diferindo no publico-alvo: a CNSP 416 aplica-se
  a seguradoras, resseguradoras, EAPCs e sociedades de capitalizacao supervisionadas
  pela SUSEP, e a CMN 4.557 a instituicoes financeiras reguladas pelo CMN/BCB.

mappings:
  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Ambos definem o objeto e escopo da regulamentacao de controles internos e
          gestao de riscos para seus respectivos setores regulados.

  - source_control: art-4
    target_controls:
      - id: art-2
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Ambos estabelecem os requisitos fundamentais do sistema de controles internos,
          incluindo segregacao de funcoes, limites operacionais e documentacao.

  - source_control: art-5
    target_controls:
      - id: art-3
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Ambos exigem segregacao de funcoes entre areas de negocio, controle e
          conformidade para garantir independencia dos controles.

  - source_control: art-6
    target_controls:
      - id: art-4
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Ambos definem requisitos para sistemas de informacao que suportam controles
          internos, incluindo integridade, disponibilidade e rastreabilidade de dados.

  - source_control: art-8
    target_controls:
      - id: art-6
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Ambos exigem plano de continuidade de negocios (PCN) integrado ao sistema
          de controles internos, com testes periodicos e atualizacao.

  - source_control: art-13
    target_controls:
      - id: art-10
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Ambos estabelecem a obrigatoriedade de estrutura de gestao de riscos (EGR)
          proporcional ao porte e complexidade da organizacao.

  - source_control: art-14
    target_controls:
      - id: art-11
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Ambos exigem definicao formal de apetite e tolerancia a riscos aprovados
          pelo conselho de administracao ou diretoria.

  - source_control: art-15
    target_controls:
      - id: art-12
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Ambos definem processos de identificacao, mensuracaoo, avaliacao e
          classificacao de riscos relevantes a organizacao.

  - source_control: art-16
    target_controls:
      - id: art-13
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Ambos exigem monitoramento continuo de riscos com indicadores-chave (KRIs),
          limites e alertas automatizados.

  - source_control: art-17
    target_controls:
      - id: art-14
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Ambos exigem programa de testes de estresse para avaliar resiliencia
          financeira e operacional sob cenarios adversos.

  - source_control: art-20
    target_controls:
      - id: art-17
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Ambos exigem designacao de diretor/executivo responsavel pela gestao de
          riscos (CRO) com independencia e acesso ao conselho.

  - source_control: art-23
    target_controls:
      - id: art-20
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Ambos estabelecem requisitos para a funcao de auditoria interna, incluindo
          independencia, competencia e acesso irrestrito a informacoes.

  - source_control: art-24
    target_controls:
      - id: art-21
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Ambos exigem plano anual de auditoria baseado em riscos, aprovado pelo
          comite de auditoria ou conselho.

  - source_control: art-27
    target_controls:
      - id: art-24
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Ambos exigem comite de auditoria (ou orgao equivalente) com membros
          independentes e reporte direto ao conselho.

  - source_control: art-31
    target_controls:
      - id: art-28
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Ambos definem responsabilidades do conselho de administracao na supervisao
          dos controles internos, gestao de riscos e auditoria.

  - source_control: art-32
    target_controls:
      - id: art-29
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Ambos exigem adocao do modelo de tres linhas de defesa (gestao, controle/
          conformidade, auditoria interna) como base da governanca.

  - source_control: art-34
    target_controls:
      - id: art-31
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Ambos exigem documentacao completa de politicas, processos e procedimentos
          relacionados a controles internos e gestao de riscos.
