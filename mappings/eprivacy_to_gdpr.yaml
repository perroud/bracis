id: eprivacy_to_gdpr
title: "ePrivacy Directive to GDPR Control Mapping"
source_framework: eprivacy
target_framework: gdpr
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  - source_control: epd-4
    target_controls:
      - id: art-32
        relationship: intersects-with
        confidence: 0.93
        rationale: >
          ePrivacy Art. 4(1)-(2) requires appropriate technical and organisational measures
          to safeguard the security of electronic communications services, proportionate to
          the risk presented. GDPR Art. 32 imposes an equivalent risk-based security obligation
          for all personal data processing. Both use the "state of the art" and "cost of
          implementation" criteria and require a level of security "appropriate to the risk."
          The ePrivacy obligation is sector-specific (electronic communications), while GDPR
          Art. 32 is general-purpose. They overlap substantially on the security-of-processing
          requirement but ePrivacy adds a subscriber notification duty for risks the provider
          cannot mitigate, which has no direct GDPR Art. 32 counterpart.
      - id: art-5
        relationship: complements
        confidence: 0.78
        rationale: >
          ePrivacy Art. 4(1) security measures support the GDPR Art. 5(1)(f) principle
          of integrity and confidentiality, which requires processing to ensure appropriate
          security of personal data. The ePrivacy obligation operationalises this principle
          specifically for the electronic communications sector.

  - source_control: epd-4-2
    target_controls:
      - id: art-33
        relationship: intersects-with
        confidence: 0.92
        rationale: >
          ePrivacy Art. 4(3)-(4) requires notification of personal data breaches to the
          competent national authority without undue delay, with specific content requirements
          (nature, contact point, consequences, remedial measures). GDPR Art. 33 requires
          notification to the supervisory authority within 72 hours with substantially similar
          content requirements. Both address authority-facing breach notification. The ePrivacy
          obligation was the EU's first sector-specific breach notification requirement and
          predates GDPR. Under Commission Regulation 611/2013, ePrivacy requires 24-hour
          notification where feasible, stricter than GDPR's 72-hour window.
      - id: art-5
        relationship: complements
        confidence: 0.72
        rationale: >
          The breach notification obligation in ePrivacy Art. 4(3)-(4) supports the GDPR
          Art. 5(2) accountability principle by requiring documented evidence of breach
          handling. The breach registry requirement supports demonstrable compliance with
          the integrity and confidentiality principle under Art. 5(1)(f).

  - source_control: epd-4-3
    target_controls:
      - id: art-33
        relationship: complements
        confidence: 0.82
        rationale: >
          ePrivacy Art. 4(3) subscriber notification extends the breach notification chain
          beyond the supervisory authority to affected individuals. While GDPR Art. 33
          addresses authority notification, the ePrivacy subscriber notification obligation
          complements it by ensuring the full notification pipeline (authority + individual)
          is covered for electronic communications breaches. The encryption safe harbour in
          ePrivacy (no notification if data was encrypted) aligns with the GDPR Art. 33/34
          risk-based notification threshold.
      - id: art-32
        relationship: complements
        confidence: 0.80
        rationale: >
          The encryption safe harbour in ePrivacy Art. 4(3) creates a direct incentive to
          implement the encryption measures referenced in GDPR Art. 32(1)(a). Providers who
          encrypt personal data at rest and in transit, as GDPR Art. 32 recommends, can
          invoke the ePrivacy exemption from subscriber notification. This creates a
          complementary enforcement dynamic between the two frameworks.
      - id: art-25
        relationship: complements
        confidence: 0.73
        rationale: >
          The encryption safe harbour incentivises data protection by design and by default
          (GDPR Art. 25), as providers who implement encryption as a default measure benefit
          from reduced notification obligations. This reinforces the GDPR Art. 25 requirement
          to integrate data protection safeguards from the design stage.

  - source_control: epd-5-1
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          ePrivacy Art. 5(1) establishes the fundamental confidentiality of electronic
          communications and related traffic data, prohibiting interception, tapping,
          storage, or surveillance without consent or lawful authority. GDPR Art. 5(1)(f)
          requires integrity and confidentiality of personal data through appropriate
          technical and organisational measures. Both protect confidentiality, but ePrivacy
          Art. 5(1) extends protection beyond personal data to all communications content
          and metadata, and creates a prohibitive regime (default: no access) rather than
          GDPR's principle-based approach.
      - id: art-6
        relationship: complements
        confidence: 0.80
        rationale: >
          ePrivacy Art. 5(1) restricts access to communications data to cases with user
          consent or lawful authority under Art. 15(1). This intersects with GDPR Art. 6
          lawfulness requirements because any access to communications data that constitutes
          personal data processing must also satisfy one of the GDPR Art. 6(1) legal bases.
          The ePrivacy consent requirement for communications interception is a sector-specific
          specification of the GDPR consent legal basis.
      - id: art-32
        relationship: complements
        confidence: 0.82
        rationale: >
          The ePrivacy Art. 5(1) confidentiality obligation for communications infrastructure
          directly complements GDPR Art. 32 security-of-processing requirements. Implementing
          end-to-end encryption, access controls, and network isolation for communications data
          satisfies both the ePrivacy confidentiality duty and GDPR Art. 32's requirement for
          appropriate security measures including ongoing confidentiality of processing systems.

  - source_control: epd-5-3
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          ePrivacy Art. 5(3) — the "cookie law" — requires prior informed consent before
          storing or accessing information on a user's terminal equipment. GDPR Art. 6
          establishes lawfulness of processing, with consent as one of six legal bases.
          The ePrivacy consent requirement is lex specialis to GDPR Art. 6(1)(a): for cookies
          and similar technologies, consent is the only permissible legal basis (no legitimate
          interest alternative). The CJEU Planet49 judgment confirmed that ePrivacy consent
          must meet GDPR consent standards (active, informed, specific, freely given).
      - id: art-5
        relationship: complements
        confidence: 0.78
        rationale: >
          The ePrivacy Art. 5(3) requirement that users be provided with "clear and
          comprehensive information" about the purposes of cookie processing implements
          the GDPR Art. 5(1)(a) transparency principle specifically for terminal equipment
          storage. The purpose limitation principle in Art. 5(1)(b) is reinforced by the
          requirement to declare purposes before consent is obtained.
      - id: art-25
        relationship: complements
        confidence: 0.75
        rationale: >
          The ePrivacy Art. 5(3) exemption for strictly necessary cookies embodies the
          GDPR Art. 25 data protection by default principle. By requiring consent for
          all non-essential cookies and only exempting those strictly necessary for
          service delivery, ePrivacy enforces a privacy-by-default posture that aligns
          with GDPR Art. 25(2)'s requirement that only necessary data be processed by default.

  - source_control: epd-6
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          ePrivacy Art. 6 requires traffic data to be erased or anonymised when no longer
          needed for transmission, directly implementing GDPR Art. 5(1)(e) storage limitation
          for the electronic communications sector. The purpose limitation in Art. 6 (billing,
          marketing with consent, fraud detection) mirrors GDPR Art. 5(1)(b). The data
          minimisation principle (restricted to authorized persons and what is necessary)
          implements GDPR Art. 5(1)(c). ePrivacy Art. 6 is the sector-specific expression
          of multiple GDPR Art. 5 data protection principles applied to traffic data.
      - id: art-6
        relationship: complements
        confidence: 0.85
        rationale: >
          ePrivacy Art. 6 specifies the legal bases for traffic data processing: transmission
          necessity (no legal basis required), billing (contractual necessity analogous to
          Art. 6(1)(b)), marketing and value-added services (consent under Art. 6(1)(a)),
          and fraud detection. This provides a sector-specific legal basis framework that
          complements GDPR Art. 6 by defining when each basis applies to traffic data.
      - id: art-17
        relationship: complements
        confidence: 0.83
        rationale: >
          The erasure obligation in ePrivacy Art. 6(1) — traffic data must be erased or
          anonymised when no longer needed for transmission — is a sector-specific, automatic
          application of the GDPR Art. 17 right to erasure. Unlike GDPR Art. 17 which requires
          a data subject request, ePrivacy Art. 6 imposes proactive, automatic erasure obligations
          on providers without requiring a request from the subscriber.

  - source_control: epd-7
    target_controls:
      - id: art-5
        relationship: complements
        confidence: 0.80
        rationale: >
          ePrivacy Art. 7 requires configurable billing detail levels with non-itemised
          billing as a right, implementing GDPR Art. 5(1)(c) data minimisation for billing
          records. Number masking on itemised bills implements the principle of processing
          only what is necessary. The privacy-by-default billing approach aligns with
          Art. 5(1)(f) integrity and confidentiality by preventing unnecessary exposure
          of communication patterns to co-subscribers.
      - id: art-25
        relationship: complements
        confidence: 0.82
        rationale: >
          ePrivacy Art. 7 embodies GDPR Art. 25 data protection by design and by default
          for billing systems. The right to non-itemised bills is a privacy-by-default
          requirement: the system must offer the privacy-preserving option. Number masking
          is a data protection by design measure that limits data exposure while preserving
          billing functionality. Both articles require building privacy into the system
          design rather than relying on user action.

  - source_control: epd-8
    target_controls:
      - id: art-5
        relationship: complements
        confidence: 0.75
        rationale: >
          ePrivacy Art. 8 caller ID controls implement GDPR Art. 5(1)(a) transparency
          and Art. 5(1)(c) data minimisation for the specific context of calling/connected
          line identification. The requirement to inform users about CLI capabilities supports
          the transparency principle. The ability to suppress CLI implements data minimisation
          by allowing users to control their identifier exposure.
      - id: art-25
        relationship: complements
        confidence: 0.78
        rationale: >
          ePrivacy Art. 8 requirements for simple, free-of-charge CLI restriction options
          implement GDPR Art. 25 data protection by design. The requirement that privacy
          controls be "simple means" and "free of charge" reflects Art. 25(1)'s mandate
          to implement appropriate measures for data protection. Per-call and per-line
          granularity demonstrates privacy control design proportionate to the use case.
      - id: art-6
        relationship: complements
        confidence: 0.70
        rationale: >
          The user's choice to present or restrict calling line identification represents
          an exercise of control over personal data processing that aligns with the GDPR
          Art. 6 consent framework. When a user opts to present their CLI, they are implicitly
          consenting to the disclosure of their phone number to the called party. The
          transparency obligation in Art. 8(4) supports informed decision-making about
          this data disclosure.

  - source_control: epd-9
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          ePrivacy Art. 9 restricts location data processing to anonymisation or consent,
          directly intersecting with GDPR Art. 6 lawfulness requirements. For location data
          in electronic communications, ePrivacy Art. 9 narrows the available legal bases
          to only two: anonymisation (which removes it from personal data scope) or explicit
          consent. This is stricter than GDPR Art. 6 which permits six legal bases. The
          ePrivacy requirement for prior informed consent (data type, purpose, duration,
          third-party sharing) exceeds GDPR Art. 6(1)(a) specificity requirements.
      - id: art-5
        relationship: complements
        confidence: 0.85
        rationale: >
          ePrivacy Art. 9 implements multiple GDPR Art. 5 principles for location data:
          purpose limitation (only for value-added services), data minimisation (restricted
          to what is necessary), storage limitation (duration-bounded by consent), and
          accountability (restricted to authorized persons). The anonymisation-as-default
          requirement implements both data minimisation and storage limitation principles.
      - id: art-35
        relationship: complements
        confidence: 0.75
        rationale: >
          Large-scale processing of location data, as governed by ePrivacy Art. 9, is
          likely to trigger a DPIA requirement under GDPR Art. 35(3)(a) (systematic and
          extensive evaluation of personal aspects based on automated processing) and
          Art. 35(3)(c) (systematic monitoring of a publicly accessible area on a large
          scale). Location tracking inherently involves systematic monitoring, making the
          two articles complementary in their protective scope.
      - id: art-25
        relationship: complements
        confidence: 0.77
        rationale: >
          The anonymisation-as-default posture in ePrivacy Art. 9 and the per-session
          opt-out mechanism (simple toggle, free of charge) exemplify GDPR Art. 25 data
          protection by design and by default. The requirement that users can temporarily
          refuse location processing for each connection using "simple means" is a concrete
          implementation of privacy by default.

  - source_control: epd-12
    target_controls:
      - id: art-6
        relationship: complements
        confidence: 0.82
        rationale: >
          ePrivacy Art. 12 establishes informed opt-in for subscriber directory inclusion,
          complementing GDPR Art. 6 lawfulness requirements. Directory inclusion requires
          either consent (Art. 6(1)(a)) or, for basic directories, potentially legitimate
          interest (Art. 6(1)(f)) with robust opt-out. The granular consent for advanced
          search functions (reverse lookup) goes beyond basic GDPR consent requirements
          by requiring separate consent for each directory purpose.
      - id: art-17
        relationship: complements
        confidence: 0.80
        rationale: >
          ePrivacy Art. 12(2) right to withdraw data from public directories is a
          sector-specific expression of GDPR Art. 17 right to erasure. Subscribers can
          request removal from directories, which effectively erases their personal data
          from the publicly accessible directory. The requirement that withdrawal be free
          of charge mirrors GDPR's principle that exercising data subject rights must not
          impose costs on the individual.
      - id: art-5
        relationship: complements
        confidence: 0.78
        rationale: >
          ePrivacy Art. 12 implements GDPR Art. 5(1)(a) transparency (informing subscribers
          before inclusion), Art. 5(1)(b) purpose limitation (disclosure of directory
          purposes), and Art. 5(1)(d) accuracy (right to verify and correct data).
          The requirement to inform subscribers about search function capabilities in
          electronic directories supports meaningful transparency about how personal data
          will be used.
      - id: art-15
        relationship: complements
        confidence: 0.73
        rationale: >
          ePrivacy Art. 12(2) right to verify directory data complements GDPR Art. 15
          right of access. While Art. 15 grants a general right to access personal data,
          ePrivacy Art. 12(2) provides a sector-specific right to verify what personal
          data appears in public directories and correct inaccuracies, functioning as
          a targeted access and rectification mechanism.

  - source_control: epd-13
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          ePrivacy Art. 13(1) requires prior consent for direct marketing via automated
          calling systems, fax, and email, directly intersecting with GDPR Art. 6(1)(a)
          consent as a legal basis. For electronic direct marketing, ePrivacy Art. 13
          is lex specialis: consent is mandatory (no legitimate interest alternative
          for automated electronic channels). The "soft opt-in" exception in Art. 13(2)
          for existing customers receiving marketing for similar products operates as a
          sector-specific legal basis that sits between GDPR consent and legitimate interest.
      - id: art-5
        relationship: complements
        confidence: 0.80
        rationale: >
          ePrivacy Art. 13 implements GDPR Art. 5(1)(a) transparency and fairness for
          direct marketing. The prohibition on concealing sender identity (Art. 13(4))
          enforces transparency. The requirement for a valid opt-out address in every
          message supports the fairness principle. The purpose limitation in Art. 5(1)(b)
          is reflected in the "similar products or services" restriction on soft opt-in.
      - id: art-17
        relationship: complements
        confidence: 0.72
        rationale: >
          The opt-out and suppression list obligations in ePrivacy Art. 13 complement
          GDPR Art. 17 erasure rights. When a subscriber opts out of marketing, their
          contact details must be added to a suppression list and marketing must cease.
          While GDPR Art. 17 provides a general right to erasure, ePrivacy Art. 13
          provides a specific, immediate right to stop processing for direct marketing
          that must take effect without delay.
      - id: art-25
        relationship: complements
        confidence: 0.73
        rationale: >
          The ePrivacy Art. 13(4) requirement that every marketing email include a valid
          opt-out mechanism and clear sender identity implements GDPR Art. 25 data
          protection by design. Marketing systems must be designed with these privacy
          controls built in, not added as afterthoughts.

  - source_control: epd-14
    target_controls:
      - id: art-25
        relationship: complements
        confidence: 0.85
        rationale: >
          ePrivacy Art. 14(3) allows measures to ensure terminal equipment is constructed
          to enable users to protect and control their personal data. This directly
          complements GDPR Art. 25 data protection by design and by default by extending
          the privacy-by-design principle to hardware and device-level implementation.
          GDPR Art. 25 focuses on controller obligations in software and processes, while
          ePrivacy Art. 14 addresses the equipment and standards layer. Together they create
          a full-stack privacy-by-design requirement from hardware to application.
      - id: art-5
        relationship: complements
        confidence: 0.72
        rationale: >
          ePrivacy Art. 14 supports GDPR Art. 5(1)(f) integrity and confidentiality and
          Art. 5(1)(c) data minimisation at the terminal equipment level. Standardised
          privacy signals (GPC, DNT) emitted by compliant terminal equipment enable
          automated enforcement of data protection principles across the communications
          stack. The interoperability principle prevents market fragmentation that could
          undermine consistent privacy protection.

  - source_control: epd-15
    target_controls:
      - id: art-6
        relationship: complements
        confidence: 0.78
        rationale: >
          ePrivacy Art. 15(1) allows member states to restrict communications privacy
          rights for national security, defence, public security, and law enforcement.
          This intersects with GDPR Art. 6(1)(c) processing necessary for compliance
          with a legal obligation and Art. 6(1)(e) processing necessary for a task in
          the public interest. Lawful interception requests create a legal obligation
          that constitutes a valid legal basis under GDPR Art. 6.
      - id: art-5
        relationship: complements
        confidence: 0.75
        rationale: >
          Even when ePrivacy Art. 15(1) restrictions apply, the "necessary, appropriate
          and proportionate" test mirrors GDPR Art. 5 principles. The proportionality
          requirement reflects data minimisation (Art. 5(1)(c)). The requirement that
          data retention be "for a limited period" reflects storage limitation (Art. 5(1)(e)).
          The CJEU's prohibition of general and indiscriminate data retention under Art. 15
          directly enforces GDPR Art. 5 principles in the national security context.
      - id: art-30
        relationship: complements
        confidence: 0.73
        rationale: >
          ePrivacy Art. 15(1b) requires providers to establish and document internal
          procedures for lawful access requests and to track request volumes, legal
          justifications, and responses. This record-keeping obligation complements
          GDPR Art. 30 records of processing activities by requiring documentation of
          a specific category of processing (lawful interception). The transparency
          reporting capability required by Art. 15(1b) extends the Art. 30 accountability
          framework to law enforcement access.
      - id: art-28
        relationship: complements
        confidence: 0.70
        rationale: >
          When electronic communications providers process data under lawful interception
          orders, they function in a processor-like capacity relative to the requesting
          authority. ePrivacy Art. 15(1b) requirements for documented procedures and
          reporting complement GDPR Art. 28 processor obligations by establishing
          accountability mechanisms for data processing performed at the instruction
          of state authorities.
