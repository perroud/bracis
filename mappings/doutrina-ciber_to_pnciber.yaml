id: doutrina-ciber_to_pnciber
title: "Doutrina Militar de Defesa Cibernética to PNCiber Control Mapping"
source_framework: doutrina-ciber
target_framework: pnciber
version: "1.0.0"
last_updated: "2026-04-06"
methodology: structural
description: >
  Mapping between the Doutrina Militar de Defesa Cibernética (military cyber defense
  doctrine of the Brazilian Armed Forces) and the Decreto 11.856/2023 (PNCiber — Política
  Nacional de Cibersegurança). The Doutrina Cibernética operationalizes military cyber
  defense within the broader national cybersecurity policy established by the PNCiber.
  The military doctrine implements and complements the national policy, translating
  strategic-level cybersecurity objectives into operational and tactical military
  cyber defense capabilities.

mappings:
  - source_control: dciber-1
    target_controls:
      - id: art-1
        relationship: implements
        confidence: 0.90
        rationale: >
          dciber-1 (cyberspace as an operational domain) implements the PNCiber's
          mandate to orient cybersecurity in the country (art-1) by recognizing
          cyberspace as a domain requiring active defense, directly fulfilling the
          national cybersecurity orientation for the military sector.
      - id: art-2
        relationship: complements
        confidence: 0.85
        rationale: >
          dciber-1 complements art-2 (scope of cybersecurity activity) by defining
          the military dimension of cybersecurity — the Armed Forces treating
          cyberspace as an operational domain alongside land, sea, air, and space,
          extending the CIAD pillars into military operational context.

  - source_control: dciber-2
    target_controls:
      - id: art-3a
        relationship: implements
        confidence: 0.90
        rationale: >
          dciber-2 (principles of military cyber defense — resilience, deterrence,
          protection, legality) directly implements the PNCiber principles of
          national sovereignty (I), prevention (IV), and resilience (V) from art-3a,
          translating them into military doctrinal principles.
      - id: art-3b
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          dciber-2's principles of interoperability and cooperation intersect with
          art-3b's principles of internal cooperation (VI), international cooperation
          (VII), and coordinated action (X) between stakeholders.

  - source_control: dciber-3
    target_controls:
      - id: art-4a
        relationship: complements
        confidence: 0.85
        rationale: >
          dciber-3 (strategic, operational, and tactical levels of cyber action)
          complements art-4a's objective of promoting cybersecurity and diligent
          action in cyberspace (I-II) by establishing a structured three-tier military
          command framework for cyber defense operations.
      - id: art-6
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          The strategic level of dciber-3 (Ministry of Defense, EMCFA) intersects
          with art-6 (CNCiber governance) in that both establish multi-level
          governance structures for cybersecurity, though at different institutional
          scopes — military vs. national.

  - source_control: dciber-4
    target_controls:
      - id: art-4a
        relationship: implements
        confidence: 0.90
        rationale: >
          dciber-4 (Defensive Cyber Operations — protection, monitoring, detection,
          response, recovery) directly implements art-4a's objectives of adopting
          cyber protection measures and risk management (IV) and promoting
          organizational resilience (V) within the military context.
      - id: art-2
        relationship: complements
        confidence: 0.80
        rationale: >
          Defensive Cyber Operations (dciber-4) complement art-2's definition of
          cybersecurity scope by operationalizing the protection of confidentiality,
          integrity, authenticity, and availability of military information systems.

  - source_control: dciber-5
    target_controls:
      - id: art-4a
        relationship: complements
        confidence: 0.80
        rationale: >
          dciber-5 (Offensive Cyber Operations) complements art-4a's objective of
          combating cyber crimes and malicious actions (III) and strengthening
          critical infrastructure protection (VI) through deterrence capability,
          though OCO goes beyond the PNCiber's defensive orientation.
      - id: art-3a
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          OCO's emphasis on deterrence and sovereignty intersects with art-3a's
          principle of national sovereignty and prioritization of national interests
          (I). The legality requirement in dciber-5 also intersects with art-3a's
          principle of guaranteeing fundamental rights (III).

  - source_control: dciber-6
    target_controls:
      - id: art-4a
        relationship: complements
        confidence: 0.80
        rationale: >
          dciber-6 (Cyber Exploitation Operations) complements art-4a's objectives
          of prevention and detection (IV) by providing the intelligence collection
          capability that feeds both defensive and offensive operations, enabling
          proactive threat identification for national defense.
      - id: art-4b
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Cyber exploitation intersects with art-4b's objective of guaranteeing
          CIAD properties (IX) by collecting intelligence about threats to
          confidentiality, integrity, authenticity, and availability of national
          defense systems.

  - source_control: dciber-7
    target_controls:
      - id: art-6
        relationship: complements
        confidence: 0.85
        rationale: >
          dciber-7 (ComDCiber — roles and responsibilities) complements art-6
          (CNCiber creation and composition). Both establish governance bodies
          for cybersecurity — ComDCiber for military operational coordination,
          CNCiber for national strategic governance. ComDCiber represents the
          military component within the broader national governance framework.
      - id: art-8
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          ComDCiber's responsibility to advise EMCFA on cyber defense matters
          intersects with the CNCiber's advisory competence to CREDEN (art-8 VI),
          both serving as institutional advisors on cybersecurity at different
          levels of government.

  - source_control: dciber-8
    target_controls:
      - id: art-4a
        relationship: implements
        confidence: 0.90
        rationale: >
          dciber-8 (CTIR.Mil — Military Cyber Incident Response Team) directly
          implements art-4a's objective of adopting measures to prevent, detect,
          analyze, evaluate, treat, and respond to cyber incidents (IV) within
          the military sector.
      - id: art-5b
        relationship: complements
        confidence: 0.85
        rationale: >
          CTIR.Mil's role as liaison between military CSIRTs and civilian entities
          (CTIR Gov, CERT.br) complements art-5b's instrument of information
          sharing mechanisms (III) about risks, threats, and cyber incidents
          between public agencies, private sector, and society.

  - source_control: dciber-9
    target_controls:
      - id: art-3b
        relationship: implements
        confidence: 0.85
        rationale: >
          dciber-9 (Service Branch Cyber Commands — joint integration) implements
          art-3b's principle of cooperation between public and private entities
          (VI) and coordinated action (X) by establishing inter-service integration
          mechanisms, standard operating procedures, and joint force composition
          within the Armed Forces.
      - id: art-6
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          The joint integration structure in dciber-9 intersects with art-6's
          multi-stakeholder governance model, both reflecting the principle that
          effective cybersecurity requires coordination among diverse institutional
          actors.

  - source_control: dciber-10
    target_controls:
      - id: art-4a
        relationship: implements
        confidence: 0.90
        rationale: >
          dciber-10 (Cyber Threat Intelligence and Assessment) directly implements
          art-4a's objective of adopting measures to prevent, detect, and analyze
          cyber incidents (IV) by establishing the intelligence cycle for identifying,
          characterizing, and assessing cyber threats to national defense.
      - id: art-5b
        relationship: complements
        confidence: 0.80
        rationale: >
          The threat intelligence sharing and cooperation mechanisms in dciber-10
          complement art-5b's instruments of information sharing (III) and
          international technical cooperation (II) in cybersecurity.

  - source_control: dciber-11
    target_controls:
      - id: art-5b
        relationship: implements
        confidence: 0.90
        rationale: >
          dciber-11 (Cyber Situational Awareness and Information Sharing) directly
          implements art-5b's instrument of information sharing mechanisms (III)
          about risks, threats, and cyber incidents between public agencies, by
          establishing military-to-civilian and international sharing protocols.
      - id: art-4a
        relationship: complements
        confidence: 0.80
        rationale: >
          Continuous situational awareness (dciber-11) complements art-4a's objective
          of promoting cybersecurity and diligent action in cyberspace (I-II) by
          maintaining real-time understanding of the cyber threat landscape across
          all defense levels.

  - source_control: dciber-12
    target_controls:
      - id: art-2
        relationship: implements
        confidence: 0.90
        rationale: >
          dciber-12 (Military Network Defense and Access Control) directly implements
          art-2's definition of cybersecurity as guaranteeing CIAD of information
          in national cyberspace, including physical and logical security of
          information systems, through concrete controls (RBAC, MFA, DLP,
          network segmentation, centralized identity management).
      - id: art-4a
        relationship: complements
        confidence: 0.80
        rationale: >
          Military network defense controls (dciber-12) complement art-4a's
          objectives of promoting organizational resilience (V) and protecting
          critical infrastructure (VI) by establishing defense-in-depth
          architecture for military networks.

  - source_control: dciber-13
    target_controls:
      - id: art-4b
        relationship: implements
        confidence: 0.85
        rationale: >
          dciber-13 (Network Segmentation and Classified Information Systems)
          implements art-4b's objective of guaranteeing CIAD of solutions and data
          (IX) through military-grade encryption, classification-based segmentation,
          and cross-domain solutions for military information systems.
      - id: art-4a
        relationship: complements
        confidence: 0.80
        rationale: >
          Classification-driven network segmentation (dciber-13) complements art-4a's
          objective of strengthening critical infrastructure protection (VI) by
          applying the most rigorous segmentation and encryption standards to
          military classified networks.

  - source_control: dciber-14
    target_controls:
      - id: art-4a
        relationship: implements
        confidence: 0.90
        rationale: >
          dciber-14 (Continuous Monitoring and Threat Detection) directly implements
          art-4a's objective of adopting measures to detect, analyze, and respond
          to cyber incidents (IV) through 24/7 SIEM, UEBA, NDR, and automated
          alerting in military systems.
      - id: art-2
        relationship: complements
        confidence: 0.80
        rationale: >
          Continuous monitoring (dciber-14) complements art-2's scope of cybersecurity
          covering physical and logical security of information systems by mandating
          permanent, uninterrupted monitoring with tamper-proof log retention.

  - source_control: dciber-15
    target_controls:
      - id: art-4a
        relationship: implements
        confidence: 0.95
        rationale: >
          dciber-15 (Military Cyber Incident Response Procedures) is a direct
          implementation of art-4a's objective IV — adopting measures to prevent,
          detect, analyze, evaluate, treat, and respond to cyber incidents. The
          six-phase model (preparation, identification, containment, eradication,
          recovery, lessons learned) maps precisely to the PNCiber's incident
          lifecycle.
      - id: art-5b
        relationship: implements
        confidence: 0.85
        rationale: >
          The severity-based escalation procedures and CTIR.Mil notification
          requirements in dciber-15 implement art-5b's instrument of information
          sharing mechanisms (III) for incident reporting between military and
          civilian entities.

  - source_control: dciber-16
    target_controls:
      - id: art-4a
        relationship: implements
        confidence: 0.85
        rationale: >
          dciber-16 (Cyber Crisis Management and Escalation) implements art-4a's
          objectives of promoting organizational resilience (V) and protecting
          critical infrastructure (VI) through strategic-level crisis management,
          contingency plans, and continuity of operations for the military sector.
      - id: art-5b
        relationship: complements
        confidence: 0.80
        rationale: >
          Crisis management coordination between military and civilian agencies
          (dciber-16) complements art-5b's instruments of incident simulation
          exercises (I) and information sharing mechanisms (III), particularly
          in scenarios involving national sovereignty or critical infrastructure.

  - source_control: dciber-17
    target_controls:
      - id: art-4a
        relationship: implements
        confidence: 0.90
        rationale: >
          dciber-17 (Protection of Strategic Military Infrastructure) directly
          implements art-4a's objective of strengthening critical infrastructure
          protection against cyber threats (VI), applying it to C2 systems,
          weapons platforms, communications, navigation, logistics, and
          classified networks.
      - id: art-3a
        relationship: complements
        confidence: 0.80
        rationale: >
          Protection of strategic military infrastructure (dciber-17) complements
          art-3a's principle of national sovereignty (I) by safeguarding the
          military assets essential for exercising sovereignty in cyberspace.

  - source_control: dciber-18
    target_controls:
      - id: art-4a
        relationship: implements
        confidence: 0.90
        rationale: >
          dciber-18 (Dual-Use and National Critical Infrastructure Cyber Protection)
          directly implements art-4a's objectives of promoting organizational
          resilience (V) and protecting critical infrastructure (VI), specifically
          addressing civilian infrastructure (energy, telecom, transport, water,
          financial) upon which military operations depend.
      - id: art-3b
        relationship: complements
        confidence: 0.85
        rationale: >
          dciber-18's civil-military cooperation for dual-use infrastructure
          protection complements art-3b's principle of cooperation between public
          and private entities (VI) and coordinated action (X), as military
          operations depend on civilian infrastructure operators and regulators.

  - source_control: dciber-19
    target_controls:
      - id: art-4c
        relationship: implements
        confidence: 0.95
        rationale: >
          dciber-19 (Cyber Defense Training and Capacity Building) is a direct
          implementation of art-4c's objectives of stimulating human resource
          training (XI), developing education and awareness (XII), and fostering
          research and innovation (XIII) in cybersecurity, applied specifically
          to the military workforce across three tiers (basic, technical, advanced).
      - id: art-3b
        relationship: complements
        confidence: 0.80
        rationale: >
          dciber-19's emphasis on academic partnerships and international exchange
          programs complements art-3b's principles of education and technology
          development (VIII) and international cooperation (VII).

  - source_control: dciber-20
    target_controls:
      - id: art-5b
        relationship: implements
        confidence: 0.95
        rationale: >
          dciber-20 (Cyber Exercises and Operational Readiness) directly implements
          art-5b's instrument of national and sectoral incident simulation
          exercises (I) for evaluating and improving response capacity. ComDCiber
          coordinates joint exercises including tabletop, cyber range, red/blue
          team, crisis management, and international exercises.
      - id: art-4c
        relationship: complements
        confidence: 0.80
        rationale: >
          Cyber exercises (dciber-20) complement art-4c's objective of coordinated
          action and information exchange (XIV) between government, private sector,
          academia, and society, as exercises serve as a practical mechanism for
          multi-stakeholder capability development and cooperation.
