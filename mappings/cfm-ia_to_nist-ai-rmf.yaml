id: cfm-ia_to_nist-ai-rmf
title: "CFM-IA (Resolução CFM 2.454/2026) to NIST AI RMF v1.0 Control Mapping"
source_framework: cfm-ia
target_framework: nist-ai-rmf
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # ── cap-1 (Disposições Preliminares) ───────────────────────────────

  - source_control: art-1
    target_controls:
      - id: mp-1
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          CFM-IA art-1 defines the scope and applicability of AI regulation in
          medicine, identifying regulated subjects and covered activities.
          NIST AI RMF MP-1 requires establishing and understanding the context
          for AI systems including intended purposes and applicable regulations.
          Both controls address contextual scoping of AI systems, though art-1
          is specific to medical AI while MP-1 is a general context-mapping
          requirement.
      - id: gv-1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CFM-IA art-1 establishes the regulatory foundation requiring
          governance of AI systems in medicine. NIST AI RMF GV-1 requires
          policies and processes for AI risk management including understanding
          legal and regulatory requirements. art-1 defines the regulatory
          requirement that GV-1 would operationalize through governance
          structures.

  - source_control: art-2
    target_controls:
      - id: gv-1
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          CFM-IA art-2 defines key AI terminology (AI system, medical AI,
          explainability, human oversight) that forms the normative vocabulary
          for governance. NIST AI RMF GV-1 requires governance policies and
          processes to be in place and transparent. Shared definitions are
          foundational to transparent governance, though art-2 focuses on
          medical-specific taxonomy while GV-1 addresses governance broadly.
      - id: mp-2
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          CFM-IA art-2 defines categories of AI systems and decision types
          that inform classification. NIST AI RMF MP-2 requires categorization
          of AI systems by risk level, capabilities, and deployment context.
          art-2 provides the definitional framework needed for the
          categorization that MP-2 requires.

  - source_control: art-3
    target_controls:
      - id: mp-2
        relationship: implements
        confidence: 0.90
        rationale: >
          CFM-IA art-3 classifies medical AI systems by functional scope
          (diagnostic, therapeutic, triage, monitoring, prediction). NIST AI
          RMF MP-2 requires categorization of AI systems by capabilities and
          deployment context. art-3 implements a domain-specific categorization
          scheme that directly fulfills MP-2's categorization requirement for
          medical AI.
      - id: mp-1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CFM-IA art-3 establishes functional categories that define the
          operational context of each AI system in medicine. NIST AI RMF MP-1
          requires understanding the context and intended purposes of AI
          systems. The functional classification in art-3 contributes to the
          context establishment required by MP-1.

  - source_control: art-4
    target_controls:
      - id: gv-1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CFM-IA art-4 establishes six ethical principles (beneficence,
          non-maleficence, autonomy, justice, transparency, responsibility)
          for AI in medicine. NIST AI RMF GV-1 requires governance policies
          including principles that guide AI risk management. art-4's ethical
          principles would be encoded in the governance policies required by
          GV-1.
      - id: gv-3
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          CFM-IA art-4 mandates justice and equity in AI systems, prohibiting
          discrimination by race, gender, age, or socioeconomic status. NIST
          AI RMF GV-3 prioritizes diversity, equity, inclusion, and
          accessibility in AI risk management. Both controls address fairness
          and equity, though art-4 frames it as an ethical mandate while GV-3
          frames it as an organizational process priority.
      - id: mp-3
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          CFM-IA art-4 requires beneficence (AI must benefit patients) and
          non-maleficence (risks must be monitored and mitigated). NIST AI RMF
          MP-3 requires assessment of AI benefits and costs for individuals and
          society. Both controls require evaluation of positive and negative
          impacts, though art-4 mandates principles while MP-3 prescribes
          assessment methodology.

  - source_control: art-5
    target_controls:
      - id: gv-1
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          CFM-IA art-5 establishes absolute prohibitions on autonomous AI
          decision-making, discriminatory selection, and data misuse in
          medicine. NIST AI RMF GV-1 requires governance policies that manage
          AI risks. art-5's prohibitions represent the strictest governance
          constraints that GV-1 policies must encode and enforce.
      - id: mg-1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CFM-IA art-5 defines risk boundaries that must never be crossed
          (no autonomous decisions, no discrimination, no data misuse). NIST
          AI RMF MG-1 requires that AI risks are prioritized, responded to,
          and managed. art-5 defines non-negotiable risk thresholds that MG-1's
          risk management processes must enforce.

  # ── cap-2 (Classificação de Risco) ────────────────────────────────

  - source_control: art-6
    target_controls:
      - id: mp-2
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          CFM-IA art-6 classifies medical AI into four risk tiers (low,
          medium, high, very high) based on clinical impact. NIST AI RMF MP-2
          requires categorization of AI systems by risk level, capabilities,
          and deployment context. Both controls address risk-based
          classification of AI systems. art-6 is a domain-specific
          implementation of the same principle MP-2 prescribes.
      - id: mp-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CFM-IA art-6 defines risk levels based on impact severity. NIST AI
          RMF MP-5 requires assessment of likelihood and impact for identified
          AI risks. art-6's risk tier definitions inform the impact dimension
          of MP-5's risk assessment.

  - source_control: art-7
    target_controls:
      - id: mp-5
        relationship: implements
        confidence: 0.90
        rationale: >
          CFM-IA art-7 defines six objective criteria for risk classification
          (severity, reversibility, autonomy, vulnerability, temporal context,
          volume). NIST AI RMF MP-5 requires assessment of likelihood and
          impact of each identified AI risk. art-7 implements a concrete,
          multi-dimensional risk scoring methodology that directly fulfills
          MP-5's requirement for structured risk assessment.
      - id: mp-2
        relationship: complements
        confidence: 0.85
        rationale: >
          CFM-IA art-7 provides the detailed criteria used to assign the risk
          categories defined in art-6. NIST AI RMF MP-2 requires
          categorization of AI systems. art-7 complements MP-2 by providing
          the operational methodology for category assignment.
      - id: mp-4
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          CFM-IA art-7 requires cumulative analysis of risk factors including
          severity, reversibility, and population vulnerability. NIST AI RMF
          MP-4 requires assessment and documentation of risks for mapped AI
          systems. art-7's multi-criteria analysis contributes to the
          systematic risk assessment MP-4 prescribes.

  - source_control: art-8
    target_controls:
      - id: gv-1
        relationship: implements
        confidence: 0.88
        rationale: >
          CFM-IA art-8 requires proportional governance, transparency,
          validation, and monitoring based on risk level. NIST AI RMF GV-1
          requires governance policies and processes for AI risk management.
          art-8 implements a risk-proportional governance framework that
          directly fulfills GV-1's requirement for effective governance
          policies.
      - id: gv-2
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CFM-IA art-8 defines escalating approval requirements by risk level
          (tech lead, physician, committee, directorate). NIST AI RMF GV-2
          requires accountability structures with appropriate roles. art-8's
          tiered approval structure implements the accountability hierarchy
          GV-2 requires.

  - source_control: art-9
    target_controls:
      - id: ms-2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CFM-IA art-9 requires pre-market evaluation of high-risk medical AI
          including independent clinical validation and compliance
          verification. NIST AI RMF MS-2 requires AI systems to be evaluated
          for trustworthy characteristics by independent teams. Both controls
          require independent evaluation before deployment, though art-9 adds
          regulatory sandbox mechanisms specific to medical AI.
      - id: mp-4
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CFM-IA art-9 requires pre-market assessment including documentation,
          validation, and conformity verification. NIST AI RMF MP-4 requires
          risks to be assessed and documented for each AI system. art-9's
          pre-market assessment overlaps with MP-4's systematic risk
          documentation requirement.

  - source_control: art-10
    target_controls:
      - id: ms-3
        relationship: implements
        confidence: 0.88
        rationale: >
          CFM-IA art-10 requires reclassification of risk when models change,
          context shifts, periodically (every 12 months), or after adverse
          incidents. NIST AI RMF MS-3 requires mechanisms for tracking AI
          risks over time with timely detection of risk profile changes.
          art-10 implements a structured tracking mechanism with explicit
          triggers for risk reassessment.
      - id: mg-2
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          CFM-IA art-10 requires periodic review and reclassification based on
          operational evidence. NIST AI RMF MG-2 requires post-deployment
          monitoring plans. art-10's periodic review requirements contribute
          to the monitoring and management lifecycle MG-2 prescribes.

  # ── cap-3 (Transparência, Explicabilidade e Governança) ───────────

  - source_control: art-11
    target_controls:
      - id: ms-1
        relationship: implements
        confidence: 0.90
        rationale: >
          CFM-IA art-11 requires explainability mechanisms (feature importance,
          confidence scores, post-hoc methods like SHAP/LIME/Grad-CAM) for
          medium+ risk AI. NIST AI RMF MS-1 requires appropriate methods and
          metrics for measuring AI trustworthiness including explainability and
          interpretability. art-11 implements specific explainability
          measurement requirements that directly fulfill the explainability
          dimension of MS-1.
      - id: ms-2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CFM-IA art-11 requires explainability evaluation with specific
          technical methods. NIST AI RMF MS-2 requires AI systems to be
          evaluated for trustworthy characteristics including explainability.
          art-11 specifies the explainability evaluation methodology that
          MS-2 requires in a medical context.

  - source_control: art-12
    target_controls:
      - id: gv-5
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CFM-IA art-12 requires transparency to physicians and patients about
          AI system characteristics, model cards, and proactive notification of
          changes. NIST AI RMF GV-5 requires robust stakeholder engagement and
          feedback integration. art-12's transparency requirements serve the
          stakeholder communication that GV-5 mandates.
      - id: gv-1
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          CFM-IA art-12 requires algorithmic transparency through model cards,
          training data documentation, and performance metrics. NIST AI RMF
          GV-1 requires governance policies to be transparent and implemented
          effectively. art-12's transparency mechanisms contribute to the
          overall governance transparency GV-1 requires.
      - id: ms-2
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CFM-IA art-12 requires publication of model cards with performance
          metrics by subgroup, limitations, and recommended/contraindicated
          use scenarios. NIST AI RMF MS-2 requires documented evaluation of
          trustworthy characteristics. art-12's model card requirement
          implements the documentation standard MS-2 prescribes.

  - source_control: art-13
    target_controls:
      - id: gv-5
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          CFM-IA art-13 requires layered informed consent from patients for AI
          use and data training, with right to refuse without prejudice. NIST
          AI RMF GV-5 requires stakeholder engagement and feedback integration.
          Patient consent is a form of stakeholder engagement, though art-13
          mandates a specific legal-ethical mechanism while GV-5 prescribes
          broader engagement processes.
      - id: gv-1
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          CFM-IA art-13 requires consent management as a governance
          requirement for medical AI. NIST AI RMF GV-1 requires governance
          policies and processes. Consent management is a specific governance
          process that GV-1 would encompass.

  - source_control: art-14
    target_controls:
      - id: ms-3
        relationship: implements
        confidence: 0.88
        rationale: >
          CFM-IA art-14 requires complete traceability of AI-assisted decisions
          including system identification, version, inputs, outputs,
          explanations, and immutable audit logs with 20-year retention. NIST
          AI RMF MS-3 requires mechanisms for tracking AI risks over time.
          art-14 implements a rigorous traceability system that enables the
          temporal risk tracking MS-3 requires.
      - id: gv-1
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          CFM-IA art-14 requires governance mechanisms for recording and
          preserving AI decision evidence. NIST AI RMF GV-1 requires
          governance policies to be in place and implemented effectively.
          art-14's traceability requirements are specific governance mechanisms
          that GV-1 would encompass.

  - source_control: art-15
    target_controls:
      - id: gv-2
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          CFM-IA art-15 requires institutional AI governance including
          designated responsible physician, multidisciplinary committee,
          institutional AI policy, training program, and incident channel.
          NIST AI RMF GV-2 requires accountability structures with appropriate
          teams empowered and trained for AI risk management. Both controls
          address the same fundamental requirement: establishing organizational
          accountability structures for AI governance.
      - id: gv-4
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CFM-IA art-15 requires continuous training programs and incident
          reporting channels for AI in medicine. NIST AI RMF GV-4 requires
          organizational commitment to an AI risk-aware culture with
          documented risk management processes. art-15's training and
          communication requirements build the risk-aware culture GV-4
          prescribes.
      - id: gv-3
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          CFM-IA art-15 requires a multidisciplinary committee with medical
          professionals, engineers, ethicists, and patient representatives.
          NIST AI RMF GV-3 prioritizes diversity, equity, and inclusion in AI
          risk management. art-15's diverse committee composition aligns with
          GV-3's DEIA principles.

  - source_control: art-16
    target_controls:
      - id: gv-5
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CFM-IA art-16 requires comprehensive technical documentation (8
          mandatory sections) for high/very-high risk AI including clinical
          purpose, architecture, training data, validation results, bias
          analysis, explainability, monitoring plan, and version history.
          NIST AI RMF GV-5 requires stakeholder engagement with documented
          feedback integration. art-16's documentation enables meaningful
          stakeholder engagement by providing the information basis GV-5
          requires.
      - id: mp-5
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          CFM-IA art-16 requires documentation of bias analysis, validation
          metrics with confidence intervals, and monitoring plans. NIST AI RMF
          MP-5 requires likelihood and impact assessment of identified risks.
          art-16's documentation requirements capture the risk assessment data
          that MP-5 mandates.
      - id: ms-1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CFM-IA art-16 requires documentation of validation metrics
          disaggregated by subgroup and explainability mechanisms. NIST AI RMF
          MS-1 requires appropriate methods and metrics for measuring AI
          trustworthiness. art-16's metric documentation requirements align
          with MS-1's measurement framework.

  # ── cap-4 (Supervisão Humana e Responsabilidade) ──────────────────

  - source_control: art-17
    target_controls:
      - id: gv-2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CFM-IA art-17 establishes the physician as the final decision-maker
          for all AI-assisted clinical decisions, requiring critical evaluation
          and documentation. NIST AI RMF GV-2 requires accountability
          structures where appropriate individuals are responsible for AI risk
          management. art-17 defines the ultimate accountability structure for
          medical AI decisions.
      - id: mg-4
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          CFM-IA art-17 requires human-in-the-loop architecture where
          physicians validate all AI outputs before clinical application.
          NIST AI RMF MG-4 requires documented risk treatments including
          response and recovery plans. art-17's mandatory human oversight is
          a risk treatment mechanism that MG-4 would document and monitor.

  - source_control: art-18
    target_controls:
      - id: mg-4
        relationship: implements
        confidence: 0.88
        rationale: >
          CFM-IA art-18 requires proportional human supervision (review for
          medium, active for high, real-time for very high risk) with kill
          switch capability and automation complacency prevention. NIST AI
          RMF MG-4 requires risk treatments including response and recovery
          plans. art-18 implements a tiered risk treatment system with
          specific response mechanisms proportional to risk level.
      - id: gv-2
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          CFM-IA art-18 requires qualified physician supervisors with
          domain-specific competence and adequate workload management. NIST
          AI RMF GV-2 requires accountability structures with appropriate
          teams trained for AI risk management. art-18's supervisor
          qualification requirements implement GV-2's competency mandate.

  - source_control: art-19
    target_controls:
      - id: gv-2
        relationship: implements
        confidence: 0.88
        rationale: >
          CFM-IA art-19 defines liability typology for AI-assisted medical
          decisions (malpractice, negligence, imprudence) with joint
          liability for institutional governance failures. NIST AI RMF GV-2
          requires accountability structures where individuals are responsible
          for AI risk management. art-19 implements legal accountability
          consequences that give teeth to GV-2's accountability requirement.
      - id: gv-4
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CFM-IA art-19 creates incentives for risk-aware behavior by
          defining consequences for inadequate AI supervision. NIST AI RMF
          GV-4 requires organizational commitment to AI risk culture.
          art-19's liability framework reinforces the risk-aware culture
          GV-4 prescribes.

  - source_control: art-20
    target_controls:
      - id: gv-4
        relationship: implements
        confidence: 0.88
        rationale: >
          CFM-IA art-20 requires physician training in AI principles,
          limitations, explainability interpretation, supervision protocols,
          and error detection, with curricular requirements for medical
          education. NIST AI RMF GV-4 requires organizational commitment to
          AI risk culture with training and communication. art-20 implements
          a comprehensive competency program that directly builds the
          risk-aware culture GV-4 prescribes.
      - id: gv-2
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          CFM-IA art-20 requires training as a prerequisite for AI system
          use, with certification and periodic recertification. NIST AI RMF
          GV-2 requires teams to be trained for AI risk management. art-20's
          training requirements directly address GV-2's competency mandate.

  - source_control: art-21
    target_controls:
      - id: gv-5
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CFM-IA art-21 protects the physician-patient relationship,
          requiring clear communication about AI use, maintaining clinical
          dialogue, and managing psychological impacts of AI on patients.
          NIST AI RMF GV-5 requires robust engagement with relevant AI actors
          and stakeholder feedback integration. art-21 implements patient-
          centered stakeholder engagement specific to the medical context.
      - id: mp-3
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CFM-IA art-21 requires assessment of AI impact on the physician-
          patient relationship and patient well-being. NIST AI RMF MP-3
          requires assessment of AI benefits and costs for individuals and
          society. art-21's relational impact assessment contributes to the
          individual impact dimension of MP-3.

  - source_control: art-22
    target_controls:
      - id: mg-4
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          CFM-IA art-22 requires documented contingency plans for AI system
          failure including continuity of care, alternative clinical protocols,
          seamless transition, periodic testing, and kill switch for very-high
          risk systems. NIST AI RMF MG-4 requires documented risk treatments
          including response and recovery plans, tested through exercises.
          Both controls prescribe essentially the same requirement:
          documented, tested incident response and recovery procedures for
          AI system failures.
      - id: mg-1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CFM-IA art-22 requires proactive contingency planning as a risk
          management measure. NIST AI RMF MG-1 requires proactive and
          responsive AI risk management. art-22's contingency planning is a
          specific risk management activity that MG-1 encompasses.

  # ── cap-5 (Validação, Monitoramento e Segurança) ──────────────────

  - source_control: art-23
    target_controls:
      - id: ms-1
        relationship: implements
        confidence: 0.90
        rationale: >
          CFM-IA art-23 requires clinical validation with defined metrics
          (sensitivity, specificity, PPV, NPV, AUC-ROC), independent datasets
          representative of the Brazilian population, subgroup-disaggregated
          results, and prospective studies for high-risk systems. NIST AI RMF
          MS-1 requires appropriate methods and metrics for measuring AI
          trustworthiness characteristics. art-23 implements a rigorous
          clinical measurement framework that directly fulfills MS-1's
          requirement for validated trustworthiness metrics.
      - id: ms-2
        relationship: implements
        confidence: 0.88
        rationale: >
          CFM-IA art-23 requires independent clinical validation and
          prospective studies in real clinical environments. NIST AI RMF MS-2
          requires AI systems to be evaluated for trustworthy characteristics
          by independent teams. art-23 implements independent evaluation
          with specific clinical methodology.

  - source_control: art-24
    target_controls:
      - id: mp-2
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          CFM-IA art-24 requires training datasets to reflect demographic
          diversity of the target population and document representativeness
          gaps. NIST AI RMF MP-2 requires categorization considering data
          requirements. art-24's dataset representativeness requirements
          inform the data dimension of MP-2's categorization.
      - id: gv-3
        relationship: implements
        confidence: 0.88
        rationale: >
          CFM-IA art-24 requires demographic diversity in training data,
          representation of vulnerable/historically sub-represented groups,
          and transparency about representativeness limitations. NIST AI RMF
          GV-3 prioritizes diversity, equity, inclusion, and accessibility.
          art-24 implements GV-3's DEIA principles in the specific domain of
          training data composition and documentation.
      - id: ms-1
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          CFM-IA art-24 requires documentation of dataset demographic
          composition as a measurement of representativeness. NIST AI RMF
          MS-1 requires methods and metrics for measuring AI trustworthiness.
          Dataset representativeness is a foundational trustworthiness metric
          that MS-1 encompasses.

  - source_control: art-25
    target_controls:
      - id: ms-1
        relationship: implements
        confidence: 0.90
        rationale: >
          CFM-IA art-25 requires continuous bias detection with specific
          fairness metrics (equalized odds, demographic parity, calibration
          by subgroup) across all lifecycle stages. NIST AI RMF MS-1 requires
          appropriate methods and metrics for measuring fairness. art-25
          implements specific fairness measurement methods that directly
          fulfill the fairness dimension of MS-1.
      - id: gv-3
        relationship: implements
        confidence: 0.85
        rationale: >
          CFM-IA art-25 requires systematic bias detection and mitigation with
          mandatory deactivation for systematic discrimination. NIST AI RMF
          GV-3 prioritizes equity in AI risk management. art-25 implements
          operational equity assurance mechanisms that GV-3 prescribes at the
          governance level.
      - id: mg-1
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          CFM-IA art-25 requires risk response for detected bias including
          mitigation techniques and mandatory deactivation for systematic
          discrimination. NIST AI RMF MG-1 requires AI risks to be
          prioritized, responded to, and managed. art-25's bias response
          procedures implement specific risk management actions MG-1 requires.

  - source_control: art-26
    target_controls:
      - id: ms-3
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          CFM-IA art-26 requires continuous performance monitoring, data drift
          and concept drift detection, alert thresholds with documented
          response procedures, subgroup-disaggregated monitoring, and periodic
          performance reports. NIST AI RMF MS-3 requires mechanisms for
          tracking AI risks over time with continuous monitoring and timely
          detection of risk profile changes. Both controls prescribe
          essentially the same requirement: systematic, continuous monitoring
          of AI system performance with drift detection and escalation.
      - id: ms-1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CFM-IA art-26 requires monitoring the same metrics used in clinical
          validation, enabling direct comparison. NIST AI RMF MS-1 requires
          appropriate methods and metrics for measuring AI trustworthiness.
          art-26's monitoring metrics are the operational continuation of
          the measurement framework MS-1 establishes.
      - id: mg-2
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          CFM-IA art-26 requires post-deployment monitoring plans with
          periodic reporting to governance. NIST AI RMF MG-2 requires
          post-deployment monitoring plans to be implemented. art-26 directly
          addresses MG-2's post-deployment monitoring mandate.

  - source_control: art-27
    target_controls:
      - id: mg-2
        relationship: implements
        confidence: 0.88
        rationale: >
          CFM-IA art-27 governs model retraining with requirements for
          justification, full clinical revalidation, comparative analysis
          against current model, fallback preservation, and data compliance.
          NIST AI RMF MG-2 requires strategies to maximize AI benefits and
          minimize negative impacts with post-deployment monitoring. art-27
          implements a structured model improvement lifecycle that fulfills
          MG-2's requirement for documented benefit maximization strategies.
      - id: mg-1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CFM-IA art-27 requires risk management during model retraining
          including rollback capability and regression prevention. NIST AI
          RMF MG-1 requires proactive and responsive AI risk management.
          art-27's retraining governance implements risk response mechanisms
          MG-1 prescribes.

  - source_control: art-28
    target_controls:
      - id: mg-1
        relationship: implements
        confidence: 0.88
        rationale: >
          CFM-IA art-28 requires protection against AI-specific threats
          (adversarial attacks, data poisoning, model extraction, membership
          inference) with periodic red teaming. NIST AI RMF MG-1 requires
          AI risks to be prioritized, responded to, and managed. art-28
          implements specific technical risk management measures for
          AI security threats that MG-1 requires.
      - id: mp-4
        relationship: intersects-with
