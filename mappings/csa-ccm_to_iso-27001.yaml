id: csa-ccm-v4_to_iso-27001-2022
title: "CSA Cloud Controls Matrix v4 to ISO 27001:2022 Control Mapping"
source_framework: csa-ccm-v4
target_framework: iso-27001-2022
version: "1.0.0"
last_updated: "2026-04-03"
methodology: semantic

mappings:
  # IAM — Identity and Access Management
  - source_control: iam
    target_controls:
      - id: a5-15
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          CSA CCM IAM (Identity and Access Management) domain maps to ISO
          A.5.15 (Access Control). Both establish requirements for access
          control policies including user registration, authentication,
          and access rights management. CCM IAM is cloud-specific, addressing
          multi-tenancy and shared responsibility models for access control.
      - id: a8-2
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO A.8.2 (Privileged Access Rights) maps to CCM IAM requirements
          for managing privileged access in cloud environments, including
          administrative access to cloud infrastructure, tenant isolation
          controls, and service account management.
      - id: a8-3
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          ISO A.8.3 (Information Access Restriction) supports CCM IAM
          requirements for restricting access to information based on
          classification, tenancy, and business requirements in cloud
          service delivery.

  # DSP — Data Security and Privacy Lifecycle Management
  - source_control: dsp
    target_controls:
      - id: a5-1
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CSA CCM DSP (Data Security and Privacy Lifecycle Management) maps
          to ISO A.5.1 (Policies for Information Security). DSP requires
          policies governing data classification, handling, retention, and
          disposal throughout the data lifecycle in cloud environments.
          A.5.1 provides the overarching policy framework.
      - id: a8-10
        relationship: equivalent-to
        confidence: 0.80
        rationale: >
          ISO A.8.10 (Information Deletion) maps to CCM DSP requirements
          for secure data disposal and sanitization. Both address the secure
          deletion of data when no longer needed, critical in cloud
          environments where data may persist across shared storage
          infrastructure.

  # LOG — Logging and Monitoring
  - source_control: log
    target_controls:
      - id: a8-15
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          CSA CCM LOG (Logging and Monitoring) maps directly to ISO A.8.15
          (Logging). Both require the creation, protection, and analysis
          of audit logs. CCM LOG adds cloud-specific requirements including
          logging across multi-tenant environments, cloud service provider
          logging responsibilities, and log availability within the shared
          responsibility model.

  # CCC — Change Control and Configuration Management
  - source_control: ccc
    target_controls:
      - id: a8-28
        relationship: equivalent-to
        confidence: 0.80
        rationale: >
          CSA CCM CCC (Change Control and Configuration Management) maps
          to ISO A.8.28 (Secure Coding). Both address change management
          processes including authorization, testing, and approval of
          changes. CCM CCC extends this to cloud-specific change management
          including infrastructure-as-code changes, API modifications,
          and multi-tenant configuration updates.
      - id: a8-9
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          ISO A.8.9 (Configuration Management) maps to CCM CCC requirements
          for maintaining secure configurations across cloud infrastructure.
          Both require baseline configurations, hardening standards, and
          detection of unauthorized configuration changes.

  # IVS — Infrastructure and Virtualization Security
  - source_control: ivs
    target_controls:
      - id: a8-20
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          CSA CCM IVS (Infrastructure and Virtualization Security) maps to
          ISO A.8.20 (Networks Security). Both address network security
          controls. CCM IVS extends to cloud-specific concerns including
          virtual network isolation, hypervisor security, container
          security, and software-defined networking controls.
      - id: a8-22
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO A.8.22 (Segregation of Networks) maps to CCM IVS requirements
          for network segmentation in cloud environments, including virtual
          network isolation between tenants, micro-segmentation, and
          security zone definitions within cloud infrastructure.

  # SEF — Security Incident Management, E-Discovery, and Cloud Forensics
  - source_control: sef
    target_controls:
      - id: a5-24
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          CSA CCM SEF (Security Incident Management, E-Discovery, and Cloud
          Forensics) maps to ISO A.5.24 (Information Security Incident
          Management Planning and Preparation). Both require establishing
          incident response capabilities. CCM SEF adds cloud-specific
          requirements for forensics in virtualized environments and
          e-discovery across cloud service models.
      - id: a5-25
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO A.5.25 (Assessment and Decision on Information Security Events)
          supports CCM SEF requirements for assessing and categorizing
          security events, including cloud-specific event correlation across
          shared infrastructure and multi-tenant environments.
      - id: a5-26
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO A.5.26 (Response to Information Security Incidents) maps to
          CCM SEF incident response requirements, including containment,
          eradication, and recovery in cloud environments where the shared
          responsibility model defines provider and customer roles during
          incident response.

  # BCR — Business Continuity Management and Operational Resilience
  - source_control: bcr
    target_controls:
      - id: a5-29
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          CSA CCM BCR (Business Continuity Management and Operational
          Resilience) maps to ISO A.5.29 (Information Security During
          Disruption). Both require planning for business continuity
          including maintaining information security during adverse
          conditions. CCM BCR adds cloud-specific concerns such as
          multi-region failover, provider lock-in risks, and data
          portability during service disruption.
      - id: a5-30
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO A.5.30 (ICT Readiness for Business Continuity) supports CCM
          BCR requirements for ensuring ICT services can be recovered within
          required timeframes, including cloud service availability SLAs,
          disaster recovery across availability zones, and provider
          business continuity assurance.
