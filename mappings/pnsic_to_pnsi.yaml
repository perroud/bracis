id: pnsic_to_pnsi
title: "PNSIC to PNSI Control Mapping"
source_framework: pnsic
target_framework: pnsi
version: "1.0.0"
last_updated: "2026-04-06"
methodology: structural
description: >
  Mapping between Decreto 9.573/2018 (PNSIC — Politica Nacional de Seguranca de
  Infraestruturas Criticas) and Decreto 9.637/2018 (PNSI — Politica Nacional de
  Seguranca da Informacao). The PNSIC is a specialized instrument under the PNSI
  umbrella, applying information security principles specifically to the protection
  of national critical infrastructure. PNSI art. 2-IV defines critical infrastructure
  security as one of the five domains of information security, and PNSI art. 5
  identifies it as a module of the National Information Security Strategy.

mappings:
  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: derived-from
        confidence: 0.95
        rationale: >
          PNSIC art. 1 (establishment of the critical infrastructure security policy
          and definition of critical infrastructure) derives from PNSI art. 1, which
          establishes the broader information security policy encompassing critical
          infrastructure security as one of its four pillars (art. 1, paragrafo unico,
          inciso IV of the PNSI does not exist but art. 2-IV defines it).
      - id: art-2
        relationship: subset-of
        confidence: 0.90
        rationale: >
          PNSIC art. 1 defines critical infrastructure narrowly (installations, services,
          assets, and systems whose disruption causes serious impact). This is a subset of
          the broader PNSI art. 2-IV definition of critical infrastructure security within
          the five domains of information security.

  - source_control: art-2
    target_controls:
      - id: art-2
        relationship: subset-of
        confidence: 0.85
        rationale: >
          PNSIC art. 2 enumerates the five critical infrastructure sectors (energy,
          telecoms, transport, water, finance). These are specific instantiations of
          the general concept of critical infrastructure security defined in PNSI art. 2-IV.
      - id: art-5
        relationship: implements
        confidence: 0.80
        rationale: >
          The sectoral breakdown of critical infrastructure in PNSIC art. 2 implements the
          PNSI art. 5 mandate for a critical infrastructure security module within the
          National Information Security Strategy.

  - source_control: art-3
    target_controls:
      - id: art-9
        relationship: complements
        confidence: 0.90
        rationale: >
          PNSIC art. 3 (scope and operator responsibilities for critical infrastructure)
          complements PNSI art. 9 (competencies of APF organs and entities). While PNSI
          art. 9 addresses obligations of federal entities for information security, PNSIC
          art. 3 extends scope to private operators of critical infrastructure, including
          concessionaires and international organizations.
      - id: art-15
        relationship: complements
        confidence: 0.80
        rationale: >
          PNSIC art. 3 (proportional security measures for operators) complements PNSI
          art. 15 (implementation and adequacy requirements). Both establish obligations
          for regulated entities to adopt security measures, with PNSIC specializing for
          critical infrastructure operators.

  - source_control: art-4
    target_controls:
      - id: art-3
        relationship: derived-from
        confidence: 0.95
        rationale: >
          PNSIC art. 4 principles (prevention, precaution, resilience, cooperation,
          proportionality, graduality, confidentiality) derive from PNSI art. 3 principles
          (sovereignty, risk management, prevention, systemic vision). The PNSIC specializes
          and extends the general PNSI principles for the critical infrastructure context,
          adding resilience and proportionality specific to CI operations.

  - source_control: art-5
    target_controls:
      - id: art-4
        relationship: derived-from
        confidence: 0.95
        rationale: >
          PNSIC art. 5 strategic objectives (identify, prevent, detect, respond, recover
          CI; promote resilience; foster security culture; strengthen cooperation; develop
          national capabilities) derive from PNSI art. 4 objectives, specializing them
          for the critical infrastructure domain.
      - id: art-5
        relationship: implements
        confidence: 0.90
        rationale: >
          PNSIC art. 5 objectives for CI security directly implement the critical
          infrastructure security module mandated by PNSI art. 5 within the National
          Information Security Strategy.

  - source_control: art-6
    target_controls:
      - id: art-3
        relationship: complements
        confidence: 0.85
        rationale: >
          PNSIC art. 6 (public-private cooperation mechanisms for CI protection)
          complements PNSI art. 3-IV (principle of cooperation between public and
          private spheres in information security implementation). PNSIC operationalizes
          the cooperation principle through five specific mechanisms: information sharing,
          joint sectoral plans, joint exercises, joint training, and collaborative
          standards development.
      - id: art-6
        relationship: complements
        confidence: 0.80
        rationale: >
          PNSIC art. 6 (collaborative development of sectoral plans and standards for
          CI) complements PNSI art. 6 (sectoral plans and technical standards). Both
          address sectoral planning, but PNSIC emphasizes public-private partnership
          in the critical infrastructure context.

  - source_control: art-7
    target_controls:
      - id: art-5
        relationship: implements
        confidence: 0.85
        rationale: >
          PNSIC art. 7 (priority areas in the energy sector — SCADA/ICS security,
          ONS/SIN resilience) implements the PNSI art. 5 critical infrastructure
          security module by defining concrete sectoral actions for the energy sector.
      - id: art-2
        relationship: subset-of
        confidence: 0.80
        rationale: >
          PNSIC art. 7 energy sector specifics (SCADA, ICS, OT security) are a narrow
          subset of the broad PNSI art. 2-IV concept of critical infrastructure security,
          focused on one sector.

  - source_control: art-8
    target_controls:
      - id: art-5
        relationship: implements
        confidence: 0.85
        rationale: >
          PNSIC art. 8 (priority areas for telecoms, transport, and water sectors)
          implements the PNSI art. 5 critical infrastructure security module for
          three additional sectors, defining specific protection priorities for
          internet backbone, air traffic control, and water treatment systems.
      - id: art-2
        relationship: subset-of
        confidence: 0.80
        rationale: >
          PNSIC art. 8 sector-specific priorities (BGP security, DNS, DECEA, water
          SCADA) are specialized subsets of the broad PNSI art. 2-IV definition of
          critical infrastructure security.

  - source_control: art-9
    target_controls:
      - id: art-5
        relationship: implements
        confidence: 0.85
        rationale: >
          PNSIC art. 9 (financial sector priority areas — STR, PIX, capital markets,
          open finance) implements the PNSI art. 5 critical infrastructure security
          module for the financial sector. Art. 9-A (ENSIC quadrennial review cycle)
          operationalizes the strategic planning structure envisioned by PNSI art. 5.
      - id: art-4
        relationship: complements
        confidence: 0.80
        rationale: >
          PNSIC art. 9-A (ENSIC as implementation strategy with measurable targets
          and responsible parties) complements PNSI art. 4 objectives by providing a
          concrete planning instrument for critical infrastructure security.

  - source_control: art-10
    target_controls:
      - id: art-3
        relationship: implements
        confidence: 0.90
        rationale: >
          PNSIC art. 10 (mandatory risk management for CI operators covering IT and OT
          assets, intentional/accidental/natural threats) implements the PNSI art. 3-VI
          principle of risk management orientation. PNSIC specializes risk management
          for the CI context, requiring IT+OT coverage and three threat categories.
      - id: art-9
        relationship: complements
        confidence: 0.85
        rationale: >
          PNSIC art. 10 (risk documentation and reporting to regulators and GSI/PR)
          complements PNSI art. 9 (obligations of APF entities including SI policy
          creation). Both mandate structured security governance, with PNSIC extending
          reporting obligations to sectoral regulators for CI operators.

  - source_control: art-11
    target_controls:
      - id: art-6
        relationship: implements
        confidence: 0.90
        rationale: >
          PNSIC art. 11 (sectoral security plans — PSSIC — with asset mapping, threats,
          targets, continuity plans) implements PNSI art. 6, which mandates sectoral
          security plans. PNSIC adds CI-specific requirements: operational continuity
          plans, measurable performance indicators, and GSI/PR national registry.
      - id: art-5
        relationship: complements
        confidence: 0.80
        rationale: >
          PNSIC art. 11 sectoral plans (PSSIC) complement PNSI art. 5 instruments
          (National Strategy and national plans) by providing sector-level planning
          for the critical infrastructure security module.

  - source_control: art-12
    target_controls:
      - id: art-4
        relationship: implements
        confidence: 0.85
        rationale: >
          PNSIC art. 12 (simulated exercises, training programs, R&D partnerships with
          universities, cross-sectoral exercises) implements PNSI art. 4-IV (objective
          to foster human resource qualification in information security) and art. 4-II
          (objective to promote R&D in information security), specializing them for CI.
      - id: art-7
        relationship: complements
        confidence: 0.80
        rationale: >
          PNSIC art. 12 (GSI/PR-coordinated exercises and best practices publications)
          complements PNSI art. 7-IV (GSI/PR competence to create awareness and training
          programs). Both address capacity building, but PNSIC focuses on CI-specific
          exercises and OT/ICS training.

  - source_control: art-13
    target_controls:
      - id: art-7
        relationship: intersects-with
        confidence: 0.95
        rationale: >
          PNSIC art. 13 (GSI/PR competencies for CI governance — coordination, technical
          directives, national registry, cross-sector incident response, presidential
          reporting) intersects with PNSI art. 7 (GSI/PR competencies for information
          security). Both assign governance authority to GSI/PR, with PNSIC specializing
          for the CI domain while overlapping on normative authority, strategic coordination,
          and presidential advisory functions.
      - id: art-13
        relationship: complements
        confidence: 0.85
        rationale: >
          PNSIC art. 13 GSI/PR coordination of CI security complements the CGeSI
          (PNSI art. 13), which provides inter-ministerial governance for the broader
          information security policy. Both create governance structures coordinated
          by GSI/PR.

  - source_control: art-14
    target_controls:
      - id: art-9
        relationship: complements
        confidence: 0.90
        rationale: >
          PNSIC art. 14 (sectoral regulator competencies — specific regulation,
          supervision, sanctions) and art. 14-A (operator obligations — implement
          security, notify incidents, cooperate with audits) complement PNSI art. 9
          (APF entity obligations — implement PNSI, create policy, designate security
          manager, notify CTIR Gov). Both establish enforcement and compliance
          obligations, with PNSIC extending to private CI operators and sectoral regulators.
      - id: art-11
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          PNSIC art. 14 (security officer designation, regulatory supervision) intersects
          with PNSI art. 11 (security managers and security credentials). Both address
          the human governance dimension — who is responsible for security and what
          credentials/authority they require.

  - source_control: art-15
    target_controls:
      - id: art-1
        relationship: complements
        confidence: 0.95
        rationale: >
          PNSIC art. 15 (integration with PNSI, PNCiber, defense policy, civil defense)
          explicitly declares the PNSIC as an instrument of the PNSI (art. 15-I cites
          Decreto 9.637/2018 as the umbrella policy), confirming the hierarchical
          relationship and complementarity between the two frameworks.
      - id: art-5
        relationship: implements
        confidence: 0.90
        rationale: >
          PNSIC art. 15 (policy integration coordinated by GSI/PR) implements PNSI art. 5
          mandate for national plans and strategies by connecting the CI security policy
          to the broader ecosystem of national security policies, including defense,
          cybersecurity, and civil protection.
      - id: art-14
        relationship: complements
        confidence: 0.80
        rationale: >
          PNSIC art. 15 (inter-ministerial coordination for policy integration)
          complements PNSI art. 14 (CGeSI competencies for evaluating and proposing
          changes to the National Strategy). Both address the governance of policy
          coherence across the national security framework.
