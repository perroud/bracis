id: nis2_to_iso-27001
title: "NIS2 Directive to ISO/IEC 27001:2022 Control Mapping"
source_framework: nis2
target_framework: iso-27001-2022
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # Chapter 2 — Coordinated Frameworks, Vulnerabilities and Strategies

  - source_control: art-7
    target_controls:
      - id: a5-1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Art. 7 requires national cybersecurity strategies including policy frameworks.
          A.5.1 requires organizational information security policies. Both establish
          top-level policy governance, though Art. 7 operates at the national level
          while A.5.1 operates at the organizational level.
      - id: a5-2
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          Art. 7 mandates identification of authorities and stakeholders involved in
          strategy implementation. A.5.2 requires defined information security roles
          and responsibilities. Both address accountability structures for security
          governance.
      - id: a5-36
        relationship: complements
        confidence: 0.60
        rationale: >
          Art. 7 requires Member States to assess cybersecurity risks. A.5.36 requires
          regular compliance reviews against policies and standards. The national
          strategy assessment creates the external compliance baseline that A.5.36
          reviews against.

  # Chapter 4 — Cybersecurity Risk-Management Measures and Reporting Obligations

  - source_control: art-20
    target_controls:
      - id: a5-1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Art. 20 requires management bodies to approve cybersecurity risk-management
          measures. A.5.1 requires information security policies to be approved by
          management. Both mandate top management approval and oversight of security
          governance, making them strongly aligned on governance accountability.
      - id: a5-2
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Art. 20 establishes management body liability and accountability for
          cybersecurity oversight. A.5.2 requires defined and allocated information
          security roles and responsibilities. Both ensure clear assignment of security
          accountability, though Art. 20 adds personal liability.
      - id: a5-36
        relationship: complements
        confidence: 0.70
        rationale: >
          Art. 20 requires management to oversee implementation of cybersecurity
          measures. A.5.36 requires regular compliance reviews of information security
          policies and standards. Management oversight under Art. 20 is complemented
          by the compliance verification mechanism of A.5.36.
      - id: a6-1
        relationship: complements
        confidence: 0.55
        rationale: >
          Art. 20 mandates cybersecurity training for management body members. A.6.1
          requires screening of personnel. Both address the competency and suitability
          of people with security responsibilities, though from different angles
          (training vs. background verification).

  - source_control: art-21
    target_controls:
      - id: a5-1
        relationship: implements
        confidence: 0.85
        rationale: >
          Art. 21(a) requires policies on risk analysis and information system security.
          A.5.1 requires defined information security policies. Art. 21(a) directly
          implements the policy requirement of A.5.1 in the NIS2 context.
      - id: a5-2
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Art. 21(i) covers human resources security and access control policies.
          A.5.2 covers information security roles and responsibilities. Both address
          the human element of security governance.
      - id: a5-15
        relationship: implements
        confidence: 0.85
        rationale: >
          Art. 21(i) explicitly requires access control policies, and Art. 21(j)
          mandates multi-factor authentication. A.5.15 establishes rules for physical
          and logical access control. Art. 21 directly implements the access control
          requirements of A.5.15 and goes further by mandating MFA.
      - id: a5-23
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          Art. 21(d) addresses supply chain security including service providers.
          A.5.23 covers cloud services security. Cloud services are a subset of the
          supply chain addressed by Art. 21(d), creating an intersection where cloud
          provider relationships are concerned.
      - id: a5-36
        relationship: implements
        confidence: 0.75
        rationale: >
          Art. 21(f) requires policies and procedures to assess the effectiveness of
          cybersecurity risk-management measures. A.5.36 requires regular compliance
          reviews against policies and standards. Art. 21(f) directly implements the
          compliance review concept of A.5.36 for cybersecurity measures.
      - id: a6-1
        relationship: intersects-with
        confidence: 0.60
        rationale: >
          Art. 21(i) covers human resources security as part of the mandatory risk
          management measures. A.6.1 requires personnel screening. Both address the
          human resources dimension of security, though Art. 21(i) is broader while
          A.6.1 is more specific to pre-employment verification.
      - id: a7-1
        relationship: intersects-with
        confidence: 0.60
        rationale: >
          Art. 21 mandates an all-hazards approach that protects the physical
          environment of network and information systems. A.7.1 requires physical
          security perimeters. The all-hazards mandate in Art. 21 encompasses the
          physical security requirements defined in A.7.1.
      - id: a8-1
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          Art. 21(i) covers asset management as part of the mandatory measures.
          A.8.1 covers user endpoint device protection. Endpoint devices are assets
          under Art. 21(i), and their protection contributes to the overall asset
          management requirement.
      - id: a8-8
        relationship: implements
        confidence: 0.90
        rationale: >
          Art. 21(e) explicitly requires vulnerability handling and disclosure as part
          of security in system acquisition, development and maintenance. A.8.8
          requires management of technical vulnerabilities. Art. 21(e) directly
          implements A.8.8's vulnerability management requirement.
      - id: a8-9
        relationship: implements
        confidence: 0.80
        rationale: >
          Art. 21(a) requires policies on information system security, which inherently
          includes secure configuration management. A.8.9 requires documented and
          reviewed configurations. Secure system policies under Art. 21(a) implement
          the configuration management discipline of A.8.9.
      - id: a8-15
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Art. 21(b) requires incident handling capabilities, which depend on logging
          for detection and investigation. A.8.15 requires production, storage,
          protection and analysis of logs. Logging is a foundational capability for
          the incident handling mandated by Art. 21(b).
      - id: a8-25
        relationship: implements
        confidence: 0.85
        rationale: >
          Art. 21(e) requires security in network and information systems acquisition,
          development and maintenance. A.8.25 requires rules for secure development
          life cycle. Art. 21(e) directly implements the secure development
          requirements of A.8.25.
      - id: a8-28
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Art. 21(e) covers security in system development and maintenance, including
          vulnerability handling. A.8.28 requires application of secure coding
          principles. Secure coding is a subset of the development security
          requirements mandated by Art. 21(e).

  - source_control: art-23
    target_controls:
      - id: a5-1
        relationship: complements
        confidence: 0.55
        rationale: >
          Art. 23 establishes mandatory incident reporting obligations with strict
          timelines (24h, 72h, 1 month). A.5.1 requires organizational security
          policies. Incident reporting procedures should be captured in
          organizational policies, but A.5.1 does not specifically mandate external
          notification; Art. 23 complements it with explicit reporting requirements.
      - id: a8-15
        relationship: complements
        confidence: 0.70
        rationale: >
          Art. 23 requires detailed incident notifications including indicators of
          compromise, severity, and root cause. A.8.15 requires logging of activities,
          exceptions, faults and relevant events. Effective incident reporting under
          Art. 23 depends on the logging infrastructure mandated by A.8.15, and the
          log data directly feeds the required notification content.
      - id: a8-8
        relationship: complements
        confidence: 0.60
        rationale: >
          Art. 23 requires final reports to identify the root cause and type of
          threat that triggered the incident. A.8.8 requires evaluation of
          vulnerability exposure. Vulnerability management under A.8.8 provides
          the technical context needed for the root-cause analysis mandated by
          Art. 23 final reports.

  - source_control: art-24
    target_controls:
      - id: a5-23
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Art. 24 encourages use of certified ICT products and services, including
          cloud services certified under EU schemes. A.5.23 requires processes for
          acquisition, use and management of cloud services. Both address the
          selection and governance of ICT service providers, with Art. 24 adding
          the EU certification dimension.
      - id: a8-25
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          Art. 24 promotes use of certified ICT products and processes in software
          development. A.8.25 requires secure development life cycle rules. Both
          address the security quality of software and systems, with Art. 24
          emphasizing formal certification as a means of demonstrating compliance.
      - id: a8-28
        relationship: complements
        confidence: 0.60
        rationale: >
          Art. 24 encourages certified ICT products and use of qualified trust
          services. A.8.28 requires secure coding principles. Secure coding produces
          the software quality that EU certification schemes validate; Art. 24
          complements A.8.28 by adding a formal certification layer on top of
          coding practices.
      - id: a8-8
        relationship: complements
        confidence: 0.55
        rationale: >
          Art. 24 links to Article 21 compliance via certified products, which
          inherently involves products with managed vulnerability profiles. A.8.8
          requires management of technical vulnerabilities. Certified products
          under Art. 24 are expected to have robust vulnerability management,
          complementing the organizational practice required by A.8.8.

  - source_control: art-34
    target_controls:
      - id: a5-36
        relationship: complements
        confidence: 0.80
        rationale: >
          Art. 34 defines administrative fines for non-compliance with NIS2 (up to
          EUR 10M or 2% of turnover for essential entities). A.5.36 requires regular
          compliance reviews against policies and standards. The enforcement regime
          of Art. 34 provides the external incentive for the internal compliance
          reviews required by A.5.36; together they create a complete compliance
          accountability loop.
      - id: a5-1
        relationship: complements
        confidence: 0.65
        rationale: >
          Art. 34 establishes penalties for failing to implement required
          cybersecurity measures. A.5.1 requires defined information security
          policies. The fine structure in Art. 34 creates a financial imperative
          for the policy governance required by A.5.1, as inadequate policies
          directly expose the organization to administrative fines.
      - id: a5-2
        relationship: complements
        confidence: 0.60
        rationale: >
          Art. 34 considers the degree of responsibility and cooperation when
          calculating fines. A.5.2 requires defined information security roles
          and responsibilities. Clear role definitions under A.5.2 directly
          affect the liability and responsibility assessment under Art. 34's
          fine calculation criteria.
