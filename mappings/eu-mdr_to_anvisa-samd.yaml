id: eu-mdr_to_anvisa-samd
title: "EU MDR 2017/745 to ANVISA SaMD (RDC 657) Control Mapping"
source_framework: eu-mdr
target_framework: anvisa-samd
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic
description: >
  Complete control-to-control mapping from EU MDR 2017/745 (European Medical Device
  Regulation) to ANVISA SaMD RDC 657/2022 (Brazilian regulation for Software as a Medical
  Device). Both frameworks regulate software medical devices but from different regulatory
  traditions: EU MDR applies a risk-class-based conformity assessment model via notified
  bodies, while ANVISA SaMD follows an IMDRF-aligned registration model. The intersection
  is substantial in risk management (ISO 14971), software lifecycle (IEC 62304), clinical
  evidence, post-market surveillance, cybersecurity, and change management. EU MDR is
  broader in scope (covers all medical devices), while ANVISA SaMD is narrower but deeper
  on SaMD-specific topics such as AI/ML, algorithmic transparency, and drift monitoring.

mappings:
  # ──────────────────────────────────────────────────────────────────────
  # CLD — Clinical Evaluation and Data
  # ──────────────────────────────────────────────────────────────────────

  - source_control: cld-1
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          EU MDR cld-1 (Clinical Evaluation and Evidence Requirements) and ANVISA art-5
          (Evidencia Clinica para SaMD) both require the manufacturer to generate and
          maintain clinical evidence demonstrating safety and efficacy proportional to
          risk class. Both mandate analytical validity, clinical validity, and clinical
          performance assessment. The ANVISA three-layer evidence model (analytical
          validity, clinical validity, clinical performance) directly mirrors the
          EU MDR clinical evaluation structure.
      - id: art-6
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          EU MDR cld-1 requires clinical evaluation including validation with the
          intended user population and clinical performance assessment. ANVISA art-6
          (Validacao Clinica e Desempenho do SaMD) specifies the same validation
          requirement with additional emphasis on representativeness of the Brazilian
          population and algorithmic bias detection for AI/ML-based SaMD.
      - id: art-3
        relationship: complements
        confidence: 0.75
        rationale: >
          EU MDR cld-1 requires clinical evidence proportional to device risk class.
          ANVISA art-3 (Classificacao de Risco de SaMD) defines the risk classification
          matrix (Categories I-IV) that determines the level of clinical evidence
          required. The classification system informs the clinical evidence depth.

  - source_control: cld-2
    target_controls:
      - id: art-20
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          EU MDR cld-2 (Post-Market Clinical Follow-Up) and ANVISA art-20 (Vigilancia
          Pos-Mercado de SaMD) both mandate proactive post-market surveillance systems
          that continuously collect and evaluate clinical performance data. Both require
          PMCF plans for higher-risk devices (EU MDR Class III / ANVISA Class III-IV),
          periodic safety update reports (PSUR), and integration of post-market data
          into the clinical evaluation and risk management processes.
      - id: art-25
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          EU MDR cld-2 requires continuous clinical performance monitoring post-market.
          ANVISA art-25 (Monitoramento de Drift e Revalidacao de Modelos) extends this
          concept specifically for AI/ML models, requiring data drift detection, concept
          drift monitoring, and model revalidation. Both address performance degradation
          detection over time, but art-25 adds ML-specific drift metrics (PSI, KL
          divergence, KS test).

  # ──────────────────────────────────────────────────────────────────────
  # GSR — General Safety and Performance Requirements
  # ──────────────────────────────────────────────────────────────────────

  - source_control: gsr-1
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          EU MDR gsr-1 (General Risk Management and Safety Requirements) and ANVISA
          art-15 (Gestao de Riscos - ISO 14971) both mandate comprehensive risk
          management systems based on ISO 14971 across the entire device lifecycle.
          Both require risk management plans, hazard identification, risk estimation
          and evaluation, risk control measures, residual risk assessment, and
          continuous post-market risk monitoring.
      - id: art-16
        relationship: implements
        confidence: 0.88
        rationale: >
          EU MDR gsr-1 requires identification and analysis of known and foreseeable
          hazards and estimation of associated risks. ANVISA art-16 (Analise e Avaliacao
          de Riscos de SaMD) implements this requirement with SaMD-specific hazard
          categories (clinical, data, interoperability, infrastructure) and additional
          AI/ML-specific risks (overfitting, data drift, concept drift, adversarial
          attacks).
      - id: art-17
        relationship: implements
        confidence: 0.85
        rationale: >
          EU MDR gsr-1 requires risk control measures following the hierarchy of
          inherent safety by design, protective measures, and information for safety.
          ANVISA art-17 (Medidas de Controle e Mitigacao de Riscos) implements the
          same hierarchy with SaMD-specific examples: elimination by design, software
          protection mechanisms, and user information about residual risks.
      - id: art-18
        relationship: complements
        confidence: 0.80
        rationale: >
          EU MDR gsr-1 requires evaluation of overall benefit-risk ratio and residual
          risk acceptability. ANVISA art-18 (Risco Residual e Relacao Beneficio-Risco)
          complements this with specific requirements for individual and cumulative
          residual risk assessment, benefit-risk justification based on clinical
          evidence, and communication of residual risks to users.

  - source_control: gsr-2
    target_controls:
      - id: art-10
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          EU MDR gsr-2 (Design and Manufacturing Principles) requires software to be
          developed ensuring repeatability, reliability, and performance, with single
          fault tolerance. ANVISA art-10 (Ciclo de Vida do Software - IEC 62304)
          requires the same through IEC 62304 compliance, with documented software
          development planning, architecture design, implementation, integration, and
          testing phases proportional to software safety class.
      - id: art-12
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          EU MDR gsr-2 mandates design and manufacturing processes that ensure
          reliability and reproducibility. ANVISA art-12 (Processo de Desenvolvimento e
          Boas Praticas) specifies the development practices that achieve this: coding
          standards, peer code review, configuration management, dependency management,
          environment segregation, and reproducible builds.
      - id: art-11
        relationship: complements
        confidence: 0.78
        rationale: >
          EU MDR gsr-2 addresses design outputs and manufacturing processes. ANVISA
          art-11 (Controles de Design e Documentacao Tecnica) complements by detailing
          the design control framework (design input, output, review, verification,
          validation, transfer) that governs the design and manufacturing process.

  - source_control: gsr-3
    target_controls:
      - id: art-8
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          EU MDR gsr-3 (Protection Against Unauthorized Access and Data Integrity) and
          ANVISA art-8 (Seguranca Cibernetica by Design para SaMD) both require
          cybersecurity to be incorporated from the design phase, including
          authentication and access control, encryption of data at rest and in transit,
          incident detection and response, vulnerability management, and secure update
          mechanisms. Both follow a security-by-design approach.
      - id: art-9
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          EU MDR gsr-3 requires data integrity protection during processing, storage,
          and transmission. ANVISA art-9 (Interoperabilidade e Padroes de Dados Clinicos)
          addresses data integrity specifically in the context of clinical data exchange
          with health information systems, requiring standardized interoperability
          protocols (HL7 FHIR, DICOM) and input data validation.

  - source_control: gsr-4
    target_controls:
      - id: art-19
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          EU MDR gsr-4 (Information Supplied with the Device - Labelling and IFU)
          requires labelling with software version, release notes, and instructions
          for use. ANVISA art-19 (Registro e Notificacao junto a ANVISA) requires
          registration documentation including device description, instructions for
          use, and labelling. Both mandate version identification and user-facing
          documentation, though art-19 focuses on regulatory submission content.
      - id: art-7
        relationship: complements
        confidence: 0.78
        rationale: >
          EU MDR gsr-4 requires information to be appropriate to the intended user's
          knowledge and experience, with clear and unambiguous presentation. ANVISA
          art-7 (Engenharia de Usabilidade - IEC 62366) complements this by requiring
          formal usability engineering to ensure the interface minimizes use-related
          risks and information is comprehensible to intended users.

  # ──────────────────────────────────────────────────────────────────────
  # PMS — Post-Market Surveillance
  # ──────────────────────────────────────────────────────────────────────

  - source_control: pms-1
    target_controls:
      - id: art-20
        relationship: equivalent-to
        confidence: 0.94
        rationale: >
          EU MDR pms-1 (Post-Market Surveillance System) and ANVISA art-20 (Vigilancia
          Pos-Mercado de SaMD) are directly equivalent. Both mandate proactive and
          systematic post-market surveillance systems that collect performance and
          safety data, analyze trends, update risk management and clinical evaluation,
          generate periodic safety update reports (PSUR), and feed corrective actions.
          Both require the PMS system to be proportional to risk class and integrated
          with the quality management system.
      - id: art-21
        relationship: complements
        confidence: 0.78
        rationale: >
          EU MDR pms-1 uses PMS data to identify needs for corrective actions and
          update design/labelling. ANVISA art-21 (Gestao de Atualizacoes e Alteracoes
          de Registro) complements by defining the regulatory classification of changes
          triggered by PMS findings (registration amendment, notification, or internal
          record), ensuring PMS-driven changes follow the appropriate regulatory path.

  - source_control: pms-2
    target_controls:
      - id: art-22
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          EU MDR pms-2 (Vigilance and Serious Incident Reporting) and ANVISA art-22
          (Recall e Acao Corretiva de Campo para SaMD) both address vigilance and
          corrective actions. EU MDR requires reporting serious incidents within
          strict timelines (2-15 days). ANVISA requires notification of serious
          adverse events within 72 hours and recall capability within 72 hours for
          grave risks. Both mandate root cause analysis and preventive actions.
      - id: art-20
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          EU MDR pms-2 requires trend reporting of non-serious incidents. ANVISA art-20
          requires periodic analysis of post-market data to identify trends and emerging
          risks. Both recognize that individual non-serious events may collectively
          indicate a systematic safety issue requiring vigilance action.

  - source_control: pms-3
    target_controls:
      - id: art-22
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          EU MDR pms-3 (Field Safety Corrective Actions and Recalls) and ANVISA art-22
          (Recall e Acao Corretiva de Campo para SaMD) are directly equivalent. Both
          require manufacturers to implement recall and field safety corrective action
          procedures, notify competent authorities, communicate with affected users,
          track recall effectiveness, and conduct root cause analysis. Both recognize
          that SaMD allows remote corrective actions (software updates, feature
          deactivation).
      - id: art-4
        relationship: complements
        confidence: 0.72
        rationale: >
          EU MDR pms-3 requires manufacturers to inform competent authorities and take
          corrective actions. ANVISA art-4 (Obrigacoes do Fabricante de SaMD) establishes
          the manufacturer's overarching obligation to communicate adverse events and
          quality deviations to ANVISA, providing the legal basis for the corrective
          action process.

  # ──────────────────────────────────────────────────────────────────────
  # QMS — Quality Management System
  # ──────────────────────────────────────────────────────────────────────

  - source_control: qms-1
    target_controls:
      - id: art-4
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          EU MDR qms-1 (Quality Management System for Manufacturers) and ANVISA art-4
          (Obrigacoes do Fabricante de SaMD) both require manufacturers to establish,
          document, and maintain a quality management system proportional to device
          risk class. Both mandate QMS coverage of design, development, manufacturing,
          distribution, post-market surveillance, CAPA, and management responsibility.
          Both reference ISO 13485 as the applicable standard.
      - id: art-10
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          EU MDR qms-1 requires the QMS to address product realization including design
          and development. ANVISA art-10 (Ciclo de Vida do Software - IEC 62304)
          specifies the software lifecycle processes that constitute the product
          realization component of the QMS for SaMD, including planning, requirements,
          architecture, implementation, integration, testing, and release.

  - source_control: qms-2
    target_controls:
      - id: art-11
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          EU MDR qms-2 (Technical Documentation and Design History File) and ANVISA
          art-11 (Controles de Design e Documentacao Tecnica) both require comprehensive
          technical documentation including design inputs/outputs, design reviews,
          verification and validation reports, and design history files. Both mandate
          documentation sufficient for regulatory assessment and ongoing maintenance.
      - id: art-19
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          EU MDR qms-2 requires technical documentation to allow conformity assessment.
          ANVISA art-19 (Registro e Notificacao junto a ANVISA) specifies the technical
          dossier (STED) content required for registration, including architecture
          documentation, clinical evidence, V&V results, risk management file, and
          usability file. The technical documentation feeds directly into the
          registration dossier.

  - source_control: qms-3
    target_controls:
      - id: art-22
        relationship: intersects-with
        confidence: 0.87
        rationale: >
          EU MDR qms-3 (Corrective and Preventive Actions - CAPA) and ANVISA art-22
          (Recall e Acao Corretiva de Campo para SaMD) both address corrective actions,
          root cause analysis, and preventive measures. EU MDR qms-3 covers CAPA as
          a QMS process; ANVISA art-22 covers CAPA specifically in the context of
          field safety corrective actions and recalls, requiring root cause analysis
          and preventive actions to avoid recurrence.
      - id: art-14
        relationship: complements
        confidence: 0.80
        rationale: >
          EU MDR qms-3 requires CAPA for non-conformities including complaints and
          deviations. ANVISA art-14 (Manutencao e Gestao de Mudancas de Software)
          complements by defining the maintenance process that includes problem
          resolution, impact analysis, proportional revalidation, and traceability
          from problem to corrective action — the software-specific CAPA workflow.

  # ──────────────────────────────────────────────────────────────────────
  # SWD — Software-Specific Requirements
  # ──────────────────────────────────────────────────────────────────────

  - source_control: swd-1
    target_controls:
      - id: art-10
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          EU MDR swd-1 (Software Lifecycle and Development Requirements) and ANVISA
          art-10 (Ciclo de Vida do Software - IEC 62304) are highly equivalent. Both
          mandate software development in accordance with IEC 62304, covering the
          complete software lifecycle: planning, requirements analysis, architecture
          design, implementation, integration testing, system testing, and release.
          Both require rigor proportional to software safety classification (Class
          A/B/C per IEC 62304).
      - id: art-11
        relationship: intersects-with
        confidence: 0.87
        rationale: >
          EU MDR swd-1 requires software development following state-of-the-art
          principles including verification and validation. ANVISA art-11 (Controles de
          Design e Documentacao Tecnica) details the design control framework that
          governs the development lifecycle: design input/output, design review,
          design verification/validation, and design transfer.
      - id: art-12
        relationship: implements
        confidence: 0.85
        rationale: >
          EU MDR swd-1 requires software manufactured in accordance with state of the
          art. ANVISA art-12 (Processo de Desenvolvimento e Boas Praticas) implements
          this by specifying concrete development practices: coding standards, peer
          code review, configuration management, dependency management, environment
          segregation, and documentation standards.

  - source_control: swd-2
    target_controls:
      - id: art-13
        relationship: equivalent-to
        confidence: 0.94
        rationale: >
          EU MDR swd-2 (Software Verification and Validation) and ANVISA art-13
          (Verificacao e Validacao de Software) are directly equivalent. Both require
          comprehensive V&V processes including unit testing, integration testing,
          system testing, and regression testing with coverage proportional to software
          safety class. Both distinguish verification (design outputs meet inputs) from
          validation (device meets user needs in simulated/actual use conditions) and
          require documented traceability from requirements to test results.
      - id: art-6
        relationship: complements
        confidence: 0.78
        rationale: >
          EU MDR swd-2 requires validation demonstrating the software meets user needs
          under actual or simulated use conditions. ANVISA art-6 (Validacao Clinica e
          Desempenho do SaMD) complements by adding clinical validation requirements:
          demonstration of clinical performance with the Brazilian target population,
          benefit-risk assessment, and algorithmic bias evaluation for AI/ML devices.

  - source_control: swd-3
    target_controls:
      - id: art-8
        relationship: equivalent-to
        confidence: 0.94
        rationale: >
          EU MDR swd-3 (Cybersecurity Requirements for Medical Device Software) and
          ANVISA art-8 (Seguranca Cibernetica by Design para SaMD) are highly equivalent.
          Both require security-by-design, threat modeling, defense in depth,
          vulnerability management, coordinated vulnerability disclosure, and secure
          update mechanisms throughout the device lifecycle. Both reference MDCG/IMDRF
          cybersecurity guidance and IEC 62443 as supporting standards.
      - id: art-15
        relationship: complements
        confidence: 0.76
        rationale: >
          EU MDR swd-3 requires consideration of cybersecurity risks in the context of
          the IT environment. ANVISA art-15 (Gestao de Riscos - ISO 14971) provides the
          overarching risk management framework within which cybersecurity risks must be
          identified, assessed, controlled, and monitored throughout the device lifecycle.

  - source_control: swd-4
    target_controls:
      - id: art-14
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          EU MDR swd-4 (Software Update and Change Management) and ANVISA art-14
          (Manutencao e Gestao de Mudancas de Software) are directly equivalent. Both
          require change management plans covering classification of changes
          (significant vs. non-significant for EU MDR; major/minor/correction for
          ANVISA), impact analysis, proportional revalidation, regression testing,
          version tracking, user notification, and rollback capability.
      - id: art-21
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          EU MDR swd-4 addresses when software changes require new conformity
          assessment. ANVISA art-21 (Gestao de Atualizacoes e Alteracoes de Registro)
          similarly classifies changes by regulatory impact: registration amendment
          (e.g., changed clinical algorithm), notification (e.g., usability-impacting
          change), or internal record (e.g., non-clinical bug fix). Both address the
          challenge of frequent software updates within a regulatory framework.
      - id: art-23
        relationship: complements
        confidence: 0.75
        rationale: >
          EU MDR swd-4 requires change management plans for software updates. ANVISA
          art-23 (Requisitos Especificos para SaMD com Inteligencia Artificial) adds
          predetermined change control plans (PCCP) specifically for AI/ML models,
          defining the envelope of acceptable model changes — a specialized extension
          of general software change management for adaptive algorithms.

  # ──────────────────────────────────────────────────────────────────────
  # UDI — Unique Device Identification
  # ──────────────────────────────────────────────────────────────────────

  - source_control: udi-1
    target_controls:
      - id: art-19
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          EU MDR udi-1 (Unique Device Identification System) requires UDI assignment
          with UDI-DI (device identifier) and UDI-PI (version identifier) for software.
          ANVISA art-19 (Registro e Notificacao junto a ANVISA) requires device
          registration including identification, version tracking, and traceability.
          While ANVISA does not implement the EU UDI system, the registration
          requirements serve a similar traceability function for the Brazilian market.
      - id: art-4
        relationship: complements
        confidence: 0.77
        rationale: >
          EU MDR udi-1 enables device traceability throughout the supply chain. ANVISA
          art-4 (Obrigacoes do Fabricante de SaMD) requires the manufacturer to ensure
          traceability of all SaMD versions released for clinical use in Brazil,
          complementing the same traceability objective through registration-based
          mechanisms rather than a UDI system.
      - id: art-2
        relationship: complements
        confidence: 0.72
        rationale: >
          EU MDR udi-1 defines UDI-PI as the software version identifier. ANVISA art-2
          (Definicoes Tecnicas e Terminologia) defines SaMD version as an identifiable
          software iteration with a unique version identifier. Both establish version
          identification as foundational to traceability and regulatory compliance.

  - source_control: udi-2
    target_controls:
      - id: art-19
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          EU MDR udi-2 (EUDAMED Registration and Traceability) requires registration in
          the European EUDAMED database with UDI data, device information, and
          certificate linkage. ANVISA art-19 (Registro e Notificacao junto a ANVISA)
          requires registration in the ANVISA system with manufacturer identification,
          device description, risk classification, technical dossier, and labelling.
          Both serve as centralized regulatory databases for device traceability,
          though using different systems and data models.
      - id: art-4
        relationship: complements
        confidence: 0.78
        rationale: >
          EU MDR udi-2 mandates economic operator traceability through EUDAMED. ANVISA
          art-4 (Obrigacoes do Fabricante de SaMD) requires the manufacturer to maintain
          traceability of all versions and documentation available for ANVISA inspection,
          complementing the same supply chain transparency goal through regulatory
          compliance obligations rather than a unified database.
      - id: art-1
        relationship: complements
        confidence: 0.70
        rationale: >
          EU MDR udi-2 applies to devices placed on the EU market and registered in
          EUDAMED. ANVISA art-1 (Escopo e Definicao de Software como Dispositivo Medico)
          defines the scope of SaMD subject to ANVISA registration, establishing which
          software products require the regulatory traceability addressed by art-19.

summary:
  total_source_controls: 18
  total_target_controls_referenced: 24
  total_mappings: 44
  relationship_distribution:
    equivalent-to: 14
    complements: 14
    intersects-with: 13
    implements: 3
    derived-from: 0
