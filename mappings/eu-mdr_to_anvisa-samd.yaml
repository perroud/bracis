  notes: >
    art-24 (Transparencia Algoritmica e Explicabilidade) has no direct equivalent in
    EU MDR because algorithmic transparency and explainability requirements are not
    explicitly addressed in EU MDR 2017/745. This requirement is specific to the
    ANVISA SaMD framework and aligns more closely with the EU AI Act than with EU MDR.
    All 18 EU MDR source controls are mapped to at least one ANVISA SaMD target control.
