id: bcb-in291_to_bcb-conj-2
title: "BCB IN-291 to BCB Resolucao Conjunta 2 Control Mapping"
source_framework: bcb-in291
target_framework: bcb-conj-2
version: "1.0.0"
last_updated: "2026-04-06"
methodology: structural
description: >
  Mapeamento artigo-a-artigo entre a Instrucao Normativa BCB 291 (procedimentos
  detalhados de notificacao de incidentes ciberneticos) e a Resolucao Conjunta
  BCB/CMN n. 2/2020 (obrigacao geral de notificacao e gerenciamento de risco
  cibernetico). A IN 291 e instrumento subordinado e implementador da Resolucao
  Conjunta 2: a Resolucao estabelece as obrigacoes; a IN detalha como cumpri-las.

mappings:
  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: implements
        confidence: 0.95
        rationale: >
          IN-291 art. 1 implementa o objeto da Resolucao Conjunta 2 art. 1.
          Ambos definem escopo e objeto da regulamentacao de notificacao de
          incidentes ciberneticos. A IN detalha os procedimentos operacionais
          para cumprir a obrigacao genérica da Resolucao.
      - id: art-2
        relationship: implements
        confidence: 0.90
        rationale: >
          IN-291 art. 1 ss 1 lista as entidades sujeitas (IFs e IPs), detalhando
          o ambito de aplicacao que a Resolucao Conjunta art. 2 estabelece de
          forma generica com o principio de proporcionalidade.

  - source_control: art-2
    target_controls:
      - id: art-3
        relationship: implements
        confidence: 0.90
        rationale: >
          IN-291 art. 2 cria taxonomia operacional de sete categorias de incidentes
          ciberneticos (acesso nao autorizado, codigo malicioso, disponibilidade,
          vazamento, integridade, fraude, outros). Isso operacionaliza os criterios
          de relevancia do art. 3 ss 1 da Resolucao Conjunta.
      - id: art-10
        relationship: complements
        confidence: 0.80
        rationale: >
          A taxonomia de categorias de incidentes da IN-291 art. 2 complementa
          os criterios de classificacao de severidade do art. 10 da Resolucao
          Conjunta, fornecendo tipologia detalhada por natureza do ataque.

  - source_control: art-3
    target_controls:
      - id: art-10
        relationship: implements
        confidence: 0.95
        rationale: >
          IN-291 art. 3 detalha cinco eixos de avaliacao de severidade (impacto
          CIA, volume de afetados, impacto financeiro, infraestrutura critica SFN,
          repercussao publica). Implementa diretamente os cinco criterios de
          classificacao de severidade do art. 10 da Resolucao Conjunta.
      - id: art-3
        relationship: complements
        confidence: 0.85
        rationale: >
          A classificacao de severidade da IN-291 art. 3 complementa a obrigacao
          de notificacao do art. 3 da Resolucao Conjunta, pois a severidade
          determina se o incidente atinge o limiar de relevancia para notificacao.

  - source_control: art-4
    target_controls:
      - id: art-3
        relationship: implements
        confidence: 0.95
        rationale: >
          IN-291 art. 4 operacionaliza o conceito de "incidentes relevantes" do
          art. 3 ss 1 da Resolucao Conjunta com sete limiares de materialidade
          concretos e verificaveis (sistemas de transacoes, 10.000 clientes,
          2 horas de interrupcao, perdas financeiras, criptografia, APT,
          repercussao publica).
      - id: art-10
        relationship: complements
        confidence: 0.80
        rationale: >
          Os limiares de materialidade da IN-291 art. 4 complementam os criterios
          de classificacao de severidade do art. 10, pois incidentes que atingem
          os limiares de materialidade correspondem a severidades mais altas.

  - source_control: art-5
    target_controls:
      - id: art-3
        relationship: implements
        confidence: 0.85
        rationale: >
          IN-291 art. 5 detalha a metodologia de avaliacao de impacto em cinco
          dimensoes (escopo, extensao geografica, natureza dos dados, cadeia de
          servicos, estimativa de danos). Implementa o processo de determinacao
          de impacto necessario para cumprir a notificacao do art. 3 da Resolucao.
      - id: art-4
        relationship: complements
        confidence: 0.85
        rationale: >
          A avaliacao de impacto da IN-291 art. 5 complementa o conteudo minimo
          da notificacao do art. 4 da Resolucao Conjunta, especialmente o inciso
          IV (estimativa de afetados) e inciso III (sistemas afetados).
      - id: art-9
        relationship: complements
        confidence: 0.75
        rationale: >
          A metodologia de avaliacao de impacto da IN-291 art. 5 complementa
          a estrutura de gerenciamento de risco cibernetico do art. 9 inciso II
          da Resolucao Conjunta (avaliacao de impacto nos sistemas, infraestruturas
          e dados).

  - source_control: art-6
    target_controls:
      - id: art-3
        relationship: implements
        confidence: 0.95
        rationale: >
          IN-291 art. 6 implementa o prazo de 24 horas do art. 3 ss 2 da Resolucao
          Conjunta, detalhando que o prazo conta a partir da deteccao (nao da
          confirmacao), que informacoes incompletas nao eximem a obrigacao, e que
          a deteccao por qualquer colaborador ou sistema inicia o prazo.
      - id: art-6
        relationship: implements
        confidence: 0.80
        rationale: >
          O detalhamento do prazo e procedimento de notificacao da IN-291 art. 6
          implementa os aspectos operacionais do canal de comunicacao com o BCB
          tratados no art. 6 da Resolucao Conjunta.

  - source_control: art-7
    target_controls:
      - id: art-4
        relationship: implements
        confidence: 0.95
        rationale: >
          IN-291 art. 7 expande os sete incisos de conteudo minimo do art. 4 da
          Resolucao Conjunta para nove incisos mais detalhados: adiciona
          identificacao da instituicao com CNPJ, indicacao de fuso horario,
          referencia explicita as categorias do art. 2, e indicacao de outras
          autoridades notificadas.
      - id: art-3
        relationship: complements
        confidence: 0.75
        rationale: >
          O conteudo obrigatorio da notificacao inicial (IN-291 art. 7) complementa
          a obrigacao generica de notificacao de incidentes relevantes do art. 3
          da Resolucao Conjunta.

  - source_control: art-8
    target_controls:
      - id: art-6
        relationship: implements
        confidence: 0.95
        rationale: >
          IN-291 art. 8 detalha o canal oficial de comunicacao com o BCB,
          implementando o art. 6 da Resolucao Conjunta que estabelece que a
          notificacao deve ser encaminhada por meio de canais definidos pelo
          regulador. A IN acrescenta obrigacoes de verificacao periodica,
          canal de contingencia e proibicao de uso de canais pessoais.

  - source_control: art-9
    target_controls:
      - id: art-3
        relationship: implements
        confidence: 0.85
        rationale: >
          IN-291 art. 9 detalha a governanca do processo de notificacao ao BCB
          (designacao formal de responsavel, cobertura 24/7, poderes de decisao),
          implementando os aspectos organizacionais necessarios para cumprir a
          obrigacao de notificacao do art. 3 da Resolucao Conjunta.
      - id: art-9
        relationship: complements
        confidence: 0.85
        rationale: >
          A designacao de responsavel pela notificacao (IN-291 art. 9) complementa
          a estrutura de gerenciamento de risco cibernetico do art. 9 da Resolucao
          Conjunta, especialmente inciso V (designacao de equipe responsavel).
      - id: art-6
        relationship: complements
        confidence: 0.75
        rationale: >
          A governanca do processo de notificacao da IN-291 art. 9 complementa
          o art. 6 da Resolucao Conjunta sobre canal e formato da notificacao,
          definindo quem tem autoridade para enviar.

  - source_control: art-10
    target_controls:
      - id: art-5
        relationship: implements
        confidence: 0.95
        rationale: >
          IN-291 art. 10 implementa o art. 5 da Resolucao Conjunta sobre
          atualizacao e complementacao da notificacao. Detalha a obrigacao
          de atualizacoes periodicas a cada 24 horas, atualizacoes imediatas
          para mudancas de severidade, e formato delta para cada atualizacao.
      - id: art-4
        relationship: complements
        confidence: 0.80
        rationale: >
          As atualizacoes periodicas da IN-291 art. 10 complementam o conteudo
          minimo da notificacao do art. 4 da Resolucao Conjunta, pois cada
          atualizacao deve conter informacoes conforme os incisos do art. 4.

  - source_control: art-11
    target_controls:
      - id: art-5
        relationship: implements
        confidence: 0.95
        rationale: >
          IN-291 art. 11 detalha o relatorio final de incidente com oito
          incisos obrigatorios (cronologia, afetados, causa raiz, acoes,
          impacto financeiro, medidas corretivas, licoes aprendidas, status
          de notificacoes). Implementa o art. 5 incisos III (conclusao e
          causa raiz) e IV (prevencao de recorrencia) da Resolucao Conjunta.
      - id: art-4
        relationship: complements
        confidence: 0.80
        rationale: >
          O relatorio final da IN-291 art. 11 complementa o conteudo minimo
          do art. 4 da Resolucao Conjunta, fornecendo versao consolidada e
          definitiva de todos os dados da notificacao.
      - id: art-12
        relationship: complements
        confidence: 0.75
        rationale: >
          O relatorio final da IN-291 art. 11 complementa a obrigacao de
          registro do art. 12 da Resolucao Conjunta, pois o relatorio e
          parte da documentacao que deve ser retida por 5 anos.

  - source_control: art-12
    target_controls:
      - id: art-5
        relationship: implements
        confidence: 0.90
        rationale: >
          IN-291 art. 12 detalha a analise de causa raiz e plano de acao
          corretiva, implementando o art. 5 incisos III (causa raiz) e IV
          (prevencao de recorrencia) da Resolucao Conjunta com granularidade
          muito maior: causas tecnicas/processo/humanas, IOCs/TTPs, plano
          SMART com prazos, e follow-up em 12 meses.
      - id: art-9
        relationship: complements
        confidence: 0.80
        rationale: >
          A analise de causa raiz e acoes corretivas da IN-291 art. 12
          complementa a estrutura de gerenciamento de risco cibernetico do
          art. 9 da Resolucao Conjunta, pois o ciclo de melhoria continua
          aprimora a capacidade de prevencao, deteccao e resposta.
      - id: art-4
        relationship: complements
        confidence: 0.70
        rationale: >
          A analise de causa raiz da IN-291 art. 12 complementa o conteudo
          da notificacao do art. 4 inciso V (medidas adotadas e em curso)
          da Resolucao Conjunta.

  - source_control: art-13
    target_controls:
      - id: art-12
        relationship: implements
        confidence: 0.95
        rationale: >
          IN-291 art. 13 detalha as obrigacoes de retencao de documentacao
          de incidentes, implementando o art. 12 da Resolucao Conjunta com
          requisitos mais especificos: copias de notificacoes, logs dos 30
          dias anteriores, evidencias forenses com cadeia de custodia,
          comunicacoes internas, e decisoes de nao-notificacao. O prazo
          de 5 anos e o mesmo em ambos.
      - id: art-6
        relationship: complements
        confidence: 0.75
        rationale: >
          A retencao de documentacao da IN-291 art. 13 complementa o art. 6
          ss 2 da Resolucao Conjunta sobre cumulatividade com outros orgaos,
          pois exige retencao de evidencia de notificacao a todas as autoridades.

  - source_control: art-14
    target_controls:
      - id: art-12
        relationship: complements
        confidence: 0.85
        rationale: >
          IN-291 art. 14 sobre acesso irrestrito do BCB a documentacao e
          cooperacao com a supervisao complementa o art. 12 da Resolucao
          Conjunta sobre registro e retencao, pois os registros devem
          estar disponiveis para o BCB em prazo de 5 dias uteis.
      - id: art-6
        relationship: implements
        confidence: 0.85
        rationale: >
          IN-291 art. 14 implementa o art. 6 ss 1 da Resolucao Conjunta
          (BCB pode solicitar informacoes complementares), detalhando
          acesso a sistemas, formatos de entrega, participacao em war room,
          cooperacao com investigacoes e transparencia total.
      - id: art-13
        relationship: complements
        confidence: 0.80
        rationale: >
          A cooperacao com a supervisao da IN-291 art. 14 complementa o
          regime de sancoes do art. 13 da Resolucao Conjunta, pois respostas
          incompletas ou intempestivas sao infracoes autonomas que geram
          sancoes independentes.
