id: lgpd_to_bacen-4893
title: "LGPD to Bacen 4893 Control Mapping"
source_framework: lgpd
target_framework: bacen-4893
version: "1.0.0"
last_updated: "2026-04-03"
methodology: semantic

mappings:
  - source_control: art-46
    target_controls:
      - id: art-3
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          O Art. 46 da LGPD exige a adoção de medidas de segurança técnicas e
          administrativas aptas a proteger dados pessoais. O Art. 3 da Resolução
          4.893 do Bacen determina que as instituições financeiras devem implementar
          e manter uma política de segurança cibernética compatível com seu porte,
          perfil de risco e modelo de negócio. Ambos convergem na obrigação de
          proteger dados por meio de controles de segurança, sendo que a Resolução
          4.893 é setorialmente mais específica para o sistema financeiro.

  - source_control: art-46
    target_controls:
      - id: art-4
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          O Art. 46 da LGPD obriga medidas de segurança para proteção de dados em
          todo o ciclo de tratamento. O Art. 4 da Resolução 4.893 detalha o
          conteúdo mínimo da política de segurança cibernética, incluindo objetivos,
          procedimentos e controles para reduzir vulnerabilidades, classificação de
          dados quanto à relevância, e mecanismos de proteção contra ameaças
          cibernéticas. A Resolução 4.893 materializa em requisitos específicos do
          setor financeiro aquilo que a LGPD prescreve de forma mais geral.

  - source_control: art-48
    target_controls:
      - id: art-9
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          O Art. 48 da LGPD obriga o controlador a comunicar incidentes de
          segurança que possam acarretar risco ou dano relevante aos titulares. O
          Art. 9 da Resolução 4.893 exige a elaboração de um plano de ação e de
          resposta a incidentes, abrangendo os procedimentos a serem seguidos na
          ocorrência de situações que configurem incidentes relevantes. Ambos
          tratam de gestão de incidentes de segurança, sendo o Art. 9 mais
          prescritivo na exigência de um plano formalizado previamente à ocorrência.

  - source_control: art-48
    target_controls:
      - id: art-10
        relationship: equivalent-to
        confidence: 0.80
        rationale: >
          O Art. 48 da LGPD determina a comunicação de incidentes à autoridade
          nacional (ANPD) em prazo razoável. O Art. 10 da Resolução 4.893 obriga
          as instituições a comunicar ao Banco Central do Brasil a ocorrência de
          incidentes relevantes, bem como as medidas adotadas para o tratamento do
          incidente. Ambos estabelecem obrigações de notificação a autoridades
          reguladoras, diferindo na autoridade destinatária (ANPD vs. BCB) e nos
          critérios de materialidade do incidente.

  - source_control: art-50
    target_controls:
      - id: art-17
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          O Art. 50 da LGPD incentiva controladores e operadores a formularem
          regras de boas práticas e de governança, incluindo normas de segurança,
          padrões técnicos, mecanismos de supervisão e ações educativas. O Art. 17
          da Resolução 4.893 atribui à diretoria da instituição financeira a
          responsabilidade pela política de segurança cibernética e pela execução
          do plano de ação e resposta a incidentes. Ambos tratam de governança
          corporativa aplicada à proteção de dados, com a Resolução 4.893 sendo
          mais específica ao designar responsabilidades diretamente à alta
          administração da instituição.

  - source_control: art-37
    target_controls:
      - id: art-19
        relationship: equivalent-to
        confidence: 0.80
        rationale: >
          O Art. 37 da LGPD exige a indicação de um encarregado (DPO) pelo
          tratamento de dados pessoais, com identidade e informações de contato
          divulgadas publicamente. O Art. 19 da Resolução 4.893 determina a
          designação de diretor responsável pela política de segurança cibernética,
          podendo exercer outras funções desde que não haja conflito de interesses.
          Ambos impõem a designação formal de uma pessoa responsável pela
          conformidade, embora com escopos diferentes — proteção de dados na LGPD
          e segurança cibernética na Resolução 4.893.

  - source_control: art-33
    target_controls:
      - id: art-12
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          O Art. 33 da LGPD condiciona a transferência internacional de dados
          pessoais a mecanismos como decisão de adequação e cláusulas contratuais
          específicas. O Art. 12 da Resolução 4.893 regulamenta a contratação de
          serviços de processamento e armazenamento de dados em nuvem, exigindo
          que a instituição assegure capacidade de auditoria, acesso aos dados e
          gestão do prestador. A correlação se dá quando a contratação de nuvem
          implica transferência de dados para provedores em jurisdições
          estrangeiras, devendo atender simultaneamente aos requisitos de ambas as
          normas.

  - source_control: art-33
    target_controls:
      - id: art-14
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          O Art. 33 da LGPD regula as condições para transferência internacional
          de dados pessoais. O Art. 14 da Resolução 4.893 exige que a contratação
          de serviços de processamento e armazenamento de dados no exterior deve
          observar legislação e regulamentação vigentes, inclusive quanto à
          transferência internacional de dados. Há convergência direta, pois o Art.
          14 remete explicitamente ao regime de transferência internacional, criando
          obrigação cumulativa para instituições financeiras que processam dados de
          clientes em servidores localizados fora do território nacional.

  - source_control: art-6
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          O Art. 6 da LGPD estabelece princípios como finalidade, adequação,
          necessidade, segurança e prevenção que orientam todo o tratamento de
          dados pessoais. O Art. 5 da Resolução 4.893 determina que a política de
          segurança cibernética deve contemplar cenários de incidentes considerados
          nos testes de continuidade de negócios. A correlação é parcial — os
          princípios de segurança e prevenção da LGPD se materializam na exigência
          de cenários de incidentes da Resolução 4.893, mas o escopo principiológico
          da LGPD é muito mais amplo.

  - source_control: art-47
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          O Art. 47 da LGPD (lido em conjunto com o Art. 46 §2) estabelece a
          obrigação de que medidas de segurança sejam observadas desde a fase de
          concepção do produto ou serviço até a sua execução (privacy by design). O
          Art. 6 da Resolução 4.893 exige a implementação de controles de segurança
          cibernética, incluindo mecanismos de disseminação da cultura de segurança
          e capacitação do pessoal. Ambos refletem a necessidade de incorporar
          segurança de forma proativa e contínua, mas a Resolução 4.893 foca em
          treinamento e conscientização como mecanismo de implementação.

  - source_control: art-38
    target_controls:
      - id: art-11
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          O Art. 38 da LGPD prevê a elaboração do Relatório de Impacto à Proteção
          de Dados Pessoais (RIPD), que deve conter a descrição dos processos de
          tratamento, medidas de mitigação de riscos e análise de proporcionalidade.
          O Art. 11 da Resolução 4.893 exige a elaboração de relatório anual sobre
          a implementação do plano de ação e de resposta a incidentes, com
          resultados obtidos. Embora sejam relatórios com objetivos distintos — o
          RIPD avalia impactos à privacidade e o relatório anual avalia eficácia de
          segurança cibernética — ambos servem como instrumentos de accountability
          e prestação de contas.

  - source_control: art-52
    target_controls:
      - id: art-20
        relationship: intersects-with
        confidence: 0.50
        rationale: >
          O Art. 52 da LGPD estabelece sanções administrativas aplicáveis pela ANPD,
          incluindo multa, publicização da infração, bloqueio e eliminação de dados.
          O Art. 20 da Resolução 4.893 trata do compartilhamento de informações
          sobre incidentes relevantes entre instituições autorizadas pelo BCB, com
          objetivo de aprimorar a segurança cibernética do sistema financeiro. A
          correlação é fraca — enquanto a LGPD aborda punição por não conformidade,
          a Resolução 4.893 promove cooperação para prevenção, mas ambos visam
          incentivar o cumprimento das normas de proteção.
