metadata:
  total_mappings: 20
  average_confidence: 0.90
  relationship_summary:
    implements: 20
  notes: >
    A Circular SUSEP 638/2021 e o detalhamento operacional da Resolucao CNSP 381/2020.
    A CNSP 381 estabelece as diretrizes gerais (o que fazer) e a SUSEP 638 define os
    requisitos tecnicos e procedimentos (como fazer). A relacao e predominantemente
    de implementacao (implements), pois a SUSEP 638 operacionaliza cada diretriz
    da CNSP 381 com requisitos especificos e mensuráveis.
