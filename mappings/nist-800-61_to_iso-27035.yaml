id: nist-800-61_to_iso-27035
title: "NIST SP 800-61 Rev 3 to ISO/IEC 27035:2023 Control Mapping"
source_framework: nist-800-61
target_framework: iso-27035
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic

mappings:
  # prep — Preparation
  - source_control: prep-1
    target_controls:
      - id: pp.1
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          NIST prep-1 (Incident Response Policy and Plan) and ISO 27035 pp.1 (Incident
          management policy) are functionally equivalent. Both require establishing an
          organizational incident response/management policy approved by senior/top
          management, defining the approach, objectives, and principles for incident
          handling, and communicating the policy to relevant personnel. The NIST control
          additionally embeds the incident response plan within the same control, while
          ISO 27035 separates the plan into pp.2.
      - id: pp.2
        relationship: superset-of
        confidence: 0.88
        rationale: >
          NIST prep-1 encompasses incident response plan requirements (roadmap, mission,
          strategies, goals, metrics, organizational approach) that ISO 27035 addresses
          separately in pp.2 (Incident management plan). The plan components — lifecycle
          processes, escalation paths, communication protocols, and resource allocation —
          are semantically aligned, though ISO 27035 structures the plan as a distinct
          control.

  - source_control: prep-2
    target_controls:
      - id: pp.3
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          NIST prep-2 (Incident Response Team Structure) and ISO 27035 pp.3 (Incident
          response team establishment) both require establishing an incident response
          team with clearly defined roles, responsibilities, and authority. Both address
          team composition, competence requirements, organizational authority for
          containment actions, and the need for the team structure to reflect the types
          of incidents the organization faces. NIST discusses centralized, distributed,
          and coordinated models; ISO 27035 references CSIRT/CERT/virtual team models.
      - id: pp.2
        relationship: complements
        confidence: 0.72
        rationale: >
          NIST prep-2 references staffing levels, coverage requirements, and external
          resource relationships (MSSPs, law enforcement, ISACs) that contribute to the
          broader incident management plan addressed by ISO 27035 pp.2, which describes
          resources needed to manage incidents throughout their lifecycle.

  - source_control: prep-3
    target_controls:
      - id: pp.5
        relationship: equivalent-to
        confidence: 0.94
        rationale: >
          NIST prep-3 (Incident Response Training and Exercises) and ISO 27035 pp.5
          (Awareness and training) are semantically equivalent. Both require training
          incident response personnel on policies, procedures, and technical skills;
          conducting tabletop exercises, simulations, and drills; regular training
          updates to address emerging threats; and maintaining team readiness through
          exercises. Both emphasize that training should cover technical, process, and
          communication competencies.

  - source_control: prep-4
    target_controls:
      - id: pp.2
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          NIST prep-4 (Incident Response Tools and Resources) addresses tool acquisition,
          deployment, and maintenance for detection, analysis, forensics, containment, and
          communication. ISO 27035 pp.2 (Incident management plan) encompasses resource
          requirements including tools as part of the overall incident management plan. The
          tool-specific granularity of NIST prep-4 is subsumed within the broader resource
          planning scope of pp.2.
      - id: dr.1
        relationship: complements
        confidence: 0.75
        rationale: >
          NIST prep-4 specifies detection and monitoring tools (SIEM, EDR, NDR, forensic
          workstations) that directly support the detection mechanisms required by ISO
          27035 dr.1 (Event detection). The tools and resources described in prep-4 are
          the enablers of the detection capability that dr.1 mandates.
      - id: ad.3
        relationship: complements
        confidence: 0.73
        rationale: >
          NIST prep-4 requires maintaining forensic workstations, evidence preservation
          tools, and forensically sound tools that meet evidentiary standards. ISO 27035
          ad.3 (Evidence preservation and forensic readiness) requires maintaining forensic
          readiness with tools, processes, and trained personnel. Both address the
          proactive provisioning of forensic capabilities.

  - source_control: prep-5
    target_controls:
      - id: pp.2
        relationship: complements
        confidence: 0.75
        rationale: >
          NIST prep-5 (Incident Prevention and Risk Mitigation) addresses preventive
          measures that reduce incident frequency and impact, including risk assessments,
          vulnerability management, and security controls. ISO 27035 pp.2 (Incident
          management plan) covers the broader incident management lifecycle but includes
          preventive considerations as part of planning. The prevention-specific focus of
          NIST prep-5 extends beyond the core incident management scope of ISO 27035.
      - id: pp.4
        relationship: complements
        confidence: 0.70
        rationale: >
          NIST prep-5 references risk assessments to identify and prioritize threats,
          which informs the incident classification scheme defined in ISO 27035 pp.4.
          Understanding threat likelihood and impact from risk assessments supports
          the design of classification categories and severity levels.

  # det — Detection and Analysis
  - source_control: det-1
    target_controls:
      - id: dr.1
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          NIST det-1 (Attack Vectors and Indicators of Compromise) and ISO 27035 dr.1
          (Event detection) both require implementing mechanisms to detect security events
          by identifying attack vectors, known patterns, and anomalous behavior. NIST
          det-1 focuses specifically on cataloging attack vectors and IOCs, while dr.1
          takes a broader detection capability view, but the core detection intent is
          aligned.
      - id: dr.4
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          NIST det-1 requires maintaining current threat intelligence with relevant attack
          vectors and associated indicators, and ensuring detection capabilities are
          aligned with probable threats. ISO 27035 dr.4 (Threat intelligence integration)
          specifically addresses collecting, processing, and operationalizing threat
          intelligence including IOCs. Both controls address the integration of threat
          intelligence into detection systems.

  - source_control: det-2
    target_controls:
      - id: dr.1
        relationship: intersects-with
        confidence: 0.87
        rationale: >
          NIST det-2 (Signs of an Incident) defines precursors and indicators as the two
          categories of incident signs that must be collected, correlated, and analyzed.
          ISO 27035 dr.1 (Event detection) requires detection mechanisms covering network,
          system, application, and user activity monitoring to identify known patterns and
          anomalous behavior. Both controls address the identification of security events
          through technical monitoring.
      - id: dr.2
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          NIST det-2 identifies log sources that provide precursors and indicators (IDS/IPS
          alerts, SIEM correlations, antivirus alerts, file integrity monitoring, network
          flow data, system logs). ISO 27035 dr.2 (Event collection and logging) requires
          comprehensive log collection from all relevant sources including network devices,
          operating systems, applications, databases, and cloud services. Both controls
          address the data collection necessary for incident detection.

  - source_control: det-3
    target_controls:
      - id: ad.1
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          NIST det-3 (Incident Analysis) and ISO 27035 ad.1 (Event assessment and triage)
          both require analyzing detected events to determine whether incidents have
          occurred, assessing scope and impact, and supporting response decisions. NIST
          det-3 focuses on analysis techniques (forensics, log review, malware analysis,
          threat intelligence consultation); ISO 27035 ad.1 focuses on the triage decision
          process (true positive vs. false positive, escalate vs. close). The core
          analytical intent is equivalent.
      - id: ad.3
        relationship: complements
        confidence: 0.78
        rationale: >
          NIST det-3 references forensic analysis (network forensics, host forensics,
          malware analysis) and emphasizes documentation of findings for potential legal
          proceedings. ISO 27035 ad.3 (Evidence preservation and forensic readiness)
          specifically addresses evidence identification, collection, acquisition, and
          preservation procedures. The forensic analysis capability in det-3 directly
          depends on the forensic readiness established by ad.3.

  - source_control: det-4
    target_controls:
      - id: dr.3
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          NIST det-4 (Incident Documentation and Tracking) requires documenting all aspects
          of detection and analysis, maintaining an incident tracking system, and assigning
          unique identifiers. ISO 27035 dr.3 (Event reporting) establishes reporting
          procedures and designated reporting channels. Both controls address the systematic
          recording and tracking of security events, though NIST det-4 emphasizes the full
          documentation lifecycle while dr.3 focuses on the initial reporting mechanism.
      - id: ad.1
        relationship: complements
        confidence: 0.75
        rationale: >
          NIST det-4 requires documentation that supports post-incident review, legal
          proceedings, and regulatory reporting. The assessment and triage process in ISO
          27035 ad.1 relies on documented event data, and the triage decisions themselves
          must be documented. Both controls contribute to the incident documentation chain.

  - source_control: det-5
    target_controls:
      - id: pp.4
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          NIST det-5 (Incident Prioritization and Classification) and ISO 27035 pp.4
          (Incident classification scheme) are semantically equivalent. Both require
          establishing classification categories (unauthorized access, denial of service,
          malware, etc.), severity levels based on impact and urgency, and consistent
          prioritization criteria. Both address functional impact, information impact, and
          recoverability as prioritization factors, and both require defined response time
          objectives per severity level.
      - id: ad.2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          NIST det-5 addresses runtime prioritization decisions and resource allocation
          based on incident severity. ISO 27035 ad.2 (Incident prioritization and
          escalation) covers the operational application of prioritization criteria to
          confirmed incidents, including functional and hierarchical escalation. Both
          controls address the prioritization of active incidents for response.

  # cont — Containment, Eradication, and Recovery
  - source_control: cont-1
    target_controls:
      - id: resp.1
        relationship: equivalent-to
        confidence: 0.94
        rationale: >
          NIST cont-1 (Containment Strategy Selection) and ISO 27035 resp.1 (Incident
          containment) are functionally equivalent. Both require predefined containment
          strategies for common incident types, balancing evidence preservation with
          business disruption, pre-approved containment actions executable without
          management delay, short-term and long-term containment phases, and documentation
          of all containment actions with timestamps.

  - source_control: cont-2
    target_controls:
      - id: ad.3
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          NIST cont-2 (Evidence Collection and Handling) and ISO 27035 ad.3 (Evidence
          preservation and forensic readiness) are semantically equivalent. Both require
          forensic evidence collection procedures following recognized standards, chain of
          custody maintenance, forensically sound collection methods, secure evidence
          storage, and evidence retention compliant with legal and regulatory requirements.
          NIST cont-2 additionally details the order of volatility for collection
          prioritization.

  - source_control: cont-3
    target_controls:
      - id: resp.2
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          NIST cont-3 (Eradication and Recovery) and ISO 27035 resp.2 (Incident
          eradication and recovery) are equivalent. Both require removing the root cause
          (malware removal, vulnerability remediation, credential resets), restoring
          systems from clean states, validating restored systems before returning to
          production, monitoring for recurrence, and phased recovery prioritizing critical
          services.

  - source_control: cont-4
    target_controls:
      - id: resp.3
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          NIST cont-4 (Incident Notification and Escalation) and ISO 27035 resp.3
          (Incident communication and notification) are equivalent. Both require
          pre-defined notification procedures specifying who, when, what, and through
          which channels; internal communications to management and affected business
          units; external notifications for regulatory compliance; pre-approved
          communication templates; and secure communication channels for incident response.
      - id: ad.2
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          NIST cont-4 defines escalation procedures for routing incidents to higher
          management or specialized teams. ISO 27035 ad.2 (Incident prioritization and
          escalation) explicitly addresses both functional and hierarchical escalation
          with defined triggers and timeframes. Both controls address the escalation
          dimension of incident notification.

  # post — Post-Incident Activity
  - source_control: post-1
    target_controls:
      - id: ll.1
        relationship: equivalent-to
        confidence: 0.96
        rationale: >
          NIST post-1 (Lessons Learned and Post-Incident Review) and ISO 27035 ll.1
          (Post-incident review) are the most directly equivalent controls in this mapping.
          Both require structured post-incident reviews involving all participants,
          examining timeline, root cause, detection and response effectiveness, and
          producing actionable recommendations. Both emphasize blameless culture, timely
          review after incident closure, and tracking action items to completion.
      - id: ll.3
        relationship: complements
        confidence: 0.78
        rationale: >
          NIST post-1 states that post-incident reviews should result in updates to
          incident response policies, procedures, and tools. ISO 27035 ll.3 (Continuous
          improvement) specifically addresses using review outcomes to improve the incident
          management process, update documentation, and verify effectiveness of
          improvements. Post-incident review findings are the primary input to the
          continuous improvement process.

  - source_control: post-2
    target_controls:
      - id: ll.2
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          NIST post-2 (Incident Metrics and Reporting) and ISO 27035 ll.2 (Incident trend
          analysis and metrics) are semantically equivalent. Both require collecting and
          analyzing incident metrics including MTTD, MTTR, incident categories, attack
          vectors, and recurrence rates. Both require producing management reports that
          demonstrate program effectiveness, support resource justification, and enable
          data-driven decision making. Both emphasize trend analysis and benchmarking.

  - source_control: post-3
    target_controls:
      - id: dr.2
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          NIST post-3 (Evidence Retention and Incident Data Management) requires retention
          policies for incident-related data including evidence, logs, analysis results,
          and communications. ISO 27035 dr.2 (Event collection and logging) requires log
          retention for periods sufficient to support incident investigation and compliance.
          Both address data retention for incident-related records, though from different
          lifecycle stages.
      - id: ad.3
        relationship: complements
        confidence: 0.77
        rationale: >
          NIST post-3 addresses evidence retention policies, legal hold procedures, and
          secure evidence storage with integrity verification. ISO 27035 ad.3 (Evidence
          preservation and forensic readiness) covers evidence preservation and chain of
          custody. Both controls address the long-term management of forensic evidence,
          with post-3 focusing on retention policy and ad.3 on collection and preservation
          procedures.

  # coord — Coordination and Information Sharing
  - source_control: coord-1
    target_controls:
      - id: resp.3
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          NIST coord-1 (Coordination with External Parties) requires establishing
          relationships and communication protocols with law enforcement, ISPs, vendors,
          CISA, and other external organizations. ISO 27035 resp.3 (Incident communication
          and notification) addresses external communications including regulatory
          notification, law enforcement engagement, and coordination with external
          incident response organizations. Both controls address external stakeholder
          coordination during incidents.
      - id: dr.4
        relationship: complements
        confidence: 0.73
        rationale: >
          NIST coord-1 references sharing indicators of compromise and requesting
          technical assistance from external parties, which overlaps with the threat
          intelligence sharing communities addressed in ISO 27035 dr.4 (Threat
          intelligence integration). The external coordination mechanisms established by
          coord-1 serve as channels for the intelligence sharing described in dr.4.

  - source_control: coord-2
    target_controls:
      - id: dr.4
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          NIST coord-2 (Threat Intelligence Sharing) and ISO 27035 dr.4 (Threat
          intelligence integration) are semantically equivalent. Both require participating
          in threat intelligence sharing using standardized formats (STIX/TAXII), obtaining
          intelligence from multiple sources (commercial, open-source, industry sharing
          groups, government advisories), operationalizing intelligence by integrating IOCs
          into detection systems, and implementing both automated and manual sharing
          mechanisms. Both emphasize information sharing communities and bilateral
          intelligence exchange.

  - source_control: coord-3
    target_controls:
      - id: resp.3
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          NIST coord-3 (Regulatory and Legal Reporting) requires procedures for complying
          with incident reporting requirements from laws, regulations, and contractual
          obligations. ISO 27035 resp.3 (Incident communication and notification) addresses
          regulatory notification requirements and compliance with breach notification
          timeframes. Both controls mandate pre-identified reporting requirements,
          pre-approved templates, legal counsel coordination, and deadline tracking for
          regulatory compliance.
      - id: ll.2
        relationship: complements
        confidence: 0.71
        rationale: >
          NIST coord-3 references sector-specific reporting mandates and government-wide
          requirements that generate incident data. ISO 27035 ll.2 (Incident trend analysis
          and metrics) requires reporting metrics to management, which may include
          regulatory reporting compliance rates. The reporting procedures of coord-3
          generate data that feeds the metrics and reporting framework of ll.2.
