id: rbac-107_to_rbac-108
title: "RBAC 107 to RBAC 108 Control Mapping"
source_framework: rbac-107
target_framework: rbac-108
version: "1.0.0"
last_updated: "2026-04-04"
methodology: structural
description: >
  Mapeamento entre RBAC 107 (AVSEC cibernetica para operadores de aerodromo) e
  RBAC 108 (AVSEC cibernetica para operadores aereos). Ambos sao regulamentos
  espelho da ANAC, diferindo apenas no publico-alvo regulado.

mappings:
  - source_control: sec1-01
    target_controls:
      - id: sec1-01
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Os requisitos de governanca e politica de seguranca cibernetica para
          operadores de aerodromo (RBAC 107 sec1-01) sao estruturalmente
          equivalentes aos mesmos requisitos para operadores aereos (RBAC 108
          sec1-01). Ambos exigem elaboracao, aprovacao e manutencao de politica
          formal de seguranca cibernetica, diferindo apenas no escopo
          organizacional do regulado.

  - source_control: sec1-02
    target_controls:
      - id: sec1-02
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          Os requisitos de identificacao e protecao de sistemas criticos de
          aerodromo (RBAC 107 sec1-02) sao equivalentes aos requisitos de
          protecao de sistemas criticos de operacoes aereas (RBAC 108 sec1-02).
          A estrutura de controle e identica; o perimetro de ativos difere
          conforme a natureza da operacao regulada.

  - source_control: sec2-01
    target_controls:
      - id: sec2-01
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          Os controles de acesso logico e autenticacao para sistemas de aerodromo
          (RBAC 107 sec2-01) sao estruturalmente equivalentes aos controles de
          acesso para sistemas de operacao aerea (RBAC 108 sec2-01). Ambos
          exigem autenticacao forte, gestao de contas e controle de acesso
          baseado em privilegio minimo.

  - source_control: sec2-02
    target_controls:
      - id: sec2-02
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          Os requisitos de monitoramento e deteccao de ameacas em aerodromos
          (RBAC 107 sec2-02) sao equivalentes aos mesmos requisitos para
          operadores aereos (RBAC 108 sec2-02). Ambos exigem monitoramento
          continuo, gestao de logs e capacidade de deteccao de anomalias em
          sistemas criticos de aviacao.

  - source_control: sec2-03
    target_controls:
      - id: sec2-03
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Os requisitos de gestao de vulnerabilidades e atualizacoes de seguranca
          para sistemas de aerodromo (RBAC 107 sec2-03) sao equivalentes aos
          mesmos requisitos para sistemas de operadores aereos (RBAC 108 sec2-03).
          Ambos seguem ciclos identicos de varredura, avaliacao e remediacao
          de vulnerabilidades em ativos de aviacao civil.

  - source_control: sec3-01
    target_controls:
      - id: sec3-01
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          Os requisitos de resposta a incidentes ciberneticos para aerodromos
          (RBAC 107 sec3-01) sao estruturalmente equivalentes aos requisitos
          para operadores aereos (RBAC 108 sec3-01). Ambos exigem plano formal
          de resposta, definicao de equipe e comunicacao obrigatoria a ANAC,
          diferindo apenas nos sistemas e ativos no escopo do incidente.

  - source_control: sec3-02
    target_controls:
      - id: sec3-02
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          Os requisitos de notificacao obrigatoria de incidentes ciberneticos a
          ANAC por operadores de aerodromo (RBAC 107 sec3-02) sao equivalentes
          aos requisitos de notificacao por operadores aereos (RBAC 108 sec3-02).
          Os prazos, canais e criterios de notificacao sao identicos entre os
          dois regulamentos.

  - source_control: sec3-03
    target_controls:
      - id: sec3-03
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          Os requisitos de continuidade operacional e recuperacao cibernetica para
          aerodromos (RBAC 107 sec3-03) sao equivalentes aos requisitos para
          operadores aereos (RBAC 108 sec3-03). Ambos exigem planos de
          continuidade, testes periodicos e objetivos de recuperacao (RTO/RPO)
          definidos para sistemas criticos de aviacao civil.
