id: dora_to_iso-27001
title: "DORA to ISO/IEC 27001:2022 Control Mapping"
source_framework: dora
target_framework: iso-27001-2022
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # Chapter 2 — ICT Risk Management

  - source_control: art-5
    target_controls:
      - id: a5-1
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Both require top-management-approved information security policies.
          DORA Art. 5 mandates the management body define, approve, and oversee
          the ICT risk management framework, which directly parallels ISO A.5.1
          requiring management-approved information security policies.
      - id: a5-2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          DORA Art. 5 requires clear assignment of ICT-related roles and
          responsibilities within the governance framework. ISO A.5.2 requires
          that information security roles and responsibilities be defined and
          allocated. Both address the same organizational accountability need.
      - id: a5-36
        relationship: complements
        confidence: 0.70
        rationale: >
          DORA Art. 5.3 requires the management body to approve and review ICT
          audit plans and findings. ISO A.5.36 requires regular compliance
          reviews against established policies. DORA's governance audit
          oversight complements ISO's compliance verification mechanism.

  - source_control: art-6
    target_controls:
      - id: a5-1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          DORA Art. 6 requires a comprehensive, documented ICT risk management
          framework with strategies, policies, and procedures. ISO A.5.1
          requires defined and approved information security policies. Both
          mandate a structured policy foundation for security management.
      - id: a8-8
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          DORA Art. 6.2 requires continuous identification of ICT risk sources,
          assessment of cyber threats and ICT vulnerabilities. ISO A.8.8
          requires obtaining vulnerability information, evaluating exposure,
          and taking appropriate measures. Both address vulnerability
          identification and assessment within the risk management lifecycle.
      - id: a5-36
        relationship: complements
        confidence: 0.75
        rationale: >
          DORA Art. 6.4 requires regular audits of the ICT risk management
          framework by qualified auditors, and Art. 6.5 requires formal
          follow-up of audit findings. ISO A.5.36 requires regular compliance
          reviews with corrective action tracking. Both ensure systematic
          assurance and remediation processes.
      - id: a8-9
        relationship: complements
        confidence: 0.65
        rationale: >
          DORA Art. 6.1 requires the framework to cover all ICT assets and
          infrastructure configurations. ISO A.8.9 requires documented,
          monitored, and reviewed configurations for hardware, software,
          services, and networks. Configuration management is a key enabler
          of the risk management framework.

  - source_control: art-7
    target_controls:
      - id: a8-9
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          DORA Art. 7 requires ICT systems to be updated, properly maintained,
          and technologically resilient. ISO A.8.9 requires configurations of
          hardware, software, services, and networks to be established,
          documented, implemented, monitored, and reviewed. Both address the
          need for current, well-managed ICT system configurations.
      - id: a8-8
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          DORA Art. 7 requires systems to be kept updated and technologically
          resilient, implying timely patching. ISO A.8.8 addresses management
          of technical vulnerabilities including patching. Vulnerability
          remediation is essential to maintaining updated systems.
      - id: a8-25
        relationship: complements
        confidence: 0.65
        rationale: >
          DORA Art. 7 requires protocols and tools to be appropriate and
          reliable for operations. ISO A.8.25 establishes rules for secure
          development of software and systems. Secure development lifecycle
          practices ensure that systems are built to be resilient and reliable
          from inception.

  - source_control: art-8
    target_controls:
      - id: a8-9
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          DORA Art. 8 requires identification, classification, and documentation
          of all ICT assets and their interdependencies. ISO A.8.9 requires
          established and documented configurations for all hardware, software,
          services, and networks. Both mandate comprehensive asset inventories
          as a foundation for security management.
      - id: a5-1
        relationship: complements
        confidence: 0.60
        rationale: >
          DORA Art. 8.1 requires continuous identification of all ICT risk
          sources and assessment of cyber threats relevant to business
          functions. ISO A.5.1 requires policies covering asset management
          and classification. Risk identification feeds into and is governed
          by the policy framework.
      - id: a8-8
        relationship: complements
        confidence: 0.70
        rationale: >
          DORA Art. 8.4 requires yearly ICT risk assessment on legacy systems
          and before/after technology connections. ISO A.8.8 requires obtaining
          vulnerability information and evaluating exposure. Legacy system
          assessment is a specialized form of vulnerability management.
      - id: a5-23
        relationship: complements
        confidence: 0.65
        rationale: >
          DORA Art. 8.3 requires identifying and documenting all processes
          dependent on ICT third-party service providers and their
          interconnections. ISO A.5.23 addresses information security for
          cloud services including acquisition, use, management, and exit.
          Third-party dependency mapping is critical for cloud service
          governance.

  - source_control: art-9
    target_controls:
      - id: a5-15
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          DORA Art. 9.3 requires policies limiting physical and logical access
          to information and ICT assets based on legitimate need, with sound
          access rights administration. ISO A.5.15 establishes rules to control
          physical and logical access based on business and security
          requirements. Both enforce access control as a core protection
          mechanism.
      - id: a8-1
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          DORA Art. 9.1 requires documenting an information security policy
          covering availability, authenticity, integrity, and confidentiality.
          ISO A.8.1 requires protection of information on user endpoint
          devices. Endpoint protection is a subset of the broader information
          security protection mandate.
      - id: a8-25
        relationship: complements
        confidence: 0.65
        rationale: >
          DORA Art. 9.4 requires strong authentication mechanisms and
          cryptographic key protection based on data classification. ISO A.8.25
          requires secure development rules including cryptography usage and
          access control implementation. Both address secure implementation
          of authentication and encryption controls.
      - id: a8-28
        relationship: complements
        confidence: 0.60
        rationale: >
          DORA Art. 9 requires deployment of appropriate ICT security tools,
          policies, and procedures including network isolation mechanisms.
          ISO A.8.28 requires secure coding principles that address input
          validation, secure error handling, and access control implementation.
          Secure coding is one of the protective measures that DORA demands.

  - source_control: art-10
    target_controls:
      - id: a8-15
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          DORA Art. 10 requires mechanisms to detect anomalous activities,
          logging, categorization, and analysis of ICT incidents. ISO A.8.15
          requires production, storage, protection, and analysis of logs
          recording activities, exceptions, and faults. Logging is the
          foundational capability that enables detection.
      - id: a8-8
        relationship: complements
        confidence: 0.65
        rationale: >
          DORA Art. 10 requires detection of ICT network performance issues
          and identification of single points of failure. ISO A.8.8 addresses
          obtaining information about technical vulnerabilities and evaluating
          exposure. Vulnerability information contributes to the detection
          of potential failure points.
      - id: a5-36
        relationship: complements
        confidence: 0.60
        rationale: >
          DORA Art. 10.1 requires regular testing of detection mechanisms.
          ISO A.5.36 requires regular review of compliance with security
          policies and standards, which includes validating that detection
          controls function as designed.

  - source_control: art-11
    target_controls:
      - id: a5-1
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          DORA Art. 11 requires a comprehensive ICT business continuity policy
          as part of overall business continuity. ISO A.5.1 requires defined
          and approved information security policies that should cover business
          continuity topics. Business continuity policy is a subset of the
          overall policy framework.
      - id: a8-25
        relationship: complements
        confidence: 0.60
        rationale: >
          DORA Art. 11.2 requires ICT response and recovery plans tested
          yearly and audited independently. ISO A.8.25 covers secure
          development lifecycle including system and security testing.
          Recovery procedures are part of the broader system development
          and testing lifecycle.
      - id: a8-9
        relationship: complements
        confidence: 0.65
        rationale: >
          DORA Art. 11.4 requires keeping records of activities before and
          during disruption events when continuity plans are activated.
          ISO A.8.9 requires that configurations be documented, monitored,
          and reviewed. Configuration documentation is essential for
          accurate disaster recovery and restoration.

  # Chapter 3 — ICT-Related Incident Management

  - source_control: art-17
    target_controls:
      - id: a8-15
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          DORA Art. 17 requires establishing procedures to log, categorize, and
          analyze ICT incidents based on priority, with early warning indicators
          and automatic alert mechanisms. ISO A.8.15 requires logs recording
          activities, exceptions, and faults to be produced, stored, protected,
          and analyzed. Logging is the detection engine for incident management.
      - id: a5-1
        relationship: complements
        confidence: 0.65
        rationale: >
          DORA Art. 17 requires a defined, established, and implemented
          incident management process with clear roles and allocated
          responsibilities. ISO A.5.1 requires topic-specific policies
          including information security incident management. The incident
          management process is governed by the organizational policy framework.
      - id: a5-2
        relationship: complements
        confidence: 0.60
        rationale: >
          DORA Art. 17.3 requires allocating roles and responsibilities for
          different ICT incident types and scenarios. ISO A.5.2 requires
          information security roles and responsibilities to be defined and
          allocated. Incident response role assignment is a specific
          application of the broader role definition requirement.

  - source_control: art-19
    target_controls:
      - id: a8-15
        relationship: complements
        confidence: 0.70
        rationale: >
          DORA Art. 19 requires reporting major ICT incidents to competent
          authorities with strict timelines (initial, intermediate, final).
          ISO A.8.15 requires log production and analysis. The logging
          capability feeds the data needed for regulatory incident reports.
      - id: a5-36
        relationship: complements
        confidence: 0.65
        rationale: >
          DORA Art. 19 mandates regulatory reporting obligations with defined
          templates and deadlines. ISO A.5.36 requires compliance with
          policies, rules, and standards. Regulatory incident reporting
          is a compliance obligation that must be monitored and verified.
      - id: a5-1
        relationship: complements
        confidence: 0.60
        rationale: >
          DORA Art. 19 requires defined procedures for producing and
          submitting incident notifications to competent authorities.
          ISO A.5.1 requires information security policies to be defined
          and approved. Incident reporting procedures should be codified
          within the organizational policy framework.

  # Chapter 4 — Digital Operational Resilience Testing

  - source_control: art-24
    target_controls:
      - id: a8-8
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          DORA Art. 24 requires a comprehensive digital operational resilience
          testing programme including vulnerability assessments, penetration
          testing, and remediation of findings. ISO A.8.8 requires obtaining
          information about technical vulnerabilities, evaluating exposure,
          and taking appropriate measures. Both mandate systematic
          vulnerability identification and remediation.
      - id: a5-36
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          DORA Art. 24 requires that tests be undertaken by independent parties
          and that findings be classified, prioritized, and remedied with
          validation. ISO A.5.36 requires regular compliance reviews with
          corrective actions. Both mandate independent assurance and
          systematic remediation tracking.
      - id: a8-25
        relationship: complements
        confidence: 0.70
        rationale: >
          DORA Art. 24 requires security testing covering source code reviews,
          compatibility testing, and end-to-end testing. ISO A.8.25 requires
          rules for secure development of software and systems including
          security checkpoints and testing. Security testing is integral
          to the secure development lifecycle.
      - id: a8-28
        relationship: complements
        confidence: 0.65
        rationale: >
          DORA Art. 24.5 requires yearly testing of all ICT systems supporting
          critical functions. ISO A.8.28 requires secure coding principles
          including code scanning and secure coding verification. Code-level
          security testing validates adherence to secure coding standards.

  - source_control: art-26
    target_controls:
      - id: a8-8
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          DORA Art. 26 requires advanced threat-led penetration testing (TLPT)
          on live production systems every 3 years. ISO A.8.8 addresses
          management of technical vulnerabilities including identification
          through testing. TLPT is the most advanced form of vulnerability
          assessment.
      - id: a5-36
        relationship: complements
        confidence: 0.70
        rationale: >
          DORA Art. 26 requires TLPT to be performed by qualified external
          testers following TIBER-EU framework, with scope validated by
          competent authorities. ISO A.5.36 requires regular compliance
          reviews preferably with automated tools and technical specialist
          interpretation. Both require independent, structured security
          assurance.
      - id: a8-25
        relationship: complements
        confidence: 0.60
        rationale: >
          DORA Art. 26 tests the resilience of critical functions through
          realistic attack simulations. ISO A.8.25 includes security testing
          within the secure development lifecycle. TLPT findings directly
          inform improvements to secure development practices.

  # Chapter 5 — ICT Third-Party Risk Management

  - source_control: art-28
    target_controls:
      - id: a5-23
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          DORA Art. 28 requires managing ICT third-party risk as an integral
          component of ICT risk, including maintaining a register of all
          contractual arrangements and adopting a multi-vendor strategy.
          ISO A.5.23 requires processes for acquisition, use, management,
          and exit from cloud services. Both address third-party service
          provider governance including concentration risk and exit planning.
      - id: a5-1
        relationship: complements
        confidence: 0.70
        rationale: >
          DORA Art. 28.3 requires adopting and regularly reviewing a strategy
          on ICT third-party risk including a policy on use of ICT services
          supporting critical functions. ISO A.5.1 requires defined and
          approved information security policies. Third-party risk policy
          is a topic-specific policy within the overall policy framework.
      - id: a5-2
        relationship: complements
        confidence: 0.60
        rationale: >
          DORA Art. 28.1 states financial entities remain fully responsible
          for compliance regardless of outsourcing. ISO A.5.2 requires
          defining information security roles and responsibilities.
          Accountability for third-party risk must be formally assigned
          within the organizational structure.
      - id: a5-36
        relationship: complements
        confidence: 0.65
        rationale: >
          DORA Art. 28.5 requires timely reporting to competent authorities
          about new ICT service arrangements. ISO A.5.36 requires regular
          compliance reviews. Third-party arrangement monitoring is part
          of the broader compliance verification process.
      - id: a8-8
        relationship: complements
        confidence: 0.60
        rationale: >
          DORA Art. 28 requires due diligence and continuous monitoring of
          ICT third-party service providers including their security posture.
          ISO A.8.8 addresses management of technical vulnerabilities.
          Third-party vulnerability exposure is a critical dimension of
          the organization's vulnerability management scope.
