id: cnsp-408_to_cnsp-381
title: "CNSP 408 to CNSP 381 Control Mapping"
source_framework: cnsp-408
target_framework: cnsp-381
version: "1.0.0"
last_updated: "2026-04-06"
methodology: structural
description: >
  Mapping between Resolução CNSP 408/2021 (remote means in insurance, pension, and
  capitalization operations) and Resolução CNSP 381/2020 (cybersecurity policy and
  cloud services requirements for the insurance market). CNSP 408 establishes
  operational requirements for digital channels that depend on the cybersecurity
  infrastructure mandated by CNSP 381. The relationship is primarily intersects-with
  and complements, as CNSP 408 addresses digital channel operations while CNSP 381
  addresses the underlying cybersecurity framework that enables secure digital operations.

mappings:
  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Both articles define the scope of their respective resolutions for the same
          set of supervised entities (seguradoras, EAPCs, sociedades de capitalização).
          CNSP 408 art. 1 scopes remote means in insurance operations; CNSP 381 art. 1
          scopes cybersecurity policy and cloud services. The overlap is the digital
          operations domain where both regulations apply simultaneously.
      - id: art-2
        relationship: complements
        confidence: 0.80
        rationale: >
          CNSP 408 art. 1 defines remote operations scope, while CNSP 381 art. 2
          establishes proportionality criteria. The proportionality principle of CNSP 381
          applies to how cybersecurity controls are scaled for digital channel operations
          defined by CNSP 408.

  - source_control: art-2
    target_controls:
      - id: art-2
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Both articles define key terms for their respective regulations. CNSP 408 art. 2
          defines client, contractual documents, supervised entity, intermediary, and
          remote means. CNSP 381 art. 2 defines supervised entities and proportionality.
          The definition of supervised entities overlaps directly.

  - source_control: art-3a
    target_controls:
      - id: art-3
        relationship: intersects-with
        confidence: 0.95
        rationale: >
          CNSP 408 art. 3, I requires integrity, authenticity, non-repudiation, and
          confidentiality for remote insurance operations. CNSP 381 art. 3 requires a
          cybersecurity policy ensuring confidentiality, integrity, and availability.
          Three of the four CNSP 408 security properties (integrity, confidentiality,
          and implicitly availability) map directly to the CIA triad of CNSP 381. The
          cybersecurity policy mandated by CNSP 381 is the foundation for implementing
          the security requirements of CNSP 408.
      - id: art-4
        relationship: complements
        confidence: 0.90
        rationale: >
          CNSP 408 art. 3, I security properties (integrity, authenticity, non-repudiation,
          confidentiality) require the specific controls and procedures described in
          CNSP 381 art. 4 (vulnerability reduction, traceability of sensitive information,
          incident management, data classification). The minimum policy content of CNSP 381
          provides the operational framework for achieving CNSP 408 security requirements.

  - source_control: art-3b
    target_controls:
      - id: art-4
        relationship: complements
        confidence: 0.85
        rationale: >
          CNSP 408 art. 3, II-III requires receipt confirmation and protocol generation
          for remote operations. CNSP 381 art. 4, II mandates traceability controls for
          sensitive information. The protocol and receipt mechanisms of CNSP 408 are
          specific implementations of the traceability requirements of CNSP 381.
      - id: art-8
        relationship: complements
        confidence: 0.80
        rationale: >
          CNSP 408 art. 3, II-III generates documentation (receipts, protocols) that
          must be retained. CNSP 381 art. 8 requires documentation retention for a
          minimum of five years and availability to SUSEP. The documentation generated
          by CNSP 408 operations falls under the retention requirements of CNSP 381.

  - source_control: art-4
    target_controls:
      - id: art-3
        relationship: complements
        confidence: 0.85
        rationale: >
          CNSP 408 art. 4 authorizes electronic document issuance, delivery, and
          availability with timestamp and download requirements. CNSP 381 art. 3
          cybersecurity policy must ensure confidentiality, integrity, and availability
          of these electronic documents throughout their lifecycle.
      - id: art-4
        relationship: complements
        confidence: 0.85
        rationale: >
          Electronic documents issued under CNSP 408 art. 4 contain sensitive client
          information requiring the traceability and data classification controls
          mandated by CNSP 381 art. 4, II and V. The integrity of document timestamps
          (§ 2) depends on the cybersecurity controls of CNSP 381.

  - source_control: art-5
    target_controls:
      - id: art-3
        relationship: complements
        confidence: 0.90
        rationale: >
          CNSP 408 art. 5 requires authenticated, integrity-verifiable electronic
          proposals. The cybersecurity policy mandated by CNSP 381 art. 3 — ensuring
          confidentiality, integrity, and availability — provides the security framework
          for implementing the authentication and integrity requirements of electronic
          proposals.
      - id: art-4
        relationship: complements
        confidence: 0.85
        rationale: >
          The authentication and provable authorship requirements of CNSP 408 art. 5
          demand specific controls for sensitive information traceability (CNSP 381
          art. 4, II) and vulnerability reduction through access control and identity
          verification (CNSP 381 art. 4, I).

  - source_control: art-6
    target_controls:
      - id: art-2
        relationship: complements
        confidence: 0.80
        rationale: >
          CNSP 408 art. 6 authorizes insurance by certificate and capitalization via
          remote means with simplified requirements. CNSP 381 art. 2 proportionality
          principle applies here — the cybersecurity controls for these mass-market,
          lower-risk products may be proportionally adjusted while still meeting
          minimum requirements.
      - id: art-3
        relationship: complements
        confidence: 0.85
        rationale: >
          Even with simplified requirements, CNSP 408 art. 6 operations must still
          comply with CNSP 408 art. 3 security properties, which depend on the
          cybersecurity policy foundation of CNSP 381 art. 3 (CIA triad).

  - source_control: art-7
    target_controls:
      - id: art-4
        relationship: complements
        confidence: 0.80
        rationale: >
          CNSP 408 art. 7 requires secure access instructions for contractual documents
          after remote contracting. The secure access mechanisms depend on the controls
          and procedures for reducing vulnerabilities (CNSP 381 art. 4, I) and protecting
          sensitive information (CNSP 381 art. 4, II).
      - id: art-6
        relationship: complements
        confidence: 0.75
        rationale: >
          CNSP 408 art. 7 secure access instructions are part of client communication
          and education. CNSP 381 art. 6 mandates cybersecurity culture dissemination
          including to correspondents and service providers. The secure access guidance
          to clients complements the broader security awareness culture required by
          CNSP 381.

  - source_control: art-8a
    target_controls:
      - id: art-4
        relationship: complements
        confidence: 0.85
        rationale: >
          CNSP 408 art. 8 (caput) authorizes additional procedures and requests via
          remote means for the full contract lifecycle. CNSP 381 art. 4 mandates
          procedures and controls for vulnerability reduction (I), traceability (II),
          and incident management (III) — all of which apply to these digital servicing
          operations.
      - id: art-9
        relationship: complements
        confidence: 0.80
        rationale: >
          Digital servicing operations authorized by CNSP 408 art. 8 (claims, endorsements,
          redemptions) are critical business processes that must be covered by the incident
          response plan of CNSP 381 art. 9, including routines, procedures, controls, and
          technologies for prevention and response.

  - source_control: art-8b
    target_controls:
      - id: art-4
        relationship: complements
        confidence: 0.80
        rationale: >
          CNSP 408 art. 8, §§ 1-3 establishes same-channel termination rights and
          consent requirements. The security controls for contract termination via digital
          channels — including authentication for consent-dependent operations (§ 3) —
          depend on the cybersecurity procedures and sensitive information controls
          mandated by CNSP 381 art. 4, I-II.
      - id: art-5
        relationship: complements
        confidence: 0.75
        rationale: >
          The contract termination flows mandated by CNSP 408 art. 8, §§ 1-3 must be
          covered by the incident response plan of CNSP 381 art. 5, as disruptions
          to termination capabilities constitute service interruptions requiring
          prevention and response procedures.

  - source_control: art-9
    target_controls:
      - id: art-13
        relationship: complements
        confidence: 0.90
        rationale: >
          CNSP 408 art. 9 extends all resolution requirements to intermediated operations.
          CNSP 381 art. 13 establishes pre-contractual due diligence for cloud and data
          service providers. When intermediaries use digital channels, the cybersecurity
          due diligence for their service providers must include CNSP 408 compliance
          verification, particularly for data processing and cloud services.
      - id: art-15
        relationship: complements
        confidence: 0.85
        rationale: >
          CNSP 408 art. 9 makes the supervised entity responsible for intermediary
          compliance with digital channel requirements. CNSP 381 art. 15 mandates
          contractual provisions for data segregation, security measures, auditing
          rights, and monitoring — all applicable to intermediary digital operations.

  - source_control: art-10
    target_controls:
      - id: art-3
        relationship: complements
        confidence: 0.85
        rationale: >
          CNSP 408 art. 10 establishes that remote means do not exempt entities from
          existing regulatory obligations. CNSP 381 art. 3 cybersecurity policy is
          one of the existing obligations that must be maintained regardless of the
          channel used, reinforcing that digital-first entities carry the full weight
          of cybersecurity requirements.
      - id: art-7
        relationship: complements
        confidence: 0.80
        rationale: >
          CNSP 408 art. 10 preservation of existing obligations intersects with
          CNSP 381 art. 7 requirement for annual policy review. When digital channels
          evolve or expand (new remote means), this constitutes a relevant change that
          triggers cybersecurity policy review under CNSP 381 art. 7.
      - id: art-17
        relationship: complements
        confidence: 0.75
        rationale: >
          The board/directorate responsibilities under CNSP 381 art. 17 include
          ensuring adherence to the cybersecurity policy. CNSP 408 art. 10 reinforces
          that these governance responsibilities extend to all digital channel operations
          without exception.

  - source_control: art-11
    target_controls:
      - id: art-1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CNSP 408 art. 11 extends integrity, authenticity, non-repudiation, and
          confidentiality requirements to reinsurance and retrocession operations
          via remote means. CNSP 381 art. 1 scope explicitly includes local reinsurers.
          Both regulations converge on cybersecurity requirements for reinsurance
          digital operations.
      - id: art-3
        relationship: complements
        confidence: 0.90
        rationale: >
          CNSP 408 art. 11 requires the four security properties (integrity, authenticity,
          non-repudiation, confidentiality) for reinsurance remote operations. CNSP 381
          art. 3 cybersecurity policy (CIA triad) provides the foundational framework
          for implementing these properties in the reinsurance context.

  - source_control: art-12
    target_controls:
      - id: art-4
        relationship: complements
        confidence: 0.80
        rationale: >
          CNSP 408 art. 12 applies e-commerce consumer protection (Decreto 7.962/2013)
          to digital insurance operations, including right of withdrawal and transparent
          contracting. CNSP 381 art. 4 controls — particularly data classification (V)
          and procedures for vulnerability reduction (I) — support the secure implementation
          of e-commerce compliance features in digital channels.
      - id: art-6
        relationship: complements
        confidence: 0.75
        rationale: >
          CNSP 408 art. 12 e-commerce consumer protection requirements include client
          information disclosure and service accessibility. CNSP 381 art. 6 cybersecurity
          culture dissemination to service providers and correspondents supports the
          training needed to handle these consumer protection requirements securely
          in digital channels.

  - source_control: art-13-14
    target_controls:
      - id: art-17
        relationship: complements
        confidence: 0.70
        rationale: >
          CNSP 408 arts. 13-14 establish revocations of prior regulations and the
          effective date. The governance responsibilities of CNSP 381 art. 17 include
          the board/directorate obligation to ensure adherence to current regulatory
          requirements, which includes tracking regulatory transitions such as the
          shift from CNSP 294/359 to CNSP 408.

metadata:
  total_mappings: 29
  average_confidence: 0.82
  relationship_summary:
    intersects-with: 4
    complements: 25
  notes: >
    CNSP 408 and CNSP 381 regulate complementary domains: CNSP 408 governs the
    operational use of remote means (digital channels) in insurance operations, while
    CNSP 381 establishes the cybersecurity framework that underpins secure digital
    operations. The dominant relationship is complements — CNSP 408 digital channel
    requirements depend on the cybersecurity infrastructure mandated by CNSP 381, but
    neither regulation implements the other. Where both regulations address the same
    supervised entities or the same security properties (integrity, confidentiality),
    the relationship is intersects-with. Every CNSP 408 source control maps to at
    least one CNSP 381 target, confirming that all digital channel operations require
    cybersecurity policy support.
