id: iso-42001_to_nist-ai-rmf
title: "ISO/IEC 42001:2023 to NIST AI RMF v1.0 Control Mapping"
source_framework: iso-42001
target_framework: nist-ai-rmf
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic

mappings:
  # ── ctx (Context of the Organization) ───────────────────────────────

  - source_control: ctx-1
    target_controls:
      - id: gv-1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ISO 42001 ctx-1 requires the organization to determine external and
          internal issues affecting its AI management system, including the
          regulatory landscape and societal expectations. NIST AI RMF GV-1
          establishes governance policies and processes for AI risk management,
          including understanding legal and regulatory requirements. Both
          controls address organizational context assessment for AI governance,
          though ctx-1 focuses on broader contextual understanding while GV-1
          focuses specifically on governance policy implementation.
      - id: mp-1
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          ISO 42001 ctx-1 and NIST AI RMF MP-1 are near-equivalents. Both
          require establishing and understanding the context in which AI
          systems operate, including intended purposes, applicable laws and
          regulations, and organizational risk tolerance. ctx-1 frames this
          as understanding organizational context; MP-1 frames it as
          establishing context for AI system mapping. The scope and intent
          are substantively the same.

  - source_control: ctx-2
    target_controls:
      - id: gv-2
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          ISO 42001 ctx-2 requires identifying interested parties and their
          requirements for the AI management system. NIST AI RMF GV-2
          establishes accountability structures with appropriate teams and
          individuals. Both address stakeholder identification, though ctx-2
          focuses on external and internal interested parties broadly, while
          GV-2 focuses on internal accountability structures specifically.
      - id: gv-5
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ISO 42001 ctx-2 identifies interested parties including those
          affected by AI system outputs, regulators, customers, and end
          users. NIST AI RMF GV-5 establishes processes for robust engagement
          with relevant AI actors and integration of stakeholder feedback.
          Both controls address stakeholder identification and engagement,
          with ctx-2 defining who the stakeholders are and GV-5 defining
          how to engage them.
      - id: mp-3
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO 42001 ctx-2 requires understanding interested parties affected
          by AI systems and their expectations regarding fairness,
          transparency, and accountability. NIST AI RMF MP-3 assesses AI
          benefits and costs for individuals, groups, communities, and
          society. Both consider impacts on external parties, though ctx-2
          focuses on identifying stakeholder requirements while MP-3 focuses
          on assessing benefits and costs to those stakeholders.

  - source_control: ctx-3
    target_controls:
      - id: gv-1
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          ISO 42001 ctx-3 determines the scope of the AI management system,
          identifying which AI systems, processes, and organizational units
          are covered. NIST AI RMF GV-1 requires governance policies and
          processes to be in place across the organization for AI risk
          management. Both establish the governance boundary, though ctx-3
          is explicitly about defining scope boundaries while GV-1 addresses
          the broader governance framework within which scope is defined.
      - id: mp-1
        relationship: intersects-with
        confidence: 0.84
        rationale: >
          ISO 42001 ctx-3 defines which AI systems fall within the AI
          management system scope. NIST AI RMF MP-1 establishes context
          including intended purposes and deployment scope. Both delineate
          what AI systems and activities are subject to governance, though
          ctx-3 focuses on management system boundaries while MP-1 focuses
          on individual AI system context.

  # ── ldr (Leadership) ────────────────────────────────────────────────

  - source_control: ldr-1
    target_controls:
      - id: gv-1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ISO 42001 ldr-1 requires top management to demonstrate leadership
          and commitment to the AI management system, including ensuring
          policies and objectives are established. NIST AI RMF GV-1
          requires governance policies and processes to be in place,
          transparent, and implemented effectively. Both address the
          establishment and maintenance of AI governance, though ldr-1
          emphasizes leadership accountability while GV-1 emphasizes
          policy and process implementation.
      - id: gv-4
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          ISO 42001 ldr-1 requires top management to communicate the
          importance of effective AI management and support persons
          contributing to the AI management system. NIST AI RMF GV-4
          requires organizational teams to be committed to a culture that
          considers and communicates AI risk. Both address fostering an
          AI risk-aware culture through leadership engagement.

  - source_control: ldr-2
    target_controls:
      - id: gv-1
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          ISO 42001 ldr-2 requires establishing an AI policy covering
          responsible AI, fairness, transparency, accountability, safety,
          and privacy. NIST AI RMF GV-1 requires governance policies for
          mapping, measuring, and managing AI risks. Both controls mandate
          formal AI governance policies. The scope alignment is strong:
          ldr-2 specifies policy content requirements while GV-1 specifies
          that policies must be transparent and effectively implemented.
          Together they represent the same governance intent.

  - source_control: ldr-3
    target_controls:
      - id: gv-2
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          ISO 42001 ldr-3 requires assigning roles, responsibilities, and
          authorities for AI system development, deployment, operation, and
          oversight. NIST AI RMF GV-2 requires accountability structures
          where appropriate teams and individuals are empowered, responsible,
          and trained for AI risk management. Both controls directly address
          organizational roles and accountability for AI governance with
          near-identical scope and intent.

  # ── pln (Planning) ──────────────────────────────────────────────────

  - source_control: pln-1
    target_controls:
      - id: mp-4
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ISO 42001 pln-1 requires planning actions to address AI risks and
          opportunities, including AI-specific risk assessments considering
          risks to individuals, groups, and society. NIST AI RMF MP-4
          requires risks and benefits to be assessed and documented based on
          context and categorization. Both address systematic identification
          and assessment of AI risks, though pln-1 frames this as management
          system planning while MP-4 frames it as part of the MAP function.
      - id: mp-5
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          ISO 42001 pln-1 requires determining risks that need to be
          addressed and planning mitigation actions. NIST AI RMF MP-5
          assesses likelihood and impact of identified AI risks to
          prioritize risk management. Both controls link risk identification
          to prioritized action, though pln-1 covers the full planning
          cycle while MP-5 focuses specifically on likelihood-impact
          assessment.
      - id: ms-2
        relationship: complements
        confidence: 0.78
        rationale: >
          ISO 42001 pln-1 requires conducting AI-specific risk assessments
          including risks related to bias, safety, and societal
          consequences. NIST AI RMF MS-2 evaluates AI systems for
          trustworthy characteristics. pln-1 identifies and plans for risks
          while MS-2 evaluates whether trustworthiness is achieved. They
          complement each other in the risk management lifecycle.

  - source_control: pln-2
    target_controls:
      - id: gv-1
        relationship: complements
        confidence: 0.78
        rationale: >
          ISO 42001 pln-2 requires establishing measurable AI objectives
          consistent with AI policy. NIST AI RMF GV-1 requires governance
          policies to be implemented effectively. pln-2 translates policy
          into measurable objectives, complementing the governance framework
          that GV-1 establishes. Objectives are the mechanism through which
          policy effectiveness is operationalized.
      - id: mg-1
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          ISO 42001 pln-2 requires planning what resources are needed, who
          is responsible, and how results will be evaluated. NIST AI RMF
          MG-1 requires that AI risks are prioritized, responded to, and
          managed. Both address the planning and management of responses to
          AI risks, though pln-2 approaches it from an objectives-and-resources
          perspective while MG-1 approaches it from a risk prioritization
          and response perspective.

  - source_control: pln-3
    target_controls:
      - id: gv-6
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO 42001 pln-3 requires that changes to the AI management system
          are carried out in a planned manner, including changes to AI
          systems, model updates, and deployment configurations. NIST AI
          RMF GV-6 addresses risks from third-party software, data, and
          supply chain issues, which often manifest through changes. Both
          address change control, though pln-3 covers all AI management
          system changes while GV-6 focuses specifically on third-party
          supply chain changes.
      - id: mg-2
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          ISO 42001 pln-3 requires planned change management for AI systems
          including impact assessment of changes. NIST AI RMF MG-2 requires
          strategies to maximize benefits and minimize negative impacts,
          including post-deployment monitoring plans. Both address managing
          the evolution of AI systems over time, with pln-3 focusing on
          change control processes and MG-2 on ongoing benefit-risk
          optimization.

  # ── sup (Support) ───────────────────────────────────────────────────

  - source_control: sup-1
    target_controls:
      - id: gv-2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ISO 42001 sup-1 requires determining and providing resources and
          competence for AI management, including AI-specific skills in data
          science, ML engineering, and AI ethics. NIST AI RMF GV-2 requires
          that teams and individuals are trained for AI risk management.
          Both address the human capability requirements for AI governance,
          though sup-1 covers resources broadly while GV-2 focuses on
          accountability and training structures.
      - id: gv-4
        relationship: complements
        confidence: 0.78
        rationale: >
          ISO 42001 sup-1 requires ensuring AI competence through education,
          training, and experience. NIST AI RMF GV-4 requires organizational
          commitment to a culture that considers AI risk, including training
          and documentation. sup-1 provides the competence foundation that
          enables the risk-aware culture GV-4 demands.

  - source_control: sup-2
    target_controls:
      - id: gv-4
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          ISO 42001 sup-2 requires AI awareness programs and communication
          about AI capabilities, limitations, and impacts. NIST AI RMF GV-4
          requires organizational teams to be committed to a culture that
          considers and communicates AI risk. Both controls address the same
          core requirement: ensuring organizational awareness and transparent
          communication about AI risks throughout the organization.
      - id: gv-5
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          ISO 42001 sup-2 requires determining internal and external
          communications relevant to the AI management system. NIST AI RMF
          GV-5 requires processes for robust engagement with relevant AI
          actors and integration of stakeholder feedback. Both address
          communication with stakeholders about AI systems, though sup-2
          covers the full communication spectrum while GV-5 focuses on
          stakeholder engagement and feedback integration.

  - source_control: sup-3
    target_controls:
      - id: gv-1
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          ISO 42001 sup-3 requires documented information for the AI
          management system including model documentation, data provenance,
          and decision audit trails. NIST AI RMF GV-1 requires governance
          processes to be transparent and documented. Both address the
          documentation foundation of AI governance, though sup-3 specifies
          AI-specific documentation requirements while GV-1 addresses
          governance documentation more broadly.
      - id: gv-5
        relationship: complements
        confidence: 0.75
        rationale: >
          ISO 42001 sup-3 requires documentation to be available to
          interested parties and adequately protected. NIST AI RMF GV-5
          requires stakeholder feedback to be integrated into AI system
          design and assessment. sup-3 provides the documentation
          infrastructure that enables the stakeholder engagement GV-5
          requires. Documentation makes AI system information accessible
          for stakeholder review.
      - id: mp-5
        relationship: complements
        confidence: 0.73
        rationale: >
          ISO 42001 sup-3 requires retaining documented information about
          impact assessments and decision audit trails. NIST AI RMF MP-5
          requires documentation of risk likelihood and impact assessments.
          sup-3 provides the documentation control framework that ensures
          the risk assessment documentation MP-5 produces is properly
          managed and retained.

  # ── ops (Operation) ─────────────────────────────────────────────────

  - source_control: ops-1
    target_controls:
      - id: mg-1
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          ISO 42001 ops-1 requires planning, implementing, and controlling
          processes for the AI management system, including controlling
          outsourced AI processes. NIST AI RMF MG-1 requires AI risks to
          be prioritized, responded to, and managed proactively. Both
          controls address the operational management of AI systems and
          their risks, with strong alignment in scope: ops-1 covers
          operational process control while MG-1 covers risk-based
          operational management.
      - id: mg-2
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          ISO 42001 ops-1 requires implementing control of AI lifecycle
          processes and managing planned and unintended changes. NIST AI
          RMF MG-2 requires strategies to maximize benefits and minimize
          negative impacts with post-deployment monitoring. Both address
          ongoing AI system management, with ops-1 focusing on process
          control and MG-2 on benefit-risk optimization.

  - source_control: ops-2
    target_controls:
      - id: mp-2
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          ISO 42001 ops-2 requires AI risk assessments identifying risks
          related to bias, transparency, safety, security, and privacy.
          NIST AI RMF MP-2 categorizes AI systems by risk level, capabilities,
          and deployment context. Both involve classifying AI systems
          based on their risk profiles, though ops-2 performs detailed
          risk assessment while MP-2 performs system categorization that
          informs risk assessment rigor.
      - id: mp-4
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          ISO 42001 ops-2 requires performing AI risk assessments at planned
          intervals covering technical, ethical, and societal risks. NIST AI
          RMF MP-4 requires risks and benefits to be assessed and documented
          for each AI system. Both controls mandate systematic risk
          assessment for AI systems with substantially the same scope:
          identifying technical, societal, and organizational risks and
          retaining documented results.
      - id: mp-5
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ISO 42001 ops-2 requires risk assessment considering both
          probability and severity of harm. NIST AI RMF MP-5 assesses
          likelihood and impact of each identified AI risk. Both address
          the same risk quantification methodology: evaluating probability
          (likelihood) and severity (impact) to prioritize risks.
      - id: ms-1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO 42001 ops-2 requires systematic risk assessment covering
          multiple AI risk dimensions. NIST AI RMF MS-1 identifies and
          applies methods and metrics to measure AI risks and
          trustworthiness. Both address measuring AI risk, though ops-2
          focuses on the assessment process while MS-1 focuses on the
          measurement methodology and metrics.
      - id: ms-2
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          ISO 42001 ops-2 requires documented AI risk assessments conducted
          by multidisciplinary teams. NIST AI RMF MS-2 requires AI system
          evaluation by independent teams with documented results. Both
          address the practice of systematic AI evaluation, with ops-2
          focusing on risk assessment and MS-2 on trustworthiness
          evaluation.

  - source_control: ops-3
    target_controls:
      - id: mp-3
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          ISO 42001 ops-3 requires AI impact assessments evaluating effects
          on individuals, groups, communities, and society, including
          fundamental rights, safety, and environmental sustainability.
          NIST AI RMF MP-3 assesses AI benefits and costs for individuals,
          groups, communities, organizations, and society. Both controls
          mandate comprehensive impact assessment with nearly identical
          scope and stakeholder categories.
      - id: mg-3
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO 42001 ops-3 requires managing the AI system lifecycle
          including verification, validation, deployment, and retirement.
          NIST AI RMF MG-3 monitors third-party AI component risks and
          applies risk controls. Both address lifecycle management of AI
          components, though ops-3 covers the full lifecycle while MG-3
          focuses specifically on third-party component management within
          that lifecycle.
      - id: mg-4
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO 42001 ops-3 covers AI system lifecycle management including
          the retirement phase and ensuring systems remain fit for purpose.
          NIST AI RMF MG-4 addresses risk treatment, response, recovery,
          and communication plans. Both handle the management of AI
          systems over their operational life, including response to
          problems and eventual decommissioning.

  # ── perf (Performance Evaluation) ───────────────────────────────────

  - source_control: perf-1
    target_controls:
      - id: ms-1
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          ISO 42001 perf-1 requires determining what to monitor and measure
          for the AI management system, including AI-specific metrics such
          as model performance, fairness indicators, and data quality.
          NIST AI RMF MS-1 requires identifying and applying appropriate
          methods and metrics to measure AI risks and trustworthiness.
          Both controls mandate the establishment of comprehensive
          measurement frameworks for AI systems with substantially
          identical scope.
      - id: ms-2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ISO 42001 perf-1 requires evaluating AI management system
          performance and effectiveness through monitoring and measurement.
          NIST AI RMF MS-2 requires AI systems to be evaluated for
          trustworthy characteristics by independent teams. Both address
          AI system evaluation, with perf-1 focusing on management system
          performance monitoring and MS-2 on independent trustworthiness
          evaluation.
      - id: ms-3
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ISO 42001 perf-1 requires continuous monitoring of AI-specific
          metrics including model drift and data quality in production.
          NIST AI RMF MS-3 requires mechanisms for tracking identified AI
          risks over time through continuous monitoring. Both address
          continuous AI monitoring, with perf-1 covering performance and
          effectiveness metrics broadly and MS-3 focusing specifically on
          risk tracking over time.

  - source_control: perf-2
    target_controls:
      - id: gv-1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO 42001 perf-2 requires internal audits and management reviews
          of the AI management system to ensure conformity and effectiveness.
          NIST AI RMF GV-1 requires governance policies and processes to be
          implemented effectively. Internal audit is a key mechanism for
          verifying effective implementation of governance policies. perf-2
          provides the verification mechanism that GV-1's effective
          implementation requirement demands.
      - id: gv-6
        relationship: complements
        confidence: 0.75
        rationale: >
          ISO 42001 perf-2 requires auditing the AI management system
          including its third-party dependencies. NIST AI RMF GV-6
          addresses policies for third-party AI component risk management.
          perf-2's audit function complements GV-6 by providing the
          verification mechanism for third-party AI supply chain policies.
      - id: ms-4
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          ISO 42001 perf-2 requires management review to ensure the AI
          management system's continuing suitability, adequacy, and
          effectiveness, including considering opportunities for continual
          improvement. NIST AI RMF MS-4 collects feedback about measurement
          efficacy and integrates it into improvement processes. Both
          controls establish feedback loops to evaluate and improve AI
          governance effectiveness.

  # ── imp (Improvement) ───────────────────────────────────────────────

  - source_control: imp-1
    target_controls:
      - id: mg-3
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          ISO 42001 imp-1 addresses nonconformity and corrective action
          for AI systems, including model failures and bias incidents.
          NIST AI RMF MG-3 monitors third-party AI risks and applies
          risk controls. Both address the response to AI system problems,
          though imp-1 covers all nonconformities broadly while MG-3
          focuses on third-party component risk management. The intersection
          occurs when nonconformities arise from third-party components.
      - id: mg-4
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          ISO 42001 imp-1 requires reacting to nonconformities, implementing
          corrective actions, reviewing effectiveness, and modifying the AI
          management system as needed. NIST AI RMF MG-4 requires documented
          risk treatments, response and recovery procedures, and
          communication plans. Both controls address incident response,
          corrective action, and recovery for AI-related incidents with
          substantially the same scope and intent.

  - source_control: imp-2
    target_controls:
      - id: gv-1
        relationship: complements
        confidence: 0.78
        rationale: >
          ISO 42001 imp-2 requires continual improvement of the AI
          management system's suitability, adequacy, and effectiveness.
          NIST AI RMF GV-1 requires governance policies and processes to be
          implemented effectively. imp-2's continual improvement mandate
          complements GV-1 by ensuring that governance effectiveness is
          not static but continually enhanced.
      - id: gv-6
        relationship: complements
        confidence: 0.73
        rationale: >
          ISO 42001 imp-2 requires continual improvement addressing evolving
          AI technologies, emerging risks, and changes in the regulatory
          landscape. NIST AI RMF GV-6 addresses third-party and supply
          chain AI risks. imp-2 drives improvement of supply chain risk
          management as the AI vendor landscape evolves.
      - id: ms-4
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          ISO 42001 imp-2 requires continual improvement driven by analysis,
          evaluation, and management review outputs. NIST AI RMF MS-4
          collects feedback about measurement efficacy and integrates it
          into improvement processes. Both controls establish improvement
          cycles for AI governance, with imp-2 addressing the full AI
          management system and MS-4 focusing on measurement effectiveness.
      - id: mg-4
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO 42001 imp-2 requires addressing lessons learned from AI
          incidents as part of continual improvement. NIST AI RMF MG-4
          requires documented risk treatments and incident response
          procedures that are regularly tested and updated. Both address
          learning from incidents to improve AI governance, with imp-2
          focusing on systemic improvement and MG-4 on operational
          response refinement.

  # ── anx-a (Annex A Controls) ────────────────────────────────────────

  - source_control: anx-a-1
    target_controls:
      - id: mp-2
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          ISO 42001 anx-a-1 establishes data governance for AI including
          data quality, provenance, bias assessment, and lifecycle
          management. NIST AI RMF MP-2 categorizes AI systems by risk
          level, capabilities, and data requirements. Both address the
          data dimension of AI systems, with anx-a-1 governing data
          quality and integrity while MP-2 categorizes systems partly
          based on their data characteristics.
      - id: ms-1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO 42001 anx-a-1 requires assessing data quality along
          dimensions including accuracy, completeness, and
          representativeness. NIST AI RMF MS-1 identifies metrics to
          measure AI trustworthiness including validity and reliability.
          Both address the measurement of AI system quality attributes,
          with anx-a-1 focusing on data quality measurement and MS-1 on
          broader trustworthiness measurement.
      - id: ms-2
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO 42001 anx-a-1 requires assessing data for potential biases
          and implementing controls against data poisoning. NIST AI RMF
          MS-2 evaluates AI systems for trustworthy characteristics
          including fairness. Both address the evaluation of AI systems
          for bias-related issues, with anx-a-1 focusing on data-level
          bias while MS-2 evaluates system-level trustworthiness.
      - id: gv-3
        relationship: complements
        confidence: 0.76
        rationale: >
          ISO 42001 anx-a-1 requires ensuring data representativeness and
          assessing data for potential biases. NIST AI RMF GV-3 prioritizes
          diversity, equity, inclusion, and accessibility in AI risk
          management. anx-a-1's data representativeness requirements
          complement GV-3's DEIA principles by addressing the data
          foundations that enable equitable AI outcomes.

  - source_control: anx-a-2
    target_controls:
      - id: gv-1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO 42001 anx-a-2 requires accountability mechanisms with clear
          responsibility for AI system outcomes and audit trails. NIST AI
          RMF GV-1 requires governance policies and processes to be
          transparent and effectively implemented. Both address the
          transparency and accountability foundations of AI governance.
      - id: gv-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO 42001 anx-a-2 requires providing meaningful information about
          AI capabilities, limitations, and decision logic to stakeholders,
          including mechanisms to challenge AI decisions. NIST AI RMF GV-5
          requires stakeholder engagement and feedback integration. Both
          address stakeholder-facing transparency and the right of affected
          parties to understand and challenge AI systems.
      - id: mp-3
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          ISO 42001 anx-a-2 requires transparency about AI system
          capabilities and limitations for stakeholders. NIST AI RMF MP-3
          assesses AI benefits and costs for stakeholders. Both involve
          communicating AI system characteristics to affected parties,
          with anx-a-2 focusing on transparency of decision logic and
          MP-3 on comprehensive benefit-cost assessment.
      - id: ms-2
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          ISO 42001 anx-a-2 requires appropriate levels of explainability
          proportionate to risk level, including global, local, and
          counterfactual explanations. NIST AI RMF MS-2 evaluates AI
          systems for trustworthy characteristics including explainability
          and interpretability. Both address the evaluation of AI system
          explainability, with anx-a-2 defining explainability requirements
          and MS-2 providing the evaluation framework.

  - source_control: anx-a-3
    target_controls:
      - id: mp-4
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          ISO 42001 anx-a-3 addresses AI security threats including
          adversarial attacks, data poisoning, and model extraction.
          NIST AI RMF MP-4 identifies technical risks including adversarial
          attacks and data quality issues. Both address the identification
          and assessment of AI-specific security threats, with anx-a-3
          defining security controls and MP-4 documenting risks.
      - id: ms-2
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          ISO 42001 anx-a-3 requires AI system robustness including
          reliable performance under adversarial inputs and distribution
          shifts. NIST AI RMF MS-2 evaluates AI systems for trustworthy
          characteristics including safety, security, and resilience.
          Both address the evaluation of AI system robustness and
          security properties, with anx-a-3 specifying robustness
          requirements and MS-2 defining evaluation methodology.
      - id: mg-2
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO 42001 anx-a-3 requires human oversight mechanisms including
          intervention, override, and shutdown capabilities proportionate
          to risk level. NIST AI RMF MG-2 requires strategies to maximize
          benefits and minimize negative impacts through post-deployment
          monitoring and management. Both address ongoing operational
          control of AI systems, with anx-a-3 focusing on human oversight
          mechanisms and MG-2 on benefit-risk management strategies.
      - id: mg-4
        relationship: intersects-with
        confidence: 0.80
        rationale: >
