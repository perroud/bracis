id: bcb-conj-2_to_bacen-4893
title: "BCB Resolucao Conjunta 2/2020 to BACEN CMN 4.893/2021 Control Mapping"
source_framework: bcb-conj-2
target_framework: bacen-4893
version: "1.0.0"
last_updated: "2026-04-06"
methodology: structural
description: >
  Cross-framework mapping between the BCB Resolucao Conjunta n. 2/2020 (incident
  notification and cyber risk management) and the BACEN Resolucao CMN 4.893/2021
  (cybersecurity policy and cloud contracting). The Resolucao Conjunta 2 complements
  the 4.893 by detailing specific incident notification obligations, timelines,
  sharing requirements, and cyber resilience testing that operationalize the broader
  cybersecurity policy framework established by CMN 4.893. Both norms apply to all
  institutions authorized by the Central Bank of Brazil and share the proportionality
  principle.

mappings:
  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: complements
        confidence: 0.93
        rationale: >
          BCB-CONJ-2 art-1 (scope — incident notification and cyber risk management)
          complements BACEN-4893 art-1 (scope — cybersecurity policy and cloud
          contracting). Both define the regulatory scope for institutions authorized
          by the BCB, but the Resolucao Conjunta adds the specific incident notification
          dimension not covered by CMN 4.893.
      - id: art-9
        relationship: complements
        confidence: 0.90
        rationale: >
          BCB-CONJ-2 art-1 defines "security incident" broadly (any adverse event
          affecting availability, integrity, confidentiality, or authenticity), which
          complements BACEN-4893 art-9 (incident response plan). The incident definition
          in the Resolucao Conjunta provides the trigger criteria for the response plan
          mandated by 4.893.
      - id: art-10
        relationship: complements
        confidence: 0.88
        rationale: >
          BCB-CONJ-2 art-1 establishes the foundational incident definition that
          complements BACEN-4893 art-10 (communication of incidents to BCB). The broad
          definition of "security incident" in the Resolucao Conjunta refines what
          types of events must be communicated under 4.893 art-10.

  - source_control: art-2
    target_controls:
      - id: art-2
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          BCB-CONJ-2 art-2 (proportionality principle based on size, risk profile,
          business model, operations complexity, and data sensitivity) is equivalent to
          BACEN-4893 art-2 (same proportionality principle). Both articles use nearly
          identical language and criteria to establish that compliance obligations
          scale with institutional characteristics.

  - source_control: art-3
    target_controls:
      - id: art-10
        relationship: complements
        confidence: 0.96
        rationale: >
          BCB-CONJ-2 art-3 (obligation to notify BCB of relevant security incidents
          within 24 hours, with five relevance criteria and third-party coverage)
          complements BACEN-4893 art-10 (generic obligation to communicate relevant
          incidents to BCB). The Resolucao Conjunta provides the detailed relevance
          criteria, the specific 24-hour deadline, and the explicit third-party
          coverage that 4.893 art-10 lacks.
      - id: art-9
        relationship: complements
        confidence: 0.85
        rationale: >
          BCB-CONJ-2 art-3 relevance criteria (critical components, SFN infrastructure,
          critical information, service impact, public interest) complement BACEN-4893
          art-9 (incident response plan), as the response plan must incorporate these
          criteria to determine which incidents trigger the notification obligation.

  - source_control: art-4
    target_controls:
      - id: art-10
        relationship: complements
        confidence: 0.95
        rationale: >
          BCB-CONJ-2 art-4 (minimum content of incident notification: description,
          severity, affected systems, impact, measures taken, third-party identification)
          complements BACEN-4893 art-10 (generic communication of incidents to BCB).
          The Resolucao Conjunta specifies the exact information required in each
          notification, which 4.893 does not detail.

  - source_control: art-5
    target_controls:
      - id: art-10
        relationship: complements
        confidence: 0.93
        rationale: >
          BCB-CONJ-2 art-5 (ongoing updates to BCB during incident treatment, including
          evolution, measures, root cause analysis, and recurrence prevention)
          complements BACEN-4893 art-10 (communication of incidents). While 4.893
          establishes the general obligation to communicate, the Resolucao Conjunta
          requires continuous updates until incident closure.
      - id: art-9
        relationship: complements
        confidence: 0.82
        rationale: >
          BCB-CONJ-2 art-5 update requirements (root cause analysis, recurrence
          prevention) complement BACEN-4893 art-9 (incident response plan). The
          post-incident analysis and prevention measures required by the Resolucao
          Conjunta feed back into the response plan improvement cycle of 4.893.

  - source_control: art-6
    target_controls:
      - id: art-10
        relationship: complements
        confidence: 0.94
        rationale: >
          BCB-CONJ-2 art-6 (communication channels, BCB's right to request additional
          information, and cumulative notification obligations to other regulators)
          complements BACEN-4893 art-10 (communication of incidents to BCB). The
          Resolucao Conjunta operationalizes the communication process that 4.893
          only states generically.

  - source_control: art-7
    target_controls:
      - id: art-20
        relationship: complements
        confidence: 0.95
        rationale: >
          BCB-CONJ-2 art-7 (mandatory inter-institutional sharing of IoCs, TTPs, and
          mitigation measures, respecting banking secrecy and data protection)
          complements BACEN-4893 art-20 (mechanisms for sharing information about
          relevant incidents). The Resolucao Conjunta specifies the minimum content
          to be shared (IoCs, TTPs, mitigations) and the legal safeguards, while
          4.893 art-20 establishes the general sharing obligation.
      - id: art-4
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          BCB-CONJ-2 art-7 sharing requirements intersect with BACEN-4893 art-4
          (cybersecurity policy content), specifically inciso IV (incident-related
          procedures) and inciso VII (information sharing mechanisms). The cybersecurity
          policy must contemplate the sharing mechanisms required by the Resolucao
          Conjunta.

  - source_control: art-8
    target_controls:
      - id: art-20
        relationship: complements
        confidence: 0.92
        rationale: >
          BCB-CONJ-2 art-8 (BCB sharing IoCs and security alerts with institutions,
          and mandatory implementation of reception mechanisms) complements BACEN-4893
          art-20 (information sharing mechanisms). The Resolucao Conjunta creates the
          reverse sharing flow (BCB to institutions) and mandates the technical
          capability to receive and apply threat intelligence.

  - source_control: art-9
    target_controls:
      - id: art-6
        relationship: complements
        confidence: 0.93
        rationale: >
          BCB-CONJ-2 art-9 (cyber risk management structure covering identification,
          classification, impact assessment, response procedures, resilience testing,
          and designated team) complements BACEN-4893 art-6 (action and incident
          response plan). Both require structured incident response capabilities, but
          the Resolucao Conjunta adds explicit requirements for resilience testing and
          a formally designated response team.
      - id: art-9
        relationship: complements
        confidence: 0.91
        rationale: >
          BCB-CONJ-2 art-9 (cyber risk management structure) complements BACEN-4893
          art-9 (incident response plan). Both address incident response but from
          different angles — 4.893 focuses on the plan document, while the Resolucao
          Conjunta requires the organizational structure that executes the plan.
      - id: art-8
        relationship: intersects-with
        confidence: 0.84
        rationale: >
          BCB-CONJ-2 art-9 (cyber risk management structure) intersects with
          BACEN-4893 art-8 (cybersecurity governance program and risk management).
          Both address cyber risk governance, but the Resolucao Conjunta focuses
          specifically on incident-related risk management while 4.893 covers the
          broader cybersecurity governance program.

  - source_control: art-10
    target_controls:
      - id: art-9
        relationship: complements
        confidence: 0.90
        rationale: >
          BCB-CONJ-2 art-10 (incident severity classification criteria: system
          criticality, data sensitivity, service impact, extent, SFN impact)
          complements BACEN-4893 art-9 (incident response plan). The severity
          classification methodology required by the Resolucao Conjunta is an
          essential input to the response plan mandated by 4.893.
      - id: art-6
        relationship: complements
        confidence: 0.83
        rationale: >
          BCB-CONJ-2 art-10 (severity classification criteria) complements
          BACEN-4893 art-6 (action and incident response plan). The classification
          criteria define how incidents are prioritized within the response framework
          established by 4.893 art-6.

  - source_control: art-11
    target_controls:
      - id: art-6
        relationship: complements
        confidence: 0.91
        rationale: >
          BCB-CONJ-2 art-11 (periodic cyber resilience testing: incident simulations,
          control effectiveness evaluation, team capability assessment, with results
          reported to the board) complements BACEN-4893 art-6 (action and incident
          response plan). The resilience tests validate the effectiveness of the action
          plan required by 4.893.
      - id: art-9
        relationship: complements
        confidence: 0.87
        rationale: >
          BCB-CONJ-2 art-11 (resilience testing including attack simulations)
          complements BACEN-4893 art-9 (incident response plan). The tests validate
          whether the incident response plan works as designed and identify gaps.
      - id: art-7
        relationship: intersects-with
        confidence: 0.79
        rationale: >
          BCB-CONJ-2 art-11 (evaluation of security controls effectiveness)
          intersects with BACEN-4893 art-7 (procedures and controls for vulnerability
          reduction, including periodic testing). Both require testing of security
          controls, but from different perspectives — the Resolucao Conjunta focuses
          on resilience and incident response capability, while 4.893 art-7 focuses
          on vulnerability reduction controls.

  - source_control: art-12
    target_controls:
      - id: art-11
        relationship: complements
        confidence: 0.93
        rationale: >
          BCB-CONJ-2 art-12 (mandatory 5-year retention of all incident records,
          including non-notified incidents, with minimum content and justification
          for non-notification) complements BACEN-4893 art-11 (annual incident report).
          The Resolucao Conjunta requires granular per-incident records, while 4.893
          requires an annual aggregate report. Together they create a comprehensive
          incident documentation framework.
      - id: art-9
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          BCB-CONJ-2 art-12 (incident record-keeping requirements) intersects with
          BACEN-4893 art-9 (incident response plan). The response plan must define
          how incidents are documented to satisfy the record-keeping requirements
          of both norms.

  - source_control: art-13
    target_controls:
      - id: art-17
        relationship: complements
        confidence: 0.88
        rationale: >
          BCB-CONJ-2 art-13 (sanctions for non-compliance and personal liability of
          the designated director) complements BACEN-4893 art-17 (board responsibilities
          for approving cybersecurity policy and incident response plan). The Resolucao
          Conjunta extends the accountability framework to cover incident notification
          obligations specifically.
      - id: art-18
        relationship: complements
        confidence: 0.92
        rationale: >
          BCB-CONJ-2 art-13 (personal responsibility of the cybersecurity director)
          complements BACEN-4893 art-18 (designation of director responsible for
          cybersecurity policy). The Resolucao Conjunta explicitly ties the director
          designated under 4.893 art-18 to personal liability for incident
          notification compliance.
      - id: art-19
        relationship: complements
        confidence: 0.90
        rationale: >
          BCB-CONJ-2 art-13 (sanctions and director responsibility) complements
          BACEN-4893 art-19 (director responsible for cybersecurity policy execution).
          The Resolucao Conjunta adds incident notification responsibilities to the
          director role defined by 4.893.

  - source_control: art-14
    target_controls:
      - id: art-21
        relationship: complements
        confidence: 0.87
        rationale: >
          BCB-CONJ-2 art-14 (effective date 1 November 2020, transitional provisions,
          and update by Resolucao Conjunta 6/2023) complements BACEN-4893 art-21
          (compliance deadline for institutions without cybersecurity policy). Both
          norms establish transitional periods, and the Resolucao Conjunta aligns
          its timeline with the 4.893 compliance deadlines.
      - id: art-22
        relationship: complements
        confidence: 0.82
        rationale: >
          BCB-CONJ-2 art-14 transitional provisions complement BACEN-4893 art-22
          (deadline for institutions with pre-existing cybersecurity policies). The
          Resolucao Conjunta requires that existing policies be updated to include
          incident notification procedures by its effective date.
      - id: art-26
        relationship: complements
        confidence: 0.85
        rationale: >
          BCB-CONJ-2 art-14 (effective date and subsequent amendments) complements
          BACEN-4893 art-26 (effective date of 4.893). Both establish the temporal
          framework within which institutions must comply, with the Resolucao
          Conjunta entering into force before 4.893 (Nov 2020 vs. Jul 2021).
