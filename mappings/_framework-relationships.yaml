id: framework-relationships
title: "Framework Relationship Matrix"
last_updated: "2026-04-04"
description: >
  Complete relational map of all 136 frameworks showing derivation,
  complementarity, supersession, and mapping relationships.

relationships:

  # ──────────────────────────────────────────────────────────────────
  # Derivation chains — who is based on / derived from what
  # ──────────────────────────────────────────────────────────────────
  derivation_chains:
    # NIST family
    - chain: "NIST 800-53 Rev 5 → NIST 800-171 Rev 3 → CMMC v2"
      type: derived-from
      notes: "800-171 is the CUI subset of 800-53; CMMC certifies 800-171 compliance"
    - chain: "NIST 800-53 Rev 5 → FedRAMP"
      type: derived-from
      notes: "FedRAMP baselines are selected subsets of 800-53 controls with additional parameters"
    - chain: "NIST 800-53 Rev 5 → FISMA"
      type: derived-from
      notes: "FISMA mandates use of NIST 800-53 controls for federal systems"
    - chain: "NIST CSF v2 → NIST 800-53 Rev 5"
      type: informative-reference
      notes: "CSF functions/categories reference 800-53 controls as implementation detail"

    # ISO family
    - chain: "ISO 27001:2022 → ISO 27701"
      type: extension
      notes: "27701 is a privacy extension (PIMS) built on top of 27001 ISMS"
    - chain: "ISO 27001:2022 → TISAX (VDA ISA)"
      type: derived-from
      notes: "TISAX assessment is based on VDA ISA which maps to ISO 27001 with automotive additions"
    - chain: "ISO 27001:2022 → CSA CCM v4"
      type: mapped
      notes: "CSA CCM controls are mapped to ISO 27001 Annex A; CCM adds cloud-specific controls"

    # COSO / SOX / SOC family
    - chain: "COSO Internal Control Framework → SOX ITGC"
      type: derived-from
      notes: "SOX Section 404 relies on COSO framework for internal control evaluation"
    - chain: "COSO → SOC 2"
      type: derived-from
      notes: "SOC 2 Trust Services Criteria are derived from COSO principles"

    # HITRUST
    - chain: "NIST 800-53 Rev 5 + ISO 27001:2022 + HIPAA → HITRUST CSF"
      type: harmonized
      notes: "HITRUST CSF harmonizes multiple frameworks into a single certifiable model"

    # OWASP / Software supply chain
    - chain: "NIST 800-218 (SSDF) → SLSA"
      type: complements
      notes: "SSDF provides process guidance; SLSA provides verifiable build/provenance levels"

    # Brazil
    - chain: "Marco Civil da Internet → Decreto 8.771/2016"
      type: derived-from
      notes: "Decreto 8.771 regulamenta o Marco Civil: neutralidade de rede, padrões de segurança, guarda de registros"
    - chain: "Marco Civil da Internet → LGPD"
      type: complements
      notes: "Marco Civil established internet rights; LGPD added comprehensive data protection"
    - chain: "LGPD + BACEN 4893"
      type: complements
      notes: "BACEN 4893 adds financial-sector-specific cybersecurity requirements alongside LGPD"
    - chain: "BACEN 4893 → CNSP 381"
      type: equivalent-to
      notes: "CNSP 381 é o equivalente da Bacen 4893 para seguradoras/EAPCs/capitalização (SUSEP)"
    - chain: "BACEN 4893 → CVM 35"
      type: equivalent-to
      notes: "CVM 35 é o equivalente da Bacen 4893 para o mercado de capitais (CVM)"
    - chain: "BACEN 4893 → BCB 85"
      type: equivalent-to
      notes: "BCB 85 é o espelho exato da CMN 4.893 para instituições de pagamento (IPs) em vez de IFs"
      mapping_file: "mappings/bcb-85_to_bacen-4893.yaml"
    - chain: "CNSP 381 → SUSEP 638"
      type: derived-from
      notes: "SUSEP 638 implementa e detalha tecnicamente os requisitos gerais de cibersegurança da CNSP 381"
      mapping_file: "mappings/susep-638_to_cnsp-381.yaml"
    - chain: "BCB 3.978 → SUSEP 612"
      type: equivalent-to
      notes: "SUSEP 612 é o espelho da BCB 3.978 (PLD/FT) para o mercado de seguros"
      mapping_file: "mappings/susep-612_to_bcb-3978.yaml"
    - chain: "BCB 3.978 → CVM 50"
      type: equivalent-to
      notes: "CVM 50 é o espelho da BCB 3.978 (PLD/FT) para o mercado de capitais"
      mapping_file: "mappings/cvm-50_to_bcb-3978.yaml"
    - chain: "BCB 3.978 → BCB 44"
      type: equivalent-to
      notes: "BCB 44 é o espelho da BCB 3.978 (PLD/FT) para instituições de pagamento"
    - chain: "CMN 4.557 → Basel III/IV"
      type: implements
      notes: "CMN 4.557 implementa o framework de gestão integrada de riscos de Basileia no Brasil"
    - chain: "CMN 4.557 → CNSP 416"
      type: equivalent-to
      notes: "CNSP 416 é o espelho da CMN 4.557 (controles internos + gestão de riscos) para o mercado segurador"
      mapping_file: "mappings/cnsp-416_to_cmn-4557.yaml"
    - chain: "CMN 4.557 + CMN 4.968 + CMN 4.606"
      type: complements
      notes: "CMN 4.557 (riscos) + CMN 4.968 (auditoria) + CMN 4.606 (compliance) formam as três linhas de defesa para IFs"
    - chain: "BCB Conj. 2 → BCB IN 291"
      type: derived-from
      notes: "IN BCB 291 detalha os procedimentos operacionais de notificação de incidentes exigidos pela Resolução Conjunta 2"

    # Brazil Open ecosystems
    - chain: "Open Finance ≈ Open Insurance"
      type: equivalent-to
      notes: "Ambos são ecossistemas de APIs abertas com arquitetura FAPI/mTLS equivalente — Open Finance para setor financeiro, Open Insurance para seguros"
      mapping_file: "mappings/open-finance_to_open-insurance.yaml"
    - chain: "Pix Security → BCB 85"
      type: complements
      notes: "Pix Security adiciona requisitos específicos de segurança para pagamentos instantâneos sobre a base de cibersegurança de IPs (BCB 85)"
      mapping_file: "mappings/pix-security_to_bcb-85.yaml"
    - chain: "BCB 304 → CVM 175"
      type: complements
      notes: "BCB 304 regula VASPs (custódia/intermediação de criptoativos); CVM 175 regula fundos que investem nesses ativos"
      mapping_file: "mappings/bcb-304_to_cvm-175.yaml"
    - chain: "CVM 175 ≈ CVM 135"
      type: complements
      notes: "CVM 175 (fundos de investimento) e CVM 135 (mercados organizados/tokenização) regulam lados complementares do mercado de capitais"

    # Brazil Governo e SI
    - chain: "PNSI → PNCiber"
      type: derived-from
      notes: "PNCiber (Decreto 11.856/2023) foi criado como instrumento da PNSI (Decreto 9.637/2018, art. 5), especializando a dimensão de cibersegurança"
      mapping_file: "mappings/pnciber_to_pnsi.yaml"
    - chain: "PNSI → IN GSI/PR 1"
      type: derived-from
      notes: "IN GSI/PR 1 regulamenta a PNSI ao estabelecer a estrutura de gestão de SI nos órgãos da APF"
    - chain: "IN GSI/PR 1 → IN GSI/PR 3"
      type: derived-from
      notes: "IN GSI/PR 3 detalha os processos operacionais de SI exigidos pela estrutura de governança da IN1"
    - chain: "IN GSI/PR 1 → IN GSI/PR 5"
      type: derived-from
      notes: "IN GSI/PR 5 especializa os requisitos de SI para computação em nuvem na APF, derivando da IN1"
    - chain: "PNSI → ReGIC"
      type: derived-from
      notes: "ReGIC (Decreto 10.748/2021) implementa a coordenação de incidentes cibernéticos prevista na PNSI"
    - chain: "IN GSI/PR 1 → NIST 800-53 Rev 5"
      type: intersects-with
      notes: "IN GSI/PR 1 intersecta com NIST 800-53 em governança, riscos, incidentes, continuidade e auditoria"
      mapping_file: "mappings/gsi-in1_to_nist-800-53.yaml"
    - chain: "IN GSI/PR 3 → ISO 27001:2022"
      type: intersects-with
      notes: "IN GSI/PR 3 intersecta com ISO 27001 Anexo A em controles operacionais de SI (acesso, redes, criptografia, desenvolvimento seguro)"
      mapping_file: "mappings/gsi-in3_to_iso-27001.yaml"
    - chain: "PNCiber → ReGIC"
      type: complements
      notes: "PNCiber define a política macro de cibersegurança; ReGIC operacionaliza a gestão de incidentes cibernéticos federais"
    - chain: "IN GSI/PR 3 cap-12 → IN GSI/PR 5"
      type: complements
      notes: "IN3 cap. 12 (segurança em nuvem) referencia IN5 para requisitos detalhados de cloud na APF"

    # Brasil — infraestrutura crítica e telecomunicações
    - chain: "PNSIC (Decreto 9.573/2018) → ENSIC (Decreto 10.569/2020)"
      type: derived-from
      notes: "ENSIC é a estratégia que implementa a PNSIC — define ações estratégicas por setor de infraestrutura crítica"
    - chain: "ANEEL 964 → ONS ARCiber"
      type: implements
      notes: "ONS ARCiber (RO-CB.BR.01) operacionaliza os requisitos da Resolução ANEEL 964/2021 em 24 controles mínimos para agentes do SIN"
    - chain: "IEC 62443 → ONS ARCiber"
      type: derived-from
      notes: "ONS ARCiber adota a arquitetura de zonas e condutos da IEC 62443 para segmentação do Ambiente Regulado Cibernético"
    - chain: "NERC CIP → ANEEL 964"
      type: mapped
      notes: "ANEEL 964 foi estruturada com referência ao NERC CIP norte-americano, com adaptações para o sistema elétrico brasileiro"
    - chain: "R-Ciber (ANATEL 740/2020) ↔ IN GSI/PR 3"
      type: intersects-with
      notes: "Ambos tratam de governança de segurança cibernética — R-Ciber para setor privado de telecom, GSI IN3 para APF"
    - chain: "RBAC 107 ≈ RBAC 108"
      type: equivalent-to
      notes: "Regulamentos espelho da ANAC para AVSEC cibernética: RBAC 107 para aeródromos, RBAC 108 para operadores aéreos"
    - chain: "PNSIC → R-Ciber"
      type: complements
      notes: "PNSIC define política macro de infraestruturas críticas; R-Ciber detalha para o setor de telecomunicações"
    - chain: "PNSIC → ANEEL 964"
      type: complements
      notes: "PNSIC define política macro; ANEEL 964 detalha para o setor elétrico"
    - chain: "PNSIC → PNSI"
      type: complements
      notes: "PNSIC (infraestruturas críticas) complementa PNSI (segurança da informação) — ambos são decretos presidenciais"

    # Brasil saude
    - chain: "ANVISA 134 → IEC 62443"
      type: intersects-with
      notes: "IN ANVISA 134 (sistemas computadorizados GMP) intersecta IEC 62443 em requisitos de segurança de sistemas industriais/OT"
    - chain: "ANVISA SaMD → IEC 62443"
      type: intersects-with
      notes: "RDC ANVISA 657 (SaMD) intersecta IEC 62443 em cybersecurity de dispositivos médicos"
    - chain: "ANVISA SaMD → CFM IA"
      type: complements
      notes: "SaMD + IA: ANVISA regula o dispositivo, CFM regula a prática médica com IA"
    - chain: "CFM Telemedicina → PEP"
      type: complements
      notes: "Telemedicina gera registros que devem atender requisitos do PEP (prontuário eletrônico)"
    - chain: "CFM Telemedicina → LGPD"
      type: complements
      notes: "Dados de saúde em telemedicina são dados sensíveis sob a LGPD"
    - chain: "TISS → LGPD"
      type: complements
      notes: "Troca de informações em saúde suplementar deve atender requisitos de proteção de dados da LGPD"
    - chain: "TISS → PEP"
      type: complements
      notes: "Dados do prontuário eletrônico alimentam as transações TISS"
    - chain: "CFM IA → EU AI Act"
      type: intersects-with
      notes: "Ambos regulam classificação de risco de IA; CFM foca na prática médica brasileira"
    - chain: "CFM IA → NIST AI RMF"
      type: intersects-with
      notes: "NIST AI RMF fornece framework de gestão de riscos de IA aplicável ao contexto do CFM IA"

    # Brasil leis gerais e complementares
    - chain: "LAI (Lei 12.527/2011) → Info Classificada (Decreto 7.845/2012)"
      type: derived-from
      notes: "Decreto 7.845 regulates the classification regime established by LAI arts. 23-25"
    - chain: "LAI → LGPD"
      type: complements
      notes: "Transparency (LAI) vs privacy (LGPD) — two complementary regimes for public information"
    - chain: "ANPD Regulamentos → LGPD"
      type: implements
      notes: "Res. CD/ANPD 4/2023 and 15/2024 implement LGPD arts. 48 (incident notification) and 52-54 (sanctions)"
    - chain: "ICP-Brasil → Gov Digital"
      type: complements
      notes: "ICP-Brasil provides electronic signature infrastructure for Gov Digital's digital-first services"
    - chain: "Gov Digital → LAI"
      type: complements
      notes: "Digital Government Act extends LAI's transparency to digital channels and open data"
    - chain: "Crimes Ciber → Marco Civil"
      type: complements
      notes: "Criminal typification (Crimes Ciber) complements Marco Civil's civil rights framework for internet"
    - chain: "Info Classificada → PNSI"
      type: complements
      notes: "Classified information handling (Decreto 7.845) complements the broader national information security policy"

    # EU stack
    - chain: "GDPR → DORA"
      type: complements
      notes: "GDPR covers data protection; DORA adds ICT resilience for financial entities"
    - chain: "NIS2 Directive → DORA"
      type: complements
      notes: "NIS2 is the broad EU cybersecurity directive; DORA is sector-specific for finance"
    - chain: "GDPR → EU AI Act"
      type: complements
      notes: "AI Act adds AI-specific obligations; GDPR still applies for personal data in AI"

    # Australia
    - chain: "APRA CPS 234 → Essential Eight"
      type: complements
      notes: "CPS 234 mandates info security capability for APRA-regulated entities; Essential Eight provides baseline mitigation strategies"

    # Cloud Security family (B9)
    - chain: "ISO 27001:2022 → ISO 27017"
      type: extension
      notes: "ISO 27017 extends ISO 27002 with cloud-specific security controls for cloud service providers and customers"
    - chain: "ISO 27001:2022 → ISO 27018"
      type: extension
      notes: "ISO 27018 extends ISO 27002 with PII protection controls specific to public cloud environments"
    - chain: "ISO 27017 ↔ CSA CCM v4"
      type: complements
      notes: "Both address cloud security controls — ISO 27017 from ISO perspective, CCM from CSA perspective"
    - chain: "NIST CSF v2 ↔ NIST Privacy Framework"
      type: complements
      notes: "Twin frameworks — CSF for cybersecurity, Privacy Framework for privacy risk; share common structure and terminology"

    # Risk Management family (B9/B10)
    - chain: "ISO 31000 → ISO 27005"
      type: derived-from
      notes: "ISO 27005 applies ISO 31000 risk management principles specifically to information security"
    - chain: "NIST 800-37 → NIST 800-53 Rev 5"
      type: complements
      notes: "800-37 defines the Risk Management Framework lifecycle; 800-53 provides the control catalog selected within that lifecycle"
    - chain: "ISO 27005 ↔ NIST 800-37"
      type: equivalent-to
      notes: "Both define systematic approaches to information security risk management — ISO vs NIST methodology"

    # Incident Response family (B9)
    - chain: "NIST 800-61 ↔ ISO 27035"
      type: equivalent-to
      notes: "Both provide comprehensive incident response guidance — NIST perspective vs ISO perspective"
    - chain: "ISO 27035 → ISO 27001:2022"
      type: supports
      notes: "ISO 27035 details the incident management process referenced by ISO 27001 Annex A controls A.5.24-A.5.28"

    # PCI Ecosystem (B10)
    - chain: "PCI DSS v4 → PCI PIN"
      type: complements
      notes: "PCI PIN adds specific PIN security requirements for transactions beyond PCI DSS scope"
    - chain: "PCI DSS v4 → PCI 3DS"
      type: complements
      notes: "PCI 3DS adds 3-D Secure authentication security requirements for e-commerce beyond PCI DSS"
    - chain: "PCI DSS v4 → PCI SSF"
      type: complements
      notes: "PCI SSF provides software security requirements for payment application development, complementing PCI DSS"
    - chain: "PCI DSS v4 → PCI P2PE"
      type: complements
      notes: "PCI P2PE defines point-to-point encryption requirements that can reduce PCI DSS scope"
    - chain: "PCI PIN ↔ PCI P2PE"
      type: complements
      notes: "Both address cryptographic protection of cardholder data — PIN at entry, P2PE in transit"

    # Privacy APAC/MENA (B11)
    - chain: "GDPR → PIPL"
      type: mapped
      notes: "PIPL is China's comprehensive data protection law, structurally influenced by GDPR but with significant differences (data localization, state access)"
    - chain: "GDPR → DPDP Act"
      type: mapped
      notes: "India's DPDP Act 2023 is a principles-based data protection law influenced by GDPR, with unique features (deemed consent, Digital Nagrik rights)"
    - chain: "GDPR → PDPA Singapore"
      type: mapped
      notes: "Singapore PDPA predates GDPR but was amended in 2020 to align on breach notification and consent; co-exists with sector-specific MAS TRM"
    - chain: "PDPA Singapore ↔ MAS TRM"
      type: complements
      notes: "PDPA provides general data protection; MAS TRM adds technology risk management for financial institutions in Singapore"
    - chain: "GDPR → APPI"
      type: mapped
      notes: "Japan's APPI was amended in 2022 to strengthen alignment with GDPR; Japan has EU adequacy decision"
    - chain: "GDPR → PIPA Korea"
      type: mapped
      notes: "Korea's PIPA is one of the most comprehensive Asian privacy laws; Korea has EU adequacy decision since 2023"
    - chain: "GDPR → KVKK"
      type: mapped
      notes: "Turkey's KVKK was directly modeled on the EU Data Protection Directive 95/46/EC and partially aligns with GDPR"

    # Regional Cyber & IoT (B12)
    - chain: "Essential Eight ↔ UK Cyber Essentials"
      type: equivalent-to
      notes: "Both are national baseline cybersecurity schemes — ASD Essential Eight for Australia, NCSC Cyber Essentials for UK"
    - chain: "ISO 27017 ↔ C5:2020 (BSI)"
      type: complements
      notes: "Both address cloud security — ISO 27017 globally, C5 specifically for German/EU cloud compliance with additional operational criteria"
    - chain: "ISO 27001:2022 → K-ISMS-P"
      type: mapped
      notes: "K-ISMS-P is Korea's mandatory ISMS+Privacy certification, structurally aligned with ISO 27001 but with Korean regulatory additions"
    - chain: "FedRAMP ↔ ISMAP"
      type: equivalent-to
      notes: "ISMAP is Japan's government cloud security assessment program, structurally modeled after FedRAMP"
    - chain: "IEC 62443 → ETSI EN 303 645"
      type: derived-from
      notes: "ETSI EN 303 645 adapts industrial OT security principles from IEC 62443 for consumer IoT devices"
    - chain: "NIST 800-53 Rev 5 → NIST 800-161"
      type: derived-from
      notes: "NIST 800-161 extends 800-53 with supply chain risk management controls (SR family)"
    - chain: "NIST 800-161 ↔ SLSA"
      type: complements
      notes: "800-161 provides policy framework for supply chain risk; SLSA provides verifiable technical controls for build integrity"

    # AI Governance (B13)
    - chain: "ISO 42001 ↔ NIST AI RMF"
      type: equivalent-to
      notes: "Both provide systematic AI risk management — ISO 42001 as certifiable AIMS, NIST AI RMF as voluntary framework"
    - chain: "EU AI Act → ISO 42001"
      type: mapped
      notes: "ISO 42001 AIMS can demonstrate conformity with EU AI Act requirements; harmonized standard process underway"
    - chain: "NIST AI RMF ↔ SG AI Governance"
      type: complements
      notes: "Both voluntary AI governance frameworks — NIST for US, IMDA/PDPC for Singapore; share focus on transparency and accountability"
    - chain: "EU AI Act ↔ SG AI Governance"
      type: mapped
      notes: "Both address AI risk classification and governance but with different regulatory approaches (mandatory EU vs voluntary SG)"

    # Business Continuity / DR (B13)
    - chain: "ISO 22301 → ISO 27031"
      type: derived-from
      notes: "ISO 27031 applies ISO 22301 business continuity principles specifically to ICT systems readiness"
    - chain: "ISO 22301 ↔ NIST 800-34"
      type: equivalent-to
      notes: "Both provide comprehensive contingency/continuity planning — ISO for any organization, NIST for US federal systems"
    - chain: "ISO 27031 ↔ NIST 800-34"
      type: equivalent-to
      notes: "Both address ICT contingency planning — ISO from IRBC perspective, NIST from federal system contingency perspective"

    # Healthcare / Pharma (B13)
    - chain: "FDA 21 CFR Part 11 ↔ ANVISA 134"
      type: equivalent-to
      notes: "Both regulate electronic records and computerized systems in pharmaceutical/GMP environments — FDA for US, ANVISA for Brazil"
    - chain: "EU MDR 2017/745 ↔ ANVISA SaMD"
      type: equivalent-to
      notes: "Both regulate software as medical device — EU MDR for European market, ANVISA RDC 657 for Brazilian market"
    - chain: "EU MDR 2017/745 ↔ FDA 21 CFR Part 11"
      type: complements
      notes: "EU MDR covers medical device lifecycle including software; 21 CFR Part 11 specifically addresses electronic records/signatures applicable to medical devices"
    - chain: "EU MDR 2017/745 → IEC 62443"
      type: intersects-with
      notes: "EU MDR cybersecurity requirements for connected medical devices intersect with IEC 62443 industrial security controls"

  # ──────────────────────────────────────────────────────────────────
  # Complementary groups — frameworks that work together
  # ──────────────────────────────────────────────────────────────────
  complementary:
    - group: "Brazilian Compliance Stack"
      frameworks:
        - lgpd
        - marco-civil
        - decreto-8771
        - bacen-4893
        - bcb-85
        - cnsp-381
        - cvm-35
        - bcb-3978
        - susep-612
        - susep-638
        - bcb-conj-2
        - cmn-4557
        - cvm-50
        - cnsp-416
        - cmn-4968
        - cmn-4606
        - bcb-44
        - bcb-in291
        - open-finance
        - open-insurance
        - pix-security
        - bcb-304
        - cvm-175
        - cvm-135
        - pnsi
        - pnciber
        - gsi-in1
        - gsi-in3
        - gsi-in5
        - regic
        - r-ciber
        - aneel-964
        - ons-arciber
        - rbac-107
        - rbac-108
        - pnsic
        - anvisa-134
        - anvisa-samd
        - cfm-telemedicina
        - cfm-ia
        - tiss
        - pep
        - lai
        - gov-digital
        - icp-brasil
        - crimes-ciber
        - anpd-regulamentos
        - info-classificada
      description: >-
        Complete Brazilian digital compliance: internet rights
        (Marco Civil + Decreto 8.771), privacy (LGPD), financial
        (Bacen 4893/BCB 85/CNSP 381/CVM 35/SUSEP 638), AML/CFT
        (BCB 3.978/SUSEP 612/CVM 50/BCB 44), incident notification
        (BCB Conj. 2/BCB IN 291), risk management (CMN 4.557/CNSP 416),
        audit (CMN 4.968), compliance (CMN 4.606), open ecosystems
        (Open Finance/Open Insurance/Pix), crypto (BCB 304/CVM 175/
        CVM 135), government SI (PNSI/PNCiber/GSI INs/ReGIC), critical
        infrastructure (PNSIC/R-Ciber/ANEEL 964/ONS ARCiber/RBAC 107/
        108), health (ANVISA 134/SaMD/CFM Telemedicina/CFM IA/TISS/PEP)

    - group: "EU Digital Regulation Stack"
      frameworks: [gdpr, dora, nis2, eu-ai-act, eu-mdr]
      description: "Complete EU digital regulation: privacy, ICT resilience, cybersecurity, AI governance, medical devices"

    - group: "US Federal Security Stack"
      frameworks: [fisma, nist-800-53-rev5, fedramp, nist-800-171-rev3, cmmc-v2]
      description: "US federal cybersecurity hierarchy from law (FISMA) through controls (800-53) to cloud (FedRAMP) and CUI (171/CMMC)"

    - group: "US Privacy Stack"
      frameworks: [ccpa-cpra, hipaa, sox]
      description: "US sector-specific privacy and transparency requirements"

    - group: "NIST Core Publications"
      frameworks: [nist-csf-v2, nist-800-53-rev5, nist-800-171-rev3, nist-800-218, nist-privacy, nist-800-61, nist-800-34, nist-800-37, nist-800-161]
      description: "NIST cybersecurity, privacy, risk management, incident response, continuity, and supply chain publications forming a coherent body"

    - group: "ISO Information Security Family"
      frameworks: [iso-27001-2022, iso-27701, csa-ccm-v4, tisax, iso-27017, iso-27018, iso-27005, iso-27031, iso-27035]
      description: "ISO 27001 core ISMS plus extensions for privacy (27701), cloud (27017/27018/CCM), automotive (TISAX), risk (27005), ICT readiness (27031), incident management (27035)"

    - group: "Australian Compliance Stack"
      frameworks: [essential-eight, apra-cps-234]
      description: "Australian cybersecurity baseline (Essential Eight) plus APRA-regulated entity requirements"

    - group: "Supply Chain Security Stack"
      frameworks: [slsa, nist-800-218, owasp-asvs, nist-800-161, etsi-en-303-645]
      description: >-
        Software and hardware supply chain integrity: build provenance
        (SLSA), secure development (SSDF), application verification
        (ASVS), supply chain risk (800-161), IoT security
        (ETSI 303 645)

    - group: "Financial Services Global"
      frameworks: [sox, pci-dss-v4, swift-csp, dora, bacen-4893]
      description: "Global financial services compliance spanning internal controls, payment security, messaging, ICT resilience"

    - group: "Healthcare Stack"
      frameworks: [hipaa, hitrust-csf, iso-27001-2022, fda-21-cfr-11, eu-mdr]
      description: >-
        Healthcare information protection from regulation (HIPAA)
        through certifiable framework (HITRUST), ISMS (ISO 27001),
        electronic records (FDA 21 CFR 11), and medical devices
        (EU MDR)

    - group: "Cybersecurity Baseline Stack"
      frameworks: [nist-csf-v2, iso-27001-2022, cis-controls-v8, essential-eight]
      description: "Complementary cybersecurity baselines: risk framework (CSF), ISMS (27001), prioritized controls (CIS), mitigation strategies (E8)"

    - group: "IT Governance Stack"
      frameworks: [cobit-2019, sox, fisma, iso-27001-2022]
      description: "IT governance spanning enterprise governance (COBIT), financial controls (SOX), federal security (FISMA), ISMS (27001)"

    - group: "PCI Ecosystem"
      frameworks: [pci-dss-v4, pci-pin, pci-3ds, pci-ssf, pci-p2pe]
      description: "Complete PCI standards ecosystem: core DSS plus specialized standards for PIN, 3-D Secure, software security, and point-to-point encryption"

    - group: "Privacy APAC/MENA"
      frameworks: [pipl, dpdp-india, pdpa-singapore, appi, pipa-korea, kvkk]
      description: "Asia-Pacific and Middle East privacy laws inspired by or mapped to GDPR, each with jurisdiction-specific requirements"

    - group: "AI Governance Stack"
      frameworks: [eu-ai-act, nist-ai-rmf, iso-42001, sg-ai-governance]
      description: "AI governance frameworks spanning regulation (EU AI Act), voluntary frameworks (NIST AI RMF, SG AI Gov), and certifiable management system (ISO 42001)"

    - group: "Cloud Compliance Stack"
      frameworks: [iso-27017, iso-27018, c5-bsi, csa-ccm-v4, ismap]
      description: "Cloud-specific security and compliance standards: ISO cloud controls (27017/27018), German cloud compliance (C5), CSA cloud matrix (CCM), Japanese cloud assessment (ISMAP)"

    - group: "Business Continuity & DR Stack"
      frameworks: [iso-22301, iso-27031, nist-800-34]
      description: "Business continuity from management system (ISO 22301) through ICT readiness (ISO 27031) to federal contingency planning (NIST 800-34)"

    - group: "Risk Management Stack"
      frameworks: [iso-31000, iso-27005, nist-800-37]
      description: "Risk management hierarchy: general principles (ISO 31000), infosec-specific (ISO 27005), federal RMF lifecycle (NIST 800-37)"

    - group: "Incident Response Stack"
      frameworks: [nist-800-61, iso-27035]
      description: "Incident management pair: NIST computer security incident handling (800-61) and ISO incident management (27035)"

    - group: "Regional Cyber Baselines"
      frameworks: [essential-eight, uk-cyber-essentials, k-isms-p, ismap]
      description: "National cybersecurity baseline schemes: Australia (Essential Eight), UK (Cyber Essentials), Korea (K-ISMS-P), Japan (ISMAP)"

    - group: "IoT & Supply Chain Security"
      frameworks: [iec-62443, etsi-en-303-645, nist-800-161, slsa]
      description: "IoT/OT and supply chain security: industrial (IEC 62443), consumer IoT (ETSI 303 645), supply chain risk (NIST 800-161), build integrity (SLSA)"

    - group: "Healthcare & Pharma Global"
      frameworks: [hipaa, hitrust-csf, fda-21-cfr-11, eu-mdr, anvisa-134, anvisa-samd]
      description: >-
        Global healthcare/pharma compliance: US health privacy
        (HIPAA/HITRUST), electronic records (FDA 21 CFR 11),
        medical devices (EU MDR, ANVISA SaMD), computerized systems
        (ANVISA 134)

  # ──────────────────────────────────────────────────────────────────
  # Supersession — what replaces what
  # ──────────────────────────────────────────────────────────────────
  supersession:
    - superseded: "NIST 800-171 Rev 2"
      superseded_by: nist-800-171-rev3
      date: "2024-05"
      notes: "Rev 3 restructured to align with 800-53 Rev 5; added new control families"

    - superseded: "ISO 27001:2013"
      superseded_by: iso-27001-2022
      date: "2022-10"
      notes: "2022 revision restructured Annex A from 114 controls in 14 clauses to 93 controls in 4 themes"

    - superseded: "NIST CSF v1.1"
      superseded_by: nist-csf-v2
      date: "2024-02"
      notes: "CSF 2.0 added Govern function, expanded supply chain guidance, broadened scope beyond critical infrastructure"

    - superseded: "PCI DSS v3.2.1"
      superseded_by: pci-dss-v4
      date: "2024-03"
      notes: "v4.0 introduced customized approach, updated authentication requirements, expanded encryption scope"

    - superseded: "CIS Controls v7"
      superseded_by: cis-controls-v8
      date: "2021-05"
      notes: "v8 consolidated from 20 to 18 controls, reorganized by activity rather than device ownership"

    - superseded: "CMMC v1"
      superseded_by: cmmc-v2
      date: "2021-11"
      notes: "v2 simplified from 5 levels to 3, removed delta practices, aligned fully with 800-171"

    - superseded: "CSA CCM v3.0.1"
      superseded_by: csa-ccm-v4
      date: "2021-06"
      notes: "v4 restructured control domains, added cloud-native security controls"

    - superseded: "COBIT 5"
      superseded_by: cobit-2019
      date: "2018-11"
      notes: "2019 redesigned governance system with flexible design factors and focus areas"

    - superseded: "NIS Directive (2016)"
      superseded_by: nis2
      date: "2023-01"
      notes: "NIS2 expanded scope to more sectors, introduced stricter penalties, harmonized requirements across EU"

    - superseded: "CCPA (2018)"
      superseded_by: ccpa-cpra
      date: "2023-01"
      notes: "CPRA amended CCPA adding sensitive personal information category, CPPA enforcement, and new consumer rights"

    - superseded: "SWIFT CSP v2023"
      superseded_by: swift-csp
      date: "2024-07"
      notes: "Annual update cycle; latest version adds enhanced controls for API security and cloud connectivity"

