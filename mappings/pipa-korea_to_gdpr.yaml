id: pipa-korea_to_gdpr
title: "PIPA Korea 2020 to GDPR Control Mapping"
source_framework: pipa-korea
target_framework: gdpr
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic

mappings:
  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          Both articles establish the foundational purpose of their respective
          laws. PIPA Art. 1 prescribes the protection of personal information to
          realize the dignity and value of individuals, while GDPR Art. 1 lays
          down rules for the protection of natural persons regarding the
          processing of personal data. Both anchor data protection in fundamental
          rights. PIPA additionally emphasizes constitutional dignity (Korean
          Constitution Art. 10), while GDPR balances protection with free
          movement of data within the EU.

  - source_control: art-3
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          PIPA Art. 3 (eight principles of personal information protection) maps
          directly to GDPR Art. 5 (six principles plus accountability). Both
          establish purpose limitation, data minimization, accuracy, safety/
          integrity, and transparency as foundational principles. PIPA Art. 3
          adds an explicit anonymization preference (para. 7) and a good faith
          compliance principle (para. 8) that GDPR does not state separately.
          GDPR Art. 5(2) accountability principle has no direct PIPA Art. 3
          counterpart but is addressed elsewhere in PIPA.

  - source_control: art-4
    target_controls:
      - id: art-15
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          PIPA Art. 4(3) establishes the right to confirm processing and request
          access, including copies, which maps to GDPR Art. 15 (right of access).
          GDPR Art. 15 provides a more detailed enumeration of what information
          must be disclosed (eight specific items), while PIPA Art. 4 establishes
          the right at a constitutional level with detailed implementation in
          Art. 35.
      - id: art-17
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PIPA Art. 4(4) establishes the right to request correction, deletion,
          and destruction of personal information, mapping to GDPR Art. 17 (right
          to erasure). PIPA Art. 4 also includes the right to suspend processing,
          which GDPR Art. 17 does not cover directly (GDPR handles that in
          Art. 18).

  - source_control: art-15
    target_controls:
      - id: art-6
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Both articles define the lawful bases for processing personal data.
          PIPA Art. 15(1) lists five bases (consent, statutory provision, public
          function, vital interests, legitimate interest), while GDPR Art. 6(1)
          lists six (consent, contract, legal obligation, vital interests, public
          task, legitimate interest). The 2023 PIPA amendment introducing
          legitimate interest (Art. 15(1)(5)) aligned PIPA more closely with
          GDPR. Key difference: GDPR includes contractual necessity as a
          standalone basis, while PIPA subsumes it under other provisions. PIPA
          Art. 15(2) consent notice requirements are more prescriptive than GDPR,
          requiring four mandatory disclosure items.

  - source_control: art-16
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          PIPA Art. 16 (minimum collection principle with reversed burden of
          proof and anti-bundling rules) maps to GDPR Art. 5(1)(c) (data
          minimization principle). Both require collection limited to what is
          necessary. PIPA Art. 16 is more operationally specific: it reverses
          the burden of proof to the processor (para. 1), prohibits service
          denial for refusing optional data (para. 2), and requires separate
          consent for non-essential items (para. 3). GDPR states the principle
          but relies on DPA enforcement guidance for operational details.
      - id: art-6
        relationship: complements
        confidence: 0.72
        rationale: >
          PIPA Art. 16(2)-(3) anti-bundling and separate consent requirements
          complement GDPR Art. 6(1)(a) consent requirements by specifying how
          consent must be structured when collecting beyond the minimum. GDPR
          Art. 7 and EDPB guidance address similar concerns about bundled consent
          but with less statutory specificity.

  - source_control: art-17
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PIPA Art. 17 governs the provision of personal information to third
          parties, requiring consent with five mandatory disclosure items or
          qualifying statutory basis. GDPR Art. 6 covers lawful bases for all
          processing, including disclosure to third parties. PIPA Art. 17 is
          more specific about third-party sharing notice requirements than GDPR
          Art. 6, requiring identification of the specific recipient.
      - id: art-28
        relationship: complements
        confidence: 0.75
        rationale: >
          PIPA Art. 17(4) imposes independent obligations on the receiving third
          party (purpose limitation, safety measures), which complements GDPR
          Art. 28 (processor obligations). However, PIPA Art. 17 does not
          distinguish between controllers and processors as GDPR does; it treats
          third-party provision as a unified concept regardless of the
          recipient's role.

  - source_control: art-18
    target_controls:
      - id: art-44
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          PIPA Art. 28-8 (cross-border transfer, 2023 amendment) and GDPR
          Art. 44 (general principle for international transfers) both establish
          that personal data may only be transferred overseas under specific
          legal mechanisms. Both provide adequacy determinations, contractual
          safeguards (SCCs), consent, and statutory/treaty bases. PIPA Art. 28-8
          was deliberately modeled on the GDPR Chapter V framework, and Korea
          received EU adequacy in December 2021. PIPA requires seven mandatory
          consent disclosure items for cross-border transfers versus GDPR's
          general adequacy/safeguard approach.

  - source_control: art-22
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          PIPA Art. 22 prescribes detailed consent mechanics (separate consent
          for three categories, visual presentation requirements, anti-coercion)
          that implement GDPR Art. 6(1)(a) and Art. 7 consent requirements in
          a more prescriptive manner. GDPR Art. 7 requires freely given,
          specific, informed, and unambiguous consent but provides less
          operational detail on how consent must be presented.
      - id: art-5
        relationship: complements
        confidence: 0.73
        rationale: >
          PIPA Art. 22(2) requirement to visually distinguish important matters
          and Art. 22(5) requirement for recognizable consent complement GDPR
          Art. 5(1)(a) transparency principle by specifying concrete presentation
          standards that GDPR leaves to controller discretion and supervisory
          authority guidance.

  - source_control: art-23
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          PIPA Art. 23 (restriction on processing sensitive information) maps to
          GDPR Art. 9 (processing of special categories of data). Both define
          categories of sensitive data (ideology, beliefs, health, sexual life,
          biometrics) and impose a default prohibition on processing with narrow
          exceptions. PIPA requires "separate consent" (higher threshold than
          GDPR's "explicit consent") and does not recognize legitimate interest
          or vital interests as bases for sensitive data processing. PIPA
          Art. 23(3) gives biometric information its own dedicated paragraph.
          GDPR Art. 9 is not present as a standalone control in this project,
          so mapping targets the closest available GDPR control covering data
          classification principles.
      - id: art-32
        relationship: complements
        confidence: 0.75
        rationale: >
          PIPA Art. 23's sensitive information protections complement GDPR
          Art. 32 (security of processing) because both require heightened
          security measures for sensitive/special category data. PIPA mandates
          separate consent and enhanced encryption for sensitive categories,
          which operationally aligns with GDPR Art. 32's risk-proportionate
          security approach.

  - source_control: art-24
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          PIPA Art. 24 (restriction on processing unique identification
          information such as resident registration numbers) addresses a
          uniquely Korean concern with no direct GDPR equivalent. GDPR Art. 87
          allows member states to determine conditions for processing national
          identification numbers, but GDPR does not mandate specific protections
          at the regulation level. PIPA Art. 24's mandatory AES-256 encryption,
          consent-is-not-sufficient approach for RRNs, and immediate destruction
          obligation far exceed GDPR requirements for any single identifier.
          Mapped to GDPR Art. 5 as the closest principles-level control.
      - id: art-32
        relationship: complements
        confidence: 0.78
        rationale: >
          PIPA Art. 24(3) mandates encryption (AES-256 minimum) for unique
          identification information, which complements GDPR Art. 32(1)(a)
          requirement for pseudonymisation and encryption of personal data. PIPA
          is more prescriptive (specifying the encryption standard) while GDPR
          takes a risk-based approach.

  - source_control: art-28-2
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          PIPA Art. 28-2 through 28-7 (pseudonymized information processing
          framework from the 2020 "Data Three Acts") maps to GDPR Art. 89
          (safeguards for processing for archiving, research, and statistics).
          Both permit processing of pseudonymized data for statistics, scientific
          research, and public interest archiving with specific safeguards. PIPA
          is more restrictive: combination of pseudonymized datasets requires a
          PIPC-designated intermediary, and re-identification is explicitly
          prohibited with mandatory destruction on accidental re-identification.
          GDPR Art. 89 is not present as a standalone control in this project,
          so mapping targets GDPR Art. 5 for principle-level alignment on
          purpose limitation and storage limitation.
      - id: art-25
        relationship: complements
        confidence: 0.77
        rationale: >
          PIPA Art. 28-2 pseudonymization framework complements GDPR Art. 25
          (data protection by design and by default), which explicitly cites
          pseudonymisation as a key technical measure. PIPA provides a dedicated
          legal framework for pseudonymized data processing that GDPR
          encourages through Art. 25 but does not codify as extensively.
      - id: art-32
        relationship: complements
        confidence: 0.75
        rationale: >
          PIPA Art. 28-5 (safety measures for pseudonymized information,
          including separate storage of mapping tables and technical/
          administrative/physical measures) complements GDPR Art. 32 (security
          of processing), which includes pseudonymisation and encryption as
          security measures.

  - source_control: art-29
    target_controls:
      - id: art-32
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          Both articles establish the core security obligation for personal
          data/information processing. PIPA Art. 29 requires technical,
          administrative, and physical measures to prevent loss, theft, leakage,
          forgery, alteration, or damage. GDPR Art. 32 requires appropriate
          technical and organizational measures including encryption,
          confidentiality, availability, resilience, and regular testing. PIPA
          is more prescriptive via the Enforcement Decree (specific password
          lengths, AES-256 encryption, 1-2 year log retention), while GDPR
          takes a risk-based approach. Both are risk-proportionate in principle.

  - source_control: art-30
    target_controls:
      - id: art-30
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PIPA Art. 30 (privacy policy with eleven mandatory items) and GDPR
          Art. 30 (records of processing activities / ROPA) both require
          documented information about processing activities. However, they serve
          different purposes: PIPA Art. 30 is a publicly disclosed privacy
          policy (transparency), while GDPR Art. 30 is an internal record
          (accountability). The substantive content overlaps significantly
          (purposes, data categories, recipients, retention periods, security
          measures), but the audiences differ.
      - id: art-5
        relationship: complements
        confidence: 0.78
        rationale: >
          PIPA Art. 30 privacy policy requirements directly implement the
          transparency principle, complementing GDPR Art. 5(1)(a) (lawfulness,
          fairness, transparency). GDPR addresses privacy notices primarily
          through Art. 13 and Art. 14 (not present as standalone controls in
          this project), making Art. 5 the closest available transparency-
          principle control.

  - source_control: art-31
    target_controls:
      - id: art-35
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          PIPA Art. 31 (mandatory DPO for all personal information processors)
          maps to GDPR Art. 37-39 (DPO designation, position, and tasks). GDPR
          Art. 37 is not present as a standalone control in this project, so
          mapping targets Art. 35 as the closest governance-level control. Key
          difference: PIPA requires DPO designation universally with no size
          threshold, while GDPR Art. 37 only mandates a DPO for public
          authorities, large-scale systematic monitoring, or large-scale special
          category processing. Both protect DPO independence and provide
          resources, though GDPR is more explicit about prohibiting instructions
          regarding DPO task performance.
      - id: art-5
        relationship: complements
        confidence: 0.72
        rationale: >
          PIPA Art. 31 DPO obligations (protection plan, regular surveys,
          complaint handling, internal controls, education) operationally support
          GDPR Art. 5(2) accountability principle. The DPO serves as the
          organizational mechanism for demonstrating compliance with data
          protection principles.

  - source_control: art-33
    target_controls:
      - id: art-35
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Both articles mandate privacy/data protection impact assessments for
          high-risk processing. PIPA Art. 33 requires PIAs primarily for public
          institutions processing sensitive/unique ID data at scale or linking
          large personal information files, with results submitted to the PIPC.
          GDPR Art. 35 requires DPIAs for processing likely to result in high
          risk, including large-scale profiling, special category data, and
          systematic public monitoring. PIPA mandates submission to the PIPC in
          all cases; GDPR requires prior consultation (Art. 36) only when
          residual risk remains high. Both serve the same purpose of proactive
          risk assessment before processing begins.

  - source_control: art-34
    target_controls:
      - id: art-33
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          Both articles establish breach notification obligations with a 72-hour
          deadline for reporting to the supervisory authority. PIPA Art. 34
          requires immediate data subject notification ("without delay") and
          72-hour PIPC reporting for breaches affecting 1,000+ data subjects.
          GDPR Art. 33 requires 72-hour supervisory authority notification for
          breaches likely to result in risk to rights and freedoms. PIPA is
          stricter on data subject notification (immediate vs. GDPR's "without
          undue delay" only for high-risk breaches under Art. 34). Both require
          the same categories of mandatory notification content (nature of
          breach, consequences, measures taken, contact details).

  - source_control: art-35
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          Both articles grant data subjects the right to access their personal
          data. PIPA Art. 35 requires response within 10 calendar days; GDPR
          Art. 15 allows one month (extendable by two months for complex
          requests). Both allow restrictions for statutory reasons and third-party
          protection. GDPR Art. 15 includes more detailed information disclosure
          requirements (eight items vs. PIPA's general access right). Both
          require provision of copies. PIPA's shorter deadline makes it
          operationally more demanding.

  - source_control: art-36
    target_controls:
      - id: art-17
        relationship: equivalent-to
        confidence: 0.88
        rationale: >
          PIPA Art. 36 (right to correction and deletion) maps to GDPR Art. 17
          (right to erasure). Both grant the right to request deletion of
          personal data with exceptions for statutory retention. PIPA Art. 36
          uniquely requires prior exercise of the access right (Art. 35) before
          deletion can be requested. Both impose third-party notification
          obligations (PIPA Art. 36(5), GDPR Art. 19). PIPA Art. 36 also covers
          correction (rectification), which GDPR handles in Art. 16. PIPA
          Art. 36(3) mandates processing suspension during investigation, a
          requirement not present in GDPR Art. 17.
      - id: art-15
        relationship: complements
        confidence: 0.73
        rationale: >
          PIPA Art. 36 correction and deletion rights complement GDPR Art. 15
          because PIPA explicitly requires the data subject to exercise the
          access right (Art. 35) as a prerequisite to correction or deletion.
          This creates a procedural dependency between access and erasure that
          GDPR does not impose.

  - source_control: art-37
    target_controls:
      - id: art-17
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          PIPA Art. 37 (right to suspension of processing, with subsequent
          destruction) partially maps to GDPR Art. 17 (right to erasure),
          since suspension under PIPA typically leads to destruction (Art. 37(3))
          unless retention is statutorily required. However, PIPA's suspension
          right is unconditional (any reason), while GDPR Art. 17 requires
          specific grounds for erasure. GDPR Art. 18 (restriction of processing)
          is a closer parallel but is not present as a standalone control.
      - id: art-15
        relationship: complements
        confidence: 0.70
        rationale: >
          PIPA Art. 37 processing suspension right supports the data subject
          rights framework anchored by GDPR Art. 15. GDPR addresses processing
          restriction in Art. 18 (not present as standalone control), which
          requires specific grounds (accuracy contested, unlawful processing)
          versus PIPA's unconditional right. PIPA's suspension is broader in
          scope but leads to destruction rather than mere restriction.

  - source_control: art-37-2
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          PIPA Art. 37-2 (rights regarding automated decision-making, enacted
          2023) maps to GDPR Art. 22 (automated individual decision-making,
          including profiling). Both grant the right to refuse solely automated
          decisions producing legal or significant effects, require transparency
          about automated processing criteria, and provide for human review.
          GDPR Art. 22 is not present as a standalone control in this project,
          so mapping targets GDPR Art. 5 for principle-level alignment on
          fairness and transparency. PIPA Art. 37-2 was modeled on GDPR Art. 22
          and includes an explicit anti-retaliation provision (para. 5) not
          found in GDPR Art. 22.
      - id: art-35
        relationship: complements
        confidence: 0.76
        rationale: >
          PIPA Art. 37-2 automated decision-making provisions complement GDPR
          Art. 35 (DPIA), which specifically identifies automated decision-making
          with legal/significant effects as a trigger for mandatory impact
          assessment. PIPA Art. 37-2 provides data subject rights that complement
          the organizational obligations in GDPR Art. 35(3)(a) regarding
          systematic profiling with significant effects.

  - source_control: art-39-3
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          PIPA Art. 39-3 (special provisions for information and communications
          service providers) restricts ICSPs to only two lawful bases: contract
          performance and consent. This is a sector-specific implementation of
          GDPR Art. 6 lawful bases, but significantly more restrictive (GDPR
          provides six bases to all controllers). PIPA Art. 39-15
          (extraterritorial application to foreign ICSPs serving Korean users)
          parallels GDPR Art. 3 (territorial scope) but is implemented as
          a sector-specific provision.
      - id: art-5
        relationship: complements
        confidence: 0.74
        rationale: >
          PIPA Art. 39-4 (dormant account handling with mandatory data
          destruction or segregation after inactivity period) complements GDPR
          Art. 5(1)(e) storage limitation principle. GDPR requires retention
          only as long as necessary but does not prescribe specific dormancy
          periods or mandatory segregation. PIPA's approach is more
          operationally prescriptive for the online services sector.

  - source_control: art-61
    target_controls:
      - id: art-83
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PIPA Art. 61-64-2 (PIPC investigation, recommendations, corrective
          orders, provisional measures) maps to GDPR Art. 58 (supervisory
          authority powers) and Art. 83 (administrative fines). GDPR Art. 58 is
          not present as a standalone control in this project. Both establish
          a graduated enforcement hierarchy: investigation, recommendations/
          warnings, binding orders, and emergency measures. PIPA Art. 64-2
          provisional measures (immediate suspension without full investigation)
          parallel GDPR Art. 58(2)(f) temporary limitation on processing. The
          PIPC's powers were significantly strengthened in the 2020 amendment
          elevating it to an independent central administrative agency.

  - source_control: art-70
    target_controls:
      - id: art-83
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Both articles establish the penalty framework for privacy law
          violations. PIPA Art. 70-75 combines criminal penalties (up to 5 years
          imprisonment / KRW 50M fine) with administrative fines (up to KRW
          500M, or 3% of related revenue for ICSPs). GDPR Art. 83 imposes
          administrative fines in two tiers (up to EUR 10M/2% turnover, or EUR
          20M/4% turnover). Key difference: PIPA includes criminal imprisonment,
          which GDPR does not (criminal penalties are left to member states under
          Art. 84). GDPR's revenue-based fines are higher in absolute terms.
          Both consider similar proportionality factors: nature, duration,
          negligence, mitigation efforts, and data volume.
