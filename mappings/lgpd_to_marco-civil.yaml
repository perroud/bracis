id: lgpd_to_marco-civil
title: "LGPD to Marco Civil da Internet Control Mapping"
source_framework: lgpd
target_framework: marco-civil
version: "1.0.0"
last_updated: "2026-04-03"
methodology: semantic

mappings:
  - source_control: art-5
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          O Art. 5 da LGPD estabelece definições fundamentais como dado pessoal,
          dado sensível, titular, controlador e operador. O Art. 5 do Marco Civil
          define conceitos técnicos como internet, terminal, endereço IP e conexão.
          Embora ambos sejam artigos definicionais, operam em domínios distintos —
          a LGPD foca em proteção de dados e a Marco Civil em infraestrutura de
          internet — com sobreposição parcial no conceito de registro de acesso
          que envolve dados pessoais.

  - source_control: art-6
    target_controls:
      - id: art-3
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          O Art. 6 da LGPD enumera os princípios do tratamento de dados pessoais,
          incluindo finalidade, adequação, necessidade, livre acesso, qualidade,
          transparência, segurança, prevenção e não discriminação. O Art. 3 do
          Marco Civil estabelece princípios da disciplina do uso da internet no
          Brasil, como liberdade de expressão, proteção da privacidade e proteção
          dos dados pessoais. Ambos compartilham o compromisso com a proteção da
          privacidade e dos dados pessoais como princípio norteador, sendo que a
          LGPD é significativamente mais detalhada e prescritiva.

  - source_control: art-7
    target_controls:
      - id: art-7
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          O Art. 7 da LGPD define as bases legais para o tratamento de dados,
          incluindo o consentimento como primeira hipótese. O Art. 7 do Marco Civil
          assegura direitos dos usuários de internet, incluindo a inviolabilidade
          da intimidade e da vida privada, e a exigência de consentimento expresso
          para coleta, uso, armazenamento e tratamento de dados pessoais. A
          correlação se dá principalmente pela centralidade do consentimento como
          mecanismo de legitimação do tratamento em ambos os diplomas legais.

  - source_control: art-18
    target_controls:
      - id: art-7
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          O Art. 18 da LGPD garante ao titular o direito de acesso, correção,
          anonimização, portabilidade e eliminação de dados pessoais. O Art. 7 do
          Marco Civil já previa direitos dos usuários como a exclusão definitiva
          dos dados pessoais fornecidos a aplicações de internet (inciso X). A
          LGPD expandiu e detalhou esses direitos de forma muito mais abrangente,
          mas o Marco Civil foi o precursor legislativo dessa proteção no ambiente
          digital brasileiro.

  - source_control: art-46
    target_controls:
      - id: art-10
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          O Art. 46 da LGPD exige medidas de segurança técnicas e administrativas
          para proteger dados pessoais contra acessos não autorizados, situações
          acidentais ou ilícitas de destruição, perda, alteração e comunicação. O
          Art. 10 do Marco Civil determina que o provedor de aplicações deve
          preservar a guarda e o sigilo dos registros de acesso a aplicações, em
          ambiente controlado e de segurança. Ambos convergem na obrigação de
          implementar controles de segurança sobre dados pessoais, diferindo no
          escopo — a LGPD é geral e o Marco Civil focado em registros de acesso.

  - source_control: art-46
    target_controls:
      - id: art-13
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          O Art. 46 da LGPD obriga a adoção de medidas de segurança desde a fase
          de concepção do produto até o tratamento dos dados. O Art. 13 do Marco
          Civil trata da guarda de registros de conexão pelo prazo de um ano, sob
          sigilo e em ambiente controlado e de segurança. A correlação reside na
          exigência comum de manter dados armazenados em condições de segurança,
          embora o Art. 13 seja específico para registros de conexão mantidos por
          provedores de acesso à internet.

  - source_control: art-48
    target_controls:
      - id: art-11
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          O Art. 48 da LGPD obriga o controlador a comunicar à ANPD e ao titular
          a ocorrência de incidente de segurança que possa acarretar risco ou dano
          relevante. O Art. 11 do Marco Civil determina que operações de coleta,
          armazenamento, guarda e tratamento de dados pessoais devem respeitar a
          legislação brasileira e os direitos à privacidade. Embora o Marco Civil
          não preveja expressamente a notificação de incidentes, estabelece o dever
          geral de proteção que a LGPD materializa em obrigação específica de
          comunicação.

  - source_control: art-33
    target_controls:
      - id: art-11
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          O Art. 33 da LGPD regula a transferência internacional de dados pessoais,
          condicionando-a a mecanismos como decisão de adequação, cláusulas
          contratuais e consentimento específico. O Art. 11 do Marco Civil
          estabelece que operações de tratamento de dados pessoais por provedores
          de internet devem obedecer à legislação brasileira, mesmo quando os dados
          estejam armazenados em servidores no exterior. A convergência está na
          pretensão de submeter dados de brasileiros à jurisdição nacional,
          independentemente da localização física dos servidores.

  - source_control: art-52
    target_controls:
      - id: art-12
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          O Art. 52 da LGPD prevê sanções administrativas que vão de advertência
          até multa de 2% do faturamento (limitada a R$ 50 milhões por infração),
          publicização da infração, bloqueio e eliminação dos dados. O Art. 12 do
          Marco Civil prevê sanções por violação às normas de proteção de registros,
          incluindo advertência, multa de até 10% do faturamento, suspensão
          temporária e proibição de exercício das atividades. Ambos estabelecem
          regimes sancionatórios escalonados com proporcionalidade, diferindo nos
          valores máximos e nas autoridades competentes para aplicação.

  - source_control: art-37
    target_controls:
      - id: art-15
        relationship: intersects-with
        confidence: 0.55
        rationale: >
          O Art. 37 da LGPD exige a indicação de um encarregado (DPO) pelo
          tratamento de dados pessoais, responsável por aceitar reclamações,
          prestar esclarecimentos e adotar providências. O Art. 15 do Marco Civil
          trata da guarda de registros de acesso a aplicações de internet por seis
          meses, com possibilidade de ordem judicial para ampliação do prazo. A
          correlação é fraca e indireta — o encarregado da LGPD é uma figura de
          governança enquanto o Art. 15 trata de obrigação de retenção de dados,
          mas ambos refletem a necessidade de accountability no tratamento de dados.

  - source_control: art-14
    target_controls:
      - id: art-29
        relationship: intersects-with
        confidence: 0.50
        rationale: >
          O Art. 14 da LGPD estabelece regras específicas para o tratamento de
          dados pessoais de crianças e adolescentes, exigindo consentimento
          específico de pelo menos um dos pais ou responsável legal. O Art. 29 do
          Marco Civil atribui ao CGI.br (Comitê Gestor da Internet no Brasil) a
          competência para estabelecer diretrizes sobre regulação de conteúdo e
          proteção na internet. A correlação é indireta — o CGI.br pode emitir
          diretrizes sobre proteção de menores no ambiente digital, mas o Art. 29
          não trata especificamente de dados de crianças.

  - source_control: art-20
    target_controls:
      - id: art-9
        relationship: intersects-with
        confidence: 0.45
        rationale: >
          O Art. 20 da LGPD garante ao titular o direito de solicitar revisão de
          decisões tomadas unicamente com base em tratamento automatizado de dados,
          incluindo decisões destinadas a definir perfil pessoal, profissional, de
          consumo e de crédito. O Art. 9 do Marco Civil trata da neutralidade de
          rede, proibindo a degradação de tráfego com base em conteúdo ou origem.
          A correlação é tangencial — ambos buscam evitar discriminação algorítmica,
          mas em contextos distintos: a LGPD em decisões automatizadas sobre
          pessoas e o Marco Civil em tratamento de pacotes de dados na rede.
