id: nerc-cip_to_nist-800-53
title: "NERC CIP to NIST SP 800-53 Rev 5 Control Mapping"
source_framework: nerc-cip
target_framework: nist-800-53-rev5
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # ──────────────────────────────────────────────────────────────────────
  # CIP-002 — BES Cyber System Categorization
  # ──────────────────────────────────────────────────────────────────────
  - source_control: cip-002-r1
    target_controls:
      - id: cm-2
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CIP-002-R1 requires identifying and categorizing all BES Cyber Systems by
          impact level (High, Medium, Low). NIST CM-2 requires developing and maintaining
          a baseline configuration of the system. Both controls depend on a comprehensive
          asset inventory, though CIP-002-R1 focuses on impact-based classification while
          CM-2 focuses on configuration state documentation.
      - id: cm-6
        relationship: complements
        confidence: 0.65
        rationale: >
          CIP-002-R1 establishes the inventory and impact categorization of BES Cyber
          Systems, which determines which security controls apply. NIST CM-6 establishes
          secure configuration settings for system components. The categorization output
          from CIP-002-R1 is a prerequisite for determining what configuration settings
          are required per impact level.
      - id: si-4
        relationship: complements
        confidence: 0.60
        rationale: >
          CIP-002-R1 requires continuous identification of BES Cyber Systems including
          detection of unregistered assets. NIST SI-4 monitors systems for attacks and
          unauthorized connections. An accurate BES Cyber System inventory enables
          effective system monitoring by distinguishing categorized assets from
          unauthorized or unknown systems.

  # ──────────────────────────────────────────────────────────────────────
  # CIP-003 — Security Management Controls
  # ──────────────────────────────────────────────────────────────────────
  - source_control: cip-003-r1
    target_controls:
      - id: ac-1
        relationship: implements
        confidence: 0.90
        rationale: >
          CIP-003-R1 requires documented cyber security policies covering all CIP topic
          areas with CIP Senior Manager approval and 15-month review cycles. NIST AC-1
          requires developing, documenting, and disseminating access control policy and
          procedures. CIP-003-R1 directly implements the policy component of AC-1 within
          the BES Cyber System context, covering access control among its mandatory topics.
      - id: ac-3
        relationship: complements
        confidence: 0.60
        rationale: >
          CIP-003-R1 mandates policies addressing electronic access security for BES
          Cyber Systems. NIST AC-3 requires enforcing approved authorizations for logical
          access. The policies established under CIP-003-R1 define the authorization
          framework that AC-3 enforcement mechanisms implement.

  - source_control: cip-003-r2
    target_controls:
      - id: ac-1
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CIP-003-R2 requires documented cyber security plans for Low Impact BES Cyber
          Systems covering awareness, physical access, electronic access, incident
          response, and malicious code mitigation. NIST AC-1 requires access control
          policy and procedures. Both share the requirement for documented security
          policies and plans, though CIP-003-R2 is scoped to Low Impact systems and
          covers a broader set of security domains beyond access control.
      - id: ac-3
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          CIP-003-R2 part 2.3 requires electronic access controls that permit only
          necessary inbound and outbound access for Low Impact BES Cyber Systems.
          NIST AC-3 requires enforcing approved authorizations for logical access.
          Both controls mandate need-based electronic access enforcement, though
          CIP-003-R2 applies specifically to Low Impact BES environments.
      - id: sc-7
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          CIP-003-R2 part 2.3 requires controlling inbound and outbound electronic
          access for Low Impact BES Cyber Systems. NIST SC-7 requires monitoring and
          controlling communications at managed interfaces. Both address network
          boundary protection through access restriction, though SC-7 provides broader
          boundary protection requirements.
      - id: ir-4
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          CIP-003-R2 part 2.4 requires identifying, classifying, and responding to
          Cyber Security Incidents for Low Impact systems. NIST IR-4 implements
          incident handling covering preparation, detection, containment, eradication,
          and recovery. Both address incident response capabilities, though IR-4
          provides a more comprehensive incident handling framework.

  # ──────────────────────────────────────────────────────────────────────
  # CIP-004 — Personnel and Training
  # ──────────────────────────────────────────────────────────────────────
  - source_control: cip-004-r1
    target_controls:
      - id: ac-1
        relationship: complements
        confidence: 0.65
        rationale: >
          CIP-004-R1 requires a quarterly security awareness program covering physical
          security, electronic access, and BES Cyber System Information handling for
          all personnel with authorized access. NIST AC-1 requires disseminating access
          control policy to relevant personnel. The awareness program complements policy
          dissemination by ensuring personnel understand and can apply access control
          policies in practice.
      - id: ac-2
        relationship: complements
        confidence: 0.60
        rationale: >
          CIP-004-R1 requires awareness reinforcement for personnel who have authorized
          access to BES Cyber Systems. NIST AC-2 manages the lifecycle of system
          accounts. The awareness program complements account management by ensuring
          that personnel with active accounts maintain current knowledge of security
          practices, creating a link between access authorization and security
          competency.

  - source_control: cip-004-r2
    target_controls:
      - id: ac-1
        relationship: complements
        confidence: 0.65
        rationale: >
          CIP-004-R2 mandates comprehensive cyber security training before granting
          access and every 15 months thereafter, covering all CIP topic areas including
          access controls. NIST AC-1 requires personnel understanding of access control
          policy and procedures. The training program ensures personnel are equipped to
          comply with the access control policies established under AC-1.
      - id: ac-2
        relationship: complements
        confidence: 0.60
        rationale: >
          CIP-004-R2 requires training completion before granting authorized access,
          creating a prerequisite gate for account provisioning. NIST AC-2 manages
          account creation, modification, and removal. The training requirement acts
          as an additional authorization condition within the account management
          lifecycle, ensuring only trained personnel receive access.

  - source_control: cip-004-r4
    target_controls:
      - id: ac-2
        relationship: implements
        confidence: 0.90
        rationale: >
          CIP-004-R4 requires a documented access management program covering
          need-based authorization, quarterly access verification, 24-hour termination
          revocation, and 30-day transfer review. NIST AC-2 requires account management
          including account creation, modification, monitoring, disabling, and removal.
          CIP-004-R4 directly implements the core account lifecycle management
          requirements of AC-2 within the BES Cyber System context.
      - id: ac-3
        relationship: implements
        confidence: 0.85
        rationale: >
          CIP-004-R4 part 4.1 requires access authorization based on need for electronic
          access, physical access, and BES Cyber System Information access. NIST AC-3
          requires enforcing approved authorizations for logical access. CIP-004-R4
          implements the authorization enforcement component of AC-3 through its
          documented need-based access approval process.
      - id: ac-6
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CIP-004-R4 part 4.1 requires need-based access authorization, quarterly
          verification of continued need, and timely revocation upon role changes.
          NIST AC-6 requires employing least privilege. Both controls enforce the
          principle that access should be limited to what is necessary, though AC-6
          also addresses process-level privilege restriction.

  # ──────────────────────────────────────────────────────────────────────
  # CIP-005 — Electronic Security Perimeter(s)
  # ──────────────────────────────────────────────────────────────────────
  - source_control: cip-005-r1
    target_controls:
      - id: sc-7
        relationship: implements
        confidence: 0.90
        rationale: >
          CIP-005-R1 requires establishing Electronic Security Perimeters with
          Electronic Access Points, default-deny access rules, and malicious
          communication detection. NIST SC-7 requires monitoring and controlling
          communications at external and internal managed interfaces, implementing
          subnetworks, and connecting to external networks only through managed
          interfaces. CIP-005-R1 directly implements boundary protection for BES
          Cyber Systems using the same architectural principles as SC-7.
      - id: si-4
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CIP-005-R1 part 1.5 requires methods for detecting known or suspected
          malicious communications at the Electronic Security Perimeter boundary.
          NIST SI-4 requires monitoring systems for attacks and unauthorized local,
          network, and remote connections. Both controls mandate detection capabilities
          at network boundaries, though SI-4 covers broader system monitoring beyond
          perimeter points.
      - id: ac-3
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CIP-005-R1 part 1.3 requires documented inbound and outbound access
          permissions with default-deny posture. NIST AC-3 requires enforcing approved
          authorizations for logical access. Both mandate that only explicitly
          authorized access is permitted, though CIP-005-R1 focuses on network-level
          access at ESP boundaries while AC-3 addresses logical access more broadly.

  - source_control: cip-005-r2
    target_controls:
      - id: ia-2
        relationship: implements
        confidence: 0.85
        rationale: >
          CIP-005-R2 part 2.3 requires multi-factor authentication for all Interactive
          Remote Access sessions. NIST IA-2 requires uniquely identifying and
          authenticating organizational users. CIP-005-R2 implements the MFA component
          of IA-2 specifically for remote access to BES Cyber Systems, directly
          satisfying the authentication requirement for remote sessions.
      - id: sc-7
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CIP-005-R2 requires routing all remote access through an Intermediate System
          (bastion host) with encrypted sessions. NIST SC-7 requires connecting to
          external networks through managed interfaces with boundary protection.
          The Intermediate System requirement implements the managed interface concept
          of SC-7 for remote access scenarios.
      - id: ac-3
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          CIP-005-R2 restricts Interactive Remote Access to go through Intermediate
          Systems with encryption and MFA, preventing direct access to BES Cyber
          Assets. NIST AC-3 enforces approved authorizations for logical access.
          Both controls restrict how users can access protected systems, though
          CIP-005-R2 specifically addresses the remote access path while AC-3
          covers all logical access enforcement.

  # ──────────────────────────────────────────────────────────────────────
  # CIP-006 — Physical Security of BES Cyber Systems
  # ──────────────────────────────────────────────────────────────────────
  - source_control: cip-006-r1
    target_controls:
      - id: ac-3
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          CIP-006-R1 restricts physical access to BES Cyber Systems to authorized
          individuals only, with two-factor physical access for High Impact systems.
          NIST AC-3 enforces approved authorizations for logical access. Both enforce
          the principle of authorized-only access, though CIP-006-R1 addresses physical
          access controls (card readers, biometrics, locks) while AC-3 addresses logical
          access enforcement.
      - id: au-2
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CIP-006-R1 parts 1.8 and 1.9 require logging all authorized and unauthorized
          physical access with 90-day retention. NIST AU-2 requires identifying event
          types that the system is capable of logging. Both controls address the
          requirement to log access events, though CIP-006-R1 focuses on physical
          access logging while AU-2 covers system event logging more broadly.
      - id: si-4
        relationship: complements
        confidence: 0.65
        rationale: >
          CIP-006-R1 parts 1.4 through 1.7 require monitoring for and alerting on
          unauthorized physical access attempts. NIST SI-4 requires monitoring systems
          for attacks and unauthorized connections. The physical access monitoring
          complements electronic system monitoring by providing a complete picture
          of unauthorized access attempts across both physical and logical domains.

  # ──────────────────────────────────────────────────────────────────────
  # CIP-007 — System Security Management
  # ──────────────────────────────────────────────────────────────────────
  - source_control: cip-007-r1
    target_controls:
      - id: cm-6
        relationship: implements
        confidence: 0.85
        rationale: >
          CIP-007-R1 requires enabling only necessary ports and services and protecting
          against unnecessary physical I/O ports. NIST CM-6 requires establishing
          secure configuration settings including restrictions on functions, ports,
          protocols, and services. CIP-007-R1 directly implements the port and service
          hardening aspect of CM-6 for BES Cyber Systems.
      - id: sc-7
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          CIP-007-R1 restricts network-accessible ports to only those that are needed,
          implementing a default-deny posture at the host level. NIST SC-7 controls
          communications at managed interfaces. Both reduce the attack surface through
          port restriction, though CIP-007-R1 operates at the host level while SC-7
          operates at the network boundary level.

  - source_control: cip-007-r2
    target_controls:
      - id: cm-2
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CIP-007-R2 requires tracking and applying security patches with 35-day
          evaluation and implementation cycles. NIST CM-2 requires maintaining a
          current baseline configuration including applied patches. Both controls
          require tracking the patch state of systems, though CIP-007-R2 focuses
          on the patch management process while CM-2 focuses on documenting the
          resulting baseline configuration.
      - id: si-4
        relationship: complements
        confidence: 0.60
        rationale: >
          CIP-007-R2 requires tracking vendor advisories and CVE databases for
          applicable patches, which involves monitoring for known vulnerabilities.
          NIST SI-4 requires monitoring systems for attacks and security-relevant
          events. Patch intelligence monitoring complements operational security
          monitoring by identifying vulnerabilities before they are exploited.
      - id: cm-6
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          CIP-007-R2 requires applying security patches or creating mitigation plans
          within defined timelines. NIST CM-6 requires establishing and enforcing
          secure configuration settings. Patch management is a key mechanism for
          maintaining the secure configuration state that CM-6 requires, as unpatched
          systems deviate from their intended secure configuration.

  - source_control: cip-007-r3
    target_controls:
      - id: si-4
        relationship: implements
        confidence: 0.80
        rationale: >
          CIP-007-R3 requires deploying methods to deter, detect, or prevent malicious
          code, mitigating detected threats, and maintaining signature updates.
          NIST SI-4 requires monitoring systems for attacks, unauthorized connections,
          and anomalous activity. CIP-007-R3 implements the malicious code detection
          and prevention component of system monitoring that SI-4 requires.
      - id: cm-6
        relationship: complements
        confidence: 0.60
        rationale: >
          CIP-007-R3 requires deploying and maintaining malicious code prevention tools
          including application whitelisting and antivirus with current signatures.
          NIST CM-6 establishes secure configuration settings for system components.
          Malicious code prevention tool configuration is part of the overall secure
          configuration that CM-6 governs.

  - source_control: cip-007-r4
    target_controls:
      - id: au-2
        relationship: implements
        confidence: 0.90
        rationale: >
          CIP-007-R4 part 4.1 requires logging security events including successful
          logins, failed access attempts, and detected malicious code. NIST AU-2
          requires identifying event types the system logs in support of the audit
          function. CIP-007-R4 directly implements AU-2 by defining the minimum set
          of security events that must be logged for BES Cyber Systems.
      - id: au-6
        relationship: implements
        confidence: 0.85
        rationale: >
          CIP-007-R4 part 4.4 requires reviewing summarized or sampled logged events
          at least every 15 calendar days to identify undetected incidents.
          NIST AU-6 requires reviewing and analyzing audit records for indications of
          inappropriate or unusual activity. CIP-007-R4 directly implements the
          periodic audit record review requirement of AU-6.
      - id: si-4
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CIP-007-R4 part 4.2 requires generating alerts for security events including
          malicious code detection and logging failures. NIST SI-4 requires monitoring
          systems and generating alerts when indications of compromise are detected.
          Both controls mandate real-time alerting on security-relevant events, with
          CIP-007-R4 specifying the minimum alert-worthy events for BES Cyber Systems.

  - source_control: cip-007-r5
    target_controls:
      - id: ia-2
        relationship: implements
        confidence: 0.85
        rationale: >
          CIP-007-R5 part 5.1 requires enforcing authentication of interactive user
          access to BES Cyber Systems. NIST IA-2 requires uniquely identifying and
          authenticating organizational users. CIP-007-R5 directly implements user
          authentication for BES Cyber System access, satisfying the core IA-2
          requirement in the critical infrastructure context.
      - id: ac-2
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CIP-007-R5 parts 5.2 and 5.3 require inventorying all enabled default and
          generic accounts and identifying individuals with shared account access.
          NIST AC-2 requires managing system accounts including creating, enabling,
          modifying, and removing accounts. Both address account inventory and
          management, though AC-2 covers the full account lifecycle while CIP-007-R5
          focuses on authentication enforcement and default account management.
      - id: ac-3
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CIP-007-R5 enforces authentication including password complexity, rotation,
          and brute-force protection. NIST AC-3 enforces approved authorizations for
          logical access. CIP-007-R5 implements the authentication mechanism that
          enables AC-3 enforcement, ensuring that only authenticated users can exercise
          their authorized access.

  # ──────────────────────────────────────────────────────────────────────
  # CIP-008 — Incident Reporting and Response Planning
  # ──────────────────────────────────────────────────────────────────────
  - source_control: cip-008-r1
    target_controls:
      - id: ir-4
        relationship: implements
        confidence: 0.90
        rationale: >
          CIP-008-R1 requires documented incident response plans covering
          identification, classification, response, roles, handling procedures,
          testing every 15 months, and lessons learned. NIST IR-4 requires implementing
          incident handling capability including preparation, detection, analysis,
          containment, eradication, and recovery. CIP-008-R1 directly implements
          the comprehensive incident handling capability that IR-4 requires.
      - id: au-6
        relationship: complements
        confidence: 0.65
        rationale: >
          CIP-008-R1 part 1.1 requires processes to identify and classify Cyber
          Security Incidents, which depends on security event analysis. NIST AU-6
          requires reviewing and analyzing audit records for inappropriate or unusual
          activity. Audit record analysis is the primary mechanism for identifying
          incidents that trigger the CIP-008-R1 response process.

  # ──────────────────────────────────────────────────────────────────────
  # CIP-009 — Recovery Plans for BES Cyber Systems
  # ──────────────────────────────────────────────────────────────────────
  - source_control: cip-009-r1
    target_controls:
      - id: ir-4
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CIP-009-R1 requires documented recovery plans including activation
          conditions, roles, backup processes, verification, forensic data
          preservation, and testing. NIST IR-4 includes recovery as part of the
          incident handling lifecycle. Both address recovery from security incidents,
          though CIP-009-R1 provides dedicated recovery planning requirements while
          IR-4 includes recovery as one phase of broader incident handling.
      - id: cm-2
        relationship: complements
        confidence: 0.65
        rationale: >
          CIP-009-R1 part 1.3 requires backup and storage of information needed to
          recover BES Cyber System functionality, including configuration baselines.
          NIST CM-2 requires maintaining baseline configurations under configuration
          control. Recovery depends on having documented, backed-up baselines that
          CM-2 establishes, making recovery planning complementary to baseline
          configuration management.
      - id: au-2
        relationship: complements
        confidence: 0.55
        rationale: >
          CIP-009-R1 part 1.5 requires preserving data to determine the cause of
          a Cyber Security Incident that triggers recovery. NIST AU-2 defines event
          types to be logged for the audit function. The forensic data preservation
          requirement depends on comprehensive event logging established under AU-2
          to enable post-incident root cause analysis.

  # ──────────────────────────────────────────────────────────────────────
  # CIP-010 — Configuration Change Management and Vulnerability Assessments
  # ──────────────────────────────────────────────────────────────────────
  - source_control: cip-010-r1
    target_controls:
      - id: cm-2
        relationship: implements
        confidence: 0.90
        rationale: >
          CIP-010-R1 part 1.1 requires developing a baseline configuration including
          OS/firmware versions, application software, custom software, network ports,
          and applied patches. NIST CM-2 requires developing, documenting, and
          maintaining a current baseline configuration. CIP-010-R1 directly implements
          CM-2 by specifying the exact elements that constitute a BES Cyber System
          baseline configuration.
      - id: cm-6
        relationship: implements
        confidence: 0.85
        rationale: >
          CIP-010-R1 parts 1.2 through 1.4 require authorizing, documenting, and
          verifying configuration changes to ensure security controls are not adversely
          affected. NIST CM-6 requires establishing configuration settings and
          identifying, documenting, and approving deviations. CIP-010-R1 implements
          the configuration change management process that CM-6 requires.

  - source_control: cip-010-r2
    target_controls:
      - id: cm-6
        relationship: implements
        confidence: 0.85
        rationale: >
          CIP-010-R2 requires monitoring for unauthorized changes to baseline
          configuration at least every 35 days and investigating detected deviations.
          NIST CM-6 requires monitoring and controlling changes to configuration
          settings. CIP-010-R2 directly implements the configuration monitoring
          and change detection component of CM-6.
      - id: si-4
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CIP-010-R2 requires detecting and investigating unauthorized configuration
          changes, which may indicate security compromise. NIST SI-4 requires monitoring
          systems for attacks and unauthorized activity. Configuration change detection
          is a form of system monitoring that intersects with SI-4, as unauthorized
          changes can indicate intrusion or compromise.

  # ──────────────────────────────────────────────────────────────────────
  # CIP-011 — Information Protection
  # ──────────────────────────────────────────────────────────────────────
  - source_control: cip-011-r1
    target_controls:
      - id: ac-3
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CIP-011-R1 part 1.2 requires methods to protect and securely handle BES
          Cyber System Information during storage, transit, and use. NIST AC-3 enforces
          approved authorizations for logical access to information and system resources.
          Both controls mandate restricting access to sensitive information to authorized
          personnel only, though CIP-011-R1 specifically addresses BES Cyber System
          Information classification and handling.
      - id: sc-7
        relationship: complements
        confidence: 0.65
        rationale: >
          CIP-011-R1 requires protecting BES Cyber System Information including during
          transit between systems. NIST SC-7 monitors and controls communications at
          managed interfaces. Boundary protection complements information protection by
          controlling the pathways through which sensitive BES information can flow.
      - id: cm-6
        relationship: complements
        confidence: 0.60
        rationale: >
          CIP-011-R1 part 1.3 requires preventing unauthorized retrieval of BES Cyber
          System Information from assets prior to disposal or reuse. NIST CM-6
          establishes secure configuration settings. Media sanitization procedures are
          part of the configuration management lifecycle, as decommissioned assets
          must have their sensitive data securely removed.

  # ──────────────────────────────────────────────────────────────────────
  # CIP-013 — Supply Chain Risk Management
  # ──────────────────────────────────────────────────────────────────────
  - source_control: cip-013-r1
    target_controls:
      - id: sr-3
        relationship: implements
        confidence: 0.90
        rationale: >
          CIP-013-R1 requires supply chain risk management plans for High and Medium
          Impact BES Cyber Systems covering procurement risk assessment, vendor incident
          notification, vulnerability disclosure, software integrity verification, and
          vendor access controls. NIST SR-3 requires establishing processes to identify
          and address supply chain weaknesses and employing supply chain controls.
          CIP-013-R1 directly implements the supply chain risk management process that
          SR-3 requires.
      - id: si-4
        relationship: complements
        confidence: 0.60
        rationale: >
          CIP-013-R1 part 1.2 requires vendor notification of incidents and
          vulnerabilities, plus software integrity verification. NIST SI-4 requires
          monitoring systems for attacks and security-relevant events. Vendor
          vulnerability and incident monitoring complements operational system
          monitoring by extending visibility into the supply chain threat landscape.
      - id: cm-2
        relationship: complements
        confidence: 0.55
        rationale: >
          CIP-013-R1 part 1.2 requires verifying software integrity and authenticity
          of vendor-supplied software and patches. NIST CM-2 requires maintaining a
          current baseline configuration. Software integrity verification ensures that
          components entering the baseline configuration have not been tampered with,
          protecting the integrity of the documented baseline.
