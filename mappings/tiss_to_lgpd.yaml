id: tiss_to_lgpd
title: "TISS to LGPD Control Mapping"
source_framework: tiss
target_framework: lgpd
version: "1.0.0"
last_updated: "2026-04-04"
methodology: structural
description: >
  Mapeamento entre o Padrao de Troca de Informacoes na Saude Suplementar (TISS -
  RN 557/2022 da ANS) e a Lei Geral de Protecao de Dados Pessoais (LGPD - Lei
  13.709/2018). O TISS regulamenta a troca eletronica de dados entre operadoras de
  planos de saude, prestadores e beneficiarios, envolvendo tratamento massivo de dados
  pessoais e sensiveis de saude que devem atender integralmente a LGPD.

mappings:
  - source_control: art-9
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.90
        rationale: >
          TISS art-9 (Componente de Seguranca) implementa o art-46 da LGPD (Medidas
          de Seguranca), pois define o conjunto de requisitos tecnicos de seguranca
          para protecao de dados nas transacoes TISS, incluindo controles contra
          acessos nao autorizados e tratamento ilicito de dados pessoais de saude.
      - id: art-49
        relationship: implements
        confidence: 0.85
        rationale: >
          O Componente de Seguranca do TISS (art-9) implementa o art-49 da LGPD,
          que exige que sistemas de tratamento sejam estruturados para atender
          requisitos de seguranca e padroes de boas praticas.

  - source_control: art-11
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.92
        rationale: >
          TISS art-11 (Autenticacao de Usuarios e Sistemas) implementa o art-46 da
          LGPD ao estabelecer mecanismos de autenticacao que previnem acessos nao
          autorizados a dados pessoais de saude nas transacoes eletronicas entre
          operadoras e prestadores.
      - id: art-47
        relationship: complements
        confidence: 0.78
        rationale: >
          A autenticacao obrigatoria do art-11 complementa o principio de seguranca
          desde a concepcao (art-47 da LGPD), pois mecanismos de autenticacao
          devem ser incorporados desde o design dos sistemas TISS.

  - source_control: art-12
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.93
        rationale: >
          TISS art-12 (Criptografia de Dados em Transito e em Repouso) implementa
          diretamente o art-46 da LGPD como medida tecnica de seguranca para
          protecao de dados pessoais sensiveis de saude durante transmissao e
          armazenamento nas transacoes eletronicas do padrao TISS.

  - source_control: art-13
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.90
        rationale: >
          TISS art-13 (Controle de Acesso Baseado em Perfis) implementa o art-46
          da LGPD ao restringir o acesso a dados pessoais de saude conforme perfis
          de autorizacao, garantindo que apenas profissionais autorizados acessem
          informacoes necessarias para suas funcoes.
      - id: art-49
        relationship: implements
        confidence: 0.82
        rationale: >
          O controle de acesso por perfis do art-13 implementa o art-49 da LGPD,
          que exige que sistemas sejam estruturados com requisitos de seguranca e
          padroes de boas praticas, incluindo o principio de menor privilegio.

  - source_control: art-14
    target_controls:
      - id: art-11
        relationship: implements
        confidence: 0.90
        rationale: >
          TISS art-14 (Protecao de Dados Pessoais de Saude) implementa o art-11
          da LGPD (Tratamento de Dados Pessoais Sensiveis), pois dados trocados
          via TISS sao dados sensiveis de saude que exigem bases legais especificas
          e protecoes adicionais previstas no regime de dados sensiveis da LGPD.
      - id: art-6
        relationship: complements
        confidence: 0.82
        rationale: >
          A protecao de dados pessoais de saude do art-14 complementa o art-6 da
          LGPD (Principios), em especial os principios de finalidade, adequacao,
          necessidade e seguranca que devem orientar todo tratamento de dados nas
          transacoes TISS.

  - source_control: art-15
    target_controls:
      - id: art-37
        relationship: implements
        confidence: 0.88
        rationale: >
          TISS art-15 (Trilhas de Auditoria e Rastreabilidade) implementa o art-37
          da LGPD (Registro das Operacoes de Tratamento), pois as trilhas de
          auditoria documentam todas as operacoes de tratamento de dados pessoais
          realizadas nas transacoes eletronicas TISS.
      - id: art-50
        relationship: complements
        confidence: 0.80
        rationale: >
          As trilhas de auditoria do art-15 complementam o art-50 da LGPD (Boas
          Praticas e Governanca), pois mecanismos de rastreabilidade sao elementos
          essenciais das regras de boas praticas e dos mecanismos internos de
          supervisao previstos na LGPD.
      - id: art-46
        relationship: complements
        confidence: 0.78
        rationale: >
          A rastreabilidade do art-15 complementa as medidas de seguranca do art-46,
          pois logs de auditoria sao controles tecnicos fundamentais para detectar
          acessos nao autorizados e tratamento inadequado de dados pessoais.

  - source_control: art-16
    target_controls:
      - id: art-46
        relationship: implements
        confidence: 0.88
        rationale: >
          TISS art-16 (Conformidade LGPD e Notificacao de Incidentes) implementa o
          art-46 da LGPD (Medidas de Seguranca) ao exigir que operadoras e
          prestadores adotem medidas de seguranca no contexto das transacoes TISS,
          com referencia explicita a conformidade com a LGPD.
      - id: art-48
        relationship: implements
        confidence: 0.92
        rationale: >
          O art-16 do TISS implementa o art-48 da LGPD (Comunicacao de Incidente
          de Seguranca), exigindo notificacao de incidentes que envolvam dados
          pessoais de saude trocados via padrao TISS a autoridade nacional e aos
          titulares afetados.
      - id: art-11
        relationship: complements
        confidence: 0.80
        rationale: >
          A conformidade LGPD do art-16 complementa o art-11 da LGPD, reconhecendo
          que dados transacionados via TISS incluem dados sensiveis de saude que
          exigem regime especial de protecao.

  - source_control: art-19
    target_controls:
      - id: art-46
        relationship: complements
        confidence: 0.82
        rationale: >
          TISS art-19 (Certificacao Digital ICP-Brasil) complementa o art-46 da
          LGPD como medida tecnica de seguranca, garantindo autenticidade e
          integridade das transacoes eletronicas TISS por meio de certificacao
          digital qualificada, protegendo dados pessoais contra falsificacao.

  - source_control: art-8
    target_controls:
      - id: art-49
        relationship: complements
        confidence: 0.80
        rationale: >
          TISS art-8 (Componente de Comunicacao) complementa o art-49 da LGPD
          (Estruturacao de Sistemas de Tratamento), pois os padroes de comunicacao
          do TISS definem como sistemas devem ser estruturados para troca segura
          de dados pessoais de saude entre operadoras e prestadores.
      - id: art-46
        relationship: complements
        confidence: 0.78
        rationale: >
          Os protocolos de comunicacao do art-8 complementam as medidas de seguranca
          do art-46, pois a padronizacao de comunicacao e um controle tecnico que
          reduz riscos de exposicao ou tratamento inadequado de dados pessoais.

  - source_control: art-5
    target_controls:
      - id: art-50
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          TISS art-5 (Componente Organizacional) mapeia ao art-50 da LGPD (Boas
          Praticas e Governanca), pois o componente organizacional do TISS define
          regras de governanca, procedimentos operacionais e papeis dos agentes
          que devem estar alinhados ao programa de governanca previsto na LGPD.

  - source_control: art-6
    target_controls:
      - id: art-18
        relationship: complements
        confidence: 0.75
        rationale: >
          TISS art-6 (Componente de Conteudo e Estrutura) complementa o art-18 da
          LGPD (Direitos do Titular), pois a padronizacao do conteudo e estrutura
          das informacoes de saude facilita o exercicio dos direitos de acesso,
          portabilidade e confirmacao de existencia dos dados pelo titular.

  - source_control: art-21
    target_controls:
      - id: art-18
        relationship: complements
        confidence: 0.78
        rationale: >
          TISS art-21 (Interoperabilidade com SUS e Registro Eletronico de Saude)
          complementa o art-18 da LGPD (Direitos do Titular), pois a
          interoperabilidade entre sistemas facilita a portabilidade de dados
          pessoais de saude entre operadoras, prestadores e o sistema publico,
          viabilizando o exercicio efetivo dos direitos do titular.
      - id: art-46
        relationship: complements
        confidence: 0.75
        rationale: >
          A interoperabilidade do art-21 complementa o art-46 da LGPD, pois a
          integracao entre sistemas deve preservar as medidas de seguranca durante
          a troca de dados pessoais entre diferentes ambientes e plataformas.
