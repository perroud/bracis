id: cvm-50_to_bcb-3978
title: "CVM 50 to BCB 3.978 Control Mapping"
source_framework: cvm-50
target_framework: bcb-3978
version: "1.0.0"
last_updated: "2026-04-03"
methodology: semantic
description: >
  Mapeamento entre a Resolucao CVM 50/2021 (PLD/FT no mercado de capitais) e a Circular
  BCB 3.978/2020 (PLD/FT para instituicoes financeiras). Ambas regulamentam prevencao a
  lavagem de dinheiro com estrutura e requisitos substancialmente equivalentes, diferindo
  no publico-alvo regulado: a CVM 50 aplica-se a participantes do mercado de capitais
  (corretoras, administradores de carteira, fundos) e a BCB 3.978 a instituicoes
  financeiras autorizadas pelo BCB.

mappings:
  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Ambos definem o objeto e escopo da regulamentacao de PLD/FT para seus
          respectivos setores regulados.

  - source_control: art-5
    target_controls:
      - id: art-1
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Ambos estabelecem a obrigatoriedade de politica de PLD/FT com abordagem
          baseada em risco, governanca e atualizacao periodica.

  - source_control: art-6
    target_controls:
      - id: art-2
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Ambos definem a avaliacao interna de risco (AIR) como fundamento da politica
          de PLD/FT, com categorizacao de clientes, produtos e regioes por nivel de risco.

  - source_control: art-11
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Ambos estabelecem requisitos de cadastro de clientes (KYC) com identificacao
          completa, documentacao e verificacao de identidade.

  - source_control: art-12
    target_controls:
      - id: art-6
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Ambos exigem identificacao do beneficiario final com cadeia de participacao
          societaria e controle efetivo.

  - source_control: art-13
    target_controls:
      - id: art-7
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Ambos estabelecem procedimentos especificos para Pessoas Expostas Politicamente
          (PEP) com aprovacao de altos executivos e monitoramento reforcado.

  - source_control: art-14
    target_controls:
      - id: art-8
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Ambos definem procedimentos de diligencia reforcada (EDD) para clientes e
          operacoes de maior risco, e diligencia simplificada (SDD) para menor risco.

  - source_control: art-21
    target_controls:
      - id: art-12
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Ambos exigem registro completo de operacoes com dados do cliente, natureza,
          valor, data e demais informacoes necessarias para rastreabilidade.

  - source_control: art-22
    target_controls:
      - id: art-13
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Ambos definem prazos minimos de retencao de registros de operacoes (5 anos
          apos o encerramento do relacionamento ou da operacao).

  - source_control: art-26
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Ambos estabelecem obrigatoriedade de monitoramento continuo de operacoes
          com sistemas automatizados para deteccao de atipicidades.

  - source_control: art-27
    target_controls:
      - id: art-16
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Ambos definem parametros e cenarios de monitoramento para deteccao de
          operacoes suspeitas de lavagem de dinheiro.

  - source_control: art-29
    target_controls:
      - id: art-18
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Ambos estabelecem triagem automatica contra listas de sancoes (CSNU, OFAC,
          EU) e bloqueio automatico de ativos quando aplicavel.

  - source_control: art-36
    target_controls:
      - id: art-22
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Ambos definem a obrigatoriedade de comunicacao ao COAF de operacoes suspeitas
          de lavagem de dinheiro e financiamento do terrorismo.

  - source_control: art-37
    target_controls:
      - id: art-23
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Ambos estabelecem prazos para comunicacao ao COAF: 24 horas para terrorismo,
          e prazos especificos para demais situacoes suspeitas.

  - source_control: art-39
    target_controls:
      - id: art-25
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Ambos proibem alertar o cliente sobre a comunicacao ao COAF (tipping-off
          prohibition), garantindo a integridade da investigacao.

  - source_control: art-43
    target_controls:
      - id: art-30
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Ambos exigem programa de treinamento continuo para colaboradores sobre
          PLD/FT, com atualizacao periodica e registro de participacao.
