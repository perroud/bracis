id: pipl_to_gdpr
title: "PIPL to GDPR Control Mapping"
source_framework: pipl
target_framework: gdpr
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic

mappings:
  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          PIPL Articles 1-3 (purpose, scope, and extraterritorial application) map directly
          to GDPR Art. 1 (subject-matter and objectives). Both establish the legislative
          purpose of protecting personal data/information of natural persons and define
          extraterritorial scope. PIPL Art. 3 mirrors GDPR Art. 3 in applying to overseas
          processors targeting or monitoring individuals within their respective jurisdictions.
          PIPL additionally frames personal information protection alongside state security
          interests, which has no GDPR equivalent.

  - source_control: art-4
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          PIPL Articles 4-6 (definition of personal information, lawfulness, legitimacy,
          necessity, good faith, purpose limitation, data minimization) map to GDPR Art. 5
          (principles relating to processing). Both establish core processing principles
          including lawfulness, purpose limitation, and data minimization. PIPL's "necessity"
          principle is interpreted more strictly than GDPR's proportionality standard. PIPL
          Art. 4's definition of personal information is functionally equivalent to GDPR
          Art. 4(1)'s definition of personal data, with both excluding anonymized data.

  - source_control: art-9
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.88
        rationale: >
          PIPL Articles 7-10 (transparency, data quality, accountability, lawful use) map
          to GDPR Art. 5 principles on transparency (5.1.a), accuracy (5.1.d), integrity
          and confidentiality (5.1.f), and accountability (5.2). PIPL Art. 7 requires
          disclosure of processing methods in addition to purposes, which is stricter than
          GDPR's transparency principle. PIPL Art. 9's accountability principle parallels
          GDPR Art. 5(2). PIPL Art. 10's prohibition on processing that endangers national
          security has no GDPR counterpart.
      - id: art-25
        relationship: complements
        confidence: 0.72
        rationale: >
          PIPL Art. 9's accountability obligation for processors to take necessary security
          measures complements GDPR Art. 25 (data protection by design and by default).
          Both require proactive organizational responsibility for data protection, though
          GDPR Art. 25 is more prescriptive about embedding privacy into system design
          from inception.

  - source_control: art-13
    target_controls:
      - id: art-6
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          PIPL Art. 13 (lawful bases for processing) maps directly to GDPR Art. 6
          (lawfulness of processing). Both enumerate exhaustive lawful bases that must be
          established before processing begins. PIPL lists seven bases while GDPR lists six.
          The critical difference is PIPL's absence of a "legitimate interest" basis, which
          significantly narrows the grounds for commercial processing. Most GDPR legitimate
          interest processing requires consent under PIPL. Despite this structural
          difference, the articles serve the same regulatory function.

  - source_control: art-14
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          PIPL Articles 14-16 (consent requirements, withdrawal, anti-tying) map to GDPR
          Art. 6 consent provisions and Article 7 consent conditions. PIPL requires consent
          to be "voluntary and explicit with full knowledge," which is a higher bar than
          GDPR's "unambiguous indication" for regular processing. PIPL Art. 15's right to
          withdraw parallels GDPR Art. 7(3). PIPL Art. 16's anti-tying provision (no
          service refusal for consent withdrawal from non-essential processing) is more
          explicit than GDPR Art. 7(4)'s voluntariness requirement.
      - id: art-5
        relationship: complements
        confidence: 0.75
        rationale: >
          PIPL Art. 14's re-consent requirement when processing purpose, method, or data
          categories change reinforces GDPR Art. 5(1)(b) purpose limitation principle. Both
          frameworks prohibit repurposing personal data without appropriate authorization,
          though PIPL mandates fresh consent specifically while GDPR allows compatibility
          assessments.

  - source_control: art-17
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.87
        rationale: >
          PIPL Art. 17 (obligation to inform before processing) maps to GDPR Art. 15
          (right of access) and GDPR Articles 13-14 (information obligations). Both require
          disclosure of processor identity, processing purposes, data categories, and
          retention periods before or at the time of processing. PIPL is more prescriptive,
          mandating "conspicuous" presentation in "clear and plain language" and requiring
          processing rules to be "convenient to read and keep." GDPR Art. 15 is referenced
          here as the closest available control in this project's GDPR framework.

  - source_control: art-23
    target_controls:
      - id: art-28
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          PIPL Art. 23 (entrusted processing) maps directly to GDPR Art. 28 (processor).
          Both require written agreements specifying processing purpose, duration, data
          categories, and security measures. Both prohibit sub-processing without the
          original controller's consent. Both require data return or deletion upon contract
          termination. The provisions are functionally equivalent in establishing the
          controller-processor contractual framework. PIPL Art. 24 (sharing with other
          controllers) adds a separate consent requirement that goes beyond GDPR Art. 28.
      - id: art-30
        relationship: complements
        confidence: 0.73
        rationale: >
          PIPL Art. 23's requirement to track entrusted processing parameters (purpose,
          time limit, method, categories) complements GDPR Art. 30 (records of processing
          activities). Both require systematic documentation of processing relationships
          and parameters, supporting organizational accountability.

  - source_control: art-25
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          PIPL Articles 24-25 (automated decision-making transparency, fairness, anti-
          discrimination) map to GDPR Art. 5 principles on fairness and transparency
          (5.1.a). Both frameworks require that processing be fair and transparent,
          including when automated decision-making is involved. PIPL's explicit prohibition
          on algorithmic price discrimination and mandatory opt-out for personalized
          marketing are more prescriptive than GDPR Art. 5's general fairness principle.
          Note: GDPR Art. 22 (automated decision-making) is the closer equivalent but is
          not available in this project's GDPR control set; mapped to Art. 5 as the
          available fairness provision.

  - source_control: art-26
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          PIPL Art. 26 (image collection and personal identification equipment in public
          places) maps to GDPR Art. 6 (lawfulness of processing). Both require a lawful
          basis for surveillance and biometric processing. PIPL Art. 26 is more specific
          than GDPR Art. 6, restricting public-place surveillance data to public security
          purposes only and mandating signage. GDPR addresses public surveillance through
          Art. 6 lawful basis analysis combined with Art. 9 special categories (biometric
          data) and Art. 35 DPIA requirements. PIPL Art. 27's treatment of publicly
          disclosed data parallels GDPR Art. 6(1)(f) legitimate interest with opt-out.
      - id: art-35
        relationship: complements
        confidence: 0.72
        rationale: >
          PIPL Art. 26's surveillance-specific requirements complement GDPR Art. 35
          (DPIA), which mandates impact assessments for systematic monitoring of publicly
          accessible areas on a large scale. Both frameworks impose heightened scrutiny on
          public-area surveillance, though through different mechanisms: PIPL via direct
          purpose limitation and GDPR via the DPIA process.

  - source_control: art-28
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PIPL Articles 28-30 (sensitive personal information definition and processing
          requirements) map to GDPR Art. 5 data processing principles and GDPR Art. 9
          (special categories). PIPL's sensitive data definition is broader than GDPR Art. 9,
          including financial accounts, location tracking, and all data of minors under 14.
          Both frameworks impose heightened processing requirements for sensitive/special
          category data. PIPL requires "specific purpose, sufficient necessity, and strict
          protection measures" plus separate consent, while GDPR Art. 9 requires explicit
          consent or one of nine other legal bases. GDPR Art. 9 is not available in this
          project's GDPR control set; Art. 5 is referenced as the available principles control.
      - id: art-32
        relationship: complements
        confidence: 0.78
        rationale: >
          PIPL Art. 28's requirement for "strict protection measures" when processing
          sensitive data complements GDPR Art. 32 (security of processing). Both mandate
          technical and organizational security measures proportional to data sensitivity.
          GDPR Art. 32 specifies pseudonymization, encryption, confidentiality, integrity,
          availability, and regular testing. PIPL's "strict protection" standard for
          sensitive data aligns with the heightened security expectations under GDPR Art. 32
          for high-risk processing.

  - source_control: art-31
    target_controls:
      - id: art-25
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          PIPL Art. 31 (protection of minors under 14) maps to GDPR Art. 25 (data
          protection by design and by default) as both require proactive protective
          measures for vulnerable individuals. PIPL mandates parental consent and
          specialized processing rules for minors under 14, while GDPR Art. 8 (not in
          this project's control set) sets the threshold at 16 (adjustable to 13). GDPR
          Art. 25's privacy-by-default requirement supports the principle of enhanced
          protection for children's data. Both frameworks recognize that minors require
          heightened data protection measures.
      - id: art-6
        relationship: complements
        confidence: 0.73
        rationale: >
          PIPL Art. 31's parental consent requirement for minors under 14 complements
          GDPR Art. 6 lawful basis requirements. GDPR Art. 8 (conditions for child
          consent) is the direct equivalent but is not in this project's control set.
          Both frameworks require parental verification before processing children's
          data, though with different age thresholds and implementation details.

  - source_control: art-44
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          PIPL Articles 44-45 (right to know, right to decide, right of access, right to
          copy, data portability) map to GDPR Art. 15 (right of access by the data subject).
          Both grant individuals the right to access their personal data, obtain copies, and
          receive information about processing activities. PIPL Art. 45 additionally
          establishes data portability (comparable to GDPR Art. 20, not in this project's
          control set). PIPL's right to "restrict or refuse processing" parallels GDPR
          Art. 18 (restriction) and Art. 21 (objection), neither of which are in the
          project's GDPR control set.

  - source_control: art-47
    target_controls:
      - id: art-17
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          PIPL Articles 46-47 (right to correction, right to deletion) map directly to GDPR
          Art. 17 (right to erasure). Both establish the right to request deletion of personal
          data under specified conditions. PIPL Art. 47 goes further by imposing proactive
          deletion obligations on processors (when purpose is achieved, services cease, retention
          expires, consent is withdrawn, or processing was unlawful), whereas GDPR Art. 17
          primarily frames erasure as a data subject right. PIPL Art. 46 (right to correction)
          corresponds to GDPR Art. 16 (not in the project's control set). PIPL's "freeze"
          alternative when deletion is technically difficult has no direct GDPR equivalent.

  - source_control: art-49
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          PIPL Articles 48-50 (right to explanation of processing rules, right to refuse
          automated decisions, post-mortem data rights) map to GDPR Art. 5 transparency
          and fairness principles. PIPL Art. 48's general right to explanation of processing
          rules is broader than any single GDPR provision. PIPL Art. 49's right to refuse
          automated decisions parallels GDPR Art. 22 (not in the project's control set).
          PIPL Art. 50's post-mortem data rights for close relatives have no GDPR equivalent
          as GDPR generally does not protect deceased persons' data. Art. 5 is referenced as
          the available transparency and fairness control.
      - id: art-25
        relationship: complements
        confidence: 0.72
        rationale: >
          PIPL Art. 49's requirement for explainability of automated decisions complements
          GDPR Art. 25 (data protection by design and by default). Building explainability
          into automated decision-making systems is a practical implementation of privacy by
          design. Both frameworks envision that data protection measures must be embedded
          into system architecture from the outset.

  - source_control: art-51
    target_controls:
      - id: art-32
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          PIPL Articles 51-53 (internal management, classified data management, encryption,
          de-identification, access control, training, incident response plans, DPO appointment,
          overseas representative) map directly to GDPR Art. 32 (security of processing). Both
          require technical and organizational measures proportional to processing risks,
          including encryption, access controls, and regular testing. PIPL Art. 51 is more
          prescriptive with six enumerated measure categories while GDPR Art. 32 provides a
          flexible risk-based framework. PIPL Art. 52 (DPO appointment) parallels GDPR Art. 37
          (not in the project's control set). PIPL Art. 53 (overseas representative) parallels
          GDPR Art. 27 (not in the project's control set).
      - id: art-25
        relationship: complements
        confidence: 0.78
        rationale: >
          PIPL Art. 51's mandate to adopt classified data management, de-identification, and
          security-by-design measures complements GDPR Art. 25 (data protection by design and
          by default). Both require embedding data protection measures into organizational
          processes and technical architecture rather than treating them as afterthoughts.

  - source_control: art-55
    target_controls:
      - id: art-35
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          PIPL Articles 54-56 (compliance audits, personal information protection impact
          assessment, assessment content, three-year retention) map directly to GDPR Art. 35
          (data protection impact assessment). Both require impact assessments before high-risk
          processing activities begin. PIPL Art. 55 triggers on five scenarios (sensitive data,
          automated decisions, third-party sharing, cross-border transfers, significant impact
          processing), which is broader than GDPR Art. 35(3)'s three specific triggers. Both
          require assessment of lawfulness, necessity, risk, and proportionality of measures.
          PIPL uniquely mandates three-year retention of assessment reports and processing records.
      - id: art-30
        relationship: complements
        confidence: 0.75
        rationale: >
          PIPL Art. 54's regular compliance audit obligation and Art. 56's processing record
          retention complement GDPR Art. 30 (records of processing activities). Both frameworks
          require systematic documentation of processing activities, though PIPL's mandatory
          three-year retention and regular audit requirement are more prescriptive than GDPR
          Art. 30's general record-keeping obligation.

  - source_control: art-57
    target_controls:
      - id: art-33
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          PIPL Art. 57 (breach notification) maps directly to GDPR Art. 33 (notification of
          a personal data breach to the supervisory authority). Both require notification to
          the supervisory authority and affected individuals upon discovering a data breach.
          Both require disclosure of data categories affected, cause, potential harm, remedial
          measures, and contact information. PIPL requires "immediate" notification without a
          fixed deadline, while GDPR specifies 72 hours. PIPL's notification threshold is lower
          (any actual or potential leak, distortion, or loss) compared to GDPR's "risk to rights
          and freedoms" standard. Both allow exemption from individual notification where harm
          has been effectively mitigated.

  - source_control: art-38
    target_controls:
      - id: art-44
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          PIPL Art. 38 (conditions for cross-border transfer) maps directly to GDPR Art. 44
          (general principle for international transfers). Both establish that cross-border
          transfers require specific legal mechanisms. PIPL provides three mechanisms (CAC
          security assessment, certification, standard contractual clauses) while GDPR provides
          adequacy decisions, appropriate safeguards (SCCs, BCRs), and derogations. PIPL does
          not recognize country-level adequacy decisions, requiring entity-level or mechanism-
          level authorization. The processor retains ongoing responsibility for overseas
          recipient compliance under both frameworks.

  - source_control: art-40
    target_controls:
      - id: art-44
        relationship: superset-of
        confidence: 0.82
        rationale: >
          PIPL Articles 40-41 (data localization for critical infrastructure operators, foreign
          law enforcement request blocking) map to GDPR Art. 44 (general transfer principle)
          and GDPR Art. 48 (transfers not authorized by Union law, not in the project's control
          set). PIPL Art. 40 imposes mandatory data localization for CII operators and high-
          volume processors with specific thresholds (1 million individuals, 100,000 transferred
          abroad), which has no direct GDPR equivalent. PIPL Art. 41's blocking statute for
          foreign judicial requests parallels GDPR Art. 48 but is more absolute, requiring
          government approval for any foreign law enforcement data access. GDPR Art. 44 is the
          closest available control addressing transfer restrictions.

  - source_control: art-43
    target_controls:
      - id: art-44
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          PIPL Articles 42-43 (restricted entity list, retaliatory measures) map loosely to
          GDPR Art. 44 as both deal with cross-border data transfer governance. However, PIPL's
          restricted entity list and reciprocal retaliatory measures are unique provisions with
          no GDPR equivalent. PIPL Art. 42 empowers the CAC to block data transfers to specific
          overseas entities that endanger Chinese citizens' rights or national security. PIPL
          Art. 43 enables reciprocal measures against countries imposing discriminatory data
          restrictions on China. These geopolitical enforcement mechanisms reflect PIPL's dual
          purpose of individual protection and state interest protection. Confidence is lower
          due to the significant conceptual divergence from GDPR's transfer framework.

  - source_control: art-62
    target_controls:
      - id: art-83
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          PIPL Articles 60-62 (CAC supervisory authority, regulatory powers, specialized
          rulemaking) map to GDPR Art. 83 (administrative fines) as both address the
          regulatory enforcement framework. GDPR Art. 51 (supervisory authority) would be the
          closer equivalent but is not in the project's control set. PIPL establishes a multi-
          regulator model with the CAC as lead coordinator alongside sector-specific regulators,
          while GDPR uses a lead supervisory authority approach. Art. 62's mandate for
          specialized rules on AI, facial recognition, and sensitive data signals future
          regulatory focus areas unique to China's enforcement approach. Art. 83 is the
          closest available GDPR control addressing regulatory enforcement structure.

  - source_control: art-66
    target_controls:
      - id: art-83
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          PIPL Art. 66 (penalties) maps directly to GDPR Art. 83 (administrative fines). Both
          establish tiered penalty structures based on violation severity. PIPL standard tier:
          up to 1 million RMB; serious tier: up to 50 million RMB or 5% of annual turnover.
          GDPR tier 1: up to EUR 10 million or 2% turnover; tier 2: up to EUR 20 million or 4%
          turnover. PIPL additionally imposes personal liability on responsible individuals
          (100,000-1,000,000 RMB) and can prohibit individuals from serving in senior management
          roles. PIPL Art. 69's reverse burden of proof for tort liability and Art. 71's criminal
          liability provisions go beyond GDPR's penalty framework, making PIPL's enforcement
          regime more severe in scope.
