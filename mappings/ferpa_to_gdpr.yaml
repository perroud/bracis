id: ferpa_to_gdpr
title: "FERPA to GDPR Control Mapping"
source_framework: ferpa
target_framework: gdpr
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # ──────────────────────────────────────────────────────
  # FAMILY: rights
  # ──────────────────────────────────────────────────────

  - source_control: ferpa-inspect
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          FERPA right to inspect and review education records (34 CFR
          section 99.10) is functionally equivalent to GDPR Art. 15 right of
          access by the data subject. Both grant individuals the right to
          obtain access to personal data held by the controller, require the
          controller to respond within a statutory deadline (45 days for
          FERPA, one month for GDPR), and provide the right to receive copies
          of records. Both require the controller to present records in an
          intelligible form with explanations. GDPR Art. 15 is broader,
          additionally requiring disclosure of processing purposes, data
          categories, recipients, and automated decision-making information.
      - id: art-5
        relationship: complements
        confidence: 0.70
        rationale: >
          FERPA's right to inspect and review reinforces GDPR Art. 5(1)(a)
          transparency principle and Art. 5(2) accountability. Both frameworks
          require controllers to be transparent about data held and to
          demonstrate compliance through verifiable access mechanisms. The
          obligation to provide explanations and interpretations of records
          (34 CFR section 99.10(b)) aligns with the fairness and transparency
          dimensions of Art. 5.

  - source_control: ferpa-amend
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          FERPA right to request amendment of inaccurate, misleading, or
          privacy-violating records (34 CFR section 99.20) intersects with
          GDPR Art. 5(1)(d) accuracy principle, which requires personal data
          to be accurate and kept up to date with every reasonable step taken
          to ensure inaccurate data is erased or rectified without delay.
          Both impose an obligation on the controller to maintain accurate
          records and provide a mechanism for correction when inaccuracies
          are identified.
      - id: art-17
        relationship: intersects-with
        confidence: 0.60
        rationale: >
          FERPA's amendment process for records that violate student privacy
          rights (34 CFR section 99.20(a)) partially overlaps with GDPR
          Art. 17 right to erasure, which covers unlawfully processed data
          (Art. 17(1)(d)). However, FERPA amendment does not grant a general
          right to deletion -- it is limited to correcting factual
          inaccuracies and privacy violations. The hearing process under
          34 CFR section 99.22 has no GDPR equivalent; GDPR provides a
          direct right to erasure rather than a hearing-based amendment
          procedure.

  - source_control: ferpa-consent
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          FERPA's consent requirement for disclosure of PII from education
          records (34 CFR section 99.30) intersects with GDPR Art. 6(1)(a)
          consent as a lawful basis for processing. Both require the data
          subject's affirmative authorization before personal data can be
          shared with third parties. FERPA consent must specify records,
          purpose, and recipients (section 99.30(b)), paralleling GDPR's
          requirement that consent be specific and informed. Key difference:
          FERPA consent applies only to disclosure, not to the initial
          collection, while GDPR consent covers all processing operations.
          GDPR provides five additional lawful bases beyond consent, while
          FERPA treats consent as the default with enumerated exceptions.
      - id: art-5
        relationship: complements
        confidence: 0.75
        rationale: >
          FERPA's consent specificity requirements -- specifying records,
          purpose, and recipients -- directly reinforce GDPR Art. 5(1)(a)
          transparency, Art. 5(1)(b) purpose limitation, and Art. 5(1)(c)
          data minimisation. Both frameworks require that data sharing be
          purpose-bound and limited to what is necessary, with the data
          subject informed of the scope.
      - id: art-32
        relationship: complements
        confidence: 0.55
        rationale: >
          FERPA's requirement that electronic signatures identify and
          authenticate the individual (34 CFR section 99.30(d)) aligns with
          GDPR Art. 32 security of processing, which mandates appropriate
          technical measures including authentication of authorized users.
          Both require security controls around consent collection mechanisms.

  - source_control: ferpa-complaint
    target_controls:
      - id: art-83
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          FERPA's complaint mechanism with the Family Policy Compliance Office
          (34 CFR section 99.63) intersects with GDPR Art. 83 administrative
          fines framework. Both establish enforcement pathways for
          non-compliance. However, the mechanisms differ fundamentally: FERPA
          enforcement is complaint-driven through a single federal office with
          the ultimate sanction of loss of federal funding, while GDPR
          empowers supervisory authorities to impose administrative fines up
          to EUR 20M or 4% of global turnover. Both consider severity,
          intentionality, and cooperation as factors.
      - id: art-5
        relationship: complements
        confidence: 0.60
        rationale: >
          FERPA's complaint and investigation process reinforces GDPR
          Art. 5(2) accountability. Both frameworks require controllers to
          maintain compliance evidence and documentation that can be produced
          during investigations. The 180-day complaint window under FERPA
          creates a retention obligation for compliance evidence that aligns
          with the accountability principle's requirement to demonstrate
          compliance at any point.

  # ──────────────────────────────────────────────────────
  # FAMILY: disclosure
  # ──────────────────────────────────────────────────────

  - source_control: ferpa-directory
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          FERPA's directory information exception (34 CFR section 99.37) --
          allowing disclosure of non-sensitive student information without
          consent after public notice and opt-out opportunity -- intersects
          with GDPR Art. 6(1)(f) legitimate interest basis. Both permit
          processing without explicit consent under defined conditions, but
          the mechanisms differ: FERPA uses a notice-and-opt-out model for
          specific data categories, while GDPR requires a documented
          legitimate interest assessment with a balancing test. Both require
          proportionality and both provide individuals the right to object.
      - id: art-5
        relationship: complements
        confidence: 0.75
        rationale: >
          FERPA's requirement to provide public notice of directory
          information designations and opt-out rights reinforces GDPR
          Art. 5(1)(a) transparency principle. Both require controllers to
          inform data subjects about data practices before processing occurs.
          FERPA's restriction that SSNs and access-enabling IDs cannot be
          designated as directory information aligns with Art. 5(1)(c) data
          minimisation.

  - source_control: ferpa-legitimate
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          FERPA's school officials with legitimate educational interest
          exception (34 CFR section 99.31(a)(1)) intersects with GDPR
          Art. 6(1)(f) legitimate interest basis. Both permit data processing
          without consent when the processing serves a legitimate purpose
          connected to the controller's operations. FERPA requires the
          institution to define "school official" and "legitimate educational
          interest" in its annual notification, paralleling GDPR's
          requirement for a documented legitimate interest assessment. Both
          require the controller to limit access to what is necessary for the
          stated purpose.
      - id: art-28
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          FERPA's treatment of contractors and outsourced service providers
          as school officials (34 CFR section 99.31(a)(1)(i)(B)) intersects
          with GDPR Art. 28 processor obligations. Both require contractual
          controls over third parties processing personal data: FERPA
          requires direct control, use limitations, and redisclosure
          restrictions; GDPR Art. 28 requires data processing agreements with
          documented instructions, confidentiality, security measures, audit
          rights, and data return/deletion. Both hold the primary controller
          responsible for third-party compliance.

  - source_control: ferpa-transfer
    target_controls:
      - id: art-44
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          FERPA's transfer exception for student enrollment between schools
          (34 CFR section 99.31(a)(2)) intersects with GDPR Art. 44 general
          principle for international data transfers. Both regulate the
          transfer of personal data between entities and require safeguards.
          However, FERPA focuses on inter-institutional transfers within the
          U.S. education system for enrollment purposes, while GDPR Art. 44
          focuses on cross-border transfers requiring adequacy decisions or
          appropriate safeguards. Both require the transferred data to
          maintain equivalent protection at the receiving entity.
      - id: art-5
        relationship: complements
        confidence: 0.70
        rationale: >
          FERPA's requirement to notify parents of record transfers and to
          limit transfers to enrollment-related purposes reinforces GDPR
          Art. 5(1)(a) transparency and Art. 5(1)(b) purpose limitation.
          Both require that data transfers be transparent to the data subject
          and restricted to the specific purpose that justifies the transfer.

  - source_control: ferpa-health-safety
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          FERPA's health or safety emergency exception (34 CFR
          section 99.36) intersects with GDPR Art. 6(1)(d) vital interests
          basis. Both permit disclosure of personal data without consent when
          necessary to protect the life or safety of the data subject or
          another person. FERPA requires an "articulable and significant
          threat" and applies a "totality of the circumstances" test; GDPR
          Art. 6(1)(d) requires processing to be "necessary to protect vital
          interests." Both are narrowly construed and time-limited to the
          emergency period.
      - id: art-5
        relationship: complements
        confidence: 0.60
        rationale: >
          FERPA's documentation requirements for emergency disclosures --
          recording the emergency, the basis for determination, and the
          recipients -- reinforce GDPR Art. 5(2) accountability. Both
          frameworks require controllers to document and justify
          exception-based processing, ensuring that emergency powers are not
          abused and that decisions can be reviewed after the fact.

  - source_control: ferpa-judicial
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          FERPA's judicial order and subpoena exception (34 CFR
          section 99.31(a)(9)) intersects with GDPR Art. 6(1)(c) legal
          obligation basis. Both permit disclosure of personal data without
          consent when required by law. FERPA requires advance notification
          to the data subject (with exceptions for sealed orders), paralleling
          GDPR's general transparency obligations. Both require the controller
          to produce only the specific records required by the legal process,
          applying data minimisation principles.
      - id: art-5
        relationship: complements
        confidence: 0.65
        rationale: >
          FERPA's requirement to notify parents/students before complying
          with a subpoena (34 CFR section 99.31(a)(9)(ii)) and to produce
          only responsive records aligns with GDPR Art. 5(1)(a) transparency
          and Art. 5(1)(c) data minimisation. Both frameworks balance legal
          compliance obligations with data subject rights by requiring
          notification where legally possible and limiting disclosure scope.

  - source_control: ferpa-studies
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          FERPA's studies and research exception (34 CFR section 99.31(a)(6))
          intersects with GDPR Art. 6(1)(e) public interest basis, which
          covers processing necessary for scientific research purposes
          (further elaborated in Art. 89). Both permit processing of personal
          data for research purposes under specific safeguards. FERPA requires
          written agreements, purpose limitations, de-identification, and
          data destruction; GDPR Art. 89 requires appropriate technical and
          organisational safeguards including pseudonymisation.
      - id: art-25
        relationship: complements
        confidence: 0.70
        rationale: >
          FERPA's requirement that studies be conducted in a manner that does
          not permit personal identification (34 CFR section 99.31(a)(6)(ii))
          aligns with GDPR Art. 25 data protection by design, specifically
          the mandate to implement pseudonymisation and data minimisation.
          Both require privacy-preserving measures to be built into research
          data handling from the design stage.
      - id: art-5
        relationship: complements
        confidence: 0.70
        rationale: >
          FERPA's requirement that research data be destroyed when no longer
          needed (34 CFR section 99.31(a)(6)(ii)(B)) reinforces GDPR
          Art. 5(1)(e) storage limitation. Both mandate that personal data
          used for research purposes not be retained beyond the period
          necessary for the study, requiring proactive deletion.

  # ──────────────────────────────────────────────────────
  # FAMILY: security
  # ──────────────────────────────────────────────────────

  - source_control: ferpa-recordkeeping
    target_controls:
      - id: art-30
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          FERPA's record of disclosures requirement (34 CFR section 99.32) is
          functionally equivalent to GDPR Art. 30 records of processing
          activities. Both mandate that controllers maintain comprehensive
          logs documenting who accessed personal data, when, for what purpose,
          and under what legal authority. FERPA disclosure records must
          include recipients, legitimate interests, and downstream recipients;
          GDPR Art. 30 requires processing purposes, data categories,
          recipients, international transfers, and security measures. Both
          must be available for inspection by authorized parties (data
          subjects for FERPA, supervisory authorities for GDPR).
      - id: art-5
        relationship: complements
        confidence: 0.75
        rationale: >
          FERPA's disclosure recordkeeping reinforces GDPR Art. 5(2)
          accountability by creating an auditable trail of all data sharing
          activities. Both frameworks treat comprehensive record-keeping as
          a fundamental mechanism for demonstrating compliance and enabling
          oversight.

  - source_control: ferpa-annual-notice
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          FERPA's annual notification of rights (34 CFR section 99.7) --
          requiring institutions to inform students and parents of their
          FERPA rights every year through reasonably effective means --
          intersects with GDPR Art. 5(1)(a) transparency principle. Both
          require controllers to proactively inform data subjects about their
          rights and about data processing practices. FERPA prescribes annual
          frequency and specific content requirements; GDPR requires
          information to be provided at the time of collection (Art. 13/14)
          and to be always accessible.
      - id: art-1
        relationship: complements
        confidence: 0.55
        rationale: >
          FERPA's annual notification obligation aligns with the fundamental
          objectives of GDPR Art. 1, which establishes the protection of
          natural persons regarding the processing of personal data as a
          foundational right. Both frameworks recognize that rights are
          meaningless without awareness -- institutions must actively inform
          individuals of their rights for those rights to be exercisable.

  - source_control: ferpa-reasonable-methods
    target_controls:
      - id: art-32
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          FERPA's requirement for reasonable methods to ensure access is
          limited and to authenticate identities (34 CFR section 99.31(c))
          is functionally equivalent to GDPR Art. 32 security of processing.
          Both require risk-appropriate technical and organisational measures
          including: authentication (FERPA: passwords, PINs, MFA; GDPR:
          pseudonymisation, encryption), access controls (both: role-based
          and need-to-know), and ongoing security assessment. Both apply a
          reasonableness standard that considers the state of the art and the
          sensitivity of the data. GDPR Art. 32 is more prescriptive,
          explicitly listing pseudonymisation, encryption, CIA triad
          assurance, disaster recovery, and regular testing.
      - id: art-25
        relationship: complements
        confidence: 0.70
        rationale: >
          FERPA's requirement to build access limitations into systems by
          design -- ensuring officials access only records for which they
          have legitimate educational interest -- aligns with GDPR Art. 25
          data protection by design and by default. Both mandate that access
          controls be architectural, not merely procedural, and that systems
          default to minimum necessary access.
      - id: art-5
        relationship: complements
        confidence: 0.65
        rationale: >
          FERPA's reasonable methods requirement reinforces GDPR Art. 5(1)(f)
          integrity and confidentiality principle. Both establish security as
          a fundamental obligation, requiring controllers to protect personal
          data against unauthorised access through technical measures
          proportionate to the risk.

  # ──────────────────────────────────────────────────────
  # FAMILY: technology
  # ──────────────────────────────────────────────────────

  - source_control: ferpa-edtech
    target_controls:
      - id: art-28
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          FERPA's EdTech and third-party service provider requirements
          (34 CFR section 99.31(a)(1)(i)(B)) are functionally equivalent to
          GDPR Art. 28 processor obligations. Both require: (1) contractual
          controls binding the processor to the controller's instructions,
          (2) limitations on data use to contracted purposes only,
          (3) security obligations equivalent to those of the controller,
          (4) restrictions on sub-processing, (5) data return or deletion
          upon contract termination, and (6) audit rights. FERPA additionally
          requires "direct control" and treats qualifying vendors as "school
          officials," while GDPR provides more detailed contractual clauses
          (Art. 28(3)(a)-(h)).
      - id: art-35
        relationship: complements
        confidence: 0.65
        rationale: >
          FERPA's requirement for institutional due diligence on EdTech
          vendors' data practices -- including privacy policies, storage
          locations, sub-processors, and retention practices -- aligns with
          GDPR Art. 35 data protection impact assessment. Both require
          controllers to evaluate the privacy risks of third-party processing
          before engaging processors, especially when the processing involves
          large-scale collection from vulnerable data subjects (students
          under FERPA, children under GDPR).
      - id: art-5
        relationship: complements
        confidence: 0.70
        rationale: >
          FERPA's prohibition on EdTech vendors using student data for
          commercial purposes (targeted advertising, product improvement with
          identified data, data sales) reinforces GDPR Art. 5(1)(b) purpose
          limitation. Both frameworks restrict processors to using personal
          data only for the purposes specified by the controller and prohibit
          repurposing data for the processor's own commercial benefit.

  - source_control: ferpa-cloud
    target_controls:
      - id: art-28
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          FERPA's cloud storage requirements (34 CFR section 99.31(a)(1)(i)(B)
          applied to cloud services) intersect with GDPR Art. 28 processor
          obligations. Both impose contractual and technical controls on cloud
          providers storing personal data: use limitations, security
          requirements, audit rights, sub-processor restrictions, and data
          destruction upon termination. FERPA extends the "school official"
          framework to cloud providers; GDPR provides explicit processor
          governance through Art. 28(3) contractual clauses.
      - id: art-32
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          FERPA's cloud security requirements -- encryption at rest with
          customer-managed keys (BYOK/HYOK), encryption in transit (TLS 1.3),
          IAM with least privilege, comprehensive access logging, and data
          residency controls -- are functionally equivalent to GDPR Art. 32
          security of processing. Both require risk-appropriate technical
          measures including pseudonymisation, encryption, CIA triad
          assurance, and regular security testing. Both apply to cloud
          environments as an extension of the controller's security
          obligations.
      - id: art-44
        relationship: complements
        confidence: 0.65
        rationale: >
          FERPA's data sovereignty requirements for cloud storage -- requiring
          institutions to know where cloud providers store education records
          and ensure data residency compliance -- complement GDPR Art. 44
          international transfer restrictions. Both address the geographic
          dimension of data protection, requiring controllers to maintain
          visibility and control over where personal data is stored and
          processed. GDPR is more prescriptive, requiring adequacy decisions
          or appropriate safeguards for cross-border transfers.
      - id: art-33
        relationship: complements
        confidence: 0.60
        rationale: >
          FERPA's requirement that cloud providers promptly notify
          institutions of security incidents affecting education records
          complements GDPR Art. 33 breach notification to the supervisory
          authority. Both establish incident notification obligations in the
          controller-processor relationship: FERPA requires prompt cloud
          provider notification to the institution, while GDPR Art. 33
          requires the controller to notify the supervisory authority within
          72 hours. Both mandate documentation of breach facts, effects,
          and remedial actions.
