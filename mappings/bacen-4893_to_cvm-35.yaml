id: bacen-4893_to_cvm-35
title: "Bacen 4893 to CVM 35 Control Mapping"
source_framework: bacen-4893
target_framework: cvm-35
version: "1.0.0"
last_updated: "2026-04-03"
methodology: semantic

mappings:
  - source_control: art-3
    target_controls:
      - id: art-9
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          O Art. 3 da Resolução 4.893 do Bacen exige que instituições financeiras
          implementem e mantenham política de segurança cibernética. O Art. 9 da
          Resolução CVM 35 estabelece obrigação equivalente para os participantes
          do mercado de valores mobiliários. Ambos definem a política de segurança
          cibernética como instrumento obrigatório, compatível com o porte, perfil
          de risco e modelo de negócio da entidade regulada, diferindo apenas no
          setor — financeiro versus mercado de capitais.

  - source_control: art-4
    target_controls:
      - id: art-10
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          O Art. 4 da Resolução 4.893 detalha o conteúdo mínimo da política de
          segurança cibernética, incluindo objetivos, procedimentos, controles e
          classificação de dados. O Art. 10 da CVM 35 estabelece conteúdo mínimo
          análogo para o mercado de capitais. A correspondência é alta — ambos
          exigem que a política aborde procedimentos de resposta a incidentes,
          controles de acesso, proteção de dados sensíveis e mecanismos de
          monitoramento contínuo.

  - source_control: art-4
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          O Art. 4 da Resolução 4.893 especifica o conteúdo mínimo da política de
          segurança cibernética para o setor financeiro. O Art. 5 da CVM 35 trata
          do conteúdo mínimo da Política de Segurança da Informação (PSI), que é
          complementar à política de segurança cibernética. A relação é de suporte
          porque a PSI da CVM abrange aspectos mais amplos de segurança da
          informação que incluem, mas não se limitam a, segurança cibernética,
          enquanto o Art. 4 da Resolução 4.893 é especificamente focado no domínio
          cibernético.

  - source_control: art-5
    target_controls:
      - id: art-11
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          O Art. 5 da Resolução 4.893 exige que a política contemple cenários de
          incidentes considerados nos testes de continuidade de negócios. O Art. 11
          da CVM 35 trata do plano de continuidade e dos cenários de incidentes
          cibernéticos para o mercado de capitais. Ambos integram segurança
          cibernética com gestão de continuidade de negócios, exigindo que cenários
          de ataques e falhas sejam previamente mapeados e testados.

  - source_control: art-6
    target_controls:
      - id: art-7
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          O Art. 6 da Resolução 4.893 trata da disseminação da cultura de segurança
          cibernética e da capacitação do pessoal no setor financeiro. O Art. 7 da
          CVM 35 estabelece obrigações equivalentes de divulgação da política e
          treinamento para o mercado de capitais. Ambos reconhecem que a efetividade
          da política depende da conscientização e capacitação contínua de todos os
          colaboradores, não apenas da equipe de tecnologia.

  - source_control: art-7
    target_controls:
      - id: art-6
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          O Art. 7 da Resolução 4.893 determina a revisão periódica da política
          de segurança cibernética das instituições financeiras. O Art. 6 da CVM 35
          exige revisão equivalente para o mercado de capitais. A inversão na
          numeração dos artigos não afeta a equivalência funcional — ambos
          determinam periodicidade mínima de revisão e que a atualização considere
          mudanças no ambiente de ameaças e na estrutura organizacional.

  - source_control: art-8
    target_controls:
      - id: art-8
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          O Art. 8 da Resolução 4.893 trata dos requisitos de documentação da
          política de segurança cibernética para o setor financeiro. O Art. 8 da
          CVM 35 estabelece requisitos de documentação análogos para o mercado de
          capitais. Ambos exigem que políticas, procedimentos e controles sejam
          formalmente documentados, mantidos atualizados e disponíveis para
          inspeção pela autoridade supervisora competente.

  - source_control: art-9
    target_controls:
      - id: art-11
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          O Art. 9 da Resolução 4.893 obriga a elaboração de plano de ação e de
          resposta a incidentes cibernéticos para instituições financeiras. O Art.
          11 da CVM 35 estabelece obrigação equivalente para o mercado de capitais,
          contemplando procedimentos de detecção, contenção, erradicação e
          recuperação. Ambos exigem que o plano defina papéis e responsabilidades,
          fluxos de comunicação e procedimentos de escalação, embora a CVM 35
          consolide continuidade e resposta a incidentes em um único artigo.

  - source_control: art-10
    target_controls:
      - id: art-12
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          O Art. 10 da Resolução 4.893 exige a comunicação de incidentes relevantes
          ao Banco Central do Brasil. O Art. 12 da CVM 35 obriga a comunicação
          equivalente à Comissão de Valores Mobiliários. A estrutura da obrigação é
          idêntica — notificação tempestiva, descrição do incidente, medidas
          adotadas e resultados obtidos — diferindo apenas na autoridade supervisora
          destinatária (BCB versus CVM).

  - source_control: art-11
    target_controls:
      - id: art-13
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          O Art. 11 da Resolução 4.893 exige relatório anual sobre a implementação
          do plano de ação e de resposta a incidentes no setor financeiro. O Art. 13
          da CVM 35 impõe obrigação equivalente para o mercado de capitais. Ambos
          funcionam como instrumento de prestação de contas, exigindo que a
          instituição documente e reporte periodicamente a efetividade das medidas
          de segurança cibernética adotadas.

  - source_control: art-12
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          O Art. 12 da Resolução 4.893 regulamenta a contratação de serviços de
          processamento e armazenamento de dados em nuvem por instituições
          financeiras. O Art. 15 da CVM 35 estabelece requisitos equivalentes para
          o mercado de capitais. Ambos exigem avaliação prévia do prestador de
          serviços, cláusulas contratuais específicas de segurança e mecanismos que
          garantam a capacidade de auditoria e o acesso aos dados pela entidade
          regulada e pela autoridade supervisora.

  - source_control: art-14
    target_controls:
      - id: art-17
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          O Art. 14 da Resolução 4.893 exige que a contratação de serviços de
          processamento e armazenamento de dados no exterior observe a legislação
          vigente. O Art. 17 da CVM 35 estabelece obrigação equivalente para o
          mercado de capitais. Ambos condicionam o armazenamento de dados em
          jurisdições estrangeiras ao cumprimento das normas brasileiras de
          proteção de dados e garantem que as autoridades supervisoras mantenham
          acesso irrestrito aos dados e informações.

  - source_control: art-17
    target_controls:
      - id: art-20
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          O Art. 17 da Resolução 4.893 atribui à diretoria da instituição
          financeira a responsabilidade pela política de segurança cibernética e
          pela execução do plano de ação e resposta a incidentes. O Art. 20 da
          CVM 35 estabelece responsabilidades equivalentes para a diretoria das
          entidades do mercado de capitais. Ambos garantem o envolvimento e
          comprometimento da alta administração com a governança de segurança
          cibernética.

  - source_control: art-19
    target_controls:
      - id: art-21
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          O Art. 19 da Resolução 4.893 exige a designação de um diretor
          responsável pela política de segurança cibernética nas instituições
          financeiras. O Art. 21 da CVM 35 impõe obrigação equivalente para o
          mercado de capitais. Ambos exigem uma pessoa formalmente designada com
          competência e autoridade para supervisionar a conformidade com a política
          de segurança cibernética, podendo exercer outras funções desde que não
          haja conflito de interesses.
