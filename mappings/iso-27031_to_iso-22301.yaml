id: iso-27031_to_iso-22301
title: "ISO/IEC 27031:2011 to ISO 22301:2019 Control Mapping"
source_framework: iso-27031
target_framework: iso-22301
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic

mappings:
  # ctx — Context
  - source_control: ctx-1
    target_controls:
      - id: cl-4.1
        relationship: complements
        confidence: 0.88
        rationale: >
          ISO 27031 ctx-1 (Understanding the organization and its requirements)
          complements ISO 22301 cl-4.1 (Understanding the organization and its
          context) by narrowing the organizational context analysis to ICT services
          and the infrastructure that supports critical business processes. While
          cl-4.1 addresses the broad organizational context including regulatory,
          economic, and cultural factors, ctx-1 provides the ICT-specific dimension
          of that context — service dependency mapping, business impact analysis of
          ICT disruptions, and RTO/RPO establishment for ICT services.
      - id: cl-8.2
        relationship: subset-of
        confidence: 0.85
        rationale: >
          ISO 27031 ctx-1 is a subset of ISO 22301 cl-8.2 (Business impact analysis)
          because the ICT-specific BIA required by ctx-1 — identifying dependencies
          between business processes and ICT infrastructure — is one component of the
          broader organizational BIA required by cl-8.2. The ICT-focused BIA feeds
          directly into cl-8.2, providing the technology layer of impact analysis
          including quantified financial loss, reputational damage, and operational
          impairment from ICT service disruptions.

  - source_control: ctx-2
    target_controls:
      - id: cl-4.3
        relationship: complements
        confidence: 0.90
        rationale: >
          ISO 27031 ctx-2 (Scope of ICT readiness for business continuity)
          complements ISO 22301 cl-4.3 (Determining the scope of the BCMS) by
          defining the ICT-specific scope boundaries within the broader BCMS scope.
          Both controls require documented scope definitions with explicit inclusions
          and exclusions, periodic review, and stakeholder communication. ctx-2
          narrows the scope to ICT services, systems, and infrastructure components,
          including third-party and cloud service providers, while cl-4.3 addresses
          the full organizational BCMS scope including activities, products, services,
          and locations.
      - id: cl-4.2
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          ISO 27031 ctx-2 intersects with ISO 22301 cl-4.2 (Understanding the needs
          and expectations of interested parties) because the IRBC scope must account
          for regulatory obligations and contractual commitments related to ICT
          services. These ICT-related regulatory and contractual requirements overlap
          with the broader interested party requirements addressed in cl-4.2, but
          ctx-2 focuses on scope definition rather than stakeholder analysis.

  - source_control: ctx-3
    target_controls:
      - id: cl-6.1
        relationship: complements
        confidence: 0.90
        rationale: >
          ISO 27031 ctx-3 (ICT risk assessment for business continuity) complements
          ISO 22301 cl-6.1 (Actions to address risks and opportunities) by providing
          the ICT-specific risk assessment methodology. While cl-6.1 addresses risks
          and opportunities to the BCMS broadly, ctx-3 focuses on threats and
          vulnerabilities to ICT services — single points of failure, capacity
          constraints, external provider dependencies, cyberattacks, hardware
          failures, and software defects. The ICT risk assessment results directly
          inform the broader BCMS risk treatment actions required by cl-6.1.
      - id: cl-8.3
        relationship: complements
        confidence: 0.87
        rationale: >
          ISO 27031 ctx-3 complements ISO 22301 cl-8.3 (Risk assessment) by
          providing a technology-layer risk assessment that feeds into the broader
          business continuity risk assessment. Both controls require systematic
          identification, analysis, and evaluation of risks, but ctx-3 is scoped to
          ICT-specific threat scenarios (cyberattacks, hardware failures, supply
          chain disruptions, utility failures) while cl-8.3 covers all risk
          categories affecting prioritized business activities.

  # pln — Planning
  - source_control: pln-1
    target_controls:
      - id: cl-8.4
        relationship: complements
        confidence: 0.88
        rationale: >
          ISO 27031 pln-1 (IRBC strategy development) complements ISO 22301 cl-8.4
          (Business continuity strategies and solutions) by providing the ICT-specific
          strategy layer within the broader business continuity strategy framework.
          While cl-8.4 addresses strategies for people, premises, technology,
          information, suppliers, and stakeholders, pln-1 focuses specifically on ICT
          recovery strategies — alternative sites, redundant systems, cloud-based
          recovery, hot/warm/cold standby configurations, and active-active/passive
          clustering. Both require management approval and alignment with BIA outputs.
      - id: cl-8.3
        relationship: intersects-with
        confidence: 0.76
        rationale: >
          ISO 27031 pln-1 intersects with ISO 22301 cl-8.3 (Risk assessment) because
          IRBC strategy development inherently considers the risks identified in the
          risk assessment process. The strategy selection evaluates risk treatment
          options (preventive and recovery measures) that are direct outputs of the
          risk assessment, creating a bidirectional dependency between strategy
          development and risk evaluation.

  - source_control: pln-2
    target_controls:
      - id: cl-6.2
        relationship: complements
        confidence: 0.82
        rationale: >
          ISO 27031 pln-2 (Resource requirements for IRBC) complements ISO 22301
          cl-6.2 (Business continuity objectives and planning to achieve them) by
          detailing the ICT-specific resources needed to achieve business continuity
          objectives. While cl-6.2 requires the organization to determine resources,
          responsibilities, and timelines for achieving BC objectives broadly, pln-2
          focuses on ICT-specific resources — personnel skills, technology
          infrastructure for recovery, financial budget for continuity measures, and
          external service agreements for ICT recovery.
      - id: cl-5.2
        relationship: implements
        confidence: 0.73
        rationale: >
          ISO 27031 pln-2 implements ISO 22301 cl-5.2 (Policy) by operationalizing
          the policy commitment to allocate resources for business continuity.
          The policy sets the framework and commitment; pln-2 translates that into
          specific ICT resource requirements including personnel, infrastructure,
          budget, and vendor agreements.

  - source_control: pln-3
    target_controls:
      - id: cl-6.2
        relationship: complements
        confidence: 0.90
        rationale: >
          ISO 27031 pln-3 (Performance criteria and metrics for IRBC) directly
          complements ISO 22301 cl-6.2 (Business continuity objectives and planning
          to achieve them) by defining ICT-specific measurable performance criteria —
          RTO, RPO, MTPD, and MBCO — for each critical ICT service. cl-6.2 requires
          measurable objectives at relevant functions and levels; pln-3 provides the
          specific ICT metrics that constitute those objectives for the technology
          domain. Both derive from BIA outputs and require management approval.
      - id: cl-8.2
        relationship: derived-from
        confidence: 0.84
        rationale: >
          ISO 27031 pln-3 is derived from ISO 22301 cl-8.2 (Business impact analysis)
          because the measurable ICT recovery criteria (RTO, RPO, MTPD, MBCO)
          established by pln-3 are direct outputs of the BIA process. The BIA
          determines acceptable disruption thresholds; pln-3 formalizes these as
          performance criteria against which IRBC effectiveness is measured.
      - id: cl-9.1
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          ISO 27031 pln-3 intersects with ISO 22301 cl-9.1 (Monitoring, measurement,
          analysis and evaluation) because the ICT performance criteria defined by
          pln-3 (RTO, RPO, MTPD, MBCO) become the key performance indicators that
          cl-9.1 monitoring and measurement processes must track. The criteria
          definition and the monitoring of those criteria share a direct dependency.

  - source_control: pln-4
    target_controls:
      - id: cl-8.4
        relationship: subset-of
        confidence: 0.85
        rationale: >
          ISO 27031 pln-4 (Data backup and replication strategy) is a subset of
          ISO 22301 cl-8.4 (Business continuity strategies and solutions) because
          data backup and replication is one specific component of the broader BC
          strategy portfolio. cl-8.4 requires strategies covering people, premises,
          technology, information, suppliers, and stakeholders; pln-4 delivers the
          specific technical approach for data recoverability through backup
          frequency, retention, storage location, synchronous/asynchronous
          replication, and regular integrity testing.
      - id: cl-8.5
        relationship: intersects-with
        confidence: 0.77
        rationale: >
          ISO 27031 pln-4 intersects with ISO 22301 cl-8.5 (Business continuity
          plans and procedures) because data backup and replication strategies
          provide the data recovery foundation that BC plans depend on. Without
          verified backup and replication mechanisms, BC plans cannot achieve their
          recovery objectives. pln-4 ensures the 3-2-1 backup rule, encrypted
          storage, and tested recoverability that plan execution requires.

  # imp — Implementation
  - source_control: imp-1
    target_controls:
      - id: cl-8.5
        relationship: complements
        confidence: 0.92
        rationale: >
          ISO 27031 imp-1 (IRBC plans development and documentation) is the
          ICT-specific counterpart to ISO 22301 cl-8.5 (Business continuity plans
          and procedures). Both require documented plans with activation criteria,
          roles and responsibilities, communication procedures, step-by-step recovery
          procedures, and resource requirements. imp-1 narrows the scope to ICT
          service recovery specifically — including technical recovery procedures,
          system validation, and out-of-band accessibility — while cl-8.5 covers the
          full spectrum of business continuity plans including incident management,
          crisis communication, and activity-level recovery.
      - id: cl-5.3
        relationship: implements
        confidence: 0.75
        rationale: >
          ISO 27031 imp-1 implements ISO 22301 cl-5.3 (Organizational roles,
          responsibilities and authorities) by documenting specific ICT recovery
          roles and responsibilities within continuity plans, including who has
          authority to activate plans, escalation procedures, and resource
          requirements. This provides the operational detail that implements the
          role assignments established at the organizational level by cl-5.3.

  - source_control: imp-2
    target_controls:
      - id: cl-8.5
        relationship: complements
        confidence: 0.87
        rationale: >
          ISO 27031 imp-2 (Incident response and escalation for ICT disruptions)
          complements ISO 22301 cl-8.5 (Business continuity plans and procedures)
          by providing the ICT-specific incident detection, classification,
          escalation, and communication procedures that operate within the broader
          BC plan framework. cl-8.5 requires plans with escalation and activation
          criteria; imp-2 provides the technology-specific incident lifecycle from
          detection through severity classification to BC plan activation triggers.
      - id: cl-8.4
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          ISO 27031 imp-2 intersects with ISO 22301 cl-8.4 (Business continuity
          strategies and solutions) because the incident response mechanism
          establishes the trigger for strategy activation. Without defined ICT
          incident classification and escalation procedures, the organization cannot
          effectively transition from routine operations to continuity strategy
          execution when ICT disruptions occur.
      - id: cl-9.1
        relationship: intersects-with
        confidence: 0.72
        rationale: >
          ISO 27031 imp-2 intersects with ISO 22301 cl-9.1 (Monitoring, measurement,
          analysis and evaluation) because ICT incident response generates data —
          detection times, classification accuracy, escalation timeliness,
          communication effectiveness — that feeds into BCMS performance
          measurement. Incident metrics are key inputs to the monitoring and
          evaluation processes required by cl-9.1.

  - source_control: imp-3
    target_controls:
      - id: cl-8.5
        relationship: complements
        confidence: 0.90
        rationale: >
          ISO 27031 imp-3 (ICT service recovery and restoration procedures)
          complements ISO 22301 cl-8.5 (Business continuity plans and procedures)
          by providing the detailed ICT technical recovery procedures that BC plans
          reference. imp-3 addresses prioritized service restoration sequences, data
          recovery and integrity verification, system validation before returning to
          normal operations, and fallback procedures — all of which are essential
          components of the broader BC plans required by cl-8.5.
      - id: cl-8.4
        relationship: implements
        confidence: 0.82
        rationale: >
          ISO 27031 imp-3 implements ISO 22301 cl-8.4 (Business continuity strategies
          and solutions) by operationalizing ICT recovery strategies into executable
          procedures. The strategies defined under cl-8.4 (e.g., failover to DR
          site, cloud recovery) require detailed technical procedures for execution,
          which imp-3 provides through documented recovery, restoration, and
          validation steps.

  - source_control: imp-4
    target_controls:
      - id: cl-8.5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO 27031 imp-4 (ICT continuity awareness, skills, and training) intersects
          with ISO 22301 cl-8.5 (Business continuity plans and procedures) because
          personnel must be able to execute the ICT recovery procedures documented
          in BC plans. Plans are only effective if the people responsible for
          executing them have the awareness, knowledge, and skills to do so. imp-4
          provides the training framework that makes plan execution possible.
      - id: cl-8.6
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          ISO 27031 imp-4 intersects with ISO 22301 cl-8.6 (Exercise programme)
          because the training and awareness program overlaps with the exercise
          programme. imp-4 explicitly includes practical exercises such as tabletop
          scenarios and recovery simulations as part of the training program, directly
          contributing to the exercise programme required by cl-8.6. Both controls
          share the objective of developing organizational competency through
          progressive skill development.
      - id: cl-5.3
        relationship: intersects-with
        confidence: 0.76
        rationale: >
          ISO 27031 imp-4 intersects with ISO 22301 cl-5.3 (Organizational roles,
          responsibilities and authorities) because training ensures that personnel
          assigned to ICT continuity roles have the necessary competencies. cl-5.3
          assigns roles and responsibilities; imp-4 ensures that individuals in
          those roles possess the skills needed to fulfil them, including
          role-specific training and competency assessments.

  # mon — Monitoring
  - source_control: mon-1
    target_controls:
      - id: cl-9.1
        relationship: complements
        confidence: 0.92
        rationale: >
          ISO 27031 mon-1 (Monitoring and measurement of IRBC performance) is the
          ICT-specific implementation of ISO 22301 cl-9.1 (Monitoring, measurement,
          analysis and evaluation). Both controls require determining what to
          monitor, establishing measurement methods, defining monitoring frequency,
          and evaluating results. mon-1 narrows the scope to ICT-specific metrics —
          service availability, recovery infrastructure readiness, backup success
          rates, actual vs. target RTO/RPO, and MTTR — while cl-9.1 covers the
          entire BCMS performance spectrum including exercise completion rates,
          corrective action closure, and audit finding remediation.
      - id: cl-6.2
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          ISO 27031 mon-1 intersects with ISO 22301 cl-6.2 (Business continuity
          objectives and planning to achieve them) because the monitoring mechanism
          tracks whether ICT-specific business continuity objectives (RTO, RPO,
          availability targets) are being met. The metrics collected by mon-1 are
          the evidence base for evaluating progress toward the objectives
          established under cl-6.2.

  - source_control: mon-2
    target_controls:
      - id: cl-8.6
        relationship: complements
        confidence: 0.92
        rationale: >
          ISO 27031 mon-2 (IRBC exercising and testing) complements ISO 22301 cl-8.6
          (Exercise programme) by providing the ICT-specific exercise and testing
          component within the broader BC exercise programme. Both controls require
          progressive exercise types (tabletop to full-scale), scenario-based testing,
          documented results, and improvement-driven follow-up. mon-2 focuses on
          ICT-specific scenarios — data center loss, ransomware, cloud provider
          outage, cascading infrastructure failures — while cl-8.6 covers the full
          range of business continuity exercise scenarios.
      - id: cl-9.1
        relationship: subset-of
        confidence: 0.79
        rationale: >
          ISO 27031 mon-2 is a subset of ISO 22301 cl-9.1 (Monitoring, measurement,
          analysis and evaluation) because ICT exercise and test results are one
          category of the broader BCMS performance data that cl-9.1 requires.
          Exercise outcomes — recovery times achieved, procedures validated, failures
          identified — are key metrics within the larger set of monitoring and
          evaluation inputs required by cl-9.1.

  - source_control: mon-3
    target_controls:
      - id: cl-9.3
        relationship: complements
        confidence: 0.92
        rationale: >
          ISO 27031 mon-3 (Management review of IRBC) is the ICT-specific
          counterpart to ISO 22301 cl-9.3 (Management review). Both controls require
          periodic top management review of the program's suitability, adequacy, and
          effectiveness, considering exercise results, incident outcomes, business
          environment changes, audit findings, and corrective action status. mon-3
          focuses the review on ICT continuity specifically — ICT disruption
          incidents, ICT landscape changes, and IRBC performance metrics — while
          cl-9.3 covers the entire BCMS scope.
      - id: cl-9.2
        relationship: intersects-with
        confidence: 0.74
        rationale: >
          ISO 27031 mon-3 intersects with ISO 22301 cl-9.2 (Internal audit) because
          the management review process considers audit findings as an input. The
          review validates that audit recommendations are addressed and that audit
          findings drive improvement in the IRBC program, creating a feedback loop
          between the audit and review processes.

  # impr — Improvement
  - source_control: impr-1
    target_controls:
      - id: cl-10.1
        relationship: complements
        confidence: 0.93
        rationale: >
          ISO 27031 impr-1 (Corrective actions for IRBC nonconformities) is the
          ICT-specific implementation of ISO 22301 cl-10.1 (Nonconformity and
          corrective action). Both controls follow identical corrective action
          methodology — react to the nonconformity, evaluate root causes, implement
          corrective actions, review effectiveness, and maintain records. impr-1
          applies this process to ICT continuity nonconformities specifically (failed
          recovery tests, incident responses not meeting ICT objectives, ICT audit
          findings), while cl-10.1 covers all BCMS nonconformities across the entire
          management system.
      - id: cl-9.1
        relationship: intersects-with
        confidence: 0.73
        rationale: >
          ISO 27031 impr-1 intersects with ISO 22301 cl-9.1 (Monitoring, measurement,
          analysis and evaluation) because corrective action data feeds into BCMS
          performance evaluation. Corrective action closure rates, root cause
          categories, and resolution timelines are key metrics for evaluating BCMS
          effectiveness as required by cl-9.1.

  - source_control: impr-2
    target_controls:
      - id: cl-10.2
        relationship: complements
        confidence: 0.93
        rationale: >
          ISO 27031 impr-2 (Continual improvement of IRBC) is the ICT-specific
          implementation of ISO 22301 cl-10.2 (Continual improvement). Both controls
          require systematic, evidence-based improvement driven by monitoring data,
          exercise results, incident lessons, audit findings, management review
          outcomes, and changes in the business environment. impr-2 focuses on
          ICT-specific improvement opportunities — adopting new recovery technologies,
          optimizing recovery procedures, expanding continuity coverage, enhancing
          automation — while cl-10.2 addresses continual improvement of the entire
          BCMS using the PDCA cycle.
      - id: cl-9.3
        relationship: intersects-with
        confidence: 0.76
        rationale: >
          ISO 27031 impr-2 intersects with ISO 22301 cl-9.3 (Management review)
          because ICT-specific improvement opportunities feed into the management
          review as items requiring decisions on resource allocation, strategy
          changes, and improvement priorities for the technology domain. The
          improvement process and the management review share a bidirectional
          dependency.
