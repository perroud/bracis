id: cripto-marco_to_bcb-304
title: "Cripto-Marco to BCB 304 Control Mapping"
source_framework: cripto-marco
target_framework: bcb-304
version: "1.0.0"
last_updated: "2026-04-06"
methodology: structural
description: >
  Mapping between Lei 14.478/2022 (Marco Legal dos Criptoativos — the enabling
  legislation for virtual asset regulation in Brazil) and Resolucao BCB 304/2023
  (the implementing regulation issued by the Central Bank of Brazil). The law
  establishes principles, definitions, and authorization requirements; BCB 304
  operationalizes them with specific prudential, governance, AML/CFT, cybersecurity,
  and reporting obligations for VASPs.

mappings:
  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: superset-of
        confidence: 0.95
        rationale: >
          Art. 1 of cripto-marco defines the broad scope and purpose of the law
          (virtual asset services and VASP regulation). BCB 304 art-1 operationalizes
          this scope specifically for authorization, corporate changes, and operating
          conditions — a subset of the law's full scope.
      - id: art-2
        relationship: implements
        confidence: 0.85
        rationale: >
          Art. 1 of cripto-marco establishes the definition of virtual assets by
          exclusion (securities under CVM). BCB 304 art-2 operationalizes these
          definitions into concrete regulatory concepts (VASP, service types,
          custody, custodial wallet).

  - source_control: art-2
    target_controls:
      - id: art-3
        relationship: implements
        confidence: 0.95
        rationale: >
          Art. 2 of the law mandates prior authorization for VASPs. BCB 304 art-3
          implements this by explicitly prohibiting VASP operations without BCB
          authorization, including extraterritorial reach for foreign VASPs serving
          Brazilian clients.
      - id: art-5
        relationship: implements
        confidence: 0.90
        rationale: >
          Art. 2's authorization requirement is detailed by BCB 304 art-5, which
          specifies the exact documentation and prerequisites (corporate documents,
          minimum capital, cybersecurity policy, AML/CFT policy) for obtaining
          authorization.
      - id: art-6
        relationship: implements
        confidence: 0.85
        rationale: >
          The authorization regime in art-2 implies ongoing capital requirements.
          BCB 304 art-6 implements minimum net worth requirements proportional to
          service type, volume, and custodied assets.
      - id: art-7
        relationship: implements
        confidence: 0.85
        rationale: >
          Art. 2's authorization framework is implemented by BCB 304 art-7, which
          specifies corporate form requirements (S/A or LTDA), fit-and-proper tests
          for controllers, and prior approval for control transfers.
      - id: art-8
        relationship: implements
        confidence: 0.85
        rationale: >
          BCB 304 art-8 implements the consequence of non-compliance with art-2's
          authorization requirement: specific grounds for cancellation or suspension
          of authorization.

  - source_control: art-3
    target_controls:
      - id: art-1
        relationship: implements
        confidence: 0.90
        rationale: >
          Art. 3's legal definition of virtual assets (with four exclusion categories)
          is reproduced in BCB 304 art-1's paragrafo unico, operationalizing the
          definition for regulatory purposes.
      - id: art-2
        relationship: implements
        confidence: 0.90
        rationale: >
          BCB 304 art-2 further operationalizes art-3's definition by specifying
          virtual asset sub-concepts (custody as private key management, custodial
          wallet) used throughout the regulation.
      - id: art-4
        relationship: derived-from
        confidence: 0.80
        rationale: >
          Art. 3's definition creates the need for asset classification. BCB 304 art-4
          derives from this by requiring VASPs to maintain an evaluation and
          classification process for virtual assets they intend to list.

  - source_control: art-4
    target_controls:
      - id: art-12
        relationship: implements
        confidence: 0.90
        rationale: >
          Art. 4's governance and risk-based approach directive (inciso II) is
          implemented by BCB 304 art-12, which specifies the mandatory governance
          structure (BCB-responsible director, AML/CFT director, compliance area,
          risk management area).
      - id: art-13
        relationship: implements
        confidence: 0.90
        rationale: >
          Art. 4's governance and transparency directive is implemented by BCB 304
          art-13, which mandates internal controls, segregation of functions, internal
          audit, whistleblower channels, and periodic testing.
      - id: art-14
        relationship: implements
        confidence: 0.90
        rationale: >
          Art. 4's risk-based approach directive (inciso II) and operational soundness
          directive (inciso VI) are implemented by BCB 304 art-14's comprehensive
          risk management framework covering operational, market, liquidity, cyber,
          AML/CFT, and contagion risks.
      - id: art-19
        relationship: implements
        confidence: 0.85
        rationale: >
          Art. 4's information security directive (inciso III) is implemented by
          BCB 304 art-19, which requires a cybersecurity policy covering access
          controls, encryption, threat monitoring, incident response, pen testing,
          patch management, DDoS protection, and API security.
      - id: art-15
        relationship: implements
        confidence: 0.85
        rationale: >
          Art. 4's AML/CFT directive (inciso VII, alignment with international
          standards) is implemented by BCB 304 art-15, which specifies KYC, enhanced
          due diligence, risk assessment by asset type, on-chain/off-chain monitoring,
          and privacy coin procedures.
      - id: art-22
        relationship: implements
        confidence: 0.80
        rationale: >
          Art. 4's consumer protection directive (inciso IV) is implemented by
          BCB 304 art-22, which mandates pre-contractual disclosure of services,
          risks, fees, custody policies, dispute resolution, and deposit protection
          status.

  - source_control: art-5
    target_controls:
      - id: art-1
        relationship: implements
        confidence: 0.85
        rationale: >
          Art. 5's VASP definition and five service categories are reflected in
          BCB 304 art-1's scope, which covers authorization and operating conditions
          for these same service types.
      - id: art-2
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Art. 5's enumeration of five virtual asset services (fiat exchange,
          crypto exchange, transfer, custody, financial services/offering) is
          reproduced nearly identically in BCB 304 art-2 inciso III.
      - id: art-3
        relationship: implements
        confidence: 0.85
        rationale: >
          Art. 5's definition of regulated services is enforced by BCB 304 art-3,
          which prohibits VASPs from operating beyond their authorized service scope
          (principle of specificity).

  - source_control: art-6
    target_controls:
      - id: art-1
        relationship: implements
        confidence: 0.85
        rationale: >
          Art. 6 delegates regulator designation to the Executive Branch. BCB 304
          art-1 is the direct result — BCB exercising the regulatory authority
          delegated via Decree 11.563/2023, which fulfilled art-6's mandate.

  - source_control: art-7
    target_controls:
      - id: art-5
        relationship: implements
        confidence: 0.90
        rationale: >
          Art. 7 inciso I (competency to authorize VASPs) is implemented by BCB 304
          art-5, which details the authorization process and required documentation.
      - id: art-7
        relationship: implements
        confidence: 0.85
        rationale: >
          Art. 7 inciso II (fit-and-proper requirements for management) is
          implemented by BCB 304 art-7, specifying corporate form, controller
          requirements (reputation, financial capacity, no legal impediments),
          and control transfer approval.
      - id: art-8
        relationship: implements
        confidence: 0.90
        rationale: >
          Art. 7 incisos III and IV (supervision/enforcement and license revocation)
          are implemented by BCB 304 art-8, which specifies five grounds for
          authorization cancellation and temporary suspension power.
      - id: art-26
        relationship: implements
        confidence: 0.85
        rationale: >
          Art. 7 inciso III references Lei 13.506/2017 enforcement powers. BCB 304
          art-26 operationalizes this by defining the specific sanction scale
          (warning, fine, suspension, disqualification, cancellation).

  - source_control: art-8
    target_controls:
      - id: art-5
        relationship: implements
        confidence: 0.85
        rationale: >
          Art. 8 allows existing BCB-authorized institutions to provide virtual asset
          services. BCB 304 art-5 covers the authorization process that applies
          regardless of whether the entity is new or existing.
      - id: art-6
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Art. 8's provision for cumulative activities (traditional + virtual asset
          services) intersects with BCB 304 art-6's capital requirements, which must
          account for the combined scope of services.

  - source_control: art-9
    target_controls:
      - id: art-25
        relationship: implements
        confidence: 0.95
        rationale: >
          Art. 9 mandates a minimum 6-month transition period for existing VASPs.
          BCB 304 art-25 implements this with specific deadlines: 180 days for
          authorization request, 360 days for full compliance, plus requirement
          for a detailed compliance plan.
      - id: art-26
        relationship: complements
        confidence: 0.75
        rationale: >
          Art. 9's transition provisions are complemented by BCB 304 art-26's
          sanctions framework, which applies to VASPs that fail to comply within
          the transition period.

  - source_control: art-10
    target_controls:
      - id: art-12
        relationship: complements
        confidence: 0.75
        rationale: >
          Art. 10 introduces the crypto fraud crime (Art. 171-A of the Penal Code).
          BCB 304 art-12's governance structure (compliance area, risk management)
          provides the organizational framework to detect and prevent fraud.
      - id: art-13
        relationship: complements
        confidence: 0.75
        rationale: >
          Art. 10's fraud criminalization is complemented by BCB 304 art-13's
          internal controls system, including deficiency detection mechanisms and
          whistleblower channels that help identify fraudulent schemes.
      - id: art-17
        relationship: complements
        confidence: 0.80
        rationale: >
          Art. 10's fraud provisions are complemented by BCB 304 art-17's
          transaction monitoring requirements, which detect suspicious patterns
          (structuring, layering, rapid conversion) indicative of fraud.

  - source_control: art-11
    target_controls:
      - id: art-5
        relationship: complements
        confidence: 0.80
        rationale: >
          Art. 11 makes VASPs equivalent to financial institutions for criminal
          liability purposes. BCB 304 art-5's authorization requirements ensure
          VASPs operate within the legal framework, preventing the crime of
          unauthorized operation (Lei 7.492 art-16).
      - id: art-12
        relationship: complements
        confidence: 0.80
        rationale: >
          Art. 11's criminal liability for VASP officers elevates the importance of
          BCB 304 art-12's governance structure, where designated directors assume
          personal responsibility before the BCB.
      - id: art-26
        relationship: complements
        confidence: 0.75
        rationale: >
          Art. 11's criminal liability regime operates in parallel with BCB 304
          art-26's administrative sanctions. Art-26 par. 2 explicitly states
          administrative sanctions do not preclude criminal responsibility.

  - source_control: art-12a
    target_controls:
      - id: art-15
        relationship: implements
        confidence: 0.95
        rationale: >
          Art. 12 of cripto-marco adds VASPs to the AML/CFT obligated entities
          list and expands record-keeping to virtual assets. BCB 304 art-15 directly
          implements these obligations with crypto-specific KYC, enhanced due
          diligence, risk assessment by asset type, on-chain/off-chain monitoring,
          and privacy coin procedures.
      - id: art-16
        relationship: implements
        confidence: 0.90
        rationale: >
          Art. 12's AML/CFT obligations for VASPs are implemented by BCB 304 art-16
          (travel rule), which requires originator and beneficiary identification
          data for all virtual asset transfers — a core FATF requirement.
      - id: art-17
        relationship: implements
        confidence: 0.90
        rationale: >
          Art. 12's AML/CFT framework triggers BCB 304 art-17's detailed transaction
          monitoring requirements covering seven specific suspicious pattern
          categories (profile mismatch, illicit addresses, structuring, high-risk
          jurisdictions, layering, integration, DeFi obfuscation).
      - id: art-18
        relationship: implements
        confidence: 0.95
        rationale: >
          Art. 12's mandatory record-keeping (including virtual assets) and SAR
          obligations are operationalized by BCB 304 art-18, which specifies COAF
          reporting deadlines (24h for suspicious operations), the R$50,000 threshold,
          on-chain record-keeping requirements, and 5-year minimum retention.

  - source_control: art-12b
    target_controls:
      - id: art-15
        relationship: implements
        confidence: 0.90
        rationale: >
          Art. 12-A creates the National PEP Registry (CNPEP) and mandates its
          consultation by obligated entities. BCB 304 art-15 inciso II implements
          this through enhanced due diligence requirements for PEPs and clients
          from high-risk jurisdictions.
      - id: art-16
        relationship: complements
        confidence: 0.75
        rationale: >
          Art. 12-A's PEP screening obligation complements BCB 304 art-16's travel
          rule requirements, as PEP status of originators and beneficiaries informs
          the risk assessment of transfers.

  - source_control: art-13
    target_controls:
      - id: art-22
        relationship: implements
        confidence: 0.90
        rationale: >
          Art. 13 extends the Consumer Defense Code (CDC) to virtual asset operations.
          BCB 304 art-22 implements consumer protection with specific disclosure
          requirements: service descriptions, risk warnings, fee transparency,
          custody policy, dispute resolution, and deposit protection status.
      - id: art-23
        relationship: implements
        confidence: 0.85
        rationale: >
          Art. 13's CDC application (including protection against deceptive practices)
          is implemented by BCB 304 art-23's conflict of interest management policy,
          which prevents insider trading, front-running, and undisclosed self-dealing.
      - id: art-24
        relationship: complements
        confidence: 0.75
        rationale: >
          Art. 13's consumer protection framework is complemented by BCB 304 art-24's
          reporting obligations (proof of reserves, activity reports), which provide
          transparency and regulatory oversight that indirectly protect consumers.

  - source_control: art-14
    target_controls:
      - id: art-25
        relationship: implements
        confidence: 0.90
        rationale: >
          Art. 14's 180-day vacatio legis (effective June 20, 2023) set the timeline
          for the regulatory framework. BCB 304 art-25 implements the operational
          transition by specifying concrete deadlines (180 days for authorization
          request, 360 days for full compliance) from its own effective date.
      - id: art-26
        relationship: complements
        confidence: 0.70
        rationale: >
          Art. 14's effective date triggers the applicability of all law provisions.
          BCB 304 art-26's sanctions framework becomes enforceable after both the
          law's effective date and the regulation's transition deadlines pass.
