id: kvkk_to_gdpr
title: "KVKK 6698/2016 to GDPR Control Mapping"
source_framework: kvkk
target_framework: gdpr
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic

mappings:
  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: derived-from
        confidence: 0.92
        rationale: >
          KVKK Art. 1 (Purpose of the Law) and GDPR Art. 1 (Subject-matter and
          Objectives) both establish the foundational purpose of protecting fundamental
          rights and freedoms of natural persons with respect to personal data
          processing. KVKK explicitly emphasizes the right to privacy, while GDPR
          additionally enshrines the free movement of personal data within the EU.
          The core protective objective is substantively equivalent; GDPR adds the
          internal market dimension absent from KVKK.

  - source_control: art-2
    target_controls:
      - id: art-1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          KVKK Art. 2 (Scope) defines material scope — applying to all processing
          of personal data by automated means or non-automated means within a filing
          system. GDPR Art. 1 combined with Art. 2 (not present in this project)
          covers equivalent ground. KVKK Art. 2 exemptions (personal/household use,
          anonymized statistics, artistic/scientific purposes, national security,
          judicial proceedings) closely parallel GDPR Art. 2(2) exemptions, though
          KVKK includes additional national security carve-outs specific to Turkish
          constitutional law.

  - source_control: art-3
    target_controls:
      - id: art-1
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          KVKK Art. 3 (Definitions) defines key terms — explicit consent,
          anonymization, data subject, personal data, processing, data controller,
          data processor, and data recording system. GDPR Art. 4 (Definitions, not
          present in this project) is the direct counterpart. GDPR Art. 1 is mapped
          as the closest available control establishing the regulatory framework
          within which these definitions operate. Key distinction: KVKK requires
          "explicit consent" as the baseline (specific, informed, freely given),
          whereas GDPR distinguishes between basic consent and explicit consent
          reserved for special categories.

  - source_control: art-4
    target_controls:
      - id: art-5
        relationship: derived-from
        confidence: 0.92
        rationale: >
          KVKK Art. 4 (General Principles of Data Processing) and GDPR Art. 5
          (Principles relating to processing) are direct functional equivalents.
          KVKK's five principles — lawfulness and good faith, accuracy, purpose
          limitation, proportionality, and retention limitation — mirror GDPR's six
          principles. KVKK uses "good faith" instead of GDPR's "fairness and
          transparency," and frames data minimization as "proportionality." GDPR
          adds the explicit "accountability" principle (Art. 5.2) and
          "integrity and confidentiality" as a named principle, both absent from
          KVKK Art. 4 as standalone concepts.

  - source_control: art-5
    target_controls:
      - id: art-6
        relationship: derived-from
        confidence: 0.88
        rationale: >
          KVKK Art. 5 (Conditions for Processing Personal Data) and GDPR Art. 6
          (Lawfulness of Processing) both enumerate the legal bases for processing
          personal data. The structural difference is significant: KVKK treats
          explicit consent as the primary default basis with seven exceptions, while
          GDPR presents six co-equal legal bases. The substantive grounds overlap
          heavily — consent, contractual necessity, legal obligation, vital interests,
          and legitimate interests appear in both. KVKK omits the "public interest"
          basis found in GDPR Art. 6(1)(e). KVKK's legitimate interests test is
          stricter, requiring that fundamental rights are "not harmed" rather than
          GDPR's proportionality balancing test.

  - source_control: art-6
    target_controls:
      - id: art-5
        relationship: complements
        confidence: 0.78
        rationale: >
          KVKK Art. 6 (Special Categories of Personal Data) maps to GDPR Art. 9
          (Processing of Special Categories, not present in this project). GDPR
          Art. 5 is the closest available control, as KVKK Art. 6's enhanced
          protection requirements for sensitive data reinforce the data processing
          principles. KVKK's special categories are broader than GDPR's, including
          "appearance and clothing" and "membership in associations, foundations,
          or trade unions." Both require explicit consent by default for processing
          special category data. KVKK restricts health and sexual life data
          processing to authorized medical personnel under secrecy obligations.

  - source_control: art-7
    target_controls:
      - id: art-17
        relationship: derived-from
        confidence: 0.90
        rationale: >
          KVKK Art. 7 (Erasure, Destruction, or Anonymization of Personal Data)
          and GDPR Art. 17 (Right to Erasure / Right to Be Forgotten) both establish
          the right and obligation to delete personal data when the processing purpose
          no longer exists. KVKK provides three technical options — erasure,
          destruction, and anonymization — while GDPR focuses on erasure with
          notification obligations to third parties. A key distinction: KVKK imposes
          a proactive ex officio obligation on controllers to delete data without
          waiting for a request, whereas GDPR Art. 17 is primarily rights-triggered.
          Both allow complaint escalation to the supervisory authority if the
          controller refuses.

  - source_control: art-8
    target_controls:
      - id: art-6
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          KVKK Art. 8 (Transfer of Personal Data) governs domestic data transfers,
          requiring explicit consent or a legal basis exception from Art. 5(2) plus
          Board-mandated adequate measures. GDPR Art. 6 provides the legal bases
          framework that underpins lawful transfers within the EU/EEA. KVKK creates a
          dual-condition requirement for consent-free transfers (legal basis AND
          adequate measures) that is more restrictive than GDPR's single legal basis
          requirement for intra-EU transfers.
      - id: art-28
        relationship: complements
        confidence: 0.78
        rationale: >
          KVKK Art. 8 also intersects with GDPR Art. 28 (Processor) regarding
          transfers to data processors. Both require adequate safeguards when
          transferring personal data to processors, though GDPR Art. 28 is more
          prescriptive about the contractual requirements (DPA terms, sub-processor
          controls, audit rights) that must govern the controller-processor
          relationship.

  - source_control: art-9
    target_controls:
      - id: art-44
        relationship: derived-from
        confidence: 0.90
        rationale: >
          KVKK Art. 9 (Transfer of Personal Data Abroad) and GDPR Art. 44 (General
          Principle for Transfers) both establish the default prohibition on
          cross-border transfers without an adequate legal mechanism. Both use
          adequacy determinations as the primary transfer basis. Key differences:
          KVKK requires explicit consent as the default, while GDPR offers multiple
          co-equal mechanisms. KVKK's adequacy assessment uniquely considers
          reciprocity between Turkey and the destination country. The Board approval
          process for binding undertakings under KVKK is more burdensome than GDPR's
          pre-approved Standard Contractual Clauses.

  - source_control: art-9a
    target_controls:
      - id: art-44
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          KVKK Art. 9(2)(b) (Binding Undertaking for Cross-Border Transfers) is
          functionally equivalent to GDPR's Standard Contractual Clauses (Art. 46)
          and Binding Corporate Rules (Art. 47, neither present in this project).
          GDPR Art. 44 is mapped as the closest available control establishing the
          general principle for international transfers. The critical operational
          difference is that KVKK's binding undertaking requires individual Board
          approval for each transfer arrangement, whereas GDPR's SCCs are
          pre-approved by the European Commission and can be adopted without
          per-transfer authorization.

  - source_control: art-10
    target_controls:
      - id: art-15
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          KVKK Art. 10 (Obligation of the Data Controller to Inform) requires
          proactive disclosure of five elements at the time of data collection:
          controller identity, processing purpose, recipients, method/legal basis,
          and data subject rights. GDPR Arts. 13-14 (not present in this project) are
          the direct counterparts. GDPR Art. 15 (Right of Access) is mapped as the
          closest available control, as both address the data subject's right to
          information about processing. KVKK Art. 10 is a push obligation (controller
          must inform at collection), while GDPR Art. 15 is a pull right (data
          subject requests access). Together with GDPR Arts. 13-14, they form the
          complete transparency framework.

  - source_control: art-11
    target_controls:
      - id: art-15
        relationship: derived-from
        confidence: 0.88
        rationale: >
          KVKK Art. 11 rights (a)-(d) — learning whether data is processed,
          requesting processing details, learning processing purpose, and knowing
          transfer recipients — are substantively equivalent to GDPR Art. 15
          (Right of Access), which grants access to personal data and metadata about
          processing activities, purposes, recipients, and retention periods. Both
          establish the foundational right to know what data a controller holds and
          how it is used.
      - id: art-17
        relationship: derived-from
        confidence: 0.88
        rationale: >
          KVKK Art. 11(f) — the right to request erasure or destruction of personal
          data under Art. 7 conditions — directly corresponds to GDPR Art. 17
          (Right to Erasure). Both establish the data subject's right to demand
          deletion when processing grounds no longer exist. KVKK additionally
          includes "destruction" (physical media) as an option alongside erasure
          and anonymization.
      - id: art-1
        relationship: complements
        confidence: 0.72
        rationale: >
          KVKK Art. 11(e) (right to correction), 11(g) (right to notification of
          corrections to third parties), 11(h) (right to object to automated
          decisions), and 11(i) (right to compensation for damages) map to GDPR
          Arts. 16, 19, 22, and 82 respectively — none of which are present in this
          project as individual controls. GDPR Art. 1 is mapped as the overarching
          framework establishing the rights-based protection regime that encompasses
          these specific rights. KVKK Art. 11(i) is notable for explicitly granting
          a compensation right as a data subject right, which GDPR handles separately
          in Art. 82.

  - source_control: art-12
    target_controls:
      - id: art-32
        relationship: derived-from
        confidence: 0.90
        rationale: >
          KVKK Art. 12(1) (data security obligations — prevent unlawful processing,
          prevent unlawful access, ensure retention) and GDPR Art. 32 (Security of
          Processing) both mandate appropriate technical and organizational measures
          to ensure data security. GDPR Art. 32 is more specific, enumerating
          pseudonymization, encryption, confidentiality/integrity/availability, disaster
          recovery, and regular security testing. KVKK Art. 12 frames security around
          three objectives (prevent unlawful processing, prevent unlawful access,
          ensure retention) while GDPR uses a risk-based approach.
      - id: art-33
        relationship: derived-from
        confidence: 0.88
        rationale: >
          KVKK Art. 12(3) (breach notification to the Board and data subjects "as soon
          as possible") maps directly to GDPR Art. 33 (Notification of a Breach to the
          Supervisory Authority within 72 hours). Both require notification to the
          supervisory authority and documentation of breaches. KVKK Art. 12(3) also
          requires direct notification to data subjects, combining what GDPR separates
          between Art. 33 (authority notification) and Art. 34 (data subject
          notification, not in this project). The KVKK Board may publicly disclose
          breaches, creating additional reputational risk absent from GDPR.
      - id: art-28
        relationship: complements
        confidence: 0.75
        rationale: >
          KVKK Art. 12(2) requires the data controller to ensure that data processors
          provide the same level of security. This obligation complements GDPR Art. 28
          (Processor), which requires controllers to use only processors providing
          sufficient guarantees of appropriate technical and organizational measures.
          Both establish controller responsibility for processor security but GDPR
          Art. 28 is far more prescriptive about contractual terms, sub-processor
          controls, and audit rights.

  - source_control: art-13
    target_controls:
      - id: art-15
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          KVKK Art. 13 (Application to the Data Controller) establishes the procedural
          framework for data subject requests — written submission, 30-day response
          deadline, free of charge principle, and reasoned refusal requirements. GDPR
          Art. 12 (Transparent Information, not present in this project) is the direct
          counterpart. GDPR Art. 15 is mapped as the closest available control because
          it establishes the substantive right that Art. 13 procedurally enables.
          Key difference: KVKK Art. 13 provides a fixed 30-day deadline with no
          extension, while GDPR Art. 12 allows a one-month deadline extendable by
          two additional months for complex requests.

  - source_control: art-14
    target_controls:
      - id: art-83
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          KVKK Art. 14 (Application to the Board) establishes the administrative
          complaint mechanism, requiring exhaustion of Art. 13 procedures before
          escalation. GDPR Art. 77 (Right to Lodge a Complaint, not in this project)
          is the direct counterpart. GDPR Art. 83 is mapped as the closest available
          enforcement control, as both are part of the enforcement machinery that
          gives data subject complaints consequential force. Key difference: KVKK
          mandates exhaustion of the controller application (Art. 13) as a
          prerequisite for Board complaints, while GDPR allows direct complaint to
          supervisory authorities without prior application to the controller.

  - source_control: art-15
    target_controls:
      - id: art-83
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          KVKK Art. 15 (Examination by the Board) grants the KVKK Board broad
          investigative and enforcement powers including interim measures, remediation
          orders with 30-day deadlines, on-site inspections, and own-initiative action
          for public interest matters. GDPR Art. 58 (Powers, not present in this
          project) is the direct counterpart. GDPR Art. 83 is mapped as the closest
          available enforcement control, covering the general conditions for
          administrative fines that result from supervisory authority examinations.
          Both establish the supervisory authority's power to investigate and
          enforce compliance.
      - id: art-25
        relationship: complements
        confidence: 0.70
        rationale: >
          KVKK Art. 15's emphasis on interim measures — the Board's power to
          suspend processing during investigation — operationally connects to GDPR
          Art. 25 (Data Protection by Design and Default). Organizations that
          implement privacy by design are better positioned to withstand Board
          examination and avoid interim processing suspensions. Both articles create
          incentives for proactive compliance architecture.

  - source_control: art-16
    target_controls:
      - id: art-30
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          KVKK Art. 16 (Data Controllers' Registry — VERBIS) and GDPR Art. 30
          (Records of Processing Activities — ROPA) both require controllers to
          maintain detailed records of processing activities including controller
          identity, processing purposes, data subject categories, recipient
          categories, cross-border transfers, security measures, and retention
          periods. The key structural difference: KVKK VERBIS is a public registry
          managed by the KVKK Board where controllers must register before
          processing, while GDPR ROPA is an internal record that must be made
          available to supervisory authorities on request. VERBIS creates public
          transparency; ROPA is an accountability tool.

  - source_control: art-18
    target_controls:
      - id: art-83
        relationship: derived-from
        confidence: 0.85
        rationale: >
          KVKK Art. 18 (Administrative Fines) and GDPR Art. 83 (General Conditions
          for Administrative Fines) both establish the penalty framework for
          non-compliance. GDPR's fines are significantly larger (up to EUR 20M or 4%
          global turnover) compared to KVKK's fixed ranges (TRY 5,000 to TRY
          1,000,000). A critical distinction: KVKK Art. 17 adds criminal penalties
          (1 to 4.5 years imprisonment) for specific offenses — unlawful recording,
          illegal acquisition/transfer, and failure to destroy data — creating
          personal criminal liability absent from GDPR, which imposes only
          administrative fines at the EU level.
      - id: art-35
        relationship: complements
        confidence: 0.70
        rationale: >
          KVKK Art. 18 penalties for security obligation failures (Art. 12) and
          information obligation failures (Art. 10) create enforcement pressure
          that complements GDPR Art. 35 (DPIA). Both incentivize proactive risk
          assessment: organizations that conduct thorough impact assessments and
          implement adequate security measures reduce their exposure to penalties
          under both regimes.
