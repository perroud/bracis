id: eu-mdr_to_fda-21-cfr-11
title: "EU MDR 2017/745 to FDA 21 CFR Part 11 Control Mapping"
source_framework: eu-mdr
target_framework: fda-21-cfr-11
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic
description: >
  Mapping between the EU Medical Device Regulation (MDR 2017/745) and FDA 21 CFR Part 11
  (Electronic Records; Electronic Signatures). The intersection occurs primarily in areas
  of system validation, data integrity, audit trails, access control, documentation
  controls, and change management. EU MDR addresses the full lifecycle of medical device
  software including safety, performance, and clinical evaluation, while 21 CFR Part 11
  focuses specifically on the trustworthiness and reliability of electronic records and
  electronic signatures. The overlap is strongest where EU MDR requires electronic quality
  management systems, traceability, and software lifecycle controls that generate and
  maintain electronic records subject to FDA predicate rules.

mappings:
  - source_control: gsr-1
    target_controls:
      - id: sec-11-10a
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          EU MDR gsr-1 requires a continuous risk management system with documented
          plans, hazard analyses, and risk evaluations throughout the device lifecycle.
          FDA 21 CFR 11.10(a) requires validation of systems to ensure accuracy,
          reliability, and consistent intended performance. Both mandate systematic
          assurance that systems perform as intended, but gsr-1 focuses on device
          safety risk management while sec-11-10a focuses on electronic record
          system validation. The intersection lies in the requirement that risk
          management systems generating electronic records must be validated per
          Part 11.
      - id: sec-11-10e
        relationship: complements
        confidence: 0.75
        rationale: >
          EU MDR gsr-1 mandates documented risk management files updated throughout
          the device lifecycle, requiring traceable records of hazard identification,
          risk evaluation, and control measures. FDA 21 CFR 11.10(e) requires secure,
          time-stamped audit trails for all changes to electronic records. The risk
          management documentation required by gsr-1, when maintained electronically,
          must comply with the audit trail requirements of sec-11-10e to ensure
          changes to risk assessments are traceable and non-obscuring.
      - id: sec-11-10k
        relationship: complements
        confidence: 0.73
        rationale: >
          EU MDR gsr-1 requires manufacturers to document and maintain risk management
          plans, analyses, and reports. FDA 21 CFR 11.10(k) requires controls over
          systems documentation including distribution, access, revision, and change
          control with audit trails. Risk management documentation maintained
          electronically must follow the documentation control requirements of
          sec-11-10k.

  - source_control: gsr-2
    target_controls:
      - id: sec-11-10a
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          EU MDR gsr-2 requires software to be designed to ensure repeatability,
          reliability, and performance in line with intended use, including single
          fault tolerance. FDA 21 CFR 11.10(a) requires system validation to ensure
          accuracy, reliability, consistent intended performance, and the ability to
          discern invalid or altered records. Both share the core requirement of
          system reliability and consistent performance, though gsr-2 addresses
          medical device software design while sec-11-10a addresses electronic
          record system validation.
      - id: sec-11-10f
        relationship: complements
        confidence: 0.74
        rationale: >
          EU MDR gsr-2 requires that in single fault conditions, appropriate means
          shall be adopted to eliminate or reduce risks or impairment of performance.
          FDA 21 CFR 11.10(f) requires operational system checks to enforce permitted
          sequencing of steps and events. Both address system behavior integrity
          — gsr-2 through fault tolerance and graceful degradation, sec-11-10f
          through enforced process sequencing — complementing each other in ensuring
          reliable system operation.

  - source_control: gsr-3
    target_controls:
      - id: sec-11-10d
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          EU MDR gsr-3 requires devices to be designed and manufactured to protect
          against unauthorized access that could hamper the device from functioning
          as intended. FDA 21 CFR 11.10(d) requires limiting system access to
          authorized individuals. Both mandate access control mechanisms to prevent
          unauthorized access, making this a strong intersection. The difference
          is scope: gsr-3 addresses device security broadly while sec-11-10d
          targets electronic record systems specifically.
      - id: sec-11-10g
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          EU MDR gsr-3 mandates protection against unauthorized access with
          appropriate data integrity, confidentiality, and availability controls.
          FDA 21 CFR 11.10(g) requires authority checks ensuring only authorized
          individuals can use the system, sign records, alter records, or perform
          operations. Both enforce role-based authorization for system actions,
          with gsr-3 framing it as device security and sec-11-10g as electronic
          record integrity.
      - id: sec-11-30
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          EU MDR gsr-3 requires protection of data integrity, confidentiality, and
          availability for devices processing personal data, including encryption
          in transit and at rest. FDA 21 CFR 11.30 requires open systems to employ
          document encryption and digital signature standards to ensure record
          authenticity, integrity, and confidentiality. Both mandate cryptographic
          controls for data protection, particularly in network-connected or
          cloud-deployed environments.
      - id: sec-11-10e
        relationship: complements
        confidence: 0.78
        rationale: >
          EU MDR gsr-3 requires data integrity mechanisms ensuring clinical data
          cannot be corrupted, altered, or lost without detection. FDA 21 CFR
          11.10(e) requires secure, time-stamped audit trails that do not obscure
          previously recorded information. The audit trail requirement of sec-11-10e
          is a specific implementation mechanism that supports the broader data
          integrity mandate of gsr-3.

  - source_control: gsr-4
    target_controls:
      - id: sec-11-10b
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          EU MDR gsr-4 requires that software-based devices include version
          identifiers, release notes, and change history made available to users.
          FDA 21 CFR 11.10(b) requires the ability to generate accurate and
          complete copies of records in human-readable and electronic form. Both
          address the requirement to produce accurate, complete, and accessible
          records — gsr-4 for device labelling and IFU documentation, sec-11-10b
          for any electronic record subject to FDA inspection.
      - id: sec-11-10k
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          EU MDR gsr-4 mandates comprehensive labelling and instructions for use
          (IFU) with version-controlled documentation including release notes and
          change history. FDA 21 CFR 11.10(k) requires controls over systems
          documentation including distribution, access, revision, and change
          control with time-sequenced audit trails. Both require managed,
          version-controlled documentation with change tracking.
      - id: sec-11-50
        relationship: complements
        confidence: 0.72
        rationale: >
          EU MDR gsr-4 requires that devices be accompanied by identifying
          information, including manufacturer identity and software version. FDA
          21 CFR 11.50 requires signed electronic records to display the signer's
          name, date/time, and signature meaning. Both address the requirement
          for clear identification and attribution in records, complementing each
          other in ensuring traceability of identity and intent.

  - source_control: swd-1
    target_controls:
      - id: sec-11-10a
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          EU MDR swd-1 requires software to be developed and manufactured
          following state-of-the-art principles of development lifecycle, risk
          management, verification, and validation. FDA 21 CFR 11.10(a) requires
          validation of systems to ensure accuracy, reliability, consistent
          intended performance, and the ability to discern invalid or altered
          records. Both mandate formal validation of software systems, with
          swd-1 applying IEC 62304 lifecycle processes and sec-11-10a applying
          GAMP 5 computer system validation. The overlap in validation
          methodology and intent is substantial.
      - id: sec-11-10d
        relationship: complements
        confidence: 0.76
        rationale: >
          EU MDR swd-1 requires manufacturers to specify minimum IT security
          measures including protection against unauthorized access necessary
          to run the software as intended. FDA 21 CFR 11.10(d) requires limiting
          system access to authorized individuals. Both address access control,
          with swd-1 framing it as a software specification requirement and
          sec-11-10d as an operational control for electronic record systems.
      - id: sec-11-10k
        relationship: complements
        confidence: 0.77
        rationale: >
          EU MDR swd-1 mandates a documented software development plan covering
          the complete lifecycle, configuration management, and problem resolution
          processes. FDA 21 CFR 11.10(k) requires controls over systems
          documentation with revision and change control procedures maintaining
          an audit trail. Both require controlled, versioned documentation of
          software system development and maintenance activities.

  - source_control: swd-2
    target_controls:
      - id: sec-11-10a
        relationship: intersects-with
        confidence: 0.92
        rationale: >
          EU MDR swd-2 explicitly requires verification (confirming specified
          requirements are fulfilled) and validation (demonstrating the software
          meets user needs and intended uses). FDA 21 CFR 11.10(a) requires
          validation of systems to ensure accuracy, reliability, consistent
          intended performance, and the ability to discern invalid or altered
          records. This is the strongest alignment in this mapping — both require
          formal, documented, risk-proportionate verification and validation of
          software systems, with planned activities, documented results, and
          traceability to requirements.
      - id: sec-11-10f
        relationship: complements
        confidence: 0.71
        rationale: >
          EU MDR swd-2 requires that verification provide objective evidence
          that specified requirements are fulfilled at each development phase.
          FDA 21 CFR 11.10(f) requires operational system checks to enforce
          permitted sequencing of steps. Both support the concept of systematic
          verification checkpoints — swd-2 through lifecycle phase gates and
          sec-11-10f through enforced process sequencing.

  - source_control: swd-3
    target_controls:
      - id: sec-11-10d
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          EU MDR swd-3 requires appropriate cybersecurity measures including
          protection against unauthorized access that could hamper device
          function. FDA 21 CFR 11.10(d) requires limiting system access to
          authorized individuals. Both mandate access control as a fundamental
          security requirement, with swd-3 scoping it to medical device
          cybersecurity and sec-11-10d to electronic record system access.
      - id: sec-11-30
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          EU MDR swd-3 requires consideration of risks from the IT environment,
          including network infrastructure, security controls, and other software
          applications. FDA 21 CFR 11.30 requires open systems to employ
          encryption and digital signature standards for record authenticity,
          integrity, and confidentiality. Both address security controls for
          systems operating in network-connected environments where the threat
          surface extends beyond the system boundary.
      - id: sec-11-10g
        relationship: complements
        confidence: 0.80
        rationale: >
          EU MDR swd-3 requires defense-in-depth cybersecurity with multiple
          layers of security controls. FDA 21 CFR 11.10(g) requires authority
          checks ensuring only authorized individuals can perform specific
          operations. Authority checks are a specific control layer within
          the defense-in-depth approach required by swd-3, making sec-11-10g
          a complementary implementation of swd-3's broader mandate.
      - id: sec-11-300
        relationship: complements
        confidence: 0.77
        rationale: >
          EU MDR swd-3 requires vulnerability management, security updates,
          and coordinated vulnerability disclosure throughout the device
          lifecycle. FDA 21 CFR 11.300 requires controls for identification
          codes and passwords including loss management, transaction safeguards,
          and detection of unauthorized use. Both address ongoing security
          maintenance of credential and access mechanisms, with swd-3 taking
          a broader cybersecurity perspective and sec-11-300 focusing
          specifically on authentication credential integrity.

  - source_control: swd-4
    target_controls:
      - id: sec-11-10k
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          EU MDR swd-4 requires a documented change management plan for software
          updates, including change classification, regression analysis, and
          version management. FDA 21 CFR 11.10(k) requires revision and change
          control procedures maintaining a time-sequenced audit trail of systems
          documentation development and modification. Both mandate formal change
          control with documented audit trails, with swd-4 addressing software
          change management specifically and sec-11-10k addressing systems
          documentation change control.
      - id: sec-11-10a
        relationship: complements
        confidence: 0.79
        rationale: >
          EU MDR swd-4 requires that software updates be validated and deployed
          in a controlled manner while maintaining device safety and performance.
          FDA 21 CFR 11.10(a) requires system validation ensuring consistent
          intended performance. Software change management under swd-4 triggers
          revalidation requirements under sec-11-10a, as any change to a
          validated Part 11 system must be assessed for impact on validation
          status.
      - id: sec-11-10e
        relationship: complements
        confidence: 0.78
        rationale: >
          EU MDR swd-4 requires a change log documenting all software
          modifications, their classification, and approval records. FDA 21 CFR
          11.10(e) requires secure, time-stamped audit trails recording all
          actions that create, modify, or delete electronic records. The change
          log required by swd-4, when maintained as an electronic record, must
          conform to the audit trail requirements of sec-11-10e.

  - source_control: qms-1
    target_controls:
      - id: sec-11-10a
        relationship: intersects-with
        confidence: 0.84
        rationale: >
          EU MDR qms-1 requires a comprehensive quality management system (QMS)
          addressing compliance strategy, resource management, risk management,
          product realization, and corrective actions. FDA 21 CFR 11.10(a) requires
          validation of systems to ensure accuracy, reliability, and consistent
          performance. When the QMS is implemented as an electronic system (eQMS),
          it must be validated per sec-11-10a, and the QMS itself establishes the
          procedural framework within which system validation is planned and
          executed.
      - id: sec-11-10j
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          EU MDR qms-1 requires the QMS to establish management responsibility,
          compliance with regulatory procedures, and documentation of all quality
          processes. FDA 21 CFR 11.10(j) requires written policies establishing
          individual accountability for actions under electronic signatures and
          deterring record falsification. Both mandate documented policies
          establishing organizational accountability — qms-1 for quality
          management compliance and sec-11-10j for electronic signature integrity.
      - id: sec-11-10k
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          EU MDR qms-1 requires the QMS to include documented strategies,
          procedures, and records across all quality management aspects. FDA
          21 CFR 11.10(k) requires controls over systems documentation including
          distribution, access, and change control. The QMS documentation
          requirements of qms-1 directly align with the documentation control
          requirements of sec-11-10k when those documents are maintained
          electronically.
      - id: sec-11-10i
        relationship: complements
        confidence: 0.76
        rationale: >
          EU MDR qms-1 requires resource management including personnel competence
          documentation and supplier control. FDA 21 CFR 11.10(i) requires that
          persons developing, maintaining, or using electronic record systems have
          adequate education, training, and experience. Both address personnel
          qualification requirements, with qms-1 scoping it to all QMS activities
          and sec-11-10i targeting electronic record system personnel specifically.

  - source_control: qms-2
    target_controls:
      - id: sec-11-10b
        relationship: intersects-with
        confidence: 0.84
        rationale: >
          EU MDR qms-2 requires comprehensive technical documentation that allows
          conformity assessment, including device description, design information,
          risk management, and verification/validation reports. FDA 21 CFR 11.10(b)
          requires the ability to generate accurate and complete copies of records
          in human-readable and electronic form for agency inspection. Both require
          that critical documentation be accurately reproducible for regulatory
          review — qms-2 for notified body conformity assessment and sec-11-10b
          for FDA inspection.
      - id: sec-11-10c
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          EU MDR qms-2 requires technical documentation to be kept up to date and
          retained throughout the device lifecycle, with Annex II and III specifying
          detailed content requirements. FDA 21 CFR 11.10(c) requires protection
          of records to enable accurate and ready retrieval throughout the retention
          period. Both mandate long-term record protection and accessibility,
          with qms-2 requiring retention for at least 10 years after the last
          device is placed on the market.
      - id: sec-11-10k
        relationship: intersects-with
        confidence: 0.87
        rationale: >
          EU MDR qms-2 mandates structured, organized, readily searchable
          technical documentation with version control, including design history
          files. FDA 21 CFR 11.10(k) requires controls over systems documentation
          including distribution, access, revision, and change control with
          time-sequenced audit trails. Both require formal documentation management
          with version control, access control, and change tracking — this is
          one of the strongest alignments in this mapping.
      - id: sec-11-10e
        relationship: complements
        confidence: 0.79
        rationale: >
          EU MDR qms-2 requires that technical documentation be updated throughout
          the device lifecycle with traceable modifications. FDA 21 CFR 11.10(e)
          requires secure, time-stamped audit trails recording all changes to
          electronic records without obscuring previous information. When technical
          documentation is maintained as electronic records, the audit trail
          requirements of sec-11-10e ensure the traceability of modifications
          required by qms-2.

  - source_control: qms-3
    target_controls:
      - id: sec-11-10e
        relationship: intersects-with
        confidence: 0.81
        rationale: >
          EU MDR qms-3 requires documented CAPA procedures including root cause
          analysis, action implementation, and effectiveness verification, with
          all activities recorded. FDA 21 CFR 11.10(e) requires secure,
          time-stamped audit trails recording all changes to electronic records.
          CAPA records maintained electronically must have audit trails per
          sec-11-10e, and the CAPA process itself may be triggered by audit
          trail analysis revealing data integrity issues.
      - id: sec-11-10a
        relationship: complements
        confidence: 0.76
        rationale: >
          EU MDR qms-3 requires systematic investigation and resolution of
          non-conformities with verified effectiveness. FDA 21 CFR 11.10(a)
          requires system validation ensuring consistent intended performance.
          CAPA findings related to system defects trigger revalidation activities
          under sec-11-10a, and the CAPA process validates that corrective
          actions effectively resolve the identified non-conformities.
      - id: sec-11-10f
        relationship: complements
        confidence: 0.72
        rationale: >
          EU MDR qms-3 requires structured CAPA procedures with defined steps
          from initiation through effectiveness verification. FDA 21 CFR 11.10(f)
          requires operational system checks to enforce permitted sequencing of
          steps. Both enforce sequential process discipline — qms-3 through
          CAPA workflow stages and sec-11-10f through system-enforced step
          sequencing.

  - source_control: pms-1
    target_controls:
      - id: sec-11-10c
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          EU MDR pms-1 requires systematic gathering, recording, and analyzing
          of data on device quality, performance, and safety throughout its
          lifetime. FDA 21 CFR 11.10(c) requires protection of records to
          enable accurate and ready retrieval throughout the retention period.
          Both mandate long-term data collection and retention — pms-1 for
          post-market surveillance data and sec-11-10c for electronic records
          generally. PMS data maintained electronically must be protected per
          sec-11-10c for the duration of the device's market presence.
      - id: sec-11-10e
        relationship: complements
        confidence: 0.77
        rationale: >
          EU MDR pms-1 requires that PMS data be used to update benefit-risk
          determinations, risk management, clinical evaluations, and labelling.
          FDA 21 CFR 11.10(e) requires audit trails for all changes to electronic
          records. When PMS data triggers updates to regulated records (risk
          assessments, clinical evaluations), those changes must be captured
          in audit trails per sec-11-10e, providing traceability from field
          observation to regulatory action.
      - id: sec-11-10b
        relationship: complements
        confidence: 0.73
        rationale: >
          EU MDR pms-1 requires manufacturers to produce PMS reports and Periodic
          Safety Update Reports (PSUR) documenting collected data and conclusions.
          FDA 21 CFR 11.10(b) requires the ability to generate accurate and
          complete copies of records for agency review. PMS reports and PSURs,
          when maintained electronically, must be reproducible per sec-11-10b
          for submission to competent authorities and for FDA inspection.

  - source_control: pms-2
    target_controls:
      - id: sec-11-10e
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          EU MDR pms-2 requires immediate reporting of serious incidents with
          strict timelines (2, 10, or 15 days) and documented investigation of
          causal relationships. FDA 21 CFR 11.10(e) requires secure, time-stamped
          audit trails recording all electronic record changes. Vigilance
          reporting involves creating, modifying, and transmitting electronic
          records under tight regulatory deadlines, making time-stamped audit
          trails essential for demonstrating compliance with reporting timelines
          and tracking investigation activities.
      - id: sec-11-10b
        relationship: complements
        confidence: 0.78
        rationale: >
          EU MDR pms-2 requires incident reports to be submitted through
          electronic systems (EUDAMED) and documented for competent authorities.
          FDA 21 CFR 11.10(b) requires the ability to generate accurate and
          complete copies of records for agency inspection. Vigilance records
          must be exportable in both human-readable and electronic form for
          regulatory review across multiple jurisdictions.
      - id: sec-11-10c
        relationship: complements
        confidence: 0.75
        rationale: >
          EU MDR pms-2 requires maintenance of forensic logging, incident
          timelines, and investigation documentation for regulatory scrutiny.
          FDA 21 CFR 11.10(c) requires protection of records for accurate
          retrieval throughout the retention period. Vigilance records require
          long-term retention and integrity protection, as they may be
          referenced in subsequent investigations or regulatory proceedings
          years after the original incident.

  - source_control: pms-3
    target_controls:
      - id: sec-11-10e
        relationship: complements
        confidence: 0.77
        rationale: >
          EU MDR pms-3 requires reporting and tracking of field safety corrective
          actions including recalls, with documentation of corrective measures
          and user notifications. FDA 21 CFR 11.10(e) requires secure audit
          trails for electronic record changes. FSCA documentation, tracking
          corrective update deployment, and user notification records all
          constitute electronic records requiring audit trails per sec-11-10e.
      - id: sec-11-10k
        relationship: complements
        confidence: 0.74
        rationale: >
          EU MDR pms-3 requires documented field safety notice procedures,
          communication templates, and corrective action tracking records.
          FDA 21 CFR 11.10(k) requires controls over systems documentation
          with change control and audit trails. FSCA documentation requires
          the same controlled document management as any systems documentation
          under sec-11-10k.
      - id: sec-11-10b
        relationship: complements
        confidence: 0.72
        rationale: >
          EU MDR pms-3 requires that manufacturers report FSCA through
          electronic systems and maintain records for competent authorities.
          FDA 21 CFR 11.10(b) requires generating accurate and complete
          copies of records for agency review. FSCA records must be producible
          in complete form for multi-jurisdictional regulatory inspection.

  - source_control: cld-1
    target_controls:
      - id: sec-11-10c
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          EU MDR cld-1 requires clinical evaluation documentation to be
          maintained and updated throughout the device lifecycle with clinical
          data from post-market clinical follow-up. FDA 21 CFR 11.10(c) requires
          protection of records for accurate and ready retrieval throughout the
          retention period. Clinical evaluation records require long-term
          retention and integrity protection, making sec-11-10c directly
          applicable when these records are maintained electronically.
      - id: sec-11-10e
        relationship: complements
        confidence: 0.78
        rationale: >
          EU MDR cld-1 requires that clinical evaluation be updated throughout
          the device lifecycle as new clinical data becomes available. FDA
          21 CFR 11.10(e) requires secure, time-stamped audit trails for all
          changes to electronic records. Updates to clinical evaluation reports
          based on new evidence must be traceable through audit trails per
          sec-11-10e, preserving the complete history of clinical evidence
          assessment.
      - id: sec-11-10a
        relationship: complements
        confidence: 0.75
        rationale: >
          EU MDR cld-1 requires a defined and methodologically sound procedure
          for clinical evaluation based on critical evaluation of evidence.
          FDA 21 CFR 11.10(a) requires system validation to ensure accuracy
          and reliability. When clinical data management and analysis are
          performed by software systems, those systems must be validated per
          sec-11-10a to ensure the accuracy and reliability of clinical
          evaluation outputs.

  - source_control: cld-2
    target_controls:
      - id: sec-11-10c
        relationship: intersects-with
        confidence: 0.79
        rationale: >
          EU MDR cld-2 requires continuous post-market clinical follow-up (PMCF)
          with proactive collection and evaluation of clinical data throughout
          the device's expected lifetime. FDA 21 CFR 11.10(c) requires protection
          of records for accurate retrieval throughout the retention period.
          PMCF data collected over the device's lifetime must be stored with
          integrity protections ensuring long-term accessibility and accuracy
          per sec-11-10c.
      - id: sec-11-10e
        relationship: complements
        confidence: 0.76
        rationale: >
          EU MDR cld-2 requires PMCF evaluation reports documenting collected
          data, analysis results, and actions taken, with continuous updates
          to the clinical evaluation. FDA 21 CFR 11.10(e) requires audit trails
          for all modifications to electronic records. PMCF report updates
          and clinical evaluation revisions require audit trail compliance
          per sec-11-10e to demonstrate the evolution of clinical evidence
          over time.
      - id: sec-11-10b
        relationship: complements
        confidence: 0.73
        rationale: >
          EU MDR cld-2 mandates PMCF reports at defined intervals (at least
          annually for Class III devices) with documented analysis and
          conclusions. FDA 21 CFR 11.10(b) requires generating accurate and
          complete copies of records for agency review. PMCF reports submitted
          to notified bodies and competent authorities must be reproducible
          in complete, accurate form per sec-11-10b.

  - source_control: udi-1
    target_controls:
      - id: sec-11-10e
        relationship: intersects-with
        confidence: 0.81
        rationale: >
          EU MDR udi-1 requires unique device identification with UDI-DI
          (device identifier) and UDI-PI (production/version identifier), with
          the UDI-PI tracking software versions. FDA 21 CFR 11.10(e) requires
          secure, time-stamped audit trails for electronic records. The UDI
          assignment and version tracking process generates electronic records
          that must maintain audit trails per sec-11-10e, and the UDI-PI
          (version identifier) serves as a critical traceability element in
          audit trail entries.
      - id: sec-11-10c
        relationship: complements
        confidence: 0.77
        rationale: >
          EU MDR udi-1 requires that UDI records be maintained and registered
          in the EUDAMED database with traceability across the supply chain.
          FDA 21 CFR 11.10(c) requires protection of records for accurate
          retrieval throughout the retention period. UDI registration records
          must be retained and protected for the lifetime of the device plus
          regulatory retention requirements.
      - id: sec-11-10b
        relationship: complements
        confidence: 0.74
        rationale: >
          EU MDR udi-1 requires UDI information to appear on the device label,
          packaging, and within the software itself. FDA 21 CFR 11.10(b)
          requires generating accurate and complete copies of records in
          human-readable and electronic form. UDI records, when requested by
          regulators, must be producible in complete and accurate form per
          sec-11-10b.

  - source_control: udi-2
    target_controls:
      - id: sec-11-10c
        relationship: intersects-with
        confidence: 0.82
        rationale: >
