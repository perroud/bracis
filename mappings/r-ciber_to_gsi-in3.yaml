id: r-ciber_to_gsi-in3
title: "R-Ciber to IN GSI/PR 3 Control Mapping"
source_framework: r-ciber
target_framework: gsi-in3
version: "1.0.0"
last_updated: "2026-04-04"
methodology: structural
description: >
  Mapeamento entre o R-Ciber (Resolucao ANATEL 740/2020 -- ciberseguranca para
  telecomunicacoes) e a IN GSI/PR 3/2021 (processos operacionais de gestao de SI
  na APF). Ambos tratam de governanca de seguranca cibernetica com requisitos
  complementares -- R-Ciber para setor privado de telecom, GSI IN3 para APF.

mappings:
  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Ambos os controles definem objeto e escopo de aplicacao de suas
          respectivas regulamentacoes de seguranca. O R-Ciber art-1 delimita
          o ambito para prestadoras de telecomunicacoes, enquanto GSI IN3 art-1
          delimita para orgaos e entidades da APF.

  - source_control: art-3
    target_controls:
      - id: art-3
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          Ambos tratam de responsabilidades e principios de seguranca. O R-Ciber
          art-3 estabelece o principio da proporcionalidade para prestadoras, e
          o GSI IN3 art-3 define as responsabilidades do Gestor de Seguranca da
          Informacao na APF.

  - source_control: art-5
    target_controls:
      - id: art-4
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          A gestao de ativos e inventario de rede do R-Ciber art-5 mapeia-se
          diretamente ao inventario de ativos de informacao do GSI IN3 art-4.
          Ambos exigem catalogacao sistematica dos ativos sob gestao.
      - id: art-5
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          O inventario de rede do R-Ciber art-5 inclui aspectos de classificacao
          de ativos equivalentes ao art-5 do GSI IN3 (Classificacao de Ativos de
          Informacao).

  - source_control: art-6
    target_controls:
      - id: art-8
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          O controle de acesso e autenticacao em sistemas de telecomunicacoes
          (R-Ciber art-6) e equivalente a politica de controle de acesso do
          GSI IN3 art-8, que define os principios de acesso baseado em necessidade.
      - id: art-9
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Os requisitos de autenticacao do R-Ciber art-6 mapeiam-se a gestao
          de identidades do GSI IN3 art-9 e ao art-10 (Autenticacao de Usuarios).
      - id: art-10
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Os mecanismos de autenticacao exigidos no R-Ciber art-6 correspondem
          diretamente aos requisitos de autenticacao de usuarios do GSI IN3 art-10.

  - source_control: art-7
    target_controls:
      - id: art-38
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          O monitoramento continuo e gestao de logs do R-Ciber art-7 corresponde
          diretamente a politica de registro de eventos do GSI IN3 art-38.
      - id: art-40
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          O monitoramento continuo exigido no R-Ciber art-7 mapeia-se ao
          monitoramento continuo de seguranca do GSI IN3 art-40, ambos
          exigindo visibilidade em tempo real do ambiente.
      - id: art-41
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          A gestao de logs do R-Ciber art-7 inclui requisitos de retencao
          equivalentes ao GSI IN3 art-41 (Retencao e Protecao de Logs).

  - source_control: art-8
    target_controls:
      - id: art-3
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          A obrigacao de elaborar politica de seguranca cibernetica para
          prestadoras (R-Ciber art-8) e equivalente funcional as responsabilidades
          do Gestor de SI na APF (GSI IN3 art-3), ambos exigindo formalizacao
          da governanca de seguranca.

  - source_control: art-10
    target_controls:
      - id: art-3
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          O programa de conscientizacao e treinamento do R-Ciber art-10 mapeia-se
          as responsabilidades do Gestor de SI do GSI IN3 art-3, que inclui
          promover cultura de seguranca na organizacao.

  - source_control: art-11
    target_controls:
      - id: art-30
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          A seguranca na aquisicao e contratacao de tecnologia de telecomunicacoes
          (R-Ciber art-11) corresponde a gestao de dependencias e componentes de
          terceiros do GSI IN3 art-30, ambos tratando de risco na cadeia de
          suprimentos tecnologicos.

  - source_control: art-12
    target_controls:
      - id: art-21
        relationship: intersects-with
        confidence: 0.87
        rationale: >
          Os requisitos de criptografia e protecao de dados em redes de
          telecomunicacoes (R-Ciber art-12) mapeiam-se a politica de uso de
          criptografia do GSI IN3 art-21, com abordagens equivalentes para
          protecao de dados em transito e em repouso.
      - id: art-26
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          A criptografia aplicada a transmissao de dados do R-Ciber art-12
          corresponde aos requisitos de transferencia segura de dados do GSI
          IN3 art-26.

  - source_control: art-13
    target_controls:
      - id: art-4
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          O processo de gestao de riscos ciberneticos do R-Ciber art-13 e
          equivalente funcional ao inventario de ativos como base para gestao
          de riscos do GSI IN3 art-4. Ambos fundamentam a abordagem de risco
          organizacional.

  - source_control: art-14
    target_controls:
      - id: art-3
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          O plano de resposta a incidentes do R-Ciber art-14 e comparavel as
          responsabilidades formais de gestao de incidentes atribuidas ao
          Gestor de SI no GSI IN3 art-3.

  - source_control: art-16
    target_controls:
      - id: art-33
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          A gestao de vulnerabilidades e atualizacoes de seguranca do R-Ciber
          art-16 corresponde diretamente a politica de gestao de vulnerabilidades
          do GSI IN3 art-33, ambos exigindo processo sistematico de identificacao
          e remediacao.
      - id: art-35
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          As atualizacoes de seguranca como componente da gestao de
          vulnerabilidades (R-Ciber art-16) mapeiam-se especificamente ao
          art-35 do GSI IN3 (Gestao de Patches e Atualizacoes).

  - source_control: art-17
    target_controls:
      - id: art-24
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          A continuidade operacional e recuperacao de desastres do R-Ciber art-17
          mapeia-se ao backup e recuperacao de dados do GSI IN3 art-24, ambos
          cobrindo aspectos de resiliencia operacional.
