id: pdpa-thailand_to_gdpr
title: "PDPA Thailand to GDPR Control Mapping"
source_framework: pdpa-thailand
target_framework: gdpr
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  - source_control: sec-19
    target_controls:
      - id: art-6
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          PDPA Section 19 (Collection of Personal Data) is equivalent to GDPR
          Art. 6 (Lawfulness of Processing). Both establish that processing
          requires a lawful basis and enumerate the legal grounds: consent,
          contract performance, legal obligation, vital interests, public
          interest, and legitimate interests. PDPA Section 19 also embeds
          a data minimization requirement ("to the extent necessary") and
          a transparency obligation (informing the data subject of purposes
          before or at the time of collection), making it a slightly broader
          provision than GDPR Art. 6 alone.
      - id: art-5
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PDPA Section 19's embedded necessity and purpose-notification
          requirements intersect with GDPR Art. 5(1)(a) (lawfulness, fairness,
          transparency), Art. 5(1)(b) (purpose limitation), and Art. 5(1)(c)
          (data minimization). PDPA bundles these principles into the
          collection provision, while GDPR separates them as standalone
          principles in Art. 5.

  - source_control: sec-21
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          PDPA Section 21 (Purpose Limitation) is equivalent to GDPR
          Art. 5(1)(b) (purpose limitation principle). Both prohibit processing
          personal data beyond the purposes for which it was originally
          collected, and both require new consent or an alternative legal basis
          for secondary uses. PDPA Section 21 also incorporates data
          minimization ("only to the extent necessary"), mapping to GDPR
          Art. 5(1)(c) as well.
      - id: art-6
        relationship: complements
        confidence: 0.78
        rationale: >
          PDPA Section 21's requirement for additional consent or legal basis
          when repurposing data complements GDPR Art. 6, which requires a
          lawful basis for every processing operation. Both frameworks converge
          on the principle that new purposes require new justification.

  - source_control: sec-22
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          PDPA Section 22 (Data Minimization and Accuracy) is equivalent to
          GDPR Art. 5(1)(c) (data minimization) and Art. 5(1)(d) (accuracy).
          Both require that only necessary data is collected and that personal
          data be kept accurate, up-to-date, and complete. PDPA Section 22's
          mandate to rectify or delete inaccurate data "without delay" directly
          mirrors GDPR Art. 5(1)(d)'s requirement for erasure or rectification
          of inaccurate data "without delay."
      - id: art-25
        relationship: complements
        confidence: 0.75
        rationale: >
          PDPA Section 22's data minimization obligation complements GDPR
          Art. 25 (Data Protection by Design and Default), which requires that
          by default only necessary personal data is processed. Both mandate
          limiting data collection to what is strictly justified for the
          declared purpose.

  - source_control: sec-23
    target_controls:
      - id: art-6
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          PDPA Section 23 (Consent Requirements) is equivalent to GDPR Art. 6
          read together with Art. 7 (Conditions for Consent, not separately
          modeled). Both require consent to be freely given, specific, informed,
          and unambiguous. PDPA Section 23 mandates explicit written or
          electronic consent, clear separation from other information, plain
          language, and easy withdrawal — all mirroring GDPR Art. 7 and
          Recitals 32, 42, and 43. Non-compliant consent is void under both
          frameworks.
      - id: art-5
        relationship: complements
        confidence: 0.77
        rationale: >
          PDPA Section 23's transparency and informed-consent requirements
          complement GDPR Art. 5(1)(a)'s lawfulness, fairness, and
          transparency principle. Both frameworks treat informed consent as
          a prerequisite for lawful processing when consent is the chosen
          legal basis.

  - source_control: sec-26
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          PDPA Section 26 (Sensitive Data Processing) intersects with GDPR
          Art. 5 insofar as both frameworks recognize that certain categories
          of personal data require heightened protection. GDPR Art. 9 (Special
          Categories, not separately modeled in this project) is the direct
          equivalent, but Art. 5(1)(f) (integrity and confidentiality) applies
          with greater force to sensitive data. PDPA Section 26's categories
          largely mirror GDPR Art. 9: racial/ethnic origin, political opinions,
          religious beliefs, health data, genetic data, biometric data, criminal
          records, and trade union membership. PDPA adds "sexual behavior" and
          "disability" as explicit categories and includes a catch-all clause.
      - id: art-6
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PDPA Section 26 requires "explicit consent" for sensitive data
          processing, paralleling GDPR Art. 9(2)(a)'s explicit consent
          requirement. The exceptions (vital interests, legal claims, public
          interest, data manifestly made public) closely mirror GDPR Art. 9(2)
          derogations. Both frameworks impose a default prohibition on
          sensitive data processing, permissible only through explicit consent
          or enumerated exceptions.
      - id: art-32
        relationship: complements
        confidence: 0.73
        rationale: >
          PDPA Section 26's implicit requirement for enhanced security
          measures for sensitive data complements GDPR Art. 32 (Security of
          Processing), which mandates security measures appropriate to the
          risk level. Sensitive data inherently demands stronger technical
          controls under both frameworks.

  - source_control: sec-28
    target_controls:
      - id: art-44
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          PDPA Section 28 (Cross-Border Transfer of Personal Data) is
          equivalent to GDPR Art. 44 (General Principle for Transfers) and
          the broader GDPR Chapter V framework (Arts. 44-49). Both require
          adequacy assessment of the destination country, permit transfers
          under Binding Corporate Rules (PDPA Section 28 paragraph 2 vs.
          GDPR Art. 47), and provide derogations for consent, contract
          performance, vital interests, legal compliance, and public interest.
          The structural approach is nearly identical, though the PDPC has not
          yet issued a comprehensive adequacy list comparable to the European
          Commission's adequacy decisions.

  - source_control: sec-30
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          PDPA Section 30 (Rights of the Data Subject) enumerates seven
          fundamental rights (information, access, portability, objection,
          erasure, restriction, rectification) with a 30-day response SLA.
          This is equivalent to GDPR Art. 15 (Right of Access) as the
          anchoring data subject rights provision. GDPR distributes these
          rights across Arts. 12-22, while PDPA Section 30 consolidates them.
          The 30-day response period in PDPA mirrors GDPR Art. 12(3)'s
          one-month deadline. Both require convenient exercise mechanisms and
          documented refusal with complaint information.
      - id: art-17
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          PDPA Section 30's enumeration of the right to erasure and
          destruction intersects directly with GDPR Art. 17 (Right to
          Erasure). Both frameworks grant data subjects the right to request
          deletion when data is no longer necessary or processing lacks a
          lawful basis.
      - id: art-5
        relationship: complements
        confidence: 0.73
        rationale: >
          PDPA Section 30's comprehensive data subject rights complement GDPR
          Art. 5(1)(a)'s transparency and fairness principles, as the
          existence of enforceable individual rights is fundamental to both
          frameworks' accountability models.

  - source_control: sec-31
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          PDPA Section 31 (Right of Access) is equivalent to GDPR Art. 15
          (Right of Access by the Data Subject). Both grant individuals the
          right to obtain a copy of their personal data and information about
          processing. PDPA Section 31 explicitly requires machine-readable
          format, aligning with GDPR Art. 15(3)'s requirement to provide a
          copy. PDPA's unique provision requiring disclosure of how data was
          acquired (especially when collected without consent) has no exact
          GDPR Art. 15 parallel but is partially covered by GDPR
          Art. 15(1)(g) (information about data sources).

  - source_control: sec-33
    target_controls:
      - id: art-17
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          PDPA Section 33 (Right to Erasure) is equivalent to GDPR Art. 17
          (Right to Erasure / Right to Be Forgotten). Both enumerate nearly
          identical grounds for erasure: purpose fulfilled, consent withdrawn
          with no alternative basis, objection upheld, and unlawful processing.
          Both provide exceptions for legal obligations and legal claims.
          PDPA uniquely includes "anonymization" alongside deletion and
          destruction as acceptable outcomes, while GDPR Art. 17(2) adds an
          obligation to notify downstream controllers of the erasure request.

  - source_control: sec-36
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          PDPA Section 36 (Right to Object) intersects with GDPR Art. 5
          because GDPR Art. 21 (Right to Object, not separately modeled in
          this project) is the direct equivalent. Both grant data subjects
          the right to object to processing based on public interest or
          legitimate interests. PDPA Section 36's absolute right to object
          to direct marketing with immediate cessation mirrors GDPR
          Art. 21(2)-(3)'s unconditional direct marketing objection right.
          Both frameworks also allow objection to processing for scientific
          or statistical research purposes.
      - id: art-6
        relationship: complements
        confidence: 0.77
        rationale: >
          PDPA Section 36's right to object complements GDPR Art. 6's lawful
          basis framework. The right to object under both frameworks
          specifically targets the public interest and legitimate interest
          legal bases (GDPR Art. 6(1)(e)-(f)), providing a counterbalancing
          mechanism that allows individuals to challenge processing even when
          a lawful basis exists.

  - source_control: sec-37
    target_controls:
      - id: art-30
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          PDPA Section 37 (Data Controller Obligations) subsection (4) on
          records of processing activities is equivalent to GDPR Art. 30
          (Records of Processing Activities). Both require controllers to
          maintain comprehensive records including data categories, purposes,
          retention periods, security measures, and third-party disclosures.
          Both serve as the backbone of the accountability framework.
      - id: art-25
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          PDPA Section 37's comprehensive controller obligations intersect
          with GDPR Art. 25 (Data Protection by Design and Default). PDPA
          Section 37 requires security measures (subsection 1), data accuracy
          (subsection 2), deletion mechanisms (subsection 3), and DPIAs
          (subsection 7), collectively forming an accountability framework
          that parallels GDPR Art. 25's mandate to embed data protection
          into processing design.
      - id: art-35
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          PDPA Section 37 subsection (7) requiring Data Protection Impact
          Assessments for high-risk processing intersects directly with GDPR
          Art. 35 (DPIA). Both mandate pre-processing risk assessments for
          activities likely to result in high risk to data subjects. Both
          require systematic description of processing, necessity assessment,
          risk evaluation, and mitigating measures.
      - id: art-32
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          PDPA Section 37 subsection (1) on security measures intersects with
          GDPR Art. 32 (Security of Processing). Both require appropriate
          technical and organizational measures to prevent unauthorized access,
          loss, and disclosure. PDPA Section 37 is broader in scope, combining
          security with other controller obligations in a single provision.

  - source_control: sec-37-4
    target_controls:
      - id: art-32
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          PDPA Section 37(4) (Security Measures) is equivalent to GDPR Art. 32
          (Security of Processing). Both mandate appropriate technical and
          organizational security measures proportional to risk and the state
          of technology. PDPA Section 37(4) explicitly requires access control,
          secure storage, incident detection and response, and transmission
          security — all of which correspond to GDPR Art. 32(1)'s requirements
          for confidentiality, integrity, availability, and resilience. Both
          require regular review and updating of security measures.
      - id: art-25
        relationship: complements
        confidence: 0.78
        rationale: >
          PDPA Section 37(4)'s security requirements complement GDPR Art. 25
          (Data Protection by Design and Default). The mandate for proactive
          security measures appropriate to the nature of data and processing
          risks aligns with Art. 25's requirement to implement data protection
          measures at the design stage and throughout the processing lifecycle.

  - source_control: sec-37-5
    target_controls:
      - id: art-33
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          PDPA Section 37(5) (Breach Notification) is equivalent to GDPR
          Art. 33 (Notification of Breach to Supervisory Authority). Both
          require notification within 72 hours of becoming aware of a personal
          data breach. Both mandate identical notification content: nature of
          the breach, categories and numbers of affected subjects, DPO contact
          details, likely consequences, and remedial measures. Both permit
          phased notification when full information is not immediately
          available. PDPA additionally requires data subject notification for
          high-risk breaches, paralleling GDPR Art. 34 (not separately
          modeled in this project).

  - source_control: sec-39
    target_controls:
      - id: art-25
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          PDPA Section 39 (Data Protection Officer) intersects with GDPR
          Art. 25 (Data Protection by Design and Default) as the DPO's advisory
          and monitoring functions are integral to embedding data protection
          into organizational design. GDPR Arts. 37-39 (DPO provisions, not
          separately modeled) are the direct equivalents. Both frameworks
          mandate DPO appointment for public authorities, large-scale
          monitoring, and large-scale sensitive data processing. Both require
          DPO independence, adequate resources, and direct reporting to senior
          management. PDPA mirrors GDPR's three appointment triggers verbatim.
      - id: art-35
        relationship: complements
        confidence: 0.75
        rationale: >
          PDPA Section 39's DPO role complements GDPR Art. 35 (DPIA) because
          both frameworks require DPO consultation during the impact assessment
          process. The DPO's monitoring and advisory functions directly support
          the DPIA workflow, ensuring that high-risk processing is evaluated
          with expert input.
      - id: art-5
        relationship: complements
        confidence: 0.72
        rationale: >
          PDPA Section 39's DPO requirement complements GDPR Art. 5(2)
          (accountability principle). The DPO is the organizational embodiment
          of accountability under both frameworks, responsible for monitoring
          compliance and coordinating with supervisory authorities.

  - source_control: sec-40
    target_controls:
      - id: art-28
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          PDPA Section 40 (Data Processor Obligations) is equivalent to GDPR
          Art. 28 (Processor). Both govern the controller-processor
          relationship with nearly identical requirements: processing only on
          documented instructions, appropriate security measures, breach
          notification to the controller, records of processing activities,
          DPO appointment where required, and mandatory written contracts
          specifying subject matter, duration, nature, purpose, and
          obligations. Both frameworks require controller due diligence on
          processor capabilities and extend obligations through the
          sub-processor chain.
      - id: art-32
        relationship: complements
        confidence: 0.78
        rationale: >
          PDPA Section 40's requirement for processors to implement
          appropriate security measures and notify controllers of breaches
          complements GDPR Art. 32 (Security of Processing). Both frameworks
          extend security obligations to processors, ensuring the security
          chain is maintained across the data processing ecosystem.

  - source_control: sec-90
    target_controls:
      - id: art-83
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          PDPA Section 90 (Penalties) intersects with GDPR Art. 83 (General
          Conditions for Administrative Fines). Both establish tiered penalty
          structures for non-compliance. PDPA's administrative fines cap at
          5,000,000 THB (approximately EUR 130,000), significantly lower than
          GDPR's maximum of EUR 20,000,000 or 4% of global turnover. However,
          PDPA uniquely includes criminal penalties (imprisonment up to 1 year)
          and punitive civil damages (up to 2x actual damages), which GDPR
          Art. 83 does not. PDPA also reverses the burden of proof in civil
          proceedings and extends personal liability to directors, making the
          Thai regime qualitatively different despite lower monetary caps.
      - id: art-5
        relationship: complements
        confidence: 0.72
        rationale: >
          PDPA Section 90's penalty regime complements GDPR Art. 5(2)
          (accountability) by providing the enforcement mechanism that
          underpins the entire data protection framework. Both frameworks
          use penalties as a deterrent to ensure controllers and processors
          take compliance seriously, with penalties proportional to the
          severity and nature of the infringement.
