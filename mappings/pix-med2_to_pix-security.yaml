id: pix-med2_to_pix-security
title: "Pix MED 2.0 to Pix Security Control Mapping"
source_framework: pix-med2
target_framework: pix-security
version: "1.0.0"
last_updated: "2026-04-06"
methodology: structural
description: >
  Mapping between MED 2.0 controls (cascading precautionary block, enhanced
  anti-fraud, mule account traceability, shared liability) and the base Pix
  Security framework. MED 2.0 extends and specializes the original MED,
  anti-fraud, and blocking controls defined in pix-security.

mappings:
  - source_control: med2-1
    target_controls:
      - id: pix-20
        relationship: derived-from
        confidence: 0.95
        rationale: >
          Cascading precautionary block extends the original MED blocking
          mechanism (pix-20) by adding multi-hop chain tracing and cascading
          block requests across multiple PSPs and accounts.
      - id: pix-19
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Cascade blocking is triggered by the MED opening process (pix-19);
          the infraction notification initiates the cascade chain.
      - id: pix-16
        relationship: derived-from
        confidence: 0.85
        rationale: >
          Cascading precautionary block extends the basic precautionary block
          concept (pix-16) from a single account to an entire chain of
          mule accounts.

  - source_control: med2-2
    target_controls:
      - id: pix-17
        relationship: derived-from
        confidence: 0.90
        rationale: >
          Mule account identification and traceability extends DICT fraud
          marker sharing (pix-17) by requiring full chain traceability
          and behavioral scoring for mule detection.
      - id: pix-19
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Mule account data feeds into the MED process (pix-19) as evidence
          for infraction notifications and cascade blocking decisions.
      - id: pix-14
        relationship: complements
        confidence: 0.80
        rationale: >
          Mule account scoring complements the mandatory anti-fraud engine
          (pix-14) with specialized behavioral indicators for intermediary
          accounts used in fraud chains.

  - source_control: med2-3
    target_controls:
      - id: pix-20
        relationship: derived-from
        confidence: 0.95
        rationale: >
          Cascade blocking time limits (30 minutes per hop, 72 hours total)
          and proportionality rules extend the original MED blocking SLAs
          defined in pix-20.
      - id: pix-22
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Time limits and proportionality tie directly into PSP penalty
          framework (pix-22); non-compliance with cascade deadlines triggers
          sanctions.

  - source_control: med2-4
    target_controls:
      - id: pix-19
        relationship: derived-from
        confidence: 0.90
        rationale: >
          Well-founded suspicion criteria extend the MED opening requirements
          (pix-19) by defining structured, documented criteria that must be
          met before filing an infraction notification.
      - id: pix-17
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          DICT fraud markers (pix-17) are a mandatory input to the
          well-founded suspicion evaluation; prior markers on the receiver
          key increase suspicion confidence.
      - id: pix-14
        relationship: complements
        confidence: 0.85
        rationale: >
          Well-founded suspicion criteria complement the anti-fraud engine
          (pix-14) by defining the evidentiary threshold for MED activation,
          using anti-fraud engine outputs as one of the evaluation signals.

  - source_control: med2-5
    target_controls:
      - id: pix-14
        relationship: derived-from
        confidence: 0.95
        rationale: >
          Enhanced real-time anti-fraud engine for MED 2.0 extends the
          mandatory anti-fraud engine (pix-14) with pre-settlement DICT
          checks, retroactive flagging, and MED-specific feedback loops.
      - id: pix-17
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          The enhanced engine integrates DICT fraud markers (pix-17) as a
          core pre-settlement check, querying markers before transaction
          confirmation.
      - id: pix-18
        relationship: complements
        confidence: 0.75
        rationale: >
          Enhanced anti-fraud capabilities complement the operational risk
          management framework (pix-18) by reducing fraud risk through
          proactive detection mechanisms.

  - source_control: med2-6
    target_controls:
      - id: pix-17
        relationship: derived-from
        confidence: 0.95
        rationale: >
          DICT fraud marker management and sharing extends the base
          infraction report mechanism (pix-17) with lifecycle management,
          timely updates, and structured producer/consumer obligations
          specific to MED 2.0.
      - id: pix-19
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Marker lifecycle is tightly coupled with the MED process (pix-19);
          markers are created at MED activation and updated as the case
          progresses.
      - id: pix-14
        relationship: complements
        confidence: 0.80
        rationale: >
          DICT markers serve as high-weight features in the anti-fraud engine
          (pix-14); proper marker management directly impacts engine
          accuracy.

  - source_control: med2-7
    target_controls:
      - id: pix-19
        relationship: derived-from
        confidence: 0.95
        rationale: >
          Infraction notification via DICT extends the MED opening procedure
          (pix-19) by specifying detailed payload requirements, digital
          signature, non-repudiation, and secure transmission.
      - id: pix-20
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          The infraction notification is the trigger for resource blocking
          (pix-20); notification quality and timeliness directly impact
          blocking effectiveness.

  - source_control: med2-8
    target_controls:
      - id: pix-21
        relationship: derived-from
        confidence: 0.85
        rationale: >
          Account holder notification requirements extend the MED return
          process (pix-21) by mandating multi-channel communication to both
          blocked account holder and victim at every lifecycle stage.
      - id: pix-20
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Notification to the blocked account holder is triggered by the
          blocking action (pix-20) and must include block amount, reason,
          duration, and contestation rights.
      - id: pix-28
        relationship: complements
        confidence: 0.70
        rationale: >
          User notification and contestation channel requirements complement
          the UX guidelines (pix-28) by extending them to the MED context
          with specific regulatory content requirements.

  - source_control: med2-9
    target_controls:
      - id: pix-22
        relationship: derived-from
        confidence: 0.90
        rationale: >
          Regulatory deadlines and SLA compliance extend MED responsibilities
          and penalties (pix-22) by defining granular per-stage deadlines
          (30 minutes, 7 days, 96 hours) with explicit penalty triggers.
      - id: pix-20
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          The 30-minute blocking deadline and 7-day analysis window directly
          govern the blocking and analysis process defined in pix-20.
      - id: pix-21
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          The 96-hour return deadline applies to the fund return process
          defined in pix-21.

  - source_control: med2-10
    target_controls:
      - id: pix-22
        relationship: derived-from
        confidence: 0.90
        rationale: >
          Payer PSP responsibilities extend the MED responsibility framework
          (pix-22) by detailing specific obligations: complaint intake,
          fraud evaluation, notification filing, case tracking, user
          communication, and fund crediting.
      - id: pix-19
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          The payer PSP is responsible for the MED opening process (pix-19),
          including providing accessible channels for fraud reporting and
          filing timely infraction notifications.
      - id: pix-14
        relationship: complements
        confidence: 0.75
        rationale: >
          Payer PSP prevention obligations complement the anti-fraud engine
          mandate (pix-14) by requiring pre-transaction warnings and
          enhanced authentication for high-risk transactions.

  - source_control: med2-11
    target_controls:
      - id: pix-22
        relationship: derived-from
        confidence: 0.90
        rationale: >
          Receiver PSP responsibilities extend the MED responsibility
          framework (pix-22) with detailed operational obligations:
          automated blocking, cascade initiation, merit analysis,
          contestation processing, and fund return.
      - id: pix-20
        relationship: derived-from
        confidence: 0.90
        rationale: >
          Receiver PSP blocking and analysis obligations extend the MED
          blocking process (pix-20) with cascade detection logic and
          automated merit analysis workflows.
      - id: pix-16
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Receiver PSP monitoring obligation to detect mule patterns
          intersects with precautionary block capabilities (pix-16), as
          the PSP must proactively identify accounts receiving fraudulent
          funds.

  - source_control: med2-12
    target_controls:
      - id: pix-22
        relationship: derived-from
        confidence: 0.95
        rationale: >
          Shared liability and accountability framework extends the MED
          penalty regime (pix-22) by defining explicit liability triggers
          for payer and receiver PSPs and the BCB assessment criteria.
      - id: pix-20
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Liability is assessed based on blocking timeliness (pix-20);
          failure to block within 30 minutes is a direct liability trigger.
      - id: pix-29
        relationship: complements
        confidence: 0.75
        rationale: >
          Shared liability complements the general penalty framework (pix-29)
          by establishing MED-specific financial accountability rules beyond
          standard sanctions.

  - source_control: med2-13
    target_controls:
      - id: pix-21
        relationship: derived-from
        confidence: 0.95
        rationale: >
          Full and partial fund return procedures extend the MED return
          mechanism (pix-21) with cascade return aggregation, zero-fee
          enforcement, and consolidated multi-PSP settlement flows.
      - id: pix-22
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Return execution within the 96-hour deadline is governed by the
          MED responsibility framework (pix-22); non-compliance triggers
          penalties.

  - source_control: med2-14
    target_controls:
      - id: pix-21
        relationship: derived-from
        confidence: 0.90
        rationale: >
          User dispute resolution and contestation rights extend the MED
          return process (pix-21) by defining structured contestation
          intake, evidence-based analysis, immediate unblocking on accepted
          contestation, and appeal paths.
      - id: pix-28
        relationship: complements
        confidence: 0.70
        rationale: >
          Contestation channels and user communication requirements
          complement UX guidelines (pix-28) with regulatory content
          obligations specific to the MED dispute context.

  - source_control: med2-15
    target_controls:
      - id: pix-21
        relationship: derived-from
        confidence: 0.95
        rationale: >
          Settlement between PSPs and victim reimbursement extends the MED
          return process (pix-21) with multi-party SPI settlement, cascade
          return consolidation, anti-double-recovery controls, and shortfall
          communication.
      - id: pix-22
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Settlement execution within regulatory deadlines is governed by
          the MED responsibility framework (pix-22); the payer PSP must
          credit the victim immediately upon receiving returned funds.
