id: iso-31000_to_iso-27005
title: "ISO 31000:2018 to ISO/IEC 27005:2022 Control Mapping"
source_framework: iso-31000
target_framework: iso-27005
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic

mappings:
  # Risk Management Principles
  - source_control: rm-principles-01
    target_controls:
      - id: ctx.1
        relationship: superset-of
        confidence: 0.85
        rationale: >
          ISO 31000 rm-principles-01 requires risk management to be integrated into
          governance, strategy, and operations. ISO 27005 ctx.1 operationalizes this
          by establishing the organizational context (external and internal) for
          information security risk management, which is the foundational step for
          integration into organizational activities. The ISO 31000 principle is broader
          (all organizational activities) while ctx.1 scopes to information security.
      - id: ctx.4
        relationship: superset-of
        confidence: 0.82
        rationale: >
          The principle of structured and comprehensive risk management in rm-principles-01
          requires organizational roles, authorities, and accountability. ctx.4 directly
          addresses establishing the organizational structure, roles, responsibilities,
          and authorities for information security risk management, ensuring integration
          into organizational processes. rm-principles-01 covers all risk domains while
          ctx.4 is scoped to information security.

  - source_control: rm-principles-02
    target_controls:
      - id: ctx.1
        relationship: complements
        confidence: 0.78
        rationale: >
          The dynamic and customized aspects of rm-principles-02 require understanding
          changing external and internal contexts. ctx.1 provides the mechanism for
          establishing and revisiting that context, including regulatory, technological,
          and competitive factors, enabling the organization to adapt its risk management
          approach as conditions change.
      - id: rc.2
        relationship: superset-of
        confidence: 0.85
        rationale: >
          rm-principles-02 requires inclusive risk management with appropriate and timely
          stakeholder involvement across all risk domains. rc.2 implements this for
          information security by establishing processes for consultation with internal and
          external stakeholders, ensuring diverse perspectives and domain expertise inform
          risk management decisions.
      - id: ctx.2
        relationship: complements
        confidence: 0.75
        rationale: >
          The customization principle in rm-principles-02 requires risk management to be
          proportionate to the organization's context and objectives. ctx.2 operationalizes
          this by defining risk criteria that reflect the organization's values, objectives,
          and resources, enabling tailored risk evaluation.

  - source_control: rm-principles-03
    target_controls:
      - id: ra.2
        relationship: superset-of
        confidence: 0.82
        rationale: >
          rm-principles-03 requires risk management inputs to be based on historical and
          current information plus future expectations across all risk domains. ra.2
          implements this for information security by requiring threat identification using
          historical incident data, industry threat reports, threat intelligence feeds, and
          expert judgment — the best available information for the threat dimension of risk.
      - id: ra.3
        relationship: superset-of
        confidence: 0.80
        rationale: >
          The best available information principle in rm-principles-03 is a general
          requirement applicable to all risk domains. ra.3 specializes this for information
          security vulnerability identification, requiring technical scanning, penetration
          testing, code reviews, audit reports, vendor advisories, and vulnerability databases
          as comprehensive information sources.
      - id: rc.2
        relationship: complements
        confidence: 0.75
        rationale: >
          The human and cultural factors aspect of rm-principles-03 aligns with rc.2's
          requirement for consultation with diverse stakeholders including business
          operations, legal, and compliance domains, ensuring human perspectives and
          cultural factors are incorporated into risk decisions.

  # Risk Management Framework
  - source_control: rm-framework-01
    target_controls:
      - id: ctx.4
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Both controls address the same core requirement: leadership commitment to risk
          management. rm-framework-01 requires top management to demonstrate leadership
          by ensuring integration, allocating resources, and assigning authority. ctx.4
          requires senior management to demonstrate commitment by aligning risk management
          with objectives, establishing governance, and allocating adequate resources.
          The scope differs (general vs. information security) but the governance mechanism
          is equivalent.

  - source_control: rm-framework-02
    target_controls:
      - id: ctx.1
        relationship: superset-of
        confidence: 0.88
        rationale: >
          rm-framework-02 requires understanding the organization and its context as part
          of designing the risk management framework across all domains. ctx.1 is the
          information security specialization of this requirement, establishing the external
          and internal context including governance, organizational structure, regulatory
          landscape, and capabilities.
      - id: ctx.3
        relationship: superset-of
        confidence: 0.85
        rationale: >
          The design component of rm-framework-02 includes defining the scope and boundaries
          of the risk management framework for all risk domains. ctx.3 directly specializes
          this for information security by defining which information systems, business
          processes, and assets are included, and delineating interfaces with external entities.
      - id: ctx.2
        relationship: complements
        confidence: 0.78
        rationale: >
          rm-framework-02 requires articulating risk management commitment and establishing
          communication, which includes defining how risks will be evaluated. ctx.2 supports
          this by defining risk criteria (acceptance criteria, assessment criteria, risk
          level determination) as part of the framework design.

  - source_control: rm-framework-03
    target_controls:
      - id: rt.2
        relationship: superset-of
        confidence: 0.82
        rationale: >
          rm-framework-03 requires developing an implementation plan with time and resources
          across all risk domains. rt.2 specializes this for information security by
          formulating risk treatment plans with identified controls, resources,
          responsibilities, timelines, and expected residual risk.
      - id: rt.4
        relationship: superset-of
        confidence: 0.80
        rationale: >
          The implementation aspect of rm-framework-03 (modifying decision-making processes,
          ensuring arrangements are practiced) is a general requirement. rt.4 specializes this
          for information security by selecting and implementing controls from recognized
          control sets, evaluating implementation constraints, cost, and risk reduction
          achieved, and verifying control effectiveness post-implementation.
      - id: ctx.4
        relationship: complements
        confidence: 0.75
        rationale: >
          rm-framework-03 requires identifying where, when, and how decisions are made and
          by whom. ctx.4 supports this by establishing the organizational structure, roles,
          responsibilities, and authorities specifically for information security risk
          management.

  - source_control: rm-framework-04
    target_controls:
      - id: rm.2
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          Both controls address the same fundamental requirement: periodic evaluation and
          improvement of the risk management framework. rm-framework-04 requires measuring
          performance against purpose, plans, and indicators, and continually improving
          suitability and effectiveness. rm.2 requires reviewing suitability, adequacy,
          and effectiveness at planned intervals, assessing whether criteria, methodology,
          and results remain appropriate, and identifying improvements. The alignment is
          near-complete.
      - id: rm.1
        relationship: complements
        confidence: 0.78
        rationale: >
          rm-framework-04 requires ongoing measurement of framework performance. rm.1
          provides the continuous monitoring mechanism that feeds data into framework
          evaluation by detecting changes in risk context, control effectiveness, and
          the external/internal environment.

  # Risk Management Process
  - source_control: rm-process-01
    target_controls:
      - id: rc.1
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          Both controls address risk communication with the same intent and scope.
          rm-process-01 requires communication to promote awareness and understanding of
          risk, and consultation to obtain feedback for decision-making. rc.1 requires
          communicating risk assessment results, treatment decisions, and treatment plan
          status to stakeholders in a timely and audience-appropriate manner. The
          communication dimension is functionally equivalent.
      - id: rc.2
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          rm-process-01 explicitly addresses consultation as obtaining feedback and
          information to support decision-making. rc.2 directly mirrors this by requiring
          consultation processes with internal and external stakeholders during context
          establishment, risk assessment, risk treatment, and risk acceptance. Both
          require diverse expertise and documented stakeholder inputs.

  - source_control: rm-process-02
    target_controls:
      - id: ctx.1
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          rm-process-02 requires understanding external and internal context as part of
          establishing scope, context, and criteria. ctx.1 is the direct information
          security specialization, requiring the organization to establish external context
          (regulatory, legal, financial, technological) and internal context (governance,
          structure, roles, policies, capabilities, information systems).
      - id: ctx.2
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          rm-process-02 requires defining risk criteria aligned with the risk management
          framework, customized to purpose and scope, and reflecting organizational values,
          objectives, and resources. ctx.2 mirrors this exactly for information security:
          defining risk acceptance criteria, assessment criteria, and risk level criteria
          based on organizational values, objectives, and resources. The semantic alignment
          is the strongest in this mapping.
      - id: ctx.3
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          rm-process-02 requires defining the scope of the risk management process. ctx.3
          directly specializes this by defining which parts of the organization, information
          systems, business processes, and assets are included, and delineating interfaces
          and boundaries. Both address the same scoping function.

  - source_control: rm-process-03
    target_controls:
      - id: ra.1
        relationship: superset-of
        confidence: 0.88
        rationale: >
          rm-process-03 requires identifying all risks including their sources and causes
          across all organizational domains. ra.1 implements the asset dimension of this
          for information security by identifying information assets (primary and supporting)
          that are the subjects of risk. Asset identification is the foundational input for
          risk identification in the information security domain.
      - id: ra.2
        relationship: superset-of
        confidence: 0.88
        rationale: >
          rm-process-03 requires identifying risk sources, causes, and events with
          consequential effects across all risk domains. ra.2 specializes this for
          information security by identifying threats (deliberate, accidental, natural)
          with their sources, motivations, capabilities, and attack vectors — the threat
          dimension of risk identification.
      - id: ra.3
        relationship: superset-of
        confidence: 0.87
        rationale: >
          rm-process-03 requires applying risk identification tools suited to objectives
          and capabilities across all risk domains. ra.3 specializes this for information
          security by identifying exploitable weaknesses in processes, personnel, physical
          environment, systems, and communications using scanning, testing, reviews, and
          advisories.
      - id: ra.4
        relationship: superset-of
        confidence: 0.85
        rationale: >
          rm-process-03 requires consideration of cascade and cumulative effects across all
          risk domains. ra.4 specializes this for information security by identifying
          consequences of loss of confidentiality, integrity, and availability, including
          financial, operational, reputational, legal, and strategic impacts.

  - source_control: rm-process-04
    target_controls:
      - id: ra.5
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          Both controls address risk analysis with near-identical scope. rm-process-04
          requires comprehending the nature of risk including likelihood, consequences,
          controls effectiveness, and varying degrees of detail. ra.5 requires determining
          likelihood of occurrence, magnitude of consequences, considering existing controls,
          and using qualitative, semi-quantitative, or quantitative methods. The alignment
          is functionally equivalent, with ra.5 being the information security specialization.
      - id: ra.6
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          rm-process-04 explicitly covers risk evaluation — comparing analysis results with
          risk criteria to determine where additional action is required. ra.6 mirrors this
          exactly: comparing analyzed risks with established criteria to determine treatment
          priority, considering risk appetite, legal requirements, and stakeholder interests.
          Both serve as the decision point between analysis and treatment.

  - source_control: rm-process-05
    target_controls:
      - id: rt.1
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          Both controls address risk treatment option selection with near-identical
          enumeration. rm-process-05 lists avoiding, taking/increasing, removing source,
          changing likelihood, changing consequences, sharing, and retaining. rt.1 lists
          risk modification, retention, avoidance, and sharing. The options are semantically
          equivalent with rm-process-05 being more granular in decomposing modification
          sub-options.
      - id: rt.2
        relationship: superset-of
        confidence: 0.88
        rationale: >
          rm-process-05 requires planning and implementing risk treatment across all risk
          domains. rt.2 specializes this for information security by formalizing structured
          risk treatment plans with controls, resources, responsibilities, timelines, and
          expected residual risk levels requiring risk owner and management approval.
      - id: rt.3
        relationship: superset-of
        confidence: 0.85
        rationale: >
          rm-process-05 requires deciding whether remaining risk is acceptable across all
          risk domains. rt.3 specializes the risk acceptance decision for information
          security, requiring formal documentation, risk owner and management approval,
          and periodic review of accepted risks.
      - id: rt.4
        relationship: superset-of
        confidence: 0.83
        rationale: >
          rm-process-05's iterative treatment implementation is a general requirement. rt.4
          specializes this for information security by selecting and implementing controls
          from recognized control sets (e.g., ISO 27001 Annex A), evaluating implementation
          constraints, cost, and risk reduction achieved, and verifying control effectiveness
          post-implementation.

  # Risk Monitoring
  - source_control: rm-monitoring-01
    target_controls:
      - id: rm.1
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          Both controls address continuous risk monitoring with the same scope and intent.
          rm-monitoring-01 requires ongoing monitoring and periodic review of the risk
          management process and outcomes as a planned activity. rm.1 requires continuous
          monitoring of information security risks and risk management effectiveness,
          detecting changes in threats, vulnerabilities, control effectiveness, and
          environment. The alignment is functionally equivalent.
      - id: rm.2
        relationship: superset-of
        confidence: 0.85
        rationale: >
          rm-monitoring-01 includes periodic review of the risk management process alongside
          monitoring across all risk domains. rm.2 specializes the review component for
          information security, requiring planned interval reviews assessing suitability,
          adequacy, and effectiveness of the risk management process and whether results,
          criteria, and methodology remain appropriate.

  - source_control: rm-monitoring-02
    target_controls:
      - id: rm.2
        relationship: superset-of
        confidence: 0.88
        rationale: >
          rm-monitoring-02 requires continual improvement of the risk management framework
          and process across all risk domains. rm.2 specializes this for information
          security by requiring reviews that assess continuing suitability and identify
          needed improvements, with management review outputs including decisions on
          changes to criteria, methodology, and resources.
      - id: rm.1
        relationship: complements
        confidence: 0.75
        rationale: >
          rm-monitoring-02's continual improvement objective depends on the monitoring data
          produced by rm.1. The continuous detection of changes in risk context, control
          effectiveness, and environment feeds the improvement cycle by identifying where
          gaps and improvement opportunities exist.

  # Risk Reporting
  - source_control: rm-reporting-01
    target_controls:
      - id: rc.1
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Both controls address risk reporting with equivalent intent. rm-reporting-01
          requires documenting and reporting risk management activities and outcomes across
          the organization, providing decision-making information, and considering stakeholder
          needs, cost, frequency, and information sensitivity. rc.1 requires communicating
          risk assessment results, treatment decisions, and plan status to stakeholders in
          an audience-tailored manner with defined channels and regular cadences.
      - id: rm.2
        relationship: complements
        confidence: 0.72
        rationale: >
          rm-reporting-01 requires recording to provide the foundation for improvement of
          methods, tools, and the overall process. rm.2's periodic review process consumes
          this recorded information to assess whether the risk management process and its
          outcomes remain suitable, adequate, and effective, making recorded data a critical
          input to the review cycle.
