id: essential-eight_to_cis-controls-v8
title: "Essential Eight to CIS Controls v8 Control Mapping"
source_framework: essential-eight
target_framework: cis-controls-v8
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # ──────────────────────────────────────────────────────────────────────
  # E8 — Application Control (prevent)
  # ──────────────────────────────────────────────────────────────────────
  - source_control: e8-app-control
    target_controls:
      - id: cis-2.1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          E8 Application Control restricts execution to an approved set of
          executables, libraries, scripts, and installers. CIS 2.1 requires
          maintaining a detailed software inventory including approved and
          unauthorized software. The software inventory is the foundational
          prerequisite for defining the application control allowlist, and both
          controls aim to prevent unauthorized software from operating within
          the enterprise.
      - id: cis-4.1
        relationship: complements
        confidence: 0.70
        rationale: >
          E8 Application Control enforces execution restrictions through
          whitelisting policies (WDAC, AppLocker). CIS 4.1 establishes a
          secure configuration process for enterprise assets and software.
          Application control policies are a specific instance of secure
          configuration applied to endpoint execution controls, making these
          controls complementary.
      - id: cis-16.1
        relationship: complements
        confidence: 0.60
        rationale: >
          E8 Application Control ensures only approved applications execute in
          production environments. CIS 16.1 establishes a secure application
          development process that governs how software is built and vetted
          before deployment. Application control is the runtime enforcement
          layer that complements the development-time security controls of
          CIS 16.1.

  # ──────────────────────────────────────────────────────────────────────
  # E8 — Configure Microsoft Office Macro Settings (prevent)
  # ──────────────────────────────────────────────────────────────────────
  - source_control: e8-macro-settings
    target_controls:
      - id: cis-4.1
        relationship: subset-of
        confidence: 0.80
        rationale: >
          E8 Macro Settings enforces specific secure configurations for
          Microsoft Office macro execution (blocking internet macros, disabling
          macros for non-business users, restricting Win32 API calls). CIS 4.1
          broadly requires a secure configuration process for all enterprise
          software. Office macro hardening is a specific subset of the
          enterprise-wide secure configuration process that CIS 4.1 mandates.
      - id: cis-2.1
        relationship: complements
        confidence: 0.60
        rationale: >
          E8 Macro Settings requires identifying users with legitimate macro
          business needs and restricting macro-enabled file locations. CIS 2.1
          requires maintaining a software inventory with business purpose
          documentation. Knowing which software (and macro-enabled documents)
          is authorized complements the enforcement of macro restrictions.
      - id: cis-8.1
        relationship: complements
        confidence: 0.65
        rationale: >
          E8 Macro Settings at ML2/ML3 requires logging allowed and blocked
          macro execution events with log integrity protection. CIS 8.1
          establishes an audit log management process covering collection,
          review, and retention. Macro execution event logging is a specific
          application of the broader audit log management framework.

  # ──────────────────────────────────────────────────────────────────────
  # E8 — Patch Applications (prevent)
  # ──────────────────────────────────────────────────────────────────────
  - source_control: e8-patch-apps
    target_controls:
      - id: cis-7.1
        relationship: implements
        confidence: 0.90
        rationale: >
          E8 Patch Applications requires applying patches for security
          vulnerabilities in internet-facing services, office suites, browsers,
          email clients, PDF software, and security products within defined
          timeframes. CIS 7.1 establishes a documented vulnerability management
          process covering identification, prioritization, and remediation.
          E8 Patch Applications is a direct operational implementation of the
          vulnerability management lifecycle that CIS 7.1 defines.
      - id: cis-2.1
        relationship: complements
        confidence: 0.70
        rationale: >
          E8 Patch Applications requires automated asset discovery and
          vulnerability scanning, along with removal of unsupported software.
          CIS 2.1 requires a detailed software inventory with version tracking.
          A complete software inventory is an essential prerequisite for
          effective application patching, as you cannot patch what you do not
          know you have.
      - id: cis-1.1
        relationship: complements
        confidence: 0.65
        rationale: >
          E8 Patch Applications mandates automated asset discovery at least
          fortnightly to identify assets for vulnerability scanning. CIS 1.1
          requires a detailed enterprise asset inventory. Asset discovery for
          patching purposes directly supports and depends on the enterprise
          asset inventory.

  # ──────────────────────────────────────────────────────────────────────
  # E8 — User Application Hardening (prevent)
  # ──────────────────────────────────────────────────────────────────────
  - source_control: e8-user-app-hardening
    target_controls:
      - id: cis-4.1
        relationship: implements
        confidence: 0.85
        rationale: >
          E8 User Application Hardening requires disabling unneeded features
          in browsers, Office, and PDF viewers (blocking Flash, Java, ads,
          OLE, child process creation) and enforcing hardening baselines.
          CIS 4.1 requires establishing and maintaining a secure configuration
          process for enterprise software. User application hardening is a
          direct implementation of secure configuration practices applied to
          end-user-facing applications.
      - id: cis-2.1
        relationship: complements
        confidence: 0.60
        rationale: >
          E8 User Application Hardening requires removing legacy software
          (Internet Explorer 11, .NET Framework 3.5) and identifying which
          applications need hardening. CIS 2.1 requires a software inventory
          that tracks installations and decommission dates. The software
          inventory enables identification of applications requiring hardening
          or removal.
      - id: cis-8.1
        relationship: complements
        confidence: 0.60
        rationale: >
          E8 User Application Hardening at ML2/ML3 requires logging allowed
          and blocked hardening events with log integrity protection and
          centralized monitoring. CIS 8.1 establishes an audit log management
          process. Hardening event logging is a specific data source that feeds
          into the broader audit log management process.

  # ──────────────────────────────────────────────────────────────────────
  # E8 — Multi-Factor Authentication (limit)
  # ──────────────────────────────────────────────────────────────────────
  - source_control: e8-mfa
    target_controls:
      - id: cis-6.1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          E8 MFA requires multi-factor authentication for all users accessing
          internet-facing services, privileged actions, and data repositories.
          CIS 6.1 establishes an access granting process including access
          controls for new hires and role changes. MFA is a critical
          authentication control within the broader access management process,
          and both controls govern how users authenticate and receive access
          to enterprise resources.
      - id: cis-5.1
        relationship: complements
        confidence: 0.70
        rationale: >
          E8 MFA requires MFA for all user and privileged account
          authentication. CIS 5.1 requires maintaining an inventory of all
          accounts (user and administrator). The account inventory identifies
          which accounts exist and require MFA enrollment, making it a
          prerequisite for comprehensive MFA enforcement.
      - id: cis-8.1
        relationship: complements
        confidence: 0.65
        rationale: >
          E8 MFA at ML2/ML3 requires logging successful and unsuccessful MFA
          events with log integrity protection and centralized monitoring.
          CIS 8.1 establishes an audit log management process covering
          authentication event collection and review. MFA event logging is a
          high-value data source within the overall audit log management
          framework.

  # ──────────────────────────────────────────────────────────────────────
  # E8 — Patch Operating Systems (limit)
  # ──────────────────────────────────────────────────────────────────────
  - source_control: e8-patch-os
    target_controls:
      - id: cis-7.1
        relationship: implements
        confidence: 0.90
        rationale: >
          E8 Patch Operating Systems requires applying OS patches within
          defined timeframes (two weeks to 48 hours depending on maturity
          level and exploit availability) and replacing unsupported operating
          systems. CIS 7.1 establishes a documented vulnerability management
          process. OS patching is a direct operational implementation of
          vulnerability remediation, which is the core function of the
          vulnerability management lifecycle.
      - id: cis-1.1
        relationship: complements
        confidence: 0.70
        rationale: >
          E8 Patch OS mandates automated asset discovery at least fortnightly
          to identify assets for vulnerability scanning. CIS 1.1 requires a
          detailed enterprise asset inventory including all servers,
          workstations, and network devices. The asset inventory is a direct
          prerequisite for identifying which systems require OS patching.
      - id: cis-4.1
        relationship: complements
        confidence: 0.65
        rationale: >
          E8 Patch OS at ML3 requires using the latest or previous release of
          operating systems. CIS 4.1 establishes a secure configuration process
          including baseline configuration standards. Maintaining current OS
          versions is a fundamental component of maintaining a secure baseline
          configuration.

  # ──────────────────────────────────────────────────────────────────────
  # E8 — Restrict Administrative Privileges (limit)
  # ──────────────────────────────────────────────────────────────────────
  - source_control: e8-restrict-admin
    target_controls:
      - id: cis-6.1
        relationship: implements
        confidence: 0.85
        rationale: >
          E8 Restrict Admin requires validating and revalidating privileged
          access requests, enforcing least privilege, and implementing JIT
          administration. CIS 6.1 establishes an access granting process
          for enterprise assets. Restricting administrative privileges is a
          direct implementation of the access granting process applied
          specifically to privileged accounts, with stronger controls including
          separation of environments and credential management.
      - id: cis-5.1
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          E8 Restrict Admin requires inventorying and managing privileged
          accounts including local administrator accounts and service accounts.
          CIS 5.1 requires maintaining an inventory of all accounts including
          administrator accounts. Both controls share the need for comprehensive
          account visibility, with E8 adding specific requirements for
          privileged account separation and lifecycle management.
      - id: cis-8.1
        relationship: complements
        confidence: 0.65
        rationale: >
          E8 Restrict Admin at ML2/ML3 requires logging privileged access
          events with log integrity protection and centralized monitoring.
          CIS 8.1 establishes an audit log management process. Privileged
          access event logging is a critical audit data source that feeds into
          the broader log management process, enabling detection of
          unauthorized privilege use.

  # ──────────────────────────────────────────────────────────────────────
  # E8 — Regular Backups (recover)
  # ──────────────────────────────────────────────────────────────────────
  - source_control: e8-backups
    target_controls:
      - id: cis-3.1
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          E8 Regular Backups requires backing up important data, software, and
          configuration settings with retention aligned to business continuity
          requirements. CIS 3.1 establishes a data management process
          addressing data sensitivity, ownership, handling, and retention. Both
          controls address data retention and handling, though from different
          angles: E8 focuses on resilience and recoverability while CIS 3.1
          focuses on classification and lifecycle management. Data
          classification from CIS 3.1 informs backup prioritization in E8.
      - id: cis-1.1
        relationship: complements
        confidence: 0.60
        rationale: >
          E8 Regular Backups requires backing up important data, software, and
          configuration settings across the enterprise. CIS 1.1 requires a
          detailed enterprise asset inventory. The asset inventory identifies
          which assets contain important data and configurations that need to
          be backed up, making it a prerequisite for comprehensive backup
          coverage.
      - id: cis-5.1
        relationship: complements
        confidence: 0.55
        rationale: >
          E8 Regular Backups at ML2/ML3 requires restricting backup access by
          account type (unprivileged accounts cannot access, modify, or delete
          backups; privileged accounts have limited backup management rights).
          CIS 5.1 requires maintaining an account inventory distinguishing user
          and administrator accounts. Account inventory and classification
          supports the enforcement of backup access control policies.
