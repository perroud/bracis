id: regic_to_pnciber
title: "ReGIC to PNCiber Control Mapping"
source_framework: regic
target_framework: pnciber
version: "1.0.0"
last_updated: "2026-04-06"
methodology: structural
description: >
  Mapping between Decreto 10.748/2021 (ReGIC — Rede Federal de Gestao de Incidentes
  Ciberneticos) and Decreto 11.856/2023 (PNCiber — Politica Nacional de Ciberseguranca).
  The ReGIC operationalizes key PNCiber principles and objectives related to incident
  management coordination, information sharing, and cooperation across the federal
  government. While PNCiber sets the strategic policy framework, ReGIC implements its
  incident management dimension at the operational level.

mappings:
  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: implements
        confidence: 0.90
        rationale: >
          Art. 1 of ReGIC (institution of the federal cyber incident management network)
          implements art. 1 of PNCiber, which establishes cybersecurity policy including
          cooperation and resilience of critical infrastructures. ReGIC is an operational
          instrument of the national cybersecurity policy.
      - id: art-4a
        relationship: implements
        confidence: 0.85
        rationale: >
          ReGIC art. 1 directly implements PNCiber art. 4 objective V (promote resilience
          of public organizations to cyber incidents) by creating the coordinated network
          to elevate resilience levels across federal assets.

  - source_control: art-2
    target_controls:
      - id: art-2
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 2 of ReGIC (definitions of ETIR, cyber incident, CTIR Gov) intersects with
          art. 2 of PNCiber (definition of cybersecurity activity covering CIAD). Both define
          the scope of cybersecurity in terms of confidentiality, integrity, authenticity,
          and availability. ReGIC focuses on incident definitions while PNCiber focuses on
          the broader cybersecurity activity definition.

  - source_control: art-3
    target_controls:
      - id: art-3a
        relationship: implements
        confidence: 0.85
        rationale: >
          ReGIC art. 3 principles (prevention, treatment, response to incidents with
          resilience) implement PNCiber art. 3a principles IV (prevention of incidents
          targeting critical infrastructures) and V (resilience of organizations to
          cyber incidents).
      - id: art-3b
        relationship: implements
        confidence: 0.90
        rationale: >
          ReGIC art. 3 principles of information sharing, cooperation between participants,
          and coordinated action directly implement PNCiber art. 3b principles VI (cooperation
          between public and private entities) and X (coordinated action between government,
          private sector, academia, and society).

  - source_control: art-4
    target_controls:
      - id: art-6
        relationship: complements
        confidence: 0.80
        rationale: >
          ReGIC art. 4 (composition of the network: CTIR Gov + ETIRs + security teams)
          complements PNCiber art. 6 (creation and composition of CNCiber). Both define
          governance structures for cybersecurity at the federal level, but ReGIC focuses
          on operational incident management while CNCiber focuses on strategic policy
          governance.
      - id: art-4a
        relationship: implements
        confidence: 0.85
        rationale: >
          The ReGIC composition (CTIR Gov as hub, ETIRs as spokes) implements PNCiber
          objective IV (promote adoption of cyber protection measures and risk management
          to prevent, detect, analyze, evaluate, treat, and respond to cyber incidents).

  - source_control: art-5
    target_controls:
      - id: art-4a
        relationship: implements
        confidence: 0.90
        rationale: >
          CTIR Gov competencies (art. 5 ReGIC) — coordinating prevention, treatment, and
          response; consolidating data; issuing alerts — directly implement PNCiber art. 4a
          objectives I-VI (promote cybersecurity, fortify critical infrastructure, stimulate
          risk management, promote resilience).
      - id: art-3b
        relationship: implements
        confidence: 0.85
        rationale: >
          CTIR Gov's role in promoting cooperation between ETIRs (inciso II) and representing
          ReGIC in national and international organizations (inciso VI) implements PNCiber
          art. 3b principles VI (cooperation) and VII (international technical cooperation).

  - source_control: art-6
    target_controls:
      - id: art-4a
        relationship: implements
        confidence: 0.85
        rationale: >
          ETIR obligations (art. 6 ReGIC) — prevention, treatment, response, notification,
          and information sharing — implement PNCiber art. 4a objective IV (stimulate adoption
          of cyber protection measures and risk management for the full incident lifecycle).
      - id: art-5b
        relationship: implements
        confidence: 0.85
        rationale: >
          ETIR obligations to share vulnerability and threat information (inciso IV) and
          collaborate with CTIR Gov (inciso II) implement PNCiber art. 5b instrument III
          (information sharing mechanisms about risks, threats, opportunities, and incidents
          between public agencies, private sector, and society).

  - source_control: art-7
    target_controls:
      - id: art-4b
        relationship: implements
        confidence: 0.85
        rationale: >
          GSI/PR competencies (art. 7 ReGIC) — establishing norms, defining minimum
          requirements, assessing efficacy — implement PNCiber art. 4b objective VII
          (develop regulation, oversight, and control mechanisms to improve national
          cybersecurity and resilience).
      - id: art-4c
        relationship: implements
        confidence: 0.80
        rationale: >
          GSI/PR competency to promote cybersecurity training for public agents (art. 7
          inciso III) implements PNCiber art. 4c objective XI (stimulate training and
          qualification of human resources for cybersecurity).
      - id: art-8
        relationship: complements
        confidence: 0.80
        rationale: >
          GSI/PR competencies in setting norms for ReGIC complement CNCiber attributions
          (art. 8 PNCiber) in proposing updates to PNCiber and measures for national
          cybersecurity. GSI/PR operates at the regulatory level while CNCiber at the
          advisory level.

  - source_control: art-8
    target_controls:
      - id: art-4a
        relationship: implements
        confidence: 0.90
        rationale: >
          CTIR Gov operational attributions (art. 8 ReGIC) — receiving and analyzing
          notifications, consolidating statistics, issuing alerts, coordinating multi-agency
          response, maintaining knowledge base — implement the full cycle of PNCiber art. 4a
          objectives IV (risk management measures) and V (organizational resilience).
      - id: art-5b
        relationship: implements
        confidence: 0.85
        rationale: >
          CTIR Gov attributions of international information exchange (inciso VI) and
          maintaining threat knowledge base (inciso V) implement PNCiber art. 5b
          instruments II (international technical cooperation) and III (information
          sharing mechanisms).

  - source_control: art-9
    target_controls:
      - id: art-4a
        relationship: implements
        confidence: 0.85
        rationale: >
          Participating agencies obligations (art. 9 ReGIC) — maintaining ETIRs,
          incident management plans, designated contacts — implement PNCiber art. 4a
          objectives IV (adoption of cyber protection and risk management measures)
          and V (organizational resilience to cyber incidents).
      - id: art-4c
        relationship: implements
        confidence: 0.80
        rationale: >
          Obligation to promote cybersecurity awareness among public servants (art. 9
          inciso VI) implements PNCiber art. 4c objective XII (develop cybersecurity
          education and awareness in society).

  - source_control: art-10
    target_controls:
      - id: art-4a
        relationship: implements
        confidence: 0.90
        rationale: >
          Incident notification procedures (art. 10 ReGIC) — timely notification, minimum
          content, continuous updates, final report with lessons learned — implement PNCiber
          art. 4a objective IV (stimulate adoption of measures to detect, analyze, evaluate,
          treat, and respond to cyber incidents).
      - id: art-5b
        relationship: implements
        confidence: 0.85
        rationale: >
          The structured notification flow to CTIR Gov (art. 10 ReGIC) implements PNCiber
          art. 5b instrument III (information sharing mechanisms about risks, threats, and
          incidents between public agencies).

  - source_control: art-11
    target_controls:
      - id: art-3a
        relationship: implements
        confidence: 0.85
        rationale: >
          Information sharing rules (art. 11 ReGIC) — sensitivity classification, secrecy
          preservation, exclusive use, de-identification — implement PNCiber art. 3a
          principle III (guarantee of fundamental rights, especially data protection and
          privacy) by ensuring shared information is properly classified and protected.
      - id: art-5b
        relationship: implements
        confidence: 0.90
        rationale: >
          Art. 11 of ReGIC directly implements PNCiber art. 5b instrument III (mechanisms
          for sharing information about risks, threats, opportunities, and cyber incidents
          between public agencies, private sector, and society), providing the operational
          rules for how sharing occurs within the ReGIC network.

  - source_control: art-12
    target_controls:
      - id: art-3b
        relationship: implements
        confidence: 0.90
        rationale: >
          Cooperation mechanisms (art. 12 ReGIC) — simulated exercises, best practice
          sharing, mutual support, coordination meetings, thematic working groups —
          implement PNCiber art. 3b principles VI (cooperation between public and private
          entities) and X (coordinated action among government, private sector, academia,
          and society).
      - id: art-5b
        relationship: implements
        confidence: 0.95
        rationale: >
          Art. 12 of ReGIC directly implements PNCiber art. 5b instruments I (national
          and sectoral simulation exercises for incident response assessment) and III
          (information sharing mechanisms). The simulated exercises and mutual aid
          mechanisms are concrete implementations of these policy instruments.

  - source_control: art-13
    target_controls:
      - id: art-3b
        relationship: implements
        confidence: 0.85
        rationale: >
          Voluntary adhesion provisions (art. 13 ReGIC) — allowing state/municipal
          governments, state-owned enterprises, critical infrastructure operators, academic
          institutions, and civil society organizations — implement PNCiber art. 3b
          principle X (coordinated action between government, private sector, academia,
          and society).
      - id: art-4a
        relationship: implements
        confidence: 0.80
        rationale: >
          Including critical infrastructure operators (art. 13 inciso III) implements
          PNCiber art. 4a objective VI (strengthen protection of national critical
          infrastructures against cyber threats) by extending the incident management
          network to private operators of critical infrastructure.

  - source_control: art-14
    target_controls:
      - id: art-5a
        relationship: implements
        confidence: 0.85
        rationale: >
          Periodic review of ReGIC (art. 14) implements PNCiber art. 5a par. 1 inciso IV
          (mechanisms for evaluation and monitoring of PNCiber implementation), ensuring
          the incident management component of cybersecurity policy is regularly assessed
          and improved.
      - id: art-8
        relationship: complements
        confidence: 0.80
        rationale: >
          The biennial review cycle of ReGIC norms and procedures (art. 14) complements
          CNCiber attributions (art. 8 PNCiber) to propose updates to PNCiber and
          evaluate measures for national cybersecurity improvement.

  - source_control: art-15
    target_controls:
      - id: art-9
        relationship: complements
        confidence: 0.75
        rationale: >
          Final provisions of ReGIC (art. 15) — effective date, 180-day compliance
          deadline, GSI/PR supplementary norms — complement PNCiber art. 9 (CNCiber
          functioning rules and final provisions). Both establish operational parameters
          and residual authority for their respective governance structures.
