id: info-classificada_to_gsi-in1
title: "Decreto 7.845/2012 (Informacao Classificada) to GSI/PR IN 1 Control Mapping"
source_framework: info-classificada
target_framework: gsi-in1
version: "1.0.0"
last_updated: "2026-04-06"
methodology: structural
description: >
  Cross-framework mapping between Decreto 7.845/2012 (regulation on handling classified
  information within the federal executive branch) and GSI/PR Instrucao Normativa 1
  (information security management structure for the federal public administration).
  Decreto 7.845 is a specialized regulation focused exclusively on classified information
  (ultrassecreto, secreto, reservado), while GSI IN 1 provides the broader governance
  framework for information security across all federal agencies. The decree operationalizes
  classified information handling under the umbrella of the GSI/PR security governance
  structure. Every classified information control has at least one touchpoint with the
  broader information security governance established by IN 1.

mappings:
  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Both art-1 controls define scope and applicability within the federal executive
          branch. Info-classificada art-1 scopes the decree to classified information
          handling in the Poder Executivo federal, while GSI IN 1 art-1 scopes the
          information security governance structure for all APF agencies. The classified
          information regime operates within the broader SI governance framework.
      - id: art-4
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Info-classificada art-1 establishes that classified information treatment follows
          specific rules proportional to classification level. GSI IN 1 art-4 requires
          controls proportional to risk and compatible with information classification.
          The proportionality principle applies to both frameworks.

  - source_control: art-2
    target_controls:
      - id: art-2
        relationship: complements
        confidence: 0.90
        rationale: >
          Both articles define terminology. Info-classificada art-2 defines specialized
          classified information terms (algoritmo de Estado, credencial de seguranca,
          cifracaoo, necessidade de conhecer), while GSI IN 1 art-2 defines broader SI
          terms (ativo de informacao, ETIR, gestor de SI, POSIC). The classified
          terminology complements and specializes the general SI glossary.
      - id: art-3
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Info-classificada art-2 defines confidentiality-related concepts (cifracaoo,
          sigilo, comprometimento) that directly relate to the confidentiality and
          integrity principles established in GSI IN 1 art-3 (DICA: disponibilidade,
          integridade, confidencialidade, autenticidade).

  - source_control: art-3
    target_controls:
      - id: art-18
        relationship: complements
        confidence: 0.85
        rationale: >
          Info-classificada art-3 defines the three classification levels (ultrassecreto,
          secreto, reservado) with maximum durations. GSI IN 1 art-18 requires asset
          inventory with classification by criticality and by sigilo level per
          legislation. The classification levels from the decree are the specific
          categories that IN 1 art-18 references for asset classification.
      - id: art-4
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Info-classificada art-3 creates a tiered system where controls are proportional
          to classification level. GSI IN 1 art-4 directive I mandates controls
          proportional to risk. Both establish proportionality but from different
          angles: classification level versus risk assessment.

  - source_control: art-4
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Info-classificada art-4 defines classification authority (who can classify
          information at each level). GSI IN 1 art-5 defines the authority structure
          for SI governance (autoridade maxima, gestor de SI, comite, ETIR). Both
          establish hierarchical authority, but for different purposes: classification
          decisions versus SI governance. The autoridade maxima in IN 1 may also be
          a classification authority under the decreto.
      - id: art-12
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Classification authority from info-classificada art-4 must coordinate with
          the gestor de seguranca da informacao defined in GSI IN 1 art-12, who
          coordinates all SI actions including those related to classified information.

  - source_control: art-5
    target_controls:
      - id: art-18
        relationship: complements
        confidence: 0.85
        rationale: >
          Info-classificada art-5 mandates the TCI (Termo de Classificacao de Informacao)
          with mandatory metadata fields for every classified document. GSI IN 1 art-18
          requires asset inventory with classification attributes. The TCI metadata
          provides the specialized classification metadata required by the decreto
          within the broader asset inventory framework of IN 1.
      - id: art-7
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          The TCI defined in info-classificada art-5 is a mandatory documentation
          requirement that should be referenced in the POSIC content defined by
          GSI IN 1 art-7, specifically under directive IV (treatment of information).

  - source_control: art-6
    target_controls:
      - id: art-16
        relationship: complements
        confidence: 0.90
        rationale: >
          Info-classificada art-6 restricts access to classified information to persons
          with need-to-know and security clearance. GSI IN 1 art-16 defines universal
          responsibilities including maintaining sigilo of classified information
          (inciso VI) and not sharing credentials (inciso IV). The decree provides
          the specific access control mechanism (clearance + need-to-know) for
          classified data within the broader user responsibility framework of IN 1.
      - id: art-3
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          The access restrictions in info-classificada art-6 directly implement the
          confidentiality principle from GSI IN 1 art-3 (inciso III), ensuring
          information is not available to unauthorized persons.

  - source_control: art-7
    target_controls:
      - id: art-5
        relationship: complements
        confidence: 0.80
        rationale: >
          Info-classificada art-7 defines the security clearance hierarchy (ultrassecreto,
          secreto, reservado) with cumulative downward access. GSI IN 1 art-5 requires
          the autoridade maxima to assegurar recursos adequados para SI. The NSC/GSI
          clearance system is a specialized resource within the broader SI governance
          structure.
      - id: art-11
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          The clearance granting process (through NSC within GSI/PR) described in
          info-classificada art-7 operates within the SI governance structure mandated
          by GSI IN 1 art-11, which requires gestor de SI, comite, and ETIR as
          minimum governance components.

  - source_control: art-8
    target_controls:
      - id: art-16
        relationship: complements
        confidence: 0.80
        rationale: >
          Info-classificada art-8 defines background investigation procedures for
          security clearance (criminal records, financial standing, foreign ties).
          GSI IN 1 art-16 establishes general user responsibilities including
          compliance with POSIC. The clearance investigation from the decreto is a
          specialized personnel vetting process that complements the broader user
          accountability framework of IN 1.
      - id: art-17
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Background investigations from info-classificada art-8 are a form of risk
          assessment (personnel risk) that intersects with the risk management
          methodology required by GSI IN 1 art-17, specifically the identification
          of threats and vulnerabilities associated with information assets.

  - source_control: art-9
    target_controls:
      - id: art-9
        relationship: complements
        confidence: 0.85
        rationale: >
          Info-classificada art-9 mandates the TCMS (Termo de Compromisso de Manutencao
          de Sigilo) before accessing classified information, with criminal, civil, and
          administrative liability. GSI IN 1 art-9 requires publication and dissemination
          of the POSIC including signature of a termo de responsabilidade by service
          providers. Both require formal commitment instruments, but the TCMS is a
          specialized, legally binding confidentiality agreement for classified data.
      - id: art-16
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          The TCMS obligation from info-classificada art-9 directly relates to
          GSI IN 1 art-16 (inciso VI), which requires all users to maintain sigilo
          of classified information. The TCMS is the formal legal instrument that
          enforces this broader obligation.

  - source_control: art-10
    target_controls:
      - id: art-17
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Info-classificada art-10 establishes clearance renewal, suspension, and
          revocation lifecycle. GSI IN 1 art-17 requires risk management methodology
          including monitoring and periodic review. Clearance lifecycle management
          is a form of continuous personnel risk monitoring within the broader
          risk management framework.
      - id: art-11
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Clearance revocation triggers in info-classificada art-10 (immediate access
          restriction, material return) require coordination with the SI governance
          structure from GSI IN 1 art-11, particularly the gestor de SI who
          coordinates SI actions.

  - source_control: art-11
    target_controls:
      - id: art-11
        relationship: complements
        confidence: 0.85
        rationale: >
          Info-classificada art-11 defines organizational security clearance
          requirements (physical infrastructure, designated security manager,
          classified contracts, NSC inspection). GSI IN 1 art-11 requires the
          minimum SI governance structure (gestor de SI, comite, ETIR). The
          organizational clearance requirements from the decreto add specialized
          accreditation requirements on top of the basic governance structure.
      - id: art-18
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          The organizational accreditation in info-classificada art-11 requires
          proving adequate physical and technological infrastructure, which
          relates to the asset inventory and classification required by
          GSI IN 1 art-18.

  - source_control: art-12
    target_controls:
      - id: art-18
        relationship: complements
        confidence: 0.80
        rationale: >
          Info-classificada art-12 mandates classification marking (marcacao) on all
          pages of classified documents. GSI IN 1 art-18 requires asset inventory
          with classification by sigilo level. Marking is the operational
          implementation of classification labeling that supports the broader
          asset classification framework.
      - id: art-7
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Marking requirements from info-classificada art-12 should be documented
          in the POSIC content defined by GSI IN 1 art-7, specifically under
          directive IV (treatment of information) and the complementary norms
          for information handling.

  - source_control: art-13
    target_controls:
      - id: art-3
        relationship: implements
        confidence: 0.85
        rationale: >
          Info-classificada art-13 establishes tiered secure storage requirements
          (cofre for ultrassecreto, steel cabinet for secreto, locked room for
          reservado). This implements the confidentiality and availability principles
          from GSI IN 1 art-3, providing specific physical and logical storage
          controls to protect classified information.
      - id: art-4
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          The proportional storage requirements in info-classificada art-13
          (different security levels for different classification tiers) directly
          align with GSI IN 1 art-4 directive II, which requires protection
          measures compatible with information classification.

  - source_control: art-14
    target_controls:
      - id: art-3
        relationship: implements
        confidence: 0.85
        rationale: >
          Info-classificada art-14 mandates secure transmission with encryption
          proportional to classification level. This directly implements the
          confidentiality and integrity principles from GSI IN 1 art-3 for
          classified data in transit.
      - id: art-8
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Transmission security requirements from info-classificada art-14 relate to
          GSI IN 1 art-8 complementary norms, specifically inciso VI (normas de
          criptografia) which should detail encryption standards for data in transit.

  - source_control: art-15
    target_controls:
      - id: art-4
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Info-classificada art-15 establishes reproduction restrictions proportional
          to classification level (express authorization for ultrassecreto/secreto,
          registered copies for reservado). GSI IN 1 art-4 directive II requires
          measures compatible with information classification. Reproduction
          controls are a specific measure category within this broader directive.
      - id: art-16
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          The reproduction restrictions in info-classificada art-15 relate to
          GSI IN 1 art-16 (inciso II), which requires all users to protect
          information assets under their custody. Unauthorized copying of
          classified material violates this responsibility.

  - source_control: art-16
    target_controls:
      - id: art-3
        relationship: implements
        confidence: 0.80
        rationale: >
          Info-classificada art-16 establishes physical transport security (double
          envelope system, credentialed couriers) implementing the confidentiality
          and integrity principles from GSI IN 1 art-3 for classified materials
          during physical transit.
      - id: art-4
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Transport security measures proportional to classification level in
          info-classificada art-16 align with GSI IN 1 art-4 directive II
          (protection compatible with classification).

  - source_control: art-17
    target_controls:
      - id: art-4
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Info-classificada art-17 defines destruction procedures for classified
          information (two-person rule, irrecoverable methods, authority
          notification). GSI IN 1 art-4 directive II requires measures compatible
          with information classification. Secure destruction is a critical
          lifecycle control within this broader directive.
      - id: art-16
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          The destruction procedures in info-classificada art-17 relate to
          GSI IN 1 art-16 (inciso II), as the obligation to protect assets
          includes their proper disposal when no longer needed.

  - source_control: art-18
    target_controls:
      - id: art-8
        relationship: complements
        confidence: 0.90
        rationale: >
          Info-classificada art-18 mandates encryption for all classified information
          in electronic form, distinguishing between state algorithms (for
          ultrassecreto/secreto) and recognized secure algorithms (for reservado).
          GSI IN 1 art-8 (inciso VI) requires complementary norms for cryptography.
          The decree provides the specific encryption requirements that IN 1
          cryptographic norms must incorporate for classified data.
      - id: art-3
        relationship: implements
        confidence: 0.85
        rationale: >
          Mandatory encryption from info-classificada art-18 is a direct
          implementation of the confidentiality principle from GSI IN 1 art-3,
          ensuring classified electronic data cannot be read by unauthorized parties.

  - source_control: art-19
    target_controls:
      - id: art-8
        relationship: complements
        confidence: 0.85
        rationale: >
          Info-classificada art-19 defines cryptographic key management principles
          (generation, storage, distribution, destruction of keys; clearance
          requirements for key custodians; compromise response). GSI IN 1 art-8
          (inciso VI) requires complementary norms for cryptography. Key management
          is a critical sub-domain that must be addressed in the cryptographic
          norms referenced by IN 1.
      - id: art-17
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Key compromise response from info-classificada art-19 (immediate key
          replacement, security reassessment) is a risk treatment action within
          the broader risk management framework of GSI IN 1 art-17.

  - source_control: art-20
    target_controls:
      - id: art-8
        relationship: complements
        confidence: 0.85
        rationale: >
          Info-classificada art-20 defines the four COMSEC pillars (cryptographic
          security, transmission security, TEMPEST, physical security of crypto
          resources) for classified communications. GSI IN 1 art-8 (inciso VI)
          requires cryptographic norms. COMSEC is the comprehensive communications
          security framework that encompasses and extends the cryptographic norms.
      - id: art-3
        relationship: implements
        confidence: 0.80
        rationale: >
          The COMSEC requirements from info-classificada art-20 implement all four
          principles from GSI IN 1 art-3: cryptographic security ensures
          confidentiality, transmission security ensures integrity and availability,
          TEMPEST prevents unauthorized disclosure, and physical security of
          crypto resources ensures authenticity of cryptographic operations.

  - source_control: art-21
    target_controls:
      - id: art-8
        relationship: complements
        confidence: 0.85
        rationale: >
          Info-classificada art-21 centralizes cryptographic resource control under
          ABIN (defining standards, developing state algorithms, certifying
          resources, distributing materials). GSI IN 1 art-8 (inciso VI)
          requires cryptographic norms. ABIN's role as the central authority
          for government cryptography is a foundational element that the IN 1
          cryptographic norms must reference and comply with.
      - id: art-5
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          ABIN's role under info-classificada art-21 requires coordination with the
          autoridade maxima from GSI IN 1 art-5, who must assegurar recursos
          adequados, including procurement of ABIN-certified cryptographic resources.

  - source_control: art-22
    target_controls:
      - id: art-18
        relationship: complements
        confidence: 0.85
        rationale: >
          Info-classificada art-22 requires cryptographic material accountability
          (individual registration, secure storage, supervised destruction, incident
          reporting for loss/theft). GSI IN 1 art-18 requires asset inventory with
          identification, custodian, and classification. Cryptographic resources
          are a specialized asset class that requires the enhanced accountability
          defined by the decreto within the broader asset management framework.
      - id: art-25
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Loss, theft, or robbery of cryptographic resources (info-classificada
          art-22, paragrafo unico) constitutes a security incident requiring
          immediate notification, directly connecting to the incident treatment
          process defined in GSI IN 1 art-25.

  - source_control: art-23
    target_controls:
      - id: art-4
        relationship: implements
        confidence: 0.80
        rationale: >
          Info-classificada art-23 designates restricted areas (Classe I for
          ultrassecreto/secreto, Classe II for reservado) with controlled access.
          This implements GSI IN 1 art-4 directive II (measures compatible with
          information classification) by creating physical security zones
          proportional to classification level.
      - id: art-3
        relationship: implements
        confidence: 0.75
        rationale: >
          Restricted areas from info-classificada art-23 implement the
          confidentiality principle from GSI IN 1 art-3 through physical
          access restrictions that prevent unauthorized access to classified
          information processing environments.

  - source_control: art-24
    target_controls:
      - id: art-8
        relationship: complements
        confidence: 0.80
        rationale: >
          Info-classificada art-24 defines access controls for restricted areas
          (identification, entry/exit logging, material control, security
          inspection). GSI IN 1 art-8 (inciso I) requires complementary norms
          for access control. The restricted area access procedures from the
          decreto provide the specific physical access controls that complement
          the broader access control norms of IN 1.
      - id: art-16
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          The dual-gate access model for Classe I areas (clearance + need-to-know)
          in info-classificada art-24 is a specialized implementation of the
          user responsibility framework in GSI IN 1 art-16, which requires
          users to protect assets and maintain sigilo.

  - source_control: art-25
    target_controls:
      - id: art-4
        relationship: implements
        confidence: 0.80
        rationale: >
          Info-classificada art-25 specifies physical security measures for
          classified facilities (barriers, intrusion detection, security
          lighting, electronic access control, fire/flood protection). This
          implements GSI IN 1 art-4 directive II (measures compatible with
          information classification) through concrete physical security controls.
      - id: art-21
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Physical security measures for classified facilities from info-classificada
          art-25 relate to the business continuity requirements of GSI IN 1 art-21,
          particularly environmental protection (fire, flood) for critical
          information processing facilities.

  - source_control: art-26
    target_controls:
      - id: art-9
        relationship: complements
        confidence: 0.80
        rationale: >
          Info-classificada art-26 establishes visitor management in restricted areas
          (identification, TCMS signing, permanent escort, visitor badge, electronic
          device restrictions). GSI IN 1 art-9 requires that service providers take
          notice of the POSIC and sign a termo de responsabilidade. The visitor
          management procedures from the decreto provide specialized controls for
          temporary visitors accessing classified environments, complementing the
          broader dissemination obligations.
      - id: art-16
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Visitor device restrictions from info-classificada art-26 (no recording,
          data transmission, or communication devices) directly protect against the
          types of breaches that GSI IN 1 art-16 addresses through user
          responsibilities (protecting assets, maintaining sigilo).

  - source_control: art-27
    target_controls:
      - id: art-8
        relationship: complements
        confidence: 0.85
        rationale: >
          Info-classificada art-27 mandates electronic security measures for
          ultrassecreto/secreto environments (SIGINT protection, TSCM sweeps,
          certified equipment, TEMPEST compliance). GSI IN 1 art-8 requires
          complementary norms including norms for use of TIC resources (inciso II).
          TEMPEST and electronic security requirements are specialized controls
          that complement the broader TIC usage norms.
      - id: art-3
        relationship: implements
        confidence: 0.80
        rationale: >
          Electronic security measures from info-classificada art-27 implement
          the confidentiality principle of GSI IN 1 art-3 by preventing
          unintentional electromagnetic emanations that could compromise
          classified information.

  - source_control: art-28
    target_controls:
      - id: art-25
        relationship: complements
        confidence: 0.90
        rationale: >
          Info-classificada art-28 defines security incidents involving classified
          information (unauthorized access, disclosure, loss, modification,
          destruction, policy violation) with immediate notification requirements.
          GSI IN 1 art-25 establishes the broader incident treatment process
          (detection, triage, analysis, containment, post-incident, evidence
          preservation). The classified incident definition from the decreto
          creates a specialized incident category within the broader incident
          management framework of IN 1.
      - id: art-26
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Classified information incidents from info-classificada art-28 must be
          notified to the appropriate authorities, which intersects with
          GSI IN 1 art-26 notification obligations to CTIR Gov when the
          incident has cyber dimensions.

  - source_control: art-29
    target_controls:
      - id: art-25
        relationship: complements
        confidence: 0.90
        rationale: >
          Info-classificada art-29 defines mandatory compromise response actions
          (NSC/GSI notification, investigation commission, containment, reclassification
          assessment, classifying authority notification). GSI IN 1 art-25 establishes
          the general incident lifecycle. The compromise procedures from the decreto
          add specialized escalation and investigation requirements for classified
          information compromises on top of the standard incident process.
      - id: art-27
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Investigation and documentation requirements from info-classificada art-29
          relate to GSI IN 1 art-27, which requires detailed incident records
          including root cause analysis and improvement recommendations. The
          investigation commission from the decreto generates the detailed
          documentation that IN 1 art-27 mandates.

  - source_control: art-30
    target_controls:
      - id: art-27
        relationship: complements
        confidence: 0.90
        rationale: >
          Info-classificada art-30 defines investigation objectives for classified
          compromises (root cause, accountability, damage assessment, corrective
          measures, legal basis). GSI IN 1 art-27 requires incident records with
          cause raiz, impacto, and recomendacoes de melhoria. The decree's
          investigation framework provides specialized procedures for classified
          compromises that produce the detailed documentation IN 1 art-27 requires.
      - id: art-35
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Corrective and preventive measures recommended from compromise
          investigations (info-classificada art-30, inciso IV) feed directly
          into the continuous improvement process mandated by GSI IN 1 art-35,
          which requires improvement based on incident analysis and lessons learned.
