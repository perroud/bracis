  - source_control: art-20
    target_controls:
      - id: art-20
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Compartilhamento de informacoes sobre incidentes relevantes entre
          instituicoes do sistema financeiro.

  - source_control: art-21
    target_controls:
      - id: art-21
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Disposicoes transitorias — prazos de adequacao para instituicoes ja
          autorizadas. Prazos podem diferir ligeiramente entre IPs e IFs.

  - source_control: art-22
    target_controls:
      - id: art-22
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Disposicoes sobre contratacao de servicos de nuvem ja existentes antes
          da vigencia da resolucao.

  - source_control: art-23
    target_controls:
      - id: art-23
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Disposicoes sobre compartilhamento de informacoes e entrada em vigor.

  - source_control: art-24
    target_controls:
      - id: art-24
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Revogacoes de normativos anteriores e disposicoes finais.

  - source_control: art-25
    target_controls:
      - id: art-25
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Data de entrada em vigor da resolucao.

metadata:
  total_mappings: 25
  average_confidence: 0.94
  relationship_summary:
    equivalent-to: 25
  notes: >
    BCB 85/2021 e CMN 4.893/2021 sao regulamentos espelhos — mesmo conteudo normativo
    aplicado a publicos distintos (IPs vs IFs). A estrutura capitular e artigo-a-artigo
    e essencialmente identica, com diferencas apenas nas referencias ao tipo de
    instituicao regulada e nos prazos transitorios.
