id: bcb-85_to_bacen-4893
title: "BCB 85 to Bacen 4893 Control Mapping"
source_framework: bcb-85
target_framework: bacen-4893
version: "1.0.0"
last_updated: "2026-04-03"
methodology: structural
description: >
  Mapeamento artigo-a-artigo entre a Resolucao BCB 85/2021 (instituicoes de pagamento)
  e a Resolucao CMN 4.893/2021 (instituicoes financeiras). Ambas regulamentam seguranca
  cibernetica com estrutura identica, diferindo apenas no publico-alvo regulado.

mappings:
  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Ambos definem o objeto e escopo da regulamentacao de seguranca cibernetica.
          BCB 85 aplica-se a instituicoes de pagamento (IPs); CMN 4.893 aplica-se a
          instituicoes financeiras (IFs) autorizadas pelo BCB.

  - source_control: art-2
    target_controls:
      - id: art-2
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Ambos definem o ambito de aplicacao. BCB 85 abrange IPs autorizadas;
          CMN 4.893 abrange IFs autorizadas pelo BCB.

  - source_control: art-3
    target_controls:
      - id: art-3
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Obrigacao de implementar politica de seguranca cibernetica baseada em
          confidencialidade, integridade e disponibilidade. Texto identico.

  - source_control: art-4
    target_controls:
      - id: art-4
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Conteudo minimo da politica de seguranca cibernetica — ambos listam os
          mesmos requisitos obrigatorios para a politica.

  - source_control: art-5
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Divulgacao da politica de seguranca cibernetica a funcionarios e prestadores
          de servicos relevantes.

  - source_control: art-6
    target_controls:
      - id: art-6
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Requisitos adicionais de seguranca cibernetica para tratamento de dados e
          informacoes sensiveis.

  - source_control: art-7
    target_controls:
      - id: art-7
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Procedimentos e controles para prevencao e tratamento de incidentes
          ciberneticos. Ambos exigem mecanismos de deteccao, prevencao e resposta.

  - source_control: art-8
    target_controls:
      - id: art-8
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Requisitos para sistemas de informacao e infraestrutura tecnologica segura.

  - source_control: art-9
    target_controls:
      - id: art-9
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Plano de acao e resposta a incidentes ciberneticos — requisitos identicos
          para elaboracao, implementacao e manutencao do plano.

  - source_control: art-10
    target_controls:
      - id: art-10
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Comunicacao ao BCB sobre incidentes relevantes — prazos e conteudo identicos.

  - source_control: art-11
    target_controls:
      - id: art-11
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Relatorio anual sobre implementacao do plano de acao e resposta a incidentes.

  - source_control: art-12
    target_controls:
      - id: art-12
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Requisitos para contratacao de servicos de processamento, armazenamento
          de dados e computacao em nuvem — ambos exigem as mesmas garantias.

  - source_control: art-13
    target_controls:
      - id: art-13
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Comunicacao previa ao BCB sobre contratacao de servicos de nuvem no exterior.

  - source_control: art-14
    target_controls:
      - id: art-14
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Requisitos contratuais para prestadores de servicos de nuvem — clausulas
          obrigatorias identicas.

  - source_control: art-15
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Convenios de acesso a dados pelo BCB em caso de servicos contratados
          no exterior.

  - source_control: art-16
    target_controls:
      - id: art-16
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Alteracoes contratuais relevantes com prestadores de servicos de nuvem
          e comunicacao ao BCB.

  - source_control: art-17
    target_controls:
      - id: art-17
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Responsabilidades do conselho de administracao ou diretoria na aprovacao
          da politica de seguranca cibernetica.

  - source_control: art-18
    target_controls:
      - id: art-18
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Designacao de diretor responsavel pela politica de seguranca cibernetica
          e pelo plano de acao e resposta a incidentes.

  - source_control: art-19
    target_controls:
      - id: art-19
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Possibilidade de exercicio compartilhado da funcao de diretor responsavel
