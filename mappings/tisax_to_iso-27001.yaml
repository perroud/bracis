id: tisax_to_iso-27001
title: "TISAX (VDA ISA) to ISO/IEC 27001:2022 Control Mapping"
source_framework: tisax
target_framework: iso-27001-2022
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # Chapter 1 — Information Security Management

  - source_control: isa-1.1
    target_controls:
      - id: a5-1
        relationship: derived-from
        confidence: 0.95
        rationale: >
          ISA 1.1 requires the organization to define, approve, publish,
          and communicate an information security policy with planned review
          intervals — directly derived from ISO A.5.1, which mandates
          management-approved policies communicated to relevant personnel.
          Both cover top-level policy, topic-specific policies, and
          periodic review. ISA adds automotive-specific detail (AL2/AL3
          verification) but the core requirement is the same.
      - id: a5-2
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          ISA 1.1 requires the policy to define roles, responsibilities,
          and accountability for information security. ISO A.5.2 addresses
          the same concern — defining and allocating information security
          roles. The intersection is partial because ISA 1.1 embeds this
          within the policy requirement rather than as a standalone control.

  - source_control: isa-1.2
    target_controls:
      - id: a5-2
        relationship: derived-from
        confidence: 0.95
        rationale: >
          ISA 1.2 requires clearly defined and assigned roles and
          responsibilities for information security, directly mirroring
          ISO A.5.2. Both mandate that security responsibilities are
          formally allocated, authorization levels documented, and
          individuals in security roles are competent.
      - id: a5-1
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          ISA 1.2 requires a management framework to initiate and control
          implementation of information security. ISO A.5.1 addresses
          the policy foundation that underpins such a framework. The
          governance structure described in ISA 1.2 presupposes the
          policy structure of A.5.1.
      - id: a5-15
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          ISA 1.2 mandates segregation of duties to reduce risk of
          unauthorized modification or misuse. ISO A.5.15 addresses
          access control rules including segregation of access control
          roles. Both require separation of conflicting responsibilities,
          though ISA 1.2 addresses it organizationally while A.5.15
          addresses it from an access control perspective.
      - id: a5-36
        relationship: complements
        confidence: 0.60
        rationale: >
          ISA 1.2 requires contact with relevant authorities and special
          interest groups, and governance meetings with action tracking.
          ISO A.5.36 requires regular compliance reviews. The governance
          oversight in ISA 1.2 complements the compliance assurance
          mechanism in A.5.36.

  - source_control: isa-1.3
    target_controls:
      - id: a5-1
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          ISA 1.3 requires a formal risk management process, which
          ISO A.5.1 supports through its requirement for policies
          that address risk management. The risk assessment methodology
          described in ISA 1.3 operationalizes the risk-related policy
          direction set by A.5.1.
      - id: a8-8
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          ISA 1.3 requires identifying risks associated with loss of
          confidentiality, integrity, and availability — including
          vulnerability assessment. ISO A.8.8 focuses specifically on
          technical vulnerability management. ISA 1.3's risk assessment
          scope is broader but overlaps with A.8.8 on vulnerability
          identification and evaluation.
      - id: a5-36
        relationship: complements
        confidence: 0.65
        rationale: >
          ISA 1.3 mandates management approval for residual risks and
          implementation tracking of treatment plans. ISO A.5.36 requires
          regular compliance reviews. Risk acceptance documentation
          and treatment monitoring in ISA 1.3 complement the compliance
          review process in A.5.36.

  # Chapter 2 — Human Resources

  - source_control: isa-2.1
    target_controls:
      - id: a6-1
        relationship: derived-from
        confidence: 0.90
        rationale: >
          ISA 2.1 requires background verification checks prior to
          employment, directly derived from ISO A.6.1 (Screening), which
          mandates background verification on all candidates proportional
          to business requirements and information classification. ISA
          adds automotive-specific elements (prototype-role screening,
          NDA requirements) but the core screening requirement is the same.
      - id: a5-2
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          ISA 2.1 requires that employees understand their information
          security responsibilities and that responsibilities remaining
          after termination are defined. ISO A.5.2 requires defined and
          allocated information security roles. Both address personnel
          accountability for security, though ISA 2.1 focuses on the HR
          lifecycle while A.5.2 focuses on organizational role definition.
      - id: a5-15
        relationship: complements
        confidence: 0.60
        rationale: >
          ISA 2.1 addresses automated de-provisioning triggered by HR
          events (termination, role change). ISO A.5.15 covers access
          control rules including removal of access rights. The HR-driven
          access lifecycle in ISA 2.1 complements the access control
          policy framework in A.5.15.

  # Chapter 3 — Physical Security

  - source_control: isa-3.1
    target_controls:
      - id: a7-1
        relationship: derived-from
        confidence: 0.95
        rationale: >
          ISA 3.1 requires defined security perimeters, physical entry
          controls, and protection of areas containing information
          processing facilities — directly derived from ISO A.7.1, which
          mandates security perimeters to protect areas containing
          information and associated assets. ISA adds zone-based models
          specific to automotive (prototype areas, test tracks) but the
          fundamental perimeter security requirement originates from A.7.1.
      - id: a8-1
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          ISA 3.1 covers equipment siting, protection, and maintenance to
          ensure availability and integrity. ISO A.8.1 addresses protection
          of user endpoint devices. Both require physical protection of
          information processing equipment, though ISA 3.1 is broader
          (facilities, server rooms) while A.8.1 is device-specific.
      - id: a5-15
        relationship: complements
        confidence: 0.60
        rationale: >
          ISA 3.1 requires physical entry controls with increasing
          restriction levels per security zone. ISO A.5.15 establishes
          access control rules for both physical and logical access.
          The physical access controls in ISA 3.1 implement the physical
          dimension of the access control policy in A.5.15.

  # Chapter 4 — Identity and Access Management / Cryptography

  - source_control: isa-4.1
    target_controls:
      - id: a5-15
        relationship: derived-from
        confidence: 0.95
        rationale: >
          ISA 4.1 covers user registration, access provisioning,
          privileged access management, and periodic access reviews —
          directly derived from ISO A.5.15, which establishes access
          control rules based on business and security requirements.
          Both enforce least privilege, access reviews, and role-based
          restrictions. ISA adds automotive context (24-hour
          de-provisioning for terminations, quarterly privileged access
          reviews).
      - id: a8-1
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          ISA 4.1 requires secure log-on procedures and MFA for remote
          access. ISO A.8.1 addresses endpoint device protection
          including access controls and authentication requirements.
          Both address secure authentication to systems, though ISA 4.1
          approaches it from the IAM side and A.8.1 from the device side.
      - id: a5-2
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          ISA 4.1 requires segregation of privileged accounts from
          regular accounts and enforces the principle of least privilege.
          ISO A.5.2 defines roles and responsibilities including
          segregation of duties. Both address separation of access
          authority, though ISA 4.1 focuses on technical IAM
          implementation while A.5.2 is organizational.
      - id: a8-9
        relationship: complements
        confidence: 0.60
        rationale: >
          ISA 4.1 mandates service account inventorying, ownership
          assignment, and inclusion in access reviews. ISO A.8.9
          covers configuration management including security
          configurations. Service account management in ISA 4.1
          complements the configuration baseline management in A.8.9.

  - source_control: isa-4.2
    target_controls:
      - id: a8-25
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          ISA 4.2 requires a cryptography policy covering approved
          algorithms, key management, and crypto-agility. ISO A.8.25
          addresses secure development lifecycle rules which include
          cryptography usage guidance. ISA 4.2's cryptographic
          requirements intersect with the secure coding and development
          standards in A.8.25 where cryptographic implementation is
          concerned.
      - id: a8-28
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          ISA 4.2 prohibits deprecated algorithms (MD5, SHA-1, DES)
          and mandates approved algorithm usage. ISO A.8.28 covers
          secure coding principles including cryptography usage.
          The algorithm compliance requirements in ISA 4.2 intersect
          with the secure coding standards in A.8.28.
      - id: a5-1
        relationship: complements
        confidence: 0.60
        rationale: >
          ISA 4.2 requires development and implementation of a
          cryptographic controls policy. ISO A.5.1 addresses topic-specific
          policies including cryptography and key management. The
          cryptographic policy requirement in ISA 4.2 is a specific
          instantiation of the topic-specific policy framework in A.5.1.

  # Chapter 5 — Operations, Development, Networks

  - source_control: isa-5.1
    target_controls:
      - id: a8-9
        relationship: derived-from
        confidence: 0.90
        rationale: >
          ISA 5.1 requires documented operating procedures, controlled
          changes, and environment separation — directly derived from
          ISO A.8.9, which mandates established, documented, and
          monitored configurations. Both require formal change management,
          configuration documentation, and drift detection.
      - id: a8-15
        relationship: derived-from
        confidence: 0.90
        rationale: >
          ISA 5.1 requires centralized, tamper-evident logging with
          minimum retention periods. ISO A.8.15 mandates logs that record
          activities, exceptions, and faults with protection against
          unauthorized changes. Both address comprehensive event logging,
          log integrity, and retention management.
      - id: a8-8
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          ISA 5.1 requires detection, prevention, and recovery controls
          against malware. ISO A.8.8 covers vulnerability management
          including patching and remediation. Both address the technical
          vulnerability lifecycle, though ISA 5.1 is broader (backup,
          change management) while A.8.8 focuses specifically on
          vulnerability identification and remediation.
      - id: a8-1
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          ISA 5.1 requires malware protection across all endpoints,
          servers, and email gateways. ISO A.8.1 addresses endpoint
          device protection including malware protection requirements.
          Both mandate anti-malware controls on user devices, though
          ISA 5.1 extends to servers and gateways.
      - id: a5-36
        relationship: complements
        confidence: 0.60
        rationale: >
          ISA 5.1 requires tested backup restore procedures and current
          operational documentation. ISO A.5.36 mandates compliance
          reviews against established policies. Backup testing and
          operational procedure maintenance in ISA 5.1 feed into the
          compliance verification mechanism in A.5.36.

  - source_control: isa-5.2
    target_controls:
      - id: a8-25
        relationship: derived-from
        confidence: 0.95
        rationale: >
          ISA 5.2 requires a secure software development lifecycle (SSDLC)
          integrating security from requirements through deployment —
          directly derived from ISO A.8.25, which mandates rules for
          secure development of software and systems. Both require
          security checkpoints, code scanning, secure coding guidelines,
          and developer training.
      - id: a8-28
        relationship: derived-from
        confidence: 0.90
        rationale: >
          ISA 5.2 mandates secure coding standards, code review processes,
          and automated security testing (SAST, DAST, SCA). ISO A.8.28
          requires secure coding principles applied to software development.
          Both address coding-level security including input validation,
          vulnerability scanning, and code review requirements.
      - id: a8-8
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISA 5.2 requires SBOM management and vulnerability tracking
          for third-party and open-source components. ISO A.8.8 covers
          technical vulnerability management including obtaining
          vulnerability information and evaluating exposure. Both
          address dependency vulnerability management, though ISA 5.2
          is development-focused while A.8.8 is operationally broader.
      - id: a5-23
        relationship: complements
        confidence: 0.55
        rationale: >
          ISA 5.2 covers secure system engineering principles including
          platform changes and system acquisitions. ISO A.5.23 addresses
          cloud service security requirements. When development involves
          cloud platforms, ISA 5.2's system acquisition controls
          complement A.5.23's cloud-specific governance.

  - source_control: isa-5.3
    target_controls:
      - id: a8-1
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          ISA 5.3 requires network management, service level monitoring,
          and traffic filtering. ISO A.8.1 covers endpoint device
          protection including network connection controls. Both address
          device-to-network security, though ISA 5.3 focuses on network
          infrastructure while A.8.1 focuses on the endpoint perspective.
      - id: a5-15
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          ISA 5.3 requires network segmentation isolating sensitive
          environments with dedicated access channels. ISO A.5.15
          establishes access control rules including network access
          restrictions. Network segmentation in ISA 5.3 implements
          the network-layer access controls described in A.5.15.
      - id: a8-9
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          ISA 5.3 mandates documented network architecture, firewall
          rulesets, and segmentation policies. ISO A.8.9 requires
          documented and monitored configurations for networks. Both
          address network configuration management, though ISA 5.3
          adds automotive-specific segmentation (prototype networks)
          and IDS/IPS requirements.
      - id: a5-23
        relationship: complements
        confidence: 0.60
        rationale: >
          ISA 5.3 covers connections to third-party networks including
          OEM and supplier networks. ISO A.5.23 addresses cloud service
          security. Third-party network connectivity in ISA 5.3
          complements cloud service management in A.5.23 for externally
          hosted resources.

  # Chapter 6 — Supplier Relationships

  - source_control: isa-6.1
    target_controls:
      - id: a5-23
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISA 6.1 requires information security requirements for supplier
          access, regular monitoring and auditing of supplier service
          delivery. ISO A.5.23 addresses cloud service security including
          acquisition, use, management, and exit. Both address third-party
          service provider security governance. ISA 6.1 is broader
          (all suppliers), while A.5.23 is cloud-specific, but the
          governance mechanisms overlap substantially.
      - id: a5-1
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          ISA 6.1 requires supplier security policies including
          contractual clauses, TISAX label verification, and flow-down
          requirements. ISO A.5.1 mandates topic-specific policies
          including supplier management. The supplier security policy
          requirement in ISA 6.1 is a specific instantiation of the
          policy framework in A.5.1.
      - id: a5-36
        relationship: complements
        confidence: 0.65
        rationale: >
          ISA 6.1 requires regular monitoring, review, and audit of
          supplier service delivery and TISAX label compliance.
          ISO A.5.36 mandates compliance reviews against policies and
          standards. Supplier compliance monitoring in ISA 6.1
          complements the general compliance assurance framework in A.5.36.
      - id: a5-15
        relationship: complements
        confidence: 0.60
        rationale: >
          ISA 6.1 mandates time-limited, least-privilege supplier access
          with enhanced logging. ISO A.5.15 establishes access control
          rules for all users. Supplier-specific access restrictions in
          ISA 6.1 complement the general access control framework in A.5.15.

  # Chapter 7 — Compliance

  - source_control: isa-7.1
    target_controls:
      - id: a5-36
        relationship: derived-from
        confidence: 0.95
        rationale: >
          ISA 7.1 requires identification of all legislative, regulatory,
          and contractual requirements with regular compliance reviews and
          independent audits — directly derived from ISO A.5.36, which
          mandates regular compliance reviews against established policies,
          rules, and standards. Both require management review records,
          corrective action tracking, and audit programs.
      - id: a5-1
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          ISA 7.1 requires the organization's approach to legal and
          regulatory compliance to be documented for each information
          system. ISO A.5.1 mandates policies that address relevant
          laws and regulations. Both require a documented policy
          foundation addressing legal obligations, though ISA 7.1
          focuses on the compliance register while A.5.1 focuses
          on policy structure.
      - id: a8-15
        relationship: complements
        confidence: 0.65
        rationale: >
          ISA 7.1 requires protection of records from loss, destruction,
          and unauthorized access. ISO A.8.15 covers log protection
          and retention. Records protection in ISA 7.1 complements
          the log integrity and retention mechanisms in A.8.15.
      - id: a5-23
        relationship: complements
        confidence: 0.55
        rationale: >
          ISA 7.1 mandates compliance with cryptographic export
          regulations and data sovereignty requirements. ISO A.5.23
          addresses cloud service governance including data residency.
          Export control and data residency compliance in ISA 7.1
          complements cloud service governance in A.5.23.

  # Chapter 8 — Data Protection

  - source_control: isa-8.1
    target_controls:
      - id: a5-1
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          ISA 8.1 requires documented data protection policies, processing
          records, and DPIA procedures. ISO A.5.1 mandates topic-specific
          policies including privacy. The data protection policy
          requirements in ISA 8.1 intersect with the topic-specific
          policy framework in A.5.1, though ISA 8.1 is GDPR-specific
          and goes far beyond what A.5.1 addresses.
      - id: a5-36
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          ISA 8.1 requires DPO appointment, regular DPIA reviews, and
          processing activity monitoring. ISO A.5.36 mandates compliance
          reviews against policies and legal requirements. Data
          protection compliance oversight in ISA 8.1 intersects with
          the general compliance review framework in A.5.36.
      - id: a5-15
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          ISA 8.1 requires access restrictions to personal data stores
          and data subject rights processes. ISO A.5.15 establishes
          access control rules based on security requirements. Personal
          data access controls in ISA 8.1 intersect with the general
          access control framework in A.5.15.
      - id: a8-15
        relationship: complements
        confidence: 0.60
        rationale: >
          ISA 8.1 mandates breach detection, 72-hour notification, and
          processing audit trails. ISO A.8.15 covers logging of
          activities, exceptions, and faults. Personal data breach
          detection logging in ISA 8.1 complements the general
          logging framework in A.8.15.

  # Prototype Protection Module

  - source_control: pp-1
    target_controls:
      - id: a5-15
        relationship: superset-of
        confidence: 0.75
        rationale: >
          PP-1 requires specific access restrictions for prototype assets
          with named-user authorization and confidentiality agreements.
          ISO A.5.15 establishes general access control rules. PP-1 is
          a superset of A.5.15, adding automotive prototype-specific access
          controls (enhanced clearance, time-limited grants, mandatory
          re-authorization) that go beyond standard information
          security access management.
      - id: a7-1
        relationship: superset-of
        confidence: 0.75
        rationale: >
          PP-1 requires prototype-specific physical security measures
          including opaque windows, camera-free zones, and dual-control
          access. ISO A.7.1 covers general physical security perimeters.
          PP-1 is a superset of A.7.1, adding automotive-specific physical protection
          measures (prototype storage, concealment, test track security)
          that exceed standard perimeter security requirements.
      - id: a5-1
        relationship: complements
        confidence: 0.60
        rationale: >
          PP-1 mandates a prototype protection concept with classification
          levels and handling procedures. ISO A.5.1 requires topic-specific
          policies. The prototype protection concept in PP-1 is an
          automotive-specific topic policy that complements the general
          policy framework in A.5.1.
      - id: a8-1
        relationship: intersects-with
        confidence: 0.60
        rationale: >
          PP-1 requires DLP controls, watermarking, and encrypted storage
          for prototype digital assets. ISO A.8.1 covers endpoint device
          protection. Prototype digital asset protection in PP-1
          intersects with device-level data protection in A.8.1 where
          prototype data resides on user endpoints.

  - source_control: pp-2
    target_controls:
      - id: a7-1
        relationship: superset-of
        confidence: 0.80
        rationale: >
          PP-2 requires secure storage facilities with controlled access,
          CCTV, perimeter fencing, and anti-surveillance measures for
          prototype vehicles. ISO A.7.1 covers general physical security
          perimeters. PP-2 is a superset of A.7.1, adding prototype-specific physical
          controls (camouflage, covered transport, GPS tracking, drone
          detection) that have no equivalent in standard ISO 27001.
      - id: a5-15
        relationship: superset-of
        confidence: 0.65
        rationale: >
          PP-2 requires controlled photography procedures, authorized
          personnel tracking, and chain-of-custody documentation.
          ISO A.5.15 establishes access control rules. PP-2 is a superset
          of A.5.15, extending into the physical prototype handling domain with
          controls (camouflage standards, destruction certificates)
          that go beyond standard access management.
      - id: a5-36
        relationship: complements
        confidence: 0.60
        rationale: >
          PP-2 mandates documented destruction procedures with evidence
          of completion and regular physical security assessments.
          ISO A.5.36 requires compliance reviews against standards.
          Prototype disposal compliance tracking in PP-2 complements
          the general compliance review mechanism in A.5.36.
      - id: a8-9
        relationship: complements
        confidence: 0.55
        rationale: >
          PP-2 requires configuration-as-code for prototype facility
          security systems (CCTV, access control, environmental monitoring).
          ISO A.8.9 covers configuration management of hardware,
          software, and services. Prototype facility configuration
          management in PP-2 complements the general configuration
          management framework in A.8.9.
