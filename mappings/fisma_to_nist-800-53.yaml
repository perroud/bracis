id: fisma_to_nist-800-53
title: "FISMA to NIST SP 800-53 Rev 5 Control Mapping"
source_framework: fisma
target_framework: nist-800-53-rev5
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # ═══════════════════════════════════════════════════════════════════
  # AUTHORIZATION FAMILY
  # ═══════════════════════════════════════════════════════════════════

  # fisma-ato — Authorization to Operate (ATO) Process
  - source_control: fisma-ato
    target_controls:
      - id: ac-1
        relationship: superset-of
        confidence: 0.80
        rationale: >
          FISMA ATO requires a formal authorization decision before system
          operation, which presupposes documented access control policies and
          procedures. AC-1 (Policy and Procedures) is a foundational control
          that the ATO process validates as part of the authorization package.
          FISMA ATO is broader, encompassing the entire Risk Management
          Framework lifecycle beyond just policy documentation.
      - id: ac-2
        relationship: superset-of
        confidence: 0.75
        rationale: >
          The ATO process requires assessment of all implemented security
          controls including account management. AC-2 (Account Management)
          is one of the controls assessed and authorized during the ATO
          process. FISMA ATO encompasses the governance wrapper around
          control implementation, while AC-2 is a specific control subject
          to that governance.
      - id: ac-3
        relationship: superset-of
        confidence: 0.75
        rationale: >
          Access enforcement mechanisms are among the technical controls
          validated during the ATO security assessment. AC-3 (Access
          Enforcement) is a specific control that must be demonstrated as
          implemented and effective before an ATO is granted.
      - id: cm-2
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          The ATO authorization package requires documentation of system
          baseline configurations. CM-2 (Baseline Configuration) provides
          the configuration management foundation that the ATO process
          verifies. Both address system state documentation but from
          different perspectives — governance versus technical implementation.
      - id: si-4
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          FISMA ATO requires ongoing authorization through continuous
          monitoring. SI-4 (System Monitoring) provides the technical
          monitoring data that supports ongoing authorization decisions.
          Both address continuous awareness of system security posture
          but at different abstraction levels.

  # fisma-poam — Plan of Action and Milestones (POA&M)
  - source_control: fisma-poam
    target_controls:
      - id: cm-2
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          POA&M tracks weaknesses including configuration deviations from
          approved baselines. CM-2 (Baseline Configuration) establishes the
          baseline against which deviations are identified and tracked in
          POA&Ms. Deficiencies in baseline configuration compliance are
          common POA&M items.
      - id: cm-6
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          POA&M items frequently originate from configuration settings
          that do not meet security requirements. CM-6 (Configuration
          Settings) findings from automated scanning are a primary source
          of POA&M entries. Both address the identification and
          remediation of configuration deficiencies.
      - id: si-4
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Continuous monitoring feeds findings into the POA&M process.
          SI-4 (System Monitoring) detects security-relevant events and
          vulnerabilities that become POA&M items requiring remediation.
          The POA&M is the governance mechanism for tracking findings
          that SI-4 detects.
      - id: au-6
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Audit record review findings feed into the POA&M process.
          AU-6 (Audit Record Review, Analysis, and Reporting) identifies
          anomalies and potential security issues that may generate
          POA&M entries. Both address the detection and tracking of
          security deficiencies.

  # ═══════════════════════════════════════════════════════════════════
  # CATEGORIZATION FAMILY
  # ═══════════════════════════════════════════════════════════════════

  # fisma-fips-199 — System Categorization (FIPS 199)
  - source_control: fisma-fips-199
    target_controls:
      - id: ac-1
        relationship: superset-of
        confidence: 0.70
        rationale: >
          FIPS 199 categorization determines which NIST 800-53 baseline
          controls apply to a system. AC-1 (Policy and Procedures) is
          selected and tailored based on the FIPS 199 categorization
          outcome. The categorization process governs the selection
          intensity of all controls including AC-1.
      - id: ac-3
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          System categorization determines the rigor of access enforcement
          required. AC-3 (Access Enforcement) implementation complexity
          scales with the FIPS 199 impact level — high-impact systems
          require stronger access enforcement mechanisms.
      - id: sc-7
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          FIPS 199 categorization defines system boundaries and the
          protection level required for those boundaries. SC-7 (Boundary
          Protection) implementation is directly informed by the system's
          categorization, with higher-impact systems requiring more
          robust boundary protections.
      - id: cm-2
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          System categorization determines the baseline configuration
          rigor required. CM-2 (Baseline Configuration) requirements
          scale with FIPS 199 impact level, and the categorization
          must be reflected in configuration management documentation.

  # fisma-fips-200 — Minimum Security Requirements (FIPS 200)
  - source_control: fisma-fips-200
    target_controls:
      - id: ac-1
        relationship: superset-of
        confidence: 0.90
        rationale: >
          FIPS 200 mandates minimum security requirements across seventeen
          areas, directly requiring implementation of NIST 800-53 controls.
          AC-1 (Policy and Procedures) is one of the minimum baseline
          controls required by FIPS 200 for all categorization levels.
          FIPS 200 is the authoritative mandate that makes AC-1 mandatory.
      - id: ac-2
        relationship: superset-of
        confidence: 0.90
        rationale: >
          FIPS 200 requires minimum security in the access control area,
          which mandates implementation of AC-2 (Account Management) as
          a baseline control. FIPS 200 is the statutory authority that
          requires account management controls in federal systems.
      - id: ac-3
        relationship: superset-of
        confidence: 0.90
        rationale: >
          FIPS 200 minimum security requirements for access control
          mandate AC-3 (Access Enforcement) as a baseline control.
          FIPS 200 drives the mandatory implementation of access
          enforcement in all federal information systems.
      - id: ac-6
        relationship: superset-of
        confidence: 0.85
        rationale: >
          FIPS 200 requires minimum security in access control, which
          includes AC-6 (Least Privilege) at moderate and high baselines.
          FIPS 200 is the statutory authority mandating least privilege
          implementation for moderate and high-impact systems.
      - id: au-2
        relationship: superset-of
        confidence: 0.90
        rationale: >
          FIPS 200 requires minimum security in audit and accountability,
          mandating AU-2 (Event Logging) across all baseline levels.
          FIPS 200 is the authoritative source requiring audit logging
          capabilities in federal systems.
      - id: au-6
        relationship: superset-of
        confidence: 0.90
        rationale: >
          FIPS 200 audit and accountability requirements mandate AU-6
          (Audit Record Review, Analysis, and Reporting) as a baseline
          control. FIPS 200 provides the statutory basis for mandatory
          audit review in federal information systems.
      - id: cm-2
        relationship: superset-of
        confidence: 0.90
        rationale: >
          FIPS 200 configuration management requirements mandate CM-2
          (Baseline Configuration) as a baseline control for all federal
          systems. FIPS 200 is the authoritative source requiring
          documented baseline configurations.
      - id: cm-6
        relationship: superset-of
        confidence: 0.90
        rationale: >
          FIPS 200 configuration management requirements mandate CM-6
          (Configuration Settings) as a baseline control. FIPS 200
          provides the statutory authority requiring secure configuration
          settings in federal systems.
      - id: ia-2
        relationship: superset-of
        confidence: 0.90
        rationale: >
          FIPS 200 identification and authentication requirements mandate
          IA-2 (Identification and Authentication of Organizational Users)
          as a baseline control. FIPS 200 provides the statutory basis for
          mandatory user identification and authentication.
      - id: ir-4
        relationship: superset-of
        confidence: 0.90
        rationale: >
          FIPS 200 incident response requirements mandate IR-4 (Incident
          Handling) as a baseline control. FIPS 200 provides the statutory
          authority requiring incident handling capabilities in federal
          information systems.
      - id: sc-7
        relationship: superset-of
        confidence: 0.90
        rationale: >
          FIPS 200 system and communications protection requirements
          mandate SC-7 (Boundary Protection) as a baseline control.
          FIPS 200 provides the statutory basis for mandatory boundary
          protection in federal systems.
      - id: si-4
        relationship: superset-of
        confidence: 0.90
        rationale: >
          FIPS 200 system and information integrity requirements mandate
          SI-4 (System Monitoring) as a baseline control. FIPS 200
          provides the statutory authority requiring system monitoring
          capabilities in federal information systems.
      - id: sr-3
        relationship: superset-of
        confidence: 0.80
        rationale: >
          FIPS 200, as extended by NIST SP 800-53 Rev 5, includes supply
          chain risk management. SR-3 (Supply Chain Controls and Processes)
          is a baseline control at moderate and high levels, mandated
          through the FIPS 200 minimum security requirement framework.

  # ═══════════════════════════════════════════════════════════════════
  # PROGRAM FAMILY
  # ═══════════════════════════════════════════════════════════════════

  # fisma-awareness-training — Security Awareness Training
  - source_control: fisma-awareness-training
    target_controls:
      - id: ac-1
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          Security awareness training must cover agency access control
          policies and procedures. AC-1 (Policy and Procedures) requires
          dissemination of access control policy, which training supports.
          Both address ensuring personnel understand access control
          requirements, though from different angles.
      - id: ac-2
        relationship: intersects-with
        confidence: 0.60
        rationale: >
          Awareness training includes instruction on proper account
          management practices. AC-2 (Account Management) requires users
          to understand their responsibilities regarding account usage.
          Training ensures personnel know how to request, use, and
          protect their accounts appropriately.
      - id: ia-2
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          Security awareness training covers authentication practices
          including password hygiene, multi-factor authentication use,
          and credential protection. IA-2 (Identification and
          Authentication) effectiveness depends on user understanding
          of authentication requirements, which training provides.

  # fisma-ciso — Designation of Chief Information Security Officer
  - source_control: fisma-ciso
    target_controls:
      - id: ac-1
        relationship: superset-of
        confidence: 0.75
        rationale: >
          The CISO is responsible for developing and maintaining security
          policies across all control families. AC-1 (Policy and Procedures)
          requires organizational development and dissemination of access
          control policy, a responsibility that falls under the CISO's
          mandate. The CISO role governs the creation and maintenance
          of all security policies.
      - id: ac-6
        relationship: intersects-with
        confidence: 0.60
        rationale: >
          The CISO oversees the implementation of least privilege
          principles across the agency. AC-6 (Least Privilege) enforcement
          is a governance responsibility that the CISO directs as part of
          the agency-wide security program. The CISO sets the policy
          framework within which least privilege is implemented.
      - id: cm-6
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          The CISO oversees security configuration standards across the
          agency. CM-6 (Configuration Settings) requires organizational
          establishment and enforcement of configuration settings, which
          the CISO governs as part of the security program.

  # fisma-continuity — Continuity of Operations Plans
  - source_control: fisma-continuity
    target_controls:
      - id: ir-4
        relationship: complements
        confidence: 0.80
        rationale: >
          Continuity of operations planning and incident handling are
          closely related activities. IR-4 (Incident Handling) requires
          coordination with contingency planning activities. Continuity
          plans address recovery and restoration, which are triggered
          by incidents that IR-4 processes detect and contain.
      - id: cm-2
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          Continuity planning requires documented baseline configurations
          to enable system restoration. CM-2 (Baseline Configuration)
          provides the configuration documentation necessary to rebuild
          systems to their authorized state during recovery operations.
      - id: sc-7
        relationship: intersects-with
        confidence: 0.60
        rationale: >
          Continuity planning must address alternate processing sites
          with appropriate boundary protections. SC-7 (Boundary Protection)
          controls must be replicated at recovery sites. Both address
          maintaining security during system transitions and failover.

  # fisma-incident-response — Incident Response Procedures
  - source_control: fisma-incident-response
    target_controls:
      - id: ir-4
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          FISMA incident response requirements directly mandate the
          capabilities defined in IR-4 (Incident Handling). Both require
          preparation, detection and analysis, containment, eradication,
          and recovery capabilities. FISMA provides the statutory mandate
          while IR-4 provides the specific control implementation.
      - id: au-2
        relationship: complements
        confidence: 0.75
        rationale: >
          Incident detection depends on adequate event logging. AU-2
          (Event Logging) provides the audit data necessary for incident
          detection and forensic analysis required by FISMA incident
          response procedures. Without proper logging, incident detection
          capabilities are severely limited.
      - id: au-6
        relationship: complements
        confidence: 0.80
        rationale: >
          Audit record review is a primary method for detecting security
          incidents. AU-6 (Audit Record Review, Analysis, and Reporting)
          identifies anomalies that trigger incident response procedures.
          The two controls form a detection-to-response pipeline.
      - id: si-4
        relationship: complements
        confidence: 0.85
        rationale: >
          System monitoring is essential for incident detection. SI-4
          (System Monitoring) provides real-time detection capabilities
          that feed into incident response workflows. FISMA incident
          response procedures depend on monitoring data for timely
          detection and analysis of security events.

  # fisma-policies — Risk-Based Policies and Procedures
  - source_control: fisma-policies
    target_controls:
      - id: ac-1
        relationship: superset-of
        confidence: 0.90
        rationale: >
          FISMA requires risk-based policies across all NIST 800-53
          control families. AC-1 (Policy and Procedures) is one specific
          instance of the policy requirement — access control policies.
          FISMA's policy mandate is broader, encompassing all twenty
          control families, while AC-1 addresses only access control.
      - id: cm-6
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Risk-based policies must address configuration management.
          CM-6 (Configuration Settings) implements the policy requirement
          for secure configuration standards. Agency configuration
          policies translate into specific CM-6 configuration settings.
      - id: au-2
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Risk-based policies must address audit and accountability
          requirements. AU-2 (Event Logging) implements the policy
          requirement for determining which events are security-relevant
          and must be logged. Audit policies drive AU-2 implementation.
      - id: ia-2
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Risk-based policies must address identification and authentication.
          IA-2 (Identification and Authentication) implements the policy
          requirement for user authentication. Authentication policies
          define the IA-2 implementation parameters.

  # fisma-program — Agency-Wide Information Security Program
  - source_control: fisma-program
    target_controls:
      - id: ac-1
        relationship: superset-of
        confidence: 0.85
        rationale: >
          The agency-wide security program encompasses all security
          controls including AC-1. AC-1 (Policy and Procedures) is one
          component of the comprehensive security program that FISMA
          mandates. The security program provides the organizational
          context within which AC-1 exists.
      - id: ac-2
        relationship: superset-of
        confidence: 0.80
        rationale: >
          The agency-wide security program encompasses account management
          as one of many required capabilities. AC-2 (Account Management)
          is implemented under the umbrella of the FISMA security program.
          The program provides governance and oversight for all controls.
      - id: cm-2
        relationship: superset-of
        confidence: 0.80
        rationale: >
          The agency-wide security program encompasses configuration
          management. CM-2 (Baseline Configuration) is one of the
          configuration management controls governed by the comprehensive
          security program that FISMA mandates.
      - id: ia-2
        relationship: superset-of
        confidence: 0.80
        rationale: >
          The agency-wide security program encompasses identification and
          authentication. IA-2 (Identification and Authentication) is one
          of the controls implemented under the FISMA security program's
          governance framework.
      - id: ir-4
        relationship: superset-of
        confidence: 0.80
        rationale: >
          The agency-wide security program encompasses incident response
          capabilities. IR-4 (Incident Handling) is one of the operational
          controls governed by the FISMA security program.
      - id: si-4
        relationship: superset-of
        confidence: 0.80
        rationale: >
          The agency-wide security program encompasses system monitoring.
          SI-4 (System Monitoring) is one of the continuous monitoring
          controls governed by the comprehensive FISMA security program.
      - id: sr-3
        relationship: superset-of
        confidence: 0.75
        rationale: >
          The agency-wide security program encompasses supply chain risk
          management. SR-3 (Supply Chain Controls and Processes) is one
          of the controls implemented under the FISMA security program's
          governance framework for managing supply chain risks.

  # fisma-remediation — Remediation Process for Deficiencies
  - source_control: fisma-remediation
    target_controls:
      - id: cm-2
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Remediation frequently involves restoring systems to approved
          baseline configurations. CM-2 (Baseline Configuration) defines
          the target state to which deficient systems must be remediated.
          Configuration drift remediation is a common POA&M activity.
      - id: cm-6
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Many remediation activities involve correcting configuration
          settings. CM-6 (Configuration Settings) findings are among the
          most common deficiencies requiring remediation. The remediation
          process tracks and resolves CM-6 compliance gaps.
      - id: si-4
        relationship: complements
        confidence: 0.70
        rationale: >
          System monitoring identifies deficiencies that enter the
          remediation process. SI-4 (System Monitoring) detects
          vulnerabilities and security issues that become remediation
          items. Monitoring and remediation form a continuous
          improvement cycle.

  # fisma-risk-assessment — Periodic Risk Assessments
  - source_control: fisma-risk-assessment
    target_controls:
      - id: ac-1
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          Risk assessments evaluate the adequacy of access control
          policies. AC-1 (Policy and Procedures) is reviewed and
          updated based on risk assessment findings. Risk assessments
          may identify gaps in access control policies that require
          remediation.
      - id: cm-2
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Risk assessments evaluate configuration baselines for
          vulnerabilities. CM-2 (Baseline Configuration) is assessed
          during risk evaluations to identify configuration-related
          risks. Risk assessment findings may drive baseline updates.
      - id: si-4
        relationship: complements
        confidence: 0.80
        rationale: >
          Risk assessments inform monitoring strategy by identifying
          the highest-risk areas requiring monitoring attention. SI-4
          (System Monitoring) configuration is driven by risk assessment
          outcomes. Both address risk awareness but from periodic and
          continuous perspectives respectively.
      - id: sc-7
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Risk assessments evaluate the effectiveness of boundary
          protections. SC-7 (Boundary Protection) configurations are
          validated during risk assessments. Boundary protection
          weaknesses identified through risk assessment require
          remediation.

  # fisma-subordinate-plans — Subordinate Plans for Adequate Security
  - source_control: fisma-subordinate-plans
    target_controls:
      - id: ac-1
        relationship: superset-of
        confidence: 0.80
        rationale: >
          Subordinate plans (System Security Plans) document all
          implemented controls including AC-1. AC-1 (Policy and
          Procedures) implementation is documented within the SSP
          as part of the subordinate plan. The SSP provides the
          comprehensive documentation container for AC-1 and all
          other controls.
      - id: ac-2
        relationship: superset-of
        confidence: 0.75
        rationale: >
          System Security Plans document the implementation of account
          management controls. AC-2 (Account Management) implementation
          details are recorded in the SSP. The subordinate plan captures
          how account management is implemented for each system.
      - id: ac-3
        relationship: superset-of
        confidence: 0.75
        rationale: >
          System Security Plans document access enforcement mechanisms.
          AC-3 (Access Enforcement) implementation is described in the
          SSP. The subordinate plan captures the specific access control
          mechanisms deployed for each system.
      - id: cm-2
        relationship: superset-of
        confidence: 0.75
        rationale: >
          System Security Plans document baseline configuration details.
          CM-2 (Baseline Configuration) is documented in the SSP,
          capturing the approved configuration baseline for each system.
      - id: ia-2
        relationship: superset-of
        confidence: 0.75
        rationale: >
          System Security Plans document authentication mechanisms.
          IA-2 (Identification and Authentication) implementation is
          captured in the SSP. The subordinate plan describes how users
          are identified and authenticated for each system.
      - id: sc-7
        relationship: superset-of
        confidence: 0.75
        rationale: >
          System Security Plans document system boundaries and boundary
          protection mechanisms. SC-7 (Boundary Protection) implementation
          is described in the SSP, including the definition of system
          boundaries and the controls protecting them.

  # fisma-testing — Periodic Testing and Evaluation of Controls
  - source_control: fisma-testing
    target_controls:
      - id: ac-3
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Periodic testing evaluates the effectiveness of access
          enforcement controls. AC-3 (Access Enforcement) is tested
          through both automated scanning and manual assessment methods
          defined in NIST SP 800-53A. Testing validates that access
          controls work as intended.
      - id: cm-2
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          Periodic testing validates that systems conform to approved
          baselines. CM-2 (Baseline Configuration) compliance is
          verified through automated configuration scanning as part
          of the testing program. Baseline deviations discovered
          during testing generate POA&M items.
      - id: cm-6
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Periodic testing validates configuration settings against
          security requirements. CM-6 (Configuration Settings) is
          assessed through automated compliance scanning tools that
          compare actual settings against approved configurations.
      - id: si-4
        relationship: complements
        confidence: 0.75
        rationale: >
          Periodic testing validates that monitoring controls are
          effective. SI-4 (System Monitoring) is both a control being
          tested and a source of testing data. Continuous monitoring
          complements periodic testing by providing ongoing assessment
          between formal test cycles.
      - id: au-2
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          Periodic testing validates that audit logging is functioning
          correctly. AU-2 (Event Logging) effectiveness is assessed
          by verifying that required events are being captured and
          logs are complete and accurate.
      - id: ia-2
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          Periodic testing evaluates authentication mechanism
          effectiveness. IA-2 (Identification and Authentication) is
          assessed through penetration testing and automated credential
          testing to validate authentication controls.

  # ═══════════════════════════════════════════════════════════════════
  # REPORTING FAMILY
  # ═══════════════════════════════════════════════════════════════════

  # fisma-annual-report — Annual Report to OMB
  - source_control: fisma-annual-report
    target_controls:
      - id: au-6
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          FISMA annual reporting includes audit and accountability
          metrics derived from audit record review. AU-6 (Audit Record
          Review, Analysis, and Reporting) generates the audit analysis
          data that feeds into annual FISMA reports. Reporting aggregates
          the outputs of ongoing audit review activities.
      - id: si-4
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          FISMA annual reporting includes continuous monitoring maturity
          and effectiveness metrics. SI-4 (System Monitoring) provides
          the monitoring data and metrics reported in the annual FISMA
          report. Annual reports aggregate monitoring program performance.
      - id: ir-4
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          FISMA annual reporting includes incident statistics and
          response effectiveness metrics. IR-4 (Incident Handling)
          generates the incident data reported annually to OMB and
          Congress. Annual reports aggregate incident response metrics.

  # fisma-continuous-monitoring — Continuous Monitoring
  - source_control: fisma-continuous-monitoring
    target_controls:
      - id: si-4
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          FISMA continuous monitoring directly mandates the system
          monitoring capabilities defined in SI-4. Both require ongoing
          automated monitoring of security posture, detection of
          vulnerabilities and threats, and near-real-time situational
          awareness. SI-4 is the specific NIST 800-53 control that
          implements the FISMA continuous monitoring requirement.
      - id: au-2
        relationship: complements
        confidence: 0.80
        rationale: >
          Continuous monitoring depends on comprehensive event logging.
          AU-2 (Event Logging) defines which events are captured,
          providing the data foundation for continuous monitoring
          analysis. Without adequate logging, continuous monitoring
          has insufficient data to analyze.
      - id: au-6
        relationship: complements
        confidence: 0.85
        rationale: >
          Continuous monitoring includes ongoing audit record analysis.
          AU-6 (Audit Record Review, Analysis, and Reporting) is a
          core activity within the continuous monitoring program,
          providing ongoing analysis of security-relevant events.
      - id: cm-2
        relationship: complements
        confidence: 0.75
        rationale: >
          Continuous monitoring includes detecting deviations from
          approved baselines. CM-2 (Baseline Configuration) provides
          the reference point against which continuous monitoring
          detects configuration drift and unauthorized changes.
      - id: cm-6
        relationship: complements
        confidence: 0.75
        rationale: >
          Continuous monitoring includes verifying configuration
          compliance on an ongoing basis. CM-6 (Configuration Settings)
          compliance is continuously assessed through the CDM program
          and agency monitoring tools.
      - id: sc-7
        relationship: complements
        confidence: 0.70
        rationale: >
          Continuous monitoring includes network security monitoring
          at system boundaries. SC-7 (Boundary Protection) effectiveness
          is continuously assessed as part of the CDM network security
          management capability area.

  # fisma-ig-assessment — Inspector General Annual Assessment
  - source_control: fisma-ig-assessment
    target_controls:
      - id: ac-1
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          The IG assessment evaluates the effectiveness of agency
