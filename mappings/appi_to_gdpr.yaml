id: appi_to_gdpr
title: "APPI 2022 to GDPR Control Mapping"
source_framework: appi
target_framework: gdpr
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic

mappings:
  # ── gen (General Provisions) ──────────────────────────────────────────

  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          APPI Art. 1 (Purpose of the Act) and GDPR Art. 1 (Subject-matter and
          objectives) both establish the foundational purpose of their respective
          frameworks: protecting individual rights in the context of personal data
          processing. APPI explicitly balances rights protection with data utility,
          while GDPR balances rights protection with free movement of data within the
          EU. Both serve as interpretive anchors for all subsequent provisions.

  - source_control: art-2
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          APPI Art. 2 defines "personal information," "individual identification
          codes," "personal information databases," and "business operators handling
          personal information." GDPR Art. 5 establishes processing principles rather
          than definitions (GDPR definitions are in Art. 4, not present in this
          project). However, both provisions set the material scope of what is
          protected: APPI through definitional boundaries and GDPR through
          principle-based processing constraints. The mapping is semantic rather than
          structural since GDPR Art. 4 (definitions) is not available as a control.
      - id: art-25
        relationship: complements
        confidence: 0.72
        rationale: >
          APPI Art. 2's classification of personal information into categories
          (personal information, anonymously processed information, pseudonymously
          processed information) complements GDPR Art. 25 (Data protection by design
          and by default), which requires controllers to implement measures such as
          pseudonymisation. Both frameworks recognize that data classification is
          foundational to proportionate protection.

  - source_control: art-3
    target_controls:
      - id: art-44
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          APPI Art. 3 (Extraterritorial Application) establishes that the APPI
          applies to foreign business operators handling personal information of
          individuals in Japan. GDPR Art. 44 (General principle for transfers)
          governs conditions for international data transfers. While APPI Art. 3
          addresses jurisdictional reach and GDPR Art. 44 addresses transfer
          safeguards, both address the cross-border dimension of data protection.
          GDPR's equivalent to extraterritorial scope is Art. 3 (not present in
          this project), making Art. 44 the closest available mapping on
          international data governance.
      - id: art-1
        relationship: complements
        confidence: 0.70
        rationale: >
          APPI Art. 3's extraterritorial scope complements GDPR Art. 1's objective of
          protecting natural persons. Both provisions share the premise that data
          protection obligations follow the data subject, regardless of where the
          data controller is located. GDPR Art. 1(3) on free movement of data within
          the EU is conceptually related to APPI Art. 3's cross-border reach.

  # ── handling (Data Handling) ──────────────────────────────────────────

  - source_control: art-17
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          APPI Art. 17 (Specifying the Purpose of Utilization) directly corresponds
          to GDPR Art. 5(1)(b) (purpose limitation principle). Both require that the
          purpose of data processing be specified as concretely as possible before
          processing begins, and that changes to purpose are restricted. APPI Art. 17
          limits purpose changes to what is "reasonably related" to the original
          purpose; GDPR Art. 5(1)(b) prohibits processing "incompatible" with the
          original purpose. The functional equivalence is high.
      - id: art-6
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          APPI Art. 17's purpose specification requirement maps to GDPR Art. 6
          (Lawfulness of processing) because specifying the purpose is a prerequisite
          for establishing a lawful basis. Under GDPR, consent must be for "specific
          purposes" (Art. 6(1)(a)), and legitimate interest requires purpose
          articulation (Art. 6(1)(f)). APPI Art. 17 is the functional prerequisite
          that enables the lawfulness analysis.

  - source_control: art-18
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          APPI Art. 18 (Restriction on Utilization Beyond the Purpose) is the
          enforcement mechanism for purpose limitation, directly equivalent to GDPR
          Art. 5(1)(b). Both prohibit using personal data beyond the scope of the
          declared purpose without a lawful basis. APPI Art. 18 enumerates four
          exceptions (legal obligation, vital interests, public health, government
          cooperation); GDPR Art. 5(1)(b) allows compatible further processing with
          safeguards under Art. 89(1). The core prohibition is functionally identical.
      - id: art-6
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          APPI Art. 18's exceptions for purpose-beyond-scope use (legal obligation,
          vital interests, public health, government cooperation) map to GDPR Art. 6's
          legal bases (consent, contract, legal obligation, vital interests, public
          interest, legitimate interest). Both establish a closed list of grounds for
          lawful processing beyond original consent. GDPR Art. 6 is broader with six
          bases vs. APPI Art. 18's four exceptions, and notably includes "legitimate
          interest" which APPI does not recognize as an independent basis.

  - source_control: art-20
    target_controls:
      - id: art-6
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          APPI Art. 20 (Proper Acquisition) requires that personal information not be
          acquired by deception and that special care-required personal information
          requires prior consent. This maps to GDPR Art. 6 (Lawfulness of processing),
          which requires a legal basis for all processing, including collection.
          APPI Art. 20(2) on special care-required data parallels GDPR Art. 9
          (special categories, not in this project), but within available controls,
          Art. 6's requirement for lawful processing at acquisition is the closest
          match.
      - id: art-5
        relationship: complements
        confidence: 0.78
        rationale: >
          APPI Art. 20's prohibition on deceptive acquisition supports GDPR Art.
          5(1)(a) (lawfulness, fairness, and transparency). The "fairness" component
          of GDPR Art. 5 encompasses the prohibition on obtaining data through
          deception, coercion, or misleading practices, which is the core concern
          of APPI Art. 20(1).

  - source_control: art-21
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          APPI Art. 21 (Notification of Purpose of Utilization upon Acquisition)
          directly corresponds to GDPR Art. 5(1)(a) transparency principle. Both
          require that data subjects be informed about how their data will be used.
          APPI Art. 21 distinguishes between indirect collection (notification or
          public announcement promptly after acquisition) and direct collection
          (express statement of purpose in advance), similar to GDPR's distinction
          between Art. 13 (direct collection) and Art. 14 (indirect collection),
          both of which derive from the Art. 5 transparency principle.
      - id: art-6
        relationship: complements
        confidence: 0.75
        rationale: >
          APPI Art. 21's transparency requirements at acquisition support GDPR
          Art. 6's lawfulness framework. Informing the data subject about the purpose
          is a prerequisite for valid consent under GDPR Art. 6(1)(a), as consent
          must be "informed." The notification obligation strengthens the legal
          basis by ensuring the data subject can make an informed choice.

  # ── rights (Data Subject Rights) ─────────────────────────────────────

  - source_control: art-30
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          APPI Art. 30 (Right to Request Disclosure) and GDPR Art. 15 (Right of
          Access) are functionally equivalent. Both grant data subjects the right to
          obtain their personal data from the controller. APPI Art. 30 requires
          disclosure "without delay" and supports electromagnetic record delivery
          (2022 amendment); GDPR Art. 15 requires response within one month and
          mandates a copy of data undergoing processing. Both have narrow exceptions
          for harm to others and legal conflicts.

  - source_control: art-33
    target_controls:
      - id: art-15
        relationship: complements
        confidence: 0.75
        rationale: >
          APPI Art. 33 (Right to Request Correction, Addition, or Deletion) supports
          GDPR Art. 15 because the APPI correction right is triggered by disclosure
          under Art. 30. Under APPI, the data subject must first exercise the access
          right (Art. 30) and discover inaccurate data before requesting correction.
          GDPR Art. 15 includes the right to be informed about "the existence of the
          right to request rectification" (Art. 15(1)(e)), linking access to
          correction.
      - id: art-17
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          APPI Art. 33's "deletion" component maps to GDPR Art. 17 (Right to
          Erasure). While APPI Art. 33 frames deletion as correction of inaccurate
          data, GDPR Art. 17 provides broader grounds for erasure including purpose
          fulfillment, consent withdrawal, and unlawful processing. The deletion
          mechanism in Art. 33 is narrower, limited to correcting factual
          inaccuracies, whereas GDPR Art. 17 is an independent erasure right.

  - source_control: art-35
    target_controls:
      - id: art-17
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          APPI Art. 35 (Right to Request Cessation of Use, Erasure, or Cessation
          of Third-Party Provision) and GDPR Art. 17 (Right to Erasure) are
          functionally equivalent. The 2022 amendment significantly expanded APPI
          Art. 35 to include grounds closely mirroring GDPR Art. 17: data no longer
          needed for its purpose, breach occurrence, and handling likely to harm
          rights. Both provide the data subject a right to have data erased and
          require notification to third parties. APPI Art. 35 additionally covers
          cessation of third-party provision, which GDPR addresses through
          Art. 17(2) notification obligations.
      - id: art-5
        relationship: complements
        confidence: 0.73
        rationale: >
          APPI Art. 35's ground for cessation when data is "no longer necessary to
          be utilized for achieving the purpose" supports GDPR Art. 5(1)(e) (storage
          limitation), which requires that personal data be kept only as long as
          necessary for the processing purpose. Both provisions enforce the principle
          that retention without purpose justification is impermissible.

  - source_control: art-37
    target_controls:
      - id: art-15
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          APPI Art. 37 (Right to Request Disclosure of Third-Party Provision Records)
          maps to GDPR Art. 15 (Right of Access). GDPR Art. 15(1)(c) requires
          disclosure of recipients or categories of recipients to whom data has been
          disclosed. APPI Art. 37 goes further by granting access to actual provision
          records (dates, recipients, data items) rather than just categories. Both
          serve the transparency objective of letting data subjects know who has
          received their data.
      - id: art-30
        relationship: complements
        confidence: 0.75
        rationale: >
          APPI Art. 37's disclosure of third-party provision records complements GDPR
          Art. 30 (Records of Processing Activities). GDPR Art. 30 requires
          controllers to maintain records including recipients and transfers, but
          does not grant data subjects direct access to those records. APPI Art. 37
          bridges this gap by making provision records accessible to data subjects,
          complementing the record-keeping requirement with a transparency right.

  # ── sensitive (Sensitive Data & Pseudonymization) ─────────────────────

  - source_control: art-23
    target_controls:
      - id: art-6
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          APPI Art. 23 (Restriction on Provision to Third Parties) and GDPR Art. 6
          (Lawfulness of Processing) both establish consent as the default legal
          basis for sharing personal data with third parties. APPI Art. 23(1)
          requires prior consent with four enumerated exceptions (legal obligation,
          vital interests, public health, government cooperation); GDPR Art. 6
          provides six legal bases. Both define when data sharing is lawful. APPI
          Art. 23's opt-out mechanism (paragraph 3) has no direct GDPR equivalent,
          as GDPR does not allow non-consent-based sharing through opt-out for
          commercial purposes.
      - id: art-28
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          APPI Art. 23(2) excludes entrusted processors, business successors, and
          joint users from the "third party" definition, mapping to GDPR Art. 28
          (Processor). Both frameworks recognize that data sharing with a processor
          acting under the controller's instructions does not constitute a
          third-party transfer requiring separate consent. GDPR Art. 28 prescribes
          detailed contractual requirements for the controller-processor
          relationship; APPI Art. 23(2)(i) requires that entrustment be within the
          scope necessary for the purpose of utilization.

  - source_control: art-40
    target_controls:
      - id: art-25
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          APPI Art. 40 (Pseudonymously Processed Information) maps to GDPR Art. 25
          (Data Protection by Design and by Default). GDPR Art. 25(1) explicitly
          lists pseudonymisation as a key technique for implementing data protection
          principles. APPI Art. 40 creates a comprehensive regime for pseudonymously
          processed information with specific rules: prohibition on re-identification,
          prohibition on contacting data subjects, and restrictions on third-party
          sharing. GDPR treats pseudonymisation as a technique within the broader
          privacy-by-design framework; APPI treats it as a distinct data category
          with dedicated obligations.
      - id: art-5
        relationship: complements
        confidence: 0.78
        rationale: >
          APPI Art. 40's rules for pseudonymously processed information support GDPR
          Art. 5(1)(c) (data minimisation) and Art. 5(1)(f) (integrity and
          confidentiality). Pseudonymization serves data minimisation by reducing the
          identifiability of personal data while enabling analytics. APPI Art. 40's
          prohibition on re-identification and requirement to secure mapping tables
          directly support the confidentiality principle.
      - id: art-32
        relationship: complements
        confidence: 0.74
        rationale: >
          APPI Art. 40(2) requires security management measures for deleted
          information and processing-method-related information (mapping tables),
          complementing GDPR Art. 32 (Security of Processing), which lists
          pseudonymisation as one of the appropriate technical measures for ensuring
          security. Both require that the technical implementation of
          pseudonymisation include safeguards against unauthorized re-identification.

  # ── xborder (Cross-Border Transfer) ──────────────────────────────────

  - source_control: art-24
    target_controls:
      - id: art-44
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          APPI Art. 24 (Restriction on Cross-Border Transfer) and GDPR Art. 44
          (General Principle for Transfers) are functionally equivalent. Both
          establish that cross-border transfers of personal data require specific
          legal mechanisms. APPI Art. 24 provides three mechanisms: transfer to a
          PPC-designated adequate country, informed consent, and transfer to a
          recipient with equivalent protection systems. GDPR Art. 44 (with Arts.
          45-49) provides adequacy decisions, appropriate safeguards (SCCs, BCRs),
          and specific derogations. The structural approach is nearly identical,
          with both frameworks creating a tiered transfer legitimation system.
      - id: art-5
        relationship: complements
        confidence: 0.72
        rationale: >
          APPI Art. 24's transparency requirements (informing data subjects about
          the destination country's data protection system before obtaining consent)
          support GDPR Art. 5(1)(a) (transparency principle). Both frameworks
          require that cross-border transfers be transparent to the data subject,
          though APPI Art. 24 imposes more granular pre-consent information
          obligations than GDPR's general transparency framework.

  - source_control: art-25
    target_controls:
      - id: art-30
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          APPI Art. 25 (Record of Provision of Personal Data to Third Parties) and
          GDPR Art. 30 (Records of Processing Activities) both require controllers
          to maintain detailed records of data transfers. APPI Art. 25 mandates
          recording the date, recipient identity, data subject identity, and data
          items for each third-party provision. GDPR Art. 30(1)(d-e) requires
          recording categories of recipients and international transfers. APPI
          Art. 25 is more granular (per-transaction records) while GDPR Art. 30
          takes a broader processing-activity perspective, but both serve the
          accountability and traceability objectives.

  - source_control: art-26
    target_controls:
      - id: art-30
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          APPI Art. 26 (Confirmation and Record of Receipt from Third Parties) maps
          to GDPR Art. 30 (Records of Processing Activities). APPI Art. 26 imposes
          due diligence on data recipients to verify the source's identity and the
          lawfulness of acquisition, creating bilateral record-keeping. GDPR Art. 30
          requires processors to maintain records of processing activities on behalf
          of a controller. While GDPR does not mandate per-receipt provenance
          verification, the record-keeping obligation for processors serves a
          similar accountability function.
      - id: art-5
        relationship: complements
        confidence: 0.73
        rationale: >
          APPI Art. 26's requirement to confirm the lawfulness of data acquisition
          from third parties supports GDPR Art. 5(1)(a) (lawfulness). Both frameworks
          require that data be obtained lawfully. APPI Art. 26 operationalizes this
          by imposing a verification duty on recipients, while GDPR Art. 5
          establishes lawfulness as a processing principle that applies throughout
          the data lifecycle including at acquisition.

  # ── enforcement (Breach Notification & Security) ─────────────────────

  - source_control: art-22
    target_controls:
      - id: art-33
        relationship: equivalent-to
        confidence: 0.91
        rationale: >
          APPI Art. 22 (Data Breach Notification) and GDPR Art. 33 (Notification
          to Supervisory Authority) both mandate reporting data breaches to the
          supervisory authority. APPI requires a preliminary report within 3-5 days
          and a full report within 30 days (60 for malicious breaches). GDPR requires
          notification within 72 hours. Both require assessment of breach severity,
          description of the breach nature, and remedial measures. The notification
          to data subjects is mandatory under both frameworks. The core obligation
          is functionally equivalent despite differing timelines.
      - id: art-83
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          APPI Art. 22's penal provisions (Articles 83-87, including corporate fines
          of up to JPY 100 million) map to GDPR Art. 83 (Administrative Fines).
          Both establish a penalty framework for non-compliance. GDPR fines are
          substantially higher (up to EUR 20 million or 4% of global turnover),
          and are administrative rather than criminal. APPI penalties include
          criminal sanctions (imprisonment) alongside fines. Both serve as
          deterrents and enforcement mechanisms for their respective frameworks.
      - id: art-35
        relationship: complements
        confidence: 0.74
        rationale: >
          APPI Art. 22's breach notification requirements support GDPR Art. 35
          (Data Protection Impact Assessment). Both frameworks recognize that
          breach risk assessment is integral to data protection governance.
          GDPR Art. 35 requires pre-processing risk assessment for high-risk
          activities, while APPI Art. 22 requires post-incident assessment and
          classification against four PPC-defined breach categories. Proactive
          risk assessment (DPIA) and reactive breach classification are
          complementary risk management tools.

  - source_control: art-47
    target_controls:
      - id: art-32
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          APPI Art. 47 (Safety Management Measures) and GDPR Art. 32 (Security of
          Processing) are functionally equivalent. Both require controllers to
          implement appropriate technical and organizational measures to protect
          personal data. APPI Art. 47 specifies six domains (basic policies,
          organizational measures, human resources, physical security, technical
          measures, foreign environment assessment) as prescribed by PPC guidelines.
          GDPR Art. 32 specifies pseudonymisation, encryption, CIA assurance,
          disaster recovery, and regular testing. Both adopt a risk-based approach
          proportional to data sensitivity.
      - id: art-28
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          APPI Art. 47's contractor supervision obligations (requiring oversight of
          entrusted processors including selection, contracts, and monitoring) map
          directly to GDPR Art. 28 (Processor). Both require the controller to
          exercise oversight over processors handling personal data, including
          contractual obligations, security guarantees, and audit rights. APPI
          extends the supervision obligation through the entire subcontracting chain,
          paralleling GDPR Art. 28(4) on sub-processor authorization.
      - id: art-25
        relationship: complements
        confidence: 0.76
        rationale: >
          APPI Art. 47's requirement to formulate "basic policies" and implement
          safety management measures across six domains supports GDPR Art. 25
          (Data Protection by Design and by Default). Both require that data
          protection be embedded into organizational processes and systems
          proactively, not merely as a reactive compliance exercise. APPI Art. 47's
          comprehensive domain structure operationalizes the privacy-by-design
          concept at the organizational level.
