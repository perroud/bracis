id: iso-27005_to_iso-27001
title: "ISO/IEC 27005:2022 to ISO/IEC 27001:2022 Control Mapping"
source_framework: iso-27005
target_framework: iso-27001-2022
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic

mappings:
  # CTX — Context Establishment
  - source_control: ctx-1
    target_controls:
      - id: a5-1
        relationship: implements
        confidence: 0.85
        rationale: >
          ISO 27005 ctx.1 (Establishing the context of the organization) directly
          supports ISO 27001 A.5.1 (Policies for information security). Context
          establishment — understanding external regulatory, legal, and competitive
          factors along with internal governance, capabilities, and objectives —
          provides the foundational inputs that shape information security policy
          content and scope. The policy cannot be adequate without understanding
          the organizational context first.
      - id: a5-36
        relationship: implements
        confidence: 0.78
        rationale: >
          ISO 27005 ctx.1 supports ISO 27001 A.5.36 (Compliance with policies,
          rules and standards). Establishing the external context includes
          identifying applicable regulatory, legal, and contractual requirements,
          which are the same requirements against which compliance is reviewed
          under A.5.36. Context establishment feeds the compliance review scope.

  - source_control: ctx-2
    target_controls:
      - id: a5-1
        relationship: implements
        confidence: 0.87
        rationale: >
          ISO 27005 ctx.2 (Defining risk criteria) supports ISO 27001 A.5.1
          (Policies for information security). Risk acceptance criteria, risk
          assessment criteria, and risk level determination criteria must be
          documented in or referenced by the information security policy.
          The policy sets the governance frame within which risk criteria operate.
      - id: a8-8
        relationship: complements
        confidence: 0.75
        rationale: >
          ISO 27005 ctx.2 complements ISO 27001 A.8.8 (Management of technical
          vulnerabilities). Risk criteria — specifically severity thresholds,
          likelihood scales, and acceptance levels — directly determine how
          technical vulnerabilities are prioritized and which require remediation
          versus acceptance. Without defined risk criteria, vulnerability
          management lacks consistent decision benchmarks.

  - source_control: ctx-3
    target_controls:
      - id: a5-1
        relationship: implements
        confidence: 0.82
        rationale: >
          ISO 27005 ctx.3 (Defining the scope and boundaries) supports ISO 27001
          A.5.1 (Policies for information security). The scope of the risk
          management process should align with the ISMS scope, which is governed
          by the information security policy. Scope definition feeds directly
          into the policy's applicability statement.
      - id: a5-36
        relationship: implements
        confidence: 0.80
        rationale: >
          ISO 27005 ctx.3 supports ISO 27001 A.5.36 (Compliance with policies,
          rules and standards). Defining scope and boundaries determines which
          systems, processes, and assets are subject to compliance reviews.
          Without clear boundaries, compliance assessment cannot establish what
          is in-scope for evaluation.

  - source_control: ctx-4
    target_controls:
      - id: a5-2
        relationship: equivalent-to
        confidence: 0.88
        rationale: >
          ISO 27005 ctx.4 (Organization of information security risk management)
          maps directly to ISO 27001 A.5.2 (Information security roles and
          responsibilities). Both controls address establishing roles,
          responsibilities, and authorities. ctx.4 focuses specifically on risk
          management roles (risk owners, analysts, committee members), which are
          a subset of the broader information security roles defined in A.5.2.
      - id: a5-1
        relationship: implements
        confidence: 0.76
        rationale: >
          ISO 27005 ctx.4 supports ISO 27001 A.5.1 (Policies for information
          security). The organizational structure and governance for risk
          management — including senior management commitment and resource
          allocation — must be reflected in or authorized by the information
          security policy.

  # RA — Risk Assessment
  - source_control: ra-1
    target_controls:
      - id: a8-8
        relationship: implements
        confidence: 0.82
        rationale: >
          ISO 27005 ra.1 (Risk identification — identifying assets) supports
          ISO 27001 A.8.8 (Management of technical vulnerabilities). A current
          and complete asset inventory is explicitly stated in A.8.8 as a
          prerequisite for effective technical vulnerability management. Asset
          identification provides the target list against which vulnerability
          scans and assessments are executed.
      - id: a8-9
        relationship: complements
        confidence: 0.78
        rationale: >
          ISO 27005 ra.1 complements ISO 27001 A.8.9 (Configuration management).
          Identifying assets — including hardware, software, and network
          components — produces the inventory that configuration management
          depends on. Configuration baselines cannot be established without
          first knowing which assets exist and their ownership.
      - id: a5-1
        relationship: implements
        confidence: 0.72
        rationale: >
          ISO 27005 ra.1 supports ISO 27001 A.5.1 (Policies for information
          security). Asset identification outcomes inform the scope and
          requirements of topic-specific policies such as asset management,
          data classification, and access control policies.

  - source_control: ra-2
    target_controls:
      - id: a8-8
        relationship: implements
        confidence: 0.83
        rationale: >
          ISO 27005 ra.2 (Risk identification — identifying threats) supports
          ISO 27001 A.8.8 (Management of technical vulnerabilities). Threat
          identification — including mapping threat actors, motivations, and
          attack vectors — provides the adversarial context needed to
          prioritize vulnerability remediation. Vulnerability management is
          more effective when guided by an understanding of which threats
          are most likely to exploit specific weaknesses.
      - id: a5-1
        relationship: implements
        confidence: 0.73
        rationale: >
          ISO 27005 ra.2 supports ISO 27001 A.5.1 (Policies for information
          security). Identified threats inform the content of topic-specific
          security policies. For example, a significant ransomware threat
          should drive backup and incident management policy requirements.

  - source_control: ra-3
    target_controls:
      - id: a8-8
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          ISO 27005 ra.3 (Risk identification — identifying vulnerabilities)
          maps directly to ISO 27001 A.8.8 (Management of technical
          vulnerabilities). Both controls address the systematic identification
          of vulnerabilities through scanning, testing, code review, and
          vendor advisories. ra.3 is the risk-assessment-process view of
          vulnerability identification, while A.8.8 is the operational control
          view — they describe the same activity from complementary perspectives.
      - id: a8-25
        relationship: complements
        confidence: 0.76
        rationale: >
          ISO 27005 ra.3 complements ISO 27001 A.8.25 (Secure development life
          cycle). Vulnerability identification through code reviews and security
          testing feeds directly into the secure development lifecycle. Findings
          from vulnerability assessments drive improvements to coding standards,
          design patterns, and development practices.
      - id: a8-28
        relationship: complements
        confidence: 0.74
        rationale: >
          ISO 27005 ra.3 complements ISO 27001 A.8.28 (Secure coding).
          Identifying coding-level vulnerabilities — insecure coding practices,
          input validation gaps, and cryptographic weaknesses — directly informs
          which secure coding rules need enforcement. Vulnerability identification
          closes the feedback loop to secure coding practices.

  - source_control: ra-4
    target_controls:
      - id: a5-1
        relationship: implements
        confidence: 0.80
        rationale: >
          ISO 27005 ra.4 (Risk identification — identifying consequences)
          supports ISO 27001 A.5.1 (Policies for information security).
          Consequence identification — assessing financial, operational,
          legal, and reputational impacts — provides the business impact
          rationale that justifies policy requirements. Policies are stronger
          when grounded in documented consequence analysis.
      - id: a5-36
        relationship: implements
        confidence: 0.73
        rationale: >
          ISO 27005 ra.4 supports ISO 27001 A.5.36 (Compliance with policies,
          rules and standards). Identifying consequences of non-compliance —
          regulatory penalties, legal liability, reputational damage —
          provides the motivation and prioritization input for compliance
          reviews. Consequence severity determines compliance review urgency.

  - source_control: ra-5
    target_controls:
      - id: a5-1
        relationship: implements
        confidence: 0.84
        rationale: >
          ISO 27005 ra.5 (Risk analysis) supports ISO 27001 A.5.1 (Policies
          for information security). Risk analysis results — combining
          likelihood and consequence into risk levels — provide the
          evidence base that drives policy decisions. Policy requirements
          should be proportionate to analyzed risk levels.
      - id: a8-8
        relationship: complements
        confidence: 0.78
        rationale: >
          ISO 27005 ra.5 complements ISO 27001 A.8.8 (Management of technical
          vulnerabilities). Risk analysis assigns risk levels to identified
          vulnerabilities by combining technical severity with business
          impact and likelihood, enabling risk-based vulnerability
          prioritization rather than purely technical severity ranking.

  - source_control: ra-6
    target_controls:
      - id: a5-1
        relationship: implements
        confidence: 0.85
        rationale: >
          ISO 27005 ra.6 (Risk evaluation) supports ISO 27001 A.5.1
          (Policies for information security). Risk evaluation determines
          which risks are acceptable versus which require treatment, directly
          informing policy decisions about acceptable risk levels and
          treatment priorities. The policy framework must incorporate
          risk evaluation outcomes.
      - id: a8-8
        relationship: complements
        confidence: 0.76
        rationale: >
          ISO 27005 ra.6 complements ISO 27001 A.8.8 (Management of technical
          vulnerabilities). Risk evaluation decides whether each vulnerability
          requires remediation, compensating controls, or acceptance. This
          evaluation step is the decision gate between vulnerability identification
          and vulnerability treatment in the operational workflow.

  # RT — Risk Treatment
  - source_control: rt-1
    target_controls:
      - id: a5-1
        relationship: implements
        confidence: 0.83
        rationale: >
          ISO 27005 rt.1 (Risk treatment options) supports ISO 27001 A.5.1
          (Policies for information security). The information security policy
          should reference or define the available risk treatment options
          (modify, retain, avoid, share) and the criteria for selecting among
          them. Treatment option selection is a policy-level decision.
      - id: a8-8
        relationship: implements
        confidence: 0.80
        rationale: >
          ISO 27005 rt.1 supports ISO 27001 A.8.8 (Management of technical
          vulnerabilities). Risk treatment options directly apply to
          vulnerability management: patch (modify), accept (retain),
          decommission the affected system (avoid), or transfer via
          insurance or managed security services (share). Vulnerability
          management operationalizes risk treatment decisions.

  - source_control: rt-2
    target_controls:
      - id: a5-1
        relationship: implements
        confidence: 0.86
        rationale: >
          ISO 27005 rt.2 (Risk treatment plan) supports ISO 27001 A.5.1
          (Policies for information security). The risk treatment plan is
          the actionable implementation of the policy's risk management
          requirements. The policy mandates risk treatment; the plan specifies
          the controls, resources, timelines, and responsibilities for
          executing that mandate.
      - id: a5-36
        relationship: complements
        confidence: 0.77
        rationale: >
          ISO 27005 rt.2 complements ISO 27001 A.5.36 (Compliance with policies,
          rules and standards). The risk treatment plan provides the specific
          controls and milestones against which compliance can be measured.
          Compliance reviews verify whether treatment plan items have been
          implemented as specified and on schedule.

  - source_control: rt-3
    target_controls:
      - id: a5-1
        relationship: implements
        confidence: 0.84
        rationale: >
          ISO 27005 rt.3 (Risk acceptance) supports ISO 27001 A.5.1
          (Policies for information security). Risk acceptance criteria and
          approval authorities must be defined in or referenced by the
          information security policy. The policy governs who can accept
          risk, under what conditions, and with what documentation.
      - id: a5-2
        relationship: complements
        confidence: 0.79
        rationale: >
          ISO 27005 rt.3 complements ISO 27001 A.5.2 (Information security
          roles and responsibilities). Risk acceptance decisions must be
          made by designated risk owners with appropriate authority level.
          This requires clearly defined roles and approval hierarchies —
          the domain of A.5.2.

  - source_control: rt-4
    target_controls:
      - id: a8-8
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          ISO 27005 rt.4 (Selecting and implementing controls) maps to
          ISO 27001 A.8.8 (Management of technical vulnerabilities). Control
          selection and implementation is the operational execution of
          vulnerability remediation. rt.4 explicitly references ISO 27001
          Annex A as a control source, and A.8.8 requires that appropriate
          measures be taken once vulnerabilities are identified — both
          describe the control implementation activity from complementary
          perspectives.
      - id: a5-1
        relationship: implements
        confidence: 0.82
        rationale: >
          ISO 27005 rt.4 supports ISO 27001 A.5.1 (Policies for information
          security). Selecting controls from recognized catalogs (ISO 27001
          Annex A) and implementing them systematically is a direct execution
          of policy requirements. The policy mandates control implementation;
          rt.4 provides the structured process for doing so.
      - id: a8-25
        relationship: complements
        confidence: 0.80
        rationale: >
          ISO 27005 rt.4 complements ISO 27001 A.8.25 (Secure development
          life cycle). When risk treatment requires implementing security
          controls in software — such as input validation, access controls,
          or encryption — those controls become secure development lifecycle
          requirements. rt.4 provides the risk-driven rationale for specific
          SDLC security requirements.
      - id: a8-28
        relationship: complements
        confidence: 0.75
        rationale: >
          ISO 27005 rt.4 complements ISO 27001 A.8.28 (Secure coding).
          Risk treatment may require implementing specific coding-level
          controls — secure error handling, parameterized queries, input
          validation — as risk mitigation measures. rt.4 connects risk
          analysis outcomes to specific secure coding requirements.

  # RC — Risk Communication and Consultation
  - source_control: rc-1
    target_controls:
      - id: a5-1
        relationship: implements
        confidence: 0.81
        rationale: >
          ISO 27005 rc.1 (Risk communication) supports ISO 27001 A.5.1
          (Policies for information security). The information security policy
          must be communicated to relevant personnel and interested parties.
          Risk communication ensures that risk assessment results, treatment
          decisions, and residual risk status are communicated to the
          appropriate stakeholders, fulfilling the policy's communication
          requirements.
      - id: a5-36
        relationship: implements
        confidence: 0.74
        rationale: >
          ISO 27005 rc.1 supports ISO 27001 A.5.36 (Compliance with policies,
          rules and standards). Communicating risk information to managers
          enables them to review compliance within their areas of
          responsibility. Risk reports provide the data that compliance
          reviewers need to assess whether security controls are adequate
          and functioning.

  - source_control: rc-2
    target_controls:
      - id: a5-2
        relationship: implements
        confidence: 0.82
        rationale: >
          ISO 27005 rc.2 (Risk consultation) supports ISO 27001 A.5.2
          (Information security roles and responsibilities). Consultation
          with stakeholders on risk management ensures that role definitions
          capture the right expertise and authority. Risk consultation
          identifies whose input is needed for risk decisions, which directly
          informs role and responsibility allocation.
      - id: a5-1
        relationship: implements
        confidence: 0.75
        rationale: >
          ISO 27005 rc.2 supports ISO 27001 A.5.1 (Policies for information
          security). Consulting with legal, compliance, business, and
          technical stakeholders ensures that security policies reflect
          diverse perspectives and are practically implementable. Policy
          adequacy depends on inclusive consultation during development
          and review.

  # RM — Risk Monitoring and Review
  - source_control: rm-1
    target_controls:
      - id: a5-36
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          ISO 27005 rm.1 (Risk monitoring) maps to ISO 27001 A.5.36
          (Compliance with policies, rules and standards). Continuous risk
          monitoring — detecting changes in threats, vulnerabilities,
          controls, and context — is the operational mechanism for verifying
          ongoing compliance with security policies and standards. Both
          controls require systematic, continuous verification that the
          security posture remains adequate.
      - id: a8-15
        relationship: implements
        confidence: 0.83
        rationale: >
          ISO 27005 rm.1 supports ISO 27001 A.8.15 (Logging). Effective
          risk monitoring depends on comprehensive logging of activities,
          exceptions, and security events. Logs provide the data that risk
          monitoring consumes — alert triggers, trend analysis, and anomaly
          detection all depend on logging infrastructure. rm.1 explicitly
          requires monitoring activities to be recorded.
      - id: a8-8
        relationship: complements
        confidence: 0.77
        rationale: >
          ISO 27005 rm.1 complements ISO 27001 A.8.8 (Management of
          technical vulnerabilities). Risk monitoring includes detecting
          new vulnerabilities and changes in vulnerability exposure. This
          continuous monitoring triggers re-assessment when new critical
          vulnerabilities are disclosed, feeding the vulnerability
          management lifecycle.

  - source_control: rm-2
    target_controls:
      - id: a5-36
        relationship: equivalent-to
        confidence: 0.87
        rationale: >
          ISO 27005 rm.2 (Risk review) maps to ISO 27001 A.5.36 (Compliance
          with policies, rules and standards). Periodic risk management
          reviews assess whether the risk management process and its outcomes
          remain suitable, adequate, and effective — which is exactly the
          purpose of compliance reviews under A.5.36. Both require planned-interval
          reviews with documented outcomes and corrective actions.
      - id: a5-1
        relationship: implements
        confidence: 0.80
        rationale: >
          ISO 27005 rm.2 supports ISO 27001 A.5.1 (Policies for information
          security). Risk reviews may identify the need to update security
          policies when the risk landscape changes. A.5.1 requires policies
          to be reviewed at planned intervals or when significant changes
          occur — risk review outputs are a primary trigger for policy updates.
