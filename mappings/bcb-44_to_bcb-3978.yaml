id: bcb-44_to_bcb-3978
title: "BCB 44 to BCB 3978 Control Mapping"
source_framework: bcb-44
target_framework: bcb-3978
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic
description: >
  Mapping from Resolucao BCB n. 44/2020 (PLD/FT for payment institutions) to
  Circular BCB n. 3.978/2020 (PLD/FT for the broader financial system). BCB 44
  was derived from BCB 3978 to extend the same anti-money laundering and counter-
  terrorism financing obligations to payment institutions authorized by the Central
  Bank. Both follow the same FATF/GAFI recommendations and Law 9.613/1998 structure:
  policy, internal risk assessment, KYC, record-keeping, monitoring, COAF reporting,
  PEP handling, training, and document retention.

mappings:
  # ── Cap 1: Objeto e Disposicoes Gerais ──────────────────────────────────

  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: derived-from
        confidence: 0.95
        rationale: >
          Both define the object and scope of the regulation. BCB 44 art-1
          targets payment institutions; BCB 3978 art-1 targets the broader
          financial system. BCB 44 was derived from BCB 3978 to extend
          PLD/FT obligations to the payments sector.

  - source_control: art-2
    target_controls:
      - id: art-2
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Both define key terms: money laundering, terrorism financing,
          beneficial owner, PEP. The definitions are substantively identical,
          drawn from Law 9.613/1998 and Law 13.260/2016.

  - source_control: art-3
    target_controls:
      - id: art-3
        relationship: derived-from
        confidence: 0.90
        rationale: >
          Both establish the general principle that institutions must implement
          and maintain effective PLD/FT policies, procedures and internal controls
          proportional to their risk profile. BCB 44 art-3 adapts this requirement
          specifically for payment institutions.

  # ── Cap 2: Politica de PLD/FT e Avaliacao Interna de Risco ─────────────

  - source_control: art-4
    target_controls:
      - id: art-3
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          BCB 44 art-4 lists the minimum contents of the PLD/FT policy
          (principles, responsibilities, risk assessment, KYC, monitoring,
          COAF reporting). BCB 3978 art-3 establishes the policy requirement
          broadly, while art-4 details the minimum contents.
      - id: art-4
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Both prescribe the minimum contents of the PLD/FT institutional
          policy, including directives for roles/responsibilities, KYC
          procedures, monitoring, COAF reporting, and internal risk assessment.

  - source_control: art-5
    target_controls:
      - id: art-6
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Both require an internal risk assessment (AIR) that considers
          client risk profiles, geographic areas, products/services, channels,
          and new technologies to identify and measure PLD/FT risk exposure.

  - source_control: art-6
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Both address governance of the PLD/FT policy: approval by the
          board/directorate, periodic review, and dissemination to relevant
          personnel. BCB 44 art-6 also requires annual review; BCB 3978 art-5
          requires board approval and public disclosure.

  - source_control: art-7
    target_controls:
      - id: art-35
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Both require designation of a director responsible for PLD/FT
          compliance. BCB 44 art-7 allows the CEO to accumulate the function
          for smaller institutions; BCB 3978 art-35 requires the director
          to have technical capacity and independence.

  # ── Cap 3: Identificacao e Qualificacao de Clientes ─────────────────────

  - source_control: art-8
    target_controls:
      - id: art-10
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Both require procedures to identify, qualify and classify clients,
          including collecting, verifying and validating client information
          according to risk profile and nature of business relationship.

  - source_control: art-9
    target_controls:
      - id: art-7
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          BCB 44 art-9 requires classifying clients by PLD/FT risk level
          considering nature, economic activity, geography, products,
          channels and transaction history. BCB 3978 art-7 defines risk
          categories based on the internal risk assessment.
      - id: art-8
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Both specify criteria for client risk profiling: client
          identification, qualification, nature of business, financial
          capacity, transaction values, origin/destination of resources,
          and geographic area.

  - source_control: art-10
    target_controls:
      - id: art-10
        relationship: subset-of
        confidence: 0.80
        rationale: >
          BCB 44 art-10 allows simplified due diligence (SDD) for low-risk
          clients with limited products (prepaid accounts, low-value
          instruments). BCB 3978 art-10 broadly covers KYC procedures;
          SDD is an implicit risk-proportional measure within it.

  - source_control: art-11
    target_controls:
      - id: art-16
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Both require enhanced due diligence (EDD) for higher-risk clients
          and situations, including PEPs, clients from FATF-listed
          jurisdictions, and high-risk economic sectors.
      - id: art-14
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          BCB 44 art-11 lists PEPs as requiring EDD. BCB 3978 art-14
          specifically details enhanced procedures for PEPs, including
          senior management approval and enhanced monitoring.

  - source_control: art-12
    target_controls:
      - id: art-13
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Both require identification of the beneficial owner of legal
          entities, with a 25% shareholding threshold, tracing the chain
          of control to the ultimate natural person.

  - source_control: art-13
    target_controls:
      - id: art-14
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Both require specific procedures for PEP identification and
          handling: verification at onboarding and periodically, senior
          management approval, and enhanced monitoring of transactions.

  - source_control: art-14
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Both require keeping client registration data up to date, with
          update frequency proportional to client risk level — higher-risk
          clients require more frequent updates.

  # ── Cap 4: Registro de Operacoes ────────────────────────────────────────

  - source_control: art-15
    target_controls:
      - id: art-18
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Both require maintaining records of all operations performed,
          including minimum fields: operation type, value, date, client
          identification, and beneficiary identification.

  - source_control: art-16
    target_controls:
      - id: art-19
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Both require specific records for high-value cash operations.
          BCB 44 art-16 sets the threshold at R$ 2,000 for payment
          institutions; BCB 3978 art-19 sets R$ 50,000 for financial
          institutions. Different thresholds reflect different risk profiles.

  - source_control: art-17
    target_controls:
      - id: art-18
        relationship: complements
        confidence: 0.80
        rationale: >
          BCB 44 art-17 adds PIX-specific and instant-payment record-keeping
          requirements (payer/receiver data, PIX key, transaction type).
          This has no direct equivalent in BCB 3978 as PIX was launched
          after the Circular was published, but it complements the general
          operation record requirement in art-18.
      - id: art-33
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          BCB 3978 art-33 requires risk evaluation before adopting new
          technologies. PIX record-keeping in BCB 44 art-17 is an
          implementation of controls for a new technology/channel.

  - source_control: art-18
    target_controls:
      - id: art-20
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Both require that operation records be maintained with integrity,
          authenticity, and confidentiality, and be accessible in a timely
          manner to the Central Bank, COAF, and other competent authorities.

  # ── Cap 5: Monitoramento de Operacoes ───────────────────────────────────

  - source_control: art-19
    target_controls:
      - id: art-21
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Both require implementation of monitoring systems for suspicious
          operations compatible with institutional risk profile, including
          continuous monitoring, selection of suspicious operations, and
          risk-based parameters.

  - source_control: art-20
    target_controls:
      - id: art-22
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Both define minimum monitoring parameters and scenarios: cash
          operations incompatible with client profile, operations with
          FATF-listed jurisdictions, high-risk clients, PEPs, and
          situations where beneficial owner cannot be identified.

  - source_control: art-21
    target_controls:
      - id: art-23
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Both require internal investigation of selected operations to
          characterize or dismiss suspicion, and to substantiate the
          decision on COAF reporting. Analysis records must be kept
          for at least ten years.

  - source_control: art-22
    target_controls:
      - id: art-22
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          BCB 44 art-22 lists suspicion indicators (structuring, inability
          to identify beneficial owner, etc.). BCB 3978 art-22 similarly
          lists monitoring scenarios including COAF typologies, operations
          without economic justification, PEP operations, and unidentified
          beneficial owners.

  - source_control: art-23
    target_controls:
      - id: art-21
        relationship: complements
        confidence: 0.80
        rationale: >
          BCB 44 art-23 requires screening against sanctions lists and
          terrorist financing lists at onboarding and periodically. BCB
          3978 art-21 broadly covers monitoring of suspicious operations
          and situations; sanctions screening is an implicit component.
      - id: art-24
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          BCB 3978 art-24 addresses monitoring periodicity. BCB 44 art-23
          requires real-time or near-real-time screening when technically
          possible, which intersects with the periodicity requirements.

  - source_control: art-24
    target_controls:
      - id: art-23
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          BCB 44 art-24 covers post-analysis decisions (report to COAF,
          archive with justification, preventive blocking). BCB 3978 art-23
          similarly covers analysis of selected operations to characterize
          or dismiss suspicion and substantiate the COAF reporting decision.
      - id: art-25
        relationship: complements
        confidence: 0.80
        rationale: >
          BCB 44 art-24 includes the decision to report to COAF after
          analysis. BCB 3978 art-25 is the specific COAF reporting
          obligation, which is the natural outcome of the analysis
          decision process.

  # ── Cap 6: Comunicacao ao COAF ──────────────────────────────────────────

  - source_control: art-25
    target_controls:
      - id: art-25
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Both require reporting suspicious operations to COAF without
          giving notice to those involved. Both mandate use of SISCOAF
          and define minimum content for the report.

  - source_control: art-26
    target_controls:
      - id: art-25
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          BCB 44 art-26 defines specific reporting deadlines (1 business
          day for terrorism/urgency, 3 business days for high-value).
          BCB 3978 art-25 establishes a 24 business-day deadline. The
          deadlines differ because BCB 44 adopted stricter timelines
          for the payments sector.

  - source_control: art-27
    target_controls:
      - id: art-26
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Both require automatic reporting to COAF of cash operations above
          regulatory thresholds (R$ 50,000 for cash deposits/withdrawals)
          regardless of suspicion analysis.
      - id: art-27
        relationship: complements
        confidence: 0.80
        rationale: >
          BCB 44 art-27 includes international transfers above R$ 100,000
          in the automatic reporting requirement. BCB 3978 art-27
          specifically addresses virtual asset operations reporting,
          which is a newer regulatory addition.

  - source_control: art-28
    target_controls:
      - id: art-29
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Both prohibit tipping off — institutions and their employees
          must not inform clients or third parties about the existence or
          content of COAF reports.

  - source_control: art-29
    target_controls:
      - id: art-25
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          BCB 44 art-29 covers compliance with blocking orders from COAF,
          judiciary, or other authorities, and maintaining blocked funds
          in segregated accounts. BCB 3978 art-25 addresses COAF reporting
          broadly; blocking orders are an operational consequence of the
          reporting framework.
      - id: art-28
        relationship: complements
        confidence: 0.80
        rationale: >
          BCB 3978 art-28 requires reporting within 24 hours when terrorism
          financing indicators are identified. BCB 44 art-29 addresses
          immediate compliance with blocking orders, which often arise
          from terrorism-related reports.

  # ── Cap 7: Disposicoes Finais ───────────────────────────────────────────

  - source_control: art-30
    target_controls:
      - id: art-36
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Both require PLD/FT training and capacity-building programs for
          employees and service providers, with initial training for new
          hires, periodic refreshers proportional to role risk, and
          content covering institutional procedures and typologies.

  - source_control: art-31
    target_controls:
      - id: art-37
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Both require retention of all PLD/FT documents, records, and
          information for a minimum of ten years, including client
          identification data, operation records, analysis results,
          COAF reports, and risk assessment documents.

  - source_control: art-32
    target_controls:
      - id: art-38
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          BCB 44 art-32 lists administrative penalties for non-compliance
          (warning, fine, disqualification, authorization cancellation).
          BCB 3978 art-38 covers transitional provisions and effective
          dates. Both address the regulatory enforcement framework, though
          from different angles — penalties vs. transition timeline.
          The penalty framework derives from the same Law 9.613/1998.

  - source_control: art-33
    target_controls:
      - id: art-9
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          BCB 44 art-33 requires continuous effectiveness assessment
          of the PLD/FT program with quantitative and qualitative
          indicators, and continuous improvement. BCB 3978 art-9
          requires periodic review of the internal risk assessment,
          including methodology, risk profiles, and applied controls.
      - id: art-38
        relationship: complements
        confidence: 0.70
        rationale: >
          BCB 44 art-33 includes transitional provisions alongside
          effectiveness assessment requirements. BCB 3978 art-38
          addresses the transition timeline for compliance with the
          regulation's provisions.

metadata:
  total_mappings: 33
  average_confidence: 0.87
  relationship_summary:
    equivalent-to: 22
    intersects-with: 11
    derived-from: 2
    complements: 6
    subset-of: 1
  notes: >
    Resolucao BCB 44/2020 and Circular BCB 3.978/2020 are PLD/FT regulations for
    distinct segments (payment institutions vs. financial system) issued by the same
    authority (Banco Central do Brasil) and based on Law 9.613/1998 and FATF/GAFI
    recommendations. BCB 44 was derived from BCB 3978 to extend PLD/FT obligations
    to the payments sector. The structure is nearly identical: policy, internal risk
    assessment, KYC, record-keeping, monitoring, COAF reporting, training, and
    document retention. Key differences: (1) BCB 44 includes PIX-specific controls
    absent from BCB 3978; (2) BCB 44 sets lower cash-operation thresholds for
    payment institutions (R$ 2,000 vs R$ 50,000); (3) BCB 44 has stricter COAF
    reporting deadlines (1-3 business days vs 24 business days); (4) BCB 44
    explicitly addresses sanctions screening as a standalone control.
