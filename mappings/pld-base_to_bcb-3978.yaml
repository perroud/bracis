id: pld-base_to_bcb-3978
title: "PLD-Base (Lei 9.613/1998) to BCB 3.978 Control Mapping"
source_framework: pld-base
target_framework: bcb-3978
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic
description: >
  Mapping between Lei 9.613/1998 (PLD-Base — Brazil's foundational Anti-Money Laundering law)
  and Circular BCB 3.978/2020 (the BCB regulation implementing AML/CFT obligations for
  financial institutions). PLD-Base is the parent statute that creates the legal obligations;
  BCB 3.978 is the subordinate regulation that operationalizes those obligations for BCB-authorized
  institutions. Every BCB 3.978 article derives its legal authority from one or more PLD-Base
  provisions.

mappings:
  # ============================================================
  # pld-1: Crime of Money Laundering — Typification and Penalties
  # Art. 1 of Lei 9.613 — defines the crime itself
  # ============================================================
  - source_control: pld-1
    target_controls:
      - id: art-1
        relationship: superset-of
        confidence: 0.90
        rationale: >
          PLD-1 (Art. 1 of Lei 9.613) defines the crime of money laundering in all its forms.
          BCB 3.978 art-1 establishes the regulatory framework to prevent the utilization of
          the financial system for that crime. PLD-1 is the broader penal provision; art-1 is
          the regulatory operationalization for BCB-supervised entities.
      - id: art-21
        relationship: superset-of
        confidence: 0.85
        rationale: >
          The transaction monitoring obligation (art-21) directly serves to detect the conduct
          described in PLD-1 — concealment, disguise, conversion, and use of illicit proceeds.
          Monitoring scenarios are designed around the crime typology defined in Art. 1.
      - id: art-22
        relationship: superset-of
        confidence: 0.85
        rationale: >
          Monitoring scenarios (art-22) are built from the typologies of money laundering
          described in PLD-1, including structuring, conversion to licit assets, and use in
          economic activity.
      - id: art-23
        relationship: complements
        confidence: 0.80
        rationale: >
          The analysis of suspicious operations (art-23) aims to characterize or dismiss
          the suspicion of the crime defined in PLD-1. The analytical framework depends on
          understanding the legal elements of the crime.
      - id: art-24
        relationship: complements
        confidence: 0.80
        rationale: >
          Continuous monitoring (art-24) verifies compatibility of operations with client
          profiles — a key indicator for detecting the crime typified in PLD-1, especially
          the use of illicit proceeds in economic activity.

  # ============================================================
  # pld-2: Procedural Rules and Jurisdictional Competence
  # Art. 2 of Lei 9.613 — prosecution independence, jurisdiction
  # ============================================================
  - source_control: pld-2
    target_controls:
      - id: art-25
        relationship: superset-of
        confidence: 0.85
        rationale: >
          PLD-2 establishes that prosecution of money laundering is independent of the
          predicate offense (Art. 2, II). This principle underpins art-25's obligation to
          report suspicious operations to COAF regardless of identifying the predicate crime.
      - id: art-26
        relationship: complements
        confidence: 0.75
        rationale: >
          Automatic reporting of cash operations (art-26) serves the intelligence-gathering
          function that supports the independent prosecution framework established in PLD-2.
      - id: art-29
        relationship: implements
        confidence: 0.80
        rationale: >
          The confidentiality obligation of art-29 (tipping-off prohibition) protects the
          integrity of criminal proceedings governed by the procedural rules in PLD-2.

  # ============================================================
  # pld-3: Seizure, Forfeiture, and Early Disposal of Assets
  # Art. 4 of Lei 9.613 — judicial measures on assets
  # ============================================================
  - source_control: pld-3
    target_controls:
      - id: art-18
        relationship: complements
        confidence: 0.80
        rationale: >
          Transaction records maintained under art-18 provide the evidentiary basis for
          judicial seizure orders under PLD-3. Complete operation records are essential
          for identifying and tracing assets subject to forfeiture.
      - id: art-19
        relationship: complements
        confidence: 0.75
        rationale: >
          Cash operation records (art-19) are particularly relevant for asset seizure
          proceedings under PLD-3, as cash transactions are harder to trace and the
          detailed records including bearer identification support judicial measures.
      - id: art-20
        relationship: complements
        confidence: 0.80
        rationale: >
          The 10-year record availability requirement (art-20) ensures that evidence needed
          for asset seizure and forfeiture proceedings under PLD-3 remains accessible
          throughout the lengthy judicial process.

  # ============================================================
  # pld-4: International Cooperation and Asset Recovery
  # Art. 8 of Lei 9.613 — foreign seizure requests, reciprocity
  # ============================================================
  - source_control: pld-4
    target_controls:
      - id: art-32
        relationship: implements
        confidence: 0.85
        rationale: >
          International transfer procedures (art-32) directly implement the cross-border
          cooperation framework of PLD-4. Travel rule compliance, sanctions screening, and
          enhanced monitoring of international transfers enable the asset recovery
          mechanisms established by PLD-4.
      - id: art-34
        relationship: implements
        confidence: 0.85
        rationale: >
          Correspondent banking procedures (art-34) operationalize the international
          cooperation framework of PLD-4. Due diligence on foreign correspondents,
          shell bank prohibition, and cross-border monitoring support the enforcement
          of foreign seizure requests.
      - id: art-31
        relationship: complements
        confidence: 0.70
        rationale: >
          Domestic correspondent procedures (art-31) complement PLD-4 by ensuring that
          AML controls extend to agents that may process cross-border transactions on
          behalf of the institution.
      - id: art-33
        relationship: complements
        confidence: 0.70
        rationale: >
          New technology risk assessment (art-33) supports PLD-4's international
          cooperation objectives by ensuring that emerging technologies (crypto, instant
          payments) used in cross-border transfers have adequate AML controls.

  # ============================================================
  # pld-5: Effects of Criminal Conviction — Asset Forfeiture
  # Art. 7 of Lei 9.613 — forfeiture, interdiction, virtual assets
  # ============================================================
  - source_control: pld-5
    target_controls:
      - id: art-17
        relationship: complements
        confidence: 0.80
        rationale: >
          The obligation to refuse or terminate business relationships (art-17) when
          identification is impossible or information is false complements PLD-5's
          professional interdiction regime by preventing convicted persons from accessing
          financial services through false identities.
      - id: art-14
        relationship: complements
        confidence: 0.75
        rationale: >
          PEP enhanced due diligence (art-14) complements PLD-5 because convicted public
          officials face professional interdiction (Art. 7, II). PEP screening helps identify
          individuals who may be subject to interdiction orders.
      - id: art-35
        relationship: complements
        confidence: 0.70
        rationale: >
          The designated AML director (art-35) bears responsibility for ensuring the
          institution complies with forfeiture and interdiction requirements flowing from
          PLD-5 convictions.

  # ============================================================
  # pld-6: Obligated Persons — Financial Sector
  # Art. 9, caput + par. unico I-IX — financial entities
  # ============================================================
  - source_control: pld-6
    target_controls:
      - id: art-1
        relationship: superset-of
        confidence: 0.90
        rationale: >
          PLD-6 defines all financial sector entities subject to AML obligations (Art. 9).
          BCB 3.978 art-1 narrows the scope to institutions authorized by BCB, which are
          a subset of the entities listed in PLD-6. PLD-6 is the broader legal mandate.
      - id: art-2
        relationship: complements
        confidence: 0.80
        rationale: >
          The definitions in art-2 (client, beneficial owner, PEP) operationalize the
          obligated person framework established by PLD-6, defining who must be identified
          and monitored within the BCB-regulated subset.

  # ============================================================
  # pld-7: Obligated Persons — Non-Financial DNFBPs
  # Art. 9, par. unico X-XIX — real estate, luxury goods, VASPs
  # ============================================================
  - source_control: pld-7
    target_controls:
      - id: art-1
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          PLD-7 covers non-financial DNFBPs (real estate, luxury goods, VASPs, etc.)
          that are generally outside BCB supervision. However, when VASPs (inciso XIX)
          or payment institutions handle financial flows under BCB authorization, the
          scopes intersect. Art-1 covers BCB-authorized entities only.
      - id: art-27
        relationship: complements
        confidence: 0.80
        rationale: >
          Virtual asset reporting obligations (art-27) complement PLD-7's inclusion of
          VASPs (inciso XIX) as obligated persons. Art-27 operationalizes the COAF
          communication obligation for crypto-related operations within BCB-supervised
          institutions.
      - id: art-33
        relationship: complements
        confidence: 0.70
        rationale: >
          New technology assessment (art-33) complements PLD-7 by ensuring that emerging
          categories of obligated persons (VASPs, electronic payment providers) are
          properly risk-assessed when their technologies are adopted by BCB-regulated
          institutions.

  # ============================================================
  # pld-8: Client Identification and KYC Obligations
  # Art. 10, I + par. 1 — identify clients, beneficial owners
  # ============================================================
  - source_control: pld-8
    target_controls:
      - id: art-10
        relationship: implements
        confidence: 0.95
        rationale: >
          Art-10 directly implements PLD-8's KYC mandate (Art. 10, I) by establishing
          detailed procedures to identify, qualify, and classify clients within the
          BCB-supervised context.
      - id: art-11
        relationship: implements
        confidence: 0.95
        rationale: >
          Art-11 implements PLD-8 by specifying the minimum identification data required
          for natural persons (name, CPF, address, income, etc.), operationalizing the
          general KYC obligation of Art. 10, I.
      - id: art-12
        relationship: implements
        confidence: 0.95
        rationale: >
          Art-12 implements PLD-8 by specifying the minimum identification data for legal
          entities (CNPJ, shareholders, beneficial owners, revenue), operationalizing the
          general KYC obligation including the par. 1 requirement to identify owners.
      - id: art-13
        relationship: implements
        confidence: 0.95
        rationale: >
          Art-13 directly implements PLD-8's par. 1 requirement to identify beneficial
          owners of legal entity clients, establishing the 25% threshold and control
          criteria for UBO identification.
      - id: art-15
        relationship: implements
        confidence: 0.90
        rationale: >
          Art-15 implements the "maintain updated records" part of PLD-8 (Art. 10, I:
          "manterao cadastro atualizado") by establishing ongoing KYC update obligations
          proportional to client risk.

  # ============================================================
  # pld-9: Transaction Recording and Data Retention
  # Art. 10, II + par. 2-3 — record transactions, retain 5 years
  # ============================================================
  - source_control: pld-9
    target_controls:
      - id: art-18
        relationship: implements
        confidence: 0.95
        rationale: >
          Art-18 directly implements PLD-9's transaction recording obligation (Art. 10, II)
          by specifying that all operations must be recorded with minimum data fields.
          BCB 3.978 extends the retention period from PLD-9's 5 years to 10 years.
      - id: art-19
        relationship: implements
        confidence: 0.95
        rationale: >
          Art-19 implements PLD-9 by establishing specific recording requirements for
          cash operations >= R$ 50,000, including bearer identification — a detailed
          operationalization of the threshold-based recording in Art. 10, II.
      - id: art-20
        relationship: implements
        confidence: 0.90
        rationale: >
          Art-20 implements and extends PLD-9's par. 2 (5-year minimum retention) by
          requiring 10-year availability of records to BCB and COAF with tempestive
          and legible recovery capability.

  # ============================================================
  # pld-10: Internal Policies, Controls, and Regulatory Registration
  # Art. 10, III-V — policies, COAF registration, requisitions
  # ============================================================
  - source_control: pld-10
    target_controls:
      - id: art-3
        relationship: implements
        confidence: 0.95
        rationale: >
          Art-3 directly implements PLD-10's inciso III requirement to adopt internal
          policies, procedures, and controls compatible with organizational size and
          transaction volume. Art-3 establishes the risk-based policy obligation.
      - id: art-4
        relationship: implements
        confidence: 0.95
        rationale: >
          Art-4 implements PLD-10 by specifying the minimum content required in the AML
          policy (roles, KYC procedures, monitoring, COAF communication, risk assessment,
          compliance verification, hiring criteria).
      - id: art-5
        relationship: implements
        confidence: 0.90
        rationale: >
          Art-5 implements PLD-10 by establishing formal requirements for policy approval
          (board/directorate), documentation, and public disclosure — operationalizing the
          "adopted policies" requirement of inciso III.
      - id: art-6
        relationship: implements
        confidence: 0.90
        rationale: >
          Art-6 (internal risk assessment) implements the proportionality principle in
          PLD-10's inciso III ("compatible with size and volume"), establishing the
          methodology for calibrating controls to institutional risk.
      - id: art-35
        relationship: implements
        confidence: 0.90
        rationale: >
          Art-35 (designated AML director) implements PLD-10's inciso IV registration
          obligation and inciso V COAF response obligation by establishing the responsible
          officer who interfaces with BCB and COAF.
      - id: art-36
        relationship: complements
        confidence: 0.80
        rationale: >
          Art-36 (annual training) complements PLD-10's inciso III by ensuring that the
          internal policies and controls are effectively disseminated to all collaborators
          through structured training programs.

  # ============================================================
  # pld-11: Suspicious Transaction Monitoring and Reporting to COAF
  # Art. 11 — enhanced attention, STR obligation, negative reporting
  # ============================================================
  - source_control: pld-11
    target_controls:
      - id: art-21
        relationship: implements
        confidence: 0.95
        rationale: >
          Art-21 directly implements PLD-11's inciso I ("special attention to suspicious
          operations") by establishing the detailed monitoring, selection, and analysis
          procedures for suspicious operations.
      - id: art-22
        relationship: implements
        confidence: 0.95
        rationale: >
          Art-22 implements PLD-11's inciso I by defining the minimum monitoring scenarios
          (COAF typologies, suspicious indicators, PEP operations, unidentified UBO),
          operationalizing the "instructions from competent authorities."
      - id: art-23
        relationship: implements
        confidence: 0.95
        rationale: >
          Art-23 implements the analytical component of PLD-11 by establishing the
          procedure for analyzing selected operations to characterize or dismiss suspicion
          and document the decision for COAF communication.
      - id: art-24
        relationship: implements
        confidence: 0.90
        rationale: >
          Art-24 implements PLD-11's inciso I by establishing continuous monitoring with
          specific verification requirements (profile compatibility, financial capacity,
          AML indicators) proportional to client risk.
      - id: art-25
        relationship: implements
        confidence: 0.95
        rationale: >
          Art-25 directly implements PLD-11's inciso II (24-hour COAF communication
          obligation) by establishing the suspicious operation reporting procedure with
          the 24-business-day deadline, minimum content, and tipping-off prohibition.
      - id: art-26
        relationship: implements
        confidence: 0.95
        rationale: >
          Art-26 implements PLD-11's inciso II, subitem (a) — automatic communication of
          above-threshold cash operations (R$ 50,000) — operationalizing the mandatory
          reporting of transactions exceeding the competent authority's threshold.
      - id: art-27
        relationship: implements
        confidence: 0.90
        rationale: >
          Art-27 implements PLD-11 for virtual asset operations, extending the COAF
          communication obligation to crypto-related suspicious activities, reflecting
          the 2022 amendment that added virtual assets to the recording obligation.
      - id: art-28
        relationship: implements
        confidence: 0.90
        rationale: >
          Art-28 implements PLD-11 for terrorism financing situations with the urgent
          24-hour deadline, a stricter operationalization of the suspicious reporting
          obligation for the highest-severity category.
      - id: art-29
        relationship: implements
        confidence: 0.95
        rationale: >
          Art-29 directly implements PLD-11's inciso II tipping-off prohibition
          ("abstendo-se de dar ciencia de tal ato a qualquer pessoa"), establishing
          the confidentiality regime for COAF communications.
      - id: art-30
        relationship: implements
        confidence: 0.85
        rationale: >
          Art-30 operationalizes the post-reporting assessment, clarifying that COAF
          communication does not mandate relationship termination — a nuance of the
          Art. 11 reporting framework that prevents defensive terminations.

  # ============================================================
  # pld-12: Prior Communication of International Transfers
  # Art. 11-A — prior notification for international transfers and cash
  # ============================================================
  - source_control: pld-12
    target_controls:
      - id: art-32
        relationship: implements
        confidence: 0.90
        rationale: >
          Art-32 implements PLD-12's prior notification requirement for international
          transfers by establishing specific procedures including identification of
          originator and beneficiary, enhanced measures for incomplete data, and
          sanctions screening.
      - id: art-19
        relationship: implements
        confidence: 0.80
        rationale: >
          Art-19 implements PLD-12's cash withdrawal notification aspect by establishing
          specific recording requirements for cash operations >= R$ 50,000, including
          bearer identification.
      - id: art-18
        relationship: complements
        confidence: 0.75
        rationale: >
          General operation recording (art-18) complements PLD-12 by ensuring that all
          international transfers and cash operations are recorded with complete data,
          supporting the prior notification assessment.

  # ============================================================
  # pld-13: Administrative Penalties for Non-Compliance
  # Art. 12 — warnings, fines, disqualification, license revocation
  # ============================================================
  - source_control: pld-13
    target_controls:
      - id: art-37
        relationship: implements
        confidence: 0.85
        rationale: >
          Art-37 (10-year document retention) implements the evidentiary framework needed
          for PLD-13's administrative penalty proceedings. Complete records are the
          institution's primary defense against penalties.
      - id: art-38
        relationship: complements
        confidence: 0.80
        rationale: >
          Art-38 (transitional provisions and effective date) establishes the compliance
          timeline against which PLD-13's penalties are assessed. Non-compliance after
          the October 2020 deadline triggers the penalty framework.
      - id: art-35
        relationship: complements
        confidence: 0.80
        rationale: >
          The designated AML director (art-35) is the primary individual accountable
          under PLD-13's penalty regime, particularly for professional disqualification
          (inciso III) and institutional sanctions.

  # ============================================================
  # pld-14: COAF — Creation, Competencies, and Powers
  # Arts. 14-15 — COAF as FIU, regulatory and intelligence role
  # ============================================================
  - source_control: pld-14
    target_controls:
      - id: art-25
        relationship: implements
        confidence: 0.90
        rationale: >
          Art-25 implements the suspicious operation communication channel to COAF
          established by PLD-14 (Art. 14's creation of COAF as the receiver of
          suspicious activity reports).
      - id: art-26
        relationship: implements
        confidence: 0.90
        rationale: >
          Art-26 implements the automatic cash operation communication to COAF,
          operationalizing COAF's intelligence function (Art. 14) by providing
          systematic data on high-value cash transactions.
      - id: art-29
        relationship: implements
        confidence: 0.85
        rationale: >
          Art-29 implements the confidentiality regime that protects COAF's intelligence
          function (Art. 14, par. 2 — cooperation mechanisms), ensuring that
          communications remain confidential to preserve investigative effectiveness.

  # ============================================================
  # pld-15: PEP Registry and General Provisions
  # Arts. 12-A, 17-A/B/D/E — CNPEP, data access, retention
  # ============================================================
  - source_control: pld-15
    target_controls:
      - id: art-14
        relationship: implements
        confidence: 0.90
        rationale: >
          Art-14 (PEP enhanced due diligence) directly implements PLD-15's CNPEP
          consultation mandate (Art. 12-A, par. 2), establishing the enhanced
          qualification and monitoring procedures for PEPs and their associates.
      - id: art-16
        relationship: implements
        confidence: 0.85
        rationale: >
          Art-16 (enhanced due diligence for high-risk clients) implements the broader
          risk-proportionate approach that follows from PEP identification under PLD-15,
          extending enhanced procedures to all high-risk categories beyond PEPs.
      - id: art-15
        relationship: complements
        confidence: 0.80
        rationale: >
          Art-15 (KYC update obligation) complements PLD-15 by ensuring that PEP status
          is periodically refreshed as required by the CNPEP consultation mandate,
          maintaining updated records as PEP status changes over the 5-year window.
      - id: art-37
        relationship: complements
        confidence: 0.80
        rationale: >
          Art-37 (10-year retention) complements PLD-15's Art. 17-E (5-year tax data
          retention) by establishing a longer retention period for all AML documentation,
          ensuring data availability for the full scope of regulatory needs.
      - id: art-7
        relationship: complements
        confidence: 0.75
        rationale: >
          Risk categories (art-7) complement PLD-15 by providing the classification
          framework within which PEP status affects the client's risk category
          assignment, driving proportionate controls.
      - id: art-8
        relationship: complements
        confidence: 0.75
        rationale: >
          Client risk profile factors (art-8) complement PLD-15 by incorporating PEP
          status as one of the dimensions in the risk assessment methodology,
          alongside geographic, financial, and transactional factors.
