id: nist-800-37_to_nist-800-53
title: "NIST SP 800-37 Rev 2 to NIST SP 800-53 Rev 5 Control Mapping"
source_framework: nist-800-37
target_framework: nist-800-53-rev5
version: "1.0.0"
last_updated: "2026-04-05"
methodology: semantic
description: >
  Control-to-control mapping between NIST SP 800-37 Rev 2 (Risk Management Framework
  for Information Systems and Organizations) and NIST SP 800-53 Rev 5 (Security and
  Privacy Controls for Information Systems and Organizations). NIST 800-37 defines the
  RMF lifecycle steps (Prepare, Categorize, Select, Implement, Assess, Authorize,
  Monitor), while NIST 800-53 defines the specific security and privacy controls that
  are selected, implemented, assessed, and monitored throughout that lifecycle.

mappings:
  # ═══════════════════════════════════════════════════════════════════════════
  # RMF PREPARE — Organization-Level
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: rmf-p-01
    target_controls:
      - id: pm-1
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          RMF Prepare organization-level tasks directly drive PM-1 (Information Security
          Program Plan) by establishing the risk management strategy, defining roles, and
          coordinating organizational security efforts that PM-1 requires to be documented
          in a program plan.
      - id: pm-9
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          RMF-P-01 requires establishing a risk management strategy and organizational
          risk tolerance. PM-9 (Risk Management Strategy) mandates the same — developing
          and disseminating a risk management strategy that includes risk framing, assessment,
          response, and monitoring approaches.
      - id: ra-1
        relationship: derived-from
        confidence: 0.82
        rationale: >
          Organization-level preparation includes conducting organization-wide risk
          assessments and establishing risk management roles. RA-1 (Policy and Procedures
          for Risk Assessment) provides the policy foundation that RMF-P-01 preparation
          tasks require to be in place.
      - id: ac-1
        relationship: complements
        confidence: 0.72
        rationale: >
          RMF-P-01 establishes organizational risk management roles and assigns
          key responsibilities. AC-1 (Access Control Policy and Procedures) addresses
          policy development including roles and responsibilities for access control,
          which is informed by the organizational preparation context.
      - id: cm-2
        relationship: complements
        confidence: 0.70
        rationale: >
          Organization-level preparation identifies common controls and establishes
          enterprise architecture context. CM-2 (Baseline Configuration) defines the
          baseline configurations that serve as the foundation for consistent security
          implementation across systems identified during preparation.

  # ═══════════════════════════════════════════════════════════════════════════
  # RMF PREPARE — System-Level
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: rmf-p-02
    target_controls:
      - id: pl-2
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          RMF-P-02 system-level preparation produces the system description, identifies
          stakeholders, defines the authorization boundary, and registers the system.
          PL-2 (System Security and Privacy Plans) requires documenting these exact
          elements as the foundation of the system security plan.
      - id: ra-3
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          System-level preparation includes conducting an initial system risk assessment
          to inform subsequent categorization and control selection. RA-3 (Risk Assessment)
          requires organizations to assess security and privacy risks, which is precisely
          what RMF-P-02 mandates at the system level.
      - id: sc-7
        relationship: complements
        confidence: 0.72
        rationale: >
          RMF-P-02 requires defining the authorization boundary and determining system
          placement within the enterprise architecture. SC-7 (Boundary Protection)
          implements the technical boundary controls that enforce the authorization
          boundary defined during system-level preparation.
      - id: ia-2
        relationship: complements
        confidence: 0.70
        rationale: >
          System-level preparation identifies stakeholders and their roles. IA-2
          (Identification and Authentication) implements the identification and
          authentication mechanisms for the organizational users and processes
          identified during system-level preparation.

  # ═══════════════════════════════════════════════════════════════════════════
  # RMF PREPARE — Common Control Identification
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: rmf-p-03
    target_controls:
      - id: sa-8
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          RMF-P-03 requires identifying and publishing common controls for inheritance.
          SA-8 (Security and Privacy Engineering Principles) guides the design of security
          capabilities that can be shared as common controls across systems, directly
          supporting the common control provision model.
      - id: ac-1
        relationship: derived-from
        confidence: 0.78
        rationale: >
          Common controls often include access control policies and procedures. AC-1
          (Access Control Policy and Procedures) is a frequently identified common control
          provided at the organizational level, which system owners inherit through the
          mechanism RMF-P-03 establishes.
      - id: cm-6
        relationship: complements
        confidence: 0.75
        rationale: >
          Common controls include configuration management standards applied
          organization-wide. CM-6 (Configuration Settings) establishes the secure
          configuration baselines that are often published as common controls for
          inheritance by individual systems.
      - id: au-2
        relationship: complements
        confidence: 0.73
        rationale: >
          Centralized logging and audit event definitions are typical common controls
          provided by platform teams. AU-2 (Event Logging) defines the event types to
          be logged, which is frequently implemented as a common control inherited by
          multiple systems through the mechanism RMF-P-03 describes.

  # ═══════════════════════════════════════════════════════════════════════════
  # RMF CATEGORIZE — System and Information Type Categorization
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: rmf-c-01
    target_controls:
      - id: ra-2
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          RMF-C-01 categorizes the system using FIPS 199 and NIST SP 800-60. RA-2
          (Security Categorization) is the direct NIST 800-53 control that mandates
          categorizing information and systems using the same FIPS 199 methodology.
          These two requirements are semantically identical.
      - id: pl-2
        relationship: derived-from
        confidence: 0.80
        rationale: >
          The security categorization produced by RMF-C-01 is documented in the system
          security plan. PL-2 (System Security and Privacy Plans) requires the SSP to
          include the system's security categorization as a foundational element.
      - id: ac-3
        relationship: complements
        confidence: 0.70
        rationale: >
          The impact levels determined by categorization drive the rigor of access
          enforcement. AC-3 (Access Enforcement) implementation intensity is calibrated
          based on the FIPS 199 categorization results — high-impact systems require
          more stringent access controls.

  # ═══════════════════════════════════════════════════════════════════════════
  # RMF CATEGORIZE — Review and Approval
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: rmf-c-02
    target_controls:
      - id: ra-2
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          RMF-C-02 requires the authorizing official to review and approve the
          categorization results. RA-2 (Security Categorization) implicitly requires
          approval of categorization decisions, and RMF-C-02 formalizes the review
          and approval governance process for that categorization.
      - id: ca-6
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          Categorization review by the authorizing official is a precursor to the
          authorization decision. CA-6 (Authorization) requires the AO to authorize
          systems, and the categorization approval in RMF-C-02 is the first formal
          AO decision in the RMF lifecycle.
      - id: pl-2
        relationship: derived-from
        confidence: 0.78
        rationale: >
          The approved categorization is recorded in the system security plan. PL-2
          (System Security and Privacy Plans) requires the SSP to reflect the AO-approved
          categorization, linking RMF-C-02's approval outcome to SSP documentation.

  # ═══════════════════════════════════════════════════════════════════════════
  # RMF SELECT — Control Selection Based on Categorization
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: rmf-s-01
    target_controls:
      - id: pl-2
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          RMF-S-01 selects the control baseline based on categorization and documents
          it in the SSP. PL-2 (System Security and Privacy Plans) requires the SSP to
          document all selected controls, making it the primary vehicle for recording
          control selection decisions.
      - id: pl-10
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          RMF-S-01 applies the appropriate baseline from NIST SP 800-53B. PL-10
          (Baseline Selection) directly requires selecting the applicable control
          baseline corresponding to the system's categorization, which is the core
          action of RMF-S-01.
      - id: ca-1
        relationship: derived-from
        confidence: 0.80
        rationale: >
          Control selection establishes the security assessment and authorization scope.
          CA-1 (Policy and Procedures for Assessment, Authorization, and Monitoring)
          provides the policy framework within which control selection and subsequent
          assessment activities are conducted.
      - id: ac-2
        relationship: complements
        confidence: 0.72
        rationale: >
          AC-2 (Account Management) is a baseline control selected at all impact levels
          (low, moderate, high). The control selection process in RMF-S-01 determines
          which account management requirements apply based on the system's categorization.
      - id: ia-2
        relationship: complements
        confidence: 0.72
        rationale: >
          IA-2 (Identification and Authentication) is a baseline control selected at
          all impact levels. RMF-S-01 determines the applicable baseline, which in turn
          specifies which IA-2 enhancements apply to the system.

  # ═══════════════════════════════════════════════════════════════════════════
  # RMF SELECT — Control Tailoring
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: rmf-s-02
    target_controls:
      - id: pl-2
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          RMF-S-02 tailoring activities — scoping, compensating controls, parameter
          assignment — are documented in the SSP. PL-2 (System Security and Privacy Plans)
          requires the SSP to reflect all tailoring decisions and their rationale.
      - id: pl-10
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          PL-10 (Baseline Selection) includes provisions for tailoring the selected
          baseline. RMF-S-02 defines the specific tailoring activities (scoping,
          compensating controls, parameter assignment, supplementation) that PL-10
          governs.
      - id: pm-9
        relationship: derived-from
        confidence: 0.80
        rationale: >
          Tailoring decisions must align with the organizational risk management strategy.
          PM-9 (Risk Management Strategy) provides the risk tolerance framework that
          constrains tailoring decisions, ensuring they do not reduce security below
          acceptable organizational thresholds.
      - id: cm-6
        relationship: complements
        confidence: 0.75
        rationale: >
          Tailoring includes assigning specific values to organization-defined parameters
          (e.g., password length, timeout values). CM-6 (Configuration Settings) implements
          the configuration parameters that RMF-S-02 tailoring assigns, bridging the
          gap between policy and technical implementation.
      - id: ac-6
        relationship: complements
        confidence: 0.70
        rationale: >
          Tailoring determines the rigor of control implementation for a specific system.
          AC-6 (Least Privilege) implementation specifics — which enhancements apply,
          what parameter values to use — are determined through the tailoring process
          defined in RMF-S-02.

  # ═══════════════════════════════════════════════════════════════════════════
  # RMF SELECT — Control Allocation and SSP Documentation
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: rmf-s-03
    target_controls:
      - id: pl-2
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          RMF-S-03 directly produces the system security plan by allocating controls
          and documenting their implementation approach. PL-2 (System Security and
          Privacy Plans) is the NIST 800-53 control that mandates the development,
          maintenance, and approval of this exact artifact.
      - id: ca-6
        relationship: derived-from
        confidence: 0.80
        rationale: >
          The SSP produced by RMF-S-03 is a key component of the authorization package.
          CA-6 (Authorization) requires the authorizing official to review the SSP as
          part of the authorization decision, making SSP completeness critical to
          authorization.
      - id: pl-7
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          RMF-S-03 includes documenting privacy control implementations in the SSP.
          PL-7 (Privacy Impact Assessment) addresses the privacy dimension of control
          allocation, ensuring privacy requirements are captured alongside security
          requirements.

  # ═══════════════════════════════════════════════════════════════════════════
  # RMF IMPLEMENT — Control Implementation
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: rmf-i-01
    target_controls:
      - id: ca-5
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          RMF-I-01 implements controls as specified in the SSP. Controls not yet fully
          implemented are tracked through a plan of action and milestones (POA&M). CA-5
          (Plan of Action and Milestones) requires maintaining the POA&M to track
          implementation gaps identified during RMF-I-01.
      - id: pl-2
        relationship: derived-from
        confidence: 0.83
        rationale: >
          Control implementation must follow the SSP. PL-2 (System Security and Privacy
          Plans) provides the implementation specifications that RMF-I-01 translates into
          operational controls, ensuring consistency between plan and reality.
      - id: sa-3
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          RMF-I-01 requires implementation consistent with enterprise and security
          architectures. SA-3 (System Development Life Cycle) integrates security into
          the SDLC, ensuring that control implementation is part of the development and
          deployment process.
      - id: cm-2
        relationship: complements
        confidence: 0.78
        rationale: >
          Control implementation produces the actual system configuration. CM-2 (Baseline
          Configuration) documents the resulting baseline after controls are implemented,
          capturing the known-good state that results from RMF-I-01 activities.
      - id: ac-3
        relationship: complements
        confidence: 0.75
        rationale: >
          AC-3 (Access Enforcement) is a technical control implemented during the
          RMF Implement step. RMF-I-01 translates the access control requirements from
          the SSP into operational access enforcement mechanisms.
      - id: sc-7
        relationship: complements
        confidence: 0.75
        rationale: >
          SC-7 (Boundary Protection) is a technical control implemented during the
          RMF Implement step. RMF-I-01 activates the network segmentation, firewall
          rules, and boundary protection mechanisms specified in the SSP.
      - id: sr-3
        relationship: complements
        confidence: 0.72
        rationale: >
          SR-3 (Supply Chain Controls and Processes) is implemented during the RMF
          Implement step, particularly for software supply chain security measures
          embedded in the development and deployment pipeline.

  # ═══════════════════════════════════════════════════════════════════════════
  # RMF IMPLEMENT — Update SSP with Implementation Details
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: rmf-i-02
    target_controls:
      - id: pl-2
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          RMF-I-02 updates the SSP to reflect actual control implementations. PL-2
          (System Security and Privacy Plans) mandates maintaining the SSP with current
          implementation details, which is precisely what RMF-I-02 produces. The SSP
          update after implementation is the core requirement of both.
      - id: ca-5
        relationship: derived-from
        confidence: 0.80
        rationale: >
          Updating the SSP reveals implementation gaps that feed the POA&M. CA-5
          (Plan of Action and Milestones) tracks controls where actual implementation
          differs from the planned implementation documented during RMF-I-02 SSP updates.
      - id: cm-2
        relationship: complements
        confidence: 0.75
        rationale: >
          SSP updates capture the actual configuration state. CM-2 (Baseline Configuration)
          reflects the same configuration reality that RMF-I-02 documents in the SSP,
          ensuring the baseline and the SSP remain synchronized.

  # ═══════════════════════════════════════════════════════════════════════════
  # RMF ASSESS — Assessment Plan Development
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: rmf-a-01
    target_controls:
      - id: ca-2
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          RMF-A-01 develops the security and privacy assessment plan. CA-2 (Control
          Assessments) directly requires developing an assessment plan that defines
          scope, procedures, schedule, and team. These requirements are semantically
          identical between the RMF step and the 800-53 control.
      - id: ca-5
        relationship: derived-from
        confidence: 0.78
        rationale: >
          The assessment plan identifies controls to be assessed and anticipates
          findings that will populate the POA&M. CA-5 (Plan of Action and Milestones)
          receives its inputs from the assessment activities planned in RMF-A-01.
      - id: au-6
        relationship: complements
        confidence: 0.72
        rationale: >
          Assessment plans include reviewing audit records as an assessment method.
          AU-6 (Audit Record Review, Analysis, and Reporting) provides the audit
          analysis capabilities that assessors leverage during the assessment procedures
          planned in RMF-A-01.

  # ═══════════════════════════════════════════════════════════════════════════
  # RMF ASSESS — Control Assessment Execution
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: rmf-a-02
    target_controls:
      - id: ca-2
        relationship: equivalent-to
        confidence: 0.93
        rationale: >
          RMF-A-02 executes the assessment plan using examine, interview, and test
          methods. CA-2 (Control Assessments) requires conducting assessments using
          these same methods and producing an assessment report. The assessment
          execution in RMF-A-02 directly fulfills CA-2 requirements.
      - id: ca-7
        relationship: intersects-with
        confidence: 0.83
        rationale: >
          Assessment execution contributes to continuous monitoring. CA-7 (Continuous
          Monitoring) requires ongoing assessment of control subsets, and the assessment
          methodology established in RMF-A-02 defines how those ongoing assessments are
          conducted.
      - id: si-4
        relationship: complements
        confidence: 0.75
        rationale: >
          Automated assessment procedures leverage system monitoring capabilities.
          SI-4 (System Monitoring) provides the detection and analysis data that
          assessors use as evidence during the control assessment execution defined
          in RMF-A-02.
      - id: au-6
        relationship: complements
        confidence: 0.73
        rationale: >
          Assessment execution includes examining audit records as evidence. AU-6
          (Audit Record Review, Analysis, and Reporting) generates the analysis and
          findings that serve as assessment evidence during RMF-A-02 execution.

  # ═══════════════════════════════════════════════════════════════════════════
  # RMF ASSESS — Remediation and Reassessment
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: rmf-a-03
    target_controls:
      - id: ca-5
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          RMF-A-03 tracks deficiencies in the POA&M and manages remediation. CA-5
          (Plan of Action and Milestones) is the direct 800-53 control requiring
          organizations to develop and maintain a POA&M for identified weaknesses,
          which is the primary output of RMF-A-03 remediation tracking.
      - id: ca-2
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Reassessment of remediated controls is part of the assessment process. CA-2
          (Control Assessments) covers both initial assessment and follow-up reassessment
          to verify that remediation actions effectively address deficiencies identified
          during RMF-A-03.
      - id: pm-4
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          RMF-A-03 manages POA&M items across the system lifecycle. PM-4 (Plan of Action
          and Milestones Process) establishes the organization-wide process for developing,
          tracking, and reporting POA&M items, providing the governance framework for
          RMF-A-03 remediation tracking.
      - id: ir-4
        relationship: complements
        confidence: 0.72
        rationale: >
          Some assessment findings may reveal vulnerabilities that require incident-level
          response. IR-4 (Incident Handling) provides the containment and eradication
          capabilities that supplement remediation activities when assessment findings
          from RMF-A-03 indicate active exploitation or critical exposure.

  # ═══════════════════════════════════════════════════════════════════════════
  # RMF AUTHORIZE — Authorization Package Assembly
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: rmf-au-01
    target_controls:
      - id: ca-6
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          RMF-AU-01 assembles the authorization package (SSP, SAR, POA&M) and submits
          it to the authorizing official. CA-6 (Authorization) requires the authorizing
          official to review and authorize the system based on exactly these artifacts.
          The package assembly in RMF-AU-01 directly produces the inputs CA-6 requires.
      - id: ca-2
        relationship: derived-from
        confidence: 0.82
        rationale: >
          The security assessment report included in the authorization package is produced
          by CA-2 (Control Assessments). RMF-AU-01 packages this assessment report as a
          key component of the authorization decision support materials.
      - id: ca-5
        relationship: derived-from
        confidence: 0.82
        rationale: >
          The POA&M is a required component of the authorization package. CA-5 (Plan of
          Action and Milestones) produces the artifact that RMF-AU-01 includes in the
          package to inform the authorizing official about remaining deficiencies.
      - id: pl-2
        relationship: derived-from
        confidence: 0.80
        rationale: >
          The SSP is the primary component of the authorization package. PL-2 (System
          Security and Privacy Plans) produces the system security plan that RMF-AU-01
          packages for the authorizing official's review.

  # ═══════════════════════════════════════════════════════════════════════════
  # RMF AUTHORIZE — Risk Determination and Acceptance
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: rmf-au-02
    target_controls:
      - id: ca-6
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          RMF-AU-02 determines whether risk is acceptable. CA-6 (Authorization) requires
          the authorizing official to make this risk determination as part of the
          authorization decision, directly incorporating the risk analysis output of
          RMF-AU-02.
      - id: ra-3
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          Risk determination requires a comprehensive risk assessment. RA-3 (Risk
          Assessment) produces the risk analysis that feeds the risk determination
          in RMF-AU-02, evaluating likelihood and impact of threats exploiting
          remaining vulnerabilities.
      - id: pm-9
        relationship: derived-from
        confidence: 0.82
        rationale: >
          Risk determination is measured against organizational risk tolerance. PM-9
          (Risk Management Strategy) defines the risk tolerance thresholds that the
          authorizing official uses in RMF-AU-02 to determine whether residual risk
          is acceptable.
      - id: au-6
        relationship: complements
        confidence: 0.70
        rationale: >
          Risk determination considers operational evidence including audit findings.
          AU-6 (Audit Record Review, Analysis, and Reporting) provides analysis of
          system activity that informs the residual risk picture evaluated during
          RMF-AU-02 risk determination.

  # ═══════════════════════════════════════════════════════════════════════════
  # RMF AUTHORIZE — Authorization Decision and Response
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: rmf-au-03
    target_controls:
      - id: ca-6
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          RMF-AU-03 issues the authorization decision (ATO, authorization to use, or
          denial). CA-6 (Authorization) is the direct NIST 800-53 control requiring the
          authorizing official to authorize system operation. These requirements are
          semantically identical — both mandate a formal risk acceptance decision.
      - id: ca-7
        relationship: derived-from
        confidence: 0.78
        rationale: >
          Ongoing authorization relies on continuous monitoring to sustain the
          authorization decision. CA-7 (Continuous Monitoring) provides the ongoing
          assurance that the authorization conditions established in RMF-AU-03 continue
          to be met throughout the system lifecycle.
      - id: pl-2
        relationship: complements
        confidence: 0.72
        rationale: >
          The authorization decision may include terms and conditions that constrain
          system operation. PL-2 (System Security and Privacy Plans) captures these
          authorization terms in the SSP, ensuring they are documented and traceable
          to the RMF-AU-03 decision.

  # ═══════════════════════════════════════════════════════════════════════════
  # RMF MONITOR — Continuous Monitoring Strategy and Implementation
  # ═══════════════════════════════════════════════════════════════════════════
  - source_control: rmf-m-01
    target_controls:
      - id: ca-7
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          RMF-M-01 implements a continuous monitoring strategy covering control
          effectiveness, change tracking, ongoing assessments, and risk reporting.
          CA-7 (Continuous Monitoring) requires the same activities — developing and
          implementing a continuous monitoring strategy. These requirements are
          semantically identical.
      - id: si-4
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          Continuous monitoring includes system monitoring for attacks, unauthorized
          access, and configuration changes. SI-4 (System Monitoring) provides the
          technical detection and analysis capabilities that implement the monitoring
          objectives defined in the RMF-M-01 strategy.
      - id: pm-14
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          RMF-M-01 establishes monitoring at both system and organizational levels.
          PM-14 (Testing, Training, and Monitoring) requires organizations to implement
          a continuous monitoring program, which is the organizational governance
          counterpart to the system-level monitoring in RMF-M-01.
      - id: au-2
        relationship: complements
        confidence: 0.78
        rationale: >
          Continuous monitoring depends on comprehensive event logging. AU-2 (Event
          Logging) defines which events are captured, providing the raw data that the
          continuous monitoring strategy in RMF-M-01 analyzes for control effectiveness
          and security status.
      - id: au-6
        relationship: complements
        confidence: 0.78
        rationale: >
          Continuous monitoring includes reviewing and analyzing audit records. AU-6
          (Audit Record Review, Analysis, and Reporting) provides the ongoing audit
          analysis capability that feeds continuous monitoring assessments and risk
          reporting in RMF-M-01.
