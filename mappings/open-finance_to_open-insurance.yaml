id: open-finance_to_open-insurance
title: "Open Finance to Open Insurance Control Mapping"
source_framework: open-finance
target_framework: open-insurance
version: "1.0.0"
last_updated: "2026-04-04"
methodology: structural
description: >
  Mapeamento entre Open Finance Brasil (Res. Conj. BCB/CMN 1/2020 + 6/2023) e
  Open Insurance Brasil (Circ. SUSEP 635/2021 + Res. CNSP 415/2021). Ambos os
  ecossistemas compartilham arquitetura tecnica equivalente (FAPI, mTLS, OAuth 2.0,
  diretorio de participantes) aplicada a setores regulatorios distintos (financeiro
  e segurador).

mappings:
  - source_control: of-01
    target_controls:
      - id: dg-01
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Ambos definem o objeto e escopo do ecossistema aberto. Open Finance para
          instituicoes financeiras e de pagamento; Open Insurance para seguradoras,
          EAPCs e sociedades de capitalizacao.

  - source_control: of-03
    target_controls:
      - id: dg-03
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Participantes obrigatorios em ambos os ecossistemas. Open Finance: S1/S2
          e IPs. Open Insurance: seguradoras com premio acima do limiar SUSEP.

  - source_control: of-05
    target_controls:
      - id: cd-01
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Compartilhamento de dados abertos (produtos, canais). Ambos exigem APIs
          publicas com dados institucionais e de produtos sem necessidade de consentimento.

  - source_control: of-06
    target_controls:
      - id: cd-02
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Compartilhamento de dados cadastrais mediante consentimento. Open Finance:
          dados bancarios. Open Insurance: dados de segurados e beneficiarios.

  - source_control: of-07
    target_controls:
      - id: cd-03
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Compartilhamento de dados transacionais. Open Finance: extratos, faturas.
          Open Insurance: apolices, sinistros, endossos.

  - source_control: of-10
    target_controls:
      - id: si-01
        relationship: equivalent-to
        confidence: 0.80
        rationale: >
          Servicos de iniciacao via terceiros. Open Finance: ITP (Iniciador de
          Transacao de Pagamento). Open Insurance: cotacao e contratacao via
          receptora de dados.

  - source_control: of-14
    target_controls:
      - id: sa-01
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Ambos adotam Financial-grade API (FAPI) e OAuth 2.0 como base de
          autenticacao e autorizacao para APIs do ecossistema aberto.

  - source_control: of-15
    target_controls:
      - id: sa-02
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Certificados digitais ICP-Brasil e mTLS sao obrigatorios em ambos
          os ecossistemas para autenticacao de participantes.

  - source_control: of-18
    target_controls:
      - id: sa-05
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Criptografia em transito e em repouso para dados compartilhados.
          Ambos exigem TLS 1.2+ e protecao de tokens e chaves.

  - source_control: of-19
    target_controls:
      - id: cc-01
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Jornada de consentimento com requisitos de UX, transparencia e
          confirmacao explicita do titular. Ambos seguem diretrizes LGPD.

  - source_control: of-20
    target_controls:
      - id: cc-02
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Prazo maximo de consentimento (12 meses) com possibilidade de
          renovacao. Ambos exigem revalidacao periodica.

  - source_control: of-21
    target_controls:
      - id: cc-03
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Revogacao de consentimento a qualquer momento, com efeito imediato
          e cessacao do compartilhamento de dados.

  - source_control: of-23
    target_controls:
      - id: gov-01
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Estrutura de governanca com diretorio centralizado, convencao entre
          participantes e orgao deliberativo. Ambos possuem governanca propria
          supervisionada pelo regulador setorial.

  - source_control: of-27
    target_controls:
      - id: it-01
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Padroes de APIs REST, JSON, versionamento semantico e documentacao
          via OpenAPI/Swagger. Ambos seguem especificacoes tecnicas publicadas.

  - source_control: of-28
    target_controls:
      - id: it-02
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          SLAs de disponibilidade e tempo de resposta para APIs. Ambos definem
          metricas minimas de desempenho e janelas de manutencao.
