id: iso-27701_to_gdpr
title: "ISO/IEC 27701:2019 to GDPR Control Mapping"
source_framework: iso-27701
target_framework: gdpr
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # === CLAUSE 5 — Context and Planning ===

  - source_control: cl-5.2
    target_controls:
      - id: art-30
        relationship: implements
        confidence: 0.90
        rationale: >
          cl-5.2 (Context of the organization and determination of PII processing
          scope) requires identifying all PII processing activities, types of PII,
          categories of PII principals, and applicable legislation. This directly
          implements GDPR Art. 30 (Records of processing activities), which mandates
          maintaining a record of processing activities including purposes, data
          categories, recipients, and retention periods.
      - id: art-28
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          cl-5.2 requires the organization to determine its role as PII controller
          and/or PII processor and to identify contractual obligations related to PII
          processing. This intersects with GDPR Art. 28 (Processor), which governs
          the controller-processor relationship, sub-processor engagement, and data
          processing agreement requirements.
      - id: art-5
        relationship: complements
        confidence: 0.80
        rationale: >
          cl-5.2 mandates understanding the context and scope of PII processing
          including boundaries and applicability. This supports GDPR Art. 5.2
          (Accountability), which requires the controller to demonstrate compliance
          with the data protection principles by maintaining documented evidence of
          the processing scope and its lawful basis.
      - id: art-1
        relationship: complements
        confidence: 0.75
        rationale: >
          cl-5.2 establishes the foundational requirement to identify all PII
          processing activities and applicable legislation, complementing GDPR
          Art. 1, which defines the regulation's subject-matter and objective of
          protecting natural persons with regard to the processing of personal data.

  - source_control: cl-5.4
    target_controls:
      - id: art-35
        relationship: implements
        confidence: 0.90
        rationale: >
          cl-5.4 (PIMS planning — PII risk assessment and treatment) requires
          determining risks to PII principals and planning actions to address them,
          including evaluating risks to the rights and freedoms of PII principals.
          This directly implements GDPR Art. 35 (Data protection impact assessment),
          which mandates risk assessment for high-risk processing operations
          evaluating impact on data subject rights.
      - id: art-25
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          cl-5.4 requires establishing privacy-specific objectives and considering
          privacy risks when assessing information security risks. This intersects
          with GDPR Art. 25 (Data protection by design and by default), which
          requires implementing technical and organizational measures that integrate
          data protection principles into processing from the design stage.
      - id: art-32
        relationship: complements
        confidence: 0.82
        rationale: >
          cl-5.4 requires evaluating the effectiveness of privacy risk treatment
          actions, which complements GDPR Art. 32 (Security of processing), as both
          mandate risk-based approaches to determining appropriate technical and
          organizational security measures proportional to the processing risks.

  # === CLAUSE 6 — Support ===

  - source_control: cl-6.2
    target_controls:
      - id: art-5
        relationship: implements
        confidence: 0.82
        rationale: >
          cl-6.2 (PIMS competence, awareness, and training) requires ensuring
          personnel are competent in PII processing and aware of the privacy policy
          and their responsibilities. This implements the accountability dimension of
          GDPR Art. 5.2, which requires the controller to demonstrate compliance,
          including through staff competence and awareness of data protection
          obligations.
      - id: art-32
        relationship: complements
        confidence: 0.78
        rationale: >
          cl-6.2 addresses the human element of data protection by requiring
          training and awareness on PII processing obligations. This complements
          GDPR Art. 32.4, which requires that persons acting under the authority of
          the controller or processor who have access to personal data process them
          only on controller instructions, necessitating adequate training.
      - id: art-28
        relationship: complements
        confidence: 0.75
        rationale: >
          cl-6.2 requires ensuring persons under the organization's control who
          process PII understand their responsibilities. This complements GDPR
          Art. 28.3(b), which requires processors to ensure that persons authorized
          to process personal data have committed to confidentiality obligations.

  # === CLAUSE 7 — Operation ===

  - source_control: cl-7.1
    target_controls:
      - id: art-28
        relationship: implements
        confidence: 0.90
        rationale: >
          cl-7.1 (Operational planning and control for PII processing) requires
          controlling outsourced PII processing through contractual arrangements
          specifying subject-matter, duration, nature, purpose, data types, and
          controller rights. This directly implements GDPR Art. 28, which mandates
          binding contracts for processor relationships with equivalent content
          requirements.
      - id: art-32
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          cl-7.1 requires implementing controls for the entire PII lifecycle and
          managing changes with privacy impact evaluation. This intersects with
          GDPR Art. 32 (Security of processing), which requires appropriate
          technical and organizational measures to ensure security proportional to
          the risk, including ongoing assessment of their effectiveness.
      - id: art-5
        relationship: complements
        confidence: 0.78
        rationale: >
          cl-7.1 requires documented procedures for all PII processing operations
          and change management, supporting GDPR Art. 5.2 (Accountability), which
          demands demonstrable compliance with data protection principles through
          operational controls and documented procedures.

  - source_control: cl-7.2
    target_controls:
      - id: art-35
        relationship: implements
        confidence: 0.92
        rationale: >
          cl-7.2 (PII risk assessment) requires performing risk assessments that
          identify risks to PII principals' rights and freedoms, considering
          likelihood and consequences of identified risks in the context of PII
          processing. This directly implements GDPR Art. 35 (Data protection impact
          assessment), which mandates assessing the impact of processing operations
          on the protection of personal data prior to high-risk processing.
      - id: art-32
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          cl-7.2 requires assessing risks of loss of confidentiality, integrity, and
          availability of PII, which intersects with GDPR Art. 32 (Security of
          processing), as both require a risk-based determination of appropriate
          security measures considering the nature, scope, and purposes of processing.
      - id: art-25
        relationship: complements
        confidence: 0.80
        rationale: >
          cl-7.2 risk assessments inform the selection of privacy-preserving measures,
          complementing GDPR Art. 25 (Data protection by design and by default),
          which requires technical and organizational measures that implement data
          protection principles effectively based on the risk assessment outcomes.

  - source_control: cl-7.3
    target_controls:
      - id: art-32
        relationship: implements
        confidence: 0.90
        rationale: >
          cl-7.3 (PII risk treatment) requires implementing a risk treatment plan
          with appropriate controls from Annex A/B and producing a Statement of
          Applicability. This directly implements GDPR Art. 32 (Security of
          processing), which requires implementing appropriate technical and
          organizational measures to ensure a level of security appropriate to the
          risk.
      - id: art-25
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          cl-7.3 requires selecting controls to address identified PII risks and
          documenting justification for inclusion or exclusion. This intersects with
          GDPR Art. 25 (Data protection by design and by default), as the risk
          treatment process determines the specific design-time and runtime measures
          implemented to protect personal data.
      - id: art-35
        relationship: complements
        confidence: 0.82
        rationale: >
          cl-7.3 risk treatment outcomes (selected controls, residual risk acceptance)
          complement GDPR Art. 35.7(d), which requires the DPIA to include measures
          envisaged to address risks, including safeguards and mechanisms to ensure
          data protection and demonstrate regulatory compliance.

  # === CLAUSE 8 — Performance Evaluation ===

  - source_control: cl-8.2
    target_controls:
      - id: art-5
        relationship: implements
        confidence: 0.90
        rationale: >
          cl-8.2 (PIMS performance evaluation, monitoring, and measurement) requires
          monitoring PII processing performance, conducting internal audits, and
          management review of the PIMS. This directly implements GDPR Art. 5.2
          (Accountability), which requires the controller to demonstrate compliance
          with data protection principles through measurable, auditable processes.
      - id: art-83
        relationship: complements
        confidence: 0.78
        rationale: >
          cl-8.2 requires tracking privacy incident trends, compliance metrics, and
          conducting audits. This complements GDPR Art. 83, as the factors considered
          when imposing fines include the degree of responsibility, mitigation
          measures taken, and adherence to codes of conduct or certifications — all
          evidenced through the monitoring and audit activities cl-8.2 mandates.
      - id: art-33
        relationship: complements
        confidence: 0.75
        rationale: >
          cl-8.2 performance monitoring includes tracking privacy incident metrics
          and breach response effectiveness, which complements GDPR Art. 33 (Breach
          notification) by ensuring the organization has the monitoring capabilities
          needed to detect breaches promptly and measure notification compliance.

  # === ANNEX A — PII Controller Controls ===

  - source_control: a-7.2.1
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          a-7.2.1 (Identify and document purpose) requires identifying, documenting,
          and communicating the specific purposes for which PII will be processed,
          and prohibits processing incompatible with original purposes. This is
          equivalent to GDPR Art. 5.1(b) (Purpose limitation), which mandates
          collection for specified, explicit, and legitimate purposes with no
          incompatible further processing.
      - id: art-6
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          a-7.2.1 requires ensuring identified purposes are lawful, intersecting with
          GDPR Art. 6 (Lawfulness of processing), which defines the six legal bases
          for processing. The lawfulness requirement in a-7.2.1 is the operational
          check that the processing purpose has a valid legal basis under Art. 6.
      - id: art-30
        relationship: complements
        confidence: 0.82
        rationale: >
          a-7.2.1 requires documenting purpose specification at sufficient detail,
          which complements GDPR Art. 30 (Records of processing activities), as the
          purpose documentation feeds directly into the record of processing
          activities that controllers must maintain under Art. 30.1(b).

  - source_control: a-7.2.2
    target_controls:
      - id: art-6
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          a-7.2.2 (Identify lawful basis) requires determining the applicable lawful
          basis for each processing purpose and documenting it. This is equivalent
          to GDPR Art. 6 (Lawfulness of processing), which enumerates the six
          conditions under which processing is lawful. Both require explicit
          identification and documentation of the legal basis before processing.
      - id: art-5
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          a-7.2.2 requires demonstrating the lawful basis for each processing
          activity, intersecting with GDPR Art. 5.1(a) (Lawfulness, fairness, and
          transparency) and Art. 5.2 (Accountability). The documentation requirement
          directly serves the accountability principle by enabling demonstration of
          lawful processing.

  - source_control: a-7.2.5
    target_controls:
      - id: art-35
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          a-7.2.5 (Privacy impact assessment) requires conducting PIAs for new or
          changed PII processing, evaluating risks to PII principals, assessing
          necessity and proportionality, and identifying mitigating measures. This is
          equivalent to GDPR Art. 35 (Data protection impact assessment), which
          mandates DPIAs for high-risk processing with identical assessment
          requirements including necessity, proportionality, and risk mitigation.
      - id: art-25
        relationship: complements
        confidence: 0.82
        rationale: >
          a-7.2.5 requires using PIA results to determine appropriate controls,
          which complements GDPR Art. 25 (Data protection by design and by default),
          as the PIA process drives the selection of technical and organizational
          measures that implement data protection principles at the design stage.

  - source_control: a-7.3.1
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          a-7.3.1 (Transparency requirements) requires providing clear, accessible,
          and transparent information to PII principals about all aspects of
          processing. This is equivalent to GDPR Art. 5.1(a) (Lawfulness, fairness,
          and transparency), which mandates processing in a transparent manner in
          relation to the data subject.
      - id: art-15
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          a-7.3.1 requires informing PII principals about the existence of their
          rights and how to exercise them, intersecting with GDPR Art. 15 (Right of
          access), which grants data subjects the right to obtain information about
          processing purposes, categories, recipients, retention, and the existence
          of other rights.
      - id: art-1
        relationship: complements
        confidence: 0.72
        rationale: >
          a-7.3.1 transparency obligations complement GDPR Art. 1, which establishes
          the protection of fundamental rights related to personal data processing.
          Transparency is a prerequisite for data subjects to exercise their
          fundamental rights to data protection.

  - source_control: a-7.3.2
    target_controls:
      - id: art-15
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          a-7.3.2 (Determining and facilitating PII principal rights) requires
          implementing mechanisms for the right of access, including providing PII
          principals with their personal data. This is equivalent to GDPR Art. 15
          (Right of access by the data subject), which grants the right to obtain
          confirmation of processing and access to personal data.
      - id: art-17
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          a-7.3.2 includes implementing the right to erasure of PII and requires
          fulfilling requests within regulatory timeframes. This is equivalent to
          GDPR Art. 17 (Right to erasure), which grants data subjects the right to
          obtain erasure of personal data without undue delay under specified
          conditions.
      - id: art-5
        relationship: complements
        confidence: 0.80
        rationale: >
          a-7.3.2 requires the organization to document rights, implement
          fulfillment mechanisms, and verify identity before processing requests.
          This complements GDPR Art. 5.2 (Accountability) by ensuring demonstrable
          compliance with data subject rights obligations through documented
          processes and audit trails.

  - source_control: a-7.4.5
    target_controls:
      - id: art-17
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          a-7.4.5 (PII de-identification and deletion at end of processing) requires
          deleting PII or rendering it non-identifying when no longer necessary for
          the original purpose. This is equivalent to GDPR Art. 17 (Right to
          erasure), which mandates erasure when personal data are no longer necessary
          for the purposes collected, consent is withdrawn, or data were unlawfully
          processed.
      - id: art-5
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          a-7.4.5 requires deletion when the original purpose no longer necessitates
          the PII, directly equivalent to GDPR Art. 5.1(e) (Storage limitation),
          which mandates that personal data be kept in identifiable form no longer
          than necessary for the processing purposes.
      - id: art-25
        relationship: complements
        confidence: 0.80
        rationale: >
          a-7.4.5 requires robust de-identification processes resistant to
          re-identification, complementing GDPR Art. 25 (Data protection by design
          and by default), which mandates pseudonymization and data minimization as
          design-time technical measures.

  - source_control: a-7.5.1
    target_controls:
      - id: art-44
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          a-7.5.1 (Identify basis for PII transfer between jurisdictions) requires
          identifying, documenting, and implementing safeguards for cross-border PII
          transfers. This is equivalent to GDPR Art. 44 (General principle for
          transfers), which mandates that international transfers comply with
          Chapter V conditions including adequacy decisions, SCCs, BCRs, and
          derogations.
      - id: art-5
        relationship: complements
        confidence: 0.78
        rationale: >
          a-7.5.1 requires documenting the basis and safeguards for cross-border
          transfers, complementing GDPR Art. 5.2 (Accountability). The documentation
          of transfer mechanisms and safeguards enables the controller to
          demonstrate compliance with the cross-border transfer requirements.

  # === ANNEX B — PII Processor Controls ===

  - source_control: b-8.2.1
    target_controls:
      - id: art-28
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          b-8.2.1 (Customer agreement) requires the processor to ensure contracts
          with controllers address processing obligations, including subject-matter,
          duration, nature, purpose, data types, and the requirement to process only
          on documented instructions. This is equivalent to GDPR Art. 28.3, which
          mandates identical contractual provisions governing the controller-
          processor relationship.
      - id: art-32
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          b-8.2.1 requires the contract to mandate appropriate technical and
          organizational security measures, which intersects with GDPR Art. 32
          (Security of processing), as the processor's security obligations are
          specified in the DPA and must meet Art. 32 requirements.
      - id: art-33
        relationship: complements
        confidence: 0.78
        rationale: >
          b-8.2.1 requires the contract to include the processor's obligation to
          assist with breach notification, complementing GDPR Art. 33 (Breach
          notification), which requires processors to notify controllers without
          undue delay after becoming aware of a personal data breach.

  - source_control: b-8.2.2
    target_controls:
      - id: art-28
        relationship: equivalent-to
        confidence: 0.92
        rationale: >
          b-8.2.2 (Organization's purposes) requires the processor to process PII
          only for the purposes in the controller's documented instructions and
          prohibits use for the processor's own purposes. This is equivalent to
          GDPR Art. 28.3(a), which mandates that the processor processes personal
          data only on documented instructions from the controller.
      - id: art-5
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          b-8.2.2 enforces purpose limitation at the processor level by prohibiting
          data commingling and unauthorized purpose expansion. This intersects with
          GDPR Art. 5.1(b) (Purpose limitation), which requires processing only for
          specified, explicit, and legitimate purposes compatible with the original
          collection purposes.

  - source_control: b-8.3.1
    target_controls:
      - id: art-28
        relationship: implements
        confidence: 0.92
        rationale: >
          b-8.3.1 (Obligations to PII principals) requires the processor to assist
          the controller in fulfilling PII principal rights requests including
          access, rectification, erasure, restriction, portability, and objection.
          This implements GDPR Art. 28.3(e), which requires the processor to assist
          the controller in ensuring compliance with data subject rights obligations.
      - id: art-15
        relationship: complements
        confidence: 0.82
        rationale: >
          b-8.3.1 requires the processor to provide technical capabilities enabling
          the controller to fulfill access requests, complementing GDPR Art. 15
          (Right of access), as the processor's cooperation is essential when
          personal data resides in the processor's systems.
      - id: art-17
        relationship: complements
        confidence: 0.82
        rationale: >
          b-8.3.1 requires the processor to implement erasure capabilities and
          assist the controller with deletion requests, complementing GDPR Art. 17
          (Right to erasure), as the processor must be able to execute complete data
          deletion across all systems upon the controller's instruction.

  - source_control: b-8.5.1
    target_controls:
      - id: art-44
        relationship: implements
        confidence: 0.92
        rationale: >
          b-8.5.1 (Basis for PII transfer between jurisdictions for PII processors)
          requires the processor to transfer PII internationally only in accordance
          with the controller's instructions, notify the controller of jurisdiction
          changes, and ensure sub-processors provide equivalent protection. This
          implements GDPR Art. 44 (General principle for transfers) from the
          processor perspective, ensuring international transfers comply with
          Chapter V conditions.
      - id: art-28
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          b-8.5.1 requires the processor to inform the controller of jurisdiction
          changes and maintain records of cross-jurisdictional transfers, intersecting
          with GDPR Art. 28.2, which requires the processor to inform the controller
          of changes concerning sub-processors and to obtain controller authorization
          for sub-processing in different jurisdictions.
