id: crimes-ciber_to_marco-civil
title: "Crimes Cibernéticos to Marco Civil da Internet Control Mapping"
source_framework: crimes-ciber
target_framework: marco-civil
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  - source_control: art-1
    target_controls:
      - id: art-7
        relationship: complements
        confidence: 0.80
        rationale: >
          Art. 154-A do Código Penal (invasão de dispositivo informático) criminaliza
          a violação da inviolabilidade e sigilo de comunicações e dados pessoais que
          o art. 7º do Marco Civil assegura como direitos dos usuários — especialmente
          os incisos I (inviolabilidade da intimidade), II (sigilo do fluxo de
          comunicações) e III (sigilo de comunicações armazenadas). O crime de invasão
          é o mecanismo penal de enforcement dos direitos civis declarados no art. 7º.
      - id: art-10
        relationship: complements
        confidence: 0.75
        rationale: >
          Art. 154-A criminaliza a invasão de dispositivo para obter dados sem
          autorização. O art. 10 do Marco Civil estabelece o regime de proteção dos
          registros, dados pessoais e comunicações privadas, exigindo ordem judicial
          para acesso. A invasão de dispositivo é precisamente a conduta que o art. 10
          busca prevenir no plano civil, e o art. 154-A pune no plano penal.
      - id: art-13
        relationship: complements
        confidence: 0.65
        rationale: >
          Art. 154-A depende, para fins de investigação e prova, dos registros de
          conexão mantidos conforme art. 13 do Marco Civil. A obrigação de guarda de
          registros de conexão por 1 ano viabiliza a investigação criminal de invasões
          de dispositivo, fornecendo elementos probatórios essenciais como IP e
          timestamps.
      - id: art-15
        relationship: complements
        confidence: 0.65
        rationale: >
          Art. 154-A depende, para fins de investigação e prova, dos registros de
          acesso a aplicações mantidos conforme art. 15 do Marco Civil. A guarda de
          registros de acesso por 6 meses permite rastrear a atividade do invasor em
          aplicações de internet, complementando os registros de conexão do art. 13.

  - source_control: art-2
    target_controls:
      - id: art-7
        relationship: complements
        confidence: 0.85
        rationale: >
          Art. 154-A, § 3º qualifica o crime de invasão quando resulta na obtenção de
          comunicações eletrônicas privadas, segredos comerciais ou controle remoto do
          dispositivo. O art. 7º, incisos II e III do Marco Civil, garante a
          inviolabilidade e sigilo do fluxo e do armazenamento de comunicações privadas.
          A forma qualificada do crime pune exatamente a violação dos direitos mais
          protegidos pelo art. 7º.
      - id: art-10
        relationship: complements
        confidence: 0.80
        rationale: >
          Art. 154-A, § 3º pune com pena agravada a obtenção de comunicações privadas
          e informações sigilosas. O art. 10 do Marco Civil estabelece que a guarda e
          disponibilização de registros e comunicações privadas deve preservar a
          intimidade e vida privada, exigindo ordem judicial para acesso ao conteúdo.
          A forma qualificada do crime é o enforcement penal direto do regime de
          proteção do art. 10.
      - id: art-8
        relationship: intersects-with
        confidence: 0.60
        rationale: >
          Art. 154-A, § 3º criminaliza a obtenção de comunicações privadas por invasão,
          enquanto o art. 8º do Marco Civil declara nulas cláusulas contratuais que
          impliquem ofensa à inviolabilidade e sigilo das comunicações. Ambos protegem
          o mesmo bem jurídico — sigilo das comunicações — por mecanismos diferentes
          (penal e civil contratual).

  - source_control: art-3
    target_controls:
      - id: art-13
        relationship: complements
        confidence: 0.70
        rationale: >
          Art. 154-A, §§ 2º, 4º e 5º estabelecem agravantes por prejuízo econômico,
          disseminação de dados obtidos e vítimas de alto perfil. A investigação dessas
          circunstâncias agravantes depende dos registros de conexão mantidos conforme
          art. 13 do Marco Civil para rastrear a origem e extensão do ataque, bem como
          identificar os responsáveis pela disseminação dos dados.
      - id: art-15
        relationship: complements
        confidence: 0.70
        rationale: >
          As circunstâncias agravantes do art. 154-A (disseminação de dados,
          prejuízo econômico) exigem investigação detalhada. Os registros de acesso a
          aplicações mantidos conforme art. 15 do Marco Civil são essenciais para
          determinar quais dados foram acessados, para quem foram transmitidos
          (§ 4º) e quantificar o prejuízo econômico (§ 2º).
      - id: art-12
        relationship: intersects-with
        confidence: 0.55
        rationale: >
          Os agravantes do art. 154-A (§§ 2º e 4º) operam no plano penal com
          aumento de pena. O art. 12 do Marco Civil prevê sanções administrativas
          (advertência, multa de até 10% do faturamento, suspensão) por violação dos
          arts. 10 e 11. Ambos representam mecanismos sancionatórios escalonados que
          se aplicam cumulativamente quando uma invasão de dispositivo também viola
          obrigações do Marco Civil.

  - source_control: art-4
    target_controls:
      - id: art-11
        relationship: complements
        confidence: 0.75
        rationale: >
          Art. 266, § 1º criminaliza a interrupção de serviço telemático ou de
          informação de utilidade pública (ataques DDoS, sabotagem). O art. 11 do Marco
          Civil exige que operações de coleta e tratamento de dados em território
          nacional respeitem a legislação brasileira. Ataques que interrompem serviços
          telemáticos violam simultaneamente o art. 266 (penal) e podem comprometer
          obrigações do art. 11 (civil), especialmente quando afetam provedores sujeitos
          à jurisdição brasileira.
      - id: art-9
        relationship: complements
        confidence: 0.70
        rationale: >
          Art. 266 pune a interrupção de serviços telemáticos. O art. 9º do Marco Civil
          garante a neutralidade de rede e a preservação da estabilidade, segurança e
          funcionalidade da rede (art. 3º, V). Ataques que interrompem serviços violam
          o dever de estabilidade da rede, e a criminalização pelo art. 266 reforça a
          proteção civil da neutralidade e disponibilidade dos serviços.
      - id: art-13
        relationship: complements
        confidence: 0.65
        rationale: >
          A investigação de crimes de interrupção de serviços telemáticos (art. 266)
          depende dos registros de conexão mantidos conforme art. 13 do Marco Civil.
          Logs de conexão com timestamps precisos são essenciais para identificar a
          origem de ataques DDoS e sabotagem de infraestrutura.

  - source_control: art-5
    target_controls:
      - id: art-13
        relationship: complements
        confidence: 0.65
        rationale: >
          Art. 298 criminaliza a falsificação de documentos eletrônicos e cartões de
          pagamento. A investigação desses crimes depende dos registros de conexão
          mantidos conforme art. 13 do Marco Civil para rastrear transações
          fraudulentas, identificar a origem de acessos usados na falsificação e
          correlacionar atividades criminosas com endereços IP e timestamps.
      - id: art-7
        relationship: complements
        confidence: 0.60
        rationale: >
          Art. 298 protege a integridade de documentos eletrônicos e cartões de
          pagamento. O art. 7º, inciso VII do Marco Civil garante o não fornecimento
          de dados pessoais a terceiros sem consentimento. A falsificação de cartões
          frequentemente envolve obtenção ilícita de dados pessoais e financeiros,
          violando simultaneamente o art. 298 (penal) e os direitos do art. 7º (civil).
      - id: art-15
        relationship: complements
        confidence: 0.60
        rationale: >
          A investigação de falsificação de documentos eletrônicos e cartões (art. 298)
          depende dos registros de acesso a aplicações mantidos conforme art. 15.
          Transações em plataformas de e-commerce e sistemas financeiros geram registros
          de acesso essenciais para rastrear uso de cartões falsificados e identificar
          os responsáveis.

  - source_control: art-6
    target_controls:
      - id: art-7
        relationship: complements
        confidence: 0.75
        rationale: >
          Art. 171, § 2º-A criminaliza a fraude eletrônica qualificada (phishing,
          vishing, BEC). O art. 7º do Marco Civil assegura direitos dos usuários que
          são diretamente violados pela fraude eletrônica — especialmente os incisos I
          (inviolabilidade da intimidade), VII (não fornecimento de dados a terceiros
          sem consentimento) e VIII (informações claras sobre coleta de dados). O
          fraudador induz a vítima a fornecer dados pessoais em violação desses
          direitos.
      - id: art-13
        relationship: complements
        confidence: 0.70
        rationale: >
          A investigação de fraude eletrônica qualificada (art. 171, § 2º-A) depende
          dos registros de conexão mantidos conforme art. 13 do Marco Civil. A
          identificação de fraudadores que operam via redes sociais, e-mail e telefone
          requer correlação de endereços IP com timestamps para rastrear a origem das
          campanhas de phishing e outras modalidades de fraude.
      - id: art-15
        relationship: complements
        confidence: 0.70
        rationale: >
          A investigação de fraude eletrônica (art. 171, § 2º-A) depende dos registros
          de acesso a aplicações mantidos conforme art. 15. Plataformas de redes
          sociais, e-mail e e-commerce usadas como vetor de fraude devem preservar
          registros de acesso que permitam identificar os responsáveis pela conduta
          fraudulenta.

  - source_control: art-7
    target_controls:
      - id: art-11
        relationship: complements
        confidence: 0.75
        rationale: >
          Art. 171, § 4º-B, I agrava a pena de fraude eletrônica quando utilizado
          servidor mantido fora do território nacional. O art. 11 do Marco Civil
          estabelece a aplicação extraterritorial da legislação brasileira quando pelo
          menos um ato de coleta ou tratamento ocorre no Brasil. Ambos convergem na
          pretensão de submeter condutas com elemento transfronteiriço à jurisdição
          brasileira — o art. 171 pela via penal e o art. 11 pela via civil.
      - id: art-13
        relationship: complements
        confidence: 0.65
        rationale: >
          As circunstâncias agravantes do art. 171, § 4º-B (servidor estrangeiro,
          vítima idosa/vulnerável) exigem investigação detalhada. Os registros de
          conexão mantidos conforme art. 13 do Marco Civil são fundamentais para
          determinar a localização geográfica dos servidores utilizados na fraude
          e comprovar o uso de infraestrutura estrangeira.
      - id: art-7
        relationship: complements
        confidence: 0.60
        rationale: >
          Art. 171, § 4º-B, II agrava a pena quando a vítima é idosa ou vulnerável.
          O art. 7º do Marco Civil assegura direitos a todos os usuários, incluindo
          idosos e vulneráveis. A proteção especial dada pelo Código Penal a essas
          populações complementa os direitos civis do art. 7º, reconhecendo que a
          vulnerabilidade requer proteção reforçada tanto no plano penal quanto civil.

  - source_control: art-8
    target_controls:
      - id: art-13
        relationship: complements
        confidence: 0.80
        rationale: >
          Art. 70, § 4º do CPP define a jurisdição para fraude eletrônica pelo
          domicílio da vítima. O art. 13 do Marco Civil obriga a guarda de registros
          de conexão por 1 ano. A regra jurisdicional do CPP depende diretamente da
          capacidade de produzir registros de conexão que comprovem a localização da
          vítima e a origem do ataque, viabilizando a correta determinação de
          competência processual.
      - id: art-15
        relationship: complements
        confidence: 0.80
        rationale: >
          Art. 70, § 4º do CPP define jurisdição pelo domicílio da vítima para fraude
          eletrônica. O art. 15 do Marco Civil obriga a guarda de registros de acesso
          a aplicações por 6 meses. Os registros de acesso são essenciais para
          reconstruir a cadeia de transações fraudulentas e determinar o local onde
          a vítima interagiu com o fraudador, fundamentando a competência jurisdicional.
      - id: art-10
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          Art. 70, § 4º do CPP trata de jurisdição processual penal. O art. 10 do
          Marco Civil regula a disponibilização de registros e dados pessoais,
          exigindo ordem judicial. A produção de prova para determinar jurisdição
          requer acesso a registros protegidos pelo art. 10, que só podem ser
          disponibilizados mediante autorização judicial conforme § 1º.

  - source_control: art-9
    target_controls:
      - id: art-13
        relationship: implements
        confidence: 0.85
        rationale: >
          O controle art-9 de crimes-ciber consolida as obrigações de preservação de
          evidências digitais, citando expressamente o art. 13 do Marco Civil (guarda
          de registros de conexão por 1 ano). O art. 13 é a base legal primária para
          a obrigação de retenção de logs que sustenta toda a investigação de crimes
          cibernéticos. O controle art-9 é uma implementação operacional direta dos
          requisitos do art. 13.
      - id: art-15
        relationship: implements
        confidence: 0.85
        rationale: >
          O controle art-9 de crimes-ciber cita expressamente o art. 15 do Marco Civil
          (guarda de registros de acesso a aplicações por 6 meses) como fundamento legal
          para preservação de evidências. O art. 15 é a segunda base legal essencial
          para a infraestrutura probatória de crimes cibernéticos, e o controle art-9
          operacionaliza diretamente essa obrigação.
      - id: art-10
        relationship: complements
        confidence: 0.70
        rationale: >
          O controle art-9 de crimes-ciber trata de preservação de evidências. O
          art. 10 do Marco Civil estabelece que registros e dados pessoais devem
          preservar a intimidade das partes, e o § 2º exige ordem judicial para
          acesso ao conteúdo de comunicações privadas. A preservação de evidências
          para investigação criminal deve respeitar as garantias do art. 10, operando
          dentro dos limites legais de sigilo e acesso judicial.

  - source_control: art-10
    target_controls:
      - id: art-10
        relationship: complements
        confidence: 0.85
        rationale: >
          O controle art-10 de crimes-ciber trata de cooperação com autoridades
          policiais e cita expressamente o art. 10 do Marco Civil, que regula a
          disponibilização de registros e comunicações privadas. O art. 10 do Marco
          Civil define os limites da cooperação — dados cadastrais podem ser fornecidos
          a autoridades administrativas (§ 3º), mas comunicações privadas exigem ordem
          judicial (§ 2º). A cooperação com law enforcement opera estritamente dentro
          do framework definido pelo art. 10.
      - id: art-13
        relationship: complements
        confidence: 0.80
        rationale: >
          O controle art-10 de crimes-ciber cita expressamente o art. 13 do Marco
          Civil como fundamento para cooperação com autoridades. Os registros de
          conexão guardados conforme art. 13 são o principal artefato produzido em
          resposta a ordens judiciais e requisições de autoridades em investigações
          de crimes cibernéticos.
      - id: art-15
        relationship: complements
        confidence: 0.80
        rationale: >
          O controle art-10 de crimes-ciber cita expressamente o art. 15 do Marco
          Civil como fundamento para cooperação. Os registros de acesso a aplicações
          guardados conforme art. 15 são frequentemente requisitados por autoridades
          em investigações criminais e devem ser produzidos mediante autorização
          judicial conforme § 3º.
      - id: art-11
        relationship: intersects-with
        confidence: 0.60
        rationale: >
          A cooperação com autoridades em crimes cibernéticos pode envolver dados
          armazenados no exterior. O art. 11 do Marco Civil exige que operações de
          tratamento de dados de brasileiros respeitem a legislação nacional, mesmo
          quando realizadas por empresa estrangeira. A cooperação internacional em
          investigações criminais deve considerar o alcance extraterritorial do art. 11.
