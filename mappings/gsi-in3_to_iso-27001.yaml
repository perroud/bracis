id: gsi-in3_to_iso-27001
title: "IN GSI/PR 3 to ISO 27001:2022 Control Mapping"
source_framework: gsi-in3
target_framework: iso-27001-2022
version: "1.0.0"
last_updated: "2026-04-04"
methodology: structural
description: >
  Mapeamento entre a Instrucao Normativa GSI/PR 3/2021 (processos operacionais de gestao
  de SI na APF) e a ISO/IEC 27001:2022 Anexo A. A IN3 detalha controles operacionais
  de seguranca que mapeiam diretamente para controles do Anexo A da ISO 27001.

mappings:
  - source_control: art-4
    target_controls:
      - id: a-5-9
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 4 (inventario de ativos de informacao) mapeia para A.5.9 (Inventory of
          information and other associated assets). Ambos exigem inventario completo e
          atualizado de ativos de informacao.

  - source_control: art-5
    target_controls:
      - id: a-5-12
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 5 (classificacao da informacao) mapeia para A.5.12 (Classification of
          information). Ambos exigem esquema formal de classificacao.

  - source_control: art-7
    target_controls:
      - id: a-5-10
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Art. 7 (descarte seguro de ativos) mapeia para A.5.10 (Acceptable use of
          information and other associated assets) e A.7.14 (Secure disposal or re-use
          of equipment).

  - source_control: art-8
    target_controls:
      - id: a-5-15
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 8 (politica de controle de acesso) mapeia para A.5.15 (Access control).
          Ambos exigem politica formal de controle de acesso baseada em necessidade de conhecer.

  - source_control: art-9
    target_controls:
      - id: a-5-16
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 9 (gestao de identidades) mapeia para A.5.16 (Identity management).
          Ambos exigem gestao do ciclo de vida de identidades digitais.

  - source_control: art-10
    target_controls:
      - id: a-8-5
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 10 (autenticacao segura) mapeia para A.8.5 (Secure authentication).
          Ambos exigem mecanismos robustos de autenticacao incluindo MFA.

  - source_control: art-12
    target_controls:
      - id: a-8-2
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 12 (gestao de acessos privilegiados) mapeia para A.8.2 (Privileged access
          rights). Ambos exigem controles especificos para contas privilegiadas.

  - source_control: art-15
    target_controls:
      - id: a-8-20
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 15 (segmentacao de redes) mapeia para A.8.20 (Networks security) e A.8.22
          (Segregation of networks). Ambos exigem segmentacao logica de redes.

  - source_control: art-17
    target_controls:
      - id: a-8-21
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Art. 17 (IDS/IPS) mapeia para A.8.21 (Security of network services). Deteccao
          e prevencao de intrusao sao parte da seguranca de servicos de rede.

  - source_control: art-21
    target_controls:
      - id: a-8-24
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 21 (uso de criptografia) mapeia para A.8.24 (Use of cryptography).
          Ambos exigem politica e implementacao de controles criptograficos.

  - source_control: art-24
    target_controls:
      - id: a-8-13
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 24 (backup e recuperacao) mapeia para A.8.13 (Information backup).
          Ambos exigem politica de backup com testes periodicos de restauracao.

  - source_control: art-27
    target_controls:
      - id: a-8-25
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 27 (ciclo de desenvolvimento seguro — SDLC) mapeia para A.8.25 (Secure
          development life cycle). Ambos exigem seguranca integrada em todo o ciclo de
          desenvolvimento de software.

  - source_control: art-29
    target_controls:
      - id: a-8-29
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 29 (testes de seguranca em desenvolvimento) mapeia para A.8.29 (Security
          testing in development and acceptance). Ambos exigem testes de seguranca antes
          de implantacao em producao.

  - source_control: art-33
    target_controls:
      - id: a-8-8
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 33 (gestao de vulnerabilidades tecnicas) mapeia para A.8.8 (Management of
          technical vulnerabilities). Ambos exigem processo de identificacao, avaliacao e
          tratamento de vulnerabilidades.

  - source_control: art-35
    target_controls:
      - id: a-8-9
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Art. 35 (hardening de sistemas) mapeia para A.8.9 (Configuration management).
          Hardening e parte da gestao de configuracao segura.

  - source_control: art-38
    target_controls:
      - id: a-8-15
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 38 (registro de eventos — logs) mapeia para A.8.15 (Logging). Ambos exigem
          registro, protecao e analise de logs de eventos de seguranca.

  - source_control: art-40
    target_controls:
      - id: a-8-16
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 40 (monitoramento e correlacao — SIEM) mapeia para A.8.16 (Monitoring
          activities). Ambos exigem monitoramento continuo e correlacao de eventos.

  - source_control: art-43
    target_controls:
      - id: a-7-1
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          Art. 43 (perimetro de seguranca fisica) mapeia para A.7.1 (Physical security
          perimeters). Ambos exigem definicao e protecao de perimetros fisicos.

  - source_control: art-47
    target_controls:
      - id: a-8-1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Art. 47 (politica de computacao movel — BYOD) mapeia para A.8.1 (User endpoint
          devices). Ambos exigem politica de seguranca para dispositivos moveis.
