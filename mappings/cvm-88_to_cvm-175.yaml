id: cvm-88_to_cvm-175
title: "CVM 88 to CVM 175 Control Mapping"
source_framework: cvm-88
target_framework: cvm-175
version: "1.0.0"
last_updated: "2026-04-06"
methodology: structural
description: >
  Mapping between Resolucao CVM 88/2022 (equity crowdfunding regulation for
  electronic investment platforms) and Resolucao CVM 175/2022 (investment fund
  regulatory framework). CVM 88 regulates crowdfunding platforms that intermediate
  public offerings of securities issued by small enterprises. CVM 175 regulates
  investment funds across all categories. The intersection occurs primarily in
  investor protection, disclosure obligations, cybersecurity, AML/CFT, internal
  controls, and — notably — tokenized securities and crypto-asset provisions.

mappings:
  # ── PLATAFORMA (crowd-1 to crowd-5) ──

  - source_control: crowd-1
    target_controls:
      - id: art-5
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Both establish mandatory registration with CVM before commencing operations.
          CVM 88 art. 2 requires platform registration; CVM 175 art. 5 requires fund
          registration. Different entities (platform vs. fund), same regulatory gate.
      - id: art-1
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          Both define scope and applicability of their respective regulatory frameworks.
          CVM 88 art. 2 scopes crowdfunding platforms; CVM 175 art. 1 scopes investment
          funds. Securities offered via CVM 88 platforms may feed into CVM 175 fund
          structures.

  - source_control: crowd-2
    target_controls:
      - id: art-7
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Both establish fiduciary-like duties: CVM 88 art. 4 requires platforms to
          act with diligence, loyalty, and transparency toward investors; CVM 175 art. 7
          imposes identical duties on fund administrators toward quota holders.
      - id: art-58
        relationship: complements
        confidence: 0.80
        rationale: >
          CVM 88 art. 4 requires platforms to maintain administrative, technological,
          and internal control structures proportional to their activities. CVM 175
          art. 58 requires a formal internal controls and compliance program. Both
          mandate proportional governance infrastructure.

  - source_control: crowd-3
    target_controls:
      - id: art-62
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Both require identification, prevention, and management of conflicts of
          interest. CVM 88 art. 5 addresses platform conflicts (equity in issuers,
          referral fees, lending); CVM 175 art. 62 addresses fund conflicts (related-
          party transactions, competing interests). Same governance principle applied
          to different market participants.
      - id: art-60
        relationship: complements
        confidence: 0.80
        rationale: >
          CVM 88 art. 5 conflict management complements CVM 175 art. 60 chinese wall
          requirements. Both aim to prevent information asymmetry and self-dealing,
          though CVM 175 focuses specifically on information barriers.

  - source_control: crowd-4
    target_controls:
      - id: art-52
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          Both address qualified investor requirements. CVM 88 art. 8 requires lead
          investors in syndicated offerings to be qualified investors per CVM
          regulations; CVM 175 art. 52 defines the investor classification system
          (general, qualified, professional) that CVM 88 references.
      - id: art-49
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 88 art. 8 lead investor analysis duties complement CVM 175 art. 49
          suitability requirements. Both ensure investors receive adequate due
          diligence before committing capital.

  - source_control: crowd-5
    target_controls:
      - id: anx-v-art-1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          Both regulate tokenized securities and crypto-assets. CVM 88 art. 10
          allows secondary market trading of tokenized crowdfunding securities on
          DLT; CVM 175 Annex V art. 1 regulates funds investing in crypto-assets.
          Different vehicles, overlapping asset class.
      - id: anx-v-art-4
        relationship: complements
        confidence: 0.85
        rationale: >
          CVM 88 art. 10 requires token custody mechanisms and token-security
          correspondence for tokenized crowdfunding securities. CVM 175 Annex V
          art. 4 requires institutional-grade crypto custody with multisig, key
          backup, and segregated wallets. Both address digital asset custody.
      - id: art-19
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CVM 88 art. 10 secondary market registry and CVM 175 art. 19 qualified
          custody both require maintaining accurate records of asset ownership and
          verifying existence and integrity of securities.

  # ── OFERTA (crowd-6 to crowd-9) ──

  - source_control: crowd-6
    target_controls:
      - id: art-1
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CVM 88 art. 13 defines fundraising limits and the registration exemption
          for crowdfunding offerings. CVM 175 art. 1 defines the scope of fund
          regulation. Both delineate which capital-raising activities fall under
          which regulatory framework.
      - id: art-3
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 88 art. 13 small enterprise definition (revenue up to R$40M)
          complements CVM 175 art. 3 fund classification system. Both create
          taxonomies that determine applicable regulatory requirements.

  - source_control: crowd-7
    target_controls:
      - id: art-37
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CVM 88 art. 15 requires issuers to prepare detailed business plans with
          specific mandatory content. CVM 175 art. 37 requires fund bylaws
          (regulamento) with specific mandatory content. Both mandate structured
          disclosure documents as the foundation for investor decision-making.
      - id: art-3
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 88 art. 15 issuer eligibility criteria (incorporated in Brazil, not
          CVM-registered, not controlled by large entities) complement CVM 175 art. 3
          fund classification that determines which annexes and rules apply.

  - source_control: crowd-8
    target_controls:
      - id: art-32
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CVM 88 art. 17 establishes escrow and partial closure mechanisms for
          crowdfunding offerings (2/3 minimum, 5-day refund). CVM 175 art. 32
          establishes liquidity management for funds (gates, side pockets, suspension).
          Both address investor liquidity protection through different mechanisms.
      - id: art-43
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 88 art. 17 requires continuous real-time disclosure of funds raised.
          CVM 175 art. 43 requires daily NAV and periodic portfolio disclosure.
          Both mandate ongoing transparency about financial status.

  - source_control: crowd-9
    target_controls:
      - id: anx-v-art-1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CVM 88 art. 19 defines permitted securities for crowdfunding including
          tokens on DLT. CVM 175 Annex V art. 1 defines crypto-assets as investable
          assets for funds. Both regulate digital assets as a securities class,
          from different perspectives (offering vs. investment).
      - id: art-19
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 88 art. 19 requires platforms to maintain a securities registry of
          all offered securities and their holders. CVM 175 art. 19 requires
          qualified custody with verification of existence and title. Both ensure
          accurate records of asset ownership.

  # ── INVESTIDOR (crowd-10 to crowd-13) ──

  - source_control: crowd-10
    target_controls:
      - id: art-52
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CVM 88 art. 23 establishes individual investment limits based on investor
          income/assets and exempts qualified investors. CVM 175 art. 52 defines the
          investor classification system (general, qualified, professional) that
          CVM 88 references. Both stratify investor access based on financial
          sophistication.
      - id: art-49
        relationship: complements
        confidence: 0.80
        rationale: >
          CVM 88 art. 23 investment limits serve the same investor protection goal
          as CVM 175 art. 49 suitability requirements. Both assess investor capacity
          before allowing investment, though through different mechanisms (hard caps
          vs. profile matching).

  - source_control: crowd-11
    target_controls:
      - id: art-32
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CVM 88 art. 25 grants investors a 5-day cooling-off withdrawal right.
          CVM 175 art. 32 addresses fund redemption and suspension mechanisms.
          Both regulate investor exit rights, though CVM 88 provides unconditional
          withdrawal while CVM 175 allows conditional suspension.
      - id: art-46
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 88 art. 25 extends the withdrawal period to 7 days upon substantial
          changes to offering conditions. CVM 175 art. 46 requires immediate
          disclosure of material facts. Both protect investors when material
          changes occur, though through different mechanisms (extended withdrawal
          vs. mandatory disclosure).

  - source_control: crowd-12
    target_controls:
      - id: art-49
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          CVM 88 art. 27 requires investor risk awareness verification and suitability
          assessment. CVM 175 art. 49 requires suitability analysis covering financial
          situation, investment horizon, objectives, risk tolerance, and knowledge.
          Both mandate pre-investment investor profiling and risk comprehension checks.
      - id: art-40
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 88 art. 27 requires educational content on the platform about
          crowdfunding risks. CVM 175 art. 40 requires a fact sheet (lamina) with
          essential information in accessible language. Both provide investors with
          comprehensible information before investment.

  - source_control: crowd-13
    target_controls:
      - id: art-58
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CVM 88 art. 30 requires platforms to maintain a complaint handling channel
          with 5-day SLA. CVM 175 art. 58 requires a compliance program including
          a whistleblower channel. Both mandate structured channels for reporting
          issues, though targeting different stakeholders (investors vs. employees).
      - id: art-46
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 88 art. 30 dispute resolution and complaint management complement
          CVM 175 art. 46 material fact disclosure. Both address investor
          communication obligations, from different angles (reactive complaints
          vs. proactive disclosure).

  # ── DIVULGACAO (crowd-14 to crowd-17) ──

  - source_control: crowd-14
    target_controls:
      - id: art-37
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          CVM 88 art. 33 requires mandatory offering information materials with
          10 specific items (issuer ID, business plan, financials, risks, etc.).
          CVM 175 art. 37 requires fund bylaws with 10 mandatory items (name,
          classification, policy, limits, fees, etc.). Both mandate comprehensive
          structured disclosure documents.
      - id: art-40
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CVM 88 art. 33 offering materials must be in clear, accessible language.
          CVM 175 art. 40 fact sheet must summarize fund information in accessible
          language. Both prioritize plain-language investor communication.
      - id: art-43
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 88 art. 33 financial statements must be audited for offerings above
          R$10M. CVM 175 art. 43 requires periodic audited financial statements.
          Both impose audit requirements for investor protection.

  - source_control: crowd-15
    target_controls:
      - id: art-43
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          CVM 88 art. 36 requires post-offering periodic reports (annual financials,
          activity report, material changes). CVM 175 art. 43 requires periodic
          information (daily NAV, monthly portfolio, semi-annual and annual audited
          financials). Both mandate ongoing post-investment transparency.
      - id: art-71
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 88 art. 36 requires audited financials when total raises exceed R$10M.
          CVM 175 art. 71 requires independent auditor for fund financial statements.
          Both impose audit requirements linked to investor protection.

  - source_control: crowd-16
    target_controls:
      - id: art-55
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          CVM 88 art. 38 and CVM 175 art. 55 both regulate advertising and
          marketing materials with nearly identical requirements: consistency with
          official documents, balanced content, mandatory risk warnings, prohibition
          of return guarantees, and platform/administrator approval before
          publication. Functionally equivalent rules for different market segments.

  - source_control: crowd-17
    target_controls:
      - id: art-46
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          CVM 88 art. 40 and CVM 175 art. 46 both require immediate disclosure of
          material facts to investors. Both list similar triggering events (business
          plan changes, management changes, litigation, material adverse events) and
          require immediate notification through structured channels.
      - id: art-43
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 88 art. 40 material fact disclosure during active offerings triggers
          withdrawal right reopening. CVM 175 art. 43 periodic reporting provides
          the ongoing information framework. Both contribute to continuous investor
          transparency, at different frequencies.

  # ── TECNOLOGIA (crowd-18 to crowd-21) ──

  - source_control: crowd-18
    target_controls:
      - id: art-35
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          CVM 88 art. 43 requires a cybersecurity policy covering vulnerability
          reduction, data protection, incident response, penetration testing, and
          access controls. CVM 175 art. 35 requires operational risk management
          including system failures, fraud, and business continuity. Both mandate
          comprehensive technology risk controls.
      - id: art-27
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 88 art. 43 cybersecurity governance (board-approved policy, annual
          review, designated officer) complements CVM 175 art. 27 risk management
          policy governance. Both require formal, board-level risk governance.
      - id: art-58
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CVM 88 art. 43 cybersecurity incident recording and designated officer
          intersects with CVM 175 art. 58 internal controls program that includes
          irregularity detection and periodic compliance reporting.

  - source_control: crowd-19
    target_controls:
      - id: art-35
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          CVM 88 art. 45 and CVM 175 art. 35 both mandate business continuity and
          disaster recovery planning with nearly identical requirements: service
          continuity, data preservation, recovery within appropriate timeframes,
          annual testing, and designated responsible persons.
      - id: art-27
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 88 art. 45 offsite backup and recovery capabilities complement
          CVM 175 art. 27 operational risk management. Both address operational
          resilience as part of broader risk management.

  - source_control: crowd-20
    target_controls:
      - id: art-65
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CVM 88 art. 47 data protection requirements (data minimization, consent,
          access controls, breach notification, DPO) intersect with CVM 175 art. 65
          AML/CFT requirements that also involve investor/quotaholder data
          collection, retention, and protection under LGPD constraints.
      - id: art-25
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 88 art. 47 data protection for investor/issuer data complements
          CVM 175 art. 25 quotaholder data management by the bookkeeper
          (escriturador). Both address personal data protection obligations
          for different regulated entities.
      - id: art-58
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 88 art. 47 DPO designation and breach notification complement
          CVM 175 art. 58 compliance program which includes a whistleblower
          channel and irregularity detection. Both require designated officers
          and reporting mechanisms for incidents.

  - source_control: crowd-21
    target_controls:
      - id: art-68
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          CVM 88 art. 49 and CVM 175 art. 68 both regulate outsourcing with nearly
          identical principles: non-transferable responsibility, pre-contract due
          diligence, SLA formalization, continuous monitoring of service providers,
          and CVM transparency. Both also require contingency plans for vendor
          disruption.
      - id: art-15
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 88 art. 49 platform responsibility for outsourced services complements
          CVM 175 art. 15 culpa in eligendo and culpa in vigilando framework for
          fund administrators. Both establish that outsourcing does not transfer
          regulatory liability.

  # ── PLD/FT (crowd-22 to crowd-25) ──

  - source_control: crowd-22
    target_controls:
      - id: art-65
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          CVM 88 art. 51 and CVM 175 art. 65 both mandate comprehensive AML/CFT
          programs with the same five core components: KYC, transaction monitoring,
          COAF reporting, employee training, and internal risk assessment. Both
          require board approval, annual review, and a designated AML/CFT officer.
      - id: art-58
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 88 art. 51 AML/CFT program governance (board-approved policy,
          designated officer) complements CVM 175 art. 58 compliance program
          governance. Both require formal compliance infrastructure.

  - source_control: crowd-23
    target_controls:
      - id: art-65
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CVM 88 art. 53 detailed KYC requirements (individual, corporate, issuer)
          intersect with CVM 175 art. 65 KYC requirements for fund quotaholders.
          Both mandate identity verification through independent sources, periodic
          review (2-year/1-year cycles), enhanced due diligence for PEPs, and
          5-year record retention.
      - id: art-25
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 88 art. 53 KYC for investors and issuers complements CVM 175 art. 25
          bookkeeper obligations for quotaholder identification per AML/CFT norms.
          Both require investor identification as part of the onboarding process.
      - id: art-52
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 88 art. 53 KYC data collection (income, assets, profession) serves
          the same data needs as CVM 175 art. 52 investor classification (qualified
          vs. professional) which also requires financial attestation.

  - source_control: crowd-24
    target_controls:
      - id: art-65
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          CVM 88 art. 55 suspicious transaction monitoring and COAF reporting
          (24-hour deadline, tipping-off prohibition, 5-year retention) maps
          directly to CVM 175 art. 65 transaction monitoring and COAF reporting
          requirements. Both implement the same CVM 50 framework for their
          respective regulated entities.
      - id: anx-v-art-7
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 88 art. 55 monitoring of suspicious transactions on crowdfunding
          platforms complements CVM 175 Annex V art. 7 risk management for
          crypto-assets, which includes exchange counterparty risk monitoring.
          Both address financial crime risk in digital asset contexts.

  - source_control: crowd-25
    target_controls:
      - id: art-65
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          CVM 88 art. 57 record-keeping and regulatory cooperation requirements
          (5-year retention, organized records, prompt regulatory response) map
          directly to CVM 175 art. 65 AML/CFT record retention and cooperation
          obligations. Both derive from the same CVM 50 framework.
      - id: art-82
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 88 art. 57 penalties for AML/CFT non-compliance complement CVM 175
          art. 82 sanctions framework. Both establish that regulatory non-compliance
          results in escalating administrative sanctions.
      - id: art-71
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          CVM 88 art. 57 record-keeping for regulatory inspection intersects with
          CVM 175 art. 71 auditor's unrestricted access to all fund documents.
          Both require maintaining organized, accessible records for external
          review.
