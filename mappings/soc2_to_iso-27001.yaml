id: soc2_to_iso-27001-2022
title: "SOC 2 Trust Services Criteria to ISO 27001:2022 Control Mapping"
source_framework: soc2
target_framework: iso-27001-2022
version: "1.0.0"
last_updated: "2026-04-03"
methodology: semantic

mappings:
  # CC1 — Control Environment
  - source_control: cc1
    target_controls:
      - id: a5-1
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          SOC 2 CC1 (Control Environment) maps to ISO A.5.1 (Policies for
          Information Security). CC1 addresses the organization's commitment
          to integrity, ethical values, oversight structure, and accountability.
          A.5.1 requires management direction and support for information
          security through policies, which forms the governance foundation
          analogous to CC1.
      - id: a5-2
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          ISO A.5.2 (Information Security Roles and Responsibilities) maps
          to CC1's requirements for establishing board oversight, organizational
          structure, authority, and responsibility. Both ensure that roles
          and accountability for security/controls are clearly defined.

  # CC2 — Communication and Information
  - source_control: cc2
    target_controls:
      - id: a5-1
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          SOC 2 CC2 (Communication and Information) intersects with ISO A.5.1
          (Policies for Information Security). CC2 requires the organization
          to communicate policies and objectives internally and externally.
          A.5.1 requires policies to be communicated to relevant personnel.
      - id: a7-1
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          ISO A.7.1 (Screening) partially overlaps with CC2's requirements
          for communicating entity objectives and internal control
          responsibilities to personnel. A.7.1 ensures that employees
          understand their obligations through pre-employment verification,
          supporting the personnel awareness aspects of CC2.

  # CC3 — Risk Assessment
  - source_control: cc3
    target_controls:
      - id: a5-1
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          SOC 2 CC3 (Risk Assessment) intersects with ISO A.5.1 to the extent
          that security policies must be informed by risk assessment outcomes.
          CC3 requires identification and analysis of risks to achieving
          objectives, which feeds into policy definition.
      - id: a8-8
        relationship: equivalent-to
        confidence: 0.80
        rationale: >
          ISO A.8.8 (Management of Technical Vulnerabilities) maps to CC3's
          risk identification and assessment requirements. Both require
          identification of vulnerabilities and assessment of their potential
          impact on the organization's objectives and systems.

  # CC5 — Control Activities
  - source_control: cc5
    target_controls:
      - id: a5-1
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          SOC 2 CC5 (Control Activities) maps to ISO A.5.1 as both address
          the selection and development of controls to mitigate risks. CC5
          requires the organization to select and develop control activities
          that contribute to mitigation of risks; A.5.1 establishes the
          policy framework within which those control activities operate.

  # CC6 — Logical and Physical Access Controls
  - source_control: cc6
    target_controls:
      - id: a5-15
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          SOC 2 CC6 (Logical and Physical Access Controls) maps directly to
          ISO A.5.15 (Access Control). Both require implementation of logical
          access controls based on business and security requirements,
          including restrictions on access to information and systems.
      - id: a8-1
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          ISO A.8.1 (User Endpoint Devices) intersects with CC6's requirements
          for protecting information assets from unauthorized access at the
          endpoint level, including management of user devices and their
          security configurations.
      - id: a8-9
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          ISO A.8.9 (Configuration Management) supports CC6 by ensuring
          that system configurations enforce appropriate access controls
          and security settings as part of the logical access control
          framework.

  # CC7 — System Operations
  - source_control: cc7
    target_controls:
      - id: a8-15
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          SOC 2 CC7 (System Operations) maps to ISO A.8.15 (Logging). CC7
          requires monitoring of system components and detection of anomalies.
          A.8.15 requires that logs recording activities, exceptions, faults,
          and other relevant events are produced, stored, protected, and
          analyzed.
      - id: a8-25
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          ISO A.8.25 (Secure Development Life Cycle) intersects with CC7's
          requirements for managing system operations including vulnerability
          management and incident detection within operational systems.

  # CC8 — Change Management
  - source_control: cc8
    target_controls:
      - id: a8-28
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          SOC 2 CC8 (Change Management) maps directly to ISO A.8.28
          (Secure Coding). While A.8.28 focuses specifically on secure
          coding practices, it supports the broader change management
          requirements of CC8 by ensuring that changes to software
          follow secure development principles, testing, and approval
          processes. ISO A.8.32 (Change Management) would be the more
          direct mapping but is referenced through A.8.28's scope.

  # A1 — Availability
  - source_control: a1
    target_controls:
      - id: a8-25
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          SOC 2 A1 (Availability) maps to ISO A.8.25 (Secure Development
          Life Cycle) insofar as availability requirements must be designed
          into systems from the development phase. A1 requires that the
          system is available for operation and use as committed or agreed;
          A.8.25 ensures that availability requirements are incorporated
          into the development lifecycle. Additional ISO controls for
          availability include A.5.29 (ICT Readiness for Business
          Continuity) and A.5.30 (ICT Readiness for Business Continuity).

  # P1 — Privacy
  - source_control: p1
    target_controls:
      - id: iso-27701
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          SOC 2 P1 (Privacy) criteria do not map directly to ISO 27001:2022
          Annex A controls, as ISO 27001 focuses on information security
          rather than privacy-specific requirements. The appropriate mapping
          target is ISO/IEC 27701 (Privacy Information Management System),
          which extends ISO 27001 with privacy-specific controls. ISO 27701
          provides the PIMS framework that addresses notice, choice/consent,
          collection, use/retention/disposal, access, disclosure, quality,
          and monitoring/enforcement — directly corresponding to SOC 2 P1
          through P8 privacy criteria.
