id: cvm-135_to_cvm-175
title: "CVM 135 to CVM 175 Control Mapping"
source_framework: cvm-135
target_framework: cvm-175
version: "1.0.0"
last_updated: "2026-04-06"
methodology: structural
description: >
  Mapping between Resolucao CVM 135 (organized markets and market infrastructures —
  stock exchanges, OTC markets, trade repositories, clearing houses) and Resolucao
  CVM 175 (investment fund regulatory framework). CVM 135 regulates the infrastructure
  through which funds execute, register, and settle trades; CVM 175 regulates the
  funds themselves. Both share cross-cutting themes: governance, risk management,
  internal controls, cybersecurity, transparency, investor protection, and transition
  rules. The relationship is primarily complementary — infrastructure requirements
  (CVM 135) support and enable fund operations (CVM 175).

mappings:
  # ============================================================
  # CAP-1: Object, Definitions, and Scope
  # ============================================================

  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: complements
        confidence: 0.85
        rationale: >
          Both art. 1 provisions define scope and definitions for their respective
          domains. CVM 135 covers organized markets and market infrastructure; CVM 175
          covers investment funds. Funds operate within the markets defined by CVM 135,
          making the scopes complementary.
      - id: art-3
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 135 art. 1 classifies market types (stock exchange, OTC, trade repository,
          clearing house); CVM 175 art. 3 classifies fund types (FI, FIDC, FII, FIP,
          FIAGRO). Both establish foundational taxonomies for their respective regulatory
          domains.

  - source_control: art-2
    target_controls:
      - id: art-5
        relationship: complements
        confidence: 0.80
        rationale: >
          CVM 135 art. 2 requires prior CVM authorization to operate organized markets;
          CVM 175 art. 5 requires CVM registration to constitute a fund. Both establish
          mandatory CVM licensing/registration before operations begin.
      - id: art-7
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 135 art. 2 demands ongoing maintenance of authorization requirements;
          CVM 175 art. 7 demands ongoing diligence by fund administrators. Both require
          continuous compliance, not just initial authorization.

  - source_control: art-3
    target_controls:
      - id: art-49
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 135 art. 3 requires equitable and non-discriminatory access to market
          services, with objective admission criteria. CVM 175 art. 49 requires suitability
          verification before fund investment. Both protect investors through access
          controls, albeit from different angles — infrastructure access versus product
          adequacy.
      - id: art-52
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 135 art. 3 requires transparent and objective criteria for participant
          admission/exclusion. CVM 175 art. 52 stratifies investors (general, qualified,
          professional) with clear access restrictions. Both implement tiered access
          controls with transparency.

  # ============================================================
  # CAP-2: Stock Exchange — Trading Systems and Transparency
  # ============================================================

  - source_control: art-6
    target_controls:
      - id: art-9
        relationship: complements
        confidence: 0.80
        rationale: >
          CVM 135 art. 6 requires price-time priority and equitable latency in
          exchange trading systems. CVM 175 art. 9 requires fund managers to seek
          best execution for fund orders. The exchange infrastructure (135) directly
          enables the best execution obligation of fund managers (175).
      - id: art-27
        relationship: complements
        confidence: 0.65
        rationale: >
          CVM 135 art. 6 mandates volatility controls (circuit breakers) and market
          manipulation detection. CVM 175 art. 27 requires funds to manage market risk.
          Exchange-level controls mitigate risks that fund risk management must account for.

  - source_control: art-8
    target_controls:
      - id: art-43
        relationship: complements
        confidence: 0.80
        rationale: >
          CVM 135 art. 8 requires pre- and post-trade transparency (market data
          dissemination, 10-year retention). CVM 175 art. 43 requires periodic disclosure
          of fund information (daily NAV, monthly portfolio, annual statements). Both
          enforce transparency regimes for their respective domains.
      - id: art-37
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 135 art. 8 requires transparent market data and pricing information.
          CVM 175 art. 37 requires the fund regulation to contain the investment policy
          and risk limits. Both serve price discovery and informed decision-making.
      - id: art-21
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 135 art. 8 mandates post-trade price transparency and data retention.
          CVM 175 art. 21 requires daily mark-to-market valuation. Exchange price
          transparency (135) feeds into fund asset valuation (175).

  - source_control: art-10
    target_controls:
      - id: art-1
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 135 art. 10 governs listing/delisting of securities on exchanges. CVM 175
          art. 1 defines the scope of fund regulation including which assets funds can
          invest in. Securities admitted to trading (135) constitute the investable
          universe for funds (175).
      - id: art-37
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 135 art. 10 requires continuous disclosure by issuers for listed securities.
          CVM 175 art. 37 requires the fund regulation to describe the investment policy.
          The quality of listed securities (135) directly impacts fund portfolios (175).

  - source_control: art-12
    target_controls:
      - id: art-68
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CVM 135 art. 12 governs admission and monitoring of exchange participants
          (brokers, DMA, co-location). CVM 175 art. 68 governs hiring and monitoring of
          fund service providers. Both require due diligence, certification, and ongoing
          supervision of critical participants/providers.
      - id: art-74
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 135 art. 12 covers admission of brokers and intermediaries to the exchange.
          CVM 175 art. 74 covers distribution of fund units through authorized
          intermediaries. Both regulate intermediary access to their respective ecosystems.

  # ============================================================
  # CAP-3: OTC Market — Trading and Registration
  # ============================================================

  - source_control: art-16
    target_controls:
      - id: art-9
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 135 art. 16 governs OTC trading systems (quote-driven, auction, bilateral)
          for fixed income and derivatives. CVM 175 art. 9 requires fund managers to
          execute orders seeking best conditions. OTC market structure (135) is where
          funds execute a large portion of fixed income and derivatives trades (175).
      - id: art-21
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 135 art. 16 requires registration of all OTC operations with full
          counterparty and pricing data. CVM 175 art. 21 requires daily mark-to-market
          pricing. OTC trade registration data (135) feeds fund pricing processes (175).

  - source_control: art-18
    target_controls:
      - id: art-49
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CVM 135 art. 18 requires best execution and investor protection in OTC
          intermediation. CVM 175 art. 49 requires suitability verification for fund
          investors. Both protect investors accessing financial products through
          intermediaries, with best execution and adequacy checks.
      - id: art-74
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          CVM 135 art. 18 regulates market makers and intermediation in OTC markets.
          CVM 175 art. 74 regulates distribution of fund units through intermediaries.
          Both govern the intermediation chain between investors and financial products.

  - source_control: art-20
    target_controls:
      - id: art-23
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CVM 135 art. 20 requires registration and bilateral confirmation of OTC trades
          with 10-year retention. CVM 175 art. 23 requires daily tripartite reconciliation
          of fund positions. Both enforce operational integrity through trade registration,
          confirmation, and reconciliation.
      - id: art-19
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 135 art. 20 mandates STP integration between OTC registrars and clearing
          houses. CVM 175 art. 19 requires custody validation of fund operations.
          Trade registration infrastructure (135) provides the data custodians use to
          validate fund operations (175).

  # ============================================================
  # CAP-4: Trade Repositories
  # ============================================================

  - source_control: art-23
    target_controls:
      - id: art-19
        relationship: complements
        confidence: 0.80
        rationale: >
          CVM 135 art. 23 governs trade repository requirements (registration validity,
          uniqueness, data standardization). CVM 175 art. 19 requires qualified custody
          with asset verification. Trade repositories (135) provide the registration that
          establishes validity of assets held in fund custody (175).
      - id: art-23
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 135 art. 23 requires centralized data on all registered operations.
          CVM 175 art. 23 requires tripartite reconciliation including the central
          depository. Both rely on centralized, accurate records of securities ownership.

  - source_control: art-25
    target_controls:
      - id: art-43
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 135 art. 25 requires consolidated views of positions and reporting to
          regulators. CVM 175 art. 43 requires periodic disclosure of fund portfolio
          composition. Both generate transparency through position reporting,
          at infrastructure level (135) and fund level (175).
      - id: art-27
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 135 art. 25 requires detection of excessive position concentration per
          participant. CVM 175 art. 27 requires fund risk management including
          concentration limits. Both address concentration risk, at market level (135)
          and fund portfolio level (175).

  - source_control: art-28
    target_controls:
      - id: art-68
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 135 art. 28 requires interoperability between trade repositories using
          universal identifiers (UTI, LEI, ISIN). CVM 175 art. 68 requires fund
          administrators to supervise service providers including registrars. Data
          standardization at infrastructure level (135) enables effective supervision
          of providers by fund administrators (175).
      - id: art-23
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 135 art. 28 mandates reconciliation between trade repositories and
          portability of records. CVM 175 art. 23 mandates daily reconciliation
          between manager, custodian, and central depository. Interoperable
          infrastructure (135) supports accurate fund reconciliation (175).

  # ============================================================
  # CAP-5: Clearing Houses — CCP and Settlement
  # ============================================================

  - source_control: art-31
    target_controls:
      - id: art-27
        relationship: complements
        confidence: 0.80
        rationale: >
          CVM 135 art. 31 requires clearing houses to manage credit, liquidity,
          operational, market, and systemic risk. CVM 175 art. 27 requires funds to
          manage market, credit, liquidity, operational, and counterparty risk. Both
          enumerate the same risk categories, applied at different levels of the
          financial system.
      - id: art-35
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 135 art. 31 requires business continuity and recovery plans for clearing
          houses. CVM 175 art. 35 requires operational risk management and business
          continuity for funds. Both demand BCP for critical operations.
      - id: art-19
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 135 art. 31 requires settlement finality and certainty from CCPs.
          CVM 175 art. 19 requires custody with verification of asset existence and
          integrity. Settlement finality at clearing level (135) is what custodians
          verify for fund assets (175).

  - source_control: art-35
    target_controls:
      - id: art-27
        relationship: complements
        confidence: 0.80
        rationale: >
          CVM 135 art. 35 details margin models and collateral management for clearing
          houses. CVM 175 art. 27 requires risk management including counterparty risk.
          The margin system of CCPs (135) is the primary mechanism protecting fund
          positions against counterparty default (175).
      - id: art-30
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 135 art. 35 requires stress testing and backtesting of margin models.
          CVM 175 art. 30 requires stress testing of fund portfolios. Both mandate
          stress testing as a risk management tool, applied at infrastructure level (135)
          and fund portfolio level (175).

  - source_control: art-38
    target_controls:
      - id: art-35
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CVM 135 art. 38 requires business continuity for clearing houses with RTO of
          2 hours and RPO near zero. CVM 175 art. 35 requires BCP for fund operations
          including NAV calculation and order processing. Both mandate business continuity
          planning with tested DR infrastructure for critical financial operations.

  # ============================================================
  # CAP-6: Technology, Cybersecurity, and Contingency
  # ============================================================

  - source_control: art-41
    target_controls:
      - id: art-35
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CVM 135 art. 41 requires electronic systems with capacity, security, audit
          trails, secure SDLC, and annual pentests. CVM 175 art. 35 requires operational
          risk controls including system failure mitigation and BCP. Both demand robust
          technology infrastructure and security practices for financial operations.
      - id: art-58
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 135 art. 41 requires change management with independent approval for
          critical system changes. CVM 175 art. 58 requires internal controls and
          compliance programs. Both mandate formal control frameworks for operational
          integrity.

  - source_control: art-45
    target_controls:
      - id: art-35
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CVM 135 art. 45 requires comprehensive cybersecurity programs with CSIRT,
          24/7 monitoring, third-party risk management, and ISAC participation. CVM 175
          art. 35 requires operational risk management including cybersecurity scenarios.
          Both address cybersecurity, with CVM 135 being far more prescriptive due to
          the systemic importance of market infrastructure.
      - id: art-68
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 135 art. 45 requires security assessment of critical technology vendors.
          CVM 175 art. 68 requires due diligence and continuous monitoring of fund
          service providers. Both mandate third-party risk management.

  - source_control: art-48
    target_controls:
      - id: art-35
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          CVM 135 art. 48 requires operational contingency plans for trading venues
          including semestral tests with participants. CVM 175 art. 35 requires BCP
          for fund operations with periodic testing. Both mandate contingency planning
          and testing for critical financial operations.
      - id: art-46
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 135 art. 48 requires immediate communication to participants and CVM
          during contingency activation. CVM 175 art. 46 requires immediate disclosure
          of material facts to investors and CVM. Both mandate immediate stakeholder
          communication during crisis events.

  # ============================================================
  # CAP-7: Tokenization and DLT
  # ============================================================

  - source_control: art-51
    target_controls:
      - id: anx-v-art-1
        relationship: complements
        confidence: 0.90
        rationale: >
          CVM 135 art. 51 regulates trading of tokenized securities on organized
          markets, including DLT security and key custody. CVM 175 Annex V art. 1
          regulates fund investment in crypto assets. CVM 135 governs the trading
          infrastructure; CVM 175 governs the funds investing through it.
      - id: anx-v-art-4
        relationship: complements
        confidence: 0.85
        rationale: >
          CVM 135 art. 51 requires secure custody of cryptographic keys for tokenized
          securities. CVM 175 Annex V art. 4 requires institutional custody of crypto
          assets with HSM and multisig. Both demand secure key management, at
          infrastructure level (135) and fund custody level (175).

  - source_control: art-54
    target_controls:
      - id: anx-v-art-7
        relationship: complements
        confidence: 0.85
        rationale: >
          CVM 135 art. 54 requires DLT security (consensus, immutability, privacy,
          governance). CVM 175 Annex V art. 7 requires crypto-specific risk management
          (protocol risk, liquidity fragmentation, exchange counterparty risk). Both
          address DLT/blockchain risks, at infrastructure level (135) and fund portfolio
          level (175).
      - id: anx-v-art-4
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 135 art. 54 requires DLT contingency plans for forks and consensus loss.
          CVM 175 Annex V art. 4 requires backup and recovery of private keys and
          segregation of crypto wallets. Both mandate resilience for DLT-based operations.

  - source_control: art-57
    target_controls:
      - id: anx-v-art-1
        relationship: complements
        confidence: 0.80
        rationale: >
          CVM 135 art. 57 authorizes regulatory sandboxes for innovative trading,
          registration, or settlement models. CVM 175 Annex V art. 1 allows retail
          fund exposure to crypto up to 5% of NAV, reflecting graduated regulatory
          openness. Both represent CVM's approach to regulated innovation in digital
          assets.
      - id: art-78
        relationship: complements
        confidence: 0.65
        rationale: >
          CVM 135 art. 57 provides sandbox exit criteria and investor protection during
          wind-down. CVM 175 art. 78 provides transition rules for existing funds to
          comply with the new framework. Both address regulatory transition mechanisms
          with investor protection safeguards.

  # ============================================================
  # CAP-8: Market Surveillance and Self-Regulation
  # ============================================================

  - source_control: art-59
    target_controls:
      - id: art-58
        relationship: complements
        confidence: 0.80
        rationale: >
          CVM 135 art. 59 requires market surveillance with real-time monitoring,
          manipulation detection, and independent analysts. CVM 175 art. 58 requires
          compliance programs with irregularity detection mechanisms. Both mandate
          monitoring and detection of irregular activities, at market level (135) and
          fund level (175).
      - id: art-65
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 135 art. 59 includes investigation of suspicious operations and reporting
          to CVM. CVM 175 art. 65 requires AML/CFT monitoring and suspicious activity
          reporting to COAF. Both mandate detection and reporting of suspicious activities
          through independent surveillance.

  - source_control: art-62
    target_controls:
      - id: art-82
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CVM 135 art. 62 establishes sanctioning regime for exchange participants
          (warning, fine, suspension, exclusion) and investor compensation mechanism
          (MRP). CVM 175 art. 82 establishes sanctioning regime for fund actors
          (warning, fine, suspension, disqualification, license revocation). Both
          define graduated enforcement with investor protection.
      - id: art-15
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 135 art. 62 provides the investor loss compensation mechanism (MRP) at
          market level. CVM 175 art. 15 defines civil liability of administrators and
          managers including limited liability for unit holders. Both address investor
          protection and loss recovery mechanisms.

  - source_control: art-65
    target_controls:
      - id: art-58
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 135 art. 65 requires cross-market surveillance and international
          cooperation via IOSCO MoUs. CVM 175 art. 58 requires compliance programs
          with detection mechanisms. Cross-market surveillance at infrastructure level
          (135) complements fund-level compliance monitoring (175).
      - id: art-65
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 135 art. 65 mandates reporting of atypical cross-listed trading patterns
          to CVM. CVM 175 art. 65 mandates AML/CFT monitoring and reporting. Both
          contribute to the integrity of the Brazilian capital market through
          surveillance and reporting regimes.

  # ============================================================
  # CAP-9: Governance, Conflicts, and Internal Controls
  # ============================================================

  - source_control: art-69
    target_controls:
      - id: art-7
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CVM 135 art. 69 requires corporate governance with independent board members,
          specialized committees, and a code of conduct. CVM 175 art. 7 establishes
          fiduciary duties of fund administrators (diligence, loyalty, transparency,
          good faith). Both establish governance frameworks for their respective
          regulated entities.
      - id: art-12
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CVM 135 art. 69 requires separation between management and self-regulation
          functions. CVM 175 art. 12 requires segregation between administration and
          portfolio management functions. Both mandate functional segregation to
          prevent conflicts of interest.
      - id: art-58
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 135 art. 69 requires whistleblowing channels and code of conduct. CVM 175
          art. 58 requires whistleblowing channels within compliance programs. Both
          mandate accessible and confidential reporting mechanisms.

  - source_control: art-72
    target_controls:
      - id: art-62
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          CVM 135 art. 72 requires conflict of interest management policies including
          chinese walls, segregation, and periodic disclosure. CVM 175 art. 62 requires
          conflict of interest policies including mapping, prevention, related-party
          transaction rules, and disclosure. Both demand comprehensive conflict
          management frameworks with nearly identical structural elements.
      - id: art-60
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          CVM 135 art. 72 mandates information barriers (chinese walls) between areas
          with potential conflicts. CVM 175 art. 60 mandates chinese walls between
          conflicting functions. Both require physical segregation, logical access
          controls, communication policies, and documentation of barrier crossing.
      - id: art-12
        relationship: complements
        confidence: 0.75
        rationale: >
          CVM 135 art. 72 requires segregation between trading, registration, clearing,
          and supervision. CVM 175 art. 12 requires segregation between fund
          administration and portfolio management. Both address functional segregation
          as a conflict management mechanism.
      - id: art-18
        relationship: complements
        confidence: 0.70
        rationale: >
          CVM 135 art. 72 prohibits proprietary trading by the exchange administrator.
          CVM 175 art. 18 prohibits administrators/managers from obtaining benefits at
          the fund's expense. Both establish absolute prohibitions to protect the
          regulated entity's assets.

  - source_control: art-75
    target_controls:
      - id: art-58
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          CVM 135 art. 75 requires internal audit, internal controls, compliance
          function, and annual external audit. CVM 175 art. 58 requires compliance
          and internal controls programs. Both mandate the three-lines-of-defense
          model: operational controls, compliance, and independent audit.
      - id: art-71
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          CVM 135 art. 75 requires annual independent external audit covering internal
          controls and risk management. CVM 175 art. 71 requires independent audit of
          fund financial statements with 5-year firm rotation. Both mandate independent
          external audits as an assurance mechanism.

  # ============================================================
  # CAP-10: Transition Rules and Penalties
  # ============================================================

  - source_control: art-79
    target_controls:
      - id: art-78
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          CVM 135 art. 79 establishes transition timelines (180/360 days) for existing
          entities to comply with new requirements. CVM 175 art. 78 establishes 12-month
          transition for existing funds. Both provide graduated transition periods
          with formal adequacy plans and CVM communication upon completion.

  - source_control: art-82
    target_controls:
      - id: art-82
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          CVM 135 art. 82 establishes penalties including fines up to R$ 50 million,
          suspension, disqualification, and license revocation, with dosimetry criteria.
          CVM 175 art. 82 establishes equivalent penalties with similar dosimetry
          criteria. Both share the same sanctioning structure and proportionality
          principles from the securities market legislation.
      - id: art-15
        relationship: complements
        confidence: 0.65
        rationale: >
          CVM 135 art. 82 addresses administrative penalties without excluding civil
          and criminal liability. CVM 175 art. 15 defines civil liability regime for
          fund administrators and managers. Both establish accountability frameworks
          with multiple layers of liability.

