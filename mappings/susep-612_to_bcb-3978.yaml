id: susep-612_to_bcb-3978
title: "SUSEP 612 to BCB 3978 Control Mapping"
source_framework: susep-612
target_framework: bcb-3978
version: "1.0.0"
last_updated: "2026-04-03"
methodology: semantic
description: >
  Mapeamento entre a Circular SUSEP 612/2020 (PLD/FT para mercado de seguros) e a
  Circular BCB 3.978/2020 (PLD/FT para sistema financeiro). Ambas regulamentam
  prevencao a lavagem de dinheiro e financiamento do terrorismo em setores distintos,
  seguindo as mesmas recomendacoes GAFI/FATF.

mappings:
  - source_control: art-1
    target_controls:
      - id: art-1
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Ambos definem o objeto da regulamentacao de PLD/FT. SUSEP 612 aplica-se
          ao mercado de seguros; BCB 3.978 aplica-se ao sistema financeiro.

  - source_control: art-4
    target_controls:
      - id: art-3
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Politica institucional de PLD/FT — ambos exigem politica formal,
          aprovada pela alta administracao, com programa de compliance.

  - source_control: art-5
    target_controls:
      - id: art-4
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Conteudo minimo da politica de PLD/FT — ambos listam requisitos
          semelhantes para a politica institucional.

  - source_control: art-6
    target_controls:
      - id: art-5
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Governanca da politica de PLD/FT — responsabilidades da alta administracao
          e designacao de responsavel pelo compliance de PLD/FT.

  - source_control: art-8
    target_controls:
      - id: art-6
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Avaliacao interna de risco de PLD/FT — ambos exigem AIR com metodologia
          baseada em risco, considerando clientes, produtos, canais e jurisdicoes.

  - source_control: art-9
    target_controls:
      - id: art-7
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Categorias de risco na AIR — clientes, operacoes, produtos/servicos,
          canais de distribuicao e areas geograficas.

  - source_control: art-10
    target_controls:
      - id: art-8
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Periodicidade de revisao da AIR e atualizacao conforme mudancas
          no perfil de risco da instituicao.

  - source_control: art-12
    target_controls:
      - id: art-10
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Procedimentos de identificacao do cliente (KYC) — ambos exigem
          coleta de informacoes cadastrais, verificacao documental e
          atualizacao periodica.

  - source_control: art-13
    target_controls:
      - id: art-11
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Informacoes minimas do cadastro de clientes — CPF/CNPJ, endereco,
          atividade economica, renda/faturamento.

  - source_control: art-14
    target_controls:
      - id: art-12
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Procedimentos de KYC para pessoas juridicas — identificacao de
          beneficiarios finais, estrutura societaria, representantes legais.

  - source_control: art-15
    target_controls:
      - id: art-13
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Enhanced due diligence (EDD) para clientes de maior risco —
          procedimentos reforçados de identificacao e monitoramento.

  - source_control: art-16
    target_controls:
      - id: art-14
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Atualizacao cadastral periodica — ambos exigem revisao e atualizacao
          dos dados cadastrais em periodicidade definida pelo risco do cliente.

  - source_control: art-19
    target_controls:
      - id: art-18
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Registro de operacoes — ambos exigem registro completo de todas
          as operacoes realizadas, incluindo identificacao dos envolvidos
          e valores.

  - source_control: art-20
    target_controls:
      - id: art-19
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Prazo de manutencao de registros — ambos exigem conservacao por
          no minimo 10 anos apos a realizacao da operacao ou encerramento
          da relacao de negocio.

  - source_control: art-23
    target_controls:
      - id: art-21
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Monitoramento de operacoes e situacoes suspeitas — ambos exigem
          sistemas automatizados de monitoramento com parametros baseados
          na AIR.

  - source_control: art-24
    target_controls:
      - id: art-22
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Selecao de operacoes para analise — ambos exigem criterios
          predefinidos para selecao automatizada de transacoes atipicas.

  - source_control: art-25
    target_controls:
      - id: art-23
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Analise de operacoes selecionadas — procedimentos de investigacao
          interna para determinar se ha suspeita de lavagem de dinheiro.

  - source_control: art-28
    target_controls:
      - id: art-25
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          Comunicacao ao COAF — ambos exigem comunicacao de operacoes suspeitas
          ao Conselho de Controle de Atividades Financeiras no prazo regulamentar.

  - source_control: art-29
    target_controls:
      - id: art-26
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Prazo para comunicacao ao COAF — 24 horas para operacoes em especie
          acima do limite, e sem prazo definido (analise caso a caso) para
          operacoes suspeitas.

  - source_control: art-30
    target_controls:
      - id: art-27
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Comunicacao automatica de operacoes em especie acima do limite
          regulamentar ao COAF (atualmente R$ 50.000).

  - source_control: art-33
    target_controls:
      - id: art-31
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          Procedimentos especiais para Pessoas Politicamente Expostas (PEPs) —
          ambos exigem EDD, aprovacao da alta administracao para
          relacionamento e monitoramento reforçado.

  - source_control: art-34
    target_controls:
      - id: art-32
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Definicao de PEPs e familiares/estreitos colaboradores — ambos
          seguem as definicoes GAFI/FATF e legislacao brasileira.

  - source_control: art-35
    target_controls:
      - id: art-33
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          Monitoramento reforçado de PEPs — periodicidade de revisao
          cadastral reduzida e limites de alerta mais baixos.

metadata:
  total_mappings: 23
  average_confidence: 0.89
  relationship_summary:
    equivalent-to: 23
  notes: >
    SUSEP 612/2020 e BCB 3.978/2020 sao regulamentos de PLD/FT para setores distintos
    (seguros vs sistema financeiro) baseados nas mesmas recomendacoes GAFI/FATF e na
    Lei 9.613/1998. A estrutura e quase identica: politica, AIR, KYC, registro,
    monitoramento, COAF, PEPs. As diferencas residem nos produtos monitorados
    (apolices vs contas/transacoes) e nos limites de comunicacao automatica.
