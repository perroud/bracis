id: mas-trm_to_iso-27001
title: "MAS TRM to ISO/IEC 27001:2022 Control Mapping"
source_framework: mas-trm
target_framework: iso-27001-2022
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # Section 3 — Technology Risk Governance and Oversight

  - source_control: trm-3-1
    target_controls:
      - id: a5-1
        relationship: intersects-with
        confidence: 0.92
        rationale: >
          MAS TRM 3-1 requires board-approved technology risk management
          strategy, policies, and risk appetite. ISO A.5.1 requires
          management-approved information security policies that are defined,
          published, and reviewed at planned intervals. Both mandate
          top-level governance ownership of security policy frameworks.
      - id: a5-2
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          MAS TRM 3-1 requires an organizational structure with clear roles,
          responsibilities, and reporting lines for technology risk including
          CIO/CISO appointment. ISO A.5.2 requires that information security
          roles and responsibilities be defined and allocated with segregation
          of conflicting duties. Both address organizational accountability
          for security functions.
      - id: a5-36
        relationship: complements
        confidence: 0.75
        rationale: >
          MAS TRM 3-1 requires the board to receive regular reports on
          technology risk profile and annual briefings on framework
          effectiveness. ISO A.5.36 requires regular compliance reviews
          against established policies. MAS TRM's governance reporting
          complements ISO's compliance verification mechanism.

  # Section 4 — Technology Risk Management Framework

  - source_control: trm-4-1
    target_controls:
      - id: a5-1
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          MAS TRM 4-1 requires a comprehensive technology risk management
          framework with documented policies, approved by senior management
          and reviewed annually. ISO A.5.1 requires defined, management-approved
          information security policies reviewed at planned intervals. Both
          mandate a structured, documented policy foundation for risk management.
      - id: a8-8
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          MAS TRM 4-1 requires regular technology risk assessments to
          identify and evaluate risks from IT systems, including vulnerability
          identification and risk register maintenance. ISO A.8.8 requires
          obtaining technical vulnerability information, evaluating exposure,
          and taking appropriate measures. Both address systematic vulnerability
          identification and risk-based remediation.
      - id: a5-36
        relationship: complements
        confidence: 0.78
        rationale: >
          MAS TRM 4-1 requires key risk indicators and risk reporting
          mechanisms for management and board. ISO A.5.36 requires regular
          compliance reviews with documented results and corrective actions.
          MAS TRM's risk reporting complements ISO's compliance monitoring
          to provide comprehensive oversight.

  # Section 5 — IT Project Management and Security-by-Design

  - source_control: trm-5-1
    target_controls:
      - id: a8-25
        relationship: intersects-with
        confidence: 0.92
        rationale: >
          MAS TRM 5-1 requires security-by-design principles throughout the
          project lifecycle including security requirements definition, threat
          modelling, and security testing before production. ISO A.8.25
          requires rules for secure development of software and systems
          covering the entire SDLC. Both mandate integrating security into
          every phase of development from inception through deployment.
      - id: a8-28
        relationship: complements
        confidence: 0.80
        rationale: >
          MAS TRM 5-1 requires security testing including vulnerability
          assessments and penetration testing before production promotion,
          with remediation of identified vulnerabilities. ISO A.8.28 requires
          secure coding principles including threat modelling, input
          validation, and secure error handling. MAS TRM's project-level
          security testing complements ISO's coding-level security practices.
      - id: a8-8
        relationship: complements
        confidence: 0.72
        rationale: >
          MAS TRM 5-1 requires vulnerability assessments and penetration
          testing as part of project delivery. ISO A.8.8 requires systematic
          management of technical vulnerabilities. MAS TRM's project-scoped
          vulnerability testing complements ISO's broader vulnerability
          management program.

  # Section 6 — Software Application Development and Management

  - source_control: trm-6-1
    target_controls:
      - id: a8-25
        relationship: implements
        confidence: 0.95
        rationale: >
          MAS TRM 6-1 prescribes a secure software development lifecycle
          (SSDLC) integrating security into all phases, separate environments,
          application security testing (SAST, DAST, SCA), and application
          inventory management. ISO A.8.25 requires rules for secure
          development of software and systems. MAS TRM 6-1 directly
          implements ISO A.8.25 with financial-sector-specific rigor.
      - id: a8-28
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          MAS TRM 6-1 requires developers to follow secure coding standards
          aligned with OWASP Top 10, training on secure practices, and
          application security testing before deployment. ISO A.8.28 requires
          secure coding principles including OWASP and CWE guidelines. Both
          address the same secure coding fundamentals with high overlap.
      - id: a8-8
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          MAS TRM 6-1 requires maintaining application inventories including
          dependencies, end-of-life management, patch management, and timely
          retirement of unsupported software. ISO A.8.8 requires obtaining
          vulnerability information, evaluating exposure, and applying patches
          with defined timelines. Both address vulnerability and patch
          management for application components.
      - id: a8-9
        relationship: complements
        confidence: 0.72
        rationale: >
          MAS TRM 6-1 requires separate environments for development, testing,
          staging, and production with access controls preventing unauthorized
          promotion. ISO A.8.9 requires documented configurations including
          security configurations monitored for drift. MAS TRM's environment
          segregation complements ISO's broader configuration management scope.

  # Section 6 — Source Code Review

  - source_control: trm-6-2
    target_controls:
      - id: a8-28
        relationship: implements
        confidence: 0.92
        rationale: >
          MAS TRM 6-2 requires mandatory source code review with automated
          SAST aligned to OWASP Top 10 and CWE/SANS Top 25, peer review,
          branch protection, and finding remediation tracking. ISO A.8.28
          requires secure coding principles with code reviews and secure
          coding verification. MAS TRM 6-2 directly implements ISO A.8.28's
          code review and secure coding verification requirements.
      - id: a8-25
        relationship: complements
        confidence: 0.82
        rationale: >
          MAS TRM 6-2 requires version-controlled repositories with branch
          protection, audit trails, and SAST integration in the development
          pipeline. ISO A.8.25 addresses secure repositories for source code,
          security in version control, and security checkpoints in projects.
          MAS TRM's code review process complements ISO's broader SDLC
          security requirements.

  # Section 7 — IT Service Management

  - source_control: trm-7-1
    target_controls:
      - id: a8-9
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          MAS TRM 7-1 requires formal change management, configuration
          baselines, CMDB maintenance, and monitoring for unauthorized
          deviations. ISO A.8.9 requires established, documented, and
          monitored configurations with drift detection and remediation.
          Both mandate controlled configuration management with change
          tracking and baseline enforcement.
      - id: a5-1
        relationship: complements
        confidence: 0.70
        rationale: >
          MAS TRM 7-1 requires established ITSM processes for change,
          incident, and problem management as part of the overall governance
          framework. ISO A.5.1 requires topic-specific policies that address
          incident management and related operational concerns. MAS TRM's
          ITSM process requirements complement ISO's policy framework.
      - id: a8-15
        relationship: complements
        confidence: 0.75
        rationale: >
          MAS TRM 7-1 requires incident detection, logging, classification,
          escalation, and resolution processes. ISO A.8.15 requires logs
          that record activities, exceptions, and faults with proper
          storage and analysis. MAS TRM's incident logging requirements
          complement ISO's comprehensive logging framework.

  # Section 8 — System Reliability, Availability and Recoverability

  - source_control: trm-8-1
    target_controls:
      - id: a5-1
        relationship: complements
        confidence: 0.68
        rationale: >
          MAS TRM 8-1 requires establishing availability and recovery targets
          (RTO/RPO), disaster recovery plans, and backup procedures aligned
          with business requirements. ISO A.5.1 requires topic-specific
          policies that should address backup and business continuity. MAS
          TRM's detailed resilience requirements complement ISO's policy-level
          requirement for backup and continuity coverage.
      - id: a8-1
        relationship: complements
        confidence: 0.60
        rationale: >
          MAS TRM 8-1 requires system redundancy, failover capabilities,
          and capacity planning for critical systems. ISO A.8.1 addresses
          protection of information on user endpoint devices including
          backup provisions. Both address availability and data protection
          but from different infrastructure perspectives — MAS TRM focuses
          on backend systems while ISO targets endpoints.
      - id: a8-9
        relationship: complements
        confidence: 0.70
        rationale: >
          MAS TRM 8-1 requires documented disaster recovery plans tested
          annually with configuration baselines for critical systems. ISO
          A.8.9 requires established and documented configurations that are
          monitored and reviewed. MAS TRM's DR configuration requirements
          complement ISO's general configuration management framework.

  # Section 9 — Access Control

  - source_control: trm-9-1
    target_controls:
      - id: a5-15
        relationship: implements
        confidence: 0.95
        rationale: >
          MAS TRM 9-1 requires access control policies, least privilege,
          need-to-know, periodic review of access rights, MFA for critical
          systems, and privileged access management. ISO A.5.15 requires
          rules to control logical and physical access based on business
          and security requirements with periodic access reviews. MAS TRM
          9-1 directly implements ISO A.5.15 with financial-sector-specific
          MFA and PAM requirements.
      - id: a5-2
        relationship: intersects-with
        confidence: 0.82
        rationale: >
          MAS TRM 9-1 requires segregation of duties enforced through
          technical controls to prevent single-individual conflicting roles.
          ISO A.5.2 requires that activities which cannot be performed by
          the same person be segregated. Both address segregation of duties
          as a fundamental security principle.
      - id: a8-15
        relationship: complements
        confidence: 0.70
        rationale: >
          MAS TRM 9-1 requires audit logging of all authentication and
          authorization events, monitoring for anomalies including brute
          force and credential stuffing. ISO A.8.15 requires logs recording
          successful and rejected access attempts. MAS TRM's access
          monitoring requirements complement ISO's broader logging framework.

  # Section 9 — Cryptography

  - source_control: trm-9-2
    target_controls:
      - id: a8-25
        relationship: complements
        confidence: 0.72
        rationale: >
          MAS TRM 9-2 requires cryptographic policy with approved algorithms,
          key management practices, and encryption of data at rest and in
          transit. ISO A.8.25 addresses security in the development lifecycle
          which includes cryptography usage requirements. MAS TRM's detailed
          cryptographic controls complement ISO's SDLC-embedded cryptography
          expectations.
      - id: a8-28
        relationship: complements
        confidence: 0.70
        rationale: >
          MAS TRM 9-2 requires deprecated algorithm replacement and
          strong encryption (TLS 1.2+) with key lifecycle management. ISO
          A.8.28 addresses secure coding principles including proper
          cryptography usage. MAS TRM's cryptographic standards complement
          ISO's coding-level cryptography requirements.
      - id: a5-1
        relationship: complements
        confidence: 0.65
        rationale: >
          MAS TRM 9-2 requires a cryptographic policy defining approved
          algorithms, key lengths, and protocols. ISO A.5.1 requires
          topic-specific policies including cryptography and key management.
          MAS TRM's cryptographic policy requirement directly aligns with
          ISO's expectation for topic-specific security policies.

  # Section 10 — Data and Infrastructure Security

  - source_control: trm-10-1
    target_controls:
      - id: a8-8
        relationship: intersects-with
        confidence: 0.88
        rationale: >
          MAS TRM 10-1 requires patch management processes with risk-based
          timelines for security patches and compensating controls. ISO
          A.8.8 requires evaluating vulnerability exposure and taking
          appropriate measures including patching with defined timelines.
          Both mandate systematic vulnerability and patch management with
          risk-based prioritization.
      - id: a8-9
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          MAS TRM 10-1 requires security hardening baselines for all systems
          with configuration drift monitoring. ISO A.8.9 requires established
          security configurations using standards like CIS benchmarks with
          regular review against defined templates. Both address security
          hardening and configuration baseline management.
      - id: a8-1
        relationship: intersects-with
        confidence: 0.78
        rationale: >
          MAS TRM 10-1 requires endpoint security controls including
          anti-malware, EDR, and device management with restrictions on
          unmanaged devices. ISO A.8.1 requires protection of information
          on endpoint devices including malware protection, encryption,
          and device management. Both address endpoint security with
          overlapping control requirements.
      - id: a8-15
        relationship: complements
        confidence: 0.72
        rationale: >
          MAS TRM 10-1 requires IDS/IPS, network monitoring, and DLP
          controls that generate security events. ISO A.8.15 requires
          comprehensive logging including records of access attempts and
          alarm events from detection systems. MAS TRM's security monitoring
          data feeds complement ISO's logging infrastructure requirements.
      - id: a5-15
        relationship: complements
        confidence: 0.70
        rationale: >
          MAS TRM 10-1 requires network segmentation with controlled access
          points for critical systems. ISO A.5.15 requires access control
          rules implemented based on security requirements. MAS TRM's
          network-level access controls complement ISO's broader access
          control framework.

  # Section 10 — Security Monitoring and Testing

  - source_control: trm-10-2
    target_controls:
      - id: a8-8
        relationship: implements
        confidence: 0.92
        rationale: >
          MAS TRM 10-2 requires regular vulnerability assessments, annual
          penetration testing, red team exercises, and centralized
          vulnerability tracking with remediation SLAs. ISO A.8.8 requires
          obtaining technical vulnerability information, evaluating exposure,
          and taking appropriate measures. MAS TRM 10-2 implements ISO
          A.8.8 with prescriptive testing frequency and methodology
          requirements specific to financial institutions.
      - id: a5-36
        relationship: complements
        confidence: 0.75
        rationale: >
          MAS TRM 10-2 requires management reports on vulnerability trends,
          remediation effectiveness, and residual risk. ISO A.5.36 requires
          regular compliance reviews with documented results and corrective
          actions. MAS TRM's security testing reporting complements ISO's
          compliance verification framework.

  # Section 11 — Cyber Security Operations

  - source_control: trm-11-1
    target_controls:
      - id: a8-15
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          MAS TRM 11-1 requires SIEM implementation for aggregating,
          correlating, and analyzing security events with tuned detection
          rules. ISO A.8.15 requires logs to be produced, stored, protected,
          and analysed including system activities, access attempts, and
          security events. Both mandate comprehensive security event
          collection and analysis.
      - id: a8-8
        relationship: complements
        confidence: 0.72
        rationale: >
          MAS TRM 11-1 requires threat intelligence programs integrated
          into detection rules and vulnerability prioritization. ISO A.8.8
          addresses obtaining vulnerability information and evaluating
          exposure. MAS TRM's threat intelligence enriches ISO's
          vulnerability management with contextual threat data.
      - id: a5-1
        relationship: complements
        confidence: 0.65
        rationale: >
          MAS TRM 11-1 requires 24/7 SOC operations, threat intelligence
          programs, and industry information-sharing participation. ISO
          A.5.1 requires topic-specific policies addressing incident
          management. MAS TRM's operational SOC requirements implement
          the operational side of ISO's incident-related policy mandate.

  # Section 11 — Cyber Incident Response and Management

  - source_control: trm-11-2
    target_controls:
      - id: a5-1
        relationship: complements
        confidence: 0.72
        rationale: >
          MAS TRM 11-2 requires a senior-management-approved cyber incident
          response plan with defined roles, escalation procedures, and
          annual review. ISO A.5.1 requires topic-specific policies
          including information security incident management. MAS TRM's
          incident response plan directly addresses the incident management
          policy component of ISO A.5.1.
      - id: a8-15
        relationship: complements
        confidence: 0.75
        rationale: >
          MAS TRM 11-2 requires incident classification, severity-based
          response timelines, and post-incident review with documented
          lessons learned. ISO A.8.15 requires logging of exceptions,
          faults, and relevant events. MAS TRM's incident lifecycle
          documentation complements ISO's event logging requirements
          with structured incident records.
      - id: a5-36
        relationship: complements
        confidence: 0.68
        rationale: >
          MAS TRM 11-2 requires incident response exercises, post-incident
          reviews, root cause analysis, and corrective actions integrated
          back into the risk management framework. ISO A.5.36 requires
          regular compliance reviews with corrective actions. MAS TRM's
          incident review process complements ISO's continuous compliance
          improvement cycle.
      - id: a5-2
        relationship: complements
        confidence: 0.70
        rationale: >
          MAS TRM 11-2 defines clear roles and responsibilities for incident
          response including escalation to senior management and regulatory
          notification. ISO A.5.2 requires defined and allocated information
          security roles. MAS TRM's incident-specific role definitions
          complement ISO's general security role allocation.

  # Section 12 — IT Outsourcing and Third-Party Management

  - source_control: trm-12-1
    target_controls:
      - id: a5-23
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          MAS TRM 12-1 requires due diligence on technology providers,
          contractual security provisions, ongoing monitoring, concentration
          risk management, and exit planning. ISO A.5.23 requires
          established processes for acquisition, use, management, and exit
          from cloud services with security risk management. Both address
          third-party technology provider governance with overlapping
          requirements for due diligence, contractual controls, and exit
          strategies.
      - id: a5-1
        relationship: complements
        confidence: 0.68
        rationale: >
          MAS TRM 12-1 requires comprehensive outsourcing risk management
          policies with regulatory compliance provisions. ISO A.5.1 requires
          management-approved security policies addressing relevant topics.
          MAS TRM's outsourcing policy requirements complement ISO's
          general policy framework with third-party-specific governance.
      - id: a8-8
        relationship: complements
        confidence: 0.72
        rationale: >
          MAS TRM 12-1 requires maintaining an inventory of all material
          outsourcing arrangements and third-party technology dependencies
          with continuous vulnerability monitoring. ISO A.8.8 requires
          a current asset inventory as a prerequisite for vulnerability
          management. MAS TRM's third-party dependency tracking complements
          ISO's asset-based vulnerability management.

  # Section 13 — IT Audit

  - source_control: trm-13-1
    target_controls:
      - id: a5-36
        relationship: implements
        confidence: 0.92
        rationale: >
          MAS TRM 13-1 requires an independent IT audit function with
          risk-based audit plans, severity-classified findings, tracked
          remediation, and comprehensive coverage of all technology risk
          domains. ISO A.5.36 requires regular compliance reviews with
          documented results, corrective actions, and reporting. MAS TRM
          13-1 directly implements ISO A.5.36 with a structured,
          independent audit function.
      - id: a5-1
        relationship: complements
        confidence: 0.70
        rationale: >
          MAS TRM 13-1 requires IT audit coverage across access controls,
          change management, data security, business continuity, and
          outsourcing. ISO A.5.1 requires topic-specific security policies
          for these same domains. MAS TRM's audit coverage validates the
          effectiveness of the policy framework required by ISO A.5.1.
      - id: a5-2
        relationship: complements
        confidence: 0.72
        rationale: >
          MAS TRM 13-1 requires an independent IT audit function that
          reports to the audit committee or board, with auditors possessing
          adequate technology risk expertise. ISO A.5.2 requires information
          security roles to be defined and allocated with competent
          personnel. MAS TRM's audit independence and competency
          requirements complement ISO's role allocation framework.

  # Section 14 — Online Financial Services

  - source_control: trm-14-1
    target_controls:
      - id: a5-15
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          MAS TRM 14-1 requires strong customer authentication with MFA
          for high-risk transactions, session management controls, and
          re-authentication for sensitive operations. ISO A.5.15 requires
          access control rules based on business and security requirements.
          Both address authentication and access control, with MAS TRM
          specifying customer-facing financial service requirements.
      - id: a8-25
        relationship: complements
        confidence: 0.78
        rationale: >
          MAS TRM 14-1 requires mobile applications to be developed using
          secure coding practices with mobile-specific security assessments
          and official app store distribution. ISO A.8.25 requires rules
          for secure development of software and systems. MAS TRM's
          mobile-specific development requirements complement ISO's
          general SDLC security framework.
      - id: a8-28
        relationship: complements
        confidence: 0.75
        rationale: >
          MAS TRM 14-1 requires secure API design, end-to-end encryption,
          tokenization, and session token handling for online financial
          services. ISO A.8.28 requires secure coding principles including
          input validation and cryptography usage. MAS TRM's online
          service-specific coding requirements complement ISO's general
          secure coding principles.
      - id: a8-8
        relationship: complements
        confidence: 0.70
        rationale: >
          MAS TRM 14-1 requires real-time transaction monitoring, fraud
          detection, and mobile application security testing. ISO A.8.8
          requires evaluating vulnerability exposure and taking appropriate
          measures. MAS TRM's customer-facing application vulnerability
          requirements complement ISO's general vulnerability management.
