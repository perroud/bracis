id: category-correlation
title: "Framework Correlation by Category"
last_updated: "2026-04-05"
description: >
  Correlation matrices showing how frameworks within each category address
  common concepts. Every framework appears in at least one category.

categories:

  # ════════════════════════════════════════════════════════════════
  # PRIVACY & DATA PROTECTION
  # ════════════════════════════════════════════════════════════════
  - category: privacy
    description: "Privacy and data protection frameworks"
    frameworks: [gdpr, lgpd, ccpa-cpra, iso-27701, hipaa]
    correlation_matrix:
      common_concepts:

        - concept: "Consent / legal basis for processing"
          gdpr: "art-6"
          lgpd: "art-7"
          ccpa-cpra: "sec-1798-120"
          iso-27701: "a-7-2-2"
          hipaa: "164-508"

        - concept: "Right of access / right to know"
          gdpr: "art-15"
          lgpd: "art-18"
          ccpa-cpra: "sec-1798-100"
          iso-27701: "a-7-3-2"
          hipaa: "164-524"

        - concept: "Right to deletion / erasure"
          gdpr: "art-17"
          lgpd: "art-18-VI"
          ccpa-cpra: "sec-1798-105"
          iso-27701: "a-7-4-5"
          hipaa: "N/A"

        - concept: "Data breach notification"
          gdpr: "art-33, art-34"
          lgpd: "art-48"
          ccpa-cpra: "sec-1798-150"
          iso-27701: "N/A"
          hipaa: "164-404, 164-408"

        - concept: "Data protection officer / encarregado"
          gdpr: "art-37"
          lgpd: "art-41"
          ccpa-cpra: "N/A"
          iso-27701: "cl-5-2"
          hipaa: "N/A"

        - concept: "Impact assessment (DPIA / RIPD)"
          gdpr: "art-35"
          lgpd: "art-38"
          ccpa-cpra: "sec-1798-185"
          iso-27701: "a-7-2-5"
          hipaa: "164-308-a1"

        - concept: "Cross-border data transfers"
          gdpr: "art-44 to art-49"
          lgpd: "art-33 to art-36"
          ccpa-cpra: "N/A"
          iso-27701: "a-7-5-1, a-7-5-2"
          hipaa: "N/A"

        - concept: "Security measures / safeguards"
          gdpr: "art-32"
          lgpd: "art-46"
          ccpa-cpra: "sec-1798-150"
          iso-27701: "cl-7-1"
          hipaa: "164-312-a1"

        - concept: "Data minimization / purpose limitation"
          gdpr: "art-5-1-b, art-5-1-c"
          lgpd: "art-6-I, art-6-III"
          ccpa-cpra: "sec-1798-100-c"
          iso-27701: "a-7-2-1, a-7-4-4"
          hipaa: "164-502-b (minimum necessary)"

        - concept: "Right to rectification / correction"
          gdpr: "art-16"
          lgpd: "art-18-III"
          ccpa-cpra: "sec-1798-106"
          iso-27701: "a-7-3-6"
          hipaa: "164-526"

        - concept: "Right to data portability"
          gdpr: "art-20"
          lgpd: "art-18-V"
          ccpa-cpra: "sec-1798-130"
          iso-27701: "a-7-3-7"
          hipaa: "N/A"

        - concept: "Processor / operator obligations"
          gdpr: "art-28"
          lgpd: "art-39"
          ccpa-cpra: "sec-1798-140-j (service providers)"
          iso-27701: "cl-8 (PII processor)"
          hipaa: "164-314 (business associates)"

        - concept: "Records of processing activities"
          gdpr: "art-30"
          lgpd: "art-37"
          ccpa-cpra: "N/A"
          iso-27701: "a-7-2-8"
          hipaa: "164-316-b (documentation)"

        - concept: "Automated decision-making / profiling"
          gdpr: "art-22"
          lgpd: "art-20"
          ccpa-cpra: "sec-1798-185 (profiling regulations)"
          iso-27701: "a-7-2-9"
          hipaa: "N/A"

        - concept: "Supervisory authority / enforcement"
          gdpr: "art-51 to art-59"
          lgpd: "art-55-A to art-55-L (ANPD)"
          ccpa-cpra: "sec-1798-199-10 (CPPA)"
          iso-27701: "N/A"
          hipaa: "164-400 (HHS OCR)"

  # ════════════════════════════════════════════════════════════════
  # CYBERSECURITY STANDARDS
  # ════════════════════════════════════════════════════════════════
  - category: cybersecurity
    description: "Cybersecurity standards and frameworks"
    frameworks: [nist-800-53-rev5, nist-csf-v2, iso-27001-2022, cis-controls-v8, essential-eight]
    correlation_matrix:
      common_concepts:

        - concept: "Access control"
          nist-800-53-rev5: "AC family (AC-1 to AC-25)"
          nist-csf-v2: "PR.AA"
          iso-27001-2022: "A5.15-A5.18, A8.2-A8.5"
          cis-controls-v8: "CIS-5, CIS-6"
          essential-eight: "e8-restrict-admin, e8-mfa"

        - concept: "Vulnerability management"
          nist-800-53-rev5: "SI-2, SI-5, RA-5"
          nist-csf-v2: "ID.RA"
          iso-27001-2022: "A8.8"
          cis-controls-v8: "CIS-7"
          essential-eight: "e8-patch-apps, e8-patch-os"

        - concept: "Incident response"
          nist-800-53-rev5: "IR family (IR-1 to IR-10)"
          nist-csf-v2: "RS.MA, RS.AN, RS.CO, RS.MI"
          iso-27001-2022: "A5.24-A5.28"
          cis-controls-v8: "CIS-17"
          essential-eight: "N/A"

        - concept: "Logging and monitoring"
          nist-800-53-rev5: "AU family (AU-1 to AU-16)"
          nist-csf-v2: "DE.CM, DE.AE"
          iso-27001-2022: "A8.15, A8.16"
          cis-controls-v8: "CIS-8"
          essential-eight: "N/A"

        - concept: "Configuration management"
          nist-800-53-rev5: "CM family (CM-1 to CM-14)"
          nist-csf-v2: "PR.PS"
          iso-27001-2022: "A8.9, A8.19"
          cis-controls-v8: "CIS-4"
          essential-eight: "e8-harden-apps, e8-harden-os (application/OS hardening)"

        - concept: "Network security"
          nist-800-53-rev5: "SC family (SC-1 to SC-51)"
          nist-csf-v2: "PR.DS, PR.PS"
          iso-27001-2022: "A8.20-A8.22"
          cis-controls-v8: "CIS-12, CIS-13"
          essential-eight: "N/A"

        - concept: "Identity management"
          nist-800-53-rev5: "IA family (IA-1 to IA-12)"
          nist-csf-v2: "PR.AA"
          iso-27001-2022: "A5.16, A8.5"
          cis-controls-v8: "CIS-5, CIS-6"
          essential-eight: "e8-mfa"

        - concept: "Risk assessment"
          nist-800-53-rev5: "RA family (RA-1 to RA-10)"
          nist-csf-v2: "ID.RA, ID.AM"
          iso-27001-2022: "cl-6.1, cl-8.2"
          cis-controls-v8: "CIS-1, CIS-2 (asset inventory as risk basis)"
          essential-eight: "N/A (maturity model approach, not risk-based)"

        - concept: "Security awareness and training"
          nist-800-53-rev5: "AT family (AT-1 to AT-6)"
          nist-csf-v2: "PR.AT"
          iso-27001-2022: "A6.3"
          cis-controls-v8: "CIS-14"
          essential-eight: "N/A"

        - concept: "Data protection / encryption"
          nist-800-53-rev5: "SC-8, SC-12, SC-13, SC-28"
          nist-csf-v2: "PR.DS"
          iso-27001-2022: "A8.24"
          cis-controls-v8: "CIS-3"
          essential-eight: "N/A"

        - concept: "Asset management"
          nist-800-53-rev5: "CM-8, PM-5"
          nist-csf-v2: "ID.AM"
          iso-27001-2022: "A5.9-A5.13"
          cis-controls-v8: "CIS-1, CIS-2"
          essential-eight: "N/A"

        - concept: "Application control / whitelisting"
          nist-800-53-rev5: "CM-7(5)"
          nist-csf-v2: "PR.PS"
          iso-27001-2022: "A8.19"
          cis-controls-v8: "CIS-2"
          essential-eight: "e8-app-control"

        - concept: "Backup and recovery"
          nist-800-53-rev5: "CP family (CP-9, CP-10)"
          nist-csf-v2: "RC.RP"
          iso-27001-2022: "A8.13, A8.14"
          cis-controls-v8: "CIS-11"
          essential-eight: "e8-daily-backups"

        - concept: "Supply chain risk management"
          nist-800-53-rev5: "SR family (SR-1 to SR-12)"
          nist-csf-v2: "GV.SC"
          iso-27001-2022: "A5.19-A5.23"
          cis-controls-v8: "CIS-15 (service provider management)"
          essential-eight: "N/A"

        - concept: "Governance and policy"
          nist-800-53-rev5: "PL family, PM family"
          nist-csf-v2: "GV.PO, GV.OC, GV.RM"
          iso-27001-2022: "A5.1-A5.4"
          cis-controls-v8: "N/A (controls-focused, not governance)"
          essential-eight: "N/A (mitigation strategies, not governance)"

  # ════════════════════════════════════════════════════════════════
  # FINANCIAL SECTOR COMPLIANCE
  # ════════════════════════════════════════════════════════════════
  - category: financial
    description: "Financial sector compliance frameworks"
    frameworks: [sox, pci-dss-v4, swift-csp, dora, bacen-4893]
    correlation_matrix:
      common_concepts:

        - concept: "Access control / authentication"
          sox: "itgc-access"
          pci-dss-v4: "req-7, req-8"
          swift-csp: "cscf-4-1, cscf-4-2, cscf-5-1"
          dora: "art-9"
          bacen-4893: "art-7"

        - concept: "Change management"
          sox: "itgc-change"
          pci-dss-v4: "req-6"
          swift-csp: "cscf-2-3"
          dora: "art-8"
          bacen-4893: "art-7"

        - concept: "Incident response"
          sox: "N/A (financial misstatement focus)"
          pci-dss-v4: "req-12-10"
          swift-csp: "cscf-7-1"
          dora: "art-17, art-19"
          bacen-4893: "art-9, art-10"

        - concept: "Vulnerability management"
          sox: "itgc-operations"
          pci-dss-v4: "req-6, req-11"
          swift-csp: "cscf-2-2, cscf-2-7"
          dora: "art-10"
          bacen-4893: "art-7"

        - concept: "Encryption / data protection"
          sox: "N/A (indirect through ITGC)"
          pci-dss-v4: "req-3, req-4"
          swift-csp: "cscf-2-4, cscf-2-5"
          dora: "art-9-2"
          bacen-4893: "art-6-II"

        - concept: "Logging / audit trail"
          sox: "itgc-operations (audit trail)"
          pci-dss-v4: "req-10"
          swift-csp: "cscf-6-4"
          dora: "art-12"
          bacen-4893: "art-7"

        - concept: "Third-party / vendor risk"
          sox: "N/A (service organization reports)"
          pci-dss-v4: "req-12-8"
          swift-csp: "cscf-2-8"
          dora: "art-28 to art-30 (ICT third-party risk)"
          bacen-4893: "art-3 to art-5 (cloud and outsourcing)"

        - concept: "Network segmentation / security"
          sox: "N/A"
          pci-dss-v4: "req-1, req-2"
          swift-csp: "cscf-1-1, cscf-1-2"
          dora: "art-9"
          bacen-4893: "art-7"

        - concept: "Business continuity / resilience"
          sox: "N/A (financial reporting continuity implied)"
          pci-dss-v4: "N/A (out of scope)"
          swift-csp: "N/A"
          dora: "art-11, art-12 (ICT continuity)"
          bacen-4893: "art-8 (continuity plan)"

        - concept: "Risk management governance"
          sox: "section-302, section-404"
          pci-dss-v4: "req-12-1"
          swift-csp: "cscf-1-3"
          dora: "art-5, art-6 (ICT risk management framework)"
          bacen-4893: "art-2 (cybersecurity policy)"

        - concept: "Penetration testing"
          sox: "N/A"
          pci-dss-v4: "req-11-4"
          swift-csp: "cscf-2-7"
          dora: "art-26, art-27 (TLPT)"
          bacen-4893: "N/A"

        - concept: "Reporting to regulators"
          sox: "section-302, section-906 (CEO/CFO certification)"
          pci-dss-v4: "N/A (QSA/ISA reporting)"
          swift-csp: "cscf-attestation"
          dora: "art-19 (major ICT incident reporting)"
          bacen-4893: "art-9 (BCB notification)"

  # ════════════════════════════════════════════════════════════════
  # US FEDERAL SECURITY
  # ════════════════════════════════════════════════════════════════
  - category: us-federal
    description: "US federal cybersecurity hierarchy"
    frameworks: [fisma, nist-800-53-rev5, fedramp, nist-800-171-rev3, cmmc-v2]
    correlation_matrix:
      common_concepts:

        - concept: "Access control"
          fisma: "NIST 800-53 AC family (mandated)"
          nist-800-53-rev5: "AC family"
          fedramp: "AC family (with FedRAMP parameters)"
          nist-800-171-rev3: "03.01 (Access Control)"
          cmmc-v2: "AC domain"

        - concept: "Identification and authentication"
          fisma: "NIST 800-53 IA family (mandated)"
          nist-800-53-rev5: "IA family"
          fedramp: "IA family (with MFA requirements)"
          nist-800-171-rev3: "03.05 (Identification and Authentication)"
          cmmc-v2: "IA domain"

        - concept: "Incident response"
          fisma: "NIST 800-53 IR family (mandated)"
          nist-800-53-rev5: "IR family"
          fedramp: "IR family (with 1-hour US-CERT notification)"
          nist-800-171-rev3: "03.06 (Incident Response)"
          cmmc-v2: "IR domain"

        - concept: "Configuration management"
          fisma: "NIST 800-53 CM family (mandated)"
          nist-800-53-rev5: "CM family"
          fedramp: "CM family (hardened baselines required)"
          nist-800-171-rev3: "03.04 (Configuration Management)"
          cmmc-v2: "CM domain"

        - concept: "Risk assessment"
          fisma: "NIST 800-53 RA family; annual assessment required"
          nist-800-53-rev5: "RA family"
          fedramp: "RA family (annual assessment + continuous monitoring)"
          nist-800-171-rev3: "03.11 (Risk Assessment)"
          cmmc-v2: "RA domain"

        - concept: "System and communications protection"
          fisma: "NIST 800-53 SC family (mandated)"
          nist-800-53-rev5: "SC family"
          fedramp: "SC family (FIPS 140-2 validated crypto required)"
          nist-800-171-rev3: "03.13 (System and Communications Protection)"
          cmmc-v2: "SC domain"

        - concept: "Audit and accountability"
          fisma: "NIST 800-53 AU family (mandated)"
          nist-800-53-rev5: "AU family"
          fedramp: "AU family (centralized logging required)"
          nist-800-171-rev3: "03.03 (Audit and Accountability)"
          cmmc-v2: "AU domain"

        - concept: "Security assessment and authorization"
          fisma: "ATO process required"
          nist-800-53-rev5: "CA family"
          fedramp: "P-ATO/ATO through JAB or agency"
          nist-800-171-rev3: "03.12 (Security Assessment)"
          cmmc-v2: "CA domain (CMMC assessment by C3PAO)"

        - concept: "Continuous monitoring"
          fisma: "ISCM program required"
          nist-800-53-rev5: "CA-7"
          fedramp: "ConMon program (monthly scans, annual assessment)"
          nist-800-171-rev3: "03.12.3 (continuous monitoring)"
          cmmc-v2: "POA&M and annual affirmation"

        - concept: "Supply chain risk management"
          fisma: "EO 14028 requirements"
          nist-800-53-rev5: "SR family"
          fedramp: "SR controls (FedRAMP Rev5 transition)"
          nist-800-171-rev3: "N/A (addressed in 800-53 SR family)"
          cmmc-v2: "N/A (Level 2 does not include SR)"

  # ════════════════════════════════════════════════════════════════
  # SUPPLY CHAIN & APPLICATION SECURITY
  # ════════════════════════════════════════════════════════════════
  - category: supply-chain
    description: "Software supply chain and application security"
    frameworks: [slsa, nist-800-218, owasp-asvs, nist-800-53-rev5]
    correlation_matrix:
      common_concepts:

        - concept: "Source code integrity"
          slsa: "slsa-source-verified-history, slsa-source-retained-indefinitely"
          nist-800-218: "ps-1, ps-2 (Protect Software)"
          owasp-asvs: "v10-1-1 (code integrity)"
          nist-800-53-rev5: "SA-12, SR-3 (supply chain protection)"

        - concept: "Build integrity / provenance"
          slsa: "slsa-build-l1-provenance through slsa-build-l3-hardened"
          nist-800-218: "pw-6 (secure build environments)"
          owasp-asvs: "v14-1-1 (build pipeline security)"
          nist-800-53-rev5: "SA-15, SA-15(4) (development process)"

        - concept: "Dependency management"
          slsa: "slsa-dependencies-complete"
          nist-800-218: "pw-4 (third-party components)"
          owasp-asvs: "v14-2-1 (dependency management)"
          nist-800-53-rev5: "SR-3, SA-12 (supply chain risk)"

        - concept: "Vulnerability scanning / SAST"
          slsa: "N/A (provenance focus, not scanning)"
          nist-800-218: "pw-5, pw-7 (code analysis)"
          owasp-asvs: "v14-1-3 (static analysis)"
          nist-800-53-rev5: "SA-11 (developer security testing)"

        - concept: "Security testing / DAST"
          slsa: "N/A"
          nist-800-218: "pw-8 (security testing)"
          owasp-asvs: "v14-1-4 (dynamic analysis)"
          nist-800-53-rev5: "SA-11, RA-5 (vulnerability scanning)"

        - concept: "Artifact signing and verification"
          slsa: "slsa-build-l2-signed-provenance"
          nist-800-218: "ps-2 (software integrity verification)"
          owasp-asvs: "v10-3-2 (integrity verification)"
          nist-800-53-rev5: "SI-7 (software, firmware integrity)"

        - concept: "SBOM / software bill of materials"
          slsa: "slsa-dependencies-complete (dependency completeness)"
          nist-800-218: "ps-3 (archive and protect software releases)"
          owasp-asvs: "N/A"
          nist-800-53-rev5: "SR-4(4) (SBOM)"

        - concept: "Secure development lifecycle"
          slsa: "N/A (build/provenance focus)"
          nist-800-218: "po-1 to po-5 (Prepare Organization)"
          owasp-asvs: "v1-1-1 (SDLC verification)"
          nist-800-53-rev5: "SA-3 (system development life cycle)"

        - concept: "Incident response for vulnerabilities"
          slsa: "N/A"
          nist-800-218: "rv-1, rv-2, rv-3 (Respond to Vulnerabilities)"
          owasp-asvs: "N/A (verification focused)"
          nist-800-53-rev5: "IR family, SI-2 (flaw remediation)"

  # ════════════════════════════════════════════════════════════════
  # IT GOVERNANCE & RISK MANAGEMENT
  # ════════════════════════════════════════════════════════════════
  - category: governance
    description: "IT governance and risk management frameworks"
    frameworks: [cobit-2019, sox, fisma, iso-27001-2022]
    correlation_matrix:
      common_concepts:

        - concept: "Governance structure / oversight"
          cobit-2019: "EDM01, EDM02 (Ensure Governance Framework)"
          sox: "section-302 (management responsibility)"
          fisma: "agency head accountability"
          iso-27001-2022: "cl-5 (Leadership)"

        - concept: "Risk management"
          cobit-2019: "APO12 (Manage Risk)"
          sox: "section-404 (internal control assessment)"
          fisma: "RMF (NIST 800-37)"
          iso-27001-2022: "cl-6.1 (risk assessment), cl-8.2 (risk treatment)"

        - concept: "Policy management"
          cobit-2019: "APO01 (Manage IT Management Framework)"
          sox: "entity-level controls"
          fisma: "NIST 800-53 PL family"
          iso-27001-2022: "A5.1, cl-5.2 (information security policy)"

        - concept: "Internal audit / assurance"
          cobit-2019: "MEA02 (Monitor Internal Controls)"
          sox: "section-404 (external auditor attestation)"
          fisma: "OIG annual evaluation"
          iso-27001-2022: "cl-9.2 (internal audit)"

        - concept: "Performance measurement"
          cobit-2019: "MEA01 (Monitor Performance)"
          sox: "management testing program"
          fisma: "FISMA metrics (CIO/OIG reporting)"
          iso-27001-2022: "cl-9.1 (monitoring, measurement, analysis)"

        - concept: "Resource management"
          cobit-2019: "APO07 (Manage Human Resources), APO09 (Manage Service Agreements)"
          sox: "N/A (financial focus)"
          fisma: "budget allocation for cybersecurity"
          iso-27001-2022: "cl-7 (Support: resources, competence, awareness)"

        - concept: "Compliance monitoring"
          cobit-2019: "MEA03 (Monitor Compliance)"
          sox: "continuous disclosure obligations"
          fisma: "continuous monitoring program"
          iso-27001-2022: "A5.31-A5.36 (legal, statutory compliance)"

        - concept: "Change management"
          cobit-2019: "BAI06 (Manage IT Changes)"
          sox: "itgc-change"
          fisma: "NIST 800-53 CM family"
          iso-27001-2022: "A8.32 (change management)"

        - concept: "Third-party management"
          cobit-2019: "APO10 (Manage Vendors)"
          sox: "service organization oversight"
          fisma: "FedRAMP for cloud; SCRM for supply chain"
          iso-27001-2022: "A5.19-A5.23 (supplier relationships)"

        - concept: "Continual improvement"
          cobit-2019: "MEA04 (Manage Assurance Continuously)"
          sox: "remediation of material weaknesses"
          fisma: "POA&M remediation"
          iso-27001-2022: "cl-10 (Improvement: nonconformity, continual improvement)"

  # ════════════════════════════════════════════════════════════════
  # EU DIGITAL REGULATION
  # ════════════════════════════════════════════════════════════════
  - category: eu-digital-regulation
    description: "EU digital regulation stack"
    frameworks: [gdpr, dora, nis2, eu-ai-act]
    correlation_matrix:
      common_concepts:

        - concept: "Risk management"
          gdpr: "art-32 (appropriate security), art-35 (DPIA)"
          dora: "art-5 to art-7 (ICT risk management framework)"
          nis2: "art-21 (cybersecurity risk management measures)"
          eu-ai-act: "art-9 (risk management system for high-risk AI)"

        - concept: "Incident notification"
          gdpr: "art-33 (72-hour notification to SA), art-34 (to data subjects)"
          dora: "art-19 (major ICT incident reporting to competent authority)"
          nis2: "art-23 (24h early warning, 72h notification, 1-month report)"
          eu-ai-act: "art-62 (serious incident reporting for high-risk AI)"

        - concept: "Third-party / supply chain management"
          gdpr: "art-28 (processor requirements)"
          dora: "art-28 to art-30 (ICT third-party risk management)"
          nis2: "art-21-2-d (supply chain security)"
          eu-ai-act: "art-16 (provider obligations in value chain)"

        - concept: "Governance structure"
