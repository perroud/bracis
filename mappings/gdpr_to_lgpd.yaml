id: gdpr_to_lgpd
title: "GDPR to LGPD Control Mapping"
source_framework: gdpr
target_framework: lgpd
version: "1.0.0"
last_updated: "2026-04-03"
methodology: semantic

mappings:
  - source_control: art-5
    target_controls:
      - id: art-6
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          GDPR Art. 5 (Principles) maps closely to LGPD Art. 6 (Princípios).
          Both establish foundational principles: lawfulness, purpose limitation,
          data minimization, accuracy, storage limitation, integrity/confidentiality,
          accountability. LGPD adds explicit principles like free access, quality,
          transparency, security, prevention, non-discrimination.

  - source_control: art-6
    target_controls:
      - id: art-7
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          GDPR Art. 6 (Lawfulness of processing) maps to LGPD Art. 7
          (Legal bases for processing). Both enumerate legal bases including
          consent, contract, legal obligation, vital interests, public interest,
          legitimate interests. LGPD adds additional bases: studies by research
          bodies, exercise of rights in judicial/arbitration proceedings,
          health protection, credit protection.

  - source_control: art-9
    target_controls:
      - id: art-11
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          GDPR Art. 9 (Special categories) maps to LGPD Art. 11
          (Sensitive data processing). Both define stricter rules for
          sensitive data. Categories largely overlap but differ slightly
          in classification.

  - source_control: art-15
    target_controls:
      - id: art-18
        relationship: superset-of
        confidence: 0.80
        rationale: >
          GDPR Art. 15 (Right of access) maps to LGPD Art. 18
          (Data subject rights). LGPD Art. 18 is broader, consolidating
          multiple GDPR rights (access, rectification, erasure, portability)
          into a single article with 9 enumerated rights.

  - source_control: art-17
    target_controls:
      - id: art-18
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          GDPR Art. 17 (Right to erasure) is covered within LGPD Art. 18,
          specifically inciso VI (eliminação dos dados pessoais tratados
          com o consentimento do titular).

  - source_control: art-20
    target_controls:
      - id: art-18
        relationship: intersects-with
        confidence: 0.75
        rationale: >
          GDPR Art. 20 (Right to data portability) maps to LGPD Art. 18,
          inciso V (portabilidade dos dados).

  - source_control: art-25
    target_controls:
      - id: art-46
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          GDPR Art. 25 (Data protection by design and by default) has
          partial equivalent in LGPD Art. 46 (Security measures), which
          requires technical and administrative measures from the design
          phase of product/service through the end of data processing.

  - source_control: art-28
    target_controls:
      - id: art-39
        relationship: equivalent-to
        confidence: 0.80
        rationale: >
          GDPR Art. 28 (Processor) maps to LGPD Art. 39 (Operador),
          which establishes that the operator shall process data per
          the controller's instructions.

  - source_control: art-30
    target_controls:
      - id: art-37
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          GDPR Art. 30 (Records of processing) has indirect mapping to
          LGPD Art. 37 (Controller and operator shall keep records of
          processing operations). LGPD is less prescriptive about
          record content.

  - source_control: art-32
    target_controls:
      - id: art-46
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          GDPR Art. 32 (Security of processing) maps directly to
          LGPD Art. 46 (Security measures). Both require appropriate
          technical and organizational measures to ensure security.
          LGPD Art. 46 §1 explicitly mentions privacy by design.

  - source_control: art-33
    target_controls:
      - id: art-48
        relationship: equivalent-to
        confidence: 0.85
        rationale: >
          GDPR Art. 33 (Notification of breach to supervisory authority)
          maps to LGPD Art. 48 (Communication of security incidents).
          GDPR requires 72-hour notification; LGPD says "reasonable time"
          (prazo razoável), to be defined by ANPD.

  - source_control: art-35
    target_controls:
      - id: art-38
        relationship: equivalent-to
        confidence: 0.80
        rationale: >
          GDPR Art. 35 (Data Protection Impact Assessment) maps to
          LGPD Art. 38 (Relatório de Impacto à Proteção de Dados Pessoais).
          Both require impact assessments for high-risk processing.

  - source_control: art-37
    target_controls:
      - id: art-41
        relationship: equivalent-to
        confidence: 0.80
        rationale: >
          GDPR Art. 37 (Designation of DPO) maps to LGPD Art. 41
          (Encarregado/DPO). Both require appointment of a data
          protection officer, though LGPD's requirements are
          less prescriptive about mandatory appointment criteria.

  - source_control: art-44
    target_controls:
      - id: art-33
        relationship: equivalent-to
        confidence: 0.80
        rationale: >
          GDPR Art. 44 (General principle for transfers) maps to
          LGPD Art. 33 (International data transfer). Both establish
          conditions for cross-border data transfers with adequacy
          decisions, standard contractual clauses, etc.

  - source_control: art-83
    target_controls:
      - id: art-52
        relationship: equivalent-to
        confidence: 0.75
        rationale: >
          GDPR Art. 83 (General conditions for fines) maps to
          LGPD Art. 52 (Administrative sanctions). GDPR allows fines
          up to €20M or 4% of global turnover. LGPD allows fines up to
          2% of revenue in Brazil, limited to R$50M per infraction.
