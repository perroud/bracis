id: decreto-8771_to_marco-civil
title: "Decreto 8.771/2016 to Marco Civil da Internet Control Mapping"
source_framework: decreto-8771
target_framework: marco-civil
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  - source_control: art-1
    target_controls:
      - id: art-2
        relationship: derived-from
        confidence: 0.80
        rationale: >
          O art. 1 do Decreto 8.771 delimita o escopo de regulamentação em quatro
          eixos: neutralidade de rede, proteção de dados, transparência e
          fiscalização. O art. 2 do Marco Civil estabelece os fundamentos do uso
          da internet no Brasil, incluindo liberdade de expressão, direitos humanos,
          livre concorrência e defesa do consumidor. O decreto deriva diretamente
          desses fundamentos ao operacionalizá-los em regras de execução.
      - id: art-3
        relationship: derived-from
        confidence: 0.85
        rationale: >
          O art. 1 do Decreto referencia expressamente a Lei 12.965/2014 como a
          norma que está sendo regulamentada. O art. 3 do Marco Civil enumera os
          princípios da disciplina do uso da internet, incluindo neutralidade de
          rede, proteção da privacidade e proteção dos dados pessoais — os mesmos
          eixos que o Decreto detalha em seus capítulos.
      - id: art-9
        relationship: implements
        confidence: 0.85
        rationale: >
          O art. 1 do Decreto menciona explicitamente as hipóteses admitidas de
          discriminação de pacotes de dados e degradação de tráfego. O art. 9 do
          Marco Civil é o dispositivo-mãe que estabelece a neutralidade de rede e
          prevê, no § 1º, que a discriminação ou degradação será regulamentada por
          decreto — que é exatamente o Decreto 8.771.

  - source_control: art-2
    target_controls:
      - id: art-5
        relationship: derived-from
        confidence: 0.85
        rationale: >
          O art. 2 do Decreto define conceitos operacionais como discriminação de
          tráfego, requisitos técnicos indispensáveis e priorização de serviços de
          emergência. O art. 5 do Marco Civil é o glossário normativo que define
          internet, terminal, endereço IP, conexão, registros de conexão e
          registros de acesso. O Decreto estende as definições da lei com
          conceitos necessários à regulamentação da neutralidade de rede.
      - id: art-9
        relationship: implements
        confidence: 0.80
        rationale: >
          As definições do art. 2 do Decreto — discriminação de tráfego, requisitos
          técnicos indispensáveis e priorização de emergência — são diretamente
          derivadas das exceções à neutralidade previstas no art. 9, § 1º do Marco
          Civil. O Decreto operacionaliza os conceitos abstratos da lei em
          definições concretas aplicáveis.

  - source_control: art-3
    target_controls:
      - id: art-9
        relationship: implements
        confidence: 0.95
        rationale: >
          O art. 3 do Decreto exige que o tratamento isonômico do art. 9 do Marco
          Civil preserve o caráter público e irrestrito do acesso à internet e os
          fundamentos, princípios e objetivos da Lei 12.965/2014. É implementação
          direta e literal do princípio de neutralidade de rede do Marco Civil,
          detalhando como a isonomia deve ser garantida na prática.

  - source_control: art-4
    target_controls:
      - id: art-9
        relationship: implements
        confidence: 0.95
        rationale: >
          O art. 4 do Decreto regulamenta as exceções à neutralidade previstas
          no art. 9, § 1º do Marco Civil, estabelecendo que discriminação e
          degradação são excepcionais e devem decorrer apenas de requisitos
          técnicos indispensáveis ou priorização de emergência, com cumprimento
          cumulativo dos requisitos do art. 9, § 2º do Marco Civil.

  - source_control: art-5
    target_controls:
      - id: art-9
        relationship: implements
        confidence: 0.95
        rationale: >
          O art. 5 do Decreto especifica os únicos requisitos técnicos que
          justificam discriminação de tráfego: segurança de rede (spam, DDoS) e
          congestionamento excepcional. Regulamenta diretamente o art. 9, § 1º,
          inciso I do Marco Civil, que prevê exceção à neutralidade por requisitos
          técnicos indispensáveis à prestação adequada de serviços.
      - id: art-3
        relationship: complements
        confidence: 0.70
        rationale: >
          O art. 5 do Decreto, ao exigir que os requisitos técnicos mantenham a
          estabilidade, segurança, integridade e funcionalidade da rede, concretiza
          o princípio do art. 3, inciso V do Marco Civil — preservação da
          estabilidade, segurança e funcionalidade da rede por meio de medidas
          técnicas compatíveis com padrões internacionais.

  - source_control: art-6
    target_controls:
      - id: art-9
        relationship: implements
        confidence: 0.90
        rationale: >
          O art. 6 do Decreto permite gerenciamento de tráfego desde que não
          comprometa o caráter público e irrestrito da internet, não restrinja
          direitos dos usuários e respeite a privacidade. Regulamenta diretamente
          as condições do art. 9 do Marco Civil para gerenciamento de rede,
          especialmente o § 3º que veda bloqueio, monitoramento, filtragem ou
          análise de conteúdo.
      - id: art-7
        relationship: complements
        confidence: 0.70
        rationale: >
          O art. 6, inciso II do Decreto exige respeito à privacidade dos
          usuários nas práticas de gerenciamento de tráfego. O art. 7 do Marco
          Civil assegura ao usuário a inviolabilidade da intimidade e da vida
          privada (inciso I), o sigilo do fluxo de comunicações (inciso II) e
          o sigilo de comunicações armazenadas (inciso III). O Decreto reforça
          esses direitos no contexto específico de gerenciamento de rede.

  - source_control: art-7
    target_controls:
      - id: art-9
        relationship: implements
        confidence: 0.90
        rationale: >
          O art. 7 do Decreto exige transparência sobre práticas de
          gerenciamento que impliquem discriminação ou degradação: descrição das
          práticas, efeitos na qualidade de experiência e motivos de adoção.
          Regulamenta o art. 9, § 2º, inciso III do Marco Civil, que exige
          informação prévia, transparente, clara e suficientemente descritiva
          sobre práticas de gerenciamento adotadas.

  - source_control: art-8
    target_controls:
      - id: art-9
        relationship: implements
        confidence: 0.90
        rationale: >
          O art. 8 do Decreto delimita a priorização de serviços de emergência
          — comunicações destinadas a ou entre prestadores de emergência e
          comunicações para informar a população em desastres — sem bloqueio ou
          rebaixamento de outros tipos de tráfego. Regulamenta diretamente o
          art. 9, § 1º, inciso II do Marco Civil, que prevê priorização de
          serviços de emergência como exceção à neutralidade de rede.

  - source_control: art-9
    target_controls:
      - id: art-9
        relationship: implements
        confidence: 0.95
        rationale: >
          O art. 9 do Decreto veda condutas unilaterais ou acordos que
          comprometam o caráter público da internet, priorizem pacotes por
          arranjos comerciais ou privilegiem aplicações do próprio provedor ou
          grupo econômico. Implementa diretamente o art. 9, § 2º, inciso IV
          do Marco Civil, que exige condições comerciais não discriminatórias
          e abstenção de práticas anticoncorrenciais.

  - source_control: art-11
    target_controls:
      - id: art-10
        relationship: implements
        confidence: 0.90
        rationale: >
          O art. 11 do Decreto regulamenta o acesso a dados cadastrais por
          autoridades administrativas, exigindo fundamento legal de competência
          e motivação para o pedido. Implementa o art. 10, § 3º do Marco Civil,
          que permite acesso a dados cadastrais por autoridades administrativas
          com competência legal, sem necessidade de ordem judicial.
      - id: art-13
        relationship: complements
        confidence: 0.65
        rationale: >
          O art. 11, § 1º do Decreto atribui ao CGI.br a promoção de estudos e
          recomendações sobre padrões técnicos e de segurança para guarda de
          dados pessoais e comunicações privadas. Complementa o art. 13 do Marco
          Civil, que exige guarda de registros de conexão sob sigilo e em
          ambiente controlado, ao definir quem estabelece os padrões técnicos
          de referência para essa guarda.

  - source_control: art-12
    target_controls:
      - id: art-10
        relationship: implements
        confidence: 0.85
        rationale: >
          O art. 12 do Decreto exige que órgãos da administração pública
          publiquem relatórios anuais de requisições de dados cadastrais e que
          dados pessoais sejam fornecidos de forma desvinculada quando não
          necessários à finalidade. Implementa o regime de proteção do art. 10
          do Marco Civil, que exige preservação da intimidade e da vida
          privada na guarda e disponibilização de registros.
      - id: art-15
        relationship: complements
        confidence: 0.70
        rationale: >
          O parágrafo único do art. 12 do Decreto exige que dados pessoais
          sejam fornecidos de forma desvinculada dos registros de acesso a
          aplicações quando não necessários à finalidade do requerente. Essa
          regra de anonimização complementa o art. 15 do Marco Civil, que
          trata da guarda de registros de acesso sob sigilo, ao adicionar uma
          camada de proteção no momento da disponibilização.

  - source_control: art-13
    target_controls:
      - id: art-10
        relationship: implements
        confidence: 0.90
        rationale: >
          O art. 13 do Decreto estabelece cinco diretrizes obrigatórias de
          segurança — controle de acesso, autenticação dupla, inventário de
          acessos, criptografia e minimização de dados. Implementa o art. 10,
          § 4º do Marco Civil, que exige que medidas e procedimentos de
          segurança e sigilo atendam a padrões definidos em regulamento — e
          o Decreto é esse regulamento.
      - id: art-11
        relationship: complements
        confidence: 0.75
        rationale: >
          O art. 13 do Decreto exige padrões de segurança na guarda e
          tratamento de dados pessoais e comunicações privadas por provedores.
          Complementa o art. 11 do Marco Civil, que determina o respeito à
          legislação brasileira e aos direitos à privacidade e sigilo em
          qualquer operação de coleta, armazenamento e tratamento de dados,
          ao especificar os controles técnicos de segurança obrigatórios.
      - id: art-13
        relationship: complements
        confidence: 0.80
        rationale: >
          O art. 13 do Decreto detalha as diretrizes de segurança que devem
          ser observadas para guarda de registros de conexão e de acesso. O
          art. 13 do Marco Civil exige que registros de conexão sejam mantidos
          sob sigilo, em ambiente controlado e de segurança. O Decreto
          complementa a lei ao especificar os controles de segurança
          concretos: RBAC, MFA, inventário de acessos, criptografia e
          minimização.

  - source_control: art-14
    target_controls:
      - id: art-10
        relationship: implements
        confidence: 0.85
        rationale: >
          O art. 14 do Decreto define taxativamente dado cadastral (filiação,
          endereço e qualificação pessoal) e estabelece o princípio de
          retenção mínima. Implementa o art. 10, § 3º do Marco Civil, que
          permite acesso a dados cadastrais por autoridades administrativas
          competentes, ao delimitar exatamente quais dados compõem essa
          categoria.
      - id: art-11
        relationship: complements
        confidence: 0.70
        rationale: >
          O parágrafo único do art. 14 do Decreto estabelece que provedores
          devem reter a menor quantidade possível de dados pessoais e excluí-los
          quando atingida a finalidade ou encerrado o prazo legal. Complementa
          o art. 11 do Marco Civil, que exige respeito à legislação brasileira
          e aos direitos de privacidade em todas as operações de coleta e
          tratamento, ao materializar o princípio da minimização de dados.

  - source_control: art-15
    target_controls:
      - id: art-11
        relationship: implements
        confidence: 0.80
        rationale: >
          O art. 15 do Decreto exige que os dados referidos no art. 11 do
          Marco Civil sejam mantidos em formato interoperável e estruturado
          para facilitar acesso decorrente de decisão judicial. Referencia
          diretamente o art. 11 do Marco Civil como fonte da obrigação de
          coleta e armazenamento que está sendo regulamentada.
      - id: art-13
        relationship: complements
        confidence: 0.75
        rationale: >
          O art. 15 do Decreto exige formato interoperável e eliminação
          definitiva de dados pessoais após a finalidade ou prazo legal.
          Complementa o art. 13 do Marco Civil — que estabelece guarda de
          registros de conexão por 1 ano — ao adicionar requisitos de
          formato e de eliminação que se aplicam ao ciclo de vida completo
          desses registros.
      - id: art-15
        relationship: complements
        confidence: 0.80
        rationale: >
          O art. 15 do Decreto detalha requisitos de interoperabilidade e
          eliminação definitiva de dados. Complementa o art. 15 do Marco
          Civil — guarda de registros de acesso a aplicações por 6 meses —
          ao especificar que esses registros devem ser mantidos em formato
          interoperável e estruturado, e eliminados definitivamente após
          expiração do prazo legal.

  - source_control: art-17
    target_controls:
      - id: art-10
        relationship: implements
        confidence: 0.90
        rationale: >
          O art. 17 do Decreto regulamenta a requisição judicial de registros
          de conexão e acesso, impondo quatro requisitos cumulativos de
          admissibilidade e vedando buscas genéricas. Implementa o art. 10,
          § 1º do Marco Civil, que condiciona a disponibilização de registros
          a ordem judicial.
      - id: art-22
        relationship: implements
        confidence: 0.75
        rationale: >
          O art. 17 do Decreto detalha os requisitos formais que devem
          constar do requerimento judicial de registros. Referencia
          indiretamente o art. 22 do Marco Civil, que permite à parte
          interessada requerer ao juiz a disponibilização de registros de
          conexão ou de acesso a aplicações quando há indícios de ilícito,
          ao regulamentar as condições de admissibilidade desse requerimento.

  - source_control: art-18
    target_controls:
      - id: art-9
        relationship: implements
        confidence: 0.85
        rationale: >
          O art. 18 do Decreto atribui à ANATEL a fiscalização de aspectos
          técnicos de telecomunicações, especialmente neutralidade de rede
          (Seção I do Capítulo III da Lei 12.965/2014). Implementa o art. 9,
          § 1º do Marco Civil, que prevê regulamentação da discriminação de
          tráfego mediante consulta ao CGI.br e à ANATEL.
      - id: art-10
        relationship: implements
        confidence: 0.80
        rationale: >
          O art. 18 do Decreto distribui competências de fiscalização entre
          ANATEL, Senacon, SBDC/CADE e CGI.br. Regulamenta o regime de
          proteção do art. 10 do Marco Civil ao designar as autoridades
          responsáveis por fiscalizar a guarda e disponibilização de
          registros e dados pessoais.
      - id: art-11
        relationship: complements
        confidence: 0.70
        rationale: >
          O art. 18 do Decreto define as competências de fiscalização para
          verificar conformidade com as obrigações de proteção de dados. O
          art. 11 do Marco Civil exige respeito à legislação brasileira em
          operações de coleta e tratamento de dados. O Decreto complementa a
          lei ao designar quais autoridades fiscalizam o cumprimento dessas
          obrigações e em quais domínios (telecomunicações, consumidor,
          concorrência, segurança técnica).

  - source_control: art-19
    target_controls:
      - id: art-10
        relationship: implements
        confidence: 0.80
        rationale: >
          O art. 19 do Decreto estabelece a faculdade de publicação de
          relatórios de transparência sobre requisições legais de dados.
          Implementa a vertente de transparência do art. 10 do Marco Civil,
          cujo § 4º exige que medidas de segurança e sigilo sejam informadas
          de forma clara, ao estender esse princípio de transparência para
          as requisições recebidas de autoridades.
      - id: art-12
        relationship: complements
        confidence: 0.70
        rationale: >
          O art. 19 do Decreto prevê relatórios de transparência com dados
          quantitativos e qualitativos sobre requisições legais recebidas.
          Complementa o art. 12 do Marco Civil — que prevê sanções por
          violação das normas de proteção de registros — ao oferecer um
          mecanismo voluntário de demonstração de conformidade e boa
          governança perante reguladores e sociedade.

  - source_control: art-23
    target_controls:
      - id: art-32
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          O art. 23 do Decreto estabelece que o Decreto 8.771/2016 entrou em
          vigor na data de sua publicação (11/05/2016). O art. 32 do Marco
          Civil define que a Lei 12.965/2014 entrou em vigor 60 dias após
          publicação (23/06/2014). Ambos são dispositivos de vigência que
          marcam o início das obrigações — equivalentes em função normativa,
          cada um relativo à sua respectiva norma.

  - source_control: art-24
    target_controls:
      - id: art-2
        relationship: derived-from
        confidence: 0.75
        rationale: >
          O art. 24 do Decreto estabelece aplicação subsidiária em relação
          à legislação específica (ANATEL, Ministério das Comunicações). O
          art. 2 do Marco Civil define os fundamentos do uso da internet,
          incluindo livre concorrência e defesa do consumidor, que informam
          a hierarquia normativa onde o Decreto se posiciona como norma
          regulamentadora subsidiária às normas setoriais.
      - id: art-3
        relationship: derived-from
        confidence: 0.70
        rationale: >
          O art. 24 do Decreto afirma sua aplicação subsidiária perante
          normas setoriais. O art. 3, inciso VI do Marco Civil estabelece
          a responsabilização dos agentes de acordo com suas atividades — o
          que fundamenta a lógica de que regulamentação específica prevalece
          sobre o decreto geral, com este preenchendo lacunas.
