id: hipaa_to_iso-27001-2022
title: "HIPAA to ISO/IEC 27001:2022 Control Mapping"
source_framework: hipaa
target_framework: iso-27001-2022
version: "1.0.0"
last_updated: "2026-04-06"
methodology: semantic

mappings:
  # ── Security Rule — Administrative Safeguards ──

  # 164.308(a)(1) — Security Management Process
  - source_control: 164.308-a1
    target_controls:
      - id: a5-1
        relationship: intersects-with
        confidence: 0.85
        rationale: >
          HIPAA 164.308(a)(1) requires implementing policies and procedures to
          prevent, detect, contain, and correct security violations. ISO A.5.1
          requires defining, approving, and communicating information security
          policies. Both mandate a formal policy framework as the governance
          foundation for security, though HIPAA specifically scopes to ePHI
          while ISO 27001 addresses all information assets.
      - id: a5-36
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          HIPAA 164.308(a)(1) requires information system activity review and
          ongoing risk management to ensure security measures remain effective.
          ISO A.5.36 requires regular review of compliance with security policies,
          rules, and standards. Both mandate continuous monitoring and review
          of security posture, with HIPAA focusing on ePHI environments and
          ISO 27001 applying organization-wide.
      - id: a8-8
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          HIPAA 164.308(a)(1)(ii)(A) requires conducting accurate and thorough
          risk analysis of vulnerabilities to ePHI confidentiality, integrity,
          and availability. ISO A.8.8 requires obtaining information about
          technical vulnerabilities, evaluating exposure, and taking appropriate
          measures. Both address vulnerability identification and risk-based
          remediation, though HIPAA frames it within a broader risk analysis
          requirement while ISO 27001 focuses specifically on technical
          vulnerability management.
      - id: a8-9
        relationship: complements
        confidence: 0.70
        rationale: >
          HIPAA 164.308(a)(1) requires implementing security measures sufficient
          to reduce risks and vulnerabilities. ISO A.8.9 requires establishing,
          documenting, and monitoring security configurations. Configuration
          management directly supports HIPAA's risk management implementation
          specification by ensuring systems are hardened to reduce the attack
          surface for ePHI environments.

  # 164.308(a)(3) — Workforce Security
  - source_control: 164.308-a3
    target_controls:
      - id: a5-15
        relationship: intersects-with
        confidence: 0.90
        rationale: >
          HIPAA 164.308(a)(3) requires ensuring appropriate workforce access
          to ePHI and preventing unauthorized access. ISO A.5.15 requires
          establishing and implementing rules to control physical and logical
          access based on business and security requirements. Both mandate
          role-based access controls, access authorization procedures, and
          access reviews, making this a strong semantic overlap. HIPAA scopes
          to ePHI workforce access; ISO 27001 applies to all information assets.
      - id: a6-1
        relationship: complements
        confidence: 0.75
        rationale: >
          HIPAA 164.308(a)(3)(ii)(B) requires workforce clearance procedures
          to determine if access is appropriate. ISO A.6.1 requires background
          verification checks on all candidates prior to joining and on an
          ongoing basis. Screening supports the workforce clearance process
          by verifying personnel trustworthiness before granting ePHI access.
      - id: a5-2
        relationship: complements
        confidence: 0.70
        rationale: >
          HIPAA 164.308(a)(3)(ii)(A) requires authorization and supervision
          of workforce members working with ePHI. ISO A.5.2 requires defining
          and allocating information security roles and responsibilities. Clear
          role definitions support HIPAA's requirement that workforce access
          is authorized and supervised according to job function.

  # 164.308(a)(4) — Information Access Management
  - source_control: 164.308-a4
    target_controls:
      - id: a5-15
        relationship: equivalent-to
        confidence: 0.90
        rationale: >
          HIPAA 164.308(a)(4) requires implementing policies for authorizing
          access to ePHI consistent with the minimum necessary standard.
          ISO A.5.15 requires establishing and implementing access control
          rules based on business and information security requirements. Both
          mandate formal access authorization, role-based access, periodic
          review of access rights, and removal of access when no longer
          needed. The semantic alignment is strong, with HIPAA focusing on
          ePHI and the minimum necessary principle while ISO 27001 applies
          the least privilege principle broadly.
      - id: a5-2
        relationship: complements
        confidence: 0.70
        rationale: >
          HIPAA 164.308(a)(4)(ii)(B-C) requires formal access authorization
          and modification procedures with documented review. ISO A.5.2
          requires defining roles, responsibilities, and authorization levels.
          Role definitions are a prerequisite for the access authorization
          and establishment procedures HIPAA requires.
      - id: a8-1
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          HIPAA 164.308(a)(4)(ii)(A) requires isolating clearinghouse ePHI
          from unauthorized access by the larger organization. ISO A.8.1
          addresses protection of information on user endpoint devices
          including access controls and data classification. Both address
          restricting information access at the device and system level,
          though with different specificity.

  # 164.308(a)(5) — Security Awareness and Training
  - source_control: 164.308-a5
    target_controls:
      - id: a6-1
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          HIPAA 164.308(a)(5) requires a security awareness and training
          program for all workforce members. ISO A.6.1 requires background
          screening proportional to the classification of information to be
          accessed. Both address ensuring that personnel are suitable and
          prepared before accessing sensitive information, though HIPAA focuses
          on ongoing training while ISO 27001 focuses on pre-employment
          verification. The intersection is in the shared goal of workforce
          competence and trustworthiness.
      - id: a5-1
        relationship: complements
        confidence: 0.70
        rationale: >
          HIPAA 164.308(a)(5) requires training on security policies and
          procedures, protection from malicious software, and password
          management. ISO A.5.1 requires that policies be communicated to
          and acknowledged by relevant personnel. Training is the operational
          mechanism through which policy communication and acknowledgment
          occurs, making training a direct complement to the policy lifecycle.
      - id: a8-8
        relationship: complements
        confidence: 0.60
        rationale: >
          HIPAA 164.308(a)(5)(ii)(B) specifically requires procedures for
          guarding against, detecting, and reporting malicious software.
          ISO A.8.8 requires managing technical vulnerabilities including
          awareness of exposure. Security awareness training on malware
          protection directly supports the human component of vulnerability
          management.

  # 164.308(a)(6) — Security Incident Procedures
  - source_control: 164.308-a6
    target_controls:
      - id: a5-36
        relationship: complements
        confidence: 0.70
        rationale: >
          HIPAA 164.308(a)(6) requires implementing policies and procedures
          to address security incidents including identification, response,
          mitigation, and documentation. ISO A.5.36 requires regular review
          of compliance with security policies. Incident documentation and
          post-incident reviews feed into the compliance review process,
          providing evidence of both security failures and corrective actions.
      - id: a8-15
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          HIPAA 164.308(a)(6) requires identifying and responding to suspected
          or known security incidents and documenting their outcomes. ISO A.8.15
          requires producing, storing, protecting, and analysing logs of
          activities, exceptions, faults, and events. Logging is the primary
          technical mechanism for detecting security incidents and preserving
          evidence for incident documentation, making this a strong functional
          intersection.
      - id: a5-1
        relationship: complements
        confidence: 0.60
        rationale: >
          HIPAA 164.308(a)(6) requires policies and procedures for addressing
          security incidents. ISO A.5.1 requires topic-specific policies
          including incident management. The incident response policy required
          by HIPAA is a specific instantiation of the topic-specific policy
          framework mandated by ISO A.5.1.

  # ── Security Rule — Technical Safeguards ──

  # 164.312(a)(1) — Access Control
  - source_control: 164.312-a1
    target_controls:
      - id: a5-15
        relationship: implements
        confidence: 0.90
        rationale: >
          HIPAA 164.312(a)(1) requires technical policies and procedures to
          allow access only to authorized persons, including unique user
          identification, emergency access, automatic logoff, and encryption.
          ISO A.5.15 establishes the overarching access control requirements.
          The HIPAA technical safeguard implements the ISO access control policy
          requirements at the technical level, translating access rules into
          enforceable technical controls.
      - id: a8-1
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          HIPAA 164.312(a)(2)(iii) requires automatic logoff to terminate
          sessions after inactivity, and 164.312(a)(2)(iv) requires encryption
          of ePHI. ISO A.8.1 requires protecting information on user endpoint
          devices including session management, encryption, and access controls.
          Both address the same endpoint security concerns, with HIPAA
          specifically requiring these for ePHI systems.
      - id: a8-9
        relationship: complements
        confidence: 0.65
        rationale: >
          HIPAA 164.312(a)(1) requires implementing technical access controls
          including encryption and session management. ISO A.8.9 requires
          establishing and monitoring security configurations. Properly
          configured systems are a prerequisite for effective access controls;
          configuration management ensures access control settings remain
          correctly implemented over time.

  # 164.312(b) — Audit Controls
  - source_control: 164.312-b
    target_controls:
      - id: a8-15
        relationship: equivalent-to
        confidence: 0.95
        rationale: >
          HIPAA 164.312(b) requires implementing mechanisms that record and
          examine activity in systems containing ePHI. ISO A.8.15 requires
          producing, storing, protecting, and analysing logs of activities,
          exceptions, faults, and events. Both mandate comprehensive audit
          logging with protection of log integrity, sufficient detail for
          accountability, regular analysis, and appropriate retention. This
          is a near-exact semantic match, with HIPAA scoping to ePHI systems
          and ISO 27001 applying broadly.
      - id: a5-36
        relationship: complements
        confidence: 0.70
        rationale: >
          HIPAA 164.312(b) requires examining audit records of information
          system activity. ISO A.5.36 requires reviewing compliance with
          security policies and standards using automated tools and technical
          reports. Audit log analysis is a primary input to compliance reviews,
          providing the evidence needed to verify adherence to security
          policies.

  # 164.312(c)(1) — Integrity
  - source_control: 164.312-c1
    target_controls:
      - id: a8-9
        relationship: intersects-with
        confidence: 0.80
        rationale: >
          HIPAA 164.312(c)(1) requires protecting ePHI from improper alteration
          or destruction, including mechanisms to corroborate that ePHI has not
          been altered in an unauthorized manner. ISO A.8.9 requires
          establishing, documenting, implementing, and monitoring
          configurations including security configurations. Configuration
          integrity is a subset of data integrity; both require detecting
          unauthorized changes and maintaining the intended state of systems
          and data.
      - id: a8-25
        relationship: complements
        confidence: 0.70
        rationale: >
          HIPAA 164.312(c)(1) requires integrity protections including
          authentication of ePHI to detect unauthorized alteration. ISO A.8.25
          requires secure development lifecycle rules including security
          checkpoints and testing. Secure development practices produce
          software that correctly implements integrity controls such as
          input validation, transaction management, and data verification
          mechanisms.
      - id: a8-28
        relationship: complements
        confidence: 0.65
        rationale: >
          HIPAA 164.312(c)(2) requires electronic mechanisms to corroborate
          that ePHI has not been altered or destroyed in an unauthorized manner.
          ISO A.8.28 requires applying secure coding principles. Secure coding
          practices directly support data integrity through proper input
          validation, secure error handling, and correct cryptographic usage
          for integrity verification.

  # 164.312(d) — Person or Entity Authentication
  - source_control: 164.312-d
    target_controls:
      - id: a5-15
        relationship: implements
        confidence: 0.85
        rationale: >
          HIPAA 164.312(d) requires procedures to verify the identity of
          persons or entities seeking access to ePHI. ISO A.5.15 requires
          access control rules including identity verification as part of the
          access control lifecycle. Authentication is the technical
          implementation of the identity verification requirement within
          the broader access control framework defined by A.5.15.
      - id: a8-1
        relationship: intersects-with
        confidence: 0.65
        rationale: >
          HIPAA 164.312(d) requires verifying the identity of persons or
          entities accessing ePHI, including multi-factor authentication.
          ISO A.8.1 requires protecting information accessible via user
          endpoint devices, including authentication requirements. Both
          address the need to verify user identity before granting access,
          with endpoint authentication being a specific application of the
          broader authentication requirement.

  # 164.312(e)(1) — Transmission Security
  - source_control: 164.312-e1
    target_controls:
      - id: a8-25
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          HIPAA 164.312(e)(1) requires technical security measures to guard
          against unauthorized access to ePHI during transmission, including
          integrity controls and encryption. ISO A.8.25 requires secure
          development lifecycle rules that include security in the design
          phase and secure coding techniques. Transmission security must be
          designed and implemented within the development lifecycle, and
          secure development practices ensure that applications correctly
          implement TLS, certificate validation, and data-in-transit
          encryption.
      - id: a8-9
        relationship: complements
        confidence: 0.70
        rationale: >
          HIPAA 164.312(e)(1) requires implementing encryption (TLS 1.2+) and
          integrity controls for ePHI transmission. ISO A.8.9 requires
          establishing and monitoring configurations for hardware, software,
          services, and networks. Network and service configurations directly
          determine transmission security posture, including TLS versions,
          cipher suites, and certificate management.
      - id: a5-23
        relationship: complements
        confidence: 0.65
        rationale: >
          HIPAA 164.312(e)(2)(ii) requires encryption of ePHI whenever deemed
          appropriate during transmission. ISO A.5.23 requires establishing
          processes for managing cloud services in accordance with security
          requirements. Cloud service transmission security is a critical
          application of the HIPAA encryption requirement, as ePHI frequently
          traverses cloud networks.

  # ── Breach Notification Rule ──

  # 164.404 — Notification to Individuals
  - source_control: "164.404"
    target_controls:
      - id: a5-36
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          HIPAA 164.404 requires notification to individuals within 60 days of
          discovering a breach of unsecured PHI. ISO A.5.36 requires regular
          compliance review including identification of non-compliance and
          corrective actions. A breach constitutes a compliance failure, and
          the notification and investigation processes overlap with the
          non-compliance identification, root cause analysis, and corrective
          action requirements of A.5.36.
      - id: a8-15
        relationship: complements
        confidence: 0.75
        rationale: >
          HIPAA 164.404 requires determining when a breach was discovered or
          should have been discovered with reasonable diligence, and documenting
          the breach including dates, types of PHI involved, and investigation
          findings. ISO A.8.15 requires logging and analysing activities,
          exceptions, and events. Logging capabilities are essential for breach
          detection and for gathering the evidence needed to fulfil notification
          content requirements.
      - id: a5-1
        relationship: complements
        confidence: 0.60
        rationale: >
          HIPAA 164.404 requires a formal breach notification process with
          specific timelines, content, and methods. ISO A.5.1 requires
          topic-specific policies covering incident management. The breach
          notification procedure is a topic-specific policy that must be
          defined, approved, and communicated to relevant personnel.

  # 164.408 — Notification to the Secretary
  - source_control: "164.408"
    target_controls:
      - id: a5-36
        relationship: intersects-with
        confidence: 0.70
        rationale: >
          HIPAA 164.408 requires notifying the HHS Secretary of breaches,
          maintaining a breach log, and submitting it annually. ISO A.5.36
          requires that compliance review results and corrective actions be
          recorded and reported to management. Both mandate documented records
          of security/compliance failures with formal reporting to oversight
          authorities, though HIPAA specifies external regulatory reporting
          while ISO 27001 focuses on internal management reporting.
      - id: a8-15
        relationship: complements
        confidence: 0.70
        rationale: >
          HIPAA 164.408 requires maintaining a log of all breaches and
          documenting breach scope including the number of affected individuals.
          ISO A.8.15 requires producing, storing, and protecting logs.
          Comprehensive logging is the technical foundation for determining
          breach scope, identifying affected records, and maintaining the
          breach documentation required for HHS notification.
      - id: a5-1
        relationship: complements
        confidence: 0.60
        rationale: >
          HIPAA 164.408 requires formal breach reporting procedures to the
          HHS Secretary with specific timelines based on breach size. ISO A.5.1
          requires defining and communicating information security policies.
          The regulatory notification procedure must be codified as a formal
          policy, documented, and communicated to the privacy officer and
          incident response team.
