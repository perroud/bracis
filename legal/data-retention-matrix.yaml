id: data-retention-matrix
title: "Cross-Framework Data Retention Requirements"
last_updated: "2026-04-03"
description: >
  Comparative matrix of data retention obligations, limitations, and deletion
  requirements across all applicable frameworks. Covers retention periods by
  data type, legal bases for retention, deletion requirements, and exceptions.

frameworks:
  - id: marco-civil
    framework_ref: marco-civil
    articles: "art. 13, art. 15, art. 16"
    retention_periods:
      - data_type: "Connection logs (registros de conexao)"
        period: "1 year"
        mandatory: true
        responsible_party: "Connection providers (provedores de conexao)"
      - data_type: "Application access logs (registros de acesso a aplicacoes)"
        period: "6 months"
        mandatory: true
        responsible_party: "Application providers (provedores de aplicacoes de internet)"
      - data_type: "Content of private communications"
        period: "No mandatory retention"
        mandatory: false
        notes: "May only be accessed by court order"
    legal_basis: "Legal obligation under Marco Civil da Internet (Lei 12.965/2014)"
    deletion_requirements:
      general_rule: "Data must be deleted after retention period expires unless subject to court order"
      user_request: "Users may request deletion of personal data collected by applications (art. 7, VII)"
      exceptions:
        - "Pending court order requiring preservation"
        - "Compliance with other legal retention obligations"
    exceptions:
      - "Court may order extended retention beyond statutory period (art. 13 sec. 2, art. 15 sec. 2)"
      - "Authorities may request provisional preservation of records for specific investigations"
    notes: >
      Marco Civil distinguishes between connection providers (ISPs) and application
      providers (websites, apps). Connection data retention is mandatory for 1 year;
      application data for 6 months. Regulamento do Marco Civil (Decreto 8.771/2016)
      provides additional details on data minimization and security requirements.

  - id: gdpr
    framework_ref: gdpr
    articles: "art. 5(1)(e), art. 13, art. 17, art. 25"
    retention_periods:
      - data_type: "All personal data"
        period: "No specific statutory period"
        mandatory: false
        notes: "Storage limitation principle: data must be kept only as long as necessary for the purpose"
    legal_basis: "Purpose limitation and storage limitation principles (art. 5(1)(b)(e))"
    deletion_requirements:
      general_rule: "Data must be erased when no longer necessary for the purpose for which it was collected"
      right_to_erasure: "Data subjects have the right to erasure (right to be forgotten) under art. 17"
      erasure_triggers:
        - "Data no longer necessary for original purpose"
        - "Consent withdrawn and no other legal ground"
        - "Data subject objects and no overriding legitimate grounds"
        - "Data processed unlawfully"
        - "Legal obligation to erase under EU or member state law"
        - "Data collected in relation to children's information society services"
      data_protection_by_design: "Controllers must implement technical measures to ensure data is not kept longer than necessary (art. 25)"
    exceptions:
      - "Archiving purposes in the public interest"
      - "Scientific or historical research purposes"
      - "Statistical purposes"
      - "Exercise or defense of legal claims"
      - "Compliance with EU or member state legal obligation"
      - "Public health purposes"
    notes: >
      GDPR does not prescribe specific retention periods. Controllers must
      define and document retention periods in their records of processing
      activities (art. 30) and inform data subjects (art. 13/14). Member
      states may impose specific retention periods through national law.
      DPAs have issued sector-specific guidance (e.g., employee data,
      customer data, CCTV footage).

  - id: lgpd
    framework_ref: lgpd
    articles: "art. 15, art. 16"
    retention_periods:
      - data_type: "All personal data"
        period: "No specific statutory period"
        mandatory: false
        notes: "Data must be retained only for the duration necessary to fulfill its processing purpose"
    legal_basis: "Purpose limitation and necessity principles (art. 6)"
    deletion_requirements:
      general_rule: "Processing must end and data must be deleted when purpose is achieved, period expires, or data subject requests (art. 15)"
      deletion_triggers:
        - "Purpose of processing has been achieved"
        - "Processing period has ended"
        - "Data subject requests termination (except when processing is based on legal obligation)"
        - "ANPD determines that processing violates the LGPD"
      authorized_retention_after_termination:
        - "Compliance with legal or regulatory obligation"
        - "Study by research body (anonymization required where possible)"
        - "Transfer to third party (subject to LGPD requirements)"
        - "Exclusive use by the controller (anonymized, no third-party access)"
    exceptions:
      - "Legal or regulatory obligation to retain"
      - "Research purposes (with anonymization)"
      - "Transfer to third party"
      - "Controller's exclusive use after anonymization"
    notes: >
      Like GDPR, LGPD does not prescribe specific retention periods.
      Controllers must define retention based on purpose. ANPD is expected
      to issue further guidance on retention periods for specific sectors.
      Art. 16 specifies that after processing ends, data must be eliminated
      except in the four enumerated cases.

  - id: ccpa-cpra
    framework_ref: ccpa-cpra
    articles: "Cal. Civ. Code sec. 1798.100, sec. 1798.105, sec. 1798.130"
    retention_periods:
      - data_type: "Consumer personal information (lookback period)"
        period: "12 months lookback for disclosure requests"
        mandatory: true
        notes: "Businesses must disclose personal information collected in the preceding 12 months upon verifiable consumer request"
      - data_type: "All personal information"
        period: "No longer than reasonably necessary for the disclosed purpose"
        mandatory: true
        notes: "CPRA added explicit proportionality and purpose limitation requirements"
    legal_basis: "Purpose limitation and data minimization (CPRA amendments)"
    deletion_requirements:
      general_rule: "Consumers have the right to request deletion of their personal information"
      business_obligations:
        - "Delete personal information from records upon verifiable request"
        - "Direct service providers and contractors to delete"
        - "Inform data subjects about their deletion rights"
      response_timeline: "45 calendar days to respond; one 45-day extension permitted"
    exceptions:
      - "Complete the transaction for which the information was collected"
      - "Provide goods or services requested by the consumer"
      - "Perform a contract between business and consumer"
      - "Detect security incidents or protect against fraud"
      - "Debug to identify and repair errors"
      - "Exercise free speech or ensure another consumer's right to free speech"
      - "Comply with California Electronic Communications Privacy Act"
      - "Engage in public or peer-reviewed scientific research"
      - "Internal uses reasonably aligned with consumer expectations"
      - "Comply with a legal obligation"
      - "Otherwise use the information internally in a lawful manner compatible with the context"
    notes: >
      CPRA (effective Jan 2023) strengthened retention requirements by adding
      purpose limitation: businesses must disclose retention periods or criteria
      in their privacy policy for each category of personal information. The
      12-month lookback applies to the right to know/access; actual retention
      depends on disclosed purpose.

  - id: sox
    framework_ref: sox
    articles: "Section 103, Section 802, Section 804"
    retention_periods:
      - data_type: "Audit workpapers and records"
        period: "7 years minimum"
        mandatory: true
        responsible_party: "Public accounting firms"
      - data_type: "Financial records and supporting documentation"
        period: "Not less than 5 years (SEC Rule 17a-4)"
        mandatory: true
        responsible_party: "Public companies and broker-dealers"
      - data_type: "Internal control documentation"
        period: "7 years recommended (aligned with statute of limitations)"
        mandatory: false
        notes: "Section 404 documentation should be retained for audit trail purposes"
      - data_type: "Email and electronic communications related to audits"
        period: "7 years minimum"
        mandatory: true
        responsible_party: "Public accounting firms and relevant employees"
    legal_basis: "Section 802 of SOX (document retention); SEC implementing rules"
    deletion_requirements:
      general_rule: "No proactive deletion requirement; records must be preserved for mandated periods"
      prohibition: "Destruction, alteration, or falsification of records with intent to obstruct an investigation is a criminal offense (Section 802)"
    exceptions:
      - "Routine document retention policies are permissible when no investigation is pending or anticipated"
    notes: >
      SOX Section 802 makes it a criminal offense to knowingly destroy, alter,
      or conceal documents with intent to impede a federal investigation.
      Penalties include up to 20 years imprisonment. PCAOB Rule 3100 requires
      registered firms to comply with auditing standards including documentation
      retention.

  - id: hipaa
    framework_ref: hipaa
    articles: "45 CFR sec. 164.530(j), 45 CFR sec. 164.316(b)(2)"
    retention_periods:
      - data_type: "HIPAA policies and procedures documentation"
        period: "6 years from creation date or last effective date (whichever is later)"
        mandatory: true
      - data_type: "Authorizations, complaints, dispositions"
        period: "6 years"
        mandatory: true
      - data_type: "Risk assessments and audit logs"
        period: "6 years"
        mandatory: true
      - data_type: "Protected Health Information (PHI) in medical records"
        period: "Varies by state law (typically 5-10 years after last encounter; some states require longer)"
        mandatory: true
        notes: "HIPAA defers to state law for medical record retention; HIPAA mandates 6 years for administrative records"
      - data_type: "Business Associate Agreements"
        period: "6 years from termination"
        mandatory: true
    legal_basis: "Administrative simplification provisions; state medical records retention laws"
    deletion_requirements:
      general_rule: "PHI must be disposed of in a manner that renders it unreadable, indecipherable, and unreconstructable"
      disposal_methods:
        - "Paper: shredding, burning, pulping, or pulverizing"
        - "Electronic: clearing, purging, degaussing, or destroying media per NIST SP 800-88"
      patient_rights: "Individuals do not have a blanket right to delete PHI under HIPAA; right of amendment (art. 164.526) is available"
    exceptions:
      - "State laws requiring longer retention periods take precedence"
      - "Ongoing litigation or investigation"
      - "Designated record set obligations"
    notes: >
      HIPAA does not mandate a specific retention period for PHI itself; it
      mandates 6 years for documentation of policies, procedures, and compliance
      activities. State laws govern medical record retention and vary significantly.
      The 2024 HIPAA Security Rule NPRM proposes enhanced documentation requirements.

  - id: pci-dss-v4
    framework_ref: pci-dss-v4
    articles: "Req. 3, Req. 9, Req. 10.7, Req. 12.10.5"
    retention_periods:
      - data_type: "Audit logs"
        period: "12 months minimum; at least 3 months immediately available for analysis"
        mandatory: true
      - data_type: "Cardholder data (PAN, expiration date, cardholder name)"
        period: "Only as long as required for business, legal, or regulatory purposes"
        mandatory: true
        notes: "Must define and document retention period; quarterly review required"
      - data_type: "Sensitive authentication data (full track, CVV/CVC, PIN)"
        period: "Must not be stored after authorization, even if encrypted"
        mandatory: true
      - data_type: "Incident response records"
        period: "Per organizational policy aligned with legal requirements"
        mandatory: true
    legal_basis: "PCI DSS contractual requirement enforced through card brand agreements"
    deletion_requirements:
      general_rule: "Cardholder data exceeding defined retention period must be securely deleted"
      secure_deletion: "Rendering data unrecoverable through cryptographic erasure, degaussing, physical destruction, or secure overwrite"
      quarterly_review: "Quarterly process to identify and securely delete stored cardholder data exceeding retention requirements"
      sensitive_auth_data: "Must be rendered unrecoverable upon completion of the authorization process"
    exceptions:
      - "Issuer entities and companies that support issuing services may store sensitive authentication data if there is a legitimate business justification and the data is stored securely"
      - "Legal or regulatory requirements mandating longer retention"
    notes: >
      PCI DSS takes a strict data minimization approach. Req. 3.1 requires a
      documented data retention and disposal policy. Full PAN must be rendered
      unreadable anywhere it is stored (Req. 3.5). Req. 3.2 prohibits storage
      of sensitive authentication data after authorization. Annual reviews of
      the retention policy are required.

  - id: swift-csp
    framework_ref: swift-csp
    articles: "Control 6.4, Control 5.4"
    retention_periods:
      - data_type: "Transaction logs"
        period: "Per local regulatory requirements (typically 5-7 years for financial transactions)"
        mandatory: true
      - data_type: "Security event logs"
        period: "At least 6 months readily available; longer per local regulation"
        mandatory: true
      - data_type: "SWIFT message data"
        period: "Per local regulatory and business requirements"
        mandatory: true
    legal_basis: "SWIFT CSP contractual obligation and local regulatory requirements"
    deletion_requirements:
      general_rule: "Retention governed by local banking/financial regulations"
      secure_disposal: "Data no longer required must be securely disposed of in accordance with organizational policy"
    exceptions:
      - "Local regulatory requirements may mandate longer retention"
      - "Ongoing investigations or audits"
    notes: >
      SWIFT CSP defers specific retention periods to local regulatory
      frameworks. In practice, financial institutions retain SWIFT-related
      data for 5-7 years aligned with SOX, Basel III, or national banking
      regulations. Security logs must support forensic investigation.

  - id: bacen-4893
    framework_ref: bacen-4893
    articles: "art. 5, art. 22, art. 23"
    retention_periods:
      - data_type: "Cybersecurity incident records"
        period: "5 years minimum"
        mandatory: true
      - data_type: "Documentation of cybersecurity policy and procedures"
        period: "5 years minimum (aligned with CMN general record-keeping requirements)"
        mandatory: true
      - data_type: "Cloud computing and data processing contracts"
        period: "Duration of contract plus 5 years"
        mandatory: true
      - data_type: "Risk assessment documentation"
        period: "5 years minimum"
        mandatory: true
    legal_basis: "CMN Resolution 4893/2021; BCB general record-keeping requirements"
    deletion_requirements:
      general_rule: "Records must be maintained for the statutory period; deletion after period is permitted subject to LGPD requirements"
      data_localization: "BCB may require that data processed abroad be available domestically"
    exceptions:
      - "BCB may require extended retention for specific institutions under enhanced supervision"
      - "Ongoing BCB investigations or audit processes"
    notes: >
      Bacen 4893 aligns with the general CMN requirement for financial
      institutions to maintain records for 5 years. For personal data,
      LGPD requirements also apply. Cloud computing arrangements require
      specific documentation retention including contracts, risk assessments,
      and due diligence records.

  - id: dora
    framework_ref: dora
    articles: "art. 6, art. 17, art. 28"
    retention_periods:
      - data_type: "ICT incident records"
        period: "Sufficient to support post-incident reviews and supervisory reporting (minimum 5 years recommended by ESAs)"
        mandatory: true
      - data_type: "ICT third-party contractual documentation"
        period: "Duration of arrangement plus regulatory retention period"
        mandatory: true
      - data_type: "Digital operational resilience testing results"
        period: "Retained for supervisory review (minimum 3 years recommended)"
        mandatory: true
    legal_basis: "Regulation (EU) 2022/2554 and ESA regulatory technical standards"
    deletion_requirements:
      general_rule: "Records must support supervisory review; no specific deletion mandate"
    exceptions:
      - "Ongoing supervisory investigation"
      - "Cross-border incident requiring coordination"
    notes: >
      DORA does not prescribe exact retention periods for most records;
      it requires that financial entities maintain sufficient documentation
      to demonstrate compliance and support supervisory reviews. ESAs
      are expected to provide further guidance through Level 2 measures.

  - id: nis2
    framework_ref: nis2
    articles: "art. 21, art. 23"
    retention_periods:
      - data_type: "Incident records and notifications"
        period: "As required by national transposition laws (typically 3-5 years)"
        mandatory: true
      - data_type: "Risk management and security documentation"
        period: "Per national transposition laws"
        mandatory: true
    legal_basis: "Directive (EU) 2022/2555 transposed into member state law"
    deletion_requirements:
      general_rule: "Per national transposition; GDPR applies for personal data components"
    exceptions:
      - "National security considerations"
      - "Ongoing CSIRT investigations"
    notes: >
      NIS 2 as a directive leaves specific retention periods to member state
      implementation. Most member states are expected to align with existing
      national record-keeping requirements (typically 3-5 years for security
      documentation).

  - id: pipl
    framework_ref: pipl
    articles: "art. 19, art. 21, art. 47"
    retention_periods:
      - data_type: "All personal information"
        period: "Minimum period necessary to achieve the processing purpose"
        mandatory: true
        notes: "Must not exceed the shortest period necessary for the purpose"
    legal_basis: "Purpose limitation and data minimization principles (art. 6, art. 19)"
    deletion_requirements:
      general_rule: "Personal information must be deleted when the processing purpose has been achieved, cannot be achieved, or is no longer necessary"
      deletion_triggers:
        - "Purpose of processing has been achieved or is no longer achievable"
        - "Product or service provision has ceased"
        - "Consent has been withdrawn by the individual"
        - "Individual requests deletion"
        - "Processing violates law, administrative regulation, or agreement"
      proactive_obligation: "Processor must proactively delete personal information when conditions are met; if deletion is not performed, the individual may request deletion"
    exceptions:
      - "Retention required by law or administrative regulation"
      - "Retention period prescribed by law has not expired"
    notes: >
      PIPL's retention requirements are strict: the processor must use the
      shortest period necessary and proactively delete data when the purpose
      is fulfilled. Unlike GDPR, which leaves retention to controller discretion,
      PIPL creates an affirmative obligation to delete. CAC implementing
      regulations provide additional detail on retention documentation.

  - id: dpdp-india
    framework_ref: dpdp-india
    articles: "sec. 8(7), sec. 12"
    retention_periods:
      - data_type: "All personal data"
        period: "No longer than necessary for the purpose for which it was processed"
        mandatory: true
        notes: "Data must be erased when consent is withdrawn or purpose is fulfilled, unless retention required by law"
    legal_basis: "Purpose limitation under sec. 6 and data erasure obligations under sec. 12"
    deletion_requirements:
      general_rule: "Data fiduciary must erase personal data when it is no longer needed for the purpose for which it was processed, unless retention is required by law"
      erasure_triggers:
        - "Purpose of processing has been fulfilled"
        - "Consent has been withdrawn by the data principal"
        - "Data principal exercises right of erasure (sec. 12)"
      timeline: "Data fiduciary must erase data and cause its data processor to erase data without unreasonable delay"
    exceptions:
      - "Retention required by any law in force"
      - "Retention necessary for compliance with court orders or legal proceedings"
    notes: >
      DPDP Act creates a clear obligation to erase when purpose is fulfilled
      or consent is withdrawn. The Act does not specify exact retention periods,
      leaving it to the data fiduciary to determine based on purpose. Rules
      under the Act (pending finalization) may specify sector-specific retention
      requirements.

  - id: pdpa-singapore
    framework_ref: pdpa-singapore
    articles: "sec. 25, sec. 26"
    retention_periods:
      - data_type: "All personal data"
        period: "Only as long as necessary for the business or legal purpose for which it was collected"
        mandatory: true
        notes: "Must cease retention when no longer serves a business or legal purpose"
    legal_basis: "Retention limitation obligation (sec. 25)"
    deletion_requirements:
      general_rule: >-
        Organization must cease to retain personal data, or remove
        the means by which the data can be associated with particular
        individuals, when retention is no longer necessary for any
        business or legal purpose
      cessation_methods:
        - "Destruction of the document or record containing the personal data"
        - "Removal of the means by which the data can be associated with particular individuals (anonymization)"
      reasonable_steps: "Must take reasonable steps to ensure that personal data in its possession or control is destroyed or anonymized"
    exceptions:
      - "Retention required by law, regulation, or court order"
      - "Retention for ongoing business purpose (documented)"
    notes: >
      PDPA Singapore is explicit about the obligation to cease retention rather
      than merely allowing deletion. The obligation is proactive: organizations
      must regularly review and determine whether retention is still necessary.
      PDPC Advisory Guidelines on key concepts provide detailed guidance on
      implementing retention policies.

  - id: appi
    framework_ref: appi
    articles: "art. 22"
    retention_periods:
      - data_type: "Retained personal data"
        period: "No specific statutory period mandated"
        mandatory: false
        notes: "Purpose of use must be specified; data must be deleted without delay when utilization purpose has been achieved"
    legal_basis: "Purpose limitation and data quality principles (art. 16, art. 22)"
    deletion_requirements:
      general_rule: "Business operator must endeavor to delete personal data without delay when the utilization purpose has been achieved"
      obligation_type: "Endeavor obligation (doryoku gimu) — not an absolute requirement but a strong expectation"
      individual_request: "Individual may request deletion of retained personal data when data is no longer needed, was obtained through deception, or is being used in violation of APPI (art. 35)"
    exceptions:
      - "Retention required by other laws"
      - "Retention necessary for the ongoing utilization purpose"
    notes: >
      APPI uses an "endeavor" obligation for deletion, which is softer than
      GDPR's mandatory erasure. The 2020 amendments strengthened individual
      deletion rights by expanding the definition of retained personal data
      to include data scheduled for deletion within 6 months (previously
      excluded). PPC guidelines provide sector-specific retention recommendations.

  - id: pipa-korea
    framework_ref: pipa-korea
    articles: "art. 21"
    retention_periods:
      - data_type: "All personal information"
        period: "Must be destroyed within 5 days of purpose achievement"
        mandatory: true
        notes: "If retention is needed beyond purpose achievement, data must be separated and access limited"
    legal_basis: "Destruction obligation upon purpose achievement (art. 21)"
    deletion_requirements:
      general_rule: "Personal information processor must destroy personal information without delay when the retention period has elapsed or the purpose of processing has been achieved"
      timeline: "Within 5 days of purpose achievement or retention period expiration"
      separation_requirement: >-
        If retention is required by other laws despite purpose
        achievement, the personal information must be stored and
        managed separately from other personal information, with
        access limited to authorized personnel
      destruction_methods:
        - "Electronic files: permanent deletion using technology that prevents recovery"
        - "Non-electronic records: shredding, incineration, or other method rendering unrecoverable"
    exceptions:
      - "Retention required by other laws (must separate and limit access)"
      - "Outstanding statutory retention obligations"
    notes: >
      PIPA Korea has one of the most specific deletion timelines globally with its
      5-day destruction requirement. The separation and access limitation requirement
      for data retained under other laws is a unique and rigorous approach. PIPC
      enforcement actions have focused significantly on retention violations.

  - id: kvkk
    framework_ref: kvkk
    articles: "art. 4, art. 7"
    retention_periods:
      - data_type: "All personal data"
        period: "No specific statutory period; must be relevant and limited to purpose"
        mandatory: true
        notes: "Must be retained only for the period prescribed by relevant legislation or required for the purpose of processing"
    legal_basis: "Purpose limitation and data minimization principles (art. 4)"
    deletion_requirements:
      general_rule: >-
        When the reasons necessitating data processing cease to exist,
        personal data must be deleted, destroyed, or anonymized by the
        data controller ex officio or upon request of the data subject
      methods:
        - "Deletion: rendering data inaccessible and unreusable by relevant users"
        - "Destruction: rendering data inaccessible, irretrievable, and unreusable by anyone"
        - "Anonymization: rendering data impossible to associate with an identified or identifiable natural person, even through matching with other data"
      regulation: "Regulation on Deletion, Destruction, or Anonymization of Personal Data provides detailed implementation guidance"
    exceptions:
      - "Processing required by law"
      - "Retention necessary for establishment, exercise, or defense of legal claims"
    notes: >
      The Turkish Data Protection Board has issued a specific regulation on deletion,
      destruction, and anonymization with detailed requirements. Data controllers must
      prepare a Personal Data Retention and Destruction Policy. The Board has issued
      significant fines for violations of retention and destruction obligations.

  - id: fda-21-cfr-11
    framework_ref: fda-21-cfr-11
    articles: "21 CFR Part 11 sec. 11.10, sec. 11.30, sec. 11.300; predicate rules vary"
    retention_periods:
      - data_type: "Electronic records subject to predicate rules"
        period: "As required by the applicable predicate rule (varies: 2 years to product lifetime)"
        mandatory: true
        notes: "Part 11 does not independently define retention periods; it requires that electronic records are maintained for the period specified by the underlying predicate rule"
      - data_type: "Audit trails"
        period: "Must be retained at least as long as the associated electronic records"
        mandatory: true
        notes: "Computer-generated, time-stamped audit trails must document record creation, modification, and deletion"
      - data_type: "Electronic signatures and signature manifestations"
        period: "Must be retained as long as the signed records"
        mandatory: true
    legal_basis: "21 CFR Part 11 (electronic records and signatures); predicate rules (e.g., 21 CFR 211 for cGMP, 21 CFR 820 for QSR)"
    deletion_requirements:
      general_rule: "Electronic records may not be deleted during the mandatory retention period defined by the predicate rule; audit trails must track any deletion"
      integrity: "Records must be maintained with controls to ensure authenticity, integrity, and confidentiality throughout the retention period"
      system_controls:
        - "System validation to ensure accuracy, reliability, and performance"
        - "Ability to generate accurate and complete copies of records for FDA inspection"
        - "Protection against unauthorized alteration or deletion"
    exceptions:
      - >-
        Retention periods vary by predicate rule: cGMP manufacturing
        records (21 CFR 211.180) require minimum 1 year after batch
        expiry or 3 years after distribution; medical device records
        (21 CFR 820) require retention for product lifetime
      - "FDA may require extended retention during inspections or investigations"
    common_predicate_retention_periods:
      - rule: "21 CFR 211.180 (Drug cGMP)"
        period: "1 year after batch expiry date or 3 years after distribution, whichever is longer"
      - rule: "21 CFR 820.180 (Medical Device QSR)"
        period: "Duration equivalent to design and expected life of device, but not less than 2 years from commercial distribution"
      - rule: "21 CFR 58 (GLP)"
        period: "Retained for period specified in the study protocol or at least 5 years after marketing application submission"
      - rule: "21 CFR 312 (IND)"
        period: "2 years after marketing application approval or investigation discontinuation"
    notes: >
      FDA 21 CFR Part 11 governs the use of electronic records and electronic
      signatures in FDA-regulated industries. It does not itself define retention
      periods but requires that electronic records comply with the retention
      requirements of the applicable predicate rule. The audit trail requirement
      is critical: all record changes must be documented and the audit trail
      retained for at least as long as the underlying record. FDA's 2003 guidance
      on Part 11 scope and application remains the primary interpretive document.

comparison_summary:
  longest_mandatory_retention:
    framework: "FDA 21 CFR Part 11 / SOX"
    period: "Product lifetime (FDA medical device predicate rules) / 7 years (SOX audit workpapers)"
  shortest_mandatory_retention:
    framework: "Marco Civil"
    period: "6 months for application access logs"
  strictest_deletion_timeline:
    framework: "PIPA Korea"
    period: "5 days after purpose achievement"
  no_specific_period:
    - "GDPR (purpose limitation principle)"
    - "LGPD (purpose limitation principle)"
    - "APPI (endeavor obligation to delete)"
    - "KVKK (purpose-based, no defined period)"
    - "DPDP India (purpose-based, no defined period)"
    - "PDPA Singapore (business/legal purpose-based)"
  strictest_deletion:
    framework: "PCI DSS v4"
    rule: "Sensitive authentication data must never be stored after authorization; quarterly deletion review required"
