id: data-subject-rights-matrix
title: "Cross-Framework Data Subject Rights Comparison"
last_updated: "2026-04-06"
description: >
  Comparative matrix of data subject rights across privacy and data protection
  frameworks. Covers right of access, deletion/erasure, portability, rectification,
  objection, automated decision-making explanation, consent withdrawal, restriction
  of processing, and right to lodge a complaint with a supervisory authority.

frameworks:
  - id: gdpr
    framework_ref: gdpr
    articles: "art. 15, art. 16, art. 17, art. 18, art. 20, art. 21, art. 22, art. 7(3), art. 77"
    rights:
      access:
        available: true
        article: "art. 15"
        scope: >-
          Right to obtain confirmation of processing, access to personal data,
          and information including purposes, categories, recipients, retention
          period, source of data, and existence of automated decision-making
        conditions: >-
          No specific conditions; controller must provide a copy of the personal
          data undergoing processing free of charge
        exceptions:
          - "Manifestly unfounded or excessive requests (may charge reasonable fee or refuse)"
          - "Rights and freedoms of others must not be adversely affected"
        timeline: "Without undue delay, at the latest within one month (extendable by two months for complex requests)"
      deletion_erasure:
        available: true
        article: "art. 17"
        scope: >-
          Right to erasure of personal data without undue delay (right to be
          forgotten), including obligation to inform other controllers of
          erasure request
        conditions: >-
          Data no longer necessary for purpose; consent withdrawn; data subject
          objects with no overriding grounds; data processed unlawfully; legal
          obligation to erase; data collected for information society services
          to children
        exceptions:
          - "Freedom of expression and information"
          - "Compliance with a legal obligation under EU or member state law"
          - "Public interest in the area of public health"
          - "Archiving in public interest, scientific or historical research, or statistical purposes"
          - "Establishment, exercise, or defense of legal claims"
        timeline: "Without undue delay, at the latest within one month"
      portability:
        available: true
        article: "art. 20"
        format: "Structured, commonly used, and machine-readable format"
        conditions: >-
          Applies only when processing is based on consent or contract and is
          carried out by automated means; includes right to transmit data
          directly to another controller where technically feasible
        exceptions:
          - "Does not apply to processing necessary for a task in the public interest or exercise of official authority"
          - "Must not adversely affect the rights and freedoms of others"
      rectification:
        available: true
        article: "art. 16"
        scope: >-
          Right to rectification of inaccurate personal data and right to have
          incomplete personal data completed, including by means of a
          supplementary statement
        timeline: "Without undue delay, at the latest within one month"
      objection:
        available: true
        article: "art. 21"
        grounds: >-
          Data subject may object on grounds relating to their particular
          situation when processing is based on legitimate interests (art. 6(1)(f))
          or public interest (art. 6(1)(e)); unconditional right to object to
          direct marketing
        exceptions:
          - "Compelling legitimate grounds for processing that override the data subject's interests"
          - "Processing for establishment, exercise, or defense of legal claims"
      automated_decision_making:
        available: true
        article: "art. 22"
        scope: >-
          Right not to be subject to a decision based solely on automated
          processing, including profiling, which produces legal effects or
          similarly significantly affects the data subject; right to obtain
          human intervention, express point of view, and contest the decision
        exceptions:
          - "Decision necessary for entering into or performance of a contract"
          - "Authorized by EU or member state law with suitable safeguards"
          - "Based on explicit consent"
      consent_withdrawal:
        available: true
        article: "art. 7(3)"
        requirements: >-
          Must be as easy to withdraw consent as to give it; data subject must
          be informed of the right to withdraw before giving consent
        effect: "Withdrawal does not affect the lawfulness of processing based on consent before its withdrawal"
      restriction_of_processing:
        available: true
        article: "art. 18"
        grounds:
          - "Accuracy of data is contested (restricted for verification period)"
          - "Processing is unlawful and data subject opposes erasure"
          - "Controller no longer needs data but data subject needs it for legal claims"
          - "Data subject has objected under art. 21 (restricted pending verification of legitimate grounds)"
        effect: >-
          Data may only be stored; any other processing requires data subject
          consent or is limited to legal claims, protection of rights, or
          important public interest
      complaint_to_authority:
        available: true
        article: "art. 77"
        authority: >-
          Supervisory Authority of the member state of habitual residence,
          place of work, or place of the alleged infringement (e.g., CNIL in
          France, BfDI in Germany, ICO in the UK pre-Brexit)
    notes: >
      GDPR provides the most comprehensive set of data subject rights among
      global frameworks. All rights are subject to the one-month response
      timeline (extendable by two months). Controllers must facilitate the
      exercise of rights and may not charge a fee except for manifestly
      unfounded or excessive requests. Rights may be restricted under art. 23
      by EU or member state law for specific purposes such as national security
      or prevention of crime.

  - id: lgpd
    framework_ref: lgpd
    articles: "art. 18, art. 19, art. 20, art. 8(5), art. 55-J"
    rights:
      access:
        available: true
        article: "art. 18, I e II"
        scope: >-
          Confirmação da existência de tratamento e acesso aos dados pessoais.
          O titular pode solicitar cópia completa dos dados em formato
          simplificado ou detalhado
        conditions: >-
          Pode ser exercido mediante requisição ao controlador; formato
          simplificado (imediato) ou completo (até 15 dias)
        exceptions:
          - "Segredos comercial e industrial (art. 18, §7)"
        timeline: >-
          Simplified format: immediate; complete declaration: up to 15 days
          from the request (art. 19)
      deletion_erasure:
        available: true
        article: "art. 18, VI"
        scope: >-
          Eliminação dos dados pessoais tratados com o consentimento do
          titular, exceto nas hipóteses previstas no art. 16
        conditions: >-
          Data processed based on consent; data subject must request deletion
        exceptions:
          - "Compliance with legal or regulatory obligation by the controller"
          - "Study by research body (anonymization guaranteed when possible)"
          - "Transfer to third party (provided data protection requirements are met)"
          - "Exclusive use by the controller with anonymized data"
        timeline: "No specific statutory deadline; ANPD may regulate timelines"
      portability:
        available: true
        article: "art. 18, V"
        format: "ANPD regulation pending; no specific format mandated in the law itself"
        conditions: >-
          Portability to another service or product provider, upon express
          request; subject to commercial and industrial secrecy
        exceptions:
          - "Commercial and industrial secrets (segredo comercial e industrial)"
      rectification:
        available: true
        article: "art. 18, III"
        scope: >-
          Correção de dados incompletos, inexatos ou desatualizados
        timeline: "No specific statutory deadline defined in the law"
      objection:
        available: true
        article: "art. 18, §2"
        grounds: >-
          Right to object to processing carried out based on any legal basis
          other than consent, in case of non-compliance with the LGPD
        exceptions:
          - "Processing demonstrated to be in compliance with the LGPD"
      automated_decision_making:
        available: true
        article: "art. 20"
        scope: >-
          Right to request review of decisions made solely by automated
          processing that affect the data subject's interests, including
          profiling decisions; right to receive clear and adequate information
          about the criteria and procedures used
        exceptions:
          - "Commercial and industrial secrets may limit the explanation provided"
      consent_withdrawal:
        available: true
        article: "art. 8, §5; art. 18, IX"
        requirements: >-
          Revogação do consentimento pode ser feita a qualquer momento,
          mediante manifestação expressa do titular, por procedimento gratuito
          e facilitado
        effect: >-
          Processing performed prior to withdrawal remains lawful; effects are
          prospective only
      restriction_of_processing:
        available: false
        article: "N/A"
        grounds: []
        effect: >-
          LGPD does not provide an explicit right to restriction of processing
          comparable to GDPR art. 18. The data subject may request blocking or
          deletion under art. 18, IV, but this is closer to suspension than
          restriction
      complaint_to_authority:
        available: true
        article: "art. 18, §1; art. 55-J, V"
        authority: >-
          Autoridade Nacional de Proteção de Dados (ANPD) — the national data
          protection authority of Brazil
    notes: >
      A LGPD garante amplo conjunto de direitos aos titulares de dados (art. 18),
      incluindo confirmação, acesso, correção, anonimização, portabilidade,
      eliminação, informação sobre compartilhamento, e revogação do consentimento.
      O art. 20 foi alterado pela Lei 13.853/2019 para garantir o direito à
      revisão de decisões automatizadas, mas a obrigação de explicação pode ser
      limitada por segredo comercial. A ANPD tem competência exclusiva para
      aplicar sanções administrativas.

  - id: ccpa-cpra
    framework_ref: ccpa-cpra
    articles: "Cal. Civ. Code §1798.100, §1798.105, §1798.106, §1798.110, §1798.120, §1798.121, §1798.125, §1798.130, §1798.185"
    rights:
      access:
        available: true
        article: "Cal. Civ. Code §1798.100, §1798.110"
        scope: >-
          Right to know what personal information is collected, sold, or
          disclosed; right to obtain specific pieces of personal information
          held by the business; categories of sources, purposes, and third
          parties
        conditions: >-
          Verifiable consumer request; business must verify identity before
          disclosing specific pieces of personal information
        exceptions:
          - "May not request specific pieces more than twice in a 12-month period"
          - "Household data requests require verification of all household members"
        timeline: "45 days from receipt of verifiable request (extendable by an additional 45 days with notice)"
      deletion_erasure:
        available: true
        article: "Cal. Civ. Code §1798.105"
        scope: >-
          Right to request deletion of personal information collected by the
          business; business must also direct service providers and contractors
          to delete
        conditions: "Verifiable consumer request"
        exceptions:
          - "Completing the transaction for which the data was collected"
          - "Detecting security incidents or protecting against fraud"
          - "Debugging to identify and repair errors"
          - "Exercising free speech or other legal rights"
          - "Compliance with the California Electronic Communications Privacy Act"
          - "Internal uses reasonably aligned with consumer expectations"
          - "Compliance with a legal obligation"
          - "Otherwise lawful internal uses compatible with the context of collection"
        timeline: "45 days from receipt of verifiable request (extendable by an additional 45 days)"
      portability:
        available: true
        article: "Cal. Civ. Code §1798.100(d), §1798.130"
        format: >-
          Readily useable format that allows transmission to another entity
          without hindrance; CPRA adds right to request transfer to another
          business where technically feasible
        conditions: "Verifiable consumer request; business must transmit to designated entity upon request"
        exceptions:
          - "Technical feasibility limitations"
          - "Security concerns may limit format"
      rectification:
        available: true
        article: "Cal. Civ. Code §1798.106 (added by CPRA)"
        scope: "Right to request correction of inaccurate personal information"
        timeline: "45 days from receipt of verifiable request (extendable by an additional 45 days)"
      objection:
        available: true
        article: "Cal. Civ. Code §1798.120, §1798.121"
        grounds: >-
          Right to opt out of the sale or sharing of personal information;
          CPRA adds right to limit use and disclosure of sensitive personal
          information to purposes necessary for providing the goods or services
        exceptions:
          - "Does not apply when personal information is not sold or shared"
          - "Consumers under 16 require opt-in (under 13 requires parental consent)"
      automated_decision_making:
        available: true
        article: "Cal. Civ. Code §1798.185(a)(16) (CPRA delegation to CPPA for rulemaking)"
        scope: >-
          CPRA directs the California Privacy Protection Agency to issue
          regulations governing access and opt-out rights with respect to
          automated decision-making technology including profiling; right to
          opt out of automated decision-making and request information about
          the logic involved (rulemaking ongoing as of 2026)
        exceptions:
          - "Scope of rights depends on final CPPA regulations"
      consent_withdrawal:
        available: true
        article: "Cal. Civ. Code §1798.120, §1798.135"
        requirements: >-
          Businesses must provide a clear and conspicuous link titled
          Do Not Sell or Share My Personal Information on their homepage;
          must honor Global Privacy Control signals
        effect: >-
          Opt-out of sale/sharing is prospective; prior sales are not
          retroactively invalidated but business must not sell or share after
          opt-out
      restriction_of_processing:
        available: true
        article: "Cal. Civ. Code §1798.121 (CPRA)"
        grounds:
          - "Consumer requests limitation of use and disclosure of sensitive personal information"
        effect: >-
          Business must limit use of sensitive personal information to
          purposes necessary and expected for performing the requested service
          or providing the requested goods
      complaint_to_authority:
        available: true
        article: "Cal. Civ. Code §1798.199.10 et seq."
        authority: >-
          California Privacy Protection Agency (CPPA); consumers may also file
          complaints with the California Attorney General
    notes: >
      CCPA/CPRA provides a consumer-centric rights framework. Unlike GDPR,
      it focuses heavily on the right to opt out of sale/sharing rather than
      a broad right to object. CPRA (Proposition 24, effective January 2023)
      significantly expanded rights by adding rectification, restriction of
      sensitive data use, and automated decision-making provisions. The CPPA
      is actively developing regulations for automated decision-making as of
      2026.

  - id: hipaa
    framework_ref: hipaa
    articles: "45 CFR §164.524, §164.526, §164.528, §164.522"
    rights:
      access:
        available: true
        article: "45 CFR §164.524"
        scope: >-
          Right to inspect and obtain a copy of protected health information
          (PHI) in a designated record set maintained by or for a covered
          entity, including medical records and billing records
        conditions: >-
          Written request; covered entity may require identity verification;
          reasonable cost-based fee for copies
        exceptions:
          - "Psychotherapy notes"
          - "Information compiled in anticipation of civil, criminal, or administrative action"
          - "PHI maintained by certain research laboratories under CLIA"
          - "Information from an inmate when access would jeopardize safety"
          - "Information obtained under a promise of confidentiality from a non-health-care-provider source"
        timeline: "30 days from receipt of request (extendable by an additional 30 days with written notice)"
      deletion_erasure:
        available: false
        article: "N/A"
        scope: >-
          HIPAA does not provide a general right to deletion of PHI. Covered
          entities are required to retain records for minimum periods under
          federal and state law
        conditions: "N/A"
        exceptions: []
        timeline: "N/A"
      portability:
        available: true
        article: "45 CFR §164.524(c)(2)(ii), §164.524(c)(3)(iii) (as amended by 21st Century Cures Act / Information Blocking Rule)"
        format: >-
          PHI must be provided in the form and format requested if readily
          producible, otherwise in a readable hard copy or other agreed-upon
          format; electronic copy if PHI maintained electronically; TEFCA
          framework supports interoperability
        conditions: "Individual must request; covered entity must provide in requested format if readily producible"
        exceptions:
          - "Format may be negotiated if not readily producible"
      rectification:
        available: true
        article: "45 CFR §164.526"
        scope: >-
          Right to request amendment of PHI in a designated record set when
          the individual believes the information is inaccurate or incomplete
        timeline: "60 days from receipt of request (extendable by an additional 30 days with written notice)"
      objection:
        available: false
        article: "N/A"
        grounds: >-
          HIPAA does not provide a general right to object to processing;
          however, individuals may request restrictions on certain disclosures
          under §164.522
        exceptions: []
      automated_decision_making:
        available: false
        article: "N/A"
        scope: >-
          HIPAA does not address automated decision-making or profiling rights
        exceptions: []
      consent_withdrawal:
        available: true
        article: "45 CFR §164.508"
        requirements: >-
          Individual may revoke an authorization for use or disclosure of PHI
          in writing at any time, except to the extent the covered entity has
          already acted in reliance on the authorization
        effect: "Revocation is prospective only; actions taken in reliance on the authorization before revocation are not affected"
      restriction_of_processing:
        available: true
        article: "45 CFR §164.522(a)"
        grounds:
          - "Individual requests restriction on use or disclosure of PHI for treatment, payment, or health care operations"
          - >-
            Mandatory restriction when individual pays out of pocket in full
            and requests restriction on disclosure to health plan
        effect: >-
          Covered entity is not required to agree to a requested restriction
          (except for out-of-pocket payments), but if agreed, must comply
          except in emergencies
      complaint_to_authority:
        available: true
        article: "45 CFR §160.306"
        authority: >-
          U.S. Department of Health and Human Services (HHS), Office for Civil
          Rights (OCR)
    notes: >
      HIPAA is a sector-specific health data regulation, not a comprehensive
      privacy law. It provides access, amendment, and accounting of disclosures
      rights but lacks deletion, objection, and automated decision-making
      rights. The HIPAA Privacy Rule applies only to covered entities (health
      plans, health care clearinghouses, health care providers) and their
      business associates. The 21st Century Cures Act and Information Blocking
      Rule have enhanced portability requirements.

  - id: pipl
    framework_ref: pipl
    articles: "art. 44, art. 45, art. 46, art. 47, art. 15, art. 24, art. 50, art. 65"
    rights:
      access:
        available: true
        article: "art. 44, art. 45"
        scope: >-
          Right to know and access personal information processed by the
          handler, including processing rules, purpose, methods, categories,
          and retention period; right to obtain a copy of personal information
        conditions: >-
          Request to the personal information handler; handler must respond
          in a timely manner
        exceptions:
          - "Where laws or administrative regulations provide that confidentiality shall be maintained"
          - "Where it is not necessary to inform the individual"
        timeline: "Timely response required; no specific statutory deadline defined"
      deletion_erasure:
        available: true
        article: "art. 47"
        scope: >-
          Right to request deletion of personal information; handler must
          proactively delete when purpose has been achieved, period has
          expired, consent withdrawn, or processing violates the law
        conditions: >-
          Processing purpose achieved or impossible to achieve; consent
          withdrawn; handling violates law or agreement; handler ceases
          services
        exceptions:
          - "Retention period required by law or administrative regulation has not expired"
          - "Deletion is technically difficult (handler must cease processing other than storage and security)"
        timeline: "Timely response required; no specific statutory deadline"
      portability:
        available: true
        article: "art. 45"
        format: "Transfer to another designated handler in compliance with CAC rules (specific format pending regulation)"
        conditions: >-
          Request to transfer personal information to a handler designated by
          the individual; must meet conditions set by the Cyberspace
          Administration of China
        exceptions:
          - "Subject to CAC regulations on specific conditions"
      rectification:
        available: true
        article: "art. 46"
        scope: >-
          Right to request correction or supplementation of personal
          information that is inaccurate or incomplete
        timeline: "Timely response required; no specific statutory deadline"
      objection:
        available: true
        article: "art. 44"
        grounds: >-
          Right to restrict or refuse the processing of personal information
          except where laws or administrative regulations provide otherwise
        exceptions:
          - "Where laws or administrative regulations provide otherwise"
      automated_decision_making:
        available: true
        article: "art. 24"
        scope: >-
          Right to request explanation of automated decision-making; right to
          refuse decisions made solely through automated decision-making that
          have a significant impact on individual rights and interests; handlers
          must ensure transparency and fairness, and must not unreasonably
          differentiate in pricing or transaction conditions
        exceptions:
          - "Handler may demonstrate the decision is fair and does not unreasonably differentiate"
      consent_withdrawal:
        available: true
        article: "art. 15"
        requirements: >-
          Individual has the right to withdraw consent at any time; handler
          must provide a convenient way to withdraw consent
        effect: "Withdrawal does not affect the lawfulness of processing carried out before withdrawal"
      restriction_of_processing:
        available: true
        article: "art. 44"
        grounds:
          - "Individual right to restrict processing of personal information"
        effect: >-
          Handler must restrict processing as requested unless laws or
          administrative regulations provide otherwise
      complaint_to_authority:
        available: true
        article: "art. 50, art. 65"
        authority: >-
          Cyberspace Administration of China (CAC) and relevant departments
          of the State Council; individuals may also file complaints with the
          handler's designated responsible person or department
    notes: >
      PIPL provides a comprehensive set of data subject rights comparable to
      GDPR. Art. 24 on automated decision-making is notably detailed, including
      provisions against algorithmic discrimination in pricing. Cross-border
      transfer restrictions under art. 38-43 may affect the exercise of
      portability rights. The CAC is expected to issue detailed regulations
      on exercise of rights.

  - id: dpdp-india
    framework_ref: dpdp-india
    articles: "sec. 11, sec. 12, sec. 13, sec. 14, sec. 31"
    rights:
      access:
        available: true
        article: "sec. 11"
        scope: >-
          Right to obtain a summary of personal data being processed and
          processing activities, including the identities of all data
          fiduciaries and data processors with whom personal data has been
          shared; right to know whether specific personal data is being
          processed
        conditions: "Request to the data fiduciary"
        exceptions:
          - "State may exempt certain data fiduciaries or classes of processing by notification (sec. 17)"
        timeline: "As prescribed by rules (timelines to be specified in delegated legislation)"
      deletion_erasure:
        available: true
        article: "sec. 12(d), sec. 13"
        scope: >-
          Right to erasure of personal data that is no longer necessary for
          the purpose for which it was processed, unless retention is required
          by law
        conditions: "Consent withdrawn or specified purpose fulfilled"
        exceptions:
          - "Retention required by any law in force"
          - "Purpose of processing has not yet been fulfilled"
        timeline: "As prescribed by rules"
      portability:
        available: false
        article: "N/A"
        format: "N/A"
        conditions: >-
          The DPDP Act 2023 does not include an explicit right to data
          portability; this was deliberately excluded from the final version
        exceptions: []
      rectification:
        available: true
        article: "sec. 12(a), (b), (c)"
        scope: >-
          Right to correction of inaccurate or misleading personal data;
          right to completion of incomplete personal data; right to update
          personal data
        timeline: "As prescribed by rules"
      objection:
        available: false
        article: "N/A"
        grounds: >-
          The DPDP Act 2023 does not provide a general right to object to
          processing; the primary mechanism is consent withdrawal
        exceptions: []
      automated_decision_making:
        available: false
        article: "N/A"
        scope: >-
          The DPDP Act 2023 does not include specific rights related to
          automated decision-making or profiling
        exceptions: []
      consent_withdrawal:
        available: true
        article: "sec. 6(6), sec. 6(7)"
        requirements: >-
          Data principal may withdraw consent at any time with the same ease
          as it was given; the data fiduciary must enable this
        effect: >-
          Withdrawal is prospective; consequences of withdrawal must be borne
          by the data principal; does not affect lawfulness of prior processing
      restriction_of_processing:
        available: false
        article: "N/A"
        grounds: []
        effect: "The DPDP Act 2023 does not provide an explicit right to restriction of processing"
      complaint_to_authority:
        available: true
        article: "sec. 14, sec. 31"
        authority: "Data Protection Board of India (DPBI)"
    notes: >
      The DPDP Act 2023 is a principles-based framework that deliberately
      omits some rights found in GDPR (portability, objection, automated
      decision-making, restriction of processing). Many operational details
      are delegated to rules to be prescribed by the Central Government. The
      Act introduces the concept of Significant Data Fiduciaries with
      additional obligations. Exemptions under sec. 17 allow the government
      to exempt state instrumentalities from certain provisions.

  - id: pdpa-singapore
    framework_ref: pdpa-singapore
    articles: "sec. 21, sec. 22, sec. 25, sec. 26, sec. 26A-26H, sec. 28, sec. 37"
    rights:
      access:
        available: true
        article: "sec. 21"
        scope: >-
          Right to request access to personal data in the possession or
          control of the organization, and information about how the data
          has been or may have been used or disclosed within the past year
        conditions: >-
          Request in writing; organization may charge a reasonable fee for
          access
        exceptions:
          - "Unreasonable interference with operations of the organization"
          - "Threat to safety or health of another individual"
          - "Personal data of other individuals would be revealed"
          - "National interest"
          - "Data subject to legal privilege"
          - "Fifth Schedule exceptions (including investigative bodies and employment-related)"
        timeline: "30 days from receipt of request (extendable with notice)"
      deletion_erasure:
        available: true
        article: "sec. 25"
        scope: >-
          Organization must cease to retain personal data when it is no longer
          necessary for any business or legal purpose; also duty to delete or
          anonymize personal data upon request when retention is no longer
          necessary
        conditions: >-
          Retention no longer serves any business or legal purpose
        exceptions:
          - "Legal or business purpose still exists for retention"
          - "Other written law requires retention"
        timeline: "As soon as reasonably practicable"
      portability:
        available: true
        article: "sec. 26A-26H (Data Portability Obligation, effective 2024)"
        format: "Structured, commonly used, machine-readable format as prescribed by PDPC"
        conditions: >-
          Applicable data as prescribed in regulations; request must be made
          to the porting organization; receiving organization must be in
          Singapore
        exceptions:
          - "Data that has been anonymized"
          - "Opinion data"
          - "Data excluded by regulations"
          - "Third-party personal data where disclosure would be contrary to that person's interest"
      rectification:
        available: true
        article: "sec. 22"
        scope: >-
          Right to request correction of an error or omission in personal
          data in the possession or control of the organization
        timeline: "30 days from receipt of request (extendable with notice)"
      objection:
        available: false
        article: "N/A"
        grounds: >-
          PDPA does not provide a general right to object; data subjects may
          withdraw consent which effectively ceases future processing
        exceptions: []
      automated_decision_making:
        available: false
        article: "N/A"
        scope: >-
          PDPA does not include specific provisions on automated
          decision-making rights; PDPC has issued advisory guidelines on
          AI governance separately
        exceptions: []
      consent_withdrawal:
        available: true
        article: "sec. 16"
        requirements: >-
          Individual may withdraw consent by giving reasonable notice;
          organization must inform the individual of likely consequences
          of withdrawal
        effect: >-
          Withdrawal is prospective; does not affect the lawfulness of
          processing performed before withdrawal; organization must cease
          processing upon receiving notice
      restriction_of_processing:
        available: false
        article: "N/A"
        grounds: []
        effect: "PDPA does not provide an explicit right to restriction of processing"
      complaint_to_authority:
        available: true
        article: "sec. 37"
        authority: >-
          Personal Data Protection Commission (PDPC), a statutory body under
          the Infocomm Media Development Authority of Singapore
    notes: >
      Singapore's PDPA is a consent-centric framework. The 2020 amendments
      introduced legitimate interests as a legal basis and the data portability
      obligation (effective 2024). Unlike GDPR, PDPA does not provide rights
      to object, restrict processing, or challenge automated decisions. The
      Do Not Call Registry (sec. 39-53) provides additional rights regarding
      marketing communications.

  - id: appi
    framework_ref: appi
    articles: "art. 33, art. 34, art. 35, art. 37, art. 40, art. 33-2 (2022 amendments)"
    rights:
      access:
        available: true
        article: "art. 33"
        scope: >-
          Right to request disclosure of retained personal data held by a
          business operator, including purpose of use, and third-party
          provision records (art. 33-2 added by 2022 amendments)
        conditions: "Request to the business operator handling personal information"
        exceptions:
          - "Where disclosure would harm the life, body, property, or other rights of the individual or a third party"
          - "Where disclosure would significantly impede the proper conduct of the operator's business"
          - "Where disclosure would violate other laws"
        timeline: "Without delay; no specific statutory deadline"
      deletion_erasure:
        available: true
        article: "art. 35"
        scope: >-
          Right to request deletion (cessation of use) of retained personal
          data when it is no longer necessary for the purpose of use, when
          a data breach has occurred, or when handling violates the law;
          2022 amendments removed the six-month threshold
        conditions: >-
          Data has been handled in violation of the law, a data breach has
          occurred, or the data is no longer necessary for its purpose
        exceptions:
          - "Where compliance would require excessive cost or is otherwise difficult and alternative measures are taken"
        timeline: "Without delay; no specific statutory deadline"
      portability:
        available: false
        article: "N/A"
        format: "N/A"
        conditions: >-
          APPI does not include an explicit right to data portability; the
          Personal Information Protection Commission has discussed it in
          policy reviews but it has not been enacted
        exceptions: []
      rectification:
        available: true
        article: "art. 34"
        scope: >-
          Right to request correction, addition, or deletion of retained
          personal data when the content is not factually accurate
        timeline: "Without delay; no specific statutory deadline"
      objection:
        available: true
        article: "art. 35"
        grounds: >-
          Right to request cessation of use or cessation of third-party
          provision when data was obtained improperly, is no longer needed,
          or the individual's rights are likely to be harmed
        exceptions:
          - "Where compliance would require excessive cost or is otherwise difficult and alternative measures protect the individual's rights"
      automated_decision_making:
        available: false
        article: "N/A"
        scope: >-
          APPI does not include specific rights related to automated
          decision-making or profiling; PPC has issued guidelines on AI
          use separately
        exceptions: []
      consent_withdrawal:
        available: true
        article: "art. 35"
        requirements: >-
          Individual may request cessation of use of personal data; operator
          must comply if the data was handled in violation of law or is no
          longer necessary
        effect: "Operator must cease use and third-party provision when conditions are met"
      restriction_of_processing:
        available: false
        article: "N/A"
        grounds: []
        effect: >-
          APPI does not provide an explicit right to restriction of processing;
          the cessation of use right under art. 35 serves a similar but not
          identical function
      complaint_to_authority:
        available: true
        article: "art. 40"
        authority: >-
          Personal Information Protection Commission (PPC, 個人情報保護委員会)
    notes: >
      Japan's APPI was significantly amended in 2020 (effective April 2022),
      expanding data subject rights by removing the six-month retention
      threshold for exercising rights and adding the right to request
      cessation of third-party provision. Japan holds a mutual adequacy
      decision with the EU. The PPC has enforcement authority and may
      issue recommendations and orders.

  - id: pipa-korea
    framework_ref: pipa-korea
    articles: "art. 35, art. 36, art. 37, art. 37-2, art. 62"
    rights:
      access:
        available: true
        article: "art. 35"
        scope: >-
          Right to request access to personal information held by a personal
          information controller, including the items of personal information
          processed, purpose, retention period, status of provision to third
          parties, and consent details
        conditions: >-
          Request to the controller or through the Personal Information
          Protection Portal (www.privacy.go.kr)
        exceptions:
          - "Where restricted by other laws"
          - "Where there is a risk of harm to the life or body of a third party"
          - "Where there is a risk of undue infringement of the property and interests of another person"
        timeline: "10 days from receipt of request"
      deletion_erasure:
        available: true
        article: "art. 36"
        scope: >-
          Right to request deletion or destruction of personal information;
          if deletion is restricted by other laws, the controller must take
          measures such as blocking access
        conditions: "Request by the data subject"
        exceptions:
          - "Where collection is prescribed by other laws (controller must restrict access instead)"
        timeline: "10 days from receipt of request"
      portability:
        available: true
        article: "art. 35-2 (2023 amendment, effective 2024/2025)"
        format: >-
          Structured, commonly used, machine-readable format as prescribed
          by the Personal Information Protection Commission
        conditions: >-
          Applicable to designated data holders as determined by PIPC;
          transmission to the data subject or a designated third party
        exceptions:
          - "Technical impossibility"
          - "Where it would violate other laws"
      rectification:
        available: true
        article: "art. 36"
        scope: >-
          Right to request correction of personal information when it is
          inaccurate; controller must not use or provide the data to third
          parties until corrected
        timeline: "10 days from receipt of request"
      objection:
        available: true
        article: "art. 37"
        grounds: >-
          Right to demand suspension of processing of personal information;
          controller must comply unless required by law, necessary for
          contract performance, or where the data subject has not taken
          corrective action for legitimate concerns
        exceptions:
          - "Processing required by law"
          - "Necessary for performance of a contract and the data subject has not taken corrective action"
          - "Significant harm to the life, body, or property interests of others"
      automated_decision_making:
        available: true
        article: "art. 37-2 (2023 amendment)"
        scope: >-
          Right to refuse and request explanation of decisions made solely
          by automated processing that have a significant impact on rights
          or obligations, including profiling; right to demand human review
        exceptions:
          - "Where expressly permitted by law"
          - "Where necessary for the performance of a contract and adequate safeguards are in place"
      consent_withdrawal:
        available: true
        article: "art. 37"
        requirements: >-
          Data subject may withdraw consent at any time by requesting
          suspension of processing; controller must facilitate withdrawal
        effect: >-
          Controller must suspend processing without delay; prior processing
          remains lawful
      restriction_of_processing:
        available: true
        article: "art. 37"
        grounds:
          - "Data subject requests suspension of processing"
          - "Purpose of processing has been achieved"
          - "Consent period has expired"
        effect: >-
          Controller must suspend processing without delay and destroy data
          if the purpose has been achieved or period expired, unless retention
          is required by law
      complaint_to_authority:
        available: true
        article: "art. 62"
        authority: >-
          Personal Information Protection Commission (PIPC, 개인정보보호위원회);
          data subjects may also file mediation requests with the Personal
          Information Dispute Mediation Committee
    notes: >
      South Korea's PIPA was comprehensively amended in 2023, adding data
      portability and automated decision-making rights, bringing it closer
      to GDPR standards. The PIPC was elevated to an independent ministerial-
      level body in 2020. Korea holds an EU adequacy decision (effective 2022).
      The 10-day response timeline is among the shortest globally.

  - id: kvkk
    framework_ref: kvkk
    articles: "art. 11, art. 13, art. 14, art. 15"
    rights:
      access:
        available: true
        article: "art. 11(a), (b), (c)"
        scope: >-
          Right to learn whether personal data is processed; right to request
          information regarding processing if processed; right to learn the
          purpose of processing and whether data is used in accordance with
          its purpose
        conditions: >-
          Application to the data controller in writing or by other means
          determined by the Personal Data Protection Board
        exceptions:
          - "National defense and security"
          - "Public order and economic security"
          - "Processing required for investigation or prosecution of crime"
          - "Personal data made public by the data subject"
        timeline: "30 days from receipt of application"
      deletion_erasure:
        available: true
        article: "art. 11(e), art. 7"
        scope: >-
          Right to request deletion or destruction of personal data when the
          reasons for processing no longer exist
        conditions: "Conditions requiring processing must have ceased to exist"
        exceptions:
          - "Where processing is required by law"
          - "Where data is necessary for legitimate interests of the controller"
        timeline: "30 days from receipt of application"
      portability:
        available: false
        article: "N/A"
        format: "N/A"
        conditions: "KVKK does not include an explicit right to data portability"
        exceptions: []
      rectification:
        available: true
        article: "art. 11(d)"
        scope: "Right to request correction of inaccurate or incomplete personal data"
        timeline: "30 days from receipt of application"
      objection:
        available: true
        article: "art. 11(e), (f)"
        grounds: >-
          Right to object to a result arising from analysis of processed data
          exclusively through automated systems that is against the data
          subject; right to request deletion or destruction if reasons for
          processing no longer exist
        exceptions:
          - "Where processing is required by law"
      automated_decision_making:
        available: true
        article: "art. 11(g)"
        scope: >-
          Right to object to a result that is to the detriment of the data
          subject arising exclusively from the analysis of personal data
          through automated systems
        exceptions:
          - "No explicit exceptions stated in the law; subject to Board interpretation"
      consent_withdrawal:
        available: true
        article: "art. 7(3) (by analogy from explicit consent provisions)"
        requirements: >-
          Data subject may withdraw explicit consent at any time; KVKK does
          not specify the mechanism but the Board has issued guidance that
          withdrawal must be made available
        effect: "Withdrawal is prospective; prior processing remains lawful"
      restriction_of_processing:
        available: false
        article: "N/A"
        grounds: []
        effect: "KVKK does not provide an explicit right to restriction of processing"
      complaint_to_authority:
        available: true
        article: "art. 13, art. 14, art. 15"
        authority: >-
          Kişisel Verileri Koruma Kurumu (Personal Data Protection Authority
          of Turkey, KVKK Board); data subject must first apply to the
          controller before filing a complaint with the Board
    notes: >
      Turkey's KVKK was enacted in 2016 and is modeled on the EU Data
      Protection Directive 95/46/EC rather than GDPR. As a result, it lacks
      certain GDPR rights such as portability and restriction of processing.
      A comprehensive amendment bill has been under discussion to align KVKK
      more closely with GDPR. The complaint mechanism requires exhaustion of
      the application to the controller before recourse to the Board (30-day
      waiting period or rejection).

  - id: pipeda
    framework_ref: pipeda
    articles: "Principle 4.9, sec. 8, sec. 10, sec. 11, sec. 12, sec. 28"
    rights:
      access:
        available: true
        article: "Principle 4.9, sec. 8"
        scope: >-
          Right to access personal information held by an organization,
          including information about the use and disclosure of the
          information and identification of third parties to which it has
          been disclosed
        conditions: >-
          Written request; organization may charge a minimal fee; individual
          must provide sufficient information to identify themselves and the
          data requested
        exceptions:
          - "Information subject to solicitor-client privilege"
          - "Would reveal confidential commercial information"
          - "Could harm another individual's life or security"
          - "Information collected for dispute resolution"
          - "Information generated in the course of a formal dispute resolution process"
        timeline: "30 days from receipt of request"
      deletion_erasure:
        available: true
        article: "Principle 4.5, sec. 8"
        scope: >-
          Organization must destroy, erase, or anonymize personal information
          no longer required for identified purposes; individuals may request
          deletion of inaccurate information
        conditions: >-
          Information no longer needed for the purpose for which it was
          collected; individual challenges accuracy
        exceptions:
          - "Legal or regulatory requirement to retain"
          - "Information needed for an ongoing legal proceeding"
        timeline: "30 days from receipt of request"
      portability:
        available: false
        article: "N/A"
        format: "N/A"
        conditions: >-
          PIPEDA does not include a right to data portability; the proposed
          Consumer Privacy Protection Act (Bill C-27) would introduce
          portability rights if enacted
        exceptions: []
      rectification:
        available: true
        article: "Principle 4.9.5, sec. 12(2)"
        scope: >-
          Right to challenge the accuracy and completeness of personal
          information and have it amended; if organization disagrees with
          the challenge, the substance of the disagreement must be recorded
        timeline: "30 days from receipt of request"
      objection:
        available: false
        article: "N/A"
        grounds: >-
          PIPEDA does not provide a general right to object; the primary
          mechanism is consent withdrawal
        exceptions: []
      automated_decision_making:
        available: true
        article: "Principle 4.3.4 (as interpreted by OPC guidance on automated decision-making, 2023)"
        scope: >-
          The Office of the Privacy Commissioner has interpreted existing
          PIPEDA principles to require transparency about automated
          decision-making and the right to request human review; Bill C-27
          would codify these rights if enacted
        exceptions:
          - "Scope depends on OPC interpretation and pending legislative reform"
      consent_withdrawal:
        available: true
        article: "Principle 4.3.8, sec. 8(3)"
        requirements: >-
          Individual may withdraw consent at any time subject to legal or
          contractual restrictions and reasonable notice; organization must
          inform individual of the implications of withdrawal
        effect: >-
          Withdrawal is prospective; organization must cease collection, use,
          and disclosure; does not affect lawfulness of prior processing
      restriction_of_processing:
        available: false
        article: "N/A"
        grounds: []
        effect: "PIPEDA does not provide an explicit right to restriction of processing"
      complaint_to_authority:
        available: true
        article: "sec. 11, sec. 12, sec. 28"
        authority: >-
          Office of the Privacy Commissioner of Canada (OPC); complaints may
          be escalated to the Federal Court of Canada
    notes: >
      PIPEDA is a principles-based framework (CSA Model Code for the Protection
      of Personal Information). Bill C-27 (Consumer Privacy Protection Act,
      Digital Charter Implementation Act) proposes significant modernization
      including data portability, algorithmic transparency, and stronger
      enforcement. As of 2026, this legislation remains under parliamentary
      consideration. PIPEDA applies to private-sector organizations in the
      course of commercial activities.

  - id: popia
    framework_ref: popia
    articles: "sec. 23, sec. 24, sec. 25, sec. 69, sec. 74, sec. 99"
    rights:
      access:
        available: true
        article: "sec. 23"
        scope: >-
          Right to request confirmation of whether a responsible party holds
          personal information, and a description of the information held;
          right to request access to the records, including the identity of
          third parties who have or have had access to the information
        conditions: >-
          Request in the prescribed manner and form; subject to Promotion of
          Access to Information Act (PAIA) procedures; reasonable fee may be
          charged
        exceptions:
          - "Grounds for refusal under PAIA (defense, security, law enforcement, commercial interests)"
          - "Information about other individuals that cannot be separated"
        timeline: "30 days under PAIA framework (extendable by a further 30 days)"
      deletion_erasure:
        available: true
        article: "sec. 24(1)(d)"
        scope: >-
          Right to request destruction or deletion of personal information
          record that the responsible party is no longer authorized to retain
        conditions: "Responsible party no longer authorized to retain the information"
        exceptions:
          - "Retention required by law"
          - "Retention reasonably necessary for a lawful purpose"
        timeline: "Reasonable period as determined by the responsible party"
      portability:
        available: false
        article: "N/A"
        format: "N/A"
        conditions: "POPIA does not include an explicit right to data portability"
        exceptions: []
      rectification:
        available: true
        article: "sec. 24(1)(a), (b)"
        scope: >-
          Right to request correction of personal information that is
          inaccurate, irrelevant, excessive, out of date, incomplete,
          misleading, or obtained unlawfully
        timeline: "Reasonable period as determined by the responsible party"
      objection:
        available: true
        article: "sec. 69, sec. 11(3)"
        grounds: >-
          Right to object to processing of personal information on
          reasonable grounds relating to the data subject's particular
          situation, unless legislation provides for such processing; right
          to object to processing for direct marketing by unsolicited
          electronic communications
        exceptions:
          - "Where legislation permits or requires the processing"
      automated_decision_making:
        available: true
        article: "sec. 71"
        scope: >-
          Data subject must not be subject to a decision based solely on
          automated processing (including profiling) that results in legal
          effects or significantly affects the data subject; right to be
          notified that an automated decision has been made and to submit
          representations for reconsideration
        exceptions:
          - "Where the decision was taken in connection with a contract"
          - "Where the decision is governed by a law or code of conduct with appropriate safeguards"
          - "Where appropriate measures are in place to protect legitimate interests"
      consent_withdrawal:
        available: true
        article: "sec. 11(2)(b), sec. 69(2)"
        requirements: >-
          Data subject may object to processing at any time; withdrawal is
          exercised through the objection mechanism in sec. 11(3)
        effect: >-
          Responsible party must cease processing unless there are
          sufficient justification for continued processing
      restriction_of_processing:
        available: false
        article: "N/A"
        grounds: []
        effect: "POPIA does not provide an explicit right to restriction of processing comparable to GDPR art. 18"
      complaint_to_authority:
        available: true
        article: "sec. 74, sec. 99"
        authority: >-
          Information Regulator of South Africa; complaints may be submitted
          to the Regulator, which may investigate, make findings, issue
          enforcement notices, and refer matters to the Enforcement Committee
    notes: >
      POPIA was enacted in 2013 but only became fully effective on 1 July
      2021. It is modeled on GDPR and the former EU Directive 95/46/EC but
      lacks portability and restriction of processing rights. Access rights
      are exercised through PAIA procedures, which adds procedural complexity.
      The Information Regulator serves as both the data protection authority
      and the access to information authority.

  - id: pdpa-thailand
    framework_ref: pdpa-thailand
    articles: "sec. 30, sec. 31, sec. 33, sec. 34, sec. 35, sec. 36, sec. 19(5), sec. 73, sec. 90"
    rights:
      access:
        available: true
        article: "sec. 30"
        scope: >-
          Right to request access to and obtain a copy of personal data
          relating to the data subject held by the data controller, or to
          request disclosure of the acquisition of data obtained without
          consent
        conditions: "Request to the data controller"
        exceptions:
          - "National security, defense, or interests of the country"
          - "Compliance with law enforcement duties"
          - "Interests of the data subject or the rights and freedoms of other persons"
        timeline: "30 days from receipt of request"
      deletion_erasure:
        available: true
        article: "sec. 33(5)"
        scope: >-
          Right to request destruction, anonymization, or cessation of
          processing of personal data when it is no longer necessary, when
          consent is withdrawn, when the data subject objects, or when data
          was collected unlawfully
        conditions: "One of the enumerated grounds must be satisfied"
        exceptions:
          - "Processing for freedom of expression"
          - "Defense of legal claims"
          - "Compliance with applicable laws"
          - "Public interest in public health"
          - "Archiving in public interest or for research and statistics"
        timeline: "30 days from receipt of request (unless notification specifies otherwise)"
      portability:
        available: true
        article: "sec. 31"
        format: >-
          Structured, commonly used, machine-readable format; right to request
          direct transmission to another data controller where technically
          feasible
        conditions: >-
          Applies to personal data processed by automated means based on
          consent or contractual necessity
        exceptions:
          - "Processing for a task in the public interest"
          - "Exercise of official authority"
          - "Where technically not feasible"
      rectification:
        available: true
        article: "sec. 35, sec. 36"
        scope: >-
          Right to request that personal data be accurate, up to date,
          complete, and not misleading; data controller must rectify upon
          request
        timeline: "30 days from receipt of request"
      objection:
        available: true
        article: "sec. 32"
        grounds: >-
          Right to object to processing based on public interest, legitimate
          interests, or scientific/historical research purposes on grounds
          relating to the data subject's particular situation; unconditional
          right to object to direct marketing
        exceptions:
          - "Controller demonstrates compelling legitimate grounds that override data subject's interests"
          - "Processing for establishment, exercise, or defense of legal claims"
      automated_decision_making:
        available: false
        article: "N/A"
        scope: >-
          Thailand's PDPA does not include specific provisions on automated
          decision-making rights; the PDPC may issue additional regulations
        exceptions: []
      consent_withdrawal:
        available: true
        article: "sec. 19(5)"
        requirements: >-
          Data subject may withdraw consent at any time; withdrawal must be
          as easy as giving consent; data controller must inform the data
          subject of the consequences of withdrawal
        effect: >-
          Withdrawal does not affect the lawfulness of processing based on
          consent prior to withdrawal
      restriction_of_processing:
        available: true
        article: "sec. 34"
        grounds:
          - "Data controller is verifying accuracy after a rectification request"
          - "Data should be erased but the data subject requests restriction instead"
          - "Data is no longer necessary but the data subject needs it for legal claims"
          - "Data subject has objected and verification of grounds is pending"
        effect: >-
          Data controller may only store the data; processing for other
          purposes requires consent, is for legal claims, or is for the
          protection of rights
      complaint_to_authority:
        available: true
        article: "sec. 73, sec. 90"
        authority: >-
          Personal Data Protection Committee (PDPC) and Expert Committee
          appointed by the PDPC
    notes: >
      Thailand's PDPA closely mirrors GDPR in structure but omits automated
      decision-making rights. It became fully enforceable on 1 June 2022 after
      multiple deferrals. The PDPC has been issuing subordinate regulations
      progressively. Penalties include both administrative fines (up to THB 5
      million) and criminal sanctions (imprisonment up to one year).

  - id: coppa
    framework_ref: coppa
    articles: "15 U.S.C. §6502, 16 CFR §312.5, §312.6, §312.7"
    rights:
      access:
        available: true
        article: "16 CFR §312.6"
        scope: >-
          Parent or guardian has the right to review the personal information
          collected from their child; operator must provide access to the
          specific information collected
        conditions: >-
          Verifiable parental request; operator must use reasonable procedures
          to verify identity of the requesting parent
        exceptions:
          - "Operator may refuse if it reasonably believes the request is from someone other than the parent"
        timeline: "No specific statutory deadline; must provide a means to access within a reasonable time"
      deletion_erasure:
        available: true
        article: "16 CFR §312.6(a)(2)"
        scope: >-
          Parent has the right to request deletion of a child's personal
          information; operator must also delete information when it is no
          longer reasonably necessary for the purpose collected
        conditions: "Verifiable parental request"
        exceptions:
          - "Operator may terminate the child's access to the service as a consequence"
        timeline: "Within a reasonable time after verifiable parental request"
      portability:
        available: false
        article: "N/A"
        format: "N/A"
        conditions: "COPPA does not include a right to data portability"
        exceptions: []
      rectification:
        available: true
        article: "16 CFR §312.6(a)(2)"
        scope: >-
          Parent has the right to correct a child's personal information held
          by the operator
        timeline: "No specific statutory deadline"
      objection:
        available: true
        article: "16 CFR §312.6(a)(2)"
        grounds: >-
          Parent may refuse to permit the further use or maintenance of the
          child's personal information and direct the operator to delete it
        exceptions:
          - "Operator may condition the child's participation in an activity on disclosure where reasonably necessary"
      automated_decision_making:
        available: false
        article: "N/A"
        scope: "COPPA does not address automated decision-making rights"
        exceptions: []
      consent_withdrawal:
        available: true
        article: "16 CFR §312.6(a)(2)"
        requirements: >-
          Parent may revoke consent at any time and direct the operator to
          delete the child's personal information
        effect: >-
          Operator must delete the information and may terminate the child's
          participation in the activity
      restriction_of_processing:
        available: true
        article: "15 U.S.C. §6502(b)(1)(B)(ii)"
        grounds:
          - >-
            Parent may consent to collection and use but refuse disclosure
            to third parties
        effect: >-
          Operator must restrict disclosure to third parties while continuing
          to provide the service to the child
      complaint_to_authority:
        available: true
        article: "15 U.S.C. §6502(c), 16 CFR §312.10"
        authority: >-
          Federal Trade Commission (FTC); state attorneys general may also
          bring enforcement actions
    notes: >
      COPPA is a sector-specific US federal law protecting children under 13.
      All rights are exercised by the parent or guardian, not the child. The
      FTC issued an updated COPPA Rule in 2024 expanding protections for
      children's biometric and geolocation data. COPPA applies to operators
      of websites or online services directed to children under 13, or that
      have actual knowledge of collecting from children under 13.

  - id: eprivacy
    framework_ref: eprivacy
    articles: "art. 5, art. 6, art. 9, art. 13, art. 15"
    rights:
      access:
        available: true
        article: "art. 6(7), art. 15(1)"
        scope: >-
          Right of subscribers and users to access traffic data and location
          data processed by the provider; applies through GDPR access rights
          as ePrivacy Directive defers to GDPR for general data subject rights
        conditions: "Request to the provider of public communications services"
        exceptions:
          - "Data retained for law enforcement purposes under national law (art. 15)"
          - "National security exemptions"
        timeline: "Per member state implementation and GDPR timelines"
      deletion_erasure:
        available: true
        article: "art. 6(1), art. 6(2)"
        scope: >-
          Traffic data must be erased or anonymized when no longer needed for
          the purpose of transmission; location data must be anonymized or
          erased when no longer necessary for the value-added service
        conditions: "Automatic obligation on the provider; also upon subscriber request"
        exceptions:
          - "Retention required under national law for law enforcement (art. 15)"
          - "Billing data may be retained until the statute of limitations for payment disputes"
        timeline: "Immediately upon conclusion of the communication or service provision"
      portability:
        available: false
        article: "N/A"
        format: "N/A"
        conditions: >-
          ePrivacy Directive does not include data portability; this right
          exists under GDPR which applies in parallel
        exceptions: []
      rectification:
        available: true
        article: "art. 6, art. 15 (defers to GDPR/Directive 95/46/EC)"
        scope: >-
          Right to rectification of inaccurate traffic or location data;
          exercised through GDPR mechanisms
        timeline: "Per GDPR timelines"
      objection:
        available: true
        article: "art. 13(1), (3), (4)"
        grounds: >-
          Right to object to unsolicited electronic communications for direct
          marketing; opt-out must be offered at the time of each message;
          prior opt-in required for electronic marketing to natural persons
          (opt-in model)
        exceptions:
          - "Existing customer exception: soft opt-in for similar products/services if opt-out is provided"
      automated_decision_making:
        available: false
        article: "N/A"
        scope: >-
          ePrivacy Directive does not address automated decision-making; GDPR
          provisions apply in parallel
        exceptions: []
      consent_withdrawal:
        available: true
        article: "art. 5(3), art. 6(3), art. 9(1)"
        requirements: >-
          Consent for cookies, traffic data processing beyond transmission,
          and location data processing may be withdrawn at any time; member
          states must ensure simple means of withdrawal
        effect: "Provider must cease the relevant processing upon withdrawal"
      restriction_of_processing:
        available: false
        article: "N/A"
        grounds: []
        effect: "ePrivacy Directive does not provide explicit restriction of processing; GDPR applies in parallel"
      complaint_to_authority:
        available: true
        article: "art. 15(2) (defers to national implementations and GDPR)"
        authority: >-
          National Data Protection Authority of the relevant EU member state
          (e.g., CNIL in France, AEPD in Spain); exercised through GDPR
          complaint mechanisms
    notes: >
      The ePrivacy Directive 2002/58/EC (as amended by 2009/136/EC) is a
      sector-specific instrument for electronic communications. It provides
      lex specialis rules on confidentiality of communications, cookies,
      traffic and location data, and direct marketing. General data subject
      rights are exercised through GDPR. The proposed ePrivacy Regulation
      (pending since 2017) would replace the Directive and expand rights
      but has not been adopted as of 2026.

  - id: ferpa
    framework_ref: ferpa
    articles: "20 U.S.C. §1232g, 34 CFR Part 99"
    rights:
      access:
        available: true
        article: "20 U.S.C. §1232g(a)(1), 34 CFR §99.10"
        scope: >-
          Right to inspect and review education records maintained by the
          educational agency or institution that contain personally
          identifiable information relating to the student
        conditions: >-
          Parents of students under 18 have this right; rights transfer to
          the student (eligible student) at age 18 or upon enrollment in
          postsecondary education
        exceptions:
          - "Financial records of parents"
          - "Confidential letters of recommendation (if waiver signed)"
          - "Records of instructional, supervisory, or administrative personnel that are sole possession records"
          - "Law enforcement unit records"
          - "Records relating to individuals who are employed (unless employment is contingent on student status)"
        timeline: "45 days from receipt of request"
      deletion_erasure:
        available: false
        article: "N/A"
        scope: >-
          FERPA does not provide a right to deletion; the remedy for
          inaccurate records is amendment, not deletion
        conditions: "N/A"
        exceptions: []
        timeline: "N/A"
      portability:
        available: false
        article: "N/A"
        format: "N/A"
        conditions: >-
          FERPA does not include a right to data portability; however,
          schools must provide copies of records if failure to do so would
          effectively prevent exercise of access rights
        exceptions: []
      rectification:
        available: true
        article: "20 U.S.C. §1232g(a)(2), 34 CFR §99.20"
        scope: >-
          Right to request amendment of education records believed to be
          inaccurate, misleading, or in violation of the student's privacy
          rights; if the institution refuses, the parent or student is
          entitled to a hearing
        timeline: "Reasonable time; institution must decide within a reasonable period after the hearing"
      objection:
        available: true
        article: "20 U.S.C. §1232g(a)(2), 34 CFR §99.21"
        grounds: >-
          Right to a hearing if the institution refuses to amend records as
          requested; right to place a statement in the record contesting
          the content if the amendment is refused after the hearing
        exceptions:
          - "Does not extend to grades or educational assessments (substantive judgments are excluded)"
      automated_decision_making:
        available: false
        article: "N/A"
        scope: "FERPA does not address automated decision-making rights"
        exceptions: []
      consent_withdrawal:
        available: true
        article: "20 U.S.C. §1232g(b), 34 CFR §99.30"
        requirements: >-
          Parent or eligible student must provide written consent before the
          institution discloses personally identifiable information from
          education records; consent may be refused or revoked for future
          disclosures
        effect: >-
          Without consent, institution may not disclose (except under FERPA
          exceptions such as school officials with legitimate educational
          interest, directory information, judicial orders)
      restriction_of_processing:
        available: false
        article: "N/A"
        grounds: []
        effect: "FERPA does not provide an explicit right to restriction of processing"
      complaint_to_authority:
        available: true
        article: "34 CFR §99.63, §99.64"
        authority: >-
          Family Policy Compliance Office (FPCO) within the U.S. Department
          of Education
    notes: >
      FERPA is a US federal law governing privacy of student education records.
      It applies to educational agencies and institutions receiving federal
      funding from the Department of Education. Rights belong to parents until
      the student turns 18 or enrolls in postsecondary education. FERPA is
      primarily a disclosure-control statute rather than a comprehensive privacy
      law; it does not provide deletion, portability, or automated
      decision-making rights. Enforcement is through funding withdrawal, not
      fines.

  - id: glba
    framework_ref: glba
    articles: "15 U.S.C. §6802, §6803, 12 CFR Part 1016 (Regulation P), 16 CFR Part 313"
    rights:
      access:
        available: true
        article: "12 CFR §1016.8 (Regulation P)"
        scope: >-
          Right to receive an initial privacy notice describing the
          institution's information-sharing practices, categories of
          information collected, and categories of third parties to whom
          information may be disclosed; annual privacy notice
        conditions: "Provided automatically to customers at establishment of relationship"
        exceptions:
          - "Applies to nonpublic personal information only"
          - "Does not provide right to access specific pieces of data (unlike GDPR/CCPA)"
        timeline: "Initial notice at establishment of customer relationship; annual notice thereafter"
      deletion_erasure:
        available: false
        article: "N/A"
        scope: "GLBA does not provide a right to deletion of personal financial information"
        conditions: "N/A"
        exceptions: []
        timeline: "N/A"
      portability:
        available: false
        article: "N/A"
        format: "N/A"
        conditions: "GLBA does not include a right to data portability"
        exceptions: []
      rectification:
        available: true
        article: "15 U.S.C. §1681 et seq. (Fair Credit Reporting Act, applied through GLBA framework)"
        scope: >-
          Right to dispute inaccurate information through the Fair Credit
          Reporting Act for credit-related data; GLBA itself does not provide
          a standalone rectification right
        timeline: "30 days under FCRA for credit reporting disputes"
      objection:
        available: true
        article: "15 U.S.C. §6802(b), 12 CFR §1016.7 (Regulation P)"
        grounds: >-
          Right to opt out of sharing of nonpublic personal information with
          non-affiliated third parties; financial institution must provide
          reasonable means to opt out
        exceptions:
          - "Sharing with affiliates is not subject to opt-out under GLBA (but may be under FCRA)"
          - "Sharing for processing and servicing transactions requested by the consumer"
          - "Sharing required or authorized by law"
          - "Sharing with service providers under contractual confidentiality restrictions"
      automated_decision_making:
        available: false
        article: "N/A"
        scope: "GLBA does not address automated decision-making rights"
        exceptions: []
      consent_withdrawal:
        available: true
        article: "15 U.S.C. §6802(b), 12 CFR §1016.7"
        requirements: >-
          Consumer may opt out of third-party information sharing at any time;
          opt-out must be made available through reasonable means (toll-free
          number, reply form, electronic means)
        effect: >-
          Financial institution must cease sharing with non-affiliated third
          parties for non-exempt purposes after receiving opt-out; prospective
          only
      restriction_of_processing:
        available: false
        article: "N/A"
        grounds: []
        effect: "GLBA does not provide an explicit right to restriction of processing"
      complaint_to_authority:
        available: true
        article: "15 U.S.C. §6805"
        authority: >-
          Federal Trade Commission (FTC) for non-bank financial institutions;
          banking regulators (OCC, Federal Reserve, FDIC) for their
          respective institutions; Consumer Financial Protection Bureau (CFPB)
          for consumer financial products; state attorneys general may also
          enforce
    notes: >
      GLBA is a US federal financial privacy law that applies to financial
      institutions. It focuses on disclosure controls (notice and opt-out for
      third-party sharing) rather than individual data rights. The Safeguards
      Rule (16 CFR Part 314) requires security programs but does not create
      data subject rights. GLBA's privacy provisions are significantly less
      comprehensive than GDPR; there are no rights to deletion, portability,
      automated decision-making explanation, or restriction of processing.
      The opt-out model contrasts with GDPR's opt-in approach.
