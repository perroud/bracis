id: dpo-requirements-matrix
title: "Cross-Framework Data Protection Officer Requirements Comparison"
last_updated: "2026-04-06"
description: >
  Comparative matrix of Data Protection Officer (DPO) or equivalent role
  requirements across privacy and data protection frameworks. Covers appointment
  obligations, official titles, qualification requirements, independence
  guarantees, public disclosure obligations, and local representative mandates.

frameworks:
  - id: gdpr
    framework_ref: gdpr
    articles: "art. 37, art. 38, art. 39, Recitals 97"
    role:
      mandatory: conditional
      conditions: >-
        Mandatory when processing is carried out by a public authority or body
        (except courts acting in judicial capacity); when core activities consist
        of processing operations requiring regular and systematic monitoring of
        data subjects on a large scale; or when core activities consist of
        processing on a large scale of special categories of data or personal
        data relating to criminal convictions and offences (art. 37(1)).
      official_title: "Data Protection Officer (DPO)"
      alternative_titles:
        - "Datenschutzbeauftragter (German)"
        - "Délégué à la protection des données (French)"
        - "Responsabile della protezione dei dati (Italian)"
    qualifications:
      specified_in_law: true
      requirements: >-
        Designated on the basis of professional qualities and, in particular,
        expert knowledge of data protection law and practices and the ability
        to fulfil the tasks referred to in art. 39 (art. 37(5)).
      professional_knowledge: >-
        Expert knowledge of data protection law and practices. The necessary
        level of expert knowledge should be determined in particular according
        to the data processing operations carried out and the protection
        required for the personal data processed (Recital 97).
    independence:
      protected_by_law: true
      requirements:
        - >-
          Controller and processor shall ensure that the DPO does not receive
          any instructions regarding the exercise of those tasks (art. 38(3))
        - >-
          DPO shall not be dismissed or penalised by the controller or
          processor for performing his or her tasks (art. 38(3))
        - >-
          DPO shall directly report to the highest management level of the
          controller or processor (art. 38(3))
      reporting_line: >-
        Directly reports to the highest management level of the controller or
        processor (art. 38(3)).
      conflict_of_interest:
        addressed: true
        details: >-
          The DPO may fulfil other tasks and duties but the controller or
          processor shall ensure that any such tasks and duties do not result
          in a conflict of interests (art. 38(6)). The DPO cannot hold a
          position that leads them to determine the purposes and means of
          processing (e.g., CEO, CFO, Head of Marketing, Head of HR, Head of IT).
    public_disclosure:
      required: true
      details: >-
        The controller and processor shall publish the contact details of the
        DPO and communicate them to the supervisory authority (art. 37(7)).
      registration_with_authority: true
      authority_name: "Relevant EU/EEA Supervisory Authority (Data Protection Authority)"
    local_representative:
      required: true
      conditions: >-
        Controllers or processors not established in the EU that offer goods
        or services to EU data subjects or monitor their behaviour must
        designate a representative in the Union (art. 27(1)).
      requirements: >-
        The representative must be established in one of the member states
        where the data subjects are located. The representative acts as a
        contact point for supervisory authorities and data subjects.
    tasks_and_responsibilities:
      - >-
        Inform and advise the controller or processor and employees on
        obligations under GDPR (art. 39(1)(a))
      - >-
        Monitor compliance with GDPR, other EU or member state data
        protection provisions, and the policies of the controller or
        processor (art. 39(1)(b))
      - >-
        Provide advice where requested regarding data protection impact
        assessments and monitor performance (art. 39(1)(c))
      - >-
        Cooperate with the supervisory authority (art. 39(1)(d))
      - >-
        Act as the contact point for the supervisory authority on issues
        relating to processing (art. 39(1)(e))
      - >-
        Have due regard to the risk associated with processing operations,
        taking into account the nature, scope, context, and purposes of
        processing (art. 39(2))
    penalties_for_non_appointment:
      specified: true
      details: >-
        Failure to appoint a DPO when required falls under art. 83(4) and may
        result in administrative fines up to EUR 10,000,000 or up to 2% of
        total worldwide annual turnover of the preceding financial year,
        whichever is higher.
    notes: >-
      A group of undertakings may appoint a single DPO provided the DPO is
      easily accessible from each establishment (art. 37(2)). The DPO may be
      a staff member or an external service provider engaged under a service
      contract (art. 37(6)). Member states may impose additional requirements,
      such as Germany, which requires DPO appointment for organizations with
      20 or more persons constantly engaged in automated processing (sec. 38
      BDSG).

  - id: lgpd
    framework_ref: lgpd
    articles: "art. 5(VIII), art. 23(III), art. 41"
    role:
      mandatory: true
      conditions: >-
        Every controller must appoint an encarregado. Originally required for
        all controllers and processors, ANPD may establish complementary rules
        regarding the definition and duties, including cases of exemption
        based on the nature and size of the entity or the volume of data
        processing operations (art. 41, sec. 3). ANPD Resolution CD/ANPD
        n. 2/2022 exempts microenterprises and small businesses from mandatory
        appointment.
      official_title: >-
        Encarregado pelo tratamento de dados pessoais (Portuguese) /
        Data Protection Officer (English)
      alternative_titles:
        - "DPO"
        - "Encarregado de dados"
    qualifications:
      specified_in_law: false
      requirements: >-
        The LGPD does not specify formal qualifications. Originally art. 41
        sec. 4 required technical knowledge, but this paragraph was vetoed by
        the President. ANPD has not yet issued binding rules on qualifications.
      professional_knowledge: >-
        No statutory requirement for specific professional knowledge, though
        practical expertise in data protection and privacy law is expected
        by market practice.
    independence:
      protected_by_law: false
      requirements:
        - >-
          LGPD does not contain explicit independence protections for the
          encarregado comparable to GDPR art. 38
        - >-
          No statutory protection against dismissal for performing duties
      reporting_line: >-
        Not specified in the law. In practice, typically reports to legal,
        compliance, or executive management.
      conflict_of_interest:
        addressed: false
        details: >-
          LGPD does not address conflict of interest for the encarregado.
          ANPD guidance recommends avoiding conflicts but this is not a
          binding legal requirement.
    public_disclosure:
      required: true
      details: >-
        The identity and contact information of the encarregado must be
        disclosed publicly, preferably on the controller's website (art. 41,
        sec. 1).
      registration_with_authority: false
      authority_name: "Autoridade Nacional de Proteção de Dados (ANPD)"
    local_representative:
      required: false
      conditions: >-
        LGPD does not impose a specific local representative requirement for
        foreign entities. However, art. 3 requires compliance by any entity
        that processes data of individuals located in Brazil.
      requirements: >-
        Not applicable. Foreign entities must comply with LGPD but no formal
        local representative mandate exists comparable to GDPR art. 27.
    tasks_and_responsibilities:
      - >-
        Accept complaints and communications from data subjects, provide
        clarifications, and adopt measures (art. 41, sec. 2, I)
      - >-
        Receive communications from the national authority and adopt
        measures (art. 41, sec. 2, II)
      - >-
        Guide employees and contractors of the controller regarding
        practices for the protection of personal data (art. 41, sec. 2, III)
      - >-
        Carry out other duties determined by the controller or established
        in complementary rules (art. 41, sec. 2, IV)
    penalties_for_non_appointment:
      specified: false
      details: >-
        LGPD does not establish a specific penalty for failure to appoint an
        encarregado. However, non-compliance may be treated as an infraction
        under art. 52, with fines up to BRL 50,000,000 per infraction or 2%
        of revenue in Brazil.
    notes: >-
      The encarregado can be a natural person or a legal entity (outsourced
      DPO service). ANPD Resolution CD/ANPD n. 2/2022 exempts small-scale
      processing agents from the obligation to appoint an encarregado, but
      they must still provide a communication channel for data subjects.

  - id: ccpa-cpra
    framework_ref: ccpa-cpra
    articles: "Cal. Civ. Code sec. 1798.100-1798.199.100"
    role:
      mandatory: false
      conditions: >-
        Neither the CCPA nor the CPRA requires businesses to appoint a Data
        Protection Officer or equivalent role. The law focuses on consumer
        rights and business obligations without mandating a specific privacy
        officer position.
      official_title: "Not applicable (no DPO requirement)"
      alternative_titles:
        - "Chief Privacy Officer (voluntary, common in practice)"
        - "Privacy Program Manager (voluntary)"
    qualifications:
      specified_in_law: false
      requirements: >-
        Not applicable. No statutory role is defined.
      professional_knowledge: >-
        Not applicable. Organizations typically appoint privacy professionals
        voluntarily based on industry standards (CIPP/US, CIPM).
    independence:
      protected_by_law: false
      requirements:
        - "Not applicable (no statutory role)"
      reporting_line: >-
        Not applicable. Voluntary privacy officers typically report to the
        General Counsel or Chief Compliance Officer.
      conflict_of_interest:
        addressed: false
        details: >-
          Not applicable. No statutory role defined.
    public_disclosure:
      required: false
      details: >-
        No DPO disclosure requirement. Businesses must provide a toll-free
        number and website address for consumers to submit requests (sec.
        1798.130(a)(1)).
      registration_with_authority: false
      authority_name: "California Privacy Protection Agency (CPPA)"
    local_representative:
      required: false
      conditions: >-
        Not applicable. CCPA/CPRA applies to businesses meeting revenue or
        data volume thresholds that do business in California.
      requirements: >-
        Not applicable.
    tasks_and_responsibilities:
      - >-
        Not applicable (no DPO requirement). Businesses must respond to
        consumer rights requests within 45 days (sec. 1798.145)
      - >-
        Businesses must implement reasonable security procedures and
        practices (Cal. Civ. Code sec. 1798.81.5)
    penalties_for_non_appointment:
      specified: false
      details: >-
        Not applicable. No DPO appointment obligation exists under CCPA/CPRA.
    notes: >-
      While no DPO is required, the CPRA established the California Privacy
      Protection Agency (CPPA) as an independent enforcement authority.
      Many organizations subject to CCPA/CPRA voluntarily appoint a Chief
      Privacy Officer or similar role as an industry best practice. The CPRA
      requires annual cybersecurity audits and risk assessments for high-risk
      processing, which in practice may necessitate dedicated privacy staff.

  - id: hipaa
    framework_ref: hipaa
    articles: "45 CFR sec. 164.530(a)(1), 45 CFR sec. 164.308(a)(2)"
    role:
      mandatory: true
      conditions: >-
        All covered entities must designate a Privacy Official responsible
        for the development and implementation of policies and procedures
        (45 CFR sec. 164.530(a)(1)). A separate Security Official must be
        designated for security policies and procedures (45 CFR sec.
        164.308(a)(2)). Business associates are not required to designate
        a Privacy Official but must designate a Security Official.
      official_title: "Privacy Official / Security Official"
      alternative_titles:
        - "Privacy Officer"
        - "HIPAA Privacy Officer"
        - "Chief Privacy Officer (CPO)"
        - "Information Security Officer"
        - "HIPAA Security Officer"
    qualifications:
      specified_in_law: false
      requirements: >-
        HIPAA does not specify formal qualifications for the Privacy Official
        or Security Official. The designation may be to a person or an office.
      professional_knowledge: >-
        Not specified by statute. In practice, healthcare privacy and security
        expertise is expected (HCISPP, CHPS, or similar certifications are
        common but not required).
    independence:
      protected_by_law: false
      requirements:
        - >-
          HIPAA does not provide explicit independence protections for the
          Privacy Official or Security Official
        - >-
          No statutory protection against retaliation for performing duties
          (though general whistleblower protections may apply)
      reporting_line: >-
        Not specified by regulation. Typically reports to the Chief Compliance
        Officer, General Counsel, or CEO.
      conflict_of_interest:
        addressed: false
        details: >-
          Not addressed in HIPAA regulations. The same individual may serve as
          both Privacy and Security Official in smaller organizations.
    public_disclosure:
      required: true
      details: >-
        Covered entities must provide a contact person or office responsible
        for receiving complaints, and this information must be included in the
        Notice of Privacy Practices (45 CFR sec. 164.520(b)(1)(vii)).
      registration_with_authority: false
      authority_name: "U.S. Department of Health and Human Services (HHS), Office for Civil Rights (OCR)"
    local_representative:
      required: false
      conditions: >-
        Not applicable. HIPAA applies to covered entities and business
        associates operating in the United States.
      requirements: >-
        Not applicable.
    tasks_and_responsibilities:
      - >-
        Develop and implement privacy policies and procedures (45 CFR sec.
        164.530(a)(1))
      - >-
        Serve as the contact point for receiving complaints about privacy
        practices (45 CFR sec. 164.530(a)(1)(ii))
      - >-
        Provide privacy training to all workforce members (45 CFR sec.
        164.530(b))
      - >-
        Apply appropriate sanctions against workforce members who violate
        policies (45 CFR sec. 164.530(e))
      - >-
        Mitigate harmful effects of privacy violations (45 CFR sec.
        164.530(f))
      - >-
        Maintain documentation of policies for six years (45 CFR sec.
        164.530(j))
    penalties_for_non_appointment:
      specified: true
      details: >-
        Failure to designate a Privacy Official is a violation of the Privacy
        Rule. Civil monetary penalties range from USD 100 to USD 50,000 per
        violation (with annual cap of USD 1,500,000 per identical provision
        under 42 USC sec. 1320d-5). Willful neglect that is not corrected may
        result in penalties of USD 50,000 per violation up to USD 1,500,000.
    notes: >-
      The Privacy Official and Security Official may be the same person in
      smaller covered entities. HIPAA requires the covered entity to document
      the designation. The HITECH Act (2009) strengthened enforcement and
      increased penalty amounts. Business associates became directly liable
      for Security Rule compliance under HITECH.

  - id: pipl
    framework_ref: pipl
    articles: "art. 52, art. 53, art. 54"
    role:
      mandatory: conditional
      conditions: >-
        Personal information handlers (controllers) processing personal
        information reaching the volume threshold set by the Cyberspace
        Administration of China (CAC) must designate a personal information
        protection officer (art. 52). The specific threshold is determined
        by CAC regulation (generally interpreted as 1 million individuals).
      official_title: >-
        个人信息保护负责人 (gèrén xìnxī bǎohù fùzérén) /
        Personal Information Protection Officer (English)
      alternative_titles:
        - "PIPO"
        - "Data Protection Responsible Person"
    qualifications:
      specified_in_law: false
      requirements: >-
        PIPL does not specify formal qualifications for the personal
        information protection officer.
      professional_knowledge: >-
        Not explicitly specified. The officer is expected to have sufficient
        knowledge to oversee personal information protection activities.
    independence:
      protected_by_law: false
      requirements:
        - >-
          PIPL does not contain explicit independence protections comparable
          to GDPR art. 38
      reporting_line: >-
        Not specified in the law. Expected to have sufficient authority
        within the organization to fulfil duties.
      conflict_of_interest:
        addressed: false
        details: >-
          Not addressed in PIPL.
    public_disclosure:
      required: true
      details: >-
        The personal information handler shall disclose the contact
        information of the personal information protection officer and
        report it to the department performing personal information
        protection duties (art. 52).
      registration_with_authority: true
      authority_name: "Cyberspace Administration of China (CAC)"
    local_representative:
      required: true
      conditions: >-
        Overseas personal information handlers that process personal
        information of individuals within China for purposes of providing
        products or services, or analysing and evaluating activities of
        individuals within China, must establish a dedicated entity or
        designate a representative within China (art. 53).
      requirements: >-
        The name and contact information of the designated entity or
        representative must be reported to the department performing
        personal information protection duties (art. 53).
    tasks_and_responsibilities:
      - >-
        Supervise the personal information handling activities of the
        organization and the protection measures adopted (art. 52)
      - >-
        Serve as the contact point for the personal information protection
        authority (art. 52)
      - >-
        Coordinate internal compliance with PIPL requirements
    penalties_for_non_appointment:
      specified: true
      details: >-
        Failure to fulfil obligations under PIPL (including appointment of a
        personal information protection officer) may result in orders to
        rectify, warnings, confiscation of illegal income, fines up to
        RMB 1,000,000 on the entity and RMB 10,000 to RMB 100,000 on
        directly responsible persons. For serious circumstances, fines up
        to RMB 50,000,000 or 5% of the previous year's turnover, plus
        suspension of relevant business or revocation of business licenses
        (art. 66).
    notes: >-
      PIPL does not use the term DPO but establishes a functionally similar
      role. The requirement is threshold-based (volume of personal information
      processed) rather than activity-based as in GDPR. Critical Information
      Infrastructure Operators (CIIOs) face additional obligations including
      data localization requirements.

  - id: dpdp-india
    framework_ref: dpdp-india
    articles: "sec. 8(1), sec. 8(8), sec. 10"
    role:
      mandatory: conditional
      conditions: >-
        The Central Government may notify certain Data Fiduciaries as
        Significant Data Fiduciaries (SDFs) based on volume and sensitivity
        of personal data processed, risk to rights of Data Principals,
        potential impact on sovereignty and integrity of India, security of
        the State, and public order (sec. 10(1)). SDFs must appoint a Data
        Protection Officer based in India (sec. 10(2)(a)).
      official_title: "Data Protection Officer (DPO)"
      alternative_titles:
        - "DPO India"
    qualifications:
      specified_in_law: false
      requirements: >-
        The DPDP Act 2023 does not prescribe specific qualifications for the
        DPO. The DPO must be based in India and represent the Significant
        Data Fiduciary (sec. 10(2)(a)).
      professional_knowledge: >-
        Not explicitly specified. The DPO is expected to serve as the point
        of contact for the Data Principal and the Data Protection Board of
        India.
    independence:
      protected_by_law: false
      requirements:
        - >-
          The DPDP Act does not include explicit independence protections
          for the DPO
      reporting_line: >-
        Must report to the Board of Directors or similar governing body of
        the Significant Data Fiduciary (sec. 10(2)(a)).
      conflict_of_interest:
        addressed: false
        details: >-
          Not explicitly addressed in the Act.
    public_disclosure:
      required: true
      details: >-
        The DPO serves as the point of contact for the Data Principal and
        the Board. Contact details are expected to be publicly available as
        part of grievance redressal requirements.
      registration_with_authority: true
      authority_name: "Data Protection Board of India"
    local_representative:
      required: true
      conditions: >-
        The DPO must be based in India. For Significant Data Fiduciaries
        not established in India, a local representative or DPO based in
        India is required (sec. 10(2)(a)).
      requirements: >-
        Must be based in India and serve as the point of contact for the
        Data Protection Board of India and Data Principals.
    tasks_and_responsibilities:
      - >-
        Serve as the point of contact for the Data Principal for grievance
        redressal (sec. 10(2)(a))
      - >-
        Serve as the point of contact for the Data Protection Board of
        India (sec. 10(2)(a))
      - >-
        Represent the Significant Data Fiduciary in matters relating to
        the Act
      - >-
        Oversee Data Protection Impact Assessments required for Significant
        Data Fiduciaries (sec. 10(2)(b))
      - >-
        Ensure periodic audits by an independent data auditor
        (sec. 10(2)(b))
    penalties_for_non_appointment:
      specified: true
      details: >-
        Non-compliance by Significant Data Fiduciaries with obligations
        under sec. 10 may result in penalties up to INR 250 crore
        (approximately USD 30M) as determined by the Data Protection Board
        of India (Schedule, Table entry for sec. 10).
    notes: >-
      The DPDP Act 2023 was enacted on 11 August 2023. Implementing rules
      are pending and will further define Significant Data Fiduciary
      criteria, DPO requirements, and procedural details. Only Significant
      Data Fiduciaries must appoint a DPO; ordinary Data Fiduciaries are
      not required to do so but must still have grievance redressal mechanisms.

  - id: pdpa-singapore
    framework_ref: pdpa-singapore
    articles: "sec. 11(3), sec. 11(5), PDPC Advisory Guidelines on Key Concepts"
    role:
      mandatory: true
      conditions: >-
        Every organisation must designate at least one individual to be
        responsible for ensuring compliance with the PDPA. This became
        mandatory with the 2019 amendment (effective 1 February 2021).
        The obligation applies to all organisations regardless of size.
      official_title: "Data Protection Officer (DPO)"
      alternative_titles:
        - "Privacy Officer"
    qualifications:
      specified_in_law: false
      requirements: >-
        PDPA does not prescribe specific qualifications. The Personal Data
        Protection Commission (PDPC) recommends that the DPO have sufficient
        knowledge and understanding of the PDPA.
      professional_knowledge: >-
        Not mandated by statute. PDPC has developed training and certification
        programmes. The IAPP CIPP/A certification and Singapore PDPC
        practitioner certificates are common but not legally required.
    independence:
      protected_by_law: false
      requirements:
        - >-
          PDPA does not include explicit independence protections for the DPO
      reporting_line: >-
        Not specified in the Act. The PDPC recommends the DPO have direct
        access to senior management.
      conflict_of_interest:
        addressed: false
        details: >-
          Not addressed in the Act. PDPC guidelines recommend the DPO not hold
          positions that conflict with data protection oversight responsibilities.
    public_disclosure:
      required: true
      details: >-
        Organisations must make publicly available the business contact
        information of at least one DPO (sec. 11(5)). This is typically done
        via the organisation's website.
      registration_with_authority: false
      authority_name: "Personal Data Protection Commission (PDPC)"
    local_representative:
      required: false
      conditions: >-
        PDPA does not explicitly require a local representative for foreign
        organisations, though sec. 11(3) applies to any organisation that
        collects, uses, or discloses personal data in Singapore.
      requirements: >-
        Not applicable.
    tasks_and_responsibilities:
      - >-
        Ensure the organisation complies with the PDPA (sec. 11(3))
      - >-
        Develop and implement data protection policies and practices
      - >-
        Foster a data protection culture through communication and training
      - >-
        Handle complaints and inquiries from individuals regarding the
        organisation's data protection practices
      - >-
        Alert management to risks that may arise regarding personal data
      - >-
        Liaise with the PDPC on data protection matters as necessary
    penalties_for_non_appointment:
      specified: true
      details: >-
        Non-compliance with PDPA obligations may result in directions from
        the PDPC, financial penalties up to SGD 1,000,000 or 10% of the
        organisation's annual turnover in Singapore (whichever is higher)
        for organisations with annual turnover exceeding SGD 10,000,000
        (effective from the 2020 amendment).
    notes: >-
      The 2019 amendment (effective 1 February 2021) introduced the mandatory
      DPO requirement. Prior to this, designation was voluntary. Singapore's
      approach is notable for applying the requirement to all organisations
      regardless of size, though smaller organisations may designate an
      existing employee rather than hiring a dedicated DPO.

  - id: appi
    framework_ref: appi
    articles: "art. 26-2(1), art. 26-2(2), PPC Guidelines"
    role:
      mandatory: conditional
      conditions: >-
        A Personal Information Protection Manager (PIPM) is not explicitly
        mandated by APPI itself, but the Personal Information Protection
        Commission (PPC) Guidelines on Act (General Rules edition) and JIS
        Q 15001 (Privacy Mark) require the appointment of a person
        responsible for the management of personal information handling.
        In practice, appointment is effectively mandatory for all business
        operators handling personal information.
      official_title: >-
        個人情報保護管理者 (kojin jōhō hogo kanrisha) /
        Personal Information Protection Manager (English)
      alternative_titles:
        - "CPO (Chief Privacy Officer)"
        - "Privacy Manager"
        - "個人情報保護責任者 (kojin jōhō hogo sekininsha)"
    qualifications:
      specified_in_law: false
      requirements: >-
        APPI does not specify formal qualifications. JIS Q 15001 requires
        the person to have sufficient authority and knowledge to oversee
        personal information protection.
      professional_knowledge: >-
        Not prescribed by statute. The PPC expects the designated person to
        have knowledge of APPI and its implementing rules. Privacy Mark
        certification (JIS Q 15001) auditors often verify competency.
    independence:
      protected_by_law: false
      requirements:
        - >-
          APPI does not include explicit independence protections for the
          Personal Information Protection Manager
      reporting_line: >-
        Not specified in the Act. Under JIS Q 15001, the manager should
        report to top management.
      conflict_of_interest:
        addressed: false
        details: >-
          Not addressed in APPI. JIS Q 15001 requires the manager to have
          sufficient authority independent of business line pressures.
    public_disclosure:
      required: false
      details: >-
        APPI does not require public disclosure of the Personal Information
        Protection Manager's identity. However, business operators must
        publish their Privacy Policy and contact information for complaints
        and inquiries (art. 32, art. 40).
      registration_with_authority: false
      authority_name: "Personal Information Protection Commission (PPC / 個人情報保護委員会)"
    local_representative:
      required: false
      conditions: >-
        APPI does not require foreign businesses to designate a local
        representative. However, the PPC may request cooperation from
        foreign authorities for cross-border enforcement (art. 171).
      requirements: >-
        Not applicable. Foreign business operators that handle personal
        information of individuals in Japan must comply with APPI but no
        formal local representative requirement exists.
    tasks_and_responsibilities:
      - >-
        Oversee the handling of personal information within the organisation
      - >-
        Develop and maintain a personal information protection management
        system (JIS Q 15001)
      - >-
        Ensure compliance with APPI and PPC guidelines
      - >-
        Handle complaints and inquiries from data subjects
      - >-
        Conduct internal audits and training on personal information
        protection
    penalties_for_non_appointment:
      specified: false
      details: >-
        APPI does not prescribe specific penalties for failure to appoint a
        Personal Information Protection Manager. However, failure to comply
        with PPC orders may result in imprisonment of up to one year or a
        fine of up to JPY 1,000,000 (art. 178). Organisations may also lose
        Privacy Mark certification.
    notes: >-
      Japan's 2022 APPI amendment strengthened cross-border transfer rules
      and breach notification requirements. The Personal Information
      Protection Manager role is more deeply embedded in the JIS Q 15001
      framework (Privacy Mark) than in APPI itself. Most large Japanese
      organisations appoint a CPO-equivalent voluntarily.

  - id: pipa-korea
    framework_ref: pipa-korea
    articles: "art. 31, art. 31-2, Enforcement Decree art. 32"
    role:
      mandatory: true
      conditions: >-
        All personal information controllers (public and private sector)
        must designate a Chief Privacy Officer (CPO). The Enforcement Decree
        specifies that the CPO must be a person with authority and
        responsibility over personal information processing. For public
        institutions, the CPO must be a senior public official at or above
        director-general level. For private organisations processing
        personal information of 50,000 or more data subjects, the CPO must
        be an executive-level officer or equivalent.
      official_title: >-
        개인정보 보호책임자 (gaein jeongbo bohochaegimja) /
        Chief Privacy Officer (CPO) (English)
      alternative_titles:
        - "CPO"
        - "Privacy Officer"
    qualifications:
      specified_in_law: true
      requirements: >-
        For private sector: if processing personal information of 50,000
        or more data subjects, the CPO must be an executive or a person
        holding equivalent authority (Enforcement Decree art. 32(2)). For
        public sector: the CPO must be a senior official at or above
        director-general level.
      professional_knowledge: >-
        The CPO must have expertise in personal information protection. The
        Enforcement Decree requires that the CPO be a person with actual
        responsibility and authority over personal information processing.
    independence:
      protected_by_law: true
      requirements:
        - >-
          The personal information controller shall not treat the CPO
          unfavorably due to the performance of their duties (art. 31(5))
        - >-
          The CPO is guaranteed independence in the performance of their
          duties under art. 31
      reporting_line: >-
        The CPO must have executive-level authority (for organisations
        processing 50,000+ records) and report to top management.
      conflict_of_interest:
        addressed: true
        details: >-
          The CPO should not hold a position that fundamentally conflicts
          with personal information protection oversight. The Personal
          Information Protection Commission (PIPC) guidance recommends
          separation from IT operations management.
    public_disclosure:
      required: true
      details: >-
        The personal information controller must disclose the name, position,
        department, and contact information (phone, email) of the CPO in the
        privacy policy (art. 30(1)(8)).
      registration_with_authority: false
      authority_name: "Personal Information Protection Commission (PIPC / 개인정보보호위원회)"
    local_representative:
      required: true
      conditions: >-
        An information and communications service provider outside Korea that
        processes personal information of users in Korea and meets the
        threshold determined by Presidential Decree must designate a domestic
        representative (art. 39-11).
      requirements: >-
        The domestic representative must be a person or entity in Korea that
        can act on behalf of the foreign controller for receiving data
        subject requests and authority inquiries.
    tasks_and_responsibilities:
      - >-
        Establish and implement the plan for protection of personal
        information (art. 31(2)(1))
      - >-
        Conduct periodic surveys and inspections on personal information
        processing status (art. 31(2)(2))
      - >-
        Handle complaints and remedy damages related to personal information
        processing (art. 31(2)(3))
      - >-
        Develop internal control systems to prevent personal information
        leakage (art. 31(2)(4))
      - >-
        Implement education and training programmes for personal information
        protection (art. 31(2)(5))
      - >-
        Protect and manage personal information files (art. 31(2)(6))
      - >-
        Develop and implement the privacy policy (art. 31(2)(7))
    penalties_for_non_appointment:
      specified: true
      details: >-
        Failure to designate a CPO may result in administrative fines
        (과태료, gwataeryo) of up to KRW 50,000,000 (approximately USD
        40,000). Additional corrective orders and public disclosure of
        violations may apply (art. 75).
    notes: >-
      South Korea's PIPA was significantly amended in 2023 (effective 15
      March 2024), strengthening CPO independence and adding requirements for
      large-scale processors. The PIPC (established in 2020 as an independent
      agency) actively enforces CPO requirements. Korea also requires a
      separate Information Security Officer (CISO) under the Act on
      Promotion of Information and Communications Network Utilization.

  - id: kvkk
    framework_ref: kvkk
    articles: "art. 13, art. 16, Regulation on Data Controllers Registry"
    role:
      mandatory: conditional
      conditions: >-
        KVKK does not mandate a DPO in the GDPR sense. However, data
        controllers registered in Turkey must designate a contact person
        (veri sorumlusu irtibat kişisi) if they are resident in Turkey, or
        a data controller representative (veri sorumlusu temsilcisi) if they
        are not resident in Turkey. Registration with the Data Controllers
        Registry (VERBIS) is mandatory for most data controllers.
      official_title: >-
        Veri sorumlusu irtibat kişisi (Turkish) /
        Data Controller Contact Person (English)
      alternative_titles:
        - "Veri sorumlusu temsilcisi (Data Controller Representative, for foreign entities)"
        - "Kişisel Verilerin Korunması Sorumlusu (Personal Data Protection Officer, voluntary)"
    qualifications:
      specified_in_law: true
      requirements: >-
        The contact person must be a Turkish citizen or a foreigner with a
        residence permit in Turkey. For the data controller representative
        of foreign entities, the representative must be a real or legal
        person established in Turkey.
      professional_knowledge: >-
        No specific professional qualifications mandated by law for the
        contact person. In practice, knowledge of KVKK and the Board's
        decisions is expected.
    independence:
      protected_by_law: false
      requirements:
        - >-
          KVKK does not include explicit independence protections for the
          contact person
      reporting_line: >-
        Not specified. The contact person acts as an intermediary between the
        data controller and the Personal Data Protection Authority (KVKK
        Board).
      conflict_of_interest:
        addressed: false
        details: >-
          Not addressed in the law. The contact person role is administrative
          rather than advisory or supervisory.
    public_disclosure:
      required: true
      details: >-
        Data controllers must register in the Data Controllers Registry
        (VERBIS) and provide contact person details. Data subjects may access
        controller information via VERBIS.
      registration_with_authority: true
      authority_name: "Kişisel Verileri Koruma Kurumu (Personal Data Protection Authority / KVKK Board)"
    local_representative:
      required: true
      conditions: >-
        Data controllers not resident in Turkey must designate a data
        controller representative (veri sorumlusu temsilcisi) in Turkey
        (Regulation on Data Controllers Registry, art. 11).
      requirements: >-
        The representative must be a real or legal person established in
        Turkey, authorized to act on behalf of the data controller before
        the KVKK Board and data subjects.
    tasks_and_responsibilities:
      - >-
        Act as the contact point between the data controller and the KVKK
        Board
      - >-
        Facilitate the data controller's registration in VERBIS
      - >-
        Receive and process data subject requests on behalf of the data
        controller (art. 13)
      - >-
        Coordinate responses to data subject applications within 30 days
    penalties_for_non_appointment:
      specified: true
      details: >-
        Failure to register in VERBIS (which includes designating a contact
        person) may result in administrative fines from TRY 50,000 to TRY
        1,000,000 (art. 18(1)(ç)). Amounts are updated annually for
        inflation.
    notes: >-
      Turkey's KVKK is structurally influenced by the EU Data Protection
      Directive 95/46/EC rather than GDPR. The contact person role is
      significantly more limited than a GDPR DPO, serving primarily as a
      communication channel rather than an independent advisory and
      monitoring function. A draft amendment to align KVKK more closely
      with GDPR has been under discussion since 2023.

  - id: pipeda
    framework_ref: pipeda
    articles: "sec. 4.1, sec. 4.1.4, Schedule 1 Principle 1"
    role:
      mandatory: true
      conditions: >-
        PIPEDA Principle 1 (Accountability, Schedule 1 sec. 4.1) requires
        every organisation to designate an individual or individuals
        responsible for the organisation's compliance with the principles.
        This is mandatory for all organisations subject to PIPEDA.
      official_title: "Privacy Officer"
      alternative_titles:
        - "Chief Privacy Officer (CPO)"
        - "Privacy Commissioner Contact"
        - "Designated Individual"
    qualifications:
      specified_in_law: false
      requirements: >-
        PIPEDA does not prescribe specific qualifications for the privacy
        officer. The designated individual must be able to fulfil the
        accountability requirements under Principle 1.
      professional_knowledge: >-
        Not prescribed by statute. The Office of the Privacy Commissioner
        (OPC) recommends familiarity with PIPEDA and associated regulations.
        CIPP/C certification is common but not required.
    independence:
      protected_by_law: false
      requirements:
        - >-
          PIPEDA does not include explicit independence protections for the
          designated privacy officer
      reporting_line: >-
        Not specified. The OPC recommends the designated individual have
        sufficient authority and access to senior management to ensure
        effective implementation of privacy policies.
      conflict_of_interest:
        addressed: false
        details: >-
          Not addressed in PIPEDA. The OPC guidance recommends the designated
          individual have the authority to act independently on privacy
          matters.
    public_disclosure:
      required: true
      details: >-
        The identity of the designated individual shall be made known upon
        request (sec. 4.1.1). Organisations must provide a contact point for
        inquiries and complaints regarding privacy policies and practices.
      registration_with_authority: false
      authority_name: "Office of the Privacy Commissioner of Canada (OPC)"
    local_representative:
      required: false
      conditions: >-
        PIPEDA does not require a specific local representative for foreign
        organisations. However, PIPEDA applies to organisations that collect,
        use, or disclose personal information in the course of commercial
        activities in Canada.
      requirements: >-
        Not applicable. Foreign organisations subject to PIPEDA must comply
        with all principles but no formal local representative requirement
        exists.
    tasks_and_responsibilities:
      - >-
        Ensure the organisation's compliance with PIPEDA principles
        (sec. 4.1)
      - >-
        Develop and implement policies and practices to give effect to the
        principles (sec. 4.1.4)
      - >-
        Establish procedures to receive and respond to complaints and
        inquiries (sec. 4.1.4(a))
      - >-
        Train staff and communicate policies to staff regarding the
        organisation's privacy obligations (sec. 4.1.4(b))
      - >-
        Develop information to explain the organisation's policies and
        procedures (sec. 4.1.4(c))
    penalties_for_non_appointment:
      specified: false
      details: >-
        PIPEDA does not specify a distinct penalty for failure to designate
        a privacy officer. However, non-compliance with Principle 1
        (Accountability) may result in findings by the Privacy Commissioner
        and Federal Court orders. Under Bill C-27 (proposed Consumer Privacy
        Protection Act), administrative monetary penalties of up to
        CAD 10,000,000 or 3% of global gross revenue would apply.
    notes: >-
      PIPEDA is based on the Canadian Standards Association Model Code for
      the Protection of Personal Information (CAN/CSA-Q830-96). Bill C-27
      (Consumer Privacy Protection Act) proposes to replace PIPEDA with
      enhanced requirements including stronger accountability provisions.
      Quebec's Law 25 (Loi 25) also requires a privacy officer designation
      and applies to Quebec organisations. Provincial privacy laws in
      Alberta and British Columbia have similar requirements.

  - id: popia
    framework_ref: popia
    articles: "sec. 55, sec. 56, sec. 57, sec. 58, sec. 59"
    role:
      mandatory: true
      conditions: >-
        Every responsible party (controller) must appoint an Information
        Officer. This is mandatory under sec. 55. Deputy Information Officers
        may also be appointed (sec. 56). Public bodies must register their
        Information Officer with the Information Regulator. Private bodies
        are deemed to have their head as the Information Officer by default
        unless another person is specifically designated.
      official_title: "Information Officer"
      alternative_titles:
        - "Deputy Information Officer"
        - "Head of Organisation (default for private bodies)"
    qualifications:
      specified_in_law: false
      requirements: >-
        POPIA does not prescribe specific formal qualifications for the
        Information Officer. The person must be able to fulfil the duties
        under sec. 55.
      professional_knowledge: >-
        Not mandated by statute. The Information Regulator recommends
        familiarity with POPIA, PAIA (Promotion of Access to Information
        Act), and the Codes of Conduct issued under POPIA.
    independence:
      protected_by_law: false
      requirements:
        - >-
          POPIA does not include explicit independence protections comparable
          to GDPR art. 38
      reporting_line: >-
        Not specified. For private bodies, the head of the organisation is
        the default Information Officer. Deputy Information Officers report
        to the Information Officer.
      conflict_of_interest:
        addressed: false
        details: >-
          Not explicitly addressed in POPIA. The default designation of the
          head of the organisation may inherently create conflicts.
    public_disclosure:
      required: true
      details: >-
        The Information Officer's details must be made available. Public
        bodies must publish the Information Officer's name and contact
        details. All bodies must register with the Information Regulator
        (sec. 55(2)).
      registration_with_authority: true
      authority_name: "Information Regulator (South Africa)"
    local_representative:
      required: false
      conditions: >-
        POPIA does not establish a specific local representative requirement
        for foreign entities. However, POPIA applies to responsible parties
        domiciled in South Africa or those using means (automated or
        non-automated) in South Africa (sec. 3).
      requirements: >-
        Not applicable.
    tasks_and_responsibilities:
      - >-
        Encourage compliance by the body with the conditions for the lawful
        processing of personal information (sec. 55(1)(a))
      - >-
        Deal with requests made to the body pursuant to POPIA (sec. 55(1)(b))
      - >-
        Work with the Information Regulator in relation to investigations
        conducted in relation to the body (sec. 55(1)(c))
      - >-
        Ensure compliance with PAIA (Promotion of Access to Information Act)
        requirements (sec. 55(1)(d))
      - >-
        Carry out internal awareness sessions regarding POPIA provisions
      - >-
        Ensure a PAIA manual is developed and made available (sec. 55(1)(d))
    penalties_for_non_appointment:
      specified: true
      details: >-
        Failure to register the Information Officer with the Information
        Regulator may result in administrative fines up to ZAR 10,000,000
        (approximately USD 550,000) or imprisonment of up to 10 years, or
        both (sec. 107, sec. 109).
    notes: >-
      POPIA's Information Officer is unique in that it is simultaneously
      the PAIA Information Officer responsible for access to information
      requests. The dual mandate (data protection and access to information)
      distinguishes South Africa's approach. The Information Regulator
      began enforcement on 1 July 2021 after a one-year grace period.

  - id: pdpa-thailand
    framework_ref: pdpa-thailand
    articles: "sec. 41, sec. 42, sec. 43"
    role:
      mandatory: conditional
      conditions: >-
        A DPO must be appointed when the data controller or processor is a
        public authority (except courts acting in judicial capacity); when
        the core activities require regular monitoring of data subjects by
        reason of their nature, scope, or purposes on a large scale; or when
        the core activities consist of large-scale processing of special
        categories of personal data (sec. 41(1)-(3)). The structure closely
        mirrors GDPR art. 37.
      official_title: >-
        เจ้าหน้าที่คุ้มครองข้อมูลส่วนบุคคล (jâo nâa têe kúm khrong
        kâw muun sùan búk khon) / Data Protection Officer (DPO) (English)
      alternative_titles:
        - "DPO"
    qualifications:
      specified_in_law: true
      requirements: >-
        The DPO must have knowledge and expertise in personal data protection
        law and practices (sec. 42). The PDPC Expert Committee may prescribe
        additional qualifications.
      professional_knowledge: >-
        Expert knowledge in personal data protection law and practices is
        required by statute (sec. 42). The specific level of expertise should
        correspond to the data processing operations and risks.
    independence:
      protected_by_law: true
      requirements:
        - >-
          The data controller and processor shall support the DPO in
          performing duties and shall not cause the termination of
          employment or the contract on the grounds of performing DPO
          duties (sec. 42)
        - >-
          The DPO shall perform duties independently (sec. 42)
      reporting_line: >-
        The DPO shall report directly to the top management of the data
        controller or processor (sec. 42).
      conflict_of_interest:
        addressed: true
        details: >-
          The DPO may perform other duties but the data controller or
          processor must ensure those duties do not conflict with DPO
          responsibilities (sec. 42).
    public_disclosure:
      required: true
      details: >-
        The data controller and processor shall publish the contact details
        of the DPO and notify the Office of the Personal Data Protection
        Committee (sec. 41).
      registration_with_authority: true
      authority_name: "Office of the Personal Data Protection Committee (PDPC Thailand)"
    local_representative:
      required: true
      conditions: >-
        A data controller not established in Thailand that offers goods or
        services to data subjects in Thailand or monitors behaviour of data
        subjects in Thailand must designate a representative in Thailand
        (sec. 5/1).
      requirements: >-
        The representative must be authorized to act on behalf of the data
        controller for purposes of the PDPA and must be located in Thailand.
    tasks_and_responsibilities:
      - >-
        Advise the data controller or processor and employees on compliance
        with the PDPA (sec. 43(1))
      - >-
        Monitor the operation of the data controller or processor to ensure
        compliance with the PDPA (sec. 43(2))
      - >-
        Coordinate and cooperate with the Office of the PDPC regarding
        compliance (sec. 43(3))
      - >-
        Maintain confidentiality of personal data known by reason of the
        performance of duties (sec. 43(4))
    penalties_for_non_appointment:
      specified: true
      details: >-
        Administrative fines for non-compliance with PDPA obligations may
        be up to THB 5,000,000 (approximately USD 145,000). Criminal
        penalties may also apply for certain violations (sec. 90, sec. 91).
    notes: >-
      Thailand's PDPA took full effect on 1 June 2022 after multiple
      postponements. The DPO provisions are closely modelled on GDPR art.
      37-39. The PDPC Expert Committee is empowered to issue additional
      rules and guidelines on DPO qualifications and duties.

  - id: coppa
    framework_ref: coppa
    articles: "15 USC sec. 6501-6506, 16 CFR Part 312"
    role:
      mandatory: false
      conditions: >-
        COPPA does not require the appointment of a Data Protection Officer
        or equivalent role. The law regulates online collection of personal
        information from children under 13 and focuses on operator
        obligations (verifiable parental consent, privacy notice) rather
        than internal governance structures.
      official_title: "Not applicable (no DPO requirement)"
      alternative_titles:
        - "Privacy Officer (voluntary, common in practice for covered operators)"
    qualifications:
      specified_in_law: false
      requirements: >-
        Not applicable. No statutory role defined.
      professional_knowledge: >-
        Not applicable. Operators must understand COPPA requirements and
        FTC guidelines but no specific officer designation is required.
    independence:
      protected_by_law: false
      requirements:
        - "Not applicable (no statutory role)"
      reporting_line: >-
        Not applicable.
      conflict_of_interest:
        addressed: false
        details: >-
          Not applicable.
    public_disclosure:
      required: false
      details: >-
        No DPO disclosure requirement. Operators must post a clear and
        prominent privacy policy on their website (16 CFR sec. 312.4) and
        provide direct notice to parents.
      registration_with_authority: false
      authority_name: "Federal Trade Commission (FTC)"
    local_representative:
      required: false
      conditions: >-
        Not applicable. COPPA applies to operators of websites and online
        services directed to children under 13, or with actual knowledge
        of collecting personal information from children under 13.
      requirements: >-
        Not applicable.
    tasks_and_responsibilities:
      - >-
        Not applicable (no DPO requirement). Operators must obtain
        verifiable parental consent before collecting personal information
        from children (16 CFR sec. 312.5)
      - >-
        Operators must maintain the confidentiality, security, and
        integrity of personal information collected from children
        (16 CFR sec. 312.8)
    penalties_for_non_appointment:
      specified: false
      details: >-
        Not applicable. No DPO appointment obligation exists under COPPA.
    notes: >-
      While no DPO is required, COPPA operators may participate in FTC-
      approved Safe Harbor programmes (e.g., kidSAFE, CARU/BBB) that
      include self-regulatory privacy practices. The FTC has actively
      enforced COPPA with significant fines (e.g., YouTube/Google USD
      170M in 2019, Epic Games USD 275M in 2022). The FTC proposed
      amendments to the COPPA Rule in 2024 to strengthen protections.

  - id: eprivacy
    framework_ref: eprivacy
    articles: "Directive 2002/58/EC (as amended by 2009/136/EC)"
    role:
      mandatory: false
      conditions: >-
        The ePrivacy Directive does not establish an independent DPO
        requirement. It defers to the GDPR (and previously the Data
        Protection Directive 95/46/EC) for data protection governance
        requirements, including DPO provisions. Where ePrivacy processing
        falls within GDPR scope, the GDPR DPO requirements apply.
      official_title: "Not applicable (defers to GDPR DPO requirement)"
      alternative_titles:
        - "GDPR DPO (when GDPR applies concurrently)"
    qualifications:
      specified_in_law: false
      requirements: >-
        Not applicable under ePrivacy. GDPR DPO qualifications apply when
        both instruments are applicable.
      professional_knowledge: >-
        Not applicable under ePrivacy. The GDPR DPO must have expert
        knowledge covering both GDPR and ePrivacy aspects of processing.
    independence:
      protected_by_law: false
      requirements:
        - >-
          Not applicable under ePrivacy. GDPR independence provisions apply
          when the GDPR DPO covers ePrivacy-related processing
      reporting_line: >-
        Not applicable under ePrivacy.
      conflict_of_interest:
        addressed: false
        details: >-
          Not applicable under ePrivacy. GDPR rules apply.
    public_disclosure:
      required: false
      details: >-
        No independent disclosure requirement under ePrivacy. GDPR DPO
        disclosure requirements apply when applicable.
      registration_with_authority: false
      authority_name: >-
        National supervisory authorities of EU/EEA member states (same as
        GDPR)
    local_representative:
      required: false
      conditions: >-
        Not applicable under ePrivacy. GDPR art. 27 representative
        requirements apply when both instruments are applicable.
      requirements: >-
        Not applicable.
    tasks_and_responsibilities:
      - >-
        Not applicable under ePrivacy independently. The GDPR DPO covers
        ePrivacy-related processing when both instruments apply concurrently
      - >-
        The DPO should have knowledge of ePrivacy requirements (cookies,
        electronic communications, location data, traffic data) as part
        of their GDPR advisory role
    penalties_for_non_appointment:
      specified: false
      details: >-
        Not applicable under ePrivacy. GDPR penalties apply for failure to
        appoint a DPO when required. National transpositions of ePrivacy
        may establish separate enforcement mechanisms.
    notes: >-
      The ePrivacy Directive is transposed into national law by each
      EU/EEA member state, resulting in varying national implementations.
      The proposed ePrivacy Regulation (intended to replace the Directive)
      has been under negotiation since 2017 and would align more closely
      with GDPR governance. In practice, the GDPR DPO is expected to
      cover ePrivacy compliance as part of their overall data protection
      mandate.

  - id: ferpa
    framework_ref: ferpa
    articles: "20 USC sec. 1232g, 34 CFR Part 99"
    role:
      mandatory: false
      conditions: >-
        FERPA does not require educational agencies or institutions to
        appoint a Data Protection Officer or equivalent role. The law
        governs access to education records and applies to educational
        agencies and institutions receiving federal funding. Compliance
        is managed through institutional policies and procedures.
      official_title: "Not applicable (no DPO requirement)"
      alternative_titles:
        - "Registrar (often serves as de facto FERPA compliance officer)"
        - "FERPA Compliance Officer (voluntary, common in practice)"
        - "Chief Privacy Officer (voluntary)"
    qualifications:
      specified_in_law: false
      requirements: >-
        Not applicable. No statutory role defined. In practice, registrars,
        compliance officers, or general counsel staff handle FERPA matters.
      professional_knowledge: >-
        Not applicable. Institutions must train staff on FERPA requirements
        but no specific officer designation is required.
    independence:
      protected_by_law: false
      requirements:
        - "Not applicable (no statutory role)"
      reporting_line: >-
        Not applicable. Voluntary FERPA officers typically report to the
        Provost, General Counsel, or Chief Compliance Officer.
      conflict_of_interest:
        addressed: false
        details: >-
          Not applicable.
    public_disclosure:
      required: false
      details: >-
        No DPO or officer disclosure requirement. Institutions must annually
        notify parents and eligible students of their FERPA rights (34 CFR
        sec. 99.7).
      registration_with_authority: false
      authority_name: "U.S. Department of Education, Student Privacy Policy Office (SPPO)"
    local_representative:
      required: false
      conditions: >-
        Not applicable. FERPA applies to educational agencies and
        institutions in the United States that receive federal funding.
      requirements: >-
        Not applicable.
    tasks_and_responsibilities:
      - >-
        Not applicable (no DPO requirement). Institutions must implement
        policies governing access to education records (34 CFR sec. 99.31)
      - >-
        Institutions must provide parents and eligible students the right
        to inspect, review, and amend education records (34 CFR sec. 99.10,
        sec. 99.20)
    penalties_for_non_appointment:
      specified: false
      details: >-
        Not applicable. No DPO appointment obligation exists under FERPA.
    notes: >-
      FERPA enforcement is handled by the Student Privacy Policy Office
      (SPPO, formerly FPCO) within the U.S. Department of Education. The
      primary enforcement mechanism is the threat of withdrawal of federal
      funding, which has never been formally invoked. Complaints are
      investigated and resolved through compliance agreements. Many
      universities voluntarily designate a FERPA officer, registrar, or
      privacy office to manage compliance. The U.S. Department of Education
      issued updated guidance in 2023 addressing FERPA in the context of
      educational technology and student data.

  - id: glba
    framework_ref: glba
    articles: "15 USC sec. 6801-6809, 16 CFR Part 314 (Safeguards Rule)"
    role:
      mandatory: conditional
      conditions: >-
        The GLBA itself does not mandate a DPO. However, the FTC Safeguards
        Rule (16 CFR sec. 314.4(a), as amended effective June 2023) requires
        covered financial institutions to designate a single Qualified
        Individual responsible for overseeing, implementing, and enforcing
        the information security programme. This applies to financial
        institutions subject to the FTC's jurisdiction.
      official_title: "Qualified Individual"
      alternative_titles:
        - "Chief Information Security Officer (CISO)"
        - "Information Security Programme Coordinator"
    qualifications:
      specified_in_law: true
      requirements: >-
        The designated person must be a Qualified Individual with the
        knowledge, skills, and authority to oversee and implement the
        information security programme (16 CFR sec. 314.4(a)). The
        financial institution may designate an employee, affiliate, or
        service provider as the Qualified Individual.
      professional_knowledge: >-
        Must possess sufficient knowledge, skills, and experience to
        oversee, implement, and enforce the information security programme.
        No specific certifications mandated, but CISSP, CISM, or similar
        credentials are common in practice.
    independence:
      protected_by_law: false
      requirements:
        - >-
          GLBA and the Safeguards Rule do not include explicit independence
          protections for the Qualified Individual
      reporting_line: >-
        The Qualified Individual must report in writing, at least annually,
        to the board of directors or equivalent governing body on the overall
        status of the information security programme and material matters
        related to the programme (16 CFR sec. 314.4(i)).
      conflict_of_interest:
        addressed: false
        details: >-
          Not addressed. The Qualified Individual may be an outsourced
          service provider, which may raise independence concerns, but the
          institution retains overall responsibility.
    public_disclosure:
      required: false
      details: >-
        No requirement to publicly disclose the identity of the Qualified
        Individual. Financial institutions must provide privacy notices to
        customers (GLBA sec. 6803).
      registration_with_authority: false
      authority_name: "Federal Trade Commission (FTC) and prudential regulators (OCC, Federal Reserve, FDIC, NCUA)"
    local_representative:
      required: false
      conditions: >-
        Not applicable. GLBA applies to financial institutions as defined
        under 15 USC sec. 6809 operating in the United States.
      requirements: >-
        Not applicable.
    tasks_and_responsibilities:
      - >-
        Oversee, implement, and enforce the information security programme
        (16 CFR sec. 314.4(a))
      - >-
        Conduct risk assessments to identify reasonably foreseeable internal
        and external risks (16 CFR sec. 314.4(b))
      - >-
        Design and implement safeguards to control identified risks
        (16 CFR sec. 314.4(c)-(h))
      - >-
        Report at least annually to the board of directors or governing body
        on programme status (16 CFR sec. 314.4(i))
      - >-
        Oversee service providers handling customer information
        (16 CFR sec. 314.4(f))
    penalties_for_non_appointment:
      specified: true
      details: >-
        Failure to comply with the Safeguards Rule may result in FTC
        enforcement actions. Penalties under FTC Act sec. 5 may include
        civil penalties of up to USD 50,120 per violation (adjusted
        annually). Prudential regulators (OCC, FDIC, Federal Reserve) may
        impose additional penalties on regulated institutions.
    notes: >-
      The FTC Safeguards Rule was significantly updated effective 9 June
      2023, adding the Qualified Individual requirement and other specific
      security controls. Financial institutions regulated by prudential
      regulators (banks, thrifts, credit unions) follow the Interagency
      Guidelines Establishing Information Security Standards rather than
      the FTC Safeguards Rule but face analogous requirements. The GLBA
      Qualified Individual role is focused on information security rather
      than data protection/privacy, distinguishing it from a traditional DPO.
