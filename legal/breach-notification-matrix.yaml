id: breach-notification-matrix
title: "Cross-Framework Breach Notification Requirements"
last_updated: "2026-04-05"
description: >
  Comparative matrix of breach/incident notification requirements across all
  applicable frameworks. Covers authority notification, individual notification,
  penalties, and framework-specific notes for each regulation or standard that
  mandates breach reporting.

frameworks:
  - id: gdpr
    framework_ref: gdpr
    articles: "art. 33, art. 34"
    authority_notification:
      required: true
      deadline: "72 hours from becoming aware of the breach"
      authority: "Supervisory Authority (Data Protection Authority of lead establishment)"
      threshold: "Unless unlikely to result in a risk to the rights and freedoms of natural persons"
      content_required:
        - "Nature of the personal data breach (categories, approximate number of data subjects and records)"
        - "Name and contact details of the DPO or other contact point"
        - "Likely consequences of the breach"
        - "Measures taken or proposed to address the breach and mitigate effects"
    individual_notification:
      required: true
      condition: "High risk to rights and freedoms of natural persons"
      deadline: "Without undue delay"
      exceptions:
        - "Controller has implemented appropriate technical/organizational measures (e.g., encryption)"
        - "Controller has taken subsequent measures ensuring high risk is no longer likely"
        - "It would involve disproportionate effort (public communication may substitute)"
    penalties:
      max_fine: "EUR 10,000,000 or 2% of total worldwide annual turnover, whichever is higher"
      calculation_basis: "Higher of fixed amount or percentage of global turnover"
    notes: >
      If notification to authority is not made within 72 hours, the controller must
      provide reasons for the delay. The processor must notify the controller without
      undue delay after becoming aware of a breach. Documentation of all breaches is
      mandatory regardless of notification threshold (art. 33(5)).

  - id: lgpd
    framework_ref: lgpd
    articles: "art. 48, art. 49"
    authority_notification:
      required: true
      deadline: "Reasonable time (ANPD Resolucao CD/ANPD n. 15/2024 establishes 3 business days from knowledge of the incident)"
      authority: "Autoridade Nacional de Protecao de Dados (ANPD)"
      threshold: "Incident that may cause significant risk or damage to data subjects"
      content_required:
        - "Description of the nature of affected personal data"
        - "Information on data subjects involved"
        - "Technical and security measures used for data protection"
        - "Risks related to the incident with identification of possible impacts"
        - "Reasons for delay if notification is not immediate"
        - "Measures taken to reverse or mitigate the effects of the incident"
    individual_notification:
      required: true
      condition: "Incident may cause significant risk or damage to data subjects"
      deadline: "Reasonable time (3 business days per ANPD regulation)"
      exceptions:
        - "ANPD may waive individual notification if appropriate technical measures were in place"
    penalties:
      max_fine: "BRL 50,000,000 per infraction (approximately USD 10M)"
      additional_penalties:
        - "Daily fine to compel compliance"
        - "Public disclosure of the infraction"
        - "Blocking or deletion of personal data related to the infraction"
        - "Partial or total suspension of database activities for up to 6 months"
        - "Partial or total prohibition of data processing activities"
    notes: >
      ANPD Resolucao CD/ANPD n. 15/2024 refined the notification timeline to
      3 business days. The controller must also maintain a record of security
      incidents. The ANPD may require the controller to adopt measures including
      broad dissemination of the incident in media.

  - id: ccpa-cpra
    framework_ref: ccpa-cpra
    articles: "Cal. Civ. Code sec. 1798.82, sec. 1798.150"
    authority_notification:
      required: true
      deadline: "Expedient and without unreasonable delay (no later than 72 hours for certain government agencies)"
      authority: "California Attorney General (if breach affects >500 residents)"
      threshold: "Unauthorized acquisition of unencrypted personal information"
      content_required:
        - "Name and contact information of reporting entity"
        - "Types of personal information breached"
        - "Date or estimated date of breach"
        - "Description of the breach"
        - "Toll-free numbers and addresses of credit reporting agencies (if applicable)"
    individual_notification:
      required: true
      condition: "Breach of unencrypted personal information"
      deadline: "Expedient and without unreasonable delay"
      exceptions:
        - "Data was encrypted and encryption key was not compromised"
        - "Law enforcement requests a delay for investigation purposes"
    penalties:
      max_fine: "USD 7,500 per intentional violation; USD 2,500 per unintentional violation (CPRA enforcement)"
      private_right_of_action: "USD 100-750 per consumer per incident or actual damages (whichever is greater) for data breaches resulting from failure to maintain reasonable security"
    notes: >
      California breach notification is primarily governed by Cal. Civ. Code
      sec. 1798.82 (separate from CCPA/CPRA). CPRA adds enforcement by the
      California Privacy Protection Agency (CPPA). Private right of action
      under CCPA sec. 1798.150 applies specifically to data breaches caused
      by failure to implement reasonable security measures.

  - id: hipaa
    framework_ref: hipaa
    articles: "45 CFR sec. 164.400-414 (Breach Notification Rule)"
    authority_notification:
      required: true
      deadline: "60 calendar days from discovery of the breach"
      authority: "U.S. Department of Health and Human Services (HHS), Office for Civil Rights (OCR)"
      threshold: "Breach of unsecured protected health information (PHI)"
      content_required:
        - "Description of the breach"
        - "Types of information involved"
        - "Steps individuals should take to protect themselves"
        - "Description of what the entity is doing to investigate, mitigate, and prevent future breaches"
        - "Contact information for the entity"
      additional_requirements:
        - "Breaches affecting >=500 individuals: immediate notification to HHS and prominent media outlets in the state/jurisdiction"
        - "Breaches affecting <500 individuals: may be reported annually via HHS breach report portal"
    individual_notification:
      required: true
      condition: "Any breach of unsecured PHI"
      deadline: "Without unreasonable delay, no later than 60 calendar days from discovery"
      method: "Written notice by first-class mail or email (if individual has agreed to electronic notice)"
      exceptions:
        - "PHI is rendered unusable, unreadable, or indecipherable through encryption or destruction per HHS guidance"
    penalties:
      tier_1: "USD 137-68,928 per violation (lack of knowledge)"
      tier_2: "USD 1,379-68,928 per violation (reasonable cause)"
      tier_3: "USD 13,785-68,928 per violation (willful neglect, corrected)"
      tier_4: "USD 68,928-2,067,813 per violation (willful neglect, not corrected)"
      annual_cap: "USD 2,067,813 per identical provision per calendar year"
      criminal_penalties: "Up to USD 250,000 and 10 years imprisonment for obtaining/disclosing PHI with intent to sell or use for personal gain"
    notes: >
      HIPAA Breach Notification Rule presumes any unauthorized acquisition,
      access, use, or disclosure of PHI is a breach unless the covered entity
      demonstrates a low probability of compromise via a 4-factor risk assessment.
      Business associates must notify covered entities within 60 days (or shorter
      per BAA terms). The 2024 HIPAA Security Rule NPRM proposes stricter
      notification timelines (24 hours for business associates to covered entities).

  - id: dora
    framework_ref: dora
    articles: "art. 17, art. 18, art. 19, art. 20"
    authority_notification:
      required: true
      deadline: "Initial notification within 4 hours of classification (and no later than 24 hours from detection); intermediate report within 72 hours; final report within 1 month"
      authority: "Relevant competent authority (e.g., ECB, national financial supervisory authority)"
      threshold: "Major ICT-related incident as classified per art. 18 criteria"
      content_required:
        - "Initial notification: general information, impact, and actions taken"
        - "Intermediate report: updated information, root cause analysis (if available)"
        - "Final report: root cause analysis, timeline, impact assessment, remediation measures"
      classification_criteria:
        - "Number of clients/counterparts affected"
        - "Duration of the incident"
        - "Geographic spread"
        - "Data losses (availability, authenticity, integrity, confidentiality)"
        - "Criticality of services affected"
        - "Economic impact"
    individual_notification:
      required: true
      condition: "When the incident impacts the financial interests of clients"
      deadline: "Without undue delay"
    penalties:
      max_fine: "Member state defined; up to 1% of average daily worldwide turnover for each day of non-compliance (for ICT third-party providers designated as critical)"
      additional_penalties:
        - "Periodic penalty payments"
        - "Public statements identifying the entity and the violation"
        - "Orders to cease conduct"
    notes: >
      DORA introduces a three-phase reporting structure (initial, intermediate,
      final) unique among regulations. Voluntary notification of significant
      cyber threats is also encouraged (art. 19). ESAs (EBA, ESMA, EIOPA)
      issued RTS in 2024 detailing classification thresholds and reporting
      templates. A single EU Hub for major ICT incident reporting may be
      established.

  - id: nis2
    framework_ref: nis2
    articles: "art. 23, art. 30"
    authority_notification:
      required: true
      deadline: "Early warning within 24 hours; incident notification within 72 hours; final report within 1 month (or intermediate report if ongoing)"
      authority: "National CSIRT or competent authority designated by member state"
      threshold: >-
        Significant incident (i.e., causes or is capable of causing
        severe operational disruption or financial loss, or affects
        other persons by causing considerable material or non-material
        damage)
      content_required:
        - "Early warning: suspected cause, cross-border impact assessment"
        - "Incident notification: updated severity/impact assessment, IoCs where applicable"
        - "Final report: detailed description, root cause, mitigation measures, cross-border impact"
    individual_notification:
      required: true
      condition: "When a significant incident is likely to adversely affect the recipients of services"
      deadline: "Without undue delay"
      content: "Measures the recipients can take to mitigate the effects"
    penalties:
      essential_entities: "EUR 10,000,000 or 2% of total worldwide annual turnover, whichever is higher"
      important_entities: "EUR 7,000,000 or 1.4% of total worldwide annual turnover, whichever is higher"
      additional_penalties:
        - "Temporary suspension of certifications or authorizations"
        - "Temporary ban of management body members from exercising managerial functions"
    notes: >
      NIS 2 follows a three-phase reporting model similar to DORA. Member states
      must transpose into national law. Entities must also notify ENISA for
      cross-border incidents. Applies to essential entities (energy, transport,
      banking, health, digital infrastructure) and important entities (postal,
      waste, chemicals, food, manufacturing, digital providers).

  - id: bacen-4893
    framework_ref: bacen-4893
    articles: "art. 6, art. 23"
    authority_notification:
      required: true
      deadline: "Promptly (sem demora) to BCB; specific timelines defined by BCB normative instructions"
      authority: "Banco Central do Brasil (BCB)"
      threshold: "Relevant cyber incidents that affect the continuity of financial services or compromise the security of data"
      content_required:
        - "Description of the incident"
        - "Impact on systems and services"
        - "Corrective measures adopted"
        - "Root cause analysis (when available)"
    individual_notification:
      required: false
      condition: "Not explicitly required by Bacen 4893 itself; defers to LGPD for personal data aspects"
      deadline: "Per LGPD requirements if personal data is involved"
    penalties:
      max_fine: "Administrative penalties defined by CMN/BCB including fines, warnings, and restrictions on activities"
      additional_penalties:
        - "Temporary or permanent prohibition of officers"
        - "Cancellation of authorization to operate"
        - "Intervention or extrajudicial liquidation of the institution"
    notes: >
      Bacen 4893 focuses on cybersecurity incidents affecting financial system
      stability. For personal data breaches, institutions must also comply with
      LGPD notification requirements. BCB Circular 3.909/2018 previously governed
      incident reporting and was consolidated into 4893. Institutions must
      maintain an incident response plan and register all relevant incidents.

  - id: apra-cps-234
    framework_ref: apra-cps-234
    articles: "para. 36, para. 37"
    authority_notification:
      required: true
      deadline: "72 hours for material information security incidents; 10 business days for material information security control weaknesses"
      authority: "Australian Prudential Regulation Authority (APRA)"
      threshold: "Material information security incidents or control weaknesses that could not be remediated in a timely manner"
      content_required:
        - "Nature of the incident or weakness"
        - "Impact assessment"
        - "Remediation actions taken or planned"
    individual_notification:
      required: false
      condition: "Not directly required by CPS 234; defers to Privacy Act 1988 (Notifiable Data Breaches scheme) for personal data"
      deadline: "Per Australian Privacy Act NDB scheme: as soon as practicable after completing assessment (max 30 days to assess)"
    penalties:
      max_fine: "No specific monetary penalty in CPS 234 itself; APRA enforcement via prudential supervision"
      additional_penalties:
        - "Directions to take specific actions"
        - "Enforceable undertakings"
        - "License conditions"
        - "Disqualification of responsible persons"
        - "Referral to ASIC or other authorities"
    notes: >
      CPS 234 requires notification to APRA, not to individuals directly.
      For personal data breaches, the Notifiable Data Breaches (NDB) scheme
      under the Privacy Act 1988 (Part IIIC) requires notification to the
      Australian Information Commissioner (OAIC) and affected individuals.
      Eligible data breaches are those likely to result in serious harm.

  - id: pci-dss-v4
    framework_ref: pci-dss-v4
    articles: "Req. 12.10, Req. 12.10.1-12.10.7"
    authority_notification:
      required: true
      deadline: "Immediately upon discovery; specific timelines per card brand operating regulations"
      authority: "Relevant payment card brands (Visa, Mastercard, etc.) and acquiring bank"
      threshold: "Suspected or confirmed compromise of cardholder data"
      content_required:
        - "Details of the suspected or confirmed compromise"
        - "Results of forensic investigation (PFI engagement typically required)"
        - "Remediation actions taken"
    individual_notification:
      required: true
      condition: "Per applicable state/national breach notification laws when cardholder data is compromised"
      deadline: "Per applicable jurisdiction (e.g., state laws in the US)"
    penalties:
      max_fine: "Card brand fines ranging from USD 5,000 to USD 100,000 per month of non-compliance"
      additional_penalties:
        - "Increased transaction fees"
        - "Mandatory forensic investigation at entity's expense"
        - "Suspension or termination of card acceptance privileges"
        - "Liability for fraudulent transactions"
    notes: >
      PCI DSS is not a law but a contractual standard. Breach notification
      obligations flow from card brand operating regulations and contractual
      agreements with acquiring banks. A Qualified Incident Response assessor
      or PCI Forensic Investigator (PFI) must typically be engaged. Card brands
      may impose significant fines on acquiring banks which are passed to merchants.

  - id: sox
    framework_ref: sox
    articles: "Section 302, Section 409, Section 802"
    authority_notification:
      required: true
      deadline: "Real-time disclosure on a rapid and current basis (Section 409); within 4 business days for material events (SEC Form 8-K)"
      authority: "Securities and Exchange Commission (SEC)"
      threshold: "Material events including cybersecurity incidents that could affect financial reporting integrity"
      content_required:
        - "Nature and scope of the incident"
        - "Material impact or reasonably likely material impact on financial condition and operations"
        - "Status of remediation"
    individual_notification:
      required: false
      condition: "Not directly required; SEC rules require public disclosure which indirectly notifies shareholders/investors"
      deadline: "N/A"
    penalties:
      max_fine: "Up to USD 5,000,000 for individuals; USD 25,000,000 for entities"
      criminal_penalties: "Up to 20 years imprisonment for altering, destroying, or concealing documents"
      additional_penalties:
        - "Officer/director bars"
        - "Disgorgement of profits"
        - "Deregistration of securities"
    notes: >
      SEC Cybersecurity Rules (2023) require disclosure of material cybersecurity
      incidents on Form 8-K within 4 business days of determining materiality.
      Annual disclosure of cybersecurity risk management, strategy, and governance
      is required on Form 10-K. This overlaps with SOX internal control requirements
      (Section 302/404) when incidents affect financial reporting integrity.

  - id: eu-ai-act
    framework_ref: eu-ai-act
    articles: "art. 62"
    authority_notification:
      required: true
      deadline: "Without undue delay; providers of high-risk AI must report serious incidents"
      authority: "Market surveillance authorities of the member state where the incident occurred"
      threshold: "Serious incident involving a high-risk AI system (death, serious damage to health, property, or environment; serious and irreversible disruption of critical infrastructure)"
      content_required:
        - "Description of the AI system and its intended purpose"
        - "Description of the serious incident"
        - "Information about the affected parties"
        - "Corrective actions taken"
    individual_notification:
      required: true
      condition: "Deployers must inform affected persons of the serious incident"
      deadline: "Without undue delay"
    penalties:
      prohibited_ai: "EUR 35,000,000 or 7% of total worldwide annual turnover"
      high_risk_obligations: "EUR 15,000,000 or 3% of total worldwide annual turnover"
      incorrect_information: "EUR 7,500,000 or 1% of total worldwide annual turnover"
      sme_reduction: "Lower of fixed amount or percentage applies to SMEs/startups"
    notes: >
      The EU AI Act's incident reporting focuses on serious incidents involving
      high-risk AI systems. It complements GDPR breach notification when AI
      processing involves personal data. Providers must also report any serious
      incident to their notified body if the system holds a conformity certificate.

  - id: swift-csp
    framework_ref: swift-csp
    articles: "Control 6.4 (Reporting)"
    authority_notification:
      required: true
      deadline: "Immediately upon discovery of compromise"
      authority: "SWIFT ISAC (Information Sharing and Analysis Centre)"
      threshold: "Actual or suspected compromise of SWIFT-related infrastructure"
      content_required:
        - "Nature and scope of the compromise"
        - "Affected systems and services"
        - "Indicators of compromise"
        - "Remediation actions"
    individual_notification:
      required: false
      condition: "Not directly required by SWIFT CSP; obligation flows to counterparties through SWIFT network"
      deadline: "N/A"
    penalties:
      max_fine: "No direct monetary fine; non-compliance results in security attestation failure"
      additional_penalties:
        - "Reporting of non-compliance to counterparties and supervisors"
        - "Potential disconnection from SWIFT network"
        - "Reputational impact via published attestation status"
    notes: >
      SWIFT CSP is contractual, not regulatory. Incident reporting is mandated
      to SWIFT ISAC for intelligence sharing. Failure to report or comply
      results in attestation failure visible to all counterparties. Local
      regulators may also require separate reporting under national frameworks.

  - id: fisma
    framework_ref: fisma
    articles: "44 USC sec. 3554, OMB M-24-04"
    authority_notification:
      required: true
      deadline: "Major incidents: 1 hour to CISA; 72 hours to Congress. All incidents: reported per agency-specific timelines"
      authority: "Cybersecurity and Infrastructure Security Agency (CISA), OMB, Congress (for major incidents)"
      threshold: "Any incident involving federal information systems; major incidents have additional congressional reporting"
      content_required:
        - "Incident description and classification"
        - "Affected systems and data"
        - "Impact assessment"
        - "Remediation timeline"
    individual_notification:
      required: true
      condition: "When PII of federal employees or citizens is compromised"
      deadline: "Without unreasonable delay"
    penalties:
      max_fine: "No direct monetary fine; consequences are administrative"
      additional_penalties:
        - "OMB budget and spending restrictions"
        - "GAO audit findings"
        - "Agency leadership accountability"
        - "Authorization to Operate (ATO) revocation"
    notes: >
      FISMA requires federal agencies to report to CISA. OMB Memorandum M-24-04
      updated incident response requirements in 2024, aligning with EO 14028.
      Major incidents require notification to Congress within 72 hours. CISA
      maintains the federal incident reporting portal (CyberScope/CISA Reporting).

  - id: pipl
    framework_ref: pipl
    articles: "art. 57"
    authority_notification:
      required: true
      deadline: "Promptly (no specific hour/day deadline defined in the statute)"
      authority: "Provincial-level cyberspace authority (Cyberspace Administration of China provincial branch)"
      threshold: "Any personal information breach (leakage, distortion, or loss of personal information)"
      content_required:
        - "Types and causes of the personal information breach"
        - "Categories of personal information and number of individuals affected"
        - "Possible impact and harm assessment"
        - "Remedial measures taken or to be taken"
        - "Contact information for inquiries"
    individual_notification:
      required: true
      condition: "Any personal information breach"
      deadline: "Promptly"
      exceptions:
        - >-
          If the personal information handler has taken measures that
          effectively avoid the harm caused by the breach, the handler
          may be exempted from notifying individuals; however, the
          authority may order notification if it deems the breach likely
          to cause harm
    penalties:
      max_fine: "CNY 50,000,000 or 5% of annual revenue of the preceding year"
      additional_penalties:
        - "Suspension or termination of services"
        - "Revocation of business license"
        - "Banning responsible persons from serving as directors, supervisors, or senior management"
        - "Personal fines of CNY 100,000-1,000,000 for directly responsible persons"
    notes: >
      PIPL Art. 57 requires handlers to take immediate remedial measures and notify
      the authority and individuals. The Cyberspace Administration of China (CAC)
      may issue further specific rules on notification timelines. Cross-border data
      transfers add complexity, as handlers must also comply with CAC security
      assessments under art. 38-43.

  - id: dpdp-india
    framework_ref: dpdp-india
    articles: "sec. 8(6)"
    authority_notification:
      required: true
      deadline: "Without unreasonable delay"
      authority: "Data Protection Board of India (DPBI)"
      threshold: "Any personal data breach"
      content_required:
        - "Nature of the personal data breach"
        - "Measures taken to remedy the breach"
        - "Other prescribed particulars (to be specified by rules)"
    individual_notification:
      required: true
      condition: "Any personal data breach"
      deadline: "Without unreasonable delay"
    penalties:
      max_fine: "INR 250 crore (approx. USD 30M) for failure to take reasonable security safeguards (Schedule: item 2)"
      additional_penalties:
        - "INR 200 crore for failure to notify the Board and affected data principals"
        - "INR 150 crore for failure to fulfill additional obligations in respect of children"
        - "INR 50 crore for breach of other provisions"
    notes: >
      The DPDP Act 2023 was enacted in August 2023 but implementation rules are
      still being finalized. The Data Protection Board of India has not yet been
      constituted as of early 2025. Specific notification formats and detailed
      timelines are expected to be defined in the rules. The Act applies to
      processing of digital personal data within India and to processing outside
      India if related to offering goods/services to data principals in India.

  - id: pdpa-singapore
    framework_ref: pdpa-singapore
    articles: "Part 6A (sec. 26A-26E)"
    authority_notification:
      required: true
      deadline: "3 calendar days after determining the breach is notifiable"
      authority: "Personal Data Protection Commission (PDPC)"
      threshold: "Significant harm to affected individuals, or >=500 affected individuals"
      content_required:
        - "Circumstances of the data breach"
        - "Types of personal data involved"
        - "Number of affected individuals (known or estimated)"
        - "Actions taken or to be taken to eliminate or mitigate any harm"
        - "Contact details of the data protection officer or representative"
    individual_notification:
      required: true
      condition: "Breach is likely to result in significant harm to the affected individuals"
      deadline: "As soon as practicable after notifying PDPC"
      exceptions:
        - "PDPC may grant an exemption from individual notification if it is not in the public interest or if technological measures render the data unreadable"
    penalties:
      max_fine: "SGD 1,000,000 or 10% of annual turnover in Singapore (whichever is higher; turnover-based penalty applies to organizations with annual turnover exceeding SGD 10M)"
      additional_penalties:
        - "Directions to stop collecting, using, or disclosing personal data"
        - "Directions to destroy personal data"
        - "Publication of the decision"
    notes: >
      Singapore amended PDPA in 2020 to introduce mandatory breach notification
      (effective February 2021). The 30-day assessment window requires organizations
      to determine if a breach is notifiable within 30 calendar days of becoming
      aware. If notifiable, the 3-day notification clock to PDPC starts. The
      turnover-based penalty was introduced in the 2020 amendments, significantly
      increasing enforcement power.

  - id: appi
    framework_ref: appi
    articles: "art. 26 (as amended 2022)"
    authority_notification:
      required: true
      deadline: "Preliminary report: within 3-5 business days of becoming aware; full report: within 30 days (60 days for unauthorized purpose or third-party involvement)"
      authority: "Personal Information Protection Commission (PPC)"
      threshold: "Leakage involving sensitive personal information, data of >=1,000 persons, unauthorized purpose by a third party, or potential significant harm"
      content_required:
        - "Overview of the situation"
        - "Type and volume of personal information involved"
        - "Cause of the incident"
        - "Presence or absence of secondary damage"
        - "Status of notification to affected individuals"
        - "Measures taken to prevent recurrence"
    individual_notification:
      required: true
      condition: "Same threshold as authority notification"
      deadline: "Promptly (in principle, at the time of the preliminary report)"
      exceptions:
        - "Where individual notification is difficult (e.g., unknown contact details), a substitute measure such as public announcement may be used"
    penalties:
      max_fine: "JPY 100,000,000 for corporations (enhanced in 2022 amendment); JPY 1,000,000 for individuals"
      criminal_penalties: "Up to 1 year imprisonment or JPY 500,000 fine for providing personal information databases for illicit profit"
    notes: >
      The 2022 amendments to APPI significantly strengthened breach notification
      requirements, making them mandatory rather than voluntary. The two-stage
      reporting system (preliminary within 3-5 days, full within 30 days)
      provides a structured approach. PPC has been actively issuing guidance
      and conducting enforcement. Organizations handling personal information
      of over 5,000 individuals in any 6-month period are subject to full APPI
      obligations.

  - id: pipa-korea
    framework_ref: pipa-korea
    articles: "art. 34, art. 34-2"
    authority_notification:
      required: true
      deadline: "72 hours from discovery of the breach to PIPC; without delay to individuals"
      authority: "Personal Information Protection Commission (PIPC)"
      threshold: "Any leakage of personal information"
      content_required:
        - "Types of personal information leaked"
        - "Time and circumstances of the leakage"
        - "Measures the data subject can take to minimize potential damage"
        - "Response measures and complaint procedures of the personal information processor"
        - "Contact information for the department handling the matter"
    individual_notification:
      required: true
      condition: "Any leakage of personal information"
      deadline: "Without delay; written notice within 72 hours"
      additional_requirements:
        - "If >=1,000 data subjects affected: must also notify PIPC and post on the organization's website for at least 7 days"
    penalties:
      max_fine: "Up to 3% of related revenue (introduced in 2023 amendment); additionally, administrative fines up to KRW 500,000,000"
      additional_penalties:
        - "Corrective orders"
        - "Suspension of personal information processing"
        - "Public disclosure of violations"
    notes: >
      South Korea's PIPA was significantly strengthened in the 2023 amendment,
      introducing revenue-based fines (up to 3% of related revenue) similar to
      GDPR. PIPC was elevated to an independent ministry-level commission in 2020.
      Korea also has sector-specific notification requirements under the Information
      and Communications Network Act (ICNA) and Credit Information Act.

  - id: kvkk
    framework_ref: kvkk
    articles: "art. 12(5)"
    authority_notification:
      required: true
      deadline: "72 hours from becoming aware of the breach"
      authority: "Kisisel Verileri Koruma Kurumu (KVKK Board / Personal Data Protection Authority)"
      threshold: "Any breach of personal data security"
      content_required:
        - "Nature of the breach"
        - "Types of personal data affected"
        - "Number of data subjects affected"
        - "Possible consequences of the breach"
        - "Measures taken or proposed to mitigate adverse effects"
    individual_notification:
      required: true
      condition: "When the breach is likely to result in adverse effects for data subjects"
      deadline: "As soon as possible after notification to the KVKK Board"
    penalties:
      max_fine: "TRY 1,966,862 per violation (annually adjusted for inflation; 2024 amounts)"
      additional_penalties:
        - "Administrative fines ranging from TRY 49,172 to TRY 1,966,862 depending on the violation type"
        - "Criminal penalties under Turkish Penal Code art. 135-140 for unlawful recording, obtaining, or disclosure of personal data"
    notes: >
      KVKK's breach notification requirements were formalized in Board Decision
      2019/10. The 72-hour deadline mirrors GDPR. Turkey's penalty amounts are
      updated annually per the Revaluation Rate. Criminal penalties under the
      Turkish Penal Code (art. 135-140) can result in 1-4.5 years imprisonment
      for unlawful processing. Turkey is not an EU member state but KVKK is
      modeled closely on GDPR.

  - id: pipeda
    framework_ref: pipeda
    articles: "sec. 10.1 (Breach of Security Safeguards provisions, as amended by DCIA)"
    authority_notification:
      required: true
      deadline: "As soon as feasible after determining that the breach has occurred"
      authority: "Office of the Privacy Commissioner of Canada (OPC)"
      threshold: "Real risk of significant harm (RROSH) to an individual"
      content_required:
        - "Description of the circumstances of the breach"
        - "Date or period of the breach"
        - "Description of the personal information involved"
        - "Assessment of the risk of harm to affected individuals"
        - "Steps taken to reduce the risk of harm"
    individual_notification:
      required: true
      condition: "Real risk of significant harm to the individual"
      deadline: "As soon as feasible after determining the breach has occurred"
      content_required:
        - "Description of the breach and the personal information involved"
        - "Steps taken to reduce the risk"
        - "Steps the individual can take to reduce the risk of harm"
        - "Contact information for the organization"
      additional_requirements:
        - "Must notify any third-party organization that may be able to mitigate harm"
    penalties:
      max_fine: "CAD 100,000 per violation for failure to report/notify/keep records"
      additional_penalties:
        - "OPC findings and recommendations (non-binding but publicly reported)"
        - "Federal Court applications for compliance orders"
        - "Right to take matters to Federal Court after OPC finding"
    notes: >
      PIPEDA's breach notification provisions were enacted through the Digital
      Privacy Act (2015, in force November 2018). The RROSH threshold considers
      sensitivity of the information and probability of misuse. Organizations
      must also maintain records of all breaches (regardless of whether reported)
      for 24 months. Bill C-27 (proposed Consumer Privacy Protection Act) may
      replace PIPEDA with significantly higher penalties if enacted.

  - id: popia
    framework_ref: popia
    articles: "sec. 22"
    authority_notification:
      required: true
      deadline: "As soon as reasonably possible after discovery of the compromise"
      authority: "Information Regulator of South Africa"
      threshold: "Reasonable grounds to believe that personal information has been accessed or acquired by any unauthorized person"
      content_required:
        - "Description of the possible consequences of the security compromise"
        - "Description of the measures taken or to be taken to address the compromise"
        - "Recommendation regarding steps the data subject should take to mitigate adverse effects"
        - "Identity of the unauthorized person who may have accessed the personal information (if known)"
    individual_notification:
      required: true
      condition: "Reasonable grounds to believe personal information has been compromised"
      deadline: "As soon as reasonably possible; Information Regulator may direct the responsible party to publicize the compromise"
      exceptions:
        - "Information Regulator may exempt from individual notification if the responsible party has taken sufficient steps to render the data unintelligible"
    penalties:
      max_fine: "ZAR 10,000,000 (approx. USD 550,000)"
      criminal_penalties: "Up to 10 years imprisonment for offenses under sec. 100-106 (e.g., obstruction of Information Regulator, unlawful disclosure)"
      additional_penalties:
        - "Administrative fines"
        - "Enforcement notices"
        - "Infringement notices"
        - "Civil actions for damages by data subjects"
    notes: >
      POPIA came into full force on 1 July 2021 with a one-year grace period
      ending 1 July 2022. The Information Regulator has been actively issuing
      guidance and enforcement notices. POPIA's criminal penalties are notably
      severe compared to many data protection laws. South Africa's regulatory
      approach combines data protection with the Promotion of Access to
      Information Act (PAIA) under the same Information Regulator.

  - id: pdpa-thailand
    framework_ref: pdpa-thailand
    articles: "sec. 37(4)"
    authority_notification:
      required: true
      deadline: "72 hours from becoming aware of the breach"
      authority: "Personal Data Protection Committee (PDPC) / Office of the PDPC"
      threshold: "Any breach likely to result in a risk to the rights and freedoms of individuals"
      content_required:
        - "Nature of the personal data breach"
        - "Contact details of the data protection officer or responsible person"
        - "Likely consequences of the breach"
        - "Measures taken or proposed to address the breach"
    individual_notification:
      required: true
      condition: "Breach likely to result in a high risk to the rights and freedoms of individuals"
      deadline: "Without delay"
    penalties:
      max_fine: "THB 5,000,000 administrative fine; THB 5,000,000 criminal fine (separate)"
      criminal_penalties: "Up to 1 year imprisonment and/or THB 1,000,000 fine for certain offenses; enhanced penalties for use of personal data causing damage"
      additional_penalties:
        - "Punitive damages up to 2x actual damages awarded by the court"
        - "Corrective orders from the Expert Committee"
        - "Publication of the infringement"
    notes: >
      Thailand's PDPA came into full effect on 1 June 2022 after multiple
      postponements. The 72-hour notification deadline mirrors GDPR. Thailand's
      PDPC has been issuing subordinate legislation including notification
      rules. The PDPA provides for both administrative fines (Expert Committee)
      and criminal penalties (courts), which can be imposed concurrently.
      Class actions are available through the Thai Class Action Procedure Act.

  - id: fda-21-cfr-11
    framework_ref: fda-21-cfr-11
    articles: "21 CFR Part 11; 21 CFR 211.180, 211.192"
    authority_notification:
      required: true
      deadline: "Not a breach notification regulation per se; system failures must be documented and reported through FDA's established channels (Field Alert Reports within 3 days for drug products)"
      authority: "U.S. Food and Drug Administration (FDA)"
      threshold: "System failures affecting the integrity, reliability, or authenticity of electronic records required under predicate rules; deviations from GxP requirements"
      content_required:
        - "Description of the system failure or deviation"
        - "Impact assessment on electronic records and electronic signatures"
        - "Investigation results"
        - "Corrective and preventive actions (CAPA)"
    individual_notification:
      required: false
      condition: "Not applicable; 21 CFR Part 11 pertains to electronic records and signatures, not personal data breach notification"
      deadline: "N/A"
    penalties:
      max_fine: "FDA enforcement via Warning Letters, consent decrees, and injunctions; no specific monetary penalty schedule in Part 11 itself"
      additional_penalties:
        - "Warning Letters"
        - "Import alerts"
        - "Consent decrees"
        - "Seizure of products"
        - "Injunctions"
        - "Debarment of individuals"
        - "Criminal prosecution under 18 USC 1001 for false statements"
    notes: >
      21 CFR Part 11 is not a breach notification regulation. It establishes
      criteria for electronic records and electronic signatures to be considered
      trustworthy and equivalent to paper records. However, organizations must
      report system failures that compromise the integrity of regulated electronic
      records. FDA enforces through inspections (Form 483 observations) and
      Warning Letters. Failure to maintain compliant electronic records can
      result in regulatory actions against marketed products.

  - id: eu-mdr
    framework_ref: eu-mdr
    articles: "art. 87-92 (Vigilance)"
    authority_notification:
      required: true
      deadline: "15 days for serious public health threats; 10 days for death or serious deterioration in health; 2 days for imminent risk requiring urgent field safety corrective action"
      authority: "Competent authority of the member state where the incident occurred; report also submitted via EUDAMED"
      threshold: "Serious incident involving a medical device made available on the EU market (defined in art. 2(65): death, serious deterioration of health, serious public health threat)"
      content_required:
        - "Device identification (UDI, model, manufacturer)"
        - "Description of the serious incident"
        - "Immediate corrective actions taken"
        - "Results of the manufacturer's investigation (in subsequent reports)"
        - "Field Safety Corrective Actions (FSCA) if applicable"
    individual_notification:
      required: true
      condition: "When a Field Safety Corrective Action (FSCA) is implemented, a Field Safety Notice (FSN) must be issued to users, operators, and patients as applicable"
      deadline: "Immediately upon determining FSCA is necessary"
    penalties:
      max_fine: "Determined by member state national law; must be effective, proportionate, and dissuasive (art. 113)"
      additional_penalties:
        - "Suspension or withdrawal of CE marking"
        - "Market recall of non-compliant devices"
        - "Prohibition of placing on the market"
        - "Restrictions on making devices available"
        - "Criminal penalties per member state law"
    notes: >
      EU MDR is a device safety/vigilance regulation, not a data breach notification
      framework. The reporting requirements concern serious incidents involving medical
      devices, not personal data breaches. However, devices processing personal data
      must also comply with GDPR. EUDAMED (European Database on Medical Devices) is
      the central reporting platform. Manufacturers must submit periodic safety update
      reports (PSUR) and trend reports. The vigilance system is complemented by market
      surveillance activities of member state competent authorities.

comparison_summary:
  fastest_deadline: "DORA (4 hours for initial notification after classification)"
  most_comprehensive: "DORA and NIS 2 (three-phase reporting with initial, intermediate, and final reports)"
  highest_penalties: "PIPL (CNY 50M or 5% annual revenue) and NIS 2/GDPR (EUR 10M or 2% global turnover)"
  unique_features:
    dora: "Three-phase reporting structure; classification criteria defined in RTS"
    nis2: "Dual-track penalties for essential vs. important entities"
    hipaa: "Tiered penalty structure based on level of culpability; criminal penalties"
    ccpa_cpra: "Private right of action for data breaches"
    pci_dss: "Contractual enforcement through card brands, not regulatory"
    sox: "Material cybersecurity incident disclosure via SEC Form 8-K"
    pipl: "Provincial cyberspace authority reporting; potential 5% revenue-based penalty"
    dpdp_india: "Pending full implementation; high fixed penalties (INR 250 crore)"
    pdpa_singapore: "30-day assessment window before 3-day notification clock starts"
    appi: "Two-stage reporting (preliminary 3-5 days, full 30 days)"
    pipa_korea: "Revenue-based fines up to 3% introduced in 2023 amendment"
    kvkk: "GDPR-modeled 72-hour deadline; criminal penalties under Turkish Penal Code"
    pipeda: "Real risk of significant harm (RROSH) threshold"
    popia: "Criminal penalties up to 10 years imprisonment; combined with PAIA"
    pdpa_thailand: "Concurrent administrative and criminal penalties"
    fda_21_cfr_11: "Electronic records integrity reporting, not personal data breach notification"
    eu_mdr: "Device vigilance reporting via EUDAMED, not data breach notification"
