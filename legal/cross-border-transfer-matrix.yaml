id: cross-border-transfer-matrix
title: "Cross-Framework Cross-Border Data Transfer Rules"
last_updated: "2026-04-03"
description: >
  Comparative matrix of cross-border data transfer requirements across
  all applicable frameworks. Covers general transfer rules, adequacy
  mechanisms, contractual safeguards, exceptions, and data localization
  requirements.

frameworks:
  - id: gdpr
    framework_ref: gdpr
    articles: "art. 44-49, Chapter V"
    general_rule: >
      Transfer of personal data to a third country or international organization
      may only take place if the controller/processor complies with the conditions
      laid down in Chapter V. No level of personal data protection guaranteed
      within the EU may be undermined.
    adequacy_mechanism:
      type: "Adequacy decision by European Commission (art. 45)"
      description: >
        The Commission assesses the level of data protection in the third country
        and may determine that it ensures an adequate level of protection.
      current_adequate_countries:
        - "Andorra"
        - "Argentina"
        - "Canada (commercial organizations under PIPEDA)"
        - "Faroe Islands"
        - "Guernsey"
        - "Isle of Man"
        - "Israel"
        - "Japan"
        - "Jersey"
        - "New Zealand"
        - "Republic of Korea"
        - "Switzerland"
        - "United Kingdom"
        - "Uruguay"
        - "United States (EU-US Data Privacy Framework, 2023)"
    contractual_mechanisms:
      - type: "Standard Contractual Clauses (SCCs)"
        description: "Commission-approved model clauses adopted by Decision (EU) 2021/914"
        requirements:
          - "Must include supplementary measures if needed (per Schrems II CJEU ruling)"
          - "Transfer Impact Assessment (TIA) required"
      - type: "Binding Corporate Rules (BCRs)"
        description: "Internal rules adopted by a group of undertakings for intra-group transfers"
        requirements:
          - "Approved by lead supervisory authority through consistency mechanism"
          - "Must include all GDPR principles and enforceable data subject rights"
      - type: "Codes of Conduct (art. 40)"
        description: "Sector-specific codes with binding commitments by the data importer"
      - type: "Certification mechanisms (art. 42)"
        description: "Approved certification schemes with binding commitments"
    exceptions:
      - "Explicit consent of data subject (after being informed of risks)"
      - "Necessary for performance of a contract"
      - "Important reasons of public interest"
      - "Establishment, exercise, or defense of legal claims"
      - "Vital interests of the data subject"
      - "Transfer from a public register"
      - "Compelling legitimate interests (very limited, art. 49(1) second subparagraph)"
    data_localization_requirements:
      required: false
      details: >
        GDPR does not mandate data localization within the EU. Data may be
        transferred to third countries if adequate safeguards are in place.
        However, certain member states may impose sector-specific localization
        requirements (e.g., health data in some jurisdictions).
    notes: >
      The Schrems II ruling (C-311/18, 2020) invalidated the Privacy Shield
      framework and required supplementary measures for SCCs. The EU-US Data
      Privacy Framework (adopted 10 July 2023) replaced Privacy Shield. DPAs
      may suspend transfers if safeguards are not effective. The EDPB has
      published recommendations on supplementary measures (01/2020).

  - id: lgpd
    framework_ref: lgpd
    articles: "art. 33, art. 34, art. 35, art. 36"
    general_rule: >
      International transfer of personal data is permitted only under the
      conditions enumerated in art. 33. The ANPD has authority to define
      additional requirements and restrict transfers.
    adequacy_mechanism:
      type: "Adequacy decision by ANPD (art. 33, I)"
      description: >
        ANPD evaluates whether the receiving country or international
        organization provides an adequate level of data protection.
      current_adequate_countries: "ANPD has not yet issued any adequacy decisions as of April 2026"
      pending: "ANPD regulatory agenda includes adequacy assessment methodology"
    contractual_mechanisms:
      - type: "Standard contractual clauses (clausulas-padrao contratuais)"
        description: "Clauses defined by ANPD for international transfers"
        status: "ANPD approved standard contractual clauses via Resolucao CD/ANPD n. 19/2024"
      - type: "Binding corporate rules (normas corporativas globais)"
        description: "Internal corporate rules for intra-group international transfers"
        status: "ANPD regulatory framework pending detailed requirements"
      - type: "Specific contractual clauses"
        description: "Controller-specific clauses subject to ANPD review"
      - type: "Codes of conduct and certifications"
        description: "Sector-specific codes approved by ANPD"
    exceptions:
      - "Specific consent from the data subject (informed, prominent, and specific to the transfer)"
      - "Compliance with international legal cooperation obligations"
      - "Necessary for international judicial cooperation"
      - "Necessary to protect life or physical safety of the data subject or third party"
      - "ANPD authorization"
      - "Transfer resulting from international cooperation agreement"
      - "Necessary for the execution of a public policy"
      - "Consent: when specifically and prominently consented to by the data subject"
    data_localization_requirements:
      required: false
      details: >
        LGPD does not impose general data localization requirements. However,
        specific sectors (e.g., healthcare under ANVISA regulations, financial
        sector under Bacen rules) may impose additional localization constraints.
    notes: >
      LGPD's international transfer regime is still maturing. ANPD has published
      standard contractual clauses (2024) but has not issued adequacy decisions.
      The practical landscape requires organizations to rely primarily on consent,
      SCCs, or contractual mechanisms. Art. 35 allows ANPD to request transfer
      impact assessments.

  - id: ccpa-cpra
    framework_ref: ccpa-cpra
    articles: "Cal. Civ. Code sec. 1798.100, sec. 1798.140(ah), sec. 1798.185(a)(15)(C)"
    general_rule: >
      CCPA/CPRA does not generally restrict cross-border data transfers.
      However, CPRA requires that contracts with service providers, contractors,
      and third parties include obligations to provide the same level of privacy
      protection as required under the act, regardless of where data is processed.
    adequacy_mechanism:
      type: "None"
      description: >
        CCPA/CPRA does not use an adequacy decision model. The obligation
        travels with the data through contractual requirements.
    contractual_mechanisms:
      - type: "Service provider/contractor agreements"
        description: "Must include specific CPRA-mandated privacy protection clauses"
        requirements:
          - "Prohibition on selling or sharing personal information"
          - "Same level of privacy protection as CPRA"
          - "Right for business to take reasonable steps to ensure compliance"
          - "Obligation to notify business if contractor can no longer meet obligations"
      - type: "Third-party contracts"
        description: "Must specify the limited and specific purpose for processing"
    exceptions:
      - "Consumer consent"
      - "Necessary to provide goods or services requested"
      - "N/A (CCPA/CPRA does not broadly restrict transfers)"
    data_localization_requirements:
      required: false
      details: "No data localization requirements under CCPA/CPRA"
    notes: >
      Unlike GDPR and LGPD, CCPA/CPRA takes a contractual approach rather
      than a geographic restriction approach. The obligation follows the data
      through agreements, not through destination country assessments. The
      CPPA's rulemaking process may introduce additional transfer requirements
      in the future.

  - id: apra-cps-234
    framework_ref: apra-cps-234
    articles: "para. 22-26 (third-party information security), CPS 231 (Outsourcing)"
    general_rule: >
      APRA-regulated entities must ensure that information security is maintained
      when information assets are managed by third parties, including those
      located offshore. CPS 231 (Outsourcing) governs the offshoring of material
      business activities.
    adequacy_mechanism:
      type: "No formal adequacy mechanism"
      description: >
        APRA does not maintain a list of adequate countries. The onus is on
        the regulated entity to assess and manage third-party risk.
    contractual_mechanisms:
      - type: "Outsourcing agreements under CPS 231"
        description: "Must include information security obligations equivalent to CPS 234 requirements"
        requirements:
          - "Ability to manage information security risks related to outsourced activities"
          - "APRA access to audit, inspect, or obtain information from the service provider"
          - "Business continuity and disaster recovery provisions"
          - "Data security and confidentiality clauses"
      - type: "Third-party information security capability assessment"
        description: "Entity must evaluate third-party information security capability commensurate with consequences of a breach"
    exceptions:
      - "Intra-group transfers subject to group-level information security framework"
    data_localization_requirements:
      required: false
      details: >
        No blanket data localization requirement. However, APRA requires
        notification before offshoring material activities (CPS 231).
        APRA retains the right to direct entities to not proceed with or
        to reverse offshoring arrangements if risks are unacceptable.
      apra_notification: "Required before offshoring material business activities; 20 business days notice"
    notes: >
      APRA's approach is risk-based, not geographic. CPS 234 para. 22-26
      require that third-party arrangements include appropriate information
      security obligations. The 2025 CPS 230 (Operational Risk Management)
      further strengthens third-party risk requirements. APRA may also
      direct entities to take specific actions regarding offshore data storage.

  - id: bacen-4893
    framework_ref: bacen-4893
    articles: "art. 11-16"
    general_rule: >
      Data processing and cloud computing services contracted by financial
      institutions may be performed abroad, subject to BCB requirements.
      Prior communication to BCB is mandatory for cloud computing services
      provided abroad.
    adequacy_mechanism:
      type: "No formal adequacy mechanism"
      description: >
        BCB does not maintain adequacy decisions. Institutions must ensure
        compliance with BCB access requirements regardless of location.
    contractual_mechanisms:
      - type: "Cloud computing service agreements"
        description: "Must include specific BCB-mandated provisions"
        requirements:
          - "Indication of countries and regions where data may be processed or stored"
          - "BCB direct access to data and information"
          - "Confidentiality, integrity, and availability commitments"
          - "Incident notification obligations"
          - "Exit strategy and data portability provisions"
      - type: "Subcontracting provisions"
        description: "Institution must be aware of and approve any subcontracting by the service provider"
    exceptions:
      - "BCB may determine that specific services or data cannot be processed abroad"
    data_localization_requirements:
      required: partial
      details: >
        No blanket localization requirement, but BCB reserves the right to
        restrict offshoring of specific services. BCB must maintain direct
        access to all data regardless of location. Institutions must ensure
        that foreign data processing does not impede BCB supervisory access.
      bcb_access: "BCB must have unrestricted access to data and information processed abroad"
      prior_notification: "Required for cloud computing services provided outside Brazil"
    notes: >
      Bacen 4893 (formerly 4658/2018 for cloud) requires that financial
      institutions communicate to BCB the contracting of relevant data
      processing and cloud computing services abroad. The institution
      remains fully responsible regardless of where data is processed.
      Art. 16 establishes that BCB may restrict or condition the use of
      specific services or data processing outside the country.

  - id: marco-civil
    framework_ref: marco-civil
    articles: "art. 11, art. 12"
    general_rule: >
      Any operation of collection, storage, retention, or processing of personal
      data or communications by internet connection or application providers
      where at least one of the terminals is in Brazil is subject to Brazilian
      law. Foreign companies providing services to users in Brazil must comply.
    adequacy_mechanism:
      type: "None"
      description: "Marco Civil does not use an adequacy decision model"
    contractual_mechanisms:
      - type: "Not specified"
        description: "Marco Civil focuses on jurisdictional reach, not transfer mechanisms"
    exceptions:
      - "N/A (Marco Civil asserts jurisdictional reach rather than restricting transfers)"
    data_localization_requirements:
      required: false
      details: >
        The original Marco Civil bill (PLC 21/2014) included data localization
        requirements but these were removed from the final law. However, art. 11
        establishes that Brazilian law applies to data collected or processed
        when at least one terminal is in Brazil, regardless of where the data
        is stored.
      jurisdictional_reach: "Brazilian law applies extraterritorially when data collection involves terminals in Brazil"
    notes: >
      Marco Civil does not restrict cross-border transfers but asserts broad
      jurisdictional reach. Decreto 8.771/2016 (regulation) provides additional
      guidance on data retention and security. For personal data transfer
      restrictions, LGPD (art. 33-36) is the primary governing law.

  - id: gdpr-schrems-ii-impact
    framework_ref: gdpr
    type: "supplementary_analysis"
    title: "Schrems II Ruling Impact on Transfer Mechanisms"
    description: >
      The CJEU Schrems II ruling (C-311/18, July 2020) established additional
      requirements for cross-border data transfers that materially affect all
      GDPR transfer mechanisms.
    key_requirements:
      transfer_impact_assessment:
        description: "Data exporters must assess the laws of the destination country to determine if the transfer mechanism can be complied with in practice"
        factors:
          - "Laws permitting public authority access to transferred data"
          - "Existence of effective legal remedies for data subjects"
          - "Practical effectiveness of contractual safeguards"
      supplementary_measures:
        technical:
          - "End-to-end encryption where decryption keys are exclusively controlled by EEA-based data exporter"
          - "Pseudonymization with additional data held exclusively in the EEA"
          - "Split or multi-party processing"
        organizational:
          - "Internal policies for governance of transfers"
          - "Transparency and accountability measures"
          - "Documentation of assessments"
        contractual:
          - "Enhanced obligations on data importer to notify of government access requests"
          - "Obligation to challenge disproportionate government access orders"
          - "Transparency reporting on government access requests received"

  - id: pipl
    framework_ref: pipl
    articles: "art. 38, art. 39, art. 40"
    general_rule: >
      Transfer of personal information outside the People's Republic of China
      requires compliance with one of the prescribed mechanisms. Critical
      information infrastructure operators (CIIOs) and processors handling
      large volumes must pass a security assessment by the Cyberspace
      Administration of China (CAC).
    adequacy_mechanism:
      type: "CAC security assessment (art. 40)"
      description: >
        CIIOs and processors whose processing volume reaches thresholds set by
        the CAC must pass a security assessment organized by the CAC before
        transferring personal information abroad. The assessment evaluates
        legality, legitimacy, necessity, impact on individual rights, and
        the legal environment of the recipient country.
      mandatory_for:
        - "Critical information infrastructure operators"
        - "Processors handling personal information of 1 million+ individuals"
        - "Processors that have transferred personal information of 100,000+ individuals or sensitive personal information of 10,000+ individuals abroad since January 1 of the previous year"
    contractual_mechanisms:
      - type: "Standard Contract for Cross-Border Transfer (SCC)"
        description: "Standard contract published by the CAC for processors below the security assessment threshold"
        requirements:
          - "Must be filed with the provincial-level CAC within 10 working days of effectiveness"
          - "Must include personal information protection impact assessment"
      - type: "Personal Information Protection Certification"
        description: "Certification by a recognized institution per CAC-approved rules"
        requirements:
          - "Certification body must be recognized by the CAC"
          - "Must comply with certification specification (TC260-PG-20222A)"
    exceptions:
      - "Necessary for cross-border HR management under collectively negotiated labor contracts"
      - "Necessary to protect vital interests of an individual"
      - "Other circumstances prescribed by law or regulation"
    data_localization_requirements:
      required: partial
      details: >
        CIIOs must store personal information collected or generated in China
        domestically (art. 40). Transfer abroad is only permitted after passing
        a CAC security assessment. State organs that process personal information
        must also store data domestically.
      ciio_localization: "Mandatory domestic storage for CIIOs; cross-border transfer only after CAC security assessment"
      government_data: "Personal information processed by state organs generally cannot be transferred outside China"
    notes: >
      PIPL creates one of the most complex cross-border transfer regimes globally
      with three distinct pathways (security assessment, SCC, certification) and
      mandatory data localization for CIIOs. The CAC has issued implementing
      measures including Measures for Security Assessment of Outbound Data Transfers
      (2022) and Measures for Standard Contract for Outbound Transfer of Personal
      Information (2023). Enforcement has been active, particularly regarding
      large-scale data transfers.

  - id: dpdp-india
    framework_ref: dpdp-india
    articles: "sec. 16"
    general_rule: >
      The Central Government may restrict transfer of personal data to countries
      or territories outside India by notification. Unless a country is explicitly
      restricted (blacklisted), transfer is permitted. This is a blacklist model
      rather than an adequacy or whitelist model.
    adequacy_mechanism:
      type: "None (blacklist model)"
      description: >
        DPDP Act does not use an adequacy decision mechanism. Instead, the
        Central Government may notify countries to which personal data transfer
        is restricted. All transfers are permitted unless the destination country
        is specifically blacklisted.
      current_restricted_countries: "No countries restricted as of April 2026; rules pending finalization"
    contractual_mechanisms:
      - type: "Not prescribed"
        description: >
          DPDP Act does not mandate specific contractual mechanisms (no SCC,
          BCR, or equivalent). The obligation is geographic (no transfer to
          blacklisted countries) rather than contractual.
    exceptions:
      - "Transfer to non-restricted countries is freely permitted"
      - "Government may prescribe additional conditions through rules"
    data_localization_requirements:
      required: false
      details: >
        DPDP Act does not impose general data localization requirements. The
        prior draft Data Protection Bill 2019 included localization for critical
        personal data, but this was removed from the final 2023 Act. Sector-specific
        localization requirements (e.g., RBI data localization for payment data)
        continue to apply independently.
      sector_specific:
        - "RBI: payment system data must be stored in India (2018 circular)"
        - "IRDAI: insurance data processing may have domestic requirements"
    notes: >
      India's blacklist approach is unique among major privacy frameworks.
      It represents the simplest cross-border transfer regime among analyzed
      frameworks. However, sector-specific regulators (particularly RBI for
      financial data) impose their own localization and transfer restrictions.
      The Central Government's notification powers are broad and could
      significantly change the transfer landscape once exercised.

  - id: appi
    framework_ref: appi
    articles: "art. 28, art. 28-2"
    general_rule: >
      Prior consent of the individual is required for provision of personal
      data to a third party in a foreign country, unless the recipient country
      is recognized by the PPC as having equivalent protection or the recipient
      has established a system conforming to APPI standards.
    adequacy_mechanism:
      type: "PPC-recognized countries (art. 28)"
      description: >
        The PPC may recognize countries or regions that have established
        a personal information protection system equivalent to Japan's.
        Transfer to recognized countries follows the same rules as domestic
        third-party provision (no additional foreign-transfer consent required).
      current_recognized_countries:
        - "EU/EEA (mutual adequacy arrangement since January 2019)"
        - "United Kingdom (recognized since April 2024)"
    contractual_mechanisms:
      - type: "Equivalent protection system at recipient (art. 28(1))"
        description: "Recipient must have established a system conforming to APPI standards for personal information protection"
        requirements:
          - "Appropriate and reasonable measures taken by the recipient in accordance with PPC rules"
          - "APEC CBPR certification accepted as equivalent"
      - type: "Individual consent with information provision"
        description: "Prior consent of the individual after being informed of the foreign country's protection system"
        requirements:
          - "Must provide information about the personal information protection system of the destination country"
          - "Must provide information about the measures taken by the recipient"
          - "Must provide information upon request regarding the measures taken to ensure continued protection"
    exceptions:
      - "Recipient country recognized by PPC as having equivalent protection"
      - "Recipient has system conforming to APPI standards"
      - "Exceptions under art. 27 (same as domestic third-party provision exceptions)"
    data_localization_requirements:
      required: false
      details: >
        APPI does not impose data localization requirements. However, the 2020
        amendments significantly strengthened cross-border transfer rules by
        requiring more detailed information provision to individuals regarding
        the destination country's protection regime.
    notes: >
      Japan's cross-border framework was significantly strengthened by the 2020
      APPI amendments (effective April 2022). The mutual adequacy arrangement
      with the EU (art. 28 + GDPR art. 45) facilitates EU-Japan data flows.
      The PPC publishes country-level assessments of foreign data protection
      systems. APEC CBPR certification is accepted as an appropriate safeguard.
      The information provision obligation regarding destination country laws
      is a unique transparency requirement among global privacy frameworks.

  - id: pipa-korea
    framework_ref: pipa-korea
    articles: "art. 39-14, art. 39-15"
    general_rule: >
      Cross-border transfer of personal information requires either the consent
      of the data subject (with specific information provision) or an adequate
      level of personal information protection as determined by the PIPC.
      A cross-border processing agreement is required.
    adequacy_mechanism:
      type: "PIPC adequacy decisions"
      description: >
        The PIPC may determine that a country or international organization
        ensures an adequate level of personal information protection. Transfer
        to adequate countries does not require individual consent for the
        transfer specifically.
      current_adequate_decisions:
        - "EU/EEA (mutual adequacy arrangement since March 2022)"
    contractual_mechanisms:
      - type: "Cross-border processing entrustment agreement (art. 39-14)"
        description: "Contract with the overseas recipient ensuring protection equivalent to PIPA"
        requirements:
          - "Personal information protection measures equivalent to PIPA"
          - "Individual rights and remedy mechanisms"
          - "Obligation to notify of any breach"
          - "Re-entrustment restrictions"
      - type: "Individual consent for cross-border transfer"
        description: "Separate consent from data subject with specific information"
        requirements:
          - "Items of personal information transferred"
          - "Country to which data is transferred and date/method of transfer"
          - "Name of the recipient"
          - "Purpose of use and retention period at the recipient"
          - "Right to refuse and consequences of refusal"
    exceptions:
      - "Consent of the data subject with prescribed information provision"
      - "PIPC adequacy decision"
      - "Processing entrustment agreement with prescribed safeguards"
      - "International treaty or convention"
    data_localization_requirements:
      required: false
      details: >
        PIPA does not impose general data localization requirements. However,
        the detailed consent and contractual requirements for cross-border
        transfer create significant practical barriers. Sector-specific
        regulators may impose additional requirements.
    notes: >
      Korea's mutual adequacy arrangement with the EU facilitates data flows
      between the two jurisdictions. The 2020 PIPA amendments modernized the
      cross-border transfer framework. The consent requirements for cross-border
      transfer are among the most detailed globally, requiring specific
      information about the recipient and purpose. PIPC has been actively
      enforcing cross-border transfer obligations.

  - id: kvkk
    framework_ref: kvkk
    articles: "art. 9"
    general_rule: >
      Personal data may not be transferred abroad without the explicit consent
      of the data subject, unless one of the processing conditions under art. 5(2)
      or art. 6(3) exists AND the recipient country has adequate protection or the
      data controller provides a binding commitment of adequate protection with
      Board approval.
    adequacy_mechanism:
      type: "Board adequacy decision (art. 9(2))"
      description: >
        The Personal Data Protection Board determines which countries have
        adequate levels of data protection. Transfer to adequate countries is
        permitted without explicit consent if another legal basis under art. 5(2)
        or art. 6(3) applies.
      current_adequate_countries: "Limited adequacy decisions issued to date; the Board has published a safe country list but it remains narrow"
      process: "Board evaluates reciprocity, sectoral data protection rules, international treaties, and enforcement mechanisms"
    contractual_mechanisms:
      - type: "Binding commitment with Board approval (art. 9(2)(b))"
        description: "Data controller in Turkey and data controller/processor abroad provide a written commitment of adequate protection, subject to Board authorization"
        requirements:
          - "Written commitment of adequate protection by both parties"
          - "Authorization from the Personal Data Protection Board"
          - "Must cover the specific transfer, not a blanket authorization"
    exceptions:
      - "Explicit consent of the data subject"
      - "Adequate country + legal basis under art. 5(2) or art. 6(3)"
      - "Binding commitment + Board approval + legal basis under art. 5(2) or art. 6(3)"
    data_localization_requirements:
      required: false
      details: >
        KVKK does not impose blanket data localization. However, the combination
        of limited adequacy decisions, Board approval requirements, and explicit
        consent as the default mechanism creates practical pressure to localize
        data in Turkey.
      practical_effect: "Limited adequacy decisions and Board approval requirements create de facto data localization pressure"
    notes: >
      Turkey's cross-border transfer regime is among the most restrictive in
      practice due to limited adequacy decisions and the requirement for Board
      approval of binding commitments. The process for obtaining Board approval
      can be lengthy and uncertain. Turkey does not have an EU adequacy decision,
      creating bilateral transfer challenges. The Board has issued guidance on
      cross-border transfer procedures and has taken enforcement actions against
      organizations transferring data without adequate mechanisms.

comparison_summary:
  most_restrictive:
    framework: "PIPL / KVKK"
    reason: "PIPL: mandatory CAC security assessment for large-scale transfers + data localization for CIIOs. KVKK: limited adequacy decisions + Board approval for binding commitments"
  least_restrictive:
    framework: "CCPA/CPRA / DPDP India"
    reason: "CCPA/CPRA: no geographic restrictions. DPDP India: blacklist model with no countries currently restricted"
  unique_approaches:
    gdpr: "Adequacy decisions + supplementary safeguards post-Schrems II"
    lgpd: "GDPR-inspired but framework still maturing; ANPD SCCs published 2024"
    ccpa_cpra: "Contractual approach, no geographic restrictions"
    apra_cps_234: "Risk-based assessment; APRA notification and potential direction"
    bacen_4893: "Prior notification to BCB; BCB access rights; potential restriction"
    marco_civil: "Jurisdictional reach model, not transfer restriction model"
    pipl: "Three-tier system (security assessment, SCC, certification) + mandatory localization for CIIOs"
    dpdp_india: "Blacklist model — all transfers permitted unless destination is explicitly restricted"
    appi: "Consent + information provision; PPC country recognition; APEC CBPR acceptance"
    pipa_korea: "Detailed consent requirements + PIPC adequacy decisions + cross-border processing agreements"
    kvkk: "Explicit consent as default; limited adequacy decisions; Board approval for binding commitments"
  data_localization:
    mandatory:
      - "PIPL: CIIOs and state organs must store personal information domestically"
    conditional:
      - "Bacen 4893: BCB may restrict specific services"
      - "APRA CPS 234: APRA may direct reversal of offshoring"
      - "KVKK: practical de facto localization pressure due to limited adequacy decisions"
    sector_specific:
      - "India RBI: payment system data must be stored domestically"
    none:
      - "GDPR, LGPD, CCPA/CPRA, Marco Civil, APPI, PIPA Korea, DPDP India (general)"
    jurisdictional_reach:
      - "Marco Civil: Brazilian law applies when terminal is in Brazil"
      - "GDPR: applies to processing of EU data subjects regardless of processor location"
      - "CCPA/CPRA: applies to businesses meeting California thresholds regardless of location"
      - "PIPL: applies to processing of personal information of individuals in China regardless of processor location"
