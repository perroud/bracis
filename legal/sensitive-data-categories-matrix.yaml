id: sensitive-data-categories-matrix
title: "Cross-Framework Sensitive Data Categories Comparison"
last_updated: "2026-04-06"
description: >
  Comparative matrix of sensitive personal data categories across privacy and
  data protection frameworks. Identifies which data types are classified as
  sensitive or special category, applicable articles, and special processing
  requirements for each jurisdiction.

frameworks:
  - id: gdpr
    framework_ref: gdpr
    articles: "art. 9, art. 10, Recitals 51-56"
    has_sensitive_category: true
    definition: >-
      GDPR defines special categories of personal data as data revealing racial
      or ethnic origin, political opinions, religious or philosophical beliefs,
      trade union membership, genetic data, biometric data for uniquely
      identifying a natural person, data concerning health, and data concerning
      a natural person's sex life or sexual orientation. Processing of such data
      is prohibited unless a specific exception under art. 9(2) applies. Criminal
      conviction data is addressed separately under art. 10.
    categories:
      health:
        classified_sensitive: true
        article: "art. 9(1)"
        special_requirements: >-
          Processing prohibited unless explicit consent, employment/social
          security law, vital interests, legitimate activities of certain bodies,
          manifestly public data, legal claims, substantial public interest,
          health or social care purposes, or public health purposes apply.
          Must implement appropriate safeguards per art. 9(2) and art. 9(3).
      biometric:
        classified_sensitive: true
        article: "art. 9(1), art. 4(14)"
        special_requirements: >-
          Biometric data processed for the purpose of uniquely identifying a
          natural person is classified as special category. Biometric data used
          for other purposes (e.g., security authentication without
          identification) may fall outside art. 9 scope. Same processing
          restrictions and exceptions as other special categories apply.
      genetic:
        classified_sensitive: true
        article: "art. 9(1), art. 4(13)"
        special_requirements: >-
          Genetic data is defined as personal data relating to inherited or
          acquired genetic characteristics which give unique information about
          the physiology or health of a natural person, resulting from analysis
          of a biological sample. Member states may introduce further conditions
          and limitations for genetic data processing under art. 9(4).
      racial_ethnic:
        classified_sensitive: true
        article: "art. 9(1)"
        special_requirements: >-
          Data revealing racial or ethnic origin is special category data.
          Processing is prohibited unless an art. 9(2) exception applies.
          Anti-discrimination laws in member states may impose additional
          restrictions on collection and use of racial or ethnic origin data.
      political_opinion:
        classified_sensitive: true
        article: "art. 9(1)"
        special_requirements: >-
          Data revealing political opinions is special category data. Processing
          requires an art. 9(2) exception. Political parties and organizations
          with a political purpose may process such data under the legitimate
          activities exception in art. 9(2)(d) with appropriate safeguards.
      religion:
        classified_sensitive: true
        article: "art. 9(1)"
        special_requirements: >-
          Data revealing religious or philosophical beliefs is special category
          data. Religious organizations may process members' data under
          art. 9(2)(d) legitimate activities exception, provided data is not
          disclosed outside the organization without consent.
      sexual_orientation:
        classified_sensitive: true
        article: "art. 9(1)"
        special_requirements: >-
          Data concerning a natural person's sex life or sexual orientation is
          special category data. Same art. 9(2) exceptions apply. Member states
          may impose additional protections given the highly intimate nature of
          this data category.
      trade_union:
        classified_sensitive: true
        article: "art. 9(1)"
        special_requirements: >-
          Trade union membership is special category data. Trade unions
          themselves may process member data under art. 9(2)(d) legitimate
          activities exception. Employers processing trade union membership data
          must rely on employment law exception under art. 9(2)(b).
      financial_credit:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Financial and credit data is not classified as special category data
          under GDPR art. 9. However, it is still personal data subject to
          general GDPR principles. Member states may impose additional
          protections through national legislation. Automated credit scoring
          decisions are subject to art. 22 restrictions on automated
          decision-making.
      location:
        classified_sensitive: false
        article: "N/A (Recital 30 references location data as personal data)"
        special_requirements: >-
          Location data is not special category data under GDPR. It is personal
          data subject to general processing principles. Precise location
          tracking may require a DPIA under art. 35(3)(c) as systematic
          monitoring of publicly accessible areas. ePrivacy Directive provides
          additional location data protections for electronic communications.
      children:
        classified_sensitive: false
        article: "art. 8, Recital 38"
        age_threshold: "16 years (member states may lower to 13)"
        special_requirements: >-
          Children's personal data is not classified as special category but
          receives enhanced protection. Information society services directed at
          children require parental consent below the age threshold. Privacy
          notices must use clear, plain language suitable for children. DPIAs are
          required when processing children's data at scale.
      criminal_records:
        classified_sensitive: true
        article: "art. 10"
        special_requirements: >-
          Criminal conviction and offence data is addressed under art. 10
          separately from art. 9 special categories. Processing is permitted
          only under the control of official authority or when authorized by
          EU or member state law providing appropriate safeguards. A
          comprehensive register of criminal convictions may only be kept under
          official authority control.
    processing_legal_bases:
      - "Explicit consent of the data subject (art. 9(2)(a))"
      - "Employment, social security, and social protection law (art. 9(2)(b))"
      - "Vital interests when data subject is incapable of giving consent (art. 9(2)(c))"
      - "Legitimate activities of foundations, associations, or not-for-profit bodies (art. 9(2)(d))"
      - "Data manifestly made public by the data subject (art. 9(2)(e))"
      - "Establishment, exercise, or defense of legal claims (art. 9(2)(f))"
      - "Substantial public interest based on EU or member state law (art. 9(2)(g))"
      - "Preventive or occupational medicine, health or social care (art. 9(2)(h))"
      - "Public health purposes (art. 9(2)(i))"
      - "Archiving in public interest, scientific or historical research, statistics (art. 9(2)(j))"
    notes: >-
      GDPR provides one of the most comprehensive sensitive data classification
      systems globally. Member states may introduce additional conditions under
      art. 9(4) for genetic, biometric, or health data. The distinction between
      art. 9 (special categories) and art. 10 (criminal data) is important as
      they have different legal bases and processing conditions.

  - id: lgpd
    framework_ref: lgpd
    articles: "art. 5(II), art. 11, art. 12, art. 13, art. 14"
    has_sensitive_category: true
    definition: >-
      LGPD defines dados pessoais sensiveis (sensitive personal data) as
      personal data concerning racial or ethnic origin, religious belief,
      political opinion, trade union or religious, philosophical, or political
      organization membership, data concerning health or sex life, genetic or
      biometric data when linked to a natural person. Children's and
      adolescents' data receives specific protection under art. 14.
    categories:
      health:
        classified_sensitive: true
        article: "art. 5(II), art. 11"
        special_requirements: >-
          Health data is explicitly listed as sensitive. Processing requires
          consent from the holder or their legal guardian in a prominent and
          specific manner, or without consent only under the specific exceptions
          in art. 11(II). Health plan operators are prohibited from using health
          data for risk selection in contracting or exclusion of beneficiaries
          under art. 11(5).
      biometric:
        classified_sensitive: true
        article: "art. 5(II), art. 11"
        special_requirements: >-
          Biometric data when linked to a natural person is classified as
          sensitive. Processing requires specific and prominent consent or one of
          the exceptions in art. 11(II). Biometric identification systems must
          comply with proportionality requirements.
      genetic:
        classified_sensitive: true
        article: "art. 5(II), art. 11"
        special_requirements: >-
          Genetic data when linked to a natural person is classified as
          sensitive. Same processing restrictions and consent requirements as
          other sensitive data categories. Anonymized genetic data used for
          research may be processed under art. 11(II)(c) with appropriate
          safeguards.
      racial_ethnic:
        classified_sensitive: true
        article: "art. 5(II), art. 11"
        special_requirements: >-
          Data concerning racial or ethnic origin is explicitly classified as
          sensitive under LGPD. Processing requires specific consent or an
          art. 11(II) exception. Brazilian anti-discrimination legislation
          (Lei 7.716/1989) provides additional protections against misuse of
          racial and ethnic origin data.
      political_opinion:
        classified_sensitive: true
        article: "art. 5(II), art. 11"
        special_requirements: >-
          Political opinion data is classified as sensitive. This includes
          membership in political organizations. Processing requires specific
          and prominent consent or an art. 11(II) exception. The ANPD may
          establish additional safeguards for processing political data during
          electoral periods.
      religion:
        classified_sensitive: true
        article: "art. 5(II), art. 11"
        special_requirements: >-
          Religious belief and membership in religious organizations are
          classified as sensitive data. Processing requires specific consent or
          an art. 11(II) exception. Religious organizations may process member
          data under the legitimate activities exception.
      sexual_orientation:
        classified_sensitive: true
        article: "art. 5(II), art. 11"
        special_requirements: >-
          Data concerning sex life (vida sexual) is classified as sensitive.
          This encompasses sexual orientation data. Processing requires specific
          and prominent consent or an art. 11(II) exception.
      trade_union:
        classified_sensitive: true
        article: "art. 5(II), art. 11"
        special_requirements: >-
          Trade union membership is classified as sensitive data as part of the
          broader category covering trade union, religious, philosophical, or
          political organization membership. Processing requires specific
          consent or an art. 11(II) exception.
      financial_credit:
        classified_sensitive: false
        article: "N/A (Lei 12.414/2011 — Lei do Cadastro Positivo)"
        special_requirements: >-
          Financial and credit data is not classified as sensitive under LGPD
          art. 5(II). However, credit scoring data is regulated by the Lei do
          Cadastro Positivo (Lei 12.414/2011) and the Codigo de Defesa do
          Consumidor. Automated credit decisions must comply with LGPD art. 20
          provisions on automated decision-making and the right to review.
      location:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Location data is not classified as sensitive under LGPD. It is
          personal data subject to general processing principles under art. 7.
          Continuous location tracking may trigger a DPIA requirement under
          ANPD guidelines.
      children:
        classified_sensitive: false
        article: "art. 14"
        age_threshold: "18 years (crianca under 12, adolescente 12-18 per ECA)"
        special_requirements: >-
          Children's and adolescents' data is not classified as sensitive per
          se but receives specific enhanced protection under art. 14. Processing
          must be in the best interest of the child. Consent from at least one
          parent or legal guardian is required. Controllers must keep public
          information about types of data collected and how it is used.
          Collection without consent is permitted only when necessary to contact
          parents or for the child's protection, and data must not be stored
          without consent.
      criminal_records:
        classified_sensitive: false
        article: "N/A (regulated by Lei 12.527/2011 and specific criminal legislation)"
        special_requirements: >-
          Criminal records are not explicitly listed in LGPD art. 5(II) as
          sensitive data. However, the ANPD and Brazilian courts have recognized
          that criminal record data requires enhanced protection under general
          LGPD principles. Processing must comply with proportionality and
          necessity principles. Public access to criminal records is regulated
          by specific criminal procedure legislation.
    processing_legal_bases:
      - "Specific and prominent consent from the data subject or legal guardian (art. 11(I))"
      - >-
        Without consent when indispensable for: compliance with legal or
        regulatory obligation (art. 11(II)(a))
      - "Shared processing by public administration for public policy execution (art. 11(II)(b))"
      - "Research by research bodies with anonymization when possible (art. 11(II)(c))"
      - "Exercise of rights in judicial, administrative, or arbitration proceedings (art. 11(II)(d))"
      - "Protection of life or physical safety of data subject or third party (art. 11(II)(e))"
      - "Health protection in procedures performed by health professionals or entities (art. 11(II)(f))"
      - "Prevention of fraud and safety of data subject in identification and authentication processes (art. 11(II)(g))"
    notes: >-
      LGPD's sensitive data regime is modeled on GDPR but has notable
      differences. Legitimate interest is NOT a valid legal basis for sensitive
      data processing under LGPD, unlike the broader GDPR framework. Art. 13
      imposes additional restrictions on research use of sensitive data,
      requiring anonymization where possible. The ANPD has authority to issue
      additional regulations on sensitive data processing.

  - id: ccpa-cpra
    framework_ref: ccpa-cpra
    articles: "Cal. Civ. Code sec. 1798.140(ae), sec. 1798.121, sec. 1798.135"
    has_sensitive_category: true
    definition: >-
      CPRA (amending CCPA) introduced the concept of sensitive personal
      information (SPI), defined in sec. 1798.140(ae). SPI includes government
      identifiers (SSN, driver's license, passport), account credentials,
      precise geolocation, racial/ethnic origin, religious/philosophical
      beliefs, union membership, mail/email/text content, genetic data, biometric
      data, health data, and sex life/sexual orientation data. Consumers have the
      right to limit the use and disclosure of SPI.
    categories:
      health:
        classified_sensitive: true
        article: "sec. 1798.140(ae)(6)"
        special_requirements: >-
          Health data is classified as sensitive personal information. Consumers
          have the right to limit the use and disclosure of SPI to that which is
          necessary to perform the services or provide the goods reasonably
          expected by an average consumer. Businesses must provide a clear link
          titled "Limit the Use of My Sensitive Personal Information" on their
          website. HIPAA-covered health data is exempt from CCPA/CPRA.
      biometric:
        classified_sensitive: true
        article: "sec. 1798.140(ae)(5)"
        special_requirements: >-
          Biometric information processed for uniquely identifying a consumer is
          classified as SPI. Processing of biometric data used to generate a
          unique identifier is covered. Businesses must honor consumer requests
          to limit use. Biometric data used solely for security purposes without
          selling or sharing may have reduced obligations.
      genetic:
        classified_sensitive: true
        article: "sec. 1798.140(ae)(4)"
        special_requirements: >-
          Genetic data is classified as SPI. Consumers may limit its use and
          disclosure. Genetic data includes any data resulting from the analysis
          of a biological sample of the consumer. Additional protections exist
          under the California Genetic Information Privacy Act (CalGIPA).
      racial_ethnic:
        classified_sensitive: true
        article: "sec. 1798.140(ae)(3)"
        special_requirements: >-
          Data revealing racial or ethnic origin is classified as SPI. Consumers
          may limit use and disclosure. California's broader civil rights
          framework (FEHA, Unruh Act) provides additional protections against
          discriminatory use of racial and ethnic origin data.
      political_opinion:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Political opinions are not explicitly listed as SPI under CPRA
          sec. 1798.140(ae). However, data revealing religious or philosophical
          beliefs is covered under sec. 1798.140(ae)(3), which may overlap with
          political beliefs in certain contexts. Political affiliation data may
          be protected under other California laws.
      religion:
        classified_sensitive: true
        article: "sec. 1798.140(ae)(3)"
        special_requirements: >-
          Data revealing religious or philosophical beliefs is classified as SPI.
          Consumers have the right to limit use and disclosure. This includes
          inferences drawn about religious beliefs from other data.
      sexual_orientation:
        classified_sensitive: true
        article: "sec. 1798.140(ae)(6)"
        special_requirements: >-
          Data concerning sex life or sexual orientation is classified as SPI.
          Consumers may limit use and disclosure. California's strong
          anti-discrimination protections complement CPRA's SPI framework for
          this category.
      trade_union:
        classified_sensitive: true
        article: "sec. 1798.140(ae)(3)"
        special_requirements: >-
          Union membership is explicitly listed as SPI under CPRA. Consumers may
          limit its use and disclosure. Employee data exemptions may apply in
          employment contexts but do not eliminate all obligations.
      financial_credit:
        classified_sensitive: true
        article: "sec. 1798.140(ae)(1), sec. 1798.140(ae)(2)"
        special_requirements: >-
          CPRA classifies as SPI: government-issued identifiers (SSN, driver's
          license, state ID, passport) and account log-in credentials in
          combination with access codes or passwords. Financial account numbers
          combined with credentials are SPI. Data subject to GLBA is exempt from
          CCPA/CPRA to the extent already regulated.
      location:
        classified_sensitive: true
        article: "sec. 1798.140(ae)(7)"
        special_requirements: >-
          Precise geolocation data is classified as SPI. Defined as any data
          derived from a device that is used or intended to be used to locate
          a consumer within a geographic area equal to or less than the area of
          a circle with a radius of 1,850 feet (approximately 563 meters).
          Consumers may limit use and disclosure of precise geolocation.
      children:
        classified_sensitive: false
        article: "sec. 1798.120(c), sec. 1798.99.31 (California Age-Appropriate Design Code)"
        age_threshold: "16 years (opt-in for sale/sharing); additional protections under 13"
        special_requirements: >-
          Children's data is not classified as SPI per se but receives enhanced
          protections. Businesses must not sell or share data of consumers under
          16 without opt-in consent. For children under 13, parental consent is
          required. The California Age-Appropriate Design Code Act imposes
          additional obligations for online services likely accessed by children.
      criminal_records:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Criminal records are not explicitly classified as SPI under CPRA.
          However, California has extensive restrictions on use of criminal
          history in employment (Ban the Box, Fair Chance Act) and housing
          decisions. Criminal justice data may be exempt from CCPA/CPRA under
          sec. 1798.145(a) to the extent collected for criminal justice
          purposes.
    processing_legal_bases:
      - >-
        Sensitive personal information may be used only as necessary to perform
        the services or provide the goods reasonably expected by an average
        consumer who requests such goods or services (sec. 1798.121(a))
      - "Consumer may direct business to limit SPI use via opt-out mechanism"
      - >-
        Business purpose exceptions: detecting security incidents, resisting
        malicious or illegal actions, ensuring physical safety, short-term
        transient use, performing or verifying quality/safety of a service,
        and verifying or maintaining quality (sec. 1798.121(a))
      - "Service provider and contractor processing agreements required"
    notes: >-
      CPRA's SPI concept differs significantly from GDPR's special categories.
      CPRA includes precise geolocation, government identifiers, and account
      credentials as sensitive, which GDPR does not. Conversely, CPRA does not
      explicitly list political opinions or criminal records as SPI. The primary
      consumer right is to limit use and disclosure rather than a blanket
      processing prohibition. HIPAA-covered entities and GLBA-regulated
      financial institutions are exempt to the extent data is already regulated
      by those frameworks.

  - id: hipaa
    framework_ref: hipaa
    articles: "45 CFR 160, 164; HITECH Act sec. 13401-13411"
    has_sensitive_category: false
    definition: >-
      HIPAA does not use the concept of sensitive or special category data.
      Instead, HIPAA regulates Protected Health Information (PHI), defined as
      individually identifiable health information held or transmitted by a
      covered entity or business associate, in any form or medium. PHI includes
      demographic data, medical records, test results, insurance information,
      and any other information that can be used to identify an individual and
      was created, used, or disclosed in the course of providing health care
      services. HIPAA applies a uniform protection standard to all PHI.
    categories:
      health:
        classified_sensitive: true
        article: "45 CFR 160.103 (definition of PHI), 45 CFR 164.502-514"
        special_requirements: >-
          Health data is the core of HIPAA's protection regime. All individually
          identifiable health information constitutes PHI. Covered entities must
          implement administrative, physical, and technical safeguards. The
          Privacy Rule governs use and disclosure; the Security Rule governs
          electronic PHI (ePHI). Minimum necessary standard applies to most uses
          and disclosures. Individual authorization required except for treatment,
          payment, and healthcare operations.
      biometric:
        classified_sensitive: true
        article: "45 CFR 164.514(b)(2)(i)(O) — biometric identifiers are PHI identifiers"
        special_requirements: >-
          Biometric identifiers (finger and voice prints) are listed as one of
          the 18 HIPAA identifiers that make health information individually
          identifiable. Biometric data linked to health information constitutes
          PHI and must be protected accordingly. De-identification under Safe
          Harbor requires removal of biometric identifiers.
      genetic:
        classified_sensitive: true
        article: "45 CFR 160.103 (as amended by GINA); Genetic Information Nondiscrimination Act"
        special_requirements: >-
          Genetic information is included within the definition of PHI following
          GINA amendments. HIPAA prohibits health plans from using genetic
          information for underwriting purposes. Genetic information includes
          genetic tests of the individual and family members, manifestation of
          disease in family members, and requests for genetic services. Additional
          protections under GINA Title I for health coverage and Title II for
          employment.
      racial_ethnic:
        classified_sensitive: false
        article: "N/A (demographic data is PHI only when linked to health information)"
        special_requirements: >-
          Racial and ethnic origin data is not independently protected by HIPAA.
          However, when it forms part of a health record (as demographic data
          typically does), it is included within PHI and receives the same
          protections. HIPAA does not create a heightened protection category
          for racial or ethnic origin data specifically.
      political_opinion:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Political opinion data is not within HIPAA's scope. HIPAA applies only
          to individually identifiable health information held by covered
          entities and business associates. Political opinion data held by a
          healthcare provider that is not part of health records would generally
          not constitute PHI.
      religion:
        classified_sensitive: false
        article: "N/A (religious preferences in health records are part of PHI)"
        special_requirements: >-
          Religious data is not independently classified under HIPAA. However,
          religious preferences recorded in medical records (e.g., for chaplain
          services, dietary requirements, treatment decisions) are part of PHI
          and protected accordingly. Facility directories may include religious
          affiliation with patient consent for clergy visits under 45 CFR
          164.510(a).
      sexual_orientation:
        classified_sensitive: false
        article: "N/A (health records containing this data are PHI)"
        special_requirements: >-
          Sexual orientation data is not a separate HIPAA category. When recorded
          in health records, it is part of PHI and protected accordingly. HHS
          has issued guidance on protections for reproductive health information
          and LGBTQ+ health data within the PHI framework.
      trade_union:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Trade union membership is outside HIPAA's scope entirely. HIPAA does
          not regulate employment or union-related data unless it constitutes
          individually identifiable health information.
      financial_credit:
        classified_sensitive: false
        article: "N/A (billing and insurance data within health records is PHI)"
        special_requirements: >-
          Financial data generally is outside HIPAA scope. However, health
          insurance claims, billing records, and payment information held by
          covered entities constitute PHI and are protected. Financial
          institutions handling health-related payments may be subject to HIPAA
          if acting as business associates.
      location:
        classified_sensitive: true
        article: "45 CFR 164.514(b)(2)(i)(C-E) — geographic data, dates, contact information"
        special_requirements: >-
          Geographic data smaller than a state (including street address, city,
          county, ZIP code) is one of the 18 HIPAA identifiers. Full dates
          related to an individual are also identifiers. De-identification
          requires removal or generalization of geographic data to state level
          and truncation of ZIP codes for populations under 20,000.
      children:
        classified_sensitive: false
        article: "45 CFR 164.502(g) — personal representatives"
        age_threshold: "Varies by state law (typically 18 for general health, lower for specific services)"
        special_requirements: >-
          HIPAA does not create a separate sensitive category for children's
          data. Parents are generally treated as personal representatives with
          access rights to minor children's PHI. Exceptions exist where state
          law grants minors authority over their own health decisions (e.g.,
          substance abuse treatment, sexual health, mental health). Minors who
          lawfully consent to treatment may control their own PHI for that
          treatment.
      criminal_records:
        classified_sensitive: false
        article: "N/A (45 CFR 164.512(f) permits disclosures for law enforcement)"
        special_requirements: >-
          Criminal records are not within HIPAA's scope. However, HIPAA governs
          disclosures of PHI to law enforcement under 45 CFR 164.512(f),
          including reporting of certain injuries and crimes on premises.
          Correctional institutions may receive PHI of inmates under
          45 CFR 164.512(k)(5) for health and safety purposes.
    processing_legal_bases:
      - "Treatment, payment, and healthcare operations (TPO) — no authorization required (45 CFR 164.506)"
      - "Individual written authorization for uses beyond TPO (45 CFR 164.508)"
      - "Public health activities (45 CFR 164.512(b))"
      - "Health oversight activities (45 CFR 164.512(d))"
      - "Judicial and administrative proceedings (45 CFR 164.512(e))"
      - "Law enforcement purposes under specific conditions (45 CFR 164.512(f))"
      - "Research with IRB or Privacy Board waiver of authorization (45 CFR 164.512(i))"
      - "De-identified data (18 identifiers removed) is not PHI and may be used freely"
    notes: >-
      HIPAA's approach fundamentally differs from GDPR-style sensitive data
      classification. Rather than categorizing types of data as more or less
      sensitive, HIPAA applies uniform protections to all PHI. The concept of
      18 identifiers is relevant only for de-identification, not for creating
      sensitivity tiers. Psychotherapy notes receive heightened protection
      requiring specific authorization under 45 CFR 164.508(a)(2). Substance
      abuse treatment records have additional protections under 42 CFR Part 2.

  - id: pipl
    framework_ref: pipl
    articles: "art. 28, art. 29, art. 30, art. 31, art. 32"
    has_sensitive_category: true
    definition: >-
      PIPL defines sensitive personal information as personal information that,
      once leaked or illegally used, may easily lead to the infringement of
      the personal dignity of natural persons or endangerment of the personal
      or property safety of natural persons, including biometric recognition,
      religious belief, specific identity, medical and health, financial
      account, and whereabouts and tracks information, as well as personal
      information of minors under 14. Processing requires specific consent
      and a Personal Information Protection Impact Assessment.
    categories:
      health:
        classified_sensitive: true
        article: "art. 28"
        special_requirements: >-
          Medical and health information is explicitly classified as sensitive
          personal information. Processing requires specific consent from the
          individual (art. 29) and must have a specific purpose and sufficient
          necessity. A Personal Information Protection Impact Assessment (PIPIA)
          must be conducted before processing (art. 55). Strict data
          localization requirements may apply under sector-specific regulations.
      biometric:
        classified_sensitive: true
        article: "art. 28, art. 26"
        special_requirements: >-
          Biometric recognition information is classified as sensitive. Art. 26
          imposes additional restrictions on facial recognition and biometric
          identification in public places, requiring necessity for maintaining
          public safety. Image collection devices in public places must display
          prominent notices. Collected biometric data may only be used for public
          safety purposes unless separate consent is obtained.
      genetic:
        classified_sensitive: true
        article: "art. 28 (as medical and health information)"
        special_requirements: >-
          Genetic data falls under the medical and health information category
          of sensitive personal information. Human genetic resources are
          additionally regulated by the Regulations on the Management of Human
          Genetic Resources (2019), which impose strict export controls and
          require government approval for international collaboration involving
          Chinese genetic resources.
      racial_ethnic:
        classified_sensitive: true
        article: "art. 28 (as specific identity)"
        special_requirements: >-
          Racial and ethnic origin falls under the specific identity category of
          sensitive personal information. China's multi-ethnic context means
          ethnic identity data is particularly sensitive. Processing requires
          specific consent and PIPIA. Collection for discriminatory purposes is
          prohibited under the Constitution and relevant anti-discrimination
          provisions.
      political_opinion:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Political opinion is not explicitly listed as sensitive personal
          information under PIPL art. 28. However, data processing that may
          affect national security, public interest, or social stability may
          trigger additional regulatory requirements under the Cybersecurity Law
          and Data Security Law.
      religion:
        classified_sensitive: true
        article: "art. 28"
        special_requirements: >-
          Religious belief is explicitly classified as sensitive personal
          information. Processing requires specific consent (art. 29) and PIPIA
          (art. 55). China's Regulations on Religious Affairs impose additional
          restrictions on collection and use of religious identity data.
      sexual_orientation:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Sexual orientation is not explicitly listed as sensitive personal
          information under PIPL art. 28. However, such data may be considered
          sensitive in practice if its leakage or illegal use could infringe
          personal dignity, which would bring it within the general definition.
          Processing should follow general PIPL principles of lawfulness,
          necessity, and good faith.
      trade_union:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Trade union membership is not explicitly listed as sensitive personal
          information under PIPL. The All-China Federation of Trade Unions
          operates under a different regulatory framework. General PIPL
          principles apply to any processing of union membership data.
      financial_credit:
        classified_sensitive: true
        article: "art. 28"
        special_requirements: >-
          Financial account information is explicitly classified as sensitive
          personal information. This includes bank accounts, securities accounts,
          insurance accounts, and payment accounts. Processing requires specific
          consent and PIPIA. The People's Bank of China has issued additional
          regulations on financial personal information protection with
          classification into categories C1, C2, and C3 based on sensitivity.
      location:
        classified_sensitive: true
        article: "art. 28"
        special_requirements: >-
          Whereabouts and tracks information (xingzong guiji) is explicitly
          classified as sensitive personal information. This includes real-time
          location data and historical movement records. Processing requires
          specific consent and PIPIA. Map and location service providers face
          additional obligations under surveying and mapping regulations.
      children:
        classified_sensitive: true
        article: "art. 28, art. 31"
        age_threshold: "14 years"
        special_requirements: >-
          Personal information of minors under 14 is explicitly classified as
          sensitive personal information. Processing requires consent from the
          minor's parent or guardian. Personal information processors must
          formulate specialized rules for handling minors' information. The
          Provisions on the Protection of Minors in Cyberspace (2024) impose
          additional obligations including age verification and content
          restrictions.
      criminal_records:
        classified_sensitive: true
        article: "art. 28 (as specific identity)"
        special_requirements: >-
          Criminal record data falls under the specific identity category of
          sensitive personal information. Processing requires specific consent
          and PIPIA. Access to criminal records is regulated by the Criminal
          Procedure Law and public security regulations. Commercial use of
          criminal record data is strictly limited.
    processing_legal_bases:
      - "Specific consent of the individual (art. 29) — must inform of necessity, impact, and specific purpose"
      - "Personal Information Protection Impact Assessment required before processing (art. 55)"
      - >-
        Without consent only when necessary for statutory duties/obligations,
        emergency health/property protection, news reporting in public interest,
        or other circumstances provided by laws/regulations (art. 13)
    notes: >-
      PIPL's sensitive data framework is notably broader than GDPR in some
      respects. Financial account information, location/tracking data, and
      minors' data (under 14) are all explicitly classified as sensitive, which
      exceeds GDPR's special category scope. The requirement for both specific
      consent and a PIPIA for all sensitive data processing creates a dual
      compliance obligation. Cross-border transfer of sensitive personal
      information faces heightened scrutiny under art. 38-40 and may require
      government security assessment.

  - id: dpdp-india
    framework_ref: dpdp-india
    articles: "sec. 2(b), sec. 3, sec. 9, sec. 10"
    has_sensitive_category: false
    definition: >-
      The Digital Personal Data Protection Act 2023 (DPDP) does not explicitly
      define categories of sensitive personal data. Unlike its predecessor draft
      (the Personal Data Protection Bill 2019, which included sensitive personal
      data categories), the enacted DPDP takes a simplified approach with a
      single tier of digital personal data. The Act empowers the Central
      Government to notify additional requirements for certain categories of
      data through rules, which have not yet been fully issued as of 2026.
    categories:
      health:
        classified_sensitive: false
        article: "N/A (may be designated by Central Government rules under sec. 16)"
        special_requirements: >-
          Not explicitly classified as sensitive under the enacted DPDP. The
          Central Government may prescribe additional obligations through rules.
          The earlier 2019 Bill classified health data as sensitive; future DPDP
          rules may reinstate similar protections. Healthcare-specific
          regulations may impose separate obligations.
      biometric:
        classified_sensitive: false
        article: "N/A (may be designated by Central Government rules)"
        special_requirements: >-
          Not explicitly classified as sensitive. Aadhaar biometric data is
          separately regulated under the Aadhaar Act 2016, which imposes strict
          protections on biometric identity data in India's national ID system.
          Future DPDP rules may establish specific requirements for biometric
          data processing.
      genetic:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Not explicitly classified as sensitive under DPDP. No separate
          genetic data protection legislation exists in India as of 2026.
          General DPDP principles of purpose limitation, data minimization,
          and accuracy apply to genetic data processing.
      racial_ethnic:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Not explicitly classified as sensitive under DPDP. India's
          constitutional protections against discrimination (Articles 14-16)
          and caste-based protections under the Scheduled Castes and Tribes
          (Prevention of Atrocities) Act provide some protections against misuse
          of ethnic and caste-related data.
      political_opinion:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Not explicitly classified as sensitive under DPDP. The Representation
          of the People Act and Election Commission regulations govern use of
          political data in electoral contexts. General DPDP consent requirements
          apply to processing of political opinion data.
      religion:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Not explicitly classified as sensitive under DPDP. India's
          constitutional right to freedom of religion (Articles 25-28) provides
          broader protections. The earlier 2019 Bill classified religious belief
          as sensitive; future DPDP rules may address this category.
      sexual_orientation:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Not explicitly classified as sensitive under DPDP. Following the
          Supreme Court's Navtej Singh Johar v. Union of India (2018) decision
          decriminalizing homosexuality, there is increased recognition of
          privacy rights for sexual orientation data, but no specific legislative
          classification exists under DPDP.
      trade_union:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Not explicitly classified as sensitive under DPDP. Trade union
          activities are protected under the Trade Unions Act 1926 and
          constitutional rights, but membership data has no special classification
          under data protection law.
      financial_credit:
        classified_sensitive: false
        article: "N/A (regulated by RBI and sector-specific rules)"
        special_requirements: >-
          Not explicitly classified as sensitive under DPDP. However, the
          Reserve Bank of India (RBI) has issued extensive data protection
          guidelines for financial institutions, including the Master Direction
          on Digital Payment Security Controls and Account Aggregator framework.
          Credit information is regulated under the Credit Information Companies
          (Regulation) Act 2005.
      location:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Not explicitly classified as sensitive under DPDP. Geospatial data
          is governed by the Geospatial Data Guidelines (2021) which liberalized
          collection. General DPDP principles apply to location data processing.
      children:
        classified_sensitive: true
        article: "sec. 9"
        age_threshold: "18 years"
        special_requirements: >-
          Children's data is the only category receiving explicit enhanced
          protection under DPDP. Processing requires verifiable parental consent
          (sec. 9(1)). Data Fiduciaries must not undertake tracking, behavioral
          monitoring, or targeted advertising directed at children (sec. 9(3)).
          Processing that is detrimental to the well-being of a child is
          prohibited (sec. 9(4)). The Central Government may lower the age
          threshold for specific purposes by notification.
      criminal_records:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Not explicitly classified as sensitive under DPDP. Criminal records
          are maintained by law enforcement agencies and regulated under the
          Criminal Procedure Code and specific state laws. The earlier 2019
          Bill did not include criminal records as sensitive either.
    processing_legal_bases:
      - "Consent of the Data Principal (sec. 6(1)) — must be free, specific, informed, unconditional, and unambiguous"
      - "Certain legitimate uses without consent (sec. 7): voluntary data provision, state functions, legal obligations, medical emergencies, employment"
      - "Central Government may prescribe additional requirements through rules (sec. 16)"
    notes: >-
      DPDP represents a significant simplification from the earlier 2019 PDP
      Bill, which had detailed sensitive personal data categories matching
      GDPR. The enacted law delegates sensitive data classification to
      subordinate rules, which had not been fully notified as of early 2026.
      This creates regulatory uncertainty. The Central Government's rulemaking
      power under sec. 16 could eventually establish a sensitivity framework,
      but until rules are issued, only children's data has explicit enhanced
      protections. Organizations should monitor DPDP rule notifications closely.

  - id: pdpa-singapore
    framework_ref: pdpa-singapore
    articles: "sec. 2, sec. 13, sec. 24, Fourth Schedule"
    has_sensitive_category: false
    definition: >-
      Singapore's PDPA does not formally define categories of sensitive personal
      data. The PDPA takes a contextual approach where all personal data receives
      a baseline level of protection, and the reasonableness of processing is
      assessed based on context including the sensitivity of the data. The
      Personal Data Protection Commission (PDPC) Advisory Guidelines recognize
      that certain data types (e.g., medical records, NRIC numbers) require
      enhanced protection due to their sensitive nature.
    categories:
      health:
        classified_sensitive: false
        article: "N/A (PDPC Advisory Guidelines recognize heightened sensitivity)"
        special_requirements: >-
          Not formally classified as a separate sensitive category, but PDPC
          Advisory Guidelines recognize medical records as requiring enhanced
          protection. The National Electronic Health Record system has its own
          regulatory framework. Healthcare sector has specific consent
          requirements under the Healthcare Services Act. The deemed consent
          framework under sec. 15A may apply to healthcare data sharing for
          treatment purposes.
      biometric:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Not formally classified as sensitive. The PDPC has issued guidance on
          biometric data collection, particularly for access control systems.
          The use of NRIC and biometric data for identification is subject to
          the Advisory Guidelines on NRIC and Other National Identification
          Numbers, which restrict collection to situations required by law or
          where there is a clear need for unique identification.
      genetic:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Not formally classified as sensitive under PDPA. Genetic data
          processing should follow general PDPA principles of consent, purpose
          limitation, and reasonable use. Healthcare research involving genetic
          data is governed by the Human Biomedical Research Act 2015.
      racial_ethnic:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Not formally classified as sensitive under PDPA. Singapore's
          multi-racial context means racial data is collected for official
          purposes (e.g., CMIO classification). The Maintenance of Religious
          Harmony Act and racial harmony legislation provide broader protections
          against misuse of racial data.
      political_opinion:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Not formally classified as sensitive under PDPA. Political data
          processing is subject to general PDPA consent and purpose limitation
          requirements. Political parties collecting member data must comply
          with general PDPA obligations.
      religion:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Not formally classified as sensitive under PDPA. The Maintenance of
          Religious Harmony Act provides protections in the religious context.
          Religious organizations processing member data must comply with general
          PDPA obligations. The PDPC has recognized religious data as contextually
          sensitive.
      sexual_orientation:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Not formally classified as sensitive under PDPA. General PDPA
          principles apply. The repeal of Section 377A of the Penal Code (2023)
          decriminalized homosexuality, but no specific data protection
          provisions exist for sexual orientation data.
      trade_union:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Not formally classified as sensitive under PDPA. Trade union membership
          data is subject to general PDPA consent and purpose limitation
          requirements.
      financial_credit:
        classified_sensitive: false
        article: "N/A (MAS Guidelines impose sector-specific requirements)"
        special_requirements: >-
          Not formally classified as sensitive under PDPA. However, the Monetary
          Authority of Singapore (MAS) Technology Risk Management Guidelines
          impose extensive data protection requirements on financial institutions.
          The Credit Bureau Act governs credit data specifically. Banking
          secrecy provisions under the Banking Act sec. 47 provide additional
          protections for financial data.
      location:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Not formally classified as sensitive under PDPA. Location data
          processing must comply with general consent and purpose limitation
          requirements. Singapore's Smart Nation initiatives have specific
          guidelines on government use of location data.
      children:
        classified_sensitive: false
        article: "N/A (general PDPA applies)"
        age_threshold: "No specific age threshold in PDPA"
        special_requirements: >-
          PDPA does not create a separate category for children's data. Parental
          consent may be required depending on the context and the child's
          capacity to consent. The PDPC has issued advisory guidelines noting
          that organizations should exercise greater care with children's data.
          The age of majority in Singapore is 21, but the PDPC recognizes
          contextual assessment.
      criminal_records:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Not formally classified as sensitive under PDPA. Criminal record data
          is regulated under the Registration of Criminals Act. Spent
          convictions may benefit from protections under rehabilitation schemes.
          General PDPA principles apply to processing of criminal record data
          by non-government entities.
    processing_legal_bases:
      - "Consent of the individual (sec. 13)"
      - "Deemed consent by contractual necessity (sec. 15)"
      - "Deemed consent by notification (sec. 15A)"
      - "Legitimate interests exception (sec. 13(b), introduced 2021 amendment)"
      - "Business improvement exception (Fourth Schedule)"
      - "Research exception (Fourth Schedule)"
      - "Public interest exception (Fifth Schedule)"
    notes: >-
      Singapore's PDPA deliberately avoids formal sensitive data categories,
      opting instead for a contextual approach. The PDPC evaluates sensitivity
      based on the nature of the data, the context of processing, and potential
      harm. This is a fundamentally different model from GDPR's prescriptive
      categories. The 2021 amendments introduced deemed consent, legitimate
      interests, and business improvement exceptions that significantly expanded
      lawful processing grounds. Organizations are expected to apply higher
      standards of protection based on reasonable assessment of data sensitivity.

  - id: appi
    framework_ref: appi
    articles: "art. 2(3), art. 20, art. 23 (2022 amendment)"
    has_sensitive_category: true
    definition: >-
      Japan's APPI defines Special Care-Required Personal Information
      (youhairyo kojin joho) as personal information comprising a person's race,
      creed, social status, medical history, criminal record, fact of having
      suffered damage from crime, and other matters prescribed by cabinet order
      (including disability, results of health examinations, and guidance or
      treatment by a physician). The 2022 amendment strengthened protections and
      introduced pseudonymously processed information concepts.
    categories:
      health:
        classified_sensitive: true
        article: "art. 2(3), Cabinet Order art. 2(ii-iii)"
        special_requirements: >-
          Medical history, results of health examinations performed by physicians,
          and guidance or treatment by a physician are classified as Special
          Care-Required Personal Information. Consent is required before
          acquisition (not just processing). Medical institutions have additional
          obligations under the Medical Practitioners Act and healthcare-specific
          PPC guidance.
      biometric:
        classified_sensitive: false
        article: "art. 2(2) — personal identification codes"
        special_requirements: >-
          Biometric data is classified as a personal identification code under
          art. 2(2), not as Special Care-Required Personal Information. This
          includes DNA sequences, facial recognition data, iris patterns,
          voiceprint, gait, vein patterns, and fingerprints. While not special
          care-required, biometric data receives protection as personal
          identification codes with specific handling requirements.
      genetic:
        classified_sensitive: false
        article: "art. 2(2)(i) — personal identification code (DNA sequence)"
        special_requirements: >-
          Genetic data (DNA base sequence) is classified as a personal
          identification code, not as Special Care-Required Personal Information.
          However, genetic data revealing medical conditions would also fall
          under medical history (Special Care-Required). The Act on Regulation
          of Human Cloning Techniques and research ethics guidelines provide
          additional protections.
      racial_ethnic:
        classified_sensitive: true
        article: "art. 2(3)"
        special_requirements: >-
          Race is explicitly listed as Special Care-Required Personal
          Information. Consent is required before acquisition. This reflects
          Japan's historical concerns regarding discrimination against minority
          groups. Processing of racial data for discriminatory purposes is
          prohibited.
      political_opinion:
        classified_sensitive: true
        article: "art. 2(3) (as creed — shinjo)"
        special_requirements: >-
          Creed (shinjo) is listed as Special Care-Required Personal
          Information, which encompasses political beliefs and opinions.
          Consent is required before acquisition. This is broadly interpreted
          to include political ideology and party affiliation.
      religion:
        classified_sensitive: true
        article: "art. 2(3) (as creed — shinjo)"
        special_requirements: >-
          Religious belief falls under the creed category of Special
          Care-Required Personal Information. Consent is required before
          acquisition. Japan's constitutional freedom of religion (art. 20)
          provides additional protections against compelled disclosure of
          religious beliefs.
      sexual_orientation:
        classified_sensitive: false
        article: "N/A (PPC guidance recognizes sensitivity)"
        special_requirements: >-
          Sexual orientation is not formally listed as Special Care-Required
          Personal Information. However, the PPC has issued guidance recognizing
          that outing a person's sexual orientation may constitute a privacy
          violation. Several municipal ordinances in Japan provide additional
          protections for LGBT data. Processing should follow reasonable care
          standards.
      trade_union:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Trade union membership is not listed as Special Care-Required Personal
          Information under APPI. Japan's Trade Union Act provides separate
          protections for union activities. General APPI consent and purpose
          limitation requirements apply.
      financial_credit:
        classified_sensitive: false
        article: "N/A (regulated by sector-specific legislation)"
        special_requirements: >-
          Financial and credit data is not classified as Special Care-Required
          under APPI. The Financial Services Agency regulations and the
          Installment Sales Act impose sector-specific data protection
          requirements. Credit information is regulated by the Credit
          Information Business Act. Banking Act confidentiality provisions
          provide additional protections.
      location:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Location data is not classified as Special Care-Required under APPI.
          Personal location information that can identify individuals is personal
          data subject to general APPI requirements. The Telecommunications
          Business Act provides additional protections for location data held
          by telecom operators.
      children:
        classified_sensitive: false
        article: "N/A (general APPI applies)"
        age_threshold: "No specific age threshold in APPI"
        special_requirements: >-
          APPI does not define children's data as a separate sensitive category
          or establish age thresholds. Parental consent requirements depend on
          civil law capacity (generally 18 after the 2022 civil code amendment).
          Sector-specific guidelines (e.g., for online services directed at
          children) may impose additional requirements.
      criminal_records:
        classified_sensitive: true
        article: "art. 2(3), Cabinet Order art. 2(iv-v)"
        special_requirements: >-
          Criminal record (history of criminal conviction) and fact of having
          suffered damage from crime are explicitly classified as Special
          Care-Required Personal Information. Consent is required before
          acquisition. This includes juvenile offense records. Expunged
          records retain protection under rehabilitation legislation.
    processing_legal_bases:
      - "Consent of the data subject before acquisition of Special Care-Required data (art. 20(2))"
      - "Legal obligation (laws or regulations require acquisition)"
      - "Necessary to protect life, body, or property and consent is difficult to obtain"
      - "Public health or child welfare necessity where consent is difficult"
      - "Cooperation with government agencies where consent would impede the official duty"
      - "Prescribed by PPC rules as equivalent to the above situations"
    notes: >-
      APPI's Special Care-Required framework has a unique characteristic: it
      regulates acquisition (collection) of sensitive data, not just processing.
      This means consent is required before obtaining the data, which is stricter
      than GDPR in this specific aspect. Japan's adequacy decision with the EU
      under GDPR requires supplementary measures for Special Care-Required data
      transferred from the EU. The distinction between Special Care-Required
      data and personal identification codes (biometric/genetic) creates a
      two-tier system that differs from GDPR's unified approach.

  - id: pipa-korea
    framework_ref: pipa-korea
    articles: "art. 23, art. 24, art. 24-2, art. 25 (2023 amendment)"
    has_sensitive_category: true
    definition: >-
      South Korea's PIPA defines sensitive information (mingan jeongbo) as
      personal information concerning ideology, belief, admission to and
      withdrawal from a trade union or political party, political opinion,
      health, sex life, genetic information, criminal record, biometric
      information, and other personal information that is likely to clearly
      infringe on the privacy of the data subject as prescribed by Presidential
      Decree. The 2023 amendment expanded protections for biometric and
      pseudonymized data.
    categories:
      health:
        classified_sensitive: true
        article: "art. 23(1)"
        special_requirements: >-
          Health information is explicitly classified as sensitive information.
          Processing is prohibited unless separate consent is obtained or
          permitted by law. The consent must be distinct from consent for general
          personal data processing. Medical institutions are additionally
          regulated by the Medical Service Act and the Bioethics and Safety Act.
      biometric:
        classified_sensitive: true
        article: "art. 23(1), art. 24-2 (2023 amendment)"
        special_requirements: >-
          Biometric information for authentication and identification is
          classified as sensitive. The 2023 amendment added art. 24-2 providing
          specific requirements for biometric data processing, including
          restrictions on alternatives and purpose limitation. A Privacy Impact
          Assessment may be required for large-scale biometric data processing
          under art. 33.
      genetic:
        classified_sensitive: true
        article: "art. 23(1)"
        special_requirements: >-
          Genetic information is classified as sensitive information. Processing
          requires separate consent or legal authorization. The Bioethics and
          Safety Act imposes additional requirements on genetic testing and
          research. Export of genetic resources requires government approval.
      racial_ethnic:
        classified_sensitive: true
        article: "art. 23(1) (as part of information likely to infringe privacy)"
        special_requirements: >-
          While not explicitly listed in the statute text, racial and ethnic
          origin data may be classified as sensitive under the catch-all
          provision for information likely to clearly infringe privacy as
          prescribed by Presidential Decree. Korea's relatively homogeneous
          demographics mean this category has received less regulatory
          attention than in other jurisdictions.
      political_opinion:
        classified_sensitive: true
        article: "art. 23(1)"
        special_requirements: >-
          Political opinions are explicitly classified as sensitive information.
          Admission to and withdrawal from a political party is also classified
          as sensitive. Processing requires separate consent or legal basis.
          The Political Parties Act and Public Official Election Act provide
          additional context for political data handling.
      religion:
        classified_sensitive: true
        article: "art. 23(1) (as belief — sinnyeom)"
        special_requirements: >-
          Belief (sinnyeom) is classified as sensitive information, encompassing
          religious belief. Processing requires separate consent or legal
          authorization. The Framework Act on the Treatment of Foreigners
          provides additional context for religious data in immigration contexts.
      sexual_orientation:
        classified_sensitive: true
        article: "art. 23(1) (as sex life — seongsaenghwal)"
        special_requirements: >-
          Sex life information is classified as sensitive, which encompasses
          sexual orientation data. Processing requires separate consent. Korean
          courts have recognized privacy rights in sexual orientation, though
          comprehensive anti-discrimination legislation covering sexual
          orientation has not been enacted.
      trade_union:
        classified_sensitive: true
        article: "art. 23(1)"
        special_requirements: >-
          Admission to and withdrawal from a trade union is explicitly classified
          as sensitive information. Processing requires separate consent or legal
          authorization. The Trade Union and Labor Relations Adjustment Act
          provides additional protections for union activities and membership
          data.
      financial_credit:
        classified_sensitive: false
        article: "N/A (regulated by Credit Information Use and Protection Act)"
        special_requirements: >-
          Financial and credit data is not classified as sensitive under PIPA
          art. 23. However, the Credit Information Use and Protection Act (CIUPA)
          provides comprehensive regulation of credit information, including
          strict consent requirements, purpose limitations, and the right to
          request deletion of credit information. The Financial Services
          Commission oversees compliance.
      location:
        classified_sensitive: false
        article: "N/A (regulated by Location Information Act)"
        special_requirements: >-
          Location data is not classified as sensitive under PIPA. However, the
          Act on the Protection and Use of Location Information provides
          comprehensive regulation including consent requirements for location
          collection, purpose limitations, and restrictions on location-based
          services. The Korea Communications Commission oversees compliance.
      children:
        classified_sensitive: false
        article: "art. 22(6) — enhanced consent for children under 14"
        age_threshold: "14 years"
        special_requirements: >-
          Children's data is not classified as sensitive per se but receives
          enhanced consent protections. For children under 14, consent from a
          legal representative (parent or guardian) is required (art. 22(6)).
          The personal information processor must verify that consent was given
          by the legal representative through reasonable methods.
      criminal_records:
        classified_sensitive: true
        article: "art. 23(1)"
        special_requirements: >-
          Criminal record information (beomjoe gyeongnyeok) is explicitly
          classified as sensitive information. Processing requires separate
          consent or legal authorization. The Act on the Lapse of Criminal
          Sentences provides protections for rehabilitated individuals.
          Employers' use of criminal records in hiring is restricted by labor
          legislation.
    processing_legal_bases:
      - "Separate consent of the data subject specifically for sensitive information processing (art. 23(1)(1))"
      - "Processing required or permitted by law (art. 23(1)(2))"
      - "Processing necessary for scientific research under the Bioethics and Safety Act"
      - "Public institutions processing for statutory duties"
    notes: >-
      PIPA's sensitive data framework is among the most comprehensive globally.
      The explicit inclusion of trade union membership, political party
      affiliation, ideology, and criminal records aligns closely with GDPR's
      special categories but adds specificity. The 2023 amendment strengthened
      biometric data protections and introduced new pseudonymization frameworks.
      Korea's adequacy decision with the EU means sensitive data transfers must
      maintain equivalent protections. The separate consent requirement means
      sensitive data consent must be clearly distinguished from general
      processing consent.

  - id: kvkk
    framework_ref: kvkk
    articles: "art. 6"
    has_sensitive_category: true
    definition: >-
      Turkey's KVKK defines special categories of personal data (ozel nitelikli
      kisisel veriler) as data relating to race, ethnic origin, political
      opinion, philosophical belief, religion, sect or other belief, appearance
      and clothing, membership to associations, foundations or trade unions,
      health, sex life, criminal conviction and security measures, and biometric
      and genetic data. Art. 6 establishes a general prohibition on processing
      with specific exceptions.
    categories:
      health:
        classified_sensitive: true
        article: "art. 6(1)"
        special_requirements: >-
          Health data is classified as special category. Processing without
          explicit consent is permitted only by persons or authorized
          institutions under confidentiality obligations for purposes of
          protection of public health, preventive medicine, medical diagnosis,
          treatment and care services, planning and management of health
          services and financing (art. 6(3)). The Personal Data Protection
          Board has issued specific decisions on health data processing.
      biometric:
        classified_sensitive: true
        article: "art. 6(1)"
        special_requirements: >-
          Biometric data is classified as special category. Processing requires
          explicit consent or a legal basis under art. 6(2)-(3). The Personal
          Data Protection Board has issued guidance on biometric identity
          verification systems, requiring proportionality assessment and
          consideration of less intrusive alternatives.
      genetic:
        classified_sensitive: true
        article: "art. 6(1)"
        special_requirements: >-
          Genetic data is classified as special category. Processing requires
          explicit consent or a legal basis. Research use of genetic data must
          comply with the Regulation on Clinical Trials and bioethics
          requirements. The connection between genetic and health data means
          both art. 6 protections and health sector regulations may apply.
      racial_ethnic:
        classified_sensitive: true
        article: "art. 6(1)"
        special_requirements: >-
          Race and ethnic origin are explicitly classified as special category
          data. Processing requires explicit consent or a legal basis under
          art. 6(2). Turkey's multi-ethnic context means this category is
          particularly relevant. Processing for discriminatory purposes is
          prohibited under the Turkish Constitution art. 10.
      political_opinion:
        classified_sensitive: true
        article: "art. 6(1)"
        special_requirements: >-
          Political opinion is classified as special category data. Processing
          requires explicit consent or a legal basis. Political party membership
          data is subject to additional regulation under the Political Parties
          Law (Siyasi Partiler Kanunu No. 2820).
      religion:
        classified_sensitive: true
        article: "art. 6(1)"
        special_requirements: >-
          Religion, sect, or other belief is classified as special category
          data. Processing requires explicit consent or a legal basis. Turkey's
          secularism principle (laiklik) in the Constitution provides additional
          context for protection of religious data. The inclusion of "sect"
          (mezhep) and "other belief" creates broader coverage than some
          jurisdictions.
      sexual_orientation:
        classified_sensitive: true
        article: "art. 6(1) (as sex life — cinsel hayat)"
        special_requirements: >-
          Sex life is classified as special category data, encompassing sexual
          orientation. Processing requires explicit consent. Without consent,
          processing is permitted only by authorized persons under
          confidentiality obligations for health-related purposes.
      trade_union:
        classified_sensitive: true
        article: "art. 6(1)"
        special_requirements: >-
          Membership in associations, foundations, or trade unions is classified
          as special category data. This is broader than GDPR as it includes
          all association memberships, not just trade unions. Processing requires
          explicit consent or a legal basis.
      financial_credit:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Financial and credit data is not classified as special category under
          KVKK. It is subject to general personal data protection requirements.
          The Banking Regulation and Supervision Agency (BDDK) and banking
          secrecy laws provide sector-specific protections for financial data.
      location:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Location data is not classified as special category under KVKK. It is
          personal data subject to general processing requirements. The
          Electronic Communications Law provides additional protections for
          location data processed by telecom operators.
      children:
        classified_sensitive: false
        article: "N/A (general KVKK applies; Turkish Civil Code age of majority)"
        age_threshold: "18 years (Turkish Civil Code)"
        special_requirements: >-
          KVKK does not create a separate sensitive category for children's data
          and does not set a specific age threshold. Consent for children must
          be given by their legal representative under general Turkish Civil
          Code provisions. The Personal Data Protection Board has not issued
          specific guidance on children's data as of 2026.
      criminal_records:
        classified_sensitive: true
        article: "art. 6(1)"
        special_requirements: >-
          Criminal conviction and security measures data is classified as
          special category. Processing without explicit consent is permitted
          only as authorized by law (art. 6(2)). Judicial record data is
          managed by the National Judicial Records Commission and access is
          restricted to authorized purposes.
    processing_legal_bases:
      - "Explicit consent of the data subject (art. 6(2))"
      - "Processing authorized by law (art. 6(2)) for categories other than health and sex life"
      - >-
        Health and sex life data: processing without consent only by persons or
        authorized institutions under confidentiality obligations for specified
        health and public health purposes (art. 6(3))
      - "Adequate measures determined by the Personal Data Protection Board must be in place (art. 6(4))"
    notes: >-
      KVKK's special category framework is heavily influenced by GDPR but has
      notable differences. The inclusion of appearance and clothing (dis gorunus
      ve kiyafet) as special category data is unique to KVKK and reflects
      Turkey's specific socio-political context. The distinction between health
      and sex life data (requiring confidentiality obligations) and other
      special categories (requiring legal authorization) creates a two-tier
      processing framework within special categories. Turkey does not have an
      EU adequacy decision, which affects cross-border data transfers.

  - id: pipeda
    framework_ref: pipeda
    articles: "sec. 2(1), Principle 4.3.4, Schedule 1"
    has_sensitive_category: false
    definition: >-
      PIPEDA does not formally define categories of sensitive personal
      information in the statute. Instead, Principle 4.3.4 of Schedule 1 states
      that the form of consent required for collection, use, or disclosure
      varies depending on the sensitivity of the information, and that certain
      information (such as medical records, income, and information about
      children) is almost always considered sensitive. Sensitivity is determined
      contextually by the nature of the information and the reasonable
      expectations of the individual.
    categories:
      health:
        classified_sensitive: true
        article: "Principle 4.3.4 (Schedule 1); OPC guidance"
        special_requirements: >-
          Medical records are recognized as almost always sensitive under
          Principle 4.3.4. Express consent is generally required for collection,
          use, and disclosure. Provincial health privacy legislation (e.g.,
          Ontario PHIPA, Alberta HIA, Quebec Act respecting the sharing of
          certain health information) may apply instead of PIPEDA for
          health-related data in provincial contexts.
      biometric:
        classified_sensitive: true
        article: "OPC Position on Biometrics; Principle 4.3.4"
        special_requirements: >-
          The Office of the Privacy Commissioner (OPC) has recognized biometric
          data as sensitive in multiple findings. Express consent is generally
          required. The OPC's position paper on biometrics recommends limiting
          collection to what is necessary, using biometric data only for
          authentication, and providing alternatives where possible. Quebec's
          Act respecting the protection of personal information in the private
          sector (Law 25) specifically addresses biometric databases.
      genetic:
        classified_sensitive: true
        article: "Principle 4.3.4; Genetic Non-Discrimination Act (GNDA)"
        special_requirements: >-
          Genetic data is recognized as sensitive under PIPEDA. The Genetic
          Non-Discrimination Act (2017) prohibits requiring genetic testing or
          disclosure of genetic test results as a condition of providing goods
          or services, entering into or continuing a contract, or offering
          specific terms. Express consent is required for collection and
          processing under PIPEDA.
      racial_ethnic:
        classified_sensitive: true
        article: "Principle 4.3.4; OPC guidance"
        special_requirements: >-
          Racial and ethnic origin data is recognized as sensitive under PIPEDA
          contextual analysis. Express consent is generally required. Canada's
          Human Rights Act and provincial human rights codes provide additional
          protections against discriminatory use. Indigenous identity data
          receives particular recognition under Canadian law.
      political_opinion:
        classified_sensitive: true
        article: "Principle 4.3.4; OPC findings"
        special_requirements: >-
          Political opinion data is recognized as contextually sensitive. The OPC
          has addressed political party data handling in several findings. Express
          consent is generally required. The Canada Elections Act provides
          specific rules for political parties' handling of voter data, though
          political parties were not fully subject to PIPEDA until recent
          amendments.
      religion:
        classified_sensitive: true
        article: "Principle 4.3.4"
        special_requirements: >-
          Religious belief data is recognized as sensitive under PIPEDA's
          contextual approach. Express consent is generally required. The
          Canadian Charter of Rights and Freedoms (sec. 2) and human rights
          legislation provide additional protections for freedom of religion.
      sexual_orientation:
        classified_sensitive: true
        article: "Principle 4.3.4; OPC guidance"
        special_requirements: >-
          Sexual orientation data is recognized as sensitive. Express consent is
          generally required. Canada's extensive human rights protections for
          sexual orientation (Canadian Human Rights Act, Charter sec. 15) provide
          additional context. The OPC has addressed LGBTQ+ privacy in guidance.
      trade_union:
        classified_sensitive: true
        article: "Principle 4.3.4"
        special_requirements: >-
          Trade union membership is recognized as contextually sensitive,
          particularly in employment contexts. Express consent is generally
          required. Labor relations legislation provides additional protections
          for union activity data.
      financial_credit:
        classified_sensitive: true
        article: "Principle 4.3.4; OPC guidance"
        special_requirements: >-
          Income and financial information is recognized as almost always
          sensitive under Principle 4.3.4. Express consent is generally required.
          Credit reporting is additionally regulated by provincial credit
          reporting legislation. The Bank Act and financial sector regulations
          impose confidentiality obligations on financial institutions.
      location:
        classified_sensitive: false
        article: "N/A (contextual assessment)"
        special_requirements: >-
          Location data is not specifically identified as sensitive in Principle
          4.3.4 but may be sensitive depending on context. The OPC has found
          continuous location tracking to be a significant privacy concern.
          Implied consent may be insufficient for precise real-time location
          tracking. PIPEDA's reasonableness standard requires assessment of the
          sensitivity of location data in each specific context.
      children:
        classified_sensitive: true
        article: "Principle 4.3.4; OPC guidance on children's privacy"
        age_threshold: "No specific statutory threshold (OPC guidance suggests heightened care for under 13)"
        special_requirements: >-
          Information about children is recognized as almost always sensitive
          under Principle 4.3.4. The OPC has issued extensive guidance on
          children's privacy, recommending meaningful parental consent for
          children under 13 and recognizing that consent processes must be
          age-appropriate. Quebec Law 25 sets 14 as the age threshold for
          consent. Bill C-27 (Digital Charter Implementation Act) proposed
          specific children's data provisions.
      criminal_records:
        classified_sensitive: true
        article: "Principle 4.3.4; Canadian Human Rights Act sec. 3"
        special_requirements: >-
          Criminal record data is recognized as sensitive under PIPEDA.
          Express consent is generally required. The Canadian Human Rights Act
          prohibits discrimination based on conviction for which a pardon has
          been granted. Provincial human rights codes provide additional
          protections. Criminal record checks for employment require consent
          and must be relevant to the position.
    processing_legal_bases:
      - "Express (explicit) consent for sensitive information (Principle 4.3)"
      - "Implied consent may be appropriate only for non-sensitive information"
      - >-
        Exceptions under sec. 7: without consent for journalistic purposes,
        employment relationships, legal proceedings, debt collection, law
        enforcement, public interest (substantially similar provisions)
      - "Reasonable person standard: processing must be appropriate in the circumstances"
    notes: >-
      PIPEDA's contextual approach to sensitivity contrasts sharply with the
      prescriptive categories of GDPR and similar laws. While Principle 4.3.4
      names specific examples (medical records, income, children), the
      determination is ultimately contextual. This means the same data type
      could be sensitive in one context but not another. The OPC's
      interpretation has evolved through findings and guidance to create a
      de facto list of sensitive categories that closely mirrors GDPR. Quebec's
      Law 25 (modernized private sector privacy law) has introduced more
      prescriptive sensitive data provisions, and federal reform through
      Bill C-27 would formalize sensitive data categories.

  - id: popia
    framework_ref: popia
    articles: "sec. 1, sec. 26, sec. 27, sec. 32, sec. 33, sec. 34, sec. 35"
    has_sensitive_category: true
    definition: >-
      South Africa's POPIA defines special personal information as personal
      information concerning religious or philosophical beliefs, race or ethnic
      origin, trade union membership, political persuasion, health or sex life,
      biometric information, or criminal behavior (including allegations of
      criminal behavior). Processing of special personal information is
      generally prohibited under sec. 26 unless a specific exemption under
      sec. 27 applies.
    categories:
      health:
        classified_sensitive: true
        article: "sec. 26(a), sec. 32"
        special_requirements: >-
          Health data is classified as special personal information. Processing
          is prohibited unless an exemption applies. Sec. 32 provides specific
          exemptions for health data processing by medical professionals,
          healthcare institutions, insurance providers for assessing risk,
          and for treatment or social services. Processing must be by or under
          responsibility of a person subject to professional secrecy obligations.
      biometric:
        classified_sensitive: true
        article: "sec. 1, sec. 26(a), sec. 34"
        special_requirements: >-
          Biometric information uniquely identifying a data subject is classified
          as special personal information. Sec. 34 provides a specific exemption
          where biometric processing is for identification and authentication
          purposes, provided that no other less intrusive means can reasonably
          be used and the processing serves a legitimate purpose. Biometric
          templates may be processed if they cannot be attributed to a specific
          individual without additional information.
      genetic:
        classified_sensitive: true
        article: "sec. 26(a) (as health or biometric data depending on context)"
        special_requirements: >-
          Genetic data falls under special personal information either as health
          data or biometric data depending on its specific use. The National
          Health Act and regulations on the use of biological material provide
          additional protections. Genetic testing for insurance underwriting is
          subject to restrictions under sec. 32.
      racial_ethnic:
        classified_sensitive: true
        article: "sec. 26(a), sec. 30"
        special_requirements: >-
          Race or ethnic origin is classified as special personal information.
          Sec. 30 provides specific exemptions for processing to identify data
          subjects where it is necessary for that purpose, and for purposes of
          legislation designed to eliminate discrimination or disadvantage. Given
          South Africa's historical context, race data processing for
          employment equity (Employment Equity Act) and B-BBEE compliance is
          specifically permitted.
      political_opinion:
        classified_sensitive: true
        article: "sec. 26(a), sec. 31"
        special_requirements: >-
          Political persuasion is classified as special personal information.
          Sec. 31 provides exemptions for processing by organizations that
          exist for political purposes regarding their members or supporters.
          The Independent Electoral Commission has specific authority for
          processing political affiliation data for electoral purposes.
      religion:
        classified_sensitive: true
        article: "sec. 26(a), sec. 31"
        special_requirements: >-
          Religious or philosophical beliefs are classified as special personal
          information. Sec. 31 provides exemptions for processing by religious
          or philosophical organizations regarding their members or supporters,
          provided information is not disseminated without consent. South
          Africa's constitutional freedom of religion (sec. 15) provides
          broader protections.
      sexual_orientation:
        classified_sensitive: true
        article: "sec. 26(a)"
        special_requirements: >-
          Sex life data is classified as special personal information. Processing
          is subject to the general prohibition with specific exemptions. South
          Africa's Constitution explicitly protects against discrimination based
          on sexual orientation (sec. 9(3)), providing additional legal context
          for protection of this data category.
      trade_union:
        classified_sensitive: true
        article: "sec. 26(a), sec. 31"
        special_requirements: >-
          Trade union membership is classified as special personal information.
          Sec. 31 provides exemptions for processing by trade unions regarding
          their members or regular contacts, provided information is not
          disseminated without consent. The Labour Relations Act provides
          additional protections for union membership data.
      financial_credit:
        classified_sensitive: false
        article: "N/A (National Credit Act provides separate framework)"
        special_requirements: >-
          Financial and credit data is not classified as special personal
          information under POPIA. The National Credit Act 2005 provides a
          comprehensive framework for credit information, including credit
          bureau regulation, consumer rights to access credit reports, and
          dispute mechanisms. POPIA general provisions apply to financial data
          not covered by the National Credit Act.
      location:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Location data is not classified as special personal information under
          POPIA. General POPIA principles apply. The Electronic Communications
          and Transactions Act provides additional context for electronic
          communications data, including location data collected by service
          providers.
      children:
        classified_sensitive: true
        article: "sec. 35"
        age_threshold: "18 years (Children's Act defines child as under 18)"
        special_requirements: >-
          Children's personal information is specifically addressed in sec. 35.
          Processing requires prior consent of a competent person (parent or
          guardian). Processing is permitted only when necessary for establishing
          the child's age, for a legitimate purpose in the child's best
          interests, or as required by law. A child who is 18 years or older
          may consent independently. Competent persons acting in the child's
          best interest may consent on behalf of children.
      criminal_records:
        classified_sensitive: true
        article: "sec. 26(a), sec. 33"
        special_requirements: >-
          Criminal behavior data, including allegations of criminal behavior,
          is classified as special personal information. Sec. 33 provides
          specific exemptions for processing by responsible parties who are
          authorized by law, by attorneys or legal practitioners for clients,
          and for managing claims and disputes. The inclusion of allegations
          (not just convictions) is broader than many jurisdictions.
    processing_legal_bases:
      - >-
        General prohibition under sec. 26 with exemptions under sec. 27:
        consent of data subject
      - "Processing required by law or for legal obligations (sec. 27(1)(a))"
      - "Processing necessary for employment law obligations (sec. 27(1)(b))"
      - "Processing for historical, statistical, or research purposes (sec. 27(1)(d))"
      - "Data manifestly made public by the data subject (sec. 27(1)(e))"
      - "Processing necessary for legal proceedings (sec. 27(1)(c))"
      - "Specific sectoral exemptions: health (sec. 32), criminal (sec. 33), biometric (sec. 34), children (sec. 35)"
    notes: >-
      POPIA's special personal information framework closely follows GDPR's
      special categories but includes notable additions. The inclusion of
      criminal behavior allegations (not just convictions) provides broader
      protection. Biometric data has a specific exemption regime under sec. 34
      that is more detailed than GDPR's approach. South Africa's historical
      context of apartheid makes race data processing particularly significant,
      with specific exemptions for employment equity and B-BBEE compliance.
      The Children's Act provisions in sec. 35 provide a comprehensive framework
      for children's data that goes beyond many jurisdictions.

  - id: pdpa-thailand
    framework_ref: pdpa-thailand
    articles: "sec. 26, sec. 27, sec. 28, sec. 29"
    has_sensitive_category: true
    definition: >-
      Thailand's PDPA defines sensitive data as personal data pertaining to
      racial or ethnic origin, political opinions, cult, religious or
      philosophical beliefs, sexual behavior, criminal records, health data,
      disability, trade union information, genetic data, biometric data, or
      any other data which affects the data subject in a similar manner as
      prescribed by the Personal Data Protection Committee. Processing of
      sensitive data is prohibited unless a specific exception applies.
    categories:
      health:
        classified_sensitive: true
        article: "sec. 26"
        special_requirements: >-
          Health data is explicitly classified as sensitive data. Processing
          requires explicit consent unless an exception applies under sec. 26.
          The National Health Act and medical professional regulations provide
          additional protections. Explicit consent must be given before or at
          the time of processing.
      biometric:
        classified_sensitive: true
        article: "sec. 26"
        special_requirements: >-
          Biometric data is classified as sensitive data. Processing requires
          explicit consent. The PDPA does not distinguish between biometric data
          used for identification and other purposes, applying the same
          heightened protection to all biometric data processing. National ID
          card biometric data is additionally regulated by the National
          Identification Card Act.
      genetic:
        classified_sensitive: true
        article: "sec. 26"
        special_requirements: >-
          Genetic data is classified as sensitive data. Processing requires
          explicit consent. Research use of genetic data must comply with the
          National Research Ethics Committee guidelines and the Medical Council
          regulations on human research ethics.
      racial_ethnic:
        classified_sensitive: true
        article: "sec. 26"
        special_requirements: >-
          Racial or ethnic origin data is classified as sensitive. Processing
          requires explicit consent unless an exception applies. Thailand's
          diverse ethnic landscape means this category has practical significance
          for hill tribe and indigenous community data.
      political_opinion:
        classified_sensitive: true
        article: "sec. 26"
        special_requirements: >-
          Political opinions are classified as sensitive data. Processing
          requires explicit consent. Political party processing of member data
          is subject to the Organic Act on Political Parties and general PDPA
          requirements.
      religion:
        classified_sensitive: true
        article: "sec. 26"
        special_requirements: >-
          Cult, religious, or philosophical beliefs are classified as sensitive
          data. Processing requires explicit consent. Thailand's Buddhist
          majority context and recognition of religious pluralism means
          religious data handling has cultural significance. Religious
          organizations processing member data must comply with PDPA.
      sexual_orientation:
        classified_sensitive: true
        article: "sec. 26 (as sexual behavior)"
        special_requirements: >-
          Sexual behavior is classified as sensitive data, encompassing sexual
          orientation. Processing requires explicit consent. Thailand has
          enacted the Marriage Equality Act (2024) recognizing same-sex
          partnerships, increasing the significance of appropriate handling
          of sexual orientation data.
      trade_union:
        classified_sensitive: true
        article: "sec. 26"
        special_requirements: >-
          Trade union information is classified as sensitive data. Processing
          requires explicit consent. The Labour Relations Act provides
          additional protections for union membership and activities.
      financial_credit:
        classified_sensitive: false
        article: "N/A (regulated by Credit Information Business Act)"
        special_requirements: >-
          Financial and credit data is not classified as sensitive under PDPA.
          The Credit Information Business Act B.E. 2545 (2002) provides a
          comprehensive framework for credit data. The Bank of Thailand issues
          additional regulations on financial data protection. General PDPA
          principles apply to financial data not covered by sector-specific
          legislation.
      location:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Location data is not classified as sensitive under PDPA. General
          processing principles apply. The NBTC (National Broadcasting and
          Telecommunications Commission) may issue additional requirements for
          telecom operators handling location data.
      children:
        classified_sensitive: false
        article: "sec. 20 (consent for minors)"
        age_threshold: "20 years (age of majority under Thai Civil Code); 10 years minimum for some contexts"
        special_requirements: >-
          Children's data is not classified as sensitive per se under the PDPA.
          For minors (under 20 in Thailand), consent from a person with parental
          authority is required unless the minor is legally competent to consent.
          The Child Protection Act B.E. 2546 (2003) provides additional context.
          The PDPC may issue specific subordinate rules for children's data.
      criminal_records:
        classified_sensitive: true
        article: "sec. 26"
        special_requirements: >-
          Criminal records are classified as sensitive data. Processing requires
          explicit consent or a legal exception. The Criminal Records Act
          regulates access to and use of criminal records. Employers may
          request criminal background checks only where legally required or
          relevant to the position.
    processing_legal_bases:
      - "Explicit consent of the data subject (sec. 26)"
      - "Prevention or suppression of danger to life, body, or health (sec. 26(1))"
      - "Legitimate activities of foundations, associations, or not-for-profit bodies for members (sec. 26(2))"
      - "Data manifestly made public by the data subject (sec. 26(3))"
      - "Necessary for establishment, compliance, or exercise of legal claims (sec. 26(4))"
      - "Compliance with specific laws (sec. 26(5))"
      - "As prescribed by the PDPC committee notification (sec. 26(6))"
    notes: >-
      Thailand's PDPA sensitive data framework is closely modeled on GDPR's
      special categories with similar exceptions. The inclusion of "cult" in
      addition to religious and philosophical beliefs reflects the Thai legal
      tradition. The PDPC has authority to expand sensitive data categories by
      notification. Enforcement began in June 2022 after multiple postponements.
      The PDPC is still developing subordinate regulations and guidelines that
      will further define sensitive data processing requirements.

  - id: coppa
    framework_ref: coppa
    articles: "15 U.S.C. sec. 6501-6506; 16 CFR Part 312"
    has_sensitive_category: false
    definition: >-
      COPPA does not define sensitive data categories in the traditional sense.
      Instead, COPPA regulates the online collection of personal information
      from children under 13 by operators of websites and online services
      directed at children or who have actual knowledge of collecting from
      children. Personal information under COPPA includes full name, address,
      email, phone number, SSN, screen names functioning as online identifiers,
      persistent identifiers for behavioral tracking, photographs, video, audio
      of the child, geolocation, and any combination of data that permits
      contacting a specific individual. All such information collected from
      children under 13 is subject to heightened requirements.
    categories:
      health:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Health data is not specifically addressed by COPPA. However, health
          data about a child collected through a website or online service
          directed at children would be personal information subject to COPPA's
          consent requirements if it can be used to identify the child.
          Health-related apps for children must comply with both COPPA and
          potentially HIPAA if health information is involved.
      biometric:
        classified_sensitive: true
        article: "16 CFR 312.2 (definition of personal information, item 7)"
        special_requirements: >-
          Photographs, video, or audio files containing a child's image or voice
          are classified as personal information under COPPA. This effectively
          covers biometric data that can identify a child. Collection requires
          verifiable parental consent. The FTC has interpreted this to include
          biometric identifiers derived from photos or recordings.
      genetic:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Genetic data is not specifically addressed by COPPA. If genetic data
          could identify a child (which it inherently can), collection through a
          covered website or online service would require verifiable parental
          consent as personal information under COPPA's general provisions.
      racial_ethnic:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Racial and ethnic origin data is not specifically addressed by COPPA.
          If collected from children under 13 through covered websites or online
          services, general COPPA consent requirements would apply if the data
          is combined with other identifiers. Collection of demographic data
          from children that cannot identify them may fall outside COPPA scope.
      political_opinion:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Political opinion data is not addressed by COPPA and is generally not
          relevant to the under-13 context that COPPA covers.
      religion:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Religious data is not specifically addressed by COPPA. If collected in
          combination with identifying information from children under 13 through
          covered services, general COPPA consent requirements apply.
      sexual_orientation:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Sexual orientation data is not addressed by COPPA and is generally not
          relevant to the under-13 context that COPPA covers.
      trade_union:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Trade union data is not addressed by COPPA and is not relevant to the
          under-13 context.
      financial_credit:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Financial data is not specifically addressed by COPPA. However,
          children's in-app purchase data and payment information collected
          through covered services would constitute personal information
          requiring verifiable parental consent.
      location:
        classified_sensitive: true
        article: "16 CFR 312.2 (definition of personal information, item 8)"
        special_requirements: >-
          Geolocation information sufficient to identify a street name and city
          or town is classified as personal information under COPPA. Collection
          of precise geolocation from children under 13 requires verifiable
          parental consent. Apps and services must not collect geolocation data
          from children without prior parental consent.
      children:
        classified_sensitive: true
        article: "15 U.S.C. sec. 6502; 16 CFR 312.3-312.5"
        age_threshold: "13 years"
        special_requirements: >-
          Children's data is the central focus of COPPA. All personal information
          collected from children under 13 through covered websites and online
          services requires verifiable parental consent before collection.
          Operators must post a clear privacy policy, provide direct notice to
          parents, obtain verifiable consent, allow parents to review and delete
          data, and not condition participation on unnecessary data collection.
          The FTC enforces COPPA and has issued substantial fines for violations.
      criminal_records:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Criminal record data is not addressed by COPPA and is not relevant to
          the under-13 context.
    processing_legal_bases:
      - "Verifiable parental consent before collecting personal information from children under 13 (16 CFR 312.5)"
      - >-
        Exceptions: internal operations (support, diagnostics, security) using
        persistent identifiers without contacting the child (16 CFR 312.5(c)(7))
      - "One-time contact exception for responding to a specific request from a child"
      - "Multiple contact exception with notice and opportunity for parent to opt out"
      - "Safety exception for protecting the safety of a child"
      - "FTC-approved self-regulatory program safe harbor (16 CFR 312.11)"
    notes: >-
      COPPA is fundamentally different from general data protection laws. It
      applies only to online collection of personal information from children
      under 13, not to all data processing. The FTC has proposed updates to
      COPPA rules to address modern technologies including voice assistants,
      connected toys, and educational technology. COPPA applies to operators of
      websites and online services, not to all data controllers. The FTC's
      enforcement has resulted in significant penalties, including multi-million
      dollar settlements with major technology companies. COPPA complements but
      does not replace state-level children's privacy laws like California's
      Age-Appropriate Design Code.

  - id: eprivacy
    framework_ref: eprivacy
    articles: "art. 5, art. 6, art. 9, Directive 2002/58/EC (as amended by 2009/136/EC)"
    has_sensitive_category: false
    definition: >-
      The ePrivacy Directive does not define sensitive data categories. It
      regulates the confidentiality of electronic communications and processing
      of traffic and location data in the electronic communications sector.
      The Directive complements GDPR by providing specific rules for electronic
      communications data. Any personal data processed under the ePrivacy
      Directive that qualifies as GDPR special category data is subject to both
      regimes. The proposed ePrivacy Regulation (still pending as of 2026) would
      update and replace the Directive.
    categories:
      health:
        classified_sensitive: false
        article: "N/A (GDPR art. 9 applies if health data is transmitted via electronic communications)"
        special_requirements: >-
          Health data is not specifically addressed by the ePrivacy Directive.
          When health data is communicated electronically, the confidentiality
          provisions of art. 5 apply to the communication itself. The content
          of electronic communications (which may include health data) is
          protected from interception and surveillance. GDPR special category
          protections apply to the underlying health data.
      biometric:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Biometric data is not specifically addressed by the ePrivacy Directive.
          Biometric authentication systems in electronic communications (e.g.,
          voice recognition for telecom services) must comply with general
          confidentiality requirements. GDPR special category provisions apply
          to the biometric data itself.
      genetic:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Genetic data is not addressed by the ePrivacy Directive. GDPR
          provisions apply to genetic data regardless of the communication
          channel.
      racial_ethnic:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Racial and ethnic origin data is not addressed by the ePrivacy
          Directive. GDPR provisions apply to such data transmitted via
          electronic communications.
      political_opinion:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Political opinion data is not addressed by the ePrivacy Directive.
          GDPR provisions apply. The confidentiality of political communications
          via electronic channels is protected under art. 5.
      religion:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Religious data is not addressed by the ePrivacy Directive. GDPR
          provisions apply to religious data transmitted via electronic
          communications.
      sexual_orientation:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Sexual orientation data is not addressed by the ePrivacy Directive.
          GDPR provisions apply. The confidentiality of personal communications
          potentially revealing sexual orientation is protected under art. 5.
      trade_union:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Trade union data is not addressed by the ePrivacy Directive. GDPR
          provisions apply.
      financial_credit:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Financial data is not specifically categorized by the ePrivacy
          Directive. Electronic communications containing financial data
          (e.g., online banking communications) are protected by the
          confidentiality provisions of art. 5. Payment Services Directive
          (PSD2) provides additional protections for electronic payment data.
      location:
        classified_sensitive: true
        article: "art. 9"
        special_requirements: >-
          Location data other than traffic data is specifically regulated under
          art. 9. Processing is only permitted when data is anonymized or with
          user consent for value-added services. Consent must be obtained before
          processing. Users must be informed of the type of location data, the
          purpose and duration of processing, and whether data will be
          transmitted to third parties. Users must have the ability to withdraw
          consent and temporarily refuse processing at any time using a simple
          means free of charge. This is one of the few data types specifically
          regulated by the ePrivacy Directive.
      children:
        classified_sensitive: false
        article: "N/A"
        age_threshold: "N/A (GDPR art. 8 applies for information society services)"
        special_requirements: >-
          Children's data is not specifically addressed by the ePrivacy
          Directive. GDPR age of consent provisions for information society
          services (art. 8) apply when electronic communications services
          involve children's data. Member state implementations may include
          specific child protection provisions.
      criminal_records:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Criminal record data is not addressed by the ePrivacy Directive.
          However, art. 15 allows member states to restrict the confidentiality
          obligations for purposes of national security, defense, and
          prevention, investigation, detection, and prosecution of criminal
          offences. Law enforcement access to communications data must comply
          with national implementing legislation and CJEU case law (Digital
          Rights Ireland, Tele2/Watson).
    processing_legal_bases:
      - "Consent of the subscriber or user (art. 5(3) for cookies/similar technologies)"
      - "Strictly necessary for transmission of a communication (art. 5(1))"
      - "Necessary for billing purposes (art. 6 for traffic data)"
      - "Consent for value-added services (art. 6(3) for traffic data, art. 9 for location data)"
      - "Member state exceptions for national security, defense, criminal investigation (art. 15)"
    notes: >-
      The ePrivacy Directive operates as lex specialis to GDPR for electronic
      communications. It does not create its own sensitive data classification
      but protects all electronic communications content through confidentiality
      provisions regardless of sensitivity. Location data receives the most
      specific protection among data types. The proposed ePrivacy Regulation
      has been under negotiation since 2017 and would modernize the framework
      to cover OTT services (WhatsApp, Signal, etc.) and machine-to-machine
      communications. Until the Regulation is adopted, the 2002 Directive as
      amended in 2009 remains in effect, implemented through national laws of
      EU/EEA member states.

  - id: ferpa
    framework_ref: ferpa
    articles: "20 U.S.C. sec. 1232g; 34 CFR Part 99"
    has_sensitive_category: false
    definition: >-
      FERPA does not define sensitive data categories. Instead, it protects
      education records, defined as records directly related to a student and
      maintained by an educational agency or institution or by a party acting
      for the agency or institution. FERPA applies to educational institutions
      receiving federal funding. The concept of directory information (name,
      address, dates of attendance, honors) may be disclosed without consent,
      while all other education records require consent. FERPA creates a
      uniform protection standard for all education records rather than
      tiered sensitivity categories.
    categories:
      health:
        classified_sensitive: true
        article: "34 CFR 99.3 (education records include health records maintained by schools)"
        special_requirements: >-
          Health records maintained by an educational institution are education
          records under FERPA. This includes school nurse records, counseling
          records, and records of accommodations for health conditions. However,
          records maintained by physicians, psychiatrists, or psychologists for
          treatment purposes only and available only to treatment providers are
          excluded as treatment records (34 CFR 99.3). HIPAA generally does not
          apply to education records covered by FERPA (HIPAA/FERPA joint
          guidance).
      biometric:
        classified_sensitive: false
        article: "N/A (not specifically addressed)"
        special_requirements: >-
          Biometric data is not specifically addressed by FERPA. If biometric
          data (e.g., fingerprints for school lunch programs) is maintained in
          education records, it would be protected under FERPA's general consent
          requirements. Biometric data not linked to education records may fall
          outside FERPA scope.
      genetic:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Genetic data is not specifically addressed by FERPA. If included in
          education records (e.g., genetic testing results relevant to special
          education services), it would receive FERPA protection. Genetic data
          collected in university research contexts may be subject to IRB
          requirements rather than FERPA.
      racial_ethnic:
        classified_sensitive: false
        article: "34 CFR 99.3 (may be directory information); NCES data standards"
        special_requirements: >-
          Racial and ethnic origin data may be classified as directory
          information by an institution, but most institutions do not include it
          in their directory information designation. When maintained in
          education records, it is subject to FERPA consent requirements.
          Aggregate racial and ethnic data is reported under NCES requirements
          and is not individually identifiable.
      political_opinion:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Political opinion data is not specifically addressed by FERPA. If
          included in education records (e.g., student government activities),
          general FERPA protections apply. Academic freedom protections may
          limit institutional collection of political opinion data.
      religion:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Religious data is not specifically addressed by FERPA. Religious
          educational institutions may collect religious affiliation data from
          students; if maintained in education records, FERPA protections apply.
          The religious mission exemption under Title IX may affect data handling
          at religious institutions.
      sexual_orientation:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Sexual orientation data is not specifically addressed by FERPA. If
          included in education records (e.g., in disciplinary or counseling
          records), FERPA protections apply. Title IX protections (as
          interpreted through regulation and case law) provide additional
          context for handling sexual orientation information in educational
          settings.
      trade_union:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Trade union data is not relevant to student education records under
          FERPA. Faculty and staff union data at educational institutions falls
          outside FERPA scope entirely (FERPA applies only to student records).
      financial_credit:
        classified_sensitive: true
        article: "34 CFR 99.3 (education records include financial aid records)"
        special_requirements: >-
          Financial aid records, including Free Application for Federal Student
          Aid (FAFSA) data, are education records under FERPA. This includes
          family income, tax information, and financial need assessments.
          Disclosure requires consent unless an exception applies. The IRS has
          specific agreements with the Department of Education for FAFSA data
          sharing. Student account and billing records maintained by the
          institution are also education records.
      location:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Location data is not specifically addressed by FERPA. School
          attendance records (which implicitly contain location information) are
          education records. GPS tracking of students or location monitoring
          systems would need to comply with FERPA if the data becomes part of
          education records.
      children:
        classified_sensitive: false
        article: "20 U.S.C. sec. 1232g(d); 34 CFR 99.5"
        age_threshold: "18 years (FERPA rights transfer to student at age 18 or upon attending postsecondary institution)"
        special_requirements: >-
          FERPA applies to education records of all students regardless of age.
          Parents have FERPA rights for children under 18 (or until attending
          postsecondary institution). Rights transfer to the student at age 18
          (eligible student). Parents of dependent students attending
          postsecondary institutions may access records under the tax dependency
          exception. COPPA may also apply to online educational services
          collecting data from children under 13.
      criminal_records:
        classified_sensitive: true
        article: "20 U.S.C. sec. 1232g(b)(6); Campus Security Act (Clery Act)"
        special_requirements: >-
          Disciplinary records are education records under FERPA with specific
          exceptions. Institutions may disclose the final results of
          disciplinary proceedings for crimes of violence or non-forcible sex
          offenses without consent. The Clery Act requires disclosure of campus
          crime statistics. Law enforcement unit records maintained separately
          from education records are excluded from FERPA (34 CFR 99.8). Sex
          offender registry information may be disclosed under sec. 1232g(b)(7).
    processing_legal_bases:
      - "Written consent of parent (or eligible student if 18+) before disclosure (34 CFR 99.30)"
      - "Directory information after public notice and opt-out opportunity (34 CFR 99.37)"
      - "School officials with legitimate educational interest (34 CFR 99.31(a)(1))"
      - "Transfer to another school where student seeks enrollment (34 CFR 99.31(a)(2))"
      - "Federal and state education authorities for auditing and evaluation (34 CFR 99.31(a)(3))"
      - "Financial aid purposes (34 CFR 99.31(a)(4))"
      - "Health or safety emergency (34 CFR 99.31(a)(10))"
      - "Judicial order or lawfully issued subpoena (34 CFR 99.31(a)(9))"
      - "De-identified records with no reasonable basis for identification"
    notes: >-
      FERPA fundamentally differs from GDPR-style sensitive data frameworks.
      It protects a category of records (education records) rather than
      categories of data types. Any information in an education record receives
      the same baseline protection regardless of its nature. The primary
      mechanism is controlling disclosure, not regulating processing purposes.
      FERPA enforcement is through the Family Policy Compliance Office (FPCO)
      in the Department of Education, which can threaten withdrawal of federal
      funding but does not impose fines. The intersection of FERPA, HIPAA, and
      COPPA creates compliance complexity for educational technology providers
      and institutions.

  - id: glba
    framework_ref: glba
    articles: "15 U.S.C. sec. 6801-6809; 12 CFR Part 1016 (Regulation P)"
    has_sensitive_category: false
    definition: >-
      GLBA does not define sensitive data categories. Instead, it regulates
      nonpublic personal information (NPI), defined as personally identifiable
      financial information provided by a consumer to a financial institution,
      resulting from a transaction with the consumer, or otherwise obtained by
      the financial institution. NPI excludes publicly available information.
      GLBA applies to financial institutions broadly defined, including banks,
      securities firms, insurance companies, and entities significantly engaged
      in financial activities. All NPI receives uniform protection under the
      Safeguards Rule, Financial Privacy Rule, and Pretexting provisions.
    categories:
      health:
        classified_sensitive: false
        article: "N/A (unless collected by financial institution in financial context)"
        special_requirements: >-
          Health data is not specifically regulated by GLBA. However, health
          information collected by insurance companies (which are financial
          institutions under GLBA) in the course of underwriting or claims
          processing constitutes NPI and is protected. The intersection of GLBA
          and HIPAA is relevant for health insurance companies, which must
          comply with both frameworks for different aspects of their operations.
      biometric:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Biometric data is not specifically addressed by GLBA. Biometric
          authentication data used by financial institutions for customer
          verification would be part of the institution's security measures
          under the Safeguards Rule (16 CFR Part 314) and must be protected
          accordingly.
      genetic:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Genetic data is not addressed by GLBA. The Genetic Information
          Nondiscrimination Act (GINA) provides separate protections against
          use of genetic information in health insurance underwriting, which
          intersects with GLBA-regulated insurance activities.
      racial_ethnic:
        classified_sensitive: false
        article: "N/A (fair lending laws provide separate protections)"
        special_requirements: >-
          Racial and ethnic origin data is not classified by GLBA. However, the
          Equal Credit Opportunity Act (ECOA) and Fair Housing Act prohibit
          financial institutions from using race or ethnicity in credit and
          lending decisions. The Home Mortgage Disclosure Act (HMDA) requires
          collection of race and ethnicity data for fair lending monitoring,
          subject to its own disclosure rules.
      political_opinion:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Political opinion data is not addressed by GLBA. Financial
          institutions collecting political affiliation data (e.g., for
          compliance with political contribution regulations) must protect it
          as NPI if it was obtained in a financial context.
      religion:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Religious data is not addressed by GLBA. Equal Credit Opportunity Act
          prohibits discrimination on the basis of religion in credit decisions.
      sexual_orientation:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Sexual orientation data is not addressed by GLBA. Anti-discrimination
          regulations may restrict use of sexual orientation data in financial
          services decisions.
      trade_union:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Trade union data is not addressed by GLBA.
      financial_credit:
        classified_sensitive: true
        article: "15 U.S.C. sec. 6809(4); 12 CFR 1016.3(p)"
        special_requirements: >-
          Financial data is the core of GLBA's protection regime. Nonpublic
          personal information includes account numbers, account balances,
          transaction history, credit/debit card numbers, income information,
          credit scores, Social Security numbers, and any information collected
          through cookies or other means in connection with financial products
          or services. Financial institutions must provide initial and annual
          privacy notices, allow consumers to opt out of third-party sharing,
          and implement comprehensive information security programs under the
          Safeguards Rule (16 CFR Part 314, updated 2023).
      location:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Location data is not specifically addressed by GLBA. Transaction
          location data (e.g., ATM locations, point-of-sale data) collected by
          financial institutions is part of NPI and protected under the general
          framework. The FTC Safeguards Rule requires protection of all
          customer information, which would include location data collected
          in the course of financial activities.
      children:
        classified_sensitive: false
        article: "N/A"
        age_threshold: "N/A (GLBA does not set age thresholds)"
        special_requirements: >-
          GLBA does not create specific protections for children's financial
          data beyond the general NPI framework. Minors' custodial accounts and
          educational savings accounts are subject to the same NPI protections.
          COPPA may apply to online financial services directed at children.
          State laws may impose additional requirements for financial products
          offered to minors.
      criminal_records:
        classified_sensitive: false
        article: "N/A"
        special_requirements: >-
          Criminal record data is not specifically addressed by GLBA. Financial
          institutions may use criminal background checks in employment contexts,
          subject to the Fair Credit Reporting Act (FCRA). Suspicious Activity
          Reports (SARs) filed with FinCEN contain crime-related information
          and are subject to strict confidentiality under the Bank Secrecy Act.
    processing_legal_bases:
      - "Financial Privacy Rule: consumers must receive privacy notices and opt-out rights before NPI sharing with nonaffiliated third parties"
      - >-
        Exceptions to opt-out: sharing with service providers under
        contractual protections, joint marketing agreements, processing
        transactions requested by the consumer, and other enumerated exceptions
        (15 U.S.C. sec. 6802(e))
      - "Affiliate sharing: consumers may opt out of affiliate sharing for marketing under FCRA sec. 624"
      - >-
        Safeguards Rule: financial institutions must develop, implement, and
        maintain a comprehensive information security program (16 CFR Part 314)
      - "Pretexting provisions: obtaining NPI through false pretenses is a federal crime (15 U.S.C. sec. 6821-6827)"
    notes: >-
      GLBA is a sector-specific law that protects financial data through
      institutional obligations rather than data type classifications. The
      definition of financial institution is broad and includes entities not
      traditionally considered financial institutions, such as tax preparers,
      real estate appraisers, and retailers issuing credit cards. The 2023
      update to the Safeguards Rule (16 CFR Part 314) significantly
      strengthened security requirements, including mandating encryption,
      access controls, multi-factor authentication, and incident response
      plans. GLBA's opt-out model for third-party sharing contrasts with
      GDPR's opt-in consent approach. Data covered by GLBA is exempt from
      CCPA/CPRA to the extent already regulated by GLBA, creating a
      preemption dynamic in California.
