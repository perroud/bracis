id: penalties-matrix
title: "Cross-Framework Penalty Structure Comparison"
last_updated: "2026-04-05"
description: >
  Comparative matrix of penalty and enforcement structures across all frameworks
  with defined penalties. Covers monetary fines, criminal penalties, operational
  sanctions, and private rights of action.

frameworks:
  - id: gdpr
    framework_ref: gdpr
    penalty_structure:
      max_monetary:
        tier_1:
          amount: "EUR 10,000,000 or 2% of total worldwide annual turnover"
          calculation_basis: "Higher of fixed amount or percentage of global group turnover"
          applies_to: "Obligations of controller/processor, certification body, monitoring body (art. 83(4))"
        tier_2:
          amount: "EUR 20,000,000 or 4% of total worldwide annual turnover"
          calculation_basis: "Higher of fixed amount or percentage of global group turnover"
          applies_to: "Basic principles, data subject rights, international transfers (art. 83(5-6))"
      criminal_penalties:
        available: true
        details: "Determined by member state law; GDPR allows member states to lay down criminal penalties (art. 84)"
        examples:
          - "Germany: up to 3 years imprisonment for unlawful commercial data processing"
          - "France: up to 5 years imprisonment and EUR 300,000 fine"
          - "Italy: criminal sanctions for unlawful processing under Codice Privacy"
      operational_penalties:
        - "Temporary or definitive limitation or ban on processing"
        - "Order to bring processing into compliance"
        - "Order to communicate a personal data breach to the data subject"
        - "Suspension of data flows to a recipient in a third country"
      private_right_of_action:
        available: true
        basis: "Art. 79 (right to effective judicial remedy); Art. 80 (representation by not-for-profit bodies); Art. 82 (right to compensation)"
        scope: "Any person who has suffered material or non-material damage"
      aggravating_factors:
        - "Nature, gravity, and duration of the infringement"
        - "Intentional or negligent character"
        - "Actions taken to mitigate damage"
        - "Degree of responsibility considering technical and organizational measures"
        - "Previous infringements"
        - "Degree of cooperation with the supervisory authority"
        - "Categories of personal data affected"
      notable_fines:
        - "Meta/Facebook: EUR 1.2B (2023, data transfers to US)"
        - "Amazon: EUR 746M (2021, behavioral advertising)"
        - "WhatsApp: EUR 225M (2021, transparency)"

  - id: lgpd
    framework_ref: lgpd
    penalty_structure:
      max_monetary:
        amount: "BRL 50,000,000 per infraction (approx. USD 10M)"
        calculation_basis: "Per infraction; 2% of revenue in Brazil of the private legal entity, group, or conglomerate"
        cap: "Limited to BRL 50,000,000 per infraction"
        daily_fine: "Available to compel cessation of violations"
      criminal_penalties:
        available: false
        details: "LGPD does not establish criminal penalties directly; however, existing Brazilian criminal law (e.g., Lei 12.737/2012 - Carolina Dieckmann Law) may apply"
      operational_penalties:
        - "Warning with deadline for corrective measures"
        - "Simple fine (up to 2% of revenue, capped at BRL 50M per infraction)"
        - "Daily fine"
        - "Public disclosure of the infraction after confirmation"
        - "Blocking of personal data related to the infraction"
        - "Deletion of personal data related to the infraction"
        - "Partial suspension of database for up to 6 months (renewable)"
        - "Partial suspension of data processing activities for up to 6 months (renewable)"
        - "Total prohibition of data processing activities"
      private_right_of_action:
        available: true
        basis: "Art. 42 (right to compensation); consumer protection code (CDC) provisions"
        scope: "Any holder who suffers material or moral damage due to violation of LGPD"
        collective_actions: "Public Ministry (Ministerio Publico) and consumer defense entities may file collective actions"
      aggravating_factors:
        - "Gravity and nature of the infraction"
        - "Good faith of the infringer"
        - "Economic advantage obtained or intended"
        - "Economic condition of the infringer"
        - "Recidivism"
        - "Degree of damage"
        - "Cooperation of the infringer"
        - "Adoption of internal mechanisms and procedures for data protection"
        - "Adoption of good practices and governance policies"
        - "Prompt adoption of corrective measures"
        - "Proportionality between gravity and intensity of the sanction"

  - id: ccpa-cpra
    framework_ref: ccpa-cpra
    penalty_structure:
      max_monetary:
        intentional_violation: "USD 7,500 per intentional violation"
        unintentional_violation: "USD 2,500 per unintentional violation"
        calculation_basis: "Per violation (each affected consumer may constitute a separate violation)"
        enforcement: "California Privacy Protection Agency (CPPA) and California Attorney General"
      criminal_penalties:
        available: false
        details: "No criminal penalties under CCPA/CPRA; other California statutes may apply (e.g., Penal Code sec. 502 for computer crimes)"
      operational_penalties:
        - "Injunctive relief"
        - "Cease and desist orders"
        - "Orders to comply with specific provisions"
      private_right_of_action:
        available: true
        basis: "Cal. Civ. Code sec. 1798.150"
        scope: "Limited to data breaches resulting from failure to implement reasonable security procedures"
        damages: "USD 100-750 per consumer per incident or actual damages (whichever is greater)"
        requirements:
          - "30-day cure period: consumer must give business 30-day notice before filing (if business can cure)"
          - "Only for nonencrypted/nonredacted personal information"
        class_actions: "Class action lawsuits are common under this provision"
      notable_settlements:
        - "Sephora: USD 1.2M (2022, selling personal information without opt-out)"

  - id: hipaa
    framework_ref: hipaa
    penalty_structure:
      max_monetary:
        tier_1:
          amount: "USD 137-68,928 per violation"
          description: "Did not know and would not have known"
        tier_2:
          amount: "USD 1,379-68,928 per violation"
          description: "Reasonable cause, not willful neglect"
        tier_3:
          amount: "USD 13,785-68,928 per violation"
          description: "Willful neglect, corrected within 30 days"
        tier_4:
          amount: "USD 68,928-2,067,813 per violation"
          description: "Willful neglect, not corrected"
        annual_cap: "USD 2,067,813 per identical provision per calendar year"
        calculation_basis: "Per violation; adjusted for inflation annually"
        enforcement: "HHS Office for Civil Rights (OCR)"
      criminal_penalties:
        available: true
        tier_1:
          amount: "Up to USD 50,000 and 1 year imprisonment"
          description: "Knowingly obtaining or disclosing PHI"
        tier_2:
          amount: "Up to USD 100,000 and 5 years imprisonment"
          description: "Offense committed under false pretenses"
        tier_3:
          amount: "Up to USD 250,000 and 10 years imprisonment"
          description: "Offense committed with intent to sell, transfer, or use for commercial advantage, personal gain, or malicious harm"
        enforcement: "U.S. Department of Justice (DOJ)"
      operational_penalties:
        - "Corrective action plans"
        - "Resolution agreements"
        - "Exclusion from federal healthcare programs (extreme cases)"
      private_right_of_action:
        available: false
        details: "No private right of action under HIPAA; enforcement is exclusively through HHS/OCR and DOJ"
        alternatives: "State attorneys general may bring actions; state tort law may provide avenue for individuals"
      notable_settlements:
        - "Anthem Inc: USD 16M (2018, breach affecting 79M individuals)"
        - "Premera Blue Cross: USD 6.85M (2020)"
        - "Banner Health: USD 1.25M (2023)"

  - id: dora
    framework_ref: dora
    penalty_structure:
      max_monetary:
        financial_entities: "Determined by member state national law; must be effective, proportionate, and dissuasive"
        critical_ict_providers:
          amount: "1% of average daily worldwide turnover of the preceding business year per day of non-compliance"
          calculation_basis: "Daily worldwide turnover; imposed by Lead Overseer"
          cap: "Maximum 6 months of daily penalties"
      criminal_penalties:
        available: true
        details: "Member states may provide for criminal sanctions in their transposition (art. 50(3))"
      operational_penalties:
        - "Periodic penalty payments (for critical ICT third-party providers)"
        - "Orders to cease activities or practices contrary to DORA"
        - "Public statements identifying the entity and the nature of the breach"
        - "Requests for injunctive relief"
        - "Temporary suspension of critical ICT provider services"
        - "Termination of contractual arrangements with non-compliant ICT providers"
      private_right_of_action:
        available: false
        details: "DORA does not establish a private right of action; enforcement is through competent authorities and Lead Overseers"

  - id: nis2
    framework_ref: nis2
    penalty_structure:
      max_monetary:
        essential_entities:
          amount: "EUR 10,000,000 or 2% of total worldwide annual turnover, whichever is higher"
          calculation_basis: "Higher of fixed amount or percentage of global turnover"
        important_entities:
          amount: "EUR 7,000,000 or 1.4% of total worldwide annual turnover, whichever is higher"
          calculation_basis: "Higher of fixed amount or percentage of global turnover"
      criminal_penalties:
        available: true
        details: "Member states may provide for criminal sanctions in national transposition"
      operational_penalties:
        - "Binding instructions to remedy deficiencies"
        - "Orders to implement security audit recommendations"
        - "Orders to bring security measures into compliance"
        - "Temporary suspension of certifications or authorizations for essential entities"
        - "Temporary ban on exercising managerial functions at C-suite/board level for essential entities"
        - "Administrative fines"
      private_right_of_action:
        available: false
        details: "NIS 2 does not establish a direct private right of action; enforcement is through national competent authorities"
      management_liability:
        personal: true
        details: "Natural persons in management bodies of essential entities may be held personally liable for ensuring compliance (art. 20)"

  - id: pci-dss-v4
    framework_ref: pci-dss-v4
    penalty_structure:
      max_monetary:
        amount: "USD 5,000-100,000 per month of non-compliance"
        calculation_basis: "Monthly assessment by card brands; passed through acquiring bank to merchant"
        enforcement: "Card brands (Visa, Mastercard, Amex, Discover, JCB) through contractual agreements"
      criminal_penalties:
        available: false
        details: "PCI DSS is contractual, not law; no criminal penalties directly"
      operational_penalties:
        - "Increased transaction fees"
        - "Mandatory quarterly network scans by ASV"
        - "Mandatory forensic investigation at merchant's expense"
        - "Downgrade to higher-risk merchant category"
        - "Suspension of card acceptance privileges"
        - "Permanent termination of card acceptance"
        - "Placement on Terminated Merchant File (TMF/MATCH list)"
      private_right_of_action:
        available: false
        details: "No direct private right of action under PCI DSS; affected parties may pursue claims under state breach notification laws, negligence, or contract law"
      liability_for_fraud:
        available: true
        details: "Non-compliant merchants may be held liable for fraudulent transactions resulting from a breach"

  - id: sox
    framework_ref: sox
    penalty_structure:
      max_monetary:
        individual:
          amount: "USD 5,000,000"
          applies_to: "Individual officers (CEO, CFO)"
        entity:
          amount: "USD 25,000,000"
          applies_to: "Corporate entities"
        sec_civil_penalties: "Additional SEC civil monetary penalties per violation"
      criminal_penalties:
        available: true
        section_802:
          description: "Destruction, alteration, or falsification of records"
          penalty: "Up to 20 years imprisonment"
        section_806:
          description: "Retaliation against whistleblowers"
          penalty: "Up to 10 years imprisonment"
        section_906:
          description: "Certification of materially false financial statements"
          willful_penalty: "Up to USD 5,000,000 and 20 years imprisonment"
          knowing_penalty: "Up to USD 1,000,000 and 10 years imprisonment"
        section_1107:
          description: "Retaliation against informants"
          penalty: "Up to 10 years imprisonment"
      operational_penalties:
        - "SEC officer and director bars"
        - "Disgorgement of ill-gotten profits"
        - "Cease-and-desist orders"
        - "Suspension or revocation of registration"
        - "Prohibition from practicing before the SEC"
        - "Clawback of incentive-based compensation (Section 304)"
      private_right_of_action:
        available: true
        basis: "Whistleblower protections (Section 806); securities fraud actions under SEC rules"
        scope: "Employees may bring retaliation claims; investors may bring securities fraud claims"

  - id: eu-ai-act
    framework_ref: eu-ai-act
    penalty_structure:
      max_monetary:
        prohibited_practices:
          amount: "EUR 35,000,000 or 7% of total worldwide annual turnover"
          calculation_basis: "Higher of fixed amount or percentage of global turnover"
          applies_to: "Violations of prohibited AI practices (art. 5)"
        high_risk_obligations:
          amount: "EUR 15,000,000 or 3% of total worldwide annual turnover"
          calculation_basis: "Higher of fixed amount or percentage of global turnover"
          applies_to: "Non-compliance with high-risk AI requirements"
        incorrect_information:
          amount: "EUR 7,500,000 or 1% of total worldwide annual turnover"
          calculation_basis: "Higher of fixed amount or percentage of global turnover"
          applies_to: "Supply of incorrect, incomplete, or misleading information to authorities"
        sme_and_startup_reduction:
          description: "The lower of the fixed amount or percentage applies (not the higher)"
          applies_to: "SMEs, including startups"
      criminal_penalties:
        available: true
        details: "Member states may provide for criminal sanctions; the regulation itself does not define specific criminal penalties"
      operational_penalties:
        - "Withdrawal or recall of non-compliant AI systems from the market"
        - "Prohibition of placing or making available non-compliant AI systems"
        - "Restrictions on the use of AI systems"
        - "Orders to bring AI systems into conformity"
        - "Market surveillance actions"
      private_right_of_action:
        available: true
        basis: "Art. 85 (right to lodge complaint with market surveillance authority); national implementation may provide for civil liability"
        scope: "Affected persons may complain to supervisory authorities; AI Liability Directive (proposed) would complement with civil liability framework"

  - id: bacen-4893
    framework_ref: bacen-4893
    penalty_structure:
      max_monetary:
        amount: "Determined by BCB administrative process; fines vary per type of infraction"
        calculation_basis: "BCB discretion within CMN penalty framework"
        enforcement: "Banco Central do Brasil (BCB)"
      criminal_penalties:
        available: true
        details: "Brazilian financial crimes law (Lei 7.492/1986) provides criminal penalties for certain financial sector violations"
        examples:
          - "Management fraud: 2-12 years imprisonment"
          - "Unauthorized financial institution operation: 1-4 years imprisonment"
      operational_penalties:
        - "Warning (advertencia)"
        - "Fine"
        - "Temporary ineligibility of officers (inabilitacao) for up to 20 years"
        - "Cancellation of authorization to operate"
        - "Intervention in the institution"
        - "Extrajudicial liquidation"
      private_right_of_action:
        available: true
        basis: "Brazilian civil law and consumer protection code (CDC)"
        scope: "Customers may pursue civil damages for losses resulting from cybersecurity failures"

  - id: apra-cps-234
    framework_ref: apra-cps-234
    penalty_structure:
      max_monetary:
        amount: "No specific monetary penalty defined in CPS 234"
        enforcement: "APRA enforcement through prudential supervisory powers"
      criminal_penalties:
        available: false
        details: "CPS 234 does not provide for criminal penalties; APRA may refer matters to ASIC or AFP for prosecution under other legislation"
      operational_penalties:
        - "Enforceable undertakings"
        - "Directions to take specific actions (Section 11CA of Banking Act 1959)"
        - "Additional license conditions"
        - "Increased capital adequacy requirements"
        - "Disqualification of responsible persons"
        - "Referral to ASIC, AFP, or other authorities"
        - "Revocation of authorization to carry on business"
      private_right_of_action:
        available: false
        details: "No direct private right of action under CPS 234; affected parties may pursue claims under general Australian law"

  - id: swift-csp
    framework_ref: swift-csp
    penalty_structure:
      max_monetary:
        amount: "No direct monetary fines"
        enforcement: "Contractual enforcement through SWIFT membership terms"
      criminal_penalties:
        available: false
        details: "SWIFT CSP is contractual; no criminal penalties"
      operational_penalties:
        - "Non-compliance reported to counterparties via attestation status"
        - "Mandatory reporting to local supervisors"
        - "Potential network disconnection for persistent non-compliance"
        - "Reputational damage via public attestation transparency"
      private_right_of_action:
        available: false
        details: "No private right of action; contractual remedies between counterparties may apply"

  - id: fisma
    framework_ref: fisma
    penalty_structure:
      max_monetary:
        amount: "No direct monetary fines on agencies"
        enforcement: "OMB oversight and congressional accountability"
      criminal_penalties:
        available: true
        details: "Federal employees may face criminal prosecution under 18 USC 1030 (Computer Fraud and Abuse Act) for willful violations"
      operational_penalties:
        - "OMB budget restrictions"
        - "GAO audit findings and public reports"
        - "ATO (Authorization to Operate) revocation for specific systems"
        - "Congressional hearings and oversight"
        - "Agency IG (Inspector General) investigations"
        - "Contractor debarment or suspension"
      private_right_of_action:
        available: false
        details: "No private right of action under FISMA"

  - id: marco-civil
    framework_ref: marco-civil
    penalty_structure:
      max_monetary:
        amount: "10% of gross revenue of the economic group in Brazil in the preceding fiscal year (per infraction)"
        calculation_basis: "Percentage of gross revenue in Brazil"
        enforcement: "Judicial enforcement; ANPD and consumer protection agencies"
      criminal_penalties:
        available: false
        details: "Marco Civil does not define criminal penalties directly; other legislation may apply (e.g., Lei 12.737/2012 for unauthorized access)"
      operational_penalties:
        - "Warning with deadline for corrective measures"
        - "Fine of up to 10% of gross revenue in Brazil"
        - "Temporary suspension of activities (judicial order required)"
        - "Prohibition of activities (judicial order required)"
      private_right_of_action:
        available: true
        basis: "Art. 7 and general Brazilian civil procedural law"
        scope: "Users may seek compensation for privacy violations and unauthorized disclosure"

  - id: pipl
    framework_ref: pipl
    penalty_structure:
      max_monetary:
        standard_violations:
          amount: "CNY 1,000,000 per entity; CNY 100,000 per directly responsible individual"
          calculation_basis: "Fixed amount per violation"
          applies_to: "General violations of PIPL provisions"
        serious_violations:
          amount: "CNY 50,000,000 or 5% of annual revenue of the preceding year"
          calculation_basis: "Higher of fixed amount or percentage of prior year's annual revenue"
          applies_to: "Serious violations (art. 66): grave circumstances, large-scale impact, or refusal to correct"
          individual_penalty: "CNY 100,000-1,000,000 for directly responsible persons; may be banned from serving as director, supervisor, or senior management"
      criminal_penalties:
        available: true
        details: "Criminal liability under PRC Criminal Law for illegal collection, sale, or provision of personal information (art. 253-1)"
        examples:
          - "Selling or providing personal information: up to 7 years imprisonment"
          - "Illegal access to personal information via hacking: up to 3-7 years under art. 285"
      operational_penalties:
        - "Order to correct the violation"
        - "Confiscation of illegal income"
        - "Suspension or termination of application services"
        - "Revocation of business license or operating permit"
        - "Ban on responsible persons holding management positions"
      private_right_of_action:
        available: true
        basis: "Art. 69 (right to claim compensation); art. 70 (public interest litigation by People's Procuratorate or consumer organizations)"
        scope: "Individuals may claim damages; burden of proof on the personal information handler to prove no fault"
      notable_enforcement:
        - "Didi Global: CNY 8.026B (approx. USD 1.19B, 2022) for violations of PIPL, DSL, and Cybersecurity Law"

  - id: dpdp-india
    framework_ref: dpdp-india
    penalty_structure:
      max_monetary:
        breach_of_security_safeguards:
          amount: "INR 250 crore (approx. USD 30M)"
          calculation_basis: "Fixed amount per instance; schedule item 2"
          applies_to: "Failure to take reasonable security safeguards to prevent personal data breach"
        failure_to_notify:
          amount: "INR 200 crore (approx. USD 24M)"
          applies_to: "Failure to notify the Board and affected data principals of a personal data breach"
        children_data:
          amount: "INR 200 crore (approx. USD 24M)"
          applies_to: "Breach of obligations regarding processing of children's personal data"
        other_violations:
          amount: "INR 50 crore (approx. USD 6M)"
          applies_to: "Breach of any other provision, duty, or failure to observe terms"
      criminal_penalties:
        available: false
        details: "DPDP Act 2023 does not provide for criminal penalties; however, IT Act 2000 (sec. 43A, 72A) may apply for certain unauthorized disclosures"
      operational_penalties:
        - "Directions by the Data Protection Board to take specific actions"
        - "Blocking of access to platforms/intermediaries (for significant data fiduciaries)"
      private_right_of_action:
        available: false
        details: "No private right of action under DPDP Act; enforcement is exclusively through the Data Protection Board. Affected persons may complain to the Board."
        alternatives: "IT Act sec. 43A provides for compensation via civil courts for negligent data handling"
      aggravating_factors:
        - "Nature, gravity, and duration of the breach"
        - "Type and nature of personal data affected"
        - "Repetitive nature of the breach"
        - "Whether the data fiduciary took mitigation steps"
        - "Whether the data fiduciary made financial gain from the breach"

  - id: pdpa-singapore
    framework_ref: pdpa-singapore
    penalty_structure:
      max_monetary:
        standard:
          amount: "SGD 1,000,000"
          calculation_basis: "Fixed amount; applies to organizations with annual turnover <=SGD 10M"
          enforcement: "Personal Data Protection Commission (PDPC)"
        turnover_based:
          amount: "10% of annual turnover in Singapore"
          calculation_basis: "Percentage of annual turnover in Singapore for the preceding financial year"
          applies_to: "Organizations with annual turnover exceeding SGD 10M"
          effective: "Introduced by 2020 amendments (in force February 2021)"
      criminal_penalties:
        available: true
        details: "Egregious mishandling of personal data: up to SGD 5,000 fine or 2 years imprisonment or both (sec. 51)"
        examples:
          - "Knowingly or recklessly mishandling personal data resulting in harm"
          - "Unauthorized disclosure of personal data for wrongful gain"
      operational_penalties:
        - "Directions to stop collecting, using, or disclosing personal data"
        - "Directions to destroy personal data"
        - "Directions to pay financial penalty"
        - "Publication of decisions and enforcement actions"
      private_right_of_action:
        available: true
        basis: "Sec. 48O (private right of action, effective February 2021)"
        scope: "Any person who suffers loss or damage directly as a result of a contravention of certain PDPA provisions"
        requirements:
          - "Must be brought within 2 years from the date of contravention or knowledge thereof"
      notable_enforcement:
        - "SingHealth: SGD 250,000 (2019, cyberattack affecting 1.5M patients)"
        - "Integrated Health Information Systems: SGD 750,000 (2019, related to SingHealth breach)"

  - id: appi
    framework_ref: appi
    penalty_structure:
      max_monetary:
        corporate:
          amount: "JPY 100,000,000 (approx. USD 670,000)"
          calculation_basis: "Fixed maximum for corporations (enhanced dual punishment provision in 2022 amendment)"
          applies_to: "Violations by corporations where individuals committed the offense in the course of business"
        individual:
          amount: "JPY 1,000,000 or 1 year imprisonment"
          applies_to: "Individuals who violate specific provisions"
        ppc_order_violation:
          amount: "JPY 1,000,000 or 1 year imprisonment (individual); JPY 100,000,000 (corporation)"
          applies_to: "Violation of PPC orders (failure to comply with corrective orders)"
      criminal_penalties:
        available: true
        details: "Criminal penalties apply for providing personal information databases for illicit profit, violations of PPC orders, and certain unauthorized disclosures"
        examples:
          - "Illicit provision of personal information database: up to 1 year imprisonment or JPY 500,000"
          - "Violation of PPC order: up to 1 year imprisonment or JPY 1,000,000"
          - "False reporting to PPC: up to JPY 500,000"
      operational_penalties:
        - "Guidance and advice (shido/jogen)"
        - "Recommendations (kankoku)"
        - "Orders (meirei) — legally binding corrective orders"
        - "Public announcement of violations"
      private_right_of_action:
        available: true
        basis: "Japanese Civil Code (tort law, art. 709); APPI does not create a specific private right of action but civil liability applies"
        scope: "Individuals may seek damages under general tort law for privacy violations"
      notable_enforcement:
        - "Benesse Corporation: major incident affecting 35M records (2014) — led to subsequent APPI amendments"
        - "LINE Corporation: PPC recommendation (2021) for improper cross-border data handling"

  - id: pipa-korea
    framework_ref: pipa-korea
    penalty_structure:
      max_monetary:
        revenue_based:
          amount: "Up to 3% of related revenue"
          calculation_basis: "Percentage of revenue related to the violation (introduced in 2023 amendment)"
          applies_to: "Violations resulting from negligence in duties of care"
        administrative_fine:
          amount: "Up to KRW 500,000,000 (approx. USD 380,000)"
          calculation_basis: "Fixed amount per violation type"
          applies_to: "Various administrative violations specified in the Act"
        penalty_surcharge:
          amount: "Up to KRW 500,000,000"
          applies_to: "Additional penalty for failure to take necessary measures"
      criminal_penalties:
        available: true
        details: "Criminal penalties for serious violations including unlawful processing and unauthorized use"
        examples:
          - "Obtaining personal information by deception, improper means: up to 5 years imprisonment or KRW 50,000,000"
          - "Providing personal information to third parties for profit: up to 5 years imprisonment or KRW 50,000,000"
          - "Unauthorized use of unique identification information: up to 5 years imprisonment or KRW 50,000,000"
      operational_penalties:
        - "Corrective orders"
        - "Suspension of personal information processing"
        - "Public disclosure of violations"
        - "Criminal referral to prosecution"
        - "Recommendation to improve practices"
      private_right_of_action:
        available: true
        basis: "Art. 39 (right to claim damages); art. 51 (collective dispute resolution through mediation committee)"
        scope: "Data subjects may claim damages; statutory minimum damages of KRW 3,000,000 without proof of actual damage (art. 39-2)"
        class_actions: "Collective actions available through Personal Information Dispute Mediation Committee"
      notable_enforcement:
        - "Meta/Facebook Korea: KRW 6.7B (approx. USD 5M, 2022, unauthorized facial recognition data processing)"
        - "Google Korea: KRW 69.2B (approx. USD 50M, 2022, lack of consent for location data)"

  - id: kvkk
    framework_ref: kvkk
    penalty_structure:
      max_monetary:
        failure_to_inform:
          amount: "TRY 49,172 - 983,434 (2024 adjusted amounts)"
          applies_to: "Failure to fulfill data subject information obligations (art. 10)"
        failure_to_ensure_security:
          amount: "TRY 147,522 - 1,966,862 (2024 adjusted amounts)"
          applies_to: "Failure to ensure personal data security (art. 12)"
        failure_to_comply_with_board:
          amount: "TRY 245,855 - 1,966,862 (2024 adjusted amounts)"
          applies_to: "Failure to comply with Board decisions (art. 15)"
        failure_to_register:
          amount: "TRY 98,344 - 1,966,862 (2024 adjusted amounts)"
          applies_to: "Failure to register with the Data Controllers Registry (VERBIS)"
        calculation_basis: "Fixed amount ranges; adjusted annually per Revaluation Rate"
        enforcement: "KVKK Board (Kisisel Verileri Koruma Kurulu)"
      criminal_penalties:
        available: true
        details: "Turkish Penal Code art. 135-140 provides criminal sanctions for unlawful data processing"
        examples:
          - "Unlawful recording of personal data (art. 135): 1-3 years imprisonment"
          - "Unlawful provision or acquisition of personal data (art. 136): 2-4 years imprisonment"
          - "Qualified offenses (sensitive data, public officials): enhanced penalties up to 4.5 years"
          - "Failure to destroy data within required timeframes (art. 138): 1-2 years imprisonment"
      operational_penalties:
        - "Administrative fines"
        - "Corrective orders from the Board"
        - "Data processing bans"
        - "Criminal referral to public prosecution"
      private_right_of_action:
        available: true
        basis: "Art. 14 (right to apply to the Board) and Turkish Code of Obligations for civil damages"
        scope: "Data subjects may claim material and moral damages through civil courts"
      notable_enforcement:
        - "WhatsApp: TRY 1,950,000 (2021, privacy policy violations)"
        - "Meta: TRY 1,650,000 (2022, data breach)"

  - id: pipeda
    framework_ref: pipeda
    penalty_structure:
      max_monetary:
        breach_reporting:
          amount: "CAD 100,000 per violation"
          calculation_basis: "Fixed amount per violation"
          applies_to: "Failure to report breaches, failure to notify individuals, failure to maintain breach records"
          enforcement: "Office of the Privacy Commissioner of Canada (OPC)"
        general_violations:
          amount: "No direct monetary penalties for general PIPEDA violations under current law"
          details: "OPC can make findings and recommendations but cannot directly impose fines for non-breach violations; must apply to Federal Court for enforcement orders"
      criminal_penalties:
        available: true
        details: "Offenses under PIPEDA sec. 28"
        examples:
          - "Obstructing the Commissioner's investigation: up to CAD 10,000 fine"
          - "Retaliating against an employee who filed a complaint: up to CAD 10,000 fine"
          - "Destroying personal information subject to access request: up to CAD 100,000 fine"
      operational_penalties:
        - "Commissioner findings and recommendations (publicly reported)"
        - "Compliance agreements"
        - "Federal Court orders for compliance"
        - "Public naming of non-compliant organizations"
      private_right_of_action:
        available: true
        basis: "Sec. 14 (complaint to Commissioner); sec. 14-16 (application to Federal Court after Commissioner finding)"
        scope: "Individuals may apply to Federal Court for damages (including humiliation) after Commissioner's report; court may award damages"
      proposed_changes:
        bill: "Bill C-27 (Consumer Privacy Protection Act / CPPA)"
        proposed_penalties: "Up to CAD 25,000,000 or 5% of global gross revenue for most serious violations"
        status: "Proposed but not yet enacted"

  - id: popia
    framework_ref: popia
    penalty_structure:
      max_monetary:
        administrative_fine:
          amount: "ZAR 10,000,000 (approx. USD 550,000)"
          calculation_basis: "Fixed maximum amount"
          enforcement: "Information Regulator of South Africa"
      criminal_penalties:
        available: true
        details: "Sections 100-106 establish criminal offenses"
        examples:
          - "Obstruction of Information Regulator: up to 10 years imprisonment, fine, or both (sec. 100)"
          - "Unlawful acts by responsible party in connection with account numbers: up to 10 years imprisonment (sec. 104)"
          - "Failure to comply with enforcement notice: up to 10 years imprisonment, fine, or both (sec. 103)"
          - "Offenses by bodies corporate: directors/officers may be personally liable (sec. 106)"
      operational_penalties:
        - "Enforcement notices"
        - "Infringement notices"
        - "Orders to stop processing"
        - "Civil action for damages"
        - "Criminal prosecution referrals"
      private_right_of_action:
        available: true
        basis: "Sec. 99 (civil remedies); Constitution of South Africa sec. 14 (right to privacy)"
        scope: "Any person may institute civil proceedings for damages suffered as a result of a violation; includes actual damage, constitutional damages, and aggravated damages"
      management_liability:
        personal: true
        details: "Directors and officers may be personally liable for offenses committed by bodies corporate with their consent or connivance (sec. 106)"

  - id: pdpa-thailand
    framework_ref: pdpa-thailand
    penalty_structure:
      max_monetary:
        administrative:
          amount: "THB 5,000,000 (approx. USD 140,000)"
          calculation_basis: "Fixed maximum amount per violation"
          enforcement: "Expert Committee under the Personal Data Protection Committee (PDPC)"
        criminal:
          amount: "THB 5,000,000 fine (separate from administrative)"
          applies_to: "Criminal offenses under the PDPA"
        punitive_damages:
          amount: "Up to 2x actual damages"
          applies_to: "Court-awarded punitive damages in civil cases"
      criminal_penalties:
        available: true
        details: "Sections 79-81 establish criminal penalties"
        examples:
          - "Use or disclosure of personal data without consent causing damage: up to 6 months imprisonment and/or THB 500,000 (sec. 79)"
          - "Unauthorized disclosure of sensitive data by data controller/processor: up to 6 months imprisonment and/or THB 500,000 (sec. 79)"
          - "Use of personal data for illegal profit causing damage: up to 1 year imprisonment and/or THB 1,000,000 (sec. 80)"
          - "If offender is a committee member, sub-committee member, secretary-general, or officer: enhanced penalty of 1.5x (sec. 90)"
      operational_penalties:
        - "Administrative fines by Expert Committee"
        - "Corrective orders"
        - "Publication of infringement decisions"
        - "Compensation orders"
      private_right_of_action:
        available: true
        basis: "Sec. 77-78 (right to claim compensation)"
        scope: "Data subjects may claim compensation for actual damages; court may award punitive damages up to 2x actual damages"
        class_actions: "Available under Thailand's Class Action Procedure Act (2015)"
      notable_enforcement:
        - "PDPA enforcement is in early stages; PDPC has focused on guidance and voluntary compliance during initial implementation period"

  - id: fda-21-cfr-11
    framework_ref: fda-21-cfr-11
    penalty_structure:
      max_monetary:
        amount: "No specific monetary penalty schedule in 21 CFR Part 11 itself"
        details: "Enforcement is through regulatory actions against products and facilities; financial impact comes from consent decrees, product seizures, and import alerts"
        enforcement: "U.S. Food and Drug Administration (FDA)"
      criminal_penalties:
        available: true
        details: "Criminal liability under 18 USC 1001 (false statements), 21 USC 331 (prohibited acts under FD&C Act)"
        examples:
          - "Adulteration or misbranding violations: up to 1 year imprisonment and USD 1,000 (first offense); up to 3 years and USD 10,000 (subsequent or intent to defraud)"
          - "False statements to FDA: up to 5 years imprisonment under 18 USC 1001"
      operational_penalties:
        - "FDA Warning Letters (publicly posted)"
        - "Form 483 observations"
        - "Import alerts (detention without physical examination)"
        - "Consent decrees (court-ordered compliance with FDA oversight)"
        - "Product seizures"
        - "Injunctions"
        - "Debarment of individuals"
        - "Withdrawal of product approval (NDA/ANDA/BLA)"
        - "Clinical hold on investigations"
      private_right_of_action:
        available: false
        details: "No private right of action under 21 CFR Part 11 or the FD&C Act; enforcement is exclusively through FDA and DOJ"
        alternatives: "Product liability claims under state tort law"
      notable_enforcement:
        - "Abbott Laboratories (Sturgis facility): consent decree (2023) following 483 observations including electronic records integrity issues"
        - "FDA Warning Letters citing Part 11 deficiencies are common in pharmaceutical and medical device inspections"

  - id: eu-mdr
    framework_ref: eu-mdr
    penalty_structure:
      max_monetary:
        amount: "Determined by member state national law; must be effective, proportionate, and dissuasive (art. 113)"
        examples:
          - "Germany (MPDG): up to EUR 30,000 for most violations; up to EUR 500,000 or 3 years imprisonment for serious offenses"
          - "France: up to EUR 150,000 for individuals; EUR 750,000 for legal entities; imprisonment up to 5 years for certain offenses"
        enforcement: "National competent authorities (e.g., BfArM in Germany, ANSM in France, MHRA in UK)"
      criminal_penalties:
        available: true
        details: "Member states may define criminal penalties in their national transposition; several have done so"
        examples:
          - "Germany: up to 3 years imprisonment for placing non-compliant devices on the market"
          - "France: up to 5 years imprisonment for endangering life through non-compliant devices"
      operational_penalties:
        - "Suspension or withdrawal of CE marking certificate"
        - "Mandatory product recall from the market"
        - "Prohibition of placing on the market or putting into service"
        - "Restriction of making available on the market"
        - "Mandatory corrective action (Field Safety Corrective Actions)"
        - "Suspension or revocation of Notified Body designation"
      private_right_of_action:
        available: true
        basis: "EU Product Liability Directive (85/374/EEC, revised); national tort law; art. 10(16) right to compensation"
        scope: "Injured persons may claim compensation from manufacturers under product liability law"
      management_liability:
        personal: true
        details: "Authorized representative and person responsible for regulatory compliance (PRRC, art. 15) have defined legal obligations and may be held personally liable"
      notable_enforcement:
        - "Notified Body MedCert (NB 0482): designation suspended (2018) for systemic failures in conformity assessments"
        - "PIP breast implant scandal (pre-MDR, under MDD): led directly to the MDR's stronger regulatory framework"

