    - framework: "PIPL"
      amount: "CNY 50M or 5% annual revenue (serious violations)"
    - framework: "DPDP India"
      amount: "INR 250 crore / approx. USD 30M (security safeguard failures)"
    - framework: "NIS 2"
      amount: "EUR 10M or 2% global turnover (essential entities)"
    - framework: "PDPA Singapore"
      amount: "SGD 1M or 10% annual turnover (2020 amendments)"
  criminal_penalties_available:
    - "SOX (up to 20 years imprisonment)"
    - "HIPAA (up to 10 years imprisonment)"
    - "POPIA (up to 10 years imprisonment)"
    - "PIPL (up to 7 years imprisonment via PRC Criminal Law)"
    - "PIPA Korea (up to 5 years imprisonment)"
    - "FISMA (via CFAA)"
    - "GDPR (via member state law)"
    - "NIS 2 (via member state law)"
    - "EU AI Act (via member state law)"
    - "Bacen 4893 (via financial crimes law)"
    - "DORA (via member state law)"
    - "KVKK (via Turkish Penal Code, up to 4.5 years)"
    - "PDPA Thailand (up to 1 year imprisonment)"
    - "APPI (up to 1 year imprisonment)"
    - "FDA 21 CFR 11 (via FD&C Act and 18 USC 1001)"
    - "EU MDR (via member state law)"
    - "PDPA Singapore (up to 2 years imprisonment)"
  private_right_of_action_available:
    - "GDPR (art. 79, 80, 82)"
    - "LGPD (art. 42)"
    - "CCPA/CPRA (sec. 1798.150, limited to breaches)"
    - "SOX (Section 806, whistleblower)"
    - "EU AI Act (art. 85)"
    - "Bacen 4893 (via CDC)"
    - "Marco Civil (art. 7)"
    - "PIPL (art. 69-70)"
    - "PDPA Singapore (sec. 48O)"
    - "APPI (via Japanese Civil Code art. 709)"
    - "PIPA Korea (art. 39, statutory minimum damages)"
