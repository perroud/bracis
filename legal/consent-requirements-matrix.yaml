id: consent-requirements-matrix
title: "Cross-Framework Consent Requirements Comparison"
last_updated: "2026-04-03"
description: >
  Comparative matrix of consent definitions, mechanisms, and requirements
  across privacy and data protection frameworks. Covers consent definition,
  opt-in vs opt-out models, children's consent thresholds, withdrawal
  mechanisms, and special category handling.

frameworks:
  - id: gdpr
    framework_ref: gdpr
    articles: "art. 4(11), art. 6(1)(a), art. 7, art. 8, art. 9, Recitals 32, 42, 43"
    consent_definition:
      text: >
        Any freely given, specific, informed, and unambiguous indication of the
        data subject's wishes by which he or she, by a statement or by a clear
        affirmative action, signifies agreement to the processing of personal
        data relating to him or her.
      elements:
        - "Freely given: genuine choice, no detriment for refusal, no bundling with service provision (anti-tying)"
        - "Specific: granular, separate consent for distinct processing purposes"
        - "Informed: controller identity, processing purpose, data types, rights must be communicated"
        - "Unambiguous: clear affirmative action; silence, pre-ticked boxes, or inactivity do not constitute consent"
    opt_in_vs_opt_out:
      model: "Opt-in"
      details: >
        GDPR requires affirmative opt-in consent. Pre-ticked boxes, silence,
        or inactivity cannot constitute valid consent. Consent must be as easy
        to withdraw as to give.
    children_consent:
      age_threshold: "16 years (default); member states may lower to 13 years minimum"
      national_variations:
        - country: "Germany, Netherlands, Luxembourg, Croatia"
          age: 16
        - country: "France, Czech Republic"
          age: 15
        - country: "UK, Belgium, Denmark, Sweden, Finland, Latvia, Lithuania, Portugal, Poland, Estonia, Slovenia, Malta"
          age: 13
        - country: "Spain, Italy, Austria, Bulgaria, Cyprus, Hungary, Romania, Slovakia"
          age: 14
        - country: "Greece, Ireland"
          age: 15
      parental_consent: "Required for children below the applicable threshold for information society services (art. 8)"
      verification: "Controller must make reasonable efforts to verify parental consent, taking into account available technology"
    withdrawal_mechanism:
      right_to_withdraw: true
      requirements:
        - "Must be as easy to withdraw as to give consent"
        - "Data subject must be informed of right to withdraw before giving consent"
        - "Withdrawal does not affect lawfulness of processing based on consent before withdrawal"
      implementation:
        - "One-click unsubscribe for email marketing"
        - "Accessible preference center"
        - "No excessive steps or dark patterns"
    special_categories:
      applicable: true
      article: "art. 9"
      categories:
        - "Racial or ethnic origin"
        - "Political opinions"
        - "Religious or philosophical beliefs"
        - "Trade union membership"
        - "Genetic data"
        - "Biometric data for identification"
        - "Health data"
        - "Sex life or sexual orientation"
      consent_requirement: "Explicit consent required (higher threshold than standard consent)"
      explicit_consent_definition: >
        An express statement of consent, preferably written. Oral consent is
        possible but harder to demonstrate. Mere affirmative action may not
        suffice; an explicit confirmation is required.
      exceptions_to_consent:
        - "Employment and social security law"
        - "Vital interests (data subject incapable of giving consent)"
        - "Legitimate activities of certain bodies (foundations, associations, not-for-profit)"
        - "Data manifestly made public by the data subject"
        - "Legal claims"
        - "Substantial public interest"
        - "Preventive or occupational medicine"
        - "Public health"
        - "Archiving in the public interest, scientific/historical research, statistics"
    additional_requirements:
      documentation: "Controller must be able to demonstrate that consent was given (art. 7(1))"
      granularity: "Consent requests must be clearly distinguishable from other matters and in clear, plain language (art. 7(2))"
      power_imbalance: "Consent is presumed not freely given where there is a clear imbalance between data subject and controller (Recital 43), e.g., employer-employee relationship"
    notes: >
      EDPB Guidelines 05/2020 on consent provide detailed guidance. Consent
      under GDPR is one of six legal bases and should not be the default;
      legitimate interests or contractual necessity may be more appropriate.
      Cookie consent (ePrivacy Directive art. 5(3)) requires separate
      opt-in consent for non-essential cookies.

  - id: lgpd
    framework_ref: lgpd
    articles: "art. 5(XII), art. 7(I), art. 8, art. 11, art. 14"
    consent_definition:
      text: >
        Free, informed, and unambiguous manifestation by which the data subject
        agrees to the processing of their personal data for a specific purpose.
      elements:
        - "Free: genuine choice without coercion"
        - "Informed: data subject must receive clear information about the processing"
        - "Unambiguous: clear expression of will"
        - "Specific purpose: consent must be tied to specific, legitimate purposes"
    opt_in_vs_opt_out:
      model: "Opt-in"
      details: >
        LGPD requires affirmative opt-in consent. Generic authorizations
        for processing are null and void (art. 8 sec. 4). Consent given
        in writing must be in a highlighted clause, distinguishable from
        other contractual clauses.
    children_consent:
      age_threshold: "18 years (legal age of majority in Brazil)"
      details: >
        Processing of personal data of children and adolescents must be carried
        out in their best interest (art. 14). At least one parent or legal
        guardian must provide specific and prominent consent.
      parental_consent: "Required for processing data of children and adolescents (art. 14 sec. 1)"
      verification: "Controller must make reasonable efforts to verify consent was given by parent/guardian, considering available technology"
      exceptions:
        - "Contacting parents or legal guardian (single use, no storage without consent)"
        - "Protection of the child"
      game_apps: "Data beyond what is strictly necessary for the activity must not be conditioned on participation in games, contests, or similar applications (art. 14 sec. 4)"
    withdrawal_mechanism:
      right_to_withdraw: true
      requirements:
        - "Data subject may revoke consent at any time through a free, easy procedure (art. 8 sec. 5)"
        - "Revocation does not affect prior processing"
      implementation:
        - "Must be facilitated through simple mechanism"
        - "Cannot impose barriers or costs on the data subject"
    special_categories:
      applicable: true
      article: "art. 11"
      categories:
        - "Racial or ethnic origin"
        - "Religious conviction"
        - "Political opinion"
        - "Trade union affiliation"
        - "Religious, philosophical, or political organization affiliation"
        - "Health data"
        - "Sex life"
        - "Genetic data"
        - "Biometric data"
      consent_requirement: "Specific and highlighted consent required for sensitive data (art. 11, I)"
      exceptions_to_consent:
        - "Compliance with legal obligation by the controller"
        - "Processing necessary for public administration policies"
        - "Study by research body (anonymization required where feasible)"
        - "Exercise of rights in contract or judicial/administrative proceedings"
        - "Protection of life or physical safety"
        - "Health protection, by healthcare professionals or health entities"
        - "Fraud prevention"
    additional_requirements:
      written_consent: "When in writing, consent must be provided in a clause highlighted and distinguished from other clauses (art. 8 sec. 1)"
      burden_of_proof: "Burden of proving that consent was obtained in compliance with LGPD falls on the controller (art. 8 sec. 2)"
      purpose_change: "If the purpose of processing changes, controller must inform the data subject and obtain new specific consent (art. 8 sec. 6)"
    notes: >
      LGPD lists 10 legal bases for processing (art. 7), making consent one
      of many options. Unlike GDPR, LGPD includes "credit protection" and
      "protection of life or physical safety of data subject or third party"
      as explicit legal bases. ANPD has issued guidance noting that consent
      should not be used when another legal basis is more appropriate.

  - id: ccpa-cpra
    framework_ref: ccpa-cpra
    articles: "Cal. Civ. Code sec. 1798.100, sec. 1798.120, sec. 1798.135, sec. 1798.140(h)"
    consent_definition:
      text: >
        CCPA/CPRA distinguishes between "consent" (affirmative opt-in for specific
        activities) and the general "opt-out" model for sale/sharing. Consent means
        any freely given, specific, informed, and unambiguous indication of the
        consumer's wishes, including by a statement or clear affirmative action.
      elements:
        - "Freely given"
        - "Specific"
        - "Informed"
        - "Unambiguous"
        - "Affirmative action"
    opt_in_vs_opt_out:
      model: "Primarily opt-out with opt-in exceptions"
      details: >
        CCPA/CPRA uses an opt-out model for the sale or sharing of personal
        information: consumers have the right to opt out of the sale/sharing
        of their data. However, opt-in consent is required for:
        (1) sale/sharing of data from consumers known to be under 16,
        (2) use of sensitive personal information beyond what is necessary
        to perform the requested service, and (3) secondary uses beyond
        disclosed purposes.
      opt_out_mechanisms:
        - "'Do Not Sell or Share My Personal Information' link on homepage"
        - "Global Privacy Control (GPC) signal recognition"
        - "Opt-out preference signals"
    children_consent:
      age_threshold_sale:
        under_13: "Opt-in consent from parent or guardian required for sale/sharing"
        age_13_to_15: "Opt-in consent from the minor required for sale/sharing"
        age_16_plus: "Standard opt-out model applies"
      details: "Businesses that have actual knowledge of a consumer's age must comply with these thresholds"
      enforcement: "Triple penalties (USD 7,500 per violation) for knowing violations involving children under 16"
    withdrawal_mechanism:
      right_to_withdraw: true
      requirements:
        - "Must provide easy-to-use opt-out mechanism"
        - "Cannot require account creation to opt out"
        - "Must respect Global Privacy Control (GPC) browser signals"
        - "Cannot ask consumer to re-consent for at least 12 months after opt-out"
      wait_period: "Business must wait at least 12 months before requesting that a consumer who has opted out authorize the sale of their personal information again"
    special_categories:
      applicable: true
      article: "sec. 1798.121 (CPRA addition)"
      categories:
        - "Government-issued identifiers (SSN, driver's license, passport)"
        - "Account credentials (financial account numbers with security codes/passwords)"
        - "Precise geolocation"
        - "Racial or ethnic origin"
        - "Religious or philosophical beliefs"
        - "Union membership"
        - "Contents of mail, email, text messages (non-directed to business)"
        - "Genetic data"
        - "Biometric data for identification"
        - "Health data"
        - "Sex life or sexual orientation data"
      consent_requirement: >
        Consumers have the right to limit the use and disclosure of sensitive
        personal information to purposes necessary to perform the services
        or provide the goods requested. A 'Limit the Use of My Sensitive
        Personal Information' link must be provided.
    additional_requirements:
      dark_patterns: "Agreement obtained through dark patterns is not valid consent (sec. 1798.140(h))"
      symmetry: "Opt-in path must not be more difficult than the opt-out path (symmetry in choice)"
    notes: >
      CCPA/CPRA's model fundamentally differs from GDPR/LGPD. It does not
      require consent for data collection; rather, it gives consumers the
      right to opt out of specific activities (sale, sharing). The CPPA's
      final regulations (effective March 2024) provide detailed rules on
      consent, dark patterns, and opt-out preference signals.

  - id: hipaa
    framework_ref: hipaa
    articles: "45 CFR sec. 164.502, sec. 164.506, sec. 164.508, sec. 164.510"
    consent_definition:
      text: >
        HIPAA distinguishes between "consent" (optional, for treatment/payment/healthcare
        operations) and "authorization" (required, for uses beyond TPO). Authorization
        is the primary consent mechanism and must contain specific elements.
      elements:
        - "Description of the information to be used or disclosed"
        - "Name of the person authorized to make the disclosure"
        - "Name of the person to whom the disclosure may be made"
        - "Purpose of the use or disclosure"
        - "Expiration date or event"
        - "Individual's signature and date"
    opt_in_vs_opt_out:
      model: "Mixed (opt-in for authorization; implicit consent for TPO)"
      details: >
        Uses of PHI for treatment, payment, and healthcare operations (TPO)
        do not require individual authorization (though consent is encouraged
        but optional). Uses beyond TPO require written, signed authorization.
        Research, marketing, sale of PHI, and psychotherapy notes require
        explicit authorization.
    children_consent:
      age_threshold: "Determined by state law (varies; federal minimum not defined)"
      details: >
        HIPAA defers to state law for the age at which minors can consent
        to healthcare and control their health information. Parents/guardians
        are generally the personal representatives for minor children.
      exceptions:
        - "Emancipated minors"
        - "Minors consenting to care per state law without parental consent (e.g., reproductive health, substance abuse)"
        - "Court-appointed personal representatives"
    withdrawal_mechanism:
      right_to_withdraw: true
      requirements:
        - "Individuals may revoke authorization in writing at any time"
        - "Revocation does not affect uses/disclosures already made in reliance on the authorization"
        - "Must be informed of the right to revoke"
      exceptions:
        - "Entity has taken action in reliance on the authorization"
        - "Authorization was obtained as a condition of obtaining insurance coverage (insurer may contest claims)"
    special_categories:
      applicable: true
      enhanced_protections:
        - category: "Psychotherapy notes"
          requirement: "Separate, specific authorization required; cannot be combined with other authorizations"
        - category: "Substance abuse treatment records (42 CFR Part 2)"
          requirement: "Separate consent under Part 2 regulations (2024 rule aligns Part 2 more closely with HIPAA)"
        - category: "HIV/AIDS information"
          requirement: "Additional state-specific protections in many jurisdictions"
        - category: "Genetic information (GINA)"
          requirement: "Health plans may not use genetic information for underwriting; separate consent framework"
        - category: "Reproductive health information"
          requirement: "2024 HIPAA Privacy Rule update prohibits use of PHI for investigations related to lawful reproductive healthcare"
    additional_requirements:
      plain_language: "Authorization must be written in plain language"
      compound_authorizations: "Generally prohibited; cannot condition treatment on authorization (with limited research exceptions)"
      marketing: "Prior authorization required for marketing communications; exception for face-to-face communications and promotional gifts of nominal value"
      sale_of_phi: "Requires authorization; exception for public health, research, treatment of individual, business associate activities"
      minimum_necessary: "Covered entities must limit use, disclosure, and requests to the minimum necessary for the intended purpose"
    notes: >
      HIPAA's consent framework is distinct from general privacy laws.
      The Notice of Privacy Practices (NPP) serves an informational role
      (not consent-seeking). The 2024 HIPAA Privacy Rule changes strengthen
      protections for reproductive health information and introduce new
      attestation requirements. 42 CFR Part 2 (substance abuse records)
      alignment with HIPAA (effective 2024) simplifies consent requirements
      for integrated care settings.

  - id: eu-ai-act
    framework_ref: eu-ai-act
    articles: "art. 5, art. 6-7, art. 10, art. 13, art. 26, art. 86, Recital 47"
    consent_definition:
      text: >
        The EU AI Act does not define a standalone consent mechanism but references
        GDPR consent for personal data processing within AI systems. It introduces
        information and transparency requirements that enable meaningful consent
        and choice by affected persons.
      elements:
        - "Informed: deployers must inform natural persons that they are subject to a high-risk AI system (art. 26(11))"
        - "Transparent: providers must ensure AI systems are designed to allow deployers to interpret output and use it appropriately"
        - "GDPR consent applies for personal data processing components"
    opt_in_vs_opt_out:
      model: "Prohibition-based with information rights (not classical consent model)"
      details: >
        Rather than a consent/opt-out model, the EU AI Act prohibits certain
        AI practices outright (art. 5) and requires transparency and information
        for others. Affected persons have the right to an explanation of
        individual decisions made by high-risk AI systems (art. 86).
      prohibited_without_exception:
        - "Subliminal, manipulative, or deceptive techniques causing significant harm"
        - "Exploitation of vulnerabilities related to age, disability, or social/economic situation"
        - "Social scoring by public authorities"
        - "Untargeted scraping of facial images for facial recognition databases"
        - "Emotion recognition in workplace and education (with limited exceptions)"
        - "Biometric categorization inferring sensitive attributes"
        - "Real-time remote biometric identification in publicly accessible spaces by law enforcement (with narrow exceptions)"
    children_consent:
      age_threshold: "Not defined separately; defers to GDPR for personal data"
      details: >
        Children are recognized as a vulnerable group. AI systems that
        exploit vulnerabilities related to age are prohibited (art. 5(1)(b)).
        AI systems used in educational settings are classified as high-risk
        (Annex III, 3).
      protections:
        - "Prohibition on AI exploiting age-related vulnerabilities"
        - "High-risk classification for AI in education"
        - "GDPR age-of-consent rules apply for personal data"
    withdrawal_mechanism:
      right_to_withdraw: "Defers to GDPR for personal data processing consent"
      ai_specific_rights:
        - "Right to explanation of individual decision-making by high-risk AI (art. 86)"
        - "Right to lodge complaint with market surveillance authority (art. 85)"
        - "Right to effective judicial remedy (art. 85)"
    special_categories:
      applicable: true
      ai_specific_protections:
        - category: "Biometric data"
          requirement: "Real-time remote biometric identification in public spaces is prohibited for law enforcement (with narrow exceptions requiring judicial authorization)"
        - category: "Emotion recognition data"
          requirement: "Emotion recognition in workplace and education contexts is prohibited"
        - category: "Biometric categorization"
          requirement: "Systems that categorize persons based on biometric data to infer sensitive attributes (race, political opinions, religious beliefs, sexual orientation) are prohibited"
      intersection_with_gdpr: >
        When AI systems process special category personal data under GDPR art. 9,
        both GDPR explicit consent requirements and AI Act transparency
        requirements apply cumulatively.
    additional_requirements:
      transparency_obligations:
        - "AI systems interacting with natural persons must be designed to inform the person they are interacting with an AI (art. 50(1))"
        - "Deep fakes must be labeled as artificially generated (art. 50(4))"
        - "AI-generated content used in journalistic contexts must be disclosed (art. 50(4))"
      human_oversight: "High-risk AI systems must be designed to allow effective human oversight (art. 14)"
      data_governance: "Training data for high-risk AI must meet quality criteria; bias assessment required (art. 10)"
    notes: >
      The EU AI Act complements GDPR rather than replacing it for consent.
      Its contribution to consent is primarily through prohibition of
      manipulative AI and enhanced transparency. The right to explanation
      (art. 86) is a significant addition that enables informed decision-making.
      National AI sandbox regulations may provide additional consent frameworks
      for experimental AI applications.

  - id: pipl
    framework_ref: pipl
    articles: "art. 13, art. 14, art. 15, art. 16, art. 29, art. 31, art. 39"
    consent_definition:
      text: >
        Consent under PIPL means a voluntary, explicit indication by the individual
        on a fully informed basis. Consent must be given through a clear affirmative
        act. Separate consent is required for sensitive data processing, cross-border
        transfer, third-party sharing, and public disclosure.
      elements:
        - "Voluntary: freely given without coercion"
        - "Explicit: clear affirmative action required"
        - "Informed: individual must be fully informed of purpose, method, scope, and retention period"
        - "Separate consent: required for specific high-risk processing activities"
    opt_in_vs_opt_out:
      model: "Opt-in"
      details: >
        PIPL requires explicit opt-in consent as the primary legal basis for
        processing personal information. Separate consent is required for
        sensitive personal information, cross-border transfers, provision to
        third parties, and public disclosure of personal information.
    children_consent:
      age_threshold: "14 years"
      details: >
        Personal information of minors under 14 is treated as sensitive personal
        information. Processing requires consent from the minor's parent or
        guardian. Processors must formulate specific rules for handling minors'
        personal information.
      parental_consent: "Required for processing data of children under 14 (art. 31)"
    withdrawal_mechanism:
      right_to_withdraw: true
      requirements:
        - "Consent withdrawal must be as easy as giving consent (art. 15)"
        - "Processor must provide a convenient method for withdrawal"
        - "Withdrawal does not affect the lawfulness of prior processing"
      implementation:
        - "Must not impose unreasonable conditions on withdrawal"
        - "Clear and accessible withdrawal mechanism required"
    special_categories:
      applicable: true
      article: "art. 29"
      categories:
        - "Biometric data"
        - "Religious beliefs"
        - "Specific identity (race, ethnicity)"
        - "Medical and health data"
        - "Financial account data"
        - "Location tracking data"
        - "Personal information of minors under 14"
      consent_requirement: "Separate consent required for sensitive personal information processing; personal information impact assessment mandatory"
    additional_requirements:
      separate_consent_triggers:
        - "Processing sensitive personal information (art. 29)"
        - "Cross-border transfer of personal information (art. 39)"
        - "Provision of personal information to third parties (art. 23)"
        - "Public disclosure of personal information (art. 25)"
      impact_assessment: "Personal information protection impact assessment required before processing sensitive data"
    notes: >
      PIPL establishes one of the most stringent consent regimes globally with its
      separate consent requirements for multiple processing scenarios. The law also
      recognizes other legal bases including contractual necessity, HR management,
      public health emergencies, and public interest. The Cyberspace Administration
      of China (CAC) has issued implementing regulations with additional detail.

  - id: dpdp-india
    framework_ref: dpdp-india
    articles: "sec. 6, sec. 7, sec. 9, sec. 11"
    consent_definition:
      text: >
        Consent must be free, specific, informed, unconditional, and unambiguous,
        given through a clear affirmative action signifying agreement to the processing
        of personal data for a specified purpose.
      elements:
        - "Free: given voluntarily without coercion or undue influence"
        - "Specific: limited to the personal data necessary for the specified purpose"
        - "Informed: preceded by an itemized notice in clear and plain language"
        - "Unconditional: not made conditional on unrelated terms"
        - "Unambiguous: expressed through clear affirmative action"
    opt_in_vs_opt_out:
      model: "Opt-in with deemed consent provisions"
      details: >
        DPDP Act requires affirmative opt-in consent. However, it introduces
        "deemed consent" (sec. 7) for certain legitimate uses including voluntary
        provision of data, state functions, medical emergencies, employment
        purposes, and public interest. Deemed consent expands the scope of
        processing without explicit consent.
      deemed_consent_scenarios:
        - "Voluntarily provided data for a specified purpose"
        - "State functions: subsidies, benefits, services, permits, licenses"
        - "Medical emergencies or threats to public health"
        - "Employment purposes"
        - "Public interest (as prescribed by government)"
        - "Fair and reasonable purposes (as prescribed by government)"
    children_consent:
      age_threshold: "18 years"
      details: >
        Processing of children's personal data requires verifiable consent from
        a parent or lawful guardian. Government may exempt certain data fiduciaries
        from this requirement for specified classes of processing deemed safe.
      parental_consent: "Verifiable parental consent required for children's data (sec. 9)"
      restrictions:
        - "Tracking, behavioral monitoring, or targeted advertising directed at children is prohibited"
        - "Processing that is likely to cause detrimental effect on the well-being of a child is prohibited"
    withdrawal_mechanism:
      right_to_withdraw: true
      requirements:
        - "Data principal may withdraw consent at any time (sec. 6(4))"
        - "Withdrawal must be as easy as giving consent"
        - "Consequences of withdrawal must be borne by the data principal"
        - "Withdrawal does not affect lawfulness of prior processing"
    special_categories:
      applicable: false
      details: >
        DPDP Act does not define a separate category of sensitive personal data.
        All personal data is treated under the same consent framework. This differs
        significantly from GDPR and LGPD which create enhanced protections for
        sensitive data categories.
    additional_requirements:
      notice_requirements: "Data fiduciary must provide an itemized notice before or at the time of requesting consent (sec. 6(2))"
      consent_manager: "Data principals may give, manage, review, and withdraw consent through a Consent Manager registered with the Board (sec. 6(6))"
      significant_data_fiduciary: "Government may designate significant data fiduciaries with additional obligations including Data Protection Officer appointment and periodic audits"
    notes: >
      India's DPDP Act 2023 takes a simpler approach than GDPR by not
      differentiating sensitive data. The deemed consent mechanism is broader than
      legitimate interests under GDPR. The government retains significant powers
      to prescribe additional categories of deemed consent and exempt certain
      processing from consent requirements. Rules under the Act are pending
      finalization.

  - id: pdpa-singapore
    framework_ref: pdpa-singapore
    articles: "sec. 13, sec. 14, sec. 15, sec. 16, sec. 17"
    consent_definition:
      text: >
        Consent means any indication of the individual's wishes that is voluntary,
        informed, and specific to the purpose of the collection, use, or disclosure
        of personal data.
      elements:
        - "Voluntary: given without coercion"
        - "Informed: individual must be informed of the purpose"
        - "Specific: limited to stated purposes"
    opt_in_vs_opt_out:
      model: "Consent required with deemed consent and exceptions"
      details: >
        PDPA requires consent for collection, use, and disclosure unless an
        exception applies. Deemed consent applies when the individual voluntarily
        provides data for a reasonably expected purpose, or when the individual has
        been notified and given a reasonable opportunity to opt out (deemed consent
        by notification). The 2020 amendments expanded deemed consent provisions.
      deemed_consent_scenarios:
        - "Voluntary provision for a purpose a reasonable person would consider appropriate"
        - "Deemed consent by notification: notified of purpose and given reasonable opportunity to opt out without doing so"
        - "Deemed consent for business improvement purposes (with conditions)"
        - "Deemed consent for research purposes (with anonymization conditions)"
    children_consent:
      age_threshold: "Not specified in PDPA"
      details: >
        PDPA does not define a specific age for children's consent. Where an
        individual is below the age at which they can give valid consent, consent
        may be given by a parent, guardian, or person with parental responsibility.
    withdrawal_mechanism:
      right_to_withdraw: true
      requirements:
        - "Individuals may withdraw consent with reasonable notice (sec. 16)"
        - "Organization must inform individual of likely consequences of withdrawal"
        - "Organization must not prohibit withdrawal as a condition of providing a product or service beyond what is reasonable"
      implementation:
        - "Reasonable period to process withdrawal request"
        - "Must cease collection, use, or disclosure upon withdrawal"
    special_categories:
      applicable: false
      details: >
        PDPA does not formally define special categories of personal data.
        However, the PDPC Advisory Guidelines note that organizations should
        exercise greater care with more sensitive data such as health data,
        financial data, and data relating to minors.
    additional_requirements:
      notification_obligation: "Organization must notify individual of purposes even when consent is not required (sec. 20)"
      do_not_call_registry: "Singapore's Do Not Call Registry provides an additional opt-out mechanism for marketing messages"
      data_protection_officer: "Every organization must designate at least one Data Protection Officer"
    notes: >
      Singapore's PDPA is distinctive for its deemed consent by notification model
      introduced in 2020 amendments. This allows organizations to use data for new
      purposes by notifying individuals and providing an opt-out opportunity, rather
      than requiring fresh opt-in consent. The PDPC has issued extensive advisory
      guidelines on consent requirements.

  - id: appi
    framework_ref: appi
    articles: "art. 17, art. 18, art. 23, art. 27, art. 28"
    consent_definition:
      text: >
        APPI requires consent of the individual for use of personal information
        beyond the stated purpose and for provision to third parties. Consent is
        not strictly defined but interpreted as agreement of the individual given
        after understanding the nature and consequences of the processing.
      elements:
        - "Agreement of the individual after being informed of the purpose of use"
        - "May be express or implied depending on context"
        - "Prior consent required for specific activities (third-party provision, cross-border transfer)"
    opt_in_vs_opt_out:
      model: "Mixed (opt-in for certain activities; opt-out for third-party provision)"
      details: >
        APPI does not require consent for initial collection if the purpose of use
        is publicly announced. Consent is required for use beyond the stated
        purpose. For third-party provision, an opt-out mechanism is available
        as an alternative to prior consent if the business operator notifies the
        PPC and provides the individual with an opportunity to object.
      opt_out_for_third_party:
        - "Must notify PPC of opt-out provision (art. 27)"
        - "Must inform individual of categories of data, method of provision, and opt-out right"
        - "Must respond to opt-out requests without delay"
        - "Cannot use opt-out for sensitive data (requiring care in handling)"
    children_consent:
      age_threshold: "Not specifically defined"
      details: >
        APPI does not set a specific age threshold for children's consent. General
        civil law principles apply (capacity to act). In practice, parental
        consent is expected for younger children. PPC guidelines suggest careful
        consideration for minors.
    withdrawal_mechanism:
      right_to_withdraw: true
      requirements:
        - "Individual may request cessation of use if data is no longer needed, obtained through deception, or used in violation of APPI"
        - "Individual may request cessation of third-party provision"
        - "Opt-out from third-party provision must be honored without delay"
    special_categories:
      applicable: true
      article: "art. 2(3)"
      categories:
        - "Race"
        - "Creed"
        - "Social status"
        - "Medical history"
        - "Criminal record"
        - "Fact of having suffered damage by a crime"
        - "Other information prescribed by cabinet order (disability, results of medical examinations, criminal proceedings)"
      consent_requirement: "Consent required for acquisition of personal information requiring special care (art. 20(2))"
      exceptions_to_consent:
        - "Required by law"
        - "Necessary for the protection of life, body, or property"
        - "Necessary for public health or child welfare"
        - "Cooperation with government agencies"
    additional_requirements:
      purpose_specification: "Purpose of use must be specified as concretely as possible and publicly announced or notified to the individual (art. 17, 21)"
      purpose_change: "Changed purpose must be within a range reasonably related to the original purpose (art. 17(2))"
      cross_border_consent: "Prior consent of the individual required for provision of personal data to a third party in a foreign country (art. 28)"
    notes: >
      APPI underwent major amendments in 2020 (effective April 2022) strengthening
      individual rights and cross-border transfer rules. The opt-out mechanism for
      third-party provision is unique among major privacy laws. Japan has a mutual
      adequacy arrangement with the EU (GDPR art. 45). PPC guidelines provide
      extensive interpretation of consent requirements.

  - id: pipa-korea
    framework_ref: pipa-korea
    articles: "art. 15, art. 17, art. 22, art. 23, art. 28-2, art. 39-14"
    consent_definition:
      text: >
        Consent under PIPA must be obtained separately from other agreements, with
        distinct consent required for different processing activities. The individual
        must be informed of the purpose, items of data, retention period, and right
        to refuse.
      elements:
        - "Separate: must not be bundled with other terms and conditions"
        - "Informed: specific items of data, purpose, retention period, and right to refuse must be disclosed"
        - "Distinct: separate consent required for sensitive data, unique identifiers, third-party provision, and cross-border transfer"
    opt_in_vs_opt_out:
      model: "Opt-in"
      details: >
        PIPA requires affirmative opt-in consent for collection, use, and
        provision of personal information. Consent must be obtained separately
        for each distinct processing activity. The minimum information principle
        prevents denial of service for refusal to consent to non-essential data
        processing.
      minimum_information_principle: "Must not refuse goods or services because the individual declines to consent to non-essential data processing (art. 16(3))"
    children_consent:
      age_threshold: "14 years"
      details: >
        Processing of personal information of children under 14 requires the
        verifiable consent of the legal representative (parent or guardian).
        Only minimum personal information may be collected from children.
      parental_consent: "Verifiable consent from legal representative required (art. 22)"
      restrictions:
        - "Minimum information principle strictly applied to children's data"
        - "Profiling or tracking of children subject to enhanced scrutiny"
    withdrawal_mechanism:
      right_to_withdraw: true
      requirements:
        - "Individual may withdraw consent at any time"
        - "Withdrawal method must be at least as easy as the method of giving consent"
        - "Must not impose disadvantages for withdrawal"
    special_categories:
      applicable: true
      article: "art. 23"
      categories:
        - "Ideology or beliefs"
        - "Trade union or political party membership"
        - "Political opinions"
        - "Health data"
        - "Sex life"
        - "Criminal record"
        - "Genetic data"
        - "Biometric data for identification"
      consent_requirement: "Separate, explicit consent required for processing sensitive information (art. 23)"
      unique_identifier_consent: "Separate consent required for processing resident registration numbers and other unique identifiers"
    additional_requirements:
      separation_of_consent: "Consent for personal information processing must be clearly separated from other agreements and distinguishable (art. 22)"
      cross_border_consent: "Separate consent required for cross-border transfer of personal information (art. 39-14)"
      pseudonymized_data: "Pseudonymized data may be processed for statistical, scientific research, and archiving purposes without consent under 2020 amendments (art. 28-2)"
    notes: >
      Korea's PIPA is one of the most consent-intensive frameworks globally,
      requiring separate consent for virtually every distinct processing activity.
      The 2020 amendments (effective August 2020) introduced the pseudonymized
      data regime. Korea has a mutual adequacy arrangement with the EU (GDPR
      art. 45). PIPC guidelines provide detailed consent implementation guidance.

  - id: kvkk
    framework_ref: kvkk
    articles: "art. 5, art. 6, art. 8, art. 9"
    consent_definition:
      text: >
        Explicit consent (açık rıza) means consent given freely on a specific matter,
        based on information. Consent must relate to a specific matter, be based on
        information provided to the data subject, and be expressed freely.
      elements:
        - "Specific: related to a particular processing activity"
        - "Informed: based on information about the processing"
        - "Freely given: without coercion or condition"
    opt_in_vs_opt_out:
      model: "Opt-in (explicit consent as default)"
      details: >
        KVKK requires explicit consent as the default legal basis for processing
        personal data. Processing without consent is permitted only in specific
        limited exceptions enumerated in art. 5(2). For sensitive data (special
        categories), only explicit consent or specific legal authorization applies.
      exceptions_to_consent:
        - "Expressly provided for by law"
        - "Necessary for protection of life or physical integrity of person unable to give consent"
        - "Necessary for performance of a contract"
        - "Necessary for controller to fulfill a legal obligation"
        - "Data made public by the data subject"
        - "Necessary for establishment, exercise, or defense of a right"
        - "Necessary for legitimate interests of the controller (provided not detrimental to fundamental rights)"
    children_consent:
      age_threshold: "18 years (age of legal capacity under Turkish Civil Code)"
      details: >
        KVKK does not define a specific age for children's consent. Turkish Civil
        Code provides that persons under 18 lack legal capacity to act, requiring
        consent of a legal representative for data processing.
      parental_consent: "Required for persons under 18 per general civil law capacity rules"
    withdrawal_mechanism:
      right_to_withdraw: true
      requirements:
        - "Data subject may withdraw consent at any time"
        - "Withdrawal does not affect lawfulness of prior processing"
        - "Controller must facilitate withdrawal"
    special_categories:
      applicable: true
      article: "art. 6"
      categories:
        - "Race"
        - "Ethnic origin"
        - "Political opinion"
        - "Philosophical beliefs"
        - "Religion, sect, or other beliefs"
        - "Appearance and dressing"
        - "Association, foundation, or trade union membership"
        - "Health data"
        - "Sex life"
        - "Criminal convictions and security measures"
        - "Biometric data"
        - "Genetic data"
      consent_requirement: "Explicit consent required for all sensitive data; limited exceptions for health and safety data only when authorized by law"
      exceptions_for_sensitive_data:
        - >-
          Health and sex life data: may be processed without consent by
          authorized persons or institutions under obligation of secrecy
          for public health, preventive medicine, medical diagnosis,
          treatment, and care
        - "Other sensitive data: may be processed without consent only when expressly provided for by law"
    additional_requirements:
      cross_border_consent: "Transfer of personal data abroad requires explicit consent or adequate protection in recipient country (art. 9)"
      data_controller_registry: "Data controllers must register with the Data Controllers Registry (VERBIS) maintained by the Personal Data Protection Board"
    notes: >
      Turkey's KVKK is closely modeled on the EU's 1995 Data Protection Directive
      (95/46/EC) but has not been updated to align with GDPR. The explicit consent
      threshold is relatively high and the exceptions are narrower than GDPR's
      legitimate interests provision. The Personal Data Protection Board has issued
      numerous decisions interpreting consent requirements. Turkey does not have an
      EU adequacy decision.

  - id: pipeda
    framework_ref: pipeda
    articles: "Principle 3 (Consent), sec. 6.1, sec. 7, Schedule 1"
    consent_definition:
      text: >
        Knowledge and consent of the individual are required for the collection,
        use, or disclosure of personal information, except where inappropriate.
        Consent must be meaningful, meaning the individual must understand what
        they are consenting to.
      elements:
        - "Meaningful: individual must understand what personal information is being collected, used, or disclosed and for what purpose"
        - "Form appropriate to sensitivity: express consent for sensitive data; implied consent may suffice for less sensitive data"
        - "Reasonable: a reasonable person would consider the collection, use, or disclosure appropriate"
    opt_in_vs_opt_out:
      model: "Mixed (express or implied depending on sensitivity and context)"
      details: >
        PIPEDA recognizes both express and implied consent. The form of consent
        must be appropriate to the sensitivity of the information. Express consent
        (opt-in) is required for sensitive information such as health, financial,
        or information about children. Implied consent (opt-out) may suffice for
        less sensitive information where the purpose would be obvious to a
        reasonable person.
      express_consent_required:
        - "Health and medical information"
        - "Financial information"
        - "Information about children"
        - "Sensitive information"
        - "Unexpected purposes"
      implied_consent_permitted:
        - "Information necessary for an obvious purpose"
        - "Less sensitive information used in ways a reasonable person would expect"
    children_consent:
      age_threshold: "Varies; no single statutory threshold"
      details: >
        PIPEDA does not set a specific age for children's consent. OPC guidance
        indicates that organizations should generally obtain parental consent for
        children under 13. The OPC has stated that consent of a minor is only
        valid if the minor understands the nature and consequences of the processing.
      opc_guidance: "Generally parental consent for children under 13; consent must be meaningful considering the child's capacity"
    withdrawal_mechanism:
      right_to_withdraw: true
      requirements:
        - "Individual may withdraw consent at any time, subject to legal or contractual restrictions and reasonable notice"
        - "Organization must inform individual of implications of withdrawal"
        - "Withdrawal does not affect processing already carried out"
    special_categories:
      applicable: true
      categories:
        - "Health and medical records"
        - "Income, financial information"
        - "Racial or ethnic origin"
        - "Political opinions"
        - "Religious or philosophical beliefs"
        - "Trade union membership"
        - "Sexual orientation"
      consent_requirement: "Express (opt-in) consent required for sensitive personal information; implied consent insufficient"
    additional_requirements:
      meaningful_consent_factors:
        - "Purposes stated in language the individual can understand"
        - "No excessively long privacy policies as substitute for clear communication"
        - "Key elements highlighted and emphasized"
        - "Consent must be obtained before or at time of collection"
      exceptions_to_consent:
        - "Necessary for legal proceedings"
        - "Required to comply with a subpoena, warrant, or court order"
        - "Journalistic, artistic, or literary purposes"
        - "Public interest reasons specified in regulations"
        - "Reasonable for investigation of breach of agreement or contravention of law"
    notes: >
      PIPEDA applies to private-sector organizations in provinces without
      substantially similar provincial legislation. Quebec's Law 25, Alberta's
      PIPA, and British Columbia's PIPA are deemed substantially similar. The OPC
      has published detailed guidance on meaningful consent (2018) emphasizing that
      consent must be dynamic and ongoing, not a one-time event. Bill C-27
      (proposed replacement for PIPEDA) has been introduced but not enacted.

  - id: popia
    framework_ref: popia
    articles: "sec. 11, sec. 12, sec. 13, sec. 14, sec. 35, sec. 69"
    consent_definition:
      text: >
        Consent means any voluntary, specific, and informed expression of will
        in terms of which permission is given for the processing of personal
        information.
      elements:
        - "Voluntary: given freely without undue influence"
        - "Specific: relating to specific processing for identified purposes"
        - "Informed: given with full awareness of the nature and consequences"
    opt_in_vs_opt_out:
      model: "Opt-in with justification-based processing"
      details: >
        POPIA requires consent as one of several justification grounds for
        processing. Other grounds include necessity for a contract, legal
        obligation, legitimate interest, and public interest. For direct marketing,
        specific consent rules apply with an opt-in requirement for first contact
        and subsequent opt-out rights.
      direct_marketing:
        - "First contact for direct marketing requires prior consent (sec. 69)"
        - "Existing customer exception: may market similar products/services with opt-out"
        - "Must provide opt-out mechanism in every communication"
    children_consent:
      age_threshold: "18 years (unless a competent person is involved)"
      details: >
        Processing of personal information of a child (under 18) is prohibited
        unless carried out with the prior consent of a competent person (parent,
        guardian, or person who has parental responsibilities). Exceptions exist
        where processing is necessary to comply with law, for historical or
        statistical research, or to protect a legitimate interest of the child.
      parental_consent: "Required from a competent person for processing children's data (sec. 35)"
    withdrawal_mechanism:
      right_to_withdraw: true
      requirements:
        - "Data subject may withdraw consent (sec. 11(2)(b))"
        - "Withdrawal must not affect processing already completed"
        - "Must provide accessible mechanism for withdrawal"
    special_categories:
      applicable: true
      article: "sec. 26-33"
      categories:
        - "Religious or philosophical beliefs"
        - "Race or ethnic origin"
        - "Trade union membership"
        - "Political persuasion"
        - "Health or sex life"
        - "Biometric data"
        - "Criminal behavior (sec. 27)"
      consent_requirement: "Processing of special personal information is prohibited unless data subject has consented or specific exception applies (sec. 27)"
      exceptions_to_consent:
        - "Authorized by law for historical, statistical, or research purposes"
        - "Data deliberately made public by data subject"
        - "Necessary for legal proceedings"
        - "Necessary for medical purposes by healthcare professional under obligation of secrecy"
        - "Processing by insurance or pension fund in course of legitimate activities"
    additional_requirements:
      prior_authorization: >-
        Information Regulator may require prior authorization for
        processing of special personal information, transfer of
        special information abroad, or automated decision-making
        with legal effects
      responsible_party_obligations: "Responsible party must ensure consent is obtained before processing and must maintain records of consent"
    notes: >
      South Africa's POPIA became fully enforceable on 1 July 2021. The Information
      Regulator has been issuing enforcement notices and guidance. POPIA is structurally
      similar to the EU 1995 Data Protection Directive (95/46/EC). The direct marketing
      provisions are among the most specific, requiring opt-in for first contact.
      POPIA applies extraterritorially to processing of personal information of
      persons in South Africa.

  - id: pdpa-thailand
    framework_ref: pdpa-thailand
    articles: "sec. 19, sec. 20, sec. 21, sec. 26, sec. 27"
    consent_definition:
      text: >
        Consent must be given freely and specifically for the stated purpose. It
        must be in an explicit form, either in writing or through an electronic
        system. Consent requests must be clearly distinguishable from other matters
        and presented in an easily accessible form using clear and plain language.
      elements:
        - "Freely given: not conditional on unrelated obligations"
        - "Specific: tied to a particular purpose"
        - "Explicit: expressed through a clear affirmative act"
        - "Separable: clearly distinguishable from other matters"
    opt_in_vs_opt_out:
      model: "Opt-in (explicit consent required unless exception applies)"
      details: >
        PDPA Thailand requires explicit consent for collection, use, and
        disclosure of personal data unless a lawful basis exception applies.
        Exceptions include contractual necessity, vital interests, legal
        obligation, public interest, and legitimate interest. For sensitive
        data, explicit consent is required with fewer exceptions.
      exceptions_to_consent:
        - "Performance of a contract"
        - "Prevention or suppression of danger to life, body, or health"
        - "Compliance with a law"
        - "Substantial public interest"
        - "Legitimate interest (balance of interests test)"
        - "Research with appropriate safeguards"
    children_consent:
      age_threshold: "10 years (per Civil and Commercial Code capacity provisions)"
      details: >
        For data subjects who are minors (under 20) and lack legal capacity,
        consent must be obtained from a person exercising parental authority.
        Minors aged 10 and above may consent if it results in a benefit. In
        practice, organizations often obtain parental consent for children
        under 20 for higher-risk processing.
      parental_consent: "Required when the minor lacks legal capacity for the act in question"
    withdrawal_mechanism:
      right_to_withdraw: true
      requirements:
        - "Data subject may withdraw consent at any time (sec. 19(5))"
        - "Withdrawal must be as easy as giving consent"
        - "Data controller must inform data subject of consequences of withdrawal"
        - "Withdrawal does not affect lawfulness of prior processing"
    special_categories:
      applicable: true
      article: "sec. 26"
      categories:
        - "Racial or ethnic origin"
        - "Political opinions"
        - "Religious or philosophical beliefs"
        - "Trade union membership"
        - "Genetic data"
        - "Biometric data for identification"
        - "Health data"
        - "Sexual orientation or behavior"
        - "Criminal records"
      consent_requirement: "Explicit consent required for processing sensitive personal data (sec. 26)"
      exceptions_to_consent:
        - "Prevention or suppression of danger to life, body, or health"
        - "Legitimate activities of foundation, association, or not-for-profit body with adequate safeguards"
        - "Data manifestly made public by data subject"
        - "Establishment, exercise, or defense of legal claims"
        - "Compliance with a law to achieve purposes relating to employment or social security"
      research_exemption: "Research may be conducted with appropriate safeguards without explicit consent where data is anonymized or pseudonymized (sec. 26(5)(d))"
    additional_requirements:
      consent_form: "Consent request must be presented clearly and separately from other terms (sec. 19)"
      bundled_consent: "Consent that is an unjustified condition for entering into a contract is not valid (sec. 19)"
    notes: >
      Thailand's PDPA became fully effective on 1 June 2022 after multiple
      postponements. The PDPA is closely modeled on GDPR. The Personal Data
      Protection Committee (PDPC) has issued sub-legislation and notifications
      providing additional detail. The legitimate interest basis is available
      but narrower than GDPR's interpretation. The research exemption with
      safeguards provides flexibility for academic and scientific processing.

comparison_summary:
  consent_models:
    opt_in_required:
      - framework: "GDPR"
        scope: "All personal data processing based on consent"
      - framework: "LGPD"
        scope: "All personal data processing based on consent"
      - framework: "PIPL"
        scope: "All personal information processing; separate consent for sensitive data, cross-border transfer, third-party sharing"
      - framework: "PIPA Korea"
        scope: "Separate consent required for each distinct processing activity"
      - framework: "KVKK"
        scope: "Explicit consent as default legal basis; limited exceptions"
      - framework: "PDPA Thailand"
        scope: "Explicit consent unless exception applies"
    opt_in_with_deemed_consent:
      - framework: "DPDP India"
        scope: "Opt-in consent with broad deemed consent provisions"
      - framework: "PDPA Singapore"
        scope: "Consent required with deemed consent by notification"
    opt_out_primary:
      - framework: "CCPA/CPRA"
        scope: "Sale and sharing of personal information"
    mixed_model:
      - framework: "APPI"
        scope: "Opt-in for purpose change and cross-border; opt-out for third-party provision"
      - framework: "PIPEDA"
        scope: "Express or implied depending on sensitivity"
    justification_based:
      - framework: "POPIA"
        scope: "Consent or other justification ground; opt-in for direct marketing"
    authorization_model:
      - framework: "HIPAA"
        scope: "Uses of PHI beyond treatment, payment, and healthcare operations"
    prohibition_model:
      - framework: "EU AI Act"
        scope: "Certain AI practices prohibited outright; transparency for remainder"

  children_age_thresholds:
    lowest: "10 years (PDPA Thailand, civil capacity provision)"
    highest: "18 years (LGPD, DPDP India, KVKK, POPIA)"
    variable: "HIPAA (state-dependent), PIPEDA (no single threshold)"
    summary:
      - "GDPR: 13-16 (member state dependent)"
      - "LGPD: 18 (parental consent required for minors)"
      - "CCPA/CPRA: 13 (opt-in for sale), 16 (standard opt-out)"
      - "HIPAA: state-defined"
      - "EU AI Act: defers to GDPR; special protection for children as vulnerable group"
      - "PIPL: 14 (minors' data treated as sensitive)"
      - "DPDP India: 18 (verifiable parental consent required)"
      - "PDPA Singapore: not specified"
      - "APPI: not specifically defined; civil law capacity rules apply"
      - "PIPA Korea: 14 (verifiable legal representative consent)"
      - "KVKK: 18 (Turkish civil law capacity)"
      - "PIPEDA: varies; OPC guidance suggests 13"
      - "POPIA: 18 (competent person consent required)"
      - "PDPA Thailand: 10-20 (civil capacity provisions)"

  withdrawal_ease:
    gdpr: "Must be as easy to withdraw as to give; one-click standard"
    lgpd: "Free and easy procedure; no barriers or costs"
    ccpa_cpra: "Easy opt-out mechanism; 12-month wait to re-ask"
    hipaa: "Written revocation; prospective only"
    eu_ai_act: "Defers to GDPR; adds right to explanation"
    pipl: "Must be as easy to withdraw as to give; convenient method required"
    dpdp_india: "Must be as easy to withdraw as to give; consequences borne by data principal"
    pdpa_singapore: "Reasonable notice period; organization must inform of consequences"
    appi: "May request cessation of use; opt-out from third-party provision honored without delay"
    pipa_korea: "Must be at least as easy as giving consent; no disadvantages for withdrawal"
    kvkk: "May withdraw at any time; does not affect prior processing"
    pipeda: "May withdraw at any time subject to legal restrictions and reasonable notice"
    popia: "May withdraw consent; does not affect prior processing"
    pdpa_thailand: "Must be as easy to withdraw as to give; controller must inform of consequences"

  special_category_handling:
    most_categories: "GDPR, LGPD, KVKK, and PDPA Thailand (9+ categories each)"
    no_special_categories:
      - "DPDP India (no differentiation of sensitive data)"
      - "PDPA Singapore (advisory guidance only, no formal categories)"
    unique_categories:
      ccpa_cpra: "Precise geolocation, account credentials, contents of communications"
      hipaa: "Psychotherapy notes, substance abuse records, reproductive health"
      eu_ai_act: "Emotion data, biometric categorization for inferring sensitive attributes"
      pipl: "Financial account data, location tracking data, minors under 14"
      kvkk: "Appearance and dressing"
      pipa_korea: "Ideology or beliefs, unique identifiers (separate consent)"
      appi: "Social status, criminal record, fact of having suffered damage by crime"

  key_differences:
    - "GDPR/LGPD require opt-in consent; CCPA/CPRA is opt-out with exceptions"
    - "HIPAA distinguishes between consent (optional for TPO) and authorization (required for other uses)"
    - "EU AI Act prohibits certain practices outright rather than relying on consent"
    - "LGPD imposes the highest children's consent age (18) among analyzed frameworks"
    - "Only CCPA/CPRA mandates recognition of browser-level opt-out signals (GPC)"
    - "Only CCPA/CPRA explicitly prohibits dark patterns in consent flows"
    - "PIPL requires separate consent for sensitive data, cross-border transfer, third-party sharing, and public disclosure"
    - "PIPA Korea requires the most granular consent separation — distinct consent for virtually every processing activity"
    - "DPDP India uniquely does not differentiate sensitive personal data"
    - "PDPA Singapore introduced deemed consent by notification — a middle ground between opt-in and opt-out"
    - "APPI uniquely provides an opt-out mechanism for third-party data provision"
    - "KVKK is modeled on EU Directive 95/46/EC rather than GDPR, with narrower exceptions"
    - "PIPEDA uses a sensitivity-based sliding scale between express and implied consent"
    - "POPIA requires opt-in consent specifically for first-contact direct marketing"
