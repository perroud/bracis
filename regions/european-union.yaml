id: european-union
title: European Union
code: EU
description: Compliance landscape for the European Union and EEA

regulatory_authorities:
  - name: "European Data Protection Board"
    acronym: EDPB
    scope: data-protection
    url: "https://edpb.europa.eu"

  - name: "European Union Agency for Cybersecurity"
    acronym: ENISA
    scope: cybersecurity
    url: "https://www.enisa.europa.eu"

  - name: "European Banking Authority"
    acronym: EBA
    scope: financial
    url: "https://www.eba.europa.eu"

  - name: "European Securities and Markets Authority"
    acronym: ESMA
    scope: capital-markets
    url: "https://www.esma.europa.eu"

  - name: "European Insurance and Occupational Pensions Authority"
    acronym: EIOPA
    scope: insurance
    url: "https://www.eiopa.europa.eu"

  - name: "AI Office"
    acronym: AI-Office
    scope: ai-governance
    url: "https://digital-strategy.ec.europa.eu/en/policies/ai-office"

mandatory_frameworks:
  - framework_id: gdpr
    scope: "Any organization processing personal data of EU residents"
    effective_date: "2018-05-25"

  - framework_id: nis2
    scope: "Essential and important entities across 18 sectors"
    effective_date: "2024-10-17"
    industries: [critical-infrastructure, energy, transportation, healthcare, financial-services, technology, government]

  - framework_id: dora
    scope: "Financial entities and ICT third-party service providers"
    effective_date: "2025-01-17"
    industries: [financial-services]

  - framework_id: eu-ai-act
    scope: "Providers and deployers of AI systems in the EU"
    effective_date: "2024-08-01"
    phased_enforcement: true

  - framework_id: eu-cyber-resilience-act
    scope: "Products with digital elements placed on the EU market"
    effective_date: "2027-12-11"

  - framework_id: eidas-2
    scope: "Electronic identification and trust services"
    effective_date: "2024-05-20"

  - framework_id: psd2
    scope: "Payment service providers"
    industries: [financial-services, payments]

  - framework_id: mifid-ii
    scope: "Investment services and activities"
    industries: [capital-markets]

  - framework_id: eu-data-act
    scope: "Access to and use of data generated by connected products"
    effective_date: "2025-09-12"

recommended_frameworks:
  - framework_id: iso-27001-2022
    rationale: "Recognized standard for ISMS across EU member states"

  - framework_id: soc2
    rationale: "Service organization trust criteria for B2B services"

  - framework_id: cis-controls-v8
    rationale: "Prioritized security controls"

  - framework_id: nist-csf-v2
    rationale: "Risk management framework"

key_considerations:
  - "GDPR applies extraterritorially to any organization processing EU resident data"
  - "NIS2 significantly expands scope vs NIS1 - covers 18 sectors including digital infrastructure"
  - "DORA applies from January 2025 to financial entities and their critical ICT providers"
  - "EU AI Act uses risk-based classification: unacceptable, high, limited, minimal"
  - "Cyber Resilience Act introduces mandatory cybersecurity requirements for all connected products"
  - "Each EU member state has its own DPA (Data Protection Authority)"
  - "Schrems II ruling invalidated Privacy Shield - SCCs and supplementary measures required for US transfers"
  - "EU adequacy decisions determine which countries can receive personal data freely"

data_protection:
  authority: EDPB (+ national DPAs)
  primary_law: gdpr
  breach_notification: "72 hours to supervisory authority (Art. 33)"
  dpo_required: "Conditional - Art. 37 (public authority, large-scale processing, special categories)"
  cross_border_transfer: "Restricted - adequacy decisions, SCCs, BCRs, or derogations (Chapter V)"
  data_localization: false
  max_fine: "€20,000,000 or 4% of total worldwide annual turnover, whichever is higher"
