id: brazil
title: Brazil
code: BR
description: Compliance landscape for organizations operating in or processing data from Brazil

regulatory_authorities:
  - name: "Autoridade Nacional de Proteção de Dados"
    acronym: ANPD
    scope: data-protection
    url: "https://www.gov.br/anpd"

  - name: "Banco Central do Brasil"
    acronym: BACEN
    scope: financial
    url: "https://www.bcb.gov.br"

  - name: "Comissão de Valores Mobiliários"
    acronym: CVM
    scope: capital-markets
    url: "https://www.gov.br/cvm"

  - name: "Gabinete de Segurança Institucional da Presidência da República"
    acronym: GSI/PR
    scope: cybersecurity-government
    url: "https://www.gov.br/gsi"

  - name: "Instituto Nacional de Tecnologia da Informação"
    acronym: ITI
    scope: digital-certificates
    url: "https://www.gov.br/iti"

  - name: "Agência Nacional de Telecomunicações"
    acronym: ANATEL
    scope: telecommunications
    url: "https://www.gov.br/anatel"

mandatory_frameworks:
  - framework_id: lgpd
    scope: "Any organization processing personal data of individuals in Brazil"
    effective_date: "2020-09-18"
    sanctions_effective: "2021-08-01"

  - framework_id: marco-civil-internet
    scope: "Internet service providers and online platforms operating in Brazil"
    effective_date: "2014-06-23"

  - framework_id: bacen-4893
    scope: "Financial institutions and payment institutions regulated by BACEN"
    effective_date: "2021-07-01"
    industries: [financial-services]

  - framework_id: bacen-4658
    scope: "Financial institutions - cybersecurity policy"
    effective_date: "2018-04-26"
    industries: [financial-services]

  - framework_id: in-gsi-pr
    scope: "Federal government agencies - information security"
    industries: [government-federal]

  - framework_id: e-ping
    scope: "Federal government - interoperability standards"
    industries: [government-federal]

  - framework_id: e-mag
    scope: "Federal government - web accessibility"
    industries: [government]

  - framework_id: icp-brasil
    scope: "Digital certificate and electronic signature infrastructure"

recommended_frameworks:
  - framework_id: iso-27001-2022
    rationale: "ABNT NBR ISO/IEC 27001 adopted as Brazilian standard"

  - framework_id: nist-800-53-rev5
    rationale: "Reference for comprehensive security controls"

  - framework_id: cis-controls-v8
    rationale: "Prioritized security actions for implementation"

  - framework_id: soc2
    rationale: "SaaS companies selling to international clients"

  - framework_id: pci-dss-v4
    condition: "Payment processing"
    rationale: "Mandatory for card payment processing"

key_considerations:
  - "LGPD applies extraterritorially - any processing of data of individuals located in Brazil"
  - "ANPD has been issuing regulations clarifying LGPD requirements since 2022"
  - "Data localization is NOT required by LGPD, but international transfers have conditions (Art. 33)"
  - "DPO (Encarregado) is mandatory for all controllers - ANPD may simplify for small businesses"
  - "Sanctions include fines up to 2% of revenue (limited to R$50M per infraction)"
  - "BACEN Resolution 4893 requires cybersecurity policies for financial institutions"
  - "ICP-Brasil provides the legal framework for digital signatures and certificates"
  - "Federal government must follow IN GSI/PR series for information security"

data_protection:
  authority: ANPD
  primary_law: lgpd
  breach_notification: "Reasonable time (prazo razoável) - Art. 48"
  dpo_required: true
  cross_border_transfer: "Conditional - Art. 33 (adequacy, contractual clauses, consent, etc.)"
  data_localization: false
  max_fine: "2% of revenue in Brazil, limited to R$50,000,000.00 per infraction"
