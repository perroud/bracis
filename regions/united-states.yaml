id: united-states
title: United States of America
code: US
description: Compliance landscape for organizations operating in the United States

regulatory_authorities:
  - name: "Federal Trade Commission"
    acronym: FTC
    scope: consumer-protection-privacy
    url: "https://www.ftc.gov"

  - name: "Securities and Exchange Commission"
    acronym: SEC
    scope: financial-reporting
    url: "https://www.sec.gov"

  - name: "Cybersecurity and Infrastructure Security Agency"
    acronym: CISA
    scope: cybersecurity
    url: "https://www.cisa.gov"

  - name: "National Institute of Standards and Technology"
    acronym: NIST
    scope: standards
    url: "https://www.nist.gov"

  - name: "Department of Health and Human Services"
    acronym: HHS
    scope: healthcare
    url: "https://www.hhs.gov"

  - name: "Department of Defense"
    acronym: DoD
    scope: defense
    url: "https://www.defense.gov"

  - name: "Federal Financial Institutions Examination Council"
    acronym: FFIEC
    scope: financial
    url: "https://www.ffiec.gov"

  - name: "Office of the Comptroller of the Currency"
    acronym: OCC
    scope: banking
    url: "https://www.occ.treas.gov"

  - name: "New York Department of Financial Services"
    acronym: NYDFS
    scope: financial-new-york
    url: "https://www.dfs.ny.gov"

mandatory_frameworks:
  # Federal - Cross-sector
  - framework_id: fisma
    scope: "Federal agencies and contractors"
    industries: [government-federal]

  - framework_id: fedramp
    scope: "Cloud service providers to federal agencies"

  # Healthcare
  - framework_id: hipaa
    scope: "Covered entities and business associates handling PHI"
    industries: [healthcare]

  # Financial
  - framework_id: sox
    scope: "Publicly traded companies"
    industries: [financial-services]

  - framework_id: glba
    scope: "Financial institutions"
    industries: [financial-services]

  - framework_id: pci-dss-v4
    scope: "Entities handling cardholder data"
    industries: [financial-services, retail]

  # Defense
  - framework_id: cmmc-v2
    scope: "DoD contractors handling CUI/FCI"
    industries: [defense]

  - framework_id: itar
    scope: "Defense articles and technical data"
    industries: [defense, aerospace]

  # Education
  - framework_id: ferpa
    scope: "Educational institutions receiving federal funding"
    industries: [education]

  - framework_id: coppa
    scope: "Online services directed to children under 13"

  # State-level privacy
  - framework_id: ccpa-cpra
    scope: "Businesses meeting thresholds processing California residents' data"
    sub_jurisdiction: us-california

  - framework_id: nydfs-23-nycrr-500
    scope: "Financial institutions licensed by NYDFS"
    sub_jurisdiction: us-new-york
    industries: [financial-services]

recommended_frameworks:
  - framework_id: nist-800-53-rev5
    rationale: "De facto standard for US cybersecurity controls"

  - framework_id: nist-csf-v2
    rationale: "Voluntary but widely adopted risk management framework"

  - framework_id: cis-controls-v8
    rationale: "Prioritized, actionable security controls"

  - framework_id: soc2
    rationale: "Essential for B2B SaaS and service organizations"

  - framework_id: iso-27001-2022
    rationale: "International certification for global operations"

  - framework_id: nist-800-171-rev3
    rationale: "Protecting CUI in nonfederal systems, required for DoD contractors"

  - framework_id: hitrust-csf
    rationale: "Comprehensive certifiable framework widely adopted in healthcare"

  - framework_id: csa-ccm-v4
    rationale: "Cloud security controls for CSPs and cloud consumers"

  - framework_id: iso-27701
    rationale: "Privacy information management extension to ISO 27001"

key_considerations:
  - "No single comprehensive federal privacy law (unlike GDPR)"
  - "Sector-specific regulations (HIPAA, GLBA, FERPA, COPPA)"
  - "Growing patchwork of state privacy laws (CA, VA, CO, CT, UT, TX, OR, MT, etc.)"
  - "CISA increasingly active in setting cybersecurity directives (BODs, EDs)"
  - "SEC cybersecurity disclosure rules effective December 2023"
  - "Executive Order 14028 (2021) strengthened federal cybersecurity requirements"
  - "CMMC 2.0 program rule finalized October 2024"
  - "FTC enforcement actions for unfair/deceptive data practices"

data_protection:
  authority: "No single federal authority (FTC, HHS, SEC, state AGs)"
  primary_law: "Sector-specific (HIPAA, GLBA, COPPA, state laws)"
  breach_notification: "Varies by state (typically 30-60 days)"
  dpo_required: "Not federally required (some state laws require)"
  cross_border_transfer: "No general restriction (sector-specific rules apply)"
  data_localization: "Not generally required (some government data restrictions)"
  max_fine: "Varies by statute and enforcement agency"
