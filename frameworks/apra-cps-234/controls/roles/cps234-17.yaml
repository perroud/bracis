id: cps234-17
family: roles
title: "Governing Body Oversight"
class: CPS234

statement:
  prose: >-
    Where an APRA-regulated entity has a governing body responsible for
    oversight of information security, the governing body must receive
    sufficient information to enable it to provide credible challenge
    to senior management on information security matters and to assess
    the adequacy of the entity's information security.
  parts:
    - id: cps234-17.a
      label: "a."
      prose: >-
        The governing body must receive regular reporting on the
        status of the entity's information security, including
        material information security incidents, results of testing,
        and emerging threats.
    - id: cps234-17.b
      label: "b."
      prose: >-
        The governing body must satisfy itself that the entity's
        information security is commensurate with the size and extent
        of threats to its information assets.

guidance:
  prose: >-
    APRA distinguishes between the Board and subordinate governing
    bodies such as risk committees or technology committees. Where
    such bodies exist, they serve as the primary forum for detailed
    scrutiny of information security. The governing body must not
    be a rubber-stamp function — it must have sufficient expertise
    and information to challenge management assertions. Reporting
    to the governing body must be timely, accurate, and include both
    quantitative metrics and qualitative risk assessments. The
    governing body should review results of security testing,
    incident trends, third-party security posture, and progress
    on remediation of identified weaknesses.

references:
  - citation: "APRA Prudential Standard CPS 234, Paragraph 17"
    url: "https://www.legislation.gov.au/F2018L01745/latest/text"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build automated reporting pipelines that aggregate security
      metrics from across the platform into governing-body-ready
      dashboards. Pull data from vulnerability scanners, CMDB,
      incident management, and compliance engines into a unified
      view. Implement trend analysis showing security posture over
      time, including vulnerability aging, patch compliance rates,
      and configuration drift. Provide drill-down capability from
      executive summaries to technical detail. Schedule automated
      report generation aligned with governing body meeting cadences.
    tools:
      - grafana
      - backstage
      - dependency-track
      - prometheus
      - open-policy-agent

  devsecops:
    prose: >-
      Generate periodic compliance summary reports from CI/CD
      pipeline data showing scan coverage, vulnerability trends,
      remediation velocity, and policy violation rates. Aggregate
      security findings across all repositories into a centralized
      vulnerability management dashboard. Provide governing body
      with visibility into the security quality gate pass/fail
      rates and the most common security defect categories. Track
      and report on security debt (known vulnerabilities accepted
      as risk) with clear ownership and remediation timelines.
    tools:
      - defectdojo
      - gitlab-ci
      - sonarqube
      - trivy
      - grafana

  secops:
    prose: >-
      Produce governing body reporting packs from SIEM and incident
      management data covering: incident volumes and severity
      distribution, mean time to detect (MTTD) and respond (MTTR),
      threat intelligence summaries, testing results, and
      remediation progress. Implement automated report generation
      with executive summary and detailed appendices. Track
      governing body directives and action items to closure.
      Provide comparative benchmarking where available (sector
      averages, historical trends).
    tools:
      - splunk
      - elastic-siem
      - grc-platform
      - servicenow
      - defectdojo

