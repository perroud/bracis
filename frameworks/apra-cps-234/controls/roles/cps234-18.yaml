id: cps234-18
family: roles
title: "Information Security Function Resources"
class: CPS234

statement:
  prose: >-
    An APRA-regulated entity must maintain an information security
    function with sufficient resources, including appropriately skilled
    and experienced personnel, to manage the information security
    environment consistent with the entity's risk appetite and
    information security obligations.
  parts:
    - id: cps234-18.a
      label: "a."
      prose: >-
        The information security function must have sufficient
        authority to require compliance with the entity's information
        security policy framework across all business units and
        support functions.
    - id: cps234-18.b
      label: "b."
      prose: >-
        The entity must ensure that the resourcing of the information
        security function is regularly assessed and remains adequate
        given changes in the threat environment, technology landscape,
        and business operations.

guidance:
  prose: >-
    APRA expects the information security function to be adequately
    resourced with skilled personnel who can execute across all
    domains of information security: governance, risk assessment,
    architecture, operations, incident response, and testing. The
    function must have organizational authority — not just technical
    competence — to enforce security requirements across the entity.
    Under-resourcing the security function is a common finding in
    APRA supervisory activities. The adequacy of resourcing should
    be assessed at least annually, considering changes in the threat
    landscape, regulatory expectations, and the entity's own
    technology footprint.

references:
  - citation: "APRA Prudential Standard CPS 234, Paragraph 18"
    url: "https://www.legislation.gov.au/F2018L01745/latest/text"

implementation_guidance:
  platform_engineering:
    prose: >-
      Automate routine security operations to maximize the
      effectiveness of available security personnel. Implement
      self-service security tooling embedded in the developer
      platform (pre-configured scanning, security templates,
      golden paths) to reduce the burden on the security function.
      Use infrastructure-as-code to enforce security baselines
      declaratively rather than requiring manual review. Deploy
      policy-as-code (OPA/Gatekeeper) to automate compliance
      checking at admission time. Maintain capacity metrics for
      the security function including ticket volumes, response
      times, and backlog trends.
    tools:
      - backstage
      - open-policy-agent
      - gatekeeper
      - terraform
      - crossplane

  devsecops:
    prose: >-
      Shift security left to distribute security workload across
      development teams while maintaining central governance.
      Implement security champion programs where trained developers
      act as first-line security resources within their teams.
      Automate security scanning in pipelines to reduce manual
      review requirements. Provide self-service security tools
      (secret scanning, dependency checking, SAST) that developers
      can run independently. Track the ratio of security findings
      to available security review capacity to justify resourcing
      decisions.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-secret-detection
      - trivy
      - semgrep

  secops:
    prose: >-
      Implement SOAR (Security Orchestration, Automation and Response)
      to automate repetitive security operations tasks and maximize
      analyst effectiveness. Track security operations workload
      metrics (alerts per analyst, MTTR, backlog aging) to evidence
      resource adequacy or gaps. Maintain a skills matrix mapping
      security operations personnel to required competencies
      (incident response, forensics, threat intelligence, cloud
      security). Automate tier-1 alert triage to allow skilled
      analysts to focus on complex investigations. Generate
      resource adequacy reports for management review.
    tools:
      - splunk
      - elastic-siem
      - wazuh
      - shuffle-soar
      - thehive

