id: cps234-15
family: roles
title: "Board Responsibilities"
class: CPS234

statement:
  prose: >-
    The Board of an APRA-regulated entity is ultimately responsible for
    the information security of the entity. The Board must ensure that
    the entity maintains information security in a manner commensurate
    with the size and extent of threats to its information assets, and
    which enables the continued sound operation of the entity.
  parts:
    - id: cps234-15.a
      label: "a."
      prose: >-
        The Board must ensure there are clearly defined roles and
        responsibilities for the Board, senior management, governing
        bodies, and individuals with responsibility for decision-making,
        approval, oversight, operations, and other information security
        functions.
    - id: cps234-15.b
      label: "b."
      prose: >-
        The Board must ensure there is an information security capability
        commensurate with the size and extent of threats to information
        assets, which enables the entity to operate within its risk
        appetite on an ongoing basis.
    - id: cps234-15.c
      label: "c."
      prose: >-
        The Board must ensure there is an information security policy
        framework, appropriate allocation of resources, and regular
        review of the effectiveness of information security controls.

guidance:
  prose: >-
    This paragraph establishes the Board as the apex of accountability
    for information security. APRA expects the Board to demonstrate
    active oversight rather than passive delegation. The Board must be
    able to evidence that it receives adequate reporting on information
    security risks, understands the entity's threat landscape, and has
    satisfied itself that the information security framework is
    commensurate with the entity's risk profile. This includes oversight
    of third-party and related-party arrangements that may affect
    information security.

references:
  - citation: "APRA Prudential Standard CPS 234, Paragraph 15"
    url: "https://www.legislation.gov.au/F2018L01745/latest/text"
  - citation: "APRA CPG 234 — Information Security (Guidance)"
