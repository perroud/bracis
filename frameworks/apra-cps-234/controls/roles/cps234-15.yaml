implementation_guidance:
  platform_engineering:
    prose: >-
      Implement board-level security dashboards aggregating key metrics
      from infrastructure and application layers. Use a service catalog
      (Backstage) to maintain visibility of all information assets and
      their ownership. Deploy automated compliance reporting pipelines
      that generate board-ready summaries of security posture, open
      vulnerabilities, and control effectiveness. Establish GitOps-based
      RACI matrices defining roles and responsibilities for security
      functions across platform teams. Automate evidence collection for
      board reporting cadences using scheduled pipeline jobs that pull
      data from vulnerability scanners, CMDB, and incident management
      systems.
    tools:
      - backstage
      - grafana
      - open-policy-agent
      - terraform
      - dependency-track

  devsecops:
    prose: >-
      Embed security governance into CI/CD pipelines so that board-level
      accountability translates into enforceable controls at the
      development layer. Implement automated RACI enforcement where
      security-critical changes require approval from designated
      security roles. Generate pipeline-driven compliance evidence
      (scan results, approval logs, change records) that feeds into
      board reporting. Use merge request approval rules to enforce
      segregation of duties aligned with the board-defined
      responsibility framework. Maintain audit trails of all security
      decisions in version control.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dependency-scanning
      - sonarqube
      - trivy

  secops:
    prose: >-
      Maintain a security operations reporting framework that provides
      the Board with regular visibility into threat landscape, incident
      trends, and control effectiveness. Implement executive dashboards
      in the SIEM aggregating key risk indicators (KRIs) and key
      performance indicators (KPIs) for information security. Automate
      generation of board reporting packs covering incident volumes,
      mean time to detect/respond, vulnerability remediation rates, and
      third-party security posture. Track board-directed remediation
      actions to closure with documented evidence.
    tools:
      - splunk
      - elastic-siem
      - wazuh
      - defectdojo
      - grc-platform

