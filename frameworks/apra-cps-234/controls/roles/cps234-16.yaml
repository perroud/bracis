id: cps234-16
family: roles
title: "Senior Management Responsibilities"
class: CPS234

statement:
  prose: >-
    Senior management of an APRA-regulated entity must clearly define
    the information security-related roles and responsibilities of all
    parties, including those with responsibility for decision-making,
    approval, oversight, operations, and other information security
    functions. Senior management must ensure that these roles and
    responsibilities are assigned to individuals with the appropriate
    skills, knowledge, and authority.
  parts:
    - id: cps234-16.a
      label: "a."
      prose: >-
        Senior management must delegate and assign information security
        roles and responsibilities across the entity, ensuring
        accountability for maintaining information security controls
        and processes at all operational levels.
    - id: cps234-16.b
      label: "b."
      prose: >-
        Senior management must ensure that individuals assigned
        information security responsibilities have the necessary
        competence, authority, and resources to discharge their
        responsibilities effectively.

guidance:
  prose: >-
    Senior management is the operational bridge between board-level
    accountability and day-to-day execution. APRA expects senior
    management to maintain a documented responsibility assignment
    covering all information security functions, not just the CISO
    or IT security team. This includes business unit owners who are
    custodians of information assets, risk management functions, and
    operational staff. The assignment must be specific enough that
    there are no gaps or ambiguities in accountability, particularly
    at the boundaries between first-line (business), second-line
    (risk), and third-line (audit) functions.

references:
  - citation: "APRA Prudential Standard CPS 234, Paragraph 16"
    url: "https://www.legislation.gov.au/F2018L01745/latest/text"

implementation_guidance:
  platform_engineering:
    prose: >-
      Define ownership metadata for every service and infrastructure
      component in the service catalog (Backstage). Enforce CODEOWNERS
      files in all repositories mapping security-critical paths to
      designated security owners. Implement RBAC policies in
      infrastructure-as-code ensuring that only authorized roles can
      modify security configurations (network policies, IAM, secrets).
      Use OPA/Gatekeeper policies to enforce that every deployed
      resource has an assigned owner and security contact. Automate
      periodic review of access permissions against the defined
      responsibility matrix.
    tools:
      - backstage
      - open-policy-agent
      - gatekeeper
      - terraform
      - vault

  devsecops:
    prose: >-
      Implement merge request approval rules that enforce security
      review by designated security-responsible individuals for
      changes affecting sensitive components. Use CODEOWNERS to
      require approval from security function owners for changes
      to authentication, authorization, encryption, and logging
      modules. Maintain a documented RACI matrix in version control
      mapping pipeline stages (build, scan, deploy) to responsible
      individuals. Enforce branch protection rules requiring
      security sign-off for production deployments. Track security
      responsibility assignments in the project management tool and
      validate coverage periodically.
    tools:
      - gitlab-ci
      - gitlab-approvals
      - codeowners
      - jira
      - sonarqube

  secops:
    prose: >-
      Maintain an up-to-date responsibility matrix in the GRC
      platform mapping security operations functions (monitoring,
      triage, response, forensics) to named individuals and their
      deputies. Implement on-call rotation management with clear
      escalation paths for security incidents. Track competency
      requirements and certifications for all security operations
      staff. Generate periodic reports on responsibility coverage
      gaps and remediation actions. Ensure that SIEM alert routing
      rules align with the documented responsibility matrix.
    tools:
      - grc-platform
      - pagerduty
      - splunk
      - elastic-siem
      - servicenow

