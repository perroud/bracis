id: cps234-32
family: testing
title: "Systematic Testing of Security Controls"
class: CPS234

statement:
  prose: >-
    An APRA-regulated entity must test the effectiveness of its
    information security controls through a systematic testing program.
    The nature and frequency of the systematic testing must be
    commensurate with the rate at which vulnerabilities and threats
    change, the criticality and sensitivity of the information asset,
    the consequences of an information security incident, and the
    risks associated with exposure to environments where the entity is
    unable to enforce its information security policies.
  parts:
    - id: cps234-32.a
      label: "a."
      prose: >-
        The testing program must cover the full range of information
        security controls, including technical controls, administrative
        controls, and physical controls.
    - id: cps234-32.b
      label: "b."
      prose: >-
        The frequency and depth of testing must be proportionate to
        the criticality of the information asset and the rate of
        change in the threat landscape.
    - id: cps234-32.c
      label: "c."
      prose: >-
        The testing program must include testing of controls over
        information assets managed by third parties and related
        parties.

guidance:
  prose: >-
    Systematic testing validates that controls are operating as
    intended and are effective against current threats. APRA expects
    a risk-based testing program — not a one-size-fits-all approach.
    Critical systems require more frequent and more rigorous testing
    than lower-risk assets. Testing types include vulnerability
    assessments, penetration testing, red team exercises, configuration
    reviews, access reviews, and social engineering tests. The testing
    program should cover both preventive controls (do they block
    attacks?) and detective controls (do they identify incidents?).
    Testing must extend to third-party environments — entities cannot
    rely solely on third-party self-attestation.

references:
  - citation: "APRA Prudential Standard CPS 234, Paragraph 32"
    url: "https://www.legislation.gov.au/F2018L01745/latest/text"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement continuous automated security testing integrated
      into the platform lifecycle. Deploy vulnerability scanning
      on all infrastructure components on a scheduled basis with
      frequency calibrated to asset classification. Implement
      configuration compliance scanning (CIS Benchmarks, custom
      policies) running continuously with drift detection and
      alerting. Deploy chaos engineering practices that validate
      security control resilience under failure conditions.
      Automate penetration testing of infrastructure services
      using tools like Nuclei for known vulnerability validation.
      Maintain a testing coverage matrix mapping all information
      assets to their testing schedule and last test date.
    tools:
      - trivy
      - nessus
      - nuclei
      - checkov
      - kube-bench
      - prowler
      - grafana

  devsecops:
    prose: >-
      Embed continuous security testing into CI/CD pipelines with
      automated SAST, DAST, SCA, and container scanning on every
      build. Schedule periodic deep scans (full DAST, manual
      penetration testing) for critical applications. Implement
      automated regression testing for previously identified
      vulnerabilities ensuring they remain remediated. Track
      testing coverage per application and enforce minimum
      testing requirements based on asset classification. Generate
      testing evidence reports (scan results, test dates, coverage
      metrics) as pipeline artifacts for audit consumption. Validate
      third-party component security through automated SCA and
      container image scanning.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dast
      - gitlab-container-scanning
      - gitlab-dependency-scanning
      - zap
      - nuclei
      - trivy

  secops:
    prose: >-
      Maintain a master testing schedule in the GRC platform mapping
      all information assets to their required testing types,
      frequencies, and responsible parties. Track testing execution
      and results centrally in a vulnerability management platform.
      Schedule and coordinate penetration testing engagements with
      scope driven by asset classification. Conduct red team
      exercises against critical systems at least annually. Validate
      detective control effectiveness through purple team exercises
      that test detection coverage against MITRE ATT&CK techniques.
      Generate testing program completeness reports for governing
      body review, including coverage gaps and remediation priorities.
    tools:
      - defectdojo
      - grc-platform
      - splunk
      - nessus
      - burpsuite
      - cobalt-strike

