id: cps234-33
family: testing
title: "Testing by Competent Specialists"
class: CPS234

statement:
  prose: >-
    An APRA-regulated entity must ensure that testing is conducted by
    appropriately skilled and functionally independent specialists.
    The functional independence requirement may be met through the use
    of qualified internal or external specialists, provided they are
    independent from the development and maintenance of the information
    security controls being tested.
  parts:
    - id: cps234-33.a
      label: "a."
      prose: >-
        Testing personnel must have the skills and expertise
        appropriate to the nature and complexity of the testing being
        conducted.
    - id: cps234-33.b
      label: "b."
      prose: >-
        Testing personnel must be functionally independent of the
        teams responsible for developing and maintaining the
        information security controls being tested.

guidance:
  prose: >-
    Independence and competency are non-negotiable for testing
    credibility. APRA does not require external testing for all
    scenarios — internal specialists can satisfy the requirement
    provided they are independent from the function being tested.
    The developer of a control should never be the sole tester of
    that control. Competency means that testers must have appropriate
    qualifications, certifications (e.g., OSCP, CREST), and experience
    for the type of testing being performed. For complex testing
    (threat-led penetration testing, red team exercises), external
    specialists may be necessary to provide the required expertise
    and objectivity.

references:
  - citation: "APRA Prudential Standard CPS 234, Paragraph 33"
    url: "https://www.legislation.gov.au/F2018L01745/latest/text"

implementation_guidance:
  platform_engineering:
    prose: >-
      Enforce separation of duties in platform tooling: engineers
      who build infrastructure controls must not be the same
      individuals who validate those controls in testing. Implement
      RBAC policies in testing tools that restrict test execution
      to authorized, independent testers. Deploy automated testing
      that reduces human bias — infrastructure compliance scanning
      (CIS Benchmarks, custom policies) runs automatically without
      developer intervention. For manual testing engagements, enforce
      test scope and methodology documentation requirements in
      version control. Track tester qualifications and independence
      declarations in the testing program register.
    tools:
      - kube-bench
      - prowler
      - checkov
      - open-policy-agent
      - backstage

  devsecops:
    prose: >-
      Implement pipeline-based security testing that executes
      independently of development teams — scanning tools run
      automatically in CI/CD without developer configuration or
      override capability. For manual security testing (penetration
      tests, code reviews), enforce independence requirements through
      approval workflows that verify the tester has no involvement
      in the code being tested. Maintain a register of qualified
      security testers (internal and external) with their
      certifications and areas of expertise. Track and report on
      testing independence compliance across all testing activities.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dast
      - burpsuite
      - defectdojo

  secops:
    prose: >-
      Maintain a qualified tester register in the GRC platform
      mapping testers to their certifications (OSCP, CREST, GPEN,
      etc.), experience domains, and independence status relative
      to each testing engagement. Enforce independence verification
      as a prerequisite for test engagement approval. For external
      testing engagements, validate provider qualifications and
      independence through procurement due diligence. Review testing
      reports for evidence of adequate methodology and depth
      appropriate to the scope. Track testing competency gaps and
      plan training or external engagement to address them.
    tools:
      - grc-platform
      - defectdojo
      - servicenow
      - jira

