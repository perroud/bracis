id: cps234-34
family: testing
title: "Escalation of Testing Findings"
class: CPS234

statement:
  prose: >-
    An APRA-regulated entity must escalate and report to the Board or
    a governing body the results of testing of information security
    controls in a timely manner. The entity must remediate identified
    deficiencies in a timely manner.
  parts:
    - id: cps234-34.a
      label: "a."
      prose: >-
        Testing results, including identified deficiencies, must be
        reported to the Board or a governing body in a timely manner,
        with sufficient detail to support decision-making on
        remediation priorities.
    - id: cps234-34.b
      label: "b."
      prose: >-
        The entity must track remediation of identified deficiencies
        to completion, with timelines commensurate with the severity
        of the deficiency and the criticality of the affected
        information asset.

guidance:
  prose: >-
    Testing without remediation is theater. APRA expects testing
    findings to flow upward to governance bodies with appropriate
    urgency, and for remediation to be tracked to closure with
    defined timelines. Critical findings affecting high-risk assets
    should be escalated immediately, not held for the next scheduled
    board meeting. The governing body must receive sufficient context
    to assess risk and prioritize remediation investments. Remediation
    timelines must be realistic but not permissive — APRA will
    scrutinize entities that accept critical vulnerabilities for
    extended periods without remediation or compensating controls.

references:
  - citation: "APRA Prudential Standard CPS 234, Paragraph 34"
    url: "https://www.legislation.gov.au/F2018L01745/latest/text"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated escalation workflows that route testing
      findings to the appropriate governance level based on severity
      and asset classification. Deploy vulnerability management
      dashboards with real-time visibility into finding status,
      aging, and remediation progress. Automate SLA tracking for
      remediation: critical findings on restricted assets trigger
      immediate notifications to senior management and governing
      body delegates. Generate board-ready testing summary reports
      from vulnerability management data including trend analysis,
      remediation velocity, and outstanding risk exposure. Implement
      automated compensating control deployment for findings that
      cannot be remediated within SLA.
    tools:
      - defectdojo
      - grafana
      - pagerduty
      - jira
      - backstage

  devsecops:
    prose: >-
      Implement automated finding triage and assignment in CI/CD
      pipelines. Route critical findings to security teams
      immediately via integration with incident management tools.
      Track finding remediation through merge requests linked to
      the original finding. Implement verification scanning that
      confirms findings are remediated before closing. Generate
      remediation velocity metrics (time from finding to fix per
      severity per team) for management reporting. Block production
      deployments with unresolved critical findings beyond their
      SLA. Automate escalation notifications when finding
      remediation SLAs are approaching expiry.
    tools:
      - gitlab-ci
      - defectdojo
      - jira
      - trivy
      - sonarqube

  secops:
    prose: >-
      Operate a centralized vulnerability management process with
      findings from all testing activities (automated scans,
      penetration tests, red teams, audits) consolidated in a single
      platform. Implement risk-based SLAs for remediation calibrated
      to finding severity and asset classification. Automate
      escalation to governing bodies when critical findings remain
      open beyond defined thresholds. Generate periodic testing
      summary reports for governing body consumption including:
      finding volumes by severity, remediation rates, aging analysis,
      top-risk findings, and trend comparisons. Track remediation
      evidence and conduct verification testing before closure.
    tools:
      - defectdojo
      - grc-platform
      - splunk
      - servicenow
      - jira

