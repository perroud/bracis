id: cps234-36
family: audit
title: "Internal Audit Competency"
class: CPS234

statement:
  prose: >-
    An APRA-regulated entity must ensure that internal audit personnel
    who review information security controls have sufficient skills,
    knowledge, and experience in information security assurance to
    provide credible and effective audit review.
  parts:
    - id: cps234-36.a
      label: "a."
      prose: >-
        Internal audit personnel reviewing information security
        controls must possess relevant technical expertise and
        assurance qualifications appropriate to the scope and
        complexity of the controls being reviewed.
    - id: cps234-36.b
      label: "b."
      prose: >-
        Where internal audit personnel lack sufficient information
        security expertise, the entity must supplement with external
        specialists who possess the required skills.

guidance:
  prose: >-
    The value of internal audit is directly proportional to the
    competency of the auditors. Information security is a specialized
    domain — general audit skills are necessary but not sufficient.
    APRA expects audit personnel reviewing information security
    controls to have relevant certifications (CISA, CISM, CISSP,
    or equivalent), technical experience with the technologies being
    audited, and ongoing professional development to maintain
    currency. Where the internal audit function lacks depth in
    information security, the entity must engage external co-source
    or outsource arrangements. The competency requirement applies
    to the full range of information security domains: governance,
    architecture, operations, incident management, and testing.

references:
  - citation: "APRA Prudential Standard CPS 234, Paragraph 36"
    url: "https://www.legislation.gov.au/F2018L01745/latest/text"

implementation_guidance:
  platform_engineering:
    prose: >-
      Provide internal audit with documentation of platform
      architecture, security controls, and operational procedures
      sufficient to enable effective review. Maintain architecture
      decision records (ADRs) and threat models in version control
      accessible to audit. Deploy self-documenting infrastructure
      (infrastructure-as-code with inline documentation) that
      reduces the knowledge barrier for auditors. Implement
      platform-level compliance dashboards that auditors can use
      independently to assess control effectiveness. Provide
      sandbox environments where auditors can validate controls
      without impacting production.
    tools:
      - backstage
      - terraform
      - grafana
      - open-policy-agent
      - kubernetes

  devsecops:
    prose: >-
      Maintain comprehensive documentation of CI/CD security
      controls, pipeline configurations, and security quality
      gates accessible to internal audit. Provide auditors with
      read-only access to pipeline logs, scan results, and
      deployment records. Generate audit-friendly reports mapping
      pipeline controls to CPS 234 requirements with evidence of
      operating effectiveness. Implement self-documenting pipelines
      where security control configurations are version-controlled
      and human-readable. Support audit testing by providing
      test environments that mirror production pipeline
      configurations.
    tools:
      - gitlab-ci
      - gitlab-audit-events
      - defectdojo
      - sonarqube
      - trivy

  secops:
    prose: >-
      Maintain a skills matrix for internal audit personnel mapping
      their information security qualifications, certifications
      (CISA, CISM, CISSP, OSCP), and domain expertise to audit
      scope requirements. Track certification currency and
      continuing professional development hours. Identify competency
      gaps and engage external specialists to supplement. Provide
      internal audit with training on security operations tools
      (SIEM, vulnerability management) sufficient for independent
      evidence gathering. Maintain relationships with qualified
      external audit firms for co-source engagements on complex
      information security audits.
    tools:
      - grc-platform
      - servicenow
      - splunk
      - elastic-siem

