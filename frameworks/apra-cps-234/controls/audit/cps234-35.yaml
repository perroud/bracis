id: cps234-35
family: audit
title: "Internal Audit Review"
class: CPS234

statement:
  prose: >-
    The internal audit function of an APRA-regulated entity must
    review the design and operating effectiveness of information
    security controls, including those maintained by related parties
    and third parties. The scope and frequency of the internal audit
    review must be commensurate with the criticality of the information
    assets and the extent of the entity's information security
    obligations.
  parts:
    - id: cps234-35.a
      label: "a."
      prose: >-
        The internal audit function must include information security
        controls within its audit universe and risk-based audit plan.
    - id: cps234-35.b
      label: "b."
      prose: >-
        Internal audit must assess the design adequacy and operating
        effectiveness of information security controls, not merely
        their existence.
    - id: cps234-35.c
      label: "c."
      prose: >-
        The scope of internal audit must extend to information
        security controls maintained by related parties and third
        parties managing information assets on behalf of the entity.

guidance:
  prose: >-
    Internal audit provides the third line of defense — independent
    assurance that information security controls are designed
    adequately and operating effectively. APRA expects internal audit
    to go beyond checking that controls exist on paper to testing
    whether they actually work in practice. Design effectiveness
    asks: if the control operates as intended, would it mitigate
    the risk? Operating effectiveness asks: is the control actually
    operating as intended over the review period? Internal audit
    must cover the full scope of information security, including
    controls operated by third parties — this may require audit
    rights clauses in contracts or reliance on third-party assurance
    reports (SOC 2 Type II) supplemented by targeted testing.

references:
  - citation: "APRA Prudential Standard CPS 234, Paragraph 35"
    url: "https://www.legislation.gov.au/F2018L01745/latest/text"

implementation_guidance:
  platform_engineering:
    prose: >-
      Maintain comprehensive audit logging across all platform
      components with tamper-evident storage. Implement automated
      compliance evidence collection that generates audit-ready
      artifacts: configuration snapshots, access reviews, change
      logs, scan results, and control effectiveness metrics.
      Deploy continuous control monitoring that provides internal
      audit with real-time visibility into control operating status.
      Implement infrastructure-as-code drift detection that alerts
      when actual infrastructure diverges from the declared secure
      state. Maintain a platform audit trail covering all
      privileged operations, configuration changes, and
      access modifications.
    tools:
      - grafana
      - prometheus
      - falco
      - terraform
      - open-policy-agent
      - backstage

  devsecops:
    prose: >-
      Generate continuous audit evidence from CI/CD pipelines:
      scan results, approval records, deployment logs, and
      policy compliance reports stored in immutable storage.
      Implement pipeline integrity controls that prevent
      tampering with audit evidence. Provide internal audit
      with read-only access to pipeline dashboards and artifact
      repositories. Generate periodic compliance summary reports
      mapping pipeline controls to CPS 234 requirements. Track
      audit finding remediation as pipeline-enforced tasks with
      automated verification. Maintain evidence of security
      quality gate enforcement including blocked deployments and
      exception approvals.
    tools:
      - gitlab-ci
      - gitlab-audit-events
      - defectdojo
      - sonarqube
      - trivy

  secops:
    prose: >-
      Provide internal audit with access to SIEM dashboards,
      incident records, and control effectiveness reports. Maintain
      a continuous control monitoring capability that generates
      real-time evidence of control operating effectiveness.
      Track audit findings in the GRC platform with remediation
      timelines, owners, and status. Generate audit-ready evidence
      packs on demand covering: incident response metrics, monitoring
      coverage, vulnerability management KPIs, and access review
      completion. Facilitate audit access to third-party assurance
      reports (SOC 2 Type II, ISO 27001 certificates) and track
      their validity periods.
    tools:
      - grc-platform
      - splunk
      - elastic-siem
      - servicenow
      - defectdojo

