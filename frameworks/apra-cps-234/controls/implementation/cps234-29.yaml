id: cps234-29
family: implementation
title: "Controls Proportional to Criticality"
class: CPS234

statement:
  prose: >-
    An APRA-regulated entity must implement information security
    controls on a timely basis that are commensurate with the
    criticality and sensitivity of the information asset, and the
    stage at which the asset exists in its lifecycle. Where the
    entity is unable to implement controls on a timely basis, it
    must escalate the matter to the Board or its delegate and, where
    appropriate, to APRA.
  parts:
    - id: cps234-29.a
      label: "a."
      prose: >-
        Controls must be proportionate to the criticality and
        sensitivity of the information assets they protect, with
        more rigorous controls applied to assets classified at
        higher levels.
    - id: cps234-29.b
      label: "b."
      prose: >-
        Where control implementation cannot be achieved in a timely
        manner, the entity must implement compensating controls and
        escalate the gap to the Board or its delegate, and to APRA
        where the residual risk is material.

guidance:
  prose: >-
    Proportionality is a core principle of CPS 234. Not all information
    assets require the same level of control — a public-facing marketing
    website has different requirements than a core banking system. APRA
    expects entities to use the classification scheme (paragraphs 26-27)
    to drive control intensity. The timeliness requirement is critical:
    known vulnerabilities or control gaps affecting high-criticality
    assets must be addressed urgently. Where timely remediation is not
    possible, the entity must not simply accept the risk — it must
    implement compensating controls and escalate through governance.
    Persistent failure to implement required controls on a timely
    basis may trigger APRA supervisory action.

references:
  - citation: "APRA Prudential Standard CPS 234, Paragraph 29"
    url: "https://www.legislation.gov.au/F2018L01745/latest/text"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement tiered infrastructure security profiles driven by
      asset classification labels. Critical assets: dedicated node
      pools, enhanced network isolation, encryption with customer-
      managed keys, real-time integrity monitoring, and multi-zone
      redundancy. Standard assets: shared infrastructure with
      baseline controls. Define SLAs for control implementation
      based on asset classification: critical vulnerabilities on
      restricted assets must be patched within 48 hours, on
      standard assets within 14 days. Implement automated
      compensating control deployment (e.g., WAF rules, network
      restrictions) when primary controls cannot be implemented
      immediately. Track control implementation gaps with automated
      escalation workflows.
    tools:
      - terraform
      - open-policy-agent
      - gatekeeper
      - falco
      - vault
      - grafana

  devsecops:
    prose: >-
      Configure security quality gates with thresholds calibrated to
      asset classification. Restricted-class services: zero critical
      or high findings allowed, mandatory DAST, mandatory penetration
      test before production. Standard services: critical findings
      blocked, high findings tracked with remediation SLA. Implement
      automated vulnerability SLA tracking that escalates overdue
      remediations based on asset classification. Deploy compensating
      pipeline controls (additional scanning, manual review gates)
      when standard controls cannot be applied. Track and report on
      control implementation timeliness per classification tier.
    tools:
      - gitlab-ci
      - defectdojo
      - trivy
      - semgrep
      - sonarqube
      - jira

  secops:
    prose: >-
      Implement risk-based monitoring and alerting calibrated to
      asset classification. Critical assets: real-time alerting with
      immediate escalation for control failures. Standard assets:
      batch monitoring with standard escalation. Track vulnerability
      remediation SLAs by asset classification and automatically
      escalate breaches to the governing body. Maintain a risk
      register of control gaps with compensating controls, residual
      risk ratings, and escalation status. Generate board-level
      reporting on control implementation timeliness and outstanding
      gaps. Automate APRA notification workflows for material
      control gaps that cannot be remediated within defined
      timeframes.
    tools:
      - grc-platform
      - splunk
      - elastic-siem
      - defectdojo
      - servicenow

