id: cps234-25
family: policy
title: "Policy Maintenance and Review"
class: CPS234

statement:
  prose: >-
    An APRA-regulated entity must review and update the information
    security policy framework at least annually, or when there is a
    material change to the entity's information assets, business
    environment, or threat landscape.
  parts:
    - id: cps234-25.a
      label: "a."
      prose: >-
        The review must assess the continuing adequacy of the
        information security policy framework in light of changes
        to the entity's business activities, technology environment,
        and threat landscape.
    - id: cps234-25.b
      label: "b."
      prose: >-
        Updates to the policy framework must be approved through the
        same governance process as the original approval, including
        Board or governing body sign-off.

guidance:
  prose: >-
    Static policies that are never reviewed become stale and ineffective.
    APRA expects the policy framework to be a living document set that
    is reviewed at least annually and triggered by material changes
    such as: adoption of new technologies (cloud migration, AI),
    significant changes to the threat landscape (new attack vectors,
    regulatory changes), business changes (mergers, new products,
    market expansion), or lessons learned from incidents and testing.
    The review process must be documented, including who conducted the
    review, what changes were made, and the approval chain.

references:
  - citation: "APRA Prudential Standard CPS 234, Paragraph 25"
    url: "https://www.legislation.gov.au/F2018L01745/latest/text"

implementation_guidance:
  platform_engineering:
    prose: >-
      Store all policy-as-code artifacts in version control with
      mandatory annual review tags. Implement automated staleness
      detection that flags policies not updated within the review
      period. Use merge request workflows for policy changes with
      required approvals from policy owners and governing body
      representatives. Track policy change history through git log
      providing a complete audit trail. Deploy automated integration
      tests that validate policy-as-code changes against the current
      infrastructure state before merging. Trigger policy reviews
      automatically when infrastructure changes exceed defined
      materiality thresholds.
    tools:
      - git
      - gitlab-ci
      - open-policy-agent
      - backstage
      - terraform

  devsecops:
    prose: >-
      Implement pipeline checks that validate all security policies
      referenced in pipeline configurations are within their review
      validity period. Automate notifications when policy review dates
      approach. Track policy changes as versioned artifacts with
      complete change history and approval records. Implement
      regression testing for policy-as-code changes ensuring that
      updates do not inadvertently weaken existing controls. Generate
      policy review compliance reports showing review status across
      all policy documents.
    tools:
      - gitlab-ci
      - git
      - semgrep
      - sonarqube
      - jira

  secops:
    prose: >-
      Schedule and track annual policy reviews in the GRC platform
      with automated reminders and escalation for overdue reviews.
      Maintain a policy review register recording review dates,
      reviewers, changes made, and approval status. Monitor for
      triggering events (material incidents, significant technology
      changes, regulatory updates) that should initiate an
      out-of-cycle policy review. Generate audit evidence of the
      review process including meeting minutes, change logs, and
      approval records. Track policy exceptions and ensure they are
      reassessed during each review cycle.
    tools:
      - grc-platform
      - servicenow
      - confluence
      - jira
      - splunk

