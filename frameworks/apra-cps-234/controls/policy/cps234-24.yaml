id: cps234-24
family: policy
title: "Information Security Policy Framework"
class: CPS234

statement:
  prose: >-
    An APRA-regulated entity must maintain an information security
    policy framework commensurate with its exposures to vulnerabilities
    and threats. The policy framework must provide direction on the
    responsibilities of all parties who have an obligation to maintain
    information security.
  parts:
    - id: cps234-24.a
      label: "a."
      prose: >-
        The information security policy framework must address, at
        a minimum, the identification and classification of
        information assets, the implementation of controls, incident
        management, testing of controls, and the roles and
        responsibilities of all parties.
    - id: cps234-24.b
      label: "b."
      prose: >-
        The policy framework must be approved by the Board or a
        governing body delegated by the Board, and must be
        communicated to all relevant parties.

guidance:
  prose: >-
    The information security policy framework is the top-level
    document set that governs information security across the entity.
    It must be coherent, comprehensive, and enforceable. APRA expects
    the framework to include a high-level information security policy
    (setting direction and principles), supported by topic-specific
    policies (access control, encryption, incident management, etc.)
    and operational procedures. The framework must be living — actively
    maintained and updated to reflect changes in threats, technology,
    and business operations. Board or delegated governing body approval
    is mandatory, and the framework must be communicated to all parties
    with information security obligations, including third parties
    where relevant.

references:
  - citation: "APRA Prudential Standard CPS 234, Paragraph 24"
    url: "https://www.legislation.gov.au/F2018L01745/latest/text"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement the information security policy framework as
      policy-as-code artifacts stored in version control. Use OPA
      Rego policies or Cedar policies to codify enforceable security
      rules that are automatically applied at infrastructure
      admission time. Maintain policy documentation alongside code
      in a versioned repository with mandatory review workflows for
      changes. Deploy policy enforcement points at infrastructure
      provisioning (Terraform/Pulumi validation), container admission
      (Gatekeeper/Kyverno), and runtime (Falco rules). Track policy
      compliance across all platform components via automated
      dashboards showing coverage and violation rates.
    tools:
      - open-policy-agent
      - gatekeeper
      - kyverno
      - terraform
      - backstage
      - falco

  devsecops:
    prose: >-
      Encode security policies as automated pipeline gates that
      enforce compliance at every stage of the delivery lifecycle.
      Implement pre-commit hooks for secret detection and basic
      security linting. Configure CI pipeline stages for SAST, SCA,
      container scanning, and IaC scanning with thresholds derived
      from the policy framework. Maintain policy definitions in
      version control with change history, review approvals, and
      automated distribution to all applicable pipelines. Generate
      policy compliance reports as pipeline artifacts demonstrating
      adherence across all projects and teams.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-secret-detection
      - semgrep
      - checkov
      - trivy

  secops:
    prose: >-
      Maintain the authoritative policy document set in the GRC
      platform with version control, approval workflows, and
      distribution tracking. Implement automated policy compliance
      monitoring that continuously checks operational practices
      against documented policies. Track policy exceptions with
      approval, justification, expiration, and remediation plans.
      Generate audit evidence demonstrating policy communication
      to all relevant parties with acknowledgment tracking. Schedule
      automated policy review reminders aligned with the defined
      review cadence.
    tools:
      - grc-platform
      - confluence
      - splunk
      - elastic-siem
      - servicenow

