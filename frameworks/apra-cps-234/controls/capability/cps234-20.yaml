id: cps234-20
family: capability
title: "Third-Party Capability Assessment"
class: CPS234

statement:
  prose: >-
    Where information assets are managed by a third party, the
    APRA-regulated entity must evaluate the information security
    capability of the third party, commensurate with the potential
    consequences of an information security incident affecting those
    assets.
  parts:
    - id: cps234-20.a
      label: "a."
      prose: >-
        The entity must assess the information security capability
        of third parties prior to entering into arrangements and on
        a regular basis thereafter.
    - id: cps234-20.b
      label: "b."
      prose: >-
        The assessment must be commensurate with the criticality and
        sensitivity of the information assets managed by the third
        party and the potential consequences of an information security
        incident.

guidance:
  prose: >-
    This paragraph directly addresses supply chain and vendor risk.
    APRA expects entities to perform due diligence on third-party
    information security capabilities proportionate to the risk
    exposure. A cloud provider hosting core banking data requires a
    more rigorous assessment than a provider of non-sensitive
    ancillary services. Assessments should cover the third party's
    security governance, controls, incident management, and testing
    practices. Entities cannot outsource accountability — the entity
    remains responsible for the security of its information assets
    regardless of where they are managed.

references:
  - citation: "APRA Prudential Standard CPS 234, Paragraph 20"
    url: "https://www.legislation.gov.au/F2018L01745/latest/text"

implementation_guidance:
  platform_engineering:
    prose: >-
      Maintain a third-party service registry in the service catalog
      (Backstage) with security metadata for each provider including
      certification status, assessment dates, and risk ratings. Deploy
      automated monitoring of third-party attack surfaces using
      external scanning tools. Implement network segmentation and
      access controls isolating third-party connections to the minimum
      required scope. Enforce security requirements for third-party
      integrations via API gateways with rate limiting, authentication,
      and payload validation. Automate collection of third-party
      compliance evidence (SOC 2 reports, ISO 27001 certificates,
      penetration test results).
    tools:
      - backstage
      - kong
      - istio
      - vault
      - terraform

  devsecops:
    prose: >-
      Implement software composition analysis (SCA) to continuously
      monitor third-party dependencies for known vulnerabilities.
      Enforce dependency allow-lists restricting which third-party
      libraries can be used in production code. Scan container base
      images from third-party registries before deployment. Implement
      Software Bill of Materials (SBOM) generation for all artifacts
      to maintain visibility into the full supply chain. Validate
      third-party CI/CD integrations (shared runners, external
      services) against security requirements before adoption.
    tools:
      - gitlab-dependency-scanning
      - gitlab-container-scanning
      - trivy
      - syft
      - grype
      - dependency-track

  secops:
    prose: >-
      Monitor third-party connections and data flows for anomalous
      activity. Implement continuous external attack surface
      monitoring for critical third-party providers. Maintain a
      third-party risk register in the GRC platform with scheduled
      reassessment cadences based on risk tier. Track and aggregate
      security incidents involving third parties. Automate
      collection and review of third-party assurance artifacts
      (SOC 2 Type II, ISO 27001 surveillance audits, penetration
      test summaries). Alert on expiration of third-party
      certifications or attestation reports.
    tools:
      - grc-platform
      - splunk
      - elastic-siem
      - defectdojo
      - dependency-track

