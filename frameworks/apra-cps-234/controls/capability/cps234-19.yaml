id: cps234-19
family: capability
title: "Information Security Capability"
class: CPS234

statement:
  prose: >-
    An APRA-regulated entity must maintain an information security
    capability commensurate with the size and extent of threats to
    its information assets, and which enables the continued sound
    operation of the entity.
  parts:
    - id: cps234-19.a
      label: "a."
      prose: >-
        The entity must actively manage its information security
        capability to maintain its effectiveness as the threat
        environment, technology, and business activities change.
    - id: cps234-19.b
      label: "b."
      prose: >-
        The entity must evaluate the sufficiency of its information
        security capability on a regular basis, and whenever there
        is a material change to information assets or the threat
        environment.

guidance:
  prose: >-
    Information security capability is broader than technology controls
    alone — it encompasses people, processes, and technology working
    together. APRA expects entities to take a threat-informed approach
    where the capability is calibrated against the actual threat
    landscape, not just a checklist of controls. This requires ongoing
    threat intelligence, regular capability assessments, and the
    ability to adapt rapidly to emerging threats. The capability must
    be sufficient to protect the confidentiality, integrity, and
    availability of information assets throughout their lifecycle.

references:
  - citation: "APRA Prudential Standard CPS 234, Paragraph 19"
    url: "https://www.legislation.gov.au/F2018L01745/latest/text"
  - citation: "APRA CPG 234 — Information Security (Guidance)"
    url: "https://www.apra.gov.au/sites/default/files/cpg_234_information_security_june_2019_0.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a defense-in-depth architecture across the platform
      stack: network segmentation (service mesh, network policies),
      identity and access management (zero-trust), encryption at rest
      and in transit, and runtime protection. Deploy automated threat
      modeling as part of architecture review processes for new
      services. Maintain a real-time security posture dashboard
      showing control coverage across all platform layers. Implement
      auto-scaling security controls (WAF rules, rate limiting,
      anomaly detection) that adapt to changing threat patterns.
      Conduct periodic capability maturity assessments against
      recognized frameworks (NIST CSF, Essential Eight).
    tools:
      - istio
      - calico
      - vault
      - cert-manager
      - falco
      - grafana
      - backstage

  devsecops:
    prose: >-
      Embed comprehensive security scanning across the entire SDLC:
      pre-commit (secrets, linting), build (SAST, SCA), test (DAST,
      IAST), deploy (container scanning, IaC scanning), and runtime
      (RASP, monitoring). Maintain security quality gates that
      automatically block deployments with critical or high findings.
      Track security capability maturity metrics per team and per
      service. Implement continuous dependency monitoring with
      automated alerts for newly disclosed vulnerabilities in
      production dependencies. Conduct periodic red team exercises
      against CI/CD pipelines to validate control effectiveness.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dast
      - gitlab-container-scanning
      - gitlab-dependency-scanning
      - trivy
      - semgrep
      - checkov

  secops:
    prose: >-
      Operate a threat-informed security operations capability with
      continuous monitoring, threat intelligence integration, and
      adaptive detection rules. Maintain detection coverage metrics
      mapped to MITRE ATT&CK techniques relevant to the entity's
      threat profile. Implement automated threat intelligence
      feeds that update detection rules and indicators of compromise.
      Conduct regular tabletop exercises and purple team engagements
      to validate detection and response capability. Track capability
      metrics including detection coverage percentage, false positive
      rates, and mean time to detect across attack categories.
    tools:
      - splunk
      - elastic-siem
      - wazuh
      - misp
      - opencti
      - velociraptor

