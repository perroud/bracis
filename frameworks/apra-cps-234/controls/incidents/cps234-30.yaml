id: cps234-30
family: incidents
title: "Incident Detection and Response"
class: CPS234

statement:
  prose: >-
    An APRA-regulated entity must have robust mechanisms in place to
    detect and respond to information security incidents in a timely
    manner. The entity must maintain plans to respond to information
    security incidents that the entity considers could plausibly occur.
  parts:
    - id: cps234-30.a
      label: "a."
      prose: >-
        The entity must implement mechanisms to detect information
        security incidents in a timely manner, including monitoring
        of information assets and the technology operating environment.
    - id: cps234-30.b
      label: "b."
      prose: >-
        The entity must maintain and regularly test incident response
        plans that address the range of information security incidents
        that could plausibly occur, including scenarios involving
        third parties.
    - id: cps234-30.c
      label: "c."
      prose: >-
        The entity must review and update incident response plans
        following material information security incidents or changes
        to the threat environment.

guidance:
  prose: >-
    Detection and response capability must be proportionate to the
    entity's risk profile. APRA expects entities to have both
    automated detection mechanisms (SIEM, IDS/IPS, anomaly detection)
    and human processes (security operations, threat hunting) working
    together. Incident response plans must be specific enough to be
    actionable but flexible enough to handle novel scenarios. Plans
    should cover the full incident lifecycle: preparation, detection,
    analysis, containment, eradication, recovery, and post-incident
    review. Plans must address scenarios involving third-party
    failures, supply chain attacks, and insider threats. Regular
    testing (tabletop exercises, simulations) is essential to
    validate plan effectiveness.

references:
  - citation: "APRA Prudential Standard CPS 234, Paragraph 30"
    url: "https://www.legislation.gov.au/F2018L01745/latest/text"

implementation_guidance:
  platform_engineering:
    prose: >-
      Deploy comprehensive observability across the platform stack:
      centralized logging (all infrastructure and application logs),
      metrics collection (system and application telemetry), and
      distributed tracing. Implement real-time anomaly detection on
      infrastructure metrics (unusual network traffic, unexpected
      process execution, configuration changes). Deploy runtime
      security monitoring (Falco) for container and host-level
      threat detection. Implement automated incident response
      playbooks for common scenarios (compromised credentials, DDoS,
      data exfiltration indicators). Maintain infrastructure-as-code
      for rapid environment reconstruction during recovery.
    tools:
      - falco
      - prometheus
      - grafana
      - loki
      - tempo
      - calico
      - istio

  devsecops:
    prose: >-
      Implement pipeline-integrated incident response tooling.
      Automate artifact quarantine when vulnerabilities are discovered
      in deployed components. Deploy automated rollback capabilities
      triggered by security events. Maintain infrastructure-as-code
      and GitOps practices enabling rapid, auditable recovery from
      incidents. Implement canary deployments and feature flags
      enabling rapid containment of security issues in production.
      Store incident response playbooks in version control alongside
      application code. Track post-incident remediation actions as
      pipeline-enforced tasks.
    tools:
      - gitlab-ci
      - argocd
      - flux
      - trivy
      - falco
      - grafana

  secops:
    prose: >-
      Operate a 24/7 security operations capability with automated
      detection, human analysis, and orchestrated response. Implement
      SIEM correlation rules covering known attack patterns and
      anomaly-based detection for unknown threats. Deploy SOAR
      playbooks for automated initial response actions (isolation,
      evidence preservation, stakeholder notification). Maintain and
      regularly test incident response plans through tabletop
      exercises and simulated incidents. Implement forensic readiness
      — ensure logging is sufficient for post-incident investigation
      with tamper-evident storage. Track incident metrics (MTTD,
      MTTR, incidents by category) for continuous improvement.
    tools:
      - splunk
      - elastic-siem
      - wazuh
      - thehive
      - shuffle-soar
      - velociraptor
      - misp

