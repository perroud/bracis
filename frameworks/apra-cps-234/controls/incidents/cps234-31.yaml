id: cps234-31
family: incidents
title: "Incident Notification to APRA"
class: CPS234

statement:
  prose: >-
    An APRA-regulated entity must notify APRA of material information
    security incidents. The entity must notify APRA as soon as possible
    and, in any case, no later than 72 hours after becoming aware of
    an information security incident that has materially affected, or
    had the potential to materially affect, financially or
    non-financially, the entity or the interests of depositors,
    policyholders, beneficiaries, or other customers.
  parts:
    - id: cps234-31.a
      label: "a."
      prose: >-
        The entity must notify APRA as soon as possible, and no later
        than 72 hours, after becoming aware of a material information
        security incident. A material incident is one that has
        materially affected, or had the potential to materially affect,
        the entity or the interests of its customers.
    - id: cps234-31.b
      label: "b."
      prose: >-
        The entity must notify APRA as soon as possible, and no later
        than 10 business days, after it becomes aware of an information
        security control weakness that the entity expects it will not
        be able to remediate in a timely manner.

guidance:
  prose: >-
    The 72-hour notification requirement is a hard deadline. APRA
    expects entities to have internal triage processes that can rapidly
    determine whether an incident meets the materiality threshold.
    Materiality is assessed by impact — actual or potential — on the
    entity's operations, financial position, or the interests of
    customers. The notification must be substantive, not merely
    acknowledging an incident occurred. The 10-business-day requirement
    for unremediated control weaknesses is a separate obligation that
    applies even when no incident has occurred — it recognizes that
    persistent control gaps are themselves a supervisory concern.
    Entities should establish pre-approved notification templates and
    escalation workflows to meet these deadlines reliably.

references:
  - citation: "APRA Prudential Standard CPS 234, Paragraph 31"
    url: "https://www.legislation.gov.au/F2018L01745/latest/text"
  - citation: "APRA Incident Notification Guide"
    url: "https://www.apra.gov.au/reporting-and-notification-requirements"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated incident classification workflows that
      assess materiality against predefined criteria (systems
      affected, data exposure scope, customer impact, financial
      impact). Deploy automated timestamp tracking from first
      detection through to APRA notification, ensuring the 72-hour
      clock is visible and monitored. Implement severity-based
      escalation automation: incidents classified as potentially
      material trigger immediate notification to the security
      function and governing body. Maintain pre-built notification
      templates and APRA communication channels accessible to
      on-call responders. Deploy dashboards tracking the time
      elapsed since incident detection for active material incidents.
    tools:
      - pagerduty
      - grafana
      - backstage
      - servicenow
      - terraform

  devsecops:
    prose: >-
      Implement automated security incident detection in pipelines
      that can identify potentially material events (compromised
      credentials in code, supply chain compromise, unauthorized
      production access). Deploy automated evidence collection and
      preservation from CI/CD systems when an incident is declared.
      Maintain version-controlled incident notification templates
      and response runbooks. Implement automated tracking of control
      weakness remediation timelines against the 10-business-day
      APRA notification threshold. Generate audit trails of all
      incident-related pipeline activities for inclusion in APRA
      notifications.
    tools:
      - gitlab-ci
      - gitlab-secret-detection
      - defectdojo
      - jira
      - trivy

  secops:
    prose: >-
      Implement a structured incident triage process with materiality
      assessment criteria aligned to CPS 234 requirements. Deploy
      automated 72-hour countdown timers triggered when an incident
      is classified as potentially material. Maintain pre-approved
      APRA notification templates with fields covering required
      information (nature of incident, systems affected, customer
      impact, containment actions, remediation timeline). Implement
      SOAR playbooks that automate initial notification steps
      including internal escalation, evidence packaging, and
      communication channel activation. Track all material incidents
      and control weakness notifications in a regulatory
      communication register. Conduct post-notification reviews to
      ensure APRA reporting accuracy and completeness.
    tools:
      - thehive
      - shuffle-soar
      - splunk
      - elastic-siem
      - grc-platform
      - servicenow

