id: art-21
family: cap-4
title: "Interoperabilidade com SUS e Registro Eletronico de Saude"
class: TISS
baselines: [tiss-all]
statement:
  prose: |
    Art. 21. O Padrão TISS deve ser interoperável com os sistemas de
    informação do SUS (Sistema Único de Saúde), contribuindo para a
    composição do Registro Eletrônico de Saúde (RES) integrado.

    Parágrafo 1. As operadoras devem disponibilizar dados de atendimento
    dos beneficiários ao DATASUS conforme regulamentação específica,
    utilizando formatos compatíveis com os sistemas de informação do SUS.

    Parágrafo 2. A interoperabilidade deve contemplar:
    I - Padronização de terminologias compartilhadas (CID-10, TUSS/SIGTAP);
    II - Mecanismos de troca de dados entre TISS e sistemas SUS
    (SIH, SIA, CNES);
    III - Identificação única do beneficiário via CNS (Cartão Nacional
    de Saúde) ou CPF;
    IV - Alinhamento progressivo com padrões internacionais de
    interoperabilidade (HL7 FHIR).

    Parágrafo 3. A ANS e o Ministério da Saúde devem definir
    conjuntamente os mecanismos de integração entre o TISS e os
    sistemas do SUS.
guidance:
  prose: |
    O art. 21 posiciona o TISS como parte de um ecossistema maior de
    informacoes de saude no Brasil, com interoperabilidade entre
    saude suplementar e SUS.

    **Interoperabilidade TISS-SUS:**
    - CNES (Cadastro Nacional de Estabelecimentos de Saude): registro
      unico de prestadores usado em ambos os sistemas
    - SIGTAP (Sistema de Gerenciamento da Tabela de Procedimentos):
      tabela de procedimentos do SUS, mapeada para TUSS
    - SIH (Sistema de Informacoes Hospitalares): internacoes SUS
    - SIA (Sistema de Informacoes Ambulatoriais): atendimentos SUS
    - CNS (Cartao Nacional de Saude): identificacao unica do cidadao

    **Registro Eletronico de Saude (RES):**
    O RES integrado visa unificar historico de saude do cidadao
    entre SUS e saude suplementar. O TISS contribui com dados de
    atendimentos na saude suplementar.

    **HL7 FHIR:**
    Padrao internacional de interoperabilidade em saude. A estrategia
    de longo prazo do Brasil (RNDS - Rede Nacional de Dados em Saude)
    adota FHIR como padrao. O TISS deve evoluir para compatibilidade
    com FHIR.

    **Desafios praticos:**
    - Mapeamento TUSS-SIGTAP nao e 1:1 (procedimentos exclusivos)
    - CNS nao e universalmente adotado (CPF como alternativa)
    - Sistemas SUS e TISS tem arquiteturas muito distintas
    - Transicao para FHIR sera gradual e complexa
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de interoperabilidade:**
      1. Implementar camada de integracao (integration layer) que
         traduza entre formatos TISS XML e formatos SUS/RNDS/FHIR.
      2. Manter mapeamento TUSS-SIGTAP atualizado como servico
         compartilhado para traducao entre terminologias.
      3. Integrar com CNES para validacao de prestadores e com CNS
         para identificacao unica de beneficiarios.
      4. Preparar arquitetura para suporte a HL7 FHIR, implementando
         FHIR server e mapeamento de recursos TISS para recursos FHIR.
    tools:
      - integration-layer
      - terminology-mapping
      - cnes-integration
      - fhir-server
  devsecops:
    prose: |
      **Interoperabilidade no pipeline:**
      1. Implementar testes de integracao que validem mapeamento
         correto entre terminologias TISS e SUS (TUSS-SIGTAP, CID-10).
      2. Criar testes de conformidade com FHIR para recursos mapeados,
         usando FHIR Validator oficial.
      3. Automatizar atualizacao de tabelas de mapeamento quando
         SIGTAP ou TUSS sofrerem alteracoes.
      4. Incluir testes de integracao com CNES e CNS em ambiente de
         homologacao.
    tools:
      - terminology-testing
      - fhir-validator
      - mapping-automation
      - integration-testing
  secops:
    prose: |
      **Governanca de interoperabilidade:**
      1. Monitorar publicacoes do Ministerio da Saude e ANS sobre
         evolucao da interoperabilidade TISS-SUS e RNDS.
      2. Participar de grupos de trabalho e consultas publicas sobre
         padroes de interoperabilidade em saude digital.
      3. Manter documentacao atualizada de todas as integracoes TISS
         com sistemas externos (SUS, DATASUS, RNDS).
      4. Avaliar impacto de mudancas em terminologias e formatos SUS
         nos sistemas TISS da organizacao.
    tools:
      - regulatory-tracking
      - interop-documentation
      - impact-assessment
      - stakeholder-engagement
