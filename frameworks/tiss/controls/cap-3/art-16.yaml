id: art-16
family: cap-3
title: "Conformidade LGPD e Notificacao de Incidentes"
class: TISS
baselines: [tiss-all]
statement:
  prose: |
    Art. 16. As operadoras e prestadores que processam transações TISS
    devem implementar programa de conformidade com a LGPD específico
    para o tratamento de dados pessoais de saúde.

    Parágrafo 1. O programa de conformidade deve incluir:
    I - Designação de Encarregado de Proteção de Dados (DPO) com
    conhecimento em dados de saúde;
    II - Avaliação de impacto à proteção de dados (DPIA) para novos
    tratamentos de dados de saúde via TISS;
    III - Procedimentos para atendimento aos direitos dos titulares
    conforme art. 18 da LGPD;
    IV - Plano de resposta a incidentes de segurança que envolvam
    dados pessoais de saúde.

    Parágrafo 2. Incidentes de segurança que envolvam dados pessoais
    de saúde trafegados via TISS devem ser comunicados:
    I - À ANPD (Autoridade Nacional de Proteção de Dados) e aos
    titulares afetados, conforme art. 48 da LGPD;
    II - À ANS, no prazo de 72 horas após a ciência do incidente;
    III - Às contrapartes TISS afetadas (operadoras e prestadores).
guidance:
  prose: |
    O art. 16 conecta as obrigacoes do TISS com o framework regulatorio
    da LGPD, exigindo programa de conformidade especifico para saude.

    **DPO com expertise em saude:**
    Dados de saude tem complexidades proprias: multiplos controladores
    (operadora e prestador), bases legais especificas (art. 11, LGPD),
    finalidades assistenciais versus administrativas. O DPO deve
    compreender o ecossistema de saude suplementar.

    **DPIA obrigatoria para TISS:**
    Qualquer novo tratamento de dados de saude via TISS (novo tipo de
    guia, novo campo, novo compartilhamento) exige DPIA previa.

    **Notificacao de incidentes:**
    Incidente em sistema TISS pode afetar multiplas organizacoes
    simultaneamente (operadora + N prestadores + M beneficiarios).
    O plano de resposta deve prever:
    - Notificacao a ANPD (prazo razoavel conforme LGPD)
    - Notificacao a ANS (72 horas)
    - Notificacao a contrapartes TISS afetadas
    - Notificacao a beneficiarios (se risco relevante)

    **Cadeia de responsabilidade:**
    - Operadora: controladora dos dados para fins administrativos
    - Prestador: controladora para fins assistenciais
    - Ambos sao co-responsaveis pela seguranca da transacao TISS
    - Contrato deve definir responsabilidades de cada parte
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de conformidade LGPD para TISS:**
      1. Implementar sistema de gestao de consentimento e bases legais
         para cada tipo de tratamento de dados de saude via TISS.
      2. Criar pipeline automatizado de notificacao de incidentes que
         dispare comunicacoes a ANPD, ANS e contrapartes TISS.
      3. Implementar portal DSAR (Data Subject Access Request) integrado
         aos sistemas TISS para atendimento a direitos dos titulares.
      4. Automatizar ROPA e DPIA com integracao ao catalogo de servicos
         TISS para rastreabilidade de tratamentos de dados.
    tools:
      - consent-management
      - incident-notification
      - dsar-portal
      - dpia-automation
  devsecops:
    prose: |
      **Privacy engineering no pipeline TISS:**
      1. Incluir privacy review obrigatorio no pipeline para PRs que
         modifiquem tratamento de dados pessoais em servicos TISS.
      2. Automatizar geracao de DPIA draft a partir de metadados do
         servico (campos, finalidades, bases legais, destinatarios).
      3. Implementar testes de conformidade LGPD: verificar que dados
         sensiveis nao vazam em logs, metricas ou mensagens de erro.
      4. Criar runbook automatizado de resposta a incidentes com
         checklist de notificacoes obrigatorias (ANPD, ANS, titulares).
    tools:
      - privacy-review
      - dpia-generation
      - lgpd-compliance-tests
      - incident-runbook
  secops:
    prose: |
      **Operacao de conformidade LGPD para TISS:**
      1. Manter plano de resposta a incidentes especifico para dados
         de saude TISS, com SLA de notificacao a ANS em 72 horas.
      2. Realizar simulacoes (tabletop exercises) de incidentes de
         dados de saude TISS semestralmente.
      3. Processar solicitacoes de direitos dos titulares (acesso,
         correcao, eliminacao) dentro do prazo de 15 dias da LGPD.
      4. Reportar metricas de conformidade LGPD para TISS ao DPO
         e a alta direcao trimestralmente.
    tools:
      - incident-response
      - tabletop-exercises
      - dsar-management
      - compliance-reporting
