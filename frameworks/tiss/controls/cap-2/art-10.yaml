id: art-10
family: cap-2
title: "Integracao entre Componentes e Conformidade"
class: TISS
baselines: [tiss-all]
statement:
  prose: |
    Art. 10. Os cinco componentes do Padrão TISS devem ser implementados
    de forma integrada e indissociável, garantindo que as transações
    atendam simultaneamente aos requisitos organizacionais, de conteúdo,
    comunicação, segurança e representação de conceitos.

    Parágrafo 1. A conformidade com o Padrão TISS exige a implementação
    completa de todos os cinco componentes, não sendo aceita a adoção
    parcial.

    Parágrafo 2. As operadoras e prestadores devem realizar testes de
    conformidade antes de iniciar a troca de transações TISS, conforme
    procedimentos definidos pela ANS.

    Parágrafo 3. A ANS poderá certificar ou homologar sistemas e
    soluções que atendam integralmente ao Padrão TISS.
guidance:
  prose: |
    O art. 10 exige que o TISS seja implementado como um todo coeso,
    nao como componentes isolados.

    **Teste de conformidade TISS:**
    Antes de iniciar operacao, cada par operadora-prestador deve
    realizar testes que validem:
    1. Envio e recebimento de todas as guias aplicaveis
    2. Processamento de respostas (autorizacao, negativa, pendencia)
    3. Conformidade dos schemas XML com a versao vigente
    4. Funcionamento da autenticacao e criptografia
    5. Codigos TUSS e CID-10 validos e atualizados

    **Homologacao de sistemas:**
    A ANS pode certificar softwares que atendem ao TISS, servindo
    como selo de qualidade para o mercado. Sistemas homologados
    passam por bateria de testes padronizada.

    **Conformidade continua:**
    A conformidade nao e pontual. Deve ser monitorada continuamente,
    pois atualizacoes de schemas, tabelas e regras de negocio
    podem quebrar integracoes anteriormente conformes.

    **Integracao dos componentes na pratica:**
    - Organizacional define O QUE trocar e QUANDO
    - Conteudo e Estrutura define COMO estruturar os dados
    - Representacao de Conceitos define COMO codificar
    - Comunicacao define COMO transmitir
    - Seguranca define COMO proteger
implementation_guidance:
  platform_engineering:
    prose: |
      **Ambiente integrado de conformidade TISS:**
      1. Implementar suite de testes de conformidade TISS automatizada
         que valide todos os cinco componentes de forma integrada.
      2. Manter ambiente de homologacao que simule operadoras e
         prestadores para testes end-to-end de transacoes TISS.
      3. Implementar health checks que verifiquem continuamente a
         conformidade de cada componente (schema, comunicacao,
         seguranca, terminologias).
      4. Criar dashboard de conformidade TISS que mostre status de
         cada componente por par operadora-prestador.
    tools:
      - conformance-testing
      - staging-environment
      - health-checks
      - conformance-dashboard
  devsecops:
    prose: |
      **Pipeline de conformidade integrada:**
      1. Implementar gate de conformidade TISS no pipeline CI/CD que
         execute bateria completa de testes antes de cada deploy.
      2. Criar testes de contrato (contract testing) entre modulos
         que implementam diferentes componentes TISS.
      3. Automatizar relatorio de cobertura de conformidade por
         componente e por tipo de transacao.
      4. Incluir testes de regressao que validem que atualizacoes em
         um componente nao quebram a integracao com os demais.
    tools:
      - conformance-gate
      - contract-testing
      - coverage-reports
      - regression-tests
  secops:
    prose: |
      **Governanca de conformidade integrada:**
      1. Realizar auditoria anual de conformidade TISS cobrindo todos
         os cinco componentes, com evidencias documentadas.
      2. Manter matriz de conformidade TISS com status por componente
         e por par operadora-prestador.
      3. Participar de testes de conformidade promovidos pela ANS ou
         por operadoras contratantes.
      4. Documentar e reportar gaps de conformidade com plano de acao
         e prazos para remediacao.
    tools:
      - compliance-audit
      - conformance-matrix
      - gap-analysis
      - remediation-tracking
