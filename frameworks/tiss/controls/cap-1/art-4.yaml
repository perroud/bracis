id: art-4
family: cap-1
title: "Obrigatoriedade e Prazos de Adocao"
class: TISS
baselines: [tiss-all]
statement:
  prose: |
    Art. 4. A adoção do Padrão TISS é obrigatória para todas as
    operadoras de planos privados de assistência à saúde e prestadores
    de serviços de saúde, nos prazos estabelecidos pela ANS.

    Parágrafo 1. As operadoras devem disponibilizar aos seus prestadores
    contratados os meios tecnológicos necessários para a troca de
    informações no Padrão TISS, incluindo portal web ou web services.

    Parágrafo 2. A ANS publicará cronograma de transição para novas
    versões do Padrão TISS, garantindo prazo mínimo de 6 meses entre
    a publicação e a obrigatoriedade de adoção.

    Parágrafo 3. Durante o período de transição, as operadoras devem
    aceitar transações tanto na versão anterior quanto na nova versão
    do Padrão TISS.
guidance:
  prose: |
    O art. 4 trata da obrigatoriedade efetiva e dos prazos de transicao,
    incluindo o dever da operadora de prover meios tecnologicos.

    **Obrigacoes da operadora:**
    - Disponibilizar portal web TISS para prestadores menores
    - Disponibilizar web services TISS para prestadores com sistemas
      proprios
    - Aceitar ambas as versoes durante transicao
    - Comunicar prestadores sobre mudancas de versao com antecedencia

    **Obrigacoes do prestador:**
    - Adotar o TISS no prazo estabelecido
    - Manter sistemas atualizados com a versao vigente
    - Testar integracao com operadoras antes da data limite

    **Transicao de versoes:**
    - ANS publica nova versao do schema XML
    - Prazo minimo de 6 meses para adocao obrigatoria
    - Periodo de coexistencia: ambas as versoes aceitas
    - Apos prazo: somente nova versao aceita

    **Historico de versoes relevantes:**
    - TISS 3.x: versao XML consolidada
    - TISS 4.x: inclusao de novas guias e campos
    - Cada versao traz schemas XSD atualizados pela ANS
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de versoes TISS na infraestrutura:**
      1. Implementar suporte multi-versao de schemas TISS no middleware
         de integracao, permitindo processar versoes N e N-1
         simultaneamente durante periodos de transicao.
      2. Configurar feature flags para ativar/desativar versoes de
         schema TISS sem necessidade de deploy.
      3. Implementar portal web TISS com autenticacao para prestadores
         que nao possuem sistema proprio de integracao.
      4. Manter ambiente de homologacao com schemas da proxima versao
         TISS para testes antecipados com prestadores.
    tools:
      - feature-flags
      - api-versioning
      - portal-web
      - staging-environment
  devsecops:
    prose: |
      **Pipeline de transicao de versao:**
      1. Automatizar download e validacao de novos schemas XSD TISS
         publicados pela ANS no pipeline de atualizacao.
      2. Implementar testes de regressao que validem transacoes TISS
         em ambas as versoes (atual e proxima) simultaneamente.
      3. Criar alertas automaticos quando o prazo de transicao estiver
         a menos de 60 dias do fim.
      4. Documentar breaking changes entre versoes TISS no changelog
         do repositorio de integracao.
    tools:
      - schema-versioning
      - regression-tests
      - alerting
      - changelog-automation
  secops:
    prose: |
      **Gestao de cronograma e conformidade:**
      1. Manter calendario atualizado com datas de publicacao e
         obrigatoriedade de cada versao TISS.
      2. Comunicar prestadores contratados sobre mudancas de versao
         com antecedencia minima de 90 dias (alem do prazo ANS).
      3. Monitorar taxa de adocao da nova versao entre prestadores
         e tomar acoes corretivas para os atrasados.
      4. Documentar formalmente a capacidade de processar ambas as
         versoes durante o periodo de transicao.
    tools:
      - regulatory-calendar
      - communication-platform
      - adoption-monitoring
      - compliance-documentation
