id: art-2
family: cap-1
title: "Escopo e Abrangencia"
class: TISS
baselines: [tiss-all]
statement:
  prose: |
    Art. 2. O Padrão TISS aplica-se obrigatoriamente a todas as operadoras
    de planos privados de assistência à saúde registradas na ANS e a todos
    os prestadores de serviços de saúde que mantenham relação contratual
    com essas operadoras.

    Parágrafo 1. As operadoras devem exigir de seus prestadores contratados
    a adoção do Padrão TISS como condição para a troca eletrônica de
    informações.

    Parágrafo 2. As transações realizadas fora do Padrão TISS não serão
    aceitas pela ANS para fins de comprovação de registros de atendimento.
guidance:
  prose: |
    O art. 2 torna o TISS mandatorio para todo o ecossistema de saude
    suplementar brasileiro, sem excecoes por porte ou tipo de prestador.

    **Entidades obrigadas:**
    - Operadoras de planos de saude: medicinas de grupo, cooperativas
      medicas, seguradoras especializadas em saude, autogestoes,
      filantropia
    - Prestadores: hospitais, clinicas, laboratorios, consultarios,
      servicos de diagnostico por imagem, servicos de home care
    - Profissionais de saude autonomos credenciados a operadoras

    **Implicacao contratual:**
    A operadora DEVE incluir em seus contratos com prestadores a
    obrigatoriedade de adocao do TISS. Contratos que nao incluam
    esta clausula estao em desconformidade.

    **Consequencia pratica:**
    Transacoes fora do TISS (papel, formatos proprietarios, planilhas)
    nao sao validas perante a ANS. Isso forca a digitalizacao e
    padronizacao de todo o fluxo administrativo na saude suplementar.
implementation_guidance:
  platform_engineering:
    prose: |
      **Adequacao de sistemas ao escopo TISS:**
      1. Auditar todos os fluxos de troca de informacoes entre a
         organizacao e contrapartes (operadoras ou prestadores) para
         identificar transacoes fora do padrao TISS.
      2. Implementar middleware de integracao TISS que converta formatos
         legados (CSV, HL7 v2, formatos proprietarios) para XML TISS.
      3. Configurar rejeicao automatica de mensagens que nao estejam
         em conformidade com o schema TISS vigente.
      4. Manter ambiente de homologacao com schemas TISS atualizados
         para testes de integracao com novas contrapartes.
    tools:
      - integration-middleware
      - xml-validator
      - api-gateway
      - test-environment
  devsecops:
    prose: |
      **Validacao de conformidade no pipeline:**
      1. Implementar linter de XML TISS no pipeline CI/CD que valide
         todas as mensagens de teste contra schemas oficiais da ANS.
      2. Criar suite de testes end-to-end que simule transacoes TISS
         completas (autorizacao, execucao, cobranca, pagamento).
      3. Incluir verificacao de versao do schema TISS em cada build,
         alertando quando schemas proximos do fim de vigencia.
      4. Automatizar geracao de relatorios de cobertura de conformidade
         TISS por tipo de transacao.
    tools:
      - gitlab-ci
      - xml-schema-validation
      - e2e-tests
      - compliance-reports
  secops:
    prose: |
      **Gestao contratual e monitoramento:**
      1. Revisar todos os contratos com operadoras e prestadores para
         verificar clausula de obrigatoriedade TISS.
      2. Manter registro atualizado de todas as contrapartes TISS,
         incluindo versoes de schema suportadas por cada uma.
      3. Implementar monitoramento de transacoes rejeitadas por
         nao-conformidade TISS, com alertas para correcao.
      4. Reportar semestralmente a taxa de conformidade TISS a alta
         direcao e ao comite de compliance.
    tools:
      - contract-management
      - compliance-monitoring
      - reporting-dashboard
