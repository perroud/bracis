id: art-3
family: cap-1
title: "Definicoes e Terminologia"
class: TISS
baselines: [tiss-all]
statement:
  prose: |
    Art. 3. Para fins desta Resolução Normativa, consideram-se as seguintes
    definições:

    I - Beneficiário: pessoa física que possui vínculo com operadora de
    plano privado de assistência à saúde;

    II - Guia: formulário eletrônico padronizado para registro e
    comunicação de eventos assistenciais entre prestadores e operadoras;

    III - Transação TISS: mensagem eletrônica estruturada em XML, conforme
    schemas definidos pela ANS, trafegada entre sistemas de operadoras e
    prestadores;

    IV - Componente organizacional: conjunto de regras e procedimentos
    administrativos que disciplinam o fluxo de transações TISS;

    V - Componente de conteúdo e estrutura: conjunto de dados que compõe
    as mensagens TISS e suas respectivas regras de preenchimento;

    VI - Componente de comunicação: padrão tecnológico para transmissão
    de mensagens TISS entre sistemas;

    VII - Componente de segurança: requisitos de segurança da informação
    aplicáveis às transações TISS;

    VIII - Componente de representação de conceitos em saúde: terminologias,
    classificações e tabelas de domínio utilizadas nas mensagens TISS.
guidance:
  prose: |
    O art. 3 estabelece o glossario oficial do Padrao TISS. A compreensao
    precisa destas definicoes e fundamental para implementacao correta.

    **Cinco componentes do TISS:**
    1. Organizacional: regras de negocio, fluxos, prazos, responsabilidades
    2. Conteudo e Estrutura: campos, tipos de dados, regras de preenchimento
    3. Comunicacao: protocolos, web services, formato XML
    4. Seguranca: autenticacao, criptografia, controle de acesso
    5. Representacao de conceitos: TUSS, CID-10, CBHPM, SIGTAP

    **Guias TISS (formularios eletronicos):**
    - Guia de consulta
    - Guia de SP/SADT (servicos profissionais e diagnosticos)
    - Guia de internacao
    - Guia de honorarios
    - Guia de tratamento odontologico
    - Guia de recurso de glosa

    **Terminologia chave:**
    - Lote: conjunto de guias enviadas em uma unica transacao
    - Protocolo: numero de rastreamento atribuido a cada transacao
    - Hash: verificacao de integridade da mensagem XML
implementation_guidance:
  platform_engineering:
    prose: |
      **Modelagem de dados conforme definicoes TISS:**
      1. Criar modelos de dados que reflitam exatamente as entidades
         definidas no art. 3 (beneficiario, guia, transacao, lote,
         protocolo) com os atributos do schema TISS.
      2. Implementar biblioteca interna de validacao que enforce as
         regras de preenchimento de cada campo conforme componente
         de conteudo e estrutura.
      3. Manter tabela de dominio sincronizada com as terminologias
         oficiais (TUSS, CID-10, CBHPM) publicadas pela ANS.
      4. Versionar schemas XML TISS em repositorio dedicado com
         controle de vigencia temporal.
    tools:
      - schema-registry
      - data-modeling
      - terminology-server
      - version-control
  devsecops:
    prose: |
      **Validacao de conformidade terminologica:**
      1. Implementar testes unitarios que validem cada campo de guia
         TISS contra as regras de preenchimento oficiais.
      2. Criar linter customizado que verifique uso correto de codigos
         TUSS, CID-10 e CBHPM em mensagens de teste.
      3. Automatizar atualizacao de tabelas de dominio TISS no pipeline
         quando a ANS publicar novas versoes.
      4. Incluir cobertura de testes para todos os tipos de guia
         definidos no padrao.
    tools:
      - custom-linter
      - unit-tests
      - terminology-validation
      - ci-cd-pipeline
  secops:
    prose: |
      **Governanca de terminologia e definicoes:**
      1. Manter glossario interno alinhado com as definicoes do art. 3,
         disponivel para todas as equipes que operam sistemas TISS.
      2. Treinar equipes de atendimento, TI e faturamento nas definicoes
         e componentes do Padrao TISS.
      3. Auditar periodicamente se os sistemas utilizam as terminologias
         oficiais (TUSS, CID-10) e nao codigos proprietarios.
      4. Monitorar publicacoes da ANS sobre atualizacoes de tabelas
         de dominio e terminologias.
    tools:
      - knowledge-base
      - training-platform
      - audit-tools
      - regulatory-tracking
