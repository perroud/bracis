id: art-1
family: cap-1
title: "Objeto do Padrao TISS"
class: TISS
baselines: [tiss-all]
statement:
  prose: |
    Art. 1. Esta Resolução Normativa institui o Padrão TISS -- Troca de
    Informações na Saúde Suplementar, que estabelece o padrão obrigatório
    para registro e intercâmbio de dados entre operadoras de planos privados
    de assistência à saúde e prestadores de serviços de saúde.

    Parágrafo único. O Padrão TISS tem como objetivo padronizar as ações
    administrativas, subsidiar as ações de avaliação e acompanhamento
    econômico, financeiro e assistencial das operadoras de planos privados
    de assistência à saúde e compor o Registro Eletrônico de Saúde.
guidance:
  prose: |
    O art. 1 define o TISS como padrao obrigatorio para toda troca de
    informacoes entre operadoras de planos de saude e prestadores de
    servicos de saude no Brasil.

    **Escopo funcional do TISS:**
    - Padronizacao de transacoes administrativas (autorizacao, cobranca,
      pagamento, recurso de glosa)
    - Alimentacao de bases de dados para avaliacao economico-financeira
      pela ANS
    - Composicao do Registro Eletronico de Saude (RES) dos beneficiarios
    - Interoperabilidade entre sistemas heterogeneos do ecossistema de
      saude suplementar

    **Participantes obrigados:**
    - Operadoras de planos privados de assistencia a saude (OPS)
    - Prestadores de servicos de saude (hospitais, clinicas, laboratorios,
      medicos, dentistas)
    - Sistemas intermediarios que processam transacoes TISS

    **Relacao com o SUS:**
    O TISS e complementar ao SIH/SIA-SUS. Dados TISS podem ser
    compartilhados com o DATASUS para composicao do Registro Eletronico
    de Saude integrado publico-privado.
implementation_guidance:
  platform_engineering:
    prose: |
      **Inventario de sistemas em escopo TISS:**
      1. Catalogar todos os sistemas que processam transacoes entre
         operadoras e prestadores: ERP hospitalar, sistemas de
         autorizacao, faturamento, PEP, portais web.
      2. Classificar cada sistema quanto ao papel no fluxo TISS:
         emissor, receptor, intermediario, armazenador.
      3. Implementar service mesh ou API gateway dedicado ao trafego
         TISS, separando-o do trafego aplicacional geral.
      4. Manter catalogo de servicos TISS em service registry
         (Consul, Eureka) com metadados de versao do schema XML.
    tools:
      - api-gateway
      - service-registry
      - cmdb
      - asset-discovery
  devsecops:
    prose: |
      **Pipeline de conformidade TISS:**
      1. Criar label/tag de repositorios que processam transacoes TISS
         para aplicacao automatica de pipeline de conformidade.
      2. Implementar validacao automatica de XML schemas TISS no CI/CD
         antes de cada deploy para producao.
      3. Incluir testes de integracao que validem mensagens TISS contra
         os schemas oficiais publicados pela ANS.
      4. Manter versionamento explicito dos schemas TISS suportados
         em cada release do sistema.
    tools:
      - gitlab-ci
      - xml-validation
      - schema-registry
      - integration-tests
  secops:
    prose: |
      **Governanca de conformidade TISS:**
      1. Designar responsavel interno pelo programa de conformidade TISS
         (gestor de sistemas de informacao em saude).
      2. Manter registro formal de todas as operadoras e prestadores com
         quem a organizacao troca informacoes via TISS.
      3. Criar matriz de conformidade mapeando cada requisito TISS versus
         controles implementados, com revisao semestral.
      4. Monitorar publicacoes da ANS sobre atualizacoes do Padrao TISS
         e cronogramas de transicao.
    tools:
      - grc-platform
      - regulatory-tracking
      - compliance-dashboard
