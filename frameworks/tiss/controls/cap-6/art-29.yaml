id: art-29
family: cap-6
title: "Fiscalizacao pela ANS"
class: TISS
baselines: [tiss-all]
statement:
  prose: |
    Art. 29. A ANS fiscalizará o cumprimento das obrigações previstas
    nesta Resolução Normativa, podendo realizar auditorias, inspeções
    e diligências nas operadoras e prestadores.

    Parágrafo 1. A fiscalização poderá incluir:
    I - Verificação da conformidade dos sistemas com o Padrão TISS
    mediante testes de mensagens e validação de schemas;
    II - Auditoria das trilhas de auditoria e registros de transações;
    III - Análise dos indicadores de desempenho TISS;
    IV - Inspeção dos mecanismos de segurança da informação;
    V - Verificação da conformidade com a LGPD no tratamento de dados
    de saúde via TISS.

    Parágrafo 2. As operadoras e prestadores devem disponibilizar à ANS:
    I - Acesso aos sistemas TISS para testes de conformidade;
    II - Trilhas de auditoria e registros de transações;
    III - Relatórios de indicadores conforme formato ANS;
    IV - Documentação de políticas de segurança e privacidade.

    Parágrafo 3. A ANS poderá requisitar informações adicionais e
    estabelecer prazo para seu fornecimento, não inferior a 10 dias úteis.
guidance:
  prose: |
    O art. 29 confere a ANS poder de fiscalizacao sobre o cumprimento
    do TISS, com acesso direto a sistemas e dados.

    **Tipos de fiscalizacao ANS:**
    1. Programada: auditorias periodicas planejadas pela ANS
    2. Responsiva: decorrente de reclamacao de beneficiario ou
       prestador
    3. Tematica: focada em aspecto especifico (seguranca, adocao,
       indicadores)
    4. Documental: analise de relatorios e documentos enviados

    **Obrigacoes da entidade fiscalizada:**
    - Cooperar com a fiscalizacao, fornecendo acesso e informacoes
    - Designar interlocutor para atendimento a ANS
    - Fornecer informacoes no prazo estipulado (minimo 10 dias uteis)
    - Manter documentacao atualizada e acessivel

    **Evidencias tipicamente solicitadas:**
    - Screenshots ou exports de configuracao de sistemas TISS
    - Logs de transacoes de periodo especifico
    - Relatorios de indicadores (volume, glosa, rejeicao)
    - Politica de seguranca e privacidade documentada
    - Evidencia de MFA, criptografia, controle de acesso
    - Contratos com prestadores/operadoras com clausula TISS

    **Preparacao para fiscalizacao:**
    Manter "audit readiness" permanente e fundamental. A ANS pode
    fiscalizar a qualquer momento, e a falta de documentacao e
    agravante.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de suporte a fiscalizacao:**
      1. Implementar portal de auditoria que permita extrair evidencias
         de conformidade TISS sob demanda: logs, metricas, configuracoes.
      2. Criar endpoints de teste de conformidade que a ANS possa
         invocar para validar schemas e web services em producao.
      3. Automatizar geracao de pacote de evidencias de conformidade
         (audit bundle) com screenshots, logs e configuracoes.
      4. Manter ambiente de demonstracao isolado para auditorias ANS,
         com dados anonimizados representativos.
    tools:
      - audit-portal
      - conformance-endpoints
      - evidence-automation
      - demo-environment
  devsecops:
    prose: |
      **Audit readiness no pipeline:**
      1. Implementar compliance-as-code que gere evidencias de
         conformidade automaticamente a cada deploy (relatorio de
         conformidade TISS).
      2. Criar dashboard de conformidade permanente que mostre
         status de cada requisito TISS em tempo real.
      3. Automatizar coleta de evidencias de seguranca: configuracao
         TLS, MFA habilitado, criptografia at-rest, logs ativos.
      4. Incluir testes de auditabilidade: verificar que logs estao
         completos e que evidencias podem ser extraidas rapidamente.
    tools:
      - compliance-as-code
      - conformance-dashboard
      - evidence-collection
      - auditability-testing
  secops:
    prose: |
      **Gestao de fiscalizacao ANS:**
      1. Designar responsavel interno para relacionamento com ANS
         e atendimento a fiscalizacoes.
      2. Manter pacote de evidencias de conformidade TISS atualizado
         permanentemente (audit readiness).
      3. Realizar auditorias internas semestrais simulando fiscalizacao
         ANS, com checklist dos itens tipicamente verificados.
      4. Treinar equipes relevantes (TI, compliance, faturamento) sobre
         procedimentos de atendimento a fiscalizacao ANS.
    tools:
      - regulatory-liaison
      - evidence-management
      - internal-audit
      - training-program
