id: art-30
family: cap-6
title: "Sancoes por Descumprimento"
class: TISS
baselines: [tiss-all]
statement:
  prose: |
    Art. 30. O descumprimento das obrigações previstas nesta Resolução
    Normativa sujeita as operadoras e prestadores às sanções previstas
    na legislação vigente, incluindo a Lei 9.656/1998 e a Lei 9.961/2000.

    Parágrafo 1. As sanções aplicáveis incluem:
    I - Advertência, com prazo para regularização;
    II - Multa pecuniária, conforme tabela de infrações da ANS;
    III - Suspensão de comercialização de planos de saúde;
    IV - Cancelamento do registro de operação da operadora;
    V - Instauração de regime especial de direção fiscal ou técnica.

    Parágrafo 2. A gravidade da sanção considera:
    I - Natureza e gravidade da infração;
    II - Dano ao beneficiário ou ao sistema de saúde suplementar;
    III - Reincidência;
    IV - Capacidade econômica da operadora;
    V - Vantagem auferida com a infração.

    Parágrafo 3. As sanções decorrentes do descumprimento do TISS não
    excluem as sanções previstas na LGPD para violações de proteção
    de dados pessoais de saúde.
guidance:
  prose: |
    O art. 30 define o regime sancionatorio que da efetividade ao
    TISS, com sancoes que variam de advertencia ate cancelamento
    de registro.

    **Escala de sancoes ANS:**
    1. Advertencia: infracao leve, com prazo para correcao
    2. Multa: valores de R$ 10.000 a R$ 1.000.000 por infracao,
       conforme RN 124/2006 (classificacao de infraccoes ANS)
    3. Suspensao de comercializacao: infracao grave que afeta
       beneficiarios
    4. Cancelamento de registro: ultima ratio, operadora deixa
       de operar
    5. Direcao fiscal/tecnica: ANS assume gestao da operadora

    **Infraccoes TISS tipicas:**
    - Nao adotar Padrao TISS: multa + prazo para adequacao
    - Recusar transacoes TISS validas: multa + advertencia
    - Nao responder autorizacao no prazo: multa por ocorrencia
    - Glosa abusiva sistematica: multa + suspensao
    - Falha de seguranca com vazamento de dados: multa + LGPD

    **Cumulacao com LGPD:**
    Incidente de dados de saude via TISS pode gerar sancoes
    simultaneas pela ANS (descumprimento TISS) e pela ANPD
    (violacao LGPD). As multas nao se excluem.

    **Sancoes LGPD aplicaveis:**
    - Multa simples de ate 2% do faturamento (limite R$ 50M por
      infracao)
    - Multa diaria
    - Publicizacao da infracao
    - Bloqueio ou eliminacao de dados
    - Suspensao do banco de dados

    **Mitigacao:**
    - Conformidade documentada e evidenciada mitiga sancoes
    - Cooperacao com ANS durante fiscalizacao e fator atenuante
    - Programa de conformidade implementado reduz gravidade
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de conformidade para mitigacao de risco:**
      1. Implementar compliance monitoring automatizado que identifique
         desvios de conformidade TISS antes que se tornem infraccoes.
      2. Criar alertas proativos para situacoes que configuram infracao:
         transacoes fora do padrao, prazos estourados, falhas de
         seguranca nao remediadas.
      3. Manter registro automatizado de todas as acoes de conformidade
         (evidencias para mitigacao de sancoes).
      4. Implementar SLA enforcement automatico: system kills ou
         escalation quando prazos regulamentares estao proximos.
    tools:
      - compliance-monitoring
      - proactive-alerting
      - evidence-registry
      - sla-enforcement
  devsecops:
    prose: |
      **Prevencao de infraccoes no pipeline:**
      1. Implementar quality gates que impecam deploy de sistemas
         nao-conformes com TISS para producao.
      2. Incluir verificacao de prazos regulamentares como teste
         automatizado: SLA de autorizacao, prazo de recurso de glosa.
      3. Automatizar deteccao de padroes de glosa abusiva nos sistemas
         de faturamento (regra de negocio que rejeita excessivamente).
      4. Criar dashboard de risco regulatorio que agregue todos os
         indicadores de possivel infracao TISS.
    tools:
      - quality-gates
      - sla-testing
      - abuse-detection
      - risk-dashboard
  secops:
    prose: |
      **Gestao de risco regulatorio TISS:**
      1. Manter mapa de riscos regulatorios TISS com probabilidade
         e impacto de cada tipo de infracao, atualizado semestralmente.
      2. Implementar programa de compliance TISS documentado, incluindo
         politicas, procedimentos, treinamentos e auditorias internas.
      3. Preparar plano de contingencia para cenarios de sancao:
         procedimentos de regularizacao, interlocucao com ANS,
         comunicacao a stakeholders.
      4. Manter fundo de contingencia financeira para eventuais multas
         e custos de regularizacao.
    tools:
      - risk-management
      - compliance-program
      - contingency-planning
      - financial-provisioning
