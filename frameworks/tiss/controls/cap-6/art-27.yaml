id: art-27
family: cap-6
title: "Comite TISS (COTISS)"
class: TISS
baselines: [tiss-all]
statement:
  prose: |
    Art. 27. O Comitê de Padronização das Informações em Saúde
    Suplementar (COTISS), instituído pela ANS, é o órgão responsável
    pela governança técnica do Padrão TISS.

    Parágrafo 1. Compete ao COTISS:
    I - Propor atualizações e evoluções do Padrão TISS;
    II - Avaliar demandas do mercado por novas funcionalidades ou
    alterações no padrão;
    III - Recomendar à ANS a adoção de novas terminologias, schemas
    e regras de negócio;
    IV - Promover a interoperabilidade entre sistemas de saúde
    suplementar e sistemas públicos de saúde;
    V - Acompanhar tendências internacionais de padronização em saúde
    (HL7 FHIR, IHE, DICOM).

    Parágrafo 2. O COTISS é composto por representantes de:
    I - ANS (coordenação);
    II - Operadoras de planos de saúde;
    III - Prestadores de serviços de saúde;
    IV - Entidades representativas do setor;
    V - Especialistas em tecnologia da informação em saúde.

    Parágrafo 3. As deliberações do COTISS são submetidas à aprovação
    da Diretoria Colegiada da ANS para publicação.
guidance:
  prose: |
    O COTISS e o orgao de governanca que evolui e mantem o Padrao TISS,
    com representacao de todos os stakeholders do ecossistema.

    **Papel do COTISS:**
    - Orgao consultivo e propositivo (nao deliberativo)
    - Deliberacoes dependem de aprovacao da Diretoria ANS
    - Reunioes periodicas (tipicamente mensais)
    - Grupos de trabalho tematicos para questoes especificas

    **Processo de atualizacao do TISS:**
    1. Demanda identificada (mercado, ANS, COTISS)
    2. Grupo de trabalho avalia viabilidade e impacto
    3. COTISS recomenda alteracao a ANS
    4. ANS publica consulta publica (quando aplicavel)
    5. Diretoria ANS aprova e publica nova versao
    6. Periodo de transicao (minimo 6 meses)

    **Participacao do mercado:**
    Operadoras e prestadores podem submeter demandas ao COTISS para
    avaliacao. Participar ativamente do COTISS e estrategico para
    influenciar a evolucao do padrao.

    **Tendencias acompanhadas:**
    - HL7 FHIR como padrao de interoperabilidade
    - IHE (Integrating the Healthcare Enterprise) profiles
    - DICOM para imagens medicas
    - Inteligencia artificial aplicada a auditoria de contas
    - Blockchain para rastreabilidade de transacoes
implementation_guidance:
  platform_engineering:
    prose: |
      **Preparacao para evolucoes do TISS:**
      1. Implementar arquitetura modular e extensivel que permita
         incorporar novas versoes do TISS sem reescrever a base
         (schema versioning, adapter pattern).
      2. Manter feature flags para habilitar/desabilitar funcionalidades
         de versoes futuras do TISS em preview.
      3. Implementar sandbox de testes para avaliar impacto de novas
         versoes propostas pelo COTISS antes da adocao obrigatoria.
      4. Monitorar publicacoes do COTISS e da ANS com avaliacao
         automatica de impacto nos sistemas existentes.
    tools:
      - schema-versioning
      - feature-flags
      - sandbox-environment
      - regulatory-monitoring
  devsecops:
    prose: |
      **Preparacao para mudancas no pipeline:**
      1. Manter branch de desenvolvimento para proxima versao TISS,
         com CI/CD independente para testes de conformidade.
      2. Automatizar analise de impacto (diff) entre versoes de
         schema TISS: campos adicionados, removidos, alterados.
      3. Criar suite de testes de compatibilidade que valide que a
         versao atual e a proxima funcionam simultaneamente.
      4. Documentar breaking changes e plano de migracao para cada
         atualizacao do TISS.
    tools:
      - branch-management
      - schema-diff
      - compatibility-testing
      - migration-documentation
  secops:
    prose: |
      **Engajamento com COTISS e governanca:**
      1. Designar representante para acompanhar publicacoes e reunioes
         do COTISS (atas, deliberacoes, consultas publicas).
      2. Participar de consultas publicas da ANS sobre evolucoes do
         TISS, representando os interesses da organizacao.
      3. Manter roadmap interno de evolucao dos sistemas TISS alinhado
         com as publicacoes do COTISS.
      4. Comunicar internamente mudancas aprovadas pelo COTISS com
         antecedencia para planejamento de projetos.
    tools:
      - regulatory-tracking
      - public-consultation
      - roadmap-management
      - internal-communication
