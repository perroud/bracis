id: art-24
family: cap-5
title: "Recurso de Glosa"
class: TISS
baselines: [tiss-all]
statement:
  prose: |
    Art. 24. O prestador de serviços de saúde tem direito de contestar
    glosas aplicadas pela operadora, utilizando a guia de recurso de
    glosa do Padrão TISS.

    Parágrafo 1. O recurso de glosa deve ser apresentado eletronicamente
    via web service TISS, contendo:
    I - Identificação da guia original glosada (número de protocolo);
    II - Itens contestados com respectivos códigos de glosa;
    III - Justificativa técnica ou administrativa para cada item
    contestado;
    IV - Documentação de suporte, quando aplicável.

    Parágrafo 2. A operadora deve analisar o recurso de glosa e
    retornar resposta em prazo não superior a 30 dias, contendo:
    I - Resultado da análise por item (acatado, mantido, parcial);
    II - Justificativa para itens não acatados;
    III - Valores recalculados para itens acatados.

    Parágrafo 3. O recurso de glosa TISS não impede o prestador de
    recorrer administrativamente à ANS ou ao Poder Judiciário.
guidance:
  prose: |
    O art. 24 padroniza o processo de contestacao de glosas, um dos
    pontos de maior atrito entre operadoras e prestadores.

    **Tipos de glosa e recurso:**
    - Glosa administrativa: recurso com documentacao corretiva
      (dados que faltavam, correcao de codigos)
    - Glosa tecnica: recurso com justificativa clinica
      (indicacao do procedimento, necessidade medica)
    - Glosa linear: recurso com fundamentacao contratual
      (tabela aplicavel, clausula contratual)

    **Fluxo de recurso de glosa TISS:**
    1. Prestador recebe demonstrativo com itens glosados
    2. Prestador identifica glosas a contestar
    3. Prestador preenche guia de recurso de glosa
    4. Prestador envia recurso via web service TISS
    5. Operadora analisa recurso (prazo: 30 dias)
    6. Operadora retorna resultado do recurso
    7. Itens acatados entram no proximo ciclo de pagamento

    **Documentacao de suporte:**
    - Laudos medicos para justificativa clinica
    - Notas fiscais para materiais e medicamentos
    - Fotos ou relatorios para procedimentos contestados
    - Referencias bibliograficas para protocolos clinicos

    **Metricas relevantes:**
    - Taxa de glosa (valor glosado / valor cobrado)
    - Taxa de recurso (valor contestado / valor glosado)
    - Taxa de acatamento (valor acatado / valor contestado)
    - Prazo medio de resolucao de recurso
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de recurso de glosa TISS:**
      1. Implementar modulo de recurso de glosa integrado ao sistema
         de faturamento, com pre-preenchimento automatico de dados
         da guia original e itens glosados.
      2. Criar workflow de recurso com estados (rascunho, enviado,
         em analise, respondido, finalizado) e SLA monitoring.
      3. Implementar repositorio de documentacao de suporte com
         upload seguro e vinculacao a guias especificas.
      4. Automatizar reconciliacao de recursos acatados com o ciclo
         de pagamento subsequente.
    tools:
      - glosa-management
      - workflow-engine
      - document-repository
      - payment-reconciliation
  devsecops:
    prose: |
      **Validacao de recurso de glosa no pipeline:**
      1. Implementar testes end-to-end do fluxo de recurso: envio,
         analise, resposta, reconciliacao financeira.
      2. Criar testes de validacao de dados do recurso conforme schema
         TISS (campos obrigatorios, codigos de glosa validos).
      3. Automatizar testes de SLA: recursos devem ser respondidos em
         ate 30 dias, com alertas em 20 dias.
      4. Incluir testes de cenarios complexos: recurso parcial,
         multiplos itens, documentacao anexa.
    tools:
      - e2e-testing
      - schema-validation
      - sla-testing
      - scenario-testing
  secops:
    prose: |
      **Gestao operacional de recurso de glosa:**
      1. Monitorar taxa de glosa e taxa de acatamento por operadora,
         identificando padroes de glosa sistematica.
      2. Implementar analytics de motivos de glosa para identificar
         causas raiz e acoes preventivas (treinamento, ajuste de
         sistemas, renegociacao contratual).
      3. Manter historico de recursos e resultados para fundamentar
         negociacoes contratuais com operadoras.
      4. Reportar metricas de glosa e recurso para direcao financeira
         e corpo clinico mensalmente.
    tools:
      - glosa-analytics
      - root-cause-analysis
      - negotiation-support
      - financial-reporting
