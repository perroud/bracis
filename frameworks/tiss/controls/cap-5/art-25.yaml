id: art-25
family: cap-5
title: "Demonstrativo de Retorno e Pagamento"
class: TISS
baselines: [tiss-all]
statement:
  prose: |
    Art. 25. A operadora deve retornar ao prestador, eletronicamente
    via Padrão TISS, o demonstrativo de análise e pagamento de cada
    lote de guias apresentado.

    Parágrafo 1. O demonstrativo de retorno deve conter:
    I - Identificação do lote original (número de protocolo);
    II - Resultado da análise por guia e por item (pago, glosado,
    pendente, em auditoria);
    III - Valores pagos e valores glosados por item, com código
    de motivo de glosa quando aplicável;
    IV - Data prevista ou efetiva de pagamento;
    V - Totalizadores do lote (total cobrado, total pago, total
    glosado).

    Parágrafo 2. O demonstrativo deve ser disponibilizado em prazo
    compatível com o pagamento, permitindo ao prestador conciliar
    valores antes do recebimento.

    Parágrafo 3. O demonstrativo de retorno TISS substitui o extrato
    de pagamento, devendo conter informações suficientes para a
    conciliação financeira completa pelo prestador.
guidance:
  prose: |
    O art. 25 trata do retorno financeiro da operadora ao prestador,
    fechando o ciclo de faturamento TISS.

    **Demonstrativo de retorno:**
    O demonstrativo e o documento que permite ao prestador saber
    exatamente o que sera pago, o que foi glosado e por que.

    **Informacoes por guia:**
    - Status: pago integralmente, pago parcialmente, glosado
      integralmente, pendente de auditoria
    - Valores: cobrado, autorizado, pago, glosado
    - Codigo de motivo de glosa (tabela ANS)
    - Data de pagamento prevista

    **Conciliacao financeira:**
    O prestador deve ser capaz de conciliar:
    - Guias enviadas vs. guias no demonstrativo (completude)
    - Valores cobrados vs. valores pagos (exatidao)
    - Glosas vs. tabela contratual (legitimidade)
    - Credito bancario vs. demonstrativo (confirmacao)

    **Prazo de disponibilizacao:**
    - Demonstrativo deve estar disponivel antes ou simultaneamente
      ao pagamento
    - Prazo contratual tipico: 5 dias antes do pagamento
    - Formato: XML TISS via web service ou portal web

    **Retencao:**
    Demonstrativos devem ser retidos por ambas as partes por prazo
    minimo de 5 anos (prescricao tributaria e regulatoria).
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de demonstrativo de retorno TISS:**
      1. Implementar modulo de geracao/recepcao de demonstrativos
         TISS com parsing automatico de XML e armazenamento
         estruturado em banco de dados.
      2. Criar servico de conciliacao automatica que cruze
         demonstrativos recebidos com lotes enviados, identificando
         divergencias.
      3. Implementar integracao com sistema financeiro/ERP para
         baixa automatica de titulos a receber conforme pagamentos.
      4. Configurar retencao automatica de demonstrativos por 5 anos
         com archival para cold storage apos 2 anos.
    tools:
      - demonstrativo-parser
      - reconciliation-engine
      - erp-integration
      - data-retention
  devsecops:
    prose: |
      **Validacao de demonstrativo no pipeline:**
      1. Implementar testes de conformidade do demonstrativo TISS
         contra schema XSD: campos obrigatorios, totalizadores,
         codigos de glosa validos.
      2. Criar testes de conciliacao automatica: simular lote enviado
         e demonstrativo recebido, validar matching correto.
      3. Automatizar testes de integridade financeira: soma dos itens
         deve bater com totalizadores do lote.
      4. Incluir testes de cenarios de divergencia: guia ausente no
         demonstrativo, valor incorreto, codigo de glosa invalido.
    tools:
      - schema-validation
      - reconciliation-testing
      - financial-integrity
      - divergence-testing
  secops:
    prose: |
      **Gestao operacional de demonstrativos:**
      1. Monitorar recebimento de demonstrativos por operadora com
         alertas para atrasos em relacao ao prazo contratual.
      2. Auditar periodicamente a conciliacao entre demonstrativos
         e creditos bancarios efetivos.
      3. Manter historico de demonstrativos indexado e pesquisavel
         para atender auditorias internas e fiscalizacao ANS.
      4. Reportar metricas financeiras (prazo medio de recebimento,
         taxa de glosa acumulada, valores em aberto) mensalmente.
    tools:
      - demonstrativo-monitoring
      - financial-audit
      - document-archive
      - financial-reporting
