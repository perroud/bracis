id: art-26
family: cap-5
title: "Monitoramento e Indicadores de Transacoes"
class: TISS
baselines: [tiss-all]
statement:
  prose: |
    Art. 26. As operadoras e prestadores devem manter mecanismos de
    monitoramento das transações TISS, produzindo indicadores de
    desempenho que subsidiem a gestão e a fiscalização pela ANS.

    Parágrafo 1. Os indicadores obrigatórios incluem:
    I - Volume de transações TISS por tipo (autorização, execução,
    cobrança, recurso de glosa) em período mensal;
    II - Tempo médio de resposta por tipo de transação;
    III - Taxa de rejeição de mensagens por falha de validação;
    IV - Taxa de glosa por operadora e por prestador;
    V - Taxa de adoção do Padrão TISS entre prestadores contratados.

    Parágrafo 2. As operadoras devem enviar à ANS relatório periódico
    de indicadores TISS, conforme formato e periodicidade definidos
    pela Agência.

    Parágrafo 3. A ANS utilizará os indicadores para:
    I - Avaliar a conformidade das operadoras e prestadores com o
    Padrão TISS;
    II - Identificar oportunidades de melhoria no padrão;
    III - Subsidiar ações de fiscalização.
guidance:
  prose: |
    O art. 26 fecha o ciclo de governanca do TISS com monitoramento
    e indicadores que permitem avaliar a saude do ecossistema.

    **Indicadores obrigatorios:**
    1. Volume: quantidade de transacoes por tipo e periodo
    2. Performance: tempo medio de resposta por tipo
    3. Qualidade: taxa de rejeicao por falha de validacao
    4. Financeiro: taxa de glosa por operadora/prestador
    5. Adocao: percentual de prestadores usando TISS eletronico

    **Relatorio para ANS:**
    - Periodicidade: trimestral ou conforme definicao ANS
    - Formato: XML ou CSV conforme especificacao ANS
    - Conteudo: indicadores acima + informacoes complementares
    - Prazo: 30 dias apos fim do periodo

    **Uso dos indicadores:**
    - Benchmarking entre operadoras (ANS publica indicadores agregados)
    - Identificacao de operadoras com alto indice de glosa (possivel
      pratica abusiva)
    - Identificacao de prestadores com alta taxa de rejeicao (possivel
      nao-conformidade)
    - Evolucao da adocao do TISS ao longo do tempo

    **Indicadores adicionais recomendados:**
    - Disponibilidade de web services por operadora
    - Tempo medio de pagamento apos cobranca
    - Taxa de recurso de glosa e taxa de acatamento
    - Volume de transacoes por canal (web service vs. portal)
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de monitoramento TISS:**
      1. Implementar data pipeline que colete metricas de todas as
         transacoes TISS em tempo real (volume, latencia, erros,
         valores) em data warehouse ou time-series database.
      2. Criar dashboards de indicadores TISS com visualizacao por
         tipo de transacao, operadora, prestador e periodo.
      3. Automatizar geracao de relatorio ANS no formato exigido,
         com agendamento trimestral e envio automatico.
      4. Implementar alertas baseados em thresholds de indicadores
         (ex: taxa de glosa > 15%, latencia > 20s, rejeicao > 5%).
    tools:
      - data-pipeline
      - time-series-db
      - dashboard
      - automated-reporting
  devsecops:
    prose: |
      **Validacao de indicadores no pipeline:**
      1. Implementar testes que validem calculo correto de cada
         indicador TISS (volume, latencia, taxa de glosa, etc.).
      2. Criar testes de regressao para o relatorio ANS: formato,
         campos obrigatorios, periodos, totalizadores.
      3. Automatizar comparacao de indicadores entre periodos para
         detectar anomalias (variacao > 20% sem justificativa).
      4. Incluir data quality checks no pipeline de ingestao de
         metricas: duplicatas, gaps, outliers.
    tools:
      - metrics-testing
      - report-validation
      - anomaly-detection
      - data-quality
  secops:
    prose: |
      **Gestao operacional de indicadores TISS:**
      1. Revisar indicadores TISS mensalmente em reuniao de gestao,
         com acoes corretivas para desvios.
      2. Preparar e enviar relatorio ANS dentro do prazo, com
         validacao por responsavel de compliance.
      3. Utilizar indicadores para fundamentar negociacoes contratuais
         com operadoras (ex: alta taxa de glosa como argumento).
      4. Benchmarking com indicadores publicados pela ANS para
         posicionar a organizacao no mercado.
    tools:
      - management-review
      - regulatory-reporting
      - benchmarking
      - contract-negotiation
