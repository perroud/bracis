control_families:
  - id: cap-1
    title: "Disposicoes Gerais"
    description: "Objeto, escopo, definicoes e obrigatoriedade do Padrao TISS para troca de informacoes entre operadoras de planos de saude e prestadores de servicos de saude"
    articles: "art. 1 ao art. 4"
    control_count: 4
  - id: cap-2
    title: "Componentes do Padrao TISS"
    description: "Definicao e requisitos dos cinco componentes do Padrao TISS: organizacional, conteudo e estrutura, representacao de conceitos em saude, comunicacao e seguranca"
    articles: "art. 5 ao art. 10"
    control_count: 6
  - id: cap-3
    title: "Seguranca e Privacidade"
    description: >-
      Requisitos de seguranca da informacao para protecao dos dados
      de saude nas transacoes TISS, incluindo autenticacao,
      criptografia, controle de acesso, logs de auditoria e
      conformidade LGPD
    articles: "art. 11 ao art. 16"
    control_count: 6
  - id: cap-4
    title: "Interoperabilidade e Comunicacao"
    description: "Padroes tecnicos de comunicacao entre operadoras e prestadores, incluindo web services, XML schemas, certificacao digital ICP-Brasil e interoperabilidade com SUS"
    articles: "art. 17 ao art. 21"
    control_count: 5
  - id: cap-5
    title: "Registro e Envio de Transacoes"
    description: "Regras para registro, envio e processamento das transacoes TISS: guias de autorizacao, execucao, recurso de glosa, demonstrativo de pagamento e monitoramento"
    articles: "art. 22 ao art. 26"
    control_count: 5
  - id: cap-6
    title: "Governanca e Fiscalizacao"
    description: "Estrutura de governanca do Padrao TISS pelo Comite TISS (COTISS), processo de atualizacao do padrao, fiscalizacao pela ANS e sancoes por descumprimento"
    articles: "art. 27 ao art. 30"
    control_count: 4
related_frameworks:
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD complementa o TISS ao disciplinar o tratamento de dados
      pessoais e dados pessoais sensiveis de saude dos beneficiarios,
      impondo requisitos adicionais de consentimento, finalidade,
      bases legais e notificacao de incidentes que afetam dados de
      pacientes trafegados nas transacoes TISS.
  - framework_id: hipaa
    relationship: mapped
    description: >-
      O HIPAA e o analogo norte-americano do TISS no que tange a troca
      eletronica de informacoes de saude (EDI). Ambos padronizam
      transacoes entre prestadores e pagadores (planos de saude),
      incluindo autorizacoes previas, claims e pagamentos, com
      requisitos de seguranca e privacidade de dados de saude.
  - framework_id: pep
    relationship: complements
    description: >-
      O Prontuario Eletronico do Paciente (PEP) complementa o TISS
      ao ser a fonte primaria dos dados clinicos que alimentam as
      guias TISS de autorizacao e execucao, exigindo
      interoperabilidade bidirecional entre o sistema de PEP e o
      modulo TISS.
  - framework_id: cfm-telemedicina
    relationship: complements
    description: >-
      A regulamentacao do CFM sobre telemedicina complementa o TISS
      ao definir requisitos para teleconsultas e telediagnosticos
      cujo faturamento e autorizacao devem transitar pelo Padrao TISS
      com codigos especificos de procedimentos a distancia.
