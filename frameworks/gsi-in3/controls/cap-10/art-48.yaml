id: art-48
family: cap-10
title: "BYOD - Uso de Dispositivos Pessoais"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 48. Quando autorizado o uso de dispositivos pessoais (BYOD) para acesso
    a informações do órgão ou entidade, devem ser observados:

    I - aceite formal pelo usuário das regras de segurança aplicáveis;
    II - instalação de agente de segurança ou perfil gerenciado no dispositivo;
    III - separação entre dados pessoais e corporativos;
    IV - vedação de armazenamento de informações classificadas em nível secreto
    ou ultrassecreto em dispositivos pessoais;
    V - direito do órgão de realizar limpeza remota dos dados corporativos.
guidance:
  prose: |
    O art. 48 regula BYOD: aceite formal, agente de seguranca, separacao de
    dados, vedacao para dados secreto/ultrassecreto.

    **Requisitos BYOD:**
    1. Termo de aceite: usuario assina concordando com regras
    2. Agente/perfil: MDM ou managed profile instalado
    3. Containerizacao: dados corporativos isolados
    4. Vedacao: dados secreto/ultrassecreto PROIBIDOS em BYOD
    5. Remote wipe: orgao pode limpar dados corporativos a qualquer momento

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.1 (User endpoint devices - BYOD)
    - NIST 800-53 rev5: AC-19(4) (Restrictions for Mobile Devices)
    - NIST SP 800-124 rev2
implementation_guidance:
  platform_engineering:
    prose: |
      **BYOD seguro:**
      1. Conditional access: BYOD so acessa apps corporativas se MDM enrolled.
      2. MAM (Mobile Application Management) para controle sem MDM full.
      3. Zero Trust Network Access: acesso baseado em postura do dispositivo.
      4. VDI/DaaS para acesso a dados sensiveis sem download para dispositivo.
    tools:
      - conditional-access
      - mam
      - ztna
      - vdi
  devsecops:
    prose: |
      **Acesso a repositorios via BYOD:**
      1. Acesso a GitLab via web ou app oficial (nao clone local em BYOD).
      2. MFA obrigatorio para acesso de dispositivos BYOD.
      3. Session timeout reduzido para sessoes de dispositivos nao corporativos.
    tools:
      - web-access-only
      - mfa-byod
      - session-management
  secops:
    prose: |
      **Gestao de BYOD:**
      1. Registro de todos os dispositivos BYOD autorizados.
      2. Monitoramento de compliance: dispositivos BYOD vs. politica.
      3. Procedimento de off-boarding: revogar acesso e limpar dados corporativos.
      4. Auditoria semestral de dispositivos BYOD ativos.
    tools:
      - byod-registry
      - byod-compliance
      - offboarding-procedure
      - byod-audit
