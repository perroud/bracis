id: art-50
family: cap-10
title: "Acesso Remoto Seguro"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 50. O acesso remoto a sistemas e redes dos órgãos e entidades deve
    observar:

    I - uso obrigatório de VPN ou solução equivalente com criptografia;
    II - autenticação multifator para todo acesso remoto;
    III - registro e monitoramento de sessões remotas;
    IV - restrição de acesso remoto a sistemas críticos conforme necessidade;
    V - timeout automático de sessões ociosas.
guidance:
  prose: |
    O art. 50 regula acesso remoto: VPN obrigatoria, MFA, registro de sessoes,
    restricao por criticidade e timeout automatico.

    **Requisitos de acesso remoto:**
    1. VPN: IPsec ou WireGuard com criptografia forte
    2. MFA: obrigatorio para toda sessao remota
    3. Logs: registro de inicio/fim, usuario, origem
    4. Restricao: sistemas criticos so via jump host/bastion
    5. Timeout: sessao ociosa encerrada em 15-30 minutos

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.1 (User endpoint devices - remote access)
    - NIST 800-53 rev5: AC-17 (Remote Access)
    - CIS Controls v8: 6.6 (Remote Access Management)
implementation_guidance:
  platform_engineering:
    prose: |
      **Acesso remoto seguro:**
      1. ZTNA (Zero Trust Network Access) substituindo VPN tradicional.
      2. Bastion host/jump box para acesso a infra critica.
      3. Session recording para sessoes administrativas remotas.
      4. Posture assessment: verificar AV, patches, criptografia antes de conceder acesso.
      5. Split tunneling desabilitado para acesso a dados classificados.
    tools:
      - ztna
      - bastion-host
      - session-recording
      - posture-assessment
  devsecops:
    prose: |
      **Acesso remoto a infra de dev:**
      1. GitLab Web IDE como alternativa a clone local para acesso remoto.
      2. Cloud development environments (Gitpod, Codespaces) para dev remoto seguro.
      3. SSH via bastion com chave registrada e auditada.
    tools:
      - web-ide
      - cloud-dev-environment
      - ssh-bastion
  secops:
    prose: |
      **Operacao de acesso remoto:**
      1. Monitoramento de sessoes VPN/ZTNA ativas.
      2. Alerta para acessos remotos de geolocalizacoes anomalas.
      3. Revisao mensal de contas com acesso remoto habilitado.
      4. Teste trimestral de efetividade dos controles de acesso remoto.
    tools:
      - vpn-monitoring
      - geolocation-alerting
      - remote-access-review
legal_references:
