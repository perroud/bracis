id: art-49
family: cap-10
title: "Seguranca de Aplicativos Moveis"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 49. Os aplicativos móveis desenvolvidos ou contratados pelos órgãos e
    entidades devem atender a requisitos mínimos de segurança, incluindo:

    I - autenticação segura com suporte a MFA;
    II - criptografia de dados em trânsito e em repouso;
    III - proteção contra engenharia reversa e tampering;
    IV - não armazenamento de credenciais em texto claro no dispositivo;
    V - testes de segurança antes da publicação (MAST).
guidance:
  prose: |
    O art. 49 define requisitos de seguranca para apps moveis governamentais:
    MFA, criptografia, anti-tamper, credential storage e MAST.

    **Requisitos de app movel seguro:**
    1. Autenticacao: OAuth2/OIDC + MFA (biometria do dispositivo)
    2. Criptografia: TLS 1.3 em transito, AES-256 em repouso
    3. Anti-tamper: obfuscation, root/jailbreak detection
    4. Credenciais: Keychain (iOS) ou Keystore (Android), nunca em SharedPreferences
    5. Testes: MAST antes de publicacao (OWASP MASVS)

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.26 (Application security requirements)
    - NIST 800-53 rev5: SA-4 (Acquisition Process)
    - OWASP MASVS (Mobile Application Security Verification Standard)
implementation_guidance:
  platform_engineering:
    prose: |
      **Stack de seguranca para apps moveis:**
      1. SDK de seguranca padrao para apps governamentais (certificate pinning,
         root detection, data encryption).
      2. Backend seguro com API Gateway e rate limiting.
      3. Push notifications via canais seguros (nao SMS para dados sensiveis).
      4. Analytics de seguranca para detectar uso anomalo do app.
    tools:
      - mobile-security-sdk
      - api-gateway
      - secure-push
      - mobile-analytics
  devsecops:
    prose: |
      **Pipeline de app movel:**
      1. MAST automatizado no pipeline (MobSF, Apptimize).
      2. SAST para codigo mobile (Swift, Kotlin, React Native).
      3. Teste de certificate pinning bypass.
      4. Scan de secrets em codigo mobile (API keys, tokens).
    tools:
      - mast-pipeline
      - mobile-sast
      - certificate-pinning-test
      - secret-scan-mobile
  secops:
    prose: |
      **Operacao de seguranca de apps moveis:**
      1. Pen testing de app movel antes de cada release major.
      2. Monitoramento de versoes desatualizadas do app em uso.
      3. Resposta a vulnerabilidades descobertas pos-publicacao.
      4. Processo de recall/force-update para versoes vulneraveis.
    tools:
      - mobile-pen-testing
      - version-monitoring
      - force-update-mechanism
