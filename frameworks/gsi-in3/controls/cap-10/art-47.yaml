id: art-47
family: cap-10
title: "Politica de Seguranca em Computacao Movel"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 47. Os órgãos e entidades devem estabelecer política de segurança para
    uso de dispositivos móveis (smartphones, tablets, notebooks), contemplando:

    I - requisitos mínimos de segurança para dispositivos que acessam informações
    do órgão;
    II - criptografia de dados armazenados em dispositivos móveis;
    III - capacidade de limpeza remota (remote wipe) em caso de perda ou furto;
    IV - separação entre dados pessoais e corporativos;
    V - restrições de uso conforme a classificação da informação acessada.
guidance:
  prose: |
    O art. 47 estabelece politica de seguranca movel: requisitos de dispositivo,
    criptografia, remote wipe, separacao pessoal/corporativo.

    **Requisitos de dispositivo movel:**
    1. Criptografia de disco/armazenamento obrigatoria
    2. Remote wipe: capacidade de apagar dados remotamente
    3. Containerizacao: dados corporativos separados dos pessoais
    4. Restricoes: dados sigilosos nao em dispositivos pessoais
    5. Atualizacao: SO e apps mantidos atualizados

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.1 (User endpoint devices)
    - NIST 800-53 rev5: AC-19 (Access Control for Mobile Devices)
    - NIST SP 800-124 (Guidelines for Managing Mobile Devices)
implementation_guidance:
  platform_engineering:
    prose: |
      **MDM (Mobile Device Management):**
      1. MDM/UEM centralizado (Intune, Jamf, MobileIron).
      2. Enrollment obrigatorio para acesso a recursos corporativos.
      3. Politicas de compliance: criptografia, PIN, versao minima de SO.
      4. Containerizacao de dados corporativos (managed apps/profiles).
      5. Remote wipe seletivo (apenas dados corporativos).
    tools:
      - mdm-uem
      - device-enrollment
      - compliance-policies
      - containerization
      - remote-wipe
  devsecops:
    prose: |
      **Seguranca de apps moveis:**
      1. MAST (Mobile Application Security Testing) para apps internos.
      2. App wrapping para adicionar controles de seguranca a apps corporativos.
      3. Distribuicao de apps via enterprise app store (nao sideloading).
      4. Pipeline de build de apps moveis com SAST e DAST.
    tools:
      - mast
      - app-wrapping
      - enterprise-app-store
      - mobile-ci-cd
  secops:
    prose: |
      **Operacao de seguranca movel:**
      1. Monitoramento de compliance de dispositivos (% em conformidade).
      2. Bloqueio de acesso para dispositivos nao conformes.
      3. Procedimento de resposta para perda/furto de dispositivo (remote wipe).
      4. Inventario de dispositivos moveis com acesso a dados do orgao.
    tools:
      - device-compliance-monitoring
      - conditional-access
      - lost-device-procedure
      - mobile-inventory
