id: art-4
family: cap-2
title: "Inventario de Ativos de Informacao"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 4. Os órgãos e entidades da administração pública federal devem elaborar
    e manter inventário de ativos de informação, contemplando:

    I - identificação e descrição de cada ativo;
    II - custodiante responsável pelo ativo;
    III - classificação quanto ao grau de sigilo, conforme legislação vigente;
    IV - localização física e lógica do ativo;
    V - criticidade do ativo para o negócio do órgão.
guidance:
  prose: |
    O art. 4 estabelece o inventario de ativos como fundamento de todos os demais
    processos de SI. Sem inventario, nao ha como proteger o que nao se conhece.

    **Atributos obrigatorios do inventario:**
    1. Identificacao unica (asset ID)
    2. Custodiante (responsavel formal)
    3. Classificacao de sigilo (Dec. 7.724/2012)
    4. Localizacao (DC, nuvem, endpoint)
    5. Criticidade (BIA - Business Impact Analysis)

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.5.9 (Inventory of information and other associated assets)
    - NIST 800-53 rev5: CM-8 (System Component Inventory)
    - CIS Controls v8: 1.1 (Enterprise Asset Inventory)
implementation_guidance:
  platform_engineering:
    prose: |
      **CMDB e discovery automatizado:**
      1. Implementar CMDB com discovery automatico (ServiceNow, NetBox, Ralph).
      2. Agentes de discovery em todas as redes para detectar ativos nao inventariados.
      3. Integracao com cloud providers (AWS Config, Azure Resource Graph, GCP Asset Inventory).
      4. Schema padronizado com campos obrigatorios da IN: custodiante, classificacao,
         localizacao, criticidade.
      5. API para consulta e atualizacao automatizada do inventario.
    tools:
      - cmdb
      - network-discovery
      - cloud-asset-inventory
      - api-gateway
  devsecops:
    prose: |
      **Inventario de software e dependencias:**
      1. SBOM (Software Bill of Materials) gerado automaticamente em cada build.
      2. Inventario de repositorios com metadados de classificacao e responsavel.
      3. Dependency tracking para todas as bibliotecas de terceiros.
      4. Pipeline que valida presenca de metadados obrigatorios em cada projeto.
    tools:
      - sbom-generator
      - dependency-scanner
      - gitlab-project-metadata
  secops:
    prose: |
      **Gestao continua do inventario:**
      1. Reconciliacao mensal entre inventario logico e ativos reais.
      2. Processo formal de inclusao/exclusao de ativos com aprovacao do custodiante.
      3. Revisao trimestral de classificacao de sigilo.
      4. Alerta para ativos sem custodiante definido (orphaned assets).
    tools:
      - grc-platform
      - asset-reconciliation
      - orphan-detection
