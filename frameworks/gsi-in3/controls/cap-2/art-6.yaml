id: art-6
family: cap-2
title: "Rotulagem de Ativos de Informacao"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 6. Os ativos de informação classificados devem ser rotulados de forma
    visível e inequívoca, observando:

    I - marcação em documentos físicos e digitais conforme grau de sigilo;
    II - rotulagem em mídias de armazenamento;
    III - marcação em comunicações eletrônicas que contenham informações classificadas;
    IV - procedimentos para tratamento de informação conforme sua classificação.
guidance:
  prose: |
    O art. 6 exige rotulagem visivel em todos os ativos classificados, garantindo
    que o tratamento adequado seja aplicado em todo o ciclo de vida.

    **Requisitos de rotulagem:**
    - Documentos: marca d'agua, cabecalho/rodape com grau de sigilo
    - Midias: etiqueta fisica com classificacao
    - E-mails: tag no assunto e corpo
    - Sistemas: banner de classificacao na interface

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.5.13 (Labelling of information)
    - NIST 800-53 rev5: MP-3 (Media Marking)
implementation_guidance:
  platform_engineering:
    prose: |
      **Rotulagem automatizada:**
      1. DLP com marcacao automatica de documentos baseada em classificacao.
      2. Watermarking automatico em documentos exportados de sistemas criticos.
      3. Headers de classificacao em APIs (X-Data-Classification header).
      4. Banners em aplicacoes web indicando nivel de classificacao do ambiente.
    tools:
      - dlp-engine
      - document-watermarking
      - api-headers
      - ui-classification-banner
  devsecops:
    prose: |
      **Rotulagem em pipelines:**
      1. Labels automaticas em artefatos de build baseadas na classificacao do projeto.
      2. Metadados de classificacao em imagens Docker e pacotes.
      3. README.md com badge de classificacao em cada repositorio.
      4. Commit hooks que adicionam classificacao em mensagens de commit.
    tools:
      - artifact-labeling
      - docker-labels
      - classification-badges
  secops:
    prose: |
      **Auditoria de rotulagem:**
      1. Verificacao periodica de documentos sem rotulagem adequada.
      2. Processo para relato de documentos classificados sem marcacao.
      3. Treinamento de usuarios sobre como identificar e tratar cada rotulo.
    tools:
      - labeling-audit
      - training-platform
legal_references:
