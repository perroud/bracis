id: art-5
family: cap-2
title: "Classificacao de Ativos de Informacao"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 5. Os ativos de informação devem ser classificados quanto ao grau de sigilo
    e quanto à criticidade, observando:

    I - os graus de sigilo previstos na Lei n. 12.527/2011 (Lei de Acesso à Informação):
    ultrassecreto, secreto, reservado e ostensivo;
    II - a criticidade para a continuidade dos serviços públicos prestados pelo órgão;
    III - o impacto em caso de comprometimento da confidencialidade, integridade ou
    disponibilidade do ativo;
    IV - a periodicidade de revisão da classificação.
guidance:
  prose: |
    O art. 5 vincula a classificacao de ativos a LAI (Lei 12.527/2011) e ao impacto
    nos servicos publicos, criando matriz de criticidade.

    **Graus de sigilo (LAI):**
    - Ultrassecreto: 25 anos
    - Secreto: 15 anos
    - Reservado: 5 anos
    - Ostensivo: sem restricao

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.5.12 (Classification of information)
    - NIST 800-53 rev5: RA-2 (Security Categorization), FIPS 199
    - CIS Controls v8: 3.7 (Data Classification)
implementation_guidance:
  platform_engineering:
    prose: |
      **Classificacao automatizada:**
      1. Engine de classificacao que aplica labels baseado em conteudo (DLP com ML).
      2. Tags obrigatorias em todos os recursos cloud: classificacao, custodiante, prazo.
      3. Policies que impedem criacao de recursos sem classificacao definida.
      4. Integracao com IAM para restringir acesso baseado em classificacao.
    tools:
      - data-classification-engine
      - cloud-tagging-policies
      - iam-integration
  devsecops:
    prose: |
      **Classificacao em repositorios:**
      1. Label de classificacao obrigatoria em cada repositorio (public, internal, restricted).
      2. Pre-commit hooks que bloqueiam commit de dados classificados em repos errados.
      3. Scan de conteudo sensivel em merge requests (PII, credenciais, dados sigilosos).
      4. Pipeline que valida alinhamento entre classificacao do repo e do dado.
    tools:
      - gitlab-labels
      - pre-commit-hooks
      - sensitive-data-scanner
  secops:
    prose: |
      **Processo de classificacao:**
      1. Definir matriz de classificacao do orgao baseada na LAI e no BIA.
      2. Treinar custodiantes no processo de classificacao.
      3. Revisao anual de classificacao de todos os ativos criticos.
      4. Auditoria de aderencia: verificar se ativos estao corretamente classificados.
    tools:
      - grc-platform
      - training-platform
      - classification-audit
