id: art-11
family: cap-3
title: "Autorizacao e Concessao de Acessos"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 11. A concessão de acesso lógico a sistemas e informações deve
    observar:

    I - solicitação formal do gestor da área requisitante;
    II - aprovação do custodiante do ativo de informação;
    III - concessão de acesso alinhada ao perfil funcional do usuário;
    IV - registro de todas as concessões e revogações de acesso;
    V - revisão dos acessos concedidos quando da mudança de função ou lotação
    do usuário.
guidance:
  prose: |
    O art. 11 formaliza o processo de concessao de acesso: solicitacao,
    aprovacao, concessao, registro e revisao.

    **Fluxo obrigatorio:**
    1. Solicitacao: gestor da area solicita acesso para o usuario
    2. Aprovacao: custodiante do ativo aprova
    3. Concessao: equipe de TI implementa
    4. Registro: audit trail completo
    5. Revisao: ao mudar funcao/lotacao, acessos sao recertificados

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.5.18 (Access rights)
    - NIST 800-53 rev5: AC-2 (Account Management)
implementation_guidance:
  platform_engineering:
    prose: |
      **Workflow de acesso automatizado:**
      1. Portal de auto-servico para solicitacao de acesso (ServiceNow, Backstage).
      2. Workflow de aprovacao com notificacao ao custodiante.
      3. Provisionamento automatico apos aprovacao (SCIM, LDAP).
      4. Trigger de revisao automatica quando SIAPE indica mudanca de lotacao.
      5. Audit trail imutavel de todas as operacoes de acesso.
    tools:
      - access-request-portal
      - workflow-engine
      - scim-provisioning
      - audit-trail
  devsecops:
    prose: |
      **Acesso a repositorios:**
      1. Acesso a grupos/projetos via membership com role especifica.
      2. Solicitacao de acesso via issue template com aprovacao do maintainer.
      3. Revisao automatica de memberships em projetos inativos.
      4. Remocao automatica de acesso ao sair do grupo funcional.
    tools:
      - gitlab-membership
      - access-request-template
      - membership-review
  secops:
    prose: |
      **Governanca de acessos:**
      1. Recertificacao trimestral: gestor de area valida acessos de sua equipe.
      2. Alerta para concessao de acesso sem workflow formal (bypass detection).
      3. Relatorio de acessos nao utilizados (dormant permissions).
      4. Processo de revogacao emergencial (off-boarding em 4h para desligados).
    tools:
      - access-certification
      - bypass-detection
      - dormant-access-report
      - emergency-revocation
