id: art-8
family: cap-3
title: "Politica de Controle de Acesso"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 8. Os órgãos e entidades devem estabelecer, implementar e manter política
    de controle de acesso lógico, observando:

    I - o princípio do privilégio mínimo;
    II - a necessidade de conhecer (need-to-know);
    III - a segregação de funções;
    IV - a revisão periódica dos direitos de acesso;
    V - o registro e rastreabilidade de todos os acessos concedidos.
guidance:
  prose: |
    O art. 8 estabelece os principios fundamentais de controle de acesso: privilegio
    minimo, need-to-know, segregacao de funcoes. Sao principios universais de SI.

    **Principios obrigatorios:**
    1. Privilegio minimo: acesso apenas ao necessario para a funcao
    2. Need-to-know: acesso baseado em necessidade de conhecimento
    3. Segregacao: quem aprova nao executa, quem desenvolve nao faz deploy
    4. Revisao periodica: recertificacao de acessos
    5. Rastreabilidade: audit trail completo

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.5.15 (Access control)
    - NIST 800-53 rev5: AC-1 (Policy and Procedures), AC-6 (Least Privilege)
    - CIS Controls v8: 6.1 (Access Control)
implementation_guidance:
  platform_engineering:
    prose: |
      **IAM centralizado:**
      1. Identity Provider centralizado (Keycloak, Azure AD, Okta) com SSO.
      2. RBAC/ABAC em todos os sistemas com roles alinhadas a funcoes do orgao.
      3. Provisionamento automatico via SCIM/LDAP baseado no RH.
      4. Deprovisioning automatico em ate 24h apos desligamento.
      5. Policies as Code (OPA) para enforce de privilegio minimo.
    tools:
      - identity-provider
      - rbac-engine
      - scim-provisioning
      - opa-policies
  devsecops:
    prose: |
      **Controle de acesso em repositorios:**
      1. Branch protection com roles (maintainer, developer, reporter).
      2. CODEOWNERS para controle de quem pode alterar codigo critico.
      3. Merge request obrigatoria com aprovacao (segregacao de funcoes).
      4. Protected environments para deploy em producao.
    tools:
      - gitlab-branch-protection
      - codeowners
      - merge-request-approvals
      - protected-environments
  secops:
    prose: |
      **Gestao operacional de acessos:**
      1. Recertificacao trimestral de acessos por gestores de area.
      2. Revisao semestral de contas privilegiadas pelo gestor de SI.
      3. Monitoramento de acessos anomalos (horarios incomuns, locais atipicos).
      4. Processo formal de solicitacao/aprovacao/revogacao de acessos.
    tools:
      - access-recertification
      - pam-solution
      - ueba
      - itsm
