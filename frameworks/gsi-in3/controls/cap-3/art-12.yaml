id: art-12
family: cap-3
title: "Gestao de Contas Privilegiadas"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 12. Os órgãos e entidades devem implementar controles específicos para
    contas privilegiadas, incluindo:

    I - inventário de todas as contas com privilégios administrativos;
    II - uso de autenticação multifator obrigatória para contas privilegiadas;
    III - monitoramento e registro de todas as sessões privilegiadas;
    IV - uso de solução de gestão de acesso privilegiado (PAM);
    V - vedação do uso de contas privilegiadas para atividades rotineiras.
guidance:
  prose: |
    O art. 12 exige controles especificos para contas privilegiadas (admin, root,
    DBA), que representam o maior risco de seguranca.

    **Controles obrigatorios:**
    1. Inventario: lista completa de contas admin
    2. MFA: obrigatorio para todo acesso privilegiado
    3. Sessoes: gravacao e monitoramento
    4. PAM: solucao dedicada de gestao de privilegios
    5. Separacao: admin nao usa conta privilegiada para e-mail/navegacao

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.2 (Privileged access rights)
    - NIST 800-53 rev5: AC-6(5) (Privileged Accounts)
    - CIS Controls v8: 5.4 (Restrict Admin Privileges)
implementation_guidance:
  platform_engineering:
    prose: |
      **PAM (Privileged Access Management):**
      1. Solucao PAM centralizada (CyberArk, BeyondTrust, HashiCorp Boundary).
      2. Just-in-time access: elevacao de privilegio temporaria com aprovacao.
      3. Session recording para todas as sessoes administrativas.
      4. Vault para senhas privilegiadas com rotacao automatica.
      5. Breakglass account com procedimento formal de emergencia.
    tools:
      - pam-solution
      - vault
      - session-recording
      - jit-access
  devsecops:
    prose: |
      **Privilegios em pipelines:**
      1. Pipeline runners com privilegio minimo (nao rodar como root).
      2. GitLab admin access restrito a equipe de infra com MFA.
      3. Protected branches/tags acessiveis apenas por maintainers.
      4. Deploy para producao requer aprovacao de gestor (segregacao).
    tools:
      - runner-security
      - gitlab-admin-audit
      - protected-resources
      - deployment-approval
  secops:
    prose: |
      **Monitoramento de privilegios:**
      1. Alerta em tempo real para uso de conta privilegiada fora do horario.
      2. Deteccao de privilege escalation nao autorizada.
      3. Revisao mensal de contas privilegiadas ativas.
      4. Simulacao de ataque a contas privilegiadas (red team).
    tools:
      - pam-monitoring
      - privilege-escalation-detection
      - admin-account-review
      - red-team
legal_references:
