id: art-34
family: cap-7
title: "Varredura de Vulnerabilidades"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 34. Os órgãos e entidades devem realizar varreduras periódicas de
    vulnerabilidades, contemplando:

    I - varredura de infraestrutura de rede (servidores, switches, firewalls);
    II - varredura de aplicações web e APIs;
    III - varredura de imagens de contêineres e configurações de nuvem;
    IV - varredura autenticada para detecção de vulnerabilidades internas;
    V - periodicidade mínima mensal para ativos críticos.
guidance:
  prose: |
    O art. 34 detalha os tipos de varredura obrigatoria: infra, web, containers,
    cloud. Periodicidade minima mensal para ativos criticos.

    **Tipos de varredura:**
    1. Network scan: portas, servicos, versoes
    2. Web app scan: OWASP Top 10, injection, XSS
    3. Container scan: vulnerabilidades em imagens
    4. Cloud config scan: misconfigurations (S3 publico, SG aberto)
    5. Autenticado: scan com credenciais para deteccao mais profunda

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.8 (Management of technical vulnerabilities)
    - NIST 800-53 rev5: RA-5 (Vulnerability Scanning)
    - CIS Controls v8: 7.5 (Automated Vulnerability Scans)
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao de varredura:**
      1. Nessus/Qualys para varredura de infraestrutura com agentes persistentes.
      2. OWASP ZAP/Nuclei para varredura de aplicacoes web.
      3. Trivy/Grype para container scanning em registries.
      4. Prowler/ScoutSuite para cloud security posture assessment.
      5. Agendamento automatico com resultados centralizados em dashboard.
    tools:
      - infra-scanner
      - web-scanner
      - container-scanner
      - cloud-scanner
      - scan-scheduler
  devsecops:
    prose: |
      **Varredura no pipeline:**
      1. Container scanning em cada build de imagem Docker.
      2. DAST em review apps para cada merge request.
      3. Infrastructure scanning (Checkov, tfsec) para IaC.
      4. Resultados de scan como artefato do pipeline e no security dashboard.
    tools:
      - gitlab-container-scanning
      - gitlab-dast
      - iac-scanning
      - security-dashboard
  secops:
    prose: |
      **Operacao de varredura:**
      1. Scan mensal de ativos criticos, trimestral de demais.
      2. Scan ad-hoc apos publicacao de CVE critica (zero-day response).
      3. Correlacao de resultados entre diferentes scanners.
      4. Validacao de falsos positivos e ajuste de regras.
    tools:
      - scan-calendar
      - zero-day-response
      - false-positive-management
legal_references:
