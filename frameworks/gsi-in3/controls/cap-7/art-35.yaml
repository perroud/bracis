id: art-35
family: cap-7
title: "Gestao de Patches e Atualizacoes"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 35. Os órgãos e entidades devem implementar processo de gestão de
    patches e atualizações de segurança, observando:

    I - monitoramento contínuo de novas atualizações de segurança publicadas
    pelos fabricantes;
    II - avaliação de aplicabilidade e impacto de cada atualização;
    III - teste de atualizações em ambiente de homologação antes da aplicação
    em produção;
    IV - aplicação tempestiva de patches críticos conforme SLAs definidos;
    V - registro de todas as atualizações aplicadas.
guidance:
  prose: |
    O art. 35 formaliza patch management com teste em hml, SLAs e registro.
    Patches criticos devem ser aplicados conforme SLA (48h recomendado).

    **Processo de patching:**
    1. Monitoramento: feeds de fabricantes, CERT.br, US-CERT
    2. Avaliacao: CVSS, aplicabilidade, dependencias
    3. Teste: homologacao antes de producao
    4. Aplicacao: janela de manutencao ou emergencial
    5. Registro: audit trail de patches aplicados

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.8 (Management of technical vulnerabilities)
    - NIST 800-53 rev5: SI-2 (Flaw Remediation)
    - CIS Controls v8: 7.3 (Automated Patch Management)
implementation_guidance:
  platform_engineering:
    prose: |
      **Patch management automatizado:**
      1. WSUS/SCCM para Windows, Ansible/Salt para Linux.
      2. Auto-update para dependencias via Renovate/Dependabot.
      3. Rolling updates em Kubernetes para patches sem downtime.
      4. Imagens base atualizadas automaticamente (golden images).
      5. Janela de manutencao: patches criticos em 48h, demais mensal.
    tools:
      - patch-management
      - configuration-management
      - rolling-updates
      - golden-images
  devsecops:
    prose: |
      **Patches no pipeline:**
      1. Renovate/Dependabot para atualizar dependencias automaticamente.
      2. Pipeline de teste automatico para cada atualizacao de dependencia.
      3. Auto-merge para patches de seguranca em dependencias com testes passando.
      4. Monitoramento de base images e rebuild automatico quando atualiza.
    tools:
      - renovate
      - dependabot
      - auto-merge
      - base-image-rebuild
  secops:
    prose: |
      **Operacao de patching:**
      1. Monitoramento diario de boletins de seguranca (CERT.br, NVD, fabricantes).
      2. Avaliacao de impacto para cada patch (compatibilidade, dependencias).
      3. Metricas: % de sistemas atualizados, tempo medio de patching.
      4. Excecoes documentadas para sistemas que nao podem ser atualizados.
    tools:
      - security-bulletin-monitoring
      - patch-assessment
      - patch-metrics
      - exception-management
legal_references:
