id: art-37
family: cap-7
title: "Gestao de Configuracao Segura"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 37. Os órgãos e entidades devem manter gestão de configuração que
    assegure:

    I - inventário atualizado de configurações de todos os ativos de TI;
    II - controle de versão das configurações;
    III - detecção de mudanças não autorizadas nas configurações (drift detection);
    IV - restauração de configurações a partir de baseline conhecido em caso
    de comprometimento.
guidance:
  prose: |
    O art. 37 complementa o hardening (art. 36) com gestao continua de
    configuracao: inventario, versionamento, drift detection e restauracao.

    **Configuration management:**
    1. CMDB: inventario de configuracoes de todos os ativos
    2. Version control: toda configuracao versionada
    3. Drift detection: detectar quando configuracao muda sem autorizacao
    4. Restore: capacidade de restaurar baseline rapidamente

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.9 (Configuration management)
    - NIST 800-53 rev5: CM-2 (Baseline Configuration), CM-3 (Configuration Change Control)
    - CIS Controls v8: 4.1 (Secure Configuration)
implementation_guidance:
  platform_engineering:
    prose: |
      **Configuration management como codigo:**
      1. Toda infraestrutura como codigo (Terraform, Pulumi, CloudFormation).
      2. GitOps: estado desejado em Git, reconciliacao automatica (ArgoCD, FluxCD).
      3. Drift detection com alerta automatico (Terraform plan em cron).
      4. CMDB sincronizado automaticamente com cloud APIs.
      5. Immutable infrastructure: nao alterar em runtime, rebuildar.
    tools:
      - iac
      - gitops-engine
      - drift-detection
      - cmdb
      - immutable-infra
  devsecops:
    prose: |
      **Configuracao no pipeline:**
      1. Toda configuracao versionada em Git (inclusive secrets via SOPS/sealed-secrets).
      2. Pipeline de validacao para mudancas de configuracao.
      3. Plan/apply workflow para IaC com aprovacao.
      4. Rollback automatico para ultima configuracao valida.
    tools:
      - config-versioning
      - iac-pipeline
      - plan-apply-workflow
      - config-rollback
  secops:
    prose: |
      **Auditoria de configuracao:**
      1. Scan semanal de drift contra baseline conhecido.
      2. Investigacao de toda mudanca de configuracao nao autorizada.
      3. Relatorio mensal de compliance de configuracao.
      4. Teste trimestral de restauracao de baseline.
    tools:
      - drift-scan
      - unauthorized-change-investigation
      - config-compliance-report
legal_references:
  - framework_id: gsi-in1
    articles: ["art-12"]
    relationship: implements
  - framework_id: iso-27001-2022
    articles: ["A.8.9"]
    relationship: mapped
  - framework_id: nist-800-53-rev5
    articles: ["CM-2", "CM-3"]
    relationship: mapped
