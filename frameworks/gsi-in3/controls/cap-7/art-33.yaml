id: art-33
family: cap-7
title: "Politica de Gestao de Vulnerabilidades"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 33. Os órgãos e entidades devem estabelecer processo formal de gestão
    de vulnerabilidades técnicas, contemplando:

    I - identificação contínua de vulnerabilidades em sistemas, redes e aplicações;
    II - classificação de vulnerabilidades por nível de risco (criticidade);
    III - definição de SLAs de remediação conforme a criticidade;
    IV - acompanhamento da remediação até a conclusão;
    V - comunicação ao CISC Gov.br de vulnerabilidades críticas em ativos
    estratégicos.
guidance:
  prose: |
    O art. 33 estabelece gestao de vulnerabilidades com SLAs de remediacao
    e comunicacao ao CISC Gov.br para vulnerabilidades criticas.

    **SLAs de remediacao recomendados:**
    - Critico (CVSS >= 9.0): 24-48 horas
    - Alto (CVSS 7.0-8.9): 7 dias
    - Medio (CVSS 4.0-6.9): 30 dias
    - Baixo (CVSS < 4.0): 90 dias

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.8 (Management of technical vulnerabilities)
    - NIST 800-53 rev5: RA-5 (Vulnerability Monitoring and Scanning)
    - CIS Controls v8: 7.1 (Vulnerability Management)
implementation_guidance:
  platform_engineering:
    prose: |
      **Stack de vulnerability management:**
      1. Scanner de vulnerabilidades para infra (Nessus, Qualys, OpenVAS).
      2. Container scanning (Trivy, Grype) em todas as imagens.
      3. Cloud security posture management (CSPM) para misconfiguration.
      4. Vulnerability database centralizada com tracking de remediacao.
      5. Integracao com ITSM para abertura automatica de tickets de remediacao.
    tools:
      - vulnerability-scanner
      - container-scanner
      - cspm
      - vulnerability-database
      - itsm-integration
  devsecops:
    prose: |
      **Vulnerabilidades no pipeline:**
      1. GitLab Vulnerability Management para tracking centralizado.
      2. Merge request bloqueada se nova vulnerabilidade critica introduzida.
      3. Dashboard de vulnerabilidades por projeto/grupo.
      4. SLA enforcement: alerta quando vulnerabilidade ultrapassa SLA.
    tools:
      - gitlab-vulnerability-management
      - security-gate
      - vulnerability-dashboard
      - sla-enforcement
  secops:
    prose: |
      **Operacao de vulnerabilidades:**
      1. Scan semanal de infraestrutura e mensal de aplicacoes.
      2. Triagem diaria de novas vulnerabilidades criticas/altas.
      3. Comunicacao ao CISC Gov.br para vulnerabilidades criticas em ativos estrategicos.
      4. Relatorio mensal de metricas: abertas, fechadas, SLA compliance.
    tools:
      - scan-scheduling
      - triage-process
      - cisc-communication
      - vulnerability-metrics
