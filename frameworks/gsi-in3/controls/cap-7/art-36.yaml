id: art-36
family: cap-7
title: "Hardening de Sistemas"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 36. Os órgãos e entidades devem implementar configuração segura
    (hardening) em sistemas operacionais, serviços e aplicações, observando:

    I - desativação de serviços, protocolos e portas desnecessários;
    II - remoção de contas padrão e alteração de senhas padrão de fábrica;
    III - aplicação de benchmarks de configuração segura (CIS Benchmarks ou
    equivalente);
    IV - documentação da configuração base (baseline) de segurança;
    V - verificação periódica de conformidade com o baseline.
guidance:
  prose: |
    O art. 36 exige hardening baseado em benchmarks reconhecidos (CIS Benchmarks).
    Configuracao base documentada e verificada periodicamente.

    **Processo de hardening:**
    1. Definir baseline: CIS Benchmark por sistema operacional/servico
    2. Remover: servicos, portas, contas desnecessarias
    3. Configurar: parametros de seguranca conforme baseline
    4. Documentar: baseline aprovado e versionado
    5. Verificar: compliance scan periodico

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.9 (Configuration management)
    - NIST 800-53 rev5: CM-6 (Configuration Settings), CM-7 (Least Functionality)
    - CIS Benchmarks, DISA STIGs
implementation_guidance:
  platform_engineering:
    prose: |
      **Hardening automatizado:**
      1. Golden images (AMI, VM template) com hardening pre-aplicado.
      2. CIS Benchmark automation via Ansible/Chef/Puppet.
      3. Container base images com hardening (distroless, Alpine hardened).
      4. Kubernetes pod security standards (restricted).
      5. Cloud account hardening (AWS Config Rules, Azure Policy).
    tools:
      - golden-images
      - cis-automation
      - hardened-containers
      - pod-security-standards
      - cloud-config-rules
  devsecops:
    prose: |
      **Hardening no pipeline:**
      1. CIS Benchmark scan em imagens Docker no pipeline (Docker Bench).
      2. Kubernetes security scan (kube-bench, kubeaudit).
      3. IaC compliance check contra CIS Benchmarks (Checkov, Regula).
      4. Drift detection: alerta quando configuracao diverge do baseline.
    tools:
      - docker-bench
      - kube-bench
      - iac-compliance
      - drift-detection
  secops:
    prose: |
      **Operacao de hardening:**
      1. Scan trimestral de compliance contra CIS Benchmark.
      2. Remediacao de desvios encontrados no scan.
      3. Atualizacao do baseline quando novo CIS Benchmark e publicado.
      4. Excecoes documentadas e revisadas anualmente.
    tools:
      - cis-scan
      - baseline-management
      - exception-management
legal_references:
  - framework_id: gsi-in1
    articles: ["art-12"]
    relationship: implements
  - framework_id: iso-27001-2022
    articles: ["A.8.9"]
    relationship: mapped
  - framework_id: nist-800-53-rev5
    articles: ["CM-6", "CM-7"]
    relationship: mapped
