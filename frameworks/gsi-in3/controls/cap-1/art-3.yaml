id: art-3
family: cap-1
title: "Responsabilidades do Gestor de Seguranca da Informacao"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 3. Compete ao gestor de segurança da informação, no âmbito de cada órgão
    ou entidade da administração pública federal:

    I - coordenar a implementação dos processos de gestão de segurança da
    informação previstos nesta Instrução Normativa;
    II - promover a cultura de segurança da informação no órgão ou entidade;
    III - acompanhar e reportar o nível de conformidade aos controles estabelecidos;
    IV - interagir com o Centro Integrado de Segurança Cibernética do Governo
    Digital (CISC Gov.br) e com a ETIR do órgão.
guidance:
  prose: |
    O art. 3 define as competencias do gestor de SI, papel obrigatorio por forca
    da IN GSI/PR 1. E o elo entre a governanca estrategica e a operacao.

    **Competencias operacionais:**
    1. Coordenar implementacao: responsabilidade executiva sobre os 12 capitulos
    2. Cultura de SI: conscientizacao, treinamento, engajamento
    3. Reportar conformidade: metricas, dashboards, relatorios
    4. Interface CISC Gov.br: comunicacao de incidentes, alinhamento

    **Equivalencias internacionais:**
    - ISO 27001:2022 clausula 5.3 (Papeis e responsabilidades)
    - NIST 800-53 rev5: PM-2 (Senior Information Security Officer)
    - NIST CSF: GV.RR (Roles, Responsibilities)
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de visibilidade para o gestor:**
      1. Dashboard centralizado de conformidade com a IN GSI/PR 3 por capitulo.
      2. Alertas automaticos quando nivel de conformidade cai abaixo do threshold.
      3. Integracao entre CMDB, SIEM e GRC para visao consolidada.
      4. Relatorios automatizados para reporte ao CISC Gov.br.
    tools:
      - grc-dashboard
      - alerting-engine
      - report-generator
  devsecops:
    prose: |
      **Metricas de seguranca em pipeline:**
      1. Coletar metricas de seguranca de todos os pipelines (SAST, DAST, SCA).
      2. Agregar em dashboard unico para o gestor de SI.
      3. Rastrear tendencia de vulnerabilidades ao longo do tempo.
      4. Gerar evidencias automaticas de conformidade para auditoria.
    tools:
      - gitlab-security-dashboard
      - metrics-aggregator
      - evidence-collector
  secops:
    prose: |
      **Operacao do papel de gestor de SI:**
      1. Definir RACI formal para cada familia de controles da IN.
      2. Reuniao mensal de acompanhamento de conformidade com equipes tecnicas.
      3. Relatorio trimestral ao comite de SI do orgao.
      4. Comunicacao imediata ao CISC Gov.br em caso de incidentes.
    tools:
      - grc-platform
      - incident-communication
      - audit-trail
legal_references:
