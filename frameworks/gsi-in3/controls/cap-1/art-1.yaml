id: art-1
family: cap-1
title: "Objeto e Escopo de Aplicacao"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 1. Esta Instrução Normativa dispõe sobre os processos relacionados à gestão
    de segurança da informação nos órgãos e nas entidades da administração pública
    federal direta, autárquica e fundacional.

    Parágrafo único. Os processos de que trata esta Instrução Normativa complementam
    e detalham os requisitos estabelecidos na Instrução Normativa GSI/PR n. 1, de
    27 de maio de 2020, que disciplina a Gestão de Segurança da Informação.
guidance:
  prose: |
    O art. 1 delimita o escopo da IN GSI/PR 3 como instrumento operacional que
    detalha os processos de gestao de SI para toda a APF direta, autarquica e
    fundacional.

    **Relacao hierarquica:**
    - PNSI (Decreto 9.637/2018): politica nacional
    - IN GSI/PR 1/2020: governanca de SI (estrategico)
    - IN GSI/PR 3/2021: processos operacionais (tatico/operacional)

    **Equivalencias internacionais:**
    - ISO 27001:2022 clausula 4 (Contexto da organizacao)
    - NIST 800-53 rev5: PL-1 (Policy and Procedures)
    - NIST CSF: GV.OC (Organizational Context)

    **Aplicacao pratica:**
    Todo orgao/entidade federal DEVE implementar os processos desta IN.
    Nao ha opcionalidade. Autarquias e fundacoes estao incluidas.
implementation_guidance:
  platform_engineering:
    prose: |
      **Fundacao de compliance como codigo:**
      1. Definir politica de seguranca como codigo (OPA/Rego, Kyverno) aplicavel
         a toda infraestrutura do orgao.
      2. Implementar GitOps com repositorio central de politicas de seguranca.
      3. Catalogar todos os sistemas do orgao com metadados de classificacao
         de seguranca e responsavel tecnico.
      4. Automatizar verificacao de conformidade com a IN GSI/PR 3 via pipelines.
    tools:
      - opa-gatekeeper
      - kyverno
      - gitops-engine
      - asset-catalog
  devsecops:
    prose: |
      **Pipeline de compliance:**
      1. Template de pipeline CI/CD que implementa todos os controles da IN GSI/PR 3.
      2. Scan automatico de conformidade em cada merge request.
      3. Dashboard de compliance por sistema/projeto mostrando aderencia a cada capitulo.
      4. Gate de qualidade que bloqueia deploy se controles criticos nao estao atendidos.
    tools:
      - gitlab-ci
      - compliance-pipeline
      - security-dashboard
  secops:
    prose: |
      **Governanca operacional:**
      1. Inventariar todos os sistemas do orgao e mapear para os controles da IN GSI/PR 3.
      2. Definir responsaveis (RACI) para cada familia de controles.
      3. Estabelecer ciclo de auditoria interna semestral de conformidade.
      4. Reportar ao CISC Gov.br o nivel de maturidade de implementacao.
    tools:
      - grc-platform
      - cmdb
      - audit-management
