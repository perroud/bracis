id: art-2
family: cap-1
title: "Definicoes e Terminologia"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 2. Para fins desta Instrução Normativa, adotam-se as definições previstas
    no Glossário de Segurança da Informação do GSI/PR e as seguintes:

    I - ativo de informação: qualquer informação que tenha valor para o órgão ou
    entidade, incluindo dados, sistemas, hardware, software e documentos;
    II - gestor de segurança da informação: servidor responsável pelas ações de
    segurança da informação no âmbito do órgão ou entidade;
    III - equipe de tratamento e resposta a incidentes: grupo responsável por
    receber, analisar e responder a notificações e atividades relacionadas a
    incidentes de segurança;
    IV - processo de gestão de segurança: conjunto de atividades inter-relacionadas
    que transformam insumos em resultados de segurança da informação.
guidance:
  prose: |
    O art. 2 padroniza a terminologia de SI para toda a APF, evitando ambiguidade
    na implementacao dos processos.

    **Definicoes-chave para implementacao tecnica:**
    - Ativo de informacao: conceito amplo que inclui dados, sistemas, infra
    - Gestor de SI: papel formal obrigatorio em cada orgao (vinculo com IN1)
    - ETIR: obrigatoria em cada orgao (vinculo com IN6)

    **Equivalencias internacionais:**
    - ISO 27000:2018 clausula 3 (Termos e definicoes)
    - NIST SP 800-53 rev5: glossario
    - COBIT 2019: glossario
implementation_guidance:
  platform_engineering:
    prose: |
      **Taxonomia de ativos como codigo:**
      1. Definir schema padronizado para classificacao de ativos de informacao
         (tipo, criticidade, responsavel, classificacao).
      2. Implementar CMDB com campos obrigatorios alinhados as definicoes da IN.
      3. Tagear todos os recursos de infraestrutura com metadados de classificacao.
      4. API de consulta de ativos para integracao com demais controles.
    tools:
      - cmdb
      - asset-tagging
      - metadata-api
  devsecops:
    prose: |
      **Padronizacao em repositorios:**
      1. Template de SECURITY.md em cada repositorio com definicoes e responsaveis.
      2. Labels padronizadas para issues de seguranca alinhadas ao glossario.
      3. Pipeline que valida metadados obrigatorios em cada projeto.
    tools:
      - gitlab-templates
      - issue-labels
      - metadata-validation
  secops:
    prose: |
      **Glossario operacional:**
      1. Manter glossario interno do orgao baseado no Glossario GSI/PR.
      2. Treinar equipes tecncias nas definicoes formais.
      3. Usar terminologia padronizada em todos os documentos e comunicacoes de SI.
    tools:
      - knowledge-base
      - training-platform
legal_references:
  - framework_id: gsi-in1
    articles: ["art-2"]
    relationship: implements
