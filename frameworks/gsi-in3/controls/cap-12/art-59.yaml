id: art-59
family: cap-12
title: "Monitoramento e Auditoria em Nuvem"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 59. Os órgãos e entidades devem assegurar a capacidade de monitoramento
    e auditoria dos serviços de computação em nuvem, incluindo:

    I - habilitação de logs de auditoria em todos os serviços cloud contratados;
    II - exportação e armazenamento de logs em infraestrutura sob controle do órgão;
    III - monitoramento de atividades de administração do ambiente cloud;
    IV - detecção de configurações inseguras (misconfiguration);
    V - integração de logs cloud com o SIEM do órgão.
guidance:
  prose: |
    O art. 59 exige monitoramento e auditoria em nuvem: logs habilitados,
    exportados para infra do orgao, integrados ao SIEM.

    **Requisitos de auditoria cloud:**
    1. Logs: CloudTrail (AWS), Activity Log (Azure), Audit Log (GCP) habilitados
    2. Exportacao: logs copiados para storage sob controle do orgao
    3. Admin monitoring: deteccao de atividades administrativas anomalas
    4. Misconfiguration: CSPM para deteccao continua
    5. SIEM: logs cloud correlacionados com logs on-premise

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.5.23 (Cloud services - monitoring)
    - NIST 800-53 rev5: AU-2 (Event Logging), SI-4 (System Monitoring)
    - CSA CCM: LOG (Logging and Monitoring)
implementation_guidance:
  platform_engineering:
    prose: |
      **Cloud observability:**
      1. CloudTrail/Activity Log/Audit Log habilitado em todas as contas/subscriptions.
      2. Logs exportados para S3/storage com replicacao para conta de seguranca.
      3. CSPM (Prowler, ScoutSuite, Prisma Cloud) para deteccao de misconfiguration.
      4. Cloud-native SIEM (Sentinel, GuardDuty) + exportacao para SIEM central.
      5. Cost anomaly detection como indicador de seguranca (crypto mining).
    tools:
      - cloud-audit-logs
      - log-export
      - cspm
      - cloud-siem
      - cost-anomaly-detection
  devsecops:
    prose: |
      **Auditoria de IaC:**
      1. Todo recurso cloud provisionado via IaC com audit trail no Git.
      2. Drift detection: alerta para mudancas fora do IaC (manual changes).
      3. Pipeline que verifica compliance de novos recursos contra CSPM rules.
      4. Dashboard de compliance cloud por projeto/equipe.
    tools:
      - iac-audit-trail
      - drift-detection
      - cspm-pipeline
      - compliance-dashboard
  secops:
    prose: |
      **Operacao de monitoramento cloud:**
      1. SOC monitora alertas de CSPM e cloud SIEM.
      2. Triagem de misconfigurations por severidade.
      3. Relatorio mensal de postura de seguranca cloud.
      4. Auditoria semestral de compliance cloud (CIS Cloud Benchmarks).
    tools:
      - cspm-monitoring
      - misconfiguration-triage
      - cloud-security-report
      - cloud-compliance-audit
