id: art-56
family: cap-12
title: "Classificacao de Dados para Nuvem"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 56. Os órgãos e entidades devem classificar os dados antes de
    armazená-los em serviços de computação em nuvem, observando:

    I - dados classificados como ultrassecretos e secretos não devem ser
    armazenados em nuvem pública, salvo autorização expressa do GSI/PR;
    II - dados classificados como reservados podem ser armazenados em nuvem
    pública com criptografia e controles adicionais;
    III - dados pessoais sensíveis devem observar requisitos específicos da LGPD;
    IV - o órgão deve manter registro de quais dados estão em quais serviços cloud.
guidance:
  prose: |
    O art. 56 restringe armazenamento em nuvem publica por classificacao:
    ultrassecreto/secreto proibidos (salvo autorizacao GSI/PR), reservado com
    criptografia, pessoais sensiveis com LGPD.

    **Regras de armazenamento em nuvem:**
    - Ultrassecreto: PROIBIDO em nuvem publica (exceto autorizacao GSI/PR)
    - Secreto: PROIBIDO em nuvem publica (exceto autorizacao GSI/PR)
    - Reservado: permitido com criptografia + controles adicionais
    - Ostensivo: permitido com controles basicos
    - Dados pessoais sensiveis: requisitos LGPD obrigatorios

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.5.23 (Cloud services - data classification)
    - NIST 800-53 rev5: SC-28 (Protection of Information at Rest)
    - FedRAMP (Federal Risk and Authorization Management Program)
implementation_guidance:
  platform_engineering:
    prose: |
      **Classificacao e controle em nuvem:**
      1. Tag obrigatoria de classificacao em todos os recursos cloud.
      2. Policy: bloquear criacao de recursos sem tag de classificacao.
      3. CSPM rules: alertar se dados reservados sem criptografia.
      4. Data residency: dados em data centers no Brasil quando exigido.
      5. Inventario automatizado de dados em cada servico cloud.
    tools:
      - cloud-tagging
      - tagging-policy
      - cspm-classification
      - data-residency
      - cloud-data-inventory
  devsecops:
    prose: |
      **Validacao de classificacao no pipeline:**
      1. Pipeline que valida que deploy para cloud respeita classificacao.
      2. Bloqueio de deploy de dados secreto/ultrassecreto para nuvem publica.
      3. Scan de dados sensiveis em storage buckets (DLP cloud).
    tools:
      - classification-validation
      - deploy-blocker
      - cloud-dlp
  secops:
    prose: |
      **Auditoria de dados em nuvem:**
      1. Inventario trimestral de dados em cada provider cloud.
      2. Verificacao de que dados classificados estao em servicos autorizados.
      3. Alerta para dados nao classificados em nuvem.
      4. Monitoramento de data residency (dados no Brasil).
    tools:
      - cloud-data-audit
      - classification-compliance
      - unclassified-data-alert
      - residency-monitoring
