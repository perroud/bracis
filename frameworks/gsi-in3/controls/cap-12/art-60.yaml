id: art-60
family: cap-12
title: "Continuidade e Portabilidade em Nuvem"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 60. Os órgãos e entidades devem assegurar a continuidade e portabilidade
    dos serviços de computação em nuvem, incluindo:

    I - plano de continuidade específico para serviços em nuvem;
    II - capacidade de migrar dados e serviços para outro provedor ou para
    infraestrutura própria (portabilidade);
    III - backup independente dos dados críticos armazenados em nuvem;
    IV - testes periódicos de recuperação de dados e serviços cloud;
    V - cláusulas contratuais que assegurem a devolução dos dados ao término
    do contrato.
guidance:
  prose: |
    O art. 60 trata de continuidade e portabilidade em nuvem: plano de
    continuidade, capacidade de migracao, backup independente e clausulas
    contratuais.

    **Requisitos de continuidade cloud:**
    1. BCP especifico para servicos cloud (nao depender apenas do provider)
    2. Portabilidade: capacidade de migrar para outro provider em prazo razoavel
    3. Backup independente: copia dos dados fora do provider principal
    4. Testes de DR: restauracao periodica de dados cloud
    5. Contrato: clausulas de devolucao e destruicao de dados

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.5.23 (Cloud services - exit), A.5.30 (Business continuity)
    - NIST 800-53 rev5: CP-2 (Contingency Plan), SA-9(5) (Processing, Storage Location)
    - CSA CCM: BCR (Business Continuity and Operational Resilience)
implementation_guidance:
  platform_engineering:
    prose: |
      **Cloud portability e continuidade:**
      1. Multi-cloud strategy: evitar vendor lock-in em servicos criticos.
      2. Abstraction layers: Kubernetes, Terraform para portabilidade.
      3. Backup cross-cloud: dados criticos replicados para segundo provider.
      4. DR site em provider diferente ou on-premise para servicos essenciais.
      5. Export de dados em formato aberto e padronizado.
    tools:
      - multi-cloud-abstraction
      - kubernetes-portability
      - cross-cloud-backup
      - dr-site
      - data-export
  devsecops:
    prose: |
      **Portabilidade como codigo:**
      1. IaC com modulos abstratos (nao acoplados a um unico provider).
      2. Containers para portabilidade de aplicacoes.
      3. Pipeline de teste de portabilidade (deploy em provider alternativo).
      4. Documentacao de dependencias de servicos cloud-specific.
    tools:
      - provider-agnostic-iac
      - container-portability
      - portability-testing
      - cloud-dependency-docs
  secops:
    prose: |
      **Gestao de continuidade cloud:**
      1. BCP especifico para cenario de indisponibilidade do provider cloud.
      2. Teste anual de DR com failover para provider/infra alternativa.
      3. Revisao anual de clausulas contratuais de portabilidade e devolucao.
      4. Exercicio de exit strategy: simular migracao para outro provider.
    tools:
      - cloud-bcp
      - dr-testing
      - contract-review
      - exit-strategy-exercise
