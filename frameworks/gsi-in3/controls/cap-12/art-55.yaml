id: art-55
family: cap-12
title: "Politica de Seguranca em Computacao em Nuvem"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 55. Os órgãos e entidades que utilizem ou contratem serviços de
    computação em nuvem devem observar os requisitos de segurança estabelecidos
    na Instrução Normativa GSI/PR n. 5, e adicionalmente:

    I - realizar avaliação de riscos antes da contratação de serviço em nuvem;
    II - definir requisitos de segurança no edital de contratação;
    III - assegurar a conformidade com a legislação de proteção de dados pessoais;
    IV - manter capacidade de auditoria sobre os dados e serviços em nuvem.
guidance:
  prose: |
    O art. 55 remete a IN GSI/PR 5 para computacao em nuvem e adiciona
    requisitos de avaliacao de riscos, contratacao e conformidade LGPD.

    **Requisitos antes da contratacao:**
    1. Avaliacao de riscos: classificacao dos dados, modelo de deployment
    2. Edital: requisitos de seguranca como criterio eliminatorio
    3. LGPD: dados pessoais em nuvem exigem conformidade
    4. Auditabilidade: capacidade de auditar dados e servicos

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.5.23 (Information security for use of cloud services)
    - NIST 800-53 rev5: SA-9 (External System Services)
    - NIST SP 800-144 (Guidelines on Security and Privacy in Public Cloud)
    - CSA CCM (Cloud Controls Matrix)
implementation_guidance:
  platform_engineering:
    prose: |
      **Governanca de nuvem:**
      1. Cloud governance framework com policies pre-contratacao.
      2. Landing zone segura: VPC, IAM, logging, encryption configurados por padrao.
      3. Service Control Policies (AWS) / Organization Policies (GCP) para guardrails.
      4. Cloud trail/audit logs habilitados em todas as contas.
      5. CSPM para monitoramento continuo de postura de seguranca.
    tools:
      - cloud-governance
      - landing-zone
      - scp-policies
      - cspm
  devsecops:
    prose: |
      **IaC segura para nuvem:**
      1. Terraform/Pulumi com modulos aprovados de seguranca.
      2. IaC scanning para detectar misconfiguration antes de deploy.
      3. Pipeline de validacao de compliance antes de provisionar recursos cloud.
      4. Drift detection para mudancas fora do IaC.
    tools:
      - iac-modules
      - iac-scanning
      - compliance-validation
      - drift-detection
  secops:
    prose: |
      **Auditoria de nuvem:**
      1. Avaliacao de riscos formalizada antes de cada contratacao cloud.
      2. Verificacao de conformidade do provider (SOC 2, ISO 27001, CSA STAR).
      3. Auditoria anual de servicos cloud contratados.
      4. Plano de saida (exit plan) para cada provider cloud.
    tools:
      - risk-assessment
      - provider-compliance-check
      - cloud-audit
      - exit-plan
