id: art-25
family: cap-5
title: "Integridade de Dados"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 25. Os órgãos e entidades devem implementar controles para garantir a
    integridade dos dados, incluindo:

    I - uso de hashes criptográficos para verificação de integridade de arquivos
    e dados críticos;
    II - controles de versão para documentos e configurações;
    III - detecção de alterações não autorizadas em dados e sistemas;
    IV - assinatura digital de documentos oficiais conforme legislação vigente.
guidance:
  prose: |
    O art. 25 trata da integridade dos dados: hashes, controle de versao,
    deteccao de alteracoes e assinatura digital.

    **Controles de integridade:**
    1. Hashes: SHA-256 ou superior para verificacao
    2. Versionamento: Git para codigo, versionamento para documentos
    3. FIM (File Integrity Monitoring): deteccao de alteracoes
    4. Assinatura digital: ICP-Brasil para documentos oficiais

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.7 (Protection against malware - integrity)
    - NIST 800-53 rev5: SI-7 (Software, Firmware, and Information Integrity)
    - CIS Controls v8: 3.14 (Data Integrity)
implementation_guidance:
  platform_engineering:
    prose: |
      **Stack de integridade:**
      1. FIM (File Integrity Monitoring) em servidores criticos (OSSEC, Tripwire).
      2. Checksums automaticos para artefatos de deploy.
      3. Blockchain ou Merkle tree para registros que exigem prova de integridade.
      4. Assinatura de imagens Docker (Cosign, Notary).
      5. ICP-Brasil para assinatura de documentos oficiais (e-Docs, SEI).
    tools:
      - fim
      - checksum-verification
      - container-signing
      - icp-brasil
  devsecops:
    prose: |
      **Integridade em pipeline:**
      1. Signed commits obrigatorios (GPG ou SSH signing).
      2. Verificacao de integridade de dependencias (lockfiles, checksums).
      3. SLSA (Supply Chain Levels for Software Artifacts) level 2+.
      4. Provenance tracking para todos os artefatos de build.
    tools:
      - signed-commits
      - lockfile-verification
      - slsa-framework
      - provenance-tracking
  secops:
    prose: |
      **Monitoramento de integridade:**
      1. Alerta em tempo real para alteracoes nao autorizadas em arquivos criticos.
      2. Baseline de integridade atualizado apos cada mudanca autorizada.
      3. Investigacao de todas as violacoes de integridade detectadas.
      4. Auditoria semestral de assinaturas digitais.
    tools:
      - fim-alerting
      - baseline-management
      - integrity-investigation
legal_references:
