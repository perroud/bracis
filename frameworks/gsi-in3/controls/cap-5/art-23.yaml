id: art-23
family: cap-5
title: "Prevencao Contra Vazamento de Dados (DLP)"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 23. Os órgãos e entidades devem implementar controles de prevenção
    contra vazamento de dados (DLP), incluindo:

    I - monitoramento de fluxos de dados em canais de comunicação (e-mail,
    web, dispositivos removíveis);
    II - bloqueio de transferência de dados classificados por canais não
    autorizados;
    III - controle de uso de dispositivos de armazenamento removível;
    IV - conscientização dos usuários sobre prevenção de vazamento de dados.
guidance:
  prose: |
    O art. 23 exige DLP cobrindo e-mail, web, dispositivos removiveis.
    Prevencao de vazamento e complementar a classificacao (art. 22).

    **Canais a monitorar:**
    1. E-mail: anexos com dados classificados
    2. Web: upload para cloud pessoal, redes sociais
    3. USB/removiveis: copia de dados para pendrives
    4. Impressao: documentos sigilosos impressos
    5. Cloud: compartilhamento externo de arquivos

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.12 (Data leakage prevention)
    - NIST 800-53 rev5: SC-7(10) (Prevent Exfiltration)
    - CIS Controls v8: 3.12 (Data Loss Prevention)
implementation_guidance:
  platform_engineering:
    prose: |
      **Stack DLP:**
      1. DLP endpoint: monitoramento de copia para USB, upload, impressao.
      2. DLP de rede: inspecao de trafego de saida (proxy com DLP integrado).
      3. DLP de e-mail: bloqueio de anexos com dados classificados para externos.
      4. CASB para monitoramento de uso de cloud pessoal (Shadow IT).
      5. USB port control: bloqueio de dispositivos nao autorizados via GPO/MDM.
    tools:
      - dlp-endpoint
      - dlp-network
      - dlp-email
      - casb
      - usb-control
  devsecops:
    prose: |
      **DLP em repositorios:**
      1. Pre-commit hooks que bloqueiam dados classificados em repositorios.
      2. Secret detection em todo pipeline CI/CD.
      3. Scan de repositorios para PII e dados sensiveis (truffleHog, GitLeaks).
      4. Bloqueio de push para repositorios publicos de projetos classificados.
    tools:
      - pre-commit-hooks
      - secret-detection
      - pii-scanner
      - public-repo-blocker
  secops:
    prose: |
      **Operacao DLP:**
      1. SOC monitora alertas de DLP e triagem de incidentes de vazamento.
      2. Investigacao de tentativas de exfiltracao de dados.
      3. Metricas mensais: tentativas bloqueadas, incidentes reais, canais.
      4. Campanha de conscientizacao trimestral sobre prevencao de vazamento.
    tools:
      - dlp-monitoring
      - incident-investigation
      - awareness-campaign
