id: art-22
family: cap-5
title: "Classificacao e Protecao de Dados"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 22. Os órgãos e entidades devem classificar os dados conforme seu nível
    de sensibilidade e aplicar controles de proteção proporcionais, incluindo:

    I - identificação de dados pessoais, sensíveis e sigilosos;
    II - aplicação de controles de acesso baseados na classificação;
    III - criptografia obrigatória para dados sigilosos e dados pessoais sensíveis;
    IV - mascaramento de dados em ambientes não produtivos.
guidance:
  prose: |
    O art. 22 vincula a protecao de dados a sua classificacao: dados pessoais
    sensiveis e sigilosos exigem criptografia obrigatoria.

    **Niveis de protecao por classificacao:**
    - Ostensivo: controles basicos
    - Reservado: criptografia + controle de acesso
    - Secreto/Ultrassecreto: criptografia forte + PAM + audit trail
    - Dados pessoais sensiveis (LGPD): criptografia + minimizacao + log

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.5.12 (Classification), A.8.11 (Data masking)
    - NIST 800-53 rev5: SC-28 (Protection of Information at Rest)
    - NIST 800-188 (De-Identification)
implementation_guidance:
  platform_engineering:
    prose: |
      **Data protection stack:**
      1. Data classification engine com ML para detectar PII e dados sensiveis.
      2. Column-level encryption em bancos de dados para dados classificados.
      3. Dynamic data masking em ambientes de desenvolvimento e homologacao.
      4. Tokenizacao de dados pessoais sensiveis (CPF, dados de saude).
      5. Data catalog com metadados de classificacao (Apache Atlas, DataHub).
    tools:
      - data-classification
      - column-encryption
      - dynamic-masking
      - tokenization
      - data-catalog
  devsecops:
    prose: |
      **Protecao de dados em pipeline:**
      1. Scan de PII em codigo e configuracoes antes de merge.
      2. Mascaramento automatico de dados ao popular ambientes de teste.
      3. Validacao de que dados de producao nunca sao copiados para dev sem mascarar.
      4. Pipeline de anonimizacao para datasets de teste.
    tools:
      - pii-scanner
      - data-masking-pipeline
      - anonymization-tool
  secops:
    prose: |
      **Governanca de dados:**
      1. Data mapping: inventario de onde cada tipo de dado sensivel esta armazenado.
      2. DPIA (Data Protection Impact Assessment) para novos projetos com dados pessoais.
      3. Monitoramento de acesso a dados classificados (quem acessou, quando, por que).
      4. Auditoria anual de conformidade com LGPD e LAI.
    tools:
      - data-mapping
      - dpia-tool
      - data-access-monitoring
