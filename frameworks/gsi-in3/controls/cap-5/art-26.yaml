id: art-26
family: cap-5
title: "Transferencia Segura de Dados"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 26. A transferência de dados entre órgãos, entidades e com terceiros
    deve observar:

    I - uso de canais criptografados para transferência de dados classificados;
    II - autenticação mútua entre as partes envolvidas;
    III - registro e rastreabilidade de todas as transferências;
    IV - acordos formais de troca de informação (NDA, convênios) quando aplicável;
    V - validação de integridade dos dados após transferência.
guidance:
  prose: |
    O art. 26 regula a transferencia de dados entre orgaos e com terceiros,
    exigindo criptografia, autenticacao mutua e rastreabilidade.

    **Requisitos de transferencia:**
    1. Canal criptografado: SFTP, HTTPS, VPN site-to-site
    2. Autenticacao mutua: mTLS, certificados ICP-Brasil
    3. Registro: log de todas as transferencias
    4. Acordo: NDA ou convenio formalizado
    5. Integridade: checksum pos-transferencia

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.5.14 (Information transfer)
    - NIST 800-53 rev5: SC-8 (Transmission Confidentiality and Integrity)
implementation_guidance:
  platform_engineering:
    prose: |
      **Transferencia segura:**
      1. MFT (Managed File Transfer) para transferencias entre orgaos (GoAnywhere, Axway).
      2. API Gateway com mTLS para integracoes entre sistemas.
      3. VPN site-to-site com IPsec para conexoes permanentes entre orgaos.
      4. SFTP com chaves SSH (proibir FTP e SCP sem criptografia).
      5. Log imutavel de todas as transferencias com metadados.
    tools:
      - mft
      - api-gateway-mtls
      - vpn-ipsec
      - sftp
      - transfer-logging
  devsecops:
    prose: |
      **APIs seguras:**
      1. mTLS entre microsservicos para comunicacao inter-servico.
      2. API contracts versionados com validacao em pipeline.
      3. Teste de seguranca de APIs em pipeline (OWASP API Security Top 10).
      4. Rate limiting e throttling em todas as APIs expostas.
    tools:
      - mtls
      - api-contract-testing
      - api-security-testing
      - rate-limiting
  secops:
    prose: |
      **Governanca de transferencias:**
      1. Inventario de todas as integracoes e transferencias de dados.
      2. Acordo de troca de informacao para cada parceiro externo.
      3. Monitoramento de transferencias anomalas (volume, horario, destino).
      4. Revisao anual de integracoes ativas vs. acordos vigentes.
    tools:
      - integration-inventory
      - nda-management
      - transfer-monitoring
