id: art-43
family: cap-9
title: "Controle de Acesso Fisico"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 43. Os órgãos e entidades devem implementar controles de acesso físico
    a áreas que contenham ativos de informação críticos, incluindo:

    I - definição de áreas seguras com níveis de acesso diferenciados;
    II - controle de entrada e saída com registro de acessos;
    III - uso de mecanismos de autenticação para acesso a áreas restritas
    (biometria, crachás, senhas);
    IV - escolta de visitantes em áreas restritas;
    V - revisão periódica dos acessos físicos concedidos.
guidance:
  prose: |
    O art. 43 exige controle de acesso fisico com niveis diferenciados, registro,
    autenticacao e escolta de visitantes.

    **Zonas de seguranca fisica:**
    1. Publica: recepcao, areas abertas
    2. Restrita: escritorios, salas de reuniao
    3. Segura: salas de servidores, cofres
    4. Critica: data centers, salas de telecomunicacoes

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.7.1 (Physical security perimeters), A.7.2 (Physical entry)
    - NIST 800-53 rev5: PE-2 (Physical Access Authorizations), PE-3 (Physical Access Control)
    - CIS Controls v8: 12.7 (Physical Access Control)
implementation_guidance:
  platform_engineering:
    prose: |
      **Controle de acesso fisico integrado:**
      1. PACS (Physical Access Control System) integrado ao IdP.
      2. Biometria + cracha para areas criticas (multifator fisico).
      3. Cameras de seguranca (CFTV) com retencao minima de 90 dias.
      4. Integracao PACS-SIEM: logs de acesso fisico correlacionados com logico.
      5. Deprovisioning automatico: ao desligar servidor, acesso fisico revogado.
    tools:
      - pacs
      - biometric-access
      - cctv
      - pacs-siem-integration
  devsecops:
    prose: |
      **Acesso fisico a infra de CI/CD:**
      1. Runners on-premise em sala segura com acesso restrito.
      2. HSMs (Hardware Security Modules) em area critica.
      3. Acesso fisico a servidores de deploy requer justificativa formal.
    tools:
      - secure-room-runners
      - hsm-physical-security
  secops:
    prose: |
      **Operacao de seguranca fisica:**
      1. Revisao semestral de acessos fisicos concedidos.
      2. Teste trimestral de efetividade dos controles (tailgating test).
      3. Verificacao de cameras e alarmes mensalmente.
      4. Registro de visitantes com escolta em areas restritas.
    tools:
      - physical-access-review
      - tailgating-test
      - cctv-audit
      - visitor-management
legal_references:
