id: art-44
family: cap-9
title: "Protecao de Data Centers e Salas de Servidores"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 44. Os data centers e salas de servidores dos órgãos e entidades devem
    possuir:

    I - controle de acesso físico restrito com múltiplos fatores de autenticação;
    II - sistemas de climatização adequados para manter temperatura e umidade
    dentro dos parâmetros recomendados;
    III - sistemas de detecção e combate a incêndio;
    IV - fontes de energia redundantes (nobreak, gerador);
    V - monitoramento ambiental contínuo (temperatura, umidade, água, fumaça).
guidance:
  prose: |
    O art. 44 especifica requisitos para data centers: acesso MFA fisico,
    climatizacao, incendio, energia redundante e monitoramento ambiental.

    **Requisitos de data center:**
    1. Acesso: MFA fisico (biometria + cracha + PIN)
    2. Climatizacao: 18-27C, 40-60% umidade (ASHRAE A1)
    3. Incendio: deteccao precoce + supressao (gas inerte)
    4. Energia: UPS + gerador com 72h de autonomia
    5. Monitoramento: sensores de temperatura, umidade, agua, fumaca

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.7.5 (Protecting against physical and environmental threats)
    - NIST 800-53 rev5: PE-13 (Fire Protection), PE-14 (Environmental Controls)
    - TIA-942 (Data Center Standards)
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de data center:**
      1. DCIM (Data Center Infrastructure Management) para monitoramento centralizado.
      2. Sensores IoT de temperatura, umidade, agua e fumaca com alertas.
      3. UPS N+1 com transferencia automatica para gerador.
      4. Sistema de supressao de incendio por gas inerte (FM-200, Novec 1230).
      5. Redundancia de climatizacao N+1.
    tools:
      - dcim
      - environmental-sensors
      - ups-monitoring
      - fire-suppression
  devsecops:
    prose: |
      **Infraestrutura como codigo para DC:**
      1. Monitoramento de infra de DC via Prometheus/Grafana.
      2. Alertas de temperatura/umidade integrados ao PagerDuty/OpsGenie.
      3. Runbooks automatizados para resposta a alarmes ambientais.
    tools:
      - dc-monitoring
      - environmental-alerting
      - automated-runbooks
  secops:
    prose: |
      **Operacao de data center:**
      1. Inspecao fisica mensal de data center (checklist).
      2. Teste semestral de gerador e UPS sob carga.
      3. Teste anual de sistema de supressao de incendio.
      4. Revisao anual de capacidade (energia, refrigeracao, espaco).
    tools:
      - dc-inspection-checklist
      - ups-generator-testing
      - fire-suppression-testing
      - capacity-planning
legal_references:
