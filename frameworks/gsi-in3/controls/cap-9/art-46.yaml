id: art-46
family: cap-9
title: "Protecao de Equipamentos e Cabeamento"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 46. Os órgãos e entidades devem proteger equipamentos de TI e
    cabeamento de rede, observando:

    I - proteção de cabeamento de rede contra interceptação e dano;
    II - proteção de equipamentos contra furto e vandalismo;
    III - manutenção preventiva e corretiva de equipamentos;
    IV - procedimentos para remoção de equipamentos das instalações;
    V - descarte seguro de equipamentos conforme art. 7.
guidance:
  prose: |
    O art. 46 trata da protecao fisica de equipamentos e cabeamento contra
    interceptacao, furto, vandalismo. Remete ao descarte seguro (art. 7).

    **Controles obrigatorios:**
    1. Cabeamento: dutos protegidos, fibra otica preferencial, sem acesso publico
    2. Equipamentos: racks trancados, ancoragem, patrimonio
    3. Manutencao: preventiva agendada, corretiva com SLA
    4. Remocao: autorizacao formal, registro de patrimonio
    5. Descarte: conforme art. 7 (sanitizacao + destruicao)

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.7.8 (Equipment siting and protection), A.7.12 (Cabling security)
    - NIST 800-53 rev5: PE-4 (Access Control for Transmission), PE-9 (Power Equipment)
implementation_guidance:
  platform_engineering:
    prose: |
      **Protecao de infra fisica:**
      1. Racks com fechadura eletronico com log de acesso.
      2. Cabeamento estruturado em dutos fechados (nao exposto).
      3. Fibra otica para enlaces criticos (resistente a interceptacao).
      4. Asset tracking com RFID/barcode para todos os equipamentos.
      5. Manutencao preventiva conforme calendario do fabricante.
    tools:
      - rack-access-control
      - structured-cabling
      - asset-tracking
      - maintenance-calendar
  devsecops:
    prose: |
      **Inventario de equipamentos:**
      1. CMDB com rastreamento de localizacao de equipamentos.
      2. Alerta para equipamento movido sem autorizacao (asset tracking).
      3. Pipeline de deprovisioning: sanitizar e registrar descarte.
    tools:
      - cmdb
      - asset-movement-alert
      - deprovisioning-pipeline
  secops:
    prose: |
      **Operacao de protecao fisica:**
      1. Inventario fisico semestral de equipamentos.
      2. Inspecao trimestral de cabeamento e racks.
      3. Procedimento formal para remocao de equipamentos (autorizacao + registro).
      4. Certificado de descarte para equipamentos sanitizados.
    tools:
      - physical-inventory
      - cabling-inspection
      - equipment-removal-form
      - disposal-certificate
legal_references:
