id: art-45
family: cap-9
title: "Monitoramento de Perimetro Fisico"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 45. Os órgãos e entidades devem implementar monitoramento de perímetro
    físico das instalações que abrigam ativos de informação críticos, incluindo:

    I - circuito fechado de televisão (CFTV) com cobertura de pontos de acesso;
    II - sistema de alarme contra intrusão;
    III - iluminação adequada de áreas críticas;
    IV - barreiras físicas (cercas, portões, catracas);
    V - procedimentos de resposta a alarmes de segurança física.
guidance:
  prose: |
    O art. 45 exige monitoramento de perimetro: CFTV, alarmes, iluminacao,
    barreiras e procedimentos de resposta.

    **Camadas de seguranca perimetral:**
    1. Externa: cercas, iluminacao, cameras perimetrais
    2. Intermediaria: catracas, portoes controlados
    3. Interna: portas com controle de acesso, cameras internas
    4. Critica: mantrap, biometria, cameras HD

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.7.1 (Physical security perimeters), A.7.4 (Physical security monitoring)
    - NIST 800-53 rev5: PE-6 (Monitoring Physical Access)
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de monitoramento perimetral:**
      1. CFTV IP com analytics (deteccao de movimento, facial recognition).
      2. Sistema de alarme integrado com PACS.
      3. Iluminacao automatica com sensor de presenca em areas criticas.
      4. Integracao CFTV + PACS + alarme em plataforma unica (PSIM).
    tools:
      - cctv-analytics
      - alarm-system
      - smart-lighting
      - psim
  devsecops:
    prose: |
      **Monitoramento como codigo:**
      1. Configuracao de cameras e alarmes versionada.
      2. Dashboard de status de seguranca fisica integrado ao NOC.
    tools:
      - security-config-versioning
      - noc-integration
  secops:
    prose: |
      **Operacao de seguranca perimetral:**
      1. Monitoramento 24/7 de cameras e alarmes (portaria ou SOC fisico).
      2. Procedimento de resposta a alarmes com escalacao definida.
      3. Teste mensal de alarmes e cameras.
      4. Retencao de gravacoes CFTV: minimo 90 dias.
    tools:
      - 24x7-monitoring
      - alarm-response-procedure
      - cctv-retention
legal_references:
