id: art-54
family: cap-11
title: "Conscientizacao sobre Redes Sociais"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 54. Os órgãos e entidades devem promover ações de conscientização sobre
    os riscos de segurança da informação associados ao uso de redes sociais,
    incluindo:

    I - riscos de engenharia social e phishing via redes sociais;
    II - importância de não divulgar informações sobre a infraestrutura de TI
    do órgão;
    III - cuidados com a exposição de informações pessoais que possam ser
    exploradas para ataques;
    IV - procedimentos para reportar incidentes relacionados a redes sociais.
guidance:
  prose: |
    O art. 54 exige conscientizacao sobre riscos de redes sociais: engenharia
    social, exposicao de infra, dados pessoais e reporte de incidentes.

    **Temas de conscientizacao:**
    1. Engenharia social: phishing via LinkedIn, WhatsApp, Instagram
    2. Informacoes de infra: nao publicar stack tecnologico, IPs, versoes
    3. Dados pessoais: OSINT pode explorar dados publicados
    4. Reporte: como e para quem reportar incidente de redes sociais

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.6.3 (Information security awareness)
    - NIST 800-53 rev5: AT-2 (Literacy Training and Awareness)
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de conscientizacao:**
      1. LMS (Learning Management System) com modulo sobre redes sociais.
      2. Simulacao de phishing via redes sociais (LinkedIn, WhatsApp).
      3. Quiz interativo sobre boas praticas de redes sociais.
      4. Portal de reporte de incidentes acessivel a todos os servidores.
    tools:
      - lms
      - phishing-simulation
      - awareness-quiz
      - incident-reporting-portal
  devsecops:
    prose: |
      **Conscientizacao para equipes tecnicas:**
      1. Treinamento especifico para devs sobre riscos de publicar codigo em redes.
      2. Alertas sobre OSINT: nao publicar screenshots de terminais, dashboards.
      3. Guidelines para participacao em comunidades tecnicas online.
    tools:
      - developer-security-training
      - osint-awareness
  secops:
    prose: |
      **Programa de conscientizacao:**
      1. Campanha trimestral de conscientizacao sobre redes sociais.
      2. Metricas: % de servidores treinados, taxa de clique em simulacoes.
      3. Material atualizado com exemplos reais de incidentes no governo.
      4. Reconhecimento de servidores que reportam incidentes corretamente.
    tools:
      - awareness-campaign
      - training-metrics
      - incident-reporting-metrics
legal_references:
  - framework_id: gsi-in1
    articles: ["art-12"]
