id: art-52
family: cap-11
title: "Gestao de Perfis Institucionais"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 52. A gestão de perfis institucionais em redes sociais deve observar:

    I - designação de responsáveis pela gestão de cada perfil;
    II - uso de autenticação multifator para acesso às contas institucionais;
    III - processo formal de criação, alteração e exclusão de perfis;
    IV - backup periódico de conteúdo publicado;
    V - procedimentos de resposta a incidentes envolvendo perfis institucionais
    (hackeamento, desinformação).
guidance:
  prose: |
    O art. 52 formaliza a gestao de perfis institucionais em redes sociais:
    responsaveis designados, MFA, processo formal e resposta a incidentes.

    **Processo de gestao:**
    1. Criacao: aprovada pela comunicacao social + gestor de SI
    2. Responsaveis: designados formalmente, com backup
    3. MFA: obrigatorio em todas as contas institucionais
    4. Backup: conteudo publicado salvo periodicamente
    5. Incidentes: plano para hackeamento, desinformacao

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.5.10 (Acceptable use), A.5.16 (Identity management)
    - NIST 800-53 rev5: AC-22 (Publicly Accessible Content)
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de gestao de perfis:**
      1. Ferramenta de gestao de redes sociais centralizada (Hootsuite, Sprout Social).
      2. MFA obrigatorio em todas as contas via plataforma de gestao.
      3. Password vault para credenciais de redes sociais (nao compartilhar senhas).
      4. Backup automatizado de conteudo publicado.
    tools:
      - social-media-management
      - mfa-enforcement
      - password-vault
      - content-backup
  devsecops:
    prose: |
      **Automacao de publicacao:**
      1. Pipeline de aprovacao para publicacoes institucionais.
      2. Versionamento de conteudo antes de publicacao.
      3. Validacao automatica de que publicacao nao contem dados classificados.
    tools:
      - publication-pipeline
      - content-versioning
      - classification-validator
  secops:
    prose: |
      **Seguranca de perfis:**
      1. Monitoramento de login em contas institucionais (alertas para acessos suspeitos).
      2. Procedimento de recuperacao de conta comprometida.
      3. Revisao trimestral de acessos a contas de redes sociais.
      4. Simulacao de incidente de hackeamento de perfil.
    tools:
      - login-monitoring
      - account-recovery-procedure
      - access-review
      - incident-simulation
legal_references:
