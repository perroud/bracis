id: art-51
family: cap-11
title: "Politica de Uso de Redes Sociais"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 51. Os órgãos e entidades devem estabelecer política de uso de redes
    sociais no âmbito institucional, contemplando:

    I - diretrizes para uso de redes sociais por servidores e colaboradores;
    II - separação entre uso pessoal e institucional de redes sociais;
    III - vedação de divulgação de informações classificadas ou sensíveis em
    redes sociais;
    IV - procedimentos para criação e gestão de perfis institucionais.
guidance:
  prose: |
    O art. 51 regula o uso de redes sociais: diretrizes para servidores,
    separacao pessoal/institucional, vedacao de dados classificados.

    **Diretrizes obrigatorias:**
    1. Uso pessoal: nao divulgar informacoes do orgao
    2. Uso institucional: apenas perfis autorizados
    3. Vedacao: dados classificados/sensiveis PROIBIDOS em redes sociais
    4. Gestao de perfis: criacao aprovada pela comunicacao social

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.5.10 (Acceptable use of information)
    - NIST 800-53 rev5: AC-22 (Publicly Accessible Content)
    - PL-4 (Rules of Behavior)
implementation_guidance:
  platform_engineering:
    prose: |
      **Controles tecnicos para redes sociais:**
      1. Web filtering: monitoramento de acesso a redes sociais em rede corporativa.
      2. DLP: deteccao de upload de dados classificados para redes sociais.
      3. CASB: monitoramento de uso de redes sociais via cloud.
      4. Autenticacao corporativa para perfis institucionais (MFA obrigatorio).
    tools:
      - web-filtering
      - dlp-social-media
      - casb
      - social-media-auth
  devsecops:
    prose: |
      **Protecao de informacoes tecnicas:**
      1. Politica de nao divulgar stack tecnologico em redes sociais.
      2. Proibicao de compartilhar snippets de codigo em redes sociais.
      3. Monitoramento de leaks de informacao tecnica do orgao.
    tools:
      - social-media-monitoring
      - leak-detection
  secops:
    prose: |
      **Gestao de redes sociais:**
      1. Inventario de todos os perfis institucionais em redes sociais.
      2. Monitoramento de contas fake usando nome/marca do orgao.
      3. Procedimento de takedown para perfis falsos.
      4. Treinamento de conscientizacao sobre riscos de redes sociais.
    tools:
      - social-media-inventory
      - fake-account-monitoring
      - takedown-procedure
      - awareness-training
legal_references:
