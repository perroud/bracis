id: art-18
family: cap-4
title: "Deteccao e Prevencao de Intrusoes"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 18. Os órgãos e entidades devem implementar sistemas de detecção e
    prevenção de intrusões (IDS/IPS), contemplando:

    I - monitoramento de tráfego de rede em pontos estratégicos;
    II - detecção de atividades maliciosas e anomalias de tráfego;
    III - atualização contínua de assinaturas de ameaças;
    IV - integração com o sistema de gestão de eventos de segurança (SIEM);
    V - procedimentos de resposta a alertas de intrusão.
guidance:
  prose: |
    O art. 18 exige IDS/IPS com monitoramento em pontos estrategicos,
    integracao com SIEM e procedimentos de resposta.

    **Posicionamento de sensores IDS/IPS:**
    1. Perimetro (borda da rede)
    2. Entre segmentos criticos
    3. Frente a servidores de aplicacao
    4. Em ambientes cloud (VPC Flow Logs + CloudTrail)

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.16 (Monitoring activities)
    - NIST 800-53 rev5: SI-4 (System Monitoring)
    - CIS Controls v8: 13.2 (IDS/IPS)
implementation_guidance:
  platform_engineering:
    prose: |
      **Stack IDS/IPS:**
      1. NIDS (Network IDS) em pontos estrategicos (Suricata, Snort, Zeek).
      2. HIDS (Host IDS) em servidores criticos (OSSEC, Wazuh).
      3. Cloud-native: AWS GuardDuty, Azure Defender, GCP Security Command Center.
      4. Integracao com SIEM para correlacao de eventos.
      5. Atualizacao automatica de assinaturas (threat intelligence feeds).
    tools:
      - nids
      - hids
      - cloud-threat-detection
      - siem-integration
      - threat-feeds
  devsecops:
    prose: |
      **IDS/IPS em infraestrutura como codigo:**
      1. Deploy de sensores IDS via Helm charts/Terraform.
      2. Regras customizadas versionadas em Git.
      3. Pipeline de teste de regras IDS (false positive testing).
      4. Monitoramento de pipeline runners para atividade suspeita.
    tools:
      - ids-deployment-iac
      - custom-rules-git
      - false-positive-testing
  secops:
    prose: |
      **Operacao de IDS/IPS:**
      1. SOC monitora alertas de IDS/IPS 24/7 (ou via MSSP).
      2. Triagem de alertas: classificacao por severidade e resposta.
      3. Tuning continuo de regras para reduzir falsos positivos.
      4. Relatorio mensal de tentativas de intrusao detectadas.
    tools:
      - soc
      - alert-triage
      - ids-tuning
      - intrusion-report
legal_references:
