id: art-15
family: cap-4
title: "Politica de Seguranca de Redes"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 15. Os órgãos e entidades devem estabelecer e manter política de segurança
    de redes de comunicação de dados, contemplando:

    I - topologia de rede documentada e atualizada;
    II - segmentação de redes conforme a criticidade dos ativos;
    III - controles de acesso entre segmentos de rede;
    IV - monitoramento de tráfego de rede;
    V - procedimentos de resposta a incidentes de rede.
guidance:
  prose: |
    O art. 15 exige politica formal de seguranca de redes com segmentacao baseada
    em criticidade e monitoramento continuo.

    **Requisitos-chave:**
    1. Documentacao de topologia (diagramas atualizados)
    2. Segmentacao: redes criticas isoladas (DMZ, PCI, SCADA)
    3. Controles entre segmentos: firewall, ACLs
    4. Monitoramento: flow analysis, NetFlow/sFlow
    5. Incidentes: procedimentos especificos de rede

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.20 (Network security)
    - NIST 800-53 rev5: SC-7 (Boundary Protection)
    - CIS Controls v8: 12.1 (Network Infrastructure Management)
implementation_guidance:
  platform_engineering:
    prose: |
      **Network architecture segura:**
      1. Segmentacao via VLANs, VPCs e security groups alinhada a classificacao dos ativos.
      2. Zero Trust Network: microsegmentacao com service mesh (Istio, Linkerd).
      3. Documentacao de topologia como codigo (diagrams-as-code, Netbox).
      4. Network policies em Kubernetes (Calico, Cilium) para isolamento de workloads.
      5. SD-WAN para conexoes entre sites com criptografia obrigatoria.
    tools:
      - vpc-segmentation
      - service-mesh
      - network-documentation
      - kubernetes-network-policies
  devsecops:
    prose: |
      **Seguranca de rede em pipelines:**
      1. Network policies versionadas em Git e aplicadas via GitOps.
      2. Validacao automatica de network policies em merge request.
      3. Testes de conectividade em pipeline (verificar que segmentacao funciona).
      4. IaC scanning para detectar security groups excessivamente permissivos.
    tools:
      - gitops-network-policies
      - network-policy-validation
      - iac-scanner
  secops:
    prose: |
      **Operacao de seguranca de redes:**
      1. Monitoramento continuo de trafego com NDR (Network Detection and Response).
      2. Alerta para comunicacao nao autorizada entre segmentos.
      3. Revisao trimestral de regras de firewall (remove regras orfas).
      4. Pen testing de rede semestral com foco em movimentacao lateral.
    tools:
      - ndr
      - firewall-review
      - network-pen-testing
legal_references:
