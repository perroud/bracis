id: art-20
family: cap-4
title: "Seguranca de Redes Sem Fio"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 20. Os órgãos e entidades que disponibilizem redes sem fio devem
    implementar:

    I - autenticação robusta com protocolo WPA3 ou, no mínimo, WPA2-Enterprise;
    II - segmentação da rede sem fio da rede corporativa cabeada;
    III - monitoramento de pontos de acesso não autorizados (rogue APs);
    IV - desativação de redes sem fio desnecessárias ou não utilizadas;
    V - registro de dispositivos autorizados a conectar-se à rede sem fio.
guidance:
  prose: |
    O art. 20 aborda seguranca wireless com WPA3/WPA2-Enterprise obrigatorio,
    isolamento da rede corporativa e deteccao de rogue APs.

    **Requisitos wireless:**
    1. WPA3 (preferencial) ou WPA2-Enterprise com 802.1X
    2. Rede wireless isolada da LAN corporativa
    3. WIDS/WIPS: deteccao de rogue APs
    4. Cleanup de SSIDs nao utilizados
    5. Inventario de dispositivos autorizados (MAC filtering complementar)

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.20 (Network security)
    - NIST 800-53 rev5: AC-18 (Wireless Access)
    - CIS Controls v8: 12.6 (Wireless Access Control)
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura wireless segura:**
      1. WPA3 ou WPA2-Enterprise com servidor RADIUS integrado ao IdP.
      2. VLAN dedicada para wireless isolada da LAN corporativa.
      3. NAC (Network Access Control) para validar dispositivos antes de conceder acesso.
      4. Guest network separada com captive portal e sem acesso a rede interna.
      5. Controladora wireless centralizada com gestao de politicas.
    tools:
      - radius-server
      - nac
      - wireless-controller
      - guest-network
  devsecops:
    prose: |
      **Wireless config como codigo:**
      1. Configuracao de APs e controladora versionada em Git.
      2. Deploy automatizado de configuracao wireless.
      3. Validacao de compliance wireless em pipeline (WPA3 enforced).
    tools:
      - wireless-config-iac
      - compliance-validation
  secops:
    prose: |
      **Operacao de seguranca wireless:**
      1. Scan periodico para deteccao de rogue APs (wardiving interno).
      2. Monitoramento de tentativas de conexao nao autorizadas.
      3. Revisao trimestral de dispositivos autorizados.
      4. Teste de pen testing wireless anual.
    tools:
      - wids-wips
      - rogue-ap-detection
      - wireless-pen-testing
legal_references:
