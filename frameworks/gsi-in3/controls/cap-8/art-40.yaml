id: art-40
family: cap-8
title: "Monitoramento Continuo de Seguranca"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 40. Os órgãos e entidades devem realizar monitoramento contínuo de
    segurança da informação, incluindo:

    I - monitoramento de indicadores de comprometimento (IOCs);
    II - detecção de comportamentos anômalos de usuários e entidades (UEBA);
    III - monitoramento de exfiltração de dados;
    IV - monitoramento de disponibilidade de serviços críticos;
    V - procedimentos de escalação e notificação para eventos de segurança.
guidance:
  prose: |
    O art. 40 exige monitoramento continuo abrangente: IOCs, UEBA, DLP,
    disponibilidade e escalacao.

    **Camadas de monitoramento:**
    1. IOCs: indicadores de comprometimento (IPs, hashes, dominios)
    2. UEBA: comportamento anomalo de usuarios (acesso incomum, exfiltracao)
    3. DLP: monitoramento de saida de dados
    4. Disponibilidade: uptime de servicos criticos
    5. Escalacao: quem notificar e quando

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.16 (Monitoring activities)
    - NIST 800-53 rev5: SI-4 (System Monitoring), CA-7 (Continuous Monitoring)
    - NIST SP 800-137 (ISCM)
implementation_guidance:
  platform_engineering:
    prose: |
      **Stack de monitoramento:**
      1. UEBA para deteccao de comportamento anomalo (Exabeam, Microsoft Sentinel).
      2. NDR para monitoramento de rede (Zeek, Darktrace).
      3. EDR em endpoints (CrowdStrike, SentinelOne, Wazuh).
      4. Uptime monitoring para servicos criticos (Prometheus, Grafana, PagerDuty).
      5. IOC matching automatico em todos os logs (MISP + SIEM).
    tools:
      - ueba
      - ndr
      - edr
      - uptime-monitoring
      - ioc-matching
  devsecops:
    prose: |
      **Monitoramento de aplicacoes:**
      1. APM (Application Performance Monitoring) com alertas de anomalia.
      2. Error tracking com correlacao de seguranca (Sentry + SIEM).
      3. Monitoramento de SLOs/SLIs de servicos criticos.
      4. Alerta para degradacao de performance (pode indicar ataque).
    tools:
      - apm
      - error-tracking
      - slo-monitoring
      - performance-anomaly
  secops:
    prose: |
      **Operacao de monitoramento:**
      1. Playbooks de resposta para cada tipo de alerta.
      2. Escalacao: L1 (15min) -> L2 (1h) -> L3/Gestor de SI (4h) -> CISC Gov.br.
      3. Relatorio semanal de eventos de seguranca para gestor de SI.
      4. Revisao mensal de efetividade do monitoramento (deteccao rate).
    tools:
      - incident-playbooks
      - escalation-matrix
      - security-reporting
      - detection-effectiveness
legal_references:
