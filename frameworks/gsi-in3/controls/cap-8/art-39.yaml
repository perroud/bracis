id: art-39
family: cap-8
title: "Correlacao de Eventos e SIEM"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 39. Os órgãos e entidades devem implementar solução de correlação de
    eventos de segurança (SIEM), contemplando:

    I - coleta centralizada de logs de múltiplas fontes (servidores, redes,
    aplicações, endpoints);
    II - correlação automatizada de eventos para detecção de ameaças;
    III - regras de detecção alinhadas ao cenário de ameaças do órgão;
    IV - integração com fontes de inteligência de ameaças (threat intelligence);
    V - dashboards de visibilidade de segurança em tempo real.
guidance:
  prose: |
    O art. 39 exige SIEM com correlacao de logs, deteccao de ameacas e
    integracao com threat intelligence.

    **Requisitos do SIEM:**
    1. Coleta: todas as fontes de log centralizadas
    2. Correlacao: regras para detectar ataques multi-estágio
    3. Deteccao: use cases alinhados ao cenario de ameacas
    4. Threat intel: feeds de IOCs (MISP, STIX/TAXII)
    5. Dashboards: visao em tempo real para SOC

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.16 (Monitoring activities)
    - NIST 800-53 rev5: SI-4 (System Monitoring), AU-6 (Audit Record Review)
    - MITRE ATT&CK (framework de deteccao)
implementation_guidance:
  platform_engineering:
    prose: |
      **Implementacao SIEM:**
      1. SIEM open source (Wazuh + ELK) ou comercial (Splunk, Microsoft Sentinel).
      2. Log sources: firewalls, IDS, endpoints, aplicacoes, cloud, IdP.
      3. SOAR para automacao de resposta (TheHive, Cortex, Phantom).
      4. Threat intelligence platform (MISP) com feeds STIX/TAXII.
      5. Deteccao baseada em MITRE ATT&CK tactics e techniques.
    tools:
      - siem
      - soar
      - threat-intel-platform
      - mitre-attack-mapping
  devsecops:
    prose: |
      **Deteccao em pipelines:**
      1. Logs de pipeline CI/CD enviados para SIEM.
      2. Deteccao de atividade anomala em pipelines (deploy nao autorizado).
      3. Alerta para mudancas em configuracoes de seguranca via pipeline.
      4. Correlacao de eventos de merge request com deploy.
    tools:
      - pipeline-log-siem
      - anomaly-detection
      - security-config-monitoring
  secops:
    prose: |
      **Operacao SIEM:**
      1. SOC com analistas L1/L2/L3 (ou MSSP).
      2. Tuning continuo de regras de deteccao (reduzir falsos positivos).
      3. Exercicio purple team semestral para validar deteccao.
      4. Revisao mensal de use cases e cobertura MITRE ATT&CK.
    tools:
      - soc-operations
      - detection-tuning
      - purple-team
      - attack-coverage-assessment
legal_references:
  - framework_id: gsi-in1
    articles: ["art-12"]
    relationship: implements
  - framework_id: iso-27001-2022
    articles: ["A.8.16"]
    relationship: mapped
  - framework_id: nist-800-53-rev5
    articles: ["SI-4", "AU-6"]
    relationship: mapped
