id: art-42
family: cap-8
title: "Auditoria de Registros de Seguranca"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 42. Os órgãos e entidades devem realizar auditoria periódica dos
    registros de segurança da informação, contemplando:

    I - revisão periódica de logs de acesso a sistemas críticos;
    II - análise de tentativas de acesso não autorizado;
    III - verificação de uso adequado de contas privilegiadas;
    IV - identificação de padrões suspeitos ou anômalos;
    V - documentação dos resultados da auditoria e ações corretivas.
guidance:
  prose: |
    O art. 42 exige auditoria periodica de logs: revisao de acessos, analise
    de anomalias, verificacao de contas privilegiadas e documentacao.

    **Escopo da auditoria:**
    1. Acesso a sistemas criticos: quem acessou, quando, o que fez
    2. Tentativas de acesso nao autorizado: brute force, bypass
    3. Contas privilegiadas: uso adequado, sessoes gravadas
    4. Padroes suspeitos: horarios incomuns, volumes anomalos
    5. Documentacao: resultados e acoes corretivas

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.15 (Logging - review)
    - NIST 800-53 rev5: AU-6 (Audit Record Review), AU-7 (Audit Record Reduction)
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao de auditoria:**
      1. Queries pre-definidas no SIEM para auditorias recorrentes.
      2. Relatorios automaticos semanais de acesso a sistemas criticos.
      3. Deteccao automatica de padroes anomalos (ML-based anomaly detection).
      4. Dashboards de auditoria para gestor de SI e auditoria interna.
    tools:
      - siem-queries
      - automated-reports
      - anomaly-detection-ml
      - audit-dashboards
  devsecops:
    prose: |
      **Auditoria de pipeline:**
      1. Audit trail de todas as mudancas em configuracao de pipeline.
      2. Revisao de quem fez deploy, quando e o que mudou.
      3. Alerta para bypass de controles de pipeline (forced merge, skip CI).
      4. Relatorio de compliance de pipeline (% de builds com seguranca).
    tools:
      - pipeline-audit-trail
      - deploy-audit
      - pipeline-bypass-detection
  secops:
    prose: |
      **Processo de auditoria:**
      1. Auditoria semanal de logs de acesso a sistemas criticos pelo SOC.
      2. Auditoria mensal de uso de contas privilegiadas pelo gestor de SI.
      3. Auditoria trimestral abrangente pela auditoria interna.
      4. Relatorio de auditoria com findings e plano de acao corretiva.
    tools:
      - weekly-audit
      - privileged-access-audit
      - quarterly-audit
      - corrective-action-plan
