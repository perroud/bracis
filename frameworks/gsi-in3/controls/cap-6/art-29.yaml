id: art-29
family: cap-6
title: "Testes de Seguranca de Aplicacoes"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 29. Os órgãos e entidades devem realizar testes de segurança em
    aplicações, incluindo:

    I - testes dinâmicos de segurança (DAST) em ambientes de homologação;
    II - testes de invasão (penetration testing) antes da implantação em produção
    de sistemas críticos;
    III - testes de segurança de APIs;
    IV - correção de vulnerabilidades identificadas antes da implantação em
    produção.
guidance:
  prose: |
    O art. 29 exige DAST, pen testing e testes de API antes de deploy em
    producao. Complementa o SAST (art. 28) com testes em tempo de execucao.

    **Tipos de teste obrigatorios:**
    1. DAST: varredura em aplicacao em execucao (homologacao)
    2. Pen testing: teste manual ofensivo para sistemas criticos
    3. API testing: OWASP API Security Top 10
    4. Fix before prod: todas as vulnerabilidades corrigidas antes de producao

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.29 (Security testing in development and acceptance)
    - NIST 800-53 rev5: SA-11(5) (Penetration Testing)
    - OWASP Testing Guide
implementation_guidance:
  platform_engineering:
    prose: |
      **Stack de testes de seguranca:**
      1. DAST automatizado em staging (OWASP ZAP, Nuclei, GitLab DAST).
      2. API fuzzing para testes de robustez (RESTler, Schemathesis).
      3. Ambiente de staging identico a producao para testes realistas.
      4. Pen testing anual por firma especializada para sistemas criticos.
    tools:
      - dast-scanner
      - api-fuzzer
      - staging-environment
      - pen-testing-firm
  devsecops:
    prose: |
      **Testes de seguranca no pipeline:**
      1. DAST automatizado em review app para cada merge request.
      2. API security testing como stage obrigatoria do pipeline.
      3. Coverage-guided fuzzing para funcoes criticas (criptografia, parsing).
      4. Security regression tests: testes que validam que vulnerabilidades
         corrigidas nao voltam.
    tools:
      - gitlab-dast
      - api-security-testing
      - coverage-fuzzing
      - security-regression
  secops:
    prose: |
      **Gestao de testes:**
      1. Calendario de pen testing: anual para sistemas criticos, bienal para demais.
      2. Tracking de remediacao: todas as vulnerabilidades de pen testing rastreadas.
      3. Retest apos correcao para confirmar efetividade.
      4. Relatorio executivo de resultados de pen testing para gestor de SI.
    tools:
      - pen-test-calendar
      - remediation-tracking
      - retest-management
