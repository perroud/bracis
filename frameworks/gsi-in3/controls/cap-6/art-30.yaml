id: art-30
family: cap-6
title: "Gestao de Dependencias e Componentes de Terceiros"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 30. Os órgãos e entidades devem gerenciar os riscos associados ao uso
    de componentes de software de terceiros, incluindo:

    I - inventário de componentes e bibliotecas de terceiros utilizados;
    II - verificação de vulnerabilidades conhecidas em componentes utilizados;
    III - atualização tempestiva de componentes com vulnerabilidades conhecidas;
    IV - avaliação de licenças de software de código aberto.
guidance:
  prose: |
    O art. 30 trata do supply chain de software: inventario de dependencias,
    scan de vulnerabilidades e gestao de licencas.

    **Riscos de supply chain:**
    1. Dependencias com vulnerabilidades conhecidas (CVE)
    2. Typosquatting e dependency confusion
    3. Licencas incompativeis com uso governamental
    4. Abandono de manutencao (unmaintained libraries)

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.28 (Secure coding - third party)
    - NIST 800-53 rev5: SA-12 (Supply Chain Protection)
    - NIST SSDF (Secure Software Development Framework)
implementation_guidance:
  platform_engineering:
    prose: |
      **Supply chain security:**
      1. SBOM gerado automaticamente em cada build (Syft, Trivy).
      2. Dependency proxy/registry cache para controle de supply chain.
      3. Allowlist de dependencias aprovadas para projetos criticos.
      4. Monitoramento continuo de CVEs em dependencias (Dependabot, Renovate).
    tools:
      - sbom-generator
      - dependency-proxy
      - allowlist-registry
      - cve-monitoring
  devsecops:
    prose: |
      **Seguranca de dependencias no pipeline:**
      1. Dependency scanning em todo pipeline (GitLab Dependency Scanning, Snyk).
      2. License scanning para conformidade (GitLab License Compliance).
      3. Lockfile obrigatorio (package-lock.json, go.sum, Cargo.lock).
      4. Renovate/Dependabot para atualizacao automatica de dependencias.
      5. Bloqueio de merge se dependencia critica vulneravel.
    tools:
      - dependency-scanning
      - license-scanning
      - lockfile-enforcement
      - auto-update
  secops:
    prose: |
      **Governanca de terceiros:**
      1. Inventario de todas as bibliotecas de terceiros por sistema.
      2. Alerta para novas CVEs em dependencias utilizadas.
      3. Processo de avaliacao de risco para novas dependencias.
      4. Metricas: tempo medio de atualizacao apos CVE publicada.
    tools:
      - dependency-inventory
      - cve-alerting
      - risk-assessment
      - patch-metrics
legal_references:
