id: art-27
family: cap-6
title: "Politica de Desenvolvimento Seguro"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 27. Os órgãos e entidades devem estabelecer política de desenvolvimento
    seguro de sistemas, contemplando:

    I - adoção de ciclo de desenvolvimento seguro (SDLC) em todos os projetos
    de software;
    II - requisitos de segurança definidos na fase de levantamento de requisitos;
    III - análise de riscos de segurança em cada fase do desenvolvimento;
    IV - treinamento em desenvolvimento seguro para equipes de desenvolvimento;
    V - uso de frameworks e bibliotecas seguras e atualizadas.
guidance:
  prose: |
    O art. 27 exige SDLC seguro em todos os projetos de software da APF.
    Seguranca deve ser incorporada desde o levantamento de requisitos.

    **Fases do SDLC seguro:**
    1. Requisitos: threat modeling, security requirements
    2. Design: security architecture review
    3. Implementacao: secure coding, code review
    4. Teste: SAST, DAST, pen testing
    5. Deploy: hardening, security config
    6. Operacao: monitoramento, patching

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.25 (Secure development lifecycle)
    - NIST 800-53 rev5: SA-3 (System Development Life Cycle)
    - OWASP SAMM (Software Assurance Maturity Model)
implementation_guidance:
  platform_engineering:
    prose: |
      **Fundacao de SDLC seguro:**
      1. Template de projeto com pipeline de seguranca pre-configurado.
      2. Security champions em cada equipe de desenvolvimento.
      3. Threat modeling obrigatorio para projetos criticos (STRIDE, PASTA).
      4. Security architecture review para mudancas significativas.
      5. Library de componentes seguros aprovados (lista branca de dependencias).
    tools:
      - project-template
      - threat-modeling
      - security-architecture-review
      - approved-libraries
  devsecops:
    prose: |
      **Security no pipeline:**
      1. SAST em todo merge request (Semgrep, SonarQube, GitLab SAST).
      2. Dependency scanning para vulnerabilidades em bibliotecas.
      3. License scanning para conformidade de licencas.
      4. Merge request template com checklist de seguranca.
      5. Security gate: bloquear merge se vulnerabilidades criticas detectadas.
    tools:
      - sast
      - dependency-scanning
      - license-scanning
      - security-checklist
      - security-gate
  secops:
    prose: |
      **Governanca de desenvolvimento seguro:**
      1. Treinamento anual em OWASP Top 10 para todos os desenvolvedores.
      2. Metricas de seguranca por projeto (vulnerabilidades/sprint, MTTR).
      3. Revisao de arquitetura de seguranca para projetos novos.
      4. Catalogo de padroes de desenvolvimento seguro (cheat sheets).
    tools:
      - security-training
      - security-metrics
      - architecture-review
      - secure-coding-standards
legal_references:
