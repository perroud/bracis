id: art-32
family: cap-6
title: "Gestao de Mudancas em Sistemas"
class: GSI-IN3
baselines: [apf-federal]
statement:
  prose: |
    Art. 32. As mudanças em sistemas de informação devem ser controladas
    formalmente, incluindo:

    I - processo formal de solicitação, avaliação e aprovação de mudanças;
    II - avaliação de impacto da mudança na segurança da informação;
    III - testes em ambiente de homologação antes da implantação em produção;
    IV - procedimentos de rollback em caso de falha;
    V - registro de todas as mudanças realizadas.
guidance:
  prose: |
    O art. 32 formaliza change management com avaliacao de impacto de SI,
    testes em hml e rollback. Alinhado ao ITIL Change Management.

    **Processo de mudanca:**
    1. Solicitacao (RFC): descricao, justificativa, impacto
    2. Avaliacao: impacto em SI, riscos, dependencias
    3. Aprovacao: CAB (Change Advisory Board) ou equivalente
    4. Implementacao: em hml primeiro, depois prod
    5. Rollback: plano de reversao obrigatorio
    6. Registro: audit trail completo

    **Equivalencias internacionais:**
    - ISO 27001:2022 A.8.32 (Change management)
    - NIST 800-53 rev5: CM-3 (Configuration Change Control)
    - ITIL Change Management
implementation_guidance:
  platform_engineering:
    prose: |
      **Change management automatizado:**
      1. GitOps como change management: toda mudanca via merge request.
      2. Pipeline como gate de qualidade: SAST, DAST, testes, aprovacao.
      3. Canary deployments e blue/green para rollback rapido.
      4. Feature flags para ativacao gradual de mudancas.
      5. Audit trail automatico via Git history + pipeline logs.
    tools:
      - gitops
      - canary-deployment
      - feature-flags
      - audit-trail
  devsecops:
    prose: |
      **Change control no pipeline:**
      1. Merge request como RFC: descricao, checklist, impacto.
      2. Pipeline automatizado como gate de qualidade.
      3. Deploy approval para producao (segregacao de funcoes).
      4. Rollback automatizado: revert do merge request em caso de falha.
    tools:
      - merge-request-template
      - pipeline-gate
      - deployment-approval
      - automated-rollback
  secops:
    prose: |
      **Governanca de mudancas:**
      1. Reuniao semanal de CAB para mudancas de alto impacto.
      2. Avaliacao de impacto em SI para toda mudanca em sistema critico.
      3. Pos-mortem obrigatorio para mudancas que causam incidentes.
      4. Metricas: taxa de sucesso de mudancas, tempo de rollback.
    tools:
      - cab-process
      - impact-assessment
      - post-mortem
      - change-metrics
