url: "https://www.gov.br/gsi/pt-br/seguranca-da-informacao-e-cibernetica/legislacao/copy_of_IN03_consolidada.pdf"
control_families:
  - id: cap-1
    title: "Disposicoes Gerais"
    description: "Objeto, escopo de aplicacao e definicoes dos processos operacionais de gestao de seguranca da informacao na APF"
    articles: "art. 1 ao art. 3"
    control_count: 3
  - id: cap-2
    title: "Gestao de Ativos de Informacao"
    description: "Inventario, classificacao, rotulagem e descarte seguro de ativos de informacao nos orgaos e entidades da APF"
    articles: "art. 4 ao art. 7"
    control_count: 4
  - id: cap-3
    title: "Gestao de Identidade e Controle de Acesso"
    description: "Autenticacao, autorizacao, contas privilegiadas, segregacao de funcoes e revisao periodica de acessos"
    articles: "art. 8 ao art. 14"
    control_count: 7
  - id: cap-4
    title: "Seguranca em Redes"
    description: "Segmentacao de rede, firewall, IDS/IPS, protecao DNS, seguranca wireless e monitoramento de trafego"
    articles: "art. 15 ao art. 20"
    control_count: 6
  - id: cap-5
    title: "Seguranca de Dados"
    description: "Criptografia, classificacao de dados, prevencao contra vazamento (DLP), backup e recuperacao"
    articles: "art. 21 ao art. 26"
    control_count: 6
  - id: cap-6
    title: "Seguranca em Desenvolvimento"
    description: "Ciclo de desenvolvimento seguro (SDLC), revisao de codigo, testes de seguranca e gestao de dependencias"
    articles: "art. 27 ao art. 32"
    control_count: 6
  - id: cap-7
    title: "Gestao de Vulnerabilidades"
    description: "Varredura de vulnerabilidades, aplicacao de patches, hardening de sistemas e gestao de configuracao segura"
    articles: "art. 33 ao art. 37"
    control_count: 5
  - id: cap-8
    title: "Gestao de Logs e Monitoramento"
    description: "Registro de eventos, correlacao de logs, SIEM, retencao e monitoramento continuo de seguranca"
    articles: "art. 38 ao art. 42"
    control_count: 5
  - id: cap-9
    title: "Seguranca Fisica e Ambiental"
    description: "Controle de acesso fisico, protecao de data centers, monitoramento de perimetro e controles ambientais"
    articles: "art. 43 ao art. 46"
    control_count: 4
  - id: cap-10
    title: "Seguranca em Computacao Movel"
    description: "Politica BYOD, gestao de dispositivos moveis (MDM), seguranca de aplicativos moveis e acesso remoto"
    articles: "art. 47 ao art. 50"
    control_count: 4
  - id: cap-11
    title: "Seguranca em Redes Sociais"
    description: "Uso institucional de redes sociais, monitoramento, gestao de contas oficiais e conscientizacao"
    articles: "art. 51 ao art. 54"
    control_count: 4
  - id: cap-12
    title: "Seguranca em Computacao em Nuvem"
    description: "Requisitos de seguranca para contratacao e uso de servicos em nuvem, em referencia a IN GSI/PR n. 5"
    articles: "art. 55 ao art. 60"
    control_count: 6
related_frameworks:
  - framework_id: gsi-in1
    relationship: implements
    description: "A IN GSI/PR 3 implementa os requisitos de governanca da IN GSI/PR 1, detalhando os processos operacionais de gestao de seguranca da informacao que os orgaos da APF devem adotar."
  - framework_id: iso-27001-2022
    relationship: mapped
    description: >-
      Os controles da IN GSI/PR 3 mapeiam diretamente para os controles do
      Anexo A da ISO 27001:2022, cobrindo gestao de ativos, controle de acesso,
      criptografia, seguranca fisica, operacoes e desenvolvimento seguro.
  - framework_id: nist-800-53-rev5
    relationship: mapped
    description: "Os processos operacionais da IN GSI/PR 3 possuem correspondencia direta com as familias de controles do NIST 800-53 rev5: AC, AU, CM, CP, IA, MP, PE, PL, RA, SA, SC, SI."
  - framework_id: gsi-in5
    relationship: complements
    description: "A IN GSI/PR 5 complementa a IN GSI/PR 3 ao detalhar requisitos especificos de seguranca para uso de servicos de computacao em nuvem pelos orgaos da APF."
  - framework_id: lgpd
    relationship: complements
    description: "A LGPD complementa a IN GSI/PR 3 ao disciplinar o tratamento de dados pessoais, impondo requisitos adicionais de seguranca, privacidade e notificacao de incidentes."
