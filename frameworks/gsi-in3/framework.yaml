id: gsi-in3
title: "Instrucao Normativa GSI/PR n. 3/2021 -- Processos de Gestao de Seguranca da Informacao nos Orgaos e Entidades da APF"
short_title: "IN GSI/PR 3"
version: "3/2021 (consolidada)"
publication_date: "2021-03-28"
last_updated: "2023-07-03"
effective_date: "2021-03-28"
authority:
  name: "Gabinete de Seguranca Institucional da Presidencia da Republica"
  acronym: "GSI/PR"
  country: "BR"
  url: "https://www.gov.br/gsi"
type: normative-instruction
scope: information-security-operational-processes
mandatory: true
original_language: pt-br
available_languages: [pt-br]
industries:
