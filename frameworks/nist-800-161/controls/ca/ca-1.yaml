id: ca-1
family: ca
title: "Supply Chain Security Assessment"
class: NIST800161
baselines: [level-2, level-3]
statement:
  prose: >-
    Assess supply chain security controls at an organization-defined frequency to
    determine the extent to which the controls are implemented correctly, operating
    as intended, and producing the desired outcome with respect to meeting C-SCRM
    requirements. Include supply chain-specific test scenarios in security assessments
    and evaluate the effectiveness of controls across supply chain relationships.
  parts:
    - id: ca-1_smt.a
      label: "a."
      prose: >-
        Develop and execute supply chain security assessment plans that evaluate
        the effectiveness of C-SCRM controls across the organization and its
        supply chain partners.
    - id: ca-1_smt.b
      label: "b."
      prose: >-
        Assess supplier compliance with C-SCRM requirements through audits,
        testing, and evidence review at organization-defined intervals.
    - id: ca-1_smt.c
      label: "c."
      prose: >-
        Document assessment findings and develop plans of action and milestones
        to address identified weaknesses in supply chain security controls.
guidance:
  prose: >-
    Supply chain security assessments provide assurance that C-SCRM controls are
    effective across the organization and its supply chain partners. Assessments
    should evaluate both organizational controls (policies, procedures, governance)
    and technical controls (scanning, signing, provenance verification). Assessment
    methods include document review, interviews, testing, and automated compliance
    verification. Organizations should assess their own C-SCRM program effectiveness
    and also verify that suppliers are meeting their contractual security obligations.
    Findings from assessments should drive continuous improvement of the C-SCRM
    program. Automated compliance checking through CI/CD pipelines and policy-as-code
    can provide continuous assessment capabilities.
references:
  - citation: "NIST SP 800-161 Rev 1, Section 3.7"
    url: "https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"
  - citation: "NIST SP 800-53 Rev 5, CA-2"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated C-SCRM compliance checks in the platform that
      continuously assess supply chain control effectiveness. Deploy policy-as-code
      that validates C-SCRM requirements across all platform services. Generate
      automated compliance reports that map control implementation to C-SCRM
      requirements. Implement compliance dashboards that provide real-time
      visibility into supply chain control status. Automate supplier compliance
      evidence collection and validation.
    tools:
      - "OPA / Kyverno (automated compliance checks)"
      - "Grafana (compliance dashboards)"
      - "Backstage (compliance reporting)"
      - "Conftest"
      - "Custom compliance automation"
  devsecops:
    prose: >-
      Implement CI/CD pipeline compliance checks that assess supply chain
      security controls at build and deployment time. Generate compliance
      reports as pipeline artifacts that document which C-SCRM controls
      are met. Implement automated testing of supply chain security controls
      including signature verification, SBOM validation, and dependency
      policy compliance. Use pipeline metrics to track C-SCRM compliance
      trends across projects.
    tools:
      - "GitLab Compliance Pipelines"
      - "Conftest / Checkov"
      - "Pipeline compliance reporting"
      - "Custom assessment scripts"
  secops:
    prose: >-
      Conduct periodic formal C-SCRM assessments aligned with the
      organizational assessment schedule. Manage the plan of action and
      milestones (POA&M) for supply chain security findings. Coordinate
      supplier security audits and track remediation of identified issues.
      Generate C-SCRM compliance reports for leadership and regulatory
      bodies. Maintain assessment evidence and findings in the GRC platform.
    tools:
      - "GRC Platforms (assessment management)"
      - "Audit Management Tools"
      - "POA&M tracking"
      - "Vendor Assessment Platforms"
      - "Compliance reporting tools"
