id: ca-2
family: ca
title: "Supply Chain Authorization and Acceptance"
class: NIST800161
baselines: [level-2, level-3]
statement:
  prose: >-
    Authorize the use of systems, system components, and services acquired through
    the supply chain based on the results of supply chain risk assessments and
    security evaluations. Establish acceptance criteria for supply chain deliverables
    that include security requirements and verify compliance before operational use.
    Maintain an ongoing authorization process that accounts for changes in supply
    chain risk posture.
  parts:
    - id: ca-2_smt.a
      label: "a."
      prose: >-
        Establish acceptance criteria for supply chain deliverables that include
        security requirements, integrity verification, and provenance documentation.
    - id: ca-2_smt.b
      label: "b."
      prose: >-
        Authorize the use of supply chain components based on risk assessment
        results and verification that acceptance criteria are met.
    - id: ca-2_smt.c
      label: "c."
      prose: >-
        Implement ongoing authorization that reassesses supply chain components
        when risk conditions change or new vulnerabilities are discovered.
guidance:
  prose: >-
    Supply chain authorization ensures that components are not deployed into
    operational environments without appropriate security evaluation and risk
    acceptance. Acceptance criteria should include successful integrity verification,
    SBOM completeness, vulnerability assessment results within acceptable thresholds,
    license compliance, and provenance verification. The authorization process should
    be risk-based, with critical components requiring more rigorous evaluation than
    lower-risk components. Ongoing authorization recognizes that supply chain risk
    is dynamic; a component that was acceptable at acquisition may become unacceptable
    due to newly discovered vulnerabilities, supplier compromise, or changes in the
    threat landscape. Automated policy enforcement in CI/CD pipelines can provide
    continuous authorization capabilities.
references:
  - citation: "NIST SP 800-161 Rev 1, Section 3.7"
    url: "https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"
  - citation: "NIST SP 800-53 Rev 5, CA-6"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated acceptance gates in the platform that enforce supply
      chain authorization criteria. Deploy admission controllers that verify
      components meet all acceptance criteria before deployment. Maintain approved
      component catalogs that represent pre-authorized components. Implement
      automated revocation capabilities that remove authorization for components
      when risk conditions change. Provide continuous authorization through
      automated policy evaluation against current vulnerability and threat data.
    tools:
      - "Kyverno / OPA (admission policies)"
      - "Kubernetes admission controllers"
      - "Harbor (approved image catalog)"
      - "Dependency-Track (continuous authorization)"
      - "Policy-as-code frameworks"
  devsecops:
    prose: >-
      Implement CI/CD pipeline gates that enforce acceptance criteria for all
      supply chain components. Block deployment of components that fail security
      requirements including vulnerability thresholds, license restrictions, and
      provenance verification. Automate acceptance testing for supply chain
      deliverables. Implement automated re-evaluation of previously accepted
      components when new vulnerability data is available. Maintain audit
      trails of all authorization decisions.
    tools:
      - "GitLab Security Gates"
      - "Pipeline acceptance testing"
      - "Conftest / Checkov"
      - "Dependency scanning (threshold policies)"
      - "Sigstore (provenance gates)"
  secops:
    prose: >-
      Manage the supply chain authorization process through the GRC platform.
      Maintain a registry of authorized supply chain components and their
      authorization status. Implement triggers that initiate re-authorization
      when risk conditions change. Track authorization decisions and their
      rationale for audit purposes. Generate reports on authorization status
      across the supply chain portfolio.
    tools:
      - "GRC Platforms (authorization management)"
      - "Risk Management Dashboards"
      - "CMDB (authorization status tracking)"
      - "Vulnerability Management (re-authorization triggers)"
