id: ps-2
family: ps
title: "Supply Chain Security Awareness and Training"
class: NIST800161
baselines: [level-1, level-2, level-3]
statement:
  prose: >-
    Provide supply chain security awareness and training to organizational personnel
    who have supply chain risk management responsibilities. Ensure that personnel
    involved in acquisition, development, integration, and maintenance activities
    understand supply chain risks and their roles in mitigating those risks.
    Update training content to reflect changes in the supply chain threat landscape.
  parts:
    - id: ps-2_smt.a
      label: "a."
      prose: >-
        Develop and deliver supply chain security awareness training to all personnel
        involved in acquisition, development, and maintenance of systems and services.
    - id: ps-2_smt.b
      label: "b."
      prose: >-
        Provide role-specific C-SCRM training for personnel with supply chain risk
        management responsibilities at the enterprise, mission/business process,
        and operational levels.
    - id: ps-2_smt.c
      label: "c."
      prose: >-
        Update supply chain security training content at an organization-defined
        frequency and in response to significant supply chain security events.
guidance:
  prose: >-
    Supply chain security training ensures that personnel understand the risks
    associated with supply chain activities and know how to apply C-SCRM controls
    in their roles. General awareness training should cover common supply chain
    threats (dependency confusion, typosquatting, compromised packages), secure
    development practices, and organizational C-SCRM policies. Role-specific training
    should address the particular supply chain responsibilities of each role:
    acquisition personnel need training on security requirements in contracts,
    developers need training on secure dependency management, and security personnel
    need training on supply chain threat analysis and incident response. Training
    should include practical exercises based on real supply chain incidents.
references:
  - citation: "NIST SP 800-161 Rev 1, Section 2.5"
    url: "https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"
  - citation: "NIST SP 800-53 Rev 5, AT-2"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
implementation_guidance:
  platform_engineering:
    prose: >-
      Provide developer documentation and training on supply chain security
      features built into the platform. Create interactive tutorials on secure
      dependency management, SBOM usage, and artifact verification. Embed
      supply chain security guidance into the developer portal and golden path
      documentation. Implement platform features that provide just-in-time
      training when developers encounter supply chain security gates.
    tools:
      - "Backstage (developer documentation)"
      - "Learning Management Systems"
      - "Developer portal training modules"
      - "Interactive tutorials"
  devsecops:
    prose: >-
      Provide hands-on training for development teams on secure CI/CD practices
      related to supply chain security. Create training exercises that simulate
      supply chain attacks such as dependency confusion and malicious package
      injection. Develop training on interpreting and acting on dependency scanning
      results, SBOM analysis, and provenance verification. Include supply chain
      security in security champions programs.
    tools:
      - "Security Champions Programs"
      - "Capture the Flag (CTF) exercises"
      - "GitLab Security Training"
      - "OWASP training materials"
  secops:
    prose: >-
      Develop and deliver C-SCRM training programs for security operations
      personnel. Conduct tabletop exercises simulating supply chain compromise
      scenarios. Provide training on supply chain threat intelligence analysis
      and incident response procedures. Track training completion and
      effectiveness through the learning management system. Update training
      content based on lessons learned from supply chain incidents and
      exercises.
    tools:
      - "Learning Management Systems"
      - "Tabletop Exercise Frameworks"
      - "Security Awareness Platforms"
      - "GRC Platforms (training tracking)"
