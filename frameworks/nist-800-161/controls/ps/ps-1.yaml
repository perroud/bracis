id: ps-1
family: ps
title: "Supply Chain Personnel Security"
class: NIST800161
baselines: [level-2, level-3]
statement:
  prose: >-
    Implement personnel security controls for individuals who have access to supply
    chain management systems, critical supply chain processes, or sensitive supply
    chain information. Require that supply chain partners implement comparable
    personnel security controls for their employees who have access to organizational
    systems, data, or supply chain processes.
  parts:
    - id: ps-1_smt.a
      label: "a."
      prose: >-
        Establish personnel security requirements for individuals with access to
        supply chain management systems and processes, including background screening,
        access controls, and separation of duties.
    - id: ps-1_smt.b
      label: "b."
      prose: >-
        Include personnel security requirements in contracts and agreements with
        supply chain partners for their employees who access organizational systems
        or data.
    - id: ps-1_smt.c
      label: "c."
      prose: >-
        Monitor and enforce personnel security controls throughout the supply chain
        relationship lifecycle, including onboarding, role changes, and termination.
guidance:
  prose: >-
    Personnel security in the supply chain context addresses the insider threat
    risk from individuals within supply chain entities who may have access to
    organizational systems, data, or processes. Supply chain personnel include
    employees of suppliers, contractors, service providers, and partners who
    develop, maintain, or operate systems on behalf of the organization.
    Personnel security controls should be commensurate with the level of access
    and the criticality of the systems or data involved. Key controls include
    background investigations, least-privilege access, separation of duties,
    and prompt access revocation upon role change or termination. Organizations
    should verify that supply chain partners implement adequate personnel
    security and should include personnel security requirements in contracts.
references:
  - citation: "NIST SP 800-161 Rev 1, Section 3.4"
    url: "https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"
  - citation: "NIST SP 800-53 Rev 5, PS-6"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement identity and access management controls for all supply chain
      personnel who access the platform. Enforce multi-factor authentication
      and least-privilege access for supplier accounts. Implement just-in-time
      access provisioning for supply chain personnel with automated expiration.
      Deploy audit logging for all supplier access to platform systems. Implement
      automated access revocation triggered by contract termination or role
      changes in the identity provider.
    tools:
      - "Identity Providers (Okta, Azure AD, Keycloak)"
      - "Privileged Access Management (PAM)"
      - "Just-In-Time Access (Teleport, Boundary)"
      - "SCIM (automated provisioning)"
      - "Audit logging systems"
  devsecops:
    prose: >-
      Enforce code review requirements for all contributions from supply chain
      personnel. Implement CODEOWNERS files that require internal approval for
      changes to critical components. Use signed commits to ensure attribution
      of all code changes. Implement branch protection rules that restrict
      direct push access for external contributors. Monitor CI/CD pipeline
      access and secrets exposure for supply chain personnel accounts.
    tools:
      - "GitLab Merge Request Approvals"
      - "CODEOWNERS"
      - "Signed commits (GPG/SSH)"
      - "Branch protection rules"
      - "CI/CD access controls"
  secops:
    prose: >-
      Conduct background screening for supply chain personnel with elevated
      access. Monitor supply chain personnel access patterns for anomalies.
      Implement and track personnel security requirements in contracts and
      SLAs. Manage the supply chain personnel lifecycle including onboarding,
      access reviews, and termination. Audit supplier compliance with
      personnel security requirements periodically.
    tools:
      - "IAM Governance (SailPoint, Saviynt)"
      - "Background Screening Services"
      - "SIEM (user behavior analytics)"
      - "GRC Platforms (personnel compliance)"
      - "Access Review Tools"
