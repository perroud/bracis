id: ra-1
family: ra
title: "Supply Chain Threat Analysis"
class: NIST800161
baselines: [level-1, level-2, level-3]
statement:
  prose: >-
    Conduct and maintain an analysis of threats to the supply chain for systems, system
    components, and system services. Identify and document supply chain threat sources,
    threat events, and vulnerabilities that could affect the confidentiality, integrity,
    and availability of systems and services acquired through the supply chain. Incorporate
    supply chain threat information into the organizational risk assessment process.
  parts:
    - id: ra-1_smt.a
      label: "a."
      prose: >-
        Identify and document supply chain threat sources, including nation-state actors,
        criminal organizations, insider threats, and unintentional threats from supply chain
        partners.
    - id: ra-1_smt.b
      label: "b."
      prose: >-
        Analyze supply chain threat events including counterfeit components, malicious code
        insertion, unauthorized modifications, and disruption of supply.
    - id: ra-1_smt.c
      label: "c."
      prose: >-
        Incorporate supply chain threat analysis results into organizational risk assessments
        and C-SCRM decision-making.
guidance:
  prose: >-
    Supply chain threat analysis focuses on threats that are unique to or amplified by the
    supply chain. These include threats from supply chain entities such as developers,
    manufacturers, integrators, distributors, and maintainers. Threat sources may include
    nation-state adversaries targeting supply chains for espionage or sabotage, criminal
    organizations seeking financial gain, and insiders within supply chain entities.
    Organizations should leverage threat intelligence specific to their industry sector
    and supply chain profile. The analysis should consider both intentional threats
    (counterfeiting, tampering, malware insertion) and unintentional threats (poor
    development practices, inadequate security controls, single points of failure).
references:
  - citation: "NIST SP 800-161 Rev 1, Section 2.2"
    url: "https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"
  - citation: "NIST SP 800-53 Rev 5, RA-3"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate threat intelligence feeds into the platform to automatically flag components
      associated with known supply chain threats. Implement automated scanning for indicators
      of compromise in dependencies and base images. Deploy tooling that detects dependency
      confusion attacks, typosquatting, and malicious package injection. Maintain a threat
      model for the platform supply chain that identifies critical paths and single points
      of failure. Implement canary builds and automated integrity checks for platform
      components.
    tools:
      - "Socket.dev (malicious package detection)"
      - "Phylum"
      - "OpenSSF Package Analysis"
      - "Trivy"
      - "Threat Intelligence APIs"
  devsecops:
    prose: >-
      Implement automated threat detection in CI/CD pipelines that identifies known malicious
      packages, dependency confusion attacks, and compromised upstream projects. Integrate
      supply chain threat intelligence into build-time checks. Use tools that analyze
      dependency behavior for anomalous activities such as network access, filesystem
      modifications, or code obfuscation. Generate threat analysis reports for critical
      dependency changes in merge requests. Alert security teams when supply chain threat
      indicators are detected in the build pipeline.
    tools:
      - "Socket.dev"
      - "Snyk"
      - "GitLab Dependency Scanning"
      - "npm audit / pip-audit"
      - "Phylum"
  secops:
    prose: >-
      Subscribe to and analyze supply chain threat intelligence from government sources
      (CISA, NSA), industry ISACs, and commercial threat intelligence providers. Maintain
      a supply chain threat register that maps threat sources to organizational assets.
      Conduct periodic supply chain threat briefings for leadership and development teams.
      Correlate supply chain threat intelligence with the organization's software inventory
      to identify exposure. Implement automated alerting for supply chain threat indicators
      relevant to the organization's technology stack.
    tools:
      - "CISA Advisories"
      - "MITRE ATT&CK (Supply Chain Compromise T1195)"
      - "Threat Intelligence Platforms (Recorded Future, Mandiant)"
      - "SIEM (correlation rules for supply chain threats)"
      - "ISACs (sector-specific threat sharing)"
