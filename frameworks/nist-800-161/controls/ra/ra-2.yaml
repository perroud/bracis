id: ra-2
family: ra
title: "Criticality Analysis of Supply Chain Components"
class: NIST800161
baselines: [level-2, level-3]
statement:
  prose: >-
    Identify and prioritize critical systems, system components, and system services
    that require additional supply chain protections. Conduct criticality analysis to
    determine the components whose compromise, failure, or exploitation would have the
    greatest impact on organizational operations, mission, or business functions.
    Apply enhanced supply chain controls commensurate with the criticality level
    of the identified components.
  parts:
    - id: ra-2_smt.a
      label: "a."
      prose: >-
        Identify critical systems, system components, and services that are essential
        to organizational mission and business functions.
    - id: ra-2_smt.b
      label: "b."
      prose: >-
        Conduct criticality analysis to prioritize supply chain protections based
        on potential impact of compromise, failure, or exploitation.
    - id: ra-2_smt.c
      label: "c."
      prose: >-
        Apply enhanced C-SCRM controls to critical components based on the results
        of the criticality analysis.
guidance:
  prose: >-
    Criticality analysis helps organizations focus supply chain risk management resources
    on the systems and components whose compromise would cause the greatest harm. The
    analysis should consider the function that the component performs, the data it
    processes or stores, its integration with other systems, and the availability of
    alternatives. Critical components may include cryptographic modules, identity
    providers, core infrastructure components, and data processing engines. The results
    of the criticality analysis should drive the level of supply chain controls applied,
    with critical components receiving the most rigorous protections such as dual-sourcing,
    enhanced testing, and provenance verification.
references:
  - citation: "NIST SP 800-161 Rev 1, Section 2.3"
    url: "https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"
  - citation: "NIST SP 800-53 Rev 5, RA-9"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
implementation_guidance:
  platform_engineering:
    prose: >-
      Classify all platform components by criticality level in the service catalog.
      Implement tiered supply chain controls based on criticality — critical components
      require signed provenance, pinned versions, and verified SBOMs. Deploy dependency
      graph analysis to identify single points of failure and critical dependency chains.
      Implement automated alerts when changes are proposed to critical components.
      Maintain alternate sources for critical dependencies to ensure continuity.
    tools:
      - "Backstage Software Catalog (component classification)"
      - "Dependency-Track (criticality scoring)"
      - "Grafana (criticality dashboards)"
      - "OPA / Kyverno (tiered policy enforcement)"
      - "Syft (dependency graph analysis)"
  devsecops:
    prose: >-
      Implement differentiated pipeline security policies based on component criticality.
      Critical components should require additional approvals, enhanced scanning, and
      provenance verification before deployment. Generate dependency impact analysis
      for merge requests that modify critical components. Enforce stricter version
      pinning and integrity verification for critical dependencies. Automate criticality
      classification as part of the build process based on defined criteria.
    tools:
      - "GitLab Merge Request Approvals"
      - "GitLab Dependency Scanning (critical severity gates)"
      - "SBOM analysis tools"
      - "Sigstore (provenance for critical artifacts)"
      - "Custom pipeline policies"
  secops:
    prose: >-
      Maintain a criticality inventory linked to the organizational mission essential
      functions analysis. Conduct annual criticality reviews aligned with business impact
      assessments. Prioritize vulnerability remediation for critical supply chain
      components. Monitor threat intelligence specifically for threats targeting critical
      components in use. Report critical component risk posture to leadership as part
      of enterprise risk reporting.
    tools:
      - "GRC Platforms (criticality classification)"
      - "BIA Tools (Business Impact Analysis)"
      - "CMDB (asset criticality tagging)"
      - "Vulnerability Management (priority by criticality)"
