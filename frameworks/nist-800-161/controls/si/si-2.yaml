id: si-2
family: si
title: "Software Bill of Materials (SBOM) Management"
class: NIST800161
baselines: [level-1, level-2, level-3]
statement:
  prose: >-
    Generate, maintain, and analyze Software Bills of Materials (SBOMs) for all
    software systems and components. Require suppliers to provide SBOMs for all
    acquired software. Use SBOMs to support vulnerability management, license
    compliance, supply chain risk assessment, and incident response activities.
  parts:
    - id: si-2_smt.a
      label: "a."
      prose: >-
        Generate SBOMs for all internally developed software using organization-defined
        SBOM formats (SPDX, CycloneDX) and maintain them throughout the software lifecycle.
    - id: si-2_smt.b
      label: "b."
      prose: >-
        Require suppliers to provide SBOMs for all acquired software products and
        services and validate their completeness and accuracy.
    - id: si-2_smt.c
      label: "c."
      prose: >-
        Analyze SBOMs to identify known vulnerabilities, license compliance issues,
        and supply chain risk indicators across the software portfolio.
guidance:
  prose: >-
    An SBOM is a formal, machine-readable inventory of software components and
    dependencies, their relationships, and associated metadata. Executive Order 14028
    on Improving the Nation's Cybersecurity established SBOM requirements for software
    sold to the federal government. SBOMs enable organizations to rapidly identify
    exposure to newly disclosed vulnerabilities, verify license compliance, and
    assess supply chain risk. Organizations should generate SBOMs in standard formats
    (SPDX or CycloneDX) and maintain them in a centralized repository linked to
    deployed systems. SBOM analysis should be continuous, with automated correlation
    against vulnerability databases. SBOMs are essential for rapid incident response,
    enabling organizations to quickly determine which systems are affected by a
    supply chain compromise.
references:
  - citation: "NIST SP 800-161 Rev 1, Section 3.5"
    url: "https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"
  - citation: "Executive Order 14028, Section 4"
    url: "https://www.whitehouse.gov/briefing-room/presidential-actions/2021/05/12/executive-order-on-improving-the-nations-cybersecurity/"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated SBOM generation as a standard build step in all platform
      pipelines. Deploy Dependency-Track or similar platforms for centralized SBOM
      storage, analysis, and vulnerability correlation. Integrate SBOM data into
      the service catalog to provide visibility into component composition at the
      platform level. Implement SBOM quality gates that require minimum completeness
      before artifacts can be promoted. Maintain a centralized SBOM repository
      linked to the deployment inventory for rapid impact analysis.
    tools:
      - "Syft (SBOM generation)"
      - "Dependency-Track (SBOM management)"
      - "CycloneDX / SPDX (SBOM formats)"
      - "Backstage (SBOM integration)"
      - "Harbor (SBOM storage)"
  devsecops:
    prose: >-
      Generate SBOMs for every build in CI/CD pipelines using Syft, Trivy, or
      similar tools. Store SBOMs as pipeline artifacts and publish to the
      centralized SBOM management platform. Implement pipeline gates that fail
      builds when SBOMs identify critical vulnerabilities or prohibited licenses.
      Validate supplier-provided SBOMs during integration testing. Automate SBOM
      comparison between builds to detect unexpected component changes.
    tools:
      - "Syft"
      - "Trivy"
      - "GitLab Dependency Scanning"
      - "CycloneDX CLI"
      - "SBOM quality validation tools"
  secops:
    prose: >-
      Use SBOMs as the primary tool for vulnerability impact assessment across
      the software portfolio. Implement automated SBOM analysis that correlates
      with NVD, OSV.dev, and other vulnerability databases. Generate reports on
      component reuse, vulnerability exposure, and license compliance from SBOM
      data. Use SBOM data to support rapid impact assessment during supply chain
      incidents. Track SBOM coverage across the organization and report gaps.
    tools:
      - "Dependency-Track"
      - "OSV.dev / NVD"
      - "SIEM (SBOM-correlated alerts)"
      - "GRC Platforms (SBOM compliance)"
      - "License compliance tools"
