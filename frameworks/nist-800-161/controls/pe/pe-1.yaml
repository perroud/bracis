id: pe-1
family: pe
title: "Provenance Tracking"
class: NIST800161
baselines: [level-2, level-3]
statement:
  prose: >-
    Establish and maintain provenance records for systems, system components, and
    associated data to document the origin, custody, and modification history of
    components throughout the supply chain. Implement mechanisms to verify the
    authenticity and integrity of provenance claims and detect provenance
    inconsistencies that may indicate supply chain tampering.
  parts:
    - id: pe-1_smt.a
      label: "a."
      prose: >-
        Develop and implement procedures for tracking the provenance of systems
        and system components from their origin through all stages of the supply
        chain.
    - id: pe-1_smt.b
      label: "b."
      prose: >-
        Implement mechanisms to verify the authenticity of provenance claims,
        including cryptographic attestations and transparency logs.
    - id: pe-1_smt.c
      label: "c."
      prose: >-
        Detect and investigate provenance inconsistencies that may indicate
        unauthorized modifications or supply chain compromise.
guidance:
  prose: >-
    Provenance tracking establishes the chain of custody for supply chain components,
    enabling organizations to verify the origin and integrity of components at any
    point in time. For software, provenance includes information about who built the
    software, what source code was used, what build system and configuration were
    employed, and what dependencies were included. The SLSA framework provides a
    structured approach to provenance with increasing levels of assurance. At minimum,
    organizations should document the source and version of all components. At higher
    maturity levels, organizations should require cryptographically signed provenance
    attestations generated by trusted build systems. Provenance data should be stored
    in tamper-evident formats and linked to the corresponding SBOMs.
references:
  - citation: "NIST SP 800-161 Rev 1, Section 3.5"
    url: "https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"
  - citation: "NIST SP 800-53 Rev 5, SR-4"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement SLSA provenance generation in all build pipelines at the platform
      level. Deploy in-toto for end-to-end supply chain attestation that tracks
      provenance from source to deployment. Use Sigstore Rekor as a transparency
      log for provenance records. Implement admission controllers that verify
      provenance attestations before allowing deployment. Maintain a provenance
      registry that links artifacts to their build provenance and source materials.
      Enforce minimum SLSA levels for all platform components.
    tools:
      - "SLSA framework (provenance generators)"
      - "in-toto"
      - "Sigstore (Rekor, cosign)"
      - "Kyverno / OPA (provenance verification)"
      - "Tekton Chains"
      - "GitHub Artifact Attestations"
  devsecops:
    prose: >-
      Generate SLSA provenance attestations in every CI/CD build pipeline.
      Implement signed provenance that records the source repository, commit hash,
      build system, and builder identity. Store provenance attestations alongside
      build artifacts and publish to transparency logs. Verify provenance of
      upstream dependencies during the build process. Implement provenance-aware
      deployment policies that require matching provenance for promotion through
      environments.
    tools:
      - "SLSA provenance generators"
      - "in-toto (attestation framework)"
      - "Sigstore (cosign attest)"
      - "GitLab CI/CD"
      - "Tekton Chains"
  secops:
    prose: >-
      Monitor provenance records for anomalies that may indicate supply chain
      compromise. Audit provenance completeness across the software portfolio.
      Investigate provenance verification failures as potential supply chain
      incidents. Track organizational SLSA maturity levels and report progress.
      Maintain forensic capabilities for provenance analysis during incident
      investigation.
    tools:
      - "Rekor (transparency log analysis)"
      - "Dependency-Track"
      - "SIEM (provenance anomaly detection)"
      - "Compliance dashboards"
      - "Forensic analysis tools"
