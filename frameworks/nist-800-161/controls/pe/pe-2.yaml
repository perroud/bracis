id: pe-2
family: pe
title: "Supply Chain Evidence Collection and Preservation"
class: NIST800161
baselines: [level-3]
statement:
  prose: >-
    Collect, preserve, and maintain evidence of supply chain security controls,
    compliance activities, and risk management decisions. Ensure that supply chain
    evidence is sufficient to support audit, compliance verification, and forensic
    investigation requirements. Implement tamper-evident storage for supply chain
    evidence and maintain evidence throughout required retention periods.
  parts:
    - id: pe-2_smt.a
      label: "a."
      prose: >-
        Collect evidence of supply chain security controls implementation including
        assessment reports, certification documents, and compliance artifacts from
        suppliers.
    - id: pe-2_smt.b
      label: "b."
      prose: >-
        Preserve supply chain evidence in tamper-evident storage with appropriate
        access controls and retention periods.
    - id: pe-2_smt.c
      label: "c."
      prose: >-
        Maintain evidence that supports forensic investigation of supply chain
        incidents including build logs, signing records, and provenance attestations.
guidance:
  prose: >-
    Supply chain evidence collection supports accountability, compliance verification,
    and incident investigation. Evidence types include supplier assessment reports,
    security certifications (SOC 2, ISO 27001), penetration test results, SBOMs,
    provenance attestations, build logs, and signing records. Organizations should
    define what evidence is required for each supply chain maturity level and ensure
    systematic collection and preservation. Evidence should be stored in immutable,
    tamper-evident formats to maintain its integrity for audit and forensic purposes.
    Retention periods should align with organizational policies, contractual
    requirements, and regulatory obligations.
references:
  - citation: "NIST SP 800-161 Rev 1, Section 3.2"
    url: "https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"
  - citation: "NIST SP 800-53 Rev 5, AU-9"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated evidence collection pipelines that gather supply chain
      security artifacts during build and deployment. Store evidence in immutable
      storage (object storage with versioning, append-only databases). Integrate
      evidence collection with the platform's artifact management system. Implement
      automated retention policies that preserve evidence for required periods.
      Provide APIs for evidence retrieval that support audit and investigation
      workflows.
    tools:
      - "Object Storage (S3 with versioning)"
      - "Sigstore Rekor (immutable evidence)"
      - "Harbor (artifact evidence)"
      - "GitLab Artifacts"
      - "Elasticsearch (evidence search)"
  devsecops:
    prose: >-
      Generate and preserve build evidence as CI/CD pipeline artifacts including
      build logs, dependency resolution records, SBOM snapshots, and signing
      records. Implement pipeline evidence collection that captures the complete
      build environment configuration. Store evidence with immutable references
      linked to specific artifact versions. Automate evidence packaging for
      compliance audits. Maintain evidence chain of custody through signed
      pipeline attestations.
    tools:
      - "GitLab CI/CD Artifacts"
      - "SLSA provenance (as evidence)"
      - "Build log archival"
      - "Sigstore (signing records)"
      - "Evidence packaging tools"
  secops:
    prose: >-
      Maintain a supply chain evidence management program that ensures
      completeness, integrity, and accessibility of evidence. Conduct periodic
      evidence audits to verify that all required supply chain evidence is
      being collected and preserved. Manage evidence retention policies aligned
      with regulatory and contractual requirements. Provide evidence retrieval
      capabilities for audit, compliance, and forensic investigation.
      Generate evidence completeness reports for supply chain compliance.
    tools:
      - "GRC Platforms (evidence management)"
      - "eDiscovery tools"
      - "Log archival systems"
      - "Compliance audit platforms"
      - "Digital forensics tools"
