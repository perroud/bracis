id: pm-2
family: pm
title: "Supply Chain Information Sharing"
class: NIST800161
baselines: [level-2, level-3]
statement:
  prose: >-
    Establish and participate in supply chain information sharing arrangements to exchange
    threat intelligence, vulnerability information, and best practices related to
    cybersecurity supply chain risk management. Develop agreements with supply chain
    partners, industry groups, and government entities that facilitate the timely sharing
    of supply chain risk information while protecting sensitive business information.
  parts:
    - id: pm-2_smt.a
      label: "a."
      prose: >-
        Establish information sharing agreements with supply chain partners that define
        the types of information to be shared, protection requirements, and handling
        procedures.
    - id: pm-2_smt.b
      label: "b."
      prose: >-
        Participate in industry and government supply chain threat information sharing
        programs relevant to the organization's sector and technology profile.
    - id: pm-2_smt.c
      label: "c."
      prose: >-
        Incorporate supply chain threat information received through sharing arrangements
        into organizational risk assessments and C-SCRM decision-making.
guidance:
  prose: >-
    Information sharing is essential for effective supply chain risk management because
    no single organization has complete visibility into the supply chain. Sharing
    arrangements may include formal agreements with direct suppliers, participation in
    Information Sharing and Analysis Centers (ISACs), membership in industry consortia,
    and coordination with government agencies such as CISA and the FBI. Organizations
    should establish clear protocols for what information can be shared, with whom,
    and under what protections. Automated mechanisms for sharing indicators of compromise
    (IOCs) and vulnerability information enable faster response to supply chain threats.
    Organizations should also contribute to the supply chain security ecosystem by sharing
    relevant threat information with partners and communities.
references:
  - citation: "NIST SP 800-161 Rev 1, Section 2.4"
    url: "https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"
  - citation: "NIST SP 800-53 Rev 5, PM-15"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate supply chain threat intelligence feeds into the platform security
      monitoring stack. Automate the ingestion and correlation of shared threat data
      with the organization's dependency inventory. Implement STIX/TAXII endpoints
      for automated threat intelligence exchange with partners. Provide developers
      with real-time supply chain threat advisories through the developer portal.
      Share anonymized supply chain security metrics with industry partners.
    tools:
      - "STIX/TAXII (automated threat sharing)"
      - "OpenCTI"
      - "MISP (Malware Information Sharing Platform)"
      - "Backstage (advisory integration)"
      - "Grafana (shared threat dashboards)"
  devsecops:
    prose: >-
      Integrate shared threat intelligence into CI/CD pipeline security checks.
      Automate blocking of dependencies flagged through shared threat intelligence.
      Contribute build-time security findings to community vulnerability databases
      when appropriate. Implement automated alerting when shared intelligence
      identifies threats to dependencies in use. Generate and share SBOMs with
      supply chain partners to enable mutual risk assessment.
    tools:
      - "GitLab Advisory Database"
      - "OSV.dev (community vulnerability data)"
      - "Socket.dev"
      - "CI/CD threat intelligence integration"
  secops:
    prose: >-
      Manage memberships and participation in ISACs and other supply chain threat
      sharing communities. Operate threat intelligence sharing platforms that enable
      bidirectional exchange with partners. Analyze shared intelligence for
      relevance to the organization's supply chain profile. Track and report on
      the value received from sharing arrangements. Maintain information sharing
      agreements and ensure compliance with data handling requirements.
    tools:
      - "ISACs (sector-specific)"
      - "CISA Cybersecurity Advisories"
      - "Threat Intelligence Platforms (Recorded Future, Mandiant)"
      - "MISP"
      - "Information Sharing Agreements (legal templates)"
