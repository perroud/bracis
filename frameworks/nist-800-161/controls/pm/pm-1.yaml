id: pm-1
family: pm
title: "C-SCRM Strategy and Implementation Plan"
class: NIST800161
baselines: [level-1, level-2, level-3]
statement:
  prose: >-
    Develop and implement an enterprise-level strategy for managing supply chain risks
    associated with the development, acquisition, maintenance, and disposal of systems,
    system components, and system services. Establish governance structures that integrate
    C-SCRM into enterprise risk management and allocate resources for supply chain risk
    management activities across all organizational levels.
  parts:
    - id: pm-1_smt.a
      label: "a."
      prose: >-
        Develop an enterprise-level C-SCRM strategy that defines the organizational
        approach to identifying, assessing, responding to, and monitoring supply chain risks.
    - id: pm-1_smt.b
      label: "b."
      prose: >-
        Establish C-SCRM governance structures including roles, responsibilities, and
        accountability at the enterprise, mission/business process, and operational levels.
    - id: pm-1_smt.c
      label: "c."
      prose: >-
        Allocate adequate resources for C-SCRM implementation and integrate supply chain
        risk management into the enterprise risk management framework.
guidance:
  prose: >-
    An enterprise C-SCRM strategy provides the overarching direction for managing supply
    chain risks across the organization. The strategy should align with the organization's
    risk appetite, mission objectives, and existing risk management frameworks. NIST SP
    800-161 Rev 1 defines three organizational levels for C-SCRM: Level 1 (Enterprise),
    Level 2 (Mission/Business Process), and Level 3 (Operational). Each level has specific
    responsibilities and activities. The enterprise level sets policy and governance, the
    mission/business level tailors requirements to specific programs, and the operational
    level implements controls at the system level. Effective C-SCRM requires dedicated
    resources, cross-functional collaboration, and executive sponsorship.
references:
  - citation: "NIST SP 800-161 Rev 1, Section 2.1"
    url: "https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"
  - citation: "NIST SP 800-53 Rev 5, PM-30"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement the C-SCRM strategy through platform-level controls that enforce supply
      chain security by default. Embed supply chain requirements into the internal
      developer platform through automated guardrails, approved component catalogs,
      and mandatory security checks. Implement multi-level governance through platform
      policies that distinguish between enterprise-wide requirements and team-specific
      configurations. Provide self-service tooling that enables development teams to
      comply with C-SCRM requirements without manual intervention.
    tools:
      - "Backstage (developer portal)"
      - "OPA / Kyverno (policy-as-code)"
      - "Crossplane (infrastructure governance)"
      - "Grafana (C-SCRM dashboards)"
      - "GitLab Compliance Frameworks"
  devsecops:
    prose: >-
      Translate the C-SCRM strategy into CI/CD pipeline policies and compliance
      frameworks. Implement compliance pipeline templates that enforce supply chain
      controls across all projects. Define and enforce security gates that align with
      the three C-SCRM levels. Provide development teams with clear guidance on supply
      chain security requirements through pipeline documentation and error messages.
      Measure and report C-SCRM compliance through pipeline metrics.
    tools:
      - "GitLab CI/CD Compliance Pipelines"
      - "GitHub Actions Reusable Workflows"
      - "Pipeline compliance dashboards"
      - "Conftest / Checkov"
  secops:
    prose: >-
      Operate the C-SCRM governance program through the GRC platform. Track strategy
      implementation progress, compliance status, and risk posture across the
      organization. Facilitate cross-functional C-SCRM coordination meetings and
      ensure executive reporting on supply chain risk. Maintain the C-SCRM risk
      appetite statement and escalation procedures. Conduct annual strategy reviews
      and updates based on threat landscape changes and lessons learned.
    tools:
      - "GRC Platforms (ServiceNow, Archer, OneTrust)"
      - "Risk Management Frameworks"
      - "Executive Reporting Dashboards"
      - "Meeting and Collaboration Tools"
