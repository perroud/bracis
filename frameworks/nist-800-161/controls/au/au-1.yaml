id: au-1
family: au
title: "Supply Chain Audit and Traceability"
class: NIST800161
baselines: [level-2, level-3]
statement:
  prose: >-
    Implement audit and traceability mechanisms for supply chain activities including
    acquisition, development, integration, delivery, and maintenance of systems and
    system components. Maintain audit trails that provide accountability for supply
    chain actions and enable forensic investigation of supply chain incidents.
  parts:
    - id: au-1_smt.a
      label: "a."
      prose: >-
        Implement audit logging for supply chain activities including component
        acquisition, version changes, configuration modifications, and access to
        supply chain management systems.
    - id: au-1_smt.b
      label: "b."
      prose: >-
        Maintain traceability of supply chain components from source to deployment,
        enabling rapid identification of component origins and modification history.
    - id: au-1_smt.c
      label: "c."
      prose: >-
        Review and analyze supply chain audit records for indicators of compromise,
        policy violations, or anomalous supply chain activities.
guidance:
  prose: >-
    Supply chain audit and traceability provide the evidence necessary to verify
    supply chain integrity and investigate incidents. Audit mechanisms should capture
    who acquired what component, from which supplier, when it was integrated, and
    what modifications were made. Traceability should extend from the original source
    code or component through all intermediate transformations to the final deployed
    artifact. Transparency logs such as Sigstore Rekor provide public, immutable
    records of software signing events. Organizations should implement end-to-end
    traceability that can answer questions like "where did this component come from?"
    and "what systems contain this component?" at any point in time.
references:
  - citation: "NIST SP 800-161 Rev 1, Section 3.2"
    url: "https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"
  - citation: "NIST SP 800-53 Rev 5, AU-3"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement comprehensive audit logging for all supply chain operations in the
      platform. Deploy transparency logs for artifact signing events using Sigstore
      Rekor. Maintain immutable records of all dependency changes, image pulls, and
      deployment events. Implement build provenance tracking using SLSA and in-toto
      frameworks. Provide traceability dashboards that show the complete lineage
      of any deployed component from source to production. Store audit records in
      tamper-evident storage.
    tools:
      - "Sigstore Rekor (transparency log)"
      - "in-toto (provenance attestation)"
      - "SLSA framework"
      - "Elasticsearch / Loki (audit log storage)"
      - "Grafana (traceability dashboards)"
      - "Harbor (registry audit logs)"
  devsecops:
    prose: >-
      Generate build provenance attestations in every CI/CD pipeline. Implement
      audit trails for all dependency changes through version control history
      and lock file diffs. Log all pipeline events related to supply chain
      operations including dependency resolution, image pulls, and artifact
      publishing. Enable merge request audit trails that capture all supply
      chain-related decisions. Implement signed commits and pipeline attestations
      for non-repudiation.
    tools:
      - "GitLab Audit Events"
      - "SLSA provenance generators"
      - "in-toto"
      - "Signed commits (GPG/SSH)"
      - "CI/CD audit logging"
  secops:
    prose: >-
      Monitor supply chain audit logs for anomalous activities using SIEM
      correlation rules. Investigate unusual patterns such as unexpected
      dependency changes, builds from unusual sources, or modifications to
      supply chain management systems. Conduct periodic audits of supply
      chain traceability to ensure completeness. Preserve audit records
      for forensic investigation and regulatory compliance. Generate
      supply chain audit compliance reports.
    tools:
      - "SIEM (Splunk, Elastic Security)"
      - "SOAR (automated investigation)"
      - "Forensics tools"
      - "GRC Platforms (audit compliance)"
      - "Log management platforms"
