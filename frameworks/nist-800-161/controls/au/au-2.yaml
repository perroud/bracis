id: au-2
family: au
title: "Supply Chain Activity Monitoring"
class: NIST800161
baselines: [level-2, level-3]
statement:
  prose: >-
    Monitor supply chain activities and events to detect anomalies, unauthorized
    modifications, and indicators of supply chain compromise. Implement continuous
    monitoring of supplier security posture, dependency changes, and supply chain
    operational activities that may indicate threats to organizational systems.
  parts:
    - id: au-2_smt.a
      label: "a."
      prose: >-
        Implement continuous monitoring of supply chain activities including
        dependency updates, upstream project changes, and supplier security events.
    - id: au-2_smt.b
      label: "b."
      prose: >-
        Detect and alert on anomalous supply chain activities such as unexpected
        maintainer changes, unusual code modifications, and deviations from
        established supply chain patterns.
    - id: au-2_smt.c
      label: "c."
      prose: >-
        Correlate supply chain monitoring data with threat intelligence to
        identify potential supply chain attacks in progress.
guidance:
  prose: >-
    Continuous monitoring of supply chain activities enables early detection of
    compromises before they impact organizational systems. Monitoring should cover
    both technical indicators (dependency changes, code modifications, new package
    versions) and organizational indicators (maintainer changes, project ownership
    transfers, unusual release patterns). Behavioral analysis of upstream projects
    and dependencies can identify anomalies that may indicate compromise, such as
    sudden changes in code patterns, introduction of obfuscated code, or unexpected
    network access. Organizations should correlate supply chain monitoring data with
    broader threat intelligence to distinguish between benign changes and potential
    attacks.
references:
  - citation: "NIST SP 800-161 Rev 1, Section 3.2"
    url: "https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"
  - citation: "NIST SP 800-53 Rev 5, SI-4"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated monitoring of all upstream dependencies and base images
      for changes. Deploy tools that detect anomalous package behavior including
      unexpected network access, filesystem modifications, and code obfuscation.
      Monitor container registries for unauthorized image modifications. Implement
      alerts for upstream project changes that may affect platform stability or
      security. Deploy dashboards that visualize supply chain activity patterns
      and highlight anomalies.
    tools:
      - "Socket.dev (behavioral analysis)"
      - "Phylum"
      - "OpenSSF Package Analysis"
      - "Renovate (change monitoring)"
      - "Grafana (activity dashboards)"
      - "Falco (runtime monitoring)"
  devsecops:
    prose: >-
      Implement CI/CD pipeline checks that detect unusual dependency changes
      between builds. Monitor for dependency confusion and typosquatting attacks
      in package resolution. Generate alerts when dependencies introduce new
      capabilities (network access, filesystem writes, process execution).
      Implement automated diffing of dependency updates to highlight suspicious
      changes. Track and alert on packages with recently changed maintainers
      or ownership.
    tools:
      - "Socket.dev"
      - "npm audit / pip-audit"
      - "GitLab Dependency Scanning"
      - "Custom CI/CD monitoring scripts"
      - "Dependency diff tools"
  secops:
    prose: >-
      Operate supply chain monitoring within the security operations center.
      Implement SIEM correlation rules for supply chain attack indicators.
      Monitor supply chain threat intelligence feeds for threats to dependencies
      in use. Investigate supply chain anomaly alerts and escalate confirmed
      threats. Track supply chain monitoring coverage and detection effectiveness
      metrics. Conduct regular tuning of supply chain detection rules to reduce
      false positives while maintaining detection capability.
    tools:
      - "SIEM (supply chain detection rules)"
      - "SOAR (automated investigation)"
      - "Threat Intelligence Platforms"
      - "Dependency-Track (continuous monitoring)"
      - "Supply chain anomaly detection tools"
