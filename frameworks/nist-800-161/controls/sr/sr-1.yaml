id: sr-1
family: sr
title: "C-SCRM Policy and Plan"
class: NIST800161
baselines: [level-1, level-2, level-3]
statement:
  prose: >-
    Develop, document, and disseminate a Cybersecurity Supply Chain Risk Management (C-SCRM) policy
    that addresses purpose, scope, roles, responsibilities, management commitment, coordination among
    organizational entities, and compliance. Develop and maintain a C-SCRM plan that provides an
    overview of the requirements and describes the controls in place or planned for meeting those
    requirements. The C-SCRM policy and plan shall be reviewed and updated at an organization-defined
    frequency and following organization-defined events.
  parts:
    - id: sr-1_smt.a
      label: "a."
      prose: >-
        Develop and document a C-SCRM policy that addresses purpose, scope, roles, responsibilities,
        management commitment, coordination among organizational entities, and compliance.
    - id: sr-1_smt.b
      label: "b."
      prose: >-
        Develop and maintain a C-SCRM plan that provides an overview of the requirements for the
        supply chain risk management program and describes the controls in place or planned for
        meeting those requirements.
    - id: sr-1_smt.c
      label: "c."
      prose: >-
        Disseminate the C-SCRM policy and plan to organization-defined personnel or roles.
    - id: sr-1_smt.d
      label: "d."
      prose: >-
        Review and update the C-SCRM policy and plan at an organization-defined frequency
        and following organization-defined events.
guidance:
  prose: >-
    A C-SCRM policy establishes the organizational commitment to managing cybersecurity risks
    in the supply chain. The policy should be integrated into the enterprise risk management
    framework and aligned with the organization's mission and business objectives. The C-SCRM
    plan operationalizes the policy by identifying specific supply chain risk management
    activities, milestones, and resource requirements. The plan should address the three levels
    of the organization (enterprise, mission/business process, and operational) and define how
    supply chain risks are identified, assessed, responded to, and monitored. Organizations
    should leverage NIST SP 800-53 SR family controls as a foundation and tailor them based on
    supply chain risk assessments.
references:
  - citation: "NIST SP 800-161 Rev 1, Section 2"
    url: "https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"
  - citation: "NIST SP 800-53 Rev 5, SR-1"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
implementation_guidance:
  platform_engineering:
    prose: >-
      Encode C-SCRM policy requirements as policy-as-code in version-controlled repositories.
      Implement automated guardrails in the internal developer platform that enforce supply chain
      security requirements by default. Define golden paths for service creation that embed
      supply chain controls such as dependency pinning, SBOM generation, and artifact signing.
      Maintain a central registry of approved suppliers, base images, and third-party dependencies.
      Publish the C-SCRM plan as an internal document accessible through the developer portal.
    tools:
      - "Open Policy Agent (OPA)"
      - "Backstage Software Catalog"
      - "Kyverno"
      - "HashiCorp Sentinel"
      - "Crossplane"
  devsecops:
    prose: >-
      Integrate C-SCRM policy checks into CI/CD pipelines as mandatory compliance gates.
      Implement pipeline templates that enforce supply chain security controls such as
      dependency scanning, license compliance, and artifact signing. Use merge request templates
      that include C-SCRM checklists for dependency additions. Automate policy compliance
      reporting through pipeline artifacts and dashboards. Enforce that all third-party
      components pass security and license validation before integration.
    tools:
      - "GitLab CI/CD Compliance Pipelines"
      - "GitHub Actions Reusable Workflows"
      - "Conftest"
      - "Checkov"
      - "GitLab License Compliance"
  secops:
    prose: >-
      Maintain the C-SCRM plan in a GRC platform with defined review cycles. Track policy
      compliance across all supply chain relationships and report deviations. Conduct periodic
      assessments of C-SCRM policy effectiveness and update based on threat landscape changes.
      Monitor supply chain threat intelligence feeds to inform policy updates. Maintain an
      inventory of all supply chain relationships and their associated risk levels.
    tools:
      - "GRC Platforms (ServiceNow, Archer, OneTrust)"
      - "Threat Intelligence Platforms"
      - "SIEM (Splunk, Elastic Security)"
      - "Risk Management Tools"
