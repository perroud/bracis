id: sr-2
family: sr
title: "Supply Chain Risk Assessment"
class: NIST800161
baselines: [level-1, level-2, level-3]
statement:
  prose: >-
    Conduct supply chain risk assessments on systems, system components, and system services
    using organization-defined processes. Assess supply chain risks associated with the
    development, acquisition, maintenance, and disposal of systems, system components, or
    system services. Update supply chain risk assessments at an organization-defined frequency
    or when there are significant changes to the supply chain, threat landscape, or
    organizational mission/business processes.
  parts:
    - id: sr-2_smt.a
      label: "a."
      prose: >-
        Assess supply chain risks associated with organization-defined systems, system
        components, and system services.
    - id: sr-2_smt.b
      label: "b."
      prose: >-
        Update the supply chain risk assessment at an organization-defined frequency, when
        there are significant changes to the relevant supply chain, or when changes to the
        system, environments of operation, or other conditions may necessitate a change in
        the supply chain.
guidance:
  prose: >-
    Supply chain risk assessments identify, estimate, and prioritize risks to organizational
    operations, organizational assets, individuals, other organizations, and the Nation resulting
    from the operation and use of systems that rely on supply chain entities. The assessment
    should consider threats specific to the supply chain including counterfeits, unauthorized
    modifications, theft, insertion of malicious code, poor manufacturing and development
    practices, and insider threats within the supply chain. Organizations should evaluate the
    criticality of the system or component, the trustworthiness of the supplier, and the
    potential impact of a supply chain compromise. The assessment methodology should be
    consistent with the organization's risk management framework.
references:
  - citation: "NIST SP 800-161 Rev 1, Section 3.1"
    url: "https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"
  - citation: "NIST SP 800-53 Rev 5, SR-2"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated supply chain risk scoring for all dependencies and base images
      in the internal developer platform. Integrate vulnerability databases and risk metrics
      into the service catalog to surface supply chain risk posture. Deploy dependency-track
      or similar tools to continuously assess risk across the software supply chain. Implement
      automated alerts when dependency risk scores exceed defined thresholds. Maintain a
      risk-rated inventory of all platform components and their supply chain origins.
    tools:
      - "Dependency-Track"
      - "OWASP Dependency-Check"
      - "Backstage Software Catalog"
      - "Scorecard (OpenSSF)"
      - "Renovate / Dependabot"
  devsecops:
    prose: >-
      Integrate supply chain risk scoring into CI/CD pipelines. Fail builds when dependencies
      exceed organization-defined risk thresholds. Generate and analyze SBOMs for each build
      to identify supply chain risk. Use OpenSSF Scorecard to assess the security posture of
      open-source dependencies. Implement automated checks for dependency provenance,
      maintainer reputation, and known vulnerability history. Report supply chain risk
      metrics as pipeline artifacts for review.
    tools:
      - "GitLab Dependency Scanning"
      - "OpenSSF Scorecard"
      - "Syft (SBOM generation)"
      - "Grype (vulnerability scanning)"
      - "Socket.dev"
      - "Snyk"
  secops:
    prose: >-
      Conduct periodic supply chain risk assessments aligned with the organizational risk
      management cycle. Maintain a risk register that includes supply chain-specific risks
      and their mitigations. Monitor supply chain threat intelligence for emerging risks
      to critical dependencies and suppliers. Correlate vulnerability data with supply chain
      exposure to prioritize remediation. Report supply chain risk posture to leadership
      through dashboards and periodic briefings.
    tools:
      - "GRC Platforms (ServiceNow, Archer)"
      - "Threat Intelligence Platforms"
      - "Dependency-Track"
      - "SIEM (supply chain anomaly detection)"
      - "Risk Management Dashboards"
