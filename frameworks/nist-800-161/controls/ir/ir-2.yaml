id: ir-2
family: ir
title: "Supply Chain Incident Reporting and Notification"
class: NIST800161
baselines: [level-1, level-2, level-3]
statement:
  prose: >-
    Establish and maintain procedures for reporting supply chain incidents to
    appropriate internal and external stakeholders. Require supply chain partners
    to report security incidents that may affect the organization within
    organization-defined timeframes. Report supply chain incidents to relevant
    government agencies and information sharing organizations as required.
  parts:
    - id: ir-2_smt.a
      label: "a."
      prose: >-
        Establish supply chain incident reporting requirements in contracts and
        agreements with supply chain partners, including notification timelines
        and information to be provided.
    - id: ir-2_smt.b
      label: "b."
      prose: >-
        Implement internal supply chain incident reporting procedures that ensure
        timely notification of affected organizational units and leadership.
    - id: ir-2_smt.c
      label: "c."
      prose: >-
        Report supply chain incidents to government agencies, ISACs, and other
        external stakeholders as required by regulation or agreement.
guidance:
  prose: >-
    Timely reporting of supply chain incidents is essential for rapid response and
    limiting the impact of compromises. Organizations should contractually require
    suppliers to notify them of security incidents within defined timeframes,
    typically 24-72 hours depending on severity. Internal reporting procedures should
    ensure that supply chain incidents are escalated to appropriate decision-makers
    who can authorize rapid response actions. External reporting obligations may
    include notification to CISA for federal agencies, sector-specific regulators,
    and information sharing partners. Reporting should include sufficient detail
    to enable recipients to assess their exposure and take protective actions.
references:
  - citation: "NIST SP 800-161 Rev 1, Section 3.6"
    url: "https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"
  - citation: "NIST SP 800-53 Rev 5, IR-6"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated incident notification workflows in the platform. Deploy
      alerting systems that automatically notify affected teams when supply chain
      vulnerabilities are identified in their components. Integrate with vendor
      security advisory feeds to automate detection of supplier-reported incidents.
      Provide self-service dashboards that enable teams to assess their exposure
      to reported supply chain incidents. Implement audit trails for all supply
      chain incident notifications and responses.
    tools:
      - "PagerDuty / Opsgenie (automated alerting)"
      - "Dependency-Track (automated advisory matching)"
      - "Grafana (incident exposure dashboards)"
      - "Backstage (team notification routing)"
      - "Audit logging systems"
  devsecops:
    prose: >-
      Implement automated CI/CD pipeline notifications when dependencies are
      affected by reported supply chain incidents. Generate automated merge
      requests for remediation of reported vulnerabilities. Create pipeline
      compliance checks that block deployment of components affected by active
      supply chain incidents. Maintain automated reporting of dependency
      vulnerability status across all repositories. Enable rapid mass-scanning
      capabilities for newly reported supply chain threats.
    tools:
      - "GitLab Security Alerts"
      - "Renovate / Dependabot (automated fix PRs)"
      - "GitLab Dependency Scanning"
      - "CI/CD notification webhooks"
  secops:
    prose: >-
      Operate supply chain incident reporting workflows in the incident
      management platform. Maintain contact lists for supplier security teams
      and government reporting channels. Track supplier incident notification
      compliance against contractual SLAs. Coordinate external reporting to
      CISA, FBI IC3, and sector ISACs as required. Generate post-incident
      reports that include supply chain-specific findings and recommendations
      for improving detection and response.
    tools:
      - "Incident Management (ServiceNow, PagerDuty)"
      - "SOAR Platforms"
      - "CISA Reporting Portal"
      - "Communication Templates"
      - "Post-Incident Review Tools"
