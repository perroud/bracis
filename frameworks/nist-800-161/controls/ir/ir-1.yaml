id: ir-1
family: ir
title: "Supply Chain Incident Response"
class: NIST800161
baselines: [level-1, level-2, level-3]
statement:
  prose: >-
    Develop, implement, and maintain a supply chain incident response capability that
    addresses the detection, analysis, containment, eradication, and recovery from
    supply chain security incidents. Include supply chain-specific scenarios in the
    organizational incident response plan and establish communication procedures with
    supply chain partners for coordinated incident response.
  parts:
    - id: ir-1_smt.a
      label: "a."
      prose: >-
        Incorporate supply chain incident scenarios into the organizational incident
        response plan, including compromised dependencies, counterfeit components,
        and malicious upstream modifications.
    - id: ir-1_smt.b
      label: "b."
      prose: >-
        Establish incident communication and coordination procedures with critical
        supply chain partners, including notification timelines and escalation paths.
    - id: ir-1_smt.c
      label: "c."
      prose: >-
        Conduct supply chain incident response exercises to test and improve the
        organization's ability to detect and respond to supply chain compromises.
guidance:
  prose: >-
    Supply chain incidents require specialized response procedures because the
    compromise may originate outside the organization's direct control. A supply chain
    incident may affect multiple organizations simultaneously, requiring coordinated
    response. The incident response plan should address scenarios such as compromised
    open-source packages (e.g., Log4Shell, SolarWinds), malicious container images,
    compromised build systems, and counterfeit hardware. Response procedures should
    include rapid identification of affected systems through SBOM analysis, containment
    strategies that minimize business disruption, and communication procedures with
    upstream and downstream supply chain partners. Organizations should maintain
    pre-established relationships with suppliers' security teams to facilitate rapid
    coordination during incidents.
references:
  - citation: "NIST SP 800-161 Rev 1, Section 3.6"
    url: "https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"
  - citation: "NIST SP 800-53 Rev 5, IR-4"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated supply chain incident detection through continuous SBOM
      analysis and vulnerability correlation. Deploy rapid response capabilities such
      as automated dependency rollback, emergency image replacements, and network
      isolation for compromised components. Maintain a library of incident response
      runbooks for common supply chain scenarios. Implement automated SBOM-based
      impact analysis that can quickly identify all systems affected by a compromised
      component. Provide platform-level kill switches for compromised dependencies.
    tools:
      - "Dependency-Track (SBOM-based impact analysis)"
      - "Kubernetes admission controllers (emergency blocks)"
      - "Kyverno / OPA (emergency policies)"
      - "Incident response runbook automation"
      - "ArgoCD / Flux (automated rollback)"
  devsecops:
    prose: >-
      Implement CI/CD pipeline mechanisms for rapid supply chain incident response.
      Enable emergency dependency replacement workflows that fast-track security
      patches. Automate impact analysis across all repositories when a supply chain
      vulnerability is disclosed. Implement pipeline-level blocks for known compromised
      packages. Maintain emergency pipeline templates that bypass normal approval
      workflows for critical supply chain patches while maintaining audit trails.
    tools:
      - "GitLab Security Dashboards"
      - "GitLab Dependency Scanning (emergency scan triggers)"
      - "Renovate (emergency update PRs)"
      - "SBOM analysis tools"
      - "CI/CD emergency workflows"
  secops:
    prose: >-
      Operate supply chain incident response procedures within the security operations
      center. Implement playbooks for common supply chain incidents including compromised
      packages, data breaches at suppliers, and counterfeit component discovery. Maintain
      communication trees for supply chain incident notification. Conduct tabletop
      exercises simulating supply chain compromise scenarios. Coordinate with CISA,
      FBI, and sector-specific agencies for major supply chain incidents.
    tools:
      - "SOAR Platforms (Cortex XSOAR, Splunk SOAR)"
      - "Incident Management (PagerDuty, Opsgenie)"
      - "SIEM (supply chain incident detection rules)"
      - "Communication Tools (secure channels)"
      - "Forensics Tools"
