implementation_guidance:
  platform_engineering:
    prose: >-
      Maintain an approved vendor and component registry in the internal developer platform.
      Implement policy gates that prevent use of unapproved dependencies, base images, or
      service providers. Automate vendor compliance verification through integration with
      vendor risk management platforms. Enforce that all third-party components acquired
      through the platform include SBOMs and signed attestations. Define and enforce
      minimum security standards for all acquired platform components.
    tools:
      - "Backstage Software Catalog"
      - "Harbor (approved image registry)"
      - "Kyverno / OPA (policy enforcement)"
      - "Vendor Risk Management Platforms"
      - "Private Package Registries (Artifactory, Nexus)"
  devsecops:
    prose: >-
      Enforce acquisition security through CI/CD pipeline checks that validate all
      dependencies come from approved sources. Implement license compliance scanning to
      ensure acquired components meet organizational policies. Require SBOM delivery for
      all third-party commercial software integrated into the build process. Validate that
      acquired components have signed provenance attestations before integration. Block
      pipeline execution if acquired components fail security or compliance checks.
    tools:
      - "GitLab License Compliance"
      - "GitLab Dependency Scanning"
      - "Artifactory / Nexus (proxy registries)"
      - "SBOM validation tools"
      - "Sigstore (cosign verification)"
  secops:
    prose: >-
      Maintain a vendor risk management program that continuously monitors supplier
      compliance with C-SCRM requirements. Track acquisition-related risks in the
      enterprise risk register. Conduct periodic vendor security assessments and audits.
      Monitor vendor security posture through third-party risk rating services. Maintain
      a database of all acquired components, their suppliers, and associated risk levels.
    tools:
      - "Third-Party Risk Management (BitSight, SecurityScorecard)"
      - "GRC Platforms (ServiceNow, Archer)"
      - "Vendor Assessment Questionnaires"
      - "Contract Management Systems"
