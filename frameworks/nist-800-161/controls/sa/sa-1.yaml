id: sa-1
family: sa
title: "Acquisition Process Security"
class: NIST800161
baselines: [level-1, level-2, level-3]
statement:
  prose: >-
    Integrate supply chain risk management requirements into the system acquisition process.
    Include C-SCRM requirements in solicitation documents, contracts, and service-level
    agreements for all information systems, system components, and information system services.
    Require that suppliers and service providers comply with organizational C-SCRM policies
    and provide evidence of compliance.
  parts:
    - id: sa-1_smt.a
      label: "a."
      prose: >-
        Include supply chain risk management requirements in acquisition planning documents,
        solicitations, contracts, and service-level agreements.
    - id: sa-1_smt.b
      label: "b."
      prose: >-
        Require suppliers to provide evidence of compliance with C-SCRM requirements,
        including security certifications, audit reports, and supply chain transparency
        documentation.
    - id: sa-1_smt.c
      label: "c."
      prose: >-
        Evaluate supplier proposals and bids against C-SCRM criteria and factor supply
        chain risk into acquisition decisions.
guidance:
  prose: >-
    The acquisition process is a critical control point for supply chain risk management.
    Organizations should include C-SCRM requirements in all phases of acquisition, from
    planning through contract management and closeout. Requirements should address the
    security of the development environment, secure software development practices, provenance
    tracking, vulnerability disclosure, and incident notification. Organizations should
    require suppliers to provide SBOMs, comply with secure development frameworks like
    SSDF (NIST SP 800-218), and maintain security certifications relevant to the products
    or services being acquired. Contract language should include provisions for security
    assessments, audit rights, and breach notification.
