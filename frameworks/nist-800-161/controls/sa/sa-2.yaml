id: sa-2
family: sa
title: "Supplier Assessments and Monitoring"
class: NIST800161
baselines: [level-2, level-3]
statement:
  prose: >-
    Assess and monitor suppliers and supply chain entities to determine the trustworthiness
    and security posture of their products and services. Establish criteria for supplier
    evaluation and conduct initial assessments before establishing supply chain relationships.
    Implement continuous monitoring of supplier security posture and supply chain integrity
    throughout the lifecycle of the relationship.
  parts:
    - id: sa-2_smt.a
      label: "a."
      prose: >-
        Establish and apply criteria for evaluating supplier trustworthiness, including
        security certifications, development practices, incident history, and supply chain
        transparency.
    - id: sa-2_smt.b
      label: "b."
      prose: >-
        Conduct initial and periodic assessments of suppliers and supply chain entities
        using organization-defined assessment methods and frequency.
    - id: sa-2_smt.c
      label: "c."
      prose: >-
        Implement continuous monitoring of critical supplier security posture and respond
        to identified supply chain risks.
guidance:
  prose: >-
    Supplier assessments and monitoring provide ongoing visibility into supply chain risks.
    Organizations should establish a risk-based approach to supplier evaluation that considers
    the criticality of the supplied products or services, the supplier's access to organizational
    systems and data, and the potential impact of a compromise. Assessment methods may include
    questionnaires, on-site audits, third-party risk ratings, certifications review, and
    analysis of publicly available information. Continuous monitoring should track changes in
    supplier security posture, new vulnerabilities in supplied products, and changes in the
    threat landscape that may affect the supply chain relationship.
references:
  - citation: "NIST SP 800-161 Rev 1, Section 3.4"
    url: "https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"
  - citation: "NIST SP 800-53 Rev 5, SR-6"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated supplier health monitoring dashboards in the platform. Integrate
      third-party risk rating services to continuously score supplier security posture.
      Automate periodic reassessment workflows that trigger based on time, risk score
      changes, or security events. Maintain supplier assessment data in the service catalog
      linked to the components they provide. Implement automated alerts when supplier
      risk ratings fall below acceptable thresholds.
    tools:
      - "Backstage Software Catalog"
      - "BitSight / SecurityScorecard (API integration)"
      - "Dependency-Track"
      - "OpenSSF Scorecard"
      - "Grafana (supplier risk dashboards)"
  devsecops:
    prose: >-
      Integrate supplier security posture checks into CI/CD pipelines. Block builds that
      introduce dependencies from suppliers that fail assessment criteria. Automate checks
      against OpenSSF Scorecard for open-source dependencies to monitor upstream project
      health. Generate supplier risk reports as pipeline artifacts. Implement webhook
      integrations with vendor risk platforms to trigger pipeline reassessments when
      supplier risk profiles change.
    tools:
      - "OpenSSF Scorecard"
      - "Socket.dev"
      - "GitLab Dependency Scanning"
      - "Renovate (dependency health monitoring)"
      - "CI/CD webhook integrations"
  secops:
    prose: >-
      Operate a third-party risk management program with defined assessment schedules
      and criteria. Conduct due diligence assessments for new suppliers and periodic
      reassessments for existing ones. Monitor supplier breach notifications and security
      advisories. Maintain supplier risk profiles in the GRC platform and correlate with
      threat intelligence. Escalate supplier risk changes to appropriate stakeholders
      and initiate risk response activities when thresholds are exceeded.
    tools:
      - "Third-Party Risk Management (BitSight, SecurityScorecard, Prevalent)"
      - "GRC Platforms (ServiceNow, Archer, OneTrust)"
      - "Vendor Assessment Frameworks (SIG, CAIQ)"
      - "Threat Intelligence Platforms"
