id: cvm-175
title: "Resolucao CVM n. 175/2022 -- Marco Regulatorio dos Fundos de Investimento"
short_title: "CVM 175"
version: "175/2022"
publication_date: "2022-12-23"
last_updated: "2023-10-02"
effective_date: "2023-10-02"
