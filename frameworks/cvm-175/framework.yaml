control_families:
  - id: disposicoes-gerais
    title: "Disposicoes Gerais"
    description: "Definicoes, classificacao de fundos de investimento, constituicao, registro e forma juridica dos fundos"
    articles: "art. 1 ao art. 6"
    control_count: 3
  - id: administracao-gestao
    title: "Administracao e Gestao"
    description: "Deveres e responsabilidades do administrador e do gestor, segregacao de funcoes, diligencia e lealdade"
    articles: "art. 7 ao art. 18"
    control_count: 5
  - id: custodia-controladoria
    title: "Custodia e Controladoria"
    description: "Custodia qualificada de ativos, precificacao, conciliacao de posicoes, marcacao a mercado e guarda de ativos"
    articles: "art. 19 ao art. 25"
    control_count: 4
  - id: gestao-riscos
    title: "Gestao de Riscos"
    description: "Politica de gestao de riscos, limites de exposicao, stress test, gestao de liquidez e risco de contraparte"
    articles: "art. 26 ao art. 35"
    control_count: 4
  - id: informacoes-transparencia
    title: "Informacoes e Transparencia"
    description: "Regulamento do fundo, lamina de informacoes essenciais, relatorios periodicos, fato relevante e divulgacao"
    articles: "art. 36 ao art. 47"
    control_count: 4
  - id: criptoativos
    title: "Investimentos em Criptoativos e Ativos Virtuais"
    description: "Anexo normativo V -- requisitos para fundos que investem em criptoativos, DLT, custodias digitais e limites de exposicao"
    articles: "anexo V, art. 1 ao art. 8"
    control_count: 3
  - id: distribuicao-suitability
    title: "Distribuicao e Suitability"
    description: "Adequacao ao perfil do investidor (API), classificacao de investidores, material publicitario e vedacoes"
    articles: "art. 48 ao art. 56"
    control_count: 3
  - id: controles-internos
    title: "Controles Internos e Compliance"
    description: "Segregacao de atividades, chinese wall, conflito de interesses, programa de compliance e canal de denuncia"
    articles: "art. 57 ao art. 66"
    control_count: 4
  - id: prestadores-servicos
    title: "Prestadores de Servicos Essenciais"
    description: "Auditor independente, custodiante, escriturador, distribuidor e demais prestadores contratados"
    articles: "art. 67 ao art. 76"
    control_count: 3
  - id: disposicoes-finais
    title: "Disposicoes Finais e Transitorias"
    description: "Regras de transicao, adequacao de fundos existentes, penalidades e vigencia"
    articles: "art. 77 ao art. 84"
    control_count: 2
related_frameworks:
  - framework_id: bcb-304
    relationship: complements
    description: >-
      A Resolucao BCB 304 trata da politica de investimento e gestao de riscos de
      instituicoes financeiras, complementando a CVM 175 que regulamenta os fundos de
      investimento como veiculos receptores desses investimentos.
  - framework_id: cvm-135
    relationship: complements
    description: "A CVM 135 regulamenta as ofertas publicas de distribuicao de valores mobiliarios, complementando a CVM 175 na distribuicao de cotas de fundos de investimento ao publico."
  - framework_id: cvm-50
    relationship: complements
    description: "A CVM 50 trata de PLD/FT no mercado de capitais. Fundos de investimento regulados pela CVM 175 devem cumprir os controles de prevencao a lavagem de dinheiro da CVM 50."
  - framework_id: cvm-35
    relationship: complements
    description: "A CVM 35 trata de seguranca cibernetica para participantes do mercado de capitais. Administradores e gestores de fundos regulados pela CVM 175 devem cumprir a CVM 35."
  - framework_id: lgpd
    relationship: complements
    description: "A LGPD complementa a CVM 175 na protecao de dados pessoais de cotistas e investidores, exigindo base legal, consentimento e medidas de seguranca no tratamento de dados."
