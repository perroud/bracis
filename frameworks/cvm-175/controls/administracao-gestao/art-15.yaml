id: art-15
family: administracao-gestao
title: "Responsabilidade Solidaria e Limitacao de Responsabilidade"
class: CVM-175
baselines: [fundos-investimento]
statement:
  prose: |
    Art. 15. O administrador e o gestor respondem perante a CVM, na esfera de
    suas respectivas competências, por seus atos e omissões contrários à lei,
    ao regulamento do fundo e às normas da CVM.

    Parágrafo 1. A responsabilidade do administrador e do gestor pelos atos
    dos demais prestadores de serviços contratados em nome do fundo é limitada
    à culpa in eligendo e culpa in vigilando.

    Parágrafo 2. O regulamento do fundo pode prever a limitação da
    responsabilidade do cotista ao valor de suas cotas, desde que o fundo
    adote práticas de gestão de riscos e controles internos compatíveis com
    a natureza e complexidade de suas operações.
guidance:
  prose: |
    O art. 15 define o regime de responsabilidade no ecossistema do fundo.

    **Responsabilidade por competencia:**
    Cada prestador responde na esfera de suas competencias. O administrador
    responde pela administracao; o gestor, pela gestao da carteira. Nao ha
    responsabilidade automatica de um pelos atos do outro.

    **Culpa in eligendo e in vigilando:**
    Quando o fundo contrata terceiros (custodiante, auditor, escriturador),
    o administrador/gestor respondem por: (i) culpa in eligendo -- escolha
    inadequada do prestador; (ii) culpa in vigilando -- falha na supervisao
    do prestador. Isso exige due diligence na contratacao e monitoramento
    continuo de prestadores.

    **Limitacao de responsabilidade do cotista:**
    Novidade da CVM 175: o regulamento pode prever que a responsabilidade
    do cotista se limita ao valor de suas cotas (protecao patrimonial).
    Porem, isso exige que o fundo tenha gestao de riscos e controles internos
    robustos. Sem controles adequados, nao ha limitacao.

    **Implicacao para tecnologia:**
    Sistemas devem registrar evidencias de due diligence na contratacao e
    monitoramento de prestadores. A limitacao de responsabilidade do cotista
    depende de controles internos comprovadamente implementados.
implementation_guidance:
  platform_engineering:
    prose: |
      **Due diligence de prestadores:**
      1. Sistema de gestao de terceiros com cadastro, avaliacao e monitoramento
         de todos os prestadores contratados pelo fundo.
      2. Workflow automatizado de due diligence na contratacao: checklist de
         requisitos, documentos obrigatorios, aprovacoes.
      3. Dashboard de monitoramento de prestadores: SLA, incidentes, auditorias.

      **Controles para limitacao de responsabilidade:**
      4. Implementar e documentar controles internos exigidos para viabilizar
         a limitacao de responsabilidade do cotista.
      5. Pipeline de monitoramento de riscos integrado com alertas automaticos.
    tools:
      - git
      - terraform
      - vault
      - gitlab-ci
  devsecops:
    prose: |
      **Rastreabilidade de supervisao:**
      1. Logs de monitoramento de prestadores: acoes de supervisao, reunioes,
         avaliacoes, incidentes reportados.
      2. Pipeline de validacao de contratos e SLAs de prestadores.
      3. Testes automatizados de integracao com sistemas de prestadores.

      **Evidencias de controles internos:**
      4. Cobertura de testes de seguranca como evidencia de controles robustos.
      5. Relatorios automatizados de postura de conformidade.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dependency-scanning
      - sonarqube
  secops:
    prose: |
      **Monitoramento de riscos de prestadores:**
      1. Avaliacao periodica de risco de cada prestador contratado.
      2. Alertas para degradacao de servico, incidentes de seguranca ou
         descumprimento de SLA por prestadores.
      3. Plano de contingencia para substituicao de prestadores criticos.

      **Auditoria de controles internos:**
      4. Auditoria anual de controles internos para manter a limitacao de
         responsabilidade do cotista.
      5. Evidencias documentadas e organizadas por artigo da CVM 175.
    tools:
      - grc-platform
      - siem
      - compliance-scanner
