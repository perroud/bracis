id: art-7
family: administracao-gestao
title: "Deveres do Administrador"
class: CVM-175
baselines: [fundos-investimento]
statement:
  prose: |
    Art. 7. O administrador do fundo de investimento é responsável pela
    administração do fundo e pela prestação de informações à CVM, aos cotistas
    e ao mercado, devendo atuar com diligência, lealdade, transparência e boa-fé,
    sempre no interesse dos cotistas.

    Parágrafo 1. São deveres do administrador, sem prejuízo de outros previstos
    nesta Resolução: I - diligenciar para que sejam mantidos, às suas expensas,
    atualizados e em perfeita ordem os documentos relativos ao fundo; II - elaborar
    e divulgar as informações periódicas e eventuais do fundo; III - custear as
    despesas com a elaboração e distribuição do material de divulgação do fundo;
    IV - tomar as providências necessárias para o perfeito funcionamento do fundo.

    Parágrafo 2. O administrador responde civilmente perante os cotistas pelos
    prejuízos que lhes causar por ação ou omissão, inclusive por descumprimento
    desta Resolução.
guidance:
  prose: |
    O art. 7 estabelece os deveres fiduciarios centrais do administrador de fundos.
    O administrador e o responsavel legal perante a CVM e os cotistas pela
    integridade operacional e informacional do fundo.

    **Deveres fiduciarios:**
    Diligencia, lealdade, transparencia e boa-fe constituem os quatro pilares
    do dever fiduciario. O administrador deve agir SEMPRE no interesse dos cotistas,
    nunca em interesse proprio ou de terceiros.

    **Responsabilidade civil:**
    O paragrafo 2 estabelece responsabilidade civil direta do administrador.
    Prejuizos causados por acao OU omissao geram obrigacao de reparacao. Isso
    inclui falhas de sistemas, perdas por fraude nao detectada e erros operacionais.

    **Documentacao e informacoes:**
    O administrador deve manter documentos atualizados e em "perfeita ordem".
    Isso exige controles sistematicos de gestao documental, versionamento e
    rastreabilidade. Sistemas de TI sao ferramentas essenciais para cumprir
    este dever.

    **Custeio de despesas:**
    O administrador custeia a elaboracao e divulgacao de materiais. Nao pode
    repassar esses custos ao fundo sem previsao no regulamento.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao documental automatizada:**
      1. Repositorio Git centralizado para documentos de cada fundo: regulamento,
         demonstracoes financeiras, relatorios, comunicados.
      2. Workflow de aprovacao para publicacao de documentos: revisao por compliance,
         aprovacao pelo administrador, publicacao automatica.
      3. Versionamento completo com historico de alteracoes e responsavel.

      **Infraestrutura de divulgacao:**
      4. API/portal para divulgacao de informacoes periodicas e eventuais.
      5. Pipeline automatizado de geracao de relatorios (composicao de carteira,
         rentabilidade, riscos).
      6. Monitoramento de SLA de disponibilidade dos canais de divulgacao.
    tools:
      - git
      - gitlab-ci
      - terraform
      - vault
  devsecops:
    prose: |
      **Rastreabilidade de acoes do administrador:**
      1. Audit trail de todas as acoes do administrador em sistemas: aprovacoes,
         publicacoes, alteracoes de parametros.
      2. Logs imutaveis de decisoes do administrador com timestamp e evidencia.
      3. Pipeline de validacao de documentos antes de publicacao.

      **Integridade de dados:**
      4. Testes automatizados para consistencia de dados divulgados (NAV,
         rentabilidade, composicao de carteira).
      5. Assinatura digital de documentos oficiais do fundo.
      6. Secret detection para prevenir vazamento de dados de cotistas.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-secret-detection
      - sonarqube
  secops:
    prose: |
      **Monitoramento de deveres:**
      1. Dashboard de cumprimento de deveres do administrador: prazos de reporte,
         publicacoes pendentes, documentos desatualizados.
      2. Alertas para descumprimento iminente de prazos regulatorios.
      3. Metricas de diligencia: tempo de resposta a cotistas, tempo de publicacao
         de informacoes, incidentes operacionais.

      **Auditoria de atuacao:**
      4. Revisao periodica de aderencia do administrador aos deveres fiduciarios.
      5. Investigacao de reclamacoes de cotistas.
      6. Evidencias de atuacao no interesse dos cotistas documentadas e arquivadas.
    tools:
      - grc-platform
      - siem
      - compliance-scanner
