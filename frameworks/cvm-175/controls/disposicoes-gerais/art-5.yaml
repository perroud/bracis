id: art-5
family: disposicoes-gerais
title: "Constituicao e Registro do Fundo"
class: CVM-175
baselines: [fundos-investimento]
statement:
  prose: |
    Art. 5. O fundo de investimento deve ser constituído por deliberação do
    administrador, que deve providenciar o registro do fundo e de suas classes
    de cotas na CVM, apresentando os documentos e informações exigidos por
    esta Resolução.

    Parágrafo 1. O regulamento do fundo deve ser registrado em cartório de
    títulos e documentos.

    Parágrafo 2. O fundo de investimento somente pode iniciar suas atividades
    após a obtenção do registro na CVM.

    Parágrafo 3. O administrador deve manter atualizados perante a CVM os
    dados cadastrais do fundo e de suas classes de cotas.
guidance:
  prose: |
    O art. 5 define o processo formal de constituicao de um fundo de investimento.
    E um ato unilateral do administrador, nao uma assembleia de cotistas.

    **Requisitos para constituicao:**
    O administrador deve: (i) deliberar a constituicao; (ii) elaborar o
    regulamento; (iii) registrar o regulamento em cartorio; (iv) solicitar
    registro na CVM; (v) obter CNPJ do fundo; (vi) contratar prestadores
    essenciais (custodiante, auditor, escriturador).

    **Registro obrigatorio na CVM:**
    O fundo NAO pode iniciar atividades sem registro na CVM. Captar recursos
    ou realizar investimentos antes do registro configura infracao grave.

    **Manutencao cadastral:**
    O administrador deve manter dados atualizados no sistema da CVM (CVMWeb).
    Alteracoes de prestadores, regulamento e informacoes cadastrais devem ser
    comunicadas nos prazos regulatorios.

    **Classes de cotas (novidade CVM 175):**
    A CVM 175 introduz o conceito de classes de cotas com patrimonio segregado
    dentro de um mesmo fundo. Cada classe deve ser registrada separadamente.
implementation_guidance:
  platform_engineering:
    prose: |
      **Workflow de constituicao como codigo:**
      1. Pipeline automatizado para onboarding de novos fundos: checklist de
         documentos, validacao de dados cadastrais, registro em sistemas internos.
      2. Integracao com CVMWeb para submissao e atualizacao de dados cadastrais.
      3. Repositorio Git com regulamentos versionados de cada fundo, incluindo
         historico de alteracoes com data e aprovacao.

      **Automacao cadastral:**
      4. Alertas automaticos para dados cadastrais desatualizados ou pendentes.
      5. Validacao automatica de completude de documentos obrigatorios antes
         de submissao a CVM.
      6. Ambiente segregado para cada fundo/classe desde a constituicao.
    tools:
      - git
      - terraform
      - vault
      - gitlab-ci
  devsecops:
    prose: |
      **Rastreabilidade de constituicao:**
      1. Audit trail completo do processo de constituicao: deliberacao,
         documentos submetidos, datas, aprovacoes.
      2. Pipeline de validacao de regulamentos: verificar se contem todas as
         clausulas obrigatorias da CVM 175.
      3. Versionamento de regulamentos com merge request e aprovacao obrigatoria.

      **Integridade documental:**
      4. Hashes criptograficos de documentos submetidos a CVM e ao cartorio.
      5. Assinatura digital de regulamentos e deliberacoes.
    tools:
      - gitlab-ci
      - gitlab-secret-detection
      - sonarqube
  secops:
    prose: |
      **Conformidade cadastral:**
      1. Dashboard de status cadastral: fundos com registro ativo, pendente
         ou suspenso na CVM.
      2. Monitoramento de prazos regulatorios para atualizacao cadastral.
      3. Auditoria periodica de completude de documentos de constituicao.

      **Controle de mudancas:**
      4. Historico de todas as alteracoes de regulamento e dados cadastrais.
      5. Evidencias de comunicacao tempestiva a CVM.
    tools:
      - grc-platform
      - compliance-scanner
