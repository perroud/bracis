id: art-71
family: prestadores-servicos
title: "Auditor Independente"
class: CVM-175
baselines: [fundos-investimento]
statement:
  prose: |
    Art. 71. As demonstrações financeiras do fundo de investimento devem ser
    auditadas por auditor independente registrado na CVM, que deve emitir
    parecer sobre a fidedignidade das demonstrações financeiras e a adequação
    das práticas contábeis adotadas.

    Parágrafo 1. O auditor independente deve: I - ser registrado na CVM;
    II - ser independente em relação ao administrador, ao gestor e aos demais
    prestadores de serviços do fundo; III - comunicar imediatamente ao
    administrador e à CVM qualquer irregularidade relevante detectada
    durante os trabalhos de auditoria.

    Parágrafo 2. O administrador deve substituir o auditor independente a
    cada cinco anos consecutivos de prestação de serviços ao mesmo fundo,
    assegurando a rotação de firmas de auditoria.

    Parágrafo 3. O auditor deve ter acesso irrestrito a todos os documentos,
    registros e informações do fundo necessários ao desempenho de suas funções.
guidance:
  prose: |
    O art. 71 regulamenta a auditoria independente de fundos, pilar de
    credibilidade e confianca no mercado.

    **Independencia do auditor:**
    O auditor deve ser independente de TODOS os participantes do fundo:
    administrador, gestor, custodiante. Conflitos de interesse entre auditor
    e auditado comprometem a qualidade da auditoria.

    **Rotacao obrigatoria (5 anos):**
    A mesma firma de auditoria nao pode auditar o mesmo fundo por mais de
    5 anos consecutivos. A rotacao previne "familiaridade" entre auditor e
    auditado, que pode comprometer a independencia.

    **Comunicacao de irregularidades:**
    O auditor tem obrigacao de comunicar irregularidades ao administrador E
    a CVM. E uma funcao de gatekeeping: o auditor e os "olhos" do regulador
    dentro do fundo.

    **Acesso irrestrito:**
    O auditor deve ter acesso a TUDO: documentos, sistemas, dados, pessoas.
    Restringir acesso do auditor e indicativo de irregularidade. Sistemas
    de TI devem prever perfis de acesso para auditores.
implementation_guidance:
  platform_engineering:
    prose: |
      **Acesso para auditores:**
      1. Perfil de acesso especifico para auditores: leitura ampla em sistemas
         financeiros, contabeis e operacionais, sem capacidade de modificacao.
      2. Data room digital para auditorias: repositorio seguro com documentos,
         extratos, relatorios e evidencias organizados por periodo.
      3. APIs de exportacao de dados para auditoria: balancetes, movimentacoes,
         posicoes, reconciliacoes.

      **Gestao de rotacao:**
      4. Controle de mandato do auditor: alerta automatico quando se aproxima
         do limite de 5 anos.
    tools:
      - vault
      - terraform
      - git
      - gitlab-ci
  devsecops:
    prose: |
      **Seguranca do acesso de auditores:**
      1. Acesso de auditores com perfil read-only, revogado automaticamente
         apos conclusao da auditoria.
      2. Logs de todos os acessos de auditores: o que acessaram, quando, quais
         dados consultaram.
      3. Secret detection para dados do data room: prevenir vazamento.

      **Integridade de dados auditados:**
      4. Hash de dados exportados para auditoria para garantir integridade.
      5. Audit trail de quem gerou e entregou dados ao auditor.
    tools:
      - gitlab-ci
      - gitlab-secret-detection
      - vault
  secops:
    prose: |
      **Monitoramento de auditoria:**
      1. Dashboard de auditorias: cronograma, status, achados, remediacoes.
      2. Tracking de achados de auditoria: cada achado deve ter plano de
         remediacacao com prazo e responsavel.
      3. Monitoramento de mandato do auditor: prazo de rotacao, planejamento
         de transicao.

      **Cooperacao com auditor:**
      4. Atendimento tempestivo de solicitacoes do auditor: SLA de resposta.
      5. Organizacao de evidencias por periodo e por area para facilitar
         o trabalho de auditoria.
    tools:
      - grc-platform
      - compliance-scanner
legal_references:
  - framework_id: cvm-35
    articles: ["art-8"]
    relationship: complements
