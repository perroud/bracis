id: art-74
family: prestadores-servicos
title: "Distribuidor de Cotas e Responsabilidades"
class: CVM-175
baselines: [fundos-investimento]
statement:
  prose: |
    Art. 74. A distribuição de cotas do fundo de investimento deve ser realizada
    por instituições intermediárias autorizadas pela CVM, podendo incluir o
    próprio administrador quando devidamente autorizado.

    Parágrafo 1. O distribuidor é responsável por: I - verificar a adequação
    do investimento ao perfil do investidor (suitability); II - prestar
    informações adequadas e suficientes ao investidor sobre o fundo;
    III - disponibilizar o regulamento, a lâmina de informações essenciais
    e demais documentos do fundo ao investidor previamente à aplicação;
    IV - receber e encaminhar ao escriturador as solicitações de aplicação
    e resgate.

    Parágrafo 2. O distribuidor pode receber remuneração do administrador
    pela distribuição de cotas (taxa de distribuição ou rebate), desde que
    divulgada ao investidor.

    Parágrafo 3. É vedado ao distribuidor condicionar a distribuição de
    cotas de um fundo à aquisição de outros produtos ou serviços.
guidance:
  prose: |
    O art. 74 regulamenta a distribuicao de cotas, a "porta de entrada" do
    investidor no fundo.

    **Distribuidor como intermediario:**
    O distribuidor e o intermediario entre o investidor e o fundo. Pode ser
    banco, corretora, plataforma digital ou o proprio administrador. Deve
    ser autorizado pela CVM.

    **Quatro responsabilidades centrais:**
    (i) Suitability: verificar adequacao ao perfil; (ii) Informacao: prestar
    informacoes suficientes; (iii) Documentacao: disponibilizar regulamento
    e lamina antes da aplicacao; (iv) Operacional: processar aplicacoes e
    resgates.

    **Transparencia de remuneracao (rebate):**
    A CVM 175 exige divulgacao do rebate ao investidor. O investidor deve
    saber que o distribuidor recebe remuneracao do administrador. Isso expoe
    potenciais conflitos de interesse: o distribuidor pode favorecer fundos
    que pagam mais rebate.

    **Venda casada vedada:**
    Proibido condicionar a compra de cotas a outros produtos (ex: "so
    aplica no fundo se abrir conta corrente"). E pratica abusiva prevista
    tambem no Codigo de Defesa do Consumidor.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de distribuicao:**
      1. Integracao com multiplos distribuidores via API padronizada:
         envio de documentos, processamento de aplicacoes/resgates,
         atualizacao de posicoes.
      2. Validacao automatica pre-aplicacao: suitability realizado, lamina
         disponibilizada, regulamento aceito.
      3. Disclosure de remuneracao: informar automaticamente ao investidor
         a taxa de distribuicao/rebate.

      **Monitoramento de distribuidores:**
      4. Dashboard de distribuidores: volume distribuido, suitability
         realizado, documentos entregues, reclamacoes.
      5. Alertas para distribuidores com indicadores anomalos.
    tools:
      - terraform
      - vault
      - git
      - gitlab-ci
  devsecops:
    prose: |
      **Seguranca da plataforma de distribuicao:**
      1. SAST para API de distribuicao: falhas podem permitir aplicacoes
         sem suitability ou sem documentacao.
      2. Testes automatizados de fluxo de distribuicao: aplicacao, resgate,
         validacao de documentos, suitability.
      3. Secret detection para credenciais de API de distribuidores.

      **Integridade de transacoes:**
      4. Audit trail de todas as transacoes de distribuicao: quem aplicou,
         quando, por qual distribuidor, suitability realizado.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-secret-detection
      - gitlab-dependency-scanning
  secops:
    prose: |
      **Monitoramento de distribuicao:**
      1. Monitoramento de concentracao: verificar se um distribuidor
         concentra volume excessivo (risco operacional).
      2. Alertas para: aplicacoes sem suitability, documentos nao entregues,
         venda casada.
      3. Metricas de qualidade de distribuicao: taxa de reclamacoes,
         suitability realizado, documentos entregues.

      **Auditoria de distribuidores:**
      4. Auditoria periodica de distribuidores: verificar suitability,
         documentacao, transparencia de rebate.
      5. Mystery shopping: simular experiencia de investidor para avaliar
         qualidade do atendimento.
    tools:
      - grc-platform
      - compliance-scanner
      - siem
