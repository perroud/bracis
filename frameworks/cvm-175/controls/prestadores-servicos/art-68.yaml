id: art-68
family: prestadores-servicos
title: "Contratacao e Supervisao de Prestadores Essenciais"
class: CVM-175
baselines: [fundos-investimento]
statement:
  prose: |
    Art. 68. O administrador do fundo é responsável pela contratação e supervisão
    dos prestadores de serviços essenciais do fundo, incluindo gestor, custodiante,
    auditor independente, escriturador e distribuidor de cotas.

    Parágrafo 1. A contratação de prestadores de serviços essenciais deve
    observar: I - due diligence prévia sobre a capacidade técnica, operacional
    e financeira do prestador; II - formalização em contrato escrito que
    estabeleça obrigações, responsabilidades e níveis de serviço; III -
    verificação de que o prestador possui os registros e autorizações
    exigidos pela regulamentação aplicável.

    Parágrafo 2. O administrador deve supervisionar continuamente os prestadores
    de serviços contratados, monitorando o cumprimento das obrigações
    contratuais e regulatórias.

    Parágrafo 3. A substituição de prestador de serviço essencial deve ser
    comunicada à CVM e aos cotistas nos prazos regulatórios.
guidance:
  prose: |
    O art. 68 regulamenta a cadeia de prestadores de servicos de um fundo.
    A CVM 175 reconhece que o fundo e uma operacao que depende de multiplos
    agentes especializados.

    **Prestadores essenciais:**
    Gestor, custodiante, auditor independente, escriturador e distribuidor.
    Cada um possui funcao critica e insubstituivel. A falha de qualquer um
    pode prejudicar cotistas.

    **Due diligence na contratacao (culpa in eligendo):**
    O administrador deve avaliar ANTES de contratar: capacidade tecnica
    (sabe fazer?), operacional (tem estrutura?) e financeira (vai sobreviver?).
    Contratar sem due diligence configura culpa in eligendo.

    **Supervisao continua (culpa in vigilando):**
    Contratar nao e suficiente. O administrador deve monitorar continuamente:
    SLAs estao sendo cumpridos? Obrigacoes regulatorias estao sendo atendidas?
    Incidentes estao sendo tratados? Falha na supervisao configura culpa
    in vigilando.

    **Comunicacao de substituicao:**
    Trocar um prestador essencial e fato relevante. Deve ser comunicado a
    CVM e aos cotistas. O mercado precisa saber se o custodiante ou o
    auditor mudou.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de terceiros:**
      1. Plataforma de gestao de prestadores: cadastro, due diligence,
         contratos, SLAs, monitoramento, avaliacoes.
      2. Workflow de contratacao: checklist de due diligence, coleta de
         documentos, aprovacoes, formalizacao de contrato.
      3. Dashboard de prestadores: status de cada prestador, SLAs cumpridos,
         incidentes, avaliacoes de risco.

      **Monitoramento automatizado:**
      4. Integracao com sistemas de prestadores para monitoramento de SLAs
         em tempo real (uptime, tempo de resposta, erros).
      5. Alertas para degradacao de servico ou descumprimento de SLA.
    tools:
      - git
      - terraform
      - gitlab-ci
      - vault
  devsecops:
    prose: |
      **Seguranca de integracoes:**
      1. Revisao de seguranca de APIs de prestadores antes da integracao.
      2. Secret detection para credenciais de acesso a sistemas de prestadores.
      3. Dependency scanning para SDKs e bibliotecas fornecidas por prestadores.
      4. Testes de integracao automatizados com sistemas de prestadores.

      **Auditoria de acessos:**
      5. Logs de todas as comunicacoes e acessos entre sistemas do fundo e
         de prestadores.
      6. Revisao periodica de acessos concedidos a prestadores.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-secret-detection
      - gitlab-dependency-scanning
  secops:
    prose: |
      **Monitoramento de prestadores:**
      1. Avaliacao de risco de prestadores: classificacao por criticidade
         e risco, revisada semestralmente.
      2. Monitoramento de continuidade: prestador possui BCP? Testou
         recentemente?
      3. Alertas para: registros CVM vencidos, mudancas societarias,
         sancoes regulatorias contra prestadores.

      **Auditoria de terceiros:**
      4. Auditoria anual de prestadores criticos: visita, verificacao de
         controles, avaliacao de capacidade.
      5. Plano de contingencia: substitutos identificados para cada
         prestador essencial.
    tools:
      - grc-platform
      - siem
      - compliance-scanner
