id: art-82
family: disposicoes-finais
title: "Penalidades e Sancoes Administrativas"
class: CVM-175
baselines: [fundos-investimento]
statement:
  prose: |
    Art. 82. O descumprimento das disposições desta Resolução sujeita o infrator
    às sanções administrativas previstas na legislação do mercado de valores
    mobiliários, incluindo: I - advertência; II - multa; III - suspensão do
    exercício do cargo ou atividade; IV - inabilitação temporária para o
    exercício de cargo ou atividade; V - cassação da autorização ou registro
    para o exercício de atividade.

    Parágrafo 1. A aplicação das sanções deve considerar a natureza e a gravidade
    da infração, a vantagem auferida ou pretendida pelo infrator, o arrependimento
    eficaz, os antecedentes do infrator e a reincidência.

    Parágrafo 2. As sanções previstas neste artigo podem ser aplicadas
    cumulativamente, inclusive de forma proporcional a cada infração identificada.

    Parágrafo 3. As sanções não excluem eventuais responsabilidades civis
    e criminais dos infratores.
guidance:
  prose: |
    O art. 82 define o regime sancionatorio. Conhecer as sancoes e essencial
    para avaliar o risco de descumprimento.

    **Escala de sancoes:**
    A CVM pode aplicar sancoes de gravidade crescente: advertencia (leve),
    multa (moderada a grave), suspensao (grave), inabilitacao (muito grave)
    e cassacao (extrema). A escala permite dosimetria proporcional.

    **Criterios de dosimetria:**
    Gravidade, vantagem auferida, arrependimento, antecedentes e reincidencia.
    Um primeiro descumprimento leve pode resultar em advertencia; um
    descumprimento grave reincidente pode resultar em cassacao.

    **Cumulatividade:**
    Sancoes podem ser cumuladas: multa + suspensao, por exemplo. Cada
    infracao identificada pode receber sancao propria.

    **Responsabilidade tripla:**
    Sancoes administrativas (CVM) + responsabilidade civil (cotistas podem
    processar) + responsabilidade criminal (se houver crime). O descumprimento
    da CVM 175 pode ter consequencias em tres esferas.

    **Impacto em sistemas:**
    O risco de sancoes justifica investimento em controles automatizados.
    O custo de implementar controles e sempre menor que o custo de sancoes
    CVM + acoes civis + danos reputacionais.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de risco regulatorio:**
      1. Matriz de risco regulatorio: para cada obrigacao da CVM 175, mapear
         probabilidade de descumprimento e impacto potencial (sancao + dano).
      2. Automacao de controles para obrigacoes de maior risco: investir
         proporcionalmente ao impacto potencial.
      3. Sistema de evidencias: para cada obrigacao, manter evidencia
         automatizada de conformidade.

      **Preparacao para fiscalizacao:**
      4. Portal de evidencias para fiscalizacao: documentos, relatorios e
         registros organizados por artigo da CVM 175, prontos para
         apresentacao a CVM.
    tools:
      - git
      - terraform
      - gitlab-ci
      - vault
  devsecops:
    prose: |
      **Automacao de conformidade:**
      1. Pipeline de conformidade continua: checks automatizados para cada
         obrigacao da CVM 175, executados periodicamente.
      2. Dashboard de conformidade com status verde/amarelo/vermelho para
         cada controle.
      3. Alertas para gaps de conformidade detectados.

      **Rastreabilidade:**
      4. Audit trail completo de todas as acoes regulatorias: quem fez o que,
         quando, evidencia.
      5. Historico imutavel de conformidade para defesa em processos
         administrativos.
    tools:
      - gitlab-ci
      - gitlab-sast
      - sonarqube
  secops:
    prose: |
      **Monitoramento de risco regulatorio:**
      1. Dashboard de exposicao regulatoria: obrigacoes com maior risco de
         descumprimento, sancoes potenciais, status de remediacoes.
      2. Monitoramento de processos administrativos da CVM contra
         administradores e gestores do mercado.
      3. Benchmark: comparar postura de conformidade com peers do setor.

      **Resposta a fiscalizacao:**
      4. Playbook de resposta a fiscalizacao: procedimentos, responsaveis,
         prazos, documentos.
      5. Drill de fiscalizacao: simular visita da CVM e testar capacidade
         de resposta.
    tools:
      - grc-platform
      - compliance-scanner
      - siem
