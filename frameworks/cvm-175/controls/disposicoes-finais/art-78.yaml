id: art-78
family: disposicoes-finais
title: "Regras de Transicao e Adequacao"
class: CVM-175
baselines: [fundos-investimento]
statement:
  prose: |
    Art. 78. Os fundos de investimento constituídos antes da entrada em vigor
    desta Resolução devem adequar seus regulamentos, políticas e procedimentos
    às disposições desta norma no prazo de 12 (doze) meses contados da data
    de entrada em vigor.

    Parágrafo 1. O administrador deve elaborar plano de adequação que contemple:
    I - cronograma detalhado das adequações necessárias; II - identificação
    dos impactos das alterações para os cotistas; III - estratégia de
    comunicação aos cotistas sobre as alterações.

    Parágrafo 2. As alterações de regulamento necessárias para adequação a
    esta Resolução independem de assembleia geral de cotistas, desde que não
    resultem em aumento de taxas ou alteração da política de investimento.

    Parágrafo 3. O administrador deve comunicar à CVM a conclusão do processo
    de adequação, acompanhada de declaração de que o fundo se encontra em
    conformidade com as disposições desta Resolução.
guidance:
  prose: |
    O art. 78 estabelece as regras de transicao para fundos existentes. A
    CVM 175 e uma reforma profunda que exige adequacao de todos os fundos
    constituidos sob as normas anteriores.

    **Prazo de 12 meses:**
    Fundos existentes tiveram 12 meses a partir de outubro/2023 para se
    adequar (ate outubro/2024). Administradores que nao adequaram estao
    em descumprimento.

    **Plano de adequacao:**
    O administrador deve ter um plano formal: o que precisa mudar, quando,
    como impacta cotistas e como sera comunicado. Nao e adequacao "no susto":
    e planejada e documentada.

    **Dispensa de assembleia (limitada):**
    Alteracoes de regulamento para adequacao a CVM 175 nao exigem assembleia,
    EXCETO se aumentarem taxas ou alterarem a politica de investimento. Isso
    agiliza a transicao sem prejudicar cotistas.

    **Comunicacao a CVM:**
    O administrador deve informar a CVM quando concluir a adequacao. A CVM
    pode verificar a autodeclaracao via fiscalizacao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de adequacao:**
      1. Sistema de tracking de adequacao: cada fundo com checklist de
         alteracoes necessarias, status e prazo.
      2. Pipeline de migracao de sistemas: adaptar parametros, regras e
         configuracoes de cada fundo para a CVM 175.
      3. Ambiente de staging para testar adequacoes antes de ativar em
         producao.

      **Comunicacao automatizada:**
      4. Templates de comunicacao a cotistas sobre alteracoes de regulamento.
      5. Pipeline de envio de declaracao de adequacao a CVM.
    tools:
      - git
      - terraform
      - gitlab-ci
      - vault
  devsecops:
    prose: |
      **Validacao de adequacao:**
      1. Testes de regressao para cada fundo adequado: verificar que a
         adequacao nao quebrou funcionalidades existentes.
      2. Pipeline de validacao de conformidade: cada fundo deve passar em
         todos os checks da CVM 175 apos adequacao.
      3. Diff automatizado entre regulamento antigo e novo para evidenciar
         alteracoes.

      **Controle de versao:**
      4. Versionamento rigoroso: regulamento pre-CVM-175 e pos-CVM-175
         armazenados com historico completo.
    tools:
      - gitlab-ci
      - gitlab-sast
      - sonarqube
  secops:
    prose: |
      **Monitoramento de adequacao:**
      1. Dashboard de progresso: quantos fundos ja foram adequados, quantos
         estao pendentes, quais estao atrasados.
      2. Alertas para fundos com prazo de adequacao expirado.
      3. Relatorio de riscos de nao adequacao: implicacoes regulatorias,
         sancoes possiveis.

      **Auditoria de adequacao:**
      4. Verificar que cada fundo adequado efetivamente cumpre todas as
         disposicoes da CVM 175 (nao apenas alterou o regulamento).
      5. Amostragem de fundos para auditoria profunda de conformidade.
    tools:
      - grc-platform
      - compliance-scanner
legal_references:
