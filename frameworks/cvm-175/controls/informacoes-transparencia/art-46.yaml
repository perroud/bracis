id: art-46
family: informacoes-transparencia
title: "Fato Relevante e Comunicacao ao Mercado"
class: CVM-175
baselines: [fundos-investimento]
statement:
  prose: |
    Art. 46. O administrador deve divulgar imediatamente, por meio de comunicação
    dirigida aos cotistas e de publicação no sistema eletrônico da CVM, qualquer
    fato relevante que possa influir de modo ponderável na decisão do investidor
    de adquirir, manter ou resgatar cotas do fundo.

    Parágrafo 1. Consideram-se fatos relevantes, sem prejuízo de outros:
    I - alteração na política de investimento ou nos limites de risco;
    II - substituição do administrador, gestor ou custodiante; III - fechamento
    do fundo para resgates; IV - incorporação, cisão ou fusão do fundo;
    V - inadimplência de emissores de ativos da carteira que represente
    impacto relevante no patrimônio do fundo; VI - eventos que possam
    impactar significativamente o valor da cota.

    Parágrafo 2. A divulgação de fato relevante deve ser feita de forma clara,
    precisa e em linguagem acessível.
guidance:
  prose: |
    O art. 46 regulamenta a divulgacao de fatos relevantes -- informacoes que
    podem impactar a decisao do investidor.

    **Imediaticidade:**
    A divulgacao deve ser IMEDIATA. Nao ha prazo toleravel. Assim que o fato
    relevante ocorre ou e conhecido, deve ser divulgado. Atrasos podem configurar
    insider trading ou manipulacao de mercado.

    **Criterio de materialidade:**
    O fato e relevante se "pode influir de modo ponderavel" na decisao do
    investidor. E um criterio qualitativo e quantitativo. Eventos como
    substituicao de gestor, fechamento para resgates e inadimplencia material
    sao sempre relevantes.

    **Dupla divulgacao:**
    Comunicacao direta aos cotistas + publicacao no sistema da CVM. Ambos devem
    ocorrer simultaneamente. A comunicacao so aos cotistas sem publicacao na CVM
    (ou vice-versa) e insuficiente.

    **Clareza e acessibilidade:**
    A linguagem deve ser acessivel. Fato relevante escrito em juridiques
    incompreensivel nao cumpre a norma.
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de divulgacao de fatos relevantes:**
      1. Workflow de fato relevante: deteccao do evento, redacao da comunicacao,
         aprovacao por compliance, publicacao simultanea em todos os canais.
      2. Integracao com sistema da CVM para publicacao automatica.
      3. Multicanal: email a cotistas, portal do fundo, sistema CVM, distribuidores.

      **Deteccao automatizada:**
      4. Alertas automaticos para eventos que podem constituir fato relevante:
         inadimplencia de emissores, variacao abrupta de NAV, violacao de limites.
      5. Workflow de avaliacao: evento detectado -> compliance avalia se e fato
         relevante -> se sim, publica imediatamente.
    tools:
      - gitlab-ci
      - terraform
      - vault
      - git
  devsecops:
    prose: |
      **Rastreabilidade de divulgacao:**
      1. Audit trail de todo o processo: hora do evento, hora da deteccao,
         hora da redacao, hora da aprovacao, hora da publicacao.
      2. Templates de fato relevante versionados em repositorio Git.
      3. Pipeline de publicacao com validacao de formato e conteudo minimo.

      **Seguranca de informacoes privilegiadas:**
      4. Controle de acesso restrito a informacoes pre-divulgacao (inside
         information) ate a publicacao.
      5. Secret detection para prevenir vazamento de informacoes privilegiadas.
    tools:
      - gitlab-ci
      - gitlab-secret-detection
      - vault
  secops:
    prose: |
      **Monitoramento de eventos relevantes:**
      1. SIEM com regras de deteccao de eventos que podem constituir fato
         relevante: inadimplencia, variacao de NAV, falha operacional grave.
      2. Dashboard de fatos relevantes: historico, tempo de divulgacao,
         canais utilizados.
      3. Metricas de tempestividade: tempo entre evento e divulgacao.

      **Auditoria de divulgacao:**
      4. Verificar que todos os fatos relevantes foram divulgados tempestivamente.
      5. Avaliar se a linguagem foi acessivel e o conteudo suficiente.
    tools:
      - siem
      - grc-platform
      - compliance-scanner
