id: art-37
family: informacoes-transparencia
title: "Regulamento do Fundo"
class: CVM-175
baselines: [fundos-investimento]
statement:
  prose: |
    Art. 37. O regulamento do fundo de investimento é o documento que disciplina
    o funcionamento do fundo e estabelece os direitos e obrigações dos cotistas
    e do administrador.

    Parágrafo 1. O regulamento deve conter, no mínimo: I - denominação do fundo;
    II - classificação do fundo conforme esta Resolução; III - prazo de duração;
    IV - política de investimento; V - limites de concentração e exposição a risco;
    VI - taxa de administração e demais encargos; VII - condições de aplicação e
    resgate de cotas; VIII - política de distribuição de resultados; IX - regras
    de assembleia geral; X - informações sobre o administrador, gestor e demais
    prestadores de serviços essenciais.

    Parágrafo 2. Alterações no regulamento que afetem direitos dos cotistas
    dependem de aprovação em assembleia geral.
guidance:
  prose: |
    O art. 37 define o regulamento como o documento central de governanca do
    fundo. E o "contrato social" entre cotistas e administrador.

    **Conteudo minimo obrigatorio:**
    A CVM define dez itens minimos que todo regulamento deve conter. A ausencia
    de qualquer item configura irregularidade. Sistemas de compliance devem
    validar a completude do regulamento.

    **Politica de investimento:**
    Define quais ativos o fundo pode investir, em quais mercados, com quais
    limites. E a base para toda a gestao de carteira e de riscos. Qualquer
    investimento fora da politica e irregular.

    **Alteracoes e assembleia:**
    Alteracoes que afetam direitos de cotistas exigem assembleia. Isso inclui:
    mudanca de politica de investimento, aumento de taxas, alteracao de prazo
    de resgate. E uma protecao democratica dos cotistas.

    **Versionamento critico:**
    O regulamento muda ao longo do tempo. Cada versao deve ser rastreavel:
    qual era a versao vigente em uma data especifica? Essa informacao e
    essencial para auditorias e disputas.
implementation_guidance:
  platform_engineering:
    prose: |
      **Regulamento como codigo:**
      1. Regulamento versionado em repositorio Git com historico completo de
         alteracoes, datas de vigencia e aprovacoes.
      2. Extrair regras executaveis do regulamento: limites de concentracao,
         politica de investimento, horarios de movimentacao.
      3. Pipeline de validacao: verificar se regulamento contem todos os
         itens obrigatorios antes de registro.

      **Publicacao automatizada:**
      4. Publicacao automatica do regulamento vigente em portal do fundo/CVM.
      5. Notificacao automatica a cotistas quando regulamento e alterado.
    tools:
      - git
      - gitlab-ci
      - terraform
  devsecops:
    prose: |
      **Integridade do regulamento:**
      1. Merge request obrigatorio para qualquer alteracao no regulamento,
         com aprovacao de compliance e juridico.
      2. Hash criptografico do regulamento vigente para verificacao de
         integridade.
      3. Diff automatizado entre versoes do regulamento com destaque de
         alteracoes materiais.

      **Testes de aderencia:**
      4. Testes automatizados de aderencia da carteira a politica de
         investimento definida no regulamento.
      5. Validacao de que parametros do sistema (limites, horarios, taxas)
         correspondem ao regulamento vigente.
    tools:
      - gitlab-ci
      - gitlab-sast
      - sonarqube
  secops:
    prose: |
      **Monitoramento de conformidade regulamentar:**
      1. Dashboard de conformidade: cada fundo com status de aderencia ao
         regulamento vigente.
      2. Alertas para desvios da politica de investimento ou limites do
         regulamento.
      3. Historico de alteracoes com data de assembleia e quorum de aprovacao.

      **Auditoria de regulamento:**
      4. Verificar que o regulamento esta atualizado e registrado na CVM.
      5. Cruzar parametros do sistema com regulamento para detectar divergencias.
    tools:
      - grc-platform
      - compliance-scanner
