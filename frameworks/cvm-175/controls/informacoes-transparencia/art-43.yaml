id: art-43
family: informacoes-transparencia
title: "Relatorios Periodicos e Demonstracoes Financeiras"
class: CVM-175
baselines: [fundos-investimento]
statement:
  prose: |
    Art. 43. O administrador deve elaborar e divulgar as seguintes informações
    periódicas do fundo: I - diariamente: valor da cota e patrimônio líquido;
    II - mensalmente: composição da carteira, lâmina de informações essenciais
    atualizada e extrato de conta do cotista; III - semestralmente: demonstrações
    financeiras do fundo; IV - anualmente: demonstrações financeiras auditadas
    e relatório do administrador.

    Parágrafo 1. As demonstrações financeiras semestrais e anuais devem ser
    elaboradas de acordo com as normas contábeis aplicáveis e auditadas por
    auditor independente registrado na CVM.

    Parágrafo 2. O administrador deve enviar as informações periódicas à CVM
    por meio do sistema eletrônico de envio de documentos, nos prazos
    estabelecidos por esta Resolução.

    Parágrafo 3. As informações periódicas devem ser disponibilizadas aos
    cotistas no endereço eletrônico do administrador e do distribuidor.
guidance:
  prose: |
    O art. 43 define o calendario de divulgacao obrigatoria do fundo.

    **Frequencia escalonada:**
    Quatro niveis de frequencia: diario (cota e PL), mensal (carteira e lamina),
    semestral (demonstracoes financeiras) e anual (demonstracoes auditadas +
    relatorio). Cada nivel tem prazo e formato especifico.

    **Divulgacao diaria de cota:**
    O valor da cota deve ser divulgado DIARIAMENTE. Isso exige calculo
    automatizado e publicacao em canais acessiveis (site, CVM, distribuidores).
    Atrasos na divulgacao prejudicam cotistas e configuram irregularidade.

    **Demonstracoes auditadas:**
    As demonstracoes financeiras anuais devem ser auditadas por auditor
    independente registrado na CVM. O auditor verifica se os numeros sao
    fidedignos e se as praticas contabeis sao adequadas.

    **Sistema eletronico da CVM:**
    O envio a CVM e feito via sistema eletronico (CVMWeb/FundosNet). E obrigacao
    do administrador garantir o envio tempestivo. Falha no envio configura
    descumprimento.
implementation_guidance:
  platform_engineering:
    prose: |
      **Pipeline de divulgacao automatizada:**
      1. Pipeline diario automatizado: calculo de NAV, divulgacao de cota e PL
         em portal, CVM e distribuidores.
      2. Pipeline mensal: geracao de composicao de carteira, atualizacao de
         lamina, envio de extratos a cotistas.
      3. Pipeline semestral/anual: geracao de demonstracoes financeiras,
         submissao ao auditor, envio a CVM.

      **Integracao com sistemas da CVM:**
      4. API de integracao com CVMWeb/FundosNet para envio automatico de
         documentos periodicos.
      5. Monitoramento de confirmacao de recebimento pela CVM.
    tools:
      - git
      - gitlab-ci
      - terraform
      - vault
  devsecops:
    prose: |
      **Integridade de informacoes divulgadas:**
      1. Validacao automatica de consistencia: cota divulgada versus cota
         calculada, PL divulgado versus PL contabil.
      2. Testes de regressao para pipeline de calculo de NAV.
      3. Audit trail de todas as publicacoes: documento, canal, data, hora.

      **Seguranca de envio:**
      4. Autenticacao segura para envio ao sistema da CVM.
      5. Criptografia de dados de cotistas em extratos e relatorios.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-secret-detection
  secops:
    prose: |
      **Monitoramento de prazos:**
      1. Dashboard de calendario de divulgacao: prazos por fundo, status
         de envio, documentos pendentes.
      2. Alertas antecipados para prazos proximos de divulgacao.
      3. Metricas de pontualidade: percentual de envios dentro do prazo.

      **Auditoria de divulgacao:**
      4. Verificar completude de documentos enviados versus obrigacoes.
      5. Cruzar dados divulgados com dados dos sistemas internos.
    tools:
      - grc-platform
      - compliance-scanner
      - siem
