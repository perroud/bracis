id: art-40
family: informacoes-transparencia
title: "Lamina de Informacoes Essenciais"
class: CVM-175
baselines: [fundos-investimento]
statement:
  prose: |
    Art. 40. O administrador deve elaborar e manter atualizada lâmina de
    informações essenciais do fundo, contendo resumo das principais
    características do fundo em linguagem acessível ao investidor.

    Parágrafo 1. A lâmina de informações essenciais deve conter, no mínimo:
    I - descrição resumida do objetivo e da política de investimento; II -
    público-alvo; III - principais riscos do fundo; IV - condições de aplicação
    e resgate; V - taxas e encargos; VI - histórico de rentabilidade;
    VII - composição resumida da carteira; VIII - indicação de que o
    regulamento e demais documentos estão disponíveis ao investidor.

    Parágrafo 2. A lâmina deve ser atualizada mensalmente e disponibilizada
    ao investidor previamente à aplicação no fundo.

    Parágrafo 3. A lâmina deve ser elaborada conforme modelo definido pela CVM.
guidance:
  prose: |
    O art. 40 trata da lamina de informacoes essenciais -- o documento de
    transparencia mais importante para o investidor de varejo.

    **Linguagem acessivel:**
    A lamina deve ser compreensivel para investidores nao sofisticados. Isso
    e diferente do regulamento, que e tecnico e juridico. A lamina traduz o
    regulamento para o publico geral.

    **Conteudo obrigatorio:**
    Oito itens minimos que cobrem: o que o fundo faz, para quem, quais riscos,
    quanto custa, como investir e como acompanhar. E um resumo executivo do fundo.

    **Atualizacao mensal:**
    A lamina deve ser atualizada MENSALMENTE. Dados de rentabilidade, composicao
    de carteira e riscos devem refletir o mes mais recente. Lamina desatualizada
    configura descumprimento.

    **Entrega pre-aplicacao:**
    O investidor deve receber a lamina ANTES de aplicar no fundo. Isso garante
    decisao informada. Sistemas de distribuicao devem implementar essa validacao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Geracao automatizada de laminas:**
      1. Pipeline de geracao automatica de laminas mensais: coletar dados de
         rentabilidade, composicao, riscos e montar lamina conforme modelo CVM.
      2. Templates de lamina versionados em repositorio Git, atualizados
         conforme alteracoes do modelo CVM.
      3. Integracao com sistema de gestao de carteira e risco para dados
         atualizados.

      **Publicacao e distribuicao:**
      4. Publicacao automatica de laminas em portal do fundo e sistema da CVM.
      5. Integracao com plataformas de distribuicao: enviar lamina atualizada
         para distribuidores automaticamente.
    tools:
      - git
      - gitlab-ci
      - terraform
  devsecops:
    prose: |
      **Integridade de dados da lamina:**
      1. Validacao automatica de dados da lamina contra fontes primarias
         (sistema de gestao, custodiante, escriturador).
      2. Testes de consistencia: rentabilidade da lamina versus rentabilidade
         calculada pelo sistema.
      3. Pipeline de revisao: lamina gerada automaticamente passa por
         revisao de compliance antes de publicacao.

      **Modelo CVM como codigo:**
      4. Modelo de lamina da CVM codificado como template com validacao
         automatica de campos obrigatorios.
    tools:
      - gitlab-ci
      - gitlab-sast
      - sonarqube
  secops:
    prose: |
      **Monitoramento de atualizacao:**
      1. Alertas para laminas nao atualizadas no prazo mensal.
      2. Dashboard de status de laminas: fundos com lamina atual, atrasada
         ou pendente.
      3. Verificacao de que laminas foram entregues a investidores antes
         da aplicacao.

      **Auditoria de transparencia:**
      4. Amostragem de laminas para verificar acuracia de dados.
      5. Verificar que linguagem e acessivel ao publico-alvo do fundo.
    tools:
      - grc-platform
      - compliance-scanner
legal_references:
  - framework_id: lgpd
    articles: ["art-9"]
    relationship: complements
