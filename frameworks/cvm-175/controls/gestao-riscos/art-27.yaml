id: art-27
family: gestao-riscos
title: "Politica de Gestao de Riscos"
class: CVM-175
baselines: [fundos-investimento]
statement:
  prose: |
    Art. 27. O administrador e o gestor devem implementar e manter política de
    gestão de riscos compatível com a natureza, complexidade e perfil de risco
    do fundo de investimento.

    Parágrafo 1. A política de gestão de riscos deve prever, no mínimo:
    I - os riscos relevantes a que o fundo está exposto, incluindo risco de
    mercado, risco de crédito, risco de liquidez, risco operacional e risco
    de contraparte; II - as metodologias utilizadas para mensurar cada tipo
    de risco; III - os limites de exposição a risco estabelecidos para o fundo;
    IV - os procedimentos para monitoramento contínuo dos riscos; V - os
    mecanismos de escalação e tratamento de violações de limites.

    Parágrafo 2. A política de gestão de riscos deve ser revisada no mínimo
    anualmente e sempre que ocorrerem eventos relevantes que possam impactar
    o perfil de risco do fundo.
guidance:
  prose: |
    O art. 27 e o nucleo da governanca de riscos de fundos de investimento.
    Exige uma politica formal, documentada e operacional de gestao de riscos.

    **Cinco riscos obrigatorios:**
    A politica deve cobrir no minimo: (i) risco de mercado (variacao de precos);
    (ii) risco de credito (inadimplencia de emissores); (iii) risco de liquidez
    (incapacidade de liquidar posicoes); (iv) risco operacional (falhas de
    processos, sistemas, pessoas); (v) risco de contraparte (inadimplencia
    de contrapartes de operacoes).

    **Metodologias quantitativas:**
    A CVM exige que as metodologias sejam explicitas. Nao basta dizer "monitoramos
    risco de mercado". Deve-se especificar: VaR parametrico/historico/Monte Carlo,
    nivel de confianca, horizonte temporal, janela de dados.

    **Limites e escalacao:**
    Limites de exposicao devem ser pre-definidos e monitorados continuamente.
    Quando violados, deve haver procedimento de escalacao claro: quem e notificado,
    qual o prazo para reenquadramento, quais as consequencias.

    **Revisao anual + event-driven:**
    A politica deve ser revisada anualmente E sempre que eventos relevantes
    ocorram (crise de mercado, alteracao regulatoria, incidente operacional).
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de gestao de riscos:**
      1. Plataforma de risco com calculo automatizado de VaR, stress test,
         risco de credito, risco de liquidez e risco operacional.
      2. Integracao em tempo real com sistema de gestao de carteira para
         monitoramento continuo de exposicoes.
      3. Motor de limites: parametrizacao de limites por tipo de risco,
         monitoramento automatico e alertas pre-violacao.

      **Politica como codigo:**
      4. Politica de gestao de riscos versionada em repositorio Git com
         historico de revisoes e aprovacoes.
      5. Limites de risco codificados como regras executaveis (Policy-as-Code)
         integradas ao OMS para pre-trade check.
    tools:
      - opa-gatekeeper
      - vault
      - terraform
      - git
  devsecops:
    prose: |
      **Validacao de modelos de risco:**
      1. Testes automatizados para modelos de risco: backtesting de VaR,
         validacao de stress test, calibracao de parametros.
      2. Pipeline de CI/CD para codigo de risco: qualquer alteracao em modelo
         exige revisao e aprovacao por equipe de risco.
      3. SAST para codigo de calculo de risco: erros de calculo podem
         subestimar riscos e causar prejuizo.

      **Controle de versao de modelos:**
      4. Versionamento rigoroso de modelos de risco com changelog e justificativa
         para cada alteracao.
      5. Ambiente de staging para validar novos modelos antes de producao.
    tools:
      - gitlab-ci
      - gitlab-sast
      - sonarqube
      - gitlab-dependency-scanning
  secops:
    prose: |
      **Monitoramento de riscos:**
      1. Dashboard de riscos em tempo real: VaR, exposicoes, utilizacao de
         limites, stress test.
      2. Alertas automaticos para: violacao de limites, concentracao excessiva,
         liquidez reduzida.
      3. Relatorio diario de riscos para administrador e gestor.

      **Auditoria de gestao de riscos:**
      4. Backtesting periodico de VaR: verificar se as perdas reais excedem
         as estimadas dentro do nivel de confianca.
      5. Revisao anual da politica de riscos com evidencias documentadas.
      6. Teste de efetividade dos mecanismos de escalacao.
    tools:
      - siem
      - grc-platform
      - compliance-scanner
