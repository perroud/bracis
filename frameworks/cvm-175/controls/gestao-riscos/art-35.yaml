id: art-35
family: gestao-riscos
title: "Risco Operacional e Continuidade de Negocios"
class: CVM-175
baselines: [fundos-investimento]
statement:
  prose: |
    Art. 35. O administrador e o gestor devem implementar e manter controles
    para gestão de risco operacional, incluindo: I - identificação e avaliação
    dos riscos operacionais relevantes às atividades do fundo; II - procedimentos
    para mitigação dos riscos identificados; III - plano de continuidade de
    negócios que assegure a operação do fundo em situações de contingência;
    IV - testes periódicos do plano de continuidade de negócios.

    Parágrafo 1. Os riscos operacionais relevantes incluem, sem limitação:
    falhas de sistemas, erros de processamento, fraudes internas e externas,
    falhas de prestadores de serviços e eventos externos disruptivos.

    Parágrafo 2. O plano de continuidade de negócios deve prever procedimentos
    para garantir a continuidade das operações críticas do fundo, incluindo
    cálculo e divulgação de cotas, processamento de aplicações e resgates,
    e comunicação com cotistas e CVM.
guidance:
  prose: |
    O art. 35 trata de risco operacional e continuidade de negocios, areas
    fundamentais para fundos que dependem intensamente de tecnologia.

    **Risco operacional abrangente:**
    Inclui falhas de sistemas (downtime, bugs, erros de calculo), erros humanos,
    fraudes (internas e externas), falhas de terceiros e eventos externos
    (desastres, pandemias, ataques ciberneticos). A CVM 175 reconhece que
    fundos modernos sao operacoes tecnologicas.

    **Plano de continuidade (BCP):**
    O BCP deve cobrir as operacoes criticas: calculo de cotas (nao pode parar),
    processamento de aplicacoes/resgates (cotistas nao podem ficar impedidos),
    comunicacao com CVM e cotistas (transparencia).

    **Testes periodicos:**
    O BCP deve ser testado periodicamente. Plano nao testado e plano que nao
    funciona. A CVM pode solicitar evidencias dos testes realizados.

    **Conexao com CVM 35:**
    O risco operacional de TI se conecta diretamente com a CVM 35 (seguranca
    cibernetica). Ataques ciberneticos sao risco operacional. Plano de
    continuidade deve incluir cenarios de ataque cibernetico.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura resiliente:**
      1. Arquitetura de alta disponibilidade para sistemas criticos: calculo
         de cotas, processamento de ordens, escrituracao.
      2. Multi-region ou multi-AZ para servicos criticos com failover automatico.
      3. Backups automatizados com teste periodico de restauracao.

      **Plano de continuidade como codigo:**
      4. BCP documentado em repositorio Git com runbooks automatizados para
         cenarios de contingencia.
      5. Infraestrutura de DR (Disaster Recovery) como codigo com failover testavel.
      6. Monitoramento de saude de todos os componentes criticos.
    tools:
      - terraform
      - vault
      - git
      - gitlab-ci
      - kyverno
  devsecops:
    prose: |
      **Prevencao de falhas operacionais:**
      1. SAST e testes unitarios para codigo critico: calculo de cotas,
         processamento de ordens, reconciliacao.
      2. Dependency scanning para identificar vulnerabilidades em bibliotecas
         de calculo e processamento.
      3. Pipeline de validacao de deployments com rollback automatico em caso
         de falha.

      **Testes de contingencia:**
      4. Testes de DR automatizados no pipeline: failover, restauracao de
         backup, switch de regiao.
      5. Chaos engineering para testar resiliencia de servicos criticos.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dependency-scanning
      - gitlab-container-scanning
  secops:
    prose: |
      **Monitoramento de risco operacional:**
      1. Inventario de riscos operacionais com avaliacao de probabilidade e
         impacto, revisado trimestralmente.
      2. SIEM com alertas para eventos operacionais criticos: falhas de
         sistema, erros de processamento, tentativas de fraude.
      3. Metricas de risco operacional: uptime, MTTR, taxa de erros, incidentes.

      **Teste e auditoria do BCP:**
      4. Drill de continuidade semestral: simular cenario de contingencia e
         executar BCP na pratica.
      5. Auditoria anual do BCP: cobertura de cenarios, atualizacao, resultados
         de testes, gaps identificados.
    tools:
      - siem
      - grc-platform
      - compliance-scanner
