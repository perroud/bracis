id: art-55
family: distribuicao-suitability
title: "Material Publicitario e Vedacoes na Distribuicao"
class: CVM-175
baselines: [fundos-investimento]
statement:
  prose: |
    Art. 55. O material publicitário e de divulgação do fundo de investimento
    deve: I - ser consistente com o regulamento e a lâmina de informações
    essenciais; II - conter informações verdadeiras, completas e não induzir
    o investidor a erro; III - incluir alerta de que rentabilidade passada não
    representa garantia de rentabilidade futura; IV - informar que o fundo
    não conta com garantia do administrador, do gestor ou de qualquer mecanismo
    de seguro ou garantia.

    Parágrafo 1. É vedado ao distribuidor: I - assegurar ou sugerir rentabilidade
    mínima ou ausência de riscos; II - utilizar comparações com outros produtos
    financeiros de forma enganosa; III - omitir riscos relevantes do fundo;
    IV - divulgar informações falsas ou tendenciosas sobre o fundo.

    Parágrafo 2. O administrador é responsável pela aprovação de todo material
    publicitário do fundo antes de sua divulgação.
guidance:
  prose: |
    O art. 55 regulamenta material publicitario e protege o investidor contra
    informacoes enganosas ou incompletas.

    **Consistencia obrigatoria:**
    O material publicitario nao pode divergir do regulamento ou da lamina.
    Se o regulamento diz "fundo de renda fixa conservador", o material nao
    pode sugerir "altos retornos". A consistencia deve ser verificada por
    compliance antes da publicacao.

    **Vedacoes absolutas:**
    Proibido: garantir retorno, sugerir ausencia de risco, comparacoes
    enganosas, omissao de riscos, informacoes falsas. Qualquer violacao
    pode resultar em sancao administrativa pela CVM.

    **Alertas obrigatorios:**
    Todo material deve conter: "Rentabilidade passada nao representa garantia
    de rentabilidade futura" e informar ausencia de garantia. Sao frases
    padronizadas que devem constar em todo material.

    **Responsabilidade do administrador:**
    O administrador deve aprovar TODO material publicitario antes da divulgacao.
    O distribuidor nao pode publicar material sem aprovacao do administrador.
implementation_guidance:
  platform_engineering:
    prose: |
      **Workflow de aprovacao de material:**
      1. Sistema de workflow para aprovacao de material publicitario: submissao
         pelo distribuidor, revisao por compliance, aprovacao pelo administrador.
      2. Validacao automatica de alertas obrigatorios: verificar presenca das
         frases padronizadas antes de permitir publicacao.
      3. Repositorio de materiais aprovados com versionamento e historico.

      **Validacao de consistencia:**
      4. Cruzamento automatico de dados do material com regulamento e lamina:
         rentabilidade citada versus real, riscos mencionados versus completos.
    tools:
      - git
      - gitlab-ci
      - terraform
  devsecops:
    prose: |
      **Integridade de material publicitario:**
      1. Pipeline de validacao de material: verificar alertas obrigatorios,
         consistencia de dados, formato.
      2. Testes automatizados de regras de vedacao: simular material com
         conteudo vedado e verificar que o sistema rejeita.
      3. Audit trail de todas as aprovacoes e publicacoes de material.

      **Seguranca de publicacao:**
      4. Controle de acesso: apenas materiais aprovados podem ser publicados.
      5. Hash de material aprovado para detectar alteracoes pos-aprovacao.
    tools:
      - gitlab-ci
      - gitlab-sast
      - sonarqube
  secops:
    prose: |
      **Monitoramento de material publicitario:**
      1. Monitoramento de canais de distribuicao: verificar que apenas
         material aprovado esta sendo utilizado.
      2. Alertas para material desatualizado ou nao aprovado em circulacao.
      3. Reclamacoes de investidores sobre material enganoso.

      **Auditoria de publicidade:**
      4. Amostragem de material em circulacao para verificar conformidade.
      5. Verificar que alertas obrigatorios estao presentes em todo material.
    tools:
      - grc-platform
      - compliance-scanner
legal_references:
  - framework_id: lgpd
    articles: ["art-6", "art-9"]
    relationship: complements
