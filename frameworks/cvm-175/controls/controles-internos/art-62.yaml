id: art-62
family: controles-internos
title: "Gestao de Conflitos de Interesse"
class: CVM-175
baselines: [fundos-investimento]
statement:
  prose: |
    Art. 62. O administrador e o gestor devem adotar política de gestão de
    conflitos de interesse que identifique, previna e trate situações de
    conflito entre os interesses do fundo, dos cotistas, do administrador,
    do gestor e de seus respectivos funcionários e partes relacionadas.

    Parágrafo 1. A política de gestão de conflitos deve prever, no mínimo:
    I - mapeamento das situações potenciais de conflito de interesse;
    II - procedimentos para prevenção e mitigação de conflitos;
    III - regras para operações com partes relacionadas; IV - obrigação de
    divulgação de conflitos identificados aos cotistas; V - registro de
    conflitos identificados e das providências adotadas.

    Parágrafo 2. Operações entre o fundo e partes relacionadas ao administrador
    ou ao gestor devem ser realizadas a preços e condições de mercado e
    divulgadas aos cotistas.
guidance:
  prose: |
    O art. 62 trata de conflitos de interesse, um dos temas mais sensiiveis
    na industria de fundos.

    **Conflitos tipicos:**
    (i) Gestor alocando fundos em ativos emitidos por empresas do mesmo grupo;
    (ii) Administrador cobrando taxas de servicos prestados por empresas
    coligadas; (iii) Gestor favorecendo um fundo em detrimento de outro;
    (iv) Funcionarios operando em conta propria com informacao do fundo.

    **Mapeamento proativo:**
    A politica deve mapear ANTES que o conflito ocorra. Nao e reativo: e
    preventivo. Cada situacao potencial deve ter procedimento definido.

    **Operacoes com partes relacionadas:**
    Sao permitidas, mas com condicoes: precos de mercado e divulgacao aos
    cotistas. O onus de provar que a operacao foi a preco de mercado e do
    administrador/gestor.

    **Divulgacao obrigatoria:**
    Conflitos identificados devem ser divulgados aos cotistas. Transparencia
    e a ferramenta principal contra conflitos: cotistas informados podem
    monitorar e questionar.
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de gestao de conflitos:**
      1. Cadastro de partes relacionadas: administrador, gestor, controladores,
         coligadas, diretores, funcionarios -- atualizado continuamente.
      2. Motor de deteccao automatica: cruzar operacoes do fundo com cadastro
         de partes relacionadas para identificar operacoes com partes
         relacionadas em tempo real.
      3. Workflow de aprovacao para operacoes com partes relacionadas:
         justificativa de preco de mercado, aprovacao por compliance.

      **Mapeamento de conflitos:**
      4. Matriz de conflitos potenciais por tipo de operacao, parte
         relacionada e situacao, mantida em repositorio Git.
    tools:
      - git
      - vault
      - opa-gatekeeper
      - terraform
  devsecops:
    prose: |
      **Validacao de deteccao de conflitos:**
      1. Testes automatizados de motor de deteccao: simular operacoes com
         partes relacionadas e verificar que o sistema identifica e alerta.
      2. SAST para codigo de deteccao: falhas podem deixar conflitos nao
         detectados.
      3. Pipeline de validacao de cadastro de partes relacionadas.

      **Integridade do registro:**
      4. Audit trail imutavel de todos os conflitos identificados, avaliacoes
         realizadas e providencias adotadas.
      5. Versionamento da politica de conflitos com historico de alteracoes.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-secret-detection
  secops:
    prose: |
      **Monitoramento de conflitos:**
      1. Dashboard de conflitos: situacoes identificadas, status de tratamento,
         operacoes com partes relacionadas.
      2. Alertas para operacoes com partes relacionadas nao aprovadas.
      3. Metricas: quantidade de conflitos, tempo de tratamento, operacoes
         com partes relacionadas por periodo.

      **Auditoria de conflitos:**
      4. Auditoria semestral de operacoes com partes relacionadas: verificar
         precos de mercado e divulgacao.
      5. Verificar completude do cadastro de partes relacionadas.
      6. Amostragem de conflitos para avaliar adequacao do tratamento.
    tools:
      - grc-platform
      - siem
      - compliance-scanner
