id: art-58
family: controles-internos
title: "Programa de Controles Internos e Compliance"
class: CVM-175
baselines: [fundos-investimento]
statement:
  prose: |
    Art. 58. O administrador e o gestor devem implementar e manter programa de
    controles internos e compliance que assegure o cumprimento das normas
    aplicáveis ao fundo de investimento e a seus prestadores de serviços.

    Parágrafo 1. O programa de controles internos deve prever, no mínimo:
    I - estrutura organizacional que assegure a independência da função de
    compliance; II - procedimentos para monitoramento e verificação de
    conformidade com as normas aplicáveis; III - mecanismos de detecção e
    prevenção de irregularidades; IV - canal de denúncias acessível e
    confidencial; V - programa de treinamento contínuo em compliance para
    colaboradores; VI - relatórios periódicos de conformidade para a
    alta administração.

    Parágrafo 2. O programa de compliance deve ser revisado no mínimo
    anualmente e sempre que alterações regulatórias relevantes ocorrerem.
guidance:
  prose: |
    O art. 58 estabelece a obrigacao de um programa formal de compliance.
    Nao e opcional: todo administrador e gestor deve ter.

    **Seis componentes minimos:**
    (i) Estrutura independente: compliance nao pode ser subordinado a areas
    que geram receita; (ii) Monitoramento: verificacoes continuas de
    conformidade; (iii) Deteccao: mecanismos para identificar irregularidades;
    (iv) Canal de denuncias: hotline ou canal digital acessivel e confidencial;
    (v) Treinamento: educacao continua de colaboradores; (vi) Reporte:
    relatorios periodicos a alta administracao.

    **Independencia de compliance:**
    A funcao de compliance deve ser independente das areas de negocio
    (gestao, distribuicao). Compliance nao pode ser "capturado" pelo
    negocio. Deve ter acesso direto a alta administracao.

    **Canal de denuncias:**
    O canal deve ser acessivel (facil de usar), confidencial (identidade
    protegida) e efetivo (denuncias sao investigadas). A ausencia de canal
    ou um canal que nao funciona configura descumprimento.

    **Revisao anual + event-driven:**
    O programa deve ser revisado anualmente e sempre que houver mudanca
    regulatoria. A CVM 175 em si e uma mudanca regulatoria que exige revisao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de compliance:**
      1. Plataforma de GRC (Governance, Risk & Compliance) para gerenciar
         o programa de compliance: politicas, controles, testes, remediacoes.
      2. Canal de denuncias digital com criptografia end-to-end e
         anonimizacao do denunciante.
      3. Dashboard de compliance em tempo real: status de controles,
         irregularidades detectadas, remediacoes pendentes.

      **Automacao de monitoramento:**
      4. Regras de monitoramento automatizado para deteccao de irregularidades:
         operacoes fora de limites, transacoes com partes relacionadas,
         desvios de politica.
      5. Pipeline de geracao de relatorios de compliance para alta administracao.
    tools:
      - git
      - terraform
      - vault
      - gitlab-ci
  devsecops:
    prose: |
      **Compliance como codigo:**
      1. Politicas de compliance versionadas em repositorio Git com historico
         de alteracoes e aprovacoes.
      2. Regras de monitoramento codificadas e testadas automaticamente
         (Policy-as-Code).
      3. Pipeline de validacao de conformidade integrado ao CI/CD.

      **Seguranca do canal de denuncias:**
      4. SAST para codigo do canal de denuncias: falhas podem expor denunciantes.
      5. Testes de anonimizacao: verificar que a identidade do denunciante
         nao pode ser rastreada.
      6. Secret detection para dados sensiveis em logs do canal.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-secret-detection
      - sonarqube
  secops:
    prose: |
      **Monitoramento de compliance:**
      1. Dashboard de conformidade: status de cada obrigacao regulatoria,
         controles testados, gaps identificados.
      2. Alertas para: prazos regulatorios proximos, controles nao testados,
         remediacoes atrasadas.
      3. Metricas de efetividade: irregularidades detectadas vs. nao detectadas,
         tempo de remediacao.

      **Gestao do canal de denuncias:**
      4. Monitoramento de denuncias recebidas: tempo de resposta, resultado
         de investigacao, acoes tomadas.
      5. Relatorio semestral de denuncias para alta administracao (anonimizado).
    tools:
      - grc-platform
      - siem
      - compliance-scanner
