id: art-65
family: controles-internos
title: "Prevencao a Lavagem de Dinheiro em Fundos"
class: CVM-175
baselines: [fundos-investimento]
statement:
  prose: |
    Art. 65. O administrador e o distribuidor de cotas de fundos de investimento
    devem observar as normas de prevenção à lavagem de dinheiro e ao financiamento
    do terrorismo (PLD/FT) aplicáveis, incluindo a Resolução CVM n. 50/2021.

    Parágrafo 1. Os procedimentos de PLD/FT aplicáveis a fundos de investimento
    devem contemplar, no mínimo: I - identificação e qualificação de cotistas;
    II - monitoramento de operações e movimentações financeiras de cotistas;
    III - comunicação de operações suspeitas ao COAF; IV - manutenção de
    registros de operações por no mínimo cinco anos; V - designação de
    responsável pelo cumprimento das normas de PLD/FT.

    Parágrafo 2. O administrador deve adotar procedimentos de KYC (Know Your
    Customer) compatíveis com o perfil do fundo e de seus cotistas, incluindo
    due diligence reforçada para cotistas de maior risco.
guidance:
  prose: |
    O art. 65 conecta a CVM 175 com o framework de PLD/FT da CVM 50.
    Fundos de investimento sao vulneraveis a lavagem de dinheiro: estruturas
    complexas, movimentacoes frequentes e multiplos participantes criam
    oportunidades para ocultacao de origem de recursos.

    **Cinco componentes minimos:**
    (i) KYC: identificar e qualificar cotistas; (ii) Monitoramento: acompanhar
    operacoes e detectar padroes anomalos; (iii) Comunicacao ao COAF: reportar
    operacoes suspeitas; (iv) Retencao: manter registros por 5 anos;
    (v) Responsavel designado: pessoa com autoridade para PLD/FT.

    **Due diligence reforcada:**
    Cotistas de maior risco (PEP -- Pessoa Exposta Politicamente, grandes
    valores, jurisdicoes de risco) exigem KYC reforcado: verificacao de fonte
    de recursos, estrutura societaria completa, monitoramento intensificado.

    **Retencao de 5 anos:**
    Registros de operacoes devem ser mantidos por no minimo 5 anos apos o
    termino da relacao com o cotista. Isso exige politica de retencao de dados
    e infraestrutura de armazenamento de longo prazo.

    **Sinergia com LGPD:**
    Ha tensao entre PLD/FT (reter dados) e LGPD (minimizar dados). A base
    legal de obrigacao regulatoria da LGPD justifica a retencao para PLD/FT.
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de PLD/FT:**
      1. Plataforma de PLD/FT integrada ao sistema de escrituracao: cadastro
         de cotistas, monitoramento de operacoes, comunicacao ao COAF.
      2. Motor de monitoramento: regras automatizadas para deteccao de
         operacoes suspeitas (valores atipicos, fracionamento, concentracao).
      3. Integracao com bases de PEP, listas restritivas (OFAC, ONU, COAF).

      **KYC automatizado:**
      4. Workflow de KYC digital: coleta de documentos, verificacao de
         identidade, consulta a bases de risco, aprovacao.
      5. Due diligence reforcada automatica para cotistas classificados
         como alto risco.
    tools:
      - vault
      - terraform
      - git
      - gitlab-ci
  devsecops:
    prose: |
      **Seguranca do sistema de PLD/FT:**
      1. SAST para codigo de monitoramento: falhas podem deixar operacoes
         suspeitas sem deteccao.
      2. Secret detection para dados pessoais de cotistas em codigo e logs.
      3. Testes automatizados de regras de monitoramento: cenarios de
         operacoes suspeitas devem ser detectados.

      **Integridade de registros:**
      4. Registros de PLD/FT imutaveis com retencao garantida de 5 anos.
      5. Criptografia de dados pessoais sensiiveis (CPF, documentos,
         patrimonio).
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-secret-detection
      - vault
  secops:
    prose: |
      **Monitoramento de PLD/FT:**
      1. Dashboard de PLD/FT: operacoes monitoradas, alertas gerados,
         investigacoes em andamento, comunicacoes ao COAF.
      2. Alertas para: operacoes acima de limites, cotistas em listas
         restritivas, padroes de fracionamento.
      3. Metricas de efetividade: falsos positivos, tempo de investigacao,
         comunicacoes ao COAF.

      **Auditoria de PLD/FT:**
      4. Auditoria anual do programa de PLD/FT.
      5. Verificar completude de KYC: todos os cotistas possuem cadastro
         atualizado e classificacao de risco.
      6. Verificar retencao de registros por 5 anos.
    tools:
      - siem
      - grc-platform
      - compliance-scanner
legal_references:
