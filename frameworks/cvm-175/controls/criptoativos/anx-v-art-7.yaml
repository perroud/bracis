id: anx-v-art-7
family: criptoativos
title: "Gestao de Riscos Especificos de Criptoativos"
class: CVM-175
baselines: [fundos-investimento]
statement:
  prose: |
    Anexo Normativo V, Art. 7. O gestor de fundo que invista em criptoativos
    deve implementar gestão de riscos específica que contemple, além dos riscos
    previstos na parte geral: I - risco tecnológico, incluindo falhas de
    protocolo, ataques à rede e vulnerabilidades de smart contracts;
    II - risco de liquidez específico do mercado de criptoativos, considerando
    a fragmentação de liquidez entre exchanges; III - risco de contraparte
    de exchanges e custodiantes de criptoativos; IV - risco regulatório,
    considerando a evolução do marco regulatório de criptoativos no Brasil
    e no exterior; V - risco de concentração em criptoativos com baixa
    capitalização de mercado.

    Parágrafo 1. O gestor deve monitorar continuamente a saúde dos protocolos
    de blockchain em que os criptoativos da carteira estão registrados.

    Parágrafo 2. Os resultados da gestão de riscos específicos de criptoativos
    devem ser reportados ao administrador e ao comitê de riscos do fundo.
guidance:
  prose: |
    O art. 7 do Anexo V reconhece que criptoativos trazem riscos adicionais
    que nao existem em ativos financeiros tradicionais.

    **Risco tecnologico (unico de cripto):**
    Protocolos de blockchain podem ter bugs, ataques 51%, exploits de smart
    contracts. Em 2022, mais de US$ 3 bilhoes foram perdidos em hacks de
    protocolos DeFi. O gestor deve monitorar a saude dos protocolos.

    **Liquidez fragmentada:**
    Diferente de acoes (negociadas em bolsa centralizada), criptoativos sao
    negociados em dezenas de exchanges com liquidez fragmentada. O spread
    pode ser significativo. Best execution e mais complexo.

    **Risco de contraparte de exchanges:**
    O colapso da FTX em 2022 demonstrou que exchanges podem falir. O gestor
    deve avaliar risco de contraparte de cada exchange utilizada e limitar
    exposicao a qualquer exchange individual.

    **Risco regulatorio:**
    A regulamentacao de cripto esta em evolucao rapida. Novos marcos regulatorios
    (MiCA na Europa, marco legal no Brasil) podem impactar diretamente a
    liquidez e a legalidade de certos criptoativos.

    **Monitoramento continuo:**
    Diferente de mercados tradicionais, cripto opera 24/7. O monitoramento
    de riscos deve ser continuo, sem interrupcao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de riscos cripto:**
      1. Motor de risco com modelos especificos para criptoativos: volatilidade
         historica e implicita, correlacao entre ativos cripto, beta em relacao
         ao Bitcoin.
      2. Monitoramento de protocolos: integracao com APIs de blockchain para
         detectar eventos de rede (forks, upgrades, ataques).
      3. Limites de exposicao por exchange para mitigar risco de contraparte.

      **Monitoramento 24/7:**
      4. Infraestrutura de monitoramento que opera 24/7 (cripto nao fecha):
         alertas automaticos, on-call rotation.
      5. Feeds de dados de multiplas exchanges para monitoramento de liquidez
         e spread.
    tools:
      - terraform
      - vault
      - opa-gatekeeper
      - git
  devsecops:
    prose: |
      **Seguranca de integracoes:**
      1. SAST para codigo de integracao com blockchains e exchanges: falhas
         podem causar perda de ativos.
      2. Dependency scanning para bibliotecas de interacao com blockchain
         (web3, ethers.js, etc.).
      3. Container scanning para nodes de blockchain e servicos de monitoramento.

      **Validacao de modelos de risco:**
      4. Testes automatizados para modelos de risco cripto: backtesting de
         VaR em cenarios de alta volatilidade.
      5. Pipeline de revisao para alteracoes em modelos de risco cripto.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dependency-scanning
      - gitlab-container-scanning
      - gitlab-secret-detection
  secops:
    prose: |
      **Monitoramento de riscos cripto:**
      1. Dashboard de riscos cripto 24/7: exposicao por ativo, volatilidade,
         liquidez, risco de contraparte.
      2. Alertas para: volatilidade extrema, evento de protocolo, degradacao
         de liquidez, noticia regulatoria.
      3. Monitoramento de saude de protocolos: TVL, volume, incidentes de
         seguranca, upgrades.

      **Resposta a incidentes cripto:**
      4. Playbook de resposta para eventos cripto: hack de protocolo, falha
         de exchange, fork nao planejado.
      5. Procedimento de emergencia para retirada de ativos de exchanges
         em risco.
    tools:
      - siem
      - grc-platform
      - compliance-scanner
