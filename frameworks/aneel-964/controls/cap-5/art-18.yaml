id: art-18
family: cap-5
title: "Prazos de Adequacao e Vigencia"
class: ANEEL-964
baselines: [electric-sector]
statement:
  prose: |
    Art. 18. Os agentes do setor elétrico devem adequar seus sistemas, políticas e
    processos aos requisitos desta Resolução Normativa nos seguintes prazos, contados
    a partir da data de sua vigência:

    I - agentes de transmissão e geração com potência instalada superior a 100 MW:
    12 (doze) meses;

    II - agentes de distribuição com mais de 500.000 (quinhentos mil) unidades
    consumidoras: 18 (dezoito) meses;

    III - demais agentes do setor elétrico: 24 (vinte e quatro) meses.

    Parágrafo 1. Os prazos previstos no caput não dispensam os agentes de adotar
    imediatamente as medidas de segurança cibernética básicas, em especial a
    notificação de incidentes cibernéticos relevantes prevista no art. 13.

    Parágrafo 2. Esta Resolução Normativa entra em vigor em 1 de julho de 2022.
guidance:
  prose: |
    O art. 18 estabelece os prazos graduados de adequacao, reconhecendo que
    agentes maiores tem maior capacidade de implementacao mas tambem maior
    criticidade, enquanto agentes menores precisam de mais tempo para se adequar.

    **Estrategia de implementacao gradual:**
    A ANEEL adotou uma abordagem proporcional ao porte e criticidade:
    - Grandes agentes de transmissao e geracao: 12 meses (maior criticidade + maior capacidade)
    - Grandes distribuidoras: 18 meses
    - Demais: 24 meses

    **Efeito imediato do paragrafo 1:**
    Independentemente dos prazos de adequacao total, o art. 13 (notificacao de
    incidentes) e imediatamente aplicavel. Nao ha prazo de graca para deixar
    de notificar incidentes ciberneticos relevantes.

    **Plano de implementacao recomendado:**
    Para agentes com prazo de 12 meses, um roadmap tipico seria:
    - Meses 1-2: Assessment de gap, inventario de ativos, designacao do responsavel
    - Meses 3-4: Elaboracao e aprovacao da politica de seguranca cibernetica
    - Meses 5-7: Implementacao de controles tecnicos prioritarios (segmentacao,
      monitoramento, gestao de acessos OT)
    - Meses 8-9: Implementacao do plano de resposta a incidentes
    - Meses 10-11: Treinamento de equipes, exercicios de simulacao
    - Mes 12: Relatorio de conformidade inicial, auditoria interna

    **Riscos do paragrafo 2:**
    A vigencia em julho de 2022 ja passou. Agentes que ainda nao estao em
    conformidade total estao em situacao de risco regulatorio com a ANEEL.
implementation_guidance:
  platform_engineering:
    prose: |
      Estruturar o programa de implementacao tecnica em fases:

      **Fase 1 — Base (primeiros 3 meses):**
      1. Assessment de gap em relacao a ANEEL 964
      2. Inventario de ativos OT/IT (CMDB + scan passivo de rede OT)
      3. Segmentacao basica IT/OT se ainda nao existir
      4. Canal de notificacao de incidentes a ANEEL configurado (art. 13)

      **Fase 2 — Controles Tecnicos (meses 4-8):**
      5. Monitoramento passivo OT (Claroty, Nozomi ou equivalente)
      6. PAM para acessos privilegiados (especialmente terceiros)
      7. Log management centralizado (SIEM com ingestao de logs OT)
      8. Backup de configuracoes OT automatizado

      **Fase 3 — Maturidade (meses 9-12):**
      9. Vulnerability management OT estruturado
      10. Plano de resposta a incidentes com playbooks OT
      11. Treinamento especifico para equipes OT
      12. Relatorio inicial de conformidade
    tools:
      - claroty
      - nozomi-networks
      - splunk
      - cyberark
      - servicenow-grc
  devsecops:
    prose: |
      Gerenciar o programa de conformidade como projeto de engenharia:

      1. Backlog de conformidade: criar epic no sistema de gestao de projetos
         com todas as obrigacoes da ANEEL 964 como stories/tasks
      2. Rastreamento de progresso: dashboard mostrando % de implementacao
         de cada artigo da resolucao vs. prazo aplicavel
      3. Automacao de evidencias: cada controle implementado deve gerar evidencias
         automaticas que podem ser exportadas para o relatorio de conformidade
      4. Alerta de prazo: notificacoes automaticas 90, 60 e 30 dias antes do
         prazo de adequacao aplicavel ao agente
      5. Repositorio de conformidade: artefatos de evidencia (politicas aprovadas,
         relatorios de ferramentas, logs de treinamento) armazenados e organizados
         por artigo da ANEEL 964
    tools:
      - gitlab
      - jira
      - servicenow-grc
      - grafana
  secops:
    prose: |
      Gerenciar o programa de adequacao regulatoria:

      1. Designar DPO/CISO como responsavel pelo programa de adequacao ANEEL 964
      2. Assessment inicial: contratar auditoria externa para avaliacao de gap
         em relacao a ANEEL 964 (especialmente para agentes sem programa OT maduro)
      3. Roadmap detalhado: para cada gap identificado, definir prazo, responsavel
         e recursos necessarios para remediaciao
      4. Status reports mensais: atualizar a alta administracao sobre o progresso
         da adequacao e eventuais obstaculos
      5. Pre-audit interno: 60 dias antes do prazo aplicavel, realizar auditoria
         interna para verificar o nivel de conformidade e corrigir gaps remanescentes
      6. Monitoramento pos-adequacao: manter programa de conformidade continuo
         para garantir que controles implementados permanecem eficazes
    tools:
      - grc-platform
      - servicenow-grc
      - archer-grc
      - jira
