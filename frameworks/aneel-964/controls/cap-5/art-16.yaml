id: art-16
family: cap-5
title: "Responsabilidades da Alta Administracao"
class: ANEEL-964
baselines: [electric-sector]
statement:
  prose: |
    Art. 16. A alta administração dos agentes do setor elétrico é responsável por:

    I - assegurar que a política de segurança cibernética seja implementada e
    mantida de forma efetiva, alocando os recursos humanos, tecnológicos e
    financeiros necessários;

    II - designar formalmente o responsável pela segurança cibernética da
    organização, com competência técnica e autoridade suficientes para implementar
    a política e reportar incidentes à ANEEL;

    III - garantir que as equipes responsáveis pela operação de sistemas de controle
    industrial possuam treinamento e capacitação adequados em segurança cibernética;

    IV - responder perante a ANEEL pelo cumprimento das obrigações previstas nesta
    Resolução Normativa.
guidance:
  prose: |
    O art. 16 estabelece a responsabilidade da alta administracao — CEO, Conselho
    de Administracao e demais executivos — pelo programa de seguranca cibernetica.

    **Por que responsabilidade executiva importa:**
    Sem comprometimento e responsabilidade formal da lideranca:
    - Seguranca cibernetica nao recebe o orcamento necessario
    - O CISO ou responsavel nao tem autoridade para implementar mudancas criticas
    - A cultura organizacional nao prioriza seguranca
    - Em caso de incidente, a organizacao e pega sem preparacao adequada

    **Responsavel pela seguranca cibernetica (inciso II):**
    O perfil do responsavel deve combinar:
    - Conhecimento tecnico em seguranca OT e IT
    - Familiaridade com o setor eletrico e seus sistemas criticos
    - Capacidade de comunicacao com executivos (riscos em linguagem de negocio)
    - Autoridade para tomar decisoes em resposta a incidentes

    **Implicacoes regulatorias do inciso IV:**
    A ANEEL pode aplicar sancoes diretamente aos agentes em caso de descumprimento.
    Em situacoes de incidente que resulte em dano ao SIN por negligencia de
    seguranca cibernetica, a responsabilidade executiva pode ser agravada.

    **Recursos necessarios:**
    O inciso I exige alocacao de recursos. Isso deve incluir:
    - Orcamento dedicado para seguranca cibernetica OT e IT
    - Equipe com competencias especializadas (engenharia de seguranca OT)
    - Ferramentas e tecnologias adequadas
    - Programas de treinamento continuados
implementation_guidance:
  platform_engineering:
    prose: |
      Construir visibilidade executiva sobre o programa de seguranca cibernetica:

      1. Dashboard executivo de seguranca cibernetica:
         - Status dos controles principais (verde/amarelo/vermelho)
         - Metricas de risco em linguagem de negocio (impacto potencial em MWh, R$)
         - Status de conformidade com ANEEL 964 (% de controles implementados)
         - Tendencia de incidentes (ultimos 12 meses)
      2. Portal de governanca: registro formal de decisoes do comite de seguranca,
         aprovacoes de politica, designacoes de responsaveis
      3. Rastreamento de orcamento de seguranca cibernetica:
         aprovado vs. executado, por dominio (OT, IT, treinamento, ferramentas)
      4. Plataforma de gestao de riscos executiva: top 10 riscos ciberneticos
         com impacto estimado e status de tratamento para a alta administracao
    tools:
      - backstage
      - grafana
      - power-bi
      - servicenow-grc
      - archer-grc
  devsecops:
    prose: |
      Implementar controles tecnicos que demonstrem engajamento executivo:

      1. Registro formal de aprovacoes executivas no Git:
         - Aprovacao da politica de seguranca cibernetica (com assinatura digital)
         - Aprovacao de mudancas de alto risco em sistemas criticos
         - Aprovacao de planos de remediaciao para riscos criticos
      2. Relatorio de conformidade automatizado: gerar mensalmente relatorio
         de status de conformidade com ANEEL 964, pronto para apresentacao ao
         conselho de administracao
      3. Alertas executivos automaticos: quando incidente critico ocorre,
         notificar automaticamente o responsavel designado e a alta administracao
      4. Rastreamento de treinamento da alta administracao:
         garantir que executivos concluem treinamento de conscientizacao sobre
         riscos ciberneticos especificos do setor eletrico
    tools:
      - gitlab
      - gitlab-approval-rules
      - pagerduty
      - servicenow-grc
      - lms
  secops:
    prose: |
      Suportar a governanca executiva de seguranca cibernetica:

      1. Comite de seguranca cibernetica: reunioes mensais com o responsavel
         designado e trimestrais com a alta administracao
      2. Relatorio executivo trimestral: sumario de risco, status de conformidade,
         incidentes ocorridos, orcamento executado, proximas iniciativas
      3. Designacao formal do CISO OT/IT: documentar formalmente o responsavel
         pela seguranca cibernetica com seus papeis e responsabilidades,
         comunicar internamente e ao registro da ANEEL quando exigido
      4. Programa de treinamento para a alta administracao: sessoes anuais
         focadas em riscos ciberneticos para o setor eletrico, responsabilidades
         regulatorias e exemplos de incidentes reais no setor
      5. Exercicios de crise para executivos: tabletop exercises com cenarios
         de incidente cibernetico grave envolvendo a alta administracao
    tools:
      - grc-platform
      - servicenow-grc
      - lms
      - knowbe4
