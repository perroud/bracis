id: art-17
family: cap-5
title: "Relatorio Anual de Seguranca Cibernetica"
class: ANEEL-964
baselines: [electric-sector]
statement:
  prose: |
    Art. 17. Os agentes do setor elétrico devem elaborar relatório anual de segurança
    cibernética, a ser retido pela organização e disponibilizado à ANEEL quando
    solicitado em processos de fiscalização, contendo:

    I - avaliação do nível de conformidade com a política de segurança cibernética
    e com os requisitos desta Resolução Normativa;

    II - sumário dos incidentes cibernéticos ocorridos no período, ações de resposta
    adotadas e lições aprendidas;

    III - resultados das avaliações de risco realizadas e status do tratamento dos
    riscos identificados;

    IV - descrição dos investimentos realizados e planejados em segurança cibernética,
    incluindo pessoal, tecnologia e treinamento;

    V - indicadores de desempenho do programa de segurança cibernética, tais como
    tempo médio de detecção e resposta a incidentes, percentual de vulnerabilidades
    remediadas no prazo e taxa de conclusão de treinamentos.
guidance:
  prose: |
    O art. 17 cria um mecanismo de prestacao de contas anual, mesmo sem submissao
    obrigatoria continua. O relatorio anual e a ferramenta que a ANEEL pode usar
    em fiscalizacoes para avaliar a maturidade do programa de seguranca cibernetica.

    **Diferenca entre relatorio e conformidade:**
    Ter o relatorio nao significa ser conforme. O relatorio deve refletir
    honestamente o estado do programa, incluindo gaps e planos de remediaciao.
    Uma organizacao que identifica problemas e tem planos credveis de correcao
    esta em melhor posicao regulatoria do que uma que simula conformidade total.

    **Indicadores de desempenho (inciso V):**
    Metricas recomendadas para o setor eletrico:
    - MTTD (Mean Time to Detect): tempo medio de deteccao de incidentes
    - MTTR (Mean Time to Respond): tempo medio de contencao de incidentes
    - Cobertura de monitoramento OT: % de ativos criticos com monitoramento ativo
    - Taxa de patches em dia: % de vulnerabilidades criticas remediadas no SLA
    - Taxa de conclusao de treinamento: % de colaboradores com acesso a sistemas criticos
    - Exercicios realizados: numero de tabletop exercises e DR drills no ano

    **Uso pela ANEEL em fiscalizacao:**
    Em processos de fiscalizacao, a ANEEL pode solicitar o relatorio e verificar:
    - Consistencia entre o declarado e o observado em inspe/audit tecnica
    - Evolucao do programa ao longo dos anos (comparar relatorios historicos)
    - Resposta adequada a incidentes reportados no ano anterior
implementation_guidance:
  platform_engineering:
    prose: |
      Automatizar a coleta de dados para o relatorio anual:

      1. Dashboard de conformidade ANEEL 964: status de cada artigo da resolucao
         (conforme / parcialmente conforme / nao conforme) com evidencias linkadas
      2. Metricas de seguranca automatizadas:
         - MTTD e MTTR extraidos automaticamente do sistema de gestao de incidentes
         - Taxa de patches extraida do sistema de vulnerability management
         - Cobertura de monitoramento OT: % de ativos com sensor ativo (Claroty/Nozomi)
         - Taxa de treinamento: % de conclusao extraido do LMS
      3. Template de relatorio automatizado: gerar rascunho do relatorio anual
         com dados pre-preenchidos do GRC, SIEM e sistema de incidentes
      4. Arquivo historico: reter relatorios de anos anteriores para demonstrar
         maturidade e evolucao do programa
    tools:
      - grafana
      - power-bi
      - servicenow-grc
      - backstage
      - lms
  devsecops:
    prose: |
      Instrumentar o pipeline para gerar dados de conformidade continuamente:

      1. Metricas de DevSecOps para o relatorio:
         - % de projetos com security scanning ativo (SAST, DAST, SCA)
         - Numero de vulnerabilidades detectadas e remediadas por periodo
         - Lead time de remediacao de vulnerabilidades criticas
      2. Relatorio de cobertura de controles: automaticamente verificar quais
         controles do art. 5 (conteudo minimo da politica) estao implementados
         com evidencias tecnicas
      3. Ciclo de revisao anual do relatorio: criar issue automaticamente no Git
         90 dias antes do encerramento do ano fiscal para iniciar a compilacao
      4. Historico de mudancas de politica: exportar log de todas as mudancas
         na politica de seguranca cibernetica no ano para o relatorio
    tools:
      - gitlab-ci
      - gitlab
      - grafana
      - servicenow-grc
  secops:
    prose: |
      Conduzir o processo de elaboracao do relatorio anual:

      1. Cronograma anual: iniciar compilacao do relatorio no mes 10 para
         finalizar ate o mes 12 (ou conforme calendario definido pela ANEEL)
      2. Coleta de evidencias: reunir evidencias para cada secao do relatorio
         (screenshots, logs, relatorios de ferramentas, atas de reuniao)
      3. Avaliacao de conformidade: para cada artigo da ANEEL 964, avaliar
         o nivel de conformidade com base nas evidencias coletadas
      4. Sumario de incidentes: compilar todos os incidentes do ano, com
         classificacao, impacto, resposta e licoes aprendidas
      5. Revisao executiva: o relatorio deve ser revisado e aprovado pelo
         responsavel designado (CISO) e pela alta administracao antes de ser
         finalizado e retido
    tools:
      - grc-platform
      - servicenow-grc
      - splunk
      - grafana
