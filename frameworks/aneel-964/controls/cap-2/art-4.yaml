id: art-4
family: cap-2
title: "Obrigacao de Elaborar Politica de Seguranca Cibernetica"
class: ANEEL-964
baselines: [electric-sector]
statement:
  prose: |
    Art. 4. Os agentes do setor elétrico devem elaborar e implementar política de
    segurança cibernética, compatível com o porte da organização, a natureza de suas
    operações e o nível de criticidade de seus sistemas para o Sistema Interligado
    Nacional.

    Parágrafo único. A política de segurança cibernética deve ser aprovada pela
    alta administração do agente e revisada pelo menos uma vez a cada dois anos
    ou sempre que ocorrerem mudanças significativas nos sistemas, no ambiente de
    ameaças ou nas exigências regulatórias aplicáveis.
guidance:
  prose: |
    O art. 4 estabelece a obrigacao principal da ANEEL 964: todo agente do setor
    eletrico deve ter uma politica de seguranca cibernetica formal, aprovada pela
    alta administracao e periodicamente revisada.

    **Compatibilidade com o porte:**
    A ANEEL reconhece que uma distribuidora de pequeno porte nao possui os mesmos
    recursos de uma grande empresa de geracao. A politica deve ser proporcional,
    mas nao pode ser vazia. Mesmo agentes menores devem ter controles minimos
    documentados para protecao de sistemas criticos.

    **Aprovacao pela alta administracao:**
    A exigencia de aprovacao pela alta administracao (diretoria ou conselho) e
    crucial porque:
    - Confere autoridade e recursos para implementacao
    - Demonstra compromisso organizacional com seguranca cibernetica
    - Estabelece responsabilidade formal em nivel executivo
    - Facilita comunicacao com a ANEEL em caso de auditoria

    **Gatilhos para revisao antecipada:**
    Alem do ciclo bienal, a politica deve ser revisada quando:
    - Novos sistemas SCADA ou OT sao implantados
    - Ocorre incidente cibernetico significativo
    - Ha mudanca relevante no perfil de ameacas (novos malwares para ICS)
    - Exigencias regulatorias sao atualizadas
    - Ocorre fusao, aquisicao ou alienacao de ativos criticos
implementation_guidance:
  platform_engineering:
    prose: |
      Versionar a politica de seguranca cibernetica como codigo em repositorio Git
      dedicado com controles de acesso e auditoria completa:

      1. Criar repositorio Git exclusivo para documentos de politica e governanca
      2. Configurar branch protection: apenas aprovadores designados podem fazer
         merge de mudancas na politica
      3. Implementar pipeline automatizado de validacao de estrutura da politica
         (verificar secoes obrigatorias, data de revisao, aprovacoes registradas)
      4. Gerar evidencias automaticas de aprovacao pela alta administracao
         (workflow de assinatura digital integrado)
      5. Publicar versao corrente da politica no portal interno de forma acessivel
         a todos os colaboradores

      Integrar com o portal de desenvolvedores (Backstage) para exibir status
      de conformidade da politica em tempo real.
    tools:
      - gitlab
      - gitlab-approval-rules
      - backstage
      - docusign
  devsecops:
    prose: |
      Tratar a politica de seguranca cibernetica como artefato de software:

      1. Armazenar em formato Markdown versionado no repositorio Git
      2. Pipeline CI valida estrutura, secoes obrigatorias e metadados de aprovacao
      3. MR (Merge Request) para qualquer mudanca na politica exige:
         - Aprovacao do CISO
         - Aprovacao do Diretor responsavel pela seguranca OT
         - Registro de justificativa da mudanca
      4. Tags de versao semantica (v1.0, v1.1, v2.0) para rastreabilidade
      5. Notificacoes automaticas para stakeholders quando politica e atualizada
      6. Checklist de revisao automatico gerado 60 dias antes do prazo bienal

      Integrar politica ao onboarding de novos colaboradores via LMS automatizado.
    tools:
      - gitlab
      - gitlab-ci
      - gitlab-approval-rules
      - mkdocs
      - lms
  secops:
    prose: |
      Gerenciar o ciclo de vida da politica de seguranca cibernetica:

      1. Calendario de revisao: agendar revisao bienal no GRC com 90 dias de antecedencia
      2. Gap analysis: comparar politica vigente com requisitos atuais da ANEEL 964,
         NERC CIP e IEC 62443 a cada revisao
      3. Coleta de evidencias de aprovacao: ata de reuniao do conselho ou diretoria
         com aprovacao formal registrada
      4. Distribuicao controlada: manter registro de quem recebeu a politica e
         confirmou conhecimento
      5. Treinamento anual sobre a politica para todos os colaboradores com acesso
         a sistemas criticos do SIN

      Monitorar mudancas no ambiente regulatorio (novas circulares ANEEL, updates
      ONS Arciber) que possam exigir revisao antecipada.
    tools:
      - grc-platform
      - servicenow-grc
      - archer-grc
      - lms
