id: art-5
family: cap-2
title: "Conteudo Minimo da Politica de Seguranca Cibernetica"
class: ANEEL-964
baselines: [electric-sector]
statement:
  prose: |
    Art. 5. A política de segurança cibernética deve contemplar, no mínimo:

    I - os objetivos de segurança cibernética da organização, alinhados à missão
    e ao perfil de risco do agente;

    II - o escopo dos sistemas e ativos cibernéticos abrangidos, com especial
    atenção aos sistemas de controle industrial conectados ao SIN;

    III - as responsabilidades dos colaboradores, prestadores de serviço e
    fornecedores no que concerne à segurança cibernética;

    IV - os procedimentos para gestão de acessos lógicos e físicos a sistemas
    críticos, incluindo autenticação forte e princípio do menor privilégio;

    V - os requisitos de segurança para a cadeia de suprimentos de hardware,
    software e serviços relacionados a sistemas de controle industrial;

    VI - as diretrizes para gestão de vulnerabilidades, patches e configuração
    segura de sistemas OT e IT;

    VII - os procedimentos de resposta a incidentes cibernéticos e notificação
    à ANEEL conforme art. 12 desta Resolução.
guidance:
  prose: |
    O art. 5 define o conteudo minimo que toda politica de seguranca cibernetica
    do setor eletrico deve contemplar. E um checklist regulatorio que a ANEEL
    pode usar em auditorias para verificar a adequacao da politica.

    **Sistemas de controle industrial como elemento central:**
    O inciso II explicita que os sistemas SCADA/ICS devem ter atencao especial.
    Muitas organizacoes tratam seguranca OT como subconjunto da seguranca IT,
    o que e insuficiente. As especificidades dos sistemas de controle industrial
    (protocolos legados, disponibilidade prioritaria, longos ciclos de vida,
    dificuldade de patching) exigem abordagem dedicada.

    **Cadeia de suprimentos OT (inciso V):**
    Ataques a cadeia de suprimentos de ICS/SCADA (ex.: SolarWinds, Triton/TRISIS)
    demonstram que a seguranca nao pode terminar no perimetro do agente. Equipamentos
    de campo (PLCs, RTUs, IEDs) e software SCADA de fornecedores devem passar por
    processo de validacao de seguranca antes da implantacao.

    **Gestao de acessos em sistemas OT (inciso IV):**
    O controle de acesso em sistemas OT apresenta desafios unicos:
    - Muitos sistemas legados nao suportam autenticacao moderna
    - Acesso remoto de fornecedores e comum e dificil de controlar
    - Accounts compartilhadas sao prevalentes em ambientes SCADA
    A politica deve estabelecer requisitos realistas considerando essas restricoes.
implementation_guidance:
  platform_engineering:
    prose: |
      Estruturar a arquitetura tecnica para suportar os requisitos do art. 5:

      **Gestao de acessos OT/IT:**
      1. PAM (Privileged Access Management) para acesso a sistemas SCADA e OT
      2. Jump servers (bastion hosts) na DMZ industrial como unico ponto de
         entrada remoto para redes OT
      3. Session recording para todo acesso privilegiado a sistemas criticos
      4. MFA obrigatoria para acesso remoto a sistemas do SIN

      **Gestao de configuracao segura:**
      5. CIS Benchmarks adaptados para sistemas ICS/SCADA
      6. Baseline de configuracao versionado no Git para todos os componentes OT
      7. Verificacao automatica de desvios de configuracao (Configuration Drift)

      **Seguranca na cadeia de suprimentos:**
      8. Processo de verificacao de integridade para firmware e software OT
         antes da implantacao
      9. Registro de versoes de firmware/software em todos os dispositivos OT
    tools:
      - cyberark
      - beyondtrust
      - claroty
      - nozomi-networks
      - ansible
  devsecops:
    prose: |
      Implementar os requisitos da politica como controles automatizados no pipeline:

      1. Scanner de dependencias para software OT/SCADA (SCA com foco em CVEs
         de sistemas de controle industrial)
      2. Verificacao de assinatura digital para firmware de equipamentos OT
         antes do deploy
      3. IaC Security Scanning: checkov, tfsec com policies customizadas para
         o setor eletrico
      4. Pipeline de gestao de patches com classificacao de urgencia baseada em
         criticidade do sistema (critico-SIN vs. corporativo)
      5. SBOM (Software Bill of Materials) para todos os sistemas criticos,
         incluindo componentes embarcados em dispositivos OT

      Manter biblioteca de policies as code (OPA/Conftest) alinhadas ao conteudo
      minimo do art. 5 para validacao continua.
    tools:
      - gitlab-ci
      - dependabot
      - trivy
      - grype
      - checkov
      - opa
  secops:
    prose: |
      Operacionalizar o conteudo minimo da politica no dia a dia do SOC e GRC:

      1. Asset Management: inventario completo e atualizado de todos os ativos
         OT/IT no escopo (responsabilidade do inciso II)
      2. IAM Review: revisao trimestral de acessos a sistemas criticos, com
         revogacao automatica para contas inativas (principio do menor privilegio)
      3. Vulnerability Management: processo diferenciado para OT — usar scanners
         passivos (Claroty, Nozomi) para nao impactar disponibilidade
      4. Patch Management OT: calendario de patches com janelas de manutencao
         pre-aprovadas, testes em ambiente de homologacao antes de producao
      5. Supply Chain Security: processo de due diligence para fornecedores de
         sistemas ICS/SCADA, incluindo clausulas contratuais de seguranca
      6. Vendor Access Management: processo formal para acesso de fornecedores
         a sistemas OT (tickets, tempo limitado, gravacao de sessao)
    tools:
      - tenable-ot
      - claroty
      - cyberark
      - grc-platform
      - servicenow-itsm
