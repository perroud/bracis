id: disa-stig
title: "DISA Security Technical Implementation Guides (STIGs)"
short_title: "DISA STIG"
version: "2024"
publication_date: "2024-01-01"
last_updated: "2024-01-01"
effective_date: "2024-01-01"

authority:
  name: "Defense Information Systems Agency"
  acronym: "DISA"
  country: "US"
  url: "https://public.cyber.mil/stigs/"

type: guideline
scope: cybersecurity
mandatory: true

original_language: en
available_languages: [en]

