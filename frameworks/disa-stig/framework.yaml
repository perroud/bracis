baselines:
  - id: cat-i
    title: "Category I — Critical (High) Severity"
    description: >-
      Category I findings represent the most severe vulnerabilities — those that
      directly and immediately enable unauthorized access, disclosure of data,
      or denial of service against a DoD system. Examples include use of default
      or shared accounts, absence of encryption for data in transit, and
      unauthenticated access to administrative functions. CAT I findings must
      be remediated immediately; systems may not receive an Authority to Operate
      (ATO) with open CAT I findings without a formal risk acceptance at the
      senior official level.
    severity_level: high
    cvss_score_range: "7.0–10.0"
    remediation_timeline: "immediately or with documented risk acceptance"

  - id: cat-ii
    title: "Category II — Medium Severity"
    description: >-
      Category II findings represent vulnerabilities that degrade the security
      posture of a DoD system but do not immediately enable a compromise on their
      own. Examples include incomplete audit logging, missing patch management
      processes, insufficient access control granularity, and absent network
      segmentation. CAT II findings must be remediated before ATO issuance or
      included in a Plan of Action and Milestones (POA&M) with a defined
      remediation schedule.
    severity_level: medium
    cvss_score_range: "4.0–6.9"
    remediation_timeline: "within 30–90 days or captured in POA&M"

  - id: cat-iii
    title: "Category III — Low Severity"
    description: >-
      Category III findings represent best-practice deficiencies that marginally
      reduce the defense-in-depth posture of a system. Examples include missing
      login banners, incomplete security documentation, and gaps in security
      awareness training records. CAT III findings are tracked in the POA&M and
      addressed in the normal course of operations.
    severity_level: low
    cvss_score_range: "0.1–3.9"
    remediation_timeline: "within 180 days or captured in POA&M"

control_families:
  - id: cat-i
    title: "Category I — Critical Findings"
    description: >-
      Critical/High severity vulnerabilities that directly enable system compromise
      or unauthorized data access; must be remediated immediately.
    control_count: 3

  - id: cat-ii
    title: "Category II — Medium Severity Findings"
    description: >-
      Medium severity vulnerabilities that degrade the security posture when
      unmitigated; must be addressed before or shortly after ATO.
    control_count: 7

  - id: cat-iii
    title: "Category III — Low Severity Findings"
    description: >-
      Low severity best-practice deficiencies tracked in the POA&M.
    control_count: 3

  - id: app-sec
    title: "Application Security"
    description: >-
      Application-level STIG requirements covering input validation, error
      handling, session management, and dependency security.
    control_count: 4

  - id: infra
    title: "Infrastructure Security"
    description: >-
      Infrastructure STIG requirements covering container hardening, Kubernetes
      security, and cloud configuration.
    control_count: 3

related_frameworks:
  - framework_id: nist-800-53-rev5
    relationship: derived-from
    description: >-
      DISA STIGs are implementation-level checklists derived from NIST SP 800-53
      security controls. Each STIG finding maps to one or more NIST 800-53
      controls (primarily from families AC, AU, CM, IA, SC, SI). Organizations
      satisfying STIG requirements demonstrate implementation of the corresponding
      NIST controls.
    mapping_file: "mappings/disa-stig_to_nist-800-53-rev5.yaml"

  - framework_id: cmmc-v2
    relationship: supports
    description: >-
      DISA STIGs are an accepted implementation path for CMMC Level 2 and Level 3
      practice requirements. DoD contractors that implement STIGs for their
      systems demonstrate evidence of meeting CMMC technical practices aligned
      with NIST SP 800-171.
    mapping_file: "mappings/disa-stig_to_cmmc-v2.yaml"

  - framework_id: fedramp
    relationship: complements
    description: >-
      FedRAMP and DISA STIGs both derive from NIST 800-53 but target different
      audiences. STIGs focus on DoD-specific hardening baselines; FedRAMP addresses
      cloud service authorization. Systems can use STIG compliance as supporting
      evidence for FedRAMP configuration management controls (CM-6, CM-7).
    mapping_file: "mappings/disa-stig_to_fedramp.yaml"

  - framework_id: nist-csf-v2
    relationship: mapped
    description: >-
      DISA STIGs contribute to the NIST CSF Protect (PR) function — specifically
      to subcategories PR.AC (Identity Management and Access Control), PR.AT
      (Awareness and Training), PR.DS (Data Security), PR.IP (Information
      Protection Processes), and PR.PT (Protective Technology).
    mapping_file: "mappings/disa-stig_to_nist-csf-v2.yaml"

