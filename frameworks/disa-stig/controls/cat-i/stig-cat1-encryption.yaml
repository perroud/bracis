  - citation: "NSA Commercial National Security Algorithm (CNSA) Suite 2.0"
    url: "https://media.defense.gov/2022/Sep/07/2003071834/-1/-1/0/CSA_CNSA_2.0_ALGORITHMS_.PDF"
  - citation: "DISA STIG — Application Security and Development SRG, V6R1, SV-222575"
