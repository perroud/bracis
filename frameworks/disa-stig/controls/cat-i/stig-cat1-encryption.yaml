implementation_guidance:
  platform_engineering:
    prose: >-
      Enforce mTLS for all service-to-service communication using a service mesh
      (Istio or Linkerd) configured with FIPS-compliant cipher suites. Disable
      TLS 1.0 and 1.1 at the ingress controller, API gateway, and all TLS
      termination points. Configure cipher suite allowlists specifying only
      FIPS-approved algorithms (AES-GCM, ChaCha20-Poly1305 with TLS 1.3;
      ECDHE-based suites with AES-256-GCM for TLS 1.2). Implement encryption
      at rest for all persistent volumes using cloud KMS (AWS KMS, Azure Key Vault,
      GCP Cloud KMS) or on-premises HSM, with keys managed separately from the
      data. Use Vault's transit secrets engine for application-level encryption
      of sensitive fields. Validate FIPS compliance of cryptographic libraries
      in container base images using OpenSSL FIPS module or Go's BoringCrypto.
    tools:
      - istio
      - linkerd
      - hashicorp-vault
      - cert-manager
      - openssl-fips
      - aws-kms
      - azure-key-vault

  devsecops:
    prose: >-
      Integrate SAST rules that detect use of deprecated cryptographic algorithms
      (MD5, SHA-1, DES, RC4, hardcoded keys) in application source code. Use
      dependency scanning to identify libraries with known cryptographic
      weaknesses or CVEs affecting TLS implementations. Scan container images
      for TLS configuration files that enable weak protocols or cipher suites.
      Implement pipeline policies that reject deployments where services expose
      unencrypted endpoints (HTTP on port 80 without redirect, FTP servers,
      Telnet). Add TLS configuration tests to the integration test suite that
      verify minimum TLS version, cipher suite compliance, and certificate
      validity before release. Store all secrets and certificates in Vault or
      cloud secret managers — never in source control, environment files, or
      container image layers.
    tools:
      - gitlab-sast
      - semgrep
      - trivy
      - checkov
      - testssl-sh
      - conftest

  secops:
    prose: >-
      Conduct regular TLS configuration assessments using testssl.sh or Qualys
      SSL Labs equivalents against all external and internal-facing services.
      Monitor for cleartext protocol usage (HTTP, FTP, Telnet, LDAP) using
      network traffic analysis tools and alert on any instances within the
      system boundary. Validate encryption-at-rest configuration during ATO
      assessment by inspecting storage configuration and key management policies.
      Track FIPS 140-2/140-3 module certification status for all cryptographic
      components and monitor for certificate expiration across the system.
      Include cryptographic configuration in vulnerability scanning scope using
      SCAP content that tests for deprecated algorithms and weak TLS configurations.
    tools:
      - splunk
      - zeek
      - qualys
      - tenable
      - openscap-fips
      - hashicorp-vault

