id: stig-cat1-encryption
family: cat-i
title: "Unencrypted Data Transmission and Storage"
class: DISA-STIG

baselines: [cat-i]

statement:
  prose: >-
    The system must protect the confidentiality of CUI and other sensitive data
    using FIPS 140-2 (or FIPS 140-3) validated encryption for all data in transit
    and data at rest. Unencrypted protocols (HTTP, FTP, Telnet, SMTP without TLS,
    SNMPv1/v2, rsh) are prohibited for any data transmission involving sensitive
    information. Encryption algorithms must be NSA-approved or NIST-approved;
    deprecated algorithms (DES, 3DES, RC4, MD5, SHA-1 for digital signatures)
    must not be used. TLS 1.0 and TLS 1.1 must be disabled; systems must use
    TLS 1.2 at minimum and TLS 1.3 where technically feasible. Data at rest on
    system storage must be encrypted using AES-256 or an equivalent FIPS-approved
    algorithm, with keys managed separately from the data they protect.

guidance:
  prose: >-
    Unencrypted transmission of sensitive data is a CAT I finding because it
    directly enables data exfiltration through network interception — a technique
    routinely used by sophisticated adversaries targeting DoD networks. The
    requirement for FIPS 140-2/140-3 validated cryptography ensures that
    algorithms and implementations have been tested against known weaknesses,
    rather than relying on vendor claims.

    STIG reviewers must verify encryption not only on external communications
    but also on internal east-west traffic between system components, including
    microservice communication, database connections, and management interfaces.
    The ubiquitous assumption that internal networks are trusted is a critical
    attack surface — many significant DoD incidents involved lateral movement
    over unencrypted internal channels.

    Key management is equally critical: encryption provides no protection if
    keys are stored alongside the encrypted data, embedded in source code, or
    protected by weak access controls. The system security plan must document
    the key management lifecycle, including key generation, distribution, rotation,
    and destruction procedures.

references:
  - citation: "NIST SP 800-53 Rev 5, SC-8, SC-28, SC-13"
