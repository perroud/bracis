id: rm-monitoring-01
family: rm-monitoring
title: "Monitoring and review"
class: ISO31000

statement:
  prose: >-
    The purpose of monitoring and review is to assure and improve the quality and
    effectiveness of process design, implementation, and outcomes. Ongoing monitoring
    and periodic review of the risk management process and its outcomes should be a
    planned part of the risk management process, with responsibilities clearly defined.
    Monitoring and review should take place in all stages of the process. Monitoring and
    review includes planning, gathering and analysing information, recording results,
    and providing feedback. The results of monitoring and review should be incorporated
    throughout the organization's performance management, measurement, and reporting
    activities.

guidance:
  prose: >-
    Monitoring and reviewing should encompass all aspects of the risk management process
    for the purpose of ensuring that controls are effective and efficient in both design
    and operation, obtaining further information to improve risk assessment, analysing
    and learning from events including changes, trends, successes, and failures, detecting
    changes in the external and internal context which may require revision of risk
    treatments and priorities, and identifying emerging risks. Progress in implementing
    risk treatment plans provides a performance measure. The results can be incorporated
    into the organization's overall performance management and reporting.

references:
  - citation: "ISO 31000:2018, Clause 6.6"
    url: "https://www.iso.org/standard/65694.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement continuous monitoring of risk indicators through platform observability
      stacks. Deploy automated compliance monitoring that continuously validates
      infrastructure against risk treatment requirements. Build risk monitoring
      dashboards that show real-time risk posture, treatment progress, and trend
      analysis. Implement drift detection that triggers alerts when deployed
      configurations deviate from approved risk baselines. Use canary deployments and
      progressive rollouts as risk monitoring mechanisms for changes.
    tools:
      - prometheus
      - grafana
      - datadog
      - falco
      - open-policy-agent

  devsecops:
    prose: >-
      Implement continuous monitoring of risk indicators in CI/CD pipelines including
      vulnerability trend tracking, remediation SLA compliance, and risk gate
      effectiveness metrics. Run periodic rescans of deployed applications to detect
      new vulnerabilities in previously assessed code. Monitor dependency risk
      continuously through automated SCA tools that alert on newly disclosed
      vulnerabilities in existing dependencies. Review risk management process
      effectiveness through pipeline analytics.
    tools:
      - gitlab-ci
      - snyk
      - trivy
      - grafana
      - dependabot

  secops:
    prose: >-
      Implement continuous risk monitoring through SIEM correlation rules that detect
      risk threshold breaches in real time. Conduct periodic risk management reviews
      that assess the effectiveness of risk treatments and the currency of risk
      assessments. Maintain risk monitoring dashboards in the GRC platform with
      automated KRI collection. Implement automated compliance monitoring that
      continuously validates control effectiveness. Generate periodic risk
      monitoring reports for leadership review.
    tools:
      - splunk
      - elastic-siem
      - servicenow-grc
      - qualys
      - wazuh

legal_references:
