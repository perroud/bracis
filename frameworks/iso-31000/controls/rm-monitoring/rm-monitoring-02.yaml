id: rm-monitoring-02
family: rm-monitoring
title: "Continual improvement"
class: ISO31000

statement:
  prose: >-
    The organization should continually improve the suitability, adequacy, and
    effectiveness of the risk management framework and the way the risk management
    process is integrated. As relevant gaps or improvement opportunities are identified,
    the organization should develop plans and tasks and assign them to those accountable
    for implementation. Once implemented, these improvements should contribute to the
    enhancement of risk management. The continual improvement of risk management should
    be a stated objective of the organization and should be integrated into all aspects
    of the organization.

guidance:
  prose: >-
    Continual improvement in risk management should address current issues, determine
    the root causes of any gaps between what is planned and what is achieved, review
    risk management successes and failures and learn from them, review trends and
    patterns of key risk indicators, reassess the adequacy and fitness-for-purpose
    of the risk management framework and process, and incorporate lessons learned
    from risk events and changes in the internal and external context. The improvement
    cycle should be driven by data and evidence, not assumptions.

references:
  - citation: "ISO 31000:2018, Clause 5.7 and Clause 6.7"
    url: "https://www.iso.org/standard/65694.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement post-incident risk reviews (PIRs) as a standard platform practice
      that feeds improvements back into the risk management framework. Maintain a
      risk management improvement backlog tracked alongside platform engineering
      backlogs. Automate maturity scoring of risk management capabilities across
      platform services. Use chaos engineering and game days to test and improve
      risk management processes. Track improvement metrics over time to demonstrate
      continual progress.
    tools:
      - backstage
      - jira
      - grafana
      - litmus-chaos
      - gremlin

  devsecops:
    prose: >-
      Implement feedback loops from production incidents and security events back
      into the CI/CD risk management process. Track and trend pipeline risk
      management metrics to identify improvement opportunities. Conduct periodic
      retrospectives focused on risk management process effectiveness. Benchmark
      risk management maturity across teams and projects to identify best practices
      for broader adoption. Implement automated regression testing for risk
      controls.
    tools:
      - gitlab-ci
      - jira
      - confluence
      - grafana
      - sonarqube

  secops:
    prose: >-
      Conduct after-action reviews following significant risk events and incorporate
      findings into the risk management framework. Maintain a lessons-learned database
      that informs future risk assessments and treatment decisions. Track risk
      management maturity using a recognized model and set improvement targets.
      Benchmark risk management practices against industry peers and regulatory
      expectations. Implement a formal continuous improvement programme for risk
      management with executive sponsorship.
    tools:
      - servicenow-grc
      - archer
      - confluence
      - power-bi
      - metricstream

legal_references:
