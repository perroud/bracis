id: rm-principles-01
family: rm-principles
title: "Integrated, structured, and comprehensive risk management"
class: ISO31000

statement:
  prose: >-
    Risk management is an integral part of all organizational activities. A structured
    and comprehensive approach to risk management contributes to consistent and comparable
    results. Risk management should be integrated into the governance structure of the
    organization, including strategic and operational decision-making, and should be part
    of the organization's structure, operations, and processes. It can be applied at
    strategic, operational, programme, or project levels.

guidance:
  prose: >-
    Integration means that risk management is not a standalone activity separated from the
    main activities and processes of the organization. Risk management is part of the
    responsibilities of management and an integral part of all organizational processes,
    including strategic planning and all project and change management processes.
    A structured and comprehensive approach ensures that outcomes are consistent,
    comparable, and reliable. The approach should be systematic, timely, and organized.

references:
  - citation: "ISO 31000:2018, Clause 4 (Principles)"
    url: "https://www.iso.org/standard/65694.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Embed risk assessment checkpoints into infrastructure provisioning workflows.
      Use policy-as-code engines to enforce risk evaluation before any infrastructure
      change is applied. Integrate risk registers into the internal developer portal
      so that platform teams can view risk posture alongside service catalogs. Ensure
      every Terraform plan or Pulumi preview includes automated risk scoring based on
      the blast radius of proposed changes.
    tools:
      - open-policy-agent
      - backstage
      - terraform
      - pulumi
      - hashicorp-sentinel

  devsecops:
    prose: >-
      Integrate risk assessment into CI/CD pipelines by requiring risk classification
      labels on merge requests and change requests. Implement automated risk scoring
      in the pipeline that evaluates code changes against known risk patterns, including
      changes to authentication, authorization, data handling, and third-party dependencies.
      Require higher approval thresholds for changes classified as high-risk.
    tools:
      - gitlab-ci
      - github-actions
      - jira
      - sonarqube
      - snyk

  secops:
    prose: >-
      Maintain a centralized risk register in the GRC platform that is continuously
      updated from automated risk feeds. Configure the SIEM to correlate security events
      with risk register entries and raise alert priority when events affect high-risk
      assets. Conduct periodic risk review meetings using dashboard data to ensure risk
      management remains integrated into operational decision-making.
    tools:
      - servicenow-grc
      - archer
      - splunk
      - elastic-siem

