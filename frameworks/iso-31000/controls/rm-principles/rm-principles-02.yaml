id: rm-principles-02
family: rm-principles
title: "Inclusive, dynamic, and customized risk management"
class: ISO31000

statement:
  prose: >-
    Appropriate and timely involvement of stakeholders enables their knowledge, views,
    and perceptions to be considered. This results in improved awareness and informed
    risk management. Risk management anticipates, detects, acknowledges, and responds
    to changes and events in an appropriate and timely manner. As the external and
    internal context changes, the organization should adapt its risk management approach
    accordingly. Risk management is customized and proportionate to the organization's
    external and internal context related to its objectives.

guidance:
  prose: >-
    Stakeholder involvement ensures that risk management is properly informed, that
    different viewpoints are represented, and that risk management is regarded as
    relevant and kept up to date. Stakeholders should be involved throughout the risk
    management process. Risk management is dynamic because risks can appear, change,
    or disappear as the external and internal context changes. Risk management should
    sense and respond to these changes in a timely fashion. Customization means that
    the risk management framework and process should be tailored to the specific needs,
    objectives, and context of the organization.

references:
  - citation: "ISO 31000:2018, Clause 4 (Principles)"
    url: "https://www.iso.org/standard/65694.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement self-service risk intake forms in the internal developer portal so
      that all teams can report and track risks. Use event-driven architecture to
      dynamically update risk posture as infrastructure changes occur. Build
      customizable risk dashboards per team, product, or environment. Instrument
      platform components with health and risk signals that feed into centralized
      risk aggregation systems.
    tools:
      - backstage
      - prometheus
      - grafana
      - apache-kafka
      - datadog

  devsecops:
    prose: >-
      Enable stakeholder participation in risk decisions by using merge request
      templates that include risk impact fields. Implement dynamic risk scoring that
      recalculates automatically when the dependency graph, threat landscape, or
      vulnerability databases change. Customize pipeline risk gates per project based
      on the project's risk classification and data sensitivity level.
    tools:
      - gitlab-ci
      - dependabot
      - renovate
      - snyk
      - grype

  secops:
    prose: >-
      Establish cross-functional risk review boards with representatives from
      security, engineering, legal, and business units. Configure the SIEM and GRC
      platform to dynamically adjust risk thresholds based on threat intelligence
      feeds and current incident trends. Customize alerting rules and escalation
      paths based on the risk appetite and operational context of each business unit.
    tools:
      - servicenow-grc
      - splunk
      - misp
      - crowdstrike-falcon

