id: rm-principles-03
family: rm-principles
title: "Best available information and human and cultural factors"
class: ISO31000

statement:
  prose: >-
    The inputs to risk management should be based on historical and current information,
    as well as on future expectations. Risk management should explicitly take into account
    any limitations and uncertainties associated with such information and expectations.
    Information should be timely, clear, and available to relevant stakeholders. Human
    behaviour and culture significantly influence all aspects of risk management at each
    level and stage. Risk management should recognize the contribution of people and
    cultural factors to achieving the organization's objectives.

guidance:
  prose: >-
    Risk management is based on the best available information. The inputs to the
    process of managing risk can be derived from historical data, experience, stakeholder
    feedback, observation, forecasts, and expert judgement. Decision-makers should be
    informed of any limitations of the data or modelling used, or the possibility of
    divergence among experts. Human and cultural factors can facilitate or hinder
    effective risk management. Recognizing human capabilities, perceptions, and intentions
    should be taken into account when establishing the risk management framework and process.

references:
  - citation: "ISO 31000:2018, Clause 4 (Principles)"
    url: "https://www.iso.org/standard/65694.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Aggregate risk-relevant data from multiple sources including infrastructure
      telemetry, vulnerability scanners, configuration management databases, and
      incident history. Build data pipelines that normalize and correlate risk data
      for consumption by risk dashboards. Implement data quality checks to flag stale
      or incomplete risk data. Provide clear data lineage so decision-makers understand
      the provenance and limitations of risk information.
    tools:
      - elasticsearch
      - grafana
      - apache-kafka
      - datadog
      - backstage

  devsecops:
    prose: >-
      Enrich CI/CD pipeline risk assessments with data from multiple sources including
      SBOM analysis, vulnerability databases (NVD, OSV), threat intelligence feeds,
      and historical incident data for the project. Display confidence levels alongside
      risk scores to communicate uncertainty. Implement security champions programs that
      embed security-aware individuals in development teams to account for human factors.
    tools:
      - syft
      - grype
      - osv-scanner
      - gitlab-ci
      - semgrep

  secops:
    prose: >-
      Maintain comprehensive threat intelligence feeds that provide current and
      forward-looking risk data. Implement security awareness training programs
      calibrated to organizational culture and role-specific risk exposure. Conduct
      regular tabletop exercises that test both technical and human aspects of risk
      response. Track metrics on security culture including phishing simulation
      results and incident reporting rates.
    tools:
      - misp
      - opencti
      - knowbe4
      - splunk
      - elastic-siem

