id: rm-framework-02
family: rm-framework
title: "Integration and design"
class: ISO31000

statement:
  prose: >-
    Integrating risk management into an organization is a dynamic and iterative process,
    and should be customized to the organization's needs and culture. Risk management
    should be a part of, and not separate from, the organizational purpose, governance,
    leadership and commitment, strategy, objectives, and operations. Designing the
    framework for managing risk includes understanding the organization and its context,
    articulating risk management commitment, assigning organizational roles, authorities,
    responsibilities, and accountabilities, allocating resources, and establishing
    communication and consultation.

guidance:
  prose: >-
    Integration depends on an understanding of organizational structures and context.
    Structures differ depending on the organization's purpose, goals, and complexity.
    Risk is managed in every part of the organization's structure. Everyone in an
    organization has responsibility for managing risk. The design of the framework
    should include examination of the internal and external context, since these can
    significantly influence the design. The framework should be adapted to make risk
    management proportional to the level of risk faced.

references:
  - citation: "ISO 31000:2018, Clause 5.3 and 5.4"
    url: "https://www.iso.org/standard/65694.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Design risk management capabilities as native platform services rather than
      bolt-on additions. Integrate risk assessment into service provisioning workflows,
      infrastructure change pipelines, and capacity planning processes. Map platform
      services to organizational risk taxonomy. Implement resource tagging strategies
      that enable risk attribution and cost allocation for risk management activities.
      Build shared risk libraries that development teams consume as platform primitives.
    tools:
      - terraform
      - pulumi
      - backstage
      - open-policy-agent
      - crossplane

  devsecops:
    prose: >-
      Design CI/CD pipelines with risk management stages built into the standard
      workflow rather than appended as afterthoughts. Map risk management roles to
      the code review and approval workflow. Implement risk classification for
      repositories and pipelines so that risk management controls are proportionate
      to the risk level. Allocate pipeline compute resources for security scanning
      and risk assessment activities.
    tools:
      - gitlab-ci
      - github-actions
      - tekton
      - argocd
      - sonarqube

  secops:
    prose: >-
      Design the security operations framework to embed risk management into
      detection, response, and recovery processes. Establish communication channels
      between security operations and business risk owners. Define escalation
      matrices that map security event severity to organizational risk tolerance.
      Implement resource allocation models that ensure security operations capacity
      scales with organizational risk exposure.
    tools:
      - servicenow-grc
      - pagerduty
      - opsgenie
      - splunk
      - elastic-siem

