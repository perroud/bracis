id: rm-framework-04
family: rm-framework
title: "Evaluation and improvement of the framework"
class: ISO31000

statement:
  prose: >-
    In order to evaluate the effectiveness of the risk management framework the
    organization should periodically measure the performance of the risk management
    framework against its purpose, implementation plans, indicators, and expected
    behaviour, and determine whether the risk management framework remains suitable
    to support achieving the objectives of the organization. The organization should
    continually improve the suitability, adequacy, and effectiveness of the risk
    management framework and the way the risk management process is integrated.

guidance:
  prose: >-
    The organization should monitor and review the risk management framework on a regular
    basis to ensure that it continues to be effective. Performance indicators should be
    established and periodically reviewed for appropriateness. Deviations and changes
    should be analysed to determine their root causes. Gaps or improvement opportunities
    should be identified, plans developed and assigned to those accountable for
    implementation, and the cycle should repeat. After the evaluation, decisions on how
    to improve the risk management framework should be part of continual improvement.

references:
  - citation: "ISO 31000:2018, Clause 5.6 and 5.7"
    url: "https://www.iso.org/standard/65694.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated collection of risk management KPIs and KRIs across
      platform services. Track metrics such as time-to-detect risk, time-to-remediate,
      risk assessment coverage, and policy compliance rates. Conduct quarterly
      platform risk management reviews that compare actual performance against
      targets. Use retrospectives and post-incident reviews to identify framework
      improvement opportunities. Automate maturity assessments.
    tools:
      - grafana
      - prometheus
      - datadog
      - backstage
      - elasticsearch

  devsecops:
    prose: >-
      Track pipeline risk management effectiveness metrics including false positive
      rates for risk gates, developer friction scores, mean time to risk remediation,
      and risk assessment coverage across repositories. Conduct periodic reviews of
      risk classification criteria and pipeline gate thresholds. Implement feedback
      mechanisms where developers can report issues with risk management tooling.
      Use data-driven analysis to continuously improve pipeline risk controls.
    tools:
      - gitlab-ci
      - grafana
      - sonarqube
      - jira
      - confluence

  secops:
    prose: >-
      Conduct annual risk management framework maturity assessments using recognized
      models (e.g., RIMS RMM, ISO 31000 maturity model). Track operational KRIs
      and KPIs in the GRC platform and report trends to leadership. Perform root
      cause analysis on risk management failures and near-misses. Benchmark the
      organization's risk management maturity against industry peers and update
      the framework improvement roadmap accordingly.
    tools:
      - servicenow-grc
      - archer
      - power-bi
      - splunk
      - metricstream

