id: rm-framework-01
family: rm-framework
title: "Leadership and commitment"
class: ISO31000

statement:
  prose: >-
    Top management and oversight bodies, where applicable, should ensure that risk
    management is integrated into all organizational activities and should demonstrate
    leadership and commitment by customizing and implementing all components of the
    framework, issuing a statement or policy that establishes a risk management approach,
    plan, or course of action, ensuring that the necessary resources are allocated to
    managing risk, and assigning authority, responsibility, and accountability at
    appropriate levels within the organization.

guidance:
  prose: >-
    Leadership and commitment by top management is essential for the success of risk
    management. Top management is accountable for managing risk while oversight bodies
    are accountable for overseeing risk management. Oversight bodies are expected to
    ensure that risks are adequately considered when setting objectives, understand
    the risks facing the organization in pursuit of its objectives, ensure that
    systems to manage risks are implemented and operating effectively, and ensure that
    such risks are appropriate in the context of the organization's objectives. This
    helps the organization to align risk management with its objectives, strategy, and
    culture.

references:
  - citation: "ISO 31000:2018, Clause 5.2"
    url: "https://www.iso.org/standard/65694.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Establish executive-sponsored risk governance in the platform engineering
      organization. Define risk ownership for each platform service in the service
      catalog. Implement RBAC models that reflect organizational risk management
      authority and accountability. Create automated risk reporting dashboards that
      provide leadership with real-time visibility into platform risk posture.
      Allocate dedicated infrastructure capacity for risk management tooling.
    tools:
      - backstage
      - open-policy-agent
      - grafana
      - kubernetes
      - vault

  devsecops:
    prose: >-
      Define risk management responsibilities in the DevSecOps operating model with
      clear RACI matrices for risk activities. Ensure risk management policies are
      codified and enforced in CI/CD pipelines with executive sign-off. Implement
      merge request approval policies that route high-risk changes to designated
      risk owners. Allocate budget for security tooling and training as a visible
      demonstration of leadership commitment.
    tools:
      - gitlab-ci
      - jira
      - confluence
      - sonarqube
      - snyk

  secops:
    prose: >-
      Establish a risk management committee with executive sponsorship that meets
      regularly to review organizational risk posture. Implement GRC platforms with
      risk ownership assignments linked to organizational hierarchy. Generate
      executive-level risk dashboards and board-ready risk reports. Ensure that
      risk management policies are formally documented, approved, and communicated
      across the organization.
    tools:
      - servicenow-grc
      - archer
      - metricstream
      - power-bi

legal_references:
