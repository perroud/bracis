id: rm-framework-03
family: rm-framework
title: "Implementation of the risk management framework"
class: ISO31000

statement:
  prose: >-
    The organization should implement the risk management framework by developing an
    appropriate plan including time and resources, identifying where, when, and how
    different types of decisions are made across the organization and by whom, modifying
    the applicable decision-making processes where necessary, and ensuring that the
    organization's arrangements for managing risk are clearly understood and practised.

guidance:
  prose: >-
    Successful implementation of the framework requires the engagement and awareness of
    stakeholders. This enables organizations to explicitly address uncertainty in
    decision-making, while also ensuring that any new or subsequent uncertainty can be
    taken into account as it arises. Properly designed and implemented, the risk
    management framework will ensure that the risk management process is a part of all
    activities throughout the organization and that decision-making is informed by risk.

references:
  - citation: "ISO 31000:2018, Clause 5.5"
    url: "https://www.iso.org/standard/65694.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Roll out risk management capabilities in the platform incrementally using a
      phased approach. Start with foundational controls (access management, change
      control, audit logging) before advancing to automated risk scoring and
      real-time risk dashboards. Create implementation runbooks that define how
      risk management integrates with each platform service. Track adoption metrics
      to verify that platform teams are using risk management features.
    tools:
      - backstage
      - terraform
      - vault
      - argocd
      - datadog

  devsecops:
    prose: >-
      Implement risk-aware CI/CD pipelines progressively, starting with mandatory
      risk classification labels on all merge requests, then adding automated risk
      gates for high-risk changes. Create developer documentation and training
      materials that explain the risk management workflow. Measure pipeline adoption
      and compliance rates to verify implementation effectiveness. Use feedback
      loops to refine risk gates based on developer experience.
    tools:
      - gitlab-ci
      - confluence
      - sonarqube
      - trivy
      - checkov

  secops:
    prose: >-
      Execute the risk management implementation plan through structured rollout
      of GRC tooling, risk assessment workflows, and reporting cadences. Train
      security operations staff on risk management processes and their role in the
      framework. Establish key risk indicators (KRIs) and key performance indicators
      (KPIs) to measure implementation progress. Conduct readiness assessments
      before each implementation phase.
    tools:
      - servicenow-grc
      - archer
      - jira
      - confluence
      - power-bi

