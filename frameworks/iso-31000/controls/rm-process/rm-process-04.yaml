id: rm-process-04
family: rm-process
title: "Risk analysis and evaluation"
class: ISO31000

statement:
  prose: >-
    The purpose of risk analysis is to comprehend the nature of risk and its
    characteristics including, where appropriate, the level of risk. Risk analysis
    involves a detailed consideration of uncertainties, risk sources, consequences,
    likelihood, events, scenarios, controls, and their effectiveness. Risk analysis
    can be undertaken with varying degrees of detail and complexity, depending on the
    purpose of the analysis, the availability and reliability of information, and the
    resources available. The purpose of risk evaluation is to support decisions. Risk
    evaluation involves comparing the results of the risk analysis with the established
    risk criteria to determine where additional action is required.

guidance:
  prose: >-
    Risk analysis considers factors such as the likelihood of events and consequences,
    the nature and magnitude of consequences, complexity and connectivity, time-related
    factors and volatility, the effectiveness of existing controls, and sensitivity and
    confidence levels. Risk analysis provides an input to risk evaluation, to decisions
    on whether risk needs to be treated and how, and on the most appropriate risk
    treatment strategy and methods. Risk evaluation should consider the wider context
    and the actual and perceived consequences to external and internal stakeholders.
    The outcome of risk evaluation should be recorded, communicated, and then validated
    at appropriate levels of the organization.

references:
  - citation: "ISO 31000:2018, Clause 6.4.3 and 6.4.4"
    url: "https://www.iso.org/standard/65694.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated risk scoring engines that analyse identified risks based
      on asset criticality, vulnerability severity, exposure, and existing control
      effectiveness. Build risk matrices and heat maps into platform dashboards.
      Integrate risk analysis with change management systems so that proposed changes
      include automated risk scoring. Implement risk evaluation logic as policy-as-code
      that compares risk scores against defined risk criteria and triggers appropriate
      workflows.
    tools:
      - open-policy-agent
      - grafana
      - backstage
      - datadog
      - elasticsearch

  devsecops:
    prose: >-
      Implement risk scoring in CI/CD pipelines that analyses vulnerability findings
      by severity, exploitability (EPSS), asset criticality, and compensating control
      effectiveness. Define risk evaluation thresholds per risk classification level
      that determine whether pipelines pass, require approval, or fail. Use CVSS,
      EPSS, and business context to move beyond raw vulnerability counts to
      risk-informed prioritization. Provide developers with clear risk evaluation
      outcomes and recommended remediation priorities.
    tools:
      - trivy
      - grype
      - snyk
      - sonarqube
      - gitlab-ci

  secops:
    prose: >-
      Conduct risk analysis using both qualitative and quantitative methods
      appropriate to the decision being supported. Implement risk matrices in the
      GRC platform that map likelihood and consequence to risk levels. Use
      quantitative risk analysis methods (Monte Carlo simulation, FAIR model) for
      high-impact risks requiring investment decisions. Document risk evaluation
      outcomes and treatment decisions in the risk register. Validate risk
      evaluation results with risk owners and relevant stakeholders.
    tools:
      - servicenow-grc
      - archer
      - risklens
      - metricstream
      - power-bi

legal_references:
