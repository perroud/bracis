id: rm-process-05
family: rm-process
title: "Risk treatment"
class: ISO31000

statement:
  prose: >-
    The purpose of risk treatment is to select and implement options for addressing risk.
    Risk treatment involves an iterative process of formulating and selecting risk
    treatment options, planning and implementing risk treatment, assessing the
    effectiveness of that treatment, deciding whether the remaining risk is acceptable,
    and if not acceptable, taking further treatment. Risk treatment options include
    avoiding the risk, taking or increasing the risk in order to pursue an opportunity,
    removing the risk source, changing the likelihood, changing the consequences,
    sharing the risk (e.g. through contracts, buying insurance), and retaining the
    risk by informed decision.

guidance:
  prose: >-
    Selecting the most appropriate risk treatment option involves balancing the potential
    benefits derived in relation to the achievement of objectives against costs, effort,
    or disadvantages of implementation. Risk treatment options are not necessarily mutually
    exclusive or appropriate in all circumstances. Risk treatment itself can introduce
    risks. A significant risk can be the failure or ineffectiveness of the risk treatment
    measures. Monitoring needs to be an integral part of the risk treatment plan to give
    assurance that the measures remain effective. Risk treatment can also introduce
    secondary risks that need to be assessed, treated, monitored, and reviewed.

references:
  - citation: "ISO 31000:2018, Clause 6.5"
    url: "https://www.iso.org/standard/65694.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement risk treatment controls as codified platform capabilities including
      automated remediation playbooks, self-healing infrastructure, and compensating
      controls deployed through policy-as-code. Build risk treatment options into the
      service catalog so teams can select pre-approved mitigation strategies. Track
      risk treatment implementation and effectiveness through automated metrics
      collection. Implement risk acceptance workflows that require documented
      justification and approval from designated risk owners.
    tools:
      - terraform
      - open-policy-agent
      - vault
      - kubernetes
      - backstage
      - ansible

  devsecops:
    prose: >-
      Implement automated risk treatment in CI/CD pipelines through auto-remediation
      of known vulnerabilities, automated dependency updates, and security hardening
      templates. Provide risk treatment options for pipeline findings including fix,
      accept (with documented justification and approval), or defer (with tracked SLA).
      Implement risk treatment tracking that monitors remediation SLA compliance.
      Generate risk treatment reports that show treatment effectiveness over time.
    tools:
      - dependabot
      - renovate
      - snyk
      - gitlab-ci
      - jira

  secops:
    prose: >-
      Define risk treatment plans in the GRC platform with clear ownership, timelines,
      and expected residual risk levels. Implement automated treatment tracking that
      monitors remediation progress and escalates overdue items. Maintain a risk
      treatment library of pre-approved mitigation strategies mapped to common risk
      scenarios. Track risk treatment effectiveness through post-implementation reviews
      and residual risk assessments. Ensure risk acceptance decisions are formally
      documented and approved at the appropriate authority level.
    tools:
      - servicenow-grc
      - archer
      - jira
      - qualys
      - tenable

