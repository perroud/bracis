id: rm-process-03
family: rm-process
title: "Risk identification"
class: ISO31000

statement:
  prose: >-
    The purpose of risk identification is to find, recognize, and describe risks that
    might help or prevent an organization achieving its objectives. Relevant, appropriate,
    and up-to-date information is important in identifying risks. The organization should
    identify risks whether or not their sources are under its control. Consideration should
    be given to causes and events that could have consequential effects, including cascade
    and cumulative effects. The organization should apply risk identification tools and
    techniques that are suited to its objectives and capabilities, and to the risks faced.

guidance:
  prose: >-
    Risk identification should consider tangible and intangible sources of risk,
    causes and events, threats and opportunities, vulnerabilities and capabilities,
    changes in the external and internal context, indicators of emerging risks,
    the nature and value of assets and resources, consequences and their impact on
    objectives, limitations of knowledge and reliability of information, time-related
    factors, and biases, assumptions, and beliefs of those involved. The organization
    should identify risks even if the risk source is not evident. Risk identification
    should involve people with appropriate knowledge.

references:
  - citation: "ISO 31000:2018, Clause 6.4.2"
    url: "https://www.iso.org/standard/65694.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated risk identification through continuous infrastructure
      scanning, configuration drift detection, and threat modeling tools integrated
      into the platform. Maintain an asset inventory with automated discovery that
      identifies new or changed assets. Use cloud security posture management (CSPM)
      tools to continuously identify risks in cloud infrastructure. Implement
      automated dependency mapping to identify cascade and supply chain risks.
    tools:
      - prowler
      - cloud-custodian
      - trivy
      - backstage
      - cartography

  devsecops:
    prose: >-
      Integrate risk identification into the development lifecycle through automated
      SAST, DAST, SCA, and secret detection in CI/CD pipelines. Use threat modeling
      as part of the design phase for new features and services. Implement SBOM
      generation and analysis to identify supply chain risks. Run infrastructure-as-code
      scanning to identify risks in planned infrastructure changes before deployment.
    tools:
      - semgrep
      - trivy
      - snyk
      - syft
      - checkov
      - tfsec

  secops:
    prose: >-
      Conduct structured risk identification using techniques such as brainstorming,
      SWOT analysis, scenario analysis, and risk workshops. Maintain risk registers
      in the GRC platform with automated feeds from vulnerability management,
      threat intelligence, and asset management systems. Implement continuous
      monitoring for emerging risks through threat intelligence feeds and dark web
      monitoring. Conduct periodic risk identification exercises with cross-functional
      participation.
    tools:
      - servicenow-grc
      - qualys
      - tenable
      - misp
      - opencti

