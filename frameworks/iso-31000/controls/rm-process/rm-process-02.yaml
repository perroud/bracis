id: rm-process-02
family: rm-process
title: "Scope, context, and criteria"
class: ISO31000

statement:
  prose: >-
    The purpose of establishing the scope, context, and criteria is to customize the
    risk management process, enabling effective risk assessment and appropriate risk
    treatment. Scope, context, and criteria involve defining the scope of the process,
    and understanding the external and internal context. The organization should define
    the amount and type of risk that it may or may not take relative to objectives (risk
    criteria). Risk criteria should be aligned with the risk management framework and
    customized to the specific purpose and scope of the activity under consideration.
    Risk criteria should reflect the organization's values, objectives, and resources.

guidance:
  prose: >-
    The organization should define the scope of its risk management activities. This
    includes the objectives and decisions that need to be made, the outcomes expected
    from the process, the time, location, inclusions, and exclusions, the tools and
    techniques appropriate for risk assessment, the resources required, and the
    relationships with other projects, processes, and activities. The external context
    includes social, cultural, political, legal, regulatory, financial, technological,
    economic, and environmental factors. The internal context includes governance,
    organizational structure, roles and accountabilities, policies, objectives and
    strategies, capabilities, culture, standards, guidelines, and contractual relationships.

references:
  - citation: "ISO 31000:2018, Clause 6.3"
    url: "https://www.iso.org/standard/65694.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Define risk scope for each platform service in the service catalog, including
      data classification, availability requirements, and blast radius. Implement
      context-aware risk scoring that considers the deployment environment, data
      sensitivity, and regulatory requirements applicable to each workload.
      Codify risk criteria as policy-as-code rules that can be automatically
      evaluated during infrastructure provisioning and change management.
    tools:
      - backstage
      - open-policy-agent
      - terraform
      - vault
      - kyverno

  devsecops:
    prose: >-
      Establish risk criteria for CI/CD pipelines including vulnerability severity
      thresholds, code quality gates, and dependency risk levels. Define the scope
      of risk assessment for each pipeline stage. Implement risk context enrichment
      that provides pipelines with awareness of the regulatory environment, data
      classification, and business criticality of the application under deployment.
      Use risk classification labels on repositories to drive proportionate controls.
    tools:
      - gitlab-ci
      - sonarqube
      - trivy
      - snyk
      - checkov

  secops:
    prose: >-
      Document the organizational risk context including threat landscape, regulatory
      requirements, business objectives, and risk appetite statements. Maintain risk
      criteria in the GRC platform that define acceptable risk levels per business
      domain and asset classification. Review and update risk criteria periodically
      or when significant changes occur in the internal or external context. Ensure
      risk criteria are formally approved by risk owners and governance bodies.
    tools:
      - servicenow-grc
      - archer
      - metricstream
      - confluence

