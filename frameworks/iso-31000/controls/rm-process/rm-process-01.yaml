id: rm-process-01
family: rm-process
title: "Communication and consultation"
class: ISO31000

statement:
  prose: >-
    The purpose of communication and consultation is to assist relevant stakeholders
    in understanding risk, the basis on which decisions are made, and the reasons why
    particular actions are required. Communication seeks to promote awareness and
    understanding of risk, whereas consultation involves obtaining feedback and
    information to support decision-making. Close coordination between the two should
    facilitate factual, timely, relevant, accurate, and understandable exchange of
    information, taking into account the confidentiality and integrity of information
    as well as the privacy rights of individuals.

guidance:
  prose: >-
    Communication and consultation should take place during all steps of the risk
    management process. Communication and consultation with appropriate external and
    internal stakeholders should take place within and throughout all steps of the risk
    management process. Communication and consultation aims to bring together different
    areas of expertise for each step of the risk management process, ensure that different
    views are appropriately considered when defining risk criteria and when evaluating
    risks, provide sufficient information to facilitate risk oversight and decision-making,
    and build a sense of inclusiveness and ownership among those affected by risk.

references:
  - citation: "ISO 31000:2018, Clause 6.2"
    url: "https://www.iso.org/standard/65694.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build risk communication channels into the platform through automated
      notifications when risk posture changes, risk dashboards in the internal
      developer portal, and integration with messaging platforms. Implement
      self-service risk reporting tools so stakeholders can query risk data
      directly. Establish risk communication APIs that downstream systems can
      consume to display contextual risk information where decisions are made.
    tools:
      - backstage
      - grafana
      - slack
      - pagerduty
      - datadog

  devsecops:
    prose: >-
      Communicate risk information directly in the developer workflow through
      merge request comments, pipeline status badges, and security finding
      annotations. Implement risk dashboards in the CI/CD platform that show
      project-level and organization-level risk trends. Use automated reports
      to communicate risk findings to stakeholders after each pipeline run.
      Provide consultation channels where developers can discuss risk
      classification decisions with security teams.
    tools:
      - gitlab-ci
      - slack
      - jira
      - confluence
      - sonarqube

  secops:
    prose: >-
      Establish formal risk communication procedures including risk reports to
      leadership, risk advisory notifications to affected business units, and
      threat intelligence briefings to technical teams. Implement automated risk
      alerting through the SIEM that notifies relevant stakeholders when risk
      thresholds are breached. Maintain stakeholder communication matrices that
      define who receives what risk information, when, and through which channels.
    tools:
      - servicenow-grc
      - splunk
      - pagerduty
      - slack
      - confluence

