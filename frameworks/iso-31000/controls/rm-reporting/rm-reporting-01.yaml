id: rm-reporting-01
family: rm-reporting
title: "Recording and reporting"
class: ISO31000

statement:
  prose: >-
    The risk management process and its outcomes should be documented and reported
    through appropriate mechanisms. Recording and reporting aims to communicate risk
    management activities and outcomes across the organization, provide information for
    decision-making, improve risk management activities, and assist interaction with
    stakeholders, including those with responsibility and accountability for risk
    management activities. Decisions regarding the creation, retention, and handling of
    documented information should take into account their use, information sensitivity,
    and the external and internal context.

guidance:
  prose: >-
    Recording and reporting should consider different stakeholders and their specific
    information needs and requirements, cost, frequency, and timeliness of reporting,
    method of reporting, and relevance of information to organizational objectives and
    decision-making. Reports should give a clear picture of the risk and its management,
    including progress against risk treatment plans. The format and level of detail should
    be appropriate for the audience. Risk reports should be generated at defined intervals
    and when significant changes in risk occur. Recording provides the foundation for
    improvement of methods and tools, as well as of the overall process.

references:
  - citation: "ISO 31000:2018, Clause 6.7"
    url: "https://www.iso.org/standard/65694.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated risk reporting through platform observability and GRC
      integrations. Generate risk reports from platform telemetry data including
      infrastructure risk posture, compliance status, and treatment progress. Store
      risk records in centralized, auditable repositories with appropriate retention
      policies. Build self-service risk reporting capabilities so stakeholders can
      generate reports tailored to their needs. Implement immutable audit trails
      for all risk management activities and decisions.
    tools:
      - grafana
      - elasticsearch
      - backstage
      - datadog
      - vault

  devsecops:
    prose: >-
      Generate automated risk reports from CI/CD pipeline data including vulnerability
      findings, risk gate outcomes, and remediation metrics. Integrate pipeline risk
      data with organizational risk reporting systems. Maintain immutable records of
      all risk assessments performed in pipelines. Implement risk reporting dashboards
      that provide both developer-level and management-level views. Archive risk
      assessment artifacts with appropriate retention periods aligned with regulatory
      and organizational requirements.
    tools:
      - gitlab-ci
      - grafana
      - elasticsearch
      - sonarqube
      - jira

  secops:
    prose: >-
      Implement structured risk reporting in the GRC platform with defined report
      templates for different audiences (board, executive, operational, technical).
      Generate risk reports at regular intervals and on-demand when significant risk
      events occur. Maintain comprehensive risk records including risk assessments,
      treatment plans, monitoring results, and decision logs. Implement document
      retention policies that comply with regulatory requirements. Ensure risk
      reports are accessible to authorized stakeholders while protecting sensitive
      risk information.
    tools:
      - servicenow-grc
      - archer
      - power-bi
      - splunk
      - confluence

