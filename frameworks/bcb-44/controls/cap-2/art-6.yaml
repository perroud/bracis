id: art-6
family: cap-2
title: "Aprovacao e Governanca da Politica"
class: BCB-44
baselines: [todas-ips]
statement:
  prose: |
    Art. 6. A política de PLD/FT prevista no art. 4 deve ser:

    I - aprovada pela diretoria da instituição de pagamento;

    II - revisada, no mínimo, anualmente ou sempre que ocorrerem alterações
    relevantes nas atividades, nos riscos identificados ou nas normas regulatórias
    aplicáveis;

    III - comunicada a todos os funcionários e prestadores de serviço envolvidos
    nas atividades abrangidas pelo programa de PLD/FT.
guidance:
  prose: |
    O art. 6 estabelece tres requisitos de governanca para a politica de PLD/FT.

    **Aprovacao pela diretoria (inciso I):**
    Nao basta a aprovacao do compliance officer. A diretoria da IP -- ou o
    equivalente (conselho de administracao, diretores estatutarios) -- deve
    formalmente aprovar. Evidencia: ata de reuniao de diretoria com numero do
    documento aprovado e data.

    **Revisao periodica (inciso II):**
    Frequencia minima de 12 meses. Revisao antecipada obrigatoria quando:
    - Nova norma do BCB ou COAF e publicada
    - Novo produto ou servico e lancado
    - Fusao, aquisicao ou reestruturacao societaria
    - Identificacao de risco nao coberto pela politica atual
    - Recomendacao de auditoria interna ou externa

    **Comunicacao (inciso III):**
    Comunicacao nao e opcional nem informal. Deve ser documentada (email corporativo,
    assinatura eletronica de ciencia, treinamento) e abranger:
    - Todos os funcionarios CLT e PJ
    - Terceiros e prestadores de servicos com acesso a sistemas de pagamento
    - Correspondentes e agentes de pagamento
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de governanca da politica:**
      1. Modulo de gestao de documentos com workflow de aprovacao multinivel:
         draft → revisao compliance → aprovacao CEO/diretoria → publicacao.
      2. Assinatura digital qualificada (ICP-Brasil) da diretoria no documento
         aprovado, gerando evidencia auditavel.
      3. Sistema de comunicacao em massa para distribuicao da politica com
         rastreamento de leitura e confirmacao por funcionario.
      4. Calendario automatico de revisao com alertas 60 dias antes da data limite.
      5. Controle de versao: politica vigente sempre acessivel com historico de
         versoes anteriores e log de alteracoes.
    tools:
      - document-management
      - digital-signature
      - grc-platform
      - learning-management-system
  devsecops:
    prose: |
      **Automacao de governanca:**
      1. Verificacao automatica no inicio de cada sprint/ciclo: politica vigente
         esta dentro do prazo de revisao?
      2. Pipeline de deploy de sistemas de PLD/FT valida que politica esta aprovada
         e vigente antes de permitir alteracoes em producao.
      3. Notificacao automatica para compliance manager quando politica se aproxima
         do prazo de revisao (90, 60, 30 dias).
    tools:
      - gitlab-ci
      - notification-system
      - calendar-automation
  secops:
    prose: |
      **Auditoria de governanca:**
      1. Verificar trimestralmente que evidencias de aprovacao da diretoria estao
         arquivadas e acessiveis.
      2. Checar lista de distribuicao contra lista de funcionarios atual (detectar
         novos contratados que nao receberam a politica).
      3. Revisar log de leitura/ciencia: funcionarios que nao confirmaram devem
         receber notificacao.
      4. Manter registro de todas as revisoes com justificativa, data e responsavel.
    tools:
      - grc-platform
      - audit-management
      - hr-system-integration
