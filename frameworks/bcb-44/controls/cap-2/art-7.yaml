id: art-7
family: cap-2
title: "Diretor Responsavel pelo Programa de PLD/FT"
class: BCB-44
baselines: [todas-ips]
statement:
  prose: |
    Art. 7. As instituições de pagamento devem designar diretor responsável pelo
    cumprimento das obrigações estabelecidas nesta Resolução.

    § 1. O diretor de que trata o caput pode desempenhar outras funções na
    instituição, exceto as de auditoria interna.

    § 2. As funções de que trata o caput podem ser exercidas pelo próprio diretor-
    presidente, nos casos em que a estrutura da instituição de pagamento seja
    compatível com essa acumulação.

    § 3. As informações relativas ao diretor designado devem ser mantidas
    atualizadas no Cadastro de Instituições Financeiras do Banco Central do Brasil.
guidance:
  prose: |
    O art. 7 cria a figura do "diretor de PLD/FT" para IPs -- equivalente ao MLRO
    (Money Laundering Reporting Officer) nos frameworks internacionais.

    **Responsabilidades tipicas do diretor de PLD/FT:**
    - Aprovar a politica e os procedimentos de PLD/FT
    - Supervisionar o programa de PLD/FT
    - Aprovar as comunicacoes ao COAF (ou delegar com supervisao)
    - Reportar ao board sobre o status do programa
    - Responder perante o BCB em caso de inspecao ou questionamento
    - Ser o ponto de contato do BCB para assuntos de PLD/FT

    **Restricao de acumulacao (ss 1):**
    Pode acumular com qualquer funcao EXCETO auditoria interna, pois isso
    criaria conflito entre executar e auditar o mesmo programa.

    **Registro no CADIP:**
    O diretor designado deve estar registrado no Cadastro de Instituicoes do BCB.
    Mudancas de diretor devem ser comunicadas imediatamente ao BCB.

    **Consequencia de nao-designacao:**
    A ausencia de diretor formalmente designado e inforcao passivel de sancao
    administrativa, incluindo multa e restricao operacional.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao do cargo de diretor PLD/FT no sistema:**
      1. Cadastrar o diretor de PLD/FT no sistema de GRC com permissoes e
         responsabilidades especificas (aprovacao de SAR, revisao de alertas criticos).
      2. Implementar fluxo de aprovacao de decisoes criticas de PLD/FT que
         requer assinatura digital do diretor designado.
      3. Painel executivo do diretor: visao consolidada de KPIs do programa,
         alertas pendentes de decisao, prazos de comunicacao ao COAF.
      4. Notificacoes automaticas ao diretor para situacoes criticas: alerta de
         prazo COAF, cliente bloqueado por ordem judicial, anomalia no sistema.
    tools:
      - grc-platform
      - workflow-automation
      - executive-dashboard
  devsecops:
    prose: |
      **Controle de acesso baseado em cargo:**
      1. Implementar role "diretor-pldft" no sistema IAM com permissoes:
         - Aprovacao final de SAR/COAF
         - Acesso a relatorios gerenciais
         - Configuracao de parametros de risco
         - Bloqueio manual de operacoes
      2. Auditoria de todas as acoes realizadas pelo diretor no sistema (log
         de auditoria nao-repudiavel).
      3. Processo de offboarding imediato quando diretor muda: revogar acessos
         e transferir responsabilidades antes do encerramento.
    tools:
      - iam-system
      - audit-logging
      - access-control
  secops:
    prose: |
      **Gestao do mandato do diretor:**
      1. Manter registro atualizado do diretor designado com data de designacao,
         numero de ato aprovador e dados de contato.
      2. Verificar periodicamente que registro no CADIP do BCB esta atualizado.
      3. Processo formal de substituicao: comunicacao ao BCB, atualizacao de
         sistemas, transferencia de dossiês abertos.
      4. Revisao das responsabilidades documentadas do cargo ao menos anualmente.
    tools:
      - grc-platform
      - regulatory-reporting
      - hr-system-integration
