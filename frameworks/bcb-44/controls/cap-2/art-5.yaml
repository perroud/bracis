id: art-5
family: cap-2
title: "Avaliacao Interna de Risco de PLD/FT"
class: BCB-44
baselines: [todas-ips]
statement:
  prose: |
    Art. 5. As instituições de pagamento devem realizar avaliação interna de risco de
    lavagem de dinheiro e de financiamento do terrorismo, considerando, no mínimo:

    I - os riscos associados às suas áreas de atuação, incluindo regiões geográficas,
    segmentos de clientes, canais de distribuição e produtos e serviços oferecidos;

    II - o perfil de risco de seus clientes, levando em conta critérios como
    natureza, porte, setor de atividade, localização geográfica e histórico de
    relacionamento;

    III - o volume e a complexidade das operações realizadas pelos clientes;

    IV - os riscos associados ao uso de novas tecnologias, incluindo produtos e
    serviços baseados em ativos virtuais e canais digitais.

    § 1. A avaliação de risco de que trata o caput deve ser documentada, mantida
    atualizada e submetida à aprovação da diretoria da instituição.

    § 2. A avaliação deve ser revisada quando ocorrerem mudanças relevantes no
    perfil de risco da instituição ou de seus clientes.
guidance:
  prose: |
    O art. 5 exige uma avaliacao formal, documentada e aprovada pela diretoria.
    Nao e um exercicio informal de brainstorm -- e um documento regulatorio.

    **Quatro dimensoes de risco a cobrir:**
    1. **Risco geografico:** regioes com maior incidencia de crimes como trafico,
       corrupcao, economia informal. Usar mapas de risco BCB, FATF, Transparencia
       Internacional.
    2. **Risco de produto/servico:** transferencias internacionais, operacoes anonimas,
       carregamento em especie, cripto-ativos elevam o risco.
    3. **Risco de canal:** canais digitais sem interacao humana, correspondes bancarios,
       agentes de pagamento.
    4. **Risco de cliente:** PEP, nao-residentes, PJ com estrutura societaria complexa,
       setores economicos de alto risco (joias, imoveis, cash-intensive).

    **Risco de novas tecnologias (inciso IV):**
    Especialmente relevante para fintechs: PIX com QR Code, BNPL (buy now pay later),
    open finance, criptoativos, DeFi, NFTs. Cada nova tecnologia deve passar por
    avaliacao de risco antes do lancamento.

    **Revisao obrigatoria:**
    - Novo produto ou servico
    - Nova regiao de atuacao
    - Novo segmento de clientes
    - Mudanca significativa no volume de operacoes
    - Aquisicao ou fusao
    - Atualizacao de normas regulatorias
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de avaliacao de risco:**
      1. Implementar modulo de risk assessment no sistema de GRC com questionario
         estruturado cobrindo as 4 dimensoes do art. 5 (geografico, produto, canal, cliente).
      2. Calcular automaticamente o score de risco residual por dimensao e score
         consolidado da instituicao.
      3. Gerar relatorio de avaliacao de risco em formato padronizado, com evidencias
         e justificativas para cada pontuacao.
      4. Workflow de aprovacao: compliance prepara → diretor de PLD/FT revisa → board aprova.
      5. Alertas automaticos quando gatilhos de revisao sao detectados (novo produto,
         mudanca de volume, atualizacao regulatoria).
    tools:
      - grc-platform
      - risk-assessment
      - reporting-dashboard
  devsecops:
    prose: |
      **Avaliacao de risco de novas tecnologias:**
      1. Privacy/Security Impact Assessment (PIA/SIA) obrigatorio para novos
         produtos antes do deploy em producao.
      2. Checklist de PLD/FT no pipeline de CI/CD para novos servicos de pagamento.
      3. Approval gate de compliance no pipeline de deploy de sistemas com impacto
         em PLD/FT.
      4. Documentacao automatica de riscos identificados na fase de design no
         repositorio de codigo (ADR -- Architecture Decision Record).
    tools:
      - gitlab-ci
      - security-by-design
      - threat-modeling
  secops:
    prose: |
      **Manutencao e monitoramento da avaliacao de risco:**
      1. Revisar a avaliacao de risco anualmente e sempre que um gatilho do ss 2
         for acionado.
      2. Monitorar metricas de risco real vs risco avaliado: volume de alertas,
         SAR ratio, distribuicao geografica das operacoes.
      3. Comparar avaliacao interna com avaliacoes setoriais (ex: relatorios do BCB,
         COAF, FATF sobre o setor de pagamentos).
      4. Manter trilha de auditoria de todas as avaliacoes de risco com datas,
         responsaveis e resultados.
    tools:
      - grc-platform
      - risk-management
      - aml-platform
