id: art-4
family: cap-2
title: "Politica de Prevencao a PLD/FT"
class: BCB-44
baselines: [todas-ips]
statement:
  prose: |
    Art. 4. As instituições de pagamento devem implementar política de prevenção à
    lavagem de dinheiro e ao financiamento do terrorismo que contemple, no mínimo:

    I - os princípios e as diretrizes do programa de PLD/FT da instituição;

    II - a definição das responsabilidades dos envolvidos no programa de PLD/FT;

    III - os procedimentos para avaliação interna de risco;

    IV - os procedimentos de identificação, qualificação e classificação de clientes;

    V - os procedimentos de monitoramento, seleção e análise de operações;

    VI - os procedimentos para comunicação de operações suspeitas ao COAF;

    VII - os procedimentos de treinamento e capacitação dos funcionários;

    VIII - os mecanismos de avaliação contínua da efetividade do programa.
guidance:
  prose: |
    O art. 4 define o conteudo minimo obrigatorio da politica de PLD/FT da IP.
    A politica e o documento normativo central -- todos os demais procedimentos
    devem derivar dela e ser coerentes com seus principios.

    **Estrutura recomendada do documento:**
    1. Objetivo e escopo (quais unidades, produtos, regioes)
    2. Principios (tolerancia zero a lavagem, abordagem baseada em risco, confidencialidade)
    3. Governanca e responsabilidades (board, diretoria, compliance, areas de negocio)
    4. Avaliacao de risco (metodologia, frequencia, documentacao)
    5. Procedimentos de KYC (onboarding, atualizacao, encerramento)
    6. Monitoramento e analise (regras, limiares, workflow de analise)
    7. Comunicacao ao COAF (criterios, processo, prazos)
    8. Treinamento (publico, frequencia, conteudo minimo)
    9. Avaliacao de efetividade (metricas, revisao, melhoria continua)

    **Documento vivo:**
    A politica deve ser revisada anualmente ou sempre que houver mudancas
    significativas no perfil de risco, produtos, legislacao ou estrutura
    organizacional da IP.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao do ciclo de vida da politica:**
      1. Armazenar a politica no sistema de gestao documental com versionamento
         automatico (numero de versao, data de aprovacao, responsavel pela aprovacao).
      2. Implementar fluxo de revisao e aprovacao no sistema: rascunho → revisao
         compliance → aprovacao diretor → publicacao.
      3. Notificacao automatica de todos os funcionarios quando nova versao da
         politica e publicada, com confirmacao de leitura e ciencia.
      4. Dashboard de status: vigencia atual, proxima revisao, cobertura de treinamento
         sobre a politica atual.
      5. Publicar a politica em local acessivel a todos os funcionarios (intranet,
         portal interno).
    tools:
      - document-management
      - grc-platform
      - intranet
  devsecops:
    prose: |
      **Compliance-as-code da politica:**
      1. Manter politica em repositorio git como documento Markdown ou similar,
         permitindo audit trail de todas as alteracoes com justificativas.
      2. Automatizar verificacao de completude: script que valida presenca de todos
         os 8 elementos obrigatorios do art. 4 no documento da politica.
      3. Pipeline de aprovacao de alteracoes na politica requer aprovacao do
         compliance officer e do diretor designado.
    tools:
      - gitlab-ci
      - document-as-code
      - policy-as-code
  secops:
    prose: |
      **Auditoria da politica:**
      1. Verificar anualmente se todos os 8 elementos do art. 4 estao presentes
         e atualizados na politica vigente.
      2. Validar que a politica reflete o perfil de risco atual da instituicao.
      3. Documentar evidencias de aprovacao pela diretoria (ata de reuniao ou
         equivalente assinado eletronicamente).
      4. Verificar aderencia dos procedimentos operacionais ao conteudo da politica.
    tools:
      - grc-platform
      - audit-management
      - document-management
