id: art-32
family: cap-7
title: "Sancoes Administrativas e Responsabilidade"
class: BCB-44
baselines: [todas-ips]
statement:
  prose: |
    Art. 32. O descumprimento das obrigações estabelecidas nesta Resolução sujeita
    as instituições de pagamento e seus administradores às penalidades previstas
    na legislação vigente, incluindo:

    I - advertência;

    II - multa pecuniária variável, nos termos do art. 12 da Lei n. 9.613, de 1998;

    III - inabilitação temporária ou permanente para o exercício de cargo de
    administrador em instituições autorizadas pelo Banco Central do Brasil;

    IV - cassação ou suspensão da autorização para funcionamento como instituição
    de pagamento.

    Parágrafo único. A responsabilidade das pessoas físicas que exercem funções
    de administração é apurada de forma independente da responsabilidade da
    instituição, podendo ambas ser apenadas pelo mesmo fato.
guidance:
  prose: |
    O art. 32 deixa claro que o descumprimento tem custo financeiro e pessoal.

    **Escala de sancoes (em ordem de gravidade):**
    1. Advertencia: infracoes leves, primeira reincidencia
    2. Multa: pode ser de 1% a 200% do valor da operacao irregular, ou valor
       fixo para irregularidades procedimentais
    3. Inabilitacao pessoal: o diretor/CEO pessoalmente pode ser proibido de
       exercer funcoes em qualquer banco ou IP
    4. Cassacao: a IP perde a autorizacao para funcionar -- e o fim do negocio

    **Responsabilidade pessoal (paragrafo unico):**
    A empresa e o diretor de PLD/FT podem ser sancionados SIMULTANEAMENTE pelo
    mesmo evento. Isso cria incentivo pessoal forte para o diretor designado
    garantir a conformidade.

    **Multas da Lei 9.613/98:**
    - Ate 20 milhoes de reais
    - Ou ate o dobro do valor da operacao em que houve infrcao
    - Ou ate 200% do lucro obtido com a infrcao
    O que for maior.

    **Consequencia pratica para o programa:**
    As sancoes justificam o investimento no programa de PLD/FT. O custo de
    conformidade deve ser comparado com o custo potencial de sancoes.
implementation_guidance:
  platform_engineering:
    prose: |
      **Dashboard de conformidade regulatoria:**
      1. Painel de indicadores de conformidade da BCB 44 visivel para a diretoria:
         percentual de controles implementados, KPIs de monitoramento, status
         de treinamentos, ultimas comunicacoes ao COAF.
      2. Registro de nao-conformidades identificadas (interna ou externamente)
         com plano de acao, responsavel e prazo de correcao.
      3. Historico de sancoes e autuacoes (se houver) com documentacao de
         resposta e correcao.
    tools:
      - grc-platform
      - executive-dashboard
      - audit-management
  devsecops:
    prose: |
      **Monitoramento de conformidade como codigo:**
      1. Policy-as-code: verificacoes automaticas de conformidade executadas
         no pipeline de CI/CD para detectar violacoes antes de chegarem a producao.
      2. Relatorio automatico de conformidade gerado mensalmente como evidencia
         do programa em funcionamento.
      3. Alert de degradacao: se KPI critico cair abaixo do threshold, alertar
         o compliance manager imediatamente.
    tools:
      - policy-as-code
      - gitlab-ci
      - monitoring-alerting
  secops:
    prose: |
      **Gestao do risco regulatorio:**
      1. Inventario de riscos regulatorios: quais artigos da BCB 44 tem maior
         risco de nao conformidade dado o perfil atual da IP.
      2. Plano de remediacao: para cada risco identificado, acao, responsavel e prazo.
      3. Simulacao de inspecao do BCB: realizar periodicamente exercicio de
         "mock inspection" para verificar se todas as evidencias estao disponiveis.
      4. Relacionamento com o BCB: manter canal aberto para consultas sobre
         interpretacao de normas antes de implementar.
    tools:
      - grc-platform
      - risk-management
      - regulatory-intelligence
