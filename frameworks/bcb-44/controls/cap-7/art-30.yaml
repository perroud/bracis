id: art-30
family: cap-7
title: "Treinamento e Capacitacao de Funcionarios"
class: BCB-44
baselines: [todas-ips]
statement:
  prose: |
    Art. 30. As instituições de pagamento devem implementar programa de treinamento
    e capacitação contínua de seus funcionários e prestadores de serviço em PLD/FT,
    contemplando, no mínimo:

    I - treinamento inicial para todos os novos funcionários antes do início
    das atividades;

    II - treinamento periódico, com frequência compatível com o perfil de risco
    da função exercida;

    III - conteúdo específico por função: compliance, atendimento, tecnologia,
    diretoria e demais áreas;

    IV - mecanismos de avaliação do aproveitamento do treinamento.

    Parágrafo único. Registros de treinamento devem ser mantidos por, no mínimo,
    cinco anos e disponibilizados ao Banco Central do Brasil quando solicitado.
guidance:
  prose: |
    O art. 30 reconhece que tecnologia e processos sao insuficientes sem
    pessoas capacitadas. O treinamento e parte integral do programa de PLD/FT.

    **Treinamento por funcao:**
    - Compliance officer: normativa completa, FATF guidance, typologies, COAF
    - Analista de PLD/FT: procedimentos de analise, SISCOAF, case management
    - Atendimento ao cliente: reconhecer comportamentos suspeitos, nao fazer
      tipping off, escalar situacoes
    - Tecnologia/TI: importancia dos dados de PLD/FT, seguranca, integridade
    - Diretoria: obrigacoes legais, responsabilidade pessoal, aprovacao de politica
    - Operacoes e produtos: impacto de novos produtos no risco de PLD/FT

    **Frequencia recomendada:**
    - Alto risco (compliance, analistas): anual ou a cada nova norma significativa
    - Medio risco (atendimento): anual
    - Baixo risco (TI, diretoria): bianual
    - Todos: sempre que houver mudanca significativa na legislacao ou nos
      procedimentos internos

    **Avaliacao (inciso IV):**
    Nao basta assistir. O treinamento deve incluir avaliacao que verifique
    a absorvicao do conteudo. Pontuacao minima de aprovacao deve ser definida.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de treinamento de PLD/FT:**
      1. LMS (Learning Management System) com modulos especificos de PLD/FT
         por perfil de funcao.
      2. Fluxo de onboarding: novo funcionario recebe treinamento inicial antes
         de receber acesso a sistemas de pagamento (bloqueio tecnico por LMS).
      3. Certificados digitais de conclusao com data, nota e conteudo do
         treinamento realizado.
      4. Alertas automaticos de recertificacao: notificacao 30 dias antes
         do vencimento do treinamento periodico.
      5. Dashboard de conformidade de treinamento: percentual de funcionarios
         com treinamento vigente por departamento.
    tools:
      - learning-management-system
      - grc-platform
      - hr-system-integration
  devsecops:
    prose: |
      **Integracao de treinamento com acesso a sistemas:**
      1. Provisioning de acesso a sistemas de pagamento condicionado a
         conclusao do treinamento de PLD/FT no LMS.
      2. Deprovisioning automatico de acesso se treinamento periodico
         vencer sem renovacao.
      3. Testes de integracao LMS ↔ IAM: verificar que acesso e bloqueado
         para funcionarios sem treinamento vigente.
    tools:
      - iam-system
      - lms-api
      - gitlab-ci
  secops:
    prose: |
      **Auditoria do programa de treinamento:**
      1. Relatorio mensal: percentual de funcionarios com treinamento vigente
         por departamento e funcao.
      2. Registro de 5 anos: arquivar todos os registros de treinamento com
         dados do funcionario, data, nota, versao do conteudo.
      3. Auditoria anual: verificar que conteudo do treinamento esta atualizado
         com as normas mais recentes.
      4. Disponibilidade para BCB: processo documentado para exportar registros
         de treinamento em resposta a solicitacao regulatoria.
    tools:
      - grc-platform
      - reporting-dashboard
      - audit-management
