id: art-33
family: cap-7
title: "Disposicoes de Transicao e Avaliacao de Efetividade"
class: BCB-44
baselines: [todas-ips]
statement:
  prose: |
    Art. 33. As instituições de pagamento devem:

    I - avaliar continuamente a efetividade do programa de PLD/FT por meio
    de indicadores quantitativos e qualitativos;

    II - manter processo de melhoria contínua do programa, com atualizações
    baseadas nos resultados das avaliações, em novas tipologias identificadas
    e em mudanças no perfil de risco;

    III - assegurar que o programa de PLD/FT seja objeto de avaliação periódica
    por parte da auditoria interna ou de função equivalente, com relatório
    formal entregue à diretoria;

    IV - reportar anualmente à diretoria da instituição sobre o status e
    a efetividade do programa de PLD/FT.

    Parágrafo único. As instituições de pagamento que ainda não implementaram
    integralmente o programa de PLD/FT devem elaborar cronograma de adequação
    com prazo e responsáveis definidos, sujeito à aprovação do Banco Central do Brasil.
guidance:
  prose: |
    O art. 33 fecha o ciclo PDCA (Plan-Do-Check-Act) do programa de PLD/FT:
    planejar, implementar, verificar e melhorar.

    **Avaliacao de efetividade (inciso I):**
    KPIs que o BCB espera ver:
    - Taxa de deteccao: operacoes suspeitas detectadas / total de operacoes (benchmark setorial)
    - Taxa de SAR: comunicacoes ao COAF / alertas gerados
    - Qualidade dos SAR: quantos foram confirmados como crime vs. arquivados
    - Cobertura de KYC: percentual de clientes com KYC atualizado
    - Cobertura de treinamento: percentual com treinamento vigente
    - Tempo de analise: media de dias para analisar um alerta
    - Taxa de falsos positivos: alertas que nao levaram a investigacao real

    **Auditoria interna (inciso III):**
    A auditoria interna deve avaliar o programa de PLD/FT como um todo, nao
    apenas amostragem de casos. O escopo inclui:
    - Efetividade das regras de monitoramento
    - Qualidade das analises de casos
    - Conformidade com os prazos de comunicacao ao COAF
    - Adequacao dos treinamentos
    - Atualizacao da avaliacao de risco

    **Relatorio anual (inciso IV):**
    O diretor de PLD/FT deve apresentar um relatorio formal a diretoria,
    com evidencias de funcionamento e plano de melhoria. Este relatorio
    e evidencia critica em caso de inspecao do BCB.
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de medicao de efetividade:**
      1. Dashboard executivo de KPIs do programa de PLD/FT com atualizacao diaria.
      2. Geracao automatica de relatorio mensal de indicadores para o compliance manager.
      3. Relatorio anual automatizado: consolidacao de todos os KPIs do ano,
         evolucao em relacao ao ano anterior, metas cumpridas.
      4. Modulo de auditoria interna: workflow de auditoria com escopo, amostras,
         achados e recomendacoes, entregue ao diretor de PLD/FT e a diretoria.
      5. Plano de acao: registro de melhorias identificadas com responsavel e prazo.
    tools:
      - grc-platform
      - reporting-dashboard
      - audit-management
      - executive-dashboard
  devsecops:
    prose: |
      **Metricas de qualidade tecnica:**
      1. Metricas de qualidade do codigo dos sistemas de PLD/FT: cobertura
         de testes, divida tecnica, dependencias desatualizadas.
      2. Relatorio de SLA dos sistemas: disponibilidade, latencia, taxa de
         erros dos sistemas de monitoramento e case management.
      3. Auditoria de seguranca anual dos sistemas de PLD/FT (penetration test).
    tools:
      - sonarqube
      - monitoring-alerting
      - security-testing
  secops:
    prose: |
      **Ciclo de melhoria continua:**
      1. Revisao semestral de todas as regras de monitoramento com base nos
         KPIs do periodo.
      2. Incorporar novas tipologias do COAF e FATF no sistema apos cada
         publicacao relevante.
      3. Reuniao trimestral de compliance: revisar achados e status de
         planos de melhoria.
      4. Relatorio anual ao board: redigir relatorio com todos os requisitos
         do inciso IV, com evidencias e plano para o proximo ano.
    tools:
      - grc-platform
      - risk-management
      - regulatory-intelligence
