id: art-3
family: cap-1
title: "Responsabilidade e Principio Geral"
class: BCB-44
baselines: [todas-ips]
statement:
  prose: |
    Art. 3. A instituição de pagamento é responsável pela implementação e manutenção
    de política, procedimentos e controles internos efetivos de PLD/FT, proporcionais
    ao seu porte, ao perfil de risco de suas atividades, de seus clientes e das
    operações que realizam.

    Parágrafo único. Os procedimentos de que trata o caput devem ser baseados em
    abordagem de risco, permitindo que a instituição identifique, avalie, compreenda
    e mitigue os riscos de lavagem de dinheiro e de financiamento do terrorismo a
    que está exposta.
guidance:
  prose: |
    O art. 3 estabelece dois principios fundamentais: (1) responsabilidade institucional
    e (2) proporcionalidade baseada em risco.

    **Proporcionalidade:**
    Uma IP de pequeno porte com poucos clientes e produtos simples pode ter programa
    de PLD/FT menos sofisticado do que um grande emissor de moeda eletronica com
    milhoes de usuarios e transacoes internacionais. O que nao pode variar e a
    EFETIVIDADE -- os controles devem ser proporcionais ao risco, nao apenas ao porte.

    **Quatro dimensoes de risco a avaliar:**
    1. Porte da instituicao (volume financeiro, numero de clientes)
    2. Perfil de risco das atividades (tipos de servicos, segmentos)
    3. Perfil de risco dos clientes (PEP, residentes no exterior, PJ com estruturas complexas)
    4. Tipos de operacoes (transferencias internacionais, cash-in em especie, cripto)

    **Consequencia pratica:**
    Nao ha um modelo unico de programa de PLD/FT. A IP deve documentar sua analise
    de proporcionalidade e justificar porque os controles adotados sao adequados
    ao seu perfil de risco especifico.
implementation_guidance:
  platform_engineering:
    prose: |
      **Arquitetura escalavel do programa PLD/FT:**
      1. Projetar o sistema de PLD/FT com parametros configuravejs por perfil de risco,
         permitindo ajuste de limiares, regras e frequencias sem redeployment.
      2. Implementar matriz de risco como configuracao externa (ex: YAML ou banco de
         dados), auditavel e versionada no controle de codigo.
      3. Documentar no codigo-fonte a justificativa de cada regra de monitoramento
         e sua relacao com o perfil de risco da instituicao.
      4. Criar mecanismo de self-assessment automatizado que gera relatorio de
         proporcionalidade (riscos identificados x controles implementados).
    tools:
      - aml-platform
      - risk-management
      - grc-platform
  devsecops:
    prose: |
      **Gestao de configuracao do programa PLD/FT:**
      1. Versionar todas as regras e limiares do sistema de monitoramento no repositorio
         de codigo com justificativa de negocio em cada alteracao.
      2. Pipeline de aprovacao para alteracoes em regras de PLD/FT: requer aprovacao
         do compliance officer antes do merge.
      3. Teste de regressao automatizado ao alterar regras de monitoramento, garantindo
         que efetividade nao seja degradada.
      4. Relatorio automatico de alteracoes em regras de PLD/FT por periodo (para
         evidencia de manutencao do programa).
    tools:
      - gitlab-ci
      - code-review
      - vault
  secops:
    prose: |
      **Avaliacao continua da proporcionalidade:**
      1. Revisao semestral da matriz de risco para verificar se os controles ainda
         sao proporcionais ao perfil de risco atual da IP.
      2. Monitoramento de indicadores de efetividade: taxa de falsos positivos,
         cobertura de clientes de alto risco, tempo medio de analise de alertas.
      3. Benchmarking com guidance FATF e GAFI para IPs similares.
      4. Documentar e justificar cada desvio do programa padrao com base em analise
         de risco formal.
    tools:
      - grc-platform
      - risk-assessment
      - reporting-dashboard
