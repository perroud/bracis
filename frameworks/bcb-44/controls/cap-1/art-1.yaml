id: art-1
family: cap-1
title: "Objeto e Ambito de Aplicacao"
class: BCB-44
baselines: [todas-ips]
statement:
  prose: |
    Art. 1. Esta Resolução estabelece os procedimentos e os controles internos a serem
    adotados pelas instituições de pagamento autorizadas a funcionar pelo Banco Central
    do Brasil visando a prevenção da utilização do sistema de pagamentos para a prática
    dos crimes de lavagem de dinheiro e de financiamento do terrorismo (PLD/FT), nos
    termos da Lei n. 9.613, de 3 de março de 1998.

    Parágrafo único. O disposto nesta Resolução aplica-se às instituições de pagamento
    autorizadas pelo Banco Central do Brasil, excluídas as instituições financeiras
    e demais instituições autorizadas pelo Conselho Monetário Nacional.
guidance:
  prose: |
    O art. 1 delimita com precisao o campo de aplicacao da Resolucao BCB 44, distinguindo-a
    da Circular 3.978/2020 (aplicavel a instituicoes financeiras reguladas pelo CMN) e
    da Resolucao CMN 4.557/2017.

    **Quem deve cumprir esta resolucao:**
    - Emissores de moeda eletronica (art. 6 da Lei 12.865/2013)
    - Emissores de instrumento de pagamento pos-pago
    - Credenciadoras de arranjos de pagamento
    - Iniciadores de transacao de pagamento
    - Fintechs e carteiras digitais autorizadas pelo BCB como IPs

    **Quem NAO esta sujeito (sujeito a normas diferentes):**
    - Bancos comerciais, caixas economicas, cooperativas de credito (Circular 3.978)
    - Administradoras de consorcios
    - Seguradoras e corretoras (SUSEP/CVM)

    **Base legal nacional:**
    A Lei 9.613/1998 (Lei de Lavagem de Dinheiro), alterada pela Lei 12.683/2012,
    e a norma primaria que fundamenta todos os requisitos de PLD/FT no Brasil.
    Esta resolucao e o instrumento regulatorio secundario para o segmento de IPs.
implementation_guidance:
  platform_engineering:
    prose: |
      **Mapeamento do escopo tecnico:**
      1. Catalogar todos os produtos e servicos oferecidos pela IP e verificar
         enquadramento como arranjo de pagamento sujeito a BCB 44.
      2. Documentar no sistema de GRC o perimetro de aplicacao com referencia
         explicita a autorizacao BCB (numero do ato autorizativo).
      3. Garantir que o cadastro de produtos no sistema de compliance esteja
         alinhado ao escopo da autorizacao operacional.
      4. Implementar controle de versao para a politica de PLD/FT com versionamento
         sincronizado a atualizacoes regulatorias da BCB 44.
    tools:
      - grc-platform
      - document-management
  devsecops:
    prose: |
      **Compliance-as-code para escopo regulatorio:**
      1. Manter arquivo de configuracao de compliance (compliance.yaml ou similar)
         declarando explicitamente os frameworks aplicaveis, incluindo BCB-44.
      2. Pipeline de CI/CD deve incluir validacao de conformidade do escopo
         nos artefatos de deploy de sistemas de pagamento.
      3. Controle de acesso a repositorios de sistemas de pagamento deve
         registrar quais servicos estao no perimetro BCB 44.
    tools:
      - gitlab-ci
      - policy-as-code
  secops:
    prose: |
      **Gestao do perimetro regulatorio:**
      1. Registrar no sistema de GRC os sistemas e processos no escopo da BCB 44.
      2. Manter lista atualizada das autorizacoes BCB vigentes e seus perimetros.
      3. Avaliar impacto regulatorio de novos produtos ou servicos antes do lancamento.
      4. Monitorar publicacoes do BCB para alteracoes no escopo de aplicacao.
    tools:
      - grc-platform
      - regulatory-intelligence
