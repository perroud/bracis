control_families:
  - id: cap-1
    title: "Disposicoes Preliminares"
    description: "Escopo, definicoes e abrangencia da resolucao para instituicoes de pagamento autorizadas pelo BCB"
    articles: "art. 1 ao art. 3"
    control_count: 3
  - id: cap-2
    title: "Da Politica de PLD/FT"
    description: "Requisitos para elaboracao, implementacao, aprovacao e manutencao da politica de prevencao a lavagem de dinheiro e financiamento do terrorismo"
    articles: "art. 4 ao art. 7"
    control_count: 4
  - id: cap-3
    title: "Do Cadastro de Clientes"
    description: "Procedimentos de KYC, diligencia de clientes, beneficiario final, PEP, diligencia simplificada e diligencia reforcada para instituicoes de pagamento"
    articles: "art. 8 ao art. 14"
    control_count: 7
  - id: cap-4
    title: "Do Registro de Operacoes"
    description: "Requisitos de registro de transacoes, retencao de dados, operacoes PIX e trilha de auditoria"
    articles: "art. 15 ao art. 18"
    control_count: 4
  - id: cap-5
    title: "Do Monitoramento e Selecao de Operacoes"
    description: "Procedimentos de monitoramento continuo, rastreio automatizado, deteccao de suspeitas e limiares de alerta para instituicoes de pagamento"
    articles: "art. 19 ao art. 24"
    control_count: 6
  - id: cap-6
    title: "Das Comunicacoes ao COAF"
    description: "Obrigacoes de comunicacao de operacoes suspeitas ao COAF, prazos, ordens de bloqueio e sigilo"
    articles: "art. 25 ao art. 29"
    control_count: 5
  - id: cap-7
    title: "Das Disposicoes Finais"
    description: "Treinamento, retencao de documentos, sancoes administrativas e disposicoes de transicao"
    articles: "art. 30 ao art. 33"
    control_count: 4
related_frameworks:
  - framework_id: bcb-3978
    relationship: equivalent-to
    description: >-
      A Resolucao BCB 44 e o analogo da Circular BCB 3.978 para instituicoes de
      pagamento. Ambas tratam de PLD/FT com requisitos substancialmente equivalentes,
      porem a BCB 44 aplica-se a IPs autorizadas pelo BCB e a 3.978 a instituicoes
      financeiras reguladas pelo CMN.
  - framework_id: bcb-85
    relationship: complements
    description: "A BCB 85 (seguranca cibernetica para IPs) complementa a BCB 44 (PLD/FT para IPs) -- ambas aplicam-se ao mesmo universo de instituicoes de pagamento autorizadas pelo BCB."
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD complementa a BCB 44 na protecao de dados pessoais coletados para KYC e
      PLD/FT por instituicoes de pagamento, exigindo base legal, proporcionalidade e
      seguranca no tratamento.
  - framework_id: cvm-50
    relationship: equivalent-to
    description: "A CVM 50 e o analogo da BCB 44 para o mercado de capitais -- ambas tratam de PLD/FT com requisitos equivalentes para setores regulados distintos."
