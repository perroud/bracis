id: pld-10
family: cap-5
title: "Internal Policies, Controls, and Regulatory Registration"
class: PLD-BASE
baselines: [pessoas-obrigadas]
statement:
  prose: |
    Art. 10 (continuação). As pessoas referidas no art. 9º:

    III - deverão adotar políticas, procedimentos e controles internos, compatíveis
    com seu porte e volume de operações, que lhes permitam atender ao disposto neste
    artigo e no art. 11, na forma disciplinada pelos órgãos competentes;

    IV - deverão cadastrar-se e manter seu cadastro atualizado no órgão regulador ou
    fiscalizador e, na falta deste, no Conselho de Controle de Atividades Financeiras
    (Coaf), na forma e condições por eles estabelecidas;

    V - deverão atender às requisições formuladas pelo Coaf na periodicidade, forma e
    condições por ele estabelecidas, cabendo-lhe preservar, nos termos da lei, o
    sigilo das informações prestadas.
guidance:
  prose: |
    Article 10, incisos III–V establish three critical operational obligations:

    **Internal policies and controls (inciso III):**
    Obligated persons must adopt AML policies, procedures, and internal controls
    proportionate to their size and transaction volume. This is the legal basis for
    the risk-based approach (RBA) that regulators implement through specific
    regulations (BCB 3.978, CVM 50, SUSEP 612).

    **Regulatory registration (inciso IV):**
    All obligated persons must register with their sector regulator (BCB, CVM,
    SUSEP) or, in the absence of a specific regulator, directly with COAF. This
    ensures the regulatory authority has visibility of all entities subject to
    AML obligations.

    **COAF requisitions (inciso V):**
    Obligated persons must respond to COAF information requests within the
    established deadlines, while maintaining the confidentiality of the
    information provided. Failure to respond triggers administrative penalties
    under Art. 12.

    **Proportionality principle:**
    The requirement that controls be "compatible with size and volume of operations"
    means a small factoring company has different obligations than a large bank,
    but both must have documented policies and controls.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement a GRC (Governance, Risk, and Compliance) platform that
         maintains the organization's AML policy documentation, control inventory,
         and compliance status.
      2. Build automated COAF registration and update workflows that ensure
         organizational data remains current with the regulator.
      3. Create a requisition management system for processing COAF information
         requests with workflow tracking, deadline monitoring, and response
         audit trails.
      4. Implement policy-as-code frameworks where AML controls are codified
         and automatically enforced through infrastructure and application layers.
      5. Build compliance dashboards showing control effectiveness metrics
         proportionate to organizational size and transaction volume.
    tools:
      - grc-platform
      - coaf-integration
      - requisition-management
      - policy-as-code
      - compliance-dashboard
  devsecops:
    prose: |
      1. Codify AML policies in version-controlled repositories with mandatory
         approval workflows (compliance officer + management sign-off).
      2. Implement automated compliance checks in CI/CD pipelines that validate
         AML controls are properly configured before deployment.
      3. Build automated tests for COAF requisition response workflows, ensuring
         data extraction and formatting meet COAF specifications.
      4. Implement pipeline configurations that enforce compliance framework
         standards across all repositories handling AML-related code.
      5. Maintain compliance-as-code dashboards that show real-time policy
         adherence status.
    tools:
      - gitlab-ci
      - compliance-as-code
      - pipeline-configuration
      - automated-testing
      - compliance-framework
  secops:
    prose: |
      1. Conduct annual reviews of AML policies and controls, ensuring they
         remain proportionate to current business size and transaction volumes.
      2. Monitor COAF requisition deadlines and ensure responses are submitted
         on time with complete information.
      3. Maintain regulatory registration records and verify currency quarterly.
      4. Track compliance examination findings and remediation plans.
      5. Report policy adherence metrics to the board of directors or
         compliance committee as required by the competent authority.
    tools:
      - grc-platform
      - deadline-monitoring
      - regulatory-filing
      - remediation-tracking
      - board-reporting
