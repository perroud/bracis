id: pld-3
family: cap-2
title: "Seizure, Forfeiture, and Early Disposal of Assets"
class: PLD-BASE
baselines: [law-enforcement, compliance-general]
statement:
  prose: |
    Art. 4º O juiz, de ofício, a requerimento do Ministério Público ou mediante
    representação do delegado de polícia, ouvido o Ministério Público em 24 (vinte
    e quatro) horas, havendo indícios suficientes de infração penal, poderá decretar
    medidas assecuratórias de bens, direitos ou valores do investigado ou acusado, ou
    existentes em nome de interpostas pessoas, que sejam instrumento, produto ou
    proveito dos crimes previstos nesta Lei ou das infrações penais antecedentes.

    § 1º Proceder-se-á à alienação antecipada para preservação do valor dos bens
    sempre que estiverem sujeitos a qualquer grau de deterioração ou depreciação, ou
    quando houver dificuldade para sua manutenção.

    § 2º O juiz determinará a liberação total ou parcial dos bens, direitos e
    valores quando comprovada a licitude de sua origem, mantendo-se a constrição dos
    bens, direitos e valores necessários e suficientes à reparação dos danos e ao
    pagamento de prestações pecuniárias, multas e custas decorrentes da infração penal.

    § 4º Poderão ser decretadas medidas assecuratórias sobre bens, direitos ou
    valores para reparação do dano decorrente da infração penal antecedente ou da
    prevista nesta Lei ou para pagamento de prestação pecuniária, multa e custas.

    Art. 4º-A. A alienação antecipada para preservação de valor de bens sob
    constrição será decretada pelo juiz, de ofício, a requerimento do Ministério
    Público ou por solicitação da parte interessada, mediante petição autônoma, que
    será autuada em apartado e cujos autos terão tramitação em separado em relação
    ao processo principal.
guidance:
  prose: |
    Articles 4 and 4-A establish the asset seizure and forfeiture regime for money
    laundering proceedings. This is the mechanism by which illicit proceeds are
    frozen, preserved, and ultimately confiscated or returned.

    **Key provisions:**
    - Courts can seize assets of suspects AND interposed persons (nominees, straw men)
    - Early disposal is mandated when assets are subject to deterioration or
      depreciation — critical for perishable goods, vehicles, and volatile assets
    - The burden of proof for releasing seized assets lies with the defendant, who
      must prove licit origin
    - Seizure can cover not only direct proceeds but also instruments and profits
      of the crime

    **Relevance to compliance systems:**
    Financial institutions must be able to rapidly freeze accounts and transactions
    when notified by judicial authorities. Systems must support judicial holds with
    complete audit trails and evidence preservation.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement judicial hold/freeze capabilities in account management systems
         that can be activated within minutes of receiving a court order.
      2. Build automated notification workflows that alert compliance, legal, and
         operations teams when a judicial seizure order is received.
      3. Create asset tracking modules that maintain complete chain-of-custody
         records for seized assets, including valuation history.
      4. Implement automated depreciation monitoring for seized assets to trigger
         early disposal recommendations per § 1.
      5. Build reporting interfaces for judicial authorities showing frozen balances,
         transaction history, and related accounts.
    tools:
      - account-management-system
      - judicial-hold-engine
      - asset-tracking
      - notification-system
      - judicial-reporting
  devsecops:
    prose: |
      1. Implement access controls ensuring only authorized personnel (compliance
         officers, legal counsel) can activate or deactivate judicial holds.
      2. All judicial hold actions must be logged immutably with timestamps,
         operator identity, and court order references.
      3. Automated tests must validate that judicial holds effectively block all
         debit operations on affected accounts.
      4. CI/CD pipelines must include integration tests simulating judicial hold
         scenarios end-to-end.
    tools:
      - rbac-system
      - immutable-audit-log
      - integration-testing
      - gitlab-ci
  secops:
    prose: |
      1. Maintain a 24/7 procedure for receiving and executing judicial seizure
         orders, with maximum response time of 2 hours.
      2. Conduct quarterly drills simulating court-ordered asset freezes to validate
         operational readiness.
      3. Monitor seized accounts for attempted unauthorized access or withdrawal,
         escalating any attempts to legal counsel and law enforcement.
      4. Generate periodic reports for management on the volume and value of assets
         under judicial hold.
    tools:
      - incident-response
      - grc-platform
      - monitoring-dashboard
      - reporting-system
