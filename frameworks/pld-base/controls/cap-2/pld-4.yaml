id: pld-4
family: cap-2
title: "International Cooperation and Asset Recovery"
class: PLD-BASE
baselines: [law-enforcement, compliance-general]
statement:
  prose: |
    Art. 8º O juiz determinará, na hipótese de existência de tratado ou convenção
    internacional e por solicitação de autoridade estrangeira competente, medidas
    assecuratórias sobre bens, direitos ou valores oriundos de crimes descritos no
    art. 1º praticados no estrangeiro.

    § 1º Aplica-se o disposto neste artigo, independentemente de tratado ou
    convenção internacional, quando o governo do país da autoridade solicitante
    prometer reciprocidade ao Brasil.

    § 2º Na falta de tratado ou convenção, os bens, direitos ou valores
    sujeitos a medidas assecuratórias por solicitação de autoridade estrangeira
    competente ficarão indisponíveis até que sejam liberados pela decisão judicial
    transitada em julgado no país solicitante.
guidance:
  prose: |
    Article 8 establishes the legal basis for international cooperation in asset
    recovery related to money laundering offenses. This is essential for combating
    cross-border laundering schemes.

    **Key principles:**
    - Brazil will enforce foreign seizure orders when a treaty or convention exists
    - Even without a treaty, cooperation is possible under reciprocity principles
    - Seized assets remain frozen until final judicial decision in the requesting
      country

    **Relevance to compliance systems:**
    Financial institutions operating internationally or handling cross-border
    transactions must be able to process seizure requests from foreign authorities
    channeled through Brazilian courts. Systems must support multi-jurisdictional
    compliance requirements.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement multi-jurisdictional screening capabilities that can process
         seizure requests referencing foreign court orders.
      2. Build sanctions and watchlist screening that includes international AML
         lists (FATF, EU, OFAC, UN) in addition to Brazilian lists.
      3. Create cross-border transaction monitoring rules that flag patterns
         consistent with international laundering schemes (mirror trading,
         trade-based laundering, correspondent banking abuse).
      4. Maintain country risk scoring that considers FATF mutual evaluation
         results, gray/black list status, and bilateral treaty existence.
    tools:
      - sanctions-screening
      - cross-border-monitoring
      - country-risk-engine
      - watchlist-management
  devsecops:
    prose: |
      1. Automate updates of international sanctions and watchlists with daily
         refresh from authoritative sources (COAF, FATF, UN, EU, OFAC).
      2. Implement automated regression testing of screening rules after every
         list update to prevent both false negatives and excessive false positives.
      3. Version control all country risk scores and screening thresholds with
         mandatory compliance approval for changes.
      4. CI/CD must validate screening engine performance against benchmark
         datasets after every update.
    tools:
      - watchlist-update-pipeline
      - regression-testing
      - gitlab-ci
      - performance-benchmarking
  secops:
    prose: |
      1. Maintain procedures for processing international cooperation requests,
         including coordination with legal counsel for treaty verification.
      2. Monitor cross-border transaction patterns for emerging typologies
         identified by FATF, Egmont Group, or COAF advisories.
      3. Participate in information-sharing mechanisms with foreign FIUs
         (Financial Intelligence Units) through proper legal channels.
      4. Generate periodic reports on cross-border risk exposure for the
         compliance committee.
    tools:
      - grc-platform
      - fiu-communication-system
      - risk-reporting
      - threat-intelligence
legal_references:
  - framework_id: bcb-3978
    articles: ["art-31", "art-32", "art-33", "art-34"]
    relationship: derived-from
