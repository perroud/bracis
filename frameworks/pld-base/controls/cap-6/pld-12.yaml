id: pld-12
family: cap-6
title: "Prior Communication of International Transfers and Cash Withdrawals"
class: PLD-BASE
baselines: [pessoas-obrigadas]
statement:
  prose: |
    Art. 11-A. As transferências internacionais e os saques em espécie deverão ser
    previamente comunicados à instituição financeira, nos termos, limites, prazos e
    condições fixados pelo Banco Central do Brasil.
guidance:
  prose: |
    Article 11-A, added by Lei 12.683/2012, establishes a prior notification
    requirement for two specific high-risk operations: international transfers
    and large cash withdrawals.

    **Purpose:**
    This provision creates a preventive layer before the transaction occurs,
    allowing financial institutions to assess the legitimacy and apply enhanced
    due diligence before processing. It addresses two of the highest-risk
    channels for money laundering: cross-border movement and cash extraction.

    **Implementation by BCB:**
    The Banco Central do Brasil defines the specific thresholds, deadlines,
    and conditions through its regulations. Typically:
    - International wire transfers above certain thresholds require prior
      notification with source of funds documentation
    - Large cash withdrawals require advance notice (usually 24-48 hours)
      with justification

    **Relevance to compliance systems:**
    Financial institutions must implement prior notification workflows that
    capture the client's intent, verify the legitimacy, and apply appropriate
    controls before the transaction is processed.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build prior notification interfaces (web, mobile, API) for clients to
         declare intended international transfers and cash withdrawals.
      2. Implement automated risk assessment of prior notifications:
         - Cross-reference with client profile and historical behavior
         - Screen destination countries against risk lists
         - Validate declared purpose against known typologies
         - Flag inconsistencies for manual review
      3. Create hold/release workflows that prevent transaction execution until
         compliance review is complete for above-threshold operations.
      4. Integrate with SWIFT and PIX international transfer systems to enforce
         prior notification requirements at the transaction level.
      5. Build cash logistics coordination interfaces for large withdrawal
         scheduling with branch operations.
    tools:
      - prior-notification-system
      - risk-assessment-engine
      - swift-integration
      - cash-management
      - workflow-engine
  devsecops:
    prose: |
      1. Implement automated tests validating that transactions above thresholds
         cannot be processed without prior notification clearance.
      2. Build integration tests covering the full lifecycle: notification
         submission, risk assessment, approval/rejection, transaction execution.
      3. SAST scanning for prior notification interfaces to prevent bypass
         vulnerabilities.
      4. CI/CD pipeline must validate threshold configurations against BCB
         specifications before deployment.
    tools:
      - integration-testing
      - sast
      - threshold-validation
      - gitlab-ci
  secops:
    prose: |
      1. Monitor prior notification compliance rates: percentage of
         above-threshold operations with proper prior notification.
      2. Investigate and report instances where transactions were processed
         without required prior notification (control failures).
      3. Track rejection rates for prior notifications and analyze patterns
         indicating potential structuring or avoidance behavior.
      4. Coordinate with branch operations to ensure cash withdrawal
         notifications are properly processed.
    tools:
      - compliance-monitoring
      - incident-reporting
      - pattern-analysis
      - branch-coordination
legal_references:
  - framework_id: bcb-3978
    articles: ["art-18", "art-31", "art-32"]
    relationship: derived-from
