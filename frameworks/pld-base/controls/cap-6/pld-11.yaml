id: pld-11
family: cap-6
title: "Suspicious Transaction Monitoring and Reporting to COAF"
class: PLD-BASE
baselines: [pessoas-obrigadas]
statement:
  prose: |
    Art. 11. As pessoas referidas no art. 9º:

    I - dispensarão especial atenção às operações que, nos termos de instruções
    emanadas das autoridades competentes, possam constituir-se em sérios indícios dos
    crimes previstos nesta Lei, ou com eles relacionar-se;

    II - deverão comunicar ao Coaf, abstendo-se de dar ciência de tal ato a qualquer
    pessoa, inclusive àquela à qual se refira a informação, no prazo de 24 (vinte e
    quatro) horas, a proposta ou realização:
    a) de todas as transações referidas no inciso II do art. 10, acompanhadas da
    identificação de que trata o inciso I do mencionado artigo; e
    b) das operações referidas no inciso I;

    III - deverão comunicar ao órgão regulador ou fiscalizador da sua atividade ou,
    na sua falta, ao Coaf, na periodicidade, forma e condições por eles
    estabelecidas, a não ocorrência de propostas, transações ou operações passíveis
    de serem comunicadas nos termos do inciso II.

    § 1º As autoridades competentes, nas instruções referidas no inciso I deste
    artigo, elaborarão relação de operações que, por suas características, no que se
    refere às partes envolvidas, valores, forma de realização, instrumentos
    utilizados, ou pela falta de fundamento econômico ou legal, possam configurar a
    hipótese nele prevista.

    § 2º As comunicações de boa-fé, feitas na forma prevista neste artigo, não
    acarretarão responsabilidade civil ou administrativa.

    § 3º O Coaf disponibilizará as comunicações recebidas com base no inciso II do
    caput aos respectivos órgãos responsáveis pela regulação ou fiscalização das
    pessoas a que se refere o art. 9º.
guidance:
  prose: |
    Article 11 is the core suspicious transaction reporting (STR) obligation,
    establishing the fundamental duty of all obligated persons to monitor and
    report suspicious activity.

    **Three-tier obligation:**
    1. **Enhanced attention (inciso I):** Obligated persons must apply special
       scrutiny to operations matching typologies defined by competent authorities.
    2. **Positive reporting (inciso II):** Suspicious transactions must be reported
       to COAF within 24 hours, with absolute secrecy (tipping-off prohibition).
    3. **Negative reporting (inciso III):** Even the absence of suspicious activity
       must be periodically communicated (negative declaration).

    **Tipping-off prohibition (inciso II):**
    The law explicitly prohibits informing ANY person — including the subject of the
    report — about the STR filing. Violation of this prohibition constitutes a
    separate administrative infraction and may constitute criminal obstruction.

    **Safe harbor (§ 2):**
    Good-faith reports made in compliance with this article do not generate civil
    or administrative liability for the reporting entity. This protects obligated
    persons from lawsuits by reported clients.

    **COAF information sharing (§ 3):**
    COAF redistributes received STRs to the relevant sector regulators, creating
    a hub-and-spoke intelligence sharing model.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement a transaction monitoring system with rule-based and ML-based
         detection capabilities covering all COAF-defined typologies.
      2. Build automated STR generation workflows that:
         - Capture all required fields per COAF specifications (SISCOAF format)
         - Enforce the 24-hour reporting deadline with escalation alerts
         - Apply tipping-off controls (restrict access to STR data)
         - Generate audit trails of the entire reporting process
      3. Implement negative declaration automation that generates periodic
         reports of non-occurrence per inciso III requirements.
      4. Build alert management workflows with triage, investigation, and
         disposition tracking for suspicious activity alerts.
      5. Create analytics dashboards showing alert volumes, conversion rates,
         STR filing trends, and 24-hour compliance rates.
    tools:
      - transaction-monitoring
      - str-generation
      - siscoaf-integration
      - alert-management
      - analytics-dashboard
  devsecops:
    prose: |
      1. Implement strict access controls on STR-related code and data:
         - Only authorized compliance personnel can view STR data
         - STR code changes require dual approval (compliance + engineering)
         - No STR data in logs, error messages, or non-production environments
      2. Secret detection scanning must catch any accidental exposure of
         SISCOAF credentials, STR reference numbers, or investigation data.
      3. Automated tests must validate:
         - 24-hour deadline enforcement in STR workflows
         - Tipping-off controls prevent unauthorized data access
         - SISCOAF format compliance for all report types
      4. SAST and DAST scanning for STR filing interfaces to prevent
         vulnerabilities that could expose confidential reporting data.
    tools:
      - rbac
      - secret-detection
      - sast
      - dast
      - gitlab-ci
  secops:
    prose: |
      1. Monitor STR pipeline for bottlenecks: alert-to-STR conversion time,
         24-hour compliance rate, rejected STRs (COAF format errors).
      2. Enforce tipping-off controls: audit access logs for STR data,
         investigate any unauthorized access attempts.
      3. Manage the negative declaration calendar ensuring timely filing.
      4. Track COAF feedback on STR quality and implement improvements.
      5. Conduct monthly reviews of alert disposition accuracy with the
         compliance team.
      6. Maintain updated typology libraries based on COAF, BCB, and FATF
         publications.
    tools:
      - str-monitoring-dashboard
      - access-audit
      - typology-management
      - coaf-communication
      - quality-review
