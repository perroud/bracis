id: pld-7
family: cap-4
title: "Obligated Persons — Non-Financial Designated Businesses and Professions"
class: PLD-BASE
baselines: [pessoas-obrigadas]
statement:
  prose: |
    Art. 9º, Parágrafo único (continuação):

    X - as pessoas físicas ou jurídicas que exerçam atividades de promoção
    imobiliária ou compra e venda de imóveis;
    XI - as pessoas físicas ou jurídicas que comercializem jóias, pedras e metais
    preciosos, objetos de arte e antiguidades;
    XII - as pessoas físicas ou jurídicas que comercializem bens de luxo ou de alto
    valor, intermedeiem a sua comercialização ou exerçam atividades que envolvam
    grande volume de recursos em espécie;
    XIII - as juntas comerciais e os registros públicos;
    XIV - as pessoas físicas ou jurídicas que prestem, mesmo que eventualmente,
    serviços de assessoria, consultoria, contadoria, auditoria, aconselhamento ou
    assistência, de qualquer natureza, em operações:
    a) de compra e venda de imóveis, estabelecimentos comerciais ou industriais ou
    participações societárias de qualquer natureza;
    b) de gestão de fundos, valores mobiliários ou outros ativos;
    c) de abertura ou gestão de contas bancárias, de poupança, investimento ou de
    valores mobiliários;
    d) de criação, exploração ou gestão de sociedades de qualquer natureza,
    fundações, fundos fiduciários ou estruturas análogas;
    e) financeiras, societárias ou imobiliárias; e
    f) de alienação ou aquisição de direitos sobre contratos relacionados a
    atividades desportivas ou artísticas profissionais;
    XV - pessoas físicas ou jurídicas que atuem na promoção, intermediação,
    comercialização, agenciamento ou negociação de direitos de transferência de
    atletas, artistas ou feiras, exposições ou eventos similares;
    XVI - as empresas de transporte e guarda de valores;
    XVII - as pessoas físicas ou jurídicas que comercializem bens de alto valor de
    origem rural ou animal ou intermedeiem a sua comercialização; e
    XVIII - as dependências no exterior das entidades mencionadas neste artigo, por
    meio de sua matriz no Brasil, relativamente a residentes no País.
    XIX - as prestadoras de serviços de ativos virtuais.
guidance:
  prose: |
    Article 9, parágrafo único (incisos X–XIX) extends AML obligations to
    Designated Non-Financial Businesses and Professions (DNFBPs), following
    FATF Recommendation 22.

    **Key categories:**
    - **Real estate** (X): agents, developers, brokers
    - **High-value goods** (XI, XII, XVII): jewelry, precious metals, art,
      antiques, luxury goods, high-value rural/animal products
    - **Gatekeepers** (XIII, XIV): commercial registries, accountants, auditors,
      lawyers (in transactional roles), consultants
    - **Sports and entertainment** (XV): athlete transfer agents, artists' agents
    - **Cash logistics** (XVI): armored transport and value storage companies
    - **Foreign branches** (XVIII): overseas offices of Brazilian obligated entities
    - **VASPs** (XIX): virtual asset service providers, added by Lei 14.478/2022

    **Critical note on professional services (XIV):**
    The obligation applies to professionals providing advisory, consultancy,
    accounting, auditing, counseling, or assistance services in specific
    transactional contexts (a–f). This captures the "gatekeeper" function that
    FATF identifies as critical for layering and integration stages.

    **Compliance implications:**
    Each category requires tailored AML programs proportionate to their specific
    risk exposure. VASPs face particular challenges due to the pseudonymous nature
    of blockchain transactions and the speed of cross-border transfers.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build sector-specific AML modules with tailored risk assessment criteria
         for each category: real estate (transaction patterns, beneficial ownership),
         luxury goods (cash payments, unusual volumes), professional services
         (complex structures, shell companies), VASPs (blockchain analytics).
      2. Implement enhanced due diligence workflows for high-risk categories:
         PEP screening, source of funds verification, beneficial ownership
         identification through corporate chains.
      3. For VASPs: integrate blockchain analytics tools to trace transaction
         origins and destinations across public and private ledgers.
      4. Build multi-entity compliance dashboards that aggregate AML data across
         all obligated persons within a group, including foreign branches (XVIII).
    tools:
      - sector-specific-aml
      - blockchain-analytics
      - beneficial-ownership
      - enhanced-due-diligence
      - multi-entity-dashboard
  devsecops:
    prose: |
      1. Implement modular AML rule sets that can be activated per sector,
         version-controlled with sector-specific compliance approval.
      2. Build automated tests for each sector module with industry-specific
         test scenarios (real estate flipping, smurfing in luxury goods,
         structuring in VASPs).
      3. CI/CD pipeline must validate cross-sector consistency of AML controls
         to prevent regulatory arbitrage within a group.
      4. Maintain separate test environments for each sector module to enable
         independent validation cycles.
    tools:
      - modular-rules-engine
      - sector-testing
      - gitlab-ci
      - environment-management
  secops:
    prose: |
      1. Assign sector-specialized AML analysts for each category of obligated
         person, with training on industry-specific red flags.
      2. Monitor COAF and sector-specific regulatory guidance for typology
         updates relevant to each category.
      3. Conduct annual sector risk assessments considering emerging threats
         (e.g., NFT-based laundering for VASPs, trade-based laundering for
         high-value goods dealers).
      4. Coordinate with sector regulators (BCB, CVM, SUSEP, COAF) on
         examination findings and remediation plans.
    tools:
      - sector-risk-assessment
      - typology-database
      - regulatory-coordination
      - training-platform
