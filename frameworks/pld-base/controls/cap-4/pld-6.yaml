id: pld-6
family: cap-4
title: "Obligated Persons — Financial Sector"
class: PLD-BASE
baselines: [pessoas-obrigadas]
statement:
  prose: |
    Art. 9º Sujeitam-se às obrigações referidas nos arts. 10 e 11 as pessoas
    físicas e jurídicas que tenham, em caráter permanente ou eventual, como
    atividade principal ou acessória, cumulativamente ou não:

    I - a captação, intermediação e aplicação de recursos financeiros de terceiros,
    em moeda nacional ou estrangeira;
    II – a compra e venda de moeda estrangeira ou ouro como ativo financeiro ou
    instrumento cambial;
    III - a custódia, emissão, distribuição, liquidação, negociação, intermediação
    ou administração de títulos ou valores mobiliários.

    Parágrafo único. Sujeitam-se às mesmas obrigações:
    I – as bolsas de valores, as bolsas de mercadorias ou futuros e os sistemas de
    negociação do mercado de balcão organizado;
    II - as seguradoras, as corretoras de seguros e as entidades de previdência
    complementar ou de capitalização;
    III - as administradoras de cartões de credenciamento ou cartões de crédito, bem
    como as administradoras de consórcios para aquisição de bens ou serviços;
    IV - as administradoras ou empresas que se utilizem de cartão ou qualquer outro
    meio eletrônico, magnético ou equivalente, que permita a transferência de fundos;
    V - as empresas de arrendamento mercantil (leasing), as empresas de fomento
    comercial (factoring) e as Empresas Simples de Crédito (ESC);
    VI - as sociedades que, mediante sorteio, método assemelhado, exploração de
    loterias, inclusive de apostas de quota fixa, ou outras sistemáticas de captação
    de apostas com pagamento de prêmios, realizem distribuição de dinheiro, de bens
    móveis, de bens imóveis e de outras mercadorias ou serviços, bem como concedam
    descontos na sua aquisição ou contratação;
    VII - as filiais ou representações de entes estrangeiros que exerçam no Brasil
    qualquer das atividades listadas neste artigo, ainda que de forma eventual;
    VIII - as demais entidades cujo funcionamento dependa de autorização de órgão
    regulador dos mercados financeiro, de câmbio, de capitais e de seguros;
    IX - as pessoas físicas ou jurídicas, nacionais ou estrangeiras, que operem no
    Brasil como agentes, dirigentes, procuradoras, comissionárias ou por qualquer
    forma representem interesses de ente estrangeiro que exerça qualquer das
    atividades referidas neste artigo;
guidance:
  prose: |
    Article 9 (caput and parágrafo único, incisos I–IX) defines the first tier
    of obligated persons: the traditional financial sector. These are the entities
    most exposed to money laundering risk due to their core activity of handling
    financial flows.

    **Scope:**
    The article covers all entities that capture, intermediate, or invest third-party
    financial resources, trade foreign currency, or deal with securities. The
    parágrafo único extends this to stock exchanges, insurers, card issuers,
    electronic payment providers, leasing companies, lotteries/betting operators,
    foreign branch offices, and regulated entities.

    **Key implications:**
    - The obligation applies regardless of whether the activity is permanent or
      occasional, principal or accessory.
    - Both natural and legal persons are covered (post-2012 reform).
    - ESCs (Empresas Simples de Crédito) were added by Lei Complementar 167/2019.
    - Sports betting operators were included by Lei 14.183/2021.

    **Compliance obligation:**
    All these entities must comply with Art. 10 (identification, record-keeping,
    internal policies) and Art. 11 (suspicious transaction reporting).
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build entity classification engine that determines whether an organization
         falls within the scope of Art. 9 based on its registered activities (CNAE
         codes), licenses, and regulatory authorizations.
      2. Implement onboarding workflows that apply appropriate AML controls based
         on entity type classification (bank, insurer, payment institution, etc.).
      3. Create a registry of all obligated persons within a conglomerate or group,
         ensuring each entity has appropriate AML controls commensurate with its
         specific activities.
      4. Build regulatory license tracking to detect when new entities become
         obligated persons through license grants or activity changes.
    tools:
      - entity-classification
      - onboarding-system
      - regulatory-license-tracker
      - conglomerate-view
  devsecops:
    prose: |
      1. Maintain entity classification rules as code, version-controlled with
         mandatory compliance review for changes.
      2. Implement automated tests that validate correct classification of
         entities against known test cases for each inciso.
      3. CI/CD pipeline must validate that onboarding workflows apply the correct
         level of AML controls for each entity type.
      4. Automate CNAE-to-obligation mapping updates when new activity codes
         are added to the federal registry.
    tools:
      - gitlab-ci
      - test-automation
      - configuration-management
      - data-mapping
  secops:
    prose: |
      1. Maintain an up-to-date inventory of all obligated persons within the
         organization's scope (subsidiaries, branches, partnerships).
      2. Monitor regulatory changes that expand or modify the list of obligated
         persons (new laws, resolutions, circulars).
      3. Conduct annual review of entity classification to ensure all obligated
         entities are properly identified and controlled.
      4. Coordinate with legal counsel on borderline cases where an entity's
         obligation status is uncertain.
    tools:
      - grc-platform
      - regulatory-change-management
      - entity-inventory
      - legal-consultation
