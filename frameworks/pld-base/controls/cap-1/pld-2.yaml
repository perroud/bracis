id: pld-2
family: cap-1
title: "Procedural Rules and Jurisdictional Competence"
class: PLD-BASE
baselines: [law-enforcement, compliance-general]
statement:
  prose: |
    Art. 2º O processo e julgamento dos crimes previstos nesta Lei:

    I — obedecem às disposições relativas ao procedimento comum dos crimes punidos
    com reclusão, da competência do juiz singular;

    II - independem do processo e julgamento das infrações penais antecedentes,
    ainda que praticados em outro país, cabendo ao juiz competente para os crimes
    previstos nesta Lei a decisão sobre a unidade de processo e julgamento;

    III - são da competência da Justiça Federal:
    a) quando praticados contra o sistema financeiro e a ordem econômico-financeira,
    ou em detrimento de bens, serviços ou interesses da União, ou de suas entidades
    autárquicas ou empresas públicas;
    b) quando a infração penal antecedente for de competência da Justiça Federal.

    § 1º A denúncia será instruída com indícios suficientes da existência da
    infração penal antecedente, sendo puníveis os fatos previstos nesta Lei, ainda
    que desconhecido ou isento de pena o autor, ou extinta a punibilidade da
    infração penal antecedente.

    § 2º No processo por crime previsto nesta Lei, não se aplica o disposto no
    art. 366 do Decreto-Lei nº 3.689, de 3 de outubro de 1941 (Código de Processo
    Penal), devendo o acusado que não comparecer nem constituir advogado ser citado
    por edital, prosseguindo o feito até o julgamento, com a nomeação de defensor
    dativo.
guidance:
  prose: |
    Article 2 establishes the procedural framework for prosecuting money laundering
    crimes in Brazil.

    **Independence from predicate offense (inciso II, § 1):**
    This is a critical principle — money laundering can be prosecuted independently
    of the predicate offense. The prosecution only needs to demonstrate sufficient
    indicia that a predicate offense occurred. The predicate offender need not be
    identified, convicted, or even prosecutable.

    **Federal jurisdiction (inciso III):**
    Federal courts have jurisdiction when the laundering targets the financial system,
    economic order, or federal interests, or when the predicate offense itself falls
    under federal jurisdiction.

    **Relevance to compliance systems:**
    Organizations maintaining AML systems must understand that their suspicious
    transaction reports (STRs) do not need to identify the specific predicate
    offense. The focus should be on detecting indicators of concealment or
    disguise of asset origins, regardless of the underlying crime.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Design STR (Suspicious Transaction Report) systems that focus on laundering
         indicators rather than requiring identification of the predicate offense.
      2. Implement case management systems that maintain complete evidence chains
         with immutable audit trails suitable for judicial proceedings.
      3. Build data export capabilities that produce court-admissible evidence
         packages including transaction records, KYC data, and alert histories.
      4. Ensure systems can handle cross-border transaction data and correlate
         with international counterparts when predicate offenses occur abroad.
    tools:
      - aml-case-management
      - audit-trail-system
      - data-export
      - cross-border-monitoring
  devsecops:
    prose: |
      1. Implement immutable logging for all AML system actions to ensure evidence
         integrity for judicial proceedings.
      2. Apply cryptographic hashing (SHA-256 or stronger) to evidence packages
         to guarantee non-repudiation.
      3. Version control all STR templates and reporting workflows with approval
         gates requiring compliance officer sign-off.
      4. Automated tests must validate that evidence export formats comply with
         COAF and judicial system requirements.
    tools:
      - immutable-logging
      - cryptographic-signing
      - gitlab-ci
      - compliance-testing
  secops:
    prose: |
      1. Maintain procedures for responding to judicial requisitions (art. 10, V)
         within established deadlines.
      2. Ensure evidence preservation protocols are in place for all AML alerts,
         including chain-of-custody documentation.
      3. Coordinate with legal counsel on jurisdictional questions when suspicious
         activity involves federal interests or cross-border elements.
      4. Conduct periodic drills simulating judicial requisitions to validate
         response time and evidence quality.
    tools:
      - grc-platform
      - evidence-management
      - legal-workflow
      - drill-management
