id: pld-1
family: cap-1
title: "Crime of Money Laundering — Typification and Penalties"
class: PLD-BASE
baselines: [law-enforcement, compliance-general]
statement:
  prose: |
    Art. 1º Ocultar ou dissimular a natureza, origem, localização, disposição,
    movimentação ou propriedade de bens, direitos ou valores provenientes, direta
    ou indiretamente, de infração penal.

    Pena: reclusão, de 3 (três) a 10 (dez) anos, e multa.

    § 1º Incorre na mesma pena quem, para ocultar ou dissimular a utilização de
    bens, direitos ou valores provenientes de infração penal:
    I - os converte em ativos lícitos;
    II - os adquire, recebe, troca, negocia, dá ou recebe em garantia, guarda, tem
    em depósito, movimenta ou transfere;
    III - importa ou exporta bens com valores não correspondentes aos verdadeiros.

    § 2º Incorre, ainda, na mesma pena quem:
    I - utiliza, na atividade econômica ou financeira, bens, direitos ou valores
    provenientes de infração penal;
    II - participa de grupo, associação ou escritório tendo conhecimento de que sua
    atividade principal ou secundária é dirigida à prática de crimes previstos
    nesta Lei.

    § 3º A tentativa é punida nos termos do parágrafo único do art. 14 do Código Penal.

    § 4º A pena será aumentada de 1/3 (um terço) a 2/3 (dois terços) se os crimes
    definidos nesta Lei forem cometidos de forma reiterada, por intermédio de
    organização criminosa ou por meio da utilização de ativo virtual.

    § 5º A pena poderá ser reduzida de um a dois terços e ser cumprida em regime
    aberto ou semiaberto, facultando-se ao juiz deixar de aplicá-la ou substituí-la,
    a qualquer tempo, por pena restritiva de direitos, se o autor, coautor ou
    partícipe colaborar espontaneamente com as autoridades, prestando esclarecimentos
    que conduzam à apuração das infrações penais, à identificação dos autores,
    coautores e partícipes, ou à localização dos bens, direitos ou valores objeto
    do crime.

    § 6º Para a apuração do crime de que trata este artigo, admite-se a utilização
    da ação controlada e da infiltração de agentes.
guidance:
  prose: |
    Article 1 is the cornerstone of Brazil's AML framework, defining the crime
    of money laundering in its broadest form after the 2012 reform (Lei 12.683/2012).

    **Key elements of the crime:**
    - The predicate offense can be ANY criminal infraction (infração penal), not
      limited to a specific catalog of crimes (third-generation AML law).
    - The conduct is concealing or disguising the nature, origin, location,
      disposition, movement, or ownership of proceeds of crime.
    - Conversion, acquisition, use in economic activity, and participation in
      criminal organizations are all separately punishable.

    **Aggravating factors (§ 4):**
    The penalty increase of 1/3 to 2/3 applies when the crime is committed:
    (a) in a repeated manner, (b) through organized crime, or (c) using virtual
    assets — the latter added by Lei 14.478/2022 to address cryptocurrency-based
    laundering.

    **Plea bargain mechanism (§ 5):**
    Voluntary collaboration with authorities (delação premiada) can reduce the
    penalty by 1/3 to 2/3, aligning with broader Brazilian anti-corruption and
    organized crime legislation.

    **Relevance to compliance systems:**
    Organizations must design their AML monitoring and reporting systems to detect
    all forms of laundering described in this article, including virtual asset
    transactions, conversion schemes, and layering through multiple accounts.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement a transaction monitoring engine capable of detecting patterns
         consistent with all forms of laundering described in Art. 1: concealment,
         layering (conversion to licit assets), integration (use in economic activity),
         and structuring (splitting transactions to avoid thresholds).
      2. Build rule-based and ML-based detection models for:
         - Rapid movement of funds through multiple accounts (§ 1, II)
         - Conversion of assets between different classes (§ 1, I)
         - Import/export with mismatched declared values (§ 1, III)
         - Use of virtual assets for layering (§ 4)
      3. Maintain a typology database aligned with COAF and GAFI/FATF red flags,
         updated at least quarterly.
      4. Implement real-time transaction scoring with risk thresholds that trigger
         enhanced due diligence or automatic blocking.
      5. Create data pipelines that correlate transactions across accounts, entities,
         and time windows to detect organized crime patterns (§ 2, II).
    tools:
      - aml-transaction-monitoring
      - ml-fraud-detection
      - rules-engine
      - data-pipeline
      - real-time-scoring
  devsecops:
    prose: |
      1. Version all AML detection rules in Git with mandatory code review by
         compliance officers before merge.
      2. Implement automated testing of detection rules against known typologies:
         - Unit tests for each rule with positive and negative cases
         - Integration tests simulating multi-step laundering scenarios
         - Regression tests to ensure rule updates do not reduce detection rates
      3. CI/CD pipeline must include validation that detection thresholds remain
         within compliance-approved ranges.
      4. Maintain audit trail of all changes to detection rules, including who
         approved and the justification for each change.
      5. Secret detection scanning to prevent exposure of COAF communication
         credentials or investigation data in repositories.
    tools:
      - gitlab-ci
      - test-automation
      - secret-detection
      - code-review
      - audit-logging
  secops:
    prose: |
      1. Monitor effectiveness of AML detection rules: true positive rate, false
         positive rate, detection latency, and case resolution time.
      2. Conduct periodic reviews of detection coverage against COAF typology
         updates and GAFI/FATF mutual evaluation recommendations.
      3. Maintain an incident response playbook for confirmed laundering cases,
         including evidence preservation, COAF notification, and law enforcement
         coordination.
      4. Train operations staff on the legal elements of Art. 1 so they can
         properly classify alerts and escalate confirmed suspicious activity.
      5. Generate monthly dashboards with detection metrics for senior management
         and the compliance committee.
    tools:
      - siem
      - aml-case-management
      - reporting-dashboard
      - training-platform
      - incident-response
