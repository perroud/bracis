id: pld-14
family: cap-7
title: "COAF — Creation, Competencies, and Powers"
class: PLD-BASE
baselines: [compliance-general]
statement:
  prose: |
    Art. 14. É criado, no âmbito do Ministério da Fazenda, o Conselho de Controle
    de Atividades Financeiras - COAF, com a finalidade de disciplinar, aplicar penas
    administrativas, receber, examinar e identificar as ocorrências suspeitas de
    atividades ilícitas previstas nesta Lei, sem prejuízo da competência de outros
    órgãos e entidades.

    § 1º As instruções referidas no art. 10 destinadas às pessoas mencionadas no
    art. 9º, para as quais não exista órgão próprio fiscalizador ou regulador, serão
    expedidas pelo COAF, competindo-lhe, para esses casos, a definição das pessoas
    abrangidas e a aplicação das sanções enumeradas no art. 12.

    § 2º O COAF deverá, ainda, coordenar e propor mecanismos de cooperação e de
    troca de informações que viabilizem ações rápidas e eficientes no combate à
    ocultação ou dissimulação de bens, direitos e valores.

    § 3º O COAF poderá requerer aos órgãos da Administração Pública as informações
    cadastrais bancárias e financeiras de pessoas envolvidas em atividades suspeitas.

    Art. 15. O COAF comunicará às autoridades competentes para a instauração dos
    procedimentos cabíveis, quando concluir pela existência de crimes previstos nesta
    Lei, de fundados indícios de sua prática, ou de qualquer outro ilícito.
guidance:
  prose: |
    Articles 14 and 15 establish COAF (Conselho de Controle de Atividades
    Financeiras) as Brazil's Financial Intelligence Unit (FIU), equivalent to
    FinCEN in the US or the FCA in the UK.

    **COAF's functions:**
    1. **Regulatory:** Issues instructions for entities without a specific regulator
    2. **Administrative:** Applies penalties under Art. 12 for entities under
       its direct supervision
    3. **Intelligence:** Receives, examines, and identifies suspicious activity
       reports from all obligated persons
    4. **Coordination:** Proposes cooperation and information-sharing mechanisms
       among Brazilian authorities and international counterparts
    5. **Referral:** When COAF identifies evidence of crimes, it refers the
       matter to competent authorities (police, prosecutors)

    **COAF as residual regulator (§ 1):**
    For obligated persons without a dedicated sector regulator (e.g., real estate
    agents, luxury goods dealers, professional service providers), COAF serves
    as both regulator and supervisor.

    **Information powers (§ 3):**
    COAF can request banking and financial data from government agencies for
    persons involved in suspicious activities. This power, added by Lei 10.701/2003,
    enhances COAF's analytical capabilities.

    **Note on institutional changes:**
    COAF's institutional home has changed multiple times (Ministério da Fazenda,
    Ministério da Justiça, Ministério da Economia). Since Lei 13.974/2020,
    COAF has enhanced institutional autonomy. The current framework under
    Lei 13.974/2020 replaces Arts. 16 and 17 of this law.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement SISCOAF integration for automated STR filing, feedback
         retrieval, and COAF requisition processing.
      2. Build regulatory communication interfaces that support both COAF
         direct supervision (for entities without sector regulators) and
         sector regulator intermediation.
      3. Create intelligence dashboards that aggregate COAF typology
         advisories, red flag indicators, and trend analyses for use by
         AML analysts.
      4. Implement COAF requisition response automation that extracts
         requested data from KYC, transaction, and monitoring systems within
         regulatory deadlines.
    tools:
      - siscoaf-integration
      - regulatory-communication
      - intelligence-dashboard
      - requisition-automation
  devsecops:
    prose: |
      1. Implement secure API integration with SISCOAF using mTLS and
         certificate-based authentication.
      2. Automate SISCOAF format validation in CI/CD to catch report format
         errors before submission.
      3. Version control all COAF integration configurations with strict
         access controls and compliance approval for changes.
      4. Implement end-to-end encryption for all data exchanged with COAF
         systems, with key rotation policies.
    tools:
      - api-security
      - certificate-management
      - gitlab-ci
      - encryption
  secops:
    prose: |
      1. Monitor SISCOAF integration health: submission success rates, response
         times, error rates, and feedback processing.
      2. Track COAF requisition response times against deadlines, escalating
         approaching deadlines to management.
      3. Disseminate COAF typology advisories to AML analysts within 24 hours
         of publication.
      4. Maintain records of all COAF interactions (STR filings, requisition
         responses, feedback received) for audit purposes.
      5. Participate in COAF-organized training and information-sharing events.
    tools:
      - coaf-monitoring
      - deadline-tracking
      - typology-distribution
      - interaction-logging
