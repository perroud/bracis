id: pld-13
family: cap-7
title: "Administrative Penalties for Non-Compliance"
class: PLD-BASE
baselines: [pessoas-obrigadas]
statement:
  prose: |
    Art. 12. Às pessoas referidas no art. 9º, bem como aos administradores das
    pessoas jurídicas, que deixem de cumprir as obrigações previstas nos arts. 10 e
    11 serão aplicadas, cumulativamente ou não, pelas autoridades competentes, as
    seguintes sanções:

    I - advertência;

    II - multa pecuniária variável não superior:
    a) ao dobro do valor da operação;
    b) ao dobro do lucro real obtido ou que presumivelmente seria obtido pela
    realização da operação; ou
    c) ao valor de R$ 20.000.000,00 (vinte milhões de reais);

    III - inabilitação temporária, pelo prazo de até dez anos, para o exercício do
    cargo de administrador das pessoas jurídicas referidas no art. 9º;

    IV - cassação ou suspensão da autorização para o exercício de atividade, operação
    ou funcionamento.

    § 1º A pena de advertência será aplicada por irregularidade no cumprimento das
    instruções referidas nos incisos I e II do art. 10.

    § 2º A multa será aplicada sempre que as pessoas referidas no art. 9º, por culpa
    ou dolo:
    I – deixarem de sanar as irregularidades objeto de advertência, no prazo
    assinalado pela autoridade competente;
    II - não cumprirem o disposto nos incisos I a IV do art. 10;
    III - deixarem de atender, no prazo estabelecido, a requisição formulada nos
    termos do inciso V do art. 10;
    IV - descumprirem a vedação ou deixarem de fazer a comunicação a que se refere o
    art. 11.

    § 3º A inabilitação temporária será aplicada quando forem verificadas infrações
    graves quanto ao cumprimento das obrigações constantes desta Lei ou quando
    ocorrer reincidência específica, devidamente caracterizada em transgressões
    anteriormente punidas com multa.

    § 4º A cassação da autorização será aplicada nos casos de reincidência específica
    de infrações anteriormente punidas com a pena prevista no inciso III do caput
    deste artigo.
guidance:
  prose: |
    Article 12 establishes the graduated administrative penalty regime for AML
    non-compliance. The penalties are progressively severe and can be applied
    cumulatively.

    **Penalty hierarchy:**
    1. **Warning (inciso I):** For irregular compliance with Art. 10 instructions
       (KYC and record-keeping deficiencies).
    2. **Fine (inciso II):** Up to R$ 20 million or twice the operation value/profit.
       Applied when obligated persons negligently or intentionally fail to comply.
    3. **Temporary disqualification (inciso III):** Up to 10 years ban from
       administrative positions. Applied for grave infractions or specific recidivism.
    4. **License revocation (inciso IV):** The ultimate sanction — loss of
       authorization to operate. Applied for repeated recidivism after
       disqualification penalties.

    **Key changes from 2012 reform:**
    - Maximum fine increased from R$ 200,000 to R$ 20 million
    - "Negligence" (negligência) was broadened to "fault" (culpa), lowering the
      bar for imposing fines
    - License "cassation" was expanded to include "suspension"

    **Relevance to compliance systems:**
    The significant penalties (up to R$ 20M and license revocation) create strong
    financial incentives for robust AML compliance. Organizations must demonstrate
    documented, proportionate, and effective AML programs to defend against penalties.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build compliance status dashboards that track adherence to all Art. 10
         and Art. 11 obligations in real time, with early warning indicators
         for potential violations.
      2. Implement automated gap analysis tools that compare current AML controls
         against regulatory requirements and flag deficiencies before they become
         violations.
      3. Create regulatory examination preparation modules that aggregate evidence
         of compliance (KYC completion rates, STR filing metrics, training records,
         policy documentation).
      4. Build penalty risk scoring models that estimate the financial exposure
         from identified compliance gaps.
    tools:
      - compliance-dashboard
      - gap-analysis
      - examination-prep
      - risk-scoring
  devsecops:
    prose: |
      1. Implement automated compliance checks in CI/CD pipelines that prevent
         deployment of code changes that would degrade AML controls.
      2. Build compliance testing suites that validate all Art. 10 and Art. 11
         requirements are met in every release.
      3. Implement audit event logging for all compliance-relevant actions,
         creating evidence trails suitable for regulatory examination.
      4. Maintain compliance-as-code policies that automatically enforce minimum
         standards across all AML-related systems.
    tools:
      - compliance-gates
      - audit-events
      - gitlab-ci
      - compliance-as-code
  secops:
    prose: |
      1. Maintain a regulatory examination readiness program with quarterly
         self-assessments against Art. 10 and Art. 11 requirements.
      2. Track all regulatory findings and ensure remediation within deadlines
         to avoid escalation from warning to fine.
      3. Monitor industry penalty trends through COAF, BCB, CVM, and SUSEP
         sanction publications to identify emerging enforcement priorities.
      4. Conduct annual tabletop exercises simulating regulatory examinations
         to test evidence production capabilities.
      5. Report compliance risk exposure to the board, including estimated
         penalty exposure from identified gaps.
    tools:
      - grc-platform
      - remediation-tracker
      - regulatory-intelligence
      - board-reporting
