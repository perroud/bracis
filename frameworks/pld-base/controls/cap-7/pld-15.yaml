id: pld-15
family: cap-7
title: "PEP Registry and General Provisions"
class: PLD-BASE
baselines: [pessoas-obrigadas]
statement:
  prose: |
    Art. 12-A. Ato do Poder Executivo federal regulamentará a disciplina e o
    funcionamento do Cadastro Nacional de Pessoas Expostas Politicamente (CNPEP),
    disponibilizado pelo Portal da Transparência.

    § 1º Os órgãos e as entidades de quaisquer Poderes da União, dos Estados, do
    Distrito Federal e dos Municípios deverão encaminhar ao gestor CNPEP, na forma e
    na periodicidade definidas no regulamento de que trata o caput deste artigo,
    informações atualizadas sobre seus integrantes ou ex-integrantes classificados
    como pessoas expostas politicamente (PEPs) na legislação e regulação vigentes.

    § 2º As pessoas referidas no art. 9º desta Lei incluirão consulta ao CNPEP entre
    seus procedimentos para cumprimento das obrigações previstas nos arts. 10 e 11
    desta Lei, sem prejuízo de outras diligências exigidas na forma da legislação.

    § 3º O órgão gestor do CNPEP indicará em transparência ativa, pela internet,
    órgãos e entidades que deixem de cumprir a obrigação prevista no § 1º deste
    artigo.

    Art. 17-A. Aplicam-se, subsidiariamente, as disposições do Decreto-Lei nº 3.689,
    de 3 de outubro de 1941 (Código de Processo Penal), no que não forem incompatíveis
    com esta Lei.

    Art. 17-B. A autoridade policial e o Ministério Público terão acesso,
    exclusivamente, aos dados cadastrais do investigado que informam qualificação
    pessoal, filiação e endereço, independentemente de autorização judicial, mantidos
    pela Justiça Eleitoral, pelas empresas telefônicas, pelas instituições
    financeiras, pelos provedores de internet e pelas administradoras de cartão de
    crédito.

    Art. 17-D. Em caso de indiciamento de servidor público, este será afastado, sem
    prejuízo de remuneração e demais direitos previstos em lei, até que o juiz
    competente autorize, em decisão fundamentada, o seu retorno.

    Art. 17-E. A Secretaria da Receita Federal do Brasil conservará os dados fiscais
    dos contribuintes pelo prazo mínimo de 5 (cinco) anos, contado a partir do
    início do exercício seguinte ao da declaração de renda respectiva ou ao do
    pagamento do tributo.
guidance:
  prose: |
    These provisions establish supplementary requirements that enhance the
    AML framework's effectiveness.

    **CNPEP — National PEP Registry (Art. 12-A):**
    Added by Lei 14.478/2022, this creates a centralized Politically Exposed
    Persons (PEP) database available through the government transparency portal.
    Key implications:
    - All government entities at federal, state, and municipal levels must feed
      PEP data to the registry
    - All obligated persons (Art. 9) must consult the CNPEP as part of their
      KYC and monitoring procedures
    - Non-compliant government entities are publicly named (transparency sanction)

    **Law enforcement data access (Art. 17-B):**
    Police and prosecutors can access basic identification data (name, filiation,
    address) from financial institutions, ISPs, and card companies without a
    court order. This is limited to "cadastral data" — not transaction data or
    communications.

    **Public servant indictment (Art. 17-D):**
    Public servants indicted for money laundering are automatically suspended
    (with pay) until a judge authorizes their return. This prevents potential
    interference with investigations.

    **Tax data retention (Art. 17-E):**
    Receita Federal must retain taxpayer data for at least 5 years, supporting
    the AML investigation chain by ensuring fiscal data availability.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Integrate CNPEP database into KYC and ongoing monitoring systems:
         - Real-time screening during client onboarding
         - Batch screening for existing client base (at least monthly)
         - Event-driven re-screening when CNPEP data is updated
      2. Build automated PEP enhanced due diligence workflows triggered by
         positive CNPEP matches, including senior management approval
         requirements.
      3. Implement data provision interfaces for law enforcement cadastral
         data requests (Art. 17-B), with access logging and scope limitation
         controls.
      4. Build regulatory data retention enforcement ensuring compliance with
         5-year minimum for all KYC and transaction data.
    tools:
      - pep-screening
      - cnpep-integration
      - edd-workflow
      - law-enforcement-portal
      - data-retention-engine
  devsecops:
    prose: |
      1. Automate CNPEP data feed updates with integrity verification
         (checksums, digital signatures).
      2. Implement automated tests validating PEP screening accuracy:
         - Exact match and fuzzy match scenarios
         - False positive/negative benchmarking
         - Performance tests for batch screening volumes
      3. Build access control tests for law enforcement data provision
         ensuring scope limitation (cadastral data only, no transaction data).
      4. CI/CD pipeline must validate data retention configurations against
         regulatory requirements.
    tools:
      - data-integrity
      - screening-testing
      - access-control-testing
      - gitlab-ci
  secops:
    prose: |
      1. Monitor PEP screening effectiveness: match rates, false positive rates,
         investigation outcomes.
      2. Track law enforcement data requests and ensure proper authorization
         and scope limitation.
      3. Conduct periodic audits of PEP-related enhanced due diligence files
         for completeness and senior management approval.
      4. Monitor CNPEP update frequency and flag any government entities
         listed as non-compliant with data provision obligations.
      5. Report PEP exposure metrics to the compliance committee.
    tools:
      - pep-monitoring
      - request-tracking
      - edd-audit
      - compliance-reporting
