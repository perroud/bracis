id: pld-5
family: cap-3
title: "Effects of Criminal Conviction — Asset Forfeiture and Rights Interdiction"
class: PLD-BASE
baselines: [law-enforcement, compliance-general]
statement:
  prose: |
    Art. 7º São efeitos da condenação, além dos previstos no Código Penal:

    I - a perda, em favor da União — e dos Estados, nos casos de competência da
    Justiça Estadual —, de todos os bens, direitos e valores relacionados, direta
    ou indiretamente, à prática dos crimes previstos nesta Lei, inclusive aqueles
    utilizados para prestar a fiança, ressalvado o direito do lesado ou de
    terceiro de boa-fé;

    II - a interdição do exercício de cargo ou função pública de qualquer natureza
    e de diretor, de membro de conselho de administração ou de gerência das
    pessoas jurídicas referidas no art. 9º, pelo dobro do tempo da pena privativa
    de liberdade aplicada.

    Art. 7º-A. A posse e a propriedade de ativo virtual não poderão ser
    transferidas de forma diversa da ordem judicial disposta no § 10 do art. 4º
    desta Lei.
guidance:
  prose: |
    Article 7 defines the consequences that flow automatically from a money
    laundering conviction, beyond the standard criminal penalties.

    **Asset forfeiture (inciso I):**
    All assets, rights, and values related directly or indirectly to the crime are
    forfeited to the Union (federal cases) or States (state cases). This is a
    mandatory effect — courts cannot waive it. Only rights of injured parties and
    bona fide third parties are preserved.

    **Professional interdiction (inciso II):**
    Convicted persons are barred from holding public office or serving as directors,
    board members, or managers of entities listed in Art. 9 for twice the duration
    of their prison sentence.

    **Virtual asset provision (art. 7-A):**
    Added by Lei 14.478/2022, this ensures virtual asset transfers can only occur
    pursuant to judicial orders, preventing circumvention of forfeiture through
    crypto transactions.

    **Relevance to compliance systems:**
    Organizations must maintain screening systems that identify convicted persons
    subject to professional interdiction and prevent their appointment to
    positions covered by Art. 9.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement background screening integration for all director, officer,
         and board member appointments that checks criminal conviction databases.
      2. Build automated alerts when persons on interdiction lists attempt to
         register or transact as representatives of obligated entities.
      3. For virtual asset platforms: implement judicial order processing
         capabilities that restrict asset transfers per Art. 7-A.
      4. Maintain a database of convicted persons and their interdiction periods,
         updated from court system feeds.
    tools:
      - background-screening
      - watchlist-management
      - judicial-order-processing
      - court-integration
  devsecops:
    prose: |
      1. Automate integration with criminal conviction databases (BNMP, SEEU)
         for background check pipelines.
      2. Implement automated tests validating that interdicted persons are
         correctly blocked from restricted roles.
      3. Version control all screening rules with compliance officer approval gates.
      4. Ensure secure handling of criminal record data with encryption at rest
         and in transit, compliant with LGPD requirements.
    tools:
      - api-integration
      - encryption
      - gitlab-ci
      - data-security
  secops:
    prose: |
      1. Establish procedures for verifying interdiction status of directors and
         officers during onboarding and periodic recertification.
      2. Monitor public registries and court databases for new convictions
         affecting current directors or officers.
      3. Maintain incident response procedures for discovering that an interdicted
         person holds a restricted position.
      4. Report interdiction violations to the relevant supervisory authority.
    tools:
      - grc-platform
      - screening-operations
      - incident-response
      - regulatory-reporting
