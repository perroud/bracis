control_families:
  - id: cap-1
    title: "Crime of Money Laundering"
    description: "Typification of the crime of money laundering or concealment of assets, rights, and values derived from criminal offenses, including penalties and aggravating/mitigating factors."
    articles: "arts. 1–2"
    control_count: 2
  - id: cap-2
    title: "Special Procedural Provisions"
    description: "Procedural rules for prosecution of money laundering crimes, including seizure, forfeiture, early disposal of assets, and international cooperation."
    articles: "arts. 2–4-A"
    control_count: 2
  - id: cap-3
    title: "Effects of Criminal Conviction"
    description: "Consequences of criminal conviction including asset forfeiture, loss of public office, and interdiction of rights."
    articles: "arts. 7–8"
    control_count: 1
  - id: cap-4
    title: "Obligated Persons"
    description: >-
      Comprehensive list of natural and legal persons subject to
      AML/CFT obligations, including financial institutions, real
      estate, luxury goods, virtual asset service providers, and
      professional service providers.
    articles: "art. 9"
    control_count: 2
  - id: cap-5
    title: "Client Identification and Record-Keeping"
    description: "KYC obligations, transaction recording, internal policies and controls, registration with supervisory bodies, and data retention requirements."
    articles: "arts. 10–10-A"
    control_count: 3
  - id: cap-6
    title: "Suspicious Transaction Reporting"
    description: "Obligations to monitor suspicious operations, report to COAF within 24 hours, maintain secrecy of reporting, and communicate negative declarations."
    articles: "arts. 11–11-A"
    control_count: 2
  - id: cap-7
    title: "Administrative Penalties and COAF"
    description: "Administrative sanctions for non-compliance (warning, fines, disqualification, license revocation), COAF creation, competencies, composition, and powers."
    articles: "arts. 12–17"
    control_count: 3
related_frameworks:
