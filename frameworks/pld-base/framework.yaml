    description: "A Resolução CVM 50/2021 é derivada da Lei 9.613/1998, regulamentando a PLD/FT no mercado de capitais."
  - framework_id: cripto-marco
    relationship: complements
    description: "A Lei 14.478/2022 complementa a Lei 9.613/1998 ao incluir as prestadoras de serviços de ativos virtuais (VASPs) no rol de pessoas obrigadas."
  - framework_id: susep-612
    relationship: derived-from
    description: "A Circular SUSEP 612/2020 é derivada da Lei 9.613/1998, regulamentando a PLD/FT no mercado de seguros."
