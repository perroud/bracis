control_families:
  - id: cap-1
    title: "General Provisions and Principles"
    description: "Scope, definitions, principles of digital government, and rights of citizens interacting with public administration through digital channels"
    articles: "art. 1 to art. 5"
    control_count: 5
  - id: cap-2
    title: "Digital Public Services"
    description: "Digitization of public services, single digital portal (gov.br), accessibility requirements, and user experience standards for government services"
    articles: "art. 6 to art. 11"
    control_count: 6
  - id: cap-3
    title: "Digital Identity and Authentication"
    description: "Gov.br digital identity platform, authentication levels (bronze, silver, gold), biometric verification, and single sign-on for government services"
    articles: "art. 12 to art. 16"
    control_count: 5
  - id: cap-4
    title: "Open Data and Interoperability"
    description: "Open data policy, machine-readable formats, APIs for government data, interoperability between agencies, and official data catalog"
    articles: "art. 17 to art. 22"
    control_count: 6
  - id: cap-5
    title: "Data Governance and Analytics"
    description: "Data governance framework, analytics for public policy, data sharing between agencies, LGPD compliance, and data quality requirements"
    articles: "art. 23 to art. 27"
    control_count: 5
  - id: cap-6
    title: "Digital Infrastructure and Innovation"
    description: "Cloud-first policy, shared digital infrastructure, innovation labs, and regulatory sandboxes for government technology"
    articles: "art. 28 to art. 30"
    control_count: 3
related_frameworks:
  - framework_id: lgpd
    relationship: complements
    description: >-
      The LGPD complements the Digital Government Act by establishing the data
      protection rules that apply to all personal data processed by government
      agencies through digital services, including consent requirements, data
      minimization, and breach notification obligations.
  - framework_id: lai
    relationship: complements
    description: >-
      The Freedom of Information Act (LAI - Lei 12.527/2011) complements the
      Digital Government Act by establishing the legal basis for government
      transparency and open data, which the Digital Government Act
      operationalizes through digital channels and open data platforms.
  - framework_id: icp-brasil
    relationship: implements
    description: >-
      ICP-Brasil provides the digital certificate infrastructure that underpins
      the gold-level authentication required by the Digital Government Act for
      high-assurance identity verification in government digital services.
  - framework_id: gsi-in5
    relationship: complements
    description: >-
      GSI/PR IN5 complements the Digital Government Act by establishing cloud
      computing security requirements for federal agencies, directly supporting
      the cloud-first policy mandated by the law.
