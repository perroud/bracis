id: art-4
family: cap-1
title: "Citizen Rights in Digital Government"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 4º O cidadão tem direito a:
    I — gratuidade no acesso a serviços e a informações públicas
    disponibilizados em meio digital;
    II — atendimento nos termos da Carta de Serviços ao Usuário, de que
    trata a Lei nº 13.460, de 26 de junho de 2017;
    III — padronização de procedimentos referentes à utilização de formulários,
    de guias e de outros documentos congêneres;
    IV — recebimento de protocolo, físico ou digital, das solicitações
    apresentadas; e
    V — indicação de canal preferencial de comunicação com o poder público.

    Art. 5º A administração pública utilizará soluções digitais para a
    gestão de suas políticas finalísticas e administrativas e para o
    trâmite de processos administrativos eletrônicos, observadas as
    disposições desta Lei e da Lei nº 12.527, de 18 de novembro de 2011
    (Lei de Acesso à Informação).
guidance:
  prose: |
    Articles 4 and 5 establish the fundamental rights of citizens when
    interacting with government through digital channels and mandate the
    use of digital solutions for all administrative processes.

    **Citizen rights with direct technical implications:**
    - **Free access (I):** Government digital services must not charge
      access fees — no paywalls, no premium tiers for basic services
    - **Service charter compliance (II):** Each service must have a
      published service level agreement per Lei 13.460/2017
    - **Standardized forms (III):** Forms and documents must follow
      government-wide standards (gov.br design system)
    - **Digital receipts (IV):** Every interaction must generate a
      trackable protocol number, available both physically and digitally
    - **Channel preference (V):** Citizens must be able to choose their
      preferred communication channel (email, SMS, push notification, mail)

    **Article 5 — Digital-first administration:**
    All internal administrative processes must be electronic by default.
    Paper-based processes must be the exception with documented justification.
    This applies to both citizen-facing and internal administrative workflows.
implementation_guidance:
  platform_engineering:
    prose: |
      **Citizen rights enforcement infrastructure:**
      1. Implement a universal protocol number generator that produces
         unique, trackable identifiers for every citizen interaction
         with government digital services.
      2. Deploy a notification preference management system that allows
         citizens to select and update their preferred communication
         channel (email, SMS, push, physical mail).
      3. Create standardized form templates using the gov.br design system
         with pre-built validation, accessibility, and i18n support.
      4. Implement a service charter API that exposes SLA commitments
         and real-time compliance metrics for each digital service.
      5. Deploy an electronic process management (BPMS) platform for
         internal administrative workflows with full audit trail.
    tools:
      - protocol-generator
      - notification-service
      - govbr-design-system
      - bpms-platform
  devsecops:
    prose: |
      **Rights validation in the delivery pipeline:**
      1. Add mandatory pipeline checks that verify every citizen-facing
         service generates protocol numbers for all interactions.
      2. Validate that no service endpoint requires payment for basic
         access (free access right enforcement).
      3. Implement automated tests for notification preference handling,
         ensuring citizens can opt-in/out of channels.
      4. Test form compliance with gov.br design system standards as
         part of the CI/CD quality gate.
    tools:
      - gitlab-ci
      - e2e-testing
      - design-system-linter
      - api-contract-testing
  secops:
    prose: |
      **Rights compliance monitoring and reporting:**
      1. Monitor protocol number generation and delivery for completeness
         — every interaction must be traceable.
      2. Audit communication channel preference compliance to ensure
         citizens are contacted through their chosen channel.
      3. Track service charter (SLA) compliance for each digital service
         and generate monthly compliance reports.
      4. Maintain citizen complaint resolution metrics aligned with
         Lei 13.460/2017 requirements.
    tools:
      - sla-monitoring
      - complaint-management
      - audit-platform
      - citizen-feedback
legal_references:
