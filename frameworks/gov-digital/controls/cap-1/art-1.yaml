id: art-1
family: cap-1
title: "Scope and Purpose of the Digital Government Act"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 1º Esta Lei dispõe sobre princípios, regras e instrumentos para o
    aumento da eficiência da administração pública, especialmente por meio da
    desburocratização, da inovação, da transformação digital e da participação
    do cidadão.

    Parágrafo único. Esta Lei se aplica:
    I — aos órgãos da administração pública direta federal, estadual, distrital
    e municipal;
    II — às autarquias e às fundações públicas;
    III — às empresas públicas e às sociedades de economia mista que prestem
    serviço público.
guidance:
  prose: |
    Article 1 establishes the scope and purpose of the Digital Government Act.
    The law applies to all levels of Brazilian public administration — federal,
    state, district, and municipal — as well as to public enterprises that
    deliver public services.

    **Key scope elements:**
    - Direct public administration at all levels (federal, state, district, municipal)
    - Autarchies (autonomous government agencies) and public foundations
    - Public companies and mixed-economy entities providing public services
    - Private entities are not directly covered, but may be indirectly affected
      when providing services on behalf of the government

    **Core objectives:**
    - Reduce bureaucracy in citizen-government interactions
    - Drive innovation in public service delivery
    - Enable digital transformation across government
    - Increase citizen participation in government processes

    **Alignment with international frameworks:**
    - OECD Digital Government Policy Framework
    - UN E-Government Survey indicators
    - EU eGovernment Action Plan principles
implementation_guidance:
  platform_engineering:
    prose: |
      **Digital service platform inventory and classification:**
      1. Catalog all government digital services and classify them by
         administrative level (federal, state, municipal) and entity type.
      2. Implement a service registry that maps each digital service to its
         owning entity, applicable legislation, and target user base.
      3. Define infrastructure-as-code templates that embed Digital Government
         Act compliance requirements (accessibility, authentication, open data)
         as default configurations.
      4. Deploy a centralized platform monitoring dashboard to track digital
         service availability and performance across all government entities.
    tools:
      - service-registry
      - terraform
      - kubernetes
      - monitoring-stack
  devsecops:
    prose: |
      **Compliance pipeline for digital government services:**
      1. Create a compliance-as-code pipeline that validates new government
         digital services against Digital Government Act requirements before
         deployment to production.
      2. Implement automated checks for mandatory capabilities: accessibility
         (WCAG 2.1), authentication integration (gov.br), and open data
         endpoints.
      3. Tag all repositories with scope metadata (administrative level,
         entity type, service category) for audit traceability.
    tools:
      - gitlab-ci
      - compliance-pipeline
      - policy-as-code
  secops:
    prose: |
      **Digital government governance program:**
      1. Designate a digital transformation officer responsible for the
         entity's compliance with the Digital Government Act.
      2. Maintain a formal registry of all public services offered and their
         current digitization status (fully digital, partially digital, manual).
      3. Establish a roadmap for digitizing remaining manual services with
         quarterly milestones and compliance checkpoints.
      4. Create an audit trail for all changes to digital service configurations
         and access controls.
    tools:
      - grc-platform
      - service-catalog
      - compliance-dashboard
