id: art-3
family: cap-1
title: "Principles of Digital Government"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 3º São princípios e diretrizes do Governo Digital e da eficiência
    pública:
    I — desburocratização, modernização, fortalecimento e simplificação da
    relação do poder público com a sociedade, mediante serviços digitais,
    acessíveis inclusive por dispositivos móveis;
    II — disponibilização em plataforma única do acesso às informações e
    aos serviços públicos, observadas as restrições legalmente previstas
    e as regras de proteção de dados pessoais;
    III — possibilidade aos cidadãos, às pessoas jurídicas e aos outros
    entes públicos de demandar e de acessar serviços públicos por meio
    digital, sem necessidade de solicitação presencial;
    IV — transparência na execução dos serviços públicos e disponibilização
    de dados em formato aberto;
    V — incentivo à participação social no controle e na fiscalização da
    administração pública;
    VI — fomento ao desenvolvimento tecnológico e à inovação no setor
    público;
    VII — aumento da eficiência da administração pública, mediante uso de
    tecnologias da informação e comunicação;
    VIII — estímulo à interoperabilidade de sistemas e à promoção de dados
    abertos;
    IX — adoção preferencial de tecnologias, de padrões e de formatos
    abertos e de software livre;
    X — promoção da acessibilidade e da usabilidade.
guidance:
  prose: |
    Article 3 establishes the ten guiding principles of the Digital Government
    Act. These principles must inform all technical decisions and architectural
    choices when implementing government digital services.

    **Principles with direct technical impact:**
    - **Single platform (II):** All services must be accessible through a
      unified portal (gov.br), requiring standardized APIs and SSO integration
    - **Digital-first (III):** In-person attendance must not be required;
      services must be fully completable online
    - **Open data (IV, VIII):** Transparency and interoperability through
      open formats are not optional but mandatory principles
    - **Open standards preference (IX):** Open-source technologies, open
      formats, and open standards must be preferred over proprietary ones
    - **Accessibility and usability (X):** WCAG 2.1 compliance and UX
      standards are legally required, not merely recommended
    - **Mobile-first (I):** Services must be accessible via mobile devices,
      requiring responsive design or native mobile applications

    **Interoperability principle (VIII):**
    This principle directly mandates system integration between agencies,
    requiring standard APIs, common data schemas, and shared infrastructure.
implementation_guidance:
  platform_engineering:
    prose: |
      **Principle-aligned platform architecture:**
      1. Implement a unified API gateway that enables all digital services
         to be accessible through the gov.br platform (principle II).
      2. Deploy a responsive, mobile-first frontend framework as the default
         template for all citizen-facing services (principles I, X).
      3. Adopt open-source technology stack as the default choice, with
         documented justification required for any proprietary alternative
         (principle IX).
      4. Implement interoperability middleware (ESB/API mesh) that enables
         data exchange between government agencies using open standards
         (principle VIII).
      5. Deploy accessibility testing infrastructure (axe-core, pa11y)
         integrated into all deployment pipelines (principle X).
    tools:
      - api-gateway
      - responsive-framework
      - accessibility-testing
      - esb-middleware
  devsecops:
    prose: |
      **Principle enforcement in CI/CD:**
      1. Implement automated accessibility checks (WCAG 2.1 AA) as mandatory
         pipeline gates — no deployment without passing accessibility tests.
      2. Add mobile responsiveness validation to CI/CD pipelines using
         automated viewport testing.
      3. Enforce open format validation for all data output endpoints
         (CSV, JSON, XML — no proprietary formats).
      4. Scan dependencies to prefer open-source alternatives and flag
         proprietary dependencies for review.
      5. Implement transparency headers and audit logging for all API
         responses.
    tools:
      - gitlab-ci
      - axe-core
      - lighthouse
      - open-format-validator
  secops:
    prose: |
      **Principle compliance monitoring:**
      1. Create a compliance scorecard that measures adherence to each of
         the ten principles for every digital service.
      2. Monitor accessibility compliance across all services with quarterly
         audits and automated scanning.
      3. Track open-source adoption metrics versus proprietary alternatives
         across the technology portfolio.
      4. Measure citizen satisfaction and usability through standardized
         surveys and analytics for each digital service.
    tools:
      - compliance-scorecard
      - accessibility-monitor
      - oss-tracker
      - analytics-platform
