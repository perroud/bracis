id: art-5
family: cap-1
title: "Digital-First Administrative Processes"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 5º A administração pública utilizará soluções digitais para a
    gestão de suas políticas finalísticas e administrativas e para o
    trâmite de processos administrativos eletrônicos, observadas as
    disposições desta Lei e da Lei nº 12.527, de 18 de novembro de 2011
    (Lei de Acesso à Informação).

    § 1º Os processos administrativos eletrônicos de que trata o caput
    deverão utilizar, preferencialmente, programas com código aberto.

    § 2º O uso de tecnologias digitais na prestação de serviços públicos
    deve considerar as condições de acessibilidade do cidadão, inclusive
    pela disponibilização de canais presenciais de atendimento.
guidance:
  prose: |
    Article 5 mandates digital-first administrative processes while
    establishing two critical guardrails: preference for open-source
    software and mandatory accessibility considerations.

    **Open-source preference (paragraph 1):**
    Electronic administrative processes must preferably use open-source
    software. This creates a "comply or explain" requirement — proprietary
    software may be used, but the choice must be justified and documented.

    **Accessibility safeguard (paragraph 2):**
    Digital-first does not mean digital-only. The law explicitly requires
    that in-person service channels remain available to ensure citizens
    who cannot access digital services are not excluded. This balances
    digital transformation with social inclusion.

    **Interaction with LAI (Lei 12.527/2011):**
    All electronic administrative processes must comply with the Freedom
    of Information Act, ensuring that process data is transparently
    managed and accessible upon request.
implementation_guidance:
  platform_engineering:
    prose: |
      **Open-source digital process platform:**
      1. Deploy an open-source electronic process management system
         (e.g., SEI, SUPER.GOV.BR, or equivalent) as the default
         platform for administrative workflows.
      2. Implement a technology decision record (ADR) system that
         documents the rationale when proprietary software is selected
         over open-source alternatives.
      3. Create accessibility-first infrastructure templates with
         built-in screen reader support, keyboard navigation, and
         WCAG 2.1 AA compliance.
      4. Maintain parallel in-person service endpoints with digital
         integration to ensure omnichannel consistency.
    tools:
      - sei-platform
      - adr-templates
      - accessibility-framework
      - omnichannel-gateway
  devsecops:
    prose: |
      **Open-source compliance and accessibility pipeline:**
      1. Implement license scanning in CI/CD to track open-source versus
         proprietary dependency ratios and flag proprietary additions.
      2. Add mandatory accessibility testing (axe-core, pa11y) as a
         blocking gate in all deployment pipelines for citizen-facing
         services.
      3. Generate open-source compliance reports as pipeline artifacts,
         documenting the percentage of open-source components used.
      4. Validate that all electronic process workflows include LAI
         compliance metadata (classification, retention, access level).
    tools:
      - gitlab-ci
      - license-scanner
      - axe-core
      - pa11y
  secops:
    prose: |
      **Digital process governance:**
      1. Audit all administrative process systems for open-source preference
         compliance — document any proprietary exceptions.
      2. Monitor accessibility compliance across all citizen-facing digital
         services with quarterly automated scans and annual manual audits.
      3. Track digitization progress of administrative processes with KPIs
         (percentage digital, average processing time, citizen satisfaction).
      4. Ensure all electronic processes maintain audit trails compliant
         with both this law and the LAI.
    tools:
      - process-audit
      - accessibility-dashboard
      - digitization-tracker
      - lai-compliance
legal_references:
  - framework_id: lai
    articles: ["art-6", "art-7"]
    relationship: complements
  - framework_id: lgpd
    articles: ["art-7"]
    relationship: complements
