id: art-2
family: cap-1
title: "Definitions and Key Concepts"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 2º Para os fins desta Lei, considera-se:
    I — autosserviço: acesso pelo cidadão a serviço público prestado por meio
    digital, sem necessidade de atendimento presencial;
    II — base nacional de serviços públicos: base de dados que contém as
    informações necessárias sobre os serviços públicos prestados por todos
    os entes federativos;
    III — dados abertos: dados acessíveis ao público, representados em meio
    digital, estruturados em formato aberto, processáveis por máquina,
    referenciados na internet e disponibilizados sob licença aberta que
    permita sua livre utilização, consumo ou tratamento por qualquer pessoa,
    física ou jurídica;
    IV — dado acessível ao público: qualquer dado gerado ou sob a guarda
    governamental que não seja de acesso público e que não esteja sob sigilo
    ou sob restrição de acesso;
    V — governo digital: a utilização de tecnologias digitais, como estratégia
    integrada e eficiente, para gerar políticas públicas e prestar serviços
    públicos orientados pelo cidadão;
    VI — laboratório de inovação: espaço aberto à participação e à
    colaboração da sociedade para o desenvolvimento de ideias, de ferramentas
    e de métodos inovadores de gestão pública;
    VII — plataformas de governo digital: ferramentas digitais e serviços
    comuns aos órgãos, utilizados na relação do cidadão com o poder público.
guidance:
  prose: |
    Article 2 defines the key concepts used throughout the Digital Government
    Act. These definitions are legally binding and must be used consistently
    across all implementing regulations and systems.

    **Critical definitions for technical implementation:**
    - **Self-service (autosserviço):** Digital access without in-person
      attendance — implies fully automated, citizen-facing digital interfaces
    - **Open data (dados abertos):** Must be machine-readable, openly licensed,
      internet-referenced, and structured in open formats (CSV, JSON, XML)
    - **Digital government:** Not merely digitizing existing processes, but
      rethinking public policy delivery through a citizen-centric digital
      strategy
    - **Innovation labs:** Open-participation spaces — requires mechanisms
      for citizen and civil society collaboration

    **Distinction between open data and publicly accessible data:**
    The law differentiates "dados abertos" (open data) from "dado acessível
    ao público" (publicly accessible data). Open data must meet stricter
    technical requirements (machine-readable, open format, open license).
implementation_guidance:
  platform_engineering:
    prose: |
      **Standards-compliant data and service architecture:**
      1. Implement a metadata schema for all government services that captures
         the categorization defined in Article 2 (self-service capability,
         data classification, platform type).
      2. Deploy open data publishing infrastructure with support for standard
         open formats (CSV, JSON, JSON-LD, XML, Parquet) and open licenses
         (Creative Commons, Open Data Commons).
      3. Create API specifications that differentiate between open data
         endpoints (publicly accessible, no authentication) and restricted
         data endpoints (authenticated, audited).
      4. Establish a shared platform registry aligned with the "digital
         government platforms" definition (item VII).
    tools:
      - data-catalog
      - api-gateway
      - ckan
      - metadata-registry
  devsecops:
    prose: |
      **Data classification in the development lifecycle:**
      1. Embed data classification checks in CI/CD pipelines that validate
         whether data exposed by APIs meets the open data requirements
         (format, license, machine-readability).
      2. Implement automated schema validation for open data outputs to
         ensure compliance with INDA (Infraestrutura Nacional de Dados
         Abertos) standards.
      3. Create pipeline stages that verify self-service capability of
         new digital services before production deployment.
    tools:
      - gitlab-ci
      - schema-validator
      - data-quality-checks
  secops:
    prose: |
      **Terminology governance and compliance monitoring:**
      1. Maintain a glossary of legally defined terms from Article 2 and
         ensure all internal documentation, systems, and reports use these
         terms consistently.
      2. Classify all government data assets according to the Article 2
         taxonomy (open data, publicly accessible data, restricted data).
      3. Monitor and audit open data publications to ensure they meet all
         five criteria: accessible, digital, structured, machine-readable,
         and openly licensed.
    tools:
      - data-governance-platform
      - compliance-audit
      - terminology-management
