id: art-27
family: cap-5
title: "Data-Driven Decision Making and Evidence-Based Policy"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 27. A administração pública deverá promover o uso de dados e
    de evidências para a tomada de decisões, a formulação e o
    monitoramento de políticas públicas, observados os princípios de
    proteção de dados pessoais e de transparência.

    § 1º Os órgãos e as entidades da administração pública deverão
    disponibilizar painéis de dados e relatórios que permitam o
    acompanhamento da execução de políticas públicas pela sociedade.

    § 2º A utilização de dados para a formulação de políticas públicas
    deverá considerar indicadores de desempenho e de resultado que
    permitam a avaliação de eficácia, eficiência e efetividade.
guidance:
  prose: |
    Article 27 mandates data-driven decision making in government,
    with specific requirements for public dashboards and performance
    indicators.

    **Data-driven governance mandate:**
    Government decisions and policies must be based on data and evidence,
    not merely on political or institutional preferences. This creates
    a legal obligation for evidence-based policy making.

    **Public dashboards (paragraph 1):**
    Agencies must publish data dashboards and reports that allow citizens
    to track public policy execution. This is a transparency requirement
    that goes beyond passive data publication — it requires active,
    understandable visualization.

    **Performance indicators (paragraph 2):**
    Three types of indicators are mandated:
    - **Efficacy (eficácia):** Are the policy objectives being achieved?
    - **Efficiency (eficiência):** Are resources being used optimally?
    - **Effectiveness (efetividade):** Is the policy producing the
      desired impact on society?

    **Relationship with open data (art. 17-22):**
    The dashboards and indicators mandated here must be built on the
    open data infrastructure established in articles 17-22, creating
    a coherent data-to-insight pipeline.
implementation_guidance:
  platform_engineering:
    prose: |
      **Public policy monitoring platform:**
      1. Deploy a public-facing dashboard platform that visualizes
         policy execution data with filters by region, time period,
         and thematic area.
      2. Implement a KPI management system that defines, tracks, and
         publishes efficacy, efficiency, and effectiveness indicators
         for each public policy.
      3. Create automated data pipelines from operational systems to
         dashboards, ensuring real-time or near-real-time data freshness.
      4. Deploy a report generation service that produces periodic
         public policy monitoring reports in accessible formats.
      5. Implement citizen-friendly data visualization components
         (charts, maps, infographics) with accessibility compliance.
    tools:
      - dashboard-platform
      - kpi-management
      - data-pipeline
      - visualization-library
  devsecops:
    prose: |
      **Dashboard and analytics pipeline:**
      1. Implement automated data quality validation for dashboard
         data sources — no dashboard publication with stale or
         incomplete data.
      2. Add accessibility validation for all dashboard components
         (screen reader compatibility, color contrast, keyboard
         navigation).
      3. Test dashboard performance under load to ensure public
         access does not degrade during high-traffic periods.
      4. Validate indicator calculations against source data to
         ensure accuracy and consistency.
    tools:
      - gitlab-ci
      - data-quality
      - accessibility-testing
      - performance-testing
  secops:
    prose: |
      **Evidence-based policy governance:**
      1. Audit dashboard data accuracy by cross-referencing published
         indicators against source systems.
      2. Monitor dashboard usage to understand citizen engagement
         with policy monitoring tools.
      3. Track indicator coverage — ensure all major public policies
         have published efficacy, efficiency, and effectiveness
         indicators.
      4. Report quarterly on data-driven decision making maturity
         across the agency to the strategic data committee.
    tools:
      - accuracy-audit
      - usage-analytics
      - indicator-tracker
      - maturity-reporting
