id: art-25
family: cap-5
title: "Personal Data Protection in Government Services"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 25. O tratamento de dados pessoais pela administração pública
    para a prestação de serviços públicos digitais observará o disposto
    na Lei nº 13.709, de 14 de agosto de 2018 (Lei Geral de Proteção
    de Dados Pessoais), e será realizado com as seguintes garantias:
    I — proteção dos dados pessoais do cidadão, garantindo-lhe o
    exercício dos direitos previstos na Lei nº 13.709, de 2018;
    II — adoção de medidas de segurança técnicas e administrativas
    aptas a proteger os dados pessoais;
    III — transparência no uso dos dados, com informação clara sobre
    a finalidade, a forma e a duração do tratamento;
    IV — compatibilidade do tratamento com as finalidades informadas
    ao titular;
    V — limitação do tratamento ao mínimo necessário para a realização
    de suas finalidades.
guidance:
  prose: |
    Article 25 reinforces LGPD compliance for all government digital
    services, establishing five specific guarantees that bridge the
    Digital Government Act with LGPD.

    **Five data protection guarantees:**
    1. **Rights enforcement (I):** Citizens must be able to exercise all
       LGPD data subject rights through government digital services:
       access, correction, deletion, portability, opposition, and
       information about sharing
    2. **Security measures (II):** Technical (encryption, access controls,
       monitoring) and administrative (policies, training, incident
       response) security measures must be implemented
    3. **Transparency (III):** Clear information about purpose, method,
       and duration of data processing must be provided before collecting
       any personal data
    4. **Purpose compatibility (IV):** Data must only be processed for
       purposes that were communicated to the citizen — no secondary
       use without new legal basis
    5. **Data minimization (V):** Only the minimum necessary data must
       be collected and processed — this reinforces art. 10, I

    **Practical integration with digital services:**
    Every government digital service must have a privacy notice that
    explains items III-V, and must provide mechanisms for citizens to
    exercise the rights listed in item I.
implementation_guidance:
  platform_engineering:
    prose: |
      **Privacy-by-design infrastructure:**
      1. Deploy a privacy management platform that provides data subject
         rights portals for all government digital services (access,
         correction, deletion, portability requests).
      2. Implement a consent and privacy notice management system that
         generates and records compliant privacy notices for each
         digital service.
      3. Deploy data encryption at rest (AES-256) and in transit
         (TLS 1.3) for all personal data storage and transmission.
      4. Implement data retention automation that enforces purpose-based
         retention periods and triggers automatic deletion when
         retention periods expire.
      5. Create a data processing registry (ROPA) that documents all
         personal data processing activities per government service.
    tools:
      - privacy-platform
      - consent-manager
      - encryption-service
      - retention-automation
  devsecops:
    prose: |
      **Privacy compliance pipeline:**
      1. Implement Privacy Impact Assessment (PIA) checks as mandatory
         gates for services that process personal data.
      2. Add automated PII detection scanning to CI/CD pipelines to
         prevent accidental personal data exposure in logs, error
         messages, and API responses.
      3. Validate encryption implementation for personal data at rest
         and in transit as part of security testing.
      4. Test data subject rights workflows (access, correction,
         deletion) end-to-end as part of the release cycle.
    tools:
      - gitlab-ci
      - pia-framework
      - pii-scanner
      - encryption-validator
  secops:
    prose: |
      **Privacy operations:**
      1. Process data subject rights requests within LGPD-mandated
         timelines (15 days for simple requests, as defined by ANPD).
      2. Monitor personal data access patterns for anomalies and
         unauthorized access attempts.
      3. Conduct periodic data protection impact assessments for
         high-risk processing activities.
      4. Report data protection metrics to the agency's Data Protection
         Officer (DPO/encarregado) and the strategic data committee.
    tools:
      - dsr-management
      - access-monitoring
      - dpia-platform
      - privacy-reporting
legal_references:
  - framework_id: lgpd
    articles: ["art-6", "art-7", "art-18", "art-46"]
    relationship: complements
