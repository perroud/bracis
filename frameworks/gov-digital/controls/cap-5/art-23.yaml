id: art-23
family: cap-5
title: "Data Governance Framework for Public Administration"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 23. Os órgãos e as entidades da administração pública federal
    deverão adotar estrutura de governança de dados, observados os
    seguintes aspectos:
    I — gestão de dados como ativo estratégico;
    II — definição de responsabilidades sobre a gestão e o uso dos dados;
    III — garantia da qualidade dos dados;
    IV — transparência e controle no uso dos dados;
    V — segurança e proteção dos dados;
    VI — interoperabilidade dos dados.

    Parágrafo único. A governança de dados de que trata o caput será
    exercida por comitê estratégico de dados, designado pela autoridade
    competente de cada órgão ou entidade.
guidance:
  prose: |
    Article 23 mandates a formal data governance framework for all
    federal government agencies, with six mandatory aspects and a
    requirement for a strategic data committee.

    **Six pillars of government data governance:**
    1. **Data as strategic asset (I):** Data must be treated as a
       valuable organizational asset, not a byproduct of operations
    2. **Clear responsibilities (II):** Data ownership, stewardship,
       and custodianship roles must be formally defined
    3. **Data quality (III):** Quality dimensions (accuracy, completeness,
       timeliness, consistency) must be measured and managed
    4. **Transparency and control (IV):** Data usage must be transparent
       and controlled — citizens and oversight bodies must be able to
       understand how data is used
    5. **Security and protection (V):** Data security and LGPD compliance
       must be embedded in the governance framework
    6. **Interoperability (VI):** Data must be structured to enable
       sharing and exchange between agencies (connects to art. 20-22)

    **Strategic data committee (sole paragraph):**
    Each agency must establish a strategic data committee designated
    by the agency head. This committee is responsible for data
    governance decisions, policies, and oversight.
implementation_guidance:
  platform_engineering:
    prose: |
      **Data governance platform:**
      1. Deploy a data catalog and metadata management platform that
         supports the six governance pillars: asset classification,
         ownership, quality metrics, access controls, security policies,
         and interoperability standards.
      2. Implement a data quality monitoring framework with automated
         quality dimension measurement (accuracy, completeness,
         timeliness, consistency, validity, uniqueness).
      3. Deploy a data lineage tracking system that maps data flows
         from source to consumption, enabling transparency and control.
      4. Create data ownership and stewardship registries with automated
         assignment workflows and escalation procedures.
      5. Implement data governance policies as code (OPA, Kyverno)
         that enforce access controls, retention policies, and quality
         thresholds.
    tools:
      - data-catalog
      - data-quality-framework
      - data-lineage
      - governance-as-code
  devsecops:
    prose: |
      **Data governance in the development lifecycle:**
      1. Implement mandatory data classification checks in CI/CD
         pipelines — new data stores must have assigned owners,
         classification levels, and retention policies.
      2. Add data quality validation as a pipeline gate for data
         pipelines: schema validation, completeness checks, and
         consistency verification.
      3. Validate data lineage metadata for all data transformations
         and publications.
      4. Enforce data governance policies (access controls, encryption,
         anonymization) through automated policy checks.
    tools:
      - gitlab-ci
      - data-classification
      - quality-gate
      - policy-enforcer
  secops:
    prose: |
      **Data governance operations:**
      1. Support the strategic data committee with dashboards showing
         data governance maturity, quality metrics, and compliance
         status across all data domains.
      2. Audit data access patterns to verify compliance with defined
         governance policies and data ownership rules.
      3. Monitor data quality metrics and trigger remediation workflows
         when quality falls below defined thresholds.
      4. Track data governance maturity using a standardized framework
         (DCAM, DAMA-DMBOK) and report progress to the committee.
    tools:
      - governance-dashboard
      - access-audit
      - quality-monitoring
      - maturity-assessment
legal_references:
  - framework_id: lgpd
    articles: ["art-46", "art-50"]
    relationship: complements
