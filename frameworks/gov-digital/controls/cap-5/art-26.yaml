id: art-26
family: cap-5
title: "Data Quality and Integrity Requirements"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 26. Os órgãos e as entidades da administração pública deverão
    adotar medidas para garantir a qualidade, a integridade e a
    confiabilidade dos dados sob sua gestão, observados os seguintes
    requisitos:
    I — adoção de padrões e processos que assegurem a exatidão, a
    completude e a atualização dos dados;
    II — implementação de mecanismos de controle e de validação dos
    dados;
    III — rastreabilidade das alterações realizadas nos dados;
    IV — definição de responsáveis pela gestão da qualidade dos dados
    em cada órgão ou entidade.
guidance:
  prose: |
    Article 26 mandates specific data quality requirements for all
    government agencies, with four concrete obligations.

    **Data quality requirements:**
    1. **Accuracy, completeness, and timeliness (I):** Standards and
       processes must ensure data is correct, complete, and current.
       This requires automated data quality monitoring and remediation
       workflows.
    2. **Control and validation mechanisms (II):** Technical controls
       must validate data at entry points (input validation) and
       during processing (business rules, referential integrity).
    3. **Change traceability (III):** All data modifications must be
       traceable — who changed what, when, and why. This requires
       immutable audit logs for all data stores.
    4. **Data quality owners (IV):** Each agency must designate
       responsible individuals for data quality management. This
       creates accountability for data governance.

    **Data quality dimensions (DAMA-DMBOK alignment):**
    - Accuracy: data values correctly represent real-world entities
    - Completeness: all required data elements are present
    - Timeliness: data is current and up to date
    - Consistency: data does not contradict itself across systems
    - Validity: data conforms to defined formats and rules
    - Uniqueness: no duplicate records
implementation_guidance:
  platform_engineering:
    prose: |
      **Data quality management infrastructure:**
      1. Deploy a data quality monitoring platform that continuously
         measures quality dimensions (accuracy, completeness, timeliness,
         consistency, validity, uniqueness) across all government
         data stores.
      2. Implement data validation layers at all data entry points:
         API input validation, form validation, batch import validation,
         and inter-system data exchange validation.
      3. Deploy immutable audit logging for all data modifications
         (CDC — Change Data Capture) with complete traceability:
         who, what, when, from-value, to-value.
      4. Create a data quality dashboard that provides real-time
         visibility into quality metrics per data domain, per agency.
      5. Implement automated data remediation workflows that trigger
         when quality metrics fall below defined thresholds.
    tools:
      - data-quality-platform
      - validation-framework
      - cdc-audit-logging
      - quality-dashboard
  devsecops:
    prose: |
      **Data quality in the development lifecycle:**
      1. Implement data validation tests in CI/CD pipelines: schema
         validation, business rule enforcement, and referential
         integrity checks.
      2. Add change data capture (CDC) and audit logging validation
         as mandatory requirements for all data store deployments.
      3. Validate data quality metrics as part of release testing —
         no deployment if data quality regresses.
      4. Test data traceability end-to-end: verify that every data
         modification generates an auditable record.
    tools:
      - gitlab-ci
      - data-validation
      - cdc-testing
      - audit-verification
  secops:
    prose: |
      **Data quality governance:**
      1. Monitor data quality metrics across all government data stores
         and generate alerts when metrics fall below thresholds.
      2. Audit data modification trails to verify traceability
         completeness and detect unauthorized changes.
      3. Review data quality ownership assignments and ensure every
         data domain has a designated responsible individual.
      4. Report data quality metrics to the strategic data committee
         quarterly with remediation action plans.
    tools:
      - quality-monitoring
      - audit-review
      - ownership-registry
      - governance-reporting
legal_references:
  - framework_id: lgpd
    articles: ["art-6", "art-18"]
    relationship: complements
