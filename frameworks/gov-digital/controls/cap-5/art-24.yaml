id: art-24
family: cap-5
title: "Data Analytics for Public Policy"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 24. Os órgãos e as entidades da administração pública poderão
    utilizar ferramentas de análise de dados para subsidiar a formulação,
    a implementação, o monitoramento e a avaliação de políticas públicas.

    § 1º A utilização de ferramentas de análise de dados observará os
    seguintes requisitos:
    I — a proteção dos dados pessoais, nos termos da Lei nº 13.709,
    de 14 de agosto de 2018 (Lei Geral de Proteção de Dados Pessoais);
    II — a transparência na utilização de algoritmos e de modelos de
    inteligência artificial;
    III — a eliminação ou a mitigação de discriminação ou de vieses em
    decisões automatizadas;
    IV — a auditabilidade dos métodos e dos resultados obtidos.

    § 2º Os resultados de análises de dados poderão ser disponibilizados
    publicamente, desde que garantida a proteção dos dados pessoais
    e do sigilo legalmente previsto.
guidance:
  prose: |
    Article 24 authorizes and regulates the use of data analytics,
    including AI and machine learning, for public policy purposes.
    This is one of the most forward-looking provisions of the law.

    **Four mandatory requirements for government analytics:**
    1. **LGPD compliance (I):** Personal data used in analytics must
       comply with all LGPD provisions — legal basis, purpose limitation,
       data minimization, anonymization where possible
    2. **Algorithm transparency (II):** Algorithms and AI models used
       for public policy must be transparent — citizens and oversight
       bodies must be able to understand how decisions are made
    3. **Bias elimination (III):** Automated decisions must not
       discriminate. This requires bias testing, fairness metrics,
       and mitigation strategies for AI/ML models
    4. **Auditability (IV):** Methods and results must be auditable —
       reproducible analysis pipelines, version-controlled models,
       and documented methodologies

    **Public results (paragraph 2):**
    Analytics results may be published publicly, provided personal
    data is protected and legal confidentiality is maintained. This
    encourages evidence-based public debate while safeguarding privacy.
implementation_guidance:
  platform_engineering:
    prose: |
      **Responsible analytics platform:**
      1. Deploy a government analytics platform with built-in LGPD
         compliance features: data anonymization, pseudonymization,
         differential privacy, and access controls.
      2. Implement an AI/ML model registry that tracks all models used
         for public policy decisions with their training data, parameters,
         performance metrics, and bias assessments.
      3. Deploy an algorithm transparency framework that generates
         human-readable explanations for model predictions (SHAP, LIME,
         counterfactual explanations).
      4. Create reproducible analytics pipelines using version-controlled
         code (Jupyter, dbt, Airflow) with complete audit trails.
      5. Implement bias detection and fairness testing tools (Fairlearn,
         AIF360) as part of the model deployment pipeline.
    tools:
      - analytics-platform
      - model-registry
      - explainability-framework
      - bias-detection
  devsecops:
    prose: |
      **Responsible AI pipeline:**
      1. Implement mandatory bias testing as a CI/CD gate for all
         ML models before deployment: disparate impact, equalized
         odds, and demographic parity metrics.
      2. Add LGPD compliance checks for analytics data pipelines:
         anonymization validation, consent verification, and purpose
         limitation enforcement.
      3. Validate model explainability — every deployed model must
         generate interpretable outputs alongside predictions.
      4. Implement model versioning and reproducibility checks in
         the deployment pipeline.
    tools:
      - gitlab-ci
      - fairlearn
      - anonymization-validator
      - model-versioning
  secops:
    prose: |
      **Analytics governance:**
      1. Maintain an inventory of all analytics and AI models used for
         public policy decisions with their risk classification,
         LGPD legal basis, and bias assessment results.
      2. Audit automated decision-making processes for discriminatory
         outcomes using fairness metrics and citizen complaint analysis.
      3. Review algorithm transparency reports to ensure citizens
         can understand how analytics-driven decisions affect them.
      4. Conduct periodic re-validation of deployed models to detect
         drift, emerging biases, and accuracy degradation.
    tools:
      - model-inventory
      - fairness-audit
      - transparency-review
      - model-monitoring
legal_references:
  - framework_id: lgpd
    articles: ["art-6", "art-20"]
    relationship: complements
