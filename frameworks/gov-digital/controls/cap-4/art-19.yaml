id: art-19
family: cap-4
title: "Government APIs and Programmatic Data Access"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 19. Os órgãos e as entidades da administração pública deverão
    disponibilizar, sempre que possível, interfaces de programação de
    aplicativos (APIs) para o acesso automatizado a dados públicos por
    outros órgãos e por cidadãos.

    § 1º As APIs de que trata o caput deverão seguir os padrões de
    interoperabilidade definidos pelo Poder Executivo federal.

    § 2º A disponibilização de APIs não exime os órgãos e entidades
    da obrigação de manter a disponibilidade dos dados em seus
    sítios eletrônicos para acesso direto pela sociedade.
guidance:
  prose: |
    Article 19 mandates the creation of government APIs for programmatic
    data access. This is a significant technical mandate that pushes
    government toward an "API-first" strategy.

    **API mandate:**
    Whenever possible, government agencies must provide APIs for
    automated access to public data. The "sempre que possível" qualifier
    means APIs are the default expectation, with non-API publication
    being the exception requiring justification.

    **Interoperability standards (paragraph 1):**
    APIs must follow federal interoperability standards (e-PING),
    which currently specify:
    - RESTful architecture with JSON payloads
    - OpenAPI 3.x specification for API documentation
    - OAuth 2.0 / OIDC for authenticated endpoints
    - Standard HTTP status codes and error response formats

    **Dual publication requirement (paragraph 2):**
    APIs do not replace website publication. Data must be available
    through both channels — APIs for programmatic access and websites
    for direct citizen access. This prevents API-only publication
    that would exclude non-technical citizens.
implementation_guidance:
  platform_engineering:
    prose: |
      **Government API platform:**
      1. Deploy a centralized API gateway for all government data APIs
         with rate limiting, authentication, monitoring, and developer
         portal.
      2. Implement standardized API templates based on e-PING specifications:
         RESTful, JSON payloads, OpenAPI 3.x documentation, HATEOAS links.
      3. Create a government API catalog (developer portal) where all
         available APIs are documented, searchable, and testable.
      4. Deploy API versioning infrastructure that supports backward
         compatibility and deprecation policies.
      5. Implement API analytics to track usage patterns, identify
         high-demand endpoints, and plan capacity.
    tools:
      - api-gateway
      - developer-portal
      - openapi-spec
      - api-analytics
  devsecops:
    prose: |
      **API quality and compliance pipeline:**
      1. Implement OpenAPI specification linting as a mandatory CI/CD gate
         — all APIs must have complete, valid OpenAPI 3.x documentation.
      2. Add e-PING interoperability conformance tests to the deployment
         pipeline (standard headers, error formats, pagination).
      3. Validate API security: authentication enforcement, rate limiting,
         input validation, and injection prevention.
      4. Test API backward compatibility using contract testing to ensure
         new versions do not break existing consumers.
    tools:
      - gitlab-ci
      - openapi-linter
      - api-testing
      - contract-testing
  secops:
    prose: |
      **API governance:**
      1. Maintain an inventory of all published government APIs with their
         documentation, version, SLA, and responsible team.
      2. Monitor API availability and performance against defined SLAs
         (uptime, latency, error rate).
      3. Track API adoption and usage metrics to identify underutilized
         or overloaded endpoints.
      4. Audit API security configurations quarterly: authentication,
         authorization, rate limiting, and logging.
    tools:
      - api-inventory
      - api-monitoring
      - usage-analytics
      - security-audit
