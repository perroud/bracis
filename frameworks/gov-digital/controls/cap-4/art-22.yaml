id: art-22
family: cap-4
title: "Data Sharing Between Government Agencies"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 22. Os órgãos e as entidades da administração pública deverão
    compartilhar entre si os dados de que disponham, ressalvados os dados
    protegidos por sigilo.

    § 1º O compartilhamento de dados entre órgãos e entidades da
    administração pública deverá observar:
    I — os padrões de interoperabilidade definidos pelo Poder Executivo
    federal;
    II — as normas de proteção de dados pessoais previstas na Lei nº
    13.709, de 14 de agosto de 2018 (Lei Geral de Proteção de Dados
    Pessoais);
    III — a Lei nº 12.527, de 18 de novembro de 2011 (Lei de Acesso à
    Informação).

    § 2º O compartilhamento de que trata o caput tem como objetivo
    simplificar a oferta e melhorar a qualidade dos serviços públicos
    prestados ao cidadão.
guidance:
  prose: |
    Article 22 mandates inter-agency data sharing while establishing
    three legal guardrails: interoperability standards, LGPD compliance,
    and LAI compliance.

    **Data sharing mandate:**
    Government agencies must share data with each other. This is a
    positive obligation — agencies cannot refuse to share data that
    another agency needs for legitimate public service delivery.

    **Exception — classified data:**
    Data under legally mandated secrecy (national security, judicial
    secrecy, tax secrecy, banking secrecy) is excluded from the
    sharing mandate.

    **Three-law compliance framework (paragraph 1):**
    Data sharing must simultaneously comply with:
    1. **e-PING standards (I):** Technical interoperability requirements
    2. **LGPD (II):** Personal data protection, including legal basis,
       purpose limitation, and data minimization
    3. **LAI (III):** Transparency and access to information rules

    **LGPD implications for inter-agency data sharing:**
    Under LGPD article 26, the government may share personal data
    between agencies when necessary for public policy execution.
    However, article 27 requires that the shared data be kept in
    structured, interoperable formats and be accessible to the
    data subject.
implementation_guidance:
  platform_engineering:
    prose: |
      **Secure inter-agency data sharing platform:**
      1. Deploy a data sharing bus (barramento de dados) that enables
         controlled, audited, and standards-compliant data exchange
         between government agencies.
      2. Implement a data sharing agreement (acordo de compartilhamento)
         management system that registers, tracks, and enforces the
         terms of each data exchange.
      3. Deploy access control and authorization middleware that enforces
         purpose limitation — each agency can only access data elements
         they are authorized to receive.
      4. Implement data masking and tokenization for sensitive fields
         that are shared between agencies but require protection.
      5. Create audit logging for all data sharing transactions with
         immutable records of who accessed what, when, and why.
    tools:
      - data-sharing-bus
      - agreement-manager
      - authorization-middleware
      - audit-logging
  devsecops:
    prose: |
      **Data sharing compliance pipeline:**
      1. Implement automated tests for data sharing endpoints: schema
         validation, authorization enforcement, and audit logging.
      2. Validate LGPD compliance for each data sharing flow: legal
         basis verification, purpose limitation, and data minimization.
      3. Test data masking and tokenization for sensitive fields in
         shared datasets.
      4. Scan for data sharing flows that bypass the authorized data
         sharing bus (shadow integrations).
    tools:
      - gitlab-ci
      - sharing-validator
      - lgpd-compliance
      - integration-scanner
  secops:
    prose: |
      **Data sharing governance:**
      1. Maintain a complete registry of all active data sharing
         agreements between agencies with their scope, legal basis,
         and review dates.
      2. Audit data sharing transactions to verify compliance with
         agreement terms and LGPD requirements.
      3. Monitor for unauthorized data sharing patterns — access outside
         of registered agreements or beyond authorized scope.
      4. Review and renew data sharing agreements annually with
         compliance assessment against all three applicable laws
         (e-PING, LGPD, LAI).
    tools:
      - sharing-registry
      - transaction-audit
      - anomaly-detection
      - compliance-review
legal_references:
  - framework_id: lgpd
    articles: ["art-26", "art-27"]
    relationship: complements
  - framework_id: lai
    articles: ["art-25"]
    relationship: complements
