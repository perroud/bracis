id: art-18
family: cap-4
title: "Machine-Readable Formats and Data Standards"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 18. Os órgãos e as entidades da administração pública deverão
    publicar, em seus sítios eletrônicos, além das informações previstas
    na Lei nº 12.527, de 18 de novembro de 2011 (Lei de Acesso à
    Informação), dados em formato aberto e processável por máquina,
    referentes a:
    I — repasses e transferências de recursos financeiros;
    II — execução orçamentária e financeira;
    III — licitações e contratos;
    IV — remuneração e subsídio recebidos por ocupante de cargo, posto,
    graduação, função e emprego público;
    V — dados institucionais, tais como estrutura organizacional,
    competências, atos normativos e legislação;
    VI — respostas a perguntas mais frequentes da sociedade.
guidance:
  prose: |
    Article 18 specifies six categories of government data that must be
    published in open, machine-readable formats. These categories go
    beyond general open data to mandate specific financial, administrative,
    and institutional transparency data.

    **Mandatory open data categories:**
    1. **Financial transfers (I):** Government-to-government and
       government-to-entity transfers and subsidies
    2. **Budget execution (II):** Revenue and expenditure data including
       committed, liquidated, and paid amounts
    3. **Procurement (III):** Bidding processes, contracts, amendments,
       and execution data
    4. **Compensation (IV):** Public employee salaries, benefits, and
       allowances at individual level
    5. **Institutional data (V):** Organizational structure, regulations,
       and legal framework of each entity
    6. **FAQ (VI):** Frequently asked questions and answers from citizens

    **Format requirements:**
    All six categories must be published in open (non-proprietary) and
    machine-readable (parseable by software) formats. CSV, JSON, and
    XML are the most common. PDF is explicitly insufficient.
implementation_guidance:
  platform_engineering:
    prose: |
      **Structured transparency data platform:**
      1. Implement automated data extraction pipelines from financial
         systems (SIAFI, SICONV, ComprasNet) to publish budget execution,
         transfers, and procurement data in open formats.
      2. Deploy standardized API endpoints for each of the six mandatory
         data categories with consistent schema and pagination.
      3. Create a compensation data publishing service that extracts
         payroll data and publishes it in machine-readable format with
         appropriate anonymization where required.
      4. Implement a structured FAQ management system with semantic
         search and API access.
      5. Deploy an institutional data registry that exposes organizational
         structure, regulations, and legislation in machine-readable
         formats (JSON-LD, RDF).
    tools:
      - data-pipeline
      - transparency-api
      - payroll-publisher
      - faq-platform
  devsecops:
    prose: |
      **Transparency data validation pipeline:**
      1. Implement automated schema validation for all six mandatory data
         categories — reject publications that do not conform to defined
         open data schemas.
      2. Add completeness checks that verify all mandatory categories
         are published and updated according to defined schedules.
      3. Validate machine-readability by running automated parsing tests
         on published datasets (no embedded images, no merged cells,
         proper encoding).
      4. Scan compensation data publications for PII compliance — verify
         anonymization rules are correctly applied.
    tools:
      - gitlab-ci
      - schema-validator
      - completeness-checker
      - pii-validator
  secops:
    prose: |
      **Transparency data audit:**
      1. Audit all six mandatory data categories monthly for publication
         status, format compliance, and data freshness.
      2. Cross-reference published financial data against source systems
         (SIAFI, SICONV) to verify accuracy.
      3. Monitor public access to transparency data and identify which
         categories receive the most queries for prioritization.
      4. Report quarterly on transparency data compliance to the
         digital transformation officer and the Controladoria-Geral
         da União (CGU).
    tools:
      - transparency-audit
      - data-validation
      - access-analytics
      - compliance-reporting
