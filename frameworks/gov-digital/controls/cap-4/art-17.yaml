id: art-17
family: cap-4
title: "Open Data Policy and Availability"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 17. Os dados disponibilizados pelos prestadores de serviços
    públicos, bem como qualquer informação de transparência ativa, são
    de livre utilização pela sociedade, observados os princípios
    dispostos no art. 6º da Lei nº 13.709, de 14 de agosto de 2018
    (Lei Geral de Proteção de Dados Pessoais).

    § 1º Os dados de que trata o caput deverão ser disponibilizados
    em formato aberto, estruturado e legível por máquina.

    § 2º Excetuam-se do disposto no caput:
    I — os dados protegidos por sigilo, nos termos da legislação
    aplicável;
    II — os dados pessoais cujo tratamento não atenda aos requisitos
    da Lei nº 13.709, de 14 de agosto de 2018.
guidance:
  prose: |
    Article 17 establishes the open data mandate for government services
    and active transparency data, while defining clear exceptions for
    classified and personal data.

    **Open data requirements (paragraph 1):**
    Government data must be published in formats that are:
    - Open — non-proprietary formats (CSV, JSON, XML, not XLS/DOCX)
    - Structured — organized in a parseable schema, not unstructured PDFs
    - Machine-readable — processable by software without human intervention

    **Exceptions (paragraph 2):**
    Two categories of data are excluded from the open data mandate:
    1. Classified data — protected by national security, judicial, or
       other legally mandated secrecy
    2. Personal data — where LGPD requirements are not met (missing legal
       basis, inadequate anonymization)

    **Relationship with LAI (Lei 12.527/2011):**
    The open data mandate builds on the LAI's active transparency
    obligations. While LAI requires proactive disclosure, the Digital
    Government Act adds technical requirements (format, structure,
    machine-readability).

    **Five-star open data model alignment:**
    - Minimum: 3 stars (structured, machine-readable, open format)
    - Target: 5 stars (linked open data with URIs and RDF)
implementation_guidance:
  platform_engineering:
    prose: |
      **Open data publishing infrastructure:**
      1. Deploy an open data portal (CKAN or equivalent) that enforces
         open format publication (CSV, JSON, JSON-LD, XML, Parquet).
      2. Implement automated data classification pipelines that identify
         and segregate personal data and classified data before
         publication.
      3. Create ETL pipelines that transform internal data sources into
         machine-readable open data formats with standardized schemas.
      4. Deploy API endpoints (RESTful, GraphQL) for programmatic
         access to open datasets alongside bulk download options.
      5. Implement data anonymization services for datasets that contain
         personal data but could be published after de-identification.
    tools:
      - ckan
      - data-pipeline
      - anonymization-service
      - api-gateway
  devsecops:
    prose: |
      **Open data compliance pipeline:**
      1. Implement automated format validation that rejects non-open
         formats (PDF, DOCX, XLS) and requires conversion to open
         formats before publication.
      2. Add PII scanning to data publication pipelines to prevent
         accidental disclosure of personal data in open datasets.
      3. Validate machine-readability of published data using automated
         parsing tests (schema validation, encoding verification).
      4. Generate data quality reports (completeness, consistency,
         timeliness) as pipeline artifacts for each dataset publication.
    tools:
      - gitlab-ci
      - format-validator
      - pii-scanner
      - data-quality
  secops:
    prose: |
      **Open data governance:**
      1. Maintain a data inventory that classifies all government data
         assets as: open (publishable), restricted (classified), or
         personal (LGPD-protected).
      2. Audit published open datasets quarterly for data quality,
         format compliance, and accidental PII exposure.
      3. Monitor open data portal usage to understand which datasets
         are most valuable to society and prioritize improvements.
      4. Track open data publication progress against the government's
         open data plan with KPIs per agency.
    tools:
      - data-catalog
      - audit-platform
      - usage-analytics
      - publication-tracker
