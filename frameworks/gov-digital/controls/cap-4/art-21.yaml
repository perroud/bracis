id: art-21
family: cap-4
title: "National Open Data Catalog"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 21. O Poder Executivo federal manterá plataforma centralizada
    para a disponibilização de dados abertos de todos os órgãos e
    entidades do Governo federal.

    § 1º A plataforma de que trata o caput deverá permitir a busca,
    o acesso, o download e a reutilização dos dados abertos pela
    sociedade.

    § 2º Os órgãos e as entidades da administração pública federal
    deverão catalogar seus dados abertos na plataforma de que trata
    o caput.

    § 3º Os Estados, o Distrito Federal e os Municípios poderão
    disponibilizar seus dados abertos na plataforma de que trata
    o caput ou em plataformas próprias.
guidance:
  prose: |
    Article 21 mandates a centralized federal open data platform and
    establishes the cataloging obligations for government agencies.

    **Federal open data platform:**
    The federal government must maintain a centralized platform (currently
    dados.gov.br) where all federal agencies publish their open data.
    The platform must support:
    - Search — citizens can find datasets by topic, agency, or keyword
    - Access — datasets can be previewed and explored online
    - Download — bulk download in open formats
    - Reuse — datasets can be freely reused under open licenses

    **Federal agency obligation (paragraph 2):**
    All federal agencies must catalog their open datasets on the central
    platform. This is mandatory, not optional.

    **Subnational flexibility (paragraph 3):**
    States, the Federal District, and municipalities may either:
    - Publish their data on the federal platform (dados.gov.br)
    - Maintain their own open data platforms
    This flexibility acknowledges the federative autonomy of subnational
    entities while encouraging data centralization.
implementation_guidance:
  platform_engineering:
    prose: |
      **Open data catalog infrastructure:**
      1. Deploy or integrate with the federal open data platform
         (dados.gov.br) using its metadata API for dataset registration.
      2. Implement automated dataset publishing pipelines that export
         data from source systems to the open data catalog with
         standardized metadata (DCAT-AP, Dublin Core).
      3. Create a metadata management system that maintains dataset
         descriptions, update frequencies, data dictionaries, and
         contact information.
      4. Deploy dataset versioning and change tracking to maintain
         historical data availability.
      5. Implement data quality validation before catalog publication:
         schema conformance, encoding verification, completeness checks.
    tools:
      - ckan
      - dados-gov-api
      - metadata-manager
      - data-quality
  devsecops:
    prose: |
      **Catalog publication pipeline:**
      1. Implement automated dataset publication as part of CI/CD
         pipelines — when source data systems are updated, corresponding
         open data exports are triggered.
      2. Validate metadata completeness (DCAT-AP compliance) as a
         mandatory gate before dataset publication.
      3. Run data quality checks (encoding, format, schema) on every
         dataset before catalog registration.
      4. Test download and API access endpoints for each published
         dataset to ensure availability.
    tools:
      - gitlab-ci
      - dcat-validator
      - data-quality-checks
      - endpoint-testing
  secops:
    prose: |
      **Open data catalog governance:**
      1. Audit the open data catalog quarterly to verify all federal
         agencies have registered their mandatory datasets.
      2. Monitor dataset freshness — flag datasets that have not been
         updated within their declared update frequency.
      3. Track catalog usage metrics (searches, downloads, API calls)
         to identify high-value datasets and gaps.
      4. Verify that no classified or personal data has been accidentally
         published in the open data catalog.
    tools:
      - catalog-audit
      - freshness-monitor
      - usage-analytics
      - pii-scanner
