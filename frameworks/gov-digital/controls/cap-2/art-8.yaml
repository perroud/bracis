id: art-8
family: cap-2
title: "Digital Service Delivery Standards"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 8º Os órgãos e as entidades responsáveis pela prestação digital
    de serviços públicos deverão, no âmbito de suas competências:
    I — manter atualizadas as informações institucionais e as relativas
    aos serviços públicos prestados em seus sítios eletrônicos na internet;
    II — monitorar e implementar ações de melhoria dos serviços públicos
    digitais, observados os padrões de qualidade e os indicadores a eles
    relacionados;
    III — integrar os serviços públicos digitais com a base nacional de
    serviços públicos;
    IV — adotar os padrões de interoperabilidade para governo eletrônico
    mantidos pelo Poder Executivo federal;
    V — adotar as diretrizes de experiência do usuário editadas pela
    autoridade competente.
guidance:
  prose: |
    Article 8 defines five mandatory obligations for government entities
    delivering digital services. These are operational requirements, not
    merely aspirational principles.

    **Key obligations:**
    - **Current information (I):** Institutional information and service
      data on government websites must be kept up to date — stale content
      is a legal violation
    - **Continuous improvement (II):** Active monitoring and improvement
      of digital services is mandatory, with quality metrics
    - **Catalog integration (III):** All digital services must be
      registered in the national public services database (art. 7)
    - **Interoperability standards (IV):** Federal e-government
      interoperability standards (e-PING) must be adopted
    - **UX guidelines (V):** The gov.br design system and UX guidelines
      are legally binding, not optional recommendations

    **e-PING interoperability standards:**
    The federal interoperability architecture (e-PING) defines mandatory
    standards for data interchange, web services, security, and
    connectivity that all government digital services must follow.
implementation_guidance:
  platform_engineering:
    prose: |
      **Standards-compliant service delivery platform:**
      1. Implement automated content freshness monitoring for all
         government websites with alerts for stale content.
      2. Deploy the gov.br design system as the mandatory frontend
         framework for all citizen-facing services.
      3. Implement e-PING compliant APIs: REST with JSON, SOAP with
         XML/WSDL for legacy integration, and standard authentication
         protocols.
      4. Create a service quality monitoring infrastructure that tracks
         availability, response time, error rates, and user satisfaction.
      5. Integrate all service deployments with the national services
         database via automated catalog registration.
    tools:
      - govbr-design-system
      - content-monitoring
      - eping-middleware
      - quality-dashboard
  devsecops:
    prose: |
      **Service delivery compliance pipeline:**
      1. Implement design system compliance checks (gov.br component
         library validation) as a mandatory CI/CD gate.
      2. Add e-PING interoperability standard validation for all API
         endpoints before deployment.
      3. Generate service quality metrics (uptime, latency, error rate)
         as pipeline artifacts for each release.
      4. Validate catalog integration — every deployed service must have
         a current entry in the national services database.
    tools:
      - gitlab-ci
      - design-system-linter
      - eping-validator
      - api-conformance
  secops:
    prose: |
      **Service delivery governance:**
      1. Audit government websites quarterly for information currency
         and accuracy.
      2. Monitor service quality indicators and generate improvement
         action plans when metrics fall below thresholds.
      3. Track e-PING interoperability compliance across all digital
         services with automated conformance testing.
      4. Review UX guideline adherence through annual usability audits
         with citizen participation.
    tools:
      - content-audit
      - quality-monitoring
      - interoperability-tracker
      - usability-audit
