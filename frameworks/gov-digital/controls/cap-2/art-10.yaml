id: art-10
family: cap-2
title: "User Experience and Satisfaction Measurement"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 10. A prestação de serviços públicos digitais deverá considerar a
    experiência do usuário, que compreende, entre outros:
    I — a solicitação de informações e documentos estritamente necessários
    para a prestação do serviço, vedada a exigência de informações ou de
    documentos já disponíveis em bases de dados oficiais;
    II — a eliminação de formalidades e de exigências cujo custo econômico
    ou social, tanto para o poder público como para o cidadão, seja superior
    ao risco envolvido;
    III — a aferição do nível de satisfação dos usuários com o serviço
    obtido e a utilização do resultado como subsídio para aprimoramento
    e racionalização dos serviços.
guidance:
  prose: |
    Article 10 establishes user experience as a legal requirement, not
    just a design best practice. Three specific UX mandates are defined.

    **Data minimization for services (I):**
    Government services must only request information strictly necessary
    for service delivery. If data already exists in official databases,
    it must NOT be requested again from the citizen. This is the "once-only"
    principle — citizens should never need to provide information that
    the government already has.

    **Proportionality of requirements (II):**
    Bureaucratic requirements whose cost (economic or social) exceeds the
    risk they mitigate must be eliminated. This requires cost-benefit
    analysis for every form field and document requirement.

    **Mandatory satisfaction measurement (III):**
    User satisfaction must be actively measured and the results must feed
    back into service improvement. This creates a mandatory feedback loop.

    **Alignment with LGPD data minimization (art. 6, V):**
    The "once-only" principle aligns with LGPD's data minimization principle,
    reinforcing the prohibition against collecting redundant personal data.
implementation_guidance:
  platform_engineering:
    prose: |
      **Once-only and UX optimization infrastructure:**
      1. Implement a government data broker (barramento de dados) that
         enables services to query official databases instead of requesting
         information from citizens — realize the "once-only" principle.
      2. Deploy pre-fill capabilities for citizen forms using data already
         available in official databases (CPF, address, birth date from
         Receita Federal, IBGE, TSE).
      3. Implement a citizen satisfaction survey platform integrated with
         all digital services (post-transaction NPS or CSAT measurement).
      4. Create a UX analytics infrastructure (session recording, heatmaps,
         funnel analysis) to identify friction points in service delivery.
    tools:
      - data-broker
      - form-prefill-service
      - survey-platform
      - ux-analytics
  devsecops:
    prose: |
      **UX compliance validation:**
      1. Implement form field analysis in CI/CD that flags forms requesting
         data available in official databases (once-only violation check).
      2. Add mandatory satisfaction measurement integration check —
         no service deployment without a feedback mechanism.
      3. Validate data minimization by comparing requested fields against
         official database availability.
      4. Monitor UX metrics (task completion rate, time to complete,
         error rate) as part of release quality gates.
    tools:
      - gitlab-ci
      - form-analyzer
      - ux-metrics
      - satisfaction-integration
  secops:
    prose: |
      **UX governance and continuous improvement:**
      1. Analyze citizen satisfaction scores monthly and prioritize
         service improvements based on feedback.
      2. Audit services for compliance with the once-only principle —
         identify and eliminate redundant data collection.
      3. Conduct cost-benefit analysis for existing bureaucratic
         requirements and recommend eliminations per item II.
      4. Report quarterly on UX metrics and improvement actions to
         the digital transformation steering committee.
    tools:
      - satisfaction-analytics
      - once-only-audit
      - cost-benefit-framework
      - ux-reporting
legal_references:
  - framework_id: lgpd
    articles: ["art-6"]
    relationship: complements
