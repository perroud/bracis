id: art-6
family: cap-2
title: "Digitization of Public Services"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 6º Os órgãos e as entidades da administração pública deverão
    disponibilizar, preferencialmente, por meio digital, os serviços
    públicos que prestam, observados os princípios e as diretrizes
    desta Lei.

    § 1º Os serviços públicos deverão ser ofertados em plataforma
    única do Governo federal, estadual, distrital ou municipal.

    § 2º A prestação digital dos serviços públicos deverá ocorrer
    por meio de tecnologias de amplo acesso pela população, inclusive
    pela de baixa renda.

    § 3º O acesso ao serviço público digital deverá, sempre que
    possível, ser realizado por meio de dispositivos móveis.
guidance:
  prose: |
    Article 6 establishes the core mandate for digitizing public services.
    The "preferencialmente" (preferably) qualifier means digital must be
    the default channel, with non-digital channels as exceptions.

    **Unified platform requirement (paragraph 1):**
    Each level of government must have a single platform for all services.
    At the federal level, this is gov.br. States and municipalities must
    establish their own unified portals or integrate with gov.br.

    **Digital inclusion safeguard (paragraph 2):**
    Technology choices must consider the population with limited digital
    access. This means: low-bandwidth optimization, USSD/SMS fallbacks,
    support for low-end devices, and offline-capable progressive web apps.

    **Mobile-first mandate (paragraph 3):**
    Mobile device access is explicitly mandated. Responsive design is
    the minimum; native mobile applications may be required for
    high-traffic services.
implementation_guidance:
  platform_engineering:
    prose: |
      **Unified digital service delivery platform:**
      1. Deploy a centralized service portal integrated with the gov.br
         platform (or state/municipal equivalent) as the single entry
         point for all public services.
      2. Implement a progressive web application (PWA) architecture that
         supports offline functionality and low-bandwidth scenarios.
      3. Design APIs with bandwidth-conscious payloads (pagination,
         compression, field selection) to support low-end devices.
      4. Deploy a CDN with edge caching for static content to improve
         access speed across all Brazilian regions, including rural areas.
      5. Implement responsive design with mobile-first breakpoints as
         the default template for all service frontends.
    tools:
      - govbr-portal
      - pwa-framework
      - cdn
      - responsive-framework
  devsecops:
    prose: |
      **Service digitization quality gates:**
      1. Add mandatory mobile-first testing (Lighthouse, mobile viewport
         simulation) to all CI/CD pipelines for citizen-facing services.
      2. Implement performance budgets in pipelines: maximum page load
         time, maximum payload size, minimum Lighthouse score.
      3. Validate gov.br portal integration compliance in staging before
         production deployment.
      4. Test low-bandwidth scenarios (3G simulation) as part of the
         automated test suite.
    tools:
      - gitlab-ci
      - lighthouse
      - mobile-testing
      - performance-budget
  secops:
    prose: |
      **Service digitization monitoring:**
      1. Track digitization progress for all public services with a
         dashboard showing percentage digital, pending migration, and
         timeline to full digitization.
      2. Monitor service availability and performance across different
         access conditions (broadband, 3G, mobile, desktop).
      3. Collect and analyze citizen feedback on digital service usability
         to identify improvement opportunities.
      4. Report quarterly on digital inclusion metrics: access by region,
         device type, and socioeconomic indicators.
    tools:
      - digitization-dashboard
      - performance-monitoring
      - feedback-platform
      - analytics
legal_references:
  - framework_id: lgpd
    articles: ["art-7", "art-23"]
    relationship: complements
  - framework_id: lai
    articles: ["art-8"]
