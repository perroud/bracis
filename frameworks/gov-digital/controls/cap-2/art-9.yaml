id: art-9
family: cap-2
title: "Accessibility Requirements for Digital Services"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 9º Os serviços públicos digitais deverão ser acessíveis a
    pessoas com deficiência, observadas as disposições da Lei nº 13.146,
    de 6 de julho de 2015 (Estatuto da Pessoa com Deficiência), e da
    Lei nº 10.098, de 19 de dezembro de 2000.

    § 1º Os sítios eletrônicos e os aplicativos de órgãos e entidades
    da administração pública deverão atender aos padrões de acessibilidade
    web, conforme regulamentação específica.

    § 2º Os conteúdos disponibilizados em meio digital pela administração
    pública deverão ser oferecidos em linguagem simples, de fácil
    compreensão, e em formato acessível.
guidance:
  prose: |
    Article 9 mandates accessibility compliance for all government digital
    services, grounding this requirement in Brazil's disability rights
    legislation (Estatuto da Pessoa com Deficiência and Lei 10.098/2000).

    **Legal basis:**
    - Lei 13.146/2015 (Estatuto da Pessoa com Deficiência) — comprehensive
      disability rights law requiring digital accessibility
    - Lei 10.098/2000 — general accessibility standards law
    - e-MAG (Modelo de Acessibilidade em Governo Eletrônico) — Brazil's
      specific web accessibility model, aligned with WCAG 2.1

    **Paragraph 1 — Web accessibility standards:**
    Government websites and mobile applications must comply with e-MAG,
    which is based on WCAG 2.1 Level AA. This includes screen reader
    compatibility, keyboard navigation, color contrast, alt text, captions,
    and responsive design.

    **Paragraph 2 — Plain language:**
    All digital content must be written in plain language (linguagem simples).
    This goes beyond accessibility for people with disabilities — it requires
    content that is understandable by the general population, avoiding legal
    jargon and bureaucratic language.
implementation_guidance:
  platform_engineering:
    prose: |
      **Accessibility-first infrastructure:**
      1. Implement the e-MAG (Modelo de Acessibilidade em Governo Eletrônico)
         compliance framework as the baseline for all frontend development.
      2. Deploy automated accessibility testing tools (axe-core, pa11y)
         integrated into the development and deployment pipeline.
      3. Provide accessible component libraries (ARIA-compliant widgets,
         keyboard-navigable forms, screen-reader-friendly layouts) as
         shared infrastructure.
      4. Implement a content management system with built-in plain language
         scoring (readability index) and accessibility validation.
      5. Support multiple assistive technology integrations: screen readers
         (NVDA, JAWS, VoiceOver), screen magnifiers, and switch devices.
    tools:
      - emag-framework
      - axe-core
      - pa11y
      - cms-accessible
  devsecops:
    prose: |
      **Accessibility quality gates:**
      1. Implement automated e-MAG/WCAG 2.1 AA compliance checks as
         mandatory blocking gates in all CI/CD pipelines.
      2. Add Lighthouse accessibility scoring with minimum thresholds
         (score >= 90) as a deployment prerequisite.
      3. Run automated screen reader compatibility tests (axe-core)
         for every pull request affecting frontend components.
      4. Validate plain language compliance using readability index
         scoring tools (Flesch-Kincaid adapted for Portuguese).
    tools:
      - gitlab-ci
      - axe-core
      - lighthouse
      - readability-checker
  secops:
    prose: |
      **Accessibility compliance monitoring:**
      1. Conduct quarterly automated accessibility audits across all
         government digital services using e-MAG criteria.
      2. Commission annual manual accessibility audits with participation
         of people with disabilities for critical services.
      3. Monitor and report accessibility compliance metrics to the
         digital transformation officer.
      4. Maintain a remediation backlog for accessibility issues with
         prioritization by severity and service traffic.
    tools:
      - accessibility-scanner
      - audit-platform
      - remediation-tracker
      - compliance-reporting
legal_references:
  - framework_id: lgpd
    articles: ["art-6"]
    relationship: complements
