id: art-11
family: cap-2
title: "Digital Signature and Document Validation"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 11. Os documentos e os atos processuais produzidos eletronicamente,
    bem como a utilização de assinaturas eletrônicas nas interações com o
    poder público, atenderão ao disposto na Lei nº 14.063, de 23 de setembro
    de 2020.

    § 1º Os documentos produzidos eletronicamente e juntados a processos
    eletrônicos com garantia de origem e de seu signatário, na forma da
    Lei nº 14.063, de 23 de setembro de 2020, serão considerados originais
    para todos os efeitos legais.

    § 2º A assinatura eletrônica qualificada será admitida em qualquer
    interação eletrônica com o poder público, independentemente de
    cadastramento prévio.
guidance:
  prose: |
    Article 11 integrates the Digital Government Act with Lei 14.063/2020
    (the electronic signature law), establishing the legal validity of
    electronic documents and signatures in government interactions.

    **Electronic signature hierarchy (Lei 14.063/2020):**
    - **Simple (simples):** Basic identification, suitable for low-risk
      interactions (login with username/password)
    - **Advanced (avançada):** Associated with the signer with high degree
      of confidence, including gov.br login at silver/gold levels
    - **Qualified (qualificada):** ICP-Brasil digital certificate, accepted
      for any interaction without prior registration

    **Paragraph 1 — Legal equivalence:**
    Electronic documents with guaranteed origin and signer identification
    (per Lei 14.063) have the same legal value as physical originals. No
    entity may refuse an electronically signed document.

    **Paragraph 2 — Qualified signature universality:**
    ICP-Brasil digital certificates must be accepted by any government
    entity for any electronic interaction, without requiring the citizen
    to pre-register.
implementation_guidance:
  platform_engineering:
    prose: |
      **Digital signature infrastructure:**
      1. Implement a digital signature service layer that supports all
         three signature levels defined by Lei 14.063/2020 (simple,
         advanced, qualified).
      2. Integrate ICP-Brasil certificate validation for qualified
         signatures with automatic certificate chain verification.
      3. Deploy a document validation service that verifies signature
         integrity and provides tamper-evident storage.
      4. Implement a timestamp authority (TSA) integration for long-term
         document integrity verification.
      5. Create APIs for third-party integration with the signature
         service, enabling interoperability across government systems.
    tools:
      - digital-signature-service
      - icp-brasil-integration
      - document-validation
      - timestamp-authority
  devsecops:
    prose: |
      **Signature compliance in the development lifecycle:**
      1. Implement automated tests for digital signature validation
         workflows — verify all three signature levels are supported.
      2. Add ICP-Brasil certificate validation tests to CI/CD pipelines
         for services that accept qualified signatures.
      3. Validate that electronic document storage preserves signature
         integrity through hash verification.
      4. Test signature interoperability across different certificate
         authorities and devices.
    tools:
      - gitlab-ci
      - signature-testing
      - certificate-validator
      - hash-verification
  secops:
    prose: |
      **Digital signature governance:**
      1. Monitor ICP-Brasil certificate revocation lists (CRLs) and
         OCSP responders to ensure real-time signature validation.
      2. Audit digital signature workflows to verify legal compliance
         with Lei 14.063/2020 and the Digital Government Act.
      3. Track digital signature adoption metrics across government
         services (percentage of transactions signed electronically).
      4. Maintain incident response procedures for signature compromise
         or certificate authority issues.
    tools:
      - crl-monitor
      - signature-audit
      - adoption-metrics
      - incident-response
