id: art-15
family: cap-3
title: "Biometric Verification and Identity Proofing"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 15. A plataforma de governo digital poderá utilizar dados
    biométricos para a autenticação do cidadão, desde que observadas
    as seguintes condições:
    I — consentimento do cidadão para a coleta e o uso dos dados
    biométricos, ou existência de outra base legal adequada nos termos
    da Lei nº 13.709, de 14 de agosto de 2018 (Lei Geral de Proteção
    de Dados Pessoais);
    II — garantia de segurança e de integridade dos dados biométricos
    coletados e armazenados;
    III — possibilidade de o cidadão solicitar a exclusão de seus dados
    biométricos, salvo quando houver disposição legal em contrário;
    IV — utilização de mecanismos de detecção de fraude e de vida para
    evitar a utilização indevida de dados biométricos.
guidance:
  prose: |
    Article 15 regulates the use of biometric data in government
    authentication, establishing four mandatory conditions that align
    with LGPD requirements for sensitive personal data.

    **Mandatory conditions for biometric use:**
    1. **Legal basis (I):** Consent or another LGPD-compliant legal basis
       must exist. For government services, article 7, II (legal obligation)
       or article 11, II, "a" (public administration) of LGPD may apply
    2. **Security and integrity (II):** Biometric data must be stored and
       transmitted securely — encryption at rest and in transit, access
       controls, and integrity verification
    3. **Deletion right (III):** Citizens must be able to request deletion
       of their biometric data, unless a specific law prohibits it
    4. **Anti-fraud and liveness detection (IV):** Systems must implement
       fraud prevention mechanisms, including liveness detection to
       prevent spoofing with photos, masks, or deepfakes

    **Biometric data as sensitive data under LGPD:**
    Article 5, II of LGPD classifies biometric data as sensitive personal
    data, triggering stricter processing requirements under article 11.
implementation_guidance:
  platform_engineering:
    prose: |
      **Secure biometric infrastructure:**
      1. Deploy biometric capture and verification services with
         certified liveness detection (ISO 30107-3 compliant) to
         prevent presentation attacks (photos, masks, deepfakes).
      2. Implement biometric template storage with encryption at rest
         (AES-256) and in transit (TLS 1.3), with strict access controls.
      3. Deploy a consent management system that records and manages
         citizen consent for biometric data processing with full
         audit trail.
      4. Implement biometric data deletion workflows that allow
         citizens to exercise their deletion right with confirmation
         and audit logging.
      5. Integrate fraud detection systems that analyze biometric
         verification patterns for anomalies.
    tools:
      - biometric-service
      - liveness-detection
      - consent-management
      - encryption-service
  devsecops:
    prose: |
      **Biometric security pipeline:**
      1. Implement automated security tests for biometric data handling:
         encryption validation, access control verification, and
         injection attack prevention.
      2. Add liveness detection quality tests to the CI/CD pipeline —
         validate that spoofing attempts are rejected.
      3. Scan for biometric data leaks in logs, error messages, and
         temporary storage during the development lifecycle.
      4. Validate consent flow completeness — biometric collection
         must not proceed without recorded consent or legal basis.
    tools:
      - gitlab-ci
      - security-scanner
      - data-leak-detection
      - consent-validator
  secops:
    prose: |
      **Biometric data governance:**
      1. Monitor biometric verification transactions for fraud patterns:
         multiple failed attempts, geographic anomalies, device anomalies.
      2. Audit biometric data storage and access logs to ensure only
         authorized systems and personnel access biometric templates.
      3. Track consent status for all biometric data subjects and
         process deletion requests within LGPD-mandated timelines.
      4. Conduct periodic security assessments of biometric infrastructure
         including penetration testing of liveness detection systems.
    tools:
      - fraud-monitoring
      - access-audit
      - consent-tracker
      - penetration-testing
legal_references:
  - framework_id: lgpd
    articles: ["art-5", "art-11", "art-18"]
    relationship: complements
