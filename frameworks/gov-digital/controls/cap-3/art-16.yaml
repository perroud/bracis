id: art-16
family: cap-3
title: "Digital Identity Interoperability and Standards"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 16. A plataforma de governo digital observará padrões de
    interoperabilidade e de segurança da informação editados pelo
    Poder Executivo federal para a integração de bases de dados e
    a verificação de identidade do cidadão.

    § 1º Os padrões de que trata o caput deverão ser compatíveis
    com os padrões internacionais de identidade digital e de
    segurança da informação.

    § 2º Os órgãos e as entidades da administração pública poderão
    celebrar convênios e acordos de cooperação para o compartilhamento
    de bases de dados para fins de identificação do cidadão, observados
    os requisitos de segurança e de proteção de dados pessoais
    previstos na Lei nº 13.709, de 14 de agosto de 2018.
guidance:
  prose: |
    Article 16 mandates interoperability and security standards for the
    government digital identity platform, requiring alignment with
    international standards and enabling data sharing between agencies.

    **Interoperability standards (caput):**
    The federal executive branch defines the mandatory standards for
    identity verification and database integration. Currently, this
    includes e-PING (interoperability), e-MAG (accessibility), and
    ICP-Brasil (digital certificates).

    **International compatibility (paragraph 1):**
    Brazilian government identity standards must be compatible with
    international standards. Key international references:
    - ISO/IEC 27001 for information security
    - ISO/IEC 29115 for entity authentication assurance
    - NIST SP 800-63 for digital identity guidelines
    - eIDAS regulation for cross-border identity (EU reference)
    - ICAO 9303 for machine-readable travel documents

    **Data sharing agreements (paragraph 2):**
    Agencies may share identity databases through formal agreements
    (convênios), but must comply with LGPD. This enables the identity
    federation model while maintaining data protection safeguards.
implementation_guidance:
  platform_engineering:
    prose: |
      **Interoperable identity infrastructure:**
      1. Implement identity verification APIs conforming to federal
         interoperability standards (e-PING) with standardized data
         exchange formats (JSON-LD, SAML, OIDC).
      2. Deploy identity data integration middleware that connects
         multiple government databases (CPF, CNH, TSE, CNIS) through
         a secure, audited data broker.
      3. Implement international standard compliance for identity
         attributes (ISO 29115 for assurance levels, ISO 27001 for
         security controls).
      4. Create a data sharing agreement (convênio) management system
         that tracks active agreements, data flows, and LGPD compliance.
    tools:
      - identity-broker
      - eping-middleware
      - iso-compliance
      - agreement-manager
  devsecops:
    prose: |
      **Identity interoperability testing:**
      1. Implement automated conformance tests for e-PING interoperability
         standards in all identity-related services.
      2. Validate data exchange formats (JSON-LD, SAML assertions, OIDC
         tokens) against published schemas.
      3. Test cross-agency identity verification flows end-to-end,
         including database federation and consent propagation.
      4. Scan identity integration code for LGPD compliance: data
         minimization, purpose limitation, and consent verification.
    tools:
      - gitlab-ci
      - conformance-testing
      - schema-validator
      - lgpd-scanner
  secops:
    prose: |
      **Identity federation governance:**
      1. Maintain an inventory of all data sharing agreements (convênios)
         for identity verification with their scope, legal basis, and
         expiration dates.
      2. Audit identity data flows between agencies to verify compliance
         with data sharing agreements and LGPD requirements.
      3. Monitor identity database access patterns for unauthorized
         cross-agency queries.
      4. Assess international standard compliance annually and update
         implementations when standards are revised.
    tools:
      - agreement-registry
      - data-flow-audit
      - access-monitoring
      - compliance-assessment
