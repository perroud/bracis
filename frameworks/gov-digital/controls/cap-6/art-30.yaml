id: art-30
family: cap-6
title: "Innovation Labs and Regulatory Sandboxes"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 30. Os órgãos e as entidades da administração pública poderão
    instituir laboratórios de inovação, abertos à participação e à
    colaboração da sociedade, para o desenvolvimento e a experimentação
    de conceitos, de ferramentas e de métodos inovadores para a gestão
    pública, a prestação de serviços públicos e a participação do cidadão.

    § 1º Os laboratórios de inovação de que trata o caput poderão
    funcionar em ambientes regulatórios experimentais (sandboxes
    regulatórias), em que normas regulatórias possam ser flexibilizadas
    ou suspensas temporariamente para fins de experimentação de soluções
    inovadoras.

    § 2º Os laboratórios de inovação deverão:
    I — promover a participação social e a cocriação com o cidadão;
    II — utilizar metodologias e ferramentas experimentais e inovadoras;
    III — fomentar a cultura de inovação na administração pública;
    IV — disseminar as melhores práticas e os resultados obtidos.
guidance:
  prose: |
    Article 30 authorizes the creation of government innovation labs
    and regulatory sandboxes, with specific requirements for citizen
    participation and knowledge dissemination.

    **Innovation labs:**
    Government agencies may create open-participation spaces for
    developing and experimenting with innovative solutions for public
    management and service delivery. Key characteristics:
    - Open to society — not internal-only labs
    - Focus on experimentation — prototyping, testing, iterating
    - Applied to three areas: public management, service delivery,
      and citizen participation

    **Regulatory sandboxes (paragraph 1):**
    Innovation labs may operate in regulatory sandbox environments
    where regulations can be temporarily relaxed or suspended. This
    enables experimentation with technologies or approaches that
    may conflict with existing regulations (e.g., AI-based services,
    blockchain-based identity, automated decision-making).

    **Four mandatory characteristics (paragraph 2):**
    1. Social participation and co-creation with citizens
    2. Experimental and innovative methodologies (design thinking,
       agile, lean startup)
    3. Foster innovation culture within government
    4. Disseminate best practices and results (open by default)
implementation_guidance:
  platform_engineering:
    prose: |
      **Innovation lab infrastructure:**
      1. Deploy a sandboxed cloud environment isolated from production
         that provides innovation labs with compute, storage, and
         services for experimentation without regulatory constraints.
      2. Implement a rapid prototyping platform with pre-configured
         templates for common government service patterns (forms,
         authentication, data visualization, APIs).
      3. Create a citizen co-creation platform (digital participation
         tools, ideation boards, feedback mechanisms) to support
         open innovation with society.
      4. Deploy experiment tracking infrastructure that documents
         hypotheses, methods, results, and lessons learned for
         each innovation lab initiative.
      5. Implement sandbox guardrails: data anonymization, access
         controls, and automatic experiment expiration to prevent
         sandbox drift into production.
    tools:
      - sandbox-environment
      - prototyping-platform
      - participation-tools
      - experiment-tracker
  devsecops:
    prose: |
      **Innovation pipeline with guardrails:**
      1. Implement a fast-track CI/CD pipeline for innovation labs
         with relaxed compliance gates but strict sandbox isolation.
      2. Add automatic sandbox expiration — experiments must graduate
         to production (with full compliance) or be decommissioned.
      3. Validate sandbox isolation — no data leakage between sandbox
         and production environments.
      4. Track experiment results and publish them as open knowledge
         assets per the dissemination requirement.
    tools:
      - gitlab-ci
      - sandbox-management
      - isolation-validator
      - knowledge-base
  secops:
    prose: |
      **Innovation governance:**
      1. Maintain a registry of all active innovation labs and
         regulatory sandboxes with their scope, duration, regulatory
         flexibilities, and responsible teams.
      2. Monitor sandbox environments for security incidents and
         data protection compliance — relaxed regulation does not
         mean relaxed security.
      3. Audit citizen participation metrics to ensure innovation
         labs meet the open participation requirement.
      4. Publish innovation lab results and best practices through
         government knowledge sharing platforms.
    tools:
      - innovation-registry
      - sandbox-monitoring
      - participation-metrics
      - knowledge-sharing
legal_references:
