id: art-29
family: cap-6
title: "Shared Digital Infrastructure and Reusable Components"
class: GOV-DIGITAL
baselines: [government-all]
statement:
  prose: |
    Art. 29. O Poder Executivo federal manterá infraestrutura
    tecnológica compartilhada para uso pelos órgãos e entidades da
    administração pública, incluindo:
    I — plataformas de computação em nuvem;
    II — redes de comunicação;
    III — serviços de segurança da informação;
    IV — ferramentas de análise de dados;
    V — plataformas de desenvolvimento de aplicações;
    VI — outros serviços e infraestruturas de uso comum.

    Parágrafo único. Os órgãos e as entidades da administração pública
    deverão utilizar, preferencialmente, a infraestrutura compartilhada
    de que trata o caput, ressalvados os casos em que haja justificativa
    técnica para a adoção de solução própria.
guidance:
  prose: |
    Article 29 mandates shared digital infrastructure maintained by the
    federal government, with six categories of shared services and a
    preference mandate for their adoption.

    **Six categories of shared infrastructure:**
    1. **Cloud platforms (I):** Government cloud (nuvem.gov.br or
       equivalent) with shared compute, storage, and networking
    2. **Communication networks (II):** INFOVIA (government backbone
       network), VPN infrastructure, MPLS connectivity
    3. **Security services (III):** SOC (Security Operations Center),
       CSIRT (CTIR Gov), security scanning, identity management
    4. **Data analytics tools (IV):** Shared analytics platforms,
       data lakes, visualization tools
    5. **Application development platforms (V):** PaaS offerings,
       CI/CD infrastructure, low-code platforms, API gateways
    6. **Other common services (VI):** Email (Expresso V3), document
       management (SEI), electronic process (SUPER.GOV.BR)

    **Prefer shared, justify own (sole paragraph):**
    Agencies must prefer shared infrastructure. Using agency-specific
    solutions requires documented technical justification. This
    creates a "comply or explain" model that drives consolidation
    and cost reduction.
implementation_guidance:
  platform_engineering:
    prose: |
      **Shared infrastructure integration:**
      1. Deploy workloads on government shared cloud infrastructure
         (nuvem.gov.br) as the default platform, with documented
         justification for any alternative.
      2. Integrate with government shared services: INFOVIA for
         networking, CTIR Gov for security monitoring, and gov.br
         for identity management.
      3. Adopt government shared development platforms: CI/CD
         pipelines, container registries, and API gateways provided
         by the shared infrastructure.
      4. Implement service mesh or API gateway integration with the
         shared infrastructure to enable inter-agency service
         communication.
      5. Deploy monitoring and observability that integrates with
         government shared SOC for centralized security visibility.
    tools:
      - gov-cloud
      - infovia
      - shared-cicd
      - service-mesh
  devsecops:
    prose: |
      **Shared infrastructure compliance:**
      1. Validate that deployment targets use government shared
         infrastructure as a CI/CD pipeline check.
      2. Implement integration tests with shared services (identity,
         security scanning, monitoring) as part of the deployment
         pipeline.
      3. Generate infrastructure usage reports showing the ratio of
         shared versus agency-specific infrastructure.
      4. Test failover and resilience for shared infrastructure
         dependencies to ensure service continuity.
    tools:
      - gitlab-ci
      - infrastructure-validator
      - usage-reporting
      - resilience-testing
  secops:
    prose: |
      **Shared infrastructure governance:**
      1. Inventory all infrastructure usage across the agency and
         classify as shared or agency-specific with justification
         documentation for any agency-specific choices.
      2. Monitor shared infrastructure service levels and report
         issues to the infrastructure provider.
      3. Track cost savings from shared infrastructure adoption
         versus agency-specific alternatives.
      4. Participate in government shared infrastructure governance
         committees to influence service roadmap and standards.
    tools:
      - infrastructure-inventory
      - sla-monitoring
      - cost-analysis
      - governance-committee
legal_references:
  - framework_id: gsi-in5
    articles: ["art-1"]
    relationship: complements
