id: art-35
family: rights
title: "Right of Access to Personal Information"
class: PIPA-KR
baselines: [privacy-baseline]
statement:
  prose: |
    Article 35 (Access to Personal Information)
    (1) A data subject may request the personal information processor to allow access
    to his/her own personal information being processed by the processor.

    (2) Where a data subject requests access to personal information held by a public
    institution, he/she may request such access directly from the public institution
    or through the head of a central administrative agency designated by Presidential
    Decree.

    (3) A personal information processor shall, upon receiving a request under
    paragraph (1) or (2), allow the data subject to access the personal information
    within 10 days from the date of receiving the request. Where there is a justifiable
    reason for not allowing access within the said period, the data subject shall be
    notified of the reason and the access shall be allowed once the reason ceases
    to exist.

    (4) A personal information processor may restrict or refuse access to personal
    information in any of the following cases:
    1. Where access is prohibited or restricted by statute;
    2. Where there is concern that it may cause harm to the life or body of a third party;
    3. Where there is concern that it may unreasonably infringe on the property rights
       and other interests of a third party.

    (5) Where a personal information processor restricts or refuses access under
    paragraph (4), the data subject shall be notified of the reason and the method
    of filing an objection.
guidance:
  prose: |
    Article 35 establishes the data subject's right of access, which is the most
    frequently exercised right under PIPA. The 10-day response deadline is stricter
    than GDPR's one-month timeline.

    Key operational requirements:

    - **10-day deadline (para. 3):** This is calendar days, not business days.
      Extensions require a "justifiable reason" and notification to the data subject.
      The PIPC interprets this strictly — administrative inconvenience is not
      justifiable.

    - **Scope of access:** Includes all personal information being "processed" —
      not just stored. This encompasses information in active processing, backups,
      logs, and derived data.

    - **Format:** While PIPA does not specify a machine-readable format requirement
      (unlike GDPR Article 20 portability), the information must be provided in a
      form the data subject can understand.

    - **Exceptions (para. 4):** Three narrow grounds for restriction. "Concern"
      of harm to third parties requires a concrete, demonstrable risk — hypothetical
      harm is insufficient.

    - **Public institutions (para. 2):** Data subjects can request access to
      government-held data through a centralized channel (Ministry of the Interior
      and Safety) or directly from the holding institution.

    - **Cost:** Processors may charge reasonable costs for providing copies, but
      the access itself (viewing) must be free.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build a data subject access request (DSAR) portal that aggregates
         personal information from all processing systems into a single response.
      2. Implement automated data discovery that can locate all instances of a
         data subject's information across databases, logs, backups, and derived
         datasets within the 10-day deadline.
      3. Design the access response system to present information in a clear,
         understandable format with explanations of data categories and purposes.
      4. Build SLA tracking that enforces the 10-day response deadline with
         escalation workflows.
      5. Implement access restriction evaluation workflows for the three
         exception grounds.
    tools:
      - dsar-management-platform
      - personal-data-discovery
      - data-aggregation-engine
      - sla-tracking
      - exception-evaluation-workflow
  devsecops:
    prose: |
      1. Test DSAR response completeness: automated tests should verify that
         access requests return data from all known processing systems.
      2. Validate that access response times meet the 10-day SLA in load testing.
      3. Test access restriction workflows for each of the three exception grounds.
      4. Ensure that the access response format is human-readable and complete.
    tools:
      - dsar-completeness-tester
      - sla-performance-tester
      - exception-workflow-tester
      - response-format-validator
  secops:
    prose: |
      1. Monitor DSAR response times and alert when the 10-day deadline approaches.
      2. Audit access request fulfillment for completeness — verify all data
         sources were queried.
      3. Track access restriction decisions and ensure proper justification is
         documented.
      4. Report on DSAR volumes, response times, and exception rates quarterly.
    tools:
      - sla-monitoring
      - dsar-audit
      - exception-tracking
      - compliance-reporting
