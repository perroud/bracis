id: art-37-2
family: rights
title: "Right Regarding Automated Decision-Making"
class: PIPA-KR
baselines: [privacy-baseline]
statement:
  prose: |
    Article 37-2 (Rights Regarding Automated Decision-Making) [enacted 2023]
    (1) A data subject shall have the right to refuse a decision based solely on
    automated processing, including profiling, that produces legal effects or
    similarly significantly affects him/her.

    (2) A personal information processor who makes a decision based solely on
    automated processing under paragraph (1) shall inform the data subject of the
    following:
    1. The fact that automated decision-making is being conducted;
    2. The criteria and basis for the automated decision;
    3. The right to refuse the automated decision and the right to request
       explanation and review.

    (3) A data subject who has received a decision under paragraph (1) may request
    the personal information processor for an explanation of the decision and a
    review of the decision by a human being.

    (4) A personal information processor shall, upon receiving a request under
    paragraph (3), take necessary measures such as providing an explanation and
    conducting a human review, and notify the data subject of the results without
    delay.

    (5) A personal information processor shall not treat a data subject unfavorably
    for exercising the rights under paragraphs (1) and (3).
guidance:
  prose: |
    Article 37-2, enacted in the September 2023 amendment, introduces a comprehensive
    right regarding automated decision-making. This provision positions Korea alongside
    the EU (GDPR Article 22) and Canada (proposed AIDA) in regulating algorithmic
    decision-making.

    Key elements:

    - **Scope (para. 1):** Covers decisions "based solely on automated processing,
      including profiling" that have "legal effects or similarly significantly
      affects" the data subject. This tracks GDPR Article 22 closely but uses
      broader language around "similarly significantly affects."

    - **Right to refuse (para. 1):** Data subjects can refuse automated decisions
      outright. This is a right to opt out, not merely a right to object. The
      processor must provide a non-automated alternative.

    - **Transparency obligations (para. 2):** Three mandatory disclosures:
      (a) the fact of automated processing, (b) decision criteria and basis,
      and (c) available rights. The requirement to disclose "criteria and basis"
      creates a meaningful explainability obligation.

    - **Human review (para. 3):** Beyond mere explanation, data subjects can
      demand human review of automated decisions. The human reviewer must have
      actual authority to override the automated decision.

    - **Anti-retaliation (para. 5):** Data subjects cannot face adverse consequences
      for exercising these rights. This protects against subtle discrimination
      against those who opt out of automated systems.

    - **Effective date:** The automated decision-making provisions take effect
      March 15, 2024 (18 months after the September 2023 amendment).

    Practical scope: This affects credit scoring, automated hiring decisions,
    algorithmic content moderation, automated insurance underwriting, and AI-driven
    service eligibility determinations common in Korean fintech and platform services.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build an automated decision-making (ADM) registry that catalogs all
         systems making decisions based solely on automated processing.
      2. Implement explainability interfaces for each ADM system that can
         generate human-readable explanations of decision criteria and factors.
      3. Design human review workflows with qualified reviewers who have override
         authority for each ADM system.
      4. Build opt-out mechanisms that route data subjects to non-automated
         decision pathways.
      5. Implement ADM notification triggers that inform data subjects before
         or at the time of automated decision-making.
    tools:
      - adm-registry
      - explainability-engine
      - human-review-workflow
      - opt-out-routing
      - notification-service
  devsecops:
    prose: |
      1. Tag ML models and algorithmic decision systems in the deployment
         pipeline to ensure ADM registry completeness.
      2. Test explainability outputs for each ADM system: verify explanations
         are generated and are human-readable.
      3. Validate that human review workflows are functional and that reviewers
         can effectively override automated decisions.
      4. Test opt-out mechanisms to ensure non-automated alternatives function
         correctly.
    tools:
      - ml-model-registry
      - explainability-tester
      - human-review-validator
      - opt-out-flow-tester
  secops:
    prose: |
      1. Monitor ADM systems for decisions that produce legal or significant
         effects without proper disclosure.
      2. Track human review requests, response times, and override rates.
      3. Audit opt-out requests and verify no adverse treatment of opt-out
         subjects.
      4. Report on ADM transparency compliance across all registered systems.
    tools:
      - adm-monitoring
      - human-review-tracker
      - adverse-treatment-detector
      - compliance-reporting
