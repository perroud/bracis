id: art-36
family: rights
title: "Right to Correction and Deletion"
class: PIPA-KR
baselines: [privacy-baseline]
statement:
  prose: |
    Article 36 (Correction and Deletion of Personal Information)
    (1) A data subject who has accessed his/her own personal information under
    Article 35 may request the personal information processor to correct or delete
    that personal information. However, where the collection of such personal
    information is prescribed by other statutes, the data subject may not request
    its deletion.

    (2) Upon receiving a request under paragraph (1), a personal information processor
    shall, without delay, investigate the matter and take necessary measures such as
    correction or deletion, and notify the data subject of the results.

    (3) Where a personal information processor corrects or deletes personal information
    under paragraph (2), the personal information processor shall take measures to
    prevent the personal information from being used or provided until the correction
    or deletion is completed.

    (4) A personal information processor who has taken measures under paragraph (2)
    shall notify the data subject without delay.

    (5) Where a personal information processor has taken necessary measures, such as
    the correction or deletion of personal information under paragraph (2), and the
    personal information has been provided to a third party, the personal information
    processor shall notify the third party of the details of the measures taken
    without delay so that the third party may take the same measures.
guidance:
  prose: |
    Article 36 establishes the right to correction and deletion (erasure), which
    must be read in conjunction with Article 35 (access right). A data subject
    must first exercise the access right before requesting correction or deletion.

    Key operational points:

    - **Prerequisite access (para. 1):** The data subject must have accessed their
      information under Article 35 before requesting correction or deletion. This
      creates a two-step process that differs from GDPR's direct erasure right.

    - **Statutory retention exception (para. 1):** Where a statute requires the
      collection of specific information, deletion cannot be requested for that
      information. However, the processor must still correct inaccurate information
      even if deletion is restricted.

    - **Processing suspension (para. 3):** During the correction or deletion
      process, the information must not be used or provided. This creates an
      automatic suspension obligation during the investigation period.

    - **Third-party notification (para. 5):** If the corrected or deleted
      information was shared with third parties, those third parties must be
      notified to take corresponding measures. This creates cascading obligations
      throughout data sharing chains.

    - **No specific deadline:** Unlike Article 35's 10-day deadline for access,
      Article 36 requires action "without delay" — interpreted as as soon as
      reasonably possible given the nature of the correction or deletion.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build correction and deletion workflows that integrate with the DSAR
         portal, linking to prior access request records.
      2. Implement cascading deletion capabilities that propagate across
         microservices, backups, caches, and third-party integrations.
      3. Design processing suspension mechanisms that can freeze data usage
         during correction/deletion investigation.
      4. Build third-party notification automation that alerts data recipients
         when corrections or deletions are made.
      5. Implement deletion verification that confirms complete removal across
         all data stores.
    tools:
      - data-deletion-orchestrator
      - cascading-deletion-engine
      - processing-suspension-toggle
      - third-party-notification-service
      - deletion-verification
  devsecops:
    prose: |
      1. Test cascading deletion completeness: verify that deletion requests
         propagate to all data stores including replicas, caches, and logs.
      2. Validate that processing suspension activates during correction/deletion
         workflows.
      3. Test third-party notification triggers and delivery.
      4. Automated tests for the statutory retention exception logic.
    tools:
      - deletion-completeness-tester
      - suspension-validator
      - notification-delivery-tester
      - retention-exception-tester
  secops:
    prose: |
      1. Audit deletion requests for completeness — verify data was removed from
         all known storage locations.
      2. Monitor for continued use of data that is under correction/deletion
         processing (suspension violation).
      3. Track third-party notification delivery and acknowledgment.
      4. Report on correction/deletion request volumes and completion times.
    tools:
      - deletion-audit
      - data-usage-monitor
      - notification-tracker
      - compliance-reporting
