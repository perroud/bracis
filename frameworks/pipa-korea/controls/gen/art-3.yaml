id: art-3
family: gen
title: "Principles of Personal Information Protection"
class: PIPA-KR
baselines: [privacy-baseline]
statement:
  prose: |
    Article 3 (Principles of Personal Information Protection)
    (1) A personal information processor shall explicitly specify the purposes of
    processing personal information and shall collect personal information to the
    minimum extent necessary for such purposes in a lawful and fair manner.

    (2) A personal information processor shall process personal information in a
    manner appropriate for the purposes of processing personal information and shall
    not use it beyond such purposes.

    (3) A personal information processor shall ensure that personal information is
    accurate, complete, and up-to-date to the extent necessary for the purposes of
    processing personal information.

    (4) A personal information processor shall manage personal information safely,
    taking into account the possibility of infringement on the rights of the data
    subject due to the method and type of processing.

    (5) A personal information processor shall make the privacy policy and other
    matters related to the processing of personal information publicly available and
    shall guarantee the rights of the data subject, such as the right of access.

    (6) A personal information processor shall process personal information in a
    manner that minimizes the possibility of infringing on the privacy of the data
    subject.

    (7) Where personal information can be processed in an anonymized form to achieve
    the purpose of processing, a personal information processor shall endeavor to
    process personal information in an anonymized form.

    (8) A personal information processor shall endeavor to comply with and practice
    this Act and related statutes in order to gain the trust of data subjects.
guidance:
  prose: |
    Article 3 sets out eight foundational principles that underpin every other
    provision of PIPA. These principles mirror and in some cases expand upon the
    GDPR's Article 5 principles. Every PIPA obligation should be interpreted through
    the lens of these principles.

    Principle-by-principle analysis:

    - **Purpose specification (para. 1):** Purposes must be explicitly stated before
      collection. Vague purposes like "business operations" or "service improvement"
      are insufficient. Each processing activity needs a concrete, identifiable purpose.

    - **Purpose limitation (para. 2):** Processing beyond the specified purpose is
      prohibited without separate consent or legal basis. Function creep is a
      common compliance failure.

    - **Data accuracy (para. 3):** Processors bear an active obligation to keep data
      accurate and up-to-date. This is not merely a best-effort standard; it requires
      systematic data quality processes.

    - **Safety management (para. 4):** Risk-based approach to security. Higher-risk
      processing (sensitive data, large-scale) demands proportionally stronger
      safeguards.

    - **Transparency (para. 5):** Privacy policies must be publicly available and
      easily accessible. Data subject rights must be guaranteed in practice, not
      just in policy.

    - **Privacy minimization (para. 6):** Goes beyond data minimization to require
      minimizing privacy impact in the manner of processing.

    - **Anonymization preference (para. 7):** Where anonymized data suffices,
      processors should use anonymized data. The 2020 amendments strengthened
      the pseudonymization/anonymization pathway.

    - **Good faith compliance (para. 8):** Processors must actively work to build
      trust, not merely avoid violations.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement purpose-binding at the infrastructure level: each data store
         and API endpoint must declare its processing purpose in metadata.
      2. Build automated purpose-limitation enforcement using policy engines that
         reject cross-purpose data access.
      3. Deploy data quality monitoring that detects stale, incomplete, or
         inconsistent personal information.
      4. Implement anonymization and pseudonymization services as shared platform
         capabilities available to all application teams.
      5. Enforce data minimization defaults in database schemas and API contracts
         (return only required fields, not entire records).
    tools:
      - open-policy-agent
      - data-quality-monitoring
      - anonymization-service
      - api-gateway-purpose-enforcement
      - schema-validation
  devsecops:
    prose: |
      1. Embed purpose-limitation checks into code review workflows: flag data
         access patterns that cross purpose boundaries.
      2. Scan for over-collection patterns in API endpoints and database queries.
      3. Automated testing should verify that data retention policies are enforced
         and data is not persisted beyond its specified purpose.
      4. Include data minimization linting rules in CI/CD pipelines.
    tools:
      - semgrep-custom-rules
      - data-flow-analysis
      - retention-policy-validator
      - api-contract-testing
  secops:
    prose: |
      1. Monitor for purpose-deviation in data access patterns using behavioral
         analytics.
      2. Alert on cross-purpose data transfers between systems.
      3. Conduct quarterly audits of data processing against declared purposes.
      4. Track data quality metrics and report on accuracy/completeness scores.
    tools:
      - siem
      - behavioral-analytics
      - data-quality-dashboard
      - compliance-audit-platform
