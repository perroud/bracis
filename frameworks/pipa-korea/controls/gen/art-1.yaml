id: art-1
family: gen
title: "Purpose of the Act"
class: PIPA-KR
baselines: [privacy-baseline]
statement:
  prose: |
    Article 1 (Purpose)
    The purpose of this Act is to prescribe the processing and protection of personal
    information so as to protect the freedom and rights of individuals and further to
    realize the dignity and value of the individual by prescribing the rights and duties
    of the data subject and the responsibilities and obligations of personal information
    processors.
guidance:
  prose: |
    Article 1 establishes PIPA's dual objective: protecting personal information while
    recognizing the value and dignity of individuals. Unlike many privacy laws that
    focus purely on data protection, PIPA explicitly links personal information
    protection to constitutional dignity rights rooted in the Korean Constitution
    (Article 10 — human dignity, Article 17 — privacy).

    Key interpretive points:

    - **Rights-based framework:** PIPA frames data protection as a fundamental right,
      not merely a regulatory compliance requirement. This influences how courts
      interpret ambiguous provisions — in favor of the data subject.

    - **Balanced approach:** The Act balances the rights of data subjects against the
      responsibilities of personal information processors, acknowledging that data
      processing serves legitimate purposes.

    - **Broad scope:** "Personal information processors" includes any public or
      private entity that processes personal information, regardless of size or
      industry. There is no small business exemption.

    - **Constitutional anchoring:** Korea's Constitutional Court has repeatedly
      affirmed the right to informational self-determination (2005Hun-Ma190), giving
      PIPA provisions constitutional weight.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Design platform architecture with personal information protection as a
         foundational principle. All services must implement data classification
         from inception.
      2. Maintain a centralized personal information processing inventory that
         catalogs all systems, databases, and APIs that handle personal information.
      3. Implement privacy-by-design patterns: data minimization defaults, purpose
         limitation enforced at the API gateway level, and automatic data lifecycle
         management.
      4. Deploy data residency controls ensuring Korean personal information is
         processed in compliance with cross-border transfer restrictions.
    tools:
      - data-catalog
      - api-gateway-with-policy-enforcement
      - data-classification-engine
      - privacy-by-design-templates
  devsecops:
    prose: |
      1. Integrate personal information detection scanners into CI/CD pipelines
         that flag PII patterns (Korean resident registration numbers, phone
         numbers, addresses) in code, configurations, and logs.
      2. Enforce pre-commit hooks that prevent hardcoded personal information from
         entering repositories.
      3. Include privacy impact checks as quality gates in deployment pipelines.
      4. Maintain automated compliance dashboards tracking personal information
         processing across all services.
    tools:
      - pii-scanner
      - pre-commit-hooks
      - compliance-dashboard
      - sast-with-pii-rules
  secops:
    prose: |
      1. Establish continuous monitoring for personal information processing
         activities across all systems.
      2. Deploy SIEM rules that detect unauthorized access to personal information
         stores and anomalous data access patterns.
      3. Implement DLP policies at network boundaries to prevent unauthorized
         personal information exfiltration.
      4. Conduct regular personal information processing audits aligned with PIPC
         guidelines.
    tools:
      - siem
      - dlp
      - access-monitoring
      - compliance-audit-platform
