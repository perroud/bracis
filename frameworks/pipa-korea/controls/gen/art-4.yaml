id: art-4
family: gen
title: "Rights of Data Subjects"
class: PIPA-KR
baselines: [privacy-baseline]
statement:
  prose: |
    Article 4 (Rights of Data Subjects)
    A data subject shall have the following rights regarding the processing of his/her
    own personal information:

    (1) The right to be informed of the processing of personal information;

    (2) The right to consent or refuse consent, and to choose the scope of consent,
    regarding the processing of personal information;

    (3) The right to confirm whether personal information is processed, and to request
    access to such personal information (including the provision of copies);

    (4) The right to request the suspension of processing, and the correction, deletion,
    and destruction of personal information;

    (5) The right to receive appropriate remedy promptly and effectively for damage
    arising from the processing of personal information.
guidance:
  prose: |
    Article 4 establishes the fundamental rights of data subjects under PIPA. These
    rights form the constitutional foundation that Articles 35-37-2 implement in
    detail. The 2023 amendments added the right regarding automated decision-making
    (Article 37-2) as a practical extension of these principles.

    Key considerations:

    - **Right to be informed (para. 1):** This is a proactive obligation on the
      processor, not merely a reactive one. Data subjects must be informed before
      or at the time of collection, and whenever processing purposes change.

    - **Consent as a right (para. 2):** PIPA uniquely frames consent as a right of
      the data subject, not merely a legal basis for the processor. This includes
      the right to choose the scope of consent — granular consent is required, not
      all-or-nothing bundles.

    - **Right of access (para. 3):** Includes the right to receive copies of
      personal information, paralleling GDPR Article 15 and strengthened by the
      2023 data portability provisions.

    - **Right to suspension and deletion (para. 4):** Broader than GDPR's right to
      erasure — includes the right to suspend processing (similar to GDPR's
      restriction right) and the right to destruction of the data.

    - **Right to remedy (para. 5):** Data subjects have a right to prompt and
      effective remedy, enforceable through administrative complaints to the PIPC,
      mediation through the Personal Information Dispute Mediation Committee, and
      civil litigation.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build a data subject rights management portal that enables self-service
         exercise of all five rights categories.
      2. Implement APIs for access requests that can aggregate personal information
         from all processing systems and return it in machine-readable formats.
      3. Design data deletion and suspension capabilities at the platform level,
         including cascading deletion across microservices and backup systems.
      4. Build consent management infrastructure that supports granular, revocable
         consent with version tracking.
      5. Implement automated response workflows with SLA tracking (PIPA requires
         response within 10 days of request).
    tools:
      - consent-management-platform
      - data-subject-rights-portal
      - data-deletion-orchestrator
      - personal-data-export-api
  devsecops:
    prose: |
      1. Test data subject rights flows in CI/CD: automated tests should verify
         that access, deletion, and suspension requests produce correct results.
      2. Validate that consent collection mechanisms enforce granularity and
         allow scope selection.
      3. Ensure data export APIs produce complete, machine-readable outputs.
      4. Test cascading deletion across service boundaries.
    tools:
      - integration-testing-framework
      - consent-flow-validator
      - data-export-tester
      - deletion-completeness-checker
  secops:
    prose: |
      1. Monitor data subject request SLAs and alert when response deadlines
         approach (10-day response window).
      2. Audit data subject rights fulfillment for completeness and accuracy.
      3. Track consent withdrawal rates and ensure processing stops promptly
         after withdrawal.
      4. Log all data subject interactions for compliance evidence.
    tools:
      - sla-monitoring
      - consent-audit-log
      - rights-request-tracker
      - compliance-reporting
