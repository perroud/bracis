id: art-23
family: sensitive
title: "Restriction on Processing Sensitive Information"
class: PIPA-KR
baselines: [privacy-baseline]
statement:
  prose: |
    Article 23 (Restriction on Processing Sensitive Information)
    (1) A personal information processor shall not process personal information
    concerning ideology, belief, admission to and withdrawal from a trade union or
    political party, political opinions, health, sexual life, and other personal
    information prescribed by Presidential Decree that is likely to markedly threaten
    the privacy of a data subject (hereinafter referred to as "sensitive information").

    (2) Notwithstanding paragraph (1), a personal information processor may process
    sensitive information in any of the following cases:
    1. Where the data subject has given separate consent;
    2. Where there are provisions in statutes requiring or permitting the processing
       of sensitive information.

    (3) A personal information processor shall not process biometric information
    (information on the physical, physiological, or behavioral characteristics of
    an individual that is generated through technical processing for the purpose of
    identifying a specific individual, such as fingerprints, face, iris, voice,
    handwriting, or gait) unless the data subject gives separate consent or it is
    specifically required or permitted by law.
guidance:
  prose: |
    Article 23 establishes the sensitive information regime under PIPA. The default
    position is a prohibition on processing, with only two narrow exceptions: separate
    consent or explicit statutory authorization.

    Categories of sensitive information:

    - **Ideological/belief data:** Includes political, religious, and philosophical
      beliefs. Broader than GDPR which treats these as separate categories.

    - **Trade union and political party membership:** Both admission and withdrawal
      are protected — the fact that someone left a union is equally sensitive.

    - **Health information:** Medical records, diagnoses, treatment history, genetic
      test results, fitness data, mental health information.

    - **Sexual life:** Includes sexual orientation, sexual behavior, and related data.

    - **Biometric information (para. 3):** Added as a distinct category. Includes
      fingerprints, facial recognition data, iris scans, voice prints, handwriting
      analysis, and gait recognition. The definition is technologically neutral,
      covering future biometric modalities.

    - **Presidential Decree expansion:** The President can designate additional
      categories by decree, creating a flexible expansion mechanism.

    Key differences from GDPR Article 9:

    - PIPA requires "separate consent" — a higher threshold than GDPR's "explicit
      consent." The consent must be collected independently from other consents.
    - PIPA does not recognize legitimate interest or vital interests as bases for
      sensitive data processing.
    - Biometric data gets its own dedicated paragraph with identical protections.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement data classification that automatically detects and tags
         sensitive information categories at ingestion.
      2. Deploy enhanced encryption for sensitive data: field-level encryption
         with dedicated key management, separate from general personal information.
      3. Enforce separate consent collection for sensitive information, independent
         from general personal information consent flows.
      4. Isolate sensitive information in dedicated data stores with stricter
         access controls (need-to-know, time-limited access).
      5. Build biometric data processing pipelines with enhanced security:
         template-only storage (never raw biometrics), hardware security modules
         for biometric template protection.
    tools:
      - data-classification-engine
      - field-level-encryption
      - hardware-security-module
      - sensitive-data-vault
      - biometric-template-manager
  devsecops:
    prose: |
      1. Scan code and schemas for sensitive data categories using automated
         classifiers in CI/CD pipelines.
      2. Block deployments that introduce sensitive data processing without
         corresponding separate consent mechanisms.
      3. Validate that biometric data is stored as templates only, never as
         raw captures.
      4. Test that sensitive data access requires elevated authorization.
    tools:
      - sensitive-data-scanner
      - deployment-gate
      - biometric-storage-validator
      - access-control-tester
  secops:
    prose: |
      1. Monitor all access to sensitive data stores with enhanced alerting
         and real-time notifications.
      2. Implement anomaly detection for sensitive data access patterns.
      3. Conduct quarterly inventories of sensitive information processing
         activities.
      4. Deploy DLP rules specifically targeting sensitive information categories
         at network boundaries.
    tools:
      - siem
      - dlp
      - anomaly-detection
      - sensitive-data-inventory
