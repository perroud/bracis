id: art-30
family: safety
title: "Privacy Policy"
class: PIPA-KR
baselines: [privacy-baseline]
statement:
  prose: |
    Article 30 (Establishment and Disclosure of Privacy Policy)
    (1) A personal information processor shall establish a privacy policy that
    includes the following and shall disclose it to the public:

    1. The purpose of processing personal information;
    2. The period of processing and retention of personal information;
    3. Provision of personal information to third parties (if applicable);
    4. Outsourcing of personal information processing (if applicable);
    5. Rights and obligations of the data subject and legal representative, and
       the method of exercising such rights;
    6. Items of personal information to be processed;
    7. Destruction of personal information;
    8. Matters related to the installation, operation, and refusal of automatic
       personal information collection devices;
    9. The name (or title) and contact details of the person in charge of personal
       information protection (Data Protection Officer);
    10. Matters related to measures to ensure the safety of personal information
        under Article 29;
    11. Other matters related to the processing of personal information as prescribed
        by Presidential Decree.

    (2) Where a personal information processor changes the privacy policy, the personal
    information processor shall disclose the changes and their effective date without
    delay.

    (3) A personal information processor who operates an internet homepage shall
    disclose the privacy policy on the internet homepage in a manner that allows
    continuous access.

    (4) Where a personal information processor does not operate an internet homepage,
    the privacy policy shall be disclosed through any of the following methods:
    1. Posting at a place easily accessible at the personal information processor's
       place of business;
    2. Publishing in a publication or periodical;
    3. Other methods prescribed by Presidential Decree.
guidance:
  prose: |
    Article 30 mandates comprehensive privacy policies with eleven specific content
    requirements. Korean privacy policies are among the most detailed globally,
    and the PIPC regularly audits and penalizes inadequate disclosures.

    Key requirements:

    - **Eleven mandatory items:** Every privacy policy must address all eleven
      items listed in paragraph (1). Missing any item renders the policy
      non-compliant, regardless of the quality of other sections.

    - **Cookie/tracker disclosure (item 8):** Must address automatic collection
      devices including cookies, web beacons, pixels, SDKs, and similar
      technologies. The policy must explain how to refuse such collection.

    - **DPO disclosure (item 9):** The DPO's name (or title/position), department,
      and contact details must be in the privacy policy. Anonymous or generic
      contact information is insufficient.

    - **Internet homepage requirement (para. 3):** Online services must post the
      privacy policy prominently on their website with "continuous access" — meaning
      it must be accessible from every page, typically via footer link.

    - **Change management (para. 2):** Changes require public disclosure with
      effective date. Best practice is to provide at least 7 days' advance notice
      before changes take effect.

    - **PIPC audit focus:** The PIPC conducts annual audits of privacy policies
      across major Korean platforms and services. Common deficiencies include
      incomplete third-party provision disclosure, vague outsourcing descriptions,
      and missing cookie policy details.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build a privacy policy management system that ensures all eleven mandatory
         items are addressed and tracks version history.
      2. Implement automated privacy policy publishing that maintains a
         continuously accessible privacy policy on all internet-facing services.
      3. Build change notification mechanisms that alert users when the privacy
         policy is updated, with advance notice of the effective date.
      4. Design the privacy policy as a structured data object (not just text)
         that can be automatically validated for completeness.
      5. Integrate cookie/tracker consent management with the privacy policy
         disclosure requirements.
    tools:
      - privacy-policy-cms
      - version-control
      - change-notification-service
      - cookie-consent-manager
      - policy-completeness-validator
  devsecops:
    prose: |
      1. Validate in CI/CD that privacy policy pages are accessible and contain
         all eleven mandatory sections.
      2. Test that privacy policy links are present on all pages of internet
         homepages.
      3. Automated tests for cookie/tracker consent mechanisms.
      4. Validate that privacy policy changes trigger notification workflows.
    tools:
      - page-accessibility-tester
      - link-validator
      - consent-mechanism-tester
      - notification-workflow-tester
  secops:
    prose: |
      1. Conduct quarterly audits of privacy policies against the eleven
         mandatory items.
      2. Monitor privacy policy pages for availability (continuous access
         requirement).
      3. Track privacy policy version changes and ensure proper change
         management was followed.
      4. Verify DPO contact information is current and responsive.
    tools:
      - privacy-policy-auditor
      - uptime-monitor
      - version-tracker
      - contact-verification
