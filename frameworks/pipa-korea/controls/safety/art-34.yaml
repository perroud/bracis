id: art-34
family: safety
title: "Breach Notification"
class: PIPA-KR
baselines: [privacy-baseline]
statement:
  prose: |
    Article 34 (Notification of Leakage of Personal Information)
    (1) Where a personal information processor becomes aware that personal information
    has been leaked, the personal information processor shall notify the data subject
    of the following without delay:

    1. The items of personal information that have been leaked;
    2. The time and circumstances of the leakage;
    3. The measures that the data subject can take to minimize damage resulting
       from the leakage;
    4. Response measures and remedial procedures taken by the personal information
       processor;
    5. The contact details of the department of the personal information processor
       to which the data subject can report damage.

    (2) Where it is difficult to notify data subjects within 72 hours due to
    justifiable reasons, the personal information processor shall notify the
    data subjects without delay after the reason ceases to exist.

    (3) Where a personal information processor becomes aware that personal information
    of 1,000 or more data subjects has been leaked, the personal information processor
    shall report the details and response measures to the Personal Information
    Protection Commission or a specialized institution designated by Presidential
    Decree within 72 hours.

    (4) Where a personal information processor becomes aware of a leakage under
    paragraph (1), the personal information processor shall take necessary
    emergency measures to minimize the damage.

    (5) Where a personal information processor fails to notify data subjects under
    paragraph (1) or where the scale of the leakage is 1,000 or more data subjects,
    the personal information processor shall post the information specified in the
    subparagraphs of paragraph (1) on its internet homepage or at its place of
    business for a period of not less than 7 days.
guidance:
  prose: |
    Article 34 establishes Korea's breach notification regime, which is among the
    most stringent globally with its 72-hour PIPC notification deadline and
    immediate data subject notification requirement.

    Key requirements:

    - **Immediate data subject notification (para. 1):** "Without delay" is
      interpreted as immediately upon becoming aware of the breach. There is no
      72-hour window for data subject notification — that timeline applies only
      to PIPC reporting. Data subject notification must happen as soon as
      practicable.

    - **Five mandatory notification items:** The notification must include what
      was leaked, when and how, what the data subject can do, what the processor
      is doing, and who to contact. Incomplete notifications are non-compliant.

    - **72-hour PIPC reporting (para. 3):** For breaches affecting 1,000+ data
      subjects, PIPC must be notified within 72 hours. This is a hard deadline.
      Extensions require justifiable reasons documented in advance.

    - **1,000 threshold:** The regulatory reporting threshold is 1,000 data
      subjects. Below this threshold, data subject notification is still required
      but PIPC reporting is not mandatory (though recommended).

    - **Emergency measures (para. 4):** Processors must take immediate action to
      contain the breach and minimize damage. This is an independent obligation
      parallel to notification.

    - **Public notice (para. 5):** For large breaches (1,000+) or when individual
      notification fails, a 7-day public notice on the website or place of
      business is required.

    - **Comparison with GDPR:** GDPR gives 72 hours for supervisory authority
      notification; PIPA gives 72 hours for PIPC notification but requires
      immediate data subject notification (GDPR only requires data subject
      notification for high-risk breaches).
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build an incident response platform with automated breach detection,
         classification, and escalation workflows.
      2. Implement automated data subject notification systems that can dispatch
         notifications at scale (email, SMS, push) within hours of breach
         confirmation.
      3. Design PIPC reporting templates pre-populated with required information
         to accelerate the 72-hour reporting process.
      4. Build a breach impact assessment engine that estimates the number of
         affected data subjects to trigger the 1,000-subject threshold.
      5. Implement public notice publishing mechanisms on internet homepages
         with 7-day display tracking.
    tools:
      - incident-response-platform
      - mass-notification-system
      - pipc-reporting-template
      - breach-impact-assessor
      - public-notice-publisher
  devsecops:
    prose: |
      1. Run security scanning (SAST, DAST, dependency scanning) continuously
         to detect vulnerabilities before they lead to breaches.
      2. Implement breach simulation testing to validate notification workflows.
      3. Test notification template completeness against the five mandatory items.
      4. Validate that breach detection systems trigger within acceptable
         timeframes.
    tools:
      - sast
      - dast
      - dependency-scanner
      - breach-simulation
      - notification-template-validator
  secops:
    prose: |
      1. Operate 24/7 security monitoring to detect breaches as early as possible.
      2. Maintain a breach response playbook aligned with Article 34's notification
         requirements and timelines.
      3. Conduct quarterly breach response drills including PIPC notification
         and data subject notification workflows.
      4. Track breach detection-to-notification time and work to minimize it.
    tools:
      - siem
      - incident-response-playbook
      - breach-drill-management
      - sla-tracker
