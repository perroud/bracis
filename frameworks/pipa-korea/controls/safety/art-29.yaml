id: art-29
family: safety
title: "Safety Measures"
class: PIPA-KR
baselines: [privacy-baseline]
statement:
  prose: |
    Article 29 (Safety Measures)
    A personal information processor shall take technical, administrative, and
    physical measures necessary to ensure the safety of personal information, taking
    into account the type and importance of the personal information, in accordance
    with Presidential Decree, to prevent loss, theft, leakage, forgery, alteration,
    or damage of personal information.

    [Enforcement Decree Article 30 specifies the following measures:]
    1. Establishment and implementation of an internal management plan;
    2. Access control and restriction of access rights;
    3. Encryption of personal information;
    4. Retention of access logs and prevention of forgery and falsification;
    5. Installation of security programs and updates;
    6. Physical measures such as secure storage of documents and auxiliary storage media;
    7. Other measures necessary for the safety of personal information.
guidance:
  prose: |
    Article 29 is the central security obligation under PIPA, requiring a comprehensive
    set of technical, administrative, and physical safeguards. The Enforcement Decree
    (Article 30) and PIPC's "Standards for Safety Measures for Personal Information"
    provide detailed specifications.

    Mandatory measures (per Enforcement Decree and PIPC Standards):

    - **Internal management plan:** Written policy covering organizational structure,
      roles, training, incident response, and audit procedures. Must be reviewed
      and updated annually.

    - **Access control:** Role-based access with unique IDs, password policies
      (minimum 8 characters for internal, 10 for external systems), automatic
      session timeout, and IP-based access restrictions for administrative accounts.

    - **Encryption:** Mandatory encryption for passwords (one-way hash), unique
      identification information (AES-256 or equivalent), and personal information
      transmitted over networks (TLS 1.2+). Storage encryption required for
      sensitive information and unique IDs.

    - **Access logs:** All access to personal information systems must be logged
      with user ID, access date/time, accessed information, and action performed.
      Logs must be retained for minimum 1 year (2 years for processors handling
      over 50,000 data subjects). Log integrity must be protected against
      tampering.

    - **Security software:** Antivirus, intrusion detection/prevention, and
      vulnerability patching. Updates must be applied promptly.

    - **Physical security:** Secure areas for servers and storage media, access
      control to physical spaces, secure disposal of physical media.

    The PIPC classifies processors into three tiers based on the volume of personal
    information processed, with proportionally stricter requirements for larger
    processors.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement comprehensive access control with RBAC, unique user IDs, and
         automated password policy enforcement (8+ chars internal, 10+ external).
      2. Deploy encryption at rest (AES-256) for all personal information, with
         mandatory encryption for unique IDs and sensitive information.
      3. Enforce TLS 1.2+ for all data in transit. Implement mTLS for
         service-to-service communication handling personal information.
      4. Build centralized access logging that captures user ID, timestamp, accessed
         data categories, and action type. Retain logs for 1-2 years with
         tamper-proof storage.
      5. Deploy automated vulnerability scanning and patching pipelines for all
         infrastructure components.
      6. Implement session management with automatic timeout (10 minutes for
         administrative interfaces per PIPC standards).
    tools:
      - identity-and-access-management
      - encryption-at-rest-aes256
      - tls-certificate-management
      - centralized-logging
      - vulnerability-scanner
      - session-management
  devsecops:
    prose: |
      1. Enforce encryption validation in CI/CD: scan configurations for
         unencrypted personal information storage and transmission.
      2. Run SAST, DAST, dependency scanning, and container scanning in every
         pipeline.
      3. Validate access control configurations in infrastructure-as-code
         deployments.
      4. Test access logging completeness and retention compliance.
      5. Enforce security software requirements in container images.
    tools:
      - sast
      - dast
      - dependency-scanner
      - container-scanner
      - encryption-config-validator
      - iac-security-scanner
  secops:
    prose: |
      1. Monitor access logs in real time for unauthorized access attempts
         and anomalous patterns.
      2. Conduct regular vulnerability assessments and penetration tests.
      3. Verify encryption implementation across all data stores quarterly.
      4. Audit internal management plan compliance annually.
      5. Monitor security software status and patching levels continuously.
    tools:
      - siem
      - vulnerability-assessment
      - penetration-testing
      - encryption-audit
      - patch-management-monitor
