id: art-33
family: safety
title: "Privacy Impact Assessment"
class: PIPA-KR
baselines: [privacy-baseline]
statement:
  prose: |
    Article 33 (Privacy Impact Assessment)
    (1) Where a public institution intends to operate a personal information file
    falling under any of the following, it shall conduct a privacy impact assessment
    (hereinafter referred to as "impact assessment") taking into account the following
    factors and submit the results to the Personal Information Protection Commission:

    1. Personal information files containing sensitive information or unique
       identification information of a number of data subjects equal to or greater
       than the number prescribed by Presidential Decree;
    2. Personal information files to be connected with, combined with, or linked to
       other personal information files of a certain scale prescribed by Presidential
       Decree;
    3. Other personal information files prescribed by Presidential Decree as having
       a significant impact on data subject rights.

    Factors to be considered:
    1. Whether processing is necessary for the purpose of operating the personal
       information file;
    2. Whether personal information is collected to the minimum extent;
    3. Encryption and other safety measures for personal information;
    4. Retention period and the method of destruction of personal information;
    5. Consultation with a personal information protection expert;
    6. Other matters prescribed by Presidential Decree.

    (2) The Personal Information Protection Commission may, where deemed necessary,
    request a personal information processor other than a public institution to
    conduct an impact assessment.

    (3) The matters necessary for the methods and procedures for impact assessments
    shall be prescribed by Presidential Decree.
guidance:
  prose: |
    Article 33 establishes a mandatory privacy impact assessment (PIA) regime,
    primarily targeting public institutions but with discretionary application to
    the private sector.

    Key aspects:

    - **Mandatory for public institutions (para. 1):** Public institutions must
      conduct PIAs for large-scale personal information files, especially those
      containing sensitive information or unique IDs. The Presidential Decree
      sets thresholds (typically 50,000+ data subjects for sensitive/unique ID
      data, 1 million+ for general personal information).

    - **Data linkage trigger (para. 1, item 2):** Combining or linking personal
      information files triggers a PIA requirement. This is particularly relevant
      for government data integration projects and big data initiatives.

    - **Six assessment factors:** The PIA must evaluate necessity, data minimization,
      security measures, retention/destruction, expert consultation, and additional
      prescribed matters. This structured approach ensures comprehensive assessment.

    - **PIPC submission:** PIA results must be submitted to the PIPC. Unlike GDPR's
      DPIA (which requires submission only when residual risk is high), Korea
      requires submission in all mandatory PIA cases.

    - **Private sector (para. 2):** The PIPC can request (but not mandate) PIAs
      from private entities. In practice, the PIPC increasingly recommends PIAs
      for large-scale private sector processing, especially AI and big data
      projects.

    - **Expert consultation:** The PIA must include consultation with a certified
      personal information protection expert (PIPC-certified assessors).

    Practical recommendation: Even where not legally required, conducting PIAs for
    significant processing activities demonstrates accountability and can mitigate
    enforcement actions.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build a PIA management platform that guides assessors through the six
         mandatory assessment factors with structured templates.
      2. Implement automated data flow mapping that feeds into PIA assessments,
         showing how personal information moves through systems.
      3. Design threshold monitoring that triggers PIA requirements when personal
         information files exceed prescribed sizes or when data linkage occurs.
      4. Build PIA workflow with expert consultation scheduling, PIPC submission
         tracking, and remediation action management.
      5. Integrate PIA requirements into project lifecycle management for new
         systems and major changes.
    tools:
      - pia-management-platform
      - data-flow-mapper
      - threshold-monitor
      - workflow-management
      - project-lifecycle-integration
  devsecops:
    prose: |
      1. Trigger PIA workflows in CI/CD when deployments introduce new personal
         information processing or significant changes to existing processing.
      2. Automate data flow documentation generation for PIA input.
      3. Validate that PIA recommendations are implemented before deployment
         to production.
      4. Track PIA completion status as a deployment gate for qualifying systems.
    tools:
      - pia-trigger
      - data-flow-documenter
      - recommendation-tracker
      - deployment-gate
  secops:
    prose: |
      1. Monitor personal information file sizes and alert when PIA thresholds
         are approached.
      2. Track data linkage activities that may trigger PIA requirements.
      3. Audit PIA completion and PIPC submission status for all qualifying
         systems.
      4. Monitor implementation of PIA recommendations and report on remediation
         progress.
    tools:
      - threshold-alerting
      - data-linkage-monitor
      - pia-compliance-tracker
      - remediation-monitor
