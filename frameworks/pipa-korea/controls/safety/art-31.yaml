id: art-31
family: safety
title: "Data Protection Officer"
class: PIPA-KR
baselines: [privacy-baseline]
statement:
  prose: |
    Article 31 (Data Protection Officer)
    (1) A personal information processor shall designate a person in charge of
    personal information protection (hereinafter referred to as "Data Protection
    Officer") to take overall responsibility for the processing of personal
    information.

    (2) The Data Protection Officer shall perform the following duties:
    1. Establishment and implementation of a personal information protection plan;
    2. Regular surveys on the status of personal information processing and
       improvement of security practices;
    3. Handling of complaints related to the processing of personal information
       and remedying of infringements;
    4. Development and implementation of an internal control system for the
       prevention of personal information leakage and misuse;
    5. Development and implementation of a personal information protection
       education plan;
    6. Protection and management of personal information files;
    7. Other matters necessary for the protection of personal information as
       prescribed by Presidential Decree.

    (3) The Data Protection Officer shall have access to information necessary for
    the performance of his/her duties and shall be provided with the authority and
    resources to perform such duties.

    (4) A personal information processor shall not cause the Data Protection Officer
    to suffer any disadvantage in relation to his/her duties as the Data Protection
    Officer.

    (5) The matters necessary for the qualifications and designation of the Data
    Protection Officer shall be prescribed by Presidential Decree.
guidance:
  prose: |
    Article 31 mandates the designation of a Data Protection Officer (DPO) for
    every personal information processor, with no size or processing volume
    threshold. This is broader than GDPR Article 37, which only requires a DPO
    in specific circumstances.

    Key requirements:

    - **Universal obligation (para. 1):** Every personal information processor
      must designate a DPO. There is no exemption for small organizations or
      low-risk processing. This makes PIPA's DPO requirement one of the broadest
      globally.

    - **Seven duties (para. 2):** The DPO has explicit statutory duties covering
      the full lifecycle of personal information protection: planning, monitoring,
      complaint handling, internal controls, training, file management, and
      additional matters.

    - **Access and resources (para. 3):** The DPO must have access to all
      information necessary for their duties and sufficient authority and
      resources. This implies budget authority, access to senior management,
      and cross-functional access.

    - **Anti-retaliation (para. 4):** The DPO cannot face adverse consequences
      for performing their duties. This protects independence but is narrower
      than GDPR's prohibition on instructions regarding DPO duties.

    - **Qualification requirements (para. 5):** Presidential Decree specifies
      that the DPO should be a senior executive (for larger organizations) or
      the person with overall responsibility for personal information processing.
      For public institutions, the DPO must be a senior government official at
      or above a specified grade.

    - **Practical consideration:** In Korea, the DPO role often overlaps with
      the Chief Privacy Officer (CPO) or Chief Information Security Officer (CISO).
      The PIPC encourages separation of the DPO role from IT operations to
      ensure independence.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build a DPO dashboard that provides real-time visibility into personal
         information processing status, incidents, and compliance metrics across
         all systems.
      2. Implement automated personal information processing surveys that the
         DPO can trigger and review.
      3. Build a complaint management system that routes personal information
         complaints to the DPO with tracking and SLA monitoring.
      4. Design internal control monitoring capabilities that give the DPO
         visibility into access patterns, policy violations, and security events.
      5. Implement a training management system for personal information
         protection education.
    tools:
      - dpo-dashboard
      - processing-survey-automation
      - complaint-management-system
      - internal-control-monitor
      - training-management-system
  devsecops:
    prose: |
      1. Integrate DPO review into deployment workflows for changes that
         affect personal information processing.
      2. Generate automated reports on personal information processing changes
         for DPO review.
      3. Build compliance scanning that the DPO can use for periodic surveys.
      4. Implement privacy impact assessment (PIA) triggers in CI/CD for
         significant changes.
    tools:
      - deployment-review-workflow
      - compliance-report-generator
      - pia-trigger
      - processing-change-detector
  secops:
    prose: |
      1. Provide the DPO with access to security event dashboards and personal
         information incident reports.
      2. Route personal information security incidents to the DPO automatically.
      3. Support the DPO's internal control responsibilities with continuous
         monitoring and alerting.
      4. Generate quarterly security reports for DPO review.
    tools:
      - security-dashboard
      - incident-routing
      - continuous-monitoring
      - quarterly-reporting
