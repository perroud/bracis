id: art-15
family: collection
title: "Collection and Use of Personal Information"
class: PIPA-KR
baselines: [privacy-baseline]
statement:
  prose: |
    Article 15 (Collection and Use of Personal Information)
    (1) A personal information processor may collect personal information and use it
    within the scope of the purpose of collection in any of the following cases:

    1. Where the data subject has given consent;
    2. Where there are special provisions in statutes or it is unavoidable to comply
       with statutory obligations;
    3. Where it is unavoidable for a public institution to perform its duties as
       prescribed in statutes;
    4. Where it is obviously necessary for the interest of the data subject or a third
       party and where it is apparently needed when the consent of the data subject
       cannot be obtained due to reasons such as the failure to make contact;
    5. Where it is necessary for the legitimate interest of the personal information
       processor and is reasonably related to the legitimate interest, provided that
       it does not unreasonably infringe on the interests, rights, and freedoms of
       the data subject.

    (2) The personal information processor shall inform the data subject of the
    following when obtaining consent under paragraph (1)(1):
    1. The purposes of the collection and use of personal information;
    2. Items of personal information to be collected;
    3. The period of retention and use of personal information;
    4. The right to refuse consent and disadvantages, if any, resulting from
       the refusal.

    (3) Where any matter under the subparagraphs of paragraph (2) changes, the data
    subject shall be informed and given consent anew.
guidance:
  prose: |
    Article 15 establishes the lawful bases for collecting and using personal
    information under PIPA. The 2023 amendment introduced the legitimate interest
    basis (paragraph 1, item 5), aligning PIPA more closely with GDPR Article 6(1)(f).

    Critical analysis:

    - **Consent (item 1):** Remains the primary and most common lawful basis in Korean
      practice. Unlike GDPR where consent is one of six co-equal bases, Korean practice
      and PIPC enforcement treat consent as the default expectation.

    - **Legal obligation (item 2):** Narrower than GDPR — requires "special provisions"
      in statutes, not merely general legal requirements.

    - **Public function (item 3):** Limited to public institutions performing statutory
      duties. Private sector cannot rely on this basis.

    - **Vital interests (item 4):** Restricted to obvious necessity and situations
      where consent cannot be obtained. The threshold is higher than GDPR's vital
      interests basis.

    - **Legitimate interest (item 5):** New in 2023. Includes a balancing test
      (must not "unreasonably infringe" data subject rights) and a relevance
      requirement ("reasonably related"). PIPC is expected to issue detailed
      guidance on the scope of this basis. The balancing test is stricter than
      GDPR's equivalent.

    - **Notice requirements (para. 2):** Four mandatory disclosure items when
      collecting by consent. Failure to disclose any item renders consent invalid.
      The notice must include the right to refuse and consequences of refusal —
      a unique PIPA requirement.

    - **Change notification (para. 3):** Any material change requires fresh consent.
      This is more restrictive than GDPR's compatibility assessment approach.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement a consent management system that records the lawful basis for
         each category of personal information collected, with version-controlled
         consent records.
      2. Build consent collection interfaces that display all four mandatory notice
         items (purpose, data items, retention period, right to refuse) clearly
         and separately.
      3. Design data collection APIs with purpose-binding metadata: each collection
         endpoint must declare its lawful basis and purpose.
      4. Implement a legitimate interest assessment (LIA) workflow tool for the new
         Article 15(1)(5) basis, including balancing test documentation.
      5. Build change-detection mechanisms that trigger re-consent workflows when
         processing purposes change.
    tools:
      - consent-management-platform
      - purpose-binding-api-gateway
      - lia-assessment-tool
      - change-notification-service
  devsecops:
    prose: |
      1. Enforce in CI/CD that every data collection endpoint has a declared lawful
         basis in its API specification.
      2. Scan for data collection patterns that lack corresponding consent flows.
      3. Test that consent notices contain all four mandatory items.
      4. Validate that purpose changes trigger re-consent workflows.
    tools:
      - api-specification-linter
      - consent-flow-validator
      - purpose-binding-checker
      - integration-tests
  secops:
    prose: |
      1. Monitor for data collection occurring without valid consent records.
      2. Audit consent records for completeness (all four mandatory items present).
      3. Track consent versions and alert when processing continues under outdated
         consent.
      4. Report on lawful basis distribution across processing activities.
    tools:
      - consent-audit-log
      - compliance-monitoring
      - siem
      - reporting-dashboard
