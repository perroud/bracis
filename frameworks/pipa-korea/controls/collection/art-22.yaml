id: art-22
family: collection
title: "Consent Requirements and Format"
class: PIPA-KR
baselines: [privacy-baseline]
statement:
  prose: |
    Article 22 (Methods of Consent)
    (1) When a personal information processor obtains consent from a data subject
    under this Act, the personal information processor shall seek consent separately
    for each of the following matters. The same shall apply to changes in any of
    the following:

    1. Collection and use of personal information;
    2. Provision of personal information to third parties;
    3. Collection and use of items of personal information that are not essential
       for providing goods or services.

    (2) When a personal information processor obtains consent from a data subject
    under this Act, the personal information processor shall clearly inform the data
    subject of the important matters prescribed by Presidential Decree, including the
    purpose of the collection and use of personal information, by presenting them in
    a manner distinguishable from other matters.

    (3) A personal information processor shall not deny the provision of goods or
    services on the grounds that the data subject does not consent to the collection
    and use of personal information that is not essential.

    (4) A personal information processor shall not collect personal information from
    a child under 14 years of age without the consent of his/her legal representative.
    In such case, the minimum personal information necessary to obtain the consent of
    the legal representative shall be collected directly from the child.

    (5) A personal information processor shall take necessary measures prescribed by
    Presidential Decree to ensure that consent is given in a manner recognizable by
    the data subject and confirm the intent of the data subject.
guidance:
  prose: |
    Article 22 sets out Korea's detailed consent architecture, which is among the
    most prescriptive globally. Korean regulators have consistently emphasized proper
    consent mechanics as a cornerstone of PIPA compliance.

    Key requirements:

    - **Separate consent (para. 1):** Three distinct consent actions are required:
      (a) collection/use, (b) third-party provision, and (c) optional data items.
      These cannot be bundled into a single checkbox or click. PIPC has imposed
      significant fines for bundled consent.

    - **Clear presentation (para. 2):** Important matters must be visually
      distinguishable — typically through larger font, bold text, different colors,
      or separate boxes. The PIPC's enforcement guidelines specify that critical
      items should use font sizes at least 20% larger than surrounding text.

    - **Anti-coercion (para. 3):** Reinforces Article 16(2). Service provision
      cannot be conditioned on consent to optional data collection.

    - **Children's consent (para. 4):** Parental/guardian consent is required for
      children under 14. The processor must verify the identity of the legal
      representative. Only minimum information for verification can be collected
      from the child.

    - **Consent verification (para. 5):** Consent must be demonstrably given.
      Pre-checked boxes, passive scrolling, or inferred consent do not meet
      PIPA requirements.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement a consent management system that enforces the three-tier
         separate consent model: collection/use, third-party provision, and
         optional items.
      2. Build consent UI components that present important matters in visually
         distinguishable formats (larger fonts, contrasting colors, separate boxes).
      3. Design consent flows with active opt-in mechanisms (unchecked boxes,
         affirmative actions) — never pre-checked or implied consent.
      4. Implement age verification and parental consent workflows for services
         accessible to children under 14.
      5. Build consent audit trails that record the exact text shown, the user's
         action, and a timestamp for each consent instance.
    tools:
      - consent-management-platform
      - ui-component-library-with-consent-patterns
      - age-verification-service
      - parental-consent-workflow
      - consent-audit-trail
  devsecops:
    prose: |
      1. Lint consent form implementations for compliance: separate consent
         checkboxes, visual distinction of important items, no pre-checked boxes.
      2. Automated UI tests should verify consent separation and visual
         distinguishability.
      3. Test that services remain functional when optional consent is refused.
      4. Validate age-gating and parental consent flows in CI/CD.
    tools:
      - ui-linter
      - consent-ui-tests
      - accessibility-checker
      - age-verification-tests
  secops:
    prose: |
      1. Audit consent records for completeness: verify separate consent is
         captured for each of the three required categories.
      2. Monitor for consent pattern violations (bundled consent, pre-checked
         boxes) in production.
      3. Track consent rates by category to identify potential coercion patterns
         (unusually high consent rates for optional items may indicate improper
         UI patterns).
      4. Audit children's data processing for valid parental consent records.
    tools:
      - consent-analytics
      - compliance-monitoring
      - pattern-detection
      - children-data-audit
