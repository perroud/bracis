id: art-17
family: collection
title: "Provision of Personal Information to Third Parties"
class: PIPA-KR
baselines: [privacy-baseline]
statement:
  prose: |
    Article 17 (Provision of Personal Information)
    (1) A personal information processor may provide (including shared use) the personal
    information of a data subject to a third party in any of the following cases:

    1. Where the data subject has given consent;
    2. Where it falls under the provisions of Article 15(1)(2), (3), or (5).

    (2) Where a personal information processor intends to obtain consent from a data
    subject under paragraph (1)(1), the data subject shall be informed of the following:

    1. The person who receives the personal information;
    2. The purposes for which the person who receives the personal information uses it;
    3. Items of personal information to be provided;
    4. The period during which the person who receives the personal information retains
       and uses the personal information;
    5. The right to refuse consent and disadvantages, if any, resulting from the refusal.

    (3) Where any matter under the subparagraphs of paragraph (2) changes, the data
    subject shall be informed and given consent anew.

    (4) A person who has received personal information under paragraph (1) shall not
    use such personal information beyond the scope of the purpose for which it was
    provided and shall take necessary measures, such as safety measures, under this Act.
guidance:
  prose: |
    Article 17 governs the provision (disclosure, sharing, transfer) of personal
    information to third parties. This is one of the most frequently enforced
    provisions of PIPA, particularly in the context of data sharing between
    affiliates, business partners, and platform ecosystems.

    Critical requirements:

    - **Consent with full disclosure (para. 2):** Five mandatory disclosure items,
      more detailed than Article 15's four items. The recipient identity must be
      specific — "business partners" or "affiliates" is insufficient.

    - **Recipient obligations (para. 4):** The receiving third party becomes a
      personal information processor with independent obligations. They cannot
      use data beyond the provided purpose and must implement their own safety
      measures.

    - **Shared use:** PIPA explicitly includes "shared use" in the definition of
      provision. Data sharing platforms, APIs, and joint processing arrangements
      all trigger Article 17.

    - **Change management (para. 3):** Any change to the five disclosure items
      requires renewed consent. Adding a new data recipient, changing the purpose,
      or extending the retention period all require fresh consent.

    - **Cross-border transfer:** When the third party is overseas, Article 17 must
      be read together with the cross-border transfer provisions (Articles 28-8
      through 28-12 as amended in 2023).
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build a third-party data sharing registry that records all recipients,
         purposes, data items, and retention periods for each sharing arrangement.
      2. Implement API-level access controls that enforce purpose limitation on
         third-party data access (tokens scoped to declared purposes).
      3. Design consent collection for third-party sharing with all five mandatory
         disclosure items displayed clearly.
      4. Build automated data sharing agreements (DSA) management with expiration
         tracking and renewal workflows.
      5. Implement data sharing audit trails that log every provision of personal
         information to third parties.
    tools:
      - data-sharing-registry
      - api-gateway-with-scoped-tokens
      - consent-management-platform
      - contract-management-system
      - audit-logging
  devsecops:
    prose: |
      1. Scan code for third-party API integrations that transmit personal
         information without corresponding consent records.
      2. Validate that data sharing APIs enforce purpose-scoped access tokens.
      3. Test that consent notices for third-party sharing include all five
         mandatory items.
      4. Automated tests should verify that third-party data access is logged.
    tools:
      - api-integration-scanner
      - token-scope-validator
      - consent-completeness-tester
      - audit-log-verifier
  secops:
    prose: |
      1. Monitor all third-party data sharing in real time and alert on
         unauthorized data provision.
      2. Audit third-party data access patterns for purpose deviation.
      3. Track data sharing agreement expiration dates and alert before expiry.
      4. Verify that third-party recipients maintain adequate safety measures.
    tools:
      - siem
      - data-sharing-monitor
      - contract-expiration-tracker
      - third-party-risk-management
