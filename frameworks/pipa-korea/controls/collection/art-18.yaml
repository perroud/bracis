id: art-18
family: collection
title: "Cross-Border Transfer of Personal Information"
class: PIPA-KR
baselines: [privacy-baseline]
statement:
  prose: |
    Article 28-8 (Transfer of Personal Information Overseas) [as amended 2023]
    (1) A personal information processor may transfer personal information overseas
    in any of the following cases:

    1. Where the data subject has given consent after being informed of the matters
       prescribed in the subparagraphs of Article 17(2);
    2. Where the provisions of statutes, treaties, or other international agreements
       to which the Republic of Korea is a party provide for the transfer;
    3. Where the transfer is necessary for the performance of a contract with the
       data subject or for the benefit of the data subject;
    4. Where the Personal Information Protection Commission has determined that the
       recipient country or international organization ensures an adequate level of
       personal information protection;
    5. Where the personal information processor has taken measures prescribed by
       Presidential Decree, such as entering into a contract that includes matters
       concerning the protection of personal information, with the overseas recipient.

    (2) Where a personal information processor transfers personal information overseas
    under paragraph (1)(1), the data subject shall be informed of the following:
    1. The recipient of the personal information;
    2. The country to which the personal information is transferred;
    3. The date, time, and method of the transfer;
    4. The items of personal information to be transferred;
    5. The purpose for which the recipient uses the personal information;
    6. The period of retention and use by the recipient;
    7. The right to refuse consent and disadvantages, if any, resulting from the refusal.
guidance:
  prose: |
    The 2023 PIPA amendments completely overhauled the cross-border transfer framework
    (Articles 28-8 through 28-12), replacing the previous Article 17-based approach
    with a dedicated, GDPR-inspired transfer mechanism. This is one of the most
    significant changes in the 2023 amendments.

    Transfer mechanisms (in order of preference):

    - **Adequacy determination (item 4):** The PIPC can determine that a country or
      international organization provides adequate protection. Korea itself received
      EU GDPR adequacy in December 2021. The PIPC is expected to issue its own
      adequacy determinations.

    - **Contractual safeguards (item 5):** Standard contractual clauses (SCCs) or
      equivalent contractual protections. The PIPC has published model clauses.

    - **Consent (item 1):** Consent for cross-border transfer requires seven
      mandatory disclosure items — the most detailed consent requirements in PIPA.

    - **Statutory/treaty basis (item 2):** Includes transfers mandated by law or
      international agreements (e.g., tax treaties, mutual legal assistance).

    - **Contractual necessity (item 3):** Transfer necessary for a contract with
      the data subject or in their interest.

    Practical impact: Korean companies using global cloud services (AWS, GCP, Azure)
    must ensure that cross-border transfer mechanisms are in place for any personal
    information processed outside Korea.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement data residency controls that track and restrict cross-border
         data flows. Tag all personal information with jurisdiction metadata.
      2. Build a cross-border transfer registry documenting all overseas transfers
         with the applicable legal mechanism for each.
      3. Implement geo-fencing capabilities in cloud infrastructure to restrict
         personal information processing to approved jurisdictions.
      4. Design consent collection for cross-border transfers with all seven
         mandatory disclosure items.
      5. Integrate PIPC adequacy determination lists into data routing decisions.
    tools:
      - data-residency-controls
      - geo-fencing-engine
      - cross-border-transfer-registry
      - consent-management-platform
      - jurisdiction-metadata-tagging
  devsecops:
    prose: |
      1. Scan infrastructure-as-code for cloud deployments in non-approved
         jurisdictions.
      2. Test that data routing respects geo-fencing policies.
      3. Validate that cross-border transfer consent includes all seven mandatory
         items.
      4. Flag third-party dependencies that may transfer data overseas without
         documented transfer mechanisms.
    tools:
      - iac-geo-compliance-scanner
      - data-flow-analyzer
      - consent-completeness-validator
      - dependency-data-flow-scanner
  secops:
    prose: |
      1. Monitor network traffic for cross-border data transfers and alert on
         unauthorized transfers to non-approved jurisdictions.
      2. Audit cloud provider data processing locations against the cross-border
         transfer registry.
      3. Track adequacy determinations and contractual safeguard expiration dates.
      4. Report on cross-border transfer volumes and mechanisms quarterly.
    tools:
      - network-traffic-analysis
      - cloud-configuration-audit
      - contract-management
      - compliance-reporting
