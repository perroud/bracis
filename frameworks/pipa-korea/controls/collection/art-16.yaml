id: art-16
family: collection
title: "Minimum Collection Principle"
class: PIPA-KR
baselines: [privacy-baseline]
statement:
  prose: |
    Article 16 (Limitation on Collection of Personal Information)
    (1) A personal information processor shall collect personal information to the
    minimum extent necessary to achieve the purposes of processing personal information.
    In this case, the burden of proof that the minimum personal information is being
    collected shall rest with the personal information processor.

    (2) A personal information processor shall not refuse to provide goods or services
    to the data subject on the grounds that the data subject does not consent to the
    collection of personal information beyond the minimum necessary for the provision
    of such goods or services.

    (3) A personal information processor shall separately obtain consent for each item
    of personal information that is collected beyond the minimum necessary for the
    provision of goods or services.
guidance:
  prose: |
    Article 16 codifies the data minimization principle with unique enforcement
    mechanisms that go beyond GDPR's equivalent (Article 5(1)(c)).

    Key distinctions:

    - **Reversed burden of proof (para. 1):** The processor must prove that each
      data element collected is the minimum necessary. This is a significant
      enforcement advantage — in disputes, the processor must justify every field,
      not the data subject who must prove over-collection.

    - **Anti-bundling rule (para. 2):** Services cannot be conditioned on consent
      to collect unnecessary personal information. This directly addresses the
      "take-it-or-leave-it" consent pattern. PIPC has actively enforced this
      provision against major Korean tech companies and app developers.

    - **Separate consent (para. 3):** Optional data items require separate,
      independent consent. A single consent form covering both required and
      optional items is non-compliant.

    - **Practical impact:** Korean enforcement history shows PIPC regularly audits
      app registration forms and service sign-up flows for compliance with this
      article. Excessive collection (e.g., collecting date of birth when only age
      verification is needed) has resulted in significant penalties.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Design APIs and database schemas with required vs. optional fields clearly
         separated. Required fields must be justifiable as minimum necessary.
      2. Implement tiered consent collection: mandatory minimum data collected with
         base consent, optional data requiring separate explicit consent.
      3. Build data collection audit capabilities that can demonstrate which fields
         are minimum necessary and the justification for each.
      4. Design service enrollment flows that function fully with minimum data and
         offer optional data collection as separate, independent consent actions.
    tools:
      - api-schema-validator
      - consent-management-platform
      - data-minimization-audit
      - form-builder-with-consent-tiers
  devsecops:
    prose: |
      1. Lint API schemas for over-collection: flag required fields that may not
         be minimum necessary for the declared purpose.
      2. Test that services function correctly when only minimum data is provided
         (optional fields left blank).
      3. Validate that consent forms separate required and optional data collection.
      4. Review data collection during code review with a data minimization checklist.
    tools:
      - schema-linter
      - data-minimization-tests
      - consent-separation-validator
      - code-review-checklists
  secops:
    prose: |
      1. Audit data collection forms quarterly against the minimum collection
         principle.
      2. Monitor for service denial to users who refuse optional data collection.
      3. Maintain documentation proving each collected field is minimum necessary.
      4. Track PIPC enforcement actions related to over-collection for proactive
         compliance adjustment.
    tools:
      - compliance-audit-platform
      - user-experience-monitoring
      - data-inventory
      - regulatory-intelligence
legal_references:
