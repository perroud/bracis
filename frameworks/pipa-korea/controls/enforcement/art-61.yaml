id: art-61
family: enforcement
title: "PIPC Authority and Enforcement Powers"
class: PIPA-KR
baselines: [privacy-baseline]
statement:
  prose: |
    Article 61 (Reports, Inspections, etc.)
    (1) The Personal Information Protection Commission may, where deemed necessary
    for the protection of personal information, order a personal information processor,
    or a person who has received personal information from a personal information
    processor, to report on the processing of personal information and may have its
    officials enter the relevant places of business to inspect personal information
    files and other materials related to the processing of personal information.

    Article 62 (Improvement Recommendations)
    The Personal Information Protection Commission may recommend that a personal
    information processor improve any of the following for the protection of personal
    information:
    1. Correction or improvement of the method and procedure of collecting personal
       information;
    2. Correction or improvement of the management of personal information files;
    3. Improvement of the privacy policy;
    4. Improvement of safety measures for personal information;
    5. Other matters necessary for the protection of personal information.

    Article 64 (Corrective Orders, etc.)
    (1) The Personal Information Protection Commission may order a personal
    information processor to take corrective measures if the personal information
    processor violates any provision of this Act:
    1. Suspension of the infringing act;
    2. Correction or improvement of the processing of personal information;
    3. Other measures necessary for the protection of personal information.

    (2) The Personal Information Protection Commission may order the destruction of
    personal information where there is a significant risk of infringement on the
    rights of data subjects.

    Article 64-2 (Provisional Measures)
    The Personal Information Protection Commission may take provisional measures,
    including ordering the suspension of processing, where there is an urgent need
    to protect personal information and it is difficult to wait for the completion
    of an investigation.
guidance:
  prose: |
    Articles 61 through 64-2 establish the PIPC's enforcement powers, which were
    significantly strengthened in the 2020 amendments when the PIPC was elevated
    to an independent central administrative agency (equivalent to a ministry).

    Enforcement hierarchy:

    - **Investigation (Art. 61):** The PIPC can compel reporting and conduct
      on-site inspections. Inspectors can enter business premises and examine
      personal information files and related materials. Obstruction of investigation
      is a criminal offense.

    - **Recommendations (Art. 62):** Soft enforcement — the PIPC can recommend
      improvements. While not legally binding, failure to follow recommendations
      typically escalates to corrective orders.

    - **Corrective orders (Art. 64):** Legally binding orders to stop violations,
      correct processing practices, or take other protective measures. Non-compliance
      with corrective orders triggers enhanced penalties.

    - **Destruction orders (Art. 64(2)):** The PIPC can order the destruction of
      personal information where significant risk exists. This is an extraordinary
      power that can have severe business impact.

    - **Provisional measures (Art. 64-2):** Emergency suspension orders without
      full investigation. This "stop first, investigate later" power enables rapid
      response to serious privacy incidents.

    PIPC enforcement trends:

    - The PIPC has been increasingly active, with annual enforcement actions growing
      significantly since its 2020 elevation.
    - Major enforcement targets include platform companies, financial institutions,
      and companies involved in data breaches.
    - The PIPC publishes enforcement decisions publicly, creating reputational
      consequences beyond financial penalties.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build comprehensive audit trail infrastructure that can produce
         regulatory reports for PIPC investigations on demand.
      2. Implement a regulatory response system that can generate required
         reports on personal information processing within PIPC-requested
         timeframes.
      3. Design systems with the capability to implement PIPC corrective
         orders rapidly: suspension of specific processing, data destruction,
         and processing modifications.
      4. Maintain a compliance evidence repository that documents all personal
         information processing practices, policies, and safeguards.
      5. Build a kill-switch capability for processing activities that can
         respond to PIPC provisional measures.
    tools:
      - audit-trail-infrastructure
      - regulatory-response-system
      - compliance-evidence-repository
      - processing-kill-switch
      - report-generator
  devsecops:
    prose: |
      1. Ensure all personal information processing systems have comprehensive
         logging enabled and logs are retained per PIPC requirements.
      2. Build automated compliance report generation from system logs and
         configurations.
      3. Test the ability to suspend or modify processing in response to
         simulated corrective orders.
      4. Validate that data destruction capabilities function completely
         and verifiably.
    tools:
      - logging-validator
      - compliance-report-generator
      - suspension-tester
      - destruction-verifier
  secops:
    prose: |
      1. Maintain readiness for PIPC on-site inspections: documentation,
         system access procedures, and designated response personnel.
      2. Track PIPC enforcement actions against peer organizations for
         proactive compliance adjustments.
      3. Conduct internal mock inspections annually to validate readiness.
      4. Monitor compliance status continuously and report to leadership
         on potential enforcement risk areas.
    tools:
      - inspection-readiness-toolkit
      - enforcement-tracker
      - mock-inspection-framework
      - compliance-risk-dashboard
