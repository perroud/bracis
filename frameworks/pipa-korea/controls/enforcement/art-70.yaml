id: art-70
family: enforcement
title: "Penal Provisions and Administrative Sanctions"
class: PIPA-KR
baselines: [privacy-baseline]
statement:
  prose: |
    Article 70 (Penal Provisions)
    Any person who falls under any of the following shall be punished by imprisonment
    for not more than five years or by a fine not exceeding KRW 50 million:
    1. A person who obtains or uses personal information by deceptive, improper,
       or unjust means in violation of Article 59(1);
    2. A person who provides or uses personal information obtained in the course
       of business for profit or unjust purposes without the consent of the data
       subject, or provides it to a third party.

    Article 71 (Penal Provisions)
    Any person who falls under any of the following shall be punished by imprisonment
    for not more than three years or by a fine not exceeding KRW 30 million:
    1. A person who processes unique identification information in violation of
       Article 24(1);
    2. A person who processes sensitive information in violation of Article 23;
    3. A person who obtains consent by deception or other unjust means in violation
       of Article 22(6).

    Article 75 (Administrative Fines)
    (1) Any person who falls under any of the following shall be subject to an
    administrative fine not exceeding KRW 500 million:
    1. A person who violates Articles 15 through 19 (collection, use, provision);
    2. A person who violates Article 22 (consent requirements);
    3. A person who violates Article 23, 24, or 24-2 (sensitive/unique ID processing);
    4. A person who violates Articles 28-2 through 28-7 (pseudonymized information);
    5. A person who violates Article 29 (safety measures);
    6. A person who violates Article 34 (breach notification).

    (2) Any person who falls under any of the following shall be subject to an
    administrative fine not exceeding KRW 20 million:
    1. A person who violates Article 30 (privacy policy);
    2. A person who violates Article 31 (DPO);
    3. A person who violates Article 35 through 37 (data subject rights).

    (3) In determining the amount of an administrative fine, the Personal Information
    Protection Commission shall take into account the nature, duration, and
    consequences of the violation, the degree of negligence, the benefits gained,
    the volume of personal information processed, and the efforts made by the
    violator to mitigate damage.
guidance:
  prose: |
    PIPA's penalty framework is multi-layered, combining criminal penalties
    (imprisonment and criminal fines) with administrative fines. The 2023 amendments
    significantly increased the maximum administrative fine to KRW 500 million
    (approximately USD 375,000), with revenue-based penalties also possible under
    certain conditions.

    Penalty structure:

    - **Criminal penalties (Art. 70-71):**
      - Up to 5 years imprisonment / KRW 50M fine: Obtaining data by deception,
        profiting from unauthorized data use
      - Up to 3 years imprisonment / KRW 30M fine: Unauthorized processing of
        unique IDs or sensitive information, obtaining consent by deception
      - These are personal criminal liability — individuals, not just organizations,
        face imprisonment.

    - **Administrative fines (Art. 75):**
      - Tier 1 (up to KRW 500M): Violations of collection, use, provision,
        consent, sensitive/unique ID processing, pseudonymization, safety measures,
        and breach notification.
      - Tier 2 (up to KRW 20M): Privacy policy, DPO, and data subject rights
        violations.
      - Revenue-based penalties: For information and communications service
        providers, fines can be up to 3% of related revenue.

    - **Proportionality factors (Art. 75(3)):** The PIPC considers the nature,
      duration, and consequences of the violation; degree of negligence; benefits
      gained; data volume processed; and mitigation efforts. Proactive compliance
      programs demonstrably reduce penalty amounts.

    - **Additional consequences:**
      - Public disclosure of enforcement decisions (reputational damage)
      - Corrective orders (operational disruption)
      - Criminal prosecution referral
      - Personal liability for responsible officers

    Comparison with GDPR: GDPR's maximum fine of 4% of global annual turnover
    significantly exceeds PIPA's fixed-amount caps. However, PIPA's criminal
    penalties (imprisonment) have no GDPR equivalent.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement comprehensive compliance monitoring dashboards that track
         all PIPA obligations and flag potential violations before they escalate.
      2. Build automated compliance evidence collection that can demonstrate
         adherence to all major PIPA provisions during investigations.
      3. Design systems with safety-by-default configurations that prevent
         common violation patterns (unauthorized data sharing, missing consent,
         inadequate encryption).
      4. Implement revenue tracking for ICSP penalty exposure calculation
         (3% of related revenue basis).
      5. Build incident simulation capabilities to test response readiness
         and penalty exposure estimation.
    tools:
      - compliance-dashboard
      - evidence-collection
      - safety-by-default-configs
      - revenue-exposure-calculator
      - incident-simulator
  devsecops:
    prose: |
      1. Enforce compliance gates in CI/CD that prevent deployment of systems
         violating PIPA requirements (missing consent, unencrypted unique IDs,
         absent privacy policies).
      2. Run automated compliance scans that map detected issues to specific
         PIPA articles and potential penalty tiers.
      3. Implement code review checklists covering high-penalty-risk provisions
         (Art. 15-19, Art. 23-24, Art. 29, Art. 34).
      4. Track compliance debt and prioritize by penalty exposure.
    tools:
      - compliance-gate
      - pipa-article-mapper
      - code-review-checklist
      - compliance-debt-tracker
  secops:
    prose: |
      1. Monitor for patterns that commonly trigger PIPC enforcement:
         unauthorized data sharing, breach notification failures, inadequate
         safety measures.
      2. Track PIPC enforcement trends and adjust internal compliance
         priorities accordingly.
      3. Conduct annual penalty exposure assessments across all processing
         activities.
      4. Maintain relationships with external legal counsel specializing
         in PIPC enforcement proceedings.
    tools:
      - enforcement-pattern-monitor
      - regulatory-intelligence
      - penalty-exposure-assessment
      - legal-counsel-management
