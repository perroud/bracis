id: art-39-3
family: enforcement
title: "Special Provisions for Information and Communications Service Providers"
class: PIPA-KR
baselines: [privacy-baseline]
statement:
  prose: |
    Article 39-3 (Collection and Use of Personal Information of Users)
    (1) An information and communications service provider shall collect personal
    information of users and use it within the scope of the following purposes:
    1. Performance of a contract for the provision of information and communications
       services and billing for such services;
    2. Where the user has given consent.

    Article 39-4 (Handling of Personal Information at Termination of Service)
    (1) Where a user has not used the information and communications services for
    a period prescribed by Presidential Decree, the information and communications
    service provider shall take measures to destroy the personal information of the
    user or to store it separately from other users' personal information.

    (2) An information and communications service provider shall notify the user
    of the intention to take the measures under paragraph (1) at least 30 days
    prior to the expiration of the period prescribed under paragraph (1).

    Article 39-7 (Prohibition on Collection of Personal Information in Violation
    of Statutes)
    An information and communications service provider or a person who has received
    personal information from an information and communications service provider
    shall not collect personal information in violation of this Act or other statutes.

    Article 39-12 (Standard Privacy Protection Guidelines)
    The Personal Information Protection Commission shall establish and implement
    standard guidelines for the protection of personal information of users by
    information and communications service providers.

    Article 39-15 (Extraterritorial Application)
    This Act shall apply to a foreign information and communications service provider
    that processes personal information of users in the Republic of Korea, regardless
    of whether such provider has an office or server in the Republic of Korea.
guidance:
  prose: |
    Articles 39-3 through 39-15 contain special provisions specifically targeting
    information and communications service providers (ICSPs) — essentially online
    service providers, platform operators, and telecommunications companies. These
    provisions were originally in the Act on Promotion of Information and
    Communications Network Utilization and Information Protection and were
    consolidated into PIPA in the 2020 amendments.

    Key special provisions:

    - **Narrower lawful bases (Art. 39-3):** ICSPs have only two lawful bases for
      processing: contractual necessity and consent. The legitimate interest basis
      (Art. 15(1)(5)) is not available to ICSPs. This is significantly more
      restrictive than the general PIPA framework.

    - **Dormant account handling (Art. 39-4):** User information must be destroyed
      or segregated after a statutory dormancy period (typically 1 year of
      inactivity). Users must be notified 30 days before the dormancy deadline.
      This is unique to Korean law and creates significant operational requirements
      for platform companies.

    - **Enhanced prohibitions (Art. 39-7):** Any collection of personal information
      by ICSPs in violation of any statute (not just PIPA) is explicitly prohibited
      with enhanced penalties.

    - **Standard guidelines (Art. 39-12):** The PIPC publishes mandatory standard
      guidelines for ICSPs, providing detailed compliance specifications beyond
      the general PIPA requirements.

    - **Extraterritorial scope (Art. 39-15):** PIPA applies to foreign ICSPs
      processing Korean users' data regardless of physical presence in Korea.
      This creates jurisdiction over global platforms serving Korean users.

    Practical impact: Major global platforms (Google, Apple, Meta, Amazon, Netflix)
    operating in Korea must comply with these enhanced ICSP provisions, not just
    the general PIPA framework.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement dormant account detection and management: identify users
         inactive for the prescribed period and trigger notification/segregation/
         destruction workflows.
      2. Build user notification systems for the 30-day advance dormancy notice
         requirement.
      3. Design separate personal information storage for dormant users,
         isolated from active user data with restricted access.
      4. Implement ICSP-specific consent management that restricts lawful bases
         to contractual necessity and consent only.
      5. Build Korean user identification capabilities for extraterritorial
         compliance scope determination.
    tools:
      - dormancy-detection-engine
      - user-notification-system
      - data-segregation-service
      - icsp-consent-manager
      - geo-identification
  devsecops:
    prose: |
      1. Test dormancy detection accuracy and notification timing (30-day
         advance notice).
      2. Validate data segregation or destruction for dormant accounts.
      3. Verify that ICSP-specific lawful basis restrictions are enforced in
         data processing flows.
      4. Test extraterritorial scope determination logic for Korean users of
         foreign services.
    tools:
      - dormancy-tester
      - data-segregation-validator
      - lawful-basis-enforcement-tester
      - scope-determination-tester
  secops:
    prose: |
      1. Monitor dormancy timelines and ensure notifications and data actions
         are executed on schedule.
      2. Audit data segregation or destruction for dormant accounts quarterly.
      3. Track PIPC standard guideline updates and assess compliance impact.
      4. Monitor for data collection by ICSPs that may violate statutory
         prohibitions.
    tools:
      - dormancy-monitor
      - segregation-audit
      - regulatory-tracker
      - collection-compliance-monitor
