control_families:
  - id: gen
    title: "General Provisions"
    description: "Purpose, definitions, scope of application, and data protection principles"
    articles: "Art. 1-4"
    control_count: 3
  - id: collection
    title: "Collection, Use and Provision"
    description: "Consent requirements, purpose limitation, minimum collection, third-party provision, and cross-border transfers"
    articles: "Art. 15-22"
    control_count: 5
  - id: sensitive
    title: "Sensitive Information and Unique Identifiers"
    description: "Restrictions on processing sensitive information, unique identification information, and pseudonymized information"
    articles: "Art. 23-28-7"
    control_count: 3
  - id: rights
    title: "Rights of Data Subjects"
    description: "Access, correction, deletion, suspension of processing, and rights regarding automated decision-making"
    articles: "Art. 35-37-2"
    control_count: 4
  - id: safety
    title: "Safety Measures and Management"
    description: "Technical and administrative safeguards, privacy policies, DPO, impact assessments, and breach notification"
    articles: "Art. 29-34"
    control_count: 5
  - id: enforcement
    title: "Enforcement and Penalties"
    description: "PIPC authority, penal provisions, administrative sanctions, and special provisions for ICT service providers"
    articles: "Art. 39-3, Art. 61-76"
    control_count: 3
related_frameworks:
  - framework_id: gdpr
    relationship: equivalent-to
    description: "South Korea achieved EU GDPR adequacy in 2022, establishing PIPA as an equivalent level of data protection."
  - framework_id: iso-27701
    relationship: complements
    description: "ISO 27701 PIMS provides the management system structure for demonstrating PIPA compliance."
  - framework_id: appi
    relationship: mapped
    description: "Japan's APPI shares GDPR-influenced concepts with PIPA, both operating under adequacy arrangements."
  - framework_id: pipl
    relationship: mapped
    description: "China's PIPL and Korea's PIPA are both GDPR-influenced Asia-Pacific data protection laws with strict consent and cross-border transfer requirements."
  - framework_id: pdpa-thailand
    relationship: mapped
    description: "Thailand's PDPA and Korea's PIPA are both GDPR-influenced Asia-Pacific privacy laws with similar scope and subject rights."
  - framework_id: lgpd
    relationship: mapped
    description: "Brazil's LGPD and Korea's PIPA share GDPR-aligned principles including consent models, data subject rights, and DPO requirements."
