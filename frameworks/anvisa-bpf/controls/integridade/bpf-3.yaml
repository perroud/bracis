id: bpf-3
family: integridade
title: "Electronic Batch Records (eBR)"
class: ANVISA-BPF
baselines: [fabricantes-medicamentos]
statement:
  prose: |
    Os registros eletrônicos de lote (electronic Batch Records — eBR) devem
    substituir ou complementar os registros em papel, assegurando que toda a
    documentação do processo de fabricação, incluindo pesagem, adição de
    matérias-primas, parâmetros de processo, controles em processo, rendimentos,
    reconciliações e liberação, seja capturada eletronicamente com integridade
    total.

    O sistema de eBR deve impor a sequência de execução definida na ordem de
    fabricação, impedindo que etapas sejam ignoradas, executadas fora de
    ordem ou duplicadas sem autorização documentada e justificada.

    Todos os dados inseridos manualmente no eBR devem ser verificados por
    segunda pessoa ou validados por controles automatizados. Correções em
    registros eletrônicos devem preservar o valor original, registrar o
    novo valor, o motivo da correção, a identidade do operador e a data/hora
    da alteração.
guidance:
  prose: |
    Electronic Batch Records represent the digital equivalent of paper-based
    manufacturing documentation. eBR systems enforce manufacturing workflow
    compliance by guiding operators through each step and capturing data
    contemporaneously.

    Critical eBR capabilities required by RDC 658:
    - Workflow enforcement: steps must be executed in the defined sequence
    - Material verification: barcode/RFID verification of materials before use
    - In-process control integration: automated capture of process parameters
    - Exception handling: documented deviation workflow when parameters
      exceed limits
    - Electronic review and approval: second-person verification with
      electronic signatures
    - Correction management: original value preserved, amendment tracked
      with full audit trail

    The eBR system must be validated according to GAMP 5 guidelines and
    the IN ANVISA 134 computerized system validation requirements. Data
    generated by the eBR system must comply with ALCOA+ principles.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Deploy eBR platform (MES — Manufacturing Execution System) with
         workflow engine enforcing manufacturing step sequencing, material
         verification, and in-process control capture.
      2. Integrate eBR system with ERP (for batch orders), LIMS (for
         in-process and release testing), SCADA/DCS (for process parameters),
         and weighing/dispensing systems for automated data capture.
      3. Implement electronic signature infrastructure supporting 21 CFR
         Part 11 and Annex 11 requirements for eBR approval workflows,
         including dual-signature for critical operations.
      4. Configure database-level protection preventing direct data
         manipulation outside the eBR application, with all corrections
         routed through the amendment workflow preserving original values.
    tools:
      - mes-platform
      - erp-integration
      - lims-integration
      - electronic-signature
      - database-protection
  devsecops:
    prose: |
      1. Validate eBR workflow enforcement through automated testing:
         verify that steps cannot be skipped, executed out of order, or
         duplicated without authorized deviation.
      2. Test eBR correction management: verify original value
         preservation, amendment audit trail completeness, and mandatory
         justification fields for all corrections.
      3. Implement integration tests verifying data flow between eBR
         and connected systems (ERP, LIMS, SCADA) for accuracy and
         completeness of transferred records.
      4. Include eBR functional validation in the continuous integration
         pipeline for every system release or configuration change.
    tools:
      - gitlab-ci
      - mes-validation-suite
      - integration-testing
      - workflow-testing
  secops:
    prose: |
      1. Establish eBR governance procedures covering system access,
         workflow configuration, deviation management, and periodic
         review of manufacturing records.
      2. Conduct periodic eBR audit trail reviews (per batch or
         periodic sampling) verifying compliance with workflow rules,
         correction procedures, and electronic signature requirements.
      3. Monitor eBR system for anomalies: excessive corrections,
         workflow deviations, unauthorized configuration changes, and
         unusual access patterns outside production schedules.
      4. Include eBR system in the annual computerized system validation
         review and periodic requalification program.
    tools:
      - grc-platform
      - mes-audit-tool
      - quality-management-system
      - anomaly-detection
legal_references:
  - framework_id: anvisa-134
    articles: ["art-12", "art-23"]
    relationship: complements
  - framework_id: iso-27001-2022
    articles: ["controle-A-8-11"]
    relationship: mapped
