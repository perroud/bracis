id: bpf-8
family: sistemas
title: "Supplier Qualification for Computerized Systems"
class: ANVISA-BPF
baselines: [fabricantes-medicamentos]
statement:
  prose: |
    Fornecedores de sistemas computadorizados, serviços de TI, hospedagem
    de dados e infraestrutura em nuvem utilizados em atividades de BPF
    devem ser qualificados e avaliados periodicamente quanto à capacidade
    de atender aos requisitos de Boas Práticas de Fabricação e integridade
    de dados.

    A qualificação de fornecedores deve incluir: avaliação de competência
    técnica, sistema de qualidade, procedimentos de desenvolvimento e
    manutenção de software, capacidade de suporte, gestão de segurança
    da informação, conformidade regulatória, e auditorias presenciais
    ou remotas quando aplicável.

    Acordos de qualidade (Quality Agreements) e acordos de nível de serviço
    (SLAs) devem ser estabelecidos e mantidos com todos os fornecedores de
    sistemas e serviços de TI críticos, definindo responsabilidades sobre
    integridade de dados, segurança, continuidade, notificação de incidentes
    e direito de auditoria.
guidance:
  prose: |
    Supplier qualification for GMP computerized systems extends traditional
    vendor management with pharmaceutical-specific requirements. Cloud
    service providers, SaaS vendors, and managed service providers must
    demonstrate GMP awareness and data integrity capability.

    Qualification assessment areas:
    - Quality management system (ISO 9001, SOC 2, or equivalent)
    - Software development lifecycle (GAMP 5 alignment, change control)
    - Information security management (ISO 27001, SOC 2 Type II)
    - Data center qualification (for hosted/cloud systems)
    - Business continuity and disaster recovery capabilities
    - Regulatory inspection history and audit findings
    - Data sovereignty and cross-border transfer controls

    Quality Agreements must address:
    - Data ownership, portability, and return upon contract termination
    - Audit rights (including regulatory inspector access)
    - Change notification requirements
    - Incident and breach notification timelines
    - Data integrity controls and responsibilities
    - Backup, archival, and retention obligations
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement vendor security assessment automation evaluating
         cloud providers and SaaS vendors against GMP requirements:
         SOC 2 reports, ISO 27001 certification, data residency
         controls, and encryption standards.
      2. Deploy supply chain security controls for software dependencies:
         dependency scanning, software bill of materials (SBOM), and
         license compliance verification for all GMP system components.
      3. Configure network segmentation and access controls between
         vendor-managed services and internal GMP systems, with
         monitoring of all data flows to external parties.
      4. Implement automated vendor compliance monitoring tracking
         certification expiry, SLA performance, and security posture
         changes.
    tools:
      - vendor-assessment
      - sbom-tools
      - dependency-scanning
      - network-segmentation
      - compliance-monitoring
  devsecops:
    prose: |
      1. Integrate dependency scanning in CI pipelines to detect
         vulnerable or non-compliant third-party components in GMP
         systems before deployment.
      2. Implement software composition analysis (SCA) generating
         SBOM for all GMP applications, tracking component provenance
         and license compliance.
      3. Automate vendor API and integration testing verifying that
         third-party services meet contractual SLA and data integrity
         requirements.
      4. Enforce container image scanning and base image verification
         for all vendor-supplied container components.
    tools:
      - gitlab-ci
      - dependency-scanning
      - sca-tools
      - container-scanning
  secops:
    prose: |
      1. Maintain qualified vendor registry with current qualification
         status, audit dates, Quality Agreement status, and risk
         classification for each GMP system vendor.
      2. Conduct periodic vendor audits (frequency based on risk
         classification) evaluating quality system, data integrity
         practices, security controls, and change management.
      3. Monitor vendor SLA compliance and incident notifications,
         escalating non-conformances through the quality system.
      4. Review and update Quality Agreements annually or when
         significant changes occur in vendor services, regulations,
         or risk assessment.
    tools:
      - vendor-management
      - audit-management
      - grc-platform
      - quality-management-system
