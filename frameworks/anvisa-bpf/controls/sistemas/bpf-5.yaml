id: bpf-5
family: sistemas
title: "Computerized System Validation Lifecycle"
class: ANVISA-BPF
baselines: [fabricantes-medicamentos]
statement:
  prose: |
    Todos os sistemas computadorizados utilizados nas atividades de Boas
    Práticas de Fabricação devem ser validados conforme abordagem de ciclo
    de vida, desde a definição de requisitos até a desativação, de acordo
    com metodologia baseada em risco (GAMP 5 ou equivalente).

    O plano de validação deve incluir: definição do escopo e classificação
    do sistema, avaliação de risco, especificações de requisitos do usuário
    (URS), especificações funcionais (FS), especificações de design (DS),
    qualificação de instalação (IQ), qualificação de operação (OQ),
    qualificação de desempenho (PQ), e critérios de aceitação para cada fase.

    A validação deve ser documentada em relatório final que evidencie a
    conformidade do sistema com os requisitos regulatórios e com os
    princípios de integridade de dados. Sistemas não validados não devem
    ser utilizados em operações GMP.
guidance:
  prose: |
    Computerized system validation (CSV) follows the V-model lifecycle
    approach where each specification phase has a corresponding testing
    phase. RDC 658 requires a risk-based approach aligned with ISPE GAMP 5
    (Good Automated Manufacturing Practice).

    System categories per GAMP 5:
    - Category 1: Infrastructure software (OS, database) — configuration
      and operational qualification
    - Category 3: Non-configured products (COTS) — configuration testing
      and operational qualification
    - Category 4: Configured products — configuration and functional testing
    - Category 5: Custom applications — full validation lifecycle

    Validation deliverables required:
    - Validation Master Plan (VMP) or system-specific Validation Plan
    - User Requirements Specification (URS)
    - Risk Assessment (FMEA or equivalent)
    - Installation Qualification (IQ) protocol and report
    - Operational Qualification (OQ) protocol and report
    - Performance Qualification (PQ) protocol and report
    - Validation Summary Report
    - Traceability matrix linking requirements to test cases
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement Infrastructure-as-Code (IaC) for all GMP system
         deployments, providing documented and reproducible installation
         qualification evidence through version-controlled infrastructure
         definitions.
      2. Deploy automated environment provisioning with configuration
         validation that serves as continuous Installation Qualification,
         verifying that all components are installed per specifications.
      3. Implement automated integration and system testing frameworks
         that provide continuous Operational Qualification evidence for
         configured and custom systems.
      4. Configure environment parity controls ensuring that validation
         performed in qualification environments is representative of
         production configurations.
    tools:
      - terraform
      - ansible
      - gitlab-ci
      - infrastructure-testing
      - environment-management
  devsecops:
    prose: |
      1. Implement continuous validation pipeline: automated test suites
         executing IQ/OQ/PQ test cases on every build, providing ongoing
         evidence of validated state.
      2. Maintain requirements traceability matrix as code, automatically
         linking URS items to test cases and generating traceability
         reports for validation documentation.
      3. Implement automated regression testing to detect validation
         state changes after system updates, patches, or configuration
         modifications.
      4. Generate validation evidence artifacts (test results, logs,
         screenshots) automatically from CI/CD pipeline execution for
         inclusion in validation documentation packages.
    tools:
      - gitlab-ci
      - test-management
      - traceability-tools
      - validation-documentation
  secops:
    prose: |
      1. Maintain a computerized system inventory classifying all GMP
         systems by GAMP category, validation status, criticality, and
         next revalidation date.
      2. Establish validation governance procedures: roles and
         responsibilities, validation SOP, change control integration,
         and periodic review requirements.
      3. Conduct periodic revalidation assessments (minimum annually)
         evaluating whether the validated state is maintained considering
         changes, incidents, and regulatory updates.
      4. Audit validation documentation packages for completeness and
         regulatory compliance, ensuring traceability from requirements
         through testing to validation conclusion.
    tools:
      - grc-platform
      - system-inventory
      - validation-tracking
      - quality-management-system
