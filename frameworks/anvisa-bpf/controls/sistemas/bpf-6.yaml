id: bpf-6
family: sistemas
title: "Risk-Based System Classification"
class: ANVISA-BPF
baselines: [fabricantes-medicamentos]
statement:
  prose: |
    Todos os sistemas computadorizados utilizados em atividades de BPF devem
    ser classificados conforme avaliação de risco documentada, considerando
    o impacto do sistema na qualidade do produto, segurança do paciente e
    integridade dos dados.

    A avaliação de risco deve utilizar metodologia reconhecida (FMEA, HACCP,
    ou equivalente) e deve considerar: a criticidade dos dados gerados pelo
    sistema, a complexidade do sistema, a configurabilidade, a integração
    com outros sistemas, e o impacto potencial de falhas na qualidade do
    medicamento.

    A classificação de risco deve determinar a extensão e a profundidade
    da validação, os controles de integridade de dados aplicáveis, a
    frequência de revisão periódica e os requisitos de continuidade
    operacional para cada sistema.
guidance:
  prose: |
    Risk-based classification drives the validation effort and ongoing
    control requirements for each computerized system. Higher-risk systems
    require more extensive validation and more stringent data integrity
    controls.

    Typical GMP system risk classification:
    - High risk (GxP-critical): systems directly impacting product quality
      or patient safety (MES, LIMS, chromatography data systems, process
      control systems, ERP lot management)
    - Medium risk: systems indirectly impacting product quality (document
      management, training management, environmental monitoring)
    - Low risk: systems with no GxP impact (general office tools, non-GMP
      reporting)

    Risk assessment must be documented and reviewed when:
    - A new system is introduced
    - Significant changes are made to an existing system
    - A data integrity incident occurs
    - Regulatory requirements change
    - During periodic review (minimum annually)
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement system classification registry as infrastructure code,
         tagging all GMP systems with risk level, GAMP category,
         validation status, and data criticality classification.
      2. Configure differentiated infrastructure controls based on risk
         classification: high-risk systems receive redundant infrastructure,
         enhanced monitoring, stricter change control, and more frequent
         backup schedules.
      3. Implement automated compliance checks validating that
         infrastructure configurations match the requirements defined
         for each risk classification level.
      4. Deploy risk-based monitoring tiers: critical systems receive
         real-time monitoring with immediate alerting; medium-risk systems
         receive standard monitoring; low-risk systems receive basic
         health checks.
    tools:
      - cmdb
      - infrastructure-monitoring
      - compliance-automation
      - risk-classification-registry
  devsecops:
    prose: |
      1. Implement risk-based testing strategies in CI/CD pipelines:
         high-risk systems require full regression suites; medium-risk
         systems require functional testing; low-risk systems require
         smoke testing.
      2. Enforce risk-appropriate code review requirements: high-risk
         system changes require dual review with quality assurance
         approval; medium-risk changes require peer review.
      3. Automate risk assessment documentation generation from system
         metadata and change history to maintain current risk profiles.
      4. Tag all code repositories and deployment artifacts with the
         system risk classification for automated policy enforcement.
    tools:
      - gitlab-ci
      - risk-assessment-tools
      - code-review-enforcement
      - compliance-tagging
  secops:
    prose: |
      1. Maintain and periodically review the computerized system risk
         assessment inventory, updating classifications when systems
         change, incidents occur, or regulatory requirements evolve.
      2. Conduct risk assessment workshops for new systems and
         significant changes, involving quality assurance, IT, and
         business process owners.
      3. Monitor risk indicators for classified systems: incident
         frequency, change volume, data integrity findings, and
         audit observations as inputs to risk reassessment.
      4. Report risk classification status to quality management
         review, including systems requiring reclassification and
         overdue periodic reviews.
    tools:
      - grc-platform
      - risk-management
      - quality-management-system
      - reporting-dashboard
