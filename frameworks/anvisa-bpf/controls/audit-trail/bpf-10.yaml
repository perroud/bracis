id: bpf-10
family: audit-trail
title: "Audit Trail Review Procedures"
class: ANVISA-BPF
baselines: [fabricantes-medicamentos]
statement:
  prose: |
    A revisão da trilha de auditoria deve ser parte obrigatória do processo
    de aprovação de registros de produção, incluindo registros de lote,
    resultados analíticos, registros de controle em processo e registros
    de desvios e mudanças.

    O procedimento de revisão de trilha de auditoria deve definir: quem é
    responsável pela revisão, a frequência de revisão (por lote, diária,
    semanal ou periódica conforme avaliação de risco), quais eventos devem
    ser revisados em detalhe, os critérios para identificação de anomalias,
    e as ações a serem tomadas quando anomalias são identificadas.

    A revisão deve ser documentada e o revisor deve registrar formalmente
    que a trilha de auditoria foi revisada, que nenhuma irregularidade
    foi encontrada (ou que irregularidades identificadas foram investigadas
    e documentadas como desvios).
guidance:
  prose: |
    Audit trail review is a critical GMP activity that transforms the
    audit trail from a passive record into an active data integrity
    verification tool. Without regular review, audit trails provide
    evidence only after the fact during investigations or inspections.

    Risk-based audit trail review strategy:
    - Per-batch review: all audit trail entries for batch records,
      analytical results for batch release, and critical process
      parameters
    - Periodic review: user access changes, system configuration
      changes, failed login attempts, and data deletions
    - Event-triggered review: following data integrity incidents,
      regulatory inspection findings, or system anomalies

    Key anomalies to identify during review:
    - Multiple corrections to the same data field
    - Corrections made long after the original entry
    - Data entries outside normal working hours
    - Entries by users who should not have access
    - Deletions or backdating of records
    - System clock adjustments
    - Repeated failed login attempts
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement audit trail review dashboards presenting filtered
         and prioritized audit events for reviewer attention, highlighting
         anomalies and patterns requiring investigation.
      2. Deploy automated anomaly detection on audit trail data using
         rule-based and statistical analysis to flag unusual patterns:
         off-hours entries, excessive corrections, unusual user activity.
      3. Configure automated audit trail extraction and formatting for
         batch record review, linking audit events to specific batch
         records and manufacturing steps for contextual review.
      4. Implement review workflow tracking with electronic signature
         for the reviewer to document completion and findings of each
         audit trail review.
    tools:
      - audit-dashboard
      - anomaly-detection
      - batch-review-tools
      - review-workflow
  devsecops:
    prose: |
      1. Build automated audit trail analysis tools generating summary
         reports for reviewer use: change frequency by record type,
         user activity patterns, exception events, and trend analysis.
      2. Implement automated pre-screening of audit trails flagging
         entries requiring human review based on configurable risk rules
         (corrections, deletions, off-hours activity).
      3. Test audit trail review tools for accuracy: verify that all
         anomalies are correctly identified and no events are missed
         by the automated screening.
      4. Create automated evidence packages combining audit trail
         extracts with review documentation for batch release records.
    tools:
      - gitlab-ci
      - audit-analytics
      - anomaly-screening
      - evidence-packaging
  secops:
    prose: |
      1. Establish audit trail review SOP defining review frequency,
         scope, responsibilities, anomaly criteria, and escalation
         procedures for each system category and data type.
      2. Train audit trail reviewers on anomaly identification,
         investigation procedures, and documentation requirements.
      3. Track audit trail review metrics: review completion timeliness,
         anomalies identified, investigations triggered, and CAPA
         effectiveness.
      4. Include audit trail review program effectiveness in the
         annual quality management review and data integrity
         assessment.
    tools:
      - grc-platform
      - training-management
      - quality-management-system
      - metrics-dashboard
