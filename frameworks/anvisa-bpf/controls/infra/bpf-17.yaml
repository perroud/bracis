id: bpf-17
family: infra
title: "IT Infrastructure Qualification for GMP Systems"
class: ANVISA-BPF
baselines: [fabricantes-medicamentos]
statement:
  prose: |
    A infraestrutura de tecnologia da informação que suporta sistemas
    computadorizados de BPF deve ser qualificada e mantida em estado
    qualificado, incluindo servidores, redes, dispositivos de armazenamento,
    sistemas operacionais, bancos de dados, e componentes de virtualização
    ou nuvem.

    A qualificação da infraestrutura deve abranger: qualificação de
    instalação (IQ) verificando que todos os componentes estão instalados
    conforme especificações, qualificação de operação (OQ) verificando
    que a infraestrutura opera corretamente sob condições normais e de
    estresse, e qualificação de desempenho (PQ) verificando que a
    infraestrutura suporta a carga de trabalho real com desempenho
    aceitável.

    A infraestrutura deve ser monitorada continuamente quanto à
    disponibilidade, desempenho, capacidade e segurança, com alertas
    automáticos para condições que possam afetar a integridade dos
    dados ou a continuidade das operações de fabricação.
guidance:
  prose: |
    IT infrastructure qualification ensures that the foundation upon which
    GMP computerized systems operate is reliable, secure, and performant.
    An unqualified infrastructure undermines the validation of all
    applications running on it.

    Infrastructure components requiring qualification:
    - Servers (physical or virtual): hardware, OS, configuration
    - Network: switches, routers, firewalls, segmentation
    - Storage: SAN, NAS, cloud storage, backup media
    - Databases: installation, configuration, performance
    - Virtualization: hypervisor, resource allocation, isolation
    - Cloud services: IaaS/PaaS configuration, security, compliance
    - Time services: NTP servers, synchronization accuracy

    Qualification approach:
    - Design Qualification (DQ): infrastructure architecture review
    - Installation Qualification (IQ): component installation verification
    - Operational Qualification (OQ): functionality and stress testing
    - Performance Qualification (PQ): real-world load testing
    - Periodic requalification: annual review or after major changes

    Environmental controls:
    - Data center temperature and humidity monitoring
    - UPS and power redundancy
    - Fire suppression systems
    - Physical access control to server rooms
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement Infrastructure-as-Code (IaC) for all GMP
         infrastructure, providing version-controlled, auditable, and
         reproducible deployment definitions that serve as living
         qualification documentation.
      2. Deploy comprehensive infrastructure monitoring covering
         availability, performance, capacity, and security metrics
         with automated alerting for threshold violations and anomalies.
      3. Configure automated infrastructure compliance scanning
         verifying that server configurations, network policies,
         and storage settings match qualified baseline specifications.
      4. Implement infrastructure capacity planning with trend analysis
         and proactive scaling to prevent performance degradation
         affecting GMP system operations.
    tools:
      - terraform
      - ansible
      - prometheus
      - grafana
      - infrastructure-compliance
  devsecops:
    prose: |
      1. Implement infrastructure testing in CI/CD pipelines:
         automated verification of server configurations, network
         policies, and security hardening against qualified baselines.
      2. Deploy automated infrastructure qualification evidence
         generation: IQ/OQ scripts that validate component installation
         and operational parameters with documented results.
      3. Implement infrastructure drift detection comparing current
         state against qualified configuration baseline with automated
         alerting and remediation workflows.
      4. Test disaster recovery and failover mechanisms as part of
         the CI/CD pipeline to continuously verify infrastructure
         resilience.
    tools:
      - gitlab-ci
      - infrastructure-testing
      - drift-detection
      - disaster-recovery-testing
  secops:
    prose: |
      1. Maintain infrastructure qualification documentation including
         architecture diagrams, component specifications, qualification
         protocols and reports, and configuration baselines.
      2. Conduct periodic infrastructure requalification assessments
         (minimum annually) evaluating changes, incidents, capacity,
         and security posture since last qualification.
      3. Monitor infrastructure security: vulnerability scanning,
         patch management, configuration compliance, and access
         control for infrastructure components.
      4. Include infrastructure qualification status in the GMP
         system inventory and quality management review reporting.
    tools:
      - cmdb
      - vulnerability-management
      - patch-management
      - grc-platform
