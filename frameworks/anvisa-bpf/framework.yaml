control_families:
  - id: integridade
    title: "Data Integrity — ALCOA+ Principles"
    description: >-
      Requirements for data integrity based on ALCOA+ principles (Attributable, Legible,
      Contemporaneous, Original, Accurate, Complete, Consistent, Enduring, Available)
      applied to pharmaceutical manufacturing records.
    articles: "Título IV, Capítulo I"
    control_count: 4
  - id: sistemas
    title: "Computerized System Validation"
    description: "Requirements for validation and qualification of computerized systems used in GMP pharmaceutical manufacturing, including lifecycle approach and risk-based validation."
    articles: "Título IV, Capítulo II"
    control_count: 4
  - id: audit-trail
    title: "Audit Trail"
    description: "Requirements for audit trail implementation, review, retention, and protection in electronic records and computerized systems used in manufacturing."
    articles: "Título IV, Capítulo III"
    control_count: 4
  - id: acesso
    title: "Access Control and User Management"
    description: "Requirements for user authentication, role-based access control, electronic signatures, and privilege management for GMP computerized systems."
    articles: "Título IV, Capítulo IV"
    control_count: 4
  - id: infra
    title: "Infrastructure, Backup, and Recovery"
    description: "Requirements for IT infrastructure qualification, data backup and recovery, business continuity, and change management for computerized systems."
    articles: "Título IV, Capítulo V"
    control_count: 4
related_frameworks:
  - framework_id: anvisa-134
    relationship: complements
    description: >-
      IN ANVISA 134/2022 complements RDC 658 by providing detailed technical requirements
      for computerized system validation, while RDC 658 establishes the overarching GMP
      data integrity framework that IN 134 operationalizes.
  - framework_id: lgpd
    relationship: complements
    description: >-
      The LGPD complements RDC 658 by imposing additional data protection requirements
      for personal data of patients and clinical trial participants processed within
      GMP manufacturing systems.
  - framework_id: iso-27001-2022
    relationship: mapped
    description: >-
      ISO 27001:2022 maps to RDC 658 on access control, audit logging, change management,
      backup and recovery, and information integrity controls applicable to pharmaceutical
      manufacturing environments.
  - framework_id: hipaa
    relationship: mapped
    description: >-
      HIPAA maps to RDC 658 on electronic record integrity, audit trails, access controls,
      and data backup requirements relevant to pharmaceutical manufacturing data that
      intersects with health information.
