baselines:
  - id: ial1
    title: "Identity Assurance Level 1"
    description: >-
      IAL1 allows the use of either online or in-person identity verification.
      Self-asserted attributes are accepted without validation. No identity
      proofing is required. There is no requirement to link the applicant to a
      specific real-life identity. Any attributes provided are self-asserted or
      should be treated as self-asserted.
    source: "NIST SP 800-63A Section 4.1"
  - id: ial2
    title: "Identity Assurance Level 2"
    description: >-
      IAL2 introduces the concept of remote identity proofing. Attributes must
      be verified by an identity proofing process that provides evidence of a
      real-world identity at a specified strength. IAL2 allows for either
      remote or in-person identity verification and provides high confidence
      that the applicant is who they claim to be.
    source: "NIST SP 800-63A Section 4.2"
    inherits_from: [ial1]
  - id: ial3
    title: "Identity Assurance Level 3"
    description: >-
      IAL3 requires in-person or supervised-remote identity proofing. Physical
      presence is required for identity verification. Identifying attributes
      must be verified by an authorized CSP representative. Biometric collection
      is required. This level provides the highest confidence that the applicant
      is who they claim to be.
    source: "NIST SP 800-63A Section 4.3"
    inherits_from: [ial2]
  - id: aal1
    title: "Authentication Assurance Level 1"
    description: >-
      AAL1 provides some assurance that the claimant controls an authenticator
      bound to the subscriber's account. AAL1 requires single-factor
      authentication using a wide range of available authentication technologies.
      Successful authentication requires that the claimant prove possession and
      control of the authenticator(s) through a secure authentication protocol.
    source: "NIST SP 800-63B Section 4.1"
  - id: aal2
    title: "Authentication Assurance Level 2"
    description: >-
      AAL2 provides high confidence that the claimant controls one or more
      authenticators bound to the subscriber's account. Proof of possession
      and control of two distinct authentication factors is required through
      secure authentication protocols. Approved cryptographic techniques are
      required at AAL2. AAL2 is the most commonly required level for federal
      agency systems.
    source: "NIST SP 800-63B Section 4.2"
    inherits_from: [aal1]
  - id: aal3
    title: "Authentication Assurance Level 3"
    description: >-
      AAL3 provides very high confidence that the claimant controls the
      authenticator(s) bound to the subscriber's account. Authentication at
      AAL3 is based on proof of possession of a key through a cryptographic
      protocol. AAL3 authentication SHALL use a hardware-based authenticator
      and an authenticator that provides verifier impersonation resistance.
    source: "NIST SP 800-63B Section 4.3"
    inherits_from: [aal2]
  - id: fal1
    title: "Federation Assurance Level 1"
    description: >-
      FAL1 allows the RP to receive a bearer assertion from an IdP. The assertion
      is signed by the IdP using an asymmetric key. The RP validates the assertion
      signature and the assertion content. FAL1 is the minimum level for federated
      identity transactions.
    source: "NIST SP 800-63C Section 4.1"
  - id: fal2
    title: "Federation Assurance Level 2"
    description: >-
      FAL2 adds the requirement that the assertion be encrypted to the RP using
      a key managed by the RP. This protects the assertion content from
      interception by parties other than the intended RP.
    source: "NIST SP 800-63C Section 4.2"
    inherits_from: [fal1]
  - id: fal3
    title: "Federation Assurance Level 3"
    description: >-
      FAL3 requires the subscriber to present proof of possession of a
      cryptographic key referenced in the assertion in addition to the assertion
      artifact itself. FAL3 provides the highest assurance level in federated
      identity transactions.
    source: "NIST SP 800-63C Section 4.3"
    inherits_from: [fal2]

control_families:
  - id: identity-assurance
    title: "Identity Assurance Levels (IAL)"
    description: "Controls covering enrollment, identity proofing, and identity assurance levels defined in NIST SP 800-63A."
    control_count: 5
  - id: authentication
    title: "Authentication Assurance Levels (AAL)"
    description: "Controls covering authenticator types, authentication protocols, and assurance levels defined in NIST SP 800-63B."
    control_count: 8
  - id: federation
    title: "Federation Assurance Levels (FAL)"
    description: "Controls covering federated identity, assertions, and assurance levels defined in NIST SP 800-63C."
    control_count: 5
  - id: privacy
    title: "Privacy Requirements"
    description: "Controls covering privacy obligations during identity proofing and throughout the digital identity lifecycle."
    control_count: 2

key_documents:
  - id: sp-800-63
    title: "NIST SP 800-63-3: Digital Identity Guidelines"
    description: >-
      The parent document providing an overview of digital identity and establishing
      the overall framework. Defines the three assurance levels (IAL, AAL, FAL)
      and how they combine into an xAL model. Addresses federation, risk assessment,
      and selection of appropriate assurance levels.
    url: "https://doi.org/10.6028/NIST.SP.800-63-3"
  - id: sp-800-63a
    title: "NIST SP 800-63A: Enrollment and Identity Proofing"
    description: >-
      Addresses how applicants can prove their identities and become enrolled as
      valid subscribers within an identity system. Covers identity proofing requirements
      for IAL1, IAL2, and IAL3, including document verification, biometric collection,
      and address confirmation.
    url: "https://doi.org/10.6028/NIST.SP.800-63a"
  - id: sp-800-63b
    title: "NIST SP 800-63B: Authentication and Lifecycle Management"
    description: >-
      Provides guidance on the selection, use, and management of authenticators.
      Covers authenticator types (memorized secrets, look-up secrets, out-of-band,
      single-factor OTP, multi-factor OTP, single-factor crypto, multi-factor crypto),
      authenticator lifecycle, and authentication assurance levels AAL1, AAL2, AAL3.
    url: "https://doi.org/10.6028/NIST.SP.800-63b"
  - id: sp-800-63c
    title: "NIST SP 800-63C: Federation and Assertions"
    description: >-
      Provides guidance on the use of federated identity architectures and assertions
      to convey identity information across systems. Covers OpenID Connect, SAML,
      and other federation protocols. Defines federation assurance levels FAL1, FAL2, FAL3.
    url: "https://doi.org/10.6028/NIST.SP.800-63c"

