id: nist-63-memorized-secrets
family: authentication
title: "Memorized Secret Requirements — Password Rules"
class: SP800-63B

baselines: [aal1, aal2, aal3]

statement:
  prose: >-
    Memorized secrets SHALL be at least 8 characters in length if chosen by
    the subscriber. Memorized secrets chosen randomly by the CSP or verifier
    SHALL be at least 6 characters in length. Memorized secrets SHALL be
    compared against a list that contains values known to be commonly used,
    expected, or compromised — including known breached passwords. If the chosen
    secret is found on the list, the CSP or verifier SHALL advise the subscriber
    that they need to select a different secret, provide the reason why, and allow
    the subscriber to choose a different secret. Verifiers SHALL NOT impose
    other composition rules (e.g., mixtures of different character types or
    prohibiting consecutively repeated characters) on memorized secrets. Verifiers
    SHALL NOT require memorized secrets to be changed arbitrarily (i.e., periodically).
    However, verifiers SHALL force a change if there is evidence of compromise.
    Verifiers SHALL allow the use of password managers by permitting all printing
    ASCII characters (including space) and Unicode characters in memorized secrets.
    Verifiers SHALL implement rate limiting or equivalent controls to prevent
    automated attacks.

guidance:
  prose: >-
    The 800-63B requirements for memorized secrets represent a significant departure
    from legacy password policies. The key findings from NIST's research: forced
    periodic rotation encourages predictable patterns (Summer2024! → Fall2024!),
    complexity rules encourage minimal compliance (P@ssw0rd), and length is the
    most effective protection. The mandatory controls are: minimum 8 characters,
    comparison against a breached password list (at minimum the HIBP database or
    an equivalent), no periodic rotation mandate, allow password managers (no
    restrictions on pasting), and rate limiting on failed attempts. Organizations
    must implement a breached credential check at the time of password creation
    and periodically against the stored credential (using k-anonymity queries to
    HIBP or a local breach database). The recommended maximum length is at least
    64 characters to accommodate passphrases. Hashing must use an approved
    algorithm: bcrypt, scrypt, PBKDF2, or Argon2 with appropriate work factors.
    MD5, SHA-1, and unsalted SHA-256 are explicitly prohibited.

references:
  - citation: "NIST SP 800-63B Section 5.1.1 — Memorized Secrets"
    url: "https://doi.org/10.6028/NIST.SP.800-63b"
  - citation: "NIST SP 800-63B Section 5.1.1.2 — Memorized Secret Verifiers"
    url: "https://doi.org/10.6028/NIST.SP.800-63b"
  - citation: "Have I Been Pwned API — k-Anonymity Model"
    url: "https://haveibeenpwned.com/API/v3#PwnedPasswords"
  - citation: "OWASP Password Storage Cheat Sheet"
    url: "https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html"

related_controls:
  - id: nist-63-aal1
    relationship: supports
    description: "Memorized secrets are the primary AAL1 authenticator type."
  - id: nist-63-aal2
    relationship: complements
    description: "At AAL2, memorized secrets must be combined with a second factor."
  - id: nist-63-lookup-secrets
    relationship: complements
    description: "Look-up secrets (recovery codes) are used as an alternative to memorized secrets for account recovery."
  - id: nist-63-reauthentication
    relationship: complements
    description: "Memorized secrets may be required for reauthentication challenges."

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement password hashing using Argon2id with a minimum memory cost of
      19 MiB, an iteration count of 2, and a parallelism factor of 1 (per OWASP
      recommendations). If Argon2id is not available, use bcrypt with a work
      factor of 10 or higher. Implement the breached password check using the
      HaveIBeenPwned (HIBP) Pwned Passwords API v3 with the k-anonymity model
      (SHA-1 prefix query) to avoid sending plaintext passwords to the API.
      Enforce a minimum password length of 8 characters and a maximum of at
      least 64 characters. Remove all composition rules: no requirements for
      uppercase, lowercase, digits, or special characters. Remove periodic
      password expiration from the identity provider configuration. Implement
      rate limiting on the authentication endpoint: no more than 100 attempts
      per hour per account, with exponential backoff and account lockout after
      10 consecutive failures. Allow all printable Unicode characters in
      passwords, including emoji and non-Latin scripts.
    tools:
      - keycloak
      - okta
      - django-password-validators
      - zxcvbn
      - vault

  devsecops:
    prose: >-
      Include a static analysis check in CI/CD that detects use of prohibited
      password hashing algorithms (MD5, SHA-1, unsalted SHA-256) in source
      code. Validate that the authentication service implements the HIBP API
      check at password creation time. Build automated tests that verify the
      password policy: confirm passwords shorter than 8 characters are rejected,
      passwords longer than 64 characters are accepted, passwords on the
      breached list are rejected, and that composition rules are NOT enforced
      (a password that is purely lowercase letters should be accepted if it
      meets the length requirement). Scan dependencies for known vulnerable
      password hashing libraries.
    tools:
      - gitlab-ci
      - semgrep
      - bandit
      - open-policy-agent
      - trivy

  secops:
    prose: >-
      Monitor authentication events for credential stuffing attacks: high
      volume of failed password authentication from distributed IP addresses
      using valid account names. Implement adaptive rate limiting that
      increases restrictions on IP ranges showing attack patterns. Conduct
      periodic checks of the stored credential hashes against updated breach
      databases — when a user's password is found in a new breach dump, force
      a password change at next login. Alert on accounts with unusually old
      passwords (legacy accounts that were created before the 800-63B policy
      was implemented). Monitor for successful authentication using credentials
      that appear in threat intelligence breach feeds.
    tools:
      - splunk
      - crowdstrike
      - elastic-siem
      - hibp-api
