id: nist-63-lookup-secrets
family: authentication
title: "Look-Up Secrets and Recovery Codes"
class: SP800-63B

baselines: [aal1, aal2]

statement:
  prose: >-
    Look-up secrets are physical or electronic records that store a set of
    secrets shared between the claimant and the CSP. The claimant uses the
    secret retrieved from an appropriate position in the look-up secret to
    authenticate. Look-up secrets SHALL have at least 64 bits of entropy if
    chosen by the CSP randomly, or at least 112 bits if chosen randomly by
    the subscriber. If the look-up secret is stored as a hash, the CSP SHALL
    use an approved one-way hash function. Look-up secrets SHALL be distributed
    over a separate channel from the primary authenticator. The verifier SHALL
    store look-up secrets in a form that is resistant to offline attacks. Each
    look-up secret SHALL be used only once; the CSP SHALL invalidate the
    look-up secret once it has been used. A look-up secret that contains at
    least 20 bits of entropy is approved for use at AAL1. At AAL2, look-up
    secrets SHALL be used only as a component of multi-factor authentication.

guidance:
  prose: >-
    Look-up secrets are most commonly used as recovery codes — a list of one-time
    use codes generated when a user sets up MFA and stored securely by the user
    as a fallback when their primary authenticator is unavailable. They are also
    used in paper-based authentication systems (code cards). Recovery codes are
    not a substitute for primary MFA — they are an emergency access mechanism.
    CSPs must ensure recovery codes are: generated with cryptographically secure
    randomness (at least 64 bits of entropy), presented to the user only once at
    creation, stored hashed on the server (not plaintext), immediately invalidated
    after use, and distributed out-of-band from the primary authenticator setup.
    Best practice is to generate a set of 8-16 single-use codes, display them to
    the user at enrollment, and require the user to acknowledge they have saved them.
    Organizations must implement a recovery code regeneration flow that requires
    re-authentication before new codes are issued (to prevent an attacker from
    using a stolen session to replace recovery codes).

references:
  - citation: "NIST SP 800-63B Section 5.1.2 — Look-Up Secrets"
    url: "https://doi.org/10.6028/NIST.SP.800-63b"
  - citation: "NIST SP 800-63B Section 5.1.2.2 — Look-Up Secret Verifiers"
    url: "https://doi.org/10.6028/NIST.SP.800-63b"

related_controls:
  - id: nist-63-memorized-secrets
    relationship: complements
    description: "Look-up secrets are commonly used as a recovery mechanism when memorized secrets are forgotten."
  - id: nist-63-aal1
    relationship: supports
    description: "Look-up secrets satisfy AAL1 single-factor requirements."
  - id: nist-63-aal2
    relationship: complements
    description: "At AAL2, look-up secrets can be the second factor combined with a memorized secret."
  - id: nist-63-reauthentication
    relationship: complements
    description: "Recovery via look-up secrets should trigger reauthentication requirements."

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement recovery code generation using cryptographically secure random
      number generation (CSPRNG) producing codes with at least 64 bits of
      entropy — for example, 8 codes of 10 alphanumeric characters each.
      Store recovery codes using bcrypt or Argon2id hashing, not plaintext.
      Present recovery codes to the user in a single display at enrollment,
      formatted for easy copying or printing (grouped in sets of 5 characters
      with dashes). Require the user to confirm they have copied or downloaded
      the codes before the dialog is dismissed. Implement an API endpoint
      that invalidates a recovery code immediately upon successful use and
      logs the usage event. Provide a self-service recovery code regeneration
      flow that requires fresh MFA authentication (or FIDO2 hardware key at
      AAL3) before new codes are generated. Alert the user via email when
      recovery codes are viewed, used, or regenerated.
    tools:
      - keycloak
      - okta
      - vault
      - postgres

  devsecops:
    prose: >-
      Validate in CI/CD that recovery code storage uses an approved hashing
      algorithm and that plaintext codes are never logged or stored in
      application databases. Implement integration tests that verify: (1)
      a recovery code can only be used once, (2) used codes are marked as
      consumed, (3) regenerating codes invalidates the previous set, and
      (4) the regeneration flow requires fresh authentication. Include static
      analysis checks that detect logging of recovery code values. Build
      negative tests that confirm expired or used recovery codes are rejected
      with appropriate error messages.
    tools:
      - gitlab-ci
      - semgrep
      - bandit
      - playwright

  secops:
    prose: >-
      Monitor recovery code usage events: alert on multiple recovery code
      uses within a short time window, which may indicate an attacker is
      working through a stolen code list. Alert on recovery code regeneration
      from a new or unusual device or location. Monitor for patterns where
      a recovery code is used immediately after account registration, which
      may indicate the account was created with a compromised email address.
      Include recovery code events in the authentication audit log for forensic
      investigation of account takeover incidents. Conduct periodic audits to
      confirm unused recovery codes are stored only in hashed form.
    tools:
      - splunk
      - elastic-siem
      - pagerduty
