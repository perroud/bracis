control_families:
  - id: cap-1
    title: "Disposições Gerais"
    description: "Scope, definitions, principles, and directives governing data sharing among federal public administration bodies and entities."
    articles: "art. 1 ao art. 3"
    control_count: 3
  - id: cap-2
    title: "Categorias de Compartilhamento de Dados"
    description: "Classification of data sharing into broad dissemination, restricted execution, and specific categories, with corresponding access rules and procedural requirements."
    articles: "art. 4 ao art. 8"
    control_count: 5
  - id: cap-3
    title: "Procedimentos de Compartilhamento"
    description: "Operational procedures for requesting, granting, and managing data sharing, including Conecta Gov platform, interoperability, data protection, and consent mechanisms."
    articles: "art. 9 ao art. 14"
    control_count: 6
  - id: cap-4
    title: "Comitê Central de Governança de Dados"
    description: >-
      Establishment, composition, and competencies of the Central Data Governance
      Committee (CCGD), including its role in defining standards, resolving disputes,
      and overseeing data sharing practices.
    articles: "art. 15 ao art. 18"
    control_count: 4
  - id: cap-5
    title: "Disposições Finais e Transitórias"
    description: "Transition rules for existing data sharing agreements, technical standards publication, and revocation of prior decrees."
    articles: "art. 19 ao art. 21"
    control_count: 2
related_frameworks:
  - framework_id: lgpd
    relationship: complements
    description: "The LGPD establishes the legal basis for personal data protection that must be observed in all data sharing operations under Decreto 10.046/2019."
  - framework_id: gov-digital
    relationship: complements
    description: >-
      Lei 14.129/2021 (Governo Digital) complements by establishing the broader
      digital government framework, including open data and interoperability,
      within which data sharing governance operates.
  - framework_id: lai
    relationship: complements
    description: "Lei 12.527/2011 (LAI) complements by defining transparency and information access rules that interact with the data sharing categories established by this decree."
  - framework_id: pnsi
    relationship: complements
    description: "Decreto 9.637/2018 (PNSI) complements by establishing the national information security policy applicable to data shared between federal agencies."
  - framework_id: gsi-in1
    relationship: complements
    description: "IN GSI/PR 1/2020 complements by defining information security management requirements applicable to federal data sharing infrastructure."
  - framework_id: info-classificada
    relationship: complements
    description: "Decreto 7.845/2012 complements by governing classified information handling, which intersects with restricted data sharing categories."
