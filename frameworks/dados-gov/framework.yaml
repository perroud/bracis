id: dados-gov
title: "Decreto nº 10.046/2019 — Governance of Data Sharing within Federal Public Administration"
short_title: "Governança Dados Gov"
version: "10.046/2019"
publication_date: "2019-10-09"
last_updated: "2023-10-27"
effective_date: "2019-10-09"
authority:
  name: "Presidência da República"
