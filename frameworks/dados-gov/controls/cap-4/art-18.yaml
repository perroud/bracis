id: art-18
family: cap-4
title: "CCGD Operating Rules and Internal Procedures"
class: DADOS-GOV
baselines: [administracao-publica-federal]
statement:
  prose: |
    Art. 18. O Comitê Central de Governança de Dados elaborará seu regimento interno
    no prazo de sessenta dias, contado da data de publicação deste Decreto.

    § 1º. O regimento interno estabelecerá, no mínimo:
    I — a periodicidade das reuniões ordinárias;
    II — os procedimentos para convocação de reuniões extraordinárias;
    III — os procedimentos para a tomada de decisão;
    IV — os procedimentos para a submissão de propostas de compartilhamento de dados;
    V — os procedimentos para a resolução de controvérsias.
guidance:
  prose: |
    Article 18 mandates CCGD to produce its internal regulations (regimento interno)
    within 60 days of the decree's publication.

    **Minimum requirements for internal regulations:**
    1. Regular meeting frequency — how often CCGD convenes ordinarily
    2. Extraordinary meeting procedures — how to call special sessions
    3. Decision-making procedures — voting rules, quorum, tie-breaking
    4. Data sharing proposal submission — how agencies submit requests
    5. Dispute resolution procedures — how conflicts are handled

    **Operational maturity:**
    These internal regulations are the operational backbone of CCGD. Without
    them, the committee would have no structured way to fulfill its Article 16
    competencies.

    **Practical implication for agencies:**
    Agencies must understand and follow CCGD's regimento interno when
    submitting data sharing proposals or escalating disputes. The procedures
    defined here determine how quickly sharing arrangements can be approved.
implementation_guidance:
  platform_engineering:
    prose: |
      **CCGD operational platform:**
      1. Digital meeting management platform supporting scheduled (ordinary)
         and on-demand (extraordinary) CCGD sessions.
      2. Structured proposal submission system implementing CCGD-defined
         procedures (required fields, documentation, justification).
      3. Voting and decision recording system with audit trail.
      4. Dispute resolution case management with structured workflow
         per regimento interno procedures.
      5. Knowledge base of CCGD decisions and precedents searchable
         by topic, agency, and data type.
    tools:
      - collaboration-platform
      - workflow-engine
      - case-management
      - knowledge-base
  devsecops:
    prose: |
      **CCGD process automation:**
      1. Automated submission validation for data sharing proposals per
         regimento interno requirements.
      2. Decision implementation tracking in deployment pipelines.
      3. Notification automation for meeting schedules, decisions, and
         action items to affected agencies.
      4. Compliance verification that deployed changes align with CCGD
         decision records.
    tools:
      - gitlab-ci
      - workflow-engine
      - notification-service
      - compliance-scanner
  secops:
    prose: |
      **CCGD governance support:**
      1. Meeting documentation and minutes management per regimento interno.
      2. Decision implementation tracking and compliance monitoring.
      3. Dispute resolution documentation and evidence management.
      4. Annual review of regimento interno effectiveness with
         improvement recommendations.
    tools:
      - document-management
      - case-management
      - grc-platform
      - audit-tracking
legal_references:
