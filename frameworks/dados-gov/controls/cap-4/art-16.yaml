id: art-16
family: cap-4
title: "CCGD Competencies — Standards, Dispute Resolution, and Oversight"
class: DADOS-GOV
baselines: [administracao-publica-federal]
statement:
  prose: |
    Art. 16. Compete ao Comitê Central de Governança de Dados:
    I — deliberar sobre as propostas de compartilhamento de dados entre os órgãos e
    as entidades de que trata o art. 1º;
    II — estabelecer diretrizes e normas complementares para o compartilhamento de dados;
    III — apreciar reclamações e resolver controvérsias sobre o compartilhamento de dados;
    IV — propor atos normativos e ajustes necessários à política de compartilhamento de dados;
    V — aprovar o plano de trabalho anual e o relatório de atividades do Comitê;
    VI — promover o incremento do compartilhamento de dados entre os órgãos e as entidades
    de que trata o art. 1º.
guidance:
  prose: |
    Article 16 defines six competencies that make CCGD the central authority for
    data sharing governance:

    **1. Deliberation on sharing proposals (item I):**
    CCGD reviews and approves data sharing arrangements between agencies —
    this is the governance checkpoint for new sharing initiatives.

    **2. Supplementary standards (item II):**
    CCGD can issue binding supplementary directives and norms for data sharing,
    beyond what the decree itself specifies.

    **3. Dispute resolution (item III):**
    CCGD serves as the arbiter for data sharing disputes between agencies.
    This is critical because without a resolution mechanism, agencies could
    block sharing indefinitely.

    **4. Regulatory proposals (item IV):**
    CCGD can propose new regulations or amendments to improve data sharing policy.

    **5. Work plan and reporting (item V):**
    Annual work plan and activity report create structured accountability.

    **6. Sharing promotion (item VI):**
    CCGD has an affirmative mandate to INCREASE data sharing — this creates
    institutional pressure against data siloing.

    **Binding authority:**
    CCGD decisions are binding on all federal agencies within the decree's scope.
    Non-compliance can be escalated through CGU (member agency) for enforcement.
implementation_guidance:
  platform_engineering:
    prose: |
      **CCGD competency support systems:**
      1. Data sharing proposal management system with structured submission,
         review, and approval workflows.
      2. Standards publication platform for CCGD-issued directives and norms,
         accessible via API for automated compliance checking.
      3. Dispute resolution tracking system with case management, evidence
         submission, and decision recording.
      4. Annual reporting dashboard aggregating data sharing metrics, standards
         compliance, and dispute resolution outcomes.
      5. Data sharing growth tracker measuring the decree's objective of
         increasing inter-agency sharing.
    tools:
      - workflow-engine
      - document-management
      - case-management
      - monitoring-alerting
      - reporting-platform
  devsecops:
    prose: |
      **CCGD standards enforcement:**
      1. Automated ingestion of CCGD-published standards into CI/CD policy
         gates for data sharing infrastructure.
      2. Compliance drift detection — alert when systems deviate from
         current CCGD norms.
      3. Automated compliance reporting for CCGD annual activity report.
      4. Change impact assessment for CCGD regulatory proposals.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - compliance-scanner
      - reporting-platform
  secops:
    prose: |
      **CCGD operational governance:**
      1. Regular compliance reporting on agency adherence to CCGD directives.
      2. Dispute documentation and resolution tracking.
      3. Standards compliance audit per CCGD norms.
      4. Activity report preparation with evidence and metrics.
    tools:
      - grc-platform
      - case-management
      - reporting-platform
      - audit-tracking
