id: art-15
family: cap-4
title: "Establishment and Composition of the Central Data Governance Committee"
class: DADOS-GOV
baselines: [administracao-publica-federal]
statement:
  prose: |
    Art. 15. Fica instituído o Comitê Central de Governança de Dados, no âmbito da
    administração pública federal direta, autárquica e fundacional, com a seguinte
    composição:
    I — um representante da Casa Civil da Presidência da República;
    II — um representante da Controladoria-Geral da União;
    III — um representante do Instituto Nacional de Tecnologia da Informação — ITI;
    IV — um representante do Instituto Brasileiro de Geografia e Estatística — IBGE;
    V — um representante do Instituto Nacional do Seguro Social — INSS;
    VI — um representante da Secretaria Especial da Receita Federal do Brasil;
    VII — um representante da Secretaria de Governo Digital do Ministério da Economia,
    que o coordenará.

    § 1º. Os membros do Comitê Central de Governança de Dados serão indicados pelos
    titulares dos órgãos e das entidades de que tratam os incisos I a VII do caput e
    designados em ato do Secretário de Governo Digital do Ministério da Economia.
    § 2º. O Comitê Central de Governança de Dados poderá convidar representantes de
    outros órgãos e entidades para participar de suas reuniões.
guidance:
  prose: |
    Article 15 formally establishes the CCGD and defines its multi-agency composition.

    **Standing members (7 agencies):**
    1. Casa Civil (Presidency) — political coordination
    2. CGU (Comptroller General) — transparency and accountability
    3. ITI — digital certificates and PKI (ICP-Brasil)
    4. IBGE — statistics and data standards
    5. INSS — social security (major citizen data holder)
    6. Receita Federal — tax data (largest citizen database)
    7. SGD/Ministry of Economy — digital government (coordinator)

    **Coordination:**
    The Secretariat of Digital Government (SGD) coordinates the committee,
    reflecting its role as the government's digital transformation authority.

    **Flexibility mechanism:**
    The committee can invite representatives from other agencies as needed,
    allowing domain expertise to be incorporated without permanent membership.

    **Power structure:**
    The CCGD brings together agencies that collectively custody the most
    critical citizen data (tax, social security, civil identification,
    statistics), ensuring governance decisions reflect operational reality.
implementation_guidance:
  platform_engineering:
    prose: |
      **CCGD operational platform:**
      1. Deploy a collaboration platform for CCGD members with secure
         document sharing, meeting scheduling, and decision tracking.
      2. Implement a decision registry system recording all CCGD
         deliberations with voting records and implementation status.
      3. Dashboard aggregating data sharing metrics from all member
         agencies for CCGD oversight.
      4. Secure communication channels (encrypted messaging, video
         conferencing) for CCGD deliberations.
      5. Integration with each member agency's data catalog for
         cross-agency data landscape visibility.
    tools:
      - collaboration-platform
      - decision-tracking
      - monitoring-alerting
      - secure-communications
  devsecops:
    prose: |
      **CCGD decision implementation:**
      1. Encode CCGD decisions as policy-as-code rules deployable across
         member agency infrastructure.
      2. Automated compliance checking against CCGD-published standards.
      3. Change management workflow requiring CCGD decision reference
         for data sharing configuration changes.
      4. Decision implementation tracking in CI/CD pipelines.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - change-management
      - compliance-scanner
  secops:
    prose: |
      **CCGD governance operations:**
      1. Compliance reporting to CCGD on data sharing status across
         federal agencies.
      2. Incident escalation to CCGD for cross-agency data sharing issues.
      3. Decision implementation audit — verify CCGD decisions are being
         executed by member agencies.
      4. Annual governance effectiveness assessment.
    tools:
      - grc-platform
      - incident-management
      - reporting-platform
      - audit-tracking
