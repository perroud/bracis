id: art-17
family: cap-4
title: "Data Manager Role and Agency-Level Governance"
class: DADOS-GOV
baselines: [administracao-publica-federal]
statement:
  prose: |
    Art. 17. Cada órgão e entidade de que trata o art. 1º indicará um gestor de dados,
    responsável por:
    I — atuar como ponto focal do órgão ou da entidade perante o Comitê Central de
    Governança de Dados;
    II — aprovar o compartilhamento de dados sob a gestão do órgão ou da entidade,
    quando necessário;
    III — garantir a conformidade do compartilhamento de dados com as normas e as
    diretrizes estabelecidas pelo Comitê Central de Governança de Dados;
    IV — promover a melhoria contínua da qualidade dos dados sob a gestão do órgão
    ou da entidade.
guidance:
  prose: |
    Article 17 mandates that every federal agency appoint a data manager (gestor de dados)
    with four specific responsibilities:

    **1. CCGD liaison (item I):**
    The data manager is the single point of contact between the agency and CCGD.
    This creates clear accountability and communication channels.

    **2. Sharing authorization (item II):**
    The data manager has authority to approve data sharing arrangements involving
    the agency's data. This is the agency-level decision point.

    **3. Compliance assurance (item III):**
    The data manager must ensure all sharing conforms to CCGD norms and directives.
    They bear personal accountability for non-compliance.

    **4. Data quality improvement (item IV):**
    The data manager has an ongoing obligation to improve data quality — this is
    not a one-time setup but a continuous improvement mandate.

    **Organizational impact:**
    This article creates a new governance role in every federal agency. The data
    manager needs authority, resources, and organizational support to fulfill
    these responsibilities effectively.

    **Parallel to DPO:**
    The data manager role parallels the Data Protection Officer (DPO/encarregado)
    under LGPD Art. 41, but focused on data sharing governance rather than
    data protection. In practice, coordination between these roles is essential.
implementation_guidance:
  platform_engineering:
    prose: |
      **Data manager support tools:**
      1. Dashboard providing the data manager with visibility into all active
         data sharing operations, pending requests, and compliance status.
      2. Approval workflow system for data sharing requests with digital
         signature for the data manager's authorization.
      3. Data quality management platform with automated scoring, issue
         detection, and remediation tracking.
      4. CCGD communication portal for submitting proposals, receiving
         directives, and participating in dispute resolution.
      5. Automated reporting generating compliance reports for CCGD review.
    tools:
      - data-governance-platform
      - workflow-engine
      - data-quality
      - reporting-platform
  devsecops:
    prose: |
      **Data governance in development:**
      1. Data sharing configuration changes require data manager approval
         in the merge request workflow.
      2. Automated compliance checks against CCGD norms before deployment
         of data sharing infrastructure changes.
      3. Data quality metrics integrated into CI/CD dashboards.
      4. Governance documentation maintained as code alongside data sharing
         service configurations.
    tools:
      - gitlab-ci
      - approval-workflows
      - data-quality
      - documentation-as-code
  secops:
    prose: |
      **Data governance operations:**
      1. Regular briefings to data manager on data sharing security posture,
         incidents, and compliance status.
      2. Data quality monitoring with escalation to data manager for
         significant quality degradation.
      3. Compliance audit support for data manager's CCGD reporting obligations.
      4. Training and awareness programs for data manager and their teams.
    tools:
      - grc-platform
      - data-quality
      - monitoring-alerting
      - training-platform
