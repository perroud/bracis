id: art-14
family: cap-3
title: "Data Receiving Agency Obligations and Use Restrictions"
class: DADOS-GOV
baselines: [administracao-publica-federal]
statement:
  prose: |
    Art. 14. O órgão ou a entidade que receber dados compartilhados é responsável por:
    I — utilizar os dados exclusivamente para a finalidade para a qual foram compartilhados;
    II — adotar medidas de segurança da informação aptas a proteger os dados recebidos
    contra acessos não autorizados e situações acidentais ou ilícitas de destruição, perda,
    alteração, comunicação ou difusão;
    III — não compartilhar os dados recebidos com terceiros, exceto com autorização expressa
    do custodiante dos dados;
    IV — comunicar ao custodiante dos dados qualquer incidente de segurança que afete os
    dados recebidos;
    V — eliminar os dados recebidos após o encerramento da finalidade para a qual foram
    compartilhados, exceto quando houver obrigação legal de conservação.
guidance:
  prose: |
    Article 14 defines five obligations for receiving agencies — these are the
    counterpart to custodian obligations in Art. 13.

    **1. Purpose limitation (item I):**
    Data may ONLY be used for the stated sharing purpose. This directly implements
    LGPD's purpose limitation principle (Art. 6, I).

    **2. Security measures (item II):**
    Same security standard as custodians — protect against unauthorized access and
    data incidents. The receiving agency shares security responsibility.

    **3. Onward sharing prohibition (item III):**
    Received data CANNOT be shared with third parties without explicit authorization
    from the original custodian. This prevents data proliferation beyond intended scope.

    **4. Incident notification to custodian (item IV):**
    If the receiving agency suffers a breach affecting shared data, they must notify
    the custodian. This enables the custodian to fulfill their CCGD notification
    obligation under Art. 13.

    **5. Data deletion (item V):**
    Received data must be deleted once the sharing purpose is fulfilled, unless
    legal retention obligations exist. This implements LGPD data minimization
    and storage limitation principles.

    **Accountability chain:**
    Art. 13 (custodian) + Art. 14 (receiver) create a bilateral accountability
    framework. Both parties have documented obligations, creating a clear chain
    of responsibility for shared data.
implementation_guidance:
  platform_engineering:
    prose: |
      **Receiving agency compliance infrastructure:**
      1. Purpose-bound data storage — implement logical or physical separation
         of received shared data, tagged with the sharing purpose and source.
      2. Automated data retention enforcement — schedule deletion of shared
         data when the stated purpose is fulfilled or retention period expires.
      3. Access control restricting shared data to authorized personnel and
         systems aligned with the stated sharing purpose.
      4. Onward sharing prevention — technical controls blocking export or
         re-sharing of received data without custodian authorization.
      5. Incident detection and notification pipeline to custodian agency.
    tools:
      - data-lifecycle
      - access-control
      - dlp
      - incident-management
      - audit-logging
  devsecops:
    prose: |
      **Purpose enforcement in development:**
      1. Data lineage tracking in applications — ensure received shared data
         is not used outside the declared purpose scope.
      2. Automated DLP rules preventing shared data from being copied to
         unauthorized systems or exported to third parties.
      3. Data deletion verification tests confirming cleanup after purpose
         fulfillment.
      4. Security baseline enforcement for systems handling received shared data.
    tools:
      - gitlab-ci
      - dlp
      - data-lineage
      - security-scanner
  secops:
    prose: |
      **Shared data stewardship:**
      1. Inventory of all data received through sharing agreements with
         purpose, source custodian, and expected retention period.
      2. Monitoring for purpose drift — detect when shared data is accessed
         by systems or users outside the stated purpose.
      3. Incident response with custodian notification procedures.
      4. Data deletion audit trail demonstrating compliance with Art. 14 V.
    tools:
      - grc-platform
      - siem
      - dlp
      - data-lifecycle
