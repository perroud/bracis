id: art-12
family: cap-3
title: "Interoperability Standards and Technical Requirements"
class: DADOS-GOV
baselines: [administracao-publica-federal]
statement:
  prose: |
    Art. 12. Os padrões de interoperabilidade para o compartilhamento de dados serão
    definidos pela Secretaria de Governo Digital do Ministério da Economia, observadas
    as diretrizes do Comitê Central de Governança de Dados.

    § 1º. Os padrões de interoperabilidade incluirão, no mínimo:
    I — os protocolos de comunicação e os formatos de dados;
    II — os padrões de segurança da informação;
    III — os requisitos de disponibilidade e desempenho;
    IV — os padrões de metadados e vocabulários controlados.
guidance:
  prose: |
    Article 12 delegates technical standards definition to the Secretariat of Digital
    Government (SGD), under CCGD directives.

    **Minimum interoperability standards:**
    1. Communication protocols and data formats — REST/SOAP, JSON/XML, encoding
    2. Information security standards — encryption, authentication, integrity
    3. Availability and performance requirements — uptime SLAs, response times
    4. Metadata standards and controlled vocabularies — consistent semantics

    **Governance structure:**
    - CCGD defines strategic directives
    - SGD defines technical standards within those directives
    - Agencies implement the standards in their systems

    **e-PING alignment:**
    The interoperability standards align with Brazil's e-PING (Padrões de
    Interoperabilidade de Governo Eletrônico) architecture, which defines
    preferred technologies for government interoperability.

    **Compliance obligation:**
    All agencies must implement these standards in their data sharing
    infrastructure. Non-compliance can result in data sharing access revocation.
implementation_guidance:
  platform_engineering:
    prose: |
      **Interoperability standards implementation:**
      1. Implement SGD-mandated communication protocols (REST with JSON as
         default, SOAP for legacy systems) in all data sharing APIs.
      2. Deploy standardized security controls: TLS 1.2+, OAuth 2.0 with
         PKI certificates, request signing.
      3. Configure availability monitoring with SLA targets per SGD
         requirements (typically 99.5%+ for critical APIs).
      4. Implement metadata standards (Dublin Core, DCAT) in data catalog
         with controlled vocabulary enforcement.
      5. Performance monitoring and auto-scaling to meet response time SLAs.
    tools:
      - api-gateway
      - service-mesh
      - monitoring-alerting
      - auto-scaling
      - data-catalog
  devsecops:
    prose: |
      **Standards compliance in pipelines:**
      1. API specification linting against SGD interoperability standards
         (protocol, format, security, metadata requirements).
      2. Automated security standard compliance checks (TLS version, cipher
         suites, authentication mechanisms).
      3. Performance testing against SGD-defined response time and throughput
         requirements before deployment.
      4. Metadata completeness validation per controlled vocabulary standards.
    tools:
      - gitlab-ci
      - api-linting
      - performance-testing
      - security-scanner
  secops:
    prose: |
      **Standards compliance monitoring:**
      1. Continuous monitoring of interoperability standard compliance across
         all data sharing endpoints.
      2. Quarterly compliance assessment against current SGD standards.
      3. Standards drift detection — alert when systems fall behind updated
         requirements.
      4. Reporting to SGD/CCGD on agency-wide standards compliance status.
    tools:
      - compliance-scanner
      - monitoring-alerting
      - grc-platform
      - reporting-platform
