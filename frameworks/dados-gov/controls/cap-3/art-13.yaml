id: art-13
family: cap-3
title: "Data Custodian Obligations and Responsibilities"
class: DADOS-GOV
baselines: [administracao-publica-federal]
statement:
  prose: |
    Art. 13. O custodiante dos dados é responsável por:
    I — garantir a integridade e a disponibilidade dos dados sob sua custódia;
    II — adotar medidas de segurança da informação aptas a proteger os dados sob
    sua custódia contra acessos não autorizados e situações acidentais ou ilícitas
    de destruição, perda, alteração, comunicação ou difusão;
    III — manter registro das operações de compartilhamento de dados realizadas,
    incluindo data, hora, dados compartilhados e destinatário;
    IV — comunicar ao Comitê Central de Governança de Dados qualquer incidente de
    segurança que afete os dados sob sua custódia;
    V — garantir que os dados compartilhados sejam atualizados, exatos e completos,
    na medida do possível.
guidance:
  prose: |
    Article 13 defines five core obligations for data custodian agencies:

    **1. Integrity and availability (item I):**
    Custodians must ensure data is accurate, unaltered, and accessible when needed.

    **2. Security measures (item II):**
    Technical and organizational measures against unauthorized access, accidental or
    unlawful destruction, loss, alteration, communication, or disclosure. This mirrors
    LGPD Art. 46 requirements.

    **3. Sharing operation logging (item III):**
    Complete audit trail of all sharing operations: date, time, data shared, and
    recipient. This is essential for accountability and incident investigation.

    **4. Incident notification to CCGD (item IV):**
    Security incidents affecting custodied data must be reported to CCGD. This is
    in addition to any LGPD incident notification requirements to ANPD.

    **5. Data quality (item V):**
    Shared data must be up-to-date, accurate, and complete "to the extent possible."
    The qualifier acknowledges practical limitations but creates a best-effort obligation.

    **Liability implication:**
    Custodians bear responsibility for data quality and security. If shared data is
    inaccurate or breached, the custodian agency is accountable.
implementation_guidance:
  platform_engineering:
    prose: |
      **Custodian obligation implementation:**
      1. Deploy data integrity verification (checksums, digital signatures) for
         all custodied datasets with automated integrity monitoring.
      2. Implement comprehensive audit logging for all data sharing operations
         capturing date, time, data fields shared, and recipient agency.
      3. High-availability architecture (active-active or active-passive) with
         automated failover meeting custodian availability obligations.
      4. Data quality monitoring dashboard tracking accuracy, completeness,
         timeliness, and consistency metrics per dataset.
      5. Automated incident detection and CCGD notification pipeline.
    tools:
      - audit-logging
      - monitoring-alerting
      - data-quality
      - high-availability
      - incident-management
  devsecops:
    prose: |
      **Custodian compliance automation:**
      1. Security hardening baseline for all systems hosting custodied data,
         enforced via infrastructure-as-code.
      2. Automated data quality checks in data ingestion and sharing pipelines.
      3. Audit log completeness tests validating all required fields are captured.
      4. Penetration testing of custodian data access points.
    tools:
      - gitlab-ci
      - infrastructure-as-code
      - data-quality
      - penetration-testing
  secops:
    prose: |
      **Custodian operations:**
      1. 24/7 monitoring of custodied data access with automated alerting for
         anomalous patterns.
      2. Incident response playbook specific to custodied data breaches with
         CCGD notification procedures.
      3. Quarterly data quality audit with corrective action tracking.
      4. Annual security assessment of custodian infrastructure.
    tools:
      - siem
      - incident-management
      - data-quality
      - grc-platform
