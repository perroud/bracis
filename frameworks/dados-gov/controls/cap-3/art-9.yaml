id: art-9
family: cap-3
title: "Conecta Gov Platform — Data Sharing Via APIs"
class: DADOS-GOV
baselines: [administracao-publica-federal]
statement:
  prose: |
    Art. 9º. O compartilhamento de dados será realizado preferencialmente por meio
    de interface de programação de aplicações — API, disponibilizada pelo órgão
    custodiante dos dados.

    § 1º. Os órgãos e as entidades de que trata o art. 1º utilizarão a Plataforma
    de Interoperabilidade do Governo Federal — Conecta Gov, disponibilizada pela
    Secretaria de Governo Digital do Ministério da Economia, como meio preferencial
    para o compartilhamento de dados.
    § 2º. A utilização de outros meios para compartilhamento de dados será admitida
    quando não for possível a utilização da Plataforma Conecta Gov.
guidance:
  prose: |
    Article 9 establishes the technical foundation for data sharing — APIs are the
    preferred mechanism, and Conecta Gov is the preferred platform.

    **API-first mandate:**
    Data custodian agencies must expose their shared data through APIs, not through
    batch file transfers, direct database access, or manual processes.

    **Conecta Gov platform:**
    The federal government's interoperability platform, managed by the Secretariat
    of Digital Government, serves as the central hub for data sharing. It provides:
    - API catalog and discovery
    - Authentication and authorization
    - Usage monitoring and metrics
    - Rate limiting and quota management

    **Exception handling:**
    Alternative sharing mechanisms are allowed ONLY when Conecta Gov is technically
    infeasible. This creates a strong default toward platform-mediated sharing.

    **Architecture implication:**
    All federal agencies must be capable of both publishing and consuming APIs through
    Conecta Gov, requiring standardized API development practices.
implementation_guidance:
  platform_engineering:
    prose: |
      **Conecta Gov integration architecture:**
      1. Register all shareable datasets in the Conecta Gov API catalog with
         standardized OpenAPI specifications.
      2. Implement API endpoints following Conecta Gov standards (REST, JSON,
         OAuth 2.0 with government PKI).
      3. Deploy an API gateway as the single entry point for data sharing,
         enforcing authentication, rate limiting, and logging.
      4. Implement circuit breakers and fallback mechanisms for Conecta Gov
         connectivity failures.
      5. Monitoring and observability stack tracking API latency, error rates,
         and usage per consuming agency.
    tools:
      - api-gateway
      - conecta-gov
      - monitoring-alerting
      - service-mesh
      - kubernetes
  devsecops:
    prose: |
      **API development standards enforcement:**
      1. OpenAPI specification validation in CI/CD pipelines — all data sharing
         APIs must have complete, valid specifications.
      2. Automated API security testing (authentication bypass, injection,
         rate limit evasion) before deployment.
      3. Contract testing between data provider and consumer APIs.
      4. API versioning policy enforcement — breaking changes require
         deprecation period per Conecta Gov standards.
    tools:
      - gitlab-ci
      - openapi-validator
      - api-testing
      - sast
  secops:
    prose: |
      **API sharing operations:**
      1. Real-time monitoring of all Conecta Gov API traffic with anomaly
         detection and alerting.
      2. API key and certificate lifecycle management for agency credentials.
      3. Quarterly review of API usage patterns to detect unauthorized
         data sharing or access creep.
      4. Performance SLA monitoring for data sharing APIs.
    tools:
      - api-gateway
      - siem
      - monitoring-alerting
      - certificate-manager
