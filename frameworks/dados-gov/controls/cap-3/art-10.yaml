id: art-10
family: cap-3
title: "Data Catalog and Metadata Management"
class: DADOS-GOV
baselines: [administracao-publica-federal]
statement:
  prose: |
    Art. 10. Os órgãos e as entidades de que trata o art. 1º publicarão, em seus
    sítios eletrônicos, o catálogo das bases de dados sob sua custódia, contendo:
    I — a descrição das bases de dados;
    II — a categoria de compartilhamento, conforme classificação prevista nos art. 4º,
    art. 5º e art. 6º;
    III — o nome e o contato do custodiante dos dados;
    IV — as informações sobre os meios de acesso disponibilizados;
    V — a periodicidade de atualização dos dados.
guidance:
  prose: |
    Article 10 mandates that every federal agency must publish a catalog of its
    databases on its website, containing specific metadata for each database.

    **Mandatory catalog fields:**
    1. Database description — what data it contains and its purpose
    2. Sharing category — broad dissemination, restricted execution, or specific
    3. Custodian name and contact — responsible person/team
    4. Access methods — APIs, portals, direct request procedures
    5. Update frequency — how often the data is refreshed

    **Transparency and discoverability:**
    This requirement ensures that any federal agency can discover what data exists
    across government and how to access it. Without a published catalog, data
    sharing cannot occur efficiently because potential consumers do not know
    what data is available.

    **Quality implication:**
    The update frequency field (item V) creates implicit accountability — if an
    agency declares weekly updates but delivers monthly, it is not complying.
implementation_guidance:
  platform_engineering:
    prose: |
      **Data catalog platform:**
      1. Deploy a centralized data catalog solution (Apache Atlas, DataHub,
         or CKAN) with federated metadata collection from all agency databases.
      2. Automated metadata harvesting from databases, APIs, and data
         pipelines to keep catalog current.
      3. Standardized metadata schema implementing all five Art. 10 required
         fields with validation rules.
      4. Public-facing catalog portal with search, filtering by category,
         and API access for machine-readable consumption.
      5. Data freshness monitoring alerting when actual update frequency
         deviates from declared frequency.
    tools:
      - data-catalog
      - metadata-harvester
      - monitoring-alerting
      - api-gateway
  devsecops:
    prose: |
      **Catalog compliance automation:**
      1. CI/CD pipeline checks validating that new databases and data services
         have corresponding catalog entries with all five required fields.
      2. Automated validation of catalog entries against actual data — verify
         descriptions match reality, access methods work, contacts are valid.
      3. Data freshness tests verifying update frequencies are being met.
      4. Catalog entry completeness scanning with compliance scoring.
    tools:
      - gitlab-ci
      - data-catalog
      - api-testing
      - compliance-scanner
  secops:
    prose: |
      **Catalog governance:**
      1. Quarterly audit of catalog completeness — verify all databases under
         custody have published catalog entries.
      2. Category classification review — ensure sharing categories are
         correctly assigned per Art. 4, 5, and 6 criteria.
      3. Custodian contact verification — confirm listed contacts are
         current and responsive.
      4. Compliance reporting to CCGD on catalog publication status.
    tools:
      - grc-platform
      - data-catalog
      - monitoring-alerting
