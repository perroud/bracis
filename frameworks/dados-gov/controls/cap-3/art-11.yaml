id: art-11
family: cap-3
title: "Data Protection and LGPD Alignment in Sharing Operations"
class: DADOS-GOV
baselines: [administracao-publica-federal]
statement:
  prose: |
    Art. 11. O tratamento de dados pessoais compartilhados nos termos deste Decreto
    observará o disposto na Lei nº 13.709, de 2018 — Lei Geral de Proteção de Dados
    Pessoais.

    § 1º. Os dados pessoais compartilhados nos termos deste Decreto serão mantidos em
    sigilo pelos órgãos e pelas entidades recebedoras, observadas as hipóteses de
    transparência ativa e passiva previstas na Lei nº 12.527, de 18 de novembro de 2011
    — Lei de Acesso à Informação.
    § 2º. O compartilhamento de dados pessoais específicos, nos termos do art. 6º, será
    precedido de avaliação do impacto à proteção de dados pessoais, nos termos do art. 38
    da Lei nº 13.709, de 2018.
guidance:
  prose: |
    Article 11 is the critical bridge between data sharing governance (Decreto 10.046)
    and personal data protection (LGPD).

    **LGPD compliance mandate:**
    All personal data shared under this decree must comply with LGPD requirements —
    this is not optional. Legal bases, purpose limitation, data minimization, and
    data subject rights all apply.

    **Secrecy obligation:**
    Receiving agencies must maintain shared personal data in secrecy, with two
    exceptions:
    - Active transparency (LAI Art. 8) — proactive publication of non-personal data
    - Passive transparency (LAI Art. 10-14) — response to access requests

    **DPIA requirement for specific category:**
    Art. 11 §2 mandates a Data Protection Impact Assessment (DPIA) per LGPD Art. 38
    before any specific-category data sharing. This is a procedural prerequisite —
    sharing cannot proceed without a completed DPIA.

    **Practical tension:**
    There is an inherent tension between the pro-sharing stance of Decreto 10.046
    and the protective stance of LGPD. The DPIA requirement for specific sharing
    is the mechanism for resolving this tension — it forces a documented risk
    assessment before highly sensitive sharing proceeds.
implementation_guidance:
  platform_engineering:
    prose: |
      **LGPD-compliant data sharing infrastructure:**
      1. Implement privacy-by-design in the data sharing platform — data
         minimization, purpose limitation, and retention enforcement at the
         API level.
      2. Deploy a consent and legal basis management service tracking the
         LGPD legal basis for each data sharing operation.
      3. Data subject rights portal enabling citizens to view which agencies
         have accessed their data and for what purpose.
      4. Automated DPIA workflow integrated with data sharing request process
         for specific-category sharing.
      5. Encryption at rest and in transit for all personal data sharing,
         with separate key management per agency.
    tools:
      - privacy-platform
      - consent-management
      - encryption
      - api-gateway
      - workflow-engine
  devsecops:
    prose: |
      **Privacy engineering in data sharing:**
      1. PII detection scanning in all data sharing payloads to prevent
         over-sharing of personal data.
      2. DPIA completion verification as a pipeline gate for specific-category
         data sharing service deployments.
      3. Privacy unit tests validating data minimization filters.
      4. LGPD compliance checks encoded as OPA policies enforced at deploy time.
    tools:
      - gitlab-ci
      - pii-scanner
      - opa-gatekeeper
      - privacy-testing
  secops:
    prose: |
      **Privacy operations for shared data:**
      1. Data subject access request (DSAR) fulfillment process for shared
         data — coordinating across multiple agencies.
      2. Privacy breach notification process per LGPD/ANPD requirements
         when shared personal data is compromised.
      3. DPIA register with all completed assessments for specific sharing.
      4. Annual privacy audit of data sharing operations.
    tools:
      - privacy-platform
      - grc-platform
      - siem
      - incident-response
