id: art-19
family: cap-5
title: "Transition Rules for Existing Data Sharing Agreements"
class: DADOS-GOV
baselines: [administracao-publica-federal]
statement:
  prose: |
    Art. 19. Os compartilhamentos de dados em vigor na data de publicação deste Decreto
    deverão ser adequados às disposições nele previstas no prazo de até um ano, contado
    da data de sua publicação.

    Parágrafo único. A Secretaria de Governo Digital do Ministério da Economia poderá
    estabelecer prazos diferenciados para categorias específicas de compartilhamento de
    dados, considerada a complexidade de adequação envolvida.
guidance:
  prose: |
    Article 19 establishes a one-year transition period for existing data sharing
    arrangements to comply with the decree's requirements.

    **Default deadline:**
    All pre-existing data sharing arrangements had until October 2020 (one year
    after publication) to conform to the decree's requirements — data classification,
    security measures, audit logging, catalog publication, etc.

    **Flexibility mechanism:**
    SGD can extend deadlines for specific categories of data sharing when the
    complexity of adaptation justifies additional time. This acknowledges that
    legacy systems and complex sharing arrangements may need more time.

    **Current status:**
    The transition period has long passed, so all data sharing arrangements should
    already be compliant. New audits should verify that legacy arrangements have
    been fully adapted.

    **Risk of non-compliance:**
    Agencies that have not completed the transition are technically in violation
    of the decree. The CCGD dispute resolution mechanism (Art. 16 III) can be
    used to address persistent non-compliance.
implementation_guidance:
  platform_engineering:
    prose: |
      **Legacy sharing arrangement migration:**
      1. Inventory all pre-existing data sharing arrangements (contracts,
         protocols, direct database access, file transfers, etc.).
      2. Gap analysis of each existing arrangement against decree requirements
         (classification, security, logging, catalog entry).
      3. Migration plan prioritizing arrangements by risk (personal data,
         biometric data, cross-agency scope).
      4. Implement decree-compliant infrastructure for migrated arrangements
         (API-based access, authentication, audit logging).
      5. Decommission legacy sharing mechanisms after migration.
    tools:
      - project-management
      - api-gateway
      - audit-logging
      - data-catalog
  devsecops:
    prose: |
      **Migration compliance validation:**
      1. Automated compliance scanning of migrated data sharing arrangements
         against decree requirements.
      2. Legacy system decommission verification — confirm old sharing
         mechanisms are disabled after migration.
      3. Regression testing of migrated data sharing flows.
      4. Documentation-as-code for migrated arrangement specifications.
    tools:
      - gitlab-ci
      - compliance-scanner
      - api-testing
      - documentation-as-code
  secops:
    prose: |
      **Transition compliance monitoring:**
      1. Track migration status of all pre-existing sharing arrangements
         with completion percentage and timeline.
      2. Risk assessment for arrangements still pending migration.
      3. Escalation to CCGD for agencies with persistent non-compliance.
      4. Post-migration compliance audit of adapted arrangements.
    tools:
      - grc-platform
      - project-management
      - risk-management
      - audit-tracking
legal_references:
  - framework_id: gov-digital
    articles: ["art-1"]
    relationship: complements
