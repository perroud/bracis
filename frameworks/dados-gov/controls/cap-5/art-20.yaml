id: art-20
family: cap-5
title: "Revocation and Normative Consolidation"
class: DADOS-GOV
baselines: [administracao-publica-federal]
statement:
  prose: |
    Art. 20. Ficam revogados:
    I — o Decreto nº 8.789, de 29 de junho de 2016;
    II — o § 1º do art. 3º do Decreto nº 9.723, de 11 de março de 2019.

    Art. 21. Este Decreto entra em vigor na data de sua publicação.
guidance:
  prose: |
    Articles 20 and 21 handle normative consolidation and effective date.

    **Revoked legislation:**
    1. Decreto 8.789/2016 — the previous data sharing governance decree. Decreto 10.046
       entirely replaces it with an expanded and modernized framework.
    2. Art. 3 §1 of Decreto 9.723/2019 — specific provision that conflicted with the
       new data sharing governance framework.

    **Immediate effect:**
    The decree entered into force on its publication date (October 9, 2019), meaning
    all provisions became immediately binding, with the exception of the one-year
    transition period for existing arrangements (Art. 19).

    **Regulatory evolution:**
    Decreto 10.046 represents a significant modernization over its predecessor:
    - Introduces three-tiered data classification (broad, restricted, specific)
    - Establishes the Citizen Base Registry
    - Creates CCGD with binding authority
    - Mandates API-based sharing via Conecta Gov
    - Aligns with LGPD (which took effect in 2020)

    **Current amendments:**
    Decreto 10.046 was amended by Decreto 11.266/2022, which updated CCGD
    composition and added provisions for biometric data governance. Agencies
    must verify they are following the consolidated text.
implementation_guidance:
  platform_engineering:
    prose: |
      **Normative compliance management:**
      1. Update all system documentation and compliance references from
         Decreto 8.789/2016 to Decreto 10.046/2019.
      2. Verify that infrastructure built under the old decree has been
         fully migrated to new requirements.
      3. Monitor for further amendments to Decreto 10.046 and implement
         changes promptly.
      4. Maintain a regulatory change log tracking all amendments and
         their implementation status.
    tools:
      - document-management
      - compliance-scanner
      - change-management
  devsecops:
    prose: |
      **Regulatory compliance tracking:**
      1. Automated regulatory reference validation — ensure no code,
         documentation, or configuration references the revoked Decreto 8.789.
      2. Compliance-as-code policy updates when decree amendments are published.
      3. Version-controlled regulatory mapping documents.
    tools:
      - gitlab-ci
      - compliance-scanner
      - documentation-as-code
  secops:
    prose: |
      **Regulatory monitoring:**
      1. Track amendments to Decreto 10.046 via Diário Oficial da União.
      2. Impact assessment of regulatory changes on current data sharing
         operations.
      3. Compliance gap analysis after each amendment.
      4. Reporting to CCGD on amendment implementation status.
    tools:
      - grc-platform
      - regulatory-monitoring
      - reporting-platform
legal_references:
  - framework_id: gov-digital
    articles: ["art-1"]
    relationship: complements
