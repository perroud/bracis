id: art-4
family: cap-2
title: "Broad Dissemination Data Sharing Category"
class: DADOS-GOV
baselines: [administracao-publica-federal]
statement:
  prose: |
    Art. 4º. São categorizados como de ampla divulgação os dados que possuam as seguintes
    características:
    I — estejam presentes em bases de dados de acesso público ou sejam produzidos por
    pessoas jurídicas de direito público sem restrição de acesso;
    II — não estejam sujeitos a nenhuma restrição de acesso;
    III — não estejam protegidos por sigilo ou por restrição de acesso prevista em
    legislação específica.

    § 1º. O compartilhamento de dados de ampla divulgação não necessita de autorização
    prévia do gestor de dados.
    § 2º. O acesso e o uso dos dados de que trata este artigo são públicos e não exigem
    autenticação e poderão ser acessados por qualquer interessado.
guidance:
  prose: |
    Article 4 defines the first and most open category of data sharing — broad
    dissemination (ampla divulgação). This category encompasses:

    **Characteristics:**
    - Data already in public access databases
    - Data produced by public legal entities without access restrictions
    - Data not subject to any secrecy or specific legislative access restrictions

    **Key rules:**
    - No prior authorization from data manager required
    - Public access without authentication
    - Any interested party can access

    **Practical examples:**
    - Government budget execution data (Portal da Transparência)
    - Legislative proceedings
    - Regulatory texts and official publications
    - Statistical aggregates without personal data
    - Open government data (dados.gov.br)

    **Important distinction:**
    This category explicitly EXCLUDES any data protected by secrecy laws (LAI
    classification, fiscal secrecy, banking secrecy, etc.) or LGPD-protected
    personal data.
implementation_guidance:
  platform_engineering:
    prose: |
      **Open data platform:**
      1. Deploy an open data portal (CKAN or similar) publishing broad dissemination
         datasets in machine-readable formats (CSV, JSON, XML, Parquet).
      2. Implement public APIs (no authentication required) for real-time access
         to broad dissemination data.
      3. Automated data classification pipeline that tags datasets matching Art. 4
         criteria as "broad dissemination" in the data catalog.
      4. CDN and caching layer for high-availability public data access.
      5. Schema registry with published data dictionaries for all public datasets.
    tools:
      - ckan
      - api-gateway
      - cdn
      - data-catalog
      - kubernetes
  devsecops:
    prose: |
      **Data classification validation:**
      1. Automated scanning of datasets destined for broad dissemination to
         verify absence of personal data, classified information, or restricted data.
      2. CI/CD pipeline gates preventing publication of data containing PII
         (regex patterns, ML classifiers) without explicit override.
      3. API contract tests validating public endpoints require no authentication
         per Art. 4 §2.
      4. Data quality checks before publication (completeness, format, encoding).
    tools:
      - gitlab-ci
      - data-quality
      - pii-scanner
      - api-testing
  secops:
    prose: |
      **Public data governance:**
      1. Periodic audit (quarterly) of published broad dissemination datasets
         to verify no restricted or personal data has been inadvertently published.
      2. Monitor public API usage patterns for anomalies (scraping, abuse).
      3. Incident response for accidental disclosure of restricted data
         through broad dissemination channels.
      4. Compliance tracking for open data mandates (LAI, Governo Digital).
    tools:
      - monitoring-alerting
      - grc-platform
      - waf
      - siem
