id: art-6
family: cap-2
title: "Specific Data Sharing Category — Formal Agreement Required"
class: DADOS-GOV
baselines: [administracao-publica-federal]
statement:
  prose: |
    Art. 6º. São categorizados como específicos os dados protegidos por sigilo cujo
    compartilhamento requer autorização específica do gestor de dados e formalização
    de termo de compromisso ou instrumento congênere que preveja, no mínimo:
    I — a descrição da finalidade do compartilhamento;
    II — a identificação dos dados compartilhados;
    III — os mecanismos de segurança da informação aplicáveis;
    IV — a forma de armazenamento dos dados;
    V — o prazo de conservação dos dados;
    VI — as responsabilidades dos envolvidos;
    VII — as penalidades aplicáveis.
guidance:
  prose: |
    Article 6 defines the most restrictive data sharing category — specific sharing.
    This applies to highly sensitive data requiring formal authorization and documented
    agreements.

    **Mandatory agreement elements (seven minimum requirements):**
    1. Purpose description — clear statement of why sharing is needed
    2. Data identification — specific listing of shared data fields
    3. Information security mechanisms — technical controls to be applied
    4. Storage method — how the receiving agency will store the data
    5. Retention period — how long data will be kept
    6. Responsibilities — duties of each party
    7. Penalties — consequences for non-compliance

    **Key difference from Art. 5 (restricted execution):**
    - Art. 5: purpose-based access, no formal agreement needed, API-preferred
    - Art. 6: formal written agreement required, specific data manager authorization,
      detailed security and retention commitments

    **Practical examples:**
    - Sharing of tax records (Receita Federal) with law enforcement
    - Sharing of biometric data between agencies
    - Intelligence agency data sharing
    - Cross-agency sharing of classified information
implementation_guidance:
  platform_engineering:
    prose: |
      **Formal agreement management platform:**
      1. Implement a digital agreement management system for creating, approving,
         and tracking data sharing terms of commitment (termos de compromisso).
      2. Automated workflow for agreement lifecycle: request → review → approval
         by data manager → execution → renewal/termination.
      3. Technical enforcement of agreement terms: access controls, data retention
         policies, and security mechanisms automatically configured based on the
         signed agreement.
      4. Data compartmentalization infrastructure isolating specific-category
         data in dedicated storage with encryption at rest and in transit.
      5. Automated data deletion/archival at retention period expiry.
    tools:
      - agreement-management
      - workflow-engine
      - encryption
      - data-lifecycle
      - kubernetes
  devsecops:
    prose: |
      **Agreement-enforced data sharing pipelines:**
      1. Policy-as-code rules that block data access unless a valid, active
         agreement exists in the agreement management system.
      2. Automated validation that deployed data sharing configurations match
         the security mechanisms specified in the agreement.
      3. Retention policy enforcement tests verifying data deletion at
         agreement-specified deadlines.
      4. Penetration testing of specific-category data endpoints.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - penetration-testing
      - data-lifecycle
  secops:
    prose: |
      **Specific data sharing oversight:**
      1. Central registry of all active data sharing agreements with alerts
         for approaching expiry dates.
      2. Enhanced monitoring for specific-category data access with real-time
         alerting on any unauthorized access.
      3. Annual audit of agreement compliance — verify all seven minimum
         elements are being observed.
      4. Penalty enforcement tracking for agreement violations.
    tools:
      - grc-platform
      - siem
      - agreement-management
      - monitoring-alerting
