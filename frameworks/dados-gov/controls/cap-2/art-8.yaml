id: art-8
family: cap-2
title: "Citizen Base Registry Management and CCGD Authority"
class: DADOS-GOV
baselines: [administracao-publica-federal]
statement:
  prose: |
    Art. 8º. Compete ao Comitê Central de Governança de Dados deliberar sobre:
    I — os atributos que compõem o Cadastro Base do Cidadão;
    II — os órgãos e as entidades custodiantes dos atributos de referência;
    III — os padrões de interoperabilidade e os requisitos de segurança e de
    disponibilidade aplicáveis ao Cadastro Base do Cidadão;
    IV — as condições para acesso aos dados do Cadastro Base do Cidadão;
    V — a resolução de controvérsias sobre compartilhamento de dados no âmbito
    do Cadastro Base do Cidadão.
guidance:
  prose: |
    Article 8 delegates specific governance competencies to the CCGD regarding the
    Citizen Base Registry:

    **CCGD deliberation powers:**
    1. Define which attributes compose the registry
    2. Designate custodian agencies for reference attributes
    3. Set interoperability standards, security requirements, and availability SLAs
    4. Define access conditions for registry data
    5. Resolve disputes about registry data sharing

    **Practical implications:**
    The CCGD has binding authority over the technical architecture of the Citizen Base
    Registry. Any agency wanting to modify, access, or integrate with the registry
    must comply with CCGD-defined standards.

    **Standards-setting role:**
    CCGD defines both business rules (which attributes, who custodies them) and
    technical standards (interoperability protocols, security controls, availability
    requirements). This makes CCGD the de facto data governance authority for the
    most sensitive citizen data in the federal government.
implementation_guidance:
  platform_engineering:
    prose: |
      **CCGD standards implementation:**
      1. Implement interoperability standards defined by CCGD as platform-level
         policies (API specifications, data formats, authentication protocols).
      2. Configure availability SLAs per CCGD requirements (uptime targets,
         failover, disaster recovery RPO/RTO).
      3. Security controls enforcement layer implementing CCGD-mandated
         requirements (encryption standards, access control models, audit logging).
      4. Automated compliance verification against CCGD-published standards
         for all registry-connected systems.
      5. Dispute tracking system for recording and managing data sharing
         controversies escalated to CCGD.
    tools:
      - api-gateway
      - infrastructure-as-code
      - monitoring-alerting
      - disaster-recovery
  devsecops:
    prose: |
      **CCGD compliance in development:**
      1. CCGD standards encoded as CI/CD policy gates — deployments to
         registry-connected systems must pass compliance checks.
      2. Interoperability conformance tests validating API implementations
         against CCGD-published specifications.
      3. Security baseline enforcement per CCGD requirements in all
         registry integration code.
      4. Automated reporting of compliance status to CCGD.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - api-testing
      - compliance-scanner
  secops:
    prose: |
      **CCGD governance support:**
      1. Regular compliance reporting to CCGD on registry security posture,
         availability metrics, and access patterns.
      2. Incident escalation procedures to CCGD for data sharing disputes.
      3. Audit support for CCGD reviews of custodian agency compliance.
      4. Documentation of all CCGD decisions and their implementation status.
    tools:
      - grc-platform
      - monitoring-alerting
      - incident-management
      - document-management
