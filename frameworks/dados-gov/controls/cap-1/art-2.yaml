id: art-2
family: cap-1
title: "Definitions — Key Terms for Data Sharing Governance"
class: DADOS-GOV
baselines: [administracao-publica-federal]
statement:
  prose: |
    Art. 2º. Para fins deste Decreto, considera-se:
    I — atributo biográfico — dado relativo aos fatos da vida, tais como nome civil ou social,
    data de nascimento, filiação, naturalidade, nacionalidade, sexo, estado civil, grupo
    familiar, endereço e vínculos empregatícios;
    II — atributo biométrico — característica biológica e comportamental mensurável da pessoa
    natural que pode ser coletada para reconhecimento automatizado, tais como a palma da mão,
    as digitais dos dedos, a retina ou a íris dos olhos, o formato da face, a voz e a maneira
    de andar;
    III — atributo cadastral — dado de pessoa natural ou jurídica que permite sua identificação
    direta ou que possibilite cruzamentos que levem a sua identificação;
    IV — base de dados — conjunto de dados organizados e inter-relacionados;
    V — Cadastro Base do Cidadão — base de dados que consolida atributos biográficos,
    biométricos e cadastrais para identificação do cidadão;
    VI — compartilhamento de dados — disponibilização de dados por órgão ou entidade a
    terceiros, incluindo transferência e interconexão de dados;
    VII — Comitê Central de Governança de Dados — instância deliberativa responsável por
    deliberar sobre o compartilhamento de dados;
    VIII — custodiante de dados — órgão ou entidade responsável pela gestão, preservação e
    acesso a determinada base de dados;
    IX — dados cadastrais — conforme definido no inciso IV do caput do art. 13 da Lei
    nº 12.965, de 23 de abril de 2014;
    X — gestor de dados — representante do órgão ou da entidade com poderes para tomar
    decisões referentes ao tratamento e ao compartilhamento de dados;
    XI — interoperabilidade — capacidade de diversos sistemas e organizações trabalharem em
    conjunto, visando garantir que pessoas, organizações e sistemas computacionais interajam
    para trocar informações de maneira eficiente.
guidance:
  prose: |
    Article 2 establishes the foundational definitions for the entire data sharing
    governance framework. Key distinctions:

    **Data attribute types:**
    - Biographical attributes: life facts (name, birth date, family, address, employment)
    - Biometric attributes: measurable biological/behavioral traits (fingerprints, iris,
      face, voice, gait) — used for automated recognition
    - Registration attributes: direct or cross-referenceable identification data

    **Institutional roles:**
    - Data custodian (custodiante): the agency responsible for managing, preserving, and
      providing access to a specific database
    - Data manager (gestor): the agency representative with authority to make decisions
      about data treatment and sharing

    **Critical concept — interoperability:**
    The decree explicitly defines interoperability as the capacity of diverse systems and
    organizations to work together for efficient information exchange. This is the
    technical foundation for the entire data sharing framework.

    **Biometric data sensitivity:**
    The explicit definition of biometric attributes aligns with LGPD Art. 5, II (sensitive
    personal data), requiring heightened protection measures for biometric data shared
    between agencies.
implementation_guidance:
  platform_engineering:
    prose: |
      **Data classification and cataloging:**
      1. Implement a data classification engine that automatically tags datasets
         as biographical, biometric, or registration attributes per Art. 2 definitions.
      2. Deploy a metadata management platform with standardized schemas for each
         attribute type (biographical, biometric, cadastral).
      3. Create a centralized data dictionary aligned with Art. 2 definitions,
         accessible via API for all federal systems.
      4. Implement role-based access differentiation between data custodians and
         data managers with distinct permission sets.
      5. Design interoperability middleware supporting standard protocols
         (REST, SOAP, GraphQL) with schema translation capabilities.
    tools:
      - data-catalog
      - metadata-management
      - api-gateway
      - identity-provider
  devsecops:
    prose: |
      **Data classification enforcement in pipelines:**
      1. Automated data classification scanning in CI/CD to detect and tag
         biographical, biometric, and registration data in application code.
      2. Policy-as-code rules preventing deployment of services that handle
         biometric data without enhanced security controls.
      3. Schema validation tests ensuring data exchange payloads conform to
         the standardized attribute definitions.
      4. Data masking and anonymization checks for test environments containing
         classified government data.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - sonarqube
      - data-masking
  secops:
    prose: |
      **Data governance operations:**
      1. Maintain a registry of all data custodians and data managers across
         federal agencies with their respective databases and authorities.
      2. Periodic review (quarterly) of data classification accuracy against
         Art. 2 definitions.
      3. Enhanced monitoring for biometric data access and sharing operations.
      4. Training program for agency staff on Art. 2 definitions and their
         implications for data handling.
    tools:
      - grc-platform
      - data-catalog
      - siem
      - training-platform
