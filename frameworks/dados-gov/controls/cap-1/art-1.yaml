id: art-1
family: cap-1
title: "Scope — Data Sharing Governance within Federal Public Administration"
class: DADOS-GOV
baselines: [administracao-publica-federal]
statement:
  prose: |
    Art. 1º. Este Decreto dispõe sobre a governança no compartilhamento de dados no âmbito
    da administração pública federal direta, autárquica e fundacional e dos demais Poderes da
    União, e institui o Cadastro Base do Cidadão e o Comitê Central de Governança de Dados.
guidance:
  prose: |
    Article 1 defines the scope of the decree: governance of data sharing within the
    direct federal public administration, autarchies, foundations, and other branches of
    the Union. It also establishes two key instruments:

    **Cadastro Base do Cidadão (Citizen Base Registry):**
    A centralized reference database consolidating authoritative citizen attributes
    (CPF, biometric data, civil registry) to serve as the single source of truth
    for citizen identification across federal agencies.

    **Comitê Central de Governança de Dados (CCGD):**
    The Central Data Governance Committee responsible for defining policies, standards,
    and resolving disputes related to data sharing among federal entities.

    **Practical scope:**
    All federal executive branch bodies, as well as legislative and judicial branches
    when sharing data with the executive, fall under this decree. State and municipal
    governments may voluntarily adhere through cooperation agreements.
implementation_guidance:
  platform_engineering:
    prose: |
      **Data sharing platform architecture:**
      1. Design a centralized data sharing platform (Conecta Gov) implementing
         API-first architecture with standardized data exchange protocols.
      2. Implement a service mesh layer for secure inter-agency data communication
         with mTLS, rate limiting, and access control.
      3. Deploy a data catalog service listing all available datasets, their
         classification, and access requirements.
      4. Create a unified identity layer for agency-to-agency authentication
         using OAuth 2.0 / OpenID Connect with government PKI certificates.
      5. Implement data lineage tracking for all shared datasets.
    tools:
      - api-gateway
      - service-mesh
      - data-catalog
      - identity-provider
      - kubernetes
  devsecops:
    prose: |
      **Compliance-as-Code for data sharing governance:**
      1. Encode data classification rules as OPA/Rego policies enforced at the
         API gateway level for all data sharing endpoints.
      2. Implement automated schema validation for data exchange payloads
         in CI/CD pipelines.
      3. Create integration tests validating data sharing flows conform to
         Decreto 10.046 access categories (broad, restricted, specific).
      4. Automated security scanning of all data sharing APIs before deployment.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - sonarqube
      - postman
  secops:
    prose: |
      **Data sharing governance operations:**
      1. Maintain an inventory of all active data sharing agreements between
         federal agencies, including data types, purposes, and legal bases.
      2. Monitor all data sharing transactions for anomalies, unauthorized
         access, and policy violations.
      3. Quarterly audit of data sharing compliance against Decreto 10.046.
      4. Incident response procedures for data sharing breaches or misuse.
    tools:
      - siem
      - grc-platform
      - data-catalog
      - monitoring-alerting
