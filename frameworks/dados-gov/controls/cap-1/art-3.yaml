id: art-3
family: cap-1
title: "Principles and Directives for Data Sharing"
class: DADOS-GOV
baselines: [administracao-publica-federal]
statement:
  prose: |
    Art. 3º. O compartilhamento de dados entre os órgãos e as entidades de que trata o
    art. 1º observará as seguintes diretrizes:
    I — simplificar a oferta de serviços públicos;
    II — orientar e otimizar a formulação, a implementação, a avaliação e o monitoramento
    de políticas públicas;
    III — possibilitar a análise das condições de acesso e manutenção de benefícios sociais
    e fiscais;
    IV — promover a melhoria da qualidade e da fidedignidade dos dados custodiados pela
    administração pública federal;
    V — aumentar a qualidade e a eficiência das operações internas da administração pública
    federal;
    VI — promover o compartilhamento de dados nos termos do disposto no Decreto nº 8.789,
    de 29 de junho de 2016;
    VII — promover o registro e a preservação de dados de modo a garantir a autenticidade
    dos dados compartilhados.
guidance:
  prose: |
    Article 3 establishes seven directives that must guide all data sharing activities:

    1. **Simplification of public services** — data sharing must reduce bureaucratic
       burden on citizens by eliminating redundant data collection
    2. **Policy optimization** — shared data must support evidence-based policy
       formulation, implementation, evaluation, and monitoring
    3. **Benefits analysis** — enable verification of eligibility for social and
       fiscal benefits (e.g., Bolsa Família, tax exemptions)
    4. **Data quality** — improve accuracy and reliability of federal government data
    5. **Operational efficiency** — enhance internal operations through shared data
    6. **Data sharing promotion** — align with existing sharing mandates (Decreto 8.789/2016)
    7. **Authenticity and preservation** — guarantee the authenticity of shared data
       through proper recording and preservation

    **Key implication:**
    These directives establish a pro-sharing stance — the default is to share data
    between agencies unless a specific legal restriction applies. This inverts the
    traditional silo mentality in public administration.
implementation_guidance:
  platform_engineering:
    prose: |
      **Directive-aligned platform design:**
      1. Implement a citizen-centric API layer that enables "tell us once" —
         citizens provide data to one agency, and it propagates to all authorized
         agencies automatically.
      2. Deploy data quality monitoring with automated validation rules for
         accuracy, completeness, timeliness, and consistency.
      3. Implement data provenance tracking (blockchain or immutable audit log)
         to guarantee authenticity per directive VII.
      4. Build analytics infrastructure (data warehouse/lakehouse) supporting
         policy evaluation and monitoring use cases per directive II.
      5. Design a benefits eligibility engine that cross-references shared data
         to verify social and fiscal benefit conditions per directive III.
    tools:
      - data-platform
      - data-quality
      - audit-logging
      - analytics-engine
      - api-gateway
  devsecops:
    prose: |
      **Compliance validation for directives:**
      1. Automated tests validating that new data sharing integrations align
         with at least one of the seven directives (documented justification required).
      2. Data quality gates in CI/CD pipelines preventing deployment of services
         that degrade data quality metrics.
      3. Integration test suites validating data authenticity mechanisms
         (hashing, signing) per directive VII.
      4. Performance benchmarks ensuring shared data retrieval meets SLAs
         for public service delivery (directive I).
    tools:
      - gitlab-ci
      - data-quality
      - performance-testing
      - sonarqube
  secops:
    prose: |
      **Directive compliance monitoring:**
      1. Dashboard tracking data sharing metrics aligned to each directive
         (number of integrations, data quality scores, service simplification KPIs).
      2. Annual compliance assessment validating that all active data sharing
         agreements serve at least one directive purpose.
      3. Data authenticity audits verifying preservation and integrity mechanisms.
      4. Reporting to CCGD on directive compliance across federal agencies.
    tools:
      - grc-platform
      - monitoring-alerting
      - data-quality
      - reporting-platform
