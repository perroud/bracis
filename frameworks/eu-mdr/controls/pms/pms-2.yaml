id: pms-2
family: pms
title: "Vigilance and Serious Incident Reporting"
class: EU-MDR
baselines: [mdr-essential]
statement:
  prose: |
    Manufacturers of devices, other than investigational devices, placed
    on the market shall report, through the electronic system referred to
    in Article 92, any of the following: (a) any serious incident
    involving devices made available on the Union market, except expected
    side-effects which are clearly documented in the product information
    and quantified in the technical documentation and are subject to
    trend reporting; (b) any field safety corrective action in respect
    of devices made available on the Union market, including any field
    safety corrective action taken in a third country in relation to a
    device which is also legally made available on the Union market, if
    the reason for the field safety corrective action is not limited to
    the device made available in the third country.

    Manufacturers shall report the serious incidents referred to in
    paragraph 1(a) without delay after becoming aware of the causal
    relationship or reasonably possible causal relationship between that
    incident and their device and not later than 15 days after becoming
    aware of the incident. Notwithstanding the timeframe referred to in
    the first subparagraph, in the event of a serious public health
    threat the report shall be provided immediately, and not later than
    2 days after the manufacturer becomes aware of that threat. In the
    event of death or an unanticipated serious deterioration in a
    person's state of health the report shall be provided immediately
    after the manufacturer has established or as soon as it suspects a
    causal relationship between the device and the serious incident but
    not later than 10 days after the date on which the manufacturer
    becomes aware of the serious incident.
guidance:
  prose: |
    Articles 87–92 establish the vigilance system for reporting serious
    incidents and field safety corrective actions. The reporting timelines
    are strict and non-negotiable:

    - Death or unanticipated serious deterioration: 10 days maximum.
    - Serious public health threat: 2 days maximum.
    - Other serious incidents: 15 days maximum.
    - Field safety corrective actions: without delay.

    For software medical devices, serious incidents may include:
    - Software failures leading to incorrect clinical decisions.
    - Data integrity issues affecting patient diagnosis or treatment.
    - Cybersecurity breaches compromising device functionality.
    - System outages preventing access to critical clinical information.
    - Algorithmic errors producing incorrect clinical outputs.

    Manufacturers must have systems in place to detect, assess, and
    report serious incidents within these timelines. This requires:
    - 24/7 monitoring of production systems.
    - Defined escalation procedures from operations to regulatory.
    - Pre-approved report templates and submission procedures.
    - Trained personnel authorized to submit vigilance reports.
references:
  - citation: "EU MDR 2017/745, Articles 87–92"
    url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32017R0745"
  - citation: "MDCG 2023-3 — Guidance for manufacturers of medical devices on vigilance"
    url: "https://health.ec.europa.eu/publications/mdcg-2023-3_en"
implementation_guidance:
  platform_engineering:
    prose: |
      1. Deploy 24/7 production monitoring with automated alerting for
         critical events: system failures, data integrity violations,
         abnormal clinical outputs, and cybersecurity incidents, with
         on-call rotation and escalation procedures.
      2. Implement automated incident classification that evaluates
         production events against serious incident criteria (death,
         serious deterioration, public health threat) to trigger
         expedited investigation and reporting workflows.
      3. Configure incident timeline tracking that automatically
         calculates reporting deadlines (2, 10, or 15 days) from the
         awareness date and sends escalating reminders to responsible
         personnel.
      4. Maintain forensic logging capabilities that preserve complete
         system state information at the time of an incident, including
         application logs, infrastructure metrics, user actions, and
         data state, for root cause investigation.
    tools:
      - pagerduty
      - opsgenie
      - elasticsearch
      - forensic-logging
      - incident-management
  devsecops:
    prose: |
      1. Implement automated error classification in the production
         monitoring pipeline that flags potential serious incidents
         based on predefined criteria: clinical output errors, data
         corruption, safety function failures, or security breaches.
      2. Configure immutable audit logging for all clinical data
         operations, enabling complete reconstruction of system
         behavior during incident investigation.
      3. Implement automated incident response runbooks that guide
         on-call engineers through initial triage, evidence preservation,
         impact assessment, and escalation to regulatory affairs.
      4. Establish rapid hotfix deployment capability with expedited
         (but documented) verification and validation for urgent field
         safety corrective actions.
    tools:
      - gitlab-ci
      - runbook-automation
      - incident-response
      - audit-logging
      - hotfix-pipeline
  secops:
    prose: |
      1. Establish a vigilance process with defined roles, responsibilities,
         and escalation paths, ensuring 24/7 coverage for initial
         assessment of potential serious incidents.
      2. Maintain pre-approved vigilance report templates and electronic
         submission credentials for each EU member state competent
         authority and for EUDAMED.
      3. Implement a trend reporting process that analyzes non-serious
         incidents and expected side effects for statistically
         significant increases, triggering vigilance reporting when
         trends indicate a potential systematic issue.
      4. Conduct periodic vigilance process drills simulating serious
         incident scenarios to validate that reporting timelines can
         be met and that personnel are trained in the procedures.
    tools:
      - vigilance-management
      - eudamed
      - regulatory-reporting
      - training-management
