id: cld-1
family: cld
title: "Clinical Evaluation and Evidence Requirements"
class: EU-MDR
baselines: [mdr-essential]
statement:
  prose: |
    Manufacturers shall specify and justify the level of clinical
    evidence necessary to demonstrate conformity with the relevant
    general safety and performance requirements. That level of clinical
    evidence shall be appropriate in view of the characteristics of the
    device and its intended purpose.

    A clinical evaluation shall be thorough and objective, and take into
    account both favourable and unfavourable data. Its depth and extent
    shall be proportionate and appropriate to the nature, classification,
    intended purpose and risks of the device.

    A clinical evaluation shall follow a defined and methodologically
    sound procedure based on the following: (a) a critical evaluation of
    the relevant scientific literature currently available relating to
    the safety, performance, design characteristics and intended purpose
    of the device, where the following conditions are met: (i) it is
    demonstrated that the device subject to clinical evaluation for the
    intended purpose is equivalent to the device to which the data
    relate, and (ii) the data adequately demonstrate compliance with the
    relevant general safety and performance requirements; (b) a critical
    evaluation of the results of all available clinical investigations;
    (c) a consideration of currently available alternative treatment
    options for that purpose, if any.

    Clinical evaluation and its documentation shall be updated throughout
    the life cycle of the device concerned with clinical data obtained
    from the post-market clinical follow-up plan and the post-market
    surveillance plan.
guidance:
  prose: |
    Articles 61–62 and Annex XIV establish the clinical evaluation
    requirements. For software medical devices, clinical evaluation
    presents unique challenges:

    - Software evolves rapidly, requiring continuous clinical evaluation
      updates rather than one-time assessments.
    - Equivalence claims for software are difficult because algorithms,
      training data, and processing methods may differ significantly
      even when the intended purpose is identical.
    - Clinical evidence for SaMD may come from:
      (a) Literature on the clinical condition and state of the art.
      (b) Analytical validation (technical performance of the algorithm).
      (c) Clinical validation (clinical performance with real patients).
      (d) Post-market clinical follow-up (PMCF) data.

    MDCG 2020-1 provides specific guidance on clinical evaluation of
    medical device software, emphasizing that:
    - Valid clinical association must be demonstrated between the
      software output and the clinical condition.
    - Technical performance (sensitivity, specificity, accuracy) must
      be validated against clinical ground truth.
    - Clinical performance must be evaluated in the intended use
      environment with the intended user population.
references:
  - citation: "EU MDR 2017/745, Articles 61–62, Annex XIV"
    url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32017R0745"
  - citation: "MDCG 2020-1 — Guidance on clinical evaluation of medical device software"
    url: "https://health.ec.europa.eu/system/files/2020-09/md_mdcg_2020_1_guidance_clinic_eva_md_software_en_0.pdf"
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement a clinical data management platform that stores,
         versions, and provides controlled access to clinical evaluation
         data, including literature references, clinical investigation
         results, and post-market clinical follow-up data.
      2. Deploy analytics infrastructure for algorithm performance
         monitoring, tracking sensitivity, specificity, accuracy, and
         other relevant performance metrics against clinical ground
         truth datasets in production.
      3. Configure data pipelines that continuously aggregate clinical
         performance data from deployed devices, anonymize patient
         information, and make it available for clinical evaluation
         updates.
      4. Implement A/B testing and shadow mode capabilities for
         evaluating new algorithm versions against the current production
         version using real-world clinical data without affecting patient
         care.
    tools:
      - clinical-data-platform
      - analytics-pipeline
      - mlops-platform
      - ab-testing
      - data-anonymization
  devsecops:
    prose: |
      1. Implement automated algorithm performance testing as part of
         the CI/CD pipeline, running the algorithm against curated
         clinical datasets and comparing results to expected outputs
         with defined acceptance thresholds.
      2. Configure automated performance regression detection: if a
         code change degrades clinical performance metrics (sensitivity,
         specificity, PPV, NPV) below predefined thresholds, the
         pipeline blocks the release.
      3. Implement traceability between clinical evaluation evidence,
         software requirements, and verification/validation test cases,
         ensuring that each clinical claim is supported by traceable
         evidence.
      4. Establish version-controlled clinical evaluation documentation
         that is updated as part of the release process, with pipeline
         checks ensuring clinical evaluation review is complete before
         production deployment.
    tools:
      - gitlab-ci
      - ml-testing
      - clinical-performance-metrics
      - traceability-tooling
      - documentation-pipeline
  secops:
    prose: |
      1. Maintain a clinical evaluation report (CER) for each device
         that is reviewed and updated at least annually, or more
         frequently when new clinical data becomes available or when
         the device is modified.
      2. Establish a post-market clinical follow-up (PMCF) plan that
         defines how clinical evidence will be proactively gathered
         after market placement to confirm safety and performance.
      3. Implement a literature surveillance process that systematically
         searches published literature for new evidence relevant to the
         device's safety, performance, and clinical context.
      4. Conduct periodic clinical evaluation review meetings with
         clinical, regulatory, and development stakeholders to assess
         whether the clinical evidence base remains adequate and
         current.
    tools:
      - clinical-evaluation-management
      - literature-surveillance
      - pmcf-tracking
      - regulatory-review
