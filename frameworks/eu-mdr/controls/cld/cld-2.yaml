id: cld-2
family: cld
title: "Post-Market Clinical Follow-Up"
class: EU-MDR
baselines: [mdr-essential]
statement:
  prose: |
    The post-market clinical follow-up shall be a continuous process that
    updates the clinical evaluation and shall be addressed in the
    manufacturer's post-market surveillance plan. When conducting
    post-market clinical follow-up, the manufacturer shall proactively
    collect and evaluate clinical data from the use of a device which
    bears the CE marking and is placed on the market or put into service
    within its intended purpose as referred to in the relevant conformity
    assessment procedure, with the aim of confirming the safety and
    performance throughout the expected lifetime of the device, ensuring
    the continued acceptability of identified risks and detecting emerging
    risks on the basis of factual evidence.

    Post-market clinical follow-up shall be performed pursuant to a
    post-market clinical follow-up plan. The manufacturer shall specify
    in the PMCF plan the methods and procedures for proactively collecting
    and evaluating clinical data with the aim of confirming: (a) the safety
    and performance of the device throughout its expected lifetime;
    (b) the continued acceptability of identified risks; (c) detection of
    emerging risks on the basis of factual evidence.

    The PMCF plan shall specify the general methods and procedures of the
    PMCF to be applied, such as gathering of clinical experience gained,
    feedback from users including healthcare professionals, screening of
    published and unpublished literature, and other clinical data sources
    relevant to the device.
guidance:
  prose: |
    Post-market clinical follow-up (PMCF) is the proactive clinical
    surveillance component of post-market surveillance. For software
    medical devices, PMCF has distinct advantages and challenges:

    Advantages:
    - Software devices can collect real-world performance data
      automatically through telemetry and analytics.
    - Large-scale clinical performance monitoring is feasible through
      digital data collection.
    - Algorithm performance can be continuously monitored against
      clinical outcomes.

    Challenges:
    - Software evolves rapidly, requiring continuous PMCF rather than
      periodic studies.
    - Each software version may have different performance characteristics.
    - User behavior and clinical context may vary significantly across
      deployment sites.
    - Regulatory requirements for PMCF studies versus routine data
      collection must be understood.

    MDCG 2020-7 and 2020-8 provide templates and guidance for PMCF
    plans and reports. Key PMCF activities include:
    - Real-world performance monitoring through device telemetry.
    - User surveys and feedback collection.
    - Registry studies and observational studies.
    - Literature surveillance.
references:
  - citation: "EU MDR 2017/745, Article 61(11), Annex XIV Part B"
    url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32017R0745"
  - citation: "MDCG 2020-7 — PMCF plan and report templates"
    url: "https://health.ec.europa.eu/system/files/2020-09/md_mdcg_2020_7_guidance_pmcf_plan_template_en_0.pdf"
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement privacy-preserving clinical analytics that collect
         real-world performance data from deployed devices, including
         algorithm accuracy metrics, clinical outcome indicators, and
         usage patterns, with differential privacy or federated
         learning techniques where appropriate.
      2. Deploy clinical outcome tracking capabilities that correlate
         device outputs with clinical outcomes (when available through
         integration with hospital information systems or user-reported
         outcomes).
      3. Configure automated reporting pipelines that generate PMCF
         data summaries at defined intervals, comparing current
         performance against historical baselines and clinical
         evaluation benchmarks.
      4. Implement a clinical data lake with appropriate access controls,
         audit logging, and anonymization for long-term storage and
         analysis of PMCF data.
    tools:
      - clinical-analytics
      - data-lake
      - federated-learning
      - data-anonymization
      - reporting-pipeline
  devsecops:
    prose: |
      1. Implement automated clinical performance monitoring in
         production, with dashboards tracking key performance indicators
         (sensitivity, specificity, accuracy, F1-score) per software
         version, deployment site, and clinical context.
      2. Configure drift detection algorithms that identify statistical
         changes in device performance, input data distributions, or
         user behavior patterns, triggering clinical evaluation review
         when significant drift is detected.
      3. Implement automated PMCF report generation from collected data,
         producing structured reports that can be reviewed by clinical
         affairs and submitted as part of the PMCF documentation.
      4. Establish version-specific performance tracking that maintains
         clinical performance baselines for each software version and
         compares new versions against established baselines during
         validation.
    tools:
      - ml-monitoring
      - drift-detection
      - performance-dashboards
      - reporting-automation
      - version-tracking
  secops:
    prose: |
      1. Maintain a PMCF plan for each device that defines specific
         clinical questions, data sources, collection methods, analysis
         procedures, timelines, and responsibilities.
      2. Produce PMCF evaluation reports at defined intervals (at least
         annually for Class III and implantable devices) documenting
         collected data, analysis results, conclusions on safety and
         performance, and any actions taken.
      3. Implement a clinical advisory board or user advisory group that
         provides periodic feedback on device clinical performance,
         usability, and emerging clinical needs.
      4. Integrate PMCF findings into the clinical evaluation report
         update cycle, ensuring that real-world evidence continuously
         informs the benefit-risk assessment.
    tools:
      - pmcf-management
      - clinical-evaluation-management
      - regulatory-reporting
      - advisory-board-management
