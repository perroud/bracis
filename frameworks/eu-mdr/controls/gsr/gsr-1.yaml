id: gsr-1
family: gsr
title: "General Risk Management and Safety Requirements"
class: EU-MDR
baselines: [mdr-essential]
statement:
  prose: |
    Devices shall achieve the performance intended by their manufacturer
    and shall be designed and manufactured in such a way that, during
    normal conditions of use, they are suitable for their intended purpose.
    They shall be safe and effective and shall not compromise the clinical
    condition or the safety of patients, or the safety and health of users
    or, where applicable, other persons, provided that any risks which may
    be associated with their use constitute acceptable risks when weighed
    against the benefits to the patient and are compatible with a high level
    of protection of health and safety, taking into account the generally
    acknowledged state of the art.

    Manufacturers shall establish, document, implement and maintain a
    system for risk management. Risk management shall be understood as a
    continuous iterative process throughout the entire lifecycle of a
    device, requiring regular systematic updating. In carrying out risk
    management, manufacturers shall: (a) establish and document a risk
    management plan for each device; (b) identify and analyse the known
    and foreseeable hazards associated with each device; (c) estimate and
    evaluate the risks associated with, and occurring during, the intended
    use and during reasonably foreseeable misuse; (d) eliminate or control
    the risks referred to in point (c) in accordance with the requirements
    of Section 4; (e) evaluate the impact of information from the
    production phase and, in particular, from the post-market surveillance
    system, on hazards and the frequency of occurrence thereof, on
    estimates of their associated risks, as well as on the overall risk,
    benefit-risk ratio and risk acceptability; and (f) based on the
    evaluation of the impact of the information referred to in point (e),
    if necessary amend control measures.
guidance:
  prose: |
    Annex I, Chapter I, Sections 1–4 establish the foundational safety and
    performance requirements for all medical devices under EU MDR. The risk
    management obligation is continuous across the entire device lifecycle,
    not a one-time activity. Manufacturers must adopt ISO 14971 as the
    recognized standard for risk management processes.

    Key implementation considerations:
    - Risk management must cover design, manufacturing, deployment, use,
      maintenance, and decommissioning phases.
    - The benefit-risk analysis must be documented and updated whenever
      new safety information becomes available.
    - Residual risks must be communicated to users through labelling and
      instructions for use (IFU).
    - Risk control measures must follow the hierarchy: inherent safety
      by design, protective measures, information for safety.
    - Foreseeable misuse scenarios must be included in the risk analysis.
references:
  - citation: "EU MDR 2017/745, Annex I, Chapter I, Sections 1–4"
    url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32017R0745"
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement a risk management repository or dedicated module within
         the quality management platform that maintains risk management
         files for each device, including hazard identification, risk
         estimation, and risk evaluation records.
      2. Create infrastructure templates (IaC) that enforce security
         baselines for medical device software environments, covering
         network isolation, access control, and encryption at rest and
         in transit.
      3. Deploy monitoring and alerting pipelines that continuously
         evaluate system health metrics, error rates, and anomaly
         detection to feed back into the risk management process.
      4. Maintain configuration management databases (CMDB) linking
         device components to their risk assessment status and residual
         risk acceptance decisions.
    tools:
      - iso-14971-risk-matrix
      - cmdb
      - terraform
      - prometheus
      - grafana
  devsecops:
    prose: |
      1. Integrate risk management gates into CI/CD pipelines that
         require risk assessment artifacts (hazard analysis, FMEA) to
         be linked to each feature branch before merge approval.
      2. Implement automated traceability between requirements, design
         inputs, risk controls, and verification/validation test cases
         using bidirectional linking in the project management tool.
      3. Configure static analysis and linting rules that detect unsafe
         coding patterns specific to medical device software (e.g.,
         unhandled exceptions in safety-critical paths, missing input
         validation on clinical data).
      4. Enforce code review policies requiring a minimum of two
         reviewers with documented competence in risk management for
         safety-critical modules.
    tools:
      - gitlab-ci
      - requirements-traceability
      - fmea-tooling
      - sonarqube
      - semgrep
  secops:
    prose: |
      1. Establish a risk management review board that meets at defined
         intervals to review new hazard information, incident reports,
         and post-market surveillance data.
      2. Maintain a risk management file for each device that includes
         the risk management plan, risk analysis, risk evaluation, risk
         control records, residual risk evaluation, risk management
         report, and production/post-production information.
      3. Implement a process for evaluating and documenting the impact
         of security incidents on the device risk profile, triggering
         risk re-evaluation when new vulnerabilities are discovered.
      4. Conduct annual risk management audits aligned with ISO 14971
         and EU MDR Annex I requirements, documenting findings and
         corrective actions in the QMS.
    tools:
      - grc-platform
      - iso-14971-tooling
      - incident-management
      - audit-trail
