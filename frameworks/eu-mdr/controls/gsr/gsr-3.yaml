id: gsr-3
family: gsr
title: "Protection Against Unauthorized Access and Data Integrity"
class: EU-MDR
baselines: [mdr-essential]
statement:
  prose: |
    Devices shall be designed and manufactured in such a way as to protect,
    as far as possible, against unauthorised access that could hamper the
    device from functioning as intended.

    Devices that are intended to process, store or transmit personal data
    shall be designed and manufactured in such a way as to ensure that
    data integrity, confidentiality and availability are adequately
    protected. For devices intended to be used by lay persons, the design
    and construction shall take into account the relevant skills and the
    means available to lay persons and the influence of reasonably
    foreseeable variations in the lay person's technique and environment.

    Devices shall be designed and manufactured in such a way as to reduce
    as far as possible and appropriate the risks from the unintended
    ingress of substances into the device, taking into account the device
    and the nature of the environment in which it is intended to be used.
guidance:
  prose: |
    Annex I, Section 18.8 and related provisions establish cybersecurity
    and data protection requirements that apply to all devices processing
    personal or clinical data. This is one of the most software-relevant
    provisions of the EU MDR, directly addressing:

    - Authentication and authorization controls to prevent unauthorized
      access to device functionality and data.
    - Data integrity mechanisms ensuring clinical data cannot be
      corrupted, altered, or lost without detection.
    - Confidentiality controls including encryption of personal health
      data at rest and in transit.
    - Availability requirements ensuring the device remains functional
      when needed for clinical purposes.

    These requirements must be addressed in the context of GDPR
    compliance, as medical devices processing personal data are subject
    to both EU MDR and GDPR simultaneously. The MDCG 2019-16 guidance
    document provides additional interpretation on cybersecurity
    requirements.
references:
  - citation: "EU MDR 2017/745, Annex I, Section 18.8"
    url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32017R0745"
  - citation: "MDCG 2019-16 rev.1 — Guidance on Cybersecurity for Medical Devices"
    url: "https://health.ec.europa.eu/system/files/2020-09/md_cybersecurity_en_0.pdf"
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement zero-trust network architecture for medical device
         infrastructure with micro-segmentation, mutual TLS between
         services, and network policies enforcing least-privilege
         communication.
      2. Deploy identity and access management (IAM) with role-based
         access control (RBAC), enforcing multi-factor authentication
         for all administrative and clinical user access.
      3. Enable encryption at rest (AES-256) for all persistent storage
         containing personal health data and encryption in transit
         (TLS 1.3) for all network communications.
      4. Implement data integrity verification mechanisms (checksums,
         digital signatures) for clinical data at storage and
         transmission boundaries.
      5. Design high-availability architectures with documented uptime
         SLAs aligned to clinical criticality classification.
    tools:
      - vault
      - keycloak
      - istio
      - cert-manager
      - kubernetes-network-policies
  devsecops:
    prose: |
      1. Integrate SAST and DAST scanning in CI/CD pipelines to detect
         authentication bypasses, injection vulnerabilities, and
         insecure data handling patterns before deployment.
      2. Implement secret detection scanning to prevent hardcoded
         credentials, API keys, and cryptographic material from
         entering the codebase.
      3. Enforce secure coding standards for data handling: input
         sanitization, parameterized queries, output encoding, and
         proper session management.
      4. Configure dependency scanning to detect known vulnerabilities
         in third-party libraries, with automated alerts for critical
         CVEs affecting medical device components.
      5. Implement container image scanning ensuring base images are
         free of known vulnerabilities before deployment.
    tools:
      - gitlab-sast
      - gitlab-dast
      - gitlab-secret-detection
      - gitlab-dependency-scanning
      - gitlab-container-scanning
      - trivy
  secops:
    prose: |
      1. Deploy a Security Information and Event Management (SIEM)
         system to monitor and alert on unauthorized access attempts,
         privilege escalation, and anomalous data access patterns.
      2. Implement data loss prevention (DLP) controls for personal
         health data, monitoring and blocking unauthorized data
         exfiltration channels.
      3. Conduct penetration testing at least annually and after
         significant changes, documenting findings and remediation
         in the device risk management file.
      4. Establish an incident response plan specific to medical device
         cybersecurity events, including notification procedures to
         competent authorities under MDR Article 87.
      5. Maintain audit logs with tamper-evident storage for a minimum
         retention period aligned with the device's expected lifetime.
    tools:
      - siem
      - dlp
      - penetration-testing
      - incident-response
      - audit-logging
