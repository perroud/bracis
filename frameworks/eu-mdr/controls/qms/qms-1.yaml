id: qms-1
family: qms
title: "Quality Management System for Manufacturers"
class: EU-MDR
baselines: [mdr-essential]
statement:
  prose: |
    Manufacturers of devices shall establish, document, implement,
    maintain, keep up to date and continually improve a quality management
    system that shall ensure compliance with this Regulation in the most
    effective manner and in a manner that is proportionate to the risk
    class and the type of device.

    The quality management system shall address at least the following
    aspects: (a) a strategy for regulatory compliance, including
    compliance with conformity assessment procedures and procedures for
    management of modifications to the devices covered by the system;
    (b) identification of applicable general safety and performance
    requirements and exploration of options to address those requirements;
    (c) responsibility of the management; (d) resource management,
    including selection and control of suppliers and sub-contractors;
    (e) risk management; (f) clinical evaluation; (g) product realisation,
    including planning, design, development, production and service
    provision; (h) verification of the UDI assignments; (i) setting-up,
    implementation and maintenance of a post-market surveillance system;
    (j) handling of communication with competent authorities, notified
    bodies, other economic operators, customers and/or other stakeholders;
    (k) processes for reporting of serious incidents and field safety
    corrective actions in the context of vigilance; (l) management of
    corrective and preventive actions and verification of their
    effectiveness; (m) processes for monitoring and measurement of output,
    data analysis and product improvement.
guidance:
  prose: |
    Article 10(9) mandates a comprehensive QMS for all medical device
    manufacturers. The QMS must be proportionate to the device risk class
    and cover the entire product lifecycle from design through
    decommissioning.

    ISO 13485:2016 is the harmonized standard for medical device QMS and
    provides a recognized framework for demonstrating compliance with
    EU MDR Article 10(9). Key considerations:

    - The QMS must be documented and maintained, not just established.
    - Management review must be conducted at planned intervals.
    - Corrective and preventive action (CAPA) processes must be
      systematic and effective.
    - Supplier and subcontractor controls are mandatory, including
      for cloud infrastructure providers and third-party software
      components.
    - The QMS must integrate with post-market surveillance and
      vigilance processes.
    - Personnel competence must be documented and maintained.

    For software medical device companies using agile development
    methodologies, the QMS must be adapted to accommodate iterative
    development while maintaining the required documentation and
    traceability.
references:
  - citation: "EU MDR 2017/745, Article 10(9)"
    url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32017R0745"
  - citation: "ISO 13485:2016 — Medical devices — Quality management systems"
    url: "https://www.iso.org/standard/59752.html"
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement an electronic quality management system (eQMS) with
         integrated document control, CAPA management, audit management,
         and training management modules.
      2. Configure infrastructure monitoring dashboards that feed quality
         metrics into the QMS: system availability, error rates, incident
         counts, deployment frequency, and change failure rate.
      3. Establish automated compliance checks in the deployment pipeline
         that verify QMS process adherence before production releases,
         including design review completion, test coverage thresholds,
         and documentation completeness.
      4. Implement supplier qualification workflows for cloud providers
         and third-party service dependencies, including SOC 2 report
         review, SLA monitoring, and periodic re-assessment.
    tools:
      - eqms-platform
      - gitlab-ci
      - prometheus
      - grafana
      - supplier-management
  devsecops:
    prose: |
      1. Map agile development ceremonies to QMS process requirements:
         sprint planning to design planning, code review to design
         verification, sprint demo to design validation, retrospective
         to management review.
      2. Implement automated documentation generation from code
         artifacts: API documentation from code comments, architecture
         diagrams from infrastructure-as-code, test reports from CI
         pipelines, and traceability matrices from issue-code linkages.
      3. Configure CAPA tracking integration between the defect tracking
         system and the eQMS, ensuring all quality events are captured,
         investigated, and resolved with documented root cause analysis.
      4. Enforce the definition of done (DoD) for each merge request to
         include QMS requirements: updated requirements traceability,
         completed risk assessment, passing verification tests, and
         peer review sign-off.
    tools:
      - gitlab-ci
      - gitlab-issues
      - documentation-generation
      - capa-tracking
      - traceability-tooling
  secops:
    prose: |
      1. Conduct management reviews at planned intervals (at least
         annually) covering QMS effectiveness, audit results, CAPA
         status, customer feedback, process performance, supplier
         performance, and regulatory changes.
      2. Maintain a controlled document repository with version control,
         review/approval workflows, distribution records, and periodic
         review schedules for all QMS documents.
      3. Implement a training management system that tracks competence
         requirements, training completion, and effectiveness assessment
         for all personnel involved in device design, manufacturing,
         and post-market activities.
      4. Establish internal audit programs with scheduled audits of all
         QMS processes, documented findings, corrective actions, and
         effectiveness verification.
    tools:
      - eqms-platform
      - document-management
      - training-management
      - audit-management
