id: qms-3
family: qms
title: "Corrective and Preventive Actions (CAPA)"
class: EU-MDR
baselines: [mdr-essential]
statement:
  prose: |
    The quality management system shall address processes for the
    management of corrective and preventive actions and verification
    of their effectiveness. Manufacturers shall establish, document
    and maintain procedures for:

    (a) analysing non-conformities, including complaints, field safety
    corrective actions, recalls, deviations, audit findings, and
    post-market surveillance data; (b) determining the root causes of
    non-conformities; (c) determining the corrective actions needed to
    prevent recurrence; (d) determining the preventive actions needed
    to prevent the occurrence of non-conformities; (e) implementing
    corrective and preventive actions and recording all activities;
    (f) reviewing and verifying the effectiveness of corrective and
    preventive actions taken.

    The manufacturer shall ensure that corrective and preventive actions
    are proportionate to the effects of the non-conformities encountered
    and shall document the results of any investigation and the actions
    taken.
guidance:
  prose: |
    CAPA is a cornerstone of the QMS and is heavily scrutinized during
    notified body audits. Under EU MDR, CAPA must be integrated with
    the post-market surveillance system, vigilance reporting, and risk
    management processes.

    Key CAPA principles for software medical devices:
    - Root cause analysis must be systematic (e.g., 5 Whys, Ishikawa,
      fault tree analysis) and documented.
    - Corrective actions address existing non-conformities; preventive
      actions address potential non-conformities identified through
      trend analysis and risk assessment.
    - CAPA effectiveness must be verified through objective evidence,
      not simply closing the CAPA record.
    - CAPA timelines must be defined and tracked, with escalation
      mechanisms for overdue actions.
    - CAPA trending and analysis should feed into management review
      and drive continual improvement.

    For software teams, CAPA integrates with the bug tracking and
    incident management processes, requiring a structured bridge between
    development workflows and quality system processes.
references:
  - citation: "EU MDR 2017/745, Article 10(9)(l)"
    url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32017R0745"
  - citation: "ISO 13485:2016, Section 8.5"
    url: "https://www.iso.org/standard/59752.html"
implementation_guidance:
  platform_engineering:
    prose: |
      1. Deploy a CAPA management module within the eQMS that tracks
         the full lifecycle: initiation, investigation, root cause
         analysis, action planning, implementation, effectiveness
         verification, and closure.
      2. Implement automated alerting for system-level events that may
         trigger CAPA: repeated deployment failures, recurring error
         patterns, SLA breaches, and security incidents.
      3. Configure integration between monitoring systems and the CAPA
         module, enabling automatic CAPA initiation from defined
         threshold breaches with pre-populated incident details.
      4. Maintain dashboards showing CAPA metrics: open CAPAs by age,
         category, and severity; overdue actions; effectiveness
         verification status; and trend analysis.
    tools:
      - eqms-platform
      - prometheus
      - alertmanager
      - grafana
      - capa-tracking
  devsecops:
    prose: |
      1. Integrate CAPA workflows with the issue tracking system,
         enabling seamless transition from development defects to
         formal CAPA records when defects have quality or safety
         implications.
      2. Implement automated root cause analysis tooling: stack trace
         analysis, log correlation, deployment change correlation,
         and dependency impact analysis to accelerate investigation.
      3. Configure CI/CD pipeline enhancements as CAPA corrective
         actions: new automated tests, additional scanning rules,
         updated coding standards, or new pipeline gates based on
         lessons learned.
      4. Implement post-mortem templates in the development workflow
         that capture root cause, contributing factors, corrective
         actions, and preventive measures in a format compatible
         with the eQMS CAPA process.
    tools:
      - gitlab-issues
      - gitlab-ci
      - root-cause-analysis
      - post-mortem-tooling
      - test-automation
  secops:
    prose: |
      1. Establish CAPA review boards that meet at defined intervals
         to review open CAPAs, approve root cause analyses, evaluate
         proposed corrective/preventive actions, and verify
         effectiveness.
      2. Implement trending analysis of CAPA data to identify systemic
         issues, recurring failure modes, and areas requiring process
         improvement.
      3. Maintain CAPA records with complete documentation: non-conformity
         description, investigation records, root cause analysis,
         action plan, implementation evidence, and effectiveness
         verification results.
      4. Integrate CAPA outcomes into management review input, ensuring
         that systemic quality issues are addressed at the organizational
         level with appropriate resource allocation.
    tools:
      - eqms-platform
      - trending-analysis
      - management-review
      - audit-trail
legal_references:
  - framework_id: iso-27001-2022
    articles: ["10.1", "10.2"]
    relationship: mapped
  - framework_id: anvisa-samd
    articles: ["art-22"]
    relationship: mapped
