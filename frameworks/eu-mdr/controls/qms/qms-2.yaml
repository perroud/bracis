id: qms-2
family: qms
title: "Technical Documentation and Design History File"
class: EU-MDR
baselines: [mdr-essential]
statement:
  prose: |
    Before placing a device on the market, manufacturers shall draw up
    and keep up to date technical documentation for that device. The
    technical documentation shall be such as to allow the conformity of
    the device with the requirements of this Regulation to be assessed.

    The technical documentation shall include, in particular, the
    following elements: (a) a device description and specification,
    including variants and accessories; (b) information to be supplied
    by the manufacturer; (c) design and manufacturing information;
    (d) general safety and performance requirements; (e) benefit-risk
    analysis and risk management; (f) product verification and validation.

    Annexes II and III specify the detailed content requirements for
    technical documentation, including the design and manufacturing
    information, the clinical evaluation documentation, and the
    post-market surveillance documentation.

    The technical documentation and, if applicable, the summary thereof
    shall be drawn up in a clear, organised, readily searchable and
    unambiguous manner and shall include the elements listed in
    Annexes II and III.
guidance:
  prose: |
    The technical documentation requirement under EU MDR is significantly
    more comprehensive than under the predecessor MDD. For software
    medical devices, the technical documentation must include:

    - Device description: intended purpose, indications, contraindications,
      target population, software architecture, system requirements, and
      interoperability specifications.
    - Design and manufacturing information: software development lifecycle
      documentation, design inputs/outputs, verification and validation
      reports, configuration management records.
    - Risk management file: risk management plan, hazard analysis, FMEA,
      risk evaluation, risk control measures, residual risk evaluation,
      risk management report.
    - Clinical evaluation report: literature review, equivalence analysis,
      clinical data assessment, benefit-risk determination.
    - SBOM: software bill of materials listing all third-party components.

    Annex II requires the technical documentation to be structured and
    comprehensive enough for a notified body to assess conformity without
    requiring additional information from the manufacturer.
references:
  - citation: "EU MDR 2017/745, Article 10(4), Annexes II and III"
    url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32017R0745"
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement a documentation-as-code approach where technical
         documentation is maintained in version-controlled repositories
         alongside the device software, ensuring documentation and code
         evolve together.
      2. Configure automated documentation build pipelines that compile
         technical documentation from structured sources (markdown, YAML,
         diagrams-as-code) into publishable formats (PDF, HTML) for
         regulatory submission.
      3. Deploy a document management system integrated with the version
         control platform, providing controlled access, review workflows,
         digital signatures, and audit trails for all technical
         documentation.
      4. Implement automated architecture diagram generation from
         infrastructure-as-code and application code, ensuring the
         technical documentation accurately reflects the current system
         architecture.
    tools:
      - mkdocs
      - gitlab-ci
      - document-management
      - plantuml
      - mermaid
  devsecops:
    prose: |
      1. Implement automated traceability matrix generation linking
         requirements to design specifications, implementation artifacts
         (code), verification tests, and validation evidence, ensuring
         complete bidirectional traceability.
      2. Configure automated SBOM generation using tools like Syft or
         CycloneDX, producing a comprehensive list of all third-party
         components, their versions, and licenses for inclusion in the
         technical documentation.
      3. Enforce documentation completeness gates in the CI/CD pipeline:
         each release must have an associated design history file entry,
         updated risk assessment, verification report, and release notes.
      4. Implement automated test report generation that produces
         formatted verification and validation reports from CI pipeline
         test results, suitable for inclusion in the technical
         documentation.
    tools:
      - gitlab-ci
      - syft
      - cyclonedx
      - traceability-tooling
      - test-reporting
  secops:
    prose: |
      1. Maintain a technical documentation index that maps each MDR
         Annex II/III requirement to the corresponding document, its
         location, current version, and review status.
      2. Implement periodic technical documentation reviews (at least
         annually and before each regulatory submission) to verify
         completeness, accuracy, and consistency across all document
         sections.
      3. Establish a change control process for technical documentation
         ensuring that changes are reviewed, approved, and distributed
         to relevant stakeholders, including the notified body when
         applicable.
      4. Archive superseded documentation versions with retention
         policies aligned to regulatory requirements (minimum 10 years
         after the last device is placed on the market, or 15 years
         for implantable devices).
    tools:
      - document-management
      - regulatory-information-management
      - archive-system
      - change-control
legal_references:
