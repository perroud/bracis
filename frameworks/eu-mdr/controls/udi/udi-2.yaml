id: udi-2
family: udi
title: "EUDAMED Registration and Traceability"
class: EU-MDR
baselines: [mdr-essential]
statement:
  prose: |
    The Commission, after consulting the Medical Device Coordination
    Group, shall set up, maintain and manage the European database on
    medical devices (EUDAMED). EUDAMED shall have the following
    objectives: (a) enabling the public to be adequately informed about
    devices placed on the market, the corresponding certificates issued
    by notified bodies and the relevant economic operators; (b) enabling
    unique identification of devices within the internal market and
    facilitating their traceability; (c) enabling the public to be
    adequately informed about clinical investigations and enabling
    sponsors of clinical investigations to comply with certain
    obligations; (d) enabling manufacturers to comply with information
    obligations; (e) enabling the competent authorities of the Member
    States and the Commission to carry out their tasks relating to this
    Regulation on a well-informed basis and enhancing the cooperation
    between them.

    Before placing a device, other than a custom-made device, on the
    market, the manufacturer shall, in accordance with the rules of the
    issuing entity, assign a unique device identifier to the device and
    shall provide it together with the other core data elements to the
    UDI database.

    Economic operators shall store and keep the UDI of the devices which
    they have supplied or been supplied with, in order to ensure
    traceability of those devices.
guidance:
  prose: |
    Article 33 and related provisions establish EUDAMED as the central
    European database for medical device information. For software medical
    device manufacturers, EUDAMED registration involves:

    - Actor registration: manufacturer registration as an economic
      operator in EUDAMED.
    - UDI/Device registration: submission of UDI data and device
      information for each marketed software version.
    - Certificate registration: linking CE certificates from the
      notified body to the device record.
    - Vigilance reporting: submission of serious incident reports and
      FSCA notifications through EUDAMED.
    - Clinical investigation registration: registration of clinical
      investigations conducted under EU MDR.

    Traceability obligations extend to all economic operators in the
    supply chain. For software delivered electronically, the traceability
    chain is primarily digital:
    - Manufacturer maintains deployment records (which versions are
      deployed where).
    - Distributors/importers maintain transaction records.
    - Healthcare institutions should maintain records of software
      versions in use.

    EUDAMED is being deployed in modules, and full functionality is
    expected to replace the current national registration systems.
references:
  - citation: "EU MDR 2017/745, Articles 28–33, Annex VI Part B"
    url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32017R0745"
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement automated EUDAMED data submission workflows
         integrated with the release pipeline, submitting updated
         device information, UDI data, and SSCP (Summary of Safety
         and Clinical Performance) upon each new version release.
      2. Deploy a device registry platform that maintains a complete
         inventory of all deployed software instances, linking each
         deployment to its UDI-PI (version), deployment date,
         customer site, and current status.
      3. Configure integration APIs between the internal device
         registry and EUDAMED, enabling bidirectional data flow:
         outbound for registration submissions and inbound for
         regulatory status updates.
      4. Implement supply chain traceability logging that records
         all distribution events (electronic delivery, licensing,
         activation) with timestamps and economic operator
         identification.
    tools:
      - eudamed-api
      - device-registry
      - distribution-management
      - supply-chain-tracking
      - api-integration
  devsecops:
    prose: |
      1. Automate EUDAMED data preparation as part of the release
         pipeline, generating structured data files containing
         device description, UDI, classification, intended purpose,
         and SSCP references in the required format.
      2. Implement validation checks that verify EUDAMED data
         completeness and format compliance before submission,
         preventing incomplete or invalid registrations.
      3. Configure license management integration that tracks software
         activation and distribution events, providing the data
         foundation for traceability across the supply chain.
      4. Implement automated compliance dashboards showing EUDAMED
         registration status for all marketed software versions,
         flagging versions approaching renewal deadlines or requiring
         updated information.
    tools:
      - gitlab-ci
      - eudamed-validation
      - license-management
      - compliance-dashboards
      - release-management
  secops:
    prose: |
      1. Designate a regulatory affairs responsible person (PRRC —
         Person Responsible for Regulatory Compliance per Article 15)
         who oversees EUDAMED registration, UDI compliance, and
         traceability obligations.
      2. Maintain a master device list documenting all marketed
         devices, their EUDAMED registration status, UDI assignments,
         notified body certificates, and applicable regulatory
         approvals in all markets.
      3. Implement a traceability verification process that
         periodically reconciles deployment records with customer
         inventories, identifying any gaps in traceability coverage.
      4. Establish procedures for responding to competent authority
         queries through EUDAMED, including designated response
         personnel, SLA commitments, and documentation requirements.
    tools:
      - regulatory-information-management
      - eudamed
      - device-master-list
      - traceability-verification
