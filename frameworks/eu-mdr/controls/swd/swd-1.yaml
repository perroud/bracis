id: swd-1
family: swd
title: "Software Lifecycle and Development Requirements"
class: EU-MDR
baselines: [mdr-essential]
statement:
  prose: |
    Devices that incorporate electronic programmable systems, including
    software, or software that are devices in themselves, shall be
    designed to ensure repeatability, reliability and performance in line
    with their intended use. In the event of a single fault condition,
    appropriate means shall be adopted to eliminate or reduce as far as
    possible consequent risks or impairment of performance.

    For devices that incorporate software or for software that are devices
    in themselves, the software shall be developed and manufactured in
    accordance with the state of the art taking into account the
    principles of development life cycle, risk management, including
    information security, verification and validation.

    The manufacturer shall specify minimum requirements concerning
    hardware, IT networks characteristics and IT security measures,
    including protection against unauthorised access, necessary to run
    the software as intended.
guidance:
  prose: |
    Annex I, Section 17.1–17.2 establishes that software medical devices
    must be developed following a recognized software development lifecycle
    model. IEC 62304 (Medical device software — Software life cycle
    processes) is the harmonized standard referenced for compliance.

    Key lifecycle requirements:
    - A documented software development plan covering requirements
      analysis, architecture design, detailed design, implementation,
      integration testing, system testing, and release.
    - Software safety classification based on the potential for harm
      (Class A, B, or C per IEC 62304).
    - Configuration management ensuring all software items are
      identified, version-controlled, and traceable.
    - Problem resolution processes for handling software anomalies
      discovered during development and post-release.
    - Software maintenance processes covering corrective, adaptive,
      and perfective maintenance activities.

    The state of the art in software development includes modern DevOps
    practices, automated testing, continuous integration, and
    infrastructure as code, all of which must be applied within the
    regulatory framework.
references:
  - citation: "EU MDR 2017/745, Annex I, Section 17.1–17.2"
    url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32017R0745"
  - citation: "IEC 62304:2006+AMD1:2015 — Medical device software — Software life cycle processes"
    url: "https://www.iso.org/standard/71604.html"
implementation_guidance:
  platform_engineering:
    prose: |
      1. Establish a standardized development environment using
         containerized development workspaces with pre-configured
         toolchains that enforce consistent build and test processes
         across the team.
      2. Implement GitOps-based deployment pipelines with environment
         promotion workflows (dev, staging, validation, production)
         that map to the IEC 62304 lifecycle phases.
      3. Configure infrastructure-as-code (IaC) for all environments
         with version-controlled configuration, ensuring reproducibility
         and auditability of the execution environment.
      4. Maintain a software system architecture document as code
         (e.g., C4 model in a repository) that is updated alongside
         implementation changes and linked to risk management artifacts.
    tools:
      - gitlab-ci
      - kubernetes
      - terraform
      - argocd
      - helm
  devsecops:
    prose: |
      1. Implement a compliance pipeline template that enforces IEC 62304
         lifecycle activities as pipeline stages: requirements tracing,
         design review, code review, unit testing, integration testing,
         system testing, and release approval.
      2. Configure branch protection rules requiring merge request
         approval from designated reviewers, linked test execution
         results, and passing pipeline status before merge.
      3. Enforce traceability between software requirements, design
         specifications, implementation (code), and test cases using
         issue linking and merge request references.
      4. Implement automated software safety classification checks
         that tag software items with their IEC 62304 class (A/B/C)
         and apply corresponding verification requirements.
    tools:
      - gitlab-ci
      - gitlab-merge-requests
      - requirements-traceability
      - test-management
      - code-review
  secops:
    prose: |
      1. Maintain a software development plan (SDP) document for each
         software medical device, reviewed and approved by quality
         assurance, covering all IEC 62304 processes.
      2. Conduct periodic software development process audits to verify
         adherence to the documented lifecycle, including configuration
         management, change control, and problem resolution.
      3. Establish a software anomaly tracking process with
         classification, root cause analysis, impact assessment, and
         resolution verification for all defects discovered during
         development and post-release.
      4. Maintain records of software development activities including
         review minutes, test reports, release records, and maintenance
         logs as part of the design history file.
    tools:
      - quality-management-system
      - document-management
      - defect-tracking
      - audit-trail
