control_families:
  - id: gsr
    title: "General Safety and Performance Requirements"
    description: "Annex I general safety and performance requirements including risk management, design principles, manufacturing controls, and information to be supplied with the device"
    articles: "Annex I, Chapters I–III"
    control_count: 4
  - id: swd
    title: "Software as a Medical Device"
    description: "Software lifecycle requirements, validation, cybersecurity, electronic programmable systems, and software update management under Annex I Section 17"
    articles: "Annex I Section 17, Article 10(9)"
    control_count: 4
  - id: qms
    title: "Quality Management System"
    description: "QMS obligations for manufacturers under Article 10, including design controls, production, post-production, document management, and corrective actions"
    articles: "Article 10, Annex IX"
    control_count: 3
  - id: pms
    title: "Post-Market Surveillance and Vigilance"
    description: "Post-market surveillance planning, periodic safety update reports, vigilance reporting, field safety corrective actions, and trend analysis"
    articles: "Articles 83–92, Article 10(10)"
    control_count: 3
  - id: cld
    title: "Clinical Evaluation and Investigation"
    description: "Clinical evaluation requirements, clinical investigation obligations, performance studies, and ongoing clinical follow-up"
    articles: "Articles 61–82, Annex XIV–XV"
    control_count: 2
  - id: udi
    title: "Unique Device Identification and Traceability"
    description: "UDI system requirements, EUDAMED registration, traceability obligations, and economic operator duties"
    articles: "Articles 27–29, Article 25"
    control_count: 2
related_frameworks:
  - framework_id: anvisa-samd
    relationship: mapped
    description: >-
      ANVISA SaMD RDC 657/2022 maps to EU MDR on software lifecycle, risk
      management, and clinical evaluation requirements for software as medical
      devices, with Brazil's classification following the IMDRF model also
      referenced in EU MDR.
  - framework_id: fda-21-cfr-11
    relationship: mapped
    description: >-
      FDA 21 CFR Part 11 maps to EU MDR electronic records and signature
      requirements, particularly for design history files, manufacturing records,
      and post-market surveillance documentation maintained in electronic systems.
  - framework_id: iec-62443
    relationship: complements
    description: >-
      IEC 62443 complements EU MDR by providing detailed industrial cybersecurity
      controls for connected medical devices, addressing network segmentation,
      secure development lifecycle, and vulnerability management referenced in
      Annex I Section 17.
  - framework_id: iso-27001-2022
    relationship: complements
    description: >-
      ISO 27001:2022 complements EU MDR by providing the information security
      management system framework needed to protect device data, patient
      information, and design documentation throughout the medical device
      lifecycle.
