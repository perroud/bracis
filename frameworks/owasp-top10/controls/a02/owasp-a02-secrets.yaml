id: owasp-a02-secrets
family: a02
title: "A02:2021 — Hardcoded and Exposed Cryptographic Secrets"
class: OWASP-Top10-2021

baselines: [web-application]

statement:
  prose: >-
    Hardcoded and exposed cryptographic secrets represent a critical category of cryptographic
    failure where sensitive cryptographic material — including API keys, database credentials,
    private keys, JWT signing secrets, encryption keys, OAuth client secrets, and service account
    tokens — are embedded in source code, configuration files, container images, environment
    variable definitions committed to source control, or otherwise stored without adequate
    protection. Exposed secrets allow attackers who gain read access to the codebase, a container
    image registry, build artifacts, or deployment configurations to immediately compromise the
    systems and data those secrets protect, often with no further exploitation required.

guidance:
  prose: >-
    Secrets exposure is distinct from weak cryptography but equally severe: a strong AES-256
    encryption key provides zero protection if that key is committed to a public GitHub repository.
    The fundamental requirement is that cryptographic secrets must never be stored in source code,
    version control history, container images, log files, error messages, or any location accessible
    to unauthorized parties. Secrets must be injected at runtime from dedicated secret management
    systems. Prevention requires three complementary layers: pre-commit hooks that block secrets
    before they enter version control, CI/CD pipeline scanning that catches secrets in any build
    artifact or configuration, and periodic auditing of git history (including old commits and
    deleted files) for previously committed secrets that may still exist in the repository history.

references:
  - citation: "OWASP Secrets Management Cheat Sheet"
    url: "https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html"
  - citation: "OWASP Key Management Cheat Sheet"
    url: "https://cheatsheetseries.owasp.org/cheatsheets/Key_Management_Cheat_Sheet.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Deploy HashiCorp Vault or a cloud-native secret manager (AWS Secrets Manager, GCP Secret
      Manager, Azure Key Vault) as the authoritative secret store. Inject secrets at runtime using
      the Vault Agent injector, External Secrets Operator, or native cloud secret store CSI driver —
      never bake secrets into container images or ConfigMaps. Implement dynamic secrets where
      possible: have Vault generate short-lived, automatically rotated database credentials, AWS
      access keys, and X.509 certificates for each workload. Enforce strict Vault policies using
      AppRole or Kubernetes auth methods, granting each service access only to the specific secrets
      it requires. Implement secret leasing and automatic rotation with configured TTLs. Maintain a
      secrets inventory and audit trail using Vault audit logs. Never allow wildcard secret access
      permissions.
    tools:
      - vault
      - external-secrets-operator
      - aws-secrets-manager
      - gcp-secret-manager
      - azure-key-vault
      - sealed-secrets
      - sops

  devsecops:
    prose: >-
      Enable GitLab's built-in Secret Detection in all repositories and configure it to run on
      every merge request. Install pre-commit hooks using tools like git-secrets, detect-secrets,
      or gitleaks on developer workstations to prevent secrets from being committed. Scan the
      entire git history (not just current files) using TruffleHog or gitleaks to find previously
      committed secrets — these remain in the git history even after deletion from the working tree.
      Add container image scanning (Trivy, Grype) for secrets embedded in image layers. Configure
      CI/CD pipeline to scan Helm charts, Kubernetes manifests, and Terraform files for hardcoded
      credentials. Block any pipeline that detects a secret — treat it as a blocking finding, not
      a warning.
    tools:
      - gitlab-secret-detection
      - trufflehog
      - gitleaks
      - detect-secrets
      - trivy
      - semgrep

  secops:
    prose: >-
      Rotate all secrets immediately upon any confirmed or suspected exposure — assume any exposed
      secret is compromised. Implement secret scanning as a continuous process, not just at commit
      time. Monitor Vault audit logs for unusual access patterns (secrets accessed by unexpected
      services, secrets read at high frequency, access from unexpected IP ranges). Set up alerts
      for any secret access outside business hours or from new geographic locations. Review public
      code repositories (GitHub, GitLab public projects) for your organization's secrets using
      continuous scanning services. Maintain a secrets inventory mapping each secret to its owner,
      system, and rotation schedule — review and rotate all secrets on a defined cadence.
    tools:
      - vault
      - splunk
      - elastic-siem
      - crowdstrike
      - trufflehog
      - datadog-security

