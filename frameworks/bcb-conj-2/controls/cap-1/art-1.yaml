id: art-1
family: cap-1
title: "Objeto da Resolucao Conjunta"
class: BCB-CONJ-2
baselines: [todas-ifs]
statement:
  prose: |
    Art. 1. Esta Resolução Conjunta dispõe sobre a notificação de incidentes de
    segurança e sobre os requisitos para gerenciamento do risco cibernético, por
    parte das instituições autorizadas a funcionar pelo Banco Central do Brasil.

    Parágrafo único. Para os fins desta Resolução Conjunta, considera-se incidente
    de segurança qualquer evento adverso, confirmado ou sob suspeita, relacionado à
    segurança dos sistemas de informação ou das infraestruturas de tecnologia, que
    possa comprometer a disponibilidade, a integridade, a confidencialidade ou a
    autenticidade dos dados e dos serviços prestados pela instituição.
guidance:
  prose: |
    O art. 1 define o duplo objeto da Resolucao Conjunta BCB/CMN n. 2/2020:
    1. Notificacao de incidentes de seguranca ao BCB
    2. Requisitos para gerenciamento do risco cibernetico

    **Definicao de incidente de seguranca (paragrafo unico):**
    A resolucao adota uma definicao ampla de incidente, abrangendo:
    - Eventos confirmados OU sob suspeita (nao precisa ser confirmado para acionar
      a obrigacao de investigacao)
    - Quatro dimensoes de impacto: disponibilidade, integridade, confidencialidade
      e autenticidade
    - Sistemas de informacao E infraestruturas de tecnologia (escopo amplo)
    - Dados E servicos prestados (dupla protecao)

    **Diferenca entre incidente de seguranca e incidente relevante:**
    Todo incidente relevante e um incidente de seguranca, mas nem todo incidente de
    seguranca e relevante para fins de notificacao ao BCB. A classificacao de
    relevancia e tratada no art. 3.

    **Relacao com a Resolucao CMN 4.893:**
    Enquanto a 4.893 exige a elaboracao de plano de resposta a incidentes (art. 9)
    e comunicacao generica ao BCB (art. 10), esta resolucao conjunta detalha
    especificamente os criterios, prazos e conteudo da notificacao.

    **Sujeitos regulados:**
    Todas as instituicoes autorizadas a funcionar pelo BCB, sem excecao por porte:
    - Bancos comerciais, de investimento e multiplos
    - Cooperativas de credito
    - Sociedades de credito, financiamento e investimento
    - Instituicoes de pagamento
    - Fintechs autorizadas (SCD, SEP)
    - Demais entidades supervisionadas pelo BCB
implementation_guidance:
  platform_engineering:
    prose: |
      **Taxonomia de incidentes na plataforma:**
      1. Definir taxonomia de incidentes alinhada com as quatro dimensoes regulatorias:
         disponibilidade, integridade, confidencialidade e autenticidade.
      2. Categorizar cada tipo de alerta da plataforma nas dimensoes regulatorias
         (ex: alerta de downtime = disponibilidade; alerta de tampering = integridade).
      3. Implementar campo obrigatorio de classificacao regulatoria em toda abertura
         de incidente.

      **Deteccao abrangente (eventos confirmados e sob suspeita):**
      4. Instrumentacao de telemetria em todas as camadas: infraestrutura, rede,
         aplicacao e dados.
      5. Alertas de anomalia que geram incidentes "sob suspeita" para investigacao,
         nao apenas incidentes confirmados.
      6. Correlacao de eventos via SIEM para identificar incidentes multi-dimensionais
         (ex: ataque que afeta simultaneamente integridade e disponibilidade).

      **Escopo de cobertura:**
      7. Inventario de todos os sistemas de informacao e infraestruturas de tecnologia
         cobertos pela resolucao.
      8. Mapeamento de dependencias entre servicos para avaliar impacto cascata.
      9. Classificacao de criticidade de cada sistema para triagem regulatoria.
    tools:
      - siem
      - monitoring-alerting
      - incident-management
      - cmdb
      - service-mesh
  devsecops:
    prose: |
      **Consciencia regulatoria no ciclo de desenvolvimento:**
      1. Documentacao interna da definicao de incidente de seguranca acessivel
         a todos os desenvolvedores.
      2. Treinamento obrigatorio sobre o que constitui um incidente de seguranca
         nas quatro dimensoes (disponibilidade, integridade, confidencialidade,
         autenticidade).
      3. Integracao da classificacao regulatoria no pipeline de CI/CD:
         cada deploy deve estar vinculado a um sistema classificado.

      **Deteccao no pipeline:**
      4. SAST, DAST e dependency scanning para identificar vulnerabilidades
         que possam originar incidentes.
      5. Secret detection para prevenir vazamento de credenciais (confidencialidade).
      6. Container scanning para detectar imagens comprometidas (integridade).
      7. Alertas de seguranca no pipeline que alimentam o fluxo de incidentes.

      **Rastreabilidade:**
      8. Provenance de artefatos para rastrear origem de componentes comprometidos.
      9. Signed commits e signed images para garantir autenticidade.
      10. Audit trail de todas as mudancas para investigacao de incidentes.
    tools:
      - gitlab-ci
      - sast
      - dast
      - dependency-scanning
      - secret-detection
      - container-scanning
  secops:
    prose: |
      **Operacionalizacao da definicao de incidente:**
      1. Procedimento operacional padrao (POP) para classificar eventos como
         incidentes de seguranca conforme definicao do art. 1.
      2. Criterios objetivos para cada dimensao:
         - Disponibilidade: interrupcao > X minutos, degradacao > Y%
         - Integridade: alteracao nao autorizada de dados, adulteracao de logs
         - Confidencialidade: acesso nao autorizado, vazamento de dados
         - Autenticidade: falsificacao de identidade, comprometimento de credenciais
      3. Fluxo de triagem: evento -> suspeita -> investigacao -> confirmacao/descarte.

      **Gestao do escopo regulatorio:**
      4. Inventario atualizado de todos os sistemas e infraestruturas cobertas
         pela resolucao.
      5. Revisao trimestral do inventario para incluir novos sistemas.
      6. Mapeamento de responsaveis por cada sistema para escalacao.

      **Monitoramento continuo:**
      7. SIEM operacional 24x7 com regras de correlacao alinhadas as quatro dimensoes.
      8. SOC com analistas treinados nos criterios regulatorios da resolucao.
      9. Metricas de cobertura: percentual de sistemas monitorados vs. total.
    tools:
      - siem
      - soar
      - edr-xdr
      - ndr
      - incident-management
      - grc-platform
