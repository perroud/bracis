id: art-14
family: cap-5
title: "Vigencia e Disposicoes Transitarias"
class: BCB-CONJ-2
baselines: [todas-ifs]
statement:
  prose: |
    Art. 14. Esta Resolução Conjunta entra em vigor em 1º de novembro de 2020.

    § 1º As instituições referidas no art. 1 que já possuíam política de segurança
    cibernética na data de publicação desta Resolução Conjunta devem adequar seus
    procedimentos às disposições desta norma até 1º de novembro de 2020.

    § 2º As instituições que ainda não possuíam política de segurança cibernética
    na data de publicação desta Resolução Conjunta devem implementar as disposições
    desta norma no prazo previsto para a elaboração da referida política.

    § 3º As atualizações introduzidas pela Resolução Conjunta nº 6, de 2023,
    entram em vigor em 1º de novembro de 2023.
guidance:
  prose: |
    O art. 14 trata da vigencia e dos prazos de adequacao.

    **Vigencia original:**
    A resolucao foi publicada em 22 de abril de 2020 e entrou em vigor em 1. de
    novembro de 2020, concedendo 6 meses para adequacao.

    **Adequacao para instituicoes existentes (ss 1):**
    Instituicoes que ja tinham politica de seguranca cibernetica (conforme Resolucao
    4.658/2018 ou 4.893/2021) deviam adequar seus procedimentos de notificacao ate
    a data de vigencia.

    **Instituicoes sem politica (ss 2):**
    Instituicoes que ainda nao tinham politica de seguranca cibernetica seguem o
    prazo da Resolucao CMN 4.893 para implementar a politica e, consequentemente,
    os procedimentos de notificacao desta resolucao conjunta.

    **Atualizacao pela Resolucao Conjunta 6/2023 (ss 3):**
    A Resolucao Conjunta n. 6/2023 atualizou diversos dispositivos, incluindo:
    - Reafirmacao do prazo de 24 horas para notificacao
    - Detalhamento dos requisitos de compartilhamento de informacoes
    - Atualizacao dos requisitos de gerenciamento de risco cibernetico
    Estas atualizacoes entraram em vigor em 1. de novembro de 2023.

    **Status atual:**
    Todas as instituicoes autorizadas pelo BCB devem estar em plena conformidade
    com a resolucao e suas atualizacoes. Nao ha mais prazo de adequacao pendente.

    **Implicacao pratica:**
    A resolucao esta em pleno vigor e todas as obrigacoes sao exigiveis. Qualquer
    instituicao que inicie operacoes deve implementar os requisitos desde o primeiro
    dia de funcionamento.
implementation_guidance:
  platform_engineering:
    prose: |
      **Monitoramento de atualizacoes regulatorias:**
      1. Feed de monitoramento de atualizacoes normativas do BCB/CMN.
      2. Processo de impact assessment quando novas resolucoes sao publicadas.
      3. Pipeline de adequacao: nova norma -> gap analysis -> plano de acao ->
         implementacao -> validacao.
      4. Versionamento de controles regulatorios para rastrear adequacao a
         cada atualizacao normativa.

      **Compliance continuo:**
      5. Validacao periodica de que todos os requisitos estao implementados.
      6. Alertas automaticos quando controles regulatorios perdem eficacia.
      7. Dashboard de conformidade com data da ultima validacao de cada requisito.
    tools:
      - grc-platform
      - compliance-scanner
      - monitoring-alerting
  devsecops:
    prose: |
      **Atualizacao de controles no pipeline:**
      1. Policy-as-Code atualizado quando regulamentacao muda.
      2. Changelog regulatorio no repositorio para rastrear mudancas normativas.
      3. Tests de conformidade atualizados a cada nova resolucao.

      **Onboarding regulatorio:**
      4. Template de pipeline para novos sistemas que inclui automaticamente
         todos os controles regulatorios obrigatorios.
      5. Documentacao de requisitos regulatorios acessivel no repositorio.
    tools:
      - gitlab-ci
      - policy-engine
      - compliance-scanner
  secops:
    prose: |
      **Gestao de adequacao regulatoria:**
      1. Registro formal de conformidade com cada artigo da resolucao.
      2. Mapeamento de atualizacoes normativas (ex: Resolucao Conjunta 6/2023)
         com assessment de impacto.
      3. Plano de adequacao com prazos e responsaveis para cada atualizacao.
      4. Certificacao de conformidade pela auditoria interna.

      **Preparacao para inspecoes:**
      5. Pasta de evidencias organizada por artigo da resolucao.
      6. Simulacao de inspecao anual (mock inspection).
      7. Ponto focal para atendimento a demandas do BCB.

      **Acompanhamento de novas normas:**
      8. Monitoramento de publicacoes do BCB/CMN no Diario Oficial.
      9. Participacao em audiencias publicas de novas regulamentacoes.
      10. Network com pares do setor para compartilhar interpretacoes.
    tools:
      - grc-platform
      - compliance-scanner
