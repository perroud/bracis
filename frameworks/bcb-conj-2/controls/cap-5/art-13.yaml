id: art-13
family: cap-5
title: "Sancoes e Responsabilidades"
class: BCB-CONJ-2
baselines: [todas-ifs]
statement:
  prose: |
    Art. 13. O descumprimento do disposto nesta Resolução Conjunta sujeita a
    instituição e seus administradores às sanções previstas na legislação vigente.

    Parágrafo único. O diretor responsável pela política de segurança cibernética,
    conforme designado nos termos da regulamentação específica, responde pelo
    cumprimento das obrigações previstas nesta Resolução Conjunta.
guidance:
  prose: |
    O art. 13 estabelece as consequencias do descumprimento e atribui
    responsabilidade pessoal ao diretor de seguranca cibernetica.

    **Sancoes aplicaveis:**
    O descumprimento pode resultar em sancoes previstas na Lei 4.595/1964 e
    legislacao complementar:
    - Advertencia
    - Multa pecuniaria (valores significativos para instituicoes financeiras)
    - Suspensao do exercicio de cargos de administracao
    - Inabilitacao para exercicio de cargos de administracao
    - Cassacao de autorizacao de funcionamento
    - Intervencao administrativa

    **Cenarios de descumprimento mais comuns:**
    1. Nao notificar incidente relevante ao BCB dentro de 24 horas
    2. Notificacao incompleta (faltando informacoes do art. 4)
    3. Nao manter atualizacoes ao BCB durante tratamento (art. 5)
    4. Ausencia de estrutura de gerenciamento de risco cibernetico (art. 9)
    5. Nao realizar testes de resiliencia periodicos (art. 11)
    6. Nao manter registros por 5 anos (art. 12)
    7. Nao compartilhar informacoes com o setor (art. 7)

    **Responsabilidade pessoal (paragrafo unico):**
    O diretor designado como responsavel pela politica de seguranca cibernetica
    (conforme Resolucao CMN 4.893, art. 18) responde pessoalmente pelo cumprimento
    desta resolucao. Isso significa:
    - Sancoes podem ser aplicadas pessoalmente ao diretor
    - O diretor deve demonstrar diligencia no cumprimento
    - Delegacao de tarefas nao exime a responsabilidade
    - O diretor deve ter poderes e recursos adequados

    **Mitigacao de risco regulatorio:**
    A instituicao pode demonstrar boa-fe e diligencia atraves de:
    - Estrutura robusta de gerenciamento de risco cibernetico documentada
    - Testes de resiliencia regulares com planos de acao
    - Notificacoes tempestivas e completas ao BCB
    - Registros completos e acessiveis
    - Investimentos compativeis em seguranca cibernetica
implementation_guidance:
  platform_engineering:
    prose: |
      **Evidencias de conformidade automatizadas:**
      1. Dashboard de compliance com status de cada artigo da resolucao:
         - Art. 3: notificacoes enviadas dentro do prazo (SLA de 24h)
         - Art. 4: completude dos formularios de notificacao
         - Art. 5: atualizacoes enviadas durante tratamento
         - Art. 9: estrutura de gerenciamento operacional
         - Art. 11: testes de resiliencia executados conforme calendario
         - Art. 12: registros completos e dentro do prazo de retencao
      2. Alertas automaticos de desvio de conformidade.
      3. Relatorio mensal automatizado para o diretor responsavel.

      **Trilha de auditoria:**
      4. Audit trail imutavel de todas as acoes de seguranca.
      5. Logs de decisoes de classificacao e notificacao.
      6. Registro de acesso e alteracoes em registros de incidentes.
      7. Evidencias de testes de resiliencia com timestamps.

      **Metricas de conformidade:**
      8. Percentual de incidentes notificados dentro do prazo.
      9. Percentual de notificacoes com conteudo completo.
      10. Cobertura de registros (incidentes registrados / incidentes detectados).
      11. Testes de resiliencia executados vs. planejados.
    tools:
      - grc-platform
      - compliance-scanner
      - incident-management
      - centralized-logging
      - monitoring-alerting
  devsecops:
    prose: |
      **Conformidade no pipeline:**
      1. Compliance-as-Code: regras de conformidade versionadas no repositorio.
      2. Verificacao automatica de que sistemas criticos possuem controles de
         seguranca obrigatorios no pipeline.
      3. Bloqueio de deploy para sistemas sem classificacao de criticidade.
      4. Registro automatico de evidencias de seguranca a cada deploy.

      **Rastreabilidade para auditoria:**
      5. Provenance chain completa para todo artefato em producao.
      6. Signed commits e signed images como evidencia de controle.
      7. Pipeline history retido para demonstrar controles continuos.
    tools:
      - gitlab-ci
      - policy-engine
      - compliance-scanner
      - artifact-registry
  secops:
    prose: |
      **Programa de conformidade com a resolucao:**
      1. Mapeamento de cada artigo da resolucao para controles implementados
         com evidencias documentadas.
      2. Assessment semestral de conformidade com gap analysis.
      3. Plano de acao para remediar gaps com prazos e responsaveis.
      4. Relatorio de conformidade para o diretor responsavel e conselho.

      **Gestao de risco regulatorio:**
      5. Registro de riscos regulatorios com avaliacao de probabilidade e impacto
         de sancoes.
      6. Mapeamento de cenarios de descumprimento com planos de mitigacao.
      7. Seguro de responsabilidade civil para administradores (D&O) que cubra
         sancoes regulatorias.

      **Suporte ao diretor responsavel:**
      8. Relatorio mensal de conformidade para o diretor responsavel contendo:
         - Status de cada obrigacao da resolucao
         - Incidentes ocorridos e status de notificacao
         - Progresso de acoes corretivas pendentes
         - Proximos testes de resiliencia agendados
      9. Assessoria juridica especializada em regulacao financeira.
      10. Preparacao para inspecoes do BCB: pasta com todas as evidencias
          organizadas por artigo.
    tools:
      - grc-platform
      - incident-management
      - compliance-scanner
      - risk-assessment
