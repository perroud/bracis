id: art-8
family: cap-3
title: "Compartilhamento com o Banco Central do Brasil"
class: BCB-CONJ-2
baselines: [todas-ifs]
statement:
  prose: |
    Art. 8. O Banco Central do Brasil poderá compartilhar com as instituições
    referidas no art. 1 informações sobre incidentes de segurança, incluindo
    indicadores de comprometimento e alertas de segurança, visando a proteção
    do sistema financeiro nacional.

    Parágrafo único. As instituições devem implementar mecanismos para recepção,
    análise e aplicação tempestiva das informações compartilhadas pelo Banco
    Central do Brasil.
guidance:
  prose: |
    O art. 8 cria o fluxo inverso de compartilhamento: do BCB para as instituicoes.
    O BCB atua como hub de inteligencia, consolidando informacoes de incidentes de
    todo o SFN e redistribuindo alertas para protecao coletiva.

    **Papel do BCB como hub de inteligencia:**
    O BCB recebe notificacoes de incidentes de todas as instituicoes (art. 3) e
    pode consolidar, anonimizar e redistribuir informacoes relevantes para o setor.
    Isso cria um ciclo virtuoso:
    1. Instituicao A detecta ataque e notifica BCB
    2. BCB anonimiza e gera alerta com IoCs
    3. BCB distribui alerta para todas as instituicoes
    4. Instituicoes B, C, D aplicam IoCs proativamente
    5. Ataque e contido antes de se espalhar no SFN

    **Conteudo compartilhado pelo BCB:**
    - IoCs consolidados de multiplas instituicoes
    - Alertas de ameacas emergentes ao SFN
    - Tendencias de ataques ao setor financeiro brasileiro
    - Orientacoes tecnicas de mitigacao
    - Atualizacoes de ameacas internacionais relevantes

    **Obrigacao de recepcao e aplicacao (paragrafo unico):**
    As instituicoes nao podem simplesmente ignorar alertas do BCB. Devem ter:
    - Canal dedicado para receber comunicacoes do BCB
    - Processo de triagem de alertas recebidos
    - Capacidade tecnica de aplicar IoCs rapidamente
    - Registro de acoes tomadas com base nos alertas do BCB
    - Feedback ao BCB sobre eficacia das medidas

    **Implicacao pratica:**
    A instituicao deve estar preparada para receber e implementar rapidamente
    medidas defensivas baseadas em alertas do BCB. Isso exige:
    - Automacao de ingestao de IoCs
    - Equipe disponivel para analisar alertas
    - Capacidade de aplicar bloqueios emergenciais
    - Processo de comunicacao interna para alertas criticos do regulador
implementation_guidance:
  platform_engineering:
    prose: |
      **Canal de recepcao de alertas do BCB:**
      1. Endpoint dedicado (API, e-mail monitoreado, portal) para receber
         comunicacoes do BCB.
      2. Monitoramento 24x7 do canal de recepcao com alerting para a equipe
         de seguranca.
      3. Parsing automatico de alertas do BCB para extrair IoCs estruturados.

      **Ingestao automatizada de IoCs do BCB:**
      4. Pipeline automatizado:
         Recebimento -> Parsing -> Validacao -> Enriquecimento -> Aplicacao.
      5. Aplicacao automatica de IoCs recebidos:
         - IPs maliciosos -> regras de firewall
         - Dominios C2 -> DNS blacklist
         - Hashes de malware -> EDR block list
         - URLs de phishing -> proxy/WAF block list
      6. Validacao automatica para evitar falsos positivos (verificar que IoC
         nao esta na whitelist interna).

      **Tempo de resposta:**
      7. SLA interno para aplicacao de IoCs do BCB:
         - Critico: < 1 hora
         - Alto: < 4 horas
         - Medio: < 24 horas
      8. Metricas de tempo medio de aplicacao de IoCs do BCB (MTTA).

      **Feedback ao BCB:**
      9. Registro automatico de acao tomada para cada alerta recebido.
      10. Relatorio periodico ao BCB sobre eficacia das medidas aplicadas.
    tools:
      - siem
      - soar
      - firewall-waf
      - edr-xdr
      - dns-security
      - threat-intelligence-platform
  devsecops:
    prose: |
      **Integracao de alertas do BCB no pipeline:**
      1. IoCs do BCB alimentam automaticamente as bases de threat intelligence
         utilizadas pelos scanners de seguranca.
      2. Dependency advisories emitidos pelo BCB integrados ao dependency scanning.
      3. Alertas de vulnerabilidades especificas do setor financeiro adicionados
         ao SAST/DAST.

      **Resposta rapida a alertas do BCB:**
      4. Pipeline de emergencia para aplicar patches ou workarounds recomendados
         pelo BCB em sistemas criticos.
      5. Feature flags para desativar funcionalidades especificas em resposta a
         alertas do BCB.
      6. Rollback procedure documentado caso alerta do BCB indique comprometimento
         de versao em producao.
    tools:
      - gitlab-ci
      - dependency-scanning
      - sast
      - dast
      - feature-flags
      - threat-intelligence-platform
  secops:
    prose: |
      **Processo de tratamento de alertas do BCB:**
      1. Analista de CTI designado para triagem de alertas do regulador.
      2. Classificacao de cada alerta por urgencia e aplicabilidade.
      3. Plano de acao para cada alerta:
         - Aplicavel e urgente: implementacao imediata
         - Aplicavel nao urgente: planejamento de implementacao em 24-48h
         - Nao aplicavel: registro da justificativa
      4. Comunicacao interna para stakeholders relevantes sobre alertas criticos.

      **Hunting proativo baseado em alertas:**
      5. Threat hunting em logs e telemetria usando IoCs recebidos do BCB.
      6. Retroactive analysis em dados historicos (30-90 dias) para verificar
         se a instituicao foi afetada anteriormente.
      7. Verificacao de todos os sistemas contra TTPs descritos no alerta.

      **Registro e evidencias:**
      8. Registro de cada alerta recebido do BCB com:
         - Data/hora de recebimento
         - Classificacao de aplicabilidade
         - Acoes tomadas e prazos
         - Resultado das acoes
      9. Relatorio mensal de alertas recebidos e acoes tomadas para o CISO.
      10. Auditoria anual do processo de tratamento de alertas do BCB.
    tools:
      - threat-intelligence-platform
      - siem
      - soar
      - edr-xdr
      - grc-platform
