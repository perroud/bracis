control_families:
  - id: cap-1
    title: "Do Objeto e do Ambito de Aplicacao"
    description: "Definicao do objeto da resolucao conjunta e das instituicoes abrangidas pela obrigacao de notificacao de incidentes"
    articles: "art. 1 ao art. 2"
    control_count: 2
  - id: cap-2
    title: "Da Notificacao de Incidentes"
    description: "Requisitos para notificacao de incidentes de seguranca ao Banco Central do Brasil, prazos, conteudo minimo, canais e atualizacoes"
    articles: "art. 3 ao art. 6"
    control_count: 4
  - id: cap-3
    title: "Do Compartilhamento de Informacoes"
    description: "Requisitos para compartilhamento de informacoes sobre incidentes entre instituicoes e com o BCB"
    articles: "art. 7 ao art. 8"
    control_count: 2
  - id: cap-4
    title: "Dos Requisitos para Gerenciamento do Risco Cibernetico"
    description: "Obrigacoes de gerenciamento de risco cibernetico, classificacao de incidentes e testes de resiliencia"
    articles: "art. 9 ao art. 11"
    control_count: 3
  - id: cap-5
    title: "Das Disposicoes Finais"
    description: "Vigencia, sancoes, revogacoes e disposicoes transitarias"
    articles: "art. 12 ao art. 14"
    control_count: 3
related_frameworks:
  - framework_id: bacen-4893
    relationship: complements
    description: >-
      A Resolucao CMN 4.893 estabelece a politica de seguranca cibernetica e os
      requisitos para contratacao de servicos em nuvem. A Resolucao Conjunta 2/2020
      detalha especificamente os requisitos de notificacao de incidentes e gerenciamento
      do risco cibernetico.
  - framework_id: bcb-85
    relationship: complements
    description: >-
      A Resolucao BCB 85 aplica requisitos similares de seguranca cibernetica a
      instituicoes de pagamento. A Resolucao Conjunta 2/2020 complementa ao detalhar a
      notificacao de incidentes para ambos os regimes regulatorios.
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD exige notificacao de incidentes de seguranca envolvendo dados pessoais a
      ANPD e aos titulares. A Resolucao Conjunta 2/2020 complementa ao exigir
      notificacao ao BCB, sendo ambas obrigacoes cumulativas.
  - framework_id: nist-800-53-rev5
    relationship: mapped
    description: >-
      Os controles IR (Incident Response) do NIST 800-53 rev5 fornecem mapeamento
      tecnico detalhado para implementacao dos requisitos de notificacao e gerenciamento
      de incidentes desta resolucao.
