id: art-34
family: cap-5
title: "Investigacao Interna de Suspeitas"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 34. Os participantes devem estabelecer procedimento formal de
    investigação interna de operações e situações suspeitas antes de
    decidir sobre a comunicação ao COAF, que inclua:

    I - levantamento de informações cadastrais e operacionais do cliente;
    II - consulta a bases de dados internas e externas relevantes;
    III - análise de contexto econômico e das relações de negócios do cliente;
    IV - documentação de todas as evidências coletadas e da conclusão
    da investigação; e
    V - registro da decisão de comunicar ou não ao COAF com a respectiva
    justificativa.
guidance:
  prose: |
    O art. 34 eleva a investigacao interna a um processo formal, com etapas
    estruturadas e documentacao obrigatoria. Nao basta "olhar para o cliente"
    e tomar uma decisao — e necessario um processo investigativo sistematico.

    **O processo investigativo:**
    A investigacao deve ser proporcional a gravidade da suspeita. Para alertas
    de baixo score, uma investigacao basica (revisar cadastro, verificar
    consistencia) pode ser suficiente. Para alertas de alto score, uma
    investigacao profunda e necessaria: verificar todas as bases externas,
    consultar historico completo de relacionamento, buscar adverse media.

    **Inciso II — bases de dados externas:**
    Exemplos de consultas externas uteis:
    - Receita Federal: status fiscal, alteracoes recentes no CNPJ
    - Jusbrasil/Escavador: processos judiciais e administrativos
    - Serasa/SPC: protestos, dividas, recuperacao judicial
    - Bases de adverse media: noticias relacionadas ao cliente
    - PEP databases: verificar se o cliente e PEP
    - Sanctions lists: OFAC, ONU, Ministerio da Fazenda

    **Inciso V — documentar a decisao de NAO comunicar:**
    Conforme já discutido no art. 28, a decisao de nao comunicar ao COAF
    e igualmente importante de documentar. O arquivo deve mostrar que:
    a investigacao foi realizada, as evidencias foram consideradas, e o
    julgamento fundamentado concluiu que a suspeita nao era suficiente.
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de investigacao estruturada:**
      1. Interface de investigacao no sistema de case management com as cinco
         etapas do art. 34 como abas ou secoes obrigatorias.
      2. Integracao com APIs externas para consulta automatica durante a
         investigacao: Receita Federal, PEP databases, adverse media.
      3. Timeline automatica do caso: historico de operacoes do cliente,
         alertas anteriores, comunicacoes ao COAF anteriores.
      4. Repositorio de evidencias: upload de screenshots, documentos,
         resultados de consultas externas — anexados ao caso.
      5. Formulario de conclusao com campos obrigatorios: resumo da investigacao,
         conclusao (suspeito/nao suspeito), decisao (comunicar/nao comunicar),
         justificativa fundamentada.
    tools:
      - case-management
      - aml-platform
      - adverse-media-api
      - document-repository
  devsecops:
    prose: |
      **Integridade do processo investigativo:**
      1. Testes de que todas as cinco etapas devem ser completadas antes
         de fechar o caso.
      2. Testes de que a decisao de nao comunicar exige justificativa com
         comprimento minimo (para evitar "nao suspeito" sem fundamentacao).
      3. Audit trail de cada etapa da investigacao com timestamp.
    tools:
      - test-automation
      - gitlab-ci
      - workflow-testing
  secops:
    prose: |
      **Qualidade das investigacoes:**
      1. Revisao por amostragem de investigacoes concluidas: verificar
         profundidade e qualidade da documentacao.
      2. Segunda revisao obrigatoria por supervisor para casos de alta
         gravidade antes de decidir por nao comunicar.
      3. KPI: tempo medio de investigacao por nivel de prioridade.
    tools:
      - quality-assurance
      - case-management
      - reporting-dashboard
legal_references:
  - framework_id: bcb-3978
    articles: ["art-23"]
    relationship: equivalent-to
