id: art-31
family: cap-5
title: "Situacoes de Suspeita em Operacoes com Valores Mobiliarios"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 31. Devem ser objeto de especial atenção as operações que apresentem
    os seguintes indicadores de suspeita específicos para o mercado de capitais:

    I - operações que resultem em ganhos ou perdas substanciais sem propósito
    econômico aparente;
    II - transferências de titularidade de valores mobiliários entre partes
    relacionadas sem contrapartida financeira proporcional;
    III - operações de emissão privada de valores mobiliários para investidores
    sem relação de negócios prévia ou identificável com o emissor;
    IV - aplicação em fundos de investimento seguida de resgate imediato
    e transferência para outro participante ou jurisdição;
    V - utilização de múltiplos intermediários na mesma operação sem
    justificativa econômica plausível.
guidance:
  prose: |
    O art. 31 lista red flags especificos ao mercado de capitais, complementando
    os criterios gerais do art. 27. Esses indicadores refletem os padroes
    tipicos de lavagem de dinheiro via mercado de valores mobiliarios.

    **Analise dos indicadores:**

    Inciso I (ganhos sem proposito): um criminoso pode comprar acoes de empresa
    que controla, artificialmente valorizá-la, e vender com "ganho" que parece
    legitimo. Ou comprar opcoes antes de divulgar informacao privilegiada.

    Inciso II (transferencia entre relacionados): transferência de acoes de
    empresa da familia A para empresa da familia B sem pagamento real pode ser
    uma forma de movimentar ativos ilicitos entre partes relacionadas.

    Inciso III (emissao privada para desconhecidos): empresa emite debentures
    e as vende a investidores sem relacao comercial previa — possivelmente
    para "lavar" recursos de terceiros.

    Inciso IV (passagem por fundo): aplicar em fundo e resgatar imediatamente
    cria uma camada de intermediacao que obscurece a origem dos recursos.
    "Layering" classico via mercado de capitais.

    Inciso V (multiplos intermediarios): encadeamento de corretoras e gestores
    sem necessidade economica cria camadas de opacidade — cada camada torna
    mais dificil rastrear a origem do dinheiro.
implementation_guidance:
  platform_engineering:
    prose: |
      **Deteccao de red flags de mercado:**
      1. Detector de ganhos/perdas artificiais: identificar operacoes circulares
         onde o mesmo ativo e comprado e vendido sem variacao economica real.
      2. Detector de transferencias entre relacionados: mapeamento de
         relacionamentos entre clientes e verificacao de transferencias
         sem contrapartida financeira proporcional.
      3. Monitoramento de fundos: identificar padrao de aplicacao-resgate
         imediato (<30 dias) com transferencia subsequente.
      4. Analise de grafo de relacionamentos: identificar clusters de clientes
         com padroes suspeitos de interacao.

      **Integracao de dados:**
      5. Para detectar os indicadores do art. 31, o TMS precisa ter visao
         de operacoes em multiplos sistemas: bolsa, balcao, fundos, custódia.
    tools:
      - transaction-monitoring
      - graph-analytics
      - behavioral-analytics
      - data-lake
  devsecops:
    prose: |
      **Testes de indicadores de mercado:**
      1. Casos de teste para cada inciso do art. 31 com cenarios de mercado reais.
      2. Testes de grafo: detector de relacionamentos entre contas deve encontrar
         transferencias entre partes relacionadas.
      3. Backtesting com casos conhecidos de manipulacao de mercado.
    tools:
      - test-automation
      - gitlab-ci
      - market-simulation
  secops:
    prose: |
      **Coordenacao com supervisao de mercado:**
      1. Coordenacao com a area de integridade de mercado da CVM quando
         padroes do art. 31 podem indicar tambem manipulacao de mercado.
      2. Relatorio de alertas por indicador do art. 31 com analise de
         efetividade de cada regra.
    tools:
      - aml-platform
      - reporting-dashboard
