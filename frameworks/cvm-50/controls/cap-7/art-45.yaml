id: art-45
family: cap-7
title: "Sancoes e Penalidades"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 45. O descumprimento das obrigações previstas nesta Resolução sujeita
    os participantes e seus administradores às penalidades previstas na legislação
    aplicável, incluindo:

    I - advertência;
    II - multa, nos termos da legislação em vigor;
    III - suspensão temporária do exercício de determinadas atividades;
    IV - inabilitação temporária ou permanente para o exercício de cargos
    de administração em participantes do mercado de capitais; e
    V - cancelamento ou suspensão da autorização de funcionamento.

    Parágrafo único. As penalidades podem ser aplicadas cumulativamente
    e independentemente das sanções de natureza criminal cabíveis.
guidance:
  prose: |
    O art. 45 estabelece o arsenal sancionatorio da CVM para casos de
    descumprimento da CVM 50. A severidade das sancoes reflete a importancia
    do tema — falhas em PLD/FT podem resultar em uso do mercado de capitais
    para lavagem de dinheiro, com graves consequencias para a integridade do mercado.

    **A escala de sancoes:**
    Do mais leve ao mais grave:
    - Advertencia: para violacoes pontuais sem impacto material
    - Multa: para violacoes com impacto quantificavel (valores podem ser
      expressivos — a CVM tem poder de multa significativo)
    - Suspensao de atividades: restringe operacoes especificas
    - Inabilitacao de administradores: afasta o responsavel da gestao
    - Cancelamento da autorizacao: encerramento das atividades reguladas

    **Cumulatividade (paragrafo unico):**
    A CVM pode aplicar multiplas sancoes ao mesmo tempo: multa + inabilitacao
    do diretor responsavel, por exemplo.

    **Sancoes criminais:**
    Alem das sancoes administrativas da CVM, os responsaveis podem responder
    criminalmente pelo art. 9 da Lei 9.613/1998 (participacao em lavagem de
    dinheiro) se as violacoes forem graves.

    **Implicacoes para o diretor responsavel:**
    O diretor designado pelo art. 7 responde pessoalmente. A inabilitacao
    pode impedir o profissional de exercer cargos de administracao em qualquer
    entidade regulada pela CVM, com impacto severo na carreira.
implementation_guidance:
  platform_engineering:
    prose: |
      **Monitoramento de conformidade:**
      1. Dashboard de compliance com indicadores de risco de sancao: alertas
         nao analisados, comunicacoes atrasadas, cadastros vencidos.
      2. Semaforo de risco regulatorio: verde (em conformidade), amarelo
         (alertas de risco), vermelho (violacoes ativas).
      3. Historico de fiscalizacoes e sancoes da CVM para uso em planejamento
         de compliance.
    tools:
      - grc-platform
      - compliance-dashboard
      - risk-management
  devsecops:
    prose: |
      **Evidencias para defesa regulatoria:**
      1. Todos os controles de PLD/FT devem gerar logs auditaveis que
         provem que o sistema estava funcionando.
      2. Timestamps imutaveis em todas as acoes do sistema de PLD/FT.
      3. Capacidade de gerar relatorio de conformidade em formato aceito
         pela CVM para fiscalizacoes.
    tools:
      - audit-trail
      - compliance-reporting
      - evidence-export
  secops:
    prose: |
      **Gestao de risco regulatorio:**
      1. Self-assessment anual de conformidade com a CVM 50 antes da auditoria
         externa ou fiscalizacao da CVM.
      2. Plano de remediacao para cada violacao identificada internamente —
         auto-remediacao antes de fiscalizacao e sempre preferivel.
      3. Processo de resposta a fiscalizacoes da CVM com responsaveis definidos
         e documentacao pre-compilada.
    tools:
      - grc-platform
      - regulatory-response
      - legal-management
