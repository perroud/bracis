id: art-44
family: cap-7
title: "Auditoria Interna dos Controles de PLD/FT"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 44. Os participantes devem submeter os controles internos de PLD/FT
    a auditoria interna periódica, visando avaliar a efetividade dos procedimentos
    e controles implementados.

    § 1. A auditoria de que trata o caput deve:
    I - ser realizada por pessoas com independência em relação às áreas
    auditadas;
    II - avaliar a efetividade e a adequação dos controles de PLD/FT;
    III - identificar deficiências e propor recomendações de melhoria;
    IV - ter seus resultados documentados e comunicados ao diretor responsável
    e ao órgão de administração; e
    V - ter um plano de ação com prazos para correção das deficiências identificadas.

    § 2. A auditoria de PLD/FT deve ser realizada com frequência mínima anual.
guidance:
  prose: |
    A auditoria interna fecha o ciclo de controle: planeja, implementa, monitora,
    e AUDITA para verificar se o que foi implementado realmente funciona.

    **Independencia (inciso I):**
    A auditoria de PLD/FT nao pode ser realizada pela propria equipe de
    compliance que gerencia o programa — haveria um conflito de interesses.
    Deve ser realizada pela auditoria interna (funcao independente) ou por
    auditores externos quando a entidade nao tem auditoria interna suficiente.

    **O que a auditoria deve avaliar:**
    - KYC: amostra de cadastros estao completos? Beneficiarios finais identificados?
      PEPs verificados?
    - Monitoramento: o TMS esta gerando alertas para os padroes esperados?
      Alertas estao sendo analisados no prazo?
    - Comunicacoes ao COAF: comunicacoes foram realizadas quando deveriam?
      Conteudo tem qualidade adequada?
    - Treinamento: colaboradores em escopo estao treinados?
    - Documentacao: politica atualizada? Avaliacao de risco atualizada?

    **Plano de acao (inciso V):**
    A auditoria que identifica deficiencias mas nao gera plano de acao e
    auditoria incompleta. O plano deve ter: deficiencia, causa-raiz, acao
    corretiva, responsavel, prazo. E deve ser monitorado.
implementation_guidance:
  platform_engineering:
    prose: |
      **Suporte tecnico a auditoria:**
      1. Modulo de auditoria no GRC com agenda de auditorias, escopo, plano
         de trabalho e resultados.
      2. Exportacao de dados para auditoria: ferramentas que permitem ao auditor
         extrair amostras de cadastros, alertas e comunicacoes sem acesso
         irrestrito ao sistema de producao.
      3. Rastreabilidade de controles: mapa de controles de PLD/FT para
         artigos da CVM 50 (para o auditor verificar cobertura).
      4. Gestao de achados: ferramenta para registrar deficiencias, recomendar
         acoes, atribuir responsaveis e monitorar prazo de correcao.
    tools:
      - grc-platform
      - audit-management
      - data-export
  devsecops:
    prose: |
      **Suporte ao processo de auditoria:**
      1. Repositorio de evidencias para auditoria: documentos, logs, amostras
         organizados por ciclo de auditoria.
      2. Pipeline de geracao de relatorios de auditoria tecnicos.
      3. Acesso read-only para auditores ao sistema de PLD/FT em ambiente
         controlado.
    tools:
      - gitlab-ci
      - read-only-access
      - evidence-repository
  secops:
    prose: |
      **Ciclo de auditoria:**
      1. Calendario anual de auditoria de PLD/FT aprovado pelo conselho.
      2. Acompanhamento trimestral do plano de acao de auditoria: achados
         corrigidos no prazo.
      3. Relatorio de auditoria apresentado ao comite de auditoria e conselho.
      4. Comunicacao a CVM de deficiencias materiais identificadas se necessario.
    tools:
      - audit-management
      - board-reporting
      - grc-platform
