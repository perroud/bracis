id: art-46
family: cap-7
title: "Disposicoes Transitorias e Vigencia"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 46. Esta Resolução entra em vigor em 1 de julho de 2022, revogando
    as disposições anteriores sobre PLD/FT aplicáveis aos participantes do
    mercado de capitais.

    § 1. Os participantes devem adaptar suas políticas, procedimentos e
    controles internos aos requisitos desta Resolução até a data de vigência.

    § 2. Os registros e documentos de PLD/FT anteriores à vigência desta
    Resolução devem ser mantidos pelos prazos previstos na legislação anterior
    ou nesta Resolução, o que for mais longo.

    § 3. As comunicações ao COAF realizadas antes da vigência desta Resolução
    continuam válidas e os prazos de retenção contam da data da comunicação.
guidance:
  prose: |
    O art. 46 e as disposicoes transitorias — relevante sobretudo para
    entidades que precisaram migrar de regime anterior para a CVM 50.

    **Continuidade dos registros antigos:**
    O ss 2 garante que registros anteriores nao precisam ser descartados
    ao entrar em vigor a nova resolucao. O principio e: manter pelo prazo
    mais longo entre o regime anterior e o novo. Na pratica, para a maioria
    dos participantes, os prazos da CVM 50 sao iguais ou superiores aos
    anteriores, entao os registros devem ser mantidos pelos prazos da CVM 50.

    **Validade das comunicacoes anteriores:**
    Comunicacoes ao COAF realizadas antes de 1 de julho de 2022 continuam
    produzindo efeitos — os prazos de retencao de 10 anos contam da data
    da comunicacao original.

    **Para fins de compliance atual:**
    Este artigo ja nao tem impacto operacional direto (a vigencia ja passou
    em 2022), mas documenta a data de entrada em vigor e a revogacao do
    regime anterior para fins de historico de conformidade.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de registros legados:**
      1. Identificacao e catalogacao de registros de PLD/FT anteriores a
         julho de 2022 para garantir que nao sejam descartados prematuramente.
      2. Sistema de retencao que aplica o prazo mais longo quando ha ambiguidade
         entre regime anterior e CVM 50.
      3. Marcacao de registros com o regime regulatorio sob o qual foram criados
         para facilitar classificacao de retencao.
    tools:
      - data-lifecycle-management
      - compliance-management
      - archival-storage
  devsecops:
    prose: |
      **Controle de versao regulatorio:**
      1. Versionamento da politica de PLD/FT com marcacao clara de quando
         a transicao para CVM 50 ocorreu.
      2. Manutencao de versoes anteriores da politica para referencia historica.
    tools:
      - document-management
      - version-control
  secops:
    prose: |
      **Historico de conformidade:**
      1. Documentacao da transicao para CVM 50: o que mudou, quando foi
         implementado, evidencias de conformidade.
      2. Relatorio de conformidade historico disponivel para fiscalizacoes
         da CVM que possam questionar periodos anteriores a julho de 2022.
    tools:
      - compliance-management
      - document-management
legal_references:
