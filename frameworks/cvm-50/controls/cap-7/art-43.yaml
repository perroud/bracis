id: art-43
family: cap-7
title: "Treinamento e Capacitacao em PLD/FT"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 43. Os participantes devem estabelecer e manter programa de treinamento
    e capacitação continuada em PLD/FT para os colaboradores que atuem em
    atividades sujeitas aos riscos de lavagem de dinheiro e financiamento
    do terrorismo.

    § 1. O programa de treinamento deve:
    I - abordar os requisitos da legislação e regulamentação de PLD/FT
    aplicáveis às atividades do participante;
    II - incluir casos práticos e exemplos de operações e situações suspeitas;
    III - ser atualizado para refletir mudanças na legislação, nos procedimentos
    internos e nos riscos identificados na avaliação interna; e
    IV - ter sua conclusão registrada e documentada por colaborador.

    § 2. O treinamento deve ser realizado no início do vínculo laboral e
    periodicamente, com frequência mínima anual.
guidance:
  prose: |
    O treinamento e o pilar que converte politicas e sistemas em comportamento
    humano efetivo. Os melhores sistemas de TMS nao substituem analistas
    bem treinados que entendem os padroes de lavagem de dinheiro.

    **Quem precisa de treinamento:**
    - Obrigatoriamente: todos os analistas de KYC e compliance, todos os
      que operam o sistema de PLD/FT, gerentes de relacionamento com clientes
      de alto risco, diretores.
    - Recomendado: pessoal de atendimento, operadores de mesa, qualquer um
      que possa ser o primeiro contato com um cliente suspeito.

    **Conteudo efetivo de treinamento:**
    Treinamento de PLD/FT efetivo nao e "ler a politica e assinar". Deve incluir:
    - Casos reais (anonimizados) de esquemas de lavagem no mercado de capitais
    - Exercicios praticos de identificacao de red flags
    - Simulacoes de decisao: dado esse cenario, o que voce faria?
    - Atualizacoes sobre tendencias e novos esquemas identificados pelo COAF

    **Documentacao (inciso IV):**
    A empresa precisa comprovar que realizou o treinamento e que cada colaborador
    o completou. Em uma fiscalizacao, a CVM pode solicitar a lista de colaboradores
    treinados, o conteudo do treinamento e os registros de participacao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de treinamento:**
      1. LMS (Learning Management System) ou modulo de treinamento no portal
         de colaboradores com cursos especificos de PLD/FT.
      2. Trilha de treinamento por funcao: analista de KYC tem trilha diferente
         de operador de mesa.
      3. Avaliacao de aprendizado ao final de cada modulo com nota minima
         de aprovacao.
      4. Certificado digital de conclusao por colaborador por ano.
      5. Dashboard de conformidade de treinamento: percentual de colaboradores
         com treinamento anual concluido.

      **Conteudo adaptativo:**
      6. Casos praticos atualizados anualmente com novos esquemas identificados.
      7. Modulo especifico para atualizacoes regulatorias (quando ha nova
         regulamentacao do COAF ou CVM).
    tools:
      - lms-platform
      - training-content
      - certification-system
      - reporting-dashboard
  devsecops:
    prose: |
      **Automacao de conformidade de treinamento:**
      1. Integracao com sistema de RH para lista atualizada de colaboradores
         em escopo de PLD/FT.
      2. Alerta automatico para gestores quando colaborador nao completou
         o treinamento anual.
      3. Bloqueio de acesso ao sistema de PLD/FT para colaboradores com
         treinamento vencido (treinamento como pre-requisito de acesso).
    tools:
      - hr-integration
      - access-control
      - notification-service
  secops:
    prose: |
      **Efetividade do treinamento:**
      1. KPI: percentual de colaboradores em escopo com treinamento anual
         concluido (meta: 100%).
      2. Avaliacao de efetividade: testes praticos de identificacao de
         red flags antes e apos o treinamento.
      3. Relatorio de treinamento no relatorio anual do diretor responsavel.
    tools:
      - training-platform
      - hr-management
      - grc-platform
