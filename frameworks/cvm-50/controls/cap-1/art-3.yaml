id: art-3
family: cap-1
title: "Principio da Proporcionalidade"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 3. As políticas, os procedimentos e os controles internos de que trata
    esta Resolução devem ser proporcionais:

    I - à natureza, ao porte, ao volume de operações e à complexidade dos
    negócios do participante;

    II - ao perfil de risco dos clientes, dos produtos, dos serviços e dos
    canais de distribuição utilizados;

    III - ao perfil de risco das contrapartes e dos países com os quais o
    participante realiza negócios; e

    IV - à experiência e ao histórico de conformidade do participante.

    Parágrafo único. A proporcionalidade de que trata o caput não dispensa
    o cumprimento dos requisitos mínimos estabelecidos nesta Resolução.
guidance:
  prose: |
    O principio da proporcionalidade e um dos pilares da abordagem baseada em
    risco adotada internacionalmente pelo GAFI/FATF e incorporada pela CVM 50.

    **O que a proporcionalidade significa na pratica:**
    Uma gestora de fundos de pequeno porte com clientes exclusivamente pessoas
    fisicas de baixo risco nao precisa ter a mesma estrutura de PLD/FT de uma
    grande corretora que opera com clientes estrangeiros, PEPs e produtos
    de alta complexidade.

    **Quatro dimensoes da proporcionalidade:**
    1. Natureza e porte: pequenas gestoras podem ter programa simplificado;
       grandes distribuidoras precisam de estrutura robusta com tecnologia avancada.
    2. Perfil de risco dos produtos: fundos de renda fixa simples tem risco menor
       que derivativos exoticos ou estruturas offshore.
    3. Perfil de risco das contrapartes: operacoes com jurisdicoes de alto risco
       (tax havens, paises em listas negras do GAFI) exigem controles reforçados.
    4. Historico de conformidade: participante com historico de infraçoes precisa
       de controles mais rigorosos.

    **O paragrafo unico e essencial:**
    A proporcionalidade nao e desculpa para nao cumprir requisitos minimos.
    Todo participante, independente do porte, deve implementar os requisitos
    fundamentais — o que varia e a profundidade e sofisticacao dos controles.
implementation_guidance:
  platform_engineering:
    prose: |
      **Perfis de risco por tipo de participante:**
      1. Matriz de risco institucional mapeando tipo de participante, porte,
         produtos e jurisdicoes para nivel de controles requeridos.
      2. Sistema de PLD/FT com parametrizacao por perfil de entidade, permitindo
         configuracoes distintas para gestoras pequenas vs. grandes distribuidoras.
      3. Engine de regras parametrizavel: thresholds, criterios de alertas e
         procedimentos ajustaveis conforme perfil de risco da entidade.

      **Escalabilidade da plataforma:**
      4. Arquitetura de PLD/FT que permita escalar controles proporcionalmente
         ao crescimento da entidade sem reescritas de sistema.
      5. Modulos de funcionalidade progressiva: basico (obrigatorio todos),
         avancado (entidades de medio risco), premium (entidades de alto risco).
    tools:
      - aml-platform
      - rules-engine
      - risk-scoring
  devsecops:
    prose: |
      **Testes por perfil de proporcionalidade:**
      1. Suite de testes que valida controles minimos obrigatorios para todos
         os perfis de entidade.
      2. Testes de configuracao: garantir que parametros de risco alto sao mais
         restritivos que parametros de risco baixo.
      3. Pipeline com etapa de validacao de compliance que verifica requisitos
         minimos independentemente do perfil.
    tools:
      - gitlab-ci
      - test-automation
      - compliance-checks
  secops:
    prose: |
      **Avaliacao de proporcionalidade:**
      1. Avaliacao anual de se o nivel de controles e proporcional ao perfil
         de risco atual da entidade.
      2. Processo de revisao quando ha mudancas materiais (novos produtos, novas
         jurisdicoes, crescimento significativo de volume).
      3. Documentacao formal da justificativa de proporcionalidade para cada
         escolha de nivel de controle.
    tools:
      - grc-platform
      - risk-management
