id: art-4
family: cap-1
title: "Avaliacao Interna de Risco"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 4. Os participantes mencionados no art. 1 devem realizar avaliação
    interna de risco com o objetivo de identificar e mensurar o risco de
    utilização de seus produtos, serviços, canais de distribuição e relações
    de negócios para a prática dos crimes previstos nesta Resolução.

    § 1. A avaliação interna de risco deve considerar, no mínimo:
    I - os riscos relacionados aos clientes e ao perfil de cada segmento de
    clientela atendido;
    II - os riscos relacionados a áreas geográficas de atuação, incluindo
    países estrangeiros com os quais o participante mantenha relações;
    III - os riscos relacionados aos produtos, serviços e operações ofertados;
    IV - os riscos relacionados aos canais de distribuição utilizados; e
    V - os riscos relacionados ao porte, ao modelo de negócio e ao volume
    de operações do participante.

    § 2. A avaliação interna de risco deve ser documentada, atualizada
    periodicamente e estar disponível para a CVM quando solicitada.
guidance:
  prose: |
    A avaliacao interna de risco e o alicerce de todo o programa de PLD/FT.
    Sem uma avaliacao de risco robusta, os demais controles podem estar mal
    calibrados — muito restritivos em areas de baixo risco (gerando atrito
    operacional desnecessario) ou muito permissivos em areas de alto risco
    (gerando exposicao regulatoria e criminal).

    **As cinco dimensoes de risco (ss 1):**
    1. Risco de cliente: PEPs, empresas offshore, cash-intensive businesses,
       clientes de jurisdicoes de alto risco representam maior exposicao.
    2. Risco geografico: paises em listas negras ou cinzas do GAFI, offshore
       centers, jurisdicoes com baixa cooperacao internacional.
    3. Risco de produto: derivativos, fundos de investimento offshore, COEs
       estruturados, produtos de alta liquidez apresentam maior risco que
       fundos de renda fixa simples.
    4. Risco de canal: onboarding 100% digital sem contato presencial, uso
       de agentes autonomos, plataformas abertas de investimento.
    5. Risco institucional: historico de infraçoes, volume de operacoes,
       concentracao em segmentos de alto risco.

    **Documentacao e atualizacao (ss 2):**
    A avaliacao deve ser um documento vivo, atualizado quando houver mudancas
    materiais no negocio ou no ambiente regulatorio. A CVM pode solicitar
    sua apresentacao a qualquer momento.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de avaliacao de risco:**
      1. Modulo dedicado de avaliacao de risco institucional com formularios
         estruturados cobrindo as cinco dimensoes do ss 1.
      2. Scoring automatico de cada dimensao de risco com pesos configurados
         pelo compliance officer.
      3. Dashboard de risco consolidado mostrando perfil de risco atual e
         evolucao historica.
      4. Alertas automaticos quando indicadores de risco superam thresholds
         pre-definidos.

      **Integracao com dados transacionais:**
      5. Pipeline de dados que alimenta a avaliacao de risco com metricas reais:
         volume por cliente, geografia, produto e canal.
      6. Modelo de machine learning para identificar mudancas no perfil de risco
         antes que se tornem problemas regulatorios.
    tools:
      - risk-assessment-tool
      - data-lake
      - bi-platform
      - aml-platform
  devsecops:
    prose: |
      **Auditabilidade da avaliacao:**
      1. Avaliacao de risco armazenada em repositorio Git com historico completo
         de versoes e aprovacoes.
      2. Workflow de aprovacao formal: draft → revisao compliance → aprovacao
         diretoria → publicacao.
      3. Testes automatizados que verificam integridade e completude da avaliacao
         de risco (todos os campos obrigatorios preenchidos).
      4. Notificacoes automaticas quando avaliacao nao foi atualizada dentro
         do prazo definido.
    tools:
      - gitlab-ci
      - document-management
      - workflow-automation
  secops:
    prose: |
      **Ciclo de revisao:**
      1. Avaliacao interna de risco revisada pelo menos anualmente e sempre
         que houver mudancas materiais no negocio.
      2. Eventos gatilho para revisao imediata: novo produto, novo mercado,
         nova regulacao, incidente de PLD/FT, mudanca de perfil de clientes.
      3. Relatorio de gaps entre avaliacao de risco e controles existentes
         com plano de acao para fechamento.
      4. Armazenamento da avaliacao e seus documentos de suporte por pelo
         menos 10 anos para evidencia regulatoria.
    tools:
      - grc-platform
      - document-management
      - risk-register
