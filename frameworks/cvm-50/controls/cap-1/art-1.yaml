id: art-1
family: cap-1
title: "Objeto e Ambito de Aplicacao"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 1. Esta Resolução dispõe sobre as políticas, os procedimentos e os controles
    internos a serem adotados pelos integrantes do sistema de distribuição de valores
    mobiliários, pelas entidades administradoras de mercado organizado e pelos demais
    participantes do mercado de capitais, visando a prevenção da utilização do sistema
    para a prática dos crimes de lavagem de dinheiro, ocultação de bens, direitos e
    valores, e do financiamento do terrorismo (PLD/FT).

    § 1. Sujeitam-se ao disposto nesta Resolução as seguintes entidades:
    I - bolsas de valores e bolsas de mercadorias e futuros;
    II - entidades do mercado de balcão organizado;
    III - corretoras e distribuidoras de valores mobiliários;
    IV - administradoras de carteiras de valores mobiliários;
    V - administradoras de fundos de investimento;
    VI - consultores de valores mobiliários;
    VII - agentes autônomos de investimento;
    VIII - auditores independentes registrados na CVM;
    IX - agências de classificação de risco;
    X - securitizadoras; e
    XI - demais participantes do mercado de capitais sujeitos à regulação da CVM.
guidance:
  prose: |
    O art. 1 estabelece o escopo pessoal e objetivo da CVM 50, definindo quem esta
    sujeito a esta regulacao e qual e seu proposito central.

    **Escopo pessoal:**
    A resolucao aplica-se a todos os participantes do mercado de capitais regulados
    pela CVM, com especial enfase no sistema de distribuicao, administracao de
    carteiras e fundos. Diferentemente da Circular BCB 3.978, que regula instituicoes
    financeiras do sistema bancario, a CVM 50 atinge entidades que operam no mercado
    de valores mobiliarios.

    **Escopo objetivo:**
    Os crimes cobertos sao:
    1. Lavagem de dinheiro (art. 1 da Lei 9.613/1998): conversao de ativos ilicitos
       em recursos aparentemente legais por meio do mercado de capitais
    2. Ocultacao de bens: uso de estruturas societarias e instrumentos financeiros
       complexos para esconder a origem e propriedade de ativos
    3. Financiamento do terrorismo (Lei 13.260/2016): uso do mercado de capitais
       para financiar atividades terroristas

    **Relevancia do mercado de capitais como vetor de risco:**
    O mercado de capitais apresenta vulnerabilidades especificas para lavagem de
    dinheiro: alta liquidez de ativos, complexidade de estruturas de investimento,
    facilidade de transferencia de recursos entre paises e dificuldade de rastrear
    beneficiarios finais em estruturas de fundos.
implementation_guidance:
  platform_engineering:
    prose: |
      **Mapeamento de entidades sujeitas:**
      1. Manter registro atualizado de todas as entidades do grupo economico que
         se enquadram nos incisos I a XI do art. 1, com identificacao de quais
         sao diretamente reguladas pela CVM 50.
      2. Configurar escopo do sistema de PLD/FT para cobrir todas as linhas de
         negocio e entidades sujeitas, evitando lacunas de cobertura.
      3. Implementar tags ou categorias nos sistemas para identificar operacoes
         sujeitas a controles de PLD/FT por tipo de entidade.

      **Integracao entre plataformas:**
      4. Para grupos com entidades reguladas tanto pelo BCB quanto pela CVM,
         garantir interoperabilidade entre sistemas de PLD/FT distintos sem
         compartilhamento indevido de dados.
      5. APIs de conformidade que identifiquem qual regime regulatorio (BCB 3978
         ou CVM 50) aplica-se a cada transacao ou relacao de negocio.
    tools:
      - aml-platform
      - entity-management
      - api-gateway
  devsecops:
    prose: |
      **Controle de escopo no ciclo de desenvolvimento:**
      1. Documentar em repositorio Git o mapeamento de entidades sujeitas a CVM 50
         com revisao anual obrigatoria.
      2. Testes automatizados que verificam se o sistema de PLD/FT cobre todos os
         tipos de entidade previstos no art. 1.
      3. Feature flags para habilitar/desabilitar controles por tipo de entidade
         conforme aplicabilidade regulatoria.
    tools:
      - gitlab-ci
      - test-automation
      - feature-flags
  secops:
    prose: |
      **Governanca de escopo:**
      1. Revisao anual do mapeamento de entidades sujeitas com participacao da
         area juridica e de compliance.
      2. Processo formal para inclusao de novas entidades ou linhas de negocio
         no escopo do programa de PLD/FT.
      3. Notificacao a CVM em caso de duvida sobre aplicabilidade da resolucao
         a atividades especificas.
    tools:
      - grc-platform
      - compliance-management
