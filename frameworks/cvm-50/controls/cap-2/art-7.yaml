id: art-7
family: cap-2
title: "Responsabilidades da Diretoria"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 7. Os participantes mencionados no art. 1 devem designar diretor
    responsável pelo cumprimento das obrigações previstas nesta Resolução.

    § 1. O diretor designado nos termos do caput deve:
    I - ser responsável pela implementação e pela manutenção da política
    de PLD/FT;
    II - ser o interlocutor com a CVM em assuntos relacionados a PLD/FT;
    III - elaborar e encaminhar ao órgão de administração, no mínimo anualmente,
    relatório sobre o funcionamento e a efetividade dos controles de PLD/FT;
    IV - garantir que os colaboradores recebam treinamento adequado em PLD/FT.

    § 2. A função de diretor responsável pela PLD/FT pode ser acumulada com
    outras funções, desde que não haja conflito de interesses.
guidance:
  prose: |
    O art. 7 estabelece a obrigacao de designar um diretor responsavel — figura
    equivalente ao MLRO (Money Laundering Reporting Officer) no direito
    internacional.

    **Natureza da responsabilidade:**
    A designacao cria responsabilidade pessoal do diretor pelas obrigacoes de
    PLD/FT. Em caso de violacoes, o diretor designado pode ser pessoalmente
    responsabilizado pela CVM (sancoes administrativas) e pelo Ministerio Publico
    (responsabilidade criminal).

    **Acumulacao de funcoes (ss 2):**
    E permitido acumular com outras funcoes (ex: diretor de compliance), mas
    vedado acumular com funcoes em conflito (ex: diretor comercial nao deve
    ser o responsavel por PLD/FT, pois tem incentivo para aprovar clientes
    sem devida diligencia).

    **Relatorio anual:**
    O relatorio ao orgao de administracao deve demonstrar que o programa de
    PLD/FT e efetivo — nao apenas que existe. Metricas esperadas: alertas
    gerados, investigacoes concluidas, comunicacoes ao COAF, treinamentos
    realizados, incidentes identificados.
implementation_guidance:
  platform_engineering:
    prose: |
      **Registro da designacao:**
      1. Sistema de gestao de responsabilidades com registro formal do diretor
         designado, incluindo data de designacao, aprovacao pelo conselho
         e comunicacao a CVM.
      2. Dashboard executivo para o diretor responsavel: KPIs de PLD/FT em
         tempo real (alertas pendentes, investigacoes abertas, comunicacoes
         ao COAF, percentual de clientes com cadastro atualizado).
      3. Sistema de geracao automatica do relatorio anual com dados extraidos
         dos sistemas de PLD/FT.

      **Segregacao de funcoes:**
      4. Controle de acesso baseado em papel: o diretor responsavel por PLD/FT
         tem visibilidade sobre todos os alertas e comunicacoes ao COAF, com
         log imutavel de todas as suas acoes.
      5. Alertas automaticos ao diretor responsavel para situacoes criticas
         (bloqueio de operacao, comunicacao urgente ao COAF).
    tools:
      - grc-platform
      - reporting-dashboard
      - identity-management
      - audit-trail
  devsecops:
    prose: |
      **Trilha de auditoria do diretor:**
      1. Todas as acoes do diretor responsavel no sistema de PLD/FT registradas
         com timestamp, IP e contexto — imutavel.
      2. Aprovacoes obrigatorias pelo diretor para escalacoes de alto risco
         implementadas como workflow no sistema.
      3. Notificacoes automaticas para o diretor quando thresholds criticos
         sao atingidos (ex: 10 comunicacoes pendentes ao COAF).
    tools:
      - audit-log
      - workflow-engine
      - notification-service
  secops:
    prose: |
      **Relatorio anual:**
      1. Template padrao de relatorio anual com todos os KPIs obrigatorios.
      2. Processo de coleta de dados dos sistemas para composicao do relatorio.
      3. Revisao do relatorio pelo conselho de administracao com ata documentada.
      4. Arquivo do relatorio com os demais documentos de PLD/FT por 10 anos.
    tools:
      - reporting-platform
      - grc-platform
      - document-management
