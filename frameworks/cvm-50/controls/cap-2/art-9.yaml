id: art-9
family: cap-2
title: "Gestao de Terceiros e Correspondentes"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 9. Os participantes que contratarem terceiros para a execução de
    atividades relacionadas ao cumprimento das obrigações desta Resolução
    devem:

    I - verificar se o terceiro possui política e procedimentos de PLD/FT
    compatíveis com os requisitos desta Resolução;
    II - estabelecer contratualmente as responsabilidades do terceiro em
    matéria de PLD/FT;
    III - monitorar o desempenho do terceiro no cumprimento das obrigações
    de PLD/FT; e
    IV - manter acesso às informações e aos registros de PLD/FT mantidos
    pelo terceiro.

    Parágrafo único. A responsabilidade pelas obrigações de PLD/FT perante
    a CVM permanece com o participante contratante, não sendo transferida
    ao terceiro contratado.
guidance:
  prose: |
    O art. 9 endereça o risco de terceiros — uma das maiores vulnerabilidades
    de PLD/FT no mercado de capitais, onde e comum a delegacao de atividades
    (KYC, onboarding, monitoramento) a prestadores de servicos.

    **O principio fundamental — responsabilidade nao se terceiriza:**
    O paragrafo unico e inequivoco: mesmo que o participante delegue a execucao
    de PLD/FT a um terceiro, a responsabilidade perante a CVM permanece com o
    participante. Uma corretora que contrata uma fintech para fazer o KYC nao
    se exime de responsabilidade se o KYC for feito de forma inadequada.

    **Due diligence em terceiros:**
    Antes de contratar, o participante deve verificar se o terceiro tem:
    - Politica de PLD/FT documentada e efetiva
    - Estrutura dedicada (compliance officer, sistemas adequados)
    - Historico de conformidade (sem sancoes regulatorias por PLD/FT)
    - Capacidade tecnica de fornecer os dados e registros necessarios

    **Monitoramento continuo:**
    Nao basta verificar no momento da contratacao. O participante deve monitorar
    continuamente o desempenho do terceiro — incluindo auditorias periodicas —
    para detectar degradacao na qualidade dos controles.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de terceiros de PLD/FT:**
      1. Modulo de gestao de fornecedores com perfil especifico para terceiros
         de PLD/FT: documentos exigidos, status de certificacoes, SLAs.
      2. API de integracao com sistemas de terceiros para recebimento de dados
         de KYC, monitoramento e alertas em formato padronizado.
      3. Portal de auditoria de terceiros: acesso controlado aos registros do
         terceiro para fins de supervisao do participante.
      4. Dashboard de SLA de terceiros: tempo de resposta de KYC, percentual
         de dados completos, taxa de erros.

      **Segregacao de dados:**
      5. Dados de clientes compartilhados com terceiros devem ser minimizados
         (principio de necessidade) e protegidos com criptografia.
      6. Logs de acesso do terceiro aos dados do participante para auditoria.
    tools:
      - vendor-management
      - api-gateway
      - audit-trail
      - data-encryption
  devsecops:
    prose: |
      **Seguranca de integracoes com terceiros:**
      1. Security scanning de APIs e SDKs de terceiros usados em PLD/FT.
      2. Testes de integracao com sistemas de terceiros em ambiente de staging.
      3. Monitoramento de disponibilidade e latencia de APIs de terceiros
         com alertas automaticos para degradacao.
      4. Processo de revisao de seguranca ao renovar contratos com terceiros.
    tools:
      - gitlab-dep-scanning
      - api-monitoring
      - integration-testing
  secops:
    prose: |
      **Supervisao de terceiros:**
      1. Auditoria anual de cada terceiro que executa atividades de PLD/FT.
      2. Checklist de avaliacao de terceiros cobrindo os quatro incisos do art. 9.
      3. Plano de contingencia para descontinuidade do terceiro (como o
         participante assumiria as atividades se necessario).
      4. Relatorio de desempenho de terceiros incluido no relatorio anual do
         diretor responsavel (art. 7, III).
    tools:
      - vendor-management
      - grc-platform
      - audit-management
