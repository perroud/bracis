id: art-5
family: cap-2
title: "Politica Institucional de PLD/FT"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 5. Os participantes mencionados no art. 1 devem implementar e manter
    política de prevenção à lavagem de dinheiro e ao financiamento do terrorismo,
    formulada com base nos princípios e nas diretrizes que busquem prevenir a
    utilização do participante para a prática dos crimes de que trata esta Resolução.

    Parágrafo único. A política de que trata o caput deve ser compatível com os
    resultados da avaliação interna de risco de que trata o art. 4 e deve abranger,
    no mínimo:
    I - os princípios e os objetivos da política de PLD/FT da entidade;
    II - os procedimentos de identificação, qualificação e classificação de risco
    dos clientes;
    III - os procedimentos de monitoramento de operações e situações suspeitas;
    IV - os procedimentos de comunicação ao COAF;
    V - as responsabilidades dos colaboradores e da diretoria; e
    VI - os procedimentos de treinamento e capacitação.
guidance:
  prose: |
    O art. 5 exige que o programa de PLD/FT seja formalizado em uma politica
    documentada, abrangente e conectada a avaliacao de risco institucional.

    **Politica como documento vivo:**
    A politica nao e um documento que se cria uma vez e esquece. Deve ser:
    - Revisada quando a avaliacao de risco (art. 4) for atualizada
    - Aprovada pela diretoria e comunicada a todos os colaboradores relevantes
    - Disponivel para consulta pelos colaboradores e para a CVM quando solicitada

    **Conteudo minimo (paragrafo unico):**
    Os seis elementos obrigatorios formam um ciclo completo de PLD/FT:
    principios → KYC → monitoramento → comunicacao ao COAF → responsabilidades
    → treinamento. Qualquer politica que omita um desses elementos esta em
    nao-conformidade.

    **Alinhamento com a avaliacao de risco:**
    A politica deve refletir os riscos identificados na avaliacao interna. Se
    a avaliacao identifica alto risco em clientes estrangeiros, a politica deve
    ter procedimentos especificos para esse perfil — nao pode ser generica.
implementation_guidance:
  platform_engineering:
    prose: |
      **Politica como codigo:**
      1. Politica de PLD/FT versionada em repositorio Git em formato auditavel
         (Markdown, PDF gerado de fonte controlada por versao).
      2. Template estruturado que garante cobertura dos seis elementos do
         paragrafo unico com checklists de completude.
      3. Engine de regras que implementa a politica em logica executavel:
         regras de KYC, thresholds de monitoramento, criterios de comunicacao.
      4. Parametros da politica externalizados em configuracao (nao hard-coded)
         para permitir ajustes sem deploy.

      **Vinculo politica-sistema:**
      5. Cada regra no sistema de PLD/FT deve ter rastreabilidade para o artigo
         da politica e da CVM 50 que a origina.
      6. Dashboard mostrando cobertura: quais elementos da politica ja estao
         implementados no sistema.
    tools:
      - aml-platform
      - rules-engine
      - document-management
      - feature-flags
  devsecops:
    prose: |
      **Governanca da politica via GitLab:**
      1. Politica em repositorio Git com historico de alteracoes e aprovacoes.
      2. Pull requests com revisao obrigatoria por compliance officer e diretoria
         para qualquer alteracao na politica.
      3. Changelog automatico documentando o que mudou em cada versao da politica.
      4. Testes de regressao para garantir que alteracoes na politica nao removem
         controles obrigatorios.
      5. Pipeline de validacao que verifica completude do documento (todos os
         seis elementos do paragrafo unico presentes).
    tools:
      - gitlab-ci
      - code-review
      - test-automation
  secops:
    prose: |
      **Ciclo de vida da politica:**
      1. Aprovacao anual pela diretoria com ata documentada.
      2. Comunicacao a todos os colaboradores apos cada revisao.
      3. Versao vigente acessivel no portal interno 24/7.
      4. Registro de ciencia dos colaboradores (aceite digital).
      5. Relatorio de desvios da politica identificados em auditorias.
    tools:
      - grc-platform
      - training-platform
      - document-management
