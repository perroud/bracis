id: art-6
family: cap-2
title: "Abordagem Baseada em Risco"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 6. As políticas, os procedimentos e os controles internos de prevenção
    à PLD/FT devem ser formulados com base em abordagem baseada em risco, de
    forma a alocar os recursos de prevenção proporcionalmente ao nível de risco
    identificado na avaliação interna.

    § 1. A abordagem baseada em risco implica a adoção de:
    I - procedimentos simplificados de diligência para clientes e operações
    classificados como de baixo risco;
    II - procedimentos normais de diligência para clientes e operações
    classificados como de risco médio; e
    III - procedimentos reforçados de diligência para clientes e operações
    classificados como de alto risco.

    § 2. A classificação de risco deve ser documentada e revisada periodicamente,
    ou sempre que houver mudanças relevantes no perfil do cliente ou da operação.
guidance:
  prose: |
    A abordagem baseada em risco (RBA - Risk-Based Approach) e o paradigma
    dominante de PLD/FT internacionalmente, recomendado pelo GAFI/FATF e
    adotado pela CVM 50.

    **Os tres niveis de diligencia:**
    1. Diligencia simplificada (SDD - Simplified Due Diligence): clientes de
       baixo risco (pessoa fisica com historico limpo, renda comprovada, perfil
       conservador de investimentos). Coleta minima de dados, verificacao
       automatizada, monitoramento basico.

    2. Diligencia normal (CDD - Customer Due Diligence): clientes de risco
       medio. Coleta completa de dados, verificacao documental padrao,
       monitoramento regular.

    3. Diligencia reforçada (EDD - Enhanced Due Diligence): clientes de alto
       risco (PEPs, jurisdicoes de alto risco, estruturas complexas, volumes
       elevados). Coleta detalhada, verificacao adicional (visita, referencias),
       aprovacao por compliance, monitoramento intensivo.

    **Dinamismo da classificacao:**
    A classificacao de risco nao e estatica. Um cliente que começa com risco
    baixo pode mudar para alto risco se: se tornar PEP, realizar operacoes
    atipicas, ter vinculos com jurisdicoes de alto risco, ou apresentar
    inconsistencias entre perfil e transacoes.
implementation_guidance:
  platform_engineering:
    prose: |
      **Motor de classificacao de risco:**
      1. Algoritmo de scoring multidimensional que combina fatores de risco:
         tipo de pessoa (PF/PJ), atividade economica, jurisdicao, PEP status,
         historico transacional, produtos utilizados.
      2. Thresholds configuraveis para cada nivel de risco (baixo/medio/alto)
         com documentacao do racional de cada threshold.
      3. Reclassificacao automatica quando atributos do cliente mudam (ex:
         cliente torna-se PEP, muda jurisdicao, altera perfil de investimento).
      4. Workflow diferenciado por nivel de risco: formulario simplificado para
         baixo risco, workflow completo com escalacao para alto risco.

      **Monitoramento proporcional:**
      5. Regras de monitoramento com sensibilidade configuravel por nivel de risco:
         thresholds menores e mais alertas para clientes de alto risco.
      6. Frequencia de revisao cadastral automatizada por nivel de risco:
         baixo (anual), medio (semestral), alto (trimestral ou sob evento).
    tools:
      - risk-scoring
      - aml-platform
      - workflow-engine
      - rules-engine
  devsecops:
    prose: |
      **Testes de classificacao:**
      1. Testes unitarios para cada criterio de scoring de risco.
      2. Testes de integracao: dado um perfil de cliente, verificar se a
         classificacao correta e atribuida.
      3. Testes de regressao apos alteracoes no motor de scoring.
      4. Testes de performance do motor de scoring sob carga (tempo de
         classificacao em millisegundos para nao impactar onboarding).
      5. Validacao de que reclassificacao automatica funciona corretamente
         quando atributos mudam.
    tools:
      - gitlab-ci
      - test-automation
      - performance-testing
  secops:
    prose: |
      **Auditoria da classificacao:**
      1. Auditoria periodica da distribuicao de risco: percentual de clientes
         por nivel deve ser plausivel para o perfil da entidade.
      2. Revisao de amostras de classificacao de cada nivel para validar
         corretude das regras.
      3. Analise de clusters: clientes classificados como baixo risco com
         comportamento atipico devem ser reclassificados.
      4. Backtesting: verificar se clientes que geraram alertas estavam
         previamente classificados em nivel de risco adequado.
    tools:
      - aml-platform
      - audit-management
      - analytics-platform
