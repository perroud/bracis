id: art-10
family: cap-2
title: "Procedimentos para Novas Tecnologias e Canais Digitais"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 10. Os participantes devem avaliar os riscos de PLD/FT associados ao
    uso de novas tecnologias, produtos inovadores e canais de distribuição
    digitais antes de sua implementação ou adoção.

    § 1. A avaliação de que trata o caput deve considerar:
    I - a natureza e o escopo da nova tecnologia ou canal;
    II - o perfil dos clientes que utilizarão a tecnologia ou canal;
    III - as jurisdições envolvidas; e
    IV - a capacidade de identificação e monitoramento dos clientes
    pelo novo canal ou tecnologia.

    § 2. Os participantes devem implementar medidas de mitigação de risco
    proporcionais ao nível de risco identificado na avaliação prevista no
    caput antes de adotar a nova tecnologia ou canal.
guidance:
  prose: |
    O art. 10 e especialmente relevante no contexto atual do mercado de capitais,
    onde fintechs e corretoras digitais proliferam com modelos 100% online,
    biometria, open finance e integracoes com plataformas de criptoativos.

    **Tecnologias e canais de alto risco em PLD/FT:**
    - Onboarding 100% digital sem contato presencial: maior risco de identidade
      falsa, documentos adulterados
    - Plataformas de investimento abertas com terceiros: risco de agentes de
      risco sendo usados como intermediarios
    - APIs de open finance: risco de acesso automatizado por clientes de alto
      risco sem controle adequado
    - Criptoativos tokenizados: risco de origem ilicita de recursos investidos

    **Avaliacao de risco prospectiva:**
    Ao contrario dos demais artigos que olham para o que ja existe, este artigo
    exige avaliacao ANTES da implementacao. Isso significa que o desenvolvimento
    de novos produtos precisa incluir uma etapa de threat assessment de PLD/FT
    no processo de design.

    **Pratica:**
    Gestoras que lancam novos fundos, corretoras que abrem novos canais de
    distribuicao, fintechs que adotam APIs de open finance devem documentar
    a avaliacao de risco de PLD/FT antes do go-live.
implementation_guidance:
  platform_engineering:
    prose: |
      **PLD/FT no ciclo de desenvolvimento (security by design):**
      1. Template de avaliacao de risco de PLD/FT como gate obrigatorio no
         processo de lancamento de novos produtos ou canais.
      2. Checklist automatizado de requisitos de PLD/FT para novos projetos:
         mecanismo de identificacao, monitoramento, comunicacao ao COAF.
      3. Ambiente de sandbox de PLD/FT para testar novos canais antes do
         lancamento em producao.
      4. Modulos de KYC reutilizaveis que podem ser integrados em novos canais
         sem reescrever os controles.

      **Deteccao de risco em novas tecnologias:**
      5. Para canais digitais: biometria com liveness detection, verificacao
         de documentos com IA, enriquecimento de dados automatico.
      6. Para produtos inovadores: mapeamento explicito de fluxo de dinheiro
         e pontos de entrada de recursos com risco de origem ilicita.
    tools:
      - kyc-platform
      - biometric-verification
      - risk-assessment-tool
      - sandbox-environment
  devsecops:
    prose: |
      **PLD/FT como etapa obrigatoria do pipeline:**
      1. Etapa de compliance review no pipeline de CI/CD para novos modulos
         que toquem fluxos financeiros.
      2. Testes de casos de uso de PLD/FT para novos canais (tentativa de
         onboarding com documentos falsos, transacoes acima de thresholds).
      3. Revisao de seguranca obrigatoria por compliance antes de merge de
         codigo relacionado a KYC ou monitoramento.
    tools:
      - gitlab-ci
      - security-review
      - compliance-gates
  secops:
    prose: |
      **Governanca de novas tecnologias:**
      1. Comite de aprovacao de novos produtos com representante de PLD/FT.
      2. Processo de avaliacao de risco documentado antes de cada lancamento.
      3. Revisao pos-lancamento (30/60/90 dias) para validar que os controles
         sao efetivos no novo canal/produto em producao.
    tools:
      - grc-platform
      - risk-management
      - project-management
