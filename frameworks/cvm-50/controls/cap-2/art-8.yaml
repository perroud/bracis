id: art-8
family: cap-2
title: "Controles Internos de PLD/FT"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 8. Os participantes mencionados no art. 1 devem implementar controles
    internos suficientes para assegurar o cumprimento desta Resolução, incluindo:

    I - mecanismos de identificação e verificação de clientes e beneficiários
    finais;
    II - sistemas de monitoramento de operações para detecção de situações
    suspeitas;
    III - procedimentos de análise e decisão sobre comunicações ao COAF;
    IV - mecanismos de armazenamento e recuperação de informações necessárias
    para cumprimento das obrigações legais; e
    V - processos de revisão e aprimoramento contínuo dos controles.
guidance:
  prose: |
    Os controles internos de PLD/FT formam o arcabouco operacional do programa.
    Este artigo determina que os controles sejam suficientes — nao apenas
    existentes. Suficiencia implica efetividade: controles que existem no papel
    mas nao funcionam na pratica nao satisfazem a exigencia regulatoria.

    **Os cinco elementos dos controles internos:**
    1. KYC e beneficiario final: nao basta identificar — e preciso verificar.
       Documentos devem ser autenticados, nao apenas coletados.
    2. Monitoramento: o sistema deve ser capaz de detectar padroes suspeitos
       com razoavel sensibilidade (poucos falsos negativos) e especificidade
       razoavel (nao gerar alerta para tudo).
    3. Comunicacao ao COAF: processo estruturado com criterios claros, prazo
       definido e decisao documentada — incluindo decisoes de NAO comunicar.
    4. Armazenamento: dados devem ser recuperaveis pelo prazo legal (5 anos
       minimo para registros de operacoes, 10 anos para documentos de KYC).
    5. Melhoria continua: os controles devem evoluir conforme o ambiente de
       risco evolui. Programa que nunca muda e programa que nao funciona.

    **Documentacao de decisoes:**
    A cada etapa — onboarding, monitoramento, analise de suspeita, comunicacao
    ou nao ao COAF — a decisao tomada e o racional devem ser registrados.
    Isso protege o participante em fiscalizacoes futuras.
implementation_guidance:
  platform_engineering:
    prose: |
      **Arquitetura de controles internos:**
      1. Plataforma integrada de PLD/FT cobrindo os cinco elementos: KYC,
         monitoramento transacional, gestao de alertas, comunicacao ao COAF
         e armazenamento de evidencias.
      2. Banco de dados imutavel (append-only) para registro de todas as
         decisoes de PLD/FT com timestamp, usuario, contexto e justificativa.
      3. API de auditoria para exportacao de registros para auditores externos
         e CVM.

      **Efetividade dos controles:**
      4. Metricas de efetividade em tempo real: taxa de deteccao, tempo medio
         de resolucao de alertas, taxa de comunicacao ao COAF por alertas
         investigados.
      5. Backtesting de modelos de monitoramento contra casos historicos conhecidos.
      6. A/B testing de regras de monitoramento para validar melhorias antes
         de colocar em producao.
    tools:
      - aml-platform
      - transaction-monitoring
      - audit-trail
      - data-lake
  devsecops:
    prose: |
      **Qualidade dos controles via pipeline:**
      1. Testes automatizados de cada controle interno com casos de teste
         cobertos para falso positivo e falso negativo.
      2. Code coverage minimo de 80% para modulos de PLD/FT.
      3. Security scanning de dependencias dos sistemas de PLD/FT.
      4. Pipeline que verifica que alteracoes de codigo nao degradam
         controles existentes.
    tools:
      - gitlab-ci
      - test-automation
      - gitlab-sast
      - code-coverage
  secops:
    prose: |
      **Auditoria independente dos controles:**
      1. Auditoria interna anual de efetividade dos controles de PLD/FT.
      2. Teste de efetividade por amostragem: pegar casos historicos e
         verificar se o sistema os teria detectado.
      3. Revisao de falsos negativos: operacoes suspeitas que deveriam ter
         gerado alerta mas nao geraram.
      4. Plano de acao para lacunas identificadas com prazo e responsavel.
    tools:
      - audit-management
      - grc-platform
      - analytics-platform
