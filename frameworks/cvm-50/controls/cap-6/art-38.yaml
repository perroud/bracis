id: art-38
family: cap-6
title: "Conteudo das Comunicacoes ao COAF"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 38. As comunicações ao COAF devem conter, no mínimo:

    I - a identificação do participante comunicante;
    II - a identificação completa do cliente ou da contraparte envolvida,
    incluindo dados do beneficiário final quando identificado;
    III - a descrição detalhada da operação ou situação suspeita;
    IV - o valor envolvido, quando aplicável;
    V - a data da operação ou da situação suspeita;
    VI - as razões que fundamentam a suspeita; e
    VII - as medidas adotadas em relação à operação, incluindo eventual
    bloqueio ou recusa de execução.
guidance:
  prose: |
    A qualidade das comunicacoes ao COAF determina a utilidade da inteligencia
    financeira para as forcas de investigacao. Uma comunicacao incompleta ou
    vaga pode ser descartada pelo COAF sem gerar investigacao.

    **O inciso VI e o mais critico — "razoes que fundamentam a suspeita":**
    Este campo e onde a analise do art. 28 se traduz em comunicacao. O
    participante deve articular claramente: qual foi o padrao detectado,
    por que e inconsistente com o perfil do cliente, quais outros fatores
    de risco estao presentes, e por que, no conjunto, ha "serios indicios".

    **Identificacao do beneficiario final (inciso II):**
    Quando o cliente e uma pessoa juridica, a comunicacao deve identificar
    o beneficiario final (se identificado). Sem essa informacao, o COAF
    pode rastrear a PJ mas nao chegar ate a pessoa natural.

    **Inciso VII — medidas adotadas:**
    O COAF precisa saber: a operacao foi realizada (e pode haver movimentacao
    de ativos), foi bloqueada (ativos estao "presos" no participante), ou
    foi recusada (tentativa que nao foi executada). Essa informacao determina
    as acoes urgentes que o COAF pode recomendar as autoridades.
implementation_guidance:
  platform_engineering:
    prose: |
      **Template de comunicacao de alta qualidade:**
      1. Formulario de comunicacao no sistema de case management com todos
         os sete campos do art. 38 como obrigatorios — sistema nao permite
         submissao sem todos preenchidos.
      2. Campo de "razoes da suspeita" (inciso VI) com editor de texto rico
         e comprimento minimo configurado (ex: 200 caracteres) para evitar
         comunicacoes vagas.
      3. Pre-preenchimento automatico de dados de identificacao do cliente
         (incisos I e II) do cadastro KYC — analista nao precisa redigitar.
      4. Checklist de completude antes da submissao: sistema exibe sumario
         da comunicacao e pede confirmacao.
      5. Protocolo SISCOAF: ao submeter, sistema recebe e armazena o numero
         de protocolo do COAF como confirmacao de recebimento.
    tools:
      - case-management
      - siscoaf-integration
      - document-management
  devsecops:
    prose: |
      **Validacao de qualidade:**
      1. Testes de validacao de cada campo obrigatorio.
      2. Testes de que campo de razoes tem comprimento minimo.
      3. Testes de integracao com SISCOAF: comunicacao enviada com todos
         os campos retorna protocolo de confirmacao.
    tools:
      - test-automation
      - gitlab-ci
      - form-validation
  secops:
    prose: |
      **Qualidade das comunicacoes:**
      1. Revisao por amostragem de comunicacoes enviadas: avaliar qualidade
         do campo de razoes da suspeita.
      2. Treinamento de analistas em como escrever comunicacoes de qualidade.
      3. Feedback do COAF (quando disponivel) sobre qualidade das comunicacoes
         recebidas do participante.
    tools:
      - quality-assurance
      - training-platform
      - coaf-management
legal_references:
