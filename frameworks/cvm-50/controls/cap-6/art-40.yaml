id: art-40
family: cap-6
title: "Comunicacoes Periodicas Automaticas ao COAF"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 40. Independentemente da análise de suspeita, os participantes devem
    realizar comunicações periódicas automáticas ao COAF para as seguintes
    situações:

    I - operações em espécie (dinheiro físico) que atinjam ou superem o valor
    de R$ 10.000,00 (dez mil reais) realizadas por pessoas físicas;
    II - operações em espécie de qualquer valor realizadas por pessoas físicas
    quando o participante identifique elementos de risco;
    III - aquisição de ouro ou metais preciosos acima de R$ 30.000,00; e
    IV - outras situações previstas em instruções normativas do COAF.

    Parágrafo único. As comunicações de que trata o caput são objetivas e
    não implicam necessariamente suspeita de PLD/FT — representam mera
    obrigação de informação ao COAF.
implementation_guidance:
  platform_engineering:
    prose: |
      **Comunicacoes automaticas:**
      1. Pipeline de geracao automatica de comunicacoes periodicas: ao final
         de cada dia, sistema identifica operacoes que se enquadram nos
         incisos I, II e III e gera comunicacao automatica ao COAF.
      2. Batch de comunicacoes: comunicacoes periodicas sao enviadas em lote
         ao SISCOAF, diferente das comunicacoes de suspeita que sao individuais.
      3. Reconciliacao: confirmar que todas as operacoes elegíveis foram
         incluidas nas comunicacoes automaticas.
      4. Log de todas as comunicacoes automaticas com numero de protocolo.
    tools:
      - coaf-reporting
      - scheduled-jobs
      - siscoaf-integration
      - data-lake
  devsecops:
    prose: |
      **Testes de comunicacoes automaticas:**
      1. Testes de que operacoes em especie acima de R$ 10.000 geram
         comunicacao automatica.
      2. Testes de batch: garantir que todas as operacoes do dia sao incluidas.
      3. Testes de reconciliacao: comparar total de comunicacoes com total
         de operacoes elegíveis.
    tools:
      - test-automation
      - batch-testing
      - gitlab-ci
  secops:
    prose: |
      **Conformidade das comunicacoes automaticas:**
      1. Relatorio diario de comunicacoes automaticas realizadas.
      2. Auditoria mensal de reconciliacao: nenhuma operacao elegível deve
         ter ficado sem comunicacao.
      3. Revisao anual dos criterios de comunicacao automatica com base em
         novas instrucoes normativas do COAF.
    tools:
      - coaf-management
      - reconciliation-tool
      - compliance-management
guidance:
  prose: |
    As comunicacoes periodicas automaticas sao diferentes das comunicacoes
    por suspeita: nao implicam que o participante acredita que houve lavagem
    de dinheiro — sao obrigacoes de reporte objetivo, independente de qualquer
    analise de suspeita.

    **Racionalidade das comunicacoes automaticas:**
    O COAF usa essas informacoes como inteligencia financeira: nao para acionar
    investigacoes imediatas, mas para construir um panorama de movimentacoes
    em especie e identificar padroes ao longo do tempo e entre diferentes
    participantes do sistema financeiro.

    **Diferenca com comunicacoes por suspeita:**
    - Comunicacao por suspeita (art. 36): o participante fez analise e concluiu
      que ha serios indicios de PLD/FT.
    - Comunicacao automatica (art. 40): o participante informa objetivamente
      que houve determinada operacao — sem julgamento de suspeita.

    **Implicacoes operacionais:**
    As comunicacoes automaticas podem ser processadas em batch (fim do dia,
    fim do mes) e nao exigem analise individual. O volume pode ser alto.
