id: art-14
family: cap-3
title: "Diligencia Reforçada para Clientes de Alto Risco"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 14. Os participantes devem adotar procedimentos de diligência reforçada
    para clientes classificados como de alto risco, incluindo:

    I - verificação aprofundada de informações cadastrais e documentos de
    identificação;
    II - investigação da origem dos recursos e do patrimônio;
    III - aprovação de nível hierárquico superior para abertura ou manutenção
    da relação de negócios;
    IV - monitoramento contínuo e mais frequente das operações; e
    V - revisão periódica da classificação de risco com documentação das
    justificativas.

    Parágrafo único. São exemplos de situações que exigem diligência reforçada:
    I - clientes residentes ou domiciliados em países com deficiências em
    PLD/FT conforme lista do GAFI;
    II - clientes cujas operações não são consistentes com o perfil declarado;
    III - clientes com estruturas societárias complexas ou opacas; e
    IV - clientes com histórico de envolvimento em investigações ou processos
    relacionados a PLD/FT.
guidance:
  prose: |
    A diligencia reforçada (Enhanced Due Diligence - EDD) e o conjunto de medidas
    adicionais aplicadas quando o risco e alto. Nao se trata apenas de coletar
    mais documentos, mas de fazer uma investigacao mais profunda sobre o cliente
    e suas atividades.

    **Investigacao de origem de recursos:**
    Este e o ponto mais critico da EDD. O participante deve investigar como o
    cliente acumulou o patrimonio que esta investindo. Para PJ, como a empresa
    gera receita. Documentos uteis: DIRPF, DIRF, contratos de trabalho/prestacao
    de servicos, contrato social com historico de distribuicao de lucros,
    declaracoes de imposto de renda de empresas.

    **Aprovacao hierarquica:**
    A exigencia de nivel hierarquico superior serve como controle compensatorio:
    um analista pode ser pressionado ou corrompido, mas escalar para diretoria
    dificulta a aprovacao irregular.

    **Situacoes do paragrafo unico:**
    A lista nao e exaustiva — o participante deve identificar outras situacoes
    de alto risco com base na sua avaliacao interna (art. 4). As quatro situacoes
    listadas sao os exemplos mais criticos: paises de risco, inconsistencia
    perfil/transacao, opacidade societaria, historico de suspeitas.
implementation_guidance:
  platform_engineering:
    prose: |
      **Workflow de EDD:**
      1. Formulario de EDD com campos adicionais especificos para alto risco:
         origem de recursos, justificativa da relacao de negocios, documentos
         complementares.
      2. Workflow de aprovacao hierarquica implementado no sistema: escalacao
         automatica para compliance officer e diretoria.
      3. Checklist digital de EDD com assinatura eletrica do analista
         responsavel e do aprovador.
      4. Timer de revisao periodica: clientes de alto risco recebem lembrete
         automatico de revisao em prazo configurado (ex: 6 meses).

      **Screening aprofundado:**
      5. Integracao com OFAC, EU, ONU e listas GAFI de paises de alto risco.
      6. Verificacao de adverse media (mencoes negativas em imprensa) via
         API de noticias ou servico especializado.
      7. Consulta a bases de dados de processos judiciais (TRF, STF, STJ)
         para historico de investigacoes.
    tools:
      - kyc-platform
      - adverse-media-screening
      - workflow-engine
      - sanctions-screening
  devsecops:
    prose: |
      **Qualidade do processo de EDD:**
      1. Testes de workflow de EDD: garantir escalacao correta por nivel hierarquico.
      2. Testes de timeout: EDD nao pode bloquear indefinidamente sem resolucao.
      3. Audit trail imutavel de cada etapa do processo de EDD.
      4. Testes de integracao com fontes de adverse media e listas de sancoes.
    tools:
      - test-automation
      - gitlab-ci
      - audit-log
  secops:
    prose: |
      **Controle do processo de EDD:**
      1. KPI: tempo medio para conclusao de EDD por perfil de cliente.
      2. Auditoria de qualidade das EDD realizadas por amostragem.
      3. Revisao de decisoes de EDD: clientes aprovados como alto risco
         sem justificativa adequada devem ser reavaliados.
      4. Relatorio mensal de clientes com EDD pendente ou atrasada.
    tools:
      - aml-platform
      - grc-platform
      - audit-management
