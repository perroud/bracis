id: art-20
family: cap-3
title: "Cadastro de Empregados e Colaboradores"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 20. Os participantes devem adotar procedimentos para verificar os
    antecedentes e a reputação de seus empregados e colaboradores que atuem
    em atividades sujeitas a riscos de PLD/FT, incluindo:

    I - verificação de antecedentes criminais e financeiros;
    II - verificação de histórico profissional e referências;
    III - identificação de potenciais conflitos de interesse; e
    IV - monitoramento contínuo para detecção de comportamentos suspeitos
    ou indicativos de envolvimento em PLD/FT.

    Parágrafo único. Os procedimentos de que trata o caput devem ser
    aplicados no momento da contratação e periodicamente durante o vínculo.
guidance:
  prose: |
    O risco interno e uma dimensao critica de PLD/FT frequentemente subestimada.
    Colaboradores corruptos ou envolvidos com redes criminosas podem ser
    usados para: aprovar clientes que deveriam ser recusados, suprimir alertas
    de monitoramento, fornecer informacoes confidenciais de clientes suspeitos,
    ou facilitar operacoes ilegais.

    **Quais colaboradores estao no escopo:**
    Prioritariamente: analistas de compliance, analistas de onboarding, operadores
    de mesa, gerentes de relacionamento com clientes de alto risco, pessoas com
    acesso ao sistema de PLD/FT e a base de dados de clientes.

    **Verificacoes no momento da contratacao:**
    - Antecedentes criminais: certidoes estaduais e federais
    - Antecedentes financeiros: historico de credito, concordatas pessoais
    - Historico profissional: verificacao de empregos anteriores, demissoes
    - Conflitos de interesse: familiar ou socio de cliente de alto risco

    **Monitoramento continuo (paragrafo unico):**
    Nao basta verificar no momento da contratacao. Um colaborador que posteriormente
    se torna PEP (ex: se candidata a cargo publico) ou envolve-se em atividades
    suspeitas deve ser detectado. Monitoramento comportamental: acesso incomum
    ao sistema, aprovacoes fora do padrao, comunicacoes suspeitas.
implementation_guidance:
  platform_engineering:
    prose: |
      **Controles de acesso baseados em papel:**
      1. Sistema de IAM (Identity and Access Management) com papeis granulares
         para o sistema de PLD/FT: analista, supervisor, compliance officer,
         diretor responsavel.
      2. Segregacao de funcoes: quem aprova o KYC nao pode aprovar a transacao;
         quem gera alertas nao pode os resolver.
      3. Log imutavel de todas as acoes no sistema de PLD/FT por usuario,
         com capacidade de auditoria forense.
      4. Alertas para comportamento anomalo: aprovacoes em horario incomum,
         acesso a volume incomum de registros, aprovacoes de clientes de alto
         risco por analistas que nao os tem em carteira.

      **Gestao de ciclo de vida de acesso:**
      5. Revogacao automatica de acesso ao desligamento do colaborador.
      6. Revisao periodica de acessos (quarterly access review).
    tools:
      - identity-management
      - siem
      - access-review
      - audit-log
  devsecops:
    prose: |
      **Seguranca do sistema de PLD/FT:**
      1. Princípio de menor privilegio: colaboradores acessam apenas o necessario.
      2. Autenticacao forte (MFA) para acesso ao sistema de PLD/FT.
      3. Criptografia de dados de clientes: mesmo um DBA nao pode ver dados
         sensiveis sem autorizacao explicita.
      4. Monitoramento de acesso ao banco de dados de clientes.
    tools:
      - identity-management
      - mfa
      - data-encryption
      - database-monitoring
  secops:
    prose: |
      **Programa de due diligence de colaboradores:**
      1. Processo formal de verificacao de antecedentes para novas contratacoes.
      2. Revisao anual de verificacoes para colaboradores em posicoes criticas.
      3. Canal de denuncias anonimo para colaboradores reportarem suspeitas
         sobre colegas.
      4. Programa de treinamento sobre conduta e conflitos de interesse.
    tools:
      - hr-platform
      - training-platform
      - whistleblower-system
