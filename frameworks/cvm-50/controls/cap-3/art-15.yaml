id: art-15
family: cap-3
title: "Diligencia Simplificada para Clientes de Baixo Risco"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 15. Os participantes podem adotar procedimentos de diligência simplificada
    para clientes classificados como de baixo risco, desde que:

    I - o participante tenha realizado avaliação interna de risco que suporte
    a classificação de baixo risco para o segmento de clientes em questão;
    II - os procedimentos simplificados ainda garantam a coleta dos dados
    mínimos obrigatórios previstos no art. 11;
    III - o monitoramento básico de operações seja mantido mesmo para clientes
    de baixo risco; e
    IV - a classificação de baixo risco seja documentada e revisada periodicamente.

    Parágrafo único. A adoção de procedimentos simplificados não exime o
    participante de elevar o nível de diligência se surgirem indicadores
    de risco durante a relação de negócios.
guidance:
  prose: |
    A diligencia simplificada (SDD - Simplified Due Diligence) e a face
    da proporcionalidade na pratica. Permite que o participante aloque recursos
    de forma eficiente, concentrando esforcos nos clientes de maior risco.

    **Condicoes para adocao de SDD:**
    A SDD nao e uma decisao livre — precisa ser justificada pela avaliacao
    interna de risco. O participante precisa demonstrar que para determinado
    segmento de clientes, o risco e objetivamente baixo.

    **O que pode ser simplificado (e o que nao pode):**
    Pode ser simplificado: verificacao adicional de documentos, aprovacao
    hierarquica, periodicidade de atualizacao cadastral.
    Nao pode ser dispensado: dados minimos do art. 11, monitoramento basico
    de operacoes.

    **O paragrafo unico e a chave:**
    SDD nao e classificacao definitiva e imutavel. Se o cliente de "baixo risco"
    começa a apresentar operacoes inconsistentes com seu perfil, o participante
    deve IMEDIATAMENTE elevar o nivel de diligencia. O sistema deve ser capaz
    de detectar essa mudanca e acionar o protocolo de EDD automaticamente.
implementation_guidance:
  platform_engineering:
    prose: |
      **Configuracao de SDD:**
      1. Perfis de SDD configurados por segmento de cliente com documentacao
         do racional de cada perfil.
      2. Formulario de onboarding simplificado para SDD com campos obrigatorios
         reduzidos (mas nunca abaixo do minimo do art. 11).
      3. Trigger automatico para elevacao de diligencia: quando cliente de
         baixo risco atinge threshold de alerta, workflow de EDD e iniciado
         automaticamente.
      4. Dashboard de distribuicao de risco: percentual de clientes em cada
         nivel para monitoramento gerencial.

      **Eficiencia operacional:**
      5. Para clientes em SDD, onboarding deve ser o mais automatizado possivel:
         validacao automatica de CPF/CNPJ, verificacao documental por OCR,
         aprovacao automatica quando score e baixo.
    tools:
      - kyc-platform
      - risk-scoring
      - workflow-engine
      - aml-platform
  devsecops:
    prose: |
      **Testes de SDD:**
      1. Testes de que SDD nunca permite omitir campos obrigatorios do art. 11.
      2. Testes de elevacao automatica de diligencia: cliente SDD que gera
         alerta deve ter nivel elevado automaticamente.
      3. Testes de que decisao de SDD e documentada e auditavel.
    tools:
      - test-automation
      - gitlab-ci
  secops:
    prose: |
      **Auditoria de SDD:**
      1. Revisao anual de perfis de clientes em SDD para confirmar que
         classificacao de baixo risco ainda e valida.
      2. Monitoramento de taxa de elevacao de SDD para EDD: taxa muito baixa
         pode indicar que o monitoramento basico e insuficiente.
      3. Auditoria de casos onde cliente em SDD deveria ter sido elevado para
         EDD antes de gerar um alerta critico.
    tools:
      - aml-platform
      - audit-management
