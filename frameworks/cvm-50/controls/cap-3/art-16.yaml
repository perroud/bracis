id: art-16
family: cap-3
title: "Clientes Nao Residentes e Jurisdicoes de Alto Risco"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 16. Os participantes devem adotar procedimentos específicos para
    clientes não residentes no Brasil e para clientes oriundos de países ou
    territórios que apresentem deficiências em seus sistemas de PLD/FT conforme
    identificado pelo Grupo de Ação Financeira Internacional (GAFI) ou que
    sejam considerados de alto risco por outras razões.

    § 1. Para clientes de países com deficiências em PLD/FT identificadas
    pelo GAFI, os participantes devem:
    I - aplicar procedimentos de diligência reforçada;
    II - avaliar a conveniência de manter ou estabelecer a relação de negócios;
    III - considerar a implementação de medidas adicionais de mitigação de risco.

    § 2. Os participantes devem manter-se atualizados sobre as listas publicadas
    pelo GAFI e por órgãos nacionais competentes com relação a países e territórios
    de alto risco.
guidance:
  prose: |
    O risco geografico e uma dimensao central de PLD/FT. Recursos ilicitos
    frequentemente transitam por jurisdicoes com baixa cooperacao internacional,
    sigilo bancario extremo ou sistemas de PLD/FT deficientes antes de chegar
    ao Brasil.

    **Listas relevantes:**
    - FATF Black List (High-Risk Jurisdictions): paises com deficiencias graves
      — medidas reforçadas obrigatorias
    - FATF Grey List (Jurisdictions under Increased Monitoring): paises com
      deficiencias que estao sendo monitorados — diligencia reforçada recomendada
    - OFAC SDN (Specially Designated Nationals): individuos e entidades com
      os quais transacoes sao proibidas
    - EU List of High-Risk Third Countries: lista europeia complementar
    - UN Consolidated List: sancoes da ONU

    **Clientes nao residentes:**
    Mesmo clientes de paises sem deficiencias em PLD/FT devem receber atenção
    adicional por: dificuldade de verificacao documental, ausencia de CRS/FATCA,
    barreiras de idioma na obtencao de documentos e dificuldade de contato
    em caso de suspeita.

    **Atualizacao continua das listas:**
    O GAFI atualiza suas listas periodicamente (geralmente em fevereiro, junho
    e outubro). O participante deve ter processo para atualizar seus sistemas
    quando as listas mudam.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de listas geograficas:**
      1. Pipeline automatizado de atualizacao de listas GAFI, OFAC, EU e ONU
         com notificacao para compliance quando ha alteracoes.
      2. Verificacao geografica automatica no onboarding: comparar pais de
         residencia/incorporacao do cliente com listas de risco.
      3. Rescreening geografico: quando listas sao atualizadas, rescanear
         toda a base de clientes ativos.
      4. Workflow especifico para clientes de paises GAFI black/grey list:
         aprovacao obrigatoria pela diretoria, nao apenas compliance officer.

      **Documentacao adicional para nao residentes:**
      5. Formulario de KYC adaptado para estrangeiros: passaporte, tax ID
         do pais de origem, comprovante de endereco no exterior.
      6. Traducao e apostilamento de documentos quando necessario.
    tools:
      - sanctions-screening
      - kyc-platform
      - workflow-engine
      - list-management
  devsecops:
    prose: |
      **Automacao de listas geograficas:**
      1. Job automatizado de importacao de listas GAFI/OFAC/EU com validacao
         de integridade dos dados.
      2. Testes de que clientes de paises na blacklist nao podem ser aprovados
         sem aprovacao de nivel diretoria.
      3. Alerta imediato quando pais de um cliente ativo entra em lista de risco.
    tools:
      - gitlab-ci
      - scheduled-jobs
      - test-automation
  secops:
    prose: |
      **Monitoramento geografico:**
      1. Dashboard com distribuicao de clientes por pais e classificacao de risco.
      2. Revisao trimestral de exposicao a clientes em jurisdicoes de risco.
      3. Decisao documentada para cada relacao de negocios com cliente de
         pais em lista GAFI — justificativa de manter ou encerrar.
    tools:
      - aml-platform
      - grc-platform
      - reporting-dashboard
