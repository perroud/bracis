id: art-13
family: cap-3
title: "Pessoas Politicamente Expostas (PEP)"
class: CVM-50
baselines: [todos-participantes]
statement:
  prose: |
    Art. 13. Os participantes devem adotar procedimentos específicos para
    identificar, classificar e monitorar clientes que sejam pessoas politicamente
    expostas (PEP) ou que tenham PEP como beneficiário final, representante
    ou estreito colaborador.

    § 1. Os procedimentos de que trata o caput devem incluir:
    I - verificação sistemática de todos os clientes e beneficiários finais
    em bases de dados de PEP;
    II - aprovação de nível hierárquico superior para início ou manutenção
    de relações de negócios com PEPs;
    III - monitoramento reforçado e contínuo das operações de PEPs; e
    IV - investigação da origem dos recursos de PEPs.

    § 2. Os participantes devem aplicar os procedimentos de que trata
    o caput a PEPs nacionais e estrangeiros.

    § 3. Os procedimentos aplicados a PEPs devem ser mantidos por período
    mínimo de cinco anos após a cessação da condição de PEP.
guidance:
  prose: |
    O tratamento diferenciado de PEPs e uma exigencia global de PLD/FT.
    Pessoas em cargos publicos relevantes tem acesso privilegiado a recursos
    publicos e a capacidade de influenciar decisoes que podem beneficia-las
    ilicitamente (corrupcao). O mercado de capitais e um vetor classico de
    lavagem de recursos de corrupcao.

    **Escopo de PEP:**
    - Cargos relevantes no Brasil: Presidente, Ministros, Governadores, Prefeitos
      de capitais, Parlamentares (federal e estadual), Diretores de estatais e
      autarquias, Magistrados de tribunais superiores, Chefes de forcas armadas
    - Estrangeiros: cargos equivalentes em paises estrangeiros
    - Janela temporal: 5 anos apos deixar o cargo (ss 3)
    - Extensao: familiares (conjuge, companheiro, pais, filhos) e estreitos
      colaboradores (socios em negocios, pessoas com relacoes financeiras proximas)

    **Medidas especificas para PEPs:**
    A verificacao em bases de dados deve ser automatizada e continua.
    A aprovacao de nivel superior garante que um gerente comercial nao pode
    sozinho aprovar um cliente PEP — reduz risco de captura por corrupticao.
    O monitoramento reforçado significa thresholds mais baixos para alertas,
    maior frequencia de revisao de transacoes.

    **Investigacao de origem de recursos:**
    Para PEPs, nao basta saber o que estao investindo — e preciso investigar
    de onde veio o dinheiro. Declaracao de renda, DIRPF, comprovantes de
    rendimento, declaracao de bens na posse do cargo sao documentos relevantes.
implementation_guidance:
  platform_engineering:
    prose: |
      **Screening automatico de PEP:**
      1. Integracao com bases de dados de PEP: listas nacionais (DOU, TCU),
         internacionais (OFAC SDN, EU Consolidated, HM Treasury, UN), e
         bases comerciais (World-Check, Dow Jones, Refinitiv).
      2. Matching fuzzy de nomes com tolerancia configuravel para variantes,
         transliteracoes e apelidos.
      3. Monitoramento continuo: rescanning automatico de toda a base de
         clientes quando bases de PEP sao atualizadas.
      4. Alerta imediato para equipe de compliance quando cliente e identificado
         ou reclassificado como PEP.

      **Workflow de aprovacao de PEP:**
      5. Workflow automatico de aprovacao de nivel superior para novos clientes
         identificados como PEP — nao pode ser aprovado por analista sozinho.
      6. Monitoramento com thresholds diferenciados: alertas para PEPs em
         valores 50% menores que o threshold padrao.
      7. Investigacao de origem de recursos: checklist especifico para PEPs
         com documentos adicionais exigidos.
    tools:
      - pep-screening
      - sanctions-screening
      - workflow-engine
      - aml-platform
  devsecops:
    prose: |
      **Testes de PEP:**
      1. Testes de matching de PEP com variantes de nomes, incluindo nomes
         estrangeiros com caracteres especiais.
      2. Testes de rescanning: verificar que novos PEPs adicionados a base
         sao detectados em clientes existentes.
      3. Testes de workflow: garantir que aprovacao de nivel superior e
         realmente exigida para PEPs.
      4. Performance do screening: tempo de verificacao por cliente deve
         ser aceitavel para o fluxo de onboarding.
    tools:
      - test-automation
      - gitlab-ci
      - performance-testing
  secops:
    prose: |
      **Governanca de PEP:**
      1. Revisao trimestral de clientes classificados como PEP para verificar
         se condicao ainda se aplica.
      2. KPI: percentual de clientes verificados em base de PEP atualizada.
      3. Auditoria de casos onde cliente era PEP e nao foi identificado
         no momento do onboarding.
      4. Treinamento especifico sobre PEPs para equipes de compliance e
         atendimento.
    tools:
      - aml-platform
      - training-platform
      - audit-management
