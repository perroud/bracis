related_frameworks:
  - framework_id: bcb-3978
    relationship: equivalent-to
    description: >-
      A Resolucao CVM 50 e o analogo da Circular BCB 3.978 para o mercado de capitais.
      Ambas tratam de PLD/FT com requisitos substancialmente equivalentes, porem a CVM 50
      aplica-se a participantes do mercado de capitais (corretoras, distribuidoras,
      gestoras de fundos, administradoras de carteira) e a BCB 3.978 a instituicoes
      financeiras autorizadas pelo Banco Central.
  - framework_id: lgpd
    relationship: complements
    description: "A LGPD complementa a CVM 50 na protecao de dados pessoais coletados para KYC e PLD/FT, exigindo base legal, proporcionalidade e garantia dos direitos dos titulares de dados."
  - framework_id: cvm-35
    relationship: complements
    description: >-
      A CVM 35 trata de seguranca cibernetica enquanto a CVM 50 trata de PLD/FT —
      ambas aplicam-se ao mesmo universo de entidades reguladas pela CVM, sendo
      complementares na gestao de riscos do mercado de capitais.
  - framework_id: marco-civil
    relationship: complements
    description: >-
      O Marco Civil da Internet complementa os requisitos de retencao e acesso a
      registros de operacoes previstos na CVM 50, estabelecendo regras para dados
      gerados em plataformas digitais.
