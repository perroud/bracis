related_frameworks:
  - framework_id: gdpr
    relationship: derived-from
    description: >-
      The Thailand PDPA was heavily modeled on the EU General Data Protection Regulation
      (GDPR), sharing core concepts such as lawful bases for processing, data subject
      rights, DPO requirements, and breach notification obligations.
    mapping_file: "mappings/pdpa_to_gdpr.yaml"
  - framework_id: lgpd
    relationship: equivalent-to
    description: >-
      Brazil's LGPD and Thailand's PDPA are both GDPR-inspired data protection laws
      with comparable structures: lawful bases, data subject rights, DPO requirements,
      and cross-border transfer restrictions.
    mapping_file: "mappings/pdpa_to_lgpd.yaml"
  - framework_id: pipeda
    relationship: equivalent-to
    description: "Canada's PIPEDA and Thailand's PDPA share consent-centric models and accountability principles, though PIPEDA predates the GDPR influence."
    mapping_file: "mappings/pdpa_to_pipeda.yaml"
  - framework_id: popia
    relationship: equivalent-to
    description: "South Africa's POPIA and Thailand's PDPA are contemporaneous GDPR-influenced laws with similar scope, lawful bases, and enforcement structures."
    mapping_file: "mappings/pdpa_to_popia.yaml"
  - framework_id: iso-27701
    relationship: complements
    description: "ISO 27701 provides a privacy information management system (PIMS) framework that supports demonstrating compliance with the PDPA's data controller and processor obligations."
    mapping_file: "mappings/pdpa_to_iso27701.yaml"
