id: sec-26
family: chap-2
title: "Sensitive Data Processing"
class: PDPA-Thailand
statement:
  prose: |
    Section 26. A data controller shall not collect personal data pertaining to racial
    or ethnic origin, political opinions, cult, religious or philosophical beliefs,
    sexual behavior, criminal records, health data, disability, trade union information,
    genetic data, biometric data, or any other data which may affect the data subject
    in a similar manner, as prescribed by the PDPC.

    Exceptions: (1) explicit consent; (2) prevention or suppression of danger to life,
    body, or health where the data subject is incapable of giving consent; (3) activities
    of foundations, associations, or non-profit organizations with appropriate safeguards;
    (4) data manifestly made public by the data subject; (5) establishment, exercise, or
    defense of legal claims; (6) compliance with law for substantial public interest.
  parts:
    - id: sec-26-1
      label: "Paragraph 1"
      prose: |
        Prohibition on collecting sensitive personal data: racial/ethnic origin,
        political opinions, religious beliefs, sexual behavior, criminal records,
        health data, disability, trade union membership, genetic data, biometric data.
    - id: sec-26-2
      label: "Paragraph 2"
      prose: |
        Exceptions requiring explicit consent or a specific legal basis.
    - id: sec-26-3
      label: "Paragraph 3"
      prose: |
        Processing of criminal records is permitted only under the control of
        a competent authority or as authorized by law.
guidance:
  prose: |
    Section 26 mirrors GDPR Article 9 (special categories of data) with a Thai-specific
    list of sensitive data types. The default position is prohibition; processing is
    only allowed under explicit exceptions.

    Critical considerations:

    - **Broader Than GDPR:** The PDPA list includes "sexual behavior" and "disability"
      as explicit categories, and adds a catch-all for data "which may affect the data
      subject in a similar manner." This creates an expansive scope.

    - **Explicit Consent Required:** Unlike regular consent, sensitive data consent
      must be "explicit" — a higher standard. Implied or inferred consent is
      insufficient.

    - **Biometric Data:** Includes fingerprints, facial recognition, iris scans,
      voice prints. Authentication systems using biometrics trigger this provision.

    - **Health Data:** Includes medical records, fitness data, mental health
      information. Health-tech and wellness applications must implement stringent
      controls.

    - **Technical Safeguards:** Sensitive data demands enhanced security: encryption
      at rest and in transit, access control with need-to-know basis, enhanced
      audit logging, and data loss prevention measures.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Classify and tag sensitive data at the schema level. Implement data
         classification policies that automatically detect sensitive categories.
      2. Enforce enhanced encryption for sensitive data: column-level encryption,
         envelope encryption, or dedicated key management.
      3. Implement stricter access controls for sensitive data: role-based access
         with explicit approval workflows, time-limited access grants.
      4. Build separate consent flows for sensitive data with explicit consent
         mechanisms (not just checkboxes — require affirmative action).
      5. Isolate sensitive data in dedicated stores with enhanced monitoring.
    tools:
      - data-classification-engine
      - column-level-encryption
      - privileged-access-management
      - sensitive-data-vault
  devsecops:
    prose: |
      1. Scan code and schemas for sensitive data categories using automated
         classifiers in CI/CD.
      2. Block deployments that introduce sensitive data storage without corresponding
         explicit consent flows and enhanced security controls.
      3. Validate encryption is applied to all sensitive data fields in automated tests.
      4. Run DLP scans on logs and exports to detect sensitive data leakage.
    tools:
      - data-classification-scanner
      - encryption-validator
      - dlp-scanner
      - sensitive-data-detector
  secops:
    prose: |
      1. Monitor all access to sensitive data stores with enhanced alerting.
      2. Implement anomaly detection for sensitive data access patterns.
      3. Conduct quarterly audits of sensitive data inventories and access rights.
      4. Deploy DLP at network boundaries to prevent sensitive data exfiltration.
    tools:
      - siem
      - dlp
      - privileged-access-monitor
      - sensitive-data-audit
