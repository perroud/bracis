id: sec-28
family: chap-2
title: "Cross-Border Transfer of Personal Data"
class: PDPA-Thailand
statement:
  prose: |
    Section 28. In the case where a data controller sends or transfers personal data
    to a foreign country, the destination country or the international organization
    receiving the personal data must have adequate data protection standards.

    The PDPC shall prescribe rules for the assessment of adequate data protection
    standards. The transfer may be made in the following cases:
    (1) compliance with the law;
    (2) consent of the data subject who has been informed of the inadequate standards;
    (3) performance of a contract to which the data subject is a party;
    (4) compliance with a contract between the data controller and another person
        for the benefit of the data subject;
    (5) prevention or suppression of danger to life, body, or health;
    (6) substantial public interest.
  parts:
    - id: sec-28-1
      label: "Paragraph 1"
      prose: |
        Adequacy requirement: destination country or organization must have
        adequate data protection standards as prescribed by the PDPC.
    - id: sec-28-2
      label: "Paragraph 2"
      prose: |
        Transfers within the same group of undertakings are permitted if the
        group has adopted binding corporate policies on personal data protection
        inspected and certified by the PDPC Office.
    - id: sec-28-3
      label: "Paragraph 3"
      prose: |
        Derogations allowing transfer without adequacy: legal compliance,
        informed consent, contract performance, vital interests, public interest.
guidance:
  prose: |
    Section 28 establishes the cross-border transfer regime, modeled on GDPR
    Chapter V (Articles 44-49). The PDPC has not yet issued a comprehensive
    adequacy list, making this area operationally challenging.

    Key implementation considerations:

    - **Adequacy Assessment:** Until the PDPC publishes adequacy decisions, treat
      all cross-border transfers as requiring safeguards. Map all data flows that
      cross Thai borders.

    - **Binding Corporate Rules (BCR):** For intra-group transfers, develop and
      submit BCR-equivalent policies to the PDPC Office.

    - **Standard Contractual Clauses:** Implement contractual safeguards with
      foreign processors and sub-processors, analogous to GDPR SCCs.

    - **Cloud Infrastructure:** If using cloud providers with servers outside
      Thailand, every storage and processing location constitutes a cross-border
      transfer. Evaluate data residency options.

    - **Data Localization Trend:** Monitor PDPC announcements for sector-specific
      data localization requirements, particularly for financial and health data.

    - **Transfer Impact Assessment:** Document the risk assessment for each
      cross-border transfer, including the destination country's legal framework.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Map all cross-border data flows: identify every system, service, and
         third-party that processes Thai personal data outside Thailand.
      2. Implement data residency controls: configure cloud providers to store
         and process data in approved regions.
      3. Build transfer logging: record every cross-border data transfer with
         destination, purpose, legal basis, and safeguards applied.
      4. Implement technical safeguards for transfers: encryption in transit,
         pseudonymization before transfer, access restrictions on foreign endpoints.
      5. Maintain a transfer register linked to the ROPA.
    tools:
      - data-flow-mapper
      - cloud-region-policy-engine
      - transfer-logging-service
      - encryption-gateway
  devsecops:
    prose: |
      1. Scan infrastructure-as-code for resources provisioned outside approved
         regions. Block non-compliant deployments.
      2. Validate that API calls to foreign services include required safeguards
         (encryption, pseudonymization).
      3. Test data residency controls: verify data does not replicate to
         unapproved regions.
      4. Audit third-party SDK configurations for data transfer destinations.
    tools:
      - iac-region-scanner
      - data-residency-validator
      - sdk-configuration-auditor
  secops:
    prose: |
      1. Monitor network traffic for personal data transfers to unapproved
         destinations.
      2. Alert on new data flows to foreign endpoints not in the transfer register.
      3. Audit cloud provider region configurations quarterly.
      4. Review third-party processor sub-processor chains for cross-border exposure.
    tools:
      - network-dlp
      - data-flow-monitor
      - cloud-configuration-auditor
legal_references:
  - framework_id: gdpr
    articles: ["art. 44", "art. 45", "art. 46", "art. 49"]
    relationship: equivalent-to
  - framework_id: lgpd
    articles: ["art. 33"]
