id: sec-90
family: chap-7
title: "Penalties"
class: PDPA-Thailand
statement:
  prose: |
    Section 90. The PDPA imposes a tiered penalty regime comprising civil liability,
    criminal penalties, and administrative fines:

    **Criminal Penalties (Sections 79-81):**
    - Unauthorized use or disclosure of personal data: imprisonment up to 6 months
      and/or fine up to 500,000 THB.
    - Unauthorized use or disclosure of sensitive data: imprisonment up to 1 year
      and/or fine up to 1,000,000 THB.
    - Offenses committed by persons in charge of the data controller who cause damage
      to another person: same penalties apply to the responsible person.

    **Administrative Fines (Sections 90-91):**
    - Failure to comply with Chapter 2 (data protection principles): up to 3,000,000 THB.
    - Failure to comply with Chapter 3 (data subject rights): up to 3,000,000 THB.
    - Failure to comply with Chapter 5 (controller/processor obligations): up to 5,000,000 THB.
    - Failure to comply with cross-border transfer rules: up to 5,000,000 THB.

    **Civil Liability (Sections 77-78):**
    - Data controllers and processors are jointly liable for damages caused by
      violations of the PDPA.
    - Courts may award punitive damages up to twice the actual damages.
    - The data controller bears the burden of proof to demonstrate compliance.
  parts:
    - id: sec-90-criminal
      label: "Criminal Penalties"
      prose: |
        Imprisonment up to 1 year and/or fines up to 1,000,000 THB for unauthorized
        use or disclosure of personal data, with enhanced penalties for sensitive data.
    - id: sec-90-admin
      label: "Administrative Fines"
      prose: |
        Fines up to 5,000,000 THB for non-compliance with controller/processor
        obligations or cross-border transfer rules. Up to 3,000,000 THB for
        violations of data protection principles and data subject rights.
    - id: sec-90-civil
      label: "Civil Liability"
      prose: |
        Joint liability for damages. Punitive damages up to 2x actual damages.
        Reversed burden of proof: controller must prove compliance.
    - id: sec-90-director
      label: "Director Liability"
      prose: |
        Directors, managers, or persons responsible for the operations of a
        juristic person may be personally liable if the offense was committed
        with their consent, order, or negligent failure to prevent it.
guidance:
  prose: |
    The PDPA penalty regime combines criminal, administrative, and civil sanctions.
    While the monetary fines are lower than GDPR (maximum 5M THB vs. EUR 20M/4%
    turnover), the criminal penalties including imprisonment are a significant
    differentiator.

    Key risk assessment factors:

    - **Criminal Liability:** Unlike GDPR, the PDPA includes imprisonment. This
      creates personal risk for directors and data protection officers. Criminal
      penalties apply to unauthorized use or disclosure, not just non-compliance.

    - **Personal Director Liability:** Section 91 extends liability to directors
      and managers who consented to, ordered, or negligently failed to prevent the
      violation. This demands board-level engagement with data protection.

    - **Punitive Damages:** Courts can award up to 2x actual damages as punitive
      damages. This significantly increases the financial exposure beyond the
      administrative fine.

    - **Reversed Burden of Proof:** In civil proceedings, the data controller must
      prove it was not negligent. Without documented compliance evidence, the
      controller is presumed liable.

    - **Cumulative Penalties:** Criminal, administrative, and civil penalties can
      apply simultaneously for the same violation. Total exposure is the sum of
      all three.

    - **Proportionality:** While maximum fines are 5M THB, the reputational damage
      and class action exposure in Thailand's growing consumer protection landscape
      may far exceed the statutory fines.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build a comprehensive compliance evidence repository: document every
         compliance measure, decision, and assessment to support the reversed
         burden of proof in civil proceedings.
      2. Implement automated compliance monitoring with executive dashboards
         showing real-time compliance posture across all PDPA chapters.
      3. Create risk scoring for data processing activities: map each activity
         to potential penalty exposure (criminal, administrative, civil).
      4. Build audit-ready evidence generation: automated reports that demonstrate
         compliance with each PDPA obligation.
      5. Implement board-level reporting on data protection compliance status
         and risk exposure.
    tools:
      - compliance-evidence-repository
      - compliance-dashboard
      - risk-scoring-engine
      - audit-report-generator
      - board-reporting-tool
  devsecops:
    prose: |
      1. Generate compliance evidence as part of the CI/CD pipeline: security scan
         results, privacy reviews, access control validation.
      2. Implement compliance gates in deployment pipelines: block deployments that
         would create non-compliance.
      3. Maintain version-controlled compliance documentation alongside code.
      4. Automate evidence collection for audit trails.
    tools:
      - compliance-pipeline-integration
      - deployment-compliance-gate
      - evidence-collection-automation
  secops:
    prose: |
      1. Maintain real-time compliance posture monitoring across all PDPA requirements.
      2. Conduct regular compliance audits (quarterly internal, annual external).
      3. Track and report compliance gaps with remediation timelines.
      4. Monitor regulatory announcements from the PDPC for enforcement trends
         and new guidelines.
    tools:
      - compliance-posture-monitor
      - audit-management-platform
      - regulatory-intelligence-feed
