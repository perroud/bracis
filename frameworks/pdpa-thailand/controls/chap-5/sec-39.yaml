id: sec-39
family: chap-5
title: "Data Protection Officer (DPO)"
class: PDPA-Thailand
statement:
  prose: |
    Section 39. A data controller or data processor shall appoint a Data Protection
    Officer (DPO) in the following cases:
    (1) the data controller or data processor is a public authority or agency;
    (2) the core activities of the data controller or data processor require regular
        and systematic monitoring of personal data on a large scale;
    (3) the core activities of the data controller or data processor consist of
        large-scale processing of sensitive personal data under Section 26.

    The DPO shall:
    (a) advise the data controller or data processor on compliance with this Act;
    (b) monitor the performance of the data controller or data processor;
    (c) coordinate with the PDPC Office on compliance matters;
    (d) maintain confidentiality during the performance of duties.

    The data controller and data processor shall ensure that the DPO performs duties
    independently and shall not dismiss or penalize the DPO for performing duties
    under this Act.
  parts:
    - id: sec-39-1
      label: "Paragraph 1"
      prose: |
        Mandatory DPO appointment for public authorities, large-scale
        monitoring, and large-scale sensitive data processing.
    - id: sec-39-2
      label: "Paragraph 2"
      prose: |
        DPO duties: advise, monitor, coordinate with PDPC, maintain
        confidentiality.
    - id: sec-39-3
      label: "Paragraph 3"
      prose: |
        DPO independence: must not be dismissed or penalized for performing
        statutory duties. Must have adequate resources.
guidance:
  prose: |
    Section 39 mirrors GDPR Articles 37-39. The DPO is the internal compliance
    anchor for the PDPA.

    Key considerations:

    - **Appointment Triggers:** Evaluate whether your organization meets any of the
      three criteria. "Large scale" is not precisely defined by the PDPC — apply
      GDPR WP29 guidelines as reference (number of data subjects, volume of data,
      geographic scope, duration, nature of processing).

    - **Independence:** The DPO must report to the highest management level, cannot
      receive instructions regarding the exercise of DPO duties, and cannot be
      penalized for performing the role. This has organizational design implications.

    - **Conflict of Interest:** The DPO cannot hold a position that leads to
      conflict of interest (e.g., CTO, CISO, or head of marketing). The DPO must
      be independent from operational data processing decisions.

    - **Shared DPO:** A group of undertakings may appoint a single DPO, provided
      the DPO is accessible from each establishment.

    - **External DPO:** The DPO may be a staff member or an external service
      provider, as long as independence and expertise requirements are met.

    - **Published Contact:** The DPO's contact details must be published and
      communicated to the PDPC Office.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build internal tooling to support DPO functions: compliance dashboards,
         DPIA review workflows, breach assessment tools, ROPA management.
      2. Create a DPO communication channel: secure portal for data subjects and
         internal teams to reach the DPO.
      3. Implement automated compliance monitoring that surfaces issues to the DPO
         dashboard (ROPA gaps, overdue DPIAs, SLA breaches on DSRs).
      4. Build a PDPC communication log for tracking all interactions between the
         DPO and the regulatory authority.
      5. Ensure the DPO has read access to all data processing systems, consent
         records, and security incident logs.
    tools:
      - dpo-dashboard
      - dpia-review-workflow
      - dpo-communication-portal
      - compliance-monitoring-system
  devsecops:
    prose: |
      1. Ensure DPO is notified automatically when new data processing features
         are deployed (integration with CI/CD change tracking).
      2. Grant DPO read-only access to deployment logs and data architecture
         documentation.
      3. Include DPO review as a gate for deployments that introduce new personal
         data processing or change existing processing purposes.
    tools:
      - deployment-notification-service
      - dpo-review-gate
      - change-tracking-integration
  secops:
    prose: |
      1. Configure DPO alerting for security incidents involving personal data.
      2. Ensure DPO has access to incident response playbooks and breach
         assessment tools.
      3. Include DPO in the security incident response team for data-related
         incidents.
      4. Provide DPO with regular compliance reports from monitoring systems.
    tools:
      - incident-alerting-system
      - breach-assessment-tool
      - compliance-reporting-engine
legal_references:
