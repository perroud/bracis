id: sec-37
family: chap-5
title: "Data Controller Obligations"
class: PDPA-Thailand
statement:
  prose: |
    Section 37. A data controller shall:
    (1) provide for an appropriate data security measure to prevent the unauthorized
        or unlawful loss, access, use, alteration, correction, or disclosure of
        personal data;
    (2) ensure that personal data is accurate, up-to-date, and complete;
    (3) provide a mechanism for the data subject to request deletion or destruction
        of personal data when it is no longer necessary;
    (4) maintain records of processing activities, including: categories of personal
        data collected, purposes, retention periods, rights and methods available to
        data subjects, security measures, and data disclosure to third parties;
    (5) notify the PDPC Office of personal data breaches within 72 hours;
    (6) appoint a Data Protection Officer (DPO) in prescribed cases;
    (7) conduct Data Protection Impact Assessments (DPIA) in prescribed cases.
  parts:
    - id: sec-37-1
      label: "Subsection (1)"
      prose: |
        Implement appropriate security measures to prevent unauthorized loss,
        access, use, alteration, correction, or disclosure.
    - id: sec-37-2
      label: "Subsection (2)"
      prose: |
        Ensure data accuracy, currency, and completeness.
    - id: sec-37-3
      label: "Subsection (3)"
      prose: |
        Provide deletion/destruction mechanisms for data no longer necessary.
    - id: sec-37-4
      label: "Subsection (4)"
      prose: |
        Maintain records of processing activities (ROPA).
    - id: sec-37-5
      label: "Subsection (5)"
      prose: |
        Notify PDPC of breaches within 72 hours.
    - id: sec-37-6
      label: "Subsection (6)"
      prose: |
        Appoint a DPO where required.
    - id: sec-37-7
      label: "Subsection (7)"
      prose: |
        Conduct DPIAs for high-risk processing.
guidance:
  prose: |
    Section 37 is the central obligation provision for data controllers, combining
    multiple GDPR requirements (Articles 24, 25, 30, 33, 35, 37) into a single
    section. It defines the comprehensive accountability framework.

    Key obligations:

    - **Records of Processing (ROPA):** Mandatory for all data controllers, not just
      those meeting a threshold. Must be comprehensive and kept up to date.

    - **DPO Appointment:** Required for controllers whose core activities involve
      large-scale processing of personal or sensitive data, or regular and systematic
      monitoring. The threshold is determined by PDPC notifications.

    - **DPIA:** Required for processing likely to result in high risk to data subjects.
      Must be conducted before commencing the processing activity.

    - **Integrated Approach:** This section connects security (sec-37-4), accuracy
      (sec-22), deletion (sec-33), record-keeping (ROPA), breach notification,
      DPO, and DPIA into a unified accountability framework.

    - **Demonstrable Compliance:** The data controller must be able to demonstrate
      compliance with all obligations. Documentation is not optional.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build an automated ROPA system: auto-discover data processing activities
         from data catalogs, API registries, and pipeline metadata.
      2. Implement a DPIA workflow tool integrated with the change management process
         (new features/systems trigger DPIA assessment).
      3. Create a compliance dashboard aggregating all Section 37 obligations:
         ROPA completeness, DPO status, DPIA coverage, breach readiness.
      4. Implement automated data retention enforcement: TTL-based deletion of data
         that has exceeded its declared retention period.
      5. Build a unified accountability register linking all compliance evidence.
    tools:
      - ropa-automation
      - dpia-workflow-tool
      - compliance-dashboard
      - retention-enforcement-engine
      - accountability-register
  devsecops:
    prose: |
      1. Integrate DPIA triggers into the CI/CD pipeline: new data models or
         processing activities automatically create DPIA tickets.
      2. Validate ROPA entries exist for all deployed data processing components.
      3. Test retention policy enforcement: verify data is deleted on schedule.
      4. Scan for new data processing activities not registered in the ROPA.
    tools:
      - dpia-trigger-integration
      - ropa-validation-scanner
      - retention-enforcement-tests
      - processing-activity-detector
  secops:
    prose: |
      1. Monitor ROPA completeness and flag gaps.
      2. Track DPIA status for all high-risk processing activities.
      3. Verify DPO appointment and contact information is current and published.
      4. Audit retention policy compliance across all data stores.
    tools:
      - ropa-completeness-monitor
      - dpia-status-tracker
      - retention-audit-tool
