id: sec-37-5
family: chap-5
title: "Breach Notification"
class: PDPA-Thailand
statement:
  prose: |
    Section 37(5). The data controller shall notify the PDPC Office of a personal data
    breach without delay and, where feasible, within 72 hours after becoming aware of
    the breach.

    Where the personal data breach is likely to result in a high risk to the rights and
    freedoms of data subjects, the data controller shall also notify the affected data
    subjects without delay.

    The notification to the PDPC Office shall include:
    (a) the nature of the personal data breach, including the categories and approximate
        number of data subjects and personal data records affected;
    (b) the contact details of the DPO or contact point;
    (c) the likely consequences of the breach;
    (d) the measures taken or proposed to address the breach and mitigate adverse effects.
  parts:
    - id: sec-37-5-1
      label: "Paragraph 1"
      prose: |
        Notify PDPC within 72 hours of becoming aware of the breach.
    - id: sec-37-5-2
      label: "Paragraph 2"
      prose: |
        If high risk to data subjects, notify affected individuals without delay.
    - id: sec-37-5-3
      label: "Paragraph 3"
      prose: |
        Notification content: nature of breach, categories and numbers affected,
        DPO contact, likely consequences, and remedial measures.
    - id: sec-37-5-4
      label: "Paragraph 4"
      prose: |
        Where the data controller cannot provide all information within 72 hours,
        information may be provided in phases without undue further delay.
guidance:
  prose: |
    Section 37(5) mirrors GDPR Article 33 and 34. The 72-hour notification window
    is one of the most operationally demanding requirements because it requires
    pre-built processes and tooling — you cannot build an incident response capability
    after a breach occurs.

    Critical implementation considerations:

    - **"Becoming Aware":** The 72-hour clock starts when the controller becomes aware
      of the breach, not when it occurred. However, deliberately delaying awareness
      (e.g., not monitoring systems) does not stop the clock. Implement 24/7
      monitoring.

    - **Breach Assessment:** Not all security incidents are data breaches. Implement a
      rapid assessment process to determine if personal data was affected and the
      severity of impact.

    - **Phased Notification:** The PDPA allows phased notification when full details
      are not available within 72 hours. But the initial notification must be made
      on time with available information.

    - **Data Subject Notification:** Required only when the breach is "likely to
      result in high risk." Prepare templates and communication channels in advance.
      Encryption or anonymization may mitigate the risk and eliminate the need for
      data subject notification.

    - **Documentation:** Document all breaches regardless of severity, including
      the assessment of whether notification was required and the reasoning.

    - **Processor Cascading:** Processors must notify controllers "without delay"
      (Section 40). Contractual SLAs should require processor notification within
      24 hours to give the controller 48 hours for assessment and PDPC notification.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build an incident response platform with automated workflows: detection,
         triage, assessment, notification, remediation, post-mortem.
      2. Implement automated breach detection: monitor for indicators of compromise
         on personal data stores (unusual access patterns, data exfiltration signals).
      3. Pre-build PDPC notification templates with required fields. Automate the
         collection of breach scope data (affected records count, categories).
      4. Build data subject notification infrastructure: mass communication capability
         via email, SMS, and in-app notifications with personalized breach details.
      5. Implement a breach register with full audit trail and timeline tracking.
      6. Create 72-hour countdown dashboards triggered automatically upon breach
         detection.
    tools:
      - incident-response-platform
      - breach-detection-system
      - notification-template-engine
      - mass-communication-service
      - breach-register
      - countdown-dashboard
  devsecops:
    prose: |
      1. Run breach simulation exercises (tabletop and technical) at least annually.
      2. Test breach detection pipelines: inject test incidents and validate
         detection-to-notification timing.
      3. Validate PDPC notification API integration (if available) or form
         submission automation.
      4. Test data subject notification delivery across all channels.
      5. Verify breach scope assessment automation: test that affected record counts
         can be generated within the required timeframe.
    tools:
      - breach-simulation-framework
      - detection-pipeline-tests
      - notification-delivery-tests
      - scope-assessment-tests
  secops:
    prose: |
      1. Maintain 24/7 security monitoring with breach detection capability.
      2. Conduct quarterly breach response drills with all stakeholders
         (IT, legal, communications, DPO, management).
      3. Monitor processor breach notification compliance against contractual SLAs.
      4. Track breach metrics: detection time, assessment time, notification time,
         remediation time.
    tools:
      - siem
      - soar
      - breach-drill-management
      - breach-metrics-dashboard
legal_references:
  - framework_id: gdpr
    articles: ["art. 33", "art. 34"]
    relationship: equivalent-to
  - framework_id: lgpd
    articles: ["art. 48"]
