id: sec-37-4
family: chap-5
title: "Security Measures"
class: PDPA-Thailand
statement:
  prose: |
    Section 37(4). The data controller shall provide appropriate security measures to
    prevent the unauthorized or unlawful loss, access, use, alteration, correction, or
    disclosure of personal data, including at least:
    (a) access control measures to limit access to personal data to authorized persons;
    (b) measures for the secure storage of personal data;
    (c) measures to detect and respond to security incidents involving personal data;
    (d) measures to ensure the integrity and confidentiality of personal data during
        transmission.

    The security measures shall be appropriate to the nature of the personal data, the
    risks of processing, and the current state of technology. The data controller shall
    review and update security measures regularly.
  parts:
    - id: sec-37-4-a
      label: "(a)"
      prose: |
        Access control: limit access to personal data to authorized persons only.
    - id: sec-37-4-b
      label: "(b)"
      prose: |
        Secure storage: implement measures for the secure storage of personal data.
    - id: sec-37-4-c
      label: "(c)"
      prose: |
        Incident detection and response: detect and respond to security incidents
        involving personal data.
    - id: sec-37-4-d
      label: "(d)"
      prose: |
        Transmission security: ensure integrity and confidentiality during
        data transmission.
    - id: sec-37-4-e
      label: "Review"
      prose: |
        Regular review: security measures must be reviewed and updated regularly
        considering the state of technology and processing risks.
guidance:
  prose: |
    Section 37(4) is the security baseline for the PDPA, corresponding to GDPR
    Article 32. It mandates "appropriate" security without prescribing specific
    technologies, requiring a risk-based approach.

    Key implementation areas:

    - **Access Control:** Implement least-privilege, role-based access control (RBAC)
      or attribute-based access control (ABAC). Enforce MFA for all access to
      personal data. Regular access reviews (quarterly minimum).

    - **Secure Storage:** Encryption at rest for all personal data. Key management
      with HSM or cloud KMS. Database-level encryption, volume encryption, and
      application-level encryption for sensitive fields.

    - **Incident Detection:** SIEM deployment, intrusion detection systems, anomaly
      detection on data access patterns. 24/7 monitoring capability for critical
      systems.

    - **Transmission Security:** TLS 1.2+ for all data in transit. Certificate
      management and rotation. API authentication and authorization.

    - **Proportionality:** Security measures must be proportional to the sensitivity
      of the data and the risk of processing. Sensitive data (Section 26) requires
      enhanced measures.

    - **Regular Review:** Annual security reviews at minimum, with additional reviews
      after significant changes or incidents.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement RBAC/ABAC with centralized identity and access management (IAM).
         Enforce least-privilege and MFA for all personal data access.
      2. Deploy encryption at rest: database-level (TDE), volume-level, and
         application-level for sensitive fields. Use managed KMS for key lifecycle.
      3. Enforce TLS 1.2+ for all service-to-service and client-to-server communication.
         Implement mutual TLS (mTLS) for internal service mesh.
      4. Deploy SIEM with real-time alerting for personal data access anomalies.
      5. Implement automated security posture assessment scanning on a continuous basis.
      6. Build security review triggers for changes to data processing infrastructure.
    tools:
      - iam-platform
      - kms
      - service-mesh
      - siem
      - vulnerability-scanner
      - security-posture-management
  devsecops:
    prose: |
      1. Enforce TLS in CI/CD: block deployments with unencrypted endpoints.
      2. Run SAST, DAST, dependency scanning, container scanning, and secret detection
         in all pipelines.
      3. Validate encryption configuration in infrastructure-as-code (IaC scanning).
      4. Test access control enforcement: verify unauthorized users cannot access
         personal data endpoints.
      5. Scan for hardcoded credentials and secrets in code and configuration.
    tools:
      - sast
      - dast
      - dependency-scanner
      - container-scanner
      - secret-detection
      - iac-scanner
  secops:
    prose: |
      1. Monitor for unauthorized access to personal data stores (real-time alerting).
      2. Conduct regular penetration testing targeting personal data systems.
      3. Review access logs for personal data stores (quarterly access reviews).
      4. Maintain and test incident response procedures for data security incidents.
      5. Track encryption coverage and alert on unencrypted personal data stores.
    tools:
      - siem
      - penetration-testing-platform
      - access-review-tool
      - encryption-coverage-monitor
      - incident-response-platform
