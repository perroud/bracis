id: sec-40
family: chap-5
title: "Data Processor Obligations"
class: PDPA-Thailand
statement:
  prose: |
    Section 40. A data processor shall:
    (1) collect, use, or disclose personal data only as instructed by the data
        controller, except where such instruction is contrary to the law or the
        provisions of this Act;
    (2) provide for appropriate security measures to prevent the unauthorized or
        unlawful loss, access, use, alteration, correction, or disclosure of
        personal data, and notify the data controller of any personal data breach
        without delay;
    (3) maintain records of all personal data processing activities carried out
        on behalf of the data controller;
    (4) appoint a Data Protection Officer in prescribed cases.

    The data controller shall engage only data processors providing sufficient
    guarantees in respect of the implementation of appropriate technical and
    organizational measures. Processing by a data processor shall be governed by
    a contract or legal act that specifies the subject matter, duration, nature,
    and purposes of processing.
  parts:
    - id: sec-40-1
      label: "Paragraph 1"
      prose: |
        Process only on documented instructions from the data controller.
    - id: sec-40-2
      label: "Paragraph 2"
      prose: |
        Implement appropriate security measures and notify the controller
        of breaches without delay.
    - id: sec-40-3
      label: "Paragraph 3"
      prose: |
        Maintain records of all processing activities performed on behalf
        of the controller.
    - id: sec-40-4
      label: "Paragraph 4"
      prose: |
        Written contract required: specifying subject matter, duration,
        nature, purpose, and obligations.
guidance:
  prose: |
    Section 40 mirrors GDPR Article 28. It establishes the dual accountability model
    where both controllers and processors bear compliance obligations.

    Key considerations:

    - **Processor Selection Due Diligence:** The controller must verify the processor
      provides "sufficient guarantees." This means vendor security assessments,
      certification reviews, and ongoing monitoring — not just contractual clauses.

    - **Data Processing Agreement (DPA):** A written contract is mandatory. It must
      specify: subject matter, duration, nature of processing, purpose, data types,
      categories of data subjects, controller obligations, and processor obligations.

    - **Sub-Processors:** If the processor engages sub-processors, the same
      obligations must flow down. Require prior authorization for sub-processor
      engagement.

    - **Instruction-Bound Processing:** Processors can only process as instructed.
      Processing beyond the controller's instructions is a violation and may make
      the processor a controller for that processing.

    - **Breach Notification Chain:** Processors must notify controllers "without
      delay" (faster than the 72-hour window to the PDPC). Define contractual SLAs
      for processor-to-controller breach notification (typically 24-48 hours).

    - **Cloud Providers as Processors:** SaaS, PaaS, and IaaS providers processing
      personal data on behalf of the controller are data processors. Ensure DPAs
      are in place with all cloud and SaaS vendors.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build a vendor management system tracking all data processors: DPA status,
         security assessment scores, sub-processor lists, and audit dates.
      2. Implement automated DPA tracking with renewal alerts and compliance
         verification.
      3. Create processor-specific data flow documentation showing what data is
         shared, for what purpose, and under what contractual terms.
      4. Build processor breach notification intake: a dedicated channel for
         processors to report incidents with structured data capture.
      5. Maintain a sub-processor registry with change notification workflows.
    tools:
      - vendor-management-system
      - dpa-tracking-tool
      - processor-data-flow-mapper
      - breach-intake-portal
  devsecops:
    prose: |
      1. Scan infrastructure-as-code for new third-party service integrations
         and flag those without corresponding DPA records.
      2. Validate that API integrations with processors include appropriate
         authentication and encryption.
      3. Test processor breach notification channels in tabletop exercises.
      4. Audit processor sub-processor chains in dependency scans.
    tools:
      - vendor-integration-scanner
      - api-security-validator
      - breach-notification-test-suite
  secops:
    prose: |
      1. Monitor data flows to processors for anomalies (unexpected data types,
         volumes, or destinations).
      2. Conduct periodic security assessments of critical data processors.
      3. Track processor DPA expiration dates and initiate renewal workflows.
      4. Verify processor compliance through audit right exercise.
    tools:
      - data-flow-monitor
      - vendor-security-assessment
      - dpa-lifecycle-manager
legal_references:
  - framework_id: gdpr
    articles: ["art. 28"]
    relationship: equivalent-to
  - framework_id: lgpd
    articles: ["art. 39"]
    relationship: equivalent-to
