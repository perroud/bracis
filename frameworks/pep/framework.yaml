control_families:
  - id: cap-1
    title: "Disposicoes Gerais"
    description: "Objeto, escopo e definicoes fundamentais do Prontuario Eletronico do Paciente (PEP), Gerenciamento Eletronico de Documentos (GED) e assinatura digital aplicados a documentos medicos"
    articles: "art. 1 ao art. 3"
    control_count: 3
  - id: cap-2
    title: "Requisitos de Sistemas PEP"
    description: "Certificacao SBIS/CFM, niveis de garantia de seguranca (NGS1 e NGS2), requisitos funcionais minimos e interoperabilidade de sistemas de prontuario eletronico"
    articles: "art. 4 ao art. 7"
    control_count: 4
  - id: cap-3
    title: "Assinatura Digital e Certificacao"
    description: "Requisitos de assinatura digital com certificado ICP-Brasil, certificado digital medico, carimbo de tempo e validade juridica de documentos medicos eletronicos"
    articles: "art. 8 ao art. 11"
    control_count: 4
  - id: cap-4
    title: "Guarda e Temporalidade"
    description: "Prazo minimo de guarda de prontuarios (20 anos), descarte controlado, microfilmagem, migracao de midias e preservacao de integridade ao longo do tempo"
    articles: "art. 12 ao art. 15"
    control_count: 4
  - id: cap-5
    title: "Seguranca e Controle de Acesso"
    description: "Confidencialidade de dados de saude, controle de acesso baseado em perfis, trilha de auditoria, backup e recuperacao de desastres para sistemas PEP"
    articles: "art. 16 ao art. 18"
    control_count: 3
  - id: cap-6
    title: "Documentos Medicos Eletronicos"
    description: "Requisitos para atestados, receitas, laudos e relatorios medicos em formato eletronico conforme Resolucao CFM 2.299/2021, certificacao digital e validade juridica"
    articles: "art. 19 ao art. 20"
    control_count: 2
related_frameworks:
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD complementa as Resolucoes CFM 1.821/2007 e 2.299/2021 ao impor requisitos
      de protecao de dados pessoais sensiveis (dados de saude) tratados em prontuarios
      eletronicos, incluindo base legal, consentimento e direitos dos titulares.
  - framework_id: cfm-telemedicina
    relationship: complements
    description: >-
      A Resolucao CFM 2.314/2022 complementa o PEP ao estabelecer requisitos especificos
      de registro e documentacao de atendimentos realizados por telemedicina, cujos dados
      sao armazenados no prontuario eletronico do paciente.
  - framework_id: tiss
    relationship: complements
    description: >-
      O padrao TISS (Troca de Informacoes em Saude Suplementar) complementa o PEP ao
      definir o formato padronizado de troca de dados assistenciais entre prestadores e
      operadoras de saude, alimentado diretamente pelo prontuario eletronico.
  - framework_id: hipaa
    relationship: mapped
    description: >-
      O HIPAA possui correspondencia com os requisitos de protecao de informacoes de
      saude do PEP, especialmente nas exigencias de confidencialidade, integridade,
      disponibilidade e trilha de auditoria de registros medicos eletronicos.
