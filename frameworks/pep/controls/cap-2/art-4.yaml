id: art-4
family: cap-2
title: "Certificacao SBIS/CFM -- Requisito de Conformidade"
class: PEP
baselines: [pep-all]
statement:
  prose: |
    Art. 4. Os sistemas informatizados para a guarda e manuseio de
    prontuários de pacientes devem atender aos requisitos do Nível de
    Garantia de Segurança (NGS) definidos em conjunto pela Sociedade
    Brasileira de Informática em Saúde (SBIS) e pelo Conselho Federal
    de Medicina (CFM).

    Parágrafo 1. A certificação SBIS/CFM é o instrumento que atesta
    a conformidade do sistema PEP com os requisitos técnicos e de
    segurança estabelecidos.

    Parágrafo 2. Somente sistemas certificados SBIS/CFM no nível
    NGS2 autorizam a eliminação do prontuário em papel.
guidance:
  prose: |
    O art. 4 estabelece a certificacao SBIS/CFM como requisito
    obrigatorio para sistemas de prontuario eletronico.

    **Processo de certificacao:**
    A SBIS mantem laboratorio de certificacao que avalia sistemas PEP
    contra conjunto de requisitos agrupados em categorias: seguranca,
    estrutura, conteudo, funcionalidade e interoperabilidade.

    **Implicacoes praticas:**
    - Sistemas sem certificacao SBIS/CFM podem ser usados, mas NAO
      substituem o prontuario em papel (sem validade legal autonoma).
    - Sistemas com NGS1 atendem requisitos de seguranca basicos mas
      ainda exigem manutencao do prontuario em papel.
    - Somente NGS2 permite eliminacao total do papel.

    **Custo de nao conformidade:**
    Instituicoes que eliminam papel sem certificacao NGS2 ficam
    expostas a risco juridico: em disputa judicial, a ausencia do
    prontuario em papel e a falta de certificacao podem invalidar
    a prova documental.
implementation_guidance:
  platform_engineering:
    prose: |
      **Adequacao tecnica para certificacao SBIS/CFM:**
      1. Mapear todos os requisitos do manual de certificacao SBIS
         (versao vigente) e implementar como features do sistema PEP.
      2. Implementar modulo de conformidade que verifica
         automaticamente quais requisitos SBIS estao atendidos
         e quais apresentam gaps.
      3. Provisionar ambiente de homologacao identico a producao
         para execucao dos testes de certificacao SBIS.
      4. Garantir que a arquitetura do PEP suporte os requisitos
         de ambos os niveis (NGS1 e NGS2) simultaneamente.
    tools:
      - sbis-requirements-tracker
      - homologation-environment
      - compliance-dashboard
      - feature-flags
  devsecops:
    prose: |
      **Pipeline de conformidade SBIS:**
      1. Criar suite de testes automatizados baseada nos requisitos
         de certificacao SBIS, executada em todo merge request.
      2. Implementar gate de qualidade que impede deploy de versoes
         que regridam requisitos SBIS ja atendidos.
      3. Manter rastreabilidade entre requisitos SBIS e codigo-fonte
         (tags, labels, requirements tracing).
      4. Automatizar geracao de evidencias de conformidade para
         auditoria SBIS.
    tools:
      - gitlab-ci
      - requirements-tracing
      - compliance-pipeline
      - evidence-generator
  secops:
    prose: |
      **Gestao do processo de certificacao:**
      1. Designar responsavel pelo processo de certificacao SBIS/CFM
         com autoridade e recursos para conduzir o projeto.
      2. Manter cronograma de recertificacao (certificacao SBIS tem
         validade e exige renovacao periodica).
      3. Documentar todas as evidencias de conformidade em formato
         exigido pela SBIS para auditoria.
      4. Monitorar publicacoes da SBIS sobre atualizacoes de
         requisitos e novas versoes do manual de certificacao.
    tools:
      - grc-platform
      - project-management
      - evidence-management
      - regulatory-tracking
