id: isa-1.3
family: ch-1
title: "Risk Management"
class: TISAX

statement:
  prose: >-
    The organization shall define and apply an information security risk
    assessment process that establishes and maintains information security
    risk criteria, ensures that repeated risk assessments produce consistent,
    valid, and comparable results, identifies risks associated with the
    loss of confidentiality, integrity, and availability of information,
    analyzes and evaluates those risks, and selects appropriate risk
    treatment options. A risk treatment plan shall be formulated,
    approved by risk owners, and implemented with residual risks
    formally accepted by management.

guidance:
  prose: >-
    VDA ISA mandates a structured risk management process aligned with
    ISO 31000 and ISO 27005. The risk assessment must cover all assets
    in scope of the TISAX assessment, including information assets,
    IT systems, physical locations, personnel, and third-party
    relationships. Risk criteria must reflect the automotive industry
    context, including prototype confidentiality, production continuity,
    and supply chain dependencies. The risk register must be maintained
    as a living document, reviewed at least annually, and updated upon
    significant changes such as new projects, supplier changes, or
    security incidents. For AL2 and AL3, auditors expect to see a
    formal risk methodology document, a populated risk register with
    treatment plans, evidence of management approval for residual
    risks, and tracking of treatment plan implementation. Risk
    assessments for prototype-related assets require elevated
    confidentiality impact ratings.

baselines:
  al1:
    applicability: required
    notes: "Self-assessment of risk management process existence."
  al2:
    applicability: required
    notes: "Auditor reviews risk methodology, register, and treatment plans."
  al3:
    applicability: required
    notes: "On-site verification of risk process effectiveness, management sign-off, and treatment implementation."

references:
  - citation: "VDA ISA 6.0, Chapter 1.3"
    url: "https://www.enx.com/en-us/tisax/"
  - citation: "ISO/IEC 27001:2022, Clause 6.1, A.5.7"
    url: "https://www.iso.org/standard/27001"
  - citation: "ISO 31000:2018 — Risk management"
    url: "https://www.iso.org/standard/65694.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated risk identification by scanning infrastructure
      configurations, dependency manifests, and runtime environments for
      known vulnerabilities and misconfigurations. Integrate risk scoring
      into the internal developer portal so that platform teams can see
      the risk posture of their services in real time. Use threat modeling
      tools (STRIDE, LINDDUN) integrated into the architecture review
      process for new platform components. Maintain the risk register
      as a structured data file (YAML/JSON) in version control, enabling
      automated tracking of treatment plan status. Implement risk-based
      deployment gates that block releases to production when
      unacceptable risks are identified.
    tools:
      - backstage
      - trivy
      - grype
      - dependabot
      - threatspec
      - defectdojo

  devsecops:
    prose: >-
      Embed risk assessment into the software development lifecycle by
      requiring threat models for new features and significant changes.
      Use automated vulnerability scanning (SAST, DAST, SCA) in CI/CD
      pipelines to continuously identify and score risks. Correlate
      scan findings with the organizational risk register to provide
      context-aware risk prioritization. Generate risk treatment
      evidence automatically from pipeline artifacts (scan reports,
      remediation commits, approval records). Implement risk-acceptance
      workflows where identified risks require documented approval
      from designated risk owners before deployment proceeds.
    tools:
      - semgrep
      - snyk
      - sonarqube
      - owasp-zap
      - trivy
      - defectdojo

  secops:
    prose: >-
      Feed threat intelligence, vulnerability data, and incident
      data into the risk management process. Use SIEM correlation
      rules to identify emerging risks from attack patterns and
      anomalous behavior. Maintain automated risk dashboards that
      aggregate vulnerability scan results, incident metrics, and
      threat intelligence to provide a continuously updated risk
      posture view. Integrate the risk register with the SOAR platform
      to automatically update risk scores when new threats are
      detected or incidents occur. Generate automated risk reports
      for management review that include trend analysis and
      treatment plan progress tracking.
    tools:
      - splunk
      - elastic-siem
      - defectdojo
      - tenable
      - qualys
      - misp

