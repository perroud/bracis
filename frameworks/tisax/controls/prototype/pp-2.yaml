id: pp-2
family: prototype
title: "Secure Handling of Prototype Vehicles and Components"
class: TISAX

statement:
  prose: >-
    The organization shall implement specific physical and procedural
    controls for the secure handling of prototype vehicles, components,
    and parts during all phases: receipt, storage, use, testing,
    photography, transport, and disposal. Prototype vehicles on
    public roads shall be appropriately camouflaged. Test tracks
    and testing facilities shall have adequate perimeter security
    and surveillance to prevent unauthorized observation or recording.
    Disposal of prototype vehicles, components, and materials shall
    follow documented destruction procedures with evidence of
    completion.

guidance:
  prose: >-
    This control addresses the operational handling aspects of
    prototype protection, focusing on physical vehicles and
    components rather than digital information. The automotive
    industry faces unique challenges: prototype vehicles must be
    tested on public roads where they can be photographed by
    enthusiast communities and media, test facilities may be
    observable from public vantage points, and the supply chain
    involves multiple physical locations and transport routes.
    The organization must implement: camouflage procedures for
    prototype vehicles (covers, wraps, deceptive body cladding)
    with documented camouflage standards per OEM requirements,
    secure storage facilities with controlled access and CCTV
    for prototype vehicles and components, controlled photography
    procedures (authorized photographer only, no personal devices
    in prototype areas, watermarked photos with tracking metadata),
    secure transport procedures (covered trailers, GPS tracking,
    driver vetting, route planning avoiding high-visibility areas),
    test track security (perimeter fencing, anti-surveillance
    measures, drone detection, restricted airspace coordination),
    and documented destruction procedures with certificates of
    destruction for end-of-life prototypes. All personnel
    handling prototypes must receive specific training covering
    these procedures. At AL3, auditors conduct physical
    inspections of prototype storage, review camouflage
    applications, verify transport procedures, and test
    access controls at prototype facilities.

baselines:
  al1:
    applicability: not-applicable
    notes: "Prototype handling is not assessed at AL1."
  al2:
    applicability: conditional
    notes: "Required when prototype protection assessment objective is selected. Auditor reviews handling procedures remotely."
  al3:
    applicability: required
    notes: "Full on-site assessment including physical inspection of storage, camouflage, transport, and disposal procedures."

references:
  - citation: "VDA ISA 6.0, Prototype Protection Module"
    url: "https://www.enx.com/en-us/tisax/"
  - citation: "VDA Recommendations — Protection of Prototypes"
    url: "https://www.vda.de/en"
  - citation: "VDA Volume — Test Vehicle Handling"
    url: "https://www.vda.de/en"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a prototype asset tracking system integrated with
      the platform infrastructure, using IoT sensors and GPS
      tracking for real-time location monitoring of prototype
      vehicles and high-value components. Deploy drone detection
      systems at test facilities with automated alerting integrated
      into the platform monitoring stack. Implement digital twin
      or asset management databases that track the complete lifecycle
      of every prototype from creation through destruction, with
      immutable audit logs. Integrate building management systems
      (BMS), CCTV, and access control for prototype facilities
      into the centralized monitoring platform. Automate the
      generation of chain-of-custody documentation for prototype
      movements between facilities. Implement geofencing alerts
      for GPS-tracked prototype vehicles that trigger when vehicles
      leave authorized areas.
    tools:
      - kubernetes
      - prometheus
      - grafana
      - terraform
      - mqtt
      - timescaledb
      - backstage

  devsecops:
    prose: >-
      Implement automated compliance checks for prototype handling
      documentation within the development workflow. Use pipeline
      automation to generate and validate prototype tracking
      documentation (camouflage sign-off checklists, transport
      authorization forms, destruction certificates) as part of
      the prototype project lifecycle. Integrate prototype asset
      management APIs into the development toolchain so that
      engineers can check prototype status, request access, and
      log handling events through familiar tools. Automate the
      generation of prototype compliance reports from structured
      data collected through the development and testing workflow.
      Implement configuration-as-code for prototype facility
      security systems (CCTV, access control, environmental
      monitoring) with version-controlled change management.
    tools:
      - gitlab-ci
      - github-actions
      - terraform
      - ansible
      - backstage

  secops:
    prose: >-
      Monitor prototype facility security systems 24/7 through
      integration with the security operations center (SOC).
      Implement real-time alerting for prototype security events:
      unauthorized access attempts to prototype areas, CCTV
      anomalies, drone detection alerts, GPS tracking deviations,
      and perimeter intrusion detection. Deploy social media and
      open-source intelligence (OSINT) monitoring for unauthorized
      prototype photography or information disclosure (spy shots,
      forum posts, leaked documents). Implement incident response
      playbooks specific to prototype compromises covering:
      physical breach response, unauthorized photography response,
      social media leak containment, and OEM notification procedures.
      Generate regular prototype security posture reports covering
      access logs, incident metrics, transport compliance, and
      disposal tracking. Conduct regular physical security
      assessments of prototype facilities including penetration
      testing of perimeter controls.
    tools:
      - splunk
      - elastic-siem
      - genetec
      - dedrone
      - digital-shadows
      - recorded-future
      - pagerduty

