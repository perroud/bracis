id: isa-7.1
family: ch-7
title: "Compliance"
class: TISAX

statement:
  prose: >-
    The organization shall identify, document, and keep up to date
    all relevant legislative, statutory, regulatory, and contractual
    requirements and the organization's approach to meet these
    requirements for each information system and the organization.
    Appropriate procedures shall be implemented to ensure compliance
    with legislative, regulatory, and contractual requirements
    related to intellectual property rights and use of proprietary
    software products. Records shall be protected from loss,
    destruction, falsification, unauthorized access, and unauthorized
    release. Privacy and protection of personal data shall be ensured
    as required in relevant legislation and regulation. Cryptographic
    controls shall be used in compliance with all relevant agreements,
    legislation, and regulations. The organization's approach to
    managing information security shall be independently reviewed
    at planned intervals.

guidance:
  prose: >-
    VDA ISA requires a comprehensive compliance management approach
    that covers all applicable legal, regulatory, and contractual
    requirements. For automotive organizations operating in the EU,
    this includes GDPR, national data protection laws, sector-specific
    regulations, intellectual property law, export control regulations,
    and OEM-specific contractual security requirements. The
    organization must maintain a legal and regulatory register that
    is reviewed and updated at least annually. Independent reviews
    of the ISMS must be conducted at planned intervals (at least
    annually). Internal audits must cover all ISA chapters and be
    performed by qualified, independent auditors. Non-conformities
    must be tracked through a corrective action management system
    with defined timelines and responsible parties. At AL3, auditors
    verify the legal register completeness, internal audit program,
    corrective action tracking, and management review records.
    Special attention is given to export control compliance for
    automotive technology and prototype-related information shared
    across national borders.

baselines:
  al1:
    applicability: required
    notes: "Self-assessment of compliance management and legal register."
  al2:
    applicability: required
    notes: "Auditor reviews legal register, internal audit records, and corrective actions."
  al3:
    applicability: required
    notes: "On-site verification of compliance management effectiveness, audit program, and management reviews."

references:
  - citation: "VDA ISA 6.0, Chapter 7"
    url: "https://www.enx.com/en-us/tisax/"
  - citation: "ISO/IEC 27001:2022, A.5.31, A.5.32, A.5.33, A.5.34, A.5.35, A.5.36"
    url: "https://www.iso.org/standard/27001"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement compliance-as-code by encoding legal and regulatory
      requirements as automated policy checks enforced across the
      platform. Maintain a machine-readable legal and regulatory
      register in version control, linked to corresponding policy-as-code
      rules. Automate compliance evidence generation by collecting
      audit artifacts from platform components (access logs, change
      records, configuration snapshots) into a centralized compliance
      evidence store. Implement automated compliance dashboards that
      show real-time adherence to legislative, regulatory, and
      contractual requirements across all platform services. Use
      data sovereignty controls to enforce geographic data residency
      requirements for EU personal data and export-controlled
      automotive technology data.
    tools:
      - open-policy-agent
      - kyverno
      - backstage
      - terraform
      - vault
      - kubernetes

  devsecops:
    prose: >-
      Integrate compliance validation into CI/CD pipelines with
      specific checks for license compliance (open-source licenses
      compatible with automotive IP requirements), data residency
      requirements, and export control restrictions. Automate
      software license scanning and SBOM generation to ensure
      intellectual property compliance. Implement pipeline controls
      that block deployments violating compliance requirements
      (e.g., deploying EU personal data processing to non-EU
      regions). Generate compliance audit trails from pipeline
      execution logs, including who approved what, when, and
      why. Maintain an automated internal audit schedule with
      pipeline-generated evidence packages.
    tools:
      - fossa
      - snyk
      - syft
      - gitlab-ci
      - checkov
      - conftest

  secops:
    prose: >-
      Monitor for compliance violations in real time through SIEM
      rules that detect unauthorized data transfers, policy violations,
      and regulatory requirement breaches. Track all non-conformities
      in a centralized corrective action management system integrated
      with ticketing and workflow tools. Generate automated compliance
      reports for management review showing current compliance status,
      outstanding non-conformities, corrective action progress, and
      audit findings. Monitor for intellectual property leakage
      through DLP tools integrated with email, file sharing, and
      endpoint systems. Maintain audit evidence retention in compliance
      with legal requirements with automated lifecycle management.
    tools:
      - splunk
      - elastic-siem
      - servicenow
      - archer
      - microsoft-purview
      - symantec-dlp

