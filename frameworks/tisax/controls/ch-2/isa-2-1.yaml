id: isa-2.1
family: ch-2
title: "Human Resources Security"
class: TISAX

statement:
  prose: >-
    The organization shall ensure that employees, contractors, and
    third-party users understand their information security responsibilities
    and are suitable for the roles they are considered for. Background
    verification checks shall be carried out prior to employment.
    Information security awareness, education, and training shall be
    provided to all personnel. A formal disciplinary process shall
    exist for information security violations. Responsibilities that
    remain valid after termination or change of employment shall be
    defined, communicated, and enforced.

guidance:
  prose: >-
    VDA ISA emphasizes that people are the primary attack vector in
    automotive supply chains. The organization must implement pre-employment
    screening appropriate to the classification of information the
    individual will access, including identity verification and, for
    prototype-related roles, enhanced background checks. Security
    awareness training must be conducted at onboarding and refreshed
    at least annually, covering topics such as social engineering,
    phishing, clean desk, prototype handling, and reporting of security
    incidents. Training must be role-specific: engineers handling
    prototype data require additional training on classification
    handling and secure communication. For AL3, auditors verify
    training records, attendance tracking, comprehension testing
    results, and the disciplinary process including evidence of
    enforcement. Non-disclosure agreements (NDAs) specific to
    automotive projects must be signed before access is granted
    to OEM-classified information.

baselines:
  al1:
    applicability: required
    notes: "Self-assessment of HR security processes and training programs."
  al2:
    applicability: required
    notes: "Auditor reviews training records, NDAs, and background check processes."
  al3:
    applicability: required
    notes: "On-site verification of training effectiveness, NDA enforcement, and disciplinary records."

references:
  - citation: "VDA ISA 6.0, Chapter 2"
    url: "https://www.enx.com/en-us/tisax/"
  - citation: "ISO/IEC 27001:2022, A.6.1, A.6.2, A.6.3, A.6.4, A.6.5"
    url: "https://www.iso.org/standard/27001"

implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate security awareness requirements into the platform
      onboarding workflow. Require completion of security training
      modules before provisioning platform access credentials or
      API tokens. Implement automated de-provisioning workflows
      triggered by HR system events (termination, role change) that
      revoke all platform access within defined SLA windows. Use the
      internal developer portal to display each user's training
      status and certification expiry dates. Enforce NDA signing
      through digital signature workflows integrated with identity
      management. Maintain training completion records as structured
      data for automated audit evidence generation.
    tools:
      - backstage
      - keycloak
      - okta
      - terraform
      - vault

  devsecops:
    prose: >-
      Require security training completion as a prerequisite for
      repository write access and CI/CD pipeline execution privileges.
      Implement pre-commit hooks or pipeline gates that verify the
      committer has valid, current security training certification.
      Embed security awareness content directly into developer
      workflows through IDE plugins and pipeline feedback messages
      that explain why specific security checks exist. Track and
      report on developer security training metrics as part of
      engineering team dashboards. Automate the generation of
      compliance evidence by correlating training records with
      repository access logs.
    tools:
      - gitlab-ci
      - github-actions
      - keycloak
      - vault

  secops:
    prose: >-
      Conduct regular phishing simulations and social engineering
      tests to measure security awareness effectiveness. Correlate
      phishing test results with training records to identify teams
      or individuals requiring additional training. Monitor for
      indicators of insider threats through user behavior analytics
      (UBA) in the SIEM. Integrate HR system events (terminations,
      role changes) with SIEM alerting to flag continued access
      after employment changes. Generate automated reports on
      training compliance rates, phishing test results, and
      security incident involvement by organizational unit.
    tools:
      - knowbe4
      - proofpoint
      - splunk
      - elastic-siem
      - microsoft-sentinel

