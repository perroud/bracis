id: isa-8.1
family: ch-8
title: "Data Protection"
class: TISAX

statement:
  prose: >-
    The organization shall ensure the protection of personal data in
    accordance with applicable data protection legislation, in
    particular the EU General Data Protection Regulation (GDPR).
    A data protection officer shall be appointed where required by
    law. Data processing activities shall be documented in a record
    of processing activities. Data protection impact assessments
    shall be conducted for high-risk processing. Data subjects'
    rights shall be ensured through documented processes. Personal
    data breaches shall be detected, reported, and managed in
    accordance with legal requirements. Data processing agreements
    shall be established with all processors handling personal data
    on behalf of the organization.

guidance:
  prose: >-
    Chapter 8 is specific to TISAX and addresses data protection
    requirements beyond general information security. This chapter
    is assessed when the TISAX assessment objective "Data Protection"
    is selected, which is mandatory when the organization processes
    personal data of employees, customers, or business partners of
    automotive OEMs. The assessment evaluates GDPR compliance
    operationally, not just policy-level compliance. The organization
    must demonstrate: a functioning DPO role, a complete and current
    record of processing activities (ROPA), documented legal bases
    for all processing activities, implemented data subject rights
    processes (access, rectification, erasure, portability), data
    protection impact assessments (DPIAs) for high-risk processing,
    data processing agreements (DPAs) with all processors, data
    breach notification procedures meeting the 72-hour regulatory
    requirement, and privacy-by-design integration into system
    development. At AL3, auditors verify all of the above through
    evidence review and interviews with the DPO, HR, IT, and
    business process owners.

baselines:
  al1:
    applicability: required
    notes: "Self-assessment of data protection measures and GDPR compliance."
  al2:
    applicability: required
    notes: "Auditor reviews ROPA, DPIAs, DPAs, and data breach procedures."
  al3:
    applicability: required
    notes: "On-site verification of data protection effectiveness, DPO role, subject rights processes, and breach response."

references:
  - citation: "VDA ISA 6.0, Chapter 8"
    url: "https://www.enx.com/en-us/tisax/"
  - citation: "EU General Data Protection Regulation (GDPR)"
    url: "https://eur-lex.europa.eu/eli/reg/2016/679/oj"
  - citation: "ISO/IEC 27701:2019 — Privacy Information Management"
    url: "https://www.iso.org/standard/71670.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement privacy-by-design at the platform level by providing
      built-in data classification, encryption, pseudonymization,
      and anonymization capabilities as platform services. Deploy
      a data catalog that automatically discovers and classifies
      personal data across all platform data stores. Implement
      automated data retention and deletion policies that enforce
      purpose limitation and storage limitation principles. Provide
      platform-level APIs for data subject rights fulfillment
      (data access, export, deletion) that platform tenants can
      integrate into their applications. Enforce data residency
      controls ensuring EU personal data remains within EU-based
      infrastructure. Implement consent management infrastructure
      that tracks and enforces processing consent across all
      platform services. Deploy data loss prevention (DLP) at
      the platform level to prevent unauthorized personal data
      transfers.
    tools:
      - backstage
      - vault
      - kubernetes
      - terraform
      - open-policy-agent
      - datahub
      - apache-atlas

  devsecops:
    prose: >-
      Integrate data protection checks into CI/CD pipelines:
      scan code for personal data handling patterns and verify
      compliance with privacy-by-design requirements. Implement
      automated testing of data subject rights endpoints (access,
      deletion, portability) as part of the test suite. Scan
      database schemas and API definitions for personal data
      fields and verify that encryption, access controls, and
      retention policies are applied. Generate DPIA artifacts
      automatically from system architecture definitions and
      data flow diagrams maintained in code. Implement pipeline
      gates that block deployment of services processing personal
      data without a documented legal basis and corresponding
      ROPA entry. Automate the generation of data processing
      documentation from infrastructure and application code.
    tools:
      - semgrep
      - sonarqube
      - checkov
      - gitlab-ci
      - github-actions
      - conftest

  secops:
    prose: >-
      Monitor for personal data breaches through SIEM rules that
      detect unauthorized access to personal data stores, bulk
      data extraction, and anomalous data access patterns. Implement
      automated breach assessment workflows that calculate severity,
      affected data subjects, and regulatory notification requirements
      within the 72-hour GDPR deadline. Track all data subject
      rights requests in a centralized system with SLA monitoring
      and escalation. Monitor DPA compliance by tracking processor
      access patterns and verifying adherence to agreed processing
      purposes. Integrate DLP alerts with incident response
      playbooks specific to personal data breach scenarios.
      Generate automated data protection compliance reports for
      the DPO showing processing activity changes, breach metrics,
      subject rights fulfillment rates, and DPIA status.
    tools:
      - splunk
      - elastic-siem
      - onetrust
      - bigid
      - microsoft-purview
      - servicenow

