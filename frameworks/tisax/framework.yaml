id: tisax
title: "TISAX — Trusted Information Security Assessment Exchange (VDA ISA 6.0)"
short_title: "TISAX"
version: "6.0.2"
publication_date: "2023-04-01"
last_updated: "2024-01-01"

authority:
  name: "Verband der Automobilindustrie / ENX Association"
  acronym: "VDA/ENX"
  country: DE
  url: "https://www.enx.com/en-us/tisax/"

type: standard
scope: cybersecurity
mandatory: false

notes: >-
  TISAX is not legally mandatory, but is a de-facto requirement imposed
  contractually by most major OEMs (Volkswagen, BMW, Mercedes-Benz,
  Porsche, Audi, etc.) on their entire supply chain. Without a valid
  TISAX label, suppliers are effectively excluded from automotive
  business in the EU and increasingly worldwide.

original_language: en
available_languages:
  - en
  - de

industries:
  - automotive
  - manufacturing
  - supply-chain

regions:
  - european-union
  - global

techstacks:
  - platform-engineering
  - devsecops
  - secops
  - gitops

assessment_levels:
  - id: al1
    title: "Assessment Level 1 — Normal"
    description: >-
      Self-assessment. The participant performs a self-assessment based on
      the ISA catalog and submits the results. No auditor verification.
      Suitable for low protection needs only.
  - id: al2
    title: "Assessment Level 2 — High"
    description: >-
      Remote assessment. A qualified audit provider performs a plausibility
      check of the self-assessment via remote interview and evidence review.
      Required for information with high protection needs.
  - id: al3
    title: "Assessment Level 3 — Very High"
    description: >-
      On-site assessment. A qualified audit provider performs a comprehensive
      on-site audit with physical verification of controls, interviews, and
      evidence inspection. Required for information with very high protection
      needs (e.g., prototype data, classified OEM projects).

assessment_objectives:
  - id: information-security
    title: "Information Security"
    description: "Assessment of information security management based on ISA chapters 1-7."
  - id: prototype-protection
    title: "Prototype Protection"
    description: "Assessment of prototype and pre-series product protection measures."
  - id: data-protection
    title: "Data Protection"
    description: "Assessment of data protection controls aligned with GDPR requirements."

baselines:
