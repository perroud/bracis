id: anx-a-2
family: anx-a
title: "AI transparency, explainability, and accountability"
class: ISO42001

statement:
  prose: >-
    The organization shall ensure appropriate levels of transparency and
    explainability for AI systems, proportionate to the risk level and
    context of use. The organization shall provide meaningful information
    about AI system capabilities, limitations, intended use, and decision
    logic to relevant stakeholders. The organization shall establish
    accountability mechanisms that ensure clear responsibility for AI system
    outcomes, including mechanisms for individuals to challenge AI-assisted
    decisions. The organization shall maintain records of AI system design
    decisions, development choices, and operational modifications to support
    accountability and auditability.

guidance:
  prose: >-
    Transparency and explainability requirements should be calibrated to
    the AI system's risk level and the needs of different stakeholders.
    Technical stakeholders may require detailed model architecture and
    feature importance information, while end users may need simplified
    explanations of how decisions are made and what factors influenced
    specific outcomes. Organizations should implement multiple levels of
    explainability: global explanations that describe overall model
    behavior, local explanations that account for individual predictions,
    and counterfactual explanations that help users understand what changes
    would lead to different outcomes. Accountability mechanisms should
    include clear escalation paths, human review processes for
    consequential decisions, and complaint handling procedures.

references:
  - citation: "ISO/IEC 42001:2023, Annex A, A.3 (Transparency), A.4 (Accountability)"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement explainability infrastructure as a platform service. Deploy
      model explanation services that provide feature importance, SHAP
      values, and counterfactual explanations through standardized APIs.
      Build accountability dashboards that track AI decision audit trails,
      human review rates, and override frequencies. Implement model cards
      as mandatory platform artifacts that document model capabilities
      and limitations. Provide transparency tooling that generates
      stakeholder-appropriate explanations.
    tools:
      - shap
      - lime
      - mlflow
      - backstage
      - model-cards-toolkit

  devsecops:
    prose: >-
      Require explainability outputs as mandatory CI/CD artifacts.
      Implement automated checks that validate explanation quality,
      such as ensuring feature importance explanations are consistent
      and meaningful. Enforce model card creation and review as part
      of the deployment pipeline. Implement automated accountability
      logging that captures all deployment decisions, approvals, and
      their justifications. Test that explanation APIs produce valid
      outputs for representative inputs.
    tools:
      - gitlab-ci
      - shap
      - lime
      - model-cards-toolkit
      - mlflow

  secops:
    prose: >-
      Monitor AI decision-making for accountability gaps, such as
      decisions made without required human oversight or explanations
      that fail to meet defined quality standards. Track challenge and
      complaint volumes related to AI decisions and ensure timely
      responses. Audit AI decision logs for patterns that may indicate
      systematic bias or accountability failures. Maintain explanation
      logs for regulatory and audit purposes.
    tools:
      - splunk
      - elastic-siem
      - servicenow
      - grafana
      - jira

