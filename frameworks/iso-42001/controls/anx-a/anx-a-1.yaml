id: anx-a-1
family: anx-a
title: "AI data governance and data quality"
class: ISO42001

statement:
  prose: >-
    The organization shall establish and implement policies and procedures
    for managing the data used in AI systems, including data for training,
    validation, testing, and operation. The organization shall ensure the
    quality, relevance, representativeness, and integrity of data used in
    AI systems. Data governance shall address data acquisition, labeling,
    preprocessing, augmentation, storage, and disposal. The organization
    shall document data provenance and lineage, assess data for potential
    biases, and implement controls to prevent data poisoning and
    unauthorized data modification. Data management practices shall be
    proportionate to the risk level of the AI system.

guidance:
  prose: >-
    Data is the foundation of AI systems, and data governance is therefore
    a critical control. Organizations should implement comprehensive data
    management practices that cover the entire data lifecycle from acquisition
    through disposal. Data quality should be assessed along multiple
    dimensions including accuracy, completeness, consistency, timeliness,
    and representativeness. Particular attention should be paid to bias in
    training data, which can lead to discriminatory AI outputs.
    Organizations should implement data lineage tracking that enables
    traceability from model predictions back to the specific data that
    influenced them. Data versioning is essential for reproducibility and
    audit purposes.

references:
  - citation: "ISO/IEC 42001:2023, Annex A, A.2 (Data for AI Systems)"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a data platform that enforces governance controls on all
      AI data. Deploy data catalogs that track metadata, lineage, and
      quality metrics for all datasets used in AI systems. Implement
      data versioning with immutable storage to ensure reproducibility.
      Enforce access controls on AI training data that prevent unauthorized
      modification. Provide automated data quality validation frameworks
      that check data against defined quality rules before it enters
      training pipelines. Implement data bias detection tooling as a
      platform service.
    tools:
      - great-expectations
      - dvc
      - apache-atlas
      - delta-lake
      - mlflow

  devsecops:
    prose: >-
      Integrate data quality validation into CI/CD pipelines as mandatory
      gates. Implement automated bias detection scanning on training
      datasets as part of the model build process. Enforce data
      versioning through pipeline rules that reject model training
      on unversioned datasets. Scan data pipelines for security
      vulnerabilities and unauthorized data access patterns. Require
      data provenance documentation as a mandatory artifact alongside
      model artifacts.
    tools:
      - gitlab-ci
      - great-expectations
      - dvc
      - fairlearn
      - trivy

  secops:
    prose: >-
      Monitor data pipelines for anomalies that may indicate data
      poisoning, unauthorized modification, or quality degradation.
      Implement data access auditing that tracks who accessed AI
      training data, when, and for what purpose. Alert on data
      quality metric degradation that may affect model reliability.
      Monitor for unauthorized data exfiltration from AI data stores.
      Maintain data governance compliance dashboards.
    tools:
      - splunk
      - elastic-siem
      - apache-atlas
      - wazuh
      - grafana

