id: anx-a-3
family: anx-a
title: "AI system security, robustness, and human oversight"
class: ISO42001

statement:
  prose: >-
    The organization shall implement security measures to protect AI systems
    against threats including adversarial attacks, data poisoning, model
    extraction, and unauthorized access. The organization shall ensure AI
    system robustness by implementing measures to maintain reliable
    performance under varying conditions, including edge cases, distribution
    shifts, and adversarial inputs. The organization shall establish
    mechanisms for human oversight of AI systems, including the ability to
    intervene in, override, or shut down AI system operations when necessary.
    Human oversight shall be proportionate to the risk level of the AI system
    and shall ensure that humans retain meaningful control over AI-assisted
    decisions.

guidance:
  prose: >-
    AI system security faces unique threats that go beyond traditional
    cybersecurity. Adversarial attacks can manipulate model inputs to produce
    incorrect outputs; data poisoning can corrupt model behavior through
    tainted training data; model extraction can steal proprietary AI models
    through repeated querying; and model inversion can reveal sensitive
    training data. Robustness measures should include adversarial testing,
    input validation, anomaly detection on inference requests, and graceful
    degradation under unexpected conditions. Human oversight mechanisms
    should include human-in-the-loop processes for high-stakes decisions,
    human-on-the-loop monitoring for automated systems, and kill switches
    for emergency shutdown of AI systems exhibiting harmful behavior.

references:
  - citation: "ISO/IEC 42001:2023, Annex A, A.5 (Security), A.6 (Robustness), A.7 (Human Oversight)"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement defense-in-depth security for AI infrastructure including
      network isolation for model training environments, encryption for
      model artifacts at rest and in transit, and access controls for
      model registries and inference endpoints. Deploy input validation
      and anomaly detection on inference pipelines. Implement rate
      limiting and query pattern monitoring to prevent model extraction
      attacks. Build human override capabilities into AI serving
      infrastructure, including circuit breakers and manual takeover
      mechanisms. Provide kill switch functionality for emergency AI
      system shutdown.
    tools:
      - kubernetes
      - istio
      - vault
      - falco
      - kyverno

  devsecops:
    prose: >-
      Integrate AI security testing into CI/CD pipelines. Implement
      adversarial robustness testing that evaluates model behavior under
      attack conditions. Scan model artifacts for vulnerabilities and
      verify model integrity through cryptographic signing. Test human
      oversight mechanisms as part of deployment validation, including
      override functionality and kill switch procedures. Implement
      model access controls that prevent unauthorized model extraction
      through pipeline-managed API keys and rate limits.
    tools:
      - gitlab-ci
      - art-adversarial-robustness
      - trivy
      - sigstore
      - semgrep

  secops:
    prose: >-
      Monitor AI systems for security threats including adversarial
      input patterns, anomalous query volumes that may indicate model
      extraction attempts, and data pipeline integrity violations.
      Implement AI-specific threat detection rules in the SIEM.
      Monitor human oversight metrics including override frequency,
      review completion rates, and response times. Maintain incident
      response procedures specific to AI security incidents. Conduct
      regular penetration testing of AI systems including adversarial
      attack simulations.
    tools:
      - splunk
      - elastic-siem
      - falco
      - wazuh
      - prometheus

