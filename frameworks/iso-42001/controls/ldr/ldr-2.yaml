id: ldr-2
family: ldr
title: "AI policy"
class: ISO42001

statement:
  prose: >-
    Top management shall establish an AI policy that is appropriate to the
    purpose of the organization, provides a framework for setting AI
    objectives, includes a commitment to satisfy applicable requirements,
    and includes a commitment to continual improvement of the AI management
    system. The AI policy shall address responsible development and use of
    AI systems, including commitments to fairness, transparency,
    accountability, safety, and privacy. The AI policy shall be available
    as documented information, be communicated within the organization, and
    be available to interested parties as appropriate.

guidance:
  prose: >-
    The AI policy should articulate the organization's principles for
    responsible AI, covering ethical considerations, risk tolerance for AI
    systems, and commitments to international AI governance frameworks. The
    policy should be specific enough to guide decision-making but flexible
    enough to accommodate evolving AI technologies and regulatory requirements.
    It should address the full AI lifecycle from data collection through
    model retirement, and should explicitly state the organization's position
    on high-risk AI applications, automated decision-making, and human
    oversight requirements.

references:
  - citation: "ISO/IEC 42001:2023, Section 5.2"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Encode the AI policy as machine-readable policy-as-code artifacts that
      are enforced by the platform. Translate high-level policy commitments
      into concrete technical constraints, such as mandatory bias testing
      thresholds, required explainability features, and prohibited data
      sources. Store the AI policy in a version-controlled repository with
      clear change history. Publish the policy through the internal developer
      portal and integrate policy checks into infrastructure provisioning
      workflows.
    tools:
      - open-policy-agent
      - kyverno
      - backstage
      - git
      - terraform

  devsecops:
    prose: >-
      Implement AI policy checks as automated gates in CI/CD pipelines.
      Validate that model training pipelines comply with data usage policies,
      that model outputs meet fairness thresholds defined in the policy, and
      that transparency documentation is produced as a build artifact. Use
      linting tools to check AI code for policy violations such as
      unauthorized data access patterns or missing logging requirements.
    tools:
      - gitlab-ci
      - checkov
      - semgrep
      - fairlearn
      - model-cards-toolkit

  secops:
    prose: >-
      Monitor adherence to the AI policy through continuous compliance
      scanning. Alert on policy deviations such as AI systems deployed
      without required documentation, models operating without human
      oversight in high-risk domains, or data processing that violates
      policy-defined constraints. Maintain a policy compliance dashboard
      and produce periodic compliance reports for leadership review.
    tools:
      - splunk
      - elastic-siem
      - servicenow-grc
      - grafana
      - wazuh

