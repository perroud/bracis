id: ldr-3
family: ldr
title: "Organizational roles, responsibilities, and authorities"
class: ISO42001

statement:
  prose: >-
    Top management shall ensure that the responsibilities and authorities for
    relevant roles are assigned and communicated within the organization. Top
    management shall assign the responsibility and authority for ensuring that
    the AI management system conforms to the requirements of this document,
    and for reporting on the performance of the AI management system to top
    management. Roles shall be defined for AI system development, deployment,
    operation, and oversight, with clear accountability for AI-related
    decisions and their outcomes.

guidance:
  prose: >-
    AI governance requires clearly defined roles that span technical,
    ethical, and business functions. Key roles include AI system owners who
    are accountable for individual system outcomes, data stewards who govern
    training and operational data, model validators who independently assess
    model performance, and AI ethics officers who evaluate societal impact.
    The organization should establish whether these roles are dedicated
    positions or additional responsibilities for existing staff, and should
    ensure that individuals in these roles have the authority to halt AI
    system deployment when risks are unacceptable.

references:
  - citation: "ISO/IEC 42001:2023, Section 5.3"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement role-based access control that reflects AI governance roles.
      Configure the platform to require designated AI system owners for each
      deployed model, with ownership metadata tracked in the service catalog.
      Enforce separation of duties between model developers, validators, and
      deployers through pipeline role assignments. Create role templates in
      the identity provider that map to ISO 42001 responsibilities.
    tools:
      - keycloak
      - vault
      - backstage
      - kubernetes-rbac
      - terraform

  devsecops:
    prose: >-
      Enforce role-based pipeline permissions that prevent AI model
      deployment without approval from designated roles. Implement
      CODEOWNERS files that assign AI governance reviewers to model
      repositories. Configure merge request approval rules that require
      sign-off from both technical and governance roles for AI system
      changes. Maintain audit logs of who approved each AI deployment
      decision.
    tools:
      - gitlab-ci
      - gitlab-merge-requests
      - git
      - vault
      - sigstore

  secops:
    prose: >-
      Monitor for unauthorized AI system modifications by users without
      appropriate roles. Implement access reviews that verify AI governance
      role assignments are current and that segregation of duties is
      maintained. Alert on privilege escalation attempts in AI infrastructure.
      Produce role attestation reports for management review.
    tools:
      - splunk
      - elastic-siem
      - wazuh
      - keycloak
      - servicenow-grc

