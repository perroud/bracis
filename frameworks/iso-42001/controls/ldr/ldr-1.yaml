id: ldr-1
family: ldr
title: "Leadership and commitment for AI management"
class: ISO42001

statement:
  prose: >-
    Top management shall demonstrate leadership and commitment with respect to
    the AI management system by ensuring the AI policy and AI objectives are
    established and are compatible with the strategic direction of the
    organization, ensuring the integration of the AI management system
    requirements into the organization's business processes, ensuring that
    the resources needed for the AI management system are available, and
    communicating the importance of effective AI management and of conforming
    to the AI management system requirements. Top management shall ensure
    that the AI management system achieves its intended outcome(s) and shall
    direct and support persons to contribute to the effectiveness of the
    AI management system.

guidance:
  prose: >-
    Leadership commitment to AI governance requires more than policy approval.
    Top management must actively participate in AI risk decisions, allocate
    sufficient resources for AI safety and ethics functions, and establish
    clear accountability structures. This includes appointing responsible
    individuals for AI governance, establishing an AI ethics board or
    committee where appropriate, and ensuring that AI considerations are
    integrated into strategic planning. Leaders should demonstrate their
    commitment through regular reviews of AI system performance, incident
    response involvement, and visible support for responsible AI practices
    across the organization.

references:
  - citation: "ISO/IEC 42001:2023, Section 5.1"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement governance structures in the platform that reflect leadership
      accountability. Configure approval workflows for high-risk AI system
      deployments that require executive sign-off. Create executive dashboards
      showing AI system portfolio health, risk levels, and compliance status.
      Establish platform-level policies that enforce leadership-approved
      guardrails, such as prohibited AI use cases and mandatory review
      thresholds. Integrate AI governance decisions into change advisory
      board tooling.
    tools:
      - backstage
      - argocd
      - grafana
      - open-policy-agent
      - servicenow

  devsecops:
    prose: >-
      Enforce leadership-approved AI policies in the development lifecycle
      through pipeline gates that require documented approval for AI system
      changes above defined risk thresholds. Implement merge request approval
      rules that route high-risk AI changes to designated governance
      approvers. Maintain audit trails of all AI deployment decisions that
      are accessible to leadership for review.
    tools:
      - gitlab-ci
      - gitlab-merge-requests
      - vault
      - sigstore
      - git

  secops:
    prose: >-
      Provide leadership with regular AI governance reports including
      incident summaries, compliance status, and risk trends. Implement
      escalation procedures that route critical AI incidents to executive
      management. Monitor for governance gaps where AI systems operate
      without documented leadership approval. Maintain executive-level
      metrics on AI system trustworthiness and stakeholder satisfaction.
    tools:
      - servicenow-grc
      - splunk
      - grafana
      - pagerduty
      - jira

