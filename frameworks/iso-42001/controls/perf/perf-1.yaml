id: perf-1
family: perf
title: "Monitoring, measurement, analysis, and evaluation of AI systems"
class: ISO42001

statement:
  prose: >-
    The organization shall determine what needs to be monitored and measured
    for the AI management system, the methods for monitoring, measurement,
    analysis, and evaluation to ensure valid results, when the monitoring
    and measuring shall be performed, and when the results from monitoring
    and measurement shall be analyzed and evaluated. The organization shall
    evaluate the AI management system performance and the effectiveness of
    the AI management system. Monitoring shall include AI-specific metrics
    such as model performance, fairness indicators, data quality, and
    system reliability. The organization shall retain appropriate documented
    information as evidence of the results.

guidance:
  prose: >-
    AI system monitoring requires metrics beyond traditional IT performance
    indicators. Organizations should monitor model accuracy, precision,
    recall, and other task-specific performance metrics; fairness metrics
    across protected attributes; data quality indicators for training and
    inference data; model drift and concept drift; explainability and
    interpretability outputs; resource consumption and environmental
    impact; and stakeholder satisfaction. Monitoring should be continuous
    for production systems, with defined thresholds that trigger alerts
    and corrective actions. Analysis should include trend detection to
    identify gradual degradation that may not trigger individual alerts.

references:
  - citation: "ISO/IEC 42001:2023, Section 9.1"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement comprehensive AI monitoring infrastructure that captures
      model performance, fairness, and operational metrics. Deploy
      model-specific monitoring that tracks prediction distributions,
      feature importance shifts, and data quality in real time. Create
      dashboards that present AI-specific metrics alongside traditional
      infrastructure metrics. Implement alerting rules for model drift,
      performance degradation, and fairness violations. Use distributed
      tracing to monitor AI inference pipelines end-to-end.
    tools:
      - prometheus
      - grafana
      - evidently-ai
      - mlflow
      - seldon-core

  devsecops:
    prose: >-
      Integrate model evaluation into CI/CD pipelines with automated
      performance benchmarking against baseline metrics. Implement
      canary analysis that compares new model versions against production
      baselines on key metrics before full rollout. Generate monitoring
      configuration as code alongside model deployments. Build automated
      regression testing that validates model behavior on curated
      evaluation datasets covering edge cases and known failure modes.
    tools:
      - gitlab-ci
      - mlflow
      - great-expectations
      - fairlearn
      - evidently-ai

  secops:
    prose: >-
      Implement AI-specific monitoring in the SIEM that correlates model
      behavior anomalies with security events. Monitor for adversarial
      input patterns, unusual prediction distributions, and data pipeline
      anomalies that may indicate attacks or system degradation. Create
      AI performance baselines and alert on deviations. Produce periodic
      AI monitoring reports for management review that summarize system
      health, incident trends, and compliance status.
    tools:
      - splunk
      - elastic-siem
      - prometheus
      - grafana
      - wazuh

