id: perf-2
family: perf
title: "Internal audit and management review of the AI management system"
class: ISO42001

statement:
  prose: >-
    The organization shall conduct internal audits at planned intervals to
    provide information on whether the AI management system conforms to the
    organization's own requirements for its AI management system and the
    requirements of this document, and is effectively implemented and
    maintained. Top management shall review the organization's AI management
    system at planned intervals to ensure its continuing suitability, adequacy,
    and effectiveness. The management review shall include consideration of
    the status of actions from previous management reviews, changes in
    external and internal issues relevant to the AI management system,
    information on the AI management system performance, and opportunities
    for continual improvement.

guidance:
  prose: >-
    Internal audits of the AI management system should be conducted by
    auditors with competence in both management system auditing and AI
    technologies. Audits should assess conformity with the standard's
    requirements, effectiveness of AI-specific controls, adequacy of AI
    documentation, and the maturity of AI governance processes. Management
    reviews should evaluate whether the AI management system remains aligned
    with organizational strategy, whether AI risks are being effectively
    managed, whether AI objectives are being met, and whether resource
    allocation for AI governance is sufficient. Both audits and reviews
    should result in documented actions with clear ownership and timelines.

references:
  - citation: "ISO/IEC 42001:2023, Sections 9.2, 9.3"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Provide audit-ready infrastructure that generates comprehensive audit
      trails for all AI system activities. Implement automated compliance
      reporting that maps platform controls to ISO 42001 requirements.
      Create management review dashboards that present AI governance
      metrics, including risk status, objective achievement, and incident
      trends. Maintain immutable audit logs for all AI infrastructure
      changes and access events.
    tools:
      - backstage
      - grafana
      - vault
      - elasticsearch
      - prometheus

  devsecops:
    prose: >-
      Implement audit trail generation within CI/CD pipelines that captures
      all AI model changes, approvals, and deployments. Generate compliance
      evidence artifacts automatically as part of the build process. Provide
      tools for auditors to trace AI system changes from code commit
      through production deployment. Maintain signed and timestamped
      records of all pipeline executions involving AI systems.
    tools:
      - gitlab-ci
      - sigstore
      - git
      - mlflow
      - trivy

  secops:
    prose: >-
      Maintain comprehensive audit logs for all AI system activities
      including model access, inference requests, data pipeline operations,
      and governance decisions. Implement log integrity controls to prevent
      tampering. Provide audit support tools that enable efficient
      extraction and analysis of audit evidence. Generate automated
      compliance reports that map operational data to ISO 42001
      requirements. Support management reviews with trend analysis
      and executive summaries.
    tools:
      - splunk
      - elastic-siem
      - servicenow-grc
      - grafana
      - vault

