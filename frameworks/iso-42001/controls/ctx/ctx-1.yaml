id: ctx-1
family: ctx
title: "Understanding the organization and its context"
class: ISO42001

statement:
  prose: >-
    The organization shall determine external and internal issues that are
    relevant to its purpose and that affect its ability to achieve the intended
    outcome(s) of its AI management system. The organization shall consider
    issues related to the development, provision, or use of AI systems,
    including the organization's role as an AI provider, deployer, or developer,
    and the potential impacts of AI systems on individuals, groups, and society.

guidance:
  prose: >-
    Understanding the organizational context for AI requires identifying the
    regulatory landscape, societal expectations, and technological environment
    in which the organization operates AI systems. This includes assessing the
    maturity of the organization's AI capabilities, the domains in which AI
    systems are deployed, stakeholder expectations regarding responsible AI,
    and the broader societal implications. Organizations should consider
    jurisdictional requirements such as the EU AI Act, sector-specific AI
    regulations, and ethical AI frameworks. The context analysis should be
    revisited periodically as the AI landscape evolves rapidly.

references:
  - citation: "ISO/IEC 42001:2023, Section 4.1"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Establish a centralized AI system registry that catalogs all AI models,
      datasets, and inference endpoints across the organization. Tag each
      system with metadata including its risk classification, deployment
      environment, data sources, and intended use case. Use infrastructure-as-code
      to define AI workload boundaries and maintain an up-to-date inventory
      of AI infrastructure components. Integrate the registry with the
      internal developer portal to provide visibility into the AI estate.
    tools:
      - backstage
      - mlflow
      - kubeflow
      - terraform
      - open-policy-agent

  devsecops:
    prose: >-
      Integrate AI context assessment into the CI/CD pipeline by scanning
      repositories for AI model artifacts, training scripts, and inference
      configurations. Maintain metadata files alongside model code that
      declare the system's intended purpose, risk level, and regulatory
      applicability. Use model cards or datasheets as mandatory artifacts
      in the build pipeline. Enforce pipeline gates that require context
      documentation before promoting AI artifacts to production.
    tools:
      - gitlab-ci
      - model-cards-toolkit
      - dvc
      - mlflow
      - semgrep

  secops:
    prose: >-
      Maintain a real-time dashboard of all deployed AI systems, their
      operational status, and risk classifications. Monitor changes in the
      external regulatory environment and map them to affected AI systems.
      Establish alert rules for AI systems operating outside their declared
      context, such as model drift detection or usage in unintended domains.
      Feed AI system inventory data into GRC platforms for continuous
      context reassessment.
    tools:
      - splunk
      - elastic-siem
      - servicenow-grc
      - prometheus
      - grafana

