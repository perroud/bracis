id: ctx-3
family: ctx
title: "Determining the scope of the AI management system"
class: ISO42001

statement:
  prose: >-
    The organization shall determine the boundaries and applicability of the
    AI management system to establish its scope. When determining this scope,
    the organization shall consider the external and internal issues referred
    to in 4.1, the requirements referred to in 4.2, and the AI systems that
    are within scope. The scope shall identify the AI systems, processes, and
    organizational units covered by the AI management system. The scope shall
    be available as documented information.

guidance:
  prose: >-
    The scope definition must clearly delineate which AI systems, processes,
    and organizational functions fall within the AIMS boundary. Organizations
    should consider whether the scope covers all AI activities or is limited
    to specific business units, AI system types, or lifecycle phases. The
    scope should account for the organization's roles as AI developer,
    provider, or deployer, and should explicitly address third-party AI
    components, pre-trained models, and AI-as-a-service dependencies. A
    well-defined scope prevents gaps in governance and ensures that all
    relevant AI activities receive appropriate oversight.

references:
  - citation: "ISO/IEC 42001:2023, Section 4.3"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Define the AI management system scope as a configuration artifact
      within the platform, specifying which clusters, namespaces, pipelines,
      and model registries are governed. Use labels and annotations in
      Kubernetes to tag AI workloads that fall within scope. Implement
      network policies and resource quotas that enforce scope boundaries.
      Maintain a scope document in version control that is linked to
      the AI system registry and updated as new AI systems are onboarded
      or decommissioned.
    tools:
      - kubernetes
      - terraform
      - backstage
      - open-policy-agent
      - argocd

  devsecops:
    prose: >-
      Enforce scope compliance in CI/CD pipelines by requiring all AI
      repositories to declare their AIMS scope membership in a metadata
      file. Use pipeline rules to apply governance checks only to
      in-scope AI projects. Implement automated discovery to detect
      AI workloads that may have been deployed outside the declared
      scope, such as shadow AI models or unsanctioned ML experiments.
    tools:
      - gitlab-ci
      - trivy
      - semgrep
      - checkov
      - mlflow

  secops:
    prose: >-
      Monitor for AI activities that fall outside the declared AIMS scope,
      including unauthorized model deployments, unsanctioned AI API usage,
      and shadow AI systems. Implement network monitoring to detect AI
      inference traffic from out-of-scope endpoints. Maintain scope
      documentation in the GRC platform and trigger alerts when scope
      boundaries are breached.
    tools:
      - splunk
      - elastic-siem
      - wazuh
      - prisma-cloud
      - servicenow-grc

