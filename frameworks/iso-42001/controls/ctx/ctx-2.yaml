id: ctx-2
family: ctx
title: "Understanding the needs and expectations of interested parties"
class: ISO42001

statement:
  prose: >-
    The organization shall determine the interested parties that are relevant
    to the AI management system, the relevant requirements of these interested
    parties, and which of these requirements will be addressed through the AI
    management system. Interested parties shall include, as applicable, those
    affected by AI system outputs, regulators, customers, end users, data
    subjects, and other stakeholders impacted by the development, deployment,
    or use of AI systems.

guidance:
  prose: >-
    Stakeholder identification for AI systems goes beyond traditional IT
    stakeholders. It must encompass individuals and groups who may be affected
    by AI decisions, including vulnerable populations, downstream consumers
    of AI outputs, and civil society organizations. The organization should
    maintain a stakeholder register that maps interested parties to specific
    AI systems and documents their expectations regarding fairness,
    transparency, accountability, and safety. Regulatory bodies such as
    data protection authorities, AI-specific regulators, and sector
    supervisors should be explicitly identified along with their specific
    compliance requirements.

references:
  - citation: "ISO/IEC 42001:2023, Section 4.2"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build stakeholder mapping into the AI system lifecycle tooling. Create
      templates in the internal developer portal that require teams to
      identify affected parties, their data rights, and expected outcomes
      before provisioning AI infrastructure. Implement role-based access
      controls that align with stakeholder categories, ensuring that data
      subjects, auditors, and regulators have appropriate access to AI
      system documentation and audit trails.
    tools:
      - backstage
      - harbor
      - vault
      - keycloak
      - terraform

  devsecops:
    prose: >-
      Require stakeholder analysis documentation as a mandatory CI/CD
      artifact before AI model deployment. Implement pipeline checks that
      validate the presence of stakeholder impact assessments, consent
      mechanisms for data subjects, and traceability between stakeholder
      requirements and implemented controls. Use automated scanning to
      detect AI models that process personal data without corresponding
      stakeholder documentation.
    tools:
      - gitlab-ci
      - checkov
      - trivy
      - semgrep
      - dvc

  secops:
    prose: >-
      Monitor for stakeholder-related incidents, such as complaints from
      affected individuals, regulatory inquiries, or public reports of AI
      system harm. Maintain a stakeholder communication channel for AI
      incident reporting. Track regulatory changes that affect stakeholder
      requirements and trigger reassessments of existing AI systems.
      Integrate stakeholder feedback into the AI governance dashboard.
    tools:
      - servicenow-grc
      - splunk
      - jira
      - pagerduty
      - elastic-siem

