id: sup-3
family: sup
title: "Documented information for AI management"
class: ISO42001

statement:
  prose: >-
    The AI management system shall include documented information required
    by this document and documented information determined by the organization
    as being necessary for the effectiveness of the AI management system.
    When creating and updating documented information, the organization shall
    ensure appropriate identification and description, format and media, and
    review and approval for suitability and adequacy. Documented information
    shall be controlled to ensure it is available and suitable for use where
    and when it is needed, and it is adequately protected. AI-specific
    documentation shall include model documentation, data provenance records,
    impact assessments, and decision audit trails.

guidance:
  prose: >-
    AI system documentation requirements are more extensive than traditional
    software documentation. They should include model cards describing model
    purpose, performance characteristics, and limitations; datasheets
    documenting training data sources, preprocessing steps, and known biases;
    impact assessments recording potential societal effects; decision logs
    capturing key design choices and their rationale; and validation reports
    demonstrating that models meet their specified objectives. Documentation
    should be version-controlled alongside the models and data they describe,
    and should remain accessible throughout the AI system lifecycle, including
    after decommissioning for accountability purposes.

references:
  - citation: "ISO/IEC 42001:2023, Section 7.5"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a documentation-as-code approach for AI system documentation.
      Require model cards, datasheets, and impact assessments as versioned
      artifacts stored alongside model code in the repository. Provide
      templates and tooling through the developer portal that standardize
      AI documentation across the organization. Implement automated
      documentation generation for technical metadata such as model
      architecture, training parameters, and performance metrics.
    tools:
      - backstage
      - mlflow
      - dvc
      - git
      - model-cards-toolkit

  devsecops:
    prose: >-
      Enforce documentation completeness as a CI/CD pipeline gate.
      Validate that all required AI documentation artifacts are present
      and conform to organizational templates before allowing model
      promotion. Implement automated documentation checks that verify
      model cards are current, data lineage is traceable, and impact
      assessments have been reviewed. Generate documentation compliance
      reports as build artifacts.
    tools:
      - gitlab-ci
      - model-cards-toolkit
      - great-expectations
      - dvc
      - semgrep

  secops:
    prose: >-
      Monitor for AI systems operating without required documentation.
      Implement alerts for documentation gaps, such as models in production
      without current model cards or datasets in use without provenance
      records. Ensure documentation is immutable for audit purposes and
      maintain retention policies that preserve AI documentation for the
      required period. Track documentation access for sensitive AI systems.
    tools:
      - splunk
      - elastic-siem
      - servicenow-grc
      - vault
      - grafana

