id: sup-1
family: sup
title: "Resources and competence for AI management"
class: ISO42001

statement:
  prose: >-
    The organization shall determine and provide the resources needed for
    the establishment, implementation, maintenance, and continual improvement
    of the AI management system. The organization shall determine the
    necessary competence of person(s) doing work under its control that
    affects AI system performance and the effectiveness of the AI management
    system, ensure that these persons are competent on the basis of
    appropriate education, training, or experience, and where applicable,
    take actions to acquire the necessary competence and evaluate the
    effectiveness of the actions taken. Competence requirements shall
    address AI-specific skills including data science, machine learning
    engineering, AI ethics, and AI risk management.

guidance:
  prose: >-
    AI competence requirements extend beyond traditional IT skills to
    encompass data science, machine learning engineering, AI ethics,
    responsible AI practices, and domain-specific AI knowledge. Organizations
    should conduct AI skills gap analyses, establish training programs that
    cover both technical AI capabilities and responsible AI practices, and
    ensure that personnel involved in AI governance understand the societal
    implications of AI systems. Competence should be verified through
    assessments, certifications, or demonstrated experience, and should be
    maintained through continuing education as AI technologies evolve.

references:
  - citation: "ISO/IEC 42001:2023, Sections 7.1, 7.2"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Provide self-service AI development environments that include
      pre-configured tools, libraries, and documentation. Implement
      guardrails in the platform that compensate for varying competence
      levels, such as default-safe configurations, automated bias
      checking, and template-based model development workflows.
      Maintain a knowledge base of approved AI patterns and anti-patterns
      accessible through the developer portal.
    tools:
      - backstage
      - kubeflow
      - jupyter-hub
      - mlflow
      - kubernetes

  devsecops:
    prose: >-
      Implement pipeline templates that encode best practices for AI
      development, reducing the competence burden on individual developers.
      Provide automated code review suggestions for AI-specific patterns.
      Require competence attestation as a pipeline gate for deploying AI
      systems above defined risk thresholds. Build training environments
      that allow developers to practice AI deployment workflows safely.
    tools:
      - gitlab-ci
      - semgrep
      - sonarqube
      - mlflow
      - jupyter-hub

  secops:
    prose: >-
      Monitor for indicators of insufficient AI competence, such as
      repeated deployment failures, security misconfigurations in AI
      infrastructure, or patterns of policy violations. Track training
      completion and competence certification status for AI personnel.
      Implement role-based access that restricts AI system modifications
      to personnel with verified competence levels.
    tools:
      - servicenow-grc
      - splunk
      - keycloak
      - grafana
      - jira

