id: sup-2
family: sup
title: "Awareness and communication for AI management"
class: ISO42001

statement:
  prose: >-
    Persons doing work under the organization's control shall be aware of the
    AI policy, their contribution to the effectiveness of the AI management
    system including the benefits of improved AI management performance, and
    the implications of not conforming with the AI management system
    requirements. The organization shall determine the need for internal and
    external communications relevant to the AI management system, including
    what to communicate, when to communicate, with whom to communicate, and
    how to communicate, including communication about AI system capabilities,
    limitations, and potential impacts.

guidance:
  prose: >-
    AI awareness programs should ensure that all relevant personnel understand
    the organization's AI policy, their role in responsible AI practices, and
    the potential consequences of AI system failures. Communication strategies
    should address both internal stakeholders, such as developers, operators,
    and business users, and external stakeholders, such as customers, regulators,
    and affected communities. Transparency in AI communication is essential and
    should cover what AI systems do, their limitations, and how decisions are
    made. Organizations should establish clear communication protocols for AI
    incidents and publish regular updates on AI governance activities.

references:
  - citation: "ISO/IEC 42001:2023, Sections 7.3, 7.4"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Embed AI awareness content into the developer portal, including the
      organization's AI policy, responsible AI guidelines, and mandatory
      training resources. Implement notification systems that alert
      developers when AI governance policies change. Create communication
      channels for AI-related discussions and incident reporting.
      Publish AI system documentation through the platform, including
      model cards and impact assessments, accessible to relevant
      stakeholders.
    tools:
      - backstage
      - confluence
      - slack-webhooks
      - grafana
      - git

  devsecops:
    prose: >-
      Integrate AI awareness checkpoints into the development workflow.
      Display relevant AI policy requirements and guidelines within the
      CI/CD pipeline interface. Require developers to acknowledge
      AI-specific policies before initiating AI model deployments.
      Generate automated notifications when AI model behavior changes
      significantly or when new AI governance requirements affect
      existing pipelines.
    tools:
      - gitlab-ci
      - gitlab-merge-requests
      - slack-webhooks
      - model-cards-toolkit
      - git

  secops:
    prose: >-
      Implement AI incident communication workflows that ensure timely
      notification to all relevant parties. Monitor for AI-related
      communications that may indicate governance gaps, such as user
      complaints about AI system behavior or media reports about AI
      failures. Maintain communication logs for regulatory reporting
      and provide stakeholders with periodic AI transparency reports.
    tools:
      - pagerduty
      - servicenow
      - splunk
      - jira
      - slack-webhooks

