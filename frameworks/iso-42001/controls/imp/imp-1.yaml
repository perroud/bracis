id: imp-1
family: imp
title: "Nonconformity and corrective action for AI systems"
class: ISO42001

statement:
  prose: >-
    When a nonconformity occurs, the organization shall react to the
    nonconformity and as applicable take action to control and correct it,
    and deal with the consequences. The organization shall evaluate the need
    for action to eliminate the cause(s) of the nonconformity in order that
    it does not recur or occur elsewhere, by reviewing and analyzing the
    nonconformity, determining the causes of the nonconformity, and
    determining if similar nonconformities exist or could potentially occur.
    The organization shall implement any action needed, review the
    effectiveness of any corrective action taken, and make changes to the
    AI management system if necessary. For AI systems, nonconformities may
    include model failures, bias incidents, safety violations, data quality
    issues, or governance process breakdowns.

guidance:
  prose: >-
    Nonconformity management for AI systems requires procedures that address
    the unique characteristics of AI failures. Unlike traditional software
    bugs, AI nonconformities may be probabilistic, context-dependent, and
    difficult to reproduce. The corrective action process should include
    immediate containment measures such as model rollback or traffic
    diversion, root cause analysis that examines data, model, and process
    factors, corrective actions that address systemic issues rather than
    symptoms, and effectiveness verification through enhanced monitoring.
    Organizations should maintain a nonconformity register that tracks AI
    incidents across systems to identify patterns and systemic issues.

references:
  - citation: "ISO/IEC 42001:2023, Section 10.1"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated rollback capabilities that can quickly revert
      AI systems to known-good states when nonconformities are detected.
      Build circuit breaker patterns into AI inference pipelines that
      automatically divert traffic when model behavior exceeds defined
      thresholds. Provide post-incident analysis tooling that enables
      root cause investigation across data pipelines, model training
      history, and deployment configurations. Maintain a nonconformity
      database linked to specific model versions and deployment contexts.
    tools:
      - argocd
      - kubernetes
      - istio
      - prometheus
      - grafana

  devsecops:
    prose: >-
      Integrate nonconformity management into the development workflow.
      Implement automated regression tests derived from past nonconformities
      to prevent recurrence. Create hotfix pipelines that enable rapid
      deployment of corrective model updates with appropriate validation.
      Require post-incident reviews for all significant AI nonconformities
      and track corrective actions as issues in the project management
      system. Update test suites and validation criteria based on
      lessons learned.
    tools:
      - gitlab-ci
      - gitlab-issues
      - mlflow
      - pytest
      - great-expectations

  secops:
    prose: >-
      Implement AI incident response procedures that cover detection,
      containment, investigation, remediation, and recovery. Monitor
      for nonconformity indicators including model performance anomalies,
      user complaints, and regulatory inquiries. Maintain incident
      timelines and evidence for regulatory reporting. Track corrective
      action implementation and verify effectiveness through post-remediation
      monitoring. Produce nonconformity trend reports for management review.
    tools:
      - pagerduty
      - servicenow
      - splunk
      - elastic-siem
      - jira

