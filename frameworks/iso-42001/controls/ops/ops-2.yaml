id: ops-2
family: ops
title: "AI risk assessment"
class: ISO42001

statement:
  prose: >-
    The organization shall perform AI risk assessments at planned intervals
    or when significant changes are proposed or occur, taking into account
    the criteria established in 6.1. The AI risk assessment shall identify
    risks associated with the development, deployment, and use of AI systems,
    including risks related to bias and discrimination, lack of transparency
    and explainability, safety and security, privacy, accountability gaps,
    environmental impact, and societal consequences. The organization shall
    retain documented information of the results of the AI risk assessments.

guidance:
  prose: >-
    AI risk assessment should be a systematic, repeatable process that
    evaluates risks across multiple dimensions: technical risks such as
    model failure and adversarial vulnerability; ethical risks such as
    bias and unfairness; legal and compliance risks such as regulatory
    non-compliance; operational risks such as model drift and data quality
    degradation; and societal risks such as job displacement and
    environmental impact. Risk assessments should be conducted before
    initial deployment, after significant model updates, when deployment
    context changes, and at regular intervals. The assessment methodology
    should be proportionate to the AI system's risk level and should
    involve multidisciplinary teams including technical, legal, and
    ethical experts.

references:
  - citation: "ISO/IEC 42001:2023, Section 8.2"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build AI risk assessment tooling into the platform. Provide automated
      risk scoring based on system attributes such as decision autonomy,
      data sensitivity, and affected population. Implement pre-deployment
      risk gates that require completed risk assessments before AI systems
      can be promoted to production. Create risk assessment templates and
      workflows in the developer portal. Store risk assessment results as
      versioned artifacts linked to specific model versions.
    tools:
      - backstage
      - mlflow
      - open-policy-agent
      - grafana
      - terraform

  devsecops:
    prose: >-
      Integrate automated risk assessment checks into CI/CD pipelines.
      Implement bias detection scanning during model training and
      validation phases. Test model robustness against adversarial
      inputs as part of the build process. Validate model explainability
      outputs and ensure they meet defined thresholds. Require risk
      assessment sign-off as a mandatory pipeline gate before deployment.
      Generate risk assessment reports as build artifacts.
    tools:
      - gitlab-ci
      - fairlearn
      - art-adversarial-robustness
      - shap
      - lime

  secops:
    prose: >-
      Monitor deployed AI systems for risk indicators including model
      drift, performance degradation, bias amplification, and anomalous
      behavior. Implement continuous risk scoring that updates in real time
      based on operational data. Alert when risk levels exceed defined
      thresholds or when new vulnerabilities are discovered that affect
      deployed AI systems. Maintain a risk register with historical
      assessment data for trend analysis.
    tools:
      - splunk
      - elastic-siem
      - prometheus
      - servicenow-grc
      - grafana

