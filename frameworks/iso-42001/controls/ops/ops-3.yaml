id: ops-3
family: ops
title: "AI impact assessment and system lifecycle management"
class: ISO42001

statement:
  prose: >-
    The organization shall conduct AI impact assessments to evaluate the
    potential effects of AI systems on individuals, groups, communities,
    and society. The impact assessment shall consider impacts on fundamental
    rights, safety, environmental sustainability, and societal well-being.
    The organization shall manage the AI system lifecycle, including
    requirements definition, design, data management, model building,
    verification and validation, deployment, operation, and retirement.
    The lifecycle management process shall ensure that AI systems remain
    fit for purpose throughout their operational life.

guidance:
  prose: >-
    AI impact assessments differ from risk assessments in that they focus
    on the effects of the AI system on external stakeholders and society
    rather than on organizational risks. Impact assessments should evaluate
    potential effects on human rights, non-discrimination, accessibility,
    environmental sustainability, and societal cohesion. They should
    consider both intended and unintended consequences, direct and indirect
    effects, and short-term and long-term impacts. The AI system lifecycle
    should be managed as a continuous process with defined quality gates
    between phases, clear roles for each phase, and documented criteria
    for system retirement.

references:
  - citation: "ISO/IEC 42001:2023, Sections 8.3, 8.4"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement AI lifecycle management as a platform capability with
      defined stages, quality gates, and automated transitions. Provide
      impact assessment templates and tooling integrated into the
      developer portal. Enforce lifecycle stage gates that require
      completed impact assessments before production deployment.
      Implement model retirement procedures including data cleanup,
      dependency notification, and archival of model artifacts and
      documentation for audit purposes.
    tools:
      - kubeflow
      - mlflow
      - backstage
      - argocd
      - terraform

  devsecops:
    prose: >-
      Enforce lifecycle management through pipeline stages that mirror
      the AI system lifecycle. Implement automated impact assessment
      tools that evaluate model outputs for bias, fairness, and
      accessibility. Require impact assessment review as a merge
      request approval criterion. Track model versions through the
      complete lifecycle from development through retirement. Implement
      automated model degradation detection that triggers revalidation
      workflows.
    tools:
      - gitlab-ci
      - fairlearn
      - mlflow
      - dvc
      - great-expectations

  secops:
    prose: >-
      Monitor AI systems throughout their lifecycle for impact-related
      indicators. Track model performance over time to detect drift and
      degradation that may increase negative impacts. Implement alerts
      for AI systems approaching end-of-life or operating beyond their
      validated parameters. Maintain lifecycle audit trails that document
      all stage transitions and their justifications. Monitor for impact
      events reported by stakeholders or detected through operational data.
    tools:
      - splunk
      - elastic-siem
      - prometheus
      - grafana
      - servicenow-grc

