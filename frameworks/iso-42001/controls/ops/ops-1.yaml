id: ops-1
family: ops
title: "Operational planning and control for AI systems"
class: ISO42001

statement:
  prose: >-
    The organization shall plan, implement, and control the processes needed to
    meet AI management system requirements and to implement the actions
    determined in 6.1 by establishing criteria for the processes, implementing
    control of the processes in accordance with the criteria, and keeping
    documented information to the extent necessary to have confidence that
    the processes have been carried out as planned. The organization shall
    control planned changes and review the consequences of unintended changes,
    taking action to mitigate any adverse effects as necessary. The
    organization shall ensure that outsourced AI processes are controlled.

guidance:
  prose: >-
    Operational planning for AI systems requires structured processes covering
    the complete AI lifecycle: data acquisition and preparation, model design
    and training, validation and testing, deployment, monitoring, and
    retirement. Each lifecycle phase should have defined inputs, outputs,
    controls, and acceptance criteria. Organizations should pay particular
    attention to the control of outsourced AI processes, including third-party
    model APIs, pre-trained foundation models, and AI-as-a-service providers,
    ensuring that these external dependencies meet the same governance
    standards as internally developed AI systems.

references:
  - citation: "ISO/IEC 42001:2023, Section 8.1"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement standardized AI lifecycle pipelines that enforce operational
      controls at each stage. Provide managed infrastructure for model
      training, validation, and serving that includes built-in governance
      controls. Enforce resource quotas, network policies, and access
      controls for AI workloads. Implement supply chain controls for
      third-party AI components, including model provenance verification
      and dependency scanning. Use infrastructure-as-code to ensure
      reproducible AI environments.
    tools:
      - kubeflow
      - mlflow
      - kubernetes
      - terraform
      - argocd

  devsecops:
    prose: >-
      Define CI/CD pipeline templates for AI system lifecycle management
      that enforce operational controls at each stage. Implement automated
      validation for data quality, model performance, and security before
      promotion. Scan AI dependencies for known vulnerabilities and license
      compliance. Enforce model versioning and artifact signing to maintain
      supply chain integrity. Implement feature flags for controlled
      rollout of AI system changes.
    tools:
      - gitlab-ci
      - mlflow
      - trivy
      - sigstore
      - dvc

  secops:
    prose: >-
      Monitor AI operational processes for deviations from planned
      procedures. Track AI model deployments and ensure each follows
      the defined lifecycle process. Alert on unauthorized AI model
      changes, unexpected data pipeline modifications, or uncontrolled
      access to AI inference endpoints. Monitor third-party AI service
      availability and compliance with agreed service levels.
    tools:
      - splunk
      - elastic-siem
      - prometheus
      - grafana
      - wazuh

