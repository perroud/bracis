id: pln-2
family: pln
title: "AI objectives and planning to achieve them"
class: ISO42001

statement:
  prose: >-
    The organization shall establish AI objectives at relevant functions,
    levels, and processes. The AI objectives shall be consistent with the
    AI policy, be measurable, take into account applicable requirements,
    be monitored, be communicated, and be updated as appropriate. The
    organization shall determine what will be done, what resources will be
    required, who will be responsible, when it will be completed, and how
    the results will be evaluated when planning how to achieve its AI
    objectives.

guidance:
  prose: >-
    AI objectives should be specific, measurable targets that translate
    the AI policy into actionable goals. Examples include achieving defined
    fairness metrics across protected attributes, maintaining model accuracy
    above specified thresholds, reducing time-to-detection for model drift,
    ensuring human review rates for high-stakes decisions, and completing
    AI impact assessments within defined timelines. Objectives should span
    technical performance, ethical compliance, stakeholder satisfaction,
    and operational efficiency. Each objective should have a designated
    owner, timeline, and success criteria.

references:
  - citation: "ISO/IEC 42001:2023, Section 6.2"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Define AI objectives as measurable platform metrics and implement
      automated tracking. Configure monitoring infrastructure to measure
      model performance, fairness indicators, and operational health against
      defined targets. Create platform-level SLOs (Service Level Objectives)
      for AI systems that align with organizational AI objectives. Use
      dashboards to provide real-time visibility into objective achievement
      across all AI systems.
    tools:
      - prometheus
      - grafana
      - backstage
      - mlflow
      - kubernetes

  devsecops:
    prose: >-
      Integrate AI objective validation into build pipelines. Implement
      automated tests that verify model outputs meet defined fairness
      and performance objectives before deployment. Track objective
      achievement metrics as pipeline metadata and enforce quality gates
      that prevent deployment of models failing to meet objectives.
      Generate objective compliance reports as CI/CD artifacts.
    tools:
      - gitlab-ci
      - fairlearn
      - mlflow
      - great-expectations
      - pytest

  secops:
    prose: >-
      Monitor AI objective achievement through continuous measurement and
      alerting. Implement detection rules that fire when AI systems deviate
      from their defined objectives, such as accuracy degradation, fairness
      metric violations, or availability targets being missed. Produce
      periodic AI objective status reports for management review and
      maintain historical trends for continual improvement analysis.
    tools:
      - splunk
      - grafana
      - servicenow-grc
      - prometheus
      - elastic-siem

