id: pln-3
family: pln
title: "Planning of changes to the AI management system"
class: ISO42001

statement:
  prose: >-
    When the organization determines the need for changes to the AI management
    system, the changes shall be carried out in a planned manner. The
    organization shall consider the purpose of the changes and their potential
    consequences, the integrity of the AI management system, the availability
    of resources, and the allocation or reallocation of responsibilities and
    authorities. Changes to AI systems, including model updates, data source
    modifications, and deployment configuration changes, shall be assessed
    for their impact on the AI management system.

guidance:
  prose: >-
    Change management for AI systems requires particular attention because
    changes to models, training data, or deployment configurations can have
    cascading and sometimes unpredictable effects. Organizations should
    establish AI-specific change categories that account for model retraining,
    dataset updates, hyperparameter tuning, inference pipeline modifications,
    and feature engineering changes. Each change category should have defined
    approval workflows, testing requirements, and rollback procedures. The
    change management process should also address emergency changes for AI
    systems exhibiting harmful behavior.

references:
  - citation: "ISO/IEC 42001:2023, Section 6.3"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement GitOps-based change management for all AI system
      configurations. Require all changes to AI infrastructure, model
      serving configurations, and data pipelines to flow through
      version-controlled repositories with mandatory review. Use canary
      deployments and blue-green strategies for AI model updates.
      Implement automated rollback capabilities that can revert to
      previous model versions when post-deployment metrics indicate
      degradation.
    tools:
      - argocd
      - fluxcd
      - terraform
      - kubernetes
      - backstage

  devsecops:
    prose: >-
      Enforce structured change management through CI/CD pipeline policies.
      Require change impact assessments for AI model modifications, including
      regression testing against baseline metrics, bias evaluation on updated
      models, and performance comparison with the current production version.
      Implement mandatory approval gates for changes classified as high-impact.
      Maintain comprehensive change logs that link code changes to their
      impact assessments and approval records.
    tools:
      - gitlab-ci
      - gitlab-merge-requests
      - mlflow
      - dvc
      - git

  secops:
    prose: >-
      Monitor all changes to AI systems and correlate them with subsequent
      system behavior changes. Implement change audit trails that capture
      who authorized each change, what was changed, and when. Alert on
      unauthorized changes to AI models, training data, or inference
      configurations. Conduct post-change reviews for significant AI
      system modifications and track change-related incidents.
    tools:
      - splunk
      - elastic-siem
      - servicenow
      - wazuh
      - grafana

