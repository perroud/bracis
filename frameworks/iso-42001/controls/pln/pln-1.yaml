id: pln-1
family: pln
title: "Actions to address risks and opportunities for AI systems"
class: ISO42001

statement:
  prose: >-
    When planning for the AI management system, the organization shall consider
    the issues referred to in 4.1 and the requirements referred to in 4.2, and
    determine the risks and opportunities that need to be addressed to give
    assurance that the AI management system can achieve its intended outcome(s),
    prevent or reduce undesired effects, and achieve continual improvement. The
    organization shall plan actions to address these risks and opportunities,
    integrate and implement the actions into its AI management system processes,
    and evaluate the effectiveness of these actions. The organization shall
    conduct AI-specific risk assessments that consider risks to individuals,
    groups, organizations, and society.

guidance:
  prose: >-
    AI risk assessment must go beyond traditional IT risk management to address
    risks unique to AI systems, including model bias and discrimination,
    opacity of decision-making, data poisoning, adversarial attacks, model
    drift, unintended consequences of autonomous decision-making, and
    societal-scale risks from AI deployment. The risk assessment should
    consider both the probability and severity of harm, including hard-to-quantify
    risks such as erosion of trust, normalization of surveillance, or
    concentration of power. Organizations should adopt a risk taxonomy
    specific to AI and maintain a risk register that is regularly updated
    as AI systems evolve.

references:
  - citation: "ISO/IEC 42001:2023, Section 6.1"
    url: "https://www.iso.org/standard/81230.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate AI risk assessment into the platform provisioning workflow.
      Require risk classification metadata before AI infrastructure can be
      allocated. Implement automated risk scoring based on system attributes
      such as data sensitivity, decision autonomy level, and affected
      population size. Enforce infrastructure constraints proportional to
      risk level, such as requiring isolated environments for high-risk AI
      systems and mandating enhanced monitoring for systems that make
      consequential decisions.
    tools:
      - open-policy-agent
      - backstage
      - terraform
      - kubernetes
      - grafana

  devsecops:
    prose: >-
      Embed AI risk assessment checkpoints into the CI/CD pipeline. Require
      risk assessment documentation as a mandatory artifact for model
      promotion. Implement automated checks for common AI risks, such as
      scanning training data for bias indicators, testing model robustness
      against adversarial inputs, and validating that model behavior stays
      within defined boundaries. Use feature flags to enable gradual
      rollouts that limit exposure when deploying new AI capabilities.
    tools:
      - gitlab-ci
      - fairlearn
      - art-adversarial-robustness
      - mlflow
      - checkov

  secops:
    prose: >-
      Maintain a real-time AI risk dashboard that tracks identified risks,
      their current status, and mitigation effectiveness. Monitor for
      emerging AI threats including adversarial attacks, data poisoning
      attempts, and model extraction attacks. Implement anomaly detection
      on AI system behavior to identify risk materialization early.
      Conduct periodic AI-specific threat modeling exercises and update
      the risk register accordingly.
    tools:
      - splunk
      - elastic-siem
      - servicenow-grc
      - prometheus
      - wazuh

