id: basel-or-framework
family: operational-risk
title: "Operational Risk Management Framework"
class: BCBS
baselines: [global]

statement:
  prose: >-
    Banks must develop, implement, and maintain a robust operational risk management (ORM)
    framework that identifies, assesses, monitors, controls, and mitigates operational risk
    across all material business activities, products, processes, systems, and third parties.
    The ORM framework must be approved by the board of directors and implemented by senior
    management. It must include: (1) a clearly articulated definition of operational risk and
    an operational risk appetite statement aligned with the overall risk appetite framework;
    (2) operational risk policies, procedures, and controls covering all material sources of
    operational risk; (3) an internal loss data collection process meeting the requirements
    for SMA ILD construction; (4) a Risk and Control Self-Assessment (RCSA) process for
    identifying and assessing inherent risks and the effectiveness of controls; (5) a Key
    Risk Indicator (KRI) programme for forward-looking monitoring of operational risk
    exposures; (6) a scenario analysis process for estimating potential operational loss
    events that have not yet occurred; and (7) governance structures including an
    independent Operational Risk function with three lines of defence (business line, ORM
    function, internal audit).

guidance:
  prose: >-
    The BCBS Sound Practices for the Management and Supervision of Operational Risk (2011,
    updated with SMA principles in 2021) provide the governance foundation for the ORM
    framework. Key principles are: (a) the board must approve and review the ORM framework
    at least annually and must be actively engaged in oversight of material operational risk
    events; (b) senior management must implement the board-approved framework, establish
    clear ownership of operational risk in business lines, and ensure adequate resources for
    the ORM function; (c) the ORM function must be independent from revenue-generating
    business lines and must have direct access to the board's risk committee; (d) internal
    audit must independently review both the ORM framework and the completeness and accuracy
    of the ILD and SMA capital calculation at least annually. Operational risk appetite must
    be measurable and tied to the KRI programme. Technology and cyber risks are increasingly
    the most material operational risks for banks and must be explicitly addressed in the
    ORM framework with alignment to the bank's IT risk and cyber risk management frameworks.

references:
  - citation: "BCBS, Principles for the Sound Management of Operational Risk, June 2011"
    url: "https://www.bis.org/publ/bcbs195.htm"
  - citation: "BCBS, Supervisory guidelines for the SMA, March 2021"
    url: "https://www.bis.org/bcbs/publ/d524.htm"
  - citation: "BCBS, Principles for Operational Resilience, March 2021"
    url: "https://www.bis.org/bcbs/publ/d516.htm"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build an integrated GRC (Governance, Risk, and Compliance) platform that serves as the
      system of record for the ORM framework. The platform must manage the full operational
      risk lifecycle: RCSA workflow (risk identification, control assessment, residual risk
      scoring, action tracking), KRI data collection and threshold monitoring, scenario
      analysis results, loss event capture and ILD population, and issue management. Integrate
      the GRC platform with IT service management (ITSM) so that IT incidents above a defined
      severity threshold automatically trigger operational loss investigation workflows.
      Publish ORM dashboard metrics — open high-severity risks, control failures, KRI
      breaches, near-miss events — to senior management and board risk committee on a monthly
      basis.
    tools:
      - servicenow
      - archer
      - jira
      - grafana
      - postgresql
      - terraform

  devsecops:
    prose: >-
      Treat ORM framework documentation, RCSA templates, KRI definitions, and scenario
      analysis methodologies as controlled documents stored in version-controlled repositories.
      Implement automated alerts in CI/CD pipelines when software deployments introduce changes
      to systems classified as critical under the RCSA (e.g., payments systems, core banking,
      FRTB calculation engine) — automatically trigger an operational risk notification to the
      ORM team. Build automated data quality checks on loss events entering the ILD from
      ITSM integrations, flagging events with insufficient categorisation or missing approval.
    tools:
      - gitlab-ci
      - jira
      - confluence
      - sonarqube
      - opa-conftest

  secops:
    prose: >-
      Align the ORM KRI programme with the security operations monitoring programme so that
      cyber KRIs (e.g., mean time to detect, unpatched critical vulnerabilities, phishing
      simulation failure rate) feed directly into the ORM risk dashboard. Implement automated
      escalation from SIEM alerts to operational risk event notifications when cyber events
      exceed defined materiality thresholds. Conduct annual tabletop exercises simulating
      material operational risk scenarios (ransomware attack on core banking, payment system
      outage, rogue trader) with cross-functional participation from ORM, IT Security,
      Treasury, and Compliance.
    tools:
      - splunk
      - pagerduty
      - sentinel
      - crowdstrike
      - servicenow

