implementation_guidance:
  platform_engineering:
    prose: >-
      Build an ICAAP data platform that aggregates Pillar 2 risk estimates from all risk
      quantification models — IRRBB, concentration risk, credit concentration (Herfindahl-
      Hirschman Index), pension risk, strategic risk — alongside Pillar 1 capital requirements.
      Implement a capital planning engine that projects capital ratios over a three-to-five
      year horizon under base and stress scenarios, integrating with the finance and treasury
      planning systems. Maintain a model inventory platform that tracks all Pillar 2 risk
      models, their documentation, validation status, and ongoing performance monitoring.
      Automate the generation of ICAAP template sections (risk taxonomy, capital adequacy
      assessment, stress test results) from the platform to reduce manual preparation burden.
    tools:
      - postgresql
      - apache-spark
      - dbt
      - grafana
      - confluence
      - terraform

  devsecops:
    prose: >-
      Treat ICAAP documentation and Pillar 2 capital models as controlled artefacts stored
      in version-controlled repositories with full history. Implement automated validation
      that checks ICAAP data inputs (risk estimates, stress test parameters, capital
      projections) for consistency with prior submissions and flags unexplained material
      movements before the ICAAP is finalised for board approval. Use CI/CD workflows to
      manage annual ICAAP update cycles, with issue tracking for each ICAAP section,
      approval gates at each review stage (risk function → CFO → CRO → board), and
      automated submission packaging for supervisor delivery.
    tools:
      - gitlab-ci
      - confluence
      - jira
      - pytest
      - sonarqube

  secops:
    prose: >-
      ICAAP documents contain commercially sensitive capital adequacy information and are
      subject to regulatory confidentiality obligations; apply document-level encryption and
      strict access controls. Restrict ICAAP document access to senior management, the board,
      the risk function, internal audit, and the supervisor. Maintain a document management
      system with version history, approval workflow, and distribution list tracking for all
      ICAAP and ILAAP submissions. Include ICAAP systems in the bank's data breach response
      plan given the supervisory sensitivity of the information.
    tools:
      - hashicorp-vault
      - sharepoint-dlm
      - cyberark
      - splunk

