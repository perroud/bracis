id: basel-gov-pillar2
family: governance
title: "ICAAP/ILAAP — Pillar 2 Supervisory Review Process"
class: BCBS
baselines: [global]

statement:
  prose: >-
    Banks must conduct an Internal Capital Adequacy Assessment Process (ICAAP) and, where
    applicable, an Internal Liquidity Adequacy Assessment Process (ILAAP) as the foundation
    of Pillar 2 of the Basel framework. The ICAAP must: (1) identify and measure all material
    risks faced by the bank, including those not fully captured or excluded from Pillar 1
    (e.g., interest rate risk in the banking book — IRRBB, concentration risk, pension risk,
    strategic risk, model risk, reputational risk); (2) assess the bank's capital adequacy
    relative to its risk profile, including under a range of stress scenarios; (3) demonstrate
    that the bank maintains adequate capital above its Pillar 1 minimum and any applicable
    buffers (capital conservation buffer, countercyclical buffer, systemic surcharges) at all
    times including under stress; and (4) be approved by the board and senior management and
    reviewed at least annually. Supervisors use the ICAAP as an input to the Supervisory
    Review and Evaluation Process (SREP), through which they may impose a Pillar 2 Requirement
    (P2R) or Pillar 2 Guidance (P2G) above the Pillar 1 minimum.

guidance:
  prose: >-
    ICAAP is one of the most important governance processes in a bank and is a primary tool
    by which the supervisor assesses whether the bank's capital management is adequate for
    its risk profile. A credible ICAAP requires: (a) senior management and board engagement —
    the ICAAP must not be a compliance exercise produced by the risk function in isolation;
    (b) comprehensive risk identification — all material risks must be catalogued and
    assessed, including emerging risks; (c) robust capital quantification methodology —
    Pillar 2 risks must be estimated using approaches that are proportionate to the bank's
    risk profile and methodologies must be reviewed annually; (d) forward-looking stress
    testing — the ICAAP must include multi-year projections of capital under base, adverse,
    and severe stress scenarios, with clear management actions identified for capital
    restoration; (e) integration with business planning — ICAAP projections must be
    consistent with the bank's strategic plan, IRRBB projections, and funding plan; and
    (f) linkage to risk appetite — ICAAP outcomes must be reflected in the risk appetite
    framework and cascade to business line limits. ILAAP mirrors the ICAAP for liquidity,
    demonstrating adequacy of liquidity buffers under stress.

references:
  - citation: "BCBS, Core principles for effective banking supervision, September 2012, Principle 16"
