implementation_guidance:
  platform_engineering:
    prose: >-
      Build a scenario management and stress testing platform that: (a) centralises all
      macroeconomic scenario definitions (GDP growth, unemployment, interest rates, credit
      spreads, property price indices, equity indices) across base, adverse, and severely
      adverse scenarios; (b) propagates scenario assumptions through satellite models
      (PD migration matrices, LGD projection models, market price shock models, liquidity
      outflow models) to generate stressed P&L and capital projections; (c) aggregates
      stress test results from all risk types and business lines into a consolidated capital
      impact report; and (d) supports management action modelling — simulating the capital
      impact of proposed management actions (dividend suspension, asset disposals, capital
      issuance) in the stress scenario. Integrate with the ICAAP platform to embed stress
      test results directly into capital adequacy assessments.
    tools:
      - apache-spark
      - dbt
      - postgresql
      - grafana
      - apache-airflow
      - terraform

  devsecops:
    prose: >-
      Maintain all stress test models (PD migration, LGD, market shocks, funding cost),
      scenario parameters, and results processing code in version-controlled repositories.
      Implement automated regression tests that run each model against a reference historical
      period and validate that outputs are within expected ranges. Build a CI/CD pipeline
      for model updates that includes independent validation testing before production
      deployment. Automate the extraction of stress test results into ICAAP report templates
      and supervisory submission formats (ECB stress test templates, DFAST XML schemas).
    tools:
      - gitlab-ci
      - mlflow
      - dvc
      - pytest
      - sonarqube
      - cyclonedx

  secops:
    prose: >-
      Stress test scenarios and results are highly sensitive pre-publication information;
      if leaked, they could trigger adverse market reactions. Apply document classification
      (Strictly Confidential) to all stress test scenario workbooks and results packages,
      restrict access to the stress testing team, CRO office, and senior management, and
      audit all access. Implement DLP controls to prevent stress test data from being
      transferred outside approved channels. After supervisory publication of stress test
      results, archive all supporting documentation — model inputs, scenario specifications,
      results — in a tamper-evident archive for at least 10 years.
    tools:
      - sharepoint-dlm
      - cyberark
      - splunk
      - hashicorp-vault
      - microsoft-purview

