id: basel-gov-stress
family: governance
title: "Stress Testing Framework"
class: BCBS
baselines: [global]

statement:
  prose: >-
    Banks must maintain a comprehensive, forward-looking stress testing programme as a key
    risk management and capital planning tool. Stress testing must be used to complement
    risk-based capital models and to inform the board and senior management about the
    potential impact of adverse economic and financial conditions on the bank's capital
    adequacy, liquidity, profitability, and business model viability. Stress tests must
    cover all material risk types, including credit risk, market risk, liquidity risk,
    operational risk, interest rate risk in the banking book (IRRBB), and concentration
    risk. The programme must include: (1) sensitivity analysis — testing the impact of a
    change in a single risk factor; (2) scenario analysis — testing the impact of multiple
    risk factor changes simultaneously under coherent macroeconomic scenarios (baseline,
    adverse, severely adverse); and (3) reverse stress testing — identifying the scenarios
    under which the bank would fail to meet its minimum capital or liquidity requirements.
    Stress test results must be reviewed by the board, integrated into the ICAAP and capital
    planning process, and used to calibrate the bank's risk appetite limits and contingency
    plans. Banks subject to supervisory stress tests (e.g., ECB SREP stress tests, Fed
    DFAST/CCAR, Bank of England ACS) must also comply with the applicable supervisory
    frameworks and methodologies.

guidance:
  prose: >-
    Stress testing has become one of the most important post-crisis supervisory tools.
    Well-designed scenarios should be severe but plausible — the 2008-2009 global financial
    crisis and the 2020 COVID-19 shock are now de facto benchmarks. Scenarios should be
    updated at least annually to reflect current macroeconomic risks, structural changes in
    the bank's portfolio, and emerging risks such as climate transition risk and cyber risk.
    Banks must ensure that stress test scenarios capture non-linear effects (e.g., credit
    risk migration, collateral value deterioration, liquidity-solvency spirals) and that
    model outputs are subject to expert judgment overlays where models are known to have
    limitations. Reverse stress tests are particularly valuable for identifying business
    model vulnerabilities: the question is not "what is our loss in a severe scenario?" but
    rather "what scenario would cause us to fail, and how plausible is it?" Stress test
    results should drive active management responses: capital contingency plans, dividend
    restrictions, balance sheet de-risking, or business model adjustments.

references:
  - citation: "BCBS, Principles for sound stress testing practices and supervision, May 2009"
    url: "https://www.bis.org/publ/bcbs155.htm"
