related_frameworks:
  - framework_id: dora
    relationship: complements
    notes: "DORA's ICT risk management requirements complement Basel III operational risk and technology risk pillars for EU financial entities."
  - framework_id: sox
    relationship: complements
    notes: "SOX financial reporting and internal controls requirements intersect with Basel III Pillar 3 disclosure and governance requirements."
  - framework_id: cobit-2019
    relationship: supports
    notes: "COBIT 2019 governance and management objectives provide the IT governance model that operationalises Basel III's Pillar 2 (ICAAP) expectations for technology risk."
  - framework_id: iso-22301
    relationship: supports
    notes: >-
      ISO 22301 business continuity management underpins Basel III operational risk
      requirements, specifically for ensuring critical banking functions can be recovered
      within supervisory tolerances.
  - framework_id: nist-800-53-rev5
    relationship: mapped
    notes: >-
      NIST 800-53 Rev 5 security and privacy controls map to Basel III operational risk,
      technology risk, and Pillar 2 requirements for US banking institutions subject to
      both OCC/Fed prudential standards and NIST guidance.

