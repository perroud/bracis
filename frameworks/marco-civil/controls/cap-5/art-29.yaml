id: art-29
family: cap-5
title: "Atribuições do Comitê Gestor da Internet no Brasil (CGI.br)"
class: marco-civil
statement:
  prose: |
    Art. 29. O usuário terá a opção de livre escolha na utilização de programa de
    computador em seu terminal para exercício do controle parental de conteúdo
    entendido por ele como impróprio a seus filhos menores, desde que respeitados
    os princípios desta Lei e da Lei nº 8.069, de 13 de julho de 1990 - Estatuto
    da Criança e do Adolescente.

    Parágrafo único. Cabe ao poder público, em conjunto com os provedores de conexão
    e de aplicações de internet e a sociedade civil, promover a educação e fornecer
    informações sobre o uso dos programas de computador previstos no caput, bem como
    para a definição de boas práticas para a inclusão digital de crianças e
    adolescentes.
guidance:
  prose: |
    O art. 29 trata do controle parental e proteção de crianças e adolescentes
    na internet. Estabelece dois pilares:

    **Caput — Controle parental voluntário:**
    O exercício do controle parental é prerrogativa dos pais/responsáveis, não
    do Estado ou dos provedores. O usuário escolhe livremente quais ferramentas
    usar. Limites:
    - Deve respeitar os princípios do Marco Civil (especialmente liberdade de
      expressão e privacidade).
    - Deve respeitar o ECA (Lei 8.069/1990).

    **Parágrafo único — Responsabilidade compartilhada:**
    A educação e informação sobre controle parental é responsabilidade conjunta de:
    - Poder público
    - Provedores de conexão
    - Provedores de aplicação
    - Sociedade civil

    **Relação com ECA:**
    O ECA (art. 71 e seguintes) garante proteção especial a crianças e adolescentes.
    O Marco Civil estende essa proteção ao ambiente digital, mas sem impor censura
    prévia ou filtragem obrigatória.

    **Implicação prática:**
    Provedores devem oferecer informações e ferramentas de controle parental, mas
    NÃO podem implementar filtragem obrigatória de conteúdo. A decisão é sempre
    do responsável legal.
implementation_guidance:
  platform_engineering:
    prose: |
      **Ferramentas de controle parental:**
      1. Funcionalidade de perfil familiar com controles parentais opcionais.
      2. Filtros de conteúdo configuráveis pelo responsável (não ativados
         por padrão).
      3. Restrições de horário e tempo de uso configuráveis.
      4. Painel de atividades para monitoramento pelos responsáveis.

      **Proteção de menores:**
      5. Verificação de idade (age gate) para conteúdo impróprio.
      6. Configurações de privacidade reforçadas para contas de menores.
      7. Restrição de coleta de dados de menores (conformidade com LGPD
         art. 14 — tratamento de dados de crianças e adolescentes).

      **Educação e informação (parágrafo único):**
      8. Guia de segurança para pais acessível na plataforma.
      9. Central de ajuda com instruções de configuração de controle parental.
      10. Material educativo sobre riscos digitais para crianças.
    tools:
      - parental-controls
      - age-verification
      - privacy-controls
      - content-classification
      - help-center
  devsecops:
    prose: |
      **Testes de controle parental:**
      1. Testes de que filtros de conteúdo funcionam corretamente quando ativados.
      2. Testes de que filtros NÃO estão ativos por padrão.
      3. Validação de que controles são configuráveis apenas pelo responsável.
      4. Testes de privacidade reforçada para contas de menores.

      **Conformidade com ECA e LGPD:**
      5. Verificação de que dados de menores recebem proteção especial.
      6. Testes de fluxo de consentimento parental.
    tools:
      - parental-control-tests
      - privacy-validator
      - consent-flow-tests
      - age-verification-tests
  secops:
    prose: |
      **Monitoramento de proteção de menores:**
      1. Alertas para tentativas de contorno de controle parental.
      2. Monitoramento de denúncias relacionadas a conteúdo impróprio
         para menores.
      3. Métricas de adoção de ferramentas de controle parental.

      **Resposta a incidentes envolvendo menores:**
      4. Processo prioritário para denúncias envolvendo crianças e adolescentes.
      5. Canal de denúncia integrado com SaferNet e Disque 100.
      6. Preservação de evidências para autoridades competentes.
    tools:
      - content-moderation
      - abuse-reporting
      - safernet-integration
      - evidence-preservation
