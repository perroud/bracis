id: art-30
family: cap-5
title: "Defesa dos Interesses e Direitos no Âmbito das Relações de Consumo na Internet"
class: marco-civil
statement:
  prose: |
    Art. 30. A defesa dos interesses e dos direitos estabelecidos nesta Lei poderá
    ser exercida em juízo, individual ou coletivamente, na forma da lei, observado o
    disposto nos art. 81 e seguintes da Lei nº 8.078, de 11 de setembro de 1990
    (Código de Defesa do Consumidor).
guidance:
  prose: |
    O art. 30 estabelece a via processual para defesa dos direitos previstos no
    Marco Civil, integrando-o ao sistema de defesa do consumidor.

    **Legitimidade para ação:**
    - Individual: qualquer usuário pode ingressar em juízo para defender seus
      direitos previstos no Marco Civil.
    - Coletiva: ações coletivas nos termos do CDC (art. 81 e seguintes),
      incluindo ações de entidades de defesa do consumidor, Ministério Público
      e associações.

    **Referência ao CDC:**
    Os direitos do Marco Civil (especialmente art. 7º) são tratados como direitos
    do consumidor quando a relação envolver relação de consumo. Aplicam-se:
    - Direitos difusos (art. 81, I, CDC)
    - Direitos coletivos (art. 81, II, CDC)
    - Direitos individuais homogêneos (art. 81, III, CDC)

    **Implicação prática:**
    Provedores de conexão e aplicação devem considerar que violações ao Marco
    Civil podem gerar:
    - Ações individuais de usuários.
    - Ações coletivas de entidades de defesa do consumidor.
    - Ações civis públicas do Ministério Público.
    - Inquéritos administrativos do PROCON e SENACON.

    **Inversão do ônus da prova:**
    Por força do CDC (art. 6º, VIII), o ônus da prova pode ser invertido em
    favor do consumidor, inclusive em questões técnicas relacionadas à internet.
implementation_guidance:
  platform_engineering:
    prose: |
      **Canais de defesa do consumidor:**
      1. Canal de atendimento ao consumidor integrado à plataforma
         (chat, e-mail, telefone).
      2. Sistema de reclamações com protocolo e rastreamento.
      3. Integração com plataformas oficiais (consumidor.gov.br,
         Reclame Aqui).
      4. Portal de transparência com informações sobre direitos do
         usuário conforme Marco Civil art. 7º.

      **Preservação de evidências:**
      5. Logs imutáveis para responder a ações judiciais.
      6. Sistema de backup de dados do usuário para garantir
         direito de acesso e portabilidade.
      7. Mecanismo de preservação de registros além do prazo legal
         quando houver litígio em curso.

      **Conformidade preventiva:**
      8. Termos de uso claros e em conformidade com CDC e Marco Civil.
      9. Política de privacidade acessível e compreensível.
    tools:
      - customer-service-platform
      - complaint-management
      - immutable-logging
      - legal-hold
      - terms-management
  devsecops:
    prose: |
      **Conformidade com CDC:**
      1. Revisão automatizada de termos de uso contra checklist
         de conformidade CDC + Marco Civil.
      2. Testes de que canais de reclamação estão funcionais.
      3. Validação de que logs são preservados em formato admissível
         como evidência judicial.

      **Rastreabilidade:**
      4. Auditoria de completude de logs para resposta a processos.
      5. Verificação de integridade de registros (hash, timestamp).
    tools:
      - compliance-checker
      - log-integrity-validator
      - evidence-preservation-tests
      - terms-reviewer
  secops:
    prose: |
      **Gestão de demandas judiciais:**
      1. Processo documentado para resposta a ações judiciais
         individuais e coletivas.
      2. Fluxo de atendimento a notificações de PROCON e SENACON.
      3. Preservação legal (legal hold) ativada automaticamente
         quando notificado de litígio.

      **Métricas de conformidade:**
      4. Taxa de resolução de reclamações.
      5. Tempo médio de resposta a demandas de consumidores.
      6. Número de ações judiciais por tipo de violação.
    tools:
      - legal-case-management
      - procon-integration
      - legal-hold-automation
      - compliance-metrics
