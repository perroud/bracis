id: art-32
family: cap-5
title: "Vigência da Lei e Prazo de Vacatio Legis"
class: marco-civil
statement:
  prose: |
    Art. 32. Esta Lei entra em vigor após decorridos 60 (sessenta) dias de sua
    publicação oficial.
guidance:
  prose: |
    O art. 32 define a vacatio legis do Marco Civil da Internet.

    **Cronologia:**
    - Publicação: 24 de abril de 2014 (Lei nº 12.965/2014).
    - Vacatio legis: 60 dias.
    - Entrada em vigor: 23 de junho de 2014.

    **Implicação prática:**
    O Marco Civil está em vigor desde 23 de junho de 2014. Todas as suas
    disposições são plenamente aplicáveis. Organizações que operam na internet
    no Brasil devem estar em conformidade desde essa data.

    **Regulamentação:**
    O Marco Civil foi regulamentado pelo Decreto nº 8.771, de 11 de maio de 2016,
    que detalha:
    - Hipóteses de discriminação de tráfego (art. 9º).
    - Requisitos de segurança para guarda de registros (art. 13 e 15).
    - Procedimentos de fiscalização.
    - Parâmetros de transparência.

    **Marcos temporais relevantes:**
    - 23/06/2014: Entrada em vigor do Marco Civil.
    - 11/05/2016: Publicação do Decreto 8.771 (regulamentação).
    - 18/09/2020: Entrada em vigor da LGPD (complementar ao Marco Civil).
    - 01/08/2021: Sanções da LGPD passam a ser aplicáveis.
implementation_guidance:
  platform_engineering:
    prose: |
      **Conformidade temporal:**
      1. Verificar que todos os sistemas e processos estão em conformidade
         com o Marco Civil desde 23/06/2014.
      2. Verificar conformidade adicional com Decreto 8.771/2016 desde 11/05/2016.
      3. Manter rastreabilidade de quando controles de conformidade foram
         implementados.

      **Gestão de conformidade:**
      4. Inventário de requisitos do Marco Civil aplicáveis à organização.
      5. Mapeamento de controles implementados contra cada artigo relevante.
      6. Dashboard de conformidade com status por artigo/requisito.

      **Atualização contínua:**
      7. Monitoramento de alterações legislativas que impactem o Marco Civil.
      8. Processo de atualização de controles quando nova regulamentação
         for publicada.
    tools:
      - compliance-management
      - regulatory-tracking
      - control-mapping
      - compliance-dashboard
  devsecops:
    prose: |
      **Verificação de conformidade:**
      1. Checklist automatizado de conformidade Marco Civil no pipeline.
      2. Verificação de que todos os artigos aplicáveis têm controles
         correspondentes implementados.
      3. Testes de regressão para garantir que atualizações não quebrem
         conformidade existente.

      **Documentação:**
      4. Changelog de conformidade (quando cada controle foi implementado).
      5. Evidências de conformidade geradas automaticamente.
    tools:
      - compliance-pipeline
      - regression-tests
      - evidence-generator
      - changelog-automation
  secops:
    prose: |
      **Monitoramento de conformidade:**
      1. Auditoria periódica de conformidade com todos os artigos do
         Marco Civil aplicáveis.
      2. Relatório de gaps de conformidade.
      3. Monitoramento de novas regulamentações e decisões judiciais
         que afetem a interpretação do Marco Civil.

      **Gestão de riscos legais:**
      4. Avaliação de risco de não conformidade por artigo.
      5. Plano de remediação priorizado para gaps identificados.
      6. Acompanhamento de jurisprudência relevante.
    tools:
      - compliance-audit
      - gap-analysis
      - regulatory-monitoring
      - risk-assessment
