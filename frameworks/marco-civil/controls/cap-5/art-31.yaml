id: art-31
family: cap-5
title: "Cooperação entre Poder Judiciário e Provedores para Combate a Ilícitos"
class: marco-civil
statement:
  prose: |
    Art. 31. Até a entrada em vigor da lei específica prevista no § 2º do art. 19,
    a responsabilidade do provedor de aplicações de internet por danos decorrentes
    de conteúdo gerado por terceiros, quando se tratar de infração a direitos de
    autor ou a direitos conexos, continuará a ser disciplinada pela legislação
    autoral vigente aplicável na data da entrada em vigor desta Lei.
guidance:
  prose: |
    O art. 31 trata da responsabilidade por violação de direitos autorais na
    internet, estabelecendo um regime transitório.

    **Regime transitório:**
    O art. 19 do Marco Civil estabelece que provedores de aplicação só são
    responsáveis por conteúdo de terceiros após ordem judicial específica.
    Contudo, o art. 19, §2º prevê que lei específica regulará a responsabilidade
    em matéria de direitos autorais.

    **Enquanto a lei específica não é editada:**
    A responsabilidade por violação de direitos autorais continua regida pela
    legislação autoral vigente, especialmente:
    - Lei 9.610/1998 (Lei de Direitos Autorais)
    - Lei 9.609/1998 (Lei de Software)

    **Implicação prática:**
    Para direitos autorais, o regime de responsabilidade pode ser diferente
    (e potencialmente mais rígido) do que o regime geral do art. 19. Provedores
    devem estar preparados para:
    - Notificações extrajudiciais de titulares de direitos autorais (notice and
      takedown pode ser exigido pela legislação autoral).
    - Obrigações de remoção sem necessidade de ordem judicial para violações
      claras de direitos autorais.

    **Atenção:** O regime do art. 31 é transitório. Quando/se a lei específica
    do art. 19, §2º for editada, substituirá este dispositivo.
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de gestão de direitos autorais:**
      1. Canal específico para recebimento de notificações de violação
         de direitos autorais (DMCA-like, adaptado à legislação brasileira).
      2. Workflow de análise e resposta a notificações de copyright.
      3. Sistema de contra-notificação para o autor do conteúdo contestar
         a reclamação.
      4. Mecanismo de remoção ou bloqueio de conteúdo infringente.

      **Identificação de conteúdo protegido:**
      5. Content ID ou fingerprinting para identificação automatizada
         de conteúdo protegido por direitos autorais (quando aplicável).
      6. Watermarking digital para rastreamento de conteúdo.

      **Registro e evidência:**
      7. Log completo de notificações recebidas, ações tomadas e prazos.
      8. Preservação de conteúdo removido para fins de evidência.
    tools:
      - copyright-management-system
      - content-fingerprinting
      - takedown-workflow
      - evidence-preservation
  devsecops:
    prose: |
      **Testes de conformidade:**
      1. Teste de que o canal de notificação de copyright está acessível
         e funcional.
      2. Teste de workflow de remoção dentro dos prazos legais.
      3. Teste de contra-notificação e restauração de conteúdo.
      4. Validação de que logs de copyright são completos e íntegros.

      **Automação:**
      5. Testes de sistemas de identificação automatizada de conteúdo
         (se implementados).
    tools:
      - copyright-workflow-tests
      - notification-tests
      - content-id-validation
      - log-completeness-audit
  secops:
    prose: |
      **Gestão operacional de copyright:**
      1. SLA de resposta a notificações de violação de direitos autorais.
      2. Métricas de tempo de remoção de conteúdo infringente.
      3. Relatório periódico de notificações recebidas e ações tomadas.

      **Cooperação com titulares de direitos:**
      4. Programa de parceria com entidades de gestão coletiva de direitos
         autorais (ECAD, ABDA, APDIF).
      5. Participação em programas voluntários de proteção de copyright.

      **Monitoramento:**
      6. Detecção proativa de conteúdo infringente em escala (quando aplicável).
    tools:
      - copyright-dashboard
      - sla-tracking
      - content-monitoring
      - rights-holder-portal
