id: art-24
family: cap-4
title: "Diretrizes para Atuacao do Poder Publico na Internet"
class: marco-civil
statement:
  prose: |
    Art. 24. Constituem diretrizes para a atuação da União, dos Estados, do
    Distrito Federal e dos Municípios no desenvolvimento da internet no Brasil:

    I - estabelecimento de mecanismos de governança multiparticipativa,
    transparente, colaborativa e democrática, com a participação do governo,
    do setor empresarial, da sociedade civil e da comunidade acadêmica;

    II - promoção da racionalização da gestão, expansão e uso da internet, com
    participação do Comitê Gestor da Internet no Brasil;

    III - promoção da racionalização e da interoperabilidade tecnológica dos
    serviços de governo eletrônico, entre os diferentes Poderes e âmbitos da
    Federação, para permitir o intercâmbio de informações e a celeridade de
    procedimentos;

    IV - promoção da interoperabilidade entre sistemas e terminais diversos,
    inclusive entre os diferentes âmbitos federativos e diversos setores da
    sociedade;

    V - adoção preferencial de tecnologias, padrões e formatos abertos e livres;

    VI - publicidade e disseminação de dados e informações públicos, de forma
    aberta e estruturada;

    VII - otimização da infraestrutura das redes e estímulo a implantação de
    centros de armazenamento, gerenciamento e disseminação de dados no País,
    promovendo a qualidade técnica, a inovação e a difusão das aplicações de
    internet, sem prejuízo a abertura, a neutralidade e a natureza participativa;

    VIII - desenvolvimento de ações e programas de capacitação para uso da internet;

    IX - promoção da cultura e da cidadania; e

    X - prestação de serviços públicos de atendimento ao cidadão de forma integrada,
    eficiente, simplificada e por múltiplos canais de acesso, inclusive remotos.
guidance:
  prose: |
    Diretrizes para governo digital e governanca da internet. Impacto direto
    em projetos de Platform Engineering para o setor publico:
    - Preferencia por tecnologias abertas (open source)
    - Interoperabilidade obrigatoria entre sistemas governamentais
    - Dados abertos e estruturados (open data)
    - Governanca multiparticipativa
implementation_guidance:
  platform_engineering:
    prose: |
      1. Adocao de tecnologias open source como padrao (inciso V).
      2. APIs abertas e documentadas para interoperabilidade (incisos III e IV).
      3. Portal de dados abertos com formatos estruturados (inciso VI).
      4. Infraestrutura de nuvem com preferencia por data centers no Brasil (inciso VII).
    tools:
      - open-source-stack
      - api-gateway
      - open-data-portal
      - brazilian-cloud-regions
  devsecops:
    prose: |
      1. Pipelines usando ferramentas open source.
      2. Padroes abertos para formatos de dados (JSON, XML, CSV).
      3. Testes de interoperabilidade entre sistemas.
    tools:
      - open-source-ci
      - interoperability-tests
      - open-standards
  secops:
    prose: |
      1. Monitoramento de conformidade com diretrizes de governo digital.
      2. Auditoria de uso de tecnologias abertas vs proprietarias.
    tools:
      - compliance-monitoring
      - technology-audit
