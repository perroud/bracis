id: art-25
family: cap-4
title: "Aplicações de Internet de Entes do Poder Público"
class: marco-civil
statement:
  prose: |
    Art. 25. As aplicações de internet de entes do poder público devem buscar:

    I - compatibilidade dos serviços de governo eletrônico com diversos terminais,
    sistemas operacionais e aplicativos para seu acesso;

    II - acessibilidade a todos os interessados, independentemente de suas capacidades
    físico-motoras, perceptivas, sensoriais, intelectuais e mentais, respeitados os
    art. 58 e 59 da Lei nº 10.098, de 19 de dezembro de 2000;

    III - compatibilidade tanto com a leitura humana quanto com o tratamento
    automatizado das informações;

    IV - facilidade de uso dos serviços de governo eletrônico; e

    V - fortalecimento da participação social nas políticas públicas.
guidance:
  prose: |
    O art. 25 estabelece requisitos específicos para aplicações de internet do
    poder público (governo federal, estadual, municipal e distrital).

    **Inciso I — Compatibilidade multiplataforma:**
    Serviços de governo eletrônico devem funcionar em qualquer dispositivo,
    sistema operacional ou navegador. Veda o lock-in tecnológico.

    **Inciso II — Acessibilidade:**
    Obrigação legal de acessibilidade digital. Referência expressa à
    Lei 10.098/2000 (Lei de Acessibilidade). Na prática, exige conformidade
    com WCAG 2.1 nível AA no mínimo. O e-MAG (Modelo de Acessibilidade em
    Governo Eletrônico) detalha os requisitos para o governo brasileiro.

    **Inciso III — Leitura humana e tratamento automatizado:**
    Dados devem ser publicados em formatos que permitam tanto a leitura
    por pessoas quanto o processamento por máquinas. Conecta-se com a
    política de dados abertos (Lei 12.527/2011, art. 8º, §3º).

    **Inciso IV — Facilidade de uso (usabilidade):**
    Serviços devem ser intuitivos e fáceis de usar. Princípio de design
    centrado no cidadão.

    **Inciso V — Participação social:**
    Plataformas de governo devem fomentar a participação popular
    (consultas públicas, ouvidorias, canais de sugestão).
implementation_guidance:
  platform_engineering:
    prose: |
      **Compatibilidade (inciso I):**
      1. Design responsivo com Progressive Web App (PWA).
      2. Testes em múltiplos navegadores (Chrome, Firefox, Safari, Edge).
      3. Suporte a dispositivos móveis e de baixo custo.
      4. Evitar dependência de plugins proprietários (Flash, ActiveX, Silverlight).

      **Acessibilidade (inciso II):**
      5. Conformidade com e-MAG 3.1 e WCAG 2.1 AA.
      6. Teclado como método de navegação primário.
      7. Compatibilidade com leitores de tela (NVDA, JAWS, VoiceOver).
      8. Contraste adequado, fontes redimensionáveis, textos alternativos.

      **Leitura humana e automatizada (inciso III):**
      9. APIs RESTful com JSON para consumo automatizado.
      10. Portal de dados abertos em CSV, JSON e XML.
      11. Metadados estruturados (schema.org, DCAT).

      **Usabilidade (inciso IV):**
      12. Design System gov.br como base visual.
      13. Fluxos simplificados com mínimo de etapas.
      14. Linguagem simples e direta.

      **Participação social (inciso V):**
      15. Módulo de consultas públicas integrado.
      16. Ouvidoria digital com protocolo de acompanhamento.
      17. Canal de sugestões com feedback ao cidadão.
    tools:
      - pwa-framework
      - accessibility-toolkit
      - open-data-portal
      - design-system
      - participation-platform
  devsecops:
    prose: |
      **Acessibilidade no pipeline:**
      1. axe-core e pa11y integrados ao CI/CD.
      2. Lighthouse accessibility score mínimo de 90.
      3. Testes de navegação por teclado automatizados.
      4. Validação de conformidade e-MAG em cada deploy.

      **Compatibilidade:**
      5. Testes cross-browser automatizados (Playwright, Cypress).
      6. Testes em múltiplas resoluções e dispositivos.
      7. Performance budget para conexões lentas.

      **Dados abertos:**
      8. Validação de schemas de dados publicados.
      9. Testes de integridade de APIs públicas.
    tools:
      - axe-core
      - pa11y
      - lighthouse
      - playwright
      - schema-validator
  secops:
    prose: |
      **Monitoramento de acessibilidade:**
      1. Auditoria periódica de acessibilidade (manual + automatizada).
      2. Relatório de conformidade e-MAG trimestral.
      3. Monitoramento de uptime de serviços de governo eletrônico.

      **Monitoramento de participação:**
      4. Métricas de engajamento em consultas públicas.
      5. Tempo de resposta de ouvidoria.
      6. Taxa de resolução de demandas cidadãs.
    tools:
      - accessibility-monitoring
      - uptime-monitoring
      - engagement-analytics
      - ombudsman-dashboard
