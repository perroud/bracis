id: art-26
family: cap-4
title: "Dever Constitucional de Educação e Capacitação para Uso da Internet"
class: marco-civil
statement:
  prose: |
    Art. 26. O cumprimento do dever constitucional do Estado na prestação da educação,
    em todos os níveis de ensino, inclui a capacitação, integrada a outras práticas
    educacionais, para o uso seguro, consciente e responsável da internet como
    ferramenta para o exercício da cidadania, a promoção da cultura e o
    desenvolvimento tecnológico.
guidance:
  prose: |
    O art. 26 estabelece que a educação para uso da internet é parte do dever
    constitucional de educação (CF/88, art. 205). Não é uma obrigação nova, mas
    uma extensão do dever educacional já existente.

    **Elementos da capacitação:**
    1. Uso seguro: proteção contra ameaças digitais (phishing, malware, engenharia
       social, exposição de dados pessoais).
    2. Uso consciente: compreensão dos direitos e deveres na internet, pensamento
       crítico sobre informação online.
    3. Uso responsável: respeito a direitos de terceiros, consequências legais de
       ações online.

    **Integração educacional:**
    A capacitação deve ser integrada a outras práticas educacionais — não é uma
    disciplina isolada, mas um componente transversal da educação.

    **Finalidades:**
    - Exercício da cidadania digital.
    - Promoção da cultura.
    - Desenvolvimento tecnológico.

    **Implicação para organizações:**
    Empresas que operam plataformas acessadas por menores ou que oferecem serviços
    educacionais devem contribuir com a capacitação para uso seguro da internet.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataformas educacionais:**
      1. Módulos de educação digital integrados à plataforma (segurança,
         privacidade, cidadania digital).
      2. Conteúdo de conscientização sobre segurança acessível na interface.
      3. Tutoriais interativos sobre configurações de privacidade.

      **Segurança por design para usuários:**
      4. Indicadores visuais de segurança (HTTPS, conexão segura).
      5. Alertas educativos sobre riscos (links suspeitos, compartilhamento
         de dados pessoais).
      6. Configurações de privacidade com explicações em linguagem simples.

      **Acessibilidade educacional:**
      7. Conteúdo educativo em formatos acessíveis (texto, áudio, vídeo com
         legendas, LIBRAS).
      8. Suporte a diferentes níveis de letramento digital.
    tools:
      - lms-platform
      - security-awareness-module
      - accessibility-toolkit
      - content-management
  devsecops:
    prose: |
      **Conteúdo educativo:**
      1. Revisão de conteúdo de segurança a cada atualização de plataforma.
      2. Testes de usabilidade de materiais educativos.
      3. Validação de acessibilidade de conteúdo educacional.

      **Segurança da plataforma educacional:**
      4. Proteção reforçada para plataformas com público menor de idade.
      5. Testes de segurança específicos para ambientes educacionais.
    tools:
      - content-review-pipeline
      - accessibility-scanner
      - security-testing
  secops:
    prose: |
      **Programas de conscientização:**
      1. Campanhas internas de segurança digital para colaboradores.
      2. Simulações de phishing para treinamento.
      3. Métricas de eficácia de programas de conscientização.

      **Monitoramento de ambientes educacionais:**
      4. Proteção reforçada contra ameaças em plataformas educacionais.
      5. Filtragem de conteúdo impróprio em ambientes educacionais
         (quando aplicável e autorizado).
    tools:
      - security-awareness-platform
      - phishing-simulation
      - content-filtering
      - training-metrics
