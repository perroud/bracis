id: art-27
family: cap-4
title: "Iniciativas Públicas de Fomento à Cultura Digital e Promoção da Internet"
class: marco-civil
statement:
  prose: |
    Art. 27. As iniciativas públicas de fomento à cultura digital e de promoção da
    internet como ferramenta social devem:

    I - promover a inclusão digital;

    II - buscar reduzir as desigualdades, sobretudo entre as diferentes regiões do
    País, no acesso às tecnologias da informação e comunicação e no seu uso; e

    III - fomentar a produção e circulação de conteúdo nacional.
guidance:
  prose: |
    O art. 27 direciona as políticas públicas de fomento à cultura digital e
    promoção da internet. Três eixos de atuação:

    **Inciso I — Inclusão digital:**
    Garantir que todas as camadas da população tenham acesso efetivo à internet.
    Inclui infraestrutura (conectividade), dispositivos (terminais) e capacitação
    (letramento digital). Relaciona-se com o art. 4º, I (direito de acesso a todos).

    **Inciso II — Redução de desigualdades regionais:**
    O Brasil tem disparidades significativas de acesso entre regiões (Sul/Sudeste vs
    Norte/Nordeste), entre zonas urbanas e rurais, e entre classes sociais. Políticas
    devem priorizar a redução dessas desigualdades.

    **Inciso III — Conteúdo nacional:**
    Fomento à produção e circulação de conteúdo brasileiro. Não se trata de restrição
    a conteúdo estrangeiro, mas de promoção ativa de conteúdo local. Relaciona-se com
    a diversidade cultural (art. 2º, III) e promoção da cultura (art. 4º, II).

    **Implicação para plataformas:**
    Plataformas que recebem incentivos públicos ou operam em parceria com o governo
    devem demonstrar contribuição para inclusão digital, redução de desigualdades
    e promoção de conteúdo nacional.
implementation_guidance:
  platform_engineering:
    prose: |
      **Inclusão digital (inciso I):**
      1. Versão lite de aplicações para dispositivos de baixo custo e
         conexões lentas (2G/3G).
      2. Otimização de consumo de dados (compressão, lazy loading,
         modo offline).
      3. Suporte a dispositivos com hardware limitado.

      **Redução de desigualdades regionais (inciso II):**
      4. CDN com pontos de presença em todas as regiões do Brasil.
      5. Monitoramento de performance por região geográfica.
      6. Estratégias de edge computing para reduzir latência em
         regiões remotas.

      **Conteúdo nacional (inciso III):**
      7. Infraestrutura de hospedagem de conteúdo com data centers
         no Brasil.
      8. Ferramentas de criação de conteúdo acessíveis.
      9. Sistemas de recomendação que priorizem conteúdo local
         quando relevante.
    tools:
      - cdn-multi-region
      - performance-monitoring
      - edge-computing
      - content-platform
      - data-compression
  devsecops:
    prose: |
      **Inclusão e acessibilidade:**
      1. Testes de performance em conexões de baixa velocidade (throttling).
      2. Testes em dispositivos de entrada de gama.
      3. Verificação de funcionamento offline/low-connectivity.

      **Cobertura regional:**
      4. Testes de latência a partir de diferentes regiões do Brasil.
      5. Validação de CDN em pontos de presença regionais.
    tools:
      - network-throttling-tests
      - device-testing
      - latency-monitoring
      - cdn-validator
  secops:
    prose: |
      **Monitoramento de inclusão:**
      1. Métricas de acesso por região geográfica, tipo de dispositivo
         e velocidade de conexão.
      2. Relatórios de inclusão digital (cobertura, adoção, uso efetivo).
      3. Identificação de regiões com baixa penetração para ação direcionada.

      **Disponibilidade regional:**
      4. Monitoramento de disponibilidade por região.
      5. Alertas para degradação de serviço em regiões específicas.
    tools:
      - geographic-analytics
      - regional-monitoring
      - inclusion-metrics
      - availability-dashboard
