id: art-6
family: cap-1
title: "Interpretação conforme a Natureza da Internet"
class: marco-civil
statement:
  prose: |
    Art. 6º Na interpretação desta Lei serão levados em conta, além dos fundamentos,
    princípios e objetivos previstos, a natureza da internet, seus usos e costumes
    particulares e sua importância para a promoção do desenvolvimento humano, econômico,
    social e cultural.
guidance:
  prose: |
    O art. 6º é uma norma hermenêutica — instrui como interpretar toda a lei. Estabelece
    que a interpretação do Marco Civil deve considerar:

    1. Os fundamentos (art. 2º), princípios (art. 3º) e objetivos (art. 4º).
    2. A natureza da internet como rede aberta, distribuída e global.
    3. Os usos e costumes da internet (netiqueta, padrões da comunidade técnica,
       RFCs, práticas consolidadas).
    4. A importância da internet para o desenvolvimento humano, econômico, social
       e cultural.

    **Implicação prática:**
    Quando houver dúvida interpretativa, deve-se privilegiar a leitura que:
    - Preserva a natureza aberta e distribuída da rede.
    - Respeita práticas consolidadas da comunidade técnica (IETF, W3C, ICANN).
    - Promove o desenvolvimento (não o restringe).
    - Considera a realidade técnica da internet, não analogias com meios tradicionais.

    **Usos e costumes da internet:**
    Referência a normas técnicas e práticas da comunidade, como:
    - RFCs do IETF
    - Recomendações do W3C
    - Políticas do ICANN
    - Boas práticas do CERT.br e CGI.br
    - Padrões de governança multissetorial
implementation_guidance:
  platform_engineering:
    prose: |
      **Conformidade com padrões da internet (usos e costumes):**
      1. Aderência a RFCs relevantes (HTTP, TLS, DNS, SMTP) em toda a infraestrutura.
      2. Conformidade com recomendações W3C para aplicações web.
      3. Implementação de padrões IETF para segurança (TLS 1.3, DNSSEC, DMARC).
      4. Respeito a padrões de roteamento e interconexão (BGP best practices).

      **Promoção do desenvolvimento (finalidade da norma):**
      5. Arquitetura que não impede inovação ou novos usos da plataforma.
      6. APIs extensíveis para permitir integração por terceiros.
      7. Documentação técnica acessível para fomentar ecossistema.
    tools:
      - tls-management
      - dnssec
      - dmarc-dkim-spf
      - api-gateway
      - w3c-validator
  devsecops:
    prose: |
      **Validação de conformidade com padrões:**
      1. Testes de conformidade TLS (Mozilla Observatory, SSL Labs).
      2. Validação de headers HTTP conforme RFCs.
      3. Verificação de conformidade DNS (DNSSEC, CAA records).
      4. Linting de HTML/CSS contra padrões W3C.

      **Práticas da comunidade técnica:**
      5. Responsible disclosure policy para vulnerabilidades.
      6. Abuse contact publicado conforme RFC 2142.
    tools:
      - tls-scanner
      - http-header-validator
      - dns-auditor
      - w3c-linter
      - security-policy-checker
  secops:
    prose: |
      **Monitoramento de conformidade com padrões:**
      1. Auditoria periódica de conformidade com RFCs aplicáveis.
      2. Verificação de certificados TLS e configurações de segurança.
      3. Monitoramento de reputação de ASN e blocos IP (RBLs, abuse reports).

      **Usos e costumes:**
      4. Participação em fóruns de governança (CGI.br, GTER, GTS).
      5. Acompanhamento de novas RFCs e recomendações de segurança.
      6. Resposta a abuse reports conforme práticas consolidadas.
    tools:
      - ssl-monitoring
      - reputation-monitoring
      - abuse-management
      - rfc-compliance-audit
