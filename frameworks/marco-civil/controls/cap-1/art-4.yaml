id: art-4
family: cap-1
title: "Objetivos da Disciplina do Uso da Internet no Brasil"
class: marco-civil
statement:
  prose: |
    Art. 4º A disciplina do uso da internet no Brasil tem por objetivo a promoção:

    I - do direito de acesso à internet a todos;

    II - do acesso à informação, ao conhecimento e à participação na vida cultural
    e na condução dos assuntos públicos;

    III - da inovação e do fomento à ampla difusão de novas tecnologias e modelos
    de uso e acesso; e

    IV - da adesão a padrões tecnológicos abertos que permitam a comunicação,
    a acessibilidade e a interoperabilidade entre aplicações e bases de dados.
guidance:
  prose: |
    O art. 4º define os objetivos programáticos do Marco Civil. Enquanto o art. 2º
    traz fundamentos (valores) e o art. 3º traz princípios (diretrizes normativas),
    o art. 4º estabelece metas concretas a serem promovidas.

    **Inciso I — Direito de acesso universal:**
    A internet é tratada como serviço essencial. O acesso à internet é pré-condição
    para o exercício de outros direitos na era digital. Relaciona-se com o art. 7º,
    que detalha os direitos dos usuários.

    **Inciso II — Acesso à informação e participação:**
    Conecta-se com o art. 5º, XIV da CF/88 (acesso à informação) e com a
    Lei de Acesso à Informação (Lei 12.527/2011).

    **Inciso III — Inovação:**
    O Marco Civil adota postura pró-inovação. Regulação não deve impedir
    novos modelos de negócio ou tecnologias.

    **Inciso IV — Padrões abertos:**
    Preferência explícita por padrões abertos (open standards). Alinha-se com
    a Política de Dados Abertos do Governo Federal e com o art. 24, V.
implementation_guidance:
  platform_engineering:
    prose: |
      **Acesso universal (inciso I):**
      1. Design responsivo e progressive web apps para acesso em qualquer dispositivo.
      2. Otimização para redes de baixa largura de banda (lazy loading, compressão).
      3. Suporte a navegadores antigos e dispositivos de entrada de gama.

      **Acesso à informação (inciso II):**
      4. APIs abertas para acesso a dados públicos.
      5. Portais de transparência com dados estruturados.
      6. Mecanismos de participação digital (consultas públicas, fóruns).

      **Inovação (inciso III):**
      7. Arquitetura extensível baseada em microsserviços.
      8. Sandbox para experimentação de novas tecnologias.
      9. Feature flags para rollout gradual de inovações.

      **Padrões abertos (inciso IV):**
      10. APIs RESTful com OpenAPI/Swagger.
      11. Formatos abertos de dados (JSON, XML, CSV, ODF).
      12. Protocolos abertos de comunicação (HTTP/2, WebSocket, gRPC).
    tools:
      - pwa-framework
      - api-gateway
      - open-data-portal
      - feature-flags
      - openapi-spec
  devsecops:
    prose: |
      **Acesso universal (inciso I):**
      1. Lighthouse/PageSpeed no pipeline para garantir performance.
      2. Testes de compatibilidade em múltiplos dispositivos e navegadores.

      **Padrões abertos (inciso IV):**
      3. Linting de APIs contra especificação OpenAPI.
      4. Validação de formatos de dados contra schemas abertos.
      5. Dependency scanning para detectar dependências proprietárias
         quando alternativas abertas existem.
    tools:
      - lighthouse
      - browser-testing
      - openapi-linter
      - schema-validator
      - dependency-scanner
  secops:
    prose: |
      **Acesso universal (inciso I):**
      1. Monitoramento de disponibilidade e performance por região geográfica.
      2. Alertas para degradação de serviço que impacte acesso.

      **Acesso à informação (inciso II):**
      3. Auditoria de completude de dados públicos disponibilizados.
      4. Monitoramento de uptime de portais de dados abertos.

      **Padrões abertos (inciso IV):**
      5. Inventário de tecnologias proprietárias vs abertas em uso.
      6. Relatórios de conformidade com padrões de interoperabilidade.
    tools:
      - uptime-monitoring
      - geographic-performance-monitoring
      - technology-inventory
      - compliance-reporting
