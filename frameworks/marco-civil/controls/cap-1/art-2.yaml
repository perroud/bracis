id: art-2
family: cap-1
title: "Fundamentos do Uso da Internet no Brasil"
class: marco-civil
statement:
  prose: |
    Art. 2º A disciplina do uso da internet no Brasil tem como fundamento o respeito
    à liberdade de expressão, bem como:

    I - o reconhecimento da escala mundial da rede;

    II - os direitos humanos, o desenvolvimento da personalidade e o exercício da
    cidadania em meios digitais;

    III - a pluralidade e a diversidade;

    IV - a abertura e a colaboração;

    V - a livre iniciativa, a livre concorrência e a defesa do consumidor; e

    VI - a finalidade social da rede.
guidance:
  prose: |
    O art. 2º estabelece os fundamentos axiológicos que sustentam toda a regulação
    da internet no Brasil. Diferencia-se do art. 3º (princípios) por definir os
    valores fundacionais — a base filosófica e constitucional sobre a qual os
    princípios e regras se apoiam.

    **Inciso I — Escala mundial:**
    Reconhece que a internet é uma rede global. Qualquer regulação nacional deve
    considerar a natureza transfronteiriça da rede e evitar fragmentação.

    **Inciso II — Direitos humanos e cidadania digital:**
    Conecta o uso da internet aos direitos fundamentais previstos na CF/88.
    O exercício da cidadania em meios digitais é equiparado ao exercício no
    mundo físico.

    **Inciso V — Livre iniciativa e defesa do consumidor:**
    Equilíbrio entre liberdade econômica e proteção ao consumidor. Modelos
    de negócio na internet devem respeitar o CDC (Lei 8.078/1990).

    **Inciso VI — Finalidade social da rede:**
    A internet não é apenas instrumento comercial. Deve servir ao interesse
    público e à inclusão social.
implementation_guidance:
  platform_engineering:
    prose: |
      **Escala mundial (inciso I):**
      1. Arquitetura multi-região para atender usuários globais.
      2. CDN para distribuição de conteúdo com baixa latência.
      3. Conformidade com legislações múltiplas (GDPR, LGPD, Marco Civil)
         quando operar em escala internacional.

      **Direitos humanos e cidadania digital (inciso II):**
      4. Acessibilidade digital (WCAG 2.1 AA mínimo) em todas as plataformas.
      5. Suporte a múltiplos idiomas e localização (i18n/l10n).
      6. Canais digitais para exercício de direitos (portabilidade, exclusão,
         acesso a dados).

      **Defesa do consumidor (inciso V):**
      7. Termos de uso claros e acessíveis.
      8. Mecanismos de reclamação e atendimento integrados.

      **Finalidade social (inciso VI):**
      9. APIs públicas para integração com serviços de interesse social.
      10. Versões acessíveis de serviços para conexões de baixa velocidade.
    tools:
      - cdn
      - multi-region-infrastructure
      - accessibility-testing
      - i18n-framework
      - consumer-portal
  devsecops:
    prose: |
      **Acessibilidade (inciso II):**
      1. Testes automatizados de acessibilidade no pipeline (axe-core, pa11y).
      2. Linting de código para padrões de acessibilidade.
      3. Testes de internacionalização para garantir suporte multilíngue.

      **Defesa do consumidor (inciso V):**
      4. Testes de conformidade com requisitos do CDC em fluxos de compra.
      5. Validação de termos de uso e políticas de privacidade no deploy.

      **Finalidade social (inciso VI):**
      6. Performance budget para garantir funcionamento em conexões lentas.
      7. Testes de compatibilidade com dispositivos de baixo custo.
    tools:
      - accessibility-scanner
      - performance-testing
      - compatibility-testing
      - i18n-linter
  secops:
    prose: |
      **Direitos humanos (inciso II):**
      1. Monitoramento de disponibilidade de canais de exercício de direitos.
      2. Auditoria de acessibilidade periódica.

      **Defesa do consumidor (inciso V):**
      3. Monitoramento de SLAs de atendimento ao consumidor.
      4. Rastreamento de reclamações e tempo de resposta.

      **Finalidade social (inciso VI):**
      5. Relatórios de impacto social da plataforma.
      6. Métricas de inclusão digital (acesso por região, dispositivo, velocidade).
    tools:
      - uptime-monitoring
      - sla-tracking
      - analytics-platform
      - accessibility-audit
