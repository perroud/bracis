id: art-3
family: cap-1
title: "Princípios da Disciplina do Uso da Internet no Brasil"
class: marco-civil
statement:
  prose: |
    Art. 3º A disciplina do uso da internet no Brasil tem os seguintes princípios:

    I - garantia da liberdade de expressão, comunicação e manifestação de pensamento,
    nos termos da Constituição Federal;

    II - proteção da privacidade;

    III - proteção dos dados pessoais, na forma da lei;

    IV - preservação e garantia da neutralidade de rede;

    V - preservação da estabilidade, segurança e funcionalidade da rede, por meio de
    medidas técnicas compatíveis com os padrões internacionais e pelo estímulo ao uso
    de boas práticas;

    VI - responsabilização dos agentes de acordo com suas atividades, nos termos da lei;

    VII - preservação da natureza participativa da rede;

    VIII - liberdade dos modelos de negócios promovidos na internet, desde que não
    conflitem com os demais princípios estabelecidos nesta Lei.

    Parágrafo único. Os princípios expressos nesta Lei não excluem outros previstos no
    ordenamento jurídico pátrio relacionados à matéria ou nos tratados internacionais em
    que a República Federativa do Brasil seja parte.
guidance:
  prose: |
    O art. 3º estabelece os pilares normativos que orientam toda a aplicação do Marco
    Civil. Esses princípios são hierarquicamente superiores às regras específicas e devem
    ser usados como critério interpretativo em caso de conflito ou lacuna.

    **Inciso II e III — Privacidade e Proteção de Dados:**
    Esses incisos foram posteriormente complementados pela LGPD (Lei 13.709/2018).
    A expressão "na forma da lei" no inciso III antecipou a necessidade de legislação
    específica para proteção de dados pessoais.

    **Inciso IV — Neutralidade de Rede:**
    Princípio detalhado no art. 9º. Impede discriminação de tráfego por conteúdo,
    origem, destino, serviço, terminal ou aplicação.

    **Inciso V — Estabilidade e Segurança:**
    Exige medidas técnicas compatíveis com padrões internacionais. Referências:
    - RFC 2196 (Site Security Handbook)
    - Padrões IETF para segurança de rede
    - Boas práticas CERT.br

    **Inciso VI — Responsabilização:**
    A responsabilidade é proporcional à atividade exercida. Provedores de conexão
    têm responsabilidades diferentes de provedores de aplicação (detalhado nos
    art. 18-21).
implementation_guidance:
  platform_engineering:
    prose: |
      **Privacidade (inciso II):**
      1. Privacy by Design em toda a arquitetura de plataforma.
      2. Minimização de coleta de dados pessoais em logs e telemetria.
      3. Pseudonimização de identificadores em pipelines de dados.

      **Proteção de dados pessoais (inciso III):**
      4. Criptografia de dados pessoais em repouso e em trânsito.
      5. Controle de acesso granular a dados pessoais (RBAC/ABAC).
      6. Data classification e tagging automático de dados pessoais.

      **Neutralidade de rede (inciso IV):**
      7. Não implementar traffic shaping discriminatório por conteúdo.
      8. QoS configurado de forma isonômica para mesma classe de serviço.

      **Estabilidade e segurança (inciso V):**
      9. Alta disponibilidade com redundância geográfica.
      10. DDoS protection em camada de rede e aplicação.
      11. Rate limiting e circuit breakers para proteção da infraestrutura.
      12. Monitoramento contínuo de saúde e performance da rede.
    tools:
      - kms-hsm
      - identity-provider
      - data-classification
      - ddos-protection
      - waf
      - monitoring
  devsecops:
    prose: |
      **Privacidade no pipeline:**
      1. Scanning de código para identificar coleta excessiva de dados pessoais.
      2. Testes automatizados para verificar anonimização/pseudonimização.
      3. Data masking em ambientes de desenvolvimento e staging.

      **Segurança da rede (inciso V):**
      4. Infrastructure-as-code com hardening automatizado.
      5. Network policies para segmentação de tráfego.
      6. Vulnerability scanning contínuo em infraestrutura de rede.
    tools:
      - sast
      - data-masking
      - iac-scanning
      - network-policy-manager
      - vulnerability-scanner
  secops:
    prose: |
      **Monitoramento de estabilidade (inciso V):**
      1. NOC/SOC integrado para monitoramento de infraestrutura.
      2. Alertas de anomalia em tráfego de rede.
      3. Incident response para ataques DDoS e comprometimentos.

      **Responsabilização (inciso VI):**
      4. Audit trail completo de ações administrativas.
      5. Logging imutável para evidência em processos judiciais.
      6. Chain of custody para evidências digitais.
    tools:
      - siem
      - ndr
      - ddos-protection
      - centralized-logging
