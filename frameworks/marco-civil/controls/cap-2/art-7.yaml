id: art-7
family: cap-2
title: "Direitos e Garantias dos Usuários de Internet"
class: marco-civil
statement:
  prose: |
    Art. 7º O acesso à internet é essencial ao exercício da cidadania, e ao
    usuário são assegurados os seguintes direitos:

    I - inviolabilidade da intimidade e da vida privada, sua proteção e
    indenização pelo dano material ou moral decorrente de sua violação;

    II - inviolabilidade e sigilo do fluxo de suas comunicações pela internet,
    salvo por ordem judicial, na forma da lei;

    III - inviolabilidade e sigilo de suas comunicações privadas armazenadas,
    salvo por ordem judicial;

    IV - não suspensão da conexão à internet, salvo por débito diretamente
    decorrente de sua utilização;

    V - manutenção da qualidade contratada da conexão à internet;

    VI - informações claras e completas constantes dos contratos de prestação de
    serviços, com detalhamento sobre o regime de proteção aos registros de
    conexão e aos registros de acesso a aplicações de internet, bem como sobre
    práticas de gerenciamento da rede que possam afetar sua qualidade;

    VII - não fornecimento a terceiros de seus dados pessoais, inclusive
    registros de conexão, e de acesso a aplicações de internet, salvo mediante
    consentimento livre, expresso e informado ou nas hipóteses previstas em lei;

    VIII - informações claras e completas sobre coleta, uso, armazenamento,
    tratamento e proteção de seus dados pessoais;

    IX - consentimento expresso sobre coleta, uso, armazenamento e tratamento de
    dados pessoais, que deverá ocorrer de forma destacada das demais cláusulas
    contratuais;

    X - exclusão definitiva dos dados pessoais que tiver fornecido a determinada
    aplicação de internet, a seu requerimento, ao término da relação entre as
    partes, ressalvadas as hipóteses de guarda obrigatória de registros previstas
    nesta Lei;

    XI - publicidade e clareza de eventuais políticas de uso dos provedores de
    conexão à internet e de aplicações de internet;

    XII - acessibilidade, consideradas as características físico-motoras,
    perceptivas, sensoriais, intelectuais e mentais do usuário, nos termos da lei;

    XIII - aplicação das normas de proteção e defesa do consumidor nas relações
    de consumo realizadas na internet.
guidance:
  prose: |
    O art. 7º é a carta de direitos dos usuários de internet no Brasil.
    Os incisos VII, VIII, IX e X foram posteriormente expandidos pela LGPD.

    Para sistemas de tecnologia, os requisitos mais impactantes:
    - Incisos II e III: exigem criptografia de comunicações e armazenamento
    - Inciso VII: consentimento como base legal para compartilhamento (complementado pela LGPD art. 7º)
    - Inciso IX: consentimento expresso e destacado
    - Inciso X: direito de exclusao de dados (equivalente ao art. 18 da LGPD e art. 17 do GDPR)
    - Inciso XII: acessibilidade digital obrigatoria
implementation_guidance:
  platform_engineering:
    prose: |
      1. Criptografia TLS 1.2+ para todas as comunicações.
      2. Criptografia em repouso (AES-256) para comunicações armazenadas.
      3. Consent Management Platform integrada ao fluxo de cadastro.
      4. API de exclusão de dados pessoais com cascade em todos os microsserviços.
      5. Conformidade WCAG 2.1 AA para acessibilidade.
    tools:
      - cert-manager
      - kms
      - consent-management
      - data-deletion-api
      - accessibility-scanner
  devsecops:
    prose: |
      1. Testes automatizados de criptografia (TLS, at-rest).
      2. Validação de consentimento em testes de integração.
      3. Testes de acessibilidade no pipeline CI/CD.
      4. Data flow mapping para rastrear compartilhamento com terceiros.
    tools:
      - tls-scanner
      - axe-core
      - data-flow-mapper
      - integration-tests
  secops:
    prose: |
      1. Monitoramento de acessos a comunicações armazenadas.
      2. Alertas para compartilhamento de dados sem consentimento registrado.
      3. Auditoria de exclusões de dados pessoais.
      4. DLP para prevenir vazamento de comunicações privadas.
    tools:
      - siem
      - dlp
      - audit-logger
legal_references:
