id: art-8
family: cap-2
title: "Nulidade de Cláusulas Contratuais Violadoras de Direitos"
class: marco-civil
statement:
  prose: |
    Art. 8º A garantia do direito à privacidade e à liberdade de expressão nas
    comunicações é condição para o pleno exercício do direito de acesso à internet.

    Parágrafo único. São nulas de pleno direito as cláusulas contratuais que violem
    o disposto no caput, tais como aquelas que:

    I - impliquem ofensa à inviolabilidade e ao sigilo das comunicações privadas,
    pela internet; ou

    II - em contrato de adesão, não ofereçam como alternativa ao contratante a
    adoção do foro brasileiro para solução de controvérsias decorrentes de serviços
    prestados no Brasil.
guidance:
  prose: |
    Este artigo estabelece a nulidade automatica de clausulas contratuais que
    violem privacidade ou liberdade de expressao. Impacto direto nos Termos
    de Servico (ToS) e Politicas de Privacidade.

    Para empresas de tecnologia: revisar todos os contratos de adesao para
    garantir que nao contenham clausulas que permitam interceptacao de
    comunicacoes ou que obriguem foro estrangeiro exclusivo.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Termos de Servico versionados e auditaveis em repositorio Git.
      2. Clausula de foro brasileiro obrigatoria em contratos com usuarios brasileiros.
      3. Nenhuma funcionalidade que permita interceptacao de comunicacoes sem ordem judicial.
    tools:
      - contract-management
      - git-versioning
  devsecops:
    prose: |
      1. Review automatizado de Termos de Servico para clausulas proibidas.
      2. Checklist de compliance legal em deploys que alteram ToS.
    tools:
      - legal-review-checklist
      - ci-cd-gates
  secops:
    prose: |
      1. Auditoria periodica de contratos e termos de servico.
      2. Monitoramento de alteracoes em politicas de privacidade.
    tools:
      - grc-platform
      - change-monitoring
legal_references:
  - framework_id: lgpd
    articles: ["art-7", "art-8"]
    relationship: complements
