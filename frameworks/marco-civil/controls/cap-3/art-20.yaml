id: art-20
family: cap-3
title: "Requisitos para Ordem Judicial de Identificação de Usuários"
class: marco-civil
statement:
  prose: |
    Art. 20. Sempre que tiver informações de contato do usuário diretamente
    responsável pelo conteúdo a que se refere o art. 19, caberá ao provedor de
    aplicações de internet comunicar-lhe os motivos e informações relativos à
    indisponibilização de conteúdo, com informações que permitam o contraditório
    e a ampla defesa em juízo, salvo expressa previsão legal ou expressa
    determinação judicial fundamentada em contrário.

    Parágrafo único. Quando solicitado pelo usuário que disponibilizou o conteúdo
    tornado indisponível, o provedor de aplicações de internet que exerce essa
    atividade de forma organizada, profissionalmente e com fins econômicos
    substituirá o conteúdo tornado indisponível pela motivação ou pela ordem
    judicial que deu fundamento à indisponibilização.
guidance:
  prose: |
    O art. 20 assegura o contraditório e a ampla defesa ao autor do conteúdo
    removido. Complementa o art. 19 ao estabelecer garantias processuais.

    **Obrigações do provedor de aplicação:**
    1. Comunicar ao autor do conteúdo os motivos da remoção.
    2. Fornecer informações que permitam defesa em juízo.
    3. Quando solicitado, substituir o conteúdo removido pela motivação ou
       ordem judicial que fundamentou a remoção.

    **Exceções à comunicação:**
    - Previsão legal expressa em contrário.
    - Determinação judicial fundamentada em contrário (sigilo judicial).

    **Implicação prática:**
    O provedor não pode simplesmente remover conteúdo silenciosamente.
    Deve notificar o autor, informar os motivos, e permitir que ele
    conteste judicialmente a remoção. Isso garante o devido processo
    legal na esfera digital.

    **Parágrafo único — Substituição por motivação:**
    Em vez de simplesmente exibir "conteúdo removido", o provedor deve,
    quando solicitado pelo autor, exibir a motivação da remoção ou a
    ordem judicial. Transparência processual.
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de notificação de remoção:**
      1. Workflow automatizado de notificação ao autor quando conteúdo
         é removido por ordem judicial.
      2. Template de notificação contendo: motivo da remoção, referência
         à ordem judicial, informações para exercício do contraditório.
      3. Canal seguro de comunicação com o autor (e-mail, notificação
         in-app, ou meio cadastrado).

      **Sistema de substituição (parágrafo único):**
      4. Mecanismo para substituir conteúdo removido por mensagem
         explicativa contendo a motivação ou referência à ordem judicial.
      5. Interface para o autor solicitar a substituição.
      6. Registro de todas as solicitações e ações tomadas.

      **Gestão de exceções:**
      7. Flag para ordens judiciais com sigilo, que impedem notificação.
      8. Verificação automatizada de previsão legal que dispense notificação.
    tools:
      - notification-system
      - content-management
      - workflow-engine
      - judicial-order-tracker
  devsecops:
    prose: |
      **Testes de conformidade:**
      1. Teste de que toda remoção de conteúdo gera notificação ao autor.
      2. Teste de que notificações contêm campos obrigatórios (motivo,
         referência judicial, informações para defesa).
      3. Teste do mecanismo de substituição por motivação.
      4. Teste de exceções (sigilo judicial, previsão legal).

      **Auditoria de processo:**
      5. Log imutável de todas as remoções, notificações e substituições.
      6. Validação de que prazos de notificação são respeitados.
    tools:
      - notification-test-suite
      - content-removal-auditor
      - immutable-logging
      - process-validator
  secops:
    prose: |
      **Monitoramento operacional:**
      1. Dashboard de remoções de conteúdo com status de notificação.
      2. Alertas para remoções sem notificação correspondente.
      3. Monitoramento de SLA de notificação ao autor.

      **Compliance:**
      4. Relatório periódico de remoções, notificações e substituições.
      5. Auditoria de conformidade com contraditório e ampla defesa.
      6. Registro de exceções aplicadas (sigilo, previsão legal).
    tools:
      - content-moderation-dashboard
      - sla-monitoring
      - compliance-reporting
      - audit-trail
