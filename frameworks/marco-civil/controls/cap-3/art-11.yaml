id: art-11
family: cap-3
title: "Aplicacao da Legislacao Brasileira a Operacoes de Coleta no Brasil"
class: marco-civil
statement:
  prose: |
    Art. 11. Em qualquer operação de coleta, armazenamento, guarda e tratamento
    de registros, de dados pessoais ou de comunicações por provedores de conexão
    e de aplicações de internet em que pelo menos um desses atos ocorra em
    território nacional, deverão ser obrigatoriamente respeitados a legislação
    brasileira e os direitos à privacidade, à proteção dos dados pessoais e ao
    sigilo das comunicações privadas e dos registros.

    § 1º O disposto no caput aplica-se aos dados coletados em território nacional
    e ao conteúdo das comunicações, desde que pelo menos um dos terminais esteja
    localizado no Brasil.

    § 2º O disposto no caput aplica-se mesmo que as atividades sejam realizadas
    por pessoa jurídica sediada no exterior, desde que oferte serviço ao público
    brasileiro ou pelo menos uma integrante do mesmo grupo econômico possua
    estabelecimento no Brasil.
guidance:
  prose: |
    Aplicacao extraterritorial da legislacao brasileira. Equivalente ao art. 3
    do GDPR (alcance territorial). Qualquer empresa que processe dados de
    usuarios brasileiros, mesmo sediada no exterior, deve cumprir o Marco Civil.

    Criterios de aplicabilidade:
    - Pelo menos um ato de coleta/armazenamento/tratamento em territorio brasileiro
    - Pelo menos um terminal localizado no Brasil
    - Servico ofertado ao publico brasileiro
    - Grupo economico com estabelecimento no Brasil
implementation_guidance:
  platform_engineering:
    prose: |
      1. Data residency controls para dados de usuarios brasileiros.
      2. Geo-tagging de dados para identificar jurisdicao aplicavel.
      3. Configuracao de data sovereignty em provedores de nuvem.
    tools:
      - data-residency
      - geo-tagging
      - cloud-regions
  devsecops:
    prose: |
      1. Validacao de localizacao de armazenamento em pipelines de deploy.
      2. Testes de conformidade jurisdicional.
    tools:
      - compliance-tests
      - data-location-validator
  secops:
    prose: |
      1. Inventario de localizacao de dados pessoais brasileiros.
      2. Monitoramento de transferencias internacionais.
    tools:
      - data-mapping
      - transfer-monitoring
