id: art-13
family: cap-3
title: "Guarda de Registros de Conexao"
class: marco-civil
statement:
  prose: |
    Art. 13. Na provisão de conexão à internet, cabe ao administrador de sistema
    autônomo respectivo o dever de manter os registros de conexão, sob sigilo,
    em ambiente controlado e de segurança, pelo prazo de 1 (um) ano, nos termos
    do regulamento.

    § 1º A responsabilidade pela manutenção dos registros de conexão não poderá ser
    transferida a terceiros.

    § 2º A autoridade policial ou administrativa ou o Ministério Público poderão
    requerer cautelarmente que os registros de conexão sejam guardados por prazo
    superior ao previsto no caput.

    § 3º Na hipótese do § 2º, a autoridade requerente terá o prazo de 60
    (sessenta) dias, contados a partir do requerimento, para ingressar com o
    pedido de autorização judicial de acesso aos registros previstos no caput.

    § 4º O provedor responsável pela guarda dos registros deverá manter sigilo em
    relação ao requerimento previsto no § 2º, que perderá sua eficácia caso
    o pedido de autorização judicial seja indeferido ou não tenha sido impetrado
    no prazo previsto no § 3º.

    § 5º Em qualquer hipótese, a disponibilização ao requerente dos registros de que
    trata este artigo deverá ser precedida de autorização judicial, conforme
    disposto na Seção IV deste Capítulo.
guidance:
  prose: |
    Obrigacao legal de retencao de registros de conexao por 1 ano minimo.
    "Registros de conexao" = data/hora de inicio e termino de conexao, duracao
    e endereco IP utilizado (definido no art. 5, VI).

    Requisitos tecnicos:
    - Sigilo: acesso restrito
    - Ambiente controlado: infraestrutura segura e auditavel
    - Seguranca: protecao contra alteracao e destruicao
    - Retencao minima: 1 ano (pode ser estendida por ordem cautelar)
    - Intransferibilidade: o provedor de conexao nao pode delegar a terceiros
implementation_guidance:
  platform_engineering:
    prose: |
      1. Armazenamento dedicado para registros de conexao com retencao de 1 ano.
      2. Criptografia em repouso e controle de acesso rigoroso.
      3. Imutabilidade dos registros (WORM storage ou append-only).
      4. Segregacao fisica ou logica de outros dados.
      5. Backup com mesma retencao e controles de seguranca.
    tools:
      - worm-storage
      - kms
      - dedicated-database
      - backup-system
  devsecops:
    prose: |
      1. Validacao automatizada de retencao (nao deletar antes de 1 ano).
      2. Testes de integridade dos registros.
      3. Auditoria de acesso no pipeline de monitoramento.
    tools:
      - retention-validator
      - integrity-checker
      - access-auditor
  secops:
    prose: |
      1. Monitoramento de acesso aos registros de conexao.
      2. Alertas para tentativas de acesso nao autorizado.
      3. Processo de atendimento a ordens cautelares (extensao de retencao).
      4. Verificacao periodica de integridade dos registros.
    tools:
      - siem
      - access-monitoring
      - judicial-workflow
      - integrity-monitoring
