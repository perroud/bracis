id: art-18
family: cap-3
title: "Irresponsabilidade do Provedor de Conexão por Conteúdo de Terceiros"
class: marco-civil
statement:
  prose: |
    Art. 18. O provedor de conexão à internet não será responsabilizado civilmente
    por danos decorrentes de conteúdo gerado por terceiros.
guidance:
  prose: |
    O art. 18 estabelece uma imunidade civil absoluta para provedores de conexão
    em relação a conteúdo gerado por terceiros. Não há exceções.

    **Distinção fundamental:**
    - Provedor de conexão (art. 18): imunidade absoluta — NUNCA responsável por
      conteúdo de terceiros.
    - Provedor de aplicação (art. 19): responsabilidade condicionada — responsável
      apenas se, após ordem judicial específica, não tomar providências.

    **Fundamento técnico:**
    O provedor de conexão é um "tubo" (pipe) que transporta pacotes de dados.
    Não tem controle editorial sobre o conteúdo que trafega pela rede. Responsabilizá-lo
    seria equivalente a responsabilizar os Correios pelo conteúdo das cartas.

    **Relação com art. 14:**
    Coerência sistêmica — se o provedor de conexão não pode sequer guardar registros
    de acesso a aplicações (art. 14), seria contraditório responsabilizá-lo por
    conteúdo que ele não pode nem monitorar.

    **Atenção:**
    A imunidade se refere exclusivamente a conteúdo de terceiros. Se o próprio
    provedor de conexão gerar conteúdo (ex.: portal de notícias próprio), responde
    como provedor de aplicação para esse conteúdo específico.
implementation_guidance:
  platform_engineering:
    prose: |
      **Para provedores de conexão:**
      1. Documentar arquitetura que demonstre separação clara entre
         infraestrutura de conexão e eventuais aplicações próprias.
      2. Garantir que nenhum sistema de filtragem de conteúdo esteja
         habilitado na camada de conexão (coerência com art. 9º, §3º).
      3. Se operar também como provedor de aplicação, segregar
         completamente as infraestruturas.

      **Infraestrutura de rede neutra:**
      4. Roteamento baseado exclusivamente em endereços IP e portas,
         sem inspeção de conteúdo.
      5. Não implementar filtros de conteúdo na camada de conexão
         (exceto por ordem judicial específica ou requisito técnico
         indispensável conforme art. 9º).
    tools:
      - network-architecture
      - routing-configuration
      - infrastructure-segregation
  devsecops:
    prose: |
      **Validação de neutralidade:**
      1. Testes de que a infraestrutura de conexão não filtra conteúdo.
      2. Verificação de segregação entre serviços de conexão e aplicação.
      3. Auditoria de configurações de roteamento para confirmar
         ausência de filtragem por conteúdo.

      **Documentação de arquitetura:**
      4. Diagramas de rede que demonstrem separação clara entre
         camadas de conexão e aplicação.
    tools:
      - network-topology-validator
      - content-filter-scanner
      - architecture-documentation
  secops:
    prose: |
      **Monitoramento de conformidade:**
      1. Verificação periódica de que nenhum sistema de filtragem
         de conteúdo foi inadvertidamente habilitado na conexão.
      2. Auditoria de logs de rede para confirmar ausência de
         bloqueio de conteúdo não autorizado judicialmente.

      **Gestão de ordens judiciais:**
      3. Processo claro para recebimento e execução de ordens judiciais
         de bloqueio (as únicas exceções permitidas).
      4. Registro de todas as ordens recebidas e ações tomadas.
    tools:
      - network-audit
      - judicial-order-management
      - compliance-log
