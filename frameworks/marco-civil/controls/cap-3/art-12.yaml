id: art-12
family: cap-3
title: "Sancoes por Violacao de Protecao de Dados e Registros"
class: marco-civil
statement:
  prose: |
    Art. 12. Sem prejuízo das demais sanções cíveis, criminais ou administrativas,
    as infrações ao disposto nos arts. 10 e 11 ficam sujeitas, conforme o caso,
    às seguintes sanções, aplicadas de forma isolada ou cumulativa:

    I - advertência, com indicação de prazo para adoção de medidas corretivas;

    II - multa de até 10% (dez por cento) do faturamento do grupo econômico no
    Brasil no seu último exercício, excluídos os tributos, considerados a condição
    econômica do infrator e o princípio da proporcionalidade;

    III - suspensão temporária das atividades que envolvam os atos previstos no
    art. 11; ou

    IV - proibição de exercício das atividades que envolvam os atos previstos
    no art. 11.

    Parágrafo único. Tratando-se de empresa estrangeira, responde solidariamente
    pelo pagamento da multa de que trata o caput sua filial, sucursal, escritório
    ou estabelecimento situado no País.
guidance:
  prose: |
    Regime sancionatorio do Marco Civil. Multa de ate 10% do faturamento no
    Brasil e extremamente significativa (similar ao GDPR 4%/turnover global).
    Pode chegar a proibicao total das atividades.

    A responsabilidade solidaria de filiais brasileiras de empresas estrangeiras
    garante a executabilidade das sancoes.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Compliance dashboard para monitoramento contínuo dos arts. 10 e 11.
      2. Controles automatizados para prevenir violacoes de guarda de registros.
    tools:
      - compliance-dashboard
      - automated-controls
  devsecops:
    prose: |
      1. Compliance gates nos pipelines para verificar conformidade.
      2. Alertas pre-deploy para mudancas que afetem tratamento de dados.
    tools:
      - compliance-gates
      - pre-deploy-checks
  secops:
    prose: |
      1. Monitoramento contínuo de conformidade com arts. 10 e 11.
      2. Processo de resposta a notificacoes de autoridades.
    tools:
      - grc-platform
      - incident-response
