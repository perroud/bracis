id: art-16
family: cap-3
title: "Guarda de Registros por Prazo Superior Mediante Ordem Judicial"
class: marco-civil
statement:
  prose: |
    Art. 16. Na provisão de aplicações de internet, onerosa ou gratuita, é vedada
    a guarda:

    I - dos registros de acesso a outras aplicações de internet sem que o titular
    dos dados tenha consentido previamente, respeitado o disposto no art. 7º; ou

    II - de dados pessoais que sejam excessivos em relação à finalidade para a qual
    foi dado consentimento pelo seu titular, exceto nas hipóteses previstas na lei
    que dispuser sobre proteção de dados pessoais.
guidance:
  prose: |
    Principio de minimizacao de dados avant la lettre. Antecipa o principio da
    minimizacao da LGPD (art. 6, III).

    Vedacoes:
    1. Nao guardar registros de acesso a OUTRAS aplicacoes sem consentimento
    2. Nao guardar dados excessivos em relacao a finalidade consentida

    Diretamente aplicavel a praticas de tracking, analytics e profiling.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Data minimization por design em todos os servicos.
      2. Nao coletar dados de navegacao em aplicacoes de terceiros sem consentimento.
      3. Revisao periodica de dados coletados vs finalidade declarada.
      4. Implementar data retention policies automatizadas.
    tools:
      - data-minimization
      - consent-management
      - data-retention-policies
  devsecops:
    prose: |
      1. Scanning de codigo para identificar coleta excessiva.
      2. Testes de minimizacao de dados em pipelines.
    tools:
      - data-collection-scanner
      - minimization-tests
  secops:
    prose: |
      1. Auditoria de dados coletados vs finalidade declarada.
      2. Monitoramento de third-party tracking.
    tools:
      - data-audit
      - tracking-monitor
legal_references:
  - framework_id: lgpd
    articles: ["art-6"]
    relationship: complements
