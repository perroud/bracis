id: art-10
family: cap-3
title: "Protecao aos Registros, Dados Pessoais e Comunicacoes Privadas"
class: marco-civil
statement:
  prose: |
    Art. 10. A guarda e a disponibilização dos registros de conexão e de acesso
    a aplicações de internet de que trata esta Lei, bem como de dados pessoais e
    do conteúdo de comunicações privadas, devem atender à preservação da
    intimidade, da vida privada, da honra e da imagem das partes direta ou
    indiretamente envolvidas.

    § 1º O provedor responsável pela guarda somente será obrigado a disponibilizar
    os registros mencionados no caput, de forma autônoma ou associados a dados
    pessoais ou a outras informações que possam contribuir para a identificação
    do usuário ou do terminal, mediante ordem judicial, na forma do disposto na
    Seção IV deste Capítulo, ressalvado o previsto no art. 7º.

    § 2º O conteúdo das comunicações privadas somente poderá ser disponibilizado
    mediante ordem judicial, nas hipóteses e na forma que a lei estabelecer,
    respeitado o disposto nos incisos II e III do art. 7º.

    § 3º O disposto no caput não impede o acesso aos dados cadastrais que informem
    qualificação pessoal, filiação e endereço, na forma da lei, pelas autoridades
    administrativas que detenham competência legal para a sua requisição.

    § 4º As medidas e os procedimentos de segurança e de sigilo devem ser informados
    pelo responsável pela provisão de serviços de forma clara e atender a padrões
    definidos em regulamento, respeitado seu direito de confidencialidade quanto
    a segredos empresariais.
guidance:
  prose: |
    Este artigo estabelece que registros e comunicacoes so podem ser fornecidos
    mediante ordem judicial, com excecao de dados cadastrais basicos para
    autoridades administrativas competentes.

    Implicacoes tecnicas diretas:
    - Registros de conexao e acesso devem ser armazenados com controles de acesso rigorosos
    - Comunicacoes privadas tem protecao maxima (somente ordem judicial)
    - Dados cadastrais podem ser compartilhados com autoridades sem ordem judicial
    - Medidas de seguranca devem ser documentadas e publicadas
implementation_guidance:
  platform_engineering:
    prose: |
      1. Segregacao de armazenamento: registros de conexao, registros de acesso
         e comunicacoes em repositorios separados com controles distintos.
      2. Criptografia em repouso para todos os tipos de registros.
      3. Access control diferenciado: dados cadastrais vs registros vs comunicacoes.
      4. API de atendimento a ordens judiciais com workflow de aprovacao.
      5. Documentacao publica de medidas de seguranca (conforme paragrafo 4).
    tools:
      - kms
      - rbac
      - judicial-compliance-api
      - security-documentation
  devsecops:
    prose: |
      1. Testes de segregacao de acesso entre tipos de dados.
      2. Validacao de criptografia em pipelines de armazenamento.
      3. Auditoria automatizada de permissoes de acesso a registros.
    tools:
      - access-control-tests
      - encryption-validator
      - permission-auditor
  secops:
    prose: |
      1. Monitoramento de acessos a registros de conexao e comunicacoes.
      2. Alertas para acessos sem ordem judicial correspondente.
      3. Retencao de logs de acesso para fins de auditoria.
      4. Processo formal de atendimento a ordens judiciais.
    tools:
      - siem
      - access-monitoring
      - judicial-workflow
legal_references:
  - framework_id: lgpd
    articles: ["art-7", "art-11", "art-46"]
    relationship: complements
