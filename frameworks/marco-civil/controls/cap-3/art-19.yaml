id: art-19
family: cap-3
title: "Responsabilidade por Conteudo de Terceiros"
class: marco-civil
statement:
  prose: |
    Art. 19. Com o intuito de assegurar a liberdade de expressão e impedir a
    censura, o provedor de aplicações de internet somente poderá ser
    responsabilizado civilmente por danos decorrentes de conteúdo gerado por
    terceiros se, após ordem judicial específica, não tomar as providências
    para, no âmbito e nos limites técnicos do seu serviço e dentro do prazo
    assinalado, tornar indisponível o conteúdo apontado como infringente,
    ressalvadas as disposições legais em contrário.

    § 1º A ordem judicial de que trata o caput deverá conter, sob pena de nulidade,
    identificação clara e específica do conteúdo apontado como infringente, que
    permita a localização inequívoca do material.

    § 2º A aplicação do disposto neste artigo para infrações a direitos de autor ou
    a direitos conexos depende de previsão legal específica, que deverá respeitar
    a liberdade de expressão e demais garantias previstas no art. 5º da
    Constituição Federal.

    § 3º As causas que versem sobre ressarcimento por danos decorrentes de conteúdos
    disponibilizados na internet relacionados à honra, à reputação ou a direitos
    de personalidade, bem como sobre a indisponibilização desses conteúdos por
    provedores de aplicações de internet, poderão ser apresentadas perante os
    juizados especiais.

    § 4º O juiz, inclusive no procedimento previsto no § 3º, poderá antecipar,
    total ou parcialmente, os efeitos da tutela pretendida no pedido inicial,
    existindo prova inequívoca do fato e considerado o interesse da coletividade
    na disponibilização do conteúdo na internet, desde que presentes os requisitos
    de verossimilhança da alegação autoral e de fundado receio de dano irreparável
    ou de difícil reparação.
guidance:
  prose: |
    Este e o artigo mais litigado do Marco Civil. Estabelece o modelo de
    "notice and takedown judicial" brasileiro, diferente do modelo americano
    (DMCA) que permite notice extrajudicial.

    O provedor de aplicacao so responde APOS ordem judicial especifica nao
    cumprida. Antes da ordem judicial, a responsabilidade e exclusiva do
    autor do conteudo.

    Requisitos da ordem judicial: identificacao clara e especifica do conteudo
    (URL, post, etc.) que permita localizacao inequivoca.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Sistema de content moderation com workflow de compliance judicial.
      2. API para recebimento e processamento de ordens judiciais.
      3. Capacidade tecnica de tornar conteudo especifico indisponivel.
      4. Logging completo de acoes de moderacao com timestamps.
      5. Preservacao de evidencia antes da remocao (snapshot).
    tools:
      - content-moderation
      - judicial-api
      - content-archiving
      - audit-logging
  devsecops:
    prose: |
      1. Testes de capacidade de remocao granular de conteudo.
      2. SLA monitoring para cumprimento de prazos judiciais.
    tools:
      - content-removal-tests
      - sla-monitoring
  secops:
    prose: |
      1. Monitoramento de ordens judiciais recebidas e prazos.
      2. Processo de escalacao para ordens urgentes (tutela antecipada).
      3. Preservacao de chain of custody para evidencias.
    tools:
      - judicial-tracking
      - evidence-preservation
      - escalation-workflow
