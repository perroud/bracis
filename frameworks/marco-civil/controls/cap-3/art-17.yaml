id: art-17
family: cap-3
title: "Ressalva do Direito de Ação para Reparação de Danos"
class: marco-civil
statement:
  prose: |
    Art. 17. Ressalvadas as hipóteses previstas nesta Lei, a opção por não guardar
    os registros de acesso a aplicações de internet não implica responsabilidade
    sobre danos decorrentes do uso desses serviços por terceiros.
guidance:
  prose: |
    O art. 17 protege provedores de aplicação que não são obrigados a guardar
    registros (aqueles sem fins econômicos ou que não exercem atividade de forma
    organizada e profissional — exceção ao art. 15).

    **Regra geral:**
    Se o provedor de aplicação não está obrigado a guardar registros pelo art. 15
    (pessoa física, entidade sem fins econômicos, atividade não profissional) e
    opta por não guardar, essa decisão não gera responsabilidade civil por danos
    causados por terceiros usando o serviço.

    **Exceções (hipóteses previstas na lei):**
    - Se houver ordem judicial determinando a guarda (art. 15, §1º), a não
      observância gera responsabilidade.
    - Se houver requisição cautelar (art. 15, §2º), a não observância gera
      responsabilidade.

    **Implicação prática:**
    Projetos open source, blogs pessoais, fóruns comunitários sem fins econômicos
    não são obrigados a manter registros de acesso. Contudo, é recomendável manter
    logs mínimos para segurança própria do serviço.

    **Relação com art. 19:**
    Mesmo sem obrigação de guarda de registros, o provedor pode ser
    responsabilizado por conteúdo de terceiros se, após ordem judicial
    específica, não tomar providências para tornar indisponível o conteúdo
    infringente (art. 19).
implementation_guidance:
  platform_engineering:
    prose: |
      **Para provedores não obrigados pelo art. 15:**
      1. Documentar formalmente a decisão de não guardar registros de acesso,
         com justificativa legal (não se enquadra no art. 15, caput).
      2. Mesmo sem obrigação, considerar logging mínimo para segurança:
         logs de autenticação e tentativas de acesso não autorizado.
      3. Implementar mecanismo para ativar logging sob demanda caso
         receba ordem judicial (art. 15, §1º).

      **Para provedores obrigados pelo art. 15:**
      4. Este artigo não se aplica — manter conformidade integral com art. 15.

      **Capacidade de resposta judicial:**
      5. Mesmo sem obrigação de guarda, manter canal de recebimento de
         notificações judiciais acessível e documentado.
    tools:
      - logging-framework
      - judicial-notification-channel
      - policy-documentation
  devsecops:
    prose: |
      **Validação de enquadramento:**
      1. Checklist automatizado para determinar se a aplicação se enquadra
         no art. 15 (fins econômicos, pessoa jurídica, atividade organizada).
      2. Se não se enquadra: validar que a documentação de isenção existe.
      3. Se se enquadra: validar conformidade com art. 15.

      **Capacidade de ativação:**
      4. Teste de que o sistema de logging pode ser ativado sob demanda
         em resposta a ordem judicial.
    tools:
      - compliance-checklist
      - logging-activation-test
      - documentation-validator
  secops:
    prose: |
      **Gestão de risco:**
      1. Avaliação periódica de se o serviço mudou de status (de não
         econômico para econômico) e agora se enquadra no art. 15.
      2. Monitoramento de notificações judiciais que possam alterar a
         obrigação de guarda.

      **Documentação:**
      3. Manter registro atualizado do enquadramento legal do serviço.
      4. Documentar decisões sobre guarda ou não de registros.
    tools:
      - legal-compliance-tracker
      - notification-monitoring
      - risk-assessment
