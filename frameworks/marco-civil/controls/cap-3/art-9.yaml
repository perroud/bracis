id: art-9
family: cap-3
title: "Neutralidade de Rede"
class: marco-civil
statement:
  prose: |
    Art. 9º O responsável pela transmissão, comutação ou roteamento tem o dever
    de tratar de forma isonômica quaisquer pacotes de dados, sem distinção por
    conteúdo, origem e destino, serviço, terminal ou aplicação.

    § 1º A discriminação ou degradação do tráfego será regulamentada nos termos das
    atribuições privativas do Presidente da República previstas no inciso IV do
    art. 84 da Constituição Federal, para a fiel execução desta Lei, ouvidos o
    Comitê Gestor da Internet e a Agência Nacional de Telecomunicações, e somente
    poderá decorrer de:

    I - requisitos técnicos indispensáveis à prestação adequada dos serviços e
    aplicações; e

    II - priorização de serviços de emergência.

    § 2º Na hipótese de discriminação ou degradação do tráfego prevista no § 1º, o
    responsável mencionado no caput deve:

    I - abster-se de causar dano aos usuários, na forma do art. 927 da Lei
    nº 10.406, de 10 de janeiro de 2002 - Código Civil;

    II - agir com proporcionalidade, transparência e isonomia;

    III - informar previamente de modo transparente, claro e suficientemente
    descritivo aos seus usuários sobre as práticas de gerenciamento e mitigação
    de tráfego adotadas, inclusive as relacionadas à segurança da rede; e

    IV - oferecer serviços em condições comerciais não discriminatórias e
    abster-se de praticar condutas anticoncorrenciais.

    § 3º Na provisão de conexão à internet, onerosa ou gratuita, bem como na
    transmissão, comutação ou roteamento, é vedado bloquear, monitorar, filtrar
    ou analisar o conteúdo dos pacotes de dados, respeitado o disposto neste artigo.
guidance:
  prose: |
    A neutralidade de rede e um dos principios fundamentais do Marco Civil.
    Provedores de conexao e infraestrutura NAO podem discriminar trafego.

    Excecoes limitadas: requisitos tecnicos indispensaveis e servicos de emergencia.
    Qualquer gerenciamento de trafego deve ser transparente e proporcional.

    Deep Packet Inspection (DPI) para fins de discriminacao de conteudo e vedada.
    DPI para fins de seguranca (deteccao de malware, DDoS) e permitida desde
    que transparente e proporcional.
implementation_guidance:
  platform_engineering:
    prose: |
      1. QoS configurado de forma isonomica por classe de servico, nao por conteudo.
      2. Nenhum traffic shaping baseado em tipo de aplicacao ou origem.
      3. Documentacao publica de praticas de gerenciamento de trafego.
      4. Load balancing sem discriminacao por conteudo.
    tools:
      - network-policy
      - qos-management
      - traffic-documentation
  devsecops:
    prose: |
      1. Testes de neutralidade em configuracoes de rede.
      2. Validacao automatizada de network policies para garantir isonomia.
      3. Auditoria de regras de firewall para detectar discriminacao.
    tools:
      - network-policy-validator
      - firewall-auditor
  secops:
    prose: |
      1. Monitoramento de trafego para detectar discriminacao inadvertida.
      2. Relatorios de transparencia sobre gerenciamento de trafego.
      3. DPI permitido apenas para seguranca, com logs de justificativa.
    tools:
      - network-monitoring
      - transparency-reports
      - ids-ips
