id: art-15
family: cap-3
title: "Guarda de Registros de Acesso a Aplicacoes de Internet"
class: marco-civil
statement:
  prose: |
    Art. 15. O provedor de aplicações de internet constituído na forma de pessoa
    jurídica e que exerça essa atividade de forma organizada, profissionalmente e
    com fins econômicos deverá manter os respectivos registros de acesso a
    aplicações de internet, sob sigilo, em ambiente controlado e de segurança,
    pelo prazo de 6 (seis) meses, nos termos do regulamento.

    § 1º Ordem judicial poderá obrigar, por tempo certo, os provedores de aplicações
    de internet que não estão sujeitos ao disposto no caput a guardarem registros
    de acesso a aplicações de internet, desde que se trate de registros relativos
    a fatos específicos em período determinado.

    § 2º A autoridade policial ou administrativa ou o Ministério Público poderão
    requerer cautelarmente a qualquer provedor de aplicações de internet que os
    registros de acesso a aplicações de internet sejam guardados, inclusive por
    prazo superior ao previsto no caput, observado o disposto nos §§ 3º
    e 4º do art. 13.

    § 3º Em qualquer hipótese, a disponibilização ao requerente dos registros de
    que trata este artigo deverá ser precedida de autorização judicial, conforme
    disposto na Seção IV deste Capítulo.

    § 4º Na aplicação de sanções pelo descumprimento ao disposto neste artigo,
    serão considerados a natureza e a gravidade da infração, os danos dela
    resultantes, eventual vantagem auferida pelo infrator, as circunstâncias
    agravantes, os antecedentes do infrator e a reincidência.
guidance:
  prose: |
    Obrigacao de retencao de registros de acesso por 6 meses para provedores
    de aplicacoes com fins economicos. "Registros de acesso a aplicacoes" =
    data/hora de uso de aplicacao (definido no art. 5, VIII).

    Diferente do art. 13 (conexao = 1 ano), aqui o prazo e 6 meses.
    Aplicavel a qualquer empresa que opere aplicacao de internet com fins economicos.
    Provedores sem fins economicos podem ser obrigados por ordem judicial.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Sistema de logging centralizado com retencao minima de 6 meses.
      2. Registros devem incluir: data/hora, IP de origem, identificador de sessao.
      3. Armazenamento em ambiente controlado com criptografia.
      4. Politica de retencao automatizada (lifecycle management).
      5. Capacidade de estender retencao por ordem cautelar.
    tools:
      - centralized-logging
      - log-lifecycle-management
      - kms
      - worm-storage
  devsecops:
    prose: |
      1. Validacao de que todos os endpoints geram registros de acesso.
      2. Testes de retencao (minimo 6 meses).
      3. Auditoria de completude dos registros.
    tools:
      - log-completeness-tests
      - retention-validator
      - endpoint-auditor
  secops:
    prose: |
      1. Monitoramento de integridade dos registros de acesso.
      2. Alertas para falhas no sistema de logging.
      3. Processo de atendimento a requisicoes cautelares.
    tools:
      - siem
      - log-monitoring
      - judicial-workflow
