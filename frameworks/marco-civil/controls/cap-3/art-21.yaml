id: art-21
family: cap-3
title: "Responsabilidade Subsidiaria por Conteudo Infringente"
class: marco-civil
statement:
  prose: |
    Art. 21. O provedor de aplicações de internet que disponibilize conteúdo
    gerado por terceiros será responsabilizado subsidiariamente pela violação
    da intimidade decorrente da divulgação, sem autorização de seus participantes,
    de imagens, de vídeos ou de outros materiais contendo cenas de nudez ou de
    atos sexuais de caráter privado quando, após o recebimento de notificação
    pelo participante ou seu representante legal, deixar de promover, de forma
    diligente, no âmbito e nos limites técnicos do seu serviço, a
    indisponibilização desse conteúdo.

    Parágrafo único. A notificação prevista no caput deverá conter, sob pena de
    nulidade, elementos que permitam a identificação específica do material
    apontado como violador da intimidade do participante e a verificação da
    legitimidade para apresentação do pedido.
guidance:
  prose: |
    Excecao ao art. 19: para conteudo intimo nao consensual (revenge porn),
    NAO e necessaria ordem judicial. Basta notificacao do participante.

    O provedor deve agir de forma "diligente" apos notificacao. Nao ha prazo
    especifico definido na lei, mas a jurisprudencia tem considerado 24-48h
    como razoavel.

    Este artigo foi reforçado pela Lei 13.718/2018 que tipificou a divulgacao
    de cena de estupro ou de cena de estupro de vulneravel, de cena de sexo
    ou de pornografia.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Canal de denúncia especifico para conteudo intimo nao consensual.
      2. Processo de verificacao de legitimidade do denunciante.
      3. Remocao acelerada (SLA 24h) apos verificacao.
      4. Hash matching (PhotoDNA, etc.) para prevenir re-upload.
      5. Preservacao de evidencia para fins legais antes da remocao.
    tools:
      - abuse-reporting
      - hash-matching
      - content-moderation
      - evidence-preservation
  devsecops:
    prose: |
      1. Testes de SLA de remocao para conteudo intimo.
      2. Validacao do canal de denúncia no pipeline.
    tools:
      - sla-tests
      - reporting-channel-tests
  secops:
    prose: |
      1. Monitoramento de denuncias recebidas e tempo de resposta.
      2. Escalacao automatica para SLA critico.
      3. Coordenacao com autoridades para investigacao criminal.
    tools:
      - incident-tracking
      - sla-monitoring
      - law-enforcement-coordination
