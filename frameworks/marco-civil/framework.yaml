    control_count: 5
  - id: cap-2
    title: "Dos Direitos e Garantias dos Usuários"
    description: "Direitos fundamentais dos usuários de internet, incluindo privacidade, sigilo e não fornecimento de dados a terceiros"
    articles: "art. 7º ao art. 8º"
    control_count: 2
  - id: cap-3
    title: "Da Provisão de Conexão e de Aplicações de Internet"
    description: "Neutralidade de rede, proteção de registros e dados pessoais, guarda de registros de conexão e de acesso, responsabilidade por danos decorrentes de conteúdo gerado por terceiros"
    articles: "art. 9º ao art. 21"
