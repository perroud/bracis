related_frameworks:
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD (Lei nº 13.709/2018) complementa o Marco Civil ao regulamentar
      especificamente o tratamento de dados pessoais, detalhando bases legais,
      direitos dos titulares e obrigações dos agentes de tratamento.
  - framework_id: gdpr
    relationship: mapped
    description: "O GDPR da União Europeia possui equivalências em proteção de dados pessoais e privacidade online, sendo referência internacional mapeada aos dispositivos do Marco Civil."
  - framework_id: bacen-4893
    relationship: complements
    description: >-
      A Resolução BCB nº 4.893/2021 complementa o Marco Civil no setor
      financeiro, estabelecendo requisitos específicos de segurança cibernética
      e guarda de registros para instituições financeiras.
