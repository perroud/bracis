control_families:
  - id: cap-1
    title: "Disposições Preliminares"
    description: "Objeto, âmbito de aplicação, fundamentos, definições e princípios"
    articles: "art. 1º ao art. 6º"
    control_count: 6
  - id: cap-2
    title: "Do Tratamento de Dados Pessoais"
    description: "Requisitos, bases legais, dados sensíveis, dados de crianças e adolescentes, término do tratamento"
    articles: "art. 7º ao art. 16"
    control_count: 9
  - id: cap-3
    title: "Dos Direitos do Titular"
    description: "Direitos de acesso, correção, eliminação, portabilidade, revogação de consentimento"
    articles: "art. 17 ao art. 22"
    control_count: 6
  - id: cap-4
    title: "Do Tratamento de Dados Pessoais pelo Poder Público"
    description: "Regras específicas para tratamento por entidades públicas"
    articles: "art. 23 ao art. 27"
    control_count: 4
  - id: cap-5
    title: "Da Transferência Internacional de Dados"
    description: "Condições para transferência internacional e mecanismos de adequação"
    articles: "art. 33 ao art. 36"
    control_count: 4
  - id: cap-6
    title: "Dos Agentes de Tratamento de Dados Pessoais"
    description: "Responsabilidades do controlador e operador, encarregado (DPO), relatório de impacto"
    articles: "art. 37 ao art. 45"
    control_count: 8
  - id: cap-7
    title: "Da Segurança e das Boas Práticas"
    description: "Medidas de segurança, governança, comunicação de incidentes"
    articles: "art. 46 ao art. 51"
    control_count: 6
  - id: cap-8
    title: "Da Fiscalização"
    description: "Sanções administrativas e processo sancionador"
    articles: "art. 52 ao art. 54"
    control_count: 3
  - id: cap-9
    title: "Da Autoridade Nacional de Proteção de Dados (ANPD) e do Conselho Nacional de Proteção de Dados Pessoais e da Privacidade"
    description: "Criação, composição, competências e atribuições da ANPD e do CNPDPP — artigos institucionais, não geram controles acionáveis"
    articles: "art. 55-A ao art. 58-B"
    control_count: 0
  - id: cap-10
    title: "Disposições Finais e Transitórias"
    description: "Alterações legislativas, prazos e disposições transitórias — não geram controles acionáveis"
    articles: "art. 59 ao art. 65"
    control_count: 0
related_frameworks:
  - framework_id: gdpr
    relationship: derived-from
    description: >-
      A LGPD foi inspirada no Regulamento Geral sobre a Proteção de Dados
      (GDPR) da União Europeia, compartilhando princípios fundamentais como
      bases legais, direitos dos titulares e a figura do encarregado (DPO).
    mapping_file: "mappings/lgpd_to_gdpr.yaml"
  - framework_id: marco-civil
    relationship: complements
    description: >-
      O Marco Civil da Internet (Lei nº 12.965/2014) estabelece princípios,
      garantias, direitos e deveres para o uso da Internet no Brasil, sendo
      complementado pela LGPD na proteção de dados pessoais.
  - framework_id: bacen-4893
    relationship: complements
    description: "A Resolução BCB nº 4.893/2021 dispõe sobre a política de segurança cibernética para instituições financeiras, complementando a LGPD no setor financeiro."
