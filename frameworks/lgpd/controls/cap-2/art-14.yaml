id: art-14
family: cap-2
title: "Tratamento de Dados Pessoais de Crianças e Adolescentes"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 14. O tratamento de dados pessoais de crianças e de adolescentes deverá ser
    realizado em seu melhor interesse, nos termos deste artigo e da legislação pertinente.
  parts:
    - id: art-14-p1
      label: "§ 1º"
      prose: |
        O tratamento de dados pessoais de crianças deverá ser realizado com o consentimento
        específico e em destaque dado por pelo menos um dos pais ou pelo responsável legal.
    - id: art-14-p2
      label: "§ 2º"
      prose: |
        No tratamento de dados de que trata o § 1º deste artigo, os controladores deverão
        manter pública a informação sobre os tipos de dados coletados, a forma de sua
        utilização e os procedimentos para o exercício dos direitos a que se refere o art. 18
        desta Lei.
    - id: art-14-p3
      label: "§ 3º"
      prose: |
        Poderão ser coletados dados pessoais de crianças sem o consentimento a que se refere
        o § 1º deste artigo quando a coleta for necessária para contatar os pais ou o
        responsável legal, utilizados uma única vez e sem armazenamento, ou para sua proteção,
        e em nenhum caso poderão ser repassados a terceiro sem o consentimento de que trata
        o § 1º deste artigo.
    - id: art-14-p4
      label: "§ 4º"
      prose: |
        Os controladores não deverão condicionar a participação dos titulares de que trata
        o § 1º deste artigo em jogos, aplicações de internet ou outras atividades ao
        fornecimento de informações pessoais além das estritamente necessárias à atividade.
    - id: art-14-p5
      label: "§ 5º"
      prose: |
        O controlador deve realizar todos os esforços razoáveis para verificar que o
        consentimento a que se refere o § 1º deste artigo foi dado pelo responsável pela
        criança, consideradas as tecnologias disponíveis.
    - id: art-14-p6
      label: "§ 6º"
      prose: |
        As informações sobre o tratamento de dados referidas neste artigo deverão ser
        fornecidas de maneira simples, clara e acessível, consideradas as características
        físico-motoras, perceptivas, sensoriais, intelectuais e mentais do usuário, com
        uso de recursos audiovisuais quando adequado, de forma a proporcionar a informação
        necessária aos pais ou ao responsável legal e adequada ao entendimento da criança.
guidance:
  prose: |
    O art. 14 estabelece regime especial de proteção reforçada para dados de crianças
    (até 12 anos incompletos, conforme o ECA) e adolescentes (12 a 18 anos). O princípio
    orientador é o "melhor interesse da criança", que prevalece sobre qualquer outro
    interesse.

    **Consentimento parental (§ 1º):**
    Obrigatório para crianças. Deve ser "específico e em destaque", ou seja, não pode
    estar diluído em termos de uso genéricos. Pelo menos um dos pais ou responsável
    legal deve consentir.

    **Verificação de idade e parentesco (§ 5º):**
    O controlador deve fazer "esforços razoáveis" para verificar que quem consentiu é
    de fato o responsável. A LGPD adota padrão de razoabilidade, não de certeza absoluta.
    Métodos aceitos incluem: verificação por cartão de crédito, documento de identidade,
    confirmação por e-mail parental, videoconferência.

    **Proibição de condicionamento (§ 4º):**
    Jogos, aplicativos e serviços não podem exigir dados além do estritamente necessário
    para funcionar. Padrões de dark patterns que induzem crianças a fornecer mais dados
    são vedados.

    **Linguagem acessível (§ 6º):**
    Avisos de privacidade para crianças devem usar linguagem simples, recursos visuais
    e considerar a capacidade cognitiva do público-alvo. Textos legais padrão são
    insuficientes.

    **Referência cruzada com COPPA (EUA) e GDPR art. 8:**
    A LGPD segue abordagem semelhante à COPPA e ao GDPR quanto à proteção de menores,
    mas com particularidades brasileiras (divisão criança/adolescente do ECA).
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar age gate/verificação de idade no cadastro com fluxo específico
         para menores de 18 anos e reforçado para menores de 12 anos.
      2. Criar fluxo de consentimento parental com verificação razoável de identidade
         do responsável (e-mail parental, documento, cartão de crédito).
      3. Implementar data minimization rigorosa para perfis de menores — coletar apenas
         o estritamente necessário para o serviço.
      4. Criar interface de privacidade adaptada para crianças com linguagem simples,
         ícones e recursos audiovisuais (§ 6º).
      5. Implementar controles parentais que permitam aos responsáveis visualizar,
         corrigir e eliminar dados da criança.
      6. Bloquear compartilhamento de dados de menores com terceiros sem consentimento
         parental específico.
      7. Implementar flag de "menor de idade" no perfil do usuário que ative
         automaticamente controles adicionais de privacidade.
    tools:
      - age-verification-service
      - parental-consent-workflow
      - consent-management-platform
      - privacy-ux-toolkit
      - data-classification
  devsecops:
    prose: |
      1. Validar no pipeline que telas destinadas a menores possuem verificação de
         idade e consentimento parental implementados.
      2. Testar que dados de menores não são compartilhados com terceiros sem
         consentimento parental.
      3. Implementar testes automatizados para verificar minimização de dados em
         perfis de menores.
      4. Validar que dark patterns não são utilizados em interfaces para menores
         (ex.: pré-seleção de checkboxes, linguagem manipulativa).
      5. Scan de código para detectar coleta de dados não essenciais em fluxos
         destinados a menores.
    tools:
      - accessibility-testing
      - ui-testing
      - data-flow-analysis
      - compliance-as-code
  secops:
    prose: |
      1. Monitorar acessos a dados de menores com alertas reforçados.
      2. Auditar periodicamente que dados de menores não estão sendo compartilhados
         sem consentimento parental válido.
      3. Verificar que consentimentos parentais estão dentro do prazo de validade
         e são revogáveis.
      4. Monitorar tentativas de criação de contas por menores sem consentimento
         parental.
    tools:
      - siem
      - data-discovery
      - consent-audit
      - access-monitoring
