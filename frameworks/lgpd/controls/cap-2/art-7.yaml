id: art-7
family: cap-2
title: "Bases Legais para o Tratamento de Dados Pessoais"
class: LGPD
statement:
  prose: |
    Art. 7º O tratamento de dados pessoais somente poderá ser realizado nas seguintes
    hipóteses:
  parts:
    - id: art-7-i
      label: "I"
      prose: |
        mediante o fornecimento de consentimento pelo titular;
    - id: art-7-ii
      label: "II"
      prose: |
        para o cumprimento de obrigação legal ou regulatória pelo controlador;
    - id: art-7-iii
      label: "III"
      prose: |
        pela administração pública, para o tratamento e uso compartilhado de dados
        necessários à execução de políticas públicas previstas em leis e regulamentos
        ou respaldadas em contratos, convênios ou instrumentos congêneres, observadas
        as disposições do Capítulo IV desta Lei;
    - id: art-7-iv
      label: "IV"
      prose: |
        para a realização de estudos por órgão de pesquisa, garantida, sempre que
        possível, a anonimização dos dados pessoais;
    - id: art-7-v
      label: "V"
      prose: |
        quando necessário para a execução de contrato ou de procedimentos preliminares
        relacionados a contrato do qual seja parte o titular, a pedido do titular dos
        dados;
    - id: art-7-vi
      label: "VI"
      prose: |
        para o exercício regular de direitos em processo judicial, administrativo ou
        arbitral, esse último nos termos da Lei nº 9.307, de 23 de setembro de 1996
        (Lei de Arbitragem);
    - id: art-7-vii
      label: "VII"
      prose: |
        para a proteção da vida ou da incolumidade física do titular ou de terceiro;
    - id: art-7-viii
      label: "VIII"
      prose: |
        para a tutela da saúde, exclusivamente, em procedimento realizado por
        profissionais de saúde, serviços de saúde ou autoridade sanitária;
    - id: art-7-ix
      label: "IX"
      prose: |
        quando necessário para atender aos interesses legítimos do controlador ou de
        terceiro, exceto no caso de prevalecerem direitos e liberdades fundamentais do
        titular que exijam a proteção dos dados pessoais;
    - id: art-7-x
      label: "X"
      prose: |
        para a proteção do crédito, inclusive quanto ao disposto na legislação pertinente.
  additional:
    - id: art-7-p3
      label: "§ 3º"
      prose: |
        O tratamento de dados pessoais cujo acesso é público deve considerar a finalidade,
        a boa-fé e o interesse público que justificaram sua disponibilização.
    - id: art-7-p4
      label: "§ 4º"
      prose: |
        É dispensada a exigência do consentimento previsto no caput deste artigo para os
        dados tornados manifestamente públicos pelo titular, resguardados os direitos do
        titular e os princípios previstos nesta Lei.
    - id: art-7-p5
      label: "§ 5º"
      prose: |
        O controlador que obteve o consentimento referido no inciso I do caput deste artigo
        que necessitar comunicar ou compartilhar dados pessoais com outros controladores
        deverá obter consentimento específico do titular para esse fim, ressalvadas as
        hipóteses de dispensa do consentimento previstas nesta Lei.
    - id: art-7-p6
      label: "§ 6º"
      prose: |
        A eventual dispensa da exigência do consentimento não desobriga os agentes de
        tratamento das demais obrigações previstas nesta Lei, especialmente da observância
        dos princípios gerais e da garantia dos direitos do titular.
    - id: art-7-p7
      label: "§ 7º"
      prose: |
        O tratamento posterior dos dados pessoais a que se referem os §§ 3º e 4º deste
        artigo poderá ser realizado para novas finalidades, desde que observados os
        propósitos legítimos e específicos para o novo tratamento e a preservação dos
        direitos do titular, assim como os fundamentos e os princípios previstos nesta Lei.
guidance:
  prose: |
    O art. 7º é o coração operacional da LGPD. Nenhum tratamento de dados pessoais
    é lícito sem enquadramento em pelo menos uma das dez bases legais.

    **Bases legais mais utilizadas na engenharia de software:**

    1. **Consentimento (I):** Para marketing, cookies não essenciais, compartilhamento
       com terceiros. Deve ser granular, específico e revogável a qualquer momento.

    2. **Obrigação legal (II):** Retenção fiscal, registros trabalhistas, KYC/AML em
       instituições financeiras. Não requer consentimento.

    3. **Execução de contrato (V):** Base mais comum para SaaS. Processar dados
       necessários para entregar o serviço contratado. Ex.: processar pagamento,
       entregar produto, suporte técnico.

    4. **Legítimo interesse (IX):** Base mais flexível, porém exige teste de
       proporcionalidade (LIA - Legitimate Interest Assessment). O controlador deve
       demonstrar que seus interesses não prevalecem sobre os direitos do titular.
       Ex.: prevenção a fraude, segurança de rede.

    5. **Proteção do crédito (X):** Exclusiva da LGPD (não existe no GDPR). Permite
       tratamento para análise de crédito, scoring, bureaus de crédito.

    **Diferenças importantes em relação ao GDPR:**
    - A LGPD possui 10 bases legais (GDPR tem 6).
    - A LGPD inclui "proteção do crédito" como base legal autônoma.
    - A LGPD inclui "estudos por órgão de pesquisa" como base legal específica.

    **§ 5º — Compartilhamento:** Compartilhar dados com outro controlador exige
    consentimento ESPECÍFICO adicional, salvo quando aplicável outra base legal.
    Isso impacta diretamente integrações com terceiros e APIs.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar Consent Management Platform (CMP) com granularidade por finalidade.
      2. Criar sistema de registro de bases legais por tratamento (ROPA automatizado).
      3. Para cada endpoint de API que coleta dados pessoais, documentar a base legal.
      4. Implementar mecanismo de revogação de consentimento com propagação em cascata.
      5. Criar workflow de aprovação para novos tratamentos com validação de base legal.
      6. Implementar controle de compartilhamento com terceiros (§ 5º) com consentimento
         específico ou validação de base legal alternativa.
    tools:
      - consent-management-platform
      - ropa-system
      - api-gateway-with-purpose-limitation
      - workflow-engine
  devsecops:
    prose: |
      1. Implementar validação no pipeline que todo endpoint de coleta de dados pessoais
         tenha base legal documentada.
      2. Criar testes automatizados para verificar que consentimento é coletado antes
         de tratamentos que exigem essa base legal.
      3. Validar que integrações com terceiros possuem consentimento específico ou
         base legal alternativa documentada.
      4. Implementar feature flags para desabilitar tratamentos cuja base legal seja
         questionada ou revogada.
    tools:
      - api-documentation-linter
      - integration-testing
      - feature-flags
      - compliance-as-code
  secops:
    prose: |
      1. Monitorar tratamentos de dados e validar conformidade com base legal registrada.
      2. Alertar sobre tratamentos sem base legal documentada.
      3. Auditar revogações de consentimento para garantir cessação efetiva do tratamento.
      4. Monitorar compartilhamentos com terceiros e validar bases legais.
    tools:
      - siem
      - data-lineage
      - consent-audit
      - third-party-risk-management
legal_references:
  - framework_id: gdpr
    articles: ["art. 6"]
    relationship: equivalent-to
