id: art-11
family: cap-2
title: "Tratamento de Dados Pessoais Sensíveis"
class: LGPD
statement:
  prose: |
    Art. 11. O tratamento de dados pessoais sensíveis somente poderá ocorrer nas
    seguintes hipóteses:
  parts:
    - id: art-11-i
      label: "I"
      prose: |
        quando o titular ou seu responsável legal consentir, de forma específica e
        destacada, para finalidades específicas;
    - id: art-11-ii
      label: "II"
      prose: |
        sem fornecimento de consentimento do titular, nas hipóteses em que for
        indispensável para:
    - id: art-11-ii-a
      label: "a)"
      prose: |
        cumprimento de obrigação legal ou regulatória pelo controlador;
    - id: art-11-ii-b
      label: "b)"
      prose: |
        tratamento compartilhado de dados necessários à execução, pela administração
        pública, de políticas públicas previstas em leis ou regulamentos;
    - id: art-11-ii-c
      label: "c)"
      prose: |
        realização de estudos por órgão de pesquisa, garantida, sempre que possível,
        a anonimização dos dados pessoais sensíveis;
    - id: art-11-ii-d
      label: "d)"
      prose: |
        exercício regular de direitos, inclusive em contrato e em processo judicial,
        administrativo e arbitral, este último nos termos da Lei nº 9.307, de 23 de
        setembro de 1996 (Lei de Arbitragem);
    - id: art-11-ii-e
      label: "e)"
      prose: |
        proteção da vida ou da incolumidade física do titular ou de terceiro;
    - id: art-11-ii-f
      label: "f)"
      prose: |
        tutela da saúde, exclusivamente, em procedimento realizado por profissionais
        de saúde, serviços de saúde ou autoridade sanitária; ou
    - id: art-11-ii-g
      label: "g)"
      prose: |
        garantia da prevenção à fraude e à segurança do titular, nos processos de
        identificação e autenticação de cadastro em sistemas eletrônicos, resguardados
        os direitos mencionados no art. 9º desta Lei e exceto no caso de prevalecerem
        direitos e liberdades fundamentais do titular que exijam a proteção dos dados
        pessoais.
  additional:
    - id: art-11-p1
      label: "§ 1º"
      prose: |
        Aplica-se o disposto neste artigo a qualquer tratamento de dados pessoais que
        revele dados pessoais sensíveis e que possa causar dano ao titular, ressalvado
        o disposto em legislação específica.
    - id: art-11-p2
      label: "§ 2º"
      prose: |
        Nos casos de aplicação do disposto nas alíneas "a" e "b" do inciso II do caput
        deste artigo pelos órgãos e pelas entidades públicas, será dada publicidade à
        referida dispensa de consentimento, nos termos do inciso I do caput do art. 23
        desta Lei.
    - id: art-11-p3
      label: "§ 3º"
      prose: |
        A comunicação ou o uso compartilhado de dados pessoais sensíveis entre
        controladores com objetivo de obter vantagem econômica poderá ser objeto de
        vedação ou de regulamentação por parte da autoridade nacional, ouvidos os
        órgãos setoriais do Poder Público, no âmbito de suas competências.
guidance:
  prose: |
    O art. 11 impõe regime de proteção reforçado para dados sensíveis. As bases legais
    são mais restritas que as do art. 7º:

    **Bases legais excluídas para dados sensíveis:**
    - Legítimo interesse (art. 7º, IX) — NÃO é base legal para dados sensíveis.
    - Proteção do crédito (art. 7º, X) — NÃO é base legal para dados sensíveis.
    - Execução de contrato (art. 7º, V) — NÃO é base legal para dados sensíveis.

    **Base legal exclusiva para dados sensíveis:**
    - Prevenção à fraude em autenticação (art. 11, II, g) — Permite uso de biometria
      para autenticação, com teste de proporcionalidade.

    **Implicações técnicas:**

    1. **Dados biométricos:** Facial recognition, fingerprint, íris — todos são sensíveis.
       Uso em autenticação permitido pela alínea "g", mas exige medidas adicionais.

    2. **Dados de saúde:** Apenas profissionais de saúde, serviços de saúde ou autoridade
       sanitária podem tratar dados de saúde para tutela da saúde.

    3. **Consentimento específico e destacado:** Não basta consentimento genérico. Deve
       ser separado dos demais consentimentos, com destaque visual e linguagem clara.

    4. **§ 3º — Compartilhamento comercial:** A ANPD pode proibir compartilhamento de
       dados sensíveis entre controladores para vantagem econômica. Risco regulatório alto.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar classificação automática de dados sensíveis com labels específicos.
      2. Criptografia em repouso obrigatória para dados sensíveis (AES-256 ou superior).
      3. Controle de acesso granular com princípio do menor privilégio para dados sensíveis.
      4. Consentimento específico e destacado em interface separada para dados sensíveis.
      5. Segregação lógica ou física de bancos de dados sensíveis.
      6. Auditoria completa de todos os acessos a dados sensíveis.
      7. Para biometria em autenticação: implementar teste de proporcionalidade documentado.
    tools:
      - data-classification
      - encryption-at-rest
      - rbac-abac
      - consent-management-platform
      - database-activity-monitoring
      - hsm
  devsecops:
    prose: |
      1. Scan automático para detectar dados sensíveis em código, logs e artefatos.
      2. Bloquear commits que contenham dados sensíveis hardcoded.
      3. Validar que dados sensíveis não aparecem em logs de aplicação.
      4. Implementar testes de criptografia para dados sensíveis em repouso e trânsito.
      5. Code review obrigatório para qualquer código que trate dados sensíveis.
    tools:
      - pii-scanner
      - secret-detection
      - log-sanitizer
      - encryption-testing
      - mandatory-code-review
  secops:
    prose: |
      1. Monitoramento em tempo real de acessos a dados sensíveis com alertas.
      2. DLP para prevenir exfiltração de dados sensíveis.
      3. Resposta a incidentes com prioridade máxima para vazamento de dados sensíveis.
      4. Auditoria trimestral de acessos a dados sensíveis.
    tools:
      - siem
      - dlp
      - soar
      - database-activity-monitoring
