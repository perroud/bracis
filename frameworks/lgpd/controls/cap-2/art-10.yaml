id: art-10
family: cap-2
title: "Legítimo Interesse do Controlador"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 10. O legítimo interesse do controlador somente poderá fundamentar tratamento de
    dados pessoais para finalidades legítimas, consideradas a partir de situações concretas,
    que incluem, mas não se limitam a:
  parts:
    - id: art-10-i
      label: "I"
      prose: |
        apoio e promoção de atividades do controlador;
    - id: art-10-ii
      label: "II"
      prose: |
        proteção, em relação ao titular, do exercício regular de seus direitos ou prestação
        de serviços que o beneficiem, respeitadas as legítimas expectativas dele e os
        direitos e liberdades fundamentais, nos termos desta Lei.
  additional:
    - id: art-10-p1
      label: "§ 1º"
      prose: |
        Quando o tratamento for baseado no legítimo interesse do controlador, somente os
        dados pessoais estritamente necessários para a finalidade pretendida poderão ser
        tratados.
    - id: art-10-p2
      label: "§ 2º"
      prose: |
        O controlador deverá adotar medidas para garantir a transparência do tratamento
        de dados baseado em seu legítimo interesse.
    - id: art-10-p3
      label: "§ 3º"
      prose: |
        A autoridade nacional poderá solicitar ao controlador relatório de impacto à
        proteção de dados pessoais, quando o tratamento tiver como fundamento seu interesse
        legítimo, observados os segredos comercial e industrial.
guidance:
  prose: |
    O art. 10 regulamenta a base legal do legítimo interesse (art. 7º, IX), que é a mais
    flexível, mas também a que exige maior diligência por parte do controlador.

    **Teste de Legítimo Interesse (LIA — Legitimate Interest Assessment):**
    Embora a LGPD não descreva formalmente o LIA, a doutrina e a prática internacional
    (GDPR, WP29 Opinion 06/2014) estabelecem três etapas:
    1. **Teste de finalidade:** A finalidade é legítima, concreta e não abstrata?
    2. **Teste de necessidade:** Os dados tratados são estritamente necessários (§ 1º)?
       O princípio da minimização é reforçado aqui.
    3. **Teste de balanceamento:** Os interesses do controlador prevalecem sobre os
       direitos e liberdades fundamentais do titular? Considerar legítimas expectativas
       do titular.

    **Exemplos práticos de legítimo interesse:**
    - Prevenção a fraude em transações financeiras
    - Segurança de redes e sistemas (detecção de intrusão, firewall)
    - Marketing direto a clientes existentes (com opt-out)
    - Monitoramento de empregados em equipamentos corporativos (com transparência)

    **NÃO é legítimo interesse:**
    - Tratamento de dados sensíveis (art. 11 exige bases legais específicas)
    - Perfilamento discriminatório
    - Compartilhamento massivo com terceiros sem transparência

    **§ 1º — Minimização reforçada:** Diferente de outras bases legais, no legítimo
    interesse a LGPD exige explicitamente que SOMENTE dados estritamente necessários
    sejam tratados. Esse é o nível mais alto de minimização da lei.

    **§ 3º — RIPD:** A ANPD pode exigir Relatório de Impacto à Proteção de Dados
    Pessoais (RIPD/DPIA) quando a base legal for legítimo interesse. Manter o RIPD
    atualizado é uma boa prática preventiva.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar framework de Legitimate Interest Assessment (LIA) como workflow
         obrigatório antes de qualquer novo tratamento baseado em legítimo interesse.
      2. Documentar no ROPA (Records of Processing Activities) a justificativa de
         legítimo interesse para cada tratamento, incluindo os três testes (finalidade,
         necessidade, balanceamento).
      3. Implementar minimização de dados reforçada (§ 1º): coletar somente campos
         estritamente necessários, com validação técnica.
      4. Criar mecanismo de opt-out para tratamentos baseados em legítimo interesse,
         especialmente marketing direto.
      5. Manter RIPD (Relatório de Impacto) atualizado e disponível para a ANPD (§ 3º).
    tools:
      - ropa-system
      - lia-assessment-tool
      - data-minimization-engine
      - dpia-tool
      - opt-out-mechanism
  devsecops:
    prose: |
      1. Validar no pipeline que tratamentos baseados em legítimo interesse possuem LIA
         documentado e aprovado.
      2. Implementar testes que verificam minimização de dados: APIs não devem retornar
         campos além do estritamente necessário.
      3. Testar mecanismos de opt-out para garantir que cessam efetivamente o tratamento.
      4. Implementar data field validation para impedir coleta de dados além do escopo
         documentado no LIA.
    tools:
      - api-schema-validation
      - data-minimization-testing
      - compliance-as-code
      - integration-testing
  secops:
    prose: |
      1. Auditar periodicamente LIAs para verificar que o balanceamento de interesses
         permanece válido (mudanças de contexto podem invalidar a avaliação).
      2. Monitorar opt-outs e garantir cessação efetiva do tratamento.
      3. Alertar sobre novos tratamentos baseados em legítimo interesse sem LIA documentado.
      4. Manter evidências de transparência (§ 2º) para demonstração à ANPD.
    tools:
      - compliance-dashboard
      - lia-audit
      - siem
      - evidence-management
legal_references:
