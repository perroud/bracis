id: art-9
family: cap-2
title: "Acesso Facilitado ao Tratamento"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 9º O titular tem direito ao acesso facilitado às informações sobre o tratamento
    de seus dados, que deverão ser disponibilizadas de forma clara, adequada e ostensiva
    acerca de, entre outras características previstas em regulamentação para o atendimento
    do princípio do livre acesso:
  parts:
    - id: art-9-i
      label: "I"
      prose: |
        finalidade específica do tratamento;
    - id: art-9-ii
      label: "II"
      prose: |
        forma e duração do tratamento, observados os segredos comercial e industrial;
    - id: art-9-iii
      label: "III"
      prose: |
        identificação do controlador;
    - id: art-9-iv
      label: "IV"
      prose: |
        informações de contato do controlador;
    - id: art-9-v
      label: "V"
      prose: |
        informações acerca do uso compartilhado de dados pelo controlador e a finalidade;
    - id: art-9-vi
      label: "VI"
      prose: |
        responsabilidades dos agentes que realizarão o tratamento;
    - id: art-9-vii
      label: "VII"
      prose: |
        direitos do titular, com menção explícita aos direitos contidos no art. 18 desta Lei.
  additional:
    - id: art-9-p1
      label: "§ 1º"
      prose: |
        Na hipótese em que o consentimento é requerido, esse será considerado nulo caso as
        informações fornecidas ao titular tenham conteúdo enganoso ou abusivo ou não tenham
        sido apresentadas previamente com transparência, de forma clara e inequívoca.
    - id: art-9-p2
      label: "§ 2º"
      prose: |
        Na hipótese em que o consentimento é requerido, se houver mudanças da finalidade
        para o tratamento de dados pessoais não compatíveis com o consentimento original,
        o controlador deverá informar previamente o titular sobre as mudanças de finalidade,
        podendo o titular revogar o consentimento, caso discorde das alterações.
    - id: art-9-p3
      label: "§ 3º"
      prose: |
        Quando o tratamento de dados pessoais for condição para o fornecimento de produto
        ou de serviço ou para o exercício de direito, o titular será informado com destaque
        sobre esse fato e sobre os meios pelos quais poderá exercer os direitos do titular
        elencados no art. 18 desta Lei.
guidance:
  prose: |
    O art. 9º materializa o princípio da transparência (art. 6º, VI) e estabelece o
    conteúdo mínimo obrigatório que deve ser informado ao titular sobre o tratamento de
    seus dados.

    **Requisitos de transparência (incisos I a VII):**
    Toda política de privacidade, termo de uso ou aviso de privacidade deve conter, no
    mínimo, as informações dos sete incisos. A ausência de qualquer um deles torna a
    política de privacidade incompleta e potencialmente em violação da LGPD.

    **Forma clara, adequada e ostensiva:** A informação não pode estar escondida em
    documentos extensos ou em linguagem jurídica inacessível. Deve ser visível, acessível
    e compreensível para o público-alvo. Políticas de privacidade de 50 páginas em
    juridiquês violam esse requisito.

    **§ 1º — Consentimento nulo por informação enganosa:** Se as informações fornecidas
    forem enganosas, abusivas ou não transparentes, o consentimento obtido é nulo. Isso
    invalida retroativamente todo o tratamento baseado nesse consentimento.

    **§ 2º — Mudança de finalidade:** Exige notificação prévia ao titular e direito de
    revogação. Na prática, mudanças de finalidade exigem novo ciclo de consentimento.

    **§ 3º — Tratamento como condição de serviço:** Se o tratamento é condição para o
    serviço (take-it-or-leave-it), o titular deve ser informado com destaque. Isso não
    significa que o tratamento condicionado é proibido, mas que a transparência deve ser
    reforçada.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar política de privacidade estruturada e acessível que cubra todos os
         sete incisos, com linguagem clara e acessível ao público-alvo.
      2. Criar sistema de aviso de privacidade contextual (privacy notices) em pontos de
         coleta de dados, informando finalidade e base legal no momento da coleta.
      3. Implementar mecanismo de notificação para mudanças de finalidade (§ 2º) com
         possibilidade de revogação.
      4. Manter página pública com informações do controlador, contato do DPO/encarregado
         e canais para exercício de direitos.
      5. Para tratamentos condicionantes de serviço (§ 3º), implementar destaque visual
         explícito na interface.
    tools:
      - privacy-policy-generator
      - contextual-privacy-notices
      - notification-service
      - cms
  devsecops:
    prose: |
      1. Validar no pipeline que todo ponto de coleta de dados tenha privacy notice
         associado com as informações dos incisos I a VII.
      2. Implementar testes de acessibilidade para garantir que avisos de privacidade
         sejam legíveis e compreensíveis.
      3. Validar que mudanças em finalidades de tratamento geram alertas para atualização
         de privacy notices.
      4. Testar que links para política de privacidade estão funcionais em todos os
         pontos de coleta.
    tools:
      - accessibility-testing
      - link-validation
      - privacy-notice-linter
      - compliance-as-code
  secops:
    prose: |
      1. Auditar periodicamente políticas de privacidade e privacy notices para verificar
         completude conforme incisos I a VII.
      2. Monitorar mudanças de finalidade e verificar que notificações foram enviadas
         aos titulares afetados.
      3. Auditar que informações sobre compartilhamento com terceiros (inciso V) estão
         atualizadas.
    tools:
      - compliance-dashboard
      - privacy-audit
      - document-management
legal_references:
  - framework_id: gdpr
    articles: ["art. 12", "art. 13", "art. 14"]
    relationship: equivalent-to
