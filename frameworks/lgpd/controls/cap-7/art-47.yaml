id: art-47
family: cap-7
title: "Medidas de Segurança desde a Concepção (Privacy by Design)"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 46, § 2º. As medidas de que trata o caput deste artigo deverão ser observadas
    desde a fase de concepção do produto ou do serviço até a sua execução.

    Art. 47. Os agentes de tratamento ou qualquer outra pessoa que intervenha em uma das
    fases do tratamento obriga-se a garantir a segurança da informação prevista nesta Lei
    em relação aos dados pessoais, mesmo após o seu término.
guidance:
  prose: |
    O art. 47 complementa o art. 46, § 2º, estabelecendo duas obrigações fundamentais:

    **1. Privacy by Design (art. 46, § 2º):**
    Medidas de segurança devem ser incorporadas desde a concepção do produto ou
    serviço. Isso codifica legalmente o princípio de Privacy by Design de Ann
    Cavoukian. Não é aceitável adicionar segurança e privacidade como afterthought.

    **Os 7 princípios fundacionais de Privacy by Design aplicados à LGPD:**
    1. Proativo, não reativo — antecipar e prevenir eventos invasivos de privacidade
    2. Privacidade como padrão (privacy by default) — máxima proteção por default
    3. Privacidade incorporada ao design — não é add-on
    4. Funcionalidade total — soma positiva, não trade-off
    5. Segurança ponta a ponta — proteção completa do ciclo de vida
    6. Visibilidade e transparência — operações verificáveis
    7. Respeito pela privacidade do usuário — centrado no titular

    **2. Obrigação pós-término (art. 47):**
    A obrigação de segurança persiste MESMO APÓS o término do tratamento. Dados em
    backups, logs ou sistemas legados continuam protegidos. Um ex-operador que
    reteve dados (ainda que indevidamente) continua obrigado a protegê-los.

    **"Qualquer pessoa que intervenha":**
    A obrigação não é apenas do controlador e operador. Sub-operadores, colaboradores,
    terceirizados, consultores — qualquer pessoa que tenha acesso aos dados pessoais
    é obrigada a garantir segurança.

    **Equivalência no GDPR:**
    Art. 25 (Data protection by design and by default) e art. 32 (Security of
    processing).
implementation_guidance:
  platform_engineering:
    prose: |
      1. Integrar Privacy Impact Assessment (PIA) ao processo de design de
         novos produtos e funcionalidades — antes de escrever código.
      2. Implementar privacy by default: configurações mais restritivas como
         padrão, dados mínimos coletados, compartilhamento desativado por default.
      3. Adotar threat modeling (STRIDE, PASTA) incluindo ameaças à privacidade
         na fase de arquitetura.
      4. Implementar controles de segurança no ciclo de vida completo: coleta,
         armazenamento, processamento, compartilhamento, eliminação.
      5. Garantir que dados retidos em backups e logs após término do tratamento
         continuam protegidos com controles de acesso e criptografia.
      6. Implementar NDAs e cláusulas de confidencialidade para todos que
         intervêm no tratamento (colaboradores, terceirizados, consultores).
    tools:
      - privacy-impact-assessment
      - threat-modeling
      - secure-sdlc
      - encryption
      - access-control
      - nda-management
  devsecops:
    prose: |
      1. Implementar security gates no início do pipeline (shift-left security):
         análise de ameaças e PIA antes do desenvolvimento.
      2. Criar checklist de Privacy by Design para code reviews.
      3. Validar que configurações padrão são as mais restritivas (privacy by
         default) — opt-in, não opt-out.
      4. Implementar testes de segurança que cobram o ciclo de vida completo
         dos dados, incluindo eliminação.
      5. Validar que dados em backups são criptografados e acessíveis apenas
         para restauração autorizada.
    tools:
      - threat-modeling-tools
      - privacy-by-design-checklist
      - security-testing
      - configuration-testing
      - backup-security-testing
  secops:
    prose: |
      1. Auditar que privacy by design está sendo aplicado em novos projetos
         (verificar existência de PIA e threat model).
      2. Monitorar que dados pós-término de tratamento continuam protegidos.
      3. Verificar que ex-operadores e ex-colaboradores não retêm acesso a
         dados pessoais.
      4. Auditar NDAs e cláusulas de confidencialidade de pessoas que
         intervêm no tratamento.
    tools:
      - compliance-audit
      - access-review
      - offboarding-audit
      - siem
legal_references:
  - framework_id: gdpr
    articles: ["art. 25", "art. 32"]
    relationship: equivalent-to
