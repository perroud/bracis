id: art-51
family: cap-7
title: "Padrões Técnicos Mínimos Definidos pela ANPD"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 51. A autoridade nacional estimulará a adoção de padrões técnicos que facilitem
    o controle pelos titulares dos seus dados pessoais.
guidance:
  prose: |
    O art. 51 atribui à ANPD o papel de estimular padrões técnicos que empoderem os
    titulares no controle de seus dados pessoais.

    **Escopo da atuação da ANPD:**
    A ANPD pode definir, recomendar ou estimular padrões técnicos para:
    - Portabilidade de dados (formato interoperável)
    - Consentimento (padrões de coleta e revogação)
    - Segurança (padrões mínimos de proteção)
    - Anonimização (técnicas aprovadas)
    - Comunicação de incidentes (formato e prazos)

    **Conexão com art. 46, § 1º:**
    O art. 46, § 1º autoriza a ANPD a definir padrões técnicos mínimos de segurança,
    considerando: natureza das informações, características do tratamento, estado atual
    da tecnologia, especialmente para dados sensíveis.

    **Padrões técnicos relevantes:**
    Enquanto a ANPD não define padrões próprios, os seguintes são referência:
    - **Segurança:** ISO 27001/27002, NIST CSF, CIS Controls
    - **Privacidade:** ISO 27701, NIST Privacy Framework
    - **Anonimização:** ISO 20889 (Privacy enhancing data de-identification)
    - **Portabilidade:** APIs REST com OpenAPI, formatos JSON/CSV/XML
    - **Consentimento:** IEEE P7012 (Machine Readable Personal Privacy Terms)

    **Implicação prática:**
    Mesmo sem padrões formais da ANPD, adotar padrões internacionais reconhecidos
    demonstra diligência e conformidade com o espírito da lei. Quando a ANPD
    formalizar padrões, a adaptação será menor para quem já segue boas práticas.

    **Guias já publicados pela ANPD:**
    - Guia Orientativo sobre Segurança da Informação para Agentes de Tratamento
      de Pequeno Porte
    - Guia Orientativo sobre Cookies e Proteção de Dados Pessoais
    - Resolução CD/ANPD nº 15/2024 (regulamento de comunicação de incidentes)
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar controles de segurança alinhados com ISO 27001/27002 e
         NIST CSF como base técnica mínima.
      2. Adotar ISO 27701 como extensão de privacidade ao sistema de gestão
         de segurança da informação.
      3. Implementar formatos de portabilidade de dados padronizados
         (JSON, CSV, XML com schemas documentados).
      4. Implementar mecanismo de consentimento em formato legível por máquina
         para facilitar controle pelo titular.
      5. Monitorar publicações da ANPD sobre novos padrões técnicos e
         implementar atualizações conforme necessário.
      6. Participar de consultas públicas da ANPD sobre padrões técnicos
         quando aplicável.
    tools:
      - security-framework
      - privacy-framework
      - data-portability-api
      - consent-management-platform
      - regulatory-monitoring
  devsecops:
    prose: |
      1. Implementar benchmarks de segurança baseados em CIS Controls e OWASP
         no pipeline de CI/CD.
      2. Validar que APIs de portabilidade seguem padrões abertos e documentados.
      3. Testar conformidade com guias orientativos da ANPD já publicados
         (cookies, segurança para pequeno porte).
      4. Implementar testes de acessibilidade para interfaces de controle
         pelo titular.
    tools:
      - security-benchmarks
      - api-standards-testing
      - compliance-as-code
      - accessibility-testing
  secops:
    prose: |
      1. Auditar periodicamente conformidade com padrões técnicos reconhecidos.
      2. Monitorar publicações da ANPD e atualizar controles quando novos
         padrões forem definidos.
      3. Verificar que medidas de segurança estão alinhadas com o estado
         atual da tecnologia (requisito do art. 46, § 1º).
      4. Manter evidências de adoção de padrões técnicos para demonstração
         à ANPD.
    tools:
      - compliance-audit
      - regulatory-monitoring
      - security-posture-assessment
      - evidence-management
legal_references:
  - framework_id: gdpr
    articles: ["art. 25(3)", "art. 40", "art. 42"]
    relationship: equivalent-to
