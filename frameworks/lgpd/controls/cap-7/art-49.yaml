id: art-49
family: cap-7
title: "Estruturação de Sistemas de Tratamento"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 49. Os sistemas utilizados para o tratamento de dados pessoais devem ser
    estruturados de forma a atender aos requisitos de segurança, aos padrões de boas
    práticas e de governança e aos princípios gerais previstos nesta Lei e às demais
    normas regulamentares.
guidance:
  prose: |
    O art. 49 é a base legal para exigir que sistemas de informação sejam projetados
    e estruturados em conformidade com a LGPD. Não basta ter políticas documentadas;
    os sistemas devem implementar técnicamente os requisitos.

    **Requisitos de segurança:**
    Os sistemas devem implementar medidas de segurança do art. 46: proteção contra
    acesso não autorizado, destruição, perda, alteração, comunicação não autorizada.
    Isso inclui controle de acesso, criptografia, integridade de dados, logging.

    **Padrões de boas práticas:**
    Referências reconhecidas: ISO 27001/27002, NIST CSF, CIS Controls, OWASP.
    A LGPD não especifica quais padrões, mas a adoção de padrões reconhecidos
    demonstra diligência.

    **Governança:**
    Sistemas devem ter governança adequada: quem acessa o quê, com que justificativa,
    sob que autorização. Logs de auditoria, segregação de funções, princípio do menor
    privilégio.

    **Princípios gerais da LGPD (art. 6º):**
    Os sistemas devem implementar tecnicamente os princípios:
    - **Finalidade:** Dados acessíveis apenas para a finalidade documentada
    - **Adequação:** Dados compatíveis com a finalidade
    - **Necessidade:** Coletar apenas o mínimo necessário (data minimization)
    - **Livre acesso:** Titular pode consultar seus dados gratuitamente
    - **Qualidade:** Dados exatos, claros, atualizados
    - **Transparência:** Informações claras sobre o tratamento
    - **Segurança:** Proteção técnica e administrativa
    - **Prevenção:** Medidas preventivas de danos
    - **Não discriminação:** Não usar dados para fins discriminatórios
    - **Responsabilização:** Demonstrar adoção de medidas eficazes

    **Consequência prática:**
    Sistemas legados que não atendem esses requisitos devem ser atualizados ou
    substituídos. A não conformidade dos sistemas é responsabilidade do controlador.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Adotar framework de segurança reconhecido (ISO 27001, NIST CSF) como
         base para a arquitetura de sistemas.
      2. Implementar RBAC/ABAC com princípio do menor privilégio em todos os
         sistemas que tratam dados pessoais.
      3. Implementar data minimization na coleta: formulários e APIs devem
         solicitar apenas dados necessários para a finalidade.
      4. Criar data quality framework para garantir exatidão e atualidade
         dos dados (princípio da qualidade).
      5. Implementar segregação de ambientes (dev/staging/prod) com dados
         pessoais apenas em produção.
      6. Criar architecture decision records (ADRs) que documentem decisões
         de privacidade e segurança na estruturação dos sistemas.
      7. Implementar data governance platform com catálogo de dados, linhagem
         e classificação.
    tools:
      - security-framework
      - identity-management
      - data-quality
      - data-catalog
      - data-governance-platform
      - architecture-documentation
  devsecops:
    prose: |
      1. Validar que sistemas atendem requisitos de segurança antes do deploy
         (security gates no pipeline).
      2. Implementar compliance-as-code que verifique aderência a padrões de
         boas práticas automaticamente.
      3. Testar que controles de acesso estão implementados conforme RBAC/ABAC
         definido.
      4. Validar data minimization: testar que APIs não retornam dados além
         do necessário.
      5. Implementar testes de segregação de ambientes.
    tools:
      - security-testing
      - compliance-as-code
      - access-control-testing
      - api-testing
      - environment-validation
  secops:
    prose: |
      1. Auditar periodicamente que sistemas atendem requisitos de segurança
         e governança da LGPD.
      2. Monitorar violações de controle de acesso e segregação de funções.
      3. Verificar que sistemas legados estão no roadmap de atualização para
         conformidade.
      4. Auditar qualidade dos dados periodicamente (exatidão, atualidade,
         completude).
    tools:
      - security-audit
      - access-monitoring
      - data-quality-monitoring
      - compliance-dashboard
