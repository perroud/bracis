id: art-48
family: cap-7
title: "Comunicação de Incidente de Segurança"
class: LGPD
statement:
  prose: |
    Art. 48. O controlador deverá comunicar à autoridade nacional e ao titular a
    ocorrência de incidente de segurança que possa acarretar risco ou dano relevante
    aos titulares.

    § 1º A comunicação será feita em prazo razoável, conforme definido pela autoridade
    nacional, e deverá mencionar, no mínimo:
    I - a descrição da natureza dos dados pessoais afetados;
    II - as informações sobre os titulares envolvidos;
    III - a indicação das medidas técnicas e de segurança utilizadas para a proteção
    dos dados, observados os segredos comercial e industrial;
    IV - os riscos relacionados ao incidente;
    V - os motivos da demora, no caso de a comunicação não ter sido imediata; e
    VI - as medidas que foram ou que serão adotadas para reverter ou mitigar os efeitos
    do prejuízo.

    § 2º A autoridade nacional verificará a gravidade do incidente e poderá, caso
    necessário para a salvaguarda dos direitos dos titulares, determinar ao controlador
    a adoção de providências, tais como:
    I - ampla divulgação do fato em meios de comunicação; e
    II - medidas para reverter ou mitigar os efeitos do incidente.

    § 3º No juízo de gravidade do incidente, será avaliada eventual comprovação de que
    foram adotadas medidas técnicas adequadas que tornem os dados pessoais afetados
    ininteligíveis, no âmbito e nos limites técnicos de seus serviços, para terceiros
    não autorizados a acessá-los.
guidance:
  prose: |
    O art. 48 é o equivalente brasileiro ao art. 33/34 do GDPR (breach notification).
    A Resolução CD/ANPD nº 15/2024 regulamentou a comunicação de incidentes de segurança.

    **Prazo de comunicação:**
    A Resolução CD/ANPD nº 15/2024 estabelece prazo de 3 dias úteis para comunicação
    à ANPD e prazo razoável para comunicação aos titulares.

    **Critério de comunicação — "risco ou dano relevante":**
    Nem todo incidente precisa ser comunicado. Apenas aqueles que possam acarretar
    risco ou dano relevante aos titulares. Critérios:
    - Dados sensíveis afetados
    - Dados de crianças/adolescentes
    - Volume significativo de titulares
    - Possibilidade de dano material ou moral
    - Dados financeiros expostos
    - Dados que possibilitem fraude de identidade

    **§ 3º — Criptografia como atenuante:**
    Se os dados estavam criptografados e a chave não foi comprometida, tornando os dados
    "ininteligíveis para terceiros", isso é considerado atenuante na avaliação de
    gravidade. Isso NÃO elimina a obrigação de comunicar, mas pode reduzir a severidade
    das consequências.

    **§ 2º — Poderes da ANPD:**
    A ANPD pode determinar:
    - Divulgação pública do incidente (reputational damage)
    - Medidas adicionais de mitigação
    Isso torna a gestão de incidentes um assunto de board-level.

    **Conteúdo mínimo da comunicação (§ 1º):**
    1. Natureza dos dados afetados
    2. Informações sobre titulares envolvidos
    3. Medidas de segurança existentes
    4. Riscos do incidente
    5. Motivos de eventual demora
    6. Medidas de mitigação adotadas ou planejadas
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar sistema de detecção de data breaches em tempo real.
      2. Criar pipeline de notificação automatizado: detecção → triagem → classificação
         → comunicação ANPD → comunicação titulares.
      3. Manter template pré-aprovado de comunicação à ANPD com campos obrigatórios
         do § 1º.
      4. Implementar portal de notificação para titulares afetados.
      5. Manter logs forenses imutáveis para investigação de incidentes.
      6. Implementar data breach simulation (tabletop exercises) periódica.
    tools:
      - siem
      - incident-management
      - notification-system
      - forensic-logging
      - breach-simulation
  devsecops:
    prose: |
      1. Implementar detecção automática de data leaks no pipeline (exposed credentials,
         dados em repositórios públicos).
      2. Implementar canary tokens/honeypots para detectar acessos não autorizados.
      3. Garantir que logs de aplicação capturem informações suficientes para investigação
         forense sem expor dados pessoais adicionais.
      4. Implementar testes de breach detection e response no pipeline.
      5. Manter runbooks automatizados para contenção inicial de incidentes.
    tools:
      - secret-detection
      - canary-tokens
      - centralized-logging
      - runbook-automation
      - chaos-engineering
  secops:
    prose: |
      **Preparação:**
      1. Plano de Resposta a Incidentes (IRP) específico para dados pessoais.
      2. Equipe de resposta a incidentes (CSIRT) com papéis definidos.
      3. Contato pré-estabelecido com ANPD para comunicação.
      4. Assessoria jurídica de plantão para incidentes.

      **Detecção e Análise:**
      5. SIEM com regras específicas para exfiltração de dados pessoais.
      6. DLP com alertas em tempo real.
      7. Classificação de severidade baseada em tipos de dados e volume de titulares.

      **Contenção, Erradicação e Recuperação:**
      8. Playbooks automatizados (SOAR) para contenção inicial.
      9. Preservação de evidências forenses.
      10. Comunicação interna (escalation chain).

      **Pós-Incidente:**
      11. Comunicação à ANPD dentro de 3 dias úteis.
      12. Comunicação aos titulares afetados.
      13. Lessons learned e atualização de controles.
      14. Relatório completo para compliance e diretoria.
    tools:
      - siem
      - soar
      - dlp
      - edr-xdr
      - forensic-tools
      - incident-management
      - communication-platform
