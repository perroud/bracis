id: art-36
family: cap-5
title: "Cooperação Internacional"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 36. As alterações nas garantias apresentadas como suficientes de observância dos
    princípios gerais de proteção e dos direitos do titular referidas no inciso II do art.
    33 desta Lei deverão ser comunicadas à autoridade nacional.
guidance:
  prose: |
    O art. 36 estabelece a obrigação de comunicação contínua à ANPD sobre alterações
    nas garantias que fundamentam transferências internacionais.

    **Obrigação de comunicação:**
    Quando as garantias apresentadas ao abrigo do art. 33, II (cláusulas contratuais,
    BCRs, selos, certificados) sofrem alterações, o controlador deve comunicar à ANPD.
    Isso inclui:
    - Alterações em cláusulas contratuais
    - Mudanças nas normas corporativas globais (BCRs)
    - Perda ou suspensão de certificações
    - Mudanças legislativas no país de destino que afetem o nível de proteção
    - Alterações nos sub-processadores internacionais

    **Cooperação da ANPD com autoridades estrangeiras:**
    A ANPD pode cooperar com autoridades de proteção de dados de outros países para:
    - Solicitar informações sobre tratamento realizado no exterior
    - Comunicar infrações à LGPD que envolvam dados transferidos internacionalmente
    - Participar de mecanismos de cooperação multilateral (ex.: Global Privacy
      Assembly, RIPD ibero-americana)

    **Implicação prática:**
    Controladores devem manter monitoramento contínuo das garantias que fundamentam
    suas transferências internacionais e comunicar proativamente alterações à ANPD.
    A não comunicação pode ser considerada infração e comprometer a validade da
    transferência.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar sistema de monitoramento de alterações em contratos e
         garantias de transferência internacional com alerta automático.
      2. Criar workflow de comunicação à ANPD quando garantias forem alteradas.
      3. Manter registro histórico de todas as garantias e suas alterações
         para rastreabilidade.
      4. Implementar monitoramento de mudanças legislativas nos países de destino
         que possam afetar nível de proteção.
      5. Criar dashboard de status de garantias de transferência internacional
         por fornecedor/país.
    tools:
      - contract-management
      - regulatory-change-monitoring
      - notification-service
      - compliance-dashboard
      - vendor-management
  devsecops:
    prose: |
      1. Implementar verificação automatizada de validade de garantias de
         transferência internacional no pipeline de deployment.
      2. Alertar equipe quando certificações de fornecedores internacionais
         estiverem próximas de expirar.
      3. Validar que alterações em sub-processadores internacionais disparam
         processo de comunicação à ANPD.
    tools:
      - compliance-as-code
      - vendor-monitoring
      - notification-automation
      - deployment-validation
  secops:
    prose: |
      1. Monitorar notícias e mudanças regulatórias nos países de destino de
         transferências internacionais.
      2. Auditar periodicamente que comunicações à ANPD estão sendo realizadas
         quando garantias são alteradas.
      3. Verificar que alterações em contratos internacionais são rastreadas
         e documentadas.
      4. Manter evidências de comunicações realizadas à ANPD.
    tools:
      - regulatory-monitoring
      - compliance-audit
      - evidence-management
      - vendor-risk-management
legal_references:
  - framework_id: gdpr
    articles: ["art. 46(2)", "art. 50", "art. 60", "art. 61"]
    relationship: equivalent-to
