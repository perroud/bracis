id: art-35
family: cap-5
title: "Cláusulas Contratuais e Garantias para Transferência Internacional"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 35. A definição do conteúdo de cláusulas-padrão contratuais, bem como a
    verificação de cláusulas contratuais específicas para uma determinada transferência,
    normas corporativas globais ou selos, certificados e códigos de conduta, a que se
    refere o inciso II do caput do art. 33 desta Lei, será realizada pela autoridade
    nacional.
  additional:
    - id: art-35-p1
      label: "§ 1º"
      prose: |
        Para a verificação do disposto no caput deste artigo, a autoridade nacional levará
        em consideração os requisitos, as condições e as garantias mínimas para a
        transferência que observem os direitos, as garantias e os princípios desta Lei.
    - id: art-35-p2
      label: "§ 2º"
      prose: |
        Na análise de cláusulas contratuais, de documentos ou de normas corporativas
        globais submetidas à aprovação da autoridade nacional, poderão ser requeridas
        informações suplementares ou realizadas diligências de verificação quanto às
        operações de tratamento, quando necessário.
    - id: art-35-p3
      label: "§ 3º"
      prose: |
        A autoridade nacional poderá designar organismos de certificação para a realização
        do previsto no caput deste artigo, que permanecerão sob sua fiscalização nos termos
        definidos em regulamento.
    - id: art-35-p4
      label: "§ 4º"
      prose: |
        Os atos de verificação a que se refere o § 2º deste artigo poderão ser delegados
        a entidade que comprove capacidade técnica para o exercício dessas atribuições.
guidance:
  prose: |
    O art. 35 trata dos mecanismos contratuais e de certificação para transferência
    internacional quando o país de destino não possui nível de adequação reconhecido
    pela ANPD.

    **Mecanismos sob competência da ANPD:**
    1. **Cláusulas-padrão contratuais (SCCs):** Modelos aprovados pela ANPD que
       garantem proteção equivalente à LGPD. Equivalente às Standard Contractual
       Clauses da UE.
    2. **Cláusulas contratuais específicas:** Para transferências individuais,
       verificadas pela ANPD caso a caso.
    3. **Normas corporativas globais (BCRs):** Para multinacionais que transferem
       dados entre filiais. Equivalente às Binding Corporate Rules do GDPR.
    4. **Selos, certificados e códigos de conduta:** Mecanismos de certificação
       que atestem conformidade.

    **Status atual (Resolução CD/ANPD nº 19/2024):**
    A ANPD publicou a Resolução nº 19/2024 que regulamentou a transferência
    internacional, incluindo modelos de cláusulas-padrão contratuais. Controladores
    devem utilizar esses modelos nos contratos com importadores de dados
    internacionais.

    **§ 3º — Organismos de certificação:**
    A ANPD pode designar organismos para emitir certificações de conformidade para
    transferência internacional. Isso permite escalar a verificação sem sobrecarregar
    a ANPD.

    **Implicação prática:**
    Na ausência de decisão de adequação, o mecanismo mais utilizado são as
    cláusulas-padrão contratuais. Toda empresa que utiliza cloud providers
    internacionais, SaaS ou sub-processadores fora do Brasil deve incluir
    cláusulas-padrão contratuais nos contratos.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Manter repositório de templates de cláusulas-padrão contratuais
         aprovadas pela ANPD para uso em contratos com fornecedores internacionais.
      2. Implementar sistema de gestão de contratos que rastreie quais
         fornecedores possuem cláusulas-padrão assinadas.
      3. Criar checklist automatizado de due diligence para novos fornecedores
         internacionais que verifique existência de cláusulas-padrão ou BCRs.
      4. Manter inventário de normas corporativas globais (BCRs) quando
         aplicável em grupos multinacionais.
      5. Implementar sistema de rastreamento de certificações e selos de
         conformidade de parceiros internacionais.
    tools:
      - contract-management
      - vendor-management
      - compliance-checklist
      - document-management
      - certification-tracking
  devsecops:
    prose: |
      1. Validar que novos fornecedores internacionais integrados ao pipeline
         possuem cláusulas-padrão assinadas antes do deploy.
      2. Implementar verificação automatizada de status de contratos de
         transferência internacional no processo de procurement.
      3. Testar que dados pessoais não são enviados a sub-processadores
         internacionais sem contrato adequado.
      4. Manter documentação de due diligence técnica de fornecedores
         internacionais.
    tools:
      - vendor-security-assessment
      - procurement-automation
      - compliance-as-code
      - contract-validation
  secops:
    prose: |
      1. Auditar periodicamente que todos os fornecedores internacionais
         possuem cláusulas-padrão ou BCRs vigentes.
      2. Monitorar expiração de contratos e certificações de fornecedores
         internacionais.
      3. Verificar que transferências internacionais de dados são compatíveis
         com os termos das cláusulas contratuais.
      4. Alertar sobre novos sub-processadores internacionais não cobertos
         por cláusulas-padrão.
    tools:
      - contract-audit
      - vendor-risk-management
      - certification-monitoring
      - compliance-dashboard
legal_references:
  - framework_id: gdpr
    articles: ["art. 46", "art. 47"]
    relationship: equivalent-to
