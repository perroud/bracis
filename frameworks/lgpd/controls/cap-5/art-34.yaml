id: art-34
family: cap-5
title: "Nível de Proteção Adequado para Transferência Internacional"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 34. O nível de proteção de dados do país estrangeiro ou do organismo internacional
    mencionado no inciso I do caput do art. 33 desta Lei será avaliado pela autoridade
    nacional, que levará em consideração:
  parts:
    - id: art-34-i
      label: "I"
      prose: |
        as normas gerais e setoriais da legislação em vigor no país de destino ou no
        organismo internacional;
    - id: art-34-ii
      label: "II"
      prose: |
        a natureza dos dados;
    - id: art-34-iii
      label: "III"
      prose: |
        a observância dos princípios gerais de proteção de dados pessoais e direitos dos
        titulares previstos nesta Lei;
    - id: art-34-iv
      label: "IV"
      prose: |
        a adoção de medidas de segurança previstas em regulamento;
    - id: art-34-v
      label: "V"
      prose: |
        a existência de garantias judiciais e institucionais para o respeito aos direitos
        de proteção de dados pessoais; e
    - id: art-34-vi
      label: "VI"
      prose: |
        outras circunstâncias específicas relativas à transferência.
guidance:
  prose: |
    O art. 34 define os critérios que a ANPD utiliza para avaliar se um país ou
    organismo internacional oferece nível de proteção adequado para receber dados
    pessoais transferidos do Brasil.

    **Critérios de avaliação:**
    A ANPD avalia um conjunto amplo de fatores, semelhante ao processo de "adequacy
    decision" do GDPR (art. 45):

    **I — Legislação do país de destino:**
    Existência de lei de proteção de dados. Abrangência (geral vs. setorial).
    Princípios reconhecidos. Bases legais para tratamento.

    **II — Natureza dos dados:**
    Dados sensíveis exigem nível de proteção mais alto. Dados de crianças idem.

    **III — Princípios e direitos:**
    O país de destino deve garantir princípios equivalentes aos da LGPD (finalidade,
    adequação, necessidade, etc.) e direitos dos titulares.

    **IV — Medidas de segurança:**
    Existência de regulamento de segurança no país de destino.

    **V — Garantias judiciais e institucionais:**
    Existência de autoridade de proteção de dados independente. Acesso do titular
    ao Judiciário. Mecanismos de enforcement.

    **Status atual:**
    A Resolução CD/ANPD nº 19/2024 regulamentou a transferência internacional de
    dados pessoais. A ANPD ainda não publicou lista completa de países com nível
    adequado. Países com decisões de adequação da UE tendem a ser avaliados
    favoravelmente.

    **Implicação prática:**
    Enquanto a ANPD não publica lista de países adequados, controladores devem
    utilizar outros mecanismos do art. 33 (cláusulas contratuais, BCRs, consentimento)
    para transferências internacionais.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Manter inventário atualizado de países de destino de transferências
         internacionais com avaliação de nível de proteção.
      2. Implementar sistema de aprovação para novos destinos de transferência
         que verifique avaliação de adequação pela ANPD.
      3. Configurar alertas para atualizações da ANPD sobre lista de países
         com nível adequado.
      4. Criar data flow maps que identifiquem todos os destinos internacionais
         de dados pessoais, incluindo sub-processadores.
      5. Implementar controles diferenciados por nível de risco do país de destino.
    tools:
      - data-flow-mapping
      - vendor-management
      - compliance-monitoring
      - risk-assessment
      - geolocation-controls
  devsecops:
    prose: |
      1. Implementar policy-as-code que valide destino de deployment contra
         lista de países aprovados.
      2. Testar que data residency controls impedem transferência para
         países não avaliados.
      3. Validar que sub-processadores de cloud providers operam em países
         com nível de proteção adequado.
      4. Monitorar atualizações de regulamentação da ANPD sobre países adequados.
    tools:
      - policy-as-code
      - infrastructure-scanning
      - cloud-configuration-audit
      - compliance-as-code
  secops:
    prose: |
      1. Monitorar transferências de dados para países não avaliados como
         adequados e alertar.
      2. Auditar periodicamente inventário de destinos internacionais.
      3. Verificar que sub-processadores internacionais dos fornecedores
         operam em jurisdições adequadas.
      4. Manter evidências de avaliação de adequação para cada país de destino.
    tools:
      - network-monitoring
      - vendor-risk-assessment
      - compliance-audit
      - data-transfer-monitoring
legal_references:
  - framework_id: gdpr
    articles: ["art. 45"]
    relationship: equivalent-to
