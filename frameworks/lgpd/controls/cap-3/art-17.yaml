id: art-17
family: cap-3
title: "Titularidade dos Dados Pessoais"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 17. Toda pessoa natural tem assegurada a titularidade de seus dados pessoais e
    garantidos os direitos fundamentais de liberdade, de intimidade e de privacidade, nos
    termos desta Lei.
guidance:
  prose: |
    O art. 17 é a cláusula declaratória de direitos fundamentais da LGPD. Ele estabelece
    dois princípios estruturantes:

    **1. Titularidade dos dados pessoais:**
    Os dados pessoais pertencem à pessoa natural, não à empresa que os coleta ou trata.
    O controlador é mero custodiante dos dados, autorizado a tratá-los nos termos da lei.
    Isso significa que o titular tem poder de decisão sobre seus dados, incluindo o direito
    de revogar o consentimento e solicitar eliminação.

    **2. Direitos fundamentais:**
    A proteção de dados pessoais é ancorada em direitos constitucionais: liberdade,
    intimidade e privacidade (art. 5º, X e XII, da Constituição Federal). A EC 115/2022
    elevou a proteção de dados pessoais a direito fundamental autônomo (art. 5º, LXXIX, CF).

    **Consequência prática:**
    Toda arquitetura de sistema que trata dados pessoais deve ser construída sob a premissa
    de que o titular é o dono dos dados. O controlador deve estar preparado para devolver,
    corrigir, eliminar e prestar contas sobre o tratamento a qualquer momento.

    **Diferença em relação ao GDPR:**
    O GDPR não tem artigo equivalente tão explícito sobre "titularidade". A LGPD é mais
    enfática ao declarar que os dados são da pessoa natural, reforçando o paradigma de
    autodeterminação informativa.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Arquitetar sistemas com o princípio de que dados pessoais pertencem ao
         titular — o sistema é custodiante, não proprietário.
      2. Implementar Privacy Portal que dê ao titular visibilidade e controle sobre
         todos os seus dados pessoais tratados.
      3. Garantir que toda coleta de dados pessoais tenha finalidade documentada e
         base legal registrada.
      4. Implementar mecanismos de autodeterminação informativa: o titular pode ver,
         corrigir, portar e eliminar seus dados.
      5. Criar modelo de dados que permita identificar e isolar todos os dados
         pessoais de um titular específico.
    tools:
      - privacy-portal
      - data-catalog
      - consent-management-platform
      - identity-management
      - data-mapping
  devsecops:
    prose: |
      1. Validar que todo novo serviço que coleta dados pessoais documenta finalidade
         e base legal no design review.
      2. Implementar data tagging no código para classificar dados pessoais e
         vinculá-los ao titular.
      3. Testar que o titular consegue exercer todos os direitos previstos nos
         arts. 18 a 22 por meio das interfaces disponibilizadas.
    tools:
      - data-classification
      - design-review-checklist
      - privacy-impact-assessment
      - api-testing
  secops:
    prose: |
      1. Monitorar que dados pessoais não estão sendo tratados sem finalidade ou
         base legal documentada.
      2. Auditar periodicamente o exercício dos direitos dos titulares para garantir
         que estão sendo atendidos adequadamente.
      3. Alertar sobre coletas de dados pessoais não previstas no ROPA.
    tools:
      - data-discovery
      - compliance-audit
      - siem
      - dsar-tracking
legal_references:
  - framework_id: gdpr
    articles: ["art. 1", "considerando 1", "considerando 2"]
    relationship: equivalent-to
