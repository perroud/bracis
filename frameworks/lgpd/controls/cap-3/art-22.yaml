id: art-22
family: cap-3
title: "Defesa dos Direitos do Titular"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 22. A defesa dos interesses e dos direitos dos titulares de dados poderá ser
    exercida em juízo, individual ou coletivamente, na forma do disposto na legislação
    pertinente, acerca dos instrumentos de tutela individual e coletiva.
guidance:
  prose: |
    O art. 22 garante ao titular o acesso ao Poder Judiciário para defesa de seus
    direitos de proteção de dados. Os mecanismos disponíveis são:

    **Tutela individual:**
    O titular pode ajuizar ação individual contra o controlador/operador. Aplica-se
    o Código de Processo Civil e, quando a relação for de consumo, o CDC (Código de
    Defesa do Consumidor), que prevê inversão do ônus da prova a favor do consumidor
    quando verossímil a alegação (art. 6º, VIII, CDC).

    **Tutela coletiva:**
    Entidades como o Ministério Público, Procon, Defensoria Pública e associações de
    defesa do consumidor podem ajuizar ações coletivas em nome de grupos de titulares
    afetados. Isso é especialmente relevante em vazamentos de dados em massa.

    **Inversão do ônus da prova:**
    Em relações de consumo, o titular não precisa provar a falha do controlador — é o
    controlador que deve provar que agiu em conformidade. Isso torna a documentação
    de conformidade (evidências de controles, logs, ROPA) essencial para defesa em
    juízo.

    **Prescrição:**
    A LGPD não define prazo prescricional específico. Aplica-se o CDC (5 anos) em
    relações de consumo ou o Código Civil (3 anos para reparação civil) em relações
    não consumeristas.

    **Consequência prática:**
    A possibilidade de ações coletivas e inversão do ônus da prova torna a
    documentação de conformidade tão importante quanto a conformidade em si. Se não
    há evidência documentada, a presunção é de não conformidade.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar sistema robusto de geração de evidências de conformidade
         exportáveis para demonstração em juízo.
      2. Manter audit trail imutável e timestamped de todas as operações em
         dados pessoais.
      3. Implementar sistema de gestão de incidentes com documentação completa
         de ações tomadas para mitigação.
      4. Criar relatórios automatizados de conformidade que demonstrem adoção
         de medidas técnicas e administrativas.
      5. Implementar retenção de logs com prazo compatível com prazos prescricionais
         (mínimo 5 anos para relações de consumo).
    tools:
      - compliance-evidence-management
      - audit-trail
      - incident-management
      - log-retention
      - compliance-reporting
  devsecops:
    prose: |
      1. Implementar compliance-as-code com geração automática de evidências
         de controles implementados.
      2. Manter histórico de vulnerabilidades encontradas e corrigidas como
         evidência de diligência.
      3. Documentar decisões de segurança e privacy-by-design em design reviews.
      4. Validar que logs de auditoria são completos, íntegros e não adulteráveis.
    tools:
      - compliance-as-code
      - vulnerability-management
      - design-review-documentation
      - log-integrity-validation
  secops:
    prose: |
      1. Manter documentação forense de todos os incidentes de segurança
         envolvendo dados pessoais.
      2. Preservar evidências digitais seguindo cadeia de custódia.
      3. Gerar relatórios periódicos de postura de segurança como evidência
         preventiva.
      4. Auditar periodicamente a integridade e completude dos logs de auditoria.
    tools:
      - digital-forensics
      - evidence-management
      - siem
      - compliance-reporting
legal_references:
  - framework_id: gdpr
    articles: ["art. 77", "art. 78", "art. 79", "art. 80", "art. 82"]
    relationship: equivalent-to
