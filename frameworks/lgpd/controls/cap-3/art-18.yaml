id: art-18
family: cap-3
title: "Direitos do Titular"
class: LGPD
statement:
  prose: |
    Art. 18. O titular dos dados pessoais tem direito a obter do controlador, em relação
    aos dados do titular por ele tratados, a qualquer momento e mediante requisição:
  parts:
    - id: art-18-i
      label: "I"
      prose: |
        confirmação da existência de tratamento;
    - id: art-18-ii
      label: "II"
      prose: |
        acesso aos dados;
    - id: art-18-iii
      label: "III"
      prose: |
        correção de dados incompletos, inexatos ou desatualizados;
    - id: art-18-iv
      label: "IV"
      prose: |
        anonimização, bloqueio ou eliminação de dados desnecessários, excessivos ou
        tratados em desconformidade com o disposto nesta Lei;
    - id: art-18-v
      label: "V"
      prose: |
        portabilidade dos dados a outro fornecedor de serviço ou produto, mediante
        requisição expressa, de acordo com a regulamentação da autoridade nacional,
        observados os segredos comercial e industrial;
    - id: art-18-vi
      label: "VI"
      prose: |
        eliminação dos dados pessoais tratados com o consentimento do titular, exceto
        nas hipóteses previstas no art. 16 desta Lei;
    - id: art-18-vii
      label: "VII"
      prose: |
        informação das entidades públicas e privadas com as quais o controlador realizou
        uso compartilhado de dados;
    - id: art-18-viii
      label: "VIII"
      prose: |
        informação sobre a possibilidade de não fornecer consentimento e sobre as
        consequências da negativa;
    - id: art-18-ix
      label: "IX"
      prose: |
        revogação do consentimento, nos termos do § 5º do art. 8º desta Lei.
  additional:
    - id: art-18-p1
      label: "§ 1º"
      prose: |
        O titular dos dados pessoais tem o direito de peticionar em relação aos seus
        dados contra o controlador perante a autoridade nacional.
    - id: art-18-p2
      label: "§ 2º"
      prose: |
        O titular pode opor-se a tratamento realizado com fundamento em uma das hipóteses
        de dispensa de consentimento, em caso de descumprimento ao disposto nesta Lei.
    - id: art-18-p3
      label: "§ 3º"
      prose: |
        Os direitos previstos neste artigo serão exercidos mediante requerimento expresso
        do titular ou de representante legalmente constituído, a agente de tratamento.
    - id: art-18-p4
      label: "§ 4º"
      prose: |
        Em caso de impossibilidade de adoção imediata da providência de que trata o § 3º
        deste artigo, o controlador enviará ao titular resposta em que poderá:
        I - comunicar que não é agente de tratamento dos dados e indicar, sempre que
        possível, o agente; ou
        II - indicar as razões de fato ou de direito que impedem a adoção imediata da
        providência.
    - id: art-18-p5
      label: "§ 5º"
      prose: |
        O requerimento referido no § 3º deste artigo será atendido sem custos para o
        titular, nos prazos e nos termos previstos em regulamento.
    - id: art-18-p6
      label: "§ 6º"
      prose: |
        O responsável deverá informar, de maneira imediata, aos agentes de tratamento com
        os quais tenha realizado uso compartilhado de dados a correção, a eliminação, a
        anonimização ou o bloqueio dos dados, para que repitam idêntico procedimento,
        exceto nos casos em que esta comunicação seja comprovadamente impossível ou
        implique esforço desproporcional.
    - id: art-18-p8
      label: "§ 8º"
      prose: |
        O direito a que se refere o § 1º deste artigo também poderá ser exercido perante
        os organismos de defesa do consumidor.
guidance:
  prose: |
    O art. 18 é o catálogo de direitos dos titulares e impacta diretamente a arquitetura
    de sistemas. Cada direito exige uma funcionalidade técnica correspondente:

    **I - Confirmação de tratamento:** API ou interface que confirme se dados do titular
    existem nos sistemas.

    **II - Acesso aos dados:** Funcionalidade de exportação dos dados do titular em
    formato legível. Equivalente ao Subject Access Request (SAR) do GDPR.

    **III - Correção:** Interface para o titular solicitar correção de dados. Deve
    propagar a correção para todos os sistemas que armazenam o dado.

    **IV - Anonimização/bloqueio/eliminação:** Capacidade técnica de anonimizar, bloquear
    ou eliminar dados. "Eliminação" deve ser completa, incluindo backups (ou ter processo
    documentado para eliminação nos backups).

    **V - Portabilidade:** Exportação em formato estruturado, de uso comum e leitura
    automatizada (JSON, CSV). A ANPD ainda não regulamentou completamente este direito.

    **VI - Eliminação por revogação de consentimento:** Quando o titular revoga
    consentimento, dados tratados com essa base legal devem ser eliminados, salvo
    exceções do art. 16.

    **VII - Informação sobre compartilhamento:** Manter registro de todos os terceiros
    com quem dados foram compartilhados e disponibilizar ao titular.

    **IX - Revogação de consentimento:** Deve ser tão fácil quanto dar o consentimento.
    Interface clara e acessível.

    **§ 5º — Gratuidade:** Atender requisições dos titulares sem custo.

    **§ 6º — Propagação:** Correções, eliminações e bloqueios devem ser propagados para
    todos os terceiros que receberam os dados. Isso exige rastreabilidade de compartilhamento.

    **Prazo de resposta:** A Resolução CD/ANPD nº 2/2022 estabelece 15 dias para resposta
    simplificada e prazo razoável (definido pela ANPD) para resposta completa.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar Privacy Portal/Data Subject Request (DSR) portal com fluxos para
         cada direito do art. 18.
      2. Criar API de Data Subject Access Request (DSAR) que consolide dados do titular
         de todos os sistemas (data mesh/data catalog integration).
      3. Implementar mecanismo de soft-delete e hard-delete com propagação para
         parceiros/operadores (§ 6º).
      4. Criar funcionalidade de exportação de dados em formatos portáveis (JSON, CSV).
      5. Implementar sistema de tracking de requisições com SLA e prazos legais.
      6. Manter registro de compartilhamentos para atender inciso VII.
      7. Implementar mecanismo de bloqueio (suspensão de tratamento) sem eliminação.
    tools:
      - privacy-portal
      - dsar-automation
      - data-catalog
      - data-lineage
      - workflow-engine
      - consent-management-platform
  devsecops:
    prose: |
      1. Implementar testes automatizados para verificar que o DSAR retorna todos os dados
         do titular de todos os microserviços.
      2. Validar que eliminação de dados é efetiva (não apenas soft-delete se hard-delete
         é necessário).
      3. Testar propagação de eliminação/correção para sistemas integrados.
      4. Implementar testes de portabilidade de dados (formato, completude).
      5. Validar que backups possuem processo de eliminação ou expiração documentado.
    tools:
      - integration-testing
      - data-integrity-validation
      - backup-lifecycle-management
      - api-testing
  secops:
    prose: |
      1. Monitorar e auditar atendimento de requisições de titulares (prazos, completude).
      2. Alertar sobre requisições não atendidas dentro do prazo legal.
      3. Auditar eficácia de eliminação de dados (verificar que dados foram realmente
         removidos de todos os sistemas).
      4. Monitorar tentativas de acesso a dados de titulares que solicitaram eliminação.
    tools:
      - dsar-tracking
      - siem
      - data-discovery
      - compliance-dashboard
legal_references:
  - framework_id: gdpr
    articles: ["art. 15", "art. 16", "art. 17", "art. 18", "art. 20", "art. 21"]
    relationship: equivalent-to
