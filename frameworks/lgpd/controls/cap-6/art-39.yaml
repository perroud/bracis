id: art-39
family: cap-6
title: "Obrigações do Operador"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 39. O operador deverá realizar o tratamento segundo as instruções fornecidas
    pelo controlador, que verificará a observância das próprias instruções e das normas
    sobre a matéria.
guidance:
  prose: |
    O art. 39 define a relação entre controlador e operador, estabelecendo que o
    operador deve seguir as instruções do controlador.

    **Papel do operador:**
    O operador é a pessoa natural ou jurídica que realiza tratamento de dados pessoais
    em nome do controlador. Em termos de TI, os exemplos mais comuns são:
    - Cloud providers (AWS, Azure, GCP)
    - Provedores de SaaS (Salesforce, HubSpot, Zendesk)
    - Empresas de processamento de pagamento
    - Data centers e provedores de hosting
    - Empresas de outsourcing de TI

    **Obrigação do operador:**
    Tratar dados estritamente conforme as instruções do controlador. Não pode usar
    dados para finalidades próprias. Não pode compartilhar dados sem autorização.

    **Obrigação do controlador:**
    Verificar que o operador cumpre as instruções e as normas da LGPD. Isso implica
    em due diligence na contratação e monitoramento contínuo.

    **Documentação das instruções:**
    As instruções devem estar documentadas formalmente (contrato, DPA — Data Processing
    Agreement, SLA). Instruções verbais são insuficientes e geram risco jurídico.

    **Consequência de desvio:**
    Se o operador desviar das instruções do controlador e tratar dados para finalidade
    própria, ele passa a ser considerado controlador para aquele tratamento específico,
    assumindo todas as responsabilidades da LGPD (art. 42, § 1º).

    **Diferença em relação ao GDPR:**
    O GDPR (art. 28) é mais detalhado quanto aos requisitos do contrato entre controlador
    e operador. A LGPD é mais sucinta, mas a interpretação deve ser equivalente.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar Data Processing Agreements (DPAs) formais com todos os
         operadores que tratam dados pessoais.
      2. Documentar instruções de tratamento de forma clara e rastreável
         em cada DPA — finalidades permitidas, tipos de dados, restrições.
      3. Implementar controles técnicos que restrinjam o que o operador pode
         fazer com os dados (API scopes, permissões, criptografia).
      4. Criar sistema de monitoramento de conformidade de operadores com
         verificações periódicas.
      5. Implementar mecanismos de revogação de acesso do operador em caso
         de não conformidade.
      6. Manter inventário de operadores com dados tratados, instruções
         fornecidas e status de conformidade.
    tools:
      - contract-management
      - vendor-management
      - api-access-control
      - vendor-monitoring
      - compliance-dashboard
  devsecops:
    prose: |
      1. Validar que integrações com operadores (APIs de terceiros) respeitam
         as instruções documentadas no DPA — não enviar mais dados do que o
         necessário.
      2. Implementar testes de integração que verifiquem escopo de dados
         compartilhados com operadores.
      3. Validar que operadores possuem DPA assinado antes de deploy de
         integrações.
      4. Implementar data minimization nas interfaces com operadores.
    tools:
      - api-testing
      - data-flow-analysis
      - vendor-security-assessment
      - compliance-as-code
  secops:
    prose: |
      1. Auditar periodicamente que operadores estão tratando dados conforme
         instruções do controlador.
      2. Monitorar acessos de operadores aos dados para detectar desvios
         das instruções.
      3. Verificar que DPAs estão vigentes e atualizados.
      4. Alertar sobre operadores que acessam dados fora do escopo autorizado.
    tools:
      - vendor-audit
      - access-monitoring
      - contract-audit
      - siem
legal_references:
  - framework_id: gdpr
    articles: ["art. 28", "art. 29"]
    relationship: equivalent-to
