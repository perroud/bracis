id: art-44
family: cap-6
title: "Tratamento Irregular de Dados Pessoais"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 44. O tratamento de dados pessoais será irregular quando deixar de observar a
    legislação ou quando não fornecer a segurança que o titular dele pode esperar,
    consideradas as circunstâncias relevantes, entre as quais:
  parts:
    - id: art-44-i
      label: "I"
      prose: |
        o modo pelo qual é realizado;
    - id: art-44-ii
      label: "II"
      prose: |
        o resultado e os riscos que razoavelmente dele se esperam;
    - id: art-44-iii
      label: "III"
      prose: |
        as técnicas de tratamento de dados pessoais disponíveis à época em que foi realizado.
  additional:
    - id: art-44-paragrafo
      label: "Parágrafo único"
      prose: |
        Responde pelos danos decorrentes da violação da segurança dos dados o controlador
        ou o operador que, ao deixar de adotar as medidas de segurança previstas no art. 46
        desta Lei, der causa a dano.
guidance:
  prose: |
    O art. 44 define quando o tratamento de dados é considerado irregular, conceito
    central para a responsabilidade civil (art. 42) e excludentes (art. 43).

    **Duas hipóteses de irregularidade:**

    **1. Desconformidade com a legislação:**
    Tratar dados sem base legal, sem respeitar princípios, sem atender direitos
    dos titulares, sem medidas de segurança adequadas.

    **2. Não fornecer segurança esperada:**
    Critério baseado na "expectativa legítima" do titular, inspirado na teoria do
    defeito do produto do CDC. O tratamento é irregular quando não oferece a
    segurança que o titular razoavelmente pode esperar.

    **Circunstâncias relevantes:**

    **I — Modo de realização:**
    Como o tratamento é conduzido. Ex.: dados transmitidos sem criptografia,
    armazenados sem controle de acesso, acessados por colaboradores sem necessidade.

    **II — Resultado e riscos esperados:**
    Os riscos devem ser proporcionais ao resultado. Tratamento de dados sensíveis
    de saúde exige mais segurança que dados de contato comercial.

    **III — Técnicas disponíveis à época:**
    O padrão de segurança evolui com a tecnologia. O que era aceitável em 2020
    pode ser irregular em 2025. O controlador deve acompanhar o estado da arte.

    **Parágrafo único — Nexo causal:**
    O controlador/operador responde quando a ausência de medidas de segurança
    (art. 46) causar o dano. Isso reforça que a implementação de segurança
    adequada é tanto obrigação legal quanto defesa jurídica.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar framework de segurança alinhado com padrões reconhecidos
         (ISO 27001, NIST CSF, CIS Controls) para demonstrar que a segurança
         oferecida atende expectativas razoáveis.
      2. Manter análise de riscos atualizada que documente riscos identificados
         e medidas de mitigação adotadas.
      3. Implementar controles proporcionais ao risco: dados sensíveis exigem
         controles mais robustos que dados comuns.
      4. Atualizar continuamente medidas de segurança conforme evolução
         tecnológica (inciso III) — não estagnar em tecnologias obsoletas.
      5. Documentar estado da arte de segurança no momento de cada implementação
         para defesa em eventual litígio.
    tools:
      - security-framework
      - risk-assessment
      - security-controls
      - technology-radar
      - compliance-documentation
  devsecops:
    prose: |
      1. Manter pipeline de segurança atualizado com as técnicas mais recentes
         de detecção de vulnerabilidades (inciso III).
      2. Implementar security benchmarks atualizados periodicamente.
      3. Validar que controles de segurança são proporcionais à sensibilidade
         dos dados tratados.
      4. Documentar decisões de segurança com justificativa de adequação
         ao estado da arte.
    tools:
      - security-benchmarks
      - vulnerability-scanning
      - compliance-as-code
      - security-documentation
  secops:
    prose: |
      1. Monitorar continuamente novas ameaças e vulnerabilidades para garantir
         que medidas de segurança permanecem adequadas.
      2. Auditar periodicamente que controles implementados são proporcionais
         aos riscos e ao estado da arte.
      3. Manter evidências de atualização contínua de medidas de segurança.
      4. Documentar que incidentes foram causados apesar de medidas de segurança
         adequadas (para defesa sob parágrafo único).
    tools:
      - threat-intelligence
      - security-audit
      - compliance-monitoring
      - evidence-management
legal_references:
  - framework_id: gdpr
    articles: ["art. 5(1)(f)", "art. 32", "art. 82"]
    relationship: equivalent-to
