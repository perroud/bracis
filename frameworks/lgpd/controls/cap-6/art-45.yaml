id: art-45
family: cap-6
title: "Relação com Código de Defesa do Consumidor e Direito Civil"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 45. As hipóteses de violação do direito do titular no âmbito das relações de
    consumo permanecem sujeitas às regras de responsabilidade previstas na legislação
    pertinente.
guidance:
  prose: |
    O art. 45 estabelece que, em relações de consumo, a LGPD convive com o CDC (Código
    de Defesa do Consumidor — Lei 8.078/1990) e com o Código Civil. A proteção do
    titular/consumidor é cumulativa, não excludente.

    **Aplicação do CDC:**
    Quando a relação entre titular e controlador/operador é de consumo (fornecimento
    de produto ou serviço), aplicam-se cumulativamente:
    - A LGPD (proteção de dados)
    - O CDC (proteção do consumidor)
    - O Código Civil (responsabilidade civil geral)

    **Consequências práticas do CDC:**
    1. **Responsabilidade objetiva:** No CDC, o fornecedor responde independentemente
       de culpa. Não precisa provar que houve negligência — basta provar o dano.
    2. **Inversão do ônus da prova:** Automática quando o consumidor for
       hipossuficiente (art. 6º, VIII, CDC).
    3. **Solidariedade na cadeia:** Todos os fornecedores na cadeia de fornecimento
       respondem solidariamente (art. 18, CDC).
    4. **Prazo prescricional:** 5 anos (art. 27, CDC) — mais longo que o prazo geral
       do Código Civil (3 anos).
    5. **Dano moral coletivo:** O CDC permite ações coletivas por dano moral (art. 6º,
       VI e VII, CDC).

    **Foro de competência:**
    O consumidor pode ajuizar ação no seu domicílio (art. 101, I, CDC), facilitando
    o acesso à justiça.

    **Consequências para B2C:**
    Empresas B2C (e-commerce, apps, fintechs, plataformas digitais) enfrentam regime
    mais severo que empresas B2B, pois a LGPD é complementada pelo CDC. Investir em
    conformidade é mais crítico em B2C.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar controles de conformidade que atendam cumulativamente
         LGPD e CDC — não apenas um dos dois.
      2. Criar Privacy Portal que atenda tanto os direitos da LGPD (art. 18)
         quanto os direitos do consumidor (CDC).
      3. Implementar canal de atendimento ao consumidor/titular com SLAs
         compatíveis com CDC (resposta em 5 dias úteis) e LGPD (15 dias).
      4. Manter documentação de conformidade robusta para defesa em litígios
         de consumo (responsabilidade objetiva).
      5. Implementar registro de reclamações do consumidor integrado com
         gestão de requisições de titulares.
    tools:
      - privacy-portal
      - customer-service-platform
      - complaint-management
      - compliance-evidence-management
      - sla-management
  devsecops:
    prose: |
      1. Validar conformidade com CDC em interfaces de consumo: informação
         clara, termos acessíveis, confirmação de compra.
      2. Testar que fluxos de atendimento ao consumidor/titular estão
         funcionando corretamente.
      3. Implementar accessibility testing (acessibilidade) para portais
         de consumo conforme CDC.
      4. Validar que dados de consumo são retidos pelo prazo legal
         adequado (5 anos — CDC).
    tools:
      - ui-testing
      - accessibility-testing
      - compliance-as-code
      - consumer-protection-checklist
  secops:
    prose: |
      1. Monitorar reclamações de consumidores em Procon e plataformas de
         reclamação (consumidor.gov.br, ReclameAqui) para detecção precoce
         de problemas de privacidade.
      2. Auditar conformidade cumulativa LGPD + CDC periodicamente.
      3. Manter prontidão para resposta a demandas judiciais de consumidores
         com evidências de conformidade.
      4. Monitorar decisões judiciais sobre LGPD + CDC para ajustar postura
         de conformidade.
    tools:
      - consumer-complaint-monitoring
      - compliance-audit
      - legal-monitoring
      - evidence-management
legal_references:
  - framework_id: gdpr
    articles: ["considerando 146"]
    relationship: supports
