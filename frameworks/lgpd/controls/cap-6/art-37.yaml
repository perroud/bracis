id: art-37
family: cap-6
title: "Registro das Operações de Tratamento"
class: LGPD
statement:
  prose: |
    Art. 37. O controlador e o operador devem manter registro das operações de tratamento
    de dados pessoais que realizarem, especialmente quando baseado no legítimo interesse.
guidance:
  prose: |
    O art. 37 institui a obrigação de manter o Registro de Operações de Tratamento de
    Dados Pessoais (ROPA — Record of Processing Activities), equivalente ao art. 30 do
    GDPR.

    **Conteúdo mínimo do registro (baseado em boas práticas e regulamentação da ANPD):**
    - Finalidade do tratamento
    - Base legal utilizada
    - Categorias de dados pessoais tratados
    - Categorias de titulares
    - Categorias de destinatários
    - Transferências internacionais (se aplicável)
    - Prazos de retenção
    - Medidas de segurança técnicas e administrativas

    **Ênfase no legítimo interesse:**
    O artigo destaca "especialmente quando baseado no legítimo interesse", exigindo
    documentação reforçada (LIA — Legitimate Interest Assessment) quando essa base legal
    for utilizada.

    **Quem deve manter:**
    Tanto o controlador quanto o operador. Cada um registra as operações que realiza
    na sua respectiva função.

    **Formato:**
    A lei não especifica formato. Pode ser planilha, sistema dedicado ou integração com
    data catalog. O importante é que seja completo, atualizado e disponível para a ANPD.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar sistema automatizado de ROPA integrado ao data catalog.
      2. Automatizar a coleta de metadados de tratamento a partir de APIs e sistemas.
      3. Vincular cada operação de tratamento a uma base legal registrada.
      4. Implementar workflow de revisão periódica do ROPA.
      5. Criar dashboard com visão consolidada de todas as operações de tratamento.
      6. Integrar ROPA com sistema de gestão de consentimento para rastreabilidade.
    tools:
      - data-catalog
      - ropa-system
      - workflow-engine
      - metadata-management
      - compliance-dashboard
  devsecops:
    prose: |
      1. Implementar annotations/decorators no código para documentar tratamentos de
         dados pessoais automaticamente.
      2. Gerar ROPA entries automaticamente a partir de deployment manifests e API specs.
      3. Validar no pipeline que novos serviços que tratam dados pessoais possuem
         ROPA entry correspondente.
    tools:
      - api-documentation
      - compliance-as-code
      - deployment-annotations
  secops:
    prose: |
      1. Auditar completude do ROPA periodicamente.
      2. Validar que tratamentos detectados pelo SIEM possuem registro no ROPA.
      3. Alertar sobre tratamentos não documentados.
    tools:
      - siem
      - compliance-audit
      - data-discovery
legal_references:
  - framework_id: gdpr
    articles: ["art. 30"]
    relationship: equivalent-to
