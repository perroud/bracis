id: art-43
family: cap-6
title: "Excludentes de Responsabilidade"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 43. Os agentes de tratamento só não serão responsabilizados quando provarem:
  parts:
    - id: art-43-i
      label: "I"
      prose: |
        que não realizaram o tratamento de dados pessoais que lhes é atribuído;
    - id: art-43-ii
      label: "II"
      prose: |
        que, embora tenham realizado o tratamento de dados pessoais que lhes é atribuído,
        não houve violação à legislação de proteção de dados; ou
    - id: art-43-iii
      label: "III"
      prose: |
        que o dano é decorrente de culpa exclusiva do titular dos dados ou de terceiro.
guidance:
  prose: |
    O art. 43 define as três hipóteses em que controlador e operador podem se eximir
    de responsabilidade. O ônus da prova é dos agentes de tratamento (devem PROVAR).

    **I — Não realizaram o tratamento:**
    A defesa de que o agente não é responsável pelo tratamento em questão. Ex.: empresa
    cujos dados vazaram de um sistema ao qual não tinha acesso. Exige prova negativa,
    o que na prática significa demonstrar que seus sistemas não tratam aqueles dados.

    **II — Não houve violação à legislação:**
    A defesa de que, embora tenha tratado os dados, todas as obrigações legais foram
    cumpridas. Esta é a principal linha de defesa e depende de EVIDÊNCIAS de
    conformidade: logs, políticas implementadas, ROPA, RIPD, medidas de segurança
    documentadas, treinamentos realizados.

    **III — Culpa exclusiva do titular ou de terceiro:**
    O dano decorreu exclusivamente de ação do próprio titular (ex.: titular compartilhou
    suas credenciais voluntariamente) ou de terceiro (ex.: ataque hacker sofisticado
    contra o qual medidas razoáveis foram adotadas). Atenção: culpa CONCORRENTE do
    titular não exclui responsabilidade, apenas culpa EXCLUSIVA.

    **Responsabilidade objetiva vs. subjetiva:**
    A LGPD não define expressamente se a responsabilidade é objetiva (independe de culpa)
    ou subjetiva (exige culpa). A doutrina e jurisprudência divergem. O art. 44 sugere
    que há elementos de responsabilidade subjetiva (tratamento irregular). Em relações
    de consumo, aplica-se o CDC (responsabilidade objetiva).

    **Consequência prática:**
    A melhor estratégia jurídica é atuar como se a responsabilidade fosse objetiva:
    manter evidências robustas de conformidade que permitam invocar o inciso II
    (ausência de violação) como defesa.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar sistema abrangente de evidências de conformidade que documente
         todas as medidas técnicas e administrativas adotadas (para invocar inciso II).
      2. Manter data flow maps atualizados que demonstrem exatamente quais dados
         são tratados e quais não são (para invocar inciso I quando aplicável).
      3. Implementar mecanismos de autenticação robusta do titular (MFA, biometria)
         para reduzir risco de culpa do titular por credenciais comprometidas.
      4. Manter logs detalhados de ações do titular na plataforma para eventual
         demonstração de culpa exclusiva (inciso III).
      5. Implementar controles de segurança no estado da arte para demonstrar
         diligência contra ataques de terceiros.
    tools:
      - compliance-evidence-management
      - data-flow-mapping
      - identity-management
      - audit-trail
      - security-controls
  devsecops:
    prose: |
      1. Gerar evidências automatizadas de conformidade em cada release: relatórios
         SAST/DAST, SCA, testes de segurança.
      2. Documentar decisões de segurança e análises de risco em design reviews.
      3. Manter SBOM (Software Bill of Materials) atualizado para demonstrar
         diligência na gestão de dependências.
      4. Implementar security regression tests para demonstrar que
         vulnerabilidades corrigidas não ressurgem.
    tools:
      - security-testing
      - sbom-generation
      - compliance-as-code
      - design-review-documentation
  secops:
    prose: |
      1. Preservar evidências forenses de incidentes em formato admissível
         judicialmente.
      2. Documentar cronologia detalhada de detecção, contenção e remediação
         de incidentes.
      3. Manter registros de treinamentos de segurança realizados por
         colaboradores.
      4. Demonstrar existência de plano de resposta a incidentes e sua
         execução efetiva.
    tools:
      - digital-forensics
      - incident-response
      - training-management
      - evidence-management
legal_references:
  - framework_id: gdpr
    articles: ["art. 82(3)"]
    relationship: equivalent-to
