id: art-41
family: cap-6
title: "Relatório de Impacto à Proteção de Dados Pessoais"
class: LGPD
statement:
  prose: |
    Art. 38. A autoridade nacional poderá determinar ao controlador que elabore relatório
    de impacto à proteção de dados pessoais, inclusive de dados sensíveis, referente a
    suas operações de tratamento de dados, nos termos de regulamento, observados os
    segredos comercial e industrial.

    Parágrafo único. Observado o disposto no caput deste artigo, o relatório deverá
    conter, no mínimo, a descrição dos tipos de dados coletados, a metodologia utilizada
    para a coleta e para a garantia da segurança das informações e a análise do
    controlador com relação a medidas, salvaguardas e mecanismos de mitigação de risco
    adotados.
guidance:
  prose: |
    O Relatório de Impacto à Proteção de Dados Pessoais (RIPD) é o equivalente brasileiro
    ao Data Protection Impact Assessment (DPIA) do GDPR.

    **Diferenças em relação ao DPIA do GDPR:**
    - No GDPR (art. 35), o DPIA é obrigatório em situações específicas (alto risco).
    - Na LGPD, o RIPD pode ser "determinado" pela ANPD. A lei não define quando é
      obrigatório por padrão, mas a ANPD pode exigir a qualquer momento.

    **Conteúdo mínimo do RIPD (art. 38, parágrafo único):**
    1. Descrição dos tipos de dados coletados
    2. Metodologia de coleta
    3. Metodologia para garantia da segurança das informações
    4. Análise do controlador sobre medidas, salvaguardas e mecanismos de mitigação

    **Boas práticas (além do mínimo legal):**
    - Descrição da necessidade e proporcionalidade do tratamento
    - Avaliação dos riscos para os direitos dos titulares
    - Medidas previstas para mitigar os riscos
    - Parecer do encarregado (DPO)
    - Consulta aos titulares quando apropriado

    **Quando elaborar proativamente (recomendação):**
    - Tratamento de dados sensíveis em larga escala
    - Monitoramento sistemático de áreas públicas (CFTV)
    - Decisões automatizadas que afetem titulares
    - Novos produtos/serviços que envolvam dados pessoais
    - Transferências internacionais de dados
    - Uso de novas tecnologias (IA/ML, biometria, IoT)
implementation_guidance:
  platform_engineering:
    prose: |
      1. Criar template padronizado de RIPD integrado ao ciclo de desenvolvimento.
      2. Implementar workflow de Privacy Impact Assessment (PIA) como gate no processo
         de aprovação de novos projetos/features.
      3. Integrar RIPD com data catalog e ROPA para preencher automaticamente inventário
         de dados e tratamentos.
      4. Manter repositório versionado de RIPDs para auditoria.
      5. Implementar scoring de risco automatizado baseado em categorias de dados e
         volumes de tratamento.
    tools:
      - pia-workflow
      - risk-assessment-platform
      - data-catalog
      - document-management
  devsecops:
    prose: |
      1. Incluir PIA/RIPD como gate no pipeline para features que envolvam novos
         tratamentos de dados pessoais.
      2. Automatizar coleta de informações técnicas para o RIPD (tipos de dados,
         medidas de segurança, fluxos de dados).
      3. Validar que medidas de mitigação identificadas no RIPD foram implementadas
         antes do deploy em produção.
    tools:
      - pipeline-gates
      - compliance-as-code
      - threat-modeling
      - security-review
  secops:
    prose: |
      1. Monitorar implementação das medidas de mitigação definidas nos RIPDs.
      2. Reavaliar RIPDs após incidentes de segurança.
      3. Auditar periodicamente se RIPDs estão atualizados.
    tools:
      - compliance-dashboard
      - risk-register
      - audit-management
legal_references:
  - framework_id: gdpr
    articles: ["art. 35", "art. 36"]
    relationship: equivalent-to
