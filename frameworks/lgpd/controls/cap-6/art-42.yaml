id: art-42
family: cap-6
title: "Responsabilidade e Ressarcimento de Danos"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 42. O controlador ou o operador que, em razão do exercício de atividade de
    tratamento de dados pessoais, causar a outrem dano patrimonial, moral, individual ou
    coletivo, em violação à legislação de proteção de dados pessoais, é obrigado a
    repará-lo.
  additional:
    - id: art-42-p1
      label: "§ 1º"
      prose: |
        A fim de assegurar a efetiva indenização ao titular dos dados:
        I - o operador responde solidariamente pelos danos causados pelo tratamento quando
        descumprir as obrigações da legislação de proteção de dados ou quando não tiver
        seguido as instruções lícitas do controlador, hipótese em que o operador equipara-se
        ao controlador, salvo nos casos de exclusão previstos no art. 43 desta Lei;
        II - os controladores que estiverem diretamente envolvidos no tratamento do qual
        decorreram danos ao titular dos dados respondem solidariamente, salvo nos casos
        de exclusão previstos no art. 43 desta Lei.
    - id: art-42-p2
      label: "§ 2º"
      prose: |
        O juiz, no processo civil, poderá inverter o ônus da prova a favor do titular dos
        dados quando, a seu juízo, for verossímil a alegação, houver hipossuficiência para
        fins de produção de prova ou quando a produção de prova pelo titular resultar-lhe
        excessivamente onerosa.
    - id: art-42-p3
      label: "§ 3º"
      prose: |
        As ações de reparação por danos coletivos que tenham por objeto a responsabilização
        nos termos do caput deste artigo podem ser exercidas coletivamente em juízo,
        observado o disposto na legislação pertinente.
    - id: art-42-p4
      label: "§ 4º"
      prose: |
        Aquele que reparar o dano ao titular tem direito de regresso contra os demais
        responsáveis, na medida de sua participação no evento danoso.
guidance:
  prose: |
    O art. 42 é o regime de responsabilidade civil da LGPD. Ele determina que tanto
    controlador quanto operador podem ser responsabilizados por danos causados pelo
    tratamento irregular de dados.

    **Responsabilidade solidária (§ 1º):**
    - **Operador solidário (inciso I):** Quando o operador descumpre a LGPD ou não
      segue instruções do controlador, responde solidariamente. Nesse caso, o
      operador é equiparado ao controlador.
    - **Controladores solidários (inciso II):** Quando múltiplos controladores estão
      envolvidos no tratamento que causou dano, todos respondem solidariamente.

    **Inversão do ônus da prova (§ 2º):**
    O juiz pode inverter o ônus da prova quando:
    - A alegação for verossímil
    - O titular for hipossuficiente
    - A produção de prova for excessivamente onerosa para o titular
    Na prática, em relações de consumo, a inversão é quase automática.

    **Ações coletivas (§ 3º):**
    Danos coletivos (ex.: vazamento de dados em massa) podem ser objeto de ação
    coletiva por MP, Procon, associações de consumidores.

    **Direito de regresso (§ 4º):**
    Quem pagar a indenização pode cobrar dos demais responsáveis proporcionalmente
    à participação no dano. Ex.: controlador que indeniza pode cobrar do operador
    que causou o vazamento.

    **Consequência prática:**
    A solidariedade e a inversão do ônus da prova tornam essencial:
    1. Documentar todas as medidas de segurança adotadas (para defesa em juízo)
    2. Ter DPAs claros com operadores (para eventual regresso)
    3. Ter seguro de responsabilidade civil (cyber insurance)
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar sistema robusto de evidências de conformidade que documente
         todas as medidas técnicas e administrativas adotadas.
      2. Manter audit trail imutável de todas as operações em dados pessoais
         para uso como prova em eventual litígio.
      3. Implementar DPAs com cláusulas de indenização e limitação de
         responsabilidade com todos os operadores.
      4. Criar sistema de gestão de incidentes com documentação completa de
         causas, impactos e medidas corretivas.
      5. Implementar seguro cibernético (cyber insurance) proporcional ao
         volume de dados tratados.
      6. Manter logs com retenção compatível com prazos prescricionais
         (mínimo 5 anos).
    tools:
      - compliance-evidence-management
      - audit-trail
      - contract-management
      - incident-management
      - log-management
      - cyber-insurance
  devsecops:
    prose: |
      1. Implementar compliance-as-code que gere evidências automáticas de
         controles de segurança implementados.
      2. Manter histórico completo de vulnerabilidades encontradas e corrigidas
         como evidência de diligência.
      3. Documentar arquitetura de segurança e decisões de privacy-by-design
         para demonstrar adoção de medidas preventivas.
      4. Validar que logs de auditoria são completos, íntegros e assinados
         digitalmente.
    tools:
      - compliance-as-code
      - vulnerability-management
      - security-documentation
      - log-integrity
  secops:
    prose: |
      1. Preservar evidências digitais de incidentes seguindo cadeia de custódia
         forense para uso em eventual litígio.
      2. Documentar todas as medidas de resposta a incidentes com timestamps
         para demonstrar diligência.
      3. Manter relatórios periódicos de postura de segurança como evidência
         preventiva.
      4. Implementar processo de contenção rápida de incidentes para
         minimizar danos e demonstrar cooperação (fator atenuante).
    tools:
      - digital-forensics
      - incident-response
      - evidence-management
      - siem
legal_references:
  - framework_id: gdpr
    articles: ["art. 82"]
    relationship: equivalent-to
