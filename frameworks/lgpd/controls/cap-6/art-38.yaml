id: art-38
family: cap-6
title: "Relatório de Impacto à Proteção de Dados Pessoais (RIPD)"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 38. A autoridade nacional poderá determinar ao controlador que elabore relatório
    de impacto à proteção de dados pessoais, inclusive de dados sensíveis, referente a suas
    operações de tratamento de dados, nos termos de regulamento, observados os segredos
    comercial e industrial.
  additional:
    - id: art-38-paragrafo
      label: "Parágrafo único"
      prose: |
        Observado o disposto no caput deste artigo, o relatório deverá conter, no mínimo,
        a descrição dos tipos de dados coletados, a metodologia utilizada para a coleta e
        para a garantia da segurança das informações e a análise do controlador com relação
        a medidas, salvaguardas e mecanismos de mitigação de risco adotados.
guidance:
  prose: |
    O art. 38 trata do Relatório de Impacto à Proteção de Dados Pessoais (RIPD),
    equivalente ao Data Protection Impact Assessment (DPIA) do GDPR.

    **Natureza:**
    Na LGPD, o RIPD pode ser determinado pela ANPD a qualquer momento. Diferente do
    GDPR, onde o DPIA é obrigatório em situações específicas (art. 35 GDPR), na LGPD
    é uma prerrogativa da ANPD solicitar. Porém, como boa prática, controladores
    devem elaborar RIPD proativamente para tratamentos de alto risco.

    **Conteúdo mínimo (parágrafo único):**
    1. Descrição dos tipos de dados coletados
    2. Metodologia de coleta
    3. Medidas de segurança das informações
    4. Análise de riscos
    5. Salvaguardas e mecanismos de mitigação

    **Quando elaborar proativamente:**
    Embora a LGPD não defina obrigatoriedade prévia, recomenda-se RIPD para:
    - Tratamento de dados sensíveis em larga escala
    - Monitoramento sistemático de áreas publicamente acessíveis
    - Decisões automatizadas com efeitos significativos (art. 20)
    - Tratamento de dados de crianças e adolescentes (art. 14)
    - Transferência internacional de dados (art. 33)
    - Novas tecnologias que possam gerar riscos aos titulares

    **Segredos comercial e industrial:**
    O RIPD pode ser elaborado com observância de segredos comerciais. Porém, isso
    não pode ser usado para ocultar informações relevantes da ANPD (que tem acesso
    ao documento sob sigilo).

    **Diferença em relação ao GDPR:**
    No GDPR, o DPIA é obrigatório antes do tratamento quando há alto risco. Na LGPD,
    a ANPD pode solicitar a qualquer momento (antes ou durante o tratamento). A melhor
    prática é adotar a abordagem do GDPR: elaborar antes do tratamento de alto risco.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar template estruturado de RIPD com os campos mínimos exigidos
         pelo parágrafo único (tipos de dados, metodologia, segurança, riscos,
         mitigações).
      2. Criar workflow de Privacy Impact Assessment integrado ao ciclo de
         desenvolvimento de novos produtos e funcionalidades.
      3. Implementar sistema de gestão de RIPD com versionamento, aprovações e
         revisões periódicas.
      4. Integrar RIPD com data catalog e ROPA para preenchimento automático de
         informações sobre tipos de dados e tratamentos.
      5. Criar checklist automatizado de triagem (screening) para determinar se
         novo tratamento requer RIPD.
      6. Manter repositório de RIPD prontos para apresentação à ANPD quando
         solicitados.
    tools:
      - privacy-impact-assessment
      - workflow-engine
      - document-management
      - data-catalog
      - risk-assessment
      - compliance-dashboard
  devsecops:
    prose: |
      1. Implementar gate no pipeline de desenvolvimento que exija RIPD aprovado
         para funcionalidades que tratam dados sensíveis ou em larga escala.
      2. Validar que medidas de mitigação documentadas no RIPD estão efetivamente
         implementadas no código e infraestrutura.
      3. Automatizar triagem de RIPD: detectar no pull request se nova
         funcionalidade trata dados pessoais e acionar processo de avaliação.
      4. Manter evidências técnicas das salvaguardas documentadas no RIPD.
    tools:
      - privacy-by-design-checklist
      - compliance-as-code
      - code-review-automation
      - security-testing
  secops:
    prose: |
      1. Auditar periodicamente que RIPDs estão atualizados e refletem
         operações de tratamento atuais.
      2. Monitorar que medidas de mitigação documentadas nos RIPDs estão
         operacionais.
      3. Verificar que novos tratamentos de alto risco possuem RIPD elaborado
         antes do início das operações.
      4. Manter prontidão para apresentar RIPDs à ANPD quando solicitados.
    tools:
      - compliance-audit
      - risk-monitoring
      - document-management
      - anpd-communication
legal_references:
  - framework_id: gdpr
    articles: ["art. 35", "art. 36"]
    relationship: equivalent-to
