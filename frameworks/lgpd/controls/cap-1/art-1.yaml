id: art-1
family: cap-1
title: "Objeto da Lei"
class: LGPD
statement:
  prose: |
    Art. 1º Esta Lei dispõe sobre o tratamento de dados pessoais, inclusive nos meios
    digitais, por pessoa natural ou por pessoa jurídica de direito público ou privado,
    com o objetivo de proteger os direitos fundamentais de liberdade e de privacidade e
    o livre desenvolvimento da personalidade da pessoa natural.

    Parágrafo único. As normas gerais contidas nesta Lei são de interesse nacional e
    devem ser observadas pela União, Estados, Distrito Federal e Municípios.
guidance:
  prose: |
    O art. 1º define o escopo abrangente da LGPD: qualquer operação de tratamento de
    dados pessoais realizada no território brasileiro ou que envolva dados de pessoas
    localizadas no Brasil está sujeita à lei. Isso inclui operações digitais e físicas,
    realizadas tanto por pessoas naturais (com finalidade econômica) quanto por pessoas
    jurídicas de direito público ou privado.

    A inclusão do parágrafo único pela Lei nº 13.853/2019 reforça que a LGPD é uma norma
    nacional, prevalecendo sobre legislações estaduais e municipais conflitantes, garantindo
    uniformidade regulatória em todo o território nacional.
implementation_guidance:
  platform_engineering:
    prose: |
      Garantir que todas as plataformas e serviços que processam dados pessoais de indivíduos
      no Brasil estejam em conformidade com a LGPD, independentemente da localização dos
      servidores. Implementar data classification para identificar dados pessoais em todos
      os sistemas.
    tools:
      - data-classification-engines
      - data-catalog
      - metadata-management
  devsecops:
    prose: |
      Integrar verificações de conformidade com a LGPD no pipeline CI/CD. Implementar
      scanning automático para detectar dados pessoais em repositórios, logs e artefatos.
    tools:
      - secret-scanning
      - sast
      - data-loss-prevention
  secops:
    prose: |
      Manter inventário atualizado de todos os sistemas que processam dados pessoais.
      Implementar monitoramento contínuo para detectar tratamento não autorizado de dados.
    tools:
      - siem
      - dlp
      - asset-inventory
legal_references:
