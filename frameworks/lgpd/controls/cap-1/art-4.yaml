id: art-4
family: cap-1
title: "Exceções ao Âmbito de Aplicação"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 4º Esta Lei não se aplica ao tratamento de dados pessoais:
  parts:
    - id: art-4-i
      label: "I"
      prose: |
        realizado por pessoa natural para fins exclusivamente particulares e não econômicos;
    - id: art-4-ii
      label: "II"
      prose: |
        realizado para fins exclusivamente:
        a) jornalístico e artísticos; ou
        b) acadêmicos, aplicando-se a esta hipótese os arts. 7º e 11 desta Lei;
    - id: art-4-iii
      label: "III"
      prose: |
        realizado para fins exclusivos de:
        a) segurança pública;
        b) defesa nacional;
        c) segurança do Estado; ou
        d) atividades de investigação e repressão de infrações penais;
    - id: art-4-iv
      label: "IV"
      prose: |
        provenientes de fora do território nacional e que não sejam objeto de comunicação,
        uso compartilhado de dados com agentes de tratamento brasileiros ou objeto de
        transferência internacional de dados com outro país que não o de proveniência,
        desde que o país de proveniência proporcione grau de proteção de dados pessoais
        adequado ao previsto nesta Lei.
  additional:
    - id: art-4-p1
      label: "§ 1º"
      prose: |
        O tratamento de dados pessoais previsto no inciso III será regido por legislação
        específica, que deverá prever medidas proporcionais e estritamente necessárias ao
        atendimento do interesse público, observados o devido processo legal, os princípios
        gerais de proteção e os direitos do titular previstos nesta Lei.
    - id: art-4-p2
      label: "§ 2º"
      prose: |
        É vedado o tratamento dos dados a que se refere o inciso III do caput deste artigo
        por pessoa de direito privado, exceto em procedimentos sob tutela de pessoa jurídica
        de direito público, que serão objeto de informe específico à autoridade nacional e
        que deverão observar a limitação imposta no § 4º deste artigo.
    - id: art-4-p3
      label: "§ 3º"
      prose: |
        A autoridade nacional emitirá opiniões técnicas ou recomendações referentes às
        exceções previstas no inciso III do caput deste artigo e deverá solicitar aos
        responsáveis relatórios de impacto à proteção de dados pessoais.
    - id: art-4-p4
      label: "§ 4º"
      prose: |
        Em nenhum caso a totalidade dos dados pessoais de banco de dados de que trata o
        inciso III do caput deste artigo poderá ser tratada por pessoa de direito privado,
        salvo por aquela que possua capital integralmente constituído pelo poder público.
guidance:
  prose: |
    O art. 4º delimita as exceções ao âmbito de aplicação da LGPD. Essas exceções são
    taxativas e devem ser interpretadas restritivamente.

    **Inciso I — Uso pessoal:** Agenda de contatos pessoais, álbum de fotos familiar.
    Não se aplica a influenciadores digitais, pois há finalidade econômica.

    **Inciso II — Jornalismo, arte e academia:** Proteção à liberdade de imprensa e
    liberdade acadêmica. Para fins acadêmicos, ainda se aplicam as bases legais do art. 7º
    e os requisitos para dados sensíveis do art. 11. Portanto, a exceção acadêmica é
    parcial, não total.

    **Inciso III — Segurança pública e defesa:** Exceção mais sensível. O § 1º exige
    legislação específica (ainda não aprovada). O § 2º veda tratamento por empresas
    privadas, salvo sob tutela de pessoa jurídica de direito público. O § 4º impede que
    a totalidade de bancos de dados de segurança seja operada por privados.

    **Inciso IV — Dados em trânsito:** Dados originários do exterior que apenas transitam
    pelo Brasil sem compartilhamento com agentes brasileiros. Exige que o país de origem
    tenha proteção adequada.

    **Impacto para empresas de tecnologia:**
    - Empresas que prestam serviço a órgãos de segurança pública devem observar os §§ 2º a 4º.
    - A exceção jornalística não se aplica a plataformas que publicam conteúdo de terceiros.
    - Dados acadêmicos ainda exigem conformidade parcial com a LGPD.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar classificação de dados que identifique tratamentos enquadrados nas
         exceções do art. 4º.
      2. Para dados de segurança pública (inciso III), implementar controles de acesso
         restritos e segregação de ambientes conforme § 2º.
      3. Para dados em trânsito (inciso IV), implementar controles que garantam que não
         haja compartilhamento com agentes brasileiros sem conformidade com a LGPD.
      4. Manter registro de dados que se enquadram em exceções, com justificativa legal
         documentada para cada caso.
    tools:
      - data-classification-engines
      - access-control-manager
      - data-flow-mapping
      - policy-engine
  devsecops:
    prose: |
      1. Implementar validação no pipeline para garantir que dados classificados como
         exceção do art. 4º tenham justificativa legal documentada.
      2. Testar segregação de ambientes para dados de segurança pública.
      3. Validar que dados em trânsito (inciso IV) não são persistidos ou compartilhados
         fora dos limites da exceção.
    tools:
      - compliance-as-code
      - data-classification-validation
      - integration-testing
  secops:
    prose: |
      1. Auditar periodicamente a classificação de dados como exceção do art. 4º para
         garantir que não há enquadramento indevido (uso da exceção para evitar conformidade).
      2. Monitorar acesso a dados de segurança pública para garantir conformidade com § 2º.
      3. Alertar sobre tentativas de compartilhamento de dados em trânsito (inciso IV)
         com agentes brasileiros.
    tools:
      - siem
      - data-classification-audit
      - access-monitoring
legal_references:
  - framework_id: gdpr
    articles: ["art. 2(2)", "considerando 18"]
    relationship: equivalent-to
