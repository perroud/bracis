id: art-5
family: cap-1
title: "Definições"
class: LGPD
statement:
  prose: |
    Art. 5º Para os fins desta Lei, considera-se:
  parts:
    - id: art-5-i
      label: "I"
      prose: |
        dado pessoal: informação relacionada a pessoa natural identificada ou identificável;
    - id: art-5-ii
      label: "II"
      prose: |
        dado pessoal sensível: dado pessoal sobre origem racial ou étnica, convicção
        religiosa, opinião política, filiação a sindicato ou a organização de caráter
        religioso, filosófico ou político, dado referente à saúde ou à vida sexual,
        dado genético ou biométrico, quando vinculado a uma pessoa natural;
    - id: art-5-iii
      label: "III"
      prose: |
        dado anonimizado: dado relativo a titular que não possa ser identificado,
        considerando a utilização de meios técnicos razoáveis e disponíveis na ocasião
        de seu tratamento;
    - id: art-5-iv
      label: "IV"
      prose: |
        banco de dados: conjunto estruturado de dados pessoais, estabelecido em um ou
        em vários locais, em suporte eletrônico ou físico;
    - id: art-5-v
      label: "V"
      prose: |
        titular: pessoa natural a quem se referem os dados pessoais que são objeto de
        tratamento;
    - id: art-5-vi
      label: "VI"
      prose: |
        controlador: pessoa natural ou jurídica, de direito público ou privado, a quem
        competem as decisões referentes ao tratamento de dados pessoais;
    - id: art-5-vii
      label: "VII"
      prose: |
        operador: pessoa natural ou jurídica, de direito público ou privado, que realiza
        o tratamento de dados pessoais em nome do controlador;
    - id: art-5-viii
      label: "VIII"
      prose: |
        encarregado: pessoa indicada pelo controlador e operador para atuar como canal de
        comunicação entre o controlador, os titulares dos dados e a Autoridade Nacional de
        Proteção de Dados (ANPD);
    - id: art-5-ix
      label: "IX"
      prose: |
        agentes de tratamento: o controlador e o operador;
    - id: art-5-x
      label: "X"
      prose: |
        tratamento: toda operação realizada com dados pessoais, como as que se referem a
        coleta, produção, recepção, classificação, utilização, acesso, reprodução,
        transmissão, distribuição, processamento, arquivamento, armazenamento, eliminação,
        avaliação ou controle da informação, modificação, comunicação, transferência,
        difusão ou extração;
    - id: art-5-xi
      label: "XI"
      prose: |
        anonimização: utilização de meios técnicos razoáveis e disponíveis no momento do
        tratamento, por meio dos quais um dado perde a possibilidade de associação, direta
        ou indireta, a um indivíduo;
    - id: art-5-xii
      label: "XII"
      prose: |
        consentimento: manifestação livre, informada e inequívoca pela qual o titular
        concorda com o tratamento de seus dados pessoais para uma finalidade determinada;
    - id: art-5-xiii
      label: "XIII"
      prose: |
        bloqueio: suspensão temporária de qualquer operação de tratamento, mediante guarda
        do dado pessoal ou do banco de dados;
    - id: art-5-xiv
      label: "XIV"
      prose: |
        eliminação: exclusão de dado ou de conjunto de dados armazenados em banco de dados,
        independentemente do procedimento empregado;
    - id: art-5-xv
      label: "XV"
      prose: |
        transferência internacional de dados: transferência de dados pessoais para país
        estrangeiro ou organismo internacional do qual o país seja membro;
    - id: art-5-xvi
      label: "XVI"
      prose: |
        uso compartilhado de dados: comunicação, difusão, transferência internacional,
        interconexão de dados pessoais ou tratamento compartilhado de bancos de dados
        pessoais por órgãos e entidades públicos no cumprimento de suas competências
        legais, ou entre esses e entes privados, reciprocamente, com autorização
        específica, para uma ou mais modalidades de tratamento permitidas por esses
        entes públicos, ou entre entes privados;
    - id: art-5-xvii
      label: "XVII"
      prose: |
        relatório de impacto à proteção de dados pessoais: documentação do controlador
        que contém a descrição dos processos de tratamento de dados pessoais que podem
        gerar riscos às liberdades civis e aos direitos fundamentais, bem como medidas,
        salvaguardas e mecanismos de mitigação de risco;
    - id: art-5-xviii
      label: "XVIII"
      prose: |
        órgão de pesquisa: órgão ou entidade da administração pública direta ou indireta
        ou pessoa jurídica de direito privado sem fins lucrativos legalmente constituída
        sob as leis brasileiras, com sede e foro no País, que inclua em sua missão
        institucional ou em seu objetivo social ou estatutário a pesquisa básica ou
        aplicada de caráter histórico, científico, tecnológico ou estatístico;
    - id: art-5-xix
      label: "XIX"
      prose: |
        autoridade nacional: órgão da administração pública responsável por zelar,
        implementar e fiscalizar o cumprimento desta Lei em todo o território nacional.
guidance:
  prose: |
    O art. 5º é o alicerce conceitual da LGPD. Cada definição tem implicações diretas
    na implementação técnica:

    - **Dado pessoal (I):** Definição ampla. Inclui não apenas nome e CPF, mas qualquer
      informação que possa identificar uma pessoa, direta ou indiretamente (IP, cookies,
      device fingerprint, dados de geolocalização).

    - **Dado pessoal sensível (II):** Exige proteção reforçada. Bases legais mais
      restritas (art. 11). Dados biométricos utilizados em autenticação são sensíveis.

    - **Dado anonimizado (III):** Dados genuinamente anonimizados estão fora do escopo
      da LGPD. Porém, a anonimização deve ser irreversível considerando meios técnicos
      razoáveis. Pseudonimização NÃO é anonimização.

    - **Tratamento (X):** Lista exaustiva de operações. Qualquer interação com dado
      pessoal, incluindo mero armazenamento ou visualização em tela, constitui tratamento.

    - **Consentimento (XII):** Deve ser livre, informado e inequívoco. Consentimento
      genérico ou pré-marcado é inválido. Deve ser vinculado a finalidade específica.

    - **Relatório de impacto (XVII):** Equivalente ao DPIA do GDPR. Obrigatório quando
      o tratamento puder gerar riscos às liberdades civis e aos direitos fundamentais.

    - **Controlador vs. Operador (VI e VII):** A distinção é funcional, não contratual.
      Quem decide sobre o tratamento é controlador; quem executa em nome de outro é operador.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar sistema de classificação de dados com categorias mapeadas diretamente
         às definições do art. 5º (dado pessoal, dado sensível, dado anonimizado).
      2. Criar metadata tags para identificar controlador e operador em cada fluxo de dados.
      3. Implementar mecanismos de anonimização e pseudonimização com validação técnica.
      4. Manter catálogo de dados (data catalog) com inventário de todos os tratamentos.
      5. Implementar controle de consentimento granular por finalidade.
    tools:
      - data-catalog
      - data-classification
      - consent-management-platform
      - anonymization-engine
      - metadata-management
  devsecops:
    prose: |
      1. Implementar PII detection no pipeline CI/CD para identificar dados pessoais em
         código-fonte, configurações, logs e artefatos de build.
      2. Validar que dados sensíveis (art. 5º, II) recebem criptografia adequada.
      3. Garantir que mecanismos de anonimização no código produzem resultados irreversíveis.
      4. Implementar testes automatizados para validar classificação de dados.
    tools:
      - pii-scanner
      - sast
      - secret-detection
      - data-masking-tools
  secops:
    prose: |
      1. Manter inventário completo de bancos de dados (art. 5º, IV) com classificação.
      2. Monitorar acessos a dados sensíveis com alertas em tempo real.
      3. Validar periodicamente a eficácia dos processos de anonimização.
      4. Auditar a cadeia controlador-operador para garantir conformidade contratual.
    tools:
      - siem
      - dlp
      - database-activity-monitoring
      - identity-governance
legal_references:
