id: art-6
family: cap-1
title: "Princípios"
class: LGPD
statement:
  prose: |
    Art. 6º As atividades de tratamento de dados pessoais deverão observar a boa-fé e
    os seguintes princípios:
  parts:
    - id: art-6-i
      label: "I"
      prose: |
        finalidade: realização do tratamento para propósitos legítimos, específicos,
        explícitos e informados ao titular, sem possibilidade de tratamento posterior
        de forma incompatível com essas finalidades;
    - id: art-6-ii
      label: "II"
      prose: |
        adequação: compatibilidade do tratamento com as finalidades informadas ao
        titular, de acordo com o contexto do tratamento;
    - id: art-6-iii
      label: "III"
      prose: |
        necessidade: limitação do tratamento ao mínimo necessário para a realização
        de suas finalidades, com abrangência dos dados pertinentes, proporcionais e
        não excessivos em relação às finalidades do tratamento de dados;
    - id: art-6-iv
      label: "IV"
      prose: |
        livre acesso: garantia, aos titulares, de consulta facilitada e gratuita sobre
        a forma e a duração do tratamento, bem como sobre a integralidade de seus dados
        pessoais;
    - id: art-6-v
      label: "V"
      prose: |
        qualidade dos dados: garantia, aos titulares, de exatidão, clareza, relevância
        e atualização dos dados, de acordo com a necessidade e para o cumprimento da
        finalidade de seu tratamento;
    - id: art-6-vi
      label: "VI"
      prose: |
        transparência: garantia, aos titulares, de informações claras, precisas e
        facilmente acessíveis sobre a realização do tratamento e os respectivos agentes
        de tratamento, observados os segredos comercial e industrial;
    - id: art-6-vii
      label: "VII"
      prose: |
        segurança: utilização de medidas técnicas e administrativas aptas a proteger
        os dados pessoais de acessos não autorizados e de situações acidentais ou
        ilícitas de destruição, perda, alteração, comunicação ou difusão;
    - id: art-6-viii
      label: "VIII"
      prose: |
        prevenção: adoção de medidas para prevenir a ocorrência de danos em virtude
        do tratamento de dados pessoais;
    - id: art-6-ix
      label: "IX"
      prose: |
        não discriminação: impossibilidade de realização do tratamento para fins
        discriminatórios ilícitos ou abusivos;
    - id: art-6-x
      label: "X"
      prose: |
        responsabilização e prestação de contas: demonstração, pelo agente, da adoção
        de medidas eficazes e capazes de comprovar a observância e o cumprimento das
        normas de proteção de dados pessoais e, inclusive, da eficácia dessas medidas.
guidance:
  prose: |
    Os dez princípios do art. 6º são a base para toda decisão de tratamento de dados
    pessoais. Na prática de engenharia de software:

    - **Finalidade + Adequação:** Todo campo de dado pessoal coletado deve ter uma
      justificativa documentada. Coletar dados "para uso futuro" viola esses princípios.

    - **Necessidade (minimização):** Equivalente ao princípio de minimização do GDPR.
      Coletar apenas o estritamente necessário. Revisar formulários e APIs para remover
      campos desnecessários.

    - **Livre acesso + Transparência:** Implementar portal do titular com acesso aos
      próprios dados. Privacy policy clara e acessível.

    - **Qualidade dos dados:** Manter dados atualizados. Implementar processos de
      validação e atualização periódica.

    - **Segurança:** Criptografia, controle de acesso, logs de auditoria, backup.
      Medidas técnicas E administrativas.

    - **Prevenção:** Privacy by Design e Privacy by Default. Avaliações de impacto
      antes de novos tratamentos.

    - **Não discriminação:** Atenção especial em algoritmos de IA/ML que usem dados
      pessoais. Testes de viés obrigatórios.

    - **Responsabilização e prestação de contas:** Documentar TUDO. Manter evidências
      de conformidade. Logs, políticas, treinamentos, auditorias.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Privacy by Design: Incorporar os princípios desde a arquitetura dos sistemas.
      2. Implementar data minimization controls por padrão em formulários e APIs.
      3. Criar portal de transparência/privacidade para titulares (livre acesso).
      4. Implementar mecanismo de purpose limitation vinculando dados a finalidades.
      5. Implementar data quality checks automatizados.
      6. Manter registro de atividades de tratamento (ROPA) automatizado.
    tools:
      - consent-management-platform
      - data-catalog
      - privacy-portal
      - data-quality-framework
  devsecops:
    prose: |
      1. Implementar privacy linting no CI/CD para validar minimização de dados.
      2. Garantir que logs não contenham dados pessoais desnecessários (princípio da necessidade).
      3. Implementar testes automatizados de bias/discriminação em modelos de ML.
      4. Validar criptografia de dados em trânsito e em repouso no pipeline.
      5. Gerar relatórios automáticos de conformidade (prestação de contas).
    tools:
      - privacy-linter
      - log-sanitizer
      - bias-detection
      - encryption-validation
      - compliance-reporter
  secops:
    prose: |
      1. Monitorar acessos não autorizados a dados pessoais (princípio da segurança).
      2. Implementar alertas para uso de dados fora da finalidade declarada.
      3. Manter trilha de auditoria completa para prestação de contas.
      4. Realizar avaliações periódicas de riscos à privacidade (prevenção).
    tools:
      - siem
      - dlp
      - audit-trail
      - risk-assessment-platform
legal_references:
  - framework_id: gdpr
    articles: ["art. 5"]
    relationship: equivalent-to
