id: art-3
family: cap-1
title: "Âmbito de Aplicação Territorial"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 3º Esta Lei aplica-se a qualquer operação de tratamento realizada por pessoa
    natural ou por pessoa jurídica de direito público ou privado, independentemente do
    meio, do país de sua sede ou do país onde estejam localizados os dados, desde que:
  parts:
    - id: art-3-i
      label: "I"
      prose: |
        a operação de tratamento seja realizada no território nacional;
    - id: art-3-ii
      label: "II"
      prose: |
        a atividade de tratamento tenha por objetivo a oferta ou o fornecimento de bens
        ou serviços ou o tratamento de dados de indivíduos localizados no território
        nacional;
    - id: art-3-iii
      label: "III"
      prose: |
        os dados pessoais objeto do tratamento tenham sido coletados no território nacional.
  additional:
    - id: art-3-p1
      label: "§ 1º"
      prose: |
        Consideram-se coletados no território nacional os dados pessoais cujo titular nele
        se encontre no momento da coleta.
    - id: art-3-p2
      label: "§ 2º"
      prose: |
        Excetua-se do disposto no inciso I deste artigo o tratamento de dados previsto no
        inciso IV do caput do art. 4º desta Lei.
guidance:
  prose: |
    O art. 3º define o alcance extraterritorial da LGPD, seguindo modelo semelhante ao
    GDPR (art. 3º). A LGPD aplica-se em três hipóteses independentes:

    **Inciso I — Tratamento no território nacional:** Qualquer processamento que ocorra
    fisicamente no Brasil, independentemente da nacionalidade do titular ou da sede da
    empresa. Inclui servidores hospedados no Brasil.

    **Inciso II — Oferta a indivíduos no Brasil:** O critério de conexão mais amplo.
    Se uma empresa estrangeira oferece produtos ou serviços a pessoas localizadas no
    Brasil (site em português, aceita Real, marketing direcionado ao Brasil), a LGPD
    se aplica mesmo que os dados sejam processados no exterior. Equivalente ao art.
    3(2)(a) do GDPR.

    **Inciso III — Dados coletados no Brasil:** Se os dados foram coletados enquanto o
    titular estava no Brasil (§ 1º), a LGPD se aplica ao tratamento subsequente, mesmo
    que realizado no exterior.

    **Implicações práticas para empresas de tecnologia:**
    - SaaS globais com clientes brasileiros estão sujeitos à LGPD.
    - CDNs e edge computing com nós no Brasil estão sujeitos.
    - Apps disponíveis na App Store/Play Store brasileira estão sujeitos.
    - Subprocessadores no exterior de dados coletados no Brasil estão sujeitos.

    **Exceção (§ 2º):** Tratamento para fins de segurança pública, defesa nacional,
    segurança do Estado ou atividades de investigação e repressão de infrações penais
    (art. 4º, IV) não se submete ao inciso I.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar geolocalização na coleta de dados para registrar o país de coleta
         e determinar aplicabilidade da LGPD.
      2. Configurar data residency controls para dados coletados no Brasil.
      3. Manter inventário de todos os locais de processamento (data centers, CDNs,
         serviços cloud) e mapear quais processam dados sujeitos à LGPD.
      4. Implementar controles de transferência internacional (art. 33) para dados
         que saem do Brasil.
      5. Configurar feature flags por jurisdição para aplicar controles de privacidade
         específicos da LGPD quando o titular estiver no Brasil.
    tools:
      - geoip-detection
      - data-residency-controls
      - cloud-asset-inventory
      - feature-flags
      - data-flow-mapping
  devsecops:
    prose: |
      1. Implementar testes que validem que dados coletados no Brasil recebem tratamento
         conforme LGPD (consentimento, bases legais, direitos do titular).
      2. Validar que transferências internacionais passam por controles adequados.
      3. Documentar no pipeline o fluxo de dados cross-border para cada serviço.
      4. Implementar tags de jurisdição nos dados para rastreabilidade.
    tools:
      - data-flow-analysis
      - integration-testing
      - compliance-as-code
      - data-tagging
  secops:
    prose: |
      1. Monitorar fluxos de dados para detectar transferências internacionais não
         autorizadas de dados sujeitos à LGPD.
      2. Auditar subprocessadores e fornecedores para validar que dados coletados no
         Brasil recebem proteção adequada.
      3. Alertar sobre novos serviços ou integrações que possam envolver processamento
         de dados de titulares brasileiros fora dos controles mapeados.
    tools:
      - siem
      - data-loss-prevention
      - third-party-risk-management
      - network-monitoring
legal_references:
  - framework_id: gdpr
    articles: ["art. 3"]
    relationship: equivalent-to
