id: art-2
family: cap-1
title: "Fundamentos da Proteção de Dados Pessoais"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 2º A disciplina da proteção de dados pessoais tem como fundamentos:
  parts:
    - id: art-2-i
      label: "I"
      prose: |
        o respeito à privacidade;
    - id: art-2-ii
      label: "II"
      prose: |
        a autodeterminação informativa;
    - id: art-2-iii
      label: "III"
      prose: |
        a liberdade de expressão, de informação, de comunicação e de opinião;
    - id: art-2-iv
      label: "IV"
      prose: |
        a inviolabilidade da intimidade, da honra e da imagem;
    - id: art-2-v
      label: "V"
      prose: |
        o desenvolvimento econômico e tecnológico e a inovação;
    - id: art-2-vi
      label: "VI"
      prose: |
        a livre iniciativa, a livre concorrência e a defesa do consumidor;
    - id: art-2-vii
      label: "VII"
      prose: |
        os direitos humanos, o livre desenvolvimento da personalidade, a dignidade e o
        exercício da cidadania pelas pessoas naturais.
guidance:
  prose: |
    O art. 2º estabelece os fundamentos axiológicos da LGPD. Esses fundamentos servem
    como critérios interpretativos para toda a lei e como parâmetros para decisões da ANPD
    e do Poder Judiciário.

    **Autodeterminação informativa (II):** Conceito originário do direito constitucional
    alemão (Volkszählungsurteil, 1983). Significa que o indivíduo tem o direito de
    controlar quais informações pessoais são coletadas, armazenadas e compartilhadas
    sobre ele. Na prática, fundamenta o direito de acesso, correção e eliminação de dados.

    **Equilíbrio entre privacidade e inovação (V e VI):** A LGPD não busca impedir o
    tratamento de dados, mas equilibrar proteção de direitos fundamentais com
    desenvolvimento econômico e tecnológico. Isso implica que interpretações excessivamente
    restritivas que inviabilizem modelos de negócio legítimos não são o objetivo da lei.

    **Direitos humanos e dignidade (VII):** Fundamenta a proteção especial a dados
    sensíveis (art. 11) e a proibição de tratamento discriminatório. Decisões automatizadas
    que afetem direitos fundamentais devem permitir revisão humana (art. 20).

    **Impacto em auditorias:** Auditores e a ANPD avaliam se o tratamento de dados respeita
    esses fundamentos em conjunto. Um tratamento tecnicamente lícito pode ser questionado
    se violar a dignidade ou a autodeterminação informativa do titular.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar Privacy Dashboard que dê ao titular visibilidade e controle sobre
         seus dados, materializando a autodeterminação informativa.
      2. Adotar arquitetura que permita granularidade de consentimento e controle de dados
         pelo titular (privacy-centric design).
      3. Documentar como cada tratamento de dados equilibra os fundamentos de inovação
         (inciso V) com privacidade (inciso I).
      4. Implementar mecanismos de minimização de dados para respeitar a inviolabilidade
         da intimidade (inciso IV).
    tools:
      - privacy-portal
      - consent-management-platform
      - data-catalog
      - data-minimization-engine
  devsecops:
    prose: |
      1. Incluir Privacy Impact Assessment (PIA) como etapa obrigatória no ciclo de
         desenvolvimento de novas funcionalidades que tratem dados pessoais.
      2. Validar nos code reviews que dados pessoais não são expostos desnecessariamente
         em logs, interfaces ou APIs.
      3. Implementar testes automatizados que verifiquem minimização de dados nas respostas
         de APIs.
    tools:
      - pia-templates
      - api-linter
      - data-exposure-scanner
      - code-review-checklist
  secops:
    prose: |
      1. Monitorar tratamentos de dados para identificar violações à autodeterminação
         informativa (tratamento sem base legal ou além da finalidade declarada).
      2. Auditar decisões automatizadas que possam afetar dignidade e direitos fundamentais
         dos titulares.
      3. Manter registro de incidentes que envolvam violação de fundamentos do art. 2º
         para análise de risco regulatório.
    tools:
      - siem
      - compliance-dashboard
      - risk-management-platform
legal_references:
  - framework_id: gdpr
    articles: ["considerando 1-7", "art. 1"]
    relationship: equivalent-to
  - framework_id: marco-civil-internet
    articles: ["art. 2", "art. 3"]
    relationship: complements
