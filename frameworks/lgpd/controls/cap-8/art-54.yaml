id: art-54
family: cap-8
title: "Suspensão e Proibição de Atividades de Tratamento"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 52, incisos X, XI e XII. Constituem sanções aplicáveis pela autoridade nacional:

    X - suspensão parcial do funcionamento do banco de dados a que se refere a infração
    pelo período máximo de 6 (seis) meses, prorrogável por igual período, até a
    regularização da atividade de tratamento pelo controlador;

    XI - suspensão do exercício da atividade de tratamento dos dados pessoais a que se
    refere a infração pelo período máximo de 6 (seis) meses, prorrogável por igual período;

    XII - proibição parcial ou total do exercício de atividades relacionadas a tratamento
    de dados.
  additional:
    - id: art-54-p5
      label: "§ 5º"
      prose: |
        O produto da arrecadação das multas aplicadas pela ANPD, inscritas ou não em
        dívida ativa, será destinado ao Fundo de Defesa de Direitos Difusos de que trata
        o art. 13 da Lei nº 7.347, de 24 de julho de 1985.
    - id: art-54-p6
      label: "§ 6º"
      prose: |
        As sanções previstas nos incisos X, XI e XII do caput deste artigo serão aplicadas:
        I - somente após já ter sido imposta ao menos 1 (uma) das sanções de que tratam os
        incisos II, III, IV, V e VI do caput deste artigo para o mesmo caso concreto; e
        II - em caso de controladores submetidos a outros órgãos e entidades com competência
        sancionatória, ouvidos esses órgãos.
    - id: art-54-p7
      label: "§ 7º"
      prose: |
        Os vazamentos individuais ou os acessos não autorizados de que trata o caput do
        art. 46 desta Lei poderão ser objeto de conciliação direta entre controlador e
        titular e, caso não haja acordo, o controlador estará sujeito à aplicação das
        penalidades de que trata este artigo.
guidance:
  prose: |
    O art. 52, incisos X a XII (complementados pelo § 6º) estabelece as sanções mais
    severas da LGPD: suspensão e proibição de atividades de tratamento. São as
    "penas de morte" para operações que dependem de dados pessoais.

    **Escalonamento obrigatório (§ 6º, I):**
    As sanções de suspensão e proibição só podem ser aplicadas APÓS já ter sido
    imposta pelo menos uma sanção anterior (multa, multa diária, publicização,
    bloqueio ou eliminação) para o mesmo caso. Isso garante progressividade.

    **Consulta a outros reguladores (§ 6º, II):**
    Para entidades reguladas por outros órgãos (BACEN, CVM, ANS, ANATEL, etc.),
    a ANPD deve ouvi-los antes de aplicar suspensão/proibição. Isso evita conflito
    de competências.

    **Inciso X — Suspensão parcial do banco de dados:**
    Afeta apenas o banco de dados relacionado à infração. Prazo máximo de 6 meses,
    prorrogável. A empresa pode continuar operando outros tratamentos.

    **Inciso XI — Suspensão da atividade de tratamento:**
    Mais ampla que o inciso X. Suspende a atividade de tratamento inteira (não apenas
    o banco de dados). Prazo máximo de 6 meses, prorrogável.

    **Inciso XII — Proibição total ou parcial:**
    A sanção mais grave. Proíbe o exercício de atividades de tratamento de dados.
    Para empresas data-driven, é equivalente ao encerramento das operações.

    **§ 7º — Conciliação:**
    Vazamentos individuais podem ser resolvidos por conciliação direta entre
    controlador e titular. Apenas quando a conciliação falha, a ANPD aplica sanções.

    **Impacto em continuidade de negócio:**
    Estas sanções exigem que empresas tenham planos de continuidade que considerem
    a hipótese de suspensão de tratamento de dados. A prevenção (conformidade) é
    a melhor estratégia.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar capacidade técnica de suspender tratamento de dados
         específico sem impactar toda a operação (granularidade de controle).
      2. Criar plano de continuidade de negócios que considere cenário de
         suspensão parcial ou total do tratamento de dados.
      3. Implementar mecanismo de "circuit breaker" para tratamentos de dados
         que possa ser ativado rapidamente em caso de determinação da ANPD.
      4. Criar sistema de backup de processos manuais para operações críticas
         que dependem de dados pessoais.
      5. Implementar segregação de bancos de dados por finalidade para
         permitir suspensão parcial (inciso X) sem afetar toda a operação.
      6. Manter canal de comunicação com a ANPD para receber e processar
         determinações rapidamente.
    tools:
      - circuit-breaker
      - business-continuity-planning
      - database-segregation
      - incident-response
      - regulatory-communication
  devsecops:
    prose: |
      1. Implementar feature flags que permitam desabilitar funcionalidades
         de tratamento de dados específicas sem deploy.
      2. Testar cenários de degradação graceful quando tratamentos são
         suspensos.
      3. Validar que o sistema pode operar parcialmente com bancos de dados
         específicos indisponíveis.
      4. Documentar dependências entre funcionalidades e tratamentos de dados
         para avaliação de impacto de suspensão.
    tools:
      - feature-flags
      - chaos-engineering
      - dependency-mapping
      - resilience-testing
  secops:
    prose: |
      1. Manter plano de resposta para cenário de determinação da ANPD de
         suspensão de tratamento.
      2. Monitorar comunicações da ANPD para detecção precoce de processos
         administrativos.
      3. Implementar processo de conciliação direta com titulares (§ 7º)
         para resolver vazamentos individuais antes de escalar para ANPD.
      4. Documentar todas as medidas corretivas adotadas para demonstrar
         regularização (condição para levantar suspensão).
    tools:
      - incident-response
      - regulatory-monitoring
      - conciliation-management
      - corrective-action-tracking
