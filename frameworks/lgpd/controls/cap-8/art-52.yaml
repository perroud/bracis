id: art-52
family: cap-8
title: "Sanções administrativas"
class: LGPD

statement:
  prose: |
    Art. 52. Os agentes de tratamento de dados, em razão das infrações cometidas às normas
    previstas nesta Lei, ficam sujeitos às seguintes sanções administrativas aplicáveis pela
    autoridade nacional:
    I - advertência, com indicação de prazo para adoção de medidas corretivas;
    II - multa simples, de até 2% (dois por cento) do faturamento da pessoa jurídica de
    direito privado, grupo ou conglomerado no Brasil no seu último exercício, excluídos os
    tributos, limitada, no total, a R$ 50.000.000,00 (cinquenta milhões de reais) por
    infração;
    III - multa diária, observado o limite total a que se refere o inciso II;
    IV - publicização da infração após devidamente apurada e confirmada a sua ocorrência;
    V - bloqueio dos dados pessoais a que se refere a infração até a sua regularização;
    VI - eliminação dos dados pessoais a que se refere a infração;
    X - suspensão parcial do funcionamento do banco de dados a que se refere a infração pelo
    período máximo de 6 (seis) meses, prorrogável por igual período, até a regularização da
    atividade de tratamento pelo controlador;
    XI - suspensão do exercício da atividade de tratamento dos dados pessoais a que se refere
    a infração pelo período máximo de 6 (seis) meses, prorrogável por igual período;
    XII - proibição parcial ou total do exercício de atividades relacionadas a tratamento de
    dados.

    §1º As sanções serão aplicadas após procedimento administrativo que possibilite a
    oportunidade da ampla defesa, de forma gradativa, isolada ou cumulativa, de acordo com
    as peculiaridades do caso concreto e considerados os seguintes parâmetros e critérios:
    I - a gravidade e a natureza das infrações e dos direitos pessoais afetados;
    II - a boa-fé do infrator;
    III - a vantagem auferida ou pretendida pelo infrator;
    IV - a condição econômica do infrator;
    V - a reincidência;
    VI - o grau do dano;
    VII - a cooperação do infrator;
    VIII - a adoção reiterada e demonstrada de mecanismos e procedimentos internos capazes
    de minimizar o dano;
    IX - a adoção de política de boas práticas e governança;
    X - a pronta adoção de medidas corretivas;
    XI - a proporcionalidade entre a gravidade da falta e a intensidade da sanção.

guidance:
  prose: |
    As sanções da LGPD são escalonadas, de advertência até proibição total de tratamento.
    A multa máxima é de 2% do faturamento no Brasil, limitada a R$50M por infração.
    Critérios atenuantes incluem: cooperação, adoção de boas práticas (Art. 50),
    medidas corretivas rápidas e mecanismos internos de prevenção.
    A demonstração de programa de governança em privacidade (Art. 50) é fator
    atenuante explícito. Investir em conformidade reduz risco de sanções severas.

implementation_guidance:
  platform_engineering:
    prose: |
      Dashboards de conformidade para demonstrar adoção de medidas preventivas.
      Evidências automatizadas de controles implementados. Relatórios de
      conformidade exportáveis para demonstração à ANPD.
    tools:
      - drata
      - vanta
      - backstage
      - grafana

  devsecops:
    prose: |
      Manter evidências de segurança em pipelines (relatórios de SAST/DAST/SCA).
      Compliance-as-code para demonstrar adoção contínua de medidas de segurança.
      Audit trail de todas as alterações em sistemas que tratam dados pessoais.
    tools:
      - gitlab-ci
      - defectdojo
      - sonarqube

  secops:
    prose: |
      Capacidade de resposta rápida a incidentes como fator atenuante.
      Documentação de incidentes e medidas corretivas. Evidências de
      monitoramento contínuo para demonstrar diligência.
    tools:
      - thehive
      - elastic-siem
      - splunk
      - servicenow

