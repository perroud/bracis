id: art-53
family: cap-8
title: "Regulamento de Processo Administrativo Sancionador"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 53. A autoridade nacional definirá, por meio de regulamento próprio sobre sanções
    administrativas a infrações a esta Lei, que deverá ser objeto de consulta pública,
    as metodologias que orientarão o cálculo do valor-base das sanções de multa.
  additional:
    - id: art-53-p1
      label: "§ 1º"
      prose: |
        As metodologias de que trata o caput deste artigo devem ser previamente publicadas,
        para ciência dos agentes de tratamento, e devem apresentar objetivamente as formas
        e dosimetrias para o cálculo do valor-base das sanções de multa, que deverão conter
        fundamentação detalhada de todos os seus elementos, demonstrando a observância dos
        critérios previstos nesta Lei.
    - id: art-53-p2
      label: "§ 2º"
      prose: |
        O regulamento de sanções e metodologias correspondentes deve estabelecer as
        circunstâncias e as condições para a adoção de multa simples ou multa diária.
guidance:
  prose: |
    O art. 53 delega à ANPD a criação do regulamento de dosimetria das sanções
    administrativas, garantindo previsibilidade e proporcionalidade na aplicação
    de multas.

    **Status atual:**
    A ANPD publicou a Resolução CD/ANPD nº 4/2023, que aprovou o Regulamento de
    Dosimetria e Aplicação de Sanções Administrativas. Este regulamento define:
    - Metodologia de cálculo do valor-base das multas
    - Circunstâncias agravantes e atenuantes
    - Critérios de proporcionalidade
    - Procedimento administrativo sancionador

    **Faixas de multa (Resolução nº 4/2023):**
    O valor-base da multa considera:
    - Gravidade da infração (leve, média, grave)
    - Faturamento do infrator
    - Número de titulares afetados
    - Duração da infração
    - Reincidência

    **Fatores atenuantes:**
    - Adoção de programa de governança em privacidade (art. 50)
    - Cooperação com a ANPD
    - Adoção de medidas corretivas rápidas
    - Existência de mecanismos internos de prevenção
    - Comunicação espontânea de incidentes

    **Fatores agravantes:**
    - Reincidência
    - Envolvimento de dados sensíveis
    - Tratamento de dados de menores
    - Vantagem econômica auferida
    - Não cooperação com a ANPD

    **Procedimento simplificado:**
    A ANPD pode adotar procedimento administrativo simplificado para infrações
    menos complexas, conforme porte do infrator e natureza da infração.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar dashboard de conformidade que demonstre adoção de programa
         de governança em privacidade (fator atenuante na dosimetria).
      2. Criar sistema de geração de evidências de conformidade exportáveis
         para apresentação à ANPD em processo administrativo.
      3. Implementar contadores de titulares afetados em caso de incidentes
         para cálculo de impacto (critério de dosimetria).
      4. Manter sistema de comunicação proativa com a ANPD (comunicação
         espontânea é fator atenuante).
      5. Implementar sistema de métricas de conformidade para demonstrar
         melhoria contínua.
    tools:
      - compliance-dashboard
      - evidence-management
      - incident-impact-assessment
      - regulatory-communication
      - compliance-metrics
  devsecops:
    prose: |
      1. Gerar evidências automatizadas de controles de segurança em cada
         release para demonstrar adoção contínua de medidas preventivas.
      2. Manter histórico de vulnerabilidades corrigidas e tempo de correção
         para demonstrar diligência.
      3. Documentar implementação de privacy by design em cada funcionalidade
         como evidência de programa de governança.
      4. Implementar compliance-as-code com relatórios auditáveis.
    tools:
      - compliance-as-code
      - vulnerability-tracking
      - security-reporting
      - design-documentation
  secops:
    prose: |
      1. Manter documentação completa de incidentes, respostas e medidas
         corretivas para apresentação em processo administrativo.
      2. Demonstrar existência e eficácia de mecanismos de detecção e
         prevenção (fator atenuante).
      3. Documentar cooperação com ANPD em investigações.
      4. Calcular e documentar número de titulares afetados em incidentes
         para argumentação de dosimetria.
    tools:
      - incident-documentation
      - compliance-reporting
      - anpd-communication
      - impact-assessment
legal_references:
  - framework_id: gdpr
    articles: ["art. 83"]
    relationship: equivalent-to
