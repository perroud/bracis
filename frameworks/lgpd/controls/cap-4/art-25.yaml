id: art-25
family: cap-4
title: "Dados em Formato Interoperável e Estruturado"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 25. Os dados deverão ser mantidos em formato interoperável e estruturado para
    o uso compartilhado, com vistas à execução de políticas públicas, à prestação de
    serviços públicos, à descentralização da atividade pública e à disseminação e ao
    acesso das informações pelo público em geral.
guidance:
  prose: |
    O art. 25 determina que dados mantidos pelo Poder Público devem ser interoperáveis
    e estruturados. Isso atende a dois objetivos:

    **1. Uso compartilhado entre órgãos públicos:**
    Dados devem poder ser compartilhados entre diferentes órgãos para execução de
    políticas públicas de forma eficiente. A interoperabilidade evita silos de dados
    governamentais.

    **2. Acesso público e transparência:**
    Dados públicos devem ser acessíveis ao cidadão em formato que permita reutilização.
    Isso se conecta com a política de dados abertos governamentais.

    **Formato interoperável:**
    Padrões abertos e legíveis por máquina: JSON, XML, CSV, APIs REST. Não dependência
    de software proprietário. Compatível com os padrões de interoperabilidade do
    governo (e-PING).

    **Formato estruturado:**
    Dados organizados em schema definido, com metadados, documentação e versionamento.
    Não PDFs escaneados ou documentos não processáveis.

    **Integração com governo digital:**
    Este artigo se alinha com a Estratégia de Governo Digital, o Gov.br e a plataforma
    de dados abertos do governo federal (dados.gov.br).

    **Limitação:**
    A obrigação de interoperabilidade não supera as restrições da LGPD. Dados pessoais
    compartilhados entre órgãos devem respeitar finalidade, necessidade e base legal.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Adotar padrões de interoperabilidade governamental (e-PING) para APIs e
         formatos de dados.
      2. Implementar APIs REST/GraphQL documentadas com OpenAPI para
         compartilhamento de dados entre órgãos.
      3. Manter catálogo de dados (data catalog) com metadados, schema e
         documentação de acesso.
      4. Implementar controle de acesso granular para compartilhamento entre
         órgãos — cada compartilhamento deve ter base legal e finalidade.
      5. Publicar datasets não pessoais em formato aberto no portal de dados
         abertos (dados.gov.br).
      6. Implementar versionamento de schemas e APIs para garantir compatibilidade.
    tools:
      - api-gateway
      - data-catalog
      - api-documentation
      - data-governance-platform
      - open-data-portal
  devsecops:
    prose: |
      1. Validar que APIs seguem padrões de interoperabilidade governamental.
      2. Testar compatibilidade de formatos de dados com padrões abertos
         (JSON Schema, XML Schema).
      3. Implementar contract testing para APIs de compartilhamento entre órgãos.
      4. Validar que dados pessoais compartilhados possuem base legal documentada.
    tools:
      - api-contract-testing
      - schema-validation
      - compliance-as-code
      - integration-testing
  secops:
    prose: |
      1. Monitorar compartilhamentos de dados entre órgãos para garantir que
         seguem base legal e finalidade documentadas.
      2. Auditar acessos a APIs de compartilhamento de dados.
      3. Verificar que dados publicados em portais abertos não contêm dados
         pessoais inadvertidamente.
      4. Monitorar integridade dos dados compartilhados.
    tools:
      - api-monitoring
      - data-loss-prevention
      - access-audit
      - siem
legal_references:
  - framework_id: gdpr
    articles: ["art. 20"]
    relationship: supports
