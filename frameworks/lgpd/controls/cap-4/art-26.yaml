id: art-26
family: cap-4
title: "Vedação de Compartilhamento com Entidades Privadas"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 26. O uso compartilhado de dados pessoais pelo Poder Público deve atender a
    finalidades específicas de execução de políticas públicas e atribuição legal pelos
    órgãos e pelas entidades públicas, respeitados os princípios de proteção de dados
    pessoais elencados no art. 6º desta Lei.
  additional:
    - id: art-26-p1
      label: "§ 1º"
      prose: |
        É vedado ao Poder Público transferir a entidades privadas dados pessoais constantes
        de bases de dados a que tenha acesso, exceto:
        I - em casos de execução descentralizada de atividade pública que exija a
        transferência, exclusivamente para esse fim específico e determinado, observado
        o disposto na Lei nº 12.527, de 18 de novembro de 2011 (Lei de Acesso à Informação);
        II - nos casos em que os dados forem acessíveis publicamente, observadas as
        disposições desta Lei;
        III - quando houver previsão legal ou a transferência for respaldada em contratos,
        convênios ou instrumentos congêneres;
        IV - na hipótese de a transferência dos dados objetivar exclusivamente a prevenção
        de fraudes e irregularidades, ou proteger e resguardar a segurança e a integridade
        do titular dos dados, desde que vedado o tratamento para outras finalidades.
    - id: art-26-p2
      label: "§ 2º"
      prose: |
        Os contratos e convênios de que trata o § 1º deste artigo deverão ser comunicados
        à autoridade nacional.
guidance:
  prose: |
    O art. 26 regulamenta o compartilhamento de dados pessoais pelo Poder Público com
    entidades privadas, estabelecendo uma vedação geral com exceções taxativas.

    **Regra geral: VEDADO o compartilhamento com entidades privadas.**

    **Exceções (§ 1º):**

    **I — Execução descentralizada:**
    Quando o Poder Público terceiriza a execução de atividade pública para entidade
    privada. Ex.: empresa contratada para gestão de sistema de saúde, empresa de TI
    que opera sistemas do governo. A transferência é limitada à finalidade específica.

    **II — Dados publicamente acessíveis:**
    Dados que já são públicos (ex.: dados no Diário Oficial, dados de licitações).
    Mesmo assim, devem respeitar os princípios da LGPD.

    **III — Previsão legal ou contratual:**
    Quando há lei autorizando a transferência ou contrato/convênio específico. O
    contrato/convênio deve ser comunicado à ANPD (§ 2º).

    **IV — Prevenção de fraudes:**
    Transferência exclusivamente para prevenção de fraudes e proteção do titular.
    Vedado o tratamento para outras finalidades (vedação de desvio de finalidade).

    **§ 2º — Comunicação à ANPD:**
    Contratos e convênios que envolvam compartilhamento de dados com entidades privadas
    devem ser comunicados à ANPD. Isso permite fiscalização e transparência.

    **Risco principal:**
    Órgãos públicos que vendem, cedem ou compartilham bases de dados com entidades
    privadas sem enquadramento nas exceções do § 1º violam a LGPD. Isso inclui
    cessão de cadastros para fins de marketing.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar controle de acesso a APIs de dados governamentais que impeça
         acesso por entidades privadas sem autorização formal.
      2. Criar sistema de registro de compartilhamentos com entidades privadas
         que documente base legal, finalidade e contrato/convênio.
      3. Implementar limitação de finalidade técnica — APIs de compartilhamento
         com entidades privadas devem restringir acesso apenas aos dados necessários.
      4. Criar workflow de aprovação para novos compartilhamentos com entidades
         privadas que verifique enquadramento nas exceções do § 1º.
      5. Implementar mecanismo de comunicação automática à ANPD para contratos
         e convênios de compartilhamento (§ 2º).
    tools:
      - api-gateway
      - access-control
      - contract-management
      - workflow-engine
      - data-sharing-registry
  devsecops:
    prose: |
      1. Validar que APIs de dados governamentais possuem controle de acesso
         que distingue entidades públicas de privadas.
      2. Testar que dados compartilhados com entidades privadas estão limitados
         à finalidade específica documentada.
      3. Implementar data loss prevention (DLP) para detectar compartilhamento
         não autorizado de bases de dados com entidades privadas.
      4. Auditar periodicamente permissões de acesso a APIs governamentais.
    tools:
      - api-security-testing
      - data-loss-prevention
      - access-review
      - compliance-as-code
  secops:
    prose: |
      1. Monitorar transferências de dados do Poder Público para entidades
         privadas e verificar autorização.
      2. Alertar sobre volumes anormais de dados sendo transferidos para
         entidades privadas.
      3. Auditar contratos e convênios de compartilhamento para verificar
         comunicação à ANPD.
      4. Monitorar uso de dados por entidades privadas que receberam dados
         do Poder Público para verificar respeito à finalidade.
    tools:
      - data-transfer-monitoring
      - siem
      - contract-audit
      - compliance-dashboard
legal_references:
  - framework_id: gdpr
    articles: ["art. 6(1)(e)", "art. 6(3)"]
    relationship: supports
