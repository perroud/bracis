id: art-23
family: cap-4
title: "Tratamento de Dados Pessoais pelo Poder Público"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 23. O tratamento de dados pessoais pelas pessoas jurídicas de direito público
    referidas no parágrafo único do art. 1º da Lei nº 12.527, de 18 de novembro de 2011
    (Lei de Acesso à Informação), deverá ser realizado para o atendimento de sua finalidade
    pública, na persecução do interesse público, com o objetivo de executar as competências
    legais ou cumprir as atribuições legais do serviço público, desde que:
  parts:
    - id: art-23-i
      label: "I"
      prose: |
        sejam informadas as hipóteses em que, no exercício de suas competências, realizam
        o tratamento de dados pessoais, fornecendo informações claras e atualizadas sobre
        a previsão legal, a finalidade, os procedimentos e as práticas utilizadas para a
        execução dessas atividades, em veículos de fácil acesso, preferencialmente em seus
        sítios eletrônicos;
    - id: art-23-iii
      label: "III"
      prose: |
        seja indicado um encarregado quando realizarem operações de tratamento de dados
        pessoais, nos termos do art. 39 desta Lei.
  additional:
    - id: art-23-p1
      label: "§ 1º"
      prose: |
        A autoridade nacional poderá dispor sobre as formas de publicidade das operações
        de tratamento.
    - id: art-23-p3
      label: "§ 3º"
      prose: |
        Os prazos e procedimentos para exercício dos direitos do titular perante o Poder
        Público observarão o disposto em legislação específica, em especial as disposições
        constantes da Lei nº 9.507, de 12 de novembro de 1997 (Lei do Habeas Data), da
        Lei nº 9.784, de 29 de janeiro de 1999 (Lei do Processo Administrativo), e da
        Lei nº 12.527, de 18 de novembro de 2011 (Lei de Acesso à Informação).
    - id: art-23-p4
      label: "§ 4º"
      prose: |
        Os serviços notariais e de registro exercidos em caráter privado, por delegação
        do Poder Público, terão o mesmo tratamento dispensado às pessoas jurídicas
        referidas no caput deste artigo.
guidance:
  prose: |
    O art. 23 estabelece as regras específicas para o tratamento de dados pessoais pelo
    Poder Público. A base legal principal é a execução de políticas públicas e
    competências legais, não o consentimento.

    **Finalidade pública como base legal:**
    O Poder Público não precisa obter consentimento para tratamento de dados pessoais
    quando necessário para executar suas competências legais. Porém, deve atender
    aos princípios da LGPD (finalidade, adequação, necessidade, etc.).

    **Transparência reforçada (inciso I):**
    O Poder Público deve publicar em seus sites informações claras sobre: quais
    tratamentos realiza, previsão legal, finalidade, procedimentos e práticas.
    Isso se integra com a LAI (Lei de Acesso à Informação).

    **Encarregado obrigatório (inciso III):**
    Toda pessoa jurídica de direito público que realiza tratamento de dados pessoais
    deve indicar encarregado (DPO). A ANPD deve ser informada.

    **Interação com LAI e Habeas Data (§ 3º):**
    Para exercício de direitos dos titulares perante o Poder Público, aplicam-se
    também a LAI, a Lei do Habeas Data e a Lei do Processo Administrativo. Os
    prazos dessas leis podem ser diferentes dos 15 dias do art. 19.

    **Notários e registradores (§ 4º):**
    Cartórios, embora de natureza privada, seguem as regras do Poder Público por
    exercerem delegação.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Publicar portal de transparência de dados pessoais no site institucional
         com informações sobre todos os tratamentos realizados.
      2. Integrar com o Portal da Transparência e a LAI (Lei de Acesso à Informação).
      3. Implementar canal de atendimento ao titular de dados compatível com a
         Lei do Habeas Data e a Lei do Processo Administrativo.
      4. Criar ROPA público simplificado para publicação no site institucional.
      5. Implementar sistema de gestão de requisições de titulares com prazos
         configuráveis conforme legislação aplicável (LGPD, LAI, Habeas Data).
      6. Designar e publicar dados de contato do encarregado (DPO) no site.
    tools:
      - transparency-portal
      - dsar-automation
      - ropa-system
      - workflow-engine
      - cms-institutional
  devsecops:
    prose: |
      1. Validar que sistemas públicos de coleta de dados informam previsão legal
         e finalidade ao titular.
      2. Testar que portais de transparência estão atualizados e acessíveis.
      3. Implementar compliance-as-code para validar que novos serviços públicos
         digitais seguem os requisitos do art. 23.
      4. Validar acessibilidade (WCAG) dos portais de transparência e canais
         de atendimento ao titular.
    tools:
      - compliance-as-code
      - accessibility-testing
      - content-validation
      - api-testing
  secops:
    prose: |
      1. Auditar periodicamente que tratamentos de dados pelo Poder Público
         estão documentados e publicados conforme inciso I.
      2. Monitorar atendimento de requisições de titulares dentro dos prazos legais.
      3. Verificar que encarregado está formalmente designado e dados de contato
         estão publicados.
      4. Auditar conformidade com LAI e integração entre LGPD e transparência ativa.
    tools:
      - compliance-audit
      - sla-monitoring
      - transparency-audit
      - dsar-tracking
legal_references:
