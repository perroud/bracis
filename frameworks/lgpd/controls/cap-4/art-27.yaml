id: art-27
family: cap-4
title: "Comunicação de Uso Compartilhado de Dados com Entidade Privada"
class: LGPD
baselines: [all]
statement:
  prose: |
    Art. 27. A comunicação ou o uso compartilhado de dados pessoais de pessoa jurídica de
    direito público a pessoa de direito privado será informado à autoridade nacional e
    dependerá de consentimento do titular, exceto:
  parts:
    - id: art-27-i
      label: "I"
      prose: |
        nas hipóteses de dispensa de consentimento previstas nesta Lei;
    - id: art-27-ii
      label: "II"
      prose: |
        nos casos de uso compartilhado de dados, em que será dada publicidade nos termos
        do inciso I do caput do art. 23 desta Lei; ou
    - id: art-27-iii
      label: "III"
      prose: |
        nas exceções constantes do § 1º do art. 26 desta Lei.
  additional:
    - id: art-27-paragrafo
      label: "Parágrafo único"
      prose: |
        A informação à autoridade nacional de que trata o caput deste artigo será objeto
        de regulamentação.
guidance:
  prose: |
    O art. 27 complementa o art. 26 ao exigir dois requisitos cumulativos para
    compartilhamento de dados do Poder Público com entidades privadas:

    **1. Comunicação à ANPD:**
    O compartilhamento deve ser informado à autoridade nacional. O parágrafo único
    indica que a ANPD regulamentará o procedimento.

    **2. Consentimento do titular:**
    Regra geral: o titular deve consentir. Exceções:
    - Hipóteses de dispensa de consentimento da LGPD (art. 7º, incisos II a X)
    - Uso compartilhado com publicidade (conforme art. 23, I)
    - Exceções do art. 26, § 1º (execução descentralizada, dados públicos,
      previsão legal, prevenção de fraudes)

    **Implicação prática:**
    Se o Poder Público deseja compartilhar dados pessoais com empresa privada e
    nenhuma exceção se aplica, é necessário: (a) obter consentimento do titular E
    (b) comunicar à ANPD. Ambos os requisitos são cumulativos.

    **Diferença em relação ao art. 26:**
    O art. 26 foca na vedação e exceções. O art. 27 foca no procedimento:
    comunicação à ANPD + consentimento. São complementares.

    **Regulamentação pendente:**
    O parágrafo único delega à ANPD a regulamentação do procedimento de comunicação.
    Até que seja regulamentado, a comunicação deve ser feita por ofício ou meio
    formal disponível.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar fluxo de consentimento específico para compartilhamento de
         dados do Poder Público com entidades privadas quando aplicável.
      2. Criar sistema de notificação automática à ANPD quando compartilhamento
         com entidade privada for iniciado.
      3. Manter registro público de compartilhamentos conforme art. 23, I
         (publicidade nos sites institucionais).
      4. Implementar workflow de verificação: antes de cada compartilhamento,
         validar se há exceção aplicável ou se consentimento foi obtido.
      5. Criar dashboard de gestão de compartilhamentos com status de
         comunicação à ANPD.
    tools:
      - consent-management-platform
      - notification-service
      - data-sharing-registry
      - workflow-engine
      - compliance-dashboard
  devsecops:
    prose: |
      1. Validar que APIs de compartilhamento verificam consentimento do titular
         ou exceção legal antes de liberar acesso a entidade privada.
      2. Testar que o fluxo de comunicação à ANPD é executado para todos os
         compartilhamentos novos.
      3. Implementar testes de integração para workflow de aprovação de
         compartilhamento.
      4. Validar que registro público de compartilhamentos está atualizado.
    tools:
      - api-testing
      - workflow-testing
      - compliance-as-code
      - integration-testing
  secops:
    prose: |
      1. Auditar todos os compartilhamentos de dados com entidades privadas
         para verificar consentimento ou exceção legal válida.
      2. Monitorar que comunicações à ANPD estão sendo realizadas.
      3. Verificar que publicidade dos compartilhamentos está atualizada nos
         sites institucionais.
      4. Alertar sobre compartilhamentos não autorizados ou não comunicados.
    tools:
      - data-sharing-audit
      - compliance-monitoring
      - siem
      - transparency-audit
legal_references:
  - framework_id: gdpr
    articles: ["art. 6(1)(a)", "art. 6(1)(e)"]
    relationship: supports
