pillars:
  - id: pillar-1
    title: "ICT Risk Management"
    chapters: [chap-2]
    description: >-
      Comprehensive ICT risk management framework covering governance,
      identification, protection, detection, response, recovery, and
      learning and evolving processes.
  - id: pillar-2
    title: "ICT-Related Incident Management"
    chapters: [chap-3]
    description: >-
      Classification, reporting, and management of ICT-related incidents
      including major incidents and significant cyber threats.
  - id: pillar-3
    title: "Digital Operational Resilience Testing"
    chapters: [chap-4]
    description: >-
      Testing of ICT systems including vulnerability assessments,
      network security assessments, and threat-led penetration testing (TLPT).
  - id: pillar-4
    title: "ICT Third-Party Risk Management"
    chapters: [chap-5]
    description: >-
      Managing risks arising from ICT third-party service providers
      including key contractual provisions and oversight framework
      for critical third-party providers.
  - id: pillar-5
    title: "Information Sharing"
    chapters: [chap-6]
    description: >-
      Arrangements for voluntary exchange of cyber threat intelligence
      and information among financial entities.

