id: art-19
family: chap-3
title: "Reporting of major ICT-related incidents and voluntary notification of significant cyber threats"
class: DORA

statement:
  prose: >-
    Financial entities shall report major ICT-related incidents to the
    relevant competent authority. Where a financial entity is subject
    to supervision by more than one national competent authority, Member
    States shall designate a single competent authority as the relevant
    competent authority for the purposes of this Article.
  parts:
    - id: art-19.1
      label: "1."
      prose: >-
        Financial entities shall report major ICT-related incidents to
        the relevant competent authority in accordance with paragraph 4.
    - id: art-19.2
      label: "2."
      prose: >-
        Where a financial entity is subject to supervision by more than
        one national competent authority referred to in Article 46,
        Member States shall designate a single competent authority as
        the relevant competent authority for the purposes of this Article.
    - id: art-19.3
      label: "3."
      prose: >-
        Financial entities shall produce, after collecting and analysing
        all relevant information, the initial notification and reports
        referred to in paragraph 4 using the templates referred to in
        Article 20 and shall submit them to the competent authority.
        In the event that a technical impossibility prevents submitting
        the initial notification using the template, the financial entity
        shall notify the competent authority about it via alternative means.
    - id: art-19.4
      label: "4."
      prose: >-
        Financial entities shall submit to the competent authority:
        (a) an initial notification, without delay, but no later than the
        end of the business day, or, in the case of a major ICT-related
        incident that took place later than 2 hours before the end of the
        business day, not later than 4 hours from the beginning of the
        next business day;
        (b) an intermediate report, no later than 1 week after the initial
        notification, updating the information that has changed;
        (c) a final report, when the root cause analysis has been completed
        and actual impact figures are available, and no later than 1 month
        after sending the initial notification.

guidance:
  prose: >-
    Major incident reporting is a mandatory obligation with strict
    timelines. The three-stage reporting process (initial, intermediate,
    final) requires organizations to have pre-built reporting templates
    and workflows. The initial notification deadline (end of business day
    or 4 hours from next business day start) demands automated detection
    and rapid classification capabilities. The intermediate report within
    one week requires ongoing investigation capacity. The final report
    within one month requires completed root cause analysis. Financial
    entities should pre-configure reporting channels with their competent
    authorities and test them periodically.

references:
  - citation: "DORA Regulation (EU) 2022/2554, Article 19"
    url: "https://eur-lex.europa.eu/eli/reg/2022/2554/oj"
  - citation: "RTS on content and time limits for incident reporting"
    url: "https://www.esma.europa.eu/document/final-report-draft-rts-content-and-time-limits-incident-reporting"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build automated incident classification pipelines that evaluate
      incidents against DORA major incident criteria (client impact,
      data loss, transaction impact, duration, geographic spread) and
      automatically trigger reporting workflows when thresholds are met.
      Implement pre-populated reporting templates in the incident
      management platform that auto-fill technical details from monitoring
      data. Deploy automated timeline tracking that calculates reporting
      deadlines from incident detection time. Integrate reporting
      workflows with competent authority submission channels (APIs,
      secure portals). Maintain a regulatory reporting dashboard showing
      open obligations, deadline status, and submission history.
    tools:
      - pagerduty
      - servicenow
      - backstage
      - grafana
      - statuspage

  devsecops:
    prose: >-
      Implement automated impact assessment in CI/CD systems that tags
      services with customer-facing criticality levels used in incident
      classification. Maintain service dependency maps that enable rapid
      blast radius calculation during incidents. Automate the collection
      of deployment history, change logs, and configuration diffs that
      feed into incident investigation and root cause analysis.
      Implement pipeline jobs that validate reporting template
      completeness and regulatory compliance before submission.
    tools:
      - gitlab-ci
      - gitlab-incident-management
      - backstage
      - argocd

  secops:
    prose: >-
      Establish a dedicated regulatory reporting workflow within the
      SOC with clear ownership, escalation paths, and deadline tracking.
      Pre-configure incident report templates aligned with the
      regulatory technical standards (RTS) for DORA incident reporting.
      Automate deadline calculations and notifications to responsible
      persons. Conduct quarterly reporting drills to validate the
      end-to-end process from detection through classification to
      submission. Maintain a register of all reportable incidents with
      submission timestamps and competent authority acknowledgments.
      Ensure the intermediate and final report workflows are triggered
      automatically based on the initial notification date.
    tools:
      - splunk-soar
      - servicenow
      - cortex-xsoar
      - grc-platform
      - thehive

