id: art-17
family: chap-3
title: "ICT-related incident management process"
class: DORA

statement:
  prose: >-
    Financial entities shall define, establish and implement an ICT-related
    incident management process to detect, manage and notify ICT-related
    incidents.
  parts:
    - id: art-17.1
      label: "1."
      prose: >-
        Financial entities shall establish appropriate mechanisms to enable
        a prompt detection and identification of ICT-related incidents,
        including ICT-related incidents that, where relevant, may be
        considered major ICT-related incidents.
    - id: art-17.2
      label: "2."
      prose: >-
        Financial entities shall establish procedures and processes to
        ensure a consistent and integrated monitoring, handling and
        follow-up of ICT-related incidents, to ensure that root causes
        are identified, documented and addressed to prevent the occurrence
        of such incidents.
    - id: art-17.3
      label: "3."
      prose: >-
        The ICT-related incident management process referred to in
        paragraph 1 shall put in place early warning indicators, establish
        criteria to trigger the ICT-related incident detection and the
        ICT-related incident response processes, and allocate roles and
        responsibilities that need to be activated for different ICT-related
        incident types and scenarios.
    - id: art-17.4
      label: "4."
      prose: >-
        Financial entities shall record all ICT-related incidents and
        significant cyber threats. Financial entities shall establish
        appropriate procedures and processes to ensure a consistent and
        integrated monitoring, handling and follow-up of ICT-related
        incidents, to ensure that root causes are identified, documented
        and addressed.

guidance:
  prose: >-
    The incident management process must cover the full lifecycle from
    detection through containment, eradication, recovery, and lessons
    learned. Early warning indicators should leverage threat intelligence,
    anomaly detection, and correlated log analysis. The process must
    clearly distinguish between different incident severity levels with
    corresponding escalation paths and response timeframes. All incidents
    must be documented with sufficient detail for root cause analysis
    and regulatory reporting. The process must be integrated with the
    business continuity management system.

references:
  - citation: "DORA Regulation (EU) 2022/2554, Article 17"
    url: "https://eur-lex.europa.eu/eli/reg/2022/2554/oj"
  - citation: "RTS on ICT-related incident classification (EU) 2024/1772"
    url: "https://eur-lex.europa.eu/eli/reg_del/2024/1772/oj"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a centralized incident management platform integrated with
      the observability stack. Deploy automated incident detection using
      anomaly detection on golden signals (latency, traffic, errors,
      saturation) for all critical services. Configure PagerDuty or
      Opsgenie with severity-based routing, escalation policies, and
      on-call schedules mapped to DORA incident classification criteria.
      Automate incident timeline creation by correlating deployment events,
      alerting data, and configuration changes. Implement automated
      runbook execution for known incident patterns. Maintain incident
      templates in the service catalog with predefined fields for
      regulatory reporting requirements.
    tools:
      - pagerduty
      - opsgenie
      - prometheus
      - grafana
      - alertmanager
      - backstage
      - statuspage

  devsecops:
    prose: >-
      Integrate incident detection into the CI/CD pipeline by deploying
      canary analysis that automatically rolls back deployments triggering
      error rate thresholds. Implement feature flags to enable rapid
      deactivation of problematic functionality without full redeployment.
      Maintain post-incident review templates as code with mandatory
      fields for root cause, timeline, impact assessment, and corrective
      actions. Automate the creation of follow-up work items from
      post-incident reviews in the project issue tracker. Link deployment
      events to incident timelines for rapid causation analysis.
    tools:
      - gitlab-ci
      - argocd
      - flagger
      - feature-flags
      - gitlab-incident-management

  secops:
    prose: >-
      Operate incident detection, triage, and response processes through
      a SOAR (Security Orchestration, Automation, and Response) platform.
      Implement automated incident classification based on DORA severity
      criteria: number of clients affected, data loss, financial impact,
      duration, and geographic spread. Maintain threat intelligence feeds
      as early warning indicators. Document all incidents in a centralized
      incident register with structured data fields enabling regulatory
      reporting. Conduct post-incident reviews within 5 business days of
      incident closure. Track root cause categories and corrective action
      completion for trend analysis.
    tools:
      - splunk-soar
      - servicenow
      - thehive
      - misp
      - cortex-xsoar
      - jira

