id: art-24
family: chap-4
title: "General requirements for the performance of digital operational resilience testing"
class: DORA

statement:
  prose: >-
    For the purpose of assessing preparedness for handling ICT-related
    incidents, of identifying weaknesses, deficiencies and gaps in digital
    operational resilience, and of promptly implementing corrective
    measures, financial entities, other than microenterprises, shall,
    taking into account the criteria set out in Article 4(2), establish,
    maintain and review a sound and comprehensive digital operational
    resilience testing programme as an integral part of the ICT risk
    management framework referred to in Article 6.
  parts:
    - id: art-24.1
      label: "1."
      prose: >-
        The digital operational resilience testing programme shall include
        a range of assessments, tests, methodologies, practices and tools
        to be applied in accordance with the provisions of Articles 25
        and 26.
    - id: art-24.2
      label: "2."
      prose: >-
        When carrying out the digital operational resilience testing
        programme, financial entities shall follow a risk-based approach
        taking due account of the evolving landscape of ICT risk, any
        specific risks to which the financial entity concerned is or might
        be exposed, the criticality of information assets and of services
        provided, as well as any other factor the financial entity deems
        appropriate.
    - id: art-24.3
      label: "3."
      prose: >-
        Financial entities shall ensure that tests are undertaken by
        independent parties, whether internal or external. Where tests
        are undertaken by an internal tester, financial entities shall
        dedicate sufficient resources and ensure that conflicts of interest
        are avoided throughout the design and execution phases of the test.
    - id: art-24.4
      label: "4."
      prose: >-
        Financial entities shall establish procedures and policies to
        prioritise, classify and remedy all issues revealed throughout
        the performance of the tests and shall establish internal
        validation methodologies to ascertain that all identified
        weaknesses, deficiencies or gaps are fully addressed.
    - id: art-24.5
      label: "5."
      prose: >-
        Financial entities shall ensure, at least yearly, that appropriate
        tests are conducted on all ICT systems and applications supporting
        critical or important functions.

guidance:
  prose: >-
    Digital operational resilience testing goes beyond traditional
    penetration testing. It requires a comprehensive programme covering
    vulnerability assessments, open-source analyses, network security
    assessments, gap analyses, physical security reviews, questionnaires
    and scanning software solutions, source code reviews, scenario-based
    tests, compatibility testing, performance testing, end-to-end testing,
    and penetration testing. The programme must be risk-based, regularly
    reviewed, and conducted by independent parties. All findings must be
    classified, prioritized, and remediated with validation of the fix
    effectiveness.

references:
  - citation: "DORA Regulation (EU) 2022/2554, Article 24"
    url: "https://eur-lex.europa.eu/eli/reg/2022/2554/oj"

implementation_guidance:
  platform_engineering:
    prose: >-
      Establish a continuous testing pipeline that integrates vulnerability
      scanning, configuration compliance checking, and security testing
      into the platform operations cadence. Deploy automated vulnerability
      scanners (Nessus, Qualys) on scheduled scans of all infrastructure
      components. Implement network security assessment tools that
      continuously evaluate firewall rules, network segmentation, and
      access control lists against defined policies. Automate
      compatibility and performance testing for all platform components
      during upgrade cycles. Maintain a centralized finding tracker that
      ingests results from all testing tools, deduplicates findings,
      and tracks remediation through to validation. Schedule annual
      comprehensive testing campaigns with automated reminder and
      tracking workflows.
    tools:
      - nessus
      - qualys
      - trivy
      - k6
      - gatling
      - litmus-chaos
      - defectdojo

  devsecops:
    prose: >-
      Embed security testing at every pipeline stage: SAST for source
      code, SCA for dependencies, container scanning for images, DAST
      for running applications, and IaC scanning for infrastructure
      definitions. Implement automated remediation validation that re-runs
      targeted tests after fixes are applied. Track finding-to-fix cycle
      times and report against defined SLAs. Ensure independent review
      of testing methodology and results by separating the roles of
      test executor and test reviewer in the pipeline. Automate annual
      testing evidence collection and reporting. Integrate penetration
      testing findings into the vulnerability management pipeline for
      tracking alongside automated scan results.
    tools:
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - gitlab-container-scanning
      - semgrep
      - zap
      - nuclei
      - defectdojo

  secops:
    prose: >-
      Manage the digital operational resilience testing programme
      centrally with a testing calendar, scope documentation, and
      finding tracker. Commission annual penetration tests from
      qualified independent parties and track engagement lifecycle from
      scoping through reporting to remediation validation. Aggregate
      findings from all testing activities (automated scans, manual
      tests, red team exercises) into a unified vulnerability management
      system. Report testing programme status, finding trends, and
      remediation metrics to the management body quarterly. Ensure all
      critical findings are remediated within defined SLAs and that
      residual risk is formally accepted by appropriate stakeholders.
    tools:
      - defectdojo
      - qualys
      - rapid7
      - cobalt
      - bugcrowd
      - grc-platform

