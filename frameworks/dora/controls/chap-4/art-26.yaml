implementation_guidance:
  platform_engineering:
    prose: >-
      Prepare the platform infrastructure for TLPT by establishing
      comprehensive logging and monitoring that captures the full attack
      chain during red team engagements. Implement network traffic capture
      capabilities on critical segments for post-engagement analysis.
      Ensure the observability stack has sufficient retention and granularity
      to reconstruct attack timelines. Deploy canary tokens and honeypots
      in critical infrastructure segments to test detection capabilities.
      Maintain a white team coordination environment (separate from
      production monitoring) for TLPT management. Ensure production
      systems have safeguards (circuit breakers, automated rollback)
      that limit potential impact from TLPT activities while still
      providing a realistic testing environment.
    tools:
      - falco
      - sysdig
      - elasticsearch
      - wireshark
      - velociraptor
      - canary-tokens

  devsecops:
    prose: >-
      Support TLPT preparation by maintaining comprehensive service
      dependency maps and architecture documentation that inform threat
      intelligence and red team scoping. Ensure CI/CD pipelines generate
      and retain detailed deployment manifests, configuration history,
      and change logs that support post-TLPT analysis. Implement the
      corrective actions identified by TLPT findings through tracked
      remediation work items with validation testing. Use purple team
      exercises between formal TLPT engagements to continuously improve
      detection and response capabilities. Validate that remediation
      is effective by running targeted attack simulations against
      previously identified weaknesses.
    tools:
      - gitlab-ci
      - caldera
      - atomic-red-team
      - attack-navigator
      - defectdojo

  secops:
    prose: >-
      Coordinate the TLPT process end-to-end: engagement with the
      competent authority, threat intelligence provider selection, red
      team provider selection, scope definition, white team management,
      and post-test remediation tracking. Operate the blue team
      assessment to evaluate detection and response effectiveness during
      the TLPT. Document all findings, detection gaps, and response
      timeline deviations. Manage the remediation plan with prioritized
      corrective actions and timeline commitments to the competent
      authority. Ensure TLPT results inform updates to detection rules,
      response playbooks, and security architecture. Track TLPT
      scheduling and compliance with the 3-year cycle requirement.
    tools:
      - splunk
      - elastic-siem
      - cobalt-strike
      - cortex-xsoar
      - grc-platform
      - mitre-attack

