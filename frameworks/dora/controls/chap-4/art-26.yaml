id: art-26
family: chap-4
title: "Threat-led penetration testing"
class: DORA

statement:
  prose: >-
    Financial entities identified in accordance with paragraph 8, other
    than microenterprises, shall carry out at least every 3 years
    advanced testing by means of threat-led penetration testing (TLPT).
    The competent authority shall identify financial entities that are
    required to perform TLPT taking into account the factors set out
    in Article 4(2), based on an assessment of the overall risk profile
    of the financial entity and operational circumstances.
  parts:
    - id: art-26.1
      label: "1."
      prose: >-
        The TLPT shall cover several or all critical or important
        functions of a financial entity, and shall be performed on live
        production systems supporting such functions. The precise scope
        of the TLPT shall be determined by the financial entity and shall
        be validated by the competent authorities.
    - id: art-26.2
      label: "2."
      prose: >-
        Where ICT third-party service providers are included in the scope
        of the TLPT, the financial entity shall take the necessary measures
        and safeguards to ensure the participation of such ICT third-party
        service providers in the TLPT and shall retain at all times full
        responsibility for ensuring compliance with this Regulation.
    - id: art-26.3
      label: "3."
      prose: >-
        Financial entities shall identify all relevant underlying ICT
        systems, processes and technologies supporting critical or important
        functions and ICT services, including those supporting critical or
        important functions that have been outsourced or contracted to ICT
        third-party service providers.
    - id: art-26.4
      label: "4."
      prose: >-
        TLPT shall be carried out in accordance with the TIBER-EU
        framework. Financial entities shall apply the guidance, templates,
        and procedures provided in the TIBER-EU framework.
    - id: art-26.5
      label: "5."
      prose: >-
        External testers performing TLPT shall meet specified requirements
        including highest professional suitability and competency, technical
        and organisational capability, certifications, and professional
        indemnity insurance coverage.

guidance:
  prose: >-
    Threat-led penetration testing (TLPT) under DORA follows the TIBER-EU
    framework and represents the most advanced level of operational
    resilience testing. Unlike standard penetration testing, TLPT uses
    real threat intelligence to simulate realistic attack scenarios
    conducted by certified external red teams against live production
    systems. TLPT involves three phases: threat intelligence (identifying
    realistic attack scenarios), red team testing (executing the attack
    simulation), and blue team assessment (evaluating detection and
    response). The competent authority oversees the process including
    scope validation. TLPT must cover critical functions and can include
    third-party providers in scope.

