id: art-28
family: chap-5
title: "General principles of ICT third-party risk management"
class: DORA

statement:
  prose: >-
    Financial entities shall manage ICT third-party risk as an integral
    component of ICT risk within their ICT risk management framework as
    referred to in Article 6(1), and in accordance with the following
    principles.
  parts:
    - id: art-28.1
      label: "1."
      prose: >-
        Financial entities that have in place contractual arrangements
        for the use of ICT services to run their business operations
        shall at all times remain fully responsible for compliance with,
        and the discharge of, all obligations under this Regulation and
        applicable financial services law.
    - id: art-28.2
      label: "2."
      prose: >-
        Financial entities' management of ICT third-party risk shall be
        implemented in light of the principle of proportionality, taking
        into account the nature, scale, complexity and importance of
        ICT-related dependencies, the risks arising from contractual
        arrangements on the use of ICT services concluded with ICT
        third-party service providers, taking into account the criticality
        or importance of the respective service, process or function, and
        the potential impact on the continuity and availability of
        financial services and activities, at individual and at group level.
    - id: art-28.3
      label: "3."
      prose: >-
        As part of their ICT risk management framework, financial entities
        shall adopt and regularly review a strategy on ICT third-party
        risk, taking into account the multi-vendor strategy, where
        applicable. That strategy shall include a policy on the use of
        ICT services supporting critical or important functions provided
        by ICT third-party service providers and shall apply on an
        individual and, where relevant, on a sub-consolidated and
        consolidated basis.
    - id: art-28.4
      label: "4."
      prose: >-
        Financial entities shall maintain and update at entity level,
        and at sub-consolidated and consolidated levels, a register of
        information in relation to all contractual arrangements on the
        use of ICT services provided by ICT third-party service providers.
    - id: art-28.5
      label: "5."
      prose: >-
        Financial entities shall, on a timely basis, provide information
        to the competent authority about the number of new arrangements
        on the use of ICT services, the categories of ICT third-party
        service providers, the type of contractual arrangements and the
        ICT services and functions which are being provided.

guidance:
  prose: >-
    ICT third-party risk management is one of the most operationally
    complex pillars of DORA. Financial entities cannot delegate their
    regulatory responsibilities to third parties and must maintain
    oversight of all ICT service providers. The register of information
    (Article 28(4)) must include comprehensive details about every ICT
    service provider arrangement. The strategy must address concentration
    risk (single points of failure from over-reliance on individual
    providers), substitutability, and exit strategies. Due diligence
    must be performed before entering arrangements and monitoring must
    be continuous throughout the contract lifecycle.

references:
  - citation: "DORA Regulation (EU) 2022/2554, Article 28"
    url: "https://eur-lex.europa.eu/eli/reg/2022/2554/oj"
  - citation: "ITS on Register of Information (ESA templates)"
    url: "https://www.eba.europa.eu/regulation-and-policy/internal-governance/joint-esas-final-report-its-register-information"

implementation_guidance:
  platform_engineering:
    prose: >-
      Maintain a comprehensive service catalog (Backstage) that includes
      all ICT third-party service providers with metadata covering
      contract details, criticality classification, data flows, and
      dependency maps. Implement automated dependency tracking that
      identifies when platform components rely on third-party services
      (cloud providers, SaaS APIs, managed services). Deploy multi-cloud
      or multi-vendor strategies for critical services to mitigate
      concentration risk. Automate the generation of the register of
      information from infrastructure-as-code definitions and service
      catalog entries. Implement health monitoring of third-party
      services with automated failover where architecturally feasible.
      Track SLA compliance of third-party providers through automated
      monitoring and reporting.
    tools:
      - backstage
      - terraform
      - grafana
      - statuspage
      - dependency-track
      - cloud-custodian

  devsecops:
    prose: >-
      Implement supply chain security controls for all third-party
      dependencies: verify package signatures, enforce approved registries,
      and scan dependencies for vulnerabilities before inclusion. Maintain
      a software bill of materials (SBOM) for every deployed artifact that
      identifies all third-party components. Enforce vendor lock-in
      avoidance policies through pipeline checks that flag provider-specific
      API usage in critical paths. Automate third-party service provider
      risk assessment data collection by integrating SCA results, license
      analysis, and vulnerability counts into the vendor risk register.
      Implement container image provenance verification to ensure only
      approved base images from trusted registries are used.
    tools:
      - gitlab-dependency-scanning
      - syft
      - grype
      - cosign
      - sigstore
      - trivy
      - renovate

  secops:
    prose: >-
      Operate a third-party risk management programme covering vendor
      due diligence, ongoing monitoring, and periodic reassessment.
      Maintain the register of information required by Article 28(4)
      with all contractual arrangements, service details, criticality
      assessments, and concentration risk analysis. Monitor third-party
      service providers for security incidents, financial stability
      indicators, and regulatory actions that could affect service
      delivery. Conduct annual reviews of ICT third-party arrangements
      with documented risk assessments. Ensure exit plans exist for all
      critical third-party service providers and are tested periodically.
      Report third-party risk posture to the management body quarterly.
    tools:
      - servicenow
      - grc-platform
      - bitsight
      - securityscorecard
      - upguard
      - prevalent

