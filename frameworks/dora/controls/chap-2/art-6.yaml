id: art-6
family: chap-2
title: "ICT risk management framework"
class: DORA

statement:
  prose: >-
    Financial entities shall have a sound, comprehensive and well-documented
    ICT risk management framework as part of their overall risk management
    system, which enables them to address ICT risk quickly, efficiently and
    comprehensively and to ensure a high level of digital operational resilience.
  parts:
    - id: art-6.1
      label: "1."
      prose: >-
        The ICT risk management framework shall include at least strategies,
        policies, procedures, ICT protocols and tools that are necessary to
        duly and adequately protect all information assets and ICT assets,
        including computer software, hardware, servers, as well as to protect
        all relevant physical components and infrastructures, such as premises,
        data centres and sensitive designated areas.
    - id: art-6.2
      label: "2."
      prose: >-
        Financial entities shall, on a continuous basis, identify all sources
        of ICT risk, in particular the risk exposure to and from other
        financial entities, and assess cyber threats and ICT vulnerabilities
        relevant to their ICT-supported business functions, information
        assets and ICT assets.
    - id: art-6.3
      label: "3."
      prose: >-
        Financial entities shall review the ICT risk management framework
        at least once a year, or periodically in the case of microenterprises,
        as well as upon the occurrence of major ICT-related incidents, and
        following supervisory instructions or conclusions derived from
        relevant digital operational resilience testing or audit processes.
    - id: art-6.4
      label: "4."
      prose: >-
        Financial entities shall, in accordance with the auditing plan,
        carry out regular audits of the ICT risk management framework.
        Those audits shall be performed by auditors with sufficient knowledge,
        skills and expertise in ICT risk.
    - id: art-6.5
      label: "5."
      prose: >-
        Based on the conclusions of the audit review, the financial entity
        shall establish a formal follow-up process, including rules for the
        timely verification and remediation of critical ICT audit findings.

guidance:
  prose: >-
    The ICT risk management framework must be comprehensive and proportionate
    to the entity's size, risk profile, and complexity of services. It should
    be integrated with the overall enterprise risk management strategy rather
    than existing as a standalone silo. The framework must cover the complete
    lifecycle of ICT risk: identification, protection, detection, response,
    recovery, and lessons learned. It must be auditable, regularly reviewed,
    and updated to reflect changes in the threat landscape, technology
    environment, and business operations.

references:
  - citation: "DORA Regulation (EU) 2022/2554, Article 6"
    url: "https://eur-lex.europa.eu/eli/reg/2022/2554/oj"
  - citation: "EBA/GL/2019/04 - Guidelines on ICT and Security Risk Management"
    url: "https://www.eba.europa.eu/regulation-and-policy/internal-governance/guidelines-on-ict-and-security-risk-management"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement the ICT risk management framework as a layered set of
      policy-as-code artifacts covering infrastructure, application, and
      data layers. Use a central configuration management database (CMDB)
      or service catalog (Backstage) to maintain a real-time inventory of
      all ICT assets including servers, databases, APIs, containers, and
      third-party dependencies. Automate risk scoring using vulnerability
      scan data, configuration compliance checks, and dependency analysis
      integrated into the platform. Establish GitOps workflows where all
      changes to the risk framework require versioned pull requests with
      audit trails. Deploy infrastructure-as-code scanning (Checkov,
      tfsec) as pre-commit hooks to enforce risk policies before
      provisioning.
    tools:
      - backstage
      - terraform
      - checkov
      - tfsec
      - open-policy-agent
      - grafana
      - prometheus
      - dependency-track

  devsecops:
    prose: >-
      Embed ICT risk assessment into every phase of the software delivery
      lifecycle. Implement automated SAST, DAST, SCA, and container
      scanning in CI/CD pipelines to continuously identify vulnerabilities.
      Use risk-based prioritization to route critical findings to
      immediate remediation workflows while tracking lower-risk items in
      a centralized vulnerability management system. Enforce change
      management controls that require risk assessment sign-off for
      changes to critical ICT systems. Maintain pipeline-generated audit
      evidence (scan reports, approval logs, deployment records) in
      immutable storage. Schedule automated annual framework reviews via
      compliance pipeline jobs.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - gitlab-container-scanning
      - trivy
      - semgrep
      - sonarqube

  secops:
    prose: >-
      Operate continuous ICT risk monitoring through SIEM integration
      that correlates vulnerability data, threat intelligence, and
      runtime anomalies. Maintain a risk register that is updated
      automatically from scan results and manually from audit findings.
      Schedule and track the mandatory annual review of the ICT risk
      management framework using workflow automation. Generate audit-ready
      reports demonstrating framework completeness, review cadence, and
      remediation effectiveness. Ensure audit findings are tracked to
      closure with documented remediation evidence and timelines.
    tools:
      - splunk
      - elastic-siem
      - wazuh
      - defectdojo
      - grc-platform

