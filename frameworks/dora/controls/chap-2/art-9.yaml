id: art-9
family: chap-2
title: "Protection and prevention"
class: DORA

statement:
  prose: >-
    For the purposes of adequately protecting ICT systems and with a view
    to organising response measures, financial entities shall continuously
    monitor and control the security and functioning of ICT systems and
    tools and shall minimise the impact of ICT risk on ICT systems through
    the deployment of appropriate ICT security tools, policies and procedures.
  parts:
    - id: art-9.1
      label: "1."
      prose: >-
        Financial entities shall develop and document an information security
        policy defining rules to protect the availability, authenticity,
        integrity and confidentiality of data, information assets and ICT
        assets, including those of their customers, where applicable.
    - id: art-9.2
      label: "2."
      prose: >-
        Financial entities shall establish a sound network and infrastructure
        management structure using appropriate techniques, methods and protocols
        that may include implementing automated mechanisms to isolate affected
        information assets in the event of cyber-attacks.
    - id: art-9.3
      label: "3."
      prose: >-
        Financial entities shall implement policies that limit the physical
        or logical access to information assets and ICT assets to what is
        required for legitimate and approved functions and activities only,
        and establish to that end a set of policies, procedures and controls
        that address access rights and ensure a sound administration thereof.
    - id: art-9.4
      label: "4."
      prose: >-
        Financial entities shall implement policies and protocols for strong
        authentication mechanisms, based on relevant standards and dedicated
        control systems, and protection measures of cryptographic keys whereby
        data is encrypted based on results of approved data classification
        and ICT risk assessment processes.

guidance:
  prose: >-
    Protection and prevention encompasses the full spectrum of defensive
    controls: access management, network security, data encryption,
    endpoint protection, and security architecture. The controls must be
    risk-proportionate and cover physical and logical access, network
    segmentation, encryption in transit and at rest, and automated
    response mechanisms. Strong authentication (MFA) is explicitly
    required, as is encryption based on data classification. The emphasis
    on automated isolation mechanisms reflects the need for rapid
    containment during cyber-attacks.

references:
  - citation: "DORA Regulation (EU) 2022/2554, Article 9"
    url: "https://eur-lex.europa.eu/eli/reg/2022/2554/oj"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement zero-trust network architecture with mutual TLS (mTLS) for
      all service-to-service communication. Deploy service mesh (Istio,
      Linkerd) to enforce network policies, traffic encryption, and
      automated circuit-breaking. Enforce RBAC and ABAC at the platform
      level through centralized identity provider integration with OIDC/SAML.
      Implement network policies in Kubernetes to restrict pod-to-pod
      communication to explicitly declared dependencies. Automate secret
      management using HashiCorp Vault or cloud-native KMS with automatic
      rotation. Encrypt all data at rest using AES-256 and in transit using
      TLS 1.3 minimum. Deploy automated isolation mechanisms (network
      policy updates, pod eviction) triggered by security alerts.
    tools:
      - istio
      - linkerd
      - hashicorp-vault
      - cert-manager
      - kubernetes-network-policies
      - falco
      - open-policy-agent

  devsecops:
    prose: >-
      Enforce security policies as pipeline gates: fail builds that contain
      hardcoded secrets, use deprecated TLS versions, or lack encryption
      for sensitive data fields. Integrate secret detection (GitLeaks,
      TruffleHog) as pre-commit hooks and CI pipeline stages. Enforce
      MFA for all CI/CD system access and require signed commits for
      production branches. Validate infrastructure-as-code for security
      misconfigurations (open security groups, unencrypted storage, public
      endpoints) before provisioning. Implement automated access review
      pipelines that periodically audit and revoke stale access grants.
    tools:
      - gitlab-secret-detection
      - gitlab-sast
      - gitleaks
      - checkov
      - tfsec
      - trivy

  secops:
    prose: >-
      Deploy defense-in-depth monitoring with endpoint detection (EDR),
      network detection (NDR), and cloud security posture management
      (CSPM). Implement SIEM correlation rules to detect access anomalies,
      lateral movement, and privilege escalation attempts. Automate
      incident containment playbooks that isolate compromised assets
      within defined response time SLAs. Monitor cryptographic posture:
      certificate expiry, key rotation compliance, and deprecated cipher
      usage. Conduct periodic access reviews and generate compliance
      evidence demonstrating least-privilege enforcement.
    tools:
      - crowdstrike
      - splunk
      - elastic-siem
      - wazuh
      - cloud-cspm

