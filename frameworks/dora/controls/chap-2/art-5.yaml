id: art-5
family: chap-2
title: "Governance and organisation"
class: DORA

statement:
  prose: >-
    Financial entities shall have in place an internal governance and control
    framework that ensures an effective and prudent management of ICT risk,
    in order to achieve a high level of digital operational resilience.
  parts:
    - id: art-5.1
      label: "1."
      prose: >-
        The management body of the financial entity shall define, approve,
        oversee and be responsible for the implementation of all arrangements
        related to the ICT risk management framework referred to in Article 6(1).
    - id: art-5.2
      label: "2."
      prose: >-
        The management body shall bear the ultimate responsibility for managing
        the financial entity's ICT risk. It shall put in place policies that aim
        to ensure the maintenance of high standards of availability, authenticity,
        integrity and confidentiality of data. The management body shall define,
        approve, oversee and be responsible for the implementation and review of
        the ICT business continuity policy and ICT response and recovery plans.
    - id: art-5.3
      label: "3."
      prose: >-
        The management body shall approve and periodically review the ICT internal
        audit plans and ICT audits, and the material modifications thereto.
    - id: art-5.4
      label: "4."
      prose: >-
        The management body shall allocate and periodically review the appropriate
        budget to fulfil the financial entity's digital operational resilience needs
        in respect of all types of resources, including relevant ICT security
        awareness programmes and digital operational resilience training and ICT
        skills for all staff.

guidance:
  prose: >-
    Article 5 establishes that governance of ICT risk is a top-management
    responsibility that cannot be fully delegated. The management body must
    maintain sufficient knowledge and skills to understand and assess ICT risk
    and its impact on the operations of the financial entity. This includes
    regular training for management body members on ICT risk topics. The
    governance framework must be commensurate with the size, business profile,
    and risk exposure of the entity. It must include clear assignment of
    ICT-related roles and responsibilities, risk appetite for ICT risk, and
    mechanisms for rapid escalation of ICT incidents.

references:
  - citation: "DORA Regulation (EU) 2022/2554, Article 5"
    url: "https://eur-lex.europa.eu/eli/reg/2022/2554/oj"
  - citation: "EBA Guidelines on ICT and Security Risk Management (EBA/GL/2019/04)"
    url: "https://www.eba.europa.eu/regulation-and-policy/internal-governance/guidelines-on-ict-and-security-risk-management"

implementation_guidance:
  platform_engineering:
    prose: >-
      Encode ICT governance policies as machine-readable artifacts in a central
      policy repository. Implement organizational hierarchy and role assignments
      within the platform identity provider (IdP) so that ICT risk management
      responsibilities are traceable to named individuals. Establish automated
      dashboards showing ICT risk posture metrics (availability, incident counts,
      patch compliance) visible to management body members. Use Backstage or a
      similar internal developer portal to publish and maintain the ICT risk
      management framework documentation, ensuring version history and approval
      workflows. Integrate budget tracking for ICT resilience investments through
      cost management APIs linked to cloud and infrastructure spend.
    tools:
      - backstage
      - open-policy-agent
      - grafana
      - kubernetes-rbac
      - terraform
      - cost-management-apis

  devsecops:
    prose: >-
      Implement governance controls as automated pipeline gates that validate
      deployments against approved ICT risk policies. Ensure all changes to
      critical ICT systems require documented approval from designated ICT risk
      owners via merge request approval rules. Maintain an audit trail of all
      governance decisions in the CI/CD system by requiring structured commit
      messages and linking changes to risk assessments. Enforce mandatory security
      training completion checks before granting production deployment permissions.
      Establish compliance pipeline jobs that periodically verify governance
      artifacts (policies, role assignments, training records) are current.
    tools:
      - gitlab-ci
      - gitlab-compliance-framework
      - gitlab-approval-rules
      - conftest
      - checkov

  secops:
    prose: >-
      Monitor adherence to governance requirements through automated compliance
      checks. Configure alerting for governance deviations such as unauthorized
      role changes, expired policy reviews, or overdue training. Produce
      quarterly ICT risk governance reports for the management body showing
      risk posture trends, incident summaries, budget utilization, and audit
      findings. Map management body responsibilities to specific SIEM
      correlation rules that detect when governance boundaries are violated.
      Maintain an evidence repository linking governance decisions to their
      downstream implementation artifacts.
    tools:
      - splunk
      - elastic-siem
      - grc-platform
      - servicenow

