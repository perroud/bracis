id: art-7
family: chap-2
title: "ICT systems, protocols and tools"
class: DORA

statement:
  prose: >-
    Financial entities shall use and maintain updated ICT systems, protocols
    and tools that are appropriate to the scale of operations supporting
    their activities, in accordance with the proportionality principle as
    referred to in Article 4, reliable, have sufficient capacity to
    accurately process the data necessary for the performance of activities
    and the timely provision of services, and be technologically resilient
    in order to adequately deal with additional information processing needs
    as required under stressed market conditions or other adverse situations.

guidance:
  prose: >-
    Article 7 requires that ICT systems be kept current, properly sized, and
    resilient. This implies regular patching, capacity planning, performance
    testing under stress conditions, and technology refresh cycles. The
    proportionality principle means that the sophistication and investment in
    ICT systems must match the complexity, risk profile, and systemic
    importance of the financial entity. Systems must be designed to handle
    peak loads, market stress scenarios, and degraded operational conditions
    without loss of critical functionality.

references:
  - citation: "DORA Regulation (EU) 2022/2554, Article 7"
    url: "https://eur-lex.europa.eu/eli/reg/2022/2554/oj"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement infrastructure-as-code to ensure all ICT systems are
      provisioned from versioned, auditable templates. Use Kubernetes
      Horizontal Pod Autoscalers (HPA) and Vertical Pod Autoscalers (VPA)
      for dynamic capacity management. Establish automated patching
      pipelines for operating systems, container base images, and
      application dependencies. Implement chaos engineering practices
      (Litmus, Chaos Monkey) to validate resilience under adverse conditions.
      Maintain capacity dashboards with alerting thresholds aligned to
      business-defined SLOs. Use canary deployments and blue-green strategies
      to minimize risk during system updates. Track technology lifecycle
      status (current, end-of-support, end-of-life) in the service catalog.
    tools:
      - kubernetes
      - terraform
      - ansible
      - litmus-chaos
      - grafana
      - prometheus
      - backstage
      - renovate

  devsecops:
    prose: >-
      Automate dependency updates using Renovate or Dependabot integrated
      into CI/CD pipelines. Enforce container base image freshness policies
      that fail builds when images exceed defined age thresholds. Implement
      load testing as part of the release pipeline for services supporting
      critical business functions. Scan infrastructure-as-code for
      misconfiguration and capacity risks before provisioning. Maintain
      a software bill of materials (SBOM) for all deployed systems to
      track component versions and identify end-of-life dependencies.
      Enforce minimum TLS versions and deprecation of insecure protocols
      through pipeline policy checks.
    tools:
      - gitlab-ci
      - renovate
      - trivy
      - k6
      - gatling
      - syft
      - grype

  secops:
    prose: >-
      Monitor system health, capacity utilization, and patch compliance
      continuously. Alert when systems approach capacity limits or when
      critical patches remain unapplied beyond defined SLA windows.
      Conduct periodic stress testing exercises and document results for
      regulatory evidence. Track system lifecycle status and generate
      reports identifying components approaching end-of-support. Monitor
      for use of deprecated protocols or cryptographic algorithms and
      trigger remediation workflows automatically.
    tools:
      - splunk
      - elastic-siem
      - datadog
      - nagios
      - qualys

