id: art-11
family: chap-2
title: "Response and recovery"
class: DORA

statement:
  prose: >-
    As part of the ICT risk management framework referred to in Article 6(1)
    and based on the identification requirements set out in Article 8,
    financial entities shall put in place a comprehensive ICT business
    continuity policy, which may be adopted as a dedicated specific policy,
    forming an integral part of the overall business continuity policy of
    the financial entity.
  parts:
    - id: art-11.1
      label: "1."
      prose: >-
        Financial entities shall put in place an ICT Business Continuity
        Policy that addresses the adequacy and effectiveness of the
        continuity arrangements, including the performance of ICT business
        continuity testing and review exercises.
    - id: art-11.2
      label: "2."
      prose: >-
        Financial entities shall implement ICT response and recovery plans
        which shall be subject to independent audit reviews. The plans shall
        be tested at least yearly and after substantive changes to ICT
        systems. Those plans shall be subject to regular updates on the
        basis of ICT business continuity testing results.
    - id: art-11.3
      label: "3."
      prose: >-
        Financial entities shall put in place, maintain and periodically
        test appropriate ICT business continuity plans, notably with
        regard to critical or important functions outsourced or contracted
        through arrangements with ICT third-party service providers.
    - id: art-11.4
      label: "4."
      prose: >-
        As part of the overall ICT risk management, financial entities
        shall keep records of activities before and during disruption events
        when their ICT business continuity plans and ICT response and
        recovery plans are activated.
    - id: art-11.5
      label: "5."
      prose: >-
        Financial entities shall have the ability to estimate aggregated
        annual costs and losses caused by major ICT-related incidents.

guidance:
  prose: >-
    Response and recovery capabilities must be documented, tested, and
    continuously improved. The ICT business continuity policy must cover
    recovery time objectives (RTOs), recovery point objectives (RPOs),
    communication plans, escalation procedures, and post-incident review
    processes. Testing must be realistic, covering scenarios including
    ransomware, data center loss, cloud provider outage, and critical
    third-party provider failure. The requirement for independent audit
    review ensures that plans are validated by parties without
    operational bias. Cost tracking for ICT incidents enables risk
    quantification and investment justification.

references:
  - citation: "DORA Regulation (EU) 2022/2554, Article 11"
    url: "https://eur-lex.europa.eu/eli/reg/2022/2554/oj"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement multi-region or multi-availability-zone deployments with
      automated failover for all critical services. Define RTOs and RPOs
      as platform SLOs enforced through architecture validation. Use
      GitOps to ensure disaster recovery environments are continuously
      synchronized with production configurations. Automate backup
      verification through scheduled restore tests with automated
      validation of data integrity. Implement chaos engineering (Litmus
      Chaos, Chaos Mesh) to regularly test failover and recovery
      procedures. Maintain runbooks as code in the service catalog with
      automated execution capabilities. Deploy observability dashboards
      showing real-time RTO/RPO compliance for all critical services.
    tools:
      - litmus-chaos
      - chaos-mesh
      - velero
      - argocd
      - terraform
      - grafana
      - backstage

  devsecops:
    prose: >-
      Integrate disaster recovery testing into the CI/CD lifecycle.
      Implement pipeline jobs that validate backup integrity, test
      restore procedures, and verify failover mechanisms as part of
      release cycles. Maintain infrastructure-as-code for disaster
      recovery environments ensuring parity with production. Automate
      runbook execution through pipeline-triggered playbooks. Track
      recovery test results in pipeline artifacts with historical
      trending. Ensure all deployment pipelines include rollback
      procedures that are automatically tested during staging deployments.
    tools:
      - gitlab-ci
      - terraform
      - ansible
      - velero
      - k6

  secops:
    prose: >-
      Develop and maintain incident response playbooks for all identified
      ICT risk scenarios. Conduct tabletop exercises quarterly and
      full-scale recovery tests annually, documenting results and lessons
      learned. Track incident costs (direct, indirect, opportunity cost)
      in a centralized incident management system for annual aggregation.
      Monitor backup job success rates and recovery test outcomes.
      Maintain communication plans with predefined templates for internal
      and external stakeholders. Ensure post-incident reviews are
      conducted within defined timeframes and improvement actions are
      tracked to completion.
    tools:
      - pagerduty
      - opsgenie
      - splunk-soar
      - servicenow
      - grc-platform

