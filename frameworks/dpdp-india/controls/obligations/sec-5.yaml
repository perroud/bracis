id: sec-5
family: obligations
title: "Notice and consent for processing personal data"
class: DPDP-INDIA
baselines: [privacy-baseline]

statement:
  prose: >-
    (1) A Data Fiduciary shall, before processing or at the time of processing of personal data,
    give to the Data Principal an itemised notice in clear and plain language containing a
    description of personal data and the purpose of processing of such personal data. (2) Where
    a Data Principal has, prior to the commencement of this Act, given her consent to the
    processing of her personal data by a Data Fiduciary, the Data Fiduciary shall, as soon as it
    is reasonably practicable, give to such Data Principal a notice informing of such processing,
    describing the personal data so processed and the purpose thereof, in such manner and containing
    such particulars as may be prescribed. (3) The notice referred to in sub-section (2) shall also
    inform the Data Principal of her right to withdraw consent under sub-section (4) of section 6.

guidance:
  prose: >-
    Section 5 establishes the notice obligation — a prerequisite to lawful consent-based processing.
    The notice must be "itemised" and in "clear and plain language," which means organizations cannot
    bury data processing disclosures in lengthy legal terms. The retroactive notice requirement in
    Section 5(2) is particularly significant: organizations that were processing personal data before
    the Act commenced must proactively notify existing Data Principals about ongoing processing.
    This creates a significant compliance burden for organizations with large existing user bases.
    The notice must include the right to withdraw consent, creating a linkage between Sections 5 and 6.
    Organizations must audit all existing processing activities and prepare notices for each one.

references:
  - citation: "DPDP Act 2023, Section 5"
    url: "https://www.meity.gov.in/writereaddata/files/Digital%20Personal%20Data%20Protection%20Act%202023.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Build a centralized notice management system that generates, versions, and delivers
      itemised privacy notices per processing purpose.
      2. Implement notice delivery APIs that present notices before or at the point of data
      collection in clear, plain language — avoid legal jargon and nested clauses.
      3. Create a retroactive notice delivery pipeline for existing users: identify all Data
      Principals with pre-commencement consent, generate personalized notices describing their
      data and processing purposes, and deliver via email/in-app notification.
      4. Build notice versioning and acknowledgment tracking — store which notice version each
      Data Principal received and when.
      5. Implement notice templates with mandatory fields: personal data categories, processing
      purpose, rights exercise mechanism, and withdrawal instructions.
      6. Ensure notices are accessible (screen-reader compatible, multiple languages as needed).
    tools:
      - consent-management-platform
      - notification-service
      - email-delivery-platform
      - content-management-system
      - accessibility-testing

  devsecops:
    prose: >-
      1. CI/CD pipeline checks must verify that every new data collection endpoint has a
      corresponding notice delivery call before or at the point of collection.
      2. Automated tests must verify notice content includes all mandatory elements: data
      categories, purpose, rights mechanism, withdrawal instructions.
      3. Accessibility testing must validate notices meet WCAG standards for plain language
      and readability (target: 8th grade reading level).
      4. Integration tests must verify retroactive notice delivery for pre-existing users.
      5. Code review checklists must include notice delivery verification for all data processing flows.
    tools:
      - gitlab-ci
      - cypress
      - playwright
      - axe-accessibility
      - semgrep
      - readability-linters

  secops:
    prose: >-
      1. Monitor notice delivery success rates — alert on delivery failures that leave Data
      Principals unnotified about processing.
      2. Audit notice content accuracy quarterly — verify notices match actual processing activities.
      3. Track retroactive notice delivery progress and report completion rates.
      4. Monitor for data collection activities that occur without prior or concurrent notice delivery.
      5. Maintain compliance dashboards showing notice coverage across all processing purposes.
    tools:
      - siem
      - compliance-dashboard
      - email-delivery-analytics
      - data-governance-platform

