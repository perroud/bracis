id: sec-8
family: obligations
title: "General obligations of Data Fiduciary"
class: DPDP-INDIA
baselines: [privacy-baseline]

statement:
  prose: >-
    (1) A Data Fiduciary shall— (a) make reasonable efforts to ensure the accuracy and completeness
    of the personal data processed by it; (b) build reasonable security safeguards to prevent
    personal data breach; (c) in the event of a personal data breach, give to the Board and the
    affected Data Principal, an intimation of such breach in such form and manner as may be
    prescribed; (d) upon the Data Principal withdrawing her consent or on the specified purpose
    being no longer served, whichever is earlier, erase personal data, unless retention is
    necessary for compliance with any law; (e) publish the business contact information of a
    Data Protection Officer or a person who is able to answer on behalf of the Data Fiduciary,
    the questions, if any, raised by the Data Principal about the processing of her personal
    data; (f) establish an effective mechanism to redress the grievances of Data Principals;
    (g) in the case where the personal data of a Data Principal is likely to be processed by or
    shared with a Data Processor, the Data Fiduciary shall engage the Data Processor under a
    valid contract. (2) A Data Fiduciary shall not retain personal data beyond the period necessary
    to serve the specified purpose for which such personal data was processed, unless such personal
    data is needed for the compliance of any law for the time being in force. (3) Where the Data
    Principal has not approached the Data Fiduciary for the performance of the specified purpose,
    or for the exercise of her rights under this Act, for such period as may be prescribed, the
    Data Fiduciary shall erase the personal data collected or received by it.

guidance:
  prose: >-
    Section 8 is the comprehensive obligations section — it consolidates what GDPR spreads across
    multiple articles (accuracy/Art.5, security/Art.32, breach notification/Art.33-34,
    erasure/Art.17, DPO/Art.37-39, processor agreements/Art.28). Key obligations: (a) Data accuracy
    — reasonable efforts, not absolute accuracy. (b) Security safeguards — "reasonable" standard,
    not prescriptive. (c) Breach notification — to both the Board and affected Data Principals,
    with prescribed form/manner (rules pending). (d) Erasure — mandatory when consent is withdrawn
    OR purpose is fulfilled, whichever comes first. (e) Contact point — DPO or designated person
    must be publicly accessible. (f) Grievance mechanism — mandatory internal complaint resolution.
    (g) Processor contracts — mandatory contractual basis for processor engagements. Section 8(2)
    reinforces purpose-limited retention, and 8(3) introduces a dormancy-based erasure trigger.
    This section demands significant operational infrastructure.

references:
  - citation: "DPDP Act 2023, Section 8"
    url: "https://www.meity.gov.in/writereaddata/files/Digital%20Personal%20Data%20Protection%20Act%202023.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. ACCURACY: Implement data quality validation at ingestion points — verify completeness,
      format, and consistency of personal data. Build self-service correction portals for Data
      Principals to update their information.
      2. SECURITY: Deploy encryption at rest (AES-256) and in transit (TLS 1.3) for all personal
      data. Implement access controls, network segmentation, and intrusion detection for systems
      processing personal data.
      3. BREACH NOTIFICATION: Build an automated breach detection and notification pipeline —
      detect breaches, assess impact, generate notifications to the Board and affected Data
      Principals in the prescribed format.
      4. ERASURE: Implement automated erasure workflows triggered by consent withdrawal or
      purpose fulfillment. Build retention policy engines with TTL enforcement across all data
      stores. Implement dormancy detection to trigger erasure for inactive Data Principals.
      5. CONTACT POINT: Publish DPO/contact information via API endpoint and on public-facing
      privacy pages.
      6. GRIEVANCE MECHANISM: Build a grievance intake, tracking, and resolution system with
      SLA enforcement.
      7. PROCESSOR CONTRACTS: Implement a processor registry with contract management and
      compliance monitoring.
    tools:
      - hashicorp-vault
      - data-quality-framework
      - breach-notification-system
      - retention-policy-engine
      - grievance-management
      - contract-lifecycle-management
      - postgresql
      - kafka

  devsecops:
    prose: >-
      1. SAST and DAST scans must verify encryption of personal data at rest and in transit.
      2. CI/CD pipelines must verify retention policies are configured on all new data stores
      containing personal data.
      3. Dependency scanning must flag vulnerabilities in cryptographic libraries.
      4. Secret detection must prevent credentials from being exposed in code repositories.
      5. Automated tests must verify breach notification workflows trigger correctly.
      6. Database migration linters must verify TTL/retention configurations on new tables.
      7. Infrastructure-as-code scanning must verify encryption, access controls, and network
      segmentation for personal data stores.
    tools:
      - gitlab-ci
      - semgrep
      - sonarqube
      - checkov
      - tfsec
      - trivy
      - gitleaks

  secops:
    prose: >-
      1. Continuous monitoring for personal data breaches — unauthorized access, processing,
      disclosure, or loss of availability.
      2. Breach response playbooks with prescribed notification timelines to the Board and Data
      Principals.
      3. Retention compliance audits — verify personal data does not exceed retention periods.
      4. Dormancy monitoring — identify inactive Data Principals and trigger erasure workflows.
      5. Processor compliance monitoring — verify processors adhere to contractual obligations.
      6. Grievance SLA monitoring — track resolution times and escalate overdue grievances.
      7. DPO accessibility audits — verify contact information is current and reachable.
    tools:
      - siem
      - soar
      - vulnerability-scanner
      - data-loss-prevention
      - compliance-dashboard
      - retention-monitoring
      - processor-risk-management

