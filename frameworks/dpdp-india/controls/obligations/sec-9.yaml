id: sec-9
family: obligations
title: "Additional obligations of Significant Data Fiduciary"
class: DPDP-INDIA
baselines: [privacy-baseline]

statement:
  prose: >-
    (1) The Central Government may, on the basis of an assessment of such relevant factors as it
    may determine, notify any Data Fiduciary or class of Data Fiduciaries as Significant Data
    Fiduciary, on the basis of an assessment of relevant factors, including— (a) the volume and
    sensitivity of personal data processed; (b) risk to the rights of Data Principal; (c) potential
    impact on the sovereignty and integrity of India; (d) risk to electoral democracy; (e) security
    of the State; and (f) public order. (2) A Significant Data Fiduciary shall— (a) appoint a
    Data Protection Officer who shall— (i) represent the Significant Data Fiduciary before the
    Board; (ii) be based in India; (iii) be an individual responsible to the Board of Directors
    or similar governing body of the Significant Data Fiduciary; and (iv) be the point of contact
    for the grievance redressal mechanism under this Act; (b) appoint an independent data auditor
    to carry out data audit, who shall evaluate the compliance of the Significant Data Fiduciary;
    (c) undertake the following other measures, namely:— (i) periodic Data Protection Impact
    Assessment, which shall include a description of the rights of Data Principals and the purpose
    of processing of their personal data; and (ii) periodic audit.

guidance:
  prose: >-
    Section 9 creates a two-tier compliance framework: standard Data Fiduciaries and Significant
    Data Fiduciaries (SDF). The Central Government determines SDF status based on volume,
    sensitivity, sovereignty risk, electoral democracy risk, state security, and public order.
    SDFs face three additional obligations: (1) Appoint an India-based DPO who reports to the
    board of directors and serves as Board liaison and grievance contact. (2) Appoint an
    independent data auditor for compliance evaluation. (3) Conduct periodic Data Protection
    Impact Assessments (DPIA) and audits. The DPO requirements are stricter than GDPR — the DPO
    must be India-based and directly accountable to the governing body. The DPIA requirement is
    ongoing ("periodic"), not triggered by specific processing activities as under GDPR Article 35.
    Organizations should proactively assess whether they are likely to be notified as SDFs and
    prepare accordingly.

references:
  - citation: "DPDP Act 2023, Section 9"
    url: "https://www.meity.gov.in/writereaddata/files/Digital%20Personal%20Data%20Protection%20Act%202023.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Build a Significant Data Fiduciary self-assessment tool that evaluates processing volume,
      sensitivity, and risk factors against anticipated government criteria.
      2. Implement DPO workflow management — grievance routing, Board representation coordination,
      and compliance reporting dashboard.
      3. Build a Data Protection Impact Assessment (DPIA) platform that supports periodic
      assessments: risk identification, mitigation tracking, rights impact analysis, and
      purpose documentation.
      4. Create an audit management system for independent data auditors — evidence collection,
      finding tracking, remediation workflows.
      5. Implement automated compliance metrics collection that feeds into DPO and auditor
      reporting.
      6. Build board-level compliance reporting dashboards summarizing DPIA findings, audit
      results, and grievance resolution metrics.
    tools:
      - dpia-platform
      - grc-platform
      - compliance-dashboard
      - audit-management
      - grievance-management
      - backstage
      - risk-assessment-tools

  devsecops:
    prose: >-
      1. CI/CD pipelines must include DPIA checkpoints — new processing activities involving
      high-risk personal data must trigger a DPIA workflow before deployment.
      2. Automated compliance evidence collection must feed into the independent auditor's
      assessment — code scan results, security test results, access control configurations.
      3. Infrastructure-as-code must enforce SDF-specific controls: enhanced logging, stricter
      access controls, and data residency requirements.
      4. Pipeline stages must generate audit-ready reports documenting security controls,
      data flows, and compliance measures for each release.
    tools:
      - gitlab-ci
      - checkov
      - terraform
      - compliance-as-code
      - audit-evidence-collector

  secops:
    prose: >-
      1. Enhanced monitoring for SDFs — more frequent vulnerability scans, tighter anomaly
      detection thresholds, and faster incident response SLAs.
      2. Support independent data auditor activities — provide access to logs, configurations,
      and compliance evidence.
      3. Monitor DPIA action items — track mitigation measures and alert on overdue items.
      4. DPO support operations — route grievances, track Board inquiries, and manage compliance
      communications.
      5. Board-level reporting — generate periodic compliance status reports for the governing body.
    tools:
      - siem
      - grc-platform
      - vulnerability-scanner
      - compliance-dashboard
      - dpia-tracking
      - board-reporting

