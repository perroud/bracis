id: sec-7
family: obligations
title: "Certain legitimate uses for processing personal data"
class: DPDP-INDIA
baselines: [privacy-baseline]

statement:
  prose: >-
    A Data Fiduciary may process personal data of a Data Principal for any of the following
    uses, namely:— (a) for the specified purpose for which the Data Principal has voluntarily
    provided her personal data to the Data Fiduciary, and has not indicated to the Data Fiduciary
    that she does not consent to the use of her personal data; (b) for the State and any
    instrumentality of the State to process personal data for— (i) any function under any law
    or any order or judgement of any court or tribunal in India; (ii) providing any subsidy,
    benefit, service, certificate, licence, or permit; (c) for compliance with any judgement or
    decree or order issued under any law for the time being in force in India; (d) for responding
    to a medical emergency involving a threat to the life or a severe threat to the health of the
    Data Principal or any other individual; (e) for taking measures to provide medical treatment
    or health services to any individual during an epidemic, outbreak of disease, or any other
    threat to public health; (f) for taking measures to ensure safety of, or provide assistance
    or services to, any individual during any disaster, or any breakdown of public order.

guidance:
  prose: >-
    Section 7 elaborates on "legitimate uses" (also referred to as deemed consent scenarios)
    that allow processing without explicit consent. This is functionally similar to GDPR's
    non-consent legal bases but packaged differently. Key categories: (a) Voluntary provision
    with no objection — this is essentially implied consent for the stated purpose. (b) State
    functions — broad government processing authority. (c) Legal compliance — court orders,
    judgments, legal obligations. (d-f) Emergency and public health — medical emergencies,
    epidemics, disasters. Organizations relying on legitimate uses must document the specific
    sub-section they rely on and maintain evidence supporting the applicability. The voluntary
    provision basis (a) is particularly nuanced — it applies only when the Data Principal
    voluntarily provided data AND has not objected, creating an opt-out rather than opt-in model.

references:
  - citation: "DPDP Act 2023, Section 7"
    url: "https://www.meity.gov.in/writereaddata/files/Digital%20Personal%20Data%20Protection%20Act%202023.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implement a legitimate use classification engine that categorizes processing activities
      under one of the six sub-sections (voluntary provision, state function, legal compliance,
      medical emergency, epidemic response, disaster/public order).
      2. Build opt-out mechanisms for voluntary provision processing — Data Principals must be
      able to indicate they do not consent, converting to an explicit consent requirement.
      3. Create state/government integration APIs that document the legal authority (specific
      law, order, or court judgment) justifying processing.
      4. Implement emergency processing overrides with post-hoc documentation — during medical
      emergencies or disasters, processing can proceed but must be logged and justified after
      the fact.
      5. Build evidence management for legitimate use claims — store the legal basis, supporting
      documents, and periodic review records for each processing activity.
    tools:
      - processing-activity-register
      - consent-management-platform
      - document-management
      - api-gateway
      - audit-trail

  devsecops:
    prose: >-
      1. CI/CD pipelines must verify that processing activities tagged as "legitimate use" have
      a documented sub-section reference and supporting evidence.
      2. Automated tests must verify opt-out mechanisms work correctly for voluntary provision
      processing — objection must stop processing.
      3. Code review checklists must include verification that emergency processing overrides
      are properly scoped and time-limited.
      4. Integration tests for state/government systems must verify legal authority documentation
      is properly recorded.
    tools:
      - gitlab-ci
      - custom-compliance-checks
      - api-testing
      - semgrep

  secops:
    prose: >-
      1. Audit legitimate use claims quarterly — verify each claim still has a valid legal basis
      and the processing is proportionate.
      2. Monitor emergency processing overrides — alert on emergency justifications that extend
      beyond reasonable timeframes.
      3. Track opt-out requests for voluntary provision processing and verify processing cessation.
      4. Monitor for scope creep — processing under legitimate use that expands beyond the
      documented purpose.
    tools:
      - siem
      - compliance-dashboard
      - audit-platform
      - data-governance-platform

legal_references:
