id: sec-14
family: rights
title: "Nomination of another individual to exercise rights"
class: DPDP-INDIA
baselines: [privacy-baseline]

statement:
  prose: >-
    (1) A Data Principal shall have the right to nominate, in such manner as may be prescribed,
    any other individual, who shall, in the event of death or incapacity of the Data Principal,
    exercise the rights of the Data Principal in accordance with the provisions of this Act.
    (2) In the event of the death or incapacity of a Data Principal, the nominee shall exercise
    the rights of such Data Principal in such manner as may be prescribed.

guidance:
  prose: >-
    Section 14 is a novel provision with no direct equivalent in GDPR, LGPD, or PIPL. It
    addresses digital estate planning by allowing Data Principals to designate a nominee who
    can exercise their data protection rights upon death or incapacity. This is particularly
    relevant for: (a) Requesting access to the deceased/incapacitated person's personal data.
    (b) Requesting correction or erasure of their data. (c) Filing grievances on their behalf.
    (d) Withdrawing consent for processing. The specific procedures for nomination and nominee
    exercise of rights will be prescribed in rules. Organizations must build nomination
    registration systems and verification processes for nominee activation (death certificate,
    medical incapacity documentation, legal authority). This creates new workflows that most
    organizations have not previously needed to implement.

references:
  - citation: "DPDP Act 2023, Section 14"
    url: "https://www.meity.gov.in/writereaddata/files/Digital%20Personal%20Data%20Protection%20Act%202023.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Build a nomination registration system within the Data Principal rights portal —
      allow users to designate one or more nominees with verified identity information.
      2. Implement nominee verification workflow: identity verification of the nominee at
      registration, secure storage of nomination records, and re-verification at activation.
      3. Build activation triggers: death certificate upload and verification, medical
      incapacity documentation, or court order processing.
      4. Implement nominee rights exercise portal — a separate authentication flow that grants
      the nominee access to the Data Principal's rights (access, correction, erasure, grievance).
      5. Create audit trails for all nomination events: registration, modification, revocation,
      activation, and rights exercise by nominee.
      6. Build nomination revocation mechanisms — Data Principals must be able to change or
      remove nominees while they have capacity.
    tools:
      - identity-verification
      - document-verification
      - nomination-management
      - privacy-portal
      - audit-trail
      - postgresql

  devsecops:
    prose: >-
      1. Automated tests must verify nomination registration, modification, and revocation
      workflows.
      2. Tests must verify nominee activation requires proper documentation and verification.
      3. Security tests must ensure nominees cannot access Data Principal data without proper
      activation.
      4. Tests must verify that nominee rights are scoped to the same rights as the Data
      Principal (no privilege escalation).
    tools:
      - gitlab-ci
      - api-testing
      - security-testing
      - cypress
      - playwright

  secops:
    prose: >-
      1. Monitor nomination activation events — verify documentation is properly verified
      before granting access.
      2. Audit nominee activities — ensure nominee rights exercise is within scope and
      legitimate.
      3. Track nomination records — alert on suspicious patterns (mass nominations,
      frequent changes, nominees linked to multiple unrelated Data Principals).
      4. Monitor for unauthorized access attempts by inactive or revoked nominees.
    tools:
      - siem
      - compliance-dashboard
      - identity-governance
      - fraud-detection

legal_references:
  - framework_id: gdpr
    articles: ["art-15", "art-17"]
    relationship: mapped
  - framework_id: lgpd
    articles: ["art-18"]
    relationship: mapped
