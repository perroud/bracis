id: sec-12
family: rights
title: "Duties of Data Principal"
class: DPDP-INDIA
baselines: [privacy-baseline]

statement:
  prose: >-
    A Data Principal shall— (a) comply with the provisions of all applicable laws for the time
    being in force while exercising rights under the provisions of this Act; (b) not register a
    false or frivolous grievance or complaint with a Data Fiduciary or the Board under this Act;
    (c) not furnish any false particulars or suppress any material information or impersonate
    another person in the specified cases; (d) not furnish any false information or suppress any
    material information while applying for the exercise of her rights under section 11; and
    (e) such other duties as may be prescribed.

guidance:
  prose: >-
    Section 12 is unique among global data protection laws — it imposes duties on Data Principals
    (data subjects). Neither GDPR, LGPD, nor PIPL impose reciprocal duties. Key duties include:
    not filing false/frivolous complaints, not providing false information when exercising rights,
    not impersonating others, and complying with applicable laws. This section creates a legal
    basis for organizations to reject or penalize fraudulent rights requests. Under Section 33,
    Data Principals who breach these duties face penalties up to INR 10,000. Organizations should
    implement verification mechanisms to detect frivolous or fraudulent requests, but must be
    careful not to use this section as a pretext to deny legitimate rights exercise. The burden
    of proving a request is false or frivolous lies with the Data Fiduciary.

references:
  - citation: "DPDP Act 2023, Section 12"
    url: "https://www.meity.gov.in/writereaddata/files/Digital%20Personal%20Data%20Protection%20Act%202023.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implement identity verification for all rights exercise requests — multi-factor
      authentication, document verification, or knowledge-based authentication to prevent
      impersonation.
      2. Build fraud detection for rights requests — pattern analysis to detect mass frivolous
      filings, inconsistent identity claims, or repeated false information.
      3. Implement request validation logic that flags potentially false or inconsistent
      information while still processing legitimate requests.
      4. Create audit trails for rejected requests — document the specific duty violation
      (false information, impersonation, frivolous complaint) with evidence.
      5. Build escalation workflows for suspected fraudulent requests before outright rejection.
    tools:
      - identity-verification
      - fraud-detection
      - request-validation
      - audit-trail
      - risk-scoring

  devsecops:
    prose: >-
      1. Automated tests must verify identity verification is enforced on all rights exercise
      endpoints.
      2. Tests must verify that legitimate requests are not incorrectly flagged as frivolous.
      3. Security testing must verify impersonation prevention mechanisms are effective.
      4. Code review checklists must include verification that fraud detection does not create
      barriers to legitimate rights exercise.
    tools:
      - gitlab-ci
      - api-testing
      - security-testing
      - identity-testing

  secops:
    prose: >-
      1. Monitor for patterns indicating organized fraudulent rights requests.
      2. Audit rejected requests to verify rejections are justified and documented.
      3. Track false information incidents and report to the Board when applicable.
      4. Monitor for impersonation attempts in the rights exercise portal.
      5. Ensure fraud detection does not disproportionately reject legitimate requests from
      specific demographics.
    tools:
      - siem
      - fraud-analytics
      - compliance-dashboard
      - audit-platform

legal_references:
  - framework_id: gdpr
    articles: ["art-12"]
    relationship: mapped
  - framework_id: lgpd
    articles: ["art-18"]
    relationship: mapped
