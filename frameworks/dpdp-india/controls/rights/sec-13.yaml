id: sec-13
family: rights
title: "Right to grievance redressal"
class: DPDP-INDIA
baselines: [privacy-baseline]

statement:
  prose: >-
    (1) A Data Principal who is not satisfied with the response of a Data Fiduciary to a grievance
    or who does not receive a response within the prescribed period may register a complaint with
    the Board in such manner as may be prescribed. (2) On receipt of a complaint under sub-section
    (1), the Board may, after giving the Data Fiduciary an opportunity of being heard, pass such
    order as it deems fit.

guidance:
  prose: >-
    Section 13 establishes a two-tier grievance resolution mechanism: first with the Data
    Fiduciary (internal), then with the Data Protection Board (external). The Data Principal
    must first exhaust the internal grievance mechanism before escalating to the Board.
    Escalation is triggered by either an unsatisfactory response or no response within the
    prescribed period (to be defined in rules). The Board has broad adjudicatory powers —
    it can pass "such order as it deems fit" after hearing both parties. This creates a
    regulatory risk for organizations with inadequate internal grievance handling. Organizations
    must ensure their internal grievance mechanism resolves complaints effectively and within
    prescribed timelines to avoid Board intervention. The Board's orders are legally binding
    and can include penalties and corrective actions.

references:
  - citation: "DPDP Act 2023, Section 13"
    url: "https://www.meity.gov.in/writereaddata/files/Digital%20Personal%20Data%20Protection%20Act%202023.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Build a comprehensive grievance management system with intake, categorization, assignment,
      tracking, and resolution workflows.
      2. Implement SLA enforcement — track response timelines against prescribed periods and
      escalate internally before deadlines are missed.
      3. Create a grievance acknowledgment system that immediately confirms receipt to Data
      Principals with tracking reference numbers.
      4. Build response quality controls — templates for common grievance types, supervisor
      review for complex cases, and quality scoring.
      5. Implement a Board compliance module — if a grievance escalates to the Board, generate
      evidence packages including the original complaint, internal response, timeline, and
      all supporting documentation.
      6. Build dashboards for DPO/management showing grievance volumes, resolution rates,
      average response times, and escalation trends.
    tools:
      - grievance-management
      - sla-enforcement
      - ticketing-system
      - compliance-dashboard
      - document-management

  devsecops:
    prose: >-
      1. Automated tests must verify grievance submission workflows function correctly across
      all channels (web, mobile, email, API).
      2. SLA compliance tests must verify automated escalation triggers fire at the correct
      thresholds.
      3. Integration tests must verify grievance status tracking and notification delivery to
      Data Principals at each stage.
      4. Load tests must verify grievance system can handle spikes in complaint volume.
    tools:
      - gitlab-ci
      - api-testing
      - cypress
      - playwright
      - load-testing

  secops:
    prose: >-
      1. Monitor grievance resolution SLAs in real time — alert when approaching prescribed
      deadlines.
      2. Track escalation rates to the Board — increasing escalations indicate systemic
      grievance handling failures.
      3. Audit grievance resolution quality — sample closed grievances for adequacy and
      accuracy of responses.
      4. Monitor for patterns in grievance types that may indicate systemic compliance failures
      requiring proactive remediation.
      5. Prepare and maintain Board response playbooks for escalated complaints.
    tools:
      - siem
      - compliance-dashboard
      - grievance-analytics
      - audit-platform

legal_references:
