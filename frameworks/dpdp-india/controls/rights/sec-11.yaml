id: sec-11
family: rights
title: "Rights of Data Principal"
class: DPDP-INDIA
baselines: [privacy-baseline]

statement:
  prose: >-
    (1) A Data Principal shall have the right to— (a) obtain from the Data Fiduciary, upon her
    request, a summary of personal data that is being processed by the Data Fiduciary and the
    processing activities undertaken by that Data Fiduciary with respect to such personal data,
    in such manner as may be prescribed; (b) obtain from the Data Fiduciary, upon her request,
    the identities of all other Data Fiduciaries and Data Processors with whom the personal data
    has been shared by the Data Fiduciary, along with a description of the personal data so
    shared; (c) seek correction and erasure of inaccurate or misleading personal data, and seek
    updating, completion, or correction of incomplete personal data; (d) the right of grievance
    redressal in respect of any act or omission of the Data Fiduciary or Data Processor regarding
    the performance of its obligations in relation to her personal data, or the exercise of her
    rights; and (e) the right to nominate, in such manner as may be prescribed, any other
    individual, who shall, in the event of death or incapacity of the Data Principal, exercise
    the rights of the Data Principal.

guidance:
  prose: >-
    Section 11 establishes five core rights for Data Principals, similar to but distinct from
    GDPR Chapter III. (a) Right of access — obtaining a summary of processing activities and
    personal data, not necessarily a full copy (unlike GDPR Article 15 which grants access to
    a copy of personal data). (b) Right to know about sharing — identities of all Data
    Fiduciaries and Processors with whom data has been shared, creating transparency about the
    data sharing ecosystem. (c) Right to correction and erasure — combined right covering
    inaccurate, misleading, or incomplete data. (d) Right to grievance redressal — an internal
    dispute resolution mechanism before escalation to the Board. (e) Right to nomination — a
    unique provision allowing designation of a nominee to exercise rights upon death or incapacity,
    addressing digital estate planning. Notable omissions compared to GDPR: no explicit right to
    data portability, no right to object to processing, no right to restrict processing, and no
    right related to automated decision-making. Organizations must build self-service portals
    enabling Data Principals to exercise all five rights efficiently.

references:
  - citation: "DPDP Act 2023, Section 11"
    url: "https://www.meity.gov.in/writereaddata/files/Digital%20Personal%20Data%20Protection%20Act%202023.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Build a Data Principal rights portal (DSAR portal) enabling self-service exercise of
      all five rights with identity verification.
      2. RIGHT OF ACCESS: Implement automated data subject access request (DSAR) pipelines that
      aggregate personal data summaries and processing activity descriptions from all systems.
      3. RIGHT TO KNOW SHARING: Build a data sharing registry that tracks all Data Fiduciaries
      and Processors with whom personal data has been shared, with descriptions of what was shared.
      4. RIGHT TO CORRECTION/ERASURE: Implement correction and erasure workflows that propagate
      changes across all systems and downstream Data Processors.
      5. RIGHT TO GRIEVANCE REDRESSAL: Build a grievance management system with intake, tracking,
      escalation, and resolution workflows.
      6. RIGHT TO NOMINATION: Implement a nomination registration system allowing Data Principals
      to designate nominees, with verification of nominee identity and activation triggers
      (death certificate, incapacity documentation).
      7. All rights exercise requests must be logged with timestamps, verification steps, and
      resolution outcomes for audit purposes.
    tools:
      - dsar-automation
      - privacy-portal
      - data-sharing-registry
      - grievance-management
      - nomination-management
      - identity-verification
      - postgresql

  devsecops:
    prose: >-
      1. CI/CD pipeline checks must verify that new data stores are integrated with the DSAR
      pipeline — no orphaned data stores that cannot respond to access requests.
      2. Automated tests must verify DSAR response completeness — all personal data categories
      and processing activities must be included.
      3. Integration tests must verify correction and erasure propagation across all downstream
      systems and processors.
      4. Tests must verify grievance submission, tracking, and escalation workflows function
      correctly end-to-end.
      5. Nomination workflow tests must verify activation and deactivation scenarios.
    tools:
      - gitlab-ci
      - api-testing
      - postman
      - cypress
      - playwright
      - integration-testing

  secops:
    prose: >-
      1. Monitor DSAR fulfillment SLAs — alert when requests approach or exceed response
      deadlines.
      2. Audit DSAR responses for completeness — verify all data stores were queried and
      results included.
      3. Track correction and erasure propagation — verify all downstream systems completed
      the requested changes.
      4. Monitor grievance resolution times and escalation patterns.
      5. Audit nomination records — verify nominees are properly registered and contact
      information is current.
      6. Generate periodic reports on rights exercise volumes, types, and resolution outcomes.
    tools:
      - siem
      - compliance-dashboard
      - dsar-tracking
      - grievance-monitoring
      - audit-platform

