id: sec-17
family: xborder
title: "Exemptions"
class: DPDP-INDIA
baselines: [privacy-baseline]

statement:
  prose: >-
    (1) The provisions of this Act, except the provisions of section 8(3), shall not apply where—
    (a) the processing of personal data is necessary for enforcing any legal right or claim;
    (b) the processing of personal data by any court or tribunal or any other body in India
    which is discharging judicial or quasi-judicial functions; (c) personal data of Data Principals
    not within the territory of India pursuant to any contract entered into with any person outside
    the territory of India by any person based in the territory of India; (d) the Central
    Government exempts, by notification, having regard to the volume and nature of personal data
    processed, processing by— (i) any instrumentality of the State, in the interests of sovereignty
    and integrity of India, security of the State, friendly relations with foreign States,
    maintenance of public order, or preventing incitement to any cognizable offence relating to
    any of these; and (ii) for purposes related to research, archiving, or statistical purposes
    if the personal data is not to be used to take any decision specific to a Data Principal.
    (2) The Central Government may, by notification, exempt any class of Data Fiduciaries from
    any provisions of this Act, having regard to the volume and nature of personal data processed
    by such class.

guidance:
  prose: >-
    Section 17 provides broad exemptions that significantly narrow the Act's scope in practice.
    Key exemptions: (a) Legal rights enforcement — processing needed to enforce or defend legal
    claims. (b) Judicial processing — courts, tribunals, and quasi-judicial bodies are exempt.
    (c) Offshore processing — data of non-Indian Data Principals processed under foreign contracts
    is exempt (critical for India's IT outsourcing industry). (d) State security — the Central
    Government can exempt state instrumentalities for sovereignty, security, public order, and
    foreign relations purposes. (e) Research and statistics — exempt if data is not used for
    individual decisions. Section 17(2) grants the Central Government a broad power to exempt
    entire classes of Data Fiduciaries. The state security exemption has drawn criticism for its
    breadth — it could effectively exempt government surveillance from the Act's protections.
    Organizations must carefully assess whether any exemption applies to their processing
    activities and document the basis thoroughly.

references:
  - citation: "DPDP Act 2023, Section 17"
    url: "https://www.meity.gov.in/writereaddata/files/Digital%20Personal%20Data%20Protection%20Act%202023.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Build an exemption assessment engine that evaluates processing activities against
      Section 17 categories and documents the justification.
      2. Implement exemption tagging in the processing activity register — tag activities that
      rely on exemptions with the specific sub-section and supporting evidence.
      3. For offshore processing exemption (17(1)(c)): build contract management integration
      that verifies the foreign contract exists and the Data Principals are non-Indian.
      4. For research/statistical exemption (17(1)(d)(ii)): implement data anonymization and
      de-identification pipelines that ensure personal data is not used for individual decisions.
      5. Build exemption monitoring — track government notifications that grant or revoke
      exemptions for specific Data Fiduciary classes.
      6. Even when exempt from most provisions, ensure Section 8(3) compliance (dormancy-based
      erasure) remains enforced, as it is not exempted.
    tools:
      - processing-activity-register
      - contract-management
      - data-anonymization
      - de-identification-tools
      - compliance-dashboard
      - policy-engine

  devsecops:
    prose: >-
      1. CI/CD pipeline checks must verify that processing activities claiming exemptions have
      documented and reviewed justifications.
      2. Automated tests must verify that anonymization/de-identification is properly applied
      for research/statistical processing claiming exemption.
      3. Code review must verify that even exempt processing activities comply with Section 8(3)
      dormancy-based erasure requirements.
      4. Contract validation must verify foreign contracts exist for offshore processing exemption.
    tools:
      - gitlab-ci
      - custom-compliance-checks
      - data-anonymization-testing
      - contract-validation

  secops:
    prose: >-
      1. Audit exemption claims periodically — verify the exemption basis is still valid and
      properly documented.
      2. Monitor for processing activities that may be incorrectly claiming exemptions to avoid
      compliance obligations.
      3. Track government notifications for new exemptions or revocations that affect the
      organization.
      4. Verify Section 8(3) compliance for all processing activities, including those claiming
      other exemptions.
      5. Monitor offshore processing contracts for expiration or termination that would remove
      the exemption basis.
    tools:
      - siem
      - compliance-dashboard
      - audit-platform
      - contract-monitoring
      - policy-engine

