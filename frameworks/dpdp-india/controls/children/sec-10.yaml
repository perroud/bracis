id: sec-10
family: children
title: "Processing of personal data of children and persons with disability"
class: DPDP-INDIA
baselines: [privacy-baseline]

statement:
  prose: >-
    (1) A Data Fiduciary shall, before processing any personal data of a child or a person with
    disability who has a lawful guardian, obtain verifiable consent of the parent of such child
    or the lawful guardian, as the case may be, in such manner as may be prescribed. (2) A Data
    Fiduciary shall not undertake such processing of personal data that is likely to cause any
    detrimental effect on the well-being of a child. (3) A Data Fiduciary shall not undertake
    tracking or behavioural monitoring of children or targeted advertising directed at children.
    (4) The provisions of sub-sections (1) and (3) shall not apply to processing of personal data
    of a child by such class of Data Fiduciaries or for such purposes as may be prescribed.
    (5) The Central Government may, if it is satisfied that a Data Fiduciary has instituted
    appropriate mechanisms for age verification and has ensured the safety of such children,
    by notification, declare that all or any of the provisions of sub-sections (1) and (3) shall
    not apply to the Data Fiduciary.

guidance:
  prose: >-
    Section 10 provides strong protections for children's data, going beyond GDPR in some respects.
    Key requirements: (1) Verifiable parental consent before any processing of a child's data —
    the "verifiable" standard means passive or implied consent is insufficient. (2) No processing
    that is detrimental to a child's well-being — a subjective standard that will need
    interpretation. (3) Absolute ban on tracking, behavioral monitoring, and targeted advertising
    directed at children — this is stricter than GDPR and COPPA. (4-5) Exemptions exist: certain
    classes of Data Fiduciaries or purposes may be exempted by government notification, and Data
    Fiduciaries with robust age verification and child safety mechanisms may be exempted from
    sub-sections (1) and (3). The Act does not define "child" explicitly in Section 10 but
    references it in Section 2 as a person who has not completed eighteen years of age.
    Organizations must implement robust age verification and parental consent mechanisms.

references:
  - citation: "DPDP Act 2023, Section 10"
    url: "https://www.meity.gov.in/writereaddata/files/Digital%20Personal%20Data%20Protection%20Act%202023.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implement age verification at registration and data collection points — use reliable
      age-gating mechanisms (date of birth verification, document verification, or third-party
      age estimation services).
      2. Build a verifiable parental consent workflow: parent identification, verification of
      parent-child relationship, and secure consent collection with audit trail.
      3. Implement processing restriction engine that blocks tracking, behavioral monitoring,
      and targeted advertising for users identified as children.
      4. Deploy content safety filters that prevent processing detrimental to child well-being.
      5. Create a child data segregation layer — store children's data with enhanced access
      controls and processing restrictions.
      6. Build parental dashboard allowing parents to view, manage, and revoke consent for their
      children's data processing.
      7. Implement exemption management — track government notifications that may exempt certain
      processing and configure accordingly.
    tools:
      - age-verification-service
      - consent-management-platform
      - identity-verification
      - content-moderation
      - open-policy-agent
      - parental-consent-workflow

  devsecops:
    prose: >-
      1. CI/CD pipelines must verify that features involving children's data have age verification
      and parental consent checks before deployment.
      2. Automated tests must verify that tracking pixels, behavioral analytics, and targeted
      advertising are disabled for child accounts.
      3. SAST rules must detect code paths that could expose children to behavioral monitoring
      or targeted advertising.
      4. UI/UX tests must verify parental consent workflows are functional and verifiable.
      5. Code review checklists must include child safety assessment for new features.
    tools:
      - gitlab-ci
      - semgrep
      - cypress
      - playwright
      - custom-child-safety-linters
      - api-testing

  secops:
    prose: >-
      1. Monitor for unauthorized processing of children's data without parental consent.
      2. Audit age verification accuracy — false negatives (children passing as adults) create
      compliance violations.
      3. Monitor for behavioral monitoring or targeted advertising reaching child accounts.
      4. Track parental consent lifecycle — ensure consent is re-verified when children approach
      the age of majority.
      5. Investigate processing activities flagged as potentially detrimental to child well-being.
      6. Monitor government notifications for exemptions applicable to the organization.
    tools:
      - siem
      - compliance-dashboard
      - content-moderation
      - age-verification-audit
      - parental-consent-tracking

legal_references:
