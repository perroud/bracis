id: sec-3
family: gen
title: "Application of the Act"
class: DPDP-INDIA
baselines: [privacy-baseline]

statement:
  prose: >-
    (1) The provisions of this Act shall apply to the processing of digital personal data within
    the territory of India where the personal data is collected— (a) in digital form; or (b) in
    non-digital form and digitised subsequently. (2) The provisions of this Act shall also apply
    to processing of digital personal data outside the territory of India, if such processing is
    in connection with any activity related to offering of goods or services to Data Principals
    within the territory of India. (3) The provisions of this Act shall not apply to— (a) personal
    data processed by an individual for any personal or domestic purpose; and (b) personal data
    that is made or caused to be made publicly available by— (i) the Data Principal to whom such
    personal data relates; or (ii) any other person who is under an obligation under any law for
    the time being in force in India to make such personal data publicly available.

guidance:
  prose: >-
    Section 3 defines the territorial and material scope of the DPDP Act. It establishes
    extraterritorial application similar to the GDPR's Article 3 — any organization outside India
    that offers goods or services to individuals in India must comply. The Act covers both
    data collected digitally and data collected offline but subsequently digitized, which is a
    broad scope. However, it excludes purely personal/domestic processing and data that the
    individual themselves (or someone legally obligated) has made public. Organizations must
    conduct a thorough data flow mapping exercise to determine whether any of their processing
    activities fall within scope, including indirect processing through third-party processors
    located in India or processing data of Indian residents.

references:
  - citation: "DPDP Act 2023, Section 3"
    url: "https://www.meity.gov.in/writereaddata/files/Digital%20Personal%20Data%20Protection%20Act%202023.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implement geo-detection capabilities at API gateways and application entry points to
      identify when Data Principals are located in India, triggering DPDP Act compliance workflows.
      2. Build data flow mapping tools that document all processing activities involving digital
      personal data — source, purpose, legal basis, storage location, and cross-border transfers.
      3. Tag all data pipelines with jurisdictional metadata indicating whether DPDP Act applies.
      4. Implement automated classification of data sources as digital-origin vs. digitized
      (originally non-digital) to ensure both categories are covered.
      5. Design exemption flags for personal/domestic processing and publicly available data
      with audit trails documenting the exemption justification.
    tools:
      - api-gateway
      - data-flow-mapping
      - geo-detection
      - metadata-tagging
      - backstage

  devsecops:
    prose: >-
      1. CI/CD pipeline checks must verify that new services or APIs that process personal data
      have a documented jurisdictional assessment (does DPDP apply?).
      2. Automated tests must verify geo-detection logic correctly identifies India-based Data
      Principals and triggers appropriate consent and processing workflows.
      3. Code review checklists must include verification that personal data exemptions (domestic
      use, publicly available data) are properly documented and not over-applied.
      4. Infrastructure-as-code templates must include jurisdictional tagging for data stores.
    tools:
      - gitlab-ci
      - terraform
      - checkov
      - custom-compliance-checks
      - api-testing

  secops:
    prose: >-
      1. Monitor data flows to detect processing of Indian Data Principals' data that may not
      be covered by existing DPDP compliance measures.
      2. Audit jurisdictional assessments quarterly to ensure accuracy as services expand to
      new markets or data sources.
      3. Alert on new data collection points that lack jurisdictional classification.
      4. Track extraterritorial processing activities and verify compliance measures are in place
      for offerings targeting Indian consumers.
    tools:
      - siem
      - data-flow-monitoring
      - compliance-dashboard
      - geo-analytics

