id: sec-2
family: gen
title: "Definitions"
class: DPDP-INDIA
baselines: [privacy-baseline]

statement:
  prose: >-
    In this Act, unless the context otherwise requires,— (a) "Consent Manager" means a person registered
    with the Board, who acts as a single point of contact to enable a Data Principal to give, manage,
    review, and withdraw her consent through an accessible, transparent, and interoperable platform;
    (b) "data" means a representation of information, facts, concepts, opinions, or instructions in a
    manner suitable for communication, interpretation, or processing by human beings or by automated
    means; (c) "Data Fiduciary" means any person who alone or in conjunction with other persons
    determines the purpose and means of processing of personal data; (d) "Data Principal" means the
    individual to whom the personal data relates and where such individual is— (i) a child, includes the
    parents or lawful guardian of such child; (ii) a person with disability, includes her lawful guardian
    acting on her behalf; (e) "Data Processor" means any person who processes personal data on behalf
    of a Data Fiduciary; (f) "digital personal data" means personal data in digital form;
    (g) "personal data" means any data about an individual who is identifiable by or in relation to
    such data; (h) "personal data breach" means any unauthorised processing of personal data or
    accidental disclosure, acquisition, sharing, use, alteration, destruction of, or loss of access to,
    personal data, that compromises the confidentiality, integrity, or availability of personal data;
    (i) "processing" in relation to personal data, means a wholly or partly automated operation or
    set of operations performed on digital personal data, and includes operations such as collection,
    recording, organisation, structuring, storage, adaptation, retrieval, use, alignment or combination,
    indexing, sharing, disclosure by transmission, dissemination or otherwise making available,
    restriction, erasure, or destruction; (j) "Significant Data Fiduciary" means any Data Fiduciary
    or class of Data Fiduciaries as may be notified by the Central Government under section 10.

guidance:
  prose: >-
    Section 2 establishes the foundational vocabulary for the entire DPDP Act. Key distinctions
    from GDPR terminology: "Data Fiduciary" maps to "Controller," "Data Principal" maps to
    "Data Subject," and "Data Processor" retains its GDPR meaning. The "Consent Manager" is a
    novel concept unique to India's framework — a registered intermediary that facilitates consent
    lifecycle management. "Significant Data Fiduciary" parallels the GDPR concept of large-scale
    processing requiring additional obligations (DPO, impact assessment). The definition of
    "personal data breach" is broad and covers unauthorized processing, not only unauthorized
    access. Organizations must map these definitions precisely to their data governance glossary
    to ensure consistent application throughout the compliance program.

references:
  - citation: "DPDP Act 2023, Section 2"
    url: "https://www.meity.gov.in/writereaddata/files/Digital%20Personal%20Data%20Protection%20Act%202023.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Build a centralized data glossary/catalog that maps DPDP Act terminology to internal
      data governance concepts (Data Fiduciary = your organization as controller, Data Processor
      = third-party processors, Data Principal = end users/customers).
      2. Implement metadata tagging across all data stores to classify data as "personal data"
      or "digital personal data" per the Act's definitions.
      3. Design a Consent Manager integration layer — either build or integrate with a registered
      Consent Manager platform to serve as the single point of contact for Data Principals.
      4. Create a Significant Data Fiduciary assessment pipeline that evaluates processing volume,
      sensitivity, and risk to determine if enhanced obligations apply.
      5. Implement a personal data breach detection system aligned with the Act's broad definition
      covering unauthorized processing, accidental disclosure, and loss of access.
    tools:
      - datahub
      - openmetadata
      - apache-atlas
      - consent-management-platform
      - data-classification-engine
      - backstage

  devsecops:
    prose: >-
      1. Integrate data classification scanning into CI/CD pipelines to automatically detect and
      tag personal data fields in code changes and database migrations.
      2. Enforce schema validation rules that require "personal data" annotations on all data
      models containing individually identifiable information.
      3. Build automated tests verifying that Consent Manager integration endpoints are functional
      and interoperable.
      4. Implement linting rules that flag processing operations on personal data without
      corresponding consent or legitimate use justification in code comments or configuration.
      5. Scan for personal data leakage into logs, error messages, and analytics payloads.
    tools:
      - semgrep
      - gitlab-ci
      - sonarqube
      - custom-privacy-linters
      - schema-validation

  secops:
    prose: >-
      1. Monitor for personal data breaches as defined in Section 2(h) — unauthorized processing,
      accidental disclosure, loss of access — not just unauthorized access.
      2. Maintain an up-to-date inventory of all Data Processors and their processing activities.
      3. Audit Consent Manager operations for completeness and accuracy of consent records.
      4. Track Significant Data Fiduciary status and trigger enhanced monitoring when thresholds
      are crossed.
      5. Implement alerting for any data processing activity that does not map to a defined
      purpose in the data processing registry.
    tools:
      - siem
      - data-loss-prevention
      - compliance-dashboard
      - data-discovery
      - identity-governance

