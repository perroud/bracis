id: sec-27
family: enforcement
title: "Inquiry by the Board"
class: DPDP-INDIA
baselines: [privacy-baseline]

statement:
  prose: >-
    (1) On receipt of a complaint under section 13 or a reference by the Central Government or a
    State Government or a court, the Board shall make an inquiry or direct an inquiry to be made
    into such complaint or reference. (2) The Board shall, while making an inquiry under
    sub-section (1)— (a) provide an opportunity to the parties to be heard; (b) follow the
    principles of natural justice; (c) have the powers of a civil court for the limited purpose
    of— (i) summoning and enforcing the attendance of any person and examining such person on
    oath; (ii) requiring the discovery and production of documents; (iii) receiving evidence on
    affidavit; and (iv) issuing commissions for the examination of witnesses or documents.
    (3) On conclusion of the inquiry under sub-section (1), the Board may— (a) direct the Data
    Fiduciary or the Data Processor, as the case may be, to take such steps as may be necessary
    to remedy the breach and to comply with the provisions of this Act; (b) impose a penalty under
    section 33.

guidance:
  prose: >-
    Section 27 grants the Board significant enforcement powers. It has quasi-judicial authority
    with civil court powers: summoning witnesses, compelling document production, receiving sworn
    evidence, and commissioning examinations. The inquiry process follows natural justice
    principles — both parties get a hearing. Inquiry triggers: (a) Data Principal complaints
    under Section 13, (b) Central Government references, (c) State Government references,
    (d) Court references. After inquiry, the Board can: (a) Direct remedial actions — specific
    steps to fix the breach and achieve compliance, and/or (b) Impose penalties under Section 33.
    Organizations must prepare for Board inquiries by maintaining comprehensive compliance
    documentation, audit trails, and evidence of security measures. The ability to compel document
    production means organizations cannot rely on withholding unfavorable evidence. Legal counsel
    should be engaged early when a Board inquiry is initiated.

references:
  - citation: "DPDP Act 2023, Section 27"
    url: "https://www.meity.gov.in/writereaddata/files/Digital%20Personal%20Data%20Protection%20Act%202023.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Build inquiry response infrastructure — document production systems that can aggregate
      evidence across all systems processing personal data.
      2. Implement immutable audit logging (WORM storage) for all personal data processing
      operations — these logs become critical evidence during Board inquiries.
      3. Create compliance evidence repositories with version control and tamper-evident storage.
      4. Build automated evidence collection pipelines that can generate comprehensive compliance
      reports on demand.
      5. Implement legal hold functionality — freeze data deletion and modification when a Board
      inquiry is initiated.
    tools:
      - audit-logging
      - worm-storage
      - evidence-management
      - legal-hold
      - compliance-dashboard
      - document-management

  devsecops:
    prose: >-
      1. CI/CD pipelines must produce audit-ready artifacts — security scan results, compliance
      check results, and deployment records.
      2. All pipeline artifacts must be stored in tamper-evident, versioned repositories with
      retention periods exceeding potential inquiry timelines.
      3. Automated compliance reports must be generated at each deployment capturing the
      security posture at that point in time.
    tools:
      - gitlab-ci
      - artifact-management
      - compliance-as-code
      - audit-trail

  secops:
    prose: >-
      1. Maintain inquiry readiness — pre-built evidence packages for common inquiry scenarios
      (breach investigation, consent compliance, rights exercise disputes).
      2. Implement legal hold procedures — when an inquiry is initiated, freeze all relevant
      data, logs, and communications.
      3. Conduct periodic inquiry simulation exercises to test response time and evidence
      completeness.
      4. Monitor Board orders against other organizations for compliance precedents that may
      affect the organization.
      5. Maintain external legal counsel relationships for Board inquiry support.
    tools:
      - siem
      - grc-platform
      - legal-hold-management
      - evidence-management
      - incident-response

