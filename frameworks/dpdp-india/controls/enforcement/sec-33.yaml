id: sec-33
family: enforcement
title: "Penalties"
class: DPDP-INDIA
baselines: [privacy-baseline]

statement:
  prose: >-
    (1) If the Board, after inquiry under section 27, is satisfied that a person has breached any
    provision of this Act or the rules made thereunder, it may, after giving such person an
    opportunity of being heard, impose such penalty as specified in the Schedule. (2) While
    determining the amount of penalty under sub-section (1), the Board shall have due regard to—
    (a) the nature, gravity, and duration of the breach; (b) the type of personal data affected
    by the breach; (c) repetitive nature of the breach; (d) whether the person, as a result of the
    breach, has realised a gain or avoided any loss; (e) whether the person took any action to
    mitigate the effects and consequences of the breach; (f) whether the penalty to be imposed is
    proportionate and effective; and (g) the likely impact of the imposition of the penalty on the
    person. Schedule of penalties: (a) Failure to take reasonable security safeguards to prevent
    personal data breach — up to two hundred and fifty crore rupees (INR 250 crore). (b) Failure
    to notify the Board and affected Data Principals of a personal data breach — up to two hundred
    crore rupees (INR 200 crore). (c) Non-fulfilment of additional obligations in relation to
    children — up to two hundred crore rupees (INR 200 crore). (d) Non-fulfilment of additional
    obligations of Significant Data Fiduciary — up to one hundred and fifty crore rupees (INR 150
    crore). (e) Breach of any other provision of this Act or the rules made thereunder — up to
    fifty crore rupees (INR 50 crore). (f) Breach of duties of Data Principal under section 12 —
    up to ten thousand rupees (INR 10,000).

guidance:
  prose: >-
    Section 33 establishes the penalty framework, with maximum penalties reaching INR 250 crore
    (approximately USD 30 million) — significant but lower than GDPR's 4% of global annual
    turnover. The penalty schedule is graduated based on violation type: (a) Security breach —
    highest penalty (INR 250 crore), reflecting the Act's priority on data security. (b) Breach
    notification failure — INR 200 crore, incentivizing prompt notification. (c) Children's data
    violations — INR 200 crore, reflecting heightened protection for children. (d) SDF violations
    — INR 150 crore. (e) Other violations — INR 50 crore catch-all. (f) Data Principal duties —
    INR 10,000 for frivolous complaints or false information. The Board must consider seven
    mitigating/aggravating factors including nature, gravity, duration, data type, repetition,
    gain/loss, mitigation efforts, proportionality, and impact on the person. Unlike GDPR, there
    is no private right of action for Data Principals — enforcement is solely through the Board.
    Organizations must implement robust compliance programs as a mitigating factor and maintain
    evidence of compliance efforts to reduce potential penalties.

references:
  - citation: "DPDP Act 2023, Section 33 and Schedule"
    url: "https://www.meity.gov.in/writereaddata/files/Digital%20Personal%20Data%20Protection%20Act%202023.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implement comprehensive security safeguards to mitigate the highest-penalty risk (INR 250
      crore): encryption at rest and in transit, access controls, network segmentation, intrusion
      detection, and vulnerability management.
      2. Build automated breach notification pipelines — detect breaches and trigger notifications
      to both the Board and affected Data Principals within prescribed timelines to avoid INR 200
      crore penalties.
      3. Implement children's data protections (age verification, parental consent, no behavioral
      monitoring) to avoid INR 200 crore penalties.
      4. For Significant Data Fiduciaries: ensure DPO appointment, independent audit, and periodic
      DPIA to avoid INR 150 crore penalties.
      5. Build compliance evidence collection that documents mitigating factors: security
      investments, compliance program maturity, breach response speed, and remediation efforts.
      6. Implement penalty risk scoring — assess each processing activity's penalty exposure and
      prioritize compliance investment accordingly.
    tools:
      - hashicorp-vault
      - breach-notification-system
      - age-verification
      - parental-consent
      - grc-platform
      - compliance-dashboard
      - risk-scoring

  devsecops:
    prose: >-
      1. SAST, DAST, dependency scanning, container scanning, and secret detection must be
      running continuously — security gaps directly expose the organization to the highest
      penalty tier.
      2. CI/CD pipelines must block deployments that fail security scans for personal data
      processing services.
      3. Automated compliance testing must generate evidence of "reasonable security safeguards"
      at every deployment.
      4. Infrastructure-as-code scanning must verify encryption, access controls, and network
      security configurations.
    tools:
      - gitlab-ci
      - semgrep
      - sonarqube
      - trivy
      - checkov
      - tfsec
      - gitleaks
      - snyk

  secops:
    prose: >-
      1. Continuous security monitoring with rapid breach detection — minimize breach duration
      as a mitigating factor.
      2. Breach response with documented notification timelines — evidence of prompt notification
      reduces notification failure penalty risk.
      3. Maintain compliance posture evidence — audit reports, security assessments, and
      remediation records as mitigating factors.
      4. Track repeat violations and escalate compliance investment for areas with recurring
      issues (repetitive breaches increase penalties).
      5. Monitor Board penalty decisions against other organizations for benchmarking and
      compliance prioritization.
      6. Conduct annual penalty exposure assessments — quantify maximum penalty exposure per
      violation category and compare against compliance investment.
    tools:
      - siem
      - soar
      - vulnerability-scanner
      - compliance-dashboard
      - grc-platform
      - penalty-risk-assessment

