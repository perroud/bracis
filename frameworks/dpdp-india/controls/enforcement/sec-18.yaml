id: sec-18
family: enforcement
title: "Establishment and constitution of the Data Protection Board of India"
class: DPDP-INDIA
baselines: [privacy-baseline]

statement:
  prose: >-
    (1) The Central Government shall, by notification, establish a Board to be known as the Data
    Protection Board of India to exercise the powers conferred on, and to perform the functions
    assigned to it, under this Act. (2) The Board shall consist of a Chairperson and such number
    of other Members as the Central Government may deem fit to appoint. (3) The Chairperson and
    Members of the Board shall be persons of ability, integrity, and standing, having special
    knowledge of, or professional experience in, the fields of data protection, information
    technology, data management, data science, data security, cyber and internet laws, public
    administration, or related subjects. (4) The Chairperson and other Members of the Board shall
    be appointed by the Central Government. (5) The Board shall be a body corporate by the name
    aforesaid, having perpetual succession and a common seal, with power to acquire, hold, and
    dispose of property, both movable and immovable, and to contract, and shall, by the said name,
    sue and be sued. (6) The Board shall function as a digital office and exercise its functions
    through digital means.

guidance:
  prose: >-
    Section 18 establishes the Data Protection Board of India (DPBI), the enforcement authority
    under the DPDP Act. Key characteristics: (a) Digital-first — the Board functions as a "digital
    office" exercising its functions through digital means, reflecting India's digital governance
    approach. (b) Government-appointed — both the Chairperson and Members are appointed by the
    Central Government, raising questions about independence compared to GDPR's requirement for
    independent supervisory authorities. (c) Expert-led — members must have expertise in data
    protection, IT, data science, cyber law, or public administration. (d) Corporate body —
    with perpetual succession, the ability to hold property, and the capacity to sue and be sued.
    Organizations should prepare for digital-first regulatory interactions — complaints, inquiries,
    hearings, and orders are expected to be conducted electronically. The Board's powers include
    conducting inquiries, imposing penalties, and issuing directions.

references:
  - citation: "DPDP Act 2023, Section 18"
    url: "https://www.meity.gov.in/writereaddata/files/Digital%20Personal%20Data%20Protection%20Act%202023.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Build digital compliance interfaces for Board interactions — electronic filing of
      responses, evidence submission, and hearing participation.
      2. Implement automated compliance evidence generation — produce audit-ready reports on
      demand for Board inquiries.
      3. Build Board notification monitoring — track Board orders, directives, and precedent
      decisions that affect compliance requirements.
      4. Create Board response workflows — automated assignment, tracking, and deadline
      management for Board communications.
      5. Implement compliance metrics dashboards that can be shared with the Board during
      inquiries or audits.
    tools:
      - compliance-dashboard
      - grc-platform
      - digital-filing-system
      - audit-evidence-collector
      - document-management

  devsecops:
    prose: >-
      1. Build automated compliance report generation pipelines that produce Board-ready
      evidence packages from CI/CD artifacts.
      2. Maintain audit trails of all security and privacy controls in a format suitable for
      Board submission.
      3. Implement compliance-as-code that generates real-time compliance posture reports.
    tools:
      - gitlab-ci
      - compliance-as-code
      - audit-evidence-collector
      - report-generation

  secops:
    prose: >-
      1. Maintain Board-ready incident reports — breach notifications, investigation findings,
      and remediation evidence.
      2. Monitor Board decisions and orders for precedents that affect the organization's
      compliance posture.
      3. Conduct tabletop exercises simulating Board inquiries to test response readiness.
      4. Maintain a Board response team with clear escalation procedures and communication
      protocols.
    tools:
      - siem
      - grc-platform
      - incident-response
      - board-response-playbooks
      - compliance-dashboard

