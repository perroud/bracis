control_families:
  - id: gen
    title: "General Provisions"
    description: "Definitions, scope, applicability, and territorial extent of the Act"
    sections: "Sections 2–4"
    control_count: 3
  - id: obligations
    title: "Obligations of Data Fiduciaries"
    description: "Consent, lawful processing, purpose limitation, data minimization, accuracy, retention, security, and significant data fiduciary obligations"
    sections: "Sections 5–9"
    control_count: 5
  - id: rights
    title: "Rights of Data Principals"
    description: "Right of access, correction, erasure, grievance redressal, nomination, and duties of data principals"
    sections: "Sections 11–14"
    control_count: 4
  - id: children
    title: "Processing of Children's Data"
    description: "Verifiable parental consent, restrictions on behavioral monitoring and targeted advertising for children"
    sections: "Section 10"
    control_count: 1
  - id: xborder
    title: "Transfer of Personal Data Outside India"
    description: "Government-notified restrictions on cross-border data transfers and exemptions"
    sections: "Sections 16–17"
    control_count: 2
  - id: enforcement
    title: "Compliance, Penalties, and Data Protection Board"
    description: "Data Protection Board of India, inquiry powers, penalties, appeals, and voluntary undertaking"
    sections: "Sections 18–33"
    control_count: 3
related_frameworks:
  - framework_id: gdpr
    relationship: equivalent-to
    description: >-
      The DPDP Act shares core concepts with the GDPR including consent-based
      processing, data principal rights, breach notification, and extraterritorial
      application, though with a lighter-touch approach.
    mapping_file: "mappings/dpdp-india_to_gdpr.yaml"
  - framework_id: iso-27701
    relationship: complements
    description: "ISO 27701 provides a privacy information management system framework that supports demonstrating compliance with DPDP Act data fiduciary obligations."
    mapping_file: "mappings/dpdp-india_to_iso-27701.yaml"
  - framework_id: pipl
    relationship: mapped
    description: "China's PIPL and India's DPDP Act are both comprehensive national data protection laws with consent-centric models and cross-border transfer restrictions."
    mapping_file: "mappings/dpdp-india_to_pipl.yaml"
  - framework_id: lgpd
    relationship: mapped
    description: "Brazil's LGPD and India's DPDP Act share similar GDPR-derived structures for lawful processing, individual rights, and enforcement."
    mapping_file: "mappings/dpdp-india_to_lgpd.yaml"
  - framework_id: pdpa-thailand
    relationship: mapped
    description: "Thailand's PDPA and India's DPDP Act both address consent, children's data protections, and cross-border transfer restrictions."
    mapping_file: "mappings/dpdp-india_to_pdpa-thailand.yaml"
