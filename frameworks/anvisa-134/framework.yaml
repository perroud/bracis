control_families:
  - id: cap-1
    title: "Disposicoes Gerais"
    description: "Objeto, escopo e definicoes aplicaveis a sistemas computadorizados utilizados na fabricacao de medicamentos sob Boas Praticas de Fabricacao (BPF)"
    articles: "art. 1 ao art. 3"
    control_count: 3
  - id: cap-2
    title: "Gestao de Riscos de Sistemas Computadorizados"
    description: "Avaliacao de risco, classificacao de sistemas computadorizados e adocao de abordagem baseada em risco para o ciclo de vida do sistema conforme metodologia GAMP 5"
    articles: "art. 4 ao art. 8"
    control_count: 5
  - id: cap-3
    title: "Validacao de Sistemas Computadorizados"
    description: "Plano de validacao, qualificacao de instalacao (IQ), qualificacao de operacao (OQ), qualificacao de performance (PQ), validacao retrospectiva e revalidacao periodica"
    articles: "art. 9 ao art. 16"
    control_count: 8
  - id: cap-4
    title: "Seguranca e Controle de Acesso"
    description: "Autenticacao de usuarios, niveis de acesso, trilhas de auditoria, integridade de dados e protecao contra acesso nao autorizado a sistemas computadorizados GMP"
    articles: "art. 17 ao art. 22"
    control_count: 6
  - id: cap-5
    title: "Gestao de Dados e Integridade"
    description: "Principios ALCOA+, backup e recuperacao de dados, registros eletronicos, assinaturas eletronicas e garantia de integridade de dados ao longo do ciclo de vida"
    articles: "art. 23 ao art. 28"
    control_count: 6
  - id: cap-6
    title: "Gestao de Mudancas e Continuidade"
    description: "Controle de mudancas em sistemas computadorizados, plano de contingencia, descontinuacao de sistemas e qualificacao de fornecedores de servicos e sistemas"
    articles: "art. 29 ao art. 33"
    control_count: 5
  - id: cap-7
    title: "Documentacao e Auditoria"
    description: "Requisitos de documentacao do ciclo de vida de sistemas computadorizados, auditorias periodicas e autoinspecao para verificacao de conformidade com BPF"
    articles: "art. 34 ao art. 36"
    control_count: 3
related_frameworks:
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD complementa a IN ANVISA 134 ao disciplinar o tratamento de dados pessoais
      de pacientes e participantes de ensaios clinicos processados por sistemas
      computadorizados farmaceuticos, impondo requisitos adicionais de protecao de
      privacidade e consentimento.
  - framework_id: hipaa
    relationship: mapped
    description: >-
      A HIPAA possui correspondencia com a IN ANVISA 134 nos temas de protecao de
      registros eletronicos de saude, controle de acesso, trilhas de auditoria e
      integridade de dados, sendo referencia para sistemas computadorizados que
      processam informacoes de saude.
  - framework_id: iec-62443
    relationship: mapped
    description: >-
      A IEC 62443 mapeia para a IN ANVISA 134 nos requisitos de seguranca de sistemas
      de automacao industrial farmaceutica, incluindo segmentacao de redes, controle de
      acesso, gestao de patches e monitoramento de sistemas SCADA/DCS utilizados na
      fabricacao.
  - framework_id: iso-27001-2022
    relationship: mapped
    description: >-
      Os controles da ISO 27001:2022 possuem correspondencia com a IN ANVISA 134 nos
      temas de gestao de ativos de informacao, controle de acesso, criptografia,
      seguranca operacional, gestao de mudancas e continuidade de negocios aplicados a
      sistemas computadorizados GMP.
