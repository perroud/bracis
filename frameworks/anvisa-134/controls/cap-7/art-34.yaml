id: art-34
family: cap-7
title: "Documentacao do Ciclo de Vida de Sistemas"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 34. O fabricante deve manter documentação completa e atualizada
    do ciclo de vida de cada sistema computadorizado GMP, desde a concepção
    até a descontinuação do sistema.

    Parágrafo 1. A documentação do ciclo de vida deve incluir, no mínimo:
    I - especificação de requisitos de usuário (URS);
    II - especificação funcional e de design;
    III - avaliações de risco e suas revisões;
    IV - protocolos e relatórios de qualificação (IQ, OQ, PQ);
    V - matriz de rastreabilidade;
    VI - procedimentos operacionais padrão (SOPs);
    VII - histórico de mudanças e suas avaliações de impacto;
    VIII - registros de incidentes e ações corretivas;
    IX - relatórios de revisão periódica;
    X - documentação de treinamento de usuários.

    Parágrafo 2. A documentação deve ser controlada pelo sistema de
    gestão de documentos da organização e estar disponível para revisão
    por inspetores da ANVISA a qualquer momento.

    Parágrafo 3. Toda documentação deve ser aprovada por pessoal
    autorizado antes de sua emissão e revisada conforme periodicidade
    definida no sistema de gestão da qualidade.
guidance:
  prose: |
    O art. 34 estabelece os requisitos de documentacao do ciclo de vida
    de sistemas computadorizados, que e um dos pontos mais frequentemente
    inspecionados pela ANVISA.

    **Modelo V de documentacao CSV:**
    O modelo V (V-model) e a referencia classica para documentacao de
    validacao de sistemas computadorizados:

    Lado esquerdo (especificacao):
    URS -> FS -> DS -> Codificacao/Configuracao

    Lado direito (qualificacao):
    Codificacao -> IQ -> OQ -> PQ

    Cada nivel do lado esquerdo deve ser rastreavel ao nivel
    correspondente do lado direito via matriz de rastreabilidade.

    **Documentacao como evidencia regulatoria:**
    A documentacao de validacao e a principal evidencia de conformidade
    durante inspecoes da ANVISA. Documentacao incompleta, desatualizada
    ou inacessivel pode resultar em nao-conformidades criticas.

    **Boas praticas de documentacao:**
    - Documentos devem ser claros, concisos e completos
    - Usar templates padronizados para consistencia
    - Manter controle de versao com historico de revisoes
    - Aprovacao formal antes de emissao
    - Revisao periodica conforme procedimento
    - Armazenamento seguro e acessivel
    - Treinamento documentado antes de uso de procedimentos

    **Documentacao minima por fase:**
    - Concepcao: URS, avaliacao de risco, PMV
    - Projeto: FS, DS, avaliacao de risco funcional
    - Construcao: registros de desenvolvimento/configuracao
    - Teste: protocolos e relatorios de IQ/OQ/PQ
    - Operacao: SOPs, registros de mudancas, revisoes periodicas
    - Descontinuacao: plano e relatorio de descontinuacao
implementation_guidance:
  platform_engineering:
    prose: |
      **Documentacao como codigo e artefatos versionados:**
      1. Manter documentacao tecnica de sistemas computadorizados como
         artefatos versionados em repositorios Git: configuracoes, SOPs
         tecnicos, runbooks, diagramas de arquitetura.
      2. Gerar documentacao de validacao automaticamente a partir de
         artefatos de pipeline: resultados de IQ (testes de infraestrutura),
         OQ (testes funcionais), PQ (metricas de producao).
      3. Implementar site de documentacao (docs-as-code) que consolide
         informacao tecnica de cada sistema GMP em portal acessivel.
      4. Configurar integracao entre repositorio de codigo e sistema
         de gestao de documentos para manter rastreabilidade.
    tools:
      - git
      - docs-as-code
      - document-generation
      - mkdocs
  devsecops:
    prose: |
      **Rastreabilidade de documentacao no pipeline:**
      1. Configurar pipeline que verifique existencia de documentacao
         obrigatoria para cada sistema GMP antes de deploy: URS, FS,
         avaliacao de risco, protocolos de qualificacao.
      2. Gerar matriz de rastreabilidade automaticamente vinculando
         requisitos (issues) a testes (pipeline) a resultados (artefatos).
      3. Automatizar geracao de relatorios de qualificacao a partir de
         resultados de testes de pipeline com evidencias completas.
      4. Implementar gate que impeca deploy se documentacao obrigatoria
         nao estiver aprovada no sistema de gestao de documentos.
    tools:
      - gitlab-ci
      - traceability-matrix
      - report-generation
      - document-compliance-gate
  secops:
    prose: |
      **Programa de gestao de documentacao CSV:**
      1. Manter indice de documentacao de ciclo de vida para cada
         sistema computadorizado GMP com status de cada documento.
      2. Garantir que toda documentacao siga processo de controle de
         documentos: elaboracao, revisao, aprovacao, distribuicao,
         revisao periodica, obsolescencia.
      3. Conduzir auditorias periodicas de completude e adequacao
         da documentacao de sistemas computadorizados.
      4. Garantir acessibilidade da documentacao durante inspecoes
         da ANVISA: documentacao deve poder ser recuperada em tempo
         razoavel (maximo 24 horas) quando solicitada.
      5. Capacitar equipes na elaboracao e manutencao de documentacao
         de validacao conforme templates padronizados.
    tools:
      - document-management-system
      - quality-management-system
      - audit-management
      - training-management
