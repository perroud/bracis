id: art-35
family: cap-7
title: "Auditoria de Sistemas Computadorizados"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 35. O fabricante deve incluir sistemas computadorizados GMP no
    programa de auditoria interna da organização, verificando periodicamente
    a conformidade com os requisitos desta Instrução Normativa e com as
    Boas Práticas de Fabricação.

    Parágrafo 1. A auditoria de sistemas computadorizados deve avaliar:
    I - conformidade com o plano mestre de validação;
    II - adequação dos controles de acesso e segurança;
    III - integridade de dados e trilhas de auditoria;
    IV - conformidade do processo de gestão de mudanças;
    V - adequação de backups e planos de contingência;
    VI - status de qualificação de fornecedores;
    VII - treinamento de usuários e equipe de suporte;
    VIII - conformidade de registros eletrônicos e assinaturas;
    IX - eficácia de ações corretivas e preventivas anteriores.

    Parágrafo 2. Auditorias devem ser conduzidas por pessoal qualificado
    e independente das áreas auditadas.

    Parágrafo 3. Resultados de auditoria devem ser documentados em
    relatório formal com achados, classificação de não-conformidades
    e plano de ações corretivas com prazos definidos.
guidance:
  prose: |
    O art. 35 integra sistemas computadorizados ao programa de auditoria
    interna exigido pela BPF, garantindo verificacao independente de
    conformidade.

    **Frequencia de auditoria recomendada:**
    - Sistemas criticos de alto risco: anual
    - Sistemas de medio risco: bienal
    - Sistemas de baixo risco: trienal ou por amostragem
    - Fornecedores criticos: bienal

    **Competencia dos auditores:**
    Auditores de sistemas computadorizados devem ter conhecimento em:
    - Boas Praticas de Fabricacao (BPF/GMP)
    - Validacao de sistemas computadorizados (CSV)
    - Integridade de dados (ALCOA+)
    - Seguranca da informacao
    - Tecnologia da informacao (infraestrutura, software, redes)

    **Classificacao de achados:**
    - Critico: risco imediato a qualidade ou seguranca do paciente
    - Maior: nao-conformidade significativa com requisitos GMP
    - Menor: oportunidade de melhoria ou nao-conformidade isolada
    - Observacao: recomendacao para melhoria sem nao-conformidade

    **CAPA de auditoria:**
    - Achados criticos: CAPA em 30 dias
    - Achados maiores: CAPA em 90 dias
    - Achados menores: CAPA em 180 dias
    - Verificacao de eficacia obrigatoria para criticos e maiores

    **Preparacao para inspecoes da ANVISA:**
    O programa de auditoria interna serve como preparacao para inspecoes
    regulatorias. Achados internos devem ser resolvidos proativamente
    antes de inspecoes externas.
implementation_guidance:
  platform_engineering:
    prose: |
      **Facilitacao tecnica de auditorias:**
      1. Implementar dashboards de compliance em tempo real que permitam
         auditores verificar status de conformidade de cada sistema GMP:
         validacao, acessos, backups, mudancas, incidentes.
      2. Configurar geracao automatica de evidencias para auditorias:
         relatorios de configuracao, logs de acesso, resultados de testes,
         metricas de performance, status de vulnerabilidades.
      3. Manter ambiente de auditoria (read-only) que permita auditores
         verificar configuracoes e dados sem impactar producao.
      4. Implementar checklists de auditoria como codigo que automatizem
         verificacoes tecnicas de conformidade.
    tools:
      - compliance-dashboard
      - evidence-generation
      - audit-environment
      - automated-checklists
  devsecops:
    prose: |
      **Pipeline de auditoria automatizada:**
      1. Implementar pipeline de compliance scheduled que execute
         verificacoes automatizadas de conformidade periodicamente
         e gere relatorio para equipe de auditoria.
      2. Automatizar coleta de evidencias de auditoria a partir de
         artefatos de pipeline: resultados de testes, metricas de
         cobertura, registros de aprovacao, varreduras de seguranca.
      3. Verificar automaticamente status de CAPA de auditorias
         anteriores e alertar sobre prazos vencidos.
      4. Manter historico de auditorias como artefatos versionados
         para analise de tendencias e progresso.
    tools:
      - gitlab-ci
      - compliance-pipeline
      - evidence-collection
      - capa-tracking
  secops:
    prose: |
      **Programa de auditoria de sistemas computadorizados:**
      1. Incluir sistemas computadorizados GMP no plano anual de
         auditorias internas com frequencia baseada em risco.
      2. Qualificar auditores internos em CSV, integridade de dados
         e seguranca da informacao para auditorias de sistemas.
      3. Utilizar checklists padronizados baseados nos requisitos da
         IN 134 para garantir cobertura completa.
      4. Documentar achados em relatorio formal com classificacao,
         evidencias e plano de CAPA com prazos.
      5. Monitorar implementacao e eficacia de CAPAs de auditoria
         com escalonamento para alta direcao quando necessario.
    tools:
      - audit-management
      - quality-management-system
      - capa-management
      - training-management
