id: art-36
family: cap-7
title: "Autoinspecao e Melhoria Continua"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 36. O fabricante deve incluir a verificação de conformidade de
    sistemas computadorizados no programa de autoinspeção previsto nas
    Boas Práticas de Fabricação, com foco na melhoria contínua dos
    processos de validação, integridade de dados e segurança.

    Parágrafo 1. O programa de autoinspeção de sistemas computadorizados
    deve incluir:
    I - verificação periódica de indicadores de desempenho do programa
    de validação;
    II - análise de tendências de incidentes, desvios e CAPAs relacionados
    a sistemas computadorizados;
    III - avaliação de novas tecnologias e melhores práticas aplicáveis;
    IV - benchmarking com padrões internacionais (GAMP 5, PIC/S, ISPE);
    V - revisão da eficácia geral do programa de sistemas computadorizados.

    Parágrafo 2. Resultados da autoinspeção devem ser reportados à alta
    direção e utilizados como entrada para o planejamento estratégico
    do programa de sistemas computadorizados.

    Parágrafo 3. O fabricante deve demonstrar melhoria contínua nos
    indicadores de conformidade de sistemas computadorizados ao longo
    do tempo.
guidance:
  prose: |
    O art. 36 fecha o ciclo PDCA (Plan-Do-Check-Act) para sistemas
    computadorizados GMP, exigindo melhoria continua demonstravel.

    **Indicadores de desempenho (KPIs) recomendados:**
    - Percentual de sistemas validados vs. total em escopo
    - Percentual de revisoes periodicas em dia
    - Numero de incidentes por categoria e severidade
    - Tempo medio de resolucao de incidentes
    - Numero de desvios de integridade de dados
    - Percentual de CAPAs em dia vs. atrasadas
    - Taxa de sucesso de backups
    - Conformidade com cronograma de mudancas
    - Resultado de auditorias internas e externas
    - Percentual de usuarios treinados

    **Analise de tendencias:**
    - Monitorar KPIs ao longo do tempo para identificar tendencias
    - Comparar indicadores entre periodos para medir melhoria
    - Identificar areas que requerem atencao prioritaria
    - Prever necessidades futuras (recursos, tecnologia, treinamento)

    **Benchmarking internacional:**
    - GAMP 5: referencia para validacao baseada em risco
    - PIC/S PI 011-3: guia de BPF para sistemas computadorizados
    - ISPE GAMP guides: guias praticos por tipo de sistema
    - WHO TRS 996 Annex 5: guia de integridade de dados
    - FDA Data Integrity Guidance: expectativas da FDA

    **Revisao pela alta direcao:**
    Os resultados da autoinspecao devem ser apresentados a alta direcao
    como parte da revisao gerencial do sistema de qualidade, com
    recomendacoes de investimento e priorizacao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Metricas e dashboards de melhoria continua:**
      1. Implementar dashboards de KPIs de sistemas computadorizados GMP
         com visualizacao de tendencias historicas e comparacao entre
         periodos.
      2. Configurar coleta automatizada de metricas de todos os aspectos
         do programa: validacao, incidentes, mudancas, seguranca, backup.
      3. Implementar alertas baseados em tendencias adversas que disparem
         antes que indicadores atinjam niveis criticos.
      4. Gerar relatorios periodicos automatizados de saude do programa
         de sistemas computadorizados para revisao gerencial.
      5. Avaliar e implementar novas tecnologias que melhorem eficiencia
         e conformidade do programa (automacao, IA, continuous validation).
    tools:
      - grafana
      - prometheus
      - kpi-dashboards
      - trend-analysis
      - reporting-automation
  devsecops:
    prose: |
      **Melhoria continua do pipeline:**
      1. Monitorar metricas de pipeline (tempo de execucao, taxa de
         sucesso, cobertura de testes) e identificar oportunidades de
         otimizacao e automacao.
      2. Implementar retrospectivas de pipeline periodicas para avaliar
         eficacia dos controles automatizados e propor melhorias.
      3. Avaliar novas ferramentas e praticas de DevSecOps que possam
         melhorar integridade de dados e seguranca de sistemas GMP.
      4. Automatizar geracao de relatorio de maturidade do programa
         de DevSecOps para sistemas GMP com comparacao contra
         benchmarks da industria.
    tools:
      - gitlab-ci
      - pipeline-analytics
      - maturity-assessment
      - benchmarking-tools
  secops:
    prose: |
      **Programa de autoinspecao e melhoria continua:**
      1. Incluir sistemas computadorizados GMP no programa formal de
         autoinspecao com checklist baseado na IN 134.
      2. Coletar e analisar KPIs do programa de sistemas computadorizados
         trimestralmente com comparacao de tendencias.
      3. Apresentar resultados de autoinspecao a alta direcao como
         parte da revisao gerencial do sistema de qualidade.
      4. Definir metas anuais de melhoria para indicadores-chave do
         programa e monitorar progresso.
      5. Participar de foruns e grupos da industria farmaceutica para
         benchmarking e atualizacao em melhores praticas.
    tools:
      - quality-management-system
      - kpi-management
      - management-review
      - industry-benchmarking
