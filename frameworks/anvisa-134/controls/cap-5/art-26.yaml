id: art-26
family: cap-5
title: "Assinatura Eletronica"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 26. Quando assinaturas eletrônicas forem utilizadas como
    equivalentes a assinaturas manuscritas em registros GMP, o fabricante
    deve implementar controles que garantam a autenticidade, integridade
    e não-repúdio de cada assinatura.

    Parágrafo 1. O sistema de assinatura eletrônica deve:
    I - vincular a assinatura ao registro de forma inseparável;
    II - incluir o nome completo do signatário, data e hora da assinatura;
    III - indicar o significado da assinatura (aprovação, revisão, verificação);
    IV - ser única e vinculada a um único indivíduo;
    V - não ser reutilizável ou transferível entre registros;
    VI - requerer autenticação do signatário no momento da assinatura.

    Parágrafo 2. Assinaturas eletrônicas devem ser protegidas contra
    falsificação e os registros assinados devem ser protegidos contra
    alteração pós-assinatura.

    Parágrafo 3. O fabricante deve manter documentação que estabeleça
    a equivalência legal entre assinatura eletrônica e manuscrita dentro
    da organização.
guidance:
  prose: |
    O art. 26 regulamenta assinaturas eletronicas em contexto GMP,
    alinhando-se com 21 CFR Part 11 (FDA) e EU GMP Annex 11.

    **Tipos de assinatura eletronica em GMP:**
    1. Assinatura baseada em biometria: impressao digital, retina
    2. Assinatura baseada em credenciais: usuario + senha (+ MFA)
    3. Assinatura digital com certificado: PKI, ICP-Brasil
    4. Assinatura avancada: combinacao de metodos

    **Significados tipicos de assinatura:**
    - Autoria: identifica quem criou o registro
    - Revisao: confirma que o registro foi revisado
    - Aprovacao: autoriza o conteudo do registro
    - Verificacao: confirma que dados foram verificados
    - Liberacao: autoriza liberacao de lote ou processo

    **Requisitos de seguranca:**
    - Autenticacao obrigatoria no momento da assinatura
    - Para operacoes criticas: reautenticacao mesmo com sessao ativa
    - Vinculacao criptografica entre assinatura e registro
    - Protecao contra replay attacks (reutilizacao de assinatura)
    - Deteccao de alteracao pos-assinatura (integridade)

    **Politica de assinatura eletronica:**
    Documento formal que estabelece equivalencia entre assinatura
    eletronica e manuscrita na organizacao, com definicao de tipos,
    significados, responsabilidades e controles implementados.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de assinatura eletronica:**
      1. Implementar sistema de assinatura eletronica com vinculacao
         criptografica entre assinatura e registro (hash do registro
         incluido na assinatura).
      2. Configurar reautenticacao obrigatoria no momento da assinatura,
         mesmo com sessao ativa, para operacoes criticas GMP.
      3. Implementar verificacao de integridade pos-assinatura que
         detecte qualquer alteracao no registro assinado.
      4. Integrar com infraestrutura PKI (ICP-Brasil ou interna) para
         assinaturas digitais com certificado quando exigido.
      5. Manter log imutavel de todas as assinaturas eletronicas com
         metadados completos (signatario, timestamp, significado, hash).
    tools:
      - electronic-signature-system
      - pki-infrastructure
      - hash-verification
      - authentication-service
  devsecops:
    prose: |
      **Validacao de assinatura eletronica no pipeline:**
      1. Testar vinculacao entre assinatura e registro: verificar que
         alteracao no registro invalida a assinatura.
      2. Testar reautenticacao no momento da assinatura: verificar que
         credenciais sao exigidas mesmo com sessao ativa.
      3. Verificar que todos os campos obrigatorios da assinatura sao
         registrados (nome, data/hora, significado).
      4. Testar protecao contra replay: verificar que assinatura nao
         pode ser reutilizada em outro registro.
      5. Testar deteccao de adulteracao pos-assinatura.
    tools:
      - gitlab-ci
      - signature-testing
      - integrity-testing
      - security-testing
  secops:
    prose: |
      **Programa de governanca de assinatura eletronica:**
      1. Elaborar e aprovar politica de assinatura eletronica que
         estabeleca equivalencia com assinatura manuscrita.
      2. Definir quais operacoes GMP requerem assinatura eletronica
         e qual tipo de assinatura e adequado para cada operacao.
      3. Treinar todos os signatarios em responsabilidades e
         procedimentos de assinatura eletronica.
      4. Auditar periodicamente uso de assinaturas eletronicas para
         conformidade com politica e requisitos regulatorios.
      5. Manter registro de todos os signatarios autorizados e seus
         certificados/credenciais atualizados.
    tools:
      - quality-management-system
      - training-management
      - certificate-management
      - audit-management
