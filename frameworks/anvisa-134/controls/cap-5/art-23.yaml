id: art-23
family: cap-5
title: "Principios de Integridade de Dados (ALCOA+)"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 23. Todos os dados gerados, processados e armazenados por sistemas
    computadorizados GMP devem atender aos princípios de integridade de dados
    ALCOA+: Atribuível, Legível, Contemporâneo, Original, Preciso, Completo,
    Consistente, Durável e Disponível.

    Parágrafo 1. O fabricante deve implementar controles técnicos e
    procedurais que garantam o cumprimento de cada princípio ALCOA+ em
    todos os sistemas computadorizados em escopo.

    Parágrafo 2. A conformidade com os princípios ALCOA+ deve ser verificada
    como parte do processo de validação do sistema e monitorada continuamente
    durante a operação.
guidance:
  prose: |
    O art. 23 e o pilar central da integridade de dados da IN 134, refletindo
    as expectativas da ANVISA alinhadas com as diretrizes da WHO, PIC/S e
    MHRA sobre integridade de dados.

    **Detalhamento dos principios ALCOA+:**

    Attributable (Atribuivel):
    - Quem criou, modificou ou excluiu o dado esta identificado
    - Quando a acao foi realizada esta registrado
    - Por que a acao foi realizada esta justificado (quando aplicavel)
    - Implementacao: identificacao unica de usuario, trilha de auditoria

    Legible (Legivel):
    - Dados sao legiveis e permanentes durante todo o periodo de retencao
    - Registros originais e copias sao mantidos legiveis
    - Implementacao: formatos padrao, migracao planejada, verificacao

    Contemporaneous (Contemporaneo):
    - Dados sao registrados no momento em que a atividade ocorre
    - Pre-datacao e pos-datacao nao sao aceitaveis
    - Implementacao: timestamp automatico, sincronizacao NTP

    Original (Original):
    - Registro primario ou copia certificada e exata
    - "True copy" deve ser verificavel contra original
    - Implementacao: versionamento, copias certificadas, checksums

    Accurate (Preciso):
    - Dados sao livres de erros, edicoes ou alteracoes nao documentadas
    - Implementacao: validacao de entrada, calibracao, verificacao

    Complete (Completo):
    - Todos os dados sao registrados, incluindo repeticoes e resultados OOS
    - Nenhum dado e excluido sem justificativa documentada
    - Implementacao: audit trail, protecao contra exclusao

    Consistent (Consistente):
    - Sequencia cronologica de eventos e verificavel
    - Dados sao consistentes entre sistemas relacionados
    - Implementacao: timestamps sincronizados, reconciliacao

    Enduring (Duravel):
    - Registros sao preservados durante todo o periodo de retencao
    - Midias de armazenamento sao mantidas e verificadas
    - Implementacao: backup, migracao de midia, verificacao de integridade

    Available (Disponivel):
    - Dados podem ser acessados e revisados durante todo o periodo de retencao
    - Formatos permanecem legiveis ao longo do tempo
    - Implementacao: formato aberto, migracao de sistema, acesso regulatorio
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura para integridade de dados ALCOA+:**
      1. Implementar armazenamento imutavel (WORM/append-only) para dados
         GMP criticos que impeca modificacao ou exclusao nao autorizada.
      2. Configurar sincronizacao NTP centralizada com monitoramento de
         drift para garantir timestamps contemporaneos e consistentes.
      3. Implementar checksums automaticos (SHA-256) para verificacao
         de integridade de dados armazenados, com verificacao periodica.
      4. Configurar politicas de retencao automaticas que garantam
         durabilidade e disponibilidade dos dados pelo periodo regulatorio.
      5. Implementar monitoramento de integridade de storage com alertas
         para degradacao de midia ou deteccao de adulteracao.
    tools:
      - worm-storage
      - ntp-management
      - checksum-verification
      - retention-management
      - storage-integrity
  devsecops:
    prose: |
      **Validacao de ALCOA+ no pipeline:**
      1. Implementar suite de testes automatizados que verifiquem cada
         principio ALCOA+ em sistemas GMP: atribuibilidade (usuario
         registrado), contemporaneidade (timestamp preciso), completude
         (sem dados faltantes), etc.
      2. Verificar automaticamente que funcionalidades de exclusao de
         dados sao controladas e registradas em audit trail.
      3. Testar que timestamps de registros sao gerados pelo sistema
         (nao pelo usuario) e sincronizados via NTP.
      4. Validar que copias e transferencias de dados mantem integridade
         via checksums automaticos.
    tools:
      - gitlab-ci
      - alcoa-testing-framework
      - timestamp-verification
      - data-integrity-testing
  secops:
    prose: |
      **Programa de integridade de dados:**
      1. Estabelecer politica de integridade de dados farmaceutica que
         defina requisitos ALCOA+ para cada tipo de sistema e dado.
      2. Conduzir avaliacoes periodicas de integridade de dados em
         sistemas GMP criticos (minimo anual) com checklist ALCOA+.
      3. Monitorar indicadores de integridade de dados: taxa de correcoes,
         registros incompletos, violacoes de audit trail.
      4. Investigar e documentar todas as violacoes de integridade de
         dados como desvios de qualidade com CAPA.
      5. Capacitar todos os usuarios de sistemas GMP em principios
         ALCOA+ e responsabilidades sobre integridade de dados.
    tools:
      - grc-platform
      - data-integrity-assessment
      - quality-management-system
      - training-management
