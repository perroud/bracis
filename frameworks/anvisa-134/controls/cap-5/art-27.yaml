id: art-27
family: cap-5
title: "Retencao e Arquivamento de Dados"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 27. O fabricante deve implementar política de retenção e
    arquivamento de dados que garanta a preservação, integridade e
    acessibilidade de todos os registros eletrônicos GMP pelo período
    regulatório exigido.

    Parágrafo 1. A política de retenção deve contemplar:
    I - períodos de retenção definidos por tipo de registro e legislação;
    II - procedimento de arquivamento e migração de dados;
    III - verificação periódica de integridade e legibilidade de dados
    arquivados;
    IV - procedimento de descarte seguro após vencimento do período de
    retenção;
    V - plano de contingência para obsolescência de tecnologia e formato.

    Parágrafo 2. Dados arquivados devem permanecer acessíveis e legíveis
    durante todo o período de retenção, e o fabricante deve planejar
    migrações de formato e tecnologia com antecedência.

    Parágrafo 3. O descarte de registros GMP deve ser documentado e
    aprovado pela unidade da qualidade.
guidance:
  prose: |
    O art. 27 aborda o desafio de preservacao de dados digitais a
    longo prazo, considerando obsolescencia tecnologica.

    **Periodos de retencao tipicos:**
    - Batch records: validade do produto + 1 ano (minimo)
    - Registros de estabilidade: durante comercializacao + 5 anos
    - Documentacao de validacao: vida util do sistema + 2 anos
    - Registros de treinamento: durante emprego + 3 anos
    - Registros de reclamacoes: 10 anos apos registro
    - Trilhas de auditoria: mesmo periodo do registro associado

    **Riscos de obsolescencia tecnologica:**
    - Formatos proprietarios que nao podem ser abertos no futuro
    - Midias de armazenamento que se degradam (fitas, discos oticos)
    - Software descontinuado que nao executa em plataformas atuais
    - Bancos de dados legados sem suporte de fabricante

    **Estrategias de mitigacao:**
    - Converter registros para formatos abertos padronizados (PDF/A, XML)
    - Implementar migracao proativa de midias antes da degradacao
    - Manter capacidade de leitura de formatos legados (emuladores)
    - Planejar migracoes com 2+ anos de antecedencia
    - Verificar periodicamente legibilidade de dados arquivados

    **Descarte seguro:**
    - Aprovacao formal da QA antes do descarte
    - Verificacao de que periodo de retencao expirou
    - Destruicao completa e irrecuperavel de dados descartados
    - Registro documentado do descarte com evidencias
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de retencao e arquivamento:**
      1. Implementar tiers de armazenamento com politicas de lifecycle
         automatizadas: hot (online), warm (nearline), cold (archive).
      2. Configurar migracoes automaticas entre tiers baseadas em
         politicas de retencao por tipo de dado e criticidade.
      3. Implementar verificacao periodica automatizada de integridade
         e legibilidade de dados em cada tier de armazenamento.
      4. Configurar conversao automatica para formatos de longo prazo
         (PDF/A, XML) durante arquivamento.
      5. Monitorar capacidade de armazenamento e planejar expansoes
         com antecedencia para garantir disponibilidade continua.
    tools:
      - storage-lifecycle
      - archive-management
      - integrity-verification
      - format-conversion
      - capacity-planning
  devsecops:
    prose: |
      **Automacao de retencao no pipeline:**
      1. Implementar politicas de retencao como codigo que definam
         periodos por tipo de dado e apliquem automaticamente regras
         de lifecycle.
      2. Configurar pipeline scheduled que verifique integridade e
         legibilidade de dados arquivados periodicamente.
      3. Testar procedimento de recuperacao de dados arquivados como
         parte da validacao de sistemas de armazenamento.
      4. Automatizar notificacao quando dados se aproximam do final
         do periodo de retencao para revisao de descarte.
    tools:
      - gitlab-ci
      - retention-as-code
      - archive-testing
      - notification-automation
  secops:
    prose: |
      **Programa de gestao de retencao:**
      1. Elaborar e manter politica de retencao com periodos definidos
         para cada tipo de registro GMP, aprovada pela QA e juridico.
      2. Manter inventario de dados arquivados com localizacao, formato,
         periodo de retencao e proxima verificacao de integridade.
      3. Conduzir verificacao anual de legibilidade e integridade de
         amostra representativa de dados arquivados.
      4. Planejar migracoes de formato e tecnologia com antecedencia
         minima de 2 anos antes da obsolescencia prevista.
      5. Documentar e obter aprovacao de QA para todo descarte de
         registros GMP com evidencias de destruicao segura.
    tools:
      - records-management
      - archive-inventory
      - quality-management-system
      - disposal-management
