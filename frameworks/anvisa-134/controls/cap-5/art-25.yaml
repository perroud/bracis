id: art-25
family: cap-5
title: "Registros Eletronicos"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 25. Registros eletrônicos gerados por sistemas computadorizados
    GMP devem ser tratados como equivalentes a registros em papel, desde
    que atendam aos requisitos de integridade, rastreabilidade e retenção
    definidos nesta Instrução Normativa.

    Parágrafo 1. Registros eletrônicos devem ser:
    I - protegidos contra alteração, exclusão ou adulteração não autorizada;
    II - associados a trilha de auditoria que registre toda a história
    do registro desde sua criação;
    III - mantidos em formato acessível e legível durante todo o período
    de retenção regulatório;
    IV - associados a metadados que identifiquem origem, data de criação,
    criador e contexto de geração;
    V - passíveis de reprodução exata em formato impresso quando necessário.

    Parágrafo 2. O período de retenção de registros eletrônicos GMP deve
    ser, no mínimo, o período de validade do medicamento acrescido de um
    ano, ou conforme legislação sanitária específica aplicável.
guidance:
  prose: |
    O art. 25 estabelece equivalencia formal entre registros eletronicos
    e em papel, fundamental para a transicao para ambientes paperless
    na industria farmaceutica.

    **Equivalencia eletronico-papel:**
    Para que registros eletronicos substituam papel, todos os requisitos
    de integridade, autenticidade e rastreabilidade devem ser atendidos.
    A simples digitalizacao de processos em papel nao garante equivalencia.

    **Tipos de registros eletronicos GMP:**
    - Registros de producao de lote (batch records)
    - Resultados analiticos de controle de qualidade
    - Registros de calibracao e manutencao
    - Registros de treinamento
    - Registros de desvios, CAPAs e reclamacoes
    - Registros de estabilidade
    - Certificados de analise
    - Documentacao de validacao

    **Periodo de retencao:**
    - Medicamentos: validade + 1 ano (minimo)
    - Documentacao de lote: 5 anos apos liberacao do ultimo lote
    - Documentacao de validacao: durante ciclo de vida do sistema + 2 anos
    - Registros de treinamento: durante emprego + 3 anos
    - Verificar legislacao especifica para biologicos e hemoderivados

    **Formato de longo prazo:**
    Considerar formatos abertos e padronizados (PDF/A, XML) para garantir
    legibilidade ao longo do periodo de retencao, independentemente da
    continuidade do software original.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de registros eletronicos:**
      1. Implementar sistema de gestao de registros eletronicos com
         controle de versao, trilha de auditoria e retencao automatizada.
      2. Configurar armazenamento com protecao contra exclusao para
         registros GMP (WORM, imutabilidade, soft-delete com recuperacao).
      3. Implementar conversao automatica de registros para formato
         de longo prazo (PDF/A) para garantir legibilidade futura.
      4. Configurar politicas de retencao automatizadas que calculem
         periodo de retencao baseado no tipo de registro e validade
         do produto associado.
      5. Manter capacidade de reproducao exata de registros eletronicos
         em formato impresso com metadados regulatorios.
    tools:
      - document-management
      - worm-storage
      - pdf-a-converter
      - retention-automation
      - print-service
  devsecops:
    prose: |
      **Validacao de registros eletronicos no pipeline:**
      1. Testar que registros eletronicos atendem requisitos de protecao
         contra alteracao: tentativa de modificar registro deve ser
         rejeitada ou registrada em audit trail.
      2. Verificar que todos os registros possuem metadados obrigatorios:
         criador, data de criacao, sistema de origem, contexto.
      3. Testar funcionalidade de reproducao em formato impresso com
         verificacao de fidelidade contra registro eletronico.
      4. Validar mecanismos de retencao e arquivamento de registros
         conforme politicas definidas.
    tools:
      - gitlab-ci
      - record-integrity-testing
      - metadata-validation
      - retention-testing
  secops:
    prose: |
      **Programa de gestao de registros eletronicos:**
      1. Estabelecer politica de registros eletronicos que defina
         requisitos, periodos de retencao e responsabilidades.
      2. Manter inventario de todos os tipos de registros eletronicos
         GMP com classificacao e periodo de retencao.
      3. Conduzir verificacao periodica de legibilidade e acessibilidade
         de registros eletronicos arquivados.
      4. Planejar migracoes de formato e sistema com antecedencia
         para evitar perda de acessibilidade de registros.
      5. Garantir que registros eletronicos estejam disponiveis para
         inspecoes da ANVISA em formato acessivel e legivel.
    tools:
      - quality-management-system
      - records-management
      - archive-verification
      - regulatory-access
