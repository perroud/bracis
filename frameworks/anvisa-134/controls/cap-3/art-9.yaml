id: art-9
family: cap-3
title: "Plano Mestre de Validacao"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 9. O fabricante deve elaborar e manter um Plano Mestre de Validação
    (PMV) que abranja todos os sistemas computadorizados utilizados em
    atividades reguladas.

    Parágrafo 1. O Plano Mestre de Validação deve conter, no mínimo:
    I - política de validação de sistemas computadorizados;
    II - inventário de todos os sistemas computadorizados em escopo;
    III - classificação e avaliação de risco de cada sistema;
    IV - estratégia de validação para cada categoria de sistema;
    V - cronograma de atividades de validação;
    VI - critérios de aceitação para cada fase de qualificação;
    VII - funções e responsabilidades;
    VIII - requisitos de documentação e treinamento.

    Parágrafo 2. O PMV deve ser aprovado pela unidade da qualidade e
    revisado anualmente ou quando houver mudanças significativas no
    escopo ou estratégia de validação.
guidance:
  prose: |
    O art. 9 exige um documento estrategico que governe todas as atividades
    de validacao de sistemas computadorizados na organizacao.

    **Estrutura recomendada do PMV:**
    1. Escopo e objetivos do programa de validacao
    2. Politica de validacao (abordagem baseada em risco)
    3. Organizacao e responsabilidades (organograma CSV)
    4. Inventario de sistemas com classificacao
    5. Estrategia de validacao por categoria GAMP
    6. Modelos de ciclo de vida adotados (V-model, agile, etc.)
    7. Padronizacao de documentacao (templates)
    8. Requisitos de treinamento de equipes
    9. Criterios de aceitacao e desvios
    10. Cronograma e prioridades
    11. Indicadores de desempenho do programa
    12. Referencias normativas

    **Alinhamento com GAMP 5:**
    O PMV deve refletir a abordagem GAMP 5 de validacao baseada em risco,
    definindo claramente como o esforco de validacao sera modulado conforme
    a categoria do software e o risco associado.

    **Revisao e atualizacao:**
    O PMV e um documento vivo que deve refletir o estado atual do programa.
    Revisoes devem ser disparadas por mudancas significativas, alem da
    revisao anual obrigatoria.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plano de validacao como codigo:**
      1. Manter o inventario de sistemas computadorizados como arquivo
         YAML/JSON versionado no repositorio Git, permitindo rastreabilidade
         de mudancas no inventario ao longo do tempo.
      2. Implementar automacao que gere dashboard do status de validacao
         de cada sistema a partir dos metadados do inventario.
      3. Configurar pipelines que verifiquem automaticamente se todos os
         sistemas no inventario possuem validacao em dia conforme cronograma.
      4. Manter templates padronizados de documentacao de validacao como
         artefatos versionados na plataforma.
    tools:
      - git
      - gitlab-ci
      - grafana
      - document-templates
  devsecops:
    prose: |
      **Estrategia de validacao integrada ao pipeline:**
      1. Definir no PMV como pipelines CI/CD se integram ao processo de
         validacao: quais fases de qualificacao sao cobertas pelo pipeline
         e quais exigem atividades manuais complementares.
      2. Configurar templates de pipeline por categoria GAMP que implementem
         automaticamente a estrategia de validacao definida no PMV.
      3. Gerar automaticamente relatorios de status de validacao a partir
         de resultados de pipeline para atualizacao do PMV.
      4. Implementar rastreabilidade entre artefatos de pipeline e
         documentacao formal de validacao.
    tools:
      - gitlab-ci
      - pipeline-templates
      - traceability-matrix
      - documentation-generator
  secops:
    prose: |
      **Governanca do plano mestre de validacao:**
      1. Elaborar PMV conforme template padronizado com todos os elementos
         obrigatorios listados no art. 9.
      2. Obter aprovacao formal da unidade da qualidade com registro de
         assinaturas e data.
      3. Revisar PMV anualmente com equipe multidisciplinar e documentar
         conclusoes e atualizacoes necessarias.
      4. Monitorar indicadores de desempenho do programa de validacao
         (percentual de sistemas validados, desvios, CAPA associadas).
      5. Garantir que o PMV esteja acessivel a todas as partes interessadas
         e que atualizacoes sejam comunicadas formalmente.
    tools:
      - quality-management-system
      - document-management
      - validation-tracking
      - training-management
