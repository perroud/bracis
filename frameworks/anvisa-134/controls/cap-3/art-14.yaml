id: art-14
family: cap-3
title: "Validacao Retrospectiva"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 14. Sistemas computadorizados legados que estejam em uso sem
    validação formal podem ser submetidos a validação retrospectiva,
    desde que haja dados históricos suficientes para demonstrar que o
    sistema opera de forma consistente e confiável.

    Parágrafo 1. A validação retrospectiva deve incluir:
    I - avaliação de risco do sistema legado;
    II - revisão de histórico de incidentes, desvios e falhas;
    III - análise de dados históricos de operação e performance;
    IV - verificação de integridade de dados armazenados;
    V - avaliação de controles de segurança existentes;
    VI - definição de plano de remediação para lacunas identificadas.

    Parágrafo 2. A validação retrospectiva não substitui a necessidade
    de validação prospectiva para sistemas novos ou significativamente
    modificados.

    Parágrafo 3. A ANVISA poderá exigir validação prospectiva completa
    caso a validação retrospectiva seja considerada insuficiente.
guidance:
  prose: |
    O art. 14 oferece caminho regulatorio para sistemas legados que
    nunca foram formalmente validados, reconhecendo a realidade de
    muitas operacoes farmaceuticas.

    **Quando a validacao retrospectiva e aceita:**
    - Sistema em operacao ha mais de 2 anos com historico documentado
    - Dados historicos suficientes para analise estatistica
    - Sem incidentes criticos graves no historico recente
    - Controles basicos de seguranca e integridade de dados existentes

    **Quando a validacao retrospectiva NAO e suficiente:**
    - Sistema com historico de falhas criticas recorrentes
    - Dados historicos insuficientes ou incompletos
    - Ausencia de trilhas de auditoria ou controles de acesso
    - Sistema que processa dados de seguranca do paciente sem controles

    **Processo de validacao retrospectiva:**
    1. Justificativa formal para abordagem retrospectiva
    2. Avaliacao de risco do sistema legado
    3. Coleta e analise de dados historicos (minimo 12 meses)
    4. Revisao de incidentes, desvios e CAPAs relacionados
    5. Verificacao de integridade dos dados existentes
    6. Gap analysis contra requisitos da IN 134
    7. Plano de remediacao para lacunas identificadas
    8. Relatorio de validacao retrospectiva com conclusoes
    9. Aprovacao pela unidade da qualidade
implementation_guidance:
  platform_engineering:
    prose: |
      **Coleta de evidencias de sistemas legados:**
      1. Implementar ferramentas de coleta automatizada de metricas
         historicas de sistemas legados: logs de operacao, metricas
         de performance, registros de disponibilidade.
      2. Configurar verificacao de integridade de dados armazenados
         em sistemas legados usando checksums e validacoes de formato.
      3. Documentar baseline de configuracao atual do sistema legado
         como ponto de partida para controle de mudancas futuro.
      4. Implementar monitoramento prospectivo do sistema legado para
         complementar dados historicos durante validacao retrospectiva.
    tools:
      - log-analysis
      - data-integrity-tools
      - configuration-baseline
      - monitoring
  devsecops:
    prose: |
      **Automacao de validacao retrospectiva:**
      1. Criar pipeline de analise que processe dados historicos do
         sistema legado e gere relatorio de consistencia e integridade.
      2. Implementar testes automatizados de funcionalidades criticas
         do sistema legado como complemento a analise retrospectiva.
      3. Automatizar gap analysis comparando configuracao e controles
         atuais do sistema contra requisitos da IN 134.
      4. Gerar relatorio consolidado de validacao retrospectiva como
         artefato versionado com todas as evidencias.
    tools:
      - gitlab-ci
      - data-analysis
      - gap-analysis-tools
      - evidence-collection
  secops:
    prose: |
      **Programa de validacao de sistemas legados:**
      1. Inventariar todos os sistemas computadorizados GMP que nao
         possuem validacao formal e priorizar por nivel de risco.
      2. Avaliar viabilidade de validacao retrospectiva versus
         necessidade de validacao prospectiva para cada sistema.
      3. Conduzir revisao de historico de incidentes, desvios e
         CAPAs relacionados a cada sistema legado.
      4. Elaborar plano de remediacao para lacunas identificadas
         com cronograma e responsaveis definidos.
      5. Obter aprovacao da unidade da qualidade para abordagem
         retrospectiva e plano de remediacao.
    tools:
      - quality-management-system
      - incident-review
      - capa-management
      - gap-analysis
