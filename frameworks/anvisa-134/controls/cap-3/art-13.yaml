id: art-13
family: cap-3
title: "Qualificacao de Performance (PQ)"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 13. A Qualificação de Performance (PQ) deve verificar e documentar
    que o sistema computadorizado opera de forma consistente e reproduzível
    em condições reais de produção, atendendo aos requisitos de desempenho
    e capacidade definidos na especificação de requisitos.

    Parágrafo 1. A PQ deve ser executada no ambiente de produção com dados
    e volumes representativos das condições reais de operação.

    Parágrafo 2. A PQ deve incluir, no mínimo:
    I - verificação de desempenho sob carga normal de produção;
    II - verificação de desempenho sob picos de carga previstos;
    III - verificação de consistência de resultados ao longo do tempo;
    IV - verificação de integridade de dados em condições de produção;
    V - confirmação de que todos os requisitos de usuário são atendidos.
guidance:
  prose: |
    A PQ e a fase final de qualificacao que confirma o desempenho do
    sistema em ambiente real de producao.

    **Diferecas fundamentais da PQ:**
    - Executada em ambiente de producao (nao em ambiente de teste)
    - Utiliza dados e volumes reais de producao
    - Foca em consistencia e reprodutibilidade ao longo do tempo
    - Confirma que o sistema atende aos requisitos de usuario (URS)

    **Abordagem recomendada:**
    - Periodo de monitoramento intensivo (tipicamente 1-4 semanas)
    - Verificacao de outputs contra especificacoes pre-definidas
    - Coleta de metricas de performance (tempo de resposta, throughput)
    - Verificacao de integridade de dados processados
    - Confirmacao de operacao correta de interfaces em producao
    - Verificacao de funcionamento correto de trilhas de auditoria

    **Criterios de aceite tipicos:**
    - Tempo de resposta dentro de limites definidos na URS
    - Zero perda de dados durante periodo de monitoramento
    - Trilha de auditoria completa e consistente
    - Nenhuma falha critica durante periodo de operacao
    - Resultados consistentes em execucoes repetidas

    **Relacao com go-live:**
    A aprovacao da PQ e pre-requisito para liberacao do sistema para
    uso rotineiro em producao GMP.
implementation_guidance:
  platform_engineering:
    prose: |
      **Monitoramento de performance para PQ:**
      1. Configurar monitoramento detalhado de performance durante periodo
         de PQ: metricas de CPU, memoria, I/O, latencia, throughput,
         taxa de erros, em resolucao temporal alta (minuto a minuto).
      2. Implementar coleta automatizada de metricas de performance com
         thresholds definidos conforme criterios de aceitacao da PQ.
      3. Executar testes de carga representativos de picos previstos de
         producao em ambiente de producao durante janela controlada.
      4. Gerar relatorio automatizado de performance com comparacao
         contra baseline e criterios de aceitacao definidos na URS.
      5. Manter dashboards de performance acessiveis a equipe de validacao
         durante todo o periodo de PQ.
    tools:
      - prometheus
      - grafana
      - load-testing
      - apm
      - performance-baseline
  devsecops:
    prose: |
      **Evidencias de PQ via pipeline:**
      1. Implementar testes de smoke e sanity em producao que verifiquem
         funcionalidades criticas apos cada deploy durante periodo de PQ.
      2. Configurar coleta automatizada de evidencias de PQ: logs de
         transacoes, metricas de performance, resultados de verificacao
         de integridade de dados.
      3. Automatizar comparacao de outputs do sistema contra resultados
         esperados para verificacao de consistencia.
      4. Gerar relatorio consolidado de PQ como artefato versionado com
         todas as evidencias coletadas durante o periodo de monitoramento.
    tools:
      - gitlab-ci
      - smoke-testing
      - data-integrity-check
      - evidence-collection
  secops:
    prose: |
      **Governanca de qualificacao de performance:**
      1. Definir criterios de aceitacao de PQ baseados nos requisitos de
         usuario (URS) e na avaliacao de risco do sistema.
      2. Garantir que PQ seja executada em ambiente de producao com
         supervisao adequada da unidade da qualidade.
      3. Documentar todos os resultados de PQ em relatorio formal com
         analise de tendencias e conclusoes.
      4. Aprovar relatorio de PQ pela unidade da qualidade como
         pre-requisito para liberacao do sistema para uso rotineiro.
      5. Definir plano de monitoramento pos-PQ para garantir manutencao
         do estado validado durante operacao.
    tools:
      - quality-management-system
      - validation-tracking
      - document-management
      - monitoring-plan
