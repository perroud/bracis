id: art-16
family: cap-3
title: "Relatorio de Validacao e Liberacao do Sistema"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 16. Ao término das atividades de validação, o fabricante deve
    elaborar relatório de validação que consolide os resultados de todas
    as fases de qualificação e conclua sobre o status de validação do
    sistema computadorizado.

    Parágrafo 1. O relatório de validação deve conter:
    I - resumo das atividades de qualificação executadas;
    II - resultados obtidos em cada fase (IQ, OQ, PQ);
    III - lista de desvios identificados e disposição adotada;
    IV - ações corretivas e preventivas decorrentes;
    V - conclusão sobre conformidade com requisitos e critérios de aceitação;
    VI - recomendações e restrições de uso, se aplicável;
    VII - aprovação formal pela unidade da qualidade.

    Parágrafo 2. O sistema computadorizado somente poderá ser utilizado
    em atividades de produção GMP após aprovação do relatório de validação
    pela unidade da qualidade e emissão formal de liberação para uso.
guidance:
  prose: |
    O art. 16 define o gate final para entrada de um sistema em operacao
    GMP, exigindo documentacao consolidada e aprovacao formal.

    **Estrutura do relatorio de validacao:**
    1. Informacoes do sistema (nome, versao, fornecedor, categoria GAMP)
    2. Resumo da estrategia de validacao adotada
    3. Resultados de IQ: aprovada/reprovada com evidencias
    4. Resultados de OQ: aprovada/reprovada com evidencias
    5. Resultados de PQ: aprovada/reprovada com evidencias
    6. Matriz de rastreabilidade: URS -> FS -> testes -> resultados
    7. Desvios e nao-conformidades: descricao, investigacao, disposicao
    8. CAPA: acoes corretivas e preventivas com status
    9. Conclusao: sistema validado/nao validado/validado com restricoes
    10. Aprovacoes: CSV owner, QA, gerente de producao

    **Criterios para liberacao:**
    - Todas as fases de qualificacao concluidas e aprovadas
    - Desvios criticos resolvidos ou mitigados adequadamente
    - Matriz de rastreabilidade completa e verificada
    - Treinamento de usuarios concluido
    - SOPs de operacao e manutencao aprovados
    - Plano de backup e recuperacao testado
    - Plano de monitoramento pos-validacao definido

    **Restricoes de uso:**
    Sistemas podem ser liberados com restricoes documentadas (ex: uso
    limitado a determinadas funcionalidades ate resolucao de desvios),
    desde que restricoes nao comprometam qualidade ou seguranca.
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao de relatorio de validacao:**
      1. Gerar relatorio de validacao automaticamente a partir de
         resultados de testes de IQ/OQ/PQ executados no pipeline,
         consolidando evidencias de todas as fases.
      2. Implementar mecanismo de release gate que impeca deploy em
         producao GMP ate que relatorio de validacao esteja aprovado
         no sistema de gestao da qualidade.
      3. Configurar ambiente de producao GMP com flag de sistema
         validado/nao-validado que controle acesso e funcionalidades.
      4. Manter repositorio de relatorios de validacao como artefatos
         versionados e imutaveis para referencia regulatoria.
    tools:
      - gitlab-ci
      - release-gates
      - artifact-management
      - document-generation
  devsecops:
    prose: |
      **Pipeline de liberacao GMP:**
      1. Implementar stage final de pipeline que consolide resultados
         de IQ, OQ e PQ em relatorio unificado de validacao.
      2. Configurar approval gate que exija sign-off do CSV owner e
         QA antes de permitir deploy em producao GMP.
      3. Automatizar geracao de matriz de rastreabilidade completa
         (requisitos -> testes -> resultados) como artefato de pipeline.
      4. Manter registro imutavel de cada liberacao com hash de artefatos,
         aprovadores, timestamp e versao do relatorio de validacao.
    tools:
      - gitlab-ci
      - approval-gates
      - traceability-matrix
      - release-management
  secops:
    prose: |
      **Governanca de liberacao de sistemas:**
      1. Padronizar template de relatorio de validacao com todos os
         elementos obrigatorios do art. 16.
      2. Implementar workflow de aprovacao formal no sistema de gestao
         da qualidade com assinaturas eletronicas.
      3. Manter registro de todos os sistemas liberados com data de
         liberacao, versao, restricoes e proxima revalidacao.
      4. Garantir que liberacao somente ocorra apos confirmacao de
         treinamento de usuarios e aprovacao de SOPs.
      5. Arquivar relatorios de validacao pelo periodo de retencao
         regulatorio (minimo 5 anos apos descontinuacao do sistema).
    tools:
      - quality-management-system
      - document-management
      - electronic-signatures
      - training-management
