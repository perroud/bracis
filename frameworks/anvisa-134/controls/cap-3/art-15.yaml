id: art-15
family: cap-3
title: "Revalidacao Periodica"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 15. Sistemas computadorizados validados devem ser submetidos a
    revalidação periódica para confirmar que permanecem em estado validado
    e continuam atendendo aos requisitos para os quais foram qualificados.

    Parágrafo 1. A revalidação periódica deve incluir:
    I - revisão do status de validação e documentação;
    II - revisão de mudanças implementadas desde última validação;
    III - revisão de incidentes, desvios e CAPAs relacionados;
    IV - verificação de integridade de dados e trilhas de auditoria;
    V - verificação de controles de acesso e segurança;
    VI - testes de funcionalidades críticas;
    VII - revisão de performance do sistema.

    Parágrafo 2. A frequência de revalidação deve ser definida com base
    na avaliação de risco e documentada no plano mestre de validação,
    não devendo exceder dois anos para sistemas de alto risco.
guidance:
  prose: |
    O art. 15 garante que o estado validado e mantido ao longo do tempo,
    nao apenas no momento da validacao inicial.

    **Frequencia recomendada de revalidacao:**
    - Alto risco: anual a bienal
    - Medio risco: bienal a trienal
    - Baixo risco: trienal

    **Componentes da revisao periodica (periodic review):**
    1. Status de validacao: documentacao atualizada e completa
    2. Mudancas: todas processadas conforme controle de mudancas
    3. Incidentes: analisados e remediados adequadamente
    4. Performance: dentro de limites definidos na qualificacao
    5. Seguranca: controles de acesso e audit trail funcionais
    6. Integridade de dados: verificacao de consistencia ALCOA+
    7. Treinamento: equipes treinadas e competentes
    8. Backup/restore: testados e funcionais
    9. Conformidade regulatoria: alinhamento com requisitos vigentes

    **Resultado da revisao periodica:**
    - Sistema mantido em estado validado (sem acoes)
    - Sistema requer acoes corretivas (com plano e prazo)
    - Sistema requer revalidacao completa (nova qualificacao)
    - Sistema requer descontinuacao (substituicao planejada)
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao de verificacoes de revalidacao:**
      1. Implementar suite de testes de regressao automatizados que
         verifiquem funcionalidades criticas periodicamente sem
         intervencao manual.
      2. Configurar monitoramento continuo de metricas-chave que
         alimentem automaticamente a revisao periodica: performance,
         disponibilidade, taxa de erros, integridade de dados.
      3. Automatizar deteccao de drift de configuracao versus baseline
         de IQ para identificar mudancas nao autorizadas.
      4. Gerar relatorio automatico de saude do sistema que sirva como
         input para revisao periodica de validacao.
    tools:
      - automated-testing
      - prometheus
      - drift-detection
      - health-report-generator
  devsecops:
    prose: |
      **Pipeline de revalidacao continua:**
      1. Implementar pipeline scheduled que execute testes criticos
         periodicamente (diario/semanal) e reporte resultados para
         equipe de validacao.
      2. Configurar coleta automatizada de metricas de pipeline
         (frequencia de deploys, taxa de sucesso, cobertura de testes)
         como input para revisao periodica.
      3. Gerar relatorio de mudancas acumuladas entre ciclos de
         revalidacao para facilitar revisao de impacto.
      4. Automatizar verificacao de que todos os sistemas GMP possuem
         revalidacao em dia conforme cronograma do PMV.
    tools:
      - gitlab-ci
      - scheduled-pipelines
      - change-tracking
      - compliance-monitoring
  secops:
    prose: |
      **Programa de revalidacao periodica:**
      1. Manter calendario de revalidacao de todos os sistemas GMP com
         alertas automaticos 60, 30 e 15 dias antes da data prevista.
      2. Padronizar checklist de revisao periodica conforme requisitos
         do art. 15 para garantir consistencia entre avaliadores.
      3. Documentar resultados de cada revisao periodica em relatorio
         formal com conclusoes e acoes necessarias.
      4. Escalar sistemas que nao passaram na revisao periodica para
         decisao da unidade da qualidade sobre acoes corretivas.
      5. Monitorar indicadores de revalidacao (conformidade com
         cronograma, resultados, acoes abertas) e reportar a direcao.
    tools:
      - quality-management-system
      - validation-tracking
      - calendar-management
      - compliance-dashboard
