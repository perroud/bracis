id: art-10
family: cap-3
title: "Especificacao de Requisitos de Usuario"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 10. Antes do início do desenvolvimento ou aquisição de um sistema
    computadorizado, o fabricante deve elaborar Especificação de Requisitos
    de Usuário (URS) que descreva claramente as funções, dados, interfaces,
    requisitos regulatórios e de qualidade que o sistema deve atender.

    Parágrafo 1. A URS deve ser elaborada pelos usuários do sistema em
    conjunto com as áreas de qualidade e tecnologia da informação, e
    aprovada formalmente antes do início do desenvolvimento ou seleção
    do fornecedor.

    Parágrafo 2. A URS deve incluir requisitos de integridade de dados,
    segurança, trilhas de auditoria, assinaturas eletrônicas e demais
    requisitos regulatórios aplicáveis conforme esta Instrução Normativa.
guidance:
  prose: |
    O art. 10 estabelece a URS como documento fundacional do processo de
    validacao, garantindo que requisitos regulatorios sejam definidos
    antes do desenvolvimento.

    **Conteudo minimo da URS:**
    - Descricao funcional do sistema e processos suportados
    - Requisitos de dados (tipos, formatos, volumes, retencao)
    - Requisitos de interface com outros sistemas
    - Requisitos de integridade de dados (ALCOA+)
    - Requisitos de trilha de auditoria
    - Requisitos de assinatura eletronica (se aplicavel)
    - Requisitos de controle de acesso e seguranca
    - Requisitos de desempenho e disponibilidade
    - Requisitos de backup e recuperacao
    - Requisitos regulatorios especificos (21 CFR Part 11, Annex 11)
    - Requisitos de conformidade com BPF

    **Boas praticas na elaboracao:**
    - Requisitos devem ser verificaveis e testaveis
    - Usar linguagem clara e nao ambigua
    - Numerar requisitos para rastreabilidade
    - Classificar requisitos como obrigatorios ou desejaveisls
    - Vincular cada requisito ao risco ou regulacao que o motiva

    **Rastreabilidade:**
    Cada requisito da URS deve ser rastreavel ate os testes de qualificacao
    (OQ/PQ) atraves de matriz de rastreabilidade bidirecional.
implementation_guidance:
  platform_engineering:
    prose: |
      **Templates e rastreabilidade de requisitos:**
      1. Manter templates padronizados de URS como artefatos versionados
         com secoes obrigatorias para requisitos regulatorios, integridade
         de dados, seguranca e performance.
      2. Implementar sistema de gestao de requisitos que permita vincular
         URS a especificacoes tecnicas, testes e evidencias de validacao.
      3. Configurar checklist automatizado que verifique se URS de sistemas
         GMP contempla todos os requisitos regulatorios obrigatorios da
         IN 134 antes de aprovacao.
      4. Gerar matriz de rastreabilidade automatizada que vincule requisitos
         de URS a testes de qualificacao no pipeline.
    tools:
      - requirements-management
      - gitlab-issues
      - traceability-matrix
      - document-templates
  devsecops:
    prose: |
      **Requisitos como artefatos do pipeline:**
      1. Armazenar URS como documento versionado no repositorio do sistema,
         garantindo rastreabilidade de mudancas em requisitos.
      2. Vincular requisitos da URS a testes automatizados no pipeline
         usando tags/labels que permitam verificacao de cobertura.
      3. Implementar gate no pipeline que verifique cobertura de testes
         para requisitos criticos antes de permitir deploy.
      4. Gerar relatorio automatico de cobertura de requisitos como
         artefato de cada execucao de pipeline.
    tools:
      - gitlab-ci
      - test-management
      - coverage-analysis
      - traceability-matrix
  secops:
    prose: |
      **Governanca de requisitos de usuario:**
      1. Garantir que toda URS seja elaborada com participacao das areas
         de qualidade, TI, producao e usuarios finais.
      2. Manter registro formal de aprovacao da URS com assinaturas de
         todas as partes interessadas.
      3. Verificar que requisitos regulatorios da IN 134 estejam
         contemplados em toda URS de sistema GMP.
      4. Controlar versoes da URS e garantir que mudancas sigam
         processo formal de controle de mudancas.
      5. Auditar periodicamente a adequacao entre URS aprovada e
         sistema efetivamente implementado.
    tools:
      - quality-management-system
      - document-management
      - audit-management
