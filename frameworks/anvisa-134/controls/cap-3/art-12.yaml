id: art-12
family: cap-3
title: "Qualificacao de Operacao (OQ)"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 12. A Qualificação de Operação (OQ) deve verificar e documentar
    que o sistema computadorizado opera conforme as especificações funcionais
    em todas as condições previstas de uso, incluindo condições de contorno
    e tratamento de erros.

    Parágrafo 1. A OQ deve incluir, no mínimo:
    I - testes funcionais de todas as funcionalidades críticas;
    II - testes de condições de contorno (limites de entrada);
    III - testes de tratamento de erros e exceções;
    IV - testes de segurança (controle de acesso, autenticação);
    V - testes de trilha de auditoria;
    VI - testes de interfaces com outros sistemas;
    VII - testes de backup e restauração.

    Parágrafo 2. Os testes da OQ devem ser baseados nas especificações
    funcionais e na avaliação de risco, priorizando funcionalidades
    críticas para a qualidade do produto e integridade de dados.
guidance:
  prose: |
    A OQ verifica que o sistema funciona conforme projetado em todas
    as condicoes operacionais previstas.

    **Diferenca entre OQ e PQ:**
    - OQ: verifica funcionalidade em condicoes controladas de teste
    - PQ: verifica desempenho em condicoes reais de producao

    **Estrategia de testes OQ baseada em risco:**
    - Funcionalidades criticas (impacto em CQA): testes exaustivos
    - Funcionalidades de suporte: testes representativos
    - Funcionalidades administrativas: testes basicos

    **Tipos de testes OQ:**
    - Testes positivos: verificar que funcionalidades corretas produzem
      resultados corretos
    - Testes negativos: verificar que entradas invalidas sao rejeitadas
      e erros sao tratados adequadamente
    - Testes de contorno: verificar comportamento nos limites de entrada
    - Testes de seguranca: verificar controle de acesso, autenticacao,
      segregacao de funcoes
    - Testes de audit trail: verificar que todas as acoes relevantes
      sao registradas na trilha de auditoria
    - Testes de interface: verificar comunicacao correta entre sistemas
    - Testes de backup/restore: verificar que dados podem ser recuperados

    **Criterios de aceitacao:**
    Cada teste deve ter criterio de aceitacao pre-definido, claro e
    objetivo. Resultados devem ser comparados contra criterios e desvios
    formalmente documentados e avaliados.
implementation_guidance:
  platform_engineering:
    prose: |
      **Testes OQ automatizados em infraestrutura:**
      1. Implementar suite de testes automatizados que verifiquem
         funcionalidades criticas de infraestrutura: failover, load
         balancing, auto-scaling, network segmentation.
      2. Configurar testes de stress e limites que validem condicoes
         de contorno: capacidade maxima de armazenamento, conexoes
         simultaneas, throughput de rede.
      3. Automatizar testes de backup e restauracao como parte da
         qualificacao operacional, verificando integridade de dados
         apos restore.
      4. Implementar testes de seguranca de infraestrutura: port
         scanning, vulnerability assessment, penetration testing
         automatizado.
    tools:
      - inspec
      - chaos-engineering
      - backup-verification
      - security-scanning
  devsecops:
    prose: |
      **Pipeline de qualificacao operacional:**
      1. Criar stage de OQ no pipeline com testes automatizados que cubram
         funcionalidades criticas, condicoes de contorno e tratamento de erros.
      2. Implementar testes de integracao que verifiquem interfaces entre
         sistemas GMP conforme especificacao funcional.
      3. Executar testes de seguranca automatizados (SAST, DAST, autenticacao,
         autorizacao) como parte da OQ.
      4. Verificar automaticamente que trilha de auditoria registra todas
         as acoes criticas definidas na especificacao.
      5. Gerar relatorio de OQ como artefato de pipeline com resultados
         detalhados de cada teste e comparacao contra criterios de aceitacao.
    tools:
      - gitlab-ci
      - automated-testing
      - integration-testing
      - security-testing
      - audit-trail-verification
  secops:
    prose: |
      **Governanca de qualificacao operacional:**
      1. Manter protocolos padronizados de OQ com testes mapeados a
         requisitos funcionais e riscos identificados.
      2. Garantir que testes de OQ sejam executados por pessoal qualificado
         com independencia adequada.
      3. Revisar e aprovar relatorio de OQ pela unidade da qualidade
         antes de prosseguir para PQ.
      4. Documentar e investigar todos os desvios de OQ com CAPA quando
         aplicavel.
      5. Manter matriz de rastreabilidade bidirecional entre requisitos
         (URS/FS) e testes de OQ.
    tools:
      - quality-management-system
      - validation-tracking
      - capa-management
      - traceability-matrix
