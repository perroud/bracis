id: art-1
family: cap-1
title: "Objeto e Escopo"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 1. Esta Instrução Normativa estabelece os requisitos e diretrizes
    complementares às Boas Práticas de Fabricação de Medicamentos referentes
    a sistemas computadorizados utilizados em atividades reguladas pela ANVISA
    na fabricação, controle de qualidade, armazenamento e distribuição de
    medicamentos.

    Parágrafo único. Os requisitos desta norma aplicam-se a todos os sistemas
    computadorizados que possam afetar a qualidade do produto, a segurança do
    paciente ou a integridade dos dados utilizados para decisões regulatórias,
    incluindo sistemas de automação de processos, sistemas de gestão laboratorial
    (LIMS), sistemas de gestão de produção (MES), sistemas de planejamento de
    recursos (ERP) e demais sistemas que suportem atividades GMP.
guidance:
  prose: |
    O art. 1 define o escopo da IN 134/2022 como norma complementar as Boas
    Praticas de Fabricacao (BPF/GMP) para sistemas computadorizados no setor
    farmaceutico.

    **Sistemas abrangidos:**
    - SCADA/DCS: sistemas de automacao e controle de processos produtivos
    - LIMS: sistemas de gestao laboratorial (Laboratory Information Management System)
    - MES: sistemas de execucao da manufatura (Manufacturing Execution System)
    - ERP: sistemas de planejamento de recursos empresariais com modulos GMP
    - QMS: sistemas de gestao da qualidade
    - DMS: sistemas de gestao de documentos
    - WMS: sistemas de gestao de armazem para insumos e produtos acabados
    - Sistemas embarcados em equipamentos analiticos e de producao

    **Criterio de aplicabilidade:**
    O sistema computadorizado esta em escopo se puder afetar direta ou indiretamente
    a qualidade do medicamento, a seguranca do paciente ou a integridade de dados
    utilizados em decisoes regulatorias (liberacao de lotes, estabilidade, etc.).

    **Contexto regulatorio:**
    A IN 134 alinha-se com as diretrizes internacionais do PIC/S (Pharmaceutical
    Inspection Co-operation Scheme), EU GMP Annex 11 e FDA 21 CFR Part 11, sendo
    a norma brasileira de referencia para validacao de sistemas computadorizados
    na industria farmaceutica.
implementation_guidance:
  platform_engineering:
    prose: |
      **Inventario e classificacao de sistemas GMP:**
      1. Catalogar todos os sistemas computadorizados em ambiente produtivo
         farmaceutico com metadados de classificacao GAMP 5 (categoria 1 a 5).
      2. Implementar registro automatizado de ativos (CMDB) com campos especificos
         para classificacao GMP: criticidade BPF, impacto na qualidade do produto,
         categoria GAMP, status de validacao.
      3. Manter mapa de dependencias entre sistemas computadorizados, equipamentos
         de producao e processos de fabricacao que suportam.
      4. Implementar tags/labels em infraestrutura como codigo que identifiquem
         automaticamente recursos em escopo da IN ANVISA 134.
      5. Definir politicas de compliance como codigo (OPA/Kyverno) para garantir
         que sistemas GMP-criticos atendam requisitos minimos de configuracao.
    tools:
      - cmdb
      - opa-gatekeeper
      - kyverno
      - asset-discovery
      - terraform
  devsecops:
    prose: |
      **Pipeline de conformidade GMP para sistemas computadorizados:**
      1. Criar label de repositorios que identifique sistemas em escopo da
         IN ANVISA 134 para aplicacao de pipeline de validacao especializado.
      2. Implementar gates de qualidade no CI/CD que verifiquem conformidade
         com requisitos de integridade de dados antes de deploy em producao.
      3. Manter rastreabilidade completa entre requisitos de usuario (URS),
         especificacoes funcionais (FS), design (DS) e testes (IQ/OQ/PQ)
         dentro do pipeline de entrega.
      4. Automatizar geracao de documentacao de validacao (protocolos e relatorios)
         a partir de artefatos de pipeline.
    tools:
      - gitlab-ci
      - compliance-pipeline
      - policy-as-code
      - traceability-matrix
  secops:
    prose: |
      **Governanca de conformidade com ANVISA:**
      1. Designar responsavel pelo programa de validacao de sistemas computadorizados
         (CSV Owner) com autoridade e recursos adequados.
      2. Criar e manter inventario formal de todos os sistemas computadorizados
         em escopo GMP com status de validacao atualizado.
      3. Mapear controles implementados versus exigencias da IN 134 em matriz
         de conformidade revisada semestralmente.
      4. Estabelecer processo de comunicacao com ANVISA para inspecoes, desvios
         e consultas regulatorias relacionadas a sistemas computadorizados.
      5. Garantir que o programa de validacao esteja integrado ao sistema de
         gestao da qualidade farmaceutica (PQS).
    tools:
      - grc-platform
      - regulatory-tracking
      - compliance-dashboard
      - quality-management-system
