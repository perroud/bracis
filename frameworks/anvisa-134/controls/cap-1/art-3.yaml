id: art-3
family: cap-1
title: "Responsabilidades do Detentor do Registro e Fabricante"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 3. O detentor do registro e o fabricante de medicamentos são
    responsáveis por assegurar que todos os sistemas computadorizados
    utilizados em atividades reguladas estejam em conformidade com os
    requisitos de Boas Práticas de Fabricação e com esta Instrução Normativa.

    Parágrafo 1. A responsabilidade inclui sistemas computadorizados
    operados por terceiros contratados, devendo o fabricante manter
    acordos formais que definam claramente as responsabilidades de
    cada parte em relação à integridade de dados, segurança, validação
    e manutenção dos sistemas.

    Parágrafo 2. O fabricante deve designar profissional qualificado como
    responsável pelo programa de validação de sistemas computadorizados,
    com autoridade e independência adequadas para garantir a conformidade
    regulatória.
guidance:
  prose: |
    O art. 3 estabelece a responsabilidade final (accountability) sobre
    sistemas computadorizados GMP.

    **Principio fundamental:**
    O fabricante nao pode delegar a responsabilidade regulatoria a terceiros.
    Mesmo quando sistemas sao operados por provedores de servicos (cloud,
    SaaS, outsourcing de TI), o fabricante permanece como responsavel
    perante a ANVISA pela conformidade.

    **Acordos com terceiros devem definir:**
    - Responsabilidades de validacao e manutencao do estado validado
    - Requisitos de integridade de dados e trilhas de auditoria
    - Politicas de controle de acesso e segregacao de funcoes
    - Procedimentos de gestao de mudancas e notificacao
    - Direitos de auditoria pelo fabricante e por autoridades regulatorias
    - Plano de continuidade e recuperacao de desastres
    - Clausulas de portabilidade e devolucao de dados

    **Perfil do responsavel CSV:**
    - Conhecimento em BPF/GMP e regulacoes aplicaveis
    - Experiencia em validacao de sistemas computadorizados
    - Autoridade para aprovar/rejeitar validacoes e mudancas
    - Independencia em relacao as areas de producao e TI
implementation_guidance:
  platform_engineering:
    prose: |
      **Segregacao de responsabilidades em infraestrutura:**
      1. Implementar modelo RACI documentado em infraestrutura como codigo
         que define responsabilidades sobre componentes de sistemas GMP
         entre equipes internas e fornecedores.
      2. Configurar controles de acesso baseados em funcao (RBAC) que
         reflitam a segregacao de responsabilidades entre fabricante,
         provedores de servico e equipe de validacao.
      3. Manter contratos de nivel de servico (SLA) como artefatos
         versionados que definam responsabilidades de cada fornecedor
         sobre seguranca, disponibilidade e integridade de dados.
      4. Implementar monitoramento independente de sistemas operados por
         terceiros para verificacao continua de conformidade.
    tools:
      - terraform
      - vault
      - rbac-management
      - sla-monitoring
  devsecops:
    prose: |
      **Rastreabilidade de responsabilidades no pipeline:**
      1. Configurar CODEOWNERS nos repositorios de sistemas GMP para
         garantir que o responsavel CSV aprove todas as mudancas.
      2. Implementar gates de aprovacao no pipeline que exijam sign-off
         do responsavel de validacao antes de deploy em producao GMP.
      3. Manter registro auditavel de quem aprovou cada mudanca, com
         timestamp e justificativa, vinculado ao sistema de controle
         de mudancas farmaceutico.
      4. Automatizar verificacao de que acordos com terceiros estejam
         vigentes antes de permitir deploy de componentes de fornecedores.
    tools:
      - gitlab-ci
      - codeowners
      - approval-gates
      - contract-management
  secops:
    prose: |
      **Programa de governanca de responsabilidades:**
      1. Formalizar designacao do responsavel pelo programa de validacao
         de sistemas computadorizados em documento aprovado pela diretoria.
      2. Manter registro atualizado de todos os acordos com terceiros que
         operam ou mantem sistemas computadorizados GMP.
      3. Conduzir auditorias periodicas em fornecedores de servicos de
         sistemas computadorizados (minimo anual para sistemas criticos).
      4. Implementar processo de qualificacao de fornecedores especifico
         para provedores de sistemas computadorizados e servicos de TI.
      5. Documentar e revisar periodicamente a matriz RACI de
         responsabilidades sobre sistemas computadorizados.
    tools:
      - grc-platform
      - vendor-management
      - audit-management
      - quality-management-system
