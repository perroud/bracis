id: art-2
family: cap-1
title: "Definicoes e Terminologia"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 2. Para os fins desta Instrução Normativa, adotam-se as seguintes
    definições:

    I - Sistema computadorizado: combinação de hardware, software e componentes
    de rede que, em conjunto, realizam funções específicas relacionadas à
    fabricação, controle de qualidade ou distribuição de medicamentos;

    II - Validação de sistema computadorizado: evidência documentada de que o
    sistema computadorizado atende consistentemente às especificações
    pré-determinadas e aos atributos de qualidade;

    III - Integridade de dados: propriedade de que os dados são completos,
    consistentes, precisos, confiáveis e atribuíveis durante todo o seu
    ciclo de vida (princípios ALCOA+);

    IV - Registro eletrônico: qualquer combinação de texto, gráficos, dados,
    áudio ou informação visual criada, modificada, mantida, arquivada,
    recuperada ou distribuída por um sistema computadorizado;

    V - Assinatura eletrônica: compilação de dados em forma eletrônica que
    serve como equivalente funcional à assinatura manuscrita;

    VI - Trilha de auditoria: registro cronológico e inalterável de atividades
    que permite a reconstrução do histórico de eventos relacionados a um
    registro eletrônico;

    VII - GAMP: Boas Práticas de Fabricação Automatizada (Good Automated
    Manufacturing Practice), metodologia de referência para validação de
    sistemas computadorizados baseada em risco.
guidance:
  prose: |
    O art. 2 estabelece o glossario de termos criticos para a correta
    interpretacao e aplicacao da norma.

    **Principios ALCOA+ detalhados:**
    - Attributable (Atribuivel): identificar quem realizou a acao e quando
    - Legible (Legivel): dados devem ser legiveis e permanentes
    - Contemporaneous (Contemporaneo): registrados no momento da atividade
    - Original (Original): registro primario ou copia certificada
    - Accurate (Preciso): livre de erros, completo e verdadeiro
    - Complete (Completo): todos os dados, incluindo repeticoes e OOS
    - Consistent (Consistente): sequencia cronologica verificavel
    - Enduring (Duravel): registros preservados pelo periodo exigido
    - Available (Disponivel): acessivel durante todo o periodo de retencao

    **Categorias GAMP 5:**
    - Categoria 1: Software de infraestrutura (SO, firmware)
    - Categoria 3: Software nao configuravel (COTS padrao)
    - Categoria 4: Software configuravel (ERP, LIMS configurados)
    - Categoria 5: Software customizado (aplicacoes sob medida)

    O nivel de esforco de validacao deve ser proporcional a categoria GAMP
    e ao risco do sistema para a qualidade do produto e seguranca do paciente.
implementation_guidance:
  platform_engineering:
    prose: |
      **Padronizacao de terminologia em infraestrutura:**
      1. Adotar taxonomia de classificacao GAMP 5 no CMDB para todos os
         sistemas computadorizados, com campos obrigatorios para categoria,
         criticidade GMP e status de validacao.
      2. Implementar labels padronizados em recursos de infraestrutura como
         codigo que reflitam a classificacao GAMP (gamp-cat-1 a gamp-cat-5).
      3. Configurar dashboards de monitoramento que segreguem metricas por
         categoria de sistema e nivel de criticidade BPF.
      4. Manter glossario acessivel integrado ao portal de documentacao
         da plataforma com todos os termos da IN 134.
    tools:
      - cmdb
      - terraform
      - grafana
      - confluence
  devsecops:
    prose: |
      **Rastreabilidade terminologica no pipeline:**
      1. Incluir metadados GAMP nos repositorios de codigo via arquivo de
         configuracao padronizado (.gmp-classification.yaml) que defina
         categoria GAMP, criticidade e requisitos de validacao.
      2. Configurar templates de issues e merge requests com campos
         obrigatorios alinhados as definicoes da IN 134 (tipo de registro
         eletronico afetado, impacto em integridade de dados).
      3. Implementar verificacao automatizada de que toda alteracao em
         sistemas categoria 4 e 5 GAMP possua documentacao de impacto.
    tools:
      - gitlab-ci
      - issue-templates
      - merge-request-templates
  secops:
    prose: |
      **Governanca de definicoes e classificacao:**
      1. Manter inventario oficial de sistemas computadorizados com
         classificacao GAMP e mapeamento de definicoes da IN 134.
      2. Capacitar equipes de qualidade, TI e producao nas definicoes
         e terminologia da norma, com foco em integridade de dados ALCOA+.
      3. Revisar periodicamente a classificacao de sistemas quando houver
         mudancas significativas em configuracao ou uso.
      4. Documentar criterios de classificacao e decisoes em registros
         auditaveis no sistema de gestao da qualidade.
    tools:
      - grc-platform
      - training-management
      - quality-management-system
