id: art-33
family: cap-6
title: "Gestao de Incidentes e Problemas"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 33. O fabricante deve implementar processo formal de gestão de
    incidentes e problemas para sistemas computadorizados GMP, garantindo
    detecção rápida, investigação adequada e resolução efetiva de falhas
    que possam afetar a qualidade do produto ou a integridade de dados.

    Parágrafo 1. O processo de gestão de incidentes deve incluir:
    I - procedimento de detecção e registro de incidentes;
    II - classificação por severidade e impacto em processos GMP;
    III - investigação de causa raiz para incidentes significativos;
    IV - ações corretivas e preventivas (CAPA);
    V - avaliação de impacto em lotes produzidos durante o incidente;
    VI - comunicação a partes interessadas conforme severidade;
    VII - análise de tendências para identificação de problemas recorrentes.

    Parágrafo 2. Incidentes que possam afetar a qualidade de produtos já
    distribuídos devem ser reportados conforme procedimento de recall e
    comunicados à ANVISA quando aplicável.
guidance:
  prose: |
    O art. 33 integra gestao de incidentes de TI com o sistema de qualidade
    farmaceutico, garantindo que falhas de sistema sejam tratadas com o
    rigor esperado pela BPF.

    **Classificacao de incidentes por severidade:**

    Critico (resposta imediata):
    - Perda de dados GMP
    - Falha de sistema durante producao em andamento
    - Violacao de seguranca com acesso a dados de pacientes
    - Falha de trilha de auditoria
    - Impacto: avaliacao imediata de lotes afetados

    Maior (resposta em 4 horas):
    - Degradacao significativa de performance
    - Falha de interface entre sistemas criticos
    - Falha de backup ou restauracao
    - Impacto: avaliacao de impacto em 24 horas

    Menor (resposta em 24 horas):
    - Erro de funcionalidade nao-critica
    - Problema de performance sem impacto em dados
    - Falha de componente redundante
    - Impacto: avaliacao na proxima revisao

    **Integracao com sistema de qualidade:**
    - Incidentes criticos e maiores devem gerar desvio de qualidade
    - Investigacao de causa raiz conforme POP de investigacao de QA
    - CAPA quando aplicavel, com eficacia verificada
    - Avaliacao de impacto em lotes como parte da investigacao

    **Analise de tendencias:**
    Manter registro de todos os incidentes e analisar periodicamente
    para identificar padroes recorrentes que indiquem problemas sistemicos
    requerendo acao preventiva.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de deteccao e resposta a incidentes:**
      1. Implementar monitoramento abrangente de sistemas GMP com
         alertas automaticos baseados em thresholds de criticidade.
      2. Configurar integracao entre sistema de monitoramento e sistema
         de gestao de incidentes para registro automatico de alertas.
      3. Implementar runbooks automatizados para cenarios de incidente
         conhecidos que acelerem resposta e minimizem impacto.
      4. Configurar dashboards de status de sistemas GMP em tempo real
         para visibilidade imediata de incidentes.
      5. Manter logs centralizados e correlacionados de todos os sistemas
         GMP para facilitar investigacao de causa raiz.
    tools:
      - prometheus
      - alertmanager
      - incident-management
      - runbooks
      - centralized-logging
  devsecops:
    prose: |
      **Resposta a incidentes no pipeline:**
      1. Implementar pipeline de hotfix acelerado para correcoes de
         emergencia em sistemas GMP com gates minimos mas controles
         de qualidade essenciais.
      2. Configurar testes de regressao automatizados que verifiquem
         que correcoes de incidente nao introduzam novos problemas.
      3. Automatizar coleta de evidencias de incidente: logs, metricas,
         configuracoes, estado do sistema no momento da falha.
      4. Gerar relatorio de incidente automatizado com timeline de
         eventos, acoes tomadas e resultados de verificacao.
    tools:
      - gitlab-ci
      - hotfix-pipeline
      - regression-testing
      - evidence-collection
  secops:
    prose: |
      **Programa de gestao de incidentes GMP:**
      1. Manter procedimento de gestao de incidentes integrado ao
         sistema de qualidade com classificacao de severidade e
         tempos de resposta definidos.
      2. Garantir que incidentes criticos e maiores sejam investigados
         com rigor de investigacao de desvio de qualidade.
      3. Implementar CAPA para incidentes recorrentes ou de alto impacto,
         com verificacao de eficacia das acoes.
      4. Avaliar impacto de incidentes em lotes produzidos durante o
         periodo de falha e tomar decisoes de liberacao informadas.
      5. Conduzir analise de tendencias trimestral de incidentes para
         identificar problemas sistemicos e oportunidades de melhoria.
    tools:
      - incident-management
      - quality-management-system
      - capa-management
      - trend-analysis
