id: art-31
family: cap-6
title: "Descontinuacao de Sistemas Computadorizados"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 31. A descontinuação (descomissionamento) de sistemas computadorizados
    GMP deve seguir processo formal e documentado que garanta a preservação
    dos dados e registros históricos e a continuidade das operações.

    Parágrafo 1. O processo de descontinuação deve incluir:
    I - avaliação de impacto da descontinuação em processos e dados GMP;
    II - migração completa e verificada de dados para sistema substituto
    ou formato de arquivo de longo prazo;
    III - verificação de integridade e completude dos dados migrados;
    IV - preservação de trilhas de auditoria históricas;
    V - desativação segura de acessos e credenciais;
    VI - destruição segura de dados em mídias descontinuadas;
    VII - atualização de documentação e inventário de sistemas.

    Parágrafo 2. Dados migrados devem permanecer acessíveis e legíveis
    pelo período de retenção regulatório restante.

    Parágrafo 3. A descontinuação deve ser aprovada pela unidade da
    qualidade e documentada em relatório formal.
guidance:
  prose: |
    O art. 31 garante que a descontinuacao de sistemas nao resulte em
    perda de dados ou registros regulatorios historicos.

    **Motivos comuns de descontinuacao:**
    - Substituicao por sistema mais moderno
    - Final de vida util do software/hardware
    - Descontinuacao do suporte pelo fornecedor
    - Consolidacao de sistemas redundantes
    - Mudanca de processo que torna sistema desnecessario

    **Processo de descontinuacao (retirement):**
    1. Planejamento: definir escopo, cronograma, riscos
    2. Migracao de dados: transferir dados para novo sistema ou arquivo
    3. Verificacao: confirmar integridade e completude da migracao
    4. Periodo de coexistencia: manter acesso ao sistema antigo
    5. Desativacao: remover acesso e encerrar operacao
    6. Destruicao de dados: sanitizar midias de armazenamento
    7. Documentacao: relatorio formal de descontinuacao

    **Dados que devem ser preservados:**
    - Registros de producao e controle de qualidade
    - Trilhas de auditoria completas
    - Documentacao de validacao
    - Configuracoes e baseline do sistema
    - Logs de operacao relevantes

    **Destruicao segura de dados:**
    Midias de armazenamento devem ser sanitizadas conforme NIST 800-88
    ou equivalente. Para dados sensiveis, destruicao fisica pode ser
    necessaria. Registro de destruicao deve ser mantido.
implementation_guidance:
  platform_engineering:
    prose: |
      **Processo de descontinuacao em infraestrutura:**
      1. Implementar playbook de descontinuacao como codigo que
         padronize o processo: migracao de dados, verificacao de
         integridade, desativacao de acesso, destruicao de recursos.
      2. Configurar ferramentas de migracao de dados com verificacao
         automatica de integridade (checksums, contagem de registros,
         comparacao de amostras).
      3. Implementar destruicao segura de dados em midias de
         armazenamento (crypto-erase, wipe, destruicao fisica)
         com registro auditavel.
      4. Manter capacidade de leitura de dados migrados em formato
         de arquivo de longo prazo durante periodo de retencao.
    tools:
      - data-migration-tools
      - integrity-verification
      - secure-erase
      - archive-management
  devsecops:
    prose: |
      **Pipeline de descontinuacao:**
      1. Criar pipeline de migracao que execute transferencia de dados,
         verifique integridade e gere relatorio automatizado com
         evidencias de completude e precisao.
      2. Implementar testes automatizados que comparem dados no sistema
         original versus sistema destino apos migracao.
      3. Automatizar revogacao de acessos e credenciais associados ao
         sistema descontinuado.
      4. Gerar relatorio de descontinuacao como artefato versionado
         com todas as evidencias do processo.
    tools:
      - gitlab-ci
      - data-migration-pipeline
      - access-revocation
      - evidence-collection
  secops:
    prose: |
      **Governanca de descontinuacao:**
      1. Manter procedimento formal de descontinuacao de sistemas
         computadorizados com checklist de atividades obrigatorias.
      2. Garantir aprovacao da unidade da qualidade antes de iniciar
         descontinuacao de qualquer sistema GMP.
      3. Verificar que todos os dados com periodo de retencao vigente
         foram migrados e estao acessiveis antes da desativacao.
      4. Documentar processo completo de descontinuacao em relatorio
         formal com evidencias de cada etapa.
      5. Atualizar inventario de sistemas e documentacao regulatoria
         apos conclusao da descontinuacao.
    tools:
      - quality-management-system
      - document-management
      - system-inventory
      - audit-trail
