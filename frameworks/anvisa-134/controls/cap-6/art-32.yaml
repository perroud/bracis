id: art-32
family: cap-6
title: "Qualificacao de Fornecedores de Sistemas e Servicos"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 32. O fabricante deve qualificar fornecedores de sistemas
    computadorizados e serviços relacionados (desenvolvimento, manutenção,
    hospedagem, suporte) antes da contratação, verificando sua capacidade
    de atender aos requisitos de Boas Práticas de Fabricação.

    Parágrafo 1. A qualificação de fornecedor deve avaliar, no mínimo:
    I - sistema de gestão da qualidade do fornecedor;
    II - experiência e competência em ambiente regulado farmacêutico;
    III - processos de desenvolvimento de software e gestão de mudanças;
    IV - capacidade de suporte e manutenção;
    V - políticas de segurança da informação e integridade de dados;
    VI - plano de continuidade de negócios do fornecedor;
    VII - conformidade com requisitos regulatórios aplicáveis.

    Parágrafo 2. Para fornecedores de serviços em nuvem (cloud/SaaS), a
    qualificação deve incluir adicionalmente:
    I - localização dos dados e conformidade com legislação aplicável;
    II - controles de segurança e privacidade;
    III - direitos de auditoria pelo fabricante e por autoridades;
    IV - portabilidade e devolução de dados em caso de encerramento;
    V - acordo de nível de serviço (SLA) com métricas de disponibilidade.

    Parágrafo 3. Fornecedores críticos devem ser reavaliados periodicamente,
    no mínimo a cada dois anos.
guidance:
  prose: |
    O art. 32 e especialmente relevante na era cloud/SaaS, onde parcela
    crescente de sistemas GMP e operada por terceiros.

    **Criterios de qualificacao de fornecedores:**

    Sistema de qualidade:
    - Certificacao ISO 9001 ou equivalente
    - Processos documentados de desenvolvimento (SDLC)
    - Gestao de mudancas formal e rastreavel
    - Gestao de incidentes e problema

    Competencia regulatoria:
    - Experiencia comprovada em setor farmaceutico/GMP
    - Conhecimento de GAMP 5, 21 CFR Part 11, EU GMP Annex 11
    - Equipe treinada em requisitos regulatorios
    - Capacidade de suportar auditorias regulatorias

    Seguranca da informacao:
    - Certificacao ISO 27001 ou SOC 2 Type II
    - Politicas de seguranca documentadas
    - Controles de acesso e criptografia
    - Plano de resposta a incidentes

    **Requisitos especificos para cloud/SaaS:**
    - Localizacao de dados: verificar conformidade com legislacao
      brasileira e requisitos de soberania de dados
    - Multi-tenancy: garantir isolamento de dados entre clientes
    - Direitos de auditoria: clausula contratual que permita auditoria
      pelo fabricante e pela ANVISA
    - Portabilidade: capacidade de extrair dados em formato aberto
    - Exit strategy: procedimento para migrar dados em caso de
      encerramento do servico
implementation_guidance:
  platform_engineering:
    prose: |
      **Framework de qualificacao tecnica de fornecedores:**
      1. Desenvolver checklist tecnico de qualificacao que avalie
         infraestrutura, seguranca, disponibilidade e capacidade de
         integracao do fornecedor.
      2. Implementar monitoramento independente de SLAs contratados
         com fornecedores de cloud/SaaS (disponibilidade, latencia,
         throughput).
      3. Verificar configuracoes de seguranca de servicos cloud
         (criptografia, controle de acesso, isolamento, backup)
         usando ferramentas de cloud security posture management.
      4. Implementar testes periodicos de portabilidade: verificar
         que dados podem ser extraidos em formato padrao e importados
         em sistema alternativo.
    tools:
      - cloud-security-posture
      - sla-monitoring
      - vendor-assessment-tools
      - data-portability-testing
  devsecops:
    prose: |
      **Verificacao de fornecedores no pipeline:**
      1. Verificar automaticamente que dependencias de software de
         fornecedores estejam em versoes suportadas e sem
         vulnerabilidades criticas conhecidas.
      2. Implementar software composition analysis (SCA) que identifique
         componentes de terceiros e verifique conformidade de licencas.
      3. Configurar alertas automaticos quando fornecedores anunciem
         end-of-life de componentes usados em sistemas GMP.
      4. Manter bill of materials (BOM) atualizado de componentes de
         fornecedores para cada sistema GMP.
    tools:
      - dependency-scanning
      - sca
      - license-scanning
      - bom-management
  secops:
    prose: |
      **Programa de qualificacao de fornecedores:**
      1. Estabelecer procedimento formal de qualificacao de fornecedores
         de sistemas computadorizados com criterios objetivos por tipo
         e criticidade do servico.
      2. Conduzir auditorias em fornecedores criticos antes da
         contratacao e periodicamente (bienal para criticos, trienal
         para demais).
      3. Manter registro de qualificacao de todos os fornecedores com
         status, resultados de auditoria e plano de acoes.
      4. Verificar contratos para garantir clausulas obrigatorias:
         auditoria, portabilidade, seguranca, SLA, conformidade GMP.
      5. Monitorar performance de fornecedores e investigar desvios
         que possam afetar sistemas GMP.
    tools:
      - vendor-management
      - audit-management
      - contract-management
      - quality-management-system
