id: art-20
family: cap-4
title: "Protecao contra Acesso Nao Autorizado"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 20. O fabricante deve implementar medidas técnicas e organizacionais
    para proteger sistemas computadorizados GMP contra acesso não autorizado,
    uso indevido e adulteração de dados.

    Parágrafo 1. As medidas de proteção devem incluir:
    I - firewall e segmentação de rede para isolar sistemas GMP;
    II - proteção contra malware e software não autorizado;
    III - criptografia de dados sensíveis em trânsito e em repouso;
    IV - monitoramento de segurança e detecção de intrusão;
    V - política de atualização de segurança (patching);
    VI - restrição de instalação de software não autorizado.

    Parágrafo 2. Medidas de proteção devem ser validadas como parte do
    processo de qualificação do sistema e mantidas ao longo de seu
    ciclo de vida operacional.
guidance:
  prose: |
    O art. 20 aborda a seguranca cibernetica de sistemas GMP, reconhecendo
    que ameacas externas e internas podem comprometer integridade de dados
    e qualidade do produto.

    **Defesa em profundidade para sistemas GMP:**
    Camada 1 - Perimetro: firewalls, IDS/IPS, DMZ
    Camada 2 - Rede: segmentacao, VLANs, micro-segmentacao
    Camada 3 - Endpoint: antimalware, hardening, application whitelisting
    Camada 4 - Aplicacao: WAF, input validation, patching
    Camada 5 - Dados: criptografia, masking, DLP

    **Patching em ambiente GMP:**
    Atualizacoes de seguranca em sistemas validados requerem avaliacao de
    impacto na validacao. O processo deve equilibrar urgencia de seguranca
    com necessidade de manter o estado validado:
    - Patches criticos de seguranca: avaliacao de impacto simplificada,
      aplicacao dentro de 30 dias
    - Patches normais: ciclo padrao de controle de mudancas
    - Patches que afetam funcionalidades validadas: requalificacao

    **Software whitelisting:**
    Em sistemas GMP criticos, apenas software autorizado e documentado
    deve ser permitido. Application whitelisting e preferivel a blacklisting
    para ambientes de alta seguranca.

    **Criptografia:**
    - Em transito: TLS 1.2+ para todas as comunicacoes de rede
    - Em repouso: AES-256 para dados regulatorios sensiveis
    - Gestao de chaves: rotacao periodica, armazenamento seguro
implementation_guidance:
  platform_engineering:
    prose: |
      **Arquitetura de seguranca para sistemas GMP:**
      1. Implementar segmentacao de rede que isole sistemas GMP em zona
         de seguranca dedicada com controles de acesso granulares entre
         zonas (network policies, firewalls, micro-segmentacao).
      2. Configurar criptografia TLS 1.2+ para toda comunicacao entre
         sistemas GMP e AES-256 para dados em repouso.
      3. Implementar solucao de endpoint protection com application
         whitelisting para servidores GMP criticos.
      4. Configurar IDS/IPS e monitoramento de rede para deteccao de
         atividades anomalas em segmento GMP.
      5. Implementar processo automatizado de patching com avaliacao
         de impacto na validacao integrada ao fluxo de aprovacao.
    tools:
      - network-policies
      - tls-management
      - endpoint-protection
      - ids-ips
      - patch-management
  devsecops:
    prose: |
      **Seguranca no pipeline de sistemas GMP:**
      1. Executar varredura de vulnerabilidades (SAST, DAST, SCA) em
         todo codigo e dependencias de sistemas GMP.
      2. Verificar automaticamente configuracoes de seguranca (hardening)
         contra baseline definido para sistemas GMP.
      3. Testar criptografia de dados em transito e repouso como parte
         da qualificacao operacional.
      4. Implementar container scanning e image signing para garantir
         integridade de artefatos de deploy.
      5. Bloquear deploy de componentes com vulnerabilidades criticas
         ou altas nao remediadas.
    tools:
      - gitlab-ci
      - sast
      - dast
      - dependency-scanning
      - container-scanning
  secops:
    prose: |
      **Programa de seguranca de sistemas GMP:**
      1. Manter politica de seguranca especifica para sistemas
         computadorizados GMP, aprovada pela diretoria.
      2. Conduzir testes de penetracao anuais em sistemas GMP criticos
         com escopo aprovado pela unidade da qualidade.
      3. Monitorar eventos de seguranca em sistemas GMP 24x7 com
         procedimento de resposta a incidentes especifico.
      4. Gerenciar programa de patching que equilibre seguranca com
         manutencao do estado validado.
      5. Conduzir treinamento de conscientizacao em seguranca para
         todos os usuarios de sistemas GMP.
    tools:
      - siem
      - vulnerability-management
      - penetration-testing
      - security-awareness
      - patch-management
