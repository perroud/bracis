id: art-21
family: cap-4
title: "Impressao de Dados e Copias Eletronicas"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 21. Quando dados armazenados eletronicamente forem impressos ou
    copiados para outro formato ou sistema, o fabricante deve assegurar
    que a cópia seja fiel ao registro eletrônico original e que a
    integridade dos dados seja mantida durante o processo de transferência.

    Parágrafo 1. Cópias impressas de registros eletrônicos devem incluir:
    I - indicação clara de que se trata de cópia de registro eletrônico;
    II - data e hora de geração da cópia;
    III - identificação do sistema de origem;
    IV - indicação de que o registro original está armazenado eletronicamente.

    Parágrafo 2. Cópias eletrônicas transferidas entre sistemas devem ser
    verificadas quanto à integridade e completude após a transferência,
    utilizando mecanismos de validação como checksums ou assinaturas digitais.
guidance:
  prose: |
    O art. 21 aborda a integridade de dados quando registros sao copiados,
    impressos ou transferidos, garantindo que copias sejam confiaveis.

    **Contexto regulatorio:**
    Em muitas inspecoes, a ANVISA solicita impressoes ou copias de registros
    eletronicos. A norma garante que essas copias sejam confiaveis e
    rastreavies ao registro original.

    **Requisitos para copias impressas:**
    - Marca d'agua ou cabecalho indicando "Copia de registro eletronico"
    - Timestamp de geracao da copia
    - Identificacao do sistema fonte
    - Assinatura eletronica do gerador (quando aplicavel)
    - Nota de que o registro original e o eletronico

    **Requisitos para copias eletronicas:**
    - Verificacao de integridade pos-transferencia (checksum, hash)
    - Verificacao de completude (contagem de registros, totais)
    - Rastreabilidade da cadeia de custodia da copia
    - Protecao contra adulteracao durante transferencia (criptografia)

    **Migracoes de dados:**
    Transferencias entre sistemas (migracoes) exigem validacao rigorosa:
    - Verificacao de completude (todos os registros transferidos)
    - Verificacao de precisao (dados inalterados)
    - Verificacao de integridade (checksums conferem)
    - Relatorio formal de migracoes com evidencias
implementation_guidance:
  platform_engineering:
    prose: |
      **Integridade em transferencia de dados:**
      1. Implementar checksums (SHA-256) automaticos para todas as
         transferencias de dados entre sistemas GMP.
      2. Configurar criptografia TLS para transferencias em transito
         e verificacao de integridade pos-transferencia automatizada.
      3. Implementar mecanismo de auditoria que registre todas as
         copias e transferencias de dados GMP com metadados de
         origem, destino, timestamp e verificacao de integridade.
      4. Configurar templates de impressao que incluam automaticamente
         cabecalho regulatorio com identificacao do sistema, timestamp
         e indicacao de copia eletromica.
    tools:
      - data-transfer-validation
      - checksum-tools
      - tls-management
      - print-templates
  devsecops:
    prose: |
      **Verificacao de integridade no pipeline:**
      1. Implementar testes automatizados que verifiquem integridade de
         dados em interfaces entre sistemas GMP (checksums, contagem
         de registros, validacao de formato).
      2. Automatizar verificacao de que funcionalidades de impressao e
         copia incluem metadados regulatorios obrigatorios.
      3. Testar mecanismos de transferencia de dados como parte da
         qualificacao operacional de interfaces.
      4. Implementar testes de migracao de dados com verificacao automatica
         de completude e precisao.
    tools:
      - gitlab-ci
      - data-integrity-testing
      - interface-testing
      - migration-validation
  secops:
    prose: |
      **Governanca de copias e transferencias:**
      1. Estabelecer procedimento formal para geracao de copias de
         registros eletronicos GMP, incluindo requisitos regulatorios.
      2. Manter registro de todas as transferencias e migracoes de
         dados GMP com evidencias de verificacao de integridade.
      3. Treinar usuarios em procedimentos corretos de impressao e
         copia de registros eletronicos.
      4. Auditar periodicamente funcionalidades de impressao e copia
         para confirmar conformidade com requisitos regulatorios.
    tools:
      - quality-management-system
      - document-management
      - training-management
      - audit-management
