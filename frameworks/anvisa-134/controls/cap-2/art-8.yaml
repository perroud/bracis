id: art-8
family: cap-2
title: "Revisao Periodica de Riscos"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 8. A avaliação de risco de sistemas computadorizados deve ser
    revisada periodicamente e sempre que ocorrerem eventos que possam
    alterar o perfil de risco do sistema.

    Parágrafo 1. A revisão periódica deve ocorrer, no mínimo, anualmente
    para sistemas de alto risco e a cada dois anos para sistemas de médio
    e baixo risco.

    Parágrafo 2. Eventos que disparam revisão extraordinária da avaliação
    de risco incluem:
    I - mudanças significativas no sistema computadorizado;
    II - mudanças no processo de fabricação suportado pelo sistema;
    III - incidentes de segurança ou falhas críticas;
    IV - alterações nos requisitos regulatórios aplicáveis;
    V - resultados de auditorias internas ou inspeções regulatórias;
    VI - mudança de fornecedor ou provedor de serviços do sistema.
guidance:
  prose: |
    O art. 8 garante que avaliacoes de risco permanecem atuais e relevantes
    ao longo do ciclo de vida do sistema.

    **Frequencia de revisao recomendada:**
    - Alto risco: anual (obrigatorio) + eventos trigger
    - Medio risco: bienal (obrigatorio) + eventos trigger
    - Baixo risco: bienal (obrigatorio) + eventos trigger
    - Sistemas criticos de seguranca: semestral recomendado

    **Processo de revisao periodica:**
    1. Verificar se premissas originais da avaliacao permanecem validas
    2. Avaliar se novas ameacas ou vulnerabilidades foram identificadas
    3. Revisar eficacia das medidas de mitigacao implementadas
    4. Avaliar historico de incidentes e desvios desde ultima revisao
    5. Verificar mudancas no ambiente regulatorio
    6. Atualizar classificacao de risco se necessario
    7. Documentar conclusoes e acoes necessarias
    8. Obter aprovacao da unidade da qualidade

    **Rastreabilidade de revisoes:**
    Manter historico completo de todas as revisoes de risco, incluindo
    justificativas para manutencao ou alteracao do nivel de risco e
    acoes decorrentes de cada revisao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao de triggers de revisao de risco:**
      1. Configurar alertas automatizados que disparem notificacao de
         revisao de risco quando eventos trigger forem detectados:
         mudancas significativas de configuracao, incidentes de seguranca,
         falhas criticas de sistema.
      2. Implementar calendario automatizado de revisoes periodicas com
         notificacoes antecipadas (30, 15, 7 dias) para responsaveis.
      3. Integrar metricas de monitoramento de infraestrutura como inputs
         automaticos para revisao de risco (tendencias de incidentes,
         disponibilidade, performance).
      4. Gerar relatorio automatico de mudancas de infraestrutura desde
         ultima revisao de risco para facilitar avaliacao.
    tools:
      - alertmanager
      - calendar-automation
      - grafana
      - change-tracking
  devsecops:
    prose: |
      **Triggers de revisao no pipeline:**
      1. Detectar automaticamente mudancas significativas em sistemas GMP
         (ex: mais de N linhas alteradas, mudanca em modulos criticos)
         e notificar equipe de validacao para avaliacao de impacto.
      2. Integrar resultados de varreduras de seguranca como trigger de
         revisao de risco quando novas vulnerabilidades criticas forem
         detectadas em sistemas GMP.
      3. Gerar relatorio de mudancas acumuladas desde ultima revisao de
         risco como artefato de pipeline para facilitar avaliacao.
      4. Implementar gate que verifique se revisao de risco esta em dia
         antes de permitir deploys em producao GMP.
    tools:
      - gitlab-ci
      - change-impact-analysis
      - vulnerability-tracking
      - compliance-gates
  secops:
    prose: |
      **Programa de revisao periodica de riscos:**
      1. Manter calendario de revisoes periodicas de risco para todos
         os sistemas computadorizados GMP com alertas automaticos.
      2. Documentar criterios objetivos para identificacao de eventos
         trigger que exigem revisao extraordinaria.
      3. Manter registro historico de todas as revisoes de risco com
         comparativo de perfil de risco ao longo do tempo.
      4. Integrar resultados de revisao de risco ao programa de revisao
         periodica de sistemas validados (periodic review).
      5. Reportar indicadores de revisao de risco (conformidade com
         cronograma, mudancas de perfil de risco) a alta direcao.
    tools:
      - grc-platform
      - risk-register
      - periodic-review-system
      - quality-management-system
