id: art-4
family: cap-2
title: "Avaliacao de Risco de Sistemas Computadorizados"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 4. O fabricante deve realizar avaliação de risco documentada para
    cada sistema computadorizado utilizado em atividades reguladas, considerando
    o impacto potencial do sistema na qualidade do produto, na segurança do
    paciente e na integridade dos dados.

    Parágrafo 1. A avaliação de risco deve ser conduzida por equipe
    multidisciplinar que inclua, no mínimo, representantes das áreas de
    qualidade, tecnologia da informação, produção e validação.

    Parágrafo 2. A avaliação de risco deve ser revisada sempre que houver
    mudanças significativas no sistema, no processo de fabricação ou nos
    requisitos regulatórios aplicáveis.
guidance:
  prose: |
    O art. 4 exige uma avaliacao de risco formal e documentada como base
    para todas as atividades de validacao e controle de sistemas computadorizados.

    **Metodologias de avaliacao de risco aceitas:**
    - FMEA (Failure Mode and Effects Analysis)
    - HACCP (Hazard Analysis and Critical Control Points)
    - FTA (Fault Tree Analysis)
    - Matriz de risco (probabilidade x impacto x detectabilidade)
    - Abordagem GAMP 5 de avaliacao de risco funcional

    **Fatores a considerar na avaliacao:**
    - Impacto na qualidade do produto (CQA - Critical Quality Attributes)
    - Impacto na seguranca do paciente
    - Impacto na integridade dos dados regulatorios
    - Complexidade do sistema e numero de interfaces
    - Historico de falhas e desvios
    - Categoria GAMP do sistema (1 a 5)
    - Volume e criticidade dos dados processados
    - Requisitos regulatorios especificos aplicaveis

    **Composicao da equipe multidisciplinar:**
    A participacao de diferentes areas garante que riscos tecnicos, operacionais
    e regulatorios sejam adequadamente identificados e avaliados. O SME (Subject
    Matter Expert) de cada area contribui com perspectiva unica sobre modos de
    falha potenciais.
implementation_guidance:
  platform_engineering:
    prose: |
      **Framework de avaliacao de risco em infraestrutura:**
      1. Implementar templates de avaliacao de risco como codigo versionado
         para cada categoria GAMP, incluindo checklists automatizados de
         fatores de risco de infraestrutura.
      2. Integrar metricas de monitoramento de sistemas (disponibilidade,
         latencia, taxa de erros) como inputs para avaliacao de risco
         continua e automatizada.
      3. Configurar alertas baseados em limiares de risco que disparem
         reavaliacao automatica quando metricas criticas degradarem.
      4. Manter registro de risco de infraestrutura como artefato GitOps
         versionado e auditavel.
    tools:
      - risk-assessment-templates
      - prometheus
      - grafana
      - gitops
  devsecops:
    prose: |
      **Integracacao de avaliacao de risco no ciclo de desenvolvimento:**
      1. Exigir avaliacao de risco como artefato obrigatorio no pipeline
         antes do primeiro deploy de qualquer sistema GMP novo.
      2. Implementar checklist automatizado de avaliacao de risco em merge
         requests que afetem sistemas computadorizados criticos.
      3. Vincular resultados de varredura de seguranca (SAST/DAST) a
         avaliacao de risco do sistema para atualizacao continua do
         perfil de risco.
      4. Gerar relatorio de risco residual automaticamente apos execucao
         completa do pipeline de seguranca.
    tools:
      - gitlab-ci
      - sast
      - dast
      - risk-assessment
  secops:
    prose: |
      **Programa de gestao de riscos de sistemas computadorizados:**
      1. Estabelecer procedimento operacional padrao (POP) para avaliacao
         de risco de sistemas computadorizados alinhado ao ICH Q9.
      2. Manter registro centralizado de todas as avaliacoes de risco com
         status de mitigacao e datas de revisao.
      3. Conduzir revisao periodica (minimo anual) de avaliacoes de risco
         de sistemas criticos com equipe multidisciplinar.
      4. Integrar avaliacao de risco de sistemas computadorizados ao
         programa geral de gestao de riscos da qualidade farmaceutica.
      5. Documentar criterios de aceitacao de risco residual aprovados
         pela alta direcao.
    tools:
      - grc-platform
      - risk-register
      - quality-management-system
