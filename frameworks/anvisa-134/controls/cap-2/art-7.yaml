id: art-7
family: cap-2
title: "Mitigacao e Tratamento de Riscos"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 7. Para cada risco identificado na avaliação de risco, o fabricante
    deve definir e implementar medidas de mitigação adequadas para reduzir
    o risco a níveis aceitáveis.

    Parágrafo 1. As medidas de mitigação devem ser documentadas e incluir:
    I - controles técnicos implementados no sistema computadorizado;
    II - controles procedurais aplicados pelos usuários;
    III - controles organizacionais de governança e supervisão;
    IV - cronograma de implementação e responsáveis.

    Parágrafo 2. O risco residual após aplicação das medidas de mitigação
    deve ser formalmente avaliado e aceito pela unidade da qualidade
    antes da entrada do sistema em operação produtiva.
guidance:
  prose: |
    O art. 7 exige tratamento formal de cada risco identificado com
    documentacao completa das medidas de mitigacao.

    **Hierarquia de controles de mitigacao (preferencia):**
    1. Eliminacao: redesenho do processo para eliminar o risco
    2. Controle tecnico automatizado: validacao de dados, interlocks,
       checksums, controles de acesso automaticos
    3. Controle tecnico manual: verificacoes manuais, dupla conferencia
    4. Controle procedimental: SOPs, treinamento, supervisao
    5. Controle detectivo: trilhas de auditoria, monitoramento, revisao

    **Criterios de aceitacao de risco residual:**
    - Risco residual deve ser classificado como baixo ou aceitavel
    - Riscos residuais medios exigem plano de monitoramento especifico
    - Riscos residuais altos nao sao aceitaveis sem aprovacao excepcional
       da diretoria e plano de remediacao com prazo definido

    **Documentacao minima por risco:**
    - Descricao do risco e modo de falha
    - Probabilidade, impacto e detectabilidade (antes e apos mitigacao)
    - Medidas de mitigacao implementadas (tecnicas + procedurais)
    - Risco residual avaliado e aceito formalmente
    - Responsavel e data de implementacao
implementation_guidance:
  platform_engineering:
    prose: |
      **Controles tecnicos de mitigacao em infraestrutura:**
      1. Implementar controles automatizados de infraestrutura para riscos
         identificados: health checks, auto-healing, circuit breakers,
         rate limiting, input validation.
      2. Configurar politicas de seguranca como codigo que implementem
         medidas de mitigacao tecnicas (network policies, pod security,
         resource limits).
      3. Automatizar verificacao continua de que controles de mitigacao
         estao ativos e funcionais via synthetic monitoring.
      4. Manter registro de controles tecnicos implementados vinculado
         ao registro de risco para rastreabilidade completa.
    tools:
      - kubernetes
      - opa-gatekeeper
      - kyverno
      - synthetic-monitoring
  devsecops:
    prose: |
      **Controles de mitigacao no pipeline:**
      1. Traduzir medidas de mitigacao tecnicas em verificacoes automatizadas
         no pipeline CI/CD (quality gates que validam controles ativos).
      2. Implementar testes especificos para cada risco identificado que
         verifiquem a eficacia do controle de mitigacao.
      3. Bloquear deploy quando controles de mitigacao criticos nao estiverem
         implementados ou funcionais.
      4. Gerar relatorio automatico de status de mitigacao como artefato
         de cada execucao de pipeline.
    tools:
      - gitlab-ci
      - quality-gates
      - automated-testing
      - compliance-reporting
  secops:
    prose: |
      **Programa de gestao de mitigacao de riscos:**
      1. Manter registro de riscos (risk register) com status de mitigacao
         atualizado para cada sistema computadorizado GMP.
      2. Monitorar eficacia das medidas de mitigacao atraves de indicadores
         (frequencia de desvios, incidentes, falhas de controle).
      3. Conduzir revisao formal de risco residual com unidade da qualidade
         antes da liberacao de sistemas para producao.
      4. Escalar riscos residuais que excedam criterios de aceitacao para
         decisao da alta direcao com prazo definido de remediacao.
      5. Documentar todas as decisoes de aceitacao de risco em registros
         auditaveis no sistema de gestao da qualidade.
    tools:
      - grc-platform
      - risk-register
      - quality-management-system
      - incident-management
