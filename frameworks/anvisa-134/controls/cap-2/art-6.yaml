id: art-6
family: cap-2
title: "Abordagem Baseada em Risco para Ciclo de Vida"
class: ANVISA-134
baselines: [pharma-computerized-systems]
statement:
  prose: |
    Art. 6. O esforço de validação e os controles aplicados a cada sistema
    computadorizado devem ser proporcionais ao nível de risco identificado
    na avaliação de risco, conforme abordagem baseada em risco.

    Parágrafo 1. Sistemas de alto risco devem ser submetidos a validação
    completa do ciclo de vida, incluindo todas as fases de qualificação
    (IQ, OQ, PQ), monitoramento contínuo e revalidação periódica.

    Parágrafo 2. Sistemas de baixo risco podem ser submetidos a processos
    de verificação simplificados, desde que justificados pela avaliação de
    risco e aprovados pela unidade da qualidade.

    Parágrafo 3. A abordagem baseada em risco deve ser documentada no plano
    mestre de validação e aplicada de forma consistente em toda a organização.
guidance:
  prose: |
    O art. 6 formaliza o principio de proporcionalidade entre risco e esforco
    de validacao, alinhado com as diretrizes do GAMP 5 e ICH Q9.

    **Niveis de esforco de validacao:**

    Alto risco (validacao completa):
    - Especificacao de requisitos de usuario (URS) detalhada
    - Especificacao funcional (FS) e de design (DS)
    - Avaliacao de risco funcional completa
    - IQ, OQ e PQ com protocolos formais
    - Testes de estresse e carga
    - Revisao periodica e revalidacao anual
    - Monitoramento continuo de desempenho

    Medio risco (validacao padrao):
    - URS e verificacao funcional
    - Avaliacao de risco simplificada
    - OQ com foco em funcionalidades criticas
    - Revisao periodica bienal

    Baixo risco (verificacao simplificada):
    - Verificacao de instalacao e configuracao
    - Testes funcionais basicos
    - Revisao periodica trienal

    **Principio ICH Q9:**
    O nivel de esforco, formalidade e documentacao do processo de gestao de
    risco da qualidade deve ser proporcional ao nivel de risco. A abordagem
    nao deve ser uniformemente rigorosa nem uniformemente simplificada.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura proporcional ao risco:**
      1. Definir perfis de infraestrutura diferenciados por nivel de risco:
         alto risco (HA multi-zona, backup continuo, monitoramento 24x7),
         medio risco (HA single-zona, backup diario, monitoramento horario),
         baixo risco (single instance, backup semanal, monitoramento diario).
      2. Implementar provisionamento automatizado que aplique o perfil de
         infraestrutura correto baseado na classificacao de risco do sistema.
      3. Configurar SLOs diferenciados por nivel de risco com alertas
         automaticos quando thresholds forem violados.
      4. Manter documentacao de decisoes de infraestrutura justificadas
         pela avaliacao de risco como artefatos versionados.
    tools:
      - terraform
      - kubernetes
      - prometheus
      - slo-management
  devsecops:
    prose: |
      **Pipelines proporcionais ao risco:**
      1. Criar tres templates de pipeline CI/CD mapeados aos niveis de risco:
         pipeline-gmp-high, pipeline-gmp-medium, pipeline-gmp-low.
      2. Pipeline alto risco: SAST, DAST, SCA, fuzzing, testes de integracao,
         testes de performance, cobertura minima 90%, 3 aprovadores.
      3. Pipeline medio risco: SAST, SCA, testes de integracao, cobertura
         minima 75%, 2 aprovadores.
      4. Pipeline baixo risco: SAST, testes unitarios, cobertura minima 60%,
         1 aprovador.
      5. Documentar justificativa da selecao de pipeline no merge request.
    tools:
      - gitlab-ci
      - pipeline-templates
      - sast
      - dast
      - dependency-scanning
  secops:
    prose: |
      **Governanca de abordagem baseada em risco:**
      1. Documentar no plano mestre de validacao (VMP) os criterios para
         atribuicao de nivel de risco e esforco de validacao correspondente.
      2. Assegurar que a unidade da qualidade aprove o nivel de esforco
         de validacao para cada sistema antes do inicio das atividades.
      3. Manter evidencias de que a abordagem baseada em risco e aplicada
         consistentemente em toda a organizacao.
      4. Auditar periodicamente a adequacao entre nivel de risco atribuido
         e esforco de validacao efetivamente aplicado.
      5. Reportar indicadores de proporcionalidade (sistemas por nivel de
         risco, conformidade com esforco esperado) a alta direcao.
    tools:
      - grc-platform
      - validation-master-plan
      - quality-management-system
      - audit-management
