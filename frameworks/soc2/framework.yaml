baselines:
  - id: type-i
    title: "SOC 2 Type I — Point-in-Time Assessment"
    description: >-
      Evaluates the design and implementation of controls at a specific point in time.
      Reports on whether the service organization's system description is fairly presented
      and the controls are suitably designed to meet the applicable trust services criteria
      as of a specified date.
  - id: type-ii
    title: "SOC 2 Type II — Period-of-Time Assessment"
    description: >-
      Evaluates the design, implementation, and operating effectiveness of controls over
      a period of time (typically 3-12 months). Reports on whether controls operated
      effectively throughout the examination period to meet the applicable trust services criteria.
    inherits_from: [type-i]
