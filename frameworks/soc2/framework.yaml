trust_service_categories:
  - id: security
    title: "Security (Common Criteria)"
    description: >-
      Information and systems are protected against unauthorized access, unauthorized
      disclosure of information, and damage to systems that could compromise the
      availability, integrity, confidentiality, and privacy of information or systems
      and affect the entity's ability to meet its objectives.
    families: [cc1, cc2, cc3, cc4, cc5, cc6, cc7, cc8, cc9]
    required: true
  - id: availability
    title: "Availability"
    description: >-
      Information and systems are available for operation and use to meet the entity's objectives.
    families: [a1]
    required: false
  - id: processing-integrity
    title: "Processing Integrity"
    description: >-
      System processing is complete, valid, accurate, timely, and authorized to meet the entity's objectives.
    families: [pi1]
    required: false
  - id: confidentiality
    title: "Confidentiality"
    description: >-
      Information designated as confidential is protected to meet the entity's objectives.
    families: [c1]
    required: false
  - id: privacy
    title: "Privacy"
    description: >-
      Personal information is collected, used, retained, disclosed, and disposed of
      to meet the entity's objectives.
    families: [p1]
    required: false
