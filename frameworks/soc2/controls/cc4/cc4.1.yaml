id: cc4.1
family: cc4
title: "COSO Principle 16 — Selects, develops, and performs ongoing and/or separate evaluations"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity selects, develops, and performs ongoing and/or separate evaluations to
    ascertain whether the components of internal control are present and functioning.
    The entity considers a mix of ongoing and separate evaluations, considers the rate
    of change, establishes baseline understanding, uses knowledgeable personnel, and
    integrates with business processes.
guidance:
  prose: >-
    The organization must continuously monitor and periodically evaluate the effectiveness
    of its internal controls. This includes automated monitoring (ongoing evaluations) and
    periodic assessments such as internal audits, penetration tests, and control effectiveness
    reviews. For technology organizations, this means continuous security monitoring through
    SIEM and observability tools, regular vulnerability assessments, penetration testing,
    and periodic internal compliance assessments.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement continuous compliance monitoring through automated policy evaluation
      across all platform services. Deploy runtime security monitoring for containers
      and workloads. Conduct regular platform security assessments and penetration tests.
      Implement automated drift detection that identifies when configurations deviate
      from desired state. Use compliance-as-code to continuously evaluate control
      effectiveness.
    tools:
      - "Open Policy Agent (OPA) / Gatekeeper"
      - "Falco (runtime security)"
      - "Cloud security posture management (CSPM)"
      - "Terraform drift detection"
      - "Kyverno policy reports"
  devsecops:
    prose: >-
      Implement continuous security scanning in CI/CD pipelines as ongoing evaluation.
      Track security finding trends over time to assess control effectiveness. Schedule
      regular DAST scans against production environments. Conduct periodic pipeline
      security reviews to verify that security gates are functioning. Monitor security
      scan coverage across all repositories.
    tools:
      - "GitLab Security Dashboard (trend analysis)"
      - "GitLab DAST (scheduled scans)"
      - "GitLab Compliance Dashboard"
      - "Pipeline security audit scripts"
  secops:
    prose: >-
      Implement a continuous monitoring program that includes real-time security event
      monitoring, periodic vulnerability assessments, annual penetration testing, and
      regular internal control assessments. Track control effectiveness metrics over time.
      Conduct tabletop exercises for incident response procedures. Schedule and track
      completion of all evaluation activities.
    tools:
      - "SIEM (continuous monitoring)"
      - "Vulnerability management platforms (Qualys, Tenable)"
      - "Penetration testing tools and services"
      - "GRC Platforms (assessment tracking)"