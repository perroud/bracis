id: cc4.2
family: cc4
title: "COSO Principle 17 — Evaluates and communicates deficiencies"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity evaluates and communicates internal control deficiencies in a timely manner
    to those parties responsible for taking corrective action, including senior management
    and the board of directors, as appropriate. The entity assesses results, communicates
    deficiencies, and monitors corrective actions.
guidance:
  prose: >-
    When control deficiencies are identified through monitoring or assessments, the
    organization must evaluate their severity, communicate them to appropriate parties,
    and track corrective actions to completion. For technology organizations, this means
    vulnerability findings are triaged and escalated based on severity, security incidents
    are reported to management, audit findings are tracked to remediation, and the board
    receives regular reports on the state of internal controls.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated alerting for control failures (e.g., policy violations detected
      by OPA, failed compliance checks, configuration drift). Route alerts to appropriate
      teams based on severity and ownership. Create automated remediation workflows for
      common deficiencies. Track remediation SLAs through ticketing integration.
    tools:
      - "PagerDuty / Opsgenie (alerting)"
      - "Jira / GitLab Issues (deficiency tracking)"
      - "Grafana alerting"
      - "Automated remediation (Kubernetes operators)"
  devsecops:
    prose: >-
      Configure security scanning to automatically create issues for identified
      vulnerabilities. Implement severity-based SLAs for vulnerability remediation.
      Generate automated reports of security findings and remediation progress. Escalate
      unresolved critical and high findings through automated workflows. Track
      vulnerability aging and SLA compliance metrics.
    tools:
      - "GitLab Vulnerability Management"
      - "GitLab Issue tracking (auto-creation)"
      - "GitLab Security Dashboard"
      - "Jira integration for escalation"
  secops:
    prose: >-
      Establish a formal deficiency management process including classification, root
      cause analysis, remediation tracking, and verification. Define severity levels with
      corresponding remediation SLAs. Report control deficiencies to senior management
      through regular security reports. Escalate significant deficiencies to the board
      or audit committee. Track corrective action plans to completion with evidence
      of remediation effectiveness.
    tools:
      - "GRC Platforms (finding management)"
      - "ITSM (corrective action tracking)"
      - "Board reporting tools"
      - "Risk register (residual risk updates)"
