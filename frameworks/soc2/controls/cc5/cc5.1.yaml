id: cc5.1
family: cc5
title: "COSO Principle 10 — Selects and develops control activities"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity selects and develops control activities that contribute to the mitigation
    of risks to the achievement of objectives to acceptable levels. The entity considers
    a variety of control types, considers the relevant business processes, considers
    entity-specific factors, evaluates a mix of control types, and considers at what
    level activities are applied.
guidance:
  prose: >-
    The organization must design and implement control activities that effectively mitigate
    identified risks. Control activities should include a mix of preventive, detective,
    corrective, and compensating controls applied at appropriate levels. For technology
    organizations, this means implementing technical controls (firewalls, encryption,
    access controls), process controls (change management, incident response), and
    administrative controls (policies, training, reviews) across infrastructure,
    application, and operational layers.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a defense-in-depth strategy with controls at every platform layer.
      Use network policies for micro-segmentation, pod security standards for workload
      hardening, admission controllers for policy enforcement, and service mesh for
      mutual TLS. Layer preventive controls (admission controllers) with detective
      controls (runtime monitoring) and corrective controls (auto-remediation).
    tools:
      - "Kubernetes Network Policies / Cilium"
      - "Pod Security Standards / Admission Controllers"
      - "Istio / Linkerd (service mesh)"
      - "Falco (runtime detection)"
      - "OPA Gatekeeper (preventive)"
  devsecops:
    prose: >-
      Implement layered security controls across the SDLC: pre-commit hooks (preventive),
      CI pipeline scanning (detective), merge request approval gates (preventive),
      deployment policy checks (preventive), and post-deployment monitoring (detective).
      Select controls based on risk assessment results — higher-risk components require
      more stringent controls.
    tools:
      - "GitLab CI/CD Security Scanning"
      - "GitLab Approval Rules"
      - "GitLab Protected Environments"
      - "Pre-commit hooks (detect-secrets, talisman)"
      - "GitLab Compliance Pipelines"
  secops:
    prose: >-
      Document the control framework mapping risks to control activities. Ensure each
      significant risk has at least one preventive and one detective control. Define
      control owners and test procedures. Maintain a controls matrix that documents
      control type, frequency, automation level, and evidence sources. Review control
      design effectiveness during annual assessments.
    tools:
      - "GRC Platforms (control framework)"
      - "Controls matrix documentation"
      - "Risk-control mapping tools"