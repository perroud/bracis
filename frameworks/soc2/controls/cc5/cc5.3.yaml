id: cc5.3
family: cc5
title: "COSO Principle 12 — Deploys through policies and procedures"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity deploys control activities through policies that establish what is expected
    and procedures that put policies into action. The entity establishes policies and
    procedures to support deployment of management's directives, establishes responsibility
    and accountability for executing policies and procedures, performs in a timely manner,
    takes corrective action, performs using competent personnel, and reassesses policies
    and procedures.
guidance:
  prose: >-
    The organization must translate control objectives into documented policies and
    actionable procedures, assign responsibility for execution, and ensure timely
    performance. For technology organizations, this means every security control has a
    documented policy, a corresponding procedure or runbook, an assigned owner, and a
    defined cadence for execution and review. Policies must be enforceable and procedures
    must be specific enough to be consistently executed.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement policy-as-code to translate policies into automatically enforced rules.
      Maintain operational runbooks in version-controlled documentation alongside the
      platform code they relate to. Define on-call rotation and escalation procedures
      for all platform services. Automate routine procedures to ensure consistent
      execution and reduce human error.
    tools:
      - "OPA / Kyverno (policy enforcement)"
      - "Backstage TechDocs (runbooks)"
      - "PagerDuty (on-call management)"
      - "GitLab CI/CD (procedure automation)"
  devsecops:
    prose: >-
      Implement compliance pipelines that automatically enforce organizational policies
      during the development lifecycle. Use merge request templates to ensure procedures
      are followed for code changes. Define and enforce branch naming conventions,
      commit message standards, and review requirements through Git hooks and CI
      pipeline rules. Document and automate deployment procedures.
    tools:
      - "GitLab Compliance Pipelines"
      - "GitLab Merge Request Templates"
      - "GitLab Push Rules"
      - "CI/CD pipeline templates"
  secops:
    prose: >-
      Maintain a policy library with version control, defined review cadence, and
      assigned ownership. Document procedures for all control activities with step-by-step
      instructions. Track policy acknowledgments and procedure execution through a GRC
      platform. Conduct periodic reviews of policy and procedure effectiveness.
      Update policies and procedures when changes occur or deficiencies are identified.
    tools:
      - "GRC Platforms (policy management)"
      - "Document management systems"
      - "Workflow automation (ServiceNow)"
      - "Policy acknowledgment tracking"
