id: cc5.2
family: cc5
title: "COSO Principle 11 — Selects and develops general controls over technology"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity also selects and develops general control activities over technology to
    support the achievement of objectives. The entity determines the dependency between
    the use of technology in business processes and technology general controls, establishes
    relevant technology infrastructure control activities, establishes relevant security
    management process control activities, and establishes relevant technology acquisition,
    development, and maintenance process control activities.
guidance:
  prose: >-
    The organization must implement IT general controls (ITGCs) that provide the foundation
    for all other controls that depend on technology. ITGCs include access management for
    technology infrastructure, change management for systems and applications, IT operations
    controls, and technology acquisition and development controls. These are the controls
    that SOC 2 auditors examine most closely because weaknesses in ITGCs undermine all
    dependent controls.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement comprehensive ITGCs across the platform stack. This includes centralized
      identity management (SSO/SAML), infrastructure-as-code with version control and
      peer review, automated patching and update processes, backup and recovery automation,
      and monitoring for all infrastructure components. Standardize technology stacks to
      reduce control complexity.
    tools:
      - "Identity Providers (Okta, Azure AD)"
      - "Terraform / Pulumi (IaC)"
      - "Automated patching (OS, container base images)"
      - "Velero / Kasten (backup)"
      - "Prometheus + Grafana (monitoring)"
  devsecops:
    prose: >-
      Enforce version control for all code and configuration. Require peer review for
      all changes through merge request approval rules. Implement automated testing
      including security tests in CI/CD pipelines. Maintain separate environments
      (development, staging, production) with promotion controls. Enforce infrastructure-
      as-code practices for all infrastructure changes.
    tools:
      - "GitLab Version Control"
      - "GitLab Merge Request Approvals"
      - "GitLab CI/CD Pipelines"
      - "GitLab Protected Environments"
      - "GitLab IaC Scanning"
  secops:
    prose: >-
      Document and test all ITGCs including access provisioning/deprovisioning, change
      management, backup/recovery, and incident management. Conduct quarterly access
      reviews for technology infrastructure. Monitor ITGC operating effectiveness through
      continuous monitoring and periodic testing. Track ITGC exceptions and remediation.
    tools:
      - "GRC Platforms (ITGC testing)"
      - "IAM tools (access review automation)"
      - "ITSM (change management)"
      - "Backup monitoring tools"