id: cc2.1
family: cc2
title: "COSO Principle 13 — Obtains or generates relevant, quality information"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity obtains or generates and uses relevant, quality information to support
    the functioning of internal control. The entity identifies information requirements,
    captures internal and external sources of data, processes relevant data into information,
    maintains quality throughout processing, and considers costs and benefits.
guidance:
  prose: >-
    The organization must identify information needed to support internal controls and
    ensure that information is accurate, complete, timely, and relevant. For technology
    organizations, this means implementing comprehensive logging and monitoring, maintaining
    accurate asset inventories, collecting security telemetry from all relevant sources,
    and ensuring data quality in systems that support control activities.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement centralized logging infrastructure that aggregates logs from all platform
      components. Maintain an automated service catalog and asset inventory. Deploy
      observability stacks (metrics, logs, traces) across all services. Ensure data
      quality through schema validation, automated data pipeline monitoring, and
      reconciliation checks. Implement structured logging standards across all services.
    tools:
      - "ELK Stack / OpenSearch"
      - "Prometheus + Grafana"
      - "OpenTelemetry"
      - "Backstage Service Catalog"
      - "Datadog / New Relic"
  devsecops:
    prose: >-
      Collect and aggregate security scan results from all pipeline stages into a
      centralized dashboard. Maintain Software Bill of Materials (SBOM) for all
      deployable artifacts. Implement pipeline telemetry to track build, test, and
      deployment metrics. Ensure security scan configurations are version-controlled
      and validated for accuracy.
    tools:
      - "GitLab Security Dashboard"
      - "GitLab Dependency List"
      - "SBOM generation (Syft, CycloneDX)"
      - "GitLab CI/CD Analytics"
  secops:
    prose: >-
      Implement a SIEM to aggregate, correlate, and analyze security events from all
      relevant sources. Maintain a Configuration Management Database (CMDB) with accurate
      asset inventory. Define data classification schemes and apply them consistently.
      Establish data quality metrics and monitoring for security-relevant information
      sources. Conduct regular data validation exercises.
    tools:
      - "SIEM (Splunk, Elastic Security, Microsoft Sentinel)"
      - "CMDB (ServiceNow, Snipe-IT)"
      - "Threat Intelligence Platforms"
      - "Log management solutions"