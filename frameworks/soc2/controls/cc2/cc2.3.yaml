id: cc2.3
family: cc2
title: "COSO Principle 15 — Communicates externally"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity communicates with external parties regarding matters affecting the
    functioning of internal control. The entity communicates to external parties,
    enables inbound communications, communicates with the board of directors regarding
    external communications, provides separate communication lines such as whistle-blower
    hotlines, and selects relevant methods of communication.
guidance:
  prose: >-
    The organization must communicate with external parties (customers, regulators,
    vendors, auditors) regarding matters that affect internal controls. This includes
    publishing security practices, notifying customers of incidents, providing channels
    for external parties to report security concerns, and communicating changes to
    service commitments. For SaaS companies, this means maintaining a public trust center,
    security disclosure policy, and customer notification processes.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement and maintain a public-facing status page for service availability.
      Publish an external API changelog and deprecation notices. Provide a security.txt
      file at the well-known URI path. Maintain a public trust center or security page
      with current compliance certifications and security practices overview.
    tools:
      - "Statuspage (public)"
      - "Trust Center (Vanta, SafeBase)"
      - "security.txt (RFC 9116)"
      - "API documentation portals"
  devsecops:
    prose: >-
      Implement a vulnerability disclosure program with a clear intake process for
      external security reports. Automate customer notification workflows for security
      incidents affecting their data. Maintain version-controlled external communication
      templates for incident notifications. Publish security advisories for product
      vulnerabilities through established channels.
    tools:
      - "Bug bounty platforms (HackerOne, Bugcrowd)"
      - "GitLab Security Advisories"
      - "Automated notification pipelines"
  secops:
    prose: >-
      Maintain documented procedures for external security communications including
      breach notification, regulatory reporting, and customer advisories. Establish a
      vulnerability disclosure policy (VDP) with defined SLAs for response. Conduct
      regular reviews of third-party communication effectiveness. Ensure compliance
      with breach notification timelines required by applicable regulations.
    tools:
      - "Incident communication platforms (Statuspage, PagerDuty)"
      - "GRC Platforms (breach notification tracking)"
      - "Legal notification templates"
      - "Regulatory reporting tools"
