id: cc2.2
family: cc2
title: "COSO Principle 14 — Communicates internally"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity internally communicates information, including objectives and responsibilities
    for internal control, necessary to support the functioning of internal control.
    The entity communicates with the board of directors, communicates within the entity,
    and selects relevant methods of communication.
guidance:
  prose: >-
    The organization must ensure that internal control information, objectives, and
    responsibilities are communicated effectively to all relevant personnel. This includes
    communicating security policies, incident information, control changes, and risk
    information to appropriate stakeholders using effective channels. For technology
    organizations, this means security advisories, status pages, runbook updates, and
    control change notifications are communicated through established channels.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated notification systems for security advisories, platform changes,
      and incident communications. Use internal status pages and service health dashboards
      that are accessible to all relevant teams. Publish change logs and release notes
      for platform changes. Maintain internal documentation portals with up-to-date
      security policies and procedures.
    tools:
      - "Backstage TechDocs"
      - "Statuspage (internal)"
      - "Slack / Microsoft Teams (automated notifications)"
      - "GitLab Release Notes"
  devsecops:
    prose: >-
      Use merge request comments and CI pipeline notifications to communicate security
      findings directly to developers. Implement automated security alerts in team
      communication channels when critical vulnerabilities are detected. Publish security
      policy changes through version-controlled documentation with merge request
      notifications to affected teams.
    tools:
      - "GitLab Merge Request notifications"
      - "GitLab Security Alerts"
      - "Slack / Teams integrations"
      - "GitLab Wiki (security documentation)"
  secops:
    prose: >-
      Establish formal communication channels for security information including incident
      notifications, threat advisories, policy updates, and control changes. Document
      communication procedures in the incident response plan and security program charter.
      Maintain distribution lists for security communications. Track acknowledgment of
      critical security communications.
    tools:
      - "Incident management (PagerDuty, Opsgenie)"
      - "Email distribution lists"
      - "Slack / Teams security channels"
      - "GRC Platform notifications"
