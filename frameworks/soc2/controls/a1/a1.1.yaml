id: a1.1
family: a1
title: "Availability commitments and system requirements"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity maintains, monitors, and evaluates current processing capacity and use of
    system components (infrastructure, data, and software) to manage capacity demand and
    to enable the implementation of additional capacity to help meet its objectives.
guidance:
  prose: >-
    The organization must actively manage system capacity to ensure availability commitments
    are met. This includes monitoring current capacity utilization, forecasting future
    demand, implementing auto-scaling where appropriate, and planning capacity additions
    before they are needed. The organization must demonstrate that it can meet its
    availability SLAs through proper capacity management.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement comprehensive capacity monitoring across all platform components including
      CPU, memory, storage, network bandwidth, and application-specific metrics. Deploy
      auto-scaling at multiple layers (cluster, pod, cloud resources). Set capacity
      alerting thresholds that trigger before saturation. Conduct capacity planning
      exercises based on growth projections. Implement resource quotas to prevent
      resource starvation.
    tools:
      - "Prometheus + Grafana (capacity monitoring)"
      - "Kubernetes HPA/VPA/Karpenter (auto-scaling)"
      - "Cloud auto-scaling groups"
      - "Resource quotas and limit ranges"
      - "Capacity planning tools"
  devsecops:
    prose: >-
      Implement performance testing in CI/CD pipelines to identify capacity impacts of
      code changes before production deployment. Monitor pipeline infrastructure capacity
      to ensure CI/CD does not become a bottleneck. Implement load testing as part of
      release criteria for significant changes.
    tools:
      - "Performance testing (k6, Locust, Gatling)"
      - "GitLab CI/CD runner scaling"
      - "Load testing in pipelines"
      - "GitLab Performance Testing integration"
  secops:
    prose: >-
      Define and document availability SLAs with customers and internal stakeholders.
      Monitor SLA compliance through uptime tracking and reporting. Maintain capacity
      planning documentation with regular reviews. Track capacity-related incidents and
      near-misses. Report availability metrics to management regularly.
    tools:
      - "Uptime monitoring (Pingdom, Datadog Synthetics)"
      - "SLA tracking and reporting"
      - "Capacity planning documentation"
      - "Incident tracking (capacity-related)"
