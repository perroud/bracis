id: a1.3
family: a1
title: "Recovery plan testing"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity tests recovery plan procedures supporting system recovery to meet its
    objectives.
guidance:
  prose: >-
    The organization must regularly test its recovery procedures to ensure they work as
    expected when needed. Testing should cover various failure scenarios and validate that
    recovery can be completed within defined RTO and RPO targets. Test results must be
    documented and any issues identified during testing must be remediated. Testing
    frequency should be risk-based, with critical systems tested more frequently.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement regular disaster recovery testing through automated DR pipelines. Conduct
      chaos engineering exercises to validate resilience and recovery capabilities. Test
      failover between availability zones and regions. Validate backup restoration for
      all critical data stores. Measure actual RTO and RPO against defined targets.
      Document test results and remediate any gaps.
    tools:
      - "Chaos engineering (Litmus, Gremlin, Chaos Monkey)"
      - "Automated DR test pipelines"
      - "Failover testing automation"
      - "Backup restoration testing"
  devsecops:
    prose: >-
      Create CI/CD pipelines that automate recovery testing on a scheduled basis.
      Implement blue-green deployment testing to validate rapid cutover capability.
      Test application recovery from container restart, pod eviction, and node failure
      scenarios. Document recovery test procedures and results in version control.
    tools:
      - "GitLab CI/CD (scheduled DR test pipelines)"
      - "Kubernetes pod disruption budgets"
      - "Blue-green deployment testing"
      - "Recovery runbook automation"
  secops:
    prose: >-
      Conduct formal DR tests at least annually, with critical systems tested more
      frequently. Document test scenarios, procedures, participants, results, and
      corrective actions. Track RTO/RPO achievement during tests. Report DR test results
      to management. Maintain a DR test calendar and ensure all critical systems are
      covered. Remediate issues identified during testing and retest as needed.
    tools:
      - "DR test planning and documentation"
      - "Tabletop exercise frameworks"
      - "RTO/RPO measurement tools"
      - "GRC Platforms (DR test tracking)"
