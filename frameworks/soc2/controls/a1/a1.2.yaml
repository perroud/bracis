id: a1.2
family: a1
title: "Environmental protections, software, data backup, and recovery infrastructure"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity authorizes, designs, develops or acquires, implements, operates, approves,
    maintains, and monitors environmental protections, software, data backup processes,
    and recovery infrastructure to meet its objectives.
guidance:
  prose: >-
    The organization must implement environmental controls, backup processes, and recovery
    infrastructure to maintain system availability. This includes protection against
    environmental threats (power failures, cooling failures, natural disasters), regular
    data backups with tested restoration procedures, and recovery infrastructure that can
    be activated when primary systems fail. Backup and recovery must be tested regularly,
    not just documented.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated backup solutions for all persistent data including databases,
      object storage, and configuration data. Deploy across multiple availability zones
      with automatic failover. Implement point-in-time recovery for databases. Test
      backup restoration regularly through automated DR exercises. Maintain immutable
      backup copies to protect against ransomware.
    tools:
      - "Velero / Kasten (Kubernetes backup)"
      - "Cloud provider backup services (RDS snapshots, GCS versioning)"
      - "Multi-AZ deployments"
      - "Database replication and failover"
      - "Immutable backup storage (S3 Object Lock)"
  devsecops:
    prose: >-
      Implement infrastructure-as-code for all backup and recovery infrastructure to
      ensure reproducibility. Include backup verification tests in CI/CD pipelines.
      Maintain disaster recovery runbooks in version control. Implement automated DR
      testing pipelines that periodically verify backup integrity and restoration
      procedures.
    tools:
      - "Terraform / Pulumi (backup infrastructure as code)"
      - "Automated DR test pipelines"
      - "GitLab CI/CD (backup verification jobs)"
      - "IaC scanning for backup configuration"
  secops:
    prose: >-
      Define and document backup policy including backup frequency, retention periods,
      storage locations, and encryption requirements. Test backup restoration at least
      quarterly. Maintain disaster recovery procedures with defined RTO and RPO for each
      critical system. Track backup success/failure rates. Verify cloud provider
      environmental controls through their SOC 2 reports.
    tools:
      - "Backup monitoring and reporting"
      - "DR orchestration platforms"
      - "Environmental monitoring (for on-premises)"
      - "Cloud provider SOC 2 reports"
