id: cc7.2
family: cc7
title: "Monitoring system components for anomalies"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity monitors system components and the operation of those components for
    anomalies that are indicative of malicious acts, natural disasters, and errors
    affecting the entity's ability to meet its objectives; anomalies are analyzed to
    determine whether they represent security events.
guidance:
  prose: >-
    The organization must implement monitoring that can detect anomalous behavior across
    system components. This goes beyond vulnerability detection to behavioral monitoring —
    detecting unusual patterns that may indicate a security incident, operational failure,
    or environmental threat. Monitoring must cover network traffic, application behavior,
    user activity, and system performance, with correlation and analysis capabilities to
    distinguish true security events from noise.
implementation_guidance:
  platform_engineering:
    prose: >-
      Deploy comprehensive observability across the platform including metrics, logs, and
      traces. Implement anomaly detection for resource utilization, network traffic
      patterns, and API call volumes. Use runtime security tools to detect unexpected
      process execution, network connections, and file system modifications in containers.
      Set up alerting thresholds with escalation paths.
    tools:
      - "Prometheus + Grafana (metrics and alerting)"
      - "ELK Stack / Loki (log aggregation)"
      - "Falco (runtime anomaly detection)"
      - "OpenTelemetry (distributed tracing)"
      - "Datadog / New Relic (APM)"
  devsecops:
    prose: >-
      Monitor CI/CD pipeline execution for anomalies such as unusual build times,
      unexpected dependency downloads, or atypical deployment patterns. Implement pipeline
      security monitoring that alerts on unauthorized pipeline modifications. Track
      deployment frequency and rollback rates as indicators of potential issues.
    tools:
      - "GitLab CI/CD Analytics"
      - "GitLab Audit Events"
      - "Pipeline monitoring and alerting"
      - "DORA Metrics (change failure rate)"
  secops:
    prose: >-
      Implement SIEM with correlation rules for detecting security events. Deploy UEBA
      to detect anomalous user behavior. Monitor for indicators of compromise (IoCs)
      through threat intelligence integration. Implement network behavior analysis for
      lateral movement detection. Establish a 24/7 monitoring capability (internal SOC
      or MSSP) for critical systems.
    tools:
      - "SIEM (Splunk, Elastic Security, Microsoft Sentinel)"
      - "UEBA (Exabeam)"
      - "NDR (Network Detection and Response)"
      - "SOAR (Splunk SOAR, Palo Alto XSOAR)"