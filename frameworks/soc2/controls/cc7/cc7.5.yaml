id: cc7.5
family: cc7
title: "Recovery from identified security incidents"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity identifies, develops, and implements activities to recover from identified
    security incidents.
guidance:
  prose: >-
    The organization must have defined recovery activities that restore systems and
    operations after a security incident. This includes restoring data from backups,
    rebuilding compromised systems, verifying system integrity after recovery, and
    implementing lessons learned to prevent recurrence. Recovery plans must be tested to
    ensure they work when needed.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated disaster recovery and backup solutions for all platform
      components. Use infrastructure-as-code to enable rapid rebuilding of compromised
      infrastructure from known-good state. Implement immutable infrastructure patterns
      where systems are rebuilt rather than repaired. Test recovery procedures regularly
      through chaos engineering and DR exercises.
    tools:
      - "Velero / Kasten (Kubernetes backup)"
      - "Terraform / Pulumi (infrastructure rebuild)"
      - "Cloud provider backup services"
      - "Chaos engineering (Chaos Monkey, Litmus)"
      - "ArgoCD / Flux (GitOps recovery)"
  devsecops:
    prose: >-
      Maintain the ability to rapidly redeploy from version-controlled source in CI/CD
      pipelines. Implement blue-green or canary deployment strategies that enable rapid
      rollback. Maintain versioned artifacts for all deployments to enable rollback to
      known-good versions. Document and test recovery pipelines for critical services.
    tools:
      - "GitLab CI/CD (recovery pipelines)"
      - "Container registry (versioned artifacts)"
      - "Blue-green / canary deployments"
      - "GitLab Environments (rollback)"
  secops:
    prose: >-
      Maintain documented recovery procedures for various incident scenarios. Conduct
      recovery testing including backup restoration tests at defined intervals. Implement
      a lessons-learned process after each significant incident with documented action
      items tracked to completion. Verify system integrity after recovery through
      configuration validation and security scanning.
    tools:
      - "Backup and recovery solutions"
      - "Disaster recovery orchestration"
      - "Post-incident review documentation"
      - "System integrity verification tools"
