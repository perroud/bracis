id: cc7.3
family: cc7
title: "Evaluation of security events"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity evaluates security events to determine whether they could or have resulted
    in a failure of the entity to meet its objectives (security incidents) and, if so,
    takes actions to prevent or address such failures.
guidance:
  prose: >-
    When security events are detected, the organization must have a process to evaluate
    whether they constitute actual security incidents that impact or could impact the
    achievement of trust services objectives. This requires triage capabilities, severity
    classification, and escalation procedures. The organization must distinguish between
    false positives, security events that do not rise to incident level, and actual
    incidents requiring response.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated event triage using SOAR playbooks for common event types.
      Define severity classification criteria for platform events. Integrate alerting
      with incident management platforms for automated escalation. Create dashboards
      that provide context for event evaluation including affected systems, blast radius,
      and business impact.
    tools:
      - "PagerDuty / Opsgenie (incident management)"
      - "SOAR playbooks"
      - "Grafana (context dashboards)"
      - "Service dependency mapping (Backstage)"
  devsecops:
    prose: >-
      Implement automated triage of security scan findings using severity thresholds
      and vulnerability policies. Configure GitLab to automatically create issues for
      findings that meet incident criteria. Integrate security findings with incident
      management workflows. Define criteria for when a security finding in a pipeline
      should trigger an incident response.
    tools:
      - "GitLab Vulnerability Management"
      - "GitLab Security Policies"
      - "Issue auto-creation from findings"
      - "Incident management integration"
  secops:
    prose: >-
      Implement a formal security event triage and classification process. Define
      severity levels with corresponding response SLAs and escalation paths. Maintain
      incident classification criteria aligned with trust services objectives. Train SOC
      analysts on event evaluation procedures. Track triage metrics including time-to-
      classify and false positive rates. Conduct post-incident reviews to improve
      classification accuracy.
    tools:
      - "SIEM (event correlation and triage)"
      - "Incident management (PagerDuty, ServiceNow)"
      - "SOAR (automated triage playbooks)"
      - "Threat intelligence (context enrichment)"
