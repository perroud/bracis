id: cc7.1
family: cc7
title: "Detection and monitoring of new vulnerabilities"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    To meet its objectives, the entity uses detection and monitoring procedures to identify
    (1) changes to configurations that result in the introduction of new vulnerabilities,
    and (2) susceptibilities to newly discovered vulnerabilities.
guidance:
  prose: >-
    The organization must implement continuous monitoring to detect configuration changes
    that introduce vulnerabilities and to identify newly discovered vulnerabilities in
    existing systems. This requires a combination of vulnerability scanning, configuration
    monitoring, threat intelligence consumption, and patch management processes. The
    emphasis is on proactive detection rather than reactive response.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement continuous vulnerability scanning across all platform layers including
      infrastructure, containers, and dependencies. Deploy configuration drift detection
      to identify unauthorized changes. Subscribe to security advisory feeds for all
      platform components. Implement automated patch assessment that correlates new
      CVEs against the current asset inventory.
    tools:
      - "Vulnerability scanning (Trivy, Grype, Qualys)"
      - "Configuration drift detection (Terraform, ArgoCD)"
      - "Cloud security posture management (CSPM)"
      - "CVE monitoring (VulnDB, NVD feeds)"
      - "Renovate / Dependabot"
  devsecops:
    prose: >-
      Run security scanning in CI/CD pipelines on every code change. Implement scheduled
      pipeline scans for repositories that are not actively changing. Enable GitLab
      dependency scanning to detect newly disclosed vulnerabilities in existing
      dependencies. Monitor the GitLab Security Dashboard for new findings across all
      projects. Configure vulnerability alerts for critical severity findings.
    tools:
      - "GitLab Security Dashboard"
      - "GitLab Dependency Scanning"
      - "GitLab Container Scanning"
      - "GitLab SAST"
      - "Scheduled security scan pipelines"
  secops:
    prose: >-
      Implement a vulnerability management program with defined scanning cadences,
      severity-based SLAs, and remediation tracking. Subscribe to threat intelligence
      feeds and vendor security advisories. Monitor for zero-day disclosures affecting
      in-use technologies. Conduct periodic configuration audits against hardening
      baselines (CIS Benchmarks). Track vulnerability metrics including time-to-detect
      and time-to-remediate.
    tools:
      - "Vulnerability management (Qualys, Tenable, Rapid7)"
      - "SIEM (configuration change monitoring)"
      - "Threat intelligence platforms"
      - "CIS Benchmark scanning tools"