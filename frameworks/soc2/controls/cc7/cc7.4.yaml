id: cc7.4
family: cc7
title: "Incident response"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity responds to identified security incidents by executing a defined incident
    response program to understand, contain, remediate, and communicate security incidents,
    as appropriate.
guidance:
  prose: >-
    The organization must have a formal incident response program that defines how
    security incidents are handled from detection through resolution. The program must
    include procedures for containment, eradication, recovery, and post-incident review.
    Communication procedures must cover both internal stakeholders and external parties
    (customers, regulators) as appropriate. The incident response plan must be tested
    regularly through tabletop exercises or simulations.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated incident response capabilities including auto-scaling for
      DDoS mitigation, automated network isolation for compromised workloads, and
      automated rollback for failed deployments. Maintain break-glass procedures for
      emergency access during incidents. Implement chatops for incident coordination.
      Maintain runbooks for common incident types.
    tools:
      - "PagerDuty / Opsgenie (incident coordination)"
      - "Kubernetes network policies (isolation)"
      - "Automated rollback (ArgoCD, Flux)"
      - "Break-glass access procedures"
      - "Chatops (Slack/Teams incident channels)"
  devsecops:
    prose: >-
      Implement automated rollback capabilities in deployment pipelines for rapid
      recovery. Maintain incident response runbooks in version-controlled repositories.
      Use feature flags for quick mitigation of application-level incidents. Implement
      pipeline steps for emergency hotfix deployments that maintain audit trails while
      enabling rapid response.
    tools:
      - "GitLab CI/CD (emergency deployment pipelines)"
      - "Feature flags (GitLab Feature Flags, LaunchDarkly)"
      - "GitLab Incident Management"
      - "Automated rollback pipelines"
  secops:
    prose: >-
      Maintain a documented incident response plan that covers all phases: preparation,
      identification, containment, eradication, recovery, and lessons learned. Define
      incident severity levels with escalation matrices and communication requirements.
      Conduct tabletop exercises at least annually. Maintain an incident response team
      with defined roles and contact information. Track incident metrics including MTTD,
      MTTC, MTTR, and root cause categories.
    tools:
      - "Incident management platforms (PagerDuty, ServiceNow)"
      - "SOAR (automated response playbooks)"
      - "Communication platforms (Statuspage, mass notification)"
      - "Forensic analysis tools"
