id: cc1.4
family: cc1
title: "COSO Principle 4 — Commitment to competence"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity demonstrates a commitment to attract, develop, and retain competent
    individuals in alignment with objectives. The entity establishes policies and practices
    that evaluate competence for established responsibilities, attracts develops and
    retains sufficient and competent individuals, and plans and prepares for succession.
guidance:
  prose: >-
    The organization must demonstrate that it hires qualified personnel, provides ongoing
    training, evaluates competence, and plans for succession. For technology teams, this
    means security training programs, role-specific technical competency requirements,
    certifications where appropriate, and cross-training to avoid single points of failure.
    Evidence includes training records, competency assessments, and succession plans for
    key security roles.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated onboarding workflows that include security training modules
      before platform access is provisioned. Define competency requirements for platform
      roles (e.g., Kubernetes administrator must complete CKA or equivalent). Use
      infrastructure-as-code reviews to verify competency through peer review quality.
      Document runbooks and operational playbooks to enable cross-training.
    tools:
      - "Backstage TechDocs (runbooks)"
      - "GitLab Wiki (knowledge base)"
      - "LMS integration (training tracking)"
  devsecops:
    prose: >-
      Require completion of secure coding training before granting merge rights.
      Implement graduated access — junior developers get limited repository access until
      competency is demonstrated through code review participation. Track security
      champion program participation. Use merge request review metrics to identify
      training needs.
    tools:
      - "GitLab Merge Request Analytics"
      - "Security Champion Programs"
      - "Secure coding training platforms (SANS, Secure Code Warrior)"
  secops:
    prose: >-
      Maintain training records including security awareness training completion,
      role-specific technical training, and certifications. Conduct annual competency
      evaluations. Document succession plans for critical security roles. Track training
      effectiveness through metrics such as phishing simulation results and security
      incident root causes.
    tools:
      - "LMS (Learning Management System)"
      - "GRC Platforms (training tracking)"
      - "KnowBe4 / Proofpoint (security awareness)"
