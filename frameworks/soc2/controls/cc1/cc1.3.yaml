id: cc1.3
family: cc1
title: "COSO Principle 3 — Management establishes structure, authority, and responsibility"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    Management establishes, with board oversight, structures, reporting lines, and
    appropriate authorities and responsibilities in the pursuit of objectives. The entity
    considers the organizational structure and establishes reporting lines, defines assigns
    and limits authorities and responsibilities.
guidance:
  prose: >-
    The organization must have a clearly defined structure with documented reporting lines,
    defined roles and responsibilities, and appropriate delegation of authority. For
    technology organizations, this means documented RACI matrices for security responsibilities,
    clear ownership of systems and data, defined escalation paths, and separation of duties
    in critical processes. Key personnel (CISO, DPO, etc.) must be formally appointed with
    documented charters.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement RBAC across all platform services with roles mapped to organizational
      responsibilities. Define service ownership using service catalogs (Backstage) with
      clear ownership metadata. Enforce separation of duties through technical controls
      such as distinct roles for development, review, and deployment. Use CODEOWNERS files
      to formalize code review responsibilities.
    tools:
      - "Backstage Service Catalog"
      - "Kubernetes RBAC"
      - "GitLab CODEOWNERS"
      - "HashiCorp Vault (role-based secrets)"
  devsecops:
    prose: >-
      Enforce separation of duties in CI/CD pipelines by requiring different approvers
      for code review and deployment approval. Implement branch protection rules that
      prevent direct pushes and require designated reviewers. Use GitLab group and project
      role hierarchies to map organizational authority to repository access. Document
      pipeline ownership and escalation paths.
    tools:
      - "GitLab Protected Branches"
      - "GitLab Approval Rules"
      - "GitLab CODEOWNERS"
      - "GitLab Group/Project Roles"
  secops:
    prose: >-
      Maintain an organizational chart with security-relevant roles clearly identified.
      Document RACI matrices for incident response, change management, and access control
      processes. Ensure job descriptions include security responsibilities. Track role
      assignments and authority delegations in a GRC platform. Conduct periodic reviews
      of role appropriateness.
    tools:
      - "GRC Platforms (Vanta, Drata)"
      - "HR Systems (for role tracking)"
      - "ITSM (ServiceNow, Jira Service Management)"