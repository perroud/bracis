id: cc1.2
family: cc1
title: "COSO Principle 2 — Board exercises oversight responsibility"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The board of directors demonstrates independence from management and exercises oversight
    of the development and performance of internal control. The board identifies and accepts
    its oversight responsibilities in relation to established requirements and expectations.
    The board applies relevant expertise, and the board operates independently. The board
    provides oversight for the system of internal control.
guidance:
  prose: >-
    The board (or equivalent oversight body) must provide independent oversight of internal
    controls. For technology companies, this means the board or an audit committee actively
    reviews security program effectiveness, receives regular risk reports, and approves
    the risk management strategy. In practice, this requires documented board meeting minutes
    reflecting security discussions, appointment of qualified security leadership, and
    regular reporting from the CISO or equivalent role to the board.
implementation_guidance:
  platform_engineering:
    prose: >-
      Generate automated compliance dashboards that aggregate control effectiveness metrics
      across the platform. Provide executive-level views of security posture including
      vulnerability trends, incident metrics, and compliance status. Automate the generation
      of board-ready security reports from platform telemetry data.
    tools:
      - "Grafana Dashboards"
      - "GitLab Security Dashboard"
      - "Backstage Scorecards"
      - "Custom reporting pipelines"
  devsecops:
    prose: >-
      Implement automated security metrics collection from CI/CD pipelines to feed governance
      dashboards. Track MTTR (mean time to remediate) for vulnerabilities, pipeline failure
      rates due to security gates, and deployment frequency. Provide traceability from
      board-approved risk tolerance thresholds to actual pipeline enforcement gates.
    tools:
      - "GitLab Value Stream Analytics"
      - "DORA Metrics"
      - "GitLab Security Dashboard"
  secops:
    prose: >-
      Prepare quarterly security reports for board or audit committee review. Document
      board meeting minutes where security topics are discussed. Maintain evidence of
      board-approved security strategy, risk appetite statements, and resource allocation
      decisions. Track corrective actions from board directives to completion.
    tools:
      - "GRC Platforms (Vanta, Drata)"
      - "Board reporting tools"
      - "Risk register"
