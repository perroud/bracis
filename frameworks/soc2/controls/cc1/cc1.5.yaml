id: cc1.5
family: cc1
title: "COSO Principle 5 — Enforces accountability"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity holds individuals accountable for their internal control responsibilities
    in the pursuit of objectives. The entity enforces accountability through structures,
    authorities, and responsibilities. The entity establishes performance measures,
    incentives, and rewards. The entity evaluates performance measures, incentives, and
    rewards for ongoing relevance. The entity considers excessive pressures. The entity
    evaluates performance and rewards or disciplines individuals.
guidance:
  prose: >-
    The organization must hold individuals accountable for their security and internal
    control responsibilities. This means security objectives are part of performance
    evaluations, there are consequences for policy violations, and incentive structures
    do not create excessive pressure that would lead to control circumvention. For
    technology organizations, this includes tracking individual compliance with security
    policies, measuring security KPIs, and ensuring that release pressure does not lead
    to security shortcut-taking.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement audit trails that attribute all system changes to individual identities.
      Use Git blame and commit history to track code authorship. Enforce individual
      accounts (no shared credentials) across all platform services. Generate per-team
      and per-individual security compliance scorecards that track metrics such as
      vulnerability remediation SLA adherence and security review participation.
    tools:
      - "GitLab Audit Events"
      - "GitLab Contribution Analytics"
      - "Backstage Scorecards"
      - "Identity Providers (Okta, Azure AD)"
  devsecops:
    prose: >-
      Enforce individual accountability through commit signing, non-repudiation in CI/CD
      pipelines, and per-user audit logging. Track security-related metrics per developer
      including vulnerability introduction rate, remediation time, and security review
      throughput. Prevent shared service accounts in pipelines — use individual tokens
      or workload identity.
    tools:
      - "GitLab Audit Events"
      - "Git commit signing"
      - "GitLab CI/CD job-level audit trails"
      - "Workload Identity Federation"
  secops:
    prose: >-
      Include security objectives in employee performance reviews. Track and report on
      individual compliance with mandatory training, policy acknowledgments, and access
      review participation. Implement a formal disciplinary process for security policy
      violations. Monitor for indicators of excessive pressure that might lead to control
      bypass (e.g., emergency change frequency, override patterns).
    tools:
      - "GRC Platforms"
      - "HR Performance Management Systems"
      - "SIEM (anomaly detection for override patterns)"
