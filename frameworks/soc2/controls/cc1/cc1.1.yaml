id: cc1.1
family: cc1
title: "COSO Principle 1 — The entity demonstrates a commitment to integrity and ethical values"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity demonstrates a commitment to integrity and ethical values. The board of
    directors demonstrates independence from management and exercises oversight of the
    development and performance of internal control. Management establishes, with board
    oversight, structures, reporting lines, and appropriate authorities and responsibilities
    in the pursuit of objectives.
guidance:
  prose: >-
    This criterion focuses on the "tone at the top" — the organization's leadership must
    set expectations for ethical behavior and integrity. This includes establishing a code
    of conduct, ensuring the board provides independent oversight, defining organizational
    structure with clear reporting lines, and holding individuals accountable for their
    internal control responsibilities. For technology organizations, this translates to
    documented acceptable use policies, security awareness requirements, and clear ownership
    of security controls.
implementation_guidance:
  platform_engineering:
    prose: >-
      Define and publish organizational security policies and acceptable use policies in
      a centralized documentation platform (e.g., Backstage TechDocs, Confluence). Implement
      policy-as-code where possible to codify ethical and compliance standards into automated
      guardrails. Establish engineering role hierarchies and access control matrices that
      reflect organizational structure. Require all platform users to acknowledge security
      policies on a defined cadence.
    tools:
      - "Backstage TechDocs"
      - "Confluence"
      - "GitLab Wiki"
      - "Open Policy Agent (OPA)"
  devsecops:
    prose: >-
      Embed code of conduct and security policy acknowledgment into onboarding automation.
      Enforce commit signing to tie code changes to verified identities. Implement pre-commit
      hooks and CI pipeline checks that prevent policy violations (e.g., pushing secrets,
      bypassing reviews). Maintain an audit trail of all policy exceptions and approvals
      through version-controlled documentation.
    tools:
      - "GitLab CI/CD"
      - "Git commit signing (GPG/SSH)"
      - "Pre-commit hooks"
      - "GitLab Compliance Framework"
  secops:
    prose: >-
      Maintain a formal code of conduct and information security policy with annual review
      cadence. Track employee policy acknowledgments in an HR or GRC system. Conduct annual
      security awareness training with completion tracking. Monitor for policy violations
      through log analysis and behavioral analytics. Report compliance metrics to leadership
      on a regular basis.
    tools:
      - "GRC Platforms (Vanta, Drata, ServiceNow)"
      - "Security Awareness Training (KnowBe4, Proofpoint)"
      - "SIEM (Splunk, Elastic Security)"
