id: c1.2
family: c1
title: "Disposal of confidential information"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity disposes of confidential information to meet the entity's objectives
    related to confidentiality.
guidance:
  prose: >-
    The organization must have procedures for the secure disposal of confidential
    information when it is no longer needed or when the retention period has expired.
    Disposal must render the information unrecoverable and must be documented. This
    applies to all forms of confidential information including electronic data, physical
    documents, backups, and copies in non-production environments.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated data lifecycle management that enforces retention periods and
      triggers secure deletion when retention expires. Use cryptographic erasure where
      possible (destroy encryption keys to render encrypted data unrecoverable). Implement
      automated cleanup of ephemeral environments and their data. Ensure backup retention
      policies align with data disposal requirements.
    tools:
      - "Cloud storage lifecycle policies (auto-delete)"
      - "Cryptographic erasure (key destruction)"
      - "Database purge automation"
      - "Ephemeral environment cleanup"
  devsecops:
    prose: >-
      Implement CI/CD jobs for automated data cleanup in test and staging environments.
      Ensure pipeline artifacts containing confidential data have defined expiration
      policies. Automate the purging of build logs that may contain sensitive data.
      Implement merge request reviews for data retention logic changes.
    tools:
      - "GitLab CI/CD artifact expiration"
      - "Automated environment cleanup jobs"
      - "Data purge pipelines"
      - "Log retention management"
  secops:
    prose: >-
      Implement a data retention and disposal policy that defines retention periods for
      all data categories and secure disposal methods. Maintain certificates of
      destruction for disposed data. Conduct periodic audits to verify data disposal
      compliance. Ensure disposal procedures cover all copies including backups, archives,
      and non-production environments. Track disposal activities in an asset management
      system.
    tools:
      - "Data lifecycle management platforms"
      - "Secure deletion tools"
      - "Certificate of destruction tracking"
      - "GRC Platforms (retention compliance)"
