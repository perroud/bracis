id: c1.1
family: c1
title: "Identification and maintenance of confidential information"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity identifies and maintains confidential information to meet the entity's
    objectives related to confidentiality. The entity identifies confidential information,
    classifies confidential information, and protects confidential information from
    erasure or loss.
guidance:
  prose: >-
    The organization must identify what information is considered confidential, implement
    a data classification scheme, and protect classified information accordingly. Confidential
    information may include customer data, intellectual property, trade secrets, business
    strategies, and any information whose unauthorized disclosure could cause harm. The
    organization must have clear criteria for what constitutes confidential information
    and consistent processes for identifying and labeling it.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement data classification tagging across platform services. Deploy encryption
      at rest for all data stores containing confidential information. Implement access
      controls aligned with data classification levels. Use data catalog tools to
      maintain an inventory of confidential data locations. Deploy data masking and
      tokenization for confidential data in non-production environments.
    tools:
      - "Data catalog (Amundsen, DataHub)"
      - "Encryption at rest (Cloud KMS, HashiCorp Vault)"
      - "Data masking/tokenization"
      - "Kubernetes Secrets encryption"
      - "Classification labels in object storage"
  devsecops:
    prose: >-
      Implement secret detection in CI/CD pipelines to prevent confidential information
      from being committed to source code. Use GitLab's confidential issue feature for
      security-sensitive discussions. Ensure test data does not contain actual confidential
      information through data masking in CI/CD environments. Scan for hardcoded
      credentials and sensitive data patterns.
    tools:
      - "GitLab Secret Detection"
      - "GitLab Confidential Issues"
      - "Test data management (masked/synthetic data)"
      - "Pre-commit hooks (detect-secrets)"
  secops:
    prose: >-
      Implement a data classification policy defining classification levels (e.g., public,
      internal, confidential, restricted) and handling requirements for each level.
      Maintain an inventory of confidential information assets. Deploy DLP solutions to
      detect and prevent unauthorized disclosure. Train employees on data classification
      and handling procedures. Conduct periodic reviews to verify confidential information
      is properly classified and protected.
    tools:
      - "DLP solutions (Microsoft Purview, Symantec)"
      - "Data classification tools"
      - "GRC Platforms (data inventory)"
      - "Security awareness training (data handling)"