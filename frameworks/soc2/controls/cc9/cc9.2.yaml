id: cc9.2
family: cc9
title: "Vendor and third-party risk management"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity assesses and manages risks associated with vendors and business partners.
    The entity establishes requirements for vendor and business partner engagements,
    assesses vendor and business partner risks, assigns responsibility and accountability
    for managing vendor and business partner risks, and establishes communication protocols
    for vendor and business partner engagements.
guidance:
  prose: >-
    The organization must manage risks associated with third-party vendors and business
    partners, particularly those that process, store, or have access to the organization's
    data. This includes performing due diligence before engagement, contractually requiring
    security standards, monitoring ongoing compliance, and managing the lifecycle of
    vendor relationships. For SaaS companies, this is critical because the supply chain
    often includes dozens of subprocessors.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement supply chain security for all platform dependencies. Scan all third-party
      container images and libraries for vulnerabilities before use. Maintain a software
      bill of materials (SBOM) for all platform components. Evaluate cloud provider and
      managed service security through their SOC 2 reports. Implement network segmentation
      to limit vendor access to only required resources.
    tools:
      - "SBOM generation (Syft, CycloneDX)"
      - "Supply chain security (SLSA, Sigstore)"
      - "Vendor security assessment platforms"
      - "Network segmentation for vendor access"
  devsecops:
    prose: >-
      Implement dependency scanning to continuously assess third-party library risk.
      Use license scanning to identify licensing risks in dependencies. Monitor for
      supply chain attacks through dependency confusion detection and package integrity
      verification. Maintain private package registries to control which third-party
      packages are available to developers.
    tools:
      - "GitLab Dependency Scanning"
      - "GitLab License Scanning"
      - "GitLab Container Scanning"
      - "Private package registries"
      - "Dependency pinning and checksum verification"
  secops:
    prose: >-
      Implement a third-party risk management program with defined assessment procedures
      for new and existing vendors. Require SOC 2 reports or equivalent assurance from
      critical vendors. Maintain a vendor inventory with risk classifications. Include
      security requirements in vendor contracts (data protection, incident notification,
      audit rights). Conduct periodic vendor reassessments based on risk level. Monitor
      vendor security posture through continuous monitoring services.
    tools:
      - "Third-party risk management (OneTrust, SecurityScorecard, BitSight)"
      - "Vendor assessment questionnaires (SIG, CAIQ)"
      - "Contract management systems"
      - "GRC Platforms (vendor risk module)"