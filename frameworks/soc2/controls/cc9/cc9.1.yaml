id: cc9.1
family: cc9
title: "Risk mitigation through business processes and activities"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity identifies, selects, and develops risk mitigation activities for risks
    arising from potential business disruptions.
guidance:
  prose: >-
    The organization must identify and implement risk mitigation activities for risks that
    could disrupt business operations. This includes business continuity planning, disaster
    recovery, and operational resilience measures. The organization must consider various
    disruption scenarios including technology failures, natural disasters, supply chain
    disruptions, and loss of key personnel.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement high availability architectures with multi-zone or multi-region
      deployments. Design for failure with automated failover, circuit breakers, and
      graceful degradation patterns. Implement auto-scaling to handle load spikes.
      Maintain disaster recovery environments that can be activated quickly. Test
      resilience through chaos engineering exercises.
    tools:
      - "Multi-region Kubernetes clusters"
      - "Cloud load balancers"
      - "Auto-scaling (HPA, VPA, Karpenter)"
      - "Circuit breakers (Istio, Resilience4j)"
      - "Chaos engineering (Litmus, Chaos Monkey)"
  devsecops:
    prose: >-
      Implement CI/CD pipeline resilience with fallback runners and artifact caching.
      Maintain pipeline templates that enable rapid recovery of build and deployment
      capabilities. Use multi-region container registries for artifact availability.
      Implement infrastructure-as-code that enables rapid environment reconstruction.
    tools:
      - "GitLab CI/CD (resilient pipeline configuration)"
      - "Multi-region container registries"
      - "IaC for environment reconstruction"
      - "Pipeline template libraries"
  secops:
    prose: >-
      Develop and maintain a business continuity plan (BCP) that addresses various
      disruption scenarios. Conduct business impact analysis (BIA) to identify critical
      business functions and their dependencies. Define recovery time objectives (RTO)
      and recovery point objectives (RPO) for critical systems. Test BCP/DR plans at
      least annually. Maintain vendor contingency plans for critical service providers.
    tools:
      - "BCP/DR planning tools"
      - "GRC Platforms (BIA documentation)"
      - "Tabletop exercise frameworks"
      - "Vendor management platforms"
