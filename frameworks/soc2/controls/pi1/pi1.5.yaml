id: pi1.5
family: pi1
title: "Store inputs, items in processing, and outputs completely, accurately, and timely"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity implements policies and procedures to store inputs, items in processing,
    and outputs completely, accurately, and timely in accordance with system specifications
    to meet the entity's objectives.
guidance:
  prose: >-
    The organization must ensure that data is stored correctly throughout the processing
    lifecycle — inputs, intermediate processing states, and outputs must be stored
    completely, accurately, and within defined timeframes. This includes data persistence
    controls, storage integrity verification, and retention management. For technology
    organizations, this covers database integrity, file storage reliability, cache
    consistency, and message queue durability.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement data storage integrity controls including checksums, replication, and
      consistency verification. Use database features such as ACID transactions,
      write-ahead logging, and point-in-time recovery. Implement storage monitoring for
      capacity, performance, and integrity. Deploy redundant storage with automatic
      failover. Implement data retention policies through automated lifecycle management.
    tools:
      - "Database replication and integrity (PostgreSQL, etc.)"
      - "Object storage with versioning (S3, GCS)"
      - "Storage monitoring (Prometheus)"
      - "Data lifecycle management"
      - "Message queue durability (Kafka, RabbitMQ)"
  devsecops:
    prose: >-
      Include data storage integrity tests in CI/CD pipelines. Validate database migration
      scripts preserve data integrity through automated testing. Implement data storage
      integration tests that verify persistence across service boundaries. Test storage
      failure scenarios and recovery procedures.
    tools:
      - "Database migration testing in CI/CD"
      - "Data integrity test suites"
      - "Storage failure simulation"
      - "GitLab CI/CD services (test databases)"
  secops:
    prose: >-
      Define and enforce data retention policies. Monitor storage integrity through
      automated verification. Track storage capacity and performance metrics. Implement
      data archival procedures with integrity verification. Conduct periodic data quality
      audits to verify storage accuracy. Ensure storage encryption for data at rest.
    tools:
      - "Data governance platforms"
      - "Storage monitoring and alerting"
      - "Backup integrity verification"
      - "Encryption at rest verification"
