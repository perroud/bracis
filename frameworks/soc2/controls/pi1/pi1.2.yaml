id: pi1.2
family: pi1
title: "System inputs are complete, accurate, and valid"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity implements policies and procedures over system inputs that result in
    products, services, and reporting to meet the entity's objectives.
guidance:
  prose: >-
    The organization must implement controls to ensure that system inputs are complete,
    accurate, and valid before processing. This includes input validation, data type
    checking, range checking, referential integrity verification, and authorization
    checks for data submission. Invalid inputs must be rejected with appropriate error
    handling and logging.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement input validation at API gateway and service boundary levels. Deploy
      schema validation for all incoming data. Implement rate limiting and payload
      size restrictions to prevent malformed inputs. Use data quality frameworks to
      validate incoming data against defined rules. Implement idempotency controls
      for critical processing operations.
    tools:
      - "API Gateways (Kong, Envoy) — input validation"
      - "JSON Schema / OpenAPI validation"
      - "Data quality frameworks (Great Expectations)"
      - "Message queue schema validation"
  devsecops:
    prose: >-
      Include input validation testing in CI/CD pipelines. Implement SAST rules that
      detect missing input validation. Use fuzz testing to identify input handling
      vulnerabilities. Enforce coding standards that require input validation at
      all external-facing interfaces.
    tools:
      - "GitLab SAST (input validation detection)"
      - "Fuzz testing (GitLab Fuzz Testing)"
      - "Unit/integration tests for input validation"
      - "API testing (Postman, REST-assured)"
  secops:
    prose: >-
      Define input validation policies including required checks for all system inputs.
      Monitor for input validation failures that may indicate attack attempts or data
      quality issues. Track input rejection rates as a quality metric. Review input
      validation controls during security assessments.
    tools:
      - "WAF (input validation at the edge)"
      - "Application logging (input validation failures)"
      - "SIEM (input anomaly detection)"
