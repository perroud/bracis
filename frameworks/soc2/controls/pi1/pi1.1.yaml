id: pi1.1
family: pi1
title: "Processing completeness, validity, accuracy, timeliness, and authorization"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity obtains or generates, uses, and communicates relevant, quality information
    regarding the objectives related to processing, including definitions of data processed
    and product and service specifications, to support the use of products and services.
guidance:
  prose: >-
    The organization must define and communicate specifications for data processing including
    what constitutes complete, valid, accurate, and timely processing. Processing
    specifications must be documented, accessible to relevant personnel, and maintained
    current. For technology organizations, this means API contracts, data schema
    documentation, processing SLAs, and data quality definitions are formally documented
    and available.
implementation_guidance:
  platform_engineering:
    prose: >-
      Define and publish data processing specifications through API documentation,
      data schemas, and processing SLA definitions. Implement schema validation at
      data ingestion points. Maintain data dictionaries that define expected formats,
      ranges, and relationships. Use contract testing between services to verify
      processing specifications are met.
    tools:
      - "API documentation (OpenAPI/Swagger)"
      - "Schema registries (Confluent, Apicurio)"
      - "Contract testing (Pact)"
      - "Data dictionaries"
  devsecops:
    prose: >-
      Implement automated validation of data processing specifications through CI/CD
      tests. Include contract tests in pipelines to verify inter-service data processing
      requirements. Generate API documentation automatically from code. Validate data
      schemas in pipeline stages before deployment.
    tools:
      - "Contract testing in CI/CD"
      - "API documentation generation"
      - "Schema validation in pipelines"
      - "GitLab CI/CD test jobs"
  secops:
    prose: >-
      Document data processing specifications including input requirements, processing
      rules, output expectations, and error handling procedures. Define data quality
      metrics and monitoring. Maintain processing SLAs with customer-facing documentation.
      Review and update processing specifications when changes occur.
    tools:
      - "Data governance platforms"
      - "Processing documentation"
      - "SLA management tools"
