id: cc6.7
family: cc6
title: "Restricts transmission, movement, and removal of information"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity restricts the transmission, movement, and removal of information to
    authorized internal and external users and processes, and protects it during
    transmission, movement, or removal to meet the entity's objectives.
guidance:
  prose: >-
    The organization must control how data moves within and outside the system boundary.
    Data must be encrypted in transit, transfers must be authorized, and data loss
    prevention controls must be in place to prevent unauthorized exfiltration. This applies
    to all data transmission methods including network transfers, API calls, email, file
    sharing, and physical media. Encryption standards must meet current best practices
    (TLS 1.2 or higher).
implementation_guidance:
  platform_engineering:
    prose: >-
      Enforce TLS 1.2+ for all external and internal communications. Implement mutual
      TLS (mTLS) for service-to-service communication through a service mesh. Deploy
      data loss prevention controls at egress points. Encrypt all API communications.
      Implement network policies that restrict pod-to-pod communication to only
      authorized paths. Use private links for cloud service communication.
    tools:
      - "Istio / Linkerd (mTLS)"
      - "Certificate management (cert-manager)"
      - "Cloud Private Link / VPC Endpoints"
      - "Kubernetes Network Policies"
      - "Cloud DLP"
  devsecops:
    prose: >-
      Enforce HTTPS for all Git operations. Implement secret detection in pipelines to
      prevent sensitive data from being committed to repositories. Scan IaC for insecure
      data transmission configurations (e.g., unencrypted connections, HTTP endpoints).
      Enforce encryption for artifact storage and transfer between pipeline stages.
    tools:
      - "GitLab Secret Detection"
      - "GitLab IaC Scanning"
      - "TLS enforcement in CI/CD"
      - "Encrypted artifact storage"
  secops:
    prose: >-
      Implement a data protection policy covering encryption requirements for data in
      transit. Deploy DLP solutions to monitor and prevent unauthorized data transfers.
      Monitor for unencrypted data transmission. Maintain an inventory of authorized
      data transfer channels and methods. Conduct periodic reviews of encryption
      configurations to ensure compliance with current standards.
    tools:
      - "DLP solutions (Symantec, Microsoft Purview)"
      - "Network monitoring (encrypted traffic analysis)"
      - "Certificate monitoring (expired, weak ciphers)"
      - "Email security gateways"