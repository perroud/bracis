id: cc6.6
family: cc6
title: "Security measures against threats outside system boundaries"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity implements logical access security measures to protect against threats from
    sources outside its system boundaries. The entity implements boundary protection
    mechanisms, monitors security events, and implements controls to prevent or detect
    unauthorized access from external sources.
guidance:
  prose: >-
    The organization must implement controls to protect against external threats including
    unauthorized access attempts, malware, denial-of-service attacks, and other threats
    originating outside the system boundary. This includes firewalls, intrusion detection
    and prevention systems, web application firewalls, DDoS protection, and endpoint
    protection. The system boundary must be clearly defined and all entry points must be
    protected.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement multi-layer boundary protection including cloud network security groups,
      web application firewalls (WAF), DDoS protection, and API gateways with rate
      limiting. Deploy network segmentation to minimize blast radius. Implement ingress
      and egress filtering. Use private endpoints for internal service communication.
      Deploy intrusion detection at the network and host level.
    tools:
      - "Cloud WAF (AWS WAF, Cloudflare, Azure Front Door)"
      - "Cloud Network Security Groups / Firewalls"
      - "DDoS Protection (AWS Shield, Cloudflare)"
      - "API Gateways (Kong, Envoy)"
      - "IDS/IPS (Falco, Suricata)"
  devsecops:
    prose: >-
      Implement DAST scanning to identify externally exploitable vulnerabilities. Scan
      infrastructure-as-code for insecure network configurations (open security groups,
      public-facing resources). Include dependency scanning to protect against supply chain
      attacks from external sources. Enforce secret detection to prevent exposure of
      credentials that could be exploited externally.
    tools:
      - "GitLab DAST"
      - "GitLab IaC Scanning"
      - "GitLab Dependency Scanning"
      - "GitLab Secret Detection"
      - "GitLab Container Scanning"
  secops:
    prose: >-
      Monitor boundary protection devices for security events. Implement a SOC (Security
      Operations Center) function for continuous threat monitoring. Maintain threat
      intelligence feeds to detect emerging external threats. Conduct external
      vulnerability assessments and penetration tests. Monitor for data exfiltration
      through network traffic analysis.
    tools:
      - "SIEM (security event monitoring)"
      - "Network traffic analysis (Zeek, Darktrace)"
      - "Threat intelligence platforms"
      - "External vulnerability scanning (Qualys, Tenable)"