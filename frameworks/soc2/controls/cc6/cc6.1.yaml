id: cc6.1
family: cc6
title: "Logical and physical access security software, infrastructure, and architectures"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity implements logical access security software, infrastructure, and architectures
    over protected information assets to protect them from security events to meet the
    entity's objectives. The entity identifies and manages the inventory of information
    assets, restricts logical access, identifies and authenticates users, considers network
    segmentation, manages points of access, restricts access to information assets, and
    manages identification and authentication.
guidance:
  prose: >-
    The organization must implement comprehensive logical access controls including
    identification and authentication mechanisms, network segmentation, and access
    restrictions to protect information assets. This is one of the most heavily examined
    criteria in SOC 2 audits. It requires demonstrating that access is restricted to
    authorized users through strong authentication, that the network is segmented to
    limit lateral movement, and that all access points are identified and controlled.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement centralized identity management with SSO for all platform services.
      Enforce MFA for all administrative and user access. Deploy network segmentation
      using Kubernetes network policies, VPC configurations, and service mesh. Implement
      zero-trust architecture where every request is authenticated and authorized regardless
      of network location. Maintain an automated inventory of all information assets
      and access points.
    tools:
      - "Identity Providers (Okta, Azure AD, Keycloak)"
      - "Kubernetes Network Policies / Cilium"
      - "Istio / Linkerd (mTLS)"
      - "HashiCorp Vault (secrets management)"
      - "Cloud IAM (AWS IAM, GCP IAM, Azure RBAC)"
  devsecops:
    prose: >-
      Enforce authentication for all repository access. Require SSH keys or personal
      access tokens with minimum privilege. Implement branch protection rules that
      restrict who can push to protected branches. Use GitLab group and project access
      levels to enforce least privilege. Scan infrastructure-as-code for access control
      misconfigurations. Ensure CI/CD pipelines use short-lived credentials.
    tools:
      - "GitLab Protected Branches"
      - "GitLab Access Levels (Guest, Reporter, Developer, Maintainer, Owner)"
      - "GitLab Deploy Tokens (short-lived)"
      - "GitLab IaC Scanning"
      - "OIDC Federation for CI/CD"
  secops:
    prose: >-
      Implement and maintain an access control policy covering identification,
      authentication, and authorization requirements. Enforce MFA for all user accounts.
      Conduct quarterly access reviews. Monitor for unauthorized access attempts through
      SIEM. Maintain an inventory of all logical access points and associated controls.
      Implement privileged access management for administrative accounts.
    tools:
      - "IAM solutions (Okta, Azure AD)"
      - "Privileged Access Management (CyberArk, BeyondTrust)"
      - "SIEM (access monitoring)"
      - "Network monitoring (Zeek, Suricata)"