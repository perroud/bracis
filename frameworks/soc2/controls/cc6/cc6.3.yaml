id: cc6.3
family: cc6
title: "Role-based access and least privilege"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity authorizes, modifies, or removes access to data, software, functions, and
    other protected information assets based on roles, responsibilities, or the system
    design and changes, giving consideration to the concepts of least privilege and
    segregation of duties, to meet the entity's objectives.
guidance:
  prose: >-
    Access to systems and data must be based on the principle of least privilege and
    segregation of duties. Users should only have the minimum access required to perform
    their job functions. Roles should be defined to prevent any single individual from
    having conflicting responsibilities that could be exploited. Access rights must be
    reviewed and adjusted when roles change.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement RBAC across all platform services with granular roles mapped to job
      functions. Enforce least privilege through Kubernetes RBAC, cloud IAM policies, and
      namespace isolation. Implement segregation of duties by separating development,
      deployment, and operational roles. Use attribute-based access control (ABAC) where
      RBAC is insufficient. Regularly audit role assignments for privilege creep.
    tools:
      - "Kubernetes RBAC"
      - "Cloud IAM (AWS IAM, GCP IAM)"
      - "HashiCorp Vault (dynamic secrets, least privilege)"
      - "OPA (fine-grained authorization)"
  devsecops:
    prose: >-
      Configure GitLab project access levels to enforce least privilege — developers
      get Developer role, not Maintainer or Owner. Implement approval rules that enforce
      segregation of duties (e.g., code author cannot approve their own merge request).
      Use CODEOWNERS to restrict who can modify security-sensitive files. Separate
      deployment credentials from development credentials.
    tools:
      - "GitLab Project Access Levels"
      - "GitLab Approval Rules (no self-approval)"
      - "GitLab CODEOWNERS"
      - "GitLab Protected Environments"
  secops:
    prose: >-
      Define and document roles with associated access rights for all systems. Implement
      a role-based access control matrix. Conduct periodic access reviews to verify
      least privilege compliance. Monitor for privilege escalation and segregation of
      duties violations. Implement privileged access management with time-limited
      elevation for administrative tasks.
    tools:
      - "IAM solutions (role management)"
      - "Privileged Access Management"
      - "GRC Platforms (access review)"
      - "SoD conflict detection tools"