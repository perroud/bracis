id: cc6.5
family: cc6
title: "Logical access security to protected information assets"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity discontinues logical and physical protections over physical assets only
    after the ability to read or recover data and software from those assets has been
    diminished and is no longer required to meet the entity's objectives.
guidance:
  prose: >-
    Before disposing of or repurposing physical assets (servers, storage devices, media),
    the organization must ensure that all data is securely erased or destroyed to prevent
    data recovery. Logical protections should remain in place until data destruction is
    verified. For cloud environments, this extends to ensuring cloud resources are properly
    decommissioned and data is purged when services are terminated.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated resource cleanup processes for decommissioned services. Use
      cloud provider data destruction verification for terminated instances and storage.
      Enable encryption at rest for all storage volumes so that key destruction renders
      data unrecoverable (cryptographic erasure). Implement automated lifecycle policies
      for storage resources.
    tools:
      - "Cloud storage lifecycle policies"
      - "Cryptographic erasure (key destruction)"
      - "Terraform destroy (automated decommission)"
      - "Cloud provider data destruction certificates"
  devsecops:
    prose: >-
      Implement CI/CD pipeline steps for environment teardown that include data cleanup
      verification. Ensure ephemeral CI/CD runners are destroyed after use with no data
      persistence. Use encrypted volumes for build artifacts and ensure cleanup after
      pipeline completion. Document data retention and destruction procedures for
      development and test environments.
    tools:
      - "Ephemeral CI/CD runners"
      - "GitLab CI cleanup jobs"
      - "Encrypted build artifact storage"
  secops:
    prose: >-
      Implement a formal asset disposal procedure that includes data sanitization
      verification before asset disposal or repurposing. Maintain certificates of
      destruction for physical media. Verify cloud provider data destruction practices
      through their SOC 2 reports. Track asset lifecycle from provisioning through
      decommission in the CMDB.
    tools:
      - "Asset management / CMDB"
      - "Data destruction certification services"
      - "Encryption key management (for cryptographic erasure)"
