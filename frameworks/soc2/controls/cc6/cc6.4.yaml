id: cc6.4
family: cc6
title: "Physical access restrictions"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity restricts physical access to facilities and protected information assets
    (for example, data center facilities, back-up media storage, and other sensitive
    locations) to authorized personnel to meet the entity's objectives.
guidance:
  prose: >-
    The organization must implement physical access controls for facilities that house
    information assets. This includes data centers, server rooms, network closets, and
    any location where sensitive data or critical infrastructure components are physically
    present. For cloud-native organizations, this criterion is largely addressed through
    cloud provider SOC 2 reports, but the organization must still control physical access
    to offices, workstations, and any on-premises equipment.
implementation_guidance:
  platform_engineering:
    prose: >-
      For cloud-native platforms, document reliance on cloud provider physical security
      controls and maintain copies of provider SOC 2 reports. For any on-premises
      components (e.g., on-prem Kubernetes nodes, edge computing), implement physical
      access controls including badge access, visitor logs, and environmental monitoring.
      Implement hardware security modules (HSMs) or cloud KMS for cryptographic key
      protection.
    tools:
      - "Cloud provider SOC 2 reports (AWS, GCP, Azure)"
      - "Cloud KMS / HSM"
      - "Physical access control systems"
      - "Environmental monitoring"
  devsecops:
    prose: >-
      Ensure that CI/CD runners and build infrastructure, if self-hosted, are located
      in physically secured environments. Document physical security controls for any
      self-hosted GitLab instances or build servers. Use cloud-hosted runners where
      possible to leverage cloud provider physical security controls.
    tools:
      - "Cloud-hosted CI/CD runners"
      - "GitLab.com SaaS (cloud-hosted)"
      - "Physical access control documentation"
  secops:
    prose: >-
      Implement and document physical access controls for all facilities including badge
      access systems, visitor management, surveillance, and environmental monitoring.
      Conduct periodic physical security assessments. Maintain visitor logs and review
      physical access logs regularly. Ensure data center physical security is covered
      by cloud provider SOC 2 reports and review these reports annually.
    tools:
      - "Physical access control systems"
      - "Visitor management systems"
      - "Surveillance systems"
      - "Environmental monitoring (temperature, humidity, water detection)"
