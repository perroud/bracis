id: cc6.8
family: cc6
title: "Controls against malicious software"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity implements controls to prevent or detect and act upon the introduction of
    unauthorized or malicious software to meet the entity's objectives.
guidance:
  prose: >-
    The organization must implement controls to prevent, detect, and respond to malicious
    software including viruses, worms, ransomware, trojans, and other malware. This extends
    beyond traditional endpoint protection to include supply chain security, container
    image scanning, and runtime protection. Controls should cover all layers: endpoints,
    servers, containers, and application dependencies.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement container image scanning before deployment to detect malware and
      vulnerabilities in base images. Use image signing and admission controllers to
      only allow trusted, verified images. Deploy runtime security monitoring to detect
      malicious behavior in running containers. Implement supply chain security (SLSA)
      to prevent introduction of malicious code through dependencies.
    tools:
      - "Container image scanning (Trivy, Grype)"
      - "Image signing (Cosign, Notary)"
      - "Admission controllers (Kyverno, OPA Gatekeeper)"
      - "Runtime security (Falco)"
      - "Supply chain security (SLSA, in-toto)"
  devsecops:
    prose: >-
      Implement dependency scanning to detect known vulnerabilities and potentially
      malicious packages. Use container scanning in CI/CD pipelines. Implement SAST
      to detect code patterns that could introduce vulnerabilities exploitable by
      malware. Use secret detection to prevent credential exposure that could be leveraged
      in malware attacks. Pin dependency versions and verify checksums.
    tools:
      - "GitLab Dependency Scanning"
      - "GitLab Container Scanning"
      - "GitLab SAST"
      - "GitLab Secret Detection"
      - "Package manager lock files and checksum verification"
  secops:
    prose: >-
      Deploy endpoint detection and response (EDR) on all endpoints and servers. Implement
      email security gateways to filter malicious attachments and links. Monitor for
      indicators of compromise (IoCs) through SIEM integration with threat intelligence
      feeds. Maintain an incident response procedure specific to malware incidents.
      Conduct regular malware awareness training for employees.
    tools:
      - "EDR (CrowdStrike, SentinelOne, Carbon Black)"
      - "Email security (Proofpoint, Mimecast)"
      - "SIEM (malware detection rules)"
      - "Threat intelligence (MITRE ATT&CK mapping)"
