id: cc6.2
family: cc6
title: "User registration and authorization"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    Prior to issuing system credentials and granting system access, the entity registers
    and authorizes new internal and external users whose access is administered by the
    entity. For those users whose access is administered by the entity, user system
    credentials are removed when user access is no longer authorized.
guidance:
  prose: >-
    The organization must have formal processes for provisioning and deprovisioning user
    access. New users must be registered and authorized before receiving access. When
    access is no longer needed (termination, role change, contract end), credentials must
    be promptly revoked. This requires integration between HR processes and IT access
    management, with defined SLAs for provisioning and deprovisioning actions.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated user provisioning and deprovisioning through SCIM integration
      with the identity provider. Use JIT (Just-in-Time) provisioning for platform
      services to reduce standing access. Implement automated offboarding workflows
      that revoke access across all platform services when triggered by HR system events.
      Maintain audit trails of all provisioning and deprovisioning actions.
    tools:
      - "SCIM provisioning (Okta, Azure AD)"
      - "JIT access provisioning"
      - "Automated offboarding workflows"
      - "Identity lifecycle management"
  devsecops:
    prose: >-
      Automate GitLab user provisioning and deprovisioning through SAML/SCIM integration.
      Implement group-based access controls that automatically assign project access
      based on team membership. Use merge requests to document and approve access changes
      for infrastructure and application access. Monitor for orphaned accounts and
      inactive users.
    tools:
      - "GitLab SAML/SCIM provisioning"
      - "GitLab Group membership management"
      - "GitLab API (automated user management)"
      - "GitLab Audit Events (access changes)"
  secops:
    prose: >-
      Implement a formal access request and approval process. Define SLAs for access
      provisioning (e.g., within 24 hours of approval) and deprovisioning (e.g., within
      24 hours of termination). Conduct quarterly access reviews to identify unauthorized
      or unnecessary access. Maintain evidence of all access requests, approvals,
      provisioning, and deprovisioning actions.
    tools:
      - "ITSM (access request workflows)"
      - "IAM solutions (lifecycle management)"
      - "GRC Platforms (access review campaigns)"
      - "HR system integration (termination triggers)"