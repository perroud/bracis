id: cc3.1
family: cc3
title: "COSO Principle 6 — Specifies suitable objectives"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity specifies objectives with sufficient clarity to enable the identification
    and assessment of risks relating to objectives. The entity considers operations
    objectives, external financial reporting objectives, and compliance objectives.
    The entity identifies and assesses risks related to the achievement of these objectives.
guidance:
  prose: >-
    The organization must define clear security, availability, processing integrity,
    confidentiality, and privacy objectives that are specific enough to enable meaningful
    risk assessment. Objectives should be measurable and linked to the trust services
    criteria. For technology organizations, this translates to defining SLOs, security
    KPIs, data protection targets, and compliance goals that are documented and measurable.
implementation_guidance:
  platform_engineering:
    prose: >-
      Define and publish Service Level Objectives (SLOs) for all platform services.
      Establish security objectives as measurable KPIs (e.g., MTTR for critical
      vulnerabilities < 24 hours, zero unpatched critical CVEs > 30 days). Document
      platform reliability and security objectives in a centralized location. Implement
      SLO monitoring with error budget tracking.
    tools:
      - "SLO monitoring (Sloth, Google SLO Generator)"
      - "Prometheus + Grafana"
      - "Backstage Scorecards"
      - "OPA (policy objectives as code)"
  devsecops:
    prose: >-
      Define measurable security objectives for the software delivery lifecycle such as
      maximum time to remediate vulnerabilities by severity, minimum code coverage for
      security tests, and zero critical findings in production deployments. Track these
      objectives through CI/CD pipeline metrics and security dashboard reporting.
    tools:
      - "GitLab Security Dashboard"
      - "GitLab Value Stream Analytics"
      - "DORA Metrics"
      - "Vulnerability SLA tracking"
  secops:
    prose: >-
      Document security program objectives aligned with trust services criteria. Define
      risk appetite and tolerance statements approved by leadership. Establish measurable
      security KPIs and track them through regular reporting. Ensure objectives cover
      all in-scope trust service categories. Review and update objectives annually or
      when significant changes occur.
    tools:
      - "GRC Platforms (risk register, objectives tracking)"
      - "Risk appetite framework documentation"
      - "Security metrics dashboards"
