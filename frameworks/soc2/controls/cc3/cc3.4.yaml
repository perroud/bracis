id: cc3.4
family: cc3
title: "COSO Principle 9 — Identifies and analyzes significant change"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity identifies and assesses changes that could significantly impact the system
    of internal control. The entity assesses changes in the external environment, changes
    in the business model, and changes in leadership.
guidance:
  prose: >-
    The organization must have processes to identify and assess changes that could
    significantly impact its internal controls. This includes changes in technology,
    regulatory environment, business operations, personnel, vendor relationships, and
    threat landscape. For technology organizations, this means evaluating the security
    impact of architecture changes, new integrations, cloud migrations, team restructuring,
    and changes in the threat environment.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement architecture decision records (ADRs) that capture the security impact
      assessment for significant platform changes. Maintain a change risk assessment
      process for infrastructure modifications. Monitor cloud provider changes and
      deprecations that could impact controls. Track technology lifecycle and end-of-life
      dates for platform components.
    tools:
      - "ADR templates in Git repositories"
      - "Backstage TechDocs"
      - "Cloud provider change notifications"
      - "Dependency lifecycle monitoring (Dependabot, Renovate)"
  devsecops:
    prose: >-
      Require security impact assessments for significant changes through merge request
      templates. Implement automated detection of high-risk changes (e.g., changes to
      authentication, authorization, encryption, or data handling) that trigger additional
      review requirements. Track external dependency changes and their security implications
      through automated dependency update tools.
    tools:
      - "GitLab Merge Request Templates"
      - "GitLab Approval Rules (conditional)"
      - "Renovate / Dependabot"
      - "GitLab CI security scanning"
  secops:
    prose: >-
      Maintain a change management process that includes security impact assessment for
      all significant changes. Monitor regulatory changes that affect compliance obligations.
      Track vendor risk changes through continuous monitoring services. Reassess risk
      when significant organizational, operational, or environmental changes occur.
      Document change impact assessments in the risk register.
    tools:
      - "GRC Platforms (change impact tracking)"
      - "Regulatory change monitoring services"
      - "Third-party risk monitoring (SecurityScorecard)"
      - "ITSM Change Management"
