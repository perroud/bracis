id: cc3.2
family: cc3
title: "COSO Principle 7 — Identifies and analyzes risk"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity identifies risks to the achievement of its objectives across the entity
    and analyzes risks as a basis for determining how the risks should be managed. The
    entity identifies and assesses risks at the entity level, at significant transaction
    levels, and considers factors such as changes in the external environment, business
    model, and leadership.
guidance:
  prose: >-
    The organization must have a formal risk assessment process that identifies and
    analyzes risks to achieving its trust services objectives. This includes assessing
    likelihood and impact of identified risks, considering both internal and external
    threat sources, and maintaining a current risk register. For technology organizations,
    this includes threat modeling, vulnerability assessments, third-party risk assessments,
    and periodic risk assessment exercises.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated vulnerability scanning across all platform layers (infrastructure,
      containers, applications, dependencies). Conduct threat modeling for platform
      architecture using frameworks such as STRIDE. Perform regular infrastructure
      risk assessments covering cloud misconfigurations, network exposures, and supply
      chain risks. Integrate risk identification into architecture review processes.
    tools:
      - "Vulnerability scanners (Trivy, Grype)"
      - "Cloud security posture (Prowler, ScoutSuite)"
      - "Threat modeling tools (OWASP Threat Dragon, Microsoft TMT)"
      - "Infrastructure scanning (Checkov, tfsec)"
  devsecops:
    prose: >-
      Integrate risk identification into the development lifecycle through automated
      security scanning at every pipeline stage. Perform SAST, DAST, SCA, and container
      scanning to continuously identify application-level risks. Maintain a vulnerability
      management process that triages, prioritizes, and tracks remediation. Conduct
      threat modeling as part of design reviews for new features.
    tools:
      - "GitLab SAST"
      - "GitLab DAST"
      - "GitLab Dependency Scanning"
      - "GitLab Container Scanning"
      - "GitLab Secret Detection"
  secops:
    prose: >-
      Conduct formal risk assessments at least annually and when significant changes
      occur. Maintain a risk register documenting identified risks, risk owners, likelihood,
      impact, and treatment plans. Perform third-party risk assessments for critical
      vendors. Monitor external threat intelligence for emerging risks. Report risk
      assessment results to leadership and the board.
    tools:
      - "GRC Platforms (risk register)"
      - "Threat intelligence platforms"
      - "Third-party risk management (SecurityScorecard, BitSight)"
      - "NIST RMF tools"