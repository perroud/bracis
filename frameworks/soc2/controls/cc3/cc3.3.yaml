id: cc3.3
family: cc3
title: "COSO Principle 8 — Assesses fraud risk"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity considers the potential for fraud in assessing risks to the achievement
    of objectives. The entity considers various types of fraud including fraudulent
    reporting, possible loss of assets, and corruption. The entity assesses incentive
    and pressures, opportunities, and attitudes and rationalizations.
guidance:
  prose: >-
    The organization must specifically consider fraud risks as part of its risk assessment
    process. This includes assessing risks of unauthorized access, data theft, manipulation
    of processing, misrepresentation of system status, and insider threats. For technology
    organizations, this means evaluating risks of code tampering, unauthorized data
    exfiltration, privilege abuse, manipulation of financial transactions processed by
    systems, and social engineering attacks.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement integrity verification for all deployable artifacts (container image
      signing, binary provenance). Deploy behavioral analytics to detect anomalous access
      patterns that may indicate insider threats or compromised accounts. Implement
      separation of duties controls that prevent a single individual from deploying
      unreviewed code. Use supply chain security measures (SLSA framework) to prevent
      code tampering.
    tools:
      - "Sigstore / Cosign (artifact signing)"
      - "SLSA framework compliance"
      - "UEBA (User Entity Behavior Analytics)"
      - "Kubernetes admission controllers"
  devsecops:
    prose: >-
      Enforce commit signing to prevent code impersonation. Implement branch protection
      rules requiring multiple approvals to prevent unauthorized code changes. Use secret
      detection scanning to identify leaked credentials that could enable fraud. Implement
      pipeline integrity controls that prevent tampering with build and deployment
      processes. Monitor for force pushes and history rewrites.
    tools:
      - "GitLab Protected Branches"
      - "GitLab Secret Detection"
      - "Git commit signing (GPG/SSH)"
      - "GitLab Push Rules"
      - "GitLab Audit Events"
  secops:
    prose: >-
      Include fraud risk scenarios in the risk assessment process. Implement insider
      threat detection programs using UEBA and DLP tools. Monitor privileged account
      activity for anomalous behavior. Conduct periodic access reviews to identify
      excessive or inappropriate access. Establish anti-fraud controls including
      separation of duties, dual authorization for sensitive operations, and
      whistleblower channels.
    tools:
      - "UEBA (Exabeam, Microsoft Sentinel)"
      - "DLP (Data Loss Prevention)"
      - "Privileged Access Management (CyberArk, BeyondTrust)"
      - "SIEM correlation rules"
