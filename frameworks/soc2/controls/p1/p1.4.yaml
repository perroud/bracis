id: p1.4
family: p1
title: "Use, retention, and disposal of personal information"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity limits the use of personal information to the purposes identified in the
    entity's objectives related to privacy. The entity retains personal information
    consistent with the entity's objectives related to privacy. The entity securely
    disposes of personal information to meet the entity's objectives related to privacy.
guidance:
  prose: >-
    The organization must limit the use of personal information to the purposes for which
    it was collected (purpose limitation), retain it only as long as necessary to fulfill
    those purposes, and securely dispose of it when retention is no longer required. This
    requires documented retention schedules, automated enforcement of retention periods,
    and verified secure disposal processes.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement purpose limitation controls that tag data with its collection purpose
      and enforce usage restrictions. Deploy automated data retention enforcement
      through database purge jobs, storage lifecycle policies, and event-driven cleanup.
      Implement secure deletion that renders data unrecoverable. Use data masking for
      analytics to prevent purpose creep.
    tools:
      - "Data lifecycle management automation"
      - "Database purge schedulers"
      - "Storage lifecycle policies"
      - "Data masking / anonymization"
      - "Purpose tagging infrastructure"
  devsecops:
    prose: >-
      Implement automated tests for data retention logic. Validate that data deletion
      jobs execute correctly through CI/CD pipeline testing. Include retention
      compliance checks in deployment pipelines. Test secure disposal mechanisms to
      verify data is unrecoverable.
    tools:
      - "Data retention testing in CI/CD"
      - "Deletion verification tests"
      - "GitLab CI/CD scheduled jobs (retention enforcement)"
  secops:
    prose: >-
      Define and document data retention schedules for all personal information categories.
      Implement automated retention enforcement with manual oversight. Conduct periodic
      audits to verify retention compliance. Track disposal activities with certificates
      of destruction. Ensure backup retention aligns with data disposal requirements.
      Monitor for unauthorized use of personal information beyond stated purposes.
    tools:
      - "Privacy management platforms (retention management)"
      - "Data lifecycle governance"
      - "Disposal certification tracking"
      - "Usage monitoring and alerting"
