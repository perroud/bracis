id: p1.5
family: p1
title: "Access to personal information"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity grants identified and authenticated data subjects the ability to access
    their stored personal information for review and, upon request, provides physical or
    electronic copies of that information to data subjects to meet the entity's objectives
    related to privacy.
guidance:
  prose: >-
    The organization must provide individuals with the ability to access their personal
    information that the organization holds. This includes the ability to review the
    information and obtain copies. Access requests must be handled in a timely manner
    consistent with regulatory requirements (e.g., 30 days under GDPR). The organization
    must verify the identity of the requestor before disclosing personal information.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement self-service data access portals that allow authenticated users to view
      and download their personal information. Build data export APIs that can aggregate
      personal information from multiple services. Implement identity verification
      mechanisms for access requests. Ensure exported data is in a portable, machine-
      readable format.
    tools:
      - "User data portal (self-service)"
      - "Data export APIs"
      - "Identity verification services"
      - "Data aggregation services"
  devsecops:
    prose: >-
      Implement and test data subject access request (DSAR) workflows in CI/CD pipelines.
      Validate data export completeness through automated testing. Ensure DSAR APIs are
      included in security scanning. Test identity verification flows for access requests.
    tools:
      - "DSAR workflow testing"
      - "API testing for data export"
      - "GitLab CI/CD (DSAR pipeline testing)"
  secops:
    prose: >-
      Implement a formal data subject access request (DSAR) process with defined SLAs
      (e.g., 30 days for GDPR, 45 days for CCPA). Track DSAR requests from receipt
      through fulfillment. Verify requestor identity before disclosing information.
      Maintain records of all DSARs and responses. Report DSAR metrics to the DPO.
    tools:
      - "Privacy management platforms (DSAR management)"
      - "Identity verification tools"
      - "DSAR tracking and reporting"
      - "Data discovery tools (for locating personal information)"
