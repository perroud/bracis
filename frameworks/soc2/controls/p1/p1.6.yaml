id: p1.6
family: p1
title: "Disclosure and notification of personal information"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity discloses personal information to third parties with the consent of the
    data subjects, and such disclosure is consistent with the objectives of the entity
    related to privacy. The entity creates and retains a complete, accurate, and timely
    record of authorized disclosures of personal information.
guidance:
  prose: >-
    The organization must ensure that personal information is only disclosed to third
    parties with proper consent and consistent with the privacy notice. All disclosures
    must be documented including the recipient, purpose, date, and information disclosed.
    Data processing agreements must be in place with third parties who receive personal
    information. The organization must be able to demonstrate that all disclosures were
    authorized and documented.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement API-level controls that enforce authorization checks before disclosing
      personal information to third-party integrations. Log all data sharing events
      with full context (recipient, data elements, purpose, consent basis). Implement
      data sharing APIs with rate limiting and access controls. Deploy monitoring for
      unauthorized data flows to third parties.
    tools:
      - "API authorization controls"
      - "Data sharing audit logging"
      - "DLP for outbound data flows"
      - "Third-party integration monitoring"
  devsecops:
    prose: >-
      Implement automated tests for data sharing authorization controls. Validate that
      third-party data sharing endpoints enforce consent checks. Scan for unauthorized
      data sharing patterns in code reviews. Include privacy checks in merge request
      approval processes for features involving data disclosure.
    tools:
      - "API security testing"
      - "Data sharing authorization tests"
      - "Code review for data disclosure patterns"
      - "GitLab Merge Request reviews"
  secops:
    prose: >-
      Maintain a record of all third parties that receive personal information. Ensure
      data processing agreements (DPAs) are in place with all data recipients. Log and
      monitor all personal information disclosures. Conduct periodic audits of third-party
      data sharing practices. Report disclosure metrics to the DPO. Implement breach
      notification procedures for unauthorized disclosures.
    tools:
      - "Privacy management platforms (third-party management)"
      - "DPA management"
      - "Disclosure logging and monitoring"
      - "Third-party risk management"
