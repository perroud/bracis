id: p1.1
family: p1
title: "Privacy notice and consent"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity provides notice to data subjects about its privacy practices to meet the
    entity's objectives related to privacy. The notice is updated and communicated to data
    subjects in a timely manner for changes to the entity's privacy practices, including
    changes in the use of personal information, to meet the entity's objectives related
    to privacy.
guidance:
  prose: >-
    The organization must provide clear, accessible privacy notices to individuals whose
    personal information it collects or processes. Privacy notices must describe what
    personal information is collected, how it is used, with whom it is shared, how long
    it is retained, and what rights individuals have. Notices must be updated when privacy
    practices change and communicated to affected individuals.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement privacy notice delivery mechanisms in user-facing applications including
      initial registration, cookie consent, and policy update notifications. Maintain
      privacy notices as version-controlled content that triggers user notification when
      updated. Implement consent management infrastructure that records user consent
      and preference choices.
    tools:
      - "Consent management platforms (OneTrust, Cookiebot)"
      - "Version-controlled privacy notices"
      - "User notification services"
      - "Cookie consent banners"
  devsecops:
    prose: >-
      Include privacy notice delivery and consent capture in application testing.
      Validate consent mechanisms function correctly through automated UI tests. Version
      control privacy notice content alongside application code. Implement feature flags
      to manage privacy notice updates across application versions.
    tools:
      - "UI testing for consent flows"
      - "Version-controlled privacy content"
      - "Feature flags for notice updates"
      - "GitLab CI/CD (consent flow testing)"
  secops:
    prose: >-
      Maintain a privacy notice that complies with applicable regulations (GDPR, CCPA,
      etc.). Establish a process for reviewing and updating privacy notices when practices
      change. Track consent records and ensure they are maintained for the required
      retention period. Monitor for regulatory changes that may require notice updates.
      Conduct periodic reviews of privacy notice accuracy.
    tools:
      - "Privacy management platforms (OneTrust, TrustArc)"
      - "Consent record management"
      - "Regulatory monitoring services"
      - "GRC Platforms (privacy module)"
