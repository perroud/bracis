id: p1.8
family: p1
title: "Monitoring and enforcement of privacy"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity monitors compliance with its privacy commitments and system requirements
    and has procedures to address privacy-related inquiries, complaints, and disputes.
    The entity monitors compliance with its privacy practices and addresses privacy-
    related complaints and disputes. The entity implements a process for receiving,
    addressing, resolving, and communicating the resolution of inquiries, complaints,
    and disputes from data subjects and others.
guidance:
  prose: >-
    The organization must actively monitor its compliance with privacy commitments and
    have processes for handling privacy-related inquiries, complaints, and disputes.
    This includes a designated point of contact for privacy matters, a complaint intake
    process, investigation procedures, resolution tracking, and communication of outcomes.
    Privacy monitoring should include regular assessments of privacy practice compliance,
    incident detection, and trend analysis.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement privacy monitoring infrastructure including automated detection of
      personal information in unauthorized locations, data flow monitoring, and consent
      enforcement verification. Build privacy complaint intake forms and tracking
      workflows. Deploy monitoring for privacy-relevant events such as bulk data exports
      and access pattern anomalies.
    tools:
      - "Data discovery and classification (automated PII detection)"
      - "Privacy monitoring dashboards"
      - "Complaint intake workflow systems"
      - "DLP monitoring"
  devsecops:
    prose: >-
      Implement automated privacy compliance checks in CI/CD pipelines including PII
      detection in logs and code, consent enforcement verification, and data flow
      validation. Include privacy-focused test cases in release criteria. Scan for
      privacy anti-patterns in code reviews.
    tools:
      - "PII detection in CI/CD (custom rules)"
      - "Privacy compliance testing"
      - "Log scanning for PII"
      - "GitLab SAST (custom privacy rules)"
  secops:
    prose: >-
      Designate a privacy officer (DPO) or equivalent role responsible for privacy
      program oversight. Implement a privacy complaint intake and resolution process
      with defined SLAs. Conduct periodic privacy assessments and audits. Monitor for
      privacy incidents and breaches. Track privacy metrics including complaint volumes,
      resolution times, and DSAR fulfillment rates. Report privacy program status to
      leadership regularly.
    tools:
      - "Privacy management platforms (complaint management)"
      - "GRC Platforms (privacy assessments)"
      - "Privacy incident tracking"
      - "Privacy metrics dashboards"
