id: p1.7
family: p1
title: "Quality of personal information"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity collects and maintains accurate, up-to-date, complete, and relevant personal
    information for the purposes identified in the notice. The entity provides data
    subjects with the ability to update or correct personal information.
guidance:
  prose: >-
    The organization must maintain accurate and current personal information and provide
    individuals with the ability to correct inaccurate data. This requires mechanisms for
    data subjects to update their information, processes for the organization to verify
    data accuracy, and procedures for correcting inaccuracies when identified. Data
    quality controls should be embedded in collection and processing activities.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement self-service user profile management that allows individuals to review
      and update their personal information. Deploy data quality validation at collection
      and update points. Implement data consistency checks across services that store
      personal information. Provide APIs for data correction that propagate updates
      across all systems.
    tools:
      - "User profile management UI"
      - "Data validation frameworks"
      - "Data synchronization services"
      - "Master data management"
  devsecops:
    prose: >-
      Test data update and correction workflows in CI/CD pipelines. Validate that
      corrections propagate correctly across all data stores. Implement automated tests
      for data quality validation rules. Ensure correction APIs are included in security
      scanning.
    tools:
      - "Data update workflow testing"
      - "Propagation validation tests"
      - "GitLab CI/CD (data quality tests)"
  secops:
    prose: >-
      Implement a data correction request process with defined SLAs. Track correction
      requests from receipt through completion. Verify corrections propagate to all
      copies of the data including backups and analytics systems. Conduct periodic data
      quality assessments. Report data quality metrics to the DPO.
    tools:
      - "Privacy management platforms (correction tracking)"
      - "Data quality monitoring"
      - "Correction request management"
      - "Data quality dashboards"
