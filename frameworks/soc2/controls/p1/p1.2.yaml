id: p1.2
family: p1
title: "Choice and consent"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity communicates choices available regarding the collection, use, retention,
    disclosure, and disposal of personal information to data subjects and the consequences,
    if any, of each choice. Explicit consent is obtained for the collection, use, retention,
    disclosure, and disposal of personal information for purposes other than those for
    which the information was originally collected or subsequently authorized. Any changes
    to such choices are communicated to data subjects.
guidance:
  prose: >-
    The organization must provide individuals with meaningful choices about how their
    personal information is collected, used, retained, disclosed, and disposed of.
    Where consent is required (particularly for processing beyond the original purpose),
    explicit consent must be obtained and documented. Individuals must be able to withdraw
    consent, and the consequences of each choice must be clearly communicated.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a consent management infrastructure that captures, stores, and enforces
      user consent preferences. Build preference centers that allow users to manage their
      consent choices. Implement consent propagation across microservices so that consent
      decisions are enforced throughout the data processing chain. Support consent
      withdrawal with automated data processing adjustments.
    tools:
      - "Consent management platforms"
      - "User preference centers"
      - "Consent enforcement middleware"
      - "Event-driven consent propagation"
  devsecops:
    prose: >-
      Test consent capture and enforcement mechanisms in CI/CD pipelines. Validate that
      consent preferences are correctly propagated through data processing flows.
      Implement automated tests that verify data processing stops when consent is
      withdrawn. Include consent-related acceptance tests in release criteria.
    tools:
      - "Automated consent flow testing"
      - "Integration tests for consent enforcement"
      - "GitLab CI/CD (privacy test suites)"
  secops:
    prose: >-
      Maintain consent records with timestamps and the specific purposes consented to.
      Implement a consent withdrawal process with defined SLAs for cessation of processing.
      Conduct periodic audits of consent records to verify completeness. Monitor for
      processing activities that occur without proper consent. Report consent metrics
      to the DPO or privacy team.
    tools:
      - "Privacy management platforms (OneTrust, TrustArc)"
      - "Consent audit tools"
      - "Data processing activity records"
      - "Privacy impact assessments"
