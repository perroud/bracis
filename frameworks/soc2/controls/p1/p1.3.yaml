id: p1.3
family: p1
title: "Collection of personal information"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    Personal information is collected consistent with the entity's objectives related to
    privacy. The entity collects personal information only for the purposes identified
    in the notice. The entity collects personal information by fair and lawful means.
    The entity collects only the personal information that is necessary for the purposes
    identified in the notice (data minimization).
guidance:
  prose: >-
    The organization must ensure that personal information collection is limited to what
    is necessary for the stated purposes (data minimization), collected through fair and
    lawful means, and consistent with the privacy notice. This requires knowing what
    personal information is collected at each point, why it is collected, and whether it
    is truly necessary. Collection must not exceed what was disclosed in the privacy notice.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement data minimization controls at the application and API layer. Use schema
      validation to restrict collected fields to only those documented as necessary.
      Implement data collection logging that records what personal information is collected,
      when, and for what purpose. Deploy privacy-by-design principles in platform
      architecture including purpose limitation and data minimization.
    tools:
      - "API schema validation (field restriction)"
      - "Data collection audit logging"
      - "Privacy-by-design architecture patterns"
      - "Data flow mapping tools"
  devsecops:
    prose: >-
      Include privacy reviews in merge request processes for features that collect
      personal information. Implement automated checks that detect new personal data
      collection points. Use SAST rules to identify over-collection patterns. Require
      privacy impact assessments for new data collection features.
    tools:
      - "GitLab Merge Request reviews (privacy)"
      - "Custom SAST rules (PII detection)"
      - "Privacy impact assessment templates"
      - "Data flow analysis tools"
  secops:
    prose: >-
      Maintain a record of processing activities (ROPA) that documents all personal
      information collection points, purposes, and legal bases. Conduct periodic reviews
      to verify collection practices align with the privacy notice. Implement a process
      for approving new personal information collection (privacy impact assessment).
      Monitor for unauthorized or excessive data collection.
    tools:
      - "Privacy management platforms (ROPA)"
      - "Privacy impact assessment tools"
      - "Data discovery and classification"
      - "DLP (data collection monitoring)"
