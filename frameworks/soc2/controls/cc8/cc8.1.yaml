id: cc8.1
family: cc8
title: "Changes to infrastructure, data, software, and procedures"
class: SOC2-TSC
baselines: [type-i, type-ii]
statement:
  prose: >-
    The entity authorizes, designs, develops or acquires, configures, documents, tests,
    approves, and implements changes to infrastructure, data, software, and procedures
    to meet its objectives.
guidance:
  prose: >-
    The organization must have a formal change management process covering all changes
    to systems, infrastructure, data, and procedures. Changes must be authorized, documented,
    tested, approved, and implemented in a controlled manner. This is one of the most
    critical SOC 2 criteria for technology companies, as it directly maps to software
    development and deployment practices. Auditors will examine the end-to-end change
    process including development, testing, code review, approval, deployment, and
    post-deployment verification.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement GitOps-based change management where all infrastructure and configuration
      changes are made through version-controlled code with peer review. Enforce
      infrastructure-as-code practices requiring merge request approval before any
      infrastructure change. Implement progressive delivery strategies (canary, blue-green)
      to reduce change risk. Maintain separate environments for development, staging,
      and production with promotion controls. Automate rollback procedures.
    tools:
      - "GitLab / Git (version control)"
      - "ArgoCD / Flux (GitOps)"
      - "Terraform / Pulumi (IaC)"
      - "Progressive delivery (Argo Rollouts, Flagger)"
      - "Environment promotion pipelines"
  devsecops:
    prose: >-
      Enforce a complete change management workflow in GitLab: feature branches for
      development, merge requests for code review, CI pipeline for automated testing
      and security scanning, required approvals for merge, and controlled deployment to
      production. Implement compliance pipelines that enforce security scanning
      regardless of project-level configuration. Maintain audit trails of all changes
      including who made the change, who approved it, and when it was deployed.
    tools:
      - "GitLab Merge Requests"
      - "GitLab Protected Branches"
      - "GitLab Approval Rules"
      - "GitLab CI/CD Pipelines"
      - "GitLab Compliance Pipelines"
      - "GitLab Protected Environments"
      - "GitLab Audit Events"
  secops:
    prose: >-
      Implement a formal change management policy with classification levels (standard,
      normal, emergency) and corresponding procedures. Track all changes in an ITSM
      system with documented justification, risk assessment, test results, and approvals.
      Conduct change advisory board (CAB) reviews for high-risk changes. Monitor change
      success rates and post-implementation issues. Audit change management compliance
      periodically.
    tools:
      - "ITSM (ServiceNow, Jira Service Management)"
      - "GitLab Audit Events"
      - "Change management reporting"
      - "Post-implementation review tracking"