control_families:
  - id: gov
    title: "Internal Governance Structures and Measures"
    description: "Establishing clear internal governance structures, risk management frameworks, roles and responsibilities, and accountability mechanisms for AI systems."
    control_count: 4
  - id: ops
    title: "Operations Management"
    description: "Determining and implementing risk mitigation measures across the AI system lifecycle, including algorithm design, data management, and human oversight."
    control_count: 5
  - id: cust
    title: "Stakeholder Interaction and Communication"
    description: "Managing the relationship between organizations and individuals affected by AI-driven decisions, including transparency, disclosure, and explanation of AI outcomes."
    control_count: 4
  - id: dev
    title: "AI Model Development and Monitoring"
    description: "Ensuring responsible AI model building through data provenance, testing, validation, monitoring, and ongoing accountability throughout the model lifecycle."
    control_count: 3

related_frameworks:
  - framework_id: nist-ai-rmf
    relationship: mapped
    description: "NIST AI RMF provides a complementary risk management structure aligned with the SG AI Governance Framework's emphasis on governance, risk mapping, and accountability."
  - framework_id: pdpa-singapore
    relationship: complements
    description: "The PDPA establishes the personal data protection requirements that underpin the AI Governance Framework's data management and consent obligations."

