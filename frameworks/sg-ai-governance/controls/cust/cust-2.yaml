id: cust-2
family: cust
title: "Explainability of AI-Driven Decisions"
class: SG-AI-GOV

statement:
  prose: >-
    Organizations should provide meaningful explanations of AI-driven decisions to
    affected individuals, particularly where such decisions have significant
    consequences. Explanations should be tailored to the audience and convey the
    key factors that influenced the decision. The level of explainability should be
    commensurate with the severity of the potential impact and the individual's
    reasonable expectations.

guidance:
  prose: >-
    Explainability goes beyond disclosure — it requires organizations to help
    individuals understand why a particular decision was reached. Explanations may
    include the main factors or features that influenced the outcome, the data used,
    and the general logic of the algorithm. Organizations should adopt appropriate
    explainability techniques depending on the model type, such as feature importance
    rankings, counterfactual explanations, or simplified decision rules. For complex
    models where full transparency is not feasible, organizations should provide
    meaningful approximations or summaries. Explanations should be available upon
    request and proactively provided for high-impact decisions.

references:
  - citation: "Singapore Model AI Governance Framework, 2nd Edition, Section 2.3 — Explainability"
    url: "https://www.pdpc.gov.sg/help-and-resources/2020/01/model-ai-governance-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate model explainability libraries into the AI serving infrastructure
      so that explanations can be generated alongside predictions. Implement a
      standardized explanation API that returns feature importances, confidence
      scores, and human-readable rationales for each AI decision. Cache and store
      explanations for audit and customer service purposes. Provide platform-level
      templates for different explanation formats (technical, consumer-friendly,
      regulatory).
    tools:
      - shap
      - lime
      - mlflow
      - backstage-catalog
      - redis

  devsecops:
    prose: >-
      Require explainability implementation as a mandatory CI/CD gate for
      customer-facing AI models. Implement automated tests that verify explanation
      outputs are consistent, meaningful, and performant. Include explainability
      quality metrics in model evaluation pipelines. Enforce documentation of
      the explainability approach in model cards.
    tools:
      - gitlab-ci
      - shap
      - lime
      - model-cards
      - pytest

  secops:
    prose: >-
      Monitor explainability system performance and availability. Alert on
      explanation generation failures or degraded quality. Track customer requests
      for explanations and ensure timely responses. Generate reports on
      explainability coverage and quality across deployed AI systems.
    tools:
      - datadog
      - grafana
      - splunk
      - pagerduty

legal_references:
  - framework_id: nist-ai-rmf
    articles: ["gv-4", "ms-2"]
    relationship: mapped
  - framework_id: pdpa-singapore
    articles: ["acc-1"]
    relationship: complements
