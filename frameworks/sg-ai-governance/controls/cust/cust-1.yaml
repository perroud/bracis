id: cust-1
family: cust
title: "Disclosure of AI Use in Decision-Making"
class: SG-AI-GOV

statement:
  prose: >-
    Organizations should be transparent about their use of AI in decision-making
    that affects individuals. Where practicable, organizations should inform
    individuals that AI is being used as part of the decision-making process.
    The disclosure should be proportionate to the significance of the decision
    and the potential impact on the individual. Organizations should provide
    general information about how the AI system operates and the role it plays
    in the decision process.

guidance:
  prose: >-
    Transparency builds trust and enables individuals to understand how decisions
    affecting them are made. Disclosure should be timely — ideally before or at
    the time the AI-driven decision is made. The level of detail provided should
    be appropriate for the audience and the context. For consumer-facing
    applications, disclosures should be clear, accessible, and written in plain
    language. Organizations should consider multiple channels for disclosure
    including terms of service, in-application notifications, and proactive
    communications. Disclosure obligations are particularly important for
    decisions with significant consequences such as credit assessments, employment
    decisions, and healthcare recommendations.

references:
  - citation: "Singapore Model AI Governance Framework, 2nd Edition, Section 2.3 — Operations Management — Stakeholder Interaction and Communication"
    url: "https://www.pdpc.gov.sg/help-and-resources/2020/01/model-ai-governance-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement standardized AI disclosure components in the platform's UI toolkit
      that application teams can integrate into user-facing interfaces. Create
      platform-level metadata fields that track whether AI disclosure has been
      implemented for each AI-powered feature. Enforce disclosure verification as
      a deployment prerequisite for customer-facing AI services through
      policy-as-code.
    tools:
      - backstage-catalog
      - open-policy-agent
      - storybook

  devsecops:
    prose: >-
      Require AI disclosure implementation verification as a CI/CD pipeline stage
      for customer-facing applications. Implement automated tests that verify
      disclosure components are present and functional in AI-powered user flows.
      Include disclosure review in merge request checklists for AI feature changes.
    tools:
      - gitlab-ci
      - selenium
      - cypress
      - pre-commit

  secops:
    prose: >-
      Monitor AI disclosure compliance across deployed services. Track user
      interactions with disclosure mechanisms to assess effectiveness. Alert on
      deployments of AI-powered features that lack required disclosure components.
      Generate periodic disclosure compliance reports for governance review.
    tools:
      - datadog
      - splunk
      - grafana

legal_references:
