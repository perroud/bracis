id: cust-3
family: cust
title: "Channels for Feedback and Recourse"
class: SG-AI-GOV

statement:
  prose: >-
    Organizations should provide accessible channels through which individuals
    affected by AI-driven decisions can seek clarification, provide feedback, or
    request human review of decisions. Recourse mechanisms should enable
    individuals to challenge AI-driven decisions and have them reconsidered by
    a qualified human decision-maker. The availability of such channels should
    be clearly communicated to affected individuals.

guidance:
  prose: >-
    Effective recourse mechanisms are essential for maintaining trust in AI systems
    and ensuring that errors can be identified and corrected. Organizations should
    establish clear procedures for handling complaints, appeals, and feedback
    related to AI decisions. Response timelines should be defined and
    communicated. Staff handling recourse requests should have the authority and
    information necessary to investigate and override AI decisions when warranted.
    Feedback received through these channels should be systematically collected
    and used to improve AI system performance. Organizations should track recourse
    request volumes, outcomes, and resolution times as key governance metrics.

references:
  - citation: "Singapore Model AI Governance Framework, 2nd Edition, Section 2.3 — Providing Channels for Feedback and Recourse"
    url: "https://www.pdpc.gov.sg/help-and-resources/2020/01/model-ai-governance-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build recourse management capabilities into the platform including feedback
      submission APIs, case management queues, and human review workflows.
      Implement a centralized feedback system that routes AI-related complaints
      to qualified reviewers with access to model explanations, decision context,
      and override capabilities. Track recourse cases through their full lifecycle
      and link outcomes back to model improvement pipelines.
    tools:
      - backstage-catalog
      - jira
      - airflow
      - redis

  devsecops:
    prose: >-
      Require recourse mechanism implementation and testing as part of the
      deployment pipeline for customer-facing AI features. Implement automated
      tests that verify feedback channels are functional and accessible. Include
      recourse workflow testing in end-to-end test suites. Ensure model retraining
      pipelines can incorporate feedback data.
    tools:
      - gitlab-ci
      - selenium
      - cypress
      - pytest

  secops:
    prose: >-
      Monitor recourse channel availability and response times. Alert on SLA
      breaches for recourse request handling. Track recourse request patterns to
      identify systematic AI decision errors. Generate periodic reports on
      recourse metrics including volumes, outcomes, and resolution times for
      governance review.
    tools:
      - datadog
      - grafana
      - splunk
      - pagerduty

legal_references:
