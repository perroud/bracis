id: cust-4
family: cust
title: "AI-Augmented vs AI-Automated Decision Classification"
class: SG-AI-GOV

statement:
  prose: >-
    Organizations should clearly distinguish between AI-augmented decision-making
    (where AI provides recommendations to a human who makes the final decision)
    and AI-automated decision-making (where the AI system makes decisions without
    direct human involvement). The classification of each AI use case should drive
    the level of governance, transparency, and human oversight applied. Organizations
    should regularly review and update these classifications as AI systems evolve.

guidance:
  prose: >-
    The distinction between AI-augmented and AI-automated decisions is fundamental
    to the framework's risk-based approach. AI-augmented decisions retain human
    judgment in the loop and may require less stringent technical safeguards but
    demand that human decision-makers are adequately supported with information and
    tools. AI-automated decisions require more robust technical controls including
    comprehensive testing, monitoring, exception handling, and periodic human review.
    Organizations should document the classification of each AI use case, the
    rationale for the classification, and the corresponding governance measures
    applied. Reclassification should occur when the role of AI in the decision
    process changes, such as when a previously augmented process becomes fully
    automated.

references:
  - citation: "Singapore Model AI Governance Framework, 2nd Edition, Section 2.2 — AI-Augmented and AI-Automated Decisions"
    url: "https://www.pdpc.gov.sg/help-and-resources/2020/01/model-ai-governance-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement mandatory classification metadata in the AI model registry that
      tags each model as supporting augmented or automated decision-making.
      Enforce classification-specific deployment policies through platform-level
      controls — automated decision models require additional approval gates,
      monitoring thresholds, and fallback mechanisms. Create platform templates
      that embed appropriate governance controls based on the decision
      classification.
    tools:
      - backstage-catalog
      - open-policy-agent
      - mlflow
      - kyverno

  devsecops:
    prose: >-
      Require decision classification as a mandatory field in model deployment
      manifests. Implement classification-aware CI/CD pipelines that apply
      different validation stages based on whether the model supports augmented
      or automated decisions. Enforce stricter testing requirements for automated
      decision models including edge case testing, adversarial testing, and
      comprehensive fairness evaluation.
    tools:
      - gitlab-ci
      - model-cards
      - fairlearn
      - pre-commit

  secops:
    prose: >-
      Monitor for misclassification indicators such as augmented-classified models
      operating without human review. Alert on automated decision models that lack
      required monitoring coverage. Track classification changes and ensure
      corresponding governance adjustments are implemented. Generate classification
      compliance reports for governance review.
    tools:
      - datadog
      - splunk
      - grafana
      - elastic-siem

