id: ops-4
family: ops
title: "AI System Security and Resilience"
class: SG-AI-GOV

statement:
  prose: >-
    Organizations should implement security measures to protect AI systems from
    adversarial attacks, data poisoning, model theft, and other AI-specific
    threats. Security measures should cover the entire AI lifecycle including
    data collection, model training, deployment, and operation. Organizations
    should assess the robustness of AI models against adversarial inputs and
    implement appropriate countermeasures.

guidance:
  prose: >-
    AI systems introduce unique security risks beyond those of traditional software
    systems. These include adversarial attacks that manipulate model inputs to produce
    incorrect outputs, data poisoning attacks that corrupt training data, model
    extraction attacks that steal proprietary models, and evasion attacks that bypass
    AI-based security controls. Organizations should conduct AI-specific threat
    modeling to identify vulnerabilities. Robustness testing should include
    adversarial input testing, boundary condition testing, and stress testing under
    distribution shift. Defenses should include input validation, anomaly detection
    on model inputs and outputs, model access controls, and monitoring for signs of
    adversarial activity.

references:
  - citation: "Singapore Model AI Governance Framework, 2nd Edition, Section 2.2 — Security and Resilience"
    url: "https://www.pdpc.gov.sg/help-and-resources/2020/01/model-ai-governance-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement defense-in-depth security architecture for AI infrastructure
      including network segmentation for training environments, encrypted model
      storage, and secure model serving endpoints. Deploy adversarial input
      detection at the platform level to protect all hosted models. Implement
      model access controls with authentication, authorization, and rate limiting.
      Use infrastructure-as-code to enforce security baselines for AI workloads.
    tools:
      - vault
      - istio
      - kyverno
      - trivy
      - terraform
      - falco

  devsecops:
    prose: >-
      Integrate AI-specific security testing into CI/CD pipelines including
      adversarial robustness testing, input validation verification, and
      dependency vulnerability scanning. Implement model artifact signing to
      prevent tampering. Conduct automated threat modeling for AI components.
      Enforce secure coding practices for model serving code and APIs.
    tools:
      - gitlab-ci
      - trivy
      - adversarial-robustness-toolbox
      - checkov
      - cosign

  secops:
    prose: >-
      Monitor AI model endpoints for adversarial activity indicators including
      anomalous input patterns, unusual query volumes, and systematic probing.
      Implement AI-specific incident response procedures covering model compromise,
      data poisoning detection, and adversarial attack containment. Maintain threat
      intelligence feeds specific to AI/ML security threats.
    tools:
      - falco
      - elastic-siem
      - splunk
      - pagerduty
      - datadog

legal_references:
