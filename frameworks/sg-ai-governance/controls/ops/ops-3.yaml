id: ops-3
family: ops
title: "Human Oversight of AI Decisions"
class: SG-AI-GOV

statement:
  prose: >-
    Organizations should implement appropriate levels of human oversight in
    AI-augmented and AI-automated decision-making processes. The degree of human
    involvement should be commensurate with the risk level and potential impact of
    the AI-driven decision on individuals. For AI-augmented decisions, the human
    decision-maker should have sufficient information and authority to override the
    AI recommendation. For AI-automated decisions, organizations should implement
    mechanisms for human review and intervention.

guidance:
  prose: >-
    The framework distinguishes between AI-augmented decision-making (where AI
    provides recommendations to a human decision-maker) and AI-automated
    decision-making (where AI makes decisions without direct human involvement).
    For AI-augmented decisions, the human decision-maker must have access to
    relevant information about the AI recommendation, including confidence levels,
    key factors, and limitations. For AI-automated decisions, organizations should
    implement exception handling mechanisms, escalation procedures, and periodic
    human review of automated decisions. The level of human oversight should increase
    with the potential severity of consequences for affected individuals.

references:
  - citation: "Singapore Model AI Governance Framework, 2nd Edition, Section 2.2 — Human Involvement in AI-Augmented Decision-Making"
    url: "https://www.pdpc.gov.sg/help-and-resources/2020/01/model-ai-governance-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build human-in-the-loop interfaces into the AI platform for high-risk decision
      scenarios. Implement configurable decision thresholds that route AI outputs
      to human reviewers when confidence scores fall below defined levels. Create
      queue management systems for human review of automated decisions with SLA
      tracking. Enforce human oversight requirements through platform-level policies
      that cannot be bypassed by application teams.
    tools:
      - backstage-catalog
      - open-policy-agent
      - airflow
      - mlflow

  devsecops:
    prose: >-
      Require human oversight configuration as a mandatory deployment parameter in
      CI/CD pipelines. Implement automated tests to verify that human override
      mechanisms are functional. Include human review escalation paths in deployment
      manifests. Enforce code review by designated human oversight reviewers for
      changes to decision thresholds and automation boundaries.
    tools:
      - gitlab-ci
      - pre-commit
      - selenium
      - model-cards

  secops:
    prose: >-
      Monitor human override rates and patterns to assess whether oversight
      mechanisms are functioning effectively. Alert on anomalies such as unusually
      low override rates (which may indicate rubber-stamping) or unusually high
      rates (which may indicate model degradation). Track response times for human
      review queues and escalate SLA breaches. Generate reports on human oversight
      effectiveness for governance review.
    tools:
      - datadog
      - grafana
      - splunk
      - pagerduty

legal_references:
  - framework_id: nist-ai-rmf
    articles: ["gv-1", "mg-2"]
    relationship: mapped
  - framework_id: pdpa-singapore
    articles: ["acc-1"]
    relationship: complements
