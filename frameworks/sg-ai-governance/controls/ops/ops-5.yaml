id: ops-5
family: ops
title: "Repeatability and Reproducibility of AI Outcomes"
class: SG-AI-GOV

statement:
  prose: >-
    Organizations should ensure that AI system outcomes are repeatable and
    reproducible to the extent feasible given the nature of the AI technology
    employed. This includes maintaining consistent data processing pipelines,
    versioning models and datasets, documenting model parameters and
    configurations, and implementing controls to ensure that AI systems produce
    consistent results under comparable conditions.

guidance:
  prose: >-
    Reproducibility is essential for auditing, debugging, and governance of AI
    systems. Organizations should implement version control for all components of
    the AI system including data, code, models, configurations, and deployment
    environments. Experiment tracking should capture the full provenance chain
    from data to predictions. Where stochastic elements are present (e.g., random
    seeds in training), these should be documented and controlled where possible.
    Organizations should be able to reconstruct the state of an AI system at any
    given point in time for audit and investigation purposes.

references:
  - citation: "Singapore Model AI Governance Framework, 2nd Edition, Section 2.2 — Repeatability"
    url: "https://www.pdpc.gov.sg/help-and-resources/2020/01/model-ai-governance-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement comprehensive ML experiment tracking and model versioning in the
      platform. Enforce immutable artifact storage for trained models, training
      datasets, and configuration files. Use containerized training environments to
      ensure environmental reproducibility. Implement pipeline orchestration that
      captures the complete execution graph for every training run. Maintain a
      metadata store linking model versions to their exact training data, code
      commit, hyperparameters, and evaluation results.
    tools:
      - mlflow
      - dvc
      - kubeflow
      - docker
      - backstage-catalog

  devsecops:
    prose: >-
      Enforce model and data versioning as mandatory CI/CD pipeline requirements.
      Implement automated reproducibility checks that verify model outputs match
      expected baselines. Require deterministic build configurations and documented
      random seeds in training scripts. Use pipeline-as-code to ensure training
      pipeline definitions are version-controlled alongside model code.
    tools:
      - gitlab-ci
      - dvc
      - mlflow
      - pre-commit

  secops:
    prose: >-
      Monitor for reproducibility failures including model output inconsistencies
      across deployments. Maintain audit trails of all model versions, data
      versions, and configuration changes. Alert on unauthorized modifications to
      deployed model artifacts or configurations. Generate reproducibility reports
      that demonstrate model version traceability for compliance audits.
    tools:
      - datadog
      - splunk
      - grafana
      - elastic-siem

legal_references:
