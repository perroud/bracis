id: ops-1
family: ops
title: "Risk-Proportionate Algorithm Design and Selection"
class: SG-AI-GOV

statement:
  prose: >-
    Organizations should ensure that the selection and design of AI algorithms are
    risk-proportionate and appropriate for the intended purpose. This includes
    evaluating the trade-offs between model complexity and interpretability, selecting
    algorithms that are suitable for the data characteristics and decision context,
    and implementing safeguards proportionate to the potential impact of AI-driven
    decisions on individuals.

guidance:
  prose: >-
    Algorithm selection should consider the nature of the decision being automated,
    the potential consequences of errors, and the need for human interpretability.
    For high-impact decisions affecting individuals, organizations should favor more
    interpretable models or ensure that complex models are accompanied by robust
    explainability mechanisms. The choice of algorithm should be documented along with
    the rationale for selection, alternative algorithms considered, and the
    trade-offs evaluated. Organizations should periodically reassess whether the
    chosen algorithm remains appropriate as data patterns, business requirements,
    and risk profiles evolve.

references:
  - citation: "Singapore Model AI Governance Framework, 2nd Edition, Section 2.2 — Determining AI Decision-Making Model"
    url: "https://www.pdpc.gov.sg/help-and-resources/2020/01/model-ai-governance-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Provide a curated model library within the platform that categorizes algorithms
      by interpretability level, use-case suitability, and risk profile. Enforce
      algorithm selection documentation as a mandatory metadata field in the model
      registry. Implement policy gates that require higher approval levels for
      deploying complex, low-interpretability models in high-impact decision
      scenarios. Maintain experiment tracking that captures algorithm comparison
      results.
    tools:
      - mlflow
      - backstage-catalog
      - open-policy-agent
      - kubeflow

  devsecops:
    prose: >-
      Require algorithm selection justification as part of merge request templates
      for model changes. Implement automated complexity metrics reporting in CI/CD
      pipelines. Enforce model interpretability documentation as a mandatory pipeline
      artifact. Include algorithm comparison benchmarks in the model validation
      pipeline stage.
    tools:
      - gitlab-ci
      - model-cards
      - shap
      - lime

  secops:
    prose: >-
      Monitor deployed models for performance characteristics that may indicate
      algorithm unsuitability, such as high error rates on specific population
      segments or unexpected prediction distributions. Alert on deviations from
      documented algorithm behavior specifications. Generate periodic algorithm
      performance reports for governance review.
    tools:
      - datadog
      - grafana
      - elastic-siem
      - evidently-ai

legal_references:
