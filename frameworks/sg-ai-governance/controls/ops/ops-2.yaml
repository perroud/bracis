id: ops-2
family: ops
title: "Data Management and Governance for AI"
class: SG-AI-GOV

statement:
  prose: >-
    Organizations should implement robust data management practices throughout the
    AI system lifecycle. This includes ensuring data quality, representativeness,
    and integrity; documenting data provenance and lineage; managing data access
    controls; and ensuring compliance with applicable data protection regulations
    including the Personal Data Protection Act (PDPA). Data used for AI training,
    testing, and operation should be regularly reviewed for accuracy, relevance,
    and potential biases.

guidance:
  prose: >-
    Data management for AI extends beyond traditional data governance to address
    AI-specific concerns such as training data bias, label quality, and distribution
    shifts. Organizations should establish data quality standards that define minimum
    requirements for completeness, accuracy, consistency, and timeliness of data used
    in AI systems. Data provenance tracking should capture the origin, transformations,
    and usage history of all datasets. Bias assessments should be conducted on
    training data to identify and mitigate under-representation, historical biases,
    and labeling errors. Data access should be managed in accordance with the PDPA
    and other applicable regulations, with particular attention to the use of personal
    data in AI training.

references:
  - citation: "Singapore Model AI Governance Framework, 2nd Edition, Section 2.2 — Data Management"
    url: "https://www.pdpc.gov.sg/help-and-resources/2020/01/model-ai-governance-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a data catalog integrated with the AI platform that tracks dataset
      metadata, provenance, quality metrics, and access controls. Enforce data quality
      gates that validate datasets against defined standards before they can be used
      in model training pipelines. Implement automated data lineage tracking that
      captures the full transformation chain from raw data to model-ready features.
      Use infrastructure-as-code to manage data access policies consistent with PDPA
      requirements.
    tools:
      - apache-atlas
      - great-expectations
      - dvc
      - mlflow
      - vault
      - terraform

  devsecops:
    prose: >-
      Integrate data quality validation into CI/CD pipelines as a mandatory stage
      before model training. Implement automated bias detection scans on training
      datasets. Require data provenance documentation as a pipeline artifact. Use
      pre-commit hooks to prevent accidental inclusion of personal data in model
      repositories. Enforce data versioning to ensure reproducibility of training
      runs.
    tools:
      - gitlab-ci
      - great-expectations
      - fairlearn
      - dvc
      - trivy

  secops:
    prose: >-
      Monitor data pipelines for quality degradation, unauthorized access, and
      compliance violations. Alert on anomalous data access patterns that may
      indicate data breaches or policy violations. Maintain audit logs of all data
      access and transformations used in AI systems. Generate periodic data
      governance compliance reports.
    tools:
      - splunk
      - elastic-siem
      - datadog
      - apache-atlas

legal_references:
