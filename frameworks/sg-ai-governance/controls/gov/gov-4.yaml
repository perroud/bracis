id: gov-4
family: gov
title: "AI Knowledge and Competency Development"
class: SG-AI-GOV

statement:
  prose: >-
    Organizations should invest in building internal knowledge and competencies
    related to AI governance, development, and deployment. Staff involved in AI
    decisions should have sufficient understanding of the technology to exercise
    meaningful oversight. Organizations should provide training programs on AI risks,
    ethics, and governance tailored to the roles and responsibilities of different
    personnel.

guidance:
  prose: >-
    Competency development should be proportionate to the level of AI adoption and
    the risk profile of the AI systems deployed. Technical staff should be trained on
    responsible AI development practices including bias mitigation, testing
    methodologies, and monitoring techniques. Business and management staff should
    understand the capabilities and limitations of AI systems under their purview.
    Organizations should maintain a skills matrix that maps AI competencies to roles
    and identify training gaps. External expertise may be engaged where internal
    capabilities are insufficient, but the organization should retain enough internal
    knowledge to exercise informed oversight.

references:
  - citation: "Singapore Model AI Governance Framework, 2nd Edition, Section 2.1 — Knowledge and Competency"
    url: "https://www.pdpc.gov.sg/help-and-resources/2020/01/model-ai-governance-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build self-service documentation and training resources into the internal
      developer platform. Create standardized onboarding guides for AI development
      that cover governance requirements, tooling, and best practices. Implement
      role-based access controls that require completion of relevant training modules
      before granting access to AI development and deployment environments.
    tools:
      - backstage-catalog
      - confluence
      - vault
      - keycloak

  devsecops:
    prose: >-
      Integrate AI governance training verification into pipeline access controls.
      Require completion of responsible AI development training as a prerequisite for
      contributing to AI model repositories. Maintain runbooks and playbooks for
      common AI development tasks that embed governance requirements. Use code review
      guidelines that include AI-specific review criteria.
    tools:
      - gitlab-ci
      - confluence
      - pre-commit

  secops:
    prose: >-
      Track AI governance training completion rates and report gaps to management.
      Include AI-specific scenarios in security awareness training programs. Monitor
      for operational errors that may indicate competency gaps and escalate patterns
      for additional training. Maintain an AI incident knowledge base that captures
      lessons learned and feeds into training programs.
    tools:
      - splunk
      - confluence
      - pagerduty

legal_references:
  - framework_id: nist-ai-rmf
    articles: ["gv-3", "gv-5"]
    relationship: mapped
  - framework_id: pdpa-singapore
    articles: ["prot-1"]
    relationship: complements
