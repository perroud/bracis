id: gov-3
family: gov
title: "AI Ethics and Values Alignment"
class: SG-AI-GOV

statement:
  prose: >-
    Organizations should adopt AI ethics principles that are aligned with widely
    accepted ethical norms and values. These principles should guide the development,
    deployment, and use of AI systems. The organization should communicate these
    principles to all relevant stakeholders, including employees, partners, and
    customers. AI ethics principles should address fairness, transparency,
    explainability, accountability, safety, and human-centricity.

guidance:
  prose: >-
    Ethical principles should be operationalized through concrete policies, training
    programs, and governance mechanisms rather than remaining aspirational statements.
    Organizations should establish ethics review boards or committees that evaluate
    AI systems against stated principles before deployment and on an ongoing basis.
    Ethics training should be provided to all personnel involved in AI development
    and deployment. The organization should monitor the evolving ethical landscape
    and update its principles accordingly. Ethical considerations should be
    documented as part of the AI system's design records and made available for
    internal and external audit.

references:
  - citation: "Singapore Model AI Governance Framework, 2nd Edition, Section 2.1 — Ethical AI Principles"
    url: "https://www.pdpc.gov.sg/help-and-resources/2020/01/model-ai-governance-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Embed ethics review checkpoints in the platform's AI deployment workflow.
      Implement mandatory model cards that capture ethics assessments including
      fairness metrics, intended use boundaries, and known limitations. Create
      platform-level templates for ethics documentation that are enforced as
      deployment prerequisites. Maintain a centralized repository of the
      organization's AI ethics principles accessible to all development teams.
    tools:
      - backstage-catalog
      - model-cards
      - mlflow
      - confluence
      - gitops

  devsecops:
    prose: >-
      Require ethics assessment completion as a mandatory CI/CD pipeline gate.
      Implement automated fairness and bias testing as part of the model validation
      pipeline. Use merge request checklists to ensure ethics review sign-off before
      model changes are approved. Integrate ethics documentation generation into
      the build pipeline to ensure it stays synchronized with model versions.
    tools:
      - gitlab-ci
      - fairlearn
      - aif360
      - pre-commit
      - model-cards

  secops:
    prose: >-
      Monitor deployed AI systems for ethical violations including discriminatory
      outcomes, unexplained decisions, and use outside approved boundaries. Establish
      ethics incident reporting channels and response procedures. Generate periodic
      ethics compliance reports for the ethics review committee. Track and alert on
      model behavior that deviates from documented ethical boundaries.
    tools:
      - datadog
      - grafana
      - splunk
      - pagerduty

legal_references:
