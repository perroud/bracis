id: gov-1
family: gov
title: "AI Governance Structure and Accountability"
class: SG-AI-GOV

statement:
  prose: >-
    Organizations using AI in decision-making should have governance structures in
    place to ensure clear roles and responsibilities. This includes designating
    appropriate levels of management to oversee AI deployment, ensuring that
    accountability for AI-driven decisions is clearly defined, and establishing
    reporting lines for AI-related risks. The board or senior management should be
    apprised of the organization's use of AI and the attendant risks.

guidance:
  prose: >-
    The framework emphasizes that governance of AI should be commensurate with the
    risk level and impact of the AI system. Organizations should assign ownership of
    AI systems to specific business units and designate individuals or committees
    responsible for overseeing AI ethics, fairness, and risk management. Governance
    structures should include escalation paths for incidents involving AI-driven
    decisions. Senior leadership must understand the nature and limitations of AI
    systems in use and accept accountability for outcomes. Regular reviews of
    governance arrangements should be conducted to ensure they remain fit for purpose
    as the organization's AI capabilities evolve.

references:
  - citation: "Singapore Model AI Governance Framework, 2nd Edition, Section 2.1 — Internal Governance Structures and Measures"
    url: "https://www.pdpc.gov.sg/help-and-resources/2020/01/model-ai-governance-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement an AI model registry in the internal developer platform that tracks
      ownership, business unit, risk classification, and approval status for every
      deployed AI model. Enforce RBAC policies ensuring only authorized teams can
      deploy or modify AI workloads. Integrate governance metadata into service
      catalogs (e.g., Backstage) so that model owners, risk assessments, and review
      schedules are visible and queryable. Use GitOps workflows to version-control
      governance policies and maintain an auditable change history.
    tools:
      - backstage-catalog
      - mlflow
      - open-policy-agent
      - gitops
      - vault

  devsecops:
    prose: >-
      Require governance checklists as mandatory pipeline stages before AI model
      promotion. Implement merge request templates that capture model ownership,
      risk classification, and approval sign-off. Enforce branch protection rules
      requiring designated reviewers for AI model repositories. Maintain governance
      documentation as code artifacts versioned alongside model repositories.
    tools:
      - gitlab-ci
      - github-actions
      - pre-commit
      - model-cards

  secops:
    prose: >-
      Monitor AI model deployments for compliance with governance policies. Alert
      on unauthorized model deployments or configuration changes. Generate periodic
      governance compliance reports for board and senior management review. Maintain
      audit logs of all AI system access, changes, and decision outcomes for
      accountability tracking.
    tools:
      - splunk
      - elastic-siem
      - datadog
      - pagerduty

legal_references:
