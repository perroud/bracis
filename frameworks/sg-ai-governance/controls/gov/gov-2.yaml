id: gov-2
family: gov
title: "AI Risk Management Framework"
class: SG-AI-GOV

statement:
  prose: >-
    Organizations should put in place risk management measures to address the risks
    arising from the use of AI. Risk management should be proportionate to the scale,
    nature, and complexity of the AI systems deployed. Organizations should identify,
    assess, and prioritize AI-related risks — including risks related to data quality,
    algorithmic bias, security, privacy, and potential harm to individuals — and
    implement appropriate mitigation measures. The risk framework should be integrated
    with the organization's broader enterprise risk management processes.

guidance:
  prose: >-
    AI risk management should follow a structured approach that begins with risk
    identification during the design phase and continues throughout the system
    lifecycle. Organizations should classify AI systems by risk level based on factors
    such as the potential impact on individuals, the degree of automation in
    decision-making, and the sensitivity of the data involved. Risk assessments should
    be documented and reviewed periodically. Mitigation strategies may include
    technical safeguards, human oversight, operational controls, and monitoring
    mechanisms. The risk management framework should address both known risks and
    emerging risks as AI technology and its applications evolve.

references:
  - citation: "Singapore Model AI Governance Framework, 2nd Edition, Section 2.1 — Risk Management"
    url: "https://www.pdpc.gov.sg/help-and-resources/2020/01/model-ai-governance-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Embed risk classification gates into the platform's model deployment pipeline.
      Define risk tiers (low, medium, high, critical) based on data sensitivity,
      decision impact, and automation level. Enforce tier-specific deployment
      requirements through policy-as-code — e.g., high-risk models require
      additional review gates, bias evaluations, and monitoring thresholds before
      promotion. Maintain a centralized risk register that links AI models to their
      assessed risk levels and mitigation measures.
    tools:
      - open-policy-agent
      - kyverno
      - mlflow
      - backstage-catalog
      - terraform

  devsecops:
    prose: >-
      Integrate risk assessment templates into CI/CD pipeline stages. Require
      completion of an AI risk assessment form as a prerequisite for model promotion.
      Implement automated scanning for common risk indicators such as training data
      bias, model complexity metrics, and input validation gaps. Use pipeline
      artifacts to capture and persist risk assessment outcomes alongside model
      artifacts.
    tools:
      - gitlab-ci
      - checkov
      - fairlearn
      - model-cards
      - trivy

  secops:
    prose: >-
      Continuously monitor deployed AI systems for risk indicators including
      performance degradation, anomalous predictions, and data drift. Integrate AI
      risk metrics into the security operations dashboard. Establish incident
      response procedures specific to AI failures including model rollback
      procedures. Generate periodic AI risk reports for enterprise risk management
      committees.
    tools:
      - datadog
      - grafana
      - elastic-siem
      - pagerduty
      - splunk

