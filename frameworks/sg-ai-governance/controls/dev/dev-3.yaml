id: dev-3
family: dev
title: "AI Accountability and Audit Trail"
class: SG-AI-GOV

statement:
  prose: >-
    Organizations should maintain comprehensive audit trails for AI systems that
    enable accountability and facilitate investigation of AI-driven decisions.
    Audit trails should capture model inputs, outputs, versions, configurations,
    and the identity of individuals involved in model development, approval, and
    deployment. Organizations should be able to demonstrate compliance with
    governance requirements through documented evidence.

guidance:
  prose: >-
    Accountability requires that organizations can trace AI decisions back to the
    models, data, and processes that produced them. Audit trails should be
    tamper-resistant and retained for a period commensurate with the significance
    of the decisions and applicable regulatory requirements. Organizations should
    implement logging at multiple levels: individual decision logs capturing inputs
    and outputs, model lifecycle logs tracking development and deployment history,
    and governance logs recording approvals, reviews, and policy changes. Audit
    trails should support both internal governance reviews and external audits.
    The granularity and retention period of audit logs should be proportionate to
    the risk level of the AI system.

references:
  - citation: "Singapore Model AI Governance Framework, 2nd Edition, Section 2.2 — Accountability"
    url: "https://www.pdpc.gov.sg/help-and-resources/2020/01/model-ai-governance-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement centralized, immutable logging infrastructure for all AI system
      events including prediction requests, model deployments, configuration
      changes, and governance actions. Deploy a model lineage tracking system
      that links every prediction to its model version, training data, and
      approval chain. Implement log retention policies aligned with governance
      and regulatory requirements. Provide audit query interfaces that enable
      efficient investigation of specific decisions or time periods.
    tools:
      - elastic-stack
      - mlflow
      - backstage-catalog
      - vault
      - minio

  devsecops:
    prose: >-
      Require audit logging implementation as a mandatory deployment prerequisite
      in CI/CD pipelines. Implement automated tests that verify audit trail
      completeness and integrity. Enforce signed commits and artifact signing
      to ensure tamper-evident audit trails. Include audit trail configuration
      in model deployment manifests.
    tools:
      - gitlab-ci
      - cosign
      - trivy
      - pre-commit
      - model-cards

  secops:
    prose: >-
      Operate and maintain the AI audit logging infrastructure. Monitor log
      pipeline health and alert on gaps or failures. Conduct periodic audit
      trail integrity checks. Support internal and external audits by providing
      log access and generating audit reports. Investigate incidents using
      audit trail data.
    tools:
      - splunk
      - elastic-siem
      - datadog
      - pagerduty

legal_references:
