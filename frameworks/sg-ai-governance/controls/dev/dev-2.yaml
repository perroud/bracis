id: dev-2
family: dev
title: "AI Model Monitoring and Performance Tracking"
class: SG-AI-GOV

statement:
  prose: >-
    Organizations should implement continuous monitoring of deployed AI systems to
    detect performance degradation, data drift, concept drift, and emerging biases.
    Monitoring should cover model accuracy, fairness metrics, system reliability,
    and compliance with defined operational boundaries. Organizations should define
    thresholds that trigger alerts, human review, or automated responses when
    monitoring detects issues.

guidance:
  prose: >-
    Post-deployment monitoring is critical because AI model performance can degrade
    over time as real-world data distributions shift from training data. Organizations
    should implement monitoring for multiple dimensions including prediction accuracy,
    fairness metrics across demographic groups, input data quality, model latency,
    and system availability. Monitoring thresholds should be defined based on the
    model's risk classification and the potential impact of performance degradation.
    Automated alerting should notify responsible personnel when thresholds are
    breached. Monitoring data should feed into model retraining decisions and
    governance reporting. Organizations should maintain historical monitoring data
    to identify trends and patterns.

references:
  - citation: "Singapore Model AI Governance Framework, 2nd Edition, Section 2.2 — Monitoring"
    url: "https://www.pdpc.gov.sg/help-and-resources/2020/01/model-ai-governance-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Deploy a centralized AI model monitoring platform that tracks prediction
      quality, data drift, feature drift, and fairness metrics across all deployed
      models. Implement automated drift detection algorithms that compare
      production data distributions to training baselines. Create dashboards that
      provide real-time visibility into model health. Integrate monitoring alerts
      with model retraining pipelines to enable automated or semi-automated model
      refresh workflows.
    tools:
      - evidently-ai
      - datadog
      - grafana
      - mlflow
      - prometheus

  devsecops:
    prose: >-
      Require monitoring configuration as a mandatory component of model deployment
      packages. Implement automated tests that verify monitoring instrumentation is
      present and functional before deployment. Include monitoring threshold
      definitions in model deployment manifests. Enforce monitoring coverage
      requirements through CI/CD pipeline gates.
    tools:
      - gitlab-ci
      - evidently-ai
      - prometheus
      - pre-commit

  secops:
    prose: >-
      Operate the AI model monitoring infrastructure and respond to alerts.
      Investigate performance degradation incidents and coordinate with model
      development teams for remediation. Maintain incident records for AI model
      performance issues. Generate periodic monitoring health reports covering
      alert volumes, response times, and remediation outcomes.
    tools:
      - pagerduty
      - splunk
      - elastic-siem
      - datadog
      - grafana

legal_references:
