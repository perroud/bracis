id: dev-1
family: dev
title: "AI Model Testing and Validation"
class: SG-AI-GOV

statement:
  prose: >-
    Organizations should implement comprehensive testing and validation processes
    for AI models before deployment and on an ongoing basis. Testing should cover
    functional correctness, performance under expected and adverse conditions,
    fairness across relevant population groups, and robustness against adversarial
    inputs. Validation should confirm that the model meets its intended objectives
    and operates within defined risk tolerances.

guidance:
  prose: >-
    Testing and validation for AI systems should go beyond traditional software
    testing to address AI-specific concerns. This includes testing for bias and
    fairness across demographic groups, evaluating model performance on edge cases
    and out-of-distribution inputs, validating model behavior under data drift
    conditions, and stress testing under adversarial scenarios. Organizations should
    define acceptance criteria that specify minimum performance thresholds, maximum
    acceptable bias levels, and required robustness margins. Independent validation
    by personnel not involved in model development is recommended for high-risk AI
    systems. Test results should be documented and maintained as part of the model's
    governance records.

references:
  - citation: "Singapore Model AI Governance Framework, 2nd Edition, Section 2.2 — Testing and Validation"
    url: "https://www.pdpc.gov.sg/help-and-resources/2020/01/model-ai-governance-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build automated model evaluation pipelines into the platform that execute
      standardized test suites covering accuracy, fairness, robustness, and
      performance. Implement a model validation framework that enforces acceptance
      criteria as deployment gates. Maintain a centralized test results repository
      that links validation outcomes to model versions. Provide pre-built evaluation
      templates for common model types and use cases.
    tools:
      - mlflow
      - kubeflow
      - great-expectations
      - evidently-ai
      - backstage-catalog

  devsecops:
    prose: >-
      Implement multi-stage model validation in CI/CD pipelines including unit
      tests, integration tests, fairness evaluation, robustness testing, and
      performance benchmarking. Enforce minimum test coverage requirements for
      model code. Require validation report generation as a mandatory pipeline
      artifact. Block promotion of models that fail to meet acceptance criteria.
    tools:
      - gitlab-ci
      - pytest
      - fairlearn
      - aif360
      - adversarial-robustness-toolbox

  secops:
    prose: >-
      Monitor deployed model performance against validation baselines. Alert on
      performance degradation that indicates model drift or emerging issues.
      Track validation coverage and identify models that are overdue for
      revalidation. Generate periodic model health reports that compare current
      performance to validation benchmarks.
    tools:
      - evidently-ai
      - datadog
      - grafana
      - pagerduty

