id: gv.oc-01
family: gv
title: "Organizational Context"
class: CSF2

statement:
  prose: >-
    The organizational mission is understood and informs cybersecurity risk management.

guidance:
  prose: >-
    Understanding the organizational mission, stakeholder expectations, and dependencies
    is the foundation for effective cybersecurity risk management. The organization should
    identify its critical business functions, the systems and data that support them,
    and the stakeholders who depend on them. This context drives the selection and
    prioritization of cybersecurity activities. Without a clear understanding of what
    the organization does and what matters most, cybersecurity investments cannot be
    properly prioritized. The organizational context should be documented, shared with
    cybersecurity decision-makers, and updated when the mission or operating environment
    changes significantly.

references:
  - citation: "NIST Cybersecurity Framework 2.0, GV.OC-01"
    url: "https://www.nist.gov/cyberframework"
  - citation: "NIST SP 800-39"
    url: "https://doi.org/10.6028/NIST.SP.800-39"

implementation_guidance:
  platform_engineering:
    prose: >-
      Document the platform's role in supporting organizational mission through service
      catalogs (Backstage). Map platform services to business capabilities, identifying
      which services are mission-critical versus supporting. Assign criticality tiers
      to all platform components and use these tiers to drive SLA definitions, redundancy
      requirements, and security control intensity. Maintain architecture decision records
      (ADRs) that connect technical choices to business requirements and risk tolerance.
      Publish a platform risk profile that identifies single points of failure and their
      business impact.
    tools:
      - backstage
      - confluence
      - adr-tools

  devsecops:
    prose: >-
      Tag repositories and CI/CD pipelines with business context metadata (business unit,
      criticality tier, data classification). Use this metadata to automatically apply
      appropriate security scanning intensity and approval requirements. Critical
      applications should require more rigorous security testing than internal tools.
      Implement pipeline templates that map to criticality tiers, with more comprehensive
      security gates for higher-tier applications.
    tools:
      - gitlab-project-metadata
      - gitlab-compliance-framework
      - gitlab-ci

  secops:
    prose: >-
      Maintain a business impact analysis (BIA) that maps critical business functions
      to supporting technology assets. Use the BIA to prioritize security monitoring,
      incident response, and vulnerability remediation efforts. Configure SIEM alert
      priorities based on asset criticality tiers. Ensure incident response playbooks
      reference organizational context to guide escalation and communication decisions.
      Review the organizational context annually and after significant business changes
      (acquisitions, new product lines, market expansions).
    tools:
      - servicenow
      - archer-grc
      - splunk

