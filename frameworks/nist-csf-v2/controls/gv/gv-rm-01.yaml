id: gv.rm-01
family: gv
title: "Risk Management Strategy"
class: CSF2

statement:
  prose: >-
    Risk management objectives are established and used to support operational risk
    decisions.

guidance:
  prose: >-
    The risk management strategy defines the organization's approach to assessing,
    responding to, and monitoring cybersecurity risk. It should articulate risk appetite
    and risk tolerance statements that guide decision-making at all levels. The strategy
    must address how risk is identified, assessed (qualitative and/or quantitative),
    prioritized, and treated (accept, mitigate, transfer, avoid). It should define
    roles and responsibilities for risk management, the frequency of risk assessments,
    and how risk information flows between operational, tactical, and strategic levels.
    The strategy must be endorsed by senior leadership and communicated to all personnel
    with risk management responsibilities.

references:
  - citation: "NIST Cybersecurity Framework 2.0, GV.RM-01"
    url: "https://www.nist.gov/cyberframework"
  - citation: "NIST SP 800-37 Rev. 2"
    url: "https://doi.org/10.6028/NIST.SP.800-37r2"

implementation_guidance:
  platform_engineering:
    prose: >-
      Translate organizational risk tolerance into enforceable platform policies. Define
      risk-based thresholds for automated decision-making: maximum acceptable vulnerability
      age by severity, minimum security scanning coverage, mandatory encryption standards.
      Implement these thresholds as admission controller policies and pipeline gates.
      Maintain a platform risk register tracking known risks, their status, and
      compensating controls. Use risk scoring models to automatically prioritize
      vulnerability remediation based on asset criticality, exploit availability,
      and exposure. Publish risk dashboards showing current risk posture against
      defined tolerance levels.
    tools:
      - open-policy-agent
      - kyverno
      - defectdojo
      - grafana

  devsecops:
    prose: >-
      Implement risk-based pipeline policies where security gate strictness scales
      with application risk tier. Low-risk internal tools may have advisory-only
      security findings; high-risk customer-facing applications must pass all security
      gates with zero critical findings. Define acceptable risk thresholds in GitLab
      Security Policies at the group level. Implement merge request templates that
      require risk assessment for architectural changes. Track risk acceptance
      decisions in version-controlled exception files co-located with application code.
    tools:
      - gitlab-security-policies
      - gitlab-ci
      - gitlab-compliance-framework

  secops:
    prose: >-
      Conduct risk assessments at least annually and after significant changes to
      the threat landscape, technology stack, or business operations. Maintain a
      cybersecurity risk register with risk scores, owners, treatment plans, and
      review dates. Report risk posture to senior leadership quarterly using
      standardized risk metrics. Implement key risk indicators (KRIs) with automated
      alerting when thresholds are breached. Map identified risks to controls and
      verify control effectiveness through periodic testing.
    tools:
      - archer-grc
      - servicenow-grc
      - riskiq
      - splunk

legal_references:
  - framework_id: nist-800-53-rev5
    articles: ["PM-9", "RA-1", "RA-3"]
    relationship: implements
  - framework_id: iso-27001-2022
    articles: ["A5.1", "A5.2"]
    relationship: supports
