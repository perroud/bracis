id: rmf-i-01
family: rmf-implement
title: "Control Implementation"
class: NIST-800-37

statement:
  prose: >-
    Implement the security and privacy controls as specified in the system security plan.
    Control implementation translates the security and privacy requirements documented in
    the system security plan into concrete technical, operational, and management safeguards
    deployed within the system and its environment of operation. The implementation must be
    consistent with the organization's enterprise architecture and the information security
    and privacy architectures.

guidance:
  prose: >-
    Control implementation is where security requirements become operational reality.
    Technical controls are implemented through hardware, software, and firmware mechanisms.
    Operational controls are implemented through processes, procedures, and human actions.
    Management controls address the management of security and privacy risk at the
    organizational and system levels. Implementation must follow the organization's
    enterprise architecture, security architecture, and privacy architecture to ensure
    consistency and avoid conflicts. System owners coordinate with common control providers
    to confirm that inherited controls are properly implemented and functioning. The
    implementation should be iterative, with critical controls prioritized for early
    deployment.

references:
  - citation: "NIST SP 800-37 Rev 2, Chapter 3, Implement Step — Task I-1"
    url: "https://csrc.nist.gov/publications/detail/sp/800-37/rev-2/final"
  - citation: "NIST SP 800-160 Vol 1, Systems Security Engineering"
    url: "https://csrc.nist.gov/publications/detail/sp/800-160/vol-1/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement controls through infrastructure-as-code, policy-as-code, and platform
      services. Technical controls should be codified in Terraform modules, Kubernetes
      policies, or service mesh configurations. Use GitOps workflows to ensure that
      control implementations are version-controlled, peer-reviewed, and automatically
      deployed. Create reusable control implementation modules (e.g., a Terraform module
      for encrypted storage, a Kubernetes admission webhook for pod security). Implement
      guardrails that prevent deployments violating security controls using admission
      controllers and policy engines. Automate evidence collection by capturing
      infrastructure state and configuration snapshots as deployment artifacts.
    tools:
      - terraform
      - kubernetes
      - open-policy-agent
      - kyverno
      - argocd
      - hashicorp-vault

  devsecops:
    prose: >-
      Integrate control implementations into the software development and deployment
      lifecycle. Implement application-level controls (input validation, authentication,
      session management, error handling) in application code and verify them through
      automated testing. Configure CI/CD pipelines to enforce control implementations
      (e.g., static analysis for secure coding controls, dependency scanning for supply
      chain controls, container scanning for configuration controls). Use compliance-as-code
      frameworks to define expected control states and verify them during pipeline execution.
      Document control implementation evidence as pipeline artifacts linked to the SSP.
    tools:
      - gitlab-ci
      - gitlab-security-scanners
      - sonarqube
      - checkov
      - trivy

  secops:
    prose: >-
      Track control implementation progress in the GRC platform using a plan of action
      and milestones (POA&M) for controls not yet fully implemented. Validate control
      implementations through technical verification activities such as configuration
      scans, penetration testing, and architecture reviews. Coordinate with common
      control providers to obtain implementation evidence for inherited controls.
      Monitor the operational effectiveness of implemented controls through continuous
      monitoring data feeds. Identify and document implementation gaps as findings in
      the risk register with remediation timelines.
    tools:
      - archer-grc
      - servicenow-grc
      - nessus
      - qualys
      - tenable-sc

