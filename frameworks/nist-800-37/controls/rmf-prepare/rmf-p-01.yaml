id: rmf-p-01
family: rmf-prepare
title: "Organization-Level Risk Management Preparation"
class: NIST-800-37

statement:
  prose: >-
    Carry out organization-level preparation tasks to manage security and privacy risks.
    Organization-level preparation includes assigning key risk management roles; establishing
    a risk management strategy and organizational risk tolerance; identifying missions, business
    functions, and mission/business processes the information system is intended to support;
    identifying key stakeholders; understanding threats to organizations, missions, business
    functions, and information systems; conducting organization-wide risk assessments;
    identifying common controls available to information systems; establishing a strategy for
    monitoring the effectiveness of controls; and developing and implementing an organization-wide
    strategy for the continuous monitoring of security and privacy control effectiveness.

guidance:
  prose: >-
    Organizational preparation establishes the context and foundation for the entire RMF
    lifecycle. Without clear roles, strategies, and risk tolerance definitions, downstream
    RMF activities lack direction. Key outputs include a documented risk management strategy,
    an organizational risk tolerance statement, identified mission/business processes, and
    designated key roles such as the Chief Information Officer (CIO), Senior Agency Information
    Security Officer (SAISO), Authorizing Official (AO), and System Owner. The risk management
    strategy should be informed by an organization-wide risk assessment and should define how
    security and privacy risks are framed, assessed, responded to, and monitored.

references:
  - citation: "NIST SP 800-37 Rev 2, Chapter 3, Prepare Step — Organization Level"
    url: "https://csrc.nist.gov/publications/detail/sp/800-37/rev-2/final"
  - citation: "NIST SP 800-39, Managing Information Security Risk"
    url: "https://csrc.nist.gov/publications/detail/sp/800-39/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Define and publish an organizational risk management strategy as code in a central
      governance repository. Use service catalogs (Backstage) to document mission-critical
      systems and their owners. Create infrastructure-as-code templates that embed risk
      classification metadata (data sensitivity, impact level, availability tier) into
      every deployed resource. Maintain an authoritative registry of common controls
      provided by the platform (e.g., centralized IAM, logging, encryption) and publish
      their inheritance model so system owners can reference them. Automate the assignment
      of risk management roles through identity governance tooling integrated with the
      organization directory (LDAP/Azure AD/Okta).
    tools:
      - backstage
      - terraform
      - okta
      - azure-ad
      - open-policy-agent

  devsecops:
    prose: >-
      Embed risk management preparation into CI/CD pipelines by requiring every project
      to declare its risk profile (impact level, data classification) in a metadata file
      (e.g., .security-profile.yaml). Use GitLab compliance frameworks to enforce that
      projects tagged as high-impact follow stricter pipeline policies. Automate the
      discovery of mission-critical repositories and map them to business functions.
      Integrate threat modeling tools into the development workflow and require threat
      models to be completed before first deployment. Create pipeline templates tiered
      by risk level that automatically apply the correct security scanning intensity.
    tools:
      - gitlab-compliance-framework
      - gitlab-ci
      - threatmodeler
      - microsoft-threat-modeling-tool

  secops:
    prose: >-
      Maintain and regularly update the organizational risk register in a GRC platform.
      Conduct annual organization-wide risk assessments using a structured methodology
      (NIST SP 800-30). Document risk tolerance statements per mission/business function
      and ensure they are accessible to all risk management stakeholders. Configure the
      GRC platform to track key risk management roles, their assignments, and delegation
      authorities. Establish a continuous monitoring strategy document that defines
      monitoring frequency, metrics, and reporting requirements for each impact level.
      Review and update the risk management strategy annually or upon significant
      organizational change.
    tools:
      - archer-grc
      - servicenow-grc
      - rsam
      - splunk

