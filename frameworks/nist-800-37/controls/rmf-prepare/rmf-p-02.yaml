id: rmf-p-02
family: rmf-prepare
title: "System-Level Risk Management Preparation"
class: NIST-800-37

statement:
  prose: >-
    Carry out system-level preparation tasks to manage security and privacy risks. System-level
    preparation includes identifying stakeholders who have an interest in the system; identifying
    assets requiring protection; conducting an initial system risk assessment; identifying
    security and privacy requirements allocated to the system, the system elements, and the
    organization; determining the placement of the system within the enterprise architecture;
    registering the system for purposes of management, accountability, coordination, and
    oversight; and establishing a timeline for key risk management activities associated with
    the system.

guidance:
  prose: >-
    System-level preparation bridges organizational risk management policy with specific
    system context. This step produces a system description, identifies system stakeholders,
    defines the authorization boundary, and documents the system in an organizational system
    registry. The system risk assessment at this stage is preliminary and informs subsequent
    categorization and control selection. Key stakeholders include the system owner, authorizing
    official, information system security officer (ISSO), and users. The system should be
    registered in the organization's system inventory before proceeding to categorization.

references:
  - citation: "NIST SP 800-37 Rev 2, Chapter 3, Prepare Step — System Level"
    url: "https://csrc.nist.gov/publications/detail/sp/800-37/rev-2/final"
  - citation: "NIST SP 800-18 Rev 1, Guide for Developing Security Plans"
    url: "https://csrc.nist.gov/publications/detail/sp/800-18/rev-1/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Create a standardized system registration workflow that captures authorization
      boundary, data flows, technology stack, and stakeholder assignments at system
      onboarding time. Use service mesh and infrastructure-as-code to define system
      boundaries precisely (e.g., Kubernetes namespaces, VPC boundaries, network
      policies). Maintain a system inventory in the service catalog (Backstage) that
      tracks system metadata including impact level, authorization status, ATO date,
      and assigned ISSO. Automate the generation of system architecture diagrams from
      infrastructure-as-code definitions and container orchestration configurations.
    tools:
      - backstage
      - kubernetes
      - terraform
      - draw-io
      - lucidchart

  devsecops:
    prose: >-
      Require each system (group of repositories constituting a deployable service) to
      maintain a system security plan (SSP) artifact in its repository. Automate the
      collection of system metadata (technology components, dependencies, data flows) from
      CI/CD pipeline telemetry and dependency scanning results. Use GitLab project
      metadata and labels to track authorization boundary components. Create a pipeline
      stage that validates the system registration metadata is complete and current before
      allowing deployment to production environments.
    tools:
      - gitlab-ci
      - gitlab-project-metadata
      - oscal-tools
      - compliance-trestle

  secops:
    prose: >-
      Maintain a comprehensive system inventory in the GRC platform that tracks all
      registered systems, their authorization status, impact levels, and assigned
      personnel. Conduct initial system risk assessments for new systems using a
      standardized methodology and document results in the risk register. Track system
      lifecycle milestones (registration, categorization, authorization, reauthorization)
      and alert when systems are overdue for risk management activities. Validate that
      system authorization boundaries accurately reflect the operational environment
      through periodic boundary analysis and network discovery scans.
    tools:
      - servicenow-grc
      - archer-grc
      - nessus
      - qualys

legal_references:
  - framework_id: nist-800-53-rev5
    articles: ["PL-2", "PM-5", "RA-3"]
    relationship: supports
  - framework_id: iso-27001-2022
    articles: ["A5.9", "A5.37"]
    relationship: mapped
