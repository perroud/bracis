id: rmf-m-02
family: rmf-monitor
title: "Ongoing Authorization and Risk Response"
class: NIST-800-37

statement:
  prose: >-
    Maintain the authorization of the information system on an ongoing basis through
    continuous monitoring, risk assessment updates, and active risk response. The
    authorizing official reviews the continuous monitoring results, updated risk
    assessments, and the current plan of action and milestones to determine whether
    the risk remains acceptable. If the risk is no longer acceptable, the authorizing
    official directs appropriate risk response actions including remediation, risk
    acceptance with additional conditions, or revocation of the authorization to operate.

guidance:
  prose: >-
    Ongoing authorization replaces the traditional three-year reauthorization cycle with
    a continuous process. The authorization remains valid as long as the continuous
    monitoring results demonstrate that the security and privacy posture remains within
    acceptable risk levels. Significant changes to the system, its environment, or the
    threat landscape may trigger the need for a reassessment of specific controls or a
    full reauthorization. Significant changes include new interconnections, changes in
    system functionality, deployment to new environments, changes in authorizing official,
    and discovery of new threat vectors or vulnerabilities. The determination of what
    constitutes a significant change is defined in the continuous monitoring strategy and
    organizational policy.

references:
  - citation: "NIST SP 800-37 Rev 2, Chapter 3, Monitor Step — Tasks M-4, M-5, M-6, M-7"
    url: "https://csrc.nist.gov/publications/detail/sp/800-37/rev-2/final"
  - citation: "NIST SP 800-137A, Assessing Information Security Continuous Monitoring Programs"
    url: "https://csrc.nist.gov/publications/detail/sp/800-137a/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated significant change detection that flags system changes
      warranting authorization review. Monitor infrastructure-as-code changes, network
      topology modifications, new service interconnections, and technology stack updates.
      When a significant change is detected, automatically notify the system owner and
      authorizing official and initiate the appropriate reassessment workflow. Implement
      risk response automation for common scenarios — when vulnerability scanning detects
      a critical vulnerability, automatically apply compensating controls (WAF rules,
      network restrictions) while remediation is in progress. Maintain an ongoing
      authorization dashboard that shows the authorization health of every system in
      real time.
    tools:
      - backstage
      - argocd
      - open-policy-agent
      - terraform
      - grafana

  devsecops:
    prose: >-
      Detect significant changes through pipeline telemetry and change analysis.
      Flag deployments that introduce new dependencies, modify authentication flows,
      change encryption configurations, or add external integrations as potentially
      significant changes requiring authorization review. Implement automated risk
      response actions in the pipeline — block deployments when critical vulnerabilities
      are detected, require additional approvals for changes to security-relevant code,
      and escalate to the security team when threat thresholds are exceeded. Maintain
      a change log that provides the authorizing official with visibility into all
      changes since the last authorization review.
    tools:
      - gitlab-ci
      - gitlab-security-dashboard
      - gitlab-audit-events
      - gitlab-compliance-pipelines

  secops:
    prose: >-
      Implement ongoing authorization workflows in the GRC platform. Configure
      continuous monitoring feeds to flow into the authorization decision support
      system. Define thresholds and triggers that escalate to the authorizing official
      when risk levels change. Track significant changes and their impact on the
      system's security posture. Conduct periodic risk assessment updates that
      incorporate new threat intelligence, vulnerability disclosures, and operational
      changes. Manage the ongoing authorization lifecycle including authorization
      reviews, conditional authorizations, and authorization revocations. Generate
      executive-level reporting on the organizational authorization posture.
    tools:
      - archer-grc
      - servicenow-grc
      - emass
      - splunk
      - tenable-sc

