id: rmf-a-02
family: rmf-assess
title: "Control Assessment Execution"
class: NIST-800-37

statement:
  prose: >-
    Assess the security and privacy controls in accordance with the assessment plan.
    Assessors apply the defined assessment procedures to determine the extent to which controls
    are implemented correctly, operating as intended, and producing the desired outcome with
    respect to meeting the security and privacy requirements for the system and the
    organization. Assessment results are documented in a security and privacy assessment
    report.

guidance:
  prose: >-
    Assessment execution produces objective evidence of control effectiveness. Assessors
    use the examine, interview, and test methods specified in the assessment plan to evaluate
    each control. Examine activities review documentation, configuration settings, and
    design artifacts. Interview activities collect information from key personnel about
    control operation and management. Test activities exercise control mechanisms to verify
    they function as expected. For each assessed control, the assessor determines a finding
    of satisfied or other than satisfied. Other than satisfied findings include a description
    of the deficiency and its potential impact. Assessment findings are compiled into the
    security assessment report (SAR) along with recommendations for remediation.

references:
  - citation: "NIST SP 800-37 Rev 2, Chapter 3, Assess Step — Task A-2"
    url: "https://csrc.nist.gov/publications/detail/sp/800-37/rev-2/final"
  - citation: "NIST SP 800-53A Rev 5, Assessing Security and Privacy Controls"
    url: "https://csrc.nist.gov/publications/detail/sp/800-53a/rev-5/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Execute automated assessment procedures continuously through the platform
      infrastructure. Run compliance scanners (InSpec, OpenSCAP) against deployed
      infrastructure to verify technical control implementations against expected
      configurations. Collect and aggregate assessment evidence from infrastructure
      monitoring, configuration management databases, and policy engine evaluation
      results. Generate automated assessment results in OSCAL Assessment Results (AR)
      format. For controls that require manual assessment, provide a workflow for
      assessors to record their findings and link supporting evidence.
    tools:
      - inspec
      - open-scap
      - oscal-tools
      - compliance-trestle
      - open-policy-agent

  devsecops:
    prose: >-
      Leverage CI/CD pipeline outputs as assessment evidence. SAST findings assess
      secure coding controls, DAST findings assess input validation and session
      management controls, dependency scanning assesses supply chain controls, and
      container scanning assesses configuration baseline controls. Aggregate pipeline
      security results into structured assessment evidence packages. Implement a
      dedicated assessment pipeline that executes the full range of automated assessment
      procedures defined in the assessment plan and produces a machine-readable
      assessment report. Track assessment findings as issues with severity ratings
      and remediation timelines.
    tools:
      - gitlab-ci
      - gitlab-security-scanners
      - gitlab-vulnerability-management
      - inspec

  secops:
    prose: >-
      Coordinate and execute assessment activities according to the assessment plan.
      Conduct manual assessment procedures including documentation reviews,
      configuration inspections, personnel interviews, and functional testing.
      Aggregate findings from automated and manual assessment activities into the
      security assessment report. Classify findings by severity and potential impact.
      Provide the assessment report to the system owner and authorizing official with
      recommendations for remediation. Track assessment completion status and ensure
      all planned procedures are executed within the assessment window.
    tools:
      - archer-grc
      - servicenow-grc
      - emass
      - nessus
      - burp-suite

legal_references:
