id: rmf-a-03
family: rmf-assess
title: "Remediation and Reassessment of Control Deficiencies"
class: NIST-800-37

statement:
  prose: >-
    Remediate deficiencies identified during the assessment and reassess remediated controls
    as appropriate. Organizations analyze assessment findings, determine the appropriate
    course of action to address identified deficiencies, implement the corrective actions,
    and conduct follow-up assessments to verify the effectiveness of remediation. Deficiencies
    that cannot be remediated before authorization are documented in the plan of action and
    milestones (POA&M).

guidance:
  prose: >-
    Not all assessment findings require immediate remediation. Organizations apply risk-based
    decision-making to prioritize remediation based on the severity of the deficiency, the
    likelihood and impact of exploitation, and available resources. Critical and high-severity
    findings should be remediated before authorization. Moderate and low findings may be
    accepted with documented risk acceptance in the POA&M with defined remediation milestones.
    Reassessment of remediated controls verifies that the corrective action effectively
    addresses the deficiency without introducing new weaknesses. The POA&M is a living
    document tracked through the system lifecycle and reviewed during continuous monitoring.

references:
  - citation: "NIST SP 800-37 Rev 2, Chapter 3, Assess Step — Tasks A-4, A-5"
    url: "https://csrc.nist.gov/publications/detail/sp/800-37/rev-2/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated remediation workflows for common control deficiencies.
      When compliance scanners detect configuration drift or policy violations,
      trigger automated remediation through infrastructure-as-code reconciliation
      (e.g., ArgoCD sync, Terraform apply). For deficiencies requiring manual
      remediation, create work items automatically in the project management system
      with severity, description, and remediation guidance. Track POA&M items as
      structured data linked to the system record in the service catalog. Implement
      automated reassessment that re-executes the relevant assessment procedures
      after remediation is marked complete.
    tools:
      - argocd
      - terraform
      - inspec
      - jira
      - backstage

  devsecops:
    prose: >-
      Track assessment findings as security issues in the vulnerability management
      system. Prioritize remediation based on severity and exploitability. Create
      merge requests for code-level remediations and require security team review.
      After remediation merges, the CI/CD pipeline automatically re-executes the
      relevant security scans to verify the deficiency is resolved. For findings
      that cannot be immediately remediated, create POA&M entries with target
      remediation dates and track them through the project issue tracker. Implement
      SLA-based escalation for overdue POA&M items.
    tools:
      - gitlab-vulnerability-management
      - gitlab-ci
      - gitlab-issues
      - jira

  secops:
    prose: >-
      Manage POA&M items in the GRC platform with defined remediation milestones,
      responsible parties, and target completion dates. Track remediation progress
      and escalate overdue items. Coordinate reassessment activities with the
      assessment team to verify remediation effectiveness. Analyze POA&M trends
      across the organization to identify systemic deficiencies that may require
      organizational-level corrective action. Report POA&M status to the authorizing
      official and senior leadership on a regular cadence. Ensure POA&M items from
      previous assessment cycles that remain open are addressed in the current
      assessment.
    tools:
      - archer-grc
      - servicenow-grc
      - emass

legal_references:
  - framework_id: nist-800-53-rev5
    articles: ["CA-5", "CA-2", "PM-4"]
    relationship: supports
  - framework_id: iso-27001-2022
