id: rmf-a-01
family: rmf-assess
title: "Assessment Plan Development"
class: NIST-800-37

statement:
  prose: >-
    Develop a security and privacy assessment plan for the information system. The assessment
    plan defines the scope of the assessment, the assessment procedures to be used, the
    assessment schedule, the roles and responsibilities of the assessment team, and the
    logistics of the assessment. The plan identifies the controls to be assessed, the
    assessment methods (examine, interview, test), and the depth and coverage of each
    assessment procedure.

guidance:
  prose: >-
    The assessment plan provides the roadmap for evaluating whether controls are implemented
    correctly, operating as intended, and producing the desired outcome. Assessment methods
    include examining documentation and configurations, interviewing personnel, and testing
    control mechanisms through functional testing, penetration testing, or automated scanning.
    The depth and coverage of assessment procedures are determined by the system's impact
    level and the specific risk context. Higher-impact systems warrant more rigorous
    assessment. The assessment plan should be reviewed and approved by the authorizing
    official before assessment activities begin. Independent assessors (not involved in
    control implementation) should be used where practicable.

references:
  - citation: "NIST SP 800-37 Rev 2, Chapter 3, Assess Step — Task A-1"
    url: "https://csrc.nist.gov/publications/detail/sp/800-37/rev-2/final"
  - citation: "NIST SP 800-53A Rev 5, Assessing Security and Privacy Controls"
    url: "https://csrc.nist.gov/publications/detail/sp/800-53a/rev-5/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Create assessment plan templates in OSCAL format that map to each impact level.
      Automate assessment plan generation by pulling the tailored control set from the
      SSP and associating each control with the appropriate assessment procedure from
      NIST SP 800-53A. Integrate automated assessment capabilities into the platform —
      configuration compliance scanning, infrastructure policy validation, and security
      benchmarking can serve as automated test procedures in the assessment plan.
      Maintain a library of reusable assessment procedure definitions that can be
      assembled into system-specific assessment plans.
    tools:
      - oscal-tools
      - compliance-trestle
      - inspec
      - open-scap

  devsecops:
    prose: >-
      Map CI/CD pipeline security activities to assessment procedures. SAST, DAST,
      SCA, and container scanning results serve as automated test evidence for relevant
      controls. Define assessment-as-code workflows that execute specific test procedures
      and generate assessment results in a structured format. Create a pipeline stage
      dedicated to assessment evidence collection that aggregates scan results, test
      outputs, and configuration snapshots into an assessment evidence package. Ensure
      that the assessment plan accounts for both automated testing (pipeline-based)
      and manual assessment activities (architecture reviews, code audits).
    tools:
      - gitlab-ci
      - gitlab-security-scanners
      - inspec
      - compliance-trestle

  secops:
    prose: >-
      Develop assessment plans in the GRC platform using templates aligned with
      NIST SP 800-53A assessment procedures. Assign assessment team members and define
      their roles and responsibilities. Schedule assessment activities and track
      progress against the plan timeline. Ensure assessment plans address all control
      types — technical, operational, and management — with appropriate methods for
      each. Review the assessment plan with the system owner and authorizing official
      before execution to ensure scope and methods are agreed upon. Maintain historical
      assessment plans to support audit and reauthorization activities.
    tools:
      - archer-grc
      - servicenow-grc
      - emass

legal_references:
