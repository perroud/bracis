id: rmf-au-02
family: rmf-authorize
title: "Risk Determination and Acceptance"
class: NIST-800-37

statement:
  prose: >-
    Determine the risk to organizational operations, organizational assets, individuals,
    other organizations, and the Nation from the operation or use of the information system.
    The authorizing official reviews the authorization package and determines whether the
    risk to the organization is acceptable. The risk determination considers the security
    and privacy posture of the system, the severity of deficiencies documented in the POA&M,
    the organizational risk tolerance, and any mission or business requirements that influence
    the risk decision.

guidance:
  prose: >-
    Risk determination is the analytical process that precedes the authorization decision.
    The authorizing official evaluates the residual risk after controls are implemented and
    assessed. This evaluation considers the likelihood and impact of threats exploiting
    remaining vulnerabilities, the effectiveness of implemented controls, the severity of
    open POA&M items, and the compensating factors or mitigations in place. The risk
    determination is not purely technical — it integrates mission, business, legal, and
    policy considerations. The authorizing official may consult with the risk executive,
    chief information officer, and system owner in making the determination. The risk
    determination is documented as part of the authorization decision.

references:
  - citation: "NIST SP 800-37 Rev 2, Chapter 3, Authorize Step — Task R-2"
    url: "https://csrc.nist.gov/publications/detail/sp/800-37/rev-2/final"
  - citation: "NIST SP 800-30 Rev 1, Guide for Conducting Risk Assessments"
    url: "https://csrc.nist.gov/publications/detail/sp/800-30/rev-1/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Provide the authorizing official with a risk summary dashboard that aggregates
      assessment findings, POA&M severity distribution, control satisfaction rates,
      and continuous monitoring trend data. Implement a risk scoring model that
      quantifies residual risk based on open deficiencies, vulnerability scan results,
      and threat intelligence. Present the risk score relative to the organizational
      risk tolerance threshold. Automate the collection of risk indicators from
      infrastructure monitoring, security scanning, and compliance evaluation systems
      to provide a real-time risk picture. Include historical risk trend data to show
      whether the system's security posture is improving or degrading.
    tools:
      - backstage
      - grafana
      - splunk
      - elastic-stack

  devsecops:
    prose: >-
      Generate risk summary reports from pipeline data showing vulnerability counts
      by severity, unresolved security findings, dependency risk scores, and compliance
      drift indicators. Provide the authorizing official with evidence of the
      development team's security practices including merge request approval rates,
      security scan execution frequency, and mean time to remediate security findings.
      Create a risk narrative document as a pipeline artifact that contextualizes
      technical findings within the mission and business context.
    tools:
      - gitlab-vulnerability-management
      - gitlab-ci
      - gitlab-security-dashboard

  secops:
    prose: >-
      Conduct the risk determination analysis using the GRC platform's risk assessment
      capabilities. Aggregate all risk factors — assessment findings, POA&M items,
      vulnerability scan results, threat intelligence, and operational incident
      history — into a comprehensive risk picture. Present the risk determination
      to the authorizing official with clear articulation of the residual risk,
      the factors contributing to it, and the expected trajectory if current
      remediation plans are executed. Document the risk determination rationale,
      any conditions or terms, and the authorizing official's risk acceptance
      statement.
    tools:
      - archer-grc
      - servicenow-grc
      - emass
      - risklenssplunk

