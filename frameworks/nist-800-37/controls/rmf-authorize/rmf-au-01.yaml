id: rmf-au-01
family: rmf-authorize
title: "Authorization Package Assembly"
class: NIST-800-37

statement:
  prose: >-
    Assemble the authorization package and submit it to the authorizing official for
    adjudication. The authorization package includes the system security plan, the security
    and privacy assessment report, and the plan of action and milestones. The package provides
    the authorizing official with the essential information needed to make a risk-based
    authorization decision regarding the operation of the information system.

guidance:
  prose: >-
    The authorization package is the culmination of the Prepare, Categorize, Select,
    Implement, and Assess steps. It presents a comprehensive picture of the system's
    security and privacy posture to the authorizing official. The system security plan
    documents the control implementations, the assessment report evaluates their
    effectiveness, and the POA&M identifies remaining deficiencies with remediation plans.
    Together, these artifacts enable the authorizing official to understand the residual
    risk associated with operating the system. The package should be complete, accurate,
    and current. Incomplete or outdated packages delay the authorization decision and
    undermine confidence in the risk determination.

references:
  - citation: "NIST SP 800-37 Rev 2, Chapter 3, Authorize Step — Task R-1"
    url: "https://csrc.nist.gov/publications/detail/sp/800-37/rev-2/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Automate the assembly of the authorization package from authoritative data
      sources. Generate the SSP from infrastructure-as-code, service catalog metadata,
      and common control inheritance records. Generate the assessment report from
      automated scanning results, compliance evaluation outputs, and manual assessment
      findings. Generate the POA&M from tracked deficiency records. Use OSCAL formats
      for all authorization package artifacts to enable automated validation and
      completeness checking. Provide a dashboard for the authorizing official that
      summarizes the authorization package contents and highlights key risk indicators.
    tools:
      - oscal-tools
      - compliance-trestle
      - backstage
      - terraform

  devsecops:
    prose: >-
      Generate authorization package artifacts from pipeline data. The SSP is
      maintained as code, assessment evidence comes from pipeline security scan
      results, and POA&M items are tracked as issues. Create a pipeline stage that
      assembles all artifacts into a cohesive authorization package. Validate the
      package completeness (all controls have implementation descriptions and
      assessment results) before allowing the package to be submitted. Publish the
      authorization package to a secure location accessible to the authorizing
      official, with appropriate access controls.
    tools:
      - gitlab-ci
      - compliance-trestle
      - oscal-tools
      - gitlab-pages

  secops:
    prose: >-
      Assemble the authorization package in the GRC platform, ensuring all required
      artifacts are complete and current. Verify that the assessment report covers
      all controls in the SSP, that POA&M items have defined remediation milestones,
      and that the system description is accurate. Submit the package to the
      authorizing official through the established workflow with all supporting
      documentation. Track the package submission date and response timeline.
      Maintain an archive of all authorization packages for audit purposes.
    tools:
      - archer-grc
      - servicenow-grc
      - emass
      - xacta

legal_references:
