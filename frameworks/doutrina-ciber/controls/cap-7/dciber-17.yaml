id: dciber-17
family: cap-7
title: "Protection of Strategic Military Infrastructure"
class: DOUTRINA-CIBER
baselines: [forcas-armadas]
statement:
  prose: |
    A proteção das infraestruturas estratégicas militares contra ameaças cibernéticas
    é responsabilidade compartilhada entre as Forças Armadas e o Ministério da Defesa.
    São consideradas infraestruturas estratégicas militares: os sistemas de comando e
    controle (C2); os sistemas de armas e plataformas de combate com componentes
    cibernéticos; os sistemas de comunicações militares (satélite, rádio, fibra óptica);
    os sistemas de navegação e posicionamento; os sistemas logísticos e de apoio ao
    combate; e as redes de dados classificados. A proteção dessas infraestruturas
    requer avaliação periódica de riscos cibernéticos, implementação de controles de
    segurança proporcionais à criticidade dos sistemas, testes de penetração regulares,
    e planos de contingência específicos para cada infraestrutura crítica.
guidance:
  prose: |
    Strategic military infrastructure encompasses:

    - **C2 systems**: Command and control networks and applications.
    - **Weapons systems**: Cyber-enabled weapons platforms (ships, aircraft,
      ground vehicles with networked components).
    - **Communications**: Satellite, radio, fiber-optic military networks.
    - **Navigation**: GPS, INS, and positioning systems.
    - **Logistics**: Supply chain, maintenance, and combat support systems.
    - **Classified networks**: Secret and top-secret data networks.

    Protection requirements:
    - Periodic cyber risk assessments for each infrastructure element.
    - Security controls proportional to criticality.
    - Regular penetration testing.
    - Infrastructure-specific contingency plans.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement defense-in-depth architecture for all strategic military
         infrastructure with multiple independent security layers.
      2. Deploy operational technology (OT) security monitoring for weapons
         systems and platforms with cyber-physical components.
      3. Implement redundant communication paths for C2 systems including
         satellite, terrestrial, and HF radio backup.
      4. Deploy hardware-based security controls (TPM, secure boot, HSM)
         for infrastructure components in austere or contested environments.
      5. Maintain air-gapped networks for the most critical weapons systems
         and C2 platforms.
    tools:
      - ot-security
      - redundant-communications
      - hardware-security
      - air-gapped-networks
      - defense-in-depth
  devsecops:
    prose: |
      1. Implement stringent supply chain security for all software
         components deployed to strategic military infrastructure.
      2. Maintain complete SBOM for all software running on strategic
         platforms, with continuous vulnerability monitoring.
      3. Enforce formal verification and certification processes for
         software updates to weapons systems and C2 platforms.
      4. Implement hardware-in-the-loop (HIL) testing environments for
         validating software updates before deployment to operational systems.
    tools:
      - supply-chain-security
      - sbom-management
      - formal-verification
      - hil-testing
      - certification-pipeline
  secops:
    prose: |
      1. Conduct annual cyber risk assessments for each strategic military
         infrastructure element with formal risk acceptance.
      2. Perform regular penetration testing of strategic infrastructure,
         including red team exercises targeting C2 and weapons systems.
      3. Maintain infrastructure-specific contingency plans with defined
         RTOs, RPOs, and alternate operating procedures.
      4. Implement continuous compliance monitoring for all security
         controls protecting strategic infrastructure.
    tools:
      - risk-assessment
      - penetration-testing
      - red-team
      - contingency-planning
      - compliance-monitoring
