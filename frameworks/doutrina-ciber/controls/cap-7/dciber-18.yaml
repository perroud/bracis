id: dciber-18
family: cap-7
title: "Dual-Use and National Critical Infrastructure Cyber Protection"
class: DOUTRINA-CIBER
baselines: [forcas-armadas]
statement:
  prose: |
    A doutrina de defesa cibernética reconhece que as Forças Armadas dependem de
    infraestruturas críticas civis para a sustentação de suas operações, incluindo
    energia elétrica, telecomunicações, transporte, abastecimento de água e serviços
    financeiros. A proteção cibernética dessas infraestruturas de uso dual — que
    servem simultaneamente a finalidades civis e militares — exige a cooperação entre
    o setor militar e os órgãos reguladores civis, operadores de infraestruturas
    críticas e prestadores de serviços essenciais. As Forças Armadas devem manter
    planos de contingência para cenários em que infraestruturas críticas civis
    essenciais à operação militar sejam comprometidas por ataques cibernéticos,
    incluindo capacidades alternativas de comunicação, energia e logística. A
    articulação com o setor civil é coordenada no âmbito do Gabinete de Segurança
    Institucional da Presidência da República (GSI/PR).
guidance:
  prose: |
    Military operations depend on civilian critical infrastructure:

    - **Energy**: Power grid for military installations and communications.
    - **Telecommunications**: Commercial networks for non-classified communications.
    - **Transportation**: Road, rail, port, and airport infrastructure.
    - **Water**: Supply for military installations and personnel.
    - **Financial**: Banking systems for military payroll and procurement.

    The doctrine mandates:
    - Identification of military dependencies on civilian infrastructure.
    - Cooperation with civilian regulators and infrastructure operators.
    - Contingency plans for degraded civilian infrastructure scenarios.
    - Alternative capabilities (generators, satellite comms, etc.) for continuity.
    - Coordination through GSI/PR for civil-military integration.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Map and document all military dependencies on civilian critical
         infrastructure, including single points of failure.
      2. Deploy alternative infrastructure capabilities (backup power,
         satellite communications, independent water) for critical sites.
      3. Implement monitoring of civilian infrastructure services used by
         military operations to detect degradation early.
      4. Establish secure interconnection points with critical infrastructure
         operators for rapid coordination during cyber events.
    tools:
      - dependency-mapping
      - backup-infrastructure
      - service-monitoring
      - secure-interconnection
  devsecops:
    prose: |
      1. Develop and maintain military applications with graceful degradation
         capabilities when civilian infrastructure services are unavailable.
      2. Implement offline-capable modes for critical military applications
         that normally depend on civilian network connectivity.
      3. Test application resilience against civilian infrastructure failure
         scenarios in CI/CD pipeline integration tests.
      4. Maintain local caches and fallback data sources for systems
         dependent on external civilian data feeds.
    tools:
      - graceful-degradation
      - offline-mode
      - resilience-testing
      - local-caching
  secops:
    prose: |
      1. Participate in civilian critical infrastructure protection exercises
         and sector-specific cyber drills.
      2. Establish information sharing agreements with critical infrastructure
         operators for mutual threat intelligence exchange.
      3. Develop joint incident response procedures with civilian agencies
         for scenarios affecting dual-use infrastructure.
      4. Conduct regular assessments of military readiness to operate
         under degraded civilian infrastructure conditions.
    tools:
      - joint-exercises
      - information-sharing-agreements
      - joint-incident-response
      - readiness-assessment
