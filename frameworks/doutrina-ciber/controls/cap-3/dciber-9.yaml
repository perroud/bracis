id: dciber-9
family: cap-3
title: "Service Branch Cyber Commands — Joint Integration"
class: DOUTRINA-CIBER
baselines: [forcas-armadas]
statement:
  prose: |
    As Forças Singulares — Marinha do Brasil (MB), Exército Brasileiro (EB) e Força
    Aérea Brasileira (FAB) — mantêm, no âmbito de suas estruturas organizacionais,
    órgãos e elementos dedicados à defesa cibernética, responsáveis pela execução das
    ações cibernéticas em nível tático e pelo apoio às operações conjuntas coordenadas
    pelo ComDCiber. Cada Força Singular é responsável por: organizar, preparar e
    empregar seus meios cibernéticos; desenvolver e manter capacidades cibernéticas
    específicas de sua Força; formar e capacitar recursos humanos em defesa
    cibernética; e contribuir com meios e pessoal para composição das forças
    cibernéticas conjuntas. A integração entre as Forças é assegurada pela doutrina
    conjunta e pelos procedimentos operacionais padronizados emanados do ComDCiber.
guidance:
  prose: |
    Each service branch maintains its own cyber defense capability while contributing
    to joint operations:

    **Navy (MB)**: Maritime cyber defense, naval communication systems, port
    infrastructure security.

    **Army (EB)**: Ground force cyber defense, tactical communications, critical
    infrastructure protection. The Army hosts ComDCiber administratively.

    **Air Force (FAB)**: Aerospace cyber defense, air traffic systems, satellite
    communications security.

    Integration is achieved through:
    - Common doctrine and standard operating procedures from ComDCiber.
    - Joint training and exercises.
    - Personnel exchange and joint force composition.
    - Interoperable tools and shared intelligence.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement interoperable infrastructure standards enabling
         seamless integration of service-specific cyber systems into
         joint operations.
      2. Deploy common platform services (logging, monitoring, identity)
         that work across service-specific environments.
      3. Establish shared data formats and APIs to enable inter-service
         information exchange during joint operations.
      4. Maintain service-specific infrastructure while ensuring compatibility
         with ComDCiber's joint operational requirements.
    tools:
      - interoperability-standards
      - common-platform-services
      - api-gateway
      - federated-monitoring
  devsecops:
    prose: |
      1. Adopt common development standards and security baselines across
         all service branches, defined and maintained by ComDCiber.
      2. Implement shared CI/CD templates and security scanning
         configurations ensuring consistent quality across services.
      3. Maintain a joint vulnerability database and shared knowledge base
         accessible to all service branch development teams.
      4. Establish cross-service code review and security assessment
         programs for jointly deployed capabilities.
    tools:
      - shared-ci-templates
      - common-security-baselines
      - joint-vulnerability-db
      - cross-service-review
  secops:
    prose: |
      1. Establish inter-service SOC coordination procedures with defined
         communication channels and escalation paths.
      2. Implement joint threat intelligence sharing between service-level
         cyber centers and CTIR.Mil.
      3. Conduct regular joint cyber exercises testing inter-service
         coordination and unified command procedures.
      4. Maintain a joint lessons-learned database from exercises and
         real-world incidents accessible to all services.
    tools:
      - joint-soc-coordination
      - threat-sharing-platform
      - exercise-management
      - lessons-learned-database
legal_references:
  - framework_id: pnsi
    articles: ["art-6"]
    relationship: complements
  - framework_id: pnciber
    articles: ["art-6", "art-7"]
    relationship: complements
