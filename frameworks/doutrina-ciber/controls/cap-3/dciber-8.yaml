id: dciber-8
family: cap-3
title: "Military Cyber Incident Response Team (CTIR.Mil)"
class: DOUTRINA-CIBER
baselines: [forcas-armadas]
statement:
  prose: |
    O Centro de Tratamento de Incidentes de Redes do Comando de Defesa Cibernética
    (CTIR.Mil) é o órgão responsável pela coordenação das atividades de prevenção,
    monitoramento, tratamento e resposta a incidentes cibernéticos no âmbito do
    Ministério da Defesa e das Forças Armadas. O CTIR.Mil atua como ponto focal
    para a articulação com o Centro de Prevenção, Tratamento e Resposta a Incidentes
    Cibernéticos de Governo (CTIR Gov), com o Centro de Estudos, Resposta e
    Tratamento de Incidentes de Segurança (CERT.br) e com os centros de tratamento
    de incidentes das Forças Singulares. Compete ao CTIR.Mil: receber, analisar e
    responder a notificações de incidentes cibernéticos; emitir alertas e
    recomendações de segurança; e coordenar a resposta a incidentes de grande
    porte que afetem os sistemas de defesa.
guidance:
  prose: |
    CTIR.Mil is the military CSIRT responsible for incident handling across all
    defense entities. Its role includes:

    - **Incident coordination**: Receives, analyzes, and coordinates response to
      cyber incidents within the defense sector.
    - **Alert issuance**: Publishes security advisories and alerts for military
      networks and systems.
    - **Liaison function**: Acts as the bridge between military CSIRTs and civilian
      entities (CTIR Gov, CERT.br).
    - **Inter-service coordination**: Coordinates with Navy (CTIM), Army (CCIBER),
      and Air Force (CTIR.FAB) incident response teams.
    - **Major incident management**: Leads response to large-scale cyber incidents
      affecting national defense systems.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Deploy a centralized incident management platform enabling CTIR.Mil
         to track, coordinate, and report on incidents across all defense entities.
      2. Implement automated threat intelligence feeds (STIX/TAXII) connecting
         CTIR.Mil with CTIR Gov, CERT.br, and allied military CSIRTs.
      3. Establish secure incident notification channels with defined SLAs
         for reporting from service-level CSIRTs to CTIR.Mil.
      4. Deploy forensic analysis infrastructure including evidence preservation
         systems with chain-of-custody tracking.
    tools:
      - incident-management-platform
      - stix-taxii
      - forensics-infrastructure
      - chain-of-custody
      - secure-notification
  devsecops:
    prose: |
      1. Implement automated incident detection integration between CI/CD
         pipelines and CTIR.Mil notification systems.
      2. Deploy automated malware analysis and reverse engineering pipelines
         for rapid triage of detected threats.
      3. Maintain versioned incident response playbooks as code, enabling
         consistent and auditable response procedures.
      4. Integrate vulnerability disclosure processes into development
         workflows for military software systems.
    tools:
      - malware-analysis-pipeline
      - playbooks-as-code
      - vulnerability-disclosure
      - automated-detection
  secops:
    prose: |
      1. Establish standardized incident classification taxonomy aligned
         with national and international standards (e.g., ENISA taxonomy).
      2. Implement tiered escalation procedures: service CSIRT handles
         local incidents; CTIR.Mil coordinates when incidents span services
         or reach defined severity thresholds.
      3. Maintain 24/7 on-call rotation for CTIR.Mil with defined response
         time SLAs for each incident severity level.
      4. Conduct post-incident reviews producing lessons learned and
         recommendations for systemic improvements.
    tools:
      - incident-classification
      - escalation-management
      - on-call-management
      - post-incident-review
legal_references:
