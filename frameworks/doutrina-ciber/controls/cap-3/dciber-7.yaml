id: dciber-7
family: cap-3
title: "Cyber Defense Command (ComDCiber) — Roles and Responsibilities"
class: DOUTRINA-CIBER
baselines: [forcas-armadas]
statement:
  prose: |
    O Comando de Defesa Cibernética (ComDCiber), subordinado ao Comando do Exército
    e com vinculação operacional ao Estado-Maior Conjunto das Forças Armadas (EMCFA),
    é o órgão central de coordenação e integração das atividades de defesa cibernética
    no âmbito das Forças Armadas. Compete ao ComDCiber: planejar, coordenar e controlar
    as operações no espaço cibernético em nível operacional; coordenar as atividades
    de defesa cibernética entre as Forças Singulares; manter a capacidade de
    emprego conjunto de meios cibernéticos; desenvolver e manter a doutrina de emprego
    de forças cibernéticas; e assessorar o EMCFA em assuntos relativos à defesa
    cibernética.
guidance:
  prose: |
    ComDCiber is the central node of Brazil's military cyber defense structure.
    Key responsibilities:

    - **Operational command**: Plans and controls joint cyber operations.
    - **Inter-service coordination**: Integrates cyber capabilities across
      Navy, Army, and Air Force.
    - **Joint employment**: Maintains ready-to-deploy joint cyber forces.
    - **Doctrine development**: Evolves military cyber defense doctrine.
    - **Advisory role**: Provides cyber expertise to EMCFA for strategic decisions.

    ComDCiber's dual subordination (administrative to Army, operational to EMCFA)
    reflects the joint nature of cyber operations.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement centralized command-and-control (C2) platforms enabling
         ComDCiber to coordinate operations across all service branches.
      2. Deploy federated identity and access management linking ComDCiber
         systems with each service branch's cyber operations infrastructure.
      3. Establish a joint cyber operations center (JCOC) platform with
         shared situational awareness dashboards and collaboration tools.
      4. Implement secure inter-service communication channels for
         operational coordination and intelligence sharing.
    tools:
      - c2-platform
      - federated-iam
      - collaboration-platform
      - secure-communications
      - joint-operations-dashboard
  devsecops:
    prose: |
      1. Maintain a shared repository of joint cyber tools and capabilities
         accessible to authorized personnel across all service branches.
      2. Implement standardized development and deployment practices
         enabling interoperability of cyber tools across services.
      3. Establish joint code review and security assessment processes
         for tools destined for multi-service deployment.
      4. Define common artifact formats, APIs, and data standards to
         ensure technical interoperability at the operational level.
    tools:
      - gitlab-ci
      - shared-artifact-registry
      - api-standards
      - interoperability-testing
  secops:
    prose: |
      1. Establish joint cyber operations procedures defining roles,
         responsibilities, and authorities for ComDCiber and each service.
      2. Implement unified reporting chains from tactical-level SOCs
         through service cyber centers to ComDCiber operational center.
      3. Conduct regular joint cyber exercises to validate command and
         control procedures and inter-service coordination.
      4. Maintain a joint cyber force readiness assessment program tracking
         capability maturity across all service branches.
    tools:
      - joint-operations-management
      - unified-reporting
      - exercise-management
      - readiness-assessment
legal_references:
