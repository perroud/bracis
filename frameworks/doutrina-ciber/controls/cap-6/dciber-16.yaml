id: dciber-16
family: cap-6
title: "Cyber Crisis Management and Escalation"
class: DOUTRINA-CIBER
baselines: [forcas-armadas]
statement:
  prose: |
    A gestão de crises cibernéticas no âmbito da Defesa Nacional é atividade de
    coordenação interinstitucional que envolve a articulação entre o Ministério da
    Defesa, o Estado-Maior Conjunto das Forças Armadas, o ComDCiber, as Forças
    Singulares e órgãos civis de segurança cibernética. A doutrina estabelece que
    crises cibernéticas que ameacem a soberania nacional, a segurança do Estado ou
    a integridade de infraestruturas críticas nacionais devem ser escaladas ao nível
    estratégico e tratadas no âmbito do Sistema Militar de Defesa Cibernética (SMDC),
    com possível ativação do Gabinete de Crise. O ComDCiber mantém planos de
    contingência e de continuidade de operações cibernéticas para cenários de crise,
    incluindo a possibilidade de operação em modo degradado e a recuperação de
    capacidades essenciais em prazos definidos. A comunicação de crise deve seguir
    canais seguros e protocolos previamente estabelecidos.
guidance:
  prose: |
    Cyber crisis management elevates incident response to the strategic level when:

    - National sovereignty is threatened.
    - State security is at risk.
    - National critical infrastructure is compromised.

    The crisis management framework includes:
    - **SMDC activation**: The Military Cyber Defense System coordinates the
      military response.
    - **Crisis Cabinet**: May be activated for highest-severity scenarios.
    - **Contingency plans**: Pre-established plans for various crisis scenarios.
    - **Continuity of operations**: Degraded-mode operations and defined RTOs.
    - **Secure communications**: Protected channels for crisis coordination.
    - **Civil-military coordination**: Integration with civilian cybersecurity
      governance (GSI, CTIR Gov).
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement out-of-band communication systems for crisis coordination
         that function independently of potentially compromised networks.
      2. Deploy redundant command and control infrastructure with automatic
         failover for cyber crisis scenarios.
      3. Maintain geographically distributed backup sites with defined
         recovery time objectives for critical defense systems.
      4. Implement network kill-switch capabilities enabling rapid isolation
         of compromised segments during crisis scenarios.
    tools:
      - out-of-band-communications
      - redundant-c2
      - disaster-recovery-sites
      - network-isolation
      - failover-systems
  devsecops:
    prose: |
      1. Maintain infrastructure-as-code for all critical systems enabling
         rapid rebuild at alternate locations during crisis.
      2. Implement automated disaster recovery testing in pipelines to
         validate recovery procedures before they are needed.
      3. Deploy blue/green deployment patterns for critical services
         enabling instant rollback during crisis scenarios.
      4. Maintain offline package mirrors and dependency caches ensuring
         build capability during network isolation events.
    tools:
      - infrastructure-as-code
      - dr-testing
      - blue-green-deployment
      - offline-mirrors
  secops:
    prose: |
      1. Develop and maintain cyber crisis management plans covering
         escalation triggers, decision authorities, and response procedures.
      2. Conduct annual strategic-level cyber crisis exercises involving
         ComDCiber, EMCFA, and civilian agencies (GSI, CTIR Gov).
      3. Establish secure crisis communication protocols with pre-distributed
         encryption keys and authentication mechanisms.
      4. Maintain a cyber crisis decision support system with pre-analyzed
         courses of action for priority threat scenarios.
    tools:
      - crisis-management-platform
      - strategic-exercises
      - secure-communications
      - decision-support
