id: dciber-15
family: cap-6
title: "Military Cyber Incident Response Procedures"
class: DOUTRINA-CIBER
baselines: [forcas-armadas]
statement:
  prose: |
    A resposta a incidentes cibernéticos no âmbito das Forças Armadas obedece a
    procedimentos padronizados que compreendem as fases de: preparação, identificação,
    contenção, erradicação, recuperação e lições aprendidas. Cada Força Singular
    mantém equipe de tratamento e resposta a incidentes cibernéticos (ETIR/CSIRT),
    subordinada ao seu respectivo órgão de defesa cibernética, com capacidade de
    atuação em regime ininterrupto. Os incidentes cibernéticos são classificados por
    níveis de severidade (baixo, médio, alto e crítico), e os procedimentos de
    escalonamento são definidos conforme o impacto potencial nos sistemas de defesa.
    Incidentes de severidade alta ou crítica devem ser comunicados imediatamente ao
    CTIR.Mil e, conforme o caso, ao CTIR Gov. A preservação de evidências digitais
    para fins de investigação e de eventual persecução penal é obrigatória em todos
    os incidentes cibernéticos.
guidance:
  prose: |
    Military cyber incident response follows a structured six-phase model:

    1. **Preparation**: Policies, procedures, tools, training, and exercises.
    2. **Identification**: Detection, validation, and classification of incidents.
    3. **Containment**: Short-term and long-term measures to limit impact.
    4. **Eradication**: Removal of threat actors and artifacts from systems.
    5. **Recovery**: Restoration of systems to normal operations.
    6. **Lessons learned**: Post-incident review and improvement implementation.

    Severity levels drive escalation:
    - Low/Medium: Handled by service-level CSIRT.
    - High: Reported to CTIR.Mil within defined timelines.
    - Critical: Immediate notification to CTIR.Mil and CTIR Gov.

    Digital evidence preservation is mandatory for all incidents.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Deploy automated incident response orchestration platform (SOAR)
         with predefined playbooks for common military cyber incidents.
      2. Implement forensic readiness infrastructure including write-blockers,
         forensic imaging tools, and evidence preservation systems.
      3. Deploy automated containment capabilities: network isolation,
         account lockout, and endpoint quarantine activated from SOAR.
      4. Maintain hot-standby and cold-standby recovery environments
         for critical military systems enabling rapid restoration.
    tools:
      - soar
      - forensic-tools
      - automated-containment
      - backup-recovery
      - evidence-preservation
  devsecops:
    prose: |
      1. Implement automated rollback capabilities in deployment pipelines
         enabling rapid recovery from compromised releases.
      2. Maintain versioned system snapshots and infrastructure-as-code
         enabling rapid rebuild of compromised environments.
      3. Integrate incident response tooling into development environments
         enabling developers to participate in containment and eradication.
      4. Automate the creation of incident timeline artifacts from
         pipeline and deployment logs.
    tools:
      - automated-rollback
      - infrastructure-as-code
      - snapshot-management
      - incident-timeline
  secops:
    prose: |
      1. Maintain and regularly test incident response playbooks for each
         incident type and severity level.
      2. Implement severity-based escalation procedures with defined
         timelines and notification chains.
      3. Establish digital forensics capability with chain-of-custody
         procedures compliant with Brazilian legal requirements.
      4. Conduct quarterly incident response exercises and annual
         full-scale cyber crisis simulations.
    tools:
      - incident-playbooks
      - escalation-management
      - digital-forensics
      - crisis-simulation
