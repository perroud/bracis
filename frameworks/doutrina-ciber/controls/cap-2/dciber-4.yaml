id: dciber-4
family: cap-2
title: "Defensive Cyber Operations (DCO)"
class: DOUTRINA-CIBER
baselines: [forcas-armadas]
statement:
  prose: |
    As Operações Defensivas Cibernéticas (Op Def Ciber) compreendem o conjunto de
    ações realizadas no espaço cibernético com o objetivo de proteger, monitorar,
    analisar, detectar e responder a ataques cibernéticos, intrusões e anomalias que
    ameacem os sistemas de tecnologia da informação e comunicações (TIC) de interesse
    da Defesa Nacional. As Op Def Ciber incluem a proteção de redes, a defesa de
    perímetro, o monitoramento contínuo, a análise de vulnerabilidades, a gestão de
    patches, a resposta a incidentes cibernéticos e a recuperação de sistemas
    comprometidos. A condução das Op Def Ciber é permanente e constitui a base da
    postura de defesa cibernética das Forças Armadas.
guidance:
  prose: |
    Defensive Cyber Operations (DCO) form the foundation of military cyber posture.
    They are conducted continuously (24/7/365) and encompass:

    - **Network protection**: firewalls, IDS/IPS, access controls.
    - **Perimeter defense**: boundary protection, DMZ management, egress filtering.
    - **Continuous monitoring**: SIEM, NDR, endpoint detection.
    - **Vulnerability management**: scanning, assessment, patching cycles.
    - **Incident response**: detection, containment, eradication, recovery.
    - **System recovery**: backup restoration, forensic preservation, lessons learned.

    DCO is the default operational posture; offensive and exploitation operations are
    conducted only under specific authorization.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Deploy defense-in-depth architecture with layered security controls
         at network, host, application, and data levels.
      2. Implement automated vulnerability scanning across all infrastructure
         components with defined SLAs for remediation by severity.
      3. Establish automated patch management pipelines with testing stages
         before deployment to production military systems.
      4. Deploy network detection and response (NDR) sensors at key network
         junctions for continuous traffic analysis.
      5. Implement immutable infrastructure patterns to simplify recovery
         from compromise and ensure known-good system states.
    tools:
      - ids-ips
      - ndr
      - vulnerability-scanner
      - patch-management
      - immutable-infrastructure
      - firewall-management
  devsecops:
    prose: |
      1. Integrate SAST and DAST scanning in all CI/CD pipelines to prevent
         deployment of vulnerable code to defensive systems.
      2. Implement container image scanning and runtime security for all
         containerized defensive tools and services.
      3. Maintain hardened base images and golden configurations for all
         systems within the defensive cyber operations scope.
      4. Automate security regression testing to ensure patches and updates
         do not introduce new vulnerabilities.
    tools:
      - sast-scanner
      - dast-scanner
      - container-scanner
      - image-hardening
      - security-regression-tests
  secops:
    prose: |
      1. Operate a 24/7 Security Operations Center (SOC) with defined
         procedures for monitoring, detection, and initial response.
      2. Implement automated alert triage and correlation using SIEM and
         SOAR platforms to reduce mean time to detect (MTTD).
      3. Maintain incident response playbooks for common attack vectors
         (phishing, ransomware, DDoS, APT) specific to military context.
      4. Conduct regular vulnerability assessments and penetration testing
         of defensive infrastructure, with results feeding back into
         hardening efforts.
    tools:
      - siem
      - soar
      - edr
      - vulnerability-management
      - penetration-testing
