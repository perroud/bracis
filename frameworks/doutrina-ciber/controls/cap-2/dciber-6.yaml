id: dciber-6
family: cap-2
title: "Cyber Exploitation Operations"
class: DOUTRINA-CIBER
baselines: [forcas-armadas]
statement:
  prose: |
    As Ações de Exploração Cibernética (Expl Ciber) compreendem o conjunto de ações
    realizadas no espaço cibernético com o objetivo de obter dados de interesse para a
    produção de conhecimento de Inteligência, por meio do acesso a sistemas de
    informação e redes de computadores de alvos de interesse, sem necessariamente
    comprometer a integridade ou a disponibilidade desses sistemas. A Exploração
    Cibernética é componente essencial do ciclo de Inteligência militar e apoia tanto
    as operações defensivas quanto as ofensivas, fornecendo informações sobre
    capacidades, vulnerabilidades e intenções de potenciais adversários. As ações de
    Exploração Cibernética devem ser autorizadas pelo nível operacional ou estratégico
    e conduzidas em conformidade com a legislação vigente.
guidance:
  prose: |
    Cyber Exploitation (CE) is the intelligence-gathering component of military cyber
    operations. It sits between defensive and offensive operations:

    - **Purpose**: Intelligence collection, not disruption or destruction.
    - **Scope**: Access to target systems to gather data without altering them.
    - **Authorization**: Requires operational or strategic-level approval.
    - **Integration**: Feeds the military intelligence cycle (direction, collection,
      processing, analysis, dissemination).
    - **Support role**: Provides intelligence that enables both DCO (understanding
      threats) and OCO (target analysis and vulnerability identification).

    CE operations require specialized tradecraft, operational security (OPSEC),
    and strict compartmentalization of collected intelligence.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Deploy secure intelligence processing environments with appropriate
         classification handling for collected data.
      2. Implement data-at-rest and data-in-transit encryption meeting military
         classification standards for intelligence products.
      3. Establish secure communication channels for intelligence dissemination
         between collection and analysis teams.
      4. Deploy sandboxed analysis environments for examining collected artifacts
         without risk of compromise to operational networks.
      5. Implement strict data retention and destruction policies for collected
         intelligence in accordance with classification guidelines.
    tools:
      - encrypted-storage
      - secure-communications
      - sandbox-analysis
      - data-classification
      - secure-destruction
  devsecops:
    prose: |
      1. Develop and maintain intelligence collection tools in isolated
         development environments with strict access controls.
      2. Implement automated testing of collection capabilities in
         representative target environments before operational deployment.
      3. Maintain secure version control for all exploitation frameworks
         with full audit trails and dual-control release gates.
      4. Automate intelligence data processing pipelines while maintaining
         compartmentalization of source and method information.
    tools:
      - secure-sdlc
      - isolated-dev-environment
      - automated-testing
      - data-pipeline
  secops:
    prose: |
      1. Establish operational security (OPSEC) procedures for all cyber
         exploitation activities, including source protection measures.
      2. Implement intelligence cycle management: tasking, collection,
         processing, exploitation, and dissemination (TCPED).
      3. Maintain strict compartmentalization between exploitation operations
         and other cyber operations to protect sources and methods.
      4. Conduct regular OPSEC reviews and counterintelligence assessments
         of exploitation infrastructure and procedures.
    tools:
      - intelligence-management
      - opsec-assessment
      - compartmentalization-controls
      - counterintelligence-tools
