id: dciber-5
family: cap-2
title: "Offensive Cyber Operations (OCO)"
class: DOUTRINA-CIBER
baselines: [forcas-armadas]
statement:
  prose: |
    As Operações Ofensivas Cibernéticas (Op Of Ciber) compreendem o conjunto de ações
    realizadas no espaço cibernético com o objetivo de comprometer, degradar, interromper,
    negar o uso ou destruir dados, sistemas de informação ou redes de computadores do
    oponente, no contexto de operações militares autorizadas. As Op Of Ciber são
    conduzidas exclusivamente sob autorização do nível estratégico, no âmbito de
    operações conjuntas, e devem observar os princípios do Direito Internacional dos
    Conflitos Armados (DICA), incluindo distinção, proporcionalidade, necessidade
    militar e humanidade. O desenvolvimento e a manutenção de capacidades ofensivas
    são essenciais para a postura de dissuasão cibernética do País.
guidance:
  prose: |
    Offensive Cyber Operations (OCO) are the most sensitive and controlled aspect of
    military cyber doctrine. Key constraints:

    - **Authorization**: OCO requires strategic-level authorization; it is never
      autonomous at tactical level.
    - **Legal framework**: Must comply with International Humanitarian Law (IHL),
      specifically distinction, proportionality, military necessity, and humanity.
    - **Joint context**: OCO is conducted within joint operations, not unilaterally
      by individual service branches.
    - **Deterrence**: The mere existence of credible OCO capability serves as
      strategic deterrence.
    - **Capability development**: Includes research, tool development, target
      analysis, and operational planning.

    Organizations supporting OCO must maintain strict compartmentalization, access
    controls, and audit trails.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Establish isolated, air-gapped development environments for offensive
         capability research and tool development.
      2. Implement strict network segmentation between offensive development
         labs, testing ranges, and operational networks.
      3. Deploy secure artifact repositories with cryptographic integrity
         verification for all offensive tools and payloads.
      4. Maintain dedicated infrastructure for cyber range environments
         enabling realistic offensive operation rehearsal.
      5. Implement hardware security modules (HSMs) for key management
         in offensive operations infrastructure.
    tools:
      - air-gapped-networks
      - cyber-range
      - hsm
      - secure-artifact-repository
      - network-isolation
  devsecops:
    prose: |
      1. Implement compartmentalized CI/CD pipelines for offensive tool
         development with multi-person authorization for builds and releases.
      2. Enforce code review by cleared personnel with dual-control
         approval for all offensive capability modifications.
      3. Maintain version control with cryptographic signing for all
         offensive tool source code and build artifacts.
      4. Implement automated testing in cyber range environments before
         any offensive tool is approved for operational use.
    tools:
      - gitlab-ci
      - code-signing
      - dual-control-approval
      - cyber-range-testing
      - classified-scm
  secops:
    prose: |
      1. Establish strict authorization workflows requiring strategic-level
         approval before any offensive cyber operation is initiated.
      2. Maintain comprehensive audit trails of all offensive operations
         including planning, authorization, execution, and battle damage
         assessment (BDA).
      3. Implement post-operation review procedures to assess compliance
         with legal frameworks and rules of engagement.
      4. Ensure all offensive operations personnel hold appropriate security
         clearances and undergo regular counterintelligence vetting.
    tools:
      - authorization-workflow
      - audit-trail
      - clearance-management
      - post-operation-review
legal_references:
  - framework_id: pnsi
    articles: ["art-3"]
    relationship: complements
  - framework_id: pnciber
    articles: ["art-4"]
    relationship: complements
