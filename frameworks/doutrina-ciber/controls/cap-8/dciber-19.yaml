id: dciber-19
family: cap-8
title: "Cyber Defense Training and Capacity Building"
class: DOUTRINA-CIBER
baselines: [forcas-armadas]
statement:
  prose: |
    A formação e a capacitação de recursos humanos em defesa cibernética são
    atividades essenciais para a manutenção e o desenvolvimento das capacidades
    cibernéticas das Forças Armadas. A doutrina estabelece que cada Força Singular
    deve manter programas permanentes de formação de pessoal especializado em defesa
    cibernética, abrangendo: formação básica em segurança cibernética para todo o
    efetivo; formação técnica especializada para operadores de defesa cibernética;
    formação avançada em operações cibernéticas ofensivas e de exploração para pessoal
    selecionado; e capacitação contínua por meio de cursos, certificações e
    participação em eventos técnicos nacionais e internacionais. O desenvolvimento
    de competências em defesa cibernética deve ser integrado ao sistema de ensino
    militar, desde a formação inicial até os cursos de altos estudos. As Forças
    Armadas devem buscar parcerias com instituições acadêmicas e o setor privado
    para complementar a capacitação de seu pessoal.
guidance:
  prose: |
    Human capital is the most critical factor in cyber defense capability. The
    doctrine mandates a multi-tier training approach:

    **Tier 1 — Basic awareness**: All military personnel must understand
    cybersecurity fundamentals, threats, and personal responsibility.

    **Tier 2 — Technical specialization**: Operators, analysts, and engineers
    receive in-depth training in defensive cyber operations.

    **Tier 3 — Advanced operations**: Selected personnel trained in offensive
    and exploitation operations (highly restricted).

    **Continuous development**: Certifications, conferences, academic partnerships,
    and international exchange programs.

    Integration with military education system ensures cyber defense is woven
    into career progression from entry to senior leadership.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Deploy cyber training environments (ranges) enabling realistic
         hands-on exercises for all training tiers.
      2. Implement virtual lab infrastructure supporting on-demand creation
         of training scenarios and attack simulations.
      3. Maintain dedicated training platforms separate from operational
         networks to enable aggressive learning without risk.
      4. Deploy knowledge management systems for capturing and sharing
         technical knowledge across the cyber workforce.
    tools:
      - cyber-range
      - virtual-labs
      - training-platform
      - knowledge-management
  devsecops:
    prose: |
      1. Implement secure coding training programs with hands-on exercises
         integrated into developer onboarding and continuous education.
      2. Deploy gamified security challenges (CTF-style) within development
         pipelines to reinforce secure development practices.
      3. Maintain a library of security anti-patterns and lessons learned
         from real incidents accessible to all developers.
      4. Integrate security champions program into development teams,
         providing advanced training to designated team members.
    tools:
      - secure-coding-training
      - ctf-platform
      - security-champions
      - lessons-learned-library
  secops:
    prose: |
      1. Develop and maintain a cyber defense training curriculum covering
         all three tiers (basic, technical, advanced).
      2. Establish certification requirements for each role within the
         cyber defense workforce (e.g., CISSP, OSCP, GIAC).
      3. Conduct regular skill assessments and gap analyses to target
         training investments effectively.
      4. Participate in national and international cyber exercises
         (Cyber Guardian, Locked Shields, Crossed Swords) for advanced
         training and interoperability development.
    tools:
      - training-curriculum
      - certification-management
      - skill-assessment
      - international-exercises
legal_references:
