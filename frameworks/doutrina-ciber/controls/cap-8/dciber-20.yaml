id: dciber-20
family: cap-8
title: "Cyber Exercises and Operational Readiness"
class: DOUTRINA-CIBER
baselines: [forcas-armadas]
statement:
  prose: |
    A realização de exercícios cibernéticos é instrumento fundamental para a
    avaliação da prontidão operacional, o adestramento de pessoal e a validação de
    procedimentos de defesa cibernética. A doutrina estabelece que o ComDCiber deve
    coordenar a realização periódica de exercícios cibernéticos conjuntos, incluindo:
    exercícios de simulação de incidentes cibernéticos (tabletop exercises); exercícios
    técnicos de defesa cibernética em ambiente simulado (cyber ranges); exercícios de
    red team e blue team para teste de capacidades ofensivas e defensivas; exercícios
    de gestão de crises cibernéticas envolvendo os níveis estratégico, operacional e
    tático; e participação em exercícios cibernéticos internacionais para
    desenvolvimento de interoperabilidade com aliados. Os resultados dos exercícios
    devem ser documentados, analisados e utilizados para o aprimoramento contínuo da
    doutrina, dos procedimentos e das capacidades de defesa cibernética.
guidance:
  prose: |
    Cyber exercises are the primary mechanism for validating and improving military
    cyber defense capabilities:

    **Exercise types:**
    - **Tabletop exercises**: Discussion-based, testing decision-making and procedures.
    - **Technical exercises**: Hands-on in cyber range environments, testing technical
      skills and defensive/offensive capabilities.
    - **Red team / Blue team**: Adversarial exercises testing attack and defense.
    - **Crisis management**: Strategic-level exercises testing escalation and
      inter-agency coordination.
    - **International exercises**: Joint exercises with allied nations for
      interoperability (e.g., Cyber Guardian, Locked Shields).

    All exercises must produce documented lessons learned that feed back into
    doctrine, procedures, and capability development.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Maintain a persistent cyber range infrastructure supporting
         realistic multi-domain exercise scenarios.
      2. Implement automated exercise scenario generation and environment
         provisioning for rapid exercise setup.
      3. Deploy exercise monitoring and scoring systems providing real-time
         visibility into team performance and metrics.
      4. Maintain a library of exercise scenarios covering the full
         spectrum of cyber threats relevant to military operations.
    tools:
      - cyber-range
      - exercise-automation
      - scoring-systems
      - scenario-library
  devsecops:
    prose: |
      1. Integrate security exercises into development sprints, including
         red team assessments of deployed applications.
      2. Implement automated adversary simulation tools in test environments
         to continuously challenge defensive configurations.
      3. Use exercise findings to update and improve CI/CD security controls,
         detection rules, and response procedures.
      4. Develop exercise-as-code practices enabling repeatable and
         version-controlled exercise scenarios.
    tools:
      - adversary-simulation
      - breach-attack-simulation
      - exercise-as-code
      - security-testing
  secops:
    prose: |
      1. Plan and execute the annual cyber exercise calendar covering all
         exercise types (tabletop, technical, red/blue, crisis, international).
      2. Implement a structured after-action review (AAR) process generating
         actionable recommendations from every exercise.
      3. Track remediation of exercise findings with defined timelines and
         responsible parties.
      4. Benchmark exercise performance over time to measure improvement
         in cyber defense readiness and capability maturity.
    tools:
      - exercise-planning
      - after-action-review
      - findings-tracking
      - readiness-metrics
legal_references:
