id: dciber-1
family: cap-1
title: "Cyberspace as an Operational Domain"
class: DOUTRINA-CIBER
baselines: [forcas-armadas]
statement:
  prose: |
    O espaço cibernético constitui um domínio operacional de natureza transversal,
    composto por um conjunto de dispositivos computacionais conectados em rede ou não,
    e pelo espectro eletromagnético utilizado para armazenar, modificar e intercambiar
    dados por meio de redes de computadores e sistemas de comunicações. As Forças
    Armadas reconhecem o espaço cibernético como ambiente operacional para a condução
    de operações militares, em complemento aos domínios terrestre, marítimo, aéreo e
    espacial, sendo seu controle essencial para o exercício da soberania nacional e a
    defesa dos interesses do Estado brasileiro.
guidance:
  prose: |
    This control establishes cyberspace as a recognized operational domain for the
    Brazilian Armed Forces, alongside land, sea, air, and space. The doctrine treats
    cyberspace not merely as a technical infrastructure but as a strategic environment
    where military operations are planned, conducted, and sustained.

    Key implications:
    - All military planning must consider cyber dimensions alongside kinetic operations.
    - Cyber capabilities are integral to joint operations, not an auxiliary function.
    - Sovereignty in cyberspace is a national defense imperative.
    - The electromagnetic spectrum used for data exchange is part of this domain.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Establish dedicated network segments for military operational systems,
         logically and physically separated from administrative networks.
      2. Implement defense-in-depth architecture with multiple security zones
         reflecting the operational classification of cyberspace assets.
      3. Deploy network-level telemetry and traffic analysis to maintain situational
         awareness across the cyber domain.
      4. Maintain a comprehensive asset inventory classifying all systems by their
         operational domain relevance and criticality.
      5. Implement zero-trust architecture principles for all cross-domain access.
    tools:
      - network-segmentation
      - zero-trust-architecture
      - asset-inventory
      - network-monitoring
      - traffic-analysis
  devsecops:
    prose: |
      1. Integrate threat modeling into the development lifecycle for all military
         applications, considering cyberspace as an operational domain.
      2. Apply secure-by-design principles to all software destined for military
         cyber operations, including supply chain verification.
      3. Implement SBOM generation and artifact signing for all deployable components
         within the cyber operational domain.
      4. Enforce security gates in CI/CD pipelines that validate operational readiness
         of software before deployment to classified networks.
    tools:
      - threat-modeling
      - sbom-generator
      - cosign
      - gitlab-ci
      - secure-sdlc
  secops:
    prose: |
      1. Develop and maintain a cyber common operational picture (COP) providing
         real-time situational awareness across all military networks.
      2. Establish 24/7 monitoring capabilities for military cyber domain operations,
         integrated with the joint operations center.
      3. Define and maintain cyber rules of engagement (ROE) aligned with the
         doctrine's recognition of cyberspace as an operational domain.
      4. Conduct regular assessments of the organization's cyber domain posture
         and readiness for military operations.
    tools:
      - siem
      - soar
      - cyber-cop-dashboard
      - threat-intelligence-platform
legal_references:
