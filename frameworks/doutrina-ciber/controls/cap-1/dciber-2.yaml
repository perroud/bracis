id: dciber-2
family: cap-1
title: "Principles of Military Cyber Defense"
class: DOUTRINA-CIBER
baselines: [forcas-armadas]
statement:
  prose: |
    A Defesa Cibernética é o conjunto de ações ofensivas, defensivas e exploratórias
    realizadas no espaço cibernético, no contexto de um planejamento militar de nível
    operacional ou estratégico, coordenadas pelo Estado-Maior Conjunto das Forças
    Armadas (EMCFA), com as finalidades de proteger os sistemas de informação de
    interesse da Defesa Nacional, obter dados para a produção de conhecimento de
    Inteligência e comprometer os sistemas de informação do oponente. A Defesa
    Cibernética rege-se pelos princípios de: exploração, proteção, dissuasão,
    resiliência, interoperabilidade, cooperação e legalidade.
guidance:
  prose: |
    This control defines the core principles governing military cyber defense:

    1. **Exploitation**: capability to gather intelligence from adversary systems.
    2. **Protection**: safeguarding military information systems and data.
    3. **Deterrence**: maintaining credible cyber capabilities to dissuade adversaries.
    4. **Resilience**: ability to sustain operations despite cyber attacks.
    5. **Interoperability**: ensuring joint and combined cyber operations across services.
    6. **Cooperation**: coordination with civilian agencies and international partners.
    7. **Legality**: operating within national and international legal frameworks.

    These principles guide all cyber defense planning, operations, and capability
    development across the Brazilian Armed Forces.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Design infrastructure to embody resilience principles: redundant systems,
         automated failover, and graceful degradation capabilities.
      2. Implement interoperability standards (STIX/TAXII, OpenC2) enabling seamless
         integration between service branches and allied systems.
      3. Deploy infrastructure-as-code to ensure repeatable, auditable, and
         version-controlled configurations aligned with protection principles.
      4. Maintain isolated environments for cyber exploitation tool development
         and testing, separated from operational networks.
    tools:
      - infrastructure-as-code
      - disaster-recovery
      - stix-taxii
      - openc2
      - gitops
  devsecops:
    prose: |
      1. Embed the principle of protection into every pipeline stage through
         mandatory SAST, DAST, and dependency scanning.
      2. Implement resilience testing (chaos engineering) in pre-production
         environments to validate system survivability.
      3. Ensure all development tools and dependencies are vetted and comply
         with the legality principle, avoiding sanctioned or prohibited components.
      4. Maintain interoperability through standardized APIs and data formats
         across all military software systems.
    tools:
      - sast-scanner
      - dast-scanner
      - dependency-scanner
      - chaos-engineering
      - api-gateway
  secops:
    prose: |
      1. Operationalize the deterrence principle through visible and credible
         cyber defense posture, including threat hunting and active defense.
      2. Implement cooperation mechanisms with CTIR Gov, CERT.br, and allied
         nations' CSIRTs for shared threat intelligence.
      3. Ensure all security operations comply with the legality principle,
         maintaining detailed audit trails and authorization records.
      4. Develop resilience metrics and conduct regular assessments against
         defined recovery time objectives (RTO) and recovery point objectives (RPO).
    tools:
      - threat-hunting
      - threat-intelligence-sharing
      - audit-logging
      - resilience-testing
legal_references:
  - framework_id: pnsi
    articles: ["art-3"]
    relationship: complements
  - framework_id: pnciber
    articles: ["art-3"]
    relationship: complements
