id: dciber-3
family: cap-1
title: "Levels of Cyber Action — Strategic, Operational, and Tactical"
class: DOUTRINA-CIBER
baselines: [forcas-armadas]
statement:
  prose: |
    A atuação cibernética militar se desenvolve em três níveis: (a) o nível
    estratégico, de competência do Ministério da Defesa e do Estado-Maior Conjunto
    das Forças Armadas (EMCFA), responsável pela formulação de políticas, diretrizes
    e estratégias de defesa cibernética; (b) o nível operacional, de competência do
    Comando de Defesa Cibernética (ComDCiber), responsável pelo planejamento e pela
    condução de operações cibernéticas no contexto de operações conjuntas; e (c) o
    nível tático, de competência das Forças Singulares (Marinha, Exército e
    Aeronáutica), responsável pela execução das ações cibernéticas no âmbito de
    cada Força. A articulação entre os níveis garante a unidade de esforço e a
    coerência das ações de defesa cibernética.
guidance:
  prose: |
    This control defines the three-tier structure for military cyber action:

    **Strategic level** (Ministry of Defense / EMCFA):
    - Policy formulation, doctrine development, strategic planning.
    - International cyber cooperation and whole-of-government coordination.

    **Operational level** (ComDCiber):
    - Campaign planning, joint cyber operations coordination.
    - Integration of cyber effects into operational-level military planning.

    **Tactical level** (Navy, Army, Air Force):
    - Execution of cyber actions within each service branch.
    - Service-specific tool development and operational capability maintenance.

    This layered approach ensures coherent chain of command and unity of effort.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement role-based access control (RBAC) with hierarchical levels
         mirroring the strategic, operational, and tactical structure.
      2. Establish distinct infrastructure environments for each level with
         controlled data flow between them (e.g., strategic dashboards fed
         by operational and tactical data sources).
      3. Deploy centralized logging that aggregates data from all three levels
         while enforcing need-to-know compartmentalization.
      4. Implement federated identity management enabling cross-level
         authentication with appropriate authorization boundaries.
    tools:
      - rbac
      - identity-federation
      - centralized-logging
      - network-segmentation
      - data-classification
  devsecops:
    prose: |
      1. Maintain separate CI/CD pipelines for each operational level with
         appropriate security classifications and approval gates.
      2. Implement code promotion workflows that mirror the strategic-to-tactical
         approval chain for operational tools and capabilities.
      3. Use GitOps branching strategies that reflect organizational hierarchy,
         with strategic-level policies enforced across all branches.
      4. Ensure artifact repositories are segregated by classification level
         with controlled promotion between tiers.
    tools:
      - gitlab-ci
      - gitops
      - artifact-registry
      - policy-as-code
      - approval-gates
  secops:
    prose: |
      1. Establish security operations centers (SOCs) at each level with defined
         escalation paths between tactical, operational, and strategic tiers.
      2. Implement tiered incident response procedures where tactical SOCs
         handle local incidents, operational SOCs coordinate joint responses,
         and strategic SOC manages national-level cyber crises.
      3. Define clear reporting chains and timelines for cyber event escalation
         from tactical to strategic level.
      4. Conduct multi-tier exercises simulating incidents requiring coordination
         across all three levels.
    tools:
      - soc-platform
      - incident-management
      - escalation-workflow
      - exercise-simulation
