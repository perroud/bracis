id: dciber-10
family: cap-4
title: "Cyber Threat Intelligence and Assessment"
class: DOUTRINA-CIBER
baselines: [forcas-armadas]
statement:
  prose: |
    A Inteligência Cibernética é a atividade de Inteligência voltada para a produção
    de conhecimentos relativos ao espaço cibernético, incluindo a identificação,
    caracterização e avaliação de ameaças cibernéticas, vulnerabilidades e riscos aos
    sistemas de interesse da Defesa Nacional. A atividade de Inteligência Cibernética
    segue o ciclo de Inteligência militar — orientação, coleta, processamento, análise
    e difusão — e integra fontes de todas as naturezas (humanas, sinais, imagens,
    cibernéticas e de fontes abertas) para a produção de conhecimento acionável. A
    avaliação de ameaças cibernéticas abrange: atores estatais e não estatais,
    grupos hacktivistas, organizações criminosas, terroristas cibernéticos e ameaças
    internas (insiders). O conhecimento produzido pela Inteligência Cibernética apoia
    a tomada de decisão nos níveis estratégico, operacional e tático.
guidance:
  prose: |
    Cyber Threat Intelligence (CTI) within the military doctrine follows the standard
    intelligence cycle adapted for the cyber domain:

    1. **Direction**: Define intelligence requirements based on operational needs.
    2. **Collection**: Gather data from multiple sources (HUMINT, SIGINT, OSINT,
       CYBINT, technical sensors).
    3. **Processing**: Normalize, correlate, and enrich collected data.
    4. **Analysis**: Produce actionable intelligence products (threat assessments,
       vulnerability reports, adversary profiles).
    5. **Dissemination**: Distribute intelligence to appropriate consumers at
       strategic, operational, and tactical levels.

    Threat categories include nation-state actors, APT groups, hacktivists,
    cybercriminals, terrorists, and insider threats.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Deploy a threat intelligence platform (TIP) supporting STIX/TAXII
         for structured threat data ingestion and dissemination.
      2. Implement automated indicator of compromise (IOC) enrichment and
         correlation with internal telemetry sources.
      3. Establish secure data lakes for long-term storage and analysis
         of threat intelligence data with appropriate retention policies.
      4. Deploy OSINT collection infrastructure for continuous monitoring
         of publicly available threat information.
    tools:
      - threat-intelligence-platform
      - stix-taxii
      - ioc-enrichment
      - osint-tools
      - data-lake
  devsecops:
    prose: |
      1. Integrate threat intelligence feeds into CI/CD pipeline security
         checks, blocking known malicious dependencies and indicators.
      2. Automate vulnerability intelligence correlation with deployed
         software inventories (SBOM matching against threat feeds).
      3. Implement threat-informed defense in development practices,
         using ATT&CK framework to guide security testing priorities.
      4. Maintain automated threat data processing pipelines for rapid
         operationalization of new intelligence.
    tools:
      - threat-feed-integration
      - sbom-vulnerability-matching
      - mitre-attack-mapping
      - automated-intelligence-pipeline
  secops:
    prose: |
      1. Establish a dedicated cyber threat intelligence (CTI) team or
         function within the security operations organization.
      2. Implement structured analytical techniques for producing
         intelligence assessments (ACH, diamond model, kill chain analysis).
      3. Develop and maintain adversary profiles for priority threat actors
         targeting the defense sector.
      4. Establish intelligence sharing agreements with allied nations'
         military CTI units and national-level entities (CTIR Gov, ABIN).
    tools:
      - cti-analysis-tools
      - adversary-profiling
      - intelligence-sharing
      - kill-chain-analysis
legal_references:
