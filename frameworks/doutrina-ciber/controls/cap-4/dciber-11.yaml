id: dciber-11
family: cap-4
title: "Cyber Situational Awareness and Information Sharing"
class: DOUTRINA-CIBER
baselines: [forcas-armadas]
statement:
  prose: |
    A Consciência Situacional Cibernética é o entendimento contínuo e atualizado do
    ambiente cibernético, incluindo o estado dos próprios sistemas, as ameaças
    existentes e potenciais, e as capacidades adversárias. A doutrina estabelece que
    a consciência situacional cibernética deve ser mantida em todos os níveis de
    atuação (estratégico, operacional e tático) e compartilhada entre os órgãos de
    defesa cibernética por meio de mecanismos seguros de troca de informações. O
    compartilhamento de informações sobre ameaças, vulnerabilidades e incidentes
    cibernéticos entre as Forças Armadas, entre o setor militar e o setor civil, e
    com aliados internacionais é essencial para a eficácia da defesa cibernética
    nacional. O compartilhamento deve observar os princípios de necessidade de
    conhecer e de proteção de fontes e métodos de Inteligência.
guidance:
  prose: |
    Cyber situational awareness (CSA) and information sharing are enablers of
    effective cyber defense. The doctrine emphasizes:

    - **Continuous monitoring**: Real-time understanding of the cyber environment.
    - **Multi-level awareness**: Strategic, operational, and tactical views of the
      same cyber reality, with appropriate detail and classification.
    - **Need-to-know**: Information shared based on operational necessity while
      protecting sources and methods.
    - **Civil-military sharing**: Coordination with civilian agencies for national
      cyber situational awareness.
    - **International cooperation**: Sharing with allied nations under established
      agreements and protocols.
    - **Timeliness**: CSA value degrades rapidly; sharing mechanisms must be fast.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Deploy a cyber common operational picture (COP) platform aggregating
         data from all defense cyber sensors and intelligence sources.
      2. Implement real-time dashboards at strategic, operational, and tactical
         levels with appropriate data filtering and classification.
      3. Deploy automated information sharing infrastructure (STIX/TAXII servers)
         enabling machine-speed intelligence exchange.
      4. Implement data diode technology or cross-domain solutions for secure
         information flow between classification levels.
    tools:
      - cyber-cop-platform
      - real-time-dashboards
      - stix-taxii-server
      - cross-domain-solutions
      - data-diodes
  devsecops:
    prose: |
      1. Integrate telemetry from development and deployment pipelines into
         the cyber situational awareness platform.
      2. Automate the generation and sharing of vulnerability and exposure
         data from CI/CD systems to operational awareness platforms.
      3. Implement standardized logging formats across all systems to enable
         correlation and aggregation at the COP level.
      4. Deploy automated alert correlation linking development-time
         vulnerabilities with production-time threat indicators.
    tools:
      - telemetry-integration
      - standardized-logging
      - alert-correlation
      - vulnerability-reporting
  secops:
    prose: |
      1. Establish 24/7 cyber watch capabilities maintaining continuous
         situational awareness across the defense cyber domain.
      2. Implement structured information sharing protocols with CTIR Gov,
         CERT.br, and allied military CSIRTs.
      3. Develop and maintain a cyber threat landscape assessment updated
         periodically and disseminated to all defense stakeholders.
      4. Conduct regular information sharing exercises to validate channels
         and procedures for rapid dissemination during crises.
    tools:
      - cyber-watch
      - information-sharing-protocols
      - threat-landscape-assessment
      - sharing-exercises
