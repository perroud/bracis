id: dciber-12
family: cap-5
title: "Military Network Defense and Access Control"
class: DOUTRINA-CIBER
baselines: [forcas-armadas]
statement:
  prose: |
    A proteção das redes militares constitui atividade permanente e prioritária da
    defesa cibernética. Os sistemas de tecnologia da informação e comunicações (TIC)
    das Forças Armadas devem ser protegidos por meio de controles de segurança em
    camadas, incluindo: controle de acesso baseado em identidade e função (necessidade
    de conhecer); autenticação multifator para acesso a sistemas classificados;
    segmentação de redes com zonas de segurança definidas por nível de classificação;
    monitoramento contínuo do tráfego de rede; filtragem de conteúdo e prevenção de
    perda de dados (DLP); e gestão centralizada de identidades e credenciais.
    O acesso a redes e sistemas militares deve ser concedido segundo o princípio do
    menor privilégio e revogado imediatamente quando não mais necessário.
guidance:
  prose: |
    Military network defense is the continuous baseline activity of cyber defense.
    This control mandates:

    - **Identity-based access**: Role-based access control (RBAC) enforcing
      need-to-know at all levels.
    - **Multi-factor authentication (MFA)**: Required for all classified systems.
    - **Network segmentation**: Security zones aligned with classification levels
      (unclassified, restricted, confidential, secret, top secret).
    - **Continuous monitoring**: Real-time network traffic analysis and anomaly
      detection.
    - **Data loss prevention**: Controls preventing unauthorized data exfiltration.
    - **Least privilege**: Minimum necessary access, promptly revoked.
    - **Centralized identity management**: Single authoritative source for
      credentials across military networks.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement zero-trust network architecture with micro-segmentation
         enforcing security boundaries at the workload level.
      2. Deploy centralized identity provider (IdP) with multi-factor
         authentication for all military system access.
      3. Implement privileged access management (PAM) with session recording,
         just-in-time access, and automatic credential rotation.
      4. Deploy network access control (NAC) ensuring only authorized and
         compliant devices connect to military networks.
      5. Implement data loss prevention (DLP) controls at network egress
         points and on endpoints handling classified information.
    tools:
      - zero-trust-architecture
      - identity-provider
      - mfa
      - pam
      - nac
      - dlp
      - micro-segmentation
  devsecops:
    prose: |
      1. Enforce multi-factor authentication for all code repository access
         and CI/CD pipeline operations.
      2. Implement signed commits and artifact verification in all
         pipelines handling classified or military code.
      3. Deploy secret scanning in all repositories to prevent credential
         leakage into version control systems.
      4. Implement network-level controls in CI/CD environments preventing
         unauthorized data flows between classification levels.
    tools:
      - mfa-enforcement
      - commit-signing
      - secret-detection
      - network-policy
      - artifact-signing
  secops:
    prose: |
      1. Implement continuous identity and access monitoring with automated
         alerts for anomalous access patterns.
      2. Conduct regular access reviews and recertification campaigns for
         all military system accounts, revoking unnecessary privileges.
      3. Deploy user and entity behavior analytics (UEBA) to detect
         insider threats and compromised credentials.
      4. Maintain an access control audit trail with tamper-proof logging
         for all authentication and authorization events.
    tools:
      - ueba
      - access-review
      - audit-logging
      - identity-monitoring
      - access-governance
