id: dciber-14
family: cap-5
title: "Continuous Monitoring and Threat Detection in Military Systems"
class: DOUTRINA-CIBER
baselines: [forcas-armadas]
statement:
  prose: |
    O monitoramento contínuo dos sistemas de informação e redes de comunicações das
    Forças Armadas é atividade obrigatória e permanente da defesa cibernética. O
    monitoramento abrange: a coleta e análise de logs de segurança; a detecção de
    intrusões em rede e em host; a análise de comportamento de usuários e entidades
    (UEBA); a correlação de eventos de segurança por meio de plataformas SIEM; e a
    detecção de anomalias no tráfego de rede. Os sistemas de monitoramento devem
    operar de forma ininterrupta (24 horas por dia, 7 dias por semana) e gerar alertas
    automatizados para os centros de operações de segurança cibernética. Os registros
    de segurança (logs) devem ser armazenados de forma íntegra, protegidos contra
    adulteração e retidos pelo período mínimo definido pela legislação aplicável e
    pelas normas internas das Forças Armadas.
guidance:
  prose: |
    Continuous monitoring is the foundation of defensive cyber operations. This
    control mandates:

    - **24/7 operation**: Monitoring never stops; it is a permanent activity.
    - **Security log collection**: Comprehensive logging from all systems and
      network devices.
    - **Intrusion detection**: Network-based (NIDS) and host-based (HIDS)
      detection systems.
    - **UEBA**: User and entity behavior analytics for insider threat detection.
    - **SIEM correlation**: Centralized event correlation and analysis.
    - **Network anomaly detection**: Baseline-aware traffic analysis.
    - **Log integrity**: Tamper-proof storage with defined retention periods.
    - **Automated alerting**: Real-time notifications to SOCs.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Deploy a centralized SIEM platform ingesting logs from all military
         systems, network devices, and security tools.
      2. Implement network detection and response (NDR) sensors at strategic
         network points for deep packet inspection and anomaly detection.
      3. Deploy endpoint detection and response (EDR) agents on all
         endpoints within military networks.
      4. Implement write-once, tamper-evident log storage with cryptographic
         integrity verification.
      5. Establish a centralized log retention infrastructure meeting
         military retention requirements (minimum 5 years for classified systems).
    tools:
      - siem
      - ndr
      - edr
      - tamper-evident-logging
      - log-retention
  devsecops:
    prose: |
      1. Integrate application-level security logging into all military
         software, generating structured security events.
      2. Implement runtime application self-protection (RASP) for critical
         military applications providing real-time attack detection.
      3. Deploy audit logging in all CI/CD pipelines capturing who changed
         what, when, and why for all code and configuration modifications.
      4. Automate the generation of monitoring dashboards from pipeline
         metadata and deployment telemetry.
    tools:
      - structured-logging
      - rasp
      - pipeline-audit-logging
      - monitoring-dashboards
  secops:
    prose: |
      1. Operate SOC with 24/7 staffing and defined detection and response
         procedures for all alert categories.
      2. Implement automated triage and enrichment of security alerts using
         SOAR platforms to reduce analyst fatigue.
      3. Maintain and continuously tune detection rules, correlations, and
         UEBA baselines to reduce false positives and detect emerging threats.
      4. Conduct regular purple team exercises to validate detection
         coverage against the MITRE ATT&CK framework.
    tools:
      - soc-operations
      - soar
      - ueba
      - purple-team
      - mitre-attack
