id: dciber-13
family: cap-5
title: "Network Segmentation and Classified Information Systems"
class: DOUTRINA-CIBER
baselines: [forcas-armadas]
statement:
  prose: |
    Os sistemas de informação das Forças Armadas devem ser classificados e segmentados
    de acordo com o grau de sigilo das informações que processam, armazenam e
    transmitem, conforme a legislação de proteção da informação classificada. As redes
    militares devem ser organizadas em segmentos distintos: redes administrativas,
    redes operacionais e redes de comando e controle, cada uma com controles de
    segurança proporcionais ao nível de classificação. A interconexão entre segmentos
    de diferentes níveis de classificação é permitida apenas por meio de soluções de
    domínio cruzado (cross-domain solutions) homologadas, que garantam a proteção
    contra fluxo não autorizado de informações. A criptografia de grau militar é
    obrigatória para a proteção de informações classificadas em trânsito e em repouso.
guidance:
  prose: |
    Network segmentation in the military context is driven by information
    classification levels:

    - **Administrative networks**: General-purpose IT, unclassified or restricted.
    - **Operational networks**: Mission-related systems, typically confidential
      or above.
    - **Command and control (C2) networks**: Most sensitive, often secret or
      top secret, requiring maximum protection.

    Key requirements:
    - Cross-domain solutions (CDS) are the only authorized interconnection method
      between different classification levels.
    - Military-grade encryption is mandatory for classified data in transit and
      at rest.
    - Physical and logical separation must be enforced.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement physical and logical network segmentation aligned with
         information classification levels (administrative, operational, C2).
      2. Deploy certified cross-domain solutions for any authorized data
         flow between classification levels.
      3. Implement military-grade encryption (ICP-Brasil, Suite B equivalent)
         for all classified data in transit and at rest.
      4. Deploy hardware security modules (HSMs) for cryptographic key
         management in classified environments.
      5. Implement network monitoring and anomaly detection independently
         within each classification segment.
    tools:
      - network-segmentation
      - cross-domain-solutions
      - military-encryption
      - hsm
      - segment-monitoring
  devsecops:
    prose: |
      1. Maintain separate development environments and pipelines for
         each classification level, with no cross-contamination.
      2. Implement automated classification label checking in pipelines
         to prevent deployment of misclassified artifacts.
      3. Enforce encryption requirements in build and deployment processes
         for all classified software artifacts.
      4. Deploy air-gapped CI/CD systems for secret and top-secret
         classified development environments.
    tools:
      - classification-labeling
      - encrypted-pipelines
      - air-gapped-ci
      - artifact-classification
  secops:
    prose: |
      1. Conduct regular network segmentation audits verifying no
         unauthorized cross-domain connectivity exists.
      2. Monitor cross-domain solution logs for anomalous data transfers
         and policy violations.
      3. Implement data classification enforcement with automated detection
         of misclassified information on networks.
      4. Conduct penetration testing specifically targeting segmentation
         boundaries to validate isolation effectiveness.
    tools:
      - segmentation-audit
      - cds-monitoring
      - data-classification-enforcement
      - boundary-penetration-testing
legal_references:
  - framework_id: pnsi
    articles: ["art-3", "art-4"]
    relationship: complements
  - framework_id: pnsic
    articles: ["art-3"]
    relationship: complements
