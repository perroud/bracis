    title: "Cyber Defense Framework and Doctrine"
    description: "Foundational concepts, definitions, and principles of military cyber defense doctrine, including cyberspace as an operational domain."
    control_count: 3
  - id: cap-2
    title: "Cyber Operations"
    description: "Defensive cyber operations (DCO), offensive cyber operations (OCO), and cyber exploitation (CE) within the military context."
    control_count: 3
  - id: cap-3
    title: "Command and Control Structure"
    description: "Command structure for cyber defense, including ComDCiber, CTIR.Mil, Forças Singulares, and the chain of command."
    control_count: 3
  - id: cap-4
    title: "Cyber Threat Intelligence"
    description: "Cyber threat assessment, intelligence cycle, threat landscape analysis, and information sharing."
    control_count: 2
  - id: cap-5
    title: "Protection of Military Networks"
    description: "Network defense, access control, segmentation, monitoring, and protection of military information systems."
    control_count: 3
  - id: cap-6
    title: "Incident Response and Crisis Management"
    description: "Military CSIRT procedures, escalation protocols, coordination with civilian CSIRTs, and crisis management."
    control_count: 2
  - id: cap-7
    title: "Critical Infrastructure Protection"
    description: "Protection of strategic military and dual-use infrastructure against cyber threats."
    control_count: 2
  - id: cap-8
    title: "Training and Cyber Exercises"
    description: "Cyber exercises, capacity building, simulation, and workforce development for cyber defense."
    control_count: 2
related_frameworks:
  - framework_id: pnsi
    relationship: complements
    description: "The National Information Security Policy (Decree 9.637/2018) complements the cyber defense doctrine by establishing the national information security framework."
  - framework_id: pnciber
    relationship: complements
    description: "The National Cybersecurity Policy (Decree 11.856/2023) complements the military doctrine by defining civilian cybersecurity governance and articulation with defense."
  - framework_id: regic
    relationship: complements
    description: "ReGIC (Decree 10.748/2021) complements the doctrine by establishing the federal cyber incident management network, articulating civilian and military capabilities."
  - framework_id: pnsic
    relationship: complements
    description: "The National Critical Infrastructure Security Policy complements the cyber defense doctrine in the protection of strategic national assets."
