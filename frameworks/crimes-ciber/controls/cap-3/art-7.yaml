id: art-7
family: cap-3
title: "Aggravated Penalties for Vulnerable Victims"
class: CRIMES-CIBER
baselines: [all-sectors]
statement:
  prose: |
    Art. 171, § 2.º-A [...]

    § 4.º A pena aumenta-se de 1/3 (um terço) a 2/3 (dois terços), se o
    crime é praticado mediante a utilização de servidor mantido fora do
    território nacional.

    § 4.º-A [Vetado]

    § 4.º-B. A pena prevista no § 2.º-A deste artigo, considerada a
    relevância do resultado gravoso:

    I — aumenta-se de 1/3 (um terço) a 2/3 (dois terços), se o crime é
    praticado mediante a utilização de servidor mantido fora do território
    nacional;

    II — é aumentada de 1/3 (um terço) ao dobro, se o crime é praticado
    contra idoso ou vulnerável, considerada a relevância do resultado
    gravoso.

    (Incluído pela Lei n.º 14.155, de 2021)
guidance:
  prose: |
    Paragraphs 4 and 4-B of art. 171, introduced by Lei 14.155/2021,
    establish significant penalty increases for electronic fraud based
    on two aggravating factors.

    **Paragraph 4-B, I — Foreign server usage:**
    When electronic fraud (paragraph 2-A) is committed using servers
    maintained outside Brazilian territory, the penalty increases by
    1/3 to 2/3. This targets:
    - Fraud operations hosted on offshore infrastructure
    - Use of VPNs/proxies to route attacks through foreign servers
    - Command-and-control infrastructure in other jurisdictions
    - Phishing sites hosted outside Brazil

    Applied to paragraph 2-A base (4-8 years), effective penalties
    range from 5 years 4 months to 13 years 4 months.

    **Paragraph 4-B, II — Elderly or vulnerable victims:**
    When the victim is elderly (60+ years) or vulnerable, the penalty
    increases by 1/3 to double. This reflects the heightened
    susceptibility of these populations to social engineering.
    Applied to paragraph 2-A base (4-8 years), effective penalties
    range from 5 years 4 months to 16 years.

    **Cumulative application:**
    Both increases can apply simultaneously (foreign server + elderly
    victim), resulting in the most severe penalties under the
    cybercrime provisions.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infrastructure sovereignty and vulnerable user protection:**
      1. Maintain infrastructure within Brazilian territory (or documented
         jurisdictions) to avoid facilitating the foreign server
         aggravating factor for any fraud that exploits organizational
         systems.
      2. Implement geolocation-based access controls and monitoring to
         detect when organizational infrastructure is being used from
         or routed through foreign servers.
      3. Deploy enhanced fraud protection for services used by elderly
         populations, including simplified security interfaces and
         additional verification steps for high-risk transactions.
      4. Implement IP geolocation and server location logging for all
         customer-facing services to support forensic determination of
         server location in fraud investigations.
    tools:
      - geolocation-service
      - infrastructure-sovereignty
      - fraud-protection
      - access-monitoring
  devsecops:
    prose: |
      **Vulnerable population protection in application design:**
      1. Implement accessibility-first security controls for applications
         serving elderly users, including clear fraud warnings and
         simplified verification flows.
      2. Build transaction cooling periods and out-of-band confirmation
         for high-value operations initiated by accounts flagged as
         belonging to elderly or vulnerable users.
      3. Implement user segmentation in fraud detection models that
         applies heightened scrutiny to transactions involving
         vulnerable user accounts.
      4. Include elderly and vulnerable user attack scenarios in
         security testing and penetration testing programs.
    tools:
      - accessibility-security
      - transaction-cooling
      - user-segmentation
      - security-testing
  secops:
    prose: |
      **Aggravated fraud monitoring and investigation support:**
      1. Implement enhanced monitoring for fraud patterns targeting
         elderly users (common vectors: fake bank calls, WhatsApp
         impersonation, fake government benefit sites).
      2. Monitor for organizational infrastructure being used as relay
         or hosting for fraud operations originating from foreign servers.
      3. Maintain server location documentation and network traffic logs
         to support determination of foreign server involvement in
         fraud investigations.
      4. Establish specialized incident response procedures for fraud
         affecting elderly victims, including expedited law enforcement
         notification and victim support coordination.
      5. Coordinate with international CERTs when fraud campaigns using
         foreign infrastructure target Brazilian victims.
    tools:
      - fraud-analytics
      - network-forensics
      - international-cert-coordination
      - victim-support
