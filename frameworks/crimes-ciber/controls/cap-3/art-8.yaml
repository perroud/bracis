id: art-8
family: cap-3
title: "Jurisdiction Rules for Electronic Fraud"
class: CRIMES-CIBER
baselines: [all-sectors]
statement:
  prose: |
    Art. 70, § 4.º Nos crimes previstos no art. 171 do Decreto-Lei n.º 2.848,
    de 7 de dezembro de 1940 (Código Penal), quando praticados mediante
    depósito, mediante emissão de cheques sem suficiente provisão de fundos
    em poder do sacado ou com o pagamento frustrado ou mediante transferência
    de valores, a competência será definida pelo local do domicílio da vítima,
    e, em caso de pluralidade de vítimas, a competência firmar-se-á pela
    prevenção.

    (Incluído pela Lei n.º 14.155, de 2021)
guidance:
  prose: |
    Lei 14.155/2021 amended art. 70 of the Codigo de Processo Penal (Code
    of Criminal Procedure) to establish a victim-centric jurisdiction rule
    for electronic fraud cases.

    **Previous rule (problematic):**
    Jurisdiction was determined by the location where the crime was committed,
    which in electronic fraud cases meant the location of the fraudster or
    the bank branch where funds were deposited. This forced victims to
    travel to distant jurisdictions to file and follow criminal proceedings.

    **New rule (paragraph 4):**
    For fraud involving deposits, checks, or fund transfers, jurisdiction
    is determined by the victim's domicile. When there are multiple victims,
    jurisdiction is established by prevention (first court to take action).

    **Practical impact:**
    - Victims can file criminal complaints at their local police station
    - Criminal proceedings occur in the victim's jurisdiction
    - Eliminates the barrier of geographic distance for prosecution
    - Particularly beneficial for elderly victims who cannot travel
    - Simplifies investigation by centralizing at victim location

    **For organizations:**
    - Corporate victims file at their registered headquarters jurisdiction
    - Multi-victim fraud follows the prevention rule (first court)
    - Evidence preservation must consider this jurisdiction rule
implementation_guidance:
  platform_engineering:
    prose: |
      **Jurisdiction-aware logging and evidence infrastructure:**
      1. Implement logging infrastructure that captures victim-side
         geolocation data (IP address, access location) to support
         jurisdiction determination under paragraph 4.
      2. Maintain centralized log management with immutable audit trails
         that can be produced for any Brazilian jurisdiction where
         victims are located.
      3. Implement evidence export capabilities that comply with
         Brazilian procedural requirements, including chain-of-custody
         documentation.
      4. Deploy log correlation across systems to reconstruct complete
         fraud transaction chains from victim interaction to fund movement.
    tools:
      - centralized-logging
      - evidence-management
      - geolocation-logging
      - audit-trail
  devsecops:
    prose: |
      **Forensic-ready development practices:**
      1. Implement comprehensive transaction logging in all financial
         applications, capturing sufficient detail to support criminal
         investigation across multiple jurisdictions.
      2. Build evidence preservation hooks into fraud detection workflows
         that automatically capture and protect relevant logs when
         suspected fraud is detected.
      3. Ensure log formats and retention meet requirements for
         admissibility as digital evidence in Brazilian criminal courts.
      4. Implement automated evidence packaging that organizes logs
         by victim to support the victim-domicile jurisdiction rule.
    tools:
      - transaction-logging
      - evidence-automation
      - log-compliance
      - forensic-readiness
  secops:
    prose: |
      **Jurisdiction-aware incident response:**
      1. Establish incident response procedures that account for
         victim-domicile jurisdiction, including templates for filing
         criminal complaints (boletim de ocorrencia) in the correct
         jurisdiction.
      2. Maintain relationships with law enforcement in multiple
         jurisdictions to facilitate rapid criminal complaint filing
         under the victim-domicile rule.
      3. Implement victim notification procedures that include guidance
         on filing criminal complaints at their local delegacia.
      4. Coordinate multi-victim fraud investigations considering the
         prevention rule (first court) for jurisdiction determination.
      5. Document all fraud events with victim domicile information
         to support correct jurisdiction assignment.
    tools:
      - incident-response
      - law-enforcement-liaison
      - victim-notification
      - case-management
