id: art-6
family: cap-3
title: "Qualified Electronic Fraud"
class: CRIMES-CIBER
baselines: [all-sectors]
statement:
  prose: |
    Art. 171. Obter, para si ou para outrem, vantagem ilícita, em prejuízo
    alheio, induzindo ou mantendo alguém em erro, mediante artifício, ardil,
    ou qualquer outro meio fraudulento:

    Pena — reclusão, de 1 (um) a 5 (cinco) anos, e multa.

    § 2.º-A. A pena é de reclusão, de 4 (quatro) a 8 (oito) anos, e multa,
    se a fraude é cometida com a utilização de informações fornecidas pela
    vítima ou por terceiro induzido a erro por meio de redes sociais,
    contatos telefônicos ou envio de correio eletrônico fraudulento, ou por
    qualquer outro meio fraudulento análogo.

    (Incluído pela Lei n.º 14.155, de 2021)
guidance:
  prose: |
    Lei 14.155/2021 introduced paragraph 2-A to art. 171 of the Codigo Penal,
    creating a qualified form of fraud specifically targeting electronic and
    social engineering-based fraud schemes.

    **The qualified electronic fraud requires:**
    1. The general elements of fraud (art. 171 caput): obtaining illicit
       advantage, causing harm, through deception
    2. PLUS: use of information provided by the victim or third party
    3. WHO was induced to error through:
       - Social media (redes sociais)
       - Fraudulent phone contacts
       - Fraudulent emails (phishing)
       - Any analogous fraudulent means

    **Penalty escalation:**
    - Base fraud (art. 171 caput): 1-5 years
    - Qualified electronic fraud (paragraph 2-A): 4-8 years
    - This represents a 3x increase in minimum penalty

    **Practical coverage:**
    - Phishing campaigns (email, SMS, WhatsApp)
    - Vishing (voice phishing via phone)
    - Social media impersonation and fraud
    - Business email compromise (BEC)
    - Romance scams conducted online
    - Fake e-commerce sites
    - Investment fraud via digital platforms
implementation_guidance:
  platform_engineering:
    prose: |
      **Anti-phishing and anti-fraud infrastructure:**
      1. Implement email authentication protocols (SPF, DKIM, DMARC) with
         enforcement policy to prevent domain spoofing used in phishing.
      2. Deploy anti-phishing gateways with URL rewriting and sandbox
         analysis for all inbound email and messaging systems.
      3. Implement brand protection monitoring to detect fraudulent use
         of organizational identity on social media, fake websites, and
         phishing campaigns.
      4. Deploy web application firewalls (WAF) with bot detection to
         prevent credential stuffing and automated fraud attacks.
      5. Implement customer-facing authentication mechanisms (MFA, device
         fingerprinting) to reduce effectiveness of stolen credentials
         obtained through social engineering.
    tools:
      - email-security
      - anti-phishing
      - brand-protection
      - waf
  devsecops:
    prose: |
      **Fraud-resistant application development:**
      1. Implement secure authentication flows resistant to social
         engineering attacks (WebAuthn/FIDO2, adaptive MFA).
      2. Build transaction verification mechanisms (out-of-band
         confirmation, cooling periods) for high-value operations.
      3. Implement anti-automation controls (CAPTCHA, rate limiting,
         behavioral analysis) to prevent scaled fraud operations.
      4. Include social engineering attack scenarios in threat modeling
         for all customer-facing applications.
      5. Deploy client-side integrity checks to detect modified or
         fraudulent versions of organizational applications.
    tools:
      - webauthn
      - transaction-verification
      - anti-automation
      - threat-modeling
  secops:
    prose: |
      **Electronic fraud detection and response:**
      1. Deploy phishing detection and response capabilities including
         employee reporting mechanisms and automated takedown procedures.
      2. Implement transaction fraud monitoring with real-time scoring
         to detect social engineering-based fraud patterns.
      3. Monitor for organizational brand abuse on social media, messaging
         platforms, and fraudulent websites used for phishing.
      4. Establish rapid response procedures for phishing campaigns
         including domain takedown, ISP notification, and law enforcement
         reporting under art. 171 paragraph 2-A.
      5. Maintain threat intelligence on active social engineering
         campaigns targeting the organization and its customers.
    tools:
      - phishing-detection
      - fraud-monitoring
      - brand-monitoring
      - takedown-service
