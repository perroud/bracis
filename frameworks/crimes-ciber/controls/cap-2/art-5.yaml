id: art-5
family: cap-2
title: "Falsification of Electronic Documents and Payment Cards"
class: CRIMES-CIBER
baselines: [all-sectors]
statement:
  prose: |
    Art. 298. Falsificar, no todo ou em parte, documento particular ou
    alterar documento particular verdadeiro:

    Pena — reclusão, de 1 (um) a 5 (cinco) anos, e multa.

    Parágrafo único. Para fins do disposto no caput, equiparam-se a
    documento particular o cartão de crédito ou débito.

    (Incluído pela Lei n.º 12.737, de 2012)
guidance:
  prose: |
    Art. 298 of the Codigo Penal was amended by Lei 12.737/2012 to explicitly
    equate credit and debit cards to private documents for purposes of the
    falsification crime.

    **Sole paragraph — payment card equivalence:**
    This amendment closed a legal gap by establishing that credit and debit
    cards are legally equivalent to private documents. Before this amendment,
    card cloning and skimming were prosecuted under less specific provisions.

    **Scope of the offense:**
    - Physical card cloning (skimming)
    - Production of counterfeit payment cards
    - Alteration of genuine card data (magnetic stripe, chip)
    - Digital card data falsification (card-not-present fraud infrastructure)
    - Creation of virtual cards with stolen data

    **Relationship with electronic fraud (art. 171):**
    Art. 298 covers the falsification of the instrument (card/document),
    while art. 171 covers the use of that instrument to commit fraud.
    Both crimes can be charged concurrently.

    **Penalties:**
    1-5 years imprisonment plus fine. The severity reflects that payment
    card fraud is a gateway to large-scale financial crime.
implementation_guidance:
  platform_engineering:
    prose: |
      **Payment card data protection infrastructure:**
      1. Implement PCI DSS-compliant infrastructure for all systems that
         process, store, or transmit payment card data.
      2. Deploy tokenization for payment card data to minimize exposure
         of actual card numbers across systems.
      3. Implement hardware security modules (HSM) for cryptographic
         operations involving payment card processing.
      4. Enforce network segmentation isolating cardholder data
         environments (CDE) from general corporate networks.
      5. Deploy file integrity monitoring (FIM) on all systems in the
         cardholder data environment to detect tampering.
    tools:
      - pci-compliance
      - tokenization
      - hsm
      - network-segmentation
  devsecops:
    prose: |
      **Secure payment processing development:**
      1. Implement automated PCI DSS compliance scanning in CI/CD
         pipelines for applications handling payment card data.
      2. Enforce code review requirements for all changes to payment
         processing logic to prevent introduction of skimming code.
      3. Scan for unauthorized payment data collection scripts (web
         skimmers, Magecart-style attacks) in frontend code.
      4. Implement static analysis rules detecting hardcoded card
         numbers, test card data in production, or insecure payment
         data handling patterns.
    tools:
      - pci-scanning
      - web-skimmer-detection
      - sast
      - code-review
  secops:
    prose: |
      **Payment fraud detection and prevention:**
      1. Deploy fraud detection systems monitoring for anomalous
         payment card usage patterns indicating cloned or falsified cards.
      2. Implement real-time transaction monitoring with machine learning
         models trained on fraud patterns.
      3. Monitor for web skimming attacks (Magecart) on e-commerce
         platforms that inject card-stealing code.
      4. Establish incident response procedures for payment card
         compromise events, including PCI DSS breach notification
         requirements and law enforcement reporting under art. 298.
      5. Maintain threat intelligence on card fraud networks and
         emerging falsification techniques.
    tools:
      - fraud-detection
      - transaction-monitoring
      - web-skimmer-detection
      - threat-intelligence
