id: art-4
family: cap-2
title: "Disruption of Public Utility IT Services"
class: CRIMES-CIBER
baselines: [all-sectors]
statement:
  prose: |
    Art. 266. Interromper ou perturbar serviço telegráfico, radiotelegráfico
    ou telefônico, impedir ou dificultar-lhe o restabelecimento:

    Pena — detenção, de 1 (um) a 3 (três) anos, e multa.

    § 1.º Incorre na mesma pena quem interrompe serviço telemático ou de
    informação de utilidade pública, ou impede ou dificulta-lhe o
    restabelecimento.

    § 2.º Aplicam-se as penas em dobro se o crime é cometido por ocasião
    de calamidade pública.

    (Redação dada pela Lei n.º 12.737, de 2012)
guidance:
  prose: |
    Art. 266 of the Codigo Penal was amended by Lei 12.737/2012 to extend
    the existing crime of disrupting telegraph/telephone services to include
    telematics services and public utility information services.

    **Paragraph 1 — telematics and public utility services:**
    This extension is critical for modern cybercrime because it criminalizes
    denial-of-service attacks (DoS/DDoS) against:
    - Internet services and platforms
    - Government digital services (e-Gov)
    - Public utility information systems (water, electricity, gas portals)
    - Emergency communication systems
    - Public health information systems

    **Paragraph 2 — calamity multiplier:**
    Penalties are doubled when committed during a public calamity (e.g.,
    pandemic, natural disaster). This was notably relevant during COVID-19
    when attacks against health system platforms occurred.

    **Practical scope:**
    - DDoS attacks against any public utility service
    - Ransomware that disrupts essential services
    - Sabotage of IT infrastructure supporting public services
    - Impeding recovery/restoration of disrupted services
implementation_guidance:
  platform_engineering:
    prose: |
      **Service availability and DDoS protection:**
      1. Implement DDoS mitigation at network edge (CDN, WAF, scrubbing
         centers) for all public-facing services, especially those
         qualifying as public utility or telematics services.
      2. Deploy redundant infrastructure with automated failover to
         minimize service disruption from attacks or sabotage.
      3. Implement rate limiting, traffic shaping, and anomaly detection
         to identify and mitigate service disruption attempts.
      4. Maintain disaster recovery plans with documented RTO/RPO for
         all services that qualify as public utility under art. 266.
      5. Implement infrastructure monitoring with automated alerting
         for service degradation or interruption events.
    tools:
      - ddos-mitigation
      - cdn-waf
      - disaster-recovery
      - infrastructure-monitoring
  devsecops:
    prose: |
      **Resilience and availability in SDLC:**
      1. Implement chaos engineering practices to test service resilience
         against disruption scenarios before production deployment.
      2. Include availability testing (load testing, stress testing) in
         CI/CD pipelines for services classified as public utility.
      3. Enforce infrastructure-as-code practices that guarantee redundancy
         and failover configurations are version-controlled and auditable.
      4. Implement rollback mechanisms in deployment pipelines to enable
         rapid service restoration when disruption occurs.
    tools:
      - chaos-engineering
      - load-testing
      - infrastructure-as-code
      - rollback-automation
  secops:
    prose: |
      **Service disruption detection and response:**
      1. Implement 24x7 monitoring for service availability with automated
         escalation when disruption is detected for public utility services.
      2. Deploy network traffic analysis to detect DDoS attacks, volumetric
         attacks, and application-layer disruption attempts.
      3. Maintain incident response playbooks specific to service disruption
         events, including procedures for evidence preservation and law
         enforcement notification under art. 266.
      4. Establish communication procedures with CERT.br and law enforcement
         for reporting service disruption attacks.
      5. Document all service disruption events with impact assessment,
         duration, and recovery timeline for potential criminal proceedings.
    tools:
      - soc-platform
      - network-traffic-analysis
      - ddos-detection
      - incident-response
