id: art-2
family: cap-1
title: "Qualified Forms — Data Theft and Remote Control"
class: CRIMES-CIBER
baselines: [all-sectors]
statement:
  prose: |
    Art. 154-A, § 3.º Se da invasão resultar a obtenção de conteúdo de
    comunicações eletrônicas privadas, segredos comerciais ou industriais,
    informações sigilosas, assim definidas em lei, ou o controle remoto não
    autorizado do dispositivo invadido:

    Pena — reclusão, de 2 (dois) a 5 (cinco) anos, e multa.

    (Redação dada pela Lei n.º 14.155, de 2021)
guidance:
  prose: |
    Paragraph 3 of art. 154-A establishes qualified (aggravated) forms of
    the device invasion crime when the invasion results in specific harmful
    outcomes. The 2021 amendment increased these penalties from 6 months-2 years
    to 2-5 years of imprisonment.

    **Qualifying circumstances:**
    1. Obtaining private electronic communications content (emails, messages,
       VoIP calls)
    2. Obtaining trade secrets or industrial secrets
    3. Obtaining classified information as defined by law (Lei 12.527/2011 —
       Lei de Acesso a Informacao)
    4. Unauthorized remote control of the invaded device

    **Distinction from base offense:**
    The base offense (caput) requires only the invasion with intent. The
    qualified form requires that the invasion actually results in one of
    the listed outcomes. The penalty increase (2-5 years vs. 1-4 years)
    reflects the greater harm caused.

    **Impact on organizations:**
    - Theft of trade secrets via unauthorized system access carries
      severe criminal penalties
    - Remote access trojan (RAT) deployment constitutes the qualified
      form regardless of what data is actually accessed
    - Email interception through unauthorized access is specifically
      covered
implementation_guidance:
  platform_engineering:
    prose: |
      **Data classification and protection:**
      1. Implement data classification system that identifies and labels
         trade secrets, confidential communications, and legally classified
         information across all storage systems.
      2. Deploy Data Loss Prevention (DLP) controls to detect and prevent
         exfiltration of classified data categories listed in paragraph 3.
      3. Implement end-to-end encryption for all electronic communications
         (email, messaging, VoIP) to protect against interception.
      4. Deploy remote access monitoring that detects unauthorized remote
         control sessions (RAT activity, unauthorized RDP/VNC/SSH).
      5. Implement database activity monitoring (DAM) for repositories
         containing trade secrets and confidential information.
    tools:
      - dlp-solution
      - encryption-platform
      - dam-solution
      - remote-access-monitoring
  devsecops:
    prose: |
      **Secrets and sensitive data protection in SDLC:**
      1. Implement automated scanning for trade secrets, API keys, and
         confidential data accidentally committed to source repositories.
      2. Enforce encryption-at-rest and encryption-in-transit for all
         development and staging environments containing production-like data.
      3. Implement data masking/tokenization in non-production environments
         to prevent exposure of trade secrets during development.
      4. Monitor CI/CD pipeline outputs for inadvertent disclosure of
         confidential information in build logs and artifacts.
    tools:
      - secret-scanning
      - data-masking
      - encryption-scanning
      - artifact-security
  secops:
    prose: |
      **Detection of qualified offense indicators:**
      1. Monitor for indicators of remote access trojan (RAT) deployment
         across all endpoints and servers — this directly constitutes
         the qualified form under paragraph 3.
      2. Implement email and communication system monitoring to detect
         unauthorized access to private electronic communications.
      3. Deploy user and entity behavior analytics (UEBA) to detect
         anomalous access to repositories containing trade secrets.
      4. Maintain chain-of-custody procedures for digital evidence when
         qualified device invasion is detected, as the higher penalties
         require stronger evidentiary standards.
      5. Establish escalation procedures to legal counsel when indicators
         of trade secret theft or communication interception are detected.
    tools:
      - edr-solution
      - ueba-platform
      - email-security
      - digital-forensics
