id: art-1
family: cap-1
title: "Unauthorized Invasion of Computing Devices"
class: CRIMES-CIBER
baselines: [all-sectors]
statement:
  prose: |
    Art. 154-A. Invadir dispositivo informático de uso alheio, conectado ou não
    à rede de computadores, com o fim de obter, adulterar ou destruir dados ou
    informações sem autorização expressa ou tácita do usuário do dispositivo, ou
    de instalar vulnerabilidades para obter vantagem ilícita:

    Pena — reclusão, de 1 (um) a 4 (quatro) anos, e multa.

    § 1.º Na mesma pena incorre quem produz, oferece, distribui, vende ou difunde
    dispositivo ou programa de computador com o intuito de permitir a prática da
    conduta definida no caput.

    (Redação dada pela Lei n.º 14.155, de 2021)
guidance:
  prose: |
    Art. 154-A of the Codigo Penal, introduced by Lei 12.737/2012 and amended by
    Lei 14.155/2021, defines the core cybercrime of unauthorized access to computing
    devices. The 2021 amendment significantly increased penalties from detention
    (3 months to 1 year) to imprisonment (1 to 4 years).

    **Key elements of the offense:**
    - Invasion of a computing device belonging to another person
    - Device may be connected or disconnected from a network
    - Purpose: obtain, alter, or destroy data/information
    - Without express or tacit authorization from the device user
    - Or: installing vulnerabilities to gain illicit advantage

    **Paragraph 1 — distribution of hacking tools:**
    The same penalty applies to anyone who produces, offers, distributes, sells,
    or disseminates devices or software designed to enable the conduct defined
    in the main article. This criminalizes the creation and distribution of
    malware, exploit kits, and hacking tools.

    **Practical implications for organizations:**
    - Unauthorized access to company systems by employees beyond their
      authorized scope may constitute this crime
    - Penetration testing without proper authorization contracts is criminal
    - Distribution of cracking tools or exploit code may be prosecuted
implementation_guidance:
  platform_engineering:
    prose: |
      **Access control and authorization enforcement:**
      1. Implement role-based access control (RBAC) with least-privilege
         principle across all computing infrastructure and services.
      2. Deploy centralized identity and access management (IAM) with
         multi-factor authentication (MFA) for all systems.
      3. Maintain automated inventory of all computing devices and their
         authorized users, with real-time access revocation capability.
      4. Implement network segmentation to limit lateral movement in case
         of unauthorized access to any single device or system.
      5. Deploy endpoint detection and response (EDR) on all managed
         devices to detect unauthorized access attempts.
    tools:
      - iam-platform
      - rbac-engine
      - edr-solution
      - network-segmentation
  devsecops:
    prose: |
      **Secure development and access governance:**
      1. Enforce branch protection and code review requirements to prevent
         unauthorized modifications to production systems.
      2. Implement secret scanning in CI/CD pipelines to detect exposed
         credentials that could enable unauthorized device access.
      3. Require signed commits and verified identities for all code
         contributions to establish attribution and authorization.
      4. Scan repositories for hacking tools, exploit code, or malware
         that could violate paragraph 1 of art. 154-A.
      5. Maintain audit trail of all access to development infrastructure
         including source code repositories, CI/CD systems, and artifact registries.
    tools:
      - gitlab-ci
      - secret-scanning
      - commit-signing
      - audit-logging
  secops:
    prose: |
      **Unauthorized access detection and response:**
      1. Deploy intrusion detection/prevention systems (IDS/IPS) to identify
         unauthorized access attempts to computing devices and systems.
      2. Implement 24x7 security monitoring (SOC) with alerts for anomalous
         access patterns that may indicate device invasion.
      3. Maintain formal authorization records for all penetration testing,
         vulnerability assessment, and red team activities to ensure they
         do not constitute criminal conduct under art. 154-A.
      4. Establish incident response procedures specifically for unauthorized
         access events, including evidence preservation for potential
         criminal prosecution.
      5. Train personnel on the legal boundaries of authorized access to
         prevent inadvertent violations of art. 154-A.
    tools:
      - ids-ips
      - siem
      - soc-platform
      - incident-response
