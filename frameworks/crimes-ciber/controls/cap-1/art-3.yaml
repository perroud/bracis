id: art-3
family: cap-1
title: "Penalty Increases and Aggravating Circumstances"
class: CRIMES-CIBER
baselines: [all-sectors]
statement:
  prose: |
    Art. 154-A, § 2.º Aumenta-se a pena de 1/3 (um terço) a 2/3 (dois terços)
    se da invasão resulta prejuízo econômico.

    § 4.º Na hipótese do § 3.º, aumenta-se a pena de 1/3 (um terço) a 2/3
    (dois terços) se houver divulgação, comercialização ou transmissão a
    terceiro, a qualquer título, dos dados ou informações obtidos.

    § 5.º Aumenta-se a pena de 1/3 (um terço) à metade se o crime for
    praticado contra:

    I — Presidente da República, governadores e prefeitos;
    II — Presidente do Supremo Tribunal Federal;
    III — Presidente da Câmara dos Deputados, do Senado Federal, de
    Assembleia Legislativa de Estado, da Câmara Legislativa do Distrito
    Federal ou de Câmara Municipal;
    IV — dirigente máximo da administração direta e indireta federal,
    estadual, municipal ou do Distrito Federal.

    (Incluído pela Lei n.º 12.737, de 2012)
guidance:
  prose: |
    Paragraphs 2, 4, and 5 of art. 154-A establish progressive penalty
    increases based on the severity of consequences and the status of victims.

    **Paragraph 2 — Economic harm:**
    When the invasion causes economic damage to the victim, the penalty
    is increased by 1/3 to 2/3. This applies to the base offense (1-4 years),
    resulting in effective penalties of 1 year 4 months to 6 years 8 months.

    **Paragraph 4 — Data dissemination:**
    When data obtained through qualified invasion (paragraph 3) is disclosed,
    sold, or transmitted to third parties, the penalty is increased by 1/3
    to 2/3. This specifically targets data brokers and those who monetize
    stolen data. Applied to the qualified form (2-5 years), effective
    penalties range from 2 years 8 months to 8 years 4 months.

    **Paragraph 5 — High-profile victims:**
    Crimes against heads of state, judiciary, legislative, and senior
    government officials carry penalties increased by 1/3 to 1/2. This
    reflects the heightened national security implications.

    **Cumulative application:**
    Penalty increases can be cumulated. An invasion that causes economic
    harm AND results in data dissemination could have both paragraph 2
    and paragraph 4 increases applied sequentially.
implementation_guidance:
  platform_engineering:
    prose: |
      **Enhanced protection for high-value targets:**
      1. Implement tiered security controls with enhanced protection for
         systems processing financial data (paragraph 2 — economic harm)
         and systems used by government officials (paragraph 5).
      2. Deploy advanced threat protection for executive and VIP accounts,
         including dedicated monitoring and hardened authentication.
      3. Implement data exfiltration prevention controls to detect and block
         unauthorized transmission of stolen data to third parties
         (paragraph 4 — data dissemination).
      4. Maintain financial impact assessment capabilities to quantify
         economic harm from security incidents for criminal prosecution
         under paragraph 2.
    tools:
      - advanced-threat-protection
      - dlp-solution
      - vip-account-protection
      - financial-impact-assessment
  devsecops:
    prose: |
      **Data leakage prevention in development lifecycle:**
      1. Implement controls preventing developers from exfiltrating
         proprietary code or data through CI/CD pipelines, which could
         constitute dissemination under paragraph 4.
      2. Enforce code signing and integrity verification to prevent
         unauthorized modifications that could cause economic harm.
      3. Monitor for bulk data extraction patterns in development
         environments that could indicate data theft for commercial sale.
      4. Implement watermarking or fingerprinting of sensitive datasets
         used in development to trace unauthorized dissemination.
    tools:
      - code-signing
      - dlp-pipeline
      - data-fingerprinting
      - access-analytics
  secops:
    prose: |
      **Aggravating circumstance detection and documentation:**
      1. Implement automated economic impact assessment procedures for
         all unauthorized access incidents to support paragraph 2 claims.
      2. Monitor dark web and underground markets for organizational data
         being sold or disseminated, indicating paragraph 4 violations.
      3. Maintain enhanced monitoring for accounts belonging to government
         officials and senior executives (paragraph 5 protected persons).
      4. Document all aggravating circumstances in incident reports with
         chain-of-custody integrity to support criminal prosecution with
         enhanced penalties.
      5. Establish threat intelligence feeds specifically monitoring for
         stolen organizational data appearing in unauthorized channels.
    tools:
      - dark-web-monitoring
      - threat-intelligence
      - impact-assessment
      - forensic-documentation
