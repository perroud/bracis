id: art-10
family: cap-4
title: "Cooperation with Law Enforcement"
class: CRIMES-CIBER
baselines: [all-sectors]
statement:
  prose: |
    A cooperação com autoridades policiais e judiciais na investigação de
    crimes cibernéticos decorre da combinação dos seguintes dispositivos:

    Código de Processo Penal:
    Art. 6.º Logo que tiver conhecimento da prática da infração penal, a
    autoridade policial deverá:
    III — colher todas as provas que servirem para o esclarecimento do fato
    e suas circunstâncias;
    IV — ouvir o ofendido;
    VII — determinar, se for caso, que se proceda a exame de corpo de delito
    e a quaisquer outras perícias.

    Marco Civil da Internet (Lei 12.965/2014):
    Art. 10, § 2.º O conteúdo das comunicações privadas somente poderá ser
    disponibilizado mediante ordem judicial, nas hipóteses e na forma que a
    lei estabelecer, respeitado o disposto nos incisos II e III do art. 7.º.

    Art. 10, § 3.º O disposto no caput não impede o acesso aos dados
    cadastrais que informem qualificação pessoal, filiação e endereço, na
    forma da lei, pelas autoridades administrativas que detenham competência
    legal para a sua requisição.

    Lei Geral de Proteção de Dados (Lei 13.709/2018):
    Art. 4.º Esta Lei não se aplica ao tratamento de dados pessoais:
    III — realizado para fins exclusivos de:
    d) atividades de investigação e repressão de infrações penais.
guidance:
  prose: |
    Cooperation with law enforcement in cybercrime investigations involves
    a balance between privacy obligations and legal duties to support
    criminal investigations. Multiple legal provisions define the scope
    and limits of this cooperation.

    **What can be provided WITHOUT court order:**
    - Subscriber registration data (name, affiliation, address) — art. 10
      paragraph 3, Marco Civil
    - Metadata and access logs when requested by competent administrative
      authorities with legal basis

    **What REQUIRES a court order:**
    - Content of private communications — art. 10 paragraph 2, Marco Civil
    - Connection logs and application access logs for use as evidence —
      art. 22, Marco Civil

    **LGPD exception for criminal investigation:**
    Art. 4, III, "d" of the LGPD exempts data processing for criminal
    investigation and prosecution purposes from LGPD requirements. However,
    this exception applies to law enforcement authorities, not to private
    organizations. Companies must still follow proper legal channels.

    **Practical cooperation obligations:**
    - Respond to judicial orders for log and data production
    - Preserve evidence when notified of ongoing investigation
    - Provide subscriber data to competent authorities
    - Support technical examination (pericia) as ordered by courts
    - NOT proactively share user data without legal basis
implementation_guidance:
  platform_engineering:
    prose: |
      **Law enforcement cooperation infrastructure:**
      1. Implement automated systems for receiving and processing judicial
         orders for data production, with tracking and audit trail.
      2. Maintain clearly separated data stores for subscriber registration
         data (accessible without court order) and communication content
         (requires court order).
      3. Deploy secure data exchange channels for transmitting evidence
         to law enforcement that maintain chain-of-custody integrity.
      4. Implement legal hold automation that preserves relevant data
         when law enforcement preservation requests are received.
      5. Maintain data export capabilities that produce legally compliant
         evidence packages with integrity verification (hash, timestamp).
    tools:
      - legal-order-management
      - data-export
      - secure-exchange
      - legal-hold
  devsecops:
    prose: |
      **Forensic-ready application architecture:**
      1. Design applications with forensic readiness — the ability to
         produce user activity records in formats suitable for law
         enforcement investigation.
      2. Implement clear separation between subscriber data, metadata,
         and communication content at the application architecture level
         to support tiered disclosure requirements.
      3. Build data export APIs that can produce legally required data
         subsets (subscriber only, metadata only, full content) based
         on the level of legal authorization provided.
      4. Ensure all data produced for law enforcement includes integrity
         verification (cryptographic hashes, timestamps) to support
         admissibility as digital evidence.
    tools:
      - forensic-api
      - data-separation
      - integrity-verification
      - export-automation
  secops:
    prose: |
      **Law enforcement liaison and cooperation procedures:**
      1. Designate a law enforcement liaison point within the security
         operations team to receive and process judicial orders and
         law enforcement requests.
      2. Maintain documented procedures for:
         - Receiving and validating judicial orders
         - Processing subscriber data requests (no court order)
         - Processing content disclosure orders (court order required)
         - Evidence preservation holds
         - Technical examination support (pericia)
      3. Train security operations personnel on the legal boundaries
         of cooperation — what can and cannot be disclosed without
         court order under Marco Civil and LGPD.
      4. Maintain SLA for responding to judicial orders and law
         enforcement requests, tracking response times and compliance.
      5. Establish relationships with specialized cybercrime police
         units (Delegacia de Crimes Ciberneticos) and CERT.br.
    tools:
      - legal-order-tracking
      - law-enforcement-liaison
      - evidence-production
      - compliance-tracking
