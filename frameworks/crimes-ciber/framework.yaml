control_families:
  - id: cap-1
    title: "Unauthorized Access to Computing Devices"
    description: >-
      Criminal typification of unauthorized invasion of computing devices, qualified
      forms including data theft and remote control, and applicable penalties as defined
      in art. 154-A of the Codigo Penal
    articles: "art. 1 ao art. 3"
    control_count: 3
  - id: cap-2
    title: "Service Disruption and Data Tampering"
    description: "Criminal provisions for disruption of public utility IT services and falsification of electronic documents and payment cards, as amended by Lei 12.737/2012"
    articles: "art. 4 ao art. 5"
    control_count: 2
  - id: cap-3
    title: "Electronic Fraud"
    description: "Qualified electronic fraud provisions introduced by Lei 14.155/2021, including aggravated penalties for internet-based fraud, social engineering, and special jurisdiction rules"
    articles: "art. 6 ao art. 8"
    control_count: 3
  - id: cap-4
    title: "Compliance Requirements and Evidence Preservation"
    description: "Obligations for evidence preservation, cooperation with law enforcement authorities, and log retention requirements to support cybercrime investigation"
    articles: "art. 9 ao art. 10"
    control_count: 2
related_frameworks:
  - framework_id: lgpd
    relationship: complements
    description: >-
      The LGPD complements the Cybercrime Laws by establishing data protection
      obligations whose violation may constitute the data theft crimes typified in art.
      154-A of the Codigo Penal. Data breaches under LGPD may trigger criminal
      investigation under the Cybercrime Laws when unauthorized access to personal data
      is involved.
  - framework_id: marco-civil
    relationship: complements
    description: >-
      The Marco Civil da Internet complements the Cybercrime Laws by establishing
      mandatory log retention obligations (art. 13 and art. 15) that provide the
      evidentiary basis for cybercrime investigation and prosecution under Lei
      12.737/2012 and Lei 14.155/2021.
