id: trm-13-1
family: sec-13
title: "IT Audit"
class: MAS-TRM

statement:
  prose: >-
    The financial institution shall maintain an independent IT audit function
    to assess the adequacy and effectiveness of the institution's technology
    risk management framework, policies, controls, and procedures.
  parts:
    - id: trm-13-1.1
      label: "13.1.1"
      prose: >-
        The institution shall establish an IT audit function that is
        independent of the IT department and reports to the audit committee
        or board of directors. IT auditors shall possess adequate knowledge,
        skills, and expertise in technology risk and information security.
    - id: trm-13-1.2
      label: "13.1.2"
      prose: >-
        The institution shall develop a risk-based IT audit plan that
        covers all aspects of the technology risk management framework.
        The audit plan shall be approved by the audit committee and
        updated annually to reflect changes in the risk profile and
        technology environment.
    - id: trm-13-1.3
      label: "13.1.3"
      prose: >-
        IT audit findings shall be documented, classified by severity,
        and reported to management with recommended remediation actions.
        The institution shall establish a formal process for tracking
        audit findings to closure, with defined timelines for remediation
        and escalation procedures for overdue findings.
    - id: trm-13-1.4
      label: "13.1.4"
      prose: >-
        The institution shall ensure that IT audit coverage includes
        assessments of access controls, change management, data security,
        business continuity, outsourcing arrangements, cyber security
        operations, and compliance with regulatory requirements and
        internal policies.

guidance:
  prose: >-
    IT audit is the ultimate assurance function for technology risk management.
    Independence is non-negotiable; the IT audit function must be free from
    influence by the teams whose work it is assessing. IT auditors must have
    current technical skills, not just audit certifications; the technology
    landscape evolves faster than audit standards. Audit findings must drive
    real change through management accountability and tracked remediation.
    The audit committee must hold management accountable for timely
    remediation and not accept repeated deferrals of the same findings.

references:
  - citation: "MAS Technology Risk Management Guidelines 2021, Section 13"
    url: "https://www.mas.gov.sg/regulation/guidelines/technology-risk-management-guidelines"

implementation_guidance:
  platform_engineering:
    prose: >-
      Generate audit evidence automatically from platform telemetry:
      deployment logs, access logs, configuration change history,
      vulnerability scan results, and compliance scan reports. Implement
      audit-friendly dashboards that provide real-time visibility into
      control effectiveness. Maintain immutable audit trails for all
      platform operations through append-only logging to write-once
      storage. Implement automated compliance checks that generate
      continuous audit evidence rather than point-in-time assessments.
      Provide auditors with read-only access to monitoring and
      compliance dashboards.
    tools:
      - backstage
      - grafana
      - open-policy-agent
      - elastic
      - gitlab

  devsecops:
    prose: >-
      Generate pipeline-based audit evidence including security scan
      results, approval records, deployment logs, and configuration
      compliance reports. Maintain immutable pipeline execution logs
      that demonstrate control effectiveness over time. Implement
      automated compliance reporting that maps pipeline activities
      to audit control requirements. Configure audit-specific
      dashboards showing security scan coverage, finding remediation
      trends, and change management compliance rates.
    tools:
      - gitlab-ci
      - gitlab-compliance-framework
      - gitlab-audit-events
      - sonarqube
      - defectdojo

  secops:
    prose: >-
      Maintain centralized audit evidence repositories with SIEM logs,
      incident records, vulnerability management data, and access
      review documentation. Support IT audit engagements with timely
      evidence provision and subject matter expertise. Track audit
      findings in the GRC platform with defined remediation owners,
      timelines, and escalation procedures. Generate automated
      compliance status reports for the audit committee showing
      control effectiveness, finding trends, and remediation metrics.
    tools:
      - grc-platform
      - splunk
      - elastic-siem
      - defectdojo

