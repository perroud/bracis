id: trm-3-1
family: sec-3
title: "Technology Risk Governance and Oversight"
class: MAS-TRM

statement:
  prose: >-
    The board of directors and senior management shall establish effective
    governance and oversight of technology risk, ensuring that the institution's
    technology risk management strategy is aligned with its overall business
    strategy and risk appetite.
  parts:
    - id: trm-3-1.1
      label: "3.1.1"
      prose: >-
        The board of directors shall assume the responsibility for approving
        the overall technology risk management framework, policies, and risk
        appetite, and shall ensure that adequate resources are allocated for
        managing technology risks.
    - id: trm-3-1.2
      label: "3.1.2"
      prose: >-
        Senior management shall establish an organizational structure with
        clear roles, responsibilities, and reporting lines for managing
        technology risks, including the appointment of a Chief Information
        Officer (CIO) and/or Chief Information Security Officer (CISO)
        with appropriate authority and independence.
    - id: trm-3-1.3
      label: "3.1.3"
      prose: >-
        The board shall receive regular reports on the institution's technology
        risk profile, significant incidents, and emerging threats. The board
        shall be briefed on the effectiveness of the technology risk management
        framework at least annually.
    - id: trm-3-1.4
      label: "3.1.4"
      prose: >-
        The institution shall establish a technology risk committee or
        equivalent governance body to oversee the management of technology
        risks, approve technology risk policies and standards, and monitor
        the implementation of risk mitigation measures.

guidance:
  prose: >-
    Technology risk governance must start at the top with the board and cascade
    through the organization. The board does not need deep technical expertise
    but must understand the material technology risks facing the institution and
    ensure appropriate management structures are in place. Senior management must
    translate the board's risk appetite into actionable policies, allocate
    sufficient budget and talent, and maintain direct accountability for
    technology risk outcomes. The CISO function should have sufficient
    independence to escalate issues without conflicts of interest.

references:
  - citation: "MAS Technology Risk Management Guidelines 2021, Section 3"
    url: "https://www.mas.gov.sg/regulation/guidelines/technology-risk-management-guidelines"
  - citation: "MAS Notice on Cyber Hygiene (CMG-N02)"
    url: "https://www.mas.gov.sg/regulation/notices/notice-cmg-n02"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement governance-as-code by codifying technology risk policies
      in version-controlled repositories with required approval workflows
      for changes. Use a service catalog (Backstage) to maintain a
      governance dashboard showing risk ownership, policy compliance
      status, and resource allocation across teams. Establish automated
      reporting pipelines that generate board-level technology risk
      summaries from aggregated platform metrics, vulnerability counts,
      incident data, and compliance scan results. Define risk appetite
      thresholds as code that trigger automated escalation workflows
      when breached.
    tools:
      - backstage
      - open-policy-agent
      - grafana
      - terraform
      - gitlab

  devsecops:
    prose: >-
      Enforce governance controls in CI/CD pipelines by implementing
      mandatory compliance gates that validate adherence to approved
      technology risk policies before deployment. Configure role-based
      access controls in the DevOps platform to reflect the governance
      structure (CISO approval for security-critical changes). Generate
      automated governance reports from pipeline execution data showing
      policy compliance rates, risk acceptance decisions, and exception
      tracking. Maintain audit trails of all governance decisions and
      policy changes in immutable logs.
    tools:
      - gitlab-ci
      - gitlab-compliance-framework
      - sonarqube
      - open-policy-agent

  secops:
    prose: >-
      Produce automated board-level reporting packages from SIEM and
      GRC platforms that summarize technology risk posture, incident
      trends, and control effectiveness. Maintain a risk register that
      maps to the board-approved risk appetite and triggers alerts when
      residual risk exceeds thresholds. Track governance action items
      and remediation commitments with automated follow-up and
      escalation workflows. Schedule and document annual board briefings
      on technology risk management framework effectiveness.
    tools:
      - splunk
      - elastic-siem
      - grc-platform
      - defectdojo

