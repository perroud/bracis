id: trm-11-1
family: sec-11
title: "Cyber Security Operations"
class: MAS-TRM

statement:
  prose: >-
    The financial institution shall establish cyber security operations
    capabilities including a security operations centre (SOC), threat
    intelligence, and continuous monitoring to detect, analyze, and
    respond to cyber threats and security events.
  parts:
    - id: trm-11-1.1
      label: "11.1.1"
      prose: >-
        The institution shall establish a security operations centre (SOC)
        or equivalent capability to provide continuous monitoring of
        security events, threat detection, and initial incident response.
        The SOC shall operate on a 24/7 basis commensurate with the
        institution's risk profile and the criticality of its systems.
    - id: trm-11-1.2
      label: "11.1.2"
      prose: >-
        The institution shall implement security information and event
        management (SIEM) or equivalent technology to aggregate, correlate,
        and analyze security events from across the IT environment. Detection
        rules shall be tuned to minimize false positives while maintaining
        coverage for known and emerging threat patterns.
    - id: trm-11-1.3
      label: "11.1.3"
      prose: >-
        The institution shall establish a cyber threat intelligence (CTI)
        program to collect, analyze, and disseminate threat intelligence
        relevant to the financial sector. Threat intelligence shall be
        integrated into detection rules, vulnerability prioritization,
        and risk assessment processes.
    - id: trm-11-1.4
      label: "11.1.4"
      prose: >-
        The institution shall participate in industry information-sharing
        arrangements and maintain relationships with relevant authorities,
        CERTs, and industry bodies for timely exchange of threat
        information and coordination during cyber incidents.

guidance:
  prose: >-
    Cyber security operations must evolve beyond reactive alert triage to
    proactive threat hunting and intelligence-driven defense. A SOC that
    only processes alerts without understanding the threat landscape will
    miss sophisticated attacks. Threat intelligence must be operationalized
    through automated indicator ingestion, detection rule development, and
    proactive hunting campaigns. Information sharing with industry peers
    and MAS is both a regulatory expectation and a force multiplier for
    defense. In Singapore, institutions should participate in the Financial
    Services Information Sharing and Analysis Centre (FS-ISAC) and
    coordinate with SingCERT.

references:
  - citation: "MAS Technology Risk Management Guidelines 2021, Section 11"
    url: "https://www.mas.gov.sg/regulation/guidelines/technology-risk-management-guidelines"
  - citation: "CSA Singapore - SingCERT"
    url: "https://www.csa.gov.sg/singcert"

implementation_guidance:
  platform_engineering:
    prose: >-
      Instrument all platform components to generate security-relevant
      telemetry: audit logs, access logs, API logs, network flow logs,
      and container runtime events. Deploy log aggregation infrastructure
      that forwards events to SIEM in real time with structured formatting.
      Implement runtime security monitoring (Falco) for container and
      Kubernetes workloads to detect anomalous behavior. Configure
      automated threat intelligence feed integration that updates
      platform-level blocklists and detection rules.
    tools:
      - falco
      - grafana
      - prometheus
      - fluentd
      - open-policy-agent

  devsecops:
    prose: >-
      Integrate security event generation into CI/CD pipelines including
      audit logs for all pipeline executions, approval decisions, and
      deployment activities. Forward pipeline security scan results to
      the SIEM for correlation with runtime events. Implement automated
      threat intelligence integration that updates pipeline scanning
      rules with newly discovered vulnerability patterns. Configure
      alerts for anomalous pipeline behavior such as unusual deployment
      times, bypassed approvals, or unexpected dependency additions.
    tools:
      - gitlab-ci
      - gitlab-audit-events
      - fluentd
      - splunk
      - elastic-siem

  secops:
    prose: >-
      Operate the SOC with defined processes for event triage, alert
      investigation, and escalation. Implement SIEM with detection rules
      covering MITRE ATT&CK framework tactics and techniques relevant to
      the financial sector. Establish a threat intelligence program that
      consumes feeds from FS-ISAC, commercial providers, and open-source
      intelligence. Conduct proactive threat hunting campaigns based on
      threat intelligence and industry trend analysis. Maintain
      relationships with SingCERT, MAS, and industry peers for
      information sharing and incident coordination.
    tools:
      - splunk
      - elastic-siem
      - wazuh
      - misp
      - opencti
      - thehive

