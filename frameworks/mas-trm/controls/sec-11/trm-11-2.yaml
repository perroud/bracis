implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated incident detection through platform monitoring
      that triggers alerts based on defined severity criteria. Deploy
      automated containment capabilities such as network isolation,
      workload quarantine, and credential rotation that can be executed
      through runbook automation. Implement forensic data collection
      automation that preserves evidence (logs, memory dumps, network
      captures) when incidents are detected. Maintain incident response
      runbooks as code in version-controlled repositories with automated
      execution capabilities.
    tools:
      - pagerduty
      - grafana
      - kubernetes
      - falco
      - terraform

  devsecops:
    prose: >-
      Implement pipeline-based incident response automation including
      automated rollback pipelines, emergency patching workflows, and
      credential rotation procedures. Maintain incident response
      tooling and playbooks in version-controlled repositories.
      Configure automated evidence collection from CI/CD pipeline
      logs, deployment records, and approval histories for incident
      investigation. Implement break-glass procedures for emergency
      deployments that bypass normal approval flows but maintain
      audit trails and require post-incident review.
    tools:
      - gitlab-ci
      - argocd
      - vault
      - pagerduty

  secops:
    prose: >-
      Operate the incident response function with defined playbooks
      for common incident types (ransomware, data breach, DDoS,
      insider threat, supply chain compromise). Maintain incident
      classification criteria aligned with MAS notification thresholds.
      Implement automated MAS notification workflows that generate
      required reporting content within prescribed timelines. Conduct
      annual incident response exercises and track remediation of
      findings. Perform blameless post-incident reviews and track
      corrective actions to closure. Maintain retainer agreements
      with digital forensics and incident response (DFIR) providers.
    tools:
      - thehive
      - cortex
      - splunk
      - elastic-siem
      - pagerduty
      - grc-platform

