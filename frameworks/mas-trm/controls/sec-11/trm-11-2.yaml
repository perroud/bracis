id: trm-11-2
family: sec-11
title: "Cyber Incident Response and Management"
class: MAS-TRM

statement:
  prose: >-
    The financial institution shall establish a cyber incident response and
    management capability to effectively detect, contain, eradicate, and
    recover from cyber incidents, and to meet regulatory notification
    requirements.
  parts:
    - id: trm-11-2.1
      label: "11.2.1"
      prose: >-
        The institution shall develop and maintain a cyber incident response
        plan that defines roles and responsibilities, escalation procedures,
        communication protocols, containment strategies, eradication
        procedures, and recovery processes. The plan shall be approved by
        senior management and reviewed at least annually.
    - id: trm-11-2.2
      label: "11.2.2"
      prose: >-
        The institution shall establish incident classification criteria
        to categorize incidents by severity and impact, with defined
        response timelines and escalation triggers for each category.
        Major incidents shall be escalated to senior management and
        reported to MAS within the prescribed notification timelines.
    - id: trm-11-2.3
      label: "11.2.3"
      prose: >-
        The institution shall conduct incident response exercises, including
        tabletop exercises and technical simulations, at least annually to
        test the effectiveness of the incident response plan. Exercise
        results shall be documented and used to improve response
        procedures.
    - id: trm-11-2.4
      label: "11.2.4"
      prose: >-
        Post-incident reviews shall be conducted for all significant
        cyber incidents to identify root causes, assess the effectiveness
        of the response, and implement corrective actions. Lessons learned
        shall be shared with relevant stakeholders and incorporated into
        the risk management framework.
    - id: trm-11-2.5
      label: "11.2.5"
      prose: >-
        The institution shall report technology incidents to MAS in
        accordance with MAS Notice on Technology Risk Management
        (MAS 644/655) requirements, including incidents that result in
        prolonged service disruption, compromise of customer data, or
        significant financial impact.

guidance:
  prose: >-
    Incident response preparedness is measured by how quickly and effectively
    an institution can contain and recover from an incident. The incident
    response plan must be a living document that is tested and updated
    regularly, not a static policy document. MAS expects prompt notification
    of significant incidents (typically within one hour of discovery for
    major incidents). Post-incident reviews must be blameless and focused
    on systemic improvements rather than individual accountability. Institutions
    should maintain retainer agreements with incident response firms for
    surge capacity during major incidents.

references:
  - citation: "MAS Technology Risk Management Guidelines 2021, Section 11"
