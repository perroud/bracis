id: trm-7-1
family: sec-7
title: "IT Service Management"
class: MAS-TRM

statement:
  prose: >-
    The financial institution shall establish IT service management processes
    for change management, incident management, and problem management to
    ensure stable, reliable, and secure IT operations.
  parts:
    - id: trm-7-1.1
      label: "7.1.1"
      prose: >-
        The institution shall implement a formal change management process
        that ensures all changes to IT systems are assessed for risk,
        tested, approved by authorized personnel, and documented. Emergency
        changes shall follow an expedited process with post-implementation
        review and retrospective authorization.
    - id: trm-7-1.2
      label: "7.1.2"
      prose: >-
        The institution shall establish an incident management process that
        provides for timely detection, logging, classification, escalation,
        resolution, and post-incident review of IT incidents. Incidents
        affecting critical systems or customer data shall be escalated to
        senior management promptly.
    - id: trm-7-1.3
      label: "7.1.3"
      prose: >-
        The institution shall implement a problem management process to
        identify root causes of recurring incidents, implement permanent
        fixes, and track known errors. Root cause analysis shall be
        performed for all major incidents.
    - id: trm-7-1.4
      label: "7.1.4"
      prose: >-
        The institution shall maintain a configuration management database
        (CMDB) or equivalent system to track IT assets, their configurations,
        relationships, and change history. Configuration baselines shall be
        established and monitored for unauthorized deviations.

guidance:
  prose: >-
    IT service management processes are the operational backbone of technology
    risk management. Change management must balance agility with control;
    overly rigid processes drive teams to circumvent them, while insufficient
    controls lead to outages and security incidents. Incident and problem
    management must feed back into the risk management framework by updating
    risk assessments based on actual incident data. Configuration management
    provides the foundation for understanding the attack surface and
    detecting unauthorized changes.

references:
  - citation: "MAS Technology Risk Management Guidelines 2021, Section 7"
    url: "https://www.mas.gov.sg/regulation/guidelines/technology-risk-management-guidelines"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement change management through GitOps workflows where all
      infrastructure and application changes are submitted as merge
      requests, reviewed, approved, and applied through automated
      pipelines. Use infrastructure-as-code drift detection to identify
      unauthorized configuration changes. Maintain a CMDB through
      automated service discovery and infrastructure-as-code state files.
      Implement automated rollback capabilities for failed deployments.
      Configure deployment pipelines with required approval stages for
      production changes, with emergency change procedures that bypass
      pre-approval but require post-implementation review.
    tools:
      - argocd
      - terraform
      - backstage
      - kubernetes
      - grafana
      - prometheus

  devsecops:
    prose: >-
      Enforce change management through branch protection rules, merge
      request approval requirements, and deployment pipeline gates.
      Implement automated change risk assessment by analyzing the scope
      and impact of changes (files modified, services affected,
      dependencies changed). Maintain immutable deployment logs that
      record who approved, when deployed, and what changed. Configure
      automated incident detection through pipeline failure alerts,
      deployment health checks, and canary analysis. Track all changes
      with links to approval records and test results.
    tools:
      - gitlab-ci
      - gitlab-compliance-framework
      - argocd
      - prometheus
      - grafana

  secops:
    prose: >-
      Monitor for unauthorized changes through configuration drift
      detection and SIEM correlation rules. Track IT incidents in a
      centralized incident management platform with automated
      classification and escalation. Perform root cause analysis for
      all major incidents and track remediation actions to closure.
      Generate change management compliance reports showing approval
      rates, emergency change frequency, and post-implementation
      review completion.
    tools:
      - splunk
      - elastic-siem
      - pagerduty
      - servicenow
      - wazuh

