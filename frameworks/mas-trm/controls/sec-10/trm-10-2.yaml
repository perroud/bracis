id: trm-10-2
family: sec-10
title: "Security Monitoring and Testing"
class: MAS-TRM

statement:
  prose: >-
    The financial institution shall implement continuous security monitoring
    and conduct regular security testing, including vulnerability assessments
    and penetration testing, to identify and remediate security weaknesses.
  parts:
    - id: trm-10-2.1
      label: "10.2.1"
      prose: >-
        The institution shall conduct vulnerability assessments on a regular
        basis for all IT systems, including networks, servers, applications,
        and databases. Vulnerability scan results shall be analyzed,
        prioritized based on risk, and remediated within defined timelines.
    - id: trm-10-2.2
      label: "10.2.2"
      prose: >-
        The institution shall conduct penetration testing at least annually
        for internet-facing systems and critical internal systems. Penetration
        tests shall be performed by qualified independent testers using
        methodologies that simulate realistic attack scenarios, including
        social engineering where appropriate.
    - id: trm-10-2.3
      label: "10.2.3"
      prose: >-
        The institution shall establish red team exercises or adversary
        simulation programs to test the effectiveness of its detection and
        response capabilities against advanced persistent threats. The scope
        and frequency of such exercises shall be commensurate with the
        institution's risk profile.
    - id: trm-10-2.4
      label: "10.2.4"
      prose: >-
        Security testing findings shall be tracked in a centralized
        vulnerability management system, with defined remediation SLAs
        based on severity. Management shall receive regular reports on
        vulnerability trends, remediation effectiveness, and residual risk.

guidance:
  prose: >-
    Vulnerability assessment and penetration testing are complementary
    controls. Vulnerability scanning provides breadth by identifying known
    weaknesses across the entire attack surface. Penetration testing provides
    depth by demonstrating how weaknesses can be exploited in combination
    to achieve specific objectives. Red teaming adds realism by testing
    the full detection-and-response chain, not just technical controls.
    Testing programs should evolve to include purple teaming where red and
    blue teams collaborate to improve detection capabilities systematically.

references:
  - citation: "MAS Technology Risk Management Guidelines 2021, Section 10"
    url: "https://www.mas.gov.sg/regulation/guidelines/technology-risk-management-guidelines"
  - citation: "MAS Penetration Testing Guidelines (iCAST)"
    url: "https://www.mas.gov.sg/regulation/guidelines/mas-penetration-testing-guidelines"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated vulnerability scanning in the platform through
      scheduled scans of infrastructure, container images, and
      dependencies. Deploy vulnerability scanning as infrastructure-as-code
      that scans cloud configurations, Kubernetes manifests, and
      Terraform plans. Integrate scanning results into the platform
      dashboard with automated ticket creation for findings above
      severity thresholds. Provide self-service penetration testing
      environments that mirror production for authorized testers.
    tools:
      - trivy
      - checkov
      - tfsec
      - nessus
      - grafana
      - dependency-track

  devsecops:
    prose: >-
      Implement comprehensive security testing in CI/CD pipelines: SAST
      on every commit, DAST on staging deployments, container scanning
      on every image build, and dependency scanning on every build.
      Configure pipeline gates that block deployment when critical
      vulnerabilities are detected. Implement automated DAST scanning
      of APIs and web applications in staging environments. Aggregate
      all scanning results into a centralized vulnerability management
      platform with automated deduplication and prioritization.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - gitlab-container-scanning
      - trivy
      - zap
      - nuclei

  secops:
    prose: >-
      Manage the vulnerability management lifecycle from discovery through
      remediation verification. Coordinate annual penetration testing
      engagements and track findings to closure. Conduct or coordinate
      red team exercises and adversary simulations. Maintain trending
      analysis of vulnerability data to identify systemic weaknesses
      and measure remediation effectiveness. Report vulnerability
      metrics and testing results to management including mean time
      to remediate, vulnerability density, and test coverage.
    tools:
      - defectdojo
      - burp-suite
      - cobalt-strike
      - nessus
      - grc-platform

