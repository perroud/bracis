id: trm-12-1
family: sec-12
title: "IT Outsourcing and Third-Party Management"
class: MAS-TRM

statement:
  prose: >-
    The financial institution shall manage technology risks arising from
    outsourcing arrangements and third-party service providers through
    due diligence, contractual controls, ongoing monitoring, and exit
    planning.
  parts:
    - id: trm-12-1.1
      label: "12.1.1"
      prose: >-
        The institution shall conduct comprehensive due diligence on
        technology service providers before entering into outsourcing
        arrangements. Due diligence shall assess the provider's security
        posture, financial viability, business continuity capabilities,
        regulatory compliance, and ability to meet the institution's
        requirements.
    - id: trm-12-1.2
      label: "12.1.2"
      prose: >-
        Outsourcing agreements shall include provisions for security
        requirements, service level agreements, audit rights, data
        protection obligations, incident notification, sub-contracting
        restrictions, and termination and exit management. The institution
        shall retain ultimate responsibility for outsourced activities.
    - id: trm-12-1.3
      label: "12.1.3"
      prose: >-
        The institution shall maintain an inventory of all material
        outsourcing arrangements and third-party technology dependencies.
        Concentration risk arising from reliance on a single or limited
        number of providers shall be identified and managed.
    - id: trm-12-1.4
      label: "12.1.4"
      prose: >-
        The institution shall conduct ongoing monitoring and periodic
        assessments of third-party service providers to ensure continued
        compliance with contractual requirements and the institution's
        security standards. Cloud service providers shall be subject to
        enhanced due diligence and monitoring.
    - id: trm-12-1.5
      label: "12.1.5"
      prose: >-
        The institution shall develop exit strategies and transition plans
        for material outsourcing arrangements to ensure business continuity
        in the event of provider failure, contract termination, or
        regulatory intervention.

guidance:
  prose: >-
    Third-party risk is one of the most significant technology risks for
    financial institutions. MAS expects institutions to maintain effective
    oversight regardless of what is outsourced. The institution cannot
    outsource accountability. Cloud outsourcing requires special attention
    to data residency (MAS expects data to be recoverable and accessible),
    concentration risk (multiple institutions depending on the same
    provider), and regulatory access (MAS must be able to inspect). Exit
    planning is not optional; institutions must be able to transition
    away from any provider within a reasonable timeframe without
    significant service disruption.

references:
  - citation: "MAS Technology Risk Management Guidelines 2021, Section 12"
    url: "https://www.mas.gov.sg/regulation/guidelines/technology-risk-management-guidelines"
  - citation: "MAS Guidelines on Outsourcing (MAS 2018)"
