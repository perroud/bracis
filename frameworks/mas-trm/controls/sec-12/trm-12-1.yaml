implementation_guidance:
  platform_engineering:
    prose: >-
      Maintain an automated inventory of third-party technology dependencies
      through SBOM generation, dependency scanning, and cloud resource
      tagging. Implement supply chain security controls including artifact
      signing and verification, dependency pinning, and private registry
      mirroring. Monitor third-party component vulnerabilities through
      continuous dependency scanning integrated into the platform.
      Implement multi-cloud or hybrid-cloud architecture patterns where
      feasible to mitigate concentration risk. Maintain infrastructure-as-code
      that enables environment recreation on alternative providers.
    tools:
      - dependency-track
      - syft
      - cosign
      - terraform
      - backstage

  devsecops:
    prose: >-
      Implement dependency scanning in CI/CD pipelines to continuously
      monitor third-party component vulnerabilities. Enforce dependency
      policies that restrict use of unapproved or end-of-life components.
      Implement software supply chain security through SLSA framework
      compliance including build provenance, artifact signing, and
      source integrity verification. Generate SBOMs as pipeline
      artifacts for all builds and feed them into dependency tracking
      systems. Monitor for dependency confusion and typosquatting
      attacks.
    tools:
      - gitlab-ci
      - gitlab-dependency-scanning
      - gitlab-container-scanning
      - trivy
      - syft
      - cosign
      - grype

  secops:
    prose: >-
      Maintain a third-party risk register with risk assessments for
      all material outsourcing arrangements. Conduct periodic security
      assessments of critical service providers including review of
      SOC 2 reports, penetration test results, and compliance
      certifications. Monitor threat intelligence for vulnerabilities
      and breaches affecting third-party providers. Track contractual
      compliance and SLA performance. Coordinate exit planning
      exercises for critical providers.
    tools:
      - grc-platform
      - dependency-track
      - defectdojo
      - splunk

