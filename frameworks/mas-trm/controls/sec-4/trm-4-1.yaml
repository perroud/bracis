id: trm-4-1
family: sec-4
title: "Technology Risk Management Framework"
class: MAS-TRM

statement:
  prose: >-
    The financial institution shall establish a comprehensive technology risk
    management framework that provides for the identification, assessment,
    mitigation, monitoring, and reporting of technology risks in a systematic
    and consistent manner.
  parts:
    - id: trm-4-1.1
      label: "4.1.1"
      prose: >-
        The institution shall develop and implement a technology risk management
        framework that is commensurate with the nature, size, and complexity
        of its operations and technology environment. The framework shall be
        documented, approved by senior management, and reviewed at least
        annually.
    - id: trm-4-1.2
      label: "4.1.2"
      prose: >-
        The institution shall maintain a comprehensive technology risk
        register that documents identified risks, risk assessments, risk
        owners, mitigation measures, residual risk ratings, and risk
        acceptance decisions. The register shall be updated on a regular
        basis and when significant changes occur.
    - id: trm-4-1.3
      label: "4.1.3"
      prose: >-
        The institution shall conduct regular technology risk assessments
        to identify and evaluate risks arising from its IT systems,
        processes, and third-party dependencies. Risk assessments shall be
        performed for new systems, significant changes, and on a periodic
        basis for existing systems.
    - id: trm-4-1.4
      label: "4.1.4"
      prose: >-
        The institution shall establish key risk indicators (KRIs) and
        risk reporting mechanisms to provide management and the board
        with timely information on the institution's technology risk
        profile and the effectiveness of risk mitigation measures.

guidance:
  prose: >-
    The technology risk management framework is the foundational structure
    through which all other MAS TRM requirements are operationalized. It must
    not exist in isolation but be integrated with the institution's enterprise
    risk management framework. The framework should follow a risk-based
    approach where controls and resources are allocated proportionally to the
    risk level. Risk assessments must be methodical and repeatable, using
    standardized methodologies that consider both likelihood and impact.
    The risk register must be a living document, not a point-in-time artifact.

references:
  - citation: "MAS Technology Risk Management Guidelines 2021, Section 4"
    url: "https://www.mas.gov.sg/regulation/guidelines/technology-risk-management-guidelines"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement the technology risk management framework as policy-as-code
      artifacts covering infrastructure, application, and data layers. Use
      a central CMDB or service catalog (Backstage) to maintain a real-time
      inventory of all IT assets including servers, databases, APIs,
      containers, and third-party dependencies. Automate risk scoring using
      vulnerability scan data, configuration compliance checks, and
      dependency analysis integrated into the platform. Establish GitOps
      workflows where all changes to the risk framework require versioned
      pull requests with audit trails. Deploy infrastructure-as-code
      scanning (Checkov, tfsec) as pre-commit hooks to enforce risk
      policies before provisioning.
    tools:
      - backstage
      - terraform
      - checkov
      - tfsec
      - open-policy-agent
      - grafana
      - prometheus
      - dependency-track

  devsecops:
    prose: >-
      Embed technology risk assessment into every phase of the software
      delivery lifecycle. Implement automated SAST, DAST, SCA, and
      container scanning in CI/CD pipelines to continuously identify
      vulnerabilities and feed them into the risk register. Use risk-based
      prioritization to route critical findings to immediate remediation
      workflows while tracking lower-risk items in a centralized
      vulnerability management system. Enforce change management controls
      that require risk assessment sign-off for changes to critical
      systems. Maintain pipeline-generated audit evidence (scan reports,
      approval logs, deployment records) in immutable storage.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - gitlab-container-scanning
      - trivy
      - semgrep
      - sonarqube

  secops:
    prose: >-
      Operate continuous technology risk monitoring through SIEM integration
      that correlates vulnerability data, threat intelligence, and runtime
      anomalies. Maintain a risk register that is updated automatically
      from scan results and manually from audit findings. Implement key
      risk indicators (KRIs) as automated dashboards that track vulnerability
      counts, mean time to remediate, incident frequency, and control
      effectiveness. Generate audit-ready reports demonstrating framework
      completeness, review cadence, and remediation effectiveness.
    tools:
      - splunk
      - elastic-siem
      - wazuh
      - defectdojo
      - grc-platform

