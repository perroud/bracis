id: trm-5-1
family: sec-5
title: "IT Project Management and Security-by-Design"
class: MAS-TRM

statement:
  prose: >-
    The financial institution shall establish sound IT project management
    practices and integrate security-by-design principles throughout the
    project lifecycle, ensuring that technology risks are identified and
    addressed from inception through deployment.
  parts:
    - id: trm-5-1.1
      label: "5.1.1"
      prose: >-
        The institution shall establish an IT project management framework
        that includes risk assessment at project initiation, security
        requirements definition, milestone reviews, and post-implementation
        reviews. Projects shall be subject to governance oversight
        proportionate to their risk and complexity.
    - id: trm-5-1.2
      label: "5.1.2"
      prose: >-
        Security requirements shall be defined during the requirements
        gathering phase and incorporated into system design. Threat
        modelling shall be performed for systems that process, store, or
        transmit sensitive data or support critical business functions.
    - id: trm-5-1.3
      label: "5.1.3"
      prose: >-
        The institution shall ensure that security testing, including
        vulnerability assessments and penetration testing, is conducted
        before systems are promoted to the production environment.
        Identified vulnerabilities shall be remediated or accepted with
        documented risk acceptance.
    - id: trm-5-1.4
      label: "5.1.4"
      prose: >-
        Post-implementation reviews shall be conducted to assess whether
        project objectives have been met, security controls are operating
        effectively, and lessons learned are captured for future projects.

guidance:
  prose: >-
    Security-by-design means security is not an afterthought or a gate at
    the end of a project but is woven into every phase. Threat modelling
    should use established methodologies (STRIDE, PASTA, LINDDUN) and be
    performed by personnel with security expertise. Security requirements
    must be traceable from design through testing and into operations.
    IT project governance should prevent scope creep from eroding security
    controls and ensure that go-live decisions factor in outstanding
    security findings.

references:
  - citation: "MAS Technology Risk Management Guidelines 2021, Section 5"
    url: "https://www.mas.gov.sg/regulation/guidelines/technology-risk-management-guidelines"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement project templates in the platform that include mandatory
      security-by-design artifacts: threat model documents, security
      requirements checklists, and pre-production security gate
      configurations. Use GitOps project scaffolding tools to auto-generate
      security-configured CI/CD pipelines for new projects. Integrate
      threat modelling tools (OWASP Threat Dragon, Microsoft TMT) into the
      development workflow. Enforce pre-production security gates in the
      deployment pipeline that block promotion without passing vulnerability
      scans, security review approvals, and penetration test sign-off.
    tools:
      - backstage
      - gitlab
      - owasp-threat-dragon
      - terraform
      - checkov

  devsecops:
    prose: >-
      Embed security requirements as automated checks in CI/CD pipelines
      from the first commit. Implement SAST scanning on every merge
      request to catch security defects early in development. Require
      threat model review as a merge request approval requirement for
      security-critical components. Configure pipeline gates that enforce
      security testing milestones: SAST in development, DAST in staging,
      and penetration testing before production. Automate post-implementation
      review checklists and generate compliance evidence from pipeline
      execution data.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dast
      - semgrep
      - sonarqube
      - trivy

  secops:
    prose: >-
      Participate in project security reviews and threat modelling sessions.
      Provide threat intelligence inputs to inform security requirements
      for new projects. Conduct or coordinate pre-production penetration
      testing and validate that findings are remediated before go-live.
      Track security requirements implementation and testing outcomes in
      the GRC platform. Perform post-implementation security assessments
      to validate control effectiveness in the production environment.
    tools:
      - burp-suite
      - defectdojo
      - grc-platform
      - nessus

