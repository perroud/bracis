sections:
  - id: sec-3
    title: "Technology Risk Governance and Oversight"
    controls: [trm-3-1]
    description: >-
      Board of directors and senior management oversight of technology risk,
      including accountability, risk appetite, and governance structures for
      managing technology risk across the financial institution.
  - id: sec-4
    title: "Technology Risk Management Framework"
    controls: [trm-4-1]
    description: >-
      Establishment of a comprehensive technology risk management framework
      encompassing risk identification, assessment, mitigation, monitoring,
      and reporting processes aligned with the institution's risk appetite.
  - id: sec-5
    title: "IT Project Management and Security-by-Design"
    controls: [trm-5-1]
    description: >-
      Governance of IT projects with integrated security-by-design principles,
      ensuring risk assessment and security requirements are embedded from
      inception through deployment.
  - id: sec-6
    title: "Software Application Development and Management"
    controls: [trm-6-1, trm-6-2]
    description: >-
      Secure software development lifecycle practices, source code review,
      application security testing, and management of software throughout
      its lifecycle including end-of-life planning.
  - id: sec-7
    title: "IT Service Management"
    controls: [trm-7-1]
    description: >-
      IT service management processes including change management, incident
      management, problem management, and configuration management to ensure
      stable and reliable IT operations.
  - id: sec-8
    title: "System Reliability, Availability and Recoverability"
    controls: [trm-8-1]
    description: >-
      Ensuring system reliability, availability, and recoverability through
      capacity planning, disaster recovery, business continuity testing,
      and resilience engineering practices.
  - id: sec-9
    title: "Access Control and Cryptography"
    controls: [trm-9-1, trm-9-2]
    description: >-
      Access control mechanisms including authentication, authorization,
      and privileged access management, along with cryptographic controls
      for protecting data confidentiality and integrity.
  - id: sec-10
    title: "Data and Infrastructure Security"
    controls: [trm-10-1, trm-10-2]
    description: >-
      Security of data, networks, endpoints, and infrastructure including
      data loss prevention, network segmentation, security monitoring,
      vulnerability assessment, and penetration testing.
  - id: sec-11
    title: "Cyber Security Operations"
    controls: [trm-11-1, trm-11-2]
    description: >-
      Cyber security operations including security operations centre,
      threat intelligence, cyber incident response and management,
      and coordination with authorities and industry bodies.
  - id: sec-12
    title: "IT Outsourcing and Third-Party Management"
    controls: [trm-12-1]
    description: >-
      Management of technology risks associated with outsourcing
      arrangements and third-party service providers, including due
      diligence, contractual provisions, and ongoing monitoring.
  - id: sec-13
    title: "IT Audit"
    controls: [trm-13-1]
    description: >-
      Independent IT audit function to assess the adequacy and effectiveness
      of the institution's technology risk management framework, policies,
      and procedures.
  - id: sec-14
    title: "Online Financial Services"
    controls: [trm-14-1]
    description: >-
      Security requirements for online financial services including
      e-payments, mobile banking, and digital channels, covering
      transaction security, customer authentication, and fraud detection.

