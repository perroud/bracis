id: v1.1.1
family: v1
title: "Secure Software Development Lifecycle"
class: OWASP-ASVS

baselines: [level-2, level-3]

statement:
  prose: >-
    Verify the use of a secure software development lifecycle that addresses security
    in all stages of development. This includes threat modeling for every design change
    or sprint planning to identify threats, plan for countermeasures, facilitate
    appropriate risk responses, and guide security testing.

guidance:
  prose: >-
    A secure SDLC integrates security practices at every phase of software development
    rather than treating security as an afterthought. Threat modeling is the cornerstone
    activity: it systematically identifies potential threats, categorizes them using
    frameworks such as STRIDE or PASTA, and drives mitigation decisions before code is
    written. Every significant architectural change, new feature, or integration point
    should trigger a threat model review. The output feeds directly into security
    requirements, test cases, and acceptance criteria. Without a structured approach to
    threat modeling, teams rely on ad-hoc security reviews that consistently miss
    systemic risks in application architecture.

references:
  - citation: "OWASP ASVS v4.0.3, V1.1.1"
    url: "https://owasp.org/www-project-application-security-verification-standard/"
  - citation: "OWASP Threat Modeling"
    url: "https://owasp.org/www-community/Threat_Modeling"

implementation_guidance:
  platform_engineering:
    prose: >-
      Embed threat modeling into the platform's development workflow. Provide teams with
      threat modeling templates and tooling integrated into the architecture review process.
      Maintain a centralized threat model repository linked to service catalog entries.
      Automate the generation of threat model scaffolds from infrastructure-as-code
      definitions. Require threat model artifacts as prerequisites for architecture review
      board approval. Integrate threat model findings into the platform's security
      requirements backlog and track remediation through the same delivery pipeline.
    tools:
      - owasp-threat-dragon
      - microsoft-threat-modeling-tool
      - iriusrisk
      - backstage-catalog
      - jira
      - confluence

  devsecops:
    prose: >-
      Enforce threat model completion as a pipeline gate for new services and major changes.
      Implement CI/CD checks that verify threat model documents exist and are up-to-date
      before allowing deployment to staging or production environments. Use policy-as-code
      to validate that identified threats have corresponding mitigations tracked as issues.
      Automate DAST and SAST scans based on attack vectors identified in the threat model.
      Generate security test cases from threat model outputs and include them in the
      regression test suite.
    tools:
      - gitlab-ci
      - github-actions
      - owasp-threat-dragon
      - semgrep
      - sonarqube
      - opa

  secops:
    prose: >-
      Use threat model outputs to prioritize monitoring and detection rules. Map identified
      threats to SIEM detection patterns and create alerts for attack scenarios described
      in the threat model. Review threat models during incident post-mortems to validate
      whether the threat was previously identified and whether mitigations were adequate.
      Feed incident findings back into the threat model to close the loop between operations
      and design. Conduct periodic threat model reviews aligned with the organization's risk
      assessment cycle.
    tools:
      - splunk
      - elastic-siem
      - datadog-security
      - jira
      - confluence

