id: v2.2.1
family: v2
title: "General Authenticator Security"
class: OWASP-ASVS

baselines: [level-1, level-2, level-3]

statement:
  prose: >-
    Verify that anti-automation controls are effective at mitigating breached credential
    testing, brute force, and account lockout attacks. Such controls include blocking the
    most common breached passwords, soft lockouts, rate limiting, CAPTCHA, ever increasing
    delays between attempts, IP address restrictions, or risk-based restrictions such as
    location, first login on a device, recent attempts to unlock the account, or similar.
    Verify that no more than 100 failed attempts per hour is possible on a single account.

guidance:
  prose: >-
    Credential stuffing and brute-force attacks are among the most common and effective
    attack vectors against web applications. Attackers use automated tools to test billions
    of leaked credential pairs against target applications. Without anti-automation controls,
    even strong password policies cannot prevent account compromise when users reuse passwords
    across services. The 100 failed attempts per hour threshold provides a practical balance
    between security and usability. Multi-layered defense (rate limiting plus CAPTCHA plus
    breached password checking) is significantly more effective than any single control.
    Account lockout policies must use soft lockouts (temporary delays) rather than hard
    lockouts (permanent lock) to prevent denial-of-service via account locking.

references:
  - citation: "OWASP ASVS v4.0.3, V2.2.1"
    url: "https://owasp.org/www-project-application-security-verification-standard/"
  - citation: "OWASP Credential Stuffing Prevention"
    url: "https://cheatsheetseries.owasp.org/cheatsheets/Credential_Stuffing_Prevention_Cheat_Sheet.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement rate limiting at the API gateway and load balancer level before requests
      reach the authentication service. Configure progressive delays: after 5 failed attempts
      introduce a 30-second delay, after 10 attempts a 5-minute delay, and after 25 attempts
      require CAPTCHA completion. Deploy a distributed rate limiter (Redis-backed) to prevent
      circumvention via IP rotation. Integrate the HaveIBeenPwned Passwords API using
      k-anonymity to block the most common breached passwords at registration and login.
      Implement device fingerprinting and geolocation-based risk scoring to detect anomalous
      login patterns. Use WAF rules to detect and block known credential stuffing tool signatures.
    tools:
      - kong
      - envoy
      - redis
      - cloudflare-waf
      - aws-waf
      - recaptcha
      - haveibeenpwned-api
      - keycloak

  devsecops:
    prose: >-
      Write automated tests that verify rate limiting behavior: confirm that the 101st failed
      attempt within one hour is blocked. Test that CAPTCHA triggers activate at the configured
      threshold. Include credential stuffing simulation in periodic penetration test scopes.
      Validate WAF rule configurations through infrastructure-as-code reviews. Scan authentication
      code for missing rate-limit decorators or middleware. Implement load tests that simulate
      brute-force patterns to verify the anti-automation stack holds under pressure.
    tools:
      - owasp-zap
      - burp-suite
      - nuclei
      - k6
      - gitlab-ci
      - selenium
      - conftest

  secops:
    prose: >-
      Configure SIEM rules to detect credential stuffing patterns: high-volume failed logins
      from rotating IPs targeting multiple accounts, or sustained failed attempts against a
      single account. Establish dashboards tracking failed authentication rates by source IP,
      geographic region, and user agent. Set up automated response playbooks that temporarily
      block source IP ranges during active credential stuffing campaigns. Correlate
      authentication failures with threat intelligence feeds to identify known attacker
      infrastructure. Review rate limiter effectiveness metrics weekly.
    tools:
      - splunk
      - elastic-siem
      - crowdstrike
      - pagerduty
      - datadog-security
      - cloudflare-security-analytics

