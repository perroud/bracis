id: art-9
family: gen
title: "Transparency and fairness in automated decision-making"
class: PIPL
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 7: The processing of personal information shall follow the principles of openness and
    transparency. The rules for processing personal information shall be disclosed, and the processing
    purpose, method, and scope shall be clearly indicated.
    Article 8: The processing of personal information shall ensure the quality of personal information
    and avoid adverse effects on the rights and interests of natural persons due to inaccurate or
    incomplete personal information.
    Article 9: Personal information processors shall be responsible for their personal information
    processing activities and shall take necessary measures to safeguard the security of the personal
    information they process.
    Article 10: No organization or individual may illegally collect, use, process, or transmit the
    personal information of others, or illegally buy, sell, provide, or disclose the personal information
    of others, or engage in personal information processing activities that endanger national security
    or the public interest.

guidance:
  prose: >-
    Articles 7 through 10 establish the transparency, data quality, accountability, and lawful use
    principles of PIPL. Article 7 requires processing rules to be publicly disclosed with clear
    indication of purpose, method, and scope. This is stricter than GDPR's transparency principle
    in that it requires disclosure of processing methods, not just purposes. Article 8 imposes an
    affirmative duty to ensure data quality, creating potential liability for decisions based on
    inaccurate data. Article 9 establishes the accountability principle, making processors directly
    responsible for security. Article 10 includes a unique provision prohibiting processing activities
    that endanger national security or public interest, reflecting PIPL's dual purpose of protecting
    both individual rights and state interests.

references:
  - citation: "PIPL, Articles 7–10"
    url: "http://www.npc.gov.cn/npc/c30834/202108/a8c4e3672c74491a80b53a172bb753fe.shtml"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a transparency portal that publicly documents all personal information processing
      activities, including purposes, methods, scope, and retention periods. Build data quality
      pipelines that validate, deduplicate, and enrich personal information at ingestion time.
      Deploy automated data quality monitoring with alerting for anomalies that could indicate
      inaccurate or incomplete records. Implement a processing activity registry accessible
      through self-service APIs for internal compliance audits.
    tools:
      - "Transparency portal (custom web application)"
      - "Data quality frameworks (Great Expectations, Deequ, Soda)"
      - "Processing activity registry (custom CRUD service)"
      - "Data observability platforms (Monte Carlo, Datadog Data Jobs Monitoring)"
  devsecops:
    prose: >-
      Pipeline checks must verify that services declare their processing purpose, method, and scope
      in structured metadata. Data quality tests must be part of the CI/CD pipeline for any service
      that ingests personal information. Code reviews must verify that privacy notices are updated
      when processing activities change. Automated tests must validate that publicly disclosed
      processing rules match actual system behavior.
    tools:
      - "CI/CD data quality gates (Great Expectations in pipeline)"
      - "Privacy notice validation tests (Playwright, Cypress)"
      - "Processing metadata linters"
      - "Behavioral compliance testing frameworks"
  secops:
    prose: >-
      Monitor for processing activities that are not disclosed in the transparency portal.
      Alert when data quality metrics fall below defined thresholds. Track changes to processing
      activities and verify corresponding updates to public disclosures. Monitor for unauthorized
      personal information transfers that could endanger national security or public interest.
    tools:
      - "SIEM with processing activity monitoring"
      - "Data quality dashboards with alerting"
      - "Change detection for privacy notices"
      - "DLP monitoring for unauthorized transfers"

legal_references:
  - framework_id: gdpr
    articles: ["art-5"]
    relationship: equivalent-to
  - framework_id: iso-27701
    articles: ["7.2.2"]
    relationship: complements
