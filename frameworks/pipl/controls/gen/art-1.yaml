id: art-1
family: gen
title: "Purpose, scope, and extraterritorial application"
class: PIPL
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 1: This Law is formulated in accordance with the Constitution for the purpose of protecting
    personal information rights and interests, regulating personal information processing activities,
    and promoting the reasonable use of personal information.
    Article 2: The personal information of natural persons is protected by law. No organization or
    individual may infringe upon the personal information rights and interests of natural persons.
    Article 3: This Law applies to the processing of personal information of natural persons within
    the territory of the People's Republic of China. This Law also applies to the processing outside
    the territory of the People's Republic of China of personal information of natural persons within
    the territory of the People's Republic of China under any of the following circumstances:
    (1) Where the purpose is to provide products or services to natural persons within the territory;
    (2) Where the activities of natural persons within the territory are analyzed or assessed;
    (3) Other circumstances provided for by laws or administrative regulations.

guidance:
  prose: >-
    Articles 1 through 3 establish the legislative purpose, constitutional basis, and jurisdictional scope
    of the PIPL. The law applies to any processing of personal information of individuals located in China,
    regardless of whether the processor is established in China. The extraterritorial reach in Article 3 is
    comparable to GDPR Article 3, but broader in certain respects: it covers any analysis or assessment of
    behavior of natural persons within China. Organizations outside China that fall within scope must
    establish a dedicated entity or appoint a representative within China (Article 53). Compliance teams
    must map all data flows involving Chinese individuals to determine whether PIPL applies.

references:
  - citation: "PIPL, Articles 1–3"
    url: "http://www.npc.gov.cn/npc/c30834/202108/a8c4e3672c74491a80b53a172bb753fe.shtml"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement geo-detection at the API gateway and CDN level to identify requests originating from
      China or involving Chinese user data. Maintain a data processing registry that flags processing
      activities subject to PIPL jurisdiction. Deploy data residency tagging in metadata services to
      annotate records with jurisdictional markers. Build dashboards that visualize data flows crossing
      Chinese borders. Configure infrastructure-as-code templates to enforce PIPL-specific data handling
      policies in China-region deployments.
    tools:
      - "API Gateway with geo-detection (Kong, APISIX, Envoy)"
      - "Data catalog with jurisdictional tagging (Apache Atlas, Amundsen)"
      - "Infrastructure-as-code with region-specific policies (Terraform, Pulumi)"
      - "Network flow visualization (Cilium Hubble, Istio Kiali)"
  devsecops:
    prose: >-
      Integrate PIPL scope checks into CI/CD pipelines. Require developers to annotate services that
      process Chinese personal information with jurisdiction metadata. Pipeline gates should verify that
      data processing activities targeting Chinese users are registered in the compliance registry.
      Code review checklists must include PIPL applicability assessment for new features involving
      personal information.
    tools:
      - "CI/CD pipeline with jurisdiction verification gates (GitLab CI, GitHub Actions)"
      - "Policy-as-code for data residency (Open Policy Agent, Kyverno)"
      - "Code annotation linters for jurisdiction metadata"
  secops:
    prose: >-
      Monitor data flows for unregistered processing of Chinese personal information. Alert when
      data classified as PIPL-scoped is transferred outside approved channels. Maintain a real-time
      inventory of all processing activities subject to PIPL. Conduct periodic jurisdictional
      assessments to identify new services that may fall within PIPL scope.
    tools:
      - "SIEM with data flow monitoring (Splunk, Elastic Security)"
      - "DLP tools for jurisdictional data classification (Nightfall, BigID)"
      - "Compliance inventory dashboards"

legal_references:
  - framework_id: gdpr
    articles: ["art-1"]
    relationship: equivalent-to
  - framework_id: lgpd
    articles: ["art-1"]
    relationship: equivalent-to
