id: art-66
family: enforcement
title: "Penalties for violations of personal information protection obligations"
class: PIPL
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 66: Where a violation of the provisions of this Law in the processing of personal information,
    or the processing of personal information without adopting the necessary security protection measures
    as provided in this Law, the department performing personal information protection duties shall order
    the correction, give a warning, and confiscate the illegal gains. The application program providing
    personal information processing services in violation of provisions may be ordered to suspend or
    terminate the provision of services. Where correction is refused, a fine of not more than one million
    yuan shall be imposed. The directly responsible person in charge and other directly responsible
    personnel shall be fined not less than ten thousand yuan but not more than one hundred thousand yuan.
    Where the illegal acts specified in the preceding paragraph are of a serious nature, the department
    performing personal information protection duties shall order the correction, confiscate the illegal
    gains, and impose a fine of not more than fifty million yuan or not more than five percent of the
    previous year's turnover. It may also order the suspension of related business activities, or the
    suspension of business for rectification, and report to the relevant competent department for the
    revocation of relevant business permits or business licenses. The directly responsible person in
    charge and other directly responsible personnel shall be fined not less than one hundred thousand yuan
    but not more than one million yuan, and may also be prohibited from serving as directors, supervisors,
    senior managers, and persons responsible for personal information protection of relevant enterprises
    for a specified period.
    Article 69: Where the processing of personal information infringes upon the personal information
    rights and interests and causes damage, and the personal information processor cannot prove that it
    is not at fault, it shall bear tort liability. Where the preceding circumstances cause damage to the
    rights and interests of a large number of individuals, the people's procuratorate, legal organizations
    established in accordance with the law, and organizations designated by the national cyberspace
    administration may file a lawsuit with the people's court in accordance with the law.
    Article 71: Where a violation of the provisions of this Law constitutes a violation of public security
    management, public security management penalties shall be imposed in accordance with the law. Where
    a crime is constituted, criminal liability shall be pursued in accordance with the law.

guidance:
  prose: >-
    Articles 66 through 71 establish the penalty framework under PIPL, which is among the most severe
    globally. The penalty structure has two tiers: standard violations (up to 1 million RMB for the
    entity, 10,000-100,000 RMB for responsible individuals) and serious violations (up to 50 million
    RMB or 5% of previous year's turnover, whichever is higher, plus 100,000-1,000,000 RMB for
    responsible individuals). For serious violations, additional penalties include: suspension of
    services, business rectification, revocation of business licenses, and prohibition of responsible
    individuals from serving in senior management or data protection roles. Article 69 establishes
    a reverse burden of proof for tort liability: the processor must prove it was not at fault.
    Article 69 also enables public interest litigation by the procuratorate and designated organizations.
    Article 71 extends liability to criminal prosecution where violations constitute crimes. The
    combination of administrative, civil, and criminal liability creates a comprehensive enforcement
    framework that demands serious compliance investment.

references:
  - citation: "PIPL, Articles 66–71"
    url: "http://www.npc.gov.cn/npc/c30834/202108/a8c4e3672c74491a80b53a172bb753fe.shtml"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement comprehensive compliance monitoring to minimize penalty exposure. Build
      real-time compliance dashboards that track adherence to all PIPL obligations with
      risk scoring based on potential penalty exposure. Deploy automated remediation
      workflows that trigger immediate corrective actions when violations are detected.
      Implement financial impact assessment tools that calculate potential penalty exposure
      based on current compliance status. Build evidence preservation systems that maintain
      compliance records needed to demonstrate due diligence and shift burden of proof in
      tort claims.
    tools:
      - "Compliance risk scoring dashboards"
      - "Automated remediation workflows"
      - "Financial penalty exposure calculators"
      - "Evidence preservation and chain-of-custody systems"
      - "Real-time compliance monitoring platforms"
  devsecops:
    prose: >-
      Pipeline gates must block deployments that introduce PIPL compliance violations.
      Automated compliance scanning must identify violations before they reach production.
      Build compliance scorecards for each service that quantify penalty risk. CI/CD must
      generate compliance evidence that can demonstrate due diligence. Deployment pipelines
      must include PIPL-specific security validation as a mandatory gate.
    tools:
      - "Compliance violation detection gates in CI/CD"
      - "Service-level compliance scorecards"
      - "Due diligence evidence generation in pipelines"
      - "PIPL-specific security validation (custom rules)"
  secops:
    prose: >-
      Maintain penalty risk awareness across the organization through regular compliance
      reporting to leadership. Monitor enforcement actions against peer organizations to
      calibrate compliance investment. Track individual accountability by maintaining
      records of responsible persons and their compliance obligations. Conduct periodic
      penalty exposure assessments based on current compliance gaps. Maintain incident
      escalation procedures that account for personal liability of senior management.
    tools:
      - "Penalty exposure assessment tools"
      - "Enforcement action monitoring and intelligence"
      - "Individual accountability tracking"
      - "Executive compliance reporting dashboards"
      - "Incident escalation with personal liability awareness"

