id: art-62
family: enforcement
title: "Supervisory authority and regulatory powers"
class: PIPL
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 60: The national cyberspace administration is responsible for the overall planning and
    coordination of the protection of personal information and the related supervision and management
    work. The relevant departments of the State Council shall be responsible for the protection of
    personal information and the related supervision and management work within the scope of their
    respective duties and responsibilities in accordance with the provisions of this Law and relevant
    laws and administrative regulations. The relevant departments of the local people's governments
    at or above the county level shall be responsible for the protection of personal information and
    the related supervision and management work within the scope of their respective duties and
    responsibilities in accordance with the provisions of this Law and relevant laws and administrative
    regulations.
    Article 61: The departments performing personal information protection duties shall perform the
    following duties:
    (1) Conducting publicity and education on personal information protection and guiding and supervising
    personal information processors in the protection of personal information;
    (2) Accepting and handling complaints and reports related to the protection of personal information;
    (3) Organizing the assessment and evaluation of applications and personal information protection status;
    (4) Investigating and handling illegal personal information processing activities;
    (5) Other duties as provided by laws or administrative regulations.
    Article 62: The national cyberspace administration shall coordinate the relevant departments to
    promote the following personal information protection work on the basis of their respective duties:
    (1) Formulating specific rules and standards for personal information protection;
    (2) Formulating specialized rules and standards for personal information protection for small
    personal information processors, processing of sensitive personal information, and facial
    recognition and artificial intelligence;
    (3) Supporting research and development of and promoting the application of secure and convenient
    technologies for electronic identity authentication;
    (4) Promoting the formulation of personal information protection social norms by relevant
    departments, trade organizations, and other entities, and guiding personal information processors
    in formulating personal information protection rules for personal information processing activities.

guidance:
  prose: >-
    Articles 60 through 62 establish the regulatory structure for PIPL enforcement. The Cyberspace
    Administration of China (CAC) is the primary supervisory authority with overall coordination
    responsibility. However, PIPL enforcement is distributed across multiple agencies: the CAC,
    the Ministry of Industry and Information Technology (MIIT), the Ministry of Public Security
    (MPS), and sector-specific regulators (e.g., PBOC for financial services, NHC for healthcare).
    This multi-regulator model is more complex than GDPR's lead supervisory authority approach.
    Article 61 defines five categories of regulatory powers: education, complaint handling,
    assessment and evaluation, investigation and enforcement, and other statutory duties.
    Article 62 specifically mandates the CAC to develop specialized rules for small processors,
    sensitive data, facial recognition, and AI — signaling regulatory focus areas. Organizations
    must maintain relationships with multiple regulators depending on their industry and data
    processing activities.

references:
  - citation: "PIPL, Articles 60–62"
    url: "http://www.npc.gov.cn/npc/c30834/202108/a8c4e3672c74491a80b53a172bb753fe.shtml"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build a regulatory compliance management system that tracks applicable regulators
      based on industry, data types, and processing activities. Implement audit-ready
      logging and reporting that can produce compliance evidence on demand for regulatory
      inspections. Deploy assessment and evaluation readiness tools that automate compliance
      status reporting. Build complaint and report handling workflows that integrate with
      regulatory submission channels. Maintain regulatory change monitoring to track new
      rules and standards from the CAC and sector-specific regulators.
    tools:
      - "GRC platform for multi-regulator compliance tracking"
      - "Audit-ready logging and evidence generation"
      - "Compliance status dashboards and reporting"
      - "Complaint handling workflow (ServiceNow, custom)"
      - "Regulatory change monitoring feeds"
  devsecops:
    prose: >-
      Pipeline checks must generate compliance evidence that demonstrates adherence to
      PIPL requirements. Build automated compliance reports that can be submitted to
      regulators on request. CI/CD must include audit trail generation for all changes
      affecting personal information processing. Deployment documentation must include
      regulatory compliance mapping for each service. Maintain versioned compliance
      configurations that track changes over time.
    tools:
      - "Compliance evidence generation in CI/CD"
      - "Automated compliance reporting"
      - "Audit trail generation for processing changes"
      - "Compliance configuration version control"
  secops:
    prose: >-
      Maintain regulatory communication channels with the CAC and relevant sector-specific
      regulators. Track regulatory inspection schedules and prepare compliance evidence in
      advance. Monitor for regulatory enforcement actions in the industry to identify
      emerging compliance risks. Maintain incident escalation procedures for regulatory
      reporting requirements. Conduct periodic internal compliance audits aligned with
      regulatory expectations.
    tools:
      - "Regulatory communication management"
      - "Compliance evidence repository"
      - "Regulatory enforcement monitoring"
      - "Internal compliance audit scheduling"

