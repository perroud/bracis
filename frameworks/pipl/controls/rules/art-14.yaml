id: art-14
family: rules
title: "Consent requirements for processing personal information"
class: PIPL
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 14: Where the processing of personal information is based on the consent of the individual,
    such consent shall be given by the individual on a voluntary and explicit basis with full knowledge
    of the relevant facts. Where laws or administrative regulations provide that the processing of
    personal information requires separate consent or written consent from the individual, such
    provisions shall prevail. Where there is a change in the purpose of processing personal information,
    the method of processing, or the categories of personal information being processed, the consent
    of the individual shall be obtained anew.
    Article 15: Where the processing of personal information is based on the consent of the individual,
    the individual has the right to withdraw his or her consent. The personal information processor shall
    provide a convenient method for the individual to withdraw consent. The withdrawal of consent by the
    individual shall not affect the validity of the processing activities that have been carried out based
    on the consent of the individual prior to the withdrawal.
    Article 16: Personal information processors shall not refuse to provide products or services on the
    grounds that individuals do not consent to the processing of their personal information or withdraw
    their consent, except where the processing of personal information is necessary for the provision
    of the products or services.

guidance:
  prose: >-
    Articles 14 through 16 establish the consent framework under PIPL. Consent must be informed,
    voluntary, and explicit — this is a higher bar than GDPR's "unambiguous indication" for regular
    processing. Article 14 specifically requires re-consent when processing changes in purpose, method,
    or data categories. Article 15 establishes the right to withdraw consent with a convenience
    requirement — processors must make withdrawal as easy as giving consent. Article 16 prohibits
    "consent bundling" where services are conditioned on consent to unnecessary processing. This
    anti-tying provision is actively enforced by the CAC, particularly against mobile applications.
    The combination of strict consent requirements and the absence of a legitimate interest basis
    makes consent management a critical compliance function under PIPL.

references:
  - citation: "PIPL, Articles 14–16"
    url: "http://www.npc.gov.cn/npc/c30834/202108/a8c4e3672c74491a80b53a172bb753fe.shtml"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement consent collection UIs that meet PIPL's strict requirements: present processing
      purpose, method, and data categories in plain language before collecting consent. Build
      consent withdrawal mechanisms that are as accessible as consent collection (same number
      of clicks, same visibility). Implement re-consent detection that automatically triggers
      new consent flows when processing parameters change. Ensure service availability is not
      degraded for users who withdraw consent from non-essential processing. Build consent
      receipt generation that provides individuals with proof of consent given.
    tools:
      - "Consent UI components with PIPL-compliant templates"
      - "Consent withdrawal self-service portal"
      - "Re-consent triggering system (event-driven)"
      - "Feature flagging for consent-dependent features (LaunchDarkly, Unleash)"
      - "Consent receipt generation service"
  devsecops:
    prose: >-
      Automated UI tests must verify that consent withdrawal is as easy as consent collection.
      Pipeline checks must ensure that new features do not condition core service availability
      on consent to non-essential processing. Accessibility audits must verify that consent
      interfaces are usable. Re-consent workflows must be tested in staging environments
      before deployment. Code reviews must flag any logic that degrades service for users
      who withdraw consent.
    tools:
      - "UI testing for consent parity (Playwright, Cypress)"
      - "Accessibility testing (axe-core, Lighthouse)"
      - "Feature flag validation in CI/CD"
      - "Service degradation testing for consent withdrawal"
  secops:
    prose: >-
      Monitor consent withdrawal rates and investigate spikes that may indicate usability
      issues with consent mechanisms. Alert when services degrade for users who have withdrawn
      consent from non-essential processing. Track re-consent trigger events and verify they
      result in actual re-consent collection. Conduct periodic audits comparing consent
      collection ease versus withdrawal ease.
    tools:
      - "Consent analytics dashboards"
      - "Service availability monitoring per consent status"
      - "Re-consent workflow monitoring"
      - "User experience monitoring for consent flows"

legal_references:
  - framework_id: gdpr
    articles: ["art-6", "art-7"]
    relationship: equivalent-to
  - framework_id: lgpd
    articles: ["art-8"]
