id: art-25
family: rules
title: "Prohibition of discrimination through automated decision-making"
class: PIPL
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 24 (Paragraph 2): Personal information processors that use personal information to
    conduct automated decision-making shall ensure the transparency of the decision-making and the
    fairness and impartiality of the results, and shall not impose unreasonable differential treatment
    on individuals in terms of transaction prices and other transaction conditions.
    Article 25: Personal information processors shall not use personal information to conduct automated
    decision-making that unreasonably differentiates treatment of individuals in terms of transaction
    prices, and other such transaction conditions. Where personal information is used to conduct
    automated decision-making for information pushing or commercial marketing to individuals, an option
    to decline personalized recommendations shall be provided simultaneously, or a convenient method
    for the individual to refuse shall be provided.

guidance:
  prose: >-
    Article 24 (paragraph 2) and Article 25 address automated decision-making, which is a significant
    area of PIPL enforcement. The law requires transparency of automated decisions, fairness and
    impartiality of results, and prohibits unreasonable price discrimination. The specific focus
    on pricing discrimination reflects China's regulatory concern over algorithmic pricing practices
    by e-commerce platforms (often referred to as "big data killing familiar customers"). For
    personalized recommendations and commercial marketing, individuals must be given the option
    to opt out. This provision has been supplemented by the Cyberspace Administration of China's
    "Provisions on the Management of Algorithmic Recommendations of Internet Information Services"
    (effective March 2022), which provides detailed implementation requirements.

references:
  - citation: "PIPL, Articles 24–25"
    url: "http://www.npc.gov.cn/npc/c30834/202108/a8c4e3672c74491a80b53a172bb753fe.shtml"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement algorithmic transparency by maintaining a registry of all automated decision-making
      systems that process personal information. Each system must document: input data, decision
      logic, output criteria, and fairness metrics. Build fairness monitoring dashboards that
      detect pricing discrimination or unreasonable differential treatment based on personal
      information profiles. Implement opt-out mechanisms for personalized recommendations at
      the platform level, ensuring users can disable personalization with a single action.
      Deploy A/B testing frameworks that include fairness constraints to prevent discriminatory
      outcomes. Build audit trails for automated decisions that enable individual review requests.
    tools:
      - "ML model registry with fairness documentation (MLflow, Kubeflow)"
      - "Fairness monitoring (AI Fairness 360, Fairlearn)"
      - "Personalization opt-out toggle (feature flags)"
      - "Algorithmic audit trail (custom logging service)"
      - "Price discrimination detection analytics"
  devsecops:
    prose: >-
      CI/CD pipelines for ML models must include fairness testing as a deployment gate. Model
      validation must verify that automated decisions do not produce unreasonable price
      discrimination. Code reviews for recommendation systems must verify that opt-out
      mechanisms are implemented. Pipeline checks must ensure that algorithmic transparency
      documentation is updated when decision logic changes. Automated tests must validate
      that opt-out of personalization does not degrade core service quality.
    tools:
      - "ML pipeline fairness gates (custom CI checks)"
      - "Fairness testing frameworks (Fairlearn, AIF360)"
      - "Recommendation opt-out integration tests"
      - "Algorithmic documentation validation in CI"
  secops:
    prose: >-
      Monitor automated decision-making systems for discriminatory patterns. Alert when
      fairness metrics exceed defined thresholds. Track opt-out rates for personalized
      recommendations and investigate unusually low rates that may indicate broken opt-out
      mechanisms. Conduct periodic audits of pricing algorithms for discriminatory patterns.
      Monitor for complaints related to automated decisions.
    tools:
      - "Fairness metric dashboards with alerting"
      - "Pricing algorithm audit tools"
      - "Opt-out rate monitoring and analytics"
      - "Automated decision complaint tracking"

legal_references:
  - framework_id: gdpr
    articles: ["art-22"]
    relationship: equivalent-to
  - framework_id: eu-ai-act
    articles: ["art-14"]
    relationship: complements
