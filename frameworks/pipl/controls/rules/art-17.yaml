id: art-17
family: rules
title: "Obligation to inform data subjects before processing"
class: PIPL
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 17: Before processing personal information, a personal information processor shall
    truthfully, accurately, and completely inform the individual of the following matters in a
    conspicuous manner and in clear and plain language:
    (1) The name or personal name and contact information of the personal information processor;
    (2) The purpose and method of processing personal information, the categories of personal
    information to be processed, and the retention period;
    (3) The methods and procedures for the individual to exercise the rights provided in this Law;
    (4) Other matters that shall be notified as provided by laws or administrative regulations.
    Where there is a change in any of the matters specified in the preceding paragraph, the individual
    shall be notified of the change. Where a personal information processor informs the individual of
    the matters listed in the first paragraph through the formulation of processing rules for personal
    information, such processing rules shall be made publicly available and shall be convenient to read
    and keep.

guidance:
  prose: >-
    Article 17 establishes the notification obligation that must be fulfilled before any processing
    begins. The requirements are more prescriptive than GDPR Articles 13-14 in some respects:
    PIPL mandates that the notification be "conspicuous" and in "clear and plain language," and
    specifically requires disclosure of the retention period, not just the criteria for determining
    it. Processing rules must be publicly available and "convenient to read and keep," implying
    they must be downloadable or printable. Any change to the disclosed matters triggers a
    re-notification obligation. This article is foundational for PIPL compliance as it sets the
    baseline for transparency across all processing activities.

references:
  - citation: "PIPL, Article 17"
    url: "http://www.npc.gov.cn/npc/c30834/202108/a8c4e3672c74491a80b53a172bb753fe.shtml"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a privacy notice management system that generates and serves notices dynamically
      based on the processing activities applicable to each user context. Notices must include:
      processor identity and contact, processing purpose and method, data categories, retention
      periods, and rights exercise procedures. Build a notice versioning system with change
      detection that triggers re-notification when any disclosed matter changes. Ensure notices
      are presented before processing begins (not after) through pre-processing consent gates.
      Make processing rules downloadable in portable formats (PDF, HTML).
    tools:
      - "Privacy notice management system (custom or OneTrust)"
      - "Notice versioning with change detection"
      - "Pre-processing consent gates at API layer"
      - "Notice rendering in multiple formats (PDF, HTML)"
      - "Centralized processing activity registry"
  devsecops:
    prose: >-
      Pipeline checks must verify that every new processing activity has a corresponding privacy
      notice entry. Automated tests must validate that notices are displayed before processing
      begins. Content validation tests must verify that notices contain all required elements
      (processor identity, purpose, method, categories, retention, rights). Change detection
      in CI must flag processing activity changes that require notice updates.
    tools:
      - "Privacy notice completeness validation in CI"
      - "Pre-processing notice display tests (Playwright, Cypress)"
      - "Content schema validation for notice elements"
      - "Processing change detection with notice sync verification"
  secops:
    prose: >-
      Monitor for processing activities that begin without a prior notice. Track notice versions
      and verify re-notification when changes occur. Audit notice content for completeness against
      PIPL requirements. Alert when processing parameters change without corresponding notice
      updates. Monitor notice accessibility and availability.
    tools:
      - "Processing activity monitoring linked to notice registry"
      - "Notice completeness audit tools"
      - "Re-notification tracking and verification"
      - "Notice availability monitoring"

legal_references:
