id: art-26
family: rules
title: "Personal information processing in public places"
class: PIPL
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 26: Where image collection or personal identification equipment is installed in public
    places, it shall be for the purpose of maintaining public security and shall be in compliance
    with relevant state regulations. Clear indication signs shall be set up. The collected personal
    images and personal identification information may only be used for the purpose of maintaining
    public security, and shall not be used for other purposes, except where separate consent of the
    individual has been obtained.
    Article 27: Where a personal information processor processes personal information that has been
    disclosed by the individual or otherwise lawfully disclosed, it may do so within a reasonable
    scope. However, where the individual has expressly refused, the processing shall comply with the
    provisions of this Law. Where the processing of personal information disclosed by individuals has
    a significant impact on the rights and interests of the individual, the provisions of this Law
    on the processing of personal information shall be complied with.

guidance:
  prose: >-
    Article 26 specifically addresses surveillance and facial recognition technology in public places.
    This is a uniquely detailed provision compared to GDPR, reflecting China's regulatory response
    to the proliferation of surveillance technology. Image collection and personal identification
    equipment in public places must (1) serve the purpose of public security, (2) comply with state
    regulations, and (3) display clear indication signs. Collected data is strictly purpose-limited
    to public security unless separate consent is obtained. Article 27 addresses processing of
    publicly available personal information, allowing processing within a reasonable scope unless
    the individual expressly objects. When such processing significantly impacts individual rights,
    full PIPL protections apply. These provisions are particularly relevant for companies deploying
    IoT devices, smart cameras, or biometric systems.

references:
  - citation: "PIPL, Articles 26–27"
    url: "http://www.npc.gov.cn/npc/c30834/202108/a8c4e3672c74491a80b53a172bb753fe.shtml"

implementation_guidance:
  platform_engineering:
    prose: >-
      For systems that collect images or biometric data in public spaces, implement strict purpose
      limitation controls that restrict data use to public security purposes. Deploy signage
      management systems that track and verify physical notice placements for surveillance
      equipment. Build access controls that prevent collected surveillance data from being used
      for non-security purposes without separate consent. Implement automated data deletion
      for surveillance data that exceeds retention limits. For processing publicly available
      data, build purpose-scope validators that restrict processing to reasonable scope and
      honor opt-out requests.
    tools:
      - "Surveillance data management with purpose-limitation (custom)"
      - "Digital signage and notice management systems"
      - "Access control with purpose verification for biometric data"
      - "Automated data retention enforcement"
      - "Opt-out registry for publicly available data processing"
  devsecops:
    prose: >-
      Pipeline checks must verify that surveillance data processing is purpose-limited to
      public security. Code reviews for IoT and camera systems must verify signage
      requirements are addressed. Security scanning must detect biometric data in
      non-authorized data stores. Automated tests must validate that surveillance data
      access is restricted to security-authorized personnel and systems.
    tools:
      - "Purpose-limitation validation in CI"
      - "Biometric data detection scanning"
      - "Access control verification tests"
      - "IoT device compliance validation"
  secops:
    prose: >-
      Monitor access to surveillance and biometric data stores for unauthorized use beyond
      public security purposes. Alert when biometric data appears in non-authorized systems
      or data stores. Conduct physical audits of signage at surveillance equipment locations.
      Track opt-out requests for publicly available data processing and verify enforcement.
    tools:
      - "Biometric data access monitoring"
      - "Physical signage audit checklists"
      - "Unauthorized data use detection in SIEM"
      - "Opt-out enforcement monitoring"

legal_references:
