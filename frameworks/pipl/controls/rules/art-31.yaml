id: art-31
family: rules
title: "Protection of minors' personal information"
class: PIPL
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 31: Where a personal information processor processes the personal information of a minor
    under the age of fourteen, it shall obtain the consent of the minor's parent or other guardian.
    Where a personal information processor processes the personal information of a minor under the
    age of fourteen, it shall formulate specialized processing rules for the personal information
    of minors.
    Article 32: Where laws or administrative regulations provide for the processing of sensitive
    personal information that requires the relevant administrative license to be obtained or impose
    other restrictions, such provisions shall prevail.

guidance:
  prose: >-
    Article 31 establishes special protections for minors under 14, treating all their personal
    information as sensitive personal information (as defined in Article 28). Two key requirements
    apply: (1) parental or guardian consent is mandatory for processing any personal information
    of minors under 14, and (2) processors must formulate specialized processing rules specific
    to minors' data. This is comparable to GDPR Article 8 (which sets the threshold at 16,
    adjustable to 13 by member states) and the US COPPA (which sets the threshold at 13).
    The PIPL threshold of 14 is fixed and cannot be adjusted. Article 32 adds that where other
    laws require administrative licenses or impose additional restrictions on sensitive data
    processing, those requirements apply in addition to PIPL obligations. Organizations targeting
    or knowingly processing data of Chinese minors must implement age verification, parental
    consent mechanisms, and child-specific privacy policies.

references:
  - citation: "PIPL, Articles 31–32"
    url: "http://www.npc.gov.cn/npc/c30834/202108/a8c4e3672c74491a80b53a172bb753fe.shtml"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement age verification at registration and data collection points to identify users
      under 14. Build parental consent workflows that verify guardian identity before processing
      minors' personal information. Deploy age-gated features that restrict data collection
      from minors to only what is strictly necessary. Maintain separate processing rules and
      privacy policies for minors' data, published in age-appropriate language. Implement
      enhanced data protection measures for minors' data including restricted access controls
      and shorter retention periods.
    tools:
      - "Age verification service (custom or third-party)"
      - "Parental consent verification workflow"
      - "Age-gated feature flags (LaunchDarkly, Unleash)"
      - "Child-specific privacy policy management"
      - "Enhanced access control for minors' data"
  devsecops:
    prose: >-
      Pipeline checks must verify that features targeting or accessible to minors include
      age verification gates. Automated tests must validate parental consent workflows.
      Code reviews must verify that data collection from minors is minimized. CI checks
      must ensure child-specific processing rules are published and accessible. Security
      scans must verify enhanced protection measures for minors' data stores.
    tools:
      - "Age verification integration tests"
      - "Parental consent workflow testing"
      - "Data minimization validation for minor-facing features"
      - "Child privacy policy accessibility tests"
  secops:
    prose: >-
      Monitor for processing of minors' personal information without verified parental
      consent. Alert when minor-flagged data is accessed by unauthorized personnel.
      Conduct periodic audits of age verification effectiveness. Track parental consent
      rates and investigate low consent rates that may indicate broken verification flows.
      Monitor retention periods for minors' data and enforce shorter expiration.
    tools:
      - "Minor data access monitoring in SIEM"
      - "Parental consent compliance dashboards"
      - "Age verification effectiveness audits"
      - "Retention period enforcement for minors' data"

legal_references:
  - framework_id: gdpr
    articles: ["art-8"]
    relationship: equivalent-to
  - framework_id: coppa
    articles: ["sec-312.3"]
    relationship: equivalent-to
