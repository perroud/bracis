id: art-43
family: xborder
title: "Retaliatory measures and cross-border restrictions"
class: PIPL
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 42: Where an overseas organization or individual engages in personal information processing
    activities that infringe upon the personal information rights and interests of citizens of the
    People's Republic of China, or that endanger the national security or public interest of the
    People's Republic of China, the national cyberspace administration may include such organization
    or individual on a list restricting or prohibiting the provision of personal information, make a
    public announcement, and adopt measures such as restricting or prohibiting the provision of
    personal information to such overseas organization or individual.
    Article 43: Where any country or region adopts discriminatory prohibitions, limitations, or other
    similar measures against the People's Republic of China in the area of personal information
    protection, the People's Republic of China may adopt reciprocal measures against such country
    or region based on the actual circumstances.

guidance:
  prose: >-
    Articles 42 and 43 establish enforcement mechanisms specific to cross-border scenarios. Article 42
    empowers the CAC to create a restricted entity list for overseas organizations or individuals that
    infringe on Chinese citizens' personal information rights or endanger national security. Being
    placed on this list effectively blocks the entity from receiving personal information from China.
    Article 43 establishes a retaliatory mechanism where China can adopt reciprocal measures against
    countries that impose discriminatory restrictions on China regarding personal information protection.
    These provisions are unique to PIPL and have no direct GDPR equivalent. They create compliance
    uncertainty for multinational organizations, as geopolitical tensions could trigger reciprocal
    measures affecting data flows. Compliance teams must monitor the CAC restricted entity list and
    stay informed about geopolitical developments that could trigger Article 43 reciprocal measures.

references:
  - citation: "PIPL, Articles 42–43"
    url: "http://www.npc.gov.cn/npc/c30834/202108/a8c4e3672c74491a80b53a172bb753fe.shtml"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a restricted entity registry that integrates with the CAC's restricted entity
      list and blocks data transfers to listed organizations. Build automated monitoring that
      checks overseas data recipients against the restricted list before each transfer. Deploy
      circuit breaker patterns that can rapidly halt cross-border data flows if reciprocal
      measures are triggered. Maintain contingency data processing infrastructure within
      China that can assume full processing responsibilities if cross-border transfers are
      suspended. Build data flow rerouting capabilities to redirect traffic away from
      restricted entities.
    tools:
      - "Restricted entity list integration service"
      - "Pre-transfer recipient verification (custom middleware)"
      - "Circuit breaker for cross-border data flows"
      - "Contingency China-region infrastructure"
      - "Data flow rerouting capabilities (Istio, Envoy)"
  devsecops:
    prose: >-
      Pipeline checks must verify that third-party integrations are not on the CAC restricted
      entity list. Deployment pipelines must include restricted entity verification for new
      international data flows. Infrastructure-as-code must include contingency configurations
      for China-only operation. Runbooks for rapid cross-border suspension must be maintained
      and tested periodically. Code reviews must flag new dependencies on overseas services
      for restricted entity assessment.
    tools:
      - "Restricted entity list checking in CI/CD"
      - "Contingency infrastructure-as-code templates"
      - "Cross-border suspension runbook automation"
      - "Overseas dependency analysis tools"
  secops:
    prose: >-
      Monitor the CAC restricted entity list for updates and trigger immediate data flow
      reviews when changes occur. Track geopolitical developments that could trigger Article 43
      reciprocal measures. Alert when data transfers are attempted to restricted entities.
      Conduct periodic tabletop exercises for cross-border suspension scenarios. Maintain
      incident response procedures for rapid cessation of cross-border transfers.
    tools:
      - "CAC restricted entity list monitoring"
      - "Geopolitical risk monitoring feeds"
      - "Restricted entity transfer alerting"
      - "Cross-border suspension incident response playbooks"

