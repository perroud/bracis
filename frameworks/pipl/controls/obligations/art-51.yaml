id: art-51
family: obligations
title: "Internal management and security measures for personal information protection"
class: PIPL
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 51: Personal information processors shall, in accordance with the purpose of processing
    personal information, the method of processing, the categories of personal information, and the
    impact on the rights and interests of individuals, as well as possible security risks, adopt the
    following measures to ensure that personal information processing activities comply with the
    provisions of laws and administrative regulations and prevent unauthorized access as well as the
    leaking, distortion, or loss of personal information:
    (1) Formulating internal management systems and operating procedures;
    (2) Implementing classified management of personal information;
    (3) Adopting corresponding technical security measures such as encryption and de-identification;
    (4) Reasonably determining the operational authority for personal information processing and
    regularly conducting security education and training for working personnel;
    (5) Formulating and organizing the implementation of emergency plans for personal information
    security incidents;
    (6) Other measures provided for by laws or administrative regulations.
    Article 52: Where a personal information processor that processes personal information reaching
    the volume specified by the national cyberspace administration appoints a person responsible for
    personal information protection, who shall be responsible for supervising the personal information
    processing activities and the adoption of protection measures.
    Article 53: Where a personal information processor outside the territory of the People's Republic
    of China as specified in Article 3, Paragraph 2 of this Law shall establish a dedicated entity or
    designate a representative within the territory of the People's Republic of China to be responsible
    for matters related to the protection of the personal information it processes, and shall report
    the name and contact information of the relevant entity or representative to the departments
    performing personal information protection duties.

guidance:
  prose: >-
    Articles 51 through 53 establish the core organizational and technical obligations of personal
    information processors. Article 51 mandates six categories of protective measures: internal
    management systems, classified data management, technical security (encryption, de-identification),
    access control with training, incident response plans, and any additional measures required by
    other laws. Article 52 requires appointment of a person responsible for personal information
    protection (similar to GDPR's DPO) for processors exceeding volume thresholds. Article 53
    requires overseas processors within PIPL scope to establish a local entity or representative
    in China. These provisions create significant operational compliance requirements including
    documented policies, technical controls, staff training programs, incident response capabilities,
    and potentially physical presence in China.

references:
  - citation: "PIPL, Articles 51–53"
    url: "http://www.npc.gov.cn/npc/c30834/202108/a8c4e3672c74491a80b53a172bb753fe.shtml"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a comprehensive personal information protection framework including: data
      classification system with automatic tagging and enforcement, encryption for data at
      rest and in transit (AES-256, TLS 1.3), de-identification pipelines for analytics and
      non-production environments, role-based access control with least-privilege enforcement,
      and automated incident response playbooks. Build a security training tracking system
      that ensures all personnel with personal information access complete regular training.
      Deploy policy-as-code that enforces internal management rules at the infrastructure level.
      Implement logging and audit trails for all personal information processing operations.
    tools:
      - "Data classification (BigID, Microsoft Purview, AWS Macie)"
      - "Encryption management (HashiCorp Vault, AWS KMS, Azure Key Vault)"
      - "De-identification pipelines (ARX, Google DLP API)"
      - "RBAC platforms (Okta, KeyCloak with OPA)"
      - "Incident response automation (PagerDuty, Opsgenie with playbooks)"
      - "Security training LMS (custom or KnowBe4)"
      - "Audit logging (ELK Stack, Splunk)"
  devsecops:
    prose: >-
      CI/CD pipelines must enforce encryption for all personal information data stores.
      Infrastructure-as-code must include data classification tags and access control
      policies. Pipeline gates must verify that de-identification is applied in non-production
      environments. Security scanning must detect unencrypted personal information in code,
      configurations, and artifacts. Automated compliance checks must verify that access
      controls match the operational authority defined in internal management systems.
    tools:
      - "Encryption enforcement in CI/CD (Checkov, tfsec)"
      - "IaC data classification enforcement (OPA, Kyverno)"
      - "De-identification verification in staging environments"
      - "Secret and sensitive data scanning (GitLab Secret Detection, TruffleHog)"
      - "Access control compliance validation"
  secops:
    prose: >-
      Monitor access to personal information for unauthorized access attempts. Track
      training completion rates and alert when personnel with data access have not
      completed required training. Test incident response plans through periodic tabletop
      exercises. Monitor encryption status across all data stores and alert on unencrypted
      personal information. Conduct periodic access control reviews to verify least-privilege
      enforcement. Track DPO appointment and reporting obligations.
    tools:
      - "SIEM with personal information access monitoring"
      - "Training compliance tracking dashboards"
      - "Incident response testing and metrics"
      - "Encryption status monitoring"
      - "Access control review automation"

