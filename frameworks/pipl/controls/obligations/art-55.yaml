id: art-55
family: obligations
title: "Personal information protection impact assessment"
class: PIPL
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 54: Personal information processors shall regularly conduct compliance audits of their
    processing of personal information in compliance with laws and administrative regulations.
    Article 55: A personal information processor shall conduct a personal information protection impact
    assessment in advance and record the processing in any of the following circumstances:
    (1) Processing sensitive personal information;
    (2) Using personal information to conduct automated decision-making;
    (3) Entrusting the processing of personal information, providing personal information to other
    personal information processors, or disclosing personal information;
    (4) Providing personal information outside the territory of the People's Republic of China;
    (5) Other personal information processing activities that have a significant impact on the rights
    and interests of individuals.
    Article 56: The personal information protection impact assessment shall include the following:
    (1) Whether the purpose of processing personal information, the method of processing, and other
    matters are lawful, legitimate, and necessary;
    (2) The impact on the rights and interests of individuals and the security risks;
    (3) Whether the protection measures adopted are lawful, effective, and proportionate to the degree
    of risk.
    The personal information protection impact assessment report and processing records shall be
    retained for at least three years.

guidance:
  prose: >-
    Articles 54 through 56 establish the compliance audit and impact assessment obligations. Article 54
    requires regular compliance audits of all personal information processing activities, which is a
    broader obligation than GDPR's accountability principle. Article 55 mandates a personal information
    protection impact assessment (PIA) for five specific scenarios: sensitive data processing, automated
    decision-making, third-party sharing, cross-border transfers, and any processing with significant
    individual impact. This is comparable to GDPR's DPIA (Article 35) but covers a broader range of
    trigger scenarios. Article 56 specifies the assessment content: lawfulness, legitimacy, and necessity
    of processing; rights impact and security risks; and proportionality of protection measures. Impact
    assessment reports and processing records must be retained for at least three years. The mandatory
    three-year retention applies to both the assessment itself and the underlying processing records.

references:
  - citation: "PIPL, Articles 54–56"
    url: "http://www.npc.gov.cn/npc/c30834/202108/a8c4e3672c74491a80b53a172bb753fe.shtml"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build a PIA management system that automates the creation, review, approval, and storage
      of personal information protection impact assessments. Implement automated triggers that
      require a PIA before processing activities involving sensitive data, automated decisions,
      third-party sharing, or cross-border transfers. Build processing activity recording
      systems that maintain immutable logs with minimum three-year retention. Deploy compliance
      audit automation that periodically assesses processing activities against PIPL requirements.
      Implement a PIA template system with required fields matching Article 56 content requirements.
    tools:
      - "PIA management platform (OneTrust, custom workflow)"
      - "Processing activity recording (immutable audit log)"
      - "Automated PIA triggering based on processing classification"
      - "Compliance audit automation (custom or GRC platform)"
      - "Three-year retention enforcement for PIA records"
  devsecops:
    prose: >-
      Pipeline gates must block deployment of features involving sensitive data, automated
      decisions, third-party sharing, or cross-border transfers without a completed PIA.
      CI/CD must include PIA status verification as a pre-deployment check. Automated tools
      must generate PIA drafts based on code analysis of new processing activities. Code
      review checklists must include PIA requirement assessment. Pipeline logs must be
      retained for at least three years for audit trail purposes.
    tools:
      - "PIA verification gates in CI/CD"
      - "Automated PIA draft generation from code analysis"
      - "Pipeline log retention (three-year minimum)"
      - "PIA requirement assessment in code review"
  secops:
    prose: >-
      Monitor for processing activities that require a PIA but do not have one recorded.
      Track PIA expiration and trigger re-assessment when processing parameters change.
      Conduct periodic compliance audits as required by Article 54. Verify three-year
      retention compliance for PIA records and processing logs. Alert when processing
      records approach their retention deadline without proper archival.
    tools:
      - "PIA tracking and expiration monitoring"
      - "Compliance audit scheduling and tracking"
      - "Retention compliance monitoring"
      - "Processing activity gap analysis tools"

