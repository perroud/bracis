id: art-57
family: obligations
title: "Personal information security incident notification"
class: PIPL
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 57: Where a leak, distortion, or loss of personal information has occurred or may occur,
    the personal information processor shall immediately adopt remedial measures and notify the
    department performing personal information protection duties and the individuals concerned. The
    notification shall include the following:
    (1) The categories of personal information, the reasons for, and the potential harm that may be
    caused by the leak, distortion, or loss that has occurred or may occur;
    (2) The remedial measures that the personal information processor has adopted and the measures
    that individuals may take to mitigate harm;
    (3) The contact information of the personal information processor.
    Where the personal information processor has adopted measures that can effectively avoid the harm
    that may be caused by the leak, distortion, or loss of personal information, the personal
    information processor may decide not to notify the individual; however, where the department
    performing personal information protection duties determines that harm may be caused, it may
    require the personal information processor to notify the individual.

guidance:
  prose: >-
    Article 57 establishes the breach notification obligation under PIPL. Unlike GDPR's 72-hour
    notification window (Article 33), PIPL requires "immediate" remediation and notification without
    specifying a fixed time limit. However, in practice, the CAC and other regulatory bodies expect
    notification within 24 to 72 hours based on related regulations (such as the Cybersecurity Law
    and Data Security Law). The notification must include: categories of affected data, breach cause,
    potential harm, remedial measures taken, individual mitigation guidance, and processor contact
    information. An exemption from individual notification exists where the processor has effectively
    mitigated potential harm, though the supervisory authority can override this exemption. The
    threshold for notification is lower than GDPR's "risk to rights and freedoms" — PIPL triggers
    notification for any actual or potential leak, distortion, or loss.

references:
  - citation: "PIPL, Article 57"
    url: "http://www.npc.gov.cn/npc/c30834/202108/a8c4e3672c74491a80b53a172bb753fe.shtml"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build an incident response platform with automated breach detection, classification,
      and notification workflows. Implement real-time monitoring for data leakage, unauthorized
      access, data corruption, and data loss events. Deploy automated notification templates
      that include all Article 57 required elements (categories, cause, harm, remediation,
      mitigation, contact). Build regulatory notification channels for submitting breach
      reports to the CAC and other supervisory authorities. Implement breach impact assessment
      automation that determines individual notification requirements. Deploy forensic
      investigation capabilities for post-breach analysis.
    tools:
      - "Incident response platform (PagerDuty, ServiceNow SecOps)"
      - "Data breach detection (DLP, SIEM, anomaly detection)"
      - "Automated breach notification system (custom or GRC platform)"
      - "Regulatory notification workflow"
      - "Forensic investigation tools (Velociraptor, GRR)"
  devsecops:
    prose: >-
      Deployment pipelines must include breach detection monitoring hooks for new services.
      Incident response runbooks must be version-controlled and tested in CI. Automated
      breach simulation tests must validate notification workflows end-to-end. Pipeline
      configurations must include alerting for security events that could indicate data
      breaches. Code reviews must verify that new data processing activities are covered
      by breach detection monitoring.
    tools:
      - "Breach detection hooks in deployment pipelines"
      - "Incident runbook version control and testing"
      - "Breach simulation testing (custom or Breach and Attack Simulation tools)"
      - "Security event alerting in CI/CD"
  secops:
    prose: >-
      Operate 24/7 breach detection monitoring with automated triage. Maintain and test
      incident response plans quarterly. Track breach notification timelines to ensure
      "immediate" notification compliance. Conduct post-incident reviews and update
      detection capabilities based on lessons learned. Maintain communication channels
      with the CAC and relevant supervisory authorities for breach reporting. Monitor
      for indicators of compromise that could signal ongoing or imminent breaches.
    tools:
      - "24/7 SIEM monitoring (Splunk, Elastic Security, Sentinel)"
      - "Breach notification timeline tracking"
      - "Incident response plan testing framework"
      - "IOC monitoring and threat intelligence"
      - "Regulatory communication management"

