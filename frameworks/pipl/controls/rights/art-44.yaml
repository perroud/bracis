id: art-44
family: rights
title: "Right to know and right to decide on personal information processing"
class: PIPL
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 44: Individuals have the right to know about and the right to decide on the processing
    of their personal information, and have the right to restrict or refuse the processing of their
    personal information by others, except as otherwise provided by laws or administrative regulations.
    Article 45: Individuals have the right to access and copy their personal information from personal
    information processors, except for the circumstances specified in Article 18, Paragraph 1 of this
    Law. Where an individual requests to access or copy his or her personal information, the personal
    information processor shall provide it in a timely manner. Where an individual requests the transfer
    of his or her personal information to a personal information processor designated by the individual,
    and such transfer meets the conditions specified by the national cyberspace administration, the
    personal information processor shall provide a means for the transfer.

guidance:
  prose: >-
    Articles 44 and 45 establish the foundational rights of individuals regarding their personal
    information. Article 44 provides the overarching right to know and right to decide, which
    serves as the basis for all subsequent specific rights. The right to restrict or refuse
    processing is broad, subject only to exceptions in other laws. Article 45 establishes the
    right of access, the right to obtain copies, and the right to data portability. The portability
    right under PIPL requires the processor to transfer data to another processor designated by the
    individual, subject to conditions set by the CAC. This is comparable to GDPR Article 20 but
    the scope and conditions may differ based on CAC implementing regulations. Processors must
    provide access and copies "in a timely manner," though PIPL does not specify a fixed deadline
    (unlike GDPR's one-month response period).

references:
  - citation: "PIPL, Articles 44–45"
    url: "http://www.npc.gov.cn/npc/c30834/202108/a8c4e3672c74491a80b53a172bb753fe.shtml"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build a data subject access request (DSAR) portal that enables individuals to submit
      access, copy, and portability requests. Implement automated data discovery across all
      systems to locate all personal information associated with a requesting individual.
      Build data export pipelines that generate portable data packages in machine-readable
      formats (JSON, CSV, XML). Implement data portability APIs that can transfer personal
      information to designated third-party processors. Deploy request tracking systems with
      SLA monitoring to ensure timely responses. Build self-service access portals where
      individuals can view their personal information in real time.
    tools:
      - "DSAR portal (OneTrust, custom self-service portal)"
      - "Data discovery across distributed systems (BigID, Securiti)"
      - "Data export pipelines (custom ETL with format conversion)"
      - "Data portability APIs (standardized transfer protocols)"
      - "Request tracking with SLA monitoring"
  devsecops:
    prose: >-
      Pipeline checks must verify that new data stores are integrated with the DSAR discovery
      system. Automated tests must validate that data export generates complete and accurate
      packages. API tests must verify portability transfer functionality. Performance tests
      must validate that access request processing meets SLA requirements. Code reviews must
      ensure new personal information fields are discoverable by the DSAR system.
    tools:
      - "DSAR integration tests in CI/CD"
      - "Data export completeness validation"
      - "Portability API contract tests"
      - "SLA performance testing for access requests"
  secops:
    prose: >-
      Monitor DSAR request volumes and response times. Alert when response SLAs are at risk
      of being breached. Track request completion rates and investigate incomplete responses.
      Monitor for suspicious access request patterns that may indicate social engineering.
      Verify identity authentication for DSAR submissions. Audit data export accuracy
      through periodic sampling.
    tools:
      - "DSAR metrics dashboards"
      - "SLA breach alerting"
      - "Identity verification for data access requests"
      - "Data export accuracy audit tools"

