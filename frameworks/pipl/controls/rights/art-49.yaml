id: art-49
family: rights
title: "Right to object to automated decisions and rights of deceased persons"
class: PIPL
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 48: Individuals have the right to request personal information processors to explain
    their personal information processing rules.
    Article 49: Where an individual makes a decision that has a significant impact on his or her
    rights and interests solely through automated decision-making, the individual has the right to
    request the personal information processor to provide an explanation, and has the right to refuse
    the personal information processor's decision made solely through automated decision-making.
    Article 50: Where a natural person dies, his or her close relatives may, for the purposes of
    their own lawful and legitimate interests, exercise the rights provided in this Chapter with
    respect to the deceased natural person's relevant personal information, except where the deceased
    natural person made arrangements to the contrary during his or her lifetime.

guidance:
  prose: >-
    Articles 48 through 50 complete the individual rights framework. Article 48 provides a general
    right to explanation of processing rules, which is broader than GDPR (no limitation to automated
    decisions). Article 49 specifically addresses automated decision-making, providing two rights:
    (1) the right to an explanation of automated decisions with significant impact, and (2) the right
    to refuse such decisions entirely. This is comparable to GDPR Article 22 but is framed more
    broadly as a refusal right rather than a right not to be subject to automated decisions.
    Article 50 extends certain rights to close relatives of deceased persons, which has no direct
    GDPR equivalent (GDPR generally does not protect deceased persons' data). This provision
    creates obligations around post-mortem data access that must be operationalized.

references:
  - citation: "PIPL, Articles 48–50"
    url: "http://www.npc.gov.cn/npc/c30834/202108/a8c4e3672c74491a80b53a172bb753fe.shtml"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement an automated decision explanation engine that can generate human-readable
      explanations of how automated decisions were reached, including input data, decision
      criteria, and factors that influenced the outcome. Build opt-out mechanisms for automated
      decision-making that route individuals to human decision-makers. Implement a deceased
      persons data access system that enables verified close relatives to exercise data rights.
      Build processing rules documentation that can be presented to individuals on request
      in plain language. Deploy manual review queues for cases where individuals refuse
      automated decisions.
    tools:
      - "Explainable AI frameworks (SHAP, LIME, custom explanation engines)"
      - "Automated decision opt-out with human fallback routing"
      - "Deceased persons data access portal with identity verification"
      - "Processing rules documentation system"
      - "Manual review queue management"
  devsecops:
    prose: >-
      Pipeline checks must verify that ML models include explainability capabilities before
      deployment. Automated tests must validate that explanation outputs are comprehensible
      and accurate. CI/CD must verify that opt-out mechanisms route to human decision-makers.
      Code reviews must ensure automated decision systems include explanation hooks.
      Integration tests must validate deceased persons data access workflows.
    tools:
      - "ML explainability validation in CI/CD"
      - "Automated decision opt-out integration tests"
      - "Explanation quality testing"
      - "Deceased persons access workflow tests"
  secops:
    prose: >-
      Monitor automated decision systems for explanation request volumes and response times.
      Track opt-out rates and investigate patterns indicating unfair automated decisions.
      Audit explanation quality through periodic sampling. Monitor deceased persons data
      access requests for identity verification compliance. Alert when automated decisions
      are made after an individual has opted out.
    tools:
      - "Automated decision monitoring dashboards"
      - "Explanation quality audit tools"
      - "Opt-out enforcement monitoring"
      - "Deceased persons access identity verification audit"

legal_references:
  - framework_id: gdpr
    articles: ["art-22"]
    relationship: equivalent-to
  - framework_id: eu-ai-act
    articles: ["art-14"]
    relationship: complements
