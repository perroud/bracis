control_families:
  - id: gen
    title: "General Provisions"
    description: "Scope, definitions, extraterritorial application, and foundational principles"
    articles: "Art. 1–12"
    control_count: 3
  - id: rules
    title: "Rules on Processing Personal Information"
    description: "Lawful bases, consent, notification, third-party sharing, profiling, sensitive data, and minors"
    articles: "Art. 13–32"
    control_count: 8
  - id: xborder
    title: "Cross-border Transfer of Personal Information"
    description: "Data localization, security assessment, standard contracts, certification, and restrictions"
    articles: "Art. 38–43"
    control_count: 3
  - id: rights
    title: "Rights of Personal Information Subjects"
    description: "Right of access, copy, correction, deletion, portability, and objection to automated decisions"
    articles: "Art. 44–50"
    control_count: 3
  - id: obligations
    title: "Obligations of Personal Information Processors"
    description: "Internal management, records, DPO, impact assessment, breach notification, and critical infrastructure"
    articles: "Art. 51–59"
    control_count: 3
  - id: enforcement
    title: "Legal Liability and Enforcement"
    description: "Supervisory authority, administrative actions, penalties, and private right of action"
    articles: "Art. 60–71"
    control_count: 2
related_frameworks:
  - framework_id: gdpr
    relationship: equivalent-to
    description: "The PIPL is widely compared to the GDPR, sharing core concepts such as lawful bases, data subject rights, DPO requirements, breach notification, and extraterritorial application."
    mapping_file: "mappings/pipl_to_gdpr.yaml"
  - framework_id: iso-27701
    relationship: complements
    description: "ISO 27701 provides a privacy information management system (PIMS) framework that supports demonstrating compliance with PIPL processor and controller obligations."
    mapping_file: "mappings/pipl_to_iso-27701.yaml"
  - framework_id: csa-ccm-v4
    relationship: mapped
    description: "CSA CCM v4 provides cloud security controls that map to PIPL's security and cross-border transfer requirements."
    mapping_file: "mappings/pipl_to_csa-ccm-v4.yaml"
  - framework_id: lgpd
    relationship: equivalent-to
    description: >-
      Brazil's LGPD and China's PIPL are both comprehensive data protection laws inspired
      by the GDPR model, with comparable structures for lawful bases, individual rights,
      and enforcement.
    mapping_file: "mappings/pipl_to_lgpd.yaml"
  - framework_id: pdpa-thailand
    relationship: equivalent-to
    description: "Thailand's PDPA and China's PIPL share similar GDPR-derived structures including consent-centric models, cross-border restrictions, and supervisory authority enforcement."
    mapping_file: "mappings/pipl_to_pdpa-thailand.yaml"
