id: esg-1
family: governanca
title: "ESG Governance Body and Oversight"
class: CVM-193
baselines: [companhias-abertas]
statement:
  prose: |
    A entidade deve divulgar informações sobre o órgão ou comitê de governança
    responsável pela supervisão de riscos e oportunidades relacionados à
    sustentabilidade, incluindo:

    (a) a identificação do órgão ou indivíduo responsável pela supervisão de
    riscos e oportunidades relacionados à sustentabilidade;

    (b) como as responsabilidades relacionadas a riscos e oportunidades de
    sustentabilidade são refletidas nos termos de referência, mandatos, descrições
    de cargos e outras políticas aplicáveis ao órgão ou indivíduo;

    (c) como o órgão ou indivíduo garante que as competências e habilidades
    apropriadas estão disponíveis para supervisionar estratégias destinadas a
    responder a riscos e oportunidades relacionados à sustentabilidade;

    (d) como e com que frequência o órgão ou indivíduo é informado sobre riscos
    e oportunidades relacionados à sustentabilidade.

    Referência: IFRS S1, §26(a)-(d); Resolução CVM nº 193/2023, art. 1º.
guidance:
  prose: |
    This control requires disclosure of the governance structure overseeing
    sustainability-related risks and opportunities. The entity must identify
    which board committee or individual has ultimate oversight responsibility,
    describe how that responsibility is formally embedded in charters and
    mandates, and demonstrate that the governing body has adequate ESG
    competence.

    **Key requirements:**
    - Explicit identification of the responsible governance body (e.g., board of
      directors, sustainability committee, audit committee).
    - Formal mandate or terms of reference that include sustainability oversight.
    - Evidence of ESG competence within the governing body (training records,
      professional backgrounds, external advisors).
    - Defined reporting cadence — how frequently management reports sustainability
      matters to the governing body and through what mechanisms (standing agenda
      items, dedicated sessions, dashboards).

    **Practical considerations:**
    - If no dedicated ESG committee exists, the entity must explain which existing
      body assumes this role and how conflicts of priority are managed.
    - Competence does not require every member to be an ESG expert, but the
      collective body must have sufficient knowledge to challenge management
      effectively.
implementation_guidance:
  platform_engineering:
    prose: |
      **Governance documentation as code:**
      1. Maintain governance charters, committee mandates, and ESG oversight
         policies in a version-controlled repository with full audit trail.
      2. Implement structured YAML or JSON schemas for governance metadata:
         committee composition, meeting cadence, competence matrix, reporting
         frequency.
      3. Automate generation of governance disclosure documents from structured
         data using CI/CD pipelines to ensure consistency between internal
         records and published reports.

      **Access control and segregation:**
      4. Enforce role-based access control (RBAC) on governance documentation
         repositories — only authorized governance team members may approve
         changes to committee charters.
      5. Require multi-party approval (minimum 2 reviewers) for any changes
         to ESG governance structure documentation.
    tools:
      - git
      - gitlab-ci
      - opa-gatekeeper
      - vault
      - terraform
  devsecops:
    prose: |
      **Integrity of governance data:**
      1. Apply SAST scanning to any code generating governance reports to
         prevent data manipulation or disclosure errors.
      2. Implement automated tests validating that governance metadata schemas
         contain all required IFRS S1 §26 fields before pipeline passes.
      3. Secret detection to ensure no confidential board materials (draft
         minutes, compensation data) leak into public repositories.

      **Change management:**
      4. Every change to governance documentation must go through a merge
         request with mandatory review by compliance and legal teams.
      5. Automated changelog generation for governance document revisions.
    tools:
      - gitlab-sast
      - gitlab-secret-detection
      - sonarqube
      - gitlab-ci
  secops:
    prose: |
      **Monitoring and evidence collection:**
      1. Maintain an evidence repository for ESG governance: meeting minutes,
         attendance records, training certificates, and competence assessments.
      2. Automated alerts for overdue governance reviews — if the committee
         charter has not been reviewed within the defined period, trigger
         escalation.
      3. Periodic audit of access logs to governance documentation to detect
         unauthorized modifications.

      **Reporting:**
      4. Generate quarterly governance compliance reports showing: meetings
         held vs. planned, topics covered, ESG items on agenda, decisions made.
      5. Integrate governance evidence into GRC platform for consolidated
         compliance monitoring.
    tools:
      - siem
      - grc-platform
      - compliance-scanner
