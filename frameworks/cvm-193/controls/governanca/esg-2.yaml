id: esg-2
family: governanca
title: "Management Role in ESG Oversight"
class: CVM-193
baselines: [companhias-abertas]
statement:
  prose: |
    A entidade deve divulgar informações sobre o papel da administração na
    governança de riscos e oportunidades relacionados à sustentabilidade,
    incluindo:

    (a) se o papel é delegado a um cargo ou comitê de gestão específico e como
    a supervisão é exercida sobre esse cargo ou comitê;

    (b) se a administração utiliza controles e procedimentos para apoiar a
    supervisão de riscos e oportunidades relacionados à sustentabilidade e,
    em caso afirmativo, como esses controles e procedimentos são integrados a
    outras funções internas.

    A entidade deve descrever como os processos de tomada de decisão
    relacionados à sustentabilidade são integrados à estrutura de governança
    corporativa existente, incluindo a interação entre o conselho de
    administração, comitês e a diretoria executiva.

    Referência: IFRS S1, §27(a)-(b); Resolução CVM nº 193/2023, art. 1º.
guidance:
  prose: |
    This control focuses on the operational layer of ESG governance — how
    management (as opposed to the board) is organized to handle
    sustainability-related risks and opportunities on a day-to-day basis.

    **Key requirements:**
    - Identify the specific management role or committee responsible for ESG
      (e.g., Chief Sustainability Officer, ESG Steering Committee).
    - Describe delegation mechanisms: what authority has the board delegated
      to management, what escalation thresholds exist.
    - Describe internal controls and procedures management uses — how ESG
      risk assessment is embedded into existing enterprise risk management,
      strategic planning, and capital allocation processes.

    **Integration is critical:**
    - IFRS S1 emphasizes that sustainability governance should not be siloed.
      The entity must show how ESG considerations flow into financial planning,
      budgeting, performance evaluation, and incentive structures.
    - If management incentives (bonuses, KPIs) are linked to sustainability
      targets, this must be disclosed.
implementation_guidance:
  platform_engineering:
    prose: |
      **Organizational structure as code:**
      1. Document the ESG management structure in version-controlled files:
         roles, responsibilities, reporting lines, escalation matrix.
      2. Implement automated org-chart generation showing ESG governance
         hierarchy integrated with corporate governance.
      3. Define RBAC policies that mirror the ESG management delegation
         structure — ensure system access aligns with formal responsibilities.

      **Integration with enterprise systems:**
      4. Connect ESG data pipelines to ERP and financial planning systems so
         sustainability metrics feed into capital allocation decisions.
      5. Implement workflow automation for ESG escalation: when a risk
         threshold is breached, automatically route to the designated
         management committee.
    tools:
      - terraform
      - gitlab-ci
      - opa-gatekeeper
      - vault
      - git
  devsecops:
    prose: |
      **Controls validation:**
      1. Automated tests verifying that ESG management role descriptions
         contain all required IFRS S1 §27 disclosure elements.
      2. SAST scanning on reporting tools that generate management ESG
         dashboards to prevent data integrity issues.
      3. Dependency scanning on third-party ESG data aggregation libraries
         to prevent supply chain vulnerabilities in reporting tools.

      **Audit trail:**
      4. Enforce signed commits for all changes to ESG governance
         documentation.
      5. Merge request templates requiring justification for any changes
         to management delegation or escalation procedures.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dependency-scanning
      - sonarqube
  secops:
    prose: |
      **Operational monitoring:**
      1. Track management ESG activities: meetings held, decisions taken,
         escalations received and resolved.
      2. Alert on governance gaps: if scheduled ESG management reviews are
         missed or if escalation procedures are not followed.
      3. Periodic review of management ESG incentive alignment — verify that
         KPI targets remain consistent with disclosed sustainability targets.

      **Evidence management:**
      4. Centralized repository for management ESG evidence: decision logs,
         risk assessments, meeting minutes.
      5. Integration with GRC platform for consolidated view of management
         and board ESG governance activities.
    tools:
      - siem
      - grc-platform
      - compliance-scanner
