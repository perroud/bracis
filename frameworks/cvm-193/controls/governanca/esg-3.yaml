id: esg-3
family: governanca
title: "ESG Competence and Accountability"
class: CVM-193
baselines: [companhias-abertas]
statement:
  prose: |
    A entidade deve divulgar como garante que competências e habilidades
    apropriadas estão disponíveis para a tomada de decisões sobre riscos e
    oportunidades relacionados à sustentabilidade, incluindo:

    (a) os processos de capacitação e desenvolvimento de competências em
    sustentabilidade dos membros do conselho de administração e da diretoria;

    (b) como a remuneração e os incentivos dos administradores estão vinculados
    a metas e indicadores de sustentabilidade;

    (c) os mecanismos de prestação de contas (accountability) para assegurar
    que as responsabilidades de governança em sustentabilidade sejam efetivamente
    cumpridas.

    A companhia aberta deve demonstrar que a estrutura de governança possui
    recursos humanos, financeiros e tecnológicos adequados para cumprir as
    exigências de reporte de sustentabilidade conforme os padrões IFRS S1 e S2.

    Referência: IFRS S1, §26(c)-(d), §27; Resolução CVM nº 193/2023, art. 1º e 2º.
guidance:
  prose: |
    This control addresses the "competence and accountability" dimension of
    ESG governance. It is not enough to have a committee — the entity must
    demonstrate that the people involved are qualified and held accountable.

    **Competence requirements:**
    - Board members overseeing ESG should have documented training or
      experience in sustainability, climate science, or ESG risk management.
    - If competence gaps exist, the entity should disclose plans to address
      them (e.g., hiring advisors, training programs).

    **Incentive alignment:**
    - If executive compensation is linked to ESG targets, disclose which
      targets, what weight they carry in total compensation, and how
      achievement is measured.
    - If no link exists, the entity should explain why and whether this is
      planned.

    **Accountability mechanisms:**
    - Clear escalation paths when ESG targets are missed.
    - Regular performance reviews that include ESG dimensions.
    - Consequences for governance failures in sustainability oversight.
implementation_guidance:
  platform_engineering:
    prose: |
      **Competence tracking system:**
      1. Implement a skills matrix database tracking ESG competencies across
         governance bodies: training completed, certifications held,
         experience areas.
      2. Automate training compliance checks — flag when board members have
         not completed mandatory ESG training within the required period.
      3. Version-controlled competence frameworks defining minimum ESG
         knowledge requirements per governance role.

      **Incentive and accountability infrastructure:**
      4. Integrate ESG target tracking with HR/compensation systems to
         automate alignment verification between disclosed targets and
         actual incentive structures.
      5. Implement dashboards showing real-time progress against ESG KPIs
         linked to executive compensation.
    tools:
      - terraform
      - gitlab-ci
      - git
      - vault
  devsecops:
    prose: |
      **Data integrity for competence records:**
      1. Secret detection on competence databases to prevent leakage of
         personal compensation data.
      2. SAST scanning on any tools processing executive compensation or
         ESG target achievement calculations.
      3. Automated validation that competence matrix data schemas are
         complete and consistent before report generation.

      **Pipeline controls:**
      4. Mandatory review by HR and compliance teams for any changes to
         incentive-sustainability linkage documentation.
      5. Automated tests verifying disclosed ESG KPIs match internal
         tracking system configurations.
    tools:
      - gitlab-sast
      - gitlab-secret-detection
      - gitlab-ci
      - sonarqube
  secops:
    prose: |
      **Accountability monitoring:**
      1. Track completion rates for ESG training programs across governance
         bodies with automated reminders and escalation.
      2. Quarterly audit of ESG incentive structures — verify that disclosed
         targets match actual compensation calculations.
      3. Incident tracking for ESG governance failures: missed reviews,
         ignored escalations, unmet training requirements.

      **Evidence for assurance:**
      4. Maintain auditable evidence of: training records, competence
         assessments, compensation-ESG linkage documentation.
      5. Generate annual ESG governance effectiveness report for external
         assurance providers.
    tools:
      - siem
      - grc-platform
      - compliance-scanner
