id: esg-15
family: divulgacao
title: "Connected Disclosures and Financial Statement Integration"
class: CVM-193
baselines: [companhias-abertas]
statement:
  prose: |
    A entidade deve fornecer divulgações conectadas que permitam aos usuários
    avaliar a relação entre as informações de sustentabilidade e as
    demonstrações financeiras, incluindo:

    (a) a conexão entre os riscos e oportunidades de sustentabilidade
    divulgados e os valores reconhecidos ou divulgados nas demonstrações
    financeiras, incluindo provisões, contingências, ativos e passivos
    afetados;

    (b) como as premissas e estimativas utilizadas na preparação das
    demonstrações financeiras são consistentes com as informações divulgadas
    no relatório de sustentabilidade;

    (c) como os efeitos financeiros atuais e antecipados dos riscos e
    oportunidades de sustentabilidade são refletidos nas demonstrações
    financeiras;

    (d) a localização das informações no relatório de sustentabilidade e
    referências cruzadas com os itens correspondentes nas demonstrações
    financeiras;

    (e) a garantia de que as informações de sustentabilidade divulgadas não
    contradizem as informações contidas nas demonstrações financeiras da
    entidade.

    Referência: IFRS S1, §21-24; Resolução CVM nº 193/2023, art. 1º e 2º.
guidance:
  prose: |
    Connected disclosures are the innovation that distinguishes IFRS S1/S2
    from prior sustainability reporting frameworks. The sustainability
    report is not a standalone document — it must be demonstrably connected
    to the financial statements.

    **Financial statement connections:**
    - If a climate risk is disclosed in the sustainability report, and the
      entity holds assets in climate-vulnerable locations, the impairment
      test assumptions for those assets must be consistent.
    - Transition plan CAPEX commitments in the sustainability report must
      be reconcilable with capital expenditure plans in the financial
      statements.
    - Provisions for environmental liabilities in the financial statements
      must be consistent with risk disclosures in the sustainability report.

    **Consistency requirement:**
    - This is a two-way check: sustainability disclosures must not
      contradict financial statement information, and vice versa.
    - Example of inconsistency: disclosing significant physical climate
      risk in the sustainability report while using indefinite useful
      lives for assets in affected locations.

    **Cross-referencing:**
    - The entity must provide clear cross-references between the
      sustainability report and financial statements.
    - Users should be able to navigate between related disclosures
      without difficulty.

    **Current and anticipated effects:**
    - Current effects: amounts already recognized in the financial
      statements (e.g., carbon tax expense, asset impairment).
    - Anticipated effects: expected future financial impacts over the
      defined time horizons.
implementation_guidance:
  platform_engineering:
    prose: |
      **Connected disclosure platform:**
      1. Build integrated data architecture where sustainability and
         financial data share common reference data: entity structure,
         asset register, cost centers, time periods.
      2. Implement automated consistency checks between sustainability
         disclosures and financial statements: reconcile transition plan
         CAPEX with capital budgets, cross-check risk disclosures with
         impairment assumptions.
      3. Automated cross-reference generation: produce linkage tables
         mapping sustainability disclosures to financial statement line
         items.

      **Data governance:**
      4. Single source of truth for shared data elements: asset locations,
         emission factors linked to cost allocations, energy costs linked
         to consumption metrics.
      5. Workflow ensuring sustainability and finance teams review each
         other's outputs before publication.
    tools:
      - git
      - terraform
      - gitlab-ci
      - vault
  devsecops:
    prose: |
      **Consistency validation:**
      1. Automated tests for cross-document consistency: verify that
         amounts cited in the sustainability report match financial
         statement figures.
      2. SAST scanning on integration code that links sustainability
         and financial data systems.
      3. Regression tests detecting new inconsistencies when either
         sustainability or financial data is updated.

      **Cross-reference integrity:**
      4. Automated validation of cross-reference links: verify that
         referenced financial statement items exist and contain
         relevant information.
      5. Schema validation ensuring connected disclosure metadata is
         complete for all material sustainability topics.
    tools:
      - gitlab-ci
      - gitlab-sast
      - sonarqube
  secops:
    prose: |
      **Consistency monitoring:**
      1. Pre-publication consistency review: automated comparison of
         sustainability report draft against financial statement draft
         highlighting potential inconsistencies.
      2. Track and resolve inconsistency findings with documented
         resolutions before publication.
      3. Post-publication monitoring for analyst or investor queries
         about perceived inconsistencies.

      **Evidence management:**
      4. Maintain reconciliation workpapers documenting how sustainability
         disclosures connect to financial statements for each material
         topic.
      5. Generate connected disclosure maps showing the linkage between
         every sustainability risk/opportunity and affected financial
         statement items.
    tools:
      - siem
      - grc-platform
      - compliance-scanner
