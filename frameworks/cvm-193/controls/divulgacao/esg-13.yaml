id: esg-13
family: divulgacao
title: "Sustainability Report Publication and Timing"
class: CVM-193
baselines: [companhias-abertas]
statement:
  prose: |
    As companhias abertas devem elaborar e divulgar relatório de informações
    financeiras relacionadas à sustentabilidade com base nos padrões IFRS S1
    (Requisitos Gerais para Divulgação de Informações Financeiras Relacionadas
    à Sustentabilidade) e IFRS S2 (Divulgações Relacionadas ao Clima), emitidos
    pelo International Sustainability Standards Board (ISSB), observando:

    (a) o relatório deve ser publicado simultaneamente com as demonstrações
    financeiras anuais da entidade, cobrindo o mesmo período de reporte;

    (b) as informações de sustentabilidade devem se referir à mesma entidade
    que reporta as demonstrações financeiras;

    (c) a adoção dos padrões IFRS S1 e S2 é obrigatória para exercícios
    sociais iniciados a partir de 1º de janeiro de 2026, sendo facultativa
    para exercícios anteriores;

    (d) para exercícios sociais iniciados entre 1º de janeiro de 2024 e
    31 de dezembro de 2025, a elaboração do relatório é voluntária, mas, se
    adotada, deve seguir integralmente os padrões IFRS S1 e S2;

    (e) o relatório deve ser apresentado no formulário de referência ou em
    documento específico nos termos definidos pela CVM.

    Referência: Resolução CVM nº 193/2023, art. 1º, 2º e 4º.
guidance:
  prose: |
    This control covers the fundamental publication requirements of CVM 193 —
    when, where, and how the sustainability report must be published.

    **Timeline:**
    - Mandatory from fiscal years starting January 1, 2026.
    - Voluntary for fiscal years 2024-2025, but must be IFRS S1/S2
      compliant if published.
    - Published simultaneously with annual financial statements.

    **Entity alignment:**
    - The sustainability report must cover the same reporting entity as
      the financial statements — same consolidation perimeter.
    - If the entity prepares consolidated financial statements, the
      sustainability report must also be consolidated.

    **Filing requirements:**
    - Filed through CVM's regulatory system (currently via formulário de
      referência or dedicated sustainability report form).
    - Must be publicly accessible to all market participants.

    **Early adoption incentive:**
    - Entities that adopt early gain competitive advantage in investor
      relations and build internal capacity before the mandatory deadline.
    - However, partial adoption is not allowed — if you publish, it must
      be fully IFRS S1/S2 compliant.
implementation_guidance:
  platform_engineering:
    prose: |
      **Report generation infrastructure:**
      1. Build an automated report generation pipeline that aggregates data
         from governance, strategy, risk, metrics, and target modules into
         a consolidated IFRS S1/S2 compliant report.
      2. Implement report scheduling aligned with financial statement
         publication deadlines — ensure sustainability data collection
         completes in time for simultaneous publication.
      3. Automate consolidation logic matching the financial statement
         consolidation perimeter.

      **Filing automation:**
      4. Integrate with CVM regulatory filing systems for automated
         submission of sustainability reports.
      5. Pre-publication validation pipeline checking IFRS S1/S2
         completeness requirements before report is finalized.
    tools:
      - git
      - gitlab-ci
      - terraform
      - vault
  devsecops:
    prose: |
      **Report integrity:**
      1. SAST scanning on report generation code to prevent data
         aggregation or formatting errors.
      2. Automated completeness tests: verify all IFRS S1/S2 required
         disclosures are present in the generated report.
      3. Cross-reference validation between sustainability report data
         and underlying source systems.

      **Publication controls:**
      4. Mandatory multi-party approval workflow before report
         publication — sustainability team, finance team, legal, auditor.
      5. Tamper-evident report packaging: hash verification for published
         documents.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-secret-detection
      - sonarqube
  secops:
    prose: |
      **Publication monitoring:**
      1. Track report preparation milestones against publication deadline
         with automated alerts for delays.
      2. Verify publication completeness: confirm report is accessible
         via CVM filing system and entity website after publication.
      3. Monitor for unauthorized modifications to published reports.

      **Compliance tracking:**
      4. Maintain evidence of publication timeline: when data collection
         started, when report was drafted, reviewed, approved, and
         published.
      5. Generate annual compliance calendar for sustainability reporting
         milestones aligned with financial reporting calendar.
    tools:
      - siem
      - grc-platform
      - compliance-scanner
