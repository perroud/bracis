id: esg-14
family: divulgacao
title: "Independent Assurance of Sustainability Report"
class: CVM-193
baselines: [companhias-abertas]
statement:
  prose: |
    O relatório de informações financeiras relacionadas à sustentabilidade
    deve ser submetido a asseguração por auditor independente registrado na
    CVM, observando:

    (a) a asseguração deve ser realizada em conformidade com normas de
    asseguração aplicáveis, incluindo a NBC TO 3000 (Trabalhos de Asseguração
    Diferente de Auditoria e Revisão) ou norma internacional equivalente
    (ISAE 3000/ISAE 3410);

    (b) o nível de asseguração exigido será implementado de forma escalonada:
    — asseguração limitada nas primeiras fases de implementação;
    — evolução para asseguração razoável conforme cronograma a ser definido
    pela CVM;

    (c) o auditor independente deve avaliar se as informações de
    sustentabilidade foram preparadas, em todos os aspectos relevantes, de
    acordo com os padrões IFRS S1 e S2;

    (d) o relatório de asseguração deve ser divulgado conjuntamente com o
    relatório de sustentabilidade;

    (e) a entidade deve divulgar a identidade do prestador de asseguração e
    o nível de asseguração obtido (limitada ou razoável).

    Referência: Resolução CVM nº 193/2023, art. 3º.
guidance:
  prose: |
    Assurance is what differentiates regulated sustainability reporting from
    voluntary ESG reports. CVM 193 requires independent assurance, elevating
    sustainability data to a level of credibility approaching financial
    statement audits.

    **Assurance levels:**
    - Limited assurance (initial phase): the auditor concludes that "nothing
      has come to our attention" that the report is materially misstated.
      Lower evidence threshold.
    - Reasonable assurance (future phase): the auditor positively states
      that the report "presents fairly" in all material respects. Same
      level as financial statement audit.

    **Auditor requirements:**
    - Must be registered with CVM.
    - Must have competence in sustainability/ESG reporting.
    - Independence requirements apply (same as financial audit).

    **Phased implementation:**
    - CVM will define the timeline for transition from limited to
      reasonable assurance.
    - Entities should prepare for reasonable assurance from the start
      by building robust data collection and internal control systems.

    **Practical implications:**
    - All data underlying the sustainability report must be auditable:
      source data, calculations, judgments, and estimates must have
      supporting evidence.
    - Internal controls over sustainability reporting must be as
      rigorous as controls over financial reporting.
implementation_guidance:
  platform_engineering:
    prose: |
      **Assurance-ready data infrastructure:**
      1. Implement data lineage tracking for all sustainability
         disclosures: from raw data source through transformation,
         calculation, and aggregation to reported figure.
      2. Build internal control frameworks mirroring SOX-like controls
         for sustainability data: authorization, completeness, accuracy,
         validity, restricted access.
      3. Automated evidence generation: for every disclosed metric,
         auto-generate an evidence package containing source data,
         calculation steps, approvals, and reconciliations.

      **Auditor access:**
      4. Provide secure, read-only access to sustainability data systems
         for external assurance providers with full audit trail of
         auditor access.
      5. Implement data room functionality for assurance engagements
         with organized, searchable evidence repositories.
    tools:
      - git
      - terraform
      - gitlab-ci
      - vault
  devsecops:
    prose: |
      **Control testing automation:**
      1. Automated tests for internal controls over sustainability
         reporting: authorization checks, segregation of duties,
         data completeness, calculation accuracy.
      2. SAST scanning on all sustainability data processing code —
         errors in calculation code undermine assurance.
      3. Secret detection to prevent exposure of confidential assurance
         working papers or draft reports.

      **Evidence integrity:**
      4. Tamper-evident storage for sustainability evidence: cryptographic
         hashes, immutable audit logs.
      5. Automated reconciliation tests between sustainability disclosures
         and underlying systems.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-secret-detection
      - sonarqube
  secops:
    prose: |
      **Assurance process management:**
      1. Track assurance engagement milestones: planning, fieldwork,
         review, report issuance — with automated deadline monitoring.
      2. Monitor auditor findings and remediation progress — ensure all
         findings are addressed before report publication.
      3. Maintain registry of assurance engagements: auditor identity,
         scope, level of assurance, opinion received, findings.

      **Continuous improvement:**
      4. Post-assurance review: analyze auditor findings and implement
         control improvements for the next reporting cycle.
      5. Track evolution from limited to reasonable assurance readiness
         with gap assessment and remediation roadmap.
    tools:
      - siem
      - grc-platform
      - compliance-scanner
