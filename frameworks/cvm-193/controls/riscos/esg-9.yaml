id: esg-9
family: riscos
title: "Climate-Specific Risk Management"
class: CVM-193
baselines: [companhias-abertas]
statement:
  prose: |
    A entidade deve divulgar informações sobre como utiliza os processos de
    gestão de riscos relacionados ao clima para identificar, avaliar, priorizar
    e monitorar riscos e oportunidades especificamente relacionados ao clima,
    incluindo:

    (a) como a entidade identifica se os riscos relacionados ao clima são
    riscos físicos ou riscos de transição, distinguindo entre:
    — riscos físicos agudos (eventos extremos como ciclones, enchentes,
    incêndios);
    — riscos físicos crônicos (alterações de longo prazo como elevação do
    nível do mar, estresse hídrico, alterações de temperatura);
    — riscos de transição (política e regulação, tecnologia, mercado,
    reputação);

    (b) como a entidade avalia a exposição a esses riscos, incluindo a
    utilização de dados geoespaciais, projeções climáticas e análise da
    cadeia de valor;

    (c) como a entidade prioriza ações de mitigação e adaptação para os
    riscos climáticos identificados;

    (d) como a entidade monitora mudanças nos riscos climáticos ao longo do
    tempo, incluindo indicadores antecedentes e mecanismos de alerta precoce.

    Referência: IFRS S2, §10-12, §25; Resolução CVM nº 193/2023, art. 1º.
guidance:
  prose: |
    While esg-7 covers the general ESG risk management process, this control
    is specific to climate risks per IFRS S2. It requires granular disclosure
    of how the entity manages physical and transition climate risks.

    **Physical vs. transition risk classification:**
    - This distinction is fundamental to IFRS S2. The entity must have a
      clear methodology for classifying each climate risk.
    - Some risks may have both physical and transition dimensions (e.g.,
      water scarcity is both a physical risk and a potential regulatory
      trigger).

    **Exposure assessment tools:**
    - Geospatial analysis for physical risk (asset-level location mapping
      against hazard maps).
    - Regulatory tracking for transition risk (carbon pricing, phase-out
      policies, disclosure mandates).
    - Value chain analysis — upstream and downstream climate exposures.

    **Mitigation and adaptation:**
    - For physical risks: adaptation measures (infrastructure hardening,
      geographic diversification, insurance).
    - For transition risks: strategy adjustment (technology investment,
      market repositioning, engagement with policymakers).

    **Monitoring:**
    - Leading indicators that signal changing risk levels before impacts
      materialize.
    - Regular review cycles aligned with climate science updates (IPCC
      assessment reports, national climate commitments).
implementation_guidance:
  platform_engineering:
    prose: |
      **Climate risk data infrastructure:**
      1. Implement geospatial risk assessment tools that overlay asset
         locations against climate hazard maps (flood, heat stress, water
         scarcity, wildfire, sea level rise).
      2. Build automated pipelines ingesting climate data from
         authoritative sources (IPCC, NGFS, national meteorological
         services) and mapping to entity-specific exposures.
      3. Implement a climate risk taxonomy database with standardized
         classification (IFRS S2 physical-acute, physical-chronic,
         transition categories).

      **Monitoring infrastructure:**
      4. Real-time climate monitoring dashboards integrating weather
         data, regulatory change feeds, and technology trend indicators.
      5. Early warning system with configurable thresholds for
         climate-related trigger events.
    tools:
      - git
      - terraform
      - gitlab-ci
      - vault
  devsecops:
    prose: |
      **Climate model integrity:**
      1. SAST scanning on geospatial analysis and climate risk scoring
         code to prevent errors in exposure calculations.
      2. Automated tests for climate data pipelines: data freshness
         checks, format validation, outlier detection.
      3. Container scanning for climate modeling execution environments
         to ensure reproducible and secure analysis.

      **Data provenance:**
      4. Track data lineage for all climate risk inputs: source, version,
         retrieval date, processing steps.
      5. Mandatory review for changes to climate risk classification
         methodology.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-container-scanning
      - gitlab-dependency-scanning
  secops:
    prose: |
      **Climate risk monitoring:**
      1. Continuous monitoring of climate-related early warning indicators
         with automated alerts for threshold breaches.
      2. Track mitigation action progress: are adaptation investments
         on schedule, are risk reduction targets being met.
      3. Periodic validation of climate risk models against actual events
         (did predicted risk levels materialize).

      **Evidence and reporting:**
      4. Maintain climate risk assessment evidence for external assurance:
         data sources, methodology, scoring results, prioritization
         decisions.
      5. Generate periodic climate risk reports distinguishing physical
         and transition risks by category, time horizon, and financial
         impact.
    tools:
      - siem
      - grc-platform
      - compliance-scanner
