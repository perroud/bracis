id: esg-7
family: riscos
title: "ESG Risk Identification and Assessment Process"
class: CVM-193
baselines: [companhias-abertas]
statement:
  prose: |
    A entidade deve divulgar informações sobre os processos utilizados para
    identificar e avaliar riscos e oportunidades relacionados à sustentabilidade,
    incluindo:

    (a) os processos e políticas utilizados pela entidade para identificar
    riscos e oportunidades relacionados à sustentabilidade;

    (b) os dados e informações (inputs) utilizados nesses processos;

    (c) como a entidade avalia a natureza, a probabilidade e a magnitude dos
    efeitos de riscos e oportunidades de sustentabilidade identificados,
    incluindo se a entidade utiliza análise de cenários;

    (d) como a entidade prioriza riscos e oportunidades de sustentabilidade
    em relação a outros tipos de risco;

    (e) como a entidade monitora riscos e oportunidades de sustentabilidade;

    (f) se e como os processos foram alterados em comparação com o período
    de reporte anterior.

    Referência: IFRS S1, §36-37; Resolução CVM nº 193/2023, art. 1º.
guidance:
  prose: |
    This control requires disclosure of the risk management "machinery" —
    not the risks themselves (covered in esg-4), but the processes used to
    identify, assess, and prioritize them.

    **Process transparency:**
    - The entity must describe its ESG risk identification methodology:
      top-down (strategic), bottom-up (operational), or both.
    - Data sources and inputs must be disclosed: internal operational
      data, external ESG ratings, climate databases, stakeholder
      engagement, regulatory horizon scanning.

    **Assessment methodology:**
    - How are likelihood and magnitude estimated? Qualitative scales,
      quantitative models, expert judgment, or combinations.
    - How is materiality determined? What thresholds trigger disclosure?

    **Prioritization:**
    - ESG risks must be prioritized alongside financial and operational
      risks, not in a parallel universe. The entity must explain how
      ESG risks compete for management attention with traditional risks.

    **Change disclosure:**
    - If the risk identification process changed from the prior period
      (new data sources, revised methodology, expanded scope), this
      must be disclosed.
implementation_guidance:
  platform_engineering:
    prose: |
      **Risk assessment platform:**
      1. Build an integrated risk assessment platform that combines ESG
         risk data with enterprise risk data in a single registry.
      2. Implement configurable risk scoring frameworks: likelihood ×
         magnitude matrices with ESG-specific calibration parameters.
      3. Automate data ingestion from multiple ESG data sources:
         climate databases, regulatory trackers, ESG ratings providers,
         internal operational systems.

      **Process documentation:**
      4. Maintain risk assessment methodology documentation in Git with
         version history showing year-over-year changes.
      5. Implement workflow automation for the risk identification cycle:
         data collection → assessment → scoring → prioritization →
         review → approval.
    tools:
      - git
      - terraform
      - gitlab-ci
      - opa-gatekeeper
      - vault
  devsecops:
    prose: |
      **Data pipeline integrity:**
      1. SAST scanning on risk assessment tools and scoring algorithms
         to prevent logic errors that could misclassify risk severity.
      2. Automated tests validating data ingestion pipelines: completeness
         checks, format validation, anomaly detection on incoming ESG data.
      3. Dependency scanning on third-party ESG data SDKs and scoring
         libraries.

      **Methodology validation:**
      4. Code review of risk scoring algorithms with mandatory approval
         by risk management team.
      5. Regression tests ensuring scoring methodology changes are
         intentional and documented.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dependency-scanning
      - sonarqube
  secops:
    prose: |
      **Process monitoring:**
      1. Track risk assessment cycle adherence: are assessments completed
         on schedule, are all required data sources consulted.
      2. Alert on process deviations: skipped assessment steps, overdue
         reviews, data source outages.
      3. Annual audit of risk identification process effectiveness —
         were material risks identified before they materialized?

      **Evidence management:**
      4. Maintain evidence of each risk assessment cycle: inputs used,
         scores assigned, prioritization decisions, approvers.
      5. Generate process comparison reports between current and prior
         period for disclosure of methodology changes.
    tools:
      - siem
      - grc-platform
      - compliance-scanner
