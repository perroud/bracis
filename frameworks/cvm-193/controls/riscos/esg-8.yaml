id: esg-8
family: riscos
title: "Integration with Enterprise Risk Management"
class: CVM-193
baselines: [companhias-abertas]
statement:
  prose: |
    A entidade deve divulgar informações sobre como os processos de
    identificação, avaliação e gestão de riscos relacionados à sustentabilidade
    são integrados aos processos gerais de gestão de riscos da entidade,
    incluindo:

    (a) como os riscos e oportunidades de sustentabilidade são integrados ao
    processo geral de gestão de riscos da entidade;

    (b) como a entidade avalia se os riscos e oportunidades de sustentabilidade
    são incluídos em seu perfil de risco geral;

    (c) como as interdependências entre riscos de sustentabilidade e outros
    riscos (financeiros, operacionais, regulatórios) são consideradas na
    avaliação de risco integrada.

    A integração efetiva requer que os riscos de sustentabilidade não sejam
    tratados como um exercício paralelo, mas como parte integrante do sistema
    de gestão de riscos corporativo, sujeito às mesmas políticas, processos
    e governança.

    Referência: IFRS S1, §38-39; Resolução CVM nº 193/2023, art. 1º.
guidance:
  prose: |
    IFRS S1 §38-39 specifically requires that sustainability risk management
    not be a separate, parallel process. This control ensures that ESG risks
    feed into the same enterprise risk management (ERM) framework used for
    financial, operational, and strategic risks.

    **Integration requirements:**
    - ESG risks must appear in the same risk register as financial risks.
    - ESG risks must be subject to the same escalation, reporting, and
      governance processes.
    - Risk appetite statements should address sustainability dimensions.
    - Capital allocation decisions should consider ESG risk exposures.

    **Interdependency analysis:**
    - Climate transition risk can amplify credit risk.
    - Physical climate risk can create operational risk.
    - Regulatory ESG risk can create legal and compliance risk.
    - The entity must demonstrate awareness of these cascading effects.

    **Common pitfalls:**
    - Having a separate "ESG risk report" that is not connected to the main
      risk dashboard.
    - Treating ESG risks as reputational-only without quantifying financial
      impact.
    - Excluding ESG from risk appetite framework.
implementation_guidance:
  platform_engineering:
    prose: |
      **Unified risk platform:**
      1. Implement a single risk management platform where ESG risks coexist
         with financial, operational, and compliance risks in one registry.
      2. Build risk interdependency mapping: define cascading relationships
         between ESG risks and other risk categories (e.g., transition risk
         → credit risk → financial loss).
      3. Integrate ESG risk scores into enterprise risk dashboards and
         reporting tools — no separate ESG silo.

      **Risk appetite integration:**
      4. Define ESG risk appetite parameters alongside traditional risk
         appetite metrics in version-controlled policy documents.
      5. Implement automated checks verifying that ESG risks are included
         in enterprise risk reports and board presentations.
    tools:
      - git
      - terraform
      - gitlab-ci
      - opa-gatekeeper
  devsecops:
    prose: |
      **Integration validation:**
      1. Automated tests verifying that the ESG risk registry and enterprise
         risk registry are synchronized — no orphaned ESG risks.
      2. SAST scanning on risk aggregation tools that combine ESG and
         financial risk data.
      3. API integration tests ensuring ESG data flows correctly into
         enterprise risk dashboards.

      **Change management:**
      4. Any changes to risk integration architecture must go through
         mandatory review by both risk management and sustainability teams.
      5. Regression tests on risk aggregation pipelines when either ESG
         or enterprise risk schemas change.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dependency-scanning
      - sonarqube
  secops:
    prose: |
      **Integration monitoring:**
      1. Verify that ESG risks appear in enterprise risk reports — automated
         check that ESG risk category is non-empty in quarterly reports.
      2. Track risk appetite utilization for ESG dimensions alongside
         traditional risk metrics.
      3. Alert when ESG risks are excluded from enterprise risk assessments
         or board risk reports.

      **Audit evidence:**
      4. Maintain evidence of integration: screenshots/exports showing ESG
         risks in enterprise risk register, board meeting minutes
         discussing ESG risks alongside financial risks.
      5. Annual integration effectiveness review with documented findings
         and remediation actions.
    tools:
      - siem
      - grc-platform
      - compliance-scanner
