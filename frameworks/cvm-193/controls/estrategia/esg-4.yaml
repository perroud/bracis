id: esg-4
family: estrategia
title: "Sustainability-Related Risks and Opportunities Identification"
class: CVM-193
baselines: [companhias-abertas]
statement:
  prose: |
    A entidade deve divulgar informações que permitam aos usuários de relatórios
    financeiros de propósito geral compreender os riscos e oportunidades
    relacionados à sustentabilidade que poderiam razoavelmente afetar as
    perspectivas da entidade, incluindo:

    (a) uma descrição dos riscos e oportunidades relacionados à sustentabilidade
    que poderiam razoavelmente afetar as perspectivas da entidade;

    (b) o horizonte temporal sobre o qual cada risco ou oportunidade de
    sustentabilidade poderia razoavelmente afetar a entidade — curto, médio
    ou longo prazo;

    (c) como a entidade define curto, médio e longo prazo e como essas
    definições estão vinculadas ao horizonte de planejamento e aos ciclos
    estratégicos da entidade.

    Para riscos e oportunidades relacionados ao clima, a entidade deve aplicar
    adicionalmente o IFRS S2, incluindo riscos físicos (agudos e crônicos) e
    riscos de transição (regulatório, tecnológico, mercado, reputacional).

    Referência: IFRS S1, §28-29; IFRS S2, §10-12; Resolução CVM nº 193/2023, art. 1º.
guidance:
  prose: |
    This control requires the entity to produce a comprehensive inventory of
    sustainability-related risks and opportunities, classified by time horizon
    and by type.

    **IFRS S1 general sustainability risks:**
    - Any sustainability-related risk or opportunity that could reasonably
      affect the entity's cash flows, access to finance, or cost of capital
      over the short, medium, or long term.

    **IFRS S2 climate-specific risks:**
    - Physical risks: acute (extreme weather events) and chronic (sea level
      rise, temperature changes, water stress).
    - Transition risks: policy/legal, technology, market, reputation.
    - Climate-related opportunities: resource efficiency, energy source,
      products/services, markets, resilience.

    **Time horizon requirements:**
    - The entity must define what "short," "medium," and "long" term mean
      in its specific context and explain the rationale.
    - These definitions should be consistent with strategic planning cycles
      and capital investment horizons.

    **Materiality:**
    - The entity must apply the IFRS S1 materiality assessment to determine
      which risks and opportunities are material for disclosure. This is
      financial materiality — impact on enterprise value.
implementation_guidance:
  platform_engineering:
    prose: |
      **Risk and opportunity registry:**
      1. Build a centralized ESG risk register as a structured database
         (YAML/JSON in Git or dedicated GRC tool) capturing: risk ID,
         description, category (physical/transition/general), time horizon,
         likelihood, financial impact estimate, owner.
      2. Implement automated classification pipelines that tag risks by
         IFRS S2 categories (physical-acute, physical-chronic,
         transition-policy, transition-technology, transition-market,
         transition-reputation).
      3. Integrate with enterprise risk management (ERM) systems to ensure
         ESG risks are not siloed but consolidated with financial and
         operational risks.

      **Time horizon management:**
      4. Define time horizon parameters as configurable variables in the
         platform — changes to horizon definitions automatically propagate
         to all risk classifications.
      5. Implement automated materiality assessment workflows that score
         risks against financial impact thresholds.
    tools:
      - git
      - terraform
      - gitlab-ci
      - opa-gatekeeper
  devsecops:
    prose: |
      **Risk data integrity:**
      1. SAST scanning on risk registry applications to prevent injection
         vulnerabilities that could corrupt risk data.
      2. Automated tests validating that every risk entry contains all
         required IFRS S1/S2 fields before pipeline passes.
      3. Dependency scanning on third-party climate data APIs and ESG
         scoring libraries used in risk assessment.

      **Version control:**
      4. Full Git history for risk register changes with mandatory merge
         request reviews by risk management and sustainability teams.
      5. Automated diff reports showing changes to risk classifications
         between reporting periods.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dependency-scanning
      - sonarqube
  secops:
    prose: |
      **Risk monitoring:**
      1. Continuous monitoring of external ESG risk indicators (regulatory
         changes, climate events, market signals) and automated matching
         against the entity's risk register.
      2. Alert on material changes: new regulations, significant climate
         events affecting operations, shifts in market conditions.
      3. Periodic review (at least quarterly) of the risk register for
         completeness and accuracy.

      **Reporting:**
      4. Generate risk heatmaps by category and time horizon for board
         and management review.
      5. Maintain audit trail of all risk assessment decisions and
         materiality determinations for external assurance.
    tools:
      - siem
      - grc-platform
      - compliance-scanner
