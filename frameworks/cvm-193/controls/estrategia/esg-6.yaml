id: esg-6
family: estrategia
title: "Climate Resilience and Scenario Analysis"
class: CVM-193
baselines: [companhias-abertas]
statement:
  prose: |
    A entidade deve divulgar informações que permitam aos usuários compreender
    a resiliência de sua estratégia e modelo de negócios a riscos relacionados
    ao clima, incluindo:

    (a) a avaliação da resiliência climática da entidade utilizando análise de
    cenários climáticos, considerando cenários consistentes com as últimas
    evidências científicas, incluindo um cenário alinhado ao Acordo de Paris
    (limitação do aquecimento a 1,5°C acima dos níveis pré-industriais);

    (b) se a entidade utilizou análise de cenários quantitativa ou qualitativa;

    (c) os horizontes temporais utilizados na análise;

    (d) os pressupostos e parâmetros significativos utilizados na análise,
    incluindo premissas sobre políticas climáticas, desenvolvimento tecnológico,
    padrões de consumo e tendências macroeconômicas;

    (e) os resultados da análise de resiliência e as implicações para a
    estratégia da entidade, incluindo como a entidade planeja responder a
    cenários adversos.

    Referência: IFRS S2, §22; Resolução CVM nº 193/2023, art. 1º.
guidance:
  prose: |
    Climate resilience and scenario analysis is the most technically demanding
    disclosure under IFRS S2. It requires the entity to stress-test its
    business model against climate scenarios.

    **Scenario analysis requirements:**
    - At minimum, include a Paris-aligned scenario (1.5°C or well below 2°C).
    - Scenarios should cover both physical and transition risks.
    - The entity should explain the choice of scenarios and their relevance
      to its specific business context.

    **Quantitative vs. qualitative:**
    - IFRS S2 allows qualitative scenario analysis but strongly encourages
      quantitative approaches where feasible.
    - If qualitative, the entity must explain why quantitative analysis was
      not possible and whether it plans to develop quantitative capabilities.

    **Assumptions and parameters:**
    - Carbon price assumptions, energy mix projections, regulatory timelines,
      technology adoption curves.
    - These must be explicitly disclosed, not buried in footnotes.

    **Resilience conclusions:**
    - The entity must describe what the analysis revealed about its
      vulnerabilities and what actions it plans to take.
    - This is not a pass/fail test — it is a transparency exercise.
implementation_guidance:
  platform_engineering:
    prose: |
      **Scenario analysis infrastructure:**
      1. Implement climate scenario modeling pipelines that process
         standardized scenarios (IEA, NGFS, IPCC) and apply them to
         entity-specific parameters.
      2. Build parameterized models where scenario assumptions (carbon
         prices, temperature pathways, technology curves) are configurable
         inputs stored in version-controlled configuration files.
      3. Automate sensitivity analysis: vary key parameters and generate
         impact ranges across financial dimensions.

      **Data integration:**
      4. Connect scenario models to asset-level data (location, sector,
         technology) for granular physical and transition risk assessment.
      5. Integrate scenario analysis outputs with financial planning
         systems to generate resilience-adjusted projections.
    tools:
      - git
      - terraform
      - gitlab-ci
      - vault
  devsecops:
    prose: |
      **Model validation:**
      1. Automated tests for scenario models: boundary conditions, sanity
         checks on outputs, regression tests when parameters change.
      2. SAST scanning on scenario modeling code to prevent calculation
         errors that could misstate resilience conclusions.
      3. Peer review of model logic through mandatory merge request
         reviews by climate science and finance teams.

      **Reproducibility:**
      4. Full version control of scenario models, parameters, and
         outputs — any published result must be reproducible from
         committed code and data.
      5. Containerized execution environments for scenario models to
         ensure consistent results across runs.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-container-scanning
      - sonarqube
  secops:
    prose: |
      **Scenario monitoring:**
      1. Track when scenario assumptions become outdated (e.g., new IPCC
         report, new national policies) and trigger model rerun.
      2. Periodic validation of scenario results against actual climate
         developments (backtest scenario projections).
      3. Alert when material changes in external conditions warrant
         interim scenario analysis update.

      **Assurance trail:**
      4. Maintain complete documentation of scenario methodology,
         assumptions, data sources, and model outputs for external
         assurance.
      5. Generate audit-ready reports showing input-to-output traceability
         for each published scenario analysis.
    tools:
      - siem
      - grc-platform
      - compliance-scanner
legal_references:
  - framework_id: cvm-175
    articles: ["art-27", "art-32"]
    relationship: complements
