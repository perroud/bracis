id: esg-5
family: estrategia
title: "Climate Transition Plan"
class: CVM-193
baselines: [companhias-abertas]
statement:
  prose: |
    A entidade deve divulgar informações sobre seu plano de transição climática,
    incluindo:

    (a) como a entidade planeja alcançar quaisquer metas relacionadas ao clima
    que tenha estabelecido, incluindo metas de emissões de gases de efeito
    estufa;

    (b) os investimentos de capital e o financiamento alocados ou planejados
    para a implementação do plano de transição;

    (c) as mudanças planejadas no modelo de negócios e na estratégia da entidade
    em resposta a riscos e oportunidades relacionados ao clima;

    (d) o efeito esperado do plano de transição sobre a posição financeira, o
    desempenho financeiro e os fluxos de caixa da entidade ao longo dos
    horizontes de curto, médio e longo prazo;

    (e) o progresso da entidade em relação ao plano de transição divulgado
    anteriormente.

    Se a entidade não possui um plano de transição, deve divulgar essa
    informação e explicar se e quando pretende desenvolver tal plano.

    Referência: IFRS S2, §14(a); Resolução CVM nº 193/2023, art. 1º.
guidance:
  prose: |
    The climate transition plan is one of the most scrutinized disclosures
    under IFRS S2. It goes beyond aspirational statements — it requires
    concrete, financially grounded plans.

    **Key elements of a credible transition plan:**
    - Specific targets (e.g., net zero by 2050, 50% reduction by 2030)
      with intermediate milestones.
    - Capital expenditure allocated to transition activities (renewable
      energy, efficiency upgrades, technology changes).
    - Revenue implications — which business lines will grow, shrink, or
      transform.
    - Quantified financial impact on the income statement, balance sheet,
      and cash flows over defined time horizons.

    **Progress tracking:**
    - The entity must report progress against the previously disclosed
      plan, not just restate the plan each year.
    - If targets have been revised, the entity must explain why and what
      changed.

    **No plan? Disclose that:**
    - IFRS S2 does not mandate that every entity must have a transition
      plan, but it mandates disclosure of whether one exists.
    - If no plan exists, the entity must explain the reasoning and any
      future intentions.

    **Financial integration:**
    - The transition plan must connect to the financial statements. Vague
      commitments without financial backing are insufficient.
implementation_guidance:
  platform_engineering:
    prose: |
      **Transition plan data infrastructure:**
      1. Implement a structured transition plan repository in Git with
         YAML schemas for: targets, milestones, CAPEX allocations, business
         model changes, financial projections by time horizon.
      2. Automate financial impact modeling — connect transition plan
         parameters to financial projection tools that calculate impacts
         on EBITDA, cash flows, and asset valuations.
      3. Build dashboards tracking transition plan progress: actual vs.
         planned CAPEX deployment, emission reduction trajectory, target
         achievement rates.

      **Version management:**
      4. Full version history of transition plans with mandatory approval
         workflows before publication.
      5. Automated comparison between current and prior-period transition
         plans to generate progress reports.
    tools:
      - git
      - terraform
      - gitlab-ci
      - vault
  devsecops:
    prose: |
      **Data quality assurance:**
      1. Automated tests validating internal consistency of transition plan
         data: CAPEX totals match detail, emission reduction targets are
         mathematically achievable given stated actions.
      2. SAST scanning on financial projection code to prevent calculation
         errors that could misrepresent transition costs.
      3. Dependency scanning on climate scenario modeling libraries.

      **Change control:**
      4. Mandatory multi-party review for any changes to published
         transition plan parameters (targets, timelines, financial
         projections).
      5. Automated regression tests to ensure transition plan changes do
         not create inconsistencies with other disclosed data.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dependency-scanning
      - sonarqube
  secops:
    prose: |
      **Progress monitoring:**
      1. Quarterly tracking of transition plan KPIs: CAPEX deployment rate,
         emission reduction progress, milestone achievement.
      2. Automated alerts when progress deviates significantly from plan
         (e.g., CAPEX underspend > 20%, emission reduction behind schedule).
      3. Annual review of transition plan credibility — compare planned vs.
         actual outcomes.

      **Assurance readiness:**
      4. Maintain auditable evidence chain from transition plan commitments
         to financial statements to actual expenditures.
      5. Prepare reconciliation between transition plan disclosures and
         capital expenditure records for external assurance.
    tools:
      - siem
      - grc-platform
      - compliance-scanner
legal_references:
  - framework_id: cvm-175
    articles: ["art-27"]
    relationship: complements
