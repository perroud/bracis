id: esg-11
family: metricas
title: "Industry-Based Sustainability Metrics"
class: CVM-193
baselines: [companhias-abertas]
statement:
  prose: |
    A entidade deve divulgar métricas e indicadores de sustentabilidade
    específicos do seu setor de atuação, conforme aplicável, incluindo:

    (a) métricas baseadas em padrões setoriais derivados dos padrões SASB
    (Sustainability Accounting Standards Board), incorporados ao IFRS S1,
    que sejam relevantes para o setor de atuação da entidade;

    (b) métricas cross-setoriais aplicáveis a todos os setores, incluindo
    emissões de GEE, uso de recursos hídricos, consumo de energia, gestão
    de resíduos e indicadores de capital humano;

    (c) a descrição das metodologias utilizadas para calcular cada métrica,
    incluindo limitações, premissas e estimativas;

    (d) quando aplicável, a comparação das métricas com períodos anteriores
    para permitir análise de tendências;

    (e) a relação entre as métricas de sustentabilidade divulgadas e os
    valores reconhecidos nas demonstrações financeiras da entidade.

    Referência: IFRS S1, §40-46, §55-58; IFRS S2, §23-28;
    Resolução CVM nº 193/2023, art. 1º.
guidance:
  prose: |
    IFRS S1 adopts the SASB industry-based approach, meaning that different
    industries must report different sustainability metrics. This control
    ensures that the entity identifies and reports the metrics most relevant
    to its sector.

    **SASB industry classification:**
    - The entity must identify its SICS (Sustainable Industry Classification
      System) sector and industry.
    - Report all metrics identified as relevant for that industry, or explain
      why specific metrics were excluded.

    **Cross-sector metrics:**
    - Some metrics apply to all entities regardless of sector: GHG emissions,
      energy consumption, water usage, waste generation, workforce diversity.
    - These must be reported even if the entity's primary industry does not
      specifically require them.

    **Methodology disclosure:**
    - Each metric must include methodology description: data sources,
      calculation methods, estimation techniques, limitations.
    - Year-over-year comparability is required where prior-period data is
      available.

    **Financial connectivity:**
    - IFRS S1 requires the entity to explain the connection between
      sustainability metrics and amounts in the financial statements.
    - Example: energy costs disclosed as sustainability metric should be
      reconcilable to energy expense in the income statement.
implementation_guidance:
  platform_engineering:
    prose: |
      **Metrics data platform:**
      1. Build a sustainability metrics database organized by SASB industry
         classification with configurable metric definitions per sector.
      2. Implement automated data collection pipelines connecting
         operational systems (ERP, HRMS, energy management, waste
         management) to the sustainability metrics platform.
      3. Automate financial connectivity: link sustainability metrics to
         corresponding financial statement line items with reconciliation
         capabilities.

      **Historical tracking:**
      4. Time-series database for sustainability metrics enabling trend
         analysis and year-over-year comparisons.
      5. Version-controlled methodology documentation for each metric
         with change history.
    tools:
      - git
      - terraform
      - gitlab-ci
      - vault
  devsecops:
    prose: |
      **Data quality assurance:**
      1. Automated tests validating metric calculations against expected
         ranges, cross-checking with financial data.
      2. SAST scanning on metric aggregation and calculation code to
         prevent errors in sustainability KPI computation.
      3. Schema validation ensuring all SASB-required fields are populated
         for the entity's industry classification.

      **Consistency checks:**
      4. Automated cross-validation between sustainability metrics and
         financial statements (energy cost vs. energy consumption metrics).
      5. Regression tests detecting unexpected metric value changes when
         calculation methodologies are updated.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dependency-scanning
      - sonarqube
  secops:
    prose: |
      **Metrics monitoring:**
      1. Dashboards tracking all industry-specific and cross-sector
         sustainability metrics with real-time data feeds.
      2. Automated alerts for data gaps: missing metrics, overdue data
         submissions, failed collection pipelines.
      3. Trend monitoring with anomaly detection — flag metrics that
         deviate significantly from historical patterns.

      **Assurance support:**
      4. Maintain metric-level audit trails: raw data → calculation →
         published figure with full traceability.
      5. Generate metric completeness reports showing coverage against
         SASB industry requirements.
    tools:
      - siem
      - grc-platform
      - compliance-scanner
legal_references:
  - framework_id: cvm-175
    articles: ["art-43"]
    relationship: complements
