id: esg-12
family: metricas
title: "Sustainability Targets and Performance Tracking"
class: CVM-193
baselines: [companhias-abertas]
statement:
  prose: |
    A entidade deve divulgar informações sobre as metas que estabeleceu para
    monitorar seu progresso em relação ao cumprimento de objetivos estratégicos
    de sustentabilidade, incluindo:

    (a) a métrica utilizada para estabelecer a meta e para monitorar o
    progresso em direção ao seu cumprimento;

    (b) o objetivo específico que a meta visa atingir, incluindo se e como se
    relaciona a compromissos internacionais (como o Acordo de Paris ou metas
    de neutralidade de carbono);

    (c) o período ao qual a meta se aplica;

    (d) o ano-base a partir do qual o progresso é medido;

    (e) marcos intermediários e indicadores de progresso;

    (f) o desempenho em relação a cada meta divulgada, incluindo análise de
    tendência;

    (g) se as metas foram revisadas e, em caso afirmativo, explicação da
    revisão e dos motivos;

    (h) se as metas foram validadas por terceiros, incluindo validação
    baseada em ciência (Science-Based Targets initiative — SBTi).

    Referência: IFRS S1, §47-53; IFRS S2, §33-36;
    Resolução CVM nº 193/2023, art. 1º.
guidance:
  prose: |
    Targets disclosure brings accountability to sustainability commitments.
    Without targets, ESG strategy is aspirational at best. This control
    requires concrete, measurable, and trackable commitments.

    **Target structure requirements:**
    - Each target must be tied to a specific metric (e.g., "reduce Scope 1
      emissions by 42% by 2030 from a 2019 base year").
    - Interim milestones are required, not just end-state goals.
    - The relationship to external commitments (Paris Agreement, SBTi,
      net-zero pledges) must be stated.

    **Performance tracking:**
    - Year-over-year progress against each target must be disclosed.
    - If off-track, the entity must explain why and what corrective actions
      are planned.
    - If targets are revised (raised or lowered), the entity must explain
      the revision and restate historical progress accordingly.

    **Third-party validation:**
    - Increasingly expected by investors. SBTi validation for climate
      targets is the most recognized standard.
    - If not validated, the entity should explain its approach to
      target-setting rigor.

    **Base year management:**
    - The base year and recalculation policy must be disclosed.
    - Material structural changes (acquisitions, divestitures) may require
      base year recalculation.
implementation_guidance:
  platform_engineering:
    prose: |
      **Target management system:**
      1. Implement a structured target registry with YAML/JSON schemas
         capturing: target ID, metric, baseline value, target value,
         interim milestones, time horizon, external commitment linkage,
         validation status.
      2. Automate progress tracking: connect target metrics to data
         collection pipelines and generate real-time progress dashboards.
      3. Build base year recalculation capabilities: when structural
         changes occur, automatically flag targets requiring base year
         adjustment.

      **Reporting automation:**
      4. Automated target performance reports comparing actual vs.
         planned trajectory with trend visualization.
      5. Automated detection of off-track targets with escalation to
         responsible management teams.
    tools:
      - git
      - terraform
      - gitlab-ci
      - vault
  devsecops:
    prose: |
      **Target data integrity:**
      1. Automated tests validating target definitions: completeness of
         required fields, mathematical consistency of milestones with
         end targets, base year integrity.
      2. SAST scanning on progress calculation code to prevent tracking
         errors.
      3. Version control for target revisions: every change to a target
         must be documented with justification in a merge request.

      **Consistency validation:**
      4. Automated cross-checks between targets and reported metrics —
         if emissions target exists, emissions data must be reported.
      5. Regression tests ensuring target revision does not create
         historical inconsistencies.
    tools:
      - gitlab-ci
      - gitlab-sast
      - sonarqube
  secops:
    prose: |
      **Target monitoring:**
      1. Dashboards showing all active sustainability targets with
         traffic-light status (on-track, at-risk, off-track).
      2. Automated alerts for: approaching deadlines without sufficient
         progress, milestone dates passed without achievement, targets
         requiring base year recalculation.
      3. Quarterly target progress reviews with documented outcomes.

      **Assurance evidence:**
      4. Maintain complete target lifecycle documentation: original
         commitment, methodology, annual progress, revisions, supporting
         evidence.
      5. Prepare target-specific audit packages for external assurance
         including third-party validation certificates.
    tools:
      - siem
      - grc-platform
      - compliance-scanner
legal_references:
  - framework_id: cvm-175
    articles: ["art-43"]
    relationship: complements
