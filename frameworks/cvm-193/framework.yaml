control_families:
  - id: governanca
    title: "ESG Governance"
    description: "Governance bodies, oversight responsibilities, and accountability structures for sustainability-related risks and opportunities per IFRS S1 chapters on governance disclosures."
    articles: "art. 1 ao art. 4, IFRS S1 §26-27"
    control_count: 3
  - id: estrategia
    title: "Sustainability and Climate Strategy"
    description: "Strategy disclosures covering sustainability-related risks and opportunities, transition plans, climate resilience, and financial impact per IFRS S1 §28-35 and IFRS S2 §13-22."
    articles: "art. 5 ao art. 7, IFRS S1 §28-35, IFRS S2 §13-22"
    control_count: 3
  - id: riscos
    title: "ESG Risk Management"
    description: "Processes for identifying, assessing, prioritizing, and monitoring sustainability-related risks, including integration with enterprise risk management per IFRS S1 §36-39."
    articles: "art. 8 ao art. 10, IFRS S1 §36-39"
    control_count: 3
  - id: metricas
    title: "Metrics and Targets"
    description: "Quantitative and qualitative metrics, GHG emissions (Scope 1, 2, 3), industry-based disclosures, and performance targets per IFRS S1 §40-53 and IFRS S2 §23-36."
    articles: "art. 11 ao art. 13, IFRS S1 §40-53, IFRS S2 §23-36"
    control_count: 3
  - id: divulgacao
    title: "Disclosure and Assurance"
    description: "Requirements for publication of the sustainability report, independent assurance, phased implementation timeline, and integration with financial statements per CVM 193 art. 1-4."
    articles: "art. 1 ao art. 4, anexo"
    control_count: 3
related_frameworks:
  - framework_id: cvm-175
    relationship: complements
    description: >-
      A CVM 175 regulamenta os fundos de investimento. Gestores de fundos devem
      considerar os riscos ESG divulgados pelas companhias investidas conforme a CVM 193
      em suas decisões de investimento.
  - framework_id: cvm-135
    relationship: complements
    description: >-
      A CVM 135 regulamenta as ofertas públicas de valores mobiliários. As divulgações
      de sustentabilidade da CVM 193 complementam as informações exigidas nos prospectos
      de oferta pública.
  - framework_id: lgpd
    relationship: complements
    description: "A LGPD complementa a CVM 193 na proteção de dados pessoais coletados durante processos de due diligence ESG e engajamento com partes interessadas."
  - framework_id: tcfd
    relationship: derived-from
    description: "Os padrões IFRS S1 e S2, adotados pela CVM 193, são derivados das recomendações da TCFD (Task Force on Climate-related Financial Disclosures)."
