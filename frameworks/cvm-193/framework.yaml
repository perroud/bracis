id: cvm-193
title: "Resolução CVM nº 193/2023 — Relatório de Informações Financeiras Relacionadas à Sustentabilidade (IFRS S1/S2)"
short_title: "CVM 193"
version: "193/2023"
publication_date: "2023-10-20"
last_updated: "2023-10-20"
effective_date: "2024-01-01"
authority:
  name: "Comissão de Valores Mobiliários"
  acronym: "CVM"
  country: "BR"
  url: "https://www.gov.br/cvm"
type: resolution
scope: sustainability-reporting
mandatory: true
