baselines:
  - id: secure-software-standard
    title: "Secure Software Standard (S3)"
  - id: secure-slc-standard
    title: "Secure Software Lifecycle Standard (SSLC)"

control_families:
  - id: ssf-design
    title: "Secure Software Design"
    description: "Controls ensuring threat modeling, secure architecture, and attack surface minimization are integral to software design."
    control_count: 3
  - id: ssf-auth
    title: "Authentication and Access Control"
    description: "Controls ensuring software implements robust authentication, authorization, and access control mechanisms."
    control_count: 3
  - id: ssf-data
    title: "Sensitive Data Protection"
    description: "Controls ensuring sensitive data, including cardholder data, is protected throughout the software lifecycle."
    control_count: 3
  - id: ssf-crypto
    title: "Cryptographic Support"
    description: "Controls ensuring cryptographic operations use approved algorithms, secure key management, and strong protocols."
    control_count: 2
  - id: ssf-logging
    title: "Security Logging"
    description: "Controls ensuring software generates comprehensive audit trails and security-relevant event logs."
    control_count: 2
  - id: ssf-lifecycle
    title: "Secure Software Lifecycle"
    description: "Controls ensuring governance, risk management, and security practices are embedded throughout the SDLC."
    control_count: 3
  - id: ssf-testing
    title: "Security Testing"
    description: "Controls ensuring vulnerability detection, penetration testing, and security validation are performed systematically."
    control_count: 2

related_frameworks:
