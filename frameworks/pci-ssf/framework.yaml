id: pci-ssf
title: "PCI Software Security Framework v1.2 — Secure Software Standard & Secure Software Lifecycle"
short_title: "PCI SSF v1.2"
version: "1.2"
publication_date: "2023-06-01"
last_updated: "2023-06-01"

authority:
  name: "Payment Card Industry Security Standards Council"
  acronym: "PCI SSC"
  country: US
  url: "https://www.pcisecuritystandards.org/"

type: standard
scope: application-security
mandatory: true

original_language: en
available_languages:
  - en

industries:
  - financial-services
  - software-development
  - payment-processing
  - fintech
  - technology

regions:
  - global

techstacks:
  - platform-engineering
  - devsecops
  - secops
