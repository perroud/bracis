id: ssf-lifecycle-2
family: ssf-lifecycle
title: "Secure Development Practices and Training"
class: PCI-SSF
baselines: [secure-slc-standard]

statement:
  prose: >-
    The software vendor shall ensure that all personnel involved in software
    development receive security training relevant to their roles. Developers shall
    be trained on secure coding practices, common vulnerability patterns, and the
    organization's security standards at least annually. The development process
    shall enforce secure coding standards that address common vulnerability
    categories including injection, authentication failures, sensitive data exposure,
    and security misconfiguration. Code reviews shall include security-focused
    evaluation by personnel trained in application security.

guidance:
  prose: >-
    Secure software is built by security-aware developers. PCI SSF requires that
    vendors invest in security training tailored to each role in the development
    process. Developers need hands-on training in secure coding that goes beyond
    awareness-level education. The training must be updated to reflect current
    threat landscapes and must cover the specific technologies used by the
    organization. Secure coding standards provide a concrete reference that
    developers can follow, and security-focused code reviews serve as both a
    quality gate and a training mechanism.

references:
  - citation: "PCI SSF v1.2, Secure SLC Standard, Objective 2 — Secure Development Practices"
    url: "https://www.pcisecuritystandards.org/"
  - citation: "PCI Secure Software Lifecycle Standard v1.2, Section 2.1-2.3"
    url: "https://www.pcisecuritystandards.org/"

implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate security linting and secure coding standards enforcement directly
      into the development environment through IDE plugins and pre-commit hooks.
      Configure CI/CD pipelines with mandatory SAST scanning that enforces the
      organization's secure coding standard. Deploy shared security libraries and
      middleware that implement common security patterns (input validation,
      output encoding, authentication) so developers use secure defaults.
      Implement automated security training tracking as a gate for repository
      access.
    tools:
      - semgrep
      - gitlab-ci
      - pre-commit
      - sonarqube
      - eslint-security
      - bandit

  devsecops:
    prose: >-
      Enforce mandatory code review with at least one security-trained reviewer for
      all merge requests. Configure SAST rules aligned with the organization's
      secure coding standard and block merges on violations. Implement automated
      security training platforms with hands-on labs for developers. Track secure
      coding metrics including vulnerability introduction rate per developer and
      time to remediate findings. Publish a living secure coding guide integrated
      with the repository as developer documentation.
    tools:
      - gitlab-sast
      - gitlab-code-review
      - semgrep
      - sonarqube
      - snyk-learn
      - secure-code-warrior

  secops:
    prose: >-
      Track and report on security training completion rates across development
      teams. Monitor code review quality metrics to ensure security reviews are
      substantive. Analyze vulnerability trends to identify areas where additional
      training is needed. Conduct periodic assessments of secure coding standard
      compliance across the codebase. Report on the effectiveness of training
      programs using metrics such as vulnerability density over time.
    tools:
      - jira
      - confluence
      - splunk
      - grafana
      - servicenow

