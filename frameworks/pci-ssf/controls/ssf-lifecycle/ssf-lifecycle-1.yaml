id: ssf-lifecycle-1
family: ssf-lifecycle
title: "Secure Software Development Governance"
class: PCI-SSF
baselines: [secure-slc-standard]

statement:
  prose: >-
    The software vendor shall establish and maintain a secure software development
    governance program that includes documented security policies, defined roles and
    responsibilities, and accountability for software security throughout the
    organization. The governance program shall define security requirements for each
    phase of the software development lifecycle, assign ownership of security
    activities, and establish metrics to measure the effectiveness of the security
    program. Management shall review the program at defined intervals and allocate
    resources sufficient to meet security objectives.

guidance:
  prose: >-
    The Secure Software Lifecycle (SSLC) component of PCI SSF addresses organizational
    governance rather than technical controls. It requires that security is not an
    afterthought but is embedded in the organization's culture and processes from the
    top down. Management commitment is demonstrated through resource allocation,
    defined roles, and regular program reviews. The governance program must cover all
    phases of the SDLC from requirements through retirement, ensuring that security
    considerations are addressed at every stage. Metrics provide visibility into
    program effectiveness and drive continuous improvement.

references:
  - citation: "PCI SSF v1.2, Secure SLC Standard, Objective 1 — Governance"
    url: "https://www.pcisecuritystandards.org/"
  - citation: "PCI Secure Software Lifecycle Standard v1.2, Section 1.1-1.3"
    url: "https://www.pcisecuritystandards.org/"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement SDLC governance as code through mandatory pipeline stages that
      enforce security activities at each phase. Configure merge request templates
      that include security requirement checklists. Deploy compliance dashboards
      that track security activity completion across projects. Enforce branch
      protection rules that require security review sign-off before production
      deployment. Implement automated security metrics collection from pipelines,
      scanners, and code reviews to feed governance dashboards.
    tools:
      - gitlab-ci
      - argocd
      - grafana
      - prometheus
      - terraform

  devsecops:
    prose: >-
      Define and enforce security gates at each SDLC phase through CI/CD pipeline
      configuration. Implement security requirement templates for user stories and
      technical designs. Configure mandatory security reviewer assignments for merge
      requests affecting security-relevant code. Track security training completion
      for developers as a pipeline gate. Generate automated security metrics reports
      including vulnerability density, mean time to remediate, and security test
      coverage.
    tools:
      - gitlab-ci
      - gitlab-compliance-pipelines
      - jira
      - semgrep
      - sonarqube

  secops:
    prose: >-
      Monitor compliance with SDLC governance policies across all projects. Generate
      executive dashboards showing security program effectiveness metrics. Conduct
      periodic assessments of SDLC governance implementation against PCI SSF
      requirements. Track and report on exceptions to security policies with
      accountability. Support management reviews with data on vulnerability trends,
      incident rates, and security activity completion.
    tools:
      - splunk
      - jira
      - servicenow
      - confluence
      - grafana

