id: art-16
family: cap-3
title: "Due Diligence Reforcada"
class: BCB-3978
statement:
  prose: |
    Art. 16. As instituições mencionadas no art. 1 devem adotar procedimentos reforçados
    de identificação, qualificação e monitoramento para clientes classificados em
    categorias de maior risco, proporcionais ao risco identificado.

    Parágrafo único. Os procedimentos reforçados de que trata o caput devem incluir,
    no mínimo:
    I - a obtenção de informações adicionais sobre os clientes, incluindo a verificação
    da origem dos recursos e da finalidade das transações;
    II - a autorização de nível hierárquico superior para o início ou a manutenção
    da relação de negócio; e
    III - o monitoramento mais frequente das operações do cliente.
guidance:
  prose: |
    O art. 16 estabelece a obrigacao de Enhanced Due Diligence (EDD) para clientes
    de alto risco, completando a abordagem baseada em risco da circular.

    **Proporcionalidade:**
    Os procedimentos devem ser proporcionais ao nivel de risco identificado.
    Nao e one-size-fits-all: clientes de risco alto podem exigir medidas
    diferentes dependendo da natureza do risco (PEP vs. pais de alto risco
    vs. atividade economica de risco).

    **Procedimentos minimos (paragrafo unico):**
    1. Informacoes adicionais: alem dos dados minimos dos arts. 11 e 12,
       coletar informacoes complementares como:
       - Declaracao de imposto de renda
       - Comprovante de origem patrimonial
       - Relatorio de investigacao reputacional
       - Documentacao sobre a finalidade especifica das transacoes

    2. Aprovacao superior: inicio ou manutencao da relacao deve ser aprovado
       por nivel hierarquico acima do operacional. Na pratica:
       - Onboarding: aprovacao do compliance officer ou superior
       - Manutencao: revisao periodica com aprovacao documentada

    3. Monitoramento mais frequente: regras de monitoramento com thresholds
       mais baixos e frequencia mais alta. Na pratica:
       - Revisao de alertas com prioridade elevada
       - Monitoramento em tempo real (vs. batch para risco baixo)
       - Revisao periodica do perfil transacional
implementation_guidance:
  platform_engineering:
    prose: |
      **Pipeline de EDD automatizado:**
      1. Trigger automatico de EDD quando cliente e classificado como alto risco
         (onboarding ou reclassificacao).
      2. Formulario de EDD com campos adicionais: origem patrimonial, fonte de
         renda detalhada, finalidade de transacoes esperadas.
      3. Integracao com fontes de investigacao reputacional (adverse media
         screening, registros judiciais, acoes civis).
      4. Score de risco reputacional integrado ao perfil do cliente.

      **Workflow de aprovacao (inciso II):**
      5. Workflow obrigatorio de aprovacao pelo compliance officer para abertura
         de conta de alto risco.
      6. Workflow de revisao periodica (semestral/anual) com documentacao de
         decisao de manutencao.
      7. Bloqueio automatico quando revisao periodica esta atrasada.

      **Monitoramento reforcado (inciso III):**
      8. Regras de monitoramento diferenciadas por categoria de risco com
         thresholds parametrizaveis.
      9. Processamento em tempo real para clientes de alto risco
         (vs. batch para risco baixo/medio).
      10. Alerta automatico para transacoes de alto valor relativo ao perfil.
    tools:
      - aml-platform
      - adverse-media-screening
      - workflow-engine
      - transaction-monitoring
  devsecops:
    prose: |
      **Testes de EDD:**
      1. Testes de trigger de EDD por tipo de risco (PEP, jurisdicao, CNAE).
      2. Testes de workflow de aprovacao (fluxo completo de aprovacao/rejeicao).
      3. Testes de regras de monitoramento diferenciadas por categoria.
      4. Testes de performance do monitoramento real-time vs. batch.

      **Pipeline de qualidade:**
      5. Metricas de cobertura de EDD (percentual de alto risco com EDD completo).
      6. Alertas quando cliente de alto risco nao tem EDD documentado.
      7. Testes de regressao quando regras de EDD sao alteradas.
      8. Validacao automatica de completude do formulario de EDD.
    tools:
      - gitlab-ci
      - test-automation
      - monitoring
      - data-quality
  secops:
    prose: |
      **Gestao de clientes de alto risco:**
      1. Portfolio de clientes de alto risco com revisao periodica obrigatoria.
      2. Dashboard de status de EDD (completo, pendente, vencido) por cliente.
      3. Escalacao automatica para diretoria quando EDD nao e completado no prazo.
      4. Relatorio trimestral ao comite de PLD/FT sobre portfolio de alto risco.

      **Qualidade da analise:**
      5. Auditoria por amostragem da qualidade das analises de EDD.
      6. Revisao de decisoes de manutencao de relacao com alto risco.
      7. Benchmarking de taxa de rejeicao de alto risco com pares.
      8. Acompanhamento de recomendacoes de auditoria sobre EDD.
    tools:
      - aml-platform
      - case-management
      - grc-platform
      - reporting-dashboard
