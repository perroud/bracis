id: art-14
family: cap-3
title: "Tratamento de Pessoas Expostas Politicamente (PEP)"
class: BCB-3978
statement:
  prose: |
    Art. 14. As instituições mencionadas no art. 1 devem adotar procedimentos reforçados
    de qualificação e de monitoramento de operações de clientes que sejam pessoas expostas
    politicamente, bem como de seus representantes, familiares e estreitos colaboradores.

    § 1. Os procedimentos reforçados de que trata o caput devem incluir:
    I - obtenção de autorização do diretor mencionado no art. 35 ou de funcionário por
    ele designado para início ou manutenção da relação de negócio;
    II - adoção de medidas para verificar a compatibilidade entre a movimentação
    financeira e a capacidade econômico-financeira e o patrimônio do cliente;
    III - verificação da origem dos recursos envolvidos nas transações.

    § 2. A condição de pessoa exposta politicamente deve ser mantida até cinco anos
    após o desligamento do cargo ou função.
guidance:
  prose: |
    O art. 14 estabelece procedimentos diferenciados para PEPs, que representam
    risco elevado de lavagem de dinheiro por sua posicao de poder publico.

    **Abrangencia:**
    Nao se limita ao PEP titular. Estende-se a:
    - Representantes do PEP
    - Familiares (conjuge, companheiro, filhos, pais)
    - Estreitos colaboradores (pessoas com relacionamento proximo conhecido)

    **Procedimentos reforcados (ss 1):**
    1. Autorizacao superior: o inicio ou manutencao da relacao com PEP
       requer aprovacao do diretor de PLD/FT ou delegado. Nao pode ser
       decisao de nivel operacional.
    2. Compatibilidade financeira: monitoramento mais frequente e detalhado
       da compatibilidade entre movimentacoes e patrimonio declarado.
    3. Origem dos recursos: verificacao ativa da origem dos recursos, nao
       apenas da compatibilidade com o perfil.

    **Prazo de permanencia (ss 2):**
    O status de PEP persiste por 5 anos apos o desligamento do cargo.
    Implicacao pratica: a instituicao deve manter controles reforcados por
    5 anos apos o PEP deixar o cargo publico.

    **Risco operacional:**
    PEPs representam risco elevado porque:
    - Acesso a recursos publicos e poder de influencia
    - Maior exposicao a corrupcao e suborno
    - Capacidade de usar estruturas complexas para ocultar patrimonio
    - Potencial uso de terceiros (familiares, interpostas pessoas)
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de gestao de PEP:**
      1. Base de dados de PEPs com atualizacao automatica (periodica) a partir
         de fontes oficiais e comerciais.
      2. Screening automatico de toda a base de clientes contra base de PEPs
         (matching fuzzy por nome, CPF, data nascimento).
      3. Screening de familiares e estreitos colaboradores (cross-reference
         com dados cadastrais).
      4. Flag automatico de PEP no perfil do cliente com tipo (titular,
         familiar, colaborador), cargo, periodo e jurisdicao.

      **Workflow de aprovacao (inciso I):**
      5. Workflow obrigatorio de aprovacao pelo diretor/designado para:
         - Abertura de conta de PEP
         - Manutencao anual de relacao com PEP
         - Operacoes de alto valor de PEP
      6. Bloqueio automatico de onboarding de PEP sem aprovacao superior.
      7. Registro completo de aprovacoes com justificativa.

      **Monitoramento reforcado (incisos II-III):**
      8. Regras de monitoramento diferenciadas para PEPs com thresholds
         mais baixos.
      9. Analise de compatibilidade automatica (movimentacao vs. renda/patrimonio).
      10. Alerta automatico quando origem de recursos e incomum ou nao declarada.
    tools:
      - aml-platform
      - pep-screening
      - workflow-engine
      - transaction-monitoring
  devsecops:
    prose: |
      **Testes de PEP screening:**
      1. Testes de matching com variacoes de nome (abreviacoes, ordem diferente,
         erros de digitacao).
      2. Testes de deteccao de familiares (sobrenome, endereco compartilhado).
      3. Testes de workflow de aprovacao (aprovacao, rejeicao, delegacao).
      4. Testes de regras de monitoramento diferenciadas para PEPs.

      **Seguranca dos dados de PEP:**
      5. Dados de PEP classificados como altamente confidenciais.
      6. Acesso restrito ao modulo de PEP (somente equipe de compliance).
      7. Audit trail de consultas e alteracoes em dados de PEP.
      8. Criptografia adicional para dados de PEP em repouso e transito.
    tools:
      - gitlab-ci
      - test-automation
      - vault
      - audit-logging
  secops:
    prose: |
      **Governanca de PEP:**
      1. Revisao anual de todos os clientes PEP com documentacao de decisao
         de manutencao/encerramento da relacao.
      2. Monitoramento do prazo de 5 anos apos desligamento (ss 2) com
         alerta de vencimento.
      3. Verificacao trimestral de atualizacao da base de PEPs.
      4. Relatorio ao diretor responsavel sobre portfolio de PEPs.

      **Investigacao e analise:**
      5. Analise aprofundada de alertas envolvendo PEPs (prioridade maxima).
      6. Investigacao de origem de recursos para operacoes de alto valor.
      7. Documentacao detalhada de todas as analises de PEP.
      8. Comunicacao proativa ao COAF quando houver suspeita envolvendo PEP.
    tools:
      - aml-platform
      - case-management
      - pep-screening
      - reporting-dashboard
