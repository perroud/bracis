id: art-18
family: cap-4
title: "Registro de Operacoes"
class: BCB-3978
statement:
  prose: |
    Art. 18. As instituições mencionadas no art. 1 devem manter registros de todas as
    operações realizadas, produtos e serviços contratados, inclusive saques, depósitos,
    aportes, pagamentos, recebimentos e transferências de recursos.

    § 1. Os registros de que trata o caput devem conter, no mínimo:
    I - o tipo da operação;
    II - o valor da operação;
    III - a data da operação;
    IV - o nome e o número de inscrição no CPF ou no CNPJ do titular e do beneficiário
    da operação; e
    V - os demais dados necessários à identificação da operação.

    § 2. Os registros devem ser mantidos por período mínimo de dez anos, contados
    do término do exercício em que a operação foi realizada.
guidance:
  prose: |
    O art. 18 estabelece a obrigacao de registro detalhado de todas as operacoes,
    que e a base para o monitoramento transacional e a comunicacao ao COAF.

    **Abrangencia dos registros:**
    Todas as operacoes sem excecao: saques, depositos, aportes, pagamentos,
    recebimentos, transferencias, contratacoes de produtos/servicos. Nao ha
    valor minimo para obrigacao de registro.

    **Conteudo minimo (ss 1):**
    Cinco categorias de informacao obrigatoria:
    1. Tipo: classificacao da operacao (deposito, saque, TED, PIX, etc.)
    2. Valor: montante da operacao na moeda original
    3. Data: timestamp completo (data e hora)
    4. Partes: identificacao do titular e beneficiario (nome e CPF/CNPJ)
    5. Demais dados: informacoes adicionais necessarias para reconstrucao
       da operacao (canal, agencia, conta, dispositivo, IP)

    **Retencao (ss 2):**
    Periodo de 10 anos contados do termino do exercicio em que a operacao
    foi realizada. Exercicio = ano-calendario. Portanto, operacao realizada
    em 15/03/2024 deve ser retida ate 31/12/2034.

    **Implicacao tecnica:**
    O volume de dados e massivo. Uma instituicao de medio porte pode gerar
    milhoes de registros por dia. A infraestrutura deve suportar:
    - Ingestao em alta velocidade
    - Armazenamento de longo prazo (10 anos) com custo controlado
    - Consulta eficiente para investigacoes e auditorias
implementation_guidance:
  platform_engineering:
    prose: |
      **Pipeline de registro de operacoes:**
      1. Event-driven architecture com captura de eventos de todas as
         operacoes em tempo real (Kafka, Kinesis, Pub/Sub).
      2. Schema de evento padronizado com campos obrigatorios:
         tipo, valor, moeda, data_hora, titular (nome, cpf_cnpj),
         beneficiario (nome, cpf_cnpj), canal, agencia, conta,
         dispositivo, ip, geolocalizacao.
      3. Validacao de schema em tempo de ingestao (schema registry).
      4. Pipeline de enriquecimento: adicionar dados de contexto
         (classificacao de risco do cliente, categoria de produto).

      **Armazenamento de longo prazo:**
      5. Data lake com armazenamento em camadas (hot/warm/cold):
         - Hot (0-1 ano): acesso rapido para monitoramento (SSD/NVMe)
         - Warm (1-5 anos): acesso moderado para investigacoes
         - Cold (5-10 anos): armazenamento economico para retencao legal
      6. Particionamento por data para consultas eficientes.
      7. Compressao e formato colunar (Parquet, ORC) para economia.
      8. Politica de retencao automatizada com alerta de expiracao.

      **Integridade e auditabilidade:**
      9. Imutabilidade dos registros (write-once, append-only).
      10. Hash chain ou blockchain para prova de integridade.
      11. Backup geograficamente distribuido.
    tools:
      - event-streaming
      - data-lake
      - schema-registry
      - object-storage
  devsecops:
    prose: |
      **Qualidade dos registros:**
      1. Testes de que todos os tipos de operacao geram registro completo.
      2. Testes de validacao de schema (campos obrigatorios, formatos).
      3. Testes de integridade (nenhum registro pode ser alterado ou deletado).
      4. Testes de performance de ingestao com volumes de producao.

      **Pipeline de dados:**
      5. Monitoramento de latencia de ingestao (tempo entre operacao e registro).
      6. Alertas de perda de dados (gap detection).
      7. Testes de reconciliacao entre operacoes executadas e registros.
      8. Data quality checks automatizados em pipeline CI/CD.
    tools:
      - gitlab-ci
      - data-pipeline
      - data-quality
      - monitoring
  secops:
    prose: |
      **Governanca de registros:**
      1. Inventario de todos os tipos de operacao e respectivos registros.
      2. Auditoria periodica de completude dos registros.
      3. Reconciliacao entre sistemas operacionais e data lake.
      4. Verificacao de integridade dos registros em cold storage.

      **Retencao e descarte:**
      5. Politica de retencao documentada com prazos por tipo de registro.
      6. Processo de descarte seguro apos periodo de retencao.
      7. Hold legal quando registro e necessario para investigacao.
      8. Relatorio de conformidade de retencao ao diretor responsavel.
    tools:
      - data-governance
      - grc-platform
      - data-lake
      - audit-management
