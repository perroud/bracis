id: art-22
family: cap-5
title: "Cenarios de Monitoramento"
class: BCB-3978
statement:
  prose: |
    Art. 22. Os procedimentos de monitoramento de que trata o art. 21 devem considerar,
    no mínimo:
    I - as situações relacionadas na regulamentação específica, inclusive as listas de
    operações e situações suspeitas divulgadas pelo COAF;
    II - as operações realizadas e os produtos e serviços contratados que, considerando
    as partes envolvidas, os valores, as formas de realização, os instrumentos utilizados
    ou a falta de fundamento econômico ou legal, possam configurar indícios de lavagem
    de dinheiro ou de financiamento do terrorismo;
    III - as operações com pessoas expostas politicamente; e
    IV - as situações em que não seja possível identificar o beneficiário final.
guidance:
  prose: |
    O art. 22 define os cenarios minimos que devem ser cobertos pelo sistema de
    monitoramento. A lista e taxativa quanto ao minimo mas nao e exaustiva.

    **I - Listas do COAF:**
    O COAF publica periodicamente listas de operacoes e situacoes suspeitas
    especificas por setor. Para instituicoes financeiras, a lista inclui
    dezenas de cenarios tipicos de lavagem de dinheiro. Estas listas DEVEM
    ser incorporadas ao sistema de monitoramento.

    **II - Indicios de PLD/FT:**
    Cenarios genericos que indicam possivel lavagem ou financiamento:
    - Operacoes sem fundamento economico (transferencias sem contraprestacao)
    - Operacoes incompativeis com o perfil (valor, frequencia, tipo)
    - Uso de instrumentos atipicos (multiplas contas, interpostas pessoas)
    - Falta de fundamento legal (operacoes com entidades inexistentes)

    **III - Operacoes de PEPs:**
    Monitoramento especifico e reforcado para PEPs, seus familiares e
    estreitos colaboradores. Thresholds mais baixos, frequencia mais alta.

    **IV - Beneficiario final nao identificado:**
    Operacoes com PJ cujo beneficiario final nao foi identificado devem
    ser monitoradas com escrutinio adicional. A falta de transparencia
    na cadeia societaria e indicador de risco elevado.
implementation_guidance:
  platform_engineering:
    prose: |
      **Biblioteca de cenarios:**
      1. Implementacao de TODOS os cenarios da lista de suspeitas do COAF:
         - Operacoes em especie atipicas
         - Movimentacao incompativel com perfil ou renda
         - Transferencias para/de paises de alto risco
         - Estruturacao de operacoes (smurfing)
         - Operacoes com interpostas pessoas
         - Movimentacao rapida de recursos (pass-through)
         - Concentracao de operacoes em horarios atipicos
      2. Cenarios customizados por perfil de risco e tipo de produto.
      3. Machine learning para deteccao de anomalias nao cobertas por regras.
      4. Atualizacao automatica de cenarios quando COAF publica nova lista.

      **Monitoramento de PEPs (inciso III):**
      5. Regras especificas para PEPs com thresholds reduzidos.
      6. Cruzamento automatico de transacoes de PEPs com fontes publicas
         (declaracao de bens, portais de transparencia).
      7. Alerta quando PEP realiza operacao com jurisdicao de alto risco.

      **Monitoramento de UBO nao identificado (inciso IV):**
      8. Flag automatico em todas as transacoes de PJ sem UBO identificado.
      9. Threshold de alerta mais baixo para PJ sem UBO.
      10. Alerta quando PJ sem UBO realiza operacoes de alto valor.
    tools:
      - transaction-monitoring
      - rules-engine
      - ml-anomaly-detection
      - aml-platform
  devsecops:
    prose: |
      **Testes de cenarios:**
      1. Teste case para cada cenario da lista do COAF.
      2. Dataset sintetico com operacoes suspeitas conhecidas para validacao.
      3. Testes de coverage: verificar que 100% dos cenarios obrigatorios
         estao implementados.
      4. Testes de interacao entre cenarios (operacao que dispara multiplos).

      **Manutencao de cenarios:**
      5. Pipeline de deploy de novos cenarios com backtesting automatico.
      6. Versionamento de cenarios em repositorio Git.
      7. Documentacao automatica de cada cenario (trigger, threshold, logica).
      8. Metricas de cada cenario: alertas gerados, conversao, falso positivo.
    tools:
      - gitlab-ci
      - test-automation
      - backtesting-engine
      - rules-engine
  secops:
    prose: |
      **Gestao de cenarios:**
      1. Catalogo de cenarios com descricao, thresholds e responsavel.
      2. Revisao trimestral de efetividade de cada cenario.
      3. Desativacao de cenarios com taxa de falso positivo > 95%.
      4. Incorporacao de novas tipologias identificadas em investigacoes.

      **Qualidade da analise:**
      5. Padronizacao da analise por tipo de cenario.
      6. Checklist de analise para cada cenario.
      7. Treinamento de analistas em novos cenarios.
      8. Revisao de qualidade de analises por amostragem.
    tools:
      - aml-platform
      - case-management
      - training-platform
      - reporting-dashboard
