id: art-38
family: titulo-4
title: "Disposicoes Transitorias e Vigencia"
class: BCB-3978
statement:
  prose: |
    Art. 38. Esta Circular entra em vigor em 1 de julho de 2020.

    § 1. As instituições mencionadas no art. 1 devem adequar seus procedimentos e
    controles internos às disposições desta Circular até 1 de outubro de 2020.

    § 2. Ficam revogadas, a partir de 1 de outubro de 2020:
    I - a Circular n. 3.461, de 24 de julho de 2009; e
    II - a Circular n. 3.654, de 27 de março de 2013.

    § 3. As comunicações ao COAF realizadas nos termos das circulares mencionadas
    no § 2 permanecem válidas após a entrada em vigor desta Circular.
guidance:
  prose: |
    O art. 38 trata da vigencia, prazos de adequacao e disposicoes transitorias.

    **Vigencia:**
    A circular entrou em vigor em 1 de julho de 2020. Desde esta data, todas
    as obrigacoes sao exigiveis.

    **Prazo de adequacao (ss 1):**
    As instituicoes tiveram ate 1 de outubro de 2020 para adequar procedimentos
    e controles. Apos esta data, o descumprimento e passivel de sancao.

    **Revogacao de normas anteriores (ss 2):**
    A Circular 3.978 substitui:
    - Circular 3.461/2009: norma anterior de PLD/FT
    - Circular 3.654/2013: complemento da 3.461
    Importante: as obrigacoes das circulares anteriores foram absorvidas e
    ampliadas pela 3.978. Nao ha reducao de requisitos.

    **Comunicacoes anteriores (ss 3):**
    Comunicacoes ao COAF realizadas sob as circulares anteriores permanecem
    validas. Nao e necessario refazer ou complementar comunicacoes ja enviadas.

    **Implicacao pratica para conformidade:**
    Desde outubro de 2020, a conformidade deve ser avaliada exclusivamente
    contra a Circular 3.978. Auditorias e inspecoes do BCB utilizam esta
    circular como referencia.
implementation_guidance:
  platform_engineering:
    prose: |
      **Verificacao de conformidade:**
      1. Checklist automatizado de conformidade com TODOS os artigos da
         Circular 3.978 (art. 1 ao art. 38).
      2. Dashboard de status de conformidade por artigo/capitulo.
      3. Gap analysis automatizado entre controles implementados e
         requisitos da circular.
      4. Roadmap de remediacao para gaps identificados.

      **Rastreabilidade regulatoria:**
      5. Matriz de rastreabilidade: requisito da circular -> controle
         implementado -> evidencia de conformidade.
      6. Versionamento de controles com vinculacao a artigos da circular.
      7. Alerta quando mudanca em sistema potencialmente afeta conformidade.
      8. Registro de historico de conformidade ao longo do tempo.
    tools:
      - grc-platform
      - compliance-scanner
      - traceability-matrix
      - reporting-dashboard
  devsecops:
    prose: |
      **Pipeline de conformidade:**
      1. Testes automatizados que validam conformidade com requisitos-chave
         da circular em cada release.
      2. Gate de compliance no pipeline para sistemas de PLD/FT.
      3. Relatorio automatizado de cobertura regulatoria.
      4. Alertas quando alteracao potencialmente afeta conformidade.

      **Documentacao:**
      5. Documentacao tecnica vinculada a artigos da circular.
      6. Changelog regulatorio: registro de alteracoes motivadas pela circular.
      7. Runbooks de conformidade para equipe de operacoes.
      8. Mapeamento de codigo para requisitos regulatorios.
    tools:
      - gitlab-ci
      - compliance-gate
      - documentation
      - traceability-matrix
  secops:
    prose: |
      **Programa de conformidade continua:**
      1. Assessment anual de conformidade com TODOS os artigos da circular.
      2. Plano de remediacao priorizado para gaps identificados.
      3. Acompanhamento de implementacao de remediacao.
      4. Preparacao para inspecoes do BCB (documentacao, evidencias).

      **Atualizacao regulatoria:**
      5. Monitoramento de alteracoes regulatorias (novas circulares,
         resolucoes do COAF, instrucoes normativas).
      6. Avaliacao de impacto de mudancas regulatorias nos controles.
      7. Planejamento de adequacao a novas exigencias.
      8. Relatorio ao diretor responsavel sobre status de conformidade.
    tools:
      - grc-platform
      - regulatory-tracking
      - audit-management
      - reporting-dashboard
