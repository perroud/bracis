id: art-36
family: titulo-4
title: "Treinamento de Colaboradores"
class: BCB-3978
statement:
  prose: |
    Art. 36. As instituições mencionadas no art. 1 devem promover, com periodicidade
    mínima anual, programa de treinamento de colaboradores que contemple, no mínimo:
    I - os procedimentos adotados pela instituição para cumprimento das obrigações
    previstas nesta Circular;
    II - as situações que possam configurar indícios de lavagem de dinheiro ou de
    financiamento do terrorismo; e
    III - a responsabilidade dos colaboradores no cumprimento das obrigações de PLD/FT.

    Parágrafo único. Os programas de treinamento devem ser compatíveis com as funções
    desempenhadas pelos colaboradores.
guidance:
  prose: |
    O art. 36 estabelece a obrigacao de programa de treinamento anual em PLD/FT
    para todos os colaboradores.

    **Periodicidade minima anual:**
    O treinamento deve ocorrer pelo menos uma vez ao ano. Treinamentos adicionais
    sao necessarios quando:
    - Novos colaboradores sao contratados (onboarding)
    - Regulamentacao muda significativamente
    - Novos produtos/servicos sao lancados
    - Incidentes de PLD/FT ocorrem

    **Conteudo minimo:**
    1. Procedimentos da instituicao: como funciona o programa de PLD/FT
       na pratica (KYC, monitoramento, comunicacao, escalacao)
    2. Situacoes suspeitas: tipologias de lavagem e financiamento, red flags,
       exemplos praticos por tipo de produto/servico
    3. Responsabilidade: consequencias legais e disciplinares por nao
       cumprimento das obrigacoes de PLD/FT

    **Proporcionalidade (paragrafo unico):**
    O treinamento deve ser diferenciado por funcao:
    - Atendentes/caixas: foco em KYC, deteccao de documentos falsos, red flags
    - Gerentes de conta: foco em EDD, compatibilidade financeira, PEPs
    - Equipe de PLD/FT: foco tecnico em analise, cenarios, comunicacao
    - Alta administracao: foco em governanca, riscos estrategicos, regulamentacao
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de treinamento:**
      1. LMS (Learning Management System) com modulos de PLD/FT diferenciados
         por funcao.
      2. Trilhas de aprendizagem baseadas no perfil do colaborador:
         - Basico (todos): conceitos de PLD/FT, red flags gerais
         - Operacional (atendentes, caixas): KYC pratico, deteccao presencial
         - Analise (equipe PLD): tipologias, analise de alertas, comunicacao
         - Gestao (diretores): governanca, regulamentacao, riscos
      3. Conteudo interativo com estudos de caso reais (anonimizados).
      4. Avaliacao de conhecimento ao final de cada modulo.

      **Gestao de treinamento:**
      5. Agendamento automatico de reciclagem anual por colaborador.
      6. Notificacao multi-canal para treinamentos pendentes.
      7. Dashboard de completude de treinamento por area, funcao e prazo.
      8. Integracao com HR para detectar novos colaboradores (onboarding).
    tools:
      - lms
      - training-platform
      - notification-service
      - hr-integration
  devsecops:
    prose: |
      **Treinamento para equipe tecnica:**
      1. Modulos especificos para desenvolvedores que trabalham em sistemas
         de PLD/FT: requisitos regulatorios, padroes de codigo, testes.
      2. Workshops praticos com cenarios de implementacao de controles.
      3. Code review sessions focadas em funcionalidades de PLD/FT.
      4. Game days simulando incidentes de PLD/FT.

      **Automacao de conformidade:**
      5. Gate no pipeline de deploy que verifica se equipe tem treinamento
         atualizado antes de deploy em sistemas de PLD/FT.
      6. Relatorio automatizado de completude de treinamento por sprint.
      7. Integracao do LMS com sistema de gestao de acessos.
      8. Revogacao automatica de acesso quando treinamento expira.
    tools:
      - gitlab-ci
      - lms
      - identity-governance
      - training-platform
  secops:
    prose: |
      **Gestao do programa de treinamento:**
      1. Planejamento anual de treinamentos com calendario e responsaveis.
      2. Conteudo atualizado conforme mudancas regulatorias e novas tipologias.
      3. Avaliacao de efetividade do treinamento (pre e pos-teste).
      4. Relatorio ao diretor responsavel sobre completude e efetividade.

      **Conformidade:**
      5. Registro de completude de treinamento por colaborador.
      6. Evidencia de participacao para auditoria (presenca, avaliacao).
      7. Acoes corretivas para colaboradores que nao completam no prazo.
      8. Retencao de registros de treinamento por 10 anos.
    tools:
      - training-platform
      - grc-platform
      - hr-platform
      - reporting-dashboard
