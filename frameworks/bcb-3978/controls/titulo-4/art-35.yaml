id: art-35
family: titulo-4
title: "Diretor Responsavel por PLD/FT"
class: BCB-3978
statement:
  prose: |
    Art. 35. As instituições mencionadas no art. 1 devem indicar ao Banco Central
    do Brasil diretor responsável pelo cumprimento das obrigações previstas nesta
    Circular.

    § 1. O diretor mencionado no caput deve possuir capacidade técnica e
    independência para o exercício de suas funções.

    § 2. O diretor deve ter acesso direto ao conselho de administração ou,
    na sua inexistência, à diretoria da instituição.

    § 3. As informações relativas ao diretor devem ser mantidas atualizadas
    junto ao Banco Central do Brasil.
guidance:
  prose: |
    O art. 35 exige a designacao formal de um diretor responsavel perante o
    BCB pelo programa de PLD/FT.

    **Papel do diretor de PLD/FT:**
    E o responsavel ultimo pelo cumprimento de TODAS as obrigacoes da circular.
    Nao pode delegar a responsabilidade final (embora possa delegar funcoes).
    E a pessoa que responde ao BCB em caso de descumprimento.

    **Requisitos (ss 1):**
    1. Capacidade tecnica: conhecimento profundo de PLD/FT, regulamentacao,
       tipologias de lavagem, funcionamento do sistema financeiro.
       Na pratica: experiencia em compliance, certificacoes (CAMS, ICA).
    2. Independencia: autonomia para tomar decisoes de PLD/FT sem pressao
       de areas de negocio. Nao deve ter conflito de interesse (ex: nao deve
       acumular funcao comercial).

    **Acesso a alta administracao (ss 2):**
    O diretor deve ter canal direto com o conselho de administracao ou
    diretoria. Isso garante que questoes criticas de PLD/FT cheguem ao
    topo sem filtros.

    **Atualizacao junto ao BCB (ss 3):**
    A indicacao deve ser formal junto ao BCB. Qualquer mudanca no diretor
    deve ser comunicada imediatamente.
implementation_guidance:
  platform_engineering:
    prose: |
      **Acesso e permissoes do diretor:**
      1. Perfil de acesso privilegiado em todos os sistemas de PLD/FT
         (monitoramento, comunicacao, KYC, case management).
      2. Dashboard executivo com visao consolidada do programa de PLD/FT:
         alertas, comunicacoes, backlog, KPIs, riscos.
      3. Acesso a relatorios gerenciais sob demanda.
      4. Canal de escalacao direto (notificacao imediata para situacoes criticas).

      **Governanca automatizada:**
      5. Workflow de aprovacao onde diretor e aprovador final para:
         - Comunicacoes ao COAF
         - Inicio/manutencao de relacao com PEPs de alto risco
         - Encerramento de relacoes por suspeita de PLD/FT
         - Alteracoes na politica de PLD/FT
      6. Delegacao formal documentada quando diretor delega funcoes.
      7. Registro de todas as aprovacoes do diretor com timestamp.
      8. Alerta quando aprovacao pendente excede SLA.
    tools:
      - aml-platform
      - identity-governance
      - workflow-engine
      - executive-dashboard
  devsecops:
    prose: |
      **Testes de governanca:**
      1. Testes de perfil de acesso do diretor (acesso a todos os modulos).
      2. Testes de workflow de aprovacao (fluxo completo ate o diretor).
      3. Testes de delegacao (delegado tem permissoes corretas).
      4. Testes de audit trail de aprovacoes do diretor.

      **Relatorios:**
      5. Testes de geracao de relatorios executivos.
      6. Testes de dashboard executivo (dados atualizados, metricas corretas).
      7. Testes de notificacao de escalacao.
      8. Testes de performance de relatorios com alto volume de dados.
    tools:
      - gitlab-ci
      - test-automation
      - reporting-engine
      - monitoring
  secops:
    prose: |
      **Suporte ao diretor:**
      1. Relatorio mensal ao diretor com indicadores-chave de PLD/FT.
      2. Relatorio trimestral para o conselho/diretoria preparado pelo diretor.
      3. Suporte na preparacao de respostas ao BCB e COAF.
      4. Atualizacao regulatoria consolidada para o diretor.

      **Conformidade da indicacao:**
      5. Verificacao de que indicacao esta atualizada junto ao BCB.
      6. Plano de sucessao para o diretor de PLD/FT.
      7. Avaliacao periodica de capacidade tecnica do diretor.
      8. Garantia de independencia: verificacao de que nao ha conflito
         de interesse.
    tools:
      - grc-platform
      - reporting-dashboard
      - hr-platform
      - regulatory-tracking
