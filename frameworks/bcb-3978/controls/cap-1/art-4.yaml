id: art-4
family: cap-1
title: "Conteudo Minimo da Politica de PLD/FT"
class: BCB-3978
statement:
  prose: |
    Art. 4. A política mencionada no art. 3 deve contemplar, no mínimo:
    I - as diretrizes para a definição de papéis e responsabilidades para o cumprimento
    das obrigações previstas nesta Circular;
    II - as diretrizes para a definição dos procedimentos voltados a conhecer clientes,
    incluindo a verificação e a validação das informações dos clientes;
    III - as diretrizes para a definição dos procedimentos de monitoramento, seleção e
    análise de operações e situações suspeitas;
    IV - as diretrizes para a definição dos procedimentos de comunicação ao Conselho
    de Controle de Atividades Financeiras (COAF);
    V - as diretrizes para a realização da avaliação interna de risco de que trata o
    art. 6;
    VI - as diretrizes para a verificação do cumprimento da política, dos procedimentos
    e dos controles internos previstos nesta Circular;
    VII - as diretrizes para a seleção e a contratação de colaboradores que venham a
    desempenhar funções relacionadas a PLD/FT.
guidance:
  prose: |
    O art. 4 detalha o conteudo minimo obrigatorio da politica de PLD/FT. E um
    checklist regulatorio que deve ser integralmente coberto.

    **I - Papeis e responsabilidades:**
    A politica deve definir claramente:
    - Diretor responsavel perante o BCB (art. 35)
    - Comite de PLD/FT (composicao, atribuicoes, periodicidade)
    - Equipe de compliance/PLD (dimensionamento, qualificacao)
    - Responsabilidades das areas de negocio (primeira linha)
    - Papel da auditoria interna (terceira linha)

    **II - Procedimentos de KYC:**
    Diretrizes para todo o ciclo de vida do cliente:
    - Abertura de conta e onboarding
    - Due diligence simplificada, padrao e reforcada
    - Atualizacao cadastral periodica
    - Identificacao de beneficiario final
    - Tratamento de PEPs

    **III - Monitoramento e analise:**
    Diretrizes para o sistema de monitoramento:
    - Regras e cenarios de deteccao
    - Criterios de selecao de alertas
    - Processo de analise e decisao
    - Documentacao de conclusoes

    **IV - Comunicacao ao COAF:**
    Procedimentos para:
    - Comunicacao de operacoes suspeitas
    - Comunicacao automatica (operacoes em especie acima de R$ 50.000)
    - Prazos e formatos exigidos
    - Confidencialidade das comunicacoes

    **V-VII - Demais diretrizes:**
    Avaliacao interna de risco, verificacao de conformidade e politica de
    contratacao de profissionais de PLD/FT completam o conteudo minimo.
implementation_guidance:
  platform_engineering:
    prose: |
      **Modulos obrigatorios da plataforma de PLD/FT:**
      1. Modulo de KYC/Onboarding: formularios digitais, OCR de documentos,
         verificacao biometrica, consulta automatica a bases externas.
      2. Modulo de monitoramento: engine de regras em tempo real e batch,
         painel de alertas, workflow de analise.
      3. Modulo de comunicacao ao COAF: geracao automatica de comunicacoes
         no formato exigido (SISCOAF), controle de prazos, arquivo de comprovantes.
      4. Modulo de avaliacao de risco: scoring automatico, simulacao de cenarios,
         relatorios gerenciais.

      **Infraestrutura de papeis e responsabilidades:**
      5. RBAC granular para funcoes de PLD/FT (analista, supervisor, compliance
         officer, diretor responsavel).
      6. Segregacao de funcoes (SoD): quem gera o alerta nao pode aprova-lo.
      7. Workflow de aprovacao multi-nivel para decisoes criticas (bloqueio de
         conta, comunicacao ao COAF, encerramento de relacao).
      8. Audit trail completo de todas as acoes em cada modulo.
    tools:
      - aml-platform
      - kyc-system
      - rbac-engine
      - workflow-engine
  devsecops:
    prose: |
      **Testes de conformidade regulatoria:**
      1. Testes automatizados para cada inciso do art. 4 (cobertura regulatoria).
      2. Testes de fluxo completo de KYC (onboarding, atualizacao, encerramento).
      3. Testes de geracao de comunicacao ao COAF com validacao de formato.
      4. Testes de segregacao de funcoes (SoD matrix validation).

      **Pipeline de compliance:**
      5. Gate de compliance no pipeline que valida cobertura dos requisitos minimos.
      6. Relatorio automatico de cobertura regulatoria em cada release.
      7. Alertas quando alteracao de codigo potencialmente afeta requisitos de PLD/FT.
      8. Documentacao automatica de rastreabilidade requisito-codigo.
    tools:
      - gitlab-ci
      - test-automation
      - compliance-gate
      - traceability-matrix
  secops:
    prose: |
      **Verificacao de conformidade (inciso VI):**
      1. Assessment anual de conformidade cobrindo todos os incisos do art. 4.
      2. Gap analysis entre a politica documentada e os procedimentos implementados.
      3. Testes de efetividade dos controles de PLD/FT.
      4. Relatorio de conformidade para o diretor responsavel e o conselho.

      **Contratacao especializada (inciso VII):**
      5. Criterios de selecao para profissionais de PLD/FT (certificacoes, experiencia).
      6. Background check para colaboradores com acesso a sistemas de PLD/FT.
      7. Plano de capacitacao continua para a equipe de PLD/FT.
      8. Avaliacao periodica de desempenho com metricas de PLD/FT.
    tools:
      - grc-platform
      - hr-platform
      - training-platform
      - audit-management
