id: art-3
family: cap-1
title: "Politica de Prevencao a Lavagem de Dinheiro e ao Financiamento do Terrorismo"
class: BCB-3978
statement:
  prose: |
    Art. 3. As instituições mencionadas no art. 1 devem implementar e manter política
    formulada com base em princípios e diretrizes que busquem prevenir a utilização
    da instituição para a prática de lavagem de dinheiro e de financiamento do terrorismo.

    Parágrafo único. A política mencionada no caput deve ser compatível com os perfis
    de risco:
    I - dos clientes;
    II - da instituição; e
    III - das operações, produtos, serviços e canais de distribuição oferecidos
    pela instituição.
guidance:
  prose: |
    O art. 3 estabelece a obrigacao fundamental de toda instituicao regulada pelo BCB:
    possuir uma politica formal de PLD/FT implementada e mantida continuamente.

    **Natureza da obrigacao:**
    Nao basta ter um documento escrito. A politica deve ser:
    - Implementada: traduzida em procedimentos operacionais concretos
    - Mantida: revisada e atualizada periodicamente conforme evolucao de riscos

    **Proporcionalidade baseada em risco (paragrafo unico):**
    A politica deve ser calibrada em tres dimensoes:
    1. Perfil de risco dos clientes: instituicoes com clientes de alto risco
       (PEPs, empresas offshore, cash-intensive businesses) precisam de politica
       mais robusta
    2. Perfil de risco da instituicao: banco de investimento tem perfil diferente
       de cooperativa de credito
    3. Perfil de risco dos produtos/canais: transferencias internacionais, cambio
       e pagamentos instantaneos exigem controles mais rigorosos

    **Abordagem baseada em risco (Risk-Based Approach - RBA):**
    Este artigo consagra a abordagem baseada em risco recomendada pelo GAFI/FATF.
    Recursos de PLD/FT devem ser alocados proporcionalmente ao nivel de risco
    identificado, concentrando esforcos onde o risco e maior.
implementation_guidance:
  platform_engineering:
    prose: |
      **Politica como codigo:**
      1. Politica de PLD/FT codificada em formato auditavel (YAML, JSON) com
         versionamento em repositorio Git.
      2. Parametros de risco configurados como feature flags ou configuracao
         externalizada, permitindo ajustes sem deploy.
      3. Engine de regras de PLD/FT parametrizavel (Drools, Easy Rules, custom)
         que implementa a politica de forma executavel.

      **Infraestrutura proporcional ao risco:**
      4. Classificacao de risco automatica de clientes no momento do onboarding
         com base em atributos cadastrais.
      5. Motor de scoring de risco que combina multiplas variaveis (tipo de cliente,
         atividade economica, jurisdicao, volume transacional, PEP status).
      6. Pipeline de dados em tempo real para reclassificacao de risco quando
         atributos do cliente mudam.
      7. Ambiente de simulacao para testar impacto de mudancas na politica antes
         de aplicar em producao.
    tools:
      - rules-engine
      - aml-platform
      - feature-flags
      - data-pipeline
  devsecops:
    prose: |
      **Versionamento da politica:**
      1. Politica de PLD/FT versionada em repositorio Git com historico completo.
      2. Pull requests com aprovacao obrigatoria (compliance officer + tech lead)
         para qualquer alteracao em regras de PLD/FT.
      3. Changelog automatico para auditoria de evolucao da politica.
      4. Testes de regressao em cada alteracao de regras de PLD/FT.

      **Pipeline com controles de PLD/FT:**
      5. Testes automatizados que validam regras de scoring de risco.
      6. Testes de cenarios de PLD/FT (casos de uso suspeitos conhecidos).
      7. Validacao automatica de que parametros de risco estao dentro de faixas
         aprovadas pelo compliance.
      8. Code review obrigatorio por membro da equipe de compliance para
         alteracoes em modulos de PLD/FT.
    tools:
      - gitlab-ci
      - rules-engine
      - test-automation
      - code-review
  secops:
    prose: |
      **Governanca da politica:**
      1. Revisao anual da politica de PLD/FT pelo comite de compliance.
      2. Aprovacao formal pelo conselho de administracao ou diretoria.
      3. Comunicacao da politica a todos os colaboradores relevantes.
      4. Treinamento periodico sobre a politica e seus procedimentos.

      **Monitoramento da efetividade:**
      5. Metricas de efetividade da politica: taxa de deteccao, falsos positivos,
         tempo medio de analise, comunicacoes ao COAF.
      6. Benchmarking com pares do setor quando possivel.
      7. Acompanhamento de tendencias de lavagem de dinheiro e financiamento
         do terrorismo para ajuste da politica.
      8. Relatorio periodico ao diretor responsavel sobre efetividade da politica.
    tools:
      - grc-platform
      - aml-platform
      - training-platform
      - reporting-dashboard
