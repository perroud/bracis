id: art-5
family: cap-1
title: "Aprovacao e Divulgacao da Politica"
class: BCB-3978
statement:
  prose: |
    Art. 5. A política mencionada no art. 3 deve ser:
    I - aprovada pelo conselho de administração ou, na sua inexistência, pela diretoria
    da instituição;
    II - documentada e formalizada em documento próprio;
    III - divulgada amplamente ao público, em linguagem clara e acessível.

    Parágrafo único. O disposto no inciso III não se aplica ao conteúdo das diretrizes
    de que trata o art. 4, incisos III, IV e V.
guidance:
  prose: |
    O art. 5 define requisitos formais para a politica de PLD/FT.

    **I - Aprovacao pela alta administracao:**
    A politica deve ser aprovada pelo nivel mais alto de governanca:
    - Conselho de administracao (preferencialmente)
    - Diretoria (quando nao houver conselho)
    Este requisito demonstra o comprometimento do "tone from the top" com a
    prevencao a lavagem de dinheiro.

    **II - Formalizacao:**
    A politica deve ser um documento formal, escrito, datado e assinado. Nao
    basta estar descrita em procedimentos operacionais dispersos. Deve haver
    um documento unico e principal que consolide as diretrizes.

    **III - Divulgacao publica:**
    A politica deve ser divulgada amplamente ao publico em linguagem acessivel.
    Na pratica, significa publicar um resumo da politica no website da instituicao.

    **Excecao do paragrafo unico:**
    As diretrizes de monitoramento (III), comunicacao ao COAF (IV) e avaliacao
    interna de risco (V) sao confidenciais e nao devem ser divulgadas ao publico.
    A divulgacao destes itens comprometeria a efetividade dos controles, pois
    permitiria que criminosos adaptassem seu comportamento para evitar deteccao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de documentos regulatorios:**
      1. Sistema de gestao documental (DMS) com versionamento, controle de
         aprovacao e assinatura digital.
      2. Workflow automatizado para ciclo de aprovacao: autor -> compliance
         officer -> diretor responsavel -> conselho/diretoria.
      3. Portal publico com versao divulgavel da politica (sem conteudo
         confidencial dos incisos III, IV e V do art. 4).
      4. Controle de acesso diferenciado: versao completa (confidencial)
         vs. versao publica (divulgavel).

      **Automacao de divulgacao:**
      5. CMS integrado ao DMS para publicacao automatica da versao publica
         apos aprovacao.
      6. Notificacao automatica a colaboradores quando nova versao e aprovada.
      7. Registro de aceite (acknowledgment) de colaboradores com data e hora.
      8. Mecanismo de alerta quando a politica precisa de revisao (vencimento
         do prazo de revisao anual).
    tools:
      - document-management
      - workflow-engine
      - cms
      - digital-signature
  devsecops:
    prose: |
      **Versionamento e rastreabilidade:**
      1. Politica de PLD/FT versionada em repositorio Git com tags para cada
         versao aprovada.
      2. Diff automatico entre versoes para facilitar auditoria de mudancas.
      3. Pipeline que gera automaticamente versao PDF formatada a partir
         do YAML/Markdown fonte.
      4. Gate de aprovacao no pipeline que exige assinatura digital do
         compliance officer.

      **Segregacao de conteudo:**
      5. Repositorio separado (ou branch protegido) para conteudo confidencial.
      6. Pipeline de publicacao que automaticamente remove seccoes confidenciais
         da versao publica.
      7. Testes automatizados que validam que versao publica nao contem
         conteudo dos incisos III, IV e V do art. 4.
    tools:
      - gitlab-ci
      - digital-signature
      - static-site-generator
      - access-control
  secops:
    prose: |
      **Governanca de aprovacao:**
      1. Calendario de revisao da politica (minimo anual) com responsaveis definidos.
      2. Ata de aprovacao pelo conselho/diretoria arquivada com retencao minima
         de 10 anos.
      3. Registro de todas as versoes historicas da politica para auditoria.
      4. Processo formal de revisao extraordinaria quando houver mudanca
         regulatoria relevante.

      **Monitoramento de divulgacao:**
      5. Verificacao periodica de que a versao publica esta atualizada no website.
      6. Controle de que a versao divulgada nao contem informacoes confidenciais.
      7. Registro de treinamentos sobre a politica para todos os colaboradores.
      8. Auditoria independente da conformidade da politica com os requisitos
         minimos do art. 4.
    tools:
      - grc-platform
      - document-management
      - training-platform
      - audit-management
