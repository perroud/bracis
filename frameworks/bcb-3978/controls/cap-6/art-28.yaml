id: art-28
family: cap-6
title: "Comunicacao de Situacoes Relacionadas ao Terrorismo"
class: BCB-3978
statement:
  prose: |
    Art. 28. As instituições mencionadas no art. 1 devem comunicar ao COAF, no prazo
    de vinte e quatro horas, a contar do momento da identificação, as situações que
    envolvam a existência de indícios de financiamento do terrorismo.
guidance:
  prose: |
    O art. 28 estabelece prazo diferenciado e urgente para comunicacoes
    relacionadas a financiamento do terrorismo.

    **Prazo de 24 horas:**
    Diferentemente da comunicacao por suspeita de lavagem (24 dias uteis),
    a comunicacao de indicios de financiamento do terrorismo deve ser feita
    em 24 HORAS a contar da identificacao. Este prazo reflete a urgencia
    e a gravidade do crime de financiamento do terrorismo.

    **Momento de contagem:**
    O prazo conta a partir da IDENTIFICACAO da situacao, nao da ocorrencia
    da operacao. Ou seja, a partir do momento em que a instituicao identifica
    indicios de financiamento do terrorismo.

    **Indicios de financiamento do terrorismo:**
    - Operacoes com pessoas ou entidades listadas em resolucoes do CSNU
    - Transferencias para/de regioes de conflito
    - Operacoes com organizacoes suspeitas de apoio ao terrorismo
    - Captacao de recursos para atividades sem justificativa economica
      em jurisdicoes de risco

    **Implicacao operacional:**
    A instituicao deve ter capacidade de gerar e enviar comunicacao ao COAF
    em menos de 24 horas, incluindo fora do horario comercial. Isso exige:
    - Processo de emergencia para comunicacao urgente
    - Equipe de plantao para analise e aprovacao
    - Canal direto com o COAF para situacoes criticas
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de alerta urgente:**
      1. Regras de deteccao de alto risco para financiamento do terrorismo
         com prioridade maxima e tempo de processamento imediato.
      2. Screening em tempo real contra listas de sancoes:
         - Resolucoes do Conselho de Seguranca da ONU (CSNU)
         - Lista OFAC (SDN List)
         - Listas da Uniao Europeia
         - Lista consolidada do BCB
      3. Alerta imediato (push notification, SMS, telefone) ao compliance
         officer quando match de sancoes e detectado.
      4. Workflow de emergencia com SLA de 4 horas para analise e decisao.

      **Comunicacao urgente:**
      5. Modulo de comunicacao urgente ao COAF com processo simplificado
         e aprovacao acelerada.
      6. Capacidade de envio 24/7, incluindo fora do horario comercial.
      7. Confirmacao de recebimento pelo COAF com registro de timestamp.
      8. Escalacao automatica ao diretor responsavel imediatamente.
    tools:
      - sanctions-screening
      - aml-platform
      - coaf-reporting
      - alerting-system
  devsecops:
    prose: |
      **Testes de emergencia:**
      1. Testes de tempo de resposta do screening de sancoes (< 1 segundo).
      2. Testes de workflow de emergencia (< 4 horas do alerta a comunicacao).
      3. Testes de envio 24/7 (simulacao fora do horario comercial).
      4. Testes de notificacao multi-canal (SMS, email, push, telefone).

      **Confiabilidade:**
      5. Alta disponibilidade do modulo de screening de sancoes (99.99%).
      6. Failover automatico para screening offline quando API esta
         indisponivel.
      7. Testes de atualizacao de listas de sancoes.
      8. Simulacros periodicos de comunicacao urgente.
    tools:
      - gitlab-ci
      - high-availability
      - performance-testing
      - monitoring
  secops:
    prose: |
      **Resposta a emergencias de FT:**
      1. Plantao 24/7 para analise de alertas de financiamento do terrorismo.
      2. Playbook especifico para situacoes de FT com cadeia de comunicacao.
      3. Contato direto com COAF e autoridades policiais quando necessario.
      4. Bloqueio imediato de conta/operacao quando match de sancoes e
         confirmado.

      **Atualizacao de listas:**
      5. Monitoramento diario de atualizacoes em listas de sancoes.
      6. Aplicacao imediata de novas inclusoes em listas.
      7. Re-screening da base de clientes quando lista e atualizada.
      8. Relatorio de matches identificados ao diretor responsavel.
    tools:
      - sanctions-screening
      - aml-platform
      - incident-management
      - alerting-system
