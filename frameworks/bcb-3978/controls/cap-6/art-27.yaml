id: art-27
family: cap-6
title: "Comunicacao de Operacoes de Ativos Virtuais"
class: BCB-3978
statement:
  prose: |
    Art. 27. As instituições mencionadas no art. 1 devem comunicar ao COAF as
    operações e situações que envolvam ativos virtuais e que possam configurar
    indícios de lavagem de dinheiro ou de financiamento do terrorismo,
    observados os mesmos procedimentos e prazos previstos no art. 25.
guidance:
  prose: |
    O art. 27 estende a obrigacao de comunicacao ao COAF para operacoes
    envolvendo ativos virtuais (criptoativos).

    **Ativos virtuais:**
    O conceito de ativo virtual abrange criptomoedas (Bitcoin, Ethereum, etc.),
    tokens e outros ativos digitais que possam ser utilizados como meio de
    troca ou investimento.

    **Relevancia para PLD/FT:**
    Ativos virtuais apresentam riscos especificos de PLD/FT:
    - Pseudoanonimato de transacoes
    - Transferencias transfronteiiras sem intermediarios
    - Mixers e tumblers que obscurecem rastro de transacoes
    - DeFi (financas descentralizadas) sem controles centralizados
    - Rapidez na movimentacao de grandes volumes

    **Procedimentos e prazos:**
    Os mesmos do art. 25 se aplicam: comunicacao sem dar ciencia aos envolvidos,
    dentro de 24 dias uteis, com os dados minimos (descricao, envolvidos,
    valores, fundamentacao).

    **Implicacao pratica:**
    Instituicoes que oferecem servicos relacionados a criptoativos devem ter
    monitoramento especifico para essas operacoes, incluindo analise de
    blockchain e screening de wallets.
implementation_guidance:
  platform_engineering:
    prose: |
      **Monitoramento de ativos virtuais:**
      1. Integracao com ferramentas de analise de blockchain (Chainalysis,
         Elliptic, CipherTrace) para rastreamento de transacoes on-chain.
      2. Screening de wallets contra listas restritivas e wallets conhecidas
         por atividades ilicitas.
      3. Regras de monitoramento especificas para ativos virtuais:
         - Conversao rapida cripto-fiat (cash-out imediato)
         - Transacoes com mixers/tumblers
         - Transferencias para/de jurisdicoes de alto risco
         - Transacoes com exchanges nao reguladas
         - Volume incompativel com perfil
      4. Scoring de risco de wallet baseado em historico on-chain.

      **Comunicacao ao COAF:**
      5. Modulo de comunicacao adaptado para operacoes de ativos virtuais
         com campos especificos (wallet address, blockchain, hash da transacao).
      6. Enriquecimento automatico com dados de blockchain analytics.
      7. Vinculacao de transacoes on-chain com dados de KYC.
    tools:
      - blockchain-analytics
      - aml-platform
      - coaf-reporting
      - transaction-monitoring
  devsecops:
    prose: |
      **Testes de monitoramento cripto:**
      1. Testes de integracao com APIs de analise de blockchain.
      2. Testes de regras de monitoramento especificas para cripto.
      3. Testes de screening de wallets contra listas restritivas.
      4. Testes de performance com volume de transacoes on-chain.

      **Seguranca:**
      5. Protecao de chaves de API de servicos de blockchain analytics.
      6. Testes de integridade de dados on-chain vs. off-chain.
      7. Audit trail de consultas a blockchain.
      8. Testes de comunicacao ao COAF para operacoes de cripto.
    tools:
      - gitlab-ci
      - test-automation
      - vault
      - blockchain-analytics
  secops:
    prose: |
      **Operacao de monitoramento cripto:**
      1. Analistas especializados em criptoativos e blockchain.
      2. Treinamento especifico sobre tipologias de PLD/FT com cripto.
      3. Playbooks de analise para alertas de ativos virtuais.
      4. Acompanhamento de evolucao regulatoria sobre criptoativos.

      **Relatorio e conformidade:**
      5. Relatorio de comunicacoes de cripto ao COAF por tipo e valor.
      6. Analise de tendencias de uso de cripto na base de clientes.
      7. Avaliacao de risco especifica para produtos de criptoativos.
      8. Benchmark com pares do mercado sobre controles de cripto.
    tools:
      - aml-platform
      - blockchain-analytics
      - reporting-dashboard
      - training-platform
