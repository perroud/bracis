id: art-30
family: cap-6
title: "Manutencao da Relacao de Negocio apos Comunicacao"
class: BCB-3978
statement:
  prose: |
    Art. 30. A comunicação ao COAF de que tratam os arts. 25 a 28 não implica a
    obrigatoriedade de encerramento imediato da relação de negócio com o cliente.

    Parágrafo único. A instituição deve avaliar a conveniência de manter, restringir
    ou encerrar a relação de negócio com o cliente após a comunicação, considerando
    os riscos envolvidos.
guidance:
  prose: |
    O art. 30 esclarece que a comunicacao ao COAF nao obriga o encerramento da
    relacao de negocio. A decisao deve ser ponderada.

    **Comunicacao != Encerramento:**
    Equivoco comum: algumas instituicoes encerram automaticamente a relacao
    apos comunicar ao COAF. Isso e problematico porque:
    - Pode configurar tipping-off (cliente percebe que foi comunicado)
    - Impede o COAF de continuar monitorando a movimentacao
    - Pode prejudicar investigacoes em andamento
    - O cliente pode migrar para outra instituicao sem controles adequados

    **Avaliacao de conveniencia (paragrafo unico):**
    A instituicao deve avaliar caso a caso se deve:
    1. Manter a relacao: quando o risco e gerenciavel e o monitoramento
       pode ser intensificado
    2. Restringir: limitar produtos/servicos disponiveis ao cliente
       (ex: bloquear transferencias internacionais)
    3. Encerrar: quando o risco e intoleravel ou a manutencao pode
       comprometer a instituicao

    **Criterios de decisao:**
    - Gravidade da suspeita
    - Capacidade de monitoramento
    - Risco para a instituicao
    - Solicitacao de autoridades (manter para monitoramento)
    - Historico do cliente
implementation_guidance:
  platform_engineering:
    prose: |
      **Workflow de decisao pos-comunicacao:**
      1. Apos comunicacao ao COAF, trigger automatico de workflow de
         decisao: manter, restringir ou encerrar.
      2. Formulario de avaliacao com criterios objetivos: gravidade,
         risco, capacidade de monitoramento, solicitacao de autoridades.
      3. Opcao de restricao granular: bloquear produtos/canais especificos
         sem encerrar a relacao completa.
      4. Aprovacao do compliance officer para qualquer decisao.

      **Restricoes operacionais:**
      5. Mecanismo de restricao de servicos por cliente sem exposicao
         do motivo (nao pode indicar comunicacao ao COAF).
      6. Intensificacao automatica do monitoramento para clientes
         comunicados (threshold mais baixo, frequencia mais alta).
      7. Alerta ao compliance officer para qualquer nova operacao
         significativa do cliente comunicado.
      8. Flag interno (nao visivel em atendimento) para acompanhamento.
    tools:
      - aml-platform
      - workflow-engine
      - transaction-monitoring
      - case-management
  devsecops:
    prose: |
      **Testes de workflow pos-comunicacao:**
      1. Testes de fluxo completo: comunicacao -> avaliacao -> decisao.
      2. Testes de restricao de servicos (correto bloqueio/desbloqueio).
      3. Testes de que restricao nao indica motivo ao atendente.
      4. Testes de intensificacao de monitoramento pos-comunicacao.

      **Seguranca:**
      5. Testes de que flag interno nao e visivel em canais de atendimento.
      6. Testes de audit trail de decisoes pos-comunicacao.
      7. Testes de segregacao entre dados de comunicacao e operacionais.
      8. Testes de acesso a funcao de restricao.
    tools:
      - gitlab-ci
      - test-automation
      - access-control
      - audit-logging
  secops:
    prose: |
      **Gestao de relacoes pos-comunicacao:**
      1. Portfolio de clientes comunicados com status atualizado (manter,
         restringir, encerrar).
      2. Revisao trimestral de decisoes de manutencao de relacao.
      3. Acompanhamento de evolucao do perfil de clientes comunicados.
      4. Reavaliacao quando novo alerta e gerado para cliente comunicado.

      **Documentacao e auditoria:**
      5. Registro formal de cada decisao com justificativa.
      6. Evidencia de avaliacao de conveniencia documentada.
      7. Relatorio ao diretor responsavel sobre portfolio comunicado.
      8. Auditoria de conformidade das decisoes pos-comunicacao.
    tools:
      - aml-platform
      - case-management
      - grc-platform
      - reporting-dashboard
