id: art-6
family: cap-2
title: "Avaliacao Interna de Risco"
class: BCB-3978
statement:
  prose: |
    Art. 6. As instituições mencionadas no art. 1 devem realizar avaliação interna com o
    objetivo de identificar e mensurar o risco de utilização de seus produtos e serviços
    na prática de lavagem de dinheiro e de financiamento do terrorismo.

    § 1. A avaliação mencionada no caput deve considerar, no mínimo, os perfis de risco:
    I - dos clientes;
    II - da instituição, incluindo o modelo de negócio e a área geográfica de atuação;
    III - das operações, transações, produtos e serviços, abrangendo todos os canais de
    distribuição e a utilização de novas tecnologias; e
    IV - das atividades exercidas pelos colaboradores e prestadores de serviços da
    instituição.

    § 2. A avaliação interna de risco deve ser documentada e aprovada pelo diretor de
    que trata o art. 35.
guidance:
  prose: |
    O art. 6 estabelece a obrigatoriedade de uma avaliacao interna de risco de PLD/FT,
    que e a base para toda a abordagem risk-based do programa.

    **Objetivo da avaliacao:**
    Identificar e mensurar (nao apenas identificar) o risco de PLD/FT. Isso exige:
    - Metodologia quantitativa ou semi-quantitativa de avaliacao de risco
    - Escala de risco definida (baixo, medio, alto, ou mais granular)
    - Criterios objetivos para classificacao

    **Dimensoes de risco (ss 1):**
    Quatro dimensoes obrigatorias:
    1. Clientes: PEPs, non-residents, estruturas complexas, atividades de alto risco
    2. Instituicao: modelo de negocio, jurisdicoes de atuacao, porte, complexidade
    3. Produtos/servicos/canais: transferencias internacionais, cambio, criptoativos,
       canais digitais, PIX, open banking
    4. Colaboradores/prestadores: funcoes de risco (tesouraria, cambio, private banking),
       historico, capacitacao

    **Documentacao e aprovacao (ss 2):**
    A avaliacao deve ser:
    - Documentada (relatorio formal com metodologia, resultados e recomendacoes)
    - Aprovada pelo diretor responsavel de PLD/FT
    - Revisada periodicamente (recomendacao: anual ou quando houver mudanca material)
implementation_guidance:
  platform_engineering:
    prose: |
      **Motor de avaliacao de risco:**
      1. Framework de risk assessment automatizado com categorias configuraveis:
         - Risco inerente (antes de controles)
         - Qualidade dos controles
         - Risco residual (apos controles)
      2. Scoring model multi-dimensional com pesos configuraveis por dimensao de risco.
      3. Dashboard de risco com heatmap por dimensao, produto e segmento de cliente.
      4. Pipeline de dados que alimenta o modelo de risco com indicadores atualizados.

      **Dimensao de clientes (inciso I):**
      5. Scoring automatico de risco de clientes baseado em atributos cadastrais,
         transacionais e comportamentais.
      6. Integracao com listas restritivas e bases de PEP para enriquecimento
         automatico do perfil de risco.
      7. Reclassificacao dinamica de risco quando atributos relevantes mudam.

      **Dimensao de produtos/canais (inciso III):**
      8. Matriz de risco por produto/servico com atualizacao automatica baseada
         em volume transacional e incidentes.
      9. Avaliacao de risco automatizada para novos canais (ex: PIX, open finance).
      10. Monitoramento de tipologias emergentes por canal de distribuicao.
    tools:
      - aml-platform
      - risk-assessment-engine
      - data-pipeline
      - sanctions-screening
  devsecops:
    prose: |
      **Automacao da avaliacao de risco:**
      1. Pipeline de coleta automatica de dados para avaliacao de risco (volumes
         transacionais, alertas, comunicacoes, incidentes).
      2. Scripts de calculo de scoring de risco com testes unitarios.
      3. Relatorio de avaliacao de risco gerado automaticamente a partir dos dados.
      4. Versionamento do modelo de risco em repositorio Git.

      **Validacao do modelo:**
      5. Backtesting do modelo de risco contra dados historicos.
      6. Testes de estresse com cenarios extremos.
      7. Validacao cruzada com avaliacao de especialistas.
      8. Metricas de desempenho do modelo (discriminacao, calibracao, estabilidade).
    tools:
      - gitlab-ci
      - data-pipeline
      - ml-platform
      - backtesting-engine
  secops:
    prose: |
      **Processo de avaliacao:**
      1. Metodologia de avaliacao de risco documentada e aprovada.
      2. Calendario de avaliacao (anual obrigatoria, extraordinaria quando necessario).
      3. Workshop com areas de negocio para coleta de percepcoes de risco.
      4. Consolidacao de resultados em relatorio formal para o diretor responsavel.

      **Acompanhamento e mitigacao:**
      5. Plano de acao para riscos residuais acima do apetite definido.
      6. Monitoramento trimestral de indicadores-chave de risco (KRIs).
      7. Revisao da avaliacao quando houver lancamento de novo produto/canal.
      8. Acompanhamento de recomendacoes de auditorias anteriores.
    tools:
      - grc-platform
      - risk-assessment-tool
      - reporting-dashboard
      - audit-management
