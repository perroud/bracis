id: art-9
family: cap-2
title: "Revisao da Avaliacao Interna de Risco"
class: BCB-3978
statement:
  prose: |
    Art. 9. A avaliação interna de risco de que trata o art. 6 deve ser revisada a
    cada dois anos, ou em prazo inferior quando verificadas situações que indiquem
    necessidade de sua revisão.

    Parágrafo único. A revisão mencionada no caput deve contemplar, no mínimo:
    I - a metodologia utilizada;
    II - os perfis de risco;
    III - os controles de gerenciamento de risco de PLD/FT aplicados; e
    IV - os resultados obtidos com a aplicação dos controles.
guidance:
  prose: |
    O art. 9 estabelece a periodicidade e o escopo da revisao da avaliacao de risco.

    **Periodicidade:**
    - Maxima: bienal (a cada 2 anos)
    - Extraordinaria: sempre que situacoes indicarem necessidade
    Situacoes que demandam revisao antecipada:
    - Lancamento de novos produtos/servicos com risco de PLD/FT
    - Entrada em novas jurisdicoes
    - Mudanca significativa no perfil da base de clientes
    - Alteracoes regulatorias relevantes
    - Incidentes de PLD/FT (comunicacoes ao COAF significativas)
    - Resultados de auditorias internas/externas

    **Escopo da revisao (paragrafo unico):**
    1. Metodologia: validar se a metodologia continua adequada aos riscos
       da instituicao. Considerar melhores praticas do mercado.
    2. Perfis de risco: atualizar perfis com base em dados recentes.
    3. Controles: avaliar se os controles aplicados sao proporcionais
       aos riscos identificados.
    4. Resultados: analisar efetividade dos controles (alertas, comunicacoes,
       falsos positivos, casos nao detectados).
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao da revisao:**
      1. Scheduler automatizado para trigger de revisao bienal com notificacao
         aos responsaveis (compliance officer, diretor de PLD/FT).
      2. Coleta automatica de metricas para a revisao:
         - Volume de alertas por categoria de risco
         - Taxa de conversao alerta -> comunicacao COAF
         - Falsos positivos por tipo de regra
         - Distribuicao de clientes por categoria
         - Mudancas no perfil da base de clientes
      3. Relatorio automatizado de desempenho do modelo de risco.

      **Triggers de revisao antecipada:**
      4. Alertas automaticos quando indicadores de risco excedem thresholds:
         - Aumento significativo de falsos positivos
         - Novo produto lancado sem avaliacao de risco
         - Mudanca significativa em volume transacional
         - Nova jurisdicao adicionada
      5. Integracao com change management para detectar mudancas que exigem
         revisao de risco.
    tools:
      - aml-platform
      - scheduling-engine
      - monitoring
      - change-management
  devsecops:
    prose: |
      **Pipeline de revisao:**
      1. Pipeline automatizado que executa analise de performance do modelo:
         backtesting, validacao de distribuicao, analise de estabilidade.
      2. Comparacao automatica entre modelo atual e modelo revisado
         (A/B testing em dados historicos).
      3. Relatorio de impacto quando parametros de risco sao alterados.
      4. Versionamento de modelos com rollback automatico se necessario.

      **Monitoramento continuo:**
      5. Dashboard de drift detection para o modelo de risco (mudanca na
         distribuicao de scores ao longo do tempo).
      6. Alertas quando performance do modelo degrada abaixo de threshold.
      7. Pipeline de retraining automatico quando drift e detectado.
    tools:
      - gitlab-ci
      - ml-platform
      - monitoring
      - data-pipeline
  secops:
    prose: |
      **Processo formal de revisao:**
      1. Checklist de revisao cobrindo todos os incisos do paragrafo unico.
      2. Envolvimento multidisciplinar: compliance, areas de negocio, tecnologia,
         auditoria interna.
      3. Documentacao formal da revisao com conclusoes e recomendacoes.
      4. Aprovacao pelo diretor responsavel (art. 6, ss 2).

      **Acompanhamento pos-revisao:**
      5. Plano de acao para implementar recomendacoes da revisao.
      6. Cronograma de implementacao com responsaveis e prazos.
      7. Monitoramento da implementacao das acoes corretivas.
      8. Report de status ao comite de PLD/FT.
    tools:
      - grc-platform
      - audit-management
      - project-management
      - reporting-dashboard
