id: art-1
family: titulo-1
title: "Objeto da Circular"
class: BCB-3978
statement:
  prose: |
    Art. 1. Esta Circular dispõe sobre a política, os procedimentos e os controles internos
    a serem adotados pelas instituições autorizadas a funcionar pelo Banco Central do Brasil
    visando à prevenção da utilização do sistema financeiro para a prática dos crimes de
    "lavagem" ou ocultação de bens, direitos e valores, de que trata a Lei n. 9.613, de
    3 de março de 1998, e de financiamento do terrorismo, previsto na Lei n. 13.260,
    de 16 de março de 2016.
guidance:
  prose: |
    O art. 1 define o escopo regulatorio da Circular 3.978, que e a norma central de PLD/FT
    para o Sistema Financeiro Nacional.

    **Escopo triplo de obrigacoes:**
    A circular impoe tres pilares:
    1. Politica institucional de PLD/FT (documento estrategico)
    2. Procedimentos operacionais (KYC, monitoramento, comunicacao)
    3. Controles internos (mecanismos de verificacao e auditoria)

    **Crimes abrangidos:**
    - Lavagem de dinheiro (Lei 9.613/1998): ocultar ou dissimular a natureza, origem,
      localizacao, disposicao, movimentacao ou propriedade de bens, direitos ou valores
      provenientes de infracoes penais
    - Financiamento do terrorismo (Lei 13.260/2016): prover recursos financeiros para
      atos terroristas ou organizacoes terroristas

    **Sujeitos regulados:**
    Todas as instituicoes autorizadas a funcionar pelo BCB, incluindo:
    - Bancos comerciais, de investimento e multiplos
    - Cooperativas de credito
    - Instituicoes de pagamento
    - Sociedades de credito, financiamento e investimento
    - Fintechs autorizadas (SCD, SEP)
    - Administradoras de consorcio
    - Corretoras e distribuidoras de titulos e valores mobiliarios

    **Relacao com outras normas:**
    A Circular 3.978 complementa e nao substitui as obrigacoes da Lei 9.613/1998.
    As instituicoes devem cumprir ambas simultaneamente, alem de resolucoes especificas
    do COAF e instrucoes normativas complementares do BCB.
implementation_guidance:
  platform_engineering:
    prose: |
      **Mapeamento de escopo regulatorio:**
      1. Inventario completo de todos os sistemas que processam, armazenam ou transmitem
         dados relacionados a PLD/FT (cadastro de clientes, transacoes, alertas, comunicacoes).
      2. Classificacao de cada sistema quanto ao nivel de criticidade para PLD/FT.
      3. Registro centralizado de todas as entidades do conglomerado sujeitas a circular.
      4. Mapeamento de fluxos de dados de PLD/FT entre sistemas internos e externos
         (COAF, BACEN, correspondentes, parceiros).

      **Infraestrutura de PLD/FT:**
      5. Plataforma centralizada de PLD/FT com modulos integrados (KYC, monitoramento,
         comunicacao, auditoria).
      6. Data lake ou data warehouse dedicado para dados de PLD/FT com retencao minima
         de 10 anos.
      7. Ambientes segregados para sistemas de PLD/FT com controles de acesso restritos.
      8. API gateway para integracao com fontes de dados externas (listas restritivas,
         bureaus de credito, registros publicos).
    tools:
      - aml-platform
      - data-warehouse
      - api-gateway
      - identity-governance
  devsecops:
    prose: |
      **Consciencia regulatoria no desenvolvimento:**
      1. Documentacao dos requisitos da Circular 3.978 acessivel a toda equipe de
         desenvolvimento que trabalha em sistemas de PLD/FT.
      2. Checklist de conformidade PLD/FT integrado ao processo de code review para
         qualquer alteracao em modulos de KYC, monitoramento ou comunicacao.
      3. Testes automatizados que validam regras de negocio de PLD/FT em cada release.

      **Pipeline com controles regulatorios:**
      4. Bloqueio de deploy quando testes de regras de PLD/FT falham.
      5. Audit trail de todas as alteracoes em regras de monitoramento e parametros de alerta.
      6. Versionamento de regras de PLD/FT em repositorio Git com aprovacao obrigatoria.
      7. Feature flags para ativacao gradual de novas regras de deteccao.
    tools:
      - gitlab-ci
      - audit-logging
      - feature-flags
      - policy-engine
  secops:
    prose: |
      **Gestao do programa de PLD/FT:**
      1. Inventario atualizado de todos os sistemas e processos de PLD/FT.
      2. Assessment periodico de conformidade com todos os capitulos da circular.
      3. Gap analysis com plano de remediacao priorizado por risco.
      4. Relatorio de conformidade para o diretor responsavel e o conselho de administracao.

      **Monitoramento de conformidade:**
      5. Dashboard consolidado com indicadores-chave de PLD/FT (alertas gerados,
         comunicacoes enviadas, tempos de resposta, falsos positivos).
      6. Alertas automaticos quando prazos regulatorios estao proximos do vencimento.
      7. Controle de acesso segregado para funcoes de PLD/FT (chinese wall).
      8. Retencao de evidencias de conformidade por 10 anos (minimo legal).
    tools:
      - grc-platform
      - aml-platform
      - siem
      - compliance-scanner
