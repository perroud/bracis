id: art-31
family: titulo-3
title: "Procedimentos para Correspondentes no Pais"
class: BCB-3978
statement:
  prose: |
    Art. 31. As instituições mencionadas no art. 1 devem adotar procedimentos
    específicos de prevenção à lavagem de dinheiro e ao financiamento do terrorismo
    aplicáveis às suas relações com correspondentes no país.

    Parágrafo único. Os procedimentos de que trata o caput devem incluir, no mínimo:
    I - a avaliação das políticas e dos procedimentos de PLD/FT adotados pelo
    correspondente;
    II - a aprovação do estabelecimento da relação pela alta administração; e
    III - a documentação das responsabilidades de cada parte.
guidance:
  prose: |
    O art. 31 trata de correspondentes bancarios (agentes autorizados pela
    instituicao a prestar servicos financeiros em seu nome).

    **Correspondentes bancarios:**
    Entidades contratadas pela instituicao para intermediar servicos como:
    - Abertura de contas
    - Recebimento de pagamentos
    - Propostas de credito
    - Transferencias de recursos
    - Saques e depositos

    **Riscos de PLD/FT com correspondentes:**
    - Menor controle sobre o processo de KYC
    - Possibilidade de cumplicidade do correspondente
    - Dificuldade de monitoramento de operacoes presenciais
    - Exposicao geografica (correspondentes em areas de risco)

    **Obrigacoes minimas (paragrafo unico):**
    1. Avaliacao de PLD/FT do correspondente: due diligence sobre os controles
       de PLD/FT do correspondente antes da contratacao
    2. Aprovacao pela alta administracao: nivel C-level para aprovar a relacao
    3. Documentacao de responsabilidades: acordo formal definindo quem faz o que
       em termos de PLD/FT (KYC, monitoramento, comunicacao)
implementation_guidance:
  platform_engineering:
    prose: |
      **Due diligence de correspondentes:**
      1. Sistema de cadastro de correspondentes com campos de PLD/FT:
         politica, procedimentos, treinamento, historico de sancoes.
      2. Questionario padronizado de avaliacao de PLD/FT para correspondentes.
      3. Scoring de risco de PLD/FT por correspondente.
      4. Workflow de aprovacao pela alta administracao para novos correspondentes.

      **Monitoramento de correspondentes:**
      5. Dashboard de operacoes por correspondente com filtros de risco.
      6. Regras de monitoramento especificas por correspondente
         (volume atipico, tipos de operacao incomuns).
      7. Alerta quando correspondente excede limites operacionais.
      8. Revisao periodica automatizada (semestral/anual) de correspondentes.
    tools:
      - aml-platform
      - partner-management
      - workflow-engine
      - transaction-monitoring
  devsecops:
    prose: |
      **Testes de gestao de correspondentes:**
      1. Testes de workflow de aprovacao de novos correspondentes.
      2. Testes de scoring de risco de correspondentes.
      3. Testes de regras de monitoramento por correspondente.
      4. Testes de bloqueio quando correspondente excede limites.

      **Integracao:**
      5. Testes de API de integracao com sistemas de correspondentes.
      6. Validacao de dados recebidos de correspondentes.
      7. Audit trail de operacoes originadas em correspondentes.
      8. Testes de reconciliacao de operacoes.
    tools:
      - gitlab-ci
      - test-automation
      - api-testing
      - monitoring
  secops:
    prose: |
      **Governanca de correspondentes:**
      1. Inventario atualizado de todos os correspondentes ativos.
      2. Avaliacao anual de PLD/FT de cada correspondente.
      3. Visitas presenciais para correspondentes de alto risco.
      4. Processo formal de encerramento quando correspondente nao atende
         requisitos de PLD/FT.

      **Monitoramento operacional:**
      5. Relatorio mensal de operacoes por correspondente.
      6. Analise de alertas originados em correspondentes.
      7. Treinamento periodico de PLD/FT para correspondentes.
      8. Comunicacao imediata quando correspondente e envolvido em suspeita.
    tools:
      - aml-platform
      - grc-platform
      - partner-management
      - training-platform
