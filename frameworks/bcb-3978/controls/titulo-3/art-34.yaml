id: art-34
family: titulo-3
title: "Procedimentos para Relacoes de Correspondencia Bancaria Internacional"
class: BCB-3978
statement:
  prose: |
    Art. 34. As instituições mencionadas no art. 1 devem adotar procedimentos
    específicos de prevenção à lavagem de dinheiro e ao financiamento do terrorismo
    aplicáveis às relações de correspondência bancária internacional (correspondent
    banking).

    Parágrafo único. Os procedimentos de que trata o caput devem incluir, no mínimo:
    I - a avaliação do nível de risco de PLD/FT do correspondente estrangeiro;
    II - a obtenção de informações sobre a natureza dos negócios do correspondente;
    III - a avaliação dos controles de PLD/FT do correspondente; e
    IV - a vedação de relação com shell banks.
guidance:
  prose: |
    O art. 34 trata de correspondent banking internacional, que e uma relacao
    entre bancos de diferentes jurisdicoes para prestacao mutua de servicos.

    **Correspondent banking:**
    Relacao pela qual um banco (correspondente) presta servicos a outro banco
    (respondente) em outra jurisdicao. Servicos tipicos:
    - Transferencias internacionais (SWIFT)
    - Compensacao de cheques
    - Cash management
    - Trade finance

    **Riscos de PLD/FT:**
    - O banco respondente pode processar operacoes de clientes que o
      correspondente nao conhece ("nested accounts")
    - Diferenca de padroes de PLD/FT entre jurisdicoes
    - Shell banks (bancos sem presenca fisica real)
    - Payable-through accounts (contas para acesso direto de terceiros)

    **Obrigacoes minimas (paragrafo unico):**
    1. Avaliacao de risco do correspondente: historico, jurisdicao, supervisao
    2. Natureza dos negocios: entender a atividade e os clientes do correspondente
    3. Controles de PLD/FT: avaliar se controles sao adequados
    4. Vedacao de shell banks: proibicao absoluta de relacao com bancos sem
       presenca fisica (cartorio) em nenhuma jurisdicao

    **Shell banks:**
    Bancos que nao tem presenca fisica (escritorio, funcionarios) em nenhuma
    jurisdicao. Sao veiculos de lavagem de dinheiro e sua utilizacao e
    proibida pelo GAFI e pela circular.
implementation_guidance:
  platform_engineering:
    prose: |
      **Due diligence de correspondentes internacionais:**
      1. Sistema de cadastro de correspondentes internacionais com campos:
         jurisdicao, regulador, supervisao, controles de PLD/FT, KYC policy,
         listas de sancoes verificadas, presenca fisica.
      2. Questionario padronizado de due diligence (Wolfsberg Questionnaire).
      3. Scoring de risco por correspondente baseado em jurisdicao, supervisao,
         controles e historico.
      4. Workflow de aprovacao pela alta administracao para novos correspondentes.

      **Vedacao de shell banks (inciso IV):**
      5. Verificacao automatica de que correspondente tem presenca fisica.
      6. Bloqueio de cadastro quando nao ha evidencia de presenca fisica.
      7. Re-verificacao periodica (anual) de presenca fisica.
      8. Screening contra listas de shell banks conhecidos.

      **Monitoramento de relacao:**
      9. Dashboard de operacoes por correspondente internacional.
      10. Alertas quando volume ou tipo de operacao muda significativamente.
      11. Monitoramento de nested operations (operacoes de terceiros via
          correspondente).
    tools:
      - aml-platform
      - partner-management
      - sanctions-screening
      - workflow-engine
  devsecops:
    prose: |
      **Testes de due diligence:**
      1. Testes de workflow de aprovacao de correspondentes.
      2. Testes de bloqueio de shell banks.
      3. Testes de scoring de risco por jurisdicao e controles.
      4. Testes de integracao com SWIFT e sistemas de cambio.

      **Automacao:**
      5. Pipeline de atualizacao de scoring quando jurisdicao muda de status.
      6. Testes de re-verificacao periodica.
      7. Testes de monitoramento de operacoes por correspondente.
      8. Audit trail de due diligence documentada.
    tools:
      - gitlab-ci
      - test-automation
      - api-testing
      - audit-logging
  secops:
    prose: |
      **Governanca de correspondent banking:**
      1. Inventario de todos os correspondentes internacionais ativos.
      2. Revisao anual de due diligence de cada correspondente.
      3. Avaliacao imediata quando jurisdicao do correspondente entra
         em lista GAFI grey/black.
      4. Processo formal de encerramento quando correspondente nao
         atende requisitos.

      **Conformidade:**
      5. Verificacao periodica de ausencia de relacoes com shell banks.
      6. Relatorio de correspondent banking para o diretor responsavel.
      7. Acompanhamento de regulamentacao internacional (GAFI, BCBS).
      8. Treinamento de equipe de cambio e internacional sobre obrigacoes.
    tools:
      - aml-platform
      - grc-platform
      - sanctions-screening
      - training-platform
