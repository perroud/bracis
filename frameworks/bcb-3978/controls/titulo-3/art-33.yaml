id: art-33
family: titulo-3
title: "Procedimentos para Novas Tecnologias"
class: BCB-3978
statement:
  prose: |
    Art. 33. As instituições mencionadas no art. 1 devem adotar procedimentos
    específicos de avaliação de risco de PLD/FT previamente à adoção de novas
    tecnologias que possam ser utilizadas para a realização de operações ou a
    prestação de serviços.

    Parágrafo único. A avaliação de que trata o caput deve considerar, no mínimo:
    I - os riscos associados à utilização da nova tecnologia para lavagem de dinheiro
    e financiamento do terrorismo;
    II - a adequação dos controles de PLD/FT existentes à nova tecnologia; e
    III - a necessidade de implementação de controles adicionais.
guidance:
  prose: |
    O art. 33 aborda o risco de PLD/FT associado a novas tecnologias,
    exigindo avaliacao previa antes da adocao.

    **Tecnologias relevantes (exemplos atuais):**
    - PIX e pagamentos instantaneos
    - Open Finance/Open Banking
    - Criptoativos e blockchain
    - Inteligencia artificial para decisao de credito
    - Aplicativos moveis e canais digitais
    - APIs de terceiros para servicos financeiros
    - Identidade digital e biometria
    - Cloud computing para sistemas de PLD/FT

    **Riscos de novas tecnologias para PLD/FT:**
    - Velocidade (PIX: transferencias instantaneas dificultam pre-screening)
    - Anonimato (carteiras digitais, pre-pagos)
    - Desintermediacao (DeFi, P2P lending)
    - Volume (automatizacao permite grandes volumes em curto tempo)
    - Complexidade (APIs, integracoes que obscurecem o fluxo de recursos)

    **Avaliacao previa obrigatoria (paragrafo unico):**
    Antes de adotar nova tecnologia, a instituicao deve:
    1. Identificar riscos de PLD/FT especificos da tecnologia
    2. Avaliar se controles existentes sao suficientes
    3. Implementar controles adicionais quando necessario
    A avaliacao deve ser documentada e aprovada pelo compliance officer.
implementation_guidance:
  platform_engineering:
    prose: |
      **Framework de avaliacao de tecnologias:**
      1. Checklist padronizado de avaliacao de risco de PLD/FT para novas
         tecnologias com campos: descricao da tecnologia, riscos identificados,
         controles existentes, gaps, controles adicionais necessarios.
      2. Workflow de aprovacao: tech lead -> compliance officer -> diretor.
      3. Registro de avaliacoes com versionamento.
      4. Gate de deploy que verifica se avaliacao de PLD/FT esta aprovada
         antes de liberar nova tecnologia.

      **Controles para tecnologias especificas:**
      5. PIX: monitoramento em tempo real com latencia < 1 segundo,
         screening de sancoes pre-transacao, limites por categoria de risco.
      6. Open Finance: validacao de consentimento, monitoramento de
         compartilhamento de dados, screening de instituicoes receptoras.
      7. Canais digitais: device fingerprinting, geolocalizacao, deteccao
         de emuladores e VPNs, behavioral biometrics.
      8. APIs de terceiros: due diligence de parceiros, monitoramento de
         operacoes via API, rate limiting.
    tools:
      - aml-platform
      - risk-assessment-tool
      - workflow-engine
      - api-gateway
  devsecops:
    prose: |
      **Avaliacao no pipeline:**
      1. Template de avaliacao de PLD/FT integrado ao processo de
         development de novas features.
      2. Gate de compliance no pipeline para features com impacto em PLD/FT.
      3. Threat modeling obrigatorio para novas tecnologias financeiras.
      4. Testes de seguranca focados em bypass de controles de PLD/FT.

      **Controles tecnicos:**
      5. Testes de monitoramento em tempo real para canais instantaneos.
      6. Testes de screening de sancoes com latencia aceitavel.
      7. Testes de device fingerprinting e deteccao de fraude.
      8. Testes de performance de controles de PLD/FT em novas tecnologias.
    tools:
      - gitlab-ci
      - threat-modeling
      - performance-testing
      - test-automation
  secops:
    prose: |
      **Governanca de novas tecnologias:**
      1. Comite de avaliacao de novas tecnologias com participacao obrigatoria
         de compliance/PLD/FT.
      2. Registro de todas as novas tecnologias adotadas com avaliacao de PLD/FT.
      3. Revisao periodica de tecnologias adotadas para atualizar avaliacao.
      4. Monitoramento de regulamentacao sobre novas tecnologias.

      **Acompanhamento pos-adocao:**
      5. Monitoramento de indicadores de PLD/FT em novas tecnologias.
      6. Ajuste de controles quando risco real diverge do avaliado.
      7. Relatorio de efetividade de controles em novas tecnologias.
      8. Benchmarking com pares sobre controles para mesmas tecnologias.
    tools:
      - grc-platform
      - aml-platform
      - reporting-dashboard
      - risk-assessment-tool
