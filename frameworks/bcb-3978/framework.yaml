control_families:
  - id: titulo-1
    title: "Disposicoes Gerais"
    description: "Objeto da circular e definicoes aplicaveis a prevencao a lavagem de dinheiro e ao financiamento do terrorismo"
    articles: "art. 1 ao art. 2"
    control_count: 2
  - id: cap-1
    title: "Da Politica de Prevencao a Lavagem de Dinheiro e ao Financiamento do Terrorismo"
    description: "Requisitos para elaboracao, implementacao e manutencao da politica institucional de PLD/FT"
    articles: "art. 3 ao art. 5"
    control_count: 3
  - id: cap-2
    title: "Da Avaliacao Interna de Risco"
    description: "Avaliacao interna de risco de lavagem de dinheiro e financiamento do terrorismo com base em perfil de risco"
    articles: "art. 6 ao art. 9"
    control_count: 4
  - id: cap-3
    title: "Dos Procedimentos de Conheca seu Cliente (KYC)"
    description: "Procedimentos de identificacao, qualificacao e classificacao de risco de clientes, incluindo beneficiario final e PEP"
    articles: "art. 10 ao art. 17"
    control_count: 8
  - id: cap-4
    title: "Do Registro de Operacoes"
    description: "Requisitos para registro e manutencao de informacoes sobre operacoes realizadas pelos clientes"
    articles: "art. 18 ao art. 20"
    control_count: 3
  - id: cap-5
    title: "Do Monitoramento, Selecao e Analise de Operacoes e Situacoes Suspeitas"
    description: "Procedimentos de monitoramento continuo, selecao e analise de operacoes e situacoes atipicas"
    articles: "art. 21 ao art. 24"
    control_count: 4
  - id: cap-6
    title: "Da Comunicacao ao COAF"
    description: "Obrigacoes de comunicacao de operacoes suspeitas ao Conselho de Controle de Atividades Financeiras"
    articles: "art. 25 ao art. 30"
    control_count: 6
  - id: titulo-3
    title: "Dos Procedimentos Especiais"
    description: "Procedimentos diferenciados para situacoes de maior risco, incluindo correspondentes e transferencias internacionais"
    articles: "art. 31 ao art. 34"
    control_count: 4
  - id: titulo-4
    title: "Das Disposicoes Finais"
    description: "Responsabilidades do diretor, treinamento, retencao de documentos e disposicoes transitorias"
    articles: "art. 35 ao art. 38"
    control_count: 4
related_frameworks:
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD complementa a Circular 3.978 ao disciplinar o tratamento de dados pessoais
      coletados no processo de KYC e monitoramento de transacoes, exigindo base legal e
      proporcionalidade.
  - framework_id: bacen-4893
    relationship: complements
    description: "A Resolucao 4.893 complementa a Circular 3.978 ao prover controles de seguranca cibernetica que protegem os sistemas de PLD/FT contra acessos indevidos e manipulacao."
  - framework_id: nist-800-53-rev5
    relationship: mapped
    description: "Os controles do NIST 800-53 rev5 oferecem mapeamento detalhado para implementacao tecnica dos requisitos de monitoramento, auditoria e controle de acesso da Circular 3.978."
  - framework_id: iso-27001-2022
    relationship: supports
    description: "A ISO 27001:2022 fornece o framework de gestao de seguranca da informacao que suporta a protecao dos dados e sistemas de PLD/FT."
