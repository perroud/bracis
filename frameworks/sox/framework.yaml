titles:
  - id: title-i
    title: "Public Company Accounting Oversight Board"
    sections: [101, 102, 103, 104, 105, 106, 107, 108, 109]
    description: >-
      Establishes the PCAOB to oversee the audit of public companies,
      set auditing standards, and conduct inspections of accounting firms.
  - id: title-ii
    title: "Auditor Independence"
    sections: [201, 202, 203, 204, 205, 206, 207, 208, 209]
    description: >-
      Establishes restrictions on auditor conflicts of interest, mandatory
      audit partner rotation, and prohibitions on certain non-audit services.
  - id: title-iii
    title: "Corporate Responsibility"
    sections: [301, 302, 303, 304, 305, 306, 307, 308]
    description: >-
      Requires CEO/CFO certification of financial reports, establishes
      audit committee independence requirements, and defines forfeiture
      provisions for restatements.
  - id: title-iv
    title: "Enhanced Financial Disclosures"
    sections: [401, 402, 403, 404, 405, 406, 407, 408, 409]
    description: >-
      Requires management assessment of internal controls (Section 404),
      real-time disclosures (Section 409), code of ethics disclosures,
      and enhanced reporting of off-balance sheet transactions.
  - id: title-v
    title: "Analyst Conflicts of Interest"
    sections: [501]
    description: >-
      Addresses conflicts of interest faced by securities analysts and
      requires separation of research and investment banking activities.
  - id: title-vi
    title: "Commission Resources and Authority"
    sections: [601, 602, 603, 604]
    description: >-
      Grants the SEC additional resources, authority to censure or bar
      professionals, and federal court authority for bars and penalties.
  - id: title-vii
    title: "Studies and Reports"
    sections: [701, 702, 703, 704, 705]
    description: >-
      Mandates GAO and SEC studies on consolidation of accounting firms,
      credit rating agencies, securities professionals, and enforcement actions.
  - id: title-viii
    title: "Corporate and Criminal Fraud Accountability"
    sections: [801, 802, 803, 804, 805, 806, 807]
    description: >-
      Establishes criminal penalties for destruction of audit records,
      document alteration, and fraud. Provides whistleblower protections
      for employees of publicly traded companies.
  - id: title-ix
    title: "White-Collar Crime Penalty Enhancements"
    sections: [901, 902, 903, 904, 905, 906]
    description: >-
      Increases criminal penalties for white-collar crimes, requires
      CEO/CFO certification of financial reports with criminal liability,
      and amends sentencing guidelines for fraud and obstruction.
  - id: title-x
    title: "Corporate Tax Returns"
    sections: [1001]
    description: >-
      Requires the CEO to sign the corporate tax return, establishing
      personal accountability for tax filings.
  - id: title-xi
    title: "Corporate Fraud and Accountability"
    sections: [1101, 1102, 1103, 1104, 1105, 1106, 1107]
    description: >-
      Grants SEC authority to freeze payments during investigations,
      establishes penalties for tampering with records or obstructing
      proceedings, and provides enhanced penalties for retaliation
      against informants.

