implementation_guidance:
  platform_engineering:
    prose: >-
      Implement immutable logging infrastructure using write-once storage backends
      (S3 Object Lock, Azure Immutable Blob Storage, WORM-compliant storage) for all
      audit-relevant records. Deploy centralized log aggregation with cryptographic
      integrity verification (hash chains, Merkle trees) that detects any tampering
      with log data. Establish automated data lifecycle management that enforces
      minimum 5-year retention for all audit-related records and prevents premature
      deletion. Implement role-based access controls on log storage that separate
      log producers from log administrators, ensuring no single role can both generate
      and delete audit records. Deploy backup and archival systems with integrity
      verification and periodic restore testing to ensure records remain retrievable
      throughout the retention period. Use infrastructure-as-code to define and enforce
      retention policies, making policy changes auditable and version-controlled.
    tools:
      - aws-s3-object-lock
      - elasticsearch
      - grafana-loki
      - terraform
      - vault
      - kubernetes-rbac
  devsecops:
    prose: >-
      Configure CI/CD systems to produce immutable audit trails of all pipeline
      executions, deployments, and configuration changes to financial reporting
      systems. Implement commit signing and branch protection rules that establish
      cryptographic proof of authorship and prevent history rewriting (force pushes)
      on repositories containing financial system code. Deploy automated compliance
      checks that verify log retention policies are correctly applied and that no
      audit-relevant log sources have been disabled or diverted. Establish pipeline
      controls that prevent the deployment of changes that would reduce log verbosity,
      disable audit logging, or shorten retention periods on in-scope systems.
      Maintain version-controlled retention policy definitions that are enforced
      through policy-as-code across all environments.
    tools:
      - gitlab-ci
      - gitlab-audit-events
      - git-commit-signing
      - conftest
      - open-policy-agent
      - trivy
  secops:
    prose: >-
      Operate a records management program that ensures all audit-relevant IT records
      are classified, retained, and protected for the required 5-year minimum period.
      Implement SIEM-based monitoring that detects attempts to alter, delete, or
      tamper with audit logs and triggers immediate alerts. Establish legal hold
      procedures that can rapidly preserve all relevant electronic records when
      litigation or investigation is anticipated. Conduct periodic integrity audits
      of log archives to verify that retained records have not been modified.
      Maintain a records retention schedule that maps specific record types to
      retention requirements and identifies the systems where those records reside.
      Configure automated alerts for retention policy violations (records approaching
      deletion before the retention period expires, storage systems approaching
      capacity limits that could cause premature data loss).
    tools:
      - splunk
      - elastic-siem
      - aws-cloudtrail
      - grc-platform
      - archive-management
      - data-loss-prevention

