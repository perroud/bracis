id: sec-802
family: section-802
title: "Criminal Penalties for Altering Documents"
class: SOX

statement:
  prose: >-
    Whoever knowingly alters, destroys, mutilates, conceals, covers up, falsifies, or
    makes a false entry in any record, document, or tangible object with the intent to
    impede, obstruct, or influence the investigation or proper administration of any
    matter within the jurisdiction of any department or agency of the United States or
    any case filed under title 11, or in relation to or contemplation of any such matter
    or case, shall be fined under this title, imprisoned not more than 20 years, or both.
    Any accountant who conducts an audit of an issuer shall maintain all audit or review
    workpapers for a period of 5 years from the end of the fiscal period in which the
    audit or review was conducted.
  parts:
    - id: sec-802.a
      label: "(a)"
      prose: >-
        It is unlawful to knowingly alter, destroy, mutilate, conceal, cover up,
        falsify, or make a false entry in any record, document, or tangible object
        with the intent to impede, obstruct, or influence any federal investigation
        or bankruptcy proceeding. Penalties include fines and/or imprisonment up to
        20 years.
    - id: sec-802.b
      label: "(b)"
      prose: >-
        Any accountant who conducts an audit of an issuer of securities shall
        maintain all audit or review workpapers for a period of 5 years from the end
        of the fiscal period in which the audit or review was conducted.

guidance:
  prose: >-
    Section 802 has two critical implications for IT organizations. First, it establishes
    severe criminal penalties for altering, destroying, or falsifying records that may
    be relevant to federal investigations. This means IT systems must be configured to
    produce tamper-evident records — logs, audit trails, backups, and archives that
    cannot be silently modified or deleted. Second, it mandates a minimum 5-year
    retention period for audit workpapers. For IT, this extends to electronic records
    that support the audit: system logs, access records, change management records,
    configuration baselines, and any other digital artifacts that auditors rely upon
    in their assessment. Organizations must implement data retention policies that
    ensure these records are preserved for the required period and are readily
    retrievable. Log tampering, premature log deletion, or destruction of audit
    evidence are not merely compliance failures — they are federal crimes.

references:
  - citation: "Sarbanes-Oxley Act of 2002, Section 802 (18 U.S.C. 1519, 1520)"
    url: "https://www.law.cornell.edu/uscode/text/18/1519"
  - citation: "SEC Rule 2-06 — Retention of Records Relevant to Audits and Reviews"
