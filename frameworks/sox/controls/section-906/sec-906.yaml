id: sec-906
family: section-906
title: "Corporate Responsibility for Financial Reports (Criminal Certification)"
class: SOX

statement:
  prose: >-
    The chief executive officer and the chief financial officer of each issuer shall
    certify that the periodic report containing financial statements fully complies with
    the requirements of section 13(a) or 15(d) of the Securities Exchange Act of 1934
    and that information contained in the periodic report fairly presents, in all material
    respects, the financial condition and results of operations of the issuer. Any person
    who certifies any statement knowing that the periodic report does not comport with
    all the requirements shall be fined not more than $1,000,000 or imprisoned not more
    than 10 years, or both. Any person who willfully certifies any statement knowing that
    the periodic report does not comport with all the requirements shall be fined not
    more than $5,000,000 or imprisoned not more than 20 years, or both.
  parts:
    - id: sec-906.a
      label: "(a)"
      prose: >-
        Each periodic report containing financial statements filed with the SEC shall
        be accompanied by a written statement by the CEO and CFO certifying that the
        report fully complies with sections 13(a) or 15(d) of the Securities Exchange
        Act of 1934 and that the information fairly presents the financial condition
        and results of operations.
    - id: sec-906.b
      label: "(b)"
      prose: >-
        Knowing violation: fine up to $1,000,000, imprisonment up to 10 years, or both.
    - id: sec-906.c
      label: "(c)"
      prose: >-
        Willful violation: fine up to $5,000,000, imprisonment up to 20 years, or both.

guidance:
  prose: >-
    Section 906 parallels Section 302 but adds criminal penalties for false certifications.
    While Section 302 imposes civil liability, Section 906 can result in imprisonment
    for executives who knowingly or willfully certify inaccurate financial reports.
    The IT implication is identical to Section 302 but with heightened urgency: the
    CEO/CFO must have high confidence that the IT systems producing financial data are
    operating with effective internal controls. Any IT control deficiency that leads
    to a material misstatement in financial reports creates criminal exposure for the
    signing officers. This drives executive attention to ITGC quality and creates strong
    organizational incentives for IT teams to maintain rigorous controls, timely
    deficiency reporting, and comprehensive evidence of control effectiveness.

references:
  - citation: "Sarbanes-Oxley Act of 2002, Section 906 (18 U.S.C. 1350)"
    url: "https://www.law.cornell.edu/uscode/text/18/1350"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement the same control monitoring and evidence collection infrastructure
      described for Section 302, with additional emphasis on completeness and accuracy.
      Deploy automated reconciliation checks that verify financial data integrity
      across system boundaries (ERP to general ledger, sub-ledgers to consolidated
      reporting). Establish executive dashboards with drill-down capabilities that
      allow the CEO/CFO to independently verify the status of internal controls
      before signing certifications. Implement data quality monitoring that detects
      anomalies in financial data flows (unexpected value changes, missing transactions,
      processing delays) that could indicate control failures. Build automated
      certification support packages that aggregate all control evidence into a
      structured format for executive review prior to each filing.
    tools:
      - grafana
      - backstage
      - data-quality-tools
      - terraform
      - open-policy-agent
  devsecops:
    prose: >-
      Enforce the highest level of CI/CD rigor for systems that directly produce
      financial reporting data. Implement mandatory multi-party approval for all
      changes to financial data processing logic, with documented business
      justification and testing evidence. Deploy automated regression testing that
      validates financial calculation accuracy after every code change. Maintain
      complete traceability from business requirements through code changes to
      production deployments for all financial system modifications. Implement
      automated rollback triggers that revert changes if post-deployment financial
      data validation checks fail.
    tools:
      - gitlab-ci
      - gitlab-approval-rules
      - sonarqube
      - selenium
      - conftest
  secops:
    prose: >-
      Operate enhanced monitoring for financial reporting systems with zero tolerance
      for undetected control failures. Implement continuous control monitoring that
      validates every ITGC on a daily or real-time basis rather than periodic sampling.
      Establish a formal certification support process that provides the CEO/CFO with
      a comprehensive control effectiveness summary before each quarterly and annual
      filing. Deploy fraud detection analytics on financial system access patterns
      and data modifications to identify potential manipulation. Maintain detailed
      incident records for any control failure or anomaly affecting financial systems,
      with documented impact assessment and remediation actions.
    tools:
      - splunk
      - elastic-siem
      - grc-platform
      - servicenow
      - fraud-detection-tools

