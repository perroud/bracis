id: sec-404-a
family: section-404
title: "Management Assessment of Internal Controls"
class: SOX

statement:
  prose: >-
    The Securities and Exchange Commission shall prescribe rules requiring each annual
    report required by section 13(a) or 15(d) of the Securities Exchange Act of 1934
    to contain an internal control report, which shall: (1) state the responsibility of
    management for establishing and maintaining an adequate internal control structure
    and procedures for financial reporting; and (2) contain an assessment, as of the end
    of the most recent fiscal year of the issuer, of the effectiveness of the internal
    control structure and procedures of the issuer for financial reporting.
  parts:
    - id: sec-404-a.1
      label: "(1)"
      prose: >-
        State the responsibility of management for establishing and maintaining an
        adequate internal control structure and procedures for financial reporting.
    - id: sec-404-a.2
      label: "(2)"
      prose: >-
        Contain an assessment, as of the end of the most recent fiscal year of the
        issuer, of the effectiveness of the internal control structure and procedures
        of the issuer for financial reporting.

guidance:
  prose: >-
    Section 404(a) is the most consequential SOX provision for IT organizations. It
    requires management to formally assess and report on internal controls over financial
    reporting (ICFR), which necessarily includes IT General Controls. Management must
    use a recognized internal control framework (typically COSO 2013) to structure
    their assessment. For IT systems that process, store, or transmit financial data,
    this means establishing and testing controls across four ITGC domains: access
    management, change management, IT operations, and system development lifecycle.
    The assessment must be performed annually, with evidence of control design and
    operating effectiveness throughout the fiscal year. Material weaknesses must be
    disclosed in the annual report. PCAOB Auditing Standard No. 5 (AS 2201) provides
    guidance on the integrated audit of financial statements and ICFR that shapes
    how auditors evaluate management's assessment.

references:
  - citation: "Sarbanes-Oxley Act of 2002, Section 404(a) (15 U.S.C. 7262(a))"
    url: "https://www.law.cornell.edu/uscode/text/15/7262"
  - citation: "PCAOB Auditing Standard No. 5 (AS 2201) — Audit of Internal Control Over Financial Reporting"
    url: "https://pcaobus.org/oversight/standards/auditing-standards/details/AS2201"
  - citation: "SEC Final Rule: Management's Report on Internal Control Over Financial Reporting (Release No. 33-8238)"
    url: "https://www.sec.gov/rules/final/33-8238.htm"
  - citation: "COSO Internal Control — Integrated Framework (2013)"
    url: "https://www.coso.org/guidance-on-ic"

implementation_guidance:
  platform_engineering:
    prose: >-
      Establish a comprehensive inventory of all IT systems that participate in
      financial reporting processes, maintained as code in a service catalog (Backstage
      or equivalent). For each in-scope system, document the control objectives,
      control activities, and responsible owners. Implement infrastructure-as-code to
      ensure reproducible and auditable system configurations that serve as the baseline
      for control assessments. Deploy automated compliance scanning that continuously
      validates control configurations against approved baselines and generates evidence
      artifacts. Build a centralized evidence repository that collects and organizes
      ITGC evidence (access reviews, change tickets, operational logs, test results)
      throughout the fiscal year. Implement automated control testing that validates
      operating effectiveness on a continuous basis rather than relying solely on
      point-in-time sampling.
    tools:
      - backstage
      - terraform
      - open-policy-agent
      - grafana
      - checkov
      - kubernetes-rbac
      - vault
  devsecops:
    prose: >-
      Implement CI/CD pipeline controls that enforce ITGC requirements for all
      financial reporting systems: mandatory code reviews, automated testing,
      approval gates for production deployments, and segregation of duties between
      development and deployment roles. Maintain version-controlled documentation
      of all control procedures and evidence. Configure compliance pipelines that
      automatically execute control tests (access validation, configuration drift
      detection, segregation of duties verification) and store results as audit
      evidence. Establish a formal change management process within the CI/CD system
      that requires documented approvals, testing evidence, and rollback procedures
      for all changes to in-scope systems. Generate automated control narratives
      from pipeline execution data to support the annual management assessment.
    tools:
      - gitlab-ci
      - gitlab-compliance-framework
      - gitlab-approval-rules
      - sonarqube
      - checkov
      - conftest
      - trivy
  secops:
    prose: >-
      Design and operate the annual ITGC assessment process using a GRC platform
      to track control objectives, control activities, testing procedures, and
      results across all four ITGC domains. Establish a risk-based scoping process
      to identify IT systems material to financial reporting. Coordinate with
      external auditors to agree on the control matrix, testing approach, and
      evidence requirements. Conduct walkthroughs and testing of each ITGC control
      throughout the fiscal year, documenting evidence of both design and operating
      effectiveness. Maintain a deficiency tracking register that classifies findings
      as control deficiencies, significant deficiencies, or material weaknesses.
      Produce the management assessment report summarizing ITGC effectiveness and
      supporting the CEO/CFO's overall ICFR conclusion.
    tools:
      - grc-platform
      - servicenow
      - archer
      - splunk
      - elastic-siem
      - qualys

