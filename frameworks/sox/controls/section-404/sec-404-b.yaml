id: sec-404-b
family: section-404
title: "Auditor Attestation of Internal Controls"
class: SOX

statement:
  prose: >-
    With respect to the internal control assessment required by subsection (a), each
    registered public accounting firm that prepares or issues the audit report for the
    issuer, other than an issuer that is an emerging growth company, shall attest to,
    and report on, the assessment made by the management of the issuer. An attestation
    made under this subsection shall be made in accordance with standards for attestation
    engagements issued or adopted by the Board. An attestation engagement shall not be
    the subject of a separate engagement.

guidance:
  prose: >-
    Section 404(b) requires the external auditor to independently evaluate and attest
    to management's assessment of ICFR. This means the auditor will perform their own
    testing of internal controls, including ITGCs, and issue an opinion on their
    effectiveness. For IT teams, this translates to preparing for and supporting the
    external audit, which includes providing evidence of ITGC design and operating
    effectiveness, responding to auditor inquiries about IT processes, facilitating
    walkthroughs of IT controls, and remediating any findings identified during the
    audit. Note that emerging growth companies (EGCs) are exempt from Section 404(b)
    under the JOBS Act, and smaller reporting companies received additional exemptions
    under Dodd-Frank. However, Section 404(a) management assessment still applies.
    The audit is performed under PCAOB AS 2201 (formerly AS No. 5), which uses a
    top-down, risk-based approach focusing on controls that address the risk of
    material misstatement.

references:
  - citation: "Sarbanes-Oxley Act of 2002, Section 404(b) (15 U.S.C. 7262(b))"
    url: "https://www.law.cornell.edu/uscode/text/15/7262"
  - citation: "PCAOB AS 2201 — Audit of Internal Control Over Financial Reporting Integrated with Financial Statement Audit"
    url: "https://pcaobus.org/oversight/standards/auditing-standards/details/AS2201"
  - citation: "JOBS Act Section 103 — Exemption from Section 404(b) for Emerging Growth Companies"
    url: "https://www.congress.gov/bill/112th-congress/house-bill/3606"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build self-service evidence extraction capabilities that allow auditors to
      independently verify control operation without requiring manual data pulls
      from engineering teams. Implement read-only audit access roles across all
      in-scope platforms (cloud consoles, CI/CD systems, identity providers,
      monitoring tools) that enable auditors to perform their own walkthroughs.
      Deploy automated evidence packages that compile access logs, change records,
      configuration snapshots, and operational metrics into structured audit
      workpapers. Maintain a continuously updated system inventory with data flow
      diagrams showing how financial data traverses IT systems, enabling auditors
      to perform efficient scoping. Establish environment parity controls that
      ensure development, staging, and production environments have consistent
      control configurations.
    tools:
      - backstage
      - terraform
      - grafana
      - vault
      - cloud-audit-logs
      - kubernetes-rbac
  devsecops:
    prose: >-
      Configure audit-ready logging across all CI/CD pipelines that captures the
      complete lifecycle of changes to financial reporting systems: who requested
      the change, who approved it, what tests were executed, when it was deployed,
      and what the rollback plan was. Implement immutable pipeline logs that cannot
      be altered after execution, providing tamper-proof evidence for auditor review.
      Establish a formal process for providing auditors with access to pipeline
      execution history, merge request records, and deployment logs. Maintain
      documented procedures for each ITGC area (access provisioning, change
      management, deployment, monitoring) that auditors can use for walkthrough
      testing. Generate automated evidence summaries for each control testing period
      that include population completeness data and exception reports.
    tools:
      - gitlab-ci
      - gitlab-compliance-framework
      - gitlab-audit-events
      - sonarqube
      - conftest
      - trivy
  secops:
    prose: >-
      Coordinate the external audit engagement for ITGCs, serving as the primary
      liaison between the audit firm and IT teams. Prepare a comprehensive audit
      readiness package including the ITGC control matrix, control narratives,
      process flowcharts, and pre-selected evidence samples. Manage the Information
      Provided by the Entity (IPE) process to ensure all data provided to auditors
      is complete and accurate. Track auditor requests and findings in a centralized
      system, ensuring timely responses and remediation. Facilitate walkthrough
      meetings where auditors observe control execution. Maintain a remediation
      tracker for prior-year audit findings to demonstrate management's commitment
      to continuous improvement. Prepare management's response to any identified
      deficiencies or material weaknesses.
    tools:
      - grc-platform
      - servicenow
      - archer
      - splunk
      - audit-management-platform

