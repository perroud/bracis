id: itgc-operations
family: itgc
title: "IT General Control: IT Operations"
class: SOX

statement:
  prose: >-
    The organization shall establish and maintain controls over IT operations to ensure
    that IT systems supporting financial reporting operate reliably, securely, and as
    intended. This includes controls over job scheduling and batch processing, data
    backup and recovery, incident management, system monitoring, and physical and
    environmental security of computing infrastructure. Operations procedures shall be
    documented, and deviations shall be detected, investigated, and resolved in a
    timely manner.
  parts:
    - id: itgc-operations.1
      label: "(1)"
      prose: >-
        Batch jobs and scheduled processes that affect financial data shall be
        monitored to ensure successful completion. Failed jobs shall be detected,
        investigated, and re-executed according to defined procedures.
    - id: itgc-operations.2
      label: "(2)"
      prose: >-
        Data backups of financial systems and data shall be performed according
        to a defined schedule. Backup integrity shall be verified, and restoration
        procedures shall be periodically tested to confirm recoverability.
    - id: itgc-operations.3
      label: "(3)"
      prose: >-
        IT incidents affecting financial reporting systems shall be logged,
        classified, escalated, and resolved according to defined procedures.
        Root causes shall be identified and addressed for significant incidents.
    - id: itgc-operations.4
      label: "(4)"
      prose: >-
        System performance and availability shall be monitored to detect
        conditions that could affect the reliability of financial data processing.
    - id: itgc-operations.5
      label: "(5)"
      prose: >-
        Vulnerability management processes shall ensure that security patches
        and updates are evaluated, tested, and applied to in-scope systems
        within defined timeframes based on risk severity.

guidance:
  prose: >-
    IT Operations controls ensure that the infrastructure supporting financial
    reporting runs reliably and that issues are detected and corrected before they
    affect data integrity. Auditors typically test batch job monitoring (especially
    for reconciliation and closing processes), backup procedures and restoration
    testing, incident management for production issues, and vulnerability/patch
    management. Common audit findings include: batch job failures without documented
    investigation, untested backup restores, missing incident documentation, unpatched
    systems with known vulnerabilities, and lack of monitoring for critical financial
    processing jobs. The scope includes all infrastructure layers: compute, storage,
    network, database, and application services that support in-scope financial systems.
    Business continuity and disaster recovery plans for financial systems also fall
    under this domain.

