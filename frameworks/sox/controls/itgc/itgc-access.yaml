id: itgc-access
family: itgc
title: "IT General Control: Access Management"
class: SOX

statement:
  prose: >-
    The organization shall establish and maintain logical access controls over IT
    systems and data that support financial reporting. Access to programs, data,
    and computing resources shall be restricted to authorized individuals based on
    business need and job responsibilities. Access provisioning, modification, and
    revocation shall be formally authorized, documented, and periodically reviewed.
    Privileged access shall be restricted to the minimum number of individuals
    necessary and subject to enhanced monitoring. Authentication mechanisms shall
    provide reasonable assurance that users are who they claim to be.
  parts:
    - id: itgc-access.1
      label: "(1)"
      prose: >-
        Access to applications, databases, operating systems, and network devices
        that support financial reporting shall be restricted to authorized users
        through unique user identification and authentication.
    - id: itgc-access.2
      label: "(2)"
      prose: >-
        Access provisioning and modification shall be formally authorized by
        appropriate management, documented, and processed in a timely manner.
    - id: itgc-access.3
      label: "(3)"
      prose: >-
        Access shall be revoked or modified in a timely manner upon personnel
        termination, transfer, or change in job responsibilities.
    - id: itgc-access.4
      label: "(4)"
      prose: >-
        Periodic access reviews shall be performed to validate that access
        rights remain appropriate and that unauthorized access has not been granted.
    - id: itgc-access.5
      label: "(5)"
      prose: >-
        Privileged and administrative access shall be restricted, formally
        authorized, and subject to enhanced monitoring and periodic review.
    - id: itgc-access.6
      label: "(6)"
      prose: >-
        Segregation of duties shall be enforced through access controls to
        prevent any single individual from performing incompatible functions
        (e.g., developing and deploying code, initiating and approving transactions).

guidance:
  prose: >-
    Access management is the most frequently tested ITGC domain in SOX audits.
    Auditors focus on whether the organization can demonstrate that only authorized
    individuals have access to financial systems and data, that access is granted
    based on documented business need, and that access is promptly removed when no
    longer required. Common audit findings include: stale accounts (terminated employees
    with active access), excessive privileged access, lack of periodic access reviews,
    missing access request documentation, and inadequate segregation of duties. The
    scope includes all layers of the technology stack: applications (ERP, financial
    reporting tools), databases, operating systems, network devices, cloud consoles,
    and middleware. For SOX purposes, the control population is limited to systems
    that are material to financial reporting, but the same access control principles
    should be applied consistently.

references:
  - citation: "COSO Internal Control — Integrated Framework, Principle 12: Deploy Control Activities Through Policies"
