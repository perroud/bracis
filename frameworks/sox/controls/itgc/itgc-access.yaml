implementation_guidance:
  platform_engineering:
    prose: >-
      Implement centralized identity management through a single identity provider
      (IdP) with SAML/OIDC federation to all in-scope applications. Enforce unique
      user identification — eliminate shared accounts and service accounts where
      possible, and where service accounts are required, implement credential rotation
      and usage monitoring. Deploy role-based access control (RBAC) with predefined
      role templates that map to job functions, reducing the risk of ad-hoc access
      grants. Implement automated provisioning/deprovisioning through SCIM integration
      between HR systems and the IdP to ensure timely access changes on hire, transfer,
      and termination. Deploy just-in-time (JIT) privileged access that grants
      elevated permissions only for a defined time window with documented justification.
      Implement automated access certification campaigns on a quarterly cadence that
      require managers to review and confirm or revoke their direct reports' access.
      Enforce multi-factor authentication (MFA) for all access to in-scope systems.
      Implement segregation of duties matrices as code, enforced through policy engines
      that prevent conflicting role assignments.
    tools:
      - okta
      - azure-ad
      - vault
      - kubernetes-rbac
      - open-policy-agent
      - terraform
      - backstage
  devsecops:
    prose: >-
      Enforce access controls within the CI/CD system by implementing protected
      branches, merge request approval rules, and environment-level access restrictions.
      Configure the CI/CD system to prevent developers from deploying their own code
      to production (segregation of duties). Implement automated access reviews for
      repository permissions and deployment credentials on a quarterly basis. Use
      infrastructure-as-code to manage access control configurations, ensuring all
      access changes are version-controlled, peer-reviewed, and auditable. Deploy
      automated scanning of infrastructure code to detect overly permissive access
      configurations (wildcard permissions, disabled authentication, public exposure).
      Implement automated detection of hardcoded credentials in code and configuration.
      Configure pipeline secrets management through a dedicated vault with access
      logging and automatic rotation.
    tools:
      - gitlab-ci
      - gitlab-approval-rules
      - vault
      - checkov
      - tfsec
      - gitleaks
      - open-policy-agent
  secops:
    prose: >-
      Operate quarterly user access reviews across all in-scope systems, generating
      review packages that list each user, their roles, their last access date, and
      the authorizing manager. Investigate and remediate exceptions within defined SLAs.
      Monitor authentication and authorization logs in SIEM to detect anomalous access
      patterns (access from unusual locations, access outside business hours, privilege
      escalation attempts, brute force attacks). Implement automated alerts for
      high-risk access events (new privileged accounts, access to financial databases
      by non-financial users, service account usage anomalies). Maintain segregation
      of duties monitoring that flags conflicting access combinations. Track access
      request and revocation timeliness metrics (time from HR termination notification
      to access revocation, time from access request to provisioning). Generate monthly
      access management reports showing review completion rates, exceptions identified,
      remediation timelines, and trend analysis.
    tools:
      - splunk
      - elastic-siem
      - sailpoint
      - saviynt
      - grc-platform
      - servicenow
      - crowdstrike

