id: sec-302
family: section-302
title: "Corporate Responsibility for Financial Reports"
class: SOX

statement:
  prose: >-
    The CEO and CFO of each issuer shall certify in each annual or quarterly report
    filed under Section 13(a) or 15(d) of the Securities Exchange Act of 1934 that:
    (1) the signing officer has reviewed the report; (2) based on the officer's
    knowledge, the report does not contain any untrue statement of a material fact or
    omit to state a material fact; (3) based on the officer's knowledge, the financial
    statements and other financial information fairly present in all material respects
    the financial condition and results of operations; (4) the signing officers are
    responsible for establishing and maintaining internal controls, have designed such
    controls to ensure that material information is made known to them, have evaluated
    the effectiveness of internal controls within 90 days prior to the report, and have
    presented their conclusions about the effectiveness of internal controls; and (5) the
    signing officers have disclosed to the auditors and audit committee all significant
    deficiencies in internal controls and any fraud involving management or employees
    with a significant role in internal controls.
  parts:
    - id: sec-302.a
      label: "(a)"
      prose: >-
        The signing officer has reviewed the report.
    - id: sec-302.b
      label: "(b)"
      prose: >-
        Based on the officer's knowledge, the report does not contain any untrue
        statement of a material fact or omit to state a material fact necessary in
        order to make the statements made, in light of the circumstances under which
        such statements were made, not misleading.
    - id: sec-302.c
      label: "(c)"
      prose: >-
        Based on the officer's knowledge, the financial statements, and other financial
        information included in the report, fairly present in all material respects the
        financial condition and results of operations of the issuer as of, and for,
        the periods presented in the report.
    - id: sec-302.d
      label: "(d)"
      prose: >-
        The signing officers are responsible for establishing and maintaining internal
        controls; have designed such internal controls to ensure that material
        information relating to the issuer is made known to such officers; have evaluated
        the effectiveness of the issuer's internal controls as of a date within 90 days
        prior to the report; and have presented in the report their conclusions about the
        effectiveness of their internal controls based on their evaluation.
    - id: sec-302.e
      label: "(e)"
      prose: >-
        The signing officers have disclosed to the issuer's auditors and the audit
        committee of the board of directors all significant deficiencies in the design
        or operation of internal controls which could adversely affect the issuer's
        ability to record, process, summarize, and report financial data and have
        identified for the auditors any material weaknesses in internal controls; and
        any fraud, whether or not material, that involves management or other employees
        who have a significant role in the issuer's internal controls.

guidance:
  prose: >-
    Section 302 establishes personal accountability of the CEO and CFO for the accuracy
    and completeness of financial reports. This is a civil certification requirement
    (criminal penalties are covered separately under Section 906). For IT organizations,
    the critical implication is that internal controls over financial reporting (ICFR)
    must be designed, maintained, and evaluated — and that any significant deficiencies
    in those controls must be disclosed. This directly drives the need for IT General
    Controls (ITGCs) because financial data flows through IT systems. The CEO/CFO must
    be able to certify that the IT systems producing financial data have adequate controls
    over access, change management, operations, and data integrity. Any deficiency in
    ITGCs that could affect financial reporting accuracy constitutes a reportable condition.

references:
  - citation: "Sarbanes-Oxley Act of 2002, Section 302 (15 U.S.C. 7241)"
    url: "https://www.law.cornell.edu/uscode/text/15/7241"
  - citation: "SEC Rule 13a-14 / 15d-14 — Certification of Disclosure"
    url: "https://www.ecfr.gov/current/title-17/chapter-II/part-240/subpart-A/subject-group-ECFR5765e895a658b60/section-240.13a-14"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build automated dashboards that aggregate internal control health metrics across
      all financial systems, providing CEO/CFO-level visibility into control effectiveness.
      Implement a centralized control monitoring platform that tracks the status of all
      ITGCs (access reviews, change approvals, backup verifications, vulnerability scans)
      and surfaces deficiencies in real time. Establish automated evidence collection
      pipelines that gather control artifacts (access logs, approval records, configuration
      baselines) into a structured repository for the 90-day evaluation cycle. Deploy
      data lineage tracking to map how financial data flows through IT systems, enabling
      the signing officers to understand which systems are in scope for ICFR.
    tools:
      - backstage
      - grafana
      - open-policy-agent
      - terraform
      - data-lineage-tools
  devsecops:
    prose: >-
      Implement automated control testing within CI/CD pipelines to continuously validate
      that ICFR-relevant systems maintain required control configurations. Enforce
      separation of duties through merge request approval rules that prevent single
      individuals from making unreviewed changes to financial systems. Maintain immutable
      audit trails of all code changes, deployments, and configuration modifications to
      financial reporting systems. Integrate automated compliance scanning that flags
      deviations from approved baselines and generates deficiency reports for the
      quarterly certification process. Establish automated workflows that route
      significant control deficiencies to the audit committee and external auditors.
    tools:
      - gitlab-ci
      - gitlab-compliance-framework
      - gitlab-approval-rules
      - checkov
      - conftest
      - vault
  secops:
    prose: >-
      Operate a continuous monitoring program that detects and reports internal control
      deficiencies affecting financial reporting systems. Configure SIEM rules to identify
      unauthorized access, unauthorized changes, or anomalous activity on in-scope financial
      systems. Generate quarterly control effectiveness reports summarizing the status of
      all ITGCs, significant deficiencies identified, remediation progress, and any fraud
      indicators. Maintain a formal deficiency tracking process that escalates material
      weaknesses to the audit committee. Conduct periodic internal assessments of ITGC
      operating effectiveness aligned with the 90-day evaluation cycle required for
      CEO/CFO certification.
    tools:
      - splunk
      - elastic-siem
      - grc-platform
      - servicenow
      - archer

