control_families:
  - id: cap-1
    title: "Disposicoes Gerais"
    description: "Definicoes, escopo de aplicacao, atividades reguladas e classificacao de prestadoras de servicos de ativos virtuais (VASPs)"
    articles: "art. 1 ao art. 4"
    control_count: 4
  - id: cap-2
    title: "Autorizacao e Registro"
    description: "Requisitos para autorizacao de funcionamento, capital minimo, forma societaria e governanca corporativa das VASPs"
    articles: "art. 5 ao art. 8"
    control_count: 4
  - id: cap-3
    title: "Segregacao Patrimonial"
    description: "Obrigacao de separacao dos ativos virtuais e recursos financeiros dos clientes do patrimonio da VASP"
    articles: "art. 9 ao art. 11"
    control_count: 3
  - id: cap-4
    title: "Governanca e Controles Internos"
    description: "Estrutura de governanca, diretoria responsavel, compliance officer, auditoria interna e gestao de riscos"
    articles: "art. 12 ao art. 14"
    control_count: 3
  - id: cap-5
    title: "Prevencao a Lavagem de Dinheiro e ao Financiamento do Terrorismo (PLD/FT)"
    description: "Procedimentos de KYC, travel rule, monitoramento de transacoes, comunicacao ao COAF e due diligence para ativos virtuais"
    articles: "art. 15 ao art. 18"
    control_count: 4
  - id: cap-6
    title: "Seguranca Cibernetica e Custodia"
    description: "Requisitos de seguranca cibernetica, custodia de chaves criptograficas, cold storage, hot wallets e backup de chaves privadas"
    articles: "art. 19 ao art. 21"
    control_count: 3
  - id: cap-7
    title: "Transparencia e Divulgacao"
    description: "Obrigacoes de transparencia, divulgacao de informacoes ao cliente, termos de uso, riscos, taxas e politica de conflitos de interesse"
    articles: "art. 22 ao art. 24"
    control_count: 3
  - id: cap-8
    title: "Disposicoes Finais e Transitorias"
    description: "Prazos de adequacao, penalidades administrativas, disposicoes transitorias e revogacao de normas anteriores"
    articles: "art. 25 ao art. 26"
    control_count: 2
related_frameworks:
  - framework_id: cvm-50
    relationship: complements
    description: >-
      A CVM 50 (PLD/FT no mercado de capitais) complementa a BCB 304 ao disciplinar a
      prevencao a lavagem de dinheiro em ativos que podem ter natureza hibrida entre
      valores mobiliarios e ativos virtuais.
  - framework_id: bcb-3978
    relationship: implements
    description: >-
      A BCB 304 implementa os principios de PLD/FT da Circular 3.978 adaptando-os ao
      contexto especifico de prestadoras de servicos de ativos virtuais, incluindo
      travel rule e monitoramento on-chain.
  - framework_id: bcb-85
    relationship: complements
    description: "A BCB 85 (seguranca cibernetica para IPs) complementa a BCB 304 ao prover framework de seguranca cibernetica aplicavel as VASPs que tambem sao instituicoes de pagamento."
  - framework_id: lgpd
    relationship: complements
    description: "A LGPD complementa a BCB 304 ao disciplinar o tratamento de dados pessoais coletados no KYC, monitoramento de transacoes e custodia de ativos virtuais por VASPs."
  - framework_id: bcb-44
    relationship: complements
    description: "A BCB 44 (PLD/FT para IPs) complementa a BCB 304 para VASPs que tambem atuam como instituicoes de pagamento, criando obrigacoes cumulativas de PLD/FT."
