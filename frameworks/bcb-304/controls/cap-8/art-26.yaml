id: art-26
family: cap-8
title: "Penalidades e Sancoes Administrativas"
class: BCB-304
baselines: [vasps-autorizadas]
statement:
  prose: |
    Art. 26. O descumprimento das disposições desta Resolução sujeita a prestadora
    de serviços de ativos virtuais e seus administradores às sanções previstas na
    legislação em vigor, incluindo:
    I - advertência;
    II - multa pecuniária;
    III - suspensão do exercício de cargos de administração;
    IV - inabilitação temporária para o exercício de cargos de administração;
    V - cancelamento da autorização de funcionamento.

    Parágrafo 1. As sanções serão aplicadas pelo Banco Central do Brasil, observados
    o contraditório e a ampla defesa.

    Parágrafo 2. A aplicação das sanções administrativas não prejudica a
    responsabilidade civil e criminal dos infratores.

    Parágrafo 3. As multas serão fixadas considerando a gravidade da infração,
    a vantagem auferida pelo infrator e os danos causados a terceiros.
guidance:
  prose: |
    O art. 26 estabelece o regime sancionatorio, criando incentivos para compliance.

    **Escala de sancoes (do menos ao mais grave):**
    1. Advertencia: infracoes leves, primeira ocorrencia
    2. Multa: valor proporcional a gravidade, vantagem auferida e dano
    3. Suspensao de cargo: administrador afastado temporariamente
    4. Inabilitacao: administrador proibido de exercer cargo por periodo
    5. Cancelamento: VASP perde autorizacao (sancao maxima)

    **Acumulacao de responsabilidades (par. 2):**
    Sancoes administrativas do BCB NAO excluem:
    - Responsabilidade civil: indenizacao a clientes prejudicados
    - Responsabilidade criminal: crimes financeiros, lavagem de dinheiro

    **Criterios de dosimetria (par. 3):**
    - Gravidade da infracao
    - Vantagem auferida pelo infrator
    - Danos causados a terceiros
    Semelhante aos criterios de dosimetria do sistema sancionatorio bancario.
implementation_guidance:
  platform_engineering:
    prose: |
      **Prevencao de sancoes:**
      1. Sistema de compliance monitoring em tempo real que detecta desvios
         antes que se tornem infracoes.
      2. Alertas automaticos para tendencias de descumprimento com escalacao
         ao diretor responsavel.
      3. Dashboard de risco regulatorio com heatmap por obrigacao.
      4. Sistema de evidencias que documenta conformidade continuamente
         (compliance-as-code) para defesa em caso de processo administrativo.
    tools:
      - compliance-monitoring
      - alerting-system
      - risk-dashboard
      - evidence-management
  devsecops:
    prose: |
      **Evidencias de conformidade:**
      1. Pipeline que gera evidencias automaticas de conformidade (logs de
         scan, resultados de testes, aprovacoes, deploys).
      2. Retencao de evidencias com timestamp e hash para integridade.
      3. Relatorios automaticos de conformidade por sprint/release.
      4. Audit trail imutavel de todas as acoes no pipeline.
    tools:
      - gitlab-ci
      - evidence-generation
      - audit-trail
      - compliance-reports
  secops:
    prose: |
      **Gestao de risco regulatorio:**
      1. Mapeamento de todas as obrigacoes regulatorias com status de conformidade.
      2. Plano de remediacao para qualquer deficiencia identificada.
      3. Assessoria juridica especializada em direito regulatorio financeiro.
      4. Simulacao de processo administrativo sancionador (preparacao para defesa).
      5. Relatorio trimestral de riscos regulatorios ao conselho/diretoria.
    tools:
      - grc-platform
      - legal-advisory
      - risk-assessment
      - regulatory-defense
