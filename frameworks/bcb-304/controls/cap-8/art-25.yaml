id: art-25
family: cap-8
title: "Prazos de Adequacao e Disposicoes Transitorias"
class: BCB-304
baselines: [vasps-autorizadas]
statement:
  prose: |
    Art. 25. As prestadoras de serviços de ativos virtuais que já estejam em
    operação na data de entrada em vigor desta Resolução devem:
    I - solicitar autorização ao Banco Central do Brasil no prazo de 180 dias
    contados da data de entrada em vigor;
    II - adequar-se integralmente às disposições desta Resolução no prazo de
    360 dias contados da data de entrada em vigor;
    III - apresentar plano de adequação ao Banco Central do Brasil, com cronograma
    detalhado de implementação das medidas necessárias;
    IV - manter os clientes informados sobre o processo de adequação regulatória.

    Parágrafo 1. As prestadoras que não solicitarem autorização no prazo previsto
    no inciso I devem cessar imediatamente a prestação de serviços de ativos virtuais.

    Parágrafo 2. O Banco Central do Brasil poderá conceder prazo adicional para
    adequação, mediante justificativa fundamentada da prestadora.
guidance:
  prose: |
    O art. 25 estabelece o regime transitorio para VASPs ja em operacao.

    **Cronograma de adequacao:**
    - Dia 0 (01/06/2024): entrada em vigor da Resolucao
    - 180 dias (dez/2024): prazo para solicitar autorizacao ao BCB
    - 360 dias (jun/2025): prazo para adequacao integral

    **Implicacoes praticas:**
    VASPs em operacao antes da regulamentacao tem dois caminhos:
    1. Solicitar autorizacao e se adequar nos prazos
    2. Encerrar operacoes e devolver ativos aos clientes

    **Prazo adicional:**
    O BCB pode conceder extensao de prazo, mas depende de justificativa
    fundamentada. Nao e automatico.

    **Risco de operacao irregular:**
    VASPs que nao solicitem autorizacao no prazo devem cessar IMEDIATAMENTE.
    Operar sem autorizacao apos o prazo configura infracao administrativa
    e potencialmente crime.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de adequacao regulatoria:**
      1. Plano de projeto (Gantt/Kanban) com todas as obrigacoes da Resolucao,
         responsaveis e prazos.
      2. Dashboard de progresso de adequacao com percentual de conclusao por
         capitulo da Resolucao.
      3. Pipeline de adequacao: cada requisito regulatorio vira uma feature
         com tracking em sistema de gerenciamento de projetos.
      4. Sistema de comunicacao ao cliente sobre processo de adequacao.
    tools:
      - project-management
      - compliance-dashboard
      - feature-tracking
      - client-communication
  devsecops:
    prose: |
      **Pipeline de adequacao:**
      1. Feature flags para habilitar gradualmente funcionalidades de compliance.
      2. Testes de conformidade como gates no pipeline (deploy bloqueado se
         controle regulatorio nao estiver implementado).
      3. Checklist automatizado de requisitos regulatorios por release.
      4. Metricas de conformidade como parte do pipeline de deploy.
    tools:
      - feature-flags
      - gitlab-ci
      - compliance-gates
      - regulatory-checklist
  secops:
    prose: |
      **Operacao da adequacao:**
      1. Relatorio quinzenal de progresso ao diretor responsavel.
      2. Comunicacao periodica ao BCB sobre andamento da adequacao.
      3. Plano de contingencia para cenario de nao adequacao no prazo.
      4. Procedimento de devolucao de ativos caso autorizacao nao seja obtida.
      5. Documentacao completa do processo de adequacao para auditoria.
    tools:
      - grc-platform
      - regulatory-reporting
      - contingency-planning
      - document-management
