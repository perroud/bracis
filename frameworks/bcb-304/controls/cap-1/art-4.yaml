id: art-4
family: cap-1
title: "Classificacao de Ativos Virtuais"
class: BCB-304
baselines: [vasps-autorizadas]
statement:
  prose: |
    Art. 4. As prestadoras de serviços de ativos virtuais devem manter processo de
    avaliação e classificação dos ativos virtuais que pretendam listar ou intermediar,
    considerando:
    I - a natureza do ativo virtual e sua funcionalidade;
    II - o emissor do ativo virtual e sua idoneidade;
    III - os riscos associados ao ativo virtual, incluindo riscos de mercado, de
    liquidez, operacionais e de lavagem de dinheiro;
    IV - a tecnologia subjacente ao ativo virtual, incluindo a segurança do protocolo;
    V - a existência de mecanismos de governança do protocolo ou rede;
    VI - a conformidade do ativo virtual com a legislação e regulamentação vigentes.
guidance:
  prose: |
    O art. 4 estabelece due diligence obrigatoria para listagem de ativos virtuais,
    criando uma responsabilidade de gatekeeper para as VASPs.

    **Avaliacao multidimensional:**
    A VASP deve avaliar cada ativo em seis dimensoes antes de listar:
    1. Natureza/funcionalidade: payment token, utility token, governance token
    2. Emissor: historico, reputacao, equipe, jurisdicao
    3. Riscos: mercado, liquidez, operacional, AML/CFT
    4. Tecnologia: seguranca do smart contract, auditoria, bugs conhecidos
    5. Governanca do protocolo: descentralizacao, mecanismo de consenso, upgrades
    6. Conformidade legal: enquadramento regulatorio, restricoes jurisdicionais

    **Implicacoes praticas:**
    A VASP assume responsabilidade solidaria pela qualidade dos ativos que lista.
    Tokens fraudulentos (rug pulls, ponzi schemes) listados sem due diligence
    adequada podem gerar responsabilidade administrativa e civil.
implementation_guidance:
  platform_engineering:
    prose: |
      **Pipeline de due diligence de ativos:**
      1. Workflow automatizado de avaliacao de ativos com checklist codificado
         cobrindo as seis dimensoes do art. 4.
      2. Integracao com servicos de analise on-chain (Chainalysis, Elliptic) para
         avaliacao de risco AML do token.
      3. Scanner automatizado de smart contracts (Slither, Mythril) para avaliacao
         de seguranca tecnica.
      4. Scoring model de risco de ativo com pesos configuraveis por dimensao.
      5. API de consulta de status de listagem e score de risco por ativo.
    tools:
      - listing-workflow
      - blockchain-analytics
      - smart-contract-scanner
      - risk-scoring-engine
  devsecops:
    prose: |
      **Validacao tecnica de ativos:**
      1. Pipeline de analise automatica de smart contracts antes da listagem.
      2. Testes de integracao com blockchain do ativo (compatibilidade, seguranca).
      3. Validacao automatica de metadados do token (supply, decimals, contract verified).
      4. Scan de vulnerabilidades conhecidas no protocolo do ativo.
    tools:
      - smart-contract-auditor
      - gitlab-ci
      - vulnerability-database
  secops:
    prose: |
      **Governanca de listagem:**
      1. Comite de listagem com representantes de compliance, risco, tecnologia e juridico.
      2. Processo formal de aprovacao/rejeicao com documentacao de justificativa.
      3. Revisao periodica de ativos ja listados (relisting review trimestral).
      4. Procedimento de delisting emergencial com criterios objetivos.
      5. Relatorio ao BCB sobre ativos listados e processo de due diligence.
    tools:
      - listing-committee-workflow
      - grc-platform
      - regulatory-reporting
