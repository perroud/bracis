id: art-1
family: cap-1
title: "Objeto e Escopo de Aplicacao"
class: BCB-304
baselines: [vasps-autorizadas]
statement:
  prose: |
    Art. 1. Esta Resolução dispõe sobre a autorização para funcionamento, a transferência
    de controle societário, a reorganização societária, o cancelamento da autorização
    e as condições para o exercício das atividades de prestação de serviços de ativos
    virtuais, nos termos da Lei n. 14.478, de 21 de dezembro de 2022.

    Parágrafo único. Para os fins desta Resolução, considera-se ativo virtual a
    representação digital de valor que pode ser negociada ou transferida por meios
    eletrônicos e utilizada para realização de pagamentos ou com propósito de investimento,
    excluídos os ativos regulados pela Comissão de Valores Mobiliários (CVM).
guidance:
  prose: |
    O art. 1 delimita o escopo regulatorio da Resolucao BCB 304, que regulamenta
    a Lei 14.478/2022 (Marco Legal dos Criptoativos no Brasil).

    **Conceito de ativo virtual:**
    A definicao segue a Lei 14.478/2022, alinhada ao conceito do GAFI/FATF de
    virtual asset: representacao digital de valor que pode ser transferida,
    negociada ou usada para pagamento/investimento.

    **Exclusoes importantes:**
    - Moedas fiduciarias digitais (CBDC/DREX)
    - Milhas aereas e programas de fidelidade
    - Valores mobiliarios tokenizados (regulados pela CVM)
    - Moeda eletronica nos termos da Lei 12.865/2013

    **Sobreposicao regulatoria:**
    Ativos com natureza hibrida (ex: tokens de securitizacao) podem estar sujeitos
    a regulacao cumulativa da CVM e do BCB. A classificacao do ativo determina
    qual regulador prevalece.
implementation_guidance:
  platform_engineering:
    prose: |
      **Classificacao automatica de ativos:**
      1. Implementar servico de classificacao que categoriza tokens em: utility token,
         payment token, security token, stablecoin, NFT.
      2. Manter registry de ativos suportados com metadados regulatorios (regulador
         primario, classificacao GAFI, status de listagem).
      3. API de consulta que retorna enquadramento regulatorio do ativo antes de
         qualquer operacao.
      4. Integrar com fontes de dados on-chain para monitorar mudancas de natureza
         do ativo (ex: token que migra de utility para security).
    tools:
      - asset-classification-engine
      - token-registry
      - blockchain-analytics
  devsecops:
    prose: |
      **Governanca de ativos listados:**
      1. Pipeline de listing/delisting com aprovacao multi-nivel (compliance + tech + legal).
      2. Testes automatizados que validam classificacao regulatoria antes de listar
         novo ativo na plataforma.
      3. Validacao automatica de smart contracts de tokens antes da listagem.
      4. Checklist codificado de due diligence regulatoria para cada ativo.
    tools:
      - gitlab-ci
      - smart-contract-scanner
      - compliance-pipeline
  secops:
    prose: |
      **Monitoramento regulatorio:**
      1. Acompanhar publicacoes do BCB e CVM sobre classificacao de ativos virtuais.
      2. Manter inventario atualizado de todos os ativos listados com classificacao
         regulatoria vigente.
      3. Procedimento de delisting emergencial caso ativo seja reclassificado como
         valor mobiliario pela CVM.
      4. Relatorio periodico de ativos listados vs. enquadramento regulatorio.
    tools:
      - grc-platform
      - regulatory-monitoring
      - asset-inventory
