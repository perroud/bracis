id: art-17
family: cap-5
title: "Monitoramento de Transacoes e Deteccao de Suspeitas"
class: BCB-304
baselines: [vasps-autorizadas]
statement:
  prose: |
    Art. 17. A prestadora de serviços de ativos virtuais deve manter procedimentos
    de monitoramento contínuo de transações que considerem, no mínimo:
    I - transações em valores ou frequências incompatíveis com o perfil do cliente;
    II - transações envolvendo endereços associados a atividades ilícitas, incluindo
    endereços sancionados, darknet markets, mixers e tumblers;
    III - transações com padrão de structuring (fracionamento para evitar limites);
    IV - transações envolvendo jurisdições de alto risco identificadas pelo GAFI/FATF;
    V - movimentações rápidas entre múltiplas carteiras sem propósito econômico
    aparente (layering);
    VI - conversão rápida entre ativos virtuais e moeda fiduciária (integration);
    VII - utilização de protocolos descentralizados (DeFi) para ofuscação da
    origem de recursos.
guidance:
  prose: |
    O art. 17 detalha os cenarios especificos de monitoramento para transacoes
    com ativos virtuais, adaptando tipologias classicas de lavagem ao contexto cripto.

    **Sete cenarios de monitoramento:**
    1. Incompatibilidade com perfil: cliente que transaciona volumes muito acima
       do seu perfil de renda declarada
    2. Enderecos ilicitos: carteiras em listas de sancoes (OFAC SDN), associadas
       a darknet, ransomware, mixers
    3. Structuring: fracionamento de operacoes grandes em menores para evitar
       thresholds de reporte
    4. Jurisdicoes de alto risco: paises da lista cinza/preta do GAFI
    5. Layering: movimentacao rapida entre multiplas carteiras sem proposito
       economico (hop chain)
    6. Integration: conversao rapida cripto->fiat (ultimo estagio da lavagem)
    7. DeFi ofuscation: uso de DEXs, bridges, pools para dificultar rastreamento

    **Desafio tecnico:**
    Monitoramento on-chain exige ferramentas especializadas de blockchain analytics.
    Monitoramento off-chain (interno a plataforma) usa transaction monitoring
    tradicional com regras adaptadas.
implementation_guidance:
  platform_engineering:
    prose: |
      **Transaction monitoring engine:**
      1. Regras de monitoramento codificadas cobrindo os sete cenarios do art. 17.
      2. Integracao com blockchain analytics (Chainalysis, Elliptic) para scoring
         de risco de enderecos e deteccao de mixers, darknet, sancoes.
      3. Screening em tempo real contra listas de sancoes (OFAC, EU, UN, FATF)
         para enderecos de carteira.
      4. Deteccao de structuring baseada em padroes temporais e de valores.
      5. Grafo de transacoes para visualizacao de layering e hop chains.
      6. Monitoramento de interacoes com protocolos DeFi (DEXs, bridges, mixers).
    tools:
      - transaction-monitoring
      - blockchain-analytics
      - sanctions-screening
      - graph-analytics
      - defi-monitoring
  devsecops:
    prose: |
      **Testes de monitoramento:**
      1. Testes automatizados com cenarios de lavagem sinteticos para cada um
         dos sete cenarios do art. 17.
      2. Backtesting de regras de monitoramento contra dados historicos.
      3. Validacao de integracao com blockchain analytics (parsing, scoring).
      4. Testes de performance do monitoring engine com volumes de pico.
      5. A/B testing de novas regras antes de ativar em producao.
    tools:
      - gitlab-ci
      - aml-testing
      - backtesting-framework
      - performance-testing
  secops:
    prose: |
      **Operacao de monitoramento:**
      1. Equipe de analistas AML com SLAs: L1 (triagem 24h), L2 (investigacao
         5 dias), L3 (casos complexos 15 dias).
      2. Processo de investigacao com acesso a blockchain forensics.
      3. Decisao de reporte ao COAF com documentacao de justificativa.
      4. Tuning continuo de regras para reduzir falsos positivos.
      5. Metricas de efetividade: taxa de deteccao, falsos positivos, tempo de
         resolucao, SARs gerados.
    tools:
      - case-management
      - blockchain-forensics
      - coaf-reporting
      - metrics-dashboard
