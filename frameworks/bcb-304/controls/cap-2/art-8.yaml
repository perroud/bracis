id: art-8
family: cap-2
title: "Cancelamento e Suspensao da Autorizacao"
class: BCB-304
baselines: [vasps-autorizadas]
statement:
  prose: |
    Art. 8. O Banco Central do Brasil poderá cancelar a autorização de funcionamento
    da prestadora de serviços de ativos virtuais quando:
    I - não iniciar suas atividades no prazo de 360 dias contados da data de
    publicação da autorização;
    II - ficar comprovada a obtenção da autorização por meio de informações falsas
    ou enganosas;
    III - deixar de atender às condições que fundamentaram a concessão da autorização;
    IV - sofrer processo de liquidação extrajudicial ou falência;
    V - solicitar o cancelamento.

    Parágrafo único. O BCB poderá suspender temporariamente as atividades da
    prestadora quando identificar risco relevante ao sistema financeiro ou aos
    clientes.
guidance:
  prose: |
    O art. 8 estabelece as hipoteses de cancelamento e suspensao da autorizacao,
    funcionando como mecanismo de enforcement do BCB.

    **Cinco hipoteses de cancelamento:**
    1. Inatividade: VASP que nao inicia operacoes em 360 dias
    2. Fraude na autorizacao: informacoes falsas no pedido
    3. Descumprimento: perda das condicoes que fundamentaram a autorizacao
    4. Insolvencia: liquidacao ou falencia
    5. Voluntario: pedido da propria VASP

    **Suspensao temporaria (paragrafo unico):**
    Medida cautelar que o BCB pode adotar preventivamente em caso de risco
    relevante. Diferente do cancelamento, e reversivel.

    **Implicacao critica:**
    A VASP deve manter TODAS as condicoes da autorizacao de forma permanente,
    nao apenas no momento do pedido. Monitoramento continuo e essencial.
implementation_guidance:
  platform_engineering:
    prose: |
      **Monitoramento de conformidade permanente:**
      1. Dashboard de status de todos os requisitos da autorizacao com
         indicadores verde/amarelo/vermelho.
      2. Alertas automaticos quando qualquer condicao de autorizacao esta
         em risco de descumprimento.
      3. Sistema de circuit breaker que pode suspender operacoes automaticamente
         em caso de risco critico.
      4. Plano de continuidade para protecao dos clientes em caso de
         cancelamento ou suspensao.
    tools:
      - compliance-dashboard
      - alerting-system
      - circuit-breaker
  devsecops:
    prose: |
      **Validacao continua de conformidade:**
      1. Health checks automatizados de todos os sistemas criticos.
      2. Testes de smoke que validam operacao dos servicos autorizados.
      3. Pipeline de verificacao periodica de requisitos regulatorios.
      4. Runbooks automatizados para cenarios de suspensao/cancelamento.
    tools:
      - gitlab-ci
      - health-checks
      - runbooks
  secops:
    prose: |
      **Preparacao para cenarios adversos:**
      1. Plano de contingencia para suspensao temporaria pelo BCB.
      2. Procedimento de devolucao de ativos aos clientes em caso de cancelamento.
      3. Comunicacao transparente aos clientes sobre status regulatorio.
      4. Retencao de registros por prazo minimo regulatorio apos encerramento.
    tools:
      - grc-platform
      - incident-response
      - customer-communication
legal_references:
