id: art-6
family: cap-2
title: "Capital Minimo e Patrimonio Liquido"
class: BCB-304
baselines: [vasps-autorizadas]
statement:
  prose: |
    Art. 6. As prestadoras de serviços de ativos virtuais devem manter, permanentemente,
    patrimônio líquido compatível com o volume, a natureza e a complexidade das
    operações realizadas.

    Parágrafo 1. O Banco Central do Brasil estabelecerá os valores mínimos de
    patrimônio líquido, considerando:
    I - os tipos de serviços de ativos virtuais prestados;
    II - o volume de operações;
    III - os riscos assumidos pela prestadora;
    IV - a custódia de ativos virtuais de terceiros.

    Parágrafo 2. A prestadora que realize custódia de ativos virtuais de terceiros
    deverá manter patrimônio líquido adicional proporcional ao volume de ativos
    custodiados.
guidance:
  prose: |
    O art. 6 estabelece requisitos prudenciais de capital para VASPs, similares
    aos aplicados a instituicoes financeiras tradicionais.

    **Principio de proporcionalidade:**
    O patrimonio liquido exigido e proporcional a:
    - Tipo de servico: custodia exige mais capital que simples intermediacao
    - Volume: maior volume = maior exigencia de capital
    - Risco: servicos de maior risco = mais capital
    - Custodia de terceiros: capital adicional proporcional ao AUC (assets under custody)

    **Analogia com capital regulatorio bancario:**
    Funciona de forma similar ao capital regulatorio de Basel III, mas adaptado
    ao contexto de ativos virtuais. O BCB podera definir ratios especificos.

    **Implicacao pratica:**
    VASPs devem manter monitoramento em tempo real do patrimonio liquido vs.
    exigencia minima. Queda abaixo do minimo pode resultar em restricao de
    atividades ou revogacao da autorizacao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Monitoramento de capital regulatorio:**
      1. Dashboard em tempo real de patrimonio liquido vs. exigencia minima.
      2. Calculo automatico de capital exigido com base no volume operacional
         e no AUC (assets under custody).
      3. Alertas automaticos quando patrimonio liquido se aproxima do minimo
         regulatorio (thresholds em 120%, 110%, 105%, 100%).
      4. API de consulta de posicao de capital para relatorios regulatorios.
    tools:
      - capital-monitoring
      - alerting-system
      - financial-reporting
  devsecops:
    prose: |
      **Validacao de calculos de capital:**
      1. Testes automatizados para logica de calculo de capital regulatorio.
      2. Testes de cenarios de estresse (stress testing) automatizados.
      3. Validacao de integridade dos dados financeiros usados no calculo.
      4. Reconciliacao automatica entre sistemas contabeis e regulatorios.
    tools:
      - gitlab-ci
      - financial-testing
      - data-reconciliation
  secops:
    prose: |
      **Governanca de capital:**
      1. Relatorio mensal de adequacao de capital ao conselho/diretoria.
      2. Plano de contingencia para cenarios de insuficiencia de capital.
      3. Comunicacao proativa ao BCB em caso de deterioracao do patrimonio.
      4. Auditoria externa anual da posicao de capital e calculos regulatorios.
    tools:
      - grc-platform
      - financial-reporting
      - external-audit
legal_references:
