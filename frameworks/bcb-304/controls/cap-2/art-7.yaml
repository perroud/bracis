id: art-7
family: cap-2
title: "Forma Societaria e Requisitos dos Controladores"
class: BCB-304
baselines: [vasps-autorizadas]
statement:
  prose: |
    Art. 7. A prestadora de serviços de ativos virtuais deve ser constituída sob a
    forma de sociedade anônima ou sociedade limitada, com sede e administração no País.

    Parágrafo 1. Os controladores, diretos e indiretos, da prestadora devem:
    I - possuir reputação ilibada;
    II - possuir capacidade econômico-financeira compatível com o empreendimento;
    III - não se encontrar impedidos por lei especial ou em virtude de condenação
    criminal ou por ato de improbidade administrativa.

    Parágrafo 2. A transferência de controle societário da prestadora depende de
    prévia aprovação do Banco Central do Brasil.
guidance:
  prose: |
    O art. 7 estabelece requisitos societarios e de idoneidade para VASPs.

    **Forma societaria:**
    Apenas S/A ou LTDA. Isso exclui cooperativas, associacoes, EIRELI, MEI.
    A exigencia de sede e administracao no Pais reforga a jurisdicao brasileira.

    **Fit and proper test:**
    Controladores passam por avaliacao de idoneidade (reputacao ilibada),
    capacidade financeira e ausencia de impedimentos legais. Similar ao processo
    de aprovacao de controladores de bancos.

    **Transferencia de controle:**
    Qualquer mudanca de controle requer aprovacao previa do BCB. Isso inclui
    aquisicoes, fusoes, incorporacoes e reorganizacoes societarias que alterem
    o controle efetivo.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de estrutura societaria:**
      1. Sistema de registro da estrutura societaria com rastreamento de
         controladores diretos e indiretos.
      2. Integracao com bases de dados publicas (Receita Federal, Justica)
         para verificacao continua de impedimentos dos controladores.
      3. Workflow automatizado de notificacao ao BCB em caso de alteracoes
         societarias relevantes.
      4. Auditoria de identidade (KYB - Know Your Business) para controladores.
    tools:
      - corporate-registry
      - kyb-verification
      - regulatory-notification
  devsecops:
    prose: |
      **Validacao de identidade corporativa:**
      1. Testes de integracao com APIs de consulta de CNPJ e quadro societario.
      2. Validacao automatica de CPF/CNPJ dos controladores contra listas
         restritivas.
      3. Pipeline de verificacao periodica de status dos controladores.
      4. Alertas automaticos em caso de alteracao no QSA da empresa.
    tools:
      - gitlab-ci
      - kyb-integration
      - watchlist-screening
  secops:
    prose: |
      **Monitoramento de controladores:**
      1. Verificacao semestral de idoneidade dos controladores.
      2. Monitoramento de processos judiciais e administrativos contra
         controladores e membros da diretoria.
      3. Procedimento de comunicacao ao BCB para qualquer alteracao no
         quadro de controle.
      4. Dossie de controladores atualizado para inspecoes do BCB.
    tools:
      - grc-platform
      - watchlist-monitoring
      - regulatory-reporting
