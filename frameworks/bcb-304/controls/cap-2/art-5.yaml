id: art-5
family: cap-2
title: "Autorizacao para Funcionamento"
class: BCB-304
baselines: [vasps-autorizadas]
statement:
  prose: |
    Art. 5. A prestadora de serviços de ativos virtuais deve obter autorização do
    Banco Central do Brasil para exercer suas atividades, devendo apresentar:
    I - ato constitutivo e alterações posteriores, devidamente registrados;
    II - prova de integralização do capital social mínimo;
    III - relação dos controladores diretos e indiretos, com indicação das
    respectivas participações;
    IV - indicação dos membros da diretoria e do conselho de administração, se houver;
    V - descrição detalhada dos serviços de ativos virtuais que pretende prestar;
    VI - descrição da infraestrutura tecnológica a ser utilizada;
    VII - política de segurança cibernética;
    VIII - política de prevenção à lavagem de dinheiro e ao financiamento do terrorismo.
guidance:
  prose: |
    O art. 5 estabelece os requisitos documentais para autorizacao de uma VASP junto
    ao BCB, que funciona como barreira de entrada regulatoria.

    **Exigencias principais:**
    O BCB avalia a VASP em quatro dimensoes:
    1. Societaria: constituicao valida, capital integralizado, estrutura de controle
    2. Governanca: diretoria qualificada, conselho (se aplicavel)
    3. Operacional: descricao dos servicos, infraestrutura tecnologica
    4. Compliance: politica de cybersecurity e PLD/FT prontas antes da autorizacao

    **Capital social minimo:**
    O BCB define valores minimos de capital social conforme o tipo e porte dos servicos.
    Valores tipicos variam de R$ 1 milhao para VASPs simples a valores significativamente
    maiores para custodiantes.

    **Ponto critico:**
    A infraestrutura tecnologica e as politicas de seguranca e PLD/FT devem estar
    PRONTAS antes da autorizacao, nao apenas planejadas. O BCB pode inspecionar.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura para autorizacao:**
      1. Documentacao tecnica da infraestrutura em formato auditavel (diagramas de
         arquitetura, topologia de rede, fluxos de dados).
      2. Ambiente de producao provisionado e testado antes do pedido de autorizacao.
      3. Infraestrutura como codigo (IaC) que permite demonstrar ao BCB a
         consistencia e reproducibilidade do ambiente.
      4. Monitoramento e observabilidade operacionais desde o dia zero.
    tools:
      - terraform
      - kubernetes
      - monitoring-stack
      - architecture-docs
  devsecops:
    prose: |
      **Pipeline de compliance pre-autorizacao:**
      1. Pipeline CI/CD funcional com todos os controles de seguranca habilitados.
      2. Scan de seguranca (SAST, DAST, SCA) configurado e funcionando.
      3. Testes automatizados com cobertura minima demonstravel.
      4. Processo de code review documentado e funcional.
    tools:
      - gitlab-ci
      - sast-scanner
      - dast-scanner
      - sca-scanner
  secops:
    prose: |
      **Documentacao regulatoria:**
      1. Politica de seguranca cibernetica documentada conforme BCB 85.
      2. Politica de PLD/FT documentada conforme BCB 3978.
      3. Plano de continuidade de negocios.
      4. Politica de privacidade conforme LGPD.
      5. Dossie completo para submissao ao BCB com todos os documentos exigidos.
    tools:
      - grc-platform
      - document-management
      - regulatory-submission
legal_references:
  - framework_id: bcb-85
    articles: ["art-3", "art-4"]
    relationship: complements
  - framework_id: bcb-3978
    articles: ["art-3"]
    relationship: implements
