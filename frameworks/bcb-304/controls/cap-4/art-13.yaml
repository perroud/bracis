id: art-13
family: cap-4
title: "Controles Internos e Auditoria"
class: BCB-304
baselines: [vasps-autorizadas]
statement:
  prose: |
    Art. 13. A prestadora de serviços de ativos virtuais deve implementar e manter
    sistema de controles internos efetivo e abrangente, incluindo:
    I - políticas e procedimentos documentados para todas as atividades relevantes;
    II - segregação de funções entre áreas de negócios, operações, compliance e
    gestão de riscos;
    III - mecanismos de detecção e correção de deficiências nos controles internos;
    IV - auditoria interna independente, proporcional à natureza e complexidade das
    atividades;
    V - canais de comunicação de irregularidades (ouvidoria e canal de denúncias);
    VI - testes periódicos de efetividade dos controles internos.

    Parágrafo único. Os resultados da auditoria interna e dos testes de controles
    devem ser reportados ao diretor responsável perante o Banco Central do Brasil.
guidance:
  prose: |
    O art. 13 exige um sistema robusto de controles internos, alinhado com
    frameworks de controles como COSO e tres linhas de defesa.

    **Seis componentes obrigatorios:**
    1. Politicas documentadas: nao basta praticar, tem que documentar
    2. Segregacao de funcoes: quem negocia nao pode aprovar, quem opera nao
       pode auditar
    3. Deteccao de deficiencias: monitoramento continuo da efetividade dos controles
    4. Auditoria interna: funcao independente que avalia controles
    5. Canais de comunicacao: ouvidoria e whistleblower
    6. Testes periodicos: validacao recorrente de que controles funcionam

    **Tres linhas de defesa aplicadas:**
    1a linha: areas de negocios e operacoes (executam controles)
    2a linha: compliance e gestao de riscos (monitoram e orientam)
    3a linha: auditoria interna (avalia independentemente)
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de controles internos:**
      1. Segregacao de funcoes implementada via RBAC granular com prevencao
         de conflitos (ex: mesmo usuario nao pode ter roles de trader e approver).
      2. Audit trail imutavel para todas as operacoes criticas (append-only log,
         idealmente com hash chain ou ancoragem em blockchain).
      3. Sistema de tickets para rastreamento de deficiencias identificadas
         ate a resolucao.
      4. Canal de denuncias anonimo implementado com criptografia e2e.
      5. Framework de testes de controles automatizados (compliance-as-code).
    tools:
      - rbac-system
      - audit-trail
      - ticketing-system
      - whistleblower-platform
      - compliance-as-code
  devsecops:
    prose: |
      **Controles internos no ciclo de desenvolvimento:**
      1. Segregacao de duties no pipeline: developer != reviewer != deployer.
      2. Branch protection com approval rules que refletem segregacao de funcoes.
      3. Testes automatizados de controles internos como parte do pipeline CI/CD.
      4. Scan de acessos que detecta acumulacao indevida de privilegios.
      5. Audit log de pipeline com retencao minima de 5 anos.
    tools:
      - gitlab-ci
      - branch-protection
      - access-scanner
      - audit-log
  secops:
    prose: |
      **Operacao de controles internos:**
      1. Ciclo anual de auditoria interna com plano aprovado pelo diretor BCB.
      2. Testes trimestrais de efetividade dos controles mais criticos.
      3. Revisao semestral das politicas e procedimentos documentados.
      4. Monitoramento do canal de denuncias com SLA de resposta.
      5. Relatorio de controles internos ao diretor responsavel (mensal).
    tools:
      - grc-platform
      - audit-management
      - policy-management
      - reporting-dashboard
