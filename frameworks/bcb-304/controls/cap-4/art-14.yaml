id: art-14
family: cap-4
title: "Gestao de Riscos"
class: BCB-304
baselines: [vasps-autorizadas]
statement:
  prose: |
    Art. 14. A prestadora de serviços de ativos virtuais deve implementar e manter
    estrutura de gestão de riscos que contemple, no mínimo:
    I - risco operacional, incluindo riscos de falhas de sistemas, processos e
    pessoas, e riscos de eventos externos;
    II - risco de mercado, incluindo a exposição à variação de preços de ativos virtuais;
    III - risco de liquidez, incluindo a capacidade de honrar obrigações com clientes;
    IV - risco cibernético, incluindo ameaças à confidencialidade, integridade e
    disponibilidade de sistemas e dados;
    V - risco de lavagem de dinheiro e financiamento do terrorismo;
    VI - risco de contágio, incluindo riscos decorrentes da interconexão com outros
    participantes do ecossistema de ativos virtuais.

    Parágrafo único. A avaliação de riscos deve ser documentada, revisada
    periodicamente e submetida ao diretor responsável.
guidance:
  prose: |
    O art. 14 exige gestao de riscos abrangente cobrindo seis categorias
    especificas do ecossistema cripto.

    **Seis categorias de risco:**
    1. Operacional: falhas de sistemas, processos, pessoas, eventos externos
    2. Mercado: volatilidade de precos de criptoativos (pode ser extrema)
    3. Liquidez: capacidade de honrar saques e obrigacoes com clientes
    4. Cibernetico: ameacas a sistemas de custodia, chaves, dados
    5. PLD/FT: risco de uso da plataforma para lavagem de dinheiro
    6. Contagio: risco sistemico do ecossistema cripto (ex: Terra/Luna, FTX)

    **Risco de contagio (inciso VI):**
    Especifico do ecossistema cripto. Colapso de um participante pode afetar
    outros via: exposicao direta (ativos custodiados), efeito domino (perda
    de confianca), liquidez (corrida para saques), protocolos DeFi interligados.
implementation_guidance:
  platform_engineering:
    prose: |
      **Framework de gestao de riscos:**
      1. Risk engine que calcula exposicao em tempo real para cada categoria
         de risco (operacional, mercado, liquidez, cibernetico, PLD/FT, contagio).
      2. Dashboard de riscos com heatmap por categoria e por ativo.
      3. Stress testing automatizado com cenarios historicos (crash de 2022,
         colapso Terra/Luna, hack de bridge) e hipoteticos.
      4. Monitoramento de exposicao a counterparties e protocolos DeFi
         para risco de contagio.
      5. Circuit breakers automaticos quando limites de risco sao excedidos.
    tools:
      - risk-engine
      - stress-testing
      - market-data-feeds
      - circuit-breaker
      - counterparty-monitoring
  devsecops:
    prose: |
      **Risco cibernetico no pipeline:**
      1. Threat modeling obrigatorio para novos servicos e funcionalidades.
      2. Security testing automatizado (SAST, DAST, SCA) em todo pipeline.
      3. Pen testing periodico focado em fluxos de custodia e assinatura.
      4. Vulnerability management com SLAs de correcao por severidade.
      5. Dependabot/Renovate para atualizacao continua de dependencias.
    tools:
      - gitlab-ci
      - threat-modeling
      - sast-scanner
      - dast-scanner
      - dependency-management
  secops:
    prose: |
      **Operacao de gestao de riscos:**
      1. Comite de riscos com reunioes mensais e relatorio ao diretor BCB.
      2. Atualizacao trimestral da matriz de riscos.
      3. Monitoramento diario de exposicao de mercado e liquidez.
      4. Monitoramento continuo de ameacas ciberneticas (threat intelligence).
      5. Analise de contagio apos eventos relevantes no ecossistema cripto.
      6. Relatorio semestral de gestao de riscos ao conselho/diretoria.
    tools:
      - grc-platform
      - threat-intelligence
      - risk-dashboard
      - market-monitoring
