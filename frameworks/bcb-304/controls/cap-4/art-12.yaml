id: art-12
family: cap-4
title: "Estrutura de Governanca e Diretoria Responsavel"
class: BCB-304
baselines: [vasps-autorizadas]
statement:
  prose: |
    Art. 12. A prestadora de serviços de ativos virtuais deve manter estrutura de
    governança compatível com a natureza, o porte e a complexidade dos serviços
    prestados, incluindo:
    I - diretor responsável perante o Banco Central do Brasil pelo cumprimento das
    obrigações previstas nesta Resolução;
    II - diretor responsável pela política de prevenção à lavagem de dinheiro e ao
    financiamento do terrorismo;
    III - área de compliance ou profissional de compliance responsável pela verificação
    do cumprimento das obrigações regulatórias;
    IV - área de gestão de riscos ou profissional responsável pela identificação,
    avaliação e mitigação de riscos operacionais, de mercado, de liquidez e cibernéticos.

    Parágrafo único. As funções de que tratam os incisos I e II podem ser exercidas
    pelo mesmo diretor, desde que compatível com a complexidade dos serviços prestados.
guidance:
  prose: |
    O art. 12 estabelece a estrutura minima de governanca para VASPs.

    **Quatro funcoes obrigatorias:**
    1. Diretor responsavel perante o BCB: ponto focal regulatorio, responsavel
       final por todas as obrigacoes da Resolucao
    2. Diretor de PLD/FT: responsavel especifico pela politica anti-lavagem
    3. Compliance: verificacao continua de cumprimento regulatorio
    4. Gestao de riscos: identificacao e mitigacao de riscos operacionais,
       de mercado, liquidez e ciberneticos

    **Proporcionalidade:**
    Em VASPs menores, diretor BCB e diretor PLD/FT podem ser a mesma pessoa.
    Compliance e gestao de riscos podem ser profissionais individuais em vez
    de areas inteiras.

    **Responsabilidade pessoal:**
    Os diretores designados assumem responsabilidade pessoal perante o BCB,
    podendo ser sancionados individualmente em caso de descumprimento.
implementation_guidance:
  platform_engineering:
    prose: |
      **Suporte tecnologico a governanca:**
      1. RBAC (Role-Based Access Control) que reflete a estrutura de governanca:
         roles especificos para diretor BCB, diretor PLD/FT, compliance officer,
         gestor de riscos.
      2. Dashboard executivo com visao consolidada de conformidade regulatoria
         para cada papel de governanca.
      3. Workflow de aprovacao hierarquico que segue a estrutura de governanca
         (operador -> compliance -> diretor).
      4. Sistema de delegacao formal com registro de responsabilidades.
    tools:
      - rbac-system
      - governance-dashboard
      - approval-workflow
      - delegation-registry
  devsecops:
    prose: |
      **Governanca no pipeline:**
      1. Code owners configurados refletindo a estrutura de governanca
         (compliance officer como reviewer obrigatorio para modulos regulatorios).
      2. Aprovacao multi-nivel no pipeline para deploys em producao.
      3. Segregacao de duties no pipeline: quem desenvolve nao aprova, quem
         aprova nao faz deploy.
      4. Audit log de todas as aprovacoes e decisoes no pipeline.
    tools:
      - gitlab-ci
      - codeowners
      - approval-rules
      - audit-log
  secops:
    prose: |
      **Operacionalizacao da governanca:**
      1. Reunioes periodicas do comite de compliance com ata formal.
      2. Relatorio mensal de riscos ao diretor responsavel.
      3. Canal de escalacao claro para incidentes regulatorios.
      4. Treinamento anual obrigatorio para diretores sobre obrigacoes regulatorias.
      5. Avaliacao anual de efetividade da estrutura de governanca.
    tools:
      - grc-platform
      - committee-management
      - training-platform
      - risk-reporting
