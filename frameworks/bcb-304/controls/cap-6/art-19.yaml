id: art-19
family: cap-6
title: "Politica de Seguranca Cibernetica"
class: BCB-304
baselines: [vasps-autorizadas]
statement:
  prose: |
    Art. 19. A prestadora de serviços de ativos virtuais deve implementar e manter
    política de segurança cibernética compatível com a natureza, o porte e a
    complexidade dos serviços prestados, incluindo:
    I - controles de acesso lógico e físico aos sistemas e ambientes de custódia;
    II - criptografia de dados em repouso e em trânsito;
    III - monitoramento contínuo de ameaças e vulnerabilidades;
    IV - plano de resposta a incidentes cibernéticos, incluindo procedimentos de
    comunicação ao Banco Central do Brasil;
    V - testes periódicos de segurança, incluindo testes de invasão (penetration
    testing) e avaliação de vulnerabilidades;
    VI - gestão de patches e atualizações de segurança;
    VII - proteção contra ataques de negação de serviço (DDoS), phishing e
    engenharia social;
    VIII - segurança de APIs e integrações com terceiros.
guidance:
  prose: |
    O art. 19 exige politica de seguranca cibernetica abrangente, alinhada com
    a Resolucao BCB 85 e adaptada ao contexto de ativos virtuais.

    **Oito areas de controle:**
    1. Acesso logico e fisico: controles de quem acessa sistemas e ambientes
       onde chaves privadas sao geradas/armazenadas
    2. Criptografia: dados em repouso (AES-256) e em transito (TLS 1.3)
    3. Threat monitoring: SOC, SIEM, threat intelligence
    4. Incident response: plano formal, comunicacao ao BCB
    5. Pen testing: testes ofensivos periodicos
    6. Patch management: atualizacao continua de sistemas
    7. Anti-DDoS/phishing: protecao contra ataques mais comuns ao setor
    8. API security: protecao de integracoes (critico em exchanges)

    **Especificidades cripto:**
    - Ambientes de custodia (HSM, cold storage) exigem controles fisicos rigorosos
    - APIs de exchange sao alvo frequente de ataques
    - Phishing e engenharia social sao vetores principais de hack em cripto
implementation_guidance:
  platform_engineering:
    prose: |
      **Stack de seguranca cibernetica:**
      1. WAF (Web Application Firewall) e anti-DDoS na borda (Cloudflare, AWS Shield).
      2. SIEM com correlacao de eventos e deteccao de ameacas em tempo real.
      3. Vault para gestao de segredos (HashiCorp Vault, AWS KMS) com rotacao
         automatica de credenciais.
      4. mTLS para comunicacao entre microsservicos.
      5. API gateway com rate limiting, autenticacao e validacao de schema.
      6. Network segmentation isolando ambientes de custodia.
      7. EDR (Endpoint Detection and Response) em todos os endpoints.
    tools:
      - waf
      - siem
      - vault
      - api-gateway
      - network-segmentation
      - edr
  devsecops:
    prose: |
      **Seguranca no pipeline:**
      1. SAST, DAST, SCA em todo pipeline CI/CD.
      2. Container scanning para imagens Docker.
      3. Secret detection para evitar vazamento de chaves e credenciais.
      4. Dependency scanning com bloqueio de dependencias vulneraveis.
      5. Infrastructure as Code scanning (Checkov, tfsec).
      6. Pen testing automatizado em staging antes de deploy para producao.
    tools:
      - gitlab-ci
      - sast-scanner
      - dast-scanner
      - container-scanner
      - secret-detection
      - iac-scanner
  secops:
    prose: |
      **Operacao de seguranca:**
      1. SOC 24/7 ou MSSP com monitoramento continuo de ameacas.
      2. Pen testing externo anual por firma especializada em cripto.
      3. Vulnerability management com SLAs: critico (24h), alto (7 dias),
         medio (30 dias), baixo (90 dias).
      4. Simulacoes de phishing periodicas para colaboradores.
      5. Plano de resposta a incidentes testado semestralmente (tabletop exercise).
      6. Comunicacao ao BCB em ate 24h apos incidente relevante.
    tools:
      - soc
      - pen-testing-firm
      - vulnerability-management
      - phishing-simulation
      - incident-response
