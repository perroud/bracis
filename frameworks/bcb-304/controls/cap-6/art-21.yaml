id: art-21
family: cap-6
title: "Continuidade de Negocios e Recuperacao de Desastres"
class: BCB-304
baselines: [vasps-autorizadas]
statement:
  prose: |
    Art. 21. A prestadora de serviços de ativos virtuais deve manter plano de
    continuidade de negócios e de recuperação de desastres que assegure:
    I - a disponibilidade dos serviços e o acesso dos clientes a seus ativos
    virtuais em situações de contingência;
    II - a recuperação de chaves criptográficas e dados críticos em caso de
    perda ou destruição dos sistemas primários;
    III - procedimentos de comunicação aos clientes e ao Banco Central do Brasil
    em caso de interrupção relevante dos serviços;
    IV - testes periódicos do plano de continuidade, incluindo simulações de
    cenários de perda de acesso a chaves criptográficas;
    V - tempo máximo de recuperação (RTO) e ponto máximo de perda de dados (RPO)
    definidos e monitorados para cada serviço crítico.

    Parágrafo único. O plano de continuidade deve considerar cenários específicos
    do ecossistema de ativos virtuais, incluindo hard forks, ataques de 51%,
    congelamento de protocolos e falha de redes blockchain.
guidance:
  prose: |
    O art. 21 exige planos de continuidade e DR adaptados ao contexto cripto.

    **Cinco requisitos:**
    1. Disponibilidade: clientes devem acessar seus ativos mesmo em contingencia
    2. Recuperacao de chaves: backup de chaves deve funcionar em cenario de DR
    3. Comunicacao: BCB e clientes devem ser notificados de interrupcoes
    4. Testes periodicos: simulacoes incluindo perda de chaves
    5. RTO/RPO definidos: metricas claras de tempo e perda de dados aceitaveis

    **Cenarios especificos cripto (paragrafo unico):**
    - Hard fork: rede se divide, VASP deve decidir qual chain seguir
    - Ataque de 51%: possibilidade de double-spending, VASP deve pausar operacoes
    - Congelamento de protocolo: smart contract pausado, ativos inacessiveis
    - Falha de rede blockchain: rede fora do ar (ex: Solana outages)
    Esses cenarios nao existem em financas tradicionais e exigem runbooks especificos.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de continuidade:**
      1. Arquitetura multi-region com failover automatico para servicos criticos.
      2. Backup de chaves criptograficas em 3+ locais geograficos distintos
         com procedimento de recuperacao testado.
      3. Sistema de monitoramento de saude das redes blockchain suportadas
         (block time, hash rate, fork detection).
      4. Runbooks automatizados para cenarios de hard fork, ataque de 51%,
         congelamento de protocolo.
      5. RTO/RPO definidos: trading (RTO 1h, RPO 0), custodia (RTO 4h, RPO 0),
         dados (RPO 15min, retencao 5 anos).
    tools:
      - multi-region-infra
      - backup-system
      - blockchain-health-monitor
      - runbooks
      - disaster-recovery
  devsecops:
    prose: |
      **DR no pipeline:**
      1. Testes de failover automatizados em pipeline (chaos engineering).
      2. Testes de recuperacao de backup de chaves em ambiente isolado.
      3. Testes de cenarios de hard fork com testnet.
      4. Validacao de RPO/RTO com metricas automatizadas.
      5. Runbooks versionados e testados como parte do pipeline.
    tools:
      - chaos-engineering
      - gitlab-ci
      - backup-testing
      - rto-rpo-monitoring
  secops:
    prose: |
      **Operacao de continuidade:**
      1. Teste semestral do plano de continuidade (tabletop + tecnico).
      2. Simulacao anual de recuperacao completa de chaves (key recovery drill).
      3. Monitoramento 24/7 de disponibilidade de servicos e redes blockchain.
      4. Procedimento de comunicacao ao BCB (ate 24h apos interrupcao relevante).
      5. Procedimento de comunicacao aos clientes via multiplos canais.
      6. Revisao anual do plano de continuidade com atualizacao de cenarios.
    tools:
      - dr-testing
      - monitoring-stack
      - communication-system
      - grc-platform
