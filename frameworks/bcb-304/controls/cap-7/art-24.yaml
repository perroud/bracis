id: art-24
family: cap-7
title: "Relatorios e Prestacao de Informacoes ao BCB"
class: BCB-304
baselines: [vasps-autorizadas]
statement:
  prose: |
    Art. 24. A prestadora de serviços de ativos virtuais deve prestar ao Banco
    Central do Brasil as informações e os relatórios periódicos que forem requeridos,
    incluindo:
    I - relatório semestral de atividades com volume de operações, número de clientes,
    ativos custodiados e demonstrações financeiras;
    II - relatório de custódia com prova de reservas (proof of reserves) e
    reconciliação de ativos;
    III - relatório de conformidade com as obrigações regulatórias;
    IV - comunicação imediata de fatos relevantes que possam afetar a continuidade
    dos serviços, a segurança dos ativos custodiados ou a higidez financeira
    da prestadora;
    V - informações adicionais que o Banco Central do Brasil solicitar no exercício
    de suas atribuições de supervisão.

    Parágrafo único. As informações devem ser prestadas em formato e prazo definidos
    pelo Banco Central do Brasil.
guidance:
  prose: |
    O art. 24 estabelece obrigacoes de reporting ao BCB, fundamentais para
    supervisao regulatoria.

    **Cinco categorias de relatorio:**
    1. Relatorio de atividades (semestral): metricas operacionais, financeiros
    2. Proof of reserves: comprovacao de que ativos custodiados existem e
       correspondem ao registrado (resposta regulatoria ao caso FTX)
    3. Relatorio de conformidade: status de aderencia as obrigacoes
    4. Fatos relevantes: comunicacao imediata de eventos criticos
    5. Informacoes ad hoc: qualquer dado solicitado pelo BCB

    **Proof of reserves (inciso II):**
    Mecanismo para provar que a VASP realmente possui os ativos que diz custodiar.
    Pode ser implementado via Merkle tree (como Binance faz publicamente) ou
    via auditoria externa com verificacao on-chain.

    **Fatos relevantes (inciso IV):**
    Exemplos: hack de carteira, perda de chaves, problemas de liquidez,
    saida de diretor responsavel, acao judicial relevante.
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de reporting regulatorio:**
      1. Pipeline automatizado de geracao de relatorios: coleta de dados,
         processamento, validacao, formatacao, submissao.
      2. Proof of reserves automatizado: geracao periodica de Merkle tree
         de saldos de clientes, verificacao on-chain, relatorio.
      3. Dashboard de conformidade com status em tempo real de cada obrigacao
         regulatoria.
      4. Sistema de comunicacao de fatos relevantes com workflow de aprovacao
         e submissao ao BCB.
      5. API de exportacao de dados no formato exigido pelo BCB.
    tools:
      - regulatory-reporting
      - proof-of-reserves
      - compliance-dashboard
      - fact-disclosure-workflow
      - data-export-api
  devsecops:
    prose: |
      **Validacao de relatorios:**
      1. Testes automatizados de geracao de relatorios (formato, completude).
      2. Testes de proof of reserves (Merkle tree, verificacao on-chain).
      3. Testes de consistencia entre dados operacionais e relatorios.
      4. Pipeline de validacao de dados antes da submissao ao BCB.
    tools:
      - gitlab-ci
      - report-validation
      - merkle-tree-tests
      - data-consistency
  secops:
    prose: |
      **Operacao de reporting:**
      1. Calendario regulatorio com prazos de submissao de relatorios.
      2. Processo de revisao de relatorios pelo compliance officer antes da
         submissao.
      3. Procedimento de comunicacao imediata de fatos relevantes (SLA 24h).
      4. Retencao de relatorios submetidos por prazo minimo de 10 anos.
      5. Preparacao para inspecoes do BCB com dossie regulatorio atualizado.
    tools:
      - regulatory-calendar
      - grc-platform
      - document-management
      - inspection-readiness
