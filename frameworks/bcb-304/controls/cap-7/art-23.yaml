id: art-23
family: cap-7
title: "Conflitos de Interesse e Operacoes Proprias"
class: BCB-304
baselines: [vasps-autorizadas]
statement:
  prose: |
    Art. 23. A prestadora de serviços de ativos virtuais deve implementar e manter
    política de gestão de conflitos de interesse que contemple, no mínimo:
    I - identificação de situações que possam gerar conflitos de interesse entre a
    prestadora, seus controladores, administradores, colaboradores e clientes;
    II - medidas para prevenir, gerenciar e mitigar conflitos de interesse
    identificados;
    III - divulgação aos clientes de potenciais conflitos de interesse relevantes;
    IV - vedação de utilização de informações privilegiadas sobre operações de
    clientes para benefício próprio (insider trading);
    V - regras para operações próprias da prestadora (proprietary trading),
    incluindo limites e segregação de atividades.

    Parágrafo único. A política de conflitos de interesse deve ser disponibilizada
    aos clientes em linguagem clara e acessível.
guidance:
  prose: |
    O art. 23 aborda conflitos de interesse endemicos em exchanges de cripto.

    **Conflitos tipicos em VASPs:**
    1. Exchange que tambem faz market making (atua como contraparte dos clientes)
    2. Exchange que lista tokens de projetos nos quais tem participacao
    3. Funcionarios que operam na propria plataforma com informacao privilegiada
    4. VASP que oferece staking/lending com recursos de clientes
    5. VASP que emite token proprio e o lista na propria plataforma

    **Cinco controles obrigatorios:**
    1. Identificacao: mapear todas as situacoes de conflito
    2. Prevencao/mitigacao: controles para cada conflito identificado
    3. Divulgacao: transparencia sobre conflitos ao cliente
    4. Vedacao de insider trading: proibicao de uso de informacao privilegiada
    5. Regras para prop trading: limites e segregacao

    **Licoes do mercado:**
    A Binance, FTX e outras exchanges foram criticadas por conflitos de interesse
    nao gerenciados. Este artigo visa prevenir esses cenarios.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de conflitos de interesse:**
      1. Chinese wall tecnico: sistemas segregados para operacoes de clientes
         vs. operacoes proprias (prop trading desk).
      2. Sistema de pre-approval para operacoes de insiders (colaboradores,
         diretores, controladores) com periodo de blackout.
      3. Trade surveillance que cruza operacoes de insiders com operacoes
         de clientes para detectar front-running.
      4. Disclosure automatico na plataforma quando VASP atua como
         contraparte (market maker) em operacao.
      5. Registro de conflitos identificados com medidas de mitigacao.
    tools:
      - chinese-wall
      - pre-approval-system
      - trade-surveillance
      - disclosure-engine
      - conflict-registry
  devsecops:
    prose: |
      **Validacao de controles de conflito:**
      1. Testes de segregacao: operacoes proprias nao acessam dados de ordens
         de clientes e vice-versa.
      2. Testes de pre-approval: operacoes de insiders sem aprovacao sao bloqueadas.
      3. Testes de disclosure: divulgacao de conflitos aparece corretamente.
      4. Code review focado em acessos cruzados entre sistemas.
    tools:
      - gitlab-ci
      - access-testing
      - disclosure-testing
      - code-review
  secops:
    prose: |
      **Operacao de conflitos de interesse:**
      1. Revisao anual do mapeamento de conflitos de interesse.
      2. Monitoramento continuo de operacoes de insiders.
      3. Treinamento anual sobre politica de conflitos de interesse.
      4. Canal de denuncia para reportar violacoes.
      5. Relatorio trimestral ao compliance officer sobre conflitos gerenciados.
    tools:
      - conflict-management
      - trade-surveillance
      - training-platform
      - whistleblower-channel
