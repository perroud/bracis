id: art-22
family: cap-7
title: "Transparencia e Informacoes ao Cliente"
class: BCB-304
baselines: [vasps-autorizadas]
statement:
  prose: |
    Art. 22. A prestadora de serviços de ativos virtuais deve fornecer aos clientes,
    de forma clara, objetiva e acessível, antes da contratação dos serviços:
    I - descrição dos serviços oferecidos e suas características;
    II - riscos associados a operações com ativos virtuais, incluindo risco de perda
    total do valor investido, volatilidade e riscos tecnológicos;
    III - informações sobre taxas, tarifas e custos de todas as operações;
    IV - política de custódia, incluindo forma de armazenamento de ativos virtuais,
    responsabilidades e procedimentos em caso de indisponibilidade;
    V - mecanismos de resolução de conflitos e reclamações;
    VI - informações sobre a existência ou ausência de mecanismos de proteção de
    depósitos ou seguros para ativos virtuais;
    VII - termos e condições de uso da plataforma, incluindo hipóteses de suspensão
    ou encerramento de conta.
guidance:
  prose: |
    O art. 22 estabelece obrigacoes de transparencia pre-contratual, protegendo
    o investidor cripto de assimetria de informacao.

    **Sete categorias de informacao obrigatoria:**
    1. Servicos: descricao clara do que a VASP oferece
    2. Riscos: alerta explicito de perda total, volatilidade, riscos tech
    3. Custos: tabela completa de taxas e tarifas
    4. Custodia: como os ativos sao armazenados e protegidos
    5. Disputas: como resolver problemas (ouvidoria, arbitragem)
    6. Protecao: informar CLARAMENTE se existe ou NAO seguro de depositos
       (diferente de bancos com FGC, cripto tipicamente NAO tem garantia)
    7. T&C: termos de uso incluindo suspensao e encerramento

    **Ponto critico (inciso VI):**
    A VASP deve informar EXPLICITAMENTE que ativos virtuais NAO sao cobertos
    pelo FGC (Fundo Garantidor de Creditos) e que pode haver perda total.
    Isso e crucial para protecao do investidor de varejo.
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de transparencia:**
      1. Pagina de termos e condicoes versionada com historico de alteracoes
         acessivel ao cliente.
      2. Tabela de taxas dinamica (API) que reflete custos reais de cada operacao
         antes da confirmacao.
      3. Risk disclosure interativo durante onboarding com questionario de
         suitability (adequacao ao perfil do investidor).
      4. Dashboard do cliente com visao clara de custos totais pagos,
         performance e riscos.
      5. Centro de informacoes sobre custodia: onde estao os ativos, como sao
         protegidos, processo de saque.
    tools:
      - cms-versioned
      - fee-engine
      - suitability-quiz
      - client-dashboard
      - custody-info-center
  devsecops:
    prose: |
      **Validacao de transparencia:**
      1. Testes automatizados que verificam presenca de todos os disclaimers
         obrigatorios nas telas de onboarding e trading.
      2. Testes de acessibilidade (WCAG) para garantir informacoes acessiveis.
      3. Testes de consistencia entre tabela de taxas exibida e taxas cobradas.
      4. Validacao de que risk disclosure e exibido antes de primeira operacao.
    tools:
      - gitlab-ci
      - accessibility-testing
      - fee-consistency-tests
      - ui-testing
  secops:
    prose: |
      **Governanca de transparencia:**
      1. Revisao juridica anual de termos e condicoes.
      2. Monitoramento de reclamacoes relacionadas a transparencia e taxas.
      3. Auditoria de que informacoes exibidas correspondem a realidade.
      4. Procedimento de notificacao ao cliente em caso de alteracao de termos
         (prazo minimo de 30 dias de antecedencia).
      5. Relatorio de ouvidoria com analise de reclamacoes.
    tools:
      - legal-review
      - complaint-management
      - ouvidoria
      - notification-system
