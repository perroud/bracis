control_families:
  - id: bloq-cautelar
    title: "Cascading Precautionary Block"
    description: "Precautionary blocking of funds in cascade across multiple accounts (mule accounts), traceability of values through the payment chain, and time limits for cascade blocking."
    articles: "art. 1 ao art. 5"
    control_count: 3
  - id: antifraude-med
    title: "MED 2.0 Anti-Fraud Procedures"
    description: "Enhanced anti-fraud procedures required by MED 2.0, including well-founded suspicion criteria, fraud scoring models, and real-time transaction monitoring for Pix."
    articles: "art. 6 ao art. 10"
    control_count: 3
  - id: notificacao
    title: "Notification and Deadlines"
    description: "Notification procedures between PSPs, communication to account holders, regulatory deadlines for blocking, analysis, and return of funds under MED 2.0."
    articles: "art. 11 ao art. 15"
    control_count: 3
  - id: responsabilidade
    title: "PSP Responsibilities"
    description: "Shared responsibility between payer and receiver PSPs, obligations for due diligence, account monitoring, and accountability for failure to comply with MED 2.0 procedures."
    articles: "art. 16 ao art. 20"
    control_count: 3
  - id: ressarcimento
    title: "Reimbursement and Return of Funds"
    description: "Procedures for returning funds to defrauded users, partial and total reimbursement, settlement between PSPs, and user dispute resolution under MED 2.0."
    articles: "art. 21 ao art. 25"
    control_count: 3
related_frameworks:
  - framework_id: pix-security
    relationship: extends
    description: "A Resolução BCB 403/2024 estende o MED original previsto na Resolução BCB 1/2020, ampliando o escopo para bloqueio em cascata e contas intermediárias."
  - framework_id: bcb-85
    relationship: complements
    description: "A Resolução BCB 85 complementa o MED 2.0 ao estabelecer a política de segurança cibernética que sustenta os controles antifraude dos PSPs participantes do Pix."
  - framework_id: lgpd
    relationship: complements
    description: "A LGPD complementa o MED 2.0 na proteção de dados pessoais envolvidos nas notificações de infração, análises de fraude e compartilhamento de informações entre PSPs."
  - framework_id: bcb-3978
    relationship: complements
    description: "A Circular BCB 3.978 complementa ao exigir procedimentos de PLD/FT que alimentam os critérios de fundada suspeita de fraude utilizados no MED 2.0."
  - framework_id: bcb-44
    relationship: complements
    description: "A Resolução BCB 44 complementa ao dispor sobre requisitos técnicos e operacionais do SPI e DICT utilizados nas notificações e bloqueios do MED 2.0."
