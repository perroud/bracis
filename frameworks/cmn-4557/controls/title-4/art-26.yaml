id: art-26
family: title-4
title: "Responsabilidades do Conselho de Administracao"
class: CMN-4557
statement:
  prose: |
    Art. 26. O conselho de administração ou, na sua inexistência, a diretoria da
    instituição é responsável por:
    I - aprovar as políticas de gerenciamento de riscos;
    II - aprovar a declaração de apetite por riscos (RAS);
    III - aprovar os limites de exposição a riscos;
    IV - aprovar o plano de capital;
    V - assegurar recursos adequados para o gerenciamento de riscos e de capital;
    VI - aprovar os relatórios periódicos de gerenciamento de riscos e de capital.
guidance:
  prose: |
    O art. 26 e fundamental: estabelece que a responsabilidade ultima pelo gerenciamento
    de riscos e de capital e do conselho de administracao. Nao pode ser delegada.

    **Principio de responsabilidade do board:**
    A CMN 4.557 segue o principio de Basileia: o conselho de administracao e o
    responsavel ultimo pela supervisao do gerenciamento de riscos. Isso significa que:
    - O conselho nao pode alegar desconhecimento
    - O conselho nao pode delegar a aprovacao dos itens listados
    - O conselho pode ser responsabilizado por falhas no gerenciamento de riscos

    **Responsabilidades especificas (incisos I a VI):**

    **I - Politicas de gerenciamento de riscos:**
    Aprovar todas as politicas previstas na resolucao:
    - Politica de risco de credito
    - Politica de risco de mercado
    - Politica de risco operacional
    - Politica de risco de liquidez
    - Politica de gestao de capital
    - Politica de testes de estresse
    - Politica de validacao de modelos

    **II - Risk Appetite Statement:**
    O RAS (art. 5) deve ser aprovado pelo conselho. E a definicao mais importante
    da instituicao em termos de risco: quanto de risco estamos dispostos a aceitar.

    **III - Limites de exposicao:**
    Limites macro de risco devem ser aprovados pelo conselho. Limites granulares podem
    ser delegados ao comite de riscos ou CRO, mas dentro dos limites macro aprovados.

    **IV - Plano de capital:**
    O plano de capital (art. 23) com projecoes, metas e plano de contingencia deve
    ser aprovado pelo conselho. Decisoes de capital sao decisoes estrategicas.

    **V - Recursos adequados:**
    O conselho deve garantir que a funcao de risco tem equipe dimensionada, budget
    adequado, sistemas apropriados e autoridade suficiente.

    **VI - Relatorios periodicos:**
    O conselho deve receber, analisar e aprovar relatorios periodicos de riscos e
    capital. Nao basta receber — deve demonstrar que analisou e atuou.

    **Implicacoes praticas:**
    - Reunioes do conselho devem ter pauta especifica de riscos e capital
    - Atas devem registrar deliberacoes e aprovacoes
    - Membros do conselho precisam de competencia minima em riscos
    - O conselho pode ser responsabilizado por omissao
implementation_guidance:
  platform_engineering:
    prose: |
      **Board reporting infrastructure:**
      1. Executive dashboard de riscos e capital para o conselho.
      2. Risk heatmap consolidado com todos os tipos de risco.
      3. Capital adequacy dashboard com indices, buffers e projecoes.
      4. Trend analysis: evolucao de metricas de risco ao longo do tempo.

      **Governance workflow:**
      5. Workflow de aprovacao de politicas com assinatura digital do conselho.
      6. Document management para politicas, RAS e plano de capital versionados.
      7. Calendar management para reunioes e prazos de aprovacao.
      8. Action tracking para deliberacoes do conselho em materia de riscos.

      **Self-service para conselheiros:**
      9. Portal do conselheiro com acesso a dashboards, relatorios e documentos.
      10. Mobile access para metricas-chave de risco e capital.
      11. Comparacao com benchmarks do setor quando disponivel.
      12. Alertas automaticos para conselheiros quando thresholds sao atingidos.
    tools:
      - bi-platform
      - grc-platform
      - document-management
      - workflow-engine
  devsecops:
    prose: |
      **Transparencia para governanca:**
      1. Dashboards de metricas de seguranca e risco de TI exportaveis para board pack.
      2. Compliance-as-code reports automatizados para demonstrar aderencia regulatoria.
      3. Audit trail de todas as mudancas em sistemas criticos de risco.
      4. Security posture report automatizado para o conselho.

      **Recursos adequados (V):**
      5. Metricas de capacidade: tempo gasto em seguranca vs. desenvolvimento.
      6. Technical debt metrics como proxy para risco operacional de TI.
      7. Headcount vs. workload metrics para equipe de seguranca.
      8. Tool coverage metrics: percentual de sistemas cobertos por controles.
    tools:
      - gitlab-ci
      - sonarqube
      - reporting-platform
      - bi-platform
  secops:
    prose: |
      **Suporte ao conselho:**
      1. Board pack trimestral com resumo executivo de riscos e capital.
      2. Briefing de riscos emergentes para o conselho.
      3. Comparacao de postura de risco com benchmarks regulatorios e de mercado.
      4. Recomendacoes de acao baseadas em analise de riscos.

      **Ciclo de aprovacao (incisos I-IV):**
      5. Calendario anual de aprovacoes: politicas, RAS, limites, plano de capital.
      6. Processo de revisao com tempo adequado para analise pelo conselho.
      7. Documentacao de aprovacao em ata com assinatura.
      8. Tracking de deliberacoes e acoes decididas pelo conselho.

      **Monitoramento de efetividade:**
      9. Assessment da qualidade da informacao fornecida ao conselho.
      10. Feedback do conselho sobre adequacao dos relatorios.
      11. Benchmark de praticas de governanca de riscos com peers.
      12. Autoavaliacao do conselho em materia de riscos (governance review).
    tools:
      - grc-platform
      - reporting-platform
      - document-management
      - board-portal
