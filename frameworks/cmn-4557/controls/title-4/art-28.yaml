id: art-28
family: title-4
title: "Comite de Riscos"
class: CMN-4557
statement:
  prose: |
    Art. 28. As instituições enquadradas no segmento S1 devem constituir comitê de riscos
    vinculado ao conselho de administração, com as seguintes atribuições:
    I - assessorar o conselho de administração em matéria de riscos e gestão de capital;
    II - supervisionar a atuação do CRO e da função de gerenciamento de riscos;
    III - avaliar e recomendar ao conselho limites de risco e políticas;
    IV - monitorar a aderência da instituição ao apetite por riscos;
    V - analisar relatórios de gerenciamento de riscos e de capital.
guidance:
  prose: |
    O art. 28 exige que instituicoes S1 (grandes bancos sistemicamente importantes)
    constituam comite de riscos vinculado ao conselho. Para instituicoes de outros
    segmentos, o comite e recomendado mas nao obrigatorio.

    **Segmento S1 (obrigatorio):**
    Bancos sistemicamente importantes com ativo total acima de 10% do PIB ou
    classificados como D-SIB (Domestic Systemically Important Bank).
    No Brasil: Itau, Bradesco, Banco do Brasil, Santander, Caixa.

    **Composicao do comite:**
    - Membros do conselho de administracao (maioria)
    - Pelo menos um membro com experiencia em gestao de riscos financeiros
    - CRO participa como convidado permanente (sem voto)
    - Independencia em relacao a diretoria executiva

    **Atribuicoes (incisos I a V):**

    **I - Assessoria ao conselho:**
    O comite faz o trabalho detalhado de analise que o conselho nao tem tempo de
    fazer. Analisa profundamente e recomenda ao conselho.

    **II - Supervisao do CRO:**
    O comite supervisiona o CRO e avalia se a funcao de risco esta adequada:
    equipe, budget, sistemas, autoridade, efetividade.

    **III - Limites e politicas:**
    O comite analisa propostas de limites e politicas e recomenda aprovacao ao
    conselho com parecer tecnico fundamentado.

    **IV - Aderencia ao RAS:**
    Monitoramento continuo de que a instituicao esta operando dentro do apetite
    ao risco aprovado. Se nao esta, o comite deve alertar o conselho.

    **V - Relatorios:**
    Analise critica dos relatorios de gerenciamento de riscos e capital.
    Nao e uma formalidade — o comite deve questionar, desafiar e exigir
    esclarecimentos.

    **Frequencia:**
    - Minimo mensal (tipicamente)
    - Extraordinaria quando necessario (crise, evento relevante)
    - Ata formal de todas as reunioes
implementation_guidance:
  platform_engineering:
    prose: |
      **Committee management platform:**
      1. Portal do comite de riscos com agenda, documentos e deliberacoes.
      2. Pre-read distribution automatizada com antecedencia adequada.
      3. Dashboards interativos para analise durante reunioes.
      4. Action tracking para deliberacoes do comite.

      **Dashboards para o comite:**
      5. Risk overview: heatmap consolidado de riscos por tipo e unidade de negocio.
      6. RAS adherence: metricas de apetite ao risco vs. exposicao atual.
      7. Limit utilization: percentual de utilizacao de limites por tipo de risco.
      8. Capital adequacy: indices de capital, projecoes e buffers.

      **Reporting automatizado:**
      9. Board pack automatizado com metricas padronizadas.
      10. Exception report: violacoes de limites, KRIs em alerta, findings abertos.
      11. Trend analysis: evolucao de metricas ao longo do tempo.
      12. Peer comparison quando dados disponveis.
    tools:
      - board-portal
      - bi-platform
      - grc-platform
      - reporting-platform
  devsecops:
    prose: |
      **Reporting de risco de TI para o comite:**
      1. Relatorio de risco operacional de TI consolidado para o comite.
      2. Metricas de seguranca cibernetica formatadas para linguagem executiva.
      3. Incidentes de TI relevantes com analise de impacto e acoes tomadas.
      4. Status de projetos de remediacao de riscos de TI.

      **Evidencias de compliance:**
      5. Compliance dashboard mostrando aderencia a CMN 4.557 e regulacoes correlatas.
      6. Audit findings com status de remediacao.
      7. Resultados de testes de penetracao e vulnerabilidades criticas.
      8. Status de BCP/DRP testing.
    tools:
      - gitlab-ci
      - sonarqube
      - siem
      - reporting-platform
  secops:
    prose: |
      **Operacao do comite de riscos:**
      1. Calendario anual de reunioes do comite aprovado no inicio do ano.
      2. Pauta padrao: riscos, capital, limites, KRIs, incidentes, findings.
      3. Pre-read distribuido com 5 dias uteis de antecedencia.
      4. Ata formal com deliberacoes e acoes assinada pelo presidente do comite.

      **Assessoria ao conselho (inciso I):**
      5. Relatorio trimestral do comite ao conselho com recomendacoes.
      6. Parecer do comite sobre politicas e limites antes da aprovacao do conselho.
      7. Alertas urgentes do comite ao conselho quando necessario.
      8. Recomendacoes do comite sobre adequacao de recursos de risco.

      **Supervisao do CRO (inciso II):**
      9. Avaliacao anual do CRO pelo comite.
      10. Avaliacaco da funcao de risco: equipe, budget, sistemas, efetividade.
      11. Avaliacao de independencia efetiva do CRO.
      12. Recomendacao sobre remuneracao e incentivos do CRO.
    tools:
      - board-portal
      - grc-platform
      - document-management
      - reporting-platform
