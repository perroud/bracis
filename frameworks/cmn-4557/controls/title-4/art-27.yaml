id: art-27
family: title-4
title: "Diretor de Riscos (CRO)"
class: CMN-4557
statement:
  prose: |
    Art. 27. A instituição deve designar diretor responsável pelo gerenciamento de riscos
    (CRO - Chief Risk Officer), observando que:
    I - o CRO deve ter independência funcional em relação às áreas de negócios;
    II - o CRO deve ter acesso direto ao conselho de administração;
    III - o CRO não pode ser responsável pela administração de recursos de terceiros;
    IV - a destituição ou substituição do CRO deve ser comunicada ao Banco Central do Brasil.
guidance:
  prose: |
    O art. 27 exige a designacao de um CRO (Chief Risk Officer) com independencia e
    acesso direto ao conselho. E uma das exigencias mais importantes de governanca.

    **Papel do CRO:**
    O CRO e o executivo responsavel por toda a funcao de gerenciamento de riscos da
    instituicao. E o "dono" das duas estruturas previstas na resolucao: gerenciamento
    de riscos e gerenciamento de capital.

    **Independencia funcional (inciso I):**
    O CRO deve ser independente das areas de negocio que geram receita:
    - Nao pode reportar ao CEO de operacoes ou ao diretor comercial
    - Deve reportar diretamente ao CEO ou ao conselho
    - Nao pode ter bonus atrelado a resultados de negocios
    - Deve ter autoridade para vetar operacoes que ultrapassem limites de risco
    - A funcao de risco nao pode ser subordinada ao front-office

    **Acesso ao conselho (inciso II):**
    O CRO deve ter canal direto com o conselho:
    - Pode participar de reunioes do conselho sem necessidade de convite
    - Pode reportar diretamente ao conselho sem intermediacao do CEO
    - Deve ter linha de reporte funcional ao comite de riscos do conselho
    - Deve apresentar relatorios de risco ao conselho periodicamente

    **Vedacao de conflito (inciso III):**
    O CRO nao pode administrar recursos de terceiros (asset management) porque
    isso criaria conflito de interesse: estaria avaliando riscos de operacoes que
    ele mesmo administra.

    **Comunicacao ao BCB (inciso IV):**
    A destituicao ou substituicao do CRO deve ser comunicada ao BCB. Isso garante
    que o regulador saiba quando ha mudanca na lideranca de riscos, especialmente
    se a destituicao for motivada por divergencia com a administracao sobre niveis
    de risco.

    **Perfil do CRO:**
    - Experiencia comprovada em gerenciamento de riscos financeiros
    - Conhecimento de regulacao bancaria (Basileia, CMN, BCB)
    - Capacidade de comunicar riscos para o conselho em linguagem executiva
    - Independencia para desafiar decisoes de negocio quando necessario
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura para o CRO:**
      1. CRO dashboard com visao consolidada de todos os riscos e capital.
      2. Drill-down por tipo de risco, unidade de negocio, produto.
      3. Alertas de limite personalizados para o CRO.
      4. Comparacao com apetite ao risco (RAS) em tempo real.

      **Independencia operacional (inciso I):**
      5. Sistemas de risco com acesso segregado do front-office.
      6. Ambientes separados para funcao de risco e areas de negocio.
      7. Risk overrides rastreados com aprovacao do CRO.
      8. Audit trail de todas as decisoes de risco.

      **Reporting para conselho (inciso II):**
      9. Board pack automatizado com metricas-chave de risco e capital.
      10. Trend analysis e comparacao com benchmarks.
      11. Risk alerts escalados diretamente ao comite de riscos do conselho.
      12. Self-service analytics para analises ad-hoc do CRO.
    tools:
      - bi-platform
      - risk-management-platform
      - monitoring-alerting
      - reporting-platform
  devsecops:
    prose: |
      **Visibilidade de risco de TI para o CRO:**
      1. Dashboard de risco operacional de TI consolidado para o CRO.
      2. Metricas de seguranca cibernetica integradas ao risk dashboard.
      3. Vulnerability trends e exposure metrics para reporte ao CRO.
      4. Incident reports automatizados para ciencia do CRO.

      **Segregacao de funcoes:**
      5. Access control diferenciado para funcao de risco vs. negocios.
      6. Segregation of duties enforcement no pipeline para sistemas de risco.
      7. Code review obrigatorio por equipe de risco para mudancas em risk engines.
      8. Independencia de deployment para sistemas de risco.
    tools:
      - gitlab-ci
      - sonarqube
      - siem
      - monitoring-alerting
  secops:
    prose: |
      **Suporte ao CRO:**
      1. Equipe de risco dimensionada conforme complexidade da instituicao.
      2. Budget de risco adequado e protegido de cortes unilaterais por areas de negocio.
      3. Ferramentas e sistemas de risco atualizados e funcionais.
      4. Acesso a consultoria externa especializada quando necessario.

      **Independencia (inciso I):**
      5. Estrutura organizacional que garanta independencia funcional do CRO.
      6. Avaliacao de desempenho do CRO pelo conselho, nao pelo CEO.
      7. Remuneracao do CRO nao vinculada a resultados de negocios.
      8. Autoridade documentada para vetar operacoes que violem limites.

      **Acesso ao conselho (inciso II):**
      9. Participacao regular do CRO em reunioes do conselho e comite de riscos.
      10. Canal direto de comunicacao CRO-conselho para assuntos urgentes.
      11. Relatorio trimestral do CRO ao conselho sem edicao da diretoria.
      12. Direito do CRO de solicitar reuniao extraordinaria do comite de riscos.
    tools:
      - grc-platform
      - risk-management-platform
      - reporting-platform
      - communication-platform
