id: art-5
family: title-2-cap-1
title: "Apetite ao Risco (RAS)"
class: CMN-4557
statement:
  prose: |
    Art. 5. A estrutura de gerenciamento de riscos deve prever a definição de declaração de
    apetite por riscos (RAS - Risk Appetite Statement), aprovada pelo conselho de administração
    ou, na sua inexistência, pela diretoria da instituição.

    § 1º. A declaração de apetite por riscos deve estabelecer os níveis de risco agregado
    que a instituição está disposta a aceitar para atingir seus objetivos estratégicos.

    § 2º. A declaração de apetite por riscos deve ser expressa em termos quantitativos e
    qualitativos e considerar os riscos relevantes para a instituição.

    § 3º. A declaração de apetite por riscos deve ser consistente com o plano de capital
    da instituição.
guidance:
  prose: |
    O art. 5 e central para toda a estrutura de gerenciamento de riscos. O RAS
    (Risk Appetite Statement) define o quanto de risco a instituicao aceita para
    alcancar seus objetivos estrategicos.

    **O que e o RAS:**
    Documento formal que articula o nivel e os tipos de risco que a instituicao esta
    disposta a assumir, dentro de sua capacidade de risco, para atingir seus objetivos
    estrategicos e de negocios.

    **Aprovacao pelo conselho (caput):**
    O RAS DEVE ser aprovado pelo conselho. Nao pode ser definido apenas pela area de
    riscos. E uma decisao estrategica que vincula toda a instituicao.

    **Elementos do RAS (ss 1-3):**

    **Niveis de risco agregado (ss 1):**
    - Capital economico maximo em risco: ex. "nao mais que 80% do capital regulatorio"
    - Perda maxima aceitavel em cenario de estresse severo
    - Rating minimo aceitavel (ex. "manter investment grade")
    - Probabilidade maxima de insolvencia (ex. "< 0,1% em 1 ano")

    **Metricas quantitativas e qualitativas (ss 2):**
    Quantitativas:
    - VaR maximo: ex. "VaR 99% 10d < R$ X milhoes"
    - Perda esperada de credito: ex. "PE < Y% da carteira"
    - LCR minimo: ex. "LCR > 120%"
    - Indice de Basileia minimo: ex. "IB > 12%"

    Qualitativas:
    - Tolerancia zero para fraude interna
    - Baixa tolerancia para risco reputacional
    - Moderada tolerancia para risco de modelo em operacoes simples

    **Consistencia com plano de capital (ss 3):**
    O RAS deve ser compativel com o capital disponivel. Nao faz sentido definir apetite
    alto ao risco se o capital e insuficiente para absorver perdas nesse nivel.

    **Cascateamento do RAS:**
    RAS do conselho -> limites de tolerancia por tipo de risco -> limites operacionais
    por area de negocio -> limites por mesa/trader/produto.
implementation_guidance:
  platform_engineering:
    prose: |
      **RAS na infraestrutura:**
      1. Risk appetite engine que traduz metricas do RAS em limites operacionais.
      2. Dashboard de apetite ao risco com metricas quantitativas em tempo real.
      3. Heatmap de utilizacao do apetite por tipo de risco e unidade de negocio.
      4. Alertas automatizados quando metricas do RAS se aproximam dos limites.

      **Cascateamento de limites:**
      5. Hierarquia de limites configuravel: RAS -> tolerancia -> limites operacionais.
      6. Pre-deal check que valida operacao contra limite disponivel em tempo real.
      7. Real-time aggregation de exposicoes para calculo de utilizacao do RAS.
      8. What-if analysis para simular impacto de novas operacoes no apetite.

      **Consistencia com capital (ss 3):**
      9. Integracao RAS com sistema de gestao de capital (art. 22-25).
      10. Simulacao de cenarios que testam consistencia entre apetite e capital.
      11. Alertas quando projecao de capital indica inconsistencia com RAS.
      12. Capital allocation automatizada respeitando limites do RAS.
    tools:
      - risk-engine
      - limit-management-system
      - bi-platform
      - capital-management-system
  devsecops:
    prose: |
      **RAS como politica executavel:**
      1. Codificacao de metricas quantitativas do RAS em regras executaveis.
      2. Testes automatizados de consistencia entre RAS e configuracao de limites.
      3. Versionamento do RAS em repositorio Git com historico auditavel.
      4. Pipeline de validacao que verifica se mudancas em limites respeitam o RAS.

      **Monitoramento de desvios:**
      5. Alertas no pipeline quando deployment pode afetar metricas do RAS.
      6. Integration tests que validam que sistemas de risco estao alinhados ao RAS.
      7. Drift detection entre RAS aprovado e limites configurados nos sistemas.

      **Qualidade dos dados do RAS:**
      8. Data quality checks nos dados que alimentam metricas do RAS.
      9. Reconciliacao automatizada entre dados fonte e metricas reportadas.
      10. Pipeline de calculo de metricas do RAS com audit trail completo.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - data-quality-platform
      - policy-engine
  secops:
    prose: |
      **Governanca do RAS:**
      1. Processo formal de definicao e aprovacao do RAS pelo conselho (minimo anual).
      2. Revisao do RAS quando cenario macroeconomico mudar significativamente.
      3. Documento de RAS com metricas quantitativas e qualitativas claras.
      4. Comunicacao do RAS a todas as areas de negocio da instituicao.

      **Monitoramento de aderencia:**
      5. Monitoramento diario de metricas quantitativas do RAS.
      6. Relatorio mensal de utilizacao do apetite ao risco para CRO.
      7. Relatorio trimestral de aderencia ao RAS para o conselho.
      8. Processo de escalacao imediata quando limite do RAS e violado.

      **Testes de estresse do RAS:**
      9. Stress testing trimestral para validar que RAS e consistente com capital.
      10. Cenarios reversos: "quanto de perda faria violar o RAS?"
      11. Analise de sensibilidade das metricas do RAS a variaveis macroeconomicas.
      12. Backtesting: verificar se metricas historicas teriam violado o RAS vigente.
    tools:
      - grc-platform
      - risk-management-platform
      - stress-testing-platform
      - reporting-platform
