id: art-6
family: title-2-cap-1
title: "Testes de Estresse"
class: CMN-4557
statement:
  prose: |
    Art. 6. A estrutura de gerenciamento de riscos deve prever a realização periódica de
    testes de estresse, incluindo análises de cenários e análises de sensibilidade.

    § 1º. Os testes de estresse devem considerar cenários de condições econômicas e de
    mercado adversas e devem abranger os riscos relevantes para a instituição.

    § 2º. Os resultados dos testes de estresse devem ser utilizados na avaliação da
    adequação de capital e de liquidez da instituição.

    § 3º. Os cenários de estresse devem ser revisados no mínimo anualmente.
guidance:
  prose: |
    O art. 6 trata dos testes de estresse, que sao fundamentais para avaliar a resiliencia
    da instituicao em cenarios adversos. Sao obrigatorios e devem ser integrados ao processo
    decisorio.

    **Tipos de testes de estresse:**

    **Analise de cenarios:**
    Simulacao de eventos historicos ou hipoteticos e seus impactos na instituicao.
    - Cenarios historicos: crise de 2008, crise da divida soberana, COVID-19
    - Cenarios hipoteticos: quebra de grande contraparte, corrida bancaria, crise cambial
    - Cenarios reversos: "qual cenario causaria insolvencia?" (reverse stress testing)

    **Analise de sensibilidade:**
    Variacao de fatores de risco individuais para medir impacto isolado.
    - Shift paralelo de curva de juros (+/- 200bps)
    - Desvalorizacao cambial de 30%
    - Aumento de inadimplencia em 50%
    - Choque de liquidez com saida de depositos de 20%

    **Cenarios adversos (ss 1):**
    Devem ser suficientemente severos para testar a resiliencia real da instituicao.
    Cenarios "otimistas com leve deterioracao" nao atendem o requisito. Devem considerar:
    - Recessao economica profunda (queda de PIB de 5%+)
    - Crise do mercado financeiro (queda de bolsa de 40%+)
    - Crise de credito (aumento de inadimplencia de 100%+)
    - Crise de liquidez (secagem de mercados interbancarios)

    **Uso dos resultados (ss 2):**
    Resultados de stress testing devem alimentar:
    - Plano de capital: capital suficiente mesmo em cenario adverso?
    - Plano de contingencia de liquidez: reserva suficiente para crise?
    - Limites de risco: limites calibrados para cenarios de estresse?
    - Decisoes de negocio: expandir ou reduzir exposicoes?

    **Revisao anual (ss 3):**
    Cenarios devem ser atualizados conforme evolucao do ambiente macroeconomico.
    Em 2020, cenarios de pandemia passaram de "cauda longa" para "cenario base".
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de stress testing:**
      1. Stress testing engine com capacidade de processar cenarios complexos em tempo
         habil (batch noturno para cenarios completos, intraday para cenarios simplificados).
      2. Scenario management system com biblioteca de cenarios historicos e hipoteticos.
      3. Grid computing ou cloud burst para processamento massivo de cenarios.
      4. Data pipeline dedicado para alimentar o stress testing engine com dados
         atualizados de posicoes, mercado e credito.

      **Cenarios e sensibilidades:**
      5. Scenario builder com interface para definir cenarios multi-fator.
      6. Sensitivity analysis engine para choques individuais em fatores de risco.
      7. Reverse stress testing module para identificar cenarios de falencia.
      8. Macro-economic scenario generator com modelos econometricos.

      **Integracao com capital e liquidez (ss 2):**
      9. Pipeline automatizado: stress results -> capital adequacy assessment.
      10. Pipeline automatizado: stress results -> liquidity adequacy assessment.
      11. Dashboard de resultados de estresse com impacto em capital e liquidez.
      12. What-if analysis para avaliar impacto de novas operacoes em cenarios de estresse.
    tools:
      - stress-testing-platform
      - grid-computing
      - risk-engine
      - data-pipeline
      - bi-platform
  devsecops:
    prose: |
      **Stress testing como codigo:**
      1. Definicao de cenarios em formato estruturado (YAML/JSON) versionado em Git.
      2. Pipeline de CI/CD para modelos de stress testing com backtesting automatizado.
      3. Testes automatizados de consistencia dos cenarios de estresse.
      4. Code review obrigatorio para mudancas em modelos de stress testing.

      **Qualidade e reproducibilidade:**
      5. Reproducibilidade garantida: mesmos inputs devem gerar mesmos outputs.
      6. Data snapshot para cada execucao de stress test (data lineage completo).
      7. Containerizacao dos modelos de stress testing para isolamento e consistencia.
      8. Pipeline de validacao de modelos de estresse (challenger models).

      **Automacao do ciclo:**
      9. Execucao automatizada de stress tests diarios/semanais conforme calendario.
      10. Alertas automatizados quando resultados ultrapassam thresholds predefinidos.
      11. Report generation automatizado pos-execucao.
    tools:
      - gitlab-ci
      - mlflow
      - docker
      - data-quality-platform
  secops:
    prose: |
      **Governanca de stress testing:**
      1. Calendario de stress testing aprovado pelo comite de riscos.
      2. Cenarios aprovados pelo comite de riscos e conselho de administracao.
      3. Documentacao formal de metodologias, premissas e limitacoes.
      4. Revisao anual de cenarios com atualizacao conforme ambiente macroeconomico.

      **Analise e uso dos resultados:**
      5. Relatorio de resultados de estresse para comite de riscos e conselho.
      6. Acao corretiva quando resultados indicam vulnerabilidade material.
      7. Input para definicao/revisao de limites de risco e apetite ao risco.
      8. Input para plano de capital e plano de contingencia de liquidez.

      **Stress testing operacional:**
      9. Cenarios de risco operacional: falha de TI, ataque cibernetico, fraude massiva.
      10. Cenarios de continuidade de negocios integrados ao BCP/DRP.
      11. Exercicios de simulacao (tabletop exercises) para cenarios operacionais.
      12. Validacao independente dos modelos e cenarios de estresse.
    tools:
      - stress-testing-platform
      - risk-management-platform
      - grc-platform
      - reporting-platform
