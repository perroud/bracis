id: art-4
family: title-2-cap-1
title: "Politica de Gerenciamento de Riscos"
class: CMN-4557
statement:
  prose: |
    Art. 4. A estrutura de gerenciamento de riscos deve prever políticas e estratégias
    claramente documentadas que estabeleçam limites para a exposição da instituição a riscos,
    incluindo mecanismos para a manutenção de tais limites.

    § 1º. As políticas de gerenciamento de riscos devem ser aprovadas pelo conselho de
    administração ou, na sua inexistência, pela diretoria da instituição.

    § 2º. As políticas devem ser revisadas no mínimo anualmente.
guidance:
  prose: |
    O art. 4 exige que a instituicao formalize suas politicas de risco em documentos
    claros, aprovados pela alta administracao e revisados periodicamente.

    **Elementos obrigatorios das politicas:**
    1. Limites de exposicao: valores maximos de exposicao para cada tipo de risco
    2. Mecanismos de manutencao: processos para garantir que limites sejam respeitados
    3. Documentacao clara: politicas escritas, estruturadas e acessiveis

    **Hierarquia de limites:**
    - Limites de apetite ao risco (risk appetite): definidos pelo conselho
    - Limites de tolerancia ao risco (risk tolerance): derivados do apetite
    - Limites operacionais: definidos por mesa, trader, produto, contraparte
    - Alertas de proximidade (early warning): percentual do limite para acao preventiva

    **Aprovacao e revisao (ss 1-2):**
    O conselho de administracao deve aprovar as politicas. Revisao minima anual, mas
    deve ocorrer tambem quando:
    - Mudanca significativa no modelo de negocio
    - Novo produto ou operacao relevante
    - Evento de perda significativo
    - Mudanca regulatoria relevante
    - Mudanca no cenario macroeconomico

    **Politicas tipicas esperadas:**
    - Politica de risco de credito
    - Politica de risco de mercado
    - Politica de risco operacional
    - Politica de risco de liquidez
    - Politica de gestao de capital
    - Politica de apetite ao risco (RAS - Risk Appetite Statement)
    - Politica de testes de estresse
    - Politica de validacao de modelos
implementation_guidance:
  platform_engineering:
    prose: |
      **Politicas como codigo (Policy-as-Code):**
      1. Codificacao de limites de risco em politicas executaveis (OPA/Rego, Sentinel).
      2. Enforcement automatizado de limites em sistemas de negociacao e credito.
      3. Bloqueio automatico de operacoes que ultrapassem limites pre-aprovados.
      4. Workflow de aprovacao para excecoes de limites com audit trail completo.

      **Infraestrutura de limites:**
      5. Limit management system centralizado com hierarquia de limites.
      6. Real-time limit monitoring com latencia sub-segundo para limites de mercado.
      7. Pre-deal check integrado em sistemas de front-office.
      8. Limit utilization dashboards com historico e projecao.

      **Versionamento de politicas:**
      9. Repositorio Git para politicas de risco com historico de alteracoes.
      10. Workflow de aprovacao de politicas com assinatura digital.
      11. Distribuicao automatizada de politicas aprovadas para sistemas afetados.
      12. Auditoria automatica de aderencia de sistemas as politicas vigentes.
    tools:
      - opa-gatekeeper
      - vault
      - limit-management-system
      - workflow-engine
      - git-repository
  devsecops:
    prose: |
      **Politicas no pipeline:**
      1. Policy gates no CI/CD que validam conformidade com politicas de risco.
      2. Limites de risco operacional de TI codificados no pipeline (ex: maximo de
         vulnerabilidades criticas permitidas antes de deploy).
      3. Revisao de politicas versionada como pull requests com aprovacao obrigatoria.
      4. Testes automatizados que validam enforcement de limites de risco.

      **Change management alinhado a politicas:**
      5. Classificacao de mudancas por impacto nos limites de risco.
      6. Aprovacao diferenciada para mudancas que afetam sistemas de limites.
      7. Rollback automatizado se deploy causar violacao de limites.

      **Compliance verification:**
      8. Compliance scan periodico contra politicas codificadas.
      9. Drift detection entre politica aprovada e configuracao efetiva.
      10. Alertas quando configuracao de sistema diverge da politica.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - checkov
      - policy-engine
  secops:
    prose: |
      **Gestao do ciclo de vida de politicas:**
      1. Inventario de todas as politicas de risco com status, data de aprovacao e
         proxima revisao.
      2. Workflow de revisao anual com checklist de atualidade.
      3. Gap analysis entre politicas e praticas efetivas.
      4. Processo de aprovacao formal pelo conselho com ata registrada.

      **Monitoramento de limites:**
      5. Monitoramento continuo de utilizacao de limites de risco.
      6. Alertas graduais: 75% (atencao), 90% (alerta), 100% (excedido).
      7. Processo de excecao de limites com aprovacao, prazo e condicoes.
      8. Relatorio de excecoes de limites para conselho trimestralmente.

      **Auditoria de politicas:**
      9. Verificacao de que todas as areas da instituicao conhecem e aplicam as politicas.
      10. Teste de efetividade dos mecanismos de enforcement de limites.
      11. Benchmark de politicas contra peers e melhores praticas.
      12. Retencao de versoes historicas de politicas por 5 anos minimo.
    tools:
      - grc-platform
      - risk-management-platform
      - workflow-engine
      - reporting-platform
