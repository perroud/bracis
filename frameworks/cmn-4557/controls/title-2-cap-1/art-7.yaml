id: art-7
family: title-2-cap-1
title: "Sistemas de Informacao de Riscos"
class: CMN-4557
statement:
  prose: |
    Art. 7. A estrutura de gerenciamento de riscos deve prever sistemas, rotinas e
    procedimentos para o gerenciamento de riscos que:
    I - sejam compatíveis com a natureza, o porte, a complexidade, o perfil de risco e
    o modelo de negócio da instituição;
    II - permitam a identificação tempestiva e a mensuração adequada dos riscos;
    III - produzam relatórios tempestivos e confiáveis para a administração;
    IV - sejam submetidos a avaliações periódicas de efetividade.
guidance:
  prose: |
    O art. 7 trata da infraestrutura tecnologica e processual para gerenciamento de riscos.
    E o artigo que conecta a resolucao diretamente a TI e sistemas.

    **Sistemas de informacao de riscos:**
    Nao se trata apenas de software. "Sistemas, rotinas e procedimentos" inclui:
    - Sistemas computacionais: risk engines, calculadoras de VaR, scoring de credito
    - Rotinas: processos de fim de dia, reconciliacoes, mark-to-market
    - Procedimentos: manuais operacionais, runbooks, procedimentos de escalacao

    **Requisitos dos sistemas (incisos I a IV):**

    **I - Proporcionalidade:**
    Banco S1 com operacoes complexas de derivativos exige risk engine sofisticado com
    pricing de Monte Carlo. Cooperativa S5 pode usar planilhas controladas, desde que
    adequadas ao seu perfil.

    **II - Tempestividade e adequacao:**
    - Identificacao tempestiva: riscos devem ser detectados antes de se materializarem
    - Mensuracao adequada: modelos devem ser precisos e validados
    - Para risco de mercado: VaR diario com dados de mercado T+0
    - Para risco de credito: rating atualizado, provisao mensal
    - Para risco operacional: captura de eventos de perda em tempo real
    - Para risco de liquidez: posicao de caixa intraday

    **III - Relatorios tempestivos e confiaveis:**
    - Relatorios devem chegar a administracao em tempo de serem uteis para decisao
    - Dados devem ser acurados, completos e consistentes
    - Formato deve ser compreensivel para a alta administracao

    **IV - Avaliacao de efetividade:**
    - Backtesting de modelos: VaR versus P&L realizado
    - Validacao independente de modelos
    - Auditoria interna dos processos de risco
    - Gap analysis periodico
implementation_guidance:
  platform_engineering:
    prose: |
      **Arquitetura de sistemas de risco:**
      1. Risk platform centralizada com modulos para credito, mercado, operacional e liquidez.
      2. Market data infrastructure com feeds real-time (Bloomberg, Refinitiv, B3).
      3. Risk calculation grid com capacidade de processamento para VaR, stress testing e
         pricing de derivativos.
      4. Data warehouse de riscos com historico completo para backtesting e auditoria.

      **Tempestividade (II):**
      5. Real-time risk monitoring para risco de mercado e liquidez.
      6. Near-real-time credit risk assessment para grandes exposicoes.
      7. Event-driven risk capture para risco operacional.
      8. SLA de processamento definido por tipo de risco (T+0 para mercado, T+1 para credito).

      **Reporting (III):**
      9. Automated report generation com distribuicao programada.
      10. Self-service BI para analises ad-hoc de riscos.
      11. Executive dashboards com drill-down para detalhes operacionais.
      12. Data quality monitoring com alertas de inconsistencia nos relatorios.

      **Avaliacao de efetividade (IV):**
      13. Backtesting automatizado de modelos de VaR (diario).
      14. Model performance monitoring com metricas de acuracia.
      15. System uptime e performance monitoring dos sistemas de risco.
      16. Disaster recovery testado periodicamente para sistemas de risco.
    tools:
      - risk-engine
      - market-data-platform
      - grid-computing
      - bi-platform
      - monitoring-alerting
  devsecops:
    prose: |
      **Sistemas de risco no pipeline:**
      1. CI/CD dedicado para sistemas de risco com gates de qualidade rigorosos.
      2. Testes de regressao extensivos para modelos de risco (nao quebrar calculo existente).
      3. Performance testing obrigatorio para risk engines (SLA de calculo).
      4. Integration testing entre modulos de risco (consistencia cross-risk).

      **Qualidade e confiabilidade (III):**
      5. Data validation gates no pipeline de dados de risco.
      6. Automated reconciliation entre sistemas fonte e risk platform.
      7. Monitoring de data freshness e data completeness.
      8. Alertas quando qualidade dos dados cai abaixo do threshold.

      **Model risk management:**
      9. Model versioning em repositorio Git com testes de validacao.
      10. A/B testing para novos modelos de risco antes de producao.
      11. Rollback automatizado se novo modelo apresentar degradacao.
      12. Documentation-as-code para metodologias de modelos de risco.
    tools:
      - gitlab-ci
      - performance-testing
      - data-quality-platform
      - mlflow
      - model-registry
  secops:
    prose: |
      **Governanca de sistemas de risco:**
      1. Inventario de todos os sistemas de risco com classificacao de criticidade.
      2. Change management rigoroso para sistemas de risco (aprovacao do risk manager).
      3. Access control baseado em principio de menor privilegio para sistemas de risco.
      4. Segregacao de funcoes entre front-office, middle-office e back-office.

      **Avaliacao de efetividade (IV):**
      5. Backtesting trimestral de modelos de risco (VaR, PD, LGD).
      6. Validacao independente de modelos por equipe separada da area de desenvolvimento.
      7. Auditoria interna anual dos sistemas e processos de gerenciamento de riscos.
      8. Gap analysis entre capacidades atuais e requisitos regulatorios.

      **Reporting e comunicacao:**
      9. Calendario de relatorios de risco definido e cumprido rigorosamente.
      10. Processo de revisao de qualidade de relatorios antes de distribuicao.
      11. Feedback loop: administracao fornece retorno sobre utilidade dos relatorios.
      12. Retencao de relatorios de risco por 5 anos minimo.
    tools:
      - grc-platform
      - risk-management-platform
      - model-validation-platform
      - reporting-platform
