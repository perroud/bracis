id: art-25
family: title-3
title: "ICAAP e Adequacao de Capital"
class: CMN-4557
statement:
  prose: |
    Art. 25. A estrutura de gerenciamento de capital deve prever processo interno de
    avaliação da adequação de capital (ICAAP), que contemple:
    I - avaliação abrangente de todos os riscos relevantes, incluindo aqueles não cobertos
    pelo requerimento mínimo de capital regulatório (Pilar 1);
    II - avaliação do capital necessário para cobrir riscos identificados no Pilar 2;
    III - documentação das metodologias, premissas e resultados;
    IV - revisão periódica pelo conselho de administração ou, na sua inexistência, pela
    diretoria.
guidance:
  prose: |
    O art. 25 trata do ICAAP (Internal Capital Adequacy Assessment Process), que e o
    processo do Pilar 2 de Basileia III. Vai alem do capital minimo do Pilar 1.

    **ICAAP - O que e:**
    Processo interno pelo qual a instituicao avalia a adequacao de seu capital para
    cobrir todos os riscos relevantes, incluindo aqueles nao capturados integralmente
    pelo Pilar 1 (requerimento minimo regulatorio).

    **Pilar 1 vs. Pilar 2:**

    **Pilar 1 (requerimento minimo):**
    - Risco de credito: abordagem padronizada ou IRB
    - Risco de mercado: abordagem padronizada ou IMA
    - Risco operacional: abordagem padronizada ou AMA
    - Calculo formulaico definido pelo regulador

    **Pilar 2 (ICAAP - riscos adicionais):**
    - Risco de concentracao nao capturado integralmente no Pilar 1
    - Risco de taxa de juros da carteira bancaria (IRRBB)
    - Risco de credito de contraparte residual
    - Risco reputacional
    - Risco estrategico
    - Risco de modelo
    - Risco de liquidez residual (nao coberto pelo LCR/NSFR)
    - Riscos emergentes (climatico, cibernetico)

    **Capital economico:**
    O ICAAP tipicamente envolve calculo de capital economico, que e a estimativa
    interna da instituicao do capital necessario para absorver perdas com determinado
    nivel de confianca. Geralmente mais sofisticado que o calculo regulatorio.

    **Revisao pelo conselho (inciso IV):**
    O ICAAP nao e um exercicio puramente tecnico. O conselho deve revisar e aprovar:
    - Metodologias e premissas
    - Riscos identificados e sua materialidade
    - Capital necessario vs. capital disponivel
    - Plano de acao se capital for insuficiente

    **Supervisory Review (SREP):**
    O BCB pode revisar o ICAAP da instituicao e exigir capital adicional se considerar
    que a avaliacao interna e insuficiente.
implementation_guidance:
  platform_engineering:
    prose: |
      **ICAAP platform:**
      1. Economic capital engine com modelos para cada tipo de risco do Pilar 2.
      2. Risk aggregation engine com correlacao entre riscos para capital economico total.
      3. Capital adequacy comparison: capital regulatorio vs. capital economico.
      4. ICAAP documentation system com versionamento e audit trail.

      **Modelos de capital economico:**
      5. Credit risk economic capital: modelo de portfiolio (CreditMetrics, CreditRisk+).
      6. Market risk economic capital: Expected Shortfall, Stressed VaR.
      7. Operational risk economic capital: LDA (Loss Distribution Approach) ou cenarios.
      8. IRRBB economic capital: EVE e NII sensitivities sob cenarios de estresse.
      9. Concentration risk add-on: HHI-based ou Granularity Adjustment.
      10. Reputational and strategic risk: scenario-based assessment.

      **Integracao:**
      11. Pipeline ICAAP: dados -> modelos -> agregacao -> documentacao -> relatorio.
      12. Consistencia entre ICAAP, stress testing e plano de capital.
    tools:
      - capital-management-system
      - risk-engine
      - data-lake
      - reporting-platform
  devsecops:
    prose: |
      **ICAAP no pipeline:**
      1. CI/CD para modelos de capital economico com backtesting.
      2. Versionamento de modelos ICAAP em Git com rastreabilidade completa.
      3. Testes de consistencia entre modelos de Pilar 1 e Pilar 2.
      4. Reproducibilidade: capacidade de reproduzir ICAAP de qualquer data.

      **Documentacao automatizada (inciso III):**
      5. Automated documentation generation para ICAAP.
      6. Data lineage para todos os dados que alimentam modelos ICAAP.
      7. Model documentation templates padronizados.
      8. Audit trail de premissas e parametros utilizados.
    tools:
      - gitlab-ci
      - mlflow
      - model-registry
      - documentation-platform
  secops:
    prose: |
      **Governanca do ICAAP:**
      1. ICAAP elaborado anualmente e submetido ao BCB.
      2. Revisao e aprovacao pelo conselho de administracao.
      3. Processo de challenge interno: comite de riscos questiona premissas e resultados.
      4. Documentacao completa de metodologias, premissas e limitacoes.

      **Riscos do Pilar 2:**
      5. Inventario de riscos do Pilar 2 atualizado anualmente.
      6. Avaliacao qualitativa e quantitativa de cada risco do Pilar 2.
      7. Capital add-on calculado para cada risco relevante.
      8. Comparacao com capital add-on exigido pelo BCB (SREP).

      **Revisao periodica (inciso IV):**
      9. Revisao anual do ICAAP pelo conselho com tempo para deliberacao.
      10. Revisao extraordinaria quando cenario muda significativamente.
      11. Resposta a feedback do BCB sobre ICAAP anterior.
      12. Benchmarking de ICAAP contra peers (quando informacao disponivel).
    tools:
      - capital-management-system
      - grc-platform
      - risk-management-platform
      - reporting-platform
