id: art-24
family: title-3
title: "Testes de Estresse de Capital"
class: CMN-4557
statement:
  prose: |
    Art. 24. A estrutura de gerenciamento de capital deve prever a realização de testes de
    estresse que avaliem o impacto de cenários adversos sobre o capital da instituição,
    incluindo:
    I - cenários de condições econômicas e de mercado adversas;
    II - cenários que contemplem eventos específicos relativos à situação particular da
    instituição;
    III - análise de sensibilidade a fatores de risco individuais;
    IV - avaliação da adequação do plano de contingência de capital.
guidance:
  prose: |
    O art. 24 exige stress testing especificamente para capital, complementando o art. 6
    (stress testing geral). O foco aqui e avaliar se o capital da instituicao e
    suficiente para absorver perdas em cenarios adversos.

    **Stress testing de capital:**
    Diferente do stress testing de risco (art. 6), o stress testing de capital foca
    especificamente no impacto sobre os indices de capital (CET1, Tier 1, Total Capital)
    e na capacidade de a instituicao manter-se acima dos minimos regulatorios.

    **Cenarios macroeconomicos adversos (inciso I):**
    - Recessao severa: queda de PIB de 5-8%, desemprego de 15%+
    - Crise inflacionaria: inflacao de 15%+, alta de juros para 20%+
    - Crise cambial: depreciacao de 40-50% do BRL
    - Crise de divida soberana: downgrade do Brasil para junk
    - Crise global: colapso de mercados desenvolvidos afetando emergentes

    Impacto em capital:
    - Aumento de inadimplencia -> mais provisao -> menos lucro -> menos CET1
    - Queda de ativos -> perdas de mercado -> impacto em capital
    - Aumento de RWA -> piora dos indices mesmo sem perdas reais

    **Cenarios especificos da instituicao (inciso II):**
    - Default da maior contraparte
    - Perda operacional severa (fraude, ataque cibernetico)
    - Crise reputacional com saida massiva de clientes
    - Falha regulatoria com multa significativa

    **Sensibilidade (inciso III):**
    - Sensibilidade a taxa de juros: +/- 200bps na Selic
    - Sensibilidade a inadimplencia: +50%, +100% na taxa de default
    - Sensibilidade cambial: +/- 30% no USD/BRL
    - Sensibilidade a crescimento: zero crescimento por 2 anos

    **Validacao do plano de contingencia (inciso IV):**
    O stress testing deve validar se o plano de contingencia de capital (art. 23, IV)
    e efetivo nos cenarios testados. Se o plano nao e suficiente para manter capital
    acima do minimo, precisa ser revisado.
implementation_guidance:
  platform_engineering:
    prose: |
      **Capital stress testing engine:**
      1. Integrated stress testing platform que projete P&L, balanco e capital sob
         cenarios de estresse.
      2. Credit loss projection under stress: PD, LGD, EAD em cenarios adversos.
      3. Market risk P&L under stress: revalorizacao de carteira em cenarios de estresse.
      4. Operational risk loss under stress: cenarios de perda operacional severa.

      **Projecao integrada:**
      5. Dynamic balance sheet: projecao de balanco sob estresse com efeitos de segunda
         ordem (feedback loops).
      6. RWA under stress: recalculo de RWA com parametros de estresse.
      7. Capital ratio projection: CET1, Tier 1, Total Capital sob cenario ao longo
         do horizonte de projecao.
      8. Buffer analysis: distancia ate minimo em cada ponto do horizonte.

      **Analise de sensibilidade (inciso III):**
      9. Sensitivity analysis engine com choques parametrizaveis por fator de risco.
      10. Tornado chart automatizado mostrando impacto relativo de cada fator.
      11. Break-even analysis: "qual nivel de inadimplencia faria CET1 atingir o minimo?"
      12. Multi-factor sensitivity para combinacoes de choques.
    tools:
      - stress-testing-platform
      - capital-management-system
      - risk-engine
      - bi-platform
  devsecops:
    prose: |
      **Capital stress testing no pipeline:**
      1. CI/CD para modelos de stress testing de capital.
      2. Backtesting: cenarios historicos devem reproduzir resultados observados.
      3. Sensitivity tests automatizados para validar modelos de projecao.
      4. Reproducibilidade: mesmas premissas devem gerar mesmos resultados.

      **Automacao do ciclo:**
      5. Scheduled execution de stress tests conforme calendario aprovado.
      6. Automated report generation com comparacao entre cenarios.
      7. Pipeline de validacao de premissas antes de execucao.
      8. Version control para cenarios e premissas.
    tools:
      - gitlab-ci
      - stress-testing-platform
      - model-registry
      - reporting-platform
  secops:
    prose: |
      **Governanca de stress testing de capital:**
      1. Cenarios de estresse de capital aprovados pelo comite de riscos.
      2. Calendario de execucao aprovado (minimo trimestral para cenarios completos).
      3. Relatorio de resultados para comite de riscos e conselho.
      4. ICAAP: resultados de estresse integrados ao processo de avaliacao de capital.

      **Uso dos resultados:**
      5. Input para calibracao de capital target e buffers gerenciais.
      6. Input para revisao do plano de contingencia de capital.
      7. Input para decisoes de dividendos e recompra de acoes.
      8. Input para decisoes de expansao de negocios.

      **Validacao do CFP (inciso IV):**
      9. Teste de efetividade do plano de contingencia de capital em cenarios de estresse.
      10. Identificacao de gaps: acoes insuficientes para cenario severo.
      11. Atualizacao do plano de contingencia conforme resultados.
      12. Comunicacao ao BCB dos resultados de estresse conforme exigido.
    tools:
      - capital-management-system
      - risk-management-platform
      - grc-platform
      - reporting-platform
