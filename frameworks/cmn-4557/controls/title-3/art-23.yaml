id: art-23
family: title-3
title: "Plano de Capital"
class: CMN-4557
statement:
  prose: |
    Art. 23. As instituições devem elaborar e manter plano de capital que contenha:
    I - metas de capital de curto e longo prazo;
    II - projeções de capital para cenários base e de estresse;
    III - principais fontes de capital disponíveis;
    IV - plano de contingência de capital para situações de estresse.
guidance:
  prose: |
    O art. 23 detalha o plano de capital, que e o documento central do gerenciamento
    de capital. Deve ser um plano vivo, revisado periodicamente e testado.

    **Metas de capital (inciso I):**

    **Curto prazo (1 ano):**
    - Capital regulatorio: manter indices acima do minimo em todos os trimestres
    - Capital alvo: CET1 target (ex: 11%), Total Capital target (ex: 14%)
    - Buffer sobre o minimo: colchao gerencial (ex: 200bps acima do minimo efetivo)

    **Longo prazo (3-5 anos):**
    - Capital compativel com plano estrategico de crescimento
    - Capital para absorver entrada em novos mercados ou produtos
    - Capital para absorver potencial deterioracao do cenario macroeconomico
    - Capital para cumprir futuros requerimentos regulatorios (phase-in)

    **Projecoes de capital (inciso II):**

    **Cenario base:**
    - Premissas alinhadas com orcamento e plano de negocios
    - Crescimento de ativos conforme plano comercial
    - Geracao de lucro conforme projecoes financeiras
    - Politica de dividendos planejada

    **Cenario de estresse:**
    - Recessao economica com aumento de inadimplencia
    - Queda de receitas e margens financeiras
    - Aumento de RWA por deterioracao de carteira
    - Perdas operacionais extraordinarias
    - Pressao de mercado sobre capital (desvalorizacao de ativos)

    **Fontes de capital (inciso III):**
    - Lucros retidos (principal fonte organica)
    - Emissao de acoes (capital novo de acionistas)
    - Instrumentos hibridos de capital (AT1, Tier 2)
    - Reducao de ativos ponderados (venda de ativos, securitizacao)
    - Reducao de dividendos (retencao maior de lucros)

    **Plano de contingencia de capital (inciso IV):**
    - Acoes pre-definidas para situacoes de estresse de capital
    - Trigger criteria: quando ativar cada acao (ex: CET1 < X%)
    - Timeline: prazo esperado para cada acao gerar capital
    - Sequenciamento: acoes mais rapidas e menos custosas primeiro
implementation_guidance:
  platform_engineering:
    prose: |
      **Capital planning platform:**
      1. Modelo de projecao de capital com cenarios multi-variados.
      2. RWA projection engine: projecao de ativos ponderados baseada em plano de negocios.
      3. P&L projection integrada para estimar geracao organica de capital.
      4. Scenario management para cenarios base, adverso e severo.

      **Simulacoes e what-if:**
      5. What-if simulator: impacto de novas operacoes, dividendos, emissoes no capital.
      6. Reverse stress testing: "qual cenario consumiria todo o buffer de capital?"
      7. Sensitivity analysis: impacto de variaveis macro (juros, inadimplencia, cambio)
         nos indices de capital.
      8. Dynamic balance sheet projection para projecoes multi-ano.

      **Monitoramento de metas:**
      9. Dashboard de capital plan: projecao vs. realizado por trimestre.
      10. Early warning quando projecao indica potencial breach de meta.
      11. Variance analysis: explicacao de desvios entre projecao e realizado.
      12. Recalibracao automatica de projecoes conforme dados realizados.
    tools:
      - capital-management-system
      - risk-engine
      - bi-platform
      - scenario-management
  devsecops:
    prose: |
      **Capital planning no pipeline:**
      1. Versionamento de modelos de projecao de capital em Git.
      2. Testes automatizados de modelos de projecao (backtesting contra realizados).
      3. CI/CD para atualizacao de parametros de cenarios.
      4. Documentation-as-code para premissas de projecao.

      **Data quality:**
      5. Data validation para premissas macroeconomicas e de negocios.
      6. Reconciliacao entre projecoes financeiras e projecoes de capital.
      7. Consistency checks entre cenarios de risco e cenarios de capital.
      8. Audit trail de todas as premissas e mudancas em cenarios.
    tools:
      - gitlab-ci
      - data-quality-platform
      - model-registry
  secops:
    prose: |
      **Governanca do plano de capital:**
      1. Plano de capital aprovado pelo conselho anualmente.
      2. Revisao semestral com atualizacao de premissas e projecoes.
      3. Revisao extraordinaria quando cenario muda significativamente.
      4. Documentacao completa de premissas e metodologia.

      **Monitoramento de capital:**
      5. Monitoramento mensal de capital realizado vs. planejado.
      6. Analise de desvios com explicacao e acoes corretivas.
      7. Relatorio trimestral de capital para comite e conselho.
      8. Comunicacao proativa ao BCB quando indices se aproximam de minimos.

      **Contingencia de capital (inciso IV):**
      9. Plano de contingencia de capital documentado e aprovado.
      10. Lista de acoes de contingencia priorizadas com timeline.
      11. Teste anual do plano de contingencia (simulacao).
      12. Prontidao operacional para executar acoes de contingencia.
    tools:
      - capital-management-system
      - grc-platform
      - reporting-platform
      - risk-management-platform
