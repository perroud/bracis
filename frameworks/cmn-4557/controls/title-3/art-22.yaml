id: art-22
family: title-3
title: "Estrutura de Gerenciamento de Capital"
class: CMN-4557
statement:
  prose: |
    Art. 22. As instituições devem manter estrutura de gerenciamento de capital que
    permita:
    I - monitorar e controlar o capital mantido pela instituição;
    II - avaliar a necessidade de capital para fazer face aos riscos a que a instituição
    está exposta;
    III - planejar metas e necessidades de capital, considerando os objetivos estratégicos
    da instituição.
guidance:
  prose: |
    O art. 22 estabelece os requisitos para a estrutura de gerenciamento de capital.
    Capital e o colchao que absorve perdas inesperadas e garante a solvencia da instituicao.

    **Capital regulatorio no Brasil:**
    O framework de capital segue Basileia III, adaptado pelo BCB:
    - CET1 (Common Equity Tier 1): capital principal (acoes, lucros retidos)
    - AT1 (Additional Tier 1): instrumentos hibridos de capital
    - Tier 2: divida subordinada, provisoes excedentes
    - Total Capital = CET1 + AT1 + Tier 2

    **Requerimentos de capital (Basileia III Brasil):**
    - CET1 minimo: 4.5% dos RWA (Risk-Weighted Assets)
    - Tier 1 minimo: 6% dos RWA
    - Total Capital minimo: 8% dos RWA
    - Conservation buffer: 2.5%
    - Countercyclical buffer: 0-2.5% (definido pelo BCB)
    - D-SIB buffer: 0-2% (para bancos sistemicamente importantes)
    - Indice de Basileia minimo efetivo: ~10.5-13% dependendo de buffers

    **Monitoramento de capital (inciso I):**
    - Capital disponivel: CET1, AT1, Tier 2 e composicao
    - RWA por tipo de risco: credito, mercado, operacional
    - Indices de capital: CET1 ratio, Tier 1 ratio, Total Capital ratio
    - Alavancagem: Leverage Ratio (Tier 1 / exposicao total)

    **Necessidade de capital (inciso II):**
    - Capital regulatorio: minimos exigidos pelo BCB
    - Capital economico: capital calculado por modelos internos
    - Capital alvo (target): acima do minimo, com buffer gerencial
    - ICAAP (Internal Capital Adequacy Assessment Process): Pilar 2

    **Planejamento de capital (inciso III):**
    - Plano de capital com horizonte de 3 anos (minimo)
    - Projecoes de capital sob cenarios base, adverso e severo
    - Fontes de capital: lucros retidos, emissao de acoes, instrumentos hibridos
    - Usos de capital: crescimento de ativos, dividendos, recompra de acoes
    - Acao corretiva se projecao indicar capital insuficiente
implementation_guidance:
  platform_engineering:
    prose: |
      **Capital management platform:**
      1. RWA engine para calculo de ativos ponderados por risco (credito, mercado, operacional).
      2. Capital adequacy calculator com indices regulatorios em tempo real.
      3. Capital planning model com projecoes multi-cenario de 3 anos.
      4. Capital allocation engine para distribuir capital por unidade de negocio.

      **Calculo de RWA:**
      5. Credit RWA: abordagem padronizada ou IRB conforme autorizacao do BCB.
      6. Market RWA: abordagem padronizada ou modelos internos (IMA).
      7. Operational RWA: abordagem padronizada ou AMA.
      8. Total RWA aggregation com ajustes regulatorios.

      **Monitoramento e reporting:**
      9. Dashboard de capital com CET1, Tier 1, Total Capital ratios em tempo real.
      10. Buffer analysis: distancia ate minimo regulatorio em BPS.
      11. Capital consumption por operacao (what-if para novas operacoes).
      12. Stress testing de capital: impacto de cenarios adversos nos indices.

      **Integracao com riscos:**
      13. Pipeline automatizado: risk metrics -> RWA -> capital adequacy.
      14. Integracao entre stress testing de riscos e stress testing de capital.
      15. Capital at Risk (CaR) integrado com risk appetite (RAS).
      16. Reconciliacao automatica entre DLO e calculo interno de capital.
    tools:
      - capital-management-system
      - risk-engine
      - data-lake
      - bi-platform
      - reporting-platform
  devsecops:
    prose: |
      **Capital systems no pipeline:**
      1. CI/CD para modelos de capital com testes de acuracia e reconciliacao.
      2. Regression testing: mudancas em RWA engine nao podem alterar resultados
         sem justificativa documentada.
      3. Performance testing: calculo de capital deve executar dentro da janela noturna.
      4. Integration testing entre risk engines e capital engine.

      **Data quality para capital:**
      5. Data quality gates para dados que alimentam calculo de RWA.
      6. Reconciliacao automatizada entre contabilidade e capital regulatorio.
      7. Validacao de parametros regulatorios (pesos de risco, fatores de conversao).
      8. Audit trail completo de calculos de capital para regulador.

      **Versionamento de modelos:**
      9. Model versioning para motores de calculo de RWA.
      10. Regulatory parameter management versionado e auditavel.
      11. Change management rigoroso para mudancas em calculo de capital.
      12. Documentation-as-code para metodologias de calculo.
    tools:
      - gitlab-ci
      - data-quality-platform
      - model-registry
      - reporting-platform
  secops:
    prose: |
      **Governanca de capital:**
      1. Politica de gestao de capital aprovada pelo conselho.
      2. Comite de capital com reuniao mensal.
      3. ICAAP documentado e submetido ao BCB anualmente.
      4. Capital target definido acima do minimo regulatorio com buffer gerencial.

      **Monitoramento e reporting:**
      5. Relatorio diario de capital regulatorio para CRO e CFO.
      6. Relatorio mensal de capital para comite de riscos e conselho.
      7. Reporte regulatorio ao BCB (DLO) conforme cronograma.
      8. Pilar 3: disclosure publico de informacoes de capital.

      **Planejamento de capital (inciso III):**
      9. Plano de capital de 3 anos revisado anualmente.
      10. Projecoes sob cenarios base, adverso e severo.
      11. Acao de capital: lista de opcoes para reforco de capital se necessario.
      12. Stress testing de capital integrado com stress de riscos.
    tools:
      - capital-management-system
      - grc-platform
      - reporting-platform
      - risk-management-platform
