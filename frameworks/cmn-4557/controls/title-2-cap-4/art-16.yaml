id: art-16
family: title-2-cap-4
title: "Risco de Tecnologia da Informacao e Cibernetico"
class: CMN-4557
statement:
  prose: |
    Art. 16. A estrutura de gerenciamento do risco operacional deve contemplar o
    gerenciamento do risco de tecnologia da informação, incluindo:
    I - procedimentos para assegurar a segurança, a integridade e a disponibilidade dos
    dados e dos sistemas de informação;
    II - procedimentos para o gerenciamento dos riscos decorrentes de ataques cibernéticos;
    III - procedimentos para a contratação de serviços de processamento e armazenamento de
    dados e de computação em nuvem;
    IV - planos de continuidade de negócios e de contingência de TI.
guidance:
  prose: |
    O art. 16 e o artigo mais diretamente conectado a seguranca da informacao e TI.
    Ele vincula o risco de TI ao framework de risco operacional, estabelecendo que risco
    cibernetico e um subconjunto do risco operacional.

    **Risco de TI como risco operacional:**
    A CMN 4.557 trata risco de TI dentro do capitulo de risco operacional. Isso significa
    que eventos de TI (indisponibilidade, ataque cibernetico, perda de dados) devem ser
    registrados como eventos de perda operacional e reportados como tal.

    **Seguranca, integridade e disponibilidade (inciso I):**
    Os tres pilares classicos (CIA triad) aplicados a sistemas financeiros:
    - Confidencialidade: protecao de dados de clientes, transacoes, estrategias
    - Integridade: dados financeiros devem ser precisos e nao adulterados
    - Disponibilidade: sistemas de pagamento, trading, core banking 24/7

    **Risco cibernetico (inciso II):**
    Procedimentos especificos para ataques ciberneticos:
    - Ransomware, DDoS, phishing, supply chain attacks
    - Threat intelligence para ameacas ao setor financeiro
    - Red team / penetration testing periodico
    - Incident response plan especifico para ataques ciberneticos
    - A Resolucao 4.893 detalha esses requisitos

    **Cloud computing (inciso III):**
    Servicos de nuvem introduzem riscos operacionais especificos:
    - Dependencia de provedor (vendor lock-in)
    - Dados em jurisdicao estrangeira
    - Perda de controle operacional
    - Riscos de seguranca compartilhada (shared responsibility model)
    - A Resolucao 4.893 detalha esses requisitos

    **Continuidade de negocios (inciso IV):**
    - BCP (Business Continuity Plan): plano geral de continuidade
    - DRP (Disaster Recovery Plan): recuperacao de TI
    - Testes periodicos de BCP/DRP (minimo anual)
    - RPO/RTO definidos para sistemas criticos
    - Site de contingencia para sistemas criticos
implementation_guidance:
  platform_engineering:
    prose: |
      **Seguranca de infraestrutura (inciso I):**
      1. Defense-in-depth: firewall, WAF, IDS/IPS, segmentacao de rede, microsegmentacao.
      2. Zero trust architecture para acesso a sistemas financeiros criticos.
      3. Criptografia end-to-end para dados em transito e em repouso.
      4. Identity and Access Management (IAM) com MFA obrigatorio.
      5. Privileged Access Management (PAM) para acesso administrativo.

      **Resiliencia cibernetica (inciso II):**
      6. SOC (Security Operations Center) 24/7 com SIEM e SOAR.
      7. Threat intelligence feed integrado com deteccao de ameacas.
      8. Endpoint Detection and Response (EDR) em todos os endpoints.
      9. Network Detection and Response (NDR) para trafego de rede.
      10. Deception technology (honeypots) para deteccao precoce.

      **Cloud governance (inciso III):**
      11. Cloud Security Posture Management (CSPM) para todos os provedores.
      12. Cloud Access Security Broker (CASB) para controle de SaaS.
      13. Landing zone segura com guardrails de seguranca pre-configurados.
      14. Multi-cloud governance com politicas unificadas.

      **Continuidade (inciso IV):**
      15. Disaster recovery site com replicacao sincrona/assincrona.
      16. Failover automatizado para sistemas criticos (RPO < 1h, RTO < 4h).
      17. Backup strategy com 3-2-1 rule (3 copias, 2 midias, 1 offsite).
      18. Infrastructure-as-Code para recriacao rapida de ambientes.
    tools:
      - firewall-waf
      - siem-soar
      - edr-ndr
      - iam-pam
      - cspm-casb
      - backup-dr
      - vault
  devsecops:
    prose: |
      **Security no pipeline (inciso I):**
      1. SAST em todo commit para detectar vulnerabilidades no codigo.
      2. DAST em ambientes de staging antes de deploy em producao.
      3. SCA (Software Composition Analysis) para dependencias de terceiros.
      4. Container scanning para imagens antes de deploy.
      5. Secret detection para prevenir vazamento de credenciais no codigo.
      6. IaC scanning (Checkov, tfsec) para conformidade de infraestrutura.

      **Risco cibernetico no pipeline (inciso II):**
      7. Supply chain security: assinatura de artefatos, SBOM, provenance.
      8. SLSA compliance para integridade do build.
      9. Signed commits obrigatorios para rastreabilidade.
      10. Dependency pinning e lock files para prevenir supply chain attacks.

      **Cloud no pipeline (inciso III):**
      11. Cloud policy-as-code enforcement no deploy de infraestrutura.
      12. Drift detection para configuracoes de cloud.
      13. Cost and security guardrails para provisionamento de recursos cloud.

      **Continuidade no pipeline (inciso IV):**
      14. Pipeline de DR testing automatizado (chaos engineering).
      15. Failover testing periodico integrado ao CI/CD.
      16. Backup validation automatizado.
    tools:
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - gitlab-container-scanning
      - gitlab-secret-detection
      - checkov
      - trivy
      - cosign
  secops:
    prose: |
      **Risco de TI operacional (inciso I):**
      1. Inventario de ativos de TI classificados por criticidade.
      2. Vulnerability management program com SLAs de remediacao.
      3. Patch management com priorizacao baseada em risco.
      4. Configuration management com baselines de seguranca.

      **Risco cibernetico (inciso II):**
      5. Incident response plan para ataques ciberneticos (ransomware, DDoS, APT).
      6. Exercicios de simulacao de ataques (tabletop exercises) semestrais.
      7. Red team / penetration testing anual.
      8. Threat intelligence subscription para setor financeiro.

      **Cloud governance (inciso III):**
      9. Due diligence de provedores de nuvem antes de contratacao.
      10. SLA monitoring de provedores de nuvem.
      11. Exit strategy para cada provedor de nuvem (portabilidade de dados).
      12. Comunicacao previa ao BCB para servicos de nuvem relevantes.

      **Continuidade (inciso IV):**
      13. BCP/DRP documentado e aprovado pela diretoria.
      14. Teste de DRP anual com relatorio de resultados.
      15. RPO/RTO definidos para cada sistema critico e testados.
      16. Comunicacao de incidentes de TI significativos ao BCB.
    tools:
      - vulnerability-scanner
      - siem
      - edr
      - threat-intelligence
      - backup-dr
      - grc-platform
