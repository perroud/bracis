id: art-15
family: title-2-cap-4
title: "Identificacao e Gestao do Risco Operacional"
class: CMN-4557
statement:
  prose: |
    Art. 15. A estrutura de gerenciamento de riscos deve contemplar, relativamente ao risco
    operacional, sistemas e procedimentos para:
    I - a identificação, a mensuração, a avaliação, o monitoramento, o reporte, o controle e
    a mitigação do risco operacional;
    II - a coleta e o registro de dados referentes a eventos de risco operacional;
    III - a realização periódica de autoavaliações de risco e de controles (RCSA);
    IV - a manutenção de indicadores-chave de risco (KRI).
guidance:
  prose: |
    O art. 15 define a estrutura de gestao do risco operacional, que e o tipo de risco
    que mais diretamente impacta TI, seguranca cibernetica e processos.

    **Definicao de risco operacional:**
    Perdas resultantes de falha, deficiencia ou inadequacao de processos internos, pessoas
    e sistemas, ou de eventos externos. Inclui risco juridico, mas exclui risco estrategico
    e de reputacao.

    **Categorias de eventos de risco operacional (Basileia):**
    1. Fraude interna
    2. Fraude externa
    3. Praticas empregaticas e seguranca no trabalho
    4. Clientes, produtos e praticas de negocio
    5. Danos a ativos fisicos
    6. Interrupcao de negocios e falhas de sistemas
    7. Execucao, entrega e gestao de processos

    **Coleta de eventos de perda (inciso II):**
    Toda perda operacional deve ser registrada com:
    - Data do evento e data de descoberta
    - Categoria do evento (7 categorias de Basileia)
    - Linha de negocio afetada
    - Valor da perda (bruto e liquido de recuperacao)
    - Descricao do evento e causa raiz
    - Acoes corretivas tomadas

    **RCSA (inciso III):**
    Risk and Control Self-Assessment e um processo em que cada area da instituicao
    avalia seus proprios riscos operacionais e a efetividade dos controles:
    - Identificacao de riscos por processo de negocio
    - Avaliacao de probabilidade e impacto (inherent risk)
    - Mapeamento de controles existentes
    - Avaliacao de efetividade dos controles
    - Calculo de risco residual
    - Plano de acao para riscos acima do apetite

    **KRIs (inciso IV):**
    Key Risk Indicators sao metricas que sinalizam aumento de risco operacional:
    - Numero de incidentes de TI por periodo
    - Tempo de indisponibilidade de sistemas criticos
    - Turnover de funcionarios-chave
    - Volume de reclamacoes de clientes
    - Numero de violacoes de compliance
    - Resultado de auditorias internas
implementation_guidance:
  platform_engineering:
    prose: |
      **Operational risk platform:**
      1. Event collection system para registro de perdas operacionais com classificacao
         automatica por categoria de Basileia e linha de negocio.
      2. RCSA platform com workflow de autoavaliacao, aprovacao e tracking de acoes.
      3. KRI dashboard com metricas em tempo real e tendencias historicas.
      4. Incident management integrado com registro de perdas operacionais.

      **Categoria 6 - Falhas de sistemas (mais relevante para TI):**
      5. Monitoring de disponibilidade de sistemas criticos (uptime/downtime tracking).
      6. Incident post-mortem automatizado com calculo de impacto financeiro.
      7. Change failure rate como KRI automatizado.
      8. MTTR (Mean Time to Recovery) como KRI de resiliencia de TI.

      **Data e analytics:**
      9. Operational risk data warehouse com historico de eventos de perda.
      10. Loss distribution analysis para calculo de capital por risco operacional.
      11. Scenario analysis engine para cenarios de risco operacional severos.
      12. Correlacao entre KRIs e eventos de perda para early warning.
    tools:
      - grc-platform
      - incident-management
      - monitoring-alerting
      - data-lake
      - bi-platform
  devsecops:
    prose: |
      **Risco operacional de TI no pipeline:**
      1. Metricas DORA como KRIs automatizados de risco operacional de TI:
         - Deployment frequency, lead time, change failure rate, MTTR.
      2. Incident tracking integrado ao pipeline: falha de deploy = evento de risco.
      3. Vulnerabilidade critica nao corrigida = KRI de risco cibernetico.
      4. Debt tecnico como indicador de risco operacional futuro.

      **Controles automatizados:**
      5. Security gates no pipeline como controle de risco operacional.
      6. Automated testing coverage como indicador de qualidade de controle.
      7. Configuration drift detection como KRI de risco de TI.
      8. Supply chain security scan como controle de fraude externa (categoria 2).

      **Registro de eventos:**
      9. Pipeline de captura automatica de incidentes de TI para base de perdas.
      10. Classificacao automatica de incidentes nas categorias de Basileia.
      11. Calculo automatizado de impacto financeiro de incidentes.
      12. Dashboard de risco operacional de TI para risk management.
    tools:
      - gitlab-ci
      - incident-management
      - sonarqube
      - monitoring-alerting
      - siem
  secops:
    prose: |
      **Governanca de risco operacional:**
      1. Politica de risco operacional aprovada pelo comite de riscos.
      2. Comite de risco operacional com reuniao mensal.
      3. Risk taxonomy de eventos de perda alinhada com categorias de Basileia.
      4. Processo de escalacao para eventos de perda significativos.

      **RCSA (inciso III):**
      5. RCSA anual para todas as areas da instituicao.
      6. Risk register consolidado com inherent risk, controles e residual risk.
      7. Action plans com owner, prazo e status para riscos acima do apetite.
      8. Follow-up trimestral de action plans pendentes.

      **KRIs e monitoramento (inciso IV):**
      9. Inventario de KRIs aprovado pelo comite de riscos.
      10. Thresholds de KRIs: verde (normal), amarelo (atencao), vermelho (acao).
      11. Relatorio mensal de KRIs para comite de riscos.
      12. Revisao anual de KRIs e thresholds.
    tools:
      - grc-platform
      - risk-management-platform
      - incident-management
      - reporting-platform
