id: art-18
family: title-2-cap-4
title: "Continuidade de Negocios e Gestao de Crises"
class: CMN-4557
statement:
  prose: |
    Art. 18. A estrutura de gerenciamento do risco operacional deve contemplar:
    I - planos de continuidade de negócios para assegurar a capacidade da instituição de
    operar em base contínua e de minimizar perdas em caso de interrupção severa de negócios;
    II - estratégias de recuperação em cenários de contingência;
    III - testes periódicos dos planos de continuidade de negócios;
    IV - identificação de processos e funções críticas para a continuidade operacional.
guidance:
  prose: |
    O art. 18 trata especificamente de continuidade de negocios e gestao de crises, que e
    um componente critico do risco operacional em instituicoes financeiras.

    **Business Continuity Management (BCM):**
    Framework para garantir que a instituicao possa continuar operando durante e apos
    eventos disruptivos significativos (desastres naturais, pandemias, ataques ciberneticos,
    falhas de infraestrutura).

    **Planos de continuidade (inciso I):**
    - BCP (Business Continuity Plan): plano geral de continuidade
    - DRP (Disaster Recovery Plan): recuperacao de TI especificamente
    - Crisis Management Plan: gestao de crises e comunicacao
    - Pandemic Plan: continuidade durante pandemias (pos-COVID)

    **Estrategias de recuperacao (inciso II):**
    - Hot site: site de contingencia pronto para uso imediato
    - Warm site: site com infraestrutura basica, ativacao em horas
    - Cold site: espaco disponivel, equipamentos provisionados sob demanda
    - Cloud DR: recuperacao em nuvem com infraestrutura on-demand
    - Active-active: dois sites operando simultaneamente

    **Testes periodicos (inciso III):**
    - Tabletop exercise: simulacao de cenario em sala de reuniao
    - Walkthrough test: verificacao de procedimentos passo a passo
    - Simulation test: simulacao real sem impacto em producao
    - Parallel test: processamento real no site de contingencia em paralelo
    - Full interruption test: transferencia real para site de contingencia

    **Processos criticos (inciso IV):**
    - BIA (Business Impact Analysis): identificar processos criticos
    - RPO (Recovery Point Objective): perda maxima de dados aceitavel
    - RTO (Recovery Time Objective): tempo maximo de indisponibilidade
    - MTPD (Maximum Tolerable Period of Disruption): periodo maximo toleravel

    Para instituicoes financeiras, processos tipicamente criticos:
    - Sistema de pagamentos (SPB, PIX)
    - Core banking
    - Sistemas de trading e tesouraria
    - Comunicacao com o BCB (SELIC, reservas bancarias)
    - Atendimento ao cliente
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de continuidade:**
      1. Multi-site architecture com failover automatizado para sistemas criticos.
      2. Database replication (sincrona para RPO=0, assincrona para RPO>0).
      3. Load balancer com health checks e automatic failover.
      4. DNS failover para redirecionamento transparente de trafego.

      **Disaster recovery:**
      5. IaC (Infrastructure-as-Code) para recriacao rapida de ambientes.
      6. Immutable infrastructure: reconstruir ao inves de reparar.
      7. Backup strategy: full + incremental + offsite + air-gapped.
      8. Automated DR orchestration: runbook automatizado de failover.

      **Chaos engineering:**
      9. Chaos engineering framework para testes proativos de resiliencia.
      10. Game days periodicos simulando falhas de componentes criticos.
      11. Blast radius analysis para cada componente de infraestrutura.
      12. Dependency mapping automatizado para identificar single points of failure.

      **Monitoramento de continuidade:**
      13. Real-time monitoring de RPO/RTO efetivos vs. targets.
      14. Backup monitoring com alertas de falha ou atraso.
      15. Replication lag monitoring para databases replicados.
      16. Capacity planning para garantir recursos em cenario de contingencia.
    tools:
      - disaster-recovery
      - chaos-engineering
      - monitoring-alerting
      - iac-platform
      - backup-dr
  devsecops:
    prose: |
      **Continuidade no pipeline:**
      1. Pipeline de DR testing automatizado (chaos engineering integrado ao CI/CD).
      2. Backup validation automatizado: restaurar backup e validar integridade.
      3. Failover testing periodico como parte do pipeline de release.
      4. Blue/green deployments para zero-downtime deployment.

      **Resiliencia no codigo:**
      5. Circuit breaker patterns em todos os servicos criticos.
      6. Retry patterns com exponential backoff.
      7. Graceful degradation: sistema continua operando com funcionalidade reduzida.
      8. Bulkhead pattern para isolamento de falhas.

      **Documentacao de DR:**
      9. Runbooks de DR versionados em Git como codigo.
      10. Automated documentation de topologia e dependencias.
      11. Dependency graph atualizado automaticamente a cada deploy.
      12. Contact lists e escalation procedures versionados e testados.
    tools:
      - gitlab-ci
      - chaos-engineering
      - service-mesh
      - docker
  secops:
    prose: |
      **Business Continuity Management:**
      1. BIA (Business Impact Analysis) anual para todos os processos de negocio.
      2. Classificacao de processos por criticidade com RPO/RTO definidos.
      3. BCP documentado e aprovado pela diretoria.
      4. DRP documentado com procedimentos detalhados de recuperacao.

      **Testes periodicos (inciso III):**
      5. Tabletop exercises semestrais para cenarios de crise.
      6. DR test anual com transferencia real para site de contingencia.
      7. Relatorio de testes com findings e plano de remediacao.
      8. Comunicacao de resultados de testes ao conselho.

      **Gestao de crises:**
      9. Crisis management team definido com papeis e responsabilidades.
      10. Plano de comunicacao de crise (interno, clientes, regulador, midia).
      11. Processo de ativacao de contingencia com criterios claros.
      12. Post-incident review obrigatorio apos ativacao de contingencia.
    tools:
      - grc-platform
      - incident-management
      - communication-platform
      - backup-dr
