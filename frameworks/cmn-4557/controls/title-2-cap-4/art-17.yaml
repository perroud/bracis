id: art-17
family: title-2-cap-4
title: "Risco Juridico e de Compliance"
class: CMN-4557
statement:
  prose: |
    Art. 17. A estrutura de gerenciamento do risco operacional deve contemplar o
    gerenciamento do risco jurídico, incluindo:
    I - a avaliação de riscos legais associados a produtos, serviços e operações;
    II - o acompanhamento de contingências judiciais e administrativas;
    III - a adequação a normas e regulamentos aplicáveis (risco de compliance);
    IV - a avaliação de contratos e instrumentos jurídicos.
guidance:
  prose: |
    O art. 17 trata dos riscos juridico e de compliance, que sao componentes do risco
    operacional com impacto financeiro direto e indireto significativo.

    **Risco juridico:**
    Possibilidade de perdas decorrentes de:
    - Contratos inadequados, ambiguos ou inexequiveis
    - Processos judiciais (trabalhistas, civis, tributarios, regulatorios)
    - Multas e sancoes administrativas
    - Danos morais e materiais a terceiros
    - Responsabilizacao civil e penal de administradores

    **Risco de compliance:**
    Possibilidade de sancoes legais ou regulamentares, perda financeira material ou perda
    de reputacao que a instituicao pode sofrer como resultado de sua falha em cumprir leis,
    regulamentos, normas e codigos de conduta aplicaveis.

    **Avaliacao de riscos legais de produtos (inciso I):**
    Antes de lancar novo produto ou servico, avaliar:
    - Conformidade com regulacao bancaria (BCB, CVM, Susep)
    - Conformidade com codigo de defesa do consumidor
    - Conformidade com LGPD para tratamento de dados pessoais
    - Riscos de litigio com clientes ou contrapartes

    **Contingencias judiciais (inciso II):**
    - Inventario de processos judiciais e administrativos
    - Classificacao por probabilidade: provavel, possivel, remota
    - Provisao para contingencias provaveis (CPC 25)
    - Disclosure de contingencias possiveis em notas explicativas
    - Monitoramento de evolucao e tendencias

    **Compliance regulatorio (inciso III):**
    - Compliance com CMN, BCB, CVM, Susep, COAF
    - PLD/FT (prevencao a lavagem de dinheiro e financiamento ao terrorismo)
    - Sancoes internacionais e listas restritivas
    - Relatorio de compliance periodico

    **Contratos (inciso IV):**
    - Revisao juridica de contratos relevantes
    - Padronizacao de clausulas criticas
    - Gestao de contratos com terceiros (SLAs, penalidades, encerramento)
implementation_guidance:
  platform_engineering:
    prose: |
      **Legal risk management platform:**
      1. Case management system para processos judiciais e administrativos.
      2. Provisioning engine para contingencias juridicas integrado com contabilidade.
      3. Contract lifecycle management (CLM) com repositorio centralizado.
      4. Compliance management system com calendario regulatorio.

      **Compliance monitoring:**
      5. Regulatory change management: monitoramento de mudancas regulatorias.
      6. Policy mapping: link entre regulacao e politicas internas.
      7. Compliance testing automatizado para controles regulatorios.
      8. AML/KYC platform para PLD/FT.

      **Data e analytics:**
      9. Dashboard de contingencias com provisao, tendencias e aging.
      10. Contract analytics: identificacao de clausulas de risco em contratos.
      11. Compliance metrics dashboard com KPIs regulatorios.
      12. Regulatory reporting automatizado para BCB, CVM, COAF.
    tools:
      - grc-platform
      - clm-platform
      - aml-kyc-platform
      - reporting-platform
  devsecops:
    prose: |
      **Compliance no pipeline:**
      1. License scanning em dependencias de software (risco juridico de licencas).
      2. LGPD compliance checks automatizados para tratamento de dados pessoais.
      3. Privacy-by-design enforcement no pipeline de desenvolvimento.
      4. Regulatory compliance scan para requisitos do BCB em sistemas financeiros.

      **Contratos de software:**
      5. Audit de licencas de software (open source e comercial).
      6. SBOM (Software Bill of Materials) para rastreabilidade de componentes.
      7. Compliance com termos de servico de APIs e servicos de terceiros.
      8. Verificacao de sancoes em dependencias de software (paises sancionados).
    tools:
      - gitlab-license-scanning
      - sbom-generator
      - policy-engine
      - compliance-scanner
  secops:
    prose: |
      **Governanca de risco juridico:**
      1. Politica de gerenciamento de risco juridico aprovada pelo comite.
      2. Processo de avaliacao juridica obrigatoria para novos produtos.
      3. Inventario de processos judiciais atualizado mensalmente.
      4. Provisao para contingencias revisada trimestralmente.

      **Compliance:**
      5. Programa de compliance com funcao independente.
      6. Compliance officer com reporte direto ao conselho.
      7. Treinamento obrigatorio de compliance para todos os funcionarios.
      8. Canal de denuncias (whistleblowing) com protecao ao denunciante.

      **Contratos:**
      9. Processo de revisao juridica obrigatoria para contratos acima de threshold.
      10. Inventario de contratos relevantes com datas de renovacao e vencimento.
      11. SLA monitoring de fornecedores criticos.
      12. Plano de saida para fornecedores criticos (exit strategy).
    tools:
      - grc-platform
      - clm-platform
      - case-management
      - compliance-training-platform
