id: art-20
family: title-2-cap-5
title: "Plano de Contingencia de Liquidez"
class: CMN-4557
statement:
  prose: |
    Art. 20. A estrutura de gerenciamento do risco de liquidez deve prever plano de
    contingência de liquidez (Contingency Funding Plan) que contenha:
    I - estratégias de gerenciamento sob cenários de estresse de liquidez;
    II - procedimentos para a obtenção de recursos em situações de contingência;
    III - indicadores que possam antecipar situações de estresse de liquidez;
    IV - responsabilidades definidas para a execução do plano.
guidance:
  prose: |
    O art. 20 exige um plano formal de contingencia de liquidez (CFP), que e o documento
    que define como a instituicao reagira em caso de crise de liquidez.

    **O que e o CFP:**
    Plano pre-aprovado que descreve acoes concretas para obter liquidez em situacoes de
    crise. Nao e um documento generico — deve ter acoes especificas, valores estimados,
    prazos e responsaveis.

    **Estrategias de estresse (inciso I):**
    Cenarios de estresse de liquidez:
    - Instituicao especifico: downgrade, fraude, problema operacional
    - Mercado: crise sistemica, secagem de mercado interbancario
    - Combinado: ambos simultaneamente (cenario mais severo)

    Para cada cenario, o CFP deve definir:
    - Horizonte de sobrevivencia esperado (survival horizon)
    - Acoes de mitigacao sequenciadas por prioridade
    - Impacto estimado de cada acao no fluxo de caixa

    **Obtencao de recursos (inciso II):**
    Fontes de liquidez em contingencia (priorizadas):
    1. Liquidacao de HQLA (titulos publicos federais)
    2. Repos (operacoes compromissadas) com titulos em carteira
    3. Acesso a facilidades do BCB (redesconto)
    4. Linhas de credito comprometidas com outros bancos
    5. Venda de ativos nao-core (desinvestimentos)
    6. Securitizacao de ativos (carteira de credito)
    7. Emissao de instrumentos de divida (se mercado aberto)
    8. Aporte de capital pelos acionistas (ultimo recurso)

    **Indicadores de early warning (inciso III):**
    - Queda no volume de depositos (concentracao de saida)
    - Aumento do custo de funding (CDI + spread)
    - Reducao de limites por contrapartes
    - Downgrade de rating
    - Aumento de saques em caixas eletronicos
    - Aumento de resgates em fundos de investimento
    - Noticia negativa na midia
    - Aumento de chamadas de margem

    **Responsabilidades (inciso IV):**
    - Quem declara crise de liquidez (trigger authority)
    - Quem executa cada acao do plano (execution responsibility)
    - Quem comunica ao BCB e ao mercado (communication officer)
    - Quem coordena (crisis manager)
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura do CFP:**
      1. Early warning dashboard com indicadores de estresse de liquidez em tempo real.
      2. Automated trigger system: quando indicadores atingem threshold, escalar automaticamente.
      3. Simulation engine para estimar impacto de acoes de contingencia no fluxo de caixa.
      4. Counterbalancing capacity monitor: quanto pode ser monetizado e em quanto tempo.

      **Obtencao de recursos (inciso II):**
      5. HQLA valuation em tempo real com haircuts aplicados.
      6. Repo capacity calculator: quanto pode ser captado em repos.
      7. Integracao com BCB para redesconto (se aplicavel).
      8. Credit line monitoring: linhas comprometidas e nao utilizadas.

      **Comunicacao de crise:**
      9. Crisis communication platform com templates pre-definidos.
      10. Notificacao automatica de membros do comite de crise.
      11. War room virtual com acesso a dashboards e ferramentas em tempo real.
      12. Secure communication channels para decisoes sensiveis.
    tools:
      - treasury-management
      - monitoring-alerting
      - crisis-management-platform
      - communication-platform
  devsecops:
    prose: |
      **CFP como codigo:**
      1. Runbooks de contingencia versionados em Git.
      2. Automacao de acoes de contingencia onde possivel (ex: liquidacao automatica de HQLA).
      3. Pipeline de teste do CFP: simulacao de cenario de estresse e validacao de procedimentos.
      4. Contact lists e escalation procedures mantidos como codigo versionado.

      **Monitoramento automatizado (inciso III):**
      5. Early warning indicators calculados automaticamente com dados em tempo real.
      6. Alertas graduais: amarelo (atencao), laranja (pre-crise), vermelho (crise).
      7. Dashboard de status do CFP: quais acoes estao disponiveis e em que prazos.
      8. Integration testing entre sistemas de contingencia e sistemas core.
    tools:
      - gitlab-ci
      - monitoring-alerting
      - automation-platform
  secops:
    prose: |
      **Governanca do CFP:**
      1. CFP aprovado pelo conselho de administracao e revisado semestralmente.
      2. Papeis e responsabilidades definidos e conhecidos pelos envolvidos.
      3. Trigger criteria claros para ativacao de cada nivel do CFP.
      4. Comunicacao do CFP ao BCB conforme requisitos regulatorios.

      **Testes do CFP:**
      5. Tabletop exercise semestral com cenario de estresse de liquidez.
      6. Teste operacional anual: ativacao parcial do CFP para validar procedimentos.
      7. Relatorio de testes com findings e plano de remediacao.
      8. Revisao do CFP apos cada teste e apos eventos reais de estresse.

      **Indicadores e monitoramento (inciso III):**
      9. Inventario de early warning indicators aprovado pelo ALCO.
      10. Monitoramento diario de indicadores com relatorio para tesouraria.
      11. Escalacao automatica quando indicadores atingem nivel de alerta.
      12. Root cause analysis quando indicadores sao acionados.
    tools:
      - treasury-management
      - risk-management-platform
      - grc-platform
      - crisis-management-platform
