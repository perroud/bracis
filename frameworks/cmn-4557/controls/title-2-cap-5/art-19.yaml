id: art-19
family: title-2-cap-5
title: "Identificacao e Gestao do Risco de Liquidez"
class: CMN-4557
statement:
  prose: |
    Art. 19. A estrutura de gerenciamento de riscos deve contemplar, relativamente ao risco
    de liquidez, sistemas e procedimentos para:
    I - a identificação, a mensuração, a avaliação, o monitoramento, o reporte, o controle e
    a mitigação do risco de liquidez;
    II - o acompanhamento do fluxo de caixa projetado sob cenários normais e de estresse;
    III - a manutenção de colchão de liquidez compatível com o perfil de risco da instituição;
    IV - o monitoramento dos indicadores regulatórios de liquidez.
guidance:
  prose: |
    O art. 19 define os requisitos para gestao do risco de liquidez, que e a capacidade
    da instituicao de honrar suas obrigacoes no prazo e custo adequados.

    **Tipos de risco de liquidez:**

    **Risco de liquidez de funding:**
    Incapacidade de obter recursos para financiar ativos e operacoes. Exemplo: corrida
    bancaria (bank run), secagem de mercado interbancario, downgrade de rating.

    **Risco de liquidez de mercado:**
    Incapacidade de vender ativos a preco justo no mercado. Exemplo: titulos iliquidos,
    spreads de bid-ask alargados em crise.

    **Risco de liquidez intraday:**
    Incapacidade de honrar obrigacoes de pagamento no mesmo dia. Critico para participantes
    do SPB (Sistema de Pagamentos Brasileiro).

    **Fluxo de caixa projetado (inciso II):**
    - Cenario normal: projecao baseada em premissas de negocios
    - Cenario de estresse especifico da instituicao: downgrade, perda de depositantes
    - Cenario de estresse de mercado: crise sistemica, secagem de liquidez
    - Cenario combinado: estresse da instituicao + estresse de mercado
    - Horizonte: curto prazo (1 dia, 1 semana, 1 mes) e medio prazo (3 meses, 1 ano)

    **Colchao de liquidez (inciso III):**
    Reserva de ativos de alta qualidade e liquidez (HQLA - High Quality Liquid Assets):
    - Nivel 1: caixa, reservas no BCB, titulos do governo federal
    - Nivel 2A: titulos de empresas com rating AA- ou superior
    - Nivel 2B: titulos de empresas com rating A+ a BBB-, acoes de indice
    - Haircuts aplicados conforme nivel e tipo de ativo

    **Indicadores regulatorios (inciso IV):**
    - LCR (Liquidity Coverage Ratio): colchao de liquidez / saidas liquidas 30 dias >= 100%
    - NSFR (Net Stable Funding Ratio): funding estavel disponivel / requerido >= 100%
    - Outros indicadores BCB: relacao depositos/ativos, concentracao de funding
implementation_guidance:
  platform_engineering:
    prose: |
      **Liquidity risk engine:**
      1. Cash flow projection engine com cenarios normais e de estresse.
      2. LCR/NSFR calculator automatizado com dados diarios.
      3. Intraday liquidity monitoring com posicao de caixa em tempo real.
      4. Funding gap analysis por moeda, prazo e tipo de passivo.

      **Colchao de liquidez (inciso III):**
      5. HQLA inventory system com classificacao automatica (Level 1, 2A, 2B).
      6. Haircut engine para calculo de valor liquido do colchao.
      7. Encumbrance monitoring: ativos dados em garantia nao contam para HQLA.
      8. Counterbalancing capacity analysis: quanto pode ser monetizado em crise.

      **Monitoramento e alertas:**
      9. Dashboard de liquidez com LCR, NSFR, cash position em tempo real.
      10. Early warning indicators de estresse de liquidez.
      11. Alertas quando indicadores se aproximam dos minimos regulatorios.
      12. What-if analysis: impacto de novas operacoes nos indicadores de liquidez.

      **Infraestrutura critica:**
      13. Integracao com SPB/STR para monitoramento de pagamentos em tempo real.
      14. Integracao com B3 para chamadas de margem e colateral.
      15. Integracao com mercado interbancario para funding.
      16. Alta disponibilidade (99.99%) para sistemas de liquidez intraday.
    tools:
      - risk-engine
      - treasury-management
      - alm-system
      - monitoring-alerting
      - market-data-platform
  devsecops:
    prose: |
      **Sistemas de liquidez no pipeline:**
      1. CI/CD para modelos de cash flow projection com testes de acuracia.
      2. Performance testing: calculo de LCR/NSFR deve executar dentro do SLA.
      3. Integration testing: dados de posicoes devem reconciliar entre sistemas.
      4. Regression testing: mudancas em modelos nao podem alterar indicadores sem
         justificativa documentada.

      **Qualidade de dados de liquidez:**
      5. Data quality checks para fluxos de caixa contratuais e comportamentais.
      6. Reconciliacao automatizada entre general ledger e sistema de liquidez.
      7. Validacao de dados de mercado para precificacao de HQLA.
      8. Monitoring de completude dos dados de cash flow.

      **Continuidade de sistemas de liquidez:**
      9. Failover automatizado para sistemas de liquidez intraday (RTO < 1h).
      10. Backup de dados de liquidez com RPO < 1h.
      11. DR testing especifico para sistemas de liquidez.
      12. Monitoring de latencia de processamento de pagamentos.
    tools:
      - gitlab-ci
      - performance-testing
      - data-quality-platform
      - monitoring-alerting
  secops:
    prose: |
      **Governanca de liquidez:**
      1. Politica de liquidez aprovada pelo conselho de administracao.
      2. Limites de liquidez (LCR minimo, NSFR minimo, colchao de caixa minimo).
      3. Processo de escalacao quando indicadores de liquidez deterioram.
      4. ALCO (Asset-Liability Committee) com reuniao semanal/mensal.

      **Monitoramento diario:**
      5. Relatorio diario de posicao de liquidez para tesouraria e CRO.
      6. Monitoramento de LCR e NSFR diarios versus limites regulatorios.
      7. Monitoramento de concentracao de funding por contraparte e tipo.
      8. Early warning indicators: saida anormal de depositos, custo de funding subindo.

      **Plano de contingencia de liquidez:**
      9. Contingency Funding Plan (CFP) documentado e atualizado semestralmente.
      10. Lista de acoes de contingencia priorizadas com gatilhos de ativacao.
      11. Teste do CFP anual com simulacao de cenario de estresse.
      12. Comunicacao do CFP ao BCB quando exigido.
    tools:
      - treasury-management
      - risk-management-platform
      - alm-system
      - reporting-platform
