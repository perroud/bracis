id: art-32
family: title-5
title: "Disposicoes Transitorias e Prazos"
class: CMN-4557
statement:
  prose: |
    Art. 32. O Banco Central do Brasil poderá:
    I - estabelecer requisitos adicionais para o gerenciamento de riscos e de capital;
    II - determinar a adoção de controles adicionais quando identificar deficiências
    nas estruturas de gerenciamento da instituição;
    III - exigir ajustes no plano de capital quando considerar que este não atende
    adequadamente aos riscos da instituição;
    IV - adotar medidas prudenciais adicionais, inclusive aumento do requerimento de capital.
guidance:
  prose: |
    O art. 32 confere ao BCB poder discricionario para exigir requisitos adicionais
    alem dos previstos na resolucao. Esse e o mecanismo de supervisao ativa do Pilar 2.

    **Poderes do BCB (incisos I a IV):**

    **I - Requisitos adicionais:**
    O BCB pode emitir circulares, resolucoes e comunicados com requisitos adicionais
    de gerenciamento de riscos. Exemplos recentes:
    - Requisitos de risco climatico e socioambiental
    - Requisitos de risco cibernetico (Res. 4.893)
    - Requisitos de open banking/open finance
    - Requisitos de PIX e pagamentos instantaneos

    **II - Controles adicionais:**
    Se a supervisao do BCB identificar deficiencias na estrutura de gerenciamento de
    riscos de uma instituicao especifica, pode determinar controles adicionais:
    - Limites de exposicao mais restritivos
    - Reporting mais frequente
    - Contratacao de consultoria externa
    - Implementacao de sistemas especificos

    **III - Ajustes no plano de capital:**
    Se o BCB considerar que o plano de capital e insuficiente:
    - Pode exigir metas de capital mais altas
    - Pode restringir distribuicao de dividendos
    - Pode exigir emissao de capital
    - Pode restringir crescimento de ativos

    **IV - Medidas prudenciais:**
    O BCB pode adotar medidas severas se a situacao exigir:
    - Capital add-on: requerimento de capital acima do minimo regulatorio
    - Restricao de atividades: proibicao de novos produtos ou mercados
    - Regime especial: RAET, intervencao, liquidacao extrajudicial
    - Multas e sancoes administrativas contra administradores

    **SREP (Supervisory Review and Evaluation Process):**
    O BCB conduz o SREP, que e a avaliacao supervisoria das estruturas de gerenciamento
    de riscos e capital da instituicao. Pode resultar em capital add-on ou medidas
    corretivas.

    **Implicacao pratica:**
    A instituicao deve estar preparada para atender requisitos adicionais que o BCB
    possa impor. Isso significa:
    - Flexibilidade nos sistemas de risco para acomodar novos requisitos
    - Capacidade de reporting ad-hoc
    - Disponibilidade para inspecoes e auditorias do BCB
    - Prontidao para implementar mudancas em prazos curtos
implementation_guidance:
  platform_engineering:
    prose: |
      **Flexibilidade regulatoria:**
      1. Arquitetura modular de risk platform que permita adicionar novos modulos rapidamente.
      2. Configurable reporting engine para atender requisitos ad-hoc do BCB.
      3. API-first design para integracao rapida de novos requisitos.
      4. Parametrizacao flexivel para ajustar limites e controles sem mudanca de codigo.

      **Prontidao para supervisao:**
      5. Data room virtual para disponibilizar documentacao ao BCB rapidamente.
      6. Query interface para que inspetores do BCB acessem dados de risco.
      7. Ad-hoc report generator para atender solicitacoes especificas.
      8. Sandbox environment para demonstracao de sistemas ao BCB.

      **Regulatory change management:**
      9. Monitoring de publicacoes do BCB (circulares, resolucoes, comunicados).
      10. Impact analysis automatizado de mudancas regulatorias em sistemas.
      11. Backlog de requisitos regulatorios com priorizacao e tracking.
      12. Sprint capacity reservada para mudancas regulatorias urgentes.
    tools:
      - risk-engine
      - reporting-platform
      - regulatory-change-management
      - api-gateway
  devsecops:
    prose: |
      **Agilidade regulatoria no pipeline:**
      1. Fast-track pipeline para mudancas regulatorias urgentes.
      2. Feature flags para ativar novos requisitos regulatorios em producao.
      3. Modular architecture para adicionar novos controles sem refatorar.
      4. Regulatory compliance testing automatizado para novos requisitos.

      **Infraestrutura adaptavel:**
      5. Microservices architecture para risk platform (adicionar/remover servicos).
      6. Configuration management para ajustes de parametros sem deploy.
      7. Hot-deploy capability para mudancas urgentes em producao.
      8. Rollback rapido se mudanca regulatoria causar problema.
    tools:
      - gitlab-ci
      - feature-flags
      - configuration-management
      - monitoring-alerting
  secops:
    prose: |
      **Preparacao para supervisao:**
      1. Ponto focal designado para interacao com supervisao do BCB.
      2. Processo de resposta a demandas do BCB com SLA definido.
      3. Data room fisico e virtual para inspecoes do BCB.
      4. Treinamento da equipe para atendimento a supervisao.

      **Regulatory change management:**
      5. Monitoramento continuo de publicacoes regulatorias (BCB, CMN, CVM).
      6. Impact assessment formal para cada mudanca regulatoria relevante.
      7. Plano de implementacao com prazo, responsavel e recursos.
      8. Reporting de status de implementacao para comite de riscos.

      **Medidas prudenciais (inciso IV):**
      9. Plano de contingencia para cenario de capital add-on pelo BCB.
      10. Processo de resposta a determinacoes do BCB com prazo e responsavel.
      11. Comunicacao interna quando BCB impoe medida prudencial.
      12. Acompanhamento de resolucao ate encerramento pelo BCB.
    tools:
      - grc-platform
      - regulatory-change-management
      - reporting-platform
      - communication-platform
