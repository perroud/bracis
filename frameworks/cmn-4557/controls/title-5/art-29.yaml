id: art-29
family: title-5
title: "Transparencia e Divulgacao (Pilar 3)"
class: CMN-4557
statement:
  prose: |
    Art. 29. As instituições devem divulgar publicamente informações relativas ao
    gerenciamento de riscos e à adequação de capital, incluindo:
    I - descrição da estrutura de gerenciamento de riscos;
    II - informações sobre as metodologias utilizadas para mensuração de riscos;
    III - informações sobre a composição e a adequação de capital;
    IV - demais informações exigidas pelo Banco Central do Brasil.
guidance:
  prose: |
    O art. 29 implementa o Pilar 3 de Basileia (Market Discipline), que exige
    transparencia e divulgacao publica de informacoes sobre riscos e capital.

    **Pilar 3 - Disciplina de mercado:**
    A logica e que o mercado (investidores, depositantes, analistas, agencias de rating)
    pode exercer disciplina sobre a instituicao se tiver acesso a informacoes adequadas
    sobre riscos e capital. Transparencia complementa supervisao regulatoria.

    **Informacoes a divulgar (incisos I a IV):**

    **I - Estrutura de gerenciamento de riscos:**
    - Organograma da funcao de risco
    - Papel e responsabilidades do CRO e comite de riscos
    - Politicas de gerenciamento de riscos (resumo)
    - Risk Appetite Statement (resumo)
    - Processo de identificacao, mensuracao e monitoramento de riscos

    **II - Metodologias:**
    - Abordagem para risco de credito (padronizada ou IRB)
    - Abordagem para risco de mercado (padronizada ou IMA)
    - Abordagem para risco operacional (padronizada ou AMA)
    - Modelos de stress testing utilizados
    - Metodologia de classificacao de credito

    **III - Capital:**
    - Composicao de capital: CET1, AT1, Tier 2
    - Indices de capital: CET1 ratio, Tier 1 ratio, Total Capital ratio
    - RWA por tipo de risco
    - Leverage ratio
    - LCR e NSFR
    - Buffers de capital

    **IV - Requisitos adicionais do BCB:**
    - Resolucao BCB n. 54/2020 (Pilar 3)
    - Templates padronizados de divulgacao
    - Frequencia: trimestral para informacoes quantitativas, anual para qualitativas
    - Publicacao no site da instituicao

    **Periodicidade:**
    - Trimestral: metricas quantitativas de risco e capital
    - Anual: informacoes qualitativas sobre estrutura e metodologias
    - Imediata: eventos relevantes que afetem riscos ou capital
implementation_guidance:
  platform_engineering:
    prose: |
      **Pilar 3 reporting platform:**
      1. Automated report generation para templates padronizados do BCB.
      2. Data pipeline que consolide dados de risco e capital para disclosure.
      3. Publication platform: site da instituicao com secao dedicada de Pilar 3.
      4. Version control para relatorios publicados com historico.

      **Templates regulatorios:**
      5. Template engine para geracao de relatorios no formato exigido pelo BCB.
      6. Validacao automatica de completude e consistencia antes de publicacao.
      7. Reconciliacao entre dados publicados e dados internos.
      8. Audit trail de dados utilizados em cada publicacao.

      **Automacao do ciclo:**
      9. Pipeline automatizado: dados internos -> calculo -> template -> revisao -> publicacao.
      10. Calendar management para prazos de publicacao.
      11. Alertas quando prazo de publicacao se aproxima.
      12. Comparacao automatica com publicacoes anteriores (variance analysis).
    tools:
      - reporting-platform
      - data-lake
      - cms-platform
      - workflow-engine
  devsecops:
    prose: |
      **Pilar 3 no pipeline:**
      1. CI/CD para templates de relatorios regulatorios.
      2. Testes automatizados de consistencia de dados entre relatorios.
      3. Data validation pipeline antes de publicacao.
      4. Version control para templates e dados de disclosure.

      **Seguranca da divulgacao:**
      5. Processo de aprovacao antes de publicacao de informacoes sensiveis.
      6. Controle de acesso para dados pre-publicacao (embargo).
      7. Integridade dos dados publicados (checksums, assinatura digital).
      8. Monitoring de alteracoes nao autorizadas em dados publicados.
    tools:
      - gitlab-ci
      - data-quality-platform
      - cms-platform
  secops:
    prose: |
      **Governanca de disclosure:**
      1. Politica de divulgacao de informacoes de risco e capital aprovada.
      2. Processo de revisao e aprovacao antes de publicacao.
      3. Calendario de publicacao alinhado com prazos regulatorios.
      4. Responsavel (disclosure officer) designado para cada publicacao.

      **Compliance com Pilar 3:**
      5. Checklist de completude dos templates de Pilar 3.
      6. Revisao de qualidade por funcao de risco e controladoria.
      7. Reconciliacao com demonstracoes financeiras publicadas.
      8. Atendimento a requisitos adicionais do BCB.

      **Monitoramento:**
      9. Tracking de prazos de publicacao com alertas.
      10. Feedback de analistas e investidores sobre qualidade da informacao.
      11. Benchmark de disclosure contra peers do segmento.
      12. Acoes de melhoria continua da qualidade do disclosure.
    tools:
      - grc-platform
      - reporting-platform
      - document-management
      - compliance-scanner
