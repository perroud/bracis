id: art-31
family: title-5
title: "Documentacao e Retencao"
class: CMN-4557
statement:
  prose: |
    Art. 31. A instituição deve manter à disposição do Banco Central do Brasil, pelo
    prazo mínimo de cinco anos:
    I - a documentação relativa às estruturas de gerenciamento de riscos e de capital;
    II - os relatórios de gerenciamento de riscos e de capital;
    III - as atas das reuniões do conselho de administração, da diretoria e dos comitês
    que tratem de gerenciamento de riscos e de capital;
    IV - os registros de eventos de risco operacional, incluindo perdas;
    V - a documentação dos modelos e metodologias utilizados.
guidance:
  prose: |
    O art. 31 define requisitos de documentacao e retencao, que sao essenciais para
    auditoria, supervisao e evidenciacao de conformidade.

    **Prazo de retencao: 5 anos minimo.**
    Este e o prazo minimo regulatorio. Na pratica, muitas instituicoes reteem por
    periodos mais longos (7-10 anos) considerando prazos prescricionais civis e
    tributarios.

    **Documentacao exigida (incisos I a V):**

    **I - Estrutura de gerenciamento:**
    - Organograma da funcao de risco
    - Descricao das estruturas de gerenciamento de riscos e capital
    - Politicas de risco (todas as versoes)
    - RAS (todas as versoes)
    - Plano de capital (todas as versoes)

    **II - Relatorios:**
    - Relatorios diarios de risco de mercado (VaR, P&L, backtesting)
    - Relatorios mensais de risco de credito (carteira, provisao, concentracao)
    - Relatorios trimestrais de risco operacional (KRIs, perdas, RCSA)
    - Relatorios de liquidez (LCR, NSFR, posicao intraday)
    - Relatorios de capital (indices, projecoes, stress testing)

    **III - Atas:**
    - Atas do conselho de administracao (pontos de risco e capital)
    - Atas do comite de riscos
    - Atas do ALCO
    - Atas do comite de credito
    - Atas de outros comites que tratem de riscos

    **IV - Eventos de risco operacional:**
    - Base de dados de perdas operacionais
    - Registros de incidentes de TI e seguranca
    - Registros de near-misses
    - RCSAs realizados

    **V - Modelos e metodologias:**
    - Documentacao de modelos de risco (model books)
    - Relatorios de validacao de modelos
    - Resultados de backtesting
    - Premissas e parametros utilizados
implementation_guidance:
  platform_engineering:
    prose: |
      **Document management platform:**
      1. Enterprise content management (ECM) para documentacao de risco.
      2. Retencao automatizada com politicas de ciclo de vida (5 anos minimo).
      3. Imutabilidade: documentos retidos nao podem ser alterados ou deletados.
      4. Indexacao e busca full-text para recuperacao rapida.

      **Dados de risco:**
      5. Data lake de riscos com retencao de 5 anos minimo.
      6. Archiving strategy: dados quentes -> mornos -> frios (tier storage).
      7. Data integrity: checksums e assinaturas para garantir integridade.
      8. Data access: capacidade de recuperar dados historicos em tempo habil.

      **Audit trail:**
      9. Logging imutavel de todas as operacoes em sistemas de risco.
      10. Retencao de logs por 5 anos minimo.
      11. Tamper-proof audit trail (WORM storage ou blockchain-like).
      12. Capacidade de reconstruir estado de sistemas em qualquer ponto no passado.
    tools:
      - ecm-platform
      - data-lake
      - archive-storage
      - audit-logging
  devsecops:
    prose: |
      **Retencao de artefatos de desenvolvimento:**
      1. Git history preservado indefinidamente para sistemas de risco.
      2. Build artifacts retidos conforme politica de retencao.
      3. Container images versionadas e arquivadas.
      4. Model artifacts (pesos, parametros, dados de treino) retidos por 5+ anos.

      **Compliance de retencao:**
      5. Automated retention policies em repositorios e artifact stores.
      6. Deletion prevention para artefatos dentro do prazo de retencao.
      7. Compliance scan para verificar aderencia a politica de retencao.
      8. Data classification para aplicar retencao diferenciada.
    tools:
      - gitlab-ci
      - artifact-registry
      - archive-storage
      - data-classification
  secops:
    prose: |
      **Politica de retencao:**
      1. Politica de retencao de documentos aprovada pelo conselho.
      2. Inventario de documentos sujeitos a retencao regulatoria.
      3. Classificacao de documentos por tipo e prazo de retencao.
      4. Auditoria periodica de aderencia a politica de retencao.

      **Disponibilizacao ao BCB:**
      5. Capacidade de disponibilizar qualquer documento ao BCB em prazo curto.
      6. Processo de resposta a requisicoes do BCB para documentacao.
      7. Formato de documentos compativel com requisitos do BCB.
      8. Ponto focal designado para interacao com supervisao do BCB.

      **Gestao de atas (inciso III):**
      9. Processo formal de elaboracao e aprovacao de atas.
      10. Assinatura das atas pelos participantes.
      11. Armazenamento seguro e imutavel de atas.
      12. Indexacao de atas por assunto para recuperacao eficiente.
    tools:
      - ecm-platform
      - grc-platform
      - document-management
      - archive-storage
