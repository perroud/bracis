id: art-30
family: title-5
title: "Proporcionalidade e Segmentacao"
class: CMN-4557
statement:
  prose: |
    Art. 30. A implementação dos requisitos previstos nesta Resolução deve observar o
    princípio da proporcionalidade, considerando:
    I - o porte da instituição e seu enquadramento nos segmentos prudenciais (S1 a S5);
    II - o perfil de risco e a complexidade das operações;
    III - a relevância da instituição para o sistema financeiro;
    IV - a natureza das operações, produtos e serviços oferecidos.
guidance:
  prose: |
    O art. 30 formaliza o principio da proporcionalidade, que permeia toda a resolucao.
    Nem todas as instituicoes precisam implementar os requisitos com o mesmo nivel de
    sofisticacao.

    **Segmentacao prudencial do BCB (S1 a S5):**

    **S1 - Bancos sistemicamente importantes:**
    - Ativo total > 10% do PIB ou classificados como D-SIB
    - Requisitos mais rigorosos de todos os segmentos
    - Comite de riscos obrigatorio (art. 28)
    - Modelos internos (IRB, IMA) permitidos/incentivados
    - Reporting mais detalhado e frequente

    **S2 - Bancos de grande porte:**
    - Ativo total entre 1% e 10% do PIB
    - Requisitos similares ao S1, com algumas simplificacoes
    - Comite de riscos recomendado

    **S3 - Bancos de medio porte:**
    - Ativo total entre 0.1% e 1% do PIB
    - Abordagens padronizadas para calculo de capital
    - Estrutura de risco proporcional

    **S4 - Instituicoes de pequeno porte:**
    - Ativo total entre 0.01% e 0.1% do PIB
    - Requisitos simplificados
    - Foco em riscos mais relevantes para o modelo de negocio

    **S5 - Microinstituicoes:**
    - Ativo total < 0.01% do PIB
    - Requisitos minimos
    - Abordagem simplificada para todos os riscos
    - Foco em risco de credito e operacional basico

    **Principio da proporcionalidade na pratica:**
    - S1: risk engine dedicado, equipe de 50+ pessoas em riscos, modelos sofisticados
    - S3: plataforma de risco padrao, equipe de 5-10 pessoas, modelos simples
    - S5: planilhas controladas, 1-2 pessoas em riscos, calculos padronizados

    **O que nao e proporcional:**
    - Existencia da estrutura: todas devem ter (obrigatorio)
    - Designacao do CRO: todas devem ter (obrigatorio)
    - Politicas documentadas: todas devem ter (obrigatorio)
    - O que varia: sofisticacao, granularidade, frequencia, equipe, sistemas
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura por segmento:**
      1. S1/S2: risk platform enterprise com modulos dedicados por tipo de risco.
      2. S3/S4: plataforma de risco integrada com funcionalidades padronizadas.
      3. S5: solucao simplificada (SaaS) com calculos regulatorios basicos.
      4. Escalabilidade: infraestrutura que acompanhe crescimento da instituicao.

      **Proporcionalidade em TI:**
      5. S1: SOC 24/7, threat intelligence, red team, EDR/NDR, SIEM enterprise.
      6. S3: SOC parcial ou terceirizado, vulnerability scanning, SIEM basico.
      7. S5: antivirus, firewall, backup basico, monitoramento minimo.
      8. Todos: criptografia, controle de acesso, backup, BCP basico.

      **Automacao proporcional:**
      9. S1: automacao maxima de calculos, limites, reporting, compliance.
      10. S3: automacao de calculos regulatorios e reporting obrigatorio.
      11. S5: automaticacao minima, processos manuais com controle.
    tools:
      - risk-engine
      - grc-platform
      - monitoring-alerting
      - compliance-scanner
  devsecops:
    prose: |
      **Pipeline proporcional:**
      1. S1: pipeline completo com SAST, DAST, SCA, container scanning, secret detection,
         IaC scanning, signed commits, multi-stage approval.
      2. S3: pipeline com SAST, SCA, secret detection, code review.
      3. S5: code review basico, antivirus, backup de codigo.

      **Compliance-as-Code proporcional:**
      4. S1: policies codificadas para todos os requisitos da resolucao.
      5. S3: policies para requisitos mais criticos (credito, operacional).
      6. S5: checklist manual de compliance.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dependency-scanning
      - gitlab-secret-detection
  secops:
    prose: |
      **Estrutura de risco proporcional:**
      1. S1: CRO + equipe de 50+ em riscos, comite de riscos, validacao independente.
      2. S3: CRO + equipe de 5-10 em riscos, comite simplificado.
      3. S5: diretor responsavel + 1-2 analistas, funcao de risco compartilhada.

      **Reporting proporcional:**
      4. S1: reporting diario, semanal, mensal, trimestral, anual.
      5. S3: reporting semanal, mensal, trimestral.
      6. S5: reporting mensal, trimestral.

      **Assessment de proporcionalidade:**
      7. Avaliacao anual do enquadramento no segmento correto.
      8. Gap analysis entre requisitos do segmento e implementacao atual.
      9. Plano de adequacao quando instituicao muda de segmento (crescimento).
      10. Documentacao da aplicacao do principio de proporcionalidade.
    tools:
      - grc-platform
      - risk-management-platform
      - reporting-platform
