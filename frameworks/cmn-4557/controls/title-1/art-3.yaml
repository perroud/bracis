id: art-3
family: title-1
title: "Visao Integrada de Riscos"
class: CMN-4557
statement:
  prose: |
    Art. 3. A estrutura de gerenciamento de riscos deve prever a identificação, a mensuração,
    a avaliação, o monitoramento, o reporte, o controle e a mitigação dos riscos de forma
    integrada.

    Parágrafo único. A visão integrada de riscos deve considerar as interdependências entre
    os diversos tipos de risco e o impacto agregado sobre a instituição.
guidance:
  prose: |
    O art. 3 e um dos mais importantes da resolucao: exige visao integrada de riscos.
    Nao e permitido gerenciar cada tipo de risco de forma isolada em silos.

    **Ciclo de gerenciamento de riscos (7 etapas):**
    1. Identificacao: reconhecer riscos relevantes para a instituicao
    2. Mensuracao: quantificar riscos usando modelos, metricas e indicadores
    3. Avaliacao: julgar a materialidade e o impacto potencial de cada risco
    4. Monitoramento: acompanhar continuamente a evolucao dos riscos
    5. Reporte: comunicar riscos para a administracao e regulador
    6. Controle: implementar limites, politicas e procedimentos de mitigacao
    7. Mitigacao: reduzir riscos a niveis aceitos pelo apetite ao risco

    **Visao integrada (paragrafo unico):**
    A integracao exige que a instituicao considere:
    - Correlacao entre riscos: risco de mercado pode gerar risco de liquidez em crise
    - Concentracao cruzada: grande exposicao a um setor afeta credito, mercado e operacional
    - Efeito cascata: falha operacional pode gerar risco de liquidez e reputacional
    - Stress scenarios conjuntos: cenarios que impactam multiplos tipos de risco simultaneamente

    **Na pratica:**
    - O CRO (Chief Risk Officer) deve ter visao consolidada de todos os riscos
    - Comite de riscos deve analisar riscos de forma integrada, nao em reunioes separadas
    - Modelos de capital economico devem considerar correlacao entre riscos
    - Relatorios de risco devem apresentar visao consolidada alem de visoes individuais

    **Enterprise Risk Management (ERM):**
    A CMN 4.557 efetivamente exige um framework de ERM. Nao basta ter gestao de risco de
    credito excelente se o risco de liquidez e gerenciado de forma rudimentar. A visao
    integrada e a essencia da resolucao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma integrada de riscos:**
      1. Data lake de riscos unificado recebendo dados de credito, mercado, operacional
         e liquidez em formato padronizado.
      2. Risk aggregation engine que consolide exposicoes cross-risk type.
      3. Correlation matrix entre tipos de risco alimentada por dados historicos e
         cenarios de estresse.
      4. API de risco agregado que forneca visao consolidada para dashboards e relatorios.

      **Arquitetura de integracao:**
      5. Event bus centralizado para propagacao de eventos de risco entre silos.
      6. Schema registry para padronizacao de eventos de risco cross-domain.
      7. Real-time streaming para limites integrados (ex: limite que considera credito
         e mercado simultaneamente).
      8. Data mesh com dominio de risco como dominio central consumidor.

      **Dashboards integrados:**
      9. Risk dashboard executivo com heatmap integrado por tipo de risco.
      10. Drill-down de risco consolidado para risco individual.
      11. Cenarios de estresse integrados com impacto em capital, liquidez e P&L.
      12. Alertas cross-risk quando combinacao de riscos atinge threshold.
    tools:
      - data-lake
      - event-streaming
      - risk-engine
      - monitoring-alerting
      - bi-platform
  devsecops:
    prose: |
      **Integracao de riscos no desenvolvimento:**
      1. Risk tagging unificado em pipelines: cada deploy tagado com riscos afetados.
      2. Impact analysis automatizado: mudanca em sistema de credito avalia impacto em
         sistemas de mercado e liquidez.
      3. Integration testing cross-domain: testes que validam consistencia entre sistemas
         de risco.
      4. Deployment coordination para sistemas de risco interdependentes.

      **Qualidade dos dados de risco:**
      5. Data quality gates no pipeline de ingestao de dados de risco.
      6. Reconciliacao automatizada entre sistemas fonte e data lake de riscos.
      7. Schema validation para garantir consistencia cross-risk.

      **Observabilidade integrada:**
      8. Distributed tracing em pipelines de calculo de risco cross-domain.
      9. Metricas de latencia e throughput dos sistemas de risco integrados.
      10. Circuit breakers para evitar propagacao de falhas entre risk engines.
    tools:
      - gitlab-ci
      - data-quality-platform
      - distributed-tracing
      - service-mesh
  secops:
    prose: |
      **Gestao integrada operacional:**
      1. Comite de riscos integrado com pauta consolidada (credito + mercado + operacional + liquidez).
      2. Dashboard de risco agregado para alta administracao com visao 360 graus.
      3. Processo de escalacao integrado: risco em uma dimensao escala para avaliacao
         de impacto em outras dimensoes.
      4. Cenarios de estresse integrados (joint stress testing) validados periodicamente.

      **Reporting integrado:**
      5. Relatorio de riscos integrado trimestral para o conselho.
      6. Risk appetite framework com limites cross-risk.
      7. Capital allocation baseado em visao integrada de riscos.
      8. Backtesting integrado de cenarios de estresse.

      **Correlacao de riscos:**
      9. Analise de correlacao historica entre tipos de risco atualizada semestralmente.
      10. Inventario de interdependencias entre riscos documentado e revisado.
      11. Early warning system integrado que correlaciona sinais de diferentes tipos de risco.
      12. Post-mortem integrado quando eventos de risco impactam multiplas dimensoes.
    tools:
      - grc-platform
      - risk-management-platform
      - bi-platform
      - reporting-platform
