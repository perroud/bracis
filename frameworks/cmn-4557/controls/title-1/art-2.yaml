id: art-2
family: title-1
title: "Definicao de Risco"
class: CMN-4557
statement:
  prose: |
    Art. 2. Para fins desta Resolução, considera-se risco a possibilidade de ocorrência de
    eventos que possam afetar negativamente os resultados financeiros da instituição, incluindo
    sua capacidade de financiar suas operações.

    Parágrafo único. Os riscos abrangidos por esta Resolução incluem, entre outros:
    I - risco de crédito;
    II - risco de mercado;
    III - risco operacional;
    IV - risco de liquidez.
guidance:
  prose: |
    O art. 2 estabelece a taxonomia de riscos da resolucao. A definicao e ampla e
    deliberadamente nao exaustiva ("entre outros"), permitindo que a instituicao inclua
    riscos emergentes.

    **Definicao de risco:**
    Possibilidade de eventos com impacto negativo nos resultados financeiros ou na
    capacidade de financiamento. Essa definicao abrange:
    - Perdas financeiras diretas (inadimplencia, desvalorizacao de ativos)
    - Perdas financeiras indiretas (multas, custos de remediacao)
    - Impacto na capacidade de funding (risco de liquidez, risco reputacional)

    **Taxonomia de riscos (incisos I a IV):**

    **I - Risco de credito (art. 8-11):**
    Possibilidade de ocorrencia de perdas associadas ao nao cumprimento pelo tomador ou
    contraparte de suas obrigacoes financeiras nos termos pactuados. Inclui risco de
    concentracao, risco pais, risco de contraparte em derivativos.

    **II - Risco de mercado (art. 12-14):**
    Possibilidade de ocorrencia de perdas resultantes da flutuacao nos valores de mercado
    de posicoes detidas pela instituicao. Inclui risco de taxas de juros, risco cambial,
    risco de acoes, risco de commodities.

    **III - Risco operacional (art. 15-18):**
    Possibilidade de ocorrencia de perdas resultantes de falha, deficiencia ou inadequacao
    de processos internos, pessoas e sistemas, ou de eventos externos. Inclui risco de TI,
    risco cibernetico, risco juridico, risco de compliance, risco de modelo.

    **IV - Risco de liquidez (art. 19-21):**
    Possibilidade de a instituicao nao ser capaz de honrar eficientemente suas obrigacoes
    esperadas e inesperadas, correntes e futuras, sem afetar suas operacoes diarias.

    **Riscos nao listados expressamente mas abrangidos:**
    - Risco reputacional
    - Risco estrategico
    - Risco socioambiental
    - Risco de modelo
    - Risco de concentracao
implementation_guidance:
  platform_engineering:
    prose: |
      **Taxonomia de riscos como dados mestres:**
      1. Cadastro centralizado de taxonomia de riscos com hierarquia (tipo > subtipo > evento).
      2. APIs de risco que exponham classificacao e metricas por tipo de risco.
      3. Data model unificado para eventos de risco com atributos padronizados.
      4. Integracao da taxonomia de riscos com CMDB e inventario de ativos.

      **Infraestrutura por tipo de risco:**
      5. Risco de credito: pipeline de scoring, PD/LGD/EAD engines, provisioning systems.
      6. Risco de mercado: VaR engine, pricing libraries, market data feeds real-time.
      7. Risco operacional: event collection system, RCSA platform, KRI dashboards.
      8. Risco de liquidez: cash flow projection engine, LCR/NSFR calculators.

      **Data integration:**
      9. Event-driven architecture para captura de eventos de risco em tempo real.
      10. Data lineage completo dos dados de risco (origem -> transformacao -> consumo).
      11. Master data management para dados de contraparte, emissor e instrumento.
    tools:
      - data-lake
      - risk-engine
      - mdm-platform
      - event-streaming
      - api-gateway
  devsecops:
    prose: |
      **Risco operacional de TI no pipeline:**
      1. Classificacao de risco de mudancas no pipeline (baixo, medio, alto, critico).
      2. Scan de vulnerabilidades como proxy para risco de TI/cibernetico.
      3. Metricas de qualidade de codigo como indicador de risco operacional de software.
      4. Dependency scanning para risco de cadeia de suprimentos de software.

      **Rastreabilidade de riscos:**
      5. Tagging de issues e merge requests com tipo de risco afetado.
      6. Traceability matrix entre requisitos regulatorios e testes de software.
      7. Change failure rate como KRI de risco operacional de TI.

      **Model risk management:**
      8. Versionamento de modelos de risco em Git com testes de validacao.
      9. Pipeline de CI/CD para modelos de risco (backtesting automatizado).
      10. Segregacao de ambientes para desenvolvimento e producao de modelos.
    tools:
      - gitlab-ci
      - gitlab-dependency-scanning
      - sonarqube
      - mlflow
      - model-registry
  secops:
    prose: |
      **Gestao integrada de riscos:**
      1. Risk register unificado cobrindo credito, mercado, operacional e liquidez.
      2. RCSA (Risk and Control Self-Assessment) anual para risco operacional.
      3. Base de dados de eventos de perda operacional (OpRisk loss database).
      4. Processo de identificacao de riscos emergentes (emerging risk radar).

      **Monitoramento por tipo de risco:**
      5. Risco de credito: monitoramento de ratings, watchlist, early warning signals.
      6. Risco de mercado: monitoramento de limites VaR, P&L attribution, backtesting.
      7. Risco operacional: monitoramento de KRIs, incidentes, near-misses.
      8. Risco de liquidez: monitoramento de cash position, LCR, NSFR diarios.

      **Reporting regulatorio:**
      9. Consolidacao de dados de risco para reporte ao BCB (DLO, DRM).
      10. Painel de risco agregado para alta administracao e conselho.
    tools:
      - grc-platform
      - risk-management-platform
      - siem
      - reporting-platform
