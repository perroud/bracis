id: art-1
family: title-1
title: "Objeto da Resolucao"
class: CMN-4557
statement:
  prose: |
    Art. 1. Esta Resolução dispõe sobre a estrutura de gerenciamento de riscos e a estrutura
    de gerenciamento de capital a serem mantidas pelas instituições financeiras e demais
    instituições autorizadas a funcionar pelo Banco Central do Brasil.

    Parágrafo único. As estruturas mencionadas no caput devem ser compatíveis com o modelo
    de negócio, a natureza das operações e a complexidade dos produtos, serviços, atividades
    e processos da instituição.
guidance:
  prose: |
    O art. 1 define o escopo duplo da resolucao: gerenciamento de riscos e gerenciamento
    de capital. Sao duas estruturas distintas, mas interdependentes, que toda instituicao
    regulada pelo BCB deve manter.

    **Estrutura de gerenciamento de riscos:**
    Framework integrado para identificar, mensurar, avaliar, monitorar, reportar, controlar
    e mitigar riscos. Inclui risco de credito, mercado, operacional (incluindo TI/ciber),
    liquidez e demais riscos relevantes.

    **Estrutura de gerenciamento de capital:**
    Framework para planejamento de capital, definicao de metas, testes de estresse e
    adequacao de capital regulatorio. Garante que a instituicao mantenha capital suficiente
    para absorver perdas em cenarios adversos.

    **Proporcionalidade (paragrafo unico):**
    O principio da proporcionalidade e fundamental. A resolucao reconhece que um banco
    sistemicamente importante (D-SIB) exige estrutura de gerenciamento mais robusta que
    uma cooperativa de credito de pequeno porte. Os fatores de proporcionalidade sao:
    1. Modelo de negocio: banco de investimento vs. banco de varejo vs. cooperativa
    2. Natureza das operacoes: operacoes internacionais, derivativos, cambio
    3. Complexidade: produtos estruturados, securitizacao, operacoes off-balance

    **Implicacao pratica:**
    Toda instituicao autorizada pelo BCB deve manter ambas as estruturas. Nao ha excecao
    por porte ou tipo, mas a sofisticacao e escala dessas estruturas variam conforme
    proporcionalidade. Uma fintech de credito (SCD) tem obrigacoes diferentes de um
    banco multiplo S1.

    **Segmentacao prudencial (S1 a S5):**
    O BCB segmenta as instituicoes de S1 (grandes bancos sistemicamente importantes) a
    S5 (microinstituicoes). A CMN 4.557 aplica-se a todas, mas os requisitos especificos
    escalam com o segmento.
implementation_guidance:
  platform_engineering:
    prose: |
      **Framework de gerenciamento de riscos na infraestrutura:**
      1. Plataforma centralizada de GRC (Governance, Risk, Compliance) integrada com
         sistemas core da instituicao.
      2. Data lake de riscos consolidando dados de credito, mercado, operacional e
         liquidez com ingestao em tempo real.
      3. Risk engine escalavel capaz de processar modelos de risco de credito, VaR
         e stress testing em tempo habil.
      4. Infraestrutura de alta disponibilidade para sistemas de risco com RPO/RTO
         compativel com requisitos regulatorios.

      **Proporcionalidade na infraestrutura:**
      5. Definicao de tiers de infraestrutura alinhados a segmentacao prudencial (S1-S5).
      6. Instituicoes S1/S2: risk engine dedicado, data lake com petabytes, real-time
         streaming para limites operacionais.
      7. Instituicoes S3/S4: plataforma de risco compartilhada, batch processing para
         modelos menos criticos.
      8. Instituicoes S5: solucao simplificada com calculos padronizados.

      **Observabilidade de riscos:**
      9. Dashboards de risco em tempo real com drill-down por tipo de risco.
      10. Alertas automatizados quando limites de risco sao atingidos ou ultrapassados.
      11. Pipeline de dados de risco com qualidade monitorada (data lineage, data quality).
    tools:
      - grc-platform
      - risk-engine
      - data-lake
      - monitoring-alerting
      - data-quality-platform
  devsecops:
    prose: |
      **Riscos de TI no ciclo de desenvolvimento:**
      1. Integracao do risco operacional de TI no pipeline de CI/CD.
      2. Security gates que validam controles de risco antes de deploy em producao.
      3. Scan automatizado de vulnerabilidades como proxy para risco de TI.
      4. Change management automatizado com categorizacao de risco de mudancas.

      **Compliance-as-Code para CMN 4.557:**
      5. Codificacao dos requisitos da resolucao em politicas executaveis (OPA/Rego).
      6. Testes automatizados de conformidade com requisitos regulatorios de risco.
      7. Versionamento de modelos de risco em repositorios Git com historico auditavel.

      **Proporcionalidade no pipeline:**
      8. Pipeline diferenciado por criticidade do sistema (critico = mais gates).
      9. Sistemas de risco core: pipeline com aprovacao obrigatoria, scan completo.
      10. Sistemas auxiliares: pipeline simplificado com scan basico.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - sonarqube
      - checkov
      - change-management
  secops:
    prose: |
      **Governanca de riscos:**
      1. Inventario de riscos da instituicao atualizado trimestralmente.
      2. Risk assessment periodico (minimo anual) de todos os tipos de risco.
      3. Processo de escalacao de riscos emergentes ao conselho.
      4. Documentacao formal das estruturas de gerenciamento de riscos e capital.

      **Monitoramento continuo:**
      5. Monitoramento de indicadores-chave de risco (KRIs) em tempo real.
      6. Correlacao de eventos de risco operacional com incidentes de seguranca.
      7. Reporting regulatorio para BCB conforme cronograma exigido.

      **Auditoria e conformidade:**
      8. Auditoria interna periodica das estruturas de gerenciamento.
      9. Validacao independente de modelos de risco (model validation).
      10. Retencao de documentacao de risco por minimo 5 anos.
    tools:
      - grc-platform
      - siem
      - risk-management-platform
      - reporting-platform
