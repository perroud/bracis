id: art-9
family: title-2-cap-2
title: "Concentracao de Risco de Credito"
class: CMN-4557
statement:
  prose: |
    Art. 9. A estrutura de gerenciamento de riscos deve contemplar políticas e procedimentos
    para o gerenciamento do risco de concentração de crédito, incluindo:
    I - limites de concentração por contraparte, setor econômico, região geográfica e demais
    fatores de risco relevantes;
    II - acompanhamento periódico das concentrações de crédito;
    III - mecanismos de controle e mitigação das concentrações identificadas.
guidance:
  prose: |
    O art. 9 aborda especificamente o risco de concentracao de credito, que e um dos
    principais fatores de risco sistemico no sistema financeiro.

    **Risco de concentracao:**
    Possibilidade de perdas decorrentes de exposicao significativa a uma unica contraparte,
    grupo economico, setor ou regiao. A diversificacao e o principal mitigador.

    **Dimensoes de concentracao (inciso I):**

    **Por contraparte/grupo economico:**
    - Limite maximo de exposicao a um unico tomador (tipicamente 10-25% do patrimonio)
    - Grupo economico: agregar todas as entidades do grupo para fins de limite
    - Partes relacionadas: limites especificos conforme regulacao

    **Por setor economico:**
    - Limite por setor (agronegocio, construcao civil, energia, etc.)
    - Correlacao setorial: setores com alta correlacao de default devem ter limites mais baixos
    - Monitoramento de concentracao setorial versus benchmark de mercado

    **Por regiao geografica:**
    - Concentracao em regioes especificas do Brasil
    - Risco pais para exposicoes internacionais
    - Correlacao regional com fatores macroeconomicos

    **Outros fatores relevantes:**
    - Concentracao por moeda
    - Concentracao por tipo de garantia
    - Concentracao por produto/linha de credito
    - Concentracao por prazo de vencimento

    **Mecanismos de mitigacao (inciso III):**
    - Sindicalicacao de credito
    - Derivativos de credito (CDS)
    - Securitizacao
    - Diversificacao ativa da carteira
    - Limites de originacao por segmento
implementation_guidance:
  platform_engineering:
    prose: |
      **Concentration risk engine:**
      1. Aggregation engine que consolide exposicoes por contraparte, grupo economico,
         setor, regiao e outros fatores em tempo real.
      2. Limit management system com hierarquia de limites de concentracao.
      3. Pre-deal concentration check: antes de aprovar credito, verificar impacto
         na concentracao da carteira.
      4. Herfindahl-Hirschman Index (HHI) calculator automatizado por dimensao de concentracao.

      **Monitoramento de concentracao (inciso II):**
      5. Dashboard de concentracao com heatmap por setor, regiao, rating.
      6. Trend analysis de concentracao ao longo do tempo.
      7. Alertas quando concentracao se aproxima de limites.
      8. What-if analysis para simular impacto de novas operacoes na concentracao.

      **Data quality para concentracao:**
      9. Master data management para entidades (grupo economico, setor CNAE, UF).
      10. Linkage automatizado de tomadores a grupos economicos.
      11. Classificacao setorial padronizada (CNAE principal e secundario).
      12. Geocodificacao de tomadores para analise de concentracao regional.
    tools:
      - risk-engine
      - limit-management-system
      - mdm-platform
      - bi-platform
  devsecops:
    prose: |
      **Concentracao no pipeline:**
      1. Automacao de calculos de concentracao no batch de fim de dia.
      2. Data quality checks para dados de classificacao (setor, grupo economico).
      3. Testes automatizados de integridade da hierarquia de grupos economicos.
      4. Monitoring de drift nos dados mestres de concentracao.

      **Integracao de sistemas:**
      5. API de concentracao para sistemas de originacao consultarem limites disponives.
      6. Event-driven updates: nova operacao atualiza concentracao em tempo real.
      7. Reconciliacao automatizada entre sistemas de originacao e risk engine.
      8. Version control para regras de agregacao (grupo economico, setor).
    tools:
      - gitlab-ci
      - api-gateway
      - event-streaming
      - data-quality-platform
  secops:
    prose: |
      **Governanca de concentracao:**
      1. Politica de limites de concentracao aprovada pelo comite de riscos.
      2. Processo de excecao de limites de concentracao com alcada definida.
      3. Revisao semestral de limites de concentracao versus carteira efetiva.
      4. Stress testing de concentracao: impacto de default de maiores exposicoes.

      **Monitoramento e reporting:**
      5. Relatorio mensal de concentracao para comite de riscos.
      6. Top 10/20 maiores exposicoes com analise qualitativa.
      7. Concentracao setorial versus limite e versus benchmark de mercado.
      8. Evolucao da concentracao ao longo do tempo (tendencias).

      **Acoes de mitigacao:**
      9. Processo de reducao de concentracao quando limites sao excedidos.
      10. Avaliacao de instrumentos de mitigacao (sindicalicacao, CDS, securitizacao).
      11. Diversificacao ativa: metas de originacao que reduzam concentracao.
      12. Reporte ao BCB de grandes exposicoes conforme regulacao vigente.
    tools:
      - risk-management-platform
      - grc-platform
      - reporting-platform
      - credit-risk-platform
