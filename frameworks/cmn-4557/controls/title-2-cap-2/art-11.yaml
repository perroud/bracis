id: art-11
family: title-2-cap-2
title: "Validacao de Modelos de Credito"
class: CMN-4557
statement:
  prose: |
    Art. 11. As instituições que utilizem modelos internos para fins de apuração do
    requerimento mínimo de capital referente ao risco de crédito devem prever:
    I - processo de validação independente dos modelos internos;
    II - documentação completa dos modelos, incluindo premissas, limitações e metodologias;
    III - testes periódicos de desempenho dos modelos (backtesting);
    IV - processo de aprovação e revisão dos modelos pela administração.
guidance:
  prose: |
    O art. 11 trata do model risk management especificamente para modelos de credito.
    E particularmente relevante para instituicoes que usam abordagens IRB (Internal
    Ratings-Based) para calculo de capital regulatorio.

    **Model risk management (MRM):**
    Modelos de credito sao ferramentas criticas que influenciam provisao, capital
    regulatorio e decisoes de negocio. Erros em modelos podem causar sub-provisionamento,
    sub-capitalizacao e perdas inesperadas.

    **Validacao independente (inciso I):**
    - Equipe de validacao separada da equipe que desenvolve os modelos
    - Validacao cobre: fundamentacao conceitual, verificacao de implementacao,
      backtesting, benchmarking, analise de sensibilidade
    - Periodicidade minima anual para modelos em producao
    - Validacao antes de implantacao de novos modelos

    **Documentacao (inciso II):**
    - Model inventory: catalogo de todos os modelos em uso
    - Model documentation: para cada modelo, documento com:
      - Objetivo e escopo de aplicacao
      - Base teorica e fundamentacao conceitual
      - Dados utilizados (fonte, tratamento, limitacoes)
      - Metodologia (algoritmo, calibracao, parametros)
      - Premissas e limitacoes conhecidas
      - Resultados de validacao e backtesting

    **Backtesting (inciso III):**
    - Comparacao de previsoes do modelo com resultados realizados
    - Para PD: default rate prevista vs. realizada por faixa de rating
    - Para LGD: recovery rate prevista vs. realizada
    - Metricas: Gini coefficient, KS statistic, AUC-ROC, Hosmer-Lemeshow
    - Traffic light approach: verde (OK), amarelo (monitorar), vermelho (remediar)

    **Aprovacao pela administracao (inciso IV):**
    - Comite de modelos ou comite de riscos deve aprovar modelos antes de uso
    - Revisao periodica de modelos em producao (minimo anual)
    - Processo de sunset/decommissioning de modelos obsoletos
implementation_guidance:
  platform_engineering:
    prose: |
      **Model risk management platform:**
      1. Model inventory system centralizado com metadados de todos os modelos.
      2. Model lifecycle management: desenvolvimento -> validacao -> aprovacao -> producao
         -> monitoramento -> revisao -> sunset.
      3. Automated backtesting pipeline com metricas padronizadas.
      4. Challenger model framework para comparar modelos alternativos.

      **Infraestrutura de modelos:**
      5. Feature store centralizado para variaveis de credito.
      6. Model serving platform com versionamento e rollback.
      7. A/B testing infrastructure para comparacao de modelos em producao.
      8. Model monitoring com alertas de degradacao de performance.

      **Documentacao automatizada:**
      9. Model documentation generator a partir de metadados e resultados.
      10. Lineage tracking: dados -> features -> modelo -> output -> decisao.
      11. Reproducibilidade: capacidade de reproduzir qualquer modelo em qualquer ponto no tempo.
      12. Audit trail de todas as versoes de modelos e suas aprovacoes.
    tools:
      - mlflow
      - model-registry
      - feature-store
      - model-monitoring
      - data-lineage-platform
  devsecops:
    prose: |
      **MLOps para modelos de credito:**
      1. CI/CD pipeline para modelos: treino, validacao, backtesting, deploy.
      2. Testes automatizados: discriminacao (Gini, KS, AUC), calibracao (Hosmer-Lemeshow),
         estabilidade (PSI), integracao.
      3. Code review obrigatorio para mudancas em modelos de credito.
      4. Segregacao de ambientes: desenvolvimento, validacao, producao.

      **Versionamento e reproducibilidade:**
      5. Model versioning em Git com dados, codigo e parametros rastreados.
      6. Data versioning para bases de treinamento e validacao.
      7. Containerizacao de modelos para consistencia entre ambientes.
      8. Pipeline de retreino automatizado quando dados novos estao disponiveis.

      **Seguranca de modelos:**
      9. Access control diferenciado: quem pode treinar vs. quem pode fazer deploy.
      10. Criptografia de modelos em repouso (protecao de propriedade intelectual).
      11. Logging de todas as predicoes para auditoria e backtesting.
      12. Alertas de model drift (populacao mudou, performance caiu).
    tools:
      - gitlab-ci
      - mlflow
      - docker
      - model-registry
      - feature-store
  secops:
    prose: |
      **Governanca de modelos:**
      1. Model risk policy aprovada pelo comite de riscos.
      2. Comite de modelos com representantes de risco, negocio e TI.
      3. Processo de aprovacao de novos modelos com documentacao completa.
      4. Inventario de modelos revisado trimestralmente.

      **Validacao independente (inciso I):**
      5. Equipe de validacao de modelos independente da equipe de desenvolvimento.
      6. Plano anual de validacao cobrindo todos os modelos em producao.
      7. Relatorio de validacao com findings classificados por severidade.
      8. Tracking de findings ate resolucao completa.

      **Monitoramento continuo:**
      9. Monitoramento mensal de metricas de performance dos modelos.
      10. Backtesting trimestral com relatorio para comite de riscos.
      11. PSI (Population Stability Index) mensal para detectar mudancas de populacao.
      12. Processo de trigger para revisao antecipada quando performance deteriora.
    tools:
      - model-validation-platform
      - grc-platform
      - risk-management-platform
      - reporting-platform
