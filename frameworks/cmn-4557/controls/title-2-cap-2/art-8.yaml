id: art-8
family: title-2-cap-2
title: "Identificacao e Mensuracao do Risco de Credito"
class: CMN-4557
statement:
  prose: |
    Art. 8. A estrutura de gerenciamento de riscos deve contemplar, relativamente ao risco
    de crédito, sistemas e procedimentos para:
    I - a identificação, a mensuração, a avaliação, o monitoramento, o reporte, o controle e
    a mitigação do risco de crédito, tanto em nível individual quanto agregado;
    II - a classificação das exposições de crédito por níveis de risco;
    III - a avaliação da capacidade de pagamento de tomadores e contrapartes;
    IV - a constituição de provisões para créditos de liquidação duvidosa.
guidance:
  prose: |
    O art. 8 detalha os requisitos para gestao do risco de credito, que e tipicamente o
    maior risco para instituicoes bancarias.

    **Ciclo completo de gestao de credito (inciso I):**
    As sete etapas do gerenciamento devem ser aplicadas ao risco de credito tanto para
    exposicoes individuais quanto para a carteira como um todo.

    **Individual:**
    - Analise de credito por tomador (PF ou PJ)
    - Rating/scoring de credito com modelos validados
    - Monitoramento de comportamento de pagamento
    - Reclassificacao quando indicadores de deterioracao surgem

    **Agregado (carteira):**
    - Concentracao por setor, regiao, rating, produto
    - Migracao de rating (transition matrices)
    - Perda esperada e inesperada da carteira
    - Correlacao de default entre tomadores

    **Classificacao por niveis de risco (inciso II):**
    A Resolucao 2.682/1999 do CMN define 9 niveis de risco (AA, A, B, C, D, E, F, G, H).
    A classificacao deve ser:
    - Baseada em criterios objetivos e subjetivos
    - Atualizada periodicamente (mensal para varejo, trimestral para atacado)
    - Documentada com justificativa

    **Capacidade de pagamento (inciso III):**
    Analise de credito deve avaliar:
    - Capacidade financeira (renda, fluxo de caixa, endividamento)
    - Historico de credito (bureau de credito, SCR)
    - Garantias e colateral
    - Ambiente economico e setorial

    **Provisoes (inciso IV):**
    Provisao para creditos de liquidacao duvidosa conforme Resolucao 2.682/1999:
    - Provisao minima por nivel de risco (AA=0%, A=0.5%, B=1%, ..., H=100%)
    - Provisao adicional quando criterios internos indicam necessidade
    - Mark-to-market de garantias para ajuste de provisao
implementation_guidance:
  platform_engineering:
    prose: |
      **Credit risk engine:**
      1. Plataforma de scoring/rating com modelos estatisticos (logistic regression,
         gradient boosting, neural networks) para PF e PJ.
      2. PD (Probability of Default) engine com modelos calibrados e validados.
      3. LGD (Loss Given Default) engine considerando garantias e recovery rates.
      4. EAD (Exposure at Default) calculator para linhas comprometidas e nao comprometidas.

      **Monitoramento de carteira:**
      5. Portfolio analytics platform com metricas de concentracao, migracao e vintage.
      6. Early warning system para deterioracao de credito (triggers de alerta).
      7. Dashboard de carteira de credito com segmentacao por setor, regiao, rating, produto.
      8. Stress testing de credito: impacto de cenarios adversos na carteira.

      **Provisao automatizada (inciso IV):**
      9. Provisioning engine que calcula provisao conforme Res. 2.682/1999 automaticamente.
      10. IFRS 9/CPC 48 engine para provisao em 3 estagios (ECL model).
      11. Reconciliacao automatica entre provisao regulatoria e contabil.
      12. Audit trail completo de todas as decisoes de provisao.
    tools:
      - credit-scoring-platform
      - risk-engine
      - data-lake
      - bi-platform
      - provisioning-engine
  devsecops:
    prose: |
      **Modelos de credito no pipeline:**
      1. CI/CD para modelos de scoring/rating com backtesting automatizado.
      2. Model versioning em Git com testes de discriminacao (Gini, KS, AUC-ROC).
      3. Feature store para variaveis de credito com data lineage.
      4. A/B testing para novos modelos antes de promocao a producao.

      **Qualidade de dados de credito:**
      5. Data quality gates para dados de credito no pipeline de ingestao.
      6. Validacao de dados do SCR (Sistema de Informacoes de Credito do BCB).
      7. Reconciliacao automatizada entre sistemas de originacao e risco.
      8. Monitoring de drift em variaveis de scoring (population stability index).

      **Seguranca de dados de credito:**
      9. Criptografia de dados de credito em repouso e em transito.
      10. Access control granular para dados de credito (RBAC/ABAC).
      11. Mascaramento de dados de credito em ambientes nao produtivos.
      12. Audit logging de acesso a dados de credito.
    tools:
      - mlflow
      - gitlab-ci
      - data-quality-platform
      - vault
      - model-registry
  secops:
    prose: |
      **Governanca de credito:**
      1. Politica de credito documentada e aprovada pelo conselho.
      2. Comite de credito com alcada de aprovacao definida por faixa de valor.
      3. Processo de concessao com segregacao entre comercial e risco.
      4. Revisao periodica de limites de credito (anual para grandes exposicoes).

      **Monitoramento de risco de credito:**
      5. Monitoramento diario de inadimplencia e atraso por safra e segmento.
      6. Analise de migracao de rating trimestral (transition matrices).
      7. Monitoramento de concentracao por contraparte, setor e regiao.
      8. Early warning indicators: deterioracao de rating, atraso, renegociacao.

      **Provisao e reporte:**
      9. Processo mensal de classificacao e provisao conforme Res. 2.682/1999.
      10. Reporte ao BCB via DLO (Documento de Liquidacao Obrigatoria).
      11. Relatorio de risco de credito para comite de riscos e conselho.
      12. Validacao independente de modelos de credito (minimo anual).
    tools:
      - grc-platform
      - credit-risk-platform
      - reporting-platform
      - model-validation-platform
