id: samm-des-threat-assessment
family: design
title: "Threat Assessment"
class: OWASP-SAMM-v2
baselines: [level-1, level-2, level-3]

statement:
  prose: >-
    Identify and evaluate potential threats to software systems through structured threat
    modeling and risk assessment activities performed throughout the design and development
    lifecycle. Produce actionable threat models that drive security requirements, design
    decisions, and test cases. Maintain threat models as living documents updated in
    response to architectural changes, new feature development, and evolving threat
    intelligence.
  parts:
    - id: samm-des-threat-assessment_smt.a
      label: "Stream A — Application Risk Profile"
      prose: >-
        Establish a risk classification scheme for software assets based on data sensitivity,
        business criticality, regulatory exposure, and attack surface. Maintain an inventory
        of all software assets classified by risk tier. Use risk classification to prioritize
        security investments, determine required maturity levels for each system, and
        establish appropriate security testing requirements. Review risk classifications
        when systems undergo significant changes or when business context changes.
    - id: samm-des-threat-assessment_smt.b
      label: "Stream B — Threat Modeling"
      prose: >-
        Perform threat modeling for all new software systems and significant changes to
        existing systems. Use structured methodologies such as STRIDE, PASTA, or LINDDUN
        to systematically identify threats against data flows, trust boundaries, and
        system components. Document threats, their likelihood and impact, and mitigating
        controls. Translate threat model outputs into security requirements, architecture
        decisions, and test cases. Ensure threat models are reviewed by security-knowledgeable
        participants and updated as systems evolve.

guidance:
  prose: >-
    Threat assessment is the foundation of risk-informed security design. Without it,
    teams implement security controls based on convention rather than actual risk, leading
    to both over-engineering in low-risk areas and blind spots in high-risk ones. At
    maturity level 1, the organization performs ad-hoc risk classification and conducts
    informal threat discussions for new projects. At level 2, risk classification is
    systematic and enforced for all new projects; threat modeling uses a defined
    methodology and produces documented outputs. At level 3, threat models are
    continuously updated, automated tooling assists with threat enumeration, threat
    model outputs are formally linked to security test cases, and assessment activities
    incorporate threat intelligence to account for active attack patterns against
    similar systems.

references:
  - citation: "OWASP SAMM v2.0 — Design: Threat Assessment"
    url: "https://owaspsamm.org/model/design/threat-assessment/"
  - citation: "OWASP Threat Modeling Cheat Sheet"
    url: "https://cheatsheetseries.owasp.org/cheatsheets/Threat_Modeling_Cheat_Sheet.html"
  - citation: "STRIDE Threat Modeling — Microsoft"
    url: "https://learn.microsoft.com/en-us/azure/security/develop/threat-modeling-tool"

implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate threat modeling as a platform service accessible from the IDP. Provide
      self-service threat model templates in Backstage scaffolding for common architectural
      patterns (REST API, microservice, data pipeline). Automate risk classification
      by ingesting metadata from the software catalog (data classification, compliance
      tags, external exposure flags) and computing a risk score automatically. Store
      threat models as code in version-controlled repositories alongside architecture
      documentation. Link threat model findings to security requirement controls in the
      platform's policy engine.
    tools:
      - "OWASP Threat Dragon"
      - "IriusRisk"
      - "Backstage (Software Catalog)"
      - "Miro / Lucidchart (DFD diagrams)"
      - "ADR (Architecture Decision Records)"
  devsecops:
    prose: >-
      Make threat model review a mandatory gate in the design phase of the software
      development lifecycle, blocking feature work until threat models are approved for
      high-risk features. Integrate threat modeling outputs into issue trackers as
      security requirements linked to epics and user stories. Automate the generation
      of security test cases from threat model threat enumeration — each identified
      threat should produce at least one security test case in the test plan. Use
      pipeline tooling to verify that threat models exist and are current (updated
      within the defined review period) for all systems with production traffic.
    tools:
      - "OWASP Threat Dragon"
      - "ThreatSpec (threat models as code)"
      - "Jira / GitLab Issues (security requirement tracking)"
      - "GitLab CI/CD (threat model freshness checks)"
      - "MITRE ATT&CK (threat enumeration)"
  secops:
    prose: >-
      Incorporate threat intelligence into threat assessment activities to ensure threat
      models reflect active attack patterns against the organization's technology stack
      and industry. Correlate security incidents with existing threat models to identify
      gaps — threats that materialized but were not identified in the model. Conduct
      red team exercises aligned to high-risk threat scenarios from threat models.
      Maintain an organization-wide threat library derived from threat models and
      incident data, providing a shared vocabulary for cross-team risk discussions.
    tools:
      - "MISP (threat intelligence platform)"
      - "Recorded Future / Mandiant"
      - "MITRE ATT&CK Navigator"
      - "Vectra AI / Darktrace (threat detection)"
      - "Splunk SOAR (incident correlation)"
