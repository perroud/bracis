id: samm-ver-architecture-assessment
family: verification
title: "Architecture Assessment"
class: OWASP-SAMM-v2
baselines: [level-1, level-2, level-3]

statement:
  prose: >-
    Systematically review software architectures to verify that security controls are
    designed correctly, implemented as intended, and effective against the threats
    identified in threat models. Conduct architecture risk analysis to identify design
    flaws that cannot be addressed by code-level fixes. Integrate architecture review
    findings into the threat model, security requirements, and design guidance to prevent
    recurrence of identified design weaknesses.
  parts:
    - id: samm-ver-arch-assessment_smt.a
      label: "Stream A — Architecture Validation"
      prose: >-
        Perform systematic architecture reviews for all new software systems and
        significant changes to existing systems, verifying alignment with security
        architecture principles, reference architectures, and threat model mitigations.
        Review authentication and authorization designs, cryptographic implementations,
        trust boundary definitions, and data flow security. Produce architecture review
        reports documenting findings, risk ratings, and recommended remediations.
        Track findings to closure and verify re-implementation before system launch.
    - id: samm-ver-arch-assessment_smt.b
      label: "Stream B — Architecture Mitigation"
      prose: >-
        Conduct architecture risk analysis to quantify the residual risk of identified
        architecture weaknesses, prioritize mitigation efforts based on exploitability
        and business impact, and define compensating controls where complete remediation
        is not immediately feasible. Feed architecture findings back into threat models
        and security requirements to improve future designs. Track architecture debt
        and ensure it is addressed in planned system evolution roadmaps.

guidance:
  prose: >-
    Architecture flaws are the most expensive security defects to fix because they
    require structural changes rather than code patches. A SQL injection can be fixed
    in a day; a fundamentally insecure authentication architecture may require months
    of redesign. At maturity level 1, the organization performs informal design reviews
    for major new systems. At level 2, architecture reviews use a defined methodology,
    produce formal reports, and are mandatory for systems above a risk threshold. At
    level 3, architecture reviews are deeply integrated with threat models, automated
    compliance checks validate architectural controls continuously, and a library of
    approved architecture patterns reduces the surface area for new architectural
    vulnerabilities.

references:
  - citation: "OWASP SAMM v2.0 — Verification: Architecture Assessment"
    url: "https://owaspsamm.org/model/verification/architecture-assessment/"
  - citation: "OWASP Architecture Review Cheat Sheet"
    url: "https://cheatsheetseries.owasp.org/cheatsheets/Attack_Surface_Analysis_Cheat_Sheet.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Maintain architecture pattern libraries in the IDP that encode security-reviewed
      reference designs for common system types. Implement automated architecture
      conformance checks in CI/CD that validate deployed configurations match approved
      architectural patterns — using policy-as-code to verify network policy existence,
      service mesh enrollment, authentication middleware configuration, and secrets
      management integration. Provide architecture review request workflows in the
      platform where teams can submit designs for security review, with turnaround SLAs
      based on risk classification. Track architecture review findings as platform-managed
      security debt items linked to the relevant software catalog entries.
    tools:
      - "Backstage (architecture pattern library)"
      - "Kyverno / OPA (architecture conformance)"
      - "C4 Model tools (architecture diagrams)"
      - "Miro / Structurizr (design review tooling)"
      - "GitLab Wiki (architecture decision records)"
  devsecops:
    prose: >-
      Automate architecture conformance testing using infrastructure-as-code scanning
      and Kubernetes admission control to continuously verify that deployed systems
      match their approved architectures. Include architecture review as a mandatory
      stage in the project launch checklist, gating production deployment until a
      signed architecture review report is attached to the deployment record. Implement
      automated detection of architectural anti-patterns — missing authentication,
      direct database access from public endpoints, unencrypted inter-service communication
      — using custom SAST rules and network policy validation.
    tools:
      - "Checkov / tfsec (IaC architecture validation)"
      - "Kube-bench / Kube-hunter (Kubernetes architecture assessment)"
      - "Semgrep (custom architecture anti-pattern rules)"
      - "Istio / Linkerd (mTLS enforcement verification)"
      - "GitLab CI/CD (architecture review gate)"
  secops:
    prose: >-
      Conduct annual or change-triggered architecture risk assessments for all critical
      systems, using security architects or qualified external reviewers. Maintain an
      architecture risk register that tracks identified design weaknesses, residual risk
      acceptance decisions, and compensating controls. Correlate architecture findings
      with incident data to identify cases where architectural weaknesses contributed
      to security events. Provide architecture assessment findings to penetration testers
      to focus testing on high-risk design areas.
    tools:
      - "Architecture review frameworks (SABSA, TOGAF)"
      - "Risk registers (ServiceNow, Archer)"
      - "Threat modeling tools (IriusRisk)"
      - "Penetration testing management (Cobalt.io, Synack)"
      - "MITRE ATT&CK for architecture mapping"
