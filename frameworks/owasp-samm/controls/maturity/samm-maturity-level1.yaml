id: samm-maturity-level1
family: maturity
title: "Maturity Level 1 — Initial"
class: OWASP-SAMM-v2
baselines: [level-1]

statement:
  prose: >-
    At SAMM Maturity Level 1, the organization demonstrates initial understanding and
    ad-hoc application of software security practices across the five business functions.
    Activities at this level are typically unstructured, reactive, and not consistently
    applied across all projects and teams. The primary objective is to establish a
    foundation of security awareness and begin formalizing security activities that
    will be systematically expanded at higher maturity levels.
  parts:
    - id: samm-maturity-level1_governance
      label: "Governance at Level 1"
      prose: >-
        The organization has identified at least one person responsible for software
        security. A basic software security policy exists and is communicated to
        development teams. Security awareness training is available, though completion
        may not be tracked or enforced. Compliance obligations are identified but
        tracking is manual and incomplete.
    - id: samm-maturity-level1_design
      label: "Design at Level 1"
      prose: >-
        Software assets are informally classified by risk. Threat modeling is performed
        ad-hoc for major new systems, without a standardized methodology. Basic security
        requirements are defined by referencing a checklist (such as OWASP Top 10 or
        OWASP ASVS Level 1). Security architecture principles are applied informally
        and rely on individual developer knowledge rather than documented standards.
    - id: samm-maturity-level1_implementation
      label: "Implementation at Level 1"
      prose: >-
        The organization uses version control and has a basic build process. SAST and
        dependency scanning tools are available but may not be integrated into CI/CD
        or consistently used. Secrets are stored in a vault rather than hardcoded,
        though the policy may not be uniformly enforced. Deployment is manual or
        semi-automated without comprehensive security validation gates.
    - id: samm-maturity-level1_verification
      label: "Verification at Level 1"
      prose: >-
        Basic security testing is performed, primarily through ad-hoc manual review or
        opportunistic scanning. Architecture reviews occur for major new systems but
        lack formal methodology. DAST scans may be run periodically against production
        but are not integrated into pipelines. Penetration testing is conducted annually
        for the most critical systems, if at all.
    - id: samm-maturity-level1_operations
      label: "Operations at Level 1"
      prose: >-
        Basic security logging is in place for production systems. Security incidents
        are handled reactively with informal procedures. Environment hardening is applied
        inconsistently, relying on individual administrator knowledge. Data classification
        exists at a high level; data protection controls are applied to the most sensitive
        data but may not cover all sensitive data flows.

guidance:
  prose: >-
    Level 1 is the starting point, not the destination. Organizations at Level 1 have
    reduced their most obvious risks — they are not storing secrets in source code,
    not completely ignoring security testing, and not operating without any security
    policy. However, they are highly dependent on individual expertise and the right
    people asking the right questions at the right time. The primary risk at Level 1
    is inconsistency: projects handled by security-aware developers are reasonably
    secure; projects that do not happen to involve those individuals are not. The
    transition from Level 1 to Level 2 requires systematizing — converting tacit
    individual knowledge into explicit, enforced organizational processes.

references:
  - citation: "OWASP SAMM v2.0 — Maturity Overview"
    url: "https://owaspsamm.org/about/"
  - citation: "OWASP SAMM v2.0 Assessment Guide"
    url: "https://owaspsamm.org/guidance/quick-start-guide/"

implementation_guidance:
  platform_engineering:
    prose: >-
      At Level 1, the platform team should focus on creating and enforcing a minimal
      set of mandatory security controls as platform defaults — basic SAST and dependency
      scanning in all CI/CD pipelines, Vault integration for secrets management, and
      a basic software catalog for asset inventory. These defaults should require zero
      additional effort from development teams, making Level 1 compliance the natural
      outcome of using the platform rather than a separate activity.
    tools:
      - "GitLab CI/CD (basic pipeline with SAST)"
      - "HashiCorp Vault (secrets management)"
      - "Backstage (software catalog)"
      - "Trivy (dependency scanning)"
  devsecops:
    prose: >-
      Enable SAST and dependency scanning in CI/CD for all projects, configured to
      report findings without blocking builds initially. Implement basic secrets scanning
      to detect and block credential commits. Establish a shared pipeline template that
      includes these baseline security scans, making it the default for new projects.
      Focus on generating visibility into the security posture rather than enforcing
      gates that teams will work around.
    tools:
      - "GitLab SAST"
      - "GitLab Secret Detection"
      - "GitLab Dependency Scanning"
      - "Trivy"
  secops:
    prose: >-
      Conduct a baseline SAMM assessment to establish the current maturity score across
      all five business functions. Identify the three to five highest-risk gaps and
      create a prioritized improvement roadmap. Ensure basic security logging and
      alerting is operational for production systems. Document the organization's
      risk tolerance and use it to prioritize which systems require accelerated maturity
      improvement beyond the Level 1 baseline.
    tools:
      - "OWASP SAMM Assessment Toolbox"
      - "SIEM (basic security logging)"
      - "Risk register (gap tracking)"
