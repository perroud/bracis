id: samm-maturity-level3
family: maturity
title: "Maturity Level 3 — Defined"
class: OWASP-SAMM-v2
baselines: [level-3]

statement:
  prose: >-
    At SAMM Maturity Level 3, the organization demonstrates comprehensive, efficient,
    and continuously improving software security practices fully integrated into the
    software development lifecycle. Security activities are data-driven, proactively
    optimized based on measured outcomes, and embedded so deeply in development workflows
    that they are indistinguishable from standard engineering practices. The organization
    is capable of continuous security improvement without external pressure.
  parts:
    - id: samm-maturity-level3_governance
      label: "Governance at Level 3"
      prose: >-
        Security program KPIs are benchmarked against industry peers and integrated into
        organizational OKRs or strategic planning cycles. The security champions program
        has formal authority to enforce security standards within their teams, with
        chartered responsibilities and escalation paths. Training effectiveness is measured
        through pre/post assessments and correlated with vulnerability metrics. Compliance
        evidence is generated automatically by CI/CD pipelines, enabling on-demand audit
        reports without manual evidence collection.
    - id: samm-maturity-level3_design
      label: "Design at Level 3"
      prose: >-
        Threat models are maintained as living documents continuously updated in response
        to architectural changes, with automated change detection triggering review
        workflows. Risk classification is automated from service metadata. Security
        requirements are automatically generated from threat model outputs and risk
        classification, linked directly to test cases for automated verification. Security
        architecture compliance is enforced continuously through policy-as-code that
        validates deployed systems against approved patterns in real time.
    - id: samm-maturity-level3_implementation
      label: "Implementation at Level 3"
      prose: >-
        Build pipelines achieve SLSA Level 3 or higher, with full provenance attestation
        and reproducible builds. Supply chain security controls verify the authenticity
        and integrity of all build tool components and base images. Dependency management
        is fully automated with zero-standing-approval workflows for low-risk updates.
        Secrets management follows a zero-standing-privilege model with dynamic,
        short-lived credentials for all production systems. Deployment uses progressive
        delivery with automated security validation gates triggering rollback on anomalies.
    - id: samm-maturity-level3_verification
      label: "Verification at Level 3"
      prose: >-
        Security test coverage is comprehensive, with automated tests covering all
        security requirements and threat model mitigations. DAST findings are automatically
        fed back to improve SAST rules, creating a self-improving detection pipeline.
        A continuous red team capability or adversarial simulation program provides
        ongoing validation beyond periodic penetration tests. A mature bug bounty program
        provides continuous external validation with structured triage, remediation, and
        researcher engagement.
    - id: samm-maturity-level3_operations
      label: "Operations at Level 3"
      prose: >-
        Security incident detection employs ML-based behavioral analytics that identify
        zero-day exploitation patterns beyond signature-based rules. Post-incident review
        findings are systematically tracked to product backlog items and drive preventive
        controls. Environment management is fully immutable — production changes require
        pipeline execution, making unauthorized modification impossible. Data protection
        is enforced automatically through platform controls, and data lifecycle compliance
        can be demonstrated on demand with automated evidence.

guidance:
  prose: >-
    Level 3 is the state where security has become an engineering discipline, not a
    compliance activity. Organizations at Level 3 are generating novel threat intelligence
    from their own telemetry, contributing to industry security knowledge through
    vulnerability research, and running red teams that challenge security controls
    continuously. The distinction from Level 2 is the feedback loop — at Level 3,
    the organization learns from its security data and continuously improves, rather
    than simply executing defined processes. Maintaining Level 3 requires sustained
    investment and organizational commitment because it represents a dynamic state,
    not a certificate to be obtained once.

references:
  - citation: "OWASP SAMM v2.0 — Maturity Level 3 Activities"
    url: "https://owaspsamm.org/model/"
  - citation: "BSIMM (Building Security In Maturity Model)"
    url: "https://www.bsimm.com/"
  - citation: "SLSA Framework — Supply Chain Security"
    url: "https://slsa.dev/"

implementation_guidance:
  platform_engineering:
    prose: >-
      At Level 3, the platform is the primary mechanism for security control enforcement.
      All security controls are implemented as platform capabilities — no team implements
      security independently. The platform provides cryptographic provenance for all
      artifacts, enforces zero-standing-privilege through dynamic secrets, implements
      network microsegmentation as a default through service mesh, and provides
      continuous compliance reporting without manual intervention. Platform security
      improvements are driven by data from incident telemetry and vulnerability trends,
      creating a feedback loop between operational security and platform engineering.
    tools:
      - "Tekton Chains (SLSA provenance)"
      - "Sigstore / Cosign (artifact signing at scale)"
      - "Istio (zero-trust networking)"
      - "HashiCorp Vault (dynamic secrets)"
      - "Crossplane (platform-managed security infrastructure)"
  devsecops:
    prose: >-
      At Level 3, the DevSecOps pipeline is fully self-healing — failed security gates
      trigger automated remediation workflows where possible (automated dependency
      updates, automated patching) and immediate developer notification with precise
      remediation guidance where human action is required. DAST findings automatically
      generate SAST rules to detect the same pattern in code review. Supply chain
      integrity checks verify the entire build toolchain, not just application
      dependencies. Security metrics from the pipeline feed organizational OKRs,
      making security improvement visible at the executive level.
    tools:
      - "Semgrep (ML-assisted rule generation)"
      - "Syft + in-toto (full supply chain attestation)"
      - "Trivy + Dependency-Track (continuous SBOM monitoring)"
      - "GitLab Security Dashboard (executive metrics)"
      - "Custom ML models (anomaly detection in pipeline)"
  secops:
    prose: >-
      At Level 3, SecOps operates an intelligence-led security program. Threat
      intelligence is consumed and applied to direct red team activities, penetration
      test focus areas, and threat model updates. The security operations center
      uses behavioral analytics and ML-based detection to identify sophisticated
      attack patterns. Post-incident analysis produces threat intelligence contributions
      to industry ISACs. The organization benchmarks its security posture annually
      against the BSIMM dataset to understand its position relative to industry peers
      and identify the highest-value improvement opportunities.
    tools:
      - "Vectra AI / Darktrace (ML-based detection)"
      - "Mandiant / CrowdStrike (threat intelligence)"
      - "MITRE ATT&CK (adversary emulation)"
      - "Adversarial simulation platforms (SafeBreach, AttackIQ)"
      - "BSIMM assessment (peer benchmarking)"
