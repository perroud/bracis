id: samm-maturity-level2
family: maturity
title: "Maturity Level 2 — Managed"
class: OWASP-SAMM-v2
baselines: [level-2]

statement:
  prose: >-
    At SAMM Maturity Level 2, the organization demonstrates managed and efficient
    security practices with moderate coverage across all five business functions.
    Security activities are defined, planned, and tracked with consistent application
    across most development projects. Automation is introduced to scale security
    activities and reduce reliance on individual expertise. The organization can
    measure its security posture and demonstrate improvement over time.
  parts:
    - id: samm-maturity-level2_governance
      label: "Governance at Level 2"
      prose: >-
        The software security program has a defined strategy with measurable KPIs
        collected and reported regularly. A security champions network is operational
        with trained champions embedded in each major development team. Security policy
        is enforced through automated pipeline controls rather than relying on manual
        compliance. Compliance tracking is automated for the highest-priority regulatory
        frameworks, with evidence artifacts generated by CI/CD pipelines.
    - id: samm-maturity-level2_design
      label: "Design at Level 2"
      prose: >-
        All projects above a defined risk threshold undergo formal risk classification
        and mandatory threat modeling using a standardized methodology (STRIDE, PASTA,
        or similar). Security requirements are derived from threat models and tracked
        in the product backlog alongside functional requirements. Reference architectures
        for common system patterns are documented and available for teams to consume.
        An approved technology list is maintained and enforced through CI/CD pipeline checks.
    - id: samm-maturity-level2_implementation
      label: "Implementation at Level 2"
      prose: >-
        SAST and dependency scanning are integrated into CI/CD pipelines with severity-
        based gates that block builds containing critical vulnerabilities. SBOM generation
        is automated for all build artifacts. Secrets management policies are enforced
        through pipeline controls, and secrets scanning detects and blocks credential
        commits. Deployments to production are automated, artifact-signed, and require
        approval with separation of duties. Pre-deployment security configuration checks
        validate environment security baselines.
    - id: samm-maturity-level2_verification
      label: "Verification at Level 2"
      prose: >-
        Security test cases are systematically derived from security requirements and
        tracked for coverage. DAST is integrated into CI/CD pipelines for testing
        against staging environments. Architecture reviews follow a defined methodology
        and are mandatory for systems above the risk threshold. Annual penetration tests
        cover all externally accessible critical systems. Findings from all testing
        activities are consolidated in a central defect management system.
    - id: samm-maturity-level2_operations
      label: "Operations at Level 2"
      prose: >-
        Application-layer security monitoring detects and alerts on suspicious activity
        with defined response SLAs. Security incident procedures specific to software
        incidents are documented and tested in tabletop exercises. Environment security
        baselines are formally defined and measured through automated compliance scanning.
        Patch management SLAs are defined and tracked. Data classification is applied
        to all systems, with data protection controls implemented based on classification.

guidance:
  prose: >-
    Level 2 is where security becomes systematic rather than heroic. The key
    characteristic of Level 2 is that security outcomes do not depend on which
    specific individuals are involved in a project — the process ensures consistent
    security regardless of team composition. Organizations at Level 2 can answer
    questions like "what percentage of our projects have current threat models?"
    and "what is our mean time to remediate critical vulnerabilities?" — because
    they are measuring these things. The transition from Level 2 to Level 3 requires
    moving from compliance-oriented security (checking boxes) to risk-optimized
    security (making continuous improvement decisions based on data).

references:
  - citation: "OWASP SAMM v2.0 — Maturity Level 2 Activities"
    url: "https://owaspsamm.org/model/"
  - citation: "OWASP SAMM Assessment Guide"
    url: "https://owaspsamm.org/guidance/quick-start-guide/"

implementation_guidance:
  platform_engineering:
    prose: >-
      At Level 2, the platform should enforce security controls as mandatory defaults
      that cannot be bypassed without an explicit exception workflow. Implement admission
      controllers that block non-compliant deployments, golden path templates that
      generate pre-compliant project scaffolding, and an approved technology registry
      that validates dependencies against allowed lists. Surface security metrics in
      the IDP dashboard so teams have continuous visibility into their security posture
      without requiring external tools or manual effort.
    tools:
      - "Backstage (golden path templates, security scorecard)"
      - "Kyverno / OPA (mandatory admission control)"
      - "Dependency-Track (SBOM monitoring)"
      - "DefectDojo (centralized vulnerability tracking)"
      - "Cosign (artifact signing)"
  devsecops:
    prose: >-
      Implement security gates that enforce defined vulnerability SLAs — CI/CD builds
      blocked by unpatched critical vulnerabilities; deployment blocked by SLA-overdue
      findings. Integrate DAST into pipeline with authentication and comprehensive
      endpoint coverage. Implement SBOM generation, signing, and publication as
      pipeline defaults. Configure Renovate Bot or Dependabot for automated dependency
      updates with security-prioritized merge workflows. Provide developer-facing
      security dashboards within merge request views.
    tools:
      - "Semgrep (advanced SAST rules)"
      - "GitLab DAST (pipeline-integrated)"
      - "Syft + Grype (SBOM + vulnerability scanning)"
      - "Renovate Bot (automated updates)"
      - "DefectDojo (finding aggregation)"
  secops:
    prose: >-
      Operate a vulnerability management program with defined SLAs and tracked
      compliance. Conduct annual penetration tests and systematic DAST coverage.
      Implement continuous compliance monitoring for production environments against
      defined security baselines. Produce monthly security metrics reports for
      engineering and executive leadership. Conduct biannual SAMM assessments to
      measure maturity progress and update the improvement roadmap.
    tools:
      - "DefectDojo (vulnerability management)"
      - "Wiz / Prisma Cloud (CSPM)"
      - "GitLab Security Dashboard"
      - "OWASP SAMM Assessment Toolbox"
      - "ServiceNow (risk tracking)"
