id: samm-gov-policy
family: governance
title: "Policy & Compliance"
class: OWASP-SAMM-v2
baselines: [level-1, level-2, level-3]

statement:
  prose: >-
    Develop, maintain, and enforce software security policies and standards that reflect
    regulatory requirements, industry best practices, and organizational risk tolerance.
    Establish compliance tracking mechanisms to ensure all software development activities
    adhere to defined policies, and regularly audit adherence to identify and remediate gaps.
  parts:
    - id: samm-gov-policy_smt.a
      label: "Stream A — Policy & Standards"
      prose: >-
        Define a software security policy that establishes baseline requirements for all
        software developed or procured by the organization. Include requirements for secure
        coding practices, security testing, vulnerability management, and third-party
        component usage. Ensure policies are approved by appropriate authority, versioned,
        and communicated to all development teams. Review policies at least annually or
        when significant regulatory or threat landscape changes occur.
    - id: samm-gov-policy_smt.b
      label: "Stream B — Compliance Management"
      prose: >-
        Establish a compliance tracking mechanism that maps regulatory requirements
        (e.g., PCI DSS, GDPR, HIPAA) and industry standards (e.g., OWASP ASVS, NIST
        SSDF) to internal controls and software development activities. Monitor compliance
        status continuously and generate evidence artifacts for audit purposes. Define
        exception management processes for deviations from policy, requiring risk
        acceptance and compensating control documentation.

guidance:
  prose: >-
    Software security policies without compliance tracking have zero operational value —
    teams simply ignore them. At maturity level 1, the organization writes a basic secure
    development policy and distributes it. At level 2, the policy is enforced through
    automated controls in CI/CD pipelines, and compliance status is tracked for all
    active projects. At level 3, the organization maintains a continuous compliance
    posture with automated evidence collection, integrates policy enforcement into
    procurement requirements for third-party software, and can produce audit reports
    on demand without manual effort. Policies should be written in plain language with
    explicit pass/fail criteria, making automated enforcement straightforward.

references:
  - citation: "OWASP SAMM v2.0 — Governance: Policy & Compliance"
    url: "https://owaspsamm.org/model/governance/policy-and-compliance/"
  - citation: "NIST SP 800-218 PO.1 — Define Security Requirements"
    url: "https://csrc.nist.gov/pubs/sp/800/218/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement policy-as-code using Open Policy Agent (OPA) or Kyverno to enforce
      software security policies at the platform layer — blocking non-compliant
      container images, enforcing signed commits, and validating SBOM presence before
      deployment. Expose policy compliance status in the IDP so development teams can
      see their current compliance posture in the software catalog. Use Backstage
      scaffolder templates to generate new projects that are pre-compliant with all
      baseline policies. Automate exception management workflows through the platform,
      requiring documented risk acceptance before bypassing policy gates.
    tools:
      - "Open Policy Agent (OPA)"
      - "Kyverno"
      - "Backstage (Software Catalog)"
      - "Conftest"
      - "HashiCorp Sentinel"
  devsecops:
    prose: >-
      Integrate policy compliance checks as mandatory pipeline stages that block
      progression when violations are detected. Use GitLab Compliance Frameworks to
      enforce pipeline configurations organization-wide. Implement automated evidence
      collection within pipelines — generating audit artifacts (scan results, approval
      records, SBOM) at each pipeline run. Map pipeline security gates to specific
      policy controls, making it straightforward to demonstrate compliance during audits.
      Maintain compliance dashboards that aggregate pipeline evidence across all projects.
    tools:
      - "GitLab Compliance Frameworks"
      - "GitLab CI/CD"
      - "Conftest / Checkov"
      - "DefectDojo"
      - "OSCAL (Open Security Controls Assessment Language)"
  secops:
    prose: >-
      Operate a GRC platform that maps external regulatory requirements to internal
      software security controls. Integrate automated compliance evidence from CI/CD
      pipelines into the GRC tool to maintain continuous compliance status. Conduct
      quarterly compliance reviews for all high-risk software systems and produce
      exception reports for audit committees. Maintain a software security control
      framework aligned to applicable regulations (PCI DSS, GDPR, HIPAA, SOX) and
      track control effectiveness through security testing results.
    tools:
      - "ServiceNow GRC"
      - "Archer RSA GRC"
      - "Vanta / Drata (automated compliance)"
      - "Tugboat Logic"
      - "GitLab Security & Compliance Center"
