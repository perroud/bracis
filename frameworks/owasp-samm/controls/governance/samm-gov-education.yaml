id: samm-gov-education
family: governance
title: "Education & Guidance"
class: OWASP-SAMM-v2
baselines: [level-1, level-2, level-3]

statement:
  prose: >-
    Establish a software security education program that provides role-based security
    awareness and technical training to all personnel involved in software development,
    operations, and management. Augment training with security guidance resources,
    security champions programs, and just-in-time learning embedded in development
    workflows to build a pervasive security culture.
  parts:
    - id: samm-gov-education_smt.a
      label: "Stream A — Training & Awareness"
      prose: >-
        Define and deliver role-based security training for developers, architects,
        testers, and managers. Training content should cover secure coding practices
        relevant to the organization's technology stack, OWASP Top 10 vulnerabilities,
        threat modeling fundamentals, and secure design principles. Track training
        completion rates and ensure all new hires complete security onboarding before
        working on production systems. Refresh training content annually and whenever
        significant new threat classes emerge.
    - id: samm-gov-education_smt.b
      label: "Stream B — Security Champions & Guidance"
      prose: >-
        Establish a security champions program that embeds security advocates within
        each development team. Provide champions with advanced security training,
        direct access to security expertise, and recognition for their contributions.
        Create and maintain a centralized security guidance library — including secure
        coding standards, approved libraries, cryptographic standards, and architecture
        patterns — that teams can reference when making design and implementation decisions.
        Integrate guidance into development tools and IDEs to deliver just-in-time
        security coaching at the point of development.

guidance:
  prose: >-
    Security education is consistently the highest-ROI investment in any software security
    program — developers who understand attack techniques write fewer vulnerabilities.
    At maturity level 1, the organization delivers basic security awareness training and
    makes guidance materials available. At level 2, training is role-specific, tracked,
    and completion is enforced; a security champions program is operational. At level 3,
    training effectiveness is measured through metrics (pre/post assessments, vulnerability
    rates in trained vs. untrained teams), champions have formal authority to enforce
    security standards, and guidance is embedded directly into developer tools (IDE
    plugins, linter rules, golden path templates) so that secure choices are the
    default, not the exception.

references:
  - citation: "OWASP SAMM v2.0 — Governance: Education & Guidance"
    url: "https://owaspsamm.org/model/governance/education-and-guidance/"
  - citation: "OWASP Security Culture Guide"
    url: "https://owasp.org/www-project-security-culture/"

implementation_guidance:
  platform_engineering:
    prose: >-
      Embed security guidance directly into the IDP via Backstage TechDocs, making
      secure coding standards, architecture decision records (ADRs), and approved
      technology choices accessible from within the developer workflow. Implement
      IDE plugins (e.g., Semgrep, SonarLint) that provide inline security feedback
      and link to guidance resources. Use platform scaffolding templates to generate
      projects that include pre-configured linting rules, security test configurations,
      and links to relevant training materials. Create a security champions portal
      in the IDP where champions can access advanced resources, manage team security
      findings, and coordinate with the central security team.
    tools:
      - "Backstage (TechDocs, Software Catalog)"
      - "Semgrep (IDE plugin)"
      - "SonarLint (IDE plugin)"
      - "Confluence / GitLab Wiki"
      - "Learning Management System (LMS)"
  devsecops:
    prose: >-
      Integrate security training reminders into developer workflows — for example,
      linking to relevant OWASP guidance when a security vulnerability is identified
      in a merge request. Implement automated code review comments that reference
      secure coding guidance when anti-patterns are detected by SAST tools. Run
      capture-the-flag (CTF) exercises and security hackathons to build practical
      skills and generate engagement. Use pipeline metrics to identify teams with
      recurring vulnerability patterns and trigger targeted training for those teams.
    tools:
      - "Semgrep (with custom rules linking to guidance)"
      - "GitLab Security Advisor"
      - "HackTheBox / TryHackMe (CTF platforms)"
      - "Secure Code Warrior"
      - "Snyk Learn"
  secops:
    prose: >-
      Coordinate with HR and learning management systems to enforce mandatory training
      completion for all personnel with access to production systems. Track security
      training metrics alongside security incident data to correlate training effectiveness
      with vulnerability reduction. Conduct tabletop exercises involving development teams
      to build incident response awareness. Ensure security champions have access to
      threat intelligence feeds and regular security briefings to keep their knowledge
      current with the evolving threat landscape.
    tools:
      - "Learning Management System (Workday, Cornerstone)"
      - "KnowBe4 / Proofpoint Security Awareness"
      - "Splunk (training metric correlation)"
      - "Threat intelligence platforms (Recorded Future, MISP)"
      - "Tabletop exercise toolkits"
