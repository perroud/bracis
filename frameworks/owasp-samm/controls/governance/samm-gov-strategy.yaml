id: samm-gov-strategy
family: governance
title: "Strategy & Metrics"
class: OWASP-SAMM-v2
baselines: [level-1, level-2, level-3]

statement:
  prose: >-
    Establish and maintain a software security program that includes a strategic roadmap,
    defined goals, and measurable metrics. Align the security program with organizational
    risk tolerance and business objectives. Track and communicate program effectiveness
    through quantitative metrics and maturity assessments performed at regular intervals.
  parts:
    - id: samm-gov-strategy_smt.a
      label: "Stream A — Create and Promote"
      prose: >-
        Identify security champions and stakeholders across the organization. Define the
        mission and goals of the software security program. Document the organization's
        risk appetite for software security and use it to prioritize security investments.
        Establish a central software security group (SSG) or equivalent function responsible
        for driving the program.
    - id: samm-gov-strategy_smt.b
      label: "Stream B — Measure and Improve"
      prose: >-
        Define and collect key performance indicators (KPIs) and key risk indicators (KRIs)
        that reflect the current state of the software security program. Conduct periodic
        SAMM assessments to measure maturity progress. Use assessment results to generate
        an improvement roadmap and track execution against it. Report program health to
        senior leadership on a defined cadence.

guidance:
  prose: >-
    A software security program without explicit strategy and metrics operates in the
    dark — teams cannot know whether effort is producing results, and leadership cannot
    justify continued investment. At maturity level 1, the focus is on identifying a
    sponsor and writing down goals. At level 2, formal metrics are defined and collected;
    assessment cadence is established (typically annually). At level 3, metrics are used
    to drive budget allocation, KPIs are benchmarked against industry peers, and the
    improvement roadmap is integrated into organizational OKRs or strategic planning cycles.
    Common metrics include: mean time to remediate vulnerabilities, percentage of projects
    with threat models, SAST finding density per KLOC, and training completion rates.

references:
  - citation: "OWASP SAMM v2.0 — Governance: Strategy & Metrics"
    url: "https://owaspsamm.org/model/governance/strategy-and-metrics/"
  - citation: "BSIMM — SM (Strategy and Metrics) practice"
    url: "https://www.bsimm.com/framework/governance/strategy-and-metrics.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Embed security program metrics into the Internal Developer Platform (IDP) dashboard
      so that platform teams and developers can self-serve their current security posture.
      Use Backstage Software Catalog to tag services with maturity level and security
      score, making it possible to generate portfolio-wide metrics automatically. Define
      golden path templates that include pre-configured security scanning, automatically
      populating metric pipelines from day one of a project's lifecycle. Integrate
      SAMM assessment tooling as a plugin in the platform so teams can self-assess and
      generate improvement tickets without involving a central security team.
    tools:
      - "Backstage (Software Catalog, TechDocs)"
      - "Grafana (metrics dashboards)"
      - "OpenMetrics / Prometheus"
      - "SAMM Assessment Toolbox (owaspsamm.org)"
      - "Jira / GitLab Issues (improvement tracking)"
  devsecops:
    prose: >-
      Instrument CI/CD pipelines to publish security metrics to a central store at each
      build: vulnerability counts by severity, SAST findings per component, dependency
      freshness, and coverage metrics. Tag pipeline runs with the owning team so metrics
      can be aggregated by business unit. Implement pipeline-level security gates that
      enforce minimum maturity thresholds — for example, blocking deployments when
      critical vulnerability counts exceed a defined threshold. Automate quarterly reports
      from pipeline telemetry to demonstrate trend data to leadership.
    tools:
      - "GitLab Security Dashboard"
      - "DefectDojo (vulnerability aggregation)"
      - "SonarQube (code quality & security metrics)"
      - "Grafana / InfluxDB (time-series metrics)"
      - "GitLab CI/CD"
  secops:
    prose: >-
      Integrate software security metrics into the SecOps SIEM and risk management
      platform to provide unified visibility across application and infrastructure layers.
      Correlate application vulnerability trends with incident data to identify systemic
      weaknesses. Produce executive-level risk reports that translate technical metrics
      (e.g., CVSS scores, vulnerability age) into business risk language. Conduct
      annual SAMM assessments with SecOps participation to calibrate operational
      readiness against the maturity model.
    tools:
      - "Splunk / Elastic SIEM"
      - "ServiceNow GRC"
      - "Archer GRC"
      - "Domo / Power BI (executive dashboards)"
      - "OWASP SAMM Assessment Toolbox"
