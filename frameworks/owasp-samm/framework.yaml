baselines:
  - id: level-1
    title: "Maturity Level 1 — Initial"
    description: >-
      Basic understanding of the practice. Ad-hoc application of security activities,
      typically reactive and unstructured. Organizations at this level have begun
      security awareness but lack formal processes.
  - id: level-2
    title: "Maturity Level 2 — Managed"
    description: >-
      Moderate efficiency and coverage. Security activities are defined, planned,
      and tracked. The organization has repeatable processes and moderate tooling
      in place to sustain security practices.
    inherits_from: [level-1]
  - id: level-3
    title: "Maturity Level 3 — Defined"
    description: >-
      Comprehensive and efficient security practices are fully integrated into
      the software development lifecycle. The organization measures, improves,
      and continuously refines security processes across all teams.
    inherits_from: [level-2]

control_families:
  - id: governance
    title: "Governance"
    description: "Covers the activities necessary to establish a software security strategy, policy, and training program."
    control_count: 3
  - id: design
    title: "Design"
    description: "Covers threat modeling, security requirements elicitation, and security architecture."
    control_count: 3
  - id: implementation
    title: "Implementation"
    description: "Covers secure build practices, secure deployment, and defect management."
    control_count: 3
  - id: verification
    title: "Verification"
    description: "Covers architecture assessment, requirements-driven testing, and security testing."
    control_count: 3
  - id: operations
    title: "Operations"
    description: "Covers incident management, environment management, and operational management."
    control_count: 3

related_frameworks:
  - framework_id: owasp-top10
    relationship: supports
    description: "SAMM verification practices directly address OWASP Top 10 risk categories."
  - framework_id: owasp-asvs
    relationship: complements
    description: "ASVS provides detailed technical controls; SAMM provides the organizational maturity model to adopt and measure them."
  - framework_id: nist-800-218
    relationship: mapped
    description: "SAMM business functions map closely to NIST SSDF practice groups (PO, PS, PW, RV)."
    mapping_file: "mappings/owasp-samm_to_nist-800-218.yaml"
  - framework_id: iso-27001-2022
    relationship: complements
    description: "SAMM extends ISO 27001 with application-level software assurance maturity measurement."
  - framework_id: nist-csf-v2
    relationship: mapped
    description: "SAMM governance and operations functions align with CSF Govern, Identify, Protect, and Respond functions."

