id: owasp-samm
title: "OWASP Software Assurance Maturity Model (SAMM) v2.0"
short_title: "OWASP SAMM"
version: "2.0"
publication_date: "2020-01-31"
last_updated: "2020-10-01"

authority:
  name: "Open Worldwide Application Security Project"
  acronym: "OWASP"
  country: US
  url: "https://owaspsamm.org/"

type: standard
scope: application-security
mandatory: false

original_language: en
available_languages:
  - en
  - es
  - pt-br
  - fr
  - de
  - ja
  - zh

industries:
  - technology
  - software
