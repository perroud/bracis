id: cl-6.1
family: clause-6
title: "Actions to address risks and opportunities"
class: ISO22301

statement:
  prose: >-
    When planning for the BCMS, the organization shall consider the issues
    referred to in 4.1 and the requirements referred to in 4.2 and determine
    the risks and opportunities that need to be addressed to ensure the BCMS
    can achieve its intended outcome(s), prevent or reduce undesired effects,
    and achieve continual improvement. The organization shall plan actions to
    address these risks and opportunities, how to integrate and implement
    the actions into its BCMS processes, and evaluate the effectiveness of
    these actions.

guidance:
  prose: >-
    Risk assessment in the BCMS context should consider both risks to the
    management system itself (e.g., inadequate resources, lack of management
    commitment) and risks to the organization's critical activities (addressed
    in detail in Clause 8.3). The organization should use a systematic
    approach to identify, analyze, and evaluate risks, with criteria for
    determining which risks require treatment. Opportunities may include
    leveraging business continuity capabilities for competitive advantage,
    improving operational efficiency through resilience investments, or
    strengthening relationships with interested parties. Actions should be
    proportionate to the potential impact and integrated into BCMS processes.

references:
  - citation: "ISO 22301:2019, Clause 6.1"
    url: "https://www.iso.org/standard/75106.html"
  - citation: "ISO 31000:2018 — Risk management"
    url: "https://www.iso.org/standard/65694.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated risk detection for platform infrastructure using
      tools that identify single points of failure, capacity constraints,
      and dependency risks. Use chaos engineering practices to proactively
      discover weaknesses in platform resilience. Maintain a risk register
      as a structured data file in version control, linked to specific
      infrastructure components and services. Automate risk scoring based
      on infrastructure topology analysis, such as detecting services
      without multi-AZ deployment or missing health checks.
    tools:
      - litmus-chaos
      - gremlin
      - terraform
      - checkov
      - backstage

  devsecops:
    prose: >-
      Integrate risk assessment into the development lifecycle by running
      security and resilience scans in CI/CD pipelines. Use SAST, DAST,
      and dependency scanning to identify risks in application code and
      dependencies. Implement pipeline gates that prevent deployment of
      services with unaddressed high-severity risks. Maintain risk
      acceptance records in version control, requiring explicit approval
      for any risk that is accepted rather than mitigated.
    tools:
      - gitlab-ci
      - trivy
      - semgrep
      - checkov
      - dependency-track

  secops:
    prose: >-
      Aggregate risk data from vulnerability scanners, threat intelligence
      feeds, and incident history into a centralized risk management
      platform. Configure automated risk scoring and trending to track
      risk posture over time. Create executive dashboards that present
      risk status aligned with BCMS objectives. Implement automated
      alerting when risk thresholds are exceeded or when new risks are
      identified that may affect critical business activities.
    tools:
      - splunk
      - elastic-siem
      - tenable
      - qualys
      - servicenow-grc

