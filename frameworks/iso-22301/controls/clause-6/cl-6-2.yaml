id: cl-6.2
family: clause-6
title: "Business continuity objectives and planning to achieve them"
class: ISO22301

statement:
  prose: >-
    The organization shall establish business continuity objectives at relevant
    functions, levels and processes. The objectives shall be consistent with
    the business continuity policy, be measurable (if practicable), take into
    account applicable requirements, and be monitored and updated as
    appropriate. The organization shall determine what will be done, what
    resources will be required, who will be responsible, when it will be
    completed, and how the results will be evaluated when planning to
    achieve its business continuity objectives.

guidance:
  prose: >-
    Business continuity objectives should be specific, measurable, achievable,
    relevant, and time-bound (SMART). Typical objectives include recovery
    time objectives (RTOs) and recovery point objectives (RPOs) for critical
    services, target exercise frequency, minimum availability percentages,
    and maximum tolerable periods of disruption (MTPD). Objectives should
    cascade from organizational level to individual service and system
    levels. Progress toward objectives should be tracked through defined
    metrics and reported to management regularly. Resources needed to
    achieve objectives should be explicitly identified and budgeted.

references:
  - citation: "ISO 22301:2019, Clause 6.2"
    url: "https://www.iso.org/standard/75106.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Define RTO, RPO, and availability objectives as configuration in the
      platform's service catalog, linked to each critical service. Use SLO
      frameworks (e.g., Sloth, OpenSLO) to codify objectives as
      machine-readable specifications. Implement automated SLO monitoring
      that tracks actual performance against defined objectives in real
      time. Configure error budgets and burn rate alerts to provide early
      warning when objectives are at risk. Maintain objective definitions
      in version control with full change history.
    tools:
      - sloth
      - openslo
      - prometheus
      - grafana
      - backstage

  devsecops:
    prose: >-
      Embed service-level objective definitions in application repositories
      and validate them as part of CI/CD pipelines. Use automated testing
      to verify that services can meet their defined RTOs and RPOs through
      recovery testing in staging environments. Include objective
      compliance as a deployment gate — services that cannot demonstrate
      they meet their continuity objectives should not reach production.
      Generate objective compliance reports as pipeline artifacts.
    tools:
      - gitlab-ci
      - k6
      - locust
      - junit
      - git

  secops:
    prose: >-
      Build dashboards that track business continuity objective performance
      across all critical services. Configure alerting for objective
      breaches, including SLA violations, backup failures, and recovery
      test failures. Generate periodic reports for management review
      showing objective trends, compliance status, and areas requiring
      attention. Integrate objective tracking with the incident management
      system to correlate disruption impacts with objective performance.
    tools:
      - grafana
      - datadog
      - pagerduty
      - servicenow
      - splunk

