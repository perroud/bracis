id: cl-8.4
family: clause-8
title: "Business continuity strategies and solutions"
class: ISO22301

statement:
  prose: >-
    The organization shall identify and select business continuity strategies
    and solutions based on the outputs from the business impact analysis and
    risk assessment. The strategies and solutions shall address the protection
    and stabilization of the organization's prioritized activities and their
    dependencies and supporting resources, mitigation and response to impacts,
    and the meeting of requirements of interested parties. The strategies
    and solutions selected shall be approved by top management.

guidance:
  prose: >-
    Business continuity strategies should address people (alternative
    staffing, remote work capabilities, cross-training), premises
    (alternative sites, work-from-home, co-location agreements),
    technology (redundant systems, cloud failover, backup and recovery),
    information (data replication, offsite backup, alternative access
    methods), suppliers (alternative suppliers, strategic reserves,
    diversification), and stakeholders (crisis communication, customer
    notification, regulatory reporting). Strategy selection should
    consider cost-benefit analysis, feasibility, and alignment with
    the organization's risk appetite. Strategies should be documented
    and reviewed regularly to ensure they remain effective and aligned
    with BIA and risk assessment outputs.

references:
  - citation: "ISO 22301:2019, Clause 8.4"
    url: "https://www.iso.org/standard/75106.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement multi-region and multi-zone deployment strategies as
      infrastructure-as-code patterns. Define disaster recovery patterns
      (active-active, active-passive, pilot light, warm standby) as
      reusable modules in the platform. Automate failover mechanisms
      using DNS failover, load balancer health checks, and database
      replication. Implement infrastructure patterns that enforce
      minimum redundancy levels based on service criticality tier.
      Maintain runbooks-as-code that document recovery procedures for
      each critical platform component.
    tools:
      - terraform
      - crossplane
      - argocd
      - velero
      - kubernetes

  devsecops:
    prose: >-
      Build CI/CD pipeline templates that enforce resilience patterns
      based on service criticality. Require that critical services
      include health checks, graceful degradation, circuit breakers,
      and retry logic. Implement automated deployment strategies
      (blue-green, canary) that minimize disruption during updates.
      Use infrastructure-as-code scanning to validate that disaster
      recovery configurations are maintained. Test recovery procedures
      as part of the deployment pipeline in staging environments.
    tools:
      - gitlab-ci
      - helm
      - argocd
      - istio
      - checkov

  secops:
    prose: >-
      Monitor the health and readiness of all business continuity
      strategies through operational dashboards. Track backup success
      rates, replication lag, failover test results, and alternative
      site readiness. Configure alerts for strategy degradation, such
      as backup failures, replication delays exceeding RPO thresholds,
      or failover mechanism health check failures. Generate periodic
      strategy effectiveness reports for management review.
    tools:
      - grafana
      - datadog
      - pagerduty
      - splunk
      - servicenow

