id: cl-8.3
family: clause-8
title: "Risk assessment"
class: ISO22301

statement:
  prose: >-
    The organization shall implement and maintain a formal documented process
    for risk assessment that systematically identifies risks of disruption to
    the organization's prioritized activities and their supporting resources,
    analyzes the risks, evaluates which risks require treatment, and
    determines appropriate treatment for the risks consistent with the
    business continuity objectives and in accordance with the organization's
    risk appetite. The organization shall maintain documented information
    about the risk assessment process and its outcomes.

guidance:
  prose: >-
    Risk assessment for business continuity focuses on identifying threats
    and vulnerabilities that could disrupt critical activities identified
    in the BIA. Common threat categories include natural disasters
    (earthquake, flood, pandemic), technology failures (hardware failure,
    cyber attack, data corruption), supply chain disruptions (supplier
    failure, transport disruption), human-caused events (strikes, sabotage,
    terrorism), and utility failures (power, telecommunications, water).
    For each risk, the organization should assess the likelihood and
    potential impact, considering both inherent and residual risk levels.
    Risk treatment options include mitigation, transfer (insurance),
    avoidance, and acceptance. The assessment should be reviewed at least
    annually and whenever the threat landscape changes significantly.

references:
  - citation: "ISO 22301:2019, Clause 8.3"
    url: "https://www.iso.org/standard/75106.html"
  - citation: "ISO 31000:2018 — Risk management"
    url: "https://www.iso.org/standard/65694.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement infrastructure scanning that continuously identifies
      single points of failure, capacity risks, and resilience gaps.
      Use chaos engineering tools to validate assumptions about failure
      modes and blast radius. Automate risk detection through
      infrastructure-as-code analysis that identifies anti-patterns
      such as single-AZ deployments, missing backup configurations, or
      undersized resource limits. Maintain risk treatment plans as
      code, with automated tracking of remediation status.
    tools:
      - litmus-chaos
      - gremlin
      - checkov
      - tfsec
      - trivy

  devsecops:
    prose: >-
      Run comprehensive security and resilience scans in CI/CD pipelines
      including SAST, DAST, dependency scanning, and infrastructure
      scanning to identify risks in application code, dependencies, and
      deployment configurations. Implement risk scoring in pipelines
      that aggregates findings into an overall risk assessment per
      service. Maintain risk acceptance workflows in the merge request
      process, requiring explicit approval and documentation when risks
      are accepted. Track risk treatment progress through issue boards.
    tools:
      - gitlab-ci
      - trivy
      - semgrep
      - checkov
      - grype
      - dependency-track

  secops:
    prose: >-
      Aggregate vulnerability data, threat intelligence, and incident
      history to maintain a comprehensive risk register for business
      continuity. Use SIEM correlation rules to detect emerging threats
      to critical activities. Implement continuous monitoring for
      infrastructure risks including capacity trending, availability
      metrics, and dependency health. Generate risk heatmaps that
      present risk posture to management in an actionable format.
      Configure automated risk reassessment triggers based on
      threat intelligence indicators.
    tools:
      - splunk
      - elastic-siem
      - tenable
      - qualys
      - servicenow-grc
      - misp

