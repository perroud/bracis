id: cl-8.6
family: clause-8
title: "Exercise programme"
class: ISO22301

statement:
  prose: >-
    The organization shall exercise and test its business continuity
    procedures to ensure they are consistent with its business continuity
    objectives. The organization shall conduct exercises and tests that are
    based on appropriate scenarios, developed with clearly defined aims and
    objectives, that together over time validate the whole of its business
    continuity arrangements, minimize the risk of disruption to operations,
    produce formalized post-exercise reports that contain outcomes,
    recommendations and actions to implement improvements, are reviewed
    within the context of promoting continual improvement, and are conducted
    at planned intervals and when there are significant changes within the
    organization or to the environment in which it operates.

guidance:
  prose: >-
    The exercise programme should include a mix of exercise types with
    increasing complexity: discussion-based exercises (tabletop walkthroughs,
    workshops), functional exercises (testing specific components or
    procedures), and full-scale exercises (simulating actual disruptions).
    Exercises should cover all critical activities identified in the BIA
    over a defined cycle (typically 1-3 years). Each exercise should have
    clear objectives, a realistic scenario, designated observers/evaluators,
    and a structured debrief process. Lessons learned from exercises should
    feed back into plan updates and risk assessment reviews. Organizations
    should also participate in exercises with key suppliers and partners
    to validate supply chain resilience.

references:
  - citation: "ISO 22301:2019, Clause 8.6"
    url: "https://www.iso.org/standard/75106.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement chaos engineering as the primary mechanism for testing
      business continuity at the infrastructure and platform level. Use
      tools that inject failures (pod termination, network partition,
      latency injection, AZ outage simulation) to validate that
      resilience mechanisms work as designed. Schedule regular game days
      that test end-to-end recovery scenarios. Automate disaster
      recovery testing through pipeline-triggered failover and failback
      procedures. Maintain test results as structured data for trend
      analysis and reporting.
    tools:
      - litmus-chaos
      - gremlin
      - chaos-mesh
      - k6
      - grafana

  devsecops:
    prose: >-
      Integrate resilience testing into CI/CD pipelines using SAST and
      DAST tools to validate application behavior under failure conditions.
      Implement automated failover testing as part of deployment pipelines
      for critical services. Use load testing and chaos injection in
      staging environments to validate recovery procedures before
      production changes. Build pipeline stages that execute tabletop
      exercise checklists and record results as pipeline artifacts.
      Schedule regular automated DR tests through scheduled pipelines.
    tools:
      - gitlab-ci
      - litmus-chaos
      - k6
      - locust
      - trivy

  secops:
    prose: >-
      Track exercise schedules, participation, results, and corrective
      actions through the ITSM platform. Configure automated reminders
      for upcoming exercises and overdue corrective actions. Monitor
      production systems during exercises to detect any unintended
      impact. Generate exercise trend reports showing improvement over
      time. Maintain an exercise calendar that ensures all critical
      activities are exercised within the defined cycle. Correlate
      exercise findings with actual incident data to validate exercise
      realism.
    tools:
      - servicenow
      - pagerduty
      - grafana
      - splunk
      - jira

