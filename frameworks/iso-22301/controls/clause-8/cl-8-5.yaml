id: cl-8.5
family: clause-8
title: "Business continuity plans and procedures"
class: ISO22301

statement:
  prose: >-
    The organization shall implement and maintain business continuity plans
    and procedures to manage disruptions. The plans shall include defined
    roles and responsibilities, actions to manage the immediate consequences
    of a disruption, flexible response procedures, a focus on the impacts
    of events that could potentially disrupt operations, effective
    communication procedures, and documented escalation and activation
    criteria. The plans shall collectively address the recovery and
    resumption of prioritized activities within the required time frames.

guidance:
  prose: >-
    Business continuity plans should be practical, actionable documents
    that can be executed under stress by trained personnel. Plans typically
    include an incident management plan (for initial response and
    coordination), business continuity plans (for specific critical
    activities), and a crisis communication plan. Each plan should
    clearly define activation triggers, escalation criteria, roles
    and responsibilities, step-by-step procedures, resource requirements,
    and communication protocols. Plans should be written in clear,
    unambiguous language and should be accessible during disruptions
    (not solely dependent on the systems that may be disrupted). Plans
    should be reviewed and updated at least annually, after exercises,
    and after actual disruptions.

references:
  - citation: "ISO 22301:2019, Clause 8.5"
    url: "https://www.iso.org/standard/75106.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Maintain disaster recovery runbooks as version-controlled code
      alongside the infrastructure they describe. Implement automated
      runbook execution for common recovery scenarios (database failover,
      service restart, traffic rerouting). Use runbook automation
      platforms that can execute predefined recovery procedures with
      appropriate approval gates. Store runbooks in multiple locations
      (primary and DR sites) to ensure accessibility during disruptions.
      Implement ChatOps integration so that recovery procedures can be
      triggered and tracked through communication platforms.
    tools:
      - rundeck
      - ansible
      - argocd
      - backstage
      - git

  devsecops:
    prose: >-
      Maintain recovery runbooks in the same repositories as the services
      they support, ensuring they are updated whenever service
      architecture changes. Implement automated validation of runbook
      procedures through CI/CD pipeline tests. Use infrastructure-as-code
      to define recovery environments that can be rapidly provisioned.
      Build deployment pipelines that support emergency change procedures
      with expedited but auditable approval workflows. Ensure that
      rollback procedures are tested as part of every deployment.
    tools:
      - gitlab-ci
      - terraform
      - ansible
      - helm
      - git

  secops:
    prose: >-
      Integrate business continuity plans with the incident management
      system so that plan activation is tracked, timestamped, and
      auditable. Configure automated notifications when plans are
      activated, including stakeholder communications and escalation
      alerts. Monitor plan execution progress through operational
      dashboards. Maintain communication templates and contact lists
      in systems that are independent of the primary infrastructure.
      Generate post-incident reports that compare actual recovery
      with planned procedures.
    tools:
      - pagerduty
      - opsgenie
      - servicenow
      - statuspage
      - splunk

