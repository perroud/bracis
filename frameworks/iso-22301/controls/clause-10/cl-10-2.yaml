id: cl-10.2
family: clause-10
title: "Continual improvement"
class: ISO22301

statement:
  prose: >-
    The organization shall continually improve the suitability, adequacy and
    effectiveness of the BCMS. The organization shall consider the outputs
    of analysis and evaluation, and the outputs of management review, to
    determine if there are needs or opportunities that shall be addressed
    as part of continual improvement.

guidance:
  prose: >-
    Continual improvement should be driven by data from monitoring and
    measurement (Clause 9.1), internal audits (Clause 9.2), management
    reviews (Clause 9.3), exercise outcomes (Clause 8.6), actual disruption
    experience, corrective actions (Clause 10.1), and benchmarking against
    industry best practices. The organization should establish mechanisms
    for capturing improvement opportunities from all sources, prioritizing
    them based on risk impact and feasibility, and tracking their
    implementation. Improvement initiatives should be measured for
    effectiveness after implementation. The PDCA cycle (Plan-Do-Check-Act)
    inherent in the ISO management system structure provides the
    framework for driving continual improvement.

references:
  - citation: "ISO 22301:2019, Clause 10.2"
    url: "https://www.iso.org/standard/75106.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement feedback loops from production incidents, capacity events,
      and performance degradations into the platform improvement backlog.
      Use SLO error budgets to drive architectural improvements when
      services consistently fail to meet their objectives. Automate
      the collection of improvement metrics including deployment
      frequency, recovery time trends, and platform reliability
      improvements over time. Implement platform maturity models that
      define progression paths for service resilience capabilities.
    tools:
      - backstage
      - grafana
      - prometheus
      - jira
      - argocd

  devsecops:
    prose: >-
      Use CI/CD pipeline metrics (deployment frequency, lead time for
      changes, change failure rate, time to restore service) as
      improvement indicators aligned with DORA metrics. Implement
      automated trend analysis on scanner findings to measure
      security and resilience improvement over time. Build
      improvement tracking into the development workflow through
      issue boards and milestone tracking. Generate periodic
      improvement reports from pipeline data showing trends in
      code quality, security posture, and deployment reliability.
    tools:
      - gitlab-ci
      - sonarqube
      - grafana
      - jira
      - git

  secops:
    prose: >-
      Track improvement initiatives through the GRC platform with
      clear ownership, milestones, and effectiveness metrics.
      Analyze incident trends, audit findings, and exercise outcomes
      to identify systemic improvement needs. Benchmark BCMS
      performance against industry standards and peer organizations.
      Generate improvement scorecards that show progress on key
      resilience indicators over time. Use lessons learned from
      actual disruptions as primary inputs to improvement planning.
    tools:
      - servicenow-grc
      - splunk
      - grafana
      - jira
      - confluence

