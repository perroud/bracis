id: cl-10.1
family: clause-10
title: "Nonconformity and corrective action"
class: ISO22301

statement:
  prose: >-
    When a nonconformity occurs, the organization shall react to the
    nonconformity by taking action to control and correct it, and deal
    with the consequences. The organization shall evaluate the need for
    action to eliminate the causes of the nonconformity so that it does
    not recur or occur elsewhere, by reviewing the nonconformity,
    determining the causes, and determining whether similar nonconformities
    exist or could potentially occur. The organization shall implement
    any action needed, review the effectiveness of corrective action taken,
    and make changes to the BCMS if necessary. The organization shall retain
    documented information as evidence of the nature of the nonconformities,
    any subsequent actions taken, and the results of corrective action.

guidance:
  prose: >-
    Nonconformities may be identified through internal audits, management
    reviews, exercises, actual disruptions, or routine monitoring. For
    each nonconformity, the organization should perform root cause analysis
    to identify systemic issues rather than just treating symptoms. The
    corrective action process should follow a structured approach: identify
    the nonconformity, contain the immediate impact, analyze root causes,
    develop and implement corrective actions, verify effectiveness, and
    close the finding. Corrective actions should be proportionate to the
    severity of the nonconformity and should be tracked through a formal
    system with clear ownership, due dates, and verification criteria.
    Trends in nonconformities should be analyzed to identify systemic
    issues requiring broader improvement initiatives.

references:
  - citation: "ISO 22301:2019, Clause 10.1"
    url: "https://www.iso.org/standard/75106.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement blameless post-incident review processes that generate
      structured corrective action items tracked in the platform's work
      management system. Use automated infrastructure scanning to detect
      nonconformities such as configuration drift, missing backups, or
      single points of failure. Implement automated remediation for
      common nonconformities through self-healing infrastructure
      patterns. Track corrective actions as issues or tickets linked to
      the originating finding, with automated status tracking and
      overdue alerts.
    tools:
      - jira
      - backstage
      - open-policy-agent
      - kyverno
      - argocd

  devsecops:
    prose: >-
      Treat security scanner findings, failed tests, and deployment
      failures as nonconformities that require root cause analysis
      and corrective action. Integrate issue tracking with CI/CD
      pipelines so that scanner findings automatically create tracked
      issues. Implement pipeline gates that prevent deployment when
      critical nonconformities remain unresolved. Use merge request
      workflows to track corrective action implementation, requiring
      review and approval before closure. Generate corrective action
      effectiveness metrics from pipeline re-scan results.
    tools:
      - gitlab-ci
      - trivy
      - semgrep
      - sonarqube
      - jira

  secops:
    prose: >-
      Manage nonconformities and corrective actions through the ITSM
      platform with full lifecycle tracking. Configure automated
      workflows for nonconformity triage, assignment, investigation,
      and closure. Implement SLA tracking for corrective action
      resolution based on severity. Use SIEM data to validate
      corrective action effectiveness by confirming that the root
      cause condition no longer occurs. Generate trend reports on
      nonconformity types, root causes, and resolution times for
      management review.
    tools:
      - servicenow
      - jira
      - splunk
      - elastic-siem
      - pagerduty

