id: cl-5.2
family: clause-5
title: "Policy"
class: ISO22301

statement:
  prose: >-
    Top management shall establish a business continuity policy that is
    appropriate to the purpose of the organization, provides a framework for
    setting business continuity objectives, includes a commitment to satisfy
    applicable requirements, and includes a commitment to continual improvement
    of the BCMS. The business continuity policy shall be available as documented
    information, be communicated within the organization, and be available to
    interested parties as appropriate.

guidance:
  prose: >-
    The business continuity policy should be a concise, high-level statement
    that articulates the organization's commitment to maintaining the
    continuity of critical activities. It should define the overall intent
    and direction for business continuity, reference the scope of the BCMS,
    and align with the organization's strategic direction. The policy should
    be reviewed at planned intervals (at least annually) and updated when
    significant changes occur. It should be communicated to all employees
    and relevant third parties. The policy typically addresses the
    organization's tolerance for disruption, commitment to exercising and
    testing plans, and the allocation of resources for business continuity.

references:
  - citation: "ISO 22301:2019, Clause 5.2"
    url: "https://www.iso.org/standard/75106.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Codify the business continuity policy as a machine-readable
      policy-as-code artifact stored in a central version-controlled
      repository. Use OPA/Rego or Kyverno to enforce policy requirements
      automatically across the platform, such as minimum replica counts,
      multi-zone deployments, and backup configurations. Implement GitOps
      workflows where policy changes require pull request review and
      approval by designated leadership before being applied. Publish
      the policy through the internal developer portal so that all
      platform teams have access.
    tools:
      - open-policy-agent
      - kyverno
      - git
      - backstage
      - argocd

  devsecops:
    prose: >-
      Integrate business continuity policy validation into CI/CD pipelines
      so that deployments failing to meet continuity requirements (e.g.,
      no health checks, single-point-of-failure architectures) are blocked.
      Store the policy document alongside application code with versioning
      and change tracking. Use automated checks to ensure new services
      include required resilience patterns before reaching production.
      Trigger notifications to stakeholders when policy documents are
      updated.
    tools:
      - gitlab-ci
      - checkov
      - opa-conftest
      - semgrep
      - git

  secops:
    prose: >-
      Map business continuity policy requirements to monitoring rules
      and compliance dashboards. Create alerts for policy deviations
      detected at runtime, such as services running without redundancy
      or backup jobs failing. Maintain a policy compliance dashboard
      that shows real-time adherence across the organization. Schedule
      periodic automated audits that compare actual configurations
      against policy requirements and generate exception reports.
    tools:
      - splunk
      - grafana
      - elastic-siem
      - pagerduty
      - servicenow

