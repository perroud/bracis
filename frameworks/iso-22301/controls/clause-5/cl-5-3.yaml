id: cl-5.3
family: clause-5
title: "Organizational roles, responsibilities and authorities"
class: ISO22301

statement:
  prose: >-
    Top management shall ensure that the responsibilities and authorities for
    relevant roles are assigned and communicated within the organization. Top
    management shall assign the responsibility and authority for ensuring that
    the BCMS conforms to the requirements of ISO 22301, and reporting on the
    performance of the BCMS to top management. The organization shall document
    and communicate the roles and responsibilities of personnel assigned to
    respond to disruptions.

guidance:
  prose: >-
    The organization should establish clear roles including a BCMS manager or
    coordinator, crisis management team, incident response teams, and
    continuity coordinators for each critical business area. Responsibilities
    should cover both steady-state BCMS maintenance (e.g., maintaining plans,
    conducting exercises) and crisis response activities (e.g., activating
    plans, managing communications). Role assignments should be documented,
    communicated, and regularly reviewed to ensure they reflect current
    organizational structure. Deputies should be assigned for all critical
    roles to avoid single points of failure in the response structure.

references:
  - citation: "ISO 22301:2019, Clause 5.3"
    url: "https://www.iso.org/standard/75106.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement CODEOWNERS files and team-based access control to define
      who is responsible for each critical platform component. Use the
      internal developer portal to publish on-call rosters, escalation
      paths, and BCMS role assignments. Configure RBAC policies that
      enforce separation of duties and ensure that response team members
      have the access needed during disruptions. Maintain team topology
      documentation as code, linking services to their responsible teams
      and backup contacts.
    tools:
      - backstage
      - pagerduty
      - opsgenie
      - kubernetes-rbac
      - git

  devsecops:
    prose: >-
      Enforce CODEOWNERS requirements in merge request workflows to ensure
      that changes to critical components are reviewed by designated
      responsible personnel. Configure CI/CD pipelines with role-based
      approval gates for production deployments. Maintain runbook
      repositories with documented responsibilities for incident response.
      Use merge request templates that require developers to identify the
      business continuity owner for new or modified services.
    tools:
      - gitlab-ci
      - codeowners
      - git
      - confluence
      - opsgenie

  secops:
    prose: >-
      Maintain incident response team rosters in the ITSM platform with
      automatic rotation and notification. Configure on-call schedules
      that ensure 24/7 coverage for critical response roles. Implement
      automated escalation paths that activate progressively when
      incidents are not acknowledged within defined timeframes. Generate
      periodic reports on response team readiness, including training
      completion and exercise participation.
    tools:
      - pagerduty
      - opsgenie
      - servicenow
      - splunk
      - jira

