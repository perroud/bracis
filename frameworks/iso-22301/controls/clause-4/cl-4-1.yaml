id: cl-4.1
family: clause-4
title: "Understanding the organization and its context"
class: ISO22301

statement:
  prose: >-
    The organization shall determine external and internal issues that are
    relevant to its purpose and that affect its ability to achieve the intended
    outcome(s) of its business continuity management system. These issues shall
    be taken into account when establishing, implementing, maintaining and
    continually improving the BCMS. The organization shall identify and document
    the activities that support the provision of products and services, the
    supply chains, and the relationships with interested parties.

guidance:
  prose: >-
    The organization should perform a comprehensive context analysis that
    considers the regulatory environment, geographic risks, technology
    dependencies, supply chain complexity, and critical business activities.
    External issues include legal, regulatory, economic, competitive,
    environmental, and cultural factors. Internal issues include governance
    structure, organizational culture, capabilities (people, processes,
    technology), contractual relationships, and resource constraints. The
    context analysis should be reviewed periodically and whenever significant
    changes occur in the business environment.

references:
  - citation: "ISO 22301:2019, Clause 4.1"
    url: "https://www.iso.org/standard/75106.html"
  - citation: "ISO/TS 22317:2015 — Business impact analysis"
    url: "https://www.iso.org/standard/50054.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Maintain a machine-readable service catalog (e.g., Backstage, Port) that
      documents all platform services, their dependencies, infrastructure
      regions, and upstream/downstream integrations. Use dependency mapping
      tools to automatically discover and visualize service relationships.
      Codify organizational context as structured data in version-controlled
      repositories so that changes to the operating environment are tracked
      and auditable. Integrate infrastructure topology discovery into the
      platform to maintain an up-to-date view of all deployment targets
      and their geographic distribution.
    tools:
      - backstage
      - port
      - servicenow-cmdb
      - terraform
      - crossplane

  devsecops:
    prose: >-
      Embed dependency analysis into CI/CD pipelines to automatically generate
      and maintain service dependency graphs. Use software bill of materials
      (SBOM) generation to document third-party and open-source dependencies.
      Integrate supply chain security tools to assess risks from external
      dependencies. Store context documentation as code alongside application
      repositories and validate completeness through automated checks in
      merge request pipelines.
    tools:
      - syft
      - gitlab-ci
      - cyclonedx
      - dependency-track
      - grype

  secops:
    prose: >-
      Aggregate threat intelligence feeds and regulatory change notifications
      to continuously update the organization's understanding of external
      risks. Maintain a risk register that correlates external threats with
      internal assets and services. Use CMDB integration to ensure that
      operational context remains current. Create dashboards that visualize
      the organization's exposure to disruption across geographies,
      technology stacks, and supply chain partners.
    tools:
      - servicenow
      - splunk
      - elastic-siem
      - misp
      - opencti

