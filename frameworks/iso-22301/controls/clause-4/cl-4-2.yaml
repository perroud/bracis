id: cl-4.2
family: clause-4
title: "Understanding the needs and expectations of interested parties"
class: ISO22301

statement:
  prose: >-
    The organization shall determine the interested parties that are relevant
    to the BCMS, the requirements of these interested parties (including their
    needs and expectations), and the legal and regulatory requirements that
    the organization has to comply with. The organization shall have
    documented information about interested parties and their requirements.

guidance:
  prose: >-
    Interested parties typically include customers, regulators, shareholders,
    employees, suppliers, partners, local communities, and emergency services.
    For each interested party, the organization should identify their
    expectations regarding business continuity, including minimum service
    levels, maximum tolerable downtime, communication requirements during
    disruptions, and contractual obligations. Regulatory requirements should
    be systematically identified and tracked, particularly for organizations
    operating in multiple jurisdictions. The analysis should be reviewed
    at least annually and whenever significant changes occur in stakeholder
    relationships or regulatory requirements.

references:
  - citation: "ISO 22301:2019, Clause 4.2"
    url: "https://www.iso.org/standard/75106.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Define service-level objectives (SLOs) and service-level agreements
      (SLAs) as code within the platform, linked to specific interested
      parties. Use an internal developer portal to publish availability
      targets, recovery objectives, and stakeholder communication channels.
      Maintain a compliance-as-code repository that tracks regulatory
      requirements per jurisdiction and maps them to platform capabilities.
      Implement automated SLO monitoring that continuously validates whether
      platform services meet interested party expectations.
    tools:
      - backstage
      - sloth
      - prometheus
      - open-policy-agent
      - git

  devsecops:
    prose: >-
      Integrate compliance requirement checks into CI/CD pipelines so that
      regulatory obligations are validated before deployment. Maintain
      structured requirement documents alongside code that map interested
      party expectations to specific service behaviors. Use automated
      testing to verify that services meet documented SLAs and recovery
      time objectives. Generate compliance evidence automatically as part
      of the build and deploy process.
    tools:
      - gitlab-ci
      - checkov
      - opa-conftest
      - inspec
      - junit

  secops:
    prose: >-
      Monitor compliance with interested party requirements through dashboards
      that track SLA adherence, regulatory filing deadlines, and
      communication obligations. Configure alerting for any deviation from
      committed service levels. Maintain audit trails that demonstrate
      ongoing compliance with stakeholder requirements. Integrate regulatory
      change monitoring services to detect new or modified requirements
      that affect the BCMS.
    tools:
      - grafana
      - pagerduty
      - servicenow
      - splunk
      - elastic-siem

