id: cl-4.3
family: clause-4
title: "Determining the scope of the BCMS"
class: ISO22301

statement:
  prose: >-
    The organization shall determine the boundaries and applicability of the
    BCMS to establish its scope. When determining this scope, the organization
    shall consider the external and internal issues referred to in 4.1, the
    requirements referred to in 4.2, and the organization's mission, goals,
    internal and external obligations (including those related to interested
    parties), and legal and regulatory requirements. The scope shall be
    available as documented information.

guidance:
  prose: >-
    The scope defines which organizational activities, products, services,
    locations, and technology systems are covered by the BCMS. The scope
    should be defined in terms of the critical activities identified through
    context analysis and stakeholder requirements. Exclusions must be
    justified and documented. For organizations with complex structures,
    the scope may need to address multiple sites, business units, or
    supply chain segments. The scope should be reviewed whenever the
    organization's context, interested party requirements, or risk
    profile changes significantly.

references:
  - citation: "ISO 22301:2019, Clause 4.3"
    url: "https://www.iso.org/standard/75106.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Define the BCMS scope as a structured document in the platform's
      configuration repository, explicitly listing in-scope services,
      infrastructure components, and environments. Use service catalog
      metadata to tag resources as in-scope or out-of-scope for business
      continuity. Implement resource labeling/tagging strategies in
      infrastructure-as-code to enforce scope boundaries across cloud
      providers and on-premises infrastructure. Automate scope validation
      to detect new services or resources that should be included.
    tools:
      - backstage
      - terraform
      - crossplane
      - kubernetes
      - git

  devsecops:
    prose: >-
      Maintain scope documentation in version control alongside the
      services it covers. Use CI/CD pipeline checks to ensure that new
      services deployed into production are evaluated for BCMS scope
      inclusion. Implement automated tagging and labeling requirements
      in deployment pipelines that enforce scope classification on all
      resources. Create merge request templates that prompt developers
      to assess business continuity impact for new services.
    tools:
      - gitlab-ci
      - opa-conftest
      - checkov
      - tfsec
      - git

  secops:
    prose: >-
      Maintain a live asset inventory that maps to the BCMS scope and
      alerts when new assets are discovered that may need scope inclusion.
      Use CMDB integration to ensure the scope document reflects actual
      operational reality. Generate periodic scope coverage reports that
      highlight gaps between documented scope and deployed assets.
      Monitor for shadow IT and undocumented services that fall outside
      the current BCMS scope.
    tools:
      - servicenow-cmdb
      - qualys
      - tenable
      - splunk
      - elastic-siem

