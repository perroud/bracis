id: cl-9.3
family: clause-9
title: "Management review"
class: ISO22301

statement:
  prose: >-
    Top management shall review the organization's BCMS at planned intervals
    to ensure its continuing suitability, adequacy, effectiveness and
    alignment with the strategic direction of the organization. The
    management review shall consider the status of actions from previous
    management reviews, changes in external and internal issues relevant
    to the BCMS, information on the BCMS performance including trends in
    nonconformities and corrective actions, monitoring and measurement
    results, audit results, risk assessment outcomes, exercise and test
    results, and opportunities for continual improvement.

guidance:
  prose: >-
    Management reviews should be conducted at least annually and should
    result in documented decisions and actions regarding changes to the
    BCMS, resource allocation, and improvement opportunities. Review
    inputs should include all performance data collected under Clause 9.1,
    internal audit results from Clause 9.2, exercise outcomes from
    Clause 8.6, and any lessons learned from actual disruptions. Review
    outputs should include decisions related to scope changes, resource
    needs, policy updates, objective modifications, and improvement
    initiatives. Minutes should be documented and action items tracked
    to completion. The review should assess whether the BCMS remains
    aligned with the organization's strategic direction and risk appetite.

references:
  - citation: "ISO 22301:2019, Clause 9.3"
    url: "https://www.iso.org/standard/75106.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Generate automated management review packs from platform telemetry
      that include availability trends, incident summaries, recovery test
      results, and capacity projections. Build executive dashboards that
      present BCMS performance metrics in business-relevant terms.
      Automate the collection of review inputs from multiple platform
      data sources into a consolidated report. Track management review
      actions in the platform's work management system with visibility
      and accountability.
    tools:
      - grafana
      - backstage
      - prometheus
      - jira
      - confluence

  devsecops:
    prose: >-
      Aggregate CI/CD pipeline metrics into management review reports
      showing deployment frequency, change failure rates, recovery
      times, and security scan trends. Generate evidence packages
      from pipeline artifacts that demonstrate BCMS control
      effectiveness. Automate the production of trend analysis
      reports from historical pipeline data. Maintain management
      review templates and action tracking in version control to
      ensure consistency and traceability.
    tools:
      - gitlab-ci
      - grafana
      - sonarqube
      - git
      - jira

  secops:
    prose: >-
      Produce management review reports from SIEM and GRC platforms
      that include incident trends, threat landscape changes, audit
      findings, and compliance status. Provide executive-level
      dashboards that summarize BCMS effectiveness in terms of
      risk reduction and resilience readiness. Track review action
      items in the ITSM platform and report completion status at
      subsequent reviews. Integrate external threat intelligence
      updates into review materials to ensure management has current
      risk context.
    tools:
      - splunk
      - servicenow-grc
      - elastic-siem
      - grafana
      - jira

