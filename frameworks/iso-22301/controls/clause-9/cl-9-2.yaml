id: cl-9.2
family: clause-9
title: "Internal audit"
class: ISO22301

statement:
  prose: >-
    The organization shall conduct internal audits at planned intervals to
    provide information on whether the BCMS conforms to the organization's
    own requirements for its BCMS, the requirements of ISO 22301, and is
    effectively implemented and maintained. The organization shall plan,
    establish, implement and maintain an audit programme including the
    frequency, methods, responsibilities, planning requirements and
    reporting. The organization shall select auditors and conduct audits
    to ensure objectivity and impartiality, ensure results are reported
    to relevant management, and retain documented information as evidence.

guidance:
  prose: >-
    Internal audits should be conducted at least annually and should cover
    all clauses of ISO 22301 over a defined audit cycle. The audit
    programme should be risk-based, with more frequent or detailed
    audits for areas with higher risk or previous nonconformities.
    Auditors must be independent of the activities they audit. The
    audit process should include planning (scope, criteria, schedule),
    execution (document review, interviews, observation, testing),
    reporting (findings, nonconformities, observations, opportunities
    for improvement), and follow-up (corrective action verification).
    Audit findings should feed into the management review process and
    drive continual improvement.

references:
  - citation: "ISO 22301:2019, Clause 9.2"
    url: "https://www.iso.org/standard/75106.html"
  - citation: "ISO 19011:2018 — Guidelines for auditing management systems"
    url: "https://www.iso.org/standard/70017.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated compliance scanning that continuously validates
      platform configurations against BCMS requirements. Use policy-as-code
      to define audit criteria and run automated assessments against
      infrastructure state. Generate audit evidence automatically from
      platform telemetry, configuration management databases, and
      deployment logs. Maintain audit trail records in tamper-evident
      storage. Build self-service audit dashboards that show compliance
      status in real time and generate audit-ready reports on demand.
    tools:
      - open-policy-agent
      - kyverno
      - cloud-custodian
      - inspec
      - backstage

  devsecops:
    prose: >-
      Use CI/CD pipeline results as audit evidence, including scanner
      reports, test results, approval records, and deployment logs.
      Implement compliance-as-code checks in pipelines that map to
      specific ISO 22301 requirements. Generate structured audit
      evidence as pipeline artifacts with full traceability from
      requirement to test result. Maintain audit templates and
      checklists in version control. Automate evidence collection
      for common audit questions (e.g., who approved this change,
      when was the last backup test, what vulnerabilities are open).
    tools:
      - gitlab-ci
      - inspec
      - checkov
      - sonarqube
      - git

  secops:
    prose: >-
      Configure SIEM and GRC platforms to automatically collect and
      organize audit evidence. Maintain audit schedules and finding
      tracking in the ITSM platform. Generate automated compliance
      reports that map control implementation evidence to ISO 22301
      requirements. Monitor for configuration drift that could indicate
      control failures. Provide auditors with read-only access to
      dashboards showing current compliance status and historical
      trends. Track corrective action implementation and verify
      closure through automated re-testing.
    tools:
      - servicenow-grc
      - splunk
      - elastic-siem
      - qualys
      - tenable

