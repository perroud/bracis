id: cl-9.1
family: clause-9
title: "Monitoring, measurement, analysis and evaluation"
class: ISO22301

statement:
  prose: >-
    The organization shall determine what needs to be monitored and measured,
    the methods for monitoring, measurement, analysis and evaluation to ensure
    valid results, when the monitoring and measuring shall be performed, when
    the results from monitoring and measurement shall be analysed and
    evaluated, and who shall analyse and evaluate these results. The
    organization shall retain appropriate documented information as evidence
    of the monitoring and measurement results. The organization shall
    evaluate the performance and the effectiveness of the BCMS.

guidance:
  prose: >-
    Monitoring and measurement should cover both the effectiveness of the
    BCMS itself and the readiness of business continuity arrangements.
    Key metrics include exercise completion rates, corrective action
    closure rates, plan review timeliness, RTO/RPO compliance during
    tests, incident response times, stakeholder communication timeliness,
    and audit finding remediation rates. The organization should define
    key performance indicators (KPIs) and key risk indicators (KRIs) that
    provide leading and lagging indicators of BCMS effectiveness.
    Performance data should be analyzed for trends and used to drive
    continual improvement. Results should be reported to management at
    defined intervals.

references:
  - citation: "ISO 22301:2019, Clause 9.1"
    url: "https://www.iso.org/standard/75106.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement comprehensive observability across the platform using
      metrics, logs, and traces. Define SLIs (service level indicators)
      for all critical services that map to business continuity
      objectives. Build automated dashboards that track availability,
      recovery test results, backup success rates, and replication
      status. Use alerting frameworks to provide early warning when
      continuity metrics degrade. Maintain metric definitions as code
      and track them through the platform's monitoring infrastructure.
    tools:
      - prometheus
      - grafana
      - datadog
      - thanos
      - jaeger

  devsecops:
    prose: >-
      Integrate continuity metrics collection into CI/CD pipelines.
      Track deployment frequency, change failure rate, recovery time
      from failed deployments, and test coverage for recovery
      procedures. Generate compliance evidence automatically as
      pipeline artifacts. Use scanner results (SAST, DAST, dependency
      scanning) as inputs to BCMS effectiveness metrics. Build
      dashboards that aggregate pipeline-level metrics into
      service-level continuity indicators.
    tools:
      - gitlab-ci
      - prometheus
      - grafana
      - sonarqube
      - trivy

  secops:
    prose: >-
      Aggregate BCMS performance data into executive dashboards that
      present KPIs and KRIs in a management-ready format. Monitor
      security scanner coverage and finding trends as indicators of
      risk posture. Track incident response metrics (MTTD, MTTR,
      MTTF) and correlate them with business continuity objectives.
      Generate automated compliance reports that demonstrate BCMS
      effectiveness to auditors and regulators. Configure automated
      anomaly detection on continuity metrics to identify degradation
      trends early.
    tools:
      - splunk
      - elastic-siem
      - grafana
      - servicenow
      - datadog

