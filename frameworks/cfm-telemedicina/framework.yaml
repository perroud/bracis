id: cfm-telemedicina
title: "Resolucao CFM 2.314/2022 -- Telemedicina no Brasil"
short_title: "CFM Telemedicina"
version: "2.314/2022"
publication_date: "2022-05-05"
last_updated: "2022-05-05"
effective_date: "2022-05-05"
authority:
  name: "Conselho Federal de Medicina"
  acronym: "CFM"
  country: "BR"
  url: "https://portal.cfm.org.br"
type: regulation
scope: telemedicine
mandatory: true
original_language: pt-br
available_languages: [pt-br]
industries:
  - healthcare
  - healthtech
  - telemedicine
  - digital-health
regions:
  - brazil
techstacks:
  - platform-engineering
  - devsecops
  - secops
  - gitops
url: "https://sistemas.cfm.org.br/normas/visualizar/resolucoes/BR/2022/2314"
control_families:
  - id: cap-1
    title: "Disposicoes Gerais"
    description: "Definicao de telemedicina, modalidades permitidas, principios eticos fundamentais e ambito de aplicacao da resolucao"
    articles: "art. 1 ao art. 4"
    control_count: 4
  - id: cap-2
    title: "Modalidades de Telemedicina"
    description: "Requisitos especificos para cada modalidade: teleconsulta, teleinterconsulta, telediagnostico, telecirurgia assistida, telemonitoramento e teletriagem"
    articles: "art. 5 ao art. 10"
    control_count: 6
  - id: cap-3
    title: "Seguranca da Informacao e Privacidade"
    description: "Requisitos de criptografia, armazenamento seguro de dados de saude, conformidade com a LGPD, consentimento informado e registro eletronico de atendimentos"
    articles: "art. 11 ao art. 16"
    control_count: 6
  - id: cap-4
    title: "Infraestrutura Tecnologica"
    description: "Requisitos de plataforma de telemedicina, disponibilidade e latencia, interoperabilidade entre sistemas de saude e certificacao de sistemas"
    articles: "art. 17 ao art. 21"
    control_count: 5
  - id: cap-5
    title: "Prontuario e Documentacao"
    description: "Prontuario eletronico do paciente, documentacao de teleconsultas, assinatura digital ICP-Brasil, guarda e retencao de dados clinicos"
    articles: "art. 22 ao art. 26"
    control_count: 5
  - id: cap-6
    title: "Responsabilidades e Fiscalizacao"
    description: "Responsabilidade medica em atendimento remoto, auditoria de servicos de telemedicina, fiscalizacao pelos CRMs e regime sancionatorio"
    articles: "art. 27 ao art. 30"
    control_count: 4
related_frameworks:
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD complementa a Resolucao CFM 2.314/2022 ao impor requisitos de protecao de
      dados pessoais e dados pessoais sensiveis (dados de saude) tratados em plataformas
      de telemedicina, incluindo base legal, consentimento e direitos dos titulares.
  - framework_id: hipaa
    relationship: mapped
    description: >-
      O HIPAA possui correspondencia com os requisitos de protecao de informacoes de
      saude da Resolucao CFM 2.314/2022, especialmente nas exigencias de
      confidencialidade, integridade e disponibilidade de registros medicos eletronicos
      e transmissao segura de dados clinicos.
