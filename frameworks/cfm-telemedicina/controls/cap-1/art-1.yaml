id: art-1
family: cap-1
title: "Definicao e Objeto da Telemedicina"
class: CFM-TELEMEDICINA
baselines: [telemedicina-all]
statement:
  prose: |
    Art. 1. Definir e regulamentar a telemedicina como forma de prestação
    de serviços médicos mediados por tecnologias de comunicação, com
    utilização de tecnologias digitais de informação e comunicação.

    Parágrafo único. A telemedicina abrange o exercício da medicina mediado
    por tecnologias para fins de assistência, educação, pesquisa,
    prevenção de doenças e lesões e promoção de saúde, observados os
    princípios éticos, legais e normativos que regem a prática médica
    presencial.
guidance:
  prose: |
    O art. 1 estabelece a telemedicina como pratica medica plenamente
    reconhecida pelo CFM, desde que conduzida com o mesmo rigor etico
    e tecnico da medicina presencial.

    **Pontos fundamentais:**
    - Telemedicina nao e uma especialidade medica separada; e uma
      modalidade de exercicio da medicina
    - Toda legislacao e normativa aplicavel a medicina presencial
      aplica-se integralmente a telemedicina
    - O medico que pratica telemedicina deve estar regularmente
      inscrito no CRM de sua jurisdicao
    - A relacao medico-paciente permanece como principio central,
      independentemente do meio de comunicacao utilizado

    **Tecnologias abrangidas:**
    Qualquer tecnologia digital de informacao e comunicacao, incluindo
    videoconferencia, mensageria segura, plataformas especializadas
    de telemedicina, dispositivos IoT medicos e sistemas de
    telemonitoramento.
implementation_guidance:
  platform_engineering:
    prose: |
      **Inventario de sistemas de telemedicina:**
      1. Catalogar todas as plataformas, aplicacoes e sistemas que
         suportam servicos de telemedicina na organizacao.
      2. Classificar cada sistema por modalidade de telemedicina
         suportada (teleconsulta, telediagnostico, telemonitoramento).
      3. Manter registro automatizado de versoes, certificacoes e
         conformidade regulatoria de cada plataforma.
      4. Implementar tags de classificacao em infraestrutura como
         codigo para identificar recursos em escopo da Resolucao
         CFM 2.314/2022.
    tools:
      - cmdb
      - asset-discovery
      - infrastructure-as-code
      - compliance-dashboard
  devsecops:
    prose: |
      **Pipeline de conformidade para sistemas de telemedicina:**
      1. Criar pipeline CI/CD especializado para sistemas de
         telemedicina com gates de conformidade CFM 2.314.
      2. Implementar verificacao automatica de que todo sistema
         de telemedicina possui documentacao de conformidade
         atualizada antes de deploy em producao.
      3. Manter rastreabilidade entre requisitos da resolucao e
         funcionalidades implementadas nos sistemas.
    tools:
      - gitlab-ci
      - compliance-pipeline
      - requirements-tracing
  secops:
    prose: |
      **Programa de conformidade com CFM 2.314/2022:**
      1. Designar responsavel pelo programa de conformidade com
         a Resolucao CFM 2.314/2022.
      2. Criar matriz de conformidade mapeando cada artigo da
         resolucao para controles tecnicos implementados.
      3. Verificar que todos os medicos que utilizam telemedicina
         possuem inscricao ativa no CRM competente.
      4. Implementar processo de revisao periodica de conformidade
         com atualizacoes regulatorias do CFM.
    tools:
      - grc-platform
      - regulatory-tracking
      - compliance-dashboard
legal_references:
