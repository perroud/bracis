id: art-3
family: cap-1
title: "Principios Eticos da Telemedicina"
class: CFM-TELEMEDICINA
baselines: [telemedicina-all]
statement:
  prose: |
    Art. 3. O exercício da telemedicina deve observar os seguintes
    princípios éticos fundamentais:

    I - autonomia do paciente: o paciente tem direito de recusar o
    atendimento por telemedicina, podendo optar pelo atendimento
    presencial a qualquer momento;

    II - beneficência e não maleficência: o atendimento por telemedicina
    só deve ser realizado quando houver benefício ao paciente e não
    houver prejuízo pela ausência de exame físico presencial;

    III - sigilo e confidencialidade: as informações do paciente
    transmitidas por meios eletrônicos devem ser protegidas com o
    mesmo nível de sigilo da consulta presencial;

    IV - relação médico-paciente: a telemedicina deve preservar e
    fortalecer a relação médico-paciente, não substituindo o
    atendimento presencial quando este for necessário.
guidance:
  prose: |
    O art. 3 transpoe os principios bioeticos classicos para o contexto
    digital da telemedicina, criando obrigacoes tanto para o medico
    quanto para os sistemas tecnologicos que suportam o atendimento.

    **Autonomia do paciente (inciso I):**
    O paciente deve ser informado de que esta sendo atendido por
    telemedicina e deve consentir explicitamente. A qualquer momento,
    pode solicitar atendimento presencial, e essa solicitacao deve
    ser viabilizada pela organizacao de saude.

    **Implicacoes para sistemas de TI:**
    - Sigilo e confidencialidade (inciso III) traduz-se diretamente
      em requisitos tecnicos de criptografia, controle de acesso e
      protecao de dados
    - A autonomia do paciente requer que sistemas registrem
      consentimento e permitam revogacao
    - A nao maleficencia implica que sistemas de telemedicina devem
      ter mecanismos para escalonar para atendimento presencial
      quando indicado clinicamente

    **Relacao com LGPD:**
    O inciso III complementa os requisitos da LGPD para dados
    pessoais sensiveis (dados de saude), exigindo protecao adicional
    alem do minimo legal.
implementation_guidance:
  platform_engineering:
    prose: |
      **Implementacao de principios eticos em plataforma:**
      1. Implementar mecanismo de consentimento granular que permita
         ao paciente aceitar ou recusar telemedicina por modalidade
         e por atendimento.
      2. Criar fluxo de escalonamento automatico para atendimento
         presencial quando medico ou paciente indicar necessidade.
      3. Garantir que toda comunicacao medico-paciente utilize
         criptografia fim-a-fim (TLS 1.3 minimo para transito,
         AES-256 para repouso).
      4. Implementar controle de acesso baseado em funcao (RBAC)
         que restrinja acesso a dados clinicos apenas a medico
         responsavel pelo atendimento.
    tools:
      - consent-management
      - encryption-at-rest
      - tls-termination
      - rbac-engine
  devsecops:
    prose: |
      **Verificacao automatizada de conformidade etica:**
      1. Criar testes automatizados que validem que todo fluxo de
         teleconsulta inclui etapa de consentimento antes de inicio
         do atendimento.
      2. Implementar verificacao de criptografia em todas as APIs
         que transmitem dados de saude como gate de pipeline.
      3. Validar que mecanismo de revogacao de consentimento funciona
         corretamente e gera registros auditiveis.
    tools:
      - gitlab-ci
      - api-security-testing
      - consent-validation
      - encryption-verification
  secops:
    prose: |
      **Governanca de principios eticos:**
      1. Documentar como cada principio etico do art. 3 e
         implementado nos sistemas de telemedicina.
      2. Auditar periodicamente o funcionamento do mecanismo de
         consentimento e revogacao.
      3. Monitorar incidentes de violacao de sigilo e manter
         registro de tratamento conforme exigido pelo CFM.
      4. Treinar equipe tecnica sobre implicacoes eticas das
         decisoes de arquitetura em sistemas de saude.
    tools:
      - grc-platform
      - audit-management
      - incident-tracking
      - training-platform
legal_references:
