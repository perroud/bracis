id: art-2
family: cap-1
title: "Modalidades de Telemedicina Permitidas"
class: CFM-TELEMEDICINA
baselines: [telemedicina-all]
statement:
  prose: |
    Art. 2. A telemedicina pode ser exercida nas seguintes modalidades:

    I - teleconsulta: consulta médica realizada a distância, com médico
    e paciente localizados em pontos geográficos distintos, mediada por
    tecnologias de comunicação;

    II - teleinterconsulta: troca de informações e opiniões entre médicos
    para auxílio diagnóstico ou terapêutico;

    III - telediagnóstico: emissão de laudo ou parecer por médico a
    distância, baseado em dados transmitidos eletronicamente;

    IV - telecirurgia assistida por robôs: procedimento cirúrgico
    realizado por robô, comandado a distância por médico;

    V - telemonitoramento: monitoramento a distância de parâmetros de
    saúde ou doença por meio de tecnologia da informação e comunicação;

    VI - teletriagem: avaliação a distância dos sintomas do paciente para
    direcionamento ao nível adequado de atenção à saúde.
guidance:
  prose: |
    O art. 2 enumera taxativamente as seis modalidades de telemedicina
    reconhecidas pelo CFM. Cada modalidade possui requisitos tecnicos
    e eticos especificos detalhados nos artigos subsequentes.

    **Hierarquia de complexidade tecnologica:**
    - Teletriagem: menor complexidade; pode utilizar questionarios
      estruturados e comunicacao assincrona
    - Telemonitoramento: requer integracao com dispositivos IoT
      medicos e coleta continua de dados
    - Teleconsulta: exige videoconferencia em tempo real com
      qualidade adequada para avaliacao clinica
    - Teleinterconsulta: comunicacao medico-medico que pode ser
      sincrona ou assincrona
    - Telediagnostico: exige transmissao fidedigna de exames e
      imagens com qualidade diagnostica
    - Telecirurgia: maior complexidade; exige latencia ultrabaixa,
      redundancia e controle robotico em tempo real

    **Restricao importante:**
    Modalidades nao listadas no art. 2 nao sao reconhecidas pelo CFM.
    Qualquer nova modalidade requer atualizacao da resolucao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Arquitetura multimodal de telemedicina:**
      1. Projetar arquitetura de plataforma que suporte todas as seis
         modalidades com isolamento de requisitos tecnicos por modalidade.
      2. Implementar modulos independentes para cada modalidade, com
         contratos de API bem definidos e versionados.
      3. Definir SLAs distintos por modalidade: telecirurgia exige
         latencia < 150ms; teleconsulta < 500ms; teletriagem admite
         comunicacao assincrona.
      4. Manter registro de quais modalidades cada instancia da
         plataforma suporta e validar contra certificacoes exigidas.
    tools:
      - microservices-architecture
      - api-gateway
      - service-mesh
      - sla-monitoring
  devsecops:
    prose: |
      **Pipelines por modalidade:**
      1. Criar pipelines CI/CD especificos por modalidade de
         telemedicina, com requisitos de qualidade e seguranca
         proporcionais a complexidade.
      2. Telecirurgia e telediagnostico devem ter pipeline com
         testes de latencia, integridade de dados e redundancia
         como gates obrigatorios.
      3. Implementar testes automatizados de conformidade que
         validem que cada modalidade atende seus requisitos
         regulatorios especificos.
    tools:
      - gitlab-ci
      - performance-testing
      - integration-testing
      - compliance-gates
  secops:
    prose: |
      **Governanca por modalidade:**
      1. Documentar quais modalidades de telemedicina a organizacao
         oferece e garantir que cada uma possui aprovacao regulatoria.
      2. Manter registro de medicos habilitados para cada modalidade,
         verificando competencia tecnica especifica.
      3. Implementar auditoria periodica de conformidade por
         modalidade, com checklist derivado dos artigos 5 a 10.
      4. Estabelecer processo de aprovacao para ativacao de novas
         modalidades de telemedicina na organizacao.
    tools:
      - grc-platform
      - provider-credentialing
      - audit-management
legal_references:
