id: art-20
family: cap-4
title: "Certificacao de Sistemas de Telemedicina"
class: CFM-TELEMEDICINA
baselines: [telemedicina-all]
statement:
  prose: |
    Art. 20. Os sistemas e plataformas de telemedicina devem
    possuir certificação ou conformidade comprovada com normas
    técnicas aplicáveis a software de saúde.

    Parágrafo 1. Sistemas que realizam funções de prontuário
    eletrônico devem atender aos requisitos de certificação
    SBIS/CFM (Sociedade Brasileira de Informática em Saúde /
    Conselho Federal de Medicina).

    Parágrafo 2. Sistemas classificados como dispositivos médicos
    pela ANVISA devem possuir registro vigente na agência.

    Parágrafo 3. A instituição de saúde deve manter documentação
    atualizada das certificações e registros de todos os sistemas
    de telemedicina em uso.
guidance:
  prose: |
    O art. 20 exige que sistemas de telemedicina possuam
    certificacoes adequadas, nao bastando conformidade informal.

    **Certificacao SBIS/CFM (paragrafo 1):**
    A certificacao SBIS/CFM avalia sistemas de registro eletronico
    em saude (S-RES) nos seguintes niveis:
    - Nivel de Garantia de Seguranca 1 (NGS1): requisitos basicos
      de seguranca, integridade e auditoria
    - Nivel de Garantia de Seguranca 2 (NGS2): requisitos avancados,
      incluindo assinatura digital ICP-Brasil e carimbo do tempo

    **Registro ANVISA (paragrafo 2):**
    Software de telemedicina pode ser classificado como dispositivo
    medico pela ANVISA (RDC 185/2001 e RN 36/2021), especialmente:
    - Software que auxilia diagnostico (classe de risco II ou III)
    - Software que controla dispositivos medicos (telecirurgia)
    - Software de monitoramento com alertas clinicos
    - Software de classificacao de risco (teletriagem)

    **Documentacao (paragrafo 3):**
    A instituicao deve manter registro atualizado de:
    - Certificacao SBIS/CFM com validade e nivel
    - Registro ANVISA com numero e classe de risco
    - Conformidade com IEC 62304 e ISO 14971
    - Avaliacoes de seguranca e penetration tests
implementation_guidance:
  platform_engineering:
    prose: |
      **Conformidade com certificacoes:**
      1. Implementar requisitos de certificacao SBIS/CFM NGS2
         nativamente na plataforma: assinatura digital ICP-Brasil,
         carimbo do tempo, trilha de auditoria completa.
      2. Manter documentacao tecnica exigida pela ANVISA para
         registro de software medico: analise de riscos (ISO 14971),
         ciclo de vida (IEC 62304), validacao e verificacao.
      3. Implementar rastreabilidade de requisitos regulatorios
         no sistema de gestao de desenvolvimento.
      4. Manter ambiente de homologacao permanente para validacao
         de conformidade pre-release.
    tools:
      - digital-signature-icp
      - timestamp-authority
      - requirements-traceability
      - validation-environment
  devsecops:
    prose: |
      **Pipeline de certificacao:**
      1. Implementar gates de pipeline que validem requisitos de
         certificacao SBIS/CFM antes de cada release.
      2. Automatizar geracao de documentacao de conformidade
         (relatorio de testes, analise de riscos, rastreabilidade).
      3. Executar testes de seguranca (SAST, DAST, pentest) como
         parte do processo de certificacao continua.
      4. Manter evidencias de conformidade versionadas no
         repositorio junto ao codigo-fonte.
    tools:
      - gitlab-ci
      - compliance-documentation
      - security-testing
      - evidence-management
  secops:
    prose: |
      **Gestao de certificacoes:**
      1. Manter inventario de todas as certificacoes e registros
         de sistemas de telemedicina, com datas de validade e
         alertas de renovacao.
      2. Monitorar alteracoes regulatorias que possam afetar
         certificacoes existentes.
      3. Coordenar processo de renovacao de certificacoes com
         antecedencia minima de 6 meses antes da expiracao.
      4. Documentar nao conformidades identificadas em auditorias
         e respectivos planos de correcao.
    tools:
      - certification-registry
      - regulatory-tracking
      - renewal-management
      - non-conformity-management
