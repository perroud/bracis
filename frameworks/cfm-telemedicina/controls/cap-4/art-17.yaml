id: art-17
family: cap-4
title: "Requisitos de Plataforma de Telemedicina"
class: CFM-TELEMEDICINA
baselines: [telemedicina-all]
statement:
  prose: |
    Art. 17. As plataformas tecnológicas utilizadas para prestação
    de serviços de telemedicina devem atender requisitos mínimos de
    segurança, funcionalidade e conformidade regulatória.

    Parágrafo 1. A plataforma deve garantir:
    I - criptografia de dados em trânsito e em repouso;
    II - autenticação multifator para profissionais de saúde;
    III - registro completo de auditoria de todas as operações;
    IV - integração com prontuário eletrônico;
    V - mecanismo de consentimento informado digital;
    VI - suporte a assinatura digital.

    Parágrafo 2. As plataformas devem ser desenvolvidas em
    conformidade com normas técnicas de software médico,
    incluindo requisitos de segurança da informação e
    privacidade aplicáveis.

    Parágrafo 3. É responsabilidade da instituição de saúde
    verificar que a plataforma utilizada atende todos os
    requisitos desta resolução antes de sua adoção.
guidance:
  prose: |
    O art. 17 consolida os requisitos tecnicos minimos que toda
    plataforma de telemedicina deve atender. Na pratica, funciona
    como um checklist de avaliacao para aquisicao ou desenvolvimento
    de plataformas.

    **Avaliacao de plataformas:**
    Antes de adotar qualquer plataforma de telemedicina, a
    instituicao deve verificar:
    - Conformidade com todos os seis requisitos do paragrafo 1
    - Certificacao ou conformidade com normas de software medico
      (IEC 62304, ISO 14971 para gestao de riscos)
    - Conformidade com LGPD e Resolucao CFM 2.314/2022
    - Politica de seguranca e privacidade do fornecedor
    - Capacidade de integracao com sistemas existentes

    **Normas tecnicas relevantes (paragrafo 2):**
    - IEC 62304: Software de dispositivo medico -- processos de
      ciclo de vida do software
    - ISO 14971: Gestao de riscos para dispositivos medicos
    - ISO 27001: Sistema de gestao de seguranca da informacao
    - ISO 27799: Gestao de seguranca da informacao em saude
    - SBIS/CFM: Requisitos de certificacao de sistemas de
      registro eletronico em saude

    **Responsabilidade institucional (paragrafo 3):**
    A responsabilidade pela conformidade da plataforma e da
    instituicao de saude, nao do fornecedor. Due diligence
    pre-aquisicao e obrigatoria.
implementation_guidance:
  platform_engineering:
    prose: |
      **Requisitos de arquitetura de plataforma:**
      1. Implementar todos os seis requisitos do paragrafo 1 como
         funcionalidades nativas da plataforma, nao como add-ons.
      2. Projetar arquitetura com separacao clara entre camadas
         de apresentacao, logica de negocio e dados, facilitando
         auditoria e certificacao.
      3. Implementar API de integracao documentada e versionada
         para conexao com prontuario eletronico (HL7 FHIR R4).
      4. Manter processo de desenvolvimento conforme IEC 62304
         (ciclo de vida de software medico) com documentacao
         completa de requisitos, design e testes.
      5. Implementar monitoramento de saude da plataforma com
         alertas para degradacao de servico.
    tools:
      - hl7-fhir
      - api-gateway
      - platform-monitoring
      - software-lifecycle
  devsecops:
    prose: |
      **Pipeline de conformidade de plataforma:**
      1. Implementar checklist automatizado de conformidade que
         verifica todos os requisitos do paragrafo 1 como parte
         do pipeline de release.
      2. Executar SAST, DAST e dependency scanning em toda
         release da plataforma.
      3. Manter documentacao de conformidade com IEC 62304
         versionada junto ao codigo-fonte.
      4. Implementar testes de regressao que validem que
         atualizacoes nao quebram funcionalidades regulatorias.
    tools:
      - gitlab-ci
      - sast
      - dast
      - dependency-scanning
      - compliance-documentation
  secops:
    prose: |
      **Governanca de plataforma:**
      1. Realizar avaliacao formal de conformidade da plataforma
         antes de adocao, documentando resultado de cada requisito.
      2. Manter registro de todas as plataformas de telemedicina
         em uso, com status de conformidade atualizado.
      3. Auditar anualmente a conformidade de plataformas em uso
         com os requisitos da resolucao.
      4. Estabelecer processo de avaliacao de fornecedores com
         requisitos minimos de seguranca e privacidade.
    tools:
      - vendor-assessment
      - compliance-registry
      - audit-management
      - grc-platform
