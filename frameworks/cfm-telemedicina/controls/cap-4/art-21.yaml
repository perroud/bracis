id: art-21
family: cap-4
title: "Seguranca de Rede e Infraestrutura"
class: CFM-TELEMEDICINA
baselines: [telemedicina-all]
statement:
  prose: |
    Art. 21. A infraestrutura de rede e comunicação utilizada para
    telemedicina deve ser segura, resiliente e adequada à modalidade
    de atendimento prestada.

    Parágrafo 1. A infraestrutura deve possuir:
    I - segmentação de rede para isolamento de dados de saúde;
    II - firewall e sistemas de detecção e prevenção de intrusão;
    III - proteção contra ataques de negação de serviço (DDoS);
    IV - redundância de conexão para modalidades críticas.

    Parágrafo 2. Testes de segurança de infraestrutura devem ser
    realizados periodicamente, incluindo testes de penetração e
    varredura de vulnerabilidades.

    Parágrafo 3. Incidentes de segurança que afetem a infraestrutura
    de telemedicina devem ser tratados conforme plano de resposta
    a incidentes documentado e testado.
guidance:
  prose: |
    O art. 21 trata da seguranca da infraestrutura de rede,
    reconhecendo que a telemedicina depende fundamentalmente
    de conectividade segura e confiavel.

    **Segmentacao de rede (inciso I):**
    Dados de saude devem trafegar em segmento de rede isolado,
    separado de trafego corporativo generico. Na pratica:
    - VLANs dedicadas para sistemas de telemedicina
    - VPNs site-to-site para comunicacao entre instituicoes
    - Network policies (Kubernetes) para isolamento de microservicos
    - Zero Trust Network Architecture como modelo preferencial

    **Protecao contra ameacas (incisos II e III):**
    - WAF (Web Application Firewall) para aplicacoes web
    - IDS/IPS para deteccao e prevencao de intrusao
    - DDoS mitigation com capacidade de absorver ataques
      volumetricos sem afetar disponibilidade do servico
    - NDR (Network Detection and Response) para deteccao de
      ameacas avancadas

    **Testes de seguranca (paragrafo 2):**
    - Penetration testing: no minimo anual e apos mudancas
      significativas de infraestrutura
    - Varredura de vulnerabilidades: no minimo mensal
    - Red team exercises: recomendado anual para plataformas
      de grande porte
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de rede segura:**
      1. Implementar segmentacao de rede com VLANs dedicadas
         para sistemas de telemedicina, com firewalls entre
         segmentos e politica de deny-all como padrao.
      2. Configurar WAF, IDS/IPS e protecao DDoS em toda
         infraestrutura de telemedicina acessivel externamente.
      3. Implementar redundancia de conexao com failover
         automatico para modalidades criticas (telecirurgia,
         telemonitoramento de UTI).
      4. Adotar modelo Zero Trust: autenticacao e autorizacao
         em cada requisicao, nao apenas no perimetro.
      5. Implementar Network Policies (Calico, Cilium) para
         isolamento de microservicos em ambiente Kubernetes.
    tools:
      - network-segmentation
      - waf
      - ids-ips
      - ddos-protection
      - zero-trust
  devsecops:
    prose: |
      **Pipeline de seguranca de infraestrutura:**
      1. Implementar Infrastructure as Code (IaC) scanning para
         detectar configuracoes inseguras antes de deploy.
      2. Executar varredura de vulnerabilidades de infraestrutura
         como parte do pipeline CI/CD.
      3. Automatizar testes de segmentacao de rede, validando
         que sistemas de telemedicina estao isolados conforme
         politica definida.
      4. Implementar testes de penetracao automatizados em cada
         release, com testes manuais anuais complementares.
    tools:
      - gitlab-ci
      - iac-scanning
      - vulnerability-scanning
      - network-testing
      - penetration-testing
  secops:
    prose: |
      **Operacao de seguranca de rede:**
      1. Monitorar 24/7 a infraestrutura de telemedicina com
         SOC (Security Operations Center) ou servico equivalente.
      2. Executar testes de penetracao anuais e varredura de
         vulnerabilidades mensal na infraestrutura de telemedicina.
      3. Manter plano de resposta a incidentes documentado e
         testado, com simulacoes semestrais.
      4. Analisar logs de firewall, IDS/IPS e WAF para deteccao
         proativa de ameacas e tentativas de intrusao.
    tools:
      - soc
      - siem
      - vulnerability-management
      - incident-response
