id: art-13
family: cap-3
title: "Conformidade com a LGPD para Dados de Saude"
class: CFM-TELEMEDICINA
baselines: [telemedicina-all]
statement:
  prose: |
    Art. 13. O tratamento de dados pessoais e dados pessoais
    sensíveis de saúde em plataformas de telemedicina deve observar
    integralmente a Lei Geral de Proteção de Dados Pessoais
    (Lei 13.709/2018 - LGPD).

    Parágrafo 1. Dados de saúde são considerados dados pessoais
    sensíveis nos termos da LGPD e seu tratamento requer base
    legal específica prevista no art. 11 da referida lei.

    Parágrafo 2. As plataformas de telemedicina devem implementar
    medidas técnicas e administrativas para garantir os direitos
    dos titulares previstos na LGPD, incluindo acesso, correção,
    portabilidade e eliminação de dados.

    Parágrafo 3. Em caso de incidente de segurança que envolva
    dados pessoais de saúde, a organização deve notificar a
    Autoridade Nacional de Proteção de Dados (ANPD) e os titulares
    afetados nos prazos legais estabelecidos.
guidance:
  prose: |
    O art. 13 vincula explicitamente as plataformas de telemedicina
    a conformidade com a LGPD, reforcando que dados de saude
    possuem protecao adicional como dados pessoais sensiveis.

    **Bases legais aplicaveis (art. 11 LGPD):**
    Para tratamento de dados de saude em telemedicina, as bases
    legais mais comuns sao:
    - Consentimento especifico e destacado do titular (art. 11, I)
    - Tutela da saude, em procedimento realizado por profissionais
      de saude ou autoridade sanitaria (art. 11, II, f)
    - Protecao da vida ou incolumidade fisica (art. 11, II, e)

    **Direitos dos titulares (paragrafo 2):**
    Plataformas de telemedicina devem implementar mecanismos
    tecnicos para viabilizar:
    - Acesso: paciente visualiza todos seus dados de saude
    - Correcao: paciente solicita retificacao de dados incorretos
    - Portabilidade: exportacao de dados em formato interoperavel
    - Eliminacao: exclusao de dados quando nao mais necessarios
      (respeitando prazos legais de retencao de prontuario)

    **Notificacao de incidentes (paragrafo 3):**
    A ANPD exige notificacao em prazo razoavel (regulamentacao
    define 72 horas como referencia). Incidentes com dados de saude
    sao considerados de alto risco pela ANPD.
implementation_guidance:
  platform_engineering:
    prose: |
      **Implementacao de conformidade LGPD:**
      1. Implementar portal de privacidade do paciente com
         funcionalidades de acesso, correcao, portabilidade e
         eliminacao de dados pessoais de saude.
      2. Criar mecanismo de gestao de consentimento granular que
         registre base legal especifica para cada tipo de
         tratamento de dados de saude.
      3. Implementar funcionalidade de exportacao de dados em
         formato HL7 FHIR para portabilidade interoperavel.
      4. Criar processo automatizado de anonimizacao ou eliminacao
         de dados quando solicitado, respeitando obrigacoes legais
         de retencao de prontuario (minimo 20 anos).
      5. Implementar sistema de deteccao e notificacao de
         incidentes de seguranca com dados de saude.
    tools:
      - privacy-portal
      - consent-management
      - hl7-fhir
      - data-anonymization
      - incident-detection
  devsecops:
    prose: |
      **Pipeline de conformidade LGPD:**
      1. Implementar DPIA (Data Protection Impact Assessment)
         automatizado como gate de pipeline para novos servicos
         que tratem dados de saude.
      2. Testar funcionalidades de direitos dos titulares
         (acesso, correcao, portabilidade, eliminacao) como
         parte do pipeline CI/CD.
      3. Verificar que logs e registros de tratamento de dados
         estao sendo gerados corretamente.
      4. Implementar scan de codigo para detectar tratamento
         de dados de saude sem base legal documentada.
    tools:
      - gitlab-ci
      - dpia-automation
      - privacy-testing
      - data-flow-analysis
  secops:
    prose: |
      **Operacao de conformidade LGPD:**
      1. Manter registro de atividades de tratamento (ROPA) de
         todos os dados de saude processados em telemedicina.
      2. Designar Encarregado de Protecao de Dados (DPO) com
         conhecimento em dados de saude.
      3. Implementar processo de resposta a incidentes com dados
         pessoais, incluindo notificacao a ANPD em 72 horas.
      4. Realizar auditorias periodicas de conformidade LGPD
         especificas para tratamento de dados de saude.
    tools:
      - ropa-management
      - dpo-workflow
      - incident-response
      - privacy-audit
