id: art-23
family: cap-5
title: "Documentacao de Teleconsulta e Gravacao de Sessoes"
class: CFM-TELEMEDICINA
baselines: [telemedicina-all]
statement:
  prose: |
    Art. 23. A documentação de cada atendimento por teleconsulta
    deve ser completa e detalhada, permitindo a reconstrução do
    processo de raciocínio clínico e decisões tomadas.

    Parágrafo 1. Além dos campos obrigatórios do registro de
    atendimento, a documentação da teleconsulta deve incluir:
    I - qualidade da comunicação durante o atendimento (se houve
    dificuldades técnicas que possam ter comprometido a avaliação);
    II - justificativa para escolha da telemedicina quando a
    avaliação presencial seria mais adequada;
    III - orientações fornecidas ao paciente sobre sinais de alerta.

    Parágrafo 2. A gravação audiovisual da teleconsulta somente
    pode ser realizada com consentimento explícito e específico
    do paciente, registrado previamente ao início da gravação.

    Parágrafo 3. Gravações de teleconsulta, quando realizadas,
    devem ser armazenadas com o mesmo nível de segurança e
    confidencialidade do prontuário eletrônico.
guidance:
  prose: |
    O art. 23 trata da documentacao detalhada da teleconsulta,
    incluindo aspectos especificos do meio digital que nao
    existem na consulta presencial.

    **Registro de qualidade tecnica (inciso I):**
    O medico deve registrar se houve problemas tecnicos durante
    a teleconsulta (queda de video, audio ruim, interrupcoes)
    que possam ter afetado a qualidade da avaliacao clinica.
    Isso e importante para:
    - Defesa medica em caso de questionamento
    - Decisao sobre necessidade de consulta presencial
    - Melhoria continua da infraestrutura

    **Gravacao de sessoes (paragrafo 2):**
    A gravacao e OPCIONAL e requer consentimento SEPARADO do
    consentimento generico de telemedicina. Consideracoes:
    - Consentimento deve ser obtido ANTES de iniciar gravacao
    - Paciente pode recusar gravacao sem prejuizo do atendimento
    - Gravacoes sao dados pessoais sensiveis (LGPD art. 11)
    - Armazenamento com mesma seguranca do prontuario

    **Uso de gravacoes:**
    Gravacoes podem ser utilizadas para: defesa medica,
    auditoria de qualidade, educacao medica (com anonimizacao),
    e instrucao processual. Nao podem ser compartilhadas sem
    autorizacao judicial ou consentimento do paciente.
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de documentacao de teleconsulta:**
      1. Implementar formulario de documentacao com campos
         especificos da teleconsulta: qualidade tecnica da
         sessao, justificativa quando presencial seria melhor,
         sinais de alerta orientados ao paciente.
      2. Criar modulo de gravacao audiovisual opcional, ativado
         apenas apos consentimento explicito e especifico do
         paciente, com indicador visual de gravacao ativa.
      3. Armazenar gravacoes com criptografia AES-256, em
         repositorio com controle de acesso restrito e
         equivalente ao prontuario eletronico.
      4. Implementar coleta automatica de metricas de qualidade
         da sessao (latencia, resolucao, interrupcoes) para
         registro no prontuario.
      5. Implementar politica de retencao de gravacoes conforme
         legislacao (minimo 20 anos, equivalente ao prontuario).
    tools:
      - recording-system
      - encryption-at-rest
      - session-quality-metrics
      - retention-management
  devsecops:
    prose: |
      **Qualidade da documentacao:**
      1. Testar que gravacao nao inicia sem consentimento
         explicito e especifico registrado.
      2. Verificar que metricas de qualidade da sessao sao
         coletadas automaticamente e registradas.
      3. Validar que gravacoes sao armazenadas com criptografia
         e controle de acesso adequados.
      4. Testar que indicador visual de gravacao e exibido
         para ambas as partes durante toda a sessao.
    tools:
      - gitlab-ci
      - consent-testing
      - encryption-verification
      - ui-testing
  secops:
    prose: |
      **Operacao de documentacao e gravacao:**
      1. Auditar que documentacoes de teleconsulta incluem
         registro de qualidade tecnica da sessao.
      2. Verificar que gravacoes possuem consentimento especifico
         registrado para cada sessao gravada.
      3. Monitorar acesso a gravacoes, alertando acessos nao
         autorizados ou excessivos.
      4. Verificar que gravacoes estao sendo retidas pelo
         periodo legal e eliminadas quando aplicavel.
    tools:
      - audit-management
      - access-monitoring
      - retention-monitoring
      - compliance-dashboard
