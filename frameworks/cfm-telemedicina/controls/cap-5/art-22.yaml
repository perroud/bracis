id: art-22
family: cap-5
title: "Prontuario Eletronico do Paciente em Telemedicina"
class: CFM-TELEMEDICINA
baselines: [telemedicina-all]
statement:
  prose: |
    Art. 22. O prontuário eletrônico do paciente (PEP) utilizado em
    telemedicina deve atender integralmente aos requisitos do
    Conselho Federal de Medicina e da Sociedade Brasileira de
    Informática em Saúde (SBIS) para sistemas de registro eletrônico
    em saúde (S-RES).

    Parágrafo 1. O PEP deve consolidar todos os registros de
    atendimento do paciente, independentemente da modalidade
    (presencial ou por telemedicina), em visão unificada.

    Parágrafo 2. Os registros de atendimentos por telemedicina no
    PEP devem incluir identificação da modalidade utilizada, além
    de todos os demais campos obrigatórios do registro de
    atendimento.

    Parágrafo 3. O PEP deve ser acessível ao paciente para
    consulta de seus próprios dados, conforme direito garantido
    pelo Código de Ética Médica e pela LGPD.
guidance:
  prose: |
    O art. 22 reforca que o PEP e o repositorio central de dados
    clinicos do paciente, e que atendimentos por telemedicina
    devem ser registrados no mesmo prontuario de atendimentos
    presenciais.

    **Visao unificada (paragrafo 1):**
    O paciente atendido presencialmente e por telemedicina deve
    ter um unico prontuario. Nao e aceitavel manter prontuarios
    separados por modalidade. Isso exige integracao entre
    plataforma de telemedicina e sistema de PEP.

    **Identificacao de modalidade (paragrafo 2):**
    O registro deve indicar claramente que o atendimento foi por
    telemedicina e qual modalidade especifica (teleconsulta,
    teleinterconsulta, etc). Isso e importante para:
    - Auditoria e fiscalizacao pelo CRM
    - Faturamento (codigos de procedimento especificos)
    - Analise de qualidade por modalidade
    - Continuidade do cuidado (saber se avaliacao foi presencial)

    **Acesso do paciente (paragrafo 3):**
    O paciente tem direito legal de acessar seu prontuario.
    Plataformas devem oferecer portal do paciente ou funcionalidade
    equivalente para consulta de dados clinicos.
implementation_guidance:
  platform_engineering:
    prose: |
      **Prontuario eletronico integrado:**
      1. Integrar plataforma de telemedicina com PEP institucional
         via HL7 FHIR R4, garantindo que todos os atendimentos
         sejam registrados no prontuario unificado.
      2. Adicionar campo obrigatorio de modalidade de atendimento
         no registro, com opcoes correspondentes ao art. 2
         (teleconsulta, teleinterconsulta, telediagnostico, etc).
      3. Implementar portal do paciente com acesso autenticado
         ao prontuario, permitindo visualizacao de historico
         clinico, exames e prescricoes.
      4. Garantir que integracao entre plataforma de telemedicina
         e PEP e bidirecional: medico consulta historico e
         registra novo atendimento.
      5. Implementar sincronizacao em tempo real ou near-real-time
         entre plataforma de telemedicina e PEP.
    tools:
      - hl7-fhir
      - ehr-integration
      - patient-portal
      - data-synchronization
  devsecops:
    prose: |
      **Pipeline de qualidade do PEP:**
      1. Testar integracao bidirecional entre plataforma de
         telemedicina e PEP, validando leitura e escrita.
      2. Verificar que campo de modalidade de atendimento e
         obrigatorio e nao pode ser omitido.
      3. Testar portal do paciente com cenarios de acesso a
         diferentes tipos de registros clinicos.
      4. Validar que dados sincronizados sao identicos entre
         plataforma e PEP (integridade de dados).
    tools:
      - gitlab-ci
      - integration-testing
      - data-integrity-testing
      - accessibility-testing
  secops:
    prose: |
      **Operacao do PEP:**
      1. Auditar que 100% dos atendimentos por telemedicina
         possuem registro no PEP com identificacao de modalidade.
      2. Monitorar integracao entre plataforma de telemedicina
         e PEP, alertando em caso de falha de sincronizacao.
      3. Verificar que portal do paciente esta operacional e
         acessivel para consulta de dados clinicos.
      4. Garantir que PEP atende requisitos de certificacao
         SBIS/CFM vigentes.
    tools:
      - data-quality-monitoring
      - integration-monitoring
      - patient-access-monitoring
      - certification-compliance
