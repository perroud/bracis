id: art-10
family: cap-2
title: "Teletriagem -- Avaliacao Remota para Direcionamento"
class: CFM-TELEMEDICINA
baselines: [telemedicina-all]
statement:
  prose: |
    Art. 10. A teletriagem consiste na avaliação a distância dos
    sintomas do paciente, realizada por médico, com o objetivo de
    direcionamento ao tipo de assistência adequada ao caso clínico.

    Parágrafo 1. A teletriagem deve utilizar protocolos clínicos
    validados e estruturados para classificação de risco e
    direcionamento do paciente.

    Parágrafo 2. A teletriagem não substitui a consulta médica
    e não deve ser utilizada para fins diagnósticos ou
    terapêuticos, servindo exclusivamente para orientação e
    direcionamento.

    Parágrafo 3. O resultado da teletriagem deve ser registrado
    e disponibilizado ao paciente e ao profissional que realizará
    o atendimento subsequente.
guidance:
  prose: |
    O art. 10 regula a teletriagem, que funciona como porta de
    entrada para o sistema de saude, direcionando pacientes ao
    nivel adequado de atencao.

    **Protocolos clinicos estruturados (paragrafo 1):**
    A teletriagem deve utilizar protocolos validados, como:
    - Protocolo de Manchester (classificacao por cores)
    - ESI (Emergency Severity Index)
    - Protocolos institucionais validados pela comissao medica

    **Limitacao da teletriagem (paragrafo 2):**
    A teletriagem NAO e uma consulta medica. Nao pode gerar
    diagnostico, prescricao ou conduta terapeutica. Sistemas
    de teletriagem devem ter essa limitacao claramente
    implementada (por exemplo, sem campo de prescricao).

    **Implicacoes para sistemas:**
    - Questionarios estruturados baseados em protocolos validados
    - Classificacao automatica de risco com validacao medica
    - Integracao com sistema de agendamento para direcionamento
    - Registro completo do processo de triagem para continuidade
      do cuidado no atendimento subsequente
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de teletriagem:**
      1. Implementar questionarios estruturados baseados em
         protocolos clinicos validados (Manchester, ESI) com
         logica de decisao configuravel.
      2. Criar motor de classificacao de risco que processe
         respostas do paciente e sugira nivel de urgencia,
         com validacao obrigatoria por medico.
      3. Integrar com sistema de agendamento e direcionamento
         para encaminhar paciente ao recurso adequado
         (emergencia, consulta agendada, orientacao).
      4. Implementar restricao tecnica que impeca emissao de
         diagnostico ou prescricao a partir da teletriagem.
      5. Garantir que resultado da teletriagem seja transmitido
         automaticamente ao profissional do atendimento seguinte.
    tools:
      - clinical-protocol-engine
      - risk-classification
      - scheduling-integration
      - workflow-automation
  devsecops:
    prose: |
      **Qualidade da teletriagem:**
      1. Testar logica de classificacao de risco com cenarios
         clinicos conhecidos, validando que direcionamento
         esta correto para cada nivel de urgencia.
      2. Verificar que sistema nao permite emissao de diagnostico
         ou prescricao em fluxo de teletriagem.
      3. Testar integracao com sistema de agendamento e
         verificar que dados da triagem sao transmitidos
         corretamente ao atendimento subsequente.
    tools:
      - gitlab-ci
      - clinical-scenario-testing
      - integration-testing
      - compliance-validation
  secops:
    prose: |
      **Operacao de teletriagem:**
      1. Monitorar que protocolos clinicos utilizados estao
         atualizados e validados pela comissao medica.
      2. Auditar que teletriagem nao esta sendo utilizada
         como substituto de consulta medica (verificar
         ausencia de diagnosticos e prescricoes).
      3. Acompanhar taxa de direcionamento correto: percentual
         de pacientes que foram direcionados ao nivel adequado.
      4. Verificar que resultados de teletriagem estao sendo
         registrados e compartilhados com atendimento seguinte.
    tools:
      - clinical-audit
      - compliance-dashboard
      - quality-metrics
      - protocol-management
