id: art-6
family: cap-2
title: "Teleinterconsulta -- Troca de Informacoes entre Medicos"
class: CFM-TELEMEDICINA
baselines: [telemedicina-all]
statement:
  prose: |
    Art. 6. A teleinterconsulta consiste na troca de informações e
    opiniões entre médicos, para auxílio diagnóstico ou terapêutico,
    mediante utilização de tecnologia de comunicação.

    Parágrafo 1. A teleinterconsulta pode ser realizada de forma
    síncrona (em tempo real) ou assíncrona (por troca de mensagens,
    laudos ou pareceres em momentos distintos).

    Parágrafo 2. O médico solicitante permanece responsável pelo
    paciente, salvo quando houver transferência formal de
    responsabilidade ao médico consultado.

    Parágrafo 3. As informações trocadas na teleinterconsulta devem
    ser registradas no prontuário do paciente, incluindo a
    identificação dos médicos participantes.
guidance:
  prose: |
    O art. 6 regula a comunicacao entre medicos, que frequentemente
    ocorre em cenarios de segunda opiniao, consultoria especializada
    ou suporte a distancia.

    **Modos de comunicacao:**
    - Sincrono: videoconferencia, chamada de voz, chat em tempo real
    - Assincrono: envio de exames, laudos, pareceres escritos, imagens
      diagnosticas com solicitacao de opiniao

    **Responsabilidade medica (paragrafo 2):**
    O medico solicitante mantem a responsabilidade pelo paciente.
    Isso tem implicacao direta no design de sistemas: o sistema deve
    registrar claramente quem e o medico responsavel e quem e o
    consultor, com logs auditiveis de toda a comunicacao.

    **Registro no prontuario (paragrafo 3):**
    Toda comunicacao relevante da teleinterconsulta deve ser
    documentada no prontuario do paciente, nao apenas em canais
    de comunicacao separados. Sistemas de mensageria medica devem
    ter integracao nativa com o prontuario eletronico.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de teleinterconsulta:**
      1. Implementar sistema de mensageria medica com suporte a
         comunicacao sincrona e assincrona, com criptografia
         fim-a-fim e integracao ao prontuario eletronico.
      2. Criar fluxo de solicitacao de teleinterconsulta que
         registre automaticamente medico solicitante, medico
         consultado e contexto clinico.
      3. Implementar mecanismo de anexacao de exames, imagens
         diagnosticas e laudos com preservacao de qualidade
         diagnostica (formato DICOM para imagens medicas).
      4. Garantir que toda comunicacao da teleinterconsulta seja
         automaticamente vinculada ao prontuario do paciente.
    tools:
      - secure-messaging
      - dicom-viewer
      - ehr-integration
      - audit-trail
  devsecops:
    prose: |
      **Qualidade e seguranca da teleinterconsulta:**
      1. Testar integracao entre sistema de mensageria medica e
         prontuario eletronico para garantir que registros sao
         criados automaticamente.
      2. Validar que criptografia fim-a-fim esta ativa em todas
         as comunicacoes de teleinterconsulta.
      3. Implementar testes de integridade de imagens diagnosticas
         transmitidas (checksum, preservacao de resolucao DICOM).
    tools:
      - gitlab-ci
      - integration-testing
      - encryption-verification
      - image-integrity
  secops:
    prose: |
      **Governanca da teleinterconsulta:**
      1. Auditar que toda teleinterconsulta possui registro no
         prontuario do paciente com identificacao dos medicos.
      2. Monitorar que comunicacao medico-medico sobre pacientes
         ocorre exclusivamente em canais seguros e auditaveis.
      3. Verificar que informacoes de pacientes nao sao trocadas
         em plataformas de mensageria genericas (WhatsApp, SMS).
      4. Manter registro de transferencias formais de
         responsabilidade entre medicos.
    tools:
      - audit-management
      - dlp-monitoring
      - compliance-dashboard
      - access-logs
