id: art-30
family: cap-6
title: "Sancoes e Regime Disciplinar"
class: CFM-TELEMEDICINA
baselines: [telemedicina-all]
statement:
  prose: |
    Art. 30. O descumprimento das disposições desta Resolução
    sujeita o médico e a instituição de saúde às sanções previstas
    na legislação vigente e no Código de Ética Médica.

    Parágrafo 1. As sanções aplicáveis ao médico incluem:
    I - advertência confidencial;
    II - censura confidencial;
    III - censura pública;
    IV - suspensão do exercício profissional por até 30 dias;
    V - cassação do exercício profissional.

    Parágrafo 2. As sanções aplicáveis à instituição incluem:
    I - notificação para adequação em prazo determinado;
    II - suspensão temporária da autorização para prestação de
    serviços de telemedicina;
    III - cassação definitiva da autorização;
    IV - comunicação às autoridades competentes (ANVISA, ANPD,
    Ministério Público) para providências cabíveis.

    Parágrafo 3. A aplicação de sanções não exclui a responsabilidade
    civil e criminal do médico e da instituição perante os pacientes
    e a sociedade.
guidance:
  prose: |
    O art. 30 estabelece o regime sancionatorio para
    descumprimento da resolucao, criando incentivos concretos
    para conformidade.

    **Escala de sancoes ao medico:**
    As sancoes seguem escala progressiva, de advertencia ate
    cassacao. A gravidade da infracao e a reincidencia determinam
    a sancao aplicavel. A cassacao e a sancao maxima e significa
    a proibicao definitiva de exercer a medicina.

    **Sancoes a instituicao (paragrafo 2):**
    A instituicao pode ter suspensa ou cassada sua autorizacao
    para telemedicina. Alem disso, o CRM pode comunicar:
    - ANVISA: se houver irregularidade com dispositivos medicos
    - ANPD: se houver violacao de dados pessoais
    - Ministerio Publico: se houver crime ou dano coletivo

    **Responsabilidade cumulativa (paragrafo 3):**
    Sancoes eticas (CRM) nao excluem:
    - Responsabilidade civil: indenizacao ao paciente por danos
    - Responsabilidade criminal: se houver conduta tipificada
      como crime (exercicio ilegal, lesao corporal, etc)
    - Responsabilidade administrativa: perante ANVISA, ANPD, etc

    **Implicacoes para governanca:**
    A existencia de sancoes graves reforca a necessidade de
    programa robusto de conformidade com a resolucao, incluindo
    monitoramento continuo, auditorias internas e correcao
    proativa de nao conformidades.
implementation_guidance:
  platform_engineering:
    prose: |
      **Suporte a conformidade e prevencao de sancoes:**
      1. Implementar dashboard de conformidade que monitore em
         tempo real o atendimento a todos os artigos da resolucao,
         com indicadores visuais de risco.
      2. Criar sistema de alertas proativos para nao conformidades
         detectadas automaticamente (CRM vencido, consentimento
         ausente, criptografia desabilitada).
      3. Implementar mecanismo de bloqueio automatico de
         funcionalidades quando nao conformidade critica e
         detectada (ex: bloquear atendimento se CRM invalido).
      4. Manter registro centralizado de nao conformidades
         identificadas, acoes corretivas e status de resolucao.
    tools:
      - compliance-dashboard
      - alert-engine
      - auto-remediation
      - non-conformity-registry
  devsecops:
    prose: |
      **Pipeline de conformidade continua:**
      1. Implementar verificacao automatizada de conformidade
         como parte do pipeline CI/CD, bloqueando releases que
         introduzam nao conformidades.
      2. Criar testes de regressao para todos os controles
         regulatorios criticos, executados em cada release.
      3. Manter documentacao de conformidade versionada e
         atualizada junto ao codigo-fonte.
      4. Implementar scan automatico de configuracao que detecte
         desvios de conformidade em infraestrutura.
    tools:
      - gitlab-ci
      - compliance-scanning
      - regression-testing
      - configuration-audit
  secops:
    prose: |
      **Programa de prevencao de sancoes:**
      1. Realizar auditoria interna semestral de conformidade
         com a Resolucao CFM 2.314/2022, documentando status
         de cada artigo.
      2. Implementar processo de correcao de nao conformidades
         com prazos definidos e acompanhamento ate resolucao.
      3. Manter programa de treinamento continuo para medicos
         e equipe tecnica sobre requisitos da resolucao.
      4. Estabelecer relacao cooperativa com CRM local,
         participando de consultas e reportando proativamente
         melhorias implementadas.
    tools:
      - internal-audit
      - corrective-action
      - training-management
      - regulatory-relations
