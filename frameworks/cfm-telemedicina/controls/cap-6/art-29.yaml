id: art-29
family: cap-6
title: "Fiscalizacao pelos Conselhos Regionais de Medicina"
class: CFM-TELEMEDICINA
baselines: [telemedicina-all]
statement:
  prose: |
    Art. 29. Os Conselhos Regionais de Medicina (CRMs) são
    responsáveis pela fiscalização do exercício da telemedicina
    em suas respectivas jurisdições.

    Parágrafo 1. As instituições que oferecem serviços de
    telemedicina devem ser registradas no CRM competente,
    informando as modalidades de telemedicina oferecidas e
    os médicos responsáveis.

    Parágrafo 2. Os CRMs devem manter cadastro atualizado de
    instituições e médicos que praticam telemedicina em suas
    jurisdições.

    Parágrafo 3. Denúncias de irregularidades na prática de
    telemedicina devem ser investigadas pelo CRM competente,
    podendo resultar em processo ético-profissional.

    Parágrafo 4. Plataformas de telemedicina que operem em
    âmbito nacional devem estar registradas nos CRMs de todos
    os estados onde oferecem serviços.
guidance:
  prose: |
    O art. 29 estabelece os CRMs como autoridade fiscalizadora
    da telemedicina, com implicacoes diretas para o registro
    institucional e operacao de plataformas.

    **Registro institucional (paragrafo 1):**
    Toda instituicao que oferece telemedicina deve:
    - Estar registrada no CRM do estado
    - Informar quais modalidades oferece
    - Indicar medicos responsaveis (diretor tecnico)
    - Atualizar registro em caso de mudancas

    **Operacao nacional (paragrafo 4):**
    Plataformas nacionais (startups de telemedicina, por exemplo)
    devem ter registro em TODOS os CRMs estaduais onde atuam.
    Isso tem implicacao operacional significativa:
    - 27 CRMs (26 estados + DF)
    - Cada CRM pode ter requisitos adicionais locais
    - Necessidade de diretor tecnico em cada jurisdicao

    **Implicacoes para sistemas:**
    - Plataformas devem registrar e rastrear em quais estados
      cada medico atende
    - Limitar atendimento ao estado de registro do medico
    - Manter documentacao de registro em CRMs acessivel
    - Implementar canal para recebimento de fiscalizacoes
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de registros CRM:**
      1. Implementar modulo de gestao de registros CRM que
         rastreie em quais estados a instituicao esta registrada
         e quais modalidades estao autorizadas em cada estado.
      2. Criar controle que limite atendimento ao estado de
         registro do medico, com verificacao automatica de
         jurisdicao antes de cada sessao.
      3. Implementar dashboard de conformidade por estado,
         mostrando status de registro, medicos autorizados
         e modalidades habilitadas.
      4. Criar sistema de alertas para renovacao de registros
         e atualizacoes obrigatorias junto aos CRMs.
    tools:
      - registration-management
      - jurisdiction-control
      - compliance-dashboard
      - alert-system
  devsecops:
    prose: |
      **Validacao de registros:**
      1. Testar que sistema bloqueia atendimento quando medico
         nao possui registro ativo no CRM do estado do paciente.
      2. Verificar que dashboard de conformidade reflete
         corretamente o status de registro em cada CRM.
      3. Testar alertas de renovacao de registros e validar
         que sao disparados com antecedencia adequada.
    tools:
      - gitlab-ci
      - jurisdiction-testing
      - compliance-testing
      - alert-testing
  secops:
    prose: |
      **Governanca de registros CRM:**
      1. Manter inventario atualizado de registros em CRMs,
         incluindo numero de registro, data de validade e
         modalidades autorizadas.
      2. Coordenar processo de registro em novos CRMs quando
         plataforma expandir para novos estados.
      3. Manter canal dedicado para recebimento de fiscalizacoes
         e denuncias de CRMs, com processo de resposta definido.
      4. Auditar que todos os medicos ativos na plataforma
         possuem CRM ativo no estado de atuacao.
    tools:
      - registration-tracking
      - expansion-management
      - compliance-channel
      - credential-audit
