id: art-27
family: cap-6
title: "Responsabilidade Medica em Telemedicina"
class: CFM-TELEMEDICINA
baselines: [telemedicina-all]
statement:
  prose: |
    Art. 27. A responsabilidade profissional do médico que presta
    atendimento por telemedicina é a mesma do atendimento presencial,
    estando sujeito às normas do Código de Ética Médica e demais
    regulamentações do CFM.

    Parágrafo 1. O médico deve avaliar se o caso clínico é adequado
    para atendimento por telemedicina, sendo responsável pela
    decisão de manter ou converter para atendimento presencial.

    Parágrafo 2. A instituição de saúde que oferece serviços de
    telemedicina é solidariamente responsável pela qualidade da
    infraestrutura tecnológica e pela garantia de que os médicos
    cadastrados possuem registro profissional válido.

    Parágrafo 3. Falhas tecnológicas que comprometam a segurança
    do atendimento devem ser documentadas e comunicadas ao paciente,
    sendo o médico responsável por interromper o atendimento quando
    julgar que a qualidade técnica é insuficiente para avaliação
    clínica adequada.
guidance:
  prose: |
    O art. 27 estabelece que a telemedicina nao altera o regime
    de responsabilidade medica. O medico responde pelo atendimento
    com o mesmo rigor da consulta presencial.

    **Responsabilidade do medico:**
    - Avaliar adequacao do caso para telemedicina (triagem clinica)
    - Decidir pela conversao a atendimento presencial quando
      necessario
    - Documentar falhas tecnologicas que afetem o atendimento
    - Interromper atendimento se qualidade tecnica e insuficiente

    **Responsabilidade solidaria da instituicao (paragrafo 2):**
    A instituicao de saude (hospital, clinica, startup de
    telemedicina) responde solidariamente por:
    - Qualidade da infraestrutura tecnologica
    - Verificacao de CRM ativo dos medicos
    - Conformidade da plataforma com a resolucao
    - Seguranca e privacidade dos dados do paciente

    **Implicacoes para sistemas:**
    Os sistemas devem suportar a tomada de decisao do medico:
    - Indicadores de qualidade de conexao visiveis ao medico
    - Botao de interrupcao/conversao para presencial
    - Registro automatico de metricas de qualidade da sessao
    - Alerta quando qualidade cai abaixo do limiar aceitavel
implementation_guidance:
  platform_engineering:
    prose: |
      **Suporte a responsabilidade medica:**
      1. Implementar indicador de qualidade de conexao em tempo
         real visivel ao medico durante toda a sessao (semaforo:
         verde/amarelo/vermelho).
      2. Criar funcionalidade de interrupcao de atendimento com
         registro automatico do motivo (falha tecnica, necessidade
         de presencial, solicitacao do paciente).
      3. Implementar registro automatico e imutavel de metricas
         de qualidade da sessao (latencia, perda de pacotes,
         resolucao de video) vinculado ao registro do atendimento.
      4. Criar fluxo de conversao para atendimento presencial
         com agendamento integrado e transferencia de contexto
         clinico.
      5. Implementar verificacao automatica de CRM ativo antes
         de cada atendimento, com bloqueio se invalido.
    tools:
      - quality-indicator
      - session-management
      - quality-logging
      - scheduling-integration
      - crm-verification
  devsecops:
    prose: |
      **Validacao de suporte a responsabilidade:**
      1. Testar que indicador de qualidade reflete com precisao
         as condicoes reais de conexao.
      2. Verificar que metricas de qualidade da sessao sao
         registradas automaticamente e nao podem ser alteradas.
      3. Testar fluxo de interrupcao e conversao para
         atendimento presencial em todos os cenarios.
      4. Validar que verificacao de CRM bloqueia atendimento
         quando registro e invalido.
    tools:
      - gitlab-ci
      - quality-testing
      - flow-testing
      - integration-testing
  secops:
    prose: |
      **Governanca de responsabilidade:**
      1. Auditar que todos os atendimentos possuem registro de
         metricas de qualidade da sessao.
      2. Monitorar conversoes de telemedicina para presencial,
         identificando padroes de falha tecnica.
      3. Verificar que instituicao mantem documentacao de
         responsabilidade solidaria e seguro profissional.
      4. Manter registro de falhas tecnologicas documentadas
         para analise de tendencias e melhoria de infraestrutura.
    tools:
      - audit-trail
      - incident-analysis
      - quality-monitoring
      - compliance-dashboard
