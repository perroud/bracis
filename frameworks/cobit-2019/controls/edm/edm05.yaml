id: edm05
family: edm
title: "EDM05 — Ensured Stakeholder Engagement"
class: COBIT-2019
statement:
  prose: >-
    Ensure that stakeholders are supportive of the I&T strategy and roadmap, that
    communication to stakeholders is effective and timely, and that the basis for
    reporting is established to increase performance. Identify the key stakeholders
    and establish mechanisms for regular, transparent, and effective communication
    regarding I&T governance, performance, risk, and compliance. Ensure stakeholder
    needs and expectations are understood and addressed in I&T decision making.
guidance:
  prose: >-
    This governance objective addresses the critical need for stakeholder transparency
    and engagement in I&T governance. Key activities include identifying all relevant
    stakeholders (board, executive management, business units, IT teams, regulators,
    customers, vendors), understanding their information needs, establishing
    communication channels and reporting cadences, and ensuring that governance
    reporting provides accurate and actionable information. Effective stakeholder
    engagement ensures buy-in for I&T investments, alignment between business and
    technology strategy, and timely escalation of issues. For technology organizations,
    this translates to establishing engineering metrics and reporting that leadership
    can use for informed decision making, and ensuring cross-functional communication
    between engineering, product, security, and business teams.
implementation_guidance:
  platform_engineering:
    prose: >-
      Build stakeholder dashboards into the platform that provide real-time visibility
      into platform health, adoption metrics, developer experience scores, and
      service reliability. Implement automated reporting that surfaces key metrics
      to different stakeholder groups at appropriate cadences. Create self-service
      analytics that allow stakeholders to explore platform data relevant to their
      needs. Establish platform advisory boards with representation from key
      stakeholder groups and track action items through the platform catalog.
    tools:
      - "Backstage (Platform Dashboards)"
      - "Grafana (Stakeholder Dashboards)"
      - "Datadog (Service Metrics)"
      - "Backstage TechDocs (Governance Reports)"
  devsecops:
    prose: >-
      Implement automated reporting pipelines that generate compliance and security
      posture reports for different stakeholder audiences. Create pipeline dashboards
      that show deployment frequency, lead time, change failure rate, and recovery
      time (DORA metrics) for engineering leadership. Generate automated security
      posture summaries for security stakeholders. Publish compliance status reports
      from CI/CD pipelines to governance platforms. Track and report on SLA/SLO
      adherence through automated monitoring and alerting.
    tools:
      - "GitLab Value Stream Analytics"
      - "DORA Metrics Dashboards"
      - "GitLab Compliance Reports"
      - "Automated Report Generation (CI/CD)"
  secops:
    prose: >-
      Establish formal stakeholder communication plans with defined audiences,
      messages, channels, and cadences. Create governance reporting templates that
      provide consistent, comparable information across reporting periods. Track
      stakeholder satisfaction with I&T governance through periodic surveys. Maintain
      a stakeholder register with communication preferences and information needs.
      Conduct quarterly governance review meetings with key stakeholders and track
      action items to resolution. Ensure regulatory and audit stakeholder needs are
      proactively addressed through scheduled compliance reporting.
    tools:
      - "GRC Platforms (Stakeholder Reporting)"
      - "Board Portal Software (Diligent, BoardEffect)"
      - "Project Portfolio Management (ServiceNow ITBM)"
      - "Communication Management Tools"
