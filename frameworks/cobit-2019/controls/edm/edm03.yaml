id: edm03
family: edm
title: "EDM03 — Ensured Risk Optimization"
class: COBIT-2019
statement:
  prose: >-
    Ensure that enterprise I&T-related risk does not exceed the enterprise's risk
    appetite and risk tolerance. Identify and manage the impact of I&T risk to
    enterprise value and minimize the occurrence and magnitude of unacceptable
    risk outcomes. Evaluate, direct, and monitor risk management activities to
    ensure alignment with the enterprise's risk management approach and to provide
    reasonable assurance that I&T-related risk is identified, analyzed, managed,
    and reported effectively.
guidance:
  prose: >-
    This governance objective requires the board and senior management to define the
    enterprise risk appetite for I&T risk, establish risk tolerance thresholds, and
    ensure that risk management practices across the organization are consistent with
    these boundaries. Key activities include evaluating current and emerging I&T risk
    factors, directing the establishment of risk management practices integrated into
    enterprise risk management, and monitoring the risk profile against defined
    thresholds. Risk optimization means finding the right balance between risk and
    return — not eliminating all risk but ensuring informed risk-taking aligned with
    business objectives. For technology organizations, this involves defining acceptable
    risk levels for technology choices, security posture, technical debt, and
    operational resilience.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement risk scoring models within the platform catalog that automatically
      assess service risk based on data classification, exposure surface, dependency
      count, and deployment frequency. Create risk dashboards that aggregate risk
      scores across all platform services and highlight services exceeding risk
      tolerance thresholds. Define platform policies that enforce risk-based controls
      automatically (e.g., services handling PII require additional security controls).
      Implement automated risk assessment as part of service onboarding and lifecycle
      management.
    tools:
      - "Backstage Risk Scorecards"
      - "Open Policy Agent (risk-based policies)"
      - "Grafana Dashboards (risk visualization)"
      - "Custom Risk Assessment APIs"
  devsecops:
    prose: >-
      Integrate risk assessment into the CI/CD pipeline through automated security
      scanning (SAST, DAST, SCA, container scanning) with risk-based quality gates.
      Define risk tolerance thresholds per severity level and enforce them as pipeline
      gates — critical vulnerabilities block deployment, high vulnerabilities require
      approval, medium and low are tracked. Implement risk-based testing strategies
      where higher-risk changes trigger more extensive test suites. Track risk metrics
      (vulnerability density, mean time to remediate, exception rates) in pipeline
      dashboards.
    tools:
      - "GitLab Security Scanning (SAST, DAST, SCA)"
      - "Trivy / Grype (Container Scanning)"
      - "DefectDojo (Vulnerability Management)"
      - "Risk-based Pipeline Quality Gates"
  secops:
    prose: >-
      Maintain an enterprise I&T risk register with regular review cadence (quarterly
      at minimum). Conduct formal risk assessments for all significant I&T changes,
      new technology adoptions, and third-party integrations. Define and document risk
      appetite statements approved by the board. Track risk KPIs including risk
      exposure trends, risk treatment effectiveness, and risk event frequency. Report
      risk posture to governance bodies through standardized risk dashboards. Conduct
      annual risk appetite reviews and adjust thresholds based on business changes
      and threat landscape evolution.
    tools:
      - "GRC Platforms (ServiceNow GRC, RSA Archer)"
      - "Risk Register Tools"
      - "FAIR Risk Quantification"
      - "Threat Intelligence Platforms (MISP, ThreatConnect)"
