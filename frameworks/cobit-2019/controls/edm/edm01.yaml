id: edm01
family: edm
title: "EDM01 — Ensured Governance Framework Setting and Maintenance"
class: COBIT-2019
statement:
  prose: >-
    Analyze and articulate the requirements for the governance of enterprise I&T.
    Establish and maintain effective enabling structures, principles, processes, and
    practices with clarity of responsibilities and authority to achieve the enterprise's
    mission, goals, and objectives. Ensure that the governance framework is aligned with
    enterprise governance principles and that I&T governance is integrated into enterprise
    governance. Evaluate the governance system design regularly to ensure continued
    effectiveness and alignment with changing enterprise needs.
guidance:
  prose: >-
    This objective establishes the foundation of the entire COBIT governance system. It
    requires defining the governance framework principles, determining the optimal
    organizational model for I&T decision making, and establishing clear authority
    structures. Key activities include identifying stakeholders and their needs, defining
    governance design factors (enterprise strategy, goals, risk profile, I&T-related
    issues, threat landscape, compliance requirements, role of IT, sourcing model, IT
    implementation methods, technology adoption strategy, and enterprise size), and
    tailoring the governance system accordingly. The framework must be regularly reviewed
    and adjusted to reflect changes in the business environment, regulatory landscape,
    or technology strategy. For technology organizations, this translates to defining
    how technology decisions are made, who has authority over architecture choices,
    and how compliance is governed across engineering teams.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement the governance framework as code in a centralized platform catalog
      (e.g., Backstage). Define governance policies as declarative configurations that
      specify decision rights, approval workflows, and escalation paths for technology
      choices. Create self-service templates that embed governance guardrails directly
      into the developer experience. Establish a governance-as-code repository that
      tracks all framework changes with full version history and audit trail. Define
      platform governance scorecards that measure team compliance with the governance
      framework automatically.
    tools:
      - "Backstage (Service Catalog + TechDocs)"
      - "Open Policy Agent (OPA)"
      - "Crossplane (Governance Compositions)"
      - "GitLab Groups & Compliance Framework"
  devsecops:
    prose: >-
      Encode governance policies into CI/CD pipeline configurations that enforce decision
      rights and approval requirements automatically. Implement branch protection rules,
      merge request approval policies, and code ownership (CODEOWNERS) that reflect the
      governance authority structure. Create compliance pipeline templates that teams
      inherit automatically. Track governance framework changes through version-controlled
      policy repositories with mandatory review processes. Enforce governance controls
      through automated policy gates that prevent non-compliant deployments.
    tools:
      - "GitLab CI/CD Compliance Pipelines"
      - "CODEOWNERS files"
      - "Branch Protection Rules"
      - "Policy-as-Code (OPA/Rego)"
      - "Git-based Governance Repository"
  secops:
    prose: >-
      Maintain the governance framework documentation in a GRC platform with defined
      review cycles (at minimum annually). Track governance framework effectiveness
      through KPIs such as policy violation rates, exception request volumes, and
      time-to-decision for governance escalations. Conduct periodic governance maturity
      assessments against the COBIT capability model. Report governance framework
      performance to the board or steering committee on a quarterly basis. Ensure
      governance roles (RACI) are documented and stakeholder engagement is tracked.
    tools:
      - "GRC Platforms (ServiceNow GRC, RSA Archer, MetricStream)"
      - "RACI Matrix Tools"
      - "Board Reporting Dashboards"
      - "ISACA COBIT Assessment Programme"
