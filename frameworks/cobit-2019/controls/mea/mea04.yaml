id: mea04
family: mea
title: "MEA04 — Managed Assurance"
class: COBIT-2019
statement:
  prose: >-
    Enable the organization to design and develop the most appropriate assurance
    initiatives by providing guidance on planning, scoping, executing, and
    following up on assurance reviews, using a roadmap in line with the
    assurance approach. Plan and execute assurance activities including internal
    audit, external audit, and other assurance engagements. Ensure that
    assurance providers are competent and independent, and that assurance
    results are acted upon.
guidance:
  prose: >-
    This objective covers the assurance function — the activities that provide
    independent assessment of governance and management effectiveness. Key
    activities include planning the assurance approach, defining assurance
    scope and objectives, executing assurance reviews (internal audit, external
    audit, certification audits, penetration testing), reporting assurance
    findings, and tracking remediation of identified issues. Assurance provides
    the independent feedback loop that validates whether the governance and
    management system is operating effectively. For technology organizations,
    this includes supporting SOC 2 audits, ISO 27001 certification, PCI DSS
    assessments, penetration testing, and internal technology audits.
implementation_guidance:
  platform_engineering:
    prose: >-
      Provide assurance-ready platform capabilities that automatically generate
      evidence required for audit and assurance engagements. Implement audit
      logging as a platform primitive that captures all significant actions
      with immutable, tamper-evident storage. Create assurance dashboards in
      the platform catalog that map platform controls to assurance requirements
      (SOC 2, ISO 27001) and show evidence status. Automate evidence collection
      for common assurance requirements (access reviews, change approvals,
      security scan results, uptime reports) through platform APIs.
    tools:
      - "Backstage (Assurance Evidence Plugin)"
      - "Immutable Audit Logs (Loki, Elasticsearch)"
      - "Automated Evidence Collection APIs"
      - "Assurance Mapping Dashboards"
  devsecops:
    prose: >-
      Implement automated assurance evidence generation in CI/CD pipelines.
      Generate audit artifacts (code review records, approval logs, security
      scan results, deployment records, test results) automatically as part
      of standard pipeline execution. Create assurance pipeline templates that
      produce evidence packages for specific assurance frameworks. Implement
      continuous assurance monitoring that validates controls in real time
      rather than relying on periodic sampling. Store assurance evidence in
      immutable, versioned repositories with complete chain of custody.
    tools:
      - "GitLab CI/CD (Evidence Generation)"
      - "GitLab Audit Events"
      - "Assurance Evidence Repositories"
      - "Continuous Assurance Pipelines"
  secops:
    prose: >-
      Establish a formal assurance program with defined scope, methodology, and
      cadence. Maintain an assurance plan that covers all applicable frameworks
      (SOC 2, ISO 27001, PCI DSS, regulatory requirements). Coordinate with
      internal audit, external auditors, and other assurance providers.
      Maintain organized evidence repositories that support efficient assurance
      engagements. Track assurance findings in a centralized findings register
      with defined remediation owners and SLAs. Report assurance results and
      finding status to management and governance bodies. Conduct periodic
      assurance maturity assessments to improve assurance program effectiveness.
    tools:
      - "Audit Management (AuditBoard, Workiva, Diligent)"
      - "GRC Platforms (Evidence + Finding Management)"
      - "Penetration Testing Platforms"
      - "Assurance Program Management"
