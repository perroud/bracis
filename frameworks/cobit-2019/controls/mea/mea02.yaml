id: mea02
family: mea
title: "MEA02 — Managed System of Internal Control"
class: COBIT-2019
statement:
  prose: >-
    Continuously monitor and evaluate the control environment, including
    self-assessments and independent assurance reviews. Enable management to
    identify control deficiencies and inefficiencies and to initiate improvement
    actions. Plan, organize, and maintain standards for internal control
    assessment and assurance activities. Ensure that the system of internal
    control operates effectively and provides reasonable assurance that
    enterprise objectives are being met.
guidance:
  prose: >-
    This objective focuses on the internal control system that supports I&T
    governance and management. Key activities include monitoring the internal
    control environment, conducting self-assessments and control testing,
    identifying control deficiencies and gaps, initiating corrective actions,
    and reporting on the effectiveness of the internal control system. Internal
    controls include preventive controls (that prevent undesirable events),
    detective controls (that detect when undesirable events occur), and
    corrective controls (that correct the effects of undesirable events).
    For technology organizations, this includes implementing automated control
    testing, continuous compliance monitoring, and evidence collection for
    audit purposes.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated control testing as platform capabilities. Create
      compliance-as-code frameworks that continuously test internal controls
      and surface results in the platform catalog. Define control baselines
      for services and automate their verification through scheduled scans.
      Implement evidence collection automation that captures control
      effectiveness data (access reviews, change approvals, security scan
      results) and stores them in audit-ready formats. Track control
      effectiveness metrics in platform dashboards.
    tools:
      - "Backstage (Control Status Plugin)"
      - "Open Policy Agent (Control Policies)"
      - "Compliance-as-Code Frameworks"
      - "Automated Evidence Collection"
  devsecops:
    prose: >-
      Implement continuous control monitoring through CI/CD pipelines. Create
      compliance pipelines that periodically test internal controls (access
      permissions, configuration baselines, security policies) and report
      results. Automate evidence collection from pipeline logs, approval
      records, security scan results, and deployment records for audit
      purposes. Implement automated control self-assessments that compare
      current state against control requirements. Track control deficiencies
      as backlog items with remediation SLAs.
    tools:
      - "GitLab CI/CD (Compliance Pipelines)"
      - "InSpec / Chef Compliance (Control Testing)"
      - "Automated Evidence Collection"
      - "Control Deficiency Tracking"
  secops:
    prose: >-
      Establish a formal internal control assessment program with defined
      scope, methodology, and cadence. Conduct periodic control self-assessments
      and independent reviews. Maintain a control catalog that documents all
      internal controls, their objectives, owners, and testing procedures.
      Track control deficiencies through a structured remediation process
      with defined SLAs. Report internal control effectiveness to management
      and audit committees. Support external audit activities by maintaining
      organized evidence repositories and providing timely access to
      documentation.
    tools:
      - "GRC Platforms (ServiceNow GRC, Archer, Vanta)"
      - "Audit Management Tools (AuditBoard, Workiva)"
      - "Control Self-Assessment Tools"
      - "Evidence Management Repositories"
