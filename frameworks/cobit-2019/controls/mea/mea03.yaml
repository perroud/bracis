id: mea03
family: mea
title: "MEA03 — Managed Compliance with External Requirements"
class: COBIT-2019
statement:
  prose: >-
    Evaluate that I&T processes and I&T-supported business processes are
    compliant with laws, regulations, and contractual requirements. Obtain
    assurance that the requirements have been identified and complied with,
    and integrate I&T compliance with overall enterprise compliance.
    Identify and monitor changes in external requirements that affect the
    enterprise and ensure timely adaptation of I&T processes and controls.
guidance:
  prose: >-
    This objective addresses compliance with external requirements including
    laws, regulations, industry standards, and contractual obligations. Key
    activities include identifying applicable external requirements, assessing
    compliance status, addressing compliance gaps, monitoring changes in
    external requirements, and reporting compliance status to management and
    regulators. External requirements vary significantly by industry and
    jurisdiction — financial services face requirements like SOX, PCI DSS,
    and banking regulations; healthcare faces HIPAA; organizations processing
    EU data face GDPR. For technology organizations, this includes managing
    compliance with data protection regulations, industry-specific requirements,
    customer contractual requirements, and open-source license compliance.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement compliance-as-code frameworks that automate compliance checking
      against external requirements. Map external requirements to platform
      controls and automate their verification. Provide compliance dashboards
      in the platform catalog that show each service's compliance status against
      applicable external requirements. Implement automated compliance evidence
      collection that generates audit-ready artifacts from platform operations.
      Track regulatory changes and automate impact assessment against platform
      services through compliance requirement catalogs.
    tools:
      - "Open Policy Agent (Compliance Policies)"
      - "Backstage (Compliance Dashboard)"
      - "Compliance-as-Code (InSpec, Regula)"
      - "Automated Evidence Generation"
  devsecops:
    prose: >-
      Implement compliance checks in CI/CD pipelines that validate adherence
      to external requirements before deployment. Create compliance pipeline
      templates for specific regulatory frameworks (SOC 2, ISO 27001, PCI DSS)
      that teams adopt based on their service's compliance scope. Automate
      license compliance scanning to ensure open-source usage meets legal
      requirements. Generate compliance audit trails automatically from
      pipeline execution logs. Track compliance gaps as pipeline findings
      with defined remediation workflows.
    tools:
      - "GitLab Compliance Pipelines"
      - "GitLab License Scanning"
      - "InSpec (Compliance Automation)"
      - "FOSSA / WhiteSource (License Compliance)"
      - "Compliance Evidence Automation"
  secops:
    prose: >-
      Maintain a regulatory landscape register that tracks all applicable
      external requirements with ownership assignments. Conduct periodic
      compliance assessments against each applicable requirement. Monitor
      regulatory changes through subscriptions to relevant regulatory bodies
      and legal advisors. Conduct compliance gap analysis when new requirements
      are identified and define remediation plans. Report compliance status to
      management, audit committees, and regulators as required. Maintain
      relationships with regulators and auditors. Track compliance metrics
      (findings, remediation status, assessment results) and report trends
      to governance bodies.
    tools:
      - "GRC Platforms (ServiceNow GRC, Archer, OneTrust)"
      - "Regulatory Intelligence Services"
      - "Compliance Assessment Tools"
      - "Audit Management (AuditBoard, Workiva)"
