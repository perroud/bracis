id: bai03
family: bai
title: "BAI03 — Managed Solutions Identification and Build"
class: COBIT-2019
statement:
  prose: >-
    Establish and maintain identified solutions in line with enterprise requirements
    covering design, development, procurement, and partnering with suppliers and
    vendors. Manage configuration, test preparation, testing, requirements management,
    and maintenance of business processes, supporting applications, infrastructure,
    and services. Ensure that solutions are fit for purpose and deliver the expected
    business value while maintaining quality throughout the development lifecycle.
guidance:
  prose: >-
    This objective covers the full lifecycle of solution development from requirements
    through build and testing. Key activities include defining high-level and detailed
    design, developing solution components, acquiring infrastructure components,
    managing requirements traceability, conducting quality assurance, performing
    testing (unit, integration, system, acceptance), and managing solution maintenance.
    Solutions may be custom-developed, purchased (COTS), or cloud-based (SaaS), and
    the management approach should be tailored accordingly. For technology organizations,
    this includes implementing software development lifecycle (SDLC) best practices,
    test automation strategies, quality engineering practices, and build automation.
implementation_guidance:
  platform_engineering:
    prose: >-
      Provide golden path templates and scaffolding tools that accelerate solution
      development while ensuring compliance with architectural standards. Implement
      self-service provisioning of development, testing, and staging environments
      through the platform. Create reusable solution components (libraries, APIs,
      middleware) that teams can discover and consume through the service catalog.
      Track solution quality metrics (test coverage, code quality scores, dependency
      health) in the platform catalog alongside service definitions.
    tools:
      - "Backstage Software Templates"
      - "Crossplane (Environment Provisioning)"
      - "Internal Package Registry (Artifactory, GitLab)"
      - "SonarQube (Code Quality)"
  devsecops:
    prose: >-
      Implement comprehensive CI/CD pipelines that automate the full build-test-deploy
      lifecycle. Enforce mandatory pipeline stages including linting, unit testing,
      integration testing, security scanning, and quality gate evaluation. Implement
      test automation as a first-class concern with minimum coverage thresholds
      enforced in pipelines. Automate infrastructure provisioning through
      infrastructure-as-code with automated testing. Track build quality metrics
      (build success rate, test pass rate, coverage trends) and surface them in
      developer dashboards.
    tools:
      - "GitLab CI/CD (Full Pipeline)"
      - "Testing Frameworks (Jest, Pytest, Go test)"
      - "SonarQube / CodeClimate (Quality Gates)"
      - "Terraform / Pulumi (IaC Testing)"
      - "Contract Testing (Pact)"
  secops:
    prose: >-
      Establish formal solution development standards and procedures including
      secure coding guidelines, testing requirements, and quality criteria. Conduct
      security reviews at key development milestones (design review, code review,
      pre-release). Ensure requirements traceability from business requirements
      through design, implementation, and testing. Conduct acceptance testing with
      business stakeholders before deployment. Manage solution maintenance including
      patch management, technical debt tracking, and end-of-life planning.
    tools:
      - "Requirements Management (Jira, Azure DevOps)"
      - "Test Management (TestRail, Zephyr)"
      - "Code Review Platforms (GitLab, GitHub)"
      - "Quality Management Tools"
