id: bai06
family: bai
title: "BAI06 — Managed IT Changes"
class: COBIT-2019
statement:
  prose: >-
    Manage all changes in a controlled manner, including standard changes and
    emergency maintenance relating to business processes, applications, and
    infrastructure. This includes change standards and procedures, impact
    assessment, prioritization, authorization, emergency changes, tracking,
    reporting, closure, and documentation. Minimize the negative impact of
    changes on the quality of services and operations while ensuring that
    changes deliver their intended benefits.
guidance:
  prose: >-
    This objective is central to IT operational stability and directly maps to
    change management requirements across multiple compliance frameworks (ITIL,
    SOC 2 CC8.1, ISO 27001 A.12.1.2). Key activities include registering and
    classifying change requests, assessing impact and risk, obtaining appropriate
    authorization, scheduling and implementing changes, verifying successful
    implementation, and documenting change results. Change management should
    balance control (reducing risk of failed changes) with agility (enabling
    rapid delivery of value). Modern change management distinguishes between
    standard changes (pre-approved, low risk), normal changes (require assessment
    and approval), and emergency changes (expedited process for urgent fixes).
    For technology organizations, this includes implementing automated change
    management integrated with CI/CD pipelines, peer review processes, and
    deployment automation.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement change management as an automated platform capability. Classify
      changes automatically based on blast radius (number of affected services,
      data sensitivity, user impact). Standard changes (deploying to non-production,
      updating non-critical configurations) are auto-approved through pipeline
      policies. Normal changes require peer review through merge requests with
      mandatory approvals. Emergency changes follow an expedited path with
      mandatory post-implementation review. Track all changes in the platform
      audit log with full traceability.
    tools:
      - "GitLab Merge Requests (Change Authorization)"
      - "ArgoCD (GitOps Change Deployment)"
      - "Backstage (Change Impact Visualization)"
      - "OPA (Change Classification Policies)"
  devsecops:
    prose: >-
      Implement change management directly in CI/CD pipelines. Every deployment
      is a change — enforce merge request approval policies with required
      reviewers based on change impact. Implement automated change impact
      assessment through dependency analysis, blast radius calculation, and
      automated testing. Enforce deployment windows through pipeline schedules
      for production changes. Maintain complete change audit trails through
      Git history and pipeline logs. Implement automated rollback capabilities
      for failed changes. Track change metrics (change success rate, lead time,
      failed change rate) through pipeline analytics.
    tools:
      - "GitLab Merge Request Approvals"
      - "GitLab CI/CD (Deployment Pipelines)"
      - "Feature Flags (Controlled Rollouts)"
      - "GitOps (ArgoCD, Flux)"
      - "Automated Rollback (Argo Rollouts)"
  secops:
    prose: >-
      Establish a formal change management process with defined change types
      (standard, normal, emergency), classification criteria, approval
      authorities, and implementation procedures. Maintain a change advisory
      board (CAB) for high-risk changes with documented meeting minutes and
      decisions. Track all changes in a change management system with full
      lifecycle documentation. Conduct post-implementation reviews for all
      failed changes and significant changes. Report change management metrics
      (change volume, success rate, emergency change percentage) to management
      monthly.
    tools:
      - "ITSM Platforms (ServiceNow, BMC Helix)"
      - "Change Management Workflows"
      - "CAB Meeting Management"
      - "Change Analytics and Reporting"
