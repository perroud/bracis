id: bai09
family: bai
title: "BAI09 — Managed Assets"
class: COBIT-2019
statement:
  prose: >-
    Manage I&T assets through their lifecycle to make sure that their use delivers
    value at optimal cost, they remain operational and fit for purpose, they are
    accounted for and physically protected, and those assets that are critical to
    support service capability are reliable and available. Manage software licenses
    to ensure that the optimal number is acquired, retained, and deployed in
    relation to required business usage, and the software installed is in compliance
    with license agreements.
guidance:
  prose: >-
    This objective covers the management of all I&T assets including hardware,
    software, cloud resources, and intellectual property. Key activities include
    maintaining an asset register, tracking asset lifecycle (procurement, deployment,
    operation, maintenance, retirement), managing software licenses, optimizing
    asset utilization, ensuring asset security, and managing asset disposal. Effective
    asset management is essential for cost optimization, security (knowing what
    you need to protect), compliance (license management), and operational
    reliability. For technology organizations in cloud-native environments, this
    extends to managing ephemeral infrastructure, container images, cloud resource
    inventory, and software bill of materials (SBOM).
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated asset discovery and inventory through the platform. Track
      all infrastructure resources (clusters, databases, cloud services, domains)
      as entities in the service catalog with lifecycle metadata. Automate asset
      tagging and classification through platform provisioning workflows. Monitor
      asset utilization and surface optimization recommendations (unused resources,
      oversized instances, orphaned volumes). Track software dependencies through
      automated SBOM generation for all platform services. Implement automated
      asset decommissioning workflows.
    tools:
      - "Backstage (Asset Registry)"
      - "Cloud Asset Inventory (AWS Config, GCP Asset Inventory)"
      - "Kubecost (Resource Utilization)"
      - "Syft / Trivy (SBOM Generation)"
  devsecops:
    prose: >-
      Generate software bill of materials (SBOM) automatically in CI/CD pipelines
      for every build. Track software dependencies and licenses through automated
      scanning in pipeline stages. Enforce license compliance policies that block
      builds containing dependencies with non-approved licenses. Implement
      automated infrastructure resource tagging through IaC deployment pipelines.
      Track asset lifecycle through GitOps — assets defined in code are
      automatically inventoried through repository scanning.
    tools:
      - "Syft / CycloneDX (SBOM Generation)"
      - "GitLab License Scanning"
      - "Terraform / Pulumi (IaC Asset Definitions)"
      - "GitOps Asset Tracking"
  secops:
    prose: >-
      Maintain a comprehensive I&T asset register with defined ownership,
      classification, and criticality ratings. Conduct periodic asset discovery
      scans to identify unmanaged or shadow IT assets. Manage software license
      compliance through license management tools with regular compliance audits.
      Track asset lifecycle from procurement through disposal with documented
      approval workflows. Implement asset disposal procedures that ensure data
      sanitization and regulatory compliance. Report asset management metrics
      (inventory completeness, utilization rates, license compliance) to management.
    tools:
      - "CMDB (ServiceNow, BMC Helix)"
      - "Software Asset Management (Flexera, Snow)"
      - "Cloud Security Posture Management (CSPM)"
      - "Asset Disposal and Sanitization Tools"
