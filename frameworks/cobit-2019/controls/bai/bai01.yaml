id: bai01
family: bai
title: "BAI01 — Managed Programs"
class: COBIT-2019
statement:
  prose: >-
    Manage all programs from the investment portfolio in alignment with enterprise
    strategy and in a coordinated way based on the standard program management
    approach. Initiate, plan, control, and execute programs and monitor the
    expected value from the programs. Ensure that program outcomes deliver the
    expected benefits and business value. Coordinate the activities of program
    components (projects, workstreams) and manage their interdependencies.
guidance:
  prose: >-
    This objective covers the management of I&T-enabled programs from initiation
    through benefits realization. Key activities include establishing program
    governance, defining program scope and business case, planning program
    components (projects, workstreams), managing program interdependencies and
    risks, monitoring program progress and performance, managing program changes,
    and tracking benefits realization against the business case. Programs differ
    from projects in that they coordinate multiple related projects and ongoing
    activities to achieve strategic business benefits. For technology organizations,
    this includes managing large-scale initiatives such as cloud migrations,
    platform modernizations, digital transformation programs, and major technology
    upgrades that span multiple teams and require coordinated execution.
implementation_guidance:
  platform_engineering:
    prose: >-
      Track major platform initiatives (new capabilities, migrations, deprecations)
      as programs in the platform catalog with defined milestones, dependencies,
      and success metrics. Implement automated progress tracking through integration
      with project management tools. Create program dashboards that show component
      status, dependency health, and value delivery metrics. Use the platform
      catalog to track service migration progress during large-scale programs
      (e.g., percentage of services migrated to new platform version).
    tools:
      - "Backstage (Program Tracking)"
      - "Jira / Linear (Program Management)"
      - "Grafana (Program Dashboards)"
      - "Backstage Entity Lifecycle Tracking"
  devsecops:
    prose: >-
      Implement program-level CI/CD metrics that aggregate pipeline performance
      across all program components. Track program delivery velocity through
      deployment frequency, lead time, and change failure rate metrics at the
      program level. Create automated program status reports from pipeline
      data. Implement program-level quality gates that ensure component
      integration quality. Track program-level security posture through
      aggregated vulnerability metrics.
    tools:
      - "GitLab Epic/Milestone Tracking"
      - "DORA Metrics (Program-level Aggregation)"
      - "GitLab Value Stream Analytics"
      - "Program Status Automation"
  secops:
    prose: >-
      Establish formal program management practices with defined governance
      structures, reporting cadences, and escalation procedures. Maintain
      program business cases with regular benefit realization tracking. Conduct
      periodic program health assessments including schedule, budget, scope,
      risk, and quality dimensions. Manage program risks and issues through
      formal risk registers and issue logs. Report program status to governance
      bodies at defined cadences with standardized reporting formats.
    tools:
      - "Project Portfolio Management (ServiceNow ITBM, Planview)"
      - "Program Management Tools (MS Project, Clarity)"
      - "Benefits Realization Tracking"
      - "Risk and Issue Management Tools"
