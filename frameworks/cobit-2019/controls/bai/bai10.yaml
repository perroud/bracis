id: bai10
family: bai
title: "BAI10 — Managed Configuration"
class: COBIT-2019
statement:
  prose: >-
    Define and maintain descriptions and relationships of key resources and
    capabilities required to deliver I&T-enabled services, including collecting
    configuration information, establishing baselines, verifying and auditing
    configuration information, and updating the configuration repository.
    Ensure the integrity of configurations by establishing and maintaining an
    accurate and complete configuration management database (CMDB) that records
    all configuration items and their relationships.
guidance:
  prose: >-
    This objective addresses configuration management — tracking and controlling
    the components (configuration items) that make up I&T services and their
    relationships. Key activities include identifying and classifying configuration
    items, establishing and maintaining a configuration management database (CMDB),
    defining configuration baselines, verifying configuration integrity through
    audits, and managing configuration changes in coordination with change
    management (BAI06). Accurate configuration data is essential for change impact
    analysis, incident investigation, service dependency mapping, and capacity
    planning. For technology organizations using infrastructure-as-code and GitOps,
    configuration management is largely automated through declarative definitions
    stored in version control.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement configuration management through GitOps and the platform service
      catalog. All configuration items (services, infrastructure, middleware,
      databases) are defined declaratively in version-controlled repositories
      and registered in the service catalog with their relationships. The platform
      catalog serves as the living CMDB — automatically updated through GitOps
      reconciliation. Implement configuration drift detection that alerts when
      actual state deviates from desired state. Track configuration baselines
      through Git tags and releases. Visualize service dependency maps in the
      platform catalog.
    tools:
      - "Backstage (Service Catalog as CMDB)"
      - "ArgoCD / Flux (GitOps Configuration)"
      - "Crossplane (Infrastructure Configuration)"
      - "Backstage Dependency Graphs"
  devsecops:
    prose: >-
      Store all configurations as code in version-controlled repositories —
      application configuration, infrastructure definitions, pipeline
      configurations, and security policies. Implement configuration validation
      in CI/CD pipelines that verify configurations against defined baselines
      and policies before deployment. Enforce configuration change tracking
      through Git history with mandatory code review for all configuration
      changes. Implement automated configuration drift detection and remediation
      through GitOps reconciliation. Generate configuration audit reports from
      Git history.
    tools:
      - "Git (Configuration Version Control)"
      - "GitLab CI/CD (Configuration Validation)"
      - "ArgoCD / Flux (Drift Detection)"
      - "Terraform / Pulumi (Infrastructure Configuration)"
      - "Helm / Kustomize (Application Configuration)"
  secops:
    prose: >-
      Maintain a configuration management database (CMDB) with defined
      configuration item types, attributes, and relationships. Establish
      configuration baselines for all critical services and verify compliance
      through periodic configuration audits. Implement change control for all
      configuration changes through integration with change management processes.
      Track unauthorized configuration changes through automated monitoring and
      alerting. Report configuration management metrics (CMDB accuracy, drift
      incidents, baseline compliance) to management.
    tools:
      - "CMDB (ServiceNow, BMC Helix)"
      - "Configuration Audit Tools"
      - "CIS Benchmark Scanning (CIS-CAT)"
      - "Configuration Compliance Monitoring"
