id: apo09
family: apo
title: "APO09 — Managed Service Agreements"
class: COBIT-2019
statement:
  prose: >-
    Align I&T-enabled services and service levels with enterprise needs and
    expectations, including identification, specification, design, publishing,
    agreement, and monitoring of I&T services, service levels, and performance
    indicators. Ensure that services and service levels meet current and future
    enterprise needs. Maintain a service catalog that provides a single
    authoritative source of information about available I&T services and their
    characteristics.
guidance:
  prose: >-
    This objective covers the end-to-end management of I&T service agreements
    from definition through monitoring. Key activities include identifying and
    documenting I&T services in a service catalog, defining service level
    agreements (SLAs) and operational level agreements (OLAs), negotiating and
    agreeing on service levels with stakeholders, monitoring service performance
    against agreed levels, and taking corrective action when service levels are
    not met. Service agreements must be realistic, measurable, and aligned with
    business criticality. For technology organizations, this translates to
    implementing SLO/SLI-based service level management, publishing internal
    service catalogs, and automating service performance monitoring.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a comprehensive service catalog in the internal developer portal
      that documents all available platform services, their capabilities, SLOs,
      support channels, and ownership. Define SLOs and error budgets for platform
      services and expose them through self-service dashboards. Implement automated
      SLO monitoring that tracks service performance against agreed targets in
      real time. Create service agreement templates that teams use when onboarding
      new services to the platform. Track service catalog completeness and accuracy
      as a platform quality metric.
    tools:
      - "Backstage (Service Catalog)"
      - "SLO Monitoring (Sloth, OpenSLO)"
      - "Prometheus / Grafana (SLI Dashboards)"
      - "PagerDuty / Opsgenie (SLA Tracking)"
  devsecops:
    prose: >-
      Automate SLO measurement through CI/CD pipelines that deploy monitoring
      configurations alongside application code. Implement SLO-as-code where
      service level definitions are version-controlled and deployed through
      standard pipelines. Create pipeline stages that validate SLO definitions
      during deployment. Track service agreement compliance through automated
      dashboards generated from pipeline metadata. Implement automated alerts
      and escalations when error budgets are at risk.
    tools:
      - "OpenSLO / SLO-as-Code"
      - "GitLab CI/CD (SLO Deployment)"
      - "Prometheus Rules (SLI Automation)"
      - "Alert Manager (Error Budget Alerts)"
  secops:
    prose: >-
      Maintain a formal service catalog with defined ownership, support tiers,
      and service level agreements. Conduct periodic service level reviews with
      stakeholders to ensure SLAs remain aligned with business needs. Track SLA
      performance and report breaches with root cause analysis and corrective
      actions. Manage service agreement lifecycle including creation, review,
      renewal, and retirement. Implement escalation procedures for persistent
      SLA breaches and track resolution to completion.
    tools:
      - "ITSM Platforms (ServiceNow, BMC Helix)"
      - "Service Catalog Management"
      - "SLA Management and Reporting"
      - "Service Review Templates"
