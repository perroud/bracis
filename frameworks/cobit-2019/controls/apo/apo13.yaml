id: apo13
family: apo
title: "APO13 — Managed Security"
class: COBIT-2019
statement:
  prose: >-
    Define, operate, and monitor an information security management system (ISMS).
    Keep the impact and occurrence of information security incidents within the
    enterprise's risk appetite levels. Establish and maintain information security
    roles, responsibilities, policies, and procedures. Perform security monitoring,
    testing, and remediation activities to ensure the ongoing effectiveness of
    security controls. Align I&T security management with enterprise security
    management.
guidance:
  prose: >-
    This objective is one of the most critical in COBIT 2019, addressing the
    establishment and operation of a comprehensive information security management
    system. Key activities include establishing and maintaining an ISMS (aligned
    with ISO 27001), defining security policies and standards, managing security
    risk, implementing security controls, monitoring security events, managing
    security incidents, and conducting security awareness activities. The ISMS
    should be risk-based, with controls proportional to the risk level of the
    assets being protected. For technology organizations, this includes implementing
    defense-in-depth security architecture, continuous security monitoring,
    automated vulnerability management, and security-by-design practices embedded
    into the development lifecycle.
implementation_guidance:
  platform_engineering:
    prose: >-
      Embed security controls into the platform as default capabilities that teams
      inherit automatically. Implement network policies, pod security standards,
      secret management, and TLS termination as platform primitives. Provide
      pre-hardened base images and service templates that meet security baseline
      requirements. Create security posture dashboards in the platform catalog
      that show each service's compliance with security policies. Implement
      automated security scanning of all platform components and surface results
      in the service catalog.
    tools:
      - "Backstage (Security Posture Plugin)"
      - "Vault (Secrets Management)"
      - "Falco (Runtime Security)"
      - "Kyverno / OPA Gatekeeper (Policy Enforcement)"
      - "Cert-Manager (TLS Automation)"
  devsecops:
    prose: >-
      Implement security-as-code across the entire CI/CD pipeline. Enforce
      pre-commit secret scanning, SAST in build stages, SCA for dependency
      analysis, container image scanning before registry push, DAST against
      staging environments, and infrastructure-as-code security scanning. Define
      security quality gates that block promotion of builds with critical or
      high-severity findings. Implement automated security testing in pull
      request workflows to provide early feedback. Track security debt alongside
      technical debt and manage remediation through sprint planning.
    tools:
      - "GitLab Security Scanning Suite"
      - "Semgrep (SAST)"
      - "Trivy (Container + IaC Scanning)"
      - "GitLeaks / TruffleHog (Secret Scanning)"
      - "OWASP ZAP (DAST)"
      - "Checkov / tfsec (IaC Security)"
  secops:
    prose: >-
      Establish and maintain a formal ISMS with defined scope, policies, and
      controls aligned with ISO 27001. Conduct periodic security risk assessments
      and maintain a security risk register. Implement continuous security
      monitoring through SIEM, EDR, and network detection tools. Manage security
      incidents through a defined incident response process with documented
      playbooks. Conduct regular security awareness training and phishing
      simulations. Perform periodic penetration testing and vulnerability
      assessments. Track security KPIs (mean time to detect, mean time to
      respond, vulnerability remediation rates, incident frequency) and report
      to management.
    tools:
      - "SIEM (Splunk, Elastic Security, Sentinel)"
      - "EDR (CrowdStrike, SentinelOne)"
      - "Vulnerability Management (Qualys, Tenable)"
      - "GRC Platforms (ISO 27001 ISMS Management)"
      - "Security Awareness (KnowBe4, Proofpoint)"
