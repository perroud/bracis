id: apo02
family: apo
title: "APO02 — Managed Strategy"
class: COBIT-2019
statement:
  prose: >-
    Provide a holistic view of the current business and I&T environment, the future
    direction, and the initiatives required to migrate to the desired future
    environment. Leverage enterprise architecture building blocks and components,
    including externally provided services and related capabilities, to enable agile,
    reliable, and efficient response to strategic objectives. Ensure that the I&T
    strategy is aligned with and supports the enterprise strategy and that I&T
    investments deliver expected value.
guidance:
  prose: >-
    This objective requires establishing a clear I&T strategy aligned with business
    objectives. Key activities include understanding the enterprise direction and
    strategy, assessing the current I&T environment and capabilities, defining the
    target I&T capabilities, conducting gap analysis, defining the strategic plan
    and roadmap, and communicating the strategy to stakeholders. The strategy must
    address technology trends, digital transformation opportunities, innovation,
    risk, and resource constraints. For technology organizations, this means
    defining technology radar, architecture evolution plans, build-vs-buy decisions,
    cloud strategy, and platform investment priorities.
implementation_guidance:
  platform_engineering:
    prose: >-
      Maintain a technology radar in the platform catalog that tracks technology
      adoption decisions (adopt, trial, assess, hold). Define architecture decision
      records (ADRs) for all strategic technology choices and store them alongside
      service definitions. Implement strategic alignment dashboards that map platform
      capabilities to business objectives. Track platform strategy execution through
      OKRs embedded in the platform catalog. Create capability maps that visualize
      current state vs. target state for platform services.
    tools:
      - "Backstage TechDocs (ADRs)"
      - "Technology Radar (Zalando Tech Radar)"
      - "Backstage (Capability Maps)"
      - "OKR Tracking Tools"
  devsecops:
    prose: >-
      Align CI/CD pipeline capabilities with strategic technology direction. Implement
      pipeline stages that enforce strategic architectural decisions (e.g., requiring
      approved base images, approved dependency registries, approved deployment
      targets). Track strategic metrics through pipeline analytics — deployment
      frequency trends, technology adoption rates, migration progress. Automate
      strategic compliance checks that ensure new services align with architecture
      standards and technology strategy.
    tools:
      - "GitLab CI/CD Analytics"
      - "Dependency Scanning with Approved Registries"
      - "Architecture Fitness Functions (CI checks)"
      - "Strategic Migration Tracking Pipelines"
  secops:
    prose: >-
      Conduct annual I&T strategy reviews aligned with enterprise strategic planning
      cycles. Maintain strategy documentation with clear linkage between business
      objectives, I&T capabilities, and investment priorities. Track strategy
      execution through balanced scorecards and strategic KPIs. Assess I&T strategy
      risks including technology obsolescence, vendor lock-in, skill gaps, and
      competitive threats. Report strategy execution progress to governance bodies
      at defined cadences.
    tools:
      - "Strategy Management Tools (Cascade, Workboard)"
      - "Balanced Scorecard Platforms"
      - "Enterprise Architecture Tools (LeanIX, Ardoq)"
      - "Portfolio Management (ServiceNow ITBM)"
