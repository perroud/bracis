id: apo14
family: apo
title: "APO14 — Managed Data"
class: COBIT-2019
statement:
  prose: >-
    Achieve and maintain effective management of the enterprise data assets
    throughout the data lifecycle, from creation through delivery, maintenance,
    and archival or destruction. Ensure that the enterprise data management
    approach enables optimal use of data assets while maintaining data quality,
    accessibility, security, and compliance with regulatory requirements. Define
    and implement data governance structures, policies, and procedures that
    establish accountability for data stewardship.
guidance:
  prose: >-
    This objective addresses the comprehensive management of enterprise data as
    a strategic asset. Key activities include defining data governance roles and
    responsibilities (data owners, data stewards, data custodians), establishing
    data quality standards and measurement, implementing data classification
    schemes, managing data lifecycle (creation, storage, usage, archival,
    destruction), ensuring data privacy and protection compliance, and enabling
    data accessibility for authorized purposes. Effective data management is
    increasingly critical due to data privacy regulations (GDPR, LGPD, CCPA),
    the growing value of data for business decisions, and the risks associated
    with data breaches. For technology organizations, this includes implementing
    data catalogs, data lineage tracking, data quality monitoring, and
    privacy-by-design practices.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a data catalog as part of the platform that provides visibility
      into data assets, their classification, ownership, and lineage. Enforce
      data classification tagging on all data stores provisioned through the
      platform. Provide self-service data management capabilities (databases,
      data pipelines, analytics) with embedded data governance controls. Implement
      automated data quality checks as platform primitives. Track data governance
      compliance metrics in the platform dashboard, including classification
      coverage, data quality scores, and retention policy adherence.
    tools:
      - "Backstage (Data Catalog Plugin)"
      - "Apache Atlas / DataHub (Data Catalog)"
      - "Great Expectations (Data Quality)"
      - "Open Policy Agent (Data Access Policies)"
  devsecops:
    prose: >-
      Integrate data governance checks into CI/CD pipelines. Enforce data
      classification requirements through pipeline policies that prevent
      deployment of data stores without proper classification tags. Implement
      automated PII detection scanning in code repositories and databases.
      Enforce data retention policies through automated lifecycle management
      in deployment pipelines. Validate data migration scripts for data quality
      and integrity before deployment. Track data governance compliance metrics
      as part of pipeline reporting.
    tools:
      - "GitLab CI/CD (Data Governance Checks)"
      - "PII Detection Tools (Presidio, Macie)"
      - "Database Migration Tools (Flyway, Liquibase)"
      - "Data Classification Automation"
  secops:
    prose: >-
      Establish a formal data governance program with defined roles (data
      owners, stewards, custodians), policies, and procedures. Implement data
      classification schemes and ensure all data assets are classified. Conduct
      periodic data quality assessments and track improvement. Manage data
      privacy compliance (GDPR, LGPD, CCPA) through data protection impact
      assessments (DPIAs) and privacy controls. Implement data loss prevention
      (DLP) controls for sensitive data. Maintain data retention schedules and
      ensure compliance with legal and regulatory requirements. Track data
      governance KPIs and report to management.
    tools:
      - "Data Governance Platforms (Collibra, Informatica)"
      - "DLP Solutions (Symantec, Microsoft Purview)"
      - "Privacy Management (OneTrust, TrustArc)"
      - "Data Quality Monitoring Tools"
