id: apo12
family: apo
title: "APO12 — Managed Risk"
class: COBIT-2019
statement:
  prose: >-
    Continually identify, assess, and reduce I&T-related risk within tolerance
    levels set by enterprise management. Integrate the management of I&T-related
    enterprise risk with overall enterprise risk management (ERM). Balance the
    costs and benefits of managing I&T risk. Maintain a risk profile that provides
    a comprehensive view of I&T risk, enabling informed risk-based decisions.
    Ensure risk responses are implemented effectively and monitored for continued
    appropriateness.
guidance:
  prose: >-
    This management objective operationalizes the governance direction from EDM03
    into day-to-day risk management activities. Key activities include collecting
    data to identify and analyze I&T risks, maintaining a risk profile, articulating
    and communicating risk, defining risk treatment portfolios, and responding to
    risk events. The risk management process should be continuous, not periodic —
    with automated risk indicators feeding into the risk profile in real time.
    Risk scenarios should be defined using the COBIT risk scenario structure
    (threat type, event, asset/resource, and timing). For technology organizations,
    this includes implementing continuous vulnerability management, threat modeling,
    and automated risk assessment integrated into development and operations
    processes.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated risk assessment as part of the platform service lifecycle.
      Every service registered in the catalog should have an automatically calculated
      risk score based on data classification, internet exposure, dependency count,
      vulnerability density, and operational maturity. Create risk heatmaps in the
      platform dashboard that provide real-time visibility into organizational risk
      distribution. Implement automated risk treatment tracking that links identified
      risks to remediation actions and monitors progress. Integrate threat modeling
      into service design templates.
    tools:
      - "Backstage (Risk Scoring Plugin)"
      - "Threat Modeling Tools (OWASP Threat Dragon, IriusRisk)"
      - "Dependency-Track (SCA Risk)"
      - "Grafana (Risk Heatmaps)"
  devsecops:
    prose: >-
      Implement continuous risk assessment through automated security scanning in
      CI/CD pipelines. Aggregate vulnerability data from multiple scanning tools
      (SAST, DAST, SCA, infrastructure scanning) into a centralized vulnerability
      management platform. Define risk-based SLAs for vulnerability remediation
      (critical: 24h, high: 7d, medium: 30d, low: 90d) and enforce them through
      pipeline policies. Conduct automated threat modeling for significant changes.
      Track risk metrics (vulnerability density, mean time to remediate, risk
      exception rates) and surface them in development dashboards.
    tools:
      - "GitLab Security Dashboard"
      - "DefectDojo (Vulnerability Aggregation)"
      - "Trivy / Grype / Semgrep"
      - "OWASP ZAP (DAST)"
      - "Risk SLA Enforcement Pipelines"
  secops:
    prose: >-
      Maintain a comprehensive I&T risk register with regular review and update
      cadence. Conduct formal risk assessments for all significant I&T changes,
      new projects, and third-party engagements. Implement risk scenarios using
      the COBIT risk scenario framework and conduct periodic scenario analysis.
      Track risk treatment plans and monitor implementation effectiveness. Report
      risk posture to management through standardized risk dashboards with trend
      analysis. Integrate I&T risk management with enterprise risk management
      processes and reporting.
    tools:
      - "GRC Platforms (ServiceNow GRC, RSA Archer)"
      - "Risk Register and Assessment Tools"
      - "FAIR Risk Quantification (RiskLens)"
      - "Threat Intelligence Platforms (MISP, Recorded Future)"
      - "Risk Reporting Dashboards"
