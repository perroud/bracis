id: apo01
family: apo
title: "APO01 — Managed I&T Management Framework"
class: COBIT-2019
statement:
  prose: >-
    Implement and maintain a management framework to provide a consistent management
    approach to enable the enterprise governance requirements to be met, covering
    management processes, organizational structures, roles and responsibilities,
    reliable and repeatable activities, information items, policies and procedures,
    skills and competencies, culture and behavior, and services, infrastructure,
    and applications. The management framework should support the governance system
    design and provide clear accountability for I&T decisions and actions.
guidance:
  prose: >-
    This objective operationalizes the governance framework (EDM01) into day-to-day
    management structures and practices. Key activities include defining the I&T
    organizational structure and placement within the enterprise, establishing roles
    and responsibilities for I&T management, implementing management policies and
    procedures, defining management processes with clear inputs, outputs, and
    performance measures, and ensuring that the management framework enables
    efficient and effective execution of I&T activities. The management framework
    must balance standardization (for consistency and efficiency) with flexibility
    (to adapt to changing business needs). For technology organizations, this
    includes establishing team topologies, defining ownership models for services
    and infrastructure, and implementing management practices that scale with
    organizational growth.
implementation_guidance:
  platform_engineering:
    prose: >-
      Define team topologies (stream-aligned, platform, enabling, complicated
      subsystem) in the service catalog and map ownership, responsibilities, and
      interaction modes. Implement a platform management framework that defines
      how platform services are proposed, approved, built, operated, and retired.
      Create golden paths and templates that encode management framework requirements
      into self-service workflows. Establish platform SLOs and operational runbooks
      as mandatory metadata for all registered services. Track management framework
      compliance through automated catalog audits.
    tools:
      - "Backstage (Service Catalog + Team Topology)"
      - "Port (Internal Developer Portal)"
      - "Crossplane (Infrastructure Management)"
      - "ArgoCD (GitOps Management)"
  devsecops:
    prose: >-
      Implement management framework requirements as CI/CD pipeline policies that
      enforce organizational standards for code quality, security, testing, and
      deployment. Define standard pipeline templates that encode management processes
      (approval workflows, change management, release management) into automated
      workflows. Establish repository governance standards (naming conventions,
      branch strategies, required files like CODEOWNERS, README, CONTRIBUTING).
      Implement automated compliance checks that verify adherence to management
      framework policies.
    tools:
      - "GitLab CI/CD Templates"
      - "GitLab Compliance Framework"
      - "Repository Standards Enforcement"
      - "Pipeline Governance Policies"
  secops:
    prose: >-
      Document the I&T management framework in a centralized policy repository with
      defined review and approval workflows. Maintain an I&T organizational chart
      with roles, responsibilities, and accountability assignments (RACI). Implement
      management performance metrics that track process efficiency, policy compliance,
      and organizational effectiveness. Conduct periodic management framework reviews
      to identify improvement opportunities. Ensure management framework alignment
      with governance direction through regular governance-management coordination
      meetings.
    tools:
      - "GRC Platforms (ServiceNow GRC, Archer)"
      - "ITSM Platforms (ServiceNow ITSM)"
      - "Policy Management Tools"
      - "Organizational Chart Tools (Lucidchart, OrgChart)"
