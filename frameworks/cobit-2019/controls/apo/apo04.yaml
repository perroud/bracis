id: apo04
family: apo
title: "APO04 — Managed Innovation"
class: COBIT-2019
statement:
  prose: >-
    Maintain an awareness of information and related technology trends, identify
    innovation opportunities, and plan how to benefit from innovation in relation
    to business needs. Analyze what opportunities for business innovation or
    improvement can be created by emerging technologies, services, or I&T-enabled
    business innovation. Influence strategic planning and enterprise architecture
    decisions with innovation insights. Track innovation initiatives and measure
    their value contribution to the enterprise.
guidance:
  prose: >-
    This objective ensures the enterprise actively seeks and leverages innovation
    opportunities through technology. Key activities include creating an environment
    conducive to innovation, maintaining awareness of technology trends and their
    potential business impact, identifying and evaluating innovation opportunities,
    recommending appropriate innovation initiatives, and monitoring the
    implementation and value realization of approved innovations. Innovation
    should be systematic rather than ad-hoc — a defined process for scanning the
    environment, evaluating opportunities, prototyping solutions, and scaling
    successful innovations. For technology organizations, this includes
    establishing experimentation practices (hackathons, spike work, proof of
    concepts), tracking emerging technology adoption, and measuring innovation
    outcomes.
implementation_guidance:
  platform_engineering:
    prose: >-
      Provide sandboxed experimentation environments through the platform that
      enable teams to trial new technologies safely without impacting production.
      Maintain a technology radar as a living artifact in the platform catalog.
      Create platform primitives that accelerate innovation by reducing the
      time from idea to working prototype. Track innovation experiments through
      the catalog, including hypotheses, results, and adoption decisions.
      Implement feature flags and progressive delivery capabilities that reduce
      the risk of innovation experiments in production.
    tools:
      - "Backstage (Technology Radar + Experiment Tracking)"
      - "Feature Flag Platforms (LaunchDarkly, Unleash)"
      - "Sandbox Environments (Crossplane, vCluster)"
      - "ArgoCD Rollouts (Progressive Delivery)"
  devsecops:
    prose: >-
      Enable innovation pipelines that provide fast feedback for experimental
      work with relaxed but still secure quality gates. Implement pipeline
      templates for proof-of-concept projects that balance speed with security
      baseline requirements. Track innovation metrics through CI/CD analytics
      — experiment frequency, time-to-prototype, adoption rates for new tools
      and practices. Automate security assessment of new technologies and
      dependencies introduced through innovation experiments.
    tools:
      - "GitLab CI/CD (Experimental Pipeline Templates)"
      - "Container Sandboxes for Experimentation"
      - "Dependency Analysis for New Technologies"
      - "Innovation Metrics Dashboards"
  secops:
    prose: >-
      Establish a formal innovation management process with defined stages
      (ideation, evaluation, proof of concept, pilot, scale). Conduct technology
      trend analysis and communicate findings to leadership quarterly. Maintain
      an innovation portfolio that tracks initiatives from inception to value
      realization. Assess security and compliance implications of innovation
      initiatives early in the process. Benchmark innovation practices against
      industry peers and standards.
    tools:
      - "Innovation Management Platforms (Brightidea, Planview)"
      - "Technology Trend Analysis (Gartner, Forrester)"
      - "Enterprise Architecture Tools (LeanIX)"
      - "Innovation Portfolio Management"
