id: apo06
family: apo
title: "APO06 — Managed Budget and Costs"
class: COBIT-2019
statement:
  prose: >-
    Manage the I&T-related financial activities in both the business and I&T
    functions, covering budget, cost and benefit management, and prioritization
    of spending through the use of formal budgeting practices and a fair and
    equitable system of allocating costs to the enterprise. Consult stakeholders
    to identify and control the total costs and benefits within the context of
    the I&T strategic and tactical plans. Initiate corrective action where needed.
guidance:
  prose: >-
    This objective ensures transparent and effective management of I&T financial
    resources. Key activities include establishing I&T budgeting processes, creating
    and maintaining cost models, implementing chargeback or showback mechanisms,
    tracking actual costs against budget, optimizing I&T spending, and reporting
    financial performance to stakeholders. Effective cost management requires
    understanding the total cost of ownership (TCO) of I&T services, including
    direct costs (infrastructure, licenses, personnel) and indirect costs
    (opportunity cost, technical debt). For technology organizations, this
    includes implementing FinOps practices for cloud cost management, tracking
    infrastructure unit economics, and ensuring engineering investment aligns
    with business value.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement cost attribution and showback through the platform catalog by
      tagging all infrastructure resources with team and service ownership.
      Create cost dashboards that display per-service and per-team infrastructure
      costs alongside business metrics to enable unit economics visibility.
      Implement automated cost anomaly detection that alerts teams when spending
      exceeds thresholds. Provide self-service cost estimation tools that let
      teams understand the financial impact of infrastructure requests before
      provisioning. Track platform ROI by measuring developer productivity
      gains against platform investment.
    tools:
      - "Backstage (Cost Attribution Plugin)"
      - "Kubecost / OpenCost"
      - "Cloud Cost Management (Infracost, Finout)"
      - "Grafana (Cost Dashboards)"
  devsecops:
    prose: >-
      Integrate cost checks into CI/CD pipelines using infrastructure-as-code
      cost estimation tools that provide cost impact analysis before deployment.
      Implement pipeline policies that require cost approval for changes exceeding
      defined thresholds. Track cost-per-deployment and infrastructure cost trends
      through pipeline analytics. Automate cost optimization recommendations
      (right-sizing, unused resource cleanup) as part of regular pipeline runs.
      Enforce cost tagging policies through automated compliance checks in
      deployment pipelines.
    tools:
      - "Infracost (IaC Cost Estimation)"
      - "GitLab CI/CD (Cost Gate Policies)"
      - "Terraform/Pulumi Cost Analysis"
      - "Automated Resource Cleanup Pipelines"
  secops:
    prose: >-
      Establish formal I&T budgeting processes with defined timelines, approval
      workflows, and variance reporting. Implement cost allocation models that
      distribute I&T costs to business units based on usage or other fair
      allocation methods. Track budget performance monthly and report significant
      variances to management. Conduct periodic cost optimization reviews to
      identify savings opportunities. Maintain a total cost of ownership (TCO)
      model for critical I&T services and use it for investment decision making.
    tools:
      - "Financial Management (SAP, Oracle Financials)"
      - "FinOps Platforms (CloudHealth, Apptio)"
      - "Budget Tracking Tools"
      - "TCO Analysis Tools"
