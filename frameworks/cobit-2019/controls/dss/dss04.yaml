id: dss04
family: dss
title: "DSS04 — Managed Continuity"
class: COBIT-2019
statement:
  prose: >-
    Establish and maintain a plan to enable the business and I&T to respond to
    incidents and disruptions in order to continue operation of critical business
    processes and required I&T services and maintain availability of information
    at a level acceptable to the enterprise. Define and execute business continuity
    and disaster recovery plans, test them regularly, and ensure that business
    continuity management is integrated into the enterprise risk management
    framework.
guidance:
  prose: >-
    This objective covers business continuity management (BCM) and disaster
    recovery (DR) for I&T services. Key activities include conducting business
    impact analysis (BIA) to determine recovery priorities, defining recovery
    time objectives (RTO) and recovery point objectives (RPO), developing
    continuity and disaster recovery plans, implementing recovery capabilities,
    testing plans regularly through exercises and simulations, training staff
    on their continuity roles, and maintaining plans to reflect changes in
    business requirements and I&T infrastructure. For technology organizations,
    this includes implementing multi-region deployment strategies, data
    replication, automated failover, backup management, and regular disaster
    recovery testing.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement continuity capabilities as platform primitives including
      multi-region deployment, automated failover, data replication, and
      backup automation. Define RTO/RPO requirements as service metadata in
      the catalog and enforce them through platform policies. Provide
      self-service disaster recovery testing capabilities that teams can
      execute on demand. Track continuity readiness metrics (backup success
      rates, replication lag, failover test results) in platform dashboards.
      Implement automated recovery procedures through platform controllers.
    tools:
      - "Kubernetes (Multi-cluster / Multi-region)"
      - "Velero (Backup and Recovery)"
      - "CloudNativePG / Patroni (Database HA)"
      - "Backstage (RTO/RPO Tracking)"
      - "Chaos Engineering (Failover Testing)"
  devsecops:
    prose: >-
      Implement disaster recovery as code — DR configurations, failover
      procedures, and backup policies defined in version-controlled repositories
      and deployed through CI/CD pipelines. Automate DR testing through scheduled
      pipeline runs that validate backup integrity, replication health, and
      failover capabilities. Implement automated backup verification that
      regularly restores backups and validates data integrity. Track continuity
      metrics (RPO compliance, backup success rate, DR test results) through
      pipeline dashboards.
    tools:
      - "GitLab CI/CD (DR Test Automation)"
      - "Terraform / Pulumi (DR Infrastructure as Code)"
      - "Backup Verification Pipelines"
      - "Failover Test Automation"
  secops:
    prose: >-
      Establish a formal business continuity management program with executive
      sponsorship. Conduct business impact analysis (BIA) for all critical
      services to define RTO/RPO requirements. Develop and maintain business
      continuity plans (BCP) and disaster recovery plans (DRP). Conduct
      regular continuity exercises (tabletop, simulation, full test) at
      minimum annually. Train staff on their continuity roles and
      responsibilities. Review and update plans after significant changes
      or test findings. Report continuity readiness to management and
      governance bodies.
    tools:
      - "BCM Platforms (Fusion Risk Management, Castellan)"
      - "BIA Tools"
      - "DR Orchestration (Zerto, Commvault)"
      - "Continuity Testing and Reporting Tools"
