id: dss01
family: dss
title: "DSS01 — Managed Operations"
class: COBIT-2019
statement:
  prose: >-
    Coordinate and execute the activities and operational procedures required to
    deliver I&T services, including the execution of pre-defined standard operating
    procedures and the required monitoring activities. Deliver I&T operational
    services as planned and ensure that operations are executed efficiently,
    reliably, and securely. Manage the physical and virtual environments to
    ensure protection and availability of I&T resources.
guidance:
  prose: >-
    This objective covers the day-to-day operational management of I&T services.
    Key activities include executing operational procedures, monitoring the I&T
    infrastructure, managing scheduled jobs and batch processing, managing the
    physical environment (data centers, server rooms), and managing facility
    services. Operations management ensures that I&T services run as designed
    and meet agreed service levels. For technology organizations, this includes
    managing container orchestration platforms, cloud infrastructure operations,
    monitoring and observability systems, and operational automation (runbooks,
    auto-remediation).
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement self-healing infrastructure through the platform using
      auto-scaling, auto-restart, and automated remediation capabilities.
      Define operational runbooks as code stored alongside service definitions
      in the catalog. Implement comprehensive observability (metrics, logs,
      traces) as a platform capability that all services inherit by default.
      Create operational dashboards in the platform that provide real-time
      visibility into service health, resource utilization, and operational
      events. Automate routine operational tasks through platform controllers
      and operators.
    tools:
      - "Kubernetes (Container Orchestration)"
      - "Prometheus / Grafana (Monitoring)"
      - "OpenTelemetry (Observability)"
      - "PagerDuty / Opsgenie (Incident Management)"
      - "Runbook Automation (Rundeck, Shoreline)"
  devsecops:
    prose: >-
      Implement operational monitoring and alerting configurations as code,
      deployed through CI/CD pipelines alongside application code. Automate
      operational runbooks and integrate them with alerting systems for
      automated incident response. Implement chaos engineering practices
      through automated pipeline stages that validate operational resilience.
      Track operational metrics (uptime, incident frequency, mean time to
      recovery) through pipeline-integrated monitoring dashboards. Deploy
      monitoring configurations automatically when services are deployed.
    tools:
      - "GitLab CI/CD (Monitoring-as-Code)"
      - "Prometheus Rules (Alerting-as-Code)"
      - "Chaos Engineering (Litmus, Chaos Monkey)"
      - "Automated Runbook Execution"
  secops:
    prose: >-
      Establish formal operational procedures (SOPs) for all critical I&T
      operations. Implement 24/7 monitoring of critical systems with defined
      alerting thresholds and escalation procedures. Maintain operational
      logs and event records for audit and forensic purposes. Conduct periodic
      operational reviews to identify improvement opportunities. Manage physical
      environment security including access controls, environmental monitoring
      (temperature, humidity, fire suppression), and physical security assessments.
      Report operational performance metrics to management.
    tools:
      - "ITSM Platforms (ServiceNow, BMC Helix)"
      - "Monitoring Platforms (Datadog, New Relic, Dynatrace)"
      - "Physical Security (Access Control Systems)"
      - "Environmental Monitoring (DCIM Tools)"
