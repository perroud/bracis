id: dss02
family: dss
title: "DSS02 — Managed Service Requests and Incidents"
class: COBIT-2019
statement:
  prose: >-
    Provide timely and effective response to user requests and resolution of all
    types of incidents. Restore normal service, record and fulfill user requests,
    and record, investigate, diagnose, escalate, and resolve incidents. Classify
    incidents and service requests according to defined schemes and prioritize
    them based on business impact and urgency. Track, report, and manage incident
    and service request lifecycle from initiation through resolution and closure.
guidance:
  prose: >-
    This objective covers incident management and service request fulfillment —
    two of the most visible and impactful I&T operational processes. Key activities
    include defining incident classification and prioritization schemes, establishing
    service request catalogs, implementing first-line support capabilities,
    managing incident investigation and diagnosis, escalating incidents to
    appropriate support groups, resolving and recovering from incidents, fulfilling
    service requests within agreed SLAs, and analyzing incident trends to identify
    systemic issues. Effective incident management minimizes business impact from
    service disruptions. For technology organizations, this includes implementing
    on-call practices, incident response procedures, incident communication,
    and blameless post-mortems.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement self-service incident creation and service request submission
      through the platform catalog. Automate incident detection through integrated
      monitoring that creates incidents automatically when SLOs are breached.
      Provide on-call management capabilities that route incidents to the correct
      team based on service ownership defined in the catalog. Implement automated
      remediation for known incident patterns through runbook automation.
      Track incident and service request metrics (MTTR, MTTA, resolution rate)
      in platform dashboards.
    tools:
      - "PagerDuty / Opsgenie (On-call + Incident Management)"
      - "Backstage (Service Ownership Routing)"
      - "Prometheus Alertmanager (Automated Incident Creation)"
      - "Rootly / incident.io (Incident Lifecycle)"
  devsecops:
    prose: >-
      Integrate incident management into the development workflow. Link incidents
      to code changes through deployment tracking to accelerate root cause
      analysis. Implement automated rollback capabilities triggered by incident
      detection. Create incident timeline automation that captures deployment
      events, configuration changes, and monitoring alerts leading up to an
      incident. Implement post-incident analysis as a defined workflow that
      produces action items tracked in the development backlog.
    tools:
      - "GitLab Incident Management"
      - "Deployment Tracking (GitLab Environments)"
      - "Automated Rollback Pipelines"
      - "Post-Incident Review Workflows"
  secops:
    prose: >-
      Establish formal incident management and service request fulfillment
      processes with defined roles, responsibilities, and procedures. Implement
      incident classification and prioritization schemes based on business
      impact and urgency. Maintain a service request catalog with defined
      fulfillment procedures and SLAs. Track incident and service request
      metrics (volume, resolution time, SLA compliance, customer satisfaction)
      and report to management. Conduct periodic incident trend analysis to
      identify systemic issues and drive problem management activities.
    tools:
      - "ITSM Platforms (ServiceNow, BMC Helix, Jira Service Management)"
      - "Service Request Catalog"
      - "Incident Analytics and Reporting"
      - "Customer Satisfaction Surveys"
