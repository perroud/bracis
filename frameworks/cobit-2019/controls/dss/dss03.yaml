id: dss03
family: dss
title: "DSS03 — Managed Problems"
class: COBIT-2019
statement:
  prose: >-
    Identify and classify problems and their root causes, and provide timely
    resolution to prevent recurring incidents. Provide recommendations for
    improvements. Manage the problem lifecycle from identification through
    root cause analysis, resolution, and closure. Track known errors and
    workarounds until problems are permanently resolved. Proactively identify
    potential problems through trend analysis and preventive actions.
guidance:
  prose: >-
    This objective distinguishes problem management from incident management.
    While incident management focuses on restoring service as quickly as
    possible, problem management focuses on identifying and eliminating the
    root causes of incidents to prevent recurrence. Key activities include
    identifying problems (from incident trends, proactive analysis, or
    monitoring data), classifying and prioritizing problems, conducting root
    cause analysis, defining workarounds for known errors, implementing
    permanent fixes, and tracking resolution. For technology organizations,
    this includes blameless post-mortem practices, reliability engineering,
    chaos engineering, and systematic technical debt management.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement problem tracking integrated with the service catalog. Link
      problems to affected services and track their impact on SLOs. Provide
      incident trend analysis dashboards that automatically surface patterns
      indicating systemic problems. Implement post-mortem templates and
      tracking in the platform that capture root causes, contributing factors,
      action items, and lessons learned. Track known errors and workarounds
      as metadata on affected services in the catalog.
    tools:
      - "Backstage (Problem Tracking Plugin)"
      - "Grafana (Incident Trend Analysis)"
      - "Post-mortem Templates (Backstage TechDocs)"
      - "SLO Impact Tracking"
  devsecops:
    prose: >-
      Implement blameless post-mortem processes as a defined development
      workflow. Track post-mortem action items in the development backlog
      with defined SLAs for resolution. Implement automated incident
      correlation that identifies patterns across services. Create reliability
      testing (chaos engineering) pipeline stages that proactively identify
      potential problems. Track problem management metrics (problems identified,
      root causes resolved, recurrence rate) through automated dashboards.
    tools:
      - "Post-mortem Tools (Blameless, Jeli)"
      - "Chaos Engineering (Litmus, Gremlin)"
      - "Incident Correlation (BigPanda, Moogsoft)"
      - "Problem Backlog Tracking (Jira, Linear)"
  secops:
    prose: >-
      Establish a formal problem management process with defined roles,
      procedures, and tools. Conduct regular incident trend analysis to
      proactively identify problems. Implement structured root cause analysis
      methodologies (5 Whys, Ishikawa, Fault Tree Analysis). Maintain a
      known error database with documented workarounds. Track problem
      management metrics (problem backlog, MTTR for problems, recurrence
      rate after fix) and report to management. Integrate problem management
      with change management to ensure permanent fixes are properly controlled.
    tools:
      - "ITSM Platforms (ServiceNow, BMC Helix)"
      - "Root Cause Analysis Tools"
      - "Known Error Database (KEDB)"
      - "Problem Analytics and Reporting"
