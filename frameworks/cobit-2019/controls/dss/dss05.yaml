id: dss05
family: dss
title: "DSS05 — Managed Security Services"
class: COBIT-2019
statement:
  prose: >-
    Protect enterprise information to maintain the level of information security
    risk acceptable to the enterprise in accordance with the security policy.
    Establish and maintain information security roles and access privileges and
    perform security monitoring. Implement preventive, detective, and corrective
    security controls to protect information systems and technology from
    security-related events. Manage identity and access to ensure appropriate
    access to enterprise resources.
guidance:
  prose: >-
    This objective covers the operational implementation of security controls
    defined by the security management system (APO13). While APO13 focuses on
    the ISMS and security governance, DSS05 addresses the day-to-day operation
    of security services. Key activities include protecting against malware,
    managing network security, managing endpoint security, managing user identity
    and access, managing physical access, and managing sensitive documents and
    output devices. For technology organizations, this includes implementing
    zero-trust architecture, identity and access management (IAM), network
    security controls, endpoint detection and response, and security automation
    for operational security activities.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement security services as platform capabilities that all services
      inherit. Provide centralized identity and access management with SSO,
      MFA, and RBAC as platform defaults. Implement network policies and
      service mesh for zero-trust networking. Provide secret management as
      a platform service. Implement automated certificate management and
      TLS everywhere. Deploy runtime security monitoring (container runtime
      scanning, anomaly detection) as platform infrastructure. Track security
      service metrics (authentication failures, access violations, policy
      exceptions) in platform security dashboards.
    tools:
      - "Keycloak / Dex (Identity Provider)"
      - "Istio / Linkerd (Service Mesh)"
      - "Vault (Secrets Management)"
      - "Falco (Runtime Security)"
      - "Cilium (Network Policies)"
      - "Cert-Manager (Certificate Automation)"
  devsecops:
    prose: >-
      Implement security controls in CI/CD pipelines that enforce operational
      security requirements. Scan container images for vulnerabilities before
      deployment. Enforce least-privilege access in infrastructure-as-code
      definitions. Implement automated credential rotation through pipeline
      automation. Deploy security monitoring configurations alongside application
      code. Implement automated security compliance checks that validate
      runtime security posture after deployment. Track security service metrics
      through pipeline-integrated dashboards.
    tools:
      - "Trivy (Container Security)"
      - "Checkov / tfsec (IaC Security)"
      - "GitLab Security Scanning"
      - "Automated Credential Rotation Pipelines"
      - "Security Posture Validation (Post-deploy)"
  secops:
    prose: >-
      Operate security controls across all layers — network, endpoint, identity,
      application, and data. Implement continuous security monitoring through
      SIEM with defined use cases and alerting rules. Manage identity and access
      through IAM platforms with regular access reviews and certification
      campaigns. Implement endpoint security (EDR/XDR) across all managed
      devices. Conduct regular vulnerability scanning and penetration testing.
      Manage physical security controls including access control systems,
      surveillance, and visitor management. Track operational security metrics
      and report to management.
    tools:
      - "SIEM (Splunk, Elastic Security, Microsoft Sentinel)"
      - "IAM (Okta, Azure AD, CyberArk)"
      - "EDR/XDR (CrowdStrike, SentinelOne, Microsoft Defender)"
      - "Vulnerability Management (Qualys, Tenable, Rapid7)"
      - "Physical Access Control Systems"
