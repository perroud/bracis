id: cobit-2019
title: "COBIT 2019 — Control Objectives for Information and Related Technologies"
short_title: "COBIT 2019"
version: "2019"
publication_date: "2018-11-12"
last_updated: "2019-06-01"
authority:
  name: "ISACA (Information Systems Audit and Control Association)"
  acronym: "ISACA"
  country: "INTL"
  url: "https://www.isaca.org/resources/cobit"
type: standard
scope: risk-management
mandatory: false
original_language: en
available_languages: [en, pt-br, es, de, fr, ja, zh]
