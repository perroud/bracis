  - gitops
capability_levels:
  - id: 0
    title: "Incomplete"
    description: >-
      The process is not implemented or fails to achieve its process purpose. At this level,
      there is little or no evidence of any systematic achievement of the process purpose.
  - id: 1
    title: "Performed"
    description: >-
      The implemented process achieves its process purpose. The process is performed
      but may not be well managed. There is evidence that the process purpose is being achieved.
  - id: 2
    title: "Managed"
    description: >-
      The performed process is implemented in a managed fashion (planned, monitored, and
      adjusted), and its work products are appropriately established, controlled, and maintained.
  - id: 3
    title: "Established"
    description: >-
      The managed process is implemented using a defined process that is capable of
      achieving its process outcomes. Standardized processes are in place and consistently applied.
  - id: 4
    title: "Predictable"
    description: >-
      The established process now operates within defined limits to achieve its process
      outcomes. Quantitative management needs are identified, measurement data are collected
      and analyzed, and corrective action is taken.
  - id: 5
    title: "Optimizing"
    description: >-
      The predictable process is continuously improved to meet relevant current and
      projected business goals. Optimization targets are established and continuously refined.
control_families:
  - id: edm
    title: "Evaluate, Direct and Monitor"
    category: governance
    domain: governance
    control_count: 5
    description: >-
      Governance objectives ensuring that stakeholder needs, conditions, and options are
      evaluated to determine balanced, agreed-on enterprise objectives; setting direction
      through prioritization and decision making; and monitoring performance and compliance.
  - id: apo
    title: "Align, Plan and Organize"
    category: management
    domain: management
    control_count: 14
    description: >-
      Management objectives addressing the overall organization, strategy, and supporting
      activities for I&T. Covers I&T management framework, strategy, enterprise architecture,
      innovation, portfolio, budget, human resources, relationships, service agreements,
      vendors, quality, risk, security, and data management.
  - id: bai
    title: "Build, Acquire and Implement"
    category: management
    domain: management
    control_count: 11
    description: >-
      Management objectives covering the definition, acquisition, and implementation of I&T
      solutions and their integration into business processes. Covers programs, requirements,
      solutions identification, availability, organizational change, IT changes, IT change
      acceptance, knowledge, assets, and configuration management.
  - id: dss
    title: "Deliver, Service and Support"
    category: management
    domain: management
    control_count: 6
    description: >-
      Management objectives addressing the operational delivery and support of I&T services,
      including security. Covers operations, service requests and incidents, problems,
      continuity, security services, and business process controls.
  - id: mea
    title: "Monitor, Evaluate and Assess"
    category: management
    domain: management
    control_count: 4
    description: >-
      Management objectives covering performance monitoring, internal control assessment,
      compliance with external requirements, and assurance activities. Provides feedback
      to governance and management on performance against targets.
related_frameworks:
  - framework_id: iso-27001-2022
    relationship: mapped
    mapping_file: "mappings/cobit-2019_to_iso-27001-2022.yaml"
    description: "COBIT 2019 management objectives map to ISO 27001 Annex A controls, particularly APO13 and DSS05"
  - framework_id: nist-800-53-rev5
    relationship: mapped
    mapping_file: "mappings/cobit-2019_to_nist-800-53-rev5.yaml"
    description: "COBIT 2019 objectives map to NIST 800-53 control families across all domains"
  - framework_id: soc2
    relationship: mapped
    mapping_file: "mappings/cobit-2019_to_soc2.yaml"
    description: "COBIT 2019 governance and management objectives provide the framework context for SOC 2 trust services criteria"
  - framework_id: sox
    relationship: complements
    description: "COBIT 2019 provides the IT governance framework commonly used to support SOX Section 404 compliance for IT general controls"
