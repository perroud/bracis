id: art-2
family: cap-1
title: "Definicoes"
class: R-CIBER
baselines: [telecom-all]
statement:
  prose: |
    Art. 2. Para os fins deste Regulamento, considera-se:

    I - Segurança Cibernética: conjunto de medidas técnicas, operacionais e
    administrativas destinadas a prevenir, detectar, responder e recuperar
    sistemas de informação, redes de telecomunicações e dados de ataques,
    comprometimentos e interrupções de origem cibernética;

    II - Incidente de Segurança Cibernética: evento ou série de eventos
    adversos confirmados que comprometam a disponibilidade, integridade ou
    confidencialidade das redes, sistemas ou serviços de telecomunicações;

    III - Ameaça Cibernética: qualquer circunstância ou evento com potencial
    para comprometer a segurança cibernética das redes e serviços de
    telecomunicações por meio de acesso não autorizado, destruição, divulgação,
    modificação de informações ou negação de serviço;

    IV - Vulnerabilidade: fraqueza em um sistema de informação, procedimento
    de segurança, controle interno ou implementação que possa ser explorada
    por uma ameaça cibernética;

    V - Infraestrutura Crítica de Telecomunicações: elementos de rede,
    instalações, sistemas e serviços essenciais cuja interrupção ou destruição
    teria impacto grave na prestação de serviços de telecomunicações para
    a população ou para órgãos essenciais do Estado.
guidance:
  prose: |
    O art. 2 estabelece o glossario normativo do R-Ciber. As definicoes
    aqui presentes devem ser adotadas pelas prestadoras em seus documentos
    internos de politica e procedimentos de seguranca cibernetica.

    **Alinhamento terminologico:**
    As definicoes do R-Ciber alinham-se com o vocabulario do:
    - NIST Cybersecurity Framework (CSF) 2.0
    - ISO/IEC 27000:2018 (Information security management -- Overview and vocabulary)
    - ABNT NBR ISO/IEC 27001:2022

    **Incidente vs. evento:**
    O R-Ciber diferencia "incidente" (evento confirmado e adverso) de
    "evento" (ocorrencia que pode ou nao ser adversa). Esta distincao e
    fundamental para os processos de notificacao obrigatoria a ANATEL.

    **Infraestrutura Critica:**
    A classificacao de elementos de rede como "criticos" e responsabilidade
    de cada prestadora, com base em criterios de impacto. A ANATEL pode
    publicar orientacoes adicionais sobre criterios de classificacao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Taxonomia e classificacao padronizada:**
      1. Implementar taxonomia de incidentes alinhada as definicoes do R-Ciber
         no sistema de gestao de eventos (SIEM/SOAR).
      2. Criar categorias de ativos de infraestrutura critica no CMDB
         conforme definicao do art. 2, inciso V.
      3. Automatizar classificacao de eventos como incidentes com base em
         criterios de impacto em disponibilidade, integridade e confidencialidade.
      4. Manter dicionario de dados centralizado com as definicoes do R-Ciber
         integrado a plataformas de documentacao (Wiki, Confluence).
    tools:
      - siem
      - cmdb
      - soar
      - wiki
  devsecops:
    prose: |
      **Classificacao de seguranca no ciclo de desenvolvimento:**
      1. Incorporar definicoes do R-Ciber nos templates de classificacao
         de severidade de vulnerabilidades (Critical/High/Medium/Low).
      2. Alinhar definicao de "vulnerabilidade" do R-Ciber com criterios
         do CVSSv3 utilizados no pipeline de gerenciamento de vulnerabilidades.
      3. Documentar em runbooks a diferenca entre evento de seguranca,
         incidente confirmado e ameaca, orientando times de desenvolvimento.
    tools:
      - vulnerability-scanner
      - cvss-calculator
      - security-runbooks
  secops:
    prose: |
      **Operacionalizacao das definicoes:**
      1. Treinar equipes de SOC nas definicoes do R-Ciber para garantir
         classificacao correta de incidentes e ativacao dos fluxos de
         notificacao a ANATEL.
      2. Criar playbook de triagem que aplica as definicoes do art. 2
         para determinar se um evento se qualifica como incidente de
         seguranca cibernetica sujeito a notificacao regulatoria.
      3. Definir criterios objetivos de classificacao de elementos de
         rede como Infraestrutura Critica e submeter a aprovacao da
         diretoria de seguranca.
    tools:
      - soar
      - ticketing-system
      - soc-playbooks
