id: art-3
family: cap-1
title: "Responsabilidade das Prestadoras e Principio da Proporcionalidade"
class: R-CIBER
baselines: [telecom-all]
statement:
  prose: |
    Art. 3. As prestadoras de serviços de telecomunicações são responsáveis
    pela segurança cibernética de suas redes, sistemas e serviços, devendo
    adotar medidas técnicas e organizacionais adequadas e proporcionais ao
    nível de risco identificado, ao porte da prestadora e à criticidade dos
    serviços prestados.

    Parágrafo 1. A responsabilidade pela segurança cibernética não é
    transferida a terceiros em caso de terceirização de serviços ou
    utilização de fornecedores externos, permanecendo a prestadora como
    responsável perante a ANATEL.

    Parágrafo 2. Prestadoras de pequeno porte, conforme critérios definidos
    pela ANATEL, poderão adotar medidas simplificadas, desde que documentem
    a proporcionalidade das medidas adotadas em relação ao risco identificado.
guidance:
  prose: |
    O art. 3 estabelece o principio da responsabilidade indelegavel e
    o criterio de proporcionalidade, dois pilares fundamentais do R-Ciber.

    **Responsabilidade indelegavel:**
    Mesmo que uma prestadora terceirize sua infraestrutura de TI/telecomunicacoes
    para fornecedores (cloud providers, data centers, NOCs terceirizados),
    a responsabilidade regulatoria perante a ANATEL permanece exclusivamente
    com a prestadora autorizada.

    **Criterio de proporcionalidade:**
    As medidas de seguranca devem ser calibradas em funcao de:
    - Nivel de risco identificado na avaliacao de riscos
    - Porte da prestadora (numero de usuarios, receita, abrangencia geografica)
    - Criticidade dos servicos (essencialidade para populacao e Estado)

    **Gestao de terceiros:**
    A prestadora deve incluir requisitos de seguranca cibernetica em
    contratos com fornecedores e realizar due diligence periodica
    sobre as praticas de seguranca dos mesmos.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de responsabilidade em ambiente multi-fornecedor:**
      1. Implementar modelo RACI de seguranca cibernetica que documente
         claramente a responsabilidade da prestadora versus fornecedores
         terceirizados (cloud, NOC, OSS/BSS).
      2. Automatizar controles de seguranca em ambientes multi-cloud
         e terceirizados via policy-as-code (OPA, Kyverno) garantindo
         que a prestadora mantenha visibilidade e controle.
      3. Implementar solucao de Cloud Security Posture Management (CSPM)
         que monitore conformidade em ambientes gerenciados por terceiros.
      4. Criar inventario de fornecedores criticos com classificacao de
         risco e nivel de acesso a infraestrutura de telecomunicacoes.
    tools:
      - opa-gatekeeper
      - kyverno
      - cspm
      - vendor-management
  devsecops:
    prose: |
      **Controles de seguranca em cadeia de fornecimento de software:**
      1. Implementar SBOM (Software Bill of Materials) para todos os
         sistemas criticos de telecomunicacoes, incluindo componentes
         de terceiros.
      2. Exigir analise de composicao de software (SCA) em pipelines
         CI/CD para identificar vulnerabilidades em dependencias de
         fornecedores.
      3. Verificar integridade de artefatos de software entregues por
         terceiros via assinatura digital e checksums.
      4. Definir requisitos minimos de seguranca no ciclo de desenvolvimento
         exigidos de fornecedores de software para sistemas em escopo do R-Ciber.
    tools:
      - sbom-generator
      - dependency-scanning
      - sigstore
      - supply-chain-security
  secops:
    prose: |
      **Programa de gestao de risco de terceiros:**
      1. Implementar processo formal de avaliacao de seguranca de fornecedores
         (vendor security assessment) antes da contratacao e anualmente.
      2. Incluir clausulas contratuais especificas de seguranca cibernetica
         alinhadas ao R-Ciber em todos os contratos com fornecedores de
         sistemas criticos de telecomunicacoes.
      3. Monitorar continuamente o desempenho de seguranca de fornecedores
         criticos via ratings de seguranca externos e auditorias internas.
      4. Definir plano de contingencia para substituicao de fornecedores
         criticos em caso de comprometimento de seguranca.
    tools:
      - vendor-risk-management
      - contract-management
      - security-rating
      - third-party-audit
