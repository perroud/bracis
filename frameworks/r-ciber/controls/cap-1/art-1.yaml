id: art-1
family: cap-1
title: "Objeto e Ambito de Aplicacao"
class: R-CIBER
baselines: [telecom-all]
statement:
  prose: |
    Art. 1. Este Regulamento estabelece obrigações de segurança cibernética
    aplicáveis às prestadoras de serviços de telecomunicações, com o objetivo
    de assegurar a disponibilidade, a integridade e a confidencialidade das
    redes e serviços de telecomunicações no território nacional.

    Parágrafo único. As disposições deste Regulamento aplicam-se a todas as
    prestadoras de serviços de telecomunicações autorizadas ou concessionadas
    pela ANATEL, incluindo prestadoras de serviço móvel pessoal, serviço
    telefônico fixo comutado, serviço de comunicação multimídia, serviço de
    acesso condicionado e satélites.
guidance:
  prose: |
    O art. 1 delimita o escopo do R-Ciber como o instrumento regulatorio
    central da ANATEL para seguranca cibernetica no setor de telecomunicacoes.

    **Prestadoras abrangidas:**
    - SMP (Servico Movel Pessoal): operadoras de telefonia celular
    - STFC (Servico Telefonico Fixo Comutado): telefonia fixa
    - SCM (Servico de Comunicacao Multimidia): provedores de banda larga fixa
    - SeAC (Servico de Acesso Condicionado): TV por assinatura com internet
    - Satelites: operadoras de capacidade satelital e servicos associados

    **Criterio de aplicabilidade:**
    Toda entidade que detenha autorizacao ou concessao da ANATEL para
    prestacao de servicos de telecomunicacoes esta sujeita ao R-Ciber,
    independentemente de porte ou segmento de mercado.

    **Consolidacao com Resolucao 767/2024:**
    A Resolucao ANATEL 767/2024 atualizou e consolidou o R-Ciber original
    (Resolucao 740/2020), incorporando requisitos adicionais relacionados
    a tecnologias 5G e seguranca da cadeia de fornecimento.
implementation_guidance:
  platform_engineering:
    prose: |
      **Inventario e classificacao de sistemas em escopo:**
      1. Catalogar todos os sistemas, plataformas e componentes de rede
         que suportam servicos de telecomunicacoes autorizados pela ANATEL.
      2. Implementar registro automatico de ativos com metadados de
         classificacao (criticidade, servico associado, tipo de dado processado).
      3. Manter mapa de dependencias entre componentes de infraestrutura
         e os servicos de telecomunicacoes que suportam.
      4. Definir politica de compliance como codigo (OPA/Kyverno) que
         identifica automaticamente recursos em escopo do R-Ciber.
    tools:
      - cmdb
      - opa-gatekeeper
      - kyverno
      - asset-discovery
  devsecops:
    prose: |
      **Pipeline de conformidade regulatoria:**
      1. Criar label/tag de repositorios que identifique sistemas em escopo
         do R-Ciber para aplicacao de pipeline especializado.
      2. Implementar gate de conformidade no CI/CD que verifica se novos
         componentes atendem requisitos do R-Ciber antes de ir para producao.
      3. Documentar no pipeline quais controles do R-Ciber cada componente
         deve satisfazer.
    tools:
      - gitlab-ci
      - compliance-pipeline
      - policy-as-code
  secops:
    prose: |
      **Governanca de conformidade com ANATEL:**
      1. Designar responsavel interno pelo programa de conformidade R-Ciber
         (equivalente ao CISO ou gestor de seguranca cibernetica).
      2. Criar registro formal de todos os servicos de telecomunicacoes
         prestados e suas respectivas autorizacoes ANATEL.
      3. Mapear controles implementados versus exigencias do R-Ciber
         em matriz de conformidade atualizada trimestralmente.
      4. Estabelecer canal de comunicacao direto com a ANATEL para
         notificacoes e consultas regulatorias.
    tools:
      - grc-platform
      - regulatory-tracking
      - compliance-dashboard
legal_references:
