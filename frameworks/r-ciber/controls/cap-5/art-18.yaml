id: art-18
family: cap-5
title: "Classificacao e Protecao de Infraestrutura Critica de Telecomunicacoes"
class: R-CIBER
baselines: [telecom-all]
statement:
  prose: |
    Art. 18. As prestadoras devem identificar e classificar os elementos
    de suas redes como Infraestrutura Crítica de Telecomunicações (ICT)
    com base em critérios de impacto, incluindo:

    I - elementos cuja falha ou comprometimento causaria interrupção
    de serviços de telecomunicações para mais de 100.000 (cem mil)
    usuários simultaneamente;

    II - elementos de rede que suportam direta ou indiretamente serviços
    de comunicação de segurança pública e emergências (PPDR);

    III - nós de interconexão nacional e pontos de troca de tráfego
    (PTT/IXP) que concentram tráfego significativo de internet no país;

    IV - sistemas de gestão e controle (NMS/EMS) que administram
    infraestrutura classificada nos incisos anteriores.

    Parágrafo único. A lista de elementos classificados como ICT deve
    ser documentada, atualizada semestralmente e mantida em caráter
    confidencial, sendo disponibilizada à ANATEL quando solicitado.
guidance:
  prose: |
    O art. 18 cria obrigacao de classificacao formal de ICT com criterios
    objetivos, especialmente o limiar de 100.000 usuarios (inciso I).

    **Criterio de 100.000 usuarios:**
    Este limiar e absoluto, nao proporcional ao porte da prestadora.
    Elementos de core de rede de operadoras de grande porte
    frequentemente excederam este limiar significativamente.

    **Servicos PPDR (inciso II):**
    Public Protection and Disaster Relief -- sistemas de comunicacao
    de policia, bombeiros, SAMU, Defesa Civil. Qualquer elemento que
    suporte estes servicos e automaticamente ICT.

    **Confidencialidade da lista (paragrafo unico):**
    A lista de ICT e informacao sensivel -- sua exposicao pode
    facilitar ataques direcionados. Deve ser classificada como
    confidencial ou restrita, com acesso controlado.

    **Implicacoes praticas:**
    Elementos classificados como ICT estao sujeitos a requisitos
    adicionais previstos nos art. 19-21 do R-Ciber (controles
    fisicos, logicos e de rastreabilidade aprimorados).
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de ICT como codigo:**
      1. Criar metadados de classificacao ICT no CMDB para todos os
         elementos de rede, com campos: criticidade-nct, usuarios-impactados,
         suporta-ppdr, tipo-elemento.
      2. Automatizar calculo do numero de usuarios afetados por falha
         de cada elemento de rede, usando dados de topologia e capacidade.
      3. Implementar controles de acesso mais restritivos (no CMDB e
         nos sistemas de gestao) para elementos classificados como ICT.
      4. Gerar automaticamente relatorio semestral de ICT a partir do
         CMDB para revisao e aprovacao do responsavel de seguranca.
    tools:
      - cmdb
      - topology-mapping
      - access-controls
      - reporting-automation
  devsecops:
    prose: |
      **Rastreabilidade de mudancas em ICT:**
      1. Implementar processo de change management mais rigoroso para
         elementos ICT: aprovacoes adicionais, janelas de manutencao
         reduzidas e maior periodo de monitoramento pos-mudanca.
      2. Exigir revisao de seguranca obrigatoria para qualquer alteracao
         de configuracao em elementos classificados como ICT.
      3. Manter historico imutavel de todas as mudancas em ICT com
         rastreabilidade completa de quem, quando e o que foi alterado.
      4. Bloquear mudancas automatizadas (drift correction) em ICT
         sem aprovacao humana explicita.
    tools:
      - change-management
      - iac-drift-detection
      - audit-trail
      - approval-workflow
  secops:
    prose: |
      **Programa de protecao de ICT:**
      1. Realizar avaliacao de risco especifica para cada elemento de
         ICT anualmente, com foco em ameacas avancadas e persistentes.
      2. Implementar monitoramento de seguranca intensificado (24x7
         com SLA de resposta mais agressivo) para todos os elementos ICT.
      3. Manter lista de ICT atualizada semestralmente com aprovacao
         formal, controle de versao e registro de acessos a lista.
      4. Compartilhar lista de ICT com ANATEL mediante solicitacao
         formal, atraves de canal seguro e com registro de divulgacao.
    tools:
      - risk-assessment
      - soc-monitoring
      - document-management
      - secure-sharing
