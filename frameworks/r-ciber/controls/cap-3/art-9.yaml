id: art-9
family: cap-3
title: "Aprovacao e Vigencia da Politica de Seguranca Cibernetica"
class: R-CIBER
baselines: [telecom-all]
statement:
  prose: |
    Art. 9. A Política de Segurança Cibernética deve ser:

    I - aprovada pela alta administração da prestadora, com registro
    formal de aprovação e data de vigência;

    II - comunicada a todos os colaboradores, prestadores de serviços
    e fornecedores que tenham acesso a redes, sistemas ou dados de
    telecomunicações da prestadora;

    III - disponibilizada em formato acessível a todos os destinatários,
    em linguagem clara e objetiva;

    IV - revisada e atualizada, no mínimo, a cada 2 (dois) anos ou
    sempre que ocorrer mudança significativa no ambiente operacional,
    tecnológico ou regulatório.
guidance:
  prose: |
    O art. 9 regula o ciclo de vida formal da PSC, desde a aprovacao
    ate a revisao periodica.

    **Alta administracao (inciso I):**
    O R-Ciber exige aprovacao da "alta administracao". Para prestadoras
    com conselho de administracao, recomenda-se aprovacao ou ciencia
    do conselho. No minimo, a diretoria executiva deve aprovar formalmente.

    **Comunicacao (incisos II e III):**
    Nao basta elaborar a PSC -- ela deve ser ativamente comunicada.
    Fornecedores com acesso a sistemas criticos tambem devem receber
    e reconhecer a PSC ou seus requisitos aplicaveis.

    **Ciclo de revisao de 2 anos (inciso IV):**
    O prazo de 2 anos e o maximo. Mudancas regulatorias (como a
    propria Resolucao 767/2024 consolidando o R-Ciber) e incidentes
    relevantes justificam revisao antecipada.
implementation_guidance:
  platform_engineering:
    prose: |
      **Versionamento e distribuicao da PSC:**
      1. Gerenciar versoes da PSC em repositorio Git com tags de
         versao e changelog documentado para rastreabilidade de
         evolucao regulatoria.
      2. Automatizar distribuicao de novas versoes da PSC para
         todos os stakeholders via plataforma de gerenciamento
         de documentos (ServiceNow, Confluence).
      3. Implementar mecanismo de confirmacao de leitura (e-signature
         ou portal de aceite) para garantir rastreabilidade de
         comunicacao da PSC.
    tools:
      - git
      - document-management
      - e-signature
      - workflow-automation
  devsecops:
    prose: |
      **Integracao da PSC no pipeline:**
      1. Automatizar verificacao de que a versao mais recente da PSC
         foi aceita por responsaveis tecnicos de sistemas em escopo
         antes de releases de producao criticos.
      2. Manter rastreabilidade entre versao da PSC e versao dos
         controles tecnicos implementados nos pipelines de CI/CD.
      3. Notificar automaticamente times de desenvolvimento quando
         uma nova versao da PSC for aprovada e disponibilizada.
    tools:
      - gitlab-ci
      - compliance-tracking
      - notification-system
  secops:
    prose: |
      **Governanca do ciclo de vida da PSC:**
      1. Implementar calendario de revisao formal da PSC com pelo
         menos 6 meses de antecedencia ao prazo bienal.
      2. Monitorar mudancas regulatorias da ANATEL e do setor para
         identificar necessidade de revisao antecipada da PSC.
      3. Registrar e arquivar todas as versoes aprovadas da PSC
         com evidencia de aprovacao da alta administracao por
         pelo menos 5 anos (prazo de prescricao de sancoes ANATEL).
      4. Relatar status de conformidade com a PSC em relatorio
         anual para a alta direcao.
    tools:
      - grc-platform
      - regulatory-monitoring
      - document-archive
      - board-reporting
