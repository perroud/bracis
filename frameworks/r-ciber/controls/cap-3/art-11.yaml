id: art-11
family: cap-3
title: "Seguranca na Aquisicao e Contratacao de Tecnologia de Telecomunicacoes"
class: R-CIBER
baselines: [telecom-all]
statement:
  prose: |
    Art. 11. As prestadoras devem incluir requisitos de segurança cibernética
    nos processos de aquisição e contratação de equipamentos, sistemas e
    serviços de tecnologia utilizados em redes de telecomunicações, incluindo:

    I - avaliação de segurança cibernética como critério de seleção de
    fornecedores de equipamentos e sistemas críticos de telecomunicações;

    II - exigência de declaração de conformidade do fornecedor com os
    requisitos de segurança definidos pela prestadora;

    III - cláusulas contratuais de segurança cibernética que estabeleçam
    obrigações, responsabilidades e penalidades em caso de incidentes
    causados por vulnerabilidades do fornecedor;

    IV - processo de homologação técnica de segurança de equipamentos e
    sistemas antes da implantação em redes de produção;

    V - monitoramento contínuo da postura de segurança dos fornecedores
    de sistemas e equipamentos críticos.
guidance:
  prose: |
    O art. 11 estabelece requisitos de seguranca na cadeia de fornecimento
    de telecomunicacoes, area de risco crescente dada a dependencia de
    fornecedores internacionais de equipamentos de rede (Ericsson, Nokia,
    Huawei, ZTE, Cisco, entre outros).

    **Avaliacao de fornecedores (inciso I):**
    Para equipamentos de rede criticos (gNB, eNodeB, roteadores de core,
    switches de transporte), a avaliacao deve incluir:
    - Analise de vulnerabilidades conhecidas e historico de CVEs
    - Praticas de PSIRT (Product Security Incident Response Team)
    - Processo de atualizacoes de seguranca (firmware, patches)
    - Transparencia sobre componentes de software (SBOM)

    **Homologacao tecnica (inciso IV):**
    Antes de implantar qualquer equipamento ou sistema em rede de
    producao, a prestadora deve realizar testes de seguranca para
    verificar conformidade com seus requisitos internos e com o R-Ciber.

    **Contexto 5G:**
    A Resolucao 767/2024 reforca especialmente os requisitos de seguranca
    da cadeia de fornecimento para equipamentos 5G, dado o impacto
    estrategico das redes de quinta geracao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de seguranca da cadeia de fornecimento:**
      1. Implementar repositorio de SBOMs (Software Bill of Materials)
         de todos os equipamentos e sistemas de telecomunicacoes, exigido
         de fornecedores como condicao de contratacao.
      2. Integrar feeds de CVEs de fabricantes de equipamentos de rede
         (Ericsson PSIRT, Nokia Security Advisories, Cisco PSIRT)
         ao processo de gestao de vulnerabilidades da prestadora.
      3. Automatizar verificacao de integridade de firmware de
         equipamentos via assinaturas digitais do fabricante.
      4. Criar ambiente de homologacao de seguranca isolado para
         teste de novos equipamentos e sistemas antes da implantacao.
    tools:
      - sbom-management
      - vulnerability-feed
      - integrity-verification
      - lab-environment
  devsecops:
    prose: |
      **Seguranca em integracao de sistemas de terceiros:**
      1. Implementar processo de security review obrigatorio antes de
         integrar APIs ou sistemas de fornecedores a plataformas
         OSS/BSS da prestadora.
      2. Realizar analise de composicao de software (SCA) em
         componentes fornecidos por terceiros que sejam incorporados
         aos sistemas da prestadora.
      3. Exigir acesso ao codigo-fonte ou relatorio de analise estatica
         (SAST) de fornecedores de software critico para sistemas
         de telecomunicacoes.
      4. Implementar ambiente de sandbox para teste de integracao
         com sistemas de terceiros antes de producao.
    tools:
      - sca-scanning
      - sast-tools
      - sandbox-environment
      - api-security-testing
  secops:
    prose: |
      **Programa de gestao de risco de fornecedores:**
      1. Manter registro de todos os fornecedores criticos de
         equipamentos e sistemas com classificacao de risco,
         revisada anualmente.
      2. Realizar due diligence de seguranca (questionario, auditoria
         ou certificacao de terceiro) antes de contratar e anualmente.
      3. Monitorar continuamente noticias e alertas sobre vulnerabilidades
         e incidentes de seguranca envolvendo fornecedores criticos.
      4. Definir processo de gestao de crise para resposta a
         vulnerabilidades criticas descobertas em equipamentos de
         fornecedores ja implantados na rede.
    tools:
      - vendor-risk-management
      - security-rating
      - threat-intelligence
      - crisis-management
