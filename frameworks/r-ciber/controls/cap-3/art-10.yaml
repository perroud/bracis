id: art-10
family: cap-3
title: "Programa de Conscientizacao e Treinamento em Seguranca Cibernetica"
class: R-CIBER
baselines: [telecom-all]
statement:
  prose: |
    Art. 10. As prestadoras devem implementar programa permanente de
    conscientização e treinamento em segurança cibernética que abranja:

    I - treinamento de integração sobre segurança cibernética para todos
    os novos colaboradores e prestadores de serviços antes do início das
    atividades;

    II - treinamento periódico de reciclagem, com frequência mínima anual,
    para todos os colaboradores com acesso a redes e sistemas de
    telecomunicações;

    III - treinamento especializado para equipes técnicas responsáveis por
    operação, manutenção e desenvolvimento de redes e sistemas de
    telecomunicações;

    IV - treinamento específico para a alta administração sobre riscos
    cibernéticos, obrigações regulatórias e responsabilidades;

    V - exercícios práticos e simulações de incidentes de segurança
    cibernética para equipes de resposta.
guidance:
  prose: |
    O art. 10 exige um programa estruturado e continuo de conscientizacao,
    reconhecendo que o fator humano e frequentemente o vetor de ataque
    mais explorado.

    **Treinamento por publico (incisos I a IV):**
    O R-Ciber diferencia audiencias:
    - Todos os colaboradores: higiene basica de seguranca, phishing,
      senhas, uso aceitavel
    - Equipes tecnicas: hardening, resposta a incidentes, seguranca de rede
    - Alta administracao: riscos ciberneticos e obrigacoes regulatorias

    **Exercicios praticos (inciso V):**
    Simulacoes sao essenciais para testar a eficacia do treinamento.
    Para telecomunicacoes, exercicios devem incluir cenarios especificos
    como: ataque de ransomware em OSS/BSS, comprometimento de elemento
    de rede critico, vazamento de dados de usuarios, fraude em rede.

    **Evidencias para auditoria:**
    Manter registros de: participantes, datas, conteudo, resultados de
    avaliacoes e assinaturas de confirmacao de participacao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de treinamento e gestao de conhecimento:**
      1. Implementar LMS (Learning Management System) com trilhas
         de treinamento especificas por perfil funcional (tecnico,
         operacional, gerencial).
      2. Automatizar matricula de novos colaboradores no treinamento
         de integracao de seguranca via integracao com sistema de RH.
      3. Integrar plataforma de treinamento com IAM para bloquear
         acesso a sistemas criticos de colaboradores com treinamentos
         obrigatorios pendentes.
      4. Simular ataques de phishing periodicamente e usar resultados
         para personalizar conteudo de treinamento.
    tools:
      - lms
      - hr-integration
      - phishing-simulation
      - iam-platform
  devsecops:
    prose: |
      **Treinamento tecnico especializado:**
      1. Implementar trilha de treinamento DevSecOps especifica para
         desenvolvedores de sistemas de telecomunicacoes, cobrindo:
         OWASP Top 10, secure coding, dependency management.
      2. Realizar wargames e CTFs (Capture the Flag) internos para
         equipes tecnicas de seguranca e operacao de rede.
      3. Documentar licoes aprendidas de incidentes e incorporar em
         modulos de treinamento para disseminacao de conhecimento.
      4. Manter biblioteca de runbooks e playbooks de seguranca
         acessivel a toda equipe tecnica.
    tools:
      - security-training
      - ctf-platform
      - runbooks
      - knowledge-base
  secops:
    prose: |
      **Governanca do programa de treinamento:**
      1. Definir matriz de treinamentos obrigatorios por funcao e nivel
         hierarquico, com prazos de conclusao e frequencia de reciclagem.
      2. Monitorar taxa de conclusao de treinamentos e escalar para
         gestores quando colaboradores estao em atraso.
      3. Realizar exercicio de simulacao de incidente (tabletop exercise)
         semestral com equipe de resposta a incidentes e alta gerencia.
      4. Contratar treinamentos especializados externos (SANS, EC-Council)
         para equipes de operacao de rede e SOC.
    tools:
      - grc-platform
      - training-records
      - tabletop-facilitation
      - certification-tracking
