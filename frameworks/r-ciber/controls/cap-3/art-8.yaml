id: art-8
family: cap-3
title: "Politica de Seguranca Cibernetica -- Elaboracao e Conteudo Minimo"
class: R-CIBER
baselines: [telecom-all]
statement:
  prose: |
    Art. 8. As prestadoras de serviços de telecomunicações devem elaborar
    e manter Política de Segurança Cibernética (PSC) que contemple, no
    mínimo:

    I - objetivos e escopo do programa de segurança cibernética,
    abrangendo todas as redes, sistemas e serviços da prestadora;

    II - papéis e responsabilidades na gestão de segurança cibernética,
    incluindo a designação de responsável pela segurança cibernética
    com nível hierárquico adequado;

    III - princípios e diretrizes para identificação, avaliação e
    tratamento de riscos cibernéticos;

    IV - requisitos de segurança para aquisição, desenvolvimento,
    implantação e operação de redes e sistemas de telecomunicações;

    V - diretrizes para gestão de incidentes de segurança cibernética,
    incluindo critérios para notificação à ANATEL;

    VI - requisitos de segurança cibernética para contratação de
    fornecedores e parceiros;

    VII - programa de conscientização e treinamento de colaboradores.
guidance:
  prose: |
    O art. 8 estabelece o conteudo minimo obrigatorio da Politica de
    Seguranca Cibernetica (PSC) das prestadoras. A PSC e o documento
    de mais alto nivel do programa de seguranca cibernetica.

    **Responsavel pela seguranca cibernetica (inciso II):**
    O R-Ciber exige designacao formal de responsavel com "nivel
    hierarquico adequado". Na pratica, isso aponta para um CISO ou
    equivalente com acesso direto a alta direcao e capacidade de
    alocar recursos.

    **Criterios de notificacao a ANATEL (inciso V):**
    A PSC deve definir criterios claros e pre-aprovados para acionar
    o processo de notificacao a ANATEL, evitando ambiguidade durante
    um incidente ativo.

    **Revisao da PSC:**
    Embora o art. 8 nao defina frequencia de revisao, boas praticas
    (ISO 27001, NIST CSF) recomendam revisao anual e apos incidentes
    significativos ou mudancas regulatorias relevantes.
implementation_guidance:
  platform_engineering:
    prose: |
      **Politica como codigo:**
      1. Traduzir os requisitos da PSC em politicas tecnologicas
         implementaveis como codigo (OPA policies, Kyverno rules,
         SCPs da AWS, Azure Policies).
      2. Criar repositorio centralizado de politicas de seguranca
         versionado em Git, com processo de aprovacao via merge request.
      3. Automatizar verificacao de conformidade com a PSC em
         todos os ambientes de infraestrutura via policy engine.
      4. Implementar dashboard de conformidade com a PSC mostrando
         status de cada requisito por sistema e ambiente.
    tools:
      - opa-gatekeeper
      - kyverno
      - policy-as-code
      - compliance-dashboard
  devsecops:
    prose: |
      **Incorporacao da PSC no ciclo de desenvolvimento:**
      1. Incorporar requisitos de seguranca da PSC como criterios
         de aceite obrigatorios em historias de usuario para sistemas
         de telecomunicacoes.
      2. Implementar gate de seguranca no pipeline CI/CD que verifica
         conformidade com os requisitos tecnicos da PSC.
      3. Criar checklist de seguranca derivado da PSC para revisao
         em design reviews e code reviews.
      4. Manter rastreabilidade entre requisitos da PSC e controles
         tecnicos implementados nos sistemas.
    tools:
      - gitlab-ci
      - security-checklist
      - requirements-tracing
      - compliance-pipeline
  secops:
    prose: |
      **Governanca da PSC:**
      1. Elaborar PSC com aprovacao formal da alta direcao e CISO
         designado conforme exigido pelo inciso II.
      2. Implementar programa de conscientizacao anual que inclua
         treinamento especifico sobre a PSC para todos os colaboradores.
      3. Realizar revisao anual da PSC com participacao de areas
         de negocio, TI, juridico e compliance.
      4. Manter registro de distribuicao e confirmacao de leitura
         da PSC por colaboradores e fornecedores relevantes.
    tools:
      - grc-platform
      - awareness-training
      - document-management
      - policy-acknowledgment
