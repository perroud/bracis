id: art-15
family: cap-4
title: "Notificacao Obrigatoria de Incidentes a ANATEL"
class: R-CIBER
baselines: [telecom-all]
statement:
  prose: |
    Art. 15. As prestadoras devem notificar a ANATEL sobre incidentes de
    segurança cibernética que se enquadrem nos seguintes critérios:

    I - incidentes que causem interrupção ou degradação significativa
    de serviços de telecomunicações, afetando número relevante de usuários
    ou área geográfica expressiva;

    II - incidentes que comprometam a confidencialidade ou integridade
    de dados de usuários de telecomunicações, incluindo dados de
    localização, registros de chamadas ou dados cadastrais;

    III - incidentes que afetem a disponibilidade ou integridade de
    elementos de rede classificados como Infraestrutura Crítica de
    Telecomunicações;

    IV - incidentes que envolvam acesso não autorizado a sistemas
    de gestão de rede com potencial impacto na prestação de serviços.

    Parágrafo 1. A notificação inicial deve ser realizada em até 24 (vinte
    e quatro) horas após a confirmação do incidente, por meio de canal
    específico definido pela ANATEL.

    Parágrafo 2. A prestadora deve fornecer relatório detalhado do incidente
    em até 72 (setenta e duas) horas após a notificação inicial,
    incluindo causa raiz, impacto, medidas de contenção e plano de
    recuperação.

    Parágrafo 3. Um relatório final com a análise pós-incidente e as
    lições aprendidas deve ser encaminhado à ANATEL em até 30 (trinta)
    dias após o encerramento do incidente.
guidance:
  prose: |
    O art. 15 e o controle mais operacionalmente critico do R-Ciber,
    pois estabelece obrigacao de notificacao com prazos especificos.

    **Prazos de notificacao:**
    - 24 horas: notificacao inicial (alert) -- o incidente foi confirmado
    - 72 horas: relatorio intermediario -- causa, impacto, contencao
    - 30 dias: relatorio final -- RCA completo e licoes aprendidas

    **Canal de notificacao:**
    A ANATEL disponibiliza portal especifico para notificacao de
    incidentes de seguranca cibernetica. As prestadoras devem
    cadastrar-se previamente e testar o canal.

    **Criterio de "numero relevante de usuarios":**
    A ANATEL pode publicar orientacoes sobre limiares numericos.
    Na ausencia de criterio especifico, recomenda-se adotar
    limiares conservadores e notificar quando em duvida.

    **Relacao com LGPD:**
    Se o incidente envolver dados pessoais de usuarios, aplica-se
    tambem a obrigacao de notificacao a ANPD (art. 48 LGPD) em
    prazo razoavel. As notificacoes a ANATEL e ANPD sao independentes.
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao do processo de notificacao:**
      1. Implementar sistema de gestao de incidentes com SLA de alerta
         automatico ao responsavel de compliance quando incidente
         atingir criterios de notificacao do art. 15.
      2. Automatizar coleta de dados necessarios para o relatorio inicial
         de 24 horas: sistemas afetados, numero de usuarios impactados,
         area geografica, inicio do incidente.
      3. Criar template padronizado de notificacao a ANATEL alinhado
         aos campos exigidos pelo portal da agencia.
      4. Implementar dashboard de status de incidentes com contadores
         regressivos para prazos regulatorios (24h, 72h, 30 dias).
    tools:
      - incident-management
      - soar
      - dashboard
      - notification-automation
  devsecops:
    prose: |
      **Instrumentacao para suporte a notificacao:**
      1. Implementar metricas de impacto automaticas em sistemas
         OSS/BSS que quantifiquem usuarios afetados por incidentes
         para suporte a decisao de notificacao regulatoria.
      2. Garantir que logs de sistemas criticos estejam centralizados
         e acessiveis em tempo real para suporte a investigacoes
         durante os prazos de notificacao.
      3. Implementar rastreamento de incidentes com historico completo
         de acoes tomadas para suporte a elaboracao de relatorios
         regulatorios.
    tools:
      - observability
      - log-management
      - incident-tracking
      - impact-metrics
  secops:
    prose: |
      **Processo operacional de notificacao:**
      1. Definir matriz de decisao clara para determinar se um incidente
         atinge os criterios de notificacao do art. 15 (incisos I a IV).
      2. Designar responsavel formal pelo processo de notificacao a ANATEL
         (tipicamente o CISO ou gestor de seguranca designado).
      3. Pre-cadastrar a prestadora no portal de notificacao da ANATEL
         e testar o processo anualmente (simulacao de notificacao).
      4. Treinar o CSIRT nos prazos e conteudo dos relatorios regulatorios
         (24h, 72h, 30 dias) e incluir nos playbooks de resposta.
    tools:
      - csirt-playbooks
      - regulatory-portal
      - notification-tracking
      - compliance-calendar
