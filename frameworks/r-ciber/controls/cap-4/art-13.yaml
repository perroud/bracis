id: art-13
family: cap-4
title: "Processo de Gestao de Riscos Ciberneticos"
class: R-CIBER
baselines: [telecom-all]
statement:
  prose: |
    Art. 13. As prestadoras devem implementar processo formal e documentado
    de gestão de riscos de segurança cibernética que inclua:

    I - identificação e catalogação de ameaças e vulnerabilidades relevantes
    para redes e serviços de telecomunicações;

    II - avaliação do impacto e da probabilidade de materialização dos
    riscos identificados, com priorização baseada em critérios objetivos;

    III - definição e implementação de tratamentos de risco (mitigação,
    aceitação, transferência ou eliminação) com planos de ação documentados;

    IV - monitoramento contínuo dos riscos identificados e dos controles
    implementados para seu tratamento;

    V - revisão e atualização do processo de gestão de riscos, no mínimo,
    anualmente ou quando ocorrerem mudanças significativas no ambiente
    de ameaças ou na infraestrutura de rede.
guidance:
  prose: |
    O art. 13 exige um processo estruturado de gestao de riscos, nao
    apenas uma avaliacao pontual.

    **Ameacas especificas de telecomunicacoes:**
    - Ataques a protocolos de sinalizacao (SS7, Diameter, GTP)
    - DDoS contra infraestrutura de rede e plataformas de servico
    - Comprometimento de equipamentos de rede (supply chain attacks)
    - SIM swapping e fraudes em rede movel
    - Ataques a infraestrutura de roaming
    - Comprometimento de DNS autoritativo do operador
    - Ataques a plataformas OSS/BSS
    - Espionagem em links de transmissao

    **Criterios de avaliacao:**
    Para telecomunicacoes, o impacto deve considerar:
    - Numero de usuarios afetados e duracao da interrupcao
    - Impacto em servicos de emergencia (112/190/193)
    - Risco a infraestrutura critica que depende da rede
    - Exposicao de dados pessoais de usuarios

    **Alinhamento metodologico:**
    Aceita-se uso de metodologias reconhecidas: ISO 31000,
    NIST RMF, ENISA Telecom Risk Assessment, OCTAVE.
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao do processo de gestao de riscos:**
      1. Implementar plataforma de GRC (Governance, Risk & Compliance)
         que suporte catalogacao, avaliacao e monitoramento de riscos
         ciberneticos especificos de telecomunicacoes.
      2. Integrar feeds de threat intelligence ao processo de gestao
         de riscos para identificacao proativa de ameacas emergentes.
      3. Automatizar deteccao de mudancas na infraestrutura de rede
         que possam introduzir novos riscos e acionar reavaliacao.
      4. Implementar metricas de risco residual como parte do
         monitoramento continuo da plataforma de seguranca.
    tools:
      - grc-platform
      - threat-intelligence
      - risk-management
      - cmdb
  devsecops:
    prose: |
      **Integracao de gestao de riscos no desenvolvimento:**
      1. Implementar threat modeling obrigatorio para novos sistemas
         e alteracoes significativas em sistemas de telecomunicacoes.
      2. Automatizar identificacao de riscos em codigo via SAST, DAST
         e SCA, com mapeamento para o registro de riscos da prestadora.
      3. Definir limiares de risco aceitavel para deploy em producao,
         bloqueando releases com riscos nao tratados acima do limite.
      4. Documentar decisoes de aceitacao de risco com aprovacao
         formal do responsavel de seguranca para cada release.
    tools:
      - threat-modeling
      - sast
      - dast
      - risk-threshold
  secops:
    prose: |
      **Operacao do processo de gestao de riscos:**
      1. Nomear risk owner para cada risco identificado no registro,
         com responsabilidade clara pelo plano de tratamento.
      2. Revisar registro de riscos mensalmente no SOC para atualizar
         status de tratamento e identificar novos riscos.
      3. Realizar avaliacao de riscos anual abrangente com participacao
         de todas as areas da prestadora e aprovacao da alta direcao.
      4. Contratar servico externo de threat intelligence especializado
         em telecomunicacoes para enriquecer o processo de identificacao
         de ameacas.
    tools:
      - grc-platform
      - threat-intel
      - risk-register
      - executive-reporting
