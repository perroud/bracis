id: art-4
family: cap-2
title: "Principios de Seguranca Cibernetica"
class: R-CIBER
baselines: [telecom-all]
statement:
  prose: |
    Art. 4. A segurança cibernética das prestadoras de serviços de
    telecomunicações deve ser orientada pelos seguintes princípios:

    I - Proporcionalidade: as medidas de segurança devem ser adequadas
    ao nível de risco e ao impacto potencial dos incidentes;

    II - Integralidade: a segurança deve abranger pessoas, processos e
    tecnologias, não se limitando a controles técnicos;

    III - Continuidade: a segurança cibernética deve ser mantida de forma
    contínua, com monitoramento permanente e capacidade de resposta;

    IV - Resiliência: as redes e serviços de telecomunicações devem ser
    projetados e operados de forma a suportar e se recuperar de incidentes
    cibernéticos com mínimo impacto aos usuários;

    V - Transparência: as prestadoras devem manter registros adequados de
    suas práticas de segurança e ser transparentes com a ANATEL sobre
    incidentes e vulnerabilidades;

    VI - Melhoria contínua: as medidas de segurança devem ser periodicamente
    revisadas e aprimoradas com base em lições aprendidas, novas ameaças e
    evolução tecnológica.
guidance:
  prose: |
    O art. 4 establece os seis principios que devem nortear o programa de
    seguranca cibernetica das prestadoras. Estes principios sao a base
    para interpretacao de todos os demais artigos do R-Ciber.

    **Principio da Resiliencia (inciso IV):**
    Especialmente relevante para telecomunicacoes, pois redes de telecom
    sao infraestrutura critica nacional. A resiliencia deve ser considerada
    desde o design de rede (redundancia, failover) ate os processos de
    resposta a incidentes.

    **Principio da Melhoria Continua (inciso VI):**
    Impoe um ciclo PDCA (Plan-Do-Check-Act) para o programa de seguranca,
    similar ao exigido pela ISO 27001. Licoes aprendidas de incidentes
    proprios e do setor devem alimentar a revisao dos controles.

    **Alinhamento com frameworks internacionais:**
    - NIST CSF 2.0: funcoes Identify, Protect, Detect, Respond, Recover
    - ISO 27001: clausula 10 (Melhoria)
    - ENISA Telecom Security Guidelines
implementation_guidance:
  platform_engineering:
    prose: |
      **Resiliencia e continuidade como codigo:**
      1. Implementar arquitetura de alta disponibilidade para todos os
         componentes criticos de rede (N+1 ou superior), documentada
         em Infrastructure as Code (Terraform, Pulumi).
      2. Automatizar testes de resiliencia via Chaos Engineering
         (Chaos Monkey, LitmusChaos) em ambientes de homologacao.
      3. Implementar Health Check e alertas automaticos para todos os
         elementos de infraestrutura critica, com escalacao automatizada.
      4. Monitorar continuamente KPIs de resiliencia: MTTR, MTBF,
         disponibilidade de servico por SLA.
    tools:
      - terraform
      - chaos-engineering
      - prometheus
      - grafana
  devsecops:
    prose: |
      **Security by design nas plataformas de telecom:**
      1. Incorporar principios de seguranca cibernetica do R-Ciber como
         criterios de aceite (Definition of Done) em todas as esteiras
         de desenvolvimento de sistemas de telecomunicacoes.
      2. Implementar testes automaticos de resiliencia e seguranca em
         pipelines CI/CD antes de cada release para producao.
      3. Manter metricas de maturidade de seguranca por squad/time,
         rastreando evolucao ao longo do tempo (principio da melhoria continua).
      4. Realizar revisao trimestral de ameacas emergentes (threat intelligence)
         e atualizar controles de seguranca no pipeline conforme necessario.
    tools:
      - gitlab-ci
      - security-metrics
      - threat-modeling
      - chaos-testing
  secops:
    prose: |
      **Operacionalizacao dos principios:**
      1. Implementar programa de monitoramento continuo (24x7) de seguranca
         cibernetica alinhado ao principio da continuidade.
      2. Realizar exercicios periodicos de resposta a incidentes (tabletop,
         simulacoes) para testar e aprimorar a resiliencia operacional.
      3. Manter programa de melhoria continua baseado em:
         - Analise pos-incidente (APR/RCA)
         - Benchmarking com o setor de telecomunicacoes
         - Atualizacoes de threat intelligence
      4. Documentar e reportar indicadores de desempenho de seguranca
         para alta direcao semestralmente.
    tools:
      - soc-platform
      - threat-intelligence
      - incident-response
      - kpi-dashboard
