id: art-5
family: cap-2
title: "Gestao de Ativos e Inventario de Rede"
class: R-CIBER
baselines: [telecom-all]
statement:
  prose: |
    Art. 5. As prestadoras devem manter inventário atualizado dos ativos
    que compõe suas redes e sistemas de telecomunicações, incluindo:

    I - equipamentos de rede ativos e passivos, com identificação do
    fabricante, versão de firmware e localização física;

    II - sistemas de suporte à operação e aos negócios (OSS/BSS), incluindo
    plataformas de gestão de rede e sistemas de faturamento;

    III - interfaces e protocolos de interconexão com outras prestadoras
    e com a internet;

    IV - dados de usuários armazenados e em trânsito nas redes de
    telecomunicações.

    Parágrafo único. O inventário deve ser revisado semestralmente e
    sempre que ocorrer alteração significativa na topologia de rede ou
    nos sistemas de suporte.
guidance:
  prose: |
    O art. 5 estabelece a gestao de ativos como fundamento da seguranca
    cibernetica. Voce nao pode proteger o que nao conhece -- o inventario
    e a base de todos os demais controles do R-Ciber.

    **Escopo do inventario:**
    O R-Ciber exige um inventario mais abrangente que o tipico inventario
    de TI, incluindo elementos especificos de telecomunicacoes:
    - Equipamentos de rede (roteadores, switches, gNBs, eNodeBs, MSCs)
    - Plataformas OSS/BSS (frequentemente fornecidas por terceiros)
    - Interconexoes (peering, roaming, transit)
    - Dados de usuarios (localizacao, CDRs, dados de trafego)

    **Frequencia de atualizacao:**
    O paragrafo unico exige revisao semestral, mas boas praticas
    recomendam inventario dinamico e automatizado (CMDB integrado
    ao processo de mudancas).

    **Fabricante e firmware:**
    A exigencia de identificar fabricante e firmware e especialmente
    relevante para gestao de vulnerabilidades em equipamentos de rede
    (requisito ligado ao cap. 4 e ao cap. 5 sobre infraestrutura critica).
implementation_guidance:
  platform_engineering:
    prose: |
      **Inventario automatizado de infraestrutura de telecomunicacoes:**
      1. Implementar CMDB (Configuration Management Database) integrado
         com discovery automatico de equipamentos de rede via SNMP,
         NetFlow e APIs de gestao.
      2. Automatizar deteccao de novos ativos conectados a rede de
         telecomunicacoes (Network Access Control -- NAC) e registro
         automatico no CMDB.
      3. Integrar inventario de firmware de equipamentos com feed de
         CVEs do fabricante para alertas automaticos de vulnerabilidades.
      4. Implementar Data Asset Management para catalogar bases de dados
         de usuarios (localizacao, CDRs, historico de navegacao) com
         classificacao de sensibilidade.
    tools:
      - cmdb
      - network-discovery
      - snmp-monitoring
      - data-catalog
  devsecops:
    prose: |
      **Inventario de software e dependencias:**
      1. Gerar SBOM automaticamente para todos os sistemas OSS/BSS
         e plataformas de telecomunicacoes desenvolvidas internamente.
      2. Manter registro versionado de todas as dependencias de software
         com rastreabilidade de versao e historico de vulnerabilidades.
      3. Integrar inventario de software ao pipeline CI/CD para
         atualizacao automatica a cada deploy.
      4. Alertar automaticamente quando dependencias atingirem
         status EOL (End of Life) ou apresentarem CVEs criticos.
    tools:
      - sbom-generator
      - dependency-track
      - gitlab-ci
      - vulnerability-scanning
  secops:
    prose: |
      **Governanca do inventario:**
      1. Designar owner de cada ativo de rede critico responsavel
         pela manutencao das informacoes no CMDB.
      2. Implementar processo de Change Management que garanta
         atualizacao do inventario em toda alteracao de rede.
      3. Realizar auditoria semestral de inventario conforme exigido
         pelo paragrafo unico, com relatorio documentado.
      4. Cruzar inventario de ativos com registros de autorizacao ANATEL
         para garantir que todos os equipamentos em operacao estao
         devidamente autorizados.
    tools:
      - change-management
      - cmdb
      - audit-management
      - asset-tracking
