id: art-22
family: cap-6
title: "Compartilhamento de Informacoes sobre Ameacas Ciberneticas"
class: R-CIBER
baselines: [telecom-all]
statement:
  prose: |
    Art. 22. As prestadoras de serviços de telecomunicações são encorajadas
    a participar de mecanismos de compartilhamento de informações sobre
    ameaças cibernéticas relevantes para o setor, podendo incluir:

    I - participação em grupos de compartilhamento de informações de
    segurança do setor de telecomunicações, nacionais e internacionais;

    II - troca de indicadores de comprometimento (IoCs) e informações
    sobre técnicas, táticas e procedimentos (TTPs) de atacantes com
    outras prestadoras e com o CERT.br;

    III - contribuição com informações sobre vulnerabilidades descobertas
    em equipamentos e sistemas de telecomunicações para os canais
    de divulgação responsável adequados;

    IV - participação em exercícios de segurança cibernética setoriais
    promovidos pela ANATEL ou por entidades representativas do setor.
guidance:
  prose: |
    O art. 22 adota abordagem de encorajamento (nao obrigacao) para o
    compartilhamento de informacoes sobre ameacas, reconhecendo que
    a troca de inteligencia beneficia todo o ecossistema de telecomunicacoes.

    **Por que compartilhar?**
    Ataques ciberneticos contra telecomunicacoes geralmente nao sao
    direcionados a uma unica prestadora. Ataques de DDoS, fraudes em
    roaming e exploracoes de SS7 frequentemente afetam multiplos
    operadores. Compartilhamento de IoCs permite defesa coletiva mais
    rapida.

    **Grupos de compartilhamento relevantes:**
    - ANATEL: portal de incidentes e grupos de trabalho
    - CERT.br: Centro de Estudos, Resposta e Tratamento de Incidentes
    - GSMA Fraud and Security Group (FASG)
    - i3Forum: associacao de operadores internacionais
    - ETIS: associacao de TI de operadores europeus

    **Divulgacao responsavel (inciso III):**
    Vulnerabilidades descobertas em equipamentos de rede devem ser
    reportadas ao PSIRT do fabricante antes de divulgacao publica,
    seguindo processo de Coordinated Vulnerability Disclosure (CVD).
    O CERT.br pode auxiliar na coordenacao da divulgacao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de inteligencia de ameacas:**
      1. Implementar plataforma de Threat Intelligence (MISP, OpenCTI)
         para consumo, correlacao e eventual compartilhamento de IoCs
         com comunidades do setor de telecomunicacoes.
      2. Automatizar ingestao de feeds de threat intelligence especificos
         de telecomunicacoes (GSMA, CERT.br, CISA, NCSC-UK) no SIEM.
      3. Implementar mecanismo de exportacao de IoCs em formato STIX/TAXII
         para facilitar compartilhamento padronizado com outras entidades.
      4. Configurar integracao do SOAR com plataformas de compartilhamento
         de IoCs para enriquecimento automatico de alertas.
    tools:
      - misp
      - opencti
      - taxii-server
      - threat-intel-feeds
  devsecops:
    prose: |
      **Processo de divulgacao responsavel:**
      1. Documentar e publicar politica de Vulnerability Disclosure para
         pesquisadores de seguranca que descubram vulnerabilidades em
         sistemas da prestadora.
      2. Implementar processo interno de avaliacao e report de
         vulnerabilidades descobertas em equipamentos de fornecedores
         para os PSIRTs dos fabricantes.
      3. Participar de bug bounty setorial ou plataforma coordenada
         de disclosure para sistemas publicos da prestadora.
    tools:
      - vulnerability-disclosure
      - bug-bounty
      - psirt-coordination
  secops:
    prose: |
      **Participacao ativa em comunidades de seguranca:**
      1. Designar representante tecnico para participar de grupos de
         trabalho de seguranca do setor (ANATEL, CERT.br, GSMA FASG).
      2. Estabelecer processo de triagem de IoCs recebidos para
         validacao e aplicacao automatica em controles de seguranca.
      3. Contribuir com IoCs anonimizados a grupos de compartilhamento
         de forma a proteger informacoes competitivas sensíveis.
      4. Participar de exercicios de crise setoriais promovidos pela
         ANATEL para pratica de resposta coordenada a incidentes.
    tools:
      - threat-intel-sharing
      - ioc-management
      - community-participation
      - crisis-exercises
