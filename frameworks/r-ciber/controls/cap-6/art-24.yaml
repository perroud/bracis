id: art-24
family: cap-6
title: "Cooperacao com a ANATEL e Orgaos de Seguranca"
class: R-CIBER
baselines: [telecom-all]
statement:
  prose: |
    Art. 24. As prestadoras de serviços de telecomunicações devem manter
    canais de comunicação estabelecidos com a ANATEL para temas de
    segurança cibernética, incluindo:

    I - designação formal de ponto focal de segurança cibernética com
    capacidade de comunicação direta com a ANATEL em situações de
    urgência;

    II - atendimento a solicitações de informações e documentos sobre
    práticas de segurança cibernética formuladas pela ANATEL no
    exercício de sua função fiscalizatória;

    III - participação em grupos de trabalho e consultas públicas sobre
    segurança cibernética promovidos pela ANATEL;

    IV - cooperação em investigações de incidentes de segurança que
    afetem múltiplas prestadoras ou a infraestrutura de telecomunicações
    nacional, quando solicitado pela ANATEL ou por órgãos de segurança
    competentes.
guidance:
  prose: |
    O art. 24 estabelece o framework de relacionamento institucional
    entre as prestadoras e a ANATEL no tema de seguranca cibernetica.

    **Ponto focal (inciso I):**
    O ponto focal designado deve ser uma pessoa com capacidade tecnica
    e autoridade para responder a ANATEL em situacoes de urgencia.
    Idealmente, o CISO ou responsavel de seguranca designado.

    **Funcao fiscalizatoria (inciso II):**
    A ANATEL pode solicitar documentacao de auditorias de seguranca,
    relatorios de testes de penetracao, politicas de seguranca, registros
    de incidentes e outros documentos no exercicio de sua competencia
    de fiscalizacao. As prestadoras devem atender esses pedidos.

    **Investigacoes coordenadas (inciso IV):**
    Incidentes que afetam multiplas operadoras (ex: ataque a protocolo
    SS7 que afeta roaming entre operadoras) podem requerer investigacao
    coordenada pela ANATEL com participacao de todas as afetadas.

    **Relacionamento proativo:**
    Prestadoras que mantem relacionamento proativo e transparente com
    a ANATEL tendem a ter melhor experiencia regulatoria. A cooperacao
    genuina demonstra comprometimento com a seguranca do setor.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de comunicacao com regulador:**
      1. Manter canal de comunicacao seguro e dedicado com a ANATEL
         para notificacoes e comunicacoes regulatorias de seguranca.
      2. Implementar sistema de gestao de solicitacoes regulatorias
         (ANATEL requests) com rastreamento de prazo e status de
         atendimento.
      3. Garantir disponibilidade de documentacao tecnica requerida
         pela ANATEL em formato acessivel e atualizado.
    tools:
      - regulatory-portal
      - request-management
      - document-management
  devsecops:
    prose: |
      **Preparacao para auditorias regulatorias:**
      1. Manter evidencias automaticas de controles de seguranca
         implementados (logs de scans, resultados de testes, registros
         de conformidade) prontas para apresentacao regulatoria.
      2. Implementar exportacao de dados de seguranca em formatos
         padronizados para facilitar atendimento a solicitacoes da ANATEL.
      3. Documentar claramente a implementacao de cada controle
         do R-Ciber com evidencias rastreáveis.
    tools:
      - evidence-management
      - compliance-reporting
      - audit-support
  secops:
    prose: |
      **Governanca do relacionamento regulatorio:**
      1. Registrar formalmente o ponto focal de seguranca cibernetica
         junto a ANATEL com dados de contato atualizados.
      2. Estabelecer processo interno de atendimento a solicitacoes
         regulatorias com prazo maximo de resposta e escalonamento.
      3. Participar ativamente de consultas publicas e grupos de trabalho
         da ANATEL sobre seguranca cibernetica para influenciar positivamente
         o ambiente regulatorio.
      4. Realizar reunioes periodicas proativas com a area de
         fiscalizacao da ANATEL para atualizacao sobre programa
         de seguranca cibernetica da prestadora.
    tools:
      - regulatory-crm
      - communication-management
      - meeting-records
