id: art-25
family: cap-6
title: "Sancoes, Fiscalizacao e Disposicoes Finais"
class: R-CIBER
baselines: [telecom-all]
statement:
  prose: |
    Art. 25. O descumprimento das obrigações estabelecidas neste Regulamento
    sujeita as prestadoras às sanções previstas na legislação de
    telecomunicações, incluindo:

    I - advertência, com determinação de prazo para correção da
    irregularidade;

    II - multa, nos termos do art. 173 da Lei 9.472/1997 (Lei Geral
    de Telecomunicações -- LGT), de até R$ 50.000.000,00 (cinquenta
    milhões de reais) por infração;

    III - suspensão temporária de serviços, em caso de risco iminente
    à infraestrutura crítica nacional ou à segurança dos usuários;

    IV - caducidade da autorização ou concessão, nos casos de
    descumprimento reiterado e grave das obrigações de segurança
    cibernética.

    Parágrafo único. A ANATEL realizará fiscalização das obrigações
    deste Regulamento por meio de auditorias, inspeções, análise de
    documentos e demais meios previstos em sua regulamentação de
    fiscalização.
guidance:
  prose: |
    O art. 25 estabelece o regime sancionatorio do R-Ciber, que deve
    orientar a priorizacao de recursos para implementacao dos controles.

    **Analise de risco regulatorio:**
    - Multas de ate R$ 50 milhoes por infracao podem superar em muito
      o custo de implementacao dos controles exigidos
    - Suspensao de servicos e caducidade representam riscos existenciais
      para a prestadora
    - O R-Ciber nao e compliance opcional

    **O que a ANATEL pode auditar:**
    - Politica de Seguranca Cibernetica (art. 8-9)
    - Inventario de ativos e ICT (art. 5, art. 18)
    - Registros de incidentes e notificacoes (art. 15)
    - Registros de treinamentos (art. 10)
    - Contratos com fornecedores (art. 11)
    - Registros de avaliacoes de risco (art. 13)
    - Relatorio anual (art. 23)

    **Postura de conformidade:**
    A melhor defesa em uma auditoria e documentacao organizada,
    evidencias de implementacao e demonstracao de maturidade do
    programa de seguranca, mesmo que com lacunas documentadas e
    planos de remediacao em andamento.
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao de evidencias para auditoria regulatoria:**
      1. Implementar coleta automatica de evidencias de compliance
         para cada controle do R-Ciber: logs de sistemas, resultados
         de scans, registros de aprovacoes, configuracoes.
      2. Organizar evidencias em repositorio estruturado por artigo
         do R-Ciber, com metadados de data, responsavel e status.
      3. Implementar alertas proativos para riscos de nao conformidade
         regulatoria (controles criticos sem evidencia de implementacao,
         relatorio anual proximo do prazo).
      4. Manter historico de 5 anos de evidencias de compliance
         (prazo prescricional de sancoes administrativas).
    tools:
      - compliance-evidence
      - audit-management
      - document-archive
      - compliance-alerts
  devsecops:
    prose: |
      **Rastreabilidade regulatoria no desenvolvimento:**
      1. Mapear explicitamente cada controle tecnico implementado ao
         artigo correspondente do R-Ciber em documentacao de arquitetura.
      2. Gerar automaticamente relatorio de cobertura de controles
         do R-Ciber nos sistemas de telecomunicacoes.
      3. Manter registro de todas as decisoes de aceite de risco com
         justificativa formal e aprovacao documentada.
    tools:
      - compliance-mapping
      - coverage-reporting
      - risk-acceptance-log
  secops:
    prose: |
      **Preparacao para fiscalizacao da ANATEL:**
      1. Realizar auto-avaliacao anual de conformidade com todos os
         artigos do R-Ciber, antes do envio do relatorio anual.
      2. Manter dossiê de conformidade organizado por artigo, com
         evidencias atualizadas e prontas para apresentacao em auditorias.
      3. Simular auditoria regulatoria internamente (mock audit) a cada
         2 anos para identificar lacunas antes de uma auditoria real.
      4. Contratar avaliacao de conformidade por terceiro independente
         (auditoria de compliance) anualmente para validacao externa.
    tools:
      - grc-platform
      - compliance-dossier
      - mock-audit
      - third-party-audit
