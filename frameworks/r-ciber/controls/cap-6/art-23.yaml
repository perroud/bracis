id: art-23
family: cap-6
title: "Relatorio Anual de Seguranca Cibernetica a ANATEL"
class: R-CIBER
baselines: [telecom-all]
statement:
  prose: |
    Art. 23. As prestadoras de serviços de telecomunicações devem
    encaminhar à ANATEL relatório anual de segurança cibernética contendo,
    no mínimo:

    I - resumo das principais ameaças e incidentes de segurança cibernética
    ocorridos no período, com indicação de impacto e medidas adotadas;

    II - estado de implementação dos controles de segurança previstos
    neste Regulamento, com indicação de lacunas e planos de remediação;

    III - resultado das avaliações de risco realizadas no período,
    com indicação dos principais riscos identificados e tratamentos
    definidos;

    IV - programa de investimentos em segurança cibernética previsto
    para o próximo período;

    V - atualizações na lista de Infraestrutura Crítica de Telecomunicações.

    Parágrafo único. O relatório deve ser encaminhado até o dia 31 de
    março do exercício subsequente ao período de referência, por meio
    de canal específico definido pela ANATEL.
guidance:
  prose: |
    O art. 23 cria obrigacao de prestacao de contas anual a ANATEL,
    instrumento fundamental de supervisao regulatoria da seguranca
    cibernetica do setor.

    **Prazo: 31 de marco:**
    O relatorio referente ao ano anterior deve ser enviado ate 31/03.
    Recomenda-se iniciar a compilacao em outubro/novembro para ter
    dados completos e tempo de revisao.

    **Indicacao de lacunas (inciso II):**
    O R-Ciber nao exige implementacao imediata de todos os controles,
    mas exige transparencia sobre o estado atual e os planos de melhoria.
    Apresentar lacunas com planos de remediacao demonstra maturidade
    e boa-fe regulatoria.

    **Programa de investimentos (inciso IV):**
    A ANATEL utiliza esta informacao para avaliar se o setor esta
    investindo adequadamente em seguranca cibernetica. Prestadoras
    com historico de subinvestimento podem ser alvo de maior
    fiscalizacao.

    **Confidencialidade do relatorio:**
    O relatorio anual contem informacoes sensíveis. A prestadora deve
    solicitar tratamento confidencial adequado a ANATEL.
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao de coleta de metricas para o relatorio:**
      1. Implementar dashboard centralizado de metricas de seguranca
         cibernetica que agregue automaticamente dados necessarios
         para o relatorio anual (incidentes, vulnerabilidades, compliance).
      2. Automatizar geracao de estatisticas de incidentes por tipo,
         severidade, impacto e tempo de resposta para suporte ao
         inciso I do relatorio.
      3. Criar sistema de acompanhamento de planos de remediacao com
         status de cada controle do R-Ciber e evidencias de implementacao.
      4. Implementar exportacao automatica de dados de compliance para
         formatos aceitos pela ANATEL.
    tools:
      - security-metrics
      - compliance-dashboard
      - reporting-automation
      - data-export
  devsecops:
    prose: |
      **Evidencias de implementacao de controles:**
      1. Manter rastreabilidade entre controles do R-Ciber e
         implementacoes tecnicas nos pipelines e sistemas, para
         suporte a elaboracao do relatorio do inciso II.
      2. Gerar automaticamente evidencias de execucao de controles
         de seguranca (scans, tests, reviews) com timestamps e
         artefatos para auditoria regulatoria.
      3. Documentar e versionar o estado de implementacao de cada
         controle tecnico do R-Ciber trimestralmente.
    tools:
      - compliance-tracking
      - evidence-collection
      - control-mapping
  secops:
    prose: |
      **Processo de elaboracao do relatorio anual:**
      1. Definir calendario anual de coleta de dados para o relatorio:
         Q1 (coleta), Q2 (compilacao), Q3 (revisao), Q4 (finalizacao).
      2. Nomear equipe multidisciplinar responsavel pelo relatorio:
         CISO, gerente de riscos, NOC, juridico.
      3. Implementar processo de revisao interna do relatorio com
         aprovacao da alta direcao antes do envio a ANATEL.
      4. Manter arquivo de relatorios anteriores para referencia e
         analise de tendencias de maturidade ao longo do tempo.
    tools:
      - grc-platform
      - report-builder
      - approval-workflow
      - document-archive
