control_families:
  - id: cap-1
    title: "Disposicoes Gerais"
    description: "Objeto, definicoes e ambito de aplicacao do Regulamento de Seguranca Cibernetica para o setor de telecomunicacoes"
    articles: "art. 1 ao art. 3"
    control_count: 3
  - id: cap-2
    title: "Principios e Diretrizes de Seguranca Cibernetica"
    description: "Principios fundamentais e diretrizes que orientam a seguranca cibernetica nas prestadoras de servicos de telecomunicacoes"
    articles: "art. 4 ao art. 7"
    control_count: 4
  - id: cap-3
    title: "Politica de Seguranca Cibernetica das Prestadoras"
    description: "Requisitos para elaboracao, aprovacao, implementacao e revisao da politica de seguranca cibernetica das prestadoras de telecomunicacoes"
    articles: "art. 8 ao art. 12"
    control_count: 5
  - id: cap-4
    title: "Gestao de Riscos e Resposta a Incidentes"
    description: "Processo de gestao de riscos ciberneticos, notificacao de incidentes a ANATEL e plano de resposta e recuperacao"
    articles: "art. 13 ao art. 17"
    control_count: 5
  - id: cap-5
    title: "Protecao da Infraestrutura Critica de Telecomunicacoes"
    description: "Requisitos especificos para protecao dos elementos de rede criticos, rastreabilidade de equipamentos e seguranca da cadeia de fornecimento"
    articles: "art. 18 ao art. 21"
    control_count: 4
  - id: cap-6
    title: "Compartilhamento de Informacoes e Cooperacao"
    description: "Obrigacoes de compartilhamento de informacoes sobre ameacas e incidentes ciberneticos com a ANATEL e outros orgaos competentes"
    articles: "art. 22 ao art. 25"
    control_count: 4
related_frameworks:
  - framework_id: gsi-in3
    relationship: mapped
    description: >-
      O R-Ciber mapeia para a IN GSI/PR 3 nos temas de gestao de
      riscos, resposta a incidentes, gestao de ativos e controle de
      acesso, estendendo esses requisitos ao contexto especifico das
      prestadoras de telecomunicacoes.
  - framework_id: iso-27001-2022
    relationship: mapped
    description: >-
      Os controles do R-Ciber possuem correspondencia com os controles
      do Anexo A da ISO 27001:2022, especialmente nas clausulas de
      gestao de continuidade, resposta a incidentes, gestao de ativos
      e relacoes com fornecedores.
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD complementa o R-Ciber ao disciplinar o tratamento de
      dados pessoais dos usuarios de telecomunicacoes, impondo
      requisitos adicionais de protecao de privacidade e notificacao
      de incidentes de seguranca que envolvam dados pessoais.
  - framework_id: aneel-964
    relationship: complements
    description: >-
      A Resolucao ANEEL 964/2021 complementa o R-Ciber no contexto
      de infraestruturas criticas nacionais, dado que redes de energia
      e telecomunicacoes sao interdependentes e compartilham requisitos
      de protecao cibernetica.
