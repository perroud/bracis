baselines:
  - id: basic
    title: "CUI Basic"
    description: >-
      The single baseline of security requirements for protecting the
      confidentiality of Controlled Unclassified Information (CUI) in
      nonfederal systems and organizations. Revision 3 eliminates the
      separate NFO (Nonfederal Organization) controls and consolidates
      all requirements into one set aligned directly with NIST SP 800-53
      Rev 5 moderate baseline tailored for CUI protection.
    requirement_count: 97

