id: 03.02.01
family: at
title: "Literacy Training and Awareness"
class: SP800-171r3
baselines: [basic]
related_controls:
  - nist-800-53-rev5: [at-2]
  - cmmc-v2: [at.l2-3.2.1]
statement:
  prose: >-
    a. Provide security literacy training to system users (including managers, senior
       executives, and contractors) as part of initial training for new users and at a
       defined frequency thereafter.
    b. Update literacy training content when there are significant changes to the system
       or the threat environment, or when there are indications of a need for updated
       training.
    c. Incorporate lessons learned from internal or external security incidents into
       literacy training and awareness activities.
    d. Include practical exercises in literacy training that simulate events and incidents.
guidance:
  prose: >-
    Security literacy training addresses the need for all system users to understand the
    risks associated with their activities and the applicable policies, standards, and
    procedures related to the security of systems. Training topics include recognizing
    and reporting potential indicators of insider threat, social engineering attacks,
    phishing, and other cyber threats. Training also addresses acceptable use policies,
    CUI handling requirements, physical security, and incident reporting procedures.
    Organizations determine the content and frequency of training based on the specific
    CUI categories handled and the threat environment. Practical exercises can include
    simulated phishing campaigns, tabletop exercises, and security awareness quizzes.
    Updated training content reflects changes in the threat landscape, lessons from
    recent incidents, and emerging attack vectors.
implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate security awareness touchpoints into developer and operations workflows.
      Implement pre-commit hooks that display CUI handling reminders for repositories
      containing sensitive data. Deploy security champions programs within platform
      engineering teams. Automate delivery of role-specific training materials through
      onboarding pipelines. Integrate security knowledge checks into internal developer
      portals (Backstage). Implement just-in-time training triggers when users access
      CUI systems for the first time or after policy changes.
    tools:
      - "LMS (KnowBe4, Proofpoint Security Awareness)"
      - "Backstage (developer portal with security docs)"
      - "Automated onboarding pipelines"
      - "Internal security wiki / knowledge base"
  devsecops:
    prose: >-
      Embed security training touchpoints in the development lifecycle. Configure CI
      pipelines to surface security findings with educational context explaining the
      vulnerability and remediation approach. Implement security-focused code review
      checklists in merge request templates. Conduct regular security-focused brown bag
      sessions covering common CUI handling mistakes and secure coding practices.
      Track training completion as a gate for repository access to CUI-containing systems.
    tools:
      - "Security-focused MR templates"
      - "CI pipeline security education (inline findings)"
      - "OWASP training materials"
      - "Secure coding guidelines"
      - "Training completion tracking"
  secops:
    prose: >-
      Conduct regular phishing simulations and measure click rates, report rates, and
      improvement trends. Integrate lessons learned from real security incidents into
      training content within defined timelines. Track training completion rates and
      report to management quarterly. Escalate non-compliance with training requirements.
      Maintain evidence of training delivery, content updates, and practical exercises
      for audit purposes.
    tools:
      - "KnowBe4 / Proofpoint (phishing simulation)"
      - "LMS (training delivery and tracking)"
      - "Incident lessons-learned database"
      - "Compliance reporting dashboards"
references:
  - citation: "NIST SP 800-53 Rev. 5 — AT-2"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
  - citation: "NIST SP 800-50"
    url: "https://doi.org/10.6028/NIST.SP.800-50"
