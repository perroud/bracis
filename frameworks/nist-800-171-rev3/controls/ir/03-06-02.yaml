id: 03.06.02
family: ir
title: "Incident Reporting"
class: SP800-171r3
baselines: [basic]
related_controls:
  - nist-800-53-rev5: [ir-6]
  - cmmc-v2: [ir.l2-3.6.2]
statement:
  prose: >-
    a. Require personnel to report suspected incidents to the organizational incident
       response capability within a defined time period.
    b. Report incident information to designated authorities.
    c. Report incidents involving CUI to the organization and to the entity that
       provided the CUI within 72 hours of discovery.
guidance:
  prose: >-
    The types of incidents reported, the content and timeliness of the reports, and the
    list of designated reporting authorities are consistent with applicable laws,
    executive orders, directives, regulations, policies, standards, and guidelines.
    Organizations in the defense industrial base must report cyber incidents to the
    DoD through the DIBNet portal within 72 hours of discovery, as required by DFARS
    252.204-7012. Incident reports include the date and time of discovery, affected
    systems, nature of the CUI involved, actions taken, and point of contact information.
    Internal reporting timelines should be shorter (immediate to 1 hour) to enable
    effective organizational response. Organizations implement mechanisms to ensure
    reports reach designated authorities even during system outages.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated incident notification pipelines that trigger upon incident
      classification. Deploy webhook integrations between monitoring/alerting systems
      and incident management platforms to ensure rapid internal notification. Implement
      automated report generation templates that pre-populate required fields (affected
      systems, timeline, CUI categories). Maintain out-of-band communication channels
      (phone trees, encrypted messaging) for reporting during system outages. Configure
      automated escalation timers that alert management if reporting deadlines approach
      without action.
    tools:
      - "PagerDuty / Opsgenie (automated notification)"
      - "Incident management platforms (ServiceNow, Jira)"
      - "Automated report templates"
      - "Encrypted communication (Signal, Wickr)"
      - "Escalation timers and workflows"
  devsecops:
    prose: >-
      Integrate automated vulnerability and incident detection in pipelines that trigger
      reporting workflows when critical security events are detected in production
      systems. Maintain version-controlled incident report templates aligned with
      DFARS 252.204-7012 requirements. Implement automated evidence collection that
      packages relevant log data, configuration snapshots, and timeline information
      for inclusion in incident reports.
    tools:
      - "Automated evidence packaging"
      - "Version-controlled report templates"
      - "Pipeline security event triggers"
      - "Artifact preservation automation"
  secops:
    prose: >-
      Maintain documented incident reporting procedures with clear timelines: immediate
      internal notification, 72-hour external reporting for CUI incidents. Implement
      tracking for all reportable incidents with automated deadline monitoring. Establish
      relationships with required reporting authorities (contracting officer, CISA,
      DIBNet, law enforcement). Conduct annual exercises of external reporting procedures
      to verify they function correctly. Maintain evidence of all incident reports
      submitted, including timestamps and acknowledgments.
    tools:
      - "DIBNet portal (DoD incident reporting)"
      - "CISA incident reporting"
      - "Incident tracking with SLA monitoring"
      - "Reporting procedure documentation"
      - "External reporting exercises"
references:
  - citation: "NIST SP 800-53 Rev. 5 — IR-6"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
  - citation: "DFARS 252.204-7012"
    url: "https://www.acquisition.gov/dfars/252.204-7012"
