id: 03.06.01
family: ir
title: "Incident Handling"
class: SP800-171r3
baselines: [basic]
related_controls:
  - nist-800-53-rev5: [ir-4]
  - cmmc-v2: [ir.l2-3.6.1]
statement:
  prose: >-
    a. Implement an incident handling capability for incidents that is consistent with
       the incident response plan and includes preparation, detection and analysis,
       containment, eradication, and recovery.
    b. Coordinate incident handling activities with contingency planning activities.
    c. Incorporate lessons learned from ongoing incident handling activities into incident
       response procedures, training, and testing, and implement the resulting changes
       accordingly.
    d. Ensure the accuracy, currency, and availability of incident handling procedures.
guidance:
  prose: >-
    Organizations recognize that incident response capabilities are dependent on the
    capabilities of systems and the mission/business processes being supported. Incident
    response plans and procedures address how to implement the incident handling
    capability. The incident response plan is reviewed and approved by designated
    officials. The activities in the incident handling capability include all aspects
    of managing the incident life cycle: preparation, detection and analysis,
    containment, eradication, recovery, and post-incident activity. Incident information
    can be obtained from a variety of sources including audit monitoring, physical access
    monitoring, and user and administrator reports. Organizations consider the sharing
    of incident information with external organizations, including CISA and the DIBNet
    for organizations in the defense industrial base. Lessons learned from incident
    handling activities improve future incident response effectiveness.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated incident detection through monitoring stack integration
      (Prometheus alerts, Grafana OnCall, PagerDuty). Deploy runbooks-as-code for common
      incident scenarios with automated containment actions (network isolation, pod
      termination, credential rotation). Implement Kubernetes-native incident response
      capabilities: namespace isolation, NetworkPolicy enforcement for containment,
      and pod forensic capture before termination. Maintain pre-built forensic
      environments for evidence collection and analysis. Implement automated rollback
      capabilities through GitOps to quickly restore known-good states. Deploy chaos
      engineering practices to test incident response readiness.
    tools:
      - "PagerDuty / Grafana OnCall (incident management)"
      - "Prometheus + Alertmanager (detection)"
      - "Kubernetes NetworkPolicy (containment)"
      - "ArgoCD (automated rollback)"
      - "Forensic tooling (Velero snapshots, pod capture)"
      - "Runbook automation (Rundeck, Ansible)"
  devsecops:
    prose: >-
      Integrate security incident detection into CI/CD pipelines through SAST, DAST,
      and container scanning that can trigger incident workflows when critical
      vulnerabilities are detected in production-deployed code. Maintain incident
      response playbooks in version-controlled repositories. Implement automated
      evidence collection scripts triggered by incident detection. Deploy canary
      analysis in deployment pipelines to detect security-relevant anomalies before
      full rollout. Maintain documented procedures for emergency patching and
      out-of-band deployments.
    tools:
      - "Security scanning (SAST, DAST, container)"
      - "Version-controlled playbooks"
      - "Automated evidence collection"
      - "Canary deployment analysis"
      - "Emergency patch pipelines"
  secops:
    prose: >-
      Operate a 24/7 incident detection and response capability through SOC operations
      or managed detection and response (MDR) services. Implement tiered incident
      classification (P1-P4) with defined response times and escalation paths. Conduct
      regular tabletop exercises and purple team engagements to test incident handling
      procedures. Maintain incident tracking in a dedicated platform with full timeline,
      evidence chain, and lessons learned documentation. Report incidents to required
      parties (contracting officer, CISA, DIBNet) within mandated timeframes. Conduct
      post-incident reviews within defined timelines and track remediation actions to
      completion.
    tools:
      - "SIEM + SOAR (detection and response)"
      - "Incident management (PagerDuty, ServiceNow)"
      - "Forensic analysis (Velociraptor, TheHive)"
      - "Threat intelligence platforms"
      - "Tabletop exercise frameworks"
      - "Incident reporting (DIBNet, CISA)"
references:
  - citation: "NIST SP 800-53 Rev. 5 — IR-4"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
  - citation: "NIST SP 800-61 Rev. 2"
    url: "https://doi.org/10.6028/NIST.SP.800-61r2"
