id: 03.03.02
family: au
title: "Audit Record Content"
class: SP800-171r3
baselines: [basic]
related_controls:
  - nist-800-53-rev5: [au-3]
  - cmmc-v2: [au.l2-3.3.2]
statement:
  prose: >-
    Ensure that audit records contain information that establishes the following:
    a. What type of event occurred.
    b. When the event occurred.
    c. Where the event occurred.
    d. Source of the event.
    e. Outcome of the event.
    f. Identity of any individuals, subjects, or objects/entities associated with the event.
guidance:
  prose: >-
    Audit record content that may be necessary to support the auditing function includes
    event descriptions, time stamps, source and destination addresses, user or process
    identifiers, success or failure indications, filenames involved, and access control
    or flow control rules invoked. The content of audit records supports after-the-fact
    investigations of security incidents and is essential for forensic analysis. Audit
    records with insufficient detail cannot provide adequate evidence for forensic
    activities. Detailed audit records can be generated by common operating system and
    application logging functions. Organizations can define additional, specific audit
    record content required for CUI systems, including the type of CUI accessed and
    the authorization that permitted the access.
implementation_guidance:
  platform_engineering:
    prose: >-
      Define and enforce a standard audit record schema across all platform services.
      Each record must include: event_type, timestamp (ISO 8601 with timezone),
      source_ip, destination_resource, actor_id, actor_type (human/service/system),
      action, outcome (success/failure), and correlation_id for request tracing.
      Implement OpenTelemetry for distributed tracing to correlate events across
      microservices. Use NTP synchronization (chrony) on all nodes to ensure accurate
      timestamps. Deploy centralized log schemas validated at ingestion time, rejecting
      records missing required fields.
    tools:
      - "OpenTelemetry (distributed tracing + logging)"
      - "Structured logging schema (JSON Schema validation)"
      - "chrony / NTP (time synchronization)"
      - "ELK / Loki (log ingestion with schema validation)"
      - "Fluentd (log enrichment and normalization)"
  devsecops:
    prose: >-
      Provide standardized logging libraries that automatically populate required audit
      record fields (timestamp, service name, correlation ID, actor identity). Implement
      CI checks that validate log output format compliance against the defined schema.
      Include audit record content requirements in development standards documentation.
      Test that all critical operations produce audit records with complete required
      fields as part of automated testing.
    tools:
      - "Standard logging libraries (organization-provided)"
      - "JSON Schema validation in CI"
      - "Integration tests (audit record completeness)"
      - "Log format linting tools"
  secops:
    prose: >-
      Monitor audit record quality and completeness. Alert on records missing required
      fields or with inconsistent timestamps. Conduct periodic audit record quality
      reviews to ensure forensic utility. Validate that audit records provide sufficient
      detail for incident investigation through tabletop exercises. Ensure audit records
      are preserved with integrity protections (hashing, write-once storage) for the
      required retention period.
    tools:
      - "SIEM (data quality monitoring)"
      - "Log integrity verification (hash chains)"
      - "Write-once storage (S3 Object Lock, WORM)"
      - "Audit record quality reports"
references:
  - citation: "NIST SP 800-53 Rev. 5 — AU-3"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
