id: 03.14.02
family: si
title: "Security Alerts, Advisories, and Directives"
class: SP800-171r3
baselines: [basic]
related_controls:
  - nist-800-53-rev5: [si-5]
  - cmmc-v2: [si.l2-3.14.3]
statement:
  prose: >-
    a. Receive system security alerts, advisories, and directives from external
       organizations on an ongoing basis.
    b. Generate internal security alerts, advisories, and directives as deemed necessary.
    c. Disseminate security alerts, advisories, and directives to designated personnel or
       roles within the organization and to external organizations as appropriate.
    d. Implement security directives in accordance with established time frames or notify
       the issuing organization of the degree of noncompliance.
guidance:
  prose: >-
    The sources of security alerts, advisories, and directives include the United States
    Computer Emergency Readiness Team (US-CERT/CISA), vendors, and industry information
    sharing and analysis centers (ISACs). Security directives are issued by authoritative
    sources such as CISA under Binding Operational Directives (BODs) and Emergency
    Directives for federal systems, and similar guidance applies to nonfederal systems
    processing CUI. Organizations establish internal processes for generating security
    alerts when vulnerabilities or threats are discovered that affect their systems.
    Dissemination mechanisms include email distribution lists, internal wikis, ticketing
    systems, and automated notification pipelines. Compliance with directives is tracked
    and reported, with exceptions documented and risk-accepted by appropriate officials.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated security advisory ingestion from multiple sources: CISA KEV
      catalog, NVD, vendor security bulletins, and GitHub Security Advisories. Deploy
      automated correlation of security advisories against the platform's SBOM and asset
      inventory to identify affected systems within hours of advisory publication.
      Implement a notification pipeline that routes relevant advisories to responsible
      teams through integrated communication channels (Slack, Teams, PagerDuty). Maintain
      an advisory tracking system that records receipt, impact assessment, and remediation
      actions for each advisory.
    tools:
      - "CISA KEV catalog integration"
      - "NVD / OSV.dev (advisory feeds)"
      - "Dependency-Track (SBOM correlation)"
      - "Automated notification pipelines"
      - "Advisory tracking system"
  devsecops:
    prose: >-
      Configure automated dependency vulnerability alerts in code repositories (Dependabot
      alerts, Snyk). Implement CI pipeline stages that check dependencies against the
      latest advisory databases on every build. Automate the creation of remediation
      tasks when new advisories affect project dependencies. Maintain internal security
      advisory templates for generating and distributing organizational advisories.
      Track advisory implementation through the development workflow (issues, merge
      requests, deployments).
    tools:
      - "Dependabot / Renovate (advisory alerts)"
      - "Snyk / Socket.dev"
      - "CI advisory checking"
      - "Issue tracking (advisory remediation)"
      - "Internal advisory distribution"
  secops:
    prose: >-
      Subscribe to and monitor security advisory feeds from CISA, US-CERT, ISACs,
      and relevant vendors. Triage incoming advisories for applicability and severity
      within defined timelines. Track implementation of security directives with
      compliance deadlines. Generate and distribute internal security advisories when
      organization-specific threats are identified. Report directive compliance status
      to management and regulatory authorities. Maintain evidence of advisory receipt,
      assessment, and action for audit purposes.
    tools:
      - "Threat intelligence platforms"
      - "CISA advisory subscriptions"
      - "ISAC memberships (DIB-ISAC, sector-specific)"
      - "Advisory triage and tracking"
      - "Directive compliance reporting"
references:
  - citation: "NIST SP 800-53 Rev. 5 — SI-5"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
  - citation: "CISA Alerts and Advisories"
    url: "https://www.cisa.gov/news-events/cybersecurity-advisories"
