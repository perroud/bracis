id: 03.01.02
family: ac
title: "Access Enforcement"
class: SP800-171r3
baselines: [basic]
related_controls:
  - nist-800-53-rev5: [ac-3]
  - cmmc-v2: [ac.l2-3.1.2]
statement:
  prose: >-
    Enforce approved authorizations for logical access to information and system resources
    in accordance with applicable access control policies.
guidance:
  prose: >-
    Access control policies control access between active entities or subjects (users or
    processes acting on behalf of users) and passive entities or objects (devices, files,
    records, domains) in systems. Access enforcement mechanisms can be employed at the
    application and service level to provide increased information security and privacy.
    In addition to enforcing authorized access at the system level, access enforcement
    mechanisms are employed at the application level to provide increased information
    security. Access enforcement approaches include role-based access control (RBAC),
    attribute-based access control (ABAC), mandatory access control (MAC), and
    discretionary access control (DAC). Organizations consider the number and types of
    access enforcement mechanisms needed to support access control policies.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement RBAC at all layers: cloud IAM (AWS IAM, GCP IAM, Azure RBAC), Kubernetes
      RBAC, and application-level authorization. Deploy Open Policy Agent (OPA) or Cedar
      for centralized, policy-as-code access decisions across the platform. Use Kubernetes
      RBAC with ClusterRoles and RoleBindings scoped to the minimum necessary permissions.
      Implement namespace-level isolation with NetworkPolicies to enforce east-west traffic
      control. Deploy service mesh authorization policies (Istio AuthorizationPolicy) for
      workload-to-workload access enforcement. Implement API gateway policies that enforce
      authentication and authorization before requests reach backend services.
    tools:
      - "OPA / Cedar (policy engine)"
      - "Kubernetes RBAC"
      - "Cloud IAM (AWS/GCP/Azure)"
      - "Istio AuthorizationPolicy"
      - "API Gateway (Kong, Envoy)"
      - "Keycloak / Okta (authorization server)"
  devsecops:
    prose: >-
      Define access policies as code in version-controlled repositories. Validate access
      enforcement configurations in CI pipelines using policy-as-code tools (Checkov, OPA
      conftest). Implement infrastructure scanning to detect overly permissive IAM policies,
      public S3 buckets, or unrestricted security groups. Enforce the principle of least
      privilege through automated IAM policy analysis. Test access control enforcement in
      integration test stages by attempting unauthorized access patterns.
    tools:
      - "Checkov / tfsec / Bridgecrew"
      - "OPA conftest"
      - "Terraform (IAM definitions)"
      - "IAM Access Analyzer (AWS)"
      - "CI/CD pipeline policy gates"
  secops:
    prose: >-
      Monitor for access control violations and unauthorized access attempts. Configure
      SIEM correlation rules to detect privilege escalation, lateral movement, and access
      policy bypass. Conduct periodic access control effectiveness assessments through
      penetration testing and red team exercises. Generate access enforcement compliance
      reports showing policy violations and remediation timelines. Monitor for access
      anomalies using UEBA (User and Entity Behavior Analytics).
    tools:
      - "SIEM (access violation correlation)"
      - "UEBA (Exabeam, Microsoft Sentinel)"
      - "Cloud Security Posture Management (CSPM)"
      - "Penetration testing tools"
      - "PAM session monitoring"
references:
  - citation: "NIST SP 800-53 Rev. 5 — AC-3"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
  - citation: "NIST SP 800-162"
    url: "https://doi.org/10.6028/NIST.SP.800-162"
