id: pci-3ds
title: "PCI 3-D Secure Core Security Standard v2.0"
short_title: "PCI 3DS v2.0"
version: "2.0"
publication_date: "2022-03-01"
last_updated: "2022-03-01"

authority:
  name: "Payment Card Industry Security Standards Council"
  acronym: "PCI SSC"
  country: US
  url: "https://www.pcisecuritystandards.org/"

type: standard
scope: cybersecurity
mandatory: true

original_language: en
available_languages:
  - en

industries:
  - financial-services
  - retail
  - payment-processing
  - e-commerce
  - fintech

regions:
  - global

techstacks:
  - platform-engineering
  - devsecops
  - secops
  - web-security
  - api-security

baselines:
  - id: 3ds-server
    title: "3DS Server (3DSS) — Directory Server Interface"
  - id: 3ds-directory-server
    title: "3DS Directory Server (DS)"
  - id: 3ds-acs
    title: "3DS Access Control Server (ACS)"
  - id: 3ds-sdk
    title: "3DS SDK"

control_families:
  - id: tds-network
    title: "Network Security"
    description: "Controls for network segmentation, firewall configuration, and secure communication channels protecting 3DS environment components from unauthorized access."
    control_count: 3
  - id: tds-data
    title: "Data Protection"
    description: "Controls for protecting cardholder authentication data, encryption of sensitive data at rest and in transit, and secure key management within 3DS environments."
    control_count: 3
  - id: tds-vuln
    title: "Vulnerability Management"
    description: "Controls for identifying, assessing, and remediating vulnerabilities in 3DS system components through patching and regular scanning."
    control_count: 2
  - id: tds-access
    title: "Access Control"
    description: "Controls for authentication, authorization, and access management for personnel and systems interacting with 3DS components."
    control_count: 3
  - id: tds-monitor
    title: "Monitoring and Logging"
    description: "Controls for security monitoring, audit logging, and detection of anomalous activity within 3DS environments."
    control_count: 2
  - id: tds-ops
    title: "Operational Security"
    description: "Controls for security policies, procedures, change management, and secure development practices governing 3DS operations."
    control_count: 2
  - id: tds-incident
    title: "Incident Response"
    description: "Controls for incident detection, response, escalation, and recovery procedures specific to 3DS security events."
    control_count: 1

related_frameworks:
  - framework_id: pci-dss-v4
    relationship: derived-from
    description: "PCI 3DS builds upon PCI DSS foundations with additional requirements specific to 3-D Secure environments."
  - framework_id: iso-27001-2022
    relationship: mapped
    description: "ISO 27001:2022 information security management controls map to PCI 3DS operational and access control requirements."
  - framework_id: nist-800-53-rev5
    relationship: mapped
    description: "NIST 800-53 security and privacy controls provide a comprehensive mapping to PCI 3DS technical requirements."

