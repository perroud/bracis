id: tds-vuln-2
family: tds-vuln
title: "Penetration Testing of 3DS Environment"
class: PCI-3DS

statement:
  prose: >-
    Penetration testing of the 3DS environment must be performed at least
    annually and after any significant infrastructure or application change.
    Testing must include both network-layer and application-layer penetration
    tests. The scope must cover all 3DS system components, network
    segmentation controls, and critical application interfaces including
    APIs used for 3DS message exchange. Testing must be performed by a
    qualified internal resource or qualified external third party.
    Identified vulnerabilities must be remediated and retested to verify
    the effectiveness of the remediation.

guidance:
  prose: >-
    Penetration testing provides a realistic assessment of the 3DS
    environment's resistance to attack by simulating the techniques used
    by actual adversaries. Unlike automated vulnerability scanning,
    penetration testing involves skilled testers who chain together
    multiple findings and attempt to exploit vulnerabilities in context.
    Application-layer testing is particularly important for 3DS
    implementations because the protocol involves complex message flows,
    cryptographic operations, and API interactions that automated scanners
    cannot fully evaluate. Segmentation testing verifies that network
    controls effectively isolate the 3DS environment.

references:
  - citation: "PCI 3DS v2.0, Part 1, Section 3 — Security Testing"
    url: "https://www.pcisecuritystandards.org/"
  - citation: "PCI 3DS v2.0, Part 2, Section 3.2 — Penetration Testing Requirements"
    url: "https://www.pcisecuritystandards.org/"

implementation_guidance:
  platform_engineering:
    prose: >-
      Maintain a dedicated penetration testing environment that mirrors
      production 3DS infrastructure. Provide testers with network diagrams,
      API documentation, and access to staging environments. Implement
      automated infrastructure provisioning so test environments can be
      created and destroyed quickly. Configure monitoring in test
      environments to capture all tester activity for post-test analysis.
      Automate remediation verification by re-running targeted scans
      after fixes are deployed.
    tools:
      - terraform
      - ansible
      - kubernetes
      - aws-inspector
      - azure-defender

  devsecops:
    prose: >-
      Integrate DAST (Dynamic Application Security Testing) into CI/CD
      pipelines to provide continuous application-layer testing between
      annual penetration tests. Use API security testing tools to validate
      3DS API endpoints against known attack vectors. Automate the tracking
      of penetration test findings through issue management systems.
      Implement regression tests for previously identified vulnerabilities
      to prevent reintroduction.
    tools:
      - gitlab-ci
      - zap
      - burp-suite
      - nuclei
      - postman
      - owasp-zap

  secops:
    prose: >-
      Manage the penetration testing program including scoping, scheduling,
      and vendor selection. Review penetration test reports and prioritize
      findings based on risk to 3DS operations. Track remediation progress
      and coordinate retesting. Maintain a repository of all penetration
      test reports and remediation evidence for audit. Ensure testers hold
      relevant qualifications (OSCP, CREST, or equivalent).
    tools:
      - plextrac
      - dradis
      - cobalt
      - hackerone
      - bugcrowd

