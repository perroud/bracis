id: tds-ops-1
family: tds-ops
title: "Security Policies and Procedures for 3DS Operations"
class: PCI-3DS

statement:
  prose: >-
    A comprehensive information security policy must be established,
    published, maintained, and disseminated to all relevant personnel
    governing the 3DS environment. The policy must address all security
    requirements of the PCI 3DS standard. Operational procedures must be
    documented for all security-relevant processes including system
    configuration, change management, access provisioning, incident
    response, and vulnerability management. Policies and procedures must
    be reviewed at least annually and updated when there are changes to
    the 3DS environment, organizational structure, or threat landscape.
    All personnel with access to the 3DS environment must acknowledge
    their understanding of and agreement to comply with security policies.

guidance:
  prose: >-
    Security policies and procedures provide the governance foundation for
    the 3DS environment. Without documented policies, security practices
    become inconsistent and dependent on individual knowledge. Policies
    define what must be done; procedures define how to do it. Annual
    review ensures policies remain current and effective. Personnel
    acknowledgment creates accountability and demonstrates that security
    expectations have been communicated. The policy should be tailored to
    the specific 3DS implementation rather than being a generic document,
    addressing the unique risks and operational requirements of the
    organization's 3DS role (ACS operator, DS operator, 3DSS operator).

references:
  - citation: "PCI 3DS v2.0, Part 1, Section 6 — Maintain an Information Security Policy"
    url: "https://www.pcisecuritystandards.org/"
  - citation: "PCI 3DS v2.0, Part 2, Section 6.1 — Security Policy Requirements"
    url: "https://www.pcisecuritystandards.org/"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement policy-as-code to enforce security policy requirements
      automatically. Use OPA/Rego or Sentinel policies to translate
      written security policies into machine-enforceable controls.
      Configure compliance dashboards that track policy adherence across
      all 3DS infrastructure. Automate the distribution and acknowledgment
      tracking of security policies through an internal knowledge
      management system. Version-control all policy documents alongside
      infrastructure code.
    tools:
      - opa
      - sentinel
      - terraform
      - confluence
      - sharepoint
      - gitlab-wiki

  devsecops:
    prose: >-
      Embed policy compliance checks into CI/CD pipelines so that
      deployments violating security policies are automatically blocked.
      Maintain policy documentation in version-controlled repositories
      with review workflows. Implement automated compliance reports that
      map deployed configurations against policy requirements. Use
      merge request templates that require security policy consideration
      for changes affecting the 3DS environment.
    tools:
      - gitlab-ci
      - opa
      - conftest
      - checkov
      - terraform-sentinel

  secops:
    prose: >-
      Conduct annual policy reviews with stakeholders from security,
      operations, and management. Track policy acknowledgment completion
      rates and follow up on non-compliant personnel. Perform periodic
      compliance assessments to verify that operational practices align
      with documented policies. Maintain evidence of policy reviews,
      updates, and acknowledgments for audit purposes. Coordinate with
      the qualified security assessor (QSA) to ensure policy completeness.
    tools:
      - servicenow
      - jira
      - confluence
      - vanta
      - drata

