id: tds-data-1
family: tds-data
title: "Protection of 3DS Authentication Data"
class: PCI-3DS

statement:
  prose: >-
    Authentication data processed within the 3DS environment must be
    protected throughout its lifecycle. Sensitive authentication data,
    including Authentication Values (AVs), cryptographic keys, and
    transaction-specific data, must not be stored after authorization
    unless there is a specific business or regulatory requirement.
    Where storage is permitted, data must be encrypted using strong
    cryptography with a minimum key length of 128 bits for symmetric
    algorithms and 2048 bits for RSA. Access to stored authentication
    data must be restricted to personnel and systems with an explicit
    business need.

guidance:
  prose: >-
    3DS authentication data is highly sensitive as it enables verification
    of cardholder identity during payment transactions. The Authentication
    Value (AV) generated by the ACS is a cryptographic proof of
    authentication that must be protected from disclosure. Storing
    authentication data beyond what is strictly necessary creates
    unnecessary risk. Where storage is required (e.g., for transaction
    dispute resolution), encryption at rest is mandatory. The encryption
    implementation must follow industry standards, and keys must be managed
    through a formal key management lifecycle including generation, storage,
    rotation, and destruction.

references:
  - citation: "PCI 3DS v2.0, Part 1, Section 2 — Protect 3DS Data"
    url: "https://www.pcisecuritystandards.org/"
  - citation: "PCI 3DS v2.0, Part 2, Section 2.1 — Sensitive Data Storage"
    url: "https://www.pcisecuritystandards.org/"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement data classification policies in infrastructure that tag
      3DS authentication data for special handling. Use envelope encryption
      with cloud KMS (AWS KMS, Azure Key Vault, GCP Cloud KMS) for data
      at rest. Configure database-level encryption (TDE) for any database
      storing 3DS transaction records. Implement automated data retention
      policies that purge authentication data once the permitted retention
      period expires. Use secret management solutions for cryptographic
      keys rather than embedding them in application configurations.
    tools:
      - aws-kms
      - azure-key-vault
      - gcp-cloud-kms
      - hashicorp-vault
      - postgresql-tde
      - mongodb-encryption

  devsecops:
    prose: >-
      Run secret detection scanners in CI/CD pipelines to prevent
      authentication data or cryptographic keys from being committed to
      source control. Implement code review checks that verify 3DS
      authentication data is not logged, cached, or stored in temporary
      files. Use SAST tools to detect insecure cryptographic practices
      such as hardcoded keys, weak algorithms, or insufficient key lengths.
      Enforce data retention policies through automated tests.
    tools:
      - gitlab-ci
      - gitleaks
      - trufflehog
      - semgrep
      - sonarqube
      - checkov

  secops:
    prose: >-
      Monitor access to stored 3DS authentication data through SIEM
      correlation rules. Alert on bulk data access patterns or access from
      unauthorized systems. Conduct quarterly data discovery scans to
      identify any unprotected authentication data. Verify encryption
      configurations and key rotation compliance through periodic audits.
      Monitor cryptographic key usage for anomalies that may indicate
      compromise.
    tools:
      - splunk
      - elastic-siem
      - varonis
      - imperva
      - thales-ciphertrust

