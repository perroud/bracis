id: tds-monitor-2
family: tds-monitor
title: "Anomaly Detection and Security Event Correlation"
class: PCI-3DS

statement:
  prose: >-
    Automated mechanisms must be implemented to detect and alert on
    anomalous activity within the 3DS environment. Security events from
    all 3DS components must be correlated to identify patterns indicative
    of attack or compromise. Detection mechanisms must include monitoring
    for unauthorized changes to 3DS system configurations, unexpected
    transaction patterns, failed authentication attempts exceeding defined
    thresholds, and network anomalies. Alerts must be triaged and
    investigated in a timely manner according to defined severity levels
    and response procedures.

guidance:
  prose: >-
    Individual security events viewed in isolation may appear benign, but
    when correlated across multiple data sources, they can reveal
    sophisticated attack campaigns. Anomaly detection in the 3DS
    environment must consider both technical indicators (network anomalies,
    authentication failures, configuration changes) and business logic
    indicators (unusual transaction volumes, geographic anomalies,
    velocity checks). Automated correlation reduces the time between
    compromise and detection (dwell time), which directly impacts the
    scope and severity of a breach. Defined severity levels and response
    procedures ensure that alerts are handled consistently and within
    appropriate timeframes.

references:
  - citation: "PCI 3DS v2.0, Part 1, Section 5 — Security Monitoring"
    url: "https://www.pcisecuritystandards.org/"
  - citation: "PCI 3DS v2.0, Part 2, Section 5.2 — Event Detection and Correlation"
    url: "https://www.pcisecuritystandards.org/"

implementation_guidance:
  platform_engineering:
    prose: >-
      Deploy a SIEM platform with correlation engine capabilities.
      Configure data feeds from all 3DS components including application
      logs, network flow logs, authentication events, and system events.
      Implement machine learning-based anomaly detection for transaction
      patterns and user behavior. Configure file integrity monitoring
      (FIM) on all 3DS system components to detect unauthorized changes.
      Establish baseline behavior profiles for 3DS transaction patterns
      to enable deviation alerting.
    tools:
      - splunk
      - elastic-siem
      - microsoft-sentinel
      - aws-guardduty
      - azure-defender
      - ossec
      - wazuh

  devsecops:
    prose: >-
      Implement application-level telemetry that generates structured
      security events for correlation. Build automated alerting rules
      into CI/CD-deployed monitoring configurations. Use infrastructure-
      as-code for all SIEM detection rules, enabling version control and
      peer review of detection logic. Implement chaos engineering tests
      that simulate attack scenarios and verify detection rules fire
      correctly.
    tools:
      - gitlab-ci
      - prometheus
      - grafana
      - datadog
      - terraform

  secops:
    prose: >-
      Develop and maintain a detection rule library covering known 3DS
      attack patterns including credential stuffing against ACS, protocol
      manipulation, and enumeration attacks. Establish a Security Operations
      Center (SOC) or managed detection and response (MDR) service with
      defined SLAs for alert triage. Conduct regular detection rule tuning
      to reduce false positives while maintaining detection coverage.
      Perform purple team exercises to validate detection capabilities
      against simulated attacks targeting 3DS components.
    tools:
      - splunk
      - elastic-siem
      - crowdstrike
      - sentinelone
      - palo-alto-cortex

