id: tds-incident-1
family: tds-incident
title: "Incident Response Plan for 3DS Security Events"
class: PCI-3DS

statement:
  prose: >-
    An incident response plan must be established, maintained, and tested
    for responding to security incidents affecting the 3DS environment.
    The plan must define roles and responsibilities, communication
    procedures (including notification to payment brands and acquirers),
    escalation paths, containment strategies, evidence preservation
    requirements, recovery procedures, and post-incident analysis. The
    plan must specifically address scenarios relevant to 3DS operations
    including compromise of authentication data, cryptographic key
    compromise, unauthorized access to 3DS components, and service
    disruptions. The incident response plan must be tested at least
    annually, and lessons learned must be incorporated into plan updates.

guidance:
  prose: >-
    A security incident affecting the 3DS environment can have immediate
    impact on payment authentication across multiple merchants, issuers,
    and acquirers. Rapid and coordinated response is essential to contain
    damage and restore service integrity. The incident response plan must
    account for the multi-party nature of the 3DS ecosystem, including
    notification obligations to payment brands (Visa, Mastercard,
    American Express) and regulatory authorities. Evidence preservation
    is critical both for forensic investigation and for meeting regulatory
    requirements. Annual testing (tabletop exercises or simulations)
    identifies gaps in the plan and builds team readiness. Post-incident
    reviews drive continuous improvement of both detection and response
    capabilities.

references:
  - citation: "PCI 3DS v2.0, Part 1, Section 5 — Incident Response"
    url: "https://www.pcisecuritystandards.org/"
  - citation: "PCI 3DS v2.0, Part 2, Section 5.3 — Incident Response Requirements"
    url: "https://www.pcisecuritystandards.org/"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated incident response tooling including forensic
      data collection, system isolation capabilities, and infrastructure
      snapshot functionality. Configure automated containment actions that
      can isolate compromised 3DS components without affecting the entire
      transaction flow. Maintain pre-built recovery environments that can
      be deployed rapidly. Implement immutable infrastructure patterns
      that enable clean redeployment of 3DS components from known-good
      states. Configure automated evidence collection and preservation
      workflows.
    tools:
      - pagerduty
      - opsgenie
      - terraform
      - ansible
      - aws-lambda
      - kubernetes

  devsecops:
    prose: >-
      Maintain incident response runbooks as version-controlled documents.
      Implement automated alerting pipelines that route security events
      to the appropriate responders based on severity and type. Build
      automated forensic data collection tools that can be triggered
      during incident response. Include rollback automation in deployment
      pipelines that can revert 3DS components to the last known-good
      version. Implement chaos engineering scenarios that test incident
      response procedures.
    tools:
      - gitlab-ci
      - pagerduty
      - slack
      - opsgenie
      - terraform

  secops:
    prose: >-
      Maintain the incident response plan with contact information for
      all stakeholders including payment brands, acquirers, forensic
      investigators, legal counsel, and regulatory authorities. Conduct
      annual tabletop exercises simulating 3DS-specific scenarios.
      Establish relationships with PCI Forensic Investigators (PFIs)
      before an incident occurs. Define and communicate incident severity
      levels with corresponding response timeframes. Maintain a secure
      evidence repository with chain of custody procedures. Conduct
      post-incident reviews within 72 hours and publish findings within
      30 days.
    tools:
      - pagerduty
      - servicenow
      - jira
      - splunk
      - elastic-siem
      - thehive

