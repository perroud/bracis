control_families:
  - id: cap-1
    title: "Disposicoes Gerais e Definicoes"
    description: "Objeto, definicoes de inteligencia artificial na medicina, classificacao de escopo e principios eticos fundamentais para uso de IA em atividades medicas"
    articles: "art. 1 ao art. 5"
    control_count: 5
  - id: cap-2
    title: "Classificacao de Risco de Sistemas de IA"
    description: "Niveis de risco (baixo, medio, alto e muito alto) aplicaveis a sistemas de IA em medicina, criterios objetivos de classificacao e procedimento de reclassificacao"
    articles: "art. 6 ao art. 10"
    control_count: 5
  - id: cap-3
    title: "Requisitos de Governanca e Transparencia"
    description: "Explicabilidade algortimica, transparencia na tomada de decisao clinica assistida por IA, consentimento informado do paciente e documentacao tecnica obrigatoria"
    articles: "art. 11 ao art. 16"
    control_count: 6
  - id: cap-4
    title: "Responsabilidade Medica e Supervisao Humana"
    description: "Medico como decisor final, supervisao humana obrigatoria em todas as etapas, responsabilidade profissional por decisoes assistidas por inteligencia artificial"
    articles: "art. 17 ao art. 22"
    control_count: 6
  - id: cap-5
    title: "Validacao Clinica e Seguranca"
    description: "Validacao clinica de modelos de IA, representatividade de datasets de treinamento, monitoramento de performance em producao, deteccao de drift e vieses algoritmicos"
    articles: "art. 23 ao art. 28"
    control_count: 6
  - id: cap-6
    title: "Protecao de Dados e Ciberseguranca"
    description: "Conformidade com a LGPD para dados de saude, anonimizacao e pseudonimizacao, seguranca de modelos de IA contra ataques adversariais e controle de acesso a dados de treinamento"
    articles: "art. 29 ao art. 33"
    control_count: 5
  - id: cap-7
    title: "Fiscalizacao e Sancoes"
    description: "Auditoria de sistemas de IA pelo CFM e CRMs, sancoes disciplinares por descumprimento e processo administrativo etico"
    articles: "art. 34 ao art. 36"
    control_count: 2
related_frameworks:
  - framework_id: eu-ai-act
    relationship: mapped
    description: >-
      Ambas as normas regulam classificacao de risco de sistemas de IA, com o CFM IA
      adaptando a abordagem europeia ao contexto medico brasileiro. Requisitos de
      transparencia, explicabilidade e supervisao humana possuem correspondencia direta.
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD complementa o CFM IA ao disciplinar o tratamento de dados pessoais
      sensiveis de saude utilizados no treinamento e operacao de modelos de inteligencia
      artificial, impondo requisitos adicionais de base legal, consentimento e direitos
      do titular.
  - framework_id: nist-ai-rmf
    relationship: mapped
    description: >-
      O NIST AI RMF fornece metodologia de gestao de riscos de IA que mapeia para os
      requisitos de classificacao de risco, governanca e monitoramento do CFM IA,
      especialmente nas funcoes Govern, Map, Measure e Manage.
  - framework_id: anvisa-samd
    relationship: complements
    description: >-
      A regulamentacao ANVISA de Software como Dispositivo Medico (SaMD) complementa o
      CFM IA na intersecao entre software medico baseado em IA e dispositivos medicos
      regulados, cobrindo aspectos de registro, vigilancia pos-mercado e classificacao
      de risco de SaMD.
  - framework_id: cfm-telemedicina
    relationship: complements
    description: >-
      A regulamentacao de telemedicina do CFM complementa o CFM IA ao disciplinar o uso
      de tecnologias de comunicacao na pratica medica, contexto em que sistemas de IA
      frequentemente operam como ferramentas de apoio a decisao clinica remota.
