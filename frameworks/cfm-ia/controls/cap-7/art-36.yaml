id: art-36
family: cap-7
title: "Sancoes Disciplinares"
class: CFM-IA
baselines: [ia-medicina-all]
statement:
  prose: |
    Art. 36. O descumprimento das disposições desta Resolução constitui
    infração ética sujeita às sanções previstas no Código de Processo
    Ético-Profissional dos Conselhos de Medicina:

    I - advertência confidencial, em caso de infração leve ou primeira
    ocorrência de não conformidade corrigida dentro do prazo determinado;

    II - censura confidencial, em caso de reincidência ou não conformidade
    com potencial dano ao paciente não materializado;

    III - censura pública, em caso de não conformidade com dano
    materializado ao paciente ou recusa persistente em adequar-se;

    IV - suspensão do exercício profissional por até 30 dias, em caso
    de dano grave ao paciente decorrente de negligência, imprudência ou
    imperícia no uso de IA, conforme tipificação do art. 19;

    V - cassação do registro profissional, em caso de uso doloso de
    sistema de IA para causar dano ao paciente ou em caso de reincidência
    de infrações graves.

    Parágrafo único. As sanções previstas neste artigo aplicam-se ao
    médico responsável pelo ato médico e, quando aplicável, ao médico
    responsável técnico da instituição, conforme responsabilidades
    definidas nos art. 17, 19 e 15, sem prejuízo de responsabilidade
    civil e criminal.
guidance:
  prose: |
    O art. 36 tipifica sancoes disciplinares, dando "dentes" a
    Resolucao. As sancoes seguem o escalonamento do Codigo de
    Processo Etico-Profissional.

    **Gradacao das sancoes:**

    - Advertencia confidencial (inciso I): sancao leve para primeira
      ocorrencia corrigida. Ex: modelo em producao sem model card
      completa, corrigido apos notificacao.

    - Censura confidencial (inciso II): sancao media para reincidencia
      ou risco potencial. Ex: sistema sem monitoramento adequado
      (risco potencial mas sem dano materializado).

    - Censura publica (inciso III): sancao grave com publicidade.
      Ex: sistema de IA que causou atraso diagnostico em paciente,
      ou recusa persistente em adequar-se apos auditoria.

    - Suspensao (inciso IV): sancao severa. Ex: medico que usou IA
      de diagnostico em populacao contraindicada (imprudencia) com
      dano grave ao paciente.

    - Cassacao (inciso V): sancao maxima, reservada para dolo ou
      reincidencia grave. Ex: medico que deliberadamente manipulou
      sistema de IA para obter resultado fraudulento.

    **Responsabilidade dupla (paragrafo unico):**
    O medico que praticou o ato e o medico responsavel tecnico podem
    ser sancionados simultaneamente, cada um na medida de sua
    responsabilidade. Alem disso, sancoes eticas nao impedem
    responsabilidade civil (indenizacao) e criminal.

    **Efeito dissuasorio:**
    A existencia de sancoes formais tem efeito preventivo. Medicos
    e instituicoes que conhecem as consequencias tendem a investir
    mais em conformidade.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de compliance preventivo:**
      1. Implementar sistema de compliance scoring que identifique
         riscos de nao conformidade antes de materializacao de
         incidentes, com alertas ao medico responsavel.
      2. Configurar dashboards de conformidade por artigo da
         Resolucao, com indicadores verde/amarelo/vermelho para
         cada requisito.
      3. Automatizar geracao de evidencias de conformidade para
         defesa em processos eticos: timestamps, logs, aprovacoes.
      4. Implementar notificacoes proativas quando prazos de
         conformidade estiverem se aproximando (ex: revisao anual,
         recertificacao).
    tools:
      - compliance-scoring
      - compliance-dashboard
      - evidence-management
      - notification-system
  devsecops:
    prose: |
      **Prevencao de nao conformidade no pipeline:**
      1. Implementar compliance gate final no pipeline que verifica
         conformidade com todos os artigos aplicaveis antes do deploy.
      2. Automatizar alerta quando deploy for realizado com nao
         conformidades conhecidas (aceitas por waiver).
      3. Manter registro de waivers de conformidade com justificativa,
         aprovacao e prazo de remediacao.
      4. Gerar report automatizado de status de conformidade para
         reuniao mensal do comite de governanca.
    tools:
      - gitlab-ci
      - compliance-gate
      - waiver-management
      - compliance-reporting
  secops:
    prose: |
      **Governanca de sancoes e remediacao:**
      1. Manter registro de todas as nao conformidades identificadas,
         com plano de remediacao, responsavel e prazo.
      2. Acompanhar resolucao de nao conformidades com SLA:
         graves (7 dias), medias (30 dias), leves (90 dias).
      3. Preparar documentacao de defesa para eventuais processos
         eticos: evidencias de diligencia, conformidade, capacitacao.
      4. Reportar ao comite de governanca status de nao conformidades
         e riscos de sancoes, com recomendacoes de priorizacao.
    tools:
      - grc-platform
      - remediation-tracking
      - legal-readiness
      - governance-reporting
