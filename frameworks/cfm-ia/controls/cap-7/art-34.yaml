id: art-34
family: cap-7
title: "Auditoria pelo CFM e CRMs"
class: CFM-IA
baselines: [ia-medicina-all]
statement:
  prose: |
    Art. 34. O Conselho Federal de Medicina e os Conselhos Regionais de
    Medicina poderão realizar auditorias em instituições de saúde e
    empresas de tecnologia para verificar conformidade com esta Resolução:

    I - a auditoria pode ser ordinária (programada) ou extraordinária
    (motivada por denúncia, incidente ou solicitação de órgão regulador);

    II - a instituição auditada deve disponibilizar acesso a documentação
    técnica, registros de governança, logs de auditoria, resultados de
    validação clínica e evidências de conformidade com esta Resolução;

    III - a auditoria deve incluir verificação de: classificação de risco,
    explicabilidade, supervisão humana, validação clínica, monitoramento
    de performance, proteção de dados e gestão de incidentes;

    IV - o resultado da auditoria deve ser formalizado em relatório com
    achados, não conformidades e prazo para correção;

    V - a reincidência em não conformidades graves ou a recusa em permitir
    auditoria constitui infração ética sujeita às sanções previstas no
    art. 36.

    Art. 35. O CFM poderá estabelecer parcerias com entidades técnicas
    e acadêmicas para apoio técnico em auditorias de sistemas de IA médica,
    incluindo avaliação de modelos, métricas de fairness e segurança.
guidance:
  prose: |
    Os art. 34 e 35 estabelecem o mecanismo de fiscalizacao, conferindo
    ao CFM e CRMs poder de auditoria sobre sistemas de IA medica.

    **Escopo da auditoria:**
    A auditoria e ampla e cobre todos os aspectos da Resolucao. Na
    pratica, os auditores verificarao:

    1. Governanca (cap. 3): o comite existe? Medico responsavel
       designado? Politica institucional aprovada?

    2. Classificacao de risco (cap. 2): sistemas classificados?
       Criterios documentados? Reclassificacoes realizadas?

    3. Supervisao humana (cap. 4): medicos capacitados? Supervisao
       proporcional ao risco? Taxa de discordancia razoavel?

    4. Validacao clinica (cap. 5): validacao independente? Metricas
       por subgrupo? Monitoramento em producao?

    5. Protecao de dados (cap. 6): LGPD cumprida? Anonimizacao?
       Controle de acesso a dados de treinamento?

    **Parcerias tecnicas (art. 35):**
    Reconhecimento de que CRMs podem nao ter expertise tecnica para
    auditar modelos de IA. A parceria com universidades e centros
    de pesquisa permite auditoria tecnica qualificada.

    **Preparacao para auditoria:**
    Instituicoes devem manter evidencias de conformidade organizadas
    e acessiveis. Nao basta estar em conformidade — e preciso
    demonstrar conformidade com evidencias documentais e tecnicas.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de auditability:**
      1. Implementar portal de compliance com todas as evidencias de
         conformidade organizadas por artigo da Resolucao, pronto
         para auditoria a qualquer momento.
      2. Automatizar coleta e organizacao de evidencias: dashboards,
         logs, relatorios de validacao, atas de comite — centralizados
         e indexados.
      3. Implementar exportacao automatica de evidencias em formato
         padronizado para auditores: PDF, CSV, JSON conforme tipo.
      4. Configurar controle de acesso para auditores: permissao de
         leitura a evidencias sem acesso a dados de pacientes ou
         propriedade intelectual do modelo.
    tools:
      - compliance-portal
      - evidence-management
      - export-automation
      - auditor-access
  devsecops:
    prose: |
      **Pipeline de evidencias de conformidade:**
      1. Automatizar geracao de evidencias de conformidade como
         artefatos do pipeline: resultados de testes, model cards,
         relatorios de validacao, logs de aprovacao.
      2. Implementar compliance-as-code: verificacao automatica
         de conformidade com cada artigo da Resolucao, gerando
         report de status para auditoria.
      3. Manter historico de todas as evidencias versionado e
         imutavel, com timestamps e assinaturas.
      4. Criar checklist automatizado de prontidao para auditoria
         que identifique gaps antes da auditoria.
    tools:
      - gitlab-ci
      - compliance-pipeline
      - evidence-versioning
      - audit-readiness
  secops:
    prose: |
      **Governanca de auditoria:**
      1. Designar responsavel por prontidao para auditoria (audit
         readiness owner) que mantenha evidencias atualizadas.
      2. Realizar auto-auditoria semestral simulando auditoria do
         CRM, identificando e corrigindo gaps proativamente.
      3. Manter cronograma de auditorias internas e externas com
         registro de achados e acoes corretivas.
      4. Preparar kit de auditoria: documentacao completa por artigo,
         contato de responsaveis, acesso a sistemas de evidencia.
    tools:
      - grc-platform
      - self-audit
      - corrective-actions
      - audit-kit
