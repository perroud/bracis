id: art-15
family: cap-3
title: "Governanca Institucional de IA Medica"
class: CFM-IA
baselines: [ia-medicina-all]
statement:
  prose: |
    Art. 15. Instituições de saúde que utilizem sistemas de IA em atividades
    médicas devem implementar estrutura de governança que inclua:

    I - designação de médico responsável técnico pela supervisão de todos
    os sistemas de IA médica em operação na instituição;

    II - constituição de comitê multidisciplinar de IA em saúde, com
    participação de profissionais médicos, engenheiros, especialistas em
    ética e representante de pacientes;

    III - política institucional de uso de IA na medicina, aprovada pela
    direção clínica, contendo critérios de seleção, implantação,
    monitoramento e desativação de sistemas de IA;

    IV - programa de capacitação continuada para profissionais médicos
    sobre uso ético e seguro de sistemas de IA, incluindo limitações
    e riscos;

    V - canal de comunicação para registro de incidentes, falhas e
    preocupações relacionadas a sistemas de IA médica, acessível a
    médicos, equipe de saúde e pacientes.
guidance:
  prose: |
    O art. 15 exige que a governanca de IA nao seja apenas tecnica, mas
    tambem institucional, com responsabilidades claras e estrutura formal.

    **Medico responsavel tecnico (inciso I):**
    Deve ser medico com registro ativo no CRM, preferencialmente com
    formacao ou experiencia em informatica medica. Responsavel por
    aprovar novos sistemas, monitorar performance e reportar ao CRM.

    **Comite multidisciplinar (inciso II):**
    A composicao exige diversidade: medicos (conhecimento clinico),
    engenheiros (conhecimento tecnico), eticistas (avaliacao etica)
    e representante de pacientes (perspectiva do usuario). O comite
    deve se reunir periodicamente e ter poder deliberativo.

    **Politica institucional (inciso III):**
    Documento formal aprovado pela direcao clinica. Deve cobrir todo
    o ciclo de vida do sistema de IA: selecao/aquisicao, implantacao,
    operacao, monitoramento, atualizacao e desativacao. Inclui criterios
    de desativacao (quando um sistema deve ser retirado de operacao).

    **Capacitacao (inciso IV):**
    Nao basta treinar medicos a usar a interface. Devem compreender
    limitacoes do sistema, cenarios de falha, como interpretar
    explicacoes e quando questionar resultados da IA.

    **Canal de incidentes (inciso V):**
    Similar a ouvidoria, mas especifico para IA. Deve ser acessivel
    a todos (medicos, enfermagem, pacientes) e alimentar o processo
    de melhoria continua e reporte regulatorio.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de governanca:**
      1. Implementar portal de governanca de IA centralizado com
         inventario de sistemas, status de conformidade, responsaveis
         e metricas de performance de cada sistema.
      2. Configurar sistema de gestao de incidentes especifico para
         IA medica, com workflow de triagem, investigacao e resolucao.
      3. Implementar plataforma de e-learning para capacitacao em IA
         medica, com trilhas por especialidade e rastreamento de
         conclusao para evidencia de conformidade.
      4. Criar dashboard executivo para o comite multidisciplinar com
         indicadores de governanca: sistemas em operacao, incidentes,
         conformidade, capacitacao.
    tools:
      - governance-portal
      - incident-management
      - e-learning-platform
      - executive-dashboard
  devsecops:
    prose: |
      **Governanca integrada ao ciclo de desenvolvimento:**
      1. Implementar workflow de aprovacao que exija assinatura do
         medico responsavel tecnico para deploy de novos sistemas
         ou atualizacoes significativas.
      2. Configurar notificacao automatica ao comite quando novo
         sistema de IA medica for proposto para implantacao.
      3. Automatizar verificacao de que equipe de desenvolvimento
         completou capacitacao obrigatoria em IA medica.
      4. Implementar processo documentado de desativacao de sistemas
         de IA (decommissioning) com preservacao de dados e evidencias.
    tools:
      - gitlab-ci
      - approval-workflow
      - training-tracking
      - decommission-pipeline
  secops:
    prose: |
      **Operacao da governanca institucional:**
      1. Apoiar o medico responsavel tecnico na supervisao operacional
         de sistemas de IA: monitoramento, incidentes, performance.
      2. Secretariar reunioes do comite multidisciplinar com atas,
         registro de decisoes e acompanhamento de acoes.
      3. Gerenciar canal de incidentes de IA: receber, classificar,
         investigar e reportar incidentes.
      4. Produzir relatorio anual de governanca de IA para a direcao
         clinica e para submissao ao CRM quando solicitado.
    tools:
      - grc-platform
      - committee-management
      - incident-management
      - regulatory-reporting
