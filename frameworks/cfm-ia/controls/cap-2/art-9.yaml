id: art-9
family: cap-2
title: "Avaliacao Pre-Mercado e Sandbox Regulatorio"
class: CFM-IA
baselines: [ia-medicina-all]
statement:
  prose: |
    Art. 9. Sistemas de IA médica classificados como risco alto ou muito alto
    devem ser submetidos a avaliação pré-mercado antes de sua utilização em
    atividades médicas:

    I - a avaliação pré-mercado deve incluir análise da documentação técnica,
    validação clínica independente e verificação de conformidade com esta
    Resolução;

    II - o CFM poderá estabelecer sandbox regulatório para permitir a
    avaliação controlada de sistemas de IA médica inovadores, sob supervisão
    direta de profissionais médicos e com limites de tempo e escopo definidos;

    III - no âmbito do sandbox, o desenvolvedor deverá apresentar relatório
    parcial de resultados a cada 6 meses e relatório final ao término do
    período de avaliação;

    IV - a aprovação no sandbox regulatório não substitui a necessidade de
    registro junto à ANVISA quando o sistema se enquadrar como dispositivo
    médico conforme legislação vigente.
guidance:
  prose: |
    O art. 9 introduz mecanismo de avaliacao previa para sistemas de maior
    risco, inspirado no conceito de sandbox regulatorio do EU AI Act e do
    Banco Central do Brasil.

    **Avaliacao pre-mercado (inciso I):**
    Nao se trata de certificacao como a da ANVISA para dispositivos medicos,
    mas sim de avaliacao etica e tecnica pelo CFM. Os elementos obrigatorios
    sao: documentacao tecnica completa, evidencia de validacao clinica por
    entidade independente e demonstracao de conformidade com todos os
    artigos aplicaveis desta Resolucao.

    **Sandbox regulatorio (inciso II):**
    O sandbox permite que sistemas inovadores sejam testados em ambiente
    real controlado, com pacientes reais mas sob supervisao estrita.
    Difere de pesquisa clinica (que segue Resolucao CNS 466/2012) por
    ser um mecanismo regulatorio do CFM, nao um protocolo de pesquisa.

    **Relatorios no sandbox (inciso III):**
    O relatorio semestral deve incluir: numero de pacientes atendidos,
    metricas de performance, incidentes adversos, desvios do protocolo
    e avaliacao de fairness. O relatorio final determina se o sistema
    pode seguir para uso geral.

    **Interface com ANVISA (inciso IV):**
    Se o sistema de IA se enquadrar como SaMD (Software as Medical Device),
    a aprovacao no sandbox do CFM nao substitui o registro na ANVISA.
    Ambos os processos devem ser conduzidos em paralelo quando aplicavel.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de sandbox e avaliacao:**
      1. Implementar ambiente de sandbox isolado para sistemas de IA em
         avaliacao, com controles de acesso, monitoramento completo e
         limites de escopo (numero de pacientes, periodo, instituicoes).
      2. Configurar pipeline de coleta automatica de metricas de
         performance no sandbox para geracao de relatorios semestrais.
      3. Implementar feature flags que permitam ativar/desativar
         sistemas em sandbox de forma granular e instantanea.
      4. Criar ambiente de staging que replique producao para validacao
         pre-mercado, com dados anonimizados representativos.
    tools:
      - sandbox-environment
      - feature-flags
      - model-monitoring
      - staging-environment
  devsecops:
    prose: |
      **Pipeline de avaliacao pre-mercado:**
      1. Criar pipeline especifico para avaliacao pre-mercado que execute
         suite completa de testes: performance, fairness, explicabilidade,
         seguranca, conformidade com todos os artigos aplicaveis.
      2. Automatizar geracao de documentacao tecnica obrigatoria para
         submissao ao CFM como artefato do pipeline.
      3. Implementar gate de sandbox que impeca transicao para producao
         sem aprovacao formal do comite de avaliacao pre-mercado.
      4. Automatizar geracao de relatorios semestrais de sandbox com
         metricas padronizadas e formatacao exigida pelo CFM.
    tools:
      - gitlab-ci
      - compliance-reports
      - sandbox-pipeline
      - documentation-generation
  secops:
    prose: |
      **Governanca de avaliacao e sandbox:**
      1. Constituir comite de avaliacao pre-mercado com medicos
         especialistas, engenheiros de ML e representante de compliance.
      2. Definir criterios objetivos de entrada e saida do sandbox:
         requisitos para admissao, metricas de sucesso, criterios de
         encerramento antecipado.
      3. Manter registro de todos os sistemas em sandbox e em avaliacao
         pre-mercado, com status e cronograma.
      4. Coordenar processo de avaliacao do CFM com processo de registro
         na ANVISA quando aplicavel, evitando duplicidade de esforco.
    tools:
      - grc-platform
      - committee-management
      - regulatory-coordination
      - sandbox-governance
legal_references:
  - framework_id: eu-ai-act
    articles: ["art-53", "art-54", "art-55"]
    relationship: mapped
  - framework_id: anvisa-samd
    articles: ["art-5", "art-6"]
    relationship: complements
