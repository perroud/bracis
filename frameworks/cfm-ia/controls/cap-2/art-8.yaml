id: art-8
family: cap-2
title: "Requisitos Proporcionais ao Nivel de Risco"
class: CFM-IA
baselines: [ia-medicina-all]
statement:
  prose: |
    Art. 8. Os requisitos de governança, transparência, validação e
    monitoramento exigidos para sistemas de IA médica devem ser proporcionais
    ao nível de risco classificado conforme art. 6 e art. 7:

    I - Risco Baixo: documentação técnica básica, registro no inventário
    institucional e monitoramento periódico de performance;

    II - Risco Médio: além dos requisitos do inciso I, explicabilidade
    documentada, validação clínica com métricas definidas e consentimento
    informado do paciente;

    III - Risco Alto: além dos requisitos dos incisos I e II, validação
    clínica com evidência estatística robusta, monitoramento contínuo de
    performance e bias, auditoria independente e documentação técnica
    completa conforme art. 16;

    IV - Risco Muito Alto: além dos requisitos dos incisos I a III,
    avaliação pré-mercado por comitê institucional de ética em IA,
    supervisão humana em tempo real, plano de contingência documentado
    e revisão independente da classificação de risco.

    Parágrafo único. A proporcionalidade não isenta nenhum sistema de IA
    médica das vedações previstas no art. 5.
guidance:
  prose: |
    O art. 8 estabelece gradacao de requisitos, evitando que a regulacao
    imponha o mesmo peso a sistemas de impacto minimo e sistemas criticos.

    **Matriz de requisitos por nivel:**

    | Requisito | Baixo | Medio | Alto | Muito Alto |
    |-----------|-------|-------|------|------------|
    | Documentacao basica | Sim | Sim | Sim | Sim |
    | Inventario | Sim | Sim | Sim | Sim |
    | Monitoramento | Periodico | Periodico | Continuo | Tempo real |
    | Explicabilidade | Nao | Sim | Sim | Sim |
    | Validacao clinica | Nao | Basica | Robusta | Robusta + revisao |
    | Consentimento | Nao | Sim | Sim | Sim |
    | Auditoria independente | Nao | Nao | Sim | Sim |
    | Comite de etica IA | Nao | Nao | Nao | Sim |
    | Supervisao tempo real | Nao | Nao | Nao | Sim |
    | Plano contingencia | Nao | Nao | Nao | Sim |

    **Cumulatividade:** cada nivel inclui todos os requisitos dos niveis
    anteriores mais requisitos adicionais. Isso simplifica a implementacao
    pois o compliance com nivel N garante compliance com niveis < N.

    **Vedacoes do art. 5:** a proporcionalidade nao flexibiliza as
    vedacoes absolutas. Mesmo um sistema de risco baixo nao pode
    tomar decisoes autonomas ou discriminar pacientes.
implementation_guidance:
  platform_engineering:
    prose: |
      **Controles proporcionais automatizados:**
      1. Implementar policy-as-code que aplique automaticamente controles
         tecnicos proporcionais ao nivel de risco: monitoramento periodico
         vs continuo vs tempo real, gates de aprovacao diferenciados.
      2. Configurar pipelines de deploy diferenciados por nivel de risco
         com gates progressivos: quanto maior o risco, mais gates.
      3. Automatizar provisionamento de infraestrutura de monitoramento
         proporcional: modelos de risco muito alto devem ter alerting
         com SLA de resposta em minutos.
      4. Implementar dashboard que mostre compliance por nivel de risco,
         evidenciando requisitos pendentes para cada modelo.
    tools:
      - opa-gatekeeper
      - kyverno
      - model-monitoring
      - compliance-dashboard
  devsecops:
    prose: |
      **Pipelines proporcionais ao risco:**
      1. Criar templates de pipeline GitLab CI diferenciados por nivel
         de risco, com inclusao automatica baseada no metadado do modelo.
      2. Implementar gates cumulativos: pipeline de risco alto herda
         todos os gates de risco medio e adiciona gates especificos.
      3. Automatizar geracao de evidencias de conformidade como artefatos
         do pipeline, com checklist proporcional ao nivel de risco.
      4. Bloquear deploy quando requisitos proporcionais nao estiverem
         satisfeitos, com report claro dos itens pendentes.
    tools:
      - gitlab-ci
      - compliance-pipeline
      - evidence-generation
      - gate-management
  secops:
    prose: |
      **Governanca proporcional:**
      1. Definir SLAs de auditoria proporcionais ao nivel de risco:
         baixo (anual), medio (semestral), alto (trimestral),
         muito alto (mensal).
      2. Implementar programa de auditoria independente para sistemas
         de risco alto e muito alto, com auditor externo qualificado.
      3. Constituir comite institucional de etica em IA para avaliacao
         pre-mercado de sistemas de risco muito alto.
      4. Manter planos de contingencia testados para sistemas de
         risco muito alto, com simulacao semestral.
    tools:
      - grc-platform
      - audit-tools
      - ethics-committee
      - contingency-planning
