id: art-33
family: cap-6
title: "Resposta a Incidentes Envolvendo IA Medica"
class: CFM-IA
baselines: [ia-medicina-all]
statement:
  prose: |
    Art. 33. Instituições que operem sistemas de IA médica devem possuir
    plano de resposta a incidentes específico para eventos envolvendo
    inteligência artificial:

    I - o plano deve cobrir cenários de: falha do sistema de IA, resultado
    incorreto que afete paciente, vazamento de dados de treinamento,
    detecção de bias discriminatório e ataque adversarial;

    II - incidentes com potencial dano ao paciente devem ser comunicados
    imediatamente ao médico responsável técnico e ao comitê de governança;

    III - quando o incidente envolver dados pessoais de saúde, a Autoridade
    Nacional de Proteção de Dados (ANPD) deve ser notificada conforme
    prazos e procedimentos da LGPD;

    IV - incidentes graves que envolvam dano real ao paciente devem ser
    notificados ao Conselho Regional de Medicina e, quando aplicável,
    à ANVISA, nos termos da legislação de tecnovigilância;

    V - toda investigação de incidente deve resultar em relatório formal
    com causa raiz, impacto, ações corretivas e preventivas, preservado
    como evidência.
guidance:
  prose: |
    O art. 33 cria regime de resposta a incidentes que integra as
    obrigacoes de diferentes reguladores: CFM (etica), ANPD (dados),
    ANVISA (seguranca de dispositivo medico).

    **Cenarios de incidente especificos de IA:**

    - Resultado incorreto com impacto clinico: IA de diagnostico nao
      detecta lesao maligna, resultando em atraso diagnostico.

    - Bias com impacto discriminatorio: modelo apresenta sensibilidade
      significativamente menor para pacientes negros, detectado em
      producao.

    - Falha de sistema critico: IA de monitoramento de UTI fica
      indisponivel, alertas nao sao gerados.

    - Vazamento de dados de treinamento: dataset com dados de
      pacientes e exposto por configuracao incorreta.

    - Ataque adversarial: inputs manipulados enganam modelo de
      triagem, alterando classificacao de urgencia.

    **Multiplas notificacoes (incisos II-IV):**
    Um unico incidente pode exigir notificacao a multiplos orgaos:
    - CFM/CRM: sempre que houver dano ao paciente
    - ANPD: quando envolver dados pessoais (prazo: 2 dias uteis)
    - ANVISA: quando sistema for registrado como dispositivo medico
    - Paciente: quando aplicavel

    **Causa raiz em IA (inciso V):**
    A investigacao de causa raiz em IA e complexa: pode ser drift de
    dados, bias emergente, falha de infraestrutura, erro de operacao
    ou combinacao de fatores. Exige equipe multidisciplinar.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de resposta a incidentes de IA:**
      1. Implementar sistema de gestao de incidentes com workflow
         especifico para IA: triagem, investigacao, comunicacao,
         mitigacao, pos-mortem.
      2. Configurar alertas automaticos de incidentes: deteccao de
         resultados anomalos, falha de sistema, metricas de
         performance fora do limiar.
      3. Implementar captura automatica de evidencias no momento do
         incidente: snapshot do modelo, dados de entrada, logs,
         estado do sistema.
      4. Criar runbooks automatizados para cenarios conhecidos:
         desativacao de modelo, ativacao de fallback, notificacao
         a stakeholders.
    tools:
      - incident-management
      - alerting
      - evidence-capture
      - runbook-automation
  devsecops:
    prose: |
      **Resposta a incidentes no pipeline:**
      1. Implementar pipeline de investigacao de incidentes: coleta
         automatica de artefatos (modelo, dados, logs, metricas)
         para analise pos-incidente.
      2. Automatizar rollback de modelo quando incidente for
         relacionado a versao especifica do modelo.
      3. Implementar pipeline de hotfix para correcao rapida de
         modelos, com validacao minima acelerada para emergencias.
      4. Criar templates de pos-mortem especificos para incidentes
         de IA, com campos para causa raiz tecnica e clinica.
    tools:
      - gitlab-ci
      - incident-pipeline
      - rollback-automation
      - postmortem-templates
  secops:
    prose: |
      **Operacao de resposta a incidentes:**
      1. Treinar equipe de resposta a incidentes em cenarios
         especificos de IA: como investigar resultado incorreto,
         bias, ataque adversarial.
      2. Manter lista de contatos atualizados para notificacao:
         medico responsavel, comite de governanca, CRM, ANPD,
         ANVISA.
      3. Realizar simulacoes semestrais de incidentes de IA para
         testar plano de resposta e tempo de reacao.
      4. Manter registro de todos os incidentes de IA com lessons
         learned para melhoria continua do processo.
    tools:
      - incident-response
      - notification-system
      - tabletop-exercises
      - lessons-learned
