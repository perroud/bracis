id: art-2
family: cap-1
title: "Definicoes de Inteligencia Artificial na Medicina"
class: CFM-IA
baselines: [ia-medicina-all]
statement:
  prose: |
    Art. 2. Para os fins desta Resolução, consideram-se as seguintes definições:

    I - Inteligência Artificial (IA): sistemas computacionais que utilizam
    técnicas de aprendizado de máquina, redes neurais, processamento de linguagem
    natural ou outras abordagens algorítmicas para realizar inferências, predições
    ou recomendações a partir de dados;

    II - Sistema de IA Médica: qualquer sistema de inteligência artificial
    projetado, desenvolvido ou utilizado para auxiliar, complementar ou automatizar
    atividades médicas conforme definidas no art. 1;

    III - Decisão Clínica Assistida por IA: decisão médica tomada pelo profissional
    com base total ou parcial em resultados, recomendações ou inferências produzidas
    por sistema de IA médica;

    IV - Explicabilidade: capacidade de um sistema de IA médica fornecer justificativas
    compreensíveis sobre suas inferências, predições ou recomendações, em linguagem
    acessível ao médico e, quando aplicável, ao paciente;

    V - Supervisão Humana Significativa: acompanhamento ativo e informado por
    profissional médico habilitado de todas as etapas do processo decisório em
    que sistema de IA médica participe.
guidance:
  prose: |
    O art. 2 estabelece o vocabulario normativo da Resolucao, alinhando
    definicoes tecnicas de IA com a realidade da pratica medica.

    **Aspectos criticos das definicoes:**

    - A definicao de IA (inciso I) e tecnologicamente neutra e abrangente,
      cobrindo desde modelos classicos de ML ate foundation models e LLMs.
      Nao se limita a deep learning.

    - A definicao de Sistema de IA Medica (inciso II) inclui tanto sistemas
      desenvolvidos especificamente para medicina quanto sistemas de proposito
      geral adaptados para uso medico (ex: LLMs usados para sumarizacao
      de prontuarios).

    - Decisao Clinica Assistida por IA (inciso III) abrange cenarios em que
      a IA contribui parcialmente para a decisao, nao apenas quando a IA
      e o unico fator. Isso captura cenarios de "segundo diagnostico" ou
      "confirmacao algortimica".

    - Explicabilidade (inciso IV) exige duplo nivel: tecnico (para o medico)
      e leigo (para o paciente). Modelos black-box devem ter mecanismos
      de interpretabilidade.

    - Supervisao Humana Significativa (inciso V) nao se satisfaz com mera
      homologacao formal. Exige acompanhamento ativo e informado, ou seja,
      o medico deve compreender o funcionamento do sistema e ser capaz de
      questionar seus resultados.
implementation_guidance:
  platform_engineering:
    prose: |
      **Taxonomia e catalogacao de sistemas de IA:**
      1. Implementar taxonomia padronizada para classificacao de sistemas
         de IA medica conforme definicoes do art. 2: tipo de modelo, tecnica
         de IA, finalidade clinica, nivel de autonomia.
      2. Criar registro central (model registry) com metadados obrigatorios:
         tecnica de IA utilizada (ML, DL, NLP, etc.), tipo de decisao assistida,
         nivel de explicabilidade disponivel.
      3. Implementar schema de metadados para model cards que capture todas
         as definicoes do art. 2, integrando com pipeline de ML.
      4. Automatizar validacao de que todo sistema de IA medica registrado
         possua documentacao de explicabilidade antes de ser disponibilizado.
    tools:
      - ml-registry
      - model-catalog
      - metadata-schema
      - model-cards
  devsecops:
    prose: |
      **Documentacao de conformidade com definicoes:**
      1. Implementar template obrigatorio de model card que enderece cada
         definicao do art. 2: tipo de IA, classificacao como sistema de IA
         medica, tipo de decisao assistida, nivel de explicabilidade.
      2. Automatizar verificacao no CI/CD de que todo modelo possui model
         card preenchida antes de merge em branch principal.
      3. Criar checklist automatizado de conformidade que valide aderencia
         as definicoes do art. 2 como pre-requisito para deploy.
      4. Documentar no pipeline o nivel de supervisao humana requerido
         para cada modelo, conforme inciso V.
    tools:
      - gitlab-ci
      - model-cards
      - compliance-checklist
      - documentation-pipeline
  secops:
    prose: |
      **Governanca de definicoes e classificacao:**
      1. Treinar equipes medicas e de tecnologia sobre as definicoes do
         art. 2, garantindo entendimento uniforme em toda a organizacao.
      2. Criar processo de classificacao de novos sistemas, com comite
         multidisciplinar (medicos, engenheiros de ML, compliance) que
         determine se um sistema se enquadra como IA medica.
      3. Manter glossario institucional alinhado com as definicoes do
         CFM IA, atualizado a cada revisao normativa.
      4. Auditar periodicamente se sistemas em operacao estao corretamente
         classificados conforme as definicoes vigentes.
    tools:
      - grc-platform
      - training-platform
      - glossary-management
      - audit-tools
