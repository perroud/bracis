id: art-3
family: cap-1
title: "Classificacao de Escopo de Sistemas de IA Medica"
class: CFM-IA
baselines: [ia-medicina-all]
statement:
  prose: |
    Art. 3. Os sistemas de inteligência artificial utilizados na medicina
    classificam-se, quanto ao escopo de atuação, em:

    I - Sistemas de Apoio ao Diagnóstico: sistemas que analisam dados clínicos,
    laboratoriais ou de imagem para sugerir diagnósticos ou diagnósticos
    diferenciais ao médico;

    II - Sistemas de Apoio Terapêutico: sistemas que recomendam protocolos
    de tratamento, dosagens medicamentosas, planos de reabilitação ou
    intervenções terapêuticas;

    III - Sistemas de Triagem e Priorização: sistemas que classificam
    pacientes por urgência, gravidade ou necessidade de atendimento;

    IV - Sistemas de Monitoramento Contínuo: sistemas que acompanham
    parâmetros clínicos em tempo real e geram alertas ou ações automáticas;

    V - Sistemas de Predição e Prognóstico: sistemas que estimam evolução
    clínica, risco de complicações ou desfechos esperados para o paciente.
guidance:
  prose: |
    O art. 3 cria taxonomia funcional dos sistemas de IA medica, que serve
    como base para a classificacao de risco do cap. 2.

    **Implicacoes praticas por categoria:**

    - Sistemas de Apoio ao Diagnostico (inciso I): inclui IA para analise
      de imagens medicas (radiologia, patologia, dermatologia), IA para
      interpretacao de exames laboratoriais, sistemas de diagnostico
      diferencial baseados em sintomas.

    - Sistemas de Apoio Terapeutico (inciso II): inclui sistemas de
      suporte a decisao para prescricao (drug-drug interaction, ajuste
      de dose renal), protocolos de tratamento oncologico assistidos por
      IA, planejamento cirurgico computadorizado.

    - Sistemas de Triagem e Priorizacao (inciso III): inclui triagem de
      pronto-socorro assistida por IA, priorizacao de laudos radiologicos,
      classificacao de risco (Manchester, ESI) assistida por algoritmo.

    - Sistemas de Monitoramento Continuo (inciso IV): inclui monitoramento
      de pacientes em UTI com alertas preditivos, wearables medicos com
      IA embarcada, deteccao de arritmias em tempo real.

    - Sistemas de Predicao e Prognostico (inciso V): inclui scores de risco
      de mortalidade, predicao de readmissao hospitalar, modelos de
      progressao de doenca.

    **Um sistema pode se enquadrar em mais de uma categoria.** Nesse caso,
    a classificacao de risco (cap. 2) deve considerar a categoria de
    maior impacto clinico.
implementation_guidance:
  platform_engineering:
    prose: |
      **Registro e classificacao funcional de modelos:**
      1. Implementar campo obrigatorio no model registry para classificacao
         conforme art. 3: diagnostico, terapeutico, triagem, monitoramento,
         predicao — permitindo multiplas categorias por modelo.
      2. Automatizar validacao de que todo modelo possui ao menos uma
         classificacao funcional antes de registro no catalogo.
      3. Criar dashboards de inventario agrupados por categoria funcional
         para visibilidade da gestao e compliance.
      4. Implementar workflow de classificacao que exija aprovacao de medico
         responsavel para definicao da categoria funcional.
    tools:
      - ml-registry
      - model-catalog
      - workflow-engine
      - compliance-dashboard
  devsecops:
    prose: |
      **Classificacao funcional integrada ao pipeline:**
      1. Exigir no CI/CD que o model card contenha classificacao funcional
         conforme art. 3 como campo obrigatorio pre-deploy.
      2. Implementar validacao automatizada de que modelos classificados
         como triagem ou monitoramento continuo possuem requisitos
         adicionais de latencia e disponibilidade documentados.
      3. Aplicar pipelines de teste diferenciados por categoria: modelos
         de diagnostico exigem metricas de sensibilidade/especificidade,
         modelos de triagem exigem testes de fairness.
      4. Documentar no repositorio a justificativa da classificacao
         funcional escolhida, com aprovacao do medico responsavel.
    tools:
      - gitlab-ci
      - model-cards
      - ml-testing
      - fairness-toolkit
  secops:
    prose: |
      **Governanca da classificacao funcional:**
      1. Criar comite de classificacao com medicos de diferentes
         especialidades para avaliar enquadramento de novos sistemas.
      2. Revisar classificacao funcional anualmente ou quando houver
         mudanca significativa no escopo de atuacao do sistema.
      3. Manter registro historico de mudancas de classificacao para
         rastreabilidade regulatoria e auditoria pelo CRM.
      4. Alinhar classificacao funcional do CFM IA com classificacao
         de risco ANVISA para SaMD, quando aplicavel.
    tools:
      - grc-platform
      - audit-trail
      - regulatory-mapping
      - committee-management
