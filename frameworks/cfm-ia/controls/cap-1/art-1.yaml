id: art-1
family: cap-1
title: "Objeto e Ambito de Aplicacao"
class: CFM-IA
baselines: [ia-medicina-all]
statement:
  prose: |
    Art. 1. Esta Resolução estabelece normas éticas e técnicas para o uso de
    sistemas de inteligência artificial na prática médica, aplicando-se a todos
    os médicos inscritos nos Conselhos Regionais de Medicina, bem como a
    instituições de saúde e empresas de tecnologia que desenvolvam, implementem
    ou operem sistemas de IA destinados a auxiliar atividades médicas.

    Parágrafo único. Para os fins desta Resolução, consideram-se atividades
    médicas assistidas por IA o diagnóstico, prognóstico, planejamento terapêutico,
    prescrição, triagem, monitoramento de pacientes e qualquer outra atividade
    clínica em que sistemas de inteligência artificial participem do processo
    decisório, direta ou indiretamente.
guidance:
  prose: |
    O art. 1 delimita o escopo da Resolucao CFM 2.454/2026 como o instrumento
    regulatorio central do Conselho Federal de Medicina para disciplinar o uso
    de inteligencia artificial na medicina.

    **Sujeitos regulados:**
    - Medicos: todos os profissionais inscritos em CRM, independentemente de
      especialidade ou vinculo empregaticio
    - Instituicoes de saude: hospitais, clinicas, laboratorios, operadoras
      de planos de saude que utilizem IA em atividades medicas
    - Empresas de tecnologia: desenvolvedoras de sistemas de IA medica,
      incluindo startups de healthtech e grandes fornecedores

    **Atividades medicas em escopo:**
    A definicao e ampla e cobre qualquer participacao de IA no processo
    decisorio clinico. Nao se restringe a sistemas que tomam decisoes
    autonomas — inclui tambem ferramentas de suporte a decisao, triagem
    automatizada, alertas clinicos e analise de imagens medicas.

    **Limites do escopo:**
    Sistemas de IA utilizados exclusivamente em atividades administrativas
    (agendamento, faturamento, gestao de leitos) sem impacto direto na
    decisao clinica nao estao no escopo desta Resolucao, salvo quando
    processem dados clinicos de pacientes.
implementation_guidance:
  platform_engineering:
    prose: |
      **Inventario e classificacao de sistemas de IA medica:**
      1. Catalogar todos os sistemas de IA que participam direta ou
         indiretamente de atividades medicas, incluindo modelos de ML
         embarcados em dispositivos medicos e APIs de terceiros.
      2. Implementar registro automatizado de sistemas de IA com metadados
         de classificacao: finalidade clinica, tipo de modelo, dados de
         entrada, escopo de pacientes afetados.
      3. Manter mapa de dependencias entre modelos de IA, fontes de dados
         clinicos e sistemas de prontuario eletronico (PEP/EMR).
      4. Definir politica como codigo (OPA/Kyverno) que identifica
         automaticamente workloads de IA medica em escopo da Resolucao.
    tools:
      - cmdb
      - opa-gatekeeper
      - kyverno
      - ml-registry
      - model-catalog
  devsecops:
    prose: |
      **Pipeline de conformidade para IA medica:**
      1. Criar label/tag de repositorios que identifique projetos de IA
         medica para aplicacao de pipeline de conformidade especializado.
      2. Implementar gate de conformidade no CI/CD que verifica se novos
         modelos ou atualizacoes atendem requisitos do CFM IA antes do
         deploy em ambiente clinico.
      3. Documentar no pipeline quais controles do CFM IA cada modelo
         de IA deve satisfazer, com evidencias automatizadas.
      4. Bloquear deploy de modelos de IA medica sem registro previo
         no catalogo de sistemas em escopo.
    tools:
      - gitlab-ci
      - compliance-pipeline
      - ml-pipeline
      - model-registry
  secops:
    prose: |
      **Governanca de conformidade com CFM:**
      1. Designar responsavel interno pelo programa de conformidade CFM IA
         (medico responsavel tecnico + equipe de compliance).
      2. Criar registro formal de todos os sistemas de IA medica em
         operacao, com identificacao do medico responsavel por cada sistema.
      3. Mapear controles implementados versus exigencias do CFM IA em
         matriz de conformidade atualizada trimestralmente.
      4. Estabelecer processo de notificacao ao CRM regional em caso de
         incidentes envolvendo IA em atividades medicas.
    tools:
      - grc-platform
      - regulatory-tracking
      - compliance-dashboard
      - incident-management
