id: art-4
family: cap-1
title: "Principios Eticos Fundamentais"
class: CFM-IA
baselines: [ia-medicina-all]
statement:
  prose: |
    Art. 4. O uso de sistemas de inteligência artificial na medicina deve
    observar os seguintes princípios éticos fundamentais:

    I - Beneficência: o sistema de IA deve ser projetado e utilizado com
    o objetivo primário de beneficiar o paciente e promover sua saúde;

    II - Não-maleficência: o sistema de IA não deve causar dano ao paciente,
    devendo seus riscos ser continuamente monitorados e mitigados;

    III - Autonomia do paciente: o paciente deve ser informado sobre o uso
    de IA em seu atendimento e ter direito de recusar a utilização de
    sistemas de IA, sem prejuízo de seu tratamento;

    IV - Justiça e equidade: o sistema de IA deve tratar pacientes de forma
    equitativa, sem discriminação por raça, gênero, idade, condição
    socioeconômica, origem geográfica ou qualquer outro fator;

    V - Transparência: o funcionamento do sistema de IA deve ser transparente
    para o médico e, na medida do possível, para o paciente;

    VI - Responsabilidade: deve haver atribuição clara de responsabilidade
    por decisões clínicas assistidas por IA, cabendo sempre ao médico a
    responsabilidade final pelo ato médico.
guidance:
  prose: |
    O art. 4 estabelece os principios eticos que fundamentam toda a
    regulamentacao, alinhados com o Codigo de Etica Medica e com
    principios internacionais de etica em IA (UNESCO, OMS).

    **Aplicacao pratica dos principios:**

    - Beneficencia (inciso I): nao basta que o sistema "funcione" — deve
      haver evidencia clinica de que seu uso melhora desfechos para o
      paciente em comparacao com o padrao de cuidado sem IA.

    - Nao-maleficencia (inciso II): exige monitoramento ativo pos-deploy.
      Um modelo que degrada performance ao longo do tempo viola este
      principio se nao houver mecanismo de deteccao.

    - Autonomia (inciso III): o paciente pode recusar IA sem sofrer
      penalidade no atendimento. O consentimento deve ser informado e
      especifico — consentimento generico nao atende.

    - Justica e equidade (inciso IV): este e o principio mais desafiador
      tecnicamente. Exige avaliacao de bias em todas as etapas: dados de
      treinamento, modelo, inferencia e impacto clinico.

    - Transparencia (inciso V): nao exige que o paciente compreenda o
      algoritmo, mas sim que seja informado sobre o uso de IA e receba
      explicacao adequada ao seu nivel de compreensao.

    - Responsabilidade (inciso VI): a empresa de tecnologia pode ter
      responsabilidade civil/contratual, mas a responsabilidade etico-
      profissional e sempre do medico.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura para principios eticos:**
      1. Implementar framework de fairness-aware ML na plataforma de
         treinamento, com metricas obrigatorias de equidade por subgrupo
         demografico (equalized odds, demographic parity, calibration).
      2. Configurar monitoramento continuo de performance por subgrupo
         em producao, com alertas automaticos quando metricas de equidade
         divergirem alem de limiares pre-definidos.
      3. Implementar feature flags para desativar sistemas de IA em
         caso de deteccao de dano, sem afetar fluxo clinico.
      4. Manter registro de evidencias clinicas (estudos, validacoes)
         que suportem o principio de beneficencia para cada modelo.
    tools:
      - fairness-toolkit
      - model-monitoring
      - feature-flags
      - evidence-registry
  devsecops:
    prose: |
      **Pipeline etico para IA medica:**
      1. Integrar testes de fairness obrigatorios no CI/CD: nenhum modelo
         passa para producao sem validacao de equidade por subgrupo.
      2. Implementar ethical impact assessment automatizado como gate
         de pipeline, verificando aderencia aos 6 principios do art. 4.
      3. Exigir documentacao de evidencia de beneficencia (estudo clinico,
         comparacao com baseline) como artefato obrigatorio no pipeline.
      4. Automatizar verificacao de que o modelo possui mecanismo de
         explicabilidade ativo antes do deploy.
    tools:
      - gitlab-ci
      - fairness-tests
      - ethical-assessment
      - model-cards
  secops:
    prose: |
      **Governanca etica operacional:**
      1. Constituir Comite de Etica em IA Medica com representantes de
         corpo clinico, engenharia, compliance e representante de pacientes.
      2. Implementar processo de denuncia e investigacao para violacoes
         dos principios eticos, com prazo maximo de resposta.
      3. Realizar auditoria etica semestral de todos os sistemas de IA
         medica em operacao, com relatorio ao CRM.
      4. Documentar e publicar internamente politica de autonomia do
         paciente, incluindo fluxo de recusa de IA.
    tools:
      - ethics-committee
      - grc-platform
      - audit-tools
      - incident-management
