id: art-21
family: cap-4
title: "Relacao Medico-Paciente e IA"
class: CFM-IA
baselines: [ia-medicina-all]
statement:
  prose: |
    Art. 21. O uso de sistemas de inteligência artificial não deve
    comprometer a relação médico-paciente:

    I - o médico deve comunicar ao paciente, de forma clara e acessível,
    quando sistema de IA for utilizado em seu atendimento, explicando
    a natureza da assistência fornecida pelo sistema;

    II - o atendimento médico não pode ser reduzido a mera transmissão
    de resultados gerados por IA, devendo o médico manter diálogo
    clínico qualificado com o paciente;

    III - o paciente tem direito de receber explicação sobre como a IA
    contribuiu para a decisão clínica, em linguagem compatível com seu
    nível de compreensão;

    IV - a presença de IA no atendimento não substitui a anamnese,
    o exame físico e a avaliação clínica direta pelo médico, quando
    indicados;

    V - o médico deve estar atento a impactos psicológicos da IA sobre
    o paciente, incluindo ansiedade gerada por alertas automáticos ou
    desconfiança em relação à tecnologia.
guidance:
  prose: |
    O art. 21 protege a dimensao humana da medicina frente a
    automatizacao, reafirmando que IA e ferramenta do medico,
    nao substituta da relacao terapeutica.

    **Comunicacao com paciente (incisos I e III):**
    A comunicacao deve ser proativa e adaptada. Para paciente com
    alta literacia digital, pode ser mais tecnica. Para paciente
    idoso ou com baixa escolaridade, deve ser simplificada. O
    principio e: o paciente deve entender o suficiente para
    exercer sua autonomia.

    **Qualidade do atendimento (inciso II):**
    O risco e a "consulta de 3 minutos assistida por IA": medico
    entra, mostra resultado da IA, pergunta se paciente tem duvida
    e sai. Isso viola o espirito da Resolucao. O medico deve
    contextualizar o resultado, discutir opcoes e acolher o paciente.

    **Avaliacao clinica direta (inciso IV):**
    IA nao substitui semiologia. Se IA de imagem sugere diagnostico,
    o medico deve correlacionar com anamnese, exame fisico e contexto.
    Diagnostico exclusivamente por IA, sem avaliacao clinica presencial
    (quando indicada), viola este artigo.

    **Impacto psicologico (inciso V):**
    Wearables com IA podem gerar ansiedade (alertas falsos positivos).
    Diagnosticos assistidos por IA podem ser percebidos como "menos
    humanos" por pacientes. O medico deve estar atento e gerenciar
    essas percepcoes.
implementation_guidance:
  platform_engineering:
    prose: |
      **Interface centrada no paciente:**
      1. Projetar interfaces de IA medica que priorizem a relacao
         medico-paciente: resultados de IA devem ser apresentados
         ao medico primeiro, nao diretamente ao paciente.
      2. Implementar modos de comunicacao com paciente configuraveis
         por nivel de literacia em saude e preferencias pessoais.
      3. Configurar limites de alerta para wearables e monitoramento
         continuo: evitar excesso de notificacoes que gerem ansiedade.
      4. Criar templates de comunicacao com paciente sobre uso de IA,
         validados por medicos e especialistas em comunicacao em saude.
    tools:
      - emr-integration
      - patient-portal
      - notification-management
      - content-management
  devsecops:
    prose: |
      **Validacao de experiencia do paciente:**
      1. Implementar testes de usabilidade com pacientes para
         interfaces que apresentem resultados de IA, verificando
         compreensibilidade e impacto emocional.
      2. Validar que alertas de IA para pacientes possuem calibracao
         adequada: minimizar falsos positivos que geram ansiedade.
      3. Testar que fluxo clinico com IA mantem espaco para dialogo
         medico-paciente (nao e apenas tela de resultado).
      4. Implementar metricas de qualidade de comunicacao como
         criterio de aceitacao no pipeline.
    tools:
      - usability-testing
      - patient-experience
      - alert-calibration
      - acceptance-criteria
  secops:
    prose: |
      **Monitoramento da relacao medico-paciente:**
      1. Implementar pesquisa de satisfacao do paciente especifica
         para atendimentos com IA: percepcao de qualidade, sensacao
         de acolhimento, compreensao.
      2. Monitorar reclamacoes e elogios relacionados a IA na
         ouvidoria, classificando por tipo e sistema.
      3. Avaliar impacto da IA no tempo de consulta: IA deve
         otimizar, nao comprimir, o tempo de atendimento.
      4. Reportar metricas de relacao medico-paciente ao comite
         de governanca para melhoria continua.
    tools:
      - patient-survey
      - ombudsman-system
      - analytics-platform
      - governance-reporting
