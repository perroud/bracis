id: art-20
family: cap-4
title: "Capacitacao Medica para Uso de IA"
class: CFM-IA
baselines: [ia-medicina-all]
statement:
  prose: |
    Art. 20. O médico que utilize sistema de IA em sua prática clínica
    deve possuir capacitação adequada que inclua:

    I - compreensão dos princípios básicos de funcionamento do sistema
    de IA utilizado, incluindo tipo de modelo, dados de treinamento e
    métricas de performance;

    II - conhecimento das limitações do sistema, cenários de falha
    conhecidos e populações em que o sistema não foi validado;

    III - habilidade para interpretar explicações fornecidas pelo sistema
    e integrá-las com julgamento clínico próprio;

    IV - conhecimento do protocolo de supervisão aplicável ao nível
    de risco do sistema;

    V - habilidade para identificar resultados inconsistentes ou
    potencialmente errôneos do sistema de IA.

    Parágrafo único. As instituições de ensino médico devem incluir em
    seus currículos conteúdos sobre inteligência artificial aplicada à
    medicina, ética em IA e competências digitais em saúde.
guidance:
  prose: |
    O art. 20 trata da capacitacao do medico como pre-requisito para
    uso etico e seguro de IA, alinhado com a tipificacao de impericia
    do art. 19-II.

    **Niveis de capacitacao:**

    A capacitacao nao exige que o medico se torne cientista de dados.
    Os incisos descrevem competencias praticas:

    - Principios basicos (inciso I): compreender que o modelo foi
      treinado com certos dados e tem certa performance. Nao exige
      entender backpropagation ou arquitetura de redes neurais.

    - Limitacoes (inciso II): saber quando nao confiar no sistema.
      Ex: "Este modelo foi treinado com dados de hospitais terciarios
      e pode ter performance reduzida em atenacao primaria."

    - Interpretacao de explicacoes (inciso III): entender o que
      significa "confianca de 87%" ou "feature mais importante:
      tamanho da lesao". Converter informacao de IA em decisao clinica.

    - Protocolo de supervisao (inciso IV): saber seu papel na
      supervisao conforme nivel de risco (art. 18).

    - Deteccao de erros (inciso V): reconhecer quando o resultado
      da IA "nao faz sentido" clinicamente. Essa e a competencia
      mais importante e mais dificil de ensinar.

    **Formacao academica (paragrafo unico):**
    A Resolucao estende o impacto para a formacao medica, sinalizando
    que IA em medicina sera parte do curriculo obrigatorio.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de capacitacao:**
      1. Implementar plataforma de e-learning com modulos especificos
         por sistema de IA: cada modelo deve ter curso associado que
         cubra os 5 incisos do art. 20.
      2. Configurar certificacao digital com validade temporal:
         medico deve recertificar periodicamente (sugestao: anual).
      3. Integrar registro de capacitacao com controle de acesso:
         medico sem certificacao valida nao pode utilizar o sistema.
      4. Implementar modulos de simulacao: cenarios clinicos com IA
         para treinar deteccao de erros (inciso V) em ambiente seguro.
    tools:
      - e-learning-platform
      - certification-system
      - access-control
      - simulation-environment
  devsecops:
    prose: |
      **Integracao de capacitacao no pipeline:**
      1. Implementar gate de acesso que verifica certificacao valida
         do medico antes de permitir uso de sistema de IA em producao.
      2. Automatizar geracao de material de capacitacao a partir da
         model card: converter documentacao tecnica em modulo de
         treinamento para medicos.
      3. Implementar testes de conhecimento integrados ao sistema:
         quiz periodico sobre limitacoes e cenarios de falha.
      4. Rastrear metricas de capacitacao como KPI de compliance:
         percentual de medicos certificados por sistema.
    tools:
      - gitlab-ci
      - access-control
      - content-generation
      - assessment-platform
  secops:
    prose: |
      **Governanca de capacitacao:**
      1. Monitorar cobertura de capacitacao: todos os medicos que
         utilizam IA devem ter certificacao valida.
      2. Auditar qualidade da capacitacao: testes de conhecimento,
         avaliacao de desempenho em simulacoes.
      3. Identificar gaps de capacitacao por especialidade e unidade,
         priorizando programas de treinamento.
      4. Reportar metricas de capacitacao ao comite de governanca
         e ao CRM quando solicitado.
    tools:
      - training-management
      - assessment-analytics
      - gap-analysis
      - governance-reporting
legal_references:
  - framework_id: eu-ai-act
    articles: ["art-4a", "art-14"]
    relationship: mapped
  - framework_id: nist-ai-rmf
    articles: ["govern-4"]
