id: art-2
family: cap-1
title: "Abrangencia e Exercicio da Atividade de Ciberseguranca"
class: PNCIBER
baselines: [nacional]
statement:
  prose: |
    Art. 2. Para os fins deste Decreto, o exercício da atividade de cibersegurança
    abrange as ações destinadas a garantir a confidencialidade, a integridade, a
    autenticidade e a disponibilidade das informações no espaço cibernético nacional.

    Parágrafo único. O exercício da atividade de cibersegurança abrange a segurança
    física e lógica de sistemas de informação, redes de computadores, infraestruturas
    de comunicação e os dados neles processados, armazenados ou em trânsito.
guidance:
  prose: |
    O art. 2 define o escopo material da PNCiber estabelecendo o conceito operacional
    de ciberseguranca adotado pelo decreto.

    **Triade expandida:**
    Alem da triade classica CIA (Confidentiality, Integrity, Availability), o decreto
    inclui autenticidade como quarto pilar, alinhando-se ao modelo de seguranca da
    informacao brasileiro (IN GSI/PR n. 1).

    **Escopo fisico e logico:**
    O paragrafo unico deixa claro que a ciberseguranca nao se restringe ao logico
    (software, dados, redes), mas abrange tambem a seguranca fisica dos ativos de TI:
    - Sistemas de informacao (aplicacoes, bancos de dados)
    - Redes de computadores (LAN, WAN, backbone)
    - Infraestruturas de comunicacao (fibra, satelite, 5G)
    - Dados em processamento, armazenamento ou transito

    **Alinhamento internacional:**
    O conceito e compativel com definicoes do NIST (SP 800-53), ISO 27001 e ITU-T X.1205.
implementation_guidance:
  platform_engineering:
    prose: |
      **Garantia dos quatro pilares (CIAD):**
      1. Confidencialidade: implementar criptografia em transito (TLS 1.3) e em repouso
         (AES-256) para todos os dados em infraestrutura critica.
      2. Integridade: implementar checksums, assinaturas digitais e controle de versao
         imutavel para artefatos e configuracoes.
      3. Autenticidade: implementar autenticacao forte (MFA/FIDO2), certificados digitais
         e mutual TLS para comunicacao entre servicos.
      4. Disponibilidade: implementar arquitetura de alta disponibilidade (HA), disaster
         recovery e testes de resiliencia periodicos.
    tools:
      - vault
      - cert-manager
      - mfa-provider
      - ha-infrastructure
      - backup-system
  devsecops:
    prose: |
      **Controles CIAD no pipeline:**
      1. Secret detection para prevenir exposicao de credenciais e chaves criptograficas
         que comprometam confidencialidade.
      2. Assinatura de commits e artefatos para garantir autenticidade e integridade
         da cadeia de suprimentos de software.
      3. Testes de disponibilidade (chaos engineering) integrados ao pipeline para
         validar resiliencia antes de deploys em producao.
      4. Scans de configuracao (IaC scanning) para validar que parametros de seguranca
         estao corretos em todos os ambientes.
    tools:
      - gitlab-ci
      - secret-detection
      - cosign
      - chaos-engineering
      - iac-scanner
  secops:
    prose: |
      **Monitoramento dos quatro pilares:**
      1. SIEM configurado para detectar violacoes de confidencialidade (exfiltracao),
         integridade (adulteracao), autenticidade (spoofing) e disponibilidade (DDoS).
      2. Classificacao de ativos por criticidade e mapeamento aos quatro pilares,
         definindo controles proporcionais ao risco.
      3. Metricas de seguranca mapeadas aos quatro pilares com dashboards executivos
         e relatorios periodicos.
      4. Exercicios de table-top e simulacoes de incidentes cobrindo cenarios de
         violacao de cada pilar.
    tools:
      - siem
      - asset-classification
      - security-dashboard
      - incident-simulation
