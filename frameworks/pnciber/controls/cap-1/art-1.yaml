id: art-1
family: cap-1
title: "Instituicao da Politica Nacional de Ciberseguranca"
class: PNCIBER
baselines: [nacional]
statement:
  prose: |
    Art. 1. Fica instituída a Política Nacional de Cibersegurança (PNCiber), no âmbito
    da administração pública federal, com a finalidade de orientar a atividade de
    cibersegurança no País.

    Parágrafo único. A PNCiber tem como finalidade orientar a atividade de
    cibersegurança no País nos seguintes aspectos:
    I - cibersegurança nacional;
    II - proteção e fortalecimento da resiliência das infraestruturas críticas nacionais;
    III - cooperação entre entes públicos, entre o setor privado e o setor público,
    e entre a sociedade e o Estado em matéria de cibersegurança;
    IV - desenvolvimento de mecanismos de regulação, fiscalização e controle
    destinados a aprimorar a segurança e a resiliência cibernéticas nacionais; e
    V - educação e desenvolvimento tecnológico em cibersegurança.
guidance:
  prose: |
    O art. 1 institui formalmente a PNCiber como politica publica transversal que
    abrange toda a administracao publica federal e orienta a atividade de ciberseguranca
    em ambito nacional.

    **Cinco eixos estrategicos:**
    1. Ciberseguranca nacional: visao soberana e estrategica da seguranca no espaco cibernetico.
    2. Infraestruturas criticas: energia, telecomunicacoes, financeiro, transporte, agua,
       saude e outros setores essenciais.
    3. Cooperacao publico-privada: mecanismo de articulacao entre governo, empresas e
       sociedade civil.
    4. Regulacao e fiscalizacao: desenvolvimento de marcos regulatorios setoriais.
    5. Educacao e tecnologia: formacao de capital humano e fomento a pesquisa nacional.

    **Abrangencia:**
    Embora dirija-se primariamente a administracao publica federal, a PNCiber tem
    vocacao de orientar toda a atividade de ciberseguranca no pais, incluindo setor
    privado e infraestruturas criticas operadas por particulares.
implementation_guidance:
  platform_engineering:
    prose: |
      **Alinhamento com politica nacional de ciberseguranca:**
      1. Adotar frameworks de seguranca reconhecidos (NIST CSF, ISO 27001) como base
         tecnica para operacionalizar os eixos da PNCiber na infraestrutura.
      2. Implementar segmentacao de rede e arquitetura zero-trust para protecao de
         infraestruturas criticas conforme eixo II.
      3. Manter inventario completo de ativos digitais criticos com classificacao
         por nivel de criticidade para a nacao.
      4. Implementar telemetria e observabilidade centralizada para deteccao precoce
         de ameacas ciberneticas em infraestruturas criticas.
    tools:
      - zero-trust-architecture
      - asset-inventory
      - observability-platform
      - network-segmentation
  devsecops:
    prose: |
      **Pipeline seguro alinhado a PNCiber:**
      1. Integrar scanners SAST, DAST, SCA e secret detection em todos os pipelines
         de sistemas criticos alinhados ao eixo de ciberseguranca nacional.
      2. Implementar assinatura de artefatos e SBOM (Software Bill of Materials)
         para rastreabilidade de componentes em infraestruturas criticas.
      3. Definir gates de seguranca obrigatorios antes de deploy em ambientes de
         producao de infraestrutura critica.
      4. Manter baseline de seguranca codificado como policy-as-code aplicavel
         a todos os projetos de infraestrutura critica.
    tools:
      - gitlab-ci
      - sast-scanner
      - dast-scanner
      - sbom-generator
      - cosign
  secops:
    prose: |
      **Governanca de ciberseguranca nacional:**
      1. Estabelecer programa de ciberseguranca alinhado aos cinco eixos da PNCiber,
         com metricas e indicadores de maturidade.
      2. Mapear e classificar infraestruturas criticas sob responsabilidade da
         organizacao conforme taxonomia nacional.
      3. Implementar canais de cooperacao com CTIR Gov, CERT.br e CSIRTs setoriais
         conforme eixo de cooperacao publico-privada.
      4. Desenvolver programa de capacitacao em ciberseguranca para equipes tecnicas
         e gestores conforme eixo de educacao.
    tools:
      - grc-platform
      - threat-intelligence
      - csirt-coordination
      - training-platform
