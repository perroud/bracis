id: art-4a
family: cap-3
title: "Objetivos da PNCiber — Protecao de Infraestruturas Criticas e Resiliencia"
class: PNCIBER
baselines: [nacional]
statement:
  prose: |
    Art. 4. São objetivos da PNCiber:
    I - promover a cibersegurança no País;
    II - fortalecer a atuação diligente no espaço cibernético;
    III - contribuir para o combate aos crimes cibernéticos e às demais ações maliciosas
    no espaço cibernético;
    IV - estimular a adoção de medidas de proteção cibernética e de gestão de riscos
    para prevenir, detectar, analisar, avaliar, tratar e responder a incidentes
    cibernéticos;
    V - promover a resiliência das organizações públicas e privadas a incidentes
    cibernéticos;
    VI - fortalecer a proteção das infraestruturas críticas nacionais contra ameaças
    cibernéticas.
guidance:
  prose: |
    Os incisos I a VI do art. 4 estabelecem os objetivos operacionais da PNCiber
    focados em protecao, prevencao e resiliencia.

    **Promocao da ciberseguranca (I-II):**
    Objetivos amplos de fomento a cultura de ciberseguranca e atuacao diligente
    (due diligence) no espaco cibernetico por todos os atores.

    **Combate a crimes ciberneticos (III):**
    Apoio a investigacao e prevencao de crimes ciberneticos, em articulacao com
    orgaos de persecucao penal (Policia Federal, Ministerio Publico).

    **Gestao de riscos ciberneticos (IV):**
    Ciclo completo de gestao de riscos: prevenir, detectar, analisar, avaliar,
    tratar e responder. Alinhado ao NIST Cybersecurity Framework (Identify, Protect,
    Detect, Respond, Recover).

    **Resiliencia organizacional (V):**
    Capacidade de organizacoes publicas e privadas manterem operacoes essenciais
    durante e apos incidentes ciberneticos.

    **Infraestruturas criticas (VI):**
    Protecao prioritaria dos setores de energia, telecomunicacoes, financeiro,
    transporte, agua, saude e outros servicos essenciais.
implementation_guidance:
  platform_engineering:
    prose: |
      **Protecao de infraestruturas criticas:**
      1. Implementar framework de gestao de riscos ciberneticos baseado no NIST CSF
         (Identify, Protect, Detect, Respond, Recover) para infraestruturas criticas.
      2. Deployar solucoes de deteccao e resposta (EDR/XDR) em todos os endpoints
         e workloads de infraestrutura critica.
      3. Implementar microsegmentacao para isolar componentes criticos e limitar
         movimentacao lateral em caso de comprometimento.
      4. Manter arquitetura de disaster recovery com RPO e RTO definidos para cada
         servico critico, com testes automatizados periodicos.
    tools:
      - nist-csf-framework
      - edr-xdr
      - microsegmentation
      - disaster-recovery
  devsecops:
    prose: |
      **Gestao de riscos no pipeline:**
      1. Risk assessment automatizado: classificar cada mudanca de codigo por nivel
         de risco para infraestrutura critica antes do merge.
      2. Implementar controles de deploy progressivo (canary, blue-green) para
         minimizar impacto de falhas em infraestruturas criticas.
      3. Integrar vulnerability management com SLA de remediacao proporcional a
         criticidade do ativo: critico (24h), alto (72h), medio (7d), baixo (30d).
      4. Simular cenarios de ataque (red team automated) no pipeline para validar
         resiliencia de aplicacoes criticas.
    tools:
      - gitlab-ci
      - risk-assessment
      - canary-deploy
      - vulnerability-management
      - red-team-automation
  secops:
    prose: |
      **Resiliencia operacional:**
      1. Manter SOC (Security Operations Center) com monitoramento 24/7 para
         infraestruturas criticas, com playbooks de resposta automatizados.
      2. Implementar programa de gestao de vulnerabilidades com priorizacao baseada
         em risco (CVSS + contexto de negocio + exploitabilidade).
      3. Realizar exercicios de simulacao de incidentes (table-top, red team/blue team)
         trimestrais para infraestruturas criticas.
      4. Manter relacionamento com orgaos de persecucao penal (PF, MP) para reporte
         e cooperacao em casos de crimes ciberneticos.
    tools:
      - soc-platform
      - vulnerability-management
      - incident-simulation
      - law-enforcement-liaison
