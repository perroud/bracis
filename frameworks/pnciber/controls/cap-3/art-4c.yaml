id: art-4c
family: cap-3
title: "Objetivos da PNCiber — Educacao, Capacitacao e Conscientizacao"
class: PNCIBER
baselines: [nacional]
statement:
  prose: |
    Art. 4. São objetivos da PNCiber:
    (...)
    XI - estimular a formação e a qualificação de recursos humanos para a área
    de cibersegurança;
    XII - desenvolver a educação e a conscientização sobre cibersegurança na
    sociedade;
    XIII - fomentar as atividades de pesquisa científica, de desenvolvimento
    tecnológico e de inovação relacionadas à cibersegurança;
    XIV - incrementar a atuação coordenada e o intercâmbio de informações de
    cibersegurança entre o Governo, o setor privado, a academia e a sociedade.
guidance:
  prose: |
    Os incisos XI a XIV do art. 4 completam os objetivos da PNCiber com foco em
    capital humano, pesquisa e articulacao multistakeholder.

    **Formacao de recursos humanos (XI):**
    O Brasil enfrenta deficit critico de profissionais de ciberseguranca. O objetivo
    visa estimular formacao em todos os niveis: tecnico, graduacao, pos-graduacao
    e certificacoes profissionais.

    **Conscientizacao social (XII):**
    Educacao em ciberseguranca para a populacao em geral, incluindo letramento
    digital, protecao contra fraudes e boas praticas de seguranca no cotidiano.

    **Pesquisa e inovacao (XIII):**
    Fomento a pesquisa cientifica e tecnologica em ciberseguranca, incluindo
    criptografia, inteligencia artificial para seguranca, forensica digital
    e novas tecnologias de protecao.

    **Articulacao multistakeholder (XIV):**
    Intercambio de informacoes e atuacao coordenada entre governo, setor privado,
    academia e sociedade civil. O CNCiber (art. 6-9) e a instancia principal
    desta articulacao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Capacitacao e inovacao em ciberseguranca:**
      1. Manter ambientes de laboratorio (sandbox, CTF, cyber range) para treinamento
         pratico de equipes em cenarios realistas de ciberseguranca.
      2. Implementar automacao progressiva (SOAR) para liberar profissionais de tarefas
         repetitivas e concentrar capital humano em atividades de alto valor.
      3. Adotar e contribuir com projetos open-source de ciberseguranca como forma
         de fomento a pesquisa e desenvolvimento nacional.
      4. Participar de programas de inovacao (hackathons, desafios) voltados a
         solucoes de ciberseguranca para infraestruturas criticas.
    tools:
      - cyber-range
      - ctf-platform
      - soar
      - open-source-security
  devsecops:
    prose: |
      **Cultura de seguranca no desenvolvimento:**
      1. Implementar programa de security champions em equipes de desenvolvimento,
         formando multiplicadores de conhecimento em ciberseguranca.
      2. Integrar treinamentos de secure coding obrigatorios no onboarding e
         reciclagem periodica de desenvolvedores.
      3. Documentar e compartilhar boas praticas de DevSecOps internamente e com
         a comunidade como contribuicao ao ecossistema.
      4. Manter metricas de maturidade em seguranca por equipe, incentivando
         evolucao continua e gamificacao.
    tools:
      - security-champions
      - secure-coding-training
      - maturity-metrics
      - knowledge-base
  secops:
    prose: |
      **Programa de educacao e cooperacao:**
      1. Estabelecer programa de conscientizacao em ciberseguranca para todos os
         colaboradores, com simulacoes de phishing e treinamentos periodicos.
      2. Manter parcerias com universidades e centros de pesquisa para programas
         de estagio, pesquisa aplicada e desenvolvimento de talentos.
      3. Participar de exercicios ciberneticos nacionais (Guardiao Cibernetico,
         Ciber Guardiao) e internacionais para capacitacao pratica.
      4. Contribuir com dados anonimizados de ameacas para pesquisa academica e
         compartilhamento de informacoes com o ecossistema nacional.
    tools:
      - awareness-platform
      - phishing-simulation
      - academic-partnerships
      - threat-sharing
