id: art-4b
family: cap-3
title: "Objetivos da PNCiber — Regulacao, Padroes e Cooperacao Internacional"
class: PNCIBER
baselines: [nacional]
statement:
  prose: |
    Art. 4. São objetivos da PNCiber:
    (...)
    VII - desenvolver mecanismos de regulação, fiscalização e controle destinados
    a aprimorar a segurança e a resiliência cibernéticas nacionais;
    VIII - promover o desenvolvimento de produtos, serviços e tecnologias de caráter
    nacional destinados à cibersegurança;
    IX - garantir a confidencialidade, a integridade, a autenticidade e a
    disponibilidade das soluções e dos dados utilizados para o processamento,
    o armazenamento e a transmissão eletrônica ou digital de informações;
    X - fortalecer a atuação do País em cibersegurança no cenário internacional.
guidance:
  prose: |
    Os incisos VII a X do art. 4 tratam da dimensao regulatoria, industrial e
    internacional da PNCiber.

    **Regulacao e fiscalizacao (VII):**
    Desenvolvimento de marcos regulatorios setoriais de ciberseguranca. Cada setor
    de infraestrutura critica deve ter regulacao especifica (ex: BCB para financeiro,
    ANATEL para telecom, ANEEL para energia).

    **Industria nacional (VIII):**
    Fomento ao desenvolvimento de solucoes nacionais de ciberseguranca, reduzindo
    dependencia de produtos estrangeiros em setores estrategicos.

    **Pilares CIAD (IX):**
    Reafirmacao dos quatro pilares de seguranca da informacao (confidencialidade,
    integridade, autenticidade, disponibilidade) como objetivos da PNCiber,
    alinhando-se ao art. 2.

    **Protagonismo internacional (X):**
    Posicionamento do Brasil como ator relevante em ciberseguranca no cenario
    internacional, participando de foruns, tratados e cooperacao tecnica bilateral.
implementation_guidance:
  platform_engineering:
    prose: |
      **Conformidade regulatoria e padroes nacionais:**
      1. Implementar framework de compliance-as-code que mapeia controles tecnicos
         a requisitos regulatorios setoriais (BCB, ANATEL, ANEEL, ANS).
      2. Adotar padroes e certificacoes nacionais (ICP-Brasil para certificacao digital,
         padroes do GSI/PR) em conjunto com internacionais.
      3. Avaliar e priorizar solucoes nacionais de ciberseguranca para componentes
         estrategicos da infraestrutura (soberania tecnologica).
      4. Implementar mecanismos de auditoria automatizada para demonstrar conformidade
         com regulacoes setoriais de ciberseguranca.
    tools:
      - compliance-as-code
      - icp-brasil
      - audit-automation
      - regulatory-mapping
  devsecops:
    prose: |
      **Padroes e conformidade no pipeline:**
      1. Codificar requisitos regulatorios setoriais como policies no pipeline,
         bloqueando deploys nao-conformes automaticamente.
      2. Manter catalogo de bibliotecas e ferramentas nacionais de seguranca
         avaliadas e aprovadas para uso no pipeline.
      3. Implementar auditoria de conformidade automatizada como stage do pipeline
         que valida aderencia a regulacoes setoriais antes do deploy.
      4. Gerar relatorios de conformidade automatizados a partir de evidencias
         coletadas pelo pipeline para apresentacao a reguladores.
    tools:
      - gitlab-ci
      - policy-as-code
      - compliance-reporting
      - audit-trail
  secops:
    prose: |
      **Governanca regulatoria e cooperacao internacional:**
      1. Manter mapeamento atualizado de todas as regulacoes setoriais de ciberseguranca
         aplicaveis a organizacao, com gap analysis periodico.
      2. Implementar programa de conformidade regulatoria com evidencias de controle
         coletadas automaticamente e auditaveis.
      3. Participar de foruns internacionais de ciberseguranca e manter canais de
         cooperacao com CERTs internacionais (FIRST, APCERT, OEA-CICTE).
      4. Monitorar evolucao regulatoria nacional e internacional para antecipar
         requisitos e adaptar controles proativamente.
    tools:
      - grc-platform
      - regulatory-tracking
      - international-cooperation
      - compliance-evidence
