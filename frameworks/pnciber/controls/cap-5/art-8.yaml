id: art-8
family: cap-5
title: "Atribuicoes do CNCiber"
class: PNCIBER
baselines: [nacional]
statement:
  prose: |
    Art. 8. Ao CNCiber compete:
    I - propor atualizações para a PNCiber, a e-Ciber e o p-Ciber;
    II - avaliar e propor medidas para incremento da segurança e da resiliência
    cibernéticas do País;
    III - formular propostas para o aperfeiçoamento da prevenção, da detecção,
    da análise e da resposta a incidentes cibernéticos;
    IV - propor medidas para o desenvolvimento da educação em cibersegurança;
    V - propor estratégias de colaboração para o desenvolvimento da cooperação
    técnica internacional em cibersegurança;
    VI - manifestar-se, por solicitação do Presidente da CREDEN, sobre assuntos
    relacionados à cibersegurança; e
    VII - propor estratégias de colaboração entre o setor público, o setor privado,
    a academia e a sociedade para o desenvolvimento da cibersegurança no País.
guidance:
  prose: |
    O art. 8 detalha as sete competencias do CNCiber, que cobrem todo o ciclo
    de governanca da ciberseguranca nacional.

    **Competencias estrategicas (I):**
    Propor atualizacoes para os tres documentos fundamentais: PNCiber (politica),
    e-Ciber (estrategia) e p-Ciber (plano). O CNCiber nao tem poder normativo
    proprio, mas funciona como orgao consultivo e propositor.

    **Competencias operacionais (II-III):**
    Avaliar e propor medidas para seguranca, resiliencia e resposta a incidentes.
    Inclui avaliacao de maturidade nacional, identificacao de gaps e proposicao
    de acoes corretivas.

    **Competencias de fomento (IV-V):**
    Proposicao de medidas para educacao em ciberseguranca e cooperacao internacional,
    articulando com MEC, MCTI e MRE.

    **Competencia consultiva (VI):**
    Funcionar como orgao consultivo da CREDEN em assuntos de ciberseguranca,
    assessorando decisoes de defesa e seguranca nacional.

    **Competencia articuladora (VII):**
    Propor estrategias de colaboracao multistakeholder, operacionalizando o principio
    de atuacao coordenada do art. 3, inciso X.
implementation_guidance:
  platform_engineering:
    prose: |
      **Implementacao de recomendacoes do CNCiber:**
      1. Manter processo de avaliacao de impacto tecnico para cada diretriz ou
         recomendacao emitida pelo CNCiber, traduzindo orientacoes estrategicas
         em controles tecnicos.
      2. Implementar mecanismo de tracking de compliance com recomendacoes do CNCiber,
         com status, responsavel e prazo de implementacao.
      3. Contribuir com dados tecnicos e metricas de infraestrutura para alimentar
         avaliacoes de seguranca e resiliencia propostas pelo CNCiber.
      4. Manter infraestrutura preparada para adotar rapidamente novas diretrizes
         de seguranca emanadas do CNCiber (arquitetura adaptavel).
    tools:
      - directive-tracking
      - compliance-management
      - adaptive-architecture
      - metrics-contribution
  devsecops:
    prose: |
      **Conformidade com diretrizes do CNCiber no pipeline:**
      1. Implementar mecanismo de atualizacao de policies no pipeline baseado em
         novas diretrizes do CNCiber, com processo de revisao e aprovacao.
      2. Coletar e reportar metricas de seguranca do pipeline que contribuam
         para avaliacoes de maturidade cibernetica nacional.
      3. Manter catalogo de controles tecnicos mapeados as competencias do CNCiber,
         demonstrando contribuicao para cada eixo de atuacao.
      4. Participar de exercicios e avaliacoes de seguranca promovidos pelo CNCiber
         com evidencias coletadas automaticamente do pipeline.
    tools:
      - gitlab-ci
      - policy-management
      - security-metrics
      - assessment-evidence
  secops:
    prose: |
      **Articulacao com competencias do CNCiber:**
      1. Monitorar deliberacoes do CNCiber e adaptar programa de seguranca conforme
         novas diretrizes, mantendo registro de conformidade.
      2. Contribuir com inteligencia de ameacas e dados de incidentes para alimentar
         avaliacoes de seguranca e resiliencia realizadas pelo CNCiber.
      3. Participar de grupos de trabalho setoriais criados pelo CNCiber, contribuindo
         com experiencia operacional da organizacao.
      4. Implementar recomendacoes de educacao e capacitacao emanadas do CNCiber,
         alinhando programa interno as prioridades nacionais.
    tools:
      - grc-platform
      - threat-intelligence
      - working-group-participation
      - training-alignment
