id: art-6
family: cap-5
title: "Criacao e Composicao do CNCiber"
class: PNCIBER
baselines: [nacional]
statement:
  prose: |
    Art. 6. Fica criado o Comitê Nacional de Cibersegurança (CNCiber), no âmbito da
    Câmara de Relações Exteriores e Defesa Nacional do Conselho de Governo (CREDEN).

    Art. 7. O CNCiber será composto por um representante titular e um suplente de cada
    um dos seguintes órgãos e entidades:
    I - Gabinete de Segurança Institucional da Presidência da República, que o presidirá;
    II - Casa Civil da Presidência da República;
    III - Controladoria-Geral da União;
    IV - Ministério da Ciência, Tecnologia e Inovação;
    V - Ministério das Comunicações;
    VI - Ministério da Defesa;
    VII - Ministério do Desenvolvimento, Indústria, Comércio e Serviços;
    VIII - Ministério da Educação;
    IX - Ministério da Fazenda;
    X - Ministério da Gestão e da Inovação em Serviços Públicos;
    XI - Ministério da Justiça e Segurança Pública;
    XII - Ministério de Minas e Energia;
    XIII - Ministério das Relações Exteriores;
    XIV - Banco Central do Brasil;
    XV - Agência Nacional de Telecomunicações;
    XVI - Comitê Gestor da Internet no Brasil;
    XVII - três representantes de entidades da sociedade civil e de entidades
    representativas do setor empresarial;
    XVIII - três representantes de instituições científicas, tecnológicas e de inovação.
guidance:
  prose: |
    Os artigos 6 e 7 criam o CNCiber como orgao colegiado de governanca
    multistakeholder para ciberseguranca nacional.

    **Posicionamento institucional:**
    O CNCiber esta vinculado a CREDEN (Camara de Relacoes Exteriores e Defesa
    Nacional), sinalizando que ciberseguranca e tratada como questao de defesa
    e soberania nacional.

    **Presidencia pelo GSI/PR:**
    O Gabinete de Seguranca Institucional da Presidencia da Republica preside o
    CNCiber, consolidando sua posicao como coordenador da ciberseguranca nacional.

    **Composicao multissetorial:**
    - 16 orgaos/entidades governamentais
    - 3 representantes da sociedade civil e setor empresarial
    - 3 representantes de instituicoes de pesquisa e inovacao
    Total: 22 membros, garantindo representatividade ampla.

    **Setores representados:**
    Defesa, relacoes exteriores, financeiro (BCB), telecomunicacoes (ANATEL),
    internet (CGI.br), energia, ciencia e tecnologia, educacao, justica e
    seguranca publica — cobrindo todos os setores criticos.
implementation_guidance:
  platform_engineering:
    prose: |
      **Governanca de ciberseguranca na infraestrutura:**
      1. Alinhar a estrutura de governanca de seguranca da organizacao ao modelo
         multistakeholder do CNCiber, com comites internos que espelhem a
         representatividade de areas criticas.
      2. Implementar framework de governanca de seguranca com papeis claros:
         CISO, Security Champions, Comite de Seguranca, DPO (LGPD).
      3. Manter canal de comunicacao com representantes setoriais no CNCiber
         para alinhamento de diretrizes e prioridades.
      4. Automatizar coleta e reporte de metricas de ciberseguranca para
         alimentar avaliacoes de governanca e auditorias.
    tools:
      - governance-framework
      - role-management
      - security-committee
      - metrics-reporting
  devsecops:
    prose: |
      **Governanca de seguranca no pipeline:**
      1. Implementar modelo de governanca de seguranca no pipeline com papeis
         definidos: security reviewer, compliance approver, risk assessor.
      2. Codificar diretrizes do CNCiber como policies no pipeline, garantindo
         que decisoes de governanca sejam aplicadas automaticamente.
      3. Manter audit trail completo de decisoes de seguranca no pipeline
         para rastreabilidade e prestacao de contas.
      4. Gerar relatorios de conformidade com diretrizes do CNCiber
         automaticamente a partir de dados do pipeline.
    tools:
      - gitlab-ci
      - security-governance
      - audit-trail
      - compliance-reporting
  secops:
    prose: |
      **Articulacao com governanca nacional:**
      1. Acompanhar deliberacoes e diretrizes emitidas pelo CNCiber, adaptando
         controles e procedimentos de seguranca conforme orientacoes.
      2. Participar de consultas publicas e processos de elaboracao de politicas
         conduzidos pelo CNCiber, contribuindo com perspectiva operacional.
      3. Reportar incidentes significativos e indicadores de ameacas ao CTIR Gov
         e CERT.br, alimentando a inteligencia nacional coordenada pelo CNCiber.
      4. Manter mapeamento de stakeholders relevantes no ecossistema de governanca
         de ciberseguranca nacional (GSI, CTIR Gov, CERT.br, ANATEL, BCB).
    tools:
      - grc-platform
      - stakeholder-management
      - incident-reporting
      - regulatory-tracking
