id: art-9
family: cap-5
title: "Funcionamento e Disposicoes Finais do CNCiber"
class: PNCIBER
baselines: [nacional]
statement:
  prose: |
    Art. 9. O CNCiber se reunirá, em caráter ordinário, trimestralmente e, em caráter
    extraordinário, mediante convocação de seu Presidente.

    Parágrafo 1. O quórum de reunião do CNCiber é de maioria simples de seus membros.

    Parágrafo 2. Além do voto ordinário, o Presidente do CNCiber terá o voto de
    qualidade em caso de empate.

    Parágrafo 3. O CNCiber poderá convidar representantes de órgãos e entidades
    públicas e privadas, especialistas e representantes da sociedade para participar
    de suas reuniões, sem direito a voto.

    Parágrafo 4. A participação no CNCiber será considerada prestação de serviço
    público relevante, não remunerada.

    Parágrafo 5. O CNCiber poderá instituir grupos de trabalho temáticos para tratar
    de assuntos específicos.
guidance:
  prose: |
    O art. 9 estabelece as regras de funcionamento do CNCiber.

    **Periodicidade:**
    Reunioes ordinarias trimestrais e extraordinarias por convocacao do Presidente
    (GSI/PR). A periodicidade trimestral garante acompanhamento regular da
    ciberseguranca nacional sem sobrecarregar a agenda dos membros.

    **Quorum e votacao:**
    Maioria simples para quorum de reuniao. O Presidente (GSI/PR) tem voto de
    qualidade (desempate), o que lhe confere influencia decisiva nas deliberacoes.

    **Participacao ampliada:**
    O CNCiber pode convidar especialistas, representantes de orgaos e entidades
    e membros da sociedade civil para participar sem voto, ampliando a base de
    conhecimento tecnico disponivel.

    **Grupos de trabalho:**
    O CNCiber pode criar GTs tematicos para aprofundar discussoes especificas
    (ex: GT de infraestruturas criticas, GT de educacao em ciberseguranca,
    GT de cooperacao internacional).

    **Natureza nao remunerada:**
    A participacao e considerada servico publico relevante, sem remuneracao,
    alinhada ao modelo de governanca colaborativa sem onus para o erario.
implementation_guidance:
  platform_engineering:
    prose: |
      **Governanca operacional alinhada ao CNCiber:**
      1. Estruturar comite interno de seguranca com reunioes periodicas (mensais ou
         bimestrais), espelhando o modelo de governanca do CNCiber.
      2. Implementar grupos de trabalho tematicos internos alinhados aos GTs do CNCiber
         (infraestrutura critica, resposta a incidentes, educacao).
      3. Manter plataforma de colaboracao segura para compartilhamento de informacoes
         com membros de GTs e parceiros do ecossistema.
      4. Automatizar geracao de relatorios trimestrais de postura de seguranca para
         alimentar avaliacoes do comite interno e do CNCiber.
    tools:
      - governance-platform
      - collaboration-tools
      - reporting-automation
      - working-group-management
  devsecops:
    prose: |
      **Transparencia e rastreabilidade:**
      1. Manter registro auditavel de todas as decisoes de seguranca no pipeline,
         permitindo prestacao de contas a comites de governanca.
      2. Gerar relatorios automatizados de postura de seguranca do pipeline para
         apresentacao em reunioes de comite (trimestrais).
      3. Implementar processo de incorporacao rapida de novas diretrizes emanadas
         de GTs do CNCiber no pipeline de seguranca.
      4. Documentar e versionar todas as policies de seguranca do pipeline com
         rastreabilidade de origem (legislacao, diretriz do CNCiber, norma interna).
    tools:
      - gitlab-ci
      - audit-log
      - policy-versioning
      - compliance-reporting
  secops:
    prose: |
      **Participacao e alinhamento operacional:**
      1. Designar representante para acompanhamento das deliberacoes do CNCiber e
         GTs relevantes, mantendo a organizacao atualizada.
      2. Contribuir com expertise operacional em GTs tematicos do CNCiber,
         especialmente nos temas de resposta a incidentes e threat intelligence.
      3. Manter cadencia trimestral de revisao do programa de seguranca alinhada
         as reunioes ordinarias do CNCiber, avaliando aderencia a diretrizes.
      4. Documentar e disseminar internamente deliberacoes e recomendacoes relevantes
         do CNCiber para equipes tecnicas e de gestao.
    tools:
      - grc-platform
      - meeting-tracking
      - knowledge-dissemination
      - alignment-review
