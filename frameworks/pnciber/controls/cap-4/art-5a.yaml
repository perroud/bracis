id: art-5a
family: cap-4
title: "Instrumentos da PNCiber — Estrategia Nacional e Plano Nacional"
class: PNCIBER
baselines: [nacional]
statement:
  prose: |
    Art. 5. São instrumentos da PNCiber:
    I - a Estratégia Nacional de Cibersegurança (e-Ciber);
    II - o Plano Nacional de Cibersegurança (p-Ciber).

    Parágrafo 1. A Estratégia Nacional de Cibersegurança (e-Ciber) será elaborada
    pelo Comitê Nacional de Cibersegurança (CNCiber) e deverá conter:
    I - o diagnóstico do cenário de cibersegurança no País;
    II - as metas, as prioridades e as ações estratégicas para a área de
    cibersegurança no País;
    III - as diretrizes para o fortalecimento da governança de cibersegurança no País;
    IV - os mecanismos de avaliação e monitoramento da implementação da PNCiber.
guidance:
  prose: |
    O art. 5 define os instrumentos de execucao da PNCiber: a Estrategia Nacional
    de Ciberseguranca (e-Ciber) e o Plano Nacional de Ciberseguranca (p-Ciber).

    **Estrategia Nacional de Ciberseguranca (e-Ciber):**
    Documento estrategico de alto nivel, elaborado pelo CNCiber, que estabelece
    diagnostico, metas, prioridades e diretrizes para ciberseguranca nacional.
    A primeira versao da e-Ciber foi publicada em 2020 (Decreto 10.222/2020)
    e necessita atualizacao para refletir o novo marco do Decreto 11.856/2023.

    **Plano Nacional de Ciberseguranca (p-Ciber):**
    Documento operacional que desdobra a e-Ciber em acoes concretas, cronogramas,
    responsaveis e recursos. Complementa a estrategia com planejamento executivo.

    **Mecanismos de avaliacao:**
    A e-Ciber deve conter indicadores e metricas de avaliacao para monitorar
    a implementacao da PNCiber, permitindo ajustes e correcoes de rumo.
implementation_guidance:
  platform_engineering:
    prose: |
      **Alinhamento com e-Ciber e p-Ciber:**
      1. Mapear controles tecnicos da infraestrutura as metas e prioridades da e-Ciber,
         demonstrando contribuicao para objetivos estrategicos nacionais.
      2. Implementar dashboards de maturidade cibernetica baseados em frameworks
         reconhecidos (NIST CSF, C2M2) para medir evolucao alinhada a e-Ciber.
      3. Manter roadmap de seguranca de infraestrutura alinhado ao p-Ciber, com
         marcos, entregaveis e indicadores de progresso.
      4. Automatizar coleta de metricas de seguranca que alimentam os mecanismos
         de avaliacao e monitoramento previstos na e-Ciber.
    tools:
      - nist-csf-assessment
      - c2m2-maturity
      - security-dashboard
      - metrics-collection
  devsecops:
    prose: |
      **Metricas e conformidade estrategica:**
      1. Coletar automaticamente metricas de seguranca do pipeline (vulnerabilidades
         encontradas/corrigidas, tempo de remediacao, cobertura de scans) para
         alimentar indicadores da e-Ciber.
      2. Implementar compliance-as-code que valida aderencia a metas da e-Ciber
         em cada deploy, gerando evidencias automaticas.
      3. Gerar relatorios periodicos de postura de seguranca alinhados aos eixos
         da e-Ciber para apresentacao em auditorias e avaliacao.
      4. Manter baseline de seguranca que evolui conforme metas e prioridades
         atualizadas na e-Ciber e p-Ciber.
    tools:
      - gitlab-ci
      - security-metrics
      - compliance-as-code
      - reporting-engine
  secops:
    prose: |
      **Governanca estrategica:**
      1. Participar de consultas publicas e processos de elaboracao da e-Ciber e p-Ciber,
         contribuindo com perspectiva operacional da organizacao.
      2. Alinhar programa de ciberseguranca da organizacao as metas nacionais definidas
         na e-Ciber, com mapeamento explicito de contribuicoes.
      3. Reportar periodicamente indicadores de maturidade cibernetica da organizacao
         conforme mecanismos de avaliacao da e-Ciber.
      4. Revisar e atualizar controles de seguranca sempre que a e-Ciber ou p-Ciber
         forem atualizados, mantendo alinhamento continuo.
    tools:
      - grc-platform
      - maturity-assessment
      - strategic-alignment
      - regulatory-tracking
