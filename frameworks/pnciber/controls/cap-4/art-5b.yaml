id: art-5b
family: cap-4
title: "Instrumentos da PNCiber — Exercicios Simulados e Cooperacao Tecnica"
class: PNCIBER
baselines: [nacional]
statement:
  prose: |
    Art. 5. São instrumentos da PNCiber:
    (...)

    Parágrafo 2. Constituem também instrumentos da PNCiber:
    I - a realização de exercícios nacionais e setoriais de simulação de incidentes
    cibernéticos para avaliação e aprimoramento da capacidade de resposta;
    II - a cooperação técnica internacional em cibersegurança;
    III - os mecanismos de compartilhamento de informações sobre riscos, ameaças,
    oportunidades e incidentes cibernéticos entre órgãos públicos, setor privado
    e sociedade;
    IV - os programas de educação, conscientização e capacitação em cibersegurança.
guidance:
  prose: |
    O paragrafo 2 do art. 5 amplia os instrumentos da PNCiber com mecanismos
    operacionais concretos de implementacao.

    **Exercicios de simulacao (I):**
    Exercicios nacionais e setoriais de resposta a incidentes ciberneticos. O Brasil
    realiza o exercicio Guardiao Cibernetico (Comando de Defesa Cibernetica) e
    exercicios setoriais coordenados pelo GSI/PR e CTIR Gov.

    **Cooperacao tecnica internacional (II):**
    Acordos bilaterais e multilaterais de cooperacao em ciberseguranca, participacao
    em foruns internacionais e compartilhamento de melhores praticas.

    **Compartilhamento de informacoes (III):**
    Mecanismos formais de threat sharing entre governo e setor privado, incluindo
    ISACs (Information Sharing and Analysis Centers) setoriais e plataformas de
    compartilhamento de IoCs.

    **Educacao e capacitacao (IV):**
    Programas estruturados de formacao em ciberseguranca em todos os niveis,
    desde conscientizacao basica ate especializacao tecnica avancada.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura para exercicios e compartilhamento:**
      1. Manter ambiente de cyber range isolado para execucao de exercicios de
         simulacao de incidentes sem impacto em producao.
      2. Implementar plataforma de compartilhamento de IoCs (MISP, OpenCTI) integrada
         com SIEM e ferramentas de deteccao para consumo automatizado de inteligencia.
      3. Automatizar cenarios de exercicio baseados em TTPs reais (MITRE ATT&CK)
         para simulacao recorrente e avaliacao de capacidade de deteccao.
      4. Manter infraestrutura de treinamento (labs, sandboxes) acessivel para
         programas de capacitacao continua.
    tools:
      - cyber-range
      - misp
      - opencti
      - mitre-attack
      - training-lab
  devsecops:
    prose: |
      **Simulacao e compartilhamento no pipeline:**
      1. Integrar feeds de threat intelligence (IoCs compartilhados) nos scanners
         do pipeline para deteccao proativa de componentes comprometidos.
      2. Executar exercicios de red team automatizado no pipeline para validar
         eficacia dos controles de seguranca em cenarios de ataque reais.
      3. Participar de programas de responsible disclosure e coordinated vulnerability
         disclosure como forma de cooperacao com a comunidade.
      4. Manter playbooks de resposta a incidentes versionados no repositorio e
         testados em exercicios periodicos de table-top.
    tools:
      - gitlab-ci
      - threat-feed-integration
      - red-team-automation
      - playbook-repository
  secops:
    prose: |
      **Exercicios operacionais e cooperacao:**
      1. Participar de exercicios nacionais (Guardiao Cibernetico, Ciber Guardiao)
         e internacionais (Locked Shields, Cyber Coalition) com equipes dedicadas.
      2. Integrar ISACs setoriais relevantes e manter canal ativo de compartilhamento
         de informacoes sobre ameacas com parceiros.
      3. Realizar exercicios internos de simulacao de incidentes (table-top, red/blue
         team) trimestrais com cenarios baseados em ameacas reais ao setor.
      4. Manter programa de capacitacao com trilhas diferenciadas: conscientizacao
         (todos), operacional (TI), especializado (seguranca).
    tools:
      - exercise-management
      - isac-platform
      - red-blue-team
      - training-management
