id: art-3b
family: cap-2
title: "Principios da PNCiber — Cooperacao, Educacao e Atuacao Coordenada"
class: PNCIBER
baselines: [nacional]
statement:
  prose: |
    Art. 3. São princípios da PNCiber:
    (...)
    VI - a cooperação entre órgãos e entidades, públicas e privadas, em matéria
    de cibersegurança;
    VII - a cooperação técnica internacional na área de cibersegurança;
    VIII - a educação e o desenvolvimento tecnológico em cibersegurança;
    IX - a liberdade, a visão e a inovação na área de cibersegurança, especialmente
    para o desenvolvimento de indústria de cibersegurança nacional; e
    X - a atuação coordenada entre o Poder Público, o setor privado, a academia
    e a sociedade.
guidance:
  prose: |
    Os incisos VI a X do art. 3 completam os principios da PNCiber com foco em
    cooperacao, educacao e ecossistema de inovacao.

    **Cooperacao interna (VI):**
    Mecanismos de cooperacao entre orgaos publicos federais, estaduais e municipais,
    e entre setor publico e privado. A REGIC (Rede Federal de Gestao de Incidentes
    Ciberneticos) e instrumento desta cooperacao.

    **Cooperacao internacional (VII):**
    Participacao em foruns internacionais (ONU-GGE, OEWG, Budapest Convention, OEA),
    acordos bilaterais de cooperacao em ciberseguranca e compartilhamento de
    informacoes sobre ameacas com CERTs internacionais.

    **Educacao e tecnologia (VIII):**
    Formacao de capital humano em ciberseguranca, fomento a pesquisa cientifica
    e desenvolvimento de competencias tecnicas nacionais.

    **Inovacao e industria nacional (IX):**
    Fomento a industria de ciberseguranca brasileira, incluindo startups, pesquisa
    aplicada e desenvolvimento de solucoes nacionais. Alinhado ao conceito de
    soberania tecnologica.

    **Atuacao multistakeholder (X):**
    Modelo de governanca colaborativa envolvendo governo, setor privado, academia
    e sociedade civil. O CNCiber (art. 6-9) e a instancia formal desta articulacao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Ecossistema de cooperacao tecnica:**
      1. Implementar plataformas de compartilhamento de indicadores de comprometimento
         (IoC) com formato padronizado (STIX/TAXII) para cooperacao entre organizacoes.
      2. Participar de comunidades de threat intelligence nacionais (CERT.br, CTIR Gov)
         e internacionais (FIRST, TF-CSIRT) com integracao automatizada de feeds.
      3. Adotar padroes abertos e interoperaveis para facilitar cooperacao tecnica
         e evitar vendor lock-in (soberania tecnologica).
      4. Manter ambientes de sandbox para avaliacao de solucoes nacionais de ciberseguranca
         antes de adocao em producao.
    tools:
      - threat-intel-platform
      - stix-taxii
      - open-standards
      - sandbox-environment
  devsecops:
    prose: |
      **Inovacao e cooperacao no pipeline:**
      1. Integrar feeds de vulnerabilidade nacionais (CERT.br) e internacionais (NVD, CVE)
         nos scanners de dependencias do pipeline.
      2. Contribuir com ferramentas de seguranca open-source como forma de cooperacao
         com a comunidade e fomento a industria nacional.
      3. Implementar programas de bug bounty ou responsible disclosure para estimular
         cooperacao com a comunidade de seguranca.
      4. Documentar e compartilhar boas praticas de DevSecOps com parceiros do ecossistema.
    tools:
      - gitlab-ci
      - vulnerability-database
      - bug-bounty-platform
      - knowledge-sharing
  secops:
    prose: |
      **Cooperacao operacional e capacitacao:**
      1. Estabelecer acordos de compartilhamento de informacoes com CSIRTs setoriais
         (financeiro, energia, telecom, saude) conforme principio de cooperacao.
      2. Participar de exercicios ciberneticos nacionais (Guardiao Cibernetico) e
         internacionais (Locked Shields, Cyber Coalition).
      3. Implementar programa de capacitacao continua em ciberseguranca para equipes
         tecnicas, com certificacoes e treinamentos especializados.
      4. Manter relatorio de threat landscape brasileiro com compartilhamento regulado
         entre membros do ecossistema de cooperacao.
    tools:
      - csirt-network
      - cyber-exercise-platform
      - training-platform
      - threat-landscape-report
