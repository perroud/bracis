id: art-3a
family: cap-2
title: "Principios da PNCiber — Soberania Nacional e Visao Abrangente"
class: PNCIBER
baselines: [nacional]
statement:
  prose: |
    Art. 3. São princípios da PNCiber:
    I - a soberania nacional e a priorização dos interesses nacionais;
    II - a visão abrangente da cibersegurança;
    III - a garantia dos direitos fundamentais, em especial a liberdade de expressão,
    a proteção de dados pessoais, a proteção da privacidade e o acesso à informação;
    IV - a prevenção de incidentes e de ataques cibernéticos, em particular daqueles
    direcionados a infraestruturas críticas nacionais e a serviços essenciais
    prestados à sociedade;
    V - a resiliência das organizações públicas e privadas a incidentes e ataques
    cibernéticos.
guidance:
  prose: |
    Os incisos I a V do art. 3 estabelecem os principios fundamentais que devem
    nortear toda a implementacao da PNCiber.

    **Soberania nacional (I):**
    A ciberseguranca e tratada como questao de soberania, priorizando interesses
    nacionais na protecao do espaco cibernetico brasileiro. Isso implica preferencia
    por solucoes nacionais quando viavel e controle sobre dados estrategicos.

    **Visao abrangente (II):**
    Ciberseguranca nao e apenas tecnica — abrange dimensoes politica, economica,
    social, educacional e juridica. Requer abordagem multissetorial e multistakeholder.

    **Direitos fundamentais (III):**
    A ciberseguranca nao pode ser pretexto para violacao de direitos. Equilibrio
    entre seguranca e liberdades individuais, protecao de dados (LGPD) e acesso
    a informacao (LAI).

    **Prevencao (IV):**
    Enfase em prevencao sobre reacao, especialmente para infraestruturas criticas
    e servicos essenciais. Alinhado ao conceito de "security by design".

    **Resiliencia (V):**
    Capacidade de organizacoes publicas e privadas resistirem, absorverem e se
    recuperarem de incidentes ciberneticos. Complementa a prevencao com preparacao
    para o inevitavel.
implementation_guidance:
  platform_engineering:
    prose: |
      **Principios de soberania e prevencao na infraestrutura:**
      1. Priorizar provedores de nuvem com datacenter no Brasil e conformidade com
         legislacao nacional para dados estrategicos (soberania).
      2. Implementar defense-in-depth com multiplas camadas de protecao: WAF, IDS/IPS,
         microsegmentacao, criptografia fim-a-fim (prevencao).
      3. Projetar infraestrutura com redundancia geografica em territorio nacional
         e failover automatico para garantir resiliencia.
      4. Implementar security-by-design em todas as decisoes arquiteturais: threat
         modeling, principio do menor privilegio, imutabilidade de infraestrutura.
    tools:
      - cloud-sovereign
      - waf
      - ids-ips
      - threat-modeling
      - infrastructure-as-code
  devsecops:
    prose: |
      **Security-by-design no pipeline:**
      1. Shift-left security: integrar analise de seguranca desde o design (threat
         modeling) ate o deploy (runtime protection).
      2. Manter SBOM de todos os componentes para rastreabilidade e soberania sobre
         a cadeia de suprimentos de software.
      3. Testes de resiliencia automatizados: chaos engineering, failure injection
         e disaster recovery drills integrados ao pipeline.
      4. Privacy-by-design: validar conformidade com LGPD automaticamente no pipeline
         para equilibrar seguranca e protecao de dados.
    tools:
      - gitlab-ci
      - threat-modeling-tool
      - sbom-generator
      - chaos-engineering
      - privacy-scanner
  secops:
    prose: |
      **Operacionalizacao dos principios:**
      1. Programa de threat intelligence com foco em ameacas ao espaco cibernetico
         brasileiro e infraestruturas criticas nacionais (soberania).
      2. Processo de privacy impact assessment (PIA) integrado a avaliacoes de seguranca
         para garantir equilibrio seguranca vs. direitos fundamentais.
      3. Plano de resposta a incidentes com procedimentos especificos para infraestruturas
         criticas, incluindo comunicacao com CTIR Gov (prevencao/resiliencia).
      4. Metricas de resiliencia: MTTR, RPO, RTO definidos e testados periodicamente
         para todos os sistemas criticos.
    tools:
      - threat-intelligence
      - privacy-impact-tool
      - incident-response-plan
      - resilience-metrics
