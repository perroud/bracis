control_families:
  - id: cap-1
    title: "Disposicoes Gerais"
    description: "Objeto e abrangencia da Politica Nacional de Ciberseguranca, definindo o escopo de atuacao e os destinatarios da politica"
    articles: "art. 1 ao art. 2"
    control_count: 2
  - id: cap-2
    title: "Principios"
    description: "Principios norteadores da PNCiber: soberania nacional, visao abrangente, prevencao de incidentes, resiliencia, cooperacao e educacao"
    articles: "art. 3"
    control_count: 2
  - id: cap-3
    title: "Objetivos"
    description: >-
      Objetivos estrategicos da PNCiber: protecao de infraestruturas
      criticas, desenvolvimento de mecanismos de regulacao, fomento a
      pesquisa e inovacao, cooperacao tecnica internacional e educacao
      em ciberseguranca
    articles: "art. 4"
    control_count: 3
  - id: cap-4
    title: "Instrumentos"
    description: "Instrumentos de execucao da PNCiber: Estrategia Nacional de Ciberseguranca (e-Ciber), planos setoriais, exercicios simulados e cooperacao tecnica"
    articles: "art. 5"
    control_count: 2
  - id: cap-5
    title: "Comite Nacional de Ciberseguranca (CNCiber)"
    description: "Criacao, composicao, atribuicoes e funcionamento do CNCiber, orgao colegiado vinculado ao Gabinete de Seguranca Institucional da Presidencia da Republica"
    articles: "art. 6 ao art. 9"
    control_count: 3
related_frameworks:
  - framework_id: pnsi
    relationship: derived-from
    description: >-
      A PNCiber deriva da Politica Nacional de Seguranca da Informacao
      (PNSI, Decreto 9.637/2018), expandindo e detalhando o eixo de
      ciberseguranca com politica propria e estrutura de governanca
      dedicada (CNCiber).
  - framework_id: gsi-in1
    relationship: complements
    description: >-
      A IN1/GSI-PR complementa a PNCiber ao estabelecer requisitos
      tecnicos e operacionais de seguranca da informacao para orgaos
      da Administracao Publica Federal, detalhando controles que
      operacionalizam os objetivos estrategicos do Decreto 11.856/2023.
  - framework_id: regic
    relationship: complements
    description: >-
      A Rede Federal de Gestao de Incidentes Ciberneticos (REGIC)
      complementa a PNCiber ao fornecer a estrutura operacional de
      resposta a incidentes entre orgaos federais, implementando o
      objetivo de resiliencia cibernetica previsto no art. 4.
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD complementa a PNCiber ao disciplinar a protecao de dados
      pessoais como dimensao da ciberseguranca, especialmente na
      protecao de infraestruturas criticas que tratam dados de cidadaos
      brasileiros.
