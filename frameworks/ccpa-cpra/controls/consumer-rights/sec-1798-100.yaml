id: sec-1798-100
family: consumer-rights
title: "Right to Know What Personal Information is Being Collected"
class: CCPA-CPRA

statement:
  prose: |
    (a) A consumer shall have the right to request that a business that collects a consumer's
    personal information disclose to that consumer the categories and specific pieces of personal
    information the business has collected.

    (b) A business that collects a consumer's personal information shall, at or before the point
    of collection, inform consumers as to the categories of personal information to be collected
    and the purposes for which the categories of personal information shall be used and shall not
    collect additional categories of personal information or use personal information collected
    for additional purposes without providing the consumer with notice consistent with this
    section.

    (c) A business shall provide the information specified in subdivision (a) to a consumer only
    upon receipt of a verifiable consumer request.

    (d) A business that receives a verifiable consumer request from a consumer to access personal
    information shall promptly take steps to disclose and deliver, free of charge to the consumer,
    the personal information required by this section. The information may be delivered by mail or
    electronically, and if provided electronically, the information shall be in a portable and, to
    the extent technically feasible, readily useable format that allows the consumer to transmit
    this information to another entity without hindrance.

    (e) A business that collects a consumer's personal information shall disclose to the consumer,
    pursuant to subdivision (c) of Section 1798.130, the following:
    (1) The categories of personal information it has collected about that consumer.
    (2) The categories of sources from which the personal information is collected.
    (3) The business or commercial purpose for collecting, selling, or sharing personal information.
    (4) The categories of third parties to whom the business discloses personal information.
    (5) The specific pieces of personal information it has collected about that consumer.

guidance:
  prose: |
    Section 1798.100 establishes the foundational right to know — consumers can request
    disclosure of what personal information a business collects and how it is used. This
    section imposes two distinct obligations:

    1. **Notice at collection:** Before or at the point of collection, businesses must inform
       consumers what categories of PI will be collected and for what purposes.

    2. **Right to access:** Upon verifiable consumer request, businesses must disclose the
       specific pieces of PI collected, categories, sources, purposes, and third-party recipients.

    The response must be provided free of charge, in a portable and readily useable format
    if delivered electronically. Businesses must respond to verifiable consumer requests within
    45 days (extendable by an additional 45 days with notice).

    CPRA expanded this section to include information about sharing (not just selling) of PI,
    and requires disclosure of the retention period for each category of PI collected.

implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement a centralized personal information inventory/data catalog that maps all
         categories of PI collected, sources, purposes, and third-party recipients.
      2. Build a consumer-facing privacy portal with self-service access request submission
         and identity verification workflow.
      3. Create automated data discovery and classification pipelines to identify PI across
         all data stores (databases, object storage, caches, logs, analytics).
      4. Implement a data export API that aggregates PI from all microservices and data stores
         into portable formats (JSON, CSV).
      5. Deploy a consent and notice management platform that presents collection notices at
         or before the point of collection.
      6. Build audit trail for all consumer requests including timestamps, verification steps,
         and fulfillment actions.
      7. Implement retention policy enforcement with automated expiration and deletion.
    tools:
      - datahub
      - openmetadata
      - backstage
      - consent-management-platform
      - privacy-portal
      - dsar-automation
      - apache-atlas

  devsecops:
    prose: |
      1. Integrate data classification scanning into CI/CD pipelines to detect new PI fields
         in code changes and database migrations.
      2. Implement automated tests verifying that privacy notices are present at all collection
         points (forms, APIs, SDKs).
      3. Test data export endpoints for completeness — verify all PI categories are included
         in consumer access responses.
      4. Validate that data retention policies are enforced in application logic and database
         configurations.
      5. Scan for hardcoded PI or PI leaking into logs, error messages, and analytics payloads.
    tools:
      - semgrep
      - gitlab-ci
      - sonarqube
      - custom-privacy-linters
      - api-testing
      - postman

  secops:
    prose: |
      1. Monitor consumer access request fulfillment against the 45-day SLA with automated
         alerts at 30-day and 40-day thresholds.
      2. Audit data inventory completeness periodically — verify all systems with PI are
         cataloged and included in access request responses.
      3. Monitor for unauthorized collection of PI beyond disclosed categories.
      4. Track and report on request volume, response times, and fulfillment rates for
         compliance reporting to the CPPA.
      5. Implement anomaly detection for unusual access request patterns that may indicate
         fraudulent or adversarial requests.
    tools:
      - dsar-tracking
      - siem
      - elastic-siem
      - compliance-dashboard
      - data-discovery

