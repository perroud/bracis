id: sec-1798-125
family: consumer-rights
title: "Non-Discrimination"
class: CCPA-CPRA

statement:
  prose: |
    (a) A business shall not discriminate against a consumer because the consumer exercised any
    of the consumer's rights under this title, including, but not limited to, by:
    (1) Denying goods or services to the consumer.
    (2) Charging different prices or rates for goods or services, including through the use of
    discounts or other benefits or imposing penalties.
    (3) Providing a different level or quality of goods or services to the consumer.
    (4) Suggesting that the consumer will receive a different price or rate for goods or services
    or a different level or quality of goods or services.
    (5) Retaliating against an employee, applicant for employment, or independent contractor, as
    defined in subparagraph (A) of paragraph (2) of subdivision (m) of Section 1798.145, for
    exercising any of their rights under this title.

    (b) Nothing in this section prohibits a business, pursuant to subdivision (b) of Section
    1798.135, from charging a consumer a different price or rate, or from providing a different
    level or quality of goods or services to the consumer, if that difference is reasonably
    related to the value provided to the business by the consumer's data.

    (c) (1) A business may offer financial incentives, including payments to consumers as
    compensation, for the collection of personal information, the sale or sharing of personal
    information, or the retention of personal information. A business may also offer a different
    price, rate, level, or quality of goods or services to the consumer if that price or
    difference is directly related to the value provided to the business by the consumer's data.
    (2) A business that offers any financial incentives pursuant to this subdivision shall notify
    consumers of the financial incentives pursuant to Section 1798.130.
    (3) A business may enter a consumer into a financial incentive program only if the consumer
    gives the business prior opt-in consent pursuant to Section 1798.130 which clearly describes
    the material terms of the financial incentive program, and which may be revoked by the
    consumer at any time.
    (4) A business shall not use financial incentive practices that are unjust, unreasonable,
    coercive, or usurious in nature.

guidance:
  prose: |
    Section 1798.125 prevents businesses from punishing consumers who exercise their privacy
    rights. Key aspects:

    1. **Broad non-discrimination:** Businesses cannot deny services, charge more, provide
       inferior quality, or even suggest different treatment because a consumer exercised
       CCPA/CPRA rights.

    2. **Employee/contractor protection (CPRA addition):** CPRA added subdivision (a)(5)
       extending non-discrimination protection to employees, applicants, and independent
       contractors who exercise their rights.

    3. **Value-based differentiation:** Businesses CAN charge different prices if the
       difference is "reasonably related to the value" the consumer's data provides. This
       requires businesses to calculate and document the value of consumer data.

    4. **Financial incentives:** Businesses can offer incentives for data collection/sale
       (e.g., loyalty programs), but must: (a) clearly disclose terms, (b) obtain opt-in
       consent, (c) allow revocation, (d) not be coercive or usurious.

    5. **Dark patterns prohibition:** CPPA regulations further prohibit the use of dark
       patterns to undermine consumer choices — interfaces must not be designed to
       manipulate consumers into providing more data.

implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement service delivery logic that is decoupled from privacy preference state —
         ensure that opt-out status, deletion requests, or limitation preferences do not
         trigger service degradation.
      2. Build monitoring to detect differential treatment — compare service quality metrics
         (response times, feature availability, pricing) between consumers who have exercised
         privacy rights and those who have not.
      3. Implement financial incentive management system with clear opt-in consent collection,
         terms disclosure, and revocation capability.
      4. Create A/B testing safeguards that prevent privacy preference status from being used
         as a segmentation variable in experiments that affect service quality or pricing.
      5. Build data valuation framework to calculate and document the value of consumer data
         if offering value-based price differentiation.
      6. Implement UI/UX review pipeline that checks for dark patterns in privacy-related
         interfaces (opt-out flows, consent forms, preference centers).
    tools:
      - feature-flags
      - consent-management-platform
      - privacy-portal
      - a-b-testing-platform
      - monitoring
      - backstage

  devsecops:
    prose: |
      1. Implement automated UI testing that verifies privacy-related user flows are free
         of dark patterns (confirm/deny asymmetry, confusing language, excessive steps).
      2. Test that service logic does not branch on privacy preference status to degrade
         service quality.
      3. Validate that financial incentive opt-in flows include all required disclosures
         and allow easy revocation.
      4. Implement code review checks for conditional logic that references privacy opt-out
         status in pricing, feature gating, or service quality paths.
      5. Test employee/contractor privacy right exercise flows independently from consumer flows.
    tools:
      - playwright
      - selenium
      - gitlab-ci
      - sonarqube
      - semgrep
      - accessibility-testing

  secops:
    prose: |
      1. Monitor for differential treatment patterns — compare service metrics across
         consumer segments based on privacy preference status.
      2. Audit financial incentive programs for compliance — verify terms are disclosed,
         consent is collected, and practices are not coercive.
      3. Investigate consumer complaints about discrimination related to privacy right
         exercise.
      4. Monitor employee/contractor systems for retaliation indicators following privacy
         right exercise.
      5. Track and report on non-discrimination compliance metrics for CPPA reporting.
    tools:
      - siem
      - compliance-dashboard
      - analytics
      - hr-systems
      - complaint-management

