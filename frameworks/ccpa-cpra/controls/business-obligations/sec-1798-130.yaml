id: sec-1798-130
family: business-obligations
title: "Notice, Disclosure, and Business Compliance Obligations"
class: CCPA-CPRA

statement:
  prose: |
    (a) In order to comply with Sections 1798.100, 1798.105, 1798.106, 1798.110, 1798.115,
    and 1798.125, a business shall, in a form that is reasonably accessible to consumers:

    (1) Make available to consumers two or more designated methods for submitting requests
    for information required to be disclosed pursuant to Sections 1798.110 and 1798.115,
    including, at a minimum, a toll-free telephone number. A business that operates exclusively
    online and has a direct relationship with a consumer from whom it collects personal
    information shall only be required to provide an email address for submitting requests for
    information required to be disclosed pursuant to Sections 1798.110 and 1798.115.

    (2) Disclose and deliver the required information to a consumer free of charge, within
    45 days of receiving the consumer's verifiable request. The time period to provide the
    required information may be extended once by an additional 45 days when reasonably
    necessary, provided the consumer is provided notice of the extension within the first
    45-day period. The disclosure shall cover the 12-month period preceding the business's
    receipt of the verifiable consumer request and shall be made in writing and delivered
    through the consumer's account with the business, if the consumer maintains an account
    with the business, or by mail or electronically at the consumer's option if the consumer
    does not maintain an account with the business, in a readily useable format that allows
    the consumer to transmit this information from one entity to another entity without
    hindrance.

    (3) Disclose the following information in its online privacy policy or policies if the
    business has an online privacy policy or policies and in any California-specific description
    of consumers' privacy rights, or if the business does not maintain those policies, on its
    internet website:
    (A) A description of a consumer's rights pursuant to Sections 1798.100, 1798.104, 1798.105,
    1798.106, 1798.110, 1798.115, and 1798.125 and two or more designated methods for submitting
    requests.
    (B) For purposes of subdivision (c) of Section 1798.110, a list of the categories of
    personal information it has collected about consumers in the preceding 12 months by reference
    to the enumerated category or categories in subdivision (c) of Section 1798.140.
    (C) For purposes of paragraphs (1) and (2) of subdivision (c) of Section 1798.115, two
    separate lists: (i) a list of the categories of personal information it has sold or shared
    about consumers in the preceding 12 months, or a statement that it has not sold or shared
    consumers' personal information in the preceding 12 months; (ii) a list of the categories of
    personal information it has disclosed about consumers for a business purpose in the preceding
    12 months, or a statement that it has not disclosed consumers' personal information for a
    business purpose in the preceding 12 months.

    (4) Ensure that all individuals responsible for handling consumer inquiries about the
    business's privacy practices or the business's compliance with this title are informed of all
    requirements in Sections 1798.100, 1798.105, 1798.106, 1798.110, 1798.115, 1798.125, and
    this section, and how to direct consumers to exercise their rights under those sections.

    (5) Use any personal information collected from the consumer in connection with the business's
    verification of the consumer's request solely for the purposes of verification and shall not
    further collect, use, or disclose the consumer's personal information.

guidance:
  prose: |
    Section 1798.130 defines the operational compliance requirements for businesses. It is
    the implementation backbone for consumer rights. Key requirements:

    1. **Request submission methods:** At minimum two methods (including toll-free phone).
       Online-only businesses need only provide an email address.

    2. **45-day response timeline:** Extendable by 45 days with notice. Covers the preceding
       12-month period. Responses must be free of charge and in a portable format.

    3. **Privacy policy disclosures:** Must include: consumer rights description, request
       submission methods, categories of PI collected (12 months), categories sold/shared
       (12 months), and categories disclosed for business purposes (12 months).

    4. **Staff training:** All individuals handling consumer privacy inquiries must be trained
       on CCPA/CPRA requirements and how to help consumers exercise rights.

    5. **Verification data minimization:** PI collected for identity verification during
       consumer requests must only be used for verification — not repurposed.

    6. **Annual privacy policy update:** The privacy policy must be updated at least every
       12 months to reflect current data practices.

implementation_guidance:
  platform_engineering:
    prose: |
      1. Build a multi-channel consumer request intake system supporting: web form, email,
         toll-free phone (with IVR or agent routing), and in-app request submission.
      2. Implement verifiable consumer request (VCR) identity verification workflow with
         tiered verification levels based on request type and data sensitivity.
      3. Create automated request tracking system with SLA management, 45-day deadline
         tracking, extension notifications, and escalation rules.
      4. Build privacy policy content management system that auto-generates required
         disclosures from the data catalog (categories collected, sold/shared, disclosed
         for business purpose).
      5. Implement response delivery system supporting multiple channels (in-account,
         email, mail) with portable format generation (JSON, CSV, PDF).
      6. Create a training management module that tracks staff completion of CCPA/CPRA
         privacy training and surfaces training status to compliance dashboards.
      7. Implement data minimization controls for verification data — auto-expire and
         delete PI collected solely for verification purposes after request fulfillment.
    tools:
      - privacy-portal
      - dsar-automation
      - workflow-engine
      - ivr-system
      - cms
      - backstage
      - lms

  devsecops:
    prose: |
      1. Implement automated tests verifying all required consumer request submission channels
         are functional and accessible.
      2. Test response delivery formatting — verify portable format compliance (JSON, CSV)
         and that responses include all required disclosure categories.
      3. Validate SLA tracking accuracy — test that 45-day deadlines and extension windows
         are correctly calculated and enforced.
      4. Test identity verification workflows for security (resistance to spoofing) and
         privacy (verification data not persisted beyond request lifecycle).
      5. Implement automated privacy policy compliance checks — scan published policies
         against required disclosures and flag omissions.
      6. Test that verification PI is properly purged after request fulfillment.
    tools:
      - gitlab-ci
      - selenium
      - playwright
      - postman
      - api-testing
      - integration-testing

  secops:
    prose: |
      1. Monitor request fulfillment SLA compliance — dashboard tracking all open requests,
         time-to-response, and approaching deadlines.
      2. Audit identity verification processes — verify that verification is proportionate
         and that verification data is not being repurposed.
      3. Track staff training completion rates and flag untrained personnel handling consumer
         privacy inquiries.
      4. Monitor for consumer complaints or requests that fall through the cracks (submitted
         but not tracked in the system).
      5. Verify privacy policy accuracy quarterly — compare disclosures against actual data
         practices documented in the data catalog.
    tools:
      - dsar-tracking
      - compliance-dashboard
      - siem
      - lms
      - audit-management

