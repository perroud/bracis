id: sec-1798-185
family: enforcement
title: "CPPA Rulemaking Authority and Regulations"
class: CCPA-CPRA

statement:
  prose: |
    (a) On or before July 1, 2020, the Attorney General shall solicit broad public participation
    and adopt regulations to further the purposes of this title, including, but not limited to,
    the following areas:
    (1) Updating as needed additional categories of personal information to those enumerated in
    subdivision (c) of Section 1798.130 and subdivision (v) of Section 1798.140 in order to
    address changes in technology, data collection practices, obstacles to implementation, and
    privacy concerns.
    (2) Updating as needed the definitions of "deidentified" and "unique identifier" to address
    changes in technology, data collection, obstacles to implementation, and privacy concerns,
    and additional tests to determine whether information is "deidentified."
    (3) Establishing any exceptions necessary to comply with state or federal law, including, but
    not limited to, those relating to trade secrets and intellectual property rights.
    (4) Establishing rules and procedures for the following:
    (A) To facilitate and govern the submission of a request by a consumer to opt-out of the
    sale or sharing of personal information pursuant to Section 1798.120 and to limit the use of
    their sensitive personal information pursuant to Section 1798.121.
    (B) To govern business compliance with a consumer's opt-out request.
    (C) For the development and use of a recognizable and uniform opt-out logo or button by all
    businesses to promote consumer awareness of the opportunity to opt-out of the sale of
    personal information.
    (5) Adjusting the monetary thresholds, in January of every odd-numbered year to reflect any
    increase in the Consumer Price Index.
    (7) Establishing rules, procedures, and any exceptions necessary to ensure that the notices
    and information that businesses are required to provide pursuant to this title are provided
    in a manner that may be easily understood by the average consumer, are accessible to consumers
    with disabilities, and are available in the language primarily used to interact with the
    consumer.
    (8) Establishing rules and procedures to further the purposes of Sections 1798.105, 1798.106,
    1798.110, and 1798.115 and to facilitate a consumer's or the consumer's authorized agent's
    ability to delete personal information, correct inaccurate personal information pursuant to
    Section 1798.106, or obtain information pursuant to Section 1798.110, with the goal of
    minimizing the administrative burden on consumers.
    (15) Issuing regulations governing access and opt-out rights with respect to consumers'
    personal information that is used in automated decisionmaking technology, including profiling
    and that govern businesses' response to access requests to include meaningful information
    about the logic involved in those decisionmaking processes, as well as a description of the
    likely outcome of the process with respect to the consumer.
    (16) Issuing regulations to define the term "dark pattern" and to prohibit the use of dark
    patterns.
    (19) Issuing regulations requiring businesses whose processing of consumers' personal
    information presents significant risk to consumers' privacy or security, to perform a
    cybersecurity audit on an annual basis and to submit to the California Privacy Protection
    Agency a risk assessment with respect to their processing of personal information.

    (b) The Attorney General may adopt additional regulations as follows:
    (1) To establish rules and procedures on how to process and comply with verifiable consumer
    requests for specific pieces of personal information relating to a household in order to
    address obstacles to implementation and privacy concerns.
    (2) As necessary to further the purposes of this title.

    (c) The California Privacy Protection Agency, upon its own initiative or upon the request of
    any interested party, may adopt regulations to implement, interpret, and make specific the
    provisions of this title.

guidance:
  prose: |
    Section 1798.185 grants rulemaking authority — first to the Attorney General (original CCPA),
    then transferred to the California Privacy Protection Agency (CPPA) under CPRA. Key
    regulatory areas:

    1. **CPPA as primary regulator:** Since CPRA, the CPPA has authority to adopt regulations
       implementing all CCPA/CPRA provisions. The AG retains enforcement authority.

    2. **Ongoing rulemaking areas:**
       - Automated decisionmaking/profiling regulations (para 15) — expected to impose GDPR
         Article 22-like requirements on algorithmic transparency
       - Cybersecurity audit requirements (para 19) — annual audits for high-risk processors
       - Risk assessment requirements (para 19) — privacy impact assessments submitted to CPPA
       - Dark pattern definitions and prohibitions (para 16)

    3. **Accessibility requirements:** Regulations must ensure CCPA/CPRA notices are accessible
       to consumers with disabilities and available in the consumer's primary language.

    4. **Threshold adjustments:** Monetary thresholds ($25M revenue, etc.) are adjusted for CPI
       in odd-numbered years.

    5. **Practical impact:** Businesses must monitor CPPA rulemaking actively — new regulations
       can create new compliance obligations with implementation deadlines. The regulatory
       landscape is actively evolving.

implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement automated decisionmaking (ADM) and profiling inventory — catalog all
         systems using AI/ML or algorithmic processing that affects consumers, in preparation
         for CPPA ADM regulations.
      2. Build algorithmic transparency reporting capability — ability to explain the logic,
         data inputs, and likely outcomes of ADM systems to individual consumers.
      3. Implement cybersecurity audit infrastructure — continuous compliance monitoring,
         evidence collection, and audit trail generation to support annual cybersecurity
         audit requirements.
      4. Build privacy risk assessment (PRA) workflow system for conducting and documenting
         risk assessments that may need to be submitted to the CPPA.
      5. Implement accessibility compliance for all privacy-related interfaces — WCAG 2.1 AA
         minimum, multi-language support for notices and preference centers.
      6. Create regulatory change management system — track CPPA rulemaking proceedings,
         assess impact on current systems, and plan implementation timelines.
      7. Deploy dark pattern detection and prevention tooling integrated into the UI
         component library and design system.
    tools:
      - ai-model-registry
      - mlflow
      - backstage
      - compliance-dashboard
      - accessibility-testing
      - i18n-platform
      - grc-platform

  devsecops:
    prose: |
      1. Implement automated accessibility testing (WCAG 2.1 AA) in CI/CD for all
         privacy-related pages and components.
      2. Build AI/ML model documentation pipeline that captures model purpose, training
         data, features, logic explanation, and output interpretation for ADM transparency.
      3. Implement automated cybersecurity controls validation — continuous testing of
         security controls that feed into annual audit evidence.
      4. Test multi-language support for all consumer-facing privacy notices and interfaces.
      5. Implement dark pattern detection linting in the design/development pipeline.
      6. Build automated compliance regression testing — when CPPA issues new regulations,
         generate test cases and validate system compliance.
    tools:
      - axe-core
      - lighthouse
      - gitlab-ci
      - trivy
      - sonarqube
      - checkov
      - i18n-testing

  secops:
    prose: |
      1. Establish annual cybersecurity audit program with documented scope, methodology,
         and evidence collection aligned with CPPA requirements.
      2. Conduct and document privacy risk assessments for all high-risk processing
         activities, ready for CPPA submission.
      3. Monitor CPPA rulemaking proceedings and enforce regulatory change management
         processes — track new regulations from proposal through adoption.
      4. Audit ADM/profiling systems for transparency and fairness — verify that explanations
         provided to consumers are accurate and meaningful.
      5. Monitor accessibility compliance of privacy interfaces on an ongoing basis.
      6. Maintain compliance documentation and audit evidence in a format suitable for
         CPPA review or audit.
    tools:
      - grc-platform
      - audit-management
      - compliance-dashboard
      - siem
      - vulnerability-management
      - regulatory-intelligence

