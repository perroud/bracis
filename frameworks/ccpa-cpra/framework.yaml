related_frameworks:
  - framework_id: gdpr
    relationship: mapped
    description: >-
      The CCPA/CPRA shares significant conceptual overlap with the GDPR, including
      consumer rights (access, deletion, portability), purpose limitation, and data
      minimization. Key differences include CCPA's opt-out model vs. GDPR's opt-in
      consent model.
    mapping_file: "mappings/ccpa-cpra_to_gdpr.yaml"
  - framework_id: lgpd
    relationship: mapped
    description: >-
      Brazil's LGPD and CCPA/CPRA both address consumer privacy rights with comparable
      frameworks for access, deletion, and correction. LGPD follows the GDPR consent
      model more closely than CCPA's opt-out approach.
    mapping_file: "mappings/ccpa-cpra_to_lgpd.yaml"
  - framework_id: iso-27701
    relationship: mapped
    description: >-
      ISO 27701 provides a privacy information management system (PIMS) framework that
      supports CCPA/CPRA compliance through structured privacy controls, data processing
      governance, and privacy risk management.
    mapping_file: "mappings/ccpa-cpra_to_iso-27701.yaml"
  - framework_id: nist-800-53-rev5
    relationship: supports
    description: "NIST 800-53 privacy controls (PT family) and security controls provide technical implementation guidance supporting CCPA/CPRA requirements."
    mapping_file: "mappings/ccpa-cpra_to_nist-800-53-rev5.yaml"
