control_families:
  - id: consumer-rights
    title: "Consumer Rights"
    description: "Rights granted to California consumers regarding their personal information, including rights to know, delete, correct, opt-out, and limit use of sensitive personal information"
    sections: "§§ 1798.100 - 1798.125"
    control_count: 9
  - id: business-obligations
    title: "Business Obligations"
    description: "Requirements imposed on businesses for notices, disclosures, opt-out mechanisms, and compliance procedures"
