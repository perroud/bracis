implementation_guidance:
  platform_engineering:
    prose: >-
      Build a GPAI model registry that captures all Annex XI required documentation
      elements including architecture descriptions, training data summaries,
      evaluation benchmarks, known limitations, and computational resource usage.
      Implement automated documentation generation pipelines that extract technical
      documentation from training infrastructure logs, experiment tracking systems,
      and evaluation frameworks. Deploy downstream provider documentation portals
      that provide API access to model capabilities, limitations, and integration
      guidance required under Article 53(2). Build copyright compliance
      infrastructure including robots.txt and TDM reservation parsing for web
      crawlers, opt-out signal detection mechanisms, and data provenance tracking
      for training datasets. Implement automated training data summary generation
      tools that produce publicly publishable summaries of training data composition
      following the AI Office template.
    tools:
      - mlflow
      - backstage
      - datahub
      - kubernetes
      - docs-as-code
      - terraform

  devsecops:
    prose: >-
      Enforce Annex XI technical documentation completeness as a pipeline gate for
      GPAI model releases, preventing distribution of models without complete
      documentation. Integrate copyright compliance checks into training data
      pipelines that verify opt-out signal compliance, licence compatibility, and
      rights reservation detection before data is used for training. Implement
      automated evaluation pipeline stages that generate standardised benchmark
      results and safety evaluation reports as documentation artifacts. Require
      downstream provider documentation updates as part of the model release process,
      enforced through release pipeline prerequisites. Build training data summary
      generation into the model release pipeline, automatically producing and
      publishing summaries for each released model version.
    tools:
      - gitlab-ci
      - mlflow
      - conftest
      - docs-as-code
      - gitlab-compliance-framework
      - dvc

  secops:
    prose: >-
      Monitor GPAI model distribution channels to verify that all distributed models
      include complete technical documentation and downstream provider information.
      Audit training data pipeline logs to verify copyright compliance measures are
      consistently applied including opt-out signal processing and rights reservation
      handling. Track downstream provider information requests and verify they are
      fulfilled within required timeframes. Generate compliance reports showing
      documentation completeness, copyright compliance status, and training data
      summary publication status for all GPAI models. Monitor for public disclosures
      or complaints regarding training data copyright violations that may indicate
      compliance gaps.
    tools:
      - grc-platform
      - splunk
      - elastic-siem
      - servicenow
      - grafana

