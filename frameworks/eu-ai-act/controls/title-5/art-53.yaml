id: art-53
family: title-5
title: "Obligations for Providers of General-Purpose AI Models"
class: EU-AI-Act

statement:
  prose: >-
    Providers of general-purpose AI models shall draw up and keep up to date the
    technical documentation of the model, including its training and testing process
    and the results of its evaluation, provide information and documentation to
    downstream providers who intend to integrate the general-purpose AI model into
    their AI systems, put in place a policy to comply with Union copyright law, and
    draw up and make publicly available a sufficiently detailed summary about the
    content used for training the general-purpose AI model.
  parts:
    - id: art-53.1
      label: "1."
      prose: >-
        Providers of general-purpose AI models shall draw up and keep up to date the
        technical documentation of the model, including its training and testing
        process and the results of its evaluation, which shall contain, at a minimum,
        the information set out in Annex XI for the purpose of providing it, upon
        request, to the AI Office and the national competent authorities.
    - id: art-53.2
      label: "2."
      prose: >-
        Providers of general-purpose AI models shall provide information and
        documentation to providers of AI systems who intend to integrate the general-
        purpose AI model into their AI systems. Without prejudice to the need to respect
        and protect intellectual property rights and confidential business information
        or trade secrets, the information and documentation shall enable providers of AI
        systems to have a good understanding of the capabilities and limitations of the
        general-purpose AI model and to comply with their obligations pursuant to this
        Regulation.
    - id: art-53.3
      label: "3."
      prose: >-
        Providers of general-purpose AI models shall put in place a policy to comply
        with Union law on copyright and related rights, and in particular to identify
        and comply with, including through state of the art technologies, a reservation
        of rights expressed pursuant to Article 4(3) of Directive (EU) 2019/790.
    - id: art-53.4
      label: "4."
      prose: >-
        Providers of general-purpose AI models shall draw up and make publicly available
        a sufficiently detailed summary about the content used for training of the
        general-purpose AI model, according to a template provided by the AI Office.

guidance:
  prose: >-
    Article 53 creates a new category of obligation specific to foundation model and
    large language model providers. Unlike high-risk AI system requirements that focus
    on specific use cases, GPAI obligations apply to the model itself regardless of
    downstream application. The technical documentation requirement (Annex XI) is
    extensive, covering model architecture, training methodology, data sources,
    computational resources, evaluation results, and known limitations. The downstream
    provider obligation creates a supply chain transparency requirement — GPAI
    providers must give sufficient information for integrators to meet their own
    compliance obligations. The copyright compliance requirement responds to ongoing
    litigation around training data rights and requires active measures to respect
    opt-out signals from rights holders. The training data summary requirement is
    a transparency measure enabling public scrutiny of training data composition.

