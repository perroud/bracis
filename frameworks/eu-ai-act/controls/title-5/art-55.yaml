id: art-55
family: title-5
title: "Obligations for Providers of General-Purpose AI Models with Systemic Risk"
class: EU-AI-Act

statement:
  prose: >-
    Providers of general-purpose AI models with systemic risk shall, in addition to
    the obligations laid down in Articles 53 and 54, perform model evaluation in
    accordance with standardised protocols and tools, assess and mitigate possible
    systemic risks, keep track of and report serious incidents, and ensure an adequate
    level of cybersecurity protection.
  parts:
    - id: art-55.1
      label: "1."
      prose: >-
        Providers of general-purpose AI models with systemic risk shall, in addition
        to the obligations laid down in Articles 53 and 54, perform model evaluation
        in accordance with standardised protocols and tools reflecting the state of the
        art, including conducting and documenting adversarial testing of the model with
        a view to identifying and mitigating systemic risks.
    - id: art-55.2
      label: "2."
      prose: >-
        Providers of general-purpose AI models with systemic risk shall assess and
        mitigate possible systemic risks at Union level, including their sources, that
        may stem from the development, the placing on the market, or the use of
        general-purpose AI models with systemic risk. Such assessment shall take into
        account the possible systemic effects of the use of the model, including
        effects on democratic processes, and shall be performed in cooperation with
        independent experts and civil society.
    - id: art-55.3
      label: "3."
      prose: >-
        Providers of general-purpose AI models with systemic risk shall keep track of,
        document and report to the AI Office and, as appropriate, to national competent
        authorities, without undue delay, relevant information about serious incidents
        and possible corrective measures to address them.
    - id: art-55.4
      label: "4."
      prose: >-
        Providers of general-purpose AI models with systemic risk shall ensure an
        adequate level of cybersecurity protection for the general-purpose AI model
        with systemic risk and the physical infrastructure of the model.

guidance:
  prose: >-
    Article 55 creates enhanced obligations for the most capable and potentially
    impactful AI models — those classified as having systemic risk. A GPAI model
    is classified as systemic risk if it has high impact capabilities evaluated on
    the basis of appropriate technical tools and methodologies, including through
    benchmarks, or if designated by the Commission based on criteria in Annex XIII,
    including a presumption for models trained with more than 10^25 FLOPs of
    computation. Systemic risks include risks to public health, safety, public
    security, fundamental rights, or society as a whole, that can be propagated at
    scale across the value chain. The adversarial testing requirement demands
    structured red-teaming covering safety, security, societal impact, and misuse
    potential. The cybersecurity requirement extends to physical infrastructure,
    acknowledging that compromise of a systemic-risk model's training or serving
    infrastructure could have cascading societal effects.

