implementation_guidance:
  platform_engineering:
    prose: >-
      Deploy dedicated red-teaming infrastructure for systemic risk GPAI models that
      supports structured adversarial evaluation covering safety, security, bias,
      misuse potential, and societal impact dimensions. Build automated evaluation
      pipelines that execute standardised benchmark suites including safety benchmarks,
      capability evaluations, and alignment assessments against state-of-the-art
      protocols. Implement systemic risk assessment frameworks within the platform
      that model cascading failure scenarios, value chain propagation paths, and
      societal impact dimensions. Deploy hardened infrastructure for systemic risk
      GPAI model training and serving with enhanced physical security, network
      isolation, supply chain integrity verification, and access controls exceeding
      standard high-risk AI requirements. Build serious incident tracking and
      reporting systems that enable rapid documentation and notification to the
      AI Office when incidents are detected.
    tools:
      - mlflow
      - kubeflow
      - kubernetes
      - terraform
      - vault
      - grafana
      - backstage

  devsecops:
    prose: >-
      Integrate adversarial red-team testing as mandatory pipeline stages for systemic
      risk GPAI model releases, with defined pass criteria covering safety,
      security, and societal impact evaluations. Implement enhanced security scanning
      for GPAI model pipelines including supply chain integrity verification for
      training dependencies, model weight integrity checks, and infrastructure
      security validation. Enforce separation of duties in deployment pipelines for
      systemic risk models requiring independent security review, safety evaluation,
      and compliance approval before release. Build automated serious incident
      detection and reporting pipelines that monitor model outputs during evaluation
      for patterns indicating systemic risk materialisation and trigger reporting
      workflows. Require cybersecurity assessment artifacts specific to the physical
      and logical infrastructure hosting systemic risk models as deployment
      prerequisites.
    tools:
      - gitlab-ci
      - gitlab-compliance-framework
      - trivy
      - cosign
      - gitlab-approval-rules
      - conftest
      - adversarial-robustness-toolbox

  secops:
    prose: >-
      Implement enhanced continuous monitoring for systemic risk GPAI models covering
      model behaviour, infrastructure security, access patterns, and output
      characteristics with lower alert thresholds than standard high-risk AI systems.
      Configure SIEM correlation rules specific to systemic risk indicators including
      unexpected capability emergence, coordinated misuse patterns, and infrastructure
      compromise indicators. Establish dedicated incident response procedures for
      systemic risk GPAI models with defined escalation paths to the AI Office and
      national competent authorities, including pre-formatted reporting templates.
      Conduct periodic cybersecurity assessments of the physical infrastructure
      hosting systemic risk models including penetration testing, physical security
      audits, and supply chain integrity reviews. Monitor public discourse and
      external reports for indications of systemic risk materialisation from
      deployed GPAI models that internal monitoring may not detect.
    tools:
      - splunk
      - elastic-siem
      - wazuh
      - grc-platform
      - grafana
      - vault
      - servicenow

