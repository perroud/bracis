id: art-99
family: title-10
title: "Penalties"
class: EU-AI-Act

statement:
  prose: >-
    Member States shall lay down the rules on penalties, including administrative
    fines, applicable to infringements of this Regulation and shall take all
    measures necessary to ensure that they are properly and effectively implemented.
    The penalties provided for shall be effective, proportionate and dissuasive, and
    shall take into account the interests of small and medium-sized enterprises,
    including start-ups, and their economic viability.
  parts:
    - id: art-99.1
      label: "1."
      prose: >-
        Member States shall lay down the rules on penalties, including administrative
        fines, applicable to infringements of this Regulation by operators and shall
        take all measures necessary to ensure that they are properly and effectively
        implemented. The penalties provided for shall be effective, proportionate and
        dissuasive.
    - id: art-99.2
      label: "2."
      prose: >-
        When deciding on the amount of the administrative fine in each individual case,
        all relevant circumstances of the specific situation shall be taken into account
        including the nature, gravity and duration of the infringement; whether
        administrative fines have already been applied by other market surveillance
        authorities to the same operator for the same infringement; the size, the
        annual turnover and the market share of the operator committing the infringement;
        and any other aggravating or mitigating factor applicable to the circumstances
        of the case.
    - id: art-99.3
      label: "3."
      prose: >-
        Non-compliance with the prohibition of the AI practices referred to in
        Article 5 shall be subject to administrative fines of up to EUR 35 000 000
        or, if the offender is an undertaking, up to 7% of its total worldwide annual
        turnover for the preceding financial year, whichever is higher.
    - id: art-99.4
      label: "4."
      prose: >-
        Non-compliance with any of the following provisions related to operators or
        notified bodies, other than those laid down in Article 5, shall be subject to
        administrative fines of up to EUR 15 000 000 or, if the offender is an
        undertaking, up to 3% of its total worldwide annual turnover for the preceding
        financial year, whichever is higher.
    - id: art-99.5
      label: "5."
      prose: >-
        The supply of incorrect, incomplete or misleading information to notified bodies
        or national competent authorities in reply to a request shall be subject to
        administrative fines of up to EUR 7 500 000 or, if the offender is an
        undertaking, up to 1% of its total worldwide annual turnover for the preceding
        financial year, whichever is higher.

guidance:
  prose: >-
    Article 99 establishes a three-tier penalty structure mirroring the GDPR's fine
    regime but with higher absolute caps for the most severe violations. Tier 1
    (Article 5 prohibited practices): up to EUR 35 million or 7% of global annual
    turnover. Tier 2 (other operator obligations including high-risk AI requirements):
    up to EUR 15 million or 3% of global turnover. Tier 3 (misleading information to
    authorities): up to EUR 7.5 million or 1% of global turnover. For SMEs and
    start-ups, the lower of the two amounts in each tier applies, providing some
    proportionality protection. The penalty structure creates a clear financial
    incentive for compliance, particularly for large technology companies where
    percentage-based fines will be substantial. Mitigating factors include voluntary
    cooperation, remedial action, and the degree of harm. Aggravating factors include
    repeated infringement, deliberate non-compliance, and refusal to cooperate with
    authorities.

references:
  - citation: "EU AI Act (Regulation (EU) 2024/1689), Article 99"
    url: "https://eur-lex.europa.eu/eli/reg/2024/1689/oj"
  - citation: "GDPR Regulation (EU) 2016/679, Article 83 (General conditions for imposing fines)"
    url: "https://eur-lex.europa.eu/eli/reg/2016/679/oj"

implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate penalty risk quantification into the AI system registry by calculating
      potential fine exposure for each registered AI system based on its risk
      classification, compliance status, and the organisation's annual turnover.
      Build compliance gap dashboards that map unresolved compliance issues to their
      corresponding penalty tiers, providing management with a real-time view of
      financial risk exposure. Implement automated compliance scoring that weights
      each AI Act requirement by its penalty tier, prioritising remediation of
      Article 5 violations (7% turnover risk) above other obligations. Deploy
      compliance evidence collection infrastructure that automatically aggregates
      audit trails, documentation artifacts, and monitoring records needed to
      demonstrate compliance or mitigate penalties in enforcement proceedings.
      Build pre-enforcement readiness tools including automated compliance evidence
      packages that can be rapidly assembled in response to regulatory inquiries.
    tools:
      - backstage
      - grc-platform
      - grafana
      - open-policy-agent
      - terraform

  devsecops:
    prose: >-
      Implement compliance scoring in CI/CD pipelines that assigns penalty risk
      levels to detected compliance gaps and blocks deployments exceeding defined
      risk thresholds. Prioritise pipeline enforcement of Article 5 prohibited
      practice checks as the highest severity gate, reflecting the 7% turnover
      penalty exposure. Maintain comprehensive deployment audit trails that serve
      as evidence of compliance efforts and can demonstrate good faith in
      enforcement proceedings. Build automated compliance evidence generation into
      release pipelines that produce compliance packages for each high-risk AI
      system deployment including risk assessments, test results, documentation
      artifacts, and approval records. Implement pipeline stages that verify all
      mandatory registration and notification obligations are met before AI system
      deployment, addressing the Tier 3 penalty risk for incomplete information
      provision.
    tools:
      - gitlab-ci
      - gitlab-compliance-framework
      - conftest
      - checkov
      - gitlab-approval-rules

  secops:
    prose: >-
      Maintain a continuously updated compliance posture dashboard that maps each
      AI system to its compliance status and associated penalty exposure, visible
      to executive management and legal counsel. Configure critical-severity
      alerting for detected Article 5 violations that trigger immediate incident
      response procedures given the maximum penalty exposure. Generate quarterly
      compliance risk reports that quantify aggregate penalty exposure across all
      AI systems and track compliance improvement trends. Maintain a regulatory
      response readiness kit including pre-prepared evidence packages, designated
      response coordinators, and defined processes for interacting with competent
      authorities. Conduct periodic compliance simulation exercises that test the
      organisation's ability to demonstrate compliance to regulatory auditors and
      identify evidence gaps that could weaken a compliance defence.
    tools:
      - grc-platform
      - splunk
      - elastic-siem
      - servicenow
      - grafana

