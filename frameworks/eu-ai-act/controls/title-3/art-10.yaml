id: art-10
family: title-3
title: "Data and Data Governance"
class: EU-AI-Act

statement:
  prose: >-
    High-risk AI systems which make use of techniques involving the training of AI
    models with data shall be developed on the basis of training, validation, and
    testing data sets that meet quality criteria. Data governance and management
    practices shall address data collection, data preparation, data labelling,
    relevant assumptions, prior assessment of availability and suitability, examination
    for biases, and identification of data gaps or shortcomings.
  parts:
    - id: art-10.1
      label: "1."
      prose: >-
        High-risk AI systems which make use of techniques involving the training of AI
        models with data shall be developed on the basis of training, validation and
        testing data sets that meet the quality criteria referred to in paragraphs 2
        to 5.
    - id: art-10.2
      label: "2."
      prose: >-
        Training, validation and testing data sets shall be subject to data governance
        and management practices appropriate for the intended purpose of the high-risk
        AI system. Those practices shall concern in particular the relevant design
        choices; data collection processes and the origin of data; the relevant data
        preparation processing operations such as annotation, labelling, cleaning,
        updating, enrichment and aggregation; the formulation of relevant assumptions
        in particular with respect to the information that the data are supposed to
        measure and represent; an assessment of the availability, quantity and
        suitability of the data sets that are needed; examination in view of possible
        biases that are likely to affect health and safety or lead to discrimination;
        the identification of relevant data gaps or shortcomings and how those gaps
        and shortcomings can be addressed.
    - id: art-10.3
      label: "3."
      prose: >-
        Training, validation and testing data sets shall be relevant, sufficiently
        representative, and to the best extent possible, free of errors and complete
        in view of the intended purpose. They shall have the appropriate statistical
        properties, including, where applicable, as regards the persons or groups of
        persons in relation to whom the high-risk AI system is intended to be used.
    - id: art-10.4
      label: "4."
      prose: >-
        Training, validation and testing data sets shall take into account, to the
        extent required by the intended purpose, the characteristics or elements that
        are particular to the specific geographical, contextual, behavioural or
        functional setting within which the high-risk AI system is intended to be used.
    - id: art-10.5
      label: "5."
      prose: >-
        To the extent that it is strictly necessary for the purpose of ensuring bias
        detection and correction in relation to the high-risk AI systems, the providers
        of such systems may exceptionally process special categories of personal data
        referred to in Article 9(1) of Regulation (EU) 2016/679, subject to appropriate
        safeguards for the fundamental rights and freedoms of natural persons.

guidance:
  prose: >-
    Article 10 addresses the foundational quality of AI systems — the data they are
    trained on. Poor data quality, unrepresentative samples, and embedded biases are
    root causes of AI system failures and discrimination. The data governance
    requirements demand documented processes covering the entire data lifecycle from
    collection through labelling to validation. The bias examination requirement is
    not merely statistical; it requires assessment of potential discriminatory impact
    on protected groups. Paragraph 5 creates a controlled exception to GDPR Article
    9(1) allowing processing of special category data (race, health, etc.) solely for
    bias detection and correction, subject to strict safeguards. Organisations must
    maintain comprehensive data lineage documentation showing provenance, transformations,
    and quality assessments for all training data used in high-risk AI systems.

references:
  - citation: "EU AI Act (Regulation (EU) 2024/1689), Article 10"
    url: "https://eur-lex.europa.eu/eli/reg/2024/1689/oj"
  - citation: "GDPR Regulation (EU) 2016/679, Article 9 (Special categories of personal data)"
    url: "https://eur-lex.europa.eu/eli/reg/2016/679/oj"
  - citation: "ISO/IEC 25012:2008 — Software engineering — Data quality model"
    url: "https://www.iso.org/standard/35736.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a data catalogue and lineage tracking system that records provenance,
      transformations, quality metrics, and bias assessments for all datasets used in
      high-risk AI training. Build automated data quality validation pipelines that
      check training, validation, and testing datasets against configurable quality
      thresholds including completeness, consistency, accuracy, representativeness,
      and statistical balance across protected attributes. Provision isolated and
      access-controlled data environments for high-risk AI development that enforce
      data governance policies through infrastructure-level controls. Integrate
      bias detection tools into the ML platform to automatically generate fairness
      reports as part of the data preparation workflow. Implement dataset versioning
      with immutable storage to ensure reproducibility and auditability of the data
      used for any deployed model version.
    tools:
      - mlflow
      - great-expectations
      - apache-atlas
      - datahub
      - dvc
      - terraform
      - minio

  devsecops:
    prose: >-
      Enforce pipeline gates that validate data quality reports exist and meet
      minimum thresholds before model training jobs execute. Require data governance
      documentation artifacts (data cards, datasheets for datasets) as mandatory
      pipeline prerequisites for any high-risk AI training pipeline. Integrate
      automated bias scanning into CI/CD pipelines that flag statistically
      significant disparities in dataset representation across protected attributes.
      Implement data validation tests as part of the test suite that verify dataset
      properties including size, feature distributions, label balance, and absence
      of data leakage between training, validation, and test splits. Enforce code
      review requirements for data preprocessing pipelines with mandatory review
      from designated data governance reviewers.
    tools:
      - gitlab-ci
      - great-expectations
      - dvc
      - conftest
      - pytest
      - fairlearn

  secops:
    prose: >-
      Monitor data pipelines feeding high-risk AI systems for anomalies indicating
      data quality degradation, distribution shift, or data poisoning attempts.
      Configure alerts for unexpected changes in data source characteristics,
      volume, or schema that could compromise training data integrity. Audit access
      logs for training data repositories to detect unauthorised data modifications
      or exfiltration. Generate periodic data governance compliance reports showing
      dataset quality metrics, bias assessment results, and data lineage completeness
      for all high-risk AI systems. Maintain evidence of data governance practices
      in the GRC platform linked to specific AI system registrations.
    tools:
      - splunk
      - elastic-siem
      - apache-atlas
      - grc-platform
      - grafana

