id: art-9
family: title-3
title: "Risk Management System"
class: EU-AI-Act

statement:
  prose: >-
    A risk management system shall be established, implemented, documented, and
    maintained in relation to high-risk AI systems. The risk management system shall
    be a continuous iterative process planned and run throughout the entire lifecycle
    of a high-risk AI system, requiring regular systematic review and updating.
  parts:
    - id: art-9.1
      label: "1."
      prose: >-
        A risk management system shall be established, implemented, documented and
        maintained in relation to high-risk AI systems. It shall consist of a
        continuous iterative process planned and run throughout the entire lifecycle
        of a high-risk AI system, requiring regular systematic review and updating.
    - id: art-9.2
      label: "2."
      prose: >-
        The risk management system shall include identification and analysis of the
        known and the reasonably foreseeable risks that the high-risk AI system can
        pose to health, safety, or fundamental rights when the high-risk AI system
        is used in accordance with its intended purpose; estimation and evaluation
        of the risks that may emerge when the high-risk AI system is used in accordance
        with its intended purpose and under conditions of reasonably foreseeable misuse;
        evaluation of other risks possibly arising on the basis of the analysis of data
        gathered from the post-market monitoring system; and adoption of appropriate
        and targeted risk management measures.
    - id: art-9.3
      label: "3."
      prose: >-
        The risk management measures referred to in paragraph 2 shall give due
        consideration to the effects and possible interactions resulting from the
        combined application of the requirements set out in this Chapter. They shall
        take into account the generally acknowledged state of the art, including as
        reflected in relevant harmonised standards or common specifications.
    - id: art-9.4
      label: "4."
      prose: >-
        The risk management measures shall be such that the relevant residual risk
        associated with each hazard, as well as the overall residual risk of the
        high-risk AI systems, is judged to be acceptable. In identifying the most
        appropriate risk management measures, the provider shall eliminate or reduce
        risks as far as possible through adequate design and development; implement
        adequate mitigation and control measures addressing risks that cannot be
        eliminated; and provide information to deployers with respect to residual risks.
    - id: art-9.5
      label: "5."
      prose: >-
        High-risk AI systems shall be tested for the purpose of identifying the most
        appropriate and targeted risk management measures. Testing shall ensure that
        high-risk AI systems perform consistently for their intended purpose and that
        they are in compliance with the requirements set out in this Chapter.

guidance:
  prose: >-
    Article 9 mandates a lifecycle-spanning risk management system similar to
    ISO 14971 (medical devices) but applied to AI systems. The system must address
    risks to health, safety, and fundamental rights — not just technical risks.
    This requires cross-functional collaboration between ML engineers, ethicists,
    domain experts, and legal counsel. The risk management process must be
    documented, auditable, and updated as the AI system evolves or as new risks
    emerge from post-market monitoring. The requirement to consider reasonably
    foreseeable misuse means providers must conduct adversarial threat modelling
    beyond intended use cases. Residual risk must be explicitly accepted, documented,
    and communicated to deployers. Testing under paragraph 5 must be representative
    and include edge cases, adversarial inputs, and distributional shift scenarios.

references:
  - citation: "EU AI Act (Regulation (EU) 2024/1689), Article 9"
    url: "https://eur-lex.europa.eu/eli/reg/2024/1689/oj"
  - citation: "ISO 14971:2019 — Application of risk management to medical devices"
    url: "https://www.iso.org/standard/72704.html"
  - citation: "NIST AI Risk Management Framework (AI RMF 1.0)"
    url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a risk management module in the internal developer portal that
      provides structured templates for AI risk identification, analysis,
      evaluation, and treatment aligned with Article 9 requirements. Integrate
      the risk management system with the ML experiment tracking platform to
      automatically link risk assessments to specific model versions, training
      runs, and deployment configurations. Build automated risk scoring pipelines
      that evaluate model outputs against predefined risk indicators such as
      fairness metrics, robustness measures, and safety thresholds. Provision
      dedicated testing environments for high-risk AI systems that support
      adversarial testing, stress testing, and distributional shift simulation.
      Implement version-controlled risk registers that track risk evolution
      across the AI system lifecycle and trigger re-assessment workflows when
      model updates exceed defined change thresholds.
    tools:
      - backstage
      - mlflow
      - kubeflow
      - open-policy-agent
      - grafana
      - terraform

  devsecops:
    prose: >-
      Enforce pipeline gates that require an up-to-date risk assessment artifact
      before any high-risk AI system can be promoted to production. Implement
      automated testing stages that execute risk-specific test suites including
      fairness tests, robustness evaluations, adversarial input testing, and
      performance boundary validation. Require risk management documentation
      updates as part of the merge request process for any change to high-risk
      AI system code, data pipelines, or model configurations. Integrate model
      validation frameworks into CI/CD pipelines to automatically detect
      regression in risk-relevant metrics between model versions. Maintain
      traceability from risk register entries to specific code changes,
      test results, and mitigation implementations through structured commit
      metadata and pipeline artifacts.
    tools:
      - gitlab-ci
      - gitlab-compliance-framework
      - conftest
      - great-expectations
      - pytest
      - evidently-ai

  secops:
    prose: >-
      Continuously monitor high-risk AI systems in production for emerging risks
      through real-time analysis of model inputs, outputs, and performance metrics.
      Configure alerting rules that detect risk indicators such as unexpected input
      distributions, output anomalies, performance degradation, or usage patterns
      suggesting misuse. Feed post-market monitoring data back into the risk
      management system through automated pipelines that update risk assessments
      based on production observations. Generate periodic risk posture reports for
      each high-risk AI system showing risk evolution, mitigation effectiveness,
      and residual risk status. Establish escalation procedures that trigger
      immediate risk re-assessment when critical risk thresholds are breached.
    tools:
      - splunk
      - elastic-siem
      - grafana
      - prometheus
      - grc-platform
      - evidently-ai

