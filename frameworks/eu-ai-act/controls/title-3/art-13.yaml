id: art-13
family: title-3
title: "Transparency and Provision of Information to Deployers"
class: EU-AI-Act

statement:
  prose: >-
    High-risk AI systems shall be designed and developed in such a way as to ensure
    that their operation is sufficiently transparent to enable deployers to interpret
    a system's output and use it appropriately. An appropriate type and degree of
    transparency shall be ensured, with a view to achieving compliance with the
    relevant obligations of the provider and deployer.
  parts:
    - id: art-13.1
      label: "1."
      prose: >-
        High-risk AI systems shall be designed and developed in such a way as to ensure
        that their operation is sufficiently transparent to enable deployers to
        interpret a system's output and use it appropriately. An appropriate type and
        degree of transparency shall be ensured, with a view to achieving compliance
        with the relevant obligations of the provider and deployer set out in Chapter 3
        of this Title.
    - id: art-13.2
      label: "2."
      prose: >-
        High-risk AI systems shall be accompanied by instructions for use in an
        appropriate digital format or otherwise that include concise, complete, correct
        and clear information that is relevant, accessible and comprehensible to
        deployers.
    - id: art-13.3
      label: "3."
      prose: >-
        The information referred to in paragraph 2 shall specify the identity and
        contact details of the provider; the characteristics, capabilities and
        limitations of performance of the high-risk AI system including its intended
        purpose; its level of accuracy, robustness and cybersecurity; any known or
        foreseeable circumstance that may lead to risks to health, safety, or
        fundamental rights; the technical measures put in place to facilitate the
        interpretation of the outputs; where appropriate, its specifications for input
        data or any other relevant information in terms of the training, validation and
        testing data sets used; and where applicable, information to enable deployers
        to interpret the output and use it appropriately.

guidance:
  prose: >-
    Article 13 bridges the gap between technical AI system design and operational
    deployment. Transparency is not just about explainability of model decisions; it
    encompasses the full set of information deployers need to operate the system
    safely and in compliance. Instructions for use must cover system capabilities,
    limitations, performance metrics, known risk scenarios, input specifications, and
    output interpretation guidance. The transparency requirement is proportional to
    the complexity and impact of the system. For systems making decisions affecting
    individuals, deployers must be able to understand the factors influencing specific
    outputs. Providers must balance transparency with protection of trade secrets but
    cannot use IP protection to withhold information necessary for safe deployment.

references:
  - citation: "EU AI Act (Regulation (EU) 2024/1689), Article 13"
    url: "https://eur-lex.europa.eu/eli/reg/2024/1689/oj"
  - citation: "EU AI Act (Regulation (EU) 2024/1689), Article 26 (Obligations of deployers)"
    url: "https://eur-lex.europa.eu/eli/reg/2024/1689/oj"

implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate model explainability tools into the ML serving infrastructure that
      generate interpretable outputs alongside predictions for high-risk AI systems.
      Build standardised model card templates in the service catalogue that capture
      all Article 13(3) required information including provider identity, intended
      purpose, performance metrics, known limitations, risk scenarios, input
      specifications, and output interpretation guidance. Implement deployer-facing
      documentation portals that provide real-time access to system performance
      dashboards, known issues, and operational guidance. Deploy feature attribution
      and explanation services (SHAP, LIME, attention visualisations) as sidecar
      services alongside high-risk AI inference endpoints. Automate the generation
      of instructions for use from model registry metadata, test results, and risk
      assessment artifacts.
    tools:
      - backstage
      - mlflow
      - shap
      - grafana
      - kubernetes
      - docs-as-code

  devsecops:
    prose: >-
      Require model card artifacts and instructions for use documentation as
      mandatory deployment prerequisites in CI/CD pipelines for high-risk AI systems.
      Implement automated checks that validate completeness of Article 13(3) required
      information fields in model documentation before allowing deployment promotion.
      Include explainability test stages in pipelines that verify the AI system
      produces interpretable outputs for representative input scenarios. Enforce
      documentation freshness by blocking deployments when instructions for use have
      not been updated to reflect the current model version. Automate performance
      metric extraction from validation test results into deployer-facing
      documentation artifacts.
    tools:
      - gitlab-ci
      - conftest
      - shap
      - pytest
      - gitlab-compliance-framework
      - mkdocs

  secops:
    prose: >-
      Monitor deployer interactions with high-risk AI systems for patterns suggesting
      misinterpretation of system outputs or use outside intended parameters.
      Configure alerting for scenarios where system outputs fall outside documented
      performance boundaries, indicating potential transparency gaps. Audit deployer
      access to instructions for use and documentation portals to verify information
      availability. Generate compliance reports tracking transparency documentation
      completeness and currency across all high-risk AI systems. Establish feedback
      channels for deployers to report transparency deficiencies, feeding into
      continuous improvement of documentation and explainability features.
    tools:
      - splunk
      - elastic-siem
      - grc-platform
      - grafana
      - servicenow

