id: art-11
family: title-3
title: "Technical Documentation"
class: EU-AI-Act

statement:
  prose: >-
    The technical documentation of a high-risk AI system shall be drawn up before
    that system is placed on the market or put into service and shall be kept
    up to date. The technical documentation shall be drawn up in such a way as to
    demonstrate that the high-risk AI system complies with the requirements set out
    in this Chapter and to provide national competent authorities and notified bodies
    with the necessary information in a clear and comprehensive form to assess the
    compliance of the AI system with those requirements.
  parts:
    - id: art-11.1
      label: "1."
      prose: >-
        The technical documentation of a high-risk AI system shall be drawn up before
        that system is placed on the market or put into service and shall be kept up
        to date. The technical documentation shall be drawn up in such a way as to
        demonstrate that the high-risk AI system complies with the requirements set
        out in this Chapter and to provide national competent authorities and notified
        bodies with the necessary information in a clear and comprehensive form to
        assess the compliance of the AI system with those requirements. It shall
        contain, at a minimum, the elements set out in Annex IV.
    - id: art-11.2
      label: "2."
      prose: >-
        Where a high-risk AI system related to a product covered by the Union
        harmonisation legislation listed in Annex I is placed on the market or put
        into service, a single set of technical documentation shall be drawn up
        containing all the information set out in Annex IV as well as the information
        required under the applicable Union harmonisation legislation.
    - id: art-11.3
      label: "3."
      prose: >-
        The Commission is empowered to adopt delegated acts to amend Annex IV, where
        necessary, to ensure that the technical documentation provides all information
        necessary to assess the compliance of the system with the requirements set out
        in this Chapter, taking into account technical progress.

guidance:
  prose: >-
    Article 11 establishes technical documentation as the primary evidence artifact
    for demonstrating compliance with all Title III requirements. Annex IV specifies
    the minimum contents including: general description of the AI system; detailed
    description of the elements and development process; detailed information about
    monitoring, functioning, and control; description of the risk management system;
    description of data governance measures; description of changes made throughout
    the lifecycle; list of applied harmonised standards; EU declaration of conformity;
    and a detailed description of the system for evaluating AI system performance in
    the post-market phase. Documentation must be maintained throughout the system
    lifecycle and updated whenever significant changes occur. For providers serving
    multiple deployers, documentation must be sufficiently detailed for each deployer
    to understand the system's capabilities and limitations relevant to their use case.

references:
  - citation: "EU AI Act (Regulation (EU) 2024/1689), Article 11"
