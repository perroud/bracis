implementation_guidance:
  platform_engineering:
    prose: >-
      Build an automated technical documentation generation system within the
      internal developer portal that aggregates documentation from multiple sources:
      model registry metadata, experiment tracking logs, data lineage records, risk
      assessment artifacts, and infrastructure configurations. Implement Annex IV
      documentation templates as structured schemas in the developer portal,
      requiring completion of all mandatory sections before a high-risk AI system
      can be registered for deployment. Automate the extraction of system
      architecture diagrams, data flow descriptions, and component dependency
      maps from infrastructure-as-code definitions and service mesh configurations.
      Maintain version-controlled documentation repositories linked to specific
      AI system versions, with automated diff generation showing documentation
      changes between versions. Provide self-service dashboards showing technical
      documentation completeness status for each high-risk AI system.
    tools:
      - backstage
      - mlflow
      - terraform
      - docs-as-code
      - datahub
      - kubernetes

  devsecops:
    prose: >-
      Enforce pipeline gates that verify Annex IV technical documentation
      completeness before allowing deployment of high-risk AI systems. Implement
      automated documentation extraction from code artifacts including model cards,
      data cards, API specifications, and test reports as pipeline stages.
      Require documentation update commits alongside code changes for any
      modification to high-risk AI system components, enforced through merge
      request checklists and approval rules. Generate change logs automatically
      from structured commit messages and pipeline metadata, feeding into the
      lifecycle changes section of technical documentation. Integrate documentation
      validation tests that check for broken references, outdated metrics, and
      missing mandatory sections defined in Annex IV templates.
    tools:
      - gitlab-ci
      - gitlab-compliance-framework
      - gitlab-approval-rules
      - conftest
      - docs-as-code
      - mkdocs

  secops:
    prose: >-
      Monitor technical documentation repositories for staleness by alerting when
      documentation has not been updated within defined intervals relative to system
      changes. Audit documentation access logs to ensure that competent authorities
      and notified bodies can access required documentation upon request. Generate
      compliance reports showing documentation completeness status across all
      high-risk AI systems, highlighting gaps against Annex IV requirements. Maintain
      evidence of documentation review cycles and approval chains in the GRC
      platform. Configure alerts when AI system changes are deployed without
      corresponding documentation updates, indicating a documentation drift risk.
    tools:
      - grc-platform
      - servicenow
      - elastic-siem
      - splunk

