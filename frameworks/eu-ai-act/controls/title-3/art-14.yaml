id: art-14
family: title-3
title: "Human Oversight"
class: EU-AI-Act

statement:
  prose: >-
    High-risk AI systems shall be designed and developed in such a way, including
    with appropriate human-machine interface tools, that they can be effectively
    overseen by natural persons during the period in which they are in use. Human
    oversight shall aim to prevent or minimise the risks to health, safety, or
    fundamental rights that may emerge when a high-risk AI system is used in
    accordance with its intended purpose or under conditions of reasonably
    foreseeable misuse.
  parts:
    - id: art-14.1
      label: "1."
      prose: >-
        High-risk AI systems shall be designed and developed in such a way, including
        with appropriate human-machine interface tools, that they can be effectively
        overseen by natural persons during the period in which they are in use.
    - id: art-14.2
      label: "2."
      prose: >-
        Human oversight shall aim to prevent or minimise the risks to health, safety
        or fundamental rights that may emerge when a high-risk AI system is used in
        accordance with its intended purpose or under conditions of reasonably
        foreseeable misuse, in particular where such risks persist despite the
        application of other requirements set out in this Chapter.
    - id: art-14.3
      label: "3."
      prose: >-
        The oversight measures shall be commensurate with the risks, level of autonomy
        and context of use of the high-risk AI system, and shall be ensured through
        either one or all of the following types of measures: measures identified and
        built into the high-risk AI system by the provider before it is placed on the
        market or put into service; measures identified by the provider before placing
        the high-risk AI system on the market or putting it into service and that are
        appropriate to be implemented by the deployer.
    - id: art-14.4
      label: "4."
      prose: >-
        The measures referred to in paragraph 3 shall enable the individuals to whom
        human oversight is assigned to do the following as appropriate to the
        circumstances: properly understand the relevant capacities and limitations of
        the high-risk AI system and be able to duly monitor its operation; remain aware
        of the possible tendency of automatically relying on the output produced by the
        high-risk AI system (automation bias); be able to correctly interpret the
        high-risk AI system's output; be able to decide, in any particular situation,
        not to use the high-risk AI system or to otherwise disregard, override or
        reverse the output of the high-risk AI system; and be able to intervene in the
        operation of the high-risk AI system or interrupt the system through a stop
        button or a similar procedure that allows the system to come to a halt in a
        safe state.
    - id: art-14.5
      label: "5."
      prose: >-
        For high-risk AI systems referred to in point 1(a) of Annex III, the natural
        persons to whom human oversight has been assigned shall, before taking a
        decision or action based on the identification resulting from the AI system,
        verify and confirm the identification separately by at least two natural
        persons.

guidance:
  prose: >-
    Article 14 embodies the principle that AI systems must remain under meaningful
    human control, not just nominal supervision. The requirements go beyond having
    a human in the loop — they demand that human overseers have the knowledge,
    tools, and authority to effectively intervene. The automation bias provision
    (paragraph 4) is particularly significant: systems must be designed to actively
    counteract the tendency of humans to uncritically accept AI outputs. The stop
    button requirement means high-risk AI systems must support graceful shutdown
    without causing additional harm. For biometric identification, dual human
    verification is mandatory before any action is taken based on the AI output.
    Deployers bear responsibility for ensuring that human oversight personnel are
    adequately trained and empowered to exercise their oversight functions.

references:
  - citation: "EU AI Act (Regulation (EU) 2024/1689), Article 14"
    url: "https://eur-lex.europa.eu/eli/reg/2024/1689/oj"
  - citation: "OECD Principles on AI — Human-centred values and fairness"
    url: "https://oecd.ai/en/ai-principles"

implementation_guidance:
  platform_engineering:
    prose: >-
      Design AI serving infrastructure with mandatory human-in-the-loop checkpoints
      for high-risk decision pathways, implementing approval queues where AI outputs
      require human confirmation before execution. Build human oversight dashboards
      that present AI system outputs alongside confidence scores, feature
      attributions, and relevant context to enable informed human review. Implement
      system-level kill switches and circuit breakers that allow authorised human
      overseers to immediately halt AI system operations and transition to safe
      fallback states. Deploy automation bias countermeasures such as randomised
      verification prompts, mandatory review delays, and confidence calibration
      displays that prevent rubber-stamping of AI outputs. Provision dedicated
      human oversight interfaces with role-based access controls ensuring only
      trained and authorised personnel can approve, override, or halt AI system
      operations.
    tools:
      - backstage
      - grafana
      - kubernetes
      - istio
      - open-policy-agent
      - temporal

  devsecops:
    prose: >-
      Require human oversight interface implementation as a mandatory acceptance
      criterion for high-risk AI system deployments, validated through automated
      UI and API tests in the pipeline. Implement pipeline tests that verify stop
      button functionality, override mechanisms, and safe shutdown procedures work
      correctly under various failure scenarios. Enforce code review requirements
      for changes to human oversight interfaces with mandatory review from UX and
      compliance specialists. Include automation bias testing in pipeline test
      suites that verify human overseers are presented with adequate information
      and appropriate friction to prevent automatic acceptance. Validate that
      human verification workflows for biometric systems enforce dual-person
      verification before action execution.
    tools:
      - gitlab-ci
      - pytest
      - cypress
      - gitlab-approval-rules
      - gitlab-compliance-framework

  secops:
    prose: >-
      Monitor human oversight interactions in real-time to detect patterns suggesting
      automation bias such as consistently rapid approvals, near-zero override rates,
      or approval patterns that statistically mirror AI output patterns without
      meaningful human evaluation. Alert when human oversight functions are bypassed,
      degraded, or when stop mechanisms fail to execute within defined time thresholds.
      Audit human oversight logs to verify that appropriately qualified personnel are
      performing oversight functions and that dual verification requirements for
      biometric systems are consistently met. Generate periodic reports on human
      oversight effectiveness metrics including override rates, response times,
      intervention frequency, and correlation between human decisions and AI
      recommendations. Investigate anomalies suggesting that human oversight has
      become perfunctory or that oversight personnel lack adequate training.
    tools:
      - splunk
      - elastic-siem
      - grafana
      - grc-platform
      - servicenow

