implementation_guidance:
  platform_engineering:
    prose: >-
      Design and deploy a centralised AI logging infrastructure that captures inference
      requests, model outputs, confidence scores, feature attributions, and system
      state for every high-risk AI system interaction. Implement structured logging
      schemas specific to each AI system type ensuring compliance with Article 12
      minimum requirements including timestamps, input references, match results, and
      human verifier identification. Deploy append-only, tamper-evident log storage
      using write-once storage backends or blockchain-anchored integrity verification.
      Build real-time log streaming pipelines from AI inference endpoints to the
      centralised logging platform with guaranteed delivery and ordering. Implement
      log retention policies aligned with regulatory requirements and configure
      automated lifecycle management for log data including archival and purging.
    tools:
      - elastic-stack
      - kafka
      - minio
      - grafana-loki
      - terraform
      - kubernetes

  devsecops:
    prose: >-
      Enforce logging capability as a mandatory non-functional requirement for all
      high-risk AI systems through pipeline validation gates that verify logging
      endpoints are configured and functional. Implement logging integration tests
      that validate log completeness, format compliance, and delivery reliability
      as part of the CI/CD pipeline for every AI system deployment. Require logging
      schema definitions as code artifacts in the repository, validated against
      Article 12 minimum requirements through automated schema validation tools.
      Include log tamper-resistance verification in deployment acceptance tests by
      confirming that write-once storage policies are enforced. Automate log sampling
      tests in staging environments that verify all required fields are populated
      for representative inference scenarios.
    tools:
      - gitlab-ci
      - conftest
      - pytest
      - elastic-stack
      - gitlab-compliance-framework

  secops:
    prose: >-
      Monitor AI system logs in real-time for anomalies indicating system malfunction,
      risk situations per Article 79(1), or substantial modifications to system
      behaviour. Configure SIEM correlation rules specific to AI system logs that
      detect patterns such as unusual inference volumes, confidence score
      distribution shifts, error rate spikes, or missing human verification records.
      Implement automated compliance reporting that verifies log completeness against
      Article 12 requirements on a continuous basis and alerts on gaps. Conduct
      periodic log integrity audits verifying tamper-evidence mechanisms are intact
      and log data has not been modified or deleted outside of retention policies.
      Maintain log access controls ensuring competent authorities can access logs
      upon request while protecting personal data within logs per GDPR requirements.
    tools:
      - splunk
      - elastic-siem
      - grafana
      - grc-platform
      - wazuh

