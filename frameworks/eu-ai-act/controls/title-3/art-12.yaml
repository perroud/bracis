id: art-12
family: title-3
title: "Record-Keeping"
class: EU-AI-Act

statement:
  prose: >-
    High-risk AI systems shall technically allow for the automatic recording of events
    (logs) over the lifetime of the system. The logging capabilities shall ensure a
    level of traceability of the AI system's functioning throughout its lifecycle that
    is appropriate to the intended purpose of the system.
  parts:
    - id: art-12.1
      label: "1."
      prose: >-
        High-risk AI systems shall technically allow for the automatic recording of
        events (logs) over the lifetime of the system. The logging capabilities shall
        ensure a level of traceability of the AI system's functioning throughout its
        lifecycle that is appropriate to the intended purpose of the system.
    - id: art-12.2
      label: "2."
      prose: >-
        In particular, logging capabilities shall enable the monitoring of the
        operation of the high-risk AI system with respect to the occurrence of
        situations that may result in the AI system presenting a risk within the
        meaning of Article 79(1) or lead to a substantial modification, and facilitate
        the post-market monitoring referred to in Article 72.
    - id: art-12.3
      label: "3."
      prose: >-
        For high-risk AI systems referred to in point 1(a) of Annex III, the logging
        capabilities shall provide, at a minimum, the period of each use of the system
        (start date and time and end date and time of each use); the reference database
        against which input data has been checked; the input data for which the search
        has led to a match; and the identification of the natural persons involved in
        the verification of the results.
    - id: art-12.4
      label: "4."
      prose: >-
        For high-risk AI systems referred to in Annex III, the logging capabilities
        shall provide, at a minimum, recording of the periods of each use of the
        system; the reference database against which input data has been checked by
        the system; the input data for which the search has led to a match; and the
        identification of the natural persons involved in the verification of the
        results, as referred to in Article 14(5).

guidance:
  prose: >-
    Article 12 establishes logging as a mandatory technical capability, not merely an
    operational practice. The AI system must be designed and built with logging built
    in, capturing events that enable full traceability of system behaviour. Logs must
    be sufficient to reconstruct why a particular decision or output was produced,
    who was involved in verifying results, and whether the system operated within its
    intended parameters. For biometric identification systems (Annex III, point 1(a)),
    the logging requirements are particularly detailed, requiring timestamps, reference
    database identification, matched inputs, and human verifier identification. Log
    retention periods should align with the AI system lifecycle and applicable sectoral
    regulations. Logs must be tamper-resistant and accessible to competent authorities
    for audit purposes.

references:
  - citation: "EU AI Act (Regulation (EU) 2024/1689), Article 12"
