id: art-5
family: title-2
title: "Prohibited AI Practices"
class: EU-AI-Act

statement:
  prose: >-
    The following artificial intelligence practices shall be prohibited: the placing
    on the market, the putting into service, or the use of AI systems that deploy
    subliminal, manipulative, or deceptive techniques to distort behaviour; exploit
    vulnerabilities of specific groups; perform social scoring; conduct real-time
    remote biometric identification in publicly accessible spaces for law enforcement
    (except in narrowly defined exceptions); infer emotions in workplace and
    education contexts; perform untargeted scraping of facial images; or carry out
    biometric categorisation to infer sensitive attributes.
  parts:
    - id: art-5.1a
      label: "(a)"
      prose: >-
        AI systems that deploy subliminal techniques beyond a person's consciousness
        or purposefully manipulative or deceptive techniques, with the objective or
        the effect of materially distorting the behaviour of a person or group of
        persons by appreciably impairing their ability to make an informed decision,
        thereby causing or being reasonably likely to cause significant harm.
    - id: art-5.1b
      label: "(b)"
      prose: >-
        AI systems that exploit any of the vulnerabilities of a natural person or a
        specific group of persons due to their age, disability, or a specific social
        or economic situation, with the objective or the effect of materially
        distorting the behaviour of that person or a person belonging to that group
        in a manner that causes or is reasonably likely to cause significant harm.
    - id: art-5.1c
      label: "(c)"
      prose: >-
        AI systems for the evaluation or classification of natural persons or groups
        of persons over a certain period of time based on their social behaviour or
        known, inferred, or predicted personal or personality characteristics, with
        the social score leading to detrimental or unfavourable treatment of certain
        natural persons or groups in social contexts unrelated to the contexts in
        which the data was originally generated or collected, or treatment that is
        unjustified or disproportionate to their social behaviour or its gravity.
    - id: art-5.1d
      label: "(d)"
      prose: >-
        AI systems that create or expand facial recognition databases through the
        untargeted scraping of facial images from the internet or CCTV footage.
    - id: art-5.1e
      label: "(e)"
      prose: >-
        AI systems that infer emotions of a natural person in the areas of workplace
        and education institutions, except where the use of the AI system is intended
        to be put in place or on the market for medical or safety reasons.
    - id: art-5.1f
      label: "(f)"
      prose: >-
        AI systems for biometric categorisation that categorise individually natural
        persons based on their biometric data to deduce or infer their race, political
        opinions, trade union membership, religious or philosophical beliefs, sex life,
        or sexual orientation. This prohibition does not cover lawful labelling,
        filtering, or categorisation of biometric datasets acquired in line with Union
        or national law.
    - id: art-5.1g
      label: "(g)"
      prose: >-
        The use of real-time remote biometric identification systems in publicly
        accessible spaces for the purposes of law enforcement, unless and in as far
        as such use is strictly necessary for one of the following objectives: the
        targeted search for specific victims of abduction, trafficking in human beings,
        or sexual exploitation; the prevention of a specific, substantial, and imminent
        threat to life or a foreseeable terrorist attack; or the localisation or
        identification of a suspect of a criminal offence listed in Annex II.

guidance:
  prose: >-
    Article 5 defines the absolute boundaries of AI deployment in the EU. These
    prohibitions apply regardless of risk classification and cannot be waived through
    conformity assessment. Organisations must conduct an inventory of all AI systems
    and verify that none fall within prohibited categories. The emotion recognition
    prohibition in workplace and education settings is particularly relevant for
    organisations deploying AI in HR processes, employee monitoring, or e-learning
    platforms. The social scoring prohibition extends to any system that aggregates
    personal data across contexts to produce a generalised trustworthiness score.
    The real-time biometric identification exception for law enforcement requires
    prior judicial authorisation and is subject to strict necessity and
    proportionality assessment. Violation of Article 5 carries the highest penalty
    tier under the regulation (up to EUR 35 million or 7% of global annual turnover).

references:
  - citation: "EU AI Act (Regulation (EU) 2024/1689), Article 5"
    url: "https://eur-lex.europa.eu/eli/reg/2024/1689/oj"
  - citation: "EU Charter of Fundamental Rights, Articles 1, 7, 8, 21"
