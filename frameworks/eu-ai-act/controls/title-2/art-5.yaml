  - citation: "GDPR Regulation (EU) 2016/679, Article 9 (Special categories of personal data)"
    url: "https://eur-lex.europa.eu/eli/reg/2016/679/oj"

implementation_guidance:
  platform_engineering:
    prose: >-
      Maintain a centralised AI system registry (model catalogue) within the internal
      developer portal that classifies every AI component by EU AI Act risk category.
      Implement automated pre-deployment checks that block any AI system flagged as
      prohibited from progressing through deployment pipelines. Enforce policy-as-code
      rules that prevent provisioning of infrastructure for prohibited AI workloads
      such as social scoring engines, untargeted facial scraping services, or emotion
      recognition systems deployed in workplace or education contexts. Integrate
      metadata schemas into the model registry requiring explicit declaration of AI
      system purpose, target population, and data sources, enabling automated
      detection of prohibited use patterns. Establish technical guardrails in API
      gateways that reject requests matching prohibited AI patterns such as
      real-time biometric identification calls from unauthorised endpoints.
    tools:
      - backstage
      - open-policy-agent
      - mlflow
      - kubeflow
      - terraform
      - api-gateway

  devsecops:
    prose: >-
      Implement CI/CD pipeline gates that scan AI model metadata and deployment
      manifests for prohibited AI practice indicators before allowing promotion to
      staging or production environments. Require mandatory AI impact assessment
      artifacts as pipeline prerequisites for any repository containing ML model code,
      inference endpoints, or data processing pipelines. Enforce merge request
      templates that include explicit attestation that the AI system does not fall
      within Article 5 prohibited categories. Configure static analysis rules to
      detect code patterns associated with prohibited practices such as emotion
      classification libraries used in employee-facing or education-facing
      applications, social scoring aggregation logic, or untargeted facial image
      scraping routines. Maintain audit trails linking every AI deployment to its
      impact assessment and prohibition screening result.
    tools:
      - gitlab-ci
      - gitlab-compliance-framework
      - conftest
      - checkov
      - trivy
      - sonarqube

  secops:
    prose: >-
      Monitor production AI systems for behavioural drift toward prohibited
      practices through continuous output analysis and anomaly detection. Configure
      SIEM correlation rules that alert on patterns indicative of prohibited AI use
      such as bulk facial image acquisition from external sources, cross-context
      personal data aggregation for scoring, or emotion inference API calls
      originating from HR or education platform integrations. Establish an incident
      response playbook specifically for prohibited AI practice detection that
      includes immediate system isolation, evidence preservation, legal notification,
      and regulatory reporting procedures. Conduct periodic red-team exercises
      simulating attempts to deploy prohibited AI systems to validate that
      preventive controls are effective. Maintain a continuously updated threat
      model covering adversarial attempts to circumvent AI prohibition controls.
    tools:
      - splunk
      - elastic-siem
      - grc-platform
      - servicenow
      - mlflow

