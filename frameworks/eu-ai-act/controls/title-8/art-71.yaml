implementation_guidance:
  platform_engineering:
    prose: >-
      Build a post-market monitoring data platform that aggregates telemetry from
      deployed high-risk AI systems including inference logs, performance metrics,
      error rates, deployer feedback, and user complaint data into a unified
      monitoring data store. Implement real-time model performance dashboards
      tracking accuracy, fairness, robustness, and operational metrics against
      pre-defined thresholds established in the post-market monitoring plan.
      Deploy automated drift detection services that continuously compare production
      data distributions and model performance against baseline measurements from
      conformity assessment. Build deployer feedback channels as platform services
      including structured incident reporting APIs, performance degradation
      notification endpoints, and cooperative assessment workflows. Implement
      automated alerting and escalation workflows that trigger corrective action
      assessments when monitoring metrics breach defined thresholds.
    tools:
      - grafana
      - prometheus
      - mlflow
      - evidently-ai
      - kafka
      - backstage
      - terraform

  devsecops:
    prose: >-
      Integrate post-market monitoring configuration as a mandatory deployment
      artifact for high-risk AI systems, verified through pipeline gates that
      confirm monitoring endpoints, alerting rules, and data collection pipelines
      are operational. Implement automated post-market monitoring plan generation
      from structured templates, populated with system-specific metrics, thresholds,
      and data sources defined during development. Build corrective action pipelines
      that can rapidly deploy model updates, configuration changes, or rollbacks
      when post-market monitoring identifies compliance issues. Include post-market
      monitoring test stages in deployment pipelines that validate data collection,
      alerting, and escalation mechanisms are functional in the target environment.
      Maintain traceability from post-market monitoring findings to corrective
      action implementations through structured issue tracking and merge request
      linking.
    tools:
      - gitlab-ci
      - evidently-ai
      - gitlab-compliance-framework
      - conftest
      - terraform
      - pytest

  secops:
    prose: >-
      Operate the post-market monitoring system as a continuous security and
      compliance function, treating AI system performance degradation and
      compliance drift as security-relevant events. Configure SIEM integration
      with AI monitoring platforms to correlate AI system behaviour anomalies with
      security events and environmental changes. Generate periodic post-market
      monitoring compliance reports for each high-risk AI system showing trend
      analysis, incident summaries, corrective actions taken, and current compliance
      status. Maintain evidence of post-market monitoring activities in the GRC
      platform linked to specific AI system registrations and conformity
      assessments. Coordinate with deployers on joint monitoring activities and
      ensure deployer-reported issues are documented, analysed, and addressed
      within defined service levels.
    tools:
      - splunk
      - elastic-siem
      - grafana
      - grc-platform
      - servicenow
      - evidently-ai

