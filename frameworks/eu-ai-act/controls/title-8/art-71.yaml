id: art-71
family: title-8
title: "Post-Market Monitoring by Providers and Post-Market Monitoring Plan for High-Risk AI Systems"
class: EU-AI-Act

statement:
  prose: >-
    Providers shall establish and document a post-market monitoring system in a manner
    that is proportionate to the nature of the AI technologies and the risks of the
    high-risk AI system. The post-market monitoring system shall actively and
    systematically collect, document, and analyse relevant data which may be provided
    by deployers or which may be collected through other sources, on the performance
    of high-risk AI systems throughout their lifetime.
  parts:
    - id: art-71.1
      label: "1."
      prose: >-
        Providers shall establish and document a post-market monitoring system in a
        manner that is proportionate to the nature of the AI technologies and the risks
        of the high-risk AI system.
    - id: art-71.2
      label: "2."
      prose: >-
        The post-market monitoring system shall actively and systematically collect,
        document and analyse relevant data which may be provided by deployers or which
        may be collected through other sources on the performance of high-risk AI
        systems throughout their lifetime, and which allow the provider to evaluate the
        continuous compliance of AI systems with the requirements set out in Chapter 2
        of this Title.
    - id: art-71.3
      label: "3."
      prose: >-
        The post-market monitoring system shall be based on a post-market monitoring
        plan. The post-market monitoring plan shall be part of the technical
        documentation referred to in Annex IV. The Commission shall adopt an
        implementing act laying down detailed provisions establishing a template for
        the post-market monitoring plan and the list of elements to be included in
        the plan.
    - id: art-71.4
      label: "4."
      prose: >-
        For high-risk AI systems referred to in Annex III, the provider shall collect,
        document, and analyse the data referred to in paragraph 2, and assess the need
        for any corrective or preventive action, where appropriate, in cooperation with
        the deployer.

guidance:
  prose: >-
    Article 71 extends compliance obligations beyond the point of deployment into
    the operational lifetime of the AI system. Post-market monitoring is not passive
    — it requires active, systematic data collection from multiple sources including
    deployer feedback, system telemetry, incident reports, and user complaints. The
    monitoring system must be capable of detecting performance degradation, emerging
    risks, and compliance drift that may not be apparent during pre-market testing.
    The post-market monitoring plan must be documented as part of the Annex IV
    technical documentation, creating a pre-defined framework for ongoing surveillance.
    For Annex III high-risk systems, providers must actively cooperate with deployers
    to assess whether corrective or preventive action is needed based on monitoring
    data. This creates a continuous feedback loop between providers and deployers
    that must be technically supported and documented.

