risk_categories:
  - id: unacceptable
    title: "Unacceptable Risk"
    titles: [title-2]
    description: >-
      AI practices that are prohibited outright due to their fundamental
      incompatibility with EU values and fundamental rights. Includes social
      scoring, real-time remote biometric identification in public spaces
      for law enforcement (with narrow exceptions), subliminal manipulation,
      and exploitation of vulnerabilities.
  - id: high-risk
    title: "High-Risk"
    titles: [title-3]
    description: >-
      AI systems listed in Annex III or used as safety components of products
      covered by Union harmonisation legislation in Annex I. Subject to
      mandatory conformity assessment, risk management, data governance,
      transparency, human oversight, accuracy, and robustness requirements.
  - id: limited-risk
    title: "Limited Risk"
    titles: [title-4]
    description: >-
      AI systems with specific transparency obligations including chatbots,
      deepfake generators, emotion recognition systems, and biometric
      categorisation systems. Users must be informed they are interacting
      with AI or that content is AI-generated.
  - id: minimal-risk
    title: "Minimal Risk"
    titles: []
    description: >-
      AI systems that pose minimal or no risk and are not subject to specific
      obligations beyond voluntary codes of conduct. Includes AI-enabled video
      games, spam filters, and inventory management systems.

