id: cm-6
family: cm
title: "Configuration Settings"
class: SP800-53
baselines: [low, moderate, high]
parameters:
  - id: cm-06_odp.01
    label: "common secure configurations"
    guidance: >-
      Organization-defined common secure configurations to be employed for system components
      (e.g., CIS Benchmarks, DISA STIGs, vendor hardening guides)
  - id: cm-06_odp.02
    label: "system components"
    guidance: "Organization-defined system components requiring secure configuration"
  - id: cm-06_odp.03
    label: "operational requirements"
    guidance: "Organization-defined operational requirements that necessitate deviation from established configuration settings"
statement:
  prose: >-
    a. Establish and document configuration settings for components employed within the system that
       reflect the most restrictive mode consistent with operational requirements using
       [Assignment: organization-defined common secure configurations];
    b. Implement the configuration settings;
    c. Identify, document, and approve any deviations from established configuration settings for
       [Assignment: organization-defined system components] based on [Assignment: organization-defined
       operational requirements]; and
    d. Monitor and control changes to the configuration settings in accordance with organizational
       policies and procedures.
  parts:
    - id: cm-6_smt.a
      label: "a."
      prose: >-
        Establish and document configuration settings for components employed within the system
        that reflect the most restrictive mode consistent with operational requirements using
        [Assignment: organization-defined common secure configurations];
    - id: cm-6_smt.b
      label: "b."
      prose: "Implement the configuration settings;"
    - id: cm-6_smt.c
      label: "c."
      prose: >-
        Identify, document, and approve any deviations from established configuration settings
        for [Assignment: organization-defined system components] based on [Assignment: organization-defined
        operational requirements]; and
    - id: cm-6_smt.d
      label: "d."
      prose: >-
        Monitor and control changes to the configuration settings in accordance with organizational
        policies and procedures.
guidance:
  prose: >-
    Common secure configurations (also known as security configuration checklists, lockdown and
    hardening guides, and security technical implementation guides) provide recognized, standardized,
    and established benchmarks that stipulate secure configuration settings for information technology
    products and platforms as well as instructions for configuring those products or platforms to
    meet operational requirements. Common secure configurations can be developed by a variety of
    organizations, including information technology product developers, manufacturers, vendors,
    federal agencies, consortia, academia, industry, and other organizations in the public and
    private sectors. Implementation of a common secure configuration may be mandated at the
    organization level, the mission and business process level, the system level, or at a higher
    level, including by a regulatory agency. Common secure configurations include the United States
    Government Configuration Baseline (USGCB), Security Technical Implementation Guides (STIGs),
    and Center for Internet Security (CIS) Benchmarks.
enhancements:
  - id: cm-6.1
    title: "Automated Management, Application, and Verification"
    baselines: [high]
  - id: cm-6.2
    title: "Respond to Unauthorized Changes"
    baselines: [high]
references:
  - citation: "NIST SP 800-70 Rev. 4"
    url: "https://doi.org/10.6028/NIST.SP.800-70r4"
  - citation: "NIST SP 800-128"
    url: "https://doi.org/10.6028/NIST.SP.800-128"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement configuration hardening as code using CIS Benchmark profiles applied through
      configuration management tools. Use Kubernetes Pod Security Standards (Restricted profile)
      to enforce secure container configurations. Apply node hardening through golden images built
      with CIS-compliant configurations via Packer. Use admission controllers to reject workloads
      that deviate from established security configurations (non-root, read-only rootfs, no
      privilege escalation, dropped capabilities). Implement network policies as default-deny
      with explicit allow rules. Use Terraform modules that enforce secure defaults for cloud
      resources (encryption at rest, encryption in transit, logging enabled).
    tools:
      - "CIS Benchmarks / DISA STIGs"
      - "Kubernetes Pod Security Standards"
      - "OPA Gatekeeper / Kyverno"
      - "Packer (hardened images)"
      - "Terraform (secure defaults)"
      - "Ansible / Chef / Puppet (configuration management)"
  devsecops:
    prose: >-
      Enforce secure configuration settings through automated CI/CD pipeline checks. Use Checkov,
      tfsec, or Trivy to scan infrastructure-as-code for configuration deviations from CIS
      Benchmarks. Implement container image scanning to verify base images meet hardening
      requirements. Require all configuration changes to go through merge request review with
      security team approval for deviations from secure baselines. Document approved deviations
      as exception records in the merge request with justification and risk acceptance.
    tools:
      - "Checkov / tfsec / KICS"
      - "Trivy (misconfiguration scanning)"
      - "GitLab Container Scanning"
      - "GitLab SAST"
      - "Conftest"
      - "Hadolint (Dockerfile linting)"
  secops:
    prose: >-
      Continuously monitor system configurations against established baselines using cloud security
      posture management (CSPM) tools. Alert on configuration drift and unauthorized changes.
      Conduct regular configuration compliance assessments using automated scanning tools. Track
      approved deviations with expiration dates and periodic revalidation. Generate configuration
      compliance reports for audit evidence.
    tools:
      - "CSPM (Prisma Cloud, Wiz, AWS Security Hub)"
      - "AWS Config / Azure Policy / GCP Security Command Center"
      - "CIS-CAT Pro Assessor"
      - "Wazuh / OSSEC"
      - "Qualys / Nessus (configuration audit)"