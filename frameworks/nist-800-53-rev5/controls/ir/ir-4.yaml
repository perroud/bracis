id: ir-4
family: ir
title: "Incident Handling"
class: SP800-53
baselines: [low, moderate, high]
parameters:
  - id: ir-04_odp.01
    label: "personnel or roles"
    guidance: "Organization-defined personnel or roles aware of and trained in incident handling"
statement:
  prose: >-
    a. Implement an incident handling capability for incidents that is consistent with the
       incident response plan and includes preparation, detection and analysis, containment,
       eradication, and recovery;
    b. Coordinate incident handling activities with contingency planning activities;
    c. Incorporate lessons learned from ongoing incident handling activities into incident response
       procedures, training, and testing, and implement the resulting changes accordingly; and
    d. Ensure the rigor, intensity, scope, and results of incident handling activities are
       comparable and predictable across the organization.
  parts:
    - id: ir-4_smt.a
      label: "a."
      prose: >-
        Implement an incident handling capability for incidents that is consistent with the
        incident response plan and includes preparation, detection and analysis, containment,
        eradication, and recovery;
    - id: ir-4_smt.b
      label: "b."
      prose: "Coordinate incident handling activities with contingency planning activities;"
    - id: ir-4_smt.c
      label: "c."
      prose: >-
        Incorporate lessons learned from ongoing incident handling activities into incident
        response procedures, training, and testing, and implement the resulting changes accordingly; and
    - id: ir-4_smt.d
      label: "d."
      prose: >-
        Ensure the rigor, intensity, scope, and results of incident handling activities are
        comparable and predictable across the organization.
guidance:
  prose: >-
    Organizations recognize that incident response capabilities are dependent on the capabilities
    of organizational systems and the mission and business processes being supported by those
    systems. Organizations consider incident response as part of the definition, design, and
    development of mission and business processes and systems. Incident-related information can
    be obtained from a variety of sources, including audit monitoring, physical access monitoring,
    and network monitoring; user or administrator reports; and reported supply chain events. An
    effective incident handling capability includes coordination among many organizational entities
    (e.g., mission or business owners, system owners, authorizing officials, human resources
    offices, physical security offices, personnel security offices, legal departments, risk
    executive [function], operations personnel, procurement offices). Suspected security incidents
    include the receipt of suspicious email communications that can contain malicious code.
    Suspected supply chain incidents include the insertion of counterfeit hardware or malicious
    code in organizational systems or system components. For federal agencies, an incident that
    involves personally identifiable information is considered a breach. A breach results in
    unauthorized disclosure, the loss of control, unauthorized acquisition, compromise, or a
    similar occurrence where a person other than an authorized user accesses or potentially
    accesses personally identifiable information or an authorized user accesses or potentially
    accesses personally identifiable information for an other than authorized purpose.
