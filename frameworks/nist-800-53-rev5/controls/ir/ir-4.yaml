implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated incident detection through monitoring stack integration (Prometheus,
      Grafana, alerting rules). Deploy runtime security tools (Falco, Tetragon) that detect
      anomalous container behavior and trigger automated containment (network policy enforcement,
      pod termination). Implement automated runbooks using incident management platforms that
      execute predefined response playbooks. Design infrastructure for rapid containment through
      network segmentation, namespace isolation, and service mesh circuit breakers. Maintain
      immutable infrastructure that enables rapid recovery through redeployment rather than
      remediation. Implement chaos engineering practices to validate incident response procedures.
    tools:
      - "Falco / Tetragon (runtime detection)"
      - "PagerDuty / Opsgenie (incident management)"
      - "Prometheus / Grafana (alerting)"
      - "Kubernetes NetworkPolicy (containment)"
      - "Istio (circuit breakers)"
      - "ArgoCD (rapid recovery via GitOps)"
      - "Velero (backup/restore)"
  devsecops:
    prose: >-
      Integrate security incident detection into the development lifecycle. Use GitLab Security
      Dashboard findings as early indicators of potential incidents. Implement automated security
      scanning in CI/CD that detects indicators of compromise in code and dependencies. Maintain
      incident response playbooks as code in version-controlled repositories. Use merge requests
      to document and track remediation actions taken during incident response. Implement automated
      rollback capabilities through CI/CD pipelines for rapid recovery.
    tools:
      - "GitLab Security Dashboard"
      - "GitLab Incident Management"
      - "GitLab CI/CD (automated rollback)"
      - "Dependency scanning (supply chain incidents)"
      - "Secret Detection (credential exposure)"
      - "DAST (runtime vulnerability detection)"
  secops:
    prose: >-
      Operate a Security Operations Center (SOC) or equivalent capability with defined incident
      handling procedures aligned to NIST SP 800-61. Implement tiered response processes with
      clear escalation paths and SLAs. Use SOAR platforms to automate repetitive incident handling
      tasks (enrichment, containment, notification). Maintain a threat intelligence program that
      feeds detection rules and response playbooks. Conduct post-incident reviews (PIRs) and
      incorporate lessons learned into updated procedures, detection rules, and training materials.
      Track incident metrics (MTTD, MTTR, incident volume by category) to measure and improve
      capability.
    tools:
      - "SIEM (Splunk, Elastic Security, Chronicle)"
      - "SOAR (Cortex XSOAR, Tines, Shuffle)"
      - "Incident management (PagerDuty, ServiceNow)"
      - "Threat intelligence (MISP, OpenCTI)"
      - "Digital forensics (Velociraptor, GRR)"
      - "GitLab Incident Management"