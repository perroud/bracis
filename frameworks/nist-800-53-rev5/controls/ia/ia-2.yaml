id: ia-2
family: ia
title: "Identification and Authentication (Organizational Users)"
class: SP800-53
baselines: [low, moderate, high]
statement:
  prose: >-
    Uniquely identify and authenticate organizational users, processes acting on behalf of
    organizational users, and devices.
guidance:
  prose: >-
    Organizations can satisfy the identification and authentication requirements by complying
    with the requirements in HSPD 12. Organizational users include employees or individuals
    who organizations consider to have an equivalent status to employees (e.g., contractors
    and guest researchers). Unique identification of individuals in group accounts (e.g., shared
    privilege accounts) may need to be considered on a case-by-case basis. Authentication of
    user identities is accomplished through the use of passwords, physical authenticators,
    biometrics, or in combination (i.e., multifactor authentication). NIST SP 800-63B provides
    guidance on digital identity authentication. Access to organizational systems is defined as
    either local access or network access. Local access is any access to organizational systems
    by users (or processes acting on behalf of users) where access is obtained through direct
    connections without the use of networks. Network access is access to organizational systems
    by users (or processes acting on behalf of users) where access is obtained through network
    connections (i.e., nonlocal accesses). Remote access is a type of network access that involves
    communication through external networks. Internal networks include local area networks and
    wide area networks. The use of encrypted virtual private networks for connections between
    organization-controlled endpoints and non-organization controlled endpoints may be treated
    as internal networks with regard to protecting the confidentiality and integrity of information
    traversing the network.
