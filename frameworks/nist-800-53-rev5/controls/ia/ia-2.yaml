implementation_guidance:
  platform_engineering:
    prose: >-
      Implement centralized authentication through an Identity Provider (IdP) using SAML 2.0 or
      OIDC protocols. Enforce multi-factor authentication (MFA) for all user accounts, with
      hardware security keys (FIDO2/WebAuthn) required for privileged accounts. Use short-lived
      tokens (JWT with expiration) rather than long-lived credentials. Implement machine identity
      through X.509 certificates managed by a PKI or service mesh (mTLS). Use Kubernetes
      ServiceAccount tokens with audience-bound, time-limited projections. Integrate with
      enterprise directory services (LDAP/Active Directory) for centralized identity management.
      Implement SSO across all platform services to reduce credential sprawl.
    tools:
      - "Okta / Azure AD / Keycloak / Google Workspace"
      - "FIDO2/WebAuthn hardware keys"
      - "cert-manager (Kubernetes PKI)"
      - "Istio mTLS"
      - "SPIFFE/SPIRE (workload identity)"
      - "Vault (identity and secrets)"
  devsecops:
    prose: >-
      Enforce SAML/OIDC SSO for GitLab access with mandatory MFA. Configure GitLab to require
      two-factor authentication at the group level. Use deploy tokens and CI job tokens instead
      of personal access tokens for automation. Implement signed commits (GPG or SSH signing) to
      verify developer identity. Scan code for hardcoded credentials in CI pipelines. Enforce
      SSH key rotation policies. Use protected environments with additional authentication
      requirements for production deployments.
    tools:
      - "GitLab SAML SSO"
      - "GitLab 2FA enforcement"
      - "GitLab Deploy Tokens / CI Job Tokens"
      - "Git commit signing (GPG/SSH)"
      - "GitLeaks / TruffleHog (secret scanning)"
      - "GitLab Secret Detection"
  secops:
    prose: >-
      Monitor authentication events for anomalies including impossible travel, brute force
      attempts, MFA bypass, and credential stuffing. Implement conditional access policies
      that adjust authentication requirements based on risk signals (location, device posture,
      time). Alert on use of service accounts from unexpected sources. Monitor for compromised
      credentials through integration with breach databases and threat intelligence feeds.
      Conduct periodic authentication mechanism reviews to ensure MFA adoption rates meet targets.
    tools:
      - "SIEM (authentication event correlation)"
      - "Identity Threat Detection and Response (ITDR)"
      - "Conditional Access (Azure AD, Okta)"
      - "Have I Been Pwned API"
      - "CrowdStrike / SentinelOne (endpoint identity)"