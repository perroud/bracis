guidance:
  prose: >-
    System monitoring includes external and internal monitoring. External monitoring includes the
    observation of events occurring at external interfaces to the system. Internal monitoring
    includes the observation of events occurring within the system. Organizations monitor systems
    by observing audit activities in real time or by observing other system aspects such as access
    patterns, characteristics of access, and other actions. The monitoring objectives guide and
    inform the determination of the events. System monitoring capabilities are achieved through a
    variety of tools and techniques, including intrusion detection and prevention systems,
    malicious code protection software, scanning tools, audit record monitoring software, and
    network monitoring software. Depending on the security architecture, the distribution and
    configuration of monitoring devices may impact throughput at key internal and external
    boundaries as well as at other locations across a network due to the introduction of network
    combatants. If monitoring devices are consolidated at a single point, the impact on throughput
    may be more significant. Strategic locations for monitoring devices include selected perimeter
    locations and near key servers and server farms that support critical applications. Monitoring
    devices are typically employed at the managed interfaces associated with the systems.
    Organizations consider access as well as action monitoring. Monitoring for anomalies is not
    limited to security-relevant events. Organizations deploy monitoring devices in ad hoc locations
    to support specialized monitoring needs such as advanced persistent threats.
