implementation_guidance:
  platform_engineering:
    prose: >-
      Deploy comprehensive monitoring across all infrastructure layers. Use Prometheus for metrics
      collection with alerting rules for anomalous patterns. Deploy Falco or Tetragon as daemonsets
      for runtime security monitoring that detects syscall-level anomalies, unexpected process
      execution, and file system modifications. Implement eBPF-based network monitoring for
      visibility into encrypted east-west traffic. Use Kubernetes audit logging for API server
      monitoring. Deploy node-level monitoring (node_exporter) and container-level monitoring
      (cAdvisor). Implement distributed tracing (Jaeger, Tempo) for request-level visibility
      across microservices. Use service mesh telemetry for inter-service communication monitoring.
    tools:
      - "Prometheus / Thanos / Mimir"
      - "Grafana (visualization and alerting)"
      - "Falco / Tetragon (runtime security)"
      - "eBPF-based monitoring (Cilium Hubble)"
      - "Kubernetes Audit Logging"
      - "OpenTelemetry (traces, metrics, logs)"
      - "Jaeger / Tempo (distributed tracing)"
  devsecops:
    prose: >-
      Implement security monitoring as part of the deployment pipeline. Run SAST, DAST, dependency
      scanning, container scanning, and secret detection in every pipeline execution. Use GitLab
      Security Dashboard as a centralized view of security findings. Configure vulnerability
      auto-triage rules. Implement runtime application self-protection (RASP) or monitoring
      agents deployed alongside applications. Monitor CI/CD pipeline anomalies (unusual build
      patterns, unexpected dependencies, unauthorized configuration changes) as indicators of
      supply chain compromise.
    tools:
      - "GitLab SAST"
      - "GitLab DAST"
      - "GitLab Dependency Scanning"
      - "GitLab Container Scanning"
      - "GitLab Secret Detection"
      - "GitLab Security Dashboard"
      - "Trivy"
  secops:
    prose: >-
      Operate SIEM with detection rules aligned to MITRE ATT&CK and mapped to organizational
      monitoring objectives. Implement tiered alerting with automated triage for high-fidelity
      detections and analyst queues for lower-confidence events. Deploy Network Detection and
      Response (NDR) for network-layer monitoring. Implement User and Entity Behavior Analytics
      (UEBA) for insider threat detection. Conduct continuous vulnerability assessment and
      penetration testing. Monitor for indicators of compromise (IOCs) through threat intelligence
      integration. Adjust monitoring sensitivity based on threat level changes.
    tools:
      - "SIEM (Splunk, Elastic Security, Chronicle, Sentinel)"
      - "NDR (Darktrace, ExtraHop, Corelight)"
      - "EDR (CrowdStrike, SentinelOne, Carbon Black)"
      - "SOAR (automated response)"
      - "Threat intelligence feeds"
      - "Vulnerability scanners (Qualys, Nessus, Rapid7)"