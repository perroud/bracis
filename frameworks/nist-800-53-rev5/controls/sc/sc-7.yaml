id: sc-7
family: sc
title: "Boundary Protection"
class: SP800-53
baselines: [low, moderate, high]
statement:
  prose: >-
    a. Monitor and control communications at the external managed interfaces to the system
       and at key internal managed interfaces within the system;
    b. Implement subnetworks for publicly accessible system components that are [Selection:
       physically; logically] separated from internal organizational networks; and
    c. Connect to external networks or systems only through managed interfaces consisting
       of boundary protection devices arranged in accordance with an organizational security
       and privacy architecture.
  parts:
    - id: sc-7_smt.a
      label: "a."
      prose: >-
        Monitor and control communications at the external managed interfaces to the system
        and at key internal managed interfaces within the system;
    - id: sc-7_smt.b
      label: "b."
      prose: >-
        Implement subnetworks for publicly accessible system components that are [Selection:
        physically; logically] separated from internal organizational networks; and
    - id: sc-7_smt.c
      label: "c."
      prose: >-
        Connect to external networks or systems only through managed interfaces consisting of
        boundary protection devices arranged in accordance with an organizational security
        and privacy architecture.
guidance:
  prose: >-
    Managed interfaces include gateways, routers, firewalls, guards, network-based malicious
    code analysis, virtualization systems, or encrypted tunnels implemented within a security
    architecture. Subnetworks that are physically or logically separated from internal networks
    are referred to as demilitarized zones or DMZs. Restricting or prohibiting interfaces within
    organizational systems includes restricting external web traffic to designated web servers
    within managed interfaces, prohibiting external traffic that appears to be spoofing internal
    addresses, and restricting information system access to specific IP addresses or ranges of
    addresses. Organizations consider the shared nature of commercial telecommunications in the
    implementation of security controls associated with the use of such services. Commercial
    telecommunications services are commonly based on network components and consolidated
    management systems shared by all attached commercial customers and may also include third-party
    provided access lines and other service elements. Such services may therefore represent sources
    of increased risk despite contractual agreements with telecommunications providers. Organizations
    consider concepts such as zero trust and micro-segmentation as part of boundary protection strategies.
