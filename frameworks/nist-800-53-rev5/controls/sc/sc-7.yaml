implementation_guidance:
  platform_engineering:
    prose: >-
      Implement network segmentation using Kubernetes NetworkPolicies with default-deny ingress
      and egress rules per namespace. Deploy a service mesh (Istio, Linkerd) for workload-to-workload
      mTLS and authorization policies. Use cloud VPCs with private subnets for internal services
      and public subnets only for load balancers and ingress controllers. Implement Web Application
      Firewalls (WAF) at ingress points. Use cloud-native firewalls (Security Groups, NSGs) as the
      first layer of defense. Deploy API gateways for all external-facing services with rate limiting,
      authentication, and input validation. Implement zero-trust network architecture where every
      connection is authenticated and authorized regardless of network location.
    tools:
      - "Kubernetes NetworkPolicy"
      - "Istio / Linkerd (service mesh)"
      - "Cloud VPC / Subnets"
      - "WAF (AWS WAF, Cloudflare, ModSecurity)"
      - "Ingress controllers (NGINX, Envoy)"
      - "Calico / Cilium (network policy enforcement)"
      - "API Gateway (Kong, Ambassador)"
  devsecops:
    prose: >-
      Define network boundaries as code using Terraform for cloud network infrastructure and
      Kubernetes manifests for cluster-level segmentation. Validate network configurations in
      CI/CD pipelines using policy-as-code tools. Scan for exposed services and open ports as
      part of the deployment pipeline. Implement DAST scanning that tests boundary protection
      effectiveness from an external perspective. Enforce that all network configuration changes
      go through merge request review with security approval.
    tools:
      - "Terraform (VPC, Security Groups, NSGs)"
      - "Kubernetes NetworkPolicy manifests"
      - "Checkov / tfsec (network policy validation)"
      - "GitLab DAST"
      - "Nuclei (external exposure scanning)"
      - "GitLab Container Scanning"
  secops:
    prose: >-
      Monitor network boundaries using intrusion detection/prevention systems (IDS/IPS) and
      network traffic analysis. Detect and alert on unauthorized lateral movement, data exfiltration
      attempts, and command-and-control communications. Implement DNS monitoring for malicious
      domain resolution. Conduct regular network penetration testing to validate boundary protection
      effectiveness. Monitor cloud security group and network ACL changes for unauthorized modifications.
    tools:
      - "IDS/IPS (Suricata, Snort, AWS Network Firewall)"
      - "Network traffic analysis (Zeek, Darktrace)"
      - "DNS monitoring (Cisco Umbrella, DNSFilter)"
      - "Cloud network flow logs (VPC Flow Logs)"
      - "SIEM (network event correlation)"
      - "Penetration testing tools"