guidance:
  prose: >-
    Examples of system account types include individual, shared, group, system, guest, anonymous,
    emergency, developer, temporary, and service. Identification of authorized system users and the
    specification of access privileges reflect the requirements in other controls in the security plan.
    Users requiring administrative privileges on system accounts receive additional scrutiny by
    organizational personnel responsible for approving such accounts and privileged access, including
    system owner, mission or business owner, senior agency information security officer, or senior
    agency official for privacy. Types of accounts that organizations can prohibit due to increased
    risk include shared, group, emergency, anonymous, temporary, and guest accounts. Where access
    involves personally identifiable information, security programs collaborate with the senior agency
    official for privacy to help ensure that the underlying authorities provide a basis for the
    account and allow for the collection, use, and sharing of personally identifiable information.
    Account management includes the identification of common access types (i.e., accounts) and the
    establishment of an accountability structure. Organizations may centralize account management
    or establish local account management processes. Account managers provide oversight for the
    management of accounts, typically through account-related activities such as account creation,
    termination, deactivation, management, and periodic review of accounts.
