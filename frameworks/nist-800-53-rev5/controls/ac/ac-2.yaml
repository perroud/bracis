implementation_guidance:
  platform_engineering:
    prose: >-
      Implement centralized identity management through an Identity Provider (IdP) such as Okta, Azure AD,
      or Keycloak integrated with all platform services. Use Infrastructure-as-Code to define account types,
      roles, and permissions declaratively. Automate account lifecycle management including provisioning,
      modification, and deprovisioning through SCIM protocols. Implement automated account reviews using
      scheduled pipelines that compare active accounts against HR system records. Define account types
      (human, service, machine) with distinct policies for each. Use Kubernetes ServiceAccounts with
      minimal privileges for workload identities. Implement automatic expiration for temporary and
      service accounts.
    tools:
      - "Okta / Azure AD / Keycloak"
      - "SCIM provisioning"
      - "Kubernetes RBAC / ServiceAccounts"
      - "Terraform IAM modules"
      - "Vault (dynamic secrets)"
      - "GitLab SAML/SCIM integration"
  devsecops:
    prose: >-
      Enforce account management through GitLab group and project membership controls. Require merge
      request approvals for any changes to access configurations. Implement pre-commit hooks and
      CI pipeline checks that validate IAM configurations against organizational policy. Use branch
      protection rules to prevent unauthorized changes to account management configurations. Automate
      service account rotation using CI/CD pipelines with HashiCorp Vault integration. Track all
      account changes through Git commit history for full auditability.
    tools:
      - "GitLab Group/Project Access Management"
      - "GitLab SAML SSO"
      - "HashiCorp Vault"
      - "Terraform"
      - "CI/CD pipelines for account automation"
      - "Trivy (for service account scanning)"
  secops:
    prose: >-
      Monitor account activity through centralized logging and SIEM integration. Set up alerts for
      anomalous account behavior including off-hours access, privilege escalation attempts, and
      dormant account usage. Conduct periodic access reviews (at minimum quarterly) comparing
      active accounts against authorized user lists. Implement automated workflows for account
      termination upon personnel offboarding. Generate compliance reports showing account management
      adherence including account creation/deletion timelines and approval chains.
    tools:
      - "SIEM (Splunk, Elastic Security, Chronicle)"
      - "SOAR platforms"
      - "Identity Governance (SailPoint, Saviynt)"
      - "GitLab Audit Events"
      - "PAM solutions (CyberArk, BeyondTrust)"