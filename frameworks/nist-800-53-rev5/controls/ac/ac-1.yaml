id: ac-1
family: ac
title: "Policy and Procedures"
class: SP800-53
baselines: [low, moderate, high]
parameters:
  - id: ac-01_odp.01
    label: "personnel or roles"
    guidance: "Organization-defined personnel or roles to whom the access control policy is disseminated"
  - id: ac-01_odp.02
    label: "personnel or roles"
    guidance: "Organization-defined personnel or roles to whom the access control procedures are disseminated"
  - id: ac-01_odp.03
    label: "frequency - policy"
    guidance: "Organization-defined frequency at which the current access control policy is reviewed and updated"
  - id: ac-01_odp.04
    label: "events - policy"
    guidance: "Organization-defined events that would trigger a review and update of the current access control policy"
  - id: ac-01_odp.05
    label: "frequency - procedures"
    guidance: "Organization-defined frequency at which the current access control procedures are reviewed and updated"
  - id: ac-01_odp.06
    label: "events - procedures"
    guidance: "Organization-defined events that would trigger a review and update of the current access control procedures"
statement:
  prose: >-
    a. Develop, document, and disseminate to [Assignment: organization-defined personnel or roles]:
       1. [Selection (one or more): Organization-level; Mission/business process-level; System-level] access control policy that:
          (a) Addresses purpose, scope, roles, responsibilities, management commitment, coordination among organizational entities, and compliance; and
          (b) Is consistent with applicable laws, executive orders, directives, regulations, policies, standards, and guidelines; and
       2. Procedures to facilitate the implementation of the access control policy and the associated access control controls;
    b. Designate an [Assignment: organization-defined official] to manage the development, documentation, and dissemination of the access control policy and procedures; and
    c. Review and update the current access control:
       1. Policy [Assignment: organization-defined frequency] and following [Assignment: organization-defined events]; and
       2. Procedures [Assignment: organization-defined frequency] and following [Assignment: organization-defined events].
  parts:
    - id: ac-1_smt.a
