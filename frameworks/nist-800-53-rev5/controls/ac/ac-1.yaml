implementation_guidance:
  platform_engineering:
    prose: >-
      Codify access control policies as policy-as-code artifacts stored in version-controlled repositories.
      Use Open Policy Agent (OPA) or similar policy engines to enforce access control rules across
      the platform. Define RBAC/ABAC models as declarative configuration and apply them uniformly
      across all platform services. Implement automated policy review workflows using merge requests
      with required approvals from security stakeholders. Track policy versions, changes, and approvals
      through Git history and CI/CD audit trails.
    tools:
      - "Open Policy Agent (OPA)"
      - "Kyverno"
      - "HashiCorp Sentinel"
      - "GitLab Compliance Pipelines"
      - "Kubernetes RBAC"
      - "Backstage TechDocs"
  devsecops:
    prose: >-
      Integrate access control policy validation into CI/CD pipelines. Enforce policy checks as
      pipeline gates that prevent deployments violating access control requirements. Use merge request
      approval rules to ensure policy changes are reviewed by designated security personnel. Maintain
      policy documents in the same repository structure as application code, enabling version tracking,
      peer review, and automated compliance scanning. Implement automated policy drift detection
      that alerts when runtime configurations deviate from declared policies.
    tools:
      - "GitLab CI/CD"
      - "GitLab Compliance Framework"
      - "Conftest"
      - "Checkov"
      - "Terraform Sentinel"
  secops:
    prose: >-
      Establish a policy review cadence with automated reminders and tracking. Use a GRC platform
      or ticketing system to manage policy lifecycle including drafting, review, approval, dissemination,
      and retirement. Monitor for regulatory changes that would trigger policy updates. Maintain an
      evidence repository linking policies to their implementation artifacts. Generate compliance
      reports demonstrating policy currency and dissemination to required personnel.
    tools:
      - "GitLab Security Dashboard"
      - "SIEM (Splunk, Elastic Security)"
      - "GRC Platforms (ServiceNow, Archer)"
      - "Confluence / Wiki"