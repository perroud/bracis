implementation_guidance:
  platform_engineering:
    prose: >-
      Implement role-based access control (RBAC) or attribute-based access control (ABAC) uniformly
      across all platform components. Use Kubernetes RBAC with namespace isolation to enforce access
      boundaries between teams and workloads. Implement network policies to enforce east-west traffic
      controls. Deploy admission controllers (OPA Gatekeeper, Kyverno) to enforce access policies at
      the API server level. Use service mesh authorization policies (Istio AuthorizationPolicy) for
      fine-grained workload-to-workload access control. Enforce access to infrastructure resources
      through IAM policies defined in Terraform with least-privilege principles.
    tools:
      - "Kubernetes RBAC"
      - "OPA Gatekeeper"
      - "Kyverno"
      - "Istio AuthorizationPolicy"
      - "Kubernetes NetworkPolicy"
      - "Terraform IAM"
      - "Cloud IAM (AWS IAM, GCP IAM, Azure RBAC)"
  devsecops:
    prose: >-
      Enforce access controls in the development pipeline through branch protection, code ownership
      (CODEOWNERS), and merge request approval rules. Use GitLab protected branches and protected
      environments to restrict who can deploy to specific targets. Implement infrastructure-as-code
      policies that validate access configurations before deployment. Scan IAM configurations for
      overly permissive policies using automated tools in CI pipelines. Enforce separation of duties
      by requiring different approvers for code review and deployment authorization.
    tools:
      - "GitLab Protected Branches"
      - "GitLab CODEOWNERS"
      - "GitLab Protected Environments"
      - "Checkov / tfsec"
      - "IAM Access Analyzer (AWS)"
      - "Conftest"
  secops:
    prose: >-
      Continuously monitor access enforcement effectiveness through log analysis and anomaly detection.
      Detect and alert on unauthorized access attempts, privilege escalation, and policy violations.
      Conduct periodic access control testing to verify enforcement mechanisms are operating correctly.
      Correlate access events across systems to identify patterns of unauthorized access that may
      indicate compromised accounts or insider threats.
    tools:
      - "SIEM (Splunk, Elastic Security)"
      - "Cloud Security Posture Management (CSPM)"
      - "GitLab Audit Events"
      - "Falco (runtime enforcement)"
      - "AWS CloudTrail / GCP Audit Logs / Azure Activity Log"