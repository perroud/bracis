id: ac-3
family: ac
title: "Access Enforcement"
class: SP800-53
baselines: [low, moderate, high]
statement:
  prose: >-
    Enforce approved authorizations for logical access to information and system resources
    in accordance with applicable access control policies.
guidance:
  prose: >-
    Access control policies control access between active entities or subjects (i.e., users or
    processes acting on behalf of users) and passive entities or objects (i.e., devices, files,
    records, domains) in organizational systems. In addition to enforcing authorized access at
    the system level and recognizing that systems can host many applications and services in support
    of mission and business functions, access enforcement mechanisms can also be employed at the
    application and service level to provide increased information security and privacy. In contrast
    to logical access controls that are implemented within the system, physical access controls are
    addressed by the controls in the PE family. Organizations consider the types of enforcement
    mechanisms used in conjunction with access control policies. Enforcement mechanisms include
    access control lists, access control matrices, and cryptography. Organizations also consider
    the trustworthiness of enforcement mechanisms. Systems implementing access enforcement may
    reside on different systems or components. If access enforcement functions reside on different
    systems or components, care is taken to ensure that enforcement mechanisms are trustworthy
    and consistently enforced.
