id: au-6
family: au
title: "Audit Record Review, Analysis, and Reporting"
class: SP800-53
baselines: [low, moderate, high]
parameters:
  - id: au-06_odp.01
    label: "frequency"
    guidance: "Organization-defined frequency for reviewing and analyzing system audit records"
  - id: au-06_odp.02
    label: "inappropriate or unusual activity"
    guidance: "Organization-defined inappropriate or unusual activity"
  - id: au-06_odp.03
    label: "personnel or roles"
    guidance: "Organization-defined personnel or roles to whom findings are reported"
statement:
  prose: >-
    a. Review and analyze system audit records [Assignment: organization-defined frequency]
       for indications of [Assignment: organization-defined inappropriate or unusual activity]
       and the potential impact of the inappropriate or unusual activity;
    b. Report findings to [Assignment: organization-defined personnel or roles]; and
    c. Adjust the level of audit record review, analysis, and reporting within the system when
       there is a change in risk based on law enforcement information, intelligence information,
       or other credible sources of information.
  parts:
    - id: au-6_smt.a
      label: "a."
      prose: >-
        Review and analyze system audit records [Assignment: organization-defined frequency]
        for indications of [Assignment: organization-defined inappropriate or unusual activity]
        and the potential impact of the inappropriate or unusual activity;
    - id: au-6_smt.b
      label: "b."
      prose: "Report findings to [Assignment: organization-defined personnel or roles]; and"
    - id: au-6_smt.c
      label: "c."
      prose: >-
        Adjust the level of audit record review, analysis, and reporting within the system when
        there is a change in risk based on law enforcement information, intelligence information,
        or other credible sources of information.
guidance:
  prose: >-
    Audit record review, analysis, and reporting cover information security- and privacy-related
    logging performed by organizations, including logging that results from the monitoring of
    account usage, remote access, wireless connectivity, mobile device connection, configuration
    settings, system component inventory, use of maintenance tools and non-local maintenance,
    physical access, temperature and humidity, equipment delivery and removal, communications at
    system interfaces, and use of mobile code or Voice over Internet Protocol (VoIP). Findings
    can be reported to organizational entities that include the incident response team, help desk,
    and security or privacy officers. If organizations are prohibited from reviewing and analyzing
    audit records or unable to conduct such activities, the review or analysis may be carried out
    by other organizations granted such authority. The frequency, scope, and/or depth of the audit
    record review, analysis, and reporting may be adjusted to meet organizational needs based on
    new information received.
enhancements:
  - id: au-6.1
    title: "Automated Process Integration"
    baselines: [moderate, high]
  - id: au-6.3
    title: "Correlate Audit Record Repositories"
    baselines: [moderate, high]
  - id: au-6.4
    title: "Central Review and Analysis"
    baselines: []
  - id: au-6.5
    title: "Integrated Analysis of Audit Records"
    baselines: [high]
  - id: au-6.6
    title: "Correlation with Physical Monitoring"
    baselines: [high]
references:
  - citation: "NIST SP 800-86"
    url: "https://doi.org/10.6028/NIST.SP.800-86"
  - citation: "NIST SP 800-101 Rev. 1"
    url: "https://doi.org/10.6028/NIST.SP.800-101r1"
implementation_guidance:
  platform_engineering:
    prose: >-
      Deploy automated log analysis pipelines using streaming processors (Kafka, Kinesis) that
      apply detection logic in near-real-time. Implement dashboards in Grafana or Kibana that
      surface anomalous patterns and key security metrics. Use machine learning-based anomaly
      detection for user behavior analytics (UEBA). Build automated alerting workflows that
      route findings to appropriate teams through PagerDuty or Opsgenie. Implement log correlation
      across infrastructure layers (network, compute, application, identity) to detect multi-stage
      attacks.
    tools:
      - "Grafana / Kibana dashboards"
      - "Kafka / Kinesis (log streaming)"
      - "Prometheus Alertmanager"
      - "PagerDuty / Opsgenie"
      - "Elasticsearch / Loki"
  devsecops:
    prose: >-
      Integrate audit log review into operational workflows. Use GitLab Security Dashboard to
      review security findings from SAST, DAST, dependency scanning, and container scanning.
      Implement automated triage of security findings through GitLab vulnerability management.
      Create scheduled pipelines that generate audit reports and file issues for review. Correlate
      CI/CD audit events with runtime security events to detect supply chain attacks.
    tools:
      - "GitLab Security Dashboard"
      - "GitLab Vulnerability Management"
      - "Scheduled CI/CD pipelines for audit reports"
      - "GitLab Audit Events"
  secops:
    prose: >-
      Implement tiered log review processes: automated rules for known threats, analyst review
      for anomalies, and executive reporting for trends. Maintain a library of detection rules
      mapped to MITRE ATT&CK techniques. Conduct regular threat hunting using audit records as
      the primary data source. Generate periodic compliance reports demonstrating audit review
      cadence and findings disposition. Escalate indicators of compromise through the incident
      response process.
    tools:
      - "SIEM (Splunk, Elastic Security, Chronicle)"
      - "SOAR (Cortex XSOAR, Tines, Shuffle)"
      - "Threat intelligence platforms"
      - "MITRE ATT&CK Navigator"
      - "Sigma rules / YARA rules"