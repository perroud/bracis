id: cont-4
family: cont
title: "Incident Notification and Escalation"
class: NIST-800-61

statement:
  prose: >-
    Organizations should establish and follow notification and escalation procedures that
    ensure appropriate stakeholders are informed about incidents in a timely manner. Notification
    procedures should define who must be notified, when notification should occur, what
    information should be communicated, and through which channels. Escalation procedures
    should define criteria and processes for escalating incidents to higher levels of
    management, external parties, or specialized response teams. Organizations should comply
    with applicable legal and regulatory requirements for incident notification, including
    breach notification laws and sector-specific reporting requirements such as those mandated
    by CISA for critical infrastructure entities.

guidance:
  prose: >-
    Timely and appropriate notification is essential for effective incident response and
    regulatory compliance. NIST SP 800-61 Rev 3 emphasizes that notification procedures
    should be pre-defined and tested to avoid delays during active incidents. Internal
    notifications should reach technical responders, management, legal counsel, public
    relations, and affected business units as appropriate. External notifications may be
    required by law for incidents involving personal data, critical infrastructure, or
    government systems. Organizations should maintain current contact lists for both internal
    and external stakeholders. Communication templates should be prepared in advance for
    different incident types and severity levels. Organizations should use secure communication
    channels for incident-related discussions, as compromised communication channels may alert
    attackers to response activities.

references:
  - citation: "NIST SP 800-61 Rev 3, Section 4.4"
    url: "https://csrc.nist.gov/pubs/sp/800/61/r3/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated notification workflows in incident management platforms that trigger
      based on incident severity and affected services. Configure escalation policies with
      time-based triggers that automatically escalate incidents if acknowledgment or resolution
      targets are not met. Implement status page integration that automatically communicates
      service disruptions to customers and stakeholders. Configure secure communication
      channels (encrypted Slack channels, dedicated incident bridges) that are pre-provisioned
      for incident response.
    tools:
      - "PagerDuty / Opsgenie (notification and escalation)"
      - "Statuspage / Cachet (external communication)"
      - "Slack / Microsoft Teams (secure channels)"
      - "OpsLevel / Backstage (service ownership for routing)"
  devsecops:
    prose: >-
      Configure CI/CD pipeline notifications that alert teams when security-critical issues
      are detected. Implement automated issue creation for security findings that require
      incident response. Use GitLab Incident Management to coordinate notifications across
      development and operations teams. Maintain up-to-date CODEOWNERS and team contact
      information in repositories to support rapid notification routing.
    tools:
      - "GitLab Incident Management"
      - "GitLab Notifications (pipeline alerts)"
      - "Slack / Teams integration"
      - "Email notification systems"
  secops:
    prose: >-
      Develop comprehensive notification matrices that define stakeholders, timing, and
      content for each incident severity level. Maintain current contact lists for internal
      stakeholders, regulatory bodies, law enforcement, and industry partners. Prepare
      communication templates for common incident types including data breaches, ransomware,
      and service disruptions. Implement regulatory notification tracking to ensure compliance
      with all applicable reporting deadlines. Establish secure out-of-band communication
      channels for use when primary systems may be compromised.
    tools:
      - "Incident management platforms (notification workflows)"
      - "Mass notification systems"
      - "Regulatory compliance tracking tools"
      - "Secure communication (Signal, encrypted channels)"

legal_references:
