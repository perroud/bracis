id: det-4
family: det
title: "Incident Documentation and Tracking"
class: NIST-800-61

statement:
  prose: >-
    Organizations should document all aspects of incident detection and analysis, including
    the initial indicators that triggered the investigation, analysis steps taken, findings,
    decisions made, and actions performed. Documentation should be maintained in an incident
    tracking system that supports consistent recording of incident data, enables trend
    analysis, and provides an audit trail. Each incident should be assigned a unique
    identifier and tracked through the complete incident lifecycle. Documentation should
    be sufficiently detailed to support post-incident review, legal proceedings, and
    regulatory reporting requirements.

guidance:
  prose: >-
    Thorough documentation is essential for effective incident response management and
    continuous improvement. Documentation serves multiple purposes: it provides a record
    of actions taken for accountability, supports post-incident analysis and lessons learned,
    enables metrics collection for program improvement, and satisfies regulatory and legal
    requirements. NIST SP 800-61 Rev 3 recommends that organizations use standardized forms
    and templates to ensure consistent and complete documentation. Key data elements include
    timestamps, affected systems, indicators observed, analysis results, containment actions,
    communication logs, and resolution details. Organizations should also track incident
    metrics including mean time to detect, mean time to respond, and incident categorization
    data.

references:
  - citation: "NIST SP 800-61 Rev 3, Section 3.4"
    url: "https://csrc.nist.gov/pubs/sp/800/61/r3/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement incident tracking using platforms that integrate with monitoring and alerting
      systems. Configure automated incident creation from high-severity alerts. Implement
      templates that capture required data fields for each incident type. Integrate incident
      tracking with the service catalog to automatically populate affected service information.
      Implement automated timeline generation from monitoring data. Store incident records
      in systems with appropriate access controls and retention policies.
    tools:
      - "PagerDuty / Opsgenie (incident tracking)"
      - "Jira / GitLab Issues (incident documentation)"
      - "Backstage (service catalog integration)"
      - "Grafana Incident (incident timelines)"
      - "Wiki / Confluence (post-mortem documentation)"
  devsecops:
    prose: >-
      Use GitLab Incident Management or equivalent tools to track incidents from detection
      through resolution. Link incidents to related merge requests, issues, and deployments
      for complete traceability. Implement incident templates in the issue tracker that
      capture required documentation fields. Use labels and milestones to categorize and
      track incidents. Maintain incident runbooks that reference documentation requirements
      at each step.
    tools:
      - "GitLab Incident Management"
      - "GitLab Issues (incident tracking)"
      - "GitLab Wiki (runbooks and templates)"
      - "GitLab Audit Events (audit trail)"
  secops:
    prose: >-
      Deploy a dedicated incident management platform that supports the complete incident
      lifecycle. Implement standardized incident classification using categories aligned with
      NIST SP 800-61 attack vectors. Configure automated workflows that enforce documentation
      requirements at each phase of incident response. Generate regular incident reports and
      dashboards for management review. Implement retention policies that meet regulatory
      requirements. Maintain chain of custody documentation for evidence in cases that may
      involve legal proceedings.
    tools:
      - "ServiceNow Security Incident Response"
      - "TheHive (incident management)"
      - "SOAR (Cortex XSOAR, Tines)"
      - "Jira Service Management"
      - "Evidence management tools"

legal_references:
  - framework_id: nist-csf-v2
    articles: ["DE.AE-08", "RS.MA-02"]
    relationship: supports
  - framework_id: nist-800-53-rev5
    articles: ["IR-5", "IR-6"]
    relationship: complements
