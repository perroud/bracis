id: det-5
family: det
title: "Incident Prioritization and Classification"
class: NIST-800-61

statement:
  prose: >-
    Organizations should establish and apply incident prioritization criteria to ensure that
    resources are allocated to incidents based on their potential impact and urgency. Incidents
    should be classified by category (e.g., unauthorized access, denial of service, malicious
    code, improper usage) and severity level. Prioritization should consider the functional
    impact on the organization's operations, the information impact including confidentiality,
    integrity, and availability of affected data, and the recoverability of affected systems.
    Organizations should define response time objectives for each severity level and ensure
    that prioritization decisions are documented and consistently applied.

guidance:
  prose: >-
    Effective prioritization is critical because organizations typically face more incidents
    than they can address simultaneously. NIST SP 800-61 Rev 3 recommends a structured
    prioritization approach that considers functional impact (effect on business operations),
    information impact (sensitivity of data involved), and recoverability (effort needed
    to restore operations). These factors should be combined to assign an overall severity
    level that drives response urgency, escalation, and resource allocation. Organizations
    should avoid treating all incidents with equal priority, as this leads to resource
    exhaustion and delayed response to critical incidents. Automated triage can help manage
    high volumes of alerts by applying consistent prioritization criteria.

references:
  - citation: "NIST SP 800-61 Rev 3, Section 3.5"
    url: "https://csrc.nist.gov/pubs/sp/800/61/r3/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated alert prioritization based on service criticality tiers defined
      in the service catalog. Configure severity levels in the incident management platform
      that map to defined response time objectives and escalation paths. Implement SLO-based
      alerting that automatically escalates when service level objectives are at risk.
      Configure alert routing based on affected service, severity, and time of day. Implement
      alert deduplication and correlation to reduce alert fatigue and improve signal quality.
    tools:
      - "PagerDuty / Opsgenie (prioritization and routing)"
      - "Backstage / Compass (service criticality)"
      - "Prometheus Alertmanager (alert routing)"
      - "Grafana OnCall (escalation management)"
  devsecops:
    prose: >-
      Implement vulnerability severity scoring in CI/CD pipelines that aligns with incident
      prioritization criteria. Configure security scanning tools to classify findings by
      severity and route critical findings to appropriate teams. Use GitLab severity labels
      to categorize and prioritize security issues. Implement SLA tracking for vulnerability
      remediation based on severity classification.
    tools:
      - "GitLab Security Dashboard (severity classification)"
      - "GitLab Issue labels and milestones"
      - "CVSS scoring (vulnerability severity)"
      - "GitLab SLA management"
  secops:
    prose: >-
      Define an incident classification and prioritization scheme that aligns with
      organizational risk tolerance and business impact criteria. Implement automated
      alert triage in the SIEM/SOAR platform that assigns initial priority based on
      predefined rules. Establish escalation matrices that define notification and response
      requirements for each severity level. Track prioritization accuracy as a metric and
      refine criteria based on post-incident reviews. Implement critical incident declaration
      procedures for high-severity events that require organization-wide response.
    tools:
      - "SIEM (automated triage rules)"
      - "SOAR (prioritization workflows)"
      - "Incident management platforms (severity matrices)"
      - "Risk assessment frameworks"

