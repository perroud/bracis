id: det-2
family: det
title: "Signs of an Incident"
class: NIST-800-61

statement:
  prose: >-
    Organizations should establish capabilities to identify signs of incidents through two
    categories: precursors and indicators. A precursor is a sign that an incident may occur
    in the future, such as vulnerability scan activity, threats communicated through intelligence
    sources, or exploitation of a newly disclosed vulnerability. An indicator is a sign that
    an incident may have occurred or may be occurring, such as anomalous network flows,
    unexpected system configuration changes, alerts from security tools, or reports from
    users. Organizations should ensure that both precursors and indicators are collected,
    correlated, and analyzed to support timely incident detection and response.

guidance:
  prose: >-
    The distinction between precursors and indicators is important for incident detection
    strategy. Precursors enable proactive response before an incident occurs, while indicators
    enable detection of incidents in progress or already completed. Not all incidents have
    identifiable precursors, making indicator-based detection essential. Organizations should
    implement multiple layers of detection to maximize coverage. Common sources of precursors
    and indicators include IDS/IPS alerts, SIEM correlations, antivirus alerts, file integrity
    monitoring, network flow data, system logs, application logs, and user reports. The
    challenge is often not the lack of data but the volume of data and the difficulty of
    distinguishing genuine incidents from false positives.

references:
  - citation: "NIST SP 800-61 Rev 3, Section 3.2"
    url: "https://csrc.nist.gov/pubs/sp/800/61/r3/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement multi-layer monitoring that covers infrastructure, network, and application
      levels. Deploy file integrity monitoring on critical system files and configurations.
      Implement anomaly detection using machine learning models trained on baseline behavior.
      Configure alerting thresholds that balance detection sensitivity with false positive
      rates. Implement centralized logging with correlation capabilities that identify patterns
      across multiple data sources. Deploy canary tokens in infrastructure to detect
      unauthorized access.
    tools:
      - "Prometheus / Grafana (infrastructure monitoring)"
      - "Falco (runtime anomaly detection)"
      - "OSSEC / Wazuh (file integrity monitoring)"
      - "Loki / Elasticsearch (centralized logging)"
      - "Cilium Hubble (network flow monitoring)"
  devsecops:
    prose: >-
      Implement application-level logging that captures security-relevant events such as
      authentication failures, authorization violations, and input validation errors.
      Configure CI/CD pipelines to detect anomalous changes such as modifications to
      security-critical files, unexpected dependency changes, or pipeline configuration
      tampering. Monitor merge request activity for suspicious patterns. Implement error
      tracking that captures application anomalies that may indicate exploitation attempts.
    tools:
      - "Structured logging (Winston, Pino, Serilog)"
      - "Sentry / Datadog (error tracking)"
      - "GitLab Audit Events"
      - "GitLab CI/CD pipeline monitoring"
      - "OWASP ZAP (runtime detection)"
  secops:
    prose: >-
      Implement comprehensive SIEM correlation rules that detect known attack patterns and
      anomalous behavior. Deploy behavioral analytics (UEBA) to detect insider threats and
      compromised accounts. Monitor threat intelligence feeds for precursors relevant to the
      organization. Establish user reporting channels and procedures for suspected incidents.
      Implement automated alert triage to prioritize indicators by severity and confidence.
      Maintain detection rule tuning processes to reduce false positives while maintaining
      coverage.
    tools:
      - "SIEM (Splunk, Elastic Security, Chronicle)"
      - "UEBA (Exabeam, Microsoft Sentinel)"
      - "IDS/IPS (Suricata, Snort)"
      - "EDR (CrowdStrike, SentinelOne)"
      - "Threat intelligence platforms"

