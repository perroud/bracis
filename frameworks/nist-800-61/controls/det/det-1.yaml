id: det-1
family: det
title: "Attack Vectors and Indicators of Compromise"
class: NIST-800-61

statement:
  prose: >-
    Organizations should identify and document the attack vectors most likely to affect
    their environment and establish mechanisms to detect indicators of compromise (IOCs)
    associated with those vectors. Common attack vectors include external/removable media,
    attrition (brute force), web-based attacks, email-based attacks, impersonation, improper
    usage, loss or theft of equipment, and supply chain compromise. Organizations should
    maintain current threat intelligence that identifies relevant attack vectors and associated
    indicators, and ensure detection capabilities are aligned with the most probable and
    impactful threats.

guidance:
  prose: >-
    Understanding the attack vectors relevant to the organization is essential for prioritizing
    detection capabilities and allocating resources effectively. NIST SP 800-61 Rev 3 categorizes
    incidents by attack vector to help organizations structure their detection and analysis
    processes. Organizations should use threat intelligence, industry reports, and historical
    incident data to identify the attack vectors most relevant to their environment. Indicators
    of compromise include network artifacts, host-based artifacts, file hashes, IP addresses,
    domain names, and behavioral patterns. Organizations should automate IOC detection where
    possible and ensure detection rules are updated regularly based on evolving threat intelligence.

references:
  - citation: "NIST SP 800-61 Rev 3, Section 3.1"
    url: "https://csrc.nist.gov/pubs/sp/800/61/r3/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated threat intelligence feeds that update detection rules in monitoring
      and security tools. Deploy network-level detection for known malicious indicators
      including IP addresses, domains, and file hashes. Implement container runtime security
      that detects anomalous process execution, file system modifications, and network
      connections. Configure admission controllers to block deployment of images with known
      vulnerabilities. Implement DNS monitoring to detect connections to known malicious
      domains.
    tools:
      - "Falco / Tetragon (runtime detection)"
      - "CrowdStrike / Aqua Security (container security)"
      - "CoreDNS / Pi-hole (DNS monitoring)"
      - "Suricata / Zeek (network detection)"
      - "STIX/TAXII feeds (threat intelligence)"
  devsecops:
    prose: >-
      Implement dependency scanning to detect known vulnerabilities and malicious packages
      in the software supply chain. Deploy secret detection to identify exposed credentials
      that could serve as attack vectors. Use DAST scanning to identify web application
      vulnerabilities that attackers could exploit. Monitor CI/CD pipeline logs for indicators
      of compromise such as unauthorized modifications to build configurations. Implement
      software bill of materials (SBOM) generation and monitoring.
    tools:
      - "GitLab Dependency Scanning"
      - "GitLab Secret Detection"
      - "GitLab DAST"
      - "Syft / CycloneDX (SBOM generation)"
      - "GitLab CI/CD Audit Events"
  secops:
    prose: >-
      Maintain a threat intelligence program that collects, analyzes, and disseminates
      IOCs relevant to the organization. Implement automated IOC matching in the SIEM
      platform against log data, network flows, and endpoint telemetry. Develop detection
      rules based on the MITRE ATT&CK framework mapped to relevant attack vectors. Deploy
      honeypots and deception technology to detect lateral movement and reconnaissance.
      Conduct threat hunting exercises that proactively search for indicators of compromise
      not detected by automated systems.
    tools:
      - "SIEM (Splunk, Elastic Security, Chronicle)"
      - "MISP / OpenCTI (threat intelligence)"
      - "MITRE ATT&CK Navigator (detection mapping)"
      - "Honeypots (Canary, T-Pot)"
      - "Threat hunting platforms"

legal_references:
