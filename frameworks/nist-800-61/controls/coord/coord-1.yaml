id: coord-1
family: coord
title: "Coordination with External Parties"
class: NIST-800-61

statement:
  prose: >-
    Organizations should establish and maintain relationships and coordination mechanisms
    with external parties that may be involved in incident response. External parties include
    law enforcement agencies, other incident response teams, internet service providers,
    the organization's incident response service providers, vendors of attacked hardware
    and software, other organizations that may be affected by the incident, and the
    Cybersecurity and Infrastructure Security Agency (CISA). Organizations should establish
    communication protocols, points of contact, and information sharing agreements with
    external parties before incidents occur. Coordination activities should include sharing
    indicators of compromise, requesting and providing technical assistance, and reporting
    incidents as required by law or regulation.

guidance:
  prose: >-
    Effective external coordination can significantly improve incident response outcomes.
    NIST SP 800-61 Rev 3 emphasizes that no organization operates in isolation and that
    incidents often affect or involve multiple parties. Pre-established relationships reduce
    friction during active incidents when time is critical. Organizations should consider
    participating in Information Sharing and Analysis Centers (ISACs) or Information Sharing
    and Analysis Organizations (ISAOs) relevant to their industry. Communication with external
    parties must balance the need for information sharing with concerns about confidentiality,
    legal liability, and public reputation. Organizations should consult legal counsel to
    ensure that external communications comply with applicable laws and contractual obligations.
    Federal agencies must report incidents to CISA as required by federal policy.

references:
  - citation: "NIST SP 800-61 Rev 3, Section 6.1"
    url: "https://csrc.nist.gov/pubs/sp/800/61/r3/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated threat intelligence sharing using STIX/TAXII protocols. Configure
      platform integrations that enable sharing of indicators of compromise with industry
      partners and ISACs. Implement secure communication channels for coordination with
      external incident response teams. Deploy standardized formats for evidence and
      indicator sharing. Maintain external contact information in the service catalog or
      incident management platform for rapid access during incidents.
    tools:
      - "MISP (threat intelligence sharing)"
      - "STIX/TAXII (standardized sharing)"
      - "OpenCTI (threat intelligence platform)"
      - "Secure communication platforms"
      - "Incident management platforms"
  devsecops:
    prose: >-
      Implement automated vulnerability reporting and coordination with software vendors
      and open-source maintainers. Participate in coordinated vulnerability disclosure
      programs. Share indicators of supply chain compromise with relevant parties. Use
      standardized formats for vulnerability and incident reporting. Maintain up-to-date
      contact information for security teams of critical dependencies and service providers.
    tools:
      - "GitLab Security Dashboard (vulnerability reporting)"
      - "CVE / NVD (vulnerability coordination)"
      - "VEX (vulnerability exploitability exchange)"
      - "Responsible disclosure platforms"
  secops:
    prose: >-
      Establish and maintain relationships with law enforcement, CISA, and industry-specific
      ISACs and ISAOs. Develop communication protocols and information sharing agreements
      with external parties. Maintain current contact lists for external organizations
      including law enforcement, regulatory bodies, and partner organizations. Participate
      in cross-organizational exercises and information sharing activities. Implement
      processes for requesting and providing mutual aid during significant incidents.
      Ensure all external communications are reviewed by legal counsel and comply with
      applicable information sharing laws.
    tools:
      - "ISAC membership and platforms"
      - "CISA reporting portal"
      - "Law enforcement liaison programs"
      - "Threat intelligence sharing platforms"
      - "Secure communication channels"

legal_references:
  - framework_id: nist-csf-v2
    articles: ["RS.CO-01", "RS.CO-03"]
    relationship: supports
  - framework_id: nist-800-53-rev5
    articles: ["IR-6", "IR-7"]
    relationship: complements
