id: coord-2
family: coord
title: "Threat Intelligence Sharing"
class: NIST-800-61

statement:
  prose: >-
    Organizations should participate in threat intelligence sharing to both contribute to
    and benefit from collective defense. Sharing should include indicators of compromise,
    tactics, techniques, and procedures (TTPs), vulnerability information, and mitigation
    strategies. Organizations should use standardized formats and protocols for sharing,
    such as STIX (Structured Threat Information eXpression) and TAXII (Trusted Automated
    eXchange of Indicator Information). Information sharing should be governed by agreements
    that define the types of information to be shared, handling restrictions, and liability
    protections. Organizations should implement both automated and manual sharing mechanisms
    to maximize the timeliness and breadth of shared intelligence.

guidance:
  prose: >-
    Threat intelligence sharing is a force multiplier for incident response. An indicator
    detected by one organization can prevent or accelerate detection of the same threat in
    other organizations. NIST SP 800-61 Rev 3 encourages organizations to participate in
    structured sharing communities while managing the risks associated with sharing sensitive
    information. The Traffic Light Protocol (TLP) provides a framework for classifying
    shared information by its intended distribution scope. Organizations should implement
    processes to consume, analyze, and operationalize received threat intelligence by
    incorporating it into detection rules, blocking policies, and response playbooks.
    Automated sharing through machine-readable formats enables rapid dissemination and
    consumption of time-sensitive indicators.

references:
  - citation: "NIST SP 800-61 Rev 3, Section 6.2"
    url: "https://csrc.nist.gov/pubs/sp/800/61/r3/final"
  - citation: "NIST SP 800-150, Guide to Cyber Threat Information Sharing"
    url: "https://csrc.nist.gov/pubs/sp/800/150/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Deploy threat intelligence platforms that aggregate feeds from multiple sources and
      distribute indicators to detection and prevention tools. Implement automated STIX/TAXII
      ingestion that updates firewall rules, IDS signatures, and monitoring rules. Configure
      threat intelligence enrichment in observability pipelines that annotate alerts with
      contextual intelligence. Implement contribution workflows that share sanitized indicators
      from internal detections with sharing communities. Deploy threat intelligence feeds
      that cover infrastructure-specific threats (container vulnerabilities, cloud
      misconfigurations, Kubernetes attacks).
    tools:
      - "MISP (threat intelligence platform)"
      - "OpenCTI (threat intelligence management)"
      - "STIX/TAXII servers and clients"
      - "CrowdStrike / Recorded Future (commercial feeds)"
      - "Falco rules (community threat intelligence)"
  devsecops:
    prose: >-
      Integrate threat intelligence feeds with dependency scanning tools to detect known
      malicious packages. Monitor vulnerability databases and security advisories for
      technologies used in the development stack. Participate in vendor security notification
      programs. Share anonymized findings from security scanning to benefit the open-source
      community. Implement automated alerts for new vulnerabilities affecting dependencies
      in the software bill of materials.
    tools:
      - "GitHub Advisory Database"
      - "GitLab Vulnerability Database"
      - "NVD / CVE feeds"
      - "OSV (Open Source Vulnerability database)"
      - "Dependency-Track (SBOM monitoring)"
  secops:
    prose: >-
      Implement a threat intelligence program that collects, analyzes, and operationalizes
      intelligence from multiple sources. Join relevant ISACs and threat intelligence sharing
      communities. Deploy threat intelligence platforms that automate indicator management
      and distribution. Implement TLP-based classification for all shared intelligence.
      Develop processes to contribute intelligence back to sharing communities in a timely
      manner. Measure the value of threat intelligence through metrics such as detections
      attributed to shared indicators and time savings from shared analysis.
    tools:
      - "MISP / OpenCTI (intelligence management)"
      - "ISAC portals (industry sharing)"
      - "TIP platforms (ThreatConnect, Anomali)"
      - "STIX/TAXII infrastructure"
      - "Threat intelligence feeds"

