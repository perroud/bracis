id: coord-3
family: coord
title: "Regulatory and Legal Reporting"
class: NIST-800-61

statement:
  prose: >-
    Organizations should establish procedures to comply with all applicable incident
    reporting requirements imposed by laws, regulations, executive orders, and contractual
    obligations. This includes data breach notification requirements, sector-specific
    reporting mandates (such as those applicable to financial services, healthcare, and
    critical infrastructure), and government-wide reporting requirements such as those
    established by CISA for federal agencies and critical infrastructure entities.
    Organizations should identify all applicable reporting requirements in advance, establish
    processes to meet required timelines, and designate responsible personnel for preparing
    and submitting reports. Reporting procedures should be coordinated with legal counsel to
    ensure compliance while managing legal risk.

guidance:
  prose: >-
    The regulatory landscape for incident reporting has become increasingly complex, with
    multiple overlapping requirements at federal, state, and international levels. NIST SP
    800-61 Rev 3 notes that organizations must navigate requirements from multiple authorities,
    including the Cyber Incident Reporting for Critical Infrastructure Act (CIRCIA), state
    data breach notification laws, HIPAA breach notification rules, PCI DSS requirements,
    GDPR notification obligations, and sector-specific regulations. Organizations should
    maintain a current inventory of applicable reporting requirements, including notification
    timelines, required content, and submission methods. Pre-drafted report templates and
    established relationships with regulatory contacts accelerate compliance during active
    incidents. Legal counsel should be involved in all external reporting decisions to manage
    liability and privilege concerns.

references:
  - citation: "NIST SP 800-61 Rev 3, Section 6.3"
    url: "https://csrc.nist.gov/pubs/sp/800/61/r3/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated data classification and tracking that identifies when incidents
      involve regulated data types (PII, PHI, PCI, etc.). Configure incident management
      platforms with regulatory notification workflows and deadline tracking. Implement
      audit logging that captures evidence of notification compliance. Deploy data flow
      mapping tools that identify the jurisdictions and regulations applicable to incident
      data. Automate report generation from incident management platforms using pre-approved
      templates.
    tools:
      - "Incident management platforms (regulatory workflows)"
      - "Data classification tools"
      - "Compliance management platforms"
      - "Automated reporting tools"
  devsecops:
    prose: >-
      Implement data classification labels in code repositories and deployment configurations
      that identify regulated data handling. Configure CI/CD pipelines to enforce data
      handling policies that support regulatory compliance. Ensure application logging
      captures sufficient detail to support regulatory investigations and reporting. Maintain
      data flow documentation that maps data processing to applicable regulations.
    tools:
      - "GitLab Labels (data classification)"
      - "Policy-as-code tools"
      - "Data flow mapping tools"
      - "Compliance documentation (GitLab Wiki)"
  secops:
    prose: >-
      Maintain a comprehensive regulatory notification matrix that documents all applicable
      requirements, timelines, contacts, and submission methods. Develop pre-approved report
      templates for each regulatory body. Designate and train personnel responsible for
      regulatory reporting. Implement tracking systems that ensure all required notifications
      are submitted within mandated timeframes. Coordinate with legal counsel on all
      regulatory communications. Conduct periodic reviews of the regulatory landscape to
      identify new or changed requirements. Test notification procedures through tabletop
      exercises that include regulatory reporting scenarios.
    tools:
      - "Regulatory compliance platforms"
      - "Legal case management tools"
      - "Notification tracking systems"
      - "Report generation tools"
      - "Regulatory portals (CISA, HHS, state AGs)"

legal_references:
