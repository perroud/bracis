id: post-2
family: post
title: "Incident Metrics and Reporting"
class: NIST-800-61

statement:
  prose: >-
    Organizations should collect, analyze, and report incident metrics to measure the
    effectiveness of the incident response program and support data-driven decision making.
    Key metrics include the number of incidents handled, mean time to detect (MTTD), mean
    time to respond (MTTR), mean time to contain, mean time to recover, incident categories
    and attack vectors, cost per incident, and the effectiveness of preventive measures.
    Organizations should produce regular reports for management that summarize incident
    trends, highlight areas requiring improvement, and demonstrate the value of the incident
    response program. Metrics should be used to justify resource requests, prioritize
    investments, and track improvement over time.

guidance:
  prose: >-
    Metrics provide objective evidence of incident response program effectiveness and enable
    continuous improvement. NIST SP 800-61 Rev 3 recommends that organizations select metrics
    that are meaningful, measurable, and actionable. Raw counts of incidents are less useful
    than metrics that measure response effectiveness and efficiency. Organizations should
    establish baseline measurements and track trends over time rather than focusing on
    absolute numbers. Metrics should be reported at appropriate levels of detail for different
    audiences: technical teams need operational metrics, while executives need strategic
    metrics tied to business impact. Benchmarking against industry peers can provide
    additional context for metric interpretation.

references:
  - citation: "NIST SP 800-61 Rev 3, Section 5.2"
    url: "https://csrc.nist.gov/pubs/sp/800/61/r3/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated metrics collection from incident management platforms, monitoring
      systems, and ticketing systems. Build dashboards that display real-time and historical
      incident metrics. Track MTTD and MTTR per service and team to identify improvement
      opportunities. Implement SLO-based incident tracking that correlates incidents with
      service reliability data. Automate report generation for regular management reviews.
      Use metrics to validate the effectiveness of infrastructure improvements and automation
      investments.
    tools:
      - "Grafana (metrics dashboards)"
      - "PagerDuty / Opsgenie Analytics"
      - "Prometheus (operational metrics)"
      - "Business intelligence tools (Metabase, Looker)"
  devsecops:
    prose: >-
      Track security-related incident metrics including vulnerabilities discovered in
      production versus pre-production, time to remediate security findings, and security
      incidents caused by code changes. Integrate security metrics into development
      dashboards. Use metrics to identify teams or services that require additional security
      support or training. Track the effectiveness of security scanning tools in detecting
      issues before they become incidents.
    tools:
      - "GitLab Security Dashboard (vulnerability metrics)"
      - "GitLab Value Stream Analytics"
      - "DORA metrics integration"
      - "Custom dashboards"
  secops:
    prose: >-
      Implement comprehensive incident metrics collection in the SIEM and incident management
      platforms. Produce monthly, quarterly, and annual incident reports for management.
      Track metrics by incident category, severity, attack vector, and affected business
      unit. Calculate cost per incident including labor, tools, and business impact.
      Benchmark performance against industry standards and peer organizations. Use metrics
      to identify trends that inform strategic security investments and resource allocation
      decisions.
    tools:
      - "SIEM analytics and reporting"
      - "Incident management reporting (ServiceNow, TheHive)"
      - "Business intelligence tools"
      - "Excel / Google Sheets (custom analysis)"

