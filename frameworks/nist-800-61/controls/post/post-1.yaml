id: post-1
family: post
title: "Lessons Learned and Post-Incident Review"
class: NIST-800-61

statement:
  prose: >-
    Organizations should conduct post-incident reviews, also known as lessons-learned
    meetings, after major incidents and periodically for less significant incidents. These
    reviews should occur within a reasonable timeframe after the incident is resolved and
    should include all parties involved in the incident response. The review should examine
    what happened, what was done to respond, whether the response was effective, what could
    be done better, and what changes are needed to prevent similar incidents. Post-incident
    reviews should result in documented findings and actionable recommendations that are
    tracked to completion. Organizations should foster a blameless culture that encourages
    honest assessment and continuous improvement.

guidance:
  prose: >-
    Post-incident reviews are one of the most valuable activities in the incident response
    lifecycle because they drive continuous improvement. NIST SP 800-61 Rev 3 emphasizes
    that lessons learned should be used to update incident response policies, procedures,
    and tools. Questions that should be addressed include: What was the root cause? Were
    there precursors or indicators that were missed? Were detection and response procedures
    effective? Were communications timely and adequate? What would be done differently?
    What additional resources or tools are needed? Reviews should be conducted in a blameless
    environment that focuses on systemic improvements rather than individual fault. Findings
    should be tracked as action items with owners and deadlines, and the status of these
    action items should be reviewed regularly.

references:
  - citation: "NIST SP 800-61 Rev 3, Section 5.1"
    url: "https://csrc.nist.gov/pubs/sp/800/61/r3/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a structured post-mortem process with standardized templates that capture
      incident timeline, root cause analysis, contributing factors, and action items. Store
      post-mortems in a searchable repository accessible to all engineering teams. Implement
      action item tracking using issue management systems with SLA targets for completion.
      Use post-mortem findings to update monitoring rules, alerting thresholds, and automated
      runbooks. Integrate post-mortem data into reliability reviews and service level
      objective assessments.
    tools:
      - "Post-mortem templates (Google SRE format)"
      - "GitLab Issues / Jira (action item tracking)"
      - "Confluence / GitLab Wiki (post-mortem repository)"
      - "Backstage / Compass (service reliability data)"
  devsecops:
    prose: >-
      Conduct post-incident code reviews that examine the code changes or vulnerabilities
      that contributed to the incident. Create follow-up issues and merge requests to address
      identified gaps. Update CI/CD pipeline rules and security scanning configurations based
      on lessons learned. Document incident patterns to improve detection of similar issues
      in future development. Use retrospective findings to improve secure coding practices
      and developer training programs.
    tools:
      - "GitLab Issues (action tracking)"
      - "GitLab Merge Requests (remediation)"
      - "GitLab Wiki (lessons learned documentation)"
      - "Retrospective facilitation tools"
  secops:
    prose: >-
      Facilitate structured post-incident reviews within defined timeframes after incident
      closure. Use standardized review frameworks that ensure all aspects of the incident
      response are examined. Compile findings into formal reports for management and relevant
      stakeholders. Track remediation actions and measure completion rates. Aggregate
      lessons learned across incidents to identify systemic issues and trends. Update
      detection rules, response playbooks, and training materials based on review findings.
      Share anonymized lessons learned with industry peers through ISACs where appropriate.
    tools:
      - "Post-incident review frameworks"
      - "Action tracking systems (Jira, ServiceNow)"
      - "Reporting tools (dashboards, executive summaries)"
      - "Knowledge management platforms"

