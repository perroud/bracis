id: post-3
family: post
title: "Evidence Retention and Incident Data Management"
class: NIST-800-61

statement:
  prose: >-
    Organizations should establish policies and procedures for retaining incident-related
    data, including evidence, logs, analysis results, documentation, and communications.
    Retention periods should comply with applicable legal, regulatory, and organizational
    requirements. Evidence that may be needed for legal proceedings should be retained in
    accordance with legal hold requirements and chain of custody procedures. Incident data
    should be stored securely with appropriate access controls to protect sensitive information
    and preserve data integrity. Organizations should also consider how incident data can be
    used for threat intelligence, training, and long-term trend analysis while protecting
    the confidentiality of sensitive incident details.

guidance:
  prose: >-
    Proper data retention is essential for regulatory compliance, legal proceedings, and
    organizational learning. NIST SP 800-61 Rev 3 recommends that organizations develop
    data retention policies that balance the need for data preservation with storage costs
    and privacy considerations. Different types of incident data may have different retention
    requirements: evidence for potential legal proceedings may need to be retained for years,
    while operational logs may have shorter retention periods. Organizations should implement
    automated retention management to ensure compliance with retention policies. Incident
    data that contains personally identifiable information or other sensitive data should
    be handled in accordance with applicable privacy laws and organizational privacy policies.

references:
  - citation: "NIST SP 800-61 Rev 3, Section 5.3"
    url: "https://csrc.nist.gov/pubs/sp/800/61/r3/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement tiered storage with automated lifecycle management for incident data.
      Configure immutable storage (S3 Object Lock, GCS retention) for evidence that must
      be preserved without modification. Implement log retention policies in centralized
      logging platforms with automated archival to cold storage. Deploy encryption at rest
      for all incident-related data stores. Implement access controls that restrict incident
      data access to authorized personnel. Configure automated data deletion when retention
      periods expire.
    tools:
      - "S3 / GCS with lifecycle policies (tiered storage)"
      - "Elasticsearch ILM (index lifecycle management)"
      - "Vault (encryption key management)"
      - "Kubernetes RBAC (access control)"
      - "AWS Glacier / GCS Archive (long-term storage)"
  devsecops:
    prose: >-
      Configure retention policies for CI/CD pipeline logs, audit events, and security
      scan results. Ensure Git repository history is preserved for forensic traceability.
      Implement automated cleanup of temporary incident-related data while preserving
      required records. Use GitLab project and group-level retention settings to manage
      artifact and log lifecycle. Document retention requirements in repository metadata.
    tools:
      - "GitLab Audit Events (retention configuration)"
      - "GitLab CI/CD artifact retention"
      - "Container Registry lifecycle policies"
      - "Backup solutions"
  secops:
    prose: >-
      Develop and enforce incident data retention policies that comply with all applicable
      legal and regulatory requirements. Implement legal hold procedures that can override
      standard retention policies when litigation or investigation is anticipated. Deploy
      evidence management systems with chain of custody tracking. Configure SIEM and
      incident management platform retention settings to meet policy requirements. Implement
      data classification for incident records to ensure appropriate handling of sensitive
      information. Conduct periodic audits of retention compliance.
    tools:
      - "Evidence management platforms"
      - "SIEM retention management"
      - "Data classification tools"
      - "Legal hold management systems"
      - "Compliance audit tools"

legal_references:
