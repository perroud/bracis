id: prep-4
family: prep
title: "Incident Response Tools and Resources"
class: NIST-800-61

statement:
  prose: >-
    Organizations should acquire, deploy, and maintain tools and resources needed for
    incident response. This includes tools for detection and monitoring, log analysis,
    forensic analysis, containment and eradication, communication, and evidence
    preservation. Organizations should ensure that tools are properly configured, tested,
    and accessible to incident responders when needed. Tool selection should be based on
    the organization's risk profile, technical environment, and incident response
    requirements. Organizations should also maintain jump bags, forensic workstations,
    and other resources needed for on-site and remote incident response.

guidance:
  prose: >-
    Having the right tools readily available is critical for effective and timely incident
    response. Tool selection should be driven by the types of incidents the organization is
    most likely to encounter and the technical environment in which those incidents occur.
    Tools should be tested regularly to ensure they function correctly and are compatible
    with the current environment. Organizations should maintain documentation for all tools,
    including configuration guides, usage procedures, and maintenance schedules. Cloud-native
    environments require tools that can operate across dynamic, ephemeral infrastructure.
    Organizations should also consider the forensic soundness of their tools and ensure they
    meet evidentiary standards when legal proceedings may result from an incident.

references:
  - citation: "NIST SP 800-61 Rev 3, Section 2.4"
    url: "https://csrc.nist.gov/pubs/sp/800/61/r3/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Deploy a comprehensive monitoring and observability stack including metrics collection,
      log aggregation, and distributed tracing. Implement runtime security monitoring with
      tools that detect anomalous behavior in containers and workloads. Deploy network
      monitoring and traffic analysis tools. Maintain forensic-ready infrastructure with
      immutable logging, centralized audit trails, and snapshot capabilities. Implement
      automated evidence collection tools that capture system state during incidents. Ensure
      all tools are deployed using infrastructure-as-code for consistency and reproducibility.
    tools:
      - "Prometheus / Grafana / Loki (observability)"
      - "Falco / Tetragon (runtime security)"
      - "Elastic Stack / Splunk (log analysis)"
      - "Velero (cluster snapshots)"
      - "Wireshark / Zeek (network forensics)"
      - "Terraform / Pulumi (tool provisioning)"
  devsecops:
    prose: >-
      Integrate security scanning tools into CI/CD pipelines that serve as early detection
      mechanisms. Deploy application-level monitoring and error tracking tools. Maintain
      container image scanning and software composition analysis tools. Implement secret
      detection in repositories and pipelines. Ensure development environments support
      forensic analysis with proper logging and audit trails. Maintain documentation for
      all security tools and their integration points.
    tools:
      - "GitLab Security Scanning (SAST, DAST, dependency, container, secret detection)"
      - "Sentry / Datadog APM (application monitoring)"
      - "Trivy / Grype (container scanning)"
      - "GitLab Audit Events"
  secops:
    prose: >-
      Deploy and maintain a SIEM platform for centralized log collection and correlation.
      Implement a SOAR platform for automated response workflows. Maintain forensic
      workstations with disk imaging, memory analysis, and malware analysis capabilities.
      Deploy endpoint detection and response (EDR) agents across the enterprise. Implement
      network detection and response (NDR) tools for network traffic analysis. Maintain
      threat intelligence platforms that feed detection rules and response playbooks.
      Regularly test and update all tools.
    tools:
      - "SIEM (Splunk, Elastic Security, Chronicle)"
      - "SOAR (Cortex XSOAR, Tines, Shuffle)"
      - "EDR (CrowdStrike, SentinelOne, Microsoft Defender)"
      - "NDR (Zeek, Suricata, Corelight)"
      - "Forensics (Velociraptor, Autopsy, Volatility)"
      - "Threat intelligence (MISP, OpenCTI)"

