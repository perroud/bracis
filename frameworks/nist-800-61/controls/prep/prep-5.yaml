id: prep-5
family: prep
title: "Incident Prevention and Risk Mitigation"
class: NIST-800-61

statement:
  prose: >-
    Although incident response is inherently reactive, organizations should implement
    preventive measures that reduce the frequency and impact of incidents. This includes
    conducting risk assessments to identify and prioritize threats, implementing security
    controls based on risk analysis, keeping systems patched and hardened, configuring
    network security devices appropriately, implementing malware prevention measures,
    and establishing user awareness programs. Effective preparation reduces the workload
    on the incident response team and improves overall security posture.

guidance:
  prose: >-
    Prevention is a critical complement to incident response capabilities. While no set of
    preventive measures can eliminate all incidents, effective prevention significantly reduces
    the volume and severity of incidents that the response team must handle. Organizations
    should use threat intelligence and risk assessment results to prioritize preventive
    measures. NIST SP 800-61 Rev 3 emphasizes integration with the NIST CSF Protect function,
    recognizing that preparation includes both building response capabilities and reducing the
    attack surface. Vulnerability management, patch management, configuration management, and
    access control are foundational preventive measures that directly reduce incident likelihood.

references:
  - citation: "NIST SP 800-61 Rev 3, Section 2.5"
    url: "https://csrc.nist.gov/pubs/sp/800/61/r3/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated vulnerability scanning and patch management across infrastructure.
      Deploy admission controllers that enforce security policies on workloads before
      deployment. Implement network policies that restrict unnecessary communication paths.
      Use image scanning to prevent deployment of vulnerable container images. Implement
      infrastructure hardening baselines using CIS Benchmarks. Deploy secrets management
      solutions to prevent credential exposure. Implement automated compliance checking that
      validates security configurations continuously.
    tools:
      - "Kyverno / OPA Gatekeeper (admission control)"
      - "Trivy / Grype (image scanning)"
      - "CIS Benchmarks (hardening baselines)"
      - "Vault / External Secrets Operator (secrets management)"
      - "Kubernetes NetworkPolicy / Cilium (network segmentation)"
      - "Renovate / Dependabot (automated patching)"
  devsecops:
    prose: >-
      Integrate security scanning into every stage of the development lifecycle. Implement
      pre-commit hooks for secret detection. Run SAST, DAST, dependency scanning, and
      container scanning in CI/CD pipelines. Implement secure coding standards and conduct
      code reviews with security focus. Use merge request approval rules to enforce security
      review for changes to sensitive components. Implement automated dependency updates to
      reduce vulnerability exposure windows.
    tools:
      - "GitLab Security Scanning (full suite)"
      - "Pre-commit hooks (secret detection, linting)"
      - "Renovate / Dependabot (dependency updates)"
      - "SonarQube (code quality and security)"
      - "GitLab Merge Request Approvals"
  secops:
    prose: >-
      Implement a vulnerability management program with defined SLAs for remediation based
      on severity. Conduct regular risk assessments to identify emerging threats and gaps in
      preventive controls. Maintain asset inventories and ensure all assets are covered by
      monitoring and protective controls. Implement email security controls to reduce phishing
      risk. Deploy web application firewalls and intrusion prevention systems. Conduct regular
      penetration testing and red team engagements to validate preventive controls.
    tools:
      - "Vulnerability scanners (Nessus, Qualys, Rapid7)"
      - "WAF (Cloudflare, AWS WAF, ModSecurity)"
      - "IPS/IDS (Suricata, Snort)"
      - "Email security (Proofpoint, Mimecast)"
      - "Penetration testing tools"

