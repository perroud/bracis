id: prep-1
family: prep
title: "Incident Response Policy and Plan"
class: NIST-800-61

statement:
  prose: >-
    Organizations should establish and maintain an incident response policy that defines the
    organization's approach to incident response, including the structure and organization of
    the incident response capability. The policy should be complemented by an incident response
    plan that provides a roadmap for implementing the incident response program and describes
    the structure and organization of the incident response capability. The plan should include
    the mission, strategies and goals, senior leadership approval, organizational approach to
    incident response, how the incident response team communicates with the rest of the
    organization and with other organizations, metrics for measuring the incident response
    capability and its effectiveness, and how the program fits into the overall organization.

guidance:
  prose: >-
    The incident response policy establishes the authority and legitimacy of the incident
    response program. It should be reviewed and updated regularly, particularly after significant
    incidents or organizational changes. The incident response plan operationalizes the policy by
    providing specific procedures, escalation paths, and resource allocation. NIST SP 800-61 Rev 3
    integrates incident response with the NIST Cybersecurity Framework 2.0, emphasizing that
    incident response is a core function of cybersecurity risk management. The plan should address
    all phases of the incident response lifecycle and define clear roles, responsibilities, and
    communication channels. Organizations should tailor the plan based on their risk profile, size,
    structure, and mission requirements.

references:
  - citation: "NIST SP 800-61 Rev 3, Section 2"
    url: "https://csrc.nist.gov/pubs/sp/800/61/r3/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Codify incident response policies and plans as version-controlled documents in a Git
      repository. Implement policy-as-code using Open Policy Agent (OPA) or Kyverno to enforce
      incident response requirements across infrastructure. Define incident severity levels and
      map them to automated escalation paths in the incident management platform. Maintain
      runbooks as code that are automatically validated and kept in sync with infrastructure
      changes. Use infrastructure-as-code templates to provision incident response tooling
      consistently across environments.
    tools:
      - "Git (policy version control)"
      - "Open Policy Agent / Kyverno (policy enforcement)"
      - "PagerDuty / Opsgenie (incident management)"
      - "Backstage / Compass (service catalog with runbooks)"
      - "Terraform / Pulumi (IR tooling provisioning)"
  devsecops:
    prose: >-
      Store incident response plans and playbooks in version-controlled repositories alongside
      application code. Use merge requests to manage changes to incident response documentation,
      ensuring peer review and approval. Implement CI/CD pipelines that validate playbook
      syntax and completeness. Integrate incident response procedures into developer onboarding
      and training programs. Ensure application-level logging and error handling support incident
      detection and analysis requirements defined in the plan.
    tools:
      - "GitLab / GitHub (version-controlled IR plans)"
      - "GitLab CI/CD (playbook validation)"
      - "Confluence / GitLab Wiki (IR documentation)"
      - "Slack / Microsoft Teams (communication channels)"
  secops:
    prose: >-
      Develop and maintain a comprehensive incident response policy approved by senior
      leadership. Create detailed incident response plans that cover all incident categories
      relevant to the organization. Define incident classification schemes, severity levels,
      and escalation procedures. Establish communication templates for internal and external
      stakeholders. Conduct annual policy reviews and update plans based on lessons learned
      from incidents and exercises. Ensure alignment with regulatory notification requirements
      and industry-specific incident response standards.
    tools:
      - "ServiceNow (policy management)"
      - "Jira / GitLab Issues (plan tracking)"
      - "NIST CSF 2.0 (framework alignment)"
      - "Document management systems"

