id: prep-3
family: prep
title: "Incident Response Training and Exercises"
class: NIST-800-61

statement:
  prose: >-
    Organizations should provide incident response training to incident response team
    members and other personnel with incident response roles and responsibilities. Training
    should cover the incident response policy and procedures, communication protocols,
    technical skills relevant to the organization's environment, and legal and regulatory
    requirements. Organizations should conduct exercises, including tabletop exercises,
    simulations, and full-scale tests, to validate the incident response plan and improve
    team readiness. Exercises should be conducted regularly and should incorporate lessons
    learned from previous incidents and emerging threat scenarios.

guidance:
  prose: >-
    Training ensures that team members have the knowledge and skills needed to respond
    effectively to incidents. Exercises test the incident response plan in realistic scenarios
    and identify gaps in procedures, tooling, and coordination. Tabletop exercises are
    low-cost and effective for testing decision-making and communication processes. Technical
    exercises and simulations provide hands-on practice with incident response tools and
    procedures. Organizations should vary exercise scenarios to cover different incident types,
    severity levels, and attack vectors. Exercise results should be documented and used to
    update the incident response plan. NIST SP 800-61 Rev 3 emphasizes the importance of
    integrating exercises with the NIST CSF Respond and Recover functions.

references:
  - citation: "NIST SP 800-61 Rev 3, Section 2.3"
    url: "https://csrc.nist.gov/pubs/sp/800/61/r3/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement chaos engineering practices using tools like Chaos Monkey, Litmus, or Gremlin
      to simulate infrastructure failures and validate incident response procedures. Create
      game day exercises that test monitoring, alerting, and automated response capabilities.
      Build staging environments that replicate production for realistic incident response
      exercises. Implement automated red team tools that periodically test detection and
      response capabilities. Document exercise results and track remediation of identified
      gaps using issue tracking systems.
    tools:
      - "Litmus / Chaos Monkey / Gremlin (chaos engineering)"
      - "Atomic Red Team (adversary simulation)"
      - "Kubernetes staging environments"
      - "GitLab Issues / Jira (gap tracking)"
  devsecops:
    prose: >-
      Incorporate incident response training into developer onboarding programs. Conduct
      tabletop exercises that walk development teams through application-level incident
      scenarios such as data breaches, supply chain compromises, and vulnerability
      exploitation. Use CI/CD pipeline failures as training opportunities for incident
      response procedures. Integrate security awareness training that covers incident
      reporting responsibilities and escalation procedures. Track training completion
      and exercise participation metrics.
    tools:
      - "Training platforms (KnowBe4, SANS)"
      - "GitLab CI/CD (pipeline failure exercises)"
      - "Tabletop exercise frameworks"
      - "GitLab Wiki (training documentation)"
  secops:
    prose: >-
      Develop a comprehensive incident response training program that includes initial
      training for new team members and recurring training for experienced staff. Conduct
      quarterly tabletop exercises covering different incident scenarios. Perform annual
      full-scale exercises that test end-to-end incident response capabilities including
      external coordination. Participate in industry exercises and information sharing
      events. Track training hours, certifications, and exercise results as metrics for
      team readiness assessment.
    tools:
      - "SANS training and certifications"
      - "AttackIQ / SafeBreach (breach and attack simulation)"
      - "Tabletop exercise platforms"
      - "Purple team exercises"

legal_references:
