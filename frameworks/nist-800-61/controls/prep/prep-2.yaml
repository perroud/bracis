id: prep-2
family: prep
title: "Incident Response Team Structure"
class: NIST-800-61

statement:
  prose: >-
    Organizations should establish an incident response team with clearly defined roles,
    responsibilities, and authority. The team structure may be centralized, distributed,
    or coordinated, depending on the organization's size, geographic distribution, and
    operational requirements. Team members should have the necessary skills, training,
    and tools to effectively detect, analyze, contain, eradicate, and recover from
    incidents. Organizations should designate a team lead with authority to make decisions
    during incident response and ensure appropriate staffing levels to provide adequate
    coverage for incident response operations.

guidance:
  prose: >-
    The choice of team structure depends on organizational factors such as size, geographic
    distribution, and the complexity of the IT environment. A centralized team works well for
    smaller organizations, while larger organizations may benefit from distributed teams
    coordinated by a central authority. Regardless of structure, the team needs clearly
    defined escalation paths and decision-making authority. Team members should include
    representatives from IT operations, security, legal, communications, and business units.
    Organizations should also establish relationships with external resources such as managed
    security service providers, law enforcement, and industry-specific ISACs. The team should
    participate in regular training and exercises to maintain readiness.

references:
  - citation: "NIST SP 800-61 Rev 3, Section 2.2"
    url: "https://csrc.nist.gov/pubs/sp/800/61/r3/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Define on-call rotations and escalation policies using incident management platforms.
      Implement automated paging and notification workflows based on incident severity and
      affected services. Maintain a service ownership model in the service catalog that maps
      services to responsible teams and on-call engineers. Configure role-based access controls
      that grant incident responders elevated privileges during active incidents. Implement
      ChatOps integration to enable collaborative incident response in communication channels.
    tools:
      - "PagerDuty / Opsgenie (on-call management)"
      - "Backstage / Compass (service ownership)"
      - "Slack / Microsoft Teams (ChatOps)"
      - "Kubernetes RBAC (elevated access)"
      - "Teleport / Boundary (just-in-time access)"
  devsecops:
    prose: >-
      Define incident response roles within development teams, including security champions
      who serve as first responders for application-level incidents. Document team structures
      and contact information in repository metadata. Implement CODEOWNERS files that map
      to incident response responsibilities. Integrate incident management with the
      development workflow so incidents can be triaged and tracked alongside regular work.
      Ensure developers understand their role in incident response through training and
      tabletop exercises.
    tools:
      - "GitLab / GitHub (CODEOWNERS, team definitions)"
      - "GitLab Incident Management"
      - "Slack / Microsoft Teams (team communication)"
      - "Training platforms (security champion programs)"
  secops:
    prose: >-
      Establish a formal Security Operations Center (SOC) or virtual SOC with defined staffing
      models, shift schedules, and escalation procedures. Define tiered response capabilities
      (Tier 1 triage, Tier 2 analysis, Tier 3 advanced response). Maintain an incident
      response roster with current contact information and escalation chains. Establish
      memoranda of understanding with external parties including law enforcement, ISACs,
      and managed security service providers. Conduct regular team readiness assessments and
      skills gap analyses.
    tools:
      - "SIEM platforms (SOC operations)"
      - "SOAR platforms (workflow automation)"
      - "PagerDuty / Opsgenie (on-call scheduling)"
      - "Training platforms (SANS, OffSec)"

legal_references:
