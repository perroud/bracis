control_families:
  - id: cap-1
    title: "Disposições Iniciais"
    description: >-
      Scope, definitions of remote means, clients, supervised entities, and general
      requirements for integrity, authenticity, non-repudiation and confidentiality in
      digital insurance operations
    articles: "art. 1 ao art. 3"
    control_count: 4
  - id: cap-2
    title: "Utilização de Meios Remotos nas Operações"
    description: >-
      Rules for document issuance and delivery via remote means, electronic contracting
      of insurance policies and capitalization products, and procedures for contract
      lifecycle management through digital channels
    articles: "art. 4 ao art. 8"
    control_count: 6
  - id: cap-3
    title: "Disposições Finais"
    description: >-
      Applicability to intermediated operations, preservation of existing regulatory
      obligations, extension to reinsurance and retrocession, e-commerce decree
      applicability, and transitional provisions
    articles: "art. 9 ao art. 14"
    control_count: 5
related_frameworks:
  - framework_id: susep-638
    relationship: complements
    description: "Circular SUSEP 638/2021 complements Resolução CNSP 408/2021 by establishing cybersecurity requirements that must be observed by insurers operating through remote means."
  - framework_id: lgpd
    relationship: complements
    description: "The LGPD complements Resolução CNSP 408/2021 by requiring protection of personal data collected and processed through digital insurance distribution channels."
  - framework_id: cnsp-381
    relationship: complements
    description: "Resolução CNSP 381/2020 complements by defining general cybersecurity requirements for the insurance market, applicable to operations conducted through remote means."
  - framework_id: susep-612
    relationship: complements
    description: "Circular SUSEP 612/2020 complements by imposing AML/CFT obligations applicable to insurance operations conducted through remote means."
  - framework_id: cnsp-416
    relationship: complements
    description: "Resolução CNSP 416/2021 complements by establishing internal controls, risk management and audit requirements applicable to digital insurance operations."
