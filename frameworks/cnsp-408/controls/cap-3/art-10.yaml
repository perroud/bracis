id: art-10
family: cap-3
title: "Preservation of Existing Regulatory Obligations in Digital Channels"
class: CNSP-408
baselines: [seguradoras-digitais]
statement:
  prose: |
    Art. 10. O uso de meios remotos nos termos desta Resolução não isenta os entes
    supervisionados do cumprimento de obrigações previstas em regulamentação vigente
    aplicável às operações de seguros, previdência complementar aberta e/ou
    capitalização, inclusive no que diz respeito à prestação de informações,
    disponibilização e envio de documentos.
guidance:
  prose: |
    Article 10 is a critical interpretive provision establishing that the use of
    remote means does not exempt supervised entities from any existing regulatory
    obligation. Digital channels are an ADDITIONAL modality, not a replacement for
    regulatory requirements.

    **Key principle: digital channels inherit all regulatory obligations.**
    If a regulation requires the supervised entity to provide specific information
    to the client, that obligation exists regardless of whether the interaction
    occurs in person, by mail, or through remote means. The channel changes;
    the obligations do not.

    **Specific areas highlighted:**
    1. Information provision (prestação de informações): all mandatory disclosures
       required by other SUSEP regulations must be made in digital channels
    2. Document availability (disponibilização de documentos): documents that must
       be made available to clients must also be available through digital channels
    3. Document delivery (envio de documentos): documents that must be sent to
       clients must be sent even when the relationship is entirely digital

    **Cross-regulatory compliance:**
    This article creates a bridge between CNSP 408 and the entire SUSEP regulatory
    framework. Supervised entities must map ALL existing obligations and verify they
    are satisfied in their digital channel implementations. Key regulations include:
    - Product-specific circulars (auto, vida, previdência, capitalização)
    - Consumer protection regulations (Código de Defesa do Consumidor)
    - LGPD (data protection obligations)
    - SUSEP 612 (AML/CFT obligations)
    - CNSP 381/SUSEP 638 (cybersecurity obligations)

    **Practical implication:**
    A "digital-first" or "digital-only" insurer cannot claim simplified regulatory
    requirements by virtue of operating exclusively through remote means.
implementation_guidance:
  platform_engineering:
    prose: |
      **Cross-regulatory compliance layer:**
      1. Regulatory obligation registry: comprehensive catalog of ALL regulatory
         obligations applicable to insurance, pension, and capitalization operations,
         mapped to their implementation in each digital channel.
      2. Compliance rule engine that validates digital channel implementations
         against the full regulatory obligation set (not just CNSP 408).
      3. Information disclosure framework: centralized system for managing and
         delivering all mandatory disclosures across digital channels.
      4. Document delivery orchestration: unified system ensuring all required
         documents are delivered through digital channels with proper tracking.

      **Regulatory change management:**
      5. Regulatory monitoring service tracking changes to SUSEP, CNSP, and
         related regulations that may affect digital channel obligations.
      6. Impact assessment workflow for regulatory changes on digital channels.
      7. Automated compliance gap detection when new regulations are published.
    tools:
      - grc-platform
      - compliance-rule-engine
      - document-management
      - notification-service
      - regulatory-monitoring
  devsecops:
    prose: |
      **Cross-regulatory validation:**
      1. Compliance test suites covering not just CNSP 408 but all applicable
         regulations for each product line and digital channel.
      2. Mandatory disclosure checklist validated in the CI/CD pipeline for
         every customer-facing feature deployment.
      3. Automated validation that document delivery obligations are implemented
         for all regulatory-mandated communications.
      4. Regression testing ensuring regulatory compliance is maintained when
         digital channels are updated.

      **Documentation and traceability:**
      5. Regulatory requirement traceability matrix maintained in version control,
         linking each obligation to its implementation and test cases.
      6. Compliance-as-Code: executable policy checks for key regulatory requirements.
      7. Change impact analysis: automated assessment of how code changes affect
         regulatory compliance.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - selenium
      - compliance-testing
      - traceability-matrix
  secops:
    prose: |
      **Comprehensive compliance monitoring:**
      1. Periodic assessment (quarterly) of digital channel compliance against
         the full set of applicable regulations (not just CNSP 408).
      2. Gap analysis covering information provision, document availability,
         and document delivery obligations across all digital channels.
      3. Client complaint analysis: identify complaints that indicate regulatory
         obligation failures in digital channels.
      4. Regulatory change impact monitoring: track new regulations and assess
         impact on existing digital channel implementations.

      **Governance and reporting:**
      5. Annual compliance report covering all regulatory obligations mapped
         to digital channel implementations.
      6. Board-level reporting on cross-regulatory compliance status.
      7. SUSEP examination readiness: maintain documentation demonstrating
         compliance with all applicable regulations in digital channels.
      8. Training program for compliance and operations teams on the
         intersection of CNSP 408 with other regulations.
    tools:
      - grc-platform
      - regulatory-monitoring
      - compliance-scanner
      - reporting-platform
