id: art-9
family: cap-3
title: "Applicability to Intermediated Operations"
class: CNSP-408
baselines: [seguradoras-digitais]
statement:
  prose: |
    Art. 9º. O disposto nesta Resolução se aplica às operações de seguro, previdência
    complementar aberta e capitalização ainda que sejam utilizados intermediários na
    contratação ou em outras fases da relação contratual.
guidance:
  prose: |
    Article 9 extends the resolution's applicability to operations involving
    intermediaries at any stage of the contractual relationship.

    **Full chain applicability:**
    The resolution applies regardless of whether the operation involves intermediaries
    (brokers, representatives, correspondents, distributors). The supervised entity
    remains responsible for compliance even when the client interacts exclusively
    through an intermediary.

    **"Any phase of the contractual relationship":**
    The extension covers not just contracting, but the entire lifecycle:
    - Pre-sale: information disclosure, quoting, proposal submission
    - Contracting: formalization, document issuance
    - During contract: endorsements, payments, servicing
    - Claims: filing, documentation, settlement
    - Post-contract: cancellation, portability, benefit payments

    **Practical implication for intermediaries:**
    Intermediaries who use digital channels must comply with all CNSP 408 requirements.
    The supervised entity must ensure compliance through:
    1. Contractual obligations with intermediaries
    2. Technical controls (API standards, security requirements)
    3. Monitoring and auditing of intermediary compliance
    4. Training and certification programs

    **Responsibility chain:**
    The supervised entity bears ultimate responsibility for CNSP 408 compliance,
    even when non-compliance originates with an intermediary. This creates an
    obligation to implement adequate oversight of the digital channel usage by
    all intermediaries in the distribution chain.
implementation_guidance:
  platform_engineering:
    prose: |
      **Intermediary digital channel governance:**
      1. Intermediary portal/API with built-in CNSP 408 compliance controls —
         intermediaries inherit compliance by using the supervised entity's platform.
      2. API gateway enforcing CNSP 408 requirements on all intermediary
         integrations (authentication, encryption, logging, protocol generation).
      3. White-label digital channels for intermediaries that embed all required
         controls (document delivery, receipt confirmation, timestamps).
      4. Intermediary compliance dashboard: real-time visibility into each
         intermediary's CNSP 408 compliance status.

      **Technical standards enforcement:**
      5. API specification (OpenAPI) defining mandatory CNSP 408 compliance
         fields in all intermediary integration endpoints.
      6. Webhook standards for intermediary notifications (receipt confirmation,
         protocol generation).
      7. SDK with embedded compliance controls for intermediary app integration.
      8. Sandbox environment for intermediary onboarding and compliance testing.
    tools:
      - api-gateway
      - partner-portal
      - sdk-distribution
      - monitoring-alerting
      - sandbox-environment
  devsecops:
    prose: |
      **Intermediary integration validation:**
      1. Automated compliance tests for all intermediary API integrations —
         verify CNSP 408 requirements are met end-to-end.
      2. Contract testing between supervised entity and intermediary systems.
      3. Security scanning of intermediary-facing APIs (OWASP API Security Top 10).
      4. Penetration testing of intermediary integration points.

      **Onboarding automation:**
      5. Automated intermediary onboarding pipeline with compliance validation
         gates (API standards, security requirements, data handling).
      6. Continuous compliance monitoring of intermediary integrations via
         automated test suites.
      7. Intermediary API version management with mandatory upgrade paths.
    tools:
      - gitlab-ci
      - contract-testing
      - burp-suite
      - postman
      - dependency-scanning
  secops:
    prose: |
      **Intermediary compliance monitoring:**
      1. Continuous monitoring of intermediary digital channel compliance —
         alert on non-conformities (missing protocols, failed delivery
         confirmations, missing timestamps).
      2. Periodic compliance audits of intermediary operations (quarterly).
      3. Intermediary risk scoring based on compliance metrics, volume, and
         complaint rates.
      4. Escalation procedures for persistent intermediary non-compliance.

      **Reporting and governance:**
      5. Monthly intermediary compliance report for the supervised entity's
         compliance and risk management teams.
      6. Annual intermediary compliance assessment submitted to governance.
      7. Intermediary incident tracking and remediation management.
      8. Evidence retention for intermediary compliance (audit logs, test
         results, corrective actions) for minimum 5 years.
    tools:
      - grc-platform
      - monitoring-alerting
      - partner-management
      - reporting-platform
