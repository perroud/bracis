id: art-13-14
family: cap-3
title: "Revocations and Effective Date"
class: CNSP-408
baselines: [seguradoras-digitais]
statement:
  prose: |
    Art. 13. Ficam revogadas:

    I — a Resolução CNSP nº 294, de 6 de junho de 2013; e

    II — a Resolução CNSP nº 359, de 20 de dezembro de 2017.

    Art. 14. Esta Resolução entra em vigor em 1º de outubro de 2021.
guidance:
  prose: |
    Articles 13 and 14 establish the transitional provisions of the resolution.

    **Revocations (Art. 13):**
    Two prior resolutions are revoked:

    1. **CNSP 294/2013:** The original resolution on electronic commerce in insurance.
       Replaced entirely by CNSP 408/2021 with modernized and expanded requirements.

    2. **CNSP 359/2017:** Amended CNSP 294 to expand the scope of remote means.
       Also fully replaced by CNSP 408/2021.

    **Effective date (Art. 14):**
    The resolution took effect on October 1, 2021 (approximately 3 months after
    publication on June 30, 2021). This grace period allowed supervised entities
    to adapt their systems and processes.

    **Transition implications:**
    - Operations conducted before October 1, 2021 were governed by CNSP 294/2013
      (as amended by CNSP 359/2017)
    - All new remote operations from October 1, 2021 onward must comply with CNSP 408
    - Existing contracts formalized under CNSP 294/359 remain valid but ongoing
      operations (servicing, claims, cancellation) must comply with CNSP 408
    - No grandfathering clause: all digital channels must have been compliant by
      the effective date

    **Regulatory continuity:**
    CNSP 408 preserves the fundamental principles of CNSP 294/359 (authorization of
    remote means, security requirements, consumer protection) while modernizing and
    expanding the framework. Entities that were compliant with CNSP 294/359 needed
    primarily to address the new requirements (e.g., § 1 and § 2 of Art. 8 on
    same-channel termination).
implementation_guidance:
  platform_engineering:
    prose: |
      **Regulatory version management:**
      1. Configuration management system tracking which regulatory version applies
         to each contract based on its contracting date (CNSP 294/359 for pre-Oct 2021
         contracts, CNSP 408 for post-Oct 2021 contracts).
      2. Feature flag system supporting regulatory version-specific behavior when
         legacy contract handling differs from current requirements.
      3. Audit trail preserving evidence of compliance with the applicable regulation
         version for each contract.
      4. Documentation of the migration from CNSP 294/359 to CNSP 408 compliance.

      **Ongoing compliance infrastructure:**
      5. Regulatory change monitoring for future amendments or replacements of
         CNSP 408.
      6. Compliance configuration versioning: ability to update regulatory
         parameters without code changes.
      7. Automated compliance testing against current regulatory version.
    tools:
      - configuration-management
      - feature-flags
      - compliance-rule-engine
      - document-management
  devsecops:
    prose: |
      **Regulatory version testing:**
      1. Test suites parameterized by regulatory version — verify correct behavior
         for both legacy (CNSP 294/359) and current (CNSP 408) contracts.
      2. Regression tests ensuring that CNSP 408 compliance is not broken by
         subsequent code changes.
      3. Automated compliance validation against CNSP 408 requirements as part
         of the CI/CD pipeline.
      4. Documentation validation: ensure all system documentation references
         the current regulatory version.

      **Change management:**
      5. Impact analysis process for regulatory changes affecting digital channels.
      6. Feature branch strategy for regulatory compliance updates.
      7. Rollback capability for compliance-related deployments.
    tools:
      - gitlab-ci
      - selenium
      - postman
      - change-management
  secops:
    prose: |
      **Compliance lifecycle management:**
      1. Maintain a regulatory timeline documenting the transition from
         CNSP 294/359 to CNSP 408 with evidence of compliance at each stage.
      2. Periodic review of legacy contract handling to ensure ongoing operations
         comply with CNSP 408 requirements.
      3. Monitor for regulatory changes that may amend or replace CNSP 408.
      4. SUSEP examination readiness: documentation package demonstrating
         the transition and ongoing compliance.

      **Evidence retention:**
      5. Preserve all evidence of CNSP 294/359 compliance for contracts
         originated under those regulations (statute of limitations period).
      6. Evidence of CNSP 408 compliance from October 1, 2021 onward.
      7. Transition documentation: gap analysis, remediation plan, implementation
         evidence, testing results.
      8. Regulatory correspondence with SUSEP related to CNSP 408 compliance.
    tools:
      - grc-platform
      - document-management
      - regulatory-monitoring
      - reporting-platform
