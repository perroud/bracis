id: art-11
family: cap-3
title: "Extension to Reinsurance and Retrocession Operations"
class: CNSP-408
baselines: [seguradoras-digitais]
statement:
  prose: |
    Art. 11. Os requisitos dispostos no inciso I do art. 3º são aplicáveis às
    operações de resseguro e retrocessão realizadas com o uso de meios remotos.
guidance:
  prose: |
    Article 11 extends specific CNSP 408 requirements to reinsurance and retrocession
    operations conducted through remote means.

    **Limited extension:**
    Only the requirements of Art. 3, inciso I (integrity, authenticity, non-repudiation,
    and confidentiality) are extended to reinsurance and retrocession. The other
    provisions of the resolution (definitions, document issuance, contracting,
    protocols, consumer protection) do NOT apply to reinsurance/retrocession.

    This makes sense because:
    1. Reinsurance is a B2B relationship (insurer-to-reinsurer), not B2C
    2. Consumer protection provisions are irrelevant for professional counterparties
    3. Document and contracting formalities differ significantly in reinsurance
    4. Protocol and receipt confirmation requirements are handled by industry
       standards (slip systems, treaty management platforms)

    **Why integrity, authenticity, non-repudiation and confidentiality still apply:**
    Even in professional B2B relationships, the security properties of Art. 3, I
    are essential:
    - Integrity: reinsurance contracts and bordereaux must not be tampered with
    - Authenticity: parties must verify the origin of communications and documents
    - Non-repudiation: contract acceptance and claims must be provable
    - Confidentiality: reinsurance data is commercially sensitive and may contain
      personal data of insured parties (triggering LGPD obligations)

    **Reinsurance and retrocession defined:**
    - Reinsurance (resseguro): transfer of risk from insurer to reinsurer
    - Retrocession (retrocessão): transfer of risk from reinsurer to another reinsurer

    **Practical implication:**
    Reinsurance platforms, treaty management systems, and bordereaux exchange systems
    used by supervised entities must implement the four security properties when
    operating through digital channels.
implementation_guidance:
  platform_engineering:
    prose: |
      **Secure reinsurance platform:**
      1. Reinsurance treaty management platform with end-to-end encryption
         for all data exchanges between cedents and reinsurers.
      2. Digital signature infrastructure for reinsurance contract documents
         (slips, endorsements, treaty wordings).
      3. Secure bordereaux exchange with integrity verification (hash-based
         validation of premium and claims bordereaux).
      4. Audit trail for all reinsurance communications with non-repudiation
         evidence (timestamps, signatures, delivery confirmations).

      **Technical security controls:**
      5. mTLS for API-to-API communications between cedent and reinsurer systems.
      6. Encrypted file transfer for bulk data exchanges (SFTP with PGP, or
         secure API with AES-256).
      7. Access control with principle of least privilege for reinsurance data.
      8. Data classification for reinsurance information distinguishing commercial
         data from personal data (LGPD-relevant).
    tools:
      - treaty-management-platform
      - sftp-server
      - pki-infrastructure
      - kms
      - api-gateway
  devsecops:
    prose: |
      **Security validation for reinsurance systems:**
      1. SAST and DAST scanning of reinsurance platform applications.
      2. Penetration testing of reinsurance data exchange interfaces.
      3. Cryptographic compliance checks: verify TLS configuration, encryption
         algorithms, and key management in reinsurance systems.
      4. Integration tests for bordereaux integrity verification.

      **Compliance automation:**
      5. Automated checks verifying that all reinsurance API endpoints enforce
         TLS 1.2+ and require mutual authentication.
      6. Secret detection in reinsurance system codebases.
      7. Dependency scanning for reinsurance platform components.
    tools:
      - gitlab-ci
      - sast-scanner
      - dast-scanner
      - secret-detection
      - dependency-scanning
      - ssl-labs-api
  secops:
    prose: |
      **Reinsurance security monitoring:**
      1. Monitor reinsurance data exchanges for integrity violations
         (hash mismatches, signature failures).
      2. Track authentication events on reinsurance platforms —
         detect unauthorized access attempts.
      3. Confidentiality monitoring: DLP controls on reinsurance data
         to prevent unauthorized disclosure.
      4. Incident response procedures specific to reinsurance platform
         security events.

      **Compliance and audit:**
      5. Annual security assessment of reinsurance platforms against
         Art. 3, I requirements.
      6. Third-party reinsurer security assessment (due diligence on
         reinsurer's digital security posture).
      7. Evidence retention for reinsurance security controls (5+ years).
      8. SUSEP reporting for security incidents affecting reinsurance data.
    tools:
      - siem
      - dlp
      - certificate-monitoring
      - grc-platform
