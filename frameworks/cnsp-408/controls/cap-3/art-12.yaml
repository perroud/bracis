id: art-12
family: cap-3
title: "Applicability of E-Commerce Consumer Protection Regulations"
class: CNSP-408
baselines: [seguradoras-digitais]
statement:
  prose: |
    Art. 12. Aplica-se às operações de seguro, previdência complementar aberta e
    capitalização, no que couber, o Decreto nº 7.962, de 15 de março de 2013.
guidance:
  prose: |
    Article 12 establishes the applicability of Brazil's e-commerce consumer protection
    decree (Decreto 7.962/2013) to insurance, pension, and capitalization operations
    conducted through digital channels.

    **Decreto 7.962/2013 — key provisions applicable to digital insurance:**
    The decree regulates electronic commerce under the Consumer Protection Code
    (Código de Defesa do Consumidor, Lei 8.078/1990). Key requirements include:

    1. **Clear information disclosure (art. 2):**
       - Full identification of the supplier (name, CNPJ, address)
       - Clear and visible pricing with all costs
       - Product/service characteristics
       - Delivery/availability conditions
       - Applicable restrictions

    2. **Transparent contracting (art. 4):**
       - Summary of the contract before confirmation
       - Mechanism for correcting errors before finalization
       - Immediate confirmation of acceptance

    3. **Right of withdrawal (art. 5):**
       - 7-day cooling-off period from contracting or receipt
       - Exercise through the SAME means used for contracting
       - Immediate communication of withdrawal to financial institution

    4. **Customer service (art. 6):**
       - Accessible mechanisms for resolving disputes
       - Communication of receipt of complaints

    **"No que couber" (as applicable):**
    The qualifying phrase "no que couber" indicates that not all provisions of the
    decree apply directly. Some provisions are designed for physical goods e-commerce
    and are not directly applicable to insurance. The supervised entity must determine
    which provisions are applicable to each product type and digital channel.

    **Practical implication:**
    The 7-day right of withdrawal applies to insurance contracted through digital
    channels. The supervised entity must implement this right in all digital
    contracting flows, with easy-to-use cancellation mechanisms.
implementation_guidance:
  platform_engineering:
    prose: |
      **E-commerce compliance integration:**
      1. Pre-contracting information disclosure screen compliant with Decreto 7.962,
         art. 2: entity identification, pricing breakdown, product characteristics,
         restrictions, and delivery conditions.
      2. Contract summary step before final acceptance (Decreto 7.962, art. 4):
         clear summary of all contract terms with error correction capability.
      3. Confirmation mechanism: immediate electronic confirmation of contract
         acceptance with unique transaction identifier.

      **Right of withdrawal implementation:**
      4. 7-day cooling-off period tracking from the contracting date for each
         digital insurance contract.
      5. One-click withdrawal mechanism accessible through the contracting channel.
      6. Automated processing of withdrawal requests: immediate contract cancellation,
         premium refund initiation, and confirmation to the client.
      7. Withdrawal tracking dashboard for compliance monitoring.

      **Customer service infrastructure:**
      8. Multi-channel customer service platform accessible from within the
         digital contracting channel.
      9. Complaint registration with protocol generation (aligned with Art. 3, III).
      10. Dispute resolution workflow with SLA tracking and escalation.
    tools:
      - client-portal
      - payment-processing
      - workflow-engine
      - customer-service-platform
      - notification-service
  devsecops:
    prose: |
      **E-commerce compliance validation:**
      1. Automated tests verifying that all digital contracting flows include
         the mandatory information disclosure screen (entity ID, pricing, terms).
      2. Contract summary validation: test that summary step is present and
         includes all required information before final acceptance.
      3. Right of withdrawal tests: verify that cancellation is possible within
         7 days through the same channel used for contracting.
      4. Refund processing tests: validate that premium refunds are initiated
         correctly upon withdrawal.

      **Usability and accessibility:**
      5. Accessibility testing (WCAG 2.1) for information disclosure and
         withdrawal mechanisms.
      6. Mobile responsiveness testing for all e-commerce compliance screens.
      7. Localization testing: ensure all mandatory information is displayed
         in Portuguese (pt-BR).
    tools:
      - gitlab-ci
      - selenium
      - accessibility-scanner
      - lighthouse
      - postman
  secops:
    prose: |
      **Consumer protection monitoring:**
      1. Track right of withdrawal exercise rates per product and channel —
         unusually low rates may indicate that the mechanism is not accessible.
      2. Monitor withdrawal processing times — must be immediate per the decree.
      3. Track refund processing times and success rates.
      4. Client complaint analysis for e-commerce-related issues (lack of
         information, inability to withdraw, refund delays).

      **Compliance reporting:**
      5. Monthly report on withdrawal volumes, processing times, and refund rates.
      6. Quarterly review of information disclosure completeness across
         digital channels.
      7. Annual Decreto 7.962 compliance assessment for all digital
         insurance products.
      8. PROCON and Consumidor.gov.br complaint monitoring for digital
         insurance operations.
    tools:
      - grc-platform
      - monitoring-alerting
      - analytics-platform
      - complaint-management
legal_references:
