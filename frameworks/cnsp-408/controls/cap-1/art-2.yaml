id: art-2
family: cap-1
title: "Definitions — Client, Contractual Documents, Supervised Entity, Intermediary, Remote Means"
class: CNSP-408
baselines: [seguradoras-digitais]
statement:
  prose: |
    Art. 2º. Para fins desta Resolução, define-se:

    I — cliente: o proponente, o segurado, o garantido, o tomador, o beneficiário,
    o assistido, o titular ou subscritor de título de capitalização ou o participante
    de plano de previdência complementar aberta;

    II — documentos contratuais: apólices, bilhetes e certificados individuais de
    seguro, títulos de capitalização, certificados de participante, contratos
    coletivos e endossos;

    III — ente supervisionado: a sociedade seguradora, a sociedade de capitalização
    ou a entidade aberta de previdência complementar;

    IV — intermediário: o responsável pela angariação, promoção, intermediação ou
    distribuição de produtos de seguros, de capitalização e/ou de previdência
    complementar aberta, tais como o corretor de seguros, o representante de seguros,
    o correspondente de microsseguros, o distribuidor de título de capitalização,
    entre outros executores das atividades enumeradas neste inciso; e

    V — meios remotos: aqueles que permitam a troca de e/ou o acesso a informações
    e/ou todo tipo de transferência de dados por meio de redes de comunicação
    envolvendo o uso de tecnologias tais como rede mundial de computadores,
    telefonia, televisão a cabo ou digital, sistemas de comunicação por satélite,
    entre outras.
guidance:
  prose: |
    Article 2 establishes five key definitions that form the interpretive foundation
    for the entire resolution.

    **I — Client (cliente):**
    Broad definition encompassing every possible role a natural or legal person may
    assume in an insurance, pension, or capitalization relationship. This includes:
    - Proponente: the person proposing the contract
    - Segurado: the insured party
    - Garantido: the guaranteed party (surety bonds)
    - Tomador: the policyholder (distinct from insured in some products)
    - Beneficiário: the beneficiary of the policy
    - Assistido: the person receiving pension benefits
    - Titular/Subscritor: the capitalization product holder
    - Participante: the pension plan participant

    **II — Contractual documents (documentos contratuais):**
    Exhaustive list of the formal instruments that evidence the contractual relationship.
    Each document type has specific regulatory requirements for content, format, and delivery.

    **III — Supervised entity (ente supervisionado):**
    Three categories of SUSEP-supervised entities. Notably excludes reinsurers (addressed
    separately in Art. 11) and brokers/intermediaries (addressed in inciso IV).

    **IV — Intermediary (intermediário):**
    Covers the entire distribution chain: brokers, representatives, microsseguro
    correspondents, and capitalization distributors. The resolution applies to
    intermediaries when they use remote means on behalf of supervised entities.

    **V — Remote means (meios remotos):**
    Technology-neutral definition — any communication network technology. This
    future-proofs the regulation against specific technology obsolescence. Includes
    internet, phone, cable/digital TV, satellite, and any emerging technology.
implementation_guidance:
  platform_engineering:
    prose: |
      **Data model alignment with regulatory definitions:**
      1. Ensure the platform data model supports all client roles defined in inciso I
         (proponente, segurado, garantido, tomador, beneficiário, assistido, titular,
         subscritor, participante) as distinct but potentially overlapping entities.
      2. Implement a document type registry aligned with inciso II, ensuring each
         contractual document type has metadata for regulatory classification
         (apólice, bilhete, certificado, título, contrato coletivo, endosso).
      3. Entity type taxonomy supporting the three supervised entity categories
         (seguradora, capitalização, previdência aberta) with appropriate
         regulatory requirement mappings.
      4. Channel registry supporting the technology-neutral definition of remote means
         with extensibility for future technologies.

      **Identity and role management:**
      5. Multi-role identity model where a single person can hold multiple client
         roles simultaneously (e.g., segurado + beneficiário).
      6. Intermediary management system tracking all distribution chain participants
         and their authorized operations per channel.
      7. Role-based access control (RBAC) aligned with the regulatory definitions.
    tools:
      - identity-management
      - master-data-management
      - api-gateway
      - rbac-engine
  devsecops:
    prose: |
      **Schema validation and data integrity:**
      1. Validate that all digital insurance applications correctly implement the
         client role taxonomy from inciso I in their data schemas.
      2. Automated tests verifying that contractual document types (inciso II) are
         correctly classified and handled in all digital channels.
      3. Pipeline checks ensuring intermediary authorization is validated before
         any remote operation is processed.
      4. Integration tests covering all supported remote means technologies.

      **Documentation and traceability:**
      5. API contracts documenting how each definition maps to system entities.
      6. Data dictionary aligned with CNSP 408 definitions, versioned in Git.
      7. Automated compliance checks validating that new features correctly
         implement the regulatory definitions.
    tools:
      - gitlab-ci
      - json-schema
      - openapi-spec
      - sonarqube
  secops:
    prose: |
      **Definition compliance monitoring:**
      1. Periodic review of system data models against CNSP 408 definitions to
         detect drift or misalignment.
      2. Audit of intermediary registry to ensure all active intermediaries are
         properly classified per inciso IV.
      3. Channel inventory review to confirm all remote means in use are properly
         registered and monitored.
      4. Client role mapping audit ensuring no regulatory role is missing from
         the platform data model.

      **Training and awareness:**
      5. Training materials for operations teams explaining the regulatory
         definitions and their practical implications.
      6. Glossary of terms aligned with CNSP 408 for consistent use across
         the organization.
      7. Incident classification aligned with regulatory definitions (e.g.,
         incidents affecting "clientes" vs. "intermediários").
    tools:
      - grc-platform
      - training-platform
      - cmdb
      - document-management
