id: art-1
family: cap-1
title: "Scope of the Resolution — Remote Means in Insurance Operations"
class: CNSP-408
baselines: [seguradoras-digitais]
statement:
  prose: |
    Art. 1º. Dispor sobre a utilização de meios remotos nas operações de seguro,
    previdência complementar aberta e capitalização.
guidance:
  prose: |
    Article 1 defines the scope of the resolution: the use of remote means (digital channels)
    in insurance, open complementary pension, and capitalization operations.

    **Scope coverage:**
    The resolution applies to three distinct market segments supervised by SUSEP:
    1. Insurance operations (vida, não-vida, saúde suplementar)
    2. Open complementary pension plans (PGBL, VGBL, traditional plans)
    3. Capitalization products (títulos de capitalização)

    **What constitutes "remote means":**
    As defined in Art. 2, V, remote means include any technology enabling information
    exchange or data transfer via communication networks — internet, telephony, cable
    or digital television, satellite systems, and similar technologies.

    **Regulatory context:**
    This resolution replaced CNSP 294/2013 and CNSP 359/2017, modernizing the framework
    for digital insurance distribution. It was published alongside other digital
    transformation regulations for the insurance sector (CNSP 407, CNSP 409) as part
    of SUSEP's regulatory sandbox and innovation agenda.

    **Practical implication:**
    Every supervised entity that uses any form of digital channel for insurance
    operations — from a simple email to a full-featured mobile app — must comply
    with this resolution.
implementation_guidance:
  platform_engineering:
    prose: |
      **Digital channel inventory and classification:**
      1. Catalog all remote means used across insurance, pension, and capitalization
         operations (web portals, mobile apps, APIs, email, telephony, chatbots, etc.).
      2. Classify each channel by operation type (distribution, contracting,
         servicing, claims, cancellation) and product line.
      3. Map the regulatory requirements of CNSP 408 to each channel, identifying
         gaps in compliance coverage.
      4. Implement a centralized channel registry with metadata (technology stack,
         data flows, integrations, responsible teams).

      **Platform architecture for compliance:**
      5. Design a unified digital platform layer that enforces CNSP 408 requirements
         across all channels (integrity, authenticity, non-repudiation, confidentiality).
      6. Implement shared services for document management, electronic signatures,
         protocol generation, and audit logging.
      7. API gateway with policy enforcement for all digital channel integrations.
      8. Monitoring dashboard tracking compliance metrics per channel and product line.
    tools:
      - api-gateway
      - service-mesh
      - document-management
      - monitoring-alerting
  devsecops:
    prose: |
      **Compliance-as-Code for CNSP 408:**
      1. Encode CNSP 408 requirements as executable policies (OPA/Rego) that can be
         validated in CI/CD pipelines for digital insurance applications.
      2. Create compliance check templates for each article of the resolution.
      3. Integrate document integrity verification (hashing, signing) into the
         build and deployment pipeline.
      4. Automated regression tests validating that digital channels meet all
         CNSP 408 requirements after each deployment.

      **Channel-specific security gates:**
      5. Per-channel security profiles enforced at deploy time (web, mobile, API,
         telephony each have specific CNSP 408 requirements).
      6. Mandatory code review for changes to digital contracting flows.
      7. Feature flags for gradual rollout of new digital channel features with
         compliance validation at each stage.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - sonarqube
      - selenium
      - postman
  secops:
    prose: |
      **Regulatory compliance management:**
      1. Maintain a compliance matrix mapping each article of CNSP 408 to
         implemented controls, responsible teams, and evidence.
      2. Periodic assessment (quarterly) of all digital channels against
         CNSP 408 requirements.
      3. Gap analysis with prioritized remediation plan.
      4. Incident response procedures specific to digital channel failures
         (unavailability, data breach, integrity violation).

      **Audit and reporting:**
      5. Annual compliance report for SUSEP covering all digital channel operations.
      6. Evidence retention for minimum 5 years (contracts, protocols, logs).
      7. Training program for operations teams on CNSP 408 requirements.
      8. Vendor compliance assessment for third-party digital channel providers.
    tools:
      - grc-platform
      - compliance-scanner
      - siem
      - document-management
