id: art-8b
family: cap-2
title: "Right to Terminate Contract via Same Remote Means Used for Contracting"
class: CNSP-408
baselines: [seguradoras-digitais]
statement:
  prose: |
    Art. 8º.

    § 1º. Quando a contratação for realizada por meios remotos, o ente supervisionado
    ou o intermediário, conforme o caso, deverá garantir que as solicitações e
    procedimentos necessários ao encerramento da relação contratual possam ser
    efetuados pelo mesmo meio utilizado na contratação, sem prejuízo da
    disponibilização de outros meios.

    § 2º. Para os fins do disposto no § 1º deste artigo, na impossibilidade de uso
    do mesmo meio utilizado na contratação, seja por sua falta ou descontinuidade,
    deverá ser disponibilizado meio remoto equivalente ao da contratação, considerando
    aspectos de custo, tempo e facilidade para o cliente.

    § 3º. Quando houver exigência legal ou infralegal de anuência expressa e/ou
    assinatura do cliente, a efetivação dos procedimentos e solicitações de que
    trata o caput deverá observar os critérios de formalização de que trata o art. 5º.
guidance:
  prose: |
    Article 8, paragraphs 1-3, establish critical consumer protection rules for
    contract termination through remote means.

    **Same-channel termination right (§ 1):**
    This is the most important consumer protection provision in the resolution.
    If a client contracted through a specific remote means, they MUST be able to
    terminate the contract through the same means. This prevents the common
    practice of making it easy to buy but difficult to cancel.

    The obligation is on the supervised entity or intermediary to "guarantee"
    (deverá garantir) that termination is possible through the contracting channel.
    This is a mandatory requirement, not discretionary.

    "Without prejudice to other means": additional cancellation channels may be
    offered, but the original contracting channel must always be available.

    **Equivalent channel fallback (§ 2):**
    If the original contracting channel is unavailable (discontinued, technically
    impossible), an equivalent remote means must be provided. The equivalence is
    measured by three factors:
    1. Cost to the client (must not be more expensive)
    2. Time required (must not take longer)
    3. Ease of use (must not be more difficult)

    Example: if a client contracted through a mobile app that was discontinued,
    the web portal may be an equivalent means if it offers similar cost, time,
    and ease of use.

    **Formalization requirements for consent-dependent operations (§ 3):**
    When a legal or regulatory requirement demands express consent or signature
    from the client (e.g., pension plan portability, certain endorsements), the
    formalization must meet Art. 5 requirements (authenticated, provable authorship
    and integrity). This prevents supervised entities from processing consent-critical
    operations with inadequate authentication.
implementation_guidance:
  platform_engineering:
    prose: |
      **Channel-symmetric termination architecture:**
      1. For every contracting channel, implement a corresponding termination flow
         that is accessible through the same channel.
      2. Channel capability matrix: document which operations (including termination)
         are available per channel and ensure parity.
      3. Termination flow must be as simple as (or simpler than) the contracting flow —
         no additional barriers, steps, or requirements not present at contracting.
      4. Channel deprecation policy: when a channel is being discontinued, implement
         migration to equivalent channel with proactive client notification (§ 2).

      **Equivalence assessment framework:**
      5. Define and measure channel equivalence metrics: cost (zero for digital),
         time (number of steps, elapsed time), ease (usability score).
      6. When a channel is discontinued, automatically redirect to the most
         equivalent available channel.
      7. Client notification system for channel changes affecting their termination rights.

      **Consent management for § 3 operations:**
      8. Classify operations by consent requirement level (simple confirmation vs.
         qualified authentication per Art. 5).
      9. Dynamic authentication step-up for operations requiring formal consent.
      10. Audit trail capturing the complete consent evidence chain.
    tools:
      - client-portal
      - workflow-engine
      - identity-management
      - digital-signature-platform
      - notification-service
  devsecops:
    prose: |
      **Channel symmetry validation:**
      1. Automated tests verifying that every contracting channel has a corresponding
         termination flow.
      2. Parity testing: termination flow step count and completion time must not
         exceed contracting flow metrics.
      3. Regression tests: when a contracting flow is updated, verify that the
         termination flow remains functional.
      4. Channel deprecation tests: verify that redirect to equivalent channel
         works correctly.

      **Consent flow validation:**
      5. Tests verifying that operations classified as requiring consent per § 3
         enforce Art. 5 authentication requirements.
      6. Negative tests: verify that consent-critical operations fail without
         proper authentication.
      7. End-to-end termination tests across all channels (web, mobile, API,
         telephony, chatbot).
    tools:
      - gitlab-ci
      - selenium
      - postman
      - accessibility-scanner
      - load-testing
  secops:
    prose: |
      **Consumer protection monitoring:**
      1. Track termination success rates per channel — alert on failures or
         degradation that could indicate non-compliance with § 1.
      2. Compare termination difficulty metrics (steps, time, abandonment rate)
         against contracting metrics — termination must not be harder.
      3. Monitor client complaints related to cancellation difficulties.
      4. Track channel deprecation events and verify equivalent channel
         availability (§ 2).

      **Compliance and reporting:**
      5. Quarterly compliance assessment of channel symmetry (contracting vs.
         termination capability per channel).
      6. SUSEP reporting: document compliance with §§ 1-2 for all digital channels.
      7. Client satisfaction surveys for termination processes.
      8. Dispute resolution support with complete audit trail of termination
         attempts and outcomes.
    tools:
      - monitoring-alerting
      - grc-platform
      - analytics-platform
      - complaint-management
