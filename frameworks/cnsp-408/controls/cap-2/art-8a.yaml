id: art-8a
family: cap-2
title: "Additional Procedures and Requests via Remote Means"
class: CNSP-408
baselines: [seguradoras-digitais]
statement:
  prose: |
    Art. 8º. Poderão ser efetivados com o uso de meios remotos, a critério do ente
    supervisionado ou, quando for o caso, do intermediário, outros procedimentos e
    solicitações relativos ao produto contratado, além dos previstos neste Capítulo.
guidance:
  prose: |
    Article 8 (caput) is an enabling provision that extends the authorization for
    remote means beyond the specific operations addressed in Articles 4-7. It allows
    supervised entities to process any other product-related procedure or request
    through digital channels.

    **Permissive nature:**
    The expression "poderão ser efetivados" (may be carried out) indicates this is
    an authorization, not an obligation. The supervised entity or intermediary has
    discretion ("a critério") to decide which additional procedures will be available
    through remote means.

    **Scope — "other procedures and requests":**
    This covers the entire contract lifecycle beyond issuance and contracting:
    - Claims filing and processing
    - Endorsements (alterations to the contract)
    - Beneficiary changes
    - Address and contact updates
    - Premium payment arrangements
    - Policy renewals
    - Benefit requests (pension plans)
    - Partial or total redemption (capitalization)
    - General information requests
    - Complaint registration

    **Relationship with other articles:**
    The caput establishes the general authorization. The paragraphs (§§ 1, 2, 3)
    establish specific obligations that constrain this discretion, particularly
    regarding contract termination (covered in art-8b).
implementation_guidance:
  platform_engineering:
    prose: |
      **Full-lifecycle digital servicing platform:**
      1. Self-service portal enabling clients to perform all post-sale operations
         digitally: claims, endorsements, beneficiary changes, redemptions, etc.
      2. Workflow engine supporting configurable processes for each operation type,
         with approval chains when required.
      3. Multi-channel operation support: same operations available via web portal,
         mobile app, API, chatbot, and telephony with consistent experience.
      4. Operation catalog: registry of all available remote operations with their
         requirements, SLAs, and channel availability.

      **Integration layer:**
      5. Real-time integration with core insurance systems (policy admin, claims,
         billing, reinsurance) for immediate operation processing.
      6. Document generation for operation outputs (endorsements, claim acknowledgments,
         redemption confirmations).
      7. Notification service for operation status updates across channels.
      8. Analytics platform tracking operation volumes, completion rates, and
         client satisfaction per channel.
    tools:
      - workflow-engine
      - client-portal
      - api-gateway
      - notification-service
      - analytics-platform
  devsecops:
    prose: |
      **Operation flow validation:**
      1. End-to-end tests for each supported remote operation type (claims,
         endorsements, beneficiary changes, etc.).
      2. Authorization testing: verify that operations requiring specific
         permissions are properly access-controlled.
      3. Data validation tests for each operation input (preventing invalid
         endorsements, incorrect beneficiary data, etc.).
      4. Multi-channel consistency tests: same operation produces identical
         results regardless of the channel used.

      **Security and compliance:**
      5. SAST and DAST scanning of all operation endpoints.
      6. Penetration testing of high-risk operations (claims, redemptions, cancellations).
      7. Pipeline gate: new operation types must be classified for CNSP 408
         compliance before deployment.
    tools:
      - gitlab-ci
      - selenium
      - postman
      - burp-suite
      - sast-scanner
      - dast-scanner
  secops:
    prose: |
      **Operation monitoring:**
      1. Real-time monitoring of all remote operations for anomalies (unusual
         volumes, suspicious patterns, fraud indicators).
      2. SLA monitoring for operation processing times per type and channel.
      3. Fraud detection for high-risk operations (claims, redemptions):
         velocity checks, amount thresholds, behavioral analysis.
      4. Client complaint tracking correlated with operation types and channels.

      **Compliance reporting:**
      5. Monthly report on remote operation volumes, success rates, and SLA
         compliance per operation type and channel.
      6. Incident response procedures for operation failures (failed claims,
         stuck endorsements, processing errors).
      7. Annual review of the operation catalog: ensure all available operations
         meet CNSP 408 requirements.
      8. Audit trail retention for all remote operations (minimum 5 years).
    tools:
      - monitoring-alerting
      - fraud-detection
      - grc-platform
      - siem
