id: art-6
family: cap-2
title: "Insurance by Certificate and Capitalization Products via Remote Means"
class: CNSP-408
baselines: [seguradoras-digitais]
statement:
  prose: |
    Art. 6º. A contratação de seguros por emissão de bilhete e a contratação de
    títulos de capitalização poderão ser realizadas com a utilização de meios remotos.
guidance:
  prose: |
    Article 6 authorizes the use of remote means for two specific product types:
    insurance by "bilhete" (certificate/ticket) and capitalization products.

    **Insurance by bilhete:**
    "Bilhete de seguro" is a simplified contractual instrument used for mass-market
    insurance products. Unlike a traditional "apólice" (policy), the bilhete does not
    require a prior proposal. The contract is formed directly by issuance of the bilhete.
    Common products distributed by bilhete:
    - Travel insurance
    - Extended warranty
    - Residential insurance (simplified)
    - Micro-insurance
    - Event insurance
    - Equipment protection insurance

    **Capitalization products:**
    "Títulos de capitalização" are savings/lottery hybrid products regulated by SUSEP.
    They involve periodic payments, guaranteed minimum return, and lottery draws.

    **Simplified requirements vs. Art. 5:**
    Article 6 does NOT impose the same authentication, authorship, and integrity
    requirements as Article 5. The use of remote means for bilhete and capitalization
    is simply "authorized" ("poderão ser realizadas"), without the additional
    qualifiers of Art. 5 ("autenticada e passível de comprovação da autoria e
    integridade"). This reflects the lower-risk, mass-market nature of these products.

    However, the general requirements of Art. 3 (integrity, authenticity,
    non-repudiation, confidentiality) still apply to these operations.
implementation_guidance:
  platform_engineering:
    prose: |
      **Mass-market digital distribution platform:**
      1. High-throughput bilhete issuance engine capable of processing thousands
         of contracts per minute through digital channels.
      2. API-first architecture enabling integration with distribution partners
         (e-commerce platforms, airlines, retailers, banks) for embedded insurance.
      3. Real-time bilhete generation with unique identification, timestamp, and
         immediate availability for download (per Art. 4, § 1 and § 2).
      4. Capitalization product subscription platform with payment processing
         integration.

      **Embedded insurance infrastructure:**
      5. SDK and white-label widgets for partner integration (web, mobile, POS).
      6. Webhook-based notification system for distribution partners.
      7. Sandbox environment for partner onboarding and testing.
      8. Rate limiting and fraud prevention for high-volume distribution channels.
    tools:
      - api-gateway
      - event-driven-architecture
      - payment-processing
      - sdk-distribution
      - rate-limiter
  devsecops:
    prose: |
      **High-volume distribution validation:**
      1. Load testing for bilhete issuance under peak conditions (Black Friday,
         travel season, promotional campaigns).
      2. Integration tests with distribution partner APIs ensuring correct
         bilhete generation and delivery.
      3. Automated validation of bilhete format and content (required fields,
         timestamp, unique identifier).
      4. Security testing of partner integration endpoints (API key management,
         rate limiting, input validation).

      **Compliance automation:**
      5. Automated checks ensuring Art. 3 requirements (integrity, authenticity,
         non-repudiation, confidentiality) are met for bilhete and capitalization flows.
      6. Contract template validation in the pipeline — bilhete templates must
         comply with SUSEP product requirements.
      7. End-to-end tests for the complete bilhete lifecycle (issuance, delivery,
         consultation, cancellation).
    tools:
      - gitlab-ci
      - k6-load-testing
      - postman
      - burp-suite
      - contract-testing
  secops:
    prose: |
      **Distribution monitoring:**
      1. Real-time monitoring of bilhete issuance volumes per channel and partner —
         detect anomalies indicating fraud or system errors.
      2. Fraud detection for mass-market products: velocity checks, duplicate
         detection, suspicious patterns.
      3. Partner compliance monitoring: ensure distribution partners are operating
         within authorized parameters.
      4. Capitalization product monitoring: track subscription patterns and
         detect potential money laundering indicators (SUSEP 612 compliance).

      **Operational controls:**
      5. Daily reconciliation of bilhetes issued vs. premiums collected.
      6. Monitoring of client complaint rates per distribution channel.
      7. Periodic review of partner integration security (API keys, certificates,
         access controls).
      8. Annual assessment of mass-market digital distribution compliance.
    tools:
      - monitoring-alerting
      - fraud-detection
      - grc-platform
      - reconciliation-engine
