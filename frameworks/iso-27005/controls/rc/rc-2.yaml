id: rc.2
family: rc
title: "Risk consultation"
class: ISO27005

statement:
  prose: >-
    The organization shall establish processes for consultation with internal
    and external stakeholders on information security risk management. Risk
    consultation shall ensure that the views and concerns of stakeholders are
    identified and taken into account in the risk management process. The
    organization shall consult with relevant stakeholders during context
    establishment, risk assessment, risk treatment, and risk acceptance.
    Consultation shall include relevant expertise from information security,
    business operations, legal, compliance, and other domains.

guidance:
  prose: >-
    Risk consultation ensures that risk management decisions are informed by
    diverse perspectives and domain expertise. Internal consultation should
    involve business process owners who understand operational impacts,
    technical experts who can assess feasibility, legal and compliance teams
    who can identify regulatory implications, and human resources for
    personnel-related risks. External consultation may involve regulators,
    industry peers, security consultants, and customers. The consultation
    process should be documented, with stakeholder inputs explicitly
    considered in risk decisions. A risk committee or working group can
    provide a structured forum for ongoing consultation.

references:
  - citation: "ISO/IEC 27005:2022, Clause 10.2"
    url: "https://www.iso.org/standard/80585.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Establish architecture review boards that include security
      representation for infrastructure risk consultation. Use request-for-comment
      (RFC) processes for significant platform changes that involve risk
      trade-offs. Create shared channels where platform teams can consult
      with security on risk-related decisions. Document risk consultation
      outcomes in architecture decision records (ADRs).
    tools:
      - backstage
      - confluence
      - slack
      - jira
      - github-discussions
  devsecops:
    prose: >-
      Include security representatives in sprint planning and design reviews
      for risk consultation. Use threat modeling sessions as structured
      consultation forums. Establish security champion programs where
      developers serve as risk consultation liaisons within their teams.
      Document consultation outcomes in issue trackers and link to related
      code changes.
    tools:
      - threatspec
      - owasp-threat-dragon
      - jira
      - gitlab-ci
      - slack
  secops:
    prose: >-
      Establish a risk committee that meets regularly to consult on risk
      management decisions. Maintain a consultation register that records
      stakeholder inputs and how they influenced decisions. Participate in
      industry information sharing organizations for external risk
      consultation. Use tabletop exercises as consultation forums for
      incident-related risks.
    tools:
      - servicenow-grc
      - archer-grc
      - confluence
      - teams
      - slack

legal_references:
  - framework_id: iso-27001-2022
    articles: ["a5.2", "a5.4"]
    relationship: supports
  - framework_id: iso-31000
    articles: ["clause-5.2"]
    relationship: derived-from
