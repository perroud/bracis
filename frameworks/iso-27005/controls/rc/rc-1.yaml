id: rc.1
family: rc
title: "Risk communication"
class: ISO27005

statement:
  prose: >-
    The organization shall ensure that information about information security
    risks is communicated to relevant stakeholders in a timely and effective
    manner. Risk communication shall provide stakeholders with an understanding
    of the risk assessment results, the basis for risk treatment decisions,
    and the status of the risk treatment plan. Risk communication shall be
    tailored to the audience — technical details for operational teams,
    business impact summaries for management, and regulatory compliance
    status for governance bodies. Communication channels shall be defined
    and maintained.

guidance:
  prose: >-
    Effective risk communication bridges the gap between technical risk
    analysis and management decision-making. Communication should be regular,
    structured, and audience-appropriate. Operational teams need actionable
    technical details; management needs aggregated risk posture views with
    business impact context; boards need strategic risk summaries tied to
    organizational objectives. Communication should be bidirectional —
    stakeholders should provide input on risk appetite and priorities.
    Emergency risk communication procedures should be defined for critical
    risks requiring immediate attention. Regular risk reporting cadences
    should be established (e.g., weekly operational, monthly management,
    quarterly board).

references:
  - citation: "ISO/IEC 27005:2022, Clause 10.1"
    url: "https://www.iso.org/standard/80585.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build automated risk dashboards that provide real-time visibility into
      platform risk posture. Implement automated alerting for risk threshold
      breaches. Create role-specific dashboard views — infrastructure teams
      see technical risk details, management sees aggregate risk scores.
      Use status pages and incident communication tools to communicate risk
      events to stakeholders.
    tools:
      - grafana
      - backstage
      - opsgenie
      - pagerduty
      - statuspage
  devsecops:
    prose: >-
      Generate automated security reports from CI/CD pipeline results and
      vulnerability scanners. Publish security metrics dashboards accessible
      to development teams. Include risk information in merge request
      comments so developers see the security impact of their changes.
      Send periodic security posture summaries to team leads.
    tools:
      - defectdojo
      - gitlab-ci
      - sonarqube
      - grafana
      - slack
  secops:
    prose: >-
      Produce regular risk reports for management using GRC platform reporting
      capabilities. Configure SIEM dashboards for operational risk visibility.
      Establish risk communication templates for different audiences.
      Conduct periodic risk briefings for executive leadership. Maintain
      risk communication logs to ensure audit traceability.
    tools:
      - servicenow-grc
      - archer-grc
      - splunk
      - elastic-siem
      - powerbi

