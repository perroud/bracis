id: ra.1
family: ra
title: "Risk identification — identifying assets"
class: ISO27005

statement:
  prose: >-
    The organization shall identify the information assets within the scope of
    the information security risk management process. Asset identification shall
    include primary assets (business processes and information) and supporting
    assets (hardware, software, network, personnel, site, and organization
    structure). Each asset shall have an identified owner who is accountable
    for the asset's security.

guidance:
  prose: >-
    Asset identification is the first step of risk identification. Organizations
    should create and maintain a comprehensive asset inventory that covers both
    tangible assets (servers, network equipment, endpoints) and intangible assets
    (data, intellectual property, reputation). Assets should be classified by
    value, sensitivity, and criticality to business operations. The inventory
    should capture asset dependencies, locations, and ownership. Automated
    discovery tools should supplement manual inventories to ensure completeness.
    The asset inventory directly feeds into threat and vulnerability
    identification.

references:
  - citation: "ISO/IEC 27005:2022, Clause 8.2.2"
    url: "https://www.iso.org/standard/80585.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated asset discovery and inventory using infrastructure-as-code
      state files, cloud provider APIs, and service catalogs. Tag all infrastructure
      resources with ownership, classification, and criticality metadata. Use
      a CMDB or service catalog as the central asset register. Enforce tagging
      policies that prevent resource creation without required classification
      tags.
    tools:
      - backstage
      - aws-config
      - azure-resource-graph
      - terraform
      - servicenow-cmdb
  devsecops:
    prose: >-
      Generate software bill of materials (SBOM) for all applications to
      identify software assets and their dependencies. Use container image
      registries with metadata to track containerized assets. Integrate
      asset information into CI/CD pipelines so that every deployment updates
      the asset inventory. Maintain data flow diagrams that identify information
      assets processed by each application.
    tools:
      - syft
      - cyclonedx
      - trivy
      - gitlab-container-registry
      - grype
  secops:
    prose: >-
      Run periodic network discovery scans to identify assets not captured by
      other methods. Correlate asset inventory data with vulnerability scan
      results and SIEM logs to identify shadow IT. Monitor for unauthorized
      devices and services. Maintain an asset classification schema that feeds
      into risk scoring and incident prioritization.
    tools:
      - tenable-io
      - qualys
      - nmap
      - rumble
      - splunk

legal_references:
