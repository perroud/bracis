id: ra.3
family: ra
title: "Risk identification — identifying vulnerabilities"
class: ISO27005

statement:
  prose: >-
    The organization shall identify vulnerabilities that can be exploited by
    threats to cause harm to information assets. Vulnerabilities shall be
    identified in all areas including organizational processes, personnel,
    physical environment, information system configurations, hardware,
    software, and communication links. Vulnerability identification shall
    use technical vulnerability scanning, penetration testing, code reviews,
    audit reports, vendor advisories, and vulnerability databases.

guidance:
  prose: >-
    Vulnerability identification should be comprehensive, covering technical,
    procedural, and human vulnerabilities. Technical vulnerabilities include
    unpatched software, misconfigured systems, weak authentication mechanisms,
    and insecure coding practices. Process vulnerabilities include inadequate
    change management, lack of separation of duties, and insufficient logging.
    Human vulnerabilities include susceptibility to social engineering, lack of
    security awareness, and insufficient training. Organizations should use
    automated scanning tools supplemented by manual assessment techniques.
    Vulnerabilities should be mapped to threats to understand potential
    exploitation scenarios.

references:
  - citation: "ISO/IEC 27005:2022, Clause 8.2.4"
    url: "https://www.iso.org/standard/80585.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement continuous vulnerability scanning of infrastructure components.
      Use infrastructure-as-code scanning to detect misconfigurations before
      deployment. Enable cloud security posture management (CSPM) to identify
      vulnerabilities in cloud configurations. Scan container images in
      registries before allowing deployment. Maintain a vulnerability database
      that tracks all identified vulnerabilities and their remediation status.
    tools:
      - tenable-io
      - trivy
      - checkov
      - tfsec
      - aws-security-hub
  devsecops:
    prose: >-
      Integrate static application security testing (SAST), dynamic application
      security testing (DAST), and software composition analysis (SCA) into
      CI/CD pipelines. Perform regular code reviews with a security focus.
      Use interactive application security testing (IAST) in staging
      environments. Track vulnerabilities in a centralized platform that
      provides developer-friendly remediation guidance.
    tools:
      - gitlab-sast
      - gitlab-dast
      - semgrep
      - snyk
      - defectdojo
  secops:
    prose: >-
      Run scheduled and event-triggered vulnerability scans across all
      in-scope assets. Correlate vulnerability data with threat intelligence
      to prioritize exploitable vulnerabilities. Track vulnerability
      remediation timelines and escalate overdue items. Commission periodic
      penetration tests to validate vulnerability findings and discover
      weaknesses not found by automated tools.
    tools:
      - tenable-io
      - qualys
      - rapid7-insightvm
      - nessus
      - burpsuite

