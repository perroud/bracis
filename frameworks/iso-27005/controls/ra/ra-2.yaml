id: ra.2
family: ra
title: "Risk identification — identifying threats"
class: ISO27005

statement:
  prose: >-
    The organization shall identify threats to the information assets within
    the scope of the risk assessment. Threat identification shall consider
    both deliberate and accidental threats, as well as threats from natural
    events. Threat sources shall be identified, including malicious insiders,
    external attackers, competitors, environmental hazards, and system failures.
    Threat catalogs and threat intelligence shall be used to ensure comprehensive
    identification. The organization shall maintain an up-to-date list of
    applicable threats.

guidance:
  prose: >-
    Threat identification should be systematic and draw on multiple sources:
    historical incident data, industry threat reports, threat intelligence feeds,
    and expert judgment. Organizations should use established threat taxonomies
    such as STRIDE, MITRE ATT&CK, or the ENISA threat landscape. Threats
    should be mapped to the assets they could affect and the potential impact
    they could cause. The threat landscape should be reviewed regularly as new
    threats emerge. Threat identification should consider the full range of
    threat actors, their motivations, capabilities, and likely attack vectors.

references:
  - citation: "ISO/IEC 27005:2022, Clause 8.2.3"
    url: "https://www.iso.org/standard/80585.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate threat intelligence feeds into platform monitoring and alerting
      systems. Use cloud-native threat detection services to identify threats
      targeting infrastructure. Implement network intrusion detection systems
      at platform boundaries. Maintain infrastructure threat models that map
      threats to each layer of the platform stack.
    tools:
      - aws-guardduty
      - azure-defender
      - falco
      - mitre-attack-navigator
      - tenable-io
  devsecops:
    prose: >-
      Integrate threat modeling into the software development lifecycle using
      structured methodologies (STRIDE, PASTA, LINDDUN). Perform threat
      modeling during design reviews for new features and significant changes.
      Use SAST and DAST tools to detect vulnerability patterns that correspond
      to known threat vectors. Subscribe to vulnerability advisories for all
      third-party dependencies.
    tools:
      - threatspec
      - owasp-threat-dragon
      - semgrep
      - gitlab-sast
      - snyk
  secops:
    prose: >-
      Maintain subscriptions to threat intelligence platforms and feeds.
      Correlate threat intelligence with internal log data to detect active
      threats. Map MITRE ATT&CK techniques to detection rules in the SIEM.
      Produce periodic threat landscape reports that inform the risk assessment
      process. Participate in industry information sharing organizations
      (ISACs/ISAOs).
    tools:
      - misp
      - opencti
      - mitre-attack-navigator
      - splunk
      - elastic-siem

legal_references:
