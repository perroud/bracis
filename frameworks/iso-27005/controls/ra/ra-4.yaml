id: ra.4
family: ra
title: "Risk identification — identifying consequences"
class: ISO27005

statement:
  prose: >-
    The organization shall identify the consequences that loss of
    confidentiality, integrity, and availability of information assets
    would have on the organization. Consequence identification shall consider
    direct and indirect impacts including financial loss, operational
    disruption, reputational damage, legal and regulatory penalties, loss of
    competitive advantage, and harm to individuals. Consequences shall be
    assessed in relation to the organization's objectives and the value of
    the affected assets.

guidance:
  prose: >-
    Consequence identification translates technical security events into
    business impact terms. Organizations should develop impact scenarios that
    describe the chain of events from a security incident to business
    consequences. Impact categories should include financial (direct costs,
    recovery costs, lost revenue), operational (service disruption, productivity
    loss), legal (regulatory fines, litigation costs), reputational (customer
    trust, market position), and strategic (competitive disadvantage, missed
    opportunities). Each consequence should be linked to specific asset-threat
    pairs to build a complete risk picture. Business impact analysis (BIA)
    outputs should inform consequence assessment.

references:
  - citation: "ISO/IEC 27005:2022, Clause 8.2.5"
    url: "https://www.iso.org/standard/80585.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Classify infrastructure services by business criticality and define
      maximum tolerable downtime for each. Implement service-level indicators
      (SLIs) and service-level objectives (SLOs) that quantify the impact of
      service degradation. Map infrastructure dependencies to understand
      cascading failure consequences. Use chaos engineering to validate
      consequence assumptions.
    tools:
      - backstage
      - grafana
      - prometheus
      - litmus-chaos
      - pagerduty
  devsecops:
    prose: >-
      Tag applications and repositories with business impact classifications.
      Include consequence analysis in threat models — for each threat scenario,
      document what business processes would be affected and what the cost of
      compromise would be. Use data classification labels to identify which
      applications process high-consequence data. Integrate business impact
      metadata into vulnerability prioritization.
    tools:
      - threatspec
      - owasp-threat-dragon
      - jira
      - gitlab-ci
      - defectdojo
  secops:
    prose: >-
      Maintain business impact analysis documentation that maps information
      assets to business processes and quantifies disruption costs. Configure
      SIEM alerts to escalate based on the business impact of affected assets.
      Include consequence assessment in incident response playbooks. Track
      actual incident costs to calibrate consequence estimates over time.
    tools:
      - servicenow-grc
      - archer-grc
      - splunk
      - elastic-siem
      - pagerduty

legal_references:
