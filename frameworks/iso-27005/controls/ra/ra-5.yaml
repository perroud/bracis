id: ra.5
family: ra
title: "Risk analysis"
class: ISO27005

statement:
  prose: >-
    The organization shall analyze the identified risks by determining the
    likelihood of occurrence and the magnitude of consequences. Risk analysis
    shall assign values to the likelihood of threat scenarios and the
    consequences of their impact on information assets. Risk analysis can be
    qualitative, semi-quantitative, or quantitative, or a combination thereof.
    The methodology shall be consistent, reproducible, and produce comparable
    results. Existing controls and their effectiveness shall be taken into
    account when analyzing risk levels.

guidance:
  prose: >-
    Risk analysis combines likelihood and consequence to produce a risk level
    for each identified risk. Qualitative analysis uses descriptive scales
    (e.g., low/medium/high) and is suitable when quantitative data is
    unavailable. Quantitative analysis uses numerical values and statistical
    methods (e.g., annual loss expectancy, Monte Carlo simulation) for more
    precise results. Semi-quantitative approaches assign numerical values to
    qualitative scales. The chosen approach should match the available data,
    the required precision, and the decision context. Existing controls should
    be assessed for their effectiveness in reducing likelihood or consequence
    before determining residual risk levels.

references:
  - citation: "ISO/IEC 27005:2022, Clause 8.3"
    url: "https://www.iso.org/standard/80585.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated risk scoring for infrastructure components based on
      vulnerability severity, asset criticality, and exposure. Use security
      posture dashboards that aggregate risk scores across the platform.
      Integrate risk analysis into change management workflows — calculate
      risk delta for proposed changes before approval. Use historical incident
      data and availability metrics to inform likelihood estimates.
    tools:
      - aws-security-hub
      - azure-defender
      - tenable-io
      - grafana
      - prometheus
  devsecops:
    prose: >-
      Use vulnerability scoring systems (CVSS, EPSS) as inputs to risk
      analysis. Implement risk-based vulnerability prioritization that
      combines technical severity with business context. Configure CI/CD
      quality gates that enforce risk thresholds derived from the analysis.
      Track vulnerability trends over time to improve likelihood estimates.
    tools:
      - defectdojo
      - trivy
      - grype
      - snyk
      - sonarqube
  secops:
    prose: >-
      Maintain a risk register that records analysis results for all identified
      risks. Use GRC platforms to perform structured risk analysis with
      consistent methodology. Correlate SIEM alert frequency and severity
      data with risk analysis to validate likelihood assumptions. Produce
      periodic risk analysis reports for management review.
    tools:
      - servicenow-grc
      - archer-grc
      - splunk
      - elastic-siem
      - tenable-io

