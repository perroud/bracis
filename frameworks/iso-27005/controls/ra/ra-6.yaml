id: ra.6
family: ra
title: "Risk evaluation"
class: ISO27005

statement:
  prose: >-
    The organization shall evaluate the analyzed risks by comparing the results
    of risk analysis with the established risk criteria to determine which risks
    need to be treated, their priority, and the order in which they should be
    addressed. Risk evaluation shall determine whether the level of risk is
    acceptable or whether treatment is required. The evaluation shall prioritize
    risks based on their level, taking into account the organization's risk
    appetite and tolerance, legal and regulatory requirements, contractual
    obligations, and the interests of stakeholders.

guidance:
  prose: >-
    Risk evaluation is the decision point between risk analysis and risk
    treatment. Each analyzed risk is compared against the risk criteria defined
    during context establishment. Risks that exceed acceptance thresholds must
    be treated. Risks within acceptable levels may be accepted with documented
    justification. Evaluation should consider dependencies between risks — a
    collection of individually acceptable risks may be unacceptable in aggregate.
    The output of risk evaluation is a prioritized list of risks requiring
    treatment, which directly feeds into the risk treatment plan.

references:
  - citation: "ISO/IEC 27005:2022, Clause 8.4"
    url: "https://www.iso.org/standard/80585.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement risk dashboards that visualize risk levels against acceptance
      thresholds. Configure automated alerting when risk scores for
      infrastructure components exceed defined criteria. Use risk heat maps
      that provide management with at-a-glance visibility into the risk
      landscape. Integrate risk evaluation outputs into infrastructure
      prioritization and capacity planning.
    tools:
      - grafana
      - backstage
      - aws-security-hub
      - tenable-io
      - prometheus
  devsecops:
    prose: >-
      Configure vulnerability management platforms to categorize findings
      by risk evaluation outcomes (accept, treat, escalate). Implement
      automated triage rules that classify vulnerabilities based on
      organizational risk criteria. Use risk evaluation results to
      prioritize the security backlog and sprint planning. Track risk
      acceptance decisions with documented justification.
    tools:
      - defectdojo
      - jira
      - gitlab-ci
      - snyk
      - sonarqube
  secops:
    prose: >-
      Maintain a risk register that records evaluation outcomes for all
      assessed risks. Configure GRC platforms to enforce risk acceptance
      workflows requiring management approval. Produce risk evaluation
      reports that clearly communicate which risks require treatment and
      their priority. Track risk evaluation decisions over time to identify
      trends.
    tools:
      - servicenow-grc
      - archer-grc
      - splunk
      - elastic-siem
      - tenable-io

legal_references:
