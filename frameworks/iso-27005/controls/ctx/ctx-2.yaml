id: ctx.2
family: ctx
title: "Defining risk criteria"
class: ISO27005

statement:
  prose: >-
    The organization shall define the criteria for performing the information
    security risk assessment. This includes risk acceptance criteria, criteria
    for performing information security risk assessments, and criteria for
    determining the level of risk. Risk criteria shall reflect the
    organization's values, objectives, and resources. Risk criteria shall be
    based on the nature and type of uncertainties that can affect outcomes and
    objectives, how consequences and likelihood will be defined and measured,
    how the level of risk will be determined, and the views of stakeholders.

guidance:
  prose: >-
    Risk criteria define the benchmarks against which risk significance is
    evaluated. Organizations should establish criteria that include impact scales
    (e.g., negligible, minor, moderate, major, catastrophic), likelihood scales
    (e.g., rare, unlikely, possible, likely, almost certain), risk level
    matrices that combine impact and likelihood, and risk acceptance thresholds
    that specify which risk levels require treatment. Criteria should be
    consistent, documented, and reviewed periodically. They should consider
    confidentiality, integrity, and availability impacts as well as legal,
    regulatory, contractual, reputational, and financial consequences.

references:
  - citation: "ISO/IEC 27005:2022, Clause 7.2"
    url: "https://www.iso.org/standard/80585.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Encode risk criteria as policy-as-code rules that gate infrastructure
      deployments. Define severity thresholds in vulnerability management
      policies that block deployments exceeding acceptable risk levels. Use
      tagging and labeling standards to classify infrastructure components
      by risk tier. Implement automated risk scoring in CI/CD pipelines
      that evaluates changes against defined criteria before promotion.
    tools:
      - open-policy-agent
      - kyverno
      - hashicorp-sentinel
      - terraform
      - backstage
  devsecops:
    prose: >-
      Configure vulnerability scanners with severity thresholds aligned to
      organizational risk criteria. Define quality gates in CI/CD pipelines
      that enforce risk acceptance criteria — for example, blocking merges
      when critical or high vulnerabilities are detected. Maintain risk
      scoring models in code that map CVSS scores to organizational impact
      categories.
    tools:
      - gitlab-ci
      - trivy
      - grype
      - semgrep
      - sonarqube
  secops:
    prose: >-
      Configure SIEM alert thresholds to align with organizational risk
      criteria. Define escalation matrices that map risk levels to response
      actions and notification chains. Maintain risk registers that track
      accepted, mitigated, and transferred risks against defined criteria.
      Produce risk dashboards that visualize current risk posture against
      acceptance thresholds.
    tools:
      - splunk
      - elastic-siem
      - servicenow-grc
      - archer-grc
      - wazuh

legal_references:
  - framework_id: iso-27001-2022
    articles: ["a5.1"]
    relationship: supports
