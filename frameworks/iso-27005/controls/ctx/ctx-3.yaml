id: ctx.3
family: ctx
title: "Defining the scope and boundaries"
class: ISO27005

statement:
  prose: >-
    The organization shall define the scope and boundaries of the information
    security risk management process. The scope shall specify which parts of
    the organization, which information systems, which business processes, and
    which information assets are included in the risk management process. The
    boundaries shall clearly delineate the interfaces between the information
    security risk management process and other organizational processes, as
    well as boundaries with external entities such as suppliers and partners.

guidance:
  prose: >-
    Defining scope and boundaries ensures that risk management efforts are
    focused and tractable. The scope should align with the scope of the
    information security management system (ISMS) where one exists. Organizations
    should identify all information assets within scope, including data, systems,
    networks, people, and physical facilities. Boundary definitions should
    clarify responsibility demarcations — for example, where cloud provider
    responsibility ends and organizational responsibility begins in a shared
    responsibility model. Scope should be documented and communicated to all
    relevant stakeholders.

references:
  - citation: "ISO/IEC 27005:2022, Clause 7.3"
    url: "https://www.iso.org/standard/80585.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Define platform boundaries using network segmentation, namespace isolation,
      and service mesh boundaries. Document shared responsibility models for
      each cloud service consumed. Maintain an asset inventory that maps every
      infrastructure component to the risk management scope. Use tagging
      policies to mark which resources are in-scope for risk assessment.
    tools:
      - terraform
      - aws-organizations
      - azure-management-groups
      - kubernetes-namespaces
      - backstage
  devsecops:
    prose: >-
      Define application boundaries in architecture diagrams stored alongside
      code. Use repository-level CODEOWNERS and security labels to delineate
      risk management responsibilities. Document data flow diagrams that show
      where sensitive data crosses scope boundaries. Ensure CI/CD pipelines
      only deploy to environments within the defined scope.
    tools:
      - gitlab-ci
      - github-actions
      - draw-io
      - threatspec
      - snyk
  secops:
    prose: >-
      Configure monitoring tools to cover all in-scope assets and alert on
      activity involving out-of-scope connections. Maintain a network map
      that visualizes scope boundaries and trust zones. Ensure log collection
      covers all systems within the defined scope. Validate scope coverage
      periodically through asset discovery scans.
    tools:
      - nmap
      - tenable-io
      - qualys
      - splunk
      - elastic-siem

legal_references:
