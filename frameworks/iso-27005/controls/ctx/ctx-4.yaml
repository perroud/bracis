id: ctx.4
family: ctx
title: "Organization of information security risk management"
class: ISO27005

statement:
  prose: >-
    The organization shall establish and maintain the organizational structure,
    roles, responsibilities, and authorities for the information security risk
    management process. The organization shall ensure that there is
    accountability for risk management activities, that risk management is
    integrated into organizational processes, and that adequate resources are
    allocated to information security risk management. Senior management shall
    demonstrate commitment by ensuring that the risk management process is
    aligned with organizational objectives.

guidance:
  prose: >-
    Effective risk management requires clear governance. Organizations should
    designate a risk owner for each identified risk, establish a risk committee
    or board that reviews risk decisions, and define escalation paths for risks
    that exceed tolerance thresholds. Roles should include risk owners, risk
    analysts, control owners, and executive sponsors. The risk management
    function should have sufficient authority and resources to influence
    organizational decisions. Integration with existing governance structures
    (e.g., IT governance, compliance, internal audit) avoids duplication and
    ensures consistency.

references:
  - citation: "ISO/IEC 27005:2022, Clause 7.4"
    url: "https://www.iso.org/standard/80585.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement role-based access control (RBAC) in platform tools that
      reflects risk management responsibilities. Assign infrastructure
      ownership through CODEOWNERS files and service catalog entries.
      Automate notification workflows so that risk owners are alerted
      when risk-relevant changes occur in their domain. Use platform
      governance tools to enforce approval workflows for high-risk changes.
    tools:
      - backstage
      - kubernetes-rbac
      - terraform-cloud
      - opsgenie
      - pagerduty
  devsecops:
    prose: >-
      Define security champions within development teams who serve as risk
      management liaisons. Enforce merge request approval rules that require
      security-role sign-off for risk-relevant changes. Use issue trackers
      to assign risk management tasks with clear ownership and deadlines.
      Integrate risk-related metrics into developer dashboards.
    tools:
      - gitlab-ci
      - jira
      - github-actions
      - sonarqube
      - defectdojo
  secops:
    prose: >-
      Establish on-call rotations and escalation policies that map to risk
      management roles. Configure SIEM workflows to route risk-relevant alerts
      to designated risk owners. Maintain a RACI matrix for incident response
      and risk treatment activities. Produce periodic reports for senior
      management on risk management performance.
    tools:
      - servicenow-grc
      - archer-grc
      - pagerduty
      - splunk
      - opsgenie

legal_references:
