id: ctx.1
family: ctx
title: "Establishing the context of the organization"
class: ISO27005

statement:
  prose: >-
    The organization shall establish the external and internal context for
    information security risk management. This includes understanding the
    organization and its context, understanding the needs and expectations of
    interested parties, and determining the scope of the information security
    risk management process. The external context includes the external
    environment in which the organization seeks to achieve its objectives,
    including regulatory, legal, financial, technological, and competitive
    factors. The internal context includes governance, organizational structure,
    roles and accountabilities, policies, objectives, strategies, capabilities,
    information systems, information flows, and decision-making processes.

guidance:
  prose: >-
    Context establishment is the foundational step of information security risk
    management. Organizations should document the business environment, regulatory
    landscape, threat landscape, and internal capabilities that shape how risk
    management decisions are made. The external context should capture industry
    trends, supply chain dependencies, geopolitical factors, and applicable legal
    and regulatory requirements. The internal context should map organizational
    objectives, risk appetite, existing controls, information assets, and the
    maturity of security processes. This activity should be revisited whenever
    significant changes occur in the organization's environment.

references:
  - citation: "ISO/IEC 27005:2022, Clause 7.1"
    url: "https://www.iso.org/standard/80585.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Document infrastructure topology, cloud provider dependencies, and
      platform service boundaries in a configuration management database (CMDB)
      or service catalog. Use infrastructure-as-code repositories as the
      authoritative source for the technical context. Maintain architecture
      decision records (ADRs) that capture platform risk context. Integrate
      asset discovery tools that continuously map the technology landscape.
    tools:
      - backstage
      - terraform
      - pulumi
      - servicenow-cmdb
      - aws-config
  devsecops:
    prose: >-
      Maintain software bill of materials (SBOM) for all applications to
      document the technology context. Use dependency scanning to understand
      third-party component exposure. Integrate threat modeling into the
      development lifecycle to capture application-level risk context. Store
      context documentation in version-controlled repositories alongside
      application code.
    tools:
      - syft
      - cyclonedx
      - threatspec
      - gitlab-ci
      - github-actions
  secops:
    prose: >-
      Maintain an up-to-date threat intelligence feed that informs the external
      context. Use vulnerability management platforms to document the current
      exposure landscape. Map regulatory requirements to monitoring controls.
      Produce periodic environment assessment reports that capture changes in
      the internal and external context.
    tools:
      - misp
      - opencti
      - tenable-io
      - qualys
      - splunk

legal_references:
  - framework_id: iso-27001-2022
    articles: ["a5.1"]
    relationship: supports
  - framework_id: iso-31000
    articles: ["clause-5.4"]
    relationship: derived-from
