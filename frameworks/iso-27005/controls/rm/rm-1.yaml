id: rm.1
family: rm
title: "Risk monitoring"
class: ISO27005

statement:
  prose: >-
    The organization shall continuously monitor information security risks
    and the effectiveness of the risk management process. Monitoring shall
    detect changes in the risk context, including new threats, vulnerabilities,
    and assets, changes in the likelihood or consequences of identified risks,
    changes in the effectiveness of existing controls, and changes in the
    external and internal environment. Monitoring activities shall be defined,
    and their results shall be recorded and reported. Monitoring shall trigger
    re-assessment when significant changes are detected.

guidance:
  prose: >-
    Risk monitoring ensures that risk management remains current and responsive
    to change. Organizations should establish key risk indicators (KRIs) that
    provide early warning of changes in risk levels. Monitoring should cover
    the threat landscape (new vulnerabilities, emerging threats, attack trends),
    the control environment (control failures, drift, degradation), the asset
    landscape (new assets, changes in asset value or criticality), and the
    business environment (new regulations, organizational changes, new business
    processes). Automated monitoring tools should complement manual reviews.
    Monitoring results should feed back into the risk assessment process,
    triggering re-assessment when thresholds are breached.

references:
  - citation: "ISO/IEC 27005:2022, Clause 10.3"
    url: "https://www.iso.org/standard/80585.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement continuous monitoring of infrastructure security posture using
      cloud security posture management (CSPM) and configuration drift
      detection. Set up key risk indicators (KRIs) as metrics in monitoring
      systems with alerting thresholds. Monitor infrastructure for unauthorized
      changes, new assets, and control drift. Use chaos engineering to
      continuously test control effectiveness.
    tools:
      - aws-security-hub
      - azure-defender
      - prometheus
      - grafana
      - falco
  devsecops:
    prose: >-
      Implement continuous vulnerability monitoring in production environments.
      Monitor dependency vulnerability feeds for newly disclosed vulnerabilities
      affecting deployed components. Track security metrics over time to
      identify risk trends (defect density, mean time to remediation, escape
      rate). Configure automated alerts when risk indicators breach thresholds.
    tools:
      - trivy
      - snyk
      - defectdojo
      - grafana
      - gitlab-ci
  secops:
    prose: >-
      Operate continuous monitoring through SIEM, intrusion detection systems,
      and security orchestration platforms. Monitor threat intelligence feeds
      for changes in the threat landscape relevant to the organization.
      Track key risk indicators and produce trend reports. Conduct periodic
      control effectiveness testing. Implement automated compliance monitoring
      that detects deviations from security baselines.
    tools:
      - splunk
      - elastic-siem
      - wazuh
      - tenable-io
      - qualys

