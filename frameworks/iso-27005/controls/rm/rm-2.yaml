id: rm.2
family: rm
title: "Risk review"
class: ISO27005

statement:
  prose: >-
    The organization shall review the information security risk management
    process at planned intervals and whenever significant changes occur.
    The review shall assess the continuing suitability, adequacy, and
    effectiveness of the risk management process and its outcomes. The
    review shall consider whether the risk management approach, criteria,
    and methodology remain appropriate, whether the risk assessment results
    are still valid, whether the risk treatment plan is being implemented
    as planned, whether residual risks remain within acceptable levels, and
    whether improvements to the risk management process are needed.

guidance:
  prose: >-
    Risk review is a periodic reassessment of the entire risk management
    process. Reviews should be triggered by time-based schedules (e.g.,
    annually), significant organizational changes (mergers, restructuring,
    new products), significant environmental changes (new regulations,
    emerging threats, technology changes), and after major security incidents.
    The review should evaluate process effectiveness — are risks being
    identified, analyzed, evaluated, and treated consistently and
    accurately? Lessons learned from incidents and near-misses should feed
    into process improvements. Management review outputs should include
    decisions on changes to risk criteria, methodology, resource allocation,
    and process improvements.

references:
  - citation: "ISO/IEC 27005:2022, Clause 10.4"
    url: "https://www.iso.org/standard/80585.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Schedule periodic infrastructure risk reviews aligned with change
      management cadences. Use post-incident reviews and postmortems to
      identify gaps in risk assessment. Review platform architecture risk
      assumptions when adding new services or providers. Conduct annual
      infrastructure risk assessment refreshes that re-evaluate all
      platform risks.
    tools:
      - backstage
      - jira
      - confluence
      - grafana
      - opsgenie
  devsecops:
    prose: >-
      Conduct periodic security retrospectives that review application risk
      assessment accuracy. Analyze vulnerability trends to evaluate whether
      risk analysis assumptions remain valid. Review the effectiveness of
      CI/CD security controls by measuring defect escape rates. Update
      threat models based on new information from incidents and industry
      developments.
    tools:
      - defectdojo
      - sonarqube
      - gitlab-ci
      - jira
      - threatspec
  secops:
    prose: >-
      Conduct formal risk management reviews at planned intervals using
      the GRC platform. Assess control effectiveness through internal audits
      and penetration tests. Review incident data to identify risks that
      were not previously identified or were underestimated. Produce
      management review reports with recommendations for process
      improvements and resource adjustments.
    tools:
      - servicenow-grc
      - archer-grc
      - splunk
      - tenable-io
      - qualys

