id: rt.1
family: rt
title: "Risk treatment options"
class: ISO27005

statement:
  prose: >-
    The organization shall select appropriate risk treatment options for each
    risk that requires treatment, as determined by the risk evaluation. Risk
    treatment options include risk modification (applying controls to reduce
    the risk), risk retention (accepting the risk in accordance with risk
    criteria), risk avoidance (withdrawing from the activity causing the risk),
    and risk sharing (transferring or distributing the risk to another party
    such as through insurance or outsourcing). More than one option may be
    applied to a single risk, and options may apply to multiple risks.

guidance:
  prose: >-
    Risk treatment option selection should consider the cost-effectiveness of
    each option relative to the risk reduction achieved. Risk modification is
    the most common option, involving the implementation of security controls
    from standards such as ISO/IEC 27001 Annex A. Risk retention is appropriate
    when the risk is within acceptable levels or when the cost of treatment
    exceeds the potential loss. Risk avoidance may involve discontinuing a
    business process or technology. Risk sharing typically involves insurance
    or contractual transfer of liability. The selected options should be
    documented in a risk treatment plan with clear justification.

references:
  - citation: "ISO/IEC 27005:2022, Clause 9.1"
    url: "https://www.iso.org/standard/80585.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement security controls from ISO/IEC 27001 Annex A as automated
      platform capabilities (network segmentation, encryption, access control).
      Use infrastructure-as-code to deploy risk treatment controls consistently.
      Document risk avoidance decisions by decommissioning deprecated services.
      Configure multi-region deployments to share availability risks across
      providers.
    tools:
      - terraform
      - pulumi
      - aws-control-tower
      - azure-policy
      - kubernetes-network-policies
  devsecops:
    prose: >-
      Implement risk modification controls as automated security gates in
      CI/CD pipelines. Use feature flags to support risk avoidance by
      disabling high-risk features. Document risk retention decisions in
      vulnerability management platforms with management approval. Apply
      defense-in-depth controls to reduce residual risk.
    tools:
      - gitlab-ci
      - trivy
      - semgrep
      - sonarqube
      - defectdojo
  secops:
    prose: >-
      Track risk treatment decisions in the GRC platform with linked
      evidence of control implementation. Monitor the effectiveness of risk
      treatment controls through SIEM correlation rules. Verify that risk
      sharing arrangements (insurance, SLAs) are current and adequate.
      Report on risk treatment plan progress to management.
    tools:
      - servicenow-grc
      - archer-grc
      - splunk
      - elastic-siem
      - wazuh

legal_references:
  - framework_id: iso-27001-2022
    articles: ["a5.1", "a8.8"]
    relationship: supports
  - framework_id: nist-800-53-rev5
    articles: ["RA-7", "PM-9"]
    relationship: mapped
