id: rt.3
family: rt
title: "Risk acceptance"
class: ISO27005

statement:
  prose: >-
    The organization shall make and record decisions on the acceptance of
    residual risks. Risk acceptance decisions shall be made by risk owners
    and approved by management when residual risks exceed the organization's
    normal risk acceptance criteria. Risk acceptance decisions shall consider
    the risk criteria, the risk treatment plan, the costs and benefits of
    further treatment, the organization's risk appetite, and the potential
    consequences of accepting the risk. Accepted risks shall be documented
    and monitored.

guidance:
  prose: >-
    Risk acceptance is a formal decision to take on risk without further
    treatment. This may occur when the cost of treatment exceeds the
    potential loss, when treatment is technically infeasible, or when the
    residual risk after treatment is within acceptable limits. Risk acceptance
    decisions must be made at the appropriate management level — higher-impact
    risks require more senior approval. Accepted risks should be documented
    with the rationale, the approver, and a review date. Risk acceptance is
    not a one-time decision; accepted risks should be reviewed periodically
    to ensure the acceptance remains valid as the risk landscape evolves.

references:
  - citation: "ISO/IEC 27005:2022, Clause 9.3"
    url: "https://www.iso.org/standard/80585.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement exception management workflows in governance tools that
      require documented justification and management approval for risk
      acceptance. Track accepted risks as tagged items in the platform
      service catalog with expiration dates that trigger re-evaluation.
      Configure monitoring for accepted risks to detect changes in
      risk level that would invalidate the acceptance.
    tools:
      - servicenow-grc
      - backstage
      - jira
      - opsgenie
      - pagerduty
  devsecops:
    prose: >-
      Use vulnerability management platforms to formally suppress or accept
      findings with documented justification and expiration dates. Implement
      security exception workflows in CI/CD pipelines that allow overriding
      quality gates with appropriate approval. Track accepted vulnerabilities
      separately and include them in periodic reviews. Ensure accepted risks
      are visible in security dashboards.
    tools:
      - defectdojo
      - snyk
      - gitlab-ci
      - jira
      - sonarqube
  secops:
    prose: >-
      Maintain a risk acceptance register in the GRC platform that records
      all acceptance decisions with approver, rationale, conditions, and
      review dates. Set up automated reminders for risk acceptance reviews.
      Monitor accepted risks for changes in threat landscape or asset
      value that would require re-evaluation. Include accepted risks in
      management risk reports.
    tools:
      - servicenow-grc
      - archer-grc
      - splunk
      - tenable-io
      - elastic-siem

