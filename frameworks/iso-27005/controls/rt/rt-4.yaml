id: rt.4
family: rt
title: "Selecting and implementing controls"
class: ISO27005

statement:
  prose: >-
    The organization shall select and implement controls to treat identified
    risks in accordance with the risk treatment plan. Controls shall be
    selected from recognized control sets such as ISO/IEC 27001 Annex A or
    other relevant sources, or custom controls may be designed where existing
    controls do not adequately address the risk. The selection shall consider
    implementation constraints, cost, existing controls, and the degree of
    risk reduction achieved. Controls shall be implemented in a manner that
    ensures their effectiveness and that residual risk is reduced to an
    acceptable level.

guidance:
  prose: >-
    Control selection should follow a structured process: identify candidate
    controls from established catalogs, evaluate each control's ability to
    reduce the specific risk, assess implementation cost and complexity,
    consider operational impact, and confirm compatibility with existing
    controls. Controls can be preventive (reducing likelihood), detective
    (identifying incidents), corrective (reducing consequences), or deterrent.
    A defense-in-depth approach combining multiple control types provides the
    most resilient risk treatment. After implementation, controls must be
    tested to verify they achieve the expected risk reduction.

references:
  - citation: "ISO/IEC 27005:2022, Clause 9.4"
    url: "https://www.iso.org/standard/80585.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement technical controls as infrastructure-as-code modules that can
      be reused across the platform. Use policy-as-code engines to enforce
      preventive controls at deployment time. Deploy detective controls
      through platform monitoring and alerting. Validate control effectiveness
      through automated compliance checks and drift detection. Maintain a
      control catalog that maps available platform controls to the risks
      they address.
    tools:
      - terraform
      - open-policy-agent
      - kyverno
      - aws-config
      - falco
  devsecops:
    prose: >-
      Integrate security controls into CI/CD pipelines as automated gates.
      Implement SAST, DAST, SCA, and secret detection as preventive and
      detective controls. Use code review requirements and approval workflows
      as procedural controls. Verify control effectiveness by tracking
      the defect escape rate — vulnerabilities found in production versus
      those caught in the pipeline.
    tools:
      - gitlab-sast
      - gitlab-dast
      - trivy
      - semgrep
      - sonarqube
  secops:
    prose: >-
      Deploy detective controls through SIEM rules, intrusion detection
      systems, and log analysis. Implement corrective controls through
      automated incident response playbooks. Validate control effectiveness
      through periodic control testing and internal audits. Maintain
      traceability between implemented controls and the risks they treat
      in the GRC platform.
    tools:
      - splunk
      - elastic-siem
      - wazuh
      - tenable-io
      - servicenow-grc

