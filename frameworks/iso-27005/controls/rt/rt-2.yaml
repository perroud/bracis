id: rt.2
family: rt
title: "Risk treatment plan"
class: ISO27005

statement:
  prose: >-
    The organization shall formulate a risk treatment plan that identifies,
    for each risk requiring treatment, the selected treatment option, the
    controls to be implemented, the resources required, the responsibilities
    and authorities, the expected timeline, and the expected residual risk
    after treatment. The risk treatment plan shall be approved by the risk
    owners and by management. The plan shall specify the criteria for
    determining the acceptable level of residual risk and the process for
    obtaining risk acceptance.

guidance:
  prose: >-
    The risk treatment plan is the actionable output of the risk management
    process. It translates risk decisions into a project plan with assigned
    resources, deadlines, and success criteria. Each planned control should
    reference the specific risk(s) it addresses and the expected risk reduction.
    The plan should be realistic about resource constraints and implementation
    timelines. Residual risk (the risk remaining after treatment) must be
    explicitly assessed and documented. If residual risk exceeds acceptance
    criteria, additional treatment measures or formal risk acceptance by
    management is required.

references:
  - citation: "ISO/IEC 27005:2022, Clause 9.2"
    url: "https://www.iso.org/standard/80585.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Translate risk treatment plans into infrastructure backlog items with
      defined acceptance criteria. Track control implementation in project
      management tools with links to the originating risk. Use
      infrastructure-as-code pull requests as evidence of control
      implementation. Automate residual risk assessment by re-running
      security scans after control deployment.
    tools:
      - jira
      - backstage
      - terraform
      - gitlab-ci
      - aws-security-hub
  devsecops:
    prose: >-
      Create epics and stories in the issue tracker that map to risk
      treatment plan items. Enforce traceability between code changes and
      risk treatment objectives using commit message conventions and issue
      linking. Measure risk reduction by comparing vulnerability scan results
      before and after control implementation. Document residual risk in
      release notes.
    tools:
      - jira
      - gitlab-ci
      - defectdojo
      - trivy
      - sonarqube
  secops:
    prose: >-
      Track risk treatment plan execution in the GRC platform with milestone
      tracking and evidence collection. Generate periodic status reports on
      plan progress for management review. Validate control effectiveness
      through testing and audit. Maintain documentation linking each
      implemented control to the risk it addresses and the measured residual
      risk.
    tools:
      - servicenow-grc
      - archer-grc
      - splunk
      - tenable-io
      - qualys

legal_references:
  - framework_id: iso-27001-2022
    articles: ["a5.1"]
    relationship: supports
  - framework_id: nist-800-53-rev5
    articles: ["PM-9", "CA-5"]
    relationship: mapped
