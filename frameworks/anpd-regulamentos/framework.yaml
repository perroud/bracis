control_families:
  - id: cap-1
    title: "General Provisions and Definitions"
    description: "Scope, definitions, and relationship with LGPD arts. 52-54 covering the applicability of dosimetry and incident notification regulations"
    articles: "art. 1 to art. 4"
    control_count: 4
  - id: cap-2
    title: "Sanction Dosimetry"
    description: "Sanction types, calculation methodology, aggravating and mitigating factors, and fine computation formula for LGPD violations"
    articles: "art. 5 to art. 10"
    control_count: 6
  - id: cap-3
    title: "Administrative Process"
    description: "Investigation procedures, due process guarantees, defense rights, appeals, and statute of limitations for ANPD enforcement actions"
    articles: "art. 11 to art. 15"
    control_count: 5
  - id: cap-4
    title: "Security Incident Notification"
    description: "Definition of security incidents, notification deadlines (3 business days), content requirements, notification to data subjects, and risk assessment criteria"
    articles: "art. 16 to art. 20"
    control_count: 5
  - id: cap-5
    title: "Incident Response and Remediation"
    description: "Incident record-keeping, remediation measures, communication plans, coordination with CERT.br and sectoral regulators, and post-incident review"
    articles: "art. 21 to art. 25"
    control_count: 5
related_frameworks:
  - framework_id: lgpd
    relationship: implements
    description: >-
      These regulations implement LGPD arts. 48 (security incident
      notification) and 52-54 (administrative sanctions and
      dosimetry), providing detailed operational rules for ANPD
      enforcement.
  - framework_id: lai
    relationship: complements
    description: "The Lei de Acesso à Informação complements the ANPD regulations regarding transparency of administrative processes and public access to enforcement decisions."
  - framework_id: marco-civil
    relationship: complements
    description: "The Marco Civil da Internet complements these regulations regarding security incident obligations for internet application providers and data retention requirements."
