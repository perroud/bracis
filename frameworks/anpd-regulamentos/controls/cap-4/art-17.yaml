id: art-17
family: cap-4
title: "Notification Content Requirements"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 17. A comunicação do incidente de segurança à ANPD deverá
    conter, no mínimo:

    I — a descrição da natureza dos dados pessoais afetados;

    II — as informações sobre os titulares envolvidos;

    III — a indicação das medidas técnicas e de segurança utilizadas
    para a proteção dos dados, observados os segredos comercial e
    industrial;

    IV — os riscos relacionados ao incidente com identificação dos
    possíveis impactos aos titulares;

    V — os motivos da demora, caso a comunicação não tenha sido
    imediata;

    VI — as medidas que foram ou que serão adotadas para reverter ou
    mitigar os efeitos do incidente;

    VII — a data do conhecimento do incidente de segurança;

    VIII — o nome e dados de contato do encarregado ou de outra pessoa
    designada pelo controlador para prestar informações;

    IX — a descrição do incidente, incluindo a causa raiz, quando
    conhecida;

    X — o número total, ou estimativa, de titulares afetados;

    XI — o número total, ou estimativa, de dados pessoais afetados.
guidance:
  prose: |
    Art. 17 specifies the eleven mandatory fields for ANPD incident
    notifications. Missing required fields can itself constitute
    a violation.

    **Notification content checklist:**
    1. Nature of affected personal data (names, CPF, health data, etc.)
    2. Information about data subjects (categories, profiles)
    3. Technical/security measures in place (what was already deployed)
    4. Risk assessment (potential impacts on data subjects)
    5. Justification for any delay in notification
    6. Remediation measures (taken and planned)
    7. Date of incident discovery
    8. DPO/contact person details
    9. Incident description and root cause (if known)
    10. Total or estimated number of affected data subjects
    11. Total or estimated number of affected personal data records

    **Trade secret protection (inciso III):**
    The ANPD acknowledges that detailed security measures may
    constitute trade secrets. Organizations can describe measures
    at a level that demonstrates due diligence without exposing
    proprietary security architecture.

    **Estimation is acceptable:**
    For items X and XI, exact numbers are not required at the
    initial notification stage — good-faith estimates suffice.
    Exact figures can be provided in the supplementary notification.
implementation_guidance:
  platform_engineering:
    prose: |
      **Automated notification data collection:**
      1. Implement automated data scope assessment tools that
         rapidly determine: data categories affected, number of
         records, number of data subjects, data sensitivity level.
      2. Deploy data classification metadata that enables rapid
         identification of affected data types (item I).
      3. Implement automated impact assessment based on data
         classification and incident type to populate risk
         assessment fields (item IV).
      4. Maintain automated inventory of security controls that
         can generate a summary of measures in place (item III).
      5. Implement incident timeline tracking that automatically
         captures the discovery date (item VII) and any delays.
    tools:
      - data-scope-assessment
      - data-classification
      - impact-assessment
      - security-inventory
      - incident-timeline
  devsecops:
    prose: |
      **Application-level data for notifications:**
      1. Implement data access logging that records which data
         categories and records were accessed during an incident.
      2. Maintain data mapping documentation that enables rapid
         identification of affected data categories per system.
      3. Implement automated root cause analysis tooling that
         assists in populating the cause description (item IX).
      4. Maintain per-service documentation of data subjects
         and data categories processed for rapid scope assessment.
    tools:
      - data-access-logging
      - data-mapping
      - rca-tooling
      - service-documentation
  secops:
    prose: |
      **ANPD notification preparation:**
      1. Create pre-populated ANPD notification templates with all
         eleven required fields, pre-filled with static information
         (DPO contact, standard security measures description).
      2. Maintain data subject count estimates per system/database
         updated quarterly for rapid scope estimation.
      3. Develop standard risk assessment matrices that map incident
         types to potential impacts for rapid risk field population.
      4. Train incident response team on completing each notification
         field accurately within the 3-business-day window.
      5. Establish review/approval workflow for ANPD notifications
         (DPO + legal) that fits within the 3-day timeline.
    tools:
      - notification-templates
      - data-inventory
      - risk-matrices
      - approval-workflows
legal_references:
  - framework_id: lgpd
    articles: ["art-48"]
    relationship: implements
