id: art-16
family: cap-4
title: "Notification Deadline and Obligation"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 16. O controlador deverá comunicar à ANPD e ao titular a
    ocorrência de incidente de segurança que possa acarretar risco ou
    dano relevante aos titulares, nos termos do art. 48 da LGPD.

    § 1º A comunicação à ANPD deverá ser realizada no prazo de 3 (três)
    dias úteis, contados do conhecimento pelo controlador de que o
    incidente afetou dados pessoais.

    § 2º O prazo de que trata o § 1º poderá ser complementado com
    informações adicionais no prazo de 20 (vinte) dias úteis, contados
    da comunicação inicial.

    § 3º A comunicação complementar de que trata o § 2º conterá as
    informações que não puderam ser fornecidas na comunicação inicial,
    devidamente justificadas.

    § 4º O conhecimento do incidente pelo controlador, para fins do
    § 1º, dar-se-á a partir do momento em que houver certeza razoável
    de que o incidente afetou dados pessoais.

    § 5º O operador deverá comunicar ao controlador, sem demora
    injustificada, a ocorrência de incidente de segurança que possa
    acarretar risco ou dano relevante aos titulares.
guidance:
  prose: |
    Art. 16 establishes the core notification obligation and timeline.

    **Timeline:**
    - T+0: Incident detection by processor or controller
    - Processor to controller: "without undue delay" (no fixed deadline)
    - Controller to ANPD: 3 business days from "reasonable certainty"
    - Supplementary information: 20 business days after initial notice

    **Trigger: "reasonable certainty" (§4):**
    The 3-day clock starts when the controller has reasonable certainty
    that the incident affected personal data — not when the incident
    was first detected, but when personal data impact is confirmed.

    **Two-phase notification:**
    1. Initial notification (3 business days): core facts known
    2. Supplementary notification (20 business days): complete details

    **Processor obligation (§5):**
    Processors must notify the controller "without undue delay" — there
    is no fixed deadline, but unreasonable delay itself becomes a
    violation. Data Processing Agreements must define specific SLAs.

    **Parallel notification:**
    The controller must notify both the ANPD AND the data subjects.
    These are separate obligations with potentially different timelines.
implementation_guidance:
  platform_engineering:
    prose: |
      **Automated incident detection and timeline tracking:**
      1. Implement SIEM with automated alerting for events indicating
         potential personal data compromise (unauthorized access,
         data exfiltration, ransomware, data exposure).
      2. Deploy automated incident timeline tracking that records
         T+0 (detection), T+confirmation (reasonable certainty),
         and calculates the 3-business-day notification deadline.
      3. Implement automated data scope assessment tools that
         rapidly determine whether personal data was affected.
      4. Configure processor notification channels (API webhooks,
         automated emails) for immediate upstream notification
         from processors to controllers.
      5. Deploy incident management platform with built-in
         regulatory deadline tracking.
    tools:
      - siem
      - incident-timeline
      - data-scope-assessment
      - notification-automation
      - incident-management
  devsecops:
    prose: |
      **Pipeline controls for incident detection:**
      1. Implement real-time security monitoring in production
         environments with automated alerting for data access
         anomalies.
      2. Deploy application-level audit logging that captures
         data access events for rapid scope determination.
      3. Implement canary tokens and honeypots in data stores
         to detect unauthorized access early.
      4. Maintain documented runbooks for incident scope assessment
         alongside application documentation.
    tools:
      - security-monitoring
      - audit-logging
      - canary-tokens
      - runbooks
  secops:
    prose: |
      **3-business-day notification process:**
      1. Establish a documented incident notification procedure with
         clear roles, responsibilities, and escalation paths that
         ensures ANPD notification within 3 business days.
      2. Pre-approve ANPD notification templates with legal counsel
         to avoid delays during the notification window.
      3. Define "reasonable certainty" criteria internally so the
         team knows when the 3-day clock starts.
      4. Implement processor notification SLAs in all Data Processing
         Agreements (DPAs) — recommend 24-hour notification from
         processor to controller.
      5. Conduct quarterly notification drills simulating the
         3-business-day timeline end-to-end.
    tools:
      - incident-management
      - notification-templates
      - dpa-management
      - drill-management
