id: art-19
family: cap-4
title: "Risk Assessment Criteria for Notification"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 19. Para fins de avaliação sobre a relevância do risco ou
    dano aos titulares decorrente do incidente de segurança, o
    controlador deverá considerar, entre outros, os seguintes critérios:

    I — se o incidente envolve dados pessoais sensíveis, nos termos
    do art. 5º, inciso II, da LGPD;

    II — se o incidente envolve dados de crianças, de adolescentes
    ou de idosos;

    III — se o incidente pode acarretar danos materiais ou morais
    aos titulares, tais como discriminação, violação da integridade
    física, ao direito à imagem e à reputação, fraudes financeiras
    ou roubo de identidade;

    IV — o volume de dados pessoais afetados;

    V — o volume de titulares afetados;

    VI — a boa-fé e as intenções dos terceiros que tiveram acesso
    aos dados, quando identificáveis;

    VII — a facilidade de identificação dos titulares por terceiros
    não autorizados;

    VIII — a adoção de medidas técnicas e administrativas adequadas
    de segurança pelo controlador antes da ocorrência do incidente;

    IX — a reversibilidade dos efeitos do incidente sobre os dados
    pessoais dos titulares.
guidance:
  prose: |
    Art. 19 provides the risk assessment framework that determines
    whether an incident triggers notification obligations.

    **Notification is required when risk/harm is "relevant" — assessed
    through nine criteria:**

    **High-risk indicators (likely trigger notification):**
    - Sensitive data involved (I): health, biometric, genetic, racial,
      political, religious, sexual orientation
    - Vulnerable subjects (II): children, adolescents, elderly
    - Potential for material/moral harm (III): fraud, identity theft,
      discrimination, physical safety, reputation
    - Large volume of data or subjects (IV, V)
    - Easy identification of subjects (VII): direct identifiers
      (CPF, name, address) vs. pseudonymized data

    **Risk-reducing factors:**
    - Benign third-party intentions (VI): accidental exposure vs.
      malicious exfiltration
    - Adequate security measures in place (VIII): encryption, access
      controls reduce exploitability
    - Reversible effects (IX): data recovered, no evidence of
      exploitation

    **Practical decision framework:**
    If any of criteria I-III are met AND criteria IV-V indicate
    significant scope, notification is very likely required.
    If VIII is strong (robust measures) and IX is favorable
    (reversible), notification may not be required.
implementation_guidance:
  platform_engineering:
    prose: |
      **Automated risk assessment for notification decisions:**
      1. Implement data classification that tags datasets by
         sensitivity level (sensitive data per LGPD art. 5, II),
         vulnerable subject categories (children, elderly), and
         direct identifiability level.
      2. Deploy automated incident scope assessment that calculates
         affected data volume and subject count against pre-defined
         notification thresholds.
      3. Implement encryption status checking that determines whether
         compromised data was encrypted at rest (affects exploitability
         and reversibility assessment).
      4. Deploy automated risk scoring that evaluates the nine criteria
         from art. 19 and recommends notification/no-notification.
    tools:
      - data-classification
      - scope-assessment
      - encryption-verification
      - risk-scoring
  devsecops:
    prose: |
      **Development controls that improve risk assessment outcome:**
      1. Implement data minimization in applications to reduce data
         volume exposed in incidents (criteria IV, V).
      2. Apply pseudonymization/tokenization to reduce identifiability
         (criterion VII) and improve reversibility (criterion IX).
      3. Implement encryption at the application layer for sensitive
         data categories (criterion VIII).
      4. Design data models that separate direct identifiers from
         other personal data to limit exposure scope.
    tools:
      - data-minimization
      - pseudonymization
      - application-encryption
      - data-modeling
  secops:
    prose: |
      **Risk assessment process for notification decisions:**
      1. Create a documented risk assessment procedure that evaluates
         all nine criteria from art. 19 within the first hours
         of incident detection.
      2. Develop a risk scoring matrix that assigns weights to each
         criterion and produces a notification recommendation
         (notify/do not notify/borderline).
      3. Establish a decision authority (DPO + legal + CISO) for
         borderline cases requiring judgment.
      4. Document all risk assessment decisions with rationale for
         each criterion to support defense if ANPD questions the
         decision not to notify.
      5. When in doubt, notify — the cost of unnecessary notification
         is far lower than the cost of failing to notify when required.
    tools:
      - risk-assessment
      - decision-framework
      - incident-management
      - documentation
