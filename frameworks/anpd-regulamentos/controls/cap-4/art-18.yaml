id: art-18
family: cap-4
title: "Notification to Data Subjects"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 18. A comunicação ao titular do incidente de segurança deverá
    ser realizada em linguagem clara e acessível e conter, no mínimo:

    I — a descrição da natureza dos dados pessoais afetados;

    II — as informações sobre os titulares envolvidos;

    III — os riscos relacionados ao incidente com identificação dos
    possíveis impactos aos titulares;

    IV — as medidas que foram ou que serão adotadas para reverter ou
    mitigar os efeitos do incidente, quando cabível;

    V — a data do conhecimento do incidente de segurança;

    VI — o nome e dados de contato do encarregado ou de outra pessoa
    designada pelo controlador para prestar informações;

    VII — as recomendações ao titular para mitigar os riscos
    decorrentes do incidente, quando cabível.

    § 1º A comunicação ao titular deverá ser realizada de forma
    individualizada, preferencialmente por meio eletrônico.

    § 2º Quando a comunicação individualizada se mostrar
    inviável ou desproporcional, o controlador deverá realizar a
    comunicação por meios de ampla divulgação, tais como sítio
    eletrônico, aplicativos, redes sociais ou canais de atendimento.

    § 3º A comunicação ao titular deverá ser realizada no mesmo prazo
    da comunicação à ANPD, salvo se a ANPD determinar prazo distinto.
guidance:
  prose: |
    Art. 18 defines the obligation and requirements for notifying
    affected data subjects about security incidents.

    **Content requirements (simpler than ANPD notification):**
    Seven fields required, focused on what the data subject needs
    to know and do:
    1. What data was affected
    2. Who was affected
    3. What risks they face
    4. What the controller is doing about it
    5. When it was discovered
    6. Who to contact for information
    7. What the data subject can do to protect themselves

    **Communication method hierarchy:**
    1. Individual electronic communication (email, app notification)
    2. If individual notice is impractical: mass communication
       (website, apps, social media, customer service channels)

    **Language requirement:**
    Must be "clear and accessible" — no legal jargon, no technical
    language. The notification must be understandable by a lay person.

    **Timeline:** Same as ANPD notification (3 business days) unless
    the ANPD sets a different deadline.

    **Practical considerations:**
    - Pre-drafted templates in simple language save critical time
    - Email addresses/contact info must be current and verified
    - If email bounce rates are high, supplementary mass communication
      may be required
implementation_guidance:
  platform_engineering:
    prose: |
      **Data subject notification infrastructure:**
      1. Implement mass notification capabilities (email, SMS, push
         notification) that can reach all affected data subjects
         within the 3-business-day window.
      2. Maintain verified contact information for data subjects
         to ensure notifications are deliverable.
      3. Implement notification delivery tracking (open rates,
         bounce rates) to assess whether individual notification
         was effective or mass communication is needed.
      4. Deploy self-service portal where data subjects can check
         if they were affected by a specific incident.
      5. Implement notification content management system with
         pre-approved templates in plain language (pt-BR).
    tools:
      - mass-notification
      - contact-management
      - delivery-tracking
      - self-service-portal
  devsecops:
    prose: |
      **Notification application readiness:**
      1. Implement notification API endpoints that can be triggered
         by the incident response process to send mass notifications.
      2. Ensure notification templates are version-controlled and
         can be rapidly deployed to production.
      3. Test notification delivery at scale regularly to verify
         infrastructure can handle mass notification scenarios.
      4. Implement A/B testing for notification clarity to ensure
         "clear and accessible" language requirements are met.
    tools:
      - notification-api
      - template-management
      - load-testing
      - usability-testing
  secops:
    prose: |
      **Data subject notification process:**
      1. Pre-draft notification templates in clear, non-technical
         pt-BR language for common incident types (data breach,
         unauthorized access, ransomware, data exposure).
      2. Include actionable recommendations for data subjects
         (change passwords, monitor bank statements, freeze credit)
         tailored to the type of data compromised.
      3. Establish criteria for when individual notification is
         impractical and mass communication is justified.
      4. Coordinate notification timing with ANPD — in some cases
         ANPD may instruct delay or modification of data subject
         notification.
      5. Prepare FAQ and customer service scripts for inbound
         inquiries following notification.
    tools:
      - notification-templates
      - customer-service
      - crisis-communication
      - faq-management
