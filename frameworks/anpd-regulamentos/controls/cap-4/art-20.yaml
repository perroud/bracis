id: art-20
family: cap-4
title: "ANPD Post-Notification Powers"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 20. Após o recebimento da comunicação de incidente de segurança,
    a ANPD poderá:

    I — determinar ao controlador a adoção de providências adicionais,
    incluindo a ampla divulgação do fato em meios de comunicação;

    II — determinar a comunicação aos titulares quando o controlador
    não a tiver realizado;

    III — solicitar informações complementares ao controlador sobre
    o incidente;

    IV — determinar ao controlador a elaboração de relatório de impacto
    à proteção de dados pessoais referente ao incidente;

    V — verificar a adequação das medidas técnicas e administrativas
    de segurança adotadas pelo controlador;

    VI — aplicar as sanções administrativas previstas no art. 52 da
    LGPD, quando cabível.

    Parágrafo único. As determinações da ANPD previstas neste artigo
    devem ser cumpridas pelo controlador nos prazos fixados pela
    Autoridade.
guidance:
  prose: |
    Art. 20 defines what the ANPD can do after receiving an incident
    notification. The controller must be prepared for all these
    post-notification actions.

    **ANPD post-notification powers:**
    1. Order public disclosure (I) — broader than data subject notice
    2. Order data subject notification (II) — if controller did not
    3. Request additional information (III) — supplementary questions
    4. Order DPIA/RIPD (IV) — formal impact assessment
    5. Audit security measures (V) — verify controls adequacy
    6. Apply sanctions (VI) — if violation is confirmed

    **Compliance deadlines:**
    All ANPD orders must be complied with in the timeframes set by
    the ANPD. Non-compliance itself becomes an aggravating factor
    under art. 7 (descumprimento de obrigação imposta pela ANPD).

    **Strategic considerations:**
    - The initial notification quality directly impacts subsequent
      ANPD requests — thorough initial notification reduces follow-up
    - Having a DPIA/RIPD ready before ANPD requests it demonstrates
      proactive compliance
    - Security measure adequacy will be assessed against the
      organization's size and nature of processing, not against
      an absolute standard
implementation_guidance:
  platform_engineering:
    prose: |
      **Infrastructure readiness for ANPD post-notification demands:**
      1. Maintain capability to rapidly generate comprehensive DPIA/RIPD
         documents leveraging automated data mapping and risk assessment
         tools (for ANPD art. 20, IV requests).
      2. Implement security controls documentation that can demonstrate
         adequacy to ANPD auditors (art. 20, V).
      3. Maintain public disclosure infrastructure (website banner,
         notification pages) ready for ANPD-ordered public
         communications (art. 20, I).
      4. Implement rapid information gathering capabilities to respond
         to ANPD supplementary requests (art. 20, III) within
         ANPD-set deadlines.
    tools:
      - dpia-automation
      - security-documentation
      - public-disclosure
      - information-gathering
  devsecops:
    prose: |
      **Development documentation for ANPD scrutiny:**
      1. Maintain documented security architecture and controls for
         each system processing personal data, ready for ANPD review.
      2. Preserve security testing history (SAST, DAST, penetration
         test results) as evidence of security measure adequacy.
      3. Implement DPIA templates integrated with development
         workflows for rapid generation upon ANPD request.
      4. Maintain change logs showing security improvements made
         in response to or independently of incidents.
    tools:
      - security-documentation
      - testing-history
      - dpia-templates
      - change-logs
  secops:
    prose: |
      **Post-notification response preparedness:**
      1. Prepare response procedures for each of the six ANPD
         post-notification powers (art. 20, I-VI).
      2. Maintain pre-drafted DPIA/RIPD templates that can be
         completed rapidly when ANPD orders one (art. 20, IV).
      3. Prepare security adequacy documentation package showing
         controls in place, proportional to organization size
         and processing activities (art. 20, V).
      4. Establish internal SLAs for responding to ANPD
         supplementary information requests — recommend 48-hour
         turnaround for initial response.
      5. Engage external forensic experts on retainer for complex
         incident investigations that may be required by ANPD.
    tools:
      - response-procedures
      - dpia-management
      - security-assessment
      - forensic-retainer
legal_references:
  - framework_id: lgpd
    articles: ["art-38", "art-48", "art-52"]
    relationship: implements
