id: art-21
family: cap-5
title: "Incident Record-Keeping"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 21. O controlador deverá manter registro de todos os
    incidentes de segurança com dados pessoais, inclusive daqueles
    que não tenham sido comunicados à ANPD e ao titular, pelo prazo
    mínimo de 5 (cinco) anos, contado a partir da data do registro
    do incidente.

    § 1º O registro de que trata o caput deverá conter, no mínimo:
    I — a data de conhecimento do incidente;
    II — a descrição geral das circunstâncias em que o incidente
    ocorreu;
    III — a natureza dos dados pessoais afetados;
    IV — o número de titulares afetados, quando possível;
    V — a avaliação do risco realizada pelo controlador;
    VI — as medidas de segurança adotadas para a proteção dos dados,
    antes e após o incidente;
    VII — os motivos da decisão de comunicação ou de não comunicação
    à ANPD e ao titular;
    VIII — as medidas adotadas para mitigar os efeitos do incidente.

    § 2º O registro deverá ser mantido de forma organizada e
    disponibilizado à ANPD quando solicitado.
guidance:
  prose: |
    Art. 21 mandates a comprehensive incident register — including
    incidents that were NOT reported to ANPD. This is one of the
    most operationally demanding requirements.

    **Scope:** ALL security incidents involving personal data, not
    just those meeting the notification threshold. Near-misses that
    did affect personal data but were assessed as low risk must
    also be recorded.

    **Retention:** Minimum 5 years from the date of registration.
    This aligns with the statute of limitations in art. 14.

    **Critical field: notification decision rationale (item VII):**
    For incidents NOT reported to ANPD, the controller must document
    WHY it decided not to notify. This rationale must withstand
    ANPD scrutiny if the register is requested. A weak rationale
    for non-notification can itself become a violation.

    **ANPD access:** The register must be organized and available
    upon ANPD request. This means it must be in a format the ANPD
    can review, not buried in SIEM logs or ticket systems.

    **Practical implication:** Every security event that touches
    personal data needs formal assessment, documentation, and
    retention — even if the conclusion is "no notification required."
implementation_guidance:
  platform_engineering:
    prose: |
      **Incident register infrastructure:**
      1. Implement a dedicated incident register system (or module
         within existing incident management) that captures all
         eight required fields from para. 1.
      2. Configure 5-year minimum retention with automated archival
         and tamper-evident storage for incident records.
      3. Implement automated incident detection that feeds into the
         register, ensuring no personal data incident goes unrecorded.
      4. Deploy automated data scope assessment that populates
         fields III (data nature) and IV (affected subjects count)
         from system metadata.
      5. Implement export capabilities that generate ANPD-readable
         reports from the incident register upon request.
    tools:
      - incident-register
      - immutable-storage
      - automated-detection
      - data-scope-assessment
      - reporting
  devsecops:
    prose: |
      **Development incident tracking:**
      1. Integrate security incident tracking with development
         workflows so that incidents discovered through code review,
         testing, or production monitoring are automatically captured.
      2. Implement post-deployment monitoring that detects potential
         data incidents and creates register entries.
      3. Maintain incident response runbooks that include mandatory
         steps for register entry creation.
      4. Link incident register entries to remediation commits
         and deployment records for complete traceability.
    tools:
      - incident-tracking
      - monitoring
      - runbooks
      - traceability
  secops:
    prose: |
      **Incident register management:**
      1. Establish a formal process for registering ALL personal data
         incidents within 24 hours of detection, regardless of
         severity or notification decision.
      2. Create a standardized template for incident register entries
         that covers all eight required fields.
      3. Implement quality review for non-notification rationale
         (field VII) — ensure it would withstand ANPD scrutiny.
      4. Conduct quarterly reviews of the incident register for
         completeness, accuracy, and identification of trends.
      5. Test ANPD register request response by generating complete
         register exports and reviewing for adequacy.
    tools:
      - incident-register
      - quality-review
      - trend-analysis
      - anpd-reporting
