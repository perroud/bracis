id: art-24
family: cap-5
title: "Coordination with Other Authorities"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 24. O controlador deverá, quando aplicável, comunicar a
    ocorrência de incidentes de segurança a outros órgãos e entidades
    competentes, nos termos da legislação específica, tais como:

    I — o Centro de Prevenção, Tratamento e Resposta a Incidentes
    Cibernéticos de Governo (CTIR Gov), quando se tratar de entidade
    da administração pública federal;

    II — o Centro de Estudos, Resposta e Tratamento de Incidentes de
    Segurança no Brasil (CERT.br), como referência de boas práticas;

    III — reguladores setoriais competentes, tais como o Banco Central
    do Brasil (BACEN), a Comissão de Valores Mobiliários (CVM), a
    Agência Nacional de Saúde Suplementar (ANS), a Agência Nacional
    de Telecomunicações (ANATEL) e outros, quando aplicável;

    IV — o Ministério Público, quando o incidente envolver ilícito
    penal;

    V — os órgãos de defesa do consumidor, quando o incidente afetar
    relações de consumo.

    Parágrafo único. A comunicação à ANPD não substitui nem dispensa
    a comunicação a outros órgãos competentes, nos termos da
    legislação aplicável.
guidance:
  prose: |
    Art. 24 addresses the multi-regulator notification landscape
    in Brazil. ANPD notification is only one of potentially many
    required notifications.

    **Notification to other authorities by sector:**
    - Financial sector: BACEN (Res. 4893/2021), CVM
    - Healthcare: ANS, ANVISA
    - Telecom: ANATEL (R-Ciber art. 15)
    - Government: CTIR Gov (mandatory for federal entities)
    - General: CERT.br (best practice, not mandatory)
    - Criminal: Ministério Público (when criminal conduct involved)
    - Consumer: Procon/SENACON (consumer relationship incidents)

    **Key principle (parágrafo único):**
    ANPD notification does NOT replace other notification obligations.
    Each regulator has its own notification requirements, deadlines,
    and formats. A single incident may require 3-5 separate
    notifications to different authorities.

    **CERT.br coordination:**
    While not mandatory, CERT.br notification is referenced as
    best practice. CERT.br provides technical assistance and
    coordinates national incident response.

    **Practical complexity:**
    Organizations must map their regulatory landscape and maintain
    parallel notification procedures for each applicable regulator.
implementation_guidance:
  platform_engineering:
    prose: |
      **Multi-authority notification infrastructure:**
      1. Implement notification workflow orchestration that manages
         parallel notifications to multiple authorities with
         different deadlines and content requirements.
      2. Deploy automated regulatory mapping that identifies which
         authorities must be notified based on incident type,
         affected data categories, and industry sector.
      3. Maintain separate notification templates for each authority
         (ANPD, BACEN, ANATEL, CERT.br, etc.) with pre-populated
         static fields.
      4. Implement notification tracking dashboard showing status
         of all required notifications per incident.
    tools:
      - notification-orchestration
      - regulatory-mapping
      - template-management
      - notification-tracking
  devsecops:
    prose: |
      **Cross-regulatory compliance in development:**
      1. Tag systems and data stores with applicable regulatory
         frameworks to automate notification requirement identification.
      2. Implement incident detection rules specific to each
         regulatory framework's notification triggers.
      3. Maintain regulatory requirement documentation alongside
         application documentation.
    tools:
      - regulatory-tagging
      - incident-rules
      - documentation
  secops:
    prose: |
      **Multi-regulator notification management:**
      1. Map all applicable regulators and their specific notification
         requirements (deadlines, content, format, channels).
      2. Create a notification matrix: incident type x authority x
         deadline x content requirements x submission channel.
      3. Establish pre-registered contacts and accounts with each
         applicable authority's notification system.
      4. Coordinate notification timing — some regulators may require
         notification before data subjects are informed.
      5. Maintain relationships with CERT.br for technical
         coordination during incidents.
      6. Train the incident response team on multi-authority
         notification procedures and potential conflicts.
    tools:
      - notification-matrix
      - regulatory-contacts
      - cert-br-coordination
      - training
