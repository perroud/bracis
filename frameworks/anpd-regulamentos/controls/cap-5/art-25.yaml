id: art-25
family: cap-5
title: "Post-Incident Review"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 25. O controlador deverá realizar avaliação interna após a
    ocorrência de incidente de segurança com dados pessoais, com o
    objetivo de:

    I — identificar as causas raízes do incidente;

    II — avaliar a eficácia das medidas de segurança existentes e das
    medidas de resposta adotadas;

    III — identificar e implementar melhorias nos processos, controles
    e procedimentos de segurança;

    IV — atualizar a avaliação de riscos da organização com base nas
    lições aprendidas;

    V — verificar a necessidade de atualização do plano de comunicação
    de incidentes e dos planos de resposta a incidentes.

    § 1º A avaliação interna de que trata o caput deverá ser
    documentada e mantida à disposição da ANPD.

    § 2º O controlador deverá implementar as medidas de melhoria
    identificadas na avaliação interna em prazo razoável, considerando
    a complexidade e os recursos necessários.

    § 3º A ANPD poderá determinar a realização de auditoria externa
    independente para avaliar a adequação das medidas de segurança
    adotadas pelo controlador.
guidance:
  prose: |
    Art. 25 mandates formal post-incident reviews (lessons learned /
    root cause analysis) and continuous improvement.

    **Mandatory post-incident review elements:**
    1. Root cause analysis (I) — technical and organizational causes
    2. Effectiveness assessment (II) — did existing controls and
       response procedures work?
    3. Improvement identification (III) — concrete changes needed
    4. Risk assessment update (IV) — incorporate lessons learned
    5. Plan updates (V) — update communication and response plans

    **Documentation and ANPD access (para. 1):**
    The review must be documented and available to ANPD. This means
    it must be a formal document, not just a meeting discussion.

    **Implementation timeline (para. 2):**
    Improvements must be implemented in "reasonable time" considering
    complexity and resources. This is subjective but ANPD will assess
    reasonableness.

    **External audit (para. 3):**
    ANPD can order an independent external audit of security measures.
    This is a significant power — the controller bears the cost.

    **Strategic value:**
    Thorough post-incident reviews and implemented improvements are
    strong mitigating factors under art. 8 (internal mechanisms,
    corrective action, good faith) for any future incidents.
implementation_guidance:
  platform_engineering:
    prose: |
      **Post-incident technical review:**
      1. Implement automated forensic data collection that preserves
         evidence for root cause analysis (logs, network captures,
         system snapshots, memory dumps).
      2. Deploy vulnerability scanning and penetration testing
         post-incident to verify that eradication was complete
         and identify related vulnerabilities.
      3. Implement automated security control effectiveness testing
         (red team automation) to verify controls post-remediation.
      4. Deploy change tracking that documents all security
         improvements implemented as a result of the review.
      5. Update infrastructure-as-code and policy-as-code with
         improvements identified in the post-incident review.
    tools:
      - forensic-collection
      - vulnerability-scanning
      - red-team-automation
      - change-tracking
      - policy-as-code
  devsecops:
    prose: |
      **Development process improvements from incidents:**
      1. Incorporate root cause findings into security testing
         pipelines (add specific test cases for the vulnerability
         that caused the incident).
      2. Update secure coding guidelines based on incident findings.
      3. Implement regression tests that verify the specific
         vulnerability cannot recur.
      4. Update SAST/DAST rules to detect similar vulnerabilities
         across the codebase.
      5. Conduct security architecture review for systems similar
         to the affected one to identify related weaknesses.
    tools:
      - security-testing
      - coding-guidelines
      - regression-tests
      - architecture-review
  secops:
    prose: |
      **Formal post-incident review process:**
      1. Conduct structured post-incident review within 30 days
         of incident closure, involving all relevant teams
         (security, IT, legal, DPO, business).
      2. Document the review in a formal report covering all five
         mandatory elements from art. 25 (root cause, effectiveness,
         improvements, risk update, plan updates).
      3. Create an improvement action plan with owners, deadlines,
         and verification criteria for each identified improvement.
      4. Track improvement implementation to completion and verify
         effectiveness of implemented changes.
      5. Update organizational risk assessment incorporating
         lessons learned from the incident.
      6. Prepare for potential ANPD-ordered external audit by
         maintaining comprehensive documentation of all security
         measures and improvement actions.
    tools:
      - incident-review
      - improvement-tracking
      - risk-assessment
      - audit-preparation
      - documentation
