id: art-23
family: cap-5
title: "Incident Communication Plan"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 23. O controlador deverá manter plano de comunicação de
    incidentes de segurança com dados pessoais que contemple, no mínimo:

    I — os fluxos internos de comunicação entre as áreas envolvidas
    na resposta ao incidente;

    II — os procedimentos para comunicação à ANPD, nos prazos e
    condições previstos nesta Resolução;

    III — os procedimentos para comunicação aos titulares afetados,
    observadas as condições previstas nesta Resolução;

    IV — os procedimentos para comunicação a outros órgãos e
    entidades, quando aplicável, tais como o Ministério Público,
    órgãos de defesa do consumidor e reguladores setoriais;

    V — a identificação dos responsáveis por cada etapa do processo
    de comunicação;

    VI — os modelos e templates de comunicação para cada público-alvo.

    Parágrafo único. O plano de comunicação deverá ser revisado e
    atualizado periodicamente, em especial após a ocorrência de
    incidentes de segurança relevantes.
guidance:
  prose: |
    Art. 23 requires a formal, documented incident communication
    plan covering all internal and external stakeholders.

    **Required communication streams:**
    1. Internal (I): SOC, CSIRT, DPO, legal, management, business
    2. ANPD (II): Formal notification per arts. 16-17
    3. Data subjects (III): Individual or mass per art. 18
    4. Other authorities (IV): Ministério Público, Procon, BACEN,
       ANS, ANATEL, CERT.br, sectoral regulators
    5. Not mentioned but implied: media, partners, investors

    **Role assignment (V):**
    Each step must have a designated responsible person:
    - Who triggers the internal escalation?
    - Who drafts the ANPD notification?
    - Who approves the data subject notification?
    - Who communicates with media/investors?

    **Templates (VI):**
    Pre-approved templates for each audience save critical time
    during the 3-business-day notification window.

    **Periodic review:**
    The plan must be updated regularly and specifically after
    significant incidents (lessons learned).
implementation_guidance:
  platform_engineering:
    prose: |
      **Communication infrastructure:**
      1. Implement automated alerting and escalation workflows that
         trigger the incident communication plan automatically
         based on incident severity and classification.
      2. Deploy secure communication channels for incident response
         (out-of-band communications in case primary channels are
         compromised).
      3. Implement notification workflow orchestration that manages
         parallel communications to ANPD, data subjects, and
         other authorities with timeline tracking.
      4. Maintain communication template management system with
         version control and pre-approved content.
    tools:
      - alerting-automation
      - secure-communications
      - workflow-orchestration
      - template-management
  devsecops:
    prose: |
      **Communication plan integration with development:**
      1. Include incident communication procedures in application
         runbooks alongside technical incident response.
      2. Implement status page capabilities for transparent
         communication during incidents affecting services.
      3. Integrate notification triggers into monitoring and
         alerting pipelines.
      4. Maintain communication plan documentation in version
         control alongside technical documentation.
    tools:
      - runbooks
      - status-page
      - monitoring-integration
      - documentation
  secops:
    prose: |
      **Incident communication plan management:**
      1. Develop and maintain a comprehensive communication plan
         covering all six required elements from art. 23.
      2. Create templates for each audience: ANPD notification
         (per art. 17), data subject notification (per art. 18),
         Ministério Público notification, sectoral regulator
         notification, media statement, internal briefing.
      3. Assign primary and backup responsible persons for each
         communication stream with documented contact information.
      4. Conduct annual communication drills testing all streams
         simultaneously (tabletop exercise).
      5. Update the communication plan after every significant
         incident incorporating lessons learned.
    tools:
      - communication-plan
      - template-management
      - drill-management
      - lessons-learned
