id: art-22
family: cap-5
title: "Remediation Measures"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 22. O controlador deverá adotar, sem demora injustificada,
    medidas técnicas e administrativas aptas a proteger os dados
    pessoais afetados pelo incidente de segurança, incluindo:

    I — medidas de contenção para interromper ou limitar os efeitos
    do incidente;

    II — medidas de erradicação para eliminar a causa do incidente;

    III — medidas de recuperação para restaurar os sistemas e dados
    pessoais afetados ao seu estado normal de operação;

    IV — medidas preventivas para evitar a recorrência do incidente.

    § 1º As medidas de que trata o caput deverão ser proporcionais
    à natureza, à gravidade e ao impacto do incidente.

    § 2º O controlador deverá documentar todas as medidas adotadas
    e seus resultados, mantendo registro disponível para a ANPD.
guidance:
  prose: |
    Art. 22 mandates a structured remediation approach following
    the standard incident response lifecycle phases.

    **Four mandatory remediation phases:**
    1. **Containment (I):** Stop the bleeding — isolate compromised
       systems, revoke compromised credentials, block attack vectors
    2. **Eradication (II):** Remove the cause — patch vulnerabilities,
       remove malware, close unauthorized access paths
    3. **Recovery (III):** Restore normal operations — rebuild systems,
       restore data from backups, verify integrity
    4. **Prevention (IV):** Prevent recurrence — implement additional
       controls, update policies, address root cause

    **Proportionality principle (para. 1):**
    Remediation must be proportional to the incident. A minor
    data exposure from a single employee does not require the same
    response as a massive external breach.

    **Documentation requirement (para. 2):**
    ALL remediation actions must be documented with results. This
    creates the evidence trail for both the incident register
    (art. 21) and potential ANPD review (art. 20, V).

    **"Without undue delay":**
    Remediation must begin immediately upon incident detection.
    Delayed remediation is an aggravating factor under art. 7, IV.
implementation_guidance:
  platform_engineering:
    prose: |
      **Automated incident remediation capabilities:**
      1. Implement automated containment capabilities: network
         isolation, account lockout, firewall rule deployment,
         service shutdown via runbook automation.
      2. Deploy automated vulnerability patching for rapid eradication
         of known vulnerabilities exploited in incidents.
      3. Maintain tested backup and recovery procedures with defined
         RTO/RPO for all systems containing personal data.
      4. Implement infrastructure-as-code to enable rapid, verified
         rebuilding of compromised systems from known-good state.
      5. Deploy automated remediation documentation that logs all
         actions taken during incident response.
    tools:
      - containment-automation
      - patch-management
      - backup-recovery
      - infrastructure-as-code
      - remediation-logging
  devsecops:
    prose: |
      **Development remediation capabilities:**
      1. Maintain rapid deployment pipeline for emergency security
         patches (hotfix workflow bypassing normal gates with
         post-deployment review).
      2. Implement rollback capabilities for all production systems
         to enable rapid recovery to known-good state.
      3. Maintain secure, signed container images and artifacts
         for rebuilding compromised systems.
      4. Implement post-incident security hardening through CI/CD
         pipeline updates (additional scanning, stricter gates).
    tools:
      - hotfix-pipeline
      - rollback-automation
      - artifact-signing
      - pipeline-hardening
  secops:
    prose: |
      **Structured incident remediation process:**
      1. Maintain documented incident response playbooks covering
         all four remediation phases (containment, eradication,
         recovery, prevention) for common incident types.
      2. Establish clear decision authority for containment actions
         that may impact business operations (system isolation,
         service suspension).
      3. Implement remediation tracking with defined milestones and
         deadlines for each phase.
      4. Conduct remediation effectiveness validation — verify that
         containment stopped the incident, eradication removed the
         cause, and preventive measures are effective.
      5. Generate comprehensive remediation documentation for the
         incident register and potential ANPD review.
    tools:
      - incident-playbooks
      - remediation-tracking
      - effectiveness-validation
      - documentation
