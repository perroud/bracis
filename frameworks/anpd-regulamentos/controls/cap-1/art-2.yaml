id: art-2
family: cap-1
title: "Key Definitions for Enforcement"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 2º. Para os fins deste Regulamento, considera-se:

    I — infração: conduta que viole as disposições da LGPD praticada
    por agente de tratamento de dados pessoais;

    II — sanção administrativa: medida aplicada pela ANPD em decorrência
    de infração à LGPD, nos termos do art. 52;

    III — dosimetria: metodologia utilizada pela ANPD para definição
    do tipo e da gradação da sanção administrativa aplicável;

    IV — reincidência: prática de nova infração à LGPD pelo mesmo agente
    de tratamento, após decisão administrativa definitiva que tenha
    reconhecido infração anterior;

    V — boa-fé do infrator: conduta do agente de tratamento que
    demonstre ausência de intenção de violar a LGPD e adoção de
    medidas razoáveis para cumprimento da legislação;

    VI — vantagem auferida ou pretendida pelo infrator: benefício
    econômico obtido ou almejado pelo agente de tratamento em
    decorrência da infração.
guidance:
  prose: |
    Art. 2 provides the operational definitions that the ANPD uses
    when assessing violations and calculating sanctions.

    **Critical definitions for compliance:**
    - **Reincidência (recidivism):** A second violation after a final
      administrative decision on a prior one. This is an aggravating
      factor that can significantly increase sanctions.
    - **Boa-fé (good faith):** Demonstrating no intent to violate and
      having adopted reasonable measures. This is a key mitigating factor.
    - **Vantagem auferida (economic advantage):** The profit or benefit
      obtained from the violation. This directly impacts fine calculation.

    **Practical implications:**
    Organizations must maintain records of any prior ANPD decisions
    to accurately assess their risk profile and the potential severity
    of sanctions in case of new violations.
implementation_guidance:
  platform_engineering:
    prose: |
      **Evidence collection and auditability:**
      1. Implement comprehensive audit logging across all systems that
         process personal data, capturing who accessed what data, when,
         and for what purpose.
      2. Configure immutable log storage with tamper-evident mechanisms
         to preserve evidence of good-faith compliance efforts.
      3. Implement data lineage tracking to demonstrate lawful
         processing chains and identify the scope of any violation.
      4. Deploy monitoring for anomalous data access patterns that
         could indicate intentional misuse (relevant to "vantagem auferida").
    tools:
      - audit-logging
      - immutable-storage
      - data-lineage
      - anomaly-detection
  devsecops:
    prose: |
      **Compliance evidence in development artifacts:**
      1. Maintain version-controlled privacy impact assessments (PIAs)
         alongside code that processes personal data.
      2. Implement automated privacy checks in CI/CD pipelines to
         demonstrate ongoing good-faith compliance efforts.
      3. Record all compliance-related decisions in commit history and
         merge request discussions for audit trail purposes.
    tools:
      - gitlab-ci
      - compliance-evidence
      - pia-management
  secops:
    prose: |
      **Enforcement risk management:**
      1. Maintain a register of all ANPD interactions, decisions, and
         compliance orders to track reincidência risk.
      2. Conduct quarterly self-assessments against LGPD requirements
         to document good-faith compliance posture.
      3. Implement early warning system for potential violations to
         enable self-correction before ANPD enforcement.
      4. Calculate potential sanction exposure using the dosimetry
         criteria to prioritize remediation investments.
    tools:
      - grc-platform
      - risk-register
      - compliance-dashboard
legal_references:
  - framework_id: lgpd
    articles: ["art-52", "art-5"]
    relationship: implements
