id: art-4
family: cap-1
title: "Incident Notification Scope and Definitions"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 4º. Para os fins da Resolução CD/ANPD nº 15/2024, considera-se
    incidente de segurança com dados pessoais qualquer evento adverso
    confirmado, relacionado à violação na segurança de dados pessoais,
    tais como acesso não autorizado, acidental ou ilícito que resulte na
    destruição, perda, alteração, vazamento ou qualquer forma de tratamento
    inadequado ou ilícito, os quais possam ocasionar risco ou dano
    relevante aos titulares dos dados.

    § 1º O incidente de segurança abrange, entre outros:
    I — acesso não autorizado a dados pessoais armazenados em sistemas
    de informação;
    II — divulgação ou vazamento não autorizado de dados pessoais;
    III — alteração não autorizada de dados pessoais;
    IV — perda ou destruição não autorizada de dados pessoais;
    V — qualquer outra forma de tratamento inadequado ou ilícito
    de dados pessoais.

    § 2º O controlador deverá avaliar, sem demora injustificada, se o
    incidente de segurança é capaz de acarretar risco ou dano relevante
    aos titulares, considerando, entre outros fatores:
    I — a natureza e a categoria dos dados pessoais afetados;
    II — o volume de dados e de titulares afetados;
    III — a facilidade de identificação dos titulares;
    IV — as consequências concretas e prováveis do incidente.
guidance:
  prose: |
    Art. 4 (from Res. 15/2024) defines what constitutes a security
    incident requiring notification under LGPD art. 48.

    **Incident types covered:**
    - Unauthorized access (hacking, insider threat, misconfiguration)
    - Data leakage or disclosure (accidental email, exposed database)
    - Data alteration (integrity compromise, ransomware encryption)
    - Data loss or destruction (hardware failure without backup,
      ransomware with no recovery)
    - Any other form of unlawful processing

    **Risk assessment criteria (para. 2):**
    The controller must promptly assess whether the incident poses
    "relevant risk or harm" to data subjects by evaluating:
    1. Data sensitivity — sensitive data (health, biometric, financial)
       increases risk level
    2. Volume — large-scale incidents affect assessment
    3. Identifiability — direct identifiers vs. pseudonymized data
    4. Concrete consequences — financial loss, discrimination,
       physical harm potential

    **Timing:** The assessment must be performed "without undue delay"
    (sem demora injustificada), meaning immediately upon incident
    detection, not after full forensic investigation.
implementation_guidance:
  platform_engineering:
    prose: |
      **Automated incident detection and classification:**
      1. Deploy intrusion detection systems (IDS/IPS) and data loss
         prevention (DLP) tools to detect unauthorized access and
         data leakage events automatically.
      2. Implement database activity monitoring (DAM) for all
         repositories containing personal data.
      3. Configure real-time alerts for anomalous data access patterns
         (bulk exports, off-hours access, unusual query patterns).
      4. Implement automated incident classification that maps detected
         events to the incident types defined in para. 1 (access,
         disclosure, alteration, loss).
      5. Deploy file integrity monitoring (FIM) for personal data
         stores to detect unauthorized alterations.
    tools:
      - ids-ips
      - dlp
      - database-activity-monitoring
      - siem
      - fim
  devsecops:
    prose: |
      **Pipeline protections against incident types:**
      1. Implement secret detection in CI/CD to prevent accidental
         exposure of credentials that could lead to unauthorized access.
      2. Run SAST/DAST scans focused on data exposure vulnerabilities
         (injection flaws, broken access control, IDOR).
      3. Implement automated checks for personal data in logs, test
         fixtures, and non-production environments.
      4. Configure container scanning to detect vulnerable base images
         that could be exploited for data access.
    tools:
      - secret-detection
      - sast
      - dast
      - container-scanning
  secops:
    prose: |
      **Incident assessment and triage process:**
      1. Establish a documented incident triage procedure that applies
         the four-factor risk assessment from para. 2 (nature,
         volume, identifiability, consequences).
      2. Create pre-scored incident classification matrices mapping
         common incident scenarios to risk levels.
      3. Train the incident response team on ANPD-specific incident
         definitions and assessment criteria.
      4. Implement a decision tree for determining notification
         obligations within the first hours of incident detection.
      5. Maintain pre-approved templates for ANPD notification to
         reduce time-to-notification.
    tools:
      - incident-management
      - siem
      - notification-templates
      - decision-support
