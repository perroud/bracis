id: art-3
family: cap-1
title: "Relationship with LGPD Sanction Framework"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 3º. As sanções administrativas previstas no art. 52 da LGPD
    serão aplicadas pela ANPD observando-se os seguintes princípios:

    I — proporcionalidade entre a gravidade da falta e a intensidade
    da sanção;

    II — razoabilidade na aplicação das sanções, consideradas as
    circunstâncias do caso concreto;

    III — vedação ao bis in idem, impedindo-se a aplicação de sanção
    administrativa pela ANPD quando o agente de tratamento já tiver
    sido sancionado pelo mesmo fato por outro órgão ou entidade
    da administração pública;

    IV — individualização da sanção, considerando-se as condições
    específicas do agente de tratamento infrator.

    Parágrafo único. A aplicação das sanções previstas neste Regulamento
    não afasta a possibilidade de responsabilização civil ou penal
    do agente de tratamento, nos termos da legislação aplicável.
guidance:
  prose: |
    Art. 3 establishes the fundamental legal principles governing
    ANPD enforcement, providing constitutional safeguards.

    **Key principles:**
    - **Proportionality:** Sanctions must match the gravity of the
      violation. A minor procedural breach cannot receive the same
      sanction as a massive data breach.
    - **Reasonableness:** Context matters — the ANPD must consider
      the specific circumstances of each case.
    - **Ne bis in idem:** Prohibition of double punishment for the
      same fact by different public bodies. If BACEN already sanctioned
      a bank for a data incident, ANPD cannot sanction again for
      the same underlying facts.
    - **Individualization:** Each agent is assessed based on its own
      circumstances — size, resources, nature of processing.

    **Civil/criminal liability:**
    Administrative sanctions by ANPD do not prevent data subjects
    from pursuing civil damages or criminal authorities from pursuing
    criminal charges for the same conduct.
implementation_guidance:
  platform_engineering:
    prose: |
      **Proportional security controls:**
      1. Implement risk-based security controls proportional to the
         sensitivity of data processed and volume of data subjects.
      2. Apply tiered access controls where systems processing sensitive
         personal data (art. 5, II LGPD) receive stricter protections.
      3. Document the rationale for security control selection to
         demonstrate proportionality and reasonableness.
      4. Implement segregation of processing environments to limit
         blast radius of potential violations.
    tools:
      - access-management
      - environment-segregation
      - risk-classification
  devsecops:
    prose: |
      **Risk-proportional pipeline controls:**
      1. Apply stricter CI/CD gates for systems processing sensitive
         personal data (health, biometric, genetic, children's data).
      2. Implement different approval workflows based on the LGPD
         risk classification of the affected system.
      3. Maintain documentation linking each security control to its
         justification under the proportionality principle.
    tools:
      - gitlab-ci
      - approval-workflows
      - risk-based-gates
  secops:
    prose: |
      **Multi-regulator coordination:**
      1. Map which sectoral regulators (BACEN, ANS, ANATEL, CVM)
         have jurisdiction over the organization's data processing
         activities alongside ANPD.
      2. Track enforcement actions by all applicable regulators to
         leverage ne bis in idem protections where applicable.
      3. Maintain unified compliance records that serve multiple
         regulatory frameworks simultaneously.
      4. Coordinate incident response procedures across regulatory
         notification requirements.
    tools:
      - grc-platform
      - regulatory-tracker
      - multi-framework-compliance
legal_references:
