id: art-1
family: cap-1
title: "Scope and Purpose of Enforcement Regulations"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 1º. Este Regulamento estabelece os parâmetros e critérios para
    aplicação de sanções administrativas pela Autoridade Nacional de Proteção
    de Dados (ANPD), nos termos dos arts. 52, 53 e 54 da Lei nº 13.709,
    de 14 de agosto de 2018 (Lei Geral de Proteção de Dados Pessoais — LGPD).

    Parágrafo único. As disposições deste Regulamento aplicam-se aos processos
    administrativos sancionadores instaurados pela ANPD em face de agentes
    de tratamento de dados pessoais que descumprirem as disposições da LGPD.
guidance:
  prose: |
    Art. 1 establishes the scope of the dosimetry regulation as the
    authoritative instrument for ANPD to calculate and apply administrative
    sanctions under the LGPD.

    **Key scope elements:**
    - Applies to all data processing agents (controllers and processors)
    - Covers all sanction types defined in LGPD art. 52
    - Governs the sanctioning administrative process from investigation
      through final decision and appeal
    - Implements the dosimetry methodology required by LGPD art. 53

    **Relationship with LGPD:**
    The LGPD (arts. 52-54) defines the sanction types and general parameters
    but delegates to the ANPD the task of defining the specific methodology
    for sanction calculation. This regulation fulfills that delegation.
implementation_guidance:
  platform_engineering:
    prose: |
      **Data processing inventory and classification:**
      1. Maintain a comprehensive catalog of all personal data processing
         activities subject to LGPD, including data categories, purposes,
         legal bases, and data subjects affected.
      2. Implement automated data discovery and classification tools to
         identify personal data across infrastructure components.
      3. Tag infrastructure resources with metadata indicating LGPD
         applicability (data sensitivity level, processing purpose).
      4. Implement policy-as-code (OPA/Kyverno) to enforce that new
         deployments include LGPD classification metadata.
    tools:
      - data-discovery
      - cmdb
      - opa-gatekeeper
      - kyverno
  devsecops:
    prose: |
      **Compliance tracking in development lifecycle:**
      1. Maintain a mapping between code repositories and their LGPD
         data processing activities in the project metadata.
      2. Implement CI/CD gates that verify LGPD compliance documentation
         exists for services processing personal data.
      3. Create compliance labels/tags in version control to identify
         repositories subject to ANPD enforcement scope.
    tools:
      - gitlab-ci
      - compliance-pipeline
      - policy-as-code
  secops:
    prose: |
      **ANPD enforcement readiness program:**
      1. Designate a Data Protection Officer (DPO/Encarregado) as the
         primary contact for ANPD enforcement proceedings.
      2. Maintain an up-to-date Record of Processing Activities (ROPA)
         as required by LGPD art. 37.
      3. Map all controls implemented versus LGPD requirements in a
         compliance matrix updated quarterly.
      4. Establish internal procedures for responding to ANPD
         investigation requests within regulatory deadlines.
    tools:
      - grc-platform
      - ropa-management
      - compliance-dashboard
legal_references:
  - framework_id: lgpd
    articles: ["art-52", "art-53", "art-54"]
    relationship: implements
