id: art-9
family: cap-2
title: "Fine Calculation Formula"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 9º. A multa simples será calculada com base na seguinte
    metodologia:

    I — fixação do valor-base da multa, considerando-se a gravidade
    da infração classificada em leve, média ou grave;

    II — aplicação das circunstâncias agravantes e atenuantes previstas
    nos arts. 7º e 8º deste Regulamento ao valor-base;

    III — verificação do enquadramento do valor resultante nos limites
    previstos no inciso II do art. 52 da LGPD, a saber:
    a) até 2% (dois por cento) do faturamento da pessoa jurídica de
    direito privado, grupo ou conglomerado no Brasil, no seu último
    exercício, excluídos os tributos;
    b) limitada, no total, a R$ 50.000.000,00 (cinquenta milhões
    de reais) por infração.

    § 1º O valor-base da multa será fixado pela ANPD considerando:
    I — para infrações leves: de 0,1% a 0,5% do limite máximo previsto
    na alínea "a" do inciso III do caput;
    II — para infrações médias: de 0,5% a 1% do limite máximo previsto
    na alínea "a" do inciso III do caput;
    III — para infrações graves: de 1% a 2% do limite máximo previsto
    na alínea "a" do inciso III do caput.

    § 2º A multa diária será fixada pela ANPD considerando a
    gravidade da infração e a situação econômica do infrator,
    observados os limites previstos no inciso II do art. 52 da LGPD.
guidance:
  prose: |
    Art. 9 defines the three-step fine calculation methodology.

    **Step 1 — Base value by severity:**
    - Light violations: 0.1% to 0.5% of 2% revenue = 0.002% to 0.01% of revenue
    - Medium violations: 0.5% to 1% of 2% revenue = 0.01% to 0.02% of revenue
    - Severe violations: 1% to 2% of 2% revenue = 0.02% to 0.04% of revenue

    **Step 2 — Apply aggravating/mitigating factors:**
    Factors from arts. 7 and 8 adjust the base value up or down.
    Multiple aggravating factors can push towards the maximum;
    multiple mitigating factors can reduce significantly.

    **Step 3 — Cap verification:**
    - Revenue-based cap: 2% of gross revenue in Brazil (ex-taxes)
    - Absolute cap: R$50 million per violation
    - The lower of the two caps applies

    **Revenue calculation base:**
    - Legal entity, group, or conglomerate in Brazil
    - Last fiscal year
    - Gross revenue excluding taxes
    - For groups/conglomerates, uses consolidated Brazilian revenue

    **Practical example (R$1B revenue company):**
    - Cap = 2% of R$1B = R$20M (below R$50M absolute cap)
    - Severe violation base: 1-2% of R$20M = R$200K-R$400K
    - With aggravating factors: could reach R$20M
    - With mitigating factors: could reduce below R$200K
implementation_guidance:
  platform_engineering:
    prose: |
      **Controls that directly reduce fine severity classification:**
      1. Implement encryption and pseudonymization to reduce incident
         severity from grave to média or leve by limiting data exposure.
      2. Deploy automated access controls and data segregation to
         contain violations to smaller data scopes, reducing the
         "gravity of the violation" factor.
      3. Implement data minimization controls to reduce the volume
         of affected data in case of incident.
      4. Maintain comprehensive monitoring to demonstrate that
         technical measures were in place (reducing from grave
         to lower severity classification).
    tools:
      - encryption-management
      - pseudonymization
      - access-control
      - data-minimization
  devsecops:
    prose: |
      **Development controls that influence severity classification:**
      1. Implement comprehensive security testing to prevent violations
         that would be classified as grave (absence of security measures
         is an aggravating factor).
      2. Maintain rapid deployment capabilities to minimize violation
         duration (persistence is an aggravating factor under art. 7, IV).
      3. Implement automated compliance checks that prevent deployment
         of non-compliant code processing personal data.
    tools:
      - sast
      - dast
      - rapid-deployment
      - compliance-gates
  secops:
    prose: |
      **Fine exposure management:**
      1. Calculate the organization's maximum fine exposure annually
         (2% of Brazilian revenue, capped at R$50M) and report to
         board/executive management.
      2. Map current compliance gaps to severity classifications
         (leve, média, grave) to quantify financial risk.
      3. Prioritize compliance investments by fine reduction impact:
         focus on controls that move violations from grave to média
         or from média to leve.
      4. Maintain a register of all mitigating factors with evidence
         ready for presentation to ANPD in case of investigation.
      5. Conduct annual compliance risk quantification linking
         technical controls to fine reduction estimates.
    tools:
      - risk-quantification
      - grc-platform
      - compliance-dashboard
      - board-reporting
legal_references:
  - framework_id: lgpd
    articles: ["art-52"]
    relationship: implements
