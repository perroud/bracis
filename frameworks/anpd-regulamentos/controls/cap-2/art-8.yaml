id: art-8
family: cap-2
title: "Mitigating Factors"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 8º. São circunstâncias atenuantes da sanção administrativa:

    I — a comprovada boa-fé do infrator;

    II — a cessação voluntária da infração antes da instauração do
    processo administrativo sancionador;

    III — a comunicação espontânea pelo infrator, antes da instauração
    do processo administrativo sancionador, da ocorrência do ato
    ilícito ou da infração e a adoção de medidas para redução dos
    danos dele decorrentes;

    IV — a cooperação do infrator com a investigação ou a fiscalização,
    prestando informações e documentos quando solicitados pela ANPD;

    V — a adoção demonstrada de mecanismos e procedimentos internos
    capazes de minimizar o dano, voltados ao tratamento seguro e
    adequado de dados;

    VI — a adoção de política de boas práticas e governança, nos
    termos do art. 50 da LGPD;

    VII — a pronta adoção de medidas corretivas;

    VIII — a ausência de reincidência;

    IX — a condição econômica do infrator, quando comprovada a
    insuficiência de recursos para o pagamento da multa.
guidance:
  prose: |
    Art. 8 defines nine mitigating factors that reduce sanction
    severity. These represent concrete actions organizations can
    take to minimize enforcement exposure.

    **Proactive mitigating factors (before any violation):**
    - Internal mechanisms (V) — technical and organizational measures
    - Governance program (VI) — documented under LGPD art. 50
    - Absence of recidivism (VIII) — clean compliance record

    **Reactive mitigating factors (during/after violation):**
    - Good faith (I) — demonstrating no intent
    - Voluntary cessation (II) — stopping violation before enforcement
    - Spontaneous communication (III) — self-reporting to ANPD
    - Cooperation (IV) — providing information when requested
    - Prompt corrective action (VII) — rapid remediation

    **Self-reporting benefit (factor III):**
    Spontaneous communication of a violation before ANPD opens an
    investigation is one of the strongest mitigating factors. This
    creates a strong incentive for self-reporting.

    **Governance program (factor VI):**
    LGPD art. 50 defines what constitutes a governance program
    (privacy policies, procedures, training, audits, incident
    response). Having a documented, implemented program is a
    significant mitigating factor.
implementation_guidance:
  platform_engineering:
    prose: |
      **Technical measures as mitigating evidence (factor V):**
      1. Implement and document comprehensive security controls:
         encryption, access control, monitoring, backup, DLP.
      2. Deploy automated compliance monitoring that continuously
         verifies controls are operational and effective.
      3. Maintain audit trails that demonstrate controls were
         active before, during, and after any incident.
      4. Implement automated anomaly detection that enables
         voluntary cessation (factor II) and self-reporting
         (factor III) by detecting violations early.
      5. Deploy automated remediation capabilities that demonstrate
         prompt corrective action (factor VII).
    tools:
      - security-controls
      - compliance-monitoring
      - audit-logging
      - anomaly-detection
      - auto-remediation
  devsecops:
    prose: |
      **Development governance as mitigating evidence (factor VI):**
      1. Implement privacy-by-design methodology with documented
         PIAs for all new features processing personal data.
      2. Maintain security scanning coverage (SAST, DAST, SCA,
         secrets, containers) across all repositories to demonstrate
         internal harm minimization mechanisms.
      3. Implement secure coding standards and training programs
         with documented completion records.
      4. Maintain rapid patching and deployment capabilities to
         demonstrate prompt corrective action capacity.
    tools:
      - gitlab-ci
      - sast
      - dast
      - dependency-scanning
      - secure-coding-training
  secops:
    prose: |
      **Governance program implementation (factors V, VI):**
      1. Develop and implement a comprehensive data protection
         governance program per LGPD art. 50 including: data
         protection policies, processing procedures, training
         program, audit program, incident response plan.
      2. Establish ANPD cooperation protocols with designated
         contacts and response SLAs (factor IV).
      3. Implement self-reporting procedures to enable spontaneous
         communication to ANPD when violations are detected
         (factor III) before enforcement begins.
      4. Create rapid response teams for prompt corrective action
         with defined response times per violation type (factor VII).
      5. Maintain comprehensive evidence repository organized by
         mitigating factor for rapid response to ANPD inquiries.
    tools:
      - grc-platform
      - training-management
      - compliance-evidence
      - incident-response
legal_references:
  - framework_id: lgpd
    articles: ["art-50", "art-52"]
    relationship: implements
