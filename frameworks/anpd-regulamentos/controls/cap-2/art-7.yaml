id: art-7
family: cap-2
title: "Aggravating Factors"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 7º. São circunstâncias agravantes da sanção administrativa:

    I — a reincidência específica, assim entendida a prática da mesma
    infração anteriormente reconhecida por decisão administrativa
    definitiva da ANPD;

    II — a reincidência genérica, assim entendida a prática de infração
    diversa anteriormente reconhecida por decisão administrativa
    definitiva da ANPD;

    III — o descumprimento de medida preventiva ou de obrigação imposta
    em processo administrativo anteriormente instaurado pela ANPD;

    IV — a duração da infração e a persistência na conduta infracional
    após o conhecimento pelo agente de tratamento;

    V — o tratamento de dados pessoais sensíveis, de dados de crianças,
    de adolescentes ou de idosos, quando relevante para a gravidade
    da infração;

    VI — o dolo ou culpa grave do agente de tratamento;

    VII — a ausência de medidas técnicas e administrativas de segurança
    da informação compatíveis com o porte e a atividade do agente;

    VIII — a utilização de meios fraudulentos ou artificiosos para
    a prática da infração ou para ocultar a infração;

    IX — a vantagem econômica auferida ou pretendida em razão da
    infração, quando demonstrada.
guidance:
  prose: |
    Art. 7 defines nine aggravating factors that increase sanction
    severity. These are the risk areas organizations must actively
    manage.

    **Highest-risk aggravating factors:**
    - **Specific recidivism (I):** Same violation type repeated.
      The ANPD will track prior decisions. Second offense for the
      same issue triggers maximum escalation.
    - **Sensitive data (V):** Health, biometric, genetic, racial,
      religious, political, sexual orientation data, or data of
      minors/elderly. Extra protection is expected.
    - **Intent or gross negligence (VI):** Deliberate violation or
      severe lack of care significantly increases sanctions.
    - **Absence of security measures (VII):** Not having baseline
      security controls proportional to organization size and
      activity is itself an aggravating factor.

    **Controllable aggravating factors:**
    Organizations can eliminate or reduce exposure to factors IV
    (persistence), VII (absent measures), and partially VI (negligence)
    through proactive compliance programs.

    **Uncontrollable aggravating factors:**
    Factors V (data type) and IX (economic advantage) are inherent
    to the business model and processing activities.
implementation_guidance:
  platform_engineering:
    prose: |
      **Eliminate absence of security measures (factor VII):**
      1. Implement baseline security controls proportional to
         organization size: encryption, access control, logging,
         monitoring, backup, patch management.
      2. Deploy enhanced protections for sensitive data categories
         (factor V): additional encryption layers, stricter access
         controls, audit logging for all access.
      3. Implement automated incident detection to minimize
         infraction duration (factor IV): the faster an issue is
         detected, the shorter its duration as an aggravating factor.
      4. Implement data classification that automatically identifies
         and tags sensitive data, children's data, and elderly
         persons' data for enhanced protection.
    tools:
      - encryption-management
      - access-control
      - data-classification
      - incident-detection
      - patch-management
  devsecops:
    prose: |
      **Development controls to prevent aggravating scenarios:**
      1. Implement mandatory security reviews for code handling
         sensitive personal data (children, health, biometric).
      2. Run automated scans that flag processing of sensitive
         data categories without enhanced protections.
      3. Enforce security testing gates that prevent deployment
         of services without baseline security measures.
      4. Implement rapid remediation workflows to minimize
         infraction duration once detected.
    tools:
      - code-review
      - sast
      - security-gates
      - remediation-workflows
  secops:
    prose: |
      **Aggravating factor risk management:**
      1. Maintain a register of all prior ANPD decisions and
         compliance orders to prevent recidivism (factors I, II, III).
      2. Implement immediate response procedures upon discovering
         a potential violation to stop persistence (factor IV).
      3. Conduct annual security maturity assessments to ensure
         measures are proportional to porte and activity (factor VII).
      4. Train personnel on the distinction between negligence and
         deliberate conduct to minimize intent-based risk (factor VI).
      5. Monitor for any internal practices that could be characterized
         as fraudulent or designed to conceal violations (factor VIII).
    tools:
      - grc-platform
      - security-assessment
      - training-platform
      - compliance-monitoring
legal_references:
  - framework_id: lgpd
    articles: ["art-52", "art-11", "art-14"]
    relationship: implements
