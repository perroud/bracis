id: art-10
family: cap-2
title: "Publicization of the Violation"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 10. A sanção de publicização da infração será aplicada quando
    a ANPD considerar que a divulgação da decisão condenatória é
    necessária para:

    I — resguardar os direitos dos titulares de dados pessoais;

    II — conferir transparência à atuação fiscalizatória da ANPD;

    III — prevenir a prática de novas infrações.

    § 1º A publicização da infração será realizada após a decisão
    administrativa definitiva, em sítio eletrônico da ANPD e por
    outros meios que a Autoridade considerar adequados.

    § 2º A publicização indicará, no mínimo:
    I — a identificação do agente de tratamento infrator;
    II — a descrição da infração cometida;
    III — a sanção aplicada;
    IV — as medidas corretivas determinadas, quando houver.

    § 3º A publicização será mantida pelo prazo determinado pela ANPD,
    considerando a gravidade da infração e suas consequências.
guidance:
  prose: |
    Art. 10 regulates the publicization sanction — mandatory public
    disclosure of the violation. This is often more damaging than
    fines due to reputational impact.

    **When publicization is applied:**
    - To protect data subjects' rights (enable them to take action)
    - To demonstrate ANPD enforcement activity (deterrence)
    - To prevent future violations by the agent and others

    **Content of publicization:**
    - Agent identification (company name)
    - Description of the violation
    - Sanction applied (including fine amount)
    - Corrective measures ordered

    **Reputational impact:**
    Publicization creates permanent public record of LGPD violation.
    This affects:
    - Customer trust and retention
    - B2B relationships (data processing agreements)
    - Investor confidence
    - Insurance premiums
    - Competitive positioning

    **Timing:** Only after final administrative decision (after appeals
    are exhausted or deadlines expire). Preliminary findings are not
    publicized.
implementation_guidance:
  platform_engineering:
    prose: |
      **Prevent violations leading to publicization:**
      1. Implement comprehensive security controls that demonstrate
         proactive compliance, making publicization less likely
         (ANPD considers existing measures in sanction selection).
      2. Deploy continuous compliance monitoring with automated
         alerts for deviations that could escalate to violations.
      3. Implement automated evidence collection that documents
         compliance posture continuously, supporting defense
         against publicization sanctions.
    tools:
      - compliance-monitoring
      - evidence-collection
      - security-controls
  devsecops:
    prose: |
      **Development practices that reduce publicization risk:**
      1. Maintain comprehensive security testing coverage to prevent
         vulnerabilities that could lead to publicizable incidents.
      2. Implement privacy-by-design with documented evidence to
         demonstrate good faith compliance efforts.
      3. Maintain rapid remediation capabilities to demonstrate
         prompt corrective action when issues are found.
    tools:
      - sast
      - dast
      - privacy-by-design
      - rapid-remediation
  secops:
    prose: |
      **Reputational risk management:**
      1. Include publicization scenarios in crisis communication
         planning and tabletop exercises.
      2. Prepare communication templates for stakeholders (customers,
         partners, investors) in case of publicization.
      3. Monitor ANPD's website for publicization decisions to track
         enforcement trends and precedents.
      4. Implement proactive compliance communication strategy to
         stakeholders to build reputational resilience.
      5. Engage legal counsel specialized in ANPD proceedings to
         challenge publicization sanctions during appeals when
         disproportionate to the violation.
    tools:
      - crisis-communication
      - anpd-monitoring
      - legal-management
      - stakeholder-communication
