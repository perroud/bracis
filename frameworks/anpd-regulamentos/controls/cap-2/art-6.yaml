id: art-6
family: cap-2
title: "Dosimetry Calculation Methodology"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 6º. A ANPD adotará metodologia de dosimetria que considere,
    para a definição da sanção aplicável e sua gradação, os seguintes
    parâmetros e critérios, nos termos do art. 52, § 1º, da LGPD:

    I — a gravidade e a natureza das infrações e dos direitos pessoais
    afetados;

    II — a boa-fé do infrator;

    III — a vantagem auferida ou pretendida pelo infrator;

    IV — a condição econômica do infrator;

    V — a reincidência;

    VI — o grau do dano;

    VII — a cooperação do infrator;

    VIII — a adoção reiterada e demonstrada de mecanismos e procedimentos
    internos capazes de minimizar o dano, voltados ao tratamento seguro
    e adequado de dados, em consonância com o disposto no inciso II do
    § 2º do art. 48 da LGPD;

    IX — a adoção de política de boas práticas e governança;

    X — a pronta adoção de medidas corretivas;

    XI — a proporcionalidade entre a gravidade da falta e a intensidade
    da sanção.
guidance:
  prose: |
    Art. 6 defines the eleven parameters the ANPD must evaluate
    when determining which sanction to apply and its severity.

    **Positive factors (reduce sanctions):**
    - Good faith (II) — no intent to violate
    - Cooperation with ANPD (VII) — proactive engagement
    - Internal mechanisms to minimize harm (VIII) — technical and
      organizational measures
    - Privacy governance program (IX) — documented policies
    - Prompt corrective action (X) — rapid remediation

    **Negative factors (increase sanctions):**
    - Gravity and nature of violation (I) — sensitive data, many subjects
    - Economic advantage obtained (III) — profit from the violation
    - Recidivism (V) — prior violations
    - Degree of harm (VI) — actual impact on data subjects

    **Neutral factors (contextual):**
    - Economic condition of the agent (IV) — ability to pay
    - Proportionality (XI) — overarching balancing principle

    **Strategic implication:**
    Organizations can directly influence 5 of the 11 parameters through
    proactive compliance investments (good faith, cooperation, internal
    mechanisms, governance program, corrective action).
implementation_guidance:
  platform_engineering:
    prose: |
      **Technical measures that serve as mitigating factors:**
      1. Implement encryption at rest and in transit for all personal
         data (demonstrates "mecanismos internos" — factor VIII).
      2. Deploy pseudonymization and anonymization capabilities to
         minimize harm potential (factor VIII).
      3. Implement automated data minimization controls that enforce
         purpose limitation and storage limitation.
      4. Maintain comprehensive security monitoring and alerting to
         demonstrate proactive harm minimization.
      5. Implement automated backup and recovery to demonstrate
         ability to restore data and minimize harm from incidents.
    tools:
      - encryption-management
      - pseudonymization
      - data-minimization
      - security-monitoring
      - backup-recovery
  devsecops:
    prose: |
      **Development practices as compliance evidence:**
      1. Implement privacy-by-design in SDLC with mandatory privacy
         impact assessments for new features (factor IX).
      2. Run comprehensive security scanning (SAST, DAST, SCA) to
         demonstrate internal harm minimization mechanisms (factor VIII).
      3. Maintain rapid deployment capabilities for security patches
         to demonstrate prompt corrective action (factor X).
      4. Document all privacy-related design decisions in version
         control to evidence good faith (factor II).
    tools:
      - gitlab-ci
      - sast
      - dast
      - dependency-scanning
      - rapid-deployment
  secops:
    prose: |
      **Governance program to maximize mitigating factors:**
      1. Implement and document a comprehensive data protection
         governance program (factor IX) including policies, training,
         audits, and continuous improvement.
      2. Establish cooperation protocols with ANPD including
         designated contacts and response procedures (factor VII).
      3. Create rapid response capabilities for corrective action
         with documented SLAs for different violation types (factor X).
      4. Conduct regular compliance audits to demonstrate ongoing
         good faith and internal mechanisms (factors II, VIII).
      5. Maintain evidence repository for all compliance activities
         organized by dosimetry parameter for rapid ANPD response.
    tools:
      - grc-platform
      - compliance-evidence
      - training-platform
      - audit-management
legal_references:
  - framework_id: lgpd
    articles: ["art-52", "art-48"]
    relationship: implements
