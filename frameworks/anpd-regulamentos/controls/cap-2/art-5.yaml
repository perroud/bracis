id: art-5
family: cap-2
title: "Administrative Sanction Types"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 5º. As sanções administrativas aplicáveis aos agentes de tratamento
    de dados pessoais, nos termos do art. 52 da LGPD, são:

    I — advertência, com indicação de prazo para adoção de medidas
    corretivas;

    II — multa simples, de até 2% (dois por cento) do faturamento da
    pessoa jurídica de direito privado, grupo ou conglomerado no Brasil
    no seu último exercício, excluídos os tributos, limitada, no total,
    a R$ 50.000.000,00 (cinquenta milhões de reais) por infração;

    III — multa diária, observado o limite total a que se refere o
    inciso II;

    IV — publicização da infração após devidamente apurada e confirmada
    a sua ocorrência;

    V — bloqueio dos dados pessoais a que se refere a infração até a
    sua regularização;

    VI — eliminação dos dados pessoais a que se refere a infração;

    VII — suspensão parcial do funcionamento do banco de dados a que se
    refere a infração pelo período máximo de 6 (seis) meses, prorrogável
    por igual período, até a regularização da atividade de tratamento
    pelo controlador;

    VIII — suspensão do exercício da atividade de tratamento dos dados
    pessoais a que se refere a infração pelo período máximo de 6 (seis)
    meses, prorrogável por igual período;

    IX — proibição parcial ou total do exercício de atividades
    relacionadas a tratamento de dados.
guidance:
  prose: |
    Art. 5 enumerates all nine sanction types available to the ANPD,
    ranging from warnings to complete prohibition of data processing.

    **Sanction severity hierarchy (least to most severe):**
    1. Warning with corrective deadline
    2. Simple fine (up to 2% revenue / R$50M cap)
    3. Daily fine (same cap as simple fine)
    4. Publicization of the violation
    5. Data blocking until regularization
    6. Data elimination
    7. Partial database suspension (up to 6+6 months)
    8. Processing activity suspension (up to 6+6 months)
    9. Partial or total prohibition of processing activities

    **Financial exposure:**
    - 2% of gross revenue in Brazil (excluding taxes) of the legal
      entity, group, or conglomerate
    - Hard cap of R$50 million per violation
    - Daily fines accumulate but are subject to the same R$50M cap

    **Operational sanctions (V-IX):**
    These are the most severe sanctions and can effectively halt
    business operations. Data blocking, elimination, and processing
    suspension can be existential threats to data-dependent businesses.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infrastructure readiness for operational sanctions:**
      1. Implement data isolation capabilities to support potential
         data blocking orders (ability to freeze access to specific
         datasets without destroying them).
      2. Design data deletion workflows that can execute court-ordered
         or ANPD-ordered data elimination with auditable proof.
      3. Implement database-level access controls that can selectively
         suspend processing for specific data categories.
      4. Maintain infrastructure-as-code configurations that allow
         rapid suspension and restoration of processing capabilities.
      5. Implement data export capabilities for data subjects before
         potential data elimination orders.
    tools:
      - data-isolation
      - deletion-workflows
      - access-management
      - infrastructure-as-code
  devsecops:
    prose: |
      **Application-level sanction compliance:**
      1. Implement feature flags that can disable data processing
         functionalities without full application shutdown.
      2. Design applications with data processing isolation so that
         ANPD-ordered suspensions can target specific processing
         activities without affecting unrelated functions.
      3. Implement secure data deletion capabilities verified through
         automated tests in the CI/CD pipeline.
      4. Maintain rollback capabilities for data processing changes
         ordered by ANPD within corrective deadlines.
    tools:
      - feature-flags
      - data-deletion-tests
      - rollback-automation
  secops:
    prose: |
      **Sanction risk assessment and preparedness:**
      1. Calculate the organization's maximum financial exposure under
         each fine scenario (2% revenue, R$50M cap) annually.
      2. Assess operational impact of each sanction type on business
         continuity and create response playbooks.
      3. Identify which processing activities are most critical and
         would cause greatest impact if suspended or prohibited.
      4. Establish legal reserve provisions for potential ANPD fines
         based on compliance risk assessment.
      5. Conduct tabletop exercises simulating receipt of each
         sanction type to test organizational readiness.
    tools:
      - risk-assessment
      - business-impact-analysis
      - incident-playbooks
legal_references:
