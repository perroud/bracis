id: art-15
family: cap-3
title: "Compliance Commitment Agreement"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 15. A ANPD poderá celebrar Termo de Ajustamento de Conduta
    (TAC) com o agente de tratamento, mediante o qual este se
    compromete a adequar sua conduta às exigências legais, mediante
    cominações, no prazo fixado no respectivo termo.

    § 1º O TAC poderá ser proposto pelo agente de tratamento ou pela
    ANPD, a qualquer tempo, antes da decisão administrativa de
    primeira instância.

    § 2º O TAC conterá, no mínimo:
    I — a descrição das obrigações assumidas pelo agente de tratamento;
    II — o prazo e as condições para cumprimento das obrigações;
    III — as sanções aplicáveis em caso de descumprimento;
    IV — a previsão de monitoramento do cumprimento das obrigações
    pela ANPD.

    § 3º A celebração do TAC suspende o processo administrativo
    sancionador.

    § 4º O cumprimento integral do TAC pelo agente de tratamento
    resultará no arquivamento do processo administrativo sancionador.

    § 5º O descumprimento do TAC pelo agente de tratamento acarretará
    a retomada do processo administrativo sancionador e poderá ser
    considerado circunstância agravante na dosimetria da sanção.
guidance:
  prose: |
    Art. 15 establishes the Compliance Commitment Agreement (TAC),
    a negotiated settlement mechanism between ANPD and the agent.

    **TAC benefits for the agent:**
    - Suspends the sanctioning process
    - Successful completion leads to case dismissal
    - Avoids formal sanctions and their public record
    - Allows the agent to set the remediation timeline

    **TAC risks:**
    - Non-compliance resumes the process AND becomes an aggravating
      factor (double penalty)
    - ANPD monitors compliance, requiring ongoing evidence
    - Commitments are legally binding

    **When to pursue a TAC:**
    - When the violation is clear and defense is weak
    - When the organization genuinely intends to remediate
    - When avoiding publicization is strategically important
    - When the cost of remediation is less than potential sanctions

    **When NOT to pursue a TAC:**
    - When the organization disputes the factual basis
    - When the organization cannot realistically meet commitments
    - When the TAC terms are more burdensome than likely sanctions

    **Timing:** A TAC can be proposed at any time before the first
    instance decision, by either party.
implementation_guidance:
  platform_engineering:
    prose: |
      **Technical remediation for TAC compliance:**
      1. Implement technical measures committed in the TAC with
         documented timelines and verification milestones.
      2. Deploy automated compliance monitoring that generates
         evidence of TAC obligation fulfillment.
      3. Implement dashboards showing progress on technical
         remediation commitments for both internal tracking
         and ANPD monitoring.
      4. Create automated reports demonstrating compliance status
         against TAC obligations on a scheduled basis.
    tools:
      - compliance-monitoring
      - remediation-tracking
      - compliance-dashboard
      - automated-reporting
  devsecops:
    prose: |
      **Development process improvements for TAC:**
      1. Implement security and privacy improvements committed
         in the TAC within development pipelines.
      2. Create automated compliance gates that enforce TAC
         obligations in the CI/CD process.
      3. Document all development process changes made to comply
         with TAC obligations.
      4. Implement automated testing that verifies TAC compliance
         requirements are met in each release.
    tools:
      - gitlab-ci
      - compliance-gates
      - automated-testing
      - process-documentation
  secops:
    prose: |
      **TAC negotiation and compliance management:**
      1. Conduct cost-benefit analysis comparing TAC commitments
         versus potential sanctions to inform negotiation.
      2. Ensure TAC commitments are realistic and achievable
         within proposed timelines before agreeing.
      3. Implement TAC compliance monitoring with regular progress
         reports to ANPD as required.
      4. Maintain evidence of TAC compliance for each obligation
         with timestamps and supporting documentation.
      5. Escalate immediately if any TAC commitment is at risk
         of non-compliance — renegotiate before missing deadlines.
    tools:
      - grc-platform
      - compliance-tracking
      - evidence-management
      - legal-management
legal_references:
