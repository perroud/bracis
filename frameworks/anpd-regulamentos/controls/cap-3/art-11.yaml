id: art-11
family: cap-3
title: "Investigation Procedures"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 11. O processo administrativo sancionador será instaurado pela
    ANPD mediante despacho fundamentado da autoridade competente, de
    ofício ou por provocação, observado o disposto na Lei nº 9.784,
    de 29 de janeiro de 1999.

    § 1º A instauração do processo administrativo sancionador poderá
    ser precedida de procedimento preparatório de caráter sigiloso,
    destinado a apurar indícios de infração à LGPD.

    § 2º No procedimento preparatório, a ANPD poderá:
    I — requisitar informações e documentos ao agente de tratamento
    investigado;
    II — realizar inspeções nos locais onde são realizadas as atividades
    de tratamento de dados pessoais;
    III — solicitar a elaboração de relatório de impacto à proteção
    de dados pessoais, nos termos do art. 38 da LGPD;
    IV — ouvir o agente de tratamento, testemunhas e peritos.

    § 3º O procedimento preparatório terá prazo máximo de 180 (cento
    e oitenta) dias, prorrogável por igual período, mediante
    justificativa fundamentada.
guidance:
  prose: |
    Art. 11 governs how the ANPD initiates and conducts enforcement
    investigations.

    **Investigation phases:**
    1. Preliminary procedure (confidential) — up to 180+180 days
    2. Formal sanctioning process — initiated by reasoned decision

    **ANPD investigative powers:**
    - Request information and documents from the data processing agent
    - Conduct on-site inspections of processing facilities
    - Request Data Protection Impact Assessment (DPIA/RIPD)
    - Interview the agent, witnesses, and experts

    **Triggers for investigation:**
    - Ex officio (ANPD's own initiative, monitoring, media reports)
    - Third-party complaint (data subjects, civil society)
    - Referral from other authorities (Ministério Público, Procon)

    **Preliminary procedure confidentiality:**
    The preparatory phase is confidential (sigiloso). The investigated
    agent may not know it is under investigation until formal process
    begins. However, information requests during this phase must be
    answered.

    **Timeline:** Maximum 360 days of preliminary investigation before
    the ANPD must either open formal proceedings or close the case.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infrastructure readiness for ANPD investigations:**
      1. Implement comprehensive audit logging with minimum 5-year
         retention for all systems processing personal data.
      2. Maintain data lineage documentation showing how personal
         data flows through infrastructure components.
      3. Implement rapid data export capabilities to respond to
         ANPD information requests within regulatory deadlines.
      4. Maintain infrastructure documentation (architecture diagrams,
         data flow maps, security controls inventory) ready for
         ANPD inspection.
      5. Implement access controls that can provide ANPD inspectors
         with read-only access to relevant systems during inspections.
    tools:
      - audit-logging
      - data-lineage
      - data-export
      - documentation
      - access-management
  devsecops:
    prose: |
      **Development artifact preservation for investigations:**
      1. Maintain complete version history of all code changes to
         systems processing personal data (never delete git history).
      2. Preserve CI/CD pipeline logs and security scan results
         for minimum 5 years.
      3. Maintain documentation of all privacy-related design
         decisions and impact assessments in version control.
      4. Implement DPIA/RIPD templates integrated into development
         workflows for rapid generation when requested by ANPD.
    tools:
      - version-control
      - pipeline-logs
      - dpia-templates
      - artifact-retention
  secops:
    prose: |
      **Investigation response preparedness:**
      1. Establish internal investigation response team with defined
         roles: legal counsel, DPO, IT, business units.
      2. Create ANPD information request response procedures with
         SLAs (information gathering, legal review, submission).
      3. Prepare pre-packaged compliance documentation sets that can
         be provided to ANPD upon request (ROPA, DPIA, policies,
         incident records, training records).
      4. Conduct annual mock investigation exercises to test
         organizational readiness for ANPD inquiries.
      5. Maintain relationship with external legal counsel specialized
         in ANPD proceedings.
    tools:
      - grc-platform
      - document-management
      - investigation-response
      - legal-management
legal_references:
