id: art-13
family: cap-3
title: "Appeals and Administrative Review"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 13. Da decisão de primeira instância que aplicar sanção
    administrativa, caberá recurso administrativo ao Conselho Diretor
    da ANPD, no prazo de 10 (dez) dias, contado da data da ciência
    da decisão.

    § 1º O recurso administrativo terá efeito suspensivo quanto à
    exigibilidade da sanção aplicada, até a decisão final do
    Conselho Diretor.

    § 2º O Conselho Diretor da ANPD poderá:
    I — manter a decisão recorrida;
    II — reformar a decisão recorrida, total ou parcialmente, para
    reduzir ou agravar a sanção aplicada;
    III — anular a decisão recorrida, por vício de legalidade;
    IV — determinar a realização de novas diligências ou a produção
    de provas adicionais.

    § 3º A decisão do Conselho Diretor da ANPD é definitiva na
    esfera administrativa, não cabendo novo recurso administrativo.
guidance:
  prose: |
    Art. 13 defines the appeals process within the ANPD.

    **Appeal structure:**
    - First instance: Coordenação-Geral de Fiscalização (CGF)
    - Appeal: Conselho Diretor da ANPD (Board of Directors)
    - No further administrative appeal after Board decision
    - Judicial review remains available after exhausting admin appeals

    **Key procedural aspects:**
    - 10-day appeal deadline from notice of decision
    - Suspensive effect — sanction is not enforceable during appeal
    - Board can maintain, reduce, increase, or annul the sanction
    - Board can order additional investigation

    **Reformatio in pejus risk:**
    The Board can increase the sanction on appeal (inciso II —
    "agravar a sanção"). Filing an appeal carries the risk of
    a worse outcome.

    **Post-administrative remedies:**
    After the Board's final decision, the agent can seek judicial
    review through Brazilian courts (mandado de segurança, ação
    anulatória). Judicial review can suspend enforcement.
implementation_guidance:
  platform_engineering:
    prose: |
      **Evidence preservation for appeals:**
      1. Maintain all technical evidence and system snapshots for
         a minimum period covering the full appeal timeline
         (investigation + first instance + appeal + judicial review).
      2. Implement evidence chain-of-custody controls to ensure
         admissibility throughout the appeals process.
      3. Maintain system documentation versioning that allows
         reconstructing the technical state at any point in time
         relevant to the appeal.
    tools:
      - evidence-preservation
      - chain-of-custody
      - system-snapshots
  devsecops:
    prose: |
      **Continuous compliance improvement during appeals:**
      1. Continue implementing corrective measures during appeal
         process to demonstrate good faith (even if sanction is
         suspended, improvements strengthen appeal position).
      2. Document all remediation actions taken after the initial
         decision to support appeal arguments.
      3. Maintain records of compliance improvements implemented
         as evidence for potential reduction of sanctions on appeal.
    tools:
      - remediation-tracking
      - compliance-improvements
      - evidence-collection
  secops:
    prose: |
      **Appeal process management:**
      1. Establish internal appeal review committee (legal, DPO,
         technical) that evaluates whether to appeal within the
         10-day window.
      2. Assess reformatio in pejus risk before filing appeal —
         analyze whether the Board might increase the sanction.
      3. Prepare comprehensive appeal documentation linking technical
         evidence to dosimetry factors and legal arguments.
      4. Track ANPD Board decisions and precedents to inform
         appeal strategy.
      5. Plan for potential judicial review if administrative
         appeal is unsuccessful.
    tools:
      - legal-management
      - precedent-tracking
      - appeal-management
