id: art-14
family: cap-3
title: "Statute of Limitations"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 14. A pretensão punitiva da ANPD prescreve em 5 (cinco) anos,
    contados da data da prática do ato ou, no caso de infração
    permanente ou continuada, do dia em que tiver cessado.

    § 1º Interrompe-se a prescrição:
    I — pela instauração do processo administrativo sancionador;
    II — pela notificação do agente de tratamento no âmbito de
    procedimento preparatório;
    III — pela prática de qualquer ato inequívoco pela ANPD que
    importe em apuração da infração.

    § 2º A prescrição intercorrente dar-se-á quando o processo
    administrativo sancionador ficar paralisado por mais de 3 (três)
    anos, pendente de julgamento ou despacho.

    § 3º A prescrição intercorrente será declarada de ofício ou a
    requerimento do agente de tratamento.
guidance:
  prose: |
    Art. 14 establishes time limits for ANPD enforcement actions.

    **Statute of limitations:**
    - 5 years from the date of the violation
    - For ongoing violations: 5 years from cessation date
    - Interrupted by: process initiation, agent notification,
      or any unequivocal investigative act by ANPD

    **Intercurrent prescription (procedural timeout):**
    - If the administrative process stalls for 3+ years without
      judgment or substantive action, it prescribes
    - Can be declared ex officio or upon request

    **Practical implications:**
    - Ongoing violations (e.g., continuous processing without legal
      basis) do not begin prescribing until the violation stops
    - Organizations should document the exact date violations are
      corrected to start the prescription clock
    - A notification during preliminary procedure interrupts
      prescription, resetting the 5-year clock

    **Record retention strategy:**
    Organizations should retain compliance evidence for at least
    5 years after any processing activity ceases, to cover the
    full prescription period.
implementation_guidance:
  platform_engineering:
    prose: |
      **Log and evidence retention aligned to prescription periods:**
      1. Configure log retention policies for minimum 5 years for
         all systems processing personal data, aligned with the
         prescription period.
      2. Implement immutable audit trails with timestamps that can
         demonstrate when specific processing activities started
         and stopped.
      3. Deploy automated retention management that preserves
         compliance-relevant data for the prescription period
         while respecting data minimization for personal data.
      4. Implement data lifecycle management that tracks processing
         cessation dates for prescription calculation.
    tools:
      - log-retention
      - immutable-storage
      - lifecycle-management
      - retention-policies
  devsecops:
    prose: |
      **Development artifact retention:**
      1. Configure version control history retention for the full
         prescription period (5 years minimum).
      2. Preserve CI/CD pipeline logs, security scan results, and
         deployment records for 5 years.
      3. Maintain deployment timestamps that document when specific
         code versions (and their processing behaviors) were active.
      4. Archive retired application code and documentation to
         support defense if historical processing is questioned.
    tools:
      - artifact-retention
      - pipeline-logs
      - deployment-history
      - code-archive
  secops:
    prose: |
      **Prescription tracking and management:**
      1. Maintain a register of all known compliance gaps and their
         remediation dates to calculate prescription windows.
      2. Track ANPD interactions (notifications, information requests)
         that interrupt prescription periods.
      3. Implement compliance evidence archival policy aligned with
         the 5-year prescription period plus reasonable buffer
         (recommend 7 years total retention).
      4. Monitor for intercurrent prescription opportunities in
         ongoing ANPD proceedings (3-year stall threshold).
      5. Document when all remediation actions are completed as
         the starting point for prescription calculation.
    tools:
      - compliance-register
      - prescription-tracking
      - evidence-archival
      - legal-management
legal_references:
  - framework_id: lgpd
    articles: ["art-52", "art-53"]
    relationship: implements
