id: art-12
family: cap-3
title: "Due Process and Defense Rights"
class: ANPD-REGULAMENTOS
baselines: [all-sectors]
statement:
  prose: |
    Art. 12. Instaurado o processo administrativo sancionador, o agente
    de tratamento será notificado para, no prazo de 30 (trinta) dias,
    apresentar defesa escrita e indicar as provas que pretende produzir.

    § 1º A notificação do agente de tratamento conterá:
    I — a identificação do processo administrativo;
    II — a descrição dos fatos apurados e das infrações imputadas;
    III — a indicação dos dispositivos legais e regulamentares
    supostamente violados;
    IV — a indicação das sanções passíveis de aplicação;
    V — o prazo para apresentação de defesa;
    VI — a advertência de que a não apresentação de defesa no prazo
    fixado importará em revelia.

    § 2º O agente de tratamento poderá, a qualquer tempo do processo,
    juntar documentos e pareceres, requerer diligências e perícias,
    e arrolar testemunhas.

    § 3º É assegurado ao agente de tratamento o direito de acesso
    aos autos do processo administrativo, ressalvadas as informações
    de caráter sigiloso.
guidance:
  prose: |
    Art. 12 establishes fundamental due process rights for entities
    under ANPD investigation, aligning with constitutional guarantees.

    **Key defense rights:**
    - 30-day deadline to present written defense after notification
    - Right to produce evidence (documents, expert opinions)
    - Right to request diligences and expert assessments
    - Right to present witnesses
    - Right to access case files (except confidential information)
    - Right to be informed of specific charges and applicable sanctions

    **Notification content requirements:**
    The ANPD must specify exactly which facts, legal provisions, and
    potential sanctions are at issue. Vague or generic notifications
    can be challenged as violating due process.

    **Default judgment (revelia):**
    Failure to respond within 30 days results in default. However,
    the agent can still present evidence later. Default means the
    ANPD's factual allegations are presumed true unless contradicted.

    **Strategic considerations:**
    The 30-day defense period is critical. Organizations must be
    prepared to mount a comprehensive defense within this window.
implementation_guidance:
  platform_engineering:
    prose: |
      **Technical evidence for defense:**
      1. Maintain comprehensive, tamper-evident audit logs that can
         demonstrate compliance actions taken before, during, and
         after the alleged violation.
      2. Implement automated compliance evidence collection that
         generates timestamped reports of security controls status.
      3. Preserve system configurations, access control matrices,
         and encryption status at regular intervals as point-in-time
         snapshots for defense evidence.
      4. Implement log integrity verification (hash chains, WORM
         storage) to ensure evidence admissibility.
    tools:
      - audit-logging
      - evidence-collection
      - configuration-snapshots
      - worm-storage
  devsecops:
    prose: |
      **Development evidence preservation:**
      1. Maintain immutable CI/CD pipeline execution records showing
         security scanning was active and findings were addressed.
      2. Preserve code review records demonstrating privacy-related
         reviews were conducted.
      3. Keep deployment logs and configuration change records as
         evidence of compliance controls.
      4. Maintain records of vulnerability remediation timelines.
    tools:
      - pipeline-logs
      - code-review-records
      - deployment-logs
      - vulnerability-tracking
  secops:
    prose: |
      **Defense preparation capabilities:**
      1. Maintain a "defense ready" evidence package updated quarterly
         containing: ROPA, policies, training records, audit reports,
         incident response records, DPIA/RIPD documents.
      2. Establish relationship with specialized legal counsel before
         any investigation begins (not after notification).
      3. Create internal rapid response procedure for ANPD
         notifications with 48-hour internal mobilization SLA.
      4. Train DPO and legal team on ANPD administrative process
         procedures and defense strategies.
      5. Maintain organized evidence repository indexed by LGPD
         article and dosimetry factor for rapid defense assembly.
    tools:
      - grc-platform
      - evidence-repository
      - legal-management
      - rapid-response
