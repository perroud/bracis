id: pii-g.2
family: pii-g
title: "Accountability and compliance evidence"
class: ISO27018

statement:
  prose: >-
    The public cloud PII processor shall maintain sufficient records and evidence
    to demonstrate compliance with its PII protection obligations. The public cloud
    PII processor shall make available to the cloud service customer all information
    necessary to demonstrate compliance with the obligations and allow for and
    contribute to audits, including inspections, conducted by the cloud service
    customer or an auditor mandated by the cloud service customer. The public cloud
    PII processor should obtain an independent third-party assessment of its PII
    protection practices and make the results available to cloud service customers.

guidance:
  prose: >-
    Accountability requires the processor to not only comply with PII protection
    requirements but to prove that compliance. This creates an evidence burden:
    the processor must maintain comprehensive, tamper-evident records of all PII
    processing activities, security controls, and compliance measures. The audit
    right enables the customer to verify compliance directly or through a mandated
    auditor. Third-party assessments (ISO 27001/27018 certification, SOC 2 Type II
    reports) provide standardized, independent evidence that reduces the need for
    individual customer audits. The processor should make compliance evidence
    available through self-service portals rather than requiring customers to
    submit formal audit requests for routine information. However, the right to
    conduct on-site audits must be preserved for situations requiring deeper
    investigation.

references:
  - citation: "ISO/IEC 27018:2019, Clause A.7.1"
    url: "https://www.iso.org/standard/76559.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build a compliance evidence management platform. Implement automated evidence
      collection that continuously gathers compliance artifacts: configuration
      snapshots, access control matrices, security scan results, policy enforcement
      logs, retention compliance reports, and incident records. Store evidence in
      tamper-evident storage with cryptographic integrity verification. Build
      customer-facing compliance portals that provide self-service access to
      evidence relevant to the customer's PII. Implement audit support tools
      that can generate scoped evidence packages for specific time periods or
      control domains. Automate SOC 2 and ISO 27018 evidence collection to
      reduce the operational burden of third-party assessments.
    tools:
      - compliance-evidence-platform
      - tamper-evident-storage
      - customer-compliance-portal
      - evidence-package-generator
      - soc2-automation
      - iso-audit-evidence-collector

  devsecops:
    prose: >-
      Integrate compliance evidence generation into the CI/CD pipeline. Every
      release should produce a compliance artifact that documents the security
      controls in effect, the PII processing paths, and the test results.
      Implement policy-as-code tests that generate machine-readable evidence
      of compliance at each deployment. Build compliance gates that block
      deployment if required evidence cannot be generated. Maintain version-
      controlled compliance documentation that is updated automatically as the
      system evolves. Include evidence generation in the definition of done for
      all PII-related features.
    tools:
      - gitlab-ci
      - compliance-artifact-generator
      - policy-as-code-tests
      - compliance-gates
      - automated-documentation
      - evidence-versioning

  secops:
    prose: >-
      Maintain the compliance evidence lifecycle. Ensure evidence is collected
      continuously and stored with retention periods aligned to audit
      requirements. Monitor evidence completeness and alert on gaps. Support
      customer audit requests by preparing and delivering evidence packages
      within the committed timeframe. Track third-party assessment schedules
      and ensure certifications remain current. Generate compliance dashboards
      that provide real-time visibility into the processor's compliance posture.
      Preserve evidence integrity through immutable storage and access logging.
    tools:
      - splunk
      - compliance-evidence-vault
      - evidence-completeness-monitor
      - audit-request-tracker
      - certification-lifecycle-manager
      - compliance-dashboard
      - immutable-log-storage

legal_references:
  - framework_id: gdpr
    articles: ["art-5.2", "art-28.3.h"]
    relationship: supports
  - framework_id: iso-27701
    articles: ["clause-5.1", "clause-7.1"]
    relationship: complements
