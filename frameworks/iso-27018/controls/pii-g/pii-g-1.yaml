id: pii-g.1
family: pii-g
title: "Breach notification for PII incidents"
class: ISO27018

statement:
  prose: >-
    The public cloud PII processor shall notify the cloud service customer without
    undue delay upon becoming aware of any security breach leading to the accidental
    or unlawful destruction, loss, alteration, unauthorized disclosure of, or access
    to PII transmitted, stored, or otherwise processed. The notification shall
    include the nature of the breach, the approximate number of PII principals
    affected, the categories of PII involved, the likely consequences, and the
    measures taken or proposed to address the breach and mitigate its effects. The
    public cloud PII processor shall cooperate with the cloud service customer in
    investigating and remediating the breach.

guidance:
  prose: >-
    Breach notification is time-critical. Many privacy regulations require the
    controller to notify the supervisory authority within 72 hours and PII
    principals without undue delay. The controller can only meet these deadlines
    if the processor detects and reports breaches promptly. "Without undue delay"
    means the processor should notify the customer as soon as it has reasonable
    confidence that a breach has occurred, even if the full scope is not yet
    determined. The initial notification can be supplemented with additional details
    as the investigation progresses. The processor must have the forensic
    capability to determine the scope and impact of a breach, including which
    specific PII records were affected. The cooperation obligation means the
    processor must dedicate resources to support the customer's breach response,
    including providing logs, access to affected systems, and technical expertise.

references:
  - citation: "ISO/IEC 27018:2019, Clause A.7"
    url: "https://www.iso.org/standard/76559.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build a breach detection and notification pipeline. Implement automated
      PII breach detection using anomaly detection on data access patterns,
      unauthorized data exfiltration signals, and security event correlation.
      Build notification workflows that automatically alert affected customers
      within a defined SLA (e.g., 24 hours of detection). Include structured
      breach reports with all required fields: nature, scope, affected PII
      categories, estimated number of principals affected, consequences, and
      remediation actions. Build forensic investigation tools that can determine
      which specific PII records were accessed or exfiltrated. Implement breach
      containment automation that can isolate affected systems, rotate credentials,
      and revoke access tokens.
    tools:
      - breach-detection-pipeline
      - automated-notification-service
      - forensic-investigation-toolkit
      - breach-containment-automation
      - structured-breach-reports
      - customer-communication-portal

  devsecops:
    prose: >-
      Implement security controls that enable rapid breach detection. Ensure
      comprehensive logging of all PII access with sufficient detail for forensic
      analysis. Build canary tokens and honeypot PII records that trigger
      immediate alerts when accessed. CI pipelines must validate that new PII
      access paths include proper logging. Implement breach simulation tests
      (tabletop and technical) as part of the release process. Code reviews must
      verify that error handling does not expose PII in logs or error messages
      that could exacerbate a breach.
    tools:
      - gitlab-ci
      - comprehensive-pii-logging
      - canary-tokens
      - breach-simulation-tests
      - error-handling-linter
      - logging-completeness-validator

  secops:
    prose: >-
      Operate 24/7 breach detection and response capabilities. Build SIEM
      correlation rules for PII breach indicators: mass data access, unauthorized
      exports, privilege escalation to PII-containing systems, and anomalous
      geographic access patterns. Maintain breach response runbooks with clear
      escalation paths and customer notification templates. Track breach
      notification SLAs and verify customers are notified within the committed
      timeframe. Conduct post-breach reviews and update detection rules based
      on lessons learned. Maintain a breach register with all incidents,
      regardless of severity.
    tools:
      - splunk
      - elastic-siem
      - breach-detection-rules
      - incident-response-platform
      - notification-sla-tracker
      - breach-register
      - post-incident-review

