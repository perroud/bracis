id: pii-b.2
family: pii-b
title: "Contractual specification of processing purposes"
class: ISO27018

statement:
  prose: >-
    The contract between the public cloud PII processor and the cloud service
    customer shall specify the subject-matter and duration of the processing, the
    nature and purpose of the processing, the type of PII and categories of PII
    principals, and the obligations and rights of the cloud service customer. The
    public cloud PII processor shall provide sufficient information to the cloud
    service customer to demonstrate compliance with the obligations laid down in
    the contract and to allow for and contribute to audits.

guidance:
  prose: >-
    Contracts are the legal and operational foundation of the controller-processor
    relationship. This control requires contracts to be specific and comprehensive,
    not generic templates that broadly authorize "data processing services." The
    contract must serve as the single source of truth for what the processor is
    permitted to do with PII. Audit rights are essential: the customer must be
    able to verify that the processor operates within the contractual boundaries.
    This can be achieved through a combination of on-site audits, third-party
    attestations (SOC 2, ISO 27001 certification), and continuous compliance
    monitoring via dashboards and logs. The processor must maintain evidence of
    compliance that the customer can inspect, including processing logs, access
    records, and security assessment results.

references:
  - citation: "ISO/IEC 27018:2019, Clause A.2.1"
    url: "https://www.iso.org/standard/76559.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement contract management as a platform capability. Store contractual
      processing specifications in a structured, machine-readable format that the
      policy engine can enforce. Build compliance evidence collection services that
      automatically gather processing logs, access records, security scan results,
      and configuration audit trails. Provide customer-facing compliance portals
      with real-time visibility into processing activities, security posture, and
      audit evidence. Implement tenant-scoped audit log exports so customers can
      download their complete processing history for independent verification.
      Build automated SOC 2 and ISO 27001 evidence collection pipelines.
    tools:
      - contract-management-service
      - compliance-evidence-collector
      - customer-compliance-portal
      - audit-log-export-api
      - evidence-automation-pipeline

  devsecops:
    prose: >-
      Implement compliance-as-code for contractual obligations. Each customer
      contract's processing specifications should be encoded as policy-as-code
      tests that run in CI. Build automated compliance verification that
      validates service behavior against contractual specifications. Generate
      compliance attestation artifacts as part of the release pipeline. Implement
      change impact analysis that evaluates how code changes affect compliance
      with customer contracts. Include contract compliance checks in the
      deployment approval workflow.
    tools:
      - gitlab-ci
      - compliance-as-code-framework
      - policy-test-suites
      - compliance-artifact-generator
      - change-impact-analyzer

  secops:
    prose: >-
      Continuously collect and organize compliance evidence. Maintain tamper-proof
      audit logs that demonstrate processing adheres to contractual specifications.
      Monitor for deviations from contractual boundaries and generate alerts.
      Support customer audit requests by providing pre-packaged evidence sets
      covering the audit period. Track third-party attestation schedules and
      ensure certifications remain current. Build compliance reporting that maps
      operational activities to specific contractual obligations.
    tools:
      - splunk
      - immutable-audit-log
      - compliance-evidence-vault
      - attestation-tracker
      - customer-audit-support

legal_references:
  - framework_id: gdpr
    articles: ["art-28.3", "art-28.9"]
    relationship: supports
  - framework_id: iso-27701
    articles: ["clause-8.1", "clause-8.2"]
    relationship: complements
