id: pii-h.2
family: pii-h
title: "Access control and authentication for PII systems"
class: ISO27018

statement:
  prose: >-
    The public cloud PII processor shall implement access control measures to ensure
    that PII is accessible only to authorized personnel with a demonstrated need to
    access the PII for the performance of their duties. The public cloud PII
    processor shall implement strong authentication for access to systems processing
    PII, including multi-factor authentication for administrative access. Access
    rights shall be reviewed periodically and revoked promptly when no longer
    required. The public cloud PII processor shall log all access to PII and make
    access logs available to the cloud service customer.

guidance:
  prose: >-
    Access control is the primary organizational safeguard for PII in cloud
    environments. The principle of least privilege must be strictly enforced:
    personnel should have access only to the specific PII they need for their
    specific role, and only for the duration required. Administrative access to
    systems containing PII represents the highest risk and must be protected
    with the strongest authentication mechanisms. Access logging creates
    accountability and supports audit and investigation. The customer must be
    able to review who accessed their PII and when, to fulfill their own
    accountability obligations. Periodic access reviews prevent the accumulation
    of unnecessary access rights over time (privilege creep). Access revocation
    must be immediate upon role change or termination to prevent unauthorized
    access by former employees or reassigned personnel.

references:
  - citation: "ISO/IEC 27018:2019, Clause A.8.1"
    url: "https://www.iso.org/standard/76559.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement role-based access control (RBAC) with PII-aware policies.
      Define PII access roles that are scoped to specific PII categories, customer
      tenants, and processing purposes. Enforce multi-factor authentication (MFA)
      for all access to PII processing systems and require hardware security keys
      for administrative access. Implement just-in-time (JIT) access provisioning
      that grants PII access only for the duration of a specific task with
      mandatory justification. Build comprehensive access logging that records
      who accessed what PII, when, from where, and for what purpose. Implement
      automated access reviews that flag stale permissions and require periodic
      re-certification. Provide customer-facing access log portals.
    tools:
      - rbac-policy-engine
      - mfa-enforcement
      - jit-access-provisioning
      - access-logging-service
      - access-review-automation
      - customer-access-log-portal
      - hardware-key-management

  devsecops:
    prose: >-
      Enforce access control best practices in the development lifecycle. CI
      pipelines must validate that infrastructure-as-code configurations enforce
      least-privilege access to PII stores. Static analysis should flag
      hardcoded credentials and overly broad database permissions. Implement
      automated access review for service accounts that access PII. Build
      integration tests that verify access control enforcement: unauthorized
      requests must be denied and logged. Code reviews must verify that PII
      access paths enforce authentication and authorization.
    tools:
      - gitlab-ci
      - semgrep
      - terraform-compliance
      - iac-access-validator
      - access-control-tests
      - credential-scanner
      - service-account-auditor

  secops:
    prose: >-
      Monitor PII access patterns for anomalies. Build detection rules for
      unusual access volumes, off-hours access, geographic anomalies, and
      privilege escalation to PII-containing systems. Track administrative access
      and verify JIT procedures are followed. Monitor authentication events and
      alert on MFA bypass attempts, credential stuffing, and brute force attacks
      against PII systems. Conduct periodic access reviews and enforce timely
      revocation of unnecessary access. Generate PII access audit reports for
      customer review.
    tools:
      - splunk
      - elastic-siem
      - ueba
      - access-anomaly-detection
      - mfa-compliance-monitor
      - access-review-tracker
      - pii-access-audit-reports

