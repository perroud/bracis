id: pii-e.2
family: pii-e
title: "Notification of government access and law enforcement requests"
class: ISO27018

statement:
  prose: >-
    The public cloud PII processor shall notify the cloud service customer of any
    legally binding request for disclosure of PII by a law enforcement authority or
    government body, unless such notification is legally prohibited. In the event of
    a prohibition on notification, the public cloud PII processor should take
    reasonable steps to challenge the prohibition where lawful to do so. The public
    cloud PII processor should publish a summary of government requests received,
    including the number and types of requests, to the extent permitted by law.

guidance:
  prose: >-
    Government access to cloud-stored PII is a critical transparency concern,
    especially in cross-border scenarios where the cloud processor may be subject
    to government demands from jurisdictions different from the cloud service
    customer's jurisdiction. This control requires the processor to be transparent
    about government requests and to act as a check against overbroad surveillance.
    The processor should not voluntarily disclose more PII than legally required
    and should challenge requests that are disproportionate. Transparency reports
    serve an important accountability function by allowing customers and the public
    to assess the frequency and scope of government access. The processor should
    have a documented process for evaluating government requests, including legal
    review before compliance.

references:
  - citation: "ISO/IEC 27018:2019, Clause A.5.1"
    url: "https://www.iso.org/standard/76559.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build a government request management system that tracks all law enforcement
      and government requests from receipt through resolution. Implement automated
      customer notification workflows that trigger immediately upon request receipt,
      with gag order detection that suppresses notification only when legally
      required. Build request evaluation workflows that route requests through
      legal review before any PII is disclosed. Implement minimum disclosure
      controls that produce only the specifically requested PII, not bulk data
      exports. Build transparency report generation that aggregates request
      statistics while protecting individual request confidentiality.
    tools:
      - government-request-management-system
      - customer-notification-workflow
      - legal-review-routing
      - minimum-disclosure-controls
      - transparency-report-generator

  devsecops:
    prose: >-
      Implement technical controls that support government request handling.
      Build PII extraction tools that can produce precisely scoped data exports
      for government requests without exposing unrelated PII. Implement audit
      trails for all government-request-related data access. CI pipelines should
      validate that government request handling code maintains proper access
      controls and logging. Build tests that verify the notification workflow
      triggers correctly and that data exports are scoped to the request.
    tools:
      - gitlab-ci
      - scoped-export-tools
      - audit-trail-system
      - notification-workflow-tests
      - access-control-validators

  secops:
    prose: >-
      Monitor government request handling for compliance with the notification
      policy. Alert on any PII disclosure to government entities that bypasses
      the formal request management system. Track notification timeliness and
      verify customers are notified within the committed timeframe. Audit
      government request responses to verify minimum disclosure. Monitor for
      bulk data access patterns that could indicate unauthorized government
      collection. Generate and publish transparency reports on the committed
      schedule.
    tools:
      - splunk
      - elastic-siem
      - government-access-monitor
      - notification-compliance-tracker
      - bulk-access-detector
      - transparency-report-dashboard

legal_references:
  - framework_id: gdpr
    articles: ["art-48", "art-49"]
    relationship: supports
  - framework_id: iso-27701
    articles: ["a-7.5.1"]
    relationship: complements
