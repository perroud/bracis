control_families:
  - id: pii-a
    title: "Consent and choice"
    description: >-
      Controls ensuring that PII principals are provided with clear, prominent,
      and easily accessible information about the cloud service provider's PII
      processing practices, and that consent is obtained where required.
    control_count: 2
  - id: pii-b
    title: "Purpose legitimacy and specification"
    description: "Controls ensuring that PII processing purposes are legitimate, specified, documented, and communicated to PII principals before processing occurs."
    control_count: 2
  - id: pii-c
    title: "Data minimization"
    description: "Controls limiting PII processing to the minimum necessary to fulfill the stated, legitimate purposes, including temporary file and document management."
    control_count: 2
  - id: pii-d
    title: "Use, retention and disclosure limitation"
    description: "Controls governing the use, retention, and disclosure of PII, ensuring processing is limited to documented instructions and that PII is not retained beyond the specified period."
    control_count: 3
  - id: pii-e
    title: "Openness, transparency and notice"
    description: "Controls requiring transparency about PII processing activities, including disclosure of sub-processors, jurisdictions, and any government access to PII."
    control_count: 2
  - id: pii-f
    title: "Individual participation and access"
    description: "Controls supporting PII principal rights to access, correct, and erase their PII, and providing mechanisms for exercising those rights."
    control_count: 2
  - id: pii-g
    title: "Accountability"
    description: "Controls establishing accountability for PII protection, including breach notification, evidence of compliance, and contractual obligations."
    control_count: 2
  - id: pii-h
    title: "Information security"
    description: "Controls extending ISO 27002 security measures specifically for PII protection in cloud environments, including encryption and access management."
    control_count: 2
  - id: pii-ext
    title: "Extended cloud PII controls"
    description: "Additional controls specific to public cloud PII processing, including data portability, return and disposal of PII, and geographic location of PII storage."
    control_count: 2

related_frameworks:
  - framework_id: iso-27001-2022
    relationship: derived-from
    description: "ISO 27018 is built on the ISO 27001/27002 control framework, extending it with PII-specific controls for public cloud processors."
  - framework_id: iso-27017
    relationship: complements
    description: "ISO 27017 provides cloud-specific security controls; ISO 27018 adds cloud-specific PII protection controls. Together they provide comprehensive cloud security and privacy."
  - framework_id: iso-27701
    relationship: complements
    description: "ISO 27701 establishes a Privacy Information Management System (PIMS); ISO 27018 provides operational PII protection controls for cloud processors that support PIMS implementation."
  - framework_id: gdpr
    relationship: supports
    description: "ISO 27018 controls directly support GDPR Article 28 processor obligations, Article 32 security of processing, and Article 44-49 cross-border transfer requirements."

