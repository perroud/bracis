id: iso-27018
title: >-
  ISO/IEC 27018:2019 — Information technology — Security techniques —
  Code of practice for protection of personally identifiable information
  (PII) in public clouds acting as PII processors
short_title: "ISO 27018:2019"
version: "2019"
publication_date: "2019-01-15"
last_updated: "2019-01-15"

authority:
  name: "International Organization for Standardization / International Electrotechnical Commission"
  acronym: "ISO/IEC"
  country: INTL
  url: "https://www.iso.org/standard/76559.html"

type: standard
scope: privacy
mandatory: false

original_language: en
available_languages:
  - en

industries:
  - technology
  - cloud-services
  - financial-services
  - healthcare
  - government
  - telecommunications

