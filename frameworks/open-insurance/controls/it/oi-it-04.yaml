id: oi-it-04
family: it
title: "Monitoramento e Reportes ao Ecossistema"
class: OPEN-INSURANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    Os participantes do Open Insurance devem implementar monitoramento abrangente
    de suas APIs e reportar métricas à governança do ecossistema, incluindo:

    I - Métricas de disponibilidade: uptime por API, por período;
    II - Métricas de performance: latência P50, P95 e P99 por endpoint;
    III - Métricas de volume: número de chamadas recebidas e realizadas por
    período, por participante;
    IV - Métricas de erros: taxa de erros por código de status (4xx, 5xx);
    V - Métricas de consentimento: consentimentos ativos, revogados, expirados,
    volume de compartilhamentos realizados;
    VI - Incidentes: reporte de incidentes de segurança e indisponibilidade
    conforme processo definido pela governança.

    O reporte deve ser automatizado e disponibilizado em formato padronizado
    definido pela governança. A SUSEP pode solicitar acesso direto aos dados
    de monitoramento para fins de fiscalização.
guidance:
  prose: |
    O monitoramento e o reporte sao essenciais para a governanca avaliar a saude
    do ecossistema e identificar participantes com problemas.

    As metricas devem ser coletadas de forma passiva (instrumentacao das APIs)
    e ativa (synthetic monitoring -- probes que simulam chamadas reais).

    O reporte de incidentes deve seguir processo formal com SLA de comunicacao:
    - Incidentes criticos (indisponibilidade total): comunicacao em ate 15 minutos
    - Incidentes altos (degradacao severa): comunicacao em ate 1 hora
    - Incidentes medios (degradacao parcial): comunicacao em ate 4 horas

    A SUSEP pode exigir dashboards de monitoramento em tempo real durante periodos
    de supervisao intensificada ou apos incidentes graves.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Instrumentar todas as APIs com metricas de latencia, taxa de erros e
         throughput (ex: Prometheus, Datadog).
      2. Implementar synthetic monitoring para validacao externa de disponibilidade.
      3. Configurar exportacao automatica de metricas no formato exigido pela
         governanca.
      4. Implementar dashboards operacionais e executivos de saude das APIs.
      5. Configurar alertas por severidade com escalonamento automatico.
    tools:
      - monitoring
      - synthetic-monitoring
      - alerting
      - dashboards
      - observability
  devsecops:
    prose: |
      1. Incluir instrumentacao de metricas como requisito de Definition of Done
         para novas APIs.
      2. Validar no pipeline que instrumentacao esta presente em todos os endpoints.
      3. Testes de integracao para exportacao de metricas (verificar que dados
         estao corretos e completos).
    tools:
      - observability
      - integration-testing
      - gitlab-ci
  secops:
    prose: |
      1. Gerar relatorios periodicos de metricas para reporte a governanca e SUSEP.
      2. Analisar tendencias de metricas para identificar degradacao progressiva.
      3. Gerenciar processo de comunicacao de incidentes conforme SLA definido.
      4. Manter historico de metricas para analise de tendencias e auditorias.
    tools:
      - reporting
      - siem
      - incident-management
      - trend-analysis
legal_references:
