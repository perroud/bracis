id: oi-cc-05
family: cc
title: "Gestao e Consulta de Consentimentos pelo Cliente"
class: OPEN-INSURANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    Os participantes do Open Insurance devem disponibilizar ao cliente mecanismo
    digital para consulta e gestão de todos os consentimentos vigentes, incluindo:

    I - Lista de todos os consentimentos ativos, com identificação da receptora,
    finalidade, categorias de dados, prazo de validade e data de autorização;
    II - Histórico de consentimentos expirados e revogados;
    III - Funcionalidade de revogação direta a partir da tela de gestão;
    IV - Funcionalidade de consulta ao histórico de acessos realizados pela
    receptora com base no consentimento.

    O mecanismo de gestão deve estar acessível por meio dos canais digitais da
    instituição (app, internet banking, portal) de forma intuitiva e sem custo
    para o cliente.
guidance:
  prose: |
    O painel de gestao de consentimentos e o mecanismo de transparencia e controle
    do cliente sobre seus dados no ecossistema. E similar ao dashboard de consentimentos
    do Open Finance.

    O historico de acessos e particularmente importante: o cliente deve poder ver
    quando, quantas vezes e quais dados a receptora acessou. Isso da visibilidade
    ao uso real dos dados e permite ao cliente detectar usos excessivos.

    A obrigacao de disponibilizar esse mecanismo se aplica tanto a transmissora
    (que gerencia os consentimentos dados por seus clientes) quanto a receptora
    (que deve informar ao cliente quais consentimentos possui com outras
    instituicoes).

    O historico de consentimentos revogados e expirados serve como registro para
    fins de auditoria e para que o cliente possa verificar que a revogacao foi
    efetivada.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Desenvolver painel de gestao de consentimentos integrado ao app/portal
         do cliente.
      2. Implementar API de consulta de consentimentos que retorna lista completa
         com metadados.
      3. Implementar API de consulta de log de acessos vinculado a cada consentimento.
      4. Armazenar historico completo de consentimentos (vigentes, expirados, revogados)
         com retencao minima de 5 anos.
      5. Integrar botao de revogacao diretamente no painel de gestao.
    tools:
      - consent-management
      - audit-logging
      - frontend-framework
      - api-gateway
  devsecops:
    prose: |
      1. Testes de usabilidade automatizados para a jornada de gestao de consentimentos.
      2. Testar que o painel exibe corretamente todos os consentimentos vigentes,
         expirados e revogados.
      3. Testar que o log de acessos e completo e preciso.
      4. DAST para o painel de gestao (XSS, CSRF, session management).
    tools:
      - e2e-testing
      - dast
      - accessibility-testing
      - gitlab-ci
  secops:
    prose: |
      1. Monitorar que o painel de gestao esta disponivel e funcional.
      2. Auditar completude dos logs de acesso vinculados a consentimentos.
      3. Verificar que consentimentos revogados via painel sao efetivados imediatamente.
    tools:
      - uptime-monitoring
      - audit-platform
      - compliance-dashboard
legal_references:
  - framework_id: lgpd
    articles: ["art-9", "art-18", "art-19"]
    relationship: complements
