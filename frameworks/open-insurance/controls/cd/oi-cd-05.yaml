id: oi-cd-05
family: cd
title: "Responsabilidades da Receptora de Dados"
class: OPEN-INSURANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    A instituição receptora de dados deve utilizar os dados recebidos exclusivamente
    para a finalidade autorizada no consentimento do cliente, observando:

    I - Vedação de uso dos dados para finalidades diversas das consentidas;
    II - Vedação de compartilhamento dos dados recebidos com terceiros sem novo
    consentimento específico do cliente;
    III - Obrigação de eliminar os dados quando o consentimento for revogado ou
    expirar, exceto quando houver outra base legal para retenção;
    IV - Obrigação de implementar medidas de segurança para proteger os dados
    recebidos contra acesso não autorizado, perda ou vazamento;
    V - Obrigação de manter registros das operações de tratamento realizadas
    com os dados recebidos.

    A receptora responde solidariamente por danos causados ao titular em razão
    do tratamento inadequado dos dados recebidos.
guidance:
  prose: |
    A responsabilidade da receptora e tao importante quanto a da transmissora. O
    ecossistema so funciona se ambas as partes cumprem suas obrigacoes.

    O principio da finalidade (LGPD art. 6, I) e central: a receptora so pode
    usar os dados para a finalidade especifica que motivou o consentimento. Se o
    cliente consentiu para receber cotacao de seguro auto, a receptora nao pode
    usar esses dados para marketing de outros produtos.

    A vedacao de compartilhamento em cadeia (re-sharing) e critica: a receptora
    nao pode repassar dados recebidos a terceiros sem novo consentimento. Isso
    previne o "efeito cascata" de compartilhamento nao autorizado.

    A responsabilidade solidaria significa que o cliente pode acionar judicialmente
    tanto a transmissora quanto a receptora em caso de dano.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar controle de finalidade que restringe o uso de dados recebidos
         ao escopo do consentimento.
      2. Implementar processo automatizado de eliminacao de dados quando consentimento
         e revogado ou expira (data retention policy).
      3. Segregar dados recebidos via Open Insurance de dados proprios, com controles
         de acesso diferenciados.
      4. Implementar logging de todas as operacoes realizadas com dados recebidos.
    tools:
      - data-governance
      - data-retention
      - access-control
      - audit-logging
  devsecops:
    prose: |
      1. Testes automatizados que verificam que dados recebidos via Open Insurance
         nao sao acessiveis por servicos nao autorizados.
      2. Validar no pipeline que processos de eliminacao de dados funcionam
         corretamente.
      3. SAST para detectar uso de dados de Open Insurance fora do escopo autorizado.
    tools:
      - sast
      - data-flow-analysis
      - integration-testing
      - gitlab-ci
  secops:
    prose: |
      1. Monitorar uso de dados recebidos via Open Insurance para detectar
         finalidades nao autorizadas.
      2. Auditar periodicamente que dados cujo consentimento foi revogado foram
         efetivamente eliminados.
      3. Implementar alertas para tentativas de re-sharing de dados.
    tools:
      - dlp
      - siem
      - audit-platform
      - data-governance
legal_references:
  - framework_id: lgpd
    articles: ["art-6", "art-15", "art-16", "art-42", "art-46"]
    relationship: complements
