id: oi-df-02
family: df
title: "Penalidades e Fiscalizacao pela SUSEP"
class: OPEN-INSURANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    O descumprimento das obrigações previstas na Circular SUSEP 635/2021 e na
    Resolução CNSP 415/2021 sujeita os participantes às sanções administrativas
    previstas na legislação do mercado de seguros, incluindo:

    I - Advertência pública;
    II - Multa administrativa, cujo valor será fixado pela SUSEP conforme
    gravidade da infração, porte do participante e reincidência;
    III - Suspensão parcial ou total da autorização para funcionamento;
    IV - Cassação da autorização para funcionamento, em casos de extrema
    gravidade.

    A SUSEP pode realizar fiscalização específica sobre a implementação e
    operação do Open Insurance, incluindo:
    I - Verificação de conformidade das APIs com especificações técnicas;
    II - Auditoria de processos de consentimento e compartilhamento;
    III - Verificação de controles de segurança;
    IV - Análise de incidentes reportados.

    Além das sanções administrativas, os participantes estão sujeitos à
    responsabilidade civil por danos causados a clientes em razão de falhas
    no compartilhamento de dados ou na iniciação de serviços.
guidance:
  prose: |
    O regime sancionatorio do Open Insurance segue a legislacao geral do mercado
    segurador (Decreto-Lei 73/1966, Lei Complementar 126/2007). A SUSEP tem amplo
    poder fiscalizatorio e sancionatorio.

    As multas podem ser significativas, podendo atingir valores proporcionais ao
    porte da instituicao. A reincidencia agrava a sancao.

    A fiscalizacao pode ser:
    - Ordinaria: verificacoes periodicas programadas
    - Extraordinaria: motivada por reclamacoes, incidentes ou denuncias
    - Tematica: focada em aspectos especificos do Open Insurance

    A responsabilidade civil por danos a clientes e independente da sancao
    administrativa. Um vazamento de dados via APIs do Open Insurance pode gerar:
    - Sancao administrativa pela SUSEP
    - Sancao administrativa pela ANPD (LGPD)
    - Acao civil de reparacao por danos morais e materiais
    - Acao coletiva por entidades de defesa do consumidor

    A preparacao para fiscalizacao exige documentacao robusta, logs detalhados
    e capacidade de demonstrar conformidade de forma rapida.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar sistema de geracao automatica de evidencias de compliance
         (logs, metricas, configuracoes, testes).
      2. Manter documentacao tecnica atualizada e acessivel para auditorias.
      3. Implementar self-assessment automatizado que verifica conformidade com
         requisitos regulatorios periodicamente.
      4. Configurar retencao de logs conforme exigencias regulatorias (minimo 5 anos).
    tools:
      - compliance-automation
      - log-management
      - documentation
      - self-assessment
  devsecops:
    prose: |
      1. Automatizar coleta de evidencias de conformidade no pipeline
         (resultados de SAST, DAST, testes de conformidade).
      2. Gerar relatorios de conformidade automaticos a cada release.
      3. Manter rastreabilidade entre requisitos regulatorios e implementacao
         tecnica (compliance-as-code).
    tools:
      - compliance-as-code
      - report-generation
      - traceability
      - gitlab-ci
  secops:
    prose: |
      1. Manter programa de compliance especifico para Open Insurance com
         monitoramento continuo.
      2. Preparar documentacao e evidencias para fiscalizacoes da SUSEP.
      3. Gerenciar processo de resposta a autos de infracao e defesas administrativas.
      4. Monitorar decisoes da SUSEP sobre Open Insurance para antecipar tendencias.
    tools:
      - grc-platform
      - evidence-management
      - legal-management
      - regulatory-monitoring
legal_references:
  - framework_id: lgpd
    articles: ["art-42", "art-52"]
    relationship: complements
  - framework_id: cnsp-416
    articles: ["art-37"]
    relationship: complements
