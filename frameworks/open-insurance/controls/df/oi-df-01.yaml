id: oi-df-01
family: df
title: "Cronograma de Implementacao em Fases"
class: OPEN-INSURANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    A implementação do Open Insurance ocorre em fases definidas pela SUSEP, com
    escopo crescente de dados e serviços:

    Fase 1 - Dados Abertos: disponibilização de APIs públicas com informações
    sobre produtos, canais de atendimento e redes referenciadas de seguradoras,
    EAPCs, sociedades de capitalização e resseguradores;

    Fase 2 - Dados de Clientes (consentimento): compartilhamento de dados
    cadastrais, apólices, sinistros, movimentações de previdência e capitalização,
    mediante consentimento do titular;

    Fase 3 - Serviços de Iniciação: cotação, contratação e endosso de produtos
    via iniciadores de serviços terceiros;

    Fase 4 - Outros serviços: demais funcionalidades definidas pela governança,
    incluindo portabilidade e serviços de valor agregado.

    Cada fase possui datas de início obrigatórias, com períodos de adaptação
    para testes em sandbox antes do go-live em produção. O descumprimento dos
    prazos de implementação pode gerar sanções administrativas pela SUSEP.
guidance:
  prose: |
    O cronograma de fases e estrategico para o planejamento tecnico. Cada fase
    exige investimentos significativos em infraestrutura, seguranca e integracao.

    As datas originais da Circular 635/2021 sofreram ajustes posteriores pela
    SUSEP, refletindo a complexidade de implementacao. E fundamental acompanhar
    as circulares e resolucoes atualizadas para datas vigentes.

    O ambiente de sandbox permite que participantes testem suas implementacoes
    antes do go-live. A participacao em sandbox e obrigatoria e serve como
    pre-requisito para operacao em producao.

    O planejamento interno deve considerar:
    - Tempo de desenvolvimento das APIs
    - Certificacao FAPI
    - Obtencao de certificados ICP-Brasil
    - Registro no Diretorio de Participantes
    - Testes de integracao com outros participantes em sandbox
    - Homologacao e go-live

    O nao cumprimento de prazos pode resultar em sancoes que vao de advertencia
    a multa, conforme regulamentacao da SUSEP.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Mapear todas as fases do cronograma e criar roadmap tecnico alinhado.
      2. Implementar ambientes de sandbox para cada fase antes do go-live.
      3. Planejar capacidade de infraestrutura considerando volume crescente de
         APIs e integracao.
      4. Implementar feature flags para ativar funcionalidades por fase.
      5. Garantir certificacao FAPI e registro no Diretorio antes da data de
         go-live de cada fase.
    tools:
      - project-management
      - feature-flags
      - infrastructure-planning
      - sandbox-environment
  devsecops:
    prose: |
      1. Definir pipelines de deploy separados para sandbox e producao.
      2. Automatizar testes de conformidade por fase (cada fase tem requisitos
         especificos).
      3. Pipeline de validacao pre-go-live com checklist regulatorio.
    tools:
      - gitlab-ci
      - compliance-testing
      - deployment-pipeline
  secops:
    prose: |
      1. Monitorar cronograma regulatorio e alertar sobre prazos proximos.
      2. Manter evidencias de conformidade com cada fase implementada.
      3. Preparar relatorios de adequacao para a SUSEP conforme exigido.
    tools:
      - compliance-calendar
      - grc-platform
      - evidence-management
legal_references:
  - framework_id: cnsp-381
    articles: ["art-1"]
    relationship: complements
