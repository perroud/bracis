id: oi-dg-04
family: dg
title: "Participantes Voluntarios e Requisitos de Adesao"
class: OPEN-INSURANCE
baselines: [participantes-voluntarios]
statement:
  prose: |
    Entidades não enquadradas como participantes obrigatórios podem aderir ao Open
    Insurance de forma voluntária, desde que cumpram integralmente os requisitos
    técnicos, de segurança e de governança previstos na regulamentação.

    Participantes voluntários estão sujeitos às mesmas obrigações técnicas e de
    segurança que os participantes obrigatórios, sem distinção quanto à qualidade
    do serviço, disponibilidade de APIs ou níveis de segurança.

    A adesão voluntária deve ser formalizada perante a estrutura de governança do
    Open Insurance e registrada no Diretório de Participantes.
guidance:
  prose: |
    A figura do participante voluntario permite que fintechs, insurtechs, corretoras
    digitais e outras entidades participem do ecossistema, promovendo inovacao e
    concorrencia.

    Embora a adesao seja voluntaria, uma vez feita, as obrigacoes sao identicas as
    dos participantes obrigatorios. Nao ha "adesao parcial" -- o participante voluntario
    deve cumprir todos os requisitos tecnicos, de seguranca e de governanca.

    Isso inclui: certificacao no Diretorio de Participantes, implementacao de APIs
    conforme especificacao, compliance com FAPI (Financial-grade API), certificados
    ICP-Brasil e monitoramento de SLA.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Avaliar custo-beneficio da adesao voluntaria considerando investimento em
         infraestrutura de APIs, certificados e monitoramento.
      2. Implementar stack tecnica completa conforme especificacoes do Open Insurance
         (mesma exigencia dos participantes obrigatorios).
      3. Obter registro no Diretorio de Participantes e configurar software statements.
    tools:
      - api-gateway
      - pki-management
      - cost-management
  devsecops:
    prose: |
      1. Configurar pipeline de conformidade identico ao de participantes obrigatorios.
      2. Validar todas as APIs contra especificacoes OpenAPI publicadas.
      3. Automatizar testes de certificacao FAPI.
    tools:
      - openapi-validator
      - fapi-conformance-suite
      - gitlab-ci
  secops:
    prose: |
      1. Manter mesmos niveis de monitoramento e resposta a incidentes que
         participantes obrigatorios.
      2. Documentar formalmente a decisao de adesao voluntaria com analise de riscos.
      3. Garantir capacidade de atender a fiscalizacao da SUSEP.
    tools:
      - grc-platform
      - incident-management
      - risk-assessment
legal_references:
  - framework_id: cnsp-381
    articles: ["art-3"]
    relationship: complements
