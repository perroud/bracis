id: oi-dg-03
family: dg
title: "Participantes Obrigatorios"
class: OPEN-INSURANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    São participantes obrigatórios do Open Insurance as sociedades seguradoras, as
    entidades abertas de previdência complementar (EAPCs), as sociedades de
    capitalização e os resseguradores locais que se enquadrem nos critérios definidos
    pela SUSEP, considerando porte, relevância sistêmica e complexidade de operações.

    Os participantes obrigatórios devem atuar como transmissores de dados e, quando
    aplicável, como receptores de dados e iniciadores de serviços, conforme o
    cronograma de implementação definido pela SUSEP.

    A SUSEP pode dispensar participantes de menor porte de determinadas obrigações,
    aplicando o princípio da proporcionalidade.
guidance:
  prose: |
    A obrigatoriedade de participacao e definida com base em criterios objetivos
    estabelecidos pela SUSEP, tipicamente vinculados a:
    - Volume de premios emitidos (seguradoras)
    - Volume de provisoes tecnicas (EAPCs)
    - Patrimonio liquido
    - Relevancia para o mercado

    A funcao minima obrigatoria e a de transmissora de dados -- ou seja, o participante
    deve ao menos expor APIs para que outras instituicoes possam acessar dados (com
    consentimento do cliente). A funcao de receptora e iniciadora pode ser exercida
    voluntariamente.

    O principio de proporcionalidade permite adequacao para empresas de menor porte,
    similar ao tratamento diferenciado previsto na CNSP 416 para controles internos.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Avaliar enquadramento da organizacao nos criterios de participacao obrigatoria.
      2. Implementar infraestrutura minima para funcao de transmissora: APIs de dados
         abertos e APIs de dados protegidos.
      3. Registrar-se no Diretorio de Participantes do Open Insurance.
      4. Provisionar certificados digitais ICP-Brasil para autenticacao no ecossistema.
    tools:
      - api-gateway
      - pki-management
      - service-registry
  devsecops:
    prose: |
      1. Automatizar a verificacao de conformidade das APIs com as especificacoes
         tecnicas obrigatorias publicadas pela SUSEP.
      2. Incluir no pipeline validacao de que todas as APIs obrigatorias estao
         implementadas e respondendo dentro do SLA.
      3. Testes de integracao com o Diretorio de Participantes.
    tools:
      - openapi-validator
      - integration-testing
      - gitlab-ci
  secops:
    prose: |
      1. Monitorar prazos regulatorios de implementacao de cada fase do Open Insurance.
      2. Reportar a SUSEP conforme exigido pelo cronograma de adequacao.
      3. Manter evidencias de conformidade com cada requisito obrigatorio.
    tools:
      - grc-platform
      - compliance-calendar
      - audit-trail
legal_references:
  - framework_id: cnsp-416
    articles: ["art-1", "art-3"]
    relationship: complements
  - framework_id: cnsp-381
    articles: ["art-2"]
    relationship: complements
