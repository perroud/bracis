id: oi-dg-01
family: dg
title: "Objeto e Ambito de Aplicacao do Open Insurance"
class: OPEN-INSURANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    A Circular SUSEP 635/2021, em conjunto com a Resolução CNSP 415/2021, institui o
    Sistema de Seguros Aberto (Open Insurance), que estabelece regras para o
    compartilhamento padronizado de dados e serviços entre participantes do mercado de
    seguros, previdência complementar aberta e capitalização, mediante consentimento
    do cliente, por meio de abertura e integração de sistemas via APIs.

    O Open Insurance tem como objetivos: (i) promover a concorrência no mercado de
    seguros; (ii) incentivar a inovação; (iii) aumentar a eficiência do mercado
    segurador; (iv) promover a cidadania financeira e a inclusão securitária.
guidance:
  prose: |
    O escopo do Open Insurance abrange todas as sociedades seguradoras, entidades
    abertas de previdencia complementar (EAPCs), sociedades de capitalizacao e
    resseguradores locais autorizados a funcionar pela SUSEP.

    Diferentemente do Open Finance (bancario), o Open Insurance trata de produtos com
    caracteristicas especificas: apolices de seguro, planos de previdencia, titulos de
    capitalizacao, cada um com ciclos de vida, sinistros e coberturas proprias.

    A regulamentacao segue o modelo de implementacao em fases (phase-in), com
    escopo crescente de dados e servicos compartilhados.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Mapear todos os sistemas que armazenam dados de seguros, previdencia e
         capitalizacao sujeitos ao compartilhamento.
      2. Criar inventario de APIs existentes e gap analysis para APIs obrigatorias
         do Open Insurance.
      3. Implementar API Gateway centralizado para gerenciar o trafego do Open Insurance.
      4. Definir arquitetura de microsservicos para expor dados conforme especificacoes
         tecnicas da SUSEP.
    tools:
      - api-gateway
      - service-mesh
      - api-catalog
      - data-catalog
  devsecops:
    prose: |
      1. Configurar pipelines CI/CD dedicados para APIs do Open Insurance com
         validacao automatica contra especificacoes OpenAPI da SUSEP.
      2. Implementar testes de contrato (contract testing) para garantir conformidade
         com os schemas definidos pelo ecossistema.
      3. Automatizar testes de seguranca (SAST/DAST) especificos para endpoints de API.
    tools:
      - openapi-validator
      - contract-testing
      - sast
      - dast
      - gitlab-ci
  secops:
    prose: |
      1. Monitorar compliance regulatorio com os prazos de implementacao das fases
         do Open Insurance.
      2. Manter registro de participantes com os quais dados sao compartilhados.
      3. Auditar periodicamente a conformidade das APIs com as especificacoes da SUSEP.
    tools:
      - grc-platform
      - api-monitoring
      - compliance-dashboard
