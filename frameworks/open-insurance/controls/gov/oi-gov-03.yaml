id: oi-gov-03
family: gov
title: "Resolucao de Disputas e Processo Sancionatorio"
class: OPEN-INSURANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    O ecossistema Open Insurance deve dispor de mecanismo de resolução de disputas
    entre participantes, que inclui:

    I - Mediação: tentativa de resolução consensual por meio do Secretariado;
    II - Arbitragem: decisão por painel técnico designado pela governança quando
    a mediação não alcança acordo;
    III - Processo sancionatório: instaurado quando há descumprimento das obrigações
    da convenção, com garantia de contraditório e ampla defesa;
    IV - Sanções aplicáveis: advertência, multa, suspensão temporária de funcionalidades
    e, em casos graves, exclusão do ecossistema.

    O processo de resolução de disputas não prejudica a competência da SUSEP para
    fiscalizar e sancionar participantes conforme legislação aplicável.

    Reclamações de clientes sobre o funcionamento do Open Insurance podem ser
    direcionadas à ouvidoria da instituição e, em última instância, à SUSEP.
guidance:
  prose: |
    O mecanismo de resolucao de disputas e essencial para o funcionamento harmonico
    do ecossistema. Disputas tipicas incluem:

    - Transmissora que nao cumpre SLA de disponibilidade
    - Receptora que usa dados fora da finalidade consentida
    - Divergencias sobre interpretacao de especificacoes tecnicas
    - Incidentes de seguranca que afetam multiplos participantes

    A gradacao de sancoes (advertencia > multa > suspensao > exclusao) permite
    resposta proporcional ao descumprimento. A suspensao temporaria pode afetar
    funcionalidades especificas (ex: suspender funcao de receptora mantendo
    funcao de transmissora).

    A competencia da SUSEP para sancoes regulatorias e independente e pode ser
    exercida cumulativamente. A SUSEP pode aplicar sancoes previstas na legislacao
    do mercado de seguros (Lei Complementar 126/2007, Decreto-Lei 73/1966).
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar mecanismo de coleta e armazenamento de evidencias de SLA e
         compliance para uso em eventuais disputas.
      2. Manter logs imutaveis de todas as interacoes com outros participantes.
      3. Implementar canal digital para reclamacoes de clientes sobre Open Insurance
         integrado a ouvidoria.
    tools:
      - audit-logging
      - evidence-management
      - complaint-management
  devsecops:
    prose: |
      1. Garantir integridade de logs e evidencias (hashing, timestamps confiavel).
      2. Implementar retencao de logs conforme politica de evidencias.
      3. Automatizar geracao de relatorios de conformidade para processos de auditoria.
    tools:
      - log-management
      - integrity-verification
      - gitlab-ci
  secops:
    prose: |
      1. Manter repositorio de evidencias de compliance para defesa em processos.
      2. Gerenciar processo de resposta a reclamacoes e disputas.
      3. Monitorar sancoes aplicadas a outros participantes para avaliar riscos
         de relacionamento.
    tools:
      - grc-platform
      - case-management
      - risk-assessment
legal_references:
  - framework_id: cnsp-416
    articles: ["art-37", "art-38"]
    relationship: complements
