id: oi-gov-01
family: gov
title: "Estrutura de Governanca do Open Insurance"
class: OPEN-INSURANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    O Open Insurance deve ser gerido por uma estrutura de governança definida pela
    SUSEP, composta por:

    I - Conselho Deliberativo: órgão máximo de governança, com representantes dos
    participantes, responsável por decisões estratégicas e aprovação de especificações;
    II - Secretariado: estrutura executiva responsável pela operação do ecossistema,
    gestão do Diretório de Participantes e suporte técnico;
    III - Grupos de Trabalho Técnicos (GTs): responsáveis pela elaboração e evolução
    das especificações técnicas de APIs, segurança e experiência do usuário;
    IV - Convênio de participantes: instrumento jurídico que formaliza as obrigações,
    direitos e deveres de cada participante no ecossistema.

    Todos os participantes obrigatórios devem aderir à convenção e participar das
    instâncias de governança conforme convocados. As decisões do Conselho Deliberativo
    são vinculantes para todos os participantes.
guidance:
  prose: |
    A estrutura de governanca do Open Insurance segue o modelo do Open Finance
    Brasil, com adaptacoes para o mercado segurador. A governanca e essencial para:

    - Padronizacao: garantir que todos os participantes implementem APIs compativeis
    - Evolucao: gerenciar versionamento e evolucao das especificacoes
    - Resolucao de conflitos: mediar disputas entre participantes
    - Compliance: monitorar conformidade dos participantes

    A participacao nas instancias de governanca e obrigatoria e pode ser fiscalizada
    pela SUSEP. O nao cumprimento de decisoes do Conselho Deliberativo pode gerar
    sancoes regulatorias.

    Os Grupos de Trabalho Tecnicos sao onde as especificacoes de API sao elaboradas.
    A participacao ativa nesses GTs e importante para influenciar decisoes tecnicas
    e antecipar mudancas.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Designar equipe tecnica para participacao nos GTs do Open Insurance.
      2. Implementar processo de acompanhamento de decisoes do Conselho Deliberativo
         e atualizacao de sistemas conforme novas especificacoes.
      3. Manter alinhamento entre roadmap tecnico interno e cronograma do ecossistema.
      4. Implementar feature flags para ativar mudancas de especificacao conforme
         cronograma de versao.
    tools:
      - project-management
      - feature-flags
      - api-versioning
  devsecops:
    prose: |
      1. Automatizar atualizacao de specs OpenAPI quando novas versoes sao publicadas
         pela governanca.
      2. Testes de conformidade automatizados contra versao vigente da especificacao.
      3. Pipeline de validacao de backward compatibility ao atualizar APIs.
    tools:
      - openapi-validator
      - contract-testing
      - gitlab-ci
  secops:
    prose: |
      1. Monitorar comunicacoes e decisoes da governanca do Open Insurance.
      2. Manter compliance com todas as deliberacoes vigentes.
      3. Reportar a governanca conforme exigido (metricas, incidentes, SLA).
    tools:
      - grc-platform
      - compliance-calendar
      - communication-management
legal_references:
  - framework_id: cnsp-416
    articles: ["art-31", "art-32"]
    relationship: complements
