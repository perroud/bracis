id: oi-gov-02
family: gov
title: "Convencao e Obrigacoes dos Participantes"
class: OPEN-INSURANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    Os participantes do Open Insurance devem aderir à convenção do ecossistema, que
    estabelece:

    I - Obrigações técnicas: implementação e manutenção de APIs conforme especificações,
    cumprimento de SLAs, atualização de software conforme evolução das especificações;
    II - Obrigações operacionais: registro e manutenção de dados no Diretório, resposta
    a incidentes, reporte de métricas e disponibilidade;
    III - Obrigações financeiras: contribuição para o custeio da estrutura de governança
    e do Diretório de Participantes;
    IV - Obrigações de resolução de disputas: submissão a mecanismo de resolução de
    conflitos definido na convenção antes de recorrer à via judicial;
    V - Sanções por descumprimento: a convenção prevê sanções progressivas para
    participantes inadimplentes, incluindo suspensão e exclusão do ecossistema.

    A adesão à convenção é condição para participação no ecossistema.
guidance:
  prose: |
    A convencao e o "contrato social" do Open Insurance. Ao aderir, o participante
    aceita todas as obrigacoes e se submete as regras do ecossistema.

    As obrigacoes financeiras incluem contribuicao para:
    - Manutencao do Diretorio de Participantes
    - Operacao do Secretariado
    - Custos de infraestrutura compartilhada
    - Testes de conformidade

    O valor da contribuicao e proporcional ao porte do participante (premios
    emitidos, provisoes tecnicas, etc.).

    O mecanismo de resolucao de disputas e importante para resolver conflitos
    tecnicos e operacionais entre participantes sem judicializacao (ex: uma
    transmissora que nao cumpre SLA, uma receptora que usa dados fora da
    finalidade consentida).

    As sancoes internas (convencao) nao excluem sancoes regulatorias (SUSEP),
    que podem ser aplicadas cumulativamente.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implementar mecanismo de reporte automatico de metricas de disponibilidade
         e performance para a governanca.
      2. Configurar dashboards de SLA para monitoramento interno e reporte externo.
      3. Implementar processo de atualizacao de APIs conforme decisoes da governanca,
         com janelas de manutencao coordenadas.
    tools:
      - monitoring
      - sla-dashboard
      - api-management
  devsecops:
    prose: |
      1. Automatizar coleta de metricas de SLA (disponibilidade, latencia, taxa de
         erros) por API.
      2. Pipeline de validacao de conformidade apos cada atualizacao de especificacao.
      3. Testes de integracao com relatorio automatico de conformidade.
    tools:
      - monitoring
      - compliance-testing
      - gitlab-ci
  secops:
    prose: |
      1. Monitorar cumprimento das obrigacoes da convencao (SLA, disponibilidade,
         resposta a incidentes).
      2. Gerenciar processo de reporte de incidentes conforme convencao.
      3. Manter documentacao de conformidade para auditorias da governanca.
    tools:
      - grc-platform
      - incident-management
      - compliance-dashboard
legal_references:
  - framework_id: cnsp-416
    articles: ["art-4", "art-31"]
    relationship: complements
