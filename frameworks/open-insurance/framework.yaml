control_families:
  - id: dg
    title: "Disposicoes Gerais"
    description: "Objeto, definicoes, participantes obrigatorios e voluntarios do ecossistema Open Insurance"
    articles: "art. 1 ao art. 5"
    control_count: 4
  - id: cd
    title: "Compartilhamento de Dados"
    description: "Dados cadastrais, apolices, sinistros, historico de produtos de seguros, previdencia e capitalizacao"
    articles: "art. 6 ao art. 12"
    control_count: 5
  - id: cc
    title: "Consentimento do Cliente"
    description: "Jornada de consentimento, prazo de validade, revogacao, granularidade e redirecionamento"
    articles: "art. 13 ao art. 18"
    control_count: 5
  - id: sa
    title: "Seguranca e Autenticacao"
    description: "APIs seguras, certificados digitais ICP-Brasil, OAuth 2.0, FAPI, mTLS, tokens de acesso"
    articles: "art. 19 ao art. 25"
    control_count: 5
  - id: gov
    title: "Governanca"
    description: "Estrutura de governanca, convencao, diretorio de participantes, deliberacao e resolucao de disputas"
    articles: "art. 26 ao art. 30"
    control_count: 3
  - id: it
    title: "Interoperabilidade Tecnica"
    description: "Padroes de APIs REST, SLA de disponibilidade, versionamento, formatos de dados e monitoramento"
    articles: "art. 31 ao art. 36"
    control_count: 4
  - id: si
    title: "Servicos de Iniciacao"
    description: "Cotacao, contratacao e endosso de produtos de seguros via participantes terceiros"
    articles: "art. 37 ao art. 40"
    control_count: 2
  - id: df
    title: "Disposicoes Finais"
    description: "Cronograma de implementacao em fases, penalidades, periodo de transicao e adequacao"
    articles: "art. 41 ao art. 45"
    control_count: 2
related_frameworks:
  - framework_id: open-finance
    relationship: equivalent-to
    description: >-
      O Open Insurance segue o modelo regulatorio do Open Finance
      (Resolucao Conjunta BCB/CMN n. 1/2020), aplicando os mesmos
      principios de compartilhamento padronizado de dados e servicos
      ao mercado de seguros, previdencia e capitalizacao.
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD fornece a base legal para o tratamento de dados pessoais
      compartilhados no ecossistema Open Insurance, especialmente nos
      requisitos de consentimento, finalidade, minimizacao e direitos
      do titular.
  - framework_id: cnsp-381
    relationship: complements
    description: "A CNSP 381 estabelece os requisitos de seguranca cibernetica que sustentam a protecao das APIs e dados compartilhados no Open Insurance."
  - framework_id: cnsp-416
    relationship: complements
    description: "A CNSP 416 define controles internos e gestao de riscos que complementam a governanca exigida pelo Open Insurance."
  - framework_id: susep-638
    relationship: complements
    description: "A Circular SUSEP 638 detalha requisitos de ciberseguranca que complementam os controles tecnicos das APIs do Open Insurance."
