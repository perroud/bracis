id: art-23
family: cap-4
title: "Requisitos da Auditoria Interna"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 23. As supervisionadas devem manter função de auditoria interna estruturada
    e independente, destinada a avaliar de forma objetiva a efetividade do SCI e
    da EGR, os processos de governança e os controles.

    § 1. A auditoria interna deve:
    I - operar com independência e objetividade, sem conflito de interesse com
    as áreas auditadas;
    II - ter autoridade para examinar quaisquer atividades, processos, sistemas
    e documentos da supervisionada;
    III - ter acesso irrestrito a todas as informações necessárias ao exercício
    de suas funções;
    IV - reportar funcionalmente ao conselho de administração ou ao comitê de auditoria.

    § 2. A auditoria interna deve dispor de recursos humanos, financeiros e
    tecnológicos adequados ao cumprimento de suas responsabilidades.
guidance:
  prose: |
    O art. 23 estabelece os pilares da auditoria interna: independencia, objetividade,
    autoridade e recursos adequados.

    **Independencia (inciso I):**
    A auditoria interna nao pode auditar areas onde tem responsabilidade operacional.
    O auditor-chefe (CAE — Chief Audit Executive) deve reportar ao conselho ou
    comite de auditoria — nao ao CEO ou CFO.

    **Autoridade ampla (incisos II e III):**
    Auditoria que nao pode ver determinados documentos ou sistemas nao e auditoria
    — e teatro. A autoridade deve ser formal (estatuto de auditoria aprovado).

    **Reporte ao conselho (inciso IV):**
    Reporte FUNCIONAL ao conselho (independencia) mas reporte ADMINISTRATIVO pode
    ser ao CEO (praticidade). A diferenca: quem aprova o orcamento e avalia o CAE.

    **Recursos adequados (ss 2):**
    Auditoria subfinanciada e auditoria ineficaz. O conselho deve garantir que a
    auditoria tem:
    - Equipe dimensionada para o universo de auditoria
    - Competencias tecnicas adequadas (atuaria, TI, seguros, riscos)
    - Ferramentas tecnologicas para audit data analytics
    - Orcamento para treinamento e certificacoes (CIA, CISA, ACII)
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de auditoria interna:**
      1. Audit management system para planejamento, execucao e reporte de auditorias.
      2. Acesso de auditoria a todos os sistemas em modo read-only: segregado e auditado.
      3. Audit data analytics: acesso a data warehouse para analises automatizadas.
      4. Gestao de achados: registro, acompanhamento, remediacao e verificacao.

      **Independencia tecnica:**
      5. Sistemas de auditoria separados dos sistemas operacionais.
      6. Audit trail de acesso do auditor a sistemas auditados.
      7. Repositorio de workpapers de auditoria com controle de versao e acesso restrito.
    tools:
      - audit-management
      - grc-platform
      - data-analytics
      - document-management
  devsecops:
    prose: |
      **Auditoria de sistemas e codigo:**
      1. Acesso read-only do time de auditoria a repositorios Git para auditoria de codigo.
      2. Logs de pipeline exportados para plataforma de auditoria.
      3. Audit data analytics: consultas a logs de sistema para testes de auditoria.
      4. CISA (Certified Information Systems Auditor) na equipe de auditoria interna.
    tools:
      - audit-management
      - git-repository
      - audit-logging
      - siem
  secops:
    prose: |
      **Estrutura da auditoria interna:**
      1. CAE (Chief Audit Executive) designado, com reporte funcional ao conselho.
      2. Estatuto de auditoria interna aprovado pelo conselho: missao, escopo, autoridade.
      3. Equipe dimensionada: ratio auditores/areas auditadas adequado ao porte.
      4. Qualificacoes: CIA obrigatorio para o CAE, CISA para auditores de TI.

      **Orcamento e recursos:**
      5. Orcamento aprovado pelo conselho (nao pela diretoria que e auditada).
      6. Plano de treinamento anual para equipe de auditoria.
      7. Ferramentas de audit data analytics: ACL, IDEA, ou equivalente.
      8. Acesso formal documentado a todos os sistemas necessarios.
    tools:
      - audit-management
      - data-analytics
      - grc-platform
