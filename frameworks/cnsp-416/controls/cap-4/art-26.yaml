id: art-26
family: cap-4
title: "Relatorio de Auditoria e Comunicacao de Achados"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 26. A auditoria interna deve emitir relatório para cada trabalho realizado,
    comunicando os achados, as conclusões e as recomendações ao órgão de governança
    competente e às áreas auditadas.

    § 1. O relatório de auditoria deve:
    I - apresentar os objetivos, escopo e período auditado;
    II - descrever os achados com base em evidências;
    III - apresentar a classificação de risco dos achados (crítico, alto, médio, baixo);
    IV - incluir recomendações específicas, práticas e priorizadas;
    V - registrar a manifestação da área auditada sobre os achados e o plano de ação.

    § 2. Achados classificados como críticos ou altos devem ser comunicados
    imediatamente ao CAE e, conforme a materialidade, ao comitê de auditoria
    ou ao conselho.

    § 3. A auditoria interna deve acompanhar a implementação dos planos de ação
    acordados e reportar o status periodicamente.
guidance:
  prose: |
    O art. 26 define o produto final da auditoria: o relatorio. Um bom relatorio
    de auditoria influencia decisoes — um mal relatorio e arquivado e esquecido.

    **Principios de um bom relatorio de auditoria:**
    1. Conciso: executivos nao tem tempo para relatorios de 100 paginas
    2. Orientado a risco: achados classificados por impacto, nao por area
    3. Acionavel: recomendacoes especificas, nao vagas
    4. Balanceado: mencionar tambem controles efetivos (credibilidade)
    5. Acordado: area auditada revisou e concorda com os fatos (pode discordar da conclusao)

    **Classificacao de achados (inciso III):**
    - Critico: pode causar perda material, insolvencia, fraude significativa ou
      violacao regulatoria grave. Acao imediata necessaria.
    - Alto: risco significativo de perda, fraude ou nao-conformidade. Correcao urgente.
    - Medio: risco moderado. Deve ser corrigido no ciclo normal.
    - Baixo: melhoria de processo sem impacto material. Considerar implementar.

    **Plano de acao acordado (inciso V):**
    A area auditada deve responder formalmente: (a) concordar com o achado?
    (b) qual o plano de acao? (c) quem e o responsavel? (d) qual o prazo?
    Auditoria acompanha e verifica se foi implementado.

    **Escalacao de criticos (ss 2):**
    Achados criticos nao podem esperar o relatorio formal. O CAE deve comunicar
    imediatamente ao conselho/comite de auditoria.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de achados e planos de acao:**
      1. Audit management system: registro de achados com classificacao, recomendacao,
         responsavel, prazo e evidencia de remediacao.
      2. Portal da area auditada: acesso para visualizar e responder achados.
      3. Workflow de concordancia/discordancia da area auditada com achados.
      4. Dashboard de achados abertos por prioridade e status de remediacao.

      **Escalacao automatica:**
      5. Alertas automaticos para achados criticos: email para CAE e comite de auditoria.
      6. SLA monitoring: achados criticos nao resolvidos disparam escalacao automatica.
      7. Relatorio automatico de status de planos de acao para conselho.
    tools:
      - audit-management
      - grc-platform
      - workflow-engine
      - reporting-platform
  devsecops:
    prose: |
      **Achados de auditoria de TI:**
      1. Achados de sistemas de TI e de pipeline no mesmo sistema de auditoria.
      2. Linkagem entre achado de auditoria e issue no GitLab para rastreabilidade.
      3. MR como evidencia de remediacao: auditoria verifica o merge do fix.
      4. Audit analytics de pipeline: quantos scans passaram/falharam no periodo?
    tools:
      - audit-management
      - gitlab-ci
      - issue-tracking
  secops:
    prose: |
      **Processo de emissao de relatorios:**
      1. Draft report: compartilhado com a area para fact-checking antes da versao final.
      2. Management response: area tem prazo para responder (ex: 10 dias uteis).
      3. Final report: emitido com management response incluida.
      4. Distribuicao controlada: lista de destinatarios por nivel de sensibilidade.

      **Follow-up de achados:**
      5. Follow-up trimestral de planos de acao: status por achado.
      6. Remediation verification: teste de que o achado foi realmente corrigido.
      7. Relatorio de status para o comite de auditoria (periodico).
      8. Escalacao para o conselho: achados criticos ainda abertos apos prazo.
    tools:
      - audit-management
      - grc-platform
      - reporting-platform
      - workflow-engine
