id: art-25
family: cap-4
title: "Execucao de Auditoria e Workpapers"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 25. A execução de auditorias deve seguir metodologia documentada, com
    workpapers que registrem as evidências obtidas, os procedimentos realizados
    e os achados identificados.

    § 1. Os workpapers de auditoria devem:
    I - ser completos, precisos e organizados de forma a suportar as conclusões;
    II - documentar os objetivos da auditoria, o escopo, os procedimentos realizados
    e as evidências obtidas;
    III - ser retidos pelo período mínimo de cinco anos;
    IV - ter acesso restrito e ser protegidos contra alteração indevida.

    § 2. Os procedimentos de auditoria devem ser adequados aos riscos avaliados,
    podendo incluir inspeção, observação, confirmação, reexecução e análise de dados.
guidance:
  prose: |
    O art. 25 estabelece os requisitos para a documentacao da auditoria interna.
    Workpapers de qualidade sao o que distingue auditoria profissional de auditoria
    de fachada.

    **Por que workpapers importam:**
    1. Suportam as conclusoes: se o relatorio diz "o controle e inefetivo", os
       workpapers devem provar isso com evidencias concretas
    2. Revisao de qualidade: o supervisor de auditoria pode revisar o trabalho
    3. Defesa regulatoria: se a SUSEP questionar uma auditoria, os workpapers sao
       a evidencia do trabalho realizado
    4. Aprendizado: novos auditores aprendem com workpapers de auditorias anteriores

    **Elementos de um workpaper completo:**
    - Objetivo do teste
    - Populacao testada (universo)
    - Metodo de amostragem (se aplicavel)
    - Procedimento executado passo a passo
    - Evidencias obtidas (prints, arquivos, relatorios)
    - Excecoes encontradas
    - Conclusao do auditor

    **Tipos de procedimentos (ss 2):**
    - Inspecao: verificar documentos fisicos ou digitais
    - Observacao: presenciar a execucao de um processo
    - Confirmacao: obter confirmacao de terceiros (ex: confirmacao de saldo)
    - Re-execucao: executar o controle de forma independente
    - Analise de dados: audit analytics sobre grandes volumes de dados
implementation_guidance:
  platform_engineering:
    prose: |
      **Audit management com workpapers:**
      1. Repositorio de workpapers integrado ao audit management system.
      2. Templates padronizados de workpaper por tipo de procedimento.
      3. Workflow de revisao: auditor → supervisor → manager → sign-off final.
      4. Controle de versao de workpapers: historico de alteracoes com autor e data.

      **Seguranca de workpapers:**
      5. Acesso restrito: apenas equipe de auditoria e revisores designados.
      6. Criptografia at-rest para workpapers contendo informacoes sensiveis.
      7. Backup automatico e retencao por 5 anos com politica de expurgo automatizado.
      8. Imutabilidade pos-sign-off: workpaper assinado nao pode ser alterado.

      **Audit data analytics:**
      9. Ferramentas de data analytics para teste de 100% da populacao.
      10. Integracao com sistemas fonte para extrair dados diretamente (sem dependencia da area auditada).
    tools:
      - audit-management
      - data-analytics
      - document-management
      - encryption-platform
  devsecops:
    prose: |
      **Evidencias de auditoria de TI:**
      1. Screenshots e logs como evidencias de controles tecnicos.
      2. Pipeline artifacts como evidencias: relatorios de SAST, DAST, dependency scan.
      3. Git history como evidencia de segregacao de funcoes (quem aprovou o que).
      4. Evidencias automatizadas: export do SIEM para workpaper de auditoria de TI.
    tools:
      - audit-management
      - audit-logging
      - siem
      - gitlab-ci
  secops:
    prose: |
      **Qualidade dos workpapers:**
      1. Peer review obrigatorio: todo workpaper revisado por outro auditor antes de sign-off.
      2. Supervisor review: supervisor revisa amostra de workpapers por auditoria.
      3. Internal Quality Assurance (IQA): revisao interna da qualidade de auditorias.
      4. External Quality Assessment (EQA): avaliacao externa a cada 5 anos (IIA standard).

      **Gestao de retencao:**
      5. Politica de retencao: workpapers mantidos por 5 anos minimo apos conclusao.
      6. Index de workpapers: busca rapida por area, periodo, tipo de auditoria.
      7. Processo de expurgo controlado: aprovacao antes de destruir workpapers.
    tools:
      - audit-management
      - document-management
      - grc-platform
