id: art-27
family: cap-4
title: "Comite de Auditoria"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 27. As supervisionadas de grande porte, conforme critérios estabelecidos
    pela Susep, devem constituir comitê de auditoria.

    § 1. O comitê de auditoria deve ser composto por membros do conselho de
    administração ou por especialistas com reconhecida competência em áreas de
    auditoria, contabilidade, atuária ou gestão de riscos.

    § 2. Ao menos um membro do comitê de auditoria deve ter experiência em
    auditoria, contabilidade ou atuária.

    § 3. O comitê de auditoria deve:
    I - supervisionar o processo de auditoria interna;
    II - supervisionar a elaboração e a divulgação das demonstrações financeiras;
    III - avaliar a efetividade do SCI e da EGR;
    IV - interagir com os auditores externos;
    V - receber e analisar reclamações relativas a controles contábeis, auditoria
    e cumprimento de obrigações regulatórias.
guidance:
  prose: |
    O art. 27 estabelece o comite de auditoria como estrutura de governanca que
    faz a ponte entre o conselho e a auditoria interna.

    **Por que o comite de auditoria e necessario:**
    O conselho pleno geralmente nao tem tempo nem competencia tecnica para supervisionar
    em detalhe a auditoria, os controles e as demonstracoes financeiras. O comite
    de auditoria e o subcomite especializado que faz essa supervisao aprofundada.

    **Composicao (ss 1-2):**
    O membro com experiencia em contabilidade/atuaria/auditoria e o "financial expert"
    equivalente ao exigido pela SEC nos EUA para comites de auditoria de empresas listadas.
    Para seguradoras, expertise atuarial e especialmente relevante.

    **Cinco responsabilidades (ss 3):**

    **I - Supervisao da auditoria interna:**
    Aprovacao do plano, avaliacao do desempenho do CAE, garantia de independencia.

    **II - Demonstracoes financeiras:**
    Revisao das notas sobre provisoes tecnicas, risco atuarial, investimentos.
    Interacao com o atuario independente que certifica as provisoes.

    **III - Efetividade do SCI e EGR:**
    Recebe relatorio do CAE e do CRO. Avalia se as estruturas estao funcionando.

    **IV - Auditores externos:**
    Papel critico: o comite contrata, avalia e pode recomendar a troca do auditor externo.
    Garante a independencia do auditor externo em relacao a diretoria.

    **V - Denuncias:**
    Canal de recepcao de denuncia diretamente ao comite, sem passar pela diretoria.
implementation_guidance:
  platform_engineering:
    prose: |
      **Portal do comite de auditoria:**
      1. Portal seguro para membros do comite: acesso a relatorios de auditoria,
         achados criticos, demonstracoes financeiras em preparacao.
      2. Acesso direto ao audit management system em modo read.
      3. Canal seguro de comunicacao entre CAE e comite (criptografado).
      4. Agenda e atas de reuniao do comite versionadas e arquivadas.
    tools:
      - audit-management
      - board-portal
      - document-management
      - secure-communication
  devsecops:
    prose: |
      **Acesso de auditores externos:**
      1. Ambiente dedicado para auditores externos com acesso read-only controlado.
      2. Scope definido: auditores externos acessam apenas sistemas em escopo.
      3. Audit trail de acesso dos auditores externos a sistemas internos.
      4. Evidencias de auditoria entregues em formato padronizado.
    tools:
      - iam-platform
      - audit-logging
      - audit-management
  secops:
    prose: |
      **Operacao do comite de auditoria:**
      1. Charter do comite de auditoria aprovado pelo conselho.
      2. Calendario de reunioes: ao menos 4 reunioes anuais + extraordinarias conforme necessidade.
      3. Pauta minima: (a) status de auditoria, (b) achados abertos, (c) demo financeiras.
      4. Avaliacao anual do CAE pelo comite (nao pela diretoria).

      **Supervisao da auditoria interna:**
      5. Aprovacao do plano de auditoria pelo comite.
      6. Revisao do relatorio anual da auditoria interna.
      7. Reunioes privadas do comite com o CAE (sem presenca da diretoria).
      8. Comunicacao de achados criticos: CAE → comite → conselho pleno.
    tools:
      - audit-management
      - board-portal
      - reporting-platform
      - workflow-engine
