id: art-28
family: cap-4
title: "Contratacao de Auditoria Interna Terceirizada"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 28. A função de auditoria interna pode ser total ou parcialmente terceirizada,
    desde que:
    I - a supervisionada mantenha competência interna adequada para supervisionar
    o trabalho do terceiro;
    II - a independência do auditor terceirizado seja assegurada;
    III - a terceirização não configure conflito de interesse com serviços prestados
    pelo mesmo prestador (ex: auditoria externa e interna pela mesma firma).

    § 1. A co-sourcing e o outsourcing total da auditoria interna devem ser
    aprovados pelo comitê de auditoria ou pelo conselho de administração.

    § 2. O contrato de terceirização deve garantir a confidencialidade das
    informações e o acesso da SUSEP ao trabalho realizado.
guidance:
  prose: |
    O art. 28 permite flexibilidade na estrutura da auditoria interna, reconhecendo
    que pequenas supervisionadas podem nao ter escala para manter equipe interna.

    **Modalidades de terceirizacao:**

    **In-house (100% interno):**
    Modelo ideal para grandes supervisionadas. Total controle, conhecimento profundo
    do negocio, mas custo mais alto.

    **Co-sourcing (hibrido):**
    Equipe interna + especialistas externos para areas tecnicas (TI, atuaria, PLD).
    Balanco de custo e qualidade.

    **Outsourcing total:**
    Firma de auditoria (Big 4, mid-tier) faz toda a auditoria interna. Permitido
    se houver supervisao interna adequada. Risco: perda de conhecimento especifico.

    **Restricao critica (inciso III):**
    A mesma firma que faz a auditoria EXTERNA nao pode fazer a auditoria INTERNA.
    Conflito de interesse: o auditor externo nao pode revisar seu proprio trabalho.

    **Competencia interna de supervisao:**
    Mesmo no outsourcing total, alguem na supervisionada precisa saber avaliar
    a qualidade do trabalho: aprovar o plano, revisar os relatorios, questionar
    a metodologia.
implementation_guidance:
  platform_engineering:
    prose: |
      **Acesso controlado para auditores terceirizados:**
      1. Conta de acesso dedicada para firma de auditoria terceirizada com permissoes
         precisamente configuradas (menor privilegio).
      2. Monitoramento de acesso: todas as acoes do auditor terceirizado registradas.
      3. VPN ou ambiente dedicado para acesso remoto seguro.
      4. Revogacao automatica de acesso ao fim do contrato.
    tools:
      - iam-platform
      - pam-solution
      - audit-logging
      - vpn-solution
  devsecops:
    prose: |
      **Gestao de terceiros de auditoria:**
      1. Repositorio dedicado para evidencias de auditoria: acesso do auditor terceirizado.
      2. Exportacao controlada de logs e dados para auditores: aprovacao interna necessaria.
      3. NDA e acordo de confidencialidade como pre-requisito de acesso a ambientes.
      4. TPRM assessment do provedor de auditoria terceirizada.
    tools:
      - iam-platform
      - tprm-platform
      - document-management
  secops:
    prose: |
      **Processo de contratacao e supervisao:**
      1. RFP para selecao de auditoria terceirizada com criterios tecnicos e regulatorios.
      2. Due diligence do prestador: qualificacao, independencia, reputacao, referencias.
      3. Contrato com clausulas: confidencialidade, acesso SUSEP, qualificacao da equipe.
      4. Aprovacao do conselho/comite antes de contratar.

      **Supervisao continua:**
      5. Supervisao interna do trabalho: review de plano, workpapers e relatorios.
      6. Performance review anual: qualidade, prazo, achados relevantes.
      7. Reuniao regular com o lider da equipe terceirizada.
      8. Avaliacao de conflito de interesse: verificar que a firma nao presta outros
         servicos que configurem conflito.
    tools:
      - grc-platform
      - tprm-platform
      - document-management
      - workflow-engine
