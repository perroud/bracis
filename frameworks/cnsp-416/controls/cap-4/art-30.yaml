id: art-30
family: cap-4
title: "Relatorio Anual da Auditoria Interna"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 30. A auditoria interna deve elaborar relatório anual sintético das atividades
    realizadas e dos resultados obtidos, contemplando:
    I - sumário dos trabalhos realizados e da cobertura do universo de auditoria;
    II - avaliação geral da efetividade do SCI e da EGR;
    III - principais achados e status de remediação;
    IV - avaliação de recursos e competências da auditoria interna;
    V - plano de auditoria para o exercício seguinte.

    § 1. O relatório anual deve ser apresentado ao conselho de administração
    ou ao comitê de auditoria.

    § 2. O relatório anual deve ser disponibilizado à SUSEP mediante solicitação.
guidance:
  prose: |
    O art. 30 fecha o ciclo anual da auditoria interna com o relatorio de atividades.
    O relatorio anual e o documento de prestacao de contas da auditoria interna
    ao conselho.

    **O que o relatorio anual deve responder:**
    1. "O que a auditoria fez este ano?" (sumario de trabalhos)
    2. "O que encontrou?" (achados)
    3. "Como estamos em termos de SCI e EGR?" (avaliacao geral)
    4. "A auditoria tem recursos adequados?" (autoavaliacao)
    5. "O que fara no proximo ano?" (plano)

    **Avaliacao geral da efetividade do SCI/EGR (inciso II):**
    Esta e a declaracao mais poderosa que a auditoria interna faz. Com base em todas
    as auditorias do ano, o CAE emite um julgamento:
    - "O SCI e efetivo e proporcional ao perfil de risco"
    - "O SCI precisa de melhorias significativas nas areas X, Y, Z"
    - "O SCI apresenta deficiencias graves que requerem acao imediata"

    Este julgamento influencia a avaliacao do risco pela SUSEP.

    **Plano do proximo ano (inciso V):**
    A antecipacao do plano ja aprovado ou em processo de aprovacao. Transparencia
    total com o conselho sobre o que sera feito.
implementation_guidance:
  platform_engineering:
    prose: |
      **Geracao do relatorio anual:**
      1. Relatorio anual gerado automaticamente a partir dos dados do audit management system.
      2. Metricas automaticas: numero de auditorias, achados por prioridade, taxa de remediacao.
      3. Coverage heatmap: universo de auditoria vs. areas cobertas no ano.
      4. Dashboard interativo do relatorio anual para o comite de auditoria.
    tools:
      - audit-management
      - reporting-platform
      - bi-platform
  devsecops:
    prose: |
      **Metricas de auditoria de TI no relatorio anual:**
      1. Secao especifica de TI no relatorio anual: cobertura de auditoria de TI.
      2. Metricas de controles tecnicos avaliados: scan coverage, SAST findings, etc.
      3. Status de remediacao de achados de auditoria de TI.
      4. Evolucao da maturidade de controles de TI ano a ano.
    tools:
      - audit-management
      - reporting-platform
  secops:
    prose: |
      **Processo de elaboracao do relatorio anual:**
      1. Consolidacao de todos os trabalhos do ano: coleta de dados em dezembro.
      2. Avaliacao geral do SCI/EGR: deliberacao da equipe de auditoria sobre o julgamento.
      3. Revisao pelo CAE e aprovacao antes de apresentar ao conselho.
      4. Apresentacao formal ao conselho ou comite de auditoria em janeiro/fevereiro.

      **Qualidade e benchmark:**
      5. Comparacao com anos anteriores: evolucao dos indicadores de auditoria.
      6. Benchmark com peers: como esta a maturidade da auditoria vs. mercado?
      7. Resposta da diretoria ao relatorio anual: plano de acao para achados criticos.
      8. Arquivo do relatorio anual: retencao por 5 anos minimo, disponivel para SUSEP.
    tools:
      - audit-management
      - reporting-platform
      - document-management
      - grc-platform
