id: art-29
family: cap-4
title: "Auditoria de Tecnologia da Informacao"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 29. A auditoria interna deve contemplar especificamente a auditoria dos
    sistemas de informação e da tecnologia da informação, avaliando:
    I - a efetividade dos controles de segurança de TI;
    II - a integridade e confiabilidade dos dados utilizados na gestão de riscos
    e nas demonstrações financeiras;
    III - a adequação dos controles de acesso e de segregação de funções nos sistemas;
    IV - os processos de gestão de mudanças em sistemas críticos;
    V - a conformidade com a política de segurança cibernética.
guidance:
  prose: |
    O art. 29 torna a auditoria de TI uma exigencia explicita, nao apenas implicita.
    Para seguradoras, os sistemas de TI sao criticos: calculos atuariais errados
    por bug de software resultam em provisoes tecnicas incorretas.

    **Por que auditoria de TI e critica para seguros:**
    1. Modelos de precificacao e provisionamento rodando em TI: bug = perda financeira
    2. Dados de segurados: LGPD exige controles fortes de acesso e proteao de dados
    3. Sistemas de sinistros: fraude pode ser facilitada por controles de TI inadequados
    4. Reinsuro: calculos de recuperacao dependem da integridade dos dados de sinistros
    5. Demonstracoes financeiras: BACEN, SUSEP e auditores externos confiam nos dados de TI

    **Cinco areas (incisos I a V):**

    **I - Controles de seguranca de TI:**
    Avaliar se as medidas da CNSP 381 (politica cibernetica) estao implementadas
    e funcionando. Teste de penetracao, revisao de configuracoes, controles de acesso.

    **II - Integridade de dados:**
    Os dados que alimentam os modelos de risco estao corretos? Reconciliacoes,
    testes de completude, comparacao com fontes externas.

    **III - Controles de acesso e SoD:**
    Verificacao tecnica da segregacao de funcoes nos sistemas (art. 5).

    **IV - Gestao de mudancas:**
    O processo de change management e seguido? Mudancas em sistemas criticos
    passam por aprovacao adequada?

    **V - Conformidade cibernetica:**
    Avaliacao da conformidade com a CNSP 381 — auditoria interna como terceira linha
    validando o que a segunda linha (CISO) reportou.
implementation_guidance:
  platform_engineering:
    prose: |
      **Auditoria de TI com dados:**
      1. Acesso read-only a todos os sistemas de TI para a equipe de auditoria de TI.
      2. Ferramenta de audit data analytics para testar 100% das transacoes criticas.
      3. Comparacao automatizada entre sistemas: policy system vs. contabilidade vs. reinsuro.
      4. Extrator de logs para analise de auditoria: quem acessou o que no periodo.

      **Ferramentas de auditoria de TI:**
      5. CAAT (Computer Assisted Audit Techniques): ACL, IDEA, ou equivalente.
      6. Vulnerability scanner para auditoria de configuracoes de seguranca.
      7. Network scanning para identificar dispositivos nao autorizados.
      8. Cloud security posture management para auditoria de ambientes cloud.
    tools:
      - audit-management
      - data-analytics
      - vulnerability-scanner
      - siem
      - cspm-tool
  devsecops:
    prose: |
      **Evidencias automatizadas para auditoria de TI:**
      1. Pipeline artifacts como evidencias para auditores: SAST reports, DAST results.
      2. Deployment history acessivel para auditores (quem deployou o que, quando).
      3. Approval history: evidencia de que code reviews foram realizados.
      4. Change management records: mudancas em producao rastreadas.
    tools:
      - gitlab-ci
      - audit-logging
      - change-management
      - siem
  secops:
    prose: |
      **Programa de auditoria de TI:**
      1. Auditoria de TI como item obrigatorio no programa anual de auditoria.
      2. Frequencia baseada em risco: sistemas core (policy, sinistros) auditados anualmente.
      3. CISA na equipe: ao menos um auditor com certificacao de TI.
      4. Metodologia documentada: ISACA IS Audit Standards ou equivalente.

      **Areas obrigatorias de auditoria de TI:**
      5. Controles de acesso: IAM, privileged access, SoD tecnica — auditoria anual.
      6. Gestao de mudancas: amostras de mudancas revisadas trimestralmente.
      7. Seguranca cibernetica: avaliacao da CNSP 381 implementation — anual.
      8. Integridade de dados: reconciliacoes de dados criticos — amostral.
    tools:
      - audit-management
      - data-analytics
      - vulnerability-management
      - grc-platform
