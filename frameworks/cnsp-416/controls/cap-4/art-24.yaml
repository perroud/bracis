id: art-24
family: cap-4
title: "Programa de Auditoria e Planejamento"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 24. A auditoria interna deve elaborar e executar programa de auditoria
    baseado em risco, que defina o universo de auditoria e estabeleça as prioridades
    de auditoria considerando o perfil de risco da supervisionada.

    § 1. O programa de auditoria deve:
    I - cobrir todos os processos e áreas relevantes em ciclo plurianual;
    II - priorizar as áreas de maior risco para auditoria mais frequente;
    III - incluir auditoria dos processos de gestão de riscos e controles internos;
    IV - prever auditorias especiais para situações de risco emergente.

    § 2. O programa de auditoria deve ser aprovado pelo comitê de auditoria ou,
    na sua inexistência, pelo conselho de administração.

    § 3. O programa deve ser flexível para incorporar demandas não planejadas
    decorrentes de mudanças no perfil de risco.
guidance:
  prose: |
    O art. 24 define que a auditoria interna deve ser risk-based — nao uma rotina
    de visitas a todas as areas com igual frequencia.

    **Risk-based audit planning:**
    A auditoria moderna usa o perfil de risco para decidir ONDE focar. Areas de maior
    risco recebem auditoria mais frequente e mais profunda. Areas de baixo risco podem
    ser auditadas a cada 3-5 anos.

    **Universo de auditoria:**
    Mapeamento de todas as areas, processos e sistemas que PODEM ser auditados.
    A partir do universo, a equipe seleciona o que SERA auditado no ciclo atual.

    **Ciclo plurianual (I):**
    Nenhuma area critica pode ficar sem auditoria por mais de 3 anos. O plano
    plurianual garante cobertura sistematica ao longo do tempo.

    **Auditoria dos processos de risco e controle (III):**
    A auditoria interna e a terceira linha que valida o trabalho da primeira (operacao)
    e segunda linhas (gestao de riscos, compliance). Portanto, deve auditar o proprio
    SCI e a EGR — nao apenas as areas operacionais.

    **Aprovacao pelo comite (ss 2):**
    A aprovacao pelo conselho garante que o programa e compativel com as prioridades
    estrategicas e com o apetite ao risco da entidade.
implementation_guidance:
  platform_engineering:
    prose: |
      **Planejamento de auditoria baseado em risco:**
      1. Modulo de risk-based audit planning no audit management system.
      2. Universo de auditoria: lista de todas as areas/processos/sistemas auditaveis.
      3. Risk scoring automatico do universo de auditoria usando dados do GRC.
      4. Geracao automatica de sugestao de plano com base nos scores de risco.

      **Execucao e tracking:**
      5. Workflow de auditoria: planejamento → fieldwork → relatorio → follow-up.
      6. Cronograma de auditoria visual: quem esta auditando o que, quando.
      7. Tracking de horas por auditoria: orcamento vs. realizado.
      8. Status de auditorias em andamento: % completude, achados provisorios.
    tools:
      - audit-management
      - grc-platform
      - workflow-engine
      - project-management
  devsecops:
    prose: |
      **Auditoria de TI no programa:**
      1. Processos de TI mapeados no universo de auditoria: desenvolvimento, operacoes,
         seguranca, dados, fornecedores de TI.
      2. Frequencia de auditoria de TI baseada em criticidade: sistemas core anual.
      3. Auditoria de pipeline e controles DevSecOps incluida no programa.
      4. Ferramentas de audit analytics para analise de logs de sistemas.
    tools:
      - audit-management
      - siem
      - data-analytics
  secops:
    prose: |
      **Processo de planejamento:**
      1. Workshop de universe assessment anual: mapear e pontuar todas as areas.
      2. Consulta ao CRO e ao comite de riscos para validar prioridades de risco.
      3. Plano de auditoria anual e plurianual elaborado, revisado e aprovado.
      4. Comunicacao do plano as areas auditadas: datas previstas de auditoria.

      **Flexibilidade e auditoria especial:**
      5. Reserva de capacidade para auditorias emergenciais: 20% do orcamento livre.
      6. Processo de acionamento de auditoria especial: quem pode solicitar, criterios.
      7. Auditoria pos-incidente: procedimento para auditoria rapida apos evento relevante.
      8. Revisao semestral do programa: ajustar se o perfil de risco mudou.
    tools:
      - audit-management
      - grc-platform
      - reporting-platform
