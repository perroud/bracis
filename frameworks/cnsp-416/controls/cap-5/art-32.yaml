id: art-32
family: cap-5
title: "Modelo das Tres Linhas de Defesa"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 32. O SCI e a EGR devem ser estruturados segundo o modelo das três linhas,
    com definição clara de papéis e responsabilidades:

    I - primeira linha: áreas de negócio e de suporte que assumem e gerenciam riscos
    no curso normal de suas atividades, implementando controles operacionais;

    II - segunda linha: funções de gestão de riscos e compliance que estabelecem
    políticas, metodologias e controles, monitoram e reportam os riscos;

    III - terceira linha: auditoria interna que fornece avaliação independente e
    objetiva das primeira e segunda linhas.

    Parágrafo único. O conselho de administração e os órgãos de governança supervisionam
    todas as três linhas, atuando como nível superior do modelo.
guidance:
  prose: |
    O art. 32 formaliza o modelo das tres linhas (Three Lines of Defense / Three Lines Model,
    conforme IIA 2020) como estrutura de governanca obrigatoria.

    **Por que o modelo de tres linhas e fundamental:**
    Evita dois extremos perigosos:
    1. "Risco e problema da area de risco": a primeira linha acha que nao tem responsabilidade
    2. "Compliance e problema do compliance": silos onde nenhuma linha sabe o que a outra faz

    **Primeira linha — "own the risk":**
    O subscritor que aceita um risco e o dono do risco de subscricao.
    O gerente de sinistros que paga uma indenizacao e o dono do risco operacional de fraude.
    Os controles operacionais sao de responsabilidade da primeira linha.

    **Segunda linha — "watch the risk":**
    CRO e equipe de gestao de riscos: politicas, metodologias, monitoramento, KRIs.
    CCO e equipe de compliance: conformidade regulatoria, PLD, codigo de etica.
    CISO: politica de seguranca cibernetica (CNSP 381).

    **Terceira linha — "test the risk management":**
    Auditoria interna avalia se a primeira e segunda linhas estao funcionando.
    Independente de ambas — nao pode ser capturada pelas areas que audita.

    **Conselho — "level above all lines":**
    Supervisiona as tres linhas, aprova os frameworks, recebe relatorios de cada linha.
    O conselho e o juiz final da efetividade de todo o modelo.
implementation_guidance:
  platform_engineering:
    prose: |
      **Arquitetura de sistemas por linha:**
      1. GRC platform com modulos distintos para cada linha:
         - 1L: self-assessment, incident reporting, daily KRIs
         - 2L: risk management, compliance monitoring, policy management
         - 3L: audit management, findings, follow-up
         - Conselho: board reporting, approvals
      2. Visibilidade cruzada: segunda linha ve o que a primeira linha reportou.
      3. Conselho ve sumario consolidado de todas as tres linhas.
      4. Segregacao: auditoria interna (3L) nao pode editar registros da 1L ou 2L.
    tools:
      - grc-platform
      - audit-management
      - risk-management
      - board-portal
  devsecops:
    prose: |
      **Tres linhas no desenvolvimento:**
      1. Primeira linha: equipes de desenvolvimento implementam controles (SAST, SCA).
      2. Segunda linha: equipe de seguranca (CISO) define politicas de pipeline.
      3. Terceira linha: auditoria interna verifica que o pipeline cumpre as politicas.
      4. Segregacao de responsabilidades entre as tres linhas na plataforma.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - audit-management
      - compliance-scanner
  secops:
    prose: |
      **Implementacao do modelo de tres linhas:**
      1. RACI das tres linhas documentado: quem e Responsavel, Aprovador, Consultado
         e Informado em cada processo de risco e controle.
      2. Treinamento das equipes sobre seus papeis no modelo de tres linhas.
      3. Evitar sobreposicao: segunda linha nao opera controles da primeira linha.
      4. Evitar lacunas: garantir que toda area relevante esta coberta pelo modelo.

      **Avaliacao do modelo:**
      5. Assessment anual da efetividade do modelo de tres linhas.
      6. Gaps: ha areas sem controles de primeira linha adequados?
      7. Gaps: ha areas sem monitoramento de segunda linha?
      8. Terceira linha: cobertura completa das primeira e segunda linhas no ciclo plurianual?
    tools:
      - grc-platform
      - audit-management
      - reporting-platform
