id: art-35
family: cap-5
title: "Divulgacao e Transparencia"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 35. As supervisionadas devem divulgar informações sobre o SCI e a EGR
    de forma transparente ao mercado e ao público em geral, observados os requisitos
    de sigilo e confidencialidade.

    § 1. A divulgação deve incluir, no mínimo:
    I - descrição da estrutura de governança de riscos;
    II - descrição do modelo de gestão de riscos e dos principais riscos assumidos;
    III - informações sobre a adequação de capital e de solvência;
    IV - resultados dos modelos internos e dos testes de estresse, em nível adequado
    de agregação.

    § 2. As informações devem ser divulgadas nas demonstrações financeiras ou
    em relatório específico, ao menos anualmente.
guidance:
  prose: |
    O art. 35 estabelece o "Pilar 3" para o mercado segurador: disciplina de mercado
    via transparencia. A ideia e que o mercado (segurados, corretores, analistas,
    resseguradores) possa avaliar a saude financeira e a gestao de riscos da seguradora.

    **Por que transparencia importa no seguro:**
    1. Segurados escolhem seguradoras por sua saude financeira
    2. Corretores precisam recomendar seguradoras solidas
    3. Resseguradores avaliam o risco que cedem com base na qualidade do cedente
    4. Investidores avaliam o risco antes de investir
    5. A SUSEP usa as divulgacoes como sinal de alerta precoce

    **Balance entre transparencia e confidencialidade:**
    A resolucao reconhece que nem tudo pode ser divulgado. Limites especificos de
    risco, detalhes de clientes PEP, informacoes que comprometam competitividade —
    podem ser agregados ou omitidos na divulgacao publica.

    **Nivel de agregacao (inciso IV):**
    Resultados de stress test agregados, sem revelar o cenario exato. Ex: "no cenario
    de estresse severo, o indice de solvencia cai para X%, mantendo-se acima do minimo
    regulatorio de Y%." Informativo sem ser especifico demais.
implementation_guidance:
  platform_engineering:
    prose: |
      **Relatorio de divulgacao automatizado:**
      1. Modulo de disclosure no GRC que agrega dados de risco para divulgacao publica.
      2. Processo de sanitizacao: dados sensiveis removidos automaticamente antes da
         publicacao.
      3. Integracao com o relatorio das demonstracoes financeiras.
      4. Website da supervisionada: secao dedicada a informacoes de risco e governanca.
    tools:
      - grc-platform
      - reporting-platform
      - document-management
  devsecops:
    prose: |
      **Publicacao segura de informacoes:**
      1. Processo de review de documentos de divulgacao antes da publicacao.
      2. DLP (Data Loss Prevention) para verificar que dados sensiveis nao sao
         publicados acidentalmente.
      3. Versionamento e arquivo de relatorios publicados.
    tools:
      - dlp-platform
      - document-management
      - reporting-platform
  secops:
    prose: |
      **Processo de divulgacao:**
      1. Mapeamento do que deve ser divulgado (art. 35 ss 1) vs. o que e confidencial.
      2. Processo de aprovacao para material a ser publicado: revisao juridica e de risco.
      3. Coordenacao com o processo de demonstracoes financeiras para consistencia.
      4. Responsavel pela divulgacao: geralmente IRO (Investor Relations) ou CFO.

      **Qualidade da divulgacao:**
      5. Benchmark com peers: o que outras seguradoras divulgam?
      6. Feedback da SUSEP sobre adequacao das divulgacoes.
      7. Avaliacao anual: as informacoes divulgadas sao uteis e completas?
    tools:
      - grc-platform
      - reporting-platform
      - document-management
