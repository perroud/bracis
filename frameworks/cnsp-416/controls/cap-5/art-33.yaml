id: art-33
family: cap-5
title: "Responsabilidades da Diretoria"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 33. A diretoria executiva é responsável por:
    I - implementar e manter o SCI e a EGR aprovados pelo conselho;
    II - assegurar a integração dos processos de controle e gestão de riscos
    às atividades de negócio;
    III - designar formalmente os responsáveis pelas funções de CRO, CCO e CAE;
    IV - garantir que os colaboradores tenham conhecimento adequado das políticas
    e dos controles internos aplicáveis às suas funções;
    V - relatar ao conselho de administração a postura de risco e o status
    do SCI e da EGR periodicamente.
guidance:
  prose: |
    O art. 33 distribui as responsabilidades operacionais para a diretoria executiva.
    Enquanto o conselho aprova e supervisiona, a diretoria implementa e opera.

    **Cinco responsabilidades da diretoria:**

    **I - Implementar o aprovado pelo conselho:**
    O conselho aprova a DAR, as politicas, o plano de auditoria. A diretoria e
    responsavel por fazer acontecer na pratica. "O papel aceita tudo" — a diretoria
    garante que os controles existem, nao apenas os documentos.

    **II - Integracao ao negocio:**
    Reforcando o ss 2 do art. 4: controles devem ser parte do negocio, nao paralelos.
    O CEO (diretoria) garante que os gestores de negocio aceitam os controles como
    parte do seu trabalho — nao como obstaculo.

    **III - Designacao formal de CRO, CCO e CAE:**
    Estas tres funcoes devem ser formalmente designadas com registro na SUSEP.
    Nao podem ser vagas ou acumuladas de forma inadequada.

    **IV - Conhecimento dos colaboradores:**
    O treinamento e comunicacao de politicas e responsabilidade da diretoria.
    "Meu colaborador nao sabia a politica" nao e desculpa — a diretoria devia
    ter assegurado que ele soubesse.

    **V - Reporte ao conselho:**
    A diretoria e o elo entre a operacao e o conselho. Deve reportar com honestidade
    e transparencia, mesmo quando os relatorios sao negativos.
implementation_guidance:
  platform_engineering:
    prose: |
      **Suporte tecnico para a diretoria:**
      1. Dashboard executivo customizado para cada diretor: KPIs e KRIs da sua area.
      2. Ferramentas de reporting da diretoria ao conselho: board pack automatizado.
      3. Workflow de designacao formal de CRO/CCO/CAE com registro e rastreabilidade.
      4. Sistema de treinamento e confirmacao de ciencia de politicas.
    tools:
      - grc-platform
      - bi-platform
      - training-platform
      - hr-platform
  devsecops:
    prose: |
      **Responsabilidades de TI da diretoria:**
      1. CTO/CIO tem responsabilidade de implementar os controles tecnicos.
      2. Processos de TI integrados ao negocio: nao departamento isolado.
      3. Relatorio de risco de TI para a diretoria como parte do ciclo regular.
      4. Diretoria aprova arquitetura de sistemas criticos.
    tools:
      - grc-platform
      - reporting-platform
      - change-management
  secops:
    prose: |
      **Operacao da governanca executiva:**
      1. Reunioes mensais da diretoria com CRO, CCO e CAE: status de riscos e controles.
      2. Risk committee executivo: governanca de riscos no nivel da diretoria.
      3. Treinamento anual da diretoria: CNSP 416, responsabilidades, melhores praticas.
      4. Processo formal de designacao e registro na SUSEP de CRO, CCO e CAE.

      **Comunicacao interna de politicas:**
      5. Programa de treinamento e conscientizacao de politicas para todos os colaboradores.
      6. Metricas de treinamento: % colaboradores treinados vs. meta (> 95%).
      7. Ciclo de atualizacao: novos colaboradores treinados em 30 dias.
      8. Teste de conhecimento pos-treinamento com aprovacao minima.
    tools:
      - grc-platform
      - training-platform
      - hr-platform
      - reporting-platform
