id: art-31
family: cap-5
title: "Responsabilidades do Conselho de Administracao"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 31. O conselho de administração ou, na sua inexistência, a diretoria
    é responsável por:
    I - aprovar o SCI e a EGR, incluindo as políticas e as estratégias de risco;
    II - aprovar a declaração de apetite ao risco (DAR);
    III - assegurar a existência de recursos adequados para o SCI, a EGR e a
    auditoria interna;
    IV - monitorar periodicamente a efetividade do SCI e da EGR;
    V - garantir que o SCI e a EGR sejam compatíveis com o porte e a complexidade
    da supervisionada;
    VI - aprovar o plano de auditoria interna.

    Parágrafo único. As responsabilidades previstas neste artigo não podem ser
    delegadas a outros órgãos ou funções da supervisionada.
guidance:
  prose: |
    O art. 31 e o artigo de governanca mais importante da resolucao. Estabelece
    que a responsabilidade ultima pelo SCI, EGR e auditoria interna e do conselho
    — e esta responsabilidade e INDELEGAVEL.

    **Seis responsabilidades indelegaveis:**

    **I - Aprovar o SCI e a EGR:**
    Nao basta existir — o conselho aprova formalmente as estruturas e as politicas.
    Isso implica que o conselho deve entender o que esta aprovando.

    **II - Aprovar a DAR:**
    A Declaracao de Apetite ao Risco define o nivel de risco que a empresa esta
    disposta a aceitar. Esta e uma decisao estrategica do conselho — nao do CRO.

    **III - Recursos adequados:**
    O conselho deve garantir orcamento, pessoal e tecnologia para as tres funcoes.
    Se a auditoria interna esta subfinanciada, e responsabilidade do conselho.

    **IV - Monitoramento periodico:**
    O conselho nao pode "assinar uma vez e esquecer". Deve receber e analisar
    relatorios periodicos (do CRO, do CAE, do CCO) e agir sobre eles.

    **V - Compatibilidade com porte:**
    O conselho valida o principio de proporcionalidade: as estruturas sao adequadas
    ao porte e complexidade da supervisionada?

    **VI - Plano de auditoria:**
    O conselho aprova o que a auditoria vai fazer no ano — garantindo que as areas
    de maior risco sao priorizadas.

    **Paragrafo unico — indelegabilidade:**
    O CEO ou o CRO podem PREPARAR as propostas, mas a APROVACAO final e do conselho.
    Conselhos que rubber-stamp tudo sem questionamento estao em violacao deste artigo.
implementation_guidance:
  platform_engineering:
    prose: |
      **Board portal e reporting:**
      1. Portal do conselho com acesso a todos os relatorios de risco, compliance e auditoria.
      2. Board pack digital com sumario executivo de risco, SCI e auditoria.
      3. Dashboard do conselho: KPIs e KRIs em nivel estrategico (nao operacional).
      4. Alertas diretos ao conselho para situacoes criticas (excecoes de limite, achados
         criticos de auditoria, incidentes regulatorios).

      **Workflow de aprovacao:**
      5. Sistema de aprovacao formal para documentos que exigem aprovacao do conselho:
         DAR, politicas de risco, plano de auditoria.
      6. Audit trail de aprovacoes: quem aprovou, quando, com qual quorum.
      7. Ciclo de renovacao anual de documentos aprovados.
    tools:
      - board-portal
      - grc-platform
      - document-management
      - workflow-engine
  devsecops:
    prose: |
      **Reporting de risco de TI para o conselho:**
      1. Metricas de risco de TI em linguagem executiva para o board pack.
      2. Relatório de cyber risk traduzido em impacto financeiro (nao tecnico).
      3. Status de conformidade cibernetica (CNSP 381) como item do board pack.
      4. Material incidents de TI reportados diretamente ao conselho.
    tools:
      - reporting-platform
      - bi-platform
      - grc-platform
  secops:
    prose: |
      **Governanca do conselho:**
      1. Calendario anual de aprovacoes do conselho: DAR, politicas, plano de auditoria.
      2. Treinamento do conselho em gestao de riscos (CNSP 416): ao menos anual.
      3. Avaliacao da competencia do conselho em riscos: membros entendem o que aprovam?
      4. Atas documentando deliberacoes e aprovacoes (evidencia de conformidade).

      **Monitoramento pelo conselho:**
      5. Relatorio trimestral de riscos ao conselho: status vs. DAR, tendencias.
      6. Relatorio anual do CAE ao conselho.
      7. Self-assessment do conselho em governanca de riscos.
      8. Benchmark de governanca com peers: o conselho esta alinhado com melhores praticas?
    tools:
      - grc-platform
      - board-portal
      - reporting-platform
      - training-platform
