id: art-34
family: cap-5
title: "Documentacao e Registros"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 34. As supervisionadas devem manter documentação atualizada e organizada
    de todas as estruturas, políticas e procedimentos do SCI e da EGR.

    § 1. A documentação deve:
    I - descrever o modelo de governança e as responsabilidades de cada função;
    II - detalhar as políticas, processos e controles implementados;
    III - registrar as avaliações e os testes realizados com seus resultados;
    IV - incluir os relatórios periódicos de risco e de auditoria.

    § 2. A documentação deve ser retida pelo prazo mínimo de cinco anos e
    estar disponível para revisão pela Susep a qualquer momento.

    § 3. A documentação deve ser controlada, com versões identificadas e
    aprovadas, e o acesso restrito conforme necessidade.
guidance:
  prose: |
    O art. 34 estabelece os requisitos de documentacao e retencao de registros.
    Para a SUSEP, documentacao e a evidencia de conformidade — sem ela, nao ha
    como provar que os controles existem e funcionam.

    **O que deve ser documentado:**

    **Modelo de governanca (I):**
    Organograma da governanca de riscos, estatutos dos comites, delegacoes de autoridade,
    responsabilidades do CRO/CCO/CAE.

    **Politicas e controles (II):**
    Todas as politicas mencionadas nos artigos anteriores: politica de risco,
    politica de controles, DAR, codigo de etica, PCN, etc.

    **Avaliacoes e testes (III):**
    Workpapers de auditoria, relatorios de RCSA, resultados de testes de controle,
    ORSA, stress tests.

    **Relatorios periodicos (IV):**
    Relatorios mensais do CRO, relatorios trimestrais ao conselho, relatorio anual
    da auditoria interna, relatorio do ORSA.

    **Retencao de 5 anos (ss 2):**
    O prazo de prescricao de muitas infrações regulatorias e de 5 anos. A documentacao
    deve cobrir este periodo para que a SUSEP possa reconstruir o historico.

    **Disponibilidade para SUSEP (ss 2):**
    A SUSEP pode solicitar qualquer documento a qualquer momento. Nao e aceitavel
    dizer "nao encontramos". Os documentos devem estar organizados e acessiveis.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de documentos regulatorios:**
      1. Document management centralizado com taxonomia regulatoria (CNSP 416, SUSEP).
      2. Versionamento automatico: cada nova versao de um documento substitui a anterior
         mas a anterior e preservada.
      3. Ciclo de vida do documento: rascunho → revisao → aprovacao → publicacao → expurgo.
      4. Retencao automatica: politicas de retencao por categoria (5 anos, 10 anos).

      **Acesso e seguranca:**
      5. Controle de acesso por categoria de documento: politicas publicas vs.
         workpapers de auditoria (acesso restrito).
      6. Trilha de auditoria do document management: quem acessou, editou, aprovou.
      7. Busca full-text para localizacao rapida de documentos.
      8. Export para SUSEP: processo rapido de producao de documentos solicitados.
    tools:
      - document-management
      - grc-platform
      - compliance-scanner
      - audit-logging
  devsecops:
    prose: |
      **Documentacao tecnica como parte do SCI:**
      1. Runbooks e procedimentos tecnicos versionados no Git.
      2. Architecture Decision Records (ADRs) para decisoes de sistemas criticos.
      3. Documentacao de seguranca: threat models, security assessments, pen test reports.
      4. Change records: historico de mudancas em sistemas regulatorios.
    tools:
      - git-repository
      - document-management
      - change-management
  secops:
    prose: |
      **Programa de documentacao:**
      1. Inventario de documentos obrigatorios: lista de todos os documentos exigidos
         pela CNSP 416 com status (existente, desatualizado, ausente).
      2. Owner de cada documento: responsavel por manter atualizado.
      3. Calendario de revisao: quando cada documento vence e precisa ser atualizado.
      4. Processo de aprovacao de documentos novos ou revisados.

      **Prontidao para fiscalizacao da SUSEP:**
      5. Dossier de conformidade CNSP 416: conjunto organizado de todos os documentos.
      6. Simulacao de fiscalizacao: pelo menos anual, verificar que todos os documentos
         podem ser produzidos em 24-48 horas.
      7. Index de documentos: mapa de onde encontrar cada documento exigido.
      8. Teste de retencao: verificar que documentos de 5 anos atras ainda existem.
    tools:
      - document-management
      - grc-platform
      - compliance-scanner
