id: art-36
family: cap-5
title: "Avaliacao da Cultura de Riscos"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 36. As supervisionadas devem promover e avaliar periodicamente a cultura
    de riscos da organização, entendida como o conjunto de valores, atitudes,
    competências e comportamentos que moldam como a organização identifica,
    compreende, discute e age sobre os riscos.

    § 1. A avaliação da cultura de riscos deve considerar:
    I - o grau de integração da gestão de riscos às decisões de negócio;
    II - o nível de conscientização e engajamento dos colaboradores;
    III - a abertura para comunicação de riscos, incluindo más notícias;
    IV - a efetividade dos incentivos e das sanções alinhados à gestão de riscos.

    § 2. Os resultados da avaliação da cultura de riscos devem ser reportados
    ao conselho de administração.
guidance:
  prose: |
    O art. 36 e inovador: formaliza a avaliacao de cultura de riscos como obrigacao
    regulatoria. Cultura e o "como as coisas realmente acontecem" vs. o "como deveriam
    acontecer". Um SCI de papel excelente com cultura fraca e inefetivo.

    **Por que cultura importa mais que politicas:**
    Politicas dizem o que fazer. Cultura determina o que REALMENTE acontece.
    Uma cultura de "shooter the messenger" (punir quem traz mas noticias) destruira
    qualquer EGR, por mais sofisticada que seja. Ninguem vai reportar riscos se
    isso os prejudicar.

    **Quatro dimensoes da cultura de risco (ss 1):**

    **I - Integracao ao negocio:**
    Os gestores de negocio usam a EGR nas suas decisoes? Ou veem risco como
    obstaculo burocrático?

    **II - Conscientizacao e engajamento:**
    Os colaboradores entendem os riscos da sua funcao? Sao treinados?
    Participam ativamente do RCSA?

    **III - Abertura para comunicar riscos:**
    Existe "psychological safety" para falar sobre riscos? Ou o mensageiro e executado?
    Um indicador positivo: o volume de eventos de risco operacional reportados.
    Paradoxo: mais relatos podem indicar cultura mais saudavel, nao mais riscos.

    **IV - Incentivos alinhados:**
    O sistema de bonificacao incentiva assuncao excessiva de risco em detrimento
    dos controles? Ou inclui metricas de aderencia ao apetite ao risco?
implementation_guidance:
  platform_engineering:
    prose: |
      **Mensuracao de cultura de riscos:**
      1. Pesquisa de cultura de riscos digital: ferramenta de survey com anonimato
         para colaboradores.
      2. Metricas de cultura a partir de dados operacionais: volume de relatos de
         incidente (mais = melhor cultura), % de RCSA completados no prazo, etc.
      3. Dashboard de cultura de riscos com indicadores quantitativos e qualitativos.
      4. Benchmarking: comparacao de metricas de cultura com industria.
    tools:
      - survey-platform
      - grc-platform
      - bi-platform
  devsecops:
    prose: |
      **Cultura de riscos em TI:**
      1. Blameless post-mortems: cultura de aprendizado, nao punitiva para incidentes.
      2. Security champion program: promotores de cultura de seguranca em cada equipe.
      3. Game days / chaos engineering: cultura de resiliencia.
      4. Metricas de cultura tecnica: % cobertura de testes, debito tecnico, MTTR.
    tools:
      - training-platform
      - grc-platform
      - monitoring-alerting
  secops:
    prose: |
      **Programa de cultura de riscos:**
      1. Pesquisa de cultura de riscos anual com todas as areas.
      2. Focus groups com diferentes niveis hierarquicos para percepao qualitativa.
      3. Analise de metricas de cultura: relatos de incidente, recusas de excecao, etc.
      4. Plano de acao para gaps de cultura: treinamento, comunicacao, incentivos.

      **Incentivos alinhados:**
      5. Revisao do sistema de remuneracao variavel: inclui metricas de risco?
      6. Avaliacoes de performance incluem comportamento em relacao a riscos.
      7. Reconhecimento publico de boa gestao de riscos (nao apenas de resultados).
      8. Relatorio de cultura de riscos ao conselho: resultados da avaliacao anual.
    tools:
      - grc-platform
      - survey-platform
      - reporting-platform
      - hr-platform
