id: art-14
family: cap-3
title: "Apetite ao Risco e Declaracao de Apetite"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 14. As supervisionadas devem definir e formalizar o apetite ao risco da
    organização, traduzido em declaração de apetite ao risco (DAR) aprovada pelo
    conselho de administração.

    § 1. A DAR deve:
    I - estabelecer o nível e os tipos de risco que a supervisionada está disposta
    a aceitar em busca de seus objetivos estratégicos;
    II - definir tolerâncias e limites para os principais riscos identificados;
    III - ser consistente com o plano estratégico e a capacidade de absorção de
    perdas da supervisionada;
    IV - ser revisada ao menos anualmente ou quando ocorrerem mudanças estratégicas
    ou regulatórias relevantes.

    § 2. Os limites de risco definidos na DAR devem ser desdobrados em limites
    operacionais para as áreas de negócio e de suporte.
guidance:
  prose: |
    O art. 14 e o artigo mais importante da EGR em termos de governanca. A DAR
    (Declaracao de Apetite ao Risco) e o documento que traduz a estrategia da empresa
    em termos de risco.

    **O que uma boa DAR deve conter:**

    **Parte qualitativa:**
    - Filosofia de risco: como a empresa pensa sobre risco? Risk-averse ou risk-seeker?
    - Tipos de riscos aceitos e nao aceitos: ex. "Aceitamos risco de subscricao de
      vida, mas nao de saude suplementar."
    - Principios de gestao de risco

    **Parte quantitativa:**
    - Limites de risco de subscricao: combined ratio maximo, perda maxima em catastrofe
    - Limites de risco de mercado: VaR maximo para carteira de investimentos
    - Limites de risco de credito: concentracao maxima por emissor, rating minimo
    - Limites de risco de liquidez: LCR minimo, prazo de cobertura de sinistros
    - Limites de risco operacional: perda operacional aceitavel por ano

    **Desdobramento (ss 2):**
    Limites globais aprovados pelo conselho → limites por linha de negocio → limites
    por produto → limites por geografiaretribuicao → limites por underwriter.
    Estrutura em cascata, cada nivel dentro do nivel acima.
implementation_guidance:
  platform_engineering:
    prose: |
      **Risk appetite framework em sistema:**
      1. DAR codificada no sistema de GRC com metricas, limites e tolerancias por tipo de risco.
      2. Monitoramento em tempo real da utilizacao dos limites de apetite ao risco.
      3. Alertas graduais: 75% do limite (monitorar), 90% (alertar CRO), 100% (escalar conselho).
      4. Drill-down: limite global → limite por area → limite por produto.

      **Desdobramento de limites:**
      5. Hierarchy de limites: corporate → business unit → product → underwriter.
      6. Pre-deal checks automaticos para subscricao de riscos acima de limites.
      7. Dashboard de utilizacao de limites por nivel de hierarquia.
      8. Excecoes de limite: workflow de aprovacao com audit trail.
    tools:
      - grc-platform
      - risk-management
      - limit-management-system
      - workflow-engine
  devsecops:
    prose: |
      **Apetite ao risco de TI:**
      1. Secao de risco de TI/cibernetico na DAR: ex. "nao aceitamos sistemas criticos
         de seguros com vulnerabilidades criticas abertas por mais de 30 dias."
      2. Policy-as-Code implementando os limites de risco de TI da DAR.
      3. Pipeline falha automaticamente se risco de TI superar o definido na DAR.
      4. Metricas de risco de TI exportadas para dashboard de apetite ao risco.
    tools:
      - opa-gatekeeper
      - gitlab-ci
      - vulnerability-management
      - risk-management
  secops:
    prose: |
      **Elaboracao e manutencao da DAR:**
      1. Processo anual de revisao da DAR: analise do ambiente, validacao de limites,
         proposta de ajustes, aprovacao pelo conselho.
      2. DAR traducida em linguagem operacional: equipes entendem seus limites.
      3. Comunicacao da DAR a todas as areas: treinamento, publicacao interna.
      4. Processo de excecao: como solicitar excecao temporaria de limite com justificativa.

      **Monitoramento de aderencia a DAR:**
      5. Relatorio mensal de aderencia: todos os limites dentro do apetite?
      6. Alertas imediatos para o CRO quando qualquer limite e atingido.
      7. Relatorio trimestral ao conselho com status vs. DAR aprovada.
      8. Historico de utilizacao de limites para analise de tendencias.
    tools:
      - grc-platform
      - risk-management
      - reporting-platform
