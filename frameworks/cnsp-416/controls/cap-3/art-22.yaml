id: art-22
family: cap-3
title: "Mitigacao e Tratamento de Riscos"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 22. A EGR deve contemplar estratégias formais de tratamento dos riscos
    identificados, incluindo:
    I - aceitação: para riscos dentro do apetite ao risco definido;
    II - mitigação: implementação de controles para reduzir probabilidade ou impacto;
    III - transferência: utilização de instrumentos como reinsuro, resseguro e
    derivativos para transferência de risco a terceiros;
    IV - evasão: descontinuação de atividades cujo risco excede o apetite.

    § 1. A estratégia de tratamento de risco deve ser documentada e vinculada ao
    risco específico no registro de riscos.

    § 2. A efetividade das estratégias de tratamento deve ser monitorada e avaliada
    periodicamente.
guidance:
  prose: |
    O art. 22 formaliza as quatro estrategias de tratamento de risco (as quatro "T's"
    do risk treatment: tolerate, treat, transfer, terminate).

    **Aceitacao (I) — Risk Tolerance:**
    Riscos dentro do apetite sao aceitos conscientemente. A documentacao e critica:
    nao e ignorar o risco — e aceitar com plena consciencia e monitoramento.

    **Mitigacao (II) — o mais comum:**
    Controles que reduzem probabilidade (ex: segregacao de funcoes para fraude) ou
    impacto (ex: backup para perda de dados). O SCI (Capitulo 2) e majoritariamente
    sobre mitigacao de riscos.

    **Transferencia (III) — especifico do mercado segurador:**
    O mercado segurador tem um mecanismo de transferencia de risco unico: o reinsuro.
    - Reinsuro proporcional: cede participacao no risco ao ressegurador
    - Reinsuro nao-proporcional (XL): cobre sinistros acima de determinado valor
    Para EAPCs: derivativos de taxa de juros para transferencia de risco de ALM.

    **Evasao (IV) — descontinuacao:**
    Parar de fazer algo cuja relacao risco/retorno e inaceitavel. Ex: descontinuar
    produto de seguro que gera combined ratio sistematicamente acima de 120%.

    **Documentacao e monitoramento (ss 1-2):**
    Cada risco no registro deve ter sua estrategia de tratamento documentada.
    E verificado periodicamente se a estrategia esta sendo efetiva.
implementation_guidance:
  platform_engineering:
    prose: |
      **Risk treatment no sistema GRC:**
      1. Cada risco no registro tem campo obrigatorio de estrategia de tratamento
         (aceitacao, mitigacao, transferencia, evasao) com justificativa.
      2. Linkagem risco → controles mitigadores → efetividade dos controles.
      3. Gestao de programas de reinsuro: integracao com sistema de reinsuro para
         monitorar transferencia de risco automaticamente.
      4. Tracking de effectiveness: o tratamento esta funcionando? Risco diminuiu?

      **Reinsuro como ferramenta de transferencia:**
      5. Sistema de reinsuro integrado ao GRC: risco aceito = cedido ao ressegurador?
      6. Analise de recuperacoes de reinsuro em cenarios de stress.
      7. Monitoramento de credito do ressegurador: risco de transferencia pode falhar.
    tools:
      - grc-platform
      - risk-management
      - reinsurance-system
      - workflow-engine
  devsecops:
    prose: |
      **Tratamento de risco de TI:**
      1. Risk treatment decisions para riscos de TI documentadas no GRC com codigo afetado.
      2. Accepted risks formalmente documentados: vulnerabilidades aceitas com justificativa.
      3. Mitigating controls para vulnerabilidades: controles compensatorios quando patch
         nao e possivel imediatamente.
      4. Risk evasion: descontinuar dependencias com risco inaceitavel.
    tools:
      - vulnerability-management
      - grc-platform
      - gitlab-ci
  secops:
    prose: |
      **Ciclo de tratamento de riscos:**
      1. Risk treatment plan para cada risco: estrategia, controles, responsavel, prazo.
      2. Revisao trimestral: a estrategia de tratamento continua adequada?
      3. Monitoramento de efetividade: o risco diminuiu apos implementar o tratamento?
      4. Revisao do risk appetite se riscos sistematicamente nao forem tratados.

      **Programa de reinsuro:**
      5. Analise anual do programa de reinsuro: adequado ao perfil de risco da carteira?
      6. Stress testing do reinsuro: e se o ressegurador falir? (risco de credito)
      7. Due diligence de resseguradores: rating minimo, capacidade, reputacao.
      8. Documentacao de cobertura de reinsuro por tipo de risco transferido.
    tools:
      - grc-platform
      - risk-management
      - reporting-platform
