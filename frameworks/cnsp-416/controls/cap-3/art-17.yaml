id: art-17
family: cap-3
title: "Testes de Estresse e Analise de Cenarios"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 17. As supervisionadas devem realizar testes de estresse e análise de cenários
    para avaliar a resiliência da organização ante situações adversas.

    § 1. Os testes de estresse devem:
    I - contemplar cenários históricos de eventos adversos relevantes;
    II - incluir cenários hipotéticos para situações de estresse severo;
    III - avaliar o impacto combinado de múltiplos fatores de risco (cenários integrados);
    IV - considerar especificidades do modelo de negócio e do portfólio de riscos.

    § 2. Os resultados dos testes de estresse devem ser utilizados para:
    I - avaliar a suficiência de capital e de reservas técnicas;
    II - revisar limites de risco e o apetite ao risco;
    III - subsidiar o plano de contingência de capital e de liquidez.

    § 3. Os testes de estresse devem ser realizados ao menos anualmente e sempre que
    houver mudanças relevantes no ambiente de risco.
guidance:
  prose: |
    O art. 17 torna o stress testing uma obrigacao formal para todas as supervisionadas.
    O stress testing e a ferramenta que responde: "e se o pior cenario ocorrer?"

    **Tipos de cenarios (ss 1):**

    **Historicos (I):** Baseados em eventos reais:
    - Pandemia COVID-19 (2020): impacto em sinistros de vida e saude
    - Crise financeira de 2008: impacto em portfolio de investimentos
    - Tempestades e catastrofes naturais historicas no Brasil
    - Hiperinflacao: impacto em passivos indexados

    **Hipoteticos severos (II):** Cenarios plausivos mas nunca ocorridos:
    - Pandemia com mortalidade 3x maior que COVID
    - Terremoto catastrofico em area de alta concentracao
    - Crise de confianca causando resgate em massa em EAPCs
    - Ataque cibernetico sistematico ao setor segurador

    **Integrados (III):** Combinacao simultanea de fatores:
    Ex: alta inadimplencia de segurados + queda de mercado + sinistro catastrofico.
    O mais realista, pois crises raramente afetam apenas um tipo de risco.

    **Uso dos resultados (ss 2):**
    Os resultados devem influenciar decisoes: nao fazer stress test como exercicio
    academico que fica no arquivo. Se o teste mostra insuficiencia de capital, deve
    haver acao concreta.
implementation_guidance:
  platform_engineering:
    prose: |
      **Motor de stress testing:**
      1. Stress testing engine capaz de processar cenarios multiplos em paralelo.
      2. Biblioteca de cenarios historicos e hipoteticos pre-configurados.
      3. Cenarios customizados: possibilidade de definir shocks especificos.
      4. Cenarios integrados: correlacao entre tipos de risco em cenario de crise.

      **ORSA (Own Risk and Solvency Assessment):**
      5. Modulo de ORSA integrado com stress testing engine.
      6. Projecao de solvencia em cenarios adversos para horizonte de 3-5 anos.
      7. Capital adequacy analysis: capital disponivel vs. capital necessario em stress.
      8. Relatorio de ORSA gerado automaticamente com evidencias dos cenarios.
    tools:
      - risk-engine
      - actuarial-system
      - stress-testing-platform
      - bi-platform
  devsecops:
    prose: |
      **Stress testing de sistemas de TI:**
      1. Load testing de sistemas criticos sob cenarios de stress operacional.
      2. Chaos engineering para simular falhas simultaneas (cenario integrado de TI).
      3. Disaster recovery testing: simular perda de datacenter principal.
      4. Capacity planning baseado em cenarios de stress de volume.
    tools:
      - chaos-engineering
      - load-testing
      - dr-platform
      - monitoring-alerting
  secops:
    prose: |
      **Programa de stress testing:**
      1. Plano anual de stress testing com calendario, cenarios e responsaveis.
      2. Cenarios aprovados pelo CRO e conselho antes da execucao.
      3. Documentacao metodologica: premissas, dados, calculos — auditavel.
      4. Relatorio de resultados com analise de impacto e implicacoes para capital.

      **Governanca dos resultados:**
      5. Apresentacao dos resultados ao comite de riscos e ao conselho.
      6. Plano de acao para insuficiencias identificadas: prazo, responsavel.
      7. Revisao do apetite ao risco e limites com base nos resultados.
      8. Registro historico de todos os stress tests realizados para benchmarking.
    tools:
      - grc-platform
      - risk-engine
      - reporting-platform
      - document-management
