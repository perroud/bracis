id: art-16
family: cap-3
title: "Monitoramento e Reporte de Riscos"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 16. A EGR deve contemplar processos contínuos de monitoramento dos riscos
    identificados e mecanismos de reporte tempestivo à alta administração.

    § 1. O monitoramento de riscos deve incluir:
    I - acompanhamento periódico dos indicadores-chave de risco (KRIs);
    II - verificação da aderência aos limites de risco estabelecidos na DAR;
    III - identificação de tendências e riscos emergentes;
    IV - monitoramento de exposições a riscos de contraparte.

    § 2. O reporte de riscos deve ser estruturado em função do nível hierárquico
    destinatário, garantindo que cada nível receba informações adequadas à sua
    responsabilidade e capacidade de ação.

    § 3. Exceções aos limites de risco devem ser comunicadas tempestivamente ao
    CRO e, conforme a materialidade, ao conselho de administração.
guidance:
  prose: |
    O art. 16 estabelece o monitoramento continuo e o reporting estruturado como
    elementos essenciais da EGR.

    **KRIs (Key Risk Indicators):**
    Metricas que sinalizam o nivel de risco ANTES que se materialize em perda.
    Diferenca critica: KPI mede o que JA aconteceu, KRI sinaliza o que PODE acontecer.

    Exemplos por tipo de risco:
    - Subscricao: loss ratio mensal, combined ratio, relatorio de IBNR
    - Mercado: VaR diario, duration gap, rentabilidade de carteira
    - Liquidez: LCR, runway de caixa, concentracao de vencimentos
    - Operacional: volume de incidentes, SLA de sistemas criticos, erros de processamento

    **Reporte por nivel hierarquico (ss 2):**
    - Operacional (primeira linha): alertas em tempo real, KRIs diarios
    - Gerencial (segunda linha): relatorio semanal/mensal, tendencias
    - Executivo (CRO, diretores): relatorio mensal consolidado
    - Conselho: relatorio trimestral estrategico

    Cada nivel precisa de NIVEL DE DETALHE diferente, nao mais informacao — e
    a informacao CERTA para a decisao CERTA.

    **Escalacao de excecoes (ss 3):**
    Processo claro: quando e como escalar uma excecao. O CRO deve ser notificado
    imediatamente quando qualquer limite e ultrapassado.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de monitoramento em tempo real:**
      1. Risk monitoring dashboard com KRIs em tempo real para o CRO e areas de risco.
      2. Alertas automatizados quando KRIs atingem thresholds (75%, 90%, 100% do limite).
      3. Escalonamento automatico: alerta → email → SMS → ligacao para excecoes criticas.
      4. Time series analytics de KRIs para identificacao de tendencias.

      **Reporting automatizado:**
      5. Relatorios de risco gerados automaticamente por nivel: operacional, gerencial,
         executivo, conselho — com conteudo e detalhe adequado a cada nivel.
      6. Relatorio de excecoes de limite: automatico quando limites sao ultrapassados.
      7. Drill-down interativo: conselheiro pode detalhar qualquer metrica do board pack.
      8. Mobile access para CRO: KRIs acessiveis em smartphone 24x7.
    tools:
      - risk-management
      - grc-platform
      - bi-platform
      - monitoring-alerting
  devsecops:
    prose: |
      **KRIs de risco de TI:**
      1. Metricas de risco de TI exportadas automaticamente para o risk management system.
      2. Integracao SIEM → GRC: eventos de seguranca contribuem para KRIs de risco operacional.
      3. Vulnerability aging metrics: KRI de tempo medio de remediacao de vulnerabilidades criticas.
      4. Pipeline health metrics como KRI de risco operacional de TI.

      **Reporte de incidentes de TI:**
      5. Processo automatizado de notificacao ao CRO para incidentes de severidade alta.
      6. Relatorio de incidentes de TI como contribuicao ao relatorio de risco operacional.
    tools:
      - siem
      - grc-platform
      - monitoring-alerting
      - vulnerability-management
  secops:
    prose: |
      **Operacao do monitoramento de riscos:**
      1. Equipe de risco monitorando KRIs diariamente com revisao pelo CRO semanal.
      2. Processo de revisao de tendencias: KRIs deteriorando antes de atingir limite.
      3. Risk committee mensal: revisao dos principais riscos com areas de negocio.
      4. CRO daily standup com team leads para discussao de riscos emergentes.

      **Governanca do reporting:**
      5. Templates padronizados por nivel hierarquico (operacional, gerencial, executivo).
      6. SLA de distribuicao: relatorio mensal no 5o dia util do mes seguinte.
      7. Board pack de riscos: entregue 5 dias antes da reuniao do conselho.
      8. Processo de revisao e aprovacao de relatorios antes da distribuicao.
    tools:
      - grc-platform
      - reporting-platform
      - bi-platform
      - workflow-engine
