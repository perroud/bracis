id: art-15
family: cap-3
title: "Identificacao, Mensuracao e Avaliacao de Riscos"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 15. A EGR deve prever processos formais e periódicos para identificação,
    mensuração e avaliação dos riscos a que a supervisionada está exposta.

    § 1. Os processos de identificação de riscos devem considerar fontes internas
    e externas, incluindo mudanças no ambiente de negócios, regulatório, tecnológico
    e macroeconômico.

    § 2. A mensuração de riscos deve utilizar metodologias adequadas ao tipo e
    à natureza de cada risco, incluindo abordagens qualitativas e quantitativas.

    § 3. A avaliação de riscos deve considerar tanto a probabilidade de ocorrência
    quanto o impacto potencial, resultando em classificação de risco que subsidie
    a priorização das ações de mitigação.
guidance:
  prose: |
    O art. 15 estabelece o processo de identificacao, mensuracao e avaliacao de riscos
    como etapas formais e periodicas — nao ad hoc ou reativas.

    **Identificacao de riscos (ss 1):**
    Fontes internas: perdas historicas, achados de auditoria, reclamacoes de segurados,
    indicadores operacionais, entrevistas com gestores.
    Fontes externas: eventos setoriais, mudancas regulatorias, ameacas ciberneticas,
    mudancas economicas, catastrofes naturais.

    **Metodologias de mensuracao (ss 2):**

    Quantitativas:
    - Risco de subscricao: loss ratio, combined ratio, triangulos de run-off
    - Risco de mercado: VaR (Value at Risk), Expected Shortfall
    - Risco de credito: PD (Probability of Default), LGD, EAD
    - Risco de liquidez: LCR (Liquidity Coverage Ratio), stress tests de fluxo

    Qualitativas:
    - Risco operacional (sem historico suficiente): scorecards, RCSA
    - Risco reputacional: avaliacao qualitativa com scoring
    - Risco estrategico: cenarios qualitativos

    **Matriz de risco (ss 3):**
    Probabilidade x impacto = classificacao. Tipicamente:
    - Critico: probabilidade alta x impacto alto
    - Alto: combinacoes intermediarias
    - Medio/Baixo: probabilidade baixa x impacto baixo
implementation_guidance:
  platform_engineering:
    prose: |
      **Risk assessment automatizado:**
      1. Modulo de risk assessment no GRC com suporte a metodologias qualitativas e
         quantitativas (RCSA, scoring, VaR, simulacao Monte Carlo).
      2. Matriz de risco automatizada: probabilidade x impacto com heatmap visual.
      3. Integracao com fontes de dados externas para identificacao de riscos externos
         (feeds de noticias, regulatory alerts, cyber threat intelligence).
      4. Base de dados de perdas operacionais para calibracao de modelos.

      **Modelos atuariais:**
      5. Sistema de triangulos de run-off para risco de reserva de sinistros.
      6. Modelos de risco de subscricao: GLM, credibilidade, tarifacao.
      7. Stress testing de provisoes tecnicas: cenarios adversos de IBNR.
      8. Integracao com sistema de sinistros para alimentar modelos automaticamente.
    tools:
      - risk-engine
      - actuarial-system
      - grc-platform
      - risk-intelligence
  devsecops:
    prose: |
      **Risk assessment de TI:**
      1. Threat modeling formal para novos sistemas: STRIDE, PASTA, ou equivalente.
      2. RCSA (Risk and Control Self-Assessment) automatizado para sistemas de TI.
      3. Vulnerability scoring (CVSS) como mensuracao quantitativa de risco de TI.
      4. Risk scoring de dependencias open-source (OSSF Scorecard, dep-scan).

      **Identificacao de riscos emergentes de TI:**
      5. Integracao com CVE feeds para identificacao tempestiva de novas vulnerabilidades.
      6. Threat intelligence automatizado: novas TTPs relevantes para o setor segurador.
      7. Bug bounty ou responsible disclosure como canal de identificacao de riscos.
    tools:
      - threat-modeling
      - vulnerability-management
      - siem
      - risk-intelligence
  secops:
    prose: |
      **Processo de identificacao de riscos:**
      1. Workshop de risk assessment semestral com area de negocio e TI.
      2. Revisao anual completa do risk register com todas as fontes (interna/externa).
      3. Processo de inclusao de novos riscos: proposta, avaliacao, aprovacao CRO.
      4. Horizon scanning mensal: o que mudou no ambiente externo que pode gerar novos riscos?

      **Metodologia de avaliacao:**
      5. Metodologia formal documentada para mensuracao de cada tipo de risco.
      6. Validacao de modelos: revisao independente das metodologias de mensuracao.
      7. Calibracao de modelos com dados reais: backtesting anual.
      8. Matriz de risco atualizada e revisada trimestralmente.
    tools:
      - grc-platform
      - risk-management
      - actuarial-system
      - reporting-platform
