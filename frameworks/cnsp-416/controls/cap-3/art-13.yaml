id: art-13
family: cap-3
title: "Requisitos da Estrutura de Gestao de Riscos"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 13. As supervisionadas devem implementar e manter estrutura de gestão de
    riscos (EGR) proporcional ao seu porte, complexidade e perfil de risco.

    § 1. A EGR deve ser integrada à estratégia de negócios e ao processo de tomada
    de decisão da supervisionada.

    § 2. A EGR deve abranger todos os riscos relevantes a que a supervisionada está
    exposta, incluindo, no mínimo:
    I - risco de subscrição;
    II - risco de crédito;
    III - risco de mercado;
    IV - risco de liquidez;
    V - risco operacional;
    VI - risco reputacional;
    VII - risco estratégico.

    § 3. A identificação dos riscos relevantes deve ser periodicamente revisada para
    incorporar riscos emergentes.
guidance:
  prose: |
    O art. 13 e o artigo central da EGR. Define os sete tipos de risco minimos que
    a estrutura deve cobrir. Para o mercado de seguros, o risco de subscricao
    e unico e nao existe em outros setores.

    **Risco de subscricao (inciso I):**
    Risco de que as perdas pagas por sinistros excedam os premios arrecadados.
    Componentes: risco de precificacao (produto mal tarifado), risco de provisao
    (provisao tecnica insuficiente), risco de catastrofe (evento extremo).

    **Risco de credito (inciso II):**
    Para seguradoras: risco de contraparte em reinsuro (cedente nao recebe recuperacao),
    risco de inadimplencia de segurados, risco de emissor em investimentos.

    **Risco de mercado (inciso III):**
    Variacao no valor dos investimentos (renda fixa, renda variavel, cambio).
    Para EAPCs, inclui descasamento entre ativos e passivos atuariais (ALM).

    **Risco de liquidez (inciso IV):**
    Capacidade de honrar obrigacoes no vencimento. Para seguradoras: resgate em massa
    (EAPC), sinistro catastrofico que exige pagamento rapido.

    **Risco operacional (inciso V):**
    Perdas por falhas em processos, pessoas, sistemas ou eventos externos.
    Inclui risco cibernetico (relevante para CNSP 381).

    **Risco reputacional (inciso VI) e estrategico (inciso VII):**
    Menos mensuraveis mas igualmente relevantes. Reputacional impacta renovacao de
    apolices; estrategico e sobre decisoes de negocio que comprometem o futuro.
implementation_guidance:
  platform_engineering:
    prose: |
      **Risk engine para seguros:**
      1. Motor de risco com modelos especificos para seguros: risco de subscricao
         (loss triangles, IBNR), risco atuarial (tabuas de mortalidade), ALM.
      2. Integracao do risk engine com sistemas de subscricao para precificacao
         ajustada ao risco em tempo real.
      3. Stress testing engine para cenarios catastróficos (tempestade, pandemia).
      4. Modulo de Capital Baseado em Risco (CBR) integrado conforme regulacao SUSEP.

      **Integracao com estrategia:**
      5. Business intelligence com metricas de risco linkadas a KPIs estrategicos.
      6. Dashboard executivo: risco atual vs. apetite ao risco aprovado.
      7. Forward-looking risk indicators para antecipar riscos emergentes.
      8. Integracao com sistema de planejamento estrategico para cenarios de risco.
    tools:
      - risk-engine
      - actuarial-system
      - bi-platform
      - grc-platform
  devsecops:
    prose: |
      **Riscos emergentes em TI:**
      1. Identificacao de riscos emergentes de TI: AI/ML risks, cloud concentration,
         third-party software, open-source vulnerabilities.
      2. Risk assessment de novas tecnologias antes de adocao em producao.
      3. Threat modeling para novos sistemas e funcionalidades (STRIDE/DREAD).
      4. Vulnerability intelligence feed integrado ao risk register.

      **Risco operacional de TI no pipeline:**
      5. Metricas de risco operacional de TI: vulnerabilidades abertas por criticidade,
         MTTD/MTTR de incidentes, cobertura de testes.
      6. Risk appetite de TI codificado: pipeline falha se risco > threshold definido.
    tools:
      - threat-modeling
      - vulnerability-management
      - gitlab-ci
      - risk-intelligence
  secops:
    prose: |
      **Identificacao e classificacao de riscos:**
      1. Risk register abrangente com todos os 7 tipos de risco identificados.
      2. Processo de identificacao de novos riscos: reuniao trimestral, horizon scanning.
      3. Risk assessment periodico (ao menos anual) de todos os riscos do register.
      4. Riscos emergentes: processo formal para adicionar ao register (aprovacao da EGR).

      **Monitoramento continuo:**
      5. KRIs para cada tipo de risco com thresholds de alerta e limite.
      6. Risk reporting mensal ao CRO com status de todos os riscos relevantes.
      7. Relatorio trimestral ao conselho com visao consolidada de riscos.
      8. Benchmark setorial: comparacao de perfil de risco com peers do mercado segurador.
    tools:
      - grc-platform
      - risk-management
      - reporting-platform
      - bi-platform
