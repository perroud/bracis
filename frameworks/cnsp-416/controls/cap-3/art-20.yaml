id: art-20
family: cap-3
title: "Diretor de Riscos (CRO)"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 20. As supervisionadas devem designar diretor responsável pela estrutura de
    gestão de riscos (CRO -- Chief Risk Officer), com qualificação técnica adequada.

    § 1. O CRO deve possuir:
    I - independência em relação às áreas de negócio que geram riscos;
    II - acesso direto ao conselho de administração;
    III - autoridade para questionar e vetar operações que excedam os limites de risco.

    § 2. O CRO é o principal responsável por:
    I - implementar e manter a EGR;
    II - garantir que os riscos relevantes sejam identificados, mensurados e monitorados;
    III - relatar ao conselho a postura de risco da supervisionada;
    IV - propor revisões do apetite ao risco e dos limites de risco.

    § 3. A função de CRO não pode ser acumulada com funções de negócio que gerem
    exposição a risco ou com a função de auditoria interna.
guidance:
  prose: |
    O art. 20 cria a figura do CRO (Chief Risk Officer) como exigencia formal para todas
    as supervisionadas da SUSEP, com tres atributos inegociaveis: independencia, acesso
    direto ao conselho e autoridade para vetar operacoes que violem os limites de risco.

    **Independencia do CRO (ss 1, inciso I):**
    O CRO nao pode ser gestor de fundos, lider de subscricao ou responsavel por unidade
    geradora de receita. Nao pode ter bônus atrelado a resultados de negocio que conflitem
    com sua funcao de controle. A independencia e estrutural, nao apenas de intencao.

    **Acesso direto ao conselho (ss 1, inciso II):**
    O CRO pode e deve levar riscos diretamente ao conselho, sem passar pela diretoria.
    Isso e especialmente critico quando o risco envolve decisoes da propria diretoria.

    **Poder de veto (ss 1, inciso III):**
    Um CRO sem poder de veto e apenas um consultor — pode ser ignorado. O poder de veto
    para operacoes que excedam limites e o que transforma o CRO em funcao efetiva de controle.
    O veto deve estar codificado nos sistemas (art. 6) e nos processos de aprovacao.

    **Quatro responsabilidades do CRO (ss 2):**
    I - Implementar a EGR: responsabilidade operacional pelo framework de riscos
    II - Identificar e monitorar riscos: dia a dia do trabalho do CRO
    III - Relatar ao conselho: comunicacao regular da postura de risco
    IV - Propor revisoes da DAR: papel ativo na evolucao do apetite ao risco

    **Vedacao de acumulo (ss 3):**
    CRO nao pode ser CIO, CFO, CEO ou CAE simultaneamente. Sao funcoes incompativeis
    — o CRO controla o risco, nao o gera.
implementation_guidance:
  platform_engineering:
    prose: |
      **Tooling do CRO:**
      1. Dashboard executivo de riscos personalizado para o CRO com KRIs em tempo real.
      2. Acesso privilegiado a todos os sistemas de risco e dados da entidade.
      3. Alertas diretos ao CRO para excecoes de limites ou riscos emergentes criticos.
      4. Ferramentas de drill-down para investigacao de qualquer metrica de risco.

      **Autoridade tecnica do CRO:**
      5. Implementacao tecnica do poder de veto: sistema de subscricao exige aprovacao
         do CRO para riscos acima de threshold definido.
      6. Workflow de escalacao: CRO e notificado automaticamente para excecoes criticas.
      7. Audit trail de todas as decisoes de risco tomadas ou revisadas pelo CRO.
    tools:
      - grc-platform
      - risk-management
      - bi-platform
      - workflow-engine
  devsecops:
    prose: |
      **CRO e riscos de TI:**
      1. CRO deve ser consultado e aprovador para arquiteturas de sistemas criticos.
      2. Risk assessment de TI reportado ao CRO periodicamente.
      3. Incidentes criticos de TI (ciberneticos, operacionais) devem ser comunicados
         ao CRO imediatamente — nao apenas ao CISO.
      4. CRO tem papel formal no processo de aprovacao de mudancas de alto risco em TI.
    tools:
      - grc-platform
      - incident-management
      - change-management
  secops:
    prose: |
      **Designacao e qualificacao do CRO:**
      1. CRO formalmente designado, registrado na SUSEP, com CV adequado (atuaria, risco).
      2. Processo de avaliacao de qualificacao: atuario, certificacao PRMIA/GARP, CFA.
      3. Independencia formal: o CRO nao pode ser gestor de fundos ou lider de subscricao.
      4. Plano de sucessao do CRO: backup designado para continuidade da funcao.

      **Rotina do CRO:**
      5. Agenda de risco semanal: reunioes com areas, revisao de KRIs, decisoes de risco.
      6. Reuniao mensal de risco com diretoria executiva.
      7. Apresentacao trimestral ao conselho: postura de risco, tendencias, recomendacoes.
      8. ORSA e stress testing liderados e aprovados pelo CRO antes de ir ao conselho.
    tools:
      - grc-platform
      - reporting-platform
      - bi-platform
