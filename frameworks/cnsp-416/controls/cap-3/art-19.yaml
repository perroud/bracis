id: art-19
family: cap-3
title: "ORSA — Avaliacao Propria de Risco e Solvencia"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 19. As supervisionadas devem realizar avaliação própria de risco e solvência
    (ORSA -- Own Risk and Solvency Assessment), destinada a avaliar a adequação do
    nível atual e projetado de capital e de solvência ao perfil de riscos assumidos.

    § 1. O ORSA deve:
    I - avaliar os riscos relevantes e a necessidade de capital associada;
    II - projetar a solvência e o capital em cenários normais e de estresse;
    III - avaliar a adequação da DAR ao perfil de risco da supervisionada;
    IV - ser realizado ao menos anualmente e sempre que houver mudanças relevantes.

    § 2. O relatório do ORSA deve ser aprovado pelo conselho de administração e
    disponibilizado à SUSEP quando solicitado.
guidance:
  prose: |
    O ORSA e o mecanismo que integra a gestao de riscos com a gestao de capital.
    Responde a pergunta fundamental: "Dado nosso perfil de risco, temos capital
    suficiente para honrar nossas obrigacoes em qualquer cenario razoavel?"

    **Componentes do ORSA:**

    **Capital economico:**
    Calculo do capital que a entidade REALMENTE precisa para cobrir seus riscos,
    independente do capital regulatorio minimo (CBR/Solvencia).

    **Forward-looking assessment:**
    Nao apenas a solvencia de hoje, mas a solvencia projetada para 3-5 anos,
    considerando o plano estrategico e os riscos assumidos.

    **Integracao com stress testing (art. 17):**
    O ORSA usa os resultados dos stress tests para projetar a solvencia em cenarios
    adversos. Se um cenario catastrofico consome todo o capital, a DAR deve ser
    revisada ou o capital aumentado.

    **ORSA e diferente de CBR:**
    O CBR (Capital Baseado em Risco) e o capital regulatorio minimo exigido pela SUSEP.
    O ORSA e a avaliacao interna da PROPRIA necessidade de capital — pode ser maior
    que o CBR se os riscos especificos da entidade exigirem.

    **Relatorio do ORSA:**
    Documento formal aprovado pelo conselho, com: sumario executivo, descricao dos
    riscos, metodologias, resultados dos cenarios, conclusoes sobre adequacao de capital,
    plano de acao se necessario.
implementation_guidance:
  platform_engineering:
    prose: |
      **Motor de ORSA:**
      1. Plataforma integrada de ORSA com modulos de risk assessment, capital adequacy e
         stress testing conectados.
      2. Projecao de capital regulatorio (CBR/RBC) e capital economico para horizonte
         de 3-5 anos em cenarios multiplos.
      3. What-if analysis: impacto de mudancas estrategicas na solvencia projetada.
      4. Versioning do ORSA: historico de ORSAs anteriores para comparacao de evolucao.

      **Dados para ORSA:**
      5. Data pipeline automatizado: dados de sinistros, provisoes, investimentos e
         capital alimentando o ORSA diretamente dos sistemas fonte.
      6. Validacao de dados de entrada do ORSA: completude e consistencia.
      7. Relatorio do ORSA gerado automaticamente com todos os dados e graficos.
    tools:
      - actuarial-system
      - risk-engine
      - bi-platform
      - reporting-platform
  devsecops:
    prose: |
      **ORSA de TI:**
      1. Contribuicao do risco de TI para o ORSA: quantificacao do risco operacional
         de TI (incidentes, indisponibilidade, breaches ciberneticos).
      2. Metricas de risco de TI exportadas automaticamente para o sistema de ORSA.
      3. Cenarios de stress de TI (breach sistematico, ransomware) modelados no ORSA.
    tools:
      - siem
      - risk-engine
      - grc-platform
  secops:
    prose: |
      **Processo de ORSA:**
      1. Calendario anual de ORSA: coleta de dados (jan-mar), analise (abr-jun),
         validacao (jul-ago), aprovacao conselho (set-out), submissao SUSEP (nov).
      2. Owner do ORSA: CRO lidera com contribuicao de Atuaria, Financas e TI.
      3. Processo de validacao independente das premissas e modelos do ORSA.
      4. ORSA intra-exercicio para eventos relevantes (grandes sinistros, mudancas estrategicas).

      **Governanca do ORSA:**
      5. Revisao tecnica pelo comite de riscos antes da apresentacao ao conselho.
      6. Aprovacao formal do conselho com registro em ata.
      7. Plano de acao para insuficiencias de capital identificadas no ORSA.
      8. Arquivo do ORSA: relatorio final + workpapers por 5 anos minimo.
    tools:
      - grc-platform
      - actuarial-system
      - reporting-platform
      - document-management
