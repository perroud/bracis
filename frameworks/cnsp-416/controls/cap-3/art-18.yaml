id: art-18
family: cap-3
title: "Gestao de Riscos de Terceiros"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 18. A EGR deve contemplar a gestão dos riscos decorrentes da utilização
    de terceiros, incluindo prestadores de serviço, parceiros de negócio e entidades
    do mesmo conglomerado.

    § 1. A gestão de riscos de terceiros deve incluir:
    I - processo de diligência na seleção de terceiros críticos;
    II - avaliação e monitoramento contínuos dos riscos associados aos terceiros;
    III - definição de requisitos mínimos de controles internos e gestão de riscos
    para terceiros críticos;
    IV - plano de contingência para descontinuidade de serviços de terceiros críticos.

    § 2. A supervisionada é responsável pelos riscos de sua cadeia de terceiros,
    não podendo transferir a responsabilidade regulatória a terceiros.
guidance:
  prose: |
    O art. 18 trata da gestao de riscos de terceiros (TPRM — Third Party Risk
    Management). Para seguradoras, terceiros criticos tipicamente incluem:
    - Corretoras e agentes de seguros (distribuicao)
    - Prestadores de servico de regulacao de sinistros
    - Provedores de TI e cloud computing (art. 12-15 da CNSP 381)
    - Sociedades prestadoras de servicos especializados (SPSS)
    - Resseguradores (risco de credito de contraparte)
    - Processadoras de pagamentos

    **Diligencia (I):**
    Antes de contratar um terceiro critico, avaliar: solidez financeira, controles
    de seguranca, capacidade operacional, reputacao regulatoria, incidentes anteriores.

    **Monitoramento continuo (II):**
    Nao basta avaliar no momento da contratacao. Terceiros mudam. Riscos de terceiros
    devem ser monitorados periodicamente (trimestral para criticos).

    **Responsabilidade irrenunciavel (ss 2):**
    Segurado prejudicado por falha de terceiro da seguradora pode reclamar da
    seguradora — nao do terceiro. A responsabilidade regulatoria nao e transferivel.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de TPRM:**
      1. Modulo de gestao de terceiros no GRC com registro, classificacao e monitoramento.
      2. Portal de onboarding de terceiros: questionario de diligencia, upload de
         documentos, scoring automatico de risco.
      3. Dashboard de terceiros criticos com status de monitoramento e alertas.
      4. Integracao com servicos de monitoramento de terceiros (UpGuard, SecurityScorecard).

      **Gestao de acessos de terceiros:**
      5. Just-in-time access para terceiros com acesso a sistemas internos.
      6. Privileged Access Management para fornecedores com acesso privilegiado.
      7. Audit logging de todas as acoes de terceiros em sistemas internos.
      8. Termination workflow automatizado para revogacao de acessos ao fim do contrato.
    tools:
      - grc-platform
      - tprm-platform
      - iam-platform
      - pam-solution
  devsecops:
    prose: |
      **Dependencias de terceiros no codigo:**
      1. Software Composition Analysis (SCA) para todas as dependencias open-source.
      2. SBOM (Software Bill of Materials) para rastreamento de terceiros de software.
      3. Politique de aprovacao para novas dependencias: avaliacao de risco antes de adotar.
      4. Monitoramento continuo de vulnerabilidades em dependencias (Dependabot, etc.).
    tools:
      - dependency-check
      - sca-platform
      - sbom-generator
      - gitlab-ci
  secops:
    prose: |
      **Programa de TPRM:**
      1. Inventario de terceiros criticos com classificacao de risco e contato.
      2. Processo de diligencia: checklist por categoria (TI, sinistros, distribuicao).
      3. Assessment anual de terceiros criticos: questionario + evidencias.
      4. Monitoramento continuo: alertas de incidentes ou mudancas de status.

      **Plano de contingencia de terceiros:**
      5. Plano de contingencia para cada terceiro critico: o que fazer se parar?
      6. Teste anual do plano de contingencia de terceiros mais criticos.
      7. Clausulas contratuais de contingencia: SLA, penalidades, acesso a dados.
      8. Processo de saida: recuperacao de dados, transicao para alternativa.
    tools:
      - grc-platform
      - tprm-platform
      - reporting-platform
      - document-management
