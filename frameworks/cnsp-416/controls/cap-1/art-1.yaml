id: art-1
family: cap-1
title: "Objeto da Resolucao"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 1. Esta Resolução dispõe sobre o sistema de controles internos, a estrutura de
    gestão de riscos e a auditoria interna a serem mantidos pelas supervisionadas pela
    Superintendência de Seguros Privados (Susep).

    Parágrafo único. As estruturas mencionadas no caput devem ser compatíveis com a
    natureza, porte, complexidade, estrutura, perfil de risco e modelo de negócio
    da supervisionada, observado o princípio da proporcionalidade.
guidance:
  prose: |
    O art. 1 define o triplo objeto da resolucao: sistema de controles internos (SCI),
    estrutura de gestao de riscos (EGR) e auditoria interna. As tres estruturas sao
    distintas mas interdependentes.

    **Sistema de Controles Internos (SCI):**
    Conjunto de politicas, processos, atividades, sistemas e procedimentos destinados
    a assegurar que os objetivos institucionais sejam atingidos de forma eficiente,
    com integridade das informacoes e conformidade regulatoria.

    **Estrutura de Gestao de Riscos (EGR):**
    Framework integrado para identificar, avaliar, mensurar, monitorar, reportar e
    mitigar todos os riscos relevantes (subscricao, credito, mercado, operacional,
    liquidez, reputacional, etc.).

    **Auditoria Interna:**
    Funcao independente que fornece avaliacao objetiva do SCI e da EGR, com reporte
    direto ao conselho ou comite de auditoria.

    **Principio da proporcionalidade (paragrafo unico):**
    A resolucao reconhece a heterogeneidade do mercado de seguros. Uma grande seguradora
    multiramo com operacoes internacionais requer estruturas muito mais robustas que
    uma pequena seguradora regional. Os fatores de proporcionalidade sao:
    1. Natureza: vida, nao-vida, saude, previdencia, capitalizacao
    2. Porte: volume de premios, ativos totais, numero de segurados
    3. Complexidade: variedade de produtos, sofisticacao dos riscos
    4. Estrutura: grupo segurador, subsidiaria, entidade independente
    5. Perfil de risco: concentracao, catastrofe, longevidade, credito
    6. Modelo de negocio: bancassurance, corretagem direta, digital
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma integrada de GRC:**
      1. Implementar plataforma centralizada de Governance, Risk and Compliance (GRC)
         integrando SCI, EGR e suporte a auditoria interna em um unico sistema.
      2. Modulos separados por funcao (controles, riscos, auditoria) com visibilidade
         consolidada para a alta administracao.
      3. Integracoes nativas com sistemas core de seguros (policy management, sinistros,
         contabilidade, reinsuro) para captura automatica de dados de risco.
      4. Escalabilidade da plataforma conforme principio de proporcionalidade:
         configuracoes simplificadas para entidades menores.

      **Infraestrutura de dados de risco:**
      5. Data lake de riscos consolidando dados de subscricao, sinistros, investimentos
         e operacional com ingestao em tempo real.
      6. Risk engine capaz de processar modelos atuariais, VaR, stress testing e ORSA.
      7. Data quality monitoring para garantir integridade dos dados de risco.
      8. API layer para integracao com sistemas regulatorios da SUSEP.
    tools:
      - grc-platform
      - risk-engine
      - data-lake
      - monitoring-alerting
      - api-gateway
  devsecops:
    prose: |
      **Compliance-as-Code para CNSP 416:**
      1. Codificacao dos requisitos da resolucao em politicas executaveis (OPA/Rego).
      2. Pipeline de CI/CD com gates de conformidade para sistemas de riscos e controles.
      3. Versionamento de modelos de risco, politicas e procedimentos em repositorios Git.
      4. Testes automatizados de conformidade com requisitos das tres estruturas.

      **Proporcionalidade no pipeline:**
      5. Classificacao de sistemas por criticidade regulatoria (critico = mais gates).
      6. Sistemas core de risco: pipeline com aprovacao obrigatoria e auditoria completa.
      7. Sistemas auxiliares: pipeline simplificado com validacoes basicas.
      8. Infrastructure-as-Code para provisionamento consistente dos ambientes de GRC.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - checkov
      - change-management
      - sonarqube
  secops:
    prose: |
      **Gestao do escopo regulatorio:**
      1. Inventario completo das estruturas (SCI, EGR, Auditoria) com responsaveis.
      2. Assessment de proporcionalidade: classificar a entidade nos fatores do par. unico.
      3. Documentacao formal do nivel de sofisticacao exigido por proporcionalidade.
      4. Revisao anual do assessment de proporcionalidade quando houver mudancas no negocio.

      **Monitoramento de conformidade:**
      5. Assessment periodico de conformidade com todos os capitulos da resolucao.
      6. Gap analysis com plano de remediacao priorizado por criticidade.
      7. Relatorio de conformidade para o conselho de administracao.
      8. Retencao de evidencias de conformidade por minimo 5 anos.
    tools:
      - grc-platform
      - compliance-scanner
      - reporting-platform
      - document-management
