id: art-3
family: cap-1
title: "Definicoes"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 3. Para os fins desta Resolução, define-se:
    I - sistema de controles internos (SCI): conjunto de políticas, processos,
    atividades, sistemas e procedimentos destinados a assegurar que os objetivos
    da supervisionada sejam atingidos com eficiência operacional, integridade das
    informações e conformidade com leis e regulamentações aplicáveis;
    II - estrutura de gestão de riscos (EGR): conjunto de políticas, processos,
    sistemas e procedimentos destinados a identificar, avaliar, mensurar, monitorar,
    reportar e mitigar os riscos a que a supervisionada está exposta;
    III - auditoria interna: função independente que fornece avaliação objetiva e
    consultoria para melhorar as operações e ajudar a supervisionada a atingir seus
    objetivos mediante abordagem sistemática e disciplinada para avaliar e melhorar
    a efetividade dos processos de governança, de gerenciamento de riscos e de controles;
    IV - apetite ao risco: nível e tipo de risco que a supervisionada está disposta a
    aceitar em busca de seus objetivos estratégicos;
    V - proporcionalidade: adequação das estruturas ao porte, complexidade e perfil
    de risco da supervisionada.
guidance:
  prose: |
    O art. 3 estabelece o glossario oficial da resolucao. Cada definicao tem implicacoes
    praticas precisas.

    **SCI (inciso I) — tres pilares:**
    1. Eficiencia operacional: os processos devem ser otimizados e nao apenas conformes
    2. Integridade das informacoes: dados usados para decisao devem ser confiaveis
    3. Conformidade: aderencia a leis (SUSEP, ANPD, CVM, Bacen) e normas internas

    **EGR (inciso II) — ciclo completo de risco:**
    O ciclo completo e: identificar → avaliar → mensurar → monitorar → reportar → mitigar.
    Nenhuma etapa pode ser pulada. Identificar riscos sem mensura-los e insuficiente.
    Mensurar sem monitorar continuo tambem e insuficiente.

    **Auditoria interna (inciso III) — dois papeis:**
    1. Assurance: avaliacao objetiva e independente (terceira linha do modelo)
    2. Consultoria: recomendacoes para melhoria (papel consultivo, nao operacional)
    A independencia e absolutamente fundamental — auditoria que reporta a quem audita
    perde sua efetividade.

    **Apetite ao risco (inciso IV):**
    Conceito central de toda gestao de riscos moderna. Define quanto risco a entidade
    esta DISPOSTA a aceitar (nao quanto risco ela SUPORTA). O apetite deve:
    - Ser aprovado pelo conselho de administracao
    - Ser traduzido em tolerancias e limites operacionais
    - Ser revisado periodicamente

    **Proporcionalidade (inciso V):**
    Principio que permeia toda a resolucao. Nao ha "solucao unica" — cada supervisionada
    calibra suas estruturas ao seu perfil especifico.
implementation_guidance:
  platform_engineering:
    prose: |
      **Taxonomia de risco padronizada:**
      1. Implementar taxonomia de riscos baseada nas definicoes da CNSP 416 (SCI/EGR).
      2. Ontologia de riscos do mercado segurador: subscricao, credito, mercado,
         operacional, liquidez, reputacional, estrategico.
      3. Integracao da taxonomia de riscos com o sistema GRC e ferramentas de SIEM.
      4. Mapeamento entre eventos de seguranca (SIEM) e categoria de risco operacional.

      **Metricas alinhadas as definicoes:**
      5. KRIs (Key Risk Indicators) para cada categoria de risco definida.
      6. KCIs (Key Control Indicators) para monitoramento do SCI.
      7. KPIs de auditoria interna: cobertura, achados, remediacao.
      8. Dashboard unificado com metricas das tres estruturas.
    tools:
      - grc-platform
      - risk-taxonomy
      - siem
      - bi-platform
  devsecops:
    prose: |
      **Codificacao das definicoes em politicas:**
      1. Policy-as-Code usando as definicoes oficiais como base (OPA/Rego).
      2. Categorias de controles no pipeline alinhadas ao SCI (eficiencia, integridade,
         conformidade).
      3. Risk labels em issues e MRs referenciando categorias de risco da EGR.
      4. Audit trail de pipeline como evidencia para auditoria interna.

      **Integridade das informacoes (SCI):**
      5. Data validation gates no pipeline para garantir integridade de dados criticos.
      6. Checksum e hash validation para artefatos de producao.
      7. Immutable audit log para todas as mudancas em sistemas regulatorios.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - checkov
      - audit-logging
  secops:
    prose: |
      **Alinhamento organizacional as definicoes:**
      1. Treinamento das equipes sobre as definicoes oficiais da CNSP 416.
      2. Documentacao interna usando a terminologia exata da resolucao.
      3. Mapeamento das estruturas existentes contra as definicoes (SCI, EGR, Auditoria).
      4. Gap analysis: o que existe vs. o que as definicoes exigem.

      **Validacao de conformidade com definicoes:**
      5. Checklist de elementos do SCI: politicas, processos, atividades, sistemas,
         procedimentos — todos presentes?
      6. Verificacao do ciclo completo da EGR: identificar, avaliar, mensurar, monitorar,
         reportar e mitigar — todos implementados?
      7. Assessment de independencia da auditoria interna conforme definicao.
      8. Revisao anual do apetite ao risco e sua traducao em limites operacionais.
    tools:
      - grc-platform
      - compliance-scanner
      - training-platform
      - document-management
