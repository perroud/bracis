id: art-12
family: cap-2
title: "Avaliacao e Testes do SCI"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 12. A efetividade do sistema de controles internos deve ser avaliada
    periodicamente por meio de testes e revisões independentes.

    § 1. A avaliação do SCI deve:
    I - verificar se os controles existentes são adequados aos riscos identificados;
    II - identificar deficiências e lacunas de controle;
    III - avaliar a efetividade dos controles na mitigação dos riscos;
    IV - propor melhorias e acompanhar a implementação das remediações.

    § 2. Os resultados da avaliação do SCI devem ser reportados à diretoria e
    ao conselho de administração ao menos anualmente.

    § 3. A avaliação do SCI pode ser realizada pela auditoria interna, por equipe
    de segunda linha independente, ou por auditores externos, conforme o porte
    e a complexidade da supervisionada.
guidance:
  prose: |
    O art. 12 fecha o ciclo do SCI com a avaliacao de efetividade. Um SCI sem
    avaliacao e um SCI de papel — pode existir formalmente mas nao funcionar.

    **Tipos de testes de controle:**
    1. Inquiry: perguntar aos responsaveis se o controle e executado
    2. Observation: observar a execucao do controle
    3. Inspection: verificar documentos/registros que evidenciam a execucao
    4. Re-performance: executar o controle novamente de forma independente

    A re-performance e o teste mais rigoroso e o que mais detecta problemas.

    **Quatro objetivos da avaliacao (ss 1):**
    I - Adequacao: o controle e certo para o risco que pretende mitigar?
    II - Deficiencias: ha riscos sem controle adequado?
    III - Efetividade: o controle realmente funciona na pratica?
    IV - Melhoria: ciclo continuo de aprimoramento.

    **Quem faz a avaliacao (ss 3):**
    - Auditoria interna: maior profundidade, mas custo de tempo
    - Segunda linha independente (ex: risk management): mais rapido, menos rigoroso
    - Auditores externos: perspectiva externa, maior credibilidade
    A combinacao e o ideal — primeira e segunda linha fazem testes continos,
    auditoria interna faz avaliacao profunda anual.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de avaliacao de controles:**
      1. Modulo de testing de controles no GRC com plano, execucao e documentacao.
      2. Control testing workpapers: modelos padronizados por tipo de controle.
      3. Dashboard de resultados de testes: controles efetivos vs. deficientes por area.
      4. Tracking de remediacoes: plano de acao, responsavel, prazo, status.

      **Evidencias automatizadas:**
      5. Integracao GRC-SIEM: evidencias de controles tecnicos capturadas automaticamente.
      6. Controles automatizados (ex: scan de vulnerabilidade) com evidencias no GRC.
      7. Evidencias de controles manuais: upload de screenshots, logs, relatorios.
      8. Relatorio de assurance gerado automaticamente a partir dos testes.
    tools:
      - grc-platform
      - siem
      - audit-management
      - reporting-platform
  devsecops:
    prose: |
      **Testes de controles tecnicos:**
      1. Controles de seguranca no pipeline testados automaticamente (policy tests).
      2. Penetration testing periodico como teste de efetividade de controles defensivos.
      3. Red team exercises para controles de deteccao (SOC/SIEM).
      4. Automated compliance testing: OPA policy tests como parte do CI/CD.

      **Evidencias de controles:**
      5. Pipeline artefatos como evidencias: logs de scan, relatorios de SAST/DAST.
      6. Metricas de controle exportadas para GRC automaticamente (scan coverage, etc.).
      7. Alertas quando controles tecnicos ficam degradados ou desativados.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - security-testing
      - grc-platform
  secops:
    prose: |
      **Programa de avaliacao do SCI:**
      1. Plano anual de avaliacao do SCI: quais controles, quando, por quem.
      2. Risk-based testing: priorizar testes nos controles associados a riscos maiores.
      3. Rotacao de foco: cada ano cobrir areas diferentes em profundidade.
      4. Comunicacao de achados com prioridade (critico, alto, medio, baixo).

      **Ciclo de remediacao:**
      5. Plano de acao para cada deficiencia identificada com prazo e responsavel.
      6. Follow-up de remediacoes: verificar que as melhorias foram implementadas.
      7. Relatorio de estado do SCI para a diretoria (mensal ou trimestral).
      8. Relatorio anual consolidado do SCI para o conselho de administracao.
    tools:
      - grc-platform
      - audit-management
      - reporting-platform
      - workflow-engine
