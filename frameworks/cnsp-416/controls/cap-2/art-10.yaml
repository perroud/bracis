id: art-10
family: cap-2
title: "Prevencao a Lavagem de Dinheiro e ao Financiamento do Terrorismo"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 10. O SCI deve contemplar políticas, procedimentos e controles destinados
    a prevenir a utilização da supervisionada para a prática de crimes de lavagem
    de dinheiro, financiamento ao terrorismo e financiamento à proliferação de
    armas de destruição em massa (PLD/FT/FPAM).

    § 1. Os controles de PLD/FT/FPAM devem abranger:
    I - política de conheça seu cliente (KYC);
    II - monitoramento de transações atípicas;
    III - comunicação de operações suspeitas ao COAF;
    IV - avaliação e gerenciamento dos riscos de PLD/FT/FPAM;
    V - treinamento periódico dos colaboradores.

    § 2. A supervisionada deve manter officer de PLD/FT responsável pela função,
    com qualificação técnica e independência adequadas.
guidance:
  prose: |
    O art. 10 integra os controles de PLD/FT/FPAM ao SCI. Para o mercado de seguros,
    o risco de lavagem de dinheiro e especifico:
    - Seguros de vida com alto valor: utilizados para movimentar recursos ilicitos
    - PGBL/VGBL: aportes elevados e resgates como mecanismo de lavagem
    - Sinistros fraudulentos: mecanismo de lavagem via indenizacao
    - Pagamentos de premios em especie: redflags de PLD

    **KYC no mercado segurador:**
    Know Your Customer para seguros tem especificidades:
    - Identificacao de beneficiarios (PEPs, listas restritivas)
    - Origem dos recursos para produtos de alto valor
    - Pais de residencia/nacionalidade do segurado
    - Perfil de risco PLD classificado na aceitacao

    **Monitoramento de transacoes atipicas:**
    Sistemas de monitoramento para seguros devem detectar:
    - Pagamento de indenizacoes a terceiros nao vinculados
    - Resgates imediatamente apos aporte
    - Cancelamentos com devolucao de premio sem sinistro
    - Padroes atipicos de aporte em previdencia

    **Officer de PLD/FT (ss 2):**
    Responsavel formal registrado no COAF/SUSEP com acesso direto a alta administracao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de monitoramento de transacoes:**
      1. Plataforma de AML (Anti-Money Laundering) integrada com sistemas de seguros.
      2. Regras de monitoramento especificas para o mercado segurador (sinistros,
         resgates, aportes) com atualizacao periodica.
      3. Watchlists automatizadas: OFAC, ONU, BACEN, COAF, listas de PEP.
      4. Alertas automaticos para transacoes que atingem thresholds regulatorios.

      **KYC digital:**
      5. Onboarding digital com verificacao automatizada de identidade (KYC/KYB).
      6. Due diligence aprimorada automatica para clientes PEP ou de alto risco.
      7. Atualizacao periodica automatizada de dados cadastrais.
      8. Integracao com bases de dados publicas (Receita Federal, PEP lists).
    tools:
      - aml-platform
      - kyc-platform
      - watchlist-screening
      - transaction-monitoring
  devsecops:
    prose: |
      **Controles de PLD no pipeline:**
      1. Testes de regras de negocio de PLD: novas features nao podem contornar controles.
      2. Security review obrigatorio para mudancas em sistemas de transacoes financeiras.
      3. Separacao de codigos: regras de PLD em modulo separado com revisao especializada.
      4. Auditoria de mudancas em thresholds e regras de monitoramento.
    tools:
      - gitlab-ci
      - sonarqube
      - change-management
      - audit-logging
  secops:
    prose: |
      **Operacao dos controles de PLD/FT:**
      1. Equipe dedicada de analise de alertas de PLD com SLA de analise.
      2. Processo de comunicacao ao COAF: procedimento documentado, prazo de 24h.
      3. Conservacao de registros de PLD: 5 anos minimo (conforme Lei 9.613/98).
      4. Treinamento anual de todos os colaboradores em PLD/FT.

      **Avaliacao de risco PLD:**
      5. Avaliacao institucional de risco PLD/FT/FPAM atualizada anualmente.
      6. Classificacao de clientes por risco PLD (alto, medio, baixo).
      7. Enhanced Due Diligence para clientes de alto risco PLD.
      8. Relatorio anual de PLD para conselho e SUSEP.
    tools:
      - aml-platform
      - grc-platform
      - reporting-platform
      - training-platform
