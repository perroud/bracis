id: art-11
family: cap-2
title: "Canal de Denuncia e Codigo de Etica"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 11. As supervisionadas devem manter código de ética e canal de denúncia
    que possibilite a comunicação, de forma confidencial e sem risco de retaliação,
    de irregularidades ou violações de normas internas e regulamentações.

    § 1. O canal de denúncia deve ser acessível a colaboradores, parceiros e terceiros
    que se relacionam com a supervisionada.

    § 2. As denúncias recebidas devem ser investigadas com independência e as medidas
    cabíveis devem ser adotadas.

    § 3. O código de ética deve ser aprovado pelo conselho de administração e
    divulgado a todos os colaboradores.
guidance:
  prose: |
    O art. 11 integra etica e governanca ao SCI. O canal de denuncia (whistleblowing)
    e o codigo de etica sao elementos fundamentais de uma cultura de controles.

    **Codigo de etica:**
    Define os valores, principios e comportamentos esperados de todos na organizacao.
    Para o mercado de seguros, deve cobrir especificamente:
    - Conflitos de interesse (corretores, prestadores, fornecedores)
    - Presente e hospitalidade (limites aceitaveis)
    - Uso de informacao privilegiada
    - Relacionamento com reguladores (SUSEP, ANS)
    - Praticas de subscricao etica

    **Canal de denuncia (whistleblowing):**
    Tres requisitos fundamentais:
    1. Confidencialidade: identidade do denunciante protegida
    2. Anonimato (opcional): possibilidade de denunciar sem identificar
    3. Anti-retaliacao: denunciante nao pode ser punido por denunciar de boa-fe

    **Investigacao independente (ss 2):**
    Denuncia envolvendo alta administracao deve ser investigada por comite independente
    (comite de auditoria, conselho fiscal) — nao pela area investigada.

    **Aprovacao e divulgacao (ss 3):**
    Codigo de etica aprovado pelo conselho tem peso formal. Divulgacao obrigatoria
    a todos os colaboradores implica treinamento, assinatura de ciencia.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de whistleblowing:**
      1. Canal de denuncia digital independente (preferencialmente provedor terceiro
         para garantir independencia tecnica).
      2. Anonimato tecnico garantido: sem coleta de IP, sem cookies rastreadores.
      3. Canal acessivel via web, mobile e telefone (0800).
      4. Criptografia end-to-end para protecao de identidade do denunciante.

      **Gestao de investigacoes:**
      5. Sistema de gestao de investigacoes segregado do GRC operacional.
      6. Acesso restrito a investigacoes: apenas comite de etica/auditoria.
      7. Workflow de investigacao com SLA, responsavel e confidencialidade.
      8. Relatorio anonimizado de denuncia ao conselho.
    tools:
      - whistleblowing-platform
      - case-management
      - grc-platform
  devsecops:
    prose: |
      **Treinamento e cultura:**
      1. Codigo de etica publicado em repositorio interno acessivel a todos.
      2. Treinamento de etica integrado ao onboarding de novos colaboradores.
      3. Atualizacoes do codigo de etica versionadas e comunicadas (changelog).
      4. Confirmacao digital de ciencia do codigo de etica rastreada no sistema de RH.
    tools:
      - training-platform
      - document-management
      - hr-platform
  secops:
    prose: |
      **Operacao do canal de denuncia:**
      1. Triage inicial de denuncia dentro de 48h uteis.
      2. Processo formal de investigacao com prazo maximo (ex: 60 dias para conclusao).
      3. Feedback ao denunciante sobre andamento (mantendo confidencialidade).
      4. Medidas de protecao ao denunciante formalmente documentadas.

      **Revisao do codigo de etica:**
      5. Revisao anual do codigo de etica pelo conselho.
      6. Atualizacao quando houver mudancas regulatorias relevantes.
      7. Pesquisa de clima etico anual para avaliar efetividade da cultura.
      8. Relatorio anual de denuncia (volume, tipo, resolucao) para conselho.
    tools:
      - whistleblowing-platform
      - case-management
      - reporting-platform
