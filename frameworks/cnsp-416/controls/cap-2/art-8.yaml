id: art-8
family: cap-2
title: "Politicas e Procedimentos do SCI"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 8. O SCI deve ser suportado por políticas e procedimentos formalmente
    documentados que definam, no mínimo:
    I - os objetivos de controle para cada processo relevante;
    II - os controles internos implementados e os responsáveis por sua execução;
    III - a frequência de execução e os critérios de avaliação dos controles;
    IV - os procedimentos de escalação e comunicação de falhas de controle;
    V - os processos de revisão e atualização das políticas e procedimentos.

    § 1. As políticas e procedimentos do SCI devem ser aprovadas pela diretoria e,
    quando aplicável, pelo conselho de administração.

    § 2. As políticas e procedimentos devem ser revisados ao menos anualmente ou
    quando ocorrerem mudanças relevantes no ambiente de negócios ou regulatório.
guidance:
  prose: |
    O art. 8 formaliza o framework documental do SCI. "Controle documentado" e diferente
    de "controle existente" — a documentacao e o que permite auditoria, transferencia
    de conhecimento e melhoria continua.

    **Cinco elementos minimos (incisos I a V):**

    **I - Objetivos de controle:** Para que serve este controle? Qual risco ele mitiga?
    Cada controle deve ter um objetivo claro linkado ao risco que mitiga.

    **II - Controles implementados e responsaveis:** Documentacao do "what" e do "who".
    Responsavel = pessoa/cargo especifico, nao departamento generico.

    **III - Frequencia e criterios:** "Quando" e "como saber se funcionou".
    Ex: "Reconciliacao diaria — criterio: zero diferenca ou diferenca justificada."

    **IV - Escalacao:** O que fazer quando um controle falha? Quem notificar?
    Processo documentado evita paralisia quando algo da errado.

    **V - Revisao:** Politicas que nao sao atualizadas tornam-se obsoletas e irrelevantes.

    **Aprovacao e revisao (ss 1-2):**
    Politicas do SCI devem ter governanca adequada: aprovacao formal e revisao anual
    ou quando houver mudancas relevantes (novo produto, nova regulamentacao, novo risco).
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de gestao de politicas:**
      1. Document management centralizado para politicas e procedimentos do SCI.
      2. Versionamento de politicas com historico completo de alteracoes.
      3. Workflow de aprovacao: rascunho → revisao tecnica → aprovacao diretoria.
      4. Publicacao automatica de politicas aprovadas para os colaboradores afetados.

      **Control catalog:**
      5. Catalogo de controles internos no GRC com todos os campos do art. 8 preenchidos.
      6. Linkagem entre controles e riscos (risco → controles que mitigam → efetividade).
      7. Calendario de testes de controle gerado automaticamente a partir da frequencia.
      8. Dashboard de vencimento de politicas: alertas 60/30/15 dias antes da revisao.
    tools:
      - grc-platform
      - document-management
      - workflow-engine
      - policy-management
  devsecops:
    prose: |
      **Politicas como codigo:**
      1. Politicas de SCI versionadas em repositorio Git (politicas-as-code).
      2. MR obrigatorio para qualquer mudanca em politica de controle interno.
      3. Aprovacao de politicas via GitLab Approval Rules (diretoria como approver).
      4. CHANGELOG automatizado de politicas publicadas.

      **Vinculacao politicas-controles tecnicos:**
      5. Tags em codigo referenciando politica e artigo que o controle implementa.
      6. Rastreabilidade: politica CNSP-416/art-8 → controle tecnico → codigo/config.
      7. Testes automatizados que verificam que controles tecnicos implementam a politica.
    tools:
      - gitlab-ci
      - git-repository
      - policy-management
      - document-management
  secops:
    prose: |
      **Ciclo de vida das politicas:**
      1. Inventario de politicas do SCI com data de aprovacao e proxima revisao.
      2. Processo de revisao anual: responsavel designado, checklist de atualidade.
      3. Impact assessment quando ocorrem mudancas regulatorias (nova CNSP, nova SUSEP).
      4. Treinamento obrigatorio para colaboradores afetados por novas politicas.

      **Gestao de falhas de controle:**
      5. Processo de escalacao formalizado: controle falhou → quem notificar em quanto tempo.
      6. Root cause analysis obrigatorio para falhas de controles criticos.
      7. Tracking de remediacoes: plano de acao, responsavel, prazo, status.
      8. Relatorio de falhas de controle para o comite de auditoria.
    tools:
      - grc-platform
      - document-management
      - workflow-engine
      - training-platform
