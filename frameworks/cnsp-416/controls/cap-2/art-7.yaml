id: art-7
family: cap-2
title: "Funcao de Compliance"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 7. A supervisionada deve manter função de compliance destinada a assegurar
    a conformidade com as leis, regulamentos, normas e políticas internas aplicáveis.

    § 1. A função de compliance deve:
    I - identificar e avaliar os riscos de não conformidade a que a supervisionada
    está exposta;
    II - assessorar a alta administração sobre obrigações regulatórias e de conformidade;
    III - monitorar e reportar tempestivamente os casos de não conformidade identificados;
    IV - coordenar a comunicação com órgãos reguladores e supervisores.

    § 2. A função de compliance deve possuir independência em relação às áreas
    operacionais e ter acesso direto ao órgão de governança.

    § 3. O responsável pela função de compliance deve ter qualificação técnica
    compatível com as funções exercidas.
guidance:
  prose: |
    O art. 7 estabelece a funcao de compliance como estrutura formal e independente.
    No mercado de seguros, o compliance deve cobrir um universo regulatorio amplo:
    SUSEP, CNSP, ANPD (LGPD), CVM (para EAPCs com FIE), BACEN (para conglomerados).

    **Quatro responsabilidades (ss 1):**

    **I - Identificacao de riscos de nao conformidade:**
    Regulatory change management: monitorar novas normas CNSP/SUSEP, avaliar impacto,
    comunicar as areas afetadas, planejar adequacao.

    **II - Assessoria a alta administracao:**
    Compliance nao e funcao de "policiamento" interno — e funcao de assessoria.
    O Chief Compliance Officer (CCO) deve ser um conselheiro da diretoria, nao
    apenas um controlador.

    **III - Monitoramento e reporte de nao conformidade:**
    Dois tipos: (a) nao conformidades identifidas proativamente pelo compliance e
    (b) denuncias recebidas via canal de etica/ouvidoria.

    **IV - Comunicacao com reguladores:**
    SUSEP exige comunicacoes formais em varias situacoes. O compliance coordena:
    - Relatorios periodicos obrigatorios
    - Respostas a pedidos de informacao
    - Comunicacao de incidentes relevantes
    - Processo de fiscalizacao

    **Independencia (ss 2):**
    O CCO nao pode ser subordinado a areas que audita. Estrutura tipica:
    CCO reporta ao conselho de administracao ou ao CEO com acesso direto ao CA.
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de gestao de compliance:**
      1. Modulo de regulatory change management no GRC para rastreamento de novas normas.
      2. Calendario regulatorio automatizado com prazos e obrigacoes SUSEP/CNSP/ANPD.
      3. Sistema de gestao de nao conformidades: registro, classificacao, plano de acao,
         acompanhamento e encerramento.
      4. Dashboard de postura de compliance com status de todas as obrigacoes regulatorias.

      **Canal de etica e denuncias:**
      5. Canal de denuncias anonimo integrado ao sistema de GRC.
      6. Workflow de triage e investigacao de denuncias com confidencialidade.
      7. Reporting de denuncias ao comite de etica/auditoria com anonimizacao.

      **Comunicacao regulatoria:**
      8. Modulo de relatorios regulatorios com templates SUSEP atualizados.
      9. Rastreamento de prazos de entrega de relatorios e resposta a demandas.
    tools:
      - grc-platform
      - regulatory-change-management
      - whistleblowing-system
      - reporting-platform
  devsecops:
    prose: |
      **Compliance-as-Code no pipeline:**
      1. Politicas de compliance codificadas em OPA/Rego para verificacao automatica.
      2. Regulatory requirements como testes automatizados no pipeline.
      3. Compliance scan em cada MR para sistemas regulatorios criticos.
      4. Alertas automaticos quando mudancas de codigo podem impactar conformidade.

      **Rastreabilidade regulatoria:**
      5. Rastreamento de requisitos: cada controle de compliance mapeado a artigo da norma.
      6. Evidencias de conformidade geradas automaticamente pelo pipeline (reports).
      7. Changelog de politicas de compliance com aprovacao documentada.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - compliance-scanner
      - requirements-traceability
  secops:
    prose: |
      **Operacao da funcao de compliance:**
      1. Calendario anual de compliance: todas as obrigacoes regulatorias mapeadas por data.
      2. Monitoramento proativo de mudancas regulatorias (SUSEP, CNSP, ANPD, CVM).
      3. Processo de impact assessment para novas normas: quais areas sao afetadas?
      4. Plano de adequacao para cada nova norma com responsavel, prazo e recursos.

      **Reporte e comunicacao:**
      5. Relatorio mensal de status de compliance para a diretoria.
      6. Relatorio trimestral para o conselho com visao de riscos de nao conformidade.
      7. Notificacao imediata de nao conformidades criticas para CEO e conselho.
      8. Arquivo de toda comunicacao com SUSEP e CNSP (manter por 10 anos).
    tools:
      - grc-platform
      - compliance-scanner
      - reporting-platform
      - document-management
