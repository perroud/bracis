id: art-4
family: cap-2
title: "Requisitos do Sistema de Controles Internos"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 4. As supervisionadas devem implementar e manter sistema de controles internos
    que abranja todas as atividades, processos, sistemas de informação e dados relevantes.

    § 1. O SCI deve abranger, no mínimo:
    I - controles preventivos destinados a evitar erros, fraudes ou irregularidades;
    II - controles detectivos destinados a identificar tempestivamente desvios,
    erros, fraudes ou irregularidades;
    III - controles corretivos destinados a corrigir desvios identificados e
    evitar sua recorrência;
    IV - controles de conformidade destinados a assegurar a aderência a políticas
    internas e a regulamentação aplicável.

    § 2. O SCI deve estar integrado aos processos de negócio da supervisionada,
    não constituindo estrutura paralela ou apartada.
guidance:
  prose: |
    O art. 4 e o nucleo do Capitulo 2. Define o escopo e os quatro tipos de controles
    que o SCI deve possuir.

    **Escopo abrangente (caput):**
    "Todas as atividades, processos, sistemas de informacao e dados relevantes" — o SCI
    nao pode ter pontos cegos. Isso inclui:
    - Operacoes de subscricao e emissao de apolices
    - Gestao de sinistros e regulacao
    - Investimentos e gestao de ativos
    - Reinsuro (cessao e assuncao)
    - Processamento de dados e sistemas de informacao
    - Relacionamento com canais de distribuicao (corretores, agentes)
    - Gestao financeira e contabil

    **Quatro tipos de controles (ss 1):**

    **I - Preventivos:** Barreiras antes que o evento ocorra. Ex: segregacao de funcoes,
    limites de alca, workflows de aprovacao, validacoes automaticas.

    **II - Detectivos:** Mecanismos que identificam quando algo errado OCORREU. Ex:
    reconciliacoes, auditorias, monitoramento de transacoes, alertas de anomalia.

    **III - Corretivos:** Processos para corrigir e PREVENIR RECORRENCIA. Ex:
    planos de acao corretiva, investigacao de causa raiz, atualizacao de politicas.

    **IV - Conformidade:** Verificacao de aderencia a normas e regulamentos. Ex:
    checklists regulatorios, compliance monitoring, reporting a SUSEP.

    **Integracao (ss 2):**
    O SCI nao pode ser um sistema separado de papel preenchido periodicamente.
    Deve estar EMBUTIDO nos processos de negocio — first-line controls.
implementation_guidance:
  platform_engineering:
    prose: |
      **Controles preventivos em plataforma:**
      1. Workflows de aprovacao automatizados para transacoes acima de limites.
      2. Validacao automatica de dados na entrada (input validation, schema enforcement).
      3. Segregacao tecnica de funcoes: sistemas que nao permitem que o mesmo usuario
         execute etapas conflitantes (ex: emitir e aprovar apolice).
      4. Limites de alca configurados no sistema (nao apenas em procedimento).

      **Controles detectivos em plataforma:**
      5. Monitoramento continuo de transacoes com alertas de anomalia (SIEM/UBA).
      6. Reconciliacoes automaticas entre sistemas (policy system vs. contabilidade).
      7. Dashboards de monitoramento em tempo real com thresholds configurados.
      8. Alertas automaticos para desvios de KRIs e KCIs.

      **Controles corretivos e de conformidade:**
      9. Workflow de gestao de achados com planos de acao, prazos e responsaveis.
      10. Compliance scanner automatizado contra regras regulatorias codificadas.
      11. Auto-remediation para controles tecnicos (ex: re-habilitar MFA desativado).
    tools:
      - grc-platform
      - siem
      - workflow-engine
      - compliance-scanner
      - uba-platform
  devsecops:
    prose: |
      **Controles no pipeline de desenvolvimento:**
      1. Controles preventivos: linting, SAST, validacao de schema antes de merge.
      2. Controles detectivos: DAST, dependency scanning, secret detection em runtime.
      3. Controles corretivos: automated remediation PRs para vulnerabilidades.
      4. Controles de conformidade: compliance gates no CI/CD (OPA policies).

      **Integracao de controles ao processo de negocio:**
      5. Security-by-design: controles embutidos nos templates de novos projetos.
      6. Boilerplate de controles internos incluido em scaffolding de microsservicos.
      7. Policy-as-Code garantindo que novos sistemas nascem com controles adequados.
      8. Shift-left de compliance: verificacoes regulatorias no ambiente de desenvolvimiento.
    tools:
      - gitlab-ci
      - sonarqube
      - opa-gatekeeper
      - checkov
      - dependency-check
  secops:
    prose: |
      **Mapeamento e avaliacao do SCI:**
      1. Inventario de controles internos: tipo (preventivo/detectivo/corretivo/conformidade),
         processo coberto, sistema, responsavel, frequencia de teste.
      2. Control testing: teste periodico da efetividade de cada controle.
      3. Control gap analysis: identificar atividades e processos sem cobertura de controles.
      4. Risk-based control prioritization: focar testes nos controles criticos primeiro.

      **Operacao dos controles detectivos:**
      5. SOC operando monitoramento 24x7 de controles detectivos criticos.
      6. Processo de triage e resposta para alertas gerados por controles detectivos.
      7. SLA de remediacao para achados de controles: critico (24h), alto (72h), medio (30d).
      8. Metricas de efetividade dos controles reportadas mensalmente a gestao.
    tools:
      - grc-platform
      - siem
      - compliance-scanner
      - risk-management
      - reporting-platform
