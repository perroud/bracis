id: art-39
family: cap-6
title: "Normas Complementares"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 39. A Susep poderá expedir normas complementares para regulamentar a
    implementação desta Resolução, incluindo:
    I - critérios específicos de proporcionalidade para diferentes portes e tipos
    de supervisionadas;
    II - requisitos adicionais para supervisionadas de grande porte ou sistemicamente
    relevantes;
    III - formatos e frequência de relatórios regulatórios;
    IV - metodologias padronizadas para avaliação de risco e de solvência.
guidance:
  prose: |
    O art. 39 e uma clausula de habilitacao: permite que a SUSEP emita circulares
    e instrucoes complementares sem necessidade de nova resolucao CNSP.

    **Relacao CNSP x SUSEP:**
    - CNSP: orgao normativo (expede Resolucoes CNSP)
    - SUSEP: orgao supervisor e executor (expede Circulares SUSEP)
    As Resolucoes CNSP sao de nivel superior; as Circulares SUSEP detalham a implementacao.
    A CNSP 416 e complementada por Circulares SUSEP ja existentes e futuras.

    **Circulares relevantes ja existentes:**
    - Circular SUSEP 612: requisitos de solvencia (CBR - Capital Baseado em Risco)
    - Circular SUSEP 638: seguranca cibernetica (complementa CNSP 381)
    Outras circulares tecnicas podem ser emitidas pela SUSEP para detalhar
    metodologias de ORSA, formatos de relatorio, criterios de proporcionalidade.

    **Implicacao pratica:**
    As supervisionadas devem monitorar ativamente novas Circulares SUSEP que
    complementam a CNSP 416. O regulatory change management (art. 7) deve capturar
    estas atualizacoes tempestivamente.
implementation_guidance:
  platform_engineering:
    prose: |
      **Monitoramento de normas complementares:**
      1. Feed automatico de publicacoes da SUSEP no sistema de regulatory change management.
      2. Alertas para novas Circulares SUSEP que impactam a CNSP 416.
      3. Linkagem no GRC: cada requisito da CNSP 416 linkado a circulares complementares.
      4. Atualizacao automatica do compliance framework quando novas circulares sao publicadas.
    tools:
      - regulatory-change-management
      - grc-platform
      - monitoring-alerting
  devsecops:
    prose: |
      **Atualizacao de politicas:**
      1. Processo de atualizacao de politicas-as-code para refletir novas circulares.
      2. Impact assessment de novas circulares em controles tecnicos existentes.
      3. Sprint backlog atualizado com implementacoes de novas exigencias regulatorias.
    tools:
      - opa-gatekeeper
      - policy-management
      - gitlab-ci
  secops:
    prose: |
      **Gestao de normas complementares:**
      1. Inscricao no boletim regulatorio da SUSEP para recepcao de novas publicacoes.
      2. Processo de impact assessment para cada nova circular: quais areas afeta?
      3. Atualizacao do compliance calendar com novos prazos de novas circulares.
      4. Comunicacao interna de novas exigencias regulatorias as areas afetadas.
    tools:
      - regulatory-change-management
      - grc-platform
      - document-management
legal_references:
  - framework_id: cnsp-381
    articles: ["art-19"]
    relationship: complements
