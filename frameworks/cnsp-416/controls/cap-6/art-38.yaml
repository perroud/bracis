id: art-38
family: cap-6
title: "Fiscalizacao e Sancoes"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 38. O descumprimento das disposições desta Resolução sujeita as supervisionadas
    e seus administradores às sanções administrativas previstas na legislação aplicável,
    incluindo:
    I - advertência;
    II - multa;
    III - suspensão do exercício de cargo em órgão de administração;
    IV - inabilitação para o exercício de cargo em órgão de administração;
    V - cancelamento da autorização para operar.

    Parágrafo único. As sanções podem ser aplicadas cumulativamente e de forma
    gradual, conforme a gravidade e a reincidência da infração.
guidance:
  prose: |
    O art. 38 e o artigo que da dentes a resolucao. Sem sancoes, normas sao
    recomendacoes. Com sancoes, sao obrigacoes.

    **Hierarquia de sancoes:**
    A escala de gravidade e clara:
    - Advertencia: infracao leve, primeira ocorrencia
    - Multa: infracao relevante ou reincidencia
    - Suspensao: infracao grave, administrador especifico
    - Inabilitacao: infracao gravissima ou reincidencia grave
    - Cancelamento: ameaca a solvencia, fraude, infracao sistemica

    **Responsabilidade pessoal dos administradores:**
    O inciso III (suspensao de cargo) e o inciso IV (inabilitacao) sao sancionados
    PESSOALMENTE ao administrador — nao apenas a empresa.
    - CEO, CFO, CRO, CCO, CAE, conselheiros podem ser pessoalmente sancionados
    - Isso cria incentivo direto para que os executivos se preocupem com conformidade

    **Acumulatividade:**
    Uma mesma infracao pode resultar em multa + suspensao do responsavel + exigencia
    de plano de remediacao. A SUSEP nao precisa escolher apenas uma sancao.

    **Implicacoes praticas:**
    - A SUSEP realiza fiscalizacoes periodicas e pode solicitar qualquer documento
    - Deficiencias graves identificadas em fiscalizacao podem resultar em auto de infracao
    - O historico de sancoes afeta a reputacao regulatoria da entidade
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de compliance regulatoria:**
      1. Rastreamento de todas as comunicacoes e demandas da SUSEP no sistema de GRC.
      2. Sistema de gestao de autos de infracao: registro, defesa, acompanhamento.
      3. Alertas automaticos para prazos de resposta a demandas regulatorias.
      4. Historico de conformidade: registro de todas as interacoes com a SUSEP.
    tools:
      - grc-platform
      - compliance-scanner
      - workflow-engine
  devsecops:
    prose: |
      **Conformidade preventiva:**
      1. Compliance scan continuo: detectar nao-conformidades antes da SUSEP.
      2. Policy-as-Code: controles tecnicos que previnem nao-conformidades automaticamente.
      3. Relatorio de conformidade automatizado: status de cada requisito da CNSP 416.
      4. Simulacao de fiscalizacao: auditoria interna usando checklist da SUSEP.
    tools:
      - compliance-scanner
      - opa-gatekeeper
      - reporting-platform
  secops:
    prose: |
      **Gestao de riscos regulatorios:**
      1. Risk assessment regulatorio: probabilidade e impacto de sancoes por area.
      2. Programa preventivo: corrigir nao-conformidades antes de fiscalizacao.
      3. Processo de resposta a fiscalizacao: equipe designada, responsaveis, SLA.
      4. Comunicacao legal: advogados regulatorios envolvidos em casos de auto de infracao.

      **Prontidao para fiscalizacao:**
      5. Simulacao de fiscalizacao anual: replicar o processo da SUSEP internamente.
      6. Dossier de conformidade sempre atualizado e disponivel.
      7. Treinamento para gestores: o que fazer quando a SUSEP chega.
      8. Escalonamento imediato para CEO e conselho de qualquer auto de infracao.
    tools:
      - grc-platform
      - compliance-scanner
      - document-management
      - reporting-platform
