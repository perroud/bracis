id: art-40
family: cap-6
title: "Revogacoes e Vigencia"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 40. Ficam revogadas as Resoluções CNSP que tratavam de controles internos
    e gestão de riscos de forma dispersa e fragmentada, consolidando-se na presente
    Resolução a disciplina unificada para todas as supervisionadas SUSEP.

    Parágrafo 1. Esta Resolução entra em vigor em 1 de janeiro de 2022.

    Parágrafo 2. As disposições desta Resolução prevalecem sobre normas anteriores
    que com ela conflitem no âmbito das supervisionadas da Susep.
guidance:
  prose: |
    O art. 40 consolida e unifica a regulamentacao de controles internos e gestao
    de riscos para o mercado de seguros.

    **Importancia da consolidacao:**
    Antes da CNSP 416, os requisitos de controles internos e gestao de riscos
    estavam espalhados em diversas normas, circulares e instrucoes normativas.
    A CNSP 416 unifica tudo em um documento unico e coerente.

    **Hierarquia normativa apos a CNSP 416:**
    1. CNSP 416 (Resolucao CNSP): nivel superior, principios e requisitos gerais
    2. Circulares SUSEP: detalhamento operacional e metodologico
    3. Politicas internas da supervisionada: implementacao especifica
    4. Procedimentos operacionais: execucao day-to-day

    **Vigencia a partir de 2022:**
    Para entidades ja estabelecidas: adequacao em 12 meses (art. 37).
    Para novas supervisionadas autorizadas apos jan/2022: conformidade desde o inicio.
    Nao ha periodo de graca para entidades recentemente autorizadas.

    **Conflito de normas:**
    Se uma circular antiga conflitar com a CNSP 416, prevalece a CNSP 416.
    Isso e importante para entidades que seguiam normas de controles internos mais antigas.
implementation_guidance:
  platform_engineering:
    prose: |
      **Mapeamento normativo:**
      1. Mapeamento de todas as normas revogadas vs. artigos equivalentes na CNSP 416.
      2. Atualizacao do compliance framework no GRC: remover referencias a normas revogadas.
      3. Historico de conformidade: evidencias de conformidade com normas anteriores
         mantidas por 5 anos para auditoria de periodos passados.
    tools:
      - grc-platform
      - document-management
      - compliance-scanner
  devsecops:
    prose: |
      **Atualizacao de codificacoes:**
      1. Atualizar policy-as-code para referenciar CNSP 416 ao inves de normas revogadas.
      2. Tags de compliance atualizadas em todos os repositorios e infraestrutura.
      3. Documentacao tecnica atualizada com referencia a CNSP 416 como norma vigente.
    tools:
      - opa-gatekeeper
      - policy-management
      - git-repository
  secops:
    prose: |
      **Gestao da transicao normativa:**
      1. Inventario de todas as referencias a normas antigas: politicas, procedimentos,
         contratos, materiais de treinamento.
      2. Atualizacao sistematica: substituir referencias antigas por CNSP 416.
      3. Comunicacao interna: informar as areas sobre a norma unificada.
      4. Treinamento de atualizacao: comunicar as mudancas relevantes da CNSP 416
         vs. normas anteriores.

      **Conformidade contínua:**
      5. Assessment anual de conformidade com a CNSP 416 vigente.
      6. Monitoramento de novas circulares SUSEP complementares (art. 39).
      7. Ciclo de melhoria continua baseado em licoes aprendidas e feedback regulatorio.
      8. Preparacao para futura revisao da CNSP 416: horizon scanning regulatorio.
    tools:
      - grc-platform
      - training-platform
      - regulatory-change-management
      - document-management
legal_references:
