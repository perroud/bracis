id: art-37
family: cap-6
title: "Prazo de Adequacao e Transicao"
class: CNSP-416
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 37. As supervisionadas devem adequar suas estruturas aos requisitos desta
    Resolução no prazo máximo de doze meses a contar da data de publicação.

    § 1. As supervisionadas que já possuam estruturas de controles internos e de
    gestão de riscos devem realizar avaliação de conformidade com os requisitos
    desta Resolução e elaborar plano de adequação para os gaps identificados.

    § 2. A Susep pode, a pedido fundamentado da supervisionada, prorrogar o prazo
    de adequação para requisitos específicos, considerando a proporcionalidade
    e a complexidade de implementação.
guidance:
  prose: |
    O art. 37 e o artigo de transicao. Publicada em julho/2021, com vigencia em
    janeiro/2022, a resolucao deu seis meses para adequacao.

    **Estrategia de adequacao:**
    Para supervisionadas que ja tinham estruturas (ex: CMN 4557 para o segmento
    bancario-segurador), o processo deve ser:
    1. Gap analysis: comparar estruturas existentes com requisitos da CNSP 416
    2. Priorizar gaps: criticos primeiro (ex: ausencia de CRO, ausencia de auditoria interna)
    3. Plano de adequacao: cronograma, responsaveis, investimentos
    4. Implementacao: executar o plano
    5. Certificacao interna: validar que todos os requisitos foram atendidos

    **Prorrogacao (ss 2):**
    Para requisitos de alta complexidade (ex: implantar ORSA pela primeira vez),
    a SUSEP pode conceder prazo adicional mediante solicitacao fundamentada.

    **Para entidades ja em conformidade:**
    Supervisionadas que ja seguiam a CMN 4557 (ex: bancassurance de grandes bancos)
    provavelmente ja tinham estruturas equivalentes. O desafio e adaptar ao contexto
    especifico do mercado segurador (subscricao, atuaria, provisoes tecnicas).
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de gestao de adequacao:**
      1. Projeto de adequacao no GRC: requirements da CNSP 416 vs. status de implementacao.
      2. Tracking de iniciativas de implementacao: plano, prazo, responsavel, % completo.
      3. Dashboard de progresso de adequacao com alertas de prazo.
      4. Evidencias de implementacao: uploads de documentos, prints de sistemas.
    tools:
      - grc-platform
      - project-management
      - compliance-scanner
  devsecops:
    prose: |
      **Implementacao de controles tecnicos:**
      1. Backlog de implementacao de controles tecnicos da CNSP 416.
      2. Sprint planning incluindo itens de conformidade com prazo regulatorio.
      3. Acceptance criteria alinhados com requisitos especificos da resolucao.
      4. Release notes documentando controles implementados por artigo.
    tools:
      - gitlab-ci
      - issue-tracking
      - project-management
  secops:
    prose: |
      **Gap analysis e plano de adequacao:**
      1. Gap analysis formal: inventario de todos os requisitos da CNSP 416 vs. estado atual.
      2. Classificacao de gaps: critico (bloqueante), alto (urgente), medio, baixo.
      3. Plano de adequacao aprovado pela diretoria com prazos e responsaveis.
      4. Comunicacao a SUSEP se houver necessidade de prorrogacao: solicitacao fundamentada.

      **Monitoramento de adequacao:**
      5. Status mensal do plano de adequacao para a diretoria.
      6. Escalacao de items em risco de nao cumprimento do prazo.
      7. Certificacao interna de conformidade ao final do prazo.
      8. Documentacao do processo de adequacao como evidencia para a SUSEP.
    tools:
      - grc-platform
      - project-management
      - reporting-platform
legal_references:
  - framework_id: cmn-4557
    articles: ["art-31", "art-32"]
    relationship: equivalent-to
