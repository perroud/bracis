related_frameworks:
  - framework_id: cmn-4557
    relationship: equivalent-to
    description: >-
      A Resolucao CNSP 416 e o analogo da Resolucao CMN 4.557 para o mercado segurador.
      Ambas tratam de controles internos, gestao de riscos e auditoria interna com
      estrutura e requisitos equivalentes.
  - framework_id: cnsp-381
    relationship: complements
    description: "A CNSP 381 trata de seguranca cibernetica enquanto a CNSP 416 trata de controles internos, gestao de riscos e auditoria -- ambas aplicam-se ao mesmo escopo de supervisionadas SUSEP."
  - framework_id: susep-638
    relationship: complements
    description: "A Circular SUSEP 638 detalha requisitos tecnicos de ciberseguranca que complementam os controles internos da CNSP 416."
  - framework_id: cobit-2019
    relationship: supports
    description: "O COBIT 2019 fornece framework de governanca de TI que suporta a implementacao dos controles internos e gestao de riscos da CNSP 416."
