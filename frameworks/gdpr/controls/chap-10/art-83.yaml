id: art-83
family: chap-10
title: "General conditions for imposing administrative fines"
class: GDPR

statement:
  prose: |
    4. Infringements of the following provisions shall, in accordance with paragraph 2, be
    subject to administrative fines up to 10 000 000 EUR, or in the case of an undertaking, up
    to 2 % of the total worldwide annual turnover of the preceding financial year, whichever is
    higher:
    (a) the obligations of the controller and the processor pursuant to Articles 8, 11, 25 to
    39 and 42 and 43;
    (b) the obligations of the certification body pursuant to Articles 42 and 43;
    (c) the obligations of the monitoring body pursuant to Article 41(4).

    5. Infringements of the following provisions shall, in accordance with paragraph 2, be
    subject to administrative fines up to 20 000 000 EUR, or in the case of an undertaking, up
    to 4 % of the total worldwide annual turnover of the preceding financial year, whichever is
    higher:
    (a) the basic principles for processing, including conditions for consent, pursuant to
    Articles 5, 6, 7 and 9;
    (b) the data subjects' rights pursuant to Articles 12 to 22;
    (c) the transfers of personal data to a recipient in a third country or an international
    organisation pursuant to Articles 44 to 49;
    (d) any obligations pursuant to Member State law adopted under Chapter IX;
    (e) non-compliance with an order or a temporary or definitive limitation on processing or
    the suspension of data flows by the supervisory authority pursuant to Article 58(2) or
    failure to provide access in violation of Article 58(1).

    6. Non-compliance with an order by the supervisory authority as referred to in Article 58(2)
    shall, in accordance with paragraph 2, be subject to administrative fines up to
    20 000 000 EUR, or in the case of an undertaking, up to 4 % of the total worldwide annual
    turnover of the preceding financial year, whichever is higher.

guidance:
  prose: |
    GDPR fines are structured in two tiers:
    - Tier 1 (up to EUR 10M or 2% global turnover): Violations of controller/processor
      obligations (Articles 25-39), certification and monitoring bodies.
    - Tier 2 (up to EUR 20M or 4% global turnover): Violations of basic principles,
      data subject rights, international transfers, and non-compliance with DPA orders.

    Factors considered: nature/gravity/duration, intentional/negligent, mitigation measures,
    degree of responsibility, previous infringements, cooperation, data categories,
    notification to DPA, adherence to codes of conduct/certifications.

implementation_guidance:
  platform_engineering:
    prose: |
      Platform compliance dashboards should track GDPR compliance status across
      all services. Risk scoring based on data categories and volumes processed.
      Automated compliance gap detection and remediation tracking.
    tools:
      - drata
      - vanta
      - backstage

  devsecops:
    prose: |
      Compliance-as-code to continuously verify GDPR technical requirements.
      Automated evidence collection for audits. Pipeline gates for
      GDPR-critical deployments.
    tools:
      - gitlab-ci
      - checkov
      - opa

  secops:
    prose: |
      Real-time compliance monitoring dashboards. Automated regulatory
      reporting. Incident response aligned with fine-mitigation factors
      (cooperation, notification speed, remediation).
    tools:
      - splunk
      - elastic-siem
      - servicenow

