id: art-17
family: chap-3
title: "Right to erasure ('right to be forgotten')"
class: GDPR

statement:
  prose: |
    1. The data subject shall have the right to obtain from the controller the erasure of
    personal data concerning him or her without undue delay and the controller shall have the
    obligation to erase personal data without undue delay where one of the following grounds
    applies:
    (a) the personal data are no longer necessary in relation to the purposes for which they
    were collected or otherwise processed;
    (b) the data subject withdraws consent on which the processing is based according to
    point (a) of Article 6(1), or point (a) of Article 9(2), and where there is no other legal
    ground for the processing;
    (c) the data subject objects to the processing pursuant to Article 21(1) and there are no
    overriding legitimate grounds for the processing, or the data subject objects to the
    processing pursuant to Article 21(2);
    (d) the personal data have been unlawfully processed;
    (e) the personal data have to be erased for compliance with a legal obligation in Union or
    Member State law to which the controller is subject;
    (f) the personal data have been collected in relation to the offer of information society
    services referred to in Article 8(1).

    2. Where the controller has made the personal data public and is obliged pursuant to
    paragraph 1 to erase the personal data, the controller, taking account of available
    technology and the cost of implementation, shall take reasonable steps, including technical
    measures, to inform controllers which are processing the personal data that the data
    subject has requested the erasure by such controllers of any links to, or copy or
    replication of, those personal data.

guidance:
  prose: |
    The right to erasure requires controllers to delete personal data upon request when
    specific conditions are met. This right is not absolute - exceptions exist for legal
    obligations, public interest, scientific/historical research, and legal claims.
    Controllers must also notify other controllers who received the data.
    Systems must support complete and verifiable data deletion across all storage systems.

implementation_guidance:
  platform_engineering:
    prose: |
      Platform must support data deletion across all services and storage systems.
      Implement cascading deletion through event-driven architecture.
      Verify deletion completeness across databases, caches, backups, and logs.
      Maintain deletion audit trail without retaining the deleted data.
    tools:
      - kafka
      - rabbitmq
      - backstage
      - custom-deletion-service

  devsecops:
    prose: |
      Applications must implement data deletion endpoints. Test data deletion
      completeness in CI/CD. Ensure backups support granular data erasure.
      Automated verification that deletion propagates to all data stores.
    tools:
      - gitlab-ci
      - postman

  secops:
    prose: |
      Monitor deletion request fulfillment. Verify data is not recoverable
      after deletion. Audit backup systems for residual personal data.
    tools:
      - elastic-siem

legal_references:
