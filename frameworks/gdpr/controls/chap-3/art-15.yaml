id: art-15
family: chap-3
title: "Right of access by the data subject"
class: GDPR

statement:
  prose: |
    1. The data subject shall have the right to obtain from the controller confirmation as to
    whether or not personal data concerning him or her are being processed, and, where that is
    the case, access to the personal data and the following information:
    (a) the purposes of the processing;
    (b) the categories of personal data concerned;
    (c) the recipients or categories of recipient to whom the personal data have been or will
    be disclosed, in particular recipients in third countries or international organisations;
    (d) where possible, the envisaged period for which the personal data will be stored, or,
    if not possible, the criteria used to determine that period;
    (e) the existence of the right to request from the controller rectification or erasure of
    personal data or restriction of processing of personal data concerning the data subject or
    to object to such processing;
    (f) the right to lodge a complaint with a supervisory authority;
    (g) where the personal data are not collected from the data subject, any available
    information as to their source;
    (h) the existence of automated decision-making, including profiling, referred to in
    Article 22(1) and (4) and, at least in those cases, meaningful information about the logic
    involved, as well as the significance and the envisaged consequences of such processing for
    the data subject.

    3. The controller shall provide a copy of the personal data undergoing processing. For any
    further copies requested by the data subject, the controller may charge a reasonable fee
    based on administrative costs.

    4. The right to obtain a copy referred to in paragraph 3 shall not adversely affect the
    rights and freedoms of others.

guidance:
  prose: |
    Data Subject Access Requests (DSARs) must be fulfilled within one month (extendable by
    two months for complex requests). The information must be provided free of charge for the
    first request. Systems must be capable of locating and exporting all personal data for a
    given data subject across all processing systems.

implementation_guidance:
  platform_engineering:
    prose: |
      Platform must provide APIs and tools for data subject access requests across
      all services. Centralized personal data inventory with search capability.
      Automated DSAR fulfillment workflows. Data export in machine-readable format.
    tools:
      - backstage
      - datahub
      - openmetadata
      - custom-dsar-api

  devsecops:
    prose: |
      Applications must implement data export endpoints. Database schemas should
      support efficient personal data retrieval by subject identifier.
      Automated testing of DSAR fulfillment capabilities.
    tools:
      - gitlab-ci
      - postman

  secops:
    prose: |
      Monitor DSAR fulfillment timelines. Alert on requests approaching the
      one-month deadline. Audit trail for all data access provided in response
      to DSARs.
    tools:
      - jira
      - servicenow

