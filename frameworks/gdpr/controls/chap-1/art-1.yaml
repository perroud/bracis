id: art-1
family: chap-1
title: "Subject-matter and objectives"
class: GDPR
statement:
  prose: >-
    1. This Regulation lays down rules relating to the protection of natural persons with regard to the processing
    of personal data and rules relating to the free movement of personal data.

    2. This Regulation protects fundamental rights and freedoms of natural persons and in particular their right
    to the protection of personal data.

    3. The free movement of personal data within the Union shall be neither restricted nor prohibited for reasons
    connected with the protection of natural persons with regard to the processing of personal data.
  parts:
    - id: art-1.1
      label: "(1)"
      prose: >-
        This Regulation lays down rules relating to the protection of natural persons with regard to the processing
        of personal data and rules relating to the free movement of personal data.
    - id: art-1.2
      label: "(2)"
      prose: >-
        This Regulation protects fundamental rights and freedoms of natural persons and in particular their right
        to the protection of personal data.
    - id: art-1.3
      label: "(3)"
      prose: >-
        The free movement of personal data within the Union shall be neither restricted nor prohibited for reasons
        connected with the protection of natural persons with regard to the processing of personal data.
guidance:
  prose: >-
    Article 1 establishes the dual objective of the GDPR: protecting the fundamental right to data protection
    while ensuring the free flow of personal data within the EU internal market. This article sets the constitutional
    foundation upon which all other provisions rest. Organizations must understand that GDPR is not merely a
    compliance burden but a framework designed to balance individual rights with economic freedom. The regulation
    has extraterritorial scope (Article 3), meaning it applies to any organization processing data of EU residents,
    regardless of where the organization is established.
implementation_guidance:
  platform_engineering:
    prose: >-
      Build platform infrastructure with data protection as a foundational architectural principle. All services
      that process personal data must be catalogued in a data processing registry. Implement service mesh policies
      that enforce data classification tagging on all inter-service communication. Design multi-tenant platforms
      with data residency controls that respect EU data sovereignty requirements by default.
    tools:
      - "Kubernetes with namespace-level data classification labels"
      - "Open Policy Agent (OPA) for data flow policy enforcement"
      - "HashiCorp Vault for personal data encryption key management"
      - "Istio/Linkerd service mesh with mTLS and data-aware routing"
  devsecops:
    prose: >-
      Embed data protection checks into CI/CD pipelines. Static analysis should detect personal data patterns
      (email, phone, national IDs) in code, configuration, and logs. Implement pre-commit hooks that flag
      potential personal data exposure. Container images must be scanned for hardcoded personal data.
      Build automated data classification scanning into artifact promotion gates.
    tools:
      - "GitLab SAST/DAST with custom PII detection rules"
      - "Semgrep with GDPR-specific rule packs"
      - "TruffleHog/GitLeaks for PII detection in repositories"
      - "Trivy for container scanning with data-aware policies"
  secops:
    prose: >-
      Implement continuous monitoring for personal data processing activities. SIEM rules must detect unauthorized
      access to personal data stores. Establish data loss prevention (DLP) policies at network egress points.
      Monitor data flows to detect cross-border transfers that may violate GDPR transfer restrictions.
      Alert on anomalous data access patterns that could indicate a breach.
    tools:
      - "SIEM (Splunk/Elastic) with GDPR-specific correlation rules"
      - "DLP solutions (Netskope, Zscaler) at network boundaries"
      - "CASB for cloud data flow monitoring"
      - "Network traffic analysis for cross-border data transfer detection"
