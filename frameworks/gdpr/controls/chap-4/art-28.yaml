id: art-28
family: chap-4
title: "Processor"
class: GDPR

statement:
  prose: |
    1. Where processing is to be carried out on behalf of a controller, the controller shall
    use only processors providing sufficient guarantees to implement appropriate technical and
    organisational measures in such a manner that processing will meet the requirements of this
    Regulation and ensure the protection of the rights of the data subject.

    2. The processor shall not engage another processor without prior specific or general
    written authorisation of the controller. In the case of general written authorisation, the
    processor shall inform the controller of any intended changes concerning the addition or
    replacement of other processors, thereby giving the controller the opportunity to object to
    such changes.

    3. Processing by a processor shall be governed by a contract or other legal act under Union
    or Member State law, that is binding on the processor with regard to the controller and that
    sets out the subject-matter and duration of the processing, the nature and purpose of the
    processing, the type of personal data and categories of data subjects and the obligations
    and rights of the controller. That contract or other legal act shall stipulate, in
    particular, that the processor:
    (a) processes the personal data only on documented instructions from the controller;
    (b) ensures that persons authorised to process the personal data have committed themselves
    to confidentiality or are under an appropriate statutory obligation of confidentiality;
    (c) takes all measures required pursuant to Article 32;
    (d) respects the conditions referred to in paragraphs 2 and 4 for engaging another
    processor;
    (e) assists the controller in ensuring compliance with Articles 32 to 36;
    (f) at the choice of the controller, deletes or returns all the personal data to the
    controller after the end of the provision of services;
    (g) makes available to the controller all information necessary to demonstrate compliance
    and allows for and contributes to audits;
    (h) immediately informs the controller if an instruction infringes this Regulation.

guidance:
  prose: |
    This article governs the controller-processor relationship. All third-party data
    processors must have Data Processing Agreements (DPAs) in place. Processors can only
    act on documented instructions. Sub-processor engagement requires controller approval.
    Critical for SaaS, cloud services, and any outsourced data processing.

implementation_guidance:
  platform_engineering:
    prose: |
      Platform teams must maintain an inventory of all data processors (cloud providers,
      SaaS tools, monitoring services). Each must have a valid DPA. Sub-processor changes
      from providers must be tracked and assessed. Platform should enforce data residency
      and processing location constraints where required.
    tools:
      - backstage
      - servicenow
      - drata
      - vanta

  devsecops:
    prose: |
      CI/CD integrations with third-party services must be reviewed for GDPR compliance.
      Dependency on external services should be documented with DPA status.
      Data flow diagrams should map all processors in the pipeline.
    tools:
      - gitlab-ci
      - terraform

  secops:
    prose: |
      Monitor third-party processor access to personal data. Alert on unauthorized
      data transfers to sub-processors. Regular audit of processor compliance.
      Vendor risk assessment as part of SecOps workflow.
    tools:
      - splunk
      - elastic-siem

