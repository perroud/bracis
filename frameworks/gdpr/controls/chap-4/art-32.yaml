id: art-32
family: chap-4
title: "Security of processing"
class: GDPR

statement:
  prose: |
    1. Taking into account the state of the art, the costs of implementation and the nature,
    scope, context and purposes of processing as well as the risk of varying likelihood and
    severity for the rights and freedoms of natural persons, the controller and the processor
    shall implement appropriate technical and organisational measures to ensure a level of
    security appropriate to the risk, including inter alia as appropriate:

    (a) the pseudonymisation and encryption of personal data;

    (b) the ability to ensure the ongoing confidentiality, integrity, availability and
    resilience of processing systems and services;

    (c) the ability to restore the availability and access to personal data in a timely manner
    in the event of a physical or technical incident;

    (d) a process for regularly testing, assessing and evaluating the effectiveness of
    technical and organisational measures for ensuring the security of the processing.

    2. In assessing the appropriate level of security account shall be taken in particular of
    the risks that are presented by processing, in particular from accidental or unlawful
    destruction, loss, alteration, unauthorised disclosure of, or access to personal data
    transmitted, stored or otherwise processed.

    3. Adherence to an approved code of conduct as referred to in Article 40 or an approved
    certification mechanism as referred to in Article 42 may be used as an element by which to
    demonstrate compliance with the requirements set out in paragraph 1 of this Article.

    4. The controller and processor shall take steps to ensure that any natural person acting
    under the authority of the controller or the processor who has access to personal data
    shall not process them except on instructions from the controller, unless required to do so
    by Union or Member State law.

guidance:
  prose: |
    This is the KEY security article for DevSecOps and Platform Engineering teams.
    It requires: encryption (at rest and in transit), CIA triad assurance,
    disaster recovery capability, and regular security testing.
    The risk-based approach means controls must be proportional to the data processed.

implementation_guidance:
  platform_engineering:
    prose: |
      Platform must provide encryption by default for all data stores and transit.
      Infrastructure must support high availability, backup, and disaster recovery.
      Regular penetration testing and vulnerability assessments of the platform.
      Implement network segmentation and access controls between services.
    tools:
      - vault
      - cert-manager
      - velero
      - kubernetes
      - istio
      - falco

  devsecops:
    prose: |
      Implement comprehensive security testing in CI/CD: SAST, DAST, SCA,
      container scanning, IaC scanning. Encrypt secrets in pipelines.
      Automate vulnerability scanning with defined SLAs for remediation.
      Regular penetration testing of applications.
    tools:
      - trivy
      - semgrep
      - sonarqube
      - gitlab-sast
      - gitlab-dast
      - snyk
      - owasp-zap

  secops:
    prose: |
      Continuous monitoring of processing systems for security events.
      Incident detection and response for data breach scenarios.
      Regular security assessments and penetration tests.
      Backup verification and disaster recovery testing.
    tools:
      - wazuh
      - elastic-siem
      - crowdstrike
      - velociraptor
      - nessus

