id: art-35
family: chap-4
title: "Data protection impact assessment"
class: GDPR

statement:
  prose: |
    1. Where a type of processing in particular using new technologies, and taking into account
    the nature, scope, context and purposes of the processing, is likely to result in a high
    risk to the rights and freedoms of natural persons, the controller shall, prior to the
    processing, carry out an assessment of the impact of the envisaged processing operations on
    the protection of personal data. A single assessment may address a set of similar processing
    operations that present similar high risks.

    3. A data protection impact assessment referred to in paragraph 1 shall in particular be
    required in the case of:
    (a) a systematic and extensive evaluation of personal aspects relating to natural persons
    which is based on automated processing, including profiling, and on which decisions are
    based that produce legal effects concerning the natural person or similarly significantly
    affect the natural person;
    (b) processing on a large scale of special categories of data referred to in Article 9(1),
    or of personal data relating to criminal convictions and offences referred to in Article 10;
    (c) a systematic monitoring of a publicly accessible area on a large scale.

    7. The assessment shall contain at least:
    (a) a systematic description of the envisaged processing operations and the purposes of
    the processing, including, where applicable, the legitimate interest pursued by the
    controller;
    (b) an assessment of the necessity and proportionality of the processing operations in
    relation to the purposes;
    (c) an assessment of the risks to the rights and freedoms of data subjects referred to in
    paragraph 1; and
    (d) the measures envisaged to address the risks, including safeguards, security measures
    and mechanisms to ensure the protection of personal data and to demonstrate compliance with
    this Regulation taking into account the rights and legitimate interests of data subjects and
    other persons concerned.

guidance:
  prose: |
    DPIA is required before high-risk processing begins. This includes large-scale
    automated decision-making, large-scale processing of special category data,
    and systematic monitoring of public areas. The assessment must evaluate necessity,
    proportionality, risks, and mitigating measures. Consultation with the DPO is required.

implementation_guidance:
  platform_engineering:
    prose: |
      Platform teams should maintain DPIA templates and workflows integrated into
      the service creation process. New services processing personal data should
      trigger DPIA workflow automatically. Risk scoring based on data categories
      and processing volume.
    tools:
      - backstage
      - jira
      - confluence

  devsecops:
    prose: |
      Include DPIA checks in the development lifecycle. Code review should flag
      new personal data processing. Automated data flow analysis to identify
      high-risk processing patterns. DPIA status as a gate in deployment pipelines.
    tools:
      - sonarqube
      - semgrep
      - gitlab-ci

  secops:
    prose: |
      Monitor processing activities to detect new high-risk operations that
      may require DPIA. Threat modeling outputs feed into DPIA risk assessments.
      Incident data informs DPIA risk scoring for existing processes.
    tools:
      - elastic-siem
      - splunk

