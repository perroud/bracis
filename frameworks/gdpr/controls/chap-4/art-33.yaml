id: art-33
family: chap-4
title: "Notification of a personal data breach to the supervisory authority"
class: GDPR

statement:
  prose: |
    1. In the case of a personal data breach, the controller shall without undue delay and,
    where feasible, not later than 72 hours after having become aware of it, notify the
    personal data breach to the supervisory authority competent in accordance with Article 55,
    unless the personal data breach is unlikely to result in a risk to the rights and freedoms
    of natural persons. Where the notification to the supervisory authority is not made within
    72 hours, it shall be accompanied by reasons for the delay.

    2. The processor shall notify the controller without undue delay after becoming aware of a
    personal data breach.

    3. The notification referred to in paragraph 1 shall at least:
    (a) describe the nature of the personal data breach including where possible, the
    categories and approximate number of data subjects concerned and the categories and
    approximate number of personal data records concerned;
    (b) communicate the name and contact details of the data protection officer or other
    contact point where more information can be obtained;
    (c) describe the likely consequences of the personal data breach;
    (d) describe the measures taken or proposed to be taken by the controller to address the
    personal data breach, including, where appropriate, measures to mitigate its possible
    adverse effects.

    4. Where, and in so far as, it is not possible to provide the information at the same time,
    the information may be provided in phases without undue further delay.

    5. The controller shall document any personal data breaches, comprising the facts relating
    to the personal data breach, its effects and the remedial action taken.

guidance:
  prose: |
    72-hour breach notification is one of the most operationally impactful GDPR requirements.
    Organizations must have incident response processes that can detect, assess, and report
    breaches within this timeframe. Documentation of ALL breaches (even those not reported)
    is mandatory.

implementation_guidance:
  platform_engineering:
    prose: |
      Platform must support rapid breach detection through comprehensive logging and
      monitoring. Automated alerting for data access anomalies. Centralized incident
      management system integrated with platform observability.
    tools:
      - pagerduty
      - opsgenie
      - prometheus-alertmanager
      - grafana

  devsecops:
    prose: |
      CI/CD pipelines should include data breach detection mechanisms.
      Automated vulnerability scanning to prevent breaches proactively.
      Secret detection to prevent credential leaks that could lead to breaches.
      Incident response runbooks as code.
    tools:
      - gitlab-secret-detection
      - gitleaks
      - trivy
      - defectdojo

  secops:
    prose: |
      SOC must have playbooks for GDPR breach detection and notification within 72 hours.
      Automated triage and classification of potential data breaches.
      Pre-built notification templates for supervisory authorities.
      Evidence preservation and chain of custody procedures.
    tools:
      - thehive
      - cortex-xsoar
      - misp
      - elastic-siem
      - wazuh

