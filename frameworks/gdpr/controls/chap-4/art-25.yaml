id: art-25
family: chap-4
title: "Data protection by design and by default"
class: GDPR

statement:
  prose: |
    1. Taking into account the state of the art, the cost of implementation and the nature,
    scope, context and purposes of processing as well as the risks of varying likelihood and
    severity for rights and freedoms of natural persons posed by the processing, the controller
    shall, both at the time of the determination of the means for processing and at the time of
    the processing itself, implement appropriate technical and organisational measures, such as
    pseudonymisation, which are designed to implement data-protection principles, such as data
    minimisation, in an effective manner and to integrate the necessary safeguards into the
    processing in order to meet the requirements of this Regulation and protect the rights of
    data subjects.

    2. The controller shall implement appropriate technical and organisational measures for
    ensuring that, by default, only personal data which are necessary for each specific purpose
    of the processing are processed. That obligation applies to the amount of personal data
    collected, the extent of their processing, the period of their storage and their
    accessibility. In particular, such measures shall ensure that by default personal data are
    not made accessible without the individual's intervention to an indefinite number of natural
    persons.

    3. An approved certification mechanism pursuant to Article 42 may be used as an element to
    demonstrate compliance with the requirements set out in paragraphs 1 and 2 of this Article.

guidance:
  prose: |
    This article mandates privacy by design and privacy by default. Controllers must embed
    data protection into the design of systems and business practices from the earliest stage
    of development. By default, systems must process only the minimum data necessary.
    Key techniques include pseudonymisation, encryption, data minimisation, access controls,
    and retention policies.

implementation_guidance:
  platform_engineering:
    prose: |
      Platform teams must build privacy-by-design into golden paths and templates.
      Default configurations should minimize data collection and retention. Internal
      Developer Platforms should provide privacy-preserving building blocks as
      self-service capabilities.
    tools:
      - vault
      - kyverno
      - opa
      - backstage
      - sealed-secrets

  devsecops:
    prose: |
      CI/CD pipelines should include privacy impact checks. Static analysis should
      detect patterns of excessive data collection. Data classification scanning
      should identify personal data in code and configurations. Default pipeline
      templates should include privacy-preserving patterns.
    tools:
      - semgrep
      - sonarqube
      - gitlab-sast
      - checkov

  secops:
    prose: |
      Monitor for excessive data access patterns. Alert on bulk data exports or
      unusual access to personal data stores. Ensure logging itself follows
      data minimisation principles (don't log personal data unnecessarily).
    tools:
      - wazuh
      - elastic-siem
      - splunk

