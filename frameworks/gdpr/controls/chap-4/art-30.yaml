id: art-30
family: chap-4
title: "Records of processing activities"
class: GDPR

statement:
  prose: |
    1. Each controller and, where applicable, the controller's representative, shall maintain
    a record of processing activities under its responsibility. That record shall contain all
    of the following information:
    (a) the name and contact details of the controller and, where applicable, the joint
    controller, the controller's representative and the data protection officer;
    (b) the purposes of the processing;
    (c) a description of the categories of data subjects and of the categories of personal data;
    (d) the categories of recipients to whom the personal data have been or will be disclosed
    including recipients in third countries or international organisations;
    (e) where applicable, transfers of personal data to a third country or an international
    organisation;
    (f) where possible, the envisaged time limits for erasure of the different categories of
    data;
    (g) where possible, a general description of the technical and organisational security
    measures referred to in Article 32(1).

    2. Each processor and, where applicable, the processor's representative shall maintain a
    record of all categories of processing activities carried out on behalf of a controller.

guidance:
  prose: |
    Records of processing activities (ROPA) are a fundamental GDPR accountability requirement.
    Both controllers and processors must maintain these records. They must be in writing
    (including electronic form) and made available to supervisory authorities on request.
    Organizations with fewer than 250 employees are exempt unless processing is not occasional,
    includes special category data, or is likely to result in risk.

implementation_guidance:
  platform_engineering:
    prose: |
      Platform should provide data catalog and data lineage capabilities to
      automatically discover and document processing activities. Service registry
      should include data processing metadata. Automated ROPA generation from
      infrastructure configuration.
    tools:
      - backstage
      - apache-atlas
      - datahub
      - openmetadata

  devsecops:
    prose: |
      Code annotations and metadata to document data processing purposes.
      Automated data flow analysis in CI/CD to detect new processing activities.
      Infrastructure-as-code should document data categories and retention.
    tools:
      - semgrep
      - sonarqube

  secops:
    prose: |
      Monitor for undocumented data processing activities. Data loss prevention
      tools to detect personal data in unexpected locations. Regular audit of
      processing records against actual data flows.
    tools:
      - elastic-siem
      - splunk

