id: art-44
family: chap-5
title: "General principle for transfers"
class: GDPR

statement:
  prose: |
    Any transfer of personal data which are undergoing processing or are intended for
    processing after transfer to a third country or to an international organisation shall take
    place only if, subject to the other provisions of this Regulation, the conditions laid down
    in this Chapter are complied with by the controller and processor, including for onward
    transfers of personal data from the third country or an international organisation to
    another third country or to another international organisation. All provisions in this
    Chapter shall be applied in order to ensure that the level of protection of natural persons
    guaranteed by this Regulation is not undermined.

guidance:
  prose: |
    International data transfers are only permitted through: adequacy decisions (Art. 45),
    appropriate safeguards such as Standard Contractual Clauses or Binding Corporate Rules
    (Art. 46), or specific derogations (Art. 49). After the Schrems II ruling, transfers to
    countries without adequacy decisions require supplementary measures to ensure equivalent
    protection. This impacts cloud service selection, CDN usage, and third-party processors
    located outside the EEA.

implementation_guidance:
  platform_engineering:
    prose: |
      Platform must enforce data residency requirements. Configure cloud services
      for EU-only regions where required. Implement data locality controls in
      Kubernetes (node affinity, topology constraints). Monitor data flow paths
      to detect cross-border transfers.
    tools:
      - kubernetes
      - terraform
      - crossplane
      - kyverno

  devsecops:
    prose: |
      IaC scanning to verify cloud resources are deployed in approved regions.
      Pipeline checks for data transfer compliance. Automated detection of
      third-party services that may transfer data outside EEA.
    tools:
      - checkov
      - tfsec
      - gitlab-ci

  secops:
    prose: |
      Monitor network traffic for data transfers to non-adequate countries.
      DLP rules for personal data leaving approved geographic boundaries.
      Regular audit of cloud service data processing locations.
    tools:
      - elastic-siem
      - palo-alto
      - zscaler

legal_references:
  - framework_id: lgpd
    articles: [art-33]
    relationship: equivalent-to
