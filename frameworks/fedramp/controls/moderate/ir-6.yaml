id: ir-6
family: ir
title: "Incident Reporting"
class: FedRAMP

baselines: [low, moderate, high]

parameters:
  - id: ir-06_odp.01
    label: "time period for reporting incidents"
    guidance: "FedRAMP requirement: Report incidents to US-CERT within 1 hour of determination for all impact levels. Report to the FedRAMP PMO and authorizing agency within the same timeframe."
  - id: ir-06_odp.02
    label: "authorities to receive incident reports"
    guidance: "FedRAMP requirement: US-CERT, FedRAMP PMO (info@fedramp.gov), and the authorizing agency ISSO."

statement:
  prose: >-
    a. Require personnel to report suspected incidents to the
       organizational incident response capability within 1 hour of
       discovery;
    b. Report incident information to US-CERT, FedRAMP PMO, and the
       authorizing agency in accordance with FedRAMP Incident
       Communications Procedures.
  parts:
    - id: ir-6_smt.a
      label: "a."
      prose: >-
        FedRAMP Additional Requirement: CSPs must report all incidents
        to US-CERT using the US-CERT Incident Reporting Portal within
        1 hour of determination that an incident has occurred.
    - id: ir-6_smt.b
      label: "b."
      prose: >-
        FedRAMP Additional Requirement: CSPs must notify the FedRAMP
        PMO (info@fedramp.gov) and the authorizing agency within 1 hour
        of incident determination, and provide updated incident reports
        within 7 calendar days.

guidance:
  prose: >-
    FedRAMP incident reporting has significantly stricter timelines than
    the base NIST 800-53 control. The 1-hour reporting requirement from
    incident determination means CSPs must have automated detection and
    rapid classification capabilities. Incident categories include:
    unauthorized access, denial of service, malicious code, improper
    usage, scans/probes/attempted access, and investigation. CSPs must
    follow the FedRAMP Incident Communications Procedures which specify
    the content, format, and recipients for initial and updated reports.
    The CSP must also notify affected agencies individually. Failure
    to meet reporting timelines can result in ATO revocation. CSPs
    should pre-configure reporting channels, templates, and workflows
    to meet the 1-hour requirement.

references:
  - citation: "NIST SP 800-53 Rev 5, IR-6"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
  - citation: "FedRAMP Incident Communications Procedures"
    url: "https://www.fedramp.gov/assets/resources/documents/CSP_Incident_Communications_Procedures.pdf"
  - citation: "US-CERT Federal Incident Notification Guidelines"
    url: "https://www.cisa.gov/federal-incident-notification-guidelines"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated incident detection with classification pipelines
      that evaluate detected events against FedRAMP incident categories
      within minutes. Deploy pre-configured notification workflows that
      automatically generate initial incident reports and route them to
      US-CERT, FedRAMP PMO, and authorizing agency contacts. Integrate
      incident management with the observability stack so that detection,
      classification, and initial notification can complete within the
      1-hour window. Maintain pre-populated incident report templates
      with auto-filled technical details (affected systems, detection
      method, initial impact assessment). Implement countdown timers
      and escalation workflows that alert management when the 1-hour
      deadline approaches. Deploy secure communication channels for
      incident reporting pre-tested with all receiving authorities.
    tools:
      - pagerduty
      - opsgenie
      - statuspage
      - prometheus
      - alertmanager
      - grafana
      - backstage

  devsecops:
    prose: >-
      Integrate incident detection into the CI/CD pipeline through
      automated security scanning that flags potential incidents
      (compromised dependencies, secret exposure, unauthorized
      configuration changes). Implement automated rollback capabilities
      for deployment-induced incidents. Maintain deployment correlation
      data that links changes to potential incident causes, reducing
      investigation time. Automate the collection of forensic artifacts
      (deploy logs, configuration diffs, access logs) that feed into
      incident reports. Implement feature flags enabling rapid
      deactivation of compromised functionality.
    tools:
      - gitlab-ci
      - gitlab-incident-management
      - argocd
      - feature-flags
      - gitlab-audit-events

  secops:
    prose: >-
      Operate a 24/7 SOC capability with defined incident classification
      and escalation procedures that meet the 1-hour reporting deadline.
      Pre-configure US-CERT reporting through the incident reporting
      portal with saved templates for each incident category. Maintain
      current contact lists for FedRAMP PMO and all authorizing agency
      ISSOs. Conduct quarterly incident reporting drills that validate
      the end-to-end process from detection through US-CERT submission
      within 1 hour. Track incident metrics: mean time to detect (MTTD),
      mean time to classify, and mean time to report. Ensure updated
      incident reports are submitted within 7 calendar days with
      additional findings and root cause analysis progress. Maintain
      a complete incident register for FedRAMP ConMon reporting.
    tools:
      - splunk-soar
      - cortex-xsoar
      - servicenow
      - thehive
      - us-cert-portal
      - grc-platform

