id: ca-7
family: ca
title: "Continuous Monitoring"
class: FedRAMP

baselines: [low, moderate, high]

parameters:
  - id: ca-07_odp.01
    label: "system-level metrics to be monitored"
    guidance: "FedRAMP requirement: Monitor all implemented security controls on an ongoing basis per the FedRAMP Continuous Monitoring Strategy."
  - id: ca-07_odp.02
    label: "frequency of monitoring"
    guidance: "FedRAMP Moderate parameter: Monthly for vulnerability scanning, annually for full security assessment, and ongoing for automated monitoring."
  - id: ca-07_odp.03
    label: "frequency of assessment of control effectiveness"
    guidance: "FedRAMP requirement: Assess at least one-third of all controls annually, rotating through the complete control set over a 3-year cycle."
  - id: ca-07_odp.04
    label: "personnel or roles to receive monitoring reports"
    guidance: "FedRAMP requirement: FedRAMP PMO, authorizing agency, and CSP ISSO."

statement:
  prose: >-
    Develop a system-level continuous monitoring strategy and implement
    a continuous monitoring program that includes establishing the
    following system-level metrics to be monitored, establishing
    frequencies for monitoring and assessment, ongoing control
    assessments in accordance with the continuous monitoring strategy,
    ongoing monitoring of system and organization-defined metrics,
    correlation and analysis of information generated by control
    assessments and monitoring, response actions to address results
    of the analysis of control assessment and monitoring information,
    and reporting the security and privacy status of the system to
    designated personnel and roles.

guidance:
  prose: >-
    FedRAMP Continuous Monitoring (ConMon) has specific requirements
    beyond the base NIST 800-53 control. CSPs must submit monthly
    vulnerability scan reports, maintain an up-to-date POA&M (Plan of
    Action and Milestones), conduct annual assessments of one-third of
    all controls, and provide ongoing incident reporting. The ConMon
    strategy must address: vulnerability scanning (monthly OS/infrastructure,
    monthly web application, monthly database), POA&M management (monthly
    updates), change management (significant change analysis), and
    annual assessments. FedRAMP requires specific deliverables:
    monthly vulnerability scan reports, monthly POA&M updates, annual
    security assessment, and incident reports as needed. Failure to
    maintain ConMon can result in revocation of the ATO/P-ATO.

references:
  - citation: "NIST SP 800-53 Rev 5, CA-7"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
  - citation: "FedRAMP Continuous Monitoring Strategy Guide"
    url: "https://www.fedramp.gov/assets/resources/documents/CSP_Continuous_Monitoring_Strategy_Guide.pdf"
  - citation: "FedRAMP Continuous Monitoring Performance Management Guide"
    url: "https://www.fedramp.gov/assets/resources/documents/CSP_Continuous_Monitoring_Performance_Management_Guide.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated continuous monitoring pipelines that execute
      monthly vulnerability scans across all infrastructure layers
      (OS, container, application, database). Deploy automated compliance
      scanning (OpenSCAP, CIS Benchmarks) that continuously evaluates
      system configurations against FedRAMP-required baselines. Build
      automated ConMon reporting dashboards that aggregate vulnerability
      scan results, POA&M status, configuration compliance percentages,
      and control assessment progress. Implement automated change
      detection that flags significant changes requiring FedRAMP
      notification. Deploy drift detection between declared security
      configurations and runtime state. Automate monthly ConMon
      deliverable generation (scan reports, POA&M updates) to reduce
      manual effort and ensure reporting timeliness.
    tools:
      - nessus
      - qualys
      - openscap
      - prometheus
      - grafana
      - terraform
      - cloud-custodian
      - backstage

  devsecops:
    prose: >-
      Integrate continuous monitoring into the CI/CD lifecycle by
      running security scans on every code change and aggregating
      results into the ConMon reporting pipeline. Implement automated
      POA&M updates that reflect vulnerability remediation through
      the development pipeline. Deploy significant change detection
      that analyzes pipeline changes against FedRAMP significant change
      criteria and triggers notification workflows. Automate annual
      control assessment evidence collection through pipeline-generated
      artifacts (scan reports, configuration evidence, access review
      results). Implement compliance-as-code that continuously validates
      control implementation and generates machine-readable compliance
      status.
    tools:
      - gitlab-ci
      - gitlab-security-dashboard
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - checkov
      - conftest

  secops:
    prose: >-
      Operate the FedRAMP ConMon programme with monthly vulnerability
      reporting, monthly POA&M management, and annual security
      assessments. Generate and submit monthly ConMon deliverables to
      the authorizing agency and FedRAMP PMO. Track all vulnerabilities
      in the POA&M with defined remediation timelines: 30 days for
      Critical/High, 90 days for Moderate, 180 days for Low. Monitor
      control effectiveness through SIEM metrics and security event
      analysis. Conduct annual security assessments covering one-third
      of all controls with rotation through the complete set over
      3 years. Coordinate with 3PAO for annual assessment activities.
      Track ConMon health metrics and escalate to management when
      SLAs are at risk.
    tools:
      - splunk
      - elastic-siem
      - qualys
      - nessus
      - servicenow
      - grc-platform

