authorization_paths:
  - id: jab
    title: "JAB Provisional Authorization (P-ATO)"
    description: >-
      Joint Authorization Board reviews and grants a Provisional Authority
      to Operate for broad government-wide use.
  - id: agency
    title: "Agency Authorization (ATO)"
    description: >-
      Individual federal agency sponsors and authorizes the cloud service
      for its own use.

