    description: "Describes the assessment methodology and scope."
  - id: sar
    title: "Security Assessment Report (SAR)"
    description: "Documents assessment findings and risk posture."
  - id: poam
    title: "Plan of Action and Milestones (POA&M)"
    description: "Tracks identified weaknesses and remediation plans."

