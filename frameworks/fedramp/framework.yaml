id: fedramp
title: "Federal Risk and Authorization Management Program"
short_title: "FedRAMP"
version: "Rev 5"
publication_date: "2011-12-08"
last_updated: "2024-03-27"

authority:
  name: "Joint Authorization Board (JAB) / General Services Administration (GSA) / FedRAMP Program Management Office (PMO)"
  acronym: "JAB/GSA/FedRAMP PMO"
  country: "US"
  url: "https://www.fedramp.gov/"

type: standard
scope: cloud-security
mandatory: true

original_language: en
available_languages: [en]

