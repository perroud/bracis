baselines:
  - id: low
    title: "FedRAMP Low Baseline"
    description: >-
      125 controls derived from NIST SP 800-53 Rev 5 Low baseline with
      FedRAMP-specific additional requirements and parameter values.
      Appropriate for cloud systems where the loss of confidentiality,
      integrity, and availability would have a limited adverse effect.
    control_count: 125
    impact_level: low
    source: "NIST SP 800-53 Rev 5 Low + FedRAMP additions"
  - id: moderate
    title: "FedRAMP Moderate Baseline"
    description: >-
      325 controls derived from NIST SP 800-53 Rev 5 Moderate baseline with
      FedRAMP-specific additional requirements and parameter values. This is
      the most common FedRAMP authorization level, appropriate for cloud
      systems where the loss of confidentiality, integrity, and availability
      would have a serious adverse effect.
    control_count: 325
    impact_level: moderate
    source: "NIST SP 800-53 Rev 5 Moderate + FedRAMP additions"
    inherits_from: [low]
  - id: high
    title: "FedRAMP High Baseline"
    description: >-
      421 controls derived from NIST SP 800-53 Rev 5 High baseline with
      FedRAMP-specific additional requirements and parameter values.
      Appropriate for cloud systems where the loss of confidentiality,
      integrity, and availability would have a severe or catastrophic
      adverse effect. Required for law enforcement, emergency services,
      financial, and health systems.
    control_count: 421
    impact_level: high
    source: "NIST SP 800-53 Rev 5 High + FedRAMP additions"
    inherits_from: [moderate]

