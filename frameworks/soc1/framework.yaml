id: soc1
title: "SOC 1 — System and Organization Controls for Financial Reporting (SSAE 18 / ISAE 3402)"
short_title: "SOC 1"
version: "SSAE-18"
publication_date: "2017-05-01"
last_updated: "2017-05-01"
authority:
  name: "American Institute of Certified Public Accountants"
  acronym: "AICPA"
  country: "US"
  url: "https://www.aicpa-cima.com/resources/landing/soc-suite-of-services"
type: standard
scope: financial
mandatory: false
original_language: en
