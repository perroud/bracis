description: >-
  SOC 1 (System and Organization Controls 1) reports are designed for service organizations that
  provide services relevant to user entities' internal control over financial reporting (ICFR).
  Based on SSAE 18 (Statement on Standards for Attestation Engagements No. 18) in the United States
  and ISAE 3402 internationally, SOC 1 examinations evaluate whether a service organization's
  controls are suitably designed and operating effectively to provide reasonable assurance that
  the control objectives stated in management's description of the system are achieved.
  SOC 1 reports are used by user entities and their auditors to assess the risks associated
  with outsourced processes that affect financial reporting.

report_types:
  - id: type-i
    title: "SOC 1 Type I — Point-in-Time Assessment"
    description: >-
      A Type I report addresses the fairness of the presentation of the service organization's
      description of its system and the suitability of the design of the controls to achieve
      the related control objectives as of a specified date. It does not evaluate operating
      effectiveness over a period of time.
  - id: type-ii
    title: "SOC 1 Type II — Period Assessment"
    description: >-
      A Type II report addresses the fairness of the presentation of the service organization's
      description of its system, the suitability of the design of the controls, and the operating
      effectiveness of those controls throughout a specified period (typically 6 to 12 months).
      Type II is the most commonly requested report for ongoing vendor assurance.
    inherits_from: [type-i]

baselines:
  - id: type-i
    title: "SOC 1 Type I"
    description: >-
      Controls must be suitably designed to achieve stated control objectives as of a specified date.
  - id: type-ii
    title: "SOC 1 Type II"
    description: >-
      Controls must be suitably designed and operating effectively throughout the examination period.
    inherits_from: [type-i]

control_families:
  - id: control-environment
    title: "Control Environment"
    category: governance
    description: >-
      The control environment establishes the tone of an organization, influencing the control
      consciousness of its people. It is the foundation for all other components of internal control
      over financial reporting, providing discipline and structure. Elements include governance,
      accountability, competence, and ethical values.
    always_included: true
    control_count: 3

  - id: risk-assessment
    title: "Risk Assessment"
    category: risk
    description: >-
      Risk assessment is the service organization's identification and analysis of relevant risks
      to the achievement of its control objectives related to financial reporting. This process
      forms the basis for determining how risks should be managed and includes identification of
      fraud risk and risks arising from change.
    always_included: true
    control_count: 3

  - id: control-activities
    title: "Control Activities"
    category: controls
    description: >-
      Control activities are the actions established through policies and procedures that help
      ensure that management directives to mitigate risks to the achievement of control objectives
      are carried out. They include IT general controls (ITGCs), access controls, segregation of
      duties, change management, and processing integrity.
    always_included: true
    control_count: 7

  - id: information-communication
    title: "Information and Communication"
    category: communication
    description: >-
      Information and communication are essential to carrying out internal control responsibilities.
      Management must obtain or generate and use relevant, quality information to support the
      functioning of ICFR, communicate information internally, and communicate with external parties
      including user entities about their responsibilities.
    always_included: true
    control_count: 3

  - id: monitoring
    title: "Monitoring Activities"
    category: monitoring
    description: >-
      Monitoring activities assess whether each component of internal control over financial reporting
      is present and functioning. This includes ongoing evaluations, separate evaluations, and
      communication and remediation of deficiencies in a timely manner.
    always_included: true
    control_count: 3

  - id: availability
    title: "Availability and Processing Continuity"
    category: availability
    description: >-
      Availability controls ensure that the systems supporting financial processing are available
      as committed to user entities. This includes uptime commitments, incident management, and
      business continuity planning for financial processing systems.
    always_included: false
    control_count: 2

related_frameworks:
  - framework_id: sox
    relationship: supports
    description: >-
      SOC 1 reports are a primary mechanism by which service organizations demonstrate compliance
      with SOX Section 404 requirements. User entities' external auditors rely on SOC 1 Type II
      reports to assess ICFR at service organizations, reducing the scope of their own testing.
  - framework_id: soc2
    relationship: complements
    description: >-
      SOC 1 and SOC 2 are complementary AICPA frameworks. SOC 1 addresses internal controls
      over financial reporting while SOC 2 addresses operational controls (security, availability,
      processing integrity, confidentiality, privacy). Many organizations obtain both reports.
  - framework_id: cobit-2019
    relationship: mapped
    description: >-
      COBIT 2019 governance and management objectives provide an IT governance framework that
      supports SOC 1 IT General Controls (ITGCs). COBIT's APO, BAI, DSS, and MEA domains map
      directly to SOC 1 control activities and monitoring requirements.
  - framework_id: pci-dss-v4
    relationship: mapped
    description: >-
      For payment processors and financial service providers, PCI DSS controls over cardholder
      data environments frequently intersect with SOC 1 ICFR controls, particularly in the areas
      of access control, change management, and monitoring.
  - framework_id: fisma
    relationship: mapped
    description: >-
      Federal agencies and their service providers subject to FISMA implement controls that
      overlap significantly with SOC 1 requirements, particularly in risk assessment, access
      control, audit, and incident response domains.

