id: soc1-ce-governance
family: control-environment
title: "Governance and Oversight"
class: SSAE18-ICFR
baselines: [type-i, type-ii]
statement:
  prose: >-
    The board of directors and senior management demonstrate a commitment to integrity and
    ethical values and exercise oversight responsibility for the development and performance
    of internal control over financial reporting. The board maintains an audit committee
    with appropriate independence and competence that oversees the service organization's
    financial reporting process and internal control. Governance structures establish clear
    lines of authority, accountability, and responsibility for achieving control objectives
    related to financial reporting. The service organization defines, assigns, and limits
    authorities and responsibilities to appropriate individuals consistent with the entity's
    objectives and the requirements of user entities.
guidance:
  prose: >-
    Governance is the foundation of an effective control environment for ICFR. Auditors
    examine the tone set at the top, the structure of the board and audit committee, and
    whether governance mechanisms ensure appropriate oversight of financial reporting controls.
    Service organizations must demonstrate that their governance bodies actively exercise
    oversight — not merely in form, but in substance. This requires documented evidence of
    board and audit committee meeting minutes, charter documents, independence assessments,
    and escalation procedures for significant deficiencies and material weaknesses.
    The service organization should also demonstrate how governance policies cascade down
    to operational roles that interact with user entities' financial data.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement governance controls at the infrastructure level by codifying access authority
      matrices in infrastructure-as-code (IaC). Establish role hierarchies in identity providers
      that mirror organizational governance structures, ensuring separation between board-level,
      executive, and operational roles. Use policy-as-code tools to enforce governance mandates
      automatically — for example, enforcing that production financial systems can only be
      modified through approved change processes. Maintain immutable audit logs of all privileged
      operations using centralized logging infrastructure. Provide audit committee members with
      read-only dashboards showing control posture across financial processing systems.
    tools:
      - vault
      - keycloak
      - open-policy-agent
      - backstage
      - grafana
  devsecops:
    prose: >-
      Enforce governance through GitLab's compliance framework configuration. Assign CODEOWNERS
      for all repositories that handle financial data, ensuring that designated governance
      representatives must approve changes to critical code paths. Configure protected branches
      on all repositories containing financial processing logic, requiring approvals from
      individuals with governance responsibility. Use GitLab's audit events to capture all
      significant actions for governance review. Implement pipeline security policies that
      enforce mandatory compliance checks before deployment to financial processing environments.
    tools:
      - gitlab-ci
      - gitlab-compliance-framework
      - terraform
      - checkov
  secops:
    prose: >-
      Maintain a governance risk register that documents board-approved risk tolerances for
      ICFR. Schedule quarterly governance reviews of the control environment, documenting
      findings and remediation commitments. Produce periodic control environment reports for
      the audit committee covering significant changes, deficiencies, and emerging risks.
      Implement a process to escalate identified control deficiencies to appropriate governance
      levels within defined timeframes. Retain all governance meeting minutes, charters, and
      control reports for a minimum of seven years to support audit examination.
    tools:
      - servicenow-grc
      - archer-grc
      - splunk
      - jira
related_controls:
  - control_id: soc1-ce-accountability
    relationship: supports
    description: "Governance provides the framework within which accountability structures operate."
  - control_id: soc1-ce-ethics
    relationship: supports
    description: "Governance structures reinforce and monitor commitment to ethics and integrity."
  - control_id: soc1-mon-audit
    relationship: supports
    description: "Internal and external audit activities report to and support governance oversight."
