id: soc1-ce-ethics
family: control-environment
title: "Ethics and Integrity Commitment"
class: SSAE18-ICFR
baselines: [type-i, type-ii]
statement:
  prose: >-
    The service organization demonstrates a commitment to integrity and ethical values as a
    foundation for the system of internal control over financial reporting. The organization
    establishes standards of conduct, evaluates adherence to those standards, and addresses
    deviations in a timely manner. The tone at the top set by the board and senior management
    reinforces the importance of integrity and ethical behavior in all activities affecting
    financial reporting. The service organization maintains mechanisms — including confidential
    reporting channels — through which employees, contractors, and others can report suspected
    ethical violations without fear of retaliation. Management's commitment to integrity
    and ethical values is evidenced through consistent behavior and communication.
guidance:
  prose: >-
    Auditors examine the ethics and integrity component through interviews with personnel at
    all levels, review of documented codes of conduct, examination of whistleblower and
    ethics hotline logs, and assessment of how management responds to identified violations.
    A code of conduct that exists only on paper does not satisfy this requirement. Service
    organizations must demonstrate active communication, periodic acknowledgment, and
    consistent enforcement of ethical standards. For technology service organizations,
    this includes ethical handling of user entities' financial data — non-disclosure agreements,
    data handling policies, and consequences for unauthorized access to financial records.
    Auditors will look for evidence that ethics violations are investigated and that
    appropriate corrective actions are taken, including disciplinary measures.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement technical controls that reinforce ethical commitments: enforce data access
      logging so that any access to user entities' financial data is recorded and attributable;
      implement data masking or tokenization in non-production environments to prevent
      unnecessary exposure of financial records; deploy data loss prevention (DLP) controls
      that prevent exfiltration of financial data; and maintain an immutable audit trail
      that cannot be modified even by privileged administrators. Use privileged access
      management (PAM) solutions to require explicit justification for access to financial
      data systems, creating accountability for each access event.
    tools:
      - vault
      - cyberark
      - aws-macie
      - open-policy-agent
      - hashicorp-sentinel
  devsecops:
    prose: >-
      Enforce ethical standards in the development process through mandatory secret scanning
      to prevent developers from embedding credentials or accessing production financial data
      from development pipelines. Configure GitLab to prevent force-pushes to protected
      branches, preventing rewriting of audit history. Enable signed commits to create
      attributable records of who made changes. Implement mandatory security training
      completion as a prerequisite for developer access to repositories containing financial
      processing logic. Audit pipeline configurations to ensure CI/CD processes cannot
      exfiltrate financial data from production environments.
    tools:
      - gitlab-secret-detection
      - gitlab-signed-commits
      - pre-commit-hooks
      - trivy
      - checkov
  secops:
    prose: >-
      Maintain a documented code of conduct that all personnel with ICFR responsibilities
      must acknowledge annually. Operate a confidential ethics hotline accessible to all
      employees and contractors. Document and track ethics investigations, ensuring findings
      are reported to the audit committee in a timely manner. Conduct background checks for
      personnel with access to financial processing systems. Review and update the code of
      conduct at least annually, incorporating lessons learned from incidents. Retain
      acknowledgment records, investigation documentation, and corrective action evidence
      for audit examination.
    tools:
      - navex-ethics-hotline
      - servicenow-grc
      - workday
      - archer-grc
related_controls:
  - control_id: soc1-ce-governance
    relationship: supports
    description: "Governance structures establish and enforce ethical standards throughout the organization."
  - control_id: soc1-ra-fraud-risk
    relationship: supports
    description: "Ethical culture is a primary preventive control against fraud risk."
  - control_id: soc1-ca-segregation
    relationship: complements
    description: "Segregation of duties complements ethical culture by reducing opportunities for unethical acts."
