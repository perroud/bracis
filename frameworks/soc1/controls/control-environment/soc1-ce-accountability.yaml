id: soc1-ce-accountability
family: control-environment
title: "Organizational Accountability and Competence"
class: SSAE18-ICFR
baselines: [type-i, type-ii]
statement:
  prose: >-
    The service organization demonstrates a commitment to attracting, developing, and retaining
    competent individuals in alignment with its control objectives related to financial reporting.
    The organization establishes clear accountability for internal control responsibilities,
    including defining what is expected of employees and holding them accountable through
    performance evaluation and corrective action mechanisms. Management evaluates performance
    of internal control and pursues improvement of identified deficiencies. Individuals
    understand their responsibilities for internal control over financial reporting, and
    the service organization takes corrective action where performance deviations are identified.
guidance:
  prose: >-
    Accountability within the control environment requires more than organizational charts
    and job descriptions. Auditors examine whether individuals with ICFR responsibilities
    possess sufficient knowledge, skills, and competencies; whether performance expectations
    are clearly communicated; whether deviations from expected control performance are
    identified and addressed; and whether the organization has mechanisms to retain key
    personnel or transfer institutional knowledge. Service organizations should document
    competency requirements for roles that interact with financial reporting systems, maintain
    training records, and demonstrate that succession planning exists for critical ICFR roles.
    For service organizations operating financial processing platforms, this extends to
    development and operations personnel who build and maintain the systems relied upon
    by user entities for financial reporting.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement role-based access control (RBAC) that maps directly to the organizational
      accountability structure, ensuring that only individuals with verified competencies
      are granted access to financial processing systems. Automate competency verification
      through integration with HR systems — for example, gate access to production financial
      environments on completion of mandatory training modules. Use Backstage or a similar
      developer portal to document role ownership of services that affect financial reporting,
      creating a clear accountability map. Implement automated alerts when critical roles
      become vacant or when key personnel changes occur in systems with ICFR relevance.
    tools:
      - backstage
      - keycloak
      - vault
      - ldap
      - aws-iam
  devsecops:
    prose: >-
      Enforce accountability in the software delivery process through GitLab CODEOWNERS
      assignments for all repositories handling financial logic. Every merge to a protected
      branch that affects financial processing must be approved by a designated accountable
      owner. Maintain a registry in the repository (e.g., OWNERS.md or Backstage catalog)
      that maps each service component to its responsible individual and team. Use GitLab
      audit events to track who approved changes, providing an evidence trail for auditors
      to verify that accountability controls operated as designed. Configure pipeline jobs
      to validate that required approvers have appropriate GitLab roles before allowing
      deployment to production.
    tools:
      - gitlab-ci
      - gitlab-codeowners
      - backstage-catalog
      - terraform
  secops:
    prose: >-
      Maintain a competency matrix for all roles with ICFR responsibilities, documenting
      required skills, current skill assessments, training completion, and certification
      status. Conduct annual accountability reviews where individuals with ICFR roles
      formally acknowledge their responsibilities. Implement a process to evaluate control
      performance as part of periodic personnel reviews. Document escalation paths when
      ICFR responsibilities cannot be fulfilled due to personnel absences or departures.
      Retain training records, competency assessments, and accountability acknowledgments
      for audit examination.
    tools:
      - servicenow-hr-module
      - workday
      - archer-grc
      - confluence
related_controls:
  - control_id: soc1-ce-governance
    relationship: supports
    description: "Accountability structures are established within the governance framework."
  - control_id: soc1-ca-segregation
    relationship: supports
    description: "Organizational accountability enables effective segregation of duties."
  - control_id: soc1-mon-deficiency
    relationship: supports
    description: "Accountability mechanisms drive timely deficiency identification and remediation."
