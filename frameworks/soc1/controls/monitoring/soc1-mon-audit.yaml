id: soc1-mon-audit
family: monitoring
title: "Internal and External Audit Activities"
class: SSAE18-ICFR
baselines: [type-i, type-ii]
statement:
  prose: >-
    The service organization conducts internal audit and separate evaluation activities that
    provide independent assurance over the effectiveness of internal controls related to
    financial reporting. The internal audit function, or equivalent, reports to the audit
    committee and has sufficient independence, authority, and resources to conduct ICFR
    evaluations objectively. The scope of internal audit activities includes the ITGC
    domains and application-level controls that support financial reporting. The service
    organization cooperates with external auditors conducting SOC 1 examinations and other
    regulatory audits, providing timely access to personnel, documentation, and systems.
    Internal audit findings and recommendations are reviewed by management and the audit
    committee, and management responses and remediation actions are tracked to completion.
guidance:
  prose: >-
    Internal audit is a critical component of the separate evaluations within the monitoring
    function. Under SSAE 18, management is responsible for monitoring the system of internal
    control, and internal audit provides the independent assessment that gives management
    and the audit committee confidence that the ICFR system is functioning as designed.
    Auditors assess the quality of internal audit work by reviewing audit plans, work papers,
    and reports for technical competence, professional skepticism, and comprehensiveness.
    The SOC 1 external examination (performed by a CPA firm) supplements but does not replace
    internal audit. Service organizations should coordinate with their external SOC 1 auditors
    to maximize reliance on internal audit work, reducing examination costs. The external
    SOC 1 auditor is a licensed CPA or CA firm engaged to express an opinion in accordance
    with SSAE 18 (US) or ISAE 3402 (international).
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement infrastructure audit support capabilities that reduce the burden of providing
      evidence to both internal and external auditors. Deploy an evidence collection automation
      platform that can extract audit evidence from infrastructure components (access logs,
      change records, backup logs, system configurations) on demand and in a format suitable
      for audit examination. Implement read-only auditor access profiles in IAM that provide
      external auditors with scoped visibility into system configurations without operational
      access. Maintain infrastructure configuration snapshots that can be queried to reconstruct
      the state of financial processing systems at any point during the audit examination period.
    tools:
      - aws-audit-manager
      - gcp-audit-logs
      - splunk
      - vault
      - elastic
  devsecops:
    prose: >-
      Support audit activities by maintaining comprehensive, accessible evidence in the
      CI/CD platform. Configure GitLab to retain audit events for the full examination period.
      Implement pipeline artifact retention policies that preserve compliance evidence (security
      scan results, approval records, test results) for the audit examination period.
      Prepare evidence packages that demonstrate the operating effectiveness of ITGC controls
      implemented through the pipeline — including merge request approval records, protected
      branch configuration snapshots, and security scanning results — in a format that
      auditors can readily evaluate. Provide internal and external auditors with read-only
      access to GitLab audit event logs and compliance dashboard.
    tools:
      - gitlab-audit-events
      - gitlab-artifacts
      - gitlab-compliance-framework
      - trivy-reports
  secops:
    prose: >-
      Establish an internal audit function or contracted equivalent with sufficient
      independence and ICFR expertise to evaluate controls across the financial processing
      environment. Develop an annual internal audit plan that covers all ITGC domains
      and key application controls within the SOC 1 scope, aligned with the external
      examination cycle. Maintain internal audit work papers, findings, management responses,
      and remediation evidence. Coordinate with the external SOC 1 auditor during the
      planning phase to maximize reliance on internal audit work under AT-C Section 105.
      Manage the external audit process, including audit readiness assessments, evidence
      collection, and request fulfillment within agreed timelines. Retain all audit documentation
      for the full examination period and at least one prior year.
    tools:
      - teammate-internal-audit
      - auditboard
      - workiva
      - servicenow-audit
      - archer-grc
related_controls:
  - control_id: soc1-ce-governance
    relationship: supports
    description: "Governance structures provide the independence and authority for audit activities."
  - control_id: soc1-mon-continuous
    relationship: complements
    description: "Internal and external audit provide separate evaluations that complement ongoing monitoring."
  - control_id: soc1-mon-deficiency
    relationship: supports
    description: "Audit activities are a primary source of deficiency identification."
