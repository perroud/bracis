id: soc1-mon-continuous
family: monitoring
title: "Continuous Monitoring of ICFR"
class: SSAE18-ICFR
baselines: [type-i, type-ii]
statement:
  prose: >-
    The service organization selects, develops, and performs ongoing evaluations to ascertain
    whether the components of internal control over financial reporting are present and
    functioning. Ongoing monitoring activities are built into the normal course of business
    operations and are performed in real time or near-real time. Monitoring activities include
    automated system alerts, transaction monitoring, management review of control performance
    metrics, supervisory reviews, and reconciliation procedures. The service organization uses
    a combination of technology-based monitoring and human review to provide reasonable
    assurance that ICFR controls are operating effectively on a continuous basis, enabling
    prompt identification and remediation of deviations before they affect user entities'
    financial reporting.
guidance:
  prose: >-
    Continuous monitoring represents the shift from point-in-time ICFR testing to ongoing
    assurance. Under SSAE 18, management must demonstrate that it is not relying solely on
    the annual external examination to identify control problems — it must have its own
    monitoring processes that provide timely feedback on control effectiveness. Auditors
    examine monitoring activities by reviewing reports generated by monitoring systems,
    testing whether automated alerts are being generated as expected, reviewing the disposition
    of monitoring exceptions, and confirming that monitoring results are reviewed by
    appropriate levels of management. A mature continuous monitoring program significantly
    reduces the cost and disruption of the external SOC 1 examination because it demonstrates
    sustained control effectiveness throughout the year, not just at the point of testing.
implementation_guidance:
  platform_engineering:
    prose: >-
      Build a continuous control monitoring (CCM) capability using a combination of real-time
      alerting and periodic automated testing. Implement SIEM rules specifically designed
      to detect ICFR control failures (e.g., failed reconciliations, access policy violations,
      change management bypasses). Deploy a unified observability platform that provides
      dashboards for ICFR control status covering access, change management, processing
      integrity, and availability. Implement automated control testing jobs that run on
      a defined schedule (daily, weekly, monthly) and produce evidence artifacts. Use
      infrastructure monitoring with policy enforcement to detect and alert on configuration
      drift from approved ICFR control baselines.
    tools:
      - splunk
      - elastic-siem
      - grafana
      - prometheus
      - aws-security-hub
  devsecops:
    prose: >-
      Implement monitoring of ICFR-relevant controls in the CI/CD platform as automated
      compliance jobs. Use GitLab's scheduled pipelines to run daily compliance checks
      against the GitLab instance configuration — verifying 2FA enforcement, protected
      branch configurations, secret detection enablement, and approval rule configurations.
      Publish compliance status metrics to a dashboard. Configure GitLab's audit event
      streaming to forward all security-relevant events to the SIEM for correlation and
      alerting. Implement compliance-as-code tests that continuously validate that
      pipeline configurations conform to the required ICFR control standards.
    tools:
      - gitlab-scheduled-pipelines
      - gitlab-audit-events
      - gitlab-compliance-framework
      - prometheus
      - grafana
  secops:
    prose: >-
      Implement a formal continuous monitoring program with documented monitoring activities,
      frequency, responsible owners, and escalation thresholds. Produce monthly ICFR control
      health reports for management review, summarizing monitoring findings, exceptions,
      and remediation status. Implement key control indicators (KCIs) that measure the
      health of critical ICFR controls and trigger management review when thresholds are
      breached. Conduct quarterly ICFR self-assessment using the same testing procedures
      that external auditors will use, enabling proactive deficiency identification and
      remediation. Retain all monitoring reports, exception logs, and management review
      evidence for the full examination period.
    tools:
      - splunk-phantom
      - archer-grc
      - auditboard
      - servicenow-grc
      - tableau
related_controls:
  - control_id: soc1-mon-deficiency
    relationship: supports
    description: "Continuous monitoring is the mechanism that identifies deficiencies requiring remediation."
  - control_id: soc1-ca-itgc-program
    relationship: supports
    description: "ITGC controls are the primary subject of continuous monitoring activities."
  - control_id: soc1-ic-disclosure
    relationship: supports
    description: "Monitoring results feed the deficiency communication process."
