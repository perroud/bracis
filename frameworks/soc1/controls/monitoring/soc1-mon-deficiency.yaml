id: soc1-mon-deficiency
family: monitoring
title: "Deficiency Identification and Remediation"
class: SSAE18-ICFR
baselines: [type-i, type-ii]
statement:
  prose: >-
    The service organization evaluates and communicates identified control deficiencies in
    a timely manner to those responsible for taking corrective action. Control deficiencies
    are classified by severity using defined criteria, assigned to remediation owners, and
    tracked to resolution. The service organization maintains a formal deficiency register
    that documents the nature of each finding, root cause analysis, remediation plan,
    target remediation date, and closure evidence. Remediation activities are reviewed to
    confirm that the corrective action was effective and did not introduce new control
    weaknesses. The service organization evaluates whether deficiencies, individually or
    in the aggregate, rise to the level of significant deficiency or material weakness,
    and reports them accordingly to management, the audit committee, and where relevant,
    to user entities and their auditors.
guidance:
  prose: >-
    Deficiency identification and remediation is the practical output of the monitoring
    component. It represents the feedback loop that drives control improvement. Auditors
    test this area by examining the deficiency register, reviewing whether root cause analysis
    was performed, confirming that remediation actions were implemented within committed
    timeframes, and verifying that remediated controls were re-tested to confirm effectiveness.
    A critical distinction is between remediation of the immediate symptom vs. remediation
    of the root cause — auditors look for evidence of root cause analysis because without
    it, the same deficiency tends to recur. Aggregation of individually minor deficiencies
    into a significant deficiency or material weakness is also tested — service organizations
    must have a process to consider whether multiple related deficiencies, taken together,
    rise to a higher severity level.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated deficiency detection and ticketing integration. When control
      monitoring systems detect an ICFR control failure, automatically create a deficiency
      ticket in the GRC or ITSM platform with pre-populated metadata (control ID, detection
      timestamp, severity estimate, responsible owner). Implement SLA monitoring for deficiency
      tickets that alerts management when tickets are approaching or exceeding their target
      remediation dates. Build a deficiency analytics dashboard that shows deficiency trends
      by control domain, severity, and remediation status, enabling management to identify
      systemic control weaknesses. Implement re-testing automation that validates remediation
      effectiveness by re-running the control test that originally detected the deficiency.
    tools:
      - servicenow-grc
      - jira
      - grafana
      - pagerduty
      - aws-security-hub
  devsecops:
    prose: >-
      Implement deficiency management for pipeline-detected ICFR control issues. Configure
      GitLab to automatically create issues for compliance policy violations detected in
      the pipeline, assigning them to the appropriate control owner. Use GitLab's issue
      boards to track deficiency remediation progress. Implement automated re-testing of
      remediated deficiencies through scheduled pipeline jobs. For security vulnerabilities
      in financial processing code that constitute ICFR control deficiencies, use GitLab's
      vulnerability management features to track from detection through closure. Enforce
      SLA adherence by configuring automated reminders and escalations for overdue deficiency
      tickets through GitLab's to-do system.
    tools:
      - gitlab-issues
      - gitlab-vulnerability-management
      - gitlab-boards
      - gitlab-scheduled-pipelines
  secops:
    prose: >-
      Define a formal deficiency management process with clear severity classification
      criteria, escalation paths, ownership assignment rules, and remediation SLAs by
      severity level. Conduct monthly deficiency review meetings with control owners and
      management, documenting attendance, discussion, and decisions. Implement quarterly
      deficiency aggregation analysis to identify patterns that may elevate individual
      findings to significant deficiency or material weakness. Retain all deficiency
      documentation including initial identification, root cause analysis, remediation plan,
      re-testing evidence, and closure approval for the full examination period.
    tools:
      - archer-grc
      - auditboard
      - servicenow-grc
      - workiva
related_controls:
  - control_id: soc1-mon-continuous
    relationship: implements
    description: "Continuous monitoring is the detection mechanism that feeds the deficiency process."
  - control_id: soc1-ic-disclosure
    relationship: supports
    description: "The deficiency register provides the source data for deficiency communications."
  - control_id: soc1-ce-accountability
    relationship: supports
    description: "Accountability mechanisms ensure deficiency owners take timely remediation action."
