id: soc1-ic-user-controls
family: information-communication
title: "Communication of User Entity Responsibilities"
class: SSAE18-ICFR
baselines: [type-i, type-ii]
statement:
  prose: >-
    The service organization communicates to user entities the nature of its services,
    the boundaries of its responsibilities, and the complementary user entity controls
    (CUECs) that user entities must implement for the system to achieve its control objectives
    related to financial reporting. The service organization's system description clearly
    identifies CUECs and any complementary subservice organization controls (CSOCs). The
    service organization communicates material changes to the system, commitments, and
    control environment through formal channels (updated SOC 1 reports, service notifications,
    contractual amendments) in a timely manner. User entities are informed of their
    responsibility to monitor the ongoing adequacy of the controls implemented by the
    service organization through annual or more frequent SOC 1 Type II reports.
guidance:
  prose: >-
    Communication of user entity responsibilities is essential to the overall ICFR ecosystem.
    User entities must understand what controls the service organization implements on their
    behalf and what controls remain their own responsibility. Auditors examine whether the
    system description clearly identifies CUECs, whether they are realistic and enforceable
    by user entities, and whether the service organization has processes to communicate
    changes that affect CUECs. A key risk is that CUECs are listed in the system description
    but never communicated to user entities in a way they can act on. Service organizations
    should have an active user entity communication program that goes beyond simply issuing
    the annual SOC 1 report. This includes onboarding communications, change notifications,
    and a mechanism for user entities to ask questions about the CUEC environment.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a user entity portal that provides user entities with real-time visibility
      into the service organization's control environment. Publish a machine-readable
      version of CUECs that can be integrated into user entities' own GRC platforms.
      Implement automated notifications to user entities when material changes occur
      that could affect their ICFR reliance on the service organization. Provide user
      entities with access to current and historical SOC 1 reports through a secure
      document portal. Implement API endpoints that user entities' compliance tools can
      query to verify the current status of key controls relevant to their ICFR.
    tools:
      - backstage-portal
      - salesforce-community
      - confluence
      - docusign
  devsecops:
    prose: >-
      Automate user entity communication as part of the release management process.
      For changes that affect ICFR-relevant functionality, automatically generate user
      entity impact notifications as part of the deployment pipeline. Use release notes
      templates that specifically address ICFR implications of changes. Maintain a
      changelog for the financial processing system that flags entries relevant to CUECs.
      Implement automated testing that verifies the system's CUEC-enabling functionality
      (e.g., API endpoints that user entities rely on to implement their own access controls)
      is working correctly after each deployment.
    tools:
      - gitlab-release-notes
      - changelog-management
      - gitlab-ci
      - postman
  secops:
    prose: >-
      Develop and maintain a CUEC communication program that ensures user entities are
      informed of their responsibilities at onboarding and whenever CUECs change. Include
      CUECs in the master service agreement and supplement them with the system description.
      Establish a dedicated communication channel (e.g., compliance officer email, user
      entity portal) for user entities to raise questions about CUECs or request clarification.
      Issue the annual SOC 1 Type II report to all user entities within a defined timeframe
      after the examination period ends. Maintain records of all user entity communications
      related to CUECs and system changes for audit examination.
    tools:
      - salesforce-crm
      - zendesk
      - confluence
      - docusign
related_controls:
  - control_id: soc1-ca-vendor-mgmt
    relationship: supports
    description: "Subservice organization management identifies CSOCs that must be communicated alongside CUECs."
  - control_id: soc1-ic-disclosure
    relationship: supports
    description: "Control deficiency communication channels also serve for CUEC communications."
  - control_id: soc1-ra-change-risk
    relationship: supports
    description: "Change risk assessment identifies which changes require user entity notification."
