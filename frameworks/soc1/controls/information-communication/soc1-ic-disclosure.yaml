id: soc1-ic-disclosure
family: information-communication
title: "Communication of Control Deficiencies"
class: SSAE18-ICFR
baselines: [type-i, type-ii]
statement:
  prose: >-
    The service organization communicates identified internal control deficiencies to parties
    responsible for taking corrective action, including senior management and, where appropriate,
    the board of directors, in a timely manner. Significant deficiencies and material weaknesses
    are reported to the audit committee. The service organization has established processes
    to classify deficiencies by severity (control deficiency, significant deficiency, material
    weakness), assign remediation owners, define remediation timelines, and track progress
    toward remediation. Where deficiencies could affect user entities' financial reporting,
    the service organization communicates relevant information to user entities and their
    auditors in a timely manner. The service organization's SOC 1 report discloses
    any instances of noncompliance with commitments and identified deficiencies.
guidance:
  prose: >-
    The disclosure and communication of control deficiencies is both a governance requirement
    and a legal obligation for service organizations whose clients rely on their SOC 1 report
    for ICFR assurance. Auditors examine whether the service organization has a functional
    process for identifying, classifying, escalating, and tracking deficiencies to remediation.
    They will review deficiency logs, meeting minutes showing audit committee reporting,
    and correspondence with user entities regarding material deficiencies. A serious finding
    would be a service organization that identified a significant ICFR deficiency but failed
    to communicate it to affected user entities in a timely manner, as this could affect
    user entity financial statement filings. Service organizations should have clear criteria
    for deficiency classification and documented escalation paths.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated control monitoring that detects control failures and generates
      alerts in real time. Use policy-as-code to define expected control states and
      automatically raise incidents when deviations are detected. Integrate control monitoring
      with the incident management platform so that ICFR-relevant control failures are
      automatically classified and routed to the appropriate response team. Maintain a
      control health dashboard accessible to senior management that provides real-time
      visibility into the status of key ICFR controls. Implement automated evidence collection
      that captures control failure events with sufficient context for deficiency classification.
    tools:
      - open-policy-agent
      - grafana
      - pagerduty
      - aws-security-hub
      - servicenow-itsm
  devsecops:
    prose: >-
      Use GitLab's security vulnerability management features to track and communicate
      security deficiencies that may affect ICFR. Implement security policy violations
      as pipeline failures that require documented exceptions when bypassed. Configure
      GitLab to generate automated reports of compliance policy adherence that can be
      used as input to the deficiency identification process. Implement a deficiency
      reporting template for use when security findings are escalated from the development
      team to the ICFR control owners. Ensure that all pipeline security policy exceptions
      are logged and reviewed by a designated ICFR control owner.
    tools:
      - gitlab-security-dashboard
      - gitlab-vulnerability-report
      - jira
      - confluence
  secops:
    prose: >-
      Establish and document a deficiency management process with clear criteria for
      classifying findings as control deficiencies, significant deficiencies, or material
      weaknesses based on their potential impact on ICFR. Implement a deficiency register
      in the GRC platform that tracks each finding from identification through remediation
      closure. Require that material deficiencies are reported to the audit committee within
      a defined timeframe (e.g., within 5 business days of classification). Implement a
      user entity notification process for deficiencies that could affect user entities'
      ICFR. Test the deficiency communication process annually. Retain all deficiency
      records, committee reports, and user entity communications for the audit examination period.
    tools:
      - archer-grc
      - servicenow-grc
      - auditboard
      - jira
related_controls:
  - control_id: soc1-ce-governance
    relationship: supports
    description: "Governance structures establish the reporting lines for deficiency escalation."
  - control_id: soc1-mon-deficiency
    relationship: implements
    description: "Deficiency identification and remediation monitoring generates the findings that are disclosed."
  - control_id: soc1-ic-user-controls
    relationship: supports
    description: "User entity communication processes are used to disclose relevant deficiencies."
