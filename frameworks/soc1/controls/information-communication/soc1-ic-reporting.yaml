id: soc1-ic-reporting
family: information-communication
title: "Financial Reporting Information Systems"
class: SSAE18-ICFR
baselines: [type-i, type-ii]
statement:
  prose: >-
    The service organization uses relevant, quality information to support the functioning
    of internal control over financial reporting and to produce accurate, complete, and
    timely information for user entities. The information systems used in financial processing
    capture and communicate information that enables management and employees to carry out
    their internal control responsibilities. Financial reports and data outputs provided to
    user entities are accurate, complete, and delivered within defined timeframes. The
    service organization maintains information quality controls including data validation,
    completeness checks, and reconciliation procedures to ensure that information in reports
    provided to user entities faithfully represents the underlying transactions processed.
guidance:
  prose: >-
    The information and communication component ensures that financial reporting systems
    capture and provide the right information to the right people at the right time.
    Auditors examine whether the service organization's systems produce output that user
    entities can rely on for their own financial reporting. This includes testing whether
    reports sent to user entities are accurate and complete, whether the system correctly
    captures all transactions, and whether data quality controls are in place and operating.
    A common area of examination is the report-to-report reconciliation: can the service
    organization demonstrate that the totals in reports sent to user entities tie back to
    internal system records? Service organizations should be prepared to demonstrate the
    data lineage from transaction capture through processing to output reporting.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a data pipeline architecture for financial reporting that incorporates data
      quality checks at each stage. Use a data catalog to document the lineage of all
      financial report fields, showing the source systems and transformations applied.
      Implement automated reconciliation between operational data stores and reporting
      outputs to detect and alert on discrepancies before reports reach user entities.
      Deploy a data observability platform that continuously monitors financial data
      quality dimensions (completeness, accuracy, freshness, consistency, uniqueness)
      and generates alerts when quality thresholds are breached. Use immutable event
      sourcing for financial transactions to provide a complete audit trail from transaction
      capture to reporting output.
    tools:
      - apache-kafka
      - dbt
      - great-expectations
      - monte-carlo
      - apache-atlas
  devsecops:
    prose: >-
      Implement data quality testing as a first-class concern in the development pipeline
      for financial reporting systems. Use tools like dbt tests or Great Expectations to
      define data quality assertions that are executed as part of the CI/CD pipeline for
      financial reporting jobs. Require that all changes to financial report generation
      logic include updated data quality tests. Implement schema validation to ensure
      output formats conform to user entity specifications. Use GitLab's artifact management
      to preserve financial report generation logs as pipeline artifacts for audit evidence.
      Implement end-to-end integration tests that validate report output against known
      input datasets to detect regressions in reporting logic.
    tools:
      - dbt-tests
      - great-expectations
      - pytest
      - gitlab-artifacts
      - soda-core
  secops:
    prose: >-
      Define data quality standards for all financial reports provided to user entities,
      including accuracy tolerances, completeness requirements, and delivery timeframes.
      Implement a report delivery monitoring process that confirms reports were delivered
      to user entities as scheduled and flags exceptions for investigation. Conduct periodic
      data quality audits that trace financial report outputs back to source transactions.
      Maintain a report catalog that documents each report provided to user entities, its
      purpose, frequency, data sources, and quality controls. Retain financial report
      delivery logs and data quality audit results for the examination period.
    tools:
      - tableau
      - power-bi
      - splunk
      - servicenow
related_controls:
  - control_id: soc1-ca-processing-integrity
    relationship: supports
    description: "Processing integrity controls ensure the data that feeds financial reports is accurate and complete."
  - control_id: soc1-ic-user-controls
    relationship: supports
    description: "Reporting outputs are the primary deliverable communicated to user entities."
  - control_id: soc1-mon-continuous
    relationship: supports
    description: "Continuous monitoring of reporting systems ensures sustained information quality."
