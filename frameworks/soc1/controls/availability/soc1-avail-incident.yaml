id: soc1-avail-incident
family: availability
title: "Incident Management for Financial Processing"
class: SSAE18-ICFR
baselines: [type-i, type-ii]
statement:
  prose: >-
    The service organization identifies, responds to, and recovers from incidents that
    affect or could affect the availability or integrity of financial processing systems
    in a manner that minimizes impact to user entities' ICFR. The incident management
    process includes defined severity classifications, escalation procedures, communication
    protocols with user entities, and post-incident review. Security incidents that could
    compromise the integrity or confidentiality of financial data processed on behalf of
    user entities are identified and communicated to user entities in a timely manner.
    Post-incident reviews are conducted to identify root causes and implement corrective
    actions to prevent recurrence. The service organization maintains records of incidents,
    their impact, response actions, and resolution for audit examination.
guidance:
  prose: >-
    Incident management for financial processing organizations has two distinct dimensions
    that both affect ICFR: operational incidents (system failures, processing errors) that
    affect availability and processing integrity, and security incidents (unauthorized access,
    data breach) that could affect the confidentiality or integrity of financial data.
    Auditors test incident management by reviewing incident logs for the examination period,
    confirming that incidents were detected and responded to within defined timeframes,
    verifying that user entities were notified when required, and reviewing post-incident
    review documentation. A common finding is that incidents were resolved but the root
    cause was not identified or the corrective action was not implemented, leaving the
    service organization vulnerable to recurrence. For security incidents involving user
    entities' financial data, notification obligations may also be contractually and legally
    mandated under user entity agreements and applicable law.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a comprehensive incident detection and response capability for financial
      processing infrastructure. Deploy application performance monitoring (APM) and
      infrastructure monitoring that automatically detect anomalies and trigger alerts.
      Implement automated incident creation in the ITSM platform when monitoring thresholds
      are breached. Deploy a security information and event management (SIEM) system with
      correlation rules designed to detect security incidents affecting financial processing.
      Implement automated runbooks for common incident types (database failover, processing
      queue overflow, authentication failures) to reduce mean time to recovery (MTTR).
      Ensure that incident response playbooks are version-controlled and tested through
      regular tabletop exercises.
    tools:
      - pagerduty
      - datadog
      - splunk
      - aws-cloudwatch
      - opsgenie
  devsecops:
    prose: >-
      Integrate incident management into the CI/CD workflow for financial processing systems.
      Configure deployment pipelines to automatically trigger rollback procedures when
      post-deployment monitoring detects an incident. Implement automated incident notifications
      in the deployment pipeline that alert the on-call team when a deployment causes
      availability degradation. Use GitLab Issues to track incidents from detection through
      post-incident review closure. Implement automated incident reports as pipeline
      artifacts that capture the timeline of events for post-incident review. Ensure that
      all financial processing system repositories have documented runbooks (in the repository
      wiki or linked from the pipeline) for common incident scenarios.
    tools:
      - gitlab-issues
      - pagerduty-gitlab-integration
      - argocd-rollback
      - datadog-gitlab-integration
  secops:
    prose: >-
      Define and document an incident management policy and procedure covering detection,
      classification, escalation, response, communication, recovery, and post-incident
      review for all incident types relevant to financial processing. Implement a formal
      on-call rotation for financial processing system owners with defined response time
      SLAs by incident severity. Establish a user entity notification process for incidents
      that affect processing availability beyond defined thresholds or that involve unauthorized
      access to financial data. Conduct post-incident reviews within 5 business days of
      each significant incident, producing a formal report with root cause and corrective
      actions. Retain all incident records, response documentation, user entity communications,
      and post-incident reviews for the full examination period.
    tools:
      - pagerduty
      - servicenow-itsm
      - splunk-soar
      - jira
      - statuspage
related_controls:
  - control_id: soc1-avail-uptime
    relationship: supports
    description: "Effective incident management is required to maintain availability SLA commitments."
  - control_id: soc1-ic-user-controls
    relationship: supports
    description: "Incident notification requirements are part of user entity communication responsibilities."
  - control_id: soc1-mon-deficiency
    relationship: supports
    description: "Security incidents may constitute ICFR control deficiencies requiring formal tracking."
