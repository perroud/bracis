id: soc1-ra-financial-risk
family: risk-assessment
title: "Financial Reporting Risk Identification"
class: SSAE18-ICFR
baselines: [type-i, type-ii]
statement:
  prose: >-
    The service organization identifies risks to the achievement of its control objectives
    related to financial reporting and analyzes those risks as a basis for determining how
    the risks should be managed. The risk assessment process considers relevant internal
    and external factors, including changes in the regulatory environment, business conditions,
    technology, and the competitive landscape. The organization's risk assessment addresses
    risks at both the entity level and the transaction/process level, including risks that
    arise from its role as a service provider affecting user entities' financial reporting.
    Risk assessment results inform the design and implementation of control activities
    and are reviewed and updated on a periodic basis and when significant changes occur.
guidance:
  prose: >-
    Financial reporting risk assessment for service organizations differs from user entity
    risk assessment in that it must consider risks from the perspective of multiple user
    entities simultaneously. Service organizations must identify what financial statement
    assertions — existence and occurrence, completeness, accuracy, cutoff, and classification
    — could be affected if their controls fail, and design risk mitigation accordingly.
    Auditors examine the risk assessment process itself (not just its outputs), looking for
    evidence that risk identification is systematic, that risk owners are assigned, that
    likelihood and impact are assessed, and that the resulting risk register drives control
    design. The risk assessment should be formally documented and approved by senior management,
    with evidence of periodic refresh at least annually or when significant changes occur.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated risk discovery mechanisms that continuously identify new risks
      to financial processing infrastructure. Use infrastructure scanning tools to detect
      configuration drift, unpatched vulnerabilities, and unexpected changes to systems
      that process financial transactions. Maintain a service dependency map that shows
      how platform components contribute to user entities' financial reporting, enabling
      risk assessment at the transaction flow level. Integrate vulnerability management
      data into the risk register, automatically elevating risk ratings when critical
      vulnerabilities are discovered in financial processing components. Deploy chaos
      engineering practices to proactively identify resilience risks before they materialize.
    tools:
      - backstage
      - qualys
      - tenable
      - aws-security-hub
      - gcp-security-command-center
  devsecops:
    prose: >-
      Integrate security risk assessment into the CI/CD pipeline through automated SAST,
      dependency scanning, and IaC scanning. Require a security risk assessment as part
      of the design review for features that affect financial processing workflows. Track
      security findings as risk items in the project management system, assigning severity
      ratings and owners. Configure GitLab's vulnerability report to provide a continuous
      view of security risk exposure. Implement policy gates that block deployment when
      critical or high-severity risks in financial processing code are not addressed or
      formally accepted.
    tools:
      - gitlab-sast
      - gitlab-dependency-scanning
      - gitlab-iac-scanning
      - checkov
      - snyk
  secops:
    prose: >-
      Maintain a formal risk register that documents all identified risks to ICFR, including
      risk owner, likelihood, impact, inherent risk rating, mitigating controls, and residual
      risk rating. Review and update the risk register at least quarterly and formally as
      part of the annual SOC 1 cycle. Use threat intelligence feeds to identify emerging
      financial-sector threats and assess their relevance to the service organization's
      environment. Conduct structured risk assessment workshops with key stakeholders at
      least annually. Retain risk assessment documentation for audit examination.
    tools:
      - archer-grc
      - servicenow-grc
      - recorded-future
      - tableau
related_controls:
  - control_id: soc1-ra-fraud-risk
    relationship: supports
    description: "Fraud risk assessment is a required component of the overall financial reporting risk assessment."
  - control_id: soc1-ra-change-risk
    relationship: supports
    description: "Change risk assessment feeds into the broader financial reporting risk framework."
  - control_id: soc1-ca-itgc-program
    relationship: supports
    description: "Risk assessment drives the scope and design of the ITGC program."
