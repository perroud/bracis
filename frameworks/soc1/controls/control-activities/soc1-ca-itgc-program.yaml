id: soc1-ca-itgc-program
family: control-activities
title: "IT General Controls Program"
class: SSAE18-ICFR
baselines: [type-i, type-ii]
statement:
  prose: >-
    The service organization maintains a comprehensive IT General Controls (ITGC) program
    that provides the foundation for the reliability of all application controls supporting
    financial reporting. The ITGC program encompasses controls over: logical access to
    financial systems and supporting infrastructure; change management for financial
    applications and supporting technology; computer operations including job scheduling,
    data backups, and incident response; and program development and acquisition processes.
    The ITGC program is formally documented, the scope covers all in-scope systems defined
    in the system description, controls are assigned to owners, and the effectiveness of
    ITGCs is evaluated at least annually through self-assessment and validated through
    the external SOC 1 examination.
guidance:
  prose: >-
    ITGCs are the bedrock of the IT side of SOC 1. Without effective ITGCs, application
    controls cannot be relied upon because the underlying IT environment cannot be trusted.
    Auditors use ITGCs as the foundation for their overall assessment — if key ITGCs
    have deficiencies, the scope of substantive testing expands significantly. The ITGC
    program must be comprehensive, covering all systems identified in the service organization's
    system description, including cloud infrastructure, operating systems, databases,
    middleware, and application layers. Service organizations should maintain a controls
    matrix that maps each ITGC to the risk it addresses, the control owner, the testing
    evidence required, and the testing frequency. Annual ITGC self-assessment before the
    external examination helps identify and remediate deficiencies in advance.
implementation_guidance:
  platform_engineering:
    prose: >-
      Build ITGC compliance into the platform architecture by implementing controls as code.
      Use policy-as-code frameworks to enforce ITGC requirements automatically — for example,
      Open Policy Agent policies that prevent deployment to financial environments without
      required approvals, Sentinel policies in Terraform Cloud that enforce tagging and
      configuration standards, and admission controllers in Kubernetes that enforce security
      configurations. Maintain an asset inventory in Backstage that maps all platform
      components to their ITGC coverage. Implement automated ITGC testing using tools
      that can continuously validate control configurations against the ITGC matrix, alerting
      when drift is detected. Use infrastructure-as-code to ensure ITGC configurations
      are reproducible and version-controlled.
    tools:
      - open-policy-agent
      - hashicorp-sentinel
      - backstage
      - terraform
      - aws-config
  devsecops:
    prose: >-
      Implement ITGC automation in the CI/CD pipeline through security scanning gates,
      mandatory approval workflows, and deployment controls. Use GitLab's compliance
      framework feature to assign the SOC 1 compliance framework to all projects containing
      financial processing code, ensuring that compliance pipeline jobs run automatically.
      Implement compliance-as-code pipelines that continuously test ITGC configurations
      across the GitLab instance — for example, checking that 2FA is enforced, protected
      branches are configured, and secret detection is enabled for all in-scope projects.
      Generate ITGC evidence artifacts from the pipeline automatically to reduce manual
      evidence collection burden at audit time.
    tools:
      - gitlab-compliance-framework
      - gitlab-ci
      - trufflehog
      - checkov
      - terraform-compliance
  secops:
    prose: >-
      Establish and maintain an ITGC program document that defines the scope, control
      objectives, individual controls, owners, testing procedures, and testing frequency
      for all in-scope ITGC domains. Conduct annual ITGC self-assessment using documented
      testing procedures, producing evidence that mirrors what external auditors will request.
      Implement a ITGC deficiency tracking process that captures findings, root causes,
      remediation plans, and closure evidence. Report ITGC self-assessment results to
      senior management and the audit committee. Engage with the external auditors early
      in the examination cycle to agree on the ITGC scope and evidence requirements.
    tools:
      - archer-grc
      - servicenow-grc
      - auditboard
      - workiva
related_controls:
  - control_id: soc1-ca-access-controls
    relationship: supports
    description: "Logical access controls are a primary ITGC domain."
  - control_id: soc1-ca-change-mgmt
    relationship: supports
    description: "Change management is a primary ITGC domain."
  - control_id: soc1-ca-backup-recovery
    relationship: supports
    description: "Backup and recovery is a computer operations ITGC sub-domain."
