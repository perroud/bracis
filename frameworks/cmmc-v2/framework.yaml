baselines:
  - id: level-1
    title: "Level 1 - Foundational"
    description: >-
      17 practices derived from FAR 52.204-21 (Basic Safeguarding of
      Covered Contractor Information Systems). Annual self-assessment
      required. Protects Federal Contract Information (FCI).
    practice_count: 17
    assessment_type: self-assessment
    data_classification: fci
    source: "FAR 52.204-21"
  - id: level-2
    title: "Level 2 - Advanced"
    description: >-
      110 practices aligned with NIST SP 800-171 Revision 2. Requires
      either self-assessment or third-party assessment by a C3PAO
      (Certified Third-Party Assessment Organization) depending on
      the sensitivity of CUI handled. Protects Controlled Unclassified
      Information (CUI).
    practice_count: 110
    assessment_type: third-party-or-self
    data_classification: cui
    source: "NIST SP 800-171 Rev 2"
    inherits_from: [level-1]
  - id: level-3
    title: "Level 3 - Expert"
    description: >-
      134 practices based on a subset of NIST SP 800-172 requirements.
      Requires government-led assessment by DIBCAC (Defense Industrial
      Base Cybersecurity Assessment Center). Protects CUI against
      Advanced Persistent Threats (APTs).
    practice_count: 134
    assessment_type: government-led
    data_classification: cui-apt
    source: "NIST SP 800-172"
    inherits_from: [level-2]

