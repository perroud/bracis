id: 07-01
family: cat-7
title: "Responsibility for Assets"
class: HITRUST-CSF
baselines: [e1, i1, r2]
statement:
  prose: >-
    The organization shall identify organizational assets and define appropriate protection
    responsibilities. All assets associated with information and information processing
    facilities shall be identified and an inventory of these assets shall be drawn up and
    maintained. Assets maintained in the inventory shall be owned by a designated part of
    the organization. Rules for the acceptable use of information and assets associated
    with information and information processing facilities shall be identified, documented,
    and implemented. All employees and external party users shall return all of the
    organizational assets in their possession upon termination of their employment,
    contract, or agreement. Information shall be classified in terms of legal requirements,
    value, criticality, and sensitivity to unauthorized disclosure or modification.
guidance:
  prose: >-
    Asset management is foundational to information security because you cannot protect
    what you do not know about. The organization must maintain a comprehensive inventory
    of all information assets including data, software, hardware, services, and personnel.
    Each asset must have a designated owner responsible for its protection throughout its
    lifecycle. At the e1 level, a basic asset inventory with ownership assignments is
    required. At i1, a comprehensive inventory with classification, acceptable use policies,
    and lifecycle management is expected. At r2, automated asset discovery, continuous
    inventory reconciliation, and risk-based asset management integrated with the overall
    risk management program is required. The asset inventory must include cloud resources,
    SaaS applications, APIs, and data flows in addition to traditional IT assets.
references:
  - citation: "NIST SP 800-53 Rev 5: CM-8, CM-9"
    url: "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
  - citation: "ISO/IEC 27001:2022 A.5.9, A.5.10, A.5.11, A.5.12, A.5.13"
    url: "https://www.iso.org/standard/27001"
  - citation: "HIPAA Security Rule 45 CFR 164.310(d)(1)"
    url: "https://www.hhs.gov/hipaa/for-professionals/security/index.html"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated asset discovery and inventory using cloud asset management APIs,
      Kubernetes resource tracking, and service mesh telemetry. Maintain a real-time service
      catalog (Backstage) with ownership, classification, and dependency mapping for all
      platform components. Use infrastructure-as-code to declaratively manage all assets
      ensuring that the IaC repository serves as the authoritative inventory. Implement
      resource tagging policies enforced by admission controllers. Track SBOM for all
      container images and deployed artifacts.
    tools:
      - "Backstage (service catalog)"
      - "Cloud Asset Inventory (AWS Config, GCP Asset Inventory, Azure Resource Graph)"
      - "Kubernetes resource tracking"
      - "Terraform state (asset inventory)"
      - "SBOM tools (Syft, cdxgen)"
      - "Dependency-Track"
  devsecops:
    prose: >-
      Maintain asset inventory through GitLab project catalogs, container registries,
      and package registries. Implement automated SBOM generation in CI/CD pipelines
      for all build artifacts. Track software dependencies and licenses through
      dependency scanning. Use CODEOWNERS to enforce asset ownership. Implement
      automated drift detection that identifies assets not tracked in the inventory.
    tools:
      - "GitLab Container Registry"
      - "GitLab Package Registry"
      - "SBOM generation (Syft, Trivy)"
      - "Dependency Scanning"
      - "CODEOWNERS"
      - "GitLab Project Management"
  secops:
    prose: >-
      Maintain a centralized Configuration Management Database (CMDB) with automated
      feeds from discovery tools. Conduct periodic asset inventory reconciliation
      comparing discovered assets against the authorized inventory. Track asset
      lifecycle events including acquisition, deployment, modification, and
      decommissioning. Implement alerts for unauthorized assets detected on the
      network. Generate asset management reports showing inventory completeness,
      ownership coverage, and classification status.
    tools:
      - "CMDB (ServiceNow, Device42)"
      - "Asset Discovery (Qualys, Rapid7, Axonius)"
      - "Cloud Security Posture Management (Wiz, Orca, Prisma Cloud)"
      - "Network Discovery (Nmap, Rumble)"
      - "GRC Platforms"
