id: 11-02
family: cat-11
title: "Management of Security Incidents"
class: HITRUST-CSF
baselines: [e1, i1, r2]
statement:
  prose: >-
    The organization shall establish and maintain an incident management program that includes
    responsibilities and procedures for ensuring a quick, effective, and orderly response to
    information security incidents. Incident management procedures shall address the collection
    of evidence, forensic analysis, incident containment, eradication, recovery, and post-incident
    review. The organization shall define and apply procedures for the identification, collection,
    acquisition, and preservation of information that can serve as evidence. Lessons learned from
    security incidents shall be used to improve the incident management process and security
    controls. The organization shall implement mechanisms to enable the types, volumes, and
    costs of information security incidents to be quantified and monitored.
guidance:
  prose: >-
    Security incident management requires a structured approach to detecting, responding to,
    and recovering from security incidents while preserving evidence and learning from each
    event. The incident management program must define clear roles, responsibilities, and
    escalation procedures. At the e1 level, a documented incident response plan with basic
    procedures is required. At i1, a tested incident response capability with defined
    playbooks, evidence handling procedures, and post-incident reviews is expected. At r2,
    a mature incident response program with automated detection and response, forensic
    capabilities, quantitative incident tracking, integration with threat intelligence,
    and continuous improvement based on lessons learned is required. Healthcare organizations
    must integrate incident management with HIPAA breach assessment and notification
    requirements, maintaining documented breach risk assessments for all incidents
    involving potential PHI exposure.
references:
  - citation: "NIST SP 800-53 Rev 5: IR-1, IR-4, IR-5, IR-8"
    url: "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
  - citation: "NIST SP 800-61 Rev 2"
    url: "https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final"
  - citation: "ISO/IEC 27001:2022 A.5.24, A.5.25, A.5.26, A.5.27, A.5.28"
    url: "https://www.iso.org/standard/27001"
  - citation: "HIPAA Breach Notification Rule 45 CFR 164.400-414"
    url: "https://www.hhs.gov/hipaa/for-professionals/breach-notification/index.html"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated incident detection and response capabilities in the platform.
      Deploy runtime security monitoring (Falco, Tetragon) with automated containment
      actions such as network isolation and workload quarantine. Implement forensic
      logging capabilities that preserve evidence with immutable storage. Create incident
      response runbooks as automated playbooks using infrastructure-as-code. Implement
      automated rollback capabilities for rapid recovery. Deploy chaos engineering
      tools to test incident response readiness.
    tools:
      - "Falco / Cilium Tetragon (detection)"
      - "Kubernetes Network Policies (containment)"
      - "Immutable Log Storage (S3 Object Lock)"
      - "ArgoCD (automated rollback)"
      - "Litmus / Gremlin (chaos engineering)"
      - "PagerDuty / Opsgenie (incident management)"
  devsecops:
    prose: >-
      Maintain incident response playbooks in version-controlled repositories. Implement
      automated incident ticket creation from security tool findings. Use CI/CD pipelines
      for rapid patching and deployment during incident response. Track incident-related
      code changes through dedicated branches with expedited review procedures. Implement
      post-incident review templates and track remediation actions as issues.
    tools:
      - "GitLab Issue Tracking (incident management)"
      - "GitLab CI/CD (rapid patching)"
      - "Incident Playbooks (Git-versioned)"
      - "Blameless / FireHydrant (incident management)"
      - "Post-incident review templates"
  secops:
    prose: >-
      Establish a formal incident response team (CSIRT) with defined roles and on-call
      rotation. Deploy SOAR platforms for automated incident response orchestration.
      Implement forensic workstations and procedures for evidence collection and analysis.
      Conduct periodic incident response exercises (tabletop and technical). Track incident
      metrics including MTTD, MTTR, incident costs, and recurrence rates. Maintain relationships
      with external incident response resources (forensic firms, legal counsel, law enforcement).
      For healthcare organizations, implement HIPAA breach risk assessment workflows.
    tools:
      - "SOAR (Cortex XSOAR, Splunk SOAR, Swimlane)"
      - "SIEM (Splunk, Elastic Security)"
      - "Forensic Tools (Velociraptor, KAPE, Volatility)"
      - "Incident Management (PagerDuty, ServiceNow)"
      - "Threat Intelligence (MITRE ATT&CK, Recorded Future)"
      - "Tabletop Exercise Platforms"
