id: 11-01
family: cat-11
title: "Reporting Security Events"
class: HITRUST-CSF
baselines: [e1, i1, r2]
statement:
  prose: >-
    The organization shall establish procedures to ensure that information security events
    are reported through appropriate management channels as quickly as possible. All employees,
    contractors, and third-party users shall be made aware of their responsibility to report
    any information security events and weaknesses as quickly as possible to the designated
    point of contact. A formal event reporting procedure shall be established, together with
    an incident response and escalation procedure, setting out the action to be taken on
    receipt of a report of an information security event. The organization shall establish
    a mechanism for personnel to report observed or suspected security events including
    compromised systems, unauthorized access, data breaches, and policy violations.
guidance:
  prose: >-
    Timely reporting of security events is critical for effective incident response and
    for limiting the impact of security incidents. The organization must establish clear
    reporting channels, train all personnel on their reporting responsibilities, and
    implement mechanisms that make reporting easy and accessible. At the e1 level, a
    documented reporting procedure with a designated point of contact is required. At i1,
    a formal event reporting system with automated collection and tracking is expected.
    At r2, integrated event reporting with automated triage, correlation with threat
    intelligence, escalation workflows, and metrics tracking for reporting timeliness
    is required. For healthcare organizations, security event reporting must integrate
    with HIPAA breach notification requirements and HHS reporting obligations. Events
    involving potential PHI exposure must be flagged immediately for breach assessment.
references:
  - citation: "NIST SP 800-53 Rev 5: IR-6, IR-7"
    url: "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
  - citation: "ISO/IEC 27001:2022 A.6.8"
    url: "https://www.iso.org/standard/27001"
  - citation: "HIPAA Breach Notification Rule 45 CFR 164.400-414"
    url: "https://www.hhs.gov/hipaa/for-professionals/breach-notification/index.html"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated security event detection and reporting through platform observability
      tools. Deploy Falco or similar runtime security tools that automatically detect and report
      anomalous behavior in containers and hosts. Implement PagerDuty/Opsgenie integration for
      automated escalation of critical security events. Create self-service security event
      reporting through Backstage or internal portals. Implement automated alerting for
      infrastructure security events through Prometheus alerting rules.
    tools:
      - "Falco (runtime detection)"
      - "PagerDuty / Opsgenie (escalation)"
      - "Prometheus Alertmanager"
      - "Backstage (reporting portal)"
      - "Cloud Security Events (CloudTrail, GCP SCC)"
  devsecops:
    prose: >-
      Implement automated security event reporting from CI/CD pipeline security scans.
      Configure GitLab security dashboards to surface findings to security teams. Automate
      creation of security issues from scan results with appropriate severity labels and
      assignees. Implement chatbot integrations (Slack/Teams) for quick security event
      reporting. Track security events as issues with SLA tracking for response times.
    tools:
      - "GitLab Security Dashboard"
      - "GitLab Issue Tracking"
      - "Slack/Teams integrations (security reporting bots)"
      - "CI/CD security scan reporting"
      - "Jira / ServiceNow (incident tickets)"
  secops:
    prose: >-
      Establish a Security Operations Center (SOC) or equivalent function as the central
      point for security event reporting and triage. Implement a ticketing system for
      tracking security events from report through resolution. Deploy SIEM correlation
      rules that automatically detect and escalate security events. Train all personnel
      on security event reporting procedures through regular awareness campaigns. Track
      reporting metrics including time-to-report, event volumes, and escalation rates.
      Implement integration with HIPAA breach assessment workflow.
    tools:
      - "SIEM (Splunk, Elastic Security, Microsoft Sentinel)"
      - "SOAR (Cortex XSOAR, Splunk SOAR)"
      - "Incident Ticketing (ServiceNow, PagerDuty)"
      - "Security Awareness Platform (KnowBe4, Proofpoint)"
      - "HHS Breach Portal (HIPAA reporting)"
