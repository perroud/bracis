id: 10-01
family: cat-10
title: "Security Requirements of Information Systems"
class: HITRUST-CSF
baselines: [i1, r2]
statement:
  prose: >-
    The organization shall ensure that information security is an integral part of information
    systems across the entire lifecycle. This includes security requirements for information
    systems that provide services over public networks. Information involved in application
    services passing over public networks shall be protected from fraudulent activity, contract
    dispute, and unauthorized disclosure and modification. Information involved in electronic
    commerce and online transactions shall be protected to prevent incomplete transmission,
    misrouting, unauthorized message alteration, unauthorized disclosure, unauthorized message
    duplication or replay. The integrity of information being made available on a publicly
    available system shall be protected to prevent unauthorized modification.
guidance:
  prose: >-
    Security requirements must be identified and addressed in the earliest stages of system
    development or acquisition. This control requires that security is built into the system
    design rather than added as an afterthought. Organizations must conduct security
    requirements analysis as part of the business requirements gathering process. At i1,
    documented security requirements for new systems and major changes are required.
    At r2, comprehensive security requirements engineering including threat modeling,
    security architecture review, and validation testing across the development lifecycle
    is expected. Public-facing systems require additional controls for data protection
    in transit, input validation, session management, and protection against common web
    application vulnerabilities.
references:
  - citation: "NIST SP 800-53 Rev 5: SA-3, SA-4, SA-8, SC-12, SC-13"
    url: "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
  - citation: "ISO/IEC 27001:2022 A.8.25, A.8.26"
    url: "https://www.iso.org/standard/27001"
  - citation: "HIPAA Security Rule 45 CFR 164.312(a)(2)(iv), 164.312(e)(1)"
    url: "https://www.hhs.gov/hipaa/for-professionals/security/index.html"
implementation_guidance:
  platform_engineering:
    prose: >-
      Embed security requirements into platform service templates and golden paths.
      Implement secure-by-default configurations for all platform services including
      TLS termination, authentication, authorization, and input validation. Provide
      secure service templates through Backstage that embed security requirements into
      the development process. Enforce HTTPS-only for all public-facing services.
      Implement automated certificate management with cert-manager. Deploy WAFs for
      public-facing applications.
    tools:
      - "Backstage (secure service templates)"
      - "cert-manager (TLS automation)"
      - "Cloud WAF (AWS WAF, Cloudflare)"
      - "API Gateway (Kong, Envoy)"
      - "Kubernetes Ingress with TLS"
      - "OPA / Kyverno (security requirement enforcement)"
  devsecops:
    prose: >-
      Integrate security testing throughout the CI/CD pipeline including SAST, DAST,
      SCA, and container scanning. Require security requirements documentation as part
      of feature development through merge request templates with security checklists.
      Implement threat modeling as part of the design review process for new features.
      Enforce secure coding standards through automated linting and SAST rules. Validate
      TLS configurations and security headers in deployment pipelines.
    tools:
      - "GitLab SAST / DAST / Dependency Scanning / Container Scanning"
      - "OWASP ZAP"
      - "Trivy"
      - "Semgrep (custom security rules)"
      - "Security merge request templates"
      - "OWASP Threat Dragon / IriusRisk"
  secops:
    prose: >-
      Conduct security assessments for new systems and significant changes before
      deployment. Perform periodic penetration testing of public-facing systems. Monitor
      for newly disclosed vulnerabilities affecting deployed systems. Track security
      requirements compliance through vulnerability management and assessment programs.
      Maintain a registry of approved cryptographic standards and validate compliance.
    tools:
      - "Vulnerability Management (Qualys, Rapid7, Tenable)"
      - "Penetration Testing (Burp Suite, Metasploit)"
      - "SSL/TLS Analysis (SSL Labs, testssl.sh)"
      - "GRC Platforms"
      - "Bug Bounty Platforms (HackerOne, Bugcrowd)"
