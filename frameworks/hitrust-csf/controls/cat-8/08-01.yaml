id: 08-01
family: cat-8
title: "Secure Areas"
class: HITRUST-CSF
baselines: [i1, r2]
statement:
  prose: >-
    The organization shall use security perimeters to protect areas that contain either
    sensitive or critical information and information processing facilities. Secure areas
    shall be protected by appropriate entry controls to ensure that only authorized personnel
    are allowed access. Physical security for offices, rooms, and facilities shall be designed
    and applied. Physical protection against natural disasters, malicious attack, or accidents
    shall be designed and applied. Procedures for working in secure areas shall be designed
    and applied. Access points such as delivery and loading areas and other points where
    unauthorized persons could enter the premises shall be controlled and isolated from
    information processing facilities.
guidance:
  prose: >-
    Physical security controls protect information processing facilities, equipment, and
    media from unauthorized physical access, damage, and interference. While cloud computing
    has shifted some physical security responsibilities to service providers, organizations
    must still address physical security for their own facilities, endpoints, and any
    on-premises infrastructure. At i1, documented physical security controls with access
    logs for secure areas are required. At r2, comprehensive physical security with
    environmental monitoring, visitor management, delivery area controls, and integration
    with logical access controls is expected. For cloud environments, organizations must
    validate that their cloud service providers maintain appropriate physical security
    through SOC reports, certifications, and contractual agreements.
references:
  - citation: "NIST SP 800-53 Rev 5: PE-1 through PE-6"
    url: "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
  - citation: "ISO/IEC 27001:2022 A.7.1, A.7.2, A.7.3, A.7.4, A.7.5, A.7.6"
    url: "https://www.iso.org/standard/27001"
  - citation: "HIPAA Security Rule 45 CFR 164.310(a)"
    url: "https://www.hhs.gov/hipaa/for-professionals/security/index.html"
implementation_guidance:
  platform_engineering:
    prose: >-
      For cloud-native environments, validate cloud provider physical security certifications
      (SOC 2 Type II, ISO 27001, HITRUST) and incorporate validation into vendor risk
      assessments. Implement data center selection policies in infrastructure-as-code that
      restrict deployments to certified regions and availability zones. For on-premises
      infrastructure (edge computing, on-prem Kubernetes clusters), integrate physical
      access control systems with the identity provider for unified access management.
      Implement environmental monitoring for on-premises server rooms.
    tools:
      - "Cloud Provider Compliance Reports (AWS Artifact, GCP Compliance, Azure Trust Center)"
      - "Terraform (region/zone restrictions)"
      - "Physical Access Control Systems (Lenel, Genetec)"
      - "Environmental Monitoring (Sensaphone, AKCP)"
  devsecops:
    prose: >-
      Enforce cloud region restrictions in CI/CD pipelines using policy-as-code to prevent
      deployments to non-compliant regions. Validate cloud provider certifications as part
      of vendor onboarding workflows. Maintain physical security requirements and cloud
      provider compliance evidence in version-controlled documentation. Implement
      infrastructure-as-code checks that verify data residency and physical location
      requirements.
    tools:
      - "Checkov / tfsec (region policies)"
      - "Conftest"
      - "GitLab CI/CD"
      - "Cloud provider compliance APIs"
  secops:
    prose: >-
      Monitor physical access logs and integrate with SIEM for correlation with logical
      access events. Review visitor logs and physical access records periodically. Conduct
      physical security assessments of facilities at planned intervals. Verify cloud
      provider physical security certifications annually. Track and respond to physical
      security incidents including tailgating, unauthorized access attempts, and
      environmental alerts.
    tools:
      - "Physical Access Control Systems (Lenel, Genetec, Brivo)"
      - "Video Surveillance (Verkada, Milestone)"
      - "SIEM integration (physical/logical correlation)"
      - "Visitor Management Systems"
      - "Environmental Monitoring"
