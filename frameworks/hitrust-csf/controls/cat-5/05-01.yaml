id: 05-01
family: cat-5
title: "Internal Organization"
class: HITRUST-CSF
baselines: [i1, r2]
statement:
  prose: >-
    The organization shall establish a management framework to initiate and control the
    implementation and operation of information security within the organization. Information
    security responsibilities shall be defined and allocated. Duties and areas of responsibility
    shall be segregated to reduce opportunities for unauthorized or unintentional modification
    or misuse of organizational assets. The organization shall maintain appropriate contacts
    with relevant authorities and special interest groups. Information security shall be
    addressed in project management regardless of the type of project. Confidentiality or
    non-disclosure agreements reflecting the organization's needs for the protection of
    information shall be identified, regularly reviewed, and documented.
guidance:
  prose: >-
    Internal organization for information security requires clear governance structures,
    defined roles and responsibilities, and segregation of duties to prevent conflicts of
    interest. The organization must assign information security responsibilities at all
    relevant levels, from executive oversight to operational implementation. A dedicated
    information security function (CISO or equivalent) must be established with appropriate
    authority and resources. At i1, documented roles and responsibilities with evidence
    of segregation of duties is required. At r2, a mature governance structure with
    cross-functional security committees, defined escalation paths, third-party security
    coordination, and measurable accountability is expected. Contacts with law enforcement,
    regulatory bodies, ISACs, and other relevant external parties must be maintained.
references:
  - citation: "NIST SP 800-53 Rev 5: PM-2, AC-5"
    url: "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
  - citation: "ISO/IEC 27001:2022 A.5.2, A.5.3, A.5.4, A.5.5, A.5.6"
    url: "https://www.iso.org/standard/27001"
  - citation: "HIPAA Security Rule 45 CFR 164.308(a)(2)"
    url: "https://www.hhs.gov/hipaa/for-professionals/security/index.html"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement segregation of duties in platform RBAC models by defining distinct roles for
      development, operations, and security with non-overlapping critical permissions. Use
      Kubernetes namespaces with role bindings that enforce team boundaries. Implement
      multi-party approval requirements for privileged operations such as production deployments
      and infrastructure changes. Define platform team ownership in service catalogs (Backstage)
      with clear security responsibilities per service. Implement break-glass procedures
      that require multi-person authorization.
    tools:
      - "Kubernetes RBAC / Namespaces"
      - "Backstage (team ownership, service catalog)"
      - "Terraform (role definitions)"
      - "OPA (segregation of duties policies)"
      - "PagerDuty / Opsgenie (escalation paths)"
  devsecops:
    prose: >-
      Enforce segregation of duties through GitLab project permissions, protected branches,
      and merge request approval rules that prevent self-approval. Implement CODEOWNERS files
      requiring security team review for security-sensitive changes. Define clear ownership
      for security scanning results and vulnerability remediation through GitLab issue
      assignment. Track security responsibilities in project documentation maintained
      alongside code.
    tools:
      - "GitLab Protected Branches / Approval Rules"
      - "CODEOWNERS"
      - "GitLab Project/Group Permissions"
      - "GitLab Security Dashboard"
      - "Jira / GitLab Issues (responsibility tracking)"
  secops:
    prose: >-
      Maintain an organizational chart showing information security roles and responsibilities.
      Implement access matrices demonstrating segregation of duties across critical functions.
      Track security committee meetings, decisions, and action items. Maintain contact lists
      for external authorities, ISACs (H-ISAC for healthcare), and law enforcement. Conduct
      periodic reviews of organizational security structure to verify adequate staffing,
      budget allocation, and authority for the security function.
    tools:
      - "GRC Platforms (ServiceNow, Archer)"
      - "ISMS tools"
      - "H-ISAC / FS-ISAC membership"
      - "Collaboration tools (Teams, Slack — security channels)"
      - "Document Management (SharePoint, Confluence)"
