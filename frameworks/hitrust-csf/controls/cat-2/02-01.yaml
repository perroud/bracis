id: 02-01
family: cat-2
title: "Prior to Employment"
class: HITRUST-CSF
baselines: [i1, r2]
statement:
  prose: >-
    The organization shall ensure that employees, contractors, and third-party users understand
    their responsibilities regarding information security prior to being granted access to
    information or information systems. Background verification checks on all candidates for
    employment shall be carried out in accordance with relevant laws, regulations, and ethics
    and proportional to the business requirements, the classification of the information to be
    accessed, and the perceived risks. The terms and conditions of employment shall clearly state
    the employee's and the organization's responsibilities for information security.
    Confidentiality or non-disclosure agreements reflecting the organization's needs for
    the protection of information shall be identified, reviewed, and documented.
guidance:
  prose: >-
    Pre-employment security controls establish the foundation for personnel security by ensuring
    that individuals who will have access to sensitive information and systems are trustworthy
    and understand their security obligations. Background checks should be proportionate to the
    sensitivity of the role and may include criminal history, employment verification, education
    verification, credit checks (where legally permitted), and reference checks. Employment
    agreements must include clauses addressing information security responsibilities,
    intellectual property protection, acceptable use policies, and consequences of policy
    violations. At i1, organizations must demonstrate documented procedures for background
    checks and security-aware onboarding. At r2, risk-based screening procedures scaled to
    role sensitivity with comprehensive contractual security obligations are required.
references:
  - citation: "NIST SP 800-53 Rev 5: PS-2, PS-3, PS-6"
    url: "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
  - citation: "ISO/IEC 27001:2022 A.6.1, A.6.2, A.6.6"
    url: "https://www.iso.org/standard/27001"
  - citation: "HIPAA Security Rule 45 CFR 164.308(a)(3)(ii)(B)"
    url: "https://www.hhs.gov/hipaa/for-professionals/security/index.html"
implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate HR onboarding workflows with identity provisioning systems to ensure that
      access is only granted after all pre-employment checks are completed. Implement
      automated onboarding checklists in the developer portal (Backstage) that gate
      platform access on completion of background checks, security training, and policy
      acknowledgment. Use attribute-based access control where employment verification
      status is a required attribute for access provisioning. Define onboarding automation
      in infrastructure-as-code that ties account creation to HR system events.
    tools:
      - "Okta Workflows / Azure AD Lifecycle Workflows"
      - "Backstage (onboarding templates)"
      - "SCIM provisioning"
      - "HR System Integration (Workday, BambooHR)"
      - "ServiceNow HR Service Delivery"
  devsecops:
    prose: >-
      Maintain security onboarding checklists and employment agreement templates in
      version-controlled repositories. Implement automated workflows that require
      security training completion and policy acknowledgment before granting access
      to code repositories and CI/CD systems. Track onboarding status through
      ticketing systems integrated with GitLab. Enforce that new contributors cannot
      merge code until all pre-access requirements are satisfied.
    tools:
      - "GitLab Group Membership Management"
      - "Jira / ServiceNow (onboarding workflows)"
      - "LMS (security training tracking)"
      - "DocuSign / PandaDoc (agreement signing)"
  secops:
    prose: >-
      Establish a pre-employment screening program with defined criteria for different
      role risk levels. Track background check status and results in a secure system
      with appropriate access controls. Monitor for changes in personnel risk profiles
      through periodic re-screening for high-risk roles. Generate compliance reports
      demonstrating that all active employees have completed required pre-employment
      checks and signed appropriate agreements. Maintain audit trails for all
      screening activities and results.
    tools:
      - "Background Check Services (Sterling, HireRight)"
      - "GRC Platforms (ServiceNow, OneTrust)"
      - "HR Management Systems (Workday, BambooHR)"
      - "Document Management (SharePoint, Confluence)"
