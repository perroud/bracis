id: 01-02
family: cat-1
title: "User Access Management"
class: HITRUST-CSF
baselines: [e1, i1, r2]
statement:
  prose: >-
    The organization shall implement formal user registration and deregistration procedures for
    granting and revoking access to all information systems and services. A formal user access
    provisioning process shall be implemented to assign or revoke access rights for all user types
    to all systems and services. The allocation and use of privileged access rights shall be
    restricted and controlled. The allocation of authentication information shall be controlled
    through a formal management process. Asset owners shall review users' access rights at regular
    intervals. Access rights of all employees and external party users to information and information
    processing facilities shall be removed upon termination or adjusted upon change of employment.
guidance:
  prose: >-
    User access management ensures that only authorized individuals have access to organizational
    information systems and that access levels are appropriate to their roles and responsibilities.
    This control requires a complete access lifecycle management capability from initial provisioning
    through periodic review to eventual deprovisioning. At the e1 level, basic registration and
    deregistration procedures must exist. At i1, automated provisioning and periodic access reviews
    are expected. At r2, risk-based access management with continuous monitoring, automated lifecycle
    management, and integration with HR processes is required. Organizations must maintain audit
    trails for all access management activities and demonstrate that privileged access is strictly
    controlled with enhanced monitoring.
references:
  - citation: "NIST SP 800-53 Rev 5: AC-2"
    url: "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
  - citation: "ISO/IEC 27001:2022 A.5.16, A.5.17, A.5.18"
    url: "https://www.iso.org/standard/27001"
  - citation: "HIPAA Security Rule 45 CFR 164.308(a)(3)"
    url: "https://www.hhs.gov/hipaa/for-professionals/security/index.html"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement centralized identity lifecycle management through an IdP (Okta, Azure AD, Keycloak)
      integrated with SCIM for automated provisioning and deprovisioning. Define role templates in
      infrastructure-as-code that map job functions to specific entitlements across all platform
      services. Implement automated onboarding/offboarding workflows that create or disable accounts
      across all connected systems within defined SLAs. Use Kubernetes RBAC with namespace-level
      isolation and ServiceAccounts with minimal privileges. Implement break-glass procedures for
      emergency access with mandatory post-use review.
    tools:
      - "Okta / Azure AD / Keycloak (SCIM)"
      - "Kubernetes RBAC / Namespaces"
      - "Terraform IAM modules"
      - "HashiCorp Vault (dynamic credentials)"
      - "Teleport / StrongDM"
      - "Backstage (service catalog with ownership)"
  devsecops:
    prose: >-
      Enforce user access management through GitLab group and project membership controls with
      SAML/SCIM integration. Require merge request approvals for any changes to access configurations
      in IaC repositories. Implement automated access review pipelines that compare active accounts
      against HR system records and flag discrepancies. Track all access changes through Git commit
      history for full auditability. Automate service account rotation using CI/CD pipelines.
    tools:
      - "GitLab Group/Project Access Management"
      - "GitLab SAML SSO / SCIM"
      - "Terraform"
      - "CI/CD access review pipelines"
      - "HashiCorp Vault"
      - "Trivy (service account scanning)"
  secops:
    prose: >-
      Monitor user access activities through SIEM correlation rules detecting anomalous provisioning
      patterns, privilege escalation, and unauthorized access attempts. Conduct quarterly user access
      reviews using identity governance platforms that provide automated certification campaigns.
      Implement automated alerts for orphaned accounts, dormant accounts exceeding inactivity
      thresholds, and accounts with excessive privileges. Track access management SLAs for
      provisioning and deprovisioning operations.
    tools:
      - "Identity Governance (SailPoint, Saviynt)"
      - "SIEM (Splunk, Elastic Security)"
      - "PAM Solutions (CyberArk, BeyondTrust)"
      - "SOAR (Cortex XSOAR, Splunk SOAR)"
      - "GRC Platforms (ServiceNow, OneTrust)"
