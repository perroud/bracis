id: 01-01
family: cat-1
title: "Access Control Policy"
class: HITRUST-CSF
baselines: [e1, i1, r2]
statement:
  prose: >-
    The organization shall establish, document, and maintain an access control policy based on business
    and information security requirements. The policy shall clearly state the rules and rights for each
    user or group of users and be reviewed at planned intervals. Access control rules shall consider
    the principle of least privilege, separation of duties, and need-to-know. The policy shall address
    both logical and physical access controls and cover all stages of the access lifecycle including
    provisioning, review, modification, and deprovisioning. Access control policies shall be
    communicated to all relevant personnel and enforced through technical and administrative controls.
guidance:
  prose: >-
    Access control policies form the authoritative basis for granting, modifying, and revoking access
    to organizational information systems and data. The policy must define the organization's approach
    to access management including role-based access control (RBAC), attribute-based access control
    (ABAC), or a combination thereof. At the e1 level, a documented access control policy with basic
    enforcement is required. At i1, evidence of consistent policy enforcement and periodic review is
    expected. At r2, the policy must be risk-based, regularly tested, and integrated with the
    organization's broader risk management framework. The policy should cover remote access, wireless
    access, mobile device access, and access by third parties and business associates. It must align
    with applicable regulations including HIPAA, PCI DSS, and state privacy laws.
references:
  - citation: "NIST SP 800-53 Rev 5: AC-1"
    url: "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
  - citation: "ISO/IEC 27001:2022 A.5.15"
    url: "https://www.iso.org/standard/27001"
  - citation: "HIPAA Security Rule 45 CFR 164.312(a)(1)"
    url: "https://www.hhs.gov/hipaa/for-professionals/security/index.html"
implementation_guidance:
  platform_engineering:
    prose: >-
      Define access control policies as declarative policy-as-code using OPA Rego, Kyverno policies,
      or Cedar. Implement RBAC/ABAC models in the identity provider and enforce them uniformly across
      all platform services including Kubernetes clusters, cloud accounts, databases, and SaaS tools.
      Use Terraform or Pulumi modules to provision IAM roles and policies consistently. Enforce
      least-privilege through automated policy validation in admission controllers. Implement
      just-in-time (JIT) access for elevated privileges with automatic expiration.
    tools:
      - "Open Policy Agent (OPA) / Cedar"
      - "Kubernetes RBAC / Kyverno"
      - "Okta / Azure AD / Keycloak"
      - "Terraform IAM modules"
      - "HashiCorp Vault"
      - "Teleport / StrongDM (JIT access)"
  devsecops:
    prose: >-
      Enforce access control policy through CI/CD pipeline gates that validate IAM configurations
      before deployment. Use merge request approval rules to require security team review for any
      changes to access control configurations. Implement pre-commit hooks and pipeline checks using
      Conftest or Checkov to validate IAM definitions against organizational policy. Maintain access
      control policy documents alongside code in version-controlled repositories. Automate access
      review workflows triggered by CI/CD events.
    tools:
      - "GitLab CI/CD"
      - "Conftest"
      - "Checkov"
      - "tfsec / Trivy"
      - "GitLab Protected Branches / Approval Rules"
      - "Terraform Sentinel"
  secops:
    prose: >-
      Implement continuous monitoring of access control policy compliance through SIEM correlation
      rules and user behavior analytics (UBA). Conduct quarterly access reviews comparing active
      entitlements against the approved access control policy. Monitor for policy violations including
      excessive privileges, orphaned accounts, and unauthorized access attempts. Generate compliance
      reports demonstrating policy enforcement effectiveness and exception management.
    tools:
      - "SIEM (Splunk, Elastic Security, Microsoft Sentinel)"
      - "Identity Governance (SailPoint, Saviynt)"
      - "CrowdStrike Falcon Identity Threat Detection"
      - "PAM Solutions (CyberArk, BeyondTrust)"
      - "GRC Platforms (ServiceNow, OneTrust)"
