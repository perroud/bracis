id: 03-01
family: cat-3
title: "Risk Management Program"
class: HITRUST-CSF
baselines: [e1, i1, r2]
statement:
  prose: >-
    The organization shall establish and maintain a formal risk management program that includes
    the identification, analysis, evaluation, treatment, and monitoring of information security
    risks. The risk management approach shall be defined, documented, and supported by senior
    management. Risk assessments shall be performed at planned intervals or when significant
    changes occur in the organization, its information systems, or the threat environment. The
    organization shall define and implement a risk treatment plan that addresses identified risks
    through acceptance, avoidance, transfer, or mitigation. Residual risks shall be formally
    accepted by appropriate management authority. Risk assessment results shall inform the
    selection and tailoring of security controls.
guidance:
  prose: >-
    The risk management program is fundamental to the HITRUST CSF assessment methodology, as
    the r2 assessment level is explicitly risk-based. Organizations must establish a systematic
    approach to identifying and managing risks to the confidentiality, integrity, and availability
    of information assets. The risk management methodology should include asset identification
    and valuation, threat identification, vulnerability identification, likelihood and impact
    assessment, and risk calculation. At the e1 level, a documented risk management approach
    with basic risk identification is required. At i1, a functioning risk assessment process
    with treatment plans is expected. At r2, a comprehensive, quantitative or semi-quantitative
    risk management program with continuous monitoring and risk-informed control selection is
    mandatory. The risk management program should leverage established frameworks such as NIST
    RMF, ISO 27005, or FAIR.
references:
  - citation: "NIST SP 800-53 Rev 5: RA-1, RA-2, RA-3"
    url: "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
  - citation: "NIST SP 800-30 Rev 1"
    url: "https://csrc.nist.gov/publications/detail/sp/800-30/rev-1/final"
  - citation: "ISO/IEC 27001:2022 Clause 6.1, A.5.1"
    url: "https://www.iso.org/standard/27001"
  - citation: "HIPAA Security Rule 45 CFR 164.308(a)(1)(ii)(A)"
    url: "https://www.hhs.gov/hipaa/for-professionals/security/index.html"
implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate risk assessment outputs into platform engineering decisions by defining risk-based
      security tiers for workloads. Use infrastructure-as-code to enforce security controls based
      on workload risk classification. Implement automated risk scoring for infrastructure changes
      using policy engines. Deploy threat modeling as part of architecture review for new platform
      services. Use SBOM generation and vulnerability correlation to maintain real-time risk posture
      visibility for all platform components.
    tools:
      - "Terraform / Pulumi (risk-based modules)"
      - "Open Policy Agent (risk-based policies)"
      - "SBOM tools (Syft, cdxgen)"
      - "Dependency-Track"
      - "Backstage (risk classification catalog)"
      - "Threat modeling tools (OWASP Threat Dragon, IriusRisk)"
  devsecops:
    prose: >-
      Embed risk assessment into the software development lifecycle by requiring threat modeling
      for new features and architectural changes. Integrate vulnerability scanning and SAST/DAST
      results into a risk-based prioritization framework. Implement automated risk scoring in CI/CD
      pipelines that considers vulnerability severity, asset sensitivity, and exposure. Use merge
      request templates that include risk assessment checklists for security-relevant changes.
      Track risk treatment decisions as issues linked to vulnerabilities.
    tools:
      - "GitLab Security Scanning (SAST, DAST, Dependency Scanning)"
      - "Trivy / Grype"
      - "OWASP Threat Dragon"
      - "DefectDojo (vulnerability management)"
      - "GitLab Issue Tracking (risk register)"
  secops:
    prose: >-
      Maintain a centralized risk register with assigned risk owners, treatment plans, and
      review schedules. Conduct annual comprehensive risk assessments and update the register
      upon significant organizational or environmental changes. Implement continuous risk
      monitoring through vulnerability management, threat intelligence feeds, and security
      metrics. Generate risk dashboards for executive reporting showing risk trends, treatment
      status, and residual risk levels. Track risk exceptions with documented justification
      and expiration dates.
    tools:
      - "GRC Platforms (ServiceNow, Archer, OneTrust)"
      - "Risk Quantification (RiskLens, FAIR)"
      - "Vulnerability Management (Qualys, Rapid7, Tenable)"
      - "Threat Intelligence (Recorded Future, Mandiant)"
      - "HITRUST MyCSF Portal"
