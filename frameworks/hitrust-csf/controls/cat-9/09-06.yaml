id: 09-06
family: cat-9
title: "Network Security Management"
class: HITRUST-CSF
baselines: [i1, r2]
statement:
  prose: >-
    The organization shall manage and control networks to protect information in systems and
    applications. Networks shall be adequately managed and controlled to be protected from
    threats and to maintain security for the systems and applications using the network,
    including information in transit. Security features, service levels, and management
    requirements of all network services shall be identified and included in any network
    services agreement, whether these services are provided in-house or outsourced.
    Mechanisms for the security of network services shall include authentication,
    encryption, network connection controls, and monitoring. Groups of information services,
    users, and information systems shall be segregated on networks.
guidance:
  prose: >-
    Network security management requires a comprehensive approach to protecting the
    organization's network infrastructure from unauthorized access, interception, and
    disruption. This includes managing network devices (firewalls, routers, switches,
    load balancers), implementing network segmentation, encrypting data in transit, and
    monitoring network traffic for threats. At i1, organizations must demonstrate network
    segmentation, encrypted communications for sensitive data, and network service level
    agreements. At r2, advanced network security including micro-segmentation, zero-trust
    network architecture, encrypted east-west traffic, continuous network monitoring with
    threat detection, and automated response to network security events is required.
    Network security must extend to cloud networking, container networking, and API
    gateway configurations.
references:
  - citation: "NIST SP 800-53 Rev 5: SC-7, SC-8, SC-20"
    url: "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
  - citation: "ISO/IEC 27001:2022 A.8.20, A.8.21, A.8.22, A.8.23, A.8.26"
    url: "https://www.iso.org/standard/27001"
  - citation: "HIPAA Security Rule 45 CFR 164.312(e)"
    url: "https://www.hhs.gov/hipaa/for-professionals/security/index.html"
  - citation: "PCI DSS v4.0 Requirements 1, 4"
    url: "https://www.pcisecuritystandards.org/document_library/"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement service mesh (Istio/Linkerd) for automatic mTLS encryption of all
      east-west traffic between services. Use Kubernetes NetworkPolicies with Calico
      or Cilium for micro-segmentation at the pod level. Deploy cloud-native firewalls
      and WAFs for north-south traffic protection. Implement DNS security controls
      through CoreDNS policies. Manage all network infrastructure as code with
      Terraform/Pulumi. Implement network observability through eBPF-based tools
      for real-time traffic visibility without performance overhead.
    tools:
      - "Istio / Linkerd (service mesh, mTLS)"
      - "Calico / Cilium (network policies)"
      - "Cloud WAF (AWS WAF, Cloudflare, Akamai)"
      - "Terraform (network infrastructure-as-code)"
      - "CoreDNS (DNS security)"
      - "Hubble / Cilium (network observability)"
  devsecops:
    prose: >-
      Validate network configurations in CI/CD pipelines using policy-as-code to enforce
      segmentation and encryption requirements. Prevent deployment of overly permissive
      network rules. Implement automated TLS certificate management through cert-manager.
      Validate API security configurations including rate limiting, authentication, and
      input validation. Run automated network security testing as part of deployment
      pipelines.
    tools:
      - "Conftest / Checkov / tfsec"
      - "GitLab CI/CD"
      - "cert-manager (TLS automation)"
      - "OWASP ZAP (API security testing)"
      - "Nuclei (network vulnerability scanning)"
  secops:
    prose: >-
      Implement network detection and response (NDR) for continuous traffic analysis.
      Monitor network flow logs and DNS queries through SIEM for anomaly detection.
      Conduct periodic network penetration testing and segmentation validation. Track
      firewall rule changes and validate against approved baselines. Maintain network
      architecture diagrams and update them upon changes. Monitor for unauthorized
      network devices and connections.
    tools:
      - "NDR (Darktrace, ExtraHop, Vectra AI)"
      - "SIEM (Splunk, Elastic Security)"
      - "Firewall Management (Palo Alto Panorama, Fortinet)"
      - "Network Vulnerability Scanning (Nessus, Qualys)"
      - "Penetration Testing Tools (Nmap, Metasploit)"
