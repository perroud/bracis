id: 09-01
family: cat-9
title: "Operational Procedures and Responsibilities"
class: HITRUST-CSF
baselines: [e1, i1, r2]
statement:
  prose: >-
    The organization shall ensure the correct and secure operation of information processing
    facilities. Operating procedures shall be documented, maintained, and made available to
    all users who need them. Changes to the organization, business processes, information
    processing facilities, and systems that affect information security shall be controlled.
    The use of resources shall be monitored, tuned, and projections made for future capacity
    requirements to ensure the required system performance. Development, testing, and
    operational environments shall be separated to reduce the risks of unauthorized access
    or changes to the operational environment.
guidance:
  prose: >-
    Operational procedures and responsibilities establish the baseline for secure day-to-day
    operations. This control requires documented procedures for system operations, change
    management, capacity management, and environment separation. At the e1 level, basic
    documented operational procedures and change management are required. At i1, formal
    change management with approval workflows, capacity monitoring, and environment separation
    is expected. At r2, comprehensive operational management with automated change tracking,
    predictive capacity planning, fully isolated environments, and continuous compliance
    monitoring is required. The change management process must cover all types of changes
    including emergency changes, standard changes, and normal changes with appropriate
    risk assessment and approval levels.
references:
  - citation: "NIST SP 800-53 Rev 5: CM-1, CM-3, CM-4, SA-8"
    url: "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
  - citation: "ISO/IEC 27001:2022 A.5.37, A.8.31, A.8.32, A.8.33"
    url: "https://www.iso.org/standard/27001"
  - citation: "HIPAA Security Rule 45 CFR 164.312(b)"
    url: "https://www.hhs.gov/hipaa/for-professionals/security/index.html"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement infrastructure-as-code as the sole mechanism for managing production
      infrastructure, ensuring all changes are version-controlled and peer-reviewed.
      Use GitOps practices (ArgoCD/Flux) to enforce declarative state management for
      all platform components. Implement strict environment separation using separate
      cloud accounts or projects for development, staging, and production. Use
      Kubernetes namespaces with network policies and resource quotas for environment
      isolation. Implement automated capacity monitoring and alerting with horizontal
      pod autoscaling and cluster autoscaling.
    tools:
      - "Terraform / Pulumi"
      - "ArgoCD / Flux (GitOps)"
      - "Kubernetes (namespaces, resource quotas, HPA)"
      - "Prometheus / Grafana (capacity monitoring)"
      - "Cloud Account Separation (AWS Organizations, GCP Projects)"
  devsecops:
    prose: >-
      Enforce change management through GitLab merge request workflows with required
      approvals, automated testing, and compliance checks before deployment. Implement
      progressive delivery strategies (canary, blue-green) to reduce change risk.
      Maintain operational runbooks in version-controlled repositories alongside code.
      Automate environment provisioning through CI/CD pipelines to ensure consistency
      across development, staging, and production. Implement automated rollback
      capabilities for failed deployments.
    tools:
      - "GitLab CI/CD"
      - "GitLab Merge Request Approvals"
      - "GitLab Environments"
      - "Argo Rollouts (progressive delivery)"
      - "Feature Flags (LaunchDarkly, Unleash)"
  secops:
    prose: >-
      Monitor change management compliance through SIEM integration with change
      management systems. Track unauthorized changes through file integrity monitoring
      and configuration drift detection. Review emergency changes post-implementation
      to ensure proper documentation and approval. Generate change management
      compliance reports showing approval rates, emergency change frequency, and
      change-related incidents. Monitor capacity utilization and forecast future needs.
    tools:
      - "SIEM (Splunk, Elastic Security)"
      - "Change Management (ServiceNow, Jira Service Management)"
      - "File Integrity Monitoring (OSSEC, Tripwire, Wazuh)"
      - "Configuration Drift Detection (Chef InSpec, AWS Config)"
      - "Capacity Monitoring (Datadog, New Relic)"
