id: 09-10
family: cat-9
title: "Monitoring"
class: HITRUST-CSF
baselines: [e1, i1, r2]
statement:
  prose: >-
    The organization shall monitor systems and record information security events. Audit
    logs recording user activities, exceptions, faults, and information security events
    shall be produced, kept, and regularly reviewed. Logging facilities and log information
    shall be protected against tampering and unauthorized access. System administrator and
    system operator activities shall be logged and the logs protected and regularly reviewed.
    Clocks of all relevant information processing systems within an organization or security
    domain shall be synchronized with an agreed accurate time source. The organization shall
    establish procedures for monitoring the use of information processing facilities and
    review the results of monitoring activities regularly. Logs containing sensitive
    information shall be appropriately protected.
guidance:
  prose: >-
    Monitoring and audit logging are essential for detecting security incidents, supporting
    forensic investigations, and demonstrating compliance. The organization must implement
    comprehensive logging across all layers including infrastructure, applications, databases,
    and security tools. At the e1 level, basic audit logging with event recording is required.
    At i1, centralized log management with regular review and protected log storage is
    expected. At r2, advanced monitoring with real-time correlation, behavioral analytics,
    automated alerting, threat detection, and guaranteed log integrity through immutable
    storage is required. Log retention periods must comply with applicable regulatory
    requirements (HIPAA requires 6 years, PCI DSS requires 1 year). Time synchronization
    is critical for log correlation and must use authenticated NTP sources.
references:
  - citation: "NIST SP 800-53 Rev 5: AU-2, AU-3, AU-6, AU-8, AU-9, AU-12"
    url: "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
  - citation: "ISO/IEC 27001:2022 A.8.15, A.8.16, A.8.17"
    url: "https://www.iso.org/standard/27001"
  - citation: "HIPAA Security Rule 45 CFR 164.312(b)"
    url: "https://www.hhs.gov/hipaa/for-professionals/security/index.html"
  - citation: "PCI DSS v4.0 Requirement 10"
    url: "https://www.pcisecuritystandards.org/document_library/"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement centralized observability using the ELK stack, Grafana Loki, or cloud-native
      logging services. Deploy structured logging across all platform services with
      standardized log formats (JSON). Use Fluentd/Fluent Bit or Vector for log collection
      and forwarding. Implement Kubernetes audit logging for API server events. Configure
      immutable log storage with WORM compliance using object storage with retention locks.
      Deploy Prometheus with alerting rules for security-relevant metrics. Ensure NTP
      synchronization across all infrastructure using chrony or systemd-timesyncd.
    tools:
      - "ELK Stack / Grafana Loki / Datadog"
      - "Fluentd / Fluent Bit / Vector"
      - "Prometheus / Grafana (metrics and alerting)"
      - "Kubernetes Audit Logging"
      - "Cloud Audit Logs (CloudTrail, GCP Audit, Azure Monitor)"
      - "Object Storage with WORM (S3 Object Lock, GCS Retention)"
  devsecops:
    prose: >-
      Implement structured logging in applications using standardized libraries. Enforce
      logging standards through CI/CD pipeline checks that validate log format and content
      requirements. Automate log shipping configuration as part of deployment pipelines.
      Implement audit logging for CI/CD pipeline activities including who triggered
      deployments, what was deployed, and when. Use GitLab audit events for tracking
      changes to repository settings, permissions, and security configurations.
    tools:
      - "GitLab Audit Events"
      - "Application Logging Libraries (Winston, Serilog, Log4j2)"
      - "GitLab CI/CD (deployment audit trail)"
      - "Structured Logging Standards"
      - "Log validation in CI pipelines"
  secops:
    prose: >-
      Deploy SIEM for centralized log correlation, threat detection, and incident
      investigation. Implement automated alert rules for security events including
      authentication failures, privilege escalation, data access anomalies, and
      configuration changes. Conduct periodic log review to identify trends and potential
      security issues. Verify log integrity through hash validation and chain-of-custody
      procedures. Test log completeness by generating known events and verifying they
      appear in monitoring systems. Maintain log retention in compliance with applicable
      regulations.
    tools:
      - "SIEM (Splunk, Elastic Security, Microsoft Sentinel, Chronicle)"
      - "UEBA (Exabeam, Securonix)"
      - "Log Management (Datadog, Sumo Logic)"
      - "SOAR (Cortex XSOAR, Splunk SOAR)"
      - "Compliance Reporting (audit log reports)"
