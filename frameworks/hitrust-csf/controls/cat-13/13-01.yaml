id: 13-01
family: cat-13
title: "Privacy Requirements"
class: HITRUST-CSF
baselines: [i1, r2]
statement:
  prose: >-
    The organization shall establish and maintain a privacy program that addresses the
    collection, use, disclosure, retention, and disposal of personal information including
    protected health information (PHI), personally identifiable information (PII), and other
    regulated data categories. The organization shall provide notice to individuals regarding
    its privacy practices and obtain consent or authorization where required by law. The
    organization shall implement controls to ensure that personal information is used only
    for the purposes for which it was collected or as authorized by the individual. The
    organization shall implement mechanisms for individuals to exercise their privacy rights
    including access, correction, deletion, and data portability. The organization shall
    conduct privacy impact assessments for systems and processes that handle personal
    information.
guidance:
  prose: >-
    Privacy practices ensure that the organization handles personal information in compliance
    with applicable privacy laws and regulations and in accordance with individual expectations.
    The HITRUST CSF privacy category integrates requirements from HIPAA Privacy Rule, GDPR,
    CCPA/CPRA, and other privacy regulations into a unified framework. At i1, organizations
    must demonstrate documented privacy policies, notice of privacy practices, and basic data
    handling procedures. At r2, comprehensive privacy program management including privacy
    impact assessments, data flow mapping, consent management, individual rights fulfillment,
    data minimization enforcement, and privacy-by-design integration into system development
    is required. Healthcare organizations must address HIPAA-specific requirements including
    minimum necessary standard, authorization requirements, and the right to an accounting
    of disclosures.
references:
  - citation: "NIST SP 800-53 Rev 5: PT-1, PT-2, PT-3, PT-4, PT-5"
    url: "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
  - citation: "ISO/IEC 27701:2019"
    url: "https://www.iso.org/standard/71670.html"
  - citation: "HIPAA Privacy Rule 45 CFR 164.500-534"
    url: "https://www.hhs.gov/hipaa/for-professionals/privacy/index.html"
  - citation: "GDPR Articles 5, 6, 7, 12-23"
    url: "https://gdpr-info.eu/"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement privacy controls as platform capabilities including data classification
      tagging, automated data retention and deletion policies, consent management APIs,
      and data subject access request (DSAR) fulfillment automation. Use infrastructure-as-code
      to enforce data residency requirements and encryption for personal data at rest and
      in transit. Implement data lineage tracking through metadata management platforms.
      Deploy data masking and anonymization capabilities for non-production environments.
      Enforce purpose limitation through attribute-based access control policies.
    tools:
      - "Data Classification (BigID, Spirion)"
      - "Consent Management (OneTrust, TrustArc)"
      - "Data Masking (Delphix, Informatica)"
      - "Cloud KMS (encryption enforcement)"
      - "Data Lineage (Apache Atlas, OpenLineage)"
      - "OPA (purpose-based access policies)"
  devsecops:
    prose: >-
      Integrate privacy requirements into the development lifecycle through privacy-aware
      merge request templates and automated privacy impact assessment triggers. Implement
      data classification scanning in CI/CD pipelines to detect personal data in code,
      configurations, and test data. Enforce privacy-by-design principles through secure
      coding guidelines and automated validation. Use synthetic data generation for test
      environments to eliminate privacy risks. Implement privacy-focused code review
      checklists.
    tools:
      - "GitLab CI/CD (privacy scanning)"
      - "Data Discovery (BigID, Nightfall)"
      - "Synthetic Data (Synthea, Faker)"
      - "Secret Detection (GitLab, gitleaks)"
      - "Privacy-aware merge request templates"
  secops:
    prose: >-
      Maintain a privacy program with a designated privacy officer. Implement data flow
      mapping documenting how personal information flows through the organization. Conduct
      privacy impact assessments for new systems and processes. Track and fulfill data
      subject access requests within regulatory timeframes. Monitor for unauthorized
      access to personal data and potential privacy breaches. Maintain privacy training
      programs for all personnel handling personal data. Generate privacy compliance
      reports for management and regulators.
    tools:
      - "Privacy Management (OneTrust, TrustArc, BigID)"
      - "DSAR Management (DataGrail, Transcend)"
      - "GRC Platforms (ServiceNow, Archer)"
      - "Privacy Training (KnowBe4, Proofpoint)"
      - "Data Protection Impact Assessment tools"
      - "HITRUST MyCSF Portal"
