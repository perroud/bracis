id: 06-01
family: cat-6
title: "Compliance with Legal Requirements"
class: HITRUST-CSF
baselines: [i1, r2]
statement:
  prose: >-
    The organization shall identify, document, and keep up to date all relevant statutory,
    regulatory, and contractual requirements and the organization's approach to meet these
    requirements for each information system and the organization. Specific controls and
    individual responsibilities to meet these requirements shall be defined and documented.
    The organization shall ensure that all relevant requirements are addressed in its
    information security program including but not limited to intellectual property rights,
    protection of organizational records, privacy and protection of personally identifiable
    information, regulation of cryptographic controls, and applicable industry-specific
    regulations such as HIPAA, PCI DSS, SOX, and state privacy laws.
guidance:
  prose: >-
    Compliance with legal requirements is a cross-cutting concern that affects all aspects
    of the information security program. Organizations operating in healthcare must comply
    with HIPAA, HITECH, and state health information privacy laws. Financial services
    organizations must address SOX, GLBA, and state financial regulations. Organizations
    handling payment data must comply with PCI DSS. The HITRUST CSF is specifically designed
    to provide a common framework that maps to these diverse requirements, enabling
    organizations to achieve compliance with multiple regulations through a single assessment.
    At i1, organizations must demonstrate awareness and documentation of applicable requirements.
    At r2, comprehensive compliance management with evidence of ongoing monitoring, gap
    analysis, and remediation is required. The organization must appoint a compliance
    officer or function with appropriate authority.
references:
  - citation: "NIST SP 800-53 Rev 5: SA-9, PL-4"
    url: "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
  - citation: "ISO/IEC 27001:2022 A.5.31, A.5.32, A.5.33, A.5.34"
    url: "https://www.iso.org/standard/27001"
  - citation: "HIPAA Security Rule 45 CFR 164.308(a)(8)"
    url: "https://www.hhs.gov/hipaa/for-professionals/security/index.html"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement compliance guardrails in the platform that enforce regulatory requirements
      through policy-as-code. Use data residency controls in cloud infrastructure to ensure
      data stays within required jurisdictions. Implement encryption requirements using
      platform-level encryption policies. Tag workloads with compliance requirement metadata
      (HIPAA, PCI, SOX) and enforce corresponding security controls automatically. Use
      infrastructure-as-code modules pre-configured for regulatory compliance.
    tools:
      - "OPA / Kyverno (compliance policies)"
      - "Terraform compliance modules"
      - "Cloud KMS (encryption enforcement)"
      - "Data residency controls (cloud provider)"
      - "Backstage (compliance classification)"
  devsecops:
    prose: >-
      Integrate compliance checks into CI/CD pipelines that validate infrastructure and
      application configurations against applicable regulatory requirements. Use license
      scanning to ensure compliance with intellectual property laws. Implement dependency
      scanning to identify components with license restrictions. Enforce cryptographic
      standards through pipeline validation. Maintain compliance requirement mappings
      alongside code to enable traceability from requirement to implementation.
    tools:
      - "GitLab License Scanning"
      - "GitLab Dependency Scanning"
      - "Checkov (compliance policies)"
      - "Conftest"
      - "GitLab Compliance Framework"
  secops:
    prose: >-
      Maintain a regulatory compliance register identifying all applicable requirements,
      responsible owners, and compliance status. Conduct periodic compliance audits and
      assessments against identified requirements. Monitor regulatory changes that could
      impact the organization through legal counsel and regulatory intelligence services.
      Track compliance exceptions and remediation plans with defined timelines. Generate
      compliance reports for executive management and regulatory bodies as required.
    tools:
      - "GRC Platforms (ServiceNow, Archer, OneTrust)"
      - "HITRUST MyCSF Portal"
      - "Legal/Regulatory Intelligence (LexisNexis, Thomson Reuters)"
      - "Audit Management (AuditBoard, Workiva)"
      - "Document Management (SharePoint, Confluence)"
