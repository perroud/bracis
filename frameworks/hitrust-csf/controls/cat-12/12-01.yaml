id: 12-01
family: cat-12
title: "Business Continuity Management"
class: HITRUST-CSF
baselines: [i1, r2]
statement:
  prose: >-
    The organization shall develop and maintain a business continuity management process that
    addresses the information security requirements needed for the organization's continuity.
    The organization shall identify events that can cause interruptions to business processes,
    along with the probability and impact of such interruptions and their consequences for
    information security. Business continuity plans shall be developed and implemented to
    ensure timely resumption of critical operations. Plans shall be tested and updated regularly
    to ensure they are up to date and effective. A single framework of business continuity
    plans shall be maintained to ensure all plans are consistent, to consistently address
    information security requirements, and to identify priorities for testing and maintenance.
    Business continuity plans shall be tested regularly to ensure they are effective and remain
    relevant.
guidance:
  prose: >-
    Business continuity management ensures that the organization can maintain critical
    operations and recover from disruptive events within acceptable timeframes. This
    control requires a systematic approach to identifying critical business processes,
    assessing disruption risks, and developing recovery strategies. At i1, documented
    business continuity plans with defined recovery time objectives (RTOs) and recovery
    point objectives (RPOs) are required. At r2, comprehensive BCM with tested plans,
    automated failover capabilities, cross-region disaster recovery, regular testing
    including full failover exercises, and integration with the overall risk management
    framework is expected. For healthcare organizations, continuity planning must
    prioritize systems processing PHI and patient care systems, and address both
    technology failures and broader business disruptions.
references:
  - citation: "NIST SP 800-53 Rev 5: CP-1, CP-2, CP-4, CP-6, CP-7"
    url: "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
  - citation: "ISO/IEC 27001:2022 A.5.29, A.5.30, A.8.13, A.8.14"
    url: "https://www.iso.org/standard/27001"
  - citation: "HIPAA Security Rule 45 CFR 164.308(a)(7)"
    url: "https://www.hhs.gov/hipaa/for-professionals/security/index.html"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement multi-region infrastructure deployment with automated failover using
      infrastructure-as-code. Design for high availability with Kubernetes multi-cluster
      federation, database replication across regions, and global load balancing. Define
      infrastructure recovery playbooks as code with automated execution. Implement backup
      and restore automation for all stateful services. Use chaos engineering to validate
      resilience and test failover procedures. Define and monitor SLOs for availability
      and recovery metrics.
    tools:
      - "Kubernetes multi-cluster (Fleet, Admiralty)"
      - "Cloud Multi-Region (AWS Multi-Region, GCP Multi-Region)"
      - "Terraform (disaster recovery modules)"
      - "Velero (Kubernetes backup/restore)"
      - "Database replication (PostgreSQL streaming, Cloud SQL HA)"
      - "Litmus / Gremlin (chaos engineering)"
      - "Global Load Balancers (Cloudflare, AWS Global Accelerator)"
  devsecops:
    prose: >-
      Implement automated deployment pipelines that can deploy to backup regions. Maintain
      infrastructure-as-code for disaster recovery environments in version control.
      Implement automated backup verification through CI/CD pipelines that periodically
      restore and validate backups. Track RTO/RPO compliance through automated testing.
      Document recovery procedures in runbooks maintained alongside code.
    tools:
      - "GitLab CI/CD (multi-region deployment)"
      - "Terraform / Pulumi (DR infrastructure)"
      - "Velero (backup automation)"
      - "Automated backup testing pipelines"
      - "GitLab Pages / MkDocs (recovery runbooks)"
  secops:
    prose: >-
      Develop and maintain business impact analysis (BIA) documenting critical systems,
      RTOs, RPOs, and dependencies. Schedule and conduct regular BCP tests including
      tabletop exercises, functional tests, and full failover exercises. Track BCP
      test results and remediation items. Monitor system availability against defined
      SLAs and escalate degradation. Maintain communication plans and contact trees
      for business continuity events. Review and update BCPs after significant
      organizational changes, incidents, or test findings.
    tools:
      - "BCP Management (Fusion Risk Management, Castellan)"
      - "GRC Platforms (ServiceNow, Archer)"
      - "Status Pages (Statuspage, Instatus)"
      - "Communication (PagerDuty, Everbridge)"
      - "Monitoring (Datadog, New Relic, Pingdom)"
