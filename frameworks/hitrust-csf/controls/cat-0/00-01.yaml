id: 00-01
family: cat-0
title: "Information Security Management Program"
class: HITRUST-CSF
baselines: [e1, i1, r2]
statement:
  prose: >-
    The organization shall establish, implement, maintain, and continually improve an information security
    management program (ISMP) that includes the policies, procedures, and controls necessary to manage
    information security risks commensurate with the size, complexity, and nature of the organization.
    The ISMP shall be formally documented, approved by senior management, communicated to all relevant
    personnel, and reviewed at planned intervals or when significant changes occur to ensure its continuing
    suitability, adequacy, and effectiveness. The program shall define roles and responsibilities for
    information security governance, establish a risk management methodology, and provide a framework for
    setting objectives, establishing controls, and measuring the effectiveness of the security program.
guidance:
  prose: >-
    The Information Security Management Program serves as the foundation of the entire HITRUST CSF
    implementation. Organizations must demonstrate executive-level commitment to information security
    through formal governance structures, resource allocation, and accountability mechanisms. The ISMP
    should align with the organization's strategic objectives and risk appetite, incorporate lessons learned
    from security incidents and assessments, and adapt to changes in the threat landscape, regulatory
    requirements, and business operations. At the e1 level, organizations must demonstrate basic program
    documentation. At i1, a functioning program with evidence of implementation is expected. At r2,
    comprehensive risk-based tailoring with continuous improvement evidence is required. The ISMP must
    address all 14 HITRUST CSF control categories and map to relevant authoritative sources including
    NIST, ISO, HIPAA, and other applicable regulations.
references:
  - citation: "NIST SP 800-53 Rev 5: PM-1"
    url: "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
  - citation: "ISO/IEC 27001:2022 Clause 4-10"
    url: "https://www.iso.org/standard/27001"
  - citation: "HIPAA Security Rule 45 CFR 164.308(a)(1)"
    url: "https://www.hhs.gov/hipaa/for-professionals/security/index.html"
implementation_guidance:
  platform_engineering:
    prose: >-
      Codify the information security management program as policy-as-code artifacts stored in
      version-controlled repositories. Use infrastructure-as-code to enforce organizational security
      baselines across all platform services. Implement a centralized policy engine (OPA/Kyverno) that
      enforces ISMP requirements as automated guardrails. Create a platform security catalog using
      Backstage or similar developer portal that documents all security controls, their implementation
      status, and ownership. Automate compliance evidence collection through CI/CD pipelines and
      platform telemetry. Define security SLOs and track them through observability platforms.
    tools:
      - "Open Policy Agent (OPA)"
      - "Kyverno"
      - "Backstage"
      - "Terraform/Pulumi"
      - "GitLab Compliance Pipelines"
      - "Prometheus/Grafana (security SLOs)"
  devsecops:
    prose: >-
      Integrate ISMP controls into the CI/CD pipeline as automated gates. Enforce merge request
      approval policies requiring security review for changes to security-relevant configurations.
      Maintain all ISMP documentation in version-controlled repositories with full audit trail.
      Implement automated compliance scanning that validates deployments against ISMP requirements
      before promoting to production. Use compliance-as-code frameworks to continuously verify that
      infrastructure and application configurations adhere to the ISMP. Generate automated compliance
      reports from pipeline data and scanning results.
    tools:
      - "GitLab CI/CD"
      - "GitLab Compliance Framework"
      - "Conftest"
      - "Checkov"
      - "Trivy"
      - "OWASP ZAP"
  secops:
    prose: >-
      Establish a GRC platform to manage the ISMP lifecycle including policy creation, approval,
      dissemination, and review tracking. Implement continuous monitoring through SIEM integration
      to detect deviations from ISMP requirements. Conduct periodic assessments against HITRUST CSF
      requirements and track remediation through a centralized workflow. Generate executive dashboards
      showing ISMP maturity, control effectiveness, and risk posture. Maintain an evidence repository
      with artifacts demonstrating ISMP implementation across all control categories.
    tools:
      - "GRC Platforms (ServiceNow, Archer, OneTrust)"
      - "SIEM (Splunk, Elastic Security, Microsoft Sentinel)"
      - "HITRUST MyCSF Portal"
      - "Risk Register (RiskLens, Resolver)"
      - "Confluence/SharePoint (policy management)"
