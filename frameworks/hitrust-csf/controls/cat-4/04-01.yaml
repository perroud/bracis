id: 04-01
family: cat-4
title: "Information Security Policy"
class: HITRUST-CSF
baselines: [e1, i1, r2]
statement:
  prose: >-
    The organization shall define, approve, publish, and communicate an information security
    policy to all employees and relevant external parties. The information security policy shall
    be endorsed by senior management and shall set forth the organization's approach to managing
    information security. The policy shall contain a definition of information security, its
    overall objectives and scope, a framework for setting control objectives, a brief explanation
    of the security policies, principles, standards, and compliance requirements, a definition
    of general and specific responsibilities, and references to documentation that may support
    the policy. The policy shall be reviewed at planned intervals or if significant changes
    occur to ensure its continuing suitability, adequacy, and effectiveness.
guidance:
  prose: >-
    The information security policy is the top-level document that establishes management's
    direction and commitment to information security. It provides the framework within which all
    other security policies, standards, and procedures operate. The policy must be realistic,
    enforceable, and aligned with the organization's business objectives and risk appetite.
    At the e1 level, a documented and approved information security policy is the minimum
    requirement. At i1, evidence of policy communication, acknowledgment, and periodic review
    is expected. At r2, the policy must demonstrate integration with enterprise risk management,
    regular updates based on threat landscape changes, and measurable security objectives.
    The policy should be concise enough for all employees to understand while comprehensive
    enough to provide meaningful direction for the security program.
references:
  - citation: "NIST SP 800-53 Rev 5: PL-1"
    url: "https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
  - citation: "ISO/IEC 27001:2022 A.5.1"
    url: "https://www.iso.org/standard/27001"
  - citation: "HIPAA Security Rule 45 CFR 164.316(a)"
    url: "https://www.hhs.gov/hipaa/for-professionals/security/index.html"
implementation_guidance:
  platform_engineering:
    prose: >-
      Translate the information security policy into enforceable platform guardrails using
      policy-as-code. Implement admission controllers that enforce policy requirements for
      all workloads deployed to the platform. Publish the security policy through the developer
      portal with clear guidance on how platform capabilities map to policy requirements.
      Version the policy in Git to maintain a complete history of changes and approvals.
      Implement automated compliance checks that verify platform configurations against
      policy requirements.
    tools:
      - "Open Policy Agent (OPA) / Kyverno"
      - "Backstage (policy documentation)"
      - "Git (policy versioning)"
      - "Kubernetes Admission Controllers"
      - "Terraform Sentinel / HashiCorp Sentinel"
  devsecops:
    prose: >-
      Maintain the information security policy in a version-controlled repository with merge
      request workflows for policy changes requiring appropriate approvals. Implement CI/CD
      pipeline checks that validate infrastructure and application configurations against
      policy requirements. Use compliance frameworks in GitLab to enforce policy-compliant
      pipeline configurations. Publish the policy through automated documentation pipelines
      to internal portals.
    tools:
      - "GitLab Compliance Framework"
      - "GitLab CI/CD"
      - "MkDocs / Hugo (policy publishing)"
      - "Conftest (policy validation)"
      - "GitLab Merge Request Approvals"
  secops:
    prose: >-
      Track policy lifecycle including creation, approval, communication, acknowledgment,
      and review using a GRC platform. Implement automated reminders for policy review
      deadlines. Monitor policy acknowledgment status and follow up with non-compliant
      personnel. Conduct periodic assessments to verify that operational practices align
      with documented policies. Generate compliance reports showing policy currency,
      acknowledgment rates, and exception status.
    tools:
      - "GRC Platforms (ServiceNow, Archer, OneTrust)"
      - "LMS (policy acknowledgment tracking)"
      - "Document Management (SharePoint, Confluence)"
      - "Email/Notification Systems"
      - "HITRUST MyCSF Portal"
