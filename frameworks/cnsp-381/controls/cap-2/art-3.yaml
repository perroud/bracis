id: art-3
family: cap-2
title: "Requisitos da Política de Segurança Cibernética"
class: CNSP-381
baselines: [all]
statement:
  prose: |
    Art. 3. As supervisionadas devem implementar e manter política de segurança
    cibernética formulada com base em princípios e diretrizes que busquem assegurar
    a confidencialidade, a integridade e a disponibilidade dos dados e dos sistemas
    de informação utilizados.

    § 1º A política de segurança cibernética deve contemplar, no mínimo, os objetivos
    de segurança cibernética da supervisionada.

    § 2º A política de segurança cibernética deve ser compatível com o porte, o perfil
    de risco e o modelo de negócio da supervisionada, a natureza de suas operações, a
    complexidade de seus produtos e serviços e a sensibilidade dos dados tratados.
guidance:
  prose: |
    O art. 3 é o artigo central do Capítulo 2, estabelecendo a obrigação de existência
    de uma política de segurança cibernética formal.

    **Tríade CIA (Confidencialidade, Integridade, Disponibilidade):**
    A SUSEP adota explicitamente a tríade clássica de segurança da informação como
    princípio norteador. Cada controle da política deve estar ancorado em pelo menos
    um desses pilares:
    - Confidencialidade: proteção contra acesso não autorizado a dados
    - Integridade: proteção contra alteração não autorizada de dados e sistemas
    - Disponibilidade: garantia de acesso tempestivo a dados e sistemas

    **Requisitos implícitos:**
    - A política deve ser FORMAL (documento aprovado por autoridade competente)
    - A política deve ser IMPLEMENTADA (não basta existir no papel)
    - A política deve ser MANTIDA (atualização contínua, não documento estático)

    **Diferença entre política, normas e procedimentos:**
    - Política: diretrizes de alto nível aprovadas pelo conselho/diretoria
    - Normas: detalhamento técnico das diretrizes (ex: norma de criptografia)
    - Procedimentos: passo a passo operacional (ex: procedimento de backup)

    A SUSEP exige a política; normas e procedimentos são boas práticas derivadas.

    **Compatibilidade com proporcionalidade (§ 2º):**
    A política deve refletir a análise de proporcionalidade do art. 2. Uma seguradora
    digital terá uma política mais extensa e detalhada do que uma capitalizadora
    de pequeno porte.

    **Em inspeções, a SUSEP verifica:**
    1. Existência formal do documento de política
    2. Aprovação por autoridade competente (conselho ou diretoria)
    3. Cobertura dos três pilares (confidencialidade, integridade, disponibilidade)
    4. Objetivos de segurança cibernética explícitos
    5. Evidência de implementação (não apenas documento)
    6. Compatibilidade com o porte e perfil de risco
implementation_guidance:
  platform_engineering:
    prose: |
      **Implementação técnica da política:**
      1. Criar repositório Git centralizado para a política de segurança cibernética,
         com versionamento, histórico de alterações e aprovações via merge request.
      2. Traduzir os objetivos de segurança cibernética em controles técnicos
         mensuráveis e automatizáveis.
      3. Implementar Security-as-Code: políticas de segurança codificadas em OPA/Rego,
         Sentinel ou similar, aplicadas automaticamente na infraestrutura.

      **Controles técnicos para a tríade CIA:**
      4. Confidencialidade: criptografia em trânsito (TLS 1.2+) e em repouso (AES-256),
         controle de acesso baseado em funções (RBAC), segmentação de rede.
      5. Integridade: hash de integridade para dados críticos, assinatura digital,
         logs imutáveis, controle de versão para configurações.
      6. Disponibilidade: redundância geográfica, balanceamento de carga, auto-scaling,
         backup automatizado com testes de restauração.

      **Monitoramento de conformidade:**
      7. Dashboard em tempo real mostrando o estado de conformidade com cada
         objetivo da política de segurança cibernética.
      8. Alertas automáticos quando um controle técnico sai de conformidade.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - vault
      - encryption-at-rest
      - waf
      - load-balancer
  devsecops:
    prose: |
      **Política no ciclo de desenvolvimento:**
      1. Integrar os requisitos da política de segurança cibernética no pipeline CI/CD:
         - SAST para integridade do código
         - Secret detection para confidencialidade
         - Dependency scanning para vulnerabilidades conhecidas
      2. Definir quality gates baseados nos objetivos da política:
         - Zero vulnerabilidades críticas ou altas não tratadas
         - Cobertura mínima de testes de segurança
         - Aprovação obrigatória de security champion
      3. Documentar no pipeline como cada etapa contribui para um pilar da tríade CIA.

      **Governança de código:**
      4. Branch protection rules alinhadas com a política (aprovações obrigatórias,
         CODEOWNERS para arquivos sensíveis).
      5. Signed commits para garantir integridade e não-repúdio.
      6. Merge request templates com checklist de segurança cibernética.
    tools:
      - gitlab-ci
      - sast-scanner
      - dast-scanner
      - dependency-scanning
      - secret-detection
      - code-review
  secops:
    prose: |
      **Gestão da política:**
      1. Redigir a política de segurança cibernética com estrutura clara:
         - Objetivo e escopo
         - Princípios (confidencialidade, integridade, disponibilidade)
         - Papéis e responsabilidades
         - Diretrizes por domínio (acesso, criptografia, redes, dados, incidentes)
         - Sanções por descumprimento
      2. Submeter à aprovação do conselho de administração ou diretoria.
      3. Publicar e disseminar para todo o quadro de pessoal.

      **Monitoramento e melhoria contínua:**
      4. Assessment trimestral de aderência à política.
      5. Métricas de segurança cibernética alinhadas aos objetivos da política:
         - Tempo médio de detecção de incidentes (MTTD)
         - Tempo médio de resposta a incidentes (MTTR)
         - Número de vulnerabilidades abertas por severidade
         - Taxa de conformidade dos controles técnicos
      6. Relatório periódico ao conselho/diretoria sobre o estado de segurança.
    tools:
      - grc-platform
      - siem
      - vulnerability-management
      - compliance-reporting
