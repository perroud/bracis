id: art-8
family: cap-2
title: "Documentação e Disponibilidade à SUSEP"
class: CNSP-381
baselines: [all]
statement:
  prose: |
    Art. 8. A documentação referente à política de segurança cibernética e ao plano
    de ação e de resposta a incidentes deve ser mantida atualizada e disponível à
    SUSEP pelo prazo mínimo de cinco anos.

    Parágrafo único. A documentação de que trata o caput deve incluir:
    I - o documento da política de segurança cibernética;
    II - o plano de ação e de resposta a incidentes;
    III - o relatório anual sobre a implementação do plano de ação e de resposta
    a incidentes;
    IV - a documentação sobre os procedimentos de que tratam os incisos I e II
    do art. 4;
    V - os resultados de testes de continuidade de negócios com cenários de
    incidentes cibernéticos;
    VI - a ata de reunião do conselho de administração ou da diretoria referente
    às matérias de segurança cibernética.
guidance:
  prose: |
    O art. 8 estabelece requisitos de documentação e retenção, fundamentais para
    a fiscalização pela SUSEP.

    **Prazo de retenção — 5 anos:**
    Toda documentação listada deve ser mantida por no mínimo 5 anos. Este prazo
    é contado a partir da data de criação ou última atualização do documento.
    Na prática, recomenda-se manter por 7-10 anos para segurança jurídica.

    **Documentos obrigatórios (parágrafo único):**

    **I — Documento da política:**
    A política de segurança cibernética aprovada, com todas as versões históricas.

    **II — Plano de ação e resposta:**
    O plano detalhado com ações, procedimentos, controles e tecnologias.

    **III — Relatório anual:**
    Relatório de implementação do plano, demonstrando:
    - Ações realizadas no período
    - Incidentes ocorridos e tratados
    - Efetividade dos controles
    - Melhorias implementadas

    **IV — Procedimentos dos incisos I e II do art. 4:**
    Documentação dos procedimentos e controles para redução de vulnerabilidades
    e dos controles específicos para rastreabilidade de informações sensíveis.

    **V — Resultados de testes de continuidade:**
    Relatórios dos testes de continuidade de negócios que incluam cenários de
    incidentes cibernéticos, com resultados, gaps identificados e ações corretivas.

    **VI — Atas de reunião:**
    Atas das reuniões do conselho de administração ou diretoria que trataram de
    segurança cibernética, demonstrando governança e envolvimento da alta administração.

    **"Disponível à SUSEP":**
    A documentação deve estar acessível para apresentação durante inspeções.
    Não é necessário envio proativo — mas a SUSEP pode solicitar a qualquer momento.
    Recomenda-se:
    - Indexação clara e organizada
    - Formato digital pesquisável (não apenas PDFs de imagens)
    - Acesso controlado mas imediato quando solicitado

    **Em inspeções, a SUSEP verifica:**
    1. Existência de todos os documentos listados no parágrafo único
    2. Atualização dos documentos
    3. Retenção por mínimo de 5 anos
    4. Capacidade de apresentação imediata quando solicitado
    5. Integridade e autenticidade dos documentos
implementation_guidance:
  platform_engineering:
    prose: |
      **Repositório documental:**
      1. Repositório Git dedicado para documentação de compliance CNSP 381:
         - Versionamento completo com histórico de alterações
         - Branch protection com aprovação obrigatória
         - Tags para cada versão aprovada
         - Retenção garantida por 5+ anos
      2. Backup automatizado da documentação em storage imutável (WORM):
         - S3 Object Lock, Azure Immutable Blob, GCS Retention Policy
         - Cópias em múltiplas regiões geográficas

      **Integridade documental:**
      3. Assinatura digital dos documentos aprovados para garantir autenticidade.
      4. Hash de integridade para cada versão documental.
      5. Audit trail imutável de acessos e modificações na documentação.

      **Automação de retenção:**
      6. Política de retenção automatizada (mínimo 5 anos, recomendado 7-10 anos).
      7. Alertas automáticos antes da expiração do prazo de retenção.
      8. Bloqueio de exclusão durante o período de retenção obrigatório.
    tools:
      - gitlab
      - object-storage-worm
      - digital-signatures
      - backup-automation
      - retention-policies
  devsecops:
    prose: |
      **Documentação como código:**
      1. Documentação de segurança versionada junto ao código-fonte:
         - README de segurança em cada repositório crítico
         - ADRs (Architecture Decision Records) para decisões de segurança
         - Runbooks de incidentes versionados
      2. Pipeline de geração automática de documentação:
         - Relatórios de vulnerabilidades exportados periodicamente
         - Dashboards de compliance exportados em formato auditável
         - Logs de pipeline retidos por 5+ anos

      **Rastreabilidade automatizada:**
      3. Integração entre pipeline CI/CD e sistema documental:
         - Cada deploy gera registro com controles de segurança aplicados
         - Resultados de SAST/DAST/dependency scanning arquivados
         - Evidências de aprovação de merge requests retidas
      4. Geração automática de relatório anual com dados do pipeline.
    tools:
      - gitlab-ci
      - artifact-storage
      - documentation-generator
      - audit-log
  secops:
    prose: |
      **Gestão documental para compliance:**
      1. Inventário de todos os documentos exigidos pelo art. 8:
         - Status de cada documento (atualizado, vencido, em revisão)
         - Responsável por cada documento
         - Data da última atualização e próxima revisão
      2. Processo de elaboração e aprovação do relatório anual (inciso III):
         - Coleta de dados de incidentes, controles e melhorias
         - Análise de efetividade das ações do plano
         - Recomendações para o próximo período
         - Aprovação pela diretoria

      **Preparação para inspeções SUSEP:**
      3. Kit de documentação para inspeção sempre atualizado:
         - Índice de documentos com links diretos
         - Resumo executivo de cada documento
         - Contato dos responsáveis por cada área
      4. Simulação de inspeção anual (mock audit) para testar prontidão.
      5. Processo de resposta a ofícios da SUSEP com SLA definido.

      **Atas de reunião (inciso VI):**
      6. Pauta obrigatória de segurança cibernética em reuniões do conselho
         (mínimo trimestral).
      7. Modelo padronizado de ata com pontos obrigatórios:
         - Estado da segurança cibernética
         - Incidentes relevantes no período
         - Conformidade com a CNSP 381
         - Decisões e ações aprovadas
      8. Arquivo de atas com indexação e busca.
    tools:
      - grc-platform
      - document-management
      - compliance-reporting
      - audit-management
