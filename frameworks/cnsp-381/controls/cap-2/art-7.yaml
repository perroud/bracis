id: art-7
family: cap-2
title: "Revisão da Política de Segurança Cibernética"
class: CNSP-381
baselines: [all]
statement:
  prose: |
    Art. 7. A política de segurança cibernética deve ser revisada, no mínimo,
    anualmente ou quando houver alteração relevante nas atividades, nos produtos,
    nos serviços ou nos sistemas de informação da supervisionada.
guidance:
  prose: |
    O art. 7 estabelece a obrigatoriedade de revisão periódica da política de
    segurança cibernética, definindo dois gatilhos:

    **1. Revisão anual obrigatória:**
    Independente de qualquer evento, a política deve ser revisada pelo menos uma
    vez por ano. A revisão deve ser formal, com evidência de:
    - Data da revisão
    - Responsável pela revisão
    - Alterações realizadas (ou justificativa de manutenção sem alterações)
    - Aprovação pela autoridade competente (conselho ou diretoria)

    **2. Revisão por evento relevante:**
    Além da revisão anual, a política deve ser revisada quando houver alterações
    relevantes em:
    - Atividades: nova linha de negócio, expansão geográfica, fusão/aquisição
    - Produtos: lançamento de produto digital, seguros paramétricos, InsurTech
    - Serviços: novo canal digital, abertura de API para parceiros
    - Sistemas de informação: migração para nuvem, troca de core system,
      adoção de novas tecnologias (IA, blockchain)

    **O que constitui "alteração relevante":**
    A SUSEP não define critérios objetivos, mas espera que a entidade tenha
    processo formal para avaliar se uma mudança é relevante o suficiente para
    disparar revisão da política. Boas práticas:
    - Qualquer mudança que altere o perfil de risco cibernético
    - Qualquer mudança que introduza novos vetores de ataque
    - Qualquer mudança que afete dados sensíveis
    - Qualquer incidente significativo que revele gaps na política

    **Diferença entre revisão e atualização:**
    - Revisão: análise crítica da política para verificar adequação
    - Atualização: modificação efetiva do documento da política
    - Nem toda revisão resulta em atualização (a política pode estar adequada)
    - Toda atualização pressupõe revisão prévia

    **Em inspeções, a SUSEP verifica:**
    1. Data da última revisão (deve ser < 12 meses)
    2. Registro formal do processo de revisão
    3. Evidência de análise de eventos relevantes no período
    4. Aprovação da versão atualizada pela autoridade competente
    5. Comunicação das alterações aos interessados
implementation_guidance:
  platform_engineering:
    prose: |
      **Automação do ciclo de revisão:**
      1. Versionamento da política em repositório Git com histórico completo
         de alterações, aprovações e justificativas.
      2. Pipeline de revisão automatizado:
         - Alerta automático 30 dias antes do vencimento da revisão anual
         - Workflow de aprovação via merge request (revisores obrigatórios)
         - Tag de versão para cada revisão aprovada
      3. Integração com CMDB para detectar automaticamente alterações em
         sistemas que possam disparar revisão extraordinária.

      **Detecção de eventos relevantes:**
      4. Monitoramento de mudanças significativas na infraestrutura:
         - Novos serviços de nuvem provisionados
         - Alterações em arquitetura de rede
         - Novos sistemas em produção
         - Mudanças em integrações com terceiros
      5. Alertas automáticos ao responsável pela política quando mudanças
         relevantes são detectadas.
    tools:
      - gitlab-ci
      - cmdb
      - change-management
      - compliance-scanner
  devsecops:
    prose: |
      **Integração da revisão no ciclo de desenvolvimento:**
      1. Checklist de impacto em segurança cibernética para novos projetos e
         alterações significativas em sistemas existentes.
      2. Trigger automático de revisão da política quando:
         - Novo repositório é criado para sistema crítico
         - API externa é integrada
         - Nova tecnologia é adotada (framework, linguagem, serviço cloud)
      3. Documentação de decisões de segurança em ADRs (Architecture Decision
         Records) que alimentam a revisão da política.

      **Rastreabilidade:**
      4. Link entre commits/merge requests e itens da política de segurança.
      5. Changelog automatizado de mudanças em controles de segurança no pipeline.
    tools:
      - gitlab-ci
      - adr-tools
      - change-management
      - compliance-labels
  secops:
    prose: |
      **Processo formal de revisão:**
      1. Calendário anual de revisão com responsáveis designados.
      2. Checklist de revisão cobrindo todos os artigos da CNSP 381:
         - Objetivos de segurança cibernética (art. 3)
         - Conteúdo mínimo (art. 4)
         - Plano de resposta a incidentes (art. 5)
         - Programa de treinamento (art. 6)
      3. Análise de gap entre a política vigente e:
         - Incidentes ocorridos no período
         - Mudanças no cenário de ameaças
         - Novas regulamentações ou atualizações normativas
         - Mudanças internas (produtos, serviços, sistemas)

      **Documentação da revisão:**
      4. Ata formal de revisão com:
         - Data e participantes
         - Itens revisados
         - Alterações propostas e justificativas
         - Decisão (atualizar ou manter)
         - Aprovação pela autoridade competente
      5. Comunicação das alterações a todos os interessados.
      6. Atualização dos materiais de treinamento quando a política é alterada.

      **Gatilhos de revisão extraordinária:**
      7. Monitoramento contínuo de eventos que disparam revisão:
         - Incidentes de severidade alta ou crítica
         - Mudanças regulatórias
         - Resultados de auditoria com não-conformidades
         - Mudanças significativas no negócio
    tools:
      - grc-platform
      - compliance-reporting
      - change-management
      - document-management
