id: art-6
family: cap-2
title: "Disseminação e Treinamento em Segurança Cibernética"
class: CNSP-381
baselines: [all]
statement:
  prose: |
    Art. 6. As supervisionadas devem desenvolver programa de capacitação e de
    avaliação periódica de seu quadro de pessoal quanto à política de segurança
    cibernética e ao plano de ação e de resposta a incidentes.

    Parágrafo único. As supervisionadas devem promover a cultura de segurança
    cibernética, inclusive junto a prestadores de serviço e correspondentes.
guidance:
  prose: |
    O art. 6 trata do fator humano na segurança cibernética, reconhecendo que
    controles técnicos sozinhos são insuficientes sem um programa de capacitação.

    **Programa de capacitação (caput):**
    O artigo exige dois componentes:
    1. Capacitação: treinamentos formais sobre a política e o plano de resposta
    2. Avaliação periódica: verificação de que o conhecimento foi absorvido

    A avaliação periódica é requisito frequentemente negligenciado. Não basta
    oferecer treinamento — é preciso avaliar a efetividade (provas, simulações,
    métricas de desempenho).

    **"Quadro de pessoal":**
    Abrange todos os colaboradores da entidade, não apenas a equipe de TI:
    - Diretoria e conselho
    - Áreas de negócio (subscrição, sinistros, atuarial)
    - Áreas de suporte (RH, jurídico, financeiro)
    - Equipe de TI e segurança
    - Estagiários e temporários

    **Cultura de segurança (parágrafo único):**
    Vai além do treinamento formal. Cultura implica que segurança cibernética
    esteja incorporada nos processos diários, na comunicação e nos valores da
    organização. O parágrafo estende essa obrigação a:
    - Prestadores de serviço: terceirizados, consultores, fornecedores de TI
    - Correspondentes: corretores de seguros e representantes

    **Em inspeções, a SUSEP verifica:**
    1. Existência de programa formal de capacitação
    2. Cronograma e frequência dos treinamentos
    3. Evidências de participação (listas de presença, logs de acesso)
    4. Resultados de avaliações periódicas
    5. Ações corretivas para colaboradores com baixo desempenho
    6. Extensão do programa a terceiros e correspondentes
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de treinamento:**
      1. Plataforma de e-learning com módulos específicos de segurança cibernética:
         - Módulo básico: política de segurança, senhas, phishing, engenharia social
         - Módulo intermediário: classificação de dados, incidentes, resposta
         - Módulo técnico: secure coding, DevSecOps, cloud security
      2. Tracking automatizado de conclusão e resultados de avaliações.
      3. Integração com RH para onboarding obrigatório de segurança.

      **Simulações técnicas:**
      4. Plataforma de phishing simulado com campanhas periódicas.
      5. Ambientes de laboratório para exercícios práticos de segurança.
      6. Gamificação: CTF (Capture The Flag) internos para equipes técnicas.

      **Métricas automatizadas:**
      7. Dashboard de compliance de treinamento por área, cargo e terceiro.
      8. Alertas automáticos para gestores quando colaboradores estão com
         treinamento vencido.
    tools:
      - lms-platform
      - phishing-simulation
      - security-awareness-platform
      - gamification-ctf
  devsecops:
    prose: |
      **Capacitação específica para desenvolvedores:**
      1. Treinamento obrigatório em secure coding (OWASP Top 10, SANS Top 25).
      2. Code review focado em segurança como ferramenta de aprendizado contínuo.
      3. Security champions em cada squad com formação avançada.
      4. Workshops práticos de exploração de vulnerabilidades em ambiente controlado.

      **Avaliação integrada ao pipeline:**
      5. Métricas de segurança por desenvolvedor e equipe:
         - Vulnerabilidades introduzidas por sprint
         - Tempo para correção de vulnerabilidades
         - Taxa de aprovação em revisões de segurança
      6. Feedback automatizado no pipeline quando padrões inseguros são detectados,
         com links para material de treinamento.

      **Cultura DevSecOps:**
      7. Retrospectivas de sprint com componente de segurança.
      8. Compartilhamento de "lições aprendidas" de incidentes em wiki interna.
      9. Newsletter mensal de segurança para equipe de desenvolvimento.
    tools:
      - gitlab-ci
      - secure-coding-platform
      - security-champions-program
      - code-review
  secops:
    prose: |
      **Gestão do programa de capacitação:**
      1. Plano anual de treinamento com cronograma, público-alvo e conteúdo:
         - Trimestral: treinamento geral (todos os colaboradores)
         - Semestral: treinamento específico (equipes técnicas)
         - Anual: reciclagem completa com avaliação
      2. Conteúdo diferenciado por público:
         - Executivos: riscos estratégicos, responsabilidades legais, cenários
         - Negócios: proteção de dados do cliente, engenharia social
         - TI: controles técnicos, resposta a incidentes, forense
      3. Avaliação periódica com critérios mensuráveis:
         - Provas de conhecimento (mínimo 80% de aproveitamento)
         - Simulações de phishing (taxa de clique abaixo de 5%)
         - Exercícios práticos de resposta a incidentes

      **Extensão a terceiros:**
      4. Cláusulas contratuais exigindo treinamento de segurança para terceiros.
      5. Material de conscientização para corretores e correspondentes.
      6. Verificação periódica de aderência por terceiros críticos.

      **Evidências para SUSEP:**
      7. Registros de todos os treinamentos realizados (data, conteúdo, participantes).
      8. Resultados de avaliações e ações corretivas.
      9. Relatório anual de maturidade da cultura de segurança.
    tools:
      - security-awareness-platform
      - lms-platform
      - phishing-simulation
      - grc-platform
