id: art-5
family: cap-2
title: "Cenários de Incidentes e Plano de Continuidade"
class: CNSP-381
baselines: [all]
statement:
  prose: |
    Art. 5. As supervisionadas devem elaborar plano de resposta a incidentes
    cibernéticos que contemple, no mínimo:

    I - as ações a serem desenvolvidas pela supervisionada para adequar suas estruturas
    organizacional e operacional aos princípios e às diretrizes da política de segurança
    cibernética;

    II - as rotinas, os procedimentos, os controles e as tecnologias a serem utilizados
    na prevenção e na resposta a incidentes, em conformidade com as diretrizes da
    política de segurança cibernética;

    III - a área responsável pelo registro e controle dos efeitos de incidentes
    relevantes.
guidance:
  prose: |
    O art. 5 estabelece a obrigatoriedade de um plano de resposta a incidentes
    cibernéticos, detalhando seu conteúdo mínimo em três incisos.

    **Distinção entre política (art. 3) e plano de resposta (art. 5):**
    - A política define as diretrizes e objetivos de segurança cibernética
    - O plano de resposta define as ações concretas para implementar a política e
      responder a incidentes

    **Inciso I — Adequação organizacional e operacional:**
    O plano deve detalhar como a entidade vai adaptar sua estrutura para cumprir
    a política. Inclui:
    - Criação de equipe de resposta a incidentes (CSIRT/CIRT)
    - Definição de papéis e responsabilidades na resposta
    - Alocação de recursos (pessoal, tecnologia, orçamento)
    - Cronograma de implementação de controles

    **Inciso II — Rotinas, procedimentos, controles e tecnologias:**
    Exige detalhamento operacional:
    - Rotinas: atividades periódicas (monitoramento 24/7, revisão de logs)
    - Procedimentos: passo a passo para cada tipo de incidente (playbooks)
    - Controles: mecanismos técnicos (firewall, IDS, SIEM)
    - Tecnologias: ferramentas específicas (SOAR, EDR, sandbox)

    **Inciso III — Área responsável:**
    Deve haver designação formal de uma área (não apenas uma pessoa) responsável
    por registrar e controlar os efeitos de incidentes. Na prática, é o SOC (Security
    Operations Center) ou equipe equivalente.

    **Relação com continuidade de negócios:**
    O plano de resposta a incidentes deve estar integrado ao plano de continuidade
    de negócios (BCP) da entidade, alimentando cenários de teste (art. 4, IV, a).

    **Em inspeções, a SUSEP verifica:**
    1. Existência formal do plano de resposta a incidentes
    2. Coerência entre o plano e a política de segurança cibernética
    3. Designação formal da área responsável
    4. Evidências de execução do plano (registros de incidentes, relatórios de testes)
    5. Atualização do plano após incidentes relevantes
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de resposta a incidentes:**
      1. SOC (Security Operations Center) com monitoramento contínuo:
         - SIEM centralizado com correlação de eventos
         - Feeds de threat intelligence integrados
         - Dashboards de segurança em tempo real
      2. Automação de resposta com SOAR (Security Orchestration, Automation and Response):
         - Playbooks automatizados para incidentes recorrentes
         - Integração com ferramentas de contenção (firewall, EDR, WAF)
         - Orquestração de resposta multi-ferramenta
      3. Ambiente de análise forense:
         - Sandbox para análise de malware
         - Ferramentas de análise de memória e disco
         - Infraestrutura isolada para investigação

      **Prevenção:**
      4. IDS/IPS (Intrusion Detection/Prevention System) em pontos críticos da rede.
      5. EDR (Endpoint Detection and Response) em todos os endpoints.
      6. Network Detection and Response (NDR) para tráfego lateral.
      7. Honeypots para detecção precoce de atividade maliciosa.
    tools:
      - siem
      - soar
      - edr
      - ids-ips
      - ndr
      - threat-intelligence
      - sandbox
  devsecops:
    prose: |
      **Prevenção de incidentes no pipeline:**
      1. Integrar scanner de vulnerabilidades no pipeline com bloqueio de deploy
         para vulnerabilidades críticas (quality gate).
      2. Testes de segurança automatizados em cada merge request:
         - SAST para detecção de vulnerabilidades no código
         - Secret detection para prevenir vazamento de credenciais
         - Dependency scanning para bibliotecas vulneráveis
      3. Runbooks codificados para resposta a incidentes de segurança em aplicações:
         - Rollback automatizado em caso de vulnerabilidade crítica em produção
         - Feature flags para desabilitar funcionalidades comprometidas
         - Circuit breakers para isolar serviços comprometidos

      **Integração com resposta a incidentes:**
      4. Alertas automáticos ao SOC quando pipeline detecta anomalia.
      5. Geração automática de ticket de incidente quando vulnerabilidade crítica
         é detectada em produção.
      6. Logs de deploy auditáveis para investigação forense.
    tools:
      - gitlab-ci
      - sast-scanner
      - dast-scanner
      - secret-detection
      - feature-flags
      - incident-management
  secops:
    prose: |
      **Gestão do plano de resposta a incidentes:**
      1. Desenvolver e manter playbooks para cenários de incidentes relevantes:
         - Ransomware: isolamento, preservação de evidências, comunicação, recuperação
         - Vazamento de dados: contenção, avaliação de impacto, notificação SUSEP/LGPD
         - DDoS: mitigação, failover, comunicação
         - Comprometimento de credenciais: revogação, reset, investigação
         - Insider threat: coleta de evidências, contenção, ação disciplinar
      2. Estabelecer níveis de severidade com SLAs de resposta:
         - Crítico: resposta imediata, escalação ao diretor responsável
         - Alto: resposta em 1h, comunicação ao CISO
         - Médio: resposta em 4h
         - Baixo: resposta em 24h

      **Exercícios e testes:**
      3. Tabletop exercises trimestrais com cenários realistas.
      4. Simulações anuais de incidentes com equipe completa (red team/blue team).
      5. Testes de continuidade de negócios com cenários cibernéticos.

      **Registro e controle:**
      6. Sistema formal de registro de incidentes com campos obrigatórios.
      7. Métricas: MTTD, MTTR, número de incidentes por severidade, reincidência.
      8. Post-mortem obrigatório para incidentes de severidade alta ou crítica.
      9. Lições aprendidas incorporadas nos playbooks e na política.
    tools:
      - incident-management
      - soar
      - siem
      - grc-platform
      - tabletop-exercises
