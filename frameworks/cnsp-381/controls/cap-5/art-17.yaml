id: art-17
family: cap-5
title: "Responsabilidades do Conselho de Administração e da Diretoria"
class: CNSP-381
baselines: [all]
statement:
  prose: |
    Art. 17. O conselho de administração ou, na sua inexistência, a diretoria da
    supervisionada deve:

    I - aprovar a política de segurança cibernética e o plano de ação e de resposta
    a incidentes;

    II - assegurar a aderência da supervisionada à política de segurança cibernética
    e ao plano de ação e de resposta a incidentes;

    III - assegurar a alocação de recursos humanos, financeiros e tecnológicos
    adequados à manutenção da segurança cibernética.
guidance:
  prose: |
    O art. 17 estabelece a responsabilidade da alta administração pela segurança
    cibernética, elevando-a de questão técnica para questão de governança corporativa.

    **Hierarquia de responsabilidade:**
    O artigo define que a responsabilidade recai sobre:
    1. Conselho de administração (se existente): órgão máximo de governança
    2. Diretoria (na inexistência de conselho): órgão executivo

    A maioria das supervisionadas de médio e grande porte tem conselho de
    administração. Para seguradoras menores sem conselho, a diretoria assume
    essas responsabilidades.

    **Inciso I — Aprovação:**
    Dois documentos devem ser formalmente aprovados pelo conselho/diretoria:
    1. Política de segurança cibernética (art. 3-7)
    2. Plano de ação e de resposta a incidentes (art. 9-11)

    A aprovação deve ser:
    - Formal: deliberação em reunião registrada em ata
    - Informada: o conselho/diretoria deve entender o conteúdo
    - Periódica: novas versões exigem nova aprovação

    **Inciso II — Aderência:**
    O conselho/diretoria deve assegurar que a entidade de fato cumpre a política
    e o plano aprovados. Não basta aprovar — é preciso monitorar a implementação.
    Mecanismos:
    - Relatórios periódicos do diretor responsável (art. 18)
    - Relatório anual de implementação (art. 11)
    - Auditorias internas de aderência
    - Indicadores de segurança cibernética na pauta do conselho

    **Inciso III — Alocação de recursos:**
    O conselho/diretoria deve garantir recursos ADEQUADOS (não mínimos):
    - Recursos humanos: equipe de segurança dimensionada, treinamento
    - Recursos financeiros: orçamento para ferramentas, consultorias, melhorias
    - Recursos tecnológicos: infraestrutura de segurança, ferramentas de monitoramento

    "Adequados" é avaliado pela SUSEP conforme proporcionalidade (art. 2). Uma
    seguradora de grande porte não pode alegar falta de recursos para justificar
    controles inadequados.

    **Responsabilidade pessoal:**
    Os membros do conselho e diretores podem ser responsabilizados pessoalmente
    pela SUSEP em caso de negligência na supervisão da segurança cibernética.

    **Em inspeções, a SUSEP verifica:**
    1. Ata de aprovação da política e do plano pelo conselho/diretoria
    2. Frequência de deliberações sobre segurança cibernética
    3. Relatórios apresentados ao conselho/diretoria
    4. Orçamento alocado para segurança cibernética
    5. Dimensionamento da equipe de segurança
    6. Evidências de monitoramento de aderência
implementation_guidance:
  platform_engineering:
    prose: |
      **Dashboards executivos para governança:**
      1. Dashboard de segurança cibernética para o conselho/diretoria:
         - Estado geral de segurança (score de maturidade)
         - Incidentes no período (quantidade, severidade, tendência)
         - Vulnerabilidades abertas por severidade
         - Conformidade com a CNSP 381 por capítulo
         - Orçamento utilizado versus alocado
      2. Relatórios automatizados para reuniões do conselho:
         - Geração trimestral de relatório executivo
         - Indicadores-chave de segurança (KPIs/KRIs)
         - Comparação com benchmarks do setor
      3. Métricas de alocação de recursos:
         - Headcount de segurança versus total de TI
         - Investimento em segurança versus receita
         - Cobertura de ferramentas de segurança por sistema crítico

      **Suporte à aderência (inciso II):**
      4. Compliance monitoring automatizado:
         - Verificação contínua de controles de segurança
         - Alertas para desvios de conformidade
         - Relatório de aderência com status por artigo da CNSP 381
    tools:
      - compliance-dashboard
      - grc-platform
      - siem
      - vulnerability-management
      - reporting-automation
  devsecops:
    prose: |
      **Evidências de aderência para governança:**
      1. Métricas de segurança do ciclo de desenvolvimento:
         - Vulnerabilidades detectadas versus corrigidas por sprint
         - Cobertura de SAST/DAST/dependency scanning por projeto
         - Taxa de bloqueio de deploys por falha de segurança
         - Tempo médio de correção de vulnerabilidades
      2. Relatório automatizado de compliance do pipeline:
         - Projetos em conformidade versus não conformes
         - Evolução da maturidade de segurança por equipe
         - Investimento em ferramentas DevSecOps versus ROI
      3. Contribuição para o relatório anual (art. 11):
         - Dados automatizados do pipeline para seção de efetividade
         - Tendências de vulnerabilidades e correções

      **Alocação de recursos tecnológicos (inciso III):**
      4. Inventário de ferramentas de segurança no pipeline com custo.
      5. Gap analysis de ferramentas necessárias versus implementadas.
    tools:
      - gitlab-ci
      - compliance-dashboard
      - vulnerability-management
      - reporting-automation
  secops:
    prose: |
      **Suporte à governança do conselho/diretoria:**
      1. Pauta obrigatória de segurança cibernética em reuniões do conselho:
         - Mínimo trimestral (recomendado mensal para entidades de alto risco)
         - Conteúdo: estado de segurança, incidentes, compliance, riscos emergentes
      2. Preparação de material para deliberação:
         - Briefing executivo de segurança cibernética
         - Propostas de investimento com análise de risco-retorno
         - Recomendações do diretor responsável (art. 18)

      **Monitoramento de aderência (inciso II):**
      3. Assessment de aderência à política:
         - Trimestral: verificação de controles operacionais
         - Semestral: auditoria interna de segurança cibernética
         - Anual: assessment completo com relatório ao conselho
      4. Indicadores de aderência:
         - Percentual de controles implementados versus planejados
         - Não-conformidades abertas por severidade e idade
         - Incidentes decorrentes de não-aderência à política

      **Gestão de recursos (inciso III):**
      5. Proposta anual de orçamento de segurança cibernética:
         - Pessoal (contratação, treinamento, certificações)
         - Tecnologia (licenças, infraestrutura, ferramentas)
         - Serviços (consultorias, auditorias, testes de intrusão)
      6. Acompanhamento de execução orçamentária com relatório ao conselho.
      7. Benchmark de investimento em segurança versus pares do setor.

      **Documentação de governança:**
      8. Atas de todas as deliberações do conselho sobre segurança cibernética.
      9. Registro de aprovações de política e plano de resposta.
      10. Evidências de apresentação do relatório anual (art. 11).
    tools:
      - grc-platform
      - compliance-reporting
      - board-management
      - budget-management
