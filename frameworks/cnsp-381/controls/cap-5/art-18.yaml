id: art-18
family: cap-5
title: "Diretor Responsável pela Segurança Cibernética"
class: CNSP-381
baselines: [all]
statement:
  prose: |
    Art. 18. As supervisionadas devem designar diretor responsável pela política
    de segurança cibernética e pela execução do plano de ação e de resposta a
    incidentes.

    Parágrafo único. O diretor de que trata o caput pode desempenhar outras
    funções na supervisionada, desde que não haja conflito de interesses.
guidance:
  prose: |
    O art. 18 exige a designação formal de um diretor responsável pela segurança
    cibernética, personificando a accountability na estrutura organizacional.

    **Diretor responsável (caput):**
    Deve ser um DIRETOR — membro da diretoria estatutária da entidade, não
    gerente ou coordenador. A SUSEP quer accountability no nível de diretoria.

    Responsabilidades atribuídas:
    1. Política de segurança cibernética: supervisionar elaboração, implementação,
       manutenção e revisão
    2. Plano de ação e de resposta a incidentes: supervisionar execução, coordenar
       respostas, aprovar comunicações

    **Acumulação de funções (parágrafo único):**
    O diretor PODE acumular outras funções (ex: diretor de TI, diretor de riscos),
    desde que não haja conflito de interesses. Conflitos potenciais:
    - Diretor comercial: interesse em velocidade pode conflitar com segurança
    - Diretor financeiro: interesse em redução de custos pode comprometer investimentos
    - Diretor de TI: pode ter conflito entre agilidade e segurança (apesar de ser
      a combinação mais comum na prática)

    **Perfil esperado:**
    Embora a resolução não defina requisitos de qualificação, a SUSEP espera:
    - Conhecimento em segurança da informação/cibernética
    - Experiência em gestão de riscos
    - Capacidade de interlocução com o conselho de administração
    - Autonomia para tomar decisões de segurança

    **Notificação à SUSEP:**
    A designação do diretor responsável deve ser comunicada à SUSEP, conforme
    práticas regulatórias do setor. Alterações na designação também devem ser
    comunicadas.

    **Relação com o CISO:**
    O diretor responsável pode ou não ser o CISO da entidade:
    - Se a entidade tem CISO como diretor estatutário: o próprio CISO
    - Se o CISO não é diretor: um diretor é designado como responsável, e o
      CISO reporta tecnicamente a ele

    **Em inspeções, a SUSEP verifica:**
    1. Designação formal do diretor responsável (ata de diretoria/conselho)
    2. Comunicação à SUSEP da designação
    3. Análise de conflito de interesses documentada
    4. Evidências de atuação do diretor (reuniões, decisões, aprovações)
    5. Acesso do diretor ao conselho para reportar segurança cibernética
implementation_guidance:
  platform_engineering:
    prose: |
      **Suporte tecnológico ao diretor responsável:**
      1. Dashboard executivo personalizado para o diretor responsável:
         - Visão consolidada de segurança cibernética
         - Incidentes ativos e seu status de tratamento
         - Indicadores de risco cibernético (KRIs)
         - Status de conformidade com a CNSP 381
         - Pipeline de ações do plano de ação
      2. Sistema de alertas priorizado:
         - Notificação imediata de incidentes críticos
         - Alertas de desvios de conformidade
         - Resumo diário de eventos de segurança
      3. Ferramentas de aprovação e decisão:
         - Workflow de aprovação digital para política e plano
         - Registro de decisões com trilha de auditoria
         - Assinatura digital para documentos regulatórios

      **Gestão de identidade e acesso do diretor:**
      4. Acesso privilegiado do diretor a sistemas de segurança:
         - Dashboards de SIEM, SOAR, vulnerability management
         - Relatórios de compliance
         - Sistema de gestão de incidentes
    tools:
      - compliance-dashboard
      - executive-reporting
      - workflow-automation
      - digital-signature
      - siem
  devsecops:
    prose: |
      **Visibilidade para o diretor responsável:**
      1. Relatório automatizado de segurança do pipeline:
         - Vulnerabilidades por projeto e severidade
         - Taxa de conformidade com quality gates de segurança
         - Tendências de segurança no desenvolvimento
      2. Escalação automática ao diretor quando:
         - Vulnerabilidade crítica não corrigida dentro do SLA
         - Deploy bloqueado por razões de segurança com necessidade de exceção
         - Incidente de segurança originado no pipeline
      3. Processo de exceção de segurança:
         - Quando quality gate precisa ser contornado (deploy urgente)
         - Aprovação formal do diretor com registro de risco aceito
         - Prazo para remediação após exceção concedida
    tools:
      - gitlab-ci
      - vulnerability-management
      - incident-management
      - exception-management
  secops:
    prose: |
      **Estrutura de governança do diretor responsável:**
      1. Comitê de segurança cibernética (coordenado pelo diretor):
         - Reuniões mensais com equipe de segurança, TI e áreas de negócio
         - Pauta: incidentes, riscos, compliance, projetos em andamento
         - Ata com deliberações e ações definidas
      2. Linha de reporte:
         - Equipe de segurança/SOC → CISO → Diretor responsável → Conselho
         - Escalação direta ao diretor para incidentes críticos
         - Reporte trimestral ao conselho de administração

      **Responsabilidades operacionais do diretor:**
      3. Aprovação de documentos:
         - Política de segurança cibernética (antes de submissão ao conselho)
         - Plano de ação e de resposta a incidentes
         - Comunicações à SUSEP sobre incidentes (art. 10)
         - Comunicações à SUSEP sobre dados no exterior (art. 14)
      4. Supervisão da execução:
         - Acompanhamento do plano de ação (art. 9)
         - Revisão do relatório anual (art. 11)
         - Monitoramento de riscos de terceiros (arts. 12-15)
      5. Tomada de decisão:
         - Ativação de plano de resposta a incidentes críticos
         - Aprovação de exceções de segurança
         - Priorização de investimentos em segurança

      **Análise de conflito de interesses:**
      6. Documentação formal da análise de conflito de interesses:
         - Funções acumuladas pelo diretor
         - Análise de potenciais conflitos
         - Medidas mitigatórias (se aplicável)
         - Aprovação pelo conselho de administração
      7. Revisão anual da análise de conflito de interesses.
    tools:
      - grc-platform
      - compliance-reporting
      - board-management
      - incident-management
