id: art-10
family: cap-3
title: "Comunicação de Incidentes à SUSEP"
class: CNSP-381
baselines: [all]
statement:
  prose: |
    Art. 10. As supervisionadas devem comunicar à SUSEP a ocorrência de incidentes
    relevantes e as interrupções dos serviços relevantes, no prazo e na forma
    definidos em ato normativo do órgão.

    § 1º A comunicação de que trata o caput deve conter, no mínimo:
    I - a descrição do incidente;
    II - os riscos e as consequências identificados;
    III - as medidas adotadas para o seu tratamento;
    IV - a data do início e, quando houver, a data do término do incidente.

    § 2º As supervisionadas devem informar à SUSEP sobre as alterações relevantes
    na política de segurança cibernética ou no plano de ação e de resposta a
    incidentes.
guidance:
  prose: |
    O art. 10 estabelece a obrigação de comunicação à SUSEP sobre incidentes
    relevantes, definindo conteúdo mínimo e abrangência.

    **Conceito de "incidente relevante":**
    A resolução não define um critério quantitativo, mas incidentes relevantes
    incluem:
    - Interrupção de serviços essenciais (emissão de apólices, sinistros, portais)
    - Vazamento de dados pessoais ou sensíveis de segurados
    - Comprometimento de sistemas críticos (core insurance, financeiro)
    - Ataques que afetem a continuidade operacional
    - Incidentes que afetem múltiplos segurados ou beneficiários
    - Fraudes cibernéticas com impacto financeiro significativo

    **Prazo e forma:**
    O artigo remete a ato normativo específico da SUSEP para definir prazo e
    formato. Na prática, a SUSEP espera comunicação em prazos curtos:
    - Incidentes críticos: comunicação em até 24-48 horas
    - Interrupções de serviço: comunicação imediata se impactar segurados

    **Conteúdo mínimo da comunicação (§ 1º):**

    **I — Descrição do incidente:**
    O quê aconteceu, quais sistemas foram afetados, tipo de ataque ou falha.

    **II — Riscos e consequências:**
    Avaliação de impacto: dados comprometidos, clientes afetados, impacto
    financeiro, riscos residuais.

    **III — Medidas adotadas:**
    Ações de contenção, erradicação e recuperação. Demonstrar que a entidade
    agiu de forma tempestiva e adequada.

    **IV — Datas:**
    Data de início do incidente e, quando resolvido, data de término. Demonstra
    o tempo de resposta e recuperação.

    **Alterações na política (§ 2º):**
    Alterações relevantes na política de segurança cibernética ou no plano de
    resposta devem ser comunicadas à SUSEP. Isso permite ao supervisor avaliar
    se as mudanças são adequadas.

    **Relação com a LGPD:**
    Quando o incidente envolve dados pessoais, a comunicação à SUSEP não substitui
    a comunicação à ANPD (Autoridade Nacional de Proteção de Dados) exigida pela
    LGPD (art. 48). Ambas as comunicações são obrigatórias.

    **Em inspeções, a SUSEP verifica:**
    1. Registro de todos os incidentes relevantes comunicados
    2. Tempestividade das comunicações
    3. Completude do conteúdo (todos os itens do § 1º)
    4. Comunicação de alterações na política (§ 2º)
    5. Processo formal para classificar incidentes como "relevantes"
implementation_guidance:
  platform_engineering:
    prose: |
      **Automação da detecção e classificação:**
      1. Regras de correlação no SIEM para identificação automática de incidentes
         que atingem critérios de relevância:
         - Volume de dados afetados acima de threshold definido
         - Sistemas classificados como críticos afetados
         - Duração de indisponibilidade acima de SLA
         - Tipos de ataque específicos (ransomware, vazamento)
      2. Classificação automática de severidade com critérios objetivos.
      3. Workflow automático de escalação quando incidente é classificado como
         relevante, incluindo trigger para preparação da comunicação à SUSEP.

      **Infraestrutura de comunicação:**
      4. Template padronizado de comunicação à SUSEP com todos os campos
         obrigatórios do § 1º.
      5. Sistema de tracking de comunicações à SUSEP com SLA de envio.
      6. Integração com sistema de incidentes para preenchimento automático
         de dados (datas, sistemas afetados, medidas adotadas).
    tools:
      - siem
      - soar
      - incident-management
      - notification-system
      - compliance-tracking
  devsecops:
    prose: |
      **Detecção e resposta no pipeline:**
      1. Alertas automáticos ao SOC quando pipeline detecta:
         - Vulnerabilidades críticas em produção (zero-day)
         - Comprometimento de credenciais em repositório
         - Alterações não autorizadas em código de produção
      2. Integração do pipeline com sistema de incidentes para criação
         automática de tickets quando evento de segurança é detectado.
      3. Logs de pipeline e deploy retidos como evidência forense.

      **Rastreabilidade para comunicação:**
      4. Audit trail completo de mudanças em sistemas críticos.
      5. Timestamped logs para comprovar timeline do incidente.
      6. Relatório automatizado de medidas técnicas adotadas (rollback,
         patches aplicados, configurações alteradas).
    tools:
      - gitlab-ci
      - incident-management
      - audit-log
      - vulnerability-management
  secops:
    prose: |
      **Processo de comunicação à SUSEP:**
      1. Critérios formais documentados para classificar incidente como "relevante":
         - Matriz de classificação com critérios objetivos
         - Aprovação do diretor responsável (art. 18) para comunicação
         - Validação jurídica do conteúdo antes do envio
      2. Workflow de comunicação:
         - Detecção do incidente → classificação → decisão de relevância
         - Preparação do comunicado (template padronizado)
         - Revisão pelo diretor responsável
         - Envio à SUSEP dentro do prazo normativo
         - Atualizações periódicas até resolução do incidente

      **Template de comunicação (§ 1º):**
      3. Documento padronizado contendo:
         - I. Descrição: tipo de incidente, sistemas afetados, vetor de ataque
         - II. Riscos e consequências: dados comprometidos, segurados afetados,
           impacto financeiro estimado, riscos residuais
         - III. Medidas adotadas: contenção, erradicação, recuperação, melhorias
         - IV. Datas: início do incidente, detecção, contenção, resolução

      **Comunicação de alterações (§ 2º):**
      4. Processo para comunicar alterações na política ou plano de resposta:
         - Identificação de alteração relevante
         - Preparação de sumário de alterações
         - Envio à SUSEP após aprovação do conselho/diretoria

      **Coordenação com LGPD:**
      5. Processo paralelo de comunicação à ANPD quando dados pessoais envolvidos.
      6. Coordenação entre comunicação à SUSEP e à ANPD para consistência.
    tools:
      - incident-management
      - grc-platform
      - compliance-reporting
      - legal-management
