id: art-11
family: cap-3
title: "Relatório Anual de Implementação"
class: CNSP-381
baselines: [all]
statement:
  prose: |
    Art. 11. As supervisionadas devem elaborar relatório anual sobre a implementação
    do plano de ação e de resposta a incidentes.

    Parágrafo único. O relatório de que trata o caput deve contemplar, no mínimo:
    I - a efetividade da implementação das ações descritas no plano de ação e de
    resposta a incidentes;
    II - o resumo dos resultados obtidos na implementação das rotinas, dos
    procedimentos, dos controles e das tecnologias a serem utilizados na prevenção
    e na resposta a incidentes;
    III - os incidentes relevantes ocorridos no período;
    IV - os resultados dos testes de continuidade de negócios, considerando cenários
    de incidentes cibernéticos.
guidance:
  prose: |
    O art. 11 institui o relatório anual como instrumento de accountability e
    melhoria contínua da segurança cibernética.

    **Natureza do relatório:**
    Não é um documento meramente burocrático. É a ferramenta principal para:
    - Demonstrar à SUSEP que o plano está sendo implementado
    - Avaliar a efetividade dos controles de segurança cibernética
    - Identificar gaps e definir melhorias para o próximo ciclo
    - Informar o conselho de administração e a diretoria

    **Inciso I — Efetividade da implementação:**
    Avaliação qualitativa e quantitativa de quanto do plano de ação foi
    efetivamente implementado:
    - Percentual de ações concluídas versus planejadas
    - Análise de desvios (ações atrasadas, canceladas, repriorizadas)
    - Indicadores de efetividade (redução de incidentes, tempo de resposta)

    **Inciso II — Resumo de resultados:**
    Síntese dos resultados operacionais:
    - Rotinas executadas e seus resultados (monitoramento, revisão de logs)
    - Procedimentos aplicados (playbooks executados, escalações)
    - Controles implementados e seu desempenho (taxas de detecção, falsos positivos)
    - Tecnologias implementadas e sua eficácia

    **Inciso III — Incidentes relevantes:**
    Lista e análise dos incidentes relevantes ocorridos no período:
    - Tipo, severidade, duração e impacto de cada incidente
    - Ações de resposta adotadas
    - Causa raiz identificada
    - Melhorias implementadas após cada incidente

    **Inciso IV — Testes de continuidade:**
    Resultados dos testes de continuidade de negócios com cenários cibernéticos:
    - Cenários testados (ransomware, DDoS, vazamento massivo)
    - Resultados obtidos versus esperados
    - Gaps identificados
    - Plano de correção

    **Destinatários do relatório:**
    O relatório deve ser apresentado ao conselho de administração ou diretoria
    (art. 17) e mantido disponível à SUSEP (art. 8, III).

    **Em inspeções, a SUSEP verifica:**
    1. Existência do relatório anual
    2. Cobertura dos quatro incisos do parágrafo único
    3. Profundidade da análise de efetividade
    4. Coerência entre incidentes reportados e comunicações à SUSEP (art. 10)
    5. Evidência de apresentação ao conselho/diretoria
    6. Ações de melhoria derivadas do relatório
implementation_guidance:
  platform_engineering:
    prose: |
      **Coleta automatizada de dados para o relatório:**
      1. Dashboard de métricas de segurança cibernética com dados para o relatório:
         - Incidentes por severidade, tipo e sistema
         - MTTD (Mean Time to Detect) e MTTR (Mean Time to Respond)
         - Vulnerabilidades abertas por severidade e idade
         - Taxa de conformidade dos controles técnicos
         - Disponibilidade dos sistemas críticos
      2. Exportação automatizada de dados do SIEM, SOAR e ferramentas de
         vulnerabilidade para alimentar o relatório.
      3. Geração automática de seções do relatório a partir de dados coletados.

      **Testes de continuidade (inciso IV):**
      4. Infraestrutura de disaster recovery com testes automatizados:
         - Failover automático para região secundária
         - Testes de restauração de backup com métricas de tempo
         - Simulação de indisponibilidade de serviços críticos
      5. Registros automatizados dos testes com resultados e evidências.
    tools:
      - siem
      - soar
      - vulnerability-management
      - disaster-recovery
      - compliance-dashboard
      - reporting-automation
  devsecops:
    prose: |
      **Dados do pipeline para o relatório:**
      1. Métricas de segurança do pipeline para seção de efetividade:
         - Vulnerabilidades detectadas por SAST/DAST/dependency scanning
         - Taxa de resolução de vulnerabilidades por sprint
         - Tempo médio de correção por severidade
         - Cobertura de testes de segurança por projeto
      2. Relatório de incidentes originados no pipeline:
         - Vulnerabilidades críticas em produção detectadas pelo pipeline
         - Secrets detectados e tratados
         - Deploys bloqueados por quality gates de segurança
      3. Evidências de melhoria contínua:
         - Redução de vulnerabilidades ao longo do tempo
         - Aumento da cobertura de testes de segurança
         - Redução do tempo de correção

      **Testes de continuidade no pipeline:**
      4. Testes automatizados de rollback e recuperação de aplicações.
      5. Chaos engineering para validar resiliência de serviços.
    tools:
      - gitlab-ci
      - vulnerability-management
      - compliance-dashboard
      - chaos-engineering
  secops:
    prose: |
      **Elaboração do relatório anual:**
      1. Estrutura do relatório seguindo os incisos do parágrafo único:
         I. Efetividade da implementação:
            - Status de cada ação do plano (concluída, em andamento, atrasada)
            - KPIs de segurança cibernética versus metas
            - Análise de gaps e plano de correção
         II. Resultados operacionais:
            - Rotinas executadas (monitoramento, revisão, patching)
            - Procedimentos aplicados (playbooks, escalações)
            - Desempenho dos controles (detecção, prevenção)
            - Tecnologias implementadas e ROI
         III. Incidentes relevantes:
            - Lista completa com análise de cada incidente
            - Tendências e padrões identificados
            - Ações corretivas e preventivas implementadas
         IV. Testes de continuidade:
            - Cenários testados e resultados
            - Tempos de recuperação obtidos versus RTO/RPO
            - Gaps e plano de melhoria

      **Processo de elaboração:**
      2. Coleta de dados de todas as áreas envolvidas (TI, segurança, negócios).
      3. Consolidação e análise por equipe de segurança cibernética.
      4. Revisão pelo diretor responsável (art. 18).
      5. Apresentação ao conselho de administração ou diretoria (art. 17).
      6. Arquivo por mínimo de 5 anos (art. 8).

      **Cronograma:**
      7. Elaboração: janeiro-fevereiro do ano seguinte ao reportado.
      8. Revisão e aprovação: março.
      9. Apresentação ao conselho: primeira reunião após aprovação.
    tools:
      - grc-platform
      - compliance-reporting
      - siem
      - incident-management
      - business-continuity
