id: art-2
family: cap-1
title: "Âmbito de Aplicação e Proporcionalidade"
class: CNSP-381
baselines: [all]
statement:
  prose: |
    Art. 2. As disposições desta Resolução aplicam-se às sociedades seguradoras,
    entidades abertas de previdência complementar, sociedades de capitalização e
    resseguradores locais, doravante denominados supervisionados.

    Parágrafo único. A política de segurança cibernética e os requisitos desta Resolução
    devem ser proporcionais ao porte, perfil de risco, modelo de negócio, natureza das
    operações, complexidade dos produtos e serviços e sensibilidade dos dados tratados
    pela supervisionada.
guidance:
  prose: |
    O art. 2 estabelece dois pontos fundamentais:

    **1. Sujeitos regulados (caput):**
    Quatro categorias de entidades supervisionadas pela SUSEP estão obrigadas ao
    cumprimento integral desta Resolução:
    - Sociedades seguradoras: seguros de vida, não-vida, saúde suplementar
    - Entidades abertas de previdência complementar (EAPC): planos de previdência
      privada abertos (PGBL, VGBL)
    - Sociedades de capitalização: títulos de capitalização
    - Resseguradores locais: empresas de resseguro sediadas no Brasil

    Entidades de previdência complementar fechada (fundos de pensão) NÃO estão no
    escopo — são reguladas pela PREVIC, não pela SUSEP.

    **2. Princípio da proporcionalidade (parágrafo único):**
    A SUSEP reconhece que entidades de diferentes portes e complexidades não podem
    ser submetidas aos mesmos requisitos de forma uniforme. Seis critérios de
    proporcionalidade devem ser considerados:
    - Porte da entidade (receita, número de segurados, ativos)
    - Perfil de risco (ramos de atuação, exposição a riscos cibernéticos)
    - Modelo de negócio (digital, tradicional, híbrido)
    - Natureza das operações (varejo, grandes riscos, resseguro)
    - Complexidade dos produtos e serviços (simples vs. estruturados)
    - Sensibilidade dos dados tratados (dados pessoais, dados de saúde, dados financeiros)

    **Implicação prática:**
    Uma seguradora digital com milhões de clientes e dados de saúde terá requisitos
    mais rigorosos do que uma sociedade de capitalização de pequeno porte com poucos
    produtos. A proporcionalidade NÃO é isenção — é adequação do nível de controles.

    **Como a SUSEP avalia proporcionalidade:**
    Em inspeções, a SUSEP verifica se a entidade documentou formalmente sua análise
    de proporcionalidade, justificando o nível de controles adotado. Não basta alegar
    "somos pequenos" — é necessário demonstrar a análise.
implementation_guidance:
  platform_engineering:
    prose: |
      **Análise de proporcionalidade técnica:**
      1. Documentar formalmente a classificação da entidade em cada critério de
         proporcionalidade (porte, perfil de risco, modelo de negócio, natureza das
         operações, complexidade dos produtos, sensibilidade dos dados).
      2. Criar matriz de proporcionalidade que mapeia cada critério para o nível de
         controles técnicos exigidos (básico, intermediário, avançado).
      3. Manter inventário automatizado de ativos digitais, classificados por
         criticidade e sensibilidade dos dados.

      **Infraestrutura proporcional:**
      4. Dimensionar controles de segurança cibernética conforme a classificação:
         - Básico: firewall, antivírus, backup, controle de acesso
         - Intermediário: SIEM, IDS/IPS, WAF, MFA, criptografia em trânsito e repouso
         - Avançado: SOC 24/7, SOAR, threat intelligence, red team, zero trust
      5. Automatizar a coleta de métricas que demonstram a proporcionalidade
         (número de sistemas, volume de dados, número de usuários, incidentes).
      6. Dashboard de conformidade que evidencia a adequação proporcional.
    tools:
      - cmdb
      - asset-inventory
      - compliance-scanner
      - grc-platform
  devsecops:
    prose: |
      **Classificação de projetos por sensibilidade:**
      1. Implementar labels de classificação em repositórios GitLab/GitHub conforme
         a sensibilidade dos dados tratados pelo sistema.
      2. Definir pipelines de segurança diferenciados por nível de classificação:
         - Classificação alta: SAST + DAST + dependency scanning + container scanning +
           secret detection + code review obrigatório + aprovação de segurança
         - Classificação média: SAST + dependency scanning + secret detection +
           code review obrigatório
         - Classificação baixa: SAST + secret detection + code review
      3. Documentar no README de cada projeto sua classificação e justificativa.

      **Evidências automatizadas:**
      4. Pipeline que gera relatório de conformidade por projeto, incluindo nível
         de controles aplicados e justificativa de proporcionalidade.
      5. Integração com GRC para registro automático de evidências de pipeline.
    tools:
      - gitlab-ci
      - sast-scanner
      - dependency-scanning
      - secret-detection
      - compliance-labels
  secops:
    prose: |
      **Gestão da proporcionalidade:**
      1. Realizar assessment anual de proporcionalidade, revisando os seis critérios
         do parágrafo único e atualizando a classificação da entidade.
      2. Documentar formalmente a análise de proporcionalidade em relatório aprovado
         pelo conselho de administração ou diretoria.
      3. Manter registro histórico das classificações para demonstrar evolução.

      **Monitoramento proporcional:**
      4. Definir SLAs de resposta a incidentes proporcionais à classificação:
         - Crítico (dados de saúde, grande volume): resposta em 1h, resolução em 4h
         - Alto (dados financeiros): resposta em 2h, resolução em 8h
         - Médio (dados pessoais simples): resposta em 4h, resolução em 24h
      5. Frequência de testes de intrusão proporcional ao perfil de risco.
      6. Preparar documentação para inspeções da SUSEP demonstrando a análise
         de proporcionalidade e sua aplicação prática nos controles.
    tools:
      - grc-platform
      - risk-assessment
      - incident-management
      - compliance-reporting
