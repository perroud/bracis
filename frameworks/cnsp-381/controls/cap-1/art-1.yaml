id: art-1
family: cap-1
title: "Objeto da Resolucao"
class: CNSP-381
baselines: [all]
statement:
  prose: |
    Art. 1. Esta Resolução dispõe sobre a política de segurança cibernética e sobre os
    requisitos para a contratação de serviços de processamento e armazenamento de dados e
    de computação em nuvem a serem observados pelas sociedades seguradoras, entidades
    abertas de previdência complementar, sociedades de capitalização e resseguradores locais.
guidance:
  prose: |
    O art. 1 define o objeto duplo da resolucao:
    1. Politica de seguranca cibernetica (Capitulos 2 e 3)
    2. Requisitos para contratacao de servicos de nuvem (Capitulo 4)

    **Escopo regulatorio:**
    A resolucao trata especificamente de seguranca cibernetica, nao apenas de seguranca
    da informacao generica. Abrange ameacas digitais, ataques a sistemas, protecao de
    dados em meios eletronicos e resiliencia cibernetica.

    **Servicos de nuvem abrangidos:**
    A resolucao cobre tres categorias de servicos:
    - Processamento de dados: qualquer operacao computacional sobre dados (IaaS, PaaS, SaaS)
    - Armazenamento de dados: persistencia de dados em infraestrutura de terceiros
    - Computacao em nuvem: uso de recursos computacionais provisionados remotamente

    **Sujeitos regulados:**
    Quatro categorias de entidades supervisionadas pela SUSEP:
    - Sociedades seguradoras: empresas de seguros de vida, nao-vida, saude suplementar
    - Entidades abertas de previdencia complementar (EAPC): planos de previdencia privada abertos
    - Sociedades de capitalizacao: titulos de capitalizacao
    - Resseguradores locais: empresas de resseguro sediadas no Brasil

    **Relacao com a Resolucao Bacen 4893:**
    A CNSP 381 foi inspirada diretamente na Resolucao Bacen 4893 (originalmente 4658/2018),
    adaptada para o mercado de seguros. A estrutura e muito similar, com ajustes para as
    especificidades do setor securitario.

    **Implicacao pratica:**
    Toda entidade supervisionada pela SUSEP que se enquadre nas categorias acima deve
    cumprir integralmente esta resolucao. A fiscalizacao e feita pela SUSEP, nao pelo
    Banco Central.
implementation_guidance:
  platform_engineering:
    prose: |
      **Mapeamento de escopo:**
      1. Inventario completo de todos os servicos de processamento, armazenamento e
         computacao em nuvem contratados pela entidade supervisionada.
      2. Classificacao de cada servico nas categorias da resolucao (processamento,
         armazenamento, computacao).
      3. Mapeamento de provedores de nuvem (publicos, privados, hibridos) com
         detalhamento de servicos utilizados.
      4. Registro centralizado de contratos de servicos de nuvem com metadados
         regulatorios (data, provedor, localizacao, dados tratados).

      **Infraestrutura de conformidade:**
      5. Landing zone segura com controles de seguranca cibernetica embutidos.
      6. Cloud Asset Inventory automatizado (AWS Config, Azure Resource Graph, GCP Asset Inventory).
      7. Tagging obrigatorio de recursos com classificacao regulatoria (CNSP 381).
      8. Dashboard de conformidade com a CNSP 381 em tempo real.
    tools:
      - cloud-asset-inventory
      - cmdb
      - compliance-scanner
      - tagging-policies
  devsecops:
    prose: |
      **Consciencia regulatoria no desenvolvimento:**
      1. Documentacao dos requisitos da CNSP 381 acessivel a toda equipe de desenvolvimento.
      2. Checklist de seguranca cibernetica integrado ao processo de code review.
      3. Security champions com conhecimento da resolucao em cada squad.

      **Pipeline com controles regulatorios:**
      4. Verificacao automatica de que todo deploy em nuvem esta mapeado no inventario.
      5. Bloqueio de deploy em provedores ou regioes nao aprovados.
      6. Tag enforcement no pipeline de IaC para garantir rastreabilidade regulatoria.
      7. Alertas quando novo servico de nuvem e provisionado fora do inventario.
    tools:
      - gitlab-ci
      - checkov
      - opa-gatekeeper
      - policy-engine
  secops:
    prose: |
      **Gestao do escopo regulatorio:**
      1. Inventario atualizado de todos os servicos de nuvem da entidade.
      2. Revisao trimestral do inventario para identificar shadow IT em nuvem.
      3. Processo formal de aprovacao para contratacao de novos servicos de nuvem.
      4. Comunicacao a SUSEP conforme exigencias da resolucao, quando aplicavel.

      **Monitoramento de conformidade:**
      5. Assessment periodico de conformidade com todos os capitulos da resolucao.
      6. Gap analysis com plano de remediacao priorizado.
      7. Relatorio de conformidade para o conselho de administracao (art. 17).
      8. Retencao de evidencias de conformidade por 5 anos (minimo).
    tools:
      - grc-platform
      - cmdb
      - asset-inventory
      - compliance-scanner
