related_frameworks:
  - framework_id: bacen-4893
    relationship: equivalent-to
    description: >-
      A Resolucao CNSP 381/2020 e o analogo da Resolucao Bacen 4893 para o mercado de
      seguros. Ambas tratam de politica de seguranca cibernetica e requisitos para
      contratacao de servicos de nuvem, com estrutura e requisitos muito similares.
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD complementa a CNSP 381 na protecao de dados pessoais tratados por
      seguradoras, EAPCs, sociedades de capitalizacao e resseguradores, exigindo medidas
      de seguranca e comunicacao de incidentes.
  - framework_id: nist-800-53-rev5
    relationship: mapped
    description: "Os controles do NIST 800-53 rev5 oferecem mapeamento detalhado para implementacao tecnica dos requisitos da CNSP 381."
    mapping_file: "mappings/cnsp-381_to_nist-800-53-rev5.yaml"
  - framework_id: iso-27001-2022
    relationship: mapped
    description: "A ISO 27001:2022 fornece o framework de gestao de seguranca da informacao que suporta a conformidade com a CNSP 381."
    mapping_file: "mappings/cnsp-381_to_iso-27001-2022.yaml"
