id: pip-6
family: principles
title: "Principle 6 — Accuracy"
class: PIPEDA
statement:
  prose: >-
    Personal information shall be as accurate, complete, and up-to-date as is necessary for the
    purposes for which it is to be used.
  parts:
    - id: pip-6.4.6.1
      label: "4.6.1"
      prose: >-
        The extent to which personal information shall be accurate, complete, and up-to-date
        will depend upon the use of the information, taking into account the interests of the
        individual. Information shall be sufficiently accurate, complete, and up-to-date to
        minimise the possibility that inappropriate information may be used to make a decision
        about the individual.
    - id: pip-6.4.6.2
      label: "4.6.2"
      prose: >-
        An organization shall not routinely update personal information, unless such a process
        is necessary to fulfil the purposes for which the information was collected.
    - id: pip-6.4.6.3
      label: "4.6.3"
      prose: >-
        Personal information that is used on an ongoing basis, including information that is
        disclosed to third parties, should generally be accurate and up-to-date, unless limits
        to the requirement for accuracy are clearly set out.
guidance:
  prose: >-
    The accuracy principle is purpose-dependent — the required level of accuracy depends on what
    the data is used for. Medical records and credit decisions demand high accuracy. Marketing
    mailing lists have lower accuracy requirements. Key points: (1) accuracy is proportional to
    impact — data used for decisions affecting individuals must be highly accurate; (2) organizations
    should not update data unnecessarily (clause 4.6.2) — this prevents pretextual data collection
    disguised as "updating records"; (3) ongoing processing requires ongoing accuracy — stale data
    being actively used violates this principle; (4) data disclosed to third parties must be
    accurate, as inaccurate data shared externally can cause harm the organization cannot control.
    In technical systems, this means implementing data quality checks, correction mechanisms,
    and propagation of corrections across all systems using the data.
implementation_guidance:
  platform_engineering:
    prose: >-
      DATA QUALITY FRAMEWORK: Implement automated data quality checks as a platform service.
      Validate personal information against defined accuracy rules at ingestion and periodically.
      CORRECTION PROPAGATION: Build event-driven data correction pipelines. When personal
      information is corrected in one system, propagate the correction to all dependent systems
      automatically. Track propagation status and alert on failures. SELF-SERVICE CORRECTION:
      Provide APIs for individuals to review and correct their personal information. Implement
      change tracking that records what was corrected, when, and in which systems. ACCURACY
      SCORING: Implement data quality scoring per record — track completeness, consistency, and
      timeliness. Use scores to prioritize accuracy improvements for data used in decision-making.
      THIRD-PARTY SYNC: For data disclosed to third parties, implement accuracy verification
      before disclosure and correction notification mechanisms.
    tools:
      - "Data quality validation frameworks (Great Expectations, Deequ)"
      - "Event-driven correction propagation (Kafka/NATS)"
      - "Self-service data correction APIs"
      - "Data quality scoring and monitoring dashboards"
      - "Third-party data sync with accuracy verification"
  devsecops:
    prose: >-
      DATA VALIDATION: CI/CD checks must verify that data ingestion pipelines include validation
      rules for personal information fields. CORRECTION TESTING: Automated tests must verify
      that data corrections propagate correctly across all dependent systems within defined SLAs.
      SCHEMA EVOLUTION: Database migration reviews must assess impact on data accuracy when schema
      changes affect personal information fields. QUALITY GATES: Pipeline gates for data-intensive
      services must include data quality threshold checks.
    tools:
      - "Data validation rule testing in CI/CD"
      - "Correction propagation integration tests"
      - "Schema migration impact analysis tools"
      - "Data quality gate checks in deployment pipelines"
      - "Automated accuracy regression tests"
  secops:
    prose: >-
      ACCURACY MONITORING: Monitor data quality metrics for personal information used in
      decision-making. Alert on accuracy degradation. CORRECTION TRACKING: Track data correction
      requests and their propagation. Alert when corrections are not completed within defined SLAs.
      STALE DATA DETECTION: Identify personal information that has not been updated within expected
      timeframes for its use case. THIRD-PARTY ACCURACY: Monitor accuracy of personal information
      shared with third parties. Verify correction notifications are sent and acknowledged.
    tools:
      - "Data quality monitoring dashboards"
      - "Correction SLA tracking and alerting"
      - "Stale data detection scanning"
      - "Third-party data accuracy audit tools"
      - "Decision-impacting data quality reports"
