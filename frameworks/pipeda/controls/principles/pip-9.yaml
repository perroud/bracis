id: pip-9
family: principles
title: "Principle 9 — Individual Access"
class: PIPEDA
statement:
  prose: >-
    Upon request, an individual shall be informed of the existence, use, and disclosure of his or
    her personal information and shall be given access to that information. An individual shall be
    able to challenge the accuracy and completeness of the information and have it amended as
    appropriate.
  parts:
    - id: pip-9.4.9.1
      label: "4.9.1"
      prose: >-
        Upon request, an organization shall inform an individual whether or not the organization
        holds personal information about the individual. Organizations are encouraged to indicate
        the source of this information. The organization shall allow the individual access to
        this information. However, the organization may choose to make sensitive medical
        information available through a medical practitioner. In addition, the organization shall
        provide an account of the use that has been made or is being made of this information
        and an account of the third parties to which it has been disclosed.
    - id: pip-9.4.9.2
      label: "4.9.2"
      prose: >-
        An organization shall respond to an individual's request within a reasonable time and at
        minimal or no cost to the individual. The requested information shall be provided or
        made available in a form that is generally understandable. For example, if the
        organization uses abbreviations or codes to record information, an explanation shall
        be provided.
    - id: pip-9.4.9.3
      label: "4.9.3"
      prose: >-
        When an individual successfully demonstrates the inaccuracy or incompleteness of personal
        information, the organization shall amend the information as required. Depending upon
        the nature of the information challenged, amendment involves the correction, deletion,
        or addition of information. Where appropriate, the amended information shall be
        transmitted to third parties having access to the information in question.
    - id: pip-9.4.9.4
      label: "4.9.4"
      prose: >-
        When a challenge is not resolved to the satisfaction of the individual, the substance
        of the unresolved challenge shall be recorded by the organization. When appropriate,
        the existence of the unresolved challenge shall be transmitted to third parties having
        access to the information in question.
    - id: pip-9.4.9.5
      label: "4.9.5"
      prose: >-
        In certain situations, an organization may not be able to provide access to all the
        personal information it holds about an individual. Exceptions should be limited and
        specific. The reasons for denying access shall be provided to the individual upon request.
        Exceptions may include information that is prohibitively costly to provide, information
        that contains references to other individuals, information that cannot be disclosed for
        legal, security, or commercial proprietary reasons, and information that is subject to
        solicitor-client or litigation privilege.
guidance:
  prose: >-
    This is PIPEDA's right of access — equivalent to GDPR's Subject Access Request (SAR). Key
    requirements: (1) organizations must confirm whether they hold data about the individual;
    (2) they must provide the actual data, not just a summary; (3) they must explain how the data
    has been used and who it has been disclosed to; (4) response must be within 30 days (PIPEDA
    section 8(3)); (5) cost must be minimal or zero; (6) data must be in an understandable format.
    The correction right is equally important — when individuals demonstrate inaccuracy, the
    organization must correct the data and propagate corrections to third parties. The OPC has
    found violations where organizations: took too long to respond, charged excessive fees,
    provided incomplete information, failed to correct acknowledged errors, or applied exceptions
    too broadly. In technical systems, this requires: data inventory across all systems, automated
    data retrieval and export, correction mechanisms with third-party propagation, and audit
    trails for all access requests.
implementation_guidance:
  platform_engineering:
    prose: >-
      DATA SUBJECT ACCESS API: Build a centralized API for processing access requests. The API
      must query all systems holding personal information, aggregate results, and return data
      in a standardized, human-readable format. Implement request tracking with SLA enforcement.
      DATA PORTABILITY: Provide personal information in machine-readable formats (JSON, CSV) in
      addition to human-readable formats. DATA INVENTORY: Maintain a real-time data inventory
      mapping individuals to all data stores containing their personal information. Use data
      lineage tracking to identify all systems. CORRECTION PIPELINE: Build an automated correction
      pipeline that propagates amendments to all systems and third parties. Track correction
      completion and notify the individual. EXCEPTION HANDLING: Implement workflows for access
      exceptions with mandatory justification, legal review gates, and individual notification.
    tools:
      - "Data Subject Access Request (DSAR) orchestration API"
      - "Cross-system data retrieval and aggregation service"
      - "Data lineage tracking (Apache Atlas, OpenLineage)"
      - "Correction propagation pipeline with completion tracking"
      - "DSAR workflow management with SLA enforcement"
  devsecops:
    prose: >-
      ACCESS REQUEST TESTING: Automated tests must verify that data subject access requests
      retrieve data from all systems within the 30-day SLA. COMPLETENESS VERIFICATION: Pipeline
      checks must verify that new data stores are registered in the data inventory and included
      in access request processing. CORRECTION TESTING: Integration tests must verify that data
      corrections propagate to all dependent systems and third-party recipients. FORMAT TESTING:
      Automated checks must verify that exported personal information is in understandable,
      standardized formats.
    tools:
      - "DSAR completeness integration tests"
      - "Data inventory registration verification in CI/CD"
      - "Correction propagation end-to-end tests"
      - "Export format validation and accessibility checks"
      - "SLA compliance testing for access request pipelines"
  secops:
    prose: >-
      REQUEST MONITORING: Track all data subject access requests. Monitor response times against
      30-day SLA. Alert on approaching deadlines. COMPLETENESS AUDITING: Periodic audits to
      verify access request responses include data from all systems. Cross-reference data
      inventory with actual data stores. CORRECTION TRACKING: Monitor correction request
      processing and third-party propagation completion. EXCEPTION AUDITING: Review access
      exceptions for appropriate justification. Flag patterns of excessive denial.
    tools:
      - "DSAR management dashboard with SLA tracking"
      - "Data inventory completeness auditing"
      - "Correction propagation monitoring"
      - "Access exception review and audit tools"
      - "OPC complaint readiness reporting"
