id: pip-8
family: principles
title: "Principle 8 — Openness"
class: PIPEDA
statement:
  prose: >-
    An organization shall make readily available to individuals specific information about its
    policies and practices relating to the management of personal information.
  parts:
    - id: pip-8.4.8.1
      label: "4.8.1"
      prose: >-
        Organizations shall be open about their policies and practices with respect to the
        management of personal information. Individuals shall be able to acquire information
        about an organization's policies and practices without unreasonable effort. This
        information shall be made available in a form that is generally understandable.
    - id: pip-8.4.8.2
      label: "4.8.2"
      prose: >-
        The information made available shall include (a) the name or title, and the address, of
        the person who is accountable for the organization's policies and practices and to whom
        complaints or inquiries can be forwarded; (b) the means of gaining access to personal
        information held by the organization; (c) a description of the type of personal information
        held by the organization, including a general account of its use; (d) a copy of any
        brochures or other information that explain the organization's policies, standards, or
        codes; and (e) what personal information is made available to related organizations.
    - id: pip-8.4.8.3
      label: "4.8.3"
      prose: >-
        An organization may make information on its policies and practices available in a variety
        of ways. The method chosen depends on the nature of its business and other considerations.
        For example, an organization may choose to make brochures available in its place of
        business, mail information to its customers, provide online access, or establish a
        toll-free telephone number.
guidance:
  prose: >-
    Openness requires proactive transparency — not just responding to inquiries, but making
    privacy information actively available. The OPC's guidelines on meaningful consent emphasize
    that privacy policies must be: (1) written in plain language — legal jargon fails this
    principle; (2) easily accessible — not buried in website footers or behind multiple clicks;
    (3) comprehensive — covering all the elements in clause 4.8.2; (4) current — reflecting
    actual practices, not aspirational or outdated statements. The OPC has found violations
    where privacy policies did not accurately describe data practices, where contact information
    for the privacy officer was missing or outdated, and where policies were only available in
    one language when the organization served both English and French communities. For digital
    platforms, this means: prominent privacy policy links, layered/tiered privacy notices,
    just-in-time notifications at collection points, and machine-readable privacy policies.
implementation_guidance:
  platform_engineering:
    prose: >-
      PRIVACY DOCUMENTATION API: Build a privacy documentation service that serves current
      privacy policies, data practices descriptions, and contact information via API. Support
      versioning and localization (en/fr for Canadian operations). LAYERED NOTICES: Implement
      tiered privacy notice infrastructure — short notices at collection points linking to
      detailed policy sections. MACHINE-READABLE POLICIES: Generate machine-readable privacy
      policy representations (P3P successor formats, schema.org) from the same source of truth
      as human-readable policies. DATA INVENTORY EXPOSURE: Build a self-service portal where
      individuals can see what categories of their personal information the organization holds
      and how it is used. CHANGE NOTIFICATION: Implement privacy policy change notification
      system — when policies change, affected individuals are notified through their preferred
      channel.
    tools:
      - "Privacy documentation API with versioning and i18n"
      - "Content management system for layered privacy notices"
      - "Schema.org structured data for privacy policies"
      - "Self-service privacy portal"
      - "Policy change notification service"
  devsecops:
    prose: >-
      DOCUMENTATION SYNC: CI/CD checks must verify that privacy policy documentation matches
      actual data handling code. When data practices change, pipeline gates require corresponding
      policy updates. ACCESSIBILITY: Automated accessibility testing must verify privacy policies
      meet WCAG standards for readability. LOCALIZATION: Pipeline checks must verify privacy
      documentation is available in both English and French where required. CONTACT VALIDATION:
      Automated checks must verify that privacy officer contact information is valid and current
      in all published policies.
    tools:
      - "Privacy policy synchronization checks in CI/CD"
      - "WCAG accessibility testing (axe-core, Lighthouse)"
      - "Localization completeness verification"
      - "Link and contact validation in documentation pipelines"
      - "Privacy policy versioning and diff tracking"
  secops:
    prose: >-
      TRANSPARENCY MONITORING: Monitor public-facing privacy documentation for accuracy against
      actual data practices. Alert on discrepancies. AVAILABILITY MONITORING: Ensure privacy
      policy pages and contact mechanisms are available and functional. Alert on downtime or
      broken links. COMPLAINT TRACKING: Monitor privacy inquiry and complaint volumes. Track
      response times against OPC expectations. POLICY CHANGE MONITORING: Track all changes to
      published privacy policies. Verify change notifications are sent to affected individuals.
    tools:
      - "Website monitoring for privacy policy availability"
      - "Privacy practice vs. policy discrepancy detection"
      - "Complaint management and SLA tracking"
      - "Policy change audit trail and notification verification"
      - "Privacy documentation completeness scanner"
