id: pip-1
family: principles
title: "Principle 1 — Accountability"
class: PIPEDA
statement:
  prose: >-
    An organization is responsible for personal information under its control and shall designate
    an individual or individuals who are accountable for the organization's compliance with the
    following principles.
  parts:
    - id: pip-1.4.1.1
      label: "4.1.1"
      prose: >-
        Accountability for the organization's compliance with the principles rests with the
        designated individual(s), even though other individuals within the organization may be
        responsible for the day-to-day collection and processing of personal information.
    - id: pip-1.4.1.2
      label: "4.1.2"
      prose: >-
        The identity of the individual(s) designated by the organization to oversee the
        organization's compliance with the principles shall be made known upon request.
    - id: pip-1.4.1.3
      label: "4.1.3"
      prose: >-
        An organization is responsible for personal information in its possession or custody,
        including information that has been transferred to a third party for processing. The
        organization shall use contractual or other means to provide a comparable level of
        protection while the information is being processed by a third party.
    - id: pip-1.4.1.4
      label: "4.1.4"
      prose: >-
        Organizations shall implement policies and practices to give effect to the principles,
        including (a) implementing procedures to protect personal information; (b) establishing
        procedures to receive and respond to complaints and inquiries; (c) training staff and
        communicating to staff information about the organization's policies and practices; and
        (d) developing information to explain the organization's policies and procedures.
guidance:
  prose: >-
    Principle 1 establishes the foundational obligation: someone in the organization must own
    privacy compliance end-to-end. This is not a ceremonial role. The designated individual
    (often a Chief Privacy Officer or Data Protection Officer) must have actual authority to
    enforce policies, remediate violations, and respond to complaints. Critically, clause 4.1.3
    extends accountability to third-party processors — you cannot outsource the data and
    disclaim responsibility. Contractual safeguards (Data Processing Agreements, sub-processor
    clauses) are mandatory, not optional. Clause 4.1.4 requires operationalization: written
    policies, complaint-handling procedures, staff training, and public-facing documentation.
    The OPC has consistently ruled that organizations lacking a designated privacy officer or
    documented privacy management program are in violation of this principle.
implementation_guidance:
  platform_engineering:
    prose: >-
      DESIGNATED ACCOUNTABILITY: Implement a privacy governance service that tracks the designated
      privacy officer, delegates, and their responsibilities as structured metadata. Expose a
      /privacy-contact API endpoint for internal and external queries. THIRD-PARTY PROCESSOR
      CONTROLS: Maintain a centralized registry of all third-party data processors with contract
      status, data categories shared, and safeguard levels. Build automated alerts for contract
      expiry or missing DPA clauses. POLICY ENFORCEMENT: Deploy policy-as-code engines (OPA/Kyverno)
      to enforce privacy policies across all services. Every microservice that handles personal
      information must declare its data handling practices in metadata annotations. TRAINING
      TRACKING: Integrate privacy training completion status into CI/CD gates — services owned
      by teams with incomplete training cannot deploy to production. AUDIT TRAIL: Implement
      comprehensive audit logging for all personal information operations with immutable storage.
      Every access, modification, and deletion must be traceable to an individual actor.
    tools:
      - "Open Policy Agent (OPA) / Kyverno for policy-as-code enforcement"
      - "Kubernetes annotations for data handling declaration per service"
      - "HashiCorp Vault for secrets management and access audit"
      - "Centralized DPA/contract registry with automated expiry alerts"
      - "Immutable audit log storage (WORM-compliant)"
  devsecops:
    prose: >-
      POLICY-AS-CODE: Encode PIPEDA accountability requirements into CI/CD pipeline checks.
      Every repository handling personal information must have a PRIVACY.md file declaring data
      categories, processing purposes, and the responsible privacy delegate. THIRD-PARTY SCANNING:
      Dependency scanning must flag third-party libraries and services that process personal
      information without documented DPAs. LICENSE COMPLIANCE: Scan third-party components to
      ensure license terms do not conflict with privacy obligations (e.g., telemetry in
      dependencies). CODE OWNERSHIP: Enforce CODEOWNERS files requiring privacy team approval
      for changes to personal information handling code. DOCUMENTATION GATES: Pipeline gates
      must verify that privacy documentation is updated when data flows change.
    tools:
      - "GitLab CI/CD compliance pipeline templates"
      - "Semgrep rules for PII handling detection"
      - "Dependency scanning with DPA verification"
      - "CODEOWNERS enforcement for privacy-sensitive code paths"
      - "Automated PRIVACY.md validation in merge request checks"
  secops:
    prose: >-
      ACCOUNTABILITY MONITORING: Monitor and alert when personal information is processed by
      services without a designated privacy owner. THIRD-PARTY RISK: Continuous monitoring of
      third-party processor security posture using vendor risk management platforms. Alert on
      third-party breaches that may affect personal information under the organization's control.
      COMPLAINT TRACKING: Integrate privacy complaint management with SIEM for correlation with
      security events. POLICY COMPLIANCE: Automated scanning to verify that deployed services
      comply with declared privacy policies. Alert on configuration drift that may violate
      accountability requirements. TRAINING COMPLIANCE: Dashboard tracking privacy training
      completion rates by team, with escalation for non-compliance.
    tools:
      - "SIEM (Splunk/Elastic Security) with privacy accountability rules"
      - "Vendor risk management platform (SecurityScorecard, BitSight)"
      - "Privacy complaint management system integrated with ITSM"
      - "Configuration compliance scanning (Chef InSpec, AWS Config)"
      - "Training management dashboard with automated escalation"
