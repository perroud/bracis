id: div-1-sec-6-2
family: divisions
title: "Part 1, Section 6 — Breach Notification to Affected Individuals"
class: PIPEDA
statement:
  prose: >-
    An organization shall notify an individual of any breach of security safeguards involving the
    individual's personal information under the organization's control if it is reasonable in the
    circumstances to believe that the breach creates a real risk of significant harm to the
    individual. The notification shall be given as soon as feasible after the organization
    determines that the breach has occurred.
  parts:
    - id: div-1-sec-6-2.notification.content
      label: "Notification Content"
      prose: >-
        The notification to the individual shall contain: (a) a description of the circumstances
        of the breach; (b) the day on which, or period during which, the breach occurred or, if
        neither is known, the approximate period; (c) a description of the personal information
        that is the subject of the breach to the extent that the information is known; (d) a
        description of the steps that the organization has taken to reduce the risk of harm
        resulting from the breach; (e) a description of the steps that the affected individual
        could take to reduce the risk of harm resulting from the breach or to mitigate that harm;
        and (f) contact information that the affected individual can use to obtain further
        information about the breach.
    - id: div-1-sec-6-2.notification.method
      label: "Notification Method"
      prose: >-
        The notification shall be conspicuous and shall be given directly to the individual,
        except where direct notification would cause further harm to the individual, is not
        reasonable in the circumstances, or the organization does not have contact information
        for the individual. Where direct notification is not possible, the organization shall
        give indirect notification by public communication or similar measure that could
        reasonably be expected to reach the affected individuals.
    - id: div-1-sec-6-2.third.party
      label: "Third-Party Notification"
      prose: >-
        An organization that notifies an individual of a breach shall also notify any other
        organization or government institution that the organization believes may be able to
        reduce the risk of harm resulting from the breach or mitigate that harm.
guidance:
  prose: >-
    Individual notification has distinct requirements from OPC reporting. Key differences:
    (1) the notification must include steps the individual can take to protect themselves — this
    is unique to individual notification; (2) notification must be "conspicuous" — email subject
    lines like "Important Update" are insufficient; it must clearly communicate that a breach
    occurred; (3) direct notification is preferred (email, letter, phone) but indirect notification
    (website notice, media) is acceptable when direct notification is impractical; (4) third
    parties who can help mitigate harm (credit bureaus, financial institutions, law enforcement)
    must also be notified. The OPC has criticized organizations that: delayed notification
    unreasonably, used notification language that minimized the breach, failed to provide
    actionable steps for individuals, or did not notify relevant third parties. Notification
    templates should be pre-prepared, legally reviewed, and tested for clarity.
implementation_guidance:
  platform_engineering:
    prose: >-
      NOTIFICATION ENGINE: Build a multi-channel notification engine that supports email, SMS,
      postal mail, and in-app notifications. Implement template management with legal-approved
      content including all required elements. DIRECT NOTIFICATION: Implement direct notification
      pipelines with delivery tracking and retry logic. Support individual-specific content
      (their affected data, personalized recommendations). INDIRECT NOTIFICATION: Build fallback
      mechanisms for indirect notification — website banners, media release templates, social
      media coordination. Activate automatically when direct notification fails for a configurable
      threshold. THIRD-PARTY COORDINATION: Implement automated notification to third parties who
      can mitigate harm (credit bureaus, financial institutions). Track notification delivery and
      acknowledgment. TRACKING AND AUDIT: Track all notification activities — who was notified,
      when, through which channel, delivery confirmation, and any follow-up communications.
    tools:
      - "Multi-channel breach notification engine"
      - "Legal-approved notification template management"
      - "Notification delivery tracking with retry logic"
      - "Indirect notification automation (website, media)"
      - "Third-party notification coordination system"
      - "Notification audit trail and compliance reporting"
  devsecops:
    prose: >-
      NOTIFICATION TESTING: Automated tests must verify notification templates contain all required
      elements. Test delivery across all channels. TEMPLATE VALIDATION: CI/CD checks must verify
      notification templates are current and legally approved. Reject deployments with outdated
      breach notification templates. DELIVERY TESTING: Integration tests must verify notification
      delivery tracking, retry logic, and fallback to indirect notification. PLAIN LANGUAGE:
      Automated readability analysis must verify notifications meet plain language standards.
    tools:
      - "Notification template completeness validation"
      - "Multi-channel delivery testing"
      - "Readability analysis (Flesch-Kincaid) for notifications"
      - "Notification delivery end-to-end tests"
      - "Template version management in CI/CD"
  secops:
    prose: >-
      NOTIFICATION COORDINATION: Coordinate individual notification timing with OPC reporting.
      Manage hold-back requests from law enforcement where applicable. DELIVERY MONITORING:
      Track notification delivery rates and failures. Escalate when delivery rates fall below
      thresholds. INDIVIDUAL SUPPORT: Monitor post-notification inquiry volumes and response
      times. Scale support resources based on breach size. THIRD-PARTY TRACKING: Track third-party
      notification acknowledgments and their mitigation actions.
    tools:
      - "Notification delivery monitoring dashboard"
      - "Inquiry volume tracking and support scaling"
      - "Third-party notification acknowledgment tracker"
      - "Law enforcement coordination workflow"
      - "Post-notification individual support metrics"
