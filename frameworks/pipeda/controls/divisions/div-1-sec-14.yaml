id: div-1-sec-14
family: divisions
title: "Part 1, Section 14 — Court Remedies"
class: PIPEDA
statement:
  prose: >-
    A complainant may, after receiving the Commissioner's report, apply to the Federal Court for
    a hearing in respect of any matter in respect of which the complaint was made. The Court may
    order an organization to correct its practices, publish a notice of action taken, and award
    damages to the complainant, including damages for any humiliation suffered.
  parts:
    - id: div-1-sec-14.14.1
      label: "14(1)"
      prose: >-
        A complainant may, after receiving the Commissioner's report, apply to the Court for a
        hearing in respect of any matter in respect of which the complaint was made, or that is
        referred to in the Commissioner's report, if the complainant has received the report or
        the Commissioner has advised the complainant that the report will be completed within the
        time prescribed.
    - id: div-1-sec-14.14.2
      label: "14(2)"
      prose: >-
        The Commissioner may, in the same circumstances and with the consent of the complainant,
        apply to the Court for a hearing in respect of any matter in respect of which the
        complaint was made.
    - id: div-1-sec-14.16
      label: "16"
      prose: >-
        The Court may, in addition to any other remedies it may give, (a) order an organization
        to correct its practices in order to comply with sections 5 to 10; (b) order an
        organization to publish a notice of any action taken or proposed to be taken to correct
        its practices; and (c) award damages to the complainant, including damages for any
        humiliation that the complainant has suffered.
guidance:
  prose: >-
    Federal Court remedies are the enforcement teeth of PIPEDA. Key aspects: (1) the complainant
    (or the Commissioner with consent) can apply to Federal Court after the Commissioner's report;
    (2) the Court can order corrective practices — this is binding, unlike Commissioner
    recommendations; (3) the Court can order public notice of corrective actions — significant
    reputational consequence; (4) damages include compensation for humiliation, expanding the
    scope beyond pure financial loss; (5) this creates a two-tier enforcement model: Commissioner
    investigation followed by potential Court proceedings. Notable cases have resulted in damages
    awards and practice correction orders. The proposed CPPA would add administrative monetary
    penalties (up to 5% of gross global revenue or $25M CAD) without requiring Court proceedings.
    Organizations should factor both current Court remedy exposure and future AMPs into their
    risk assessments. Technical compliance evidence is critical in Court proceedings — the ability
    to demonstrate through logs, records, and documentation that reasonable measures were in
    place is the primary defense.
implementation_guidance:
  platform_engineering:
    prose: >-
      LITIGATION READINESS: Build evidence production capabilities suitable for Federal Court
      proceedings. Evidence must be forensically sound, properly authenticated, and presented in
      court-acceptable formats. COMPLIANCE EVIDENCE: Maintain continuous compliance evidence that
      can demonstrate reasonable measures were in place. Automated evidence collection must cover:
      security configurations, access controls, consent records, breach response timelines, and
      policy enforcement. REMEDIATION TRACKING: When Court orders require practice corrections,
      implement tracking and verification systems that demonstrate compliance with Court orders.
      DAMAGE MITIGATION: Build capabilities to rapidly implement corrective measures ordered by
      the Court, with auditable evidence of implementation. PUBLIC NOTICE SUPPORT: If ordered to
      publish corrective notices, implement multi-channel publication with reach tracking.
    tools:
      - "Forensic evidence production for Court proceedings"
      - "Continuous compliance evidence repository"
      - "Court order remediation tracking and verification"
      - "Rapid corrective measure implementation"
      - "Public notice publication and tracking"
  devsecops:
    prose: >-
      EVIDENCE GENERATION: CI/CD pipelines must generate forensically sound evidence of compliance
      practices. Build artifacts (scan results, approval records, deployment logs) in formats
      suitable for legal proceedings. REMEDIATION CAPABILITY: Maintain the ability to rapidly
      implement practice corrections through automated deployment. Track all corrective changes
      with full audit trails. COMPLIANCE DEMONSTRATION: Build automated compliance verification
      that can generate court-ready evidence reports on demand.
    tools:
      - "Forensic evidence artifact generation in CI/CD"
      - "Court-ready compliance report generation"
      - "Rapid remediation deployment pipelines"
      - "Full audit trail for corrective changes"
      - "Compliance evidence archival with integrity verification"
  secops:
    prose: >-
      LITIGATION SUPPORT: Provide forensic investigation support for Court proceedings. Maintain
      evidence integrity and chain-of-custody documentation. COMPLIANCE MONITORING: Continuous
      monitoring to prevent violations that could lead to Court proceedings. COURT ORDER
      COMPLIANCE: When Court orders are issued, monitor and verify compliance with ordered
      practice corrections. Report compliance status to legal counsel. RISK ASSESSMENT: Maintain
      risk assessments that factor in Federal Court remedy exposure and proposed CPPA penalties.
    tools:
      - "Forensic investigation toolkit for litigation"
      - "Evidence chain-of-custody management"
      - "Court order compliance monitoring"
      - "Federal Court remedy risk assessment"
      - "Litigation readiness dashboard"
