id: div-1-sec-6-1
family: divisions
title: "Part 1, Section 6 — Breach Notification to Commissioner"
class: PIPEDA
statement:
  prose: >-
    An organization shall report to the Commissioner any breach of security safeguards involving
    personal information under its control if it is reasonable in the circumstances to believe
    that the breach creates a real risk of significant harm to an individual. The report shall
    be made as soon as feasible after the organization determines that the breach has occurred.
  parts:
    - id: div-1-sec-6-1.report.content
      label: "Report Content"
      prose: >-
        The report to the Commissioner shall contain: (a) a description of the circumstances of
        the breach and, if known, the cause; (b) the day on which, or the period during which,
        the breach occurred or, if neither is known, the approximate period; (c) a description
        of the personal information that is the subject of the breach to the extent that the
        information is known; (d) the number of individuals affected by the breach, and if that
        number is not known, the approximate number; (e) a description of the steps that the
        organization has taken to reduce the risk of harm to each affected individual resulting
        from the breach or to mitigate that harm; (f) a description of the steps that the
        organization has taken or intends to take to notify each affected individual of the
        breach; and (g) the name and contact information of a person who can answer, on behalf
        of the organization, the Commissioner's questions about the breach.
    - id: div-1-sec-6-1.rrosh.assessment
      label: "RROSH Assessment Factors"
      prose: >-
        In determining whether a breach creates a real risk of significant harm, the organization
        shall consider: the sensitivity of the personal information involved in the breach, the
        probability that the personal information has been, is being, or will be misused, and
        any other prescribed factor. Significant harm includes bodily harm, humiliation, damage
        to reputation or relationships, loss of employment, business or professional opportunities,
        financial loss, identity theft, negative effects on the credit record, and damage to or
        loss of property.
guidance:
  prose: >-
    The OPC report must be filed "as soon as feasible" — the OPC interprets this as days, not
    weeks. The Breach of Security Safeguards Regulations (SOR/2018-64) specify the required
    content. The RROSH assessment is a judgment call, but the OPC has stated that when in doubt,
    organizations should report. The OPC provides a standard PIPEDA Breach Report Form (PBRF)
    that organizations should use. Key considerations: (1) the report must include remediation
    steps already taken, not just what happened; (2) the contact person must be knowledgeable
    about the breach, not just a general privacy contact; (3) if the full scope is unknown at
    reporting time, an initial report followed by supplementary reports is acceptable; (4) failure
    to report when required is an offence punishable by fines up to $100,000 CAD per violation.
    Organizations should have pre-built report templates and escalation procedures to meet the
    "as soon as feasible" timeline.
implementation_guidance:
  platform_engineering:
    prose: >-
      OPC REPORT AUTOMATION: Build automated OPC report generation using the PIPEDA Breach Report
      Form (PBRF) template. Pre-populate known fields from breach detection systems. RROSH
      DECISION SUPPORT: Implement a structured RROSH assessment tool that guides investigators
      through sensitivity analysis, misuse probability assessment, and harm evaluation. Record
      the assessment rationale for audit purposes. TIMELINE TRACKING: Build breach response
      timeline tracking with "as soon as feasible" SLA enforcement. Automated escalation when
      assessment or reporting delays occur. SUPPLEMENTARY REPORTING: Support iterative reporting —
      initial report with known facts, followed by supplementary reports as investigation
      progresses. CONTACT MANAGEMENT: Maintain a roster of qualified breach contacts who can
      respond to OPC inquiries. Automated notification and rotation management.
    tools:
      - "PBRF template auto-generation from incident data"
      - "RROSH structured assessment workflow"
      - "Breach response timeline tracking with SLA alerts"
      - "Supplementary report management"
      - "OPC contact roster and rotation management"
  devsecops:
    prose: >-
      REPORT TEMPLATE TESTING: Automated tests must verify OPC report templates generate valid,
      complete reports. RROSH TOOL TESTING: Test RROSH assessment workflows with breach scenarios
      to verify accurate risk categorization. INCIDENT RESPONSE AUTOMATION: Maintain breach
      response playbooks as code with automated testing. LOGGING COMPLETENESS: Pipeline checks
      must verify that forensic logging is sufficient to populate OPC report fields.
    tools:
      - "OPC report template validation tests"
      - "RROSH assessment scenario testing"
      - "Incident response playbook testing"
      - "Forensic logging completeness verification"
      - "Breach response drill automation"
  secops:
    prose: >-
      BREACH ASSESSMENT: Upon breach detection, immediately initiate RROSH assessment. Classify
      breach severity and determine OPC reporting obligation. REPORT PREPARATION: Generate OPC
      report within "as soon as feasible" timeline. Coordinate with legal, privacy, and technical
      teams for report completeness. TIMELINE COMPLIANCE: Track all breach response milestones
      against regulatory timelines. Document all decisions and delays with justification.
      COMMISSIONER COMMUNICATION: Manage ongoing communication with OPC during investigation.
      Respond to OPC inquiries within requested timeframes.
    tools:
      - "SOAR playbook for PIPEDA breach reporting"
      - "RROSH assessment decision support tool"
      - "Breach timeline compliance dashboard"
      - "OPC communication tracker"
      - "Breach severity classification engine"
