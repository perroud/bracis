id: div-1-sec-6
family: divisions
title: "Part 1, Section 6 — Breach of Security Safeguards"
class: PIPEDA
statement:
  prose: >-
    An organization shall report to the Commissioner any breach of security safeguards involving
    personal information under its control if it is reasonable in the circumstances to believe
    that the breach creates a real risk of significant harm to an individual. The organization
    shall also notify affected individuals and maintain records of all breaches of security
    safeguards involving personal information under its control.
  parts:
    - id: div-1-sec-6.10.1.1
      label: "10.1(1)"
      prose: >-
        An organization shall report to the Commissioner any breach of security safeguards
        involving personal information under its control if it is reasonable in the circumstances
        to believe that the breach creates a real risk of significant harm to an individual.
    - id: div-1-sec-6.10.1.2
      label: "10.1(2)"
      prose: >-
        The report shall contain sufficient information to allow the Commissioner to understand
        the circumstances of the breach, including the number of individuals affected, a
        description of the personal information involved, and the steps taken to reduce the
        risk of harm.
    - id: div-1-sec-6.10.1.3
      label: "10.1(3)"
      prose: >-
        An organization shall notify an individual of any breach of security safeguards involving
        the individual's personal information under the organization's control if it is reasonable
        in the circumstances to believe that the breach creates a real risk of significant harm
        to the individual.
    - id: div-1-sec-6.10.1.4
      label: "10.1(4)"
      prose: >-
        An organization shall keep and maintain a record of every breach of security safeguards
        involving personal information under its control for a period of 24 months beginning on
        the day on which the organization determines that the breach has occurred.
guidance:
  prose: >-
    Section 10.1 was added by the Digital Privacy Act (2015) and came into force November 1, 2018.
    It creates three mandatory obligations upon a breach: (1) REPORT to the OPC if the breach
    creates a "real risk of significant harm" (RROSH); (2) NOTIFY affected individuals under the
    same RROSH threshold; (3) RECORD all breaches, regardless of whether they meet the RROSH
    threshold. The RROSH assessment considers: sensitivity of the information, probability the
    information has been or will be misused, and any other prescribed factor. "Significant harm"
    includes bodily harm, humiliation, damage to reputation or relationships, loss of employment,
    business or professional opportunities, financial loss, identity theft, negative effects on
    credit record, and damage to or loss of property. The OPC has issued guidance stating that
    organizations should err on the side of reporting when uncertain whether a breach meets the
    RROSH threshold. Failure to report is an offence under PIPEDA with potential fines up to
    $100,000 per violation.
implementation_guidance:
  platform_engineering:
    prose: >-
      BREACH DETECTION: Implement automated breach detection capabilities across all systems
      processing personal information. Use SIEM correlation, DLP alerts, and anomaly detection
      to identify potential breaches. BREACH REGISTRY: Build a breach registry service that
      records all security incidents involving personal information, regardless of severity.
      Implement the 24-month retention requirement with automated records management. RROSH
      ASSESSMENT ENGINE: Build a structured risk assessment workflow that evaluates breaches
      against the RROSH criteria (sensitivity, probability of misuse, potential harm). Guide
      assessors through the determination process. NOTIFICATION ORCHESTRATION: Implement automated
      notification pipelines — OPC report generation, individual notification through multiple
      channels, and third-party notification where required. EVIDENCE PRESERVATION: Implement
      forensic evidence preservation mechanisms that activate upon breach detection. Immutable
      logging, system snapshots, and chain-of-custody tracking.
    tools:
      - "Breach registry with 24-month retention enforcement"
      - "RROSH assessment workflow engine"
      - "OPC report generation templates (PIPEDA Breach Report Form)"
      - "Multi-channel individual notification pipeline"
      - "Forensic evidence preservation (immutable logging, snapshots)"
  devsecops:
    prose: >-
      BREACH PREVENTION: Comprehensive security scanning pipeline to prevent breaches — SAST,
      DAST, dependency scanning, container scanning, secret detection, and IaC scanning. INCIDENT
      RESPONSE CODE: Maintain incident response runbooks as code, versioned and tested. Automated
      deployment of incident response tooling upon breach detection. BREACH SIMULATION: Regular
      breach simulation exercises as part of CI/CD — test detection, assessment, and notification
      pipelines. LOGGING REQUIREMENTS: Pipeline checks must verify that all services processing
      personal information have adequate logging for breach investigation.
    tools:
      - "Complete security scanning pipeline (SAST/DAST/SCA/Container/Secrets/IaC)"
      - "Incident response runbooks as code"
      - "Breach simulation testing frameworks"
      - "Logging adequacy verification in CI/CD"
      - "Breach notification template generation and testing"
  secops:
    prose: >-
      BREACH DETECTION AND RESPONSE: 24/7 monitoring with PIPEDA-specific breach detection rules.
      Automated RROSH pre-assessment upon incident detection to determine reporting obligations.
      TIMELINE MANAGEMENT: Track breach response timelines — PIPEDA requires reporting "as soon
      as feasible." Monitor investigation progress against defined SLAs. NOTIFICATION MANAGEMENT:
      Coordinate OPC reporting, individual notification, and third-party notification. Track
      notification delivery and acknowledgment. RECORD KEEPING: Maintain comprehensive breach
      records for the mandatory 24-month period. Ensure records include all required elements
      for OPC audit. POST-BREACH ANALYSIS: Conduct root cause analysis and implement corrective
      measures. Document lessons learned and update safeguards.
    tools:
      - "SIEM with PIPEDA breach detection rules"
      - "SOAR playbooks for PIPEDA breach response"
      - "Breach timeline and SLA tracking"
      - "OPC reporting workflow management"
      - "Breach record management with 24-month retention"
      - "Post-breach root cause analysis tools"
