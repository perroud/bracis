id: div-1-sec-10
family: divisions
title: "Part 1, Section 10 — Compliance Complaints and Audits"
class: PIPEDA
statement:
  prose: >-
    An individual may file with the Commissioner a written complaint against an organization for
    contravening a provision of Division 1 or for not following a recommendation set out in
    Schedule 1. The Commissioner shall conduct an investigation in respect of the complaint,
    unless the Commissioner is satisfied that the complaint has already been or could more
    appropriately be dealt with by other means, that the complaint is trivial, frivolous, or
    vexatious, or that the complaint was filed after the expiry of one year from the day on
    which the subject matter of the complaint became known to the complainant.
  parts:
    - id: div-1-sec-10.11.1
      label: "11(1)"
      prose: >-
        An individual may file with the Commissioner a written complaint against an organization
        for contravening a provision of Division 1 or for not following a recommendation set out
        in Schedule 1.
    - id: div-1-sec-10.11.2
      label: "11(2)"
      prose: >-
        The Commissioner may initiate a complaint in respect of a matter described in
        subsection (1) if the Commissioner is satisfied that there are reasonable grounds to
        investigate the matter.
    - id: div-1-sec-10.12.1
      label: "12(1)"
      prose: >-
        The Commissioner shall conduct an investigation in respect of a complaint and, for that
        purpose, may examine any personal information management practice of the organization.
    - id: div-1-sec-10.18
      label: "18"
      prose: >-
        The Commissioner may, on reasonable notice and at any reasonable time, audit the personal
        information management practices of an organization if the Commissioner has reasonable
        grounds to believe that the organization is contravening a provision of Division 1 or
        is not following a recommendation set out in Schedule 1.
guidance:
  prose: >-
    Section 11-12 establishes the complaint mechanism and sections 17-18 establish the OPC's
    audit powers. Key points: (1) any individual can file a complaint — there is no standing
    requirement beyond being affected; (2) the Commissioner can self-initiate complaints based
    on reasonable grounds; (3) investigations can examine any personal information management
    practice, not just the specific complaint subject; (4) the OPC has audit powers that do not
    require a complaint — proactive audits are authorized. Organizations must be prepared for
    both complaint-driven investigations and proactive audits. This means maintaining: comprehensive
    records of all privacy practices, documented policies and procedures, training records,
    breach records, consent records, and evidence of compliance with all 10 principles. The OPC's
    investigation findings are public (redacted), creating reputational risk. While the OPC
    historically had no order-making power, findings of well-founded complaints are published
    and can be taken to Federal Court.
implementation_guidance:
  platform_engineering:
    prose: >-
      AUDIT READINESS: Build a compliance evidence repository that continuously collects and
      organizes evidence of PIPEDA compliance across all 10 principles. Implement automated
      evidence collection from security tools, consent systems, breach records, and access logs.
      COMPLAINT RESPONSE: Integrate complaint management with compliance evidence systems. When
      a complaint is received, automatically gather relevant evidence for investigation response.
      AUDIT SUPPORT: Build OPC audit support tooling — data extraction for specific investigation
      queries, privacy practice documentation, and compliance metric dashboards. RECORD MANAGEMENT:
      Implement comprehensive record management covering all PIPEDA requirements: consent records,
      breach records, access request records, complaint records, and policy version history.
      CONTINUOUS COMPLIANCE: Deploy automated compliance monitoring that continuously validates
      adherence to all 10 principles and flags non-compliance.
    tools:
      - "Compliance evidence repository with automated collection"
      - "OPC investigation response toolkit"
      - "Privacy practice documentation system"
      - "Comprehensive record management platform"
      - "Continuous compliance monitoring engine"
  devsecops:
    prose: >-
      COMPLIANCE EVIDENCE: CI/CD pipelines must generate compliance evidence — security scan
      results, code review approvals, deployment logs, and test results — stored for OPC audit
      purposes. AUDIT TRAIL INTEGRITY: Pipeline checks must verify audit log integrity and
      completeness. COMPLIANCE TESTING: Automated compliance validation tests that verify
      adherence to all 10 principles at the technical level. DOCUMENTATION: Maintain up-to-date
      privacy practice documentation alongside code, versioned and auditable.
    tools:
      - "Compliance evidence generation in CI/CD"
      - "Audit log integrity verification"
      - "Automated PIPEDA compliance validation tests"
      - "Privacy documentation versioning alongside code"
      - "Compliance metric collection and reporting"
  secops:
    prose: >-
      OPC INVESTIGATION SUPPORT: Maintain investigation readiness — pre-built evidence packages
      for common complaint categories. Track OPC investigation timelines and required responses.
      AUDIT PREPARATION: Continuous audit readiness assessment. Identify compliance gaps before
      OPC audits. EVIDENCE PRESERVATION: Ensure evidence relevant to complaints and audits is
      preserved with integrity. Implement legal hold capabilities. REPORTING: Generate compliance
      reports for OPC audits covering all 10 principles, breach history, complaint history, and
      remediation actions.
    tools:
      - "OPC investigation readiness dashboard"
      - "Pre-built evidence packages by complaint category"
      - "Audit readiness assessment tools"
      - "Legal hold and evidence preservation"
      - "PIPEDA compliance reporting engine"
