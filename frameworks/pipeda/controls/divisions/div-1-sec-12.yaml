id: div-1-sec-12
family: divisions
title: "Part 1, Section 12 — Commissioner Powers"
class: PIPEDA
statement:
  prose: >-
    The Commissioner has broad investigative powers to examine an organization's personal
    information management practices, compel production of documents, administer oaths, receive
    evidence, enter premises, and examine records. The Commissioner may attempt to resolve
    complaints through mediation and conciliation and shall prepare a report of findings with
    recommendations.
  parts:
    - id: div-1-sec-12.12.1
      label: "12(1)"
      prose: >-
        The Commissioner shall conduct an investigation in respect of a complaint and, for
        that purpose, may (a) summon and enforce the appearance of persons before the Commissioner
        and compel them to give oral or written evidence on oath and to produce such documents
        and things as the Commissioner deems requisite; (b) administer oaths; (c) receive and
        accept such evidence and other information, whether on oath or by affidavit or otherwise,
        as the Commissioner sees fit; (d) enter any premises occupied by an organization; and
        (e) converse in private with any person in those premises and otherwise carry out such
        inquiries as the Commissioner sees fit.
    - id: div-1-sec-12.12.2
      label: "12.2"
      prose: >-
        The Commissioner may attempt to resolve complaints by means of dispute resolution
        mechanisms such as mediation and conciliation.
    - id: div-1-sec-12.13
      label: "13"
      prose: >-
        The Commissioner shall, within one year after the date on which a complaint is filed or
        is initiated by the Commissioner, prepare a report that contains the Commissioner's
        findings and recommendations, any settlement achieved, the request of the organization
        that the matter be heard by the Court, and the right of the complainant to apply to
        the Court for a hearing.
guidance:
  prose: >-
    The Commissioner's powers are extensive — comparable to a regulatory authority. Key aspects:
    (1) the Commissioner can compel evidence, enter premises, and examine any records. This is
    not a voluntary cooperation process; (2) mediation and conciliation are available and
    encouraged — the OPC prefers negotiated resolution over adversarial proceedings; (3) the
    Commissioner must report within one year, but complex investigations sometimes exceed this;
    (4) the report includes findings (well-founded, not well-founded, resolved) and
    recommendations. While recommendations are not legally binding orders, non-compliance can
    lead to Federal Court proceedings. The proposed Consumer Privacy Protection Act (CPPA) would
    give the Commissioner order-making power and the ability to impose administrative monetary
    penalties. Organizations should prepare for this expanded authority. Technical preparedness
    means: comprehensive logging, document production capabilities, and the ability to demonstrate
    compliance through evidence.
implementation_guidance:
  platform_engineering:
    prose: >-
      DOCUMENT PRODUCTION: Build automated document production capabilities that can extract and
      package relevant records in response to Commissioner requests. Support filtering by date
      range, data category, individual, and system. EVIDENCE MANAGEMENT: Implement an evidence
      management system that maintains chain-of-custody for all compliance evidence. Support
      legal hold, export, and tamper-proof verification. INVESTIGATION SUPPORT: Build investigation
      response tooling that can rapidly gather evidence across all systems — audit logs, access
      records, consent records, breach records, and configuration history. MEDIATION SUPPORT:
      Implement tracking for mediation and conciliation processes, including commitment tracking
      and remediation verification. COMPLIANCE DEMONSTRATION: Build compliance dashboards that
      demonstrate adherence to all 10 principles with supporting evidence, designed for
      Commissioner review.
    tools:
      - "Automated document production and export system"
      - "Evidence management with chain-of-custody"
      - "Cross-system evidence gathering orchestration"
      - "Mediation/conciliation tracking system"
      - "Commissioner-ready compliance dashboards"
  devsecops:
    prose: >-
      EVIDENCE INTEGRITY: CI/CD pipelines must ensure all compliance-relevant logs and records
      maintain integrity. DOCUMENT PRODUCTION TESTING: Automated tests must verify document
      production capabilities can extract records accurately and completely. AUDIT LOG
      COMPLETENESS: Pipeline checks must verify all services produce sufficient audit logs for
      Commissioner investigations. CONFIGURATION HISTORY: Maintain version-controlled
      configuration history for all privacy-relevant systems as evidence for investigations.
    tools:
      - "Audit log integrity verification in CI/CD"
      - "Document production accuracy tests"
      - "Configuration history versioning"
      - "Evidence completeness validation"
      - "Investigation response drill automation"
  secops:
    prose: >-
      INVESTIGATION READINESS: Maintain standing readiness for Commissioner investigations.
      Pre-built evidence collection procedures for common investigation scenarios. RAPID RESPONSE:
      Ability to rapidly gather and produce documents in response to Commissioner summons.
      Designated investigation response team with defined roles. COOPERATION MANAGEMENT: Track
      Commissioner requests, responses, and timelines. Ensure timely and complete cooperation.
      REMEDIATION TRACKING: When recommendations are issued, track remediation implementation
      and report completion to the Commissioner.
    tools:
      - "Investigation readiness assessment"
      - "Rapid evidence collection and production"
      - "Commissioner request tracking and response management"
      - "Remediation tracking and verification"
      - "Investigation response team coordination"
