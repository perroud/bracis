id: rec-20
family: dispensacao
title: "System Credentialing and Periodic Compliance Assessment"
class: RECEITUARIO
baselines: [prescritores-dispensadores]
statement:
  prose: |
    Art. 39. Os sistemas de prescrição eletrônica e dispensação devem
    obter credenciamento junto à ANVISA, demonstrando conformidade com
    os requisitos técnicos e de segurança desta Resolução, mediante:

    I — avaliação técnica inicial abrangendo arquitetura de segurança,
    integração com SNCR, conformidade com padrões FHIR, assinatura
    digital ICP-Brasil e trilha de auditoria;

    II — teste de conformidade funcional validando o fluxo completo de
    prescrição, assinatura, registro no SNCR, dispensação e escrituração;

    III — avaliação de segurança da informação, incluindo teste de
    penetração realizado por empresa independente credenciada;

    IV — recertificação obrigatória a cada 2 (dois) anos ou quando
    houver alteração significativa no sistema;

    V — notificação obrigatória à ANVISA em caso de incidente de
    segurança que comprometa dados de prescrições ou do SNCR, no prazo
    máximo de 72 (setenta e duas) horas.

    Parágrafo único. A ANVISA manterá lista pública dos sistemas
    credenciados, atualizada mensalmente, que poderá ser consultada
    por prescritores, farmacêuticos e pacientes.
guidance:
  prose: |
    Article 39 establishes the mandatory credentialing process for
    prescription and dispensation systems, ensuring that only assessed
    and approved software can participate in the electronic prescription
    ecosystem.

    **Initial credentialing assessment:**
    - Security architecture review
    - SNCR integration verification
    - FHIR conformance testing
    - ICP-Brasil digital signature implementation
    - Audit trail completeness and immutability

    **Functional conformance testing:**
    The complete workflow must be demonstrated: prescription creation,
    digital signing, SNCR registration, dispensation, and record-keeping.

    **Security assessment:**
    An independent, accredited security firm must conduct penetration
    testing. This is not an internal assessment.

    **Recertification:**
    - Every 2 years minimum
    - After any significant system change
    - "Significant change" includes major version upgrades,
      architecture changes, and security infrastructure modifications

    **Incident notification:**
    - 72-hour mandatory notification to ANVISA for security incidents
    - Aligns with LGPD and ANPD incident notification requirements
    - Covers data breaches, system compromises, and SNCR data integrity
      incidents

    **Public registry:**
    ANVISA maintains a public list of credentialed systems, creating
    transparency and enabling informed choices by prescribers and
    pharmacies.
implementation_guidance:
  platform_engineering:
    prose: |
      **Credentialing compliance infrastructure:**
      1. Implement a compliance evidence repository that continuously
         collects and organizes evidence for credentialing assessments
         (security configurations, test results, audit logs, SNCR
         integration metrics).
      2. Deploy automated compliance checks that continuously verify
         system conformity with credentialing requirements, alerting
         on deviations.
      3. Implement an incident detection and notification workflow
         with automatic 72-hour SLA tracking for ANVISA notification.
      4. Deploy a change management system that classifies changes
         as significant or minor, triggering recertification planning
         for significant changes.
      5. Maintain a credentialing test environment that mirrors
         production for assessment demonstrations.
    tools:
      - compliance-evidence-repo
      - automated-compliance-checks
      - incident-management
      - change-management
      - test-environment
  devsecops:
    prose: |
      **Continuous compliance pipeline:**
      1. Implement continuous security scanning (SAST, DAST, dependency
         scanning, container scanning) as part of the CI/CD pipeline
         to maintain credentialing-ready security posture.
      2. Run automated functional conformance tests covering the full
         prescription-dispensation workflow on every release.
      3. Schedule quarterly penetration tests with external firms and
         integrate findings into the remediation backlog.
      4. Deploy change classification automation that flags potentially
         significant changes requiring recertification notification.
    tools:
      - gitlab-ci
      - sast
      - dast
      - dependency-scanning
      - container-scanning
      - penetration-testing
      - change-classification
  secops:
    prose: |
      **Credentialing operations:**
      1. Maintain a credentialing calendar with recertification dates,
         assessment scheduling, and preparation milestones.
      2. Track all security incidents and ensure 72-hour ANVISA
         notification SLA compliance for qualifying incidents.
      3. Conduct annual tabletop exercises simulating ANVISA
         credentialing assessments to identify and remediate gaps.
      4. Monitor the ANVISA credentialed systems public registry for
         accuracy and request corrections when needed.
    tools:
      - credentialing-tracker
      - incident-management
      - sla-monitoring
      - compliance-calendar
