id: rec-12
family: sncr
title: "Digital Record-Keeping for Controlled Substances"
class: RECEITUARIO
baselines: [prescritores-dispensadores]
statement:
  prose: |
    Art. 22. A escrituração digital de medicamentos sujeitos a controle
    especial deve ser realizada por meio do SNCR, substituindo a
    escrituração em livro físico prevista na Portaria SVS/MS n.º 344/1998.

    § 1.º A escrituração digital deve registrar, para cada movimentação:
    I — identificação do medicamento (denominação, concentração, forma
    farmacêutica, lote e validade);
    II — quantidade movimentada (entrada, saída ou perda);
    III — identificação do fornecedor (entrada) ou do paciente e prescritor
    (saída por dispensação);
    IV — número da prescrição eletrônica vinculada à dispensação;
    V — número da nota fiscal eletrônica vinculada à entrada;
    VI — saldo atualizado em tempo real.

    § 2.º O sistema deve gerar automaticamente o Balanço de Medicamentos
    Controlados, conforme periodicidade definida pela ANVISA, com
    transmissão eletrônica ao SNCR.

    § 3.º A escrituração digital dispensa a manutenção de livros físicos
    de registro, desde que o estabelecimento mantenha os registros
    eletrônicos íntegros e acessíveis por prazo mínimo de 5 (cinco) anos.
guidance:
  prose: |
    Article 22 digitalizes the controlled substance record-keeping
    (escrituracao) process, replacing the traditional physical logbooks
    required under Portaria 344/1998.

    **Digital record-keeping replaces:**
    - Physical controlled substance logbooks
    - Manual balance calculations
    - Paper-based Balanco de Medicamentos (controlled substance balance
      reports)
    - Manual reconciliation processes

    **Mandatory fields per movement:**
    - Drug identification (name, concentration, form, batch, expiry)
    - Quantity moved (in, out, or loss)
    - Source (supplier for entries) or destination (patient/prescriber
      for dispensations)
    - Linked electronic prescription number (for dispensations)
    - Linked electronic invoice number (for entries)
    - Real-time updated balance

    **Automated balance reporting:**
    Systems must automatically generate the Balanco de Medicamentos
    Controlados report at ANVISA-defined intervals and transmit it
    electronically to the SNCR, eliminating manual report preparation.

    **Physical logbook exemption:**
    Pharmacies are exempt from maintaining physical logbooks only if
    digital records are maintained with integrity for a minimum of
    5 years and remain accessible for regulatory inspection.
implementation_guidance:
  platform_engineering:
    prose: |
      **Digital record-keeping platform:**
      1. Implement a double-entry inventory management system for
         controlled substances with real-time balance tracking,
         linking every movement to its source document (prescription,
         invoice, loss report).
      2. Deploy automatic reconciliation between dispensation records,
         prescription records, and inventory movements, flagging
         discrepancies immediately.
      3. Implement the Balanco de Medicamentos Controlados report
         generator with automatic SNCR submission at configured
         intervals (monthly, quarterly as defined by ANVISA).
      4. Deploy batch and expiry tracking for controlled substances
         with automatic alerts for approaching expiry dates.
      5. Implement tamper-evident storage for record-keeping data
         with cryptographic integrity verification and a minimum
         5-year retention policy.
    tools:
      - inventory-management
      - postgresql
      - event-sourcing
      - report-generator
      - sncr-api
      - retention-engine
  devsecops:
    prose: |
      **Record-keeping validation pipeline:**
      1. Create automated tests verifying that every controlled
         substance movement creates a complete record with all
         mandatory fields.
      2. Implement balance accuracy tests using known movement
         sequences and verifying correct running balances.
      3. Add reconciliation tests between dispensation records and
         inventory movements to detect data inconsistencies.
      4. Deploy report generation tests verifying Balanco format
         compliance and SNCR submission accuracy.
    tools:
      - gitlab-ci
      - data-integrity-tests
      - reconciliation-tests
      - report-validation
  secops:
    prose: |
      **Record-keeping compliance operations:**
      1. Audit controlled substance balances monthly, comparing
         system records with physical inventory counts.
      2. Monitor for unexplained discrepancies between inventory
         movements and linked documents (prescriptions, invoices).
      3. Verify Balanco submission completeness and timeliness for
         all pharmacies, reporting non-compliance to management.
      4. Conduct annual record-keeping integrity audits, verifying
         that 5-year retention requirements are met.
    tools:
      - inventory-audit
      - compliance-dashboard
      - discrepancy-tracking
      - retention-audit
