control_families:
  - id: prescricao
    title: "Prescricao Eletronica"
    description: "Requisitos para emissao, formato, conteudo obrigatorio e validade da prescricao eletronica de medicamentos, incluindo medicamentos sujeitos a controle especial"
    articles: "art. 1 ao art. 8"
    control_count: 4
  - id: assinatura
    title: "Assinatura Digital ICP-Brasil"
    description: "Requisitos de assinatura digital com certificado ICP-Brasil para prescritores, validacao de identidade profissional e carimbo de tempo na receita eletronica"
    articles: "art. 9 ao art. 15"
    control_count: 4
  - id: sncr
    title: "Sistema Nacional de Controle de Receituarios"
    description: "Integracao com o Sistema Nacional de Controle de Receituarios (SNCR), escrituracao digital, rastreabilidade da cadeia de prescricao e dispensacao e notificacao de receitas"
    articles: "art. 16 ao art. 23"
    control_count: 4
  - id: seguranca
    title: "Seguranca e Interoperabilidade"
    description: "Requisitos de seguranca da informacao, interoperabilidade entre sistemas de prescricao e dispensacao via padroes HL7/FHIR, disponibilidade e integridade de dados"
    articles: "art. 24 ao art. 31"
    control_count: 4
  - id: dispensacao
    title: "Dispensacao e Escrituracao"
    description: "Requisitos para dispensacao eletronica em farmacias, escrituracao digital de medicamentos controlados, controle de estoque e rastreabilidade ate o paciente"
    articles: "art. 32 ao art. 40"
    control_count: 4
related_frameworks:
  - framework_id: icp-brasil
    relationship: complements
    description: >-
      A ICP-Brasil complementa a RDC 1.000/2025 ao fornecer a infraestrutura de chaves
      publicas que sustenta a assinatura digital obrigatoria em receituarios eletronicos,
      validacao de identidade de prescritores e carimbo de tempo.
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD complementa a RDC 1.000/2025 ao disciplinar o tratamento de dados pessoais
      sensiveis (dados de saude) contidos em receituarios eletronicos, incluindo base
      legal, consentimento e direitos dos titulares de dados.
  - framework_id: pep
    relationship: complements
    description: >-
      O Prontuario Eletronico do Paciente complementa o receituario eletronico ao
      integrar as prescricoes digitais ao historico clinico do paciente, garantindo
      rastreabilidade e continuidade do cuidado.
  - framework_id: cfm-telemedicina
    relationship: complements
    description: >-
      A Resolucao CFM 2.314/2022 complementa a RDC 1.000/2025 ao estabelecer requisitos
      para prescricoes eletronicas emitidas em atendimentos por telemedicina, incluindo a
      obrigatoriedade de assinatura digital e registro em prontuario.
  - framework_id: anvisa-134
    relationship: mapped
    description: >-
      A IN ANVISA 134/2022 possui correspondencia com a RDC 1.000/2025 nos requisitos
      de validacao de sistemas computadorizados, integridade de dados e trilha de
      auditoria aplicados a sistemas de prescricao eletronica.
  - framework_id: tiss
    relationship: complements
    description: >-
      O padrao TISS complementa o receituario eletronico ao definir formatos
      padronizados de troca de informacoes entre prescritores, farmacias e operadoras
      de saude suplementar para dispensacao de medicamentos.
