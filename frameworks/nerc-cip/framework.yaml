standards:
  - id: cip-002
    title: "BES Cyber System Categorization"
    requirements: [r1]
    description: >-
      Identifies and categorizes BES Cyber Systems and their associated
      BES Cyber Assets for the application of cyber security requirements
      commensurate with the adverse impact that loss, compromise, or
      misuse of those BES Cyber Systems could have on the reliable
      operation of the Bulk Electric System (BES).
  - id: cip-003
    title: "Security Management Controls"
    requirements: [r1, r2]
    description: >-
      Specifies consistent and sustainable security management controls
      that establish responsibility and accountability to protect BES
      Cyber Systems against compromise that could lead to misoperation
      or instability in the BES.
  - id: cip-004
    title: "Personnel and Training"
    requirements: [r1, r2, r4]
    description: >-
      Requires an appropriate level of personnel risk assessment,
      training, and security awareness in support of protecting
      BES Cyber Systems.
  - id: cip-005
    title: "Electronic Security Perimeter(s)"
    requirements: [r1, r2]
    description: >-
      Requires the identification and protection of the Electronic
      Security Perimeters inside which all BES Cyber Systems reside,
      as well as managing interactive remote access.
  - id: cip-006
    title: "Physical Security of BES Cyber Systems"
    requirements: [r1]
    description: >-
      Manages physical access to BES Cyber Systems by specifying a
      physical security plan to protect BES Cyber Systems against
      compromise that could lead to misoperation or instability in the BES.
  - id: cip-007
    title: "System Security Management"
    requirements: [r1, r2, r3, r4, r5]
    description: >-
      Manages system security by specifying select technical, operational,
      and procedural requirements in support of protecting BES Cyber
      Systems against compromise.
  - id: cip-008
    title: "Incident Reporting and Response Planning"
    requirements: [r1]
    description: >-
      Specifies incident response requirements to mitigate the risk to the
      reliable operation of the BES as the result of a Cyber Security Incident.
  - id: cip-009
    title: "Recovery Plans for BES Cyber Systems"
    requirements: [r1]
    description: >-
      Specifies recovery plan requirements in support of the continued
      stability, operability, and reliability of the BES following a
      Cyber Security Incident.
  - id: cip-010
    title: "Configuration Change Management and Vulnerability Assessments"
    requirements: [r1, r2]
    description: >-
      Prevents and detects unauthorized changes to BES Cyber Systems
      by specifying configuration change management and vulnerability
      assessment requirements.
  - id: cip-011
    title: "Information Protection"
    requirements: [r1]
    description: >-
      Prevents unauthorized access to BES Cyber System Information
      by specifying information protection requirements.
  - id: cip-013
    title: "Supply Chain Risk Management"
    requirements: [r1]
    description: >-
      Mitigates cyber security risks to the reliable operation of the
      BES by implementing security controls for supply chain risk
      management of industrial control system hardware, software,
      and computing and networking services.

