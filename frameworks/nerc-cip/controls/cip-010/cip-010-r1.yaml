id: cip-010-r1
family: cip-010
title: "Configuration Change Management"
class: NERC-CIP

statement:
  prose: >-
    Each Responsible Entity shall implement one or more documented
    processes that collectively include the applicable requirement parts
    to manage changes to BES Cyber Systems configuration.
  parts:
    - id: cip-010-r1.1
      label: "1.1"
      prose: >-
        Develop a baseline configuration, individually or by group,
        which shall include the following items: operating system(s)
        or firmware (including version); any commercially available
        or open-source application software (including version)
        intentionally installed; any custom software installed;
        any logical network accessible ports; and any security
        patches applied.
    - id: cip-010-r1.2
      label: "1.2"
      prose: >-
        Authorize and document changes that deviate from the
        existing baseline configuration.
    - id: cip-010-r1.3
      label: "1.3"
      prose: >-
        For a change that deviates from the existing baseline
        configuration, update the baseline configuration as
        necessary within 30 calendar days of completing the change.
    - id: cip-010-r1.4
      label: "1.4"
      prose: >-
        For a change that deviates from the existing baseline
        configuration: prior to the change, determine required
        cyber security controls; after the change, verify that
        required cyber security controls are not adversely affected;
        and document the results of the verification.

guidance:
  prose: >-
    CIP-010 R1 establishes configuration management discipline for BES
    Cyber Systems. The baseline configuration is a defined, documented
    state that serves as the reference point for detecting unauthorized
    changes. The five baseline elements (OS/firmware, commercial software,
    custom software, ports, and patches) collectively define the system's
    expected configuration. All changes must be authorized, documented,
    and verified to not degrade security controls. The 30-day baseline
    update requirement ensures documentation stays current. Pre-change
    security control analysis and post-change verification form a
    change management gate that prevents security regression. In OT
    environments, configuration baselines may include PLC programs,
    relay settings, and firmware versions specific to the asset.

references:
  - citation: "NERC CIP-010-4 — Configuration Change Management and Vulnerability Assessments"
    url: "https://www.nerc.com/pa/Stand/Reliability%20Standards/CIP-010-4.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement Infrastructure-as-Code as the primary mechanism for
      maintaining configuration baselines. All five baseline elements
      should be declared in version-controlled configuration artifacts.
      Deploy automated configuration drift detection that compares
      running configurations against declared baselines. Implement
      automated baseline generation tools that capture current system
      state into machine-readable formats. Use container image
      registries with signed, versioned images as immutable baselines
      for containerized workloads. Deploy dashboards showing baseline
      compliance status, pending changes, and drift detections.
    tools:
      - terraform
      - ansible
      - backstage
      - grafana
      - opa

  devsecops:
    prose: >-
      Enforce all configuration changes through merge requests with
      mandatory approval and security review. Implement CI pipeline
      stages that validate changes against security control requirements
      before deployment. Create automated post-deployment verification
      tests that confirm security controls remain intact. Store
      configuration baselines as version-controlled artifacts with
      automated drift detection. Enforce the 30-day baseline update
      requirement through pipeline automation that flags stale
      baselines. Implement security scanning (SAST, DAST, container
      scanning) as pre-change and post-change verification gates.
    tools:
      - gitlab-ci
      - gitlab-approval-rules
      - checkov
      - conftest
      - trivy
      - scanner_sast
      - scanner_dast

  secops:
    prose: >-
      Monitor for unauthorized configuration changes through
      continuous baseline comparison. Alert on configuration drift
      from documented baselines. Track change authorization records
      and verify all deployed changes have corresponding approvals.
      Generate audit reports showing baseline currency, change
      history, security verification results, and any unauthorized
      modifications. Correlate configuration changes with security
      events to detect potential compromise.
    tools:
      - splunk
      - elastic-siem
      - tenable
      - servicenow

