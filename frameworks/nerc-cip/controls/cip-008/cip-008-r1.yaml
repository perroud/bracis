id: cip-008-r1
family: cip-008
title: "Cyber Security Incident Response Plan"
class: NERC-CIP

statement:
  prose: >-
    Each Responsible Entity shall document one or more Cyber Security
    Incident response plans that collectively include each of the
    applicable requirement parts.
  parts:
    - id: cip-008-r1.1
      label: "1.1"
      prose: >-
        One or more processes to identify, classify, and respond
        to Cyber Security Incidents.
    - id: cip-008-r1.2
      label: "1.2"
      prose: >-
        One or more processes to determine if an identified Cyber
        Security Incident is a Reportable Cyber Security Incident
        and, if so, notification procedures to the Electricity
        Subsector Coordinating Council (ESCC) or their designee
        within the required timelines.
    - id: cip-008-r1.3
      label: "1.3"
      prose: >-
        The roles and responsibilities of Cyber Security Incident
        response groups or individuals.
    - id: cip-008-r1.4
      label: "1.4"
      prose: >-
        Incident handling procedures for Cyber Security Incidents.
    - id: cip-008-r1.5
      label: "1.5"
      prose: >-
        Testing the plan at least once every 15 calendar months
        through a response to an actual Reportable Cyber Security
        Incident or with a paper drill or tabletop exercise, or
        an operational exercise of the incident response plan.
    - id: cip-008-r1.6
      label: "1.6"
      prose: >-
        Updating the plan within 90 calendar days of completion of
        a Cyber Security Incident response plan test or actual
        incident response, documenting any lessons learned.

guidance:
  prose: >-
    CIP-008 R1 establishes the incident response capability for BES
    Cyber Systems. The plan must cover the full incident lifecycle:
    identification, classification (including determining reportability),
    response, and recovery. The ESCC notification requirement for
    Reportable Cyber Security Incidents is a critical compliance
    obligation with specific timelines. The plan must be tested at
    least every 15 months — tabletop exercises are the minimum, but
    operational exercises provide more thorough validation. Lessons
    learned must be incorporated within 90 days of testing or actual
    incidents. The plan should address BES-specific considerations
    including coordination with system operators during incident
    response and maintaining reliable BES operation during and after
    cyber incidents.

references:
  - citation: "NERC CIP-008-6 — Incident Reporting and Response Planning"
    url: "https://www.nerc.com/pa/Stand/Reliability%20Standards/CIP-008-6.pdf"
  - citation: "NERC Rules of Procedure — Section 800 (Reportable Events)"
    url: "https://www.nerc.com/pa/Stand/Pages/CIPStandards.aspx"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement incident response workflows in a ticketing platform
      with predefined playbooks for BES Cyber Security Incidents.
      Deploy automated incident classification logic that evaluates
      reportability criteria. Configure automated notification
      workflows for ESCC reporting when criteria are met. Maintain
      incident response plan documentation in a versioned repository
      with role assignments linked to the identity provider.
      Deploy incident response dashboards showing active incidents,
      response timelines, and historical metrics. Implement
      automated test scheduling for the 15-month exercise cycle.
    tools:
      - servicenow
      - pagerduty
      - backstage
      - grafana
      - terraform

  devsecops:
    prose: >-
      Store incident response plans and playbooks as version-
      controlled documents with mandatory approval for changes.
      Implement CI validation that ensures plans cover all required
      parts (1.1 through 1.6). Create automated reminders for
      plan testing deadlines and 90-day lesson-learned update
      windows. Integrate incident response procedures with CI/CD
      pipelines for automated containment actions (rollback,
      isolation, credential rotation). Track plan versions and
      correlate with test results and actual incident records.
    tools:
      - gitlab-ci
      - gitlab-approval-rules
      - conftest

  secops:
    prose: >-
      Implement SIEM correlation rules for Cyber Security Incident
      identification and classification. Automate initial triage
      and classification against reportability criteria. Monitor
      response timelines against SLA targets and escalate when
      thresholds are at risk. Conduct and document tabletop
      exercises and operational tests. Track lessons learned and
      verify plan updates within the 90-day window. Maintain
      evidence packages for each incident response including
      timeline, actions taken, notifications sent, and outcomes.
    tools:
      - splunk
      - elastic-siem
      - pagerduty
      - servicenow

