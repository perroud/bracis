id: cip-004-r2
family: cip-004
title: "Cyber Security Training"
class: NERC-CIP

statement:
  prose: >-
    Each Responsible Entity shall implement a cyber security training
    program for personnel who have authorized electronic or authorized
    unescorted physical access to BES Cyber Systems. Training shall be
    completed prior to granting authorized access and at least once every
    15 calendar months thereafter.
  parts:
    - id: cip-004-r2.1
      label: "2.1"
      prose: >-
        Training shall cover, at a minimum: cyber security policies;
        physical access controls; electronic access controls; the
        visitor control program; handling of BES Cyber System
        Information and its storage, transit, and use; the identification
        of and responses to Cyber Security Incidents; and recovery
        plans for BES Cyber Systems.
    - id: cip-004-r2.2
      label: "2.2"
      prose: >-
        Each Responsible Entity shall ensure training content is
        updated to reflect changes in applicable cyber security
        policies, procedures, and technology.
    - id: cip-004-r2.3
      label: "2.3"
      prose: >-
        Each Responsible Entity shall document completion of training.

guidance:
  prose: >-
    CIP-004 R2 training is more comprehensive than R1 awareness. It is
    role-specific, must be completed before access is granted, and requires
    a 15-month refresh cycle. The training content must address the seven
    mandatory topics, which collectively cover the operational aspects of
    all major CIP standards. Entities must maintain training records that
    include the individual's name, training date, and content covered.
    Training must be updated when policies or technology change, so a
    static curriculum that never evolves will result in compliance
    findings. Computer-based training, instructor-led sessions, and
    hands-on exercises are all acceptable delivery methods as long as
    completion is documented.

references:
  - citation: "NERC CIP-004-7 — Personnel and Training"
    url: "https://www.nerc.com/pa/Stand/Reliability%20Standards/CIP-004-7.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate training completion tracking with the identity provider
      (IdP) and access management system. Implement automated workflows
      that block access provisioning to BES Cyber System environments
      until training completion is verified. Deploy a learning management
      system with version-controlled training content that maps to each
      CIP topic area. Create dashboards showing training compliance rates,
      upcoming deadlines, and personnel with expiring certifications.
      Automate training content refresh triggers when policy repositories
      are updated.
    tools:
      - backstage
      - keycloak
      - grafana
      - lms-integration
      - terraform

  devsecops:
    prose: >-
      Implement pipeline gates that verify training completion before
      granting deployment access to BES Cyber System environments.
      Store training records and curriculum versions in a Git repository
      with automated validation. Create CI jobs that cross-reference
      access control lists with training completion records and flag
      discrepancies. Enforce merge request approval rules requiring
      that personnel modifying BES Cyber System configurations have
      current training certifications.
    tools:
      - gitlab-ci
      - gitlab-approval-rules
      - conftest
      - opa

  secops:
    prose: >-
      Monitor training completion against the 15-month cycle and generate
      alerts 30 days before expiration. Correlate training records with
      active access to BES Cyber Systems to identify compliance gaps.
      Produce audit evidence packages that demonstrate training was
      completed before initial access and refreshed within the required
      cycle. Track training content versions against policy change dates
      to verify curriculum currency.
    tools:
      - servicenow
      - grc-platform
      - splunk

