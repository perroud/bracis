id: cip-004-r1
family: cip-004
title: "Security Awareness Program"
class: NERC-CIP

statement:
  prose: >-
    Each Responsible Entity shall implement a security awareness program
    that, at least once each calendar quarter, reinforces cyber security
    practices for personnel who have authorized electronic or authorized
    unescorted physical access to BES Cyber Systems. The program shall
    include practices for physical security, electronic access security,
    and the handling of BES Cyber System Information.
  parts:
    - id: cip-004-r1.1
      label: "1.1"
      prose: >-
        Reinforce cyber security practices at least once each
        calendar quarter. Awareness content shall include, at a
        minimum, topics related to physical security, electronic
        access controls, and handling of BES Cyber System Information.

guidance:
  prose: >-
    The security awareness program under CIP-004 R1 is distinct from the
    training requirement in R2. Awareness is intended to be a continuous
    reinforcement activity (quarterly), while training is a more in-depth,
    role-based exercise. Awareness can take many forms: emails, posters,
    newsletters, presentations, videos, or interactive sessions. The key
    is that it reaches all personnel with authorized access and covers the
    three mandatory topic areas. Entities should document the awareness
    delivery method, content, date, and target audience for audit evidence.
    The quarterly cadence means at least one awareness activity per calendar
    quarter (Q1, Q2, Q3, Q4).

references:
  - citation: "NERC CIP-004-7 — Personnel and Training"
    url: "https://www.nerc.com/pa/Stand/Reliability%20Standards/CIP-004-7.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate security awareness tracking into the internal developer
      portal or learning management system (LMS). Automate quarterly
      awareness content distribution via email or intranet announcements.
      Maintain a registry of personnel with authorized access to BES
      Cyber Systems and cross-reference with awareness completion records.
      Deploy dashboards showing awareness compliance rates per department
      and per BES Cyber System impact level.
    tools:
      - backstage
      - grafana
      - lms-integration

  devsecops:
    prose: >-
      Implement pipeline gates that verify personnel awareness completion
      status before granting or renewing access to BES Cyber System
      repositories or deployment pipelines. Store awareness records as
      structured data in a version-controlled repository. Create CI jobs
      that generate quarterly awareness compliance reports and flag
      non-compliant personnel. Automate access revocation workflows
      for personnel who miss quarterly awareness deadlines.
    tools:
      - gitlab-ci
      - gitlab-approval-rules

  secops:
    prose: >-
      Monitor awareness program completion rates and generate alerts
      for personnel who have not completed quarterly awareness within
      the required timeframe. Correlate awareness completion data with
      access logs to identify personnel with active access but
      incomplete awareness requirements. Produce audit-ready evidence
      packages showing quarterly awareness delivery, content covered,
      and personnel completion records.
    tools:
      - servicenow
      - splunk
      - grc-platform

