id: cip-003-r1
family: cip-003
title: "Cyber Security Policies"
class: NERC-CIP

statement:
  prose: >-
    Each Responsible Entity shall document and implement one or more cyber
    security policies that collectively address the following topics for
    its High Impact and Medium Impact BES Cyber Systems: personnel and
    training (CIP-004); Electronic Security Perimeters (CIP-005) including
    Interactive Remote Access; physical security of BES Cyber Systems
    (CIP-006); system security management (CIP-007); incident reporting
    and response planning (CIP-008); recovery plans for BES Cyber Systems
    (CIP-009); configuration change management and vulnerability assessments
    (CIP-010); information protection (CIP-011); and declaring and
    responding to CIP Exceptional Circumstances.
  parts:
    - id: cip-003-r1.1
      label: "1.1"
      prose: >-
        Each Responsible Entity shall review and obtain CIP Senior Manager
        approval for its cyber security policies at least once every
        15 calendar months.
    - id: cip-003-r1.2
      label: "1.2"
      prose: >-
        Each Responsible Entity shall revise its cyber security policies
        as needed to address organizational or technology changes.

guidance:
  prose: >-
    CIP-003 R1 mandates that organizations operating BES Cyber Systems
    establish a documented policy foundation covering the full spectrum of
    CIP requirements. The policies must be approved by the CIP Senior Manager
    (or delegate) and reviewed at least every 15 months. The purpose is to
    ensure that leadership has formally acknowledged and authorized the
    security posture of BES Cyber Systems. Policies should be specific enough
    to provide actionable direction to operational staff while remaining
    flexible enough to accommodate technology and organizational changes.
    Entities should avoid generic boilerplate policies and instead tailor
    them to the specific OT and IT environments that support BES operations.

references:
  - citation: "NERC CIP-003-8 — Security Management Controls"
    url: "https://www.nerc.com/pa/Stand/Reliability%20Standards/CIP-003-8.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      Publish cyber security policies as versioned documents in a central
      policy repository (Git-based or internal developer portal). Implement
      automated policy review reminders that trigger 30 days before the
      15-month review deadline. Use policy-as-code frameworks to encode
      enforceable policy statements as machine-readable rules that can be
      validated across the platform. Maintain an approval workflow that
      captures the CIP Senior Manager's formal approval with timestamps
      and digital signatures. Link policies to the systems they govern
      through metadata tags that reference BES Cyber System impact ratings.
    tools:
      - backstage
      - open-policy-agent
      - git
      - terraform

  devsecops:
    prose: >-
      Store policies in a dedicated Git repository with branch protection
      requiring CIP Senior Manager (or delegate) approval via merge request.
      Implement CI jobs that validate policy documents for required sections
      (one per CIP standard topic). Create automated compliance checks that
      verify policy review dates and flag overdue reviews in the pipeline
      dashboard. Enforce that all deployment pipelines reference the
      applicable policy version, creating a traceable link between
      operational activities and governing policies.
    tools:
      - gitlab-ci
      - gitlab-approval-rules
      - conftest
      - gitlab-compliance-framework

  secops:
    prose: >-
      Monitor policy compliance by tracking review and approval dates in
      a GRC platform. Generate automated alerts 30 and 60 days before
      policy review deadlines. Maintain an evidence repository linking
      each policy to its approval records, revision history, and the
      CIP Senior Manager acknowledgment. Produce audit-ready reports
      showing policy coverage across all CIP topic areas and their
      current approval status.
    tools:
      - servicenow
      - grc-platform
      - splunk

