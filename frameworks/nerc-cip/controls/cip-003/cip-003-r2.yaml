id: cip-003-r2
family: cip-003
title: "Cyber Security Plans for Low Impact BES Cyber Systems"
class: NERC-CIP

statement:
  prose: >-
    Each Responsible Entity shall implement one or more documented cyber
    security plans for its assets containing Low Impact BES Cyber Systems
    that include the sections listed in parts 2.1 through 2.5.
  parts:
    - id: cip-003-r2.1
      label: "2.1"
      prose: >-
        Cyber security awareness: reinforce, at least once every
        15 calendar months, cyber security practices for the
        Responsible Entity's personnel who have authorized electronic
        or authorized unescorted physical access to Low Impact BES
        Cyber Systems.
    - id: cip-003-r2.2
      label: "2.2"
      prose: >-
        Physical security controls: control physical access, based
        on need, to Low Impact BES Cyber Systems and their associated
        Cyber Assets.
    - id: cip-003-r2.3
      label: "2.3"
      prose: >-
        Electronic access controls: for each asset containing Low
        Impact BES Cyber Systems, permit only necessary inbound and
        outbound electronic access. Authenticate all Dial-up
        Connectivity.
    - id: cip-003-r2.4
      label: "2.4"
      prose: >-
        Cyber Security Incident response: identify, classify, and
        respond to Cyber Security Incidents; determine whether an
        identified Cyber Security Incident is a Reportable Cyber
        Security Incident and notify the Electricity Subsector
        Coordinating Council (ESCC).
    - id: cip-003-r2.5
      label: "2.5"
      prose: >-
        Transient Cyber Asset and Removable Media Malicious Code
        Risk Mitigation: mitigate the risk of the introduction of
        malicious code to Low Impact BES Cyber Systems through the
        use of Transient Cyber Assets or Removable Media.

guidance:
  prose: >-
    CIP-003 R2 provides a streamlined but still mandatory set of cyber
    security requirements for Low Impact BES Cyber Systems. While less
    prescriptive than High/Medium requirements, these plans must still
    be documented, implemented, and maintained. The plans cover the
    essential security domains (awareness, physical access, electronic
    access, incident response, and malicious code mitigation) at a
    level appropriate for the lower risk profile. Entities often
    underestimate the effort required for Low Impact compliance because
    the requirement text appears simpler, but the obligation to
    document and implement is absolute.

references:
  - citation: "NERC CIP-003-8 — Security Management Controls"
    url: "https://www.nerc.com/pa/Stand/Reliability%20Standards/CIP-003-8.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      Create standardized templates for Low Impact cyber security plans
      that cover all five required sections. Store plans in a versioned
      repository linked to asset inventory records. Implement automated
      reminders for the 15-month awareness reinforcement cycle. Use
      network segmentation tools to enforce electronic access controls
      on Low Impact asset network segments. Deploy lightweight monitoring
      agents on Low Impact BES Cyber Systems to detect unauthorized
      access attempts and malicious code introduction.
    tools:
      - backstage
      - terraform
      - ansible
      - grafana

  devsecops:
    prose: >-
      Maintain Low Impact cyber security plans as version-controlled
      documents with CI validation for completeness (all five sections
      present). Implement pipeline checks that verify electronic access
      control configurations (firewall rules, ACLs) match the documented
      plan. Create automated tests that validate network segmentation
      between Low Impact and other BES Cyber System tiers. Track plan
      review dates and trigger alerts for overdue updates.
    tools:
      - gitlab-ci
      - conftest
      - checkov
      - gitlab-compliance-framework

  secops:
    prose: >-
      Monitor electronic access to Low Impact BES Cyber Systems for
      anomalous patterns. Track cyber security awareness completion
      records and alert on personnel who have not completed the
      15-month reinforcement cycle. Maintain incident response
      procedures specific to Low Impact systems and ensure they
      integrate with the entity's broader incident response workflow.
      Monitor for malicious code on Transient Cyber Assets before
      and after connection to Low Impact BES Cyber Systems.
    tools:
      - splunk
      - elastic-siem
      - servicenow

legal_references:
