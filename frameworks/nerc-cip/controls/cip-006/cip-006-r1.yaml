id: cip-006-r1
family: cip-006
title: "Physical Security Plan"
class: NERC-CIP

statement:
  prose: >-
    Each Responsible Entity shall implement one or more documented
    physical security plans that collectively include the applicable
    requirement parts to manage physical access to BES Cyber Systems.
  parts:
    - id: cip-006-r1.1
      label: "1.1"
      prose: >-
        Define operational or procedural controls to restrict physical
        access to only those individuals who have authorized unescorted
        physical access.
    - id: cip-006-r1.2
      label: "1.2"
      prose: >-
        Utilize at least one physical access control to allow
        unescorted physical access into each applicable Physical
        Security Perimeter to only those individuals who have
        authorized unescorted physical access.
    - id: cip-006-r1.3
      label: "1.3"
      prose: >-
        Where technically feasible, utilize two or more different
        physical access controls to collectively allow unescorted
        physical access into Physical Security Perimeters that
        contain High Impact BES Cyber Systems.
    - id: cip-006-r1.4
      label: "1.4"
      prose: >-
        Monitor for unauthorized access through a physical access
        point into a Physical Security Perimeter.
    - id: cip-006-r1.5
      label: "1.5"
      prose: >-
        Issue an alarm or alert in response to detected unauthorized
        access through a physical access point into a Physical
        Security Perimeter.
    - id: cip-006-r1.6
      label: "1.6"
      prose: >-
        Monitor each Physical Access Control System for unauthorized
        physical access to a Physical Access Control System.
    - id: cip-006-r1.7
      label: "1.7"
      prose: >-
        Issue an alarm or alert in response to detected unauthorized
        physical access to a Physical Access Control System.
    - id: cip-006-r1.8
      label: "1.8"
      prose: >-
        Log authorized and unauthorized physical access through
        each Physical Security Perimeter access point, retaining
        logs for at least 90 calendar days.
    - id: cip-006-r1.9
      label: "1.9"
      prose: >-
        Retain physical access logs of entry into each Physical
        Security Perimeter for at least 90 calendar days.
    - id: cip-006-r1.10
      label: "1.10"
      prose: >-
        Restrict physical access to cabling and other nonprogrammable
        communication components used for connection between
        applicable Cyber Assets within the same Electronic
        Security Perimeter in those instances when such cabling
        and components are located outside of a Physical Security
        Perimeter.

guidance:
  prose: >-
    CIP-006 R1 addresses the physical security dimension of BES Cyber
    System protection. Physical access controls are the last line of
    defense if electronic controls are compromised. The requirement
    mandates a layered approach: documented plans, access controls
    (two-factor for High Impact), continuous monitoring, alerting on
    unauthorized access, and comprehensive logging with 90-day
    retention. The Physical Security Perimeter (PSP) is the physical
    boundary within which BES Cyber Systems reside. All access points
    must be controlled, monitored, and logged. High Impact systems
    require two or more different physical access control methods
    (e.g., card reader plus biometric), providing defense in depth.

references:
  - citation: "NERC CIP-006-6 — Physical Security of BES Cyber Systems"
    url: "https://www.nerc.com/pa/Stand/Reliability%20Standards/CIP-006-6.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate physical access control systems (PACS) with the
      centralized IAM platform so that physical and logical access
      are managed through a unified identity lifecycle. Deploy
      monitoring dashboards that visualize real-time physical access
      events across all Physical Security Perimeters. Implement
      automated log collection from PACS into the central logging
      platform with 90-day retention policies. For data center
      environments housing BES Cyber Systems, use Infrastructure-as-Code
      to define and enforce physical zone classifications and their
      associated access requirements. Deploy environmental monitoring
      (temperature, humidity, power) alongside physical access monitoring
      for comprehensive physical security visibility.
    tools:
      - grafana
      - backstage
      - terraform
      - keycloak

  devsecops:
    prose: >-
      Store physical security plan documentation as version-controlled
      artifacts with mandatory approval workflows for changes.
      Implement CI validation that ensures physical security plans
      cover all required parts (1.1 through 1.10). Create automated
      checks that verify physical access log retention meets the
      90-day requirement. Integrate physical access events into
      the security event pipeline for correlation with electronic
      access events. Track physical security plan review dates
      and trigger alerts for overdue updates.
    tools:
      - gitlab-ci
      - gitlab-approval-rules
      - conftest

  secops:
    prose: >-
      Monitor physical access events in real time across all Physical
      Security Perimeters. Configure alerting for unauthorized access
      attempts, tailgating detection, and access outside normal hours.
      Correlate physical access events with electronic access logs to
      detect anomalies (e.g., physical access without corresponding
      electronic login). Generate monthly reports on physical access
      patterns, alarm events, and resolution times. Verify 90-day
      log retention compliance through automated retention monitoring.
    tools:
      - splunk
      - elastic-siem
      - genetec
      - servicenow

