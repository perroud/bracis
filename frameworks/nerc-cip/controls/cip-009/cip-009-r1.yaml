id: cip-009-r1
family: cip-009
title: "Recovery Plans"
class: NERC-CIP

statement:
  prose: >-
    Each Responsible Entity shall have one or more documented recovery
    plans that collectively include the applicable requirement parts
    for each of its BES Cyber Systems.
  parts:
    - id: cip-009-r1.1
      label: "1.1"
      prose: >-
        Conditions for activation of the recovery plan(s).
    - id: cip-009-r1.2
      label: "1.2"
      prose: >-
        Roles and responsibilities of responders.
    - id: cip-009-r1.3
      label: "1.3"
      prose: >-
        One or more processes for the backup and storage of
        information required to recover BES Cyber System
        functionality.
    - id: cip-009-r1.4
      label: "1.4"
      prose: >-
        One or more processes to verify the successful completion
        of the backup processes in part 1.3 and to address any
        backup failures.
    - id: cip-009-r1.5
      label: "1.5"
      prose: >-
        One or more processes to preserve data, per Cyber Asset
        capability, for determining the cause of a Cyber Security
        Incident that triggers activation of the recovery plan(s).
        Data preservation should not impede or restrict recovery.
    - id: cip-009-r1.6
      label: "1.6"
      prose: >-
        Testing the recovery plan(s) at least once every 15 calendar
        months through an operational exercise of the recovery plans
        in a representative environment, or through an actual recovery.

guidance:
  prose: >-
    CIP-009 R1 ensures that BES Cyber Systems can be recovered after
    a Cyber Security Incident. Recovery plans must be comprehensive,
    covering activation conditions, role assignments, backup processes,
    backup verification, forensic data preservation, and regular testing.
    The 15-month testing cycle must use a representative environment,
    meaning the test should closely simulate actual recovery conditions.
    Forensic data preservation (part 1.5) is critical for post-incident
    investigation but must not delay recovery — this tension requires
    careful planning. Backup verification (part 1.4) is often
    overlooked; entities must actively verify that backups are usable,
    not just that the backup job completed successfully. Recovery time
    objectives should be aligned with BES reliability requirements.

references:
  - citation: "NERC CIP-009-6 — Recovery Plans for BES Cyber Systems"
    url: "https://www.nerc.com/pa/Stand/Reliability%20Standards/CIP-009-6.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated backup pipelines for all BES Cyber System
      configurations, data, and firmware images. Deploy backup
      verification processes that periodically restore backups to
      a test environment and validate functionality. Implement
      Infrastructure-as-Code for BES Cyber System environments
      to enable rapid, repeatable recovery. Store recovery plan
      documentation alongside infrastructure code with version
      control and approval workflows. Deploy dashboards showing
      backup status, verification results, and recovery plan
      test schedules. Implement forensic data collection tools
      that can capture system state without impeding recovery.
    tools:
      - terraform
      - ansible
      - velero
      - backstage
      - grafana

  devsecops:
    prose: >-
      Store recovery plans and procedures as version-controlled
      artifacts with CI validation for completeness. Implement
      automated backup verification pipelines that test restore
      procedures in isolated environments. Create pipeline stages
      for recovery testing that can be triggered on schedule (15-month
      cycle) or on demand. Maintain Infrastructure-as-Code that
      enables full environment reconstruction from source control.
      Implement GitOps workflows that enable rapid redeployment
      of BES Cyber System applications after recovery.
    tools:
      - gitlab-ci
      - terraform
      - argocd
      - velero
      - conftest

  secops:
    prose: >-
      Monitor backup job completion and alert on failures. Verify
      backup integrity through automated restore testing. Implement
      forensic data collection procedures that capture volatile
      and persistent data during incident response without delaying
      recovery. Track recovery plan test schedules and generate
      alerts for approaching deadlines. Document recovery test
      results including recovery time achieved, data integrity
      verification, and identified improvements. Maintain chain of
      custody for forensic data.
    tools:
      - splunk
      - velero
      - servicenow
      - forensic-toolkit

