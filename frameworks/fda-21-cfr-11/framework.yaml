rules:
  - id: subpart-a
    title: "Subpart A — General Provisions (11.1–11.3)"
    description: >-
      Establishes the scope, applicability, and definitions for electronic records
      and electronic signatures under FDA regulations. Defines when electronic
      records and signatures are equivalent to paper records and handwritten
      signatures.
    effective_date: "1997-08-20"
  - id: subpart-b
    title: "Subpart B — Electronic Records (11.10–11.70)"
    description: >-
      Specifies controls for closed systems and open systems used to create,
      modify, maintain, or transmit electronic records. Includes requirements
      for validation, audit trails, access controls, authority checks, and
      signature manifestations.
    effective_date: "1997-08-20"
  - id: subpart-c
    title: "Subpart C — Electronic Signatures (11.100–11.300)"
    description: >-
      Establishes requirements for electronic signatures including uniqueness,
      identity verification, signature components, and controls to ensure that
      electronic signatures are the legally binding equivalent of handwritten
      signatures.
    effective_date: "1997-08-20"

control_families:
  - id: gen
    title: "General Provisions"
    description: "Scope, applicability, implementation, and definitions governing the use of electronic records and electronic signatures in FDA-regulated activities"
    articles: "11.1–11.3"
    control_count: 3
  - id: erec
    title: "Electronic Records"
    description: >-
      Controls for closed systems, open systems, signature manifestations, and
      signature/record linking required to ensure the authenticity, integrity,
      and confidentiality of electronic records
    articles: "11.10–11.70"
    control_count: 14
  - id: esig
    title: "Electronic Signatures"
    description: >-
      General requirements for electronic signatures, identification code and
      password controls, and controls for identification codes and passwords
      to ensure legally binding equivalence to handwritten signatures
    articles: "11.100–11.300"
    control_count: 3

related_frameworks:
  - framework_id: anvisa-134
    relationship: mapped
    description: >-
      ANVISA IN 134 mirrors 21 CFR Part 11 requirements for computerized system
      validation, electronic records integrity, audit trails, and electronic
      signatures in pharmaceutical manufacturing, adapted to the Brazilian
      regulatory context.
  - framework_id: iso-27001-2022
    relationship: mapped
    description: >-
      ISO 27001:2022 controls for access management, audit logging, change
      management, cryptography, and operational security map directly to
      21 CFR Part 11 requirements for electronic record protection and
      system controls.
  - framework_id: nist-800-53-rev5
    relationship: mapped
    description: >-
      NIST 800-53 Rev 5 provides detailed technical controls (AC, AU, IA, CM, SI
      families) that satisfy 21 CFR Part 11 requirements for access control,
      audit trails, identification and authentication, configuration management,
      and system integrity.
  - framework_id: hipaa
    relationship: mapped
    description: >-
      HIPAA Security Rule shares common requirements with 21 CFR Part 11 for
      access controls, audit controls, integrity mechanisms, person
      authentication, and transmission security where electronic health
      information intersects with FDA-regulated records.

