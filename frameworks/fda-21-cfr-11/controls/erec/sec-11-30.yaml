id: sec-11-30
family: erec
title: "Controls for Open Systems"
class: FDA-21CFR11
baselines: [electronic-records-signatures]

statement:
  prose: >-
    Persons who use open systems to create, modify, maintain, or transmit
    electronic records shall employ procedures and controls designed to ensure
    the authenticity, integrity, and, as appropriate, the confidentiality of
    electronic records from the point of their creation to the point of their
    receipt. Such procedures and controls shall include those identified in
    11.10, as appropriate, and additional measures such as document encryption
    and use of appropriate digital signature standards to ensure, as necessary
    under the circumstances, record authenticity, integrity, and
    confidentiality.

guidance:
  prose: >-
    Section 11.30 addresses open systems — environments where the persons
    responsible for electronic record content do not control system access
    (e.g., records transmitted over the internet, stored in third-party cloud
    systems, or shared across organizational boundaries). Open systems must
    implement all applicable controls from Section 11.10 plus additional
    measures including: (1) Document encryption to protect confidentiality
    during transmission and storage. (2) Digital signature standards to
    ensure authenticity and integrity. The additional controls for open
    systems reflect the higher risk associated with environments where
    access control is not fully within the organization's control. Modern
    cloud deployments may qualify as open systems depending on the access
    control architecture. Organizations should apply a risk-based approach
    to determine which additional controls are necessary based on the
    sensitivity and criticality of the records involved.

references:
  - citation: "21 CFR Part 11, Section 11.30"
    url: "https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11/subpart-B/section-11.30"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implement end-to-end encryption (TLS 1.2 or higher) for all
      electronic records transmitted over open networks. 2. Apply
      encryption at rest for electronic records stored in open systems
      using AES-256 or equivalent. 3. Implement digital signatures using
      PKI infrastructure to ensure record authenticity and integrity during
      transmission between systems. 4. Deploy certificate-based mutual
      authentication (mTLS) for system-to-system communication in open
      environments. 5. Implement data loss prevention (DLP) controls to
      prevent unauthorized record exposure. 6. Apply all applicable
      Section 11.10 controls in addition to encryption and digital
      signature measures.
    tools:
      - pki-infrastructure
      - tls-management
      - encryption-at-rest
      - mtls
      - dlp
      - certificate-management
  devsecops:
    prose: >-
      1. Enforce TLS/encryption verification in CI/CD pipeline security
      scans. 2. Implement DAST scanning to detect insecure communication
      channels in Part 11 applications deployed to open environments.
      3. Validate digital signature implementations through automated
      cryptographic tests. 4. Scan for exposed credentials or encryption
      keys in code repositories.
    tools:
      - gitlab-ci
      - dast
      - sast
      - secret-detection
      - tls-verification
  secops:
    prose: >-
      1. Monitor encryption certificate expiration and renew before lapse.
      2. Conduct periodic assessments of open system security controls to
      verify encryption and digital signature effectiveness. 3. Monitor
      for unauthorized data transmission from open systems. 4. Maintain
      an inventory of open systems and their additional security controls
      beyond Section 11.10 requirements.
    tools:
      - certificate-monitoring
      - siem
      - vulnerability-management
      - grc-platform

