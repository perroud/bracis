id: sec-11-10b
family: erec
title: "Closed System Controls — Accurate and Complete Copies"
class: FDA-21CFR11
baselines: [electronic-records-signatures]

statement:
  prose: >-
    (b) The ability to generate accurate and complete copies of records in
    both human readable and electronic form suitable for inspection, review,
    and copying by the agency. Persons should contact the agency if there are
    any questions regarding the ability of the agency to perform such review
    and copying of the electronic records.

guidance:
  prose: >-
    Section 11.10(b) requires that systems must be capable of producing
    accurate and complete copies of electronic records in both human-readable
    format (e.g., printouts, PDF) and electronic format suitable for FDA
    inspection. This means records must be exportable in formats that
    preserve all data fields, metadata, audit trail entries, and electronic
    signatures. The system must not lose any record content during the copy
    or export process. Organizations should establish and validate export
    procedures to ensure fidelity of copied records. FDA inspectors may
    request records in specific electronic formats; systems should support
    common interchange formats.

references:
  - citation: "21 CFR Part 11, Section 11.10(b)"
    url: "https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11/subpart-B/section-11.10"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implement record export functionality that generates both
      human-readable (PDF, printable HTML) and machine-readable (XML, JSON,
      CSV) output formats. 2. Ensure export functions preserve all record
      fields, metadata, timestamps, audit trail entries, and electronic
      signature information. 3. Validate export accuracy by comparing
      exported records against source records for completeness and fidelity.
      4. Implement bulk export capabilities for efficient regulatory
      inspection support. 5. Store records in non-proprietary or widely
      supported formats to ensure long-term accessibility.
    tools:
      - document-management
      - record-export
      - archival-storage
      - format-conversion
  devsecops:
    prose: >-
      1. Include automated tests in the CI/CD pipeline that verify record
      export accuracy and completeness for each supported format. 2. Test
      that exported records maintain data integrity by performing round-trip
      validation (export-import-compare). 3. Verify that audit trail data
      and electronic signature metadata are included in all export formats.
    tools:
      - gitlab-ci
      - automated-testing
      - data-validation
  secops:
    prose: >-
      1. Establish standard operating procedures (SOPs) for generating record
      copies in response to FDA inspection requests. 2. Conduct periodic
      drills to verify that record export procedures produce accurate and
      complete copies within acceptable timeframes. 3. Maintain a record of
      all export activities performed for regulatory inspections.
    tools:
      - sop-management
      - inspection-readiness
      - audit-management

