id: sec-11-10d
family: erec
title: "Closed System Controls — Access Limitations"
class: FDA-21CFR11
baselines: [electronic-records-signatures]

statement:
  prose: >-
    (d) Limiting system access to authorized individuals.

guidance:
  prose: >-
    Section 11.10(d) requires that access to closed systems used for
    electronic records be limited to authorized individuals only. This
    encompasses both physical access to system hardware and logical access
    to system software and data. Access control must be role-based and follow
    the principle of least privilege — each user should have only the minimum
    access necessary to perform their job functions. Access must be granted
    through a formal authorization process, periodically reviewed, and
    promptly revoked when no longer needed (e.g., upon role change or
    termination). The system must support unique user identification to
    ensure individual accountability.

references:
  - citation: "21 CFR Part 11, Section 11.10(d)"
    url: "https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11/subpart-B/section-11.10"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implement centralized identity and access management (IAM) with
      role-based access control (RBAC) for all Part 11-applicable systems.
      2. Enforce unique user identification — prohibit shared or generic
      accounts for any GxP activity requiring attributability. 3. Implement
      multi-factor authentication (MFA) for access to Part 11 systems.
      4. Configure automatic session timeout after a period of inactivity
      appropriate to system criticality. 5. Implement access provisioning
      and deprovisioning workflows with documented approval chains.
      6. Configure account lockout policies after failed authentication
      attempts.
    tools:
      - keycloak
      - active-directory
      - vault
      - mfa-provider
      - iam-platform
  devsecops:
    prose: >-
      1. Enforce branch protection rules requiring authenticated, authorized
      users for all changes to Part 11-applicable system code. 2. Implement
      code owner approval requirements to ensure only authorized personnel
      can approve changes. 3. Scan for hardcoded credentials and access
      bypass mechanisms in the CI/CD pipeline. 4. Verify access control
      configurations as part of deployment validation.
    tools:
      - gitlab-ci
      - secret-detection
      - code-owners
      - branch-protection
  secops:
    prose: >-
      1. Conduct periodic access reviews (at least quarterly) for Part 11
      systems to verify that all access is current and authorized.
      2. Implement immediate access revocation procedures for terminated
      personnel or role changes. 3. Monitor and investigate unauthorized
      access attempts. 4. Maintain an access control log documenting all
      access grants, modifications, and revocations with approver identity
      and justification.
    tools:
      - access-review
      - identity-management
      - siem
      - access-audit

