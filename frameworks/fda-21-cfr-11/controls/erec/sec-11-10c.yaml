id: sec-11-10c
family: erec
title: "Closed System Controls — Record Protection"
class: FDA-21CFR11
baselines: [electronic-records-signatures]

statement:
  prose: >-
    (c) Protection of records to enable their accurate and ready retrieval
    throughout the records retention period.

guidance:
  prose: >-
    Section 11.10(c) requires that electronic records be protected so they
    remain accurately retrievable for the entire retention period specified
    by the applicable predicate rule. Record protection encompasses both
    physical and logical safeguards including backup and recovery procedures,
    media integrity, format migration, and environmental controls. Records
    must be stored in a manner that prevents degradation, loss, or corruption
    over time. Organizations must address technology obsolescence — if the
    system or media used to store records becomes obsolete during the retention
    period, records must be migrated to current technology while maintaining
    accuracy and completeness. Retention periods vary by predicate rule but
    can range from 2 years to the lifetime of the product.

references:
  - citation: "21 CFR Part 11, Section 11.10(c)"
    url: "https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11/subpart-B/section-11.10"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implement tiered storage architecture with automated lifecycle
      policies that retain electronic records for the duration required by
      applicable predicate rules. 2. Configure automated backup schedules
      with verified recovery procedures. Test backup restoration at least
      quarterly. 3. Implement data integrity checks (checksums, hash
      verification) for stored records to detect corruption or tampering.
      4. Plan and execute technology migration strategies to prevent records
      from becoming inaccessible due to hardware, software, or media
      obsolescence. 5. Implement immutable storage (WORM) for critical
      records to prevent accidental or intentional modification or deletion.
    tools:
      - backup-recovery
      - immutable-storage
      - archival-storage
      - data-lifecycle-management
      - checksum-verification
  devsecops:
    prose: >-
      1. Automate backup verification tests in the CI/CD pipeline to confirm
      records can be accurately restored. 2. Implement integrity checks as
      part of deployment procedures to verify record storage systems are
      functioning correctly after changes. 3. Include retention policy
      compliance checks in automated compliance scans.
    tools:
      - gitlab-ci
      - backup-verification
      - integrity-checks
  secops:
    prose: >-
      1. Define and document retention periods for each category of electronic
      record based on applicable predicate rules. 2. Conduct annual reviews
      of record retention compliance to verify all records are retained for
      the required period. 3. Implement and test disaster recovery procedures
      for electronic records. 4. Monitor storage systems for integrity issues
      and capacity to ensure records remain accessible.
    tools:
      - retention-management
      - disaster-recovery
      - storage-monitoring
      - grc-platform

