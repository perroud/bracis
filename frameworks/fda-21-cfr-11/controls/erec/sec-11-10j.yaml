id: sec-11-10j
family: erec
title: "Closed System Controls — Written Policies"
class: FDA-21CFR11
baselines: [electronic-records-signatures]

statement:
  prose: >-
    (j) The establishment of, and adherence to, written policies that hold
    individuals accountable and responsible for actions initiated under their
    electronic signatures, in order to deter record and signature
    falsification.

guidance:
  prose: >-
    Section 11.10(j) requires written policies that establish individual
    accountability for actions performed under electronic signatures. These
    policies must clearly state that electronic signatures carry the same
    legal weight as handwritten signatures, that falsification of records or
    signatures is a serious offense subject to disciplinary action and
    regulatory penalties, and that individuals are personally responsible for
    all actions performed under their electronic signature. Policies should
    address: prohibition of sharing electronic signature credentials,
    consequences of record or signature falsification, individual
    responsibility for safeguarding signature credentials, and the
    organization's commitment to data integrity. All personnel must
    acknowledge understanding of these policies in writing.

references:
  - citation: "21 CFR Part 11, Section 11.10(j)"
    url: "https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11/subpart-B/section-11.10"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implement policy acknowledgment workflows in the system requiring
      users to accept electronic signature accountability policies before
      first use and periodically thereafter. 2. Display accountability
      reminders at the point of electronic signature execution. 3. Implement
      technical controls that support policy enforcement, such as preventing
      credential sharing and logging all signature activities. 4. Maintain
      policy documents in a version-controlled document management system
      with audit trail.
    tools:
      - document-management
      - policy-management
      - e-signature-platform
      - workflow-engine
  devsecops:
    prose: >-
      1. Implement contributor acknowledgment requirements in the development
      workflow for Part 11 system codebases. 2. Enforce signed commits or
      verified identities for all contributions to Part 11 system code.
      3. Document accountability policies in the project repository and
      require developer acknowledgment.
    tools:
      - gitlab-ci
      - signed-commits
      - contributor-agreements
  secops:
    prose: >-
      1. Develop, maintain, and distribute written policies covering
      electronic signature accountability, record falsification prohibitions,
      and credential safeguarding responsibilities. 2. Obtain documented
      acknowledgments from all personnel using electronic signatures.
      3. Investigate and enforce consequences for policy violations including
      credential sharing or signature falsification. 4. Conduct periodic
      policy reviews and updates at least annually. 5. Include electronic
      signature accountability in onboarding and annual compliance training.
    tools:
      - policy-management
      - training-management
      - investigation-management
      - grc-platform

