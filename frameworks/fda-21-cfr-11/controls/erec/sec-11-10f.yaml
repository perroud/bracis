id: sec-11-10f
family: erec
title: "Closed System Controls — Operational System Checks"
class: FDA-21CFR11
baselines: [electronic-records-signatures]

statement:
  prose: >-
    (f) Use of operational system checks to enforce permitted sequencing of
    steps and events, as appropriate.

guidance:
  prose: >-
    Section 11.10(f) requires that systems enforce the correct sequencing
    of steps and events through operational system checks. This ensures that
    process steps are performed in the correct order and that required
    preceding steps are completed before subsequent steps can begin. For
    example, in a manufacturing execution system, a batch record should
    enforce that weighing is completed before blending can start, or that QA
    review is completed before batch release. Operational checks prevent
    users from skipping required steps, performing steps out of order, or
    proceeding without completing prerequisite actions. The level of
    sequencing enforcement should be risk-based, with critical process steps
    having mandatory sequencing and non-critical steps having advisory
    sequencing.

references:
  - citation: "21 CFR Part 11, Section 11.10(f)"
    url: "https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11/subpart-B/section-11.10"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implement workflow engines that enforce mandatory step sequencing
      for GxP processes, preventing out-of-order execution. 2. Configure
      prerequisite checks that verify completion of required preceding steps
      before allowing the next step to begin. 3. Implement state machine
      patterns in application logic to enforce valid process transitions.
      4. Build configurable workflow templates that allow quality assurance
      to define required step sequences without code changes. 5. Log all
      sequencing enforcement events (both allowed and blocked transitions)
      in the audit trail.
    tools:
      - workflow-engine
      - state-machine
      - business-process-management
      - mes-system
  devsecops:
    prose: >-
      1. Enforce pipeline stage sequencing in CI/CD to ensure build, test,
      and deployment stages execute in the correct order. 2. Implement
      quality gates between pipeline stages that prevent progression until
      all preceding requirements are met. 3. Test operational check
      enforcement through negative test cases that attempt to bypass
      sequencing controls.
    tools:
      - gitlab-ci
      - pipeline-gates
      - automated-testing
  secops:
    prose: >-
      1. Define and document required step sequences for each GxP process
      managed by Part 11 systems. 2. Verify operational check enforcement
      during periodic system audits. 3. Investigate and document any
      instances where operational sequencing was bypassed or overridden.
    tools:
      - grc-platform
      - audit-management
      - process-documentation

