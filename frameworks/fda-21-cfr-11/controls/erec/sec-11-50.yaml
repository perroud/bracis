id: sec-11-50
family: erec
title: "Signature Manifestations"
class: FDA-21CFR11
baselines: [electronic-records-signatures]

statement:
  prose: >-
    (a) Signed electronic records shall contain information associated with
    the signing that clearly indicates all of the following: (1) The printed
    name of the signer; (2) The date and time when the signature was executed;
    and (3) The meaning (such as review, approval, responsibility, or
    authorship) associated with the signature. (b) The items identified in
    paragraphs (a)(1), (a)(2), and (a)(3) of this section shall be subject
    to the same controls as for electronic records and shall be included as
    part of any human readable form of the electronic record (such as
    electronic display or printout).

guidance:
  prose: >-
    Section 11.50 requires that every signed electronic record must display
    three elements: (1) the signer's printed name, (2) the date and time of
    signature, and (3) the meaning of the signature (e.g., reviewed,
    approved, authored, verified, released). These signature manifestation
    elements must be treated with the same controls as the electronic records
    themselves — they must appear in audit trails, be protected from
    alteration, and be included in any human-readable display or printout of
    the record. The signature meaning is particularly important in regulated
    environments where multiple signatures may appear on a single record,
    each with a different purpose (e.g., the person who authored a batch
    record, the person who reviewed it, and the person who approved it for
    release).

references:
  - citation: "21 CFR Part 11, Section 11.50"
    url: "https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11/subpart-B/section-11.50"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implement electronic signature functionality that captures and
      stores the signer's full printed name, the exact date and time of
      signature (synchronized to NTP), and the signature meaning.
      2. Design signature display components that show all three
      manifestation elements in both on-screen views and printed/exported
      outputs. 3. Store signature manifestation data with the same
      integrity protections as the electronic record itself (immutable
      audit trail, access controls, retention). 4. Support configurable
      signature meanings (review, approval, authorship, verification,
      release) per business process workflow. 5. Ensure signature
      manifestation elements cannot be modified after signature execution.
    tools:
      - e-signature-platform
      - ntp-synchronization
      - document-management
      - workflow-engine
  devsecops:
    prose: >-
      1. Implement automated tests verifying that all three signature
      manifestation elements appear in every signature execution path.
      2. Test that signature manifestation data appears correctly in all
      output formats (screen display, PDF export, printout). 3. Verify
      immutability of signature manifestation data through negative test
      cases attempting post-signature modification.
    tools:
      - gitlab-ci
      - automated-testing
      - ui-testing
  secops:
    prose: >-
      1. Verify during periodic audits that all signed electronic records
      display the required three manifestation elements. 2. Review signature
      meaning configurations to ensure they accurately reflect the intended
      purpose of each signature in the business process. 3. Investigate any
      instances where signature manifestation elements are missing or
      inconsistent. 4. Include signature manifestation verification in
      inspection readiness procedures.
    tools:
      - audit-management
      - inspection-readiness
      - compliance-monitoring

