id: sec-11-10i
family: erec
title: "Closed System Controls — Personnel Training"
class: FDA-21CFR11
baselines: [electronic-records-signatures]

statement:
  prose: >-
    (i) Determination that persons who develop, maintain, or use electronic
    record/electronic signature systems have the education, training, and
    experience to perform their assigned tasks.

guidance:
  prose: >-
    Section 11.10(i) requires that all personnel involved with electronic
    record and electronic signature systems — including developers,
    administrators, and end users — possess adequate education, training, and
    experience for their assigned tasks. This requirement extends across the
    full system lifecycle: development, validation, maintenance, and
    operational use. Training must be documented, role-specific, and include
    both system-specific training (how to use the system) and regulatory
    training (understanding Part 11 requirements and their implications).
    Training records must be maintained and readily available for FDA
    inspection. Personnel competency should be assessed and verified, not
    merely assumed from training attendance.

references:
  - citation: "21 CFR Part 11, Section 11.10(i)"
    url: "https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11/subpart-B/section-11.10"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implement a training management system (TMS) that tracks training
      requirements, completion, and currency for all personnel interacting
      with Part 11 systems. 2. Define role-based training curricula covering
      system operation, data integrity, electronic signatures, and Part 11
      regulatory requirements. 3. Implement training prerequisite enforcement
      in systems so users cannot access Part 11 functions until required
      training is completed and current. 4. Automate training expiry
      notifications and access restrictions for personnel with lapsed
      training.
    tools:
      - training-management
      - lms
      - iam-platform
      - competency-tracking
  devsecops:
    prose: >-
      1. Ensure all developers working on Part 11 systems have documented
      training on secure coding practices, GAMP 5 methodology, and Part 11
      requirements. 2. Include training verification as a gating criterion
      before granting developer access to Part 11 system repositories.
      3. Conduct code reviews by personnel with demonstrated competency in
      Part 11 system development.
    tools:
      - training-management
      - access-control
      - code-review
  secops:
    prose: >-
      1. Maintain comprehensive training records for all personnel involved
      with Part 11 systems, including training dates, content, trainer
      qualifications, and competency assessments. 2. Conduct periodic
      training effectiveness assessments to verify personnel competency.
      3. Implement initial training for new personnel and refresher training
      on a periodic basis (at least annually). 4. Ensure training records are
      available for FDA inspection within a reasonable timeframe.
    tools:
      - training-management
      - competency-assessment
      - document-management
      - inspection-readiness

