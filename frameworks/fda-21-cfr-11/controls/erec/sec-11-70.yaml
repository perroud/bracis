id: sec-11-70
family: erec
title: "Signature/Record Linking"
class: FDA-21CFR11
baselines: [electronic-records-signatures]

statement:
  prose: >-
    Electronic signatures and handwritten signatures executed to electronic
    records shall be linked to their respective electronic records to ensure
    that the signatures cannot be excised, copied, or otherwise transferred
    to falsify an electronic record by ordinary means.

guidance:
  prose: >-
    Section 11.70 requires that electronic signatures be cryptographically
    or technically linked to the specific electronic record they authenticate,
    so that the signature cannot be removed, copied, or transferred to a
    different record. This prevents signature falsification by ensuring a
    tamper-evident binding between the signature and the record content. If
    the record is altered after signing, the link should become invalid or
    detectable. Implementation approaches include cryptographic hash binding
    (where the signature includes a hash of the record content), database
    referential integrity constraints, or digital signature mechanisms that
    incorporate the record data in the signature computation. The linkage must
    be robust enough that ordinary technical means cannot separate the
    signature from the record without detection.

references:
  - citation: "21 CFR Part 11, Section 11.70"
    url: "https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11/subpart-B/section-11.70"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implement cryptographic hash binding between electronic signatures
      and the records they authenticate, so that any modification to the
      record after signing invalidates or detects the change. 2. Use digital
      signature algorithms (e.g., RSA, ECDSA) that incorporate the record
      content in the signature computation. 3. Implement database-level
      referential integrity constraints preventing signature records from
      being dissociated from their parent electronic records. 4. Store
      signatures and records in a manner that prevents signature excision,
      copying, or transfer through application-level controls. 5. Implement
      tamper-detection mechanisms that alert on any attempt to modify the
      signature-record linkage.
    tools:
      - pki-infrastructure
      - digital-signatures
      - hash-verification
      - database-integrity
      - tamper-detection
  devsecops:
    prose: >-
      1. Implement automated tests verifying that signatures are
      cryptographically bound to record content and that record modification
      after signing is detected. 2. Test signature transfer prevention by
      attempting to copy signatures between records and verifying detection.
      3. Include signature linking integrity checks in CI/CD pipeline
      security testing.
    tools:
      - gitlab-ci
      - automated-testing
      - cryptographic-testing
  secops:
    prose: >-
      1. Verify signature-record linkage integrity during periodic audits
      by testing that signed records cannot be modified without detection.
      2. Monitor for attempts to tamper with signature-record relationships.
      3. Include signature linking verification in inspection readiness
      procedures. 4. Investigate any anomalies in signature-record
      relationships discovered during audits or monitoring.
    tools:
      - audit-management
      - integrity-monitoring
      - siem
      - inspection-readiness

