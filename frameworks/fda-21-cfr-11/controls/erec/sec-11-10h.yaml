id: sec-11-10h
family: erec
title: "Closed System Controls — Device Checks"
class: FDA-21CFR11
baselines: [electronic-records-signatures]

statement:
  prose: >-
    (h) Use of device (e.g., terminal) checks to determine, as appropriate,
    the validity of the source of data input or operational instruction.

guidance:
  prose: >-
    Section 11.10(h) requires device checks to validate the source of data
    input or operational instructions. This ensures that data entering the
    system comes from authorized and valid sources — such as verified
    instruments, authorized terminals, or known network endpoints. Device
    checks are particularly relevant for systems that receive data from
    automated instruments (e.g., HPLC, spectrophotometers), manufacturing
    equipment (e.g., PLCs, SCADA), or remote terminals. Organizations should
    implement device authentication, network access controls, and data source
    validation to ensure that only trusted devices can provide input to
    Part 11 systems. Device identity should be verified through certificates,
    MAC address filtering, network segmentation, or similar mechanisms.

references:
  - citation: "21 CFR Part 11, Section 11.10(h)"
    url: "https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11/subpart-B/section-11.10"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implement device authentication using certificates or secure tokens
      to verify the identity of devices providing data to Part 11 systems.
      2. Configure network segmentation to isolate Part 11 system networks
      from general-purpose networks. 3. Implement data source validation
      checks that verify incoming data originates from authorized and
      calibrated instruments. 4. Maintain a device registry documenting all
      authorized input devices, their network identities, and calibration
      status. 5. Configure firewalls and access control lists to restrict
      connections to Part 11 systems to authorized devices only.
    tools:
      - device-certificates
      - network-segmentation
      - firewall
      - device-registry
      - instrument-integration
  devsecops:
    prose: >-
      1. Implement device authentication verification in the CI/CD pipeline
      for systems that interface with laboratory or manufacturing equipment.
      2. Scan for insecure device communication protocols (e.g., unencrypted
      data transfers from instruments). 3. Validate device check
      configurations as part of deployment verification.
    tools:
      - gitlab-ci
      - network-scanning
      - protocol-validation
  secops:
    prose: >-
      1. Maintain an inventory of all devices authorized to provide input to
      Part 11 systems and review it at least annually. 2. Monitor network
      traffic for unauthorized device connections to Part 11 systems.
      3. Verify device calibration and qualification status as part of
      periodic system reviews. 4. Investigate and document any instances
      of data input from unauthorized devices.
    tools:
      - asset-management
      - network-monitoring
      - siem
      - calibration-management

