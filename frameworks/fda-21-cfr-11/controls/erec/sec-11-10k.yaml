id: sec-11-10k
family: erec
title: "Closed System Controls — Documentation Controls"
class: FDA-21CFR11
baselines: [electronic-records-signatures]

statement:
  prose: >-
    (k) Use of appropriate controls over systems documentation including:
    (1) Adequate controls over the distribution of, access to, and use of
    documentation for system operation and maintenance. (2) Revision and
    change control procedures to maintain an audit trail that documents
    time-sequenced development and modification of systems documentation.

guidance:
  prose: >-
    Section 11.10(k) requires controls over systems documentation
    encompassing two areas: (1) Distribution, access, and use controls —
    ensuring that personnel use only current, approved versions of system
    documentation (SOPs, user manuals, configuration specifications, validation
    documents). Obsolete versions must be removed from active use. (2)
    Revision and change control — maintaining a time-sequenced audit trail
    of all documentation changes throughout the system lifecycle. This
    includes development documents, validation documents, operational
    procedures, and configuration specifications. Version control systems
    should track who made changes, when, what was changed, and why. This
    requirement applies to both system-level documentation and process-level
    documentation used in conjunction with Part 11 systems.

references:
  - citation: "21 CFR Part 11, Section 11.10(k)"
    url: "https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11/subpart-B/section-11.10"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implement a document management system (DMS) with version control,
      access control, and audit trail for all Part 11 system documentation.
      2. Configure automatic distribution and notification of document
      updates to affected personnel. 3. Implement controls to prevent use
      of obsolete document versions (watermarking, automatic withdrawal of
      superseded versions). 4. Use infrastructure-as-code and version control
      (Git) for system configuration documentation, providing inherent
      change tracking with timestamps and author identification.
      5. Implement document approval workflows requiring appropriate
      authority before publication.
    tools:
      - document-management
      - git
      - version-control
      - approval-workflows
  devsecops:
    prose: >-
      1. Store all system documentation in version control alongside system
      code to maintain synchronized documentation and code versions.
      2. Enforce documentation update requirements as part of merge request
      checklists for Part 11 system changes. 3. Implement automated checks
      that verify documentation is updated when related code changes are
      made. 4. Use merge request approval rules to enforce documentation
      review by qualified personnel.
    tools:
      - gitlab-ci
      - git
      - merge-request-templates
      - documentation-checks
  secops:
    prose: >-
      1. Establish and enforce document control SOPs covering creation,
      review, approval, distribution, and retirement of Part 11 system
      documentation. 2. Conduct periodic audits to verify only current
      approved documentation is in use. 3. Maintain a document register
      tracking all controlled documents, their current versions, and
      distribution lists. 4. Review and update system documentation at
      least annually or when significant system changes occur.
    tools:
      - document-management
      - audit-management
      - sop-management
      - change-control

