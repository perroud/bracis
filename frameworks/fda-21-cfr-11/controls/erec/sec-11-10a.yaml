id: sec-11-10a
family: erec
title: "Closed System Controls — Validation"
class: FDA-21CFR11
baselines: [electronic-records-signatures]

statement:
  prose: >-
    Persons who use closed systems to create, modify, maintain, or transmit
    electronic records shall employ procedures and controls designed to ensure
    the authenticity, integrity, and, when appropriate, the confidentiality of
    electronic records, and to ensure that the signer cannot readily repudiate
    the signed record as not genuine. Such procedures and controls shall
    include the following: (a) Validation of systems to ensure accuracy,
    reliability, consistent intended performance, and the ability to discern
    invalid or altered records.

guidance:
  prose: >-
    Section 11.10(a) requires that closed systems used for electronic records
    must be validated. Validation must demonstrate that the system performs
    accurately, reliably, and consistently for its intended purpose, and that
    it can detect invalid or altered records. This aligns with GAMP 5
    risk-based validation principles and ICH Q9 quality risk management.
    Validation should cover the full system lifecycle including installation
    qualification (IQ), operational qualification (OQ), and performance
    qualification (PQ). The validation scope should address all software
    categories per GAMP 5 and include traceability from user requirements
    to test evidence. Periodic revalidation is required when system changes
    occur or on a scheduled basis. The 2003 FDA guidance emphasizes
    validation as one of the key Part 11 requirements on which the agency
    focuses enforcement.

references:
  - citation: "21 CFR Part 11, Section 11.10(a)"
    url: "https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11/subpart-B/section-11.10"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Establish a computer system validation (CSV) framework based on GAMP 5
      methodology covering all Part 11-applicable systems. 2. Implement
      infrastructure-as-code to ensure reproducible, validated environments
      with documented configuration baselines. 3. Automate installation
      qualification (IQ) checks via infrastructure provisioning scripts that
      verify hardware, software, and configuration prerequisites. 4. Implement
      operational qualification (OQ) via automated test suites that verify
      system functions against documented user requirements. 5. Conduct
      performance qualification (PQ) with real-world data scenarios to confirm
      consistent intended performance under production conditions. 6. Maintain
      validation documentation including validation plan, test protocols, test
      results, deviation reports, and validation summary report.
    tools:
      - terraform
      - ansible
      - automated-testing
      - validation-management
      - gamp-5-tools
  devsecops:
    prose: >-
      1. Integrate validation test execution into the CI/CD pipeline so that
      every build automatically runs IQ and OQ test suites. 2. Implement
      regression testing to detect unintended changes that could affect
      validated state. 3. Enforce that all code changes to Part 11 systems
      require approved change controls before merging. 4. Generate validation
      evidence artifacts (test results, coverage reports) automatically from
      pipeline execution. 5. Maintain traceability matrix linking user
      requirements to test cases in version control.
    tools:
      - gitlab-ci
      - automated-testing
      - code-coverage
      - traceability-matrix
      - change-control
  secops:
    prose: >-
      1. Establish a validation master plan covering all Part 11-applicable
      systems. 2. Conduct periodic revalidation reviews (at least annually)
      to verify systems remain in a validated state. 3. Maintain validation
      documentation in a controlled document management system. 4. Investigate
      and document any deviations from expected system behavior that may
      affect validated state. 5. Train personnel on CSV procedures and their
      roles in maintaining validated systems.
    tools:
      - validation-management
      - document-management
      - training-management
      - deviation-management

