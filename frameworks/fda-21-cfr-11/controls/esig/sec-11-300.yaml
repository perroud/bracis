id: sec-11-300
family: esig
title: "Controls for Identification Codes/Passwords"
class: FDA-21CFR11
baselines: [electronic-records-signatures]

statement:
  prose: >-
    Persons who use electronic signatures based upon use of identification
    codes in combination with passwords shall employ controls to ensure their
    security and integrity. Such controls shall include: (a) Maintaining the
    uniqueness of each combined identification code and password, such that
    no two individuals have the same combination of identification code and
    password. (b) Ensuring that identification code and password issuances
    are periodically checked, recalled, or revised (e.g., to cover such
    events as password aging). (c) Following loss management procedures to
    electronically deauthorize lost, stolen, missing, or otherwise
    potentially compromised tokens, cards, and other devices that bear or
    generate identification code or password information, and to issue
    temporary or permanent replacements using suitable, rigorous controls.
    (d) Use of transaction safeguards to prevent unauthorized use of
    passwords and/or identification codes, and to detect and report in an
    immediate and urgent manner any attempts at their unauthorized use to
    the system security unit, and, as appropriate, to organizational
    management. (e) Initial and periodic testing of devices, such as tokens
    or cards, that bear or generate identification code or password
    information to ensure that they function properly and have not been
    altered in an unauthorized manner.

guidance:
  prose: >-
    Section 11.300 specifies detailed controls for the security and integrity
    of identification codes and passwords used as electronic signature
    components. Key requirements include: (1) Uniqueness — no two individuals
    may share the same ID/password combination. (2) Periodic maintenance —
    passwords must be subject to aging, periodic checks, and revision.
    (3) Loss management — procedures must exist to immediately deauthorize
    compromised credentials and issue replacements with appropriate controls.
    (4) Transaction safeguards — unauthorized password use must be prevented
    and attempts must be detected and reported immediately to the security
    unit. (5) Device testing — hardware tokens or cards used for
    identification must be periodically tested for proper function and
    integrity. These controls collectively ensure that the authentication
    mechanisms underlying electronic signatures remain secure throughout
    their lifecycle.

references:
  - citation: "21 CFR Part 11, Section 11.300"
    url: "https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11/subpart-C/section-11.300"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implement password policies enforcing uniqueness of ID/password
      combinations, minimum complexity, and password history (preventing
      reuse of previous passwords). 2. Configure password aging with
      mandatory password changes at intervals appropriate to risk level
      (typically 60-90 days for Part 11 systems). 3. Implement immediate
      credential revocation capabilities for lost, stolen, or compromised
      credentials with automated deauthorization. 4. Deploy real-time
      monitoring and alerting for unauthorized authentication attempts,
      sending immediate notifications to the security team. 5. Implement
      account lockout after consecutive failed authentication attempts.
      6. Where hardware tokens are used, establish periodic testing
      procedures to verify token functionality and integrity. 7. Implement
      secure credential reset procedures requiring identity re-verification.
    tools:
      - identity-provider
      - password-policy-engine
      - mfa-provider
      - siem
      - token-management
      - credential-revocation
  devsecops:
    prose: >-
      1. Implement automated credential rotation for service accounts used
      in Part 11 system CI/CD pipelines. 2. Scan for exposed or hardcoded
      credentials in code repositories. 3. Enforce MFA for all developer
      access to Part 11 system repositories and deployment environments.
      4. Implement pipeline secrets management using vault integration.
    tools:
      - gitlab-ci
      - secret-detection
      - vault
      - credential-rotation
      - mfa-enforcement
  secops:
    prose: >-
      1. Establish and test loss management procedures for credential
      compromise incidents, including immediate deauthorization, issuance
      of replacements, and incident documentation. 2. Implement 24/7
      monitoring and alerting for unauthorized authentication attempts
      with escalation procedures to the security unit and management.
      3. Conduct periodic reviews of credential policies and practices
      (at least quarterly). 4. Perform periodic testing of authentication
      hardware (tokens, cards) to verify proper function. 5. Maintain
      records of all credential issuances, revocations, and loss events.
    tools:
      - siem
      - incident-management
      - identity-management
      - token-management
      - audit-management

