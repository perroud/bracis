id: sec-11-100
family: esig
title: "General Requirements for Electronic Signatures"
class: FDA-21CFR11
baselines: [electronic-records-signatures]

statement:
  prose: >-
    (a) Each electronic signature shall be unique to one individual and shall
    not be reused by, or reassigned to, anyone else. (b) Before an
    organization establishes, assigns, certifies, or otherwise sanctions an
    individual's electronic signature, or any element of such electronic
    signature, the organization shall verify the identity of the individual.
    (c) Persons using electronic signatures shall, prior to or at the time of
    such use, certify to the agency that the electronic signatures in their
    system, used on or after August 20, 1997, are intended to be the legally
    binding equivalent of traditional handwritten signatures. (1) The
    certification shall be submitted to the Office of Regional Operations
    (HFC-100), 5600 Fishers Lane, Rockville, MD 20857. (2) Persons using
    electronic signatures shall, upon agency request, provide additional
    certification or testimony that a specific electronic signature is the
    legally binding equivalent of the signer's handwritten signature.

guidance:
  prose: >-
    Section 11.100 establishes three fundamental requirements for electronic
    signatures: (1) Uniqueness — each electronic signature must be unique to
    a single individual and cannot be shared, reused, or reassigned to
    another person, even after the original holder leaves the organization.
    (2) Identity verification — before issuing or sanctioning an electronic
    signature, the organization must verify the individual's identity through
    appropriate means (e.g., government-issued identification, HR
    verification). (3) Certification to FDA — organizations must submit a
    certification to FDA's Office of Regional Operations stating that their
    electronic signatures are intended as legally binding equivalents of
    handwritten signatures. This certification is a one-time requirement per
    organization but must be on file. The certification requirement
    underscores the legal weight of electronic signatures under Part 11.

references:
  - citation: "21 CFR Part 11, Section 11.100"
    url: "https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11/subpart-C/section-11.100"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implement identity verification workflows in the user provisioning
      process that require positive identification before electronic signature
      credentials are issued. 2. Design the identity management system to
      enforce signature uniqueness — prevent reuse or reassignment of
      electronic signature credentials (user IDs) even for deactivated
      accounts. 3. Maintain a registry of all electronic signature holders
      with their identity verification records, activation dates, and status.
      4. Implement account deactivation (not deletion) for departed personnel
      to preserve signature uniqueness and audit history. 5. Store the FDA
      certification letter and make it accessible for inspection.
    tools:
      - identity-provider
      - iam-platform
      - user-provisioning
      - document-management
  devsecops:
    prose: >-
      1. Enforce unique user identities in all development and deployment
      systems for Part 11-applicable codebases. 2. Prevent account reuse
      or reassignment in CI/CD system configurations. 3. Implement automated
      checks verifying that all user accounts have completed identity
      verification before access is granted.
    tools:
      - gitlab-ci
      - identity-verification
      - account-management
  secops:
    prose: >-
      1. Submit and maintain on file the FDA certification letter confirming
      electronic signatures are intended as legally binding equivalents of
      handwritten signatures. 2. Establish identity verification procedures
      for all new electronic signature holders, including government-issued
      ID verification and HR confirmation. 3. Conduct annual reviews of
      electronic signature accounts to verify uniqueness and that no
      credentials have been reused or reassigned. 4. Maintain records of
      identity verifications for the lifetime of the electronic signature
      holder's association with the organization plus the record retention
      period.
    tools:
      - identity-management
      - grc-platform
      - document-management
      - audit-management

