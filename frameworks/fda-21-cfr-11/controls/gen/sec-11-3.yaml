id: sec-11-3
family: gen
title: "Definitions"
class: FDA-21CFR11
baselines: [electronic-records-signatures]

statement:
  prose: >-
    (a) The definitions and interpretations of terms contained in section 201
    of the act apply to those terms when used in this part. (b) The following
    definitions of terms also apply to this part: (1) Act means the Federal
    Food, Drug, and Cosmetic Act (secs. 201-903 (21 U.S.C. 321-393)). (2)
    Agency means the Food and Drug Administration. (3) Biometrics means a
    method of verifying an individual's identity based on measurement of the
    individual's physical feature(s) or repeatable action(s) where those
    features and/or actions are both unique to that individual and measurable.
    (4) Closed system means an environment in which system access is controlled
    by persons who are responsible for the content of electronic records that
    are on the system. (5) Digital signature means an electronic signature
    based upon cryptographic methods of originator authentication, computed by
    using a set of rules and a set of parameters such that the identity of the
    signer and the integrity of the data can be verified. (6) Electronic record
    means any combination of text, graphics, data, audio, pictorial, or other
    information representation in digital form that is created, modified,
    maintained, archived, retrieved, or distributed by a computer system.
    (7) Electronic signature means a computer data compilation of any symbol
    or series of symbols executed, adopted, or authorized by an individual to
    be the legally binding equivalent of the individual's handwritten signature.
    (8) Handwritten signature means the scripted name or legal mark of an
    individual handwritten by that individual and executed or adopted with the
    present intention to authenticate a writing in a permanent form. The act
    of signing with a writing or marking instrument such as a pen or stylus
    is preserved. The scripted name or legal mark, while conventionally applied
    to paper, may also be applied to other devices that capture the name or
    mark. (9) Open system means an environment in which system access is not
    controlled by persons who are responsible for the content of electronic
    records that are on the system.

guidance:
  prose: >-
    Section 11.3 provides the foundational definitions for Part 11. Key
    distinctions include: (1) Closed vs. open systems — a closed system is
    one where the people responsible for record content also control system
    access; an open system is one where they do not. Most enterprise GxP
    systems are closed systems. Cloud-hosted systems may be open or closed
    depending on access control arrangements. (2) Electronic record — broadly
    defined to include any digital information created, modified, maintained,
    archived, retrieved, or distributed by a computer system. (3) Electronic
    signature vs. digital signature — an electronic signature is any computer
    data compilation adopted as a legally binding equivalent of a handwritten
    signature. A digital signature is a specific type of electronic signature
    using cryptographic methods. (4) Biometrics — physical or repeatable
    measurable features unique to an individual, used for identity verification.
    Organizations must classify their systems as open or closed and apply the
    corresponding controls from Subpart B.

references:
  - citation: "21 CFR Part 11, Section 11.3"
    url: "https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11/subpart-A/section-11.3"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Classify all Part 11-applicable systems as closed or open systems
      based on whether the organization controls system access for persons
      responsible for record content. 2. For cloud-hosted systems, evaluate
      whether shared-responsibility models qualify the system as open or closed
      and document the determination. 3. Implement and document the access
      control architecture that supports the closed system classification for
      each applicable system. 4. Design electronic signature capabilities that
      meet the definition requirements, supporting both identification and
      authentication components. 5. Where biometric authentication is used,
      ensure the biometric method measures features that are both unique to the
      individual and measurable, and that biometric data is securely stored.
    tools:
      - identity-provider
      - access-management
      - biometric-systems
      - cloud-access-broker
  devsecops:
    prose: >-
      1. Implement automated classification checks that verify system access
      control configurations align with closed system or open system
      requirements. 2. Include definition-compliance tests in the CI/CD
      pipeline to verify electronic signature implementations meet the
      regulatory definition. 3. Validate that electronic record formats
      satisfy the broad definition of electronic record (text, graphics, data,
      audio, pictorial, or other digital information).
    tools:
      - gitlab-ci
      - compliance-tests
      - signature-validation
  secops:
    prose: >-
      1. Maintain a glossary of Part 11 terms and ensure all personnel
      involved with Part 11-applicable systems understand the definitions.
      2. Document the closed/open system classification for each system and
      review classifications annually or when access control arrangements
      change. 3. Verify that electronic signature implementations meet the
      regulatory definition during periodic compliance audits.
    tools:
      - grc-platform
      - training-management
      - audit-management

