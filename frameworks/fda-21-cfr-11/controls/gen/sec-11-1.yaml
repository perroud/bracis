id: sec-11-1
family: gen
title: "Scope"
class: FDA-21CFR11
baselines: [electronic-records-signatures]

statement:
  prose: >-
    (a) The regulations in this part set forth the criteria under which the
    agency considers electronic records, electronic signatures, and handwritten
    signatures executed to electronic records to be trustworthy, reliable, and
    generally equivalent to paper records and handwritten signatures executed
    on paper. (b) This part applies to records in electronic form that are
    created, modified, maintained, archived, retrieved, or transmitted, under
    any records requirements set forth in agency regulations. This part also
    applies to electronic records submitted to the agency under requirements
    of the Federal Food, Drug, and Cosmetic Act and the Public Health Service
    Act, even if such records are not specifically identified in agency
    regulations. However, this part does not apply to paper records that are,
    or have been, transmitted by electronic means.

guidance:
  prose: >-
    Section 11.1 defines the overall scope of Part 11. It establishes that
    electronic records and electronic signatures meeting Part 11 criteria are
    considered equivalent to paper records and handwritten signatures. The
    scope covers any electronic record created, modified, maintained, archived,
    retrieved, or transmitted under any FDA records requirement. Importantly,
    paper records transmitted electronically (e.g., a fax or scanned PDF of a
    paper record) are excluded from Part 11 requirements. Organizations must
    identify which of their systems and records fall under Part 11 scope by
    performing a system inventory and mapping each system to applicable FDA
    predicate rules.

references:
  - citation: "21 CFR Part 11, Section 11.1"
    url: "https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11/subpart-A/section-11.1"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Conduct a comprehensive inventory of all systems that create, modify,
      maintain, archive, retrieve, or transmit electronic records subject to
      FDA regulations. 2. Classify each system as Part 11-applicable or
      non-applicable based on whether it generates records required by FDA
      predicate rules. 3. Maintain a system registry (CMDB) documenting Part 11
      applicability status, system owner, validation status, and predicate rule
      references. 4. Implement infrastructure-as-code for Part 11-applicable
      systems to ensure reproducible, auditable environment configurations.
      5. Tag all Part 11-applicable infrastructure resources for governance
      and monitoring purposes.
    tools:
      - cmdb
      - terraform
      - ansible
      - asset-management
  devsecops:
    prose: >-
      1. Integrate Part 11 applicability checks into the CI/CD pipeline to
      verify that systems deploying to Part 11-regulated environments meet
      validation and documentation requirements. 2. Enforce branch protection
      and code review policies for all Part 11-applicable system codebases.
      3. Implement automated compliance gates that prevent deployment of
      unvalidated changes to Part 11 systems. 4. Maintain traceability
      between code changes, test evidence, and regulatory requirements in
      the pipeline.
    tools:
      - gitlab-ci
      - compliance-gates
      - branch-protection
      - traceability-matrix
  secops:
    prose: >-
      1. Maintain an up-to-date inventory of Part 11-applicable systems and
      review it at least annually to account for new systems, decommissioned
      systems, and changes in regulatory scope. 2. Establish a governance
      committee to evaluate whether new systems or processes fall under Part 11
      scope. 3. Document and communicate Part 11 applicability determinations
      to all stakeholders. 4. Conduct periodic audits to verify that Part 11
      controls are consistently applied across all in-scope systems.
    tools:
      - grc-platform
      - audit-management
      - asset-inventory

