id: sec-11-2
family: gen
title: "Implementation"
class: FDA-21CFR11
baselines: [electronic-records-signatures]

statement:
  prose: >-
    (a) For records required to be maintained but not submitted to the agency,
    persons may use electronic records in lieu of paper records or electronic
    signatures in lieu of traditional signatures, in whole or in part, provided
    that the requirements of this part are met. (b) For records submitted to
    the agency, persons may use electronic records in lieu of paper records or
    electronic signatures in lieu of traditional signatures, in whole or in
    part, provided that: (1) The requirements of this part are met; and (2)
    The document or parts of a document to be submitted have been identified
    in public docket No. 92S-0251 as being the type of submission the agency
    accepts in electronic form. This docket will identify specifically what
    types of documents or parts of documents are acceptable for submission in
    electronic form without paper records and the agency receiving unit(s)
    (e.g., specific center, office, division, branch) to which such
    submissions may be made. Documents to agency receiving unit(s) not
    specified in the public docket will not be considered as official if they
    are submitted in electronic form; paper forms of such documents will be
    considered as official and must accompany any electronic records.
    (c) Persons may use electronic records and electronic signatures, in whole
    or in part, that comply with this part. Electronic records that meet the
    requirements of this part may be used in lieu of paper records, in whole or
    in part, unless paper records are specifically required.

guidance:
  prose: >-
    Section 11.2 establishes the conditions under which electronic records
    and electronic signatures may be used in lieu of paper records and
    handwritten signatures. For internal records (maintained but not submitted
    to FDA), organizations may use electronic records provided Part 11
    requirements are met. For submissions to FDA, electronic records are
    acceptable only for document types identified in public docket No. 92S-0251.
    Organizations should verify with the relevant FDA receiving unit whether
    a specific submission type is accepted electronically. The 2003 FDA
    guidance on scope and application of Part 11 clarified that the agency
    intends to exercise enforcement discretion and focus on certain key
    requirements such as audit trails, record retention, and system validation.

references:
  - citation: "21 CFR Part 11, Section 11.2"
    url: "https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11/subpart-A/section-11.2"

implementation_guidance:
  platform_engineering:
    prose: >-
      1. Design systems to support both electronic and paper record workflows
      where FDA has not yet accepted electronic submissions for specific
      document types. 2. Implement record format conversion capabilities to
      generate paper-equivalent output from electronic records when required.
      3. Configure submission systems to validate that document types are
      accepted electronically per public docket No. 92S-0251 before enabling
      electronic submission. 4. Maintain infrastructure that supports long-term
      electronic record retention in formats that remain accessible and
      readable throughout the required retention period.
    tools:
      - document-management
      - record-conversion
      - archival-storage
      - submission-gateway
  devsecops:
    prose: >-
      1. Implement automated checks in the CI/CD pipeline to verify that
      electronic record formats comply with FDA-accepted submission standards.
      2. Build validation test suites that confirm electronic records can be
      accurately reproduced in human-readable form. 3. Include compliance
      verification steps that check record format, metadata completeness, and
      submission eligibility before deployment.
    tools:
      - gitlab-ci
      - format-validation
      - metadata-checks
  secops:
    prose: >-
      1. Maintain a registry mapping each FDA submission type to its
      acceptability status for electronic submission per docket No. 92S-0251.
      2. Establish procedures for verifying electronic submission eligibility
      before sending records to FDA. 3. Periodically review FDA docket updates
      to identify newly accepted electronic submission types. 4. Train
      personnel on the distinction between records that may be fully electronic
      versus those requiring paper accompaniment.
    tools:
      - grc-platform
      - docket-monitoring
      - training-management

