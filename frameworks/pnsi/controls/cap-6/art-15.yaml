id: art-15
family: cap-6
title: "Implementacao nos Orgaos da APF"
class: PNSI
baselines: [apf-federal]
statement:
  prose: |
    Art. 15. Os órgãos e as entidades da administração pública federal deverão
    adequar suas políticas, planos, programas e normas de segurança da informação
    ao disposto neste Decreto.

    Parágrafo único. Os órgãos e as entidades da administração pública federal que
    não possuam política de segurança da informação deverão elaborá-la no prazo
    de até doze meses, contado da data de publicação das normas de requisitos
    metodológicos de que trata o inciso II do caput do art. 7.
guidance:
  prose: |
    O art. 15 estabelece a obrigatoriedade de adequacao e o prazo para que
    orgaos sem politica de SI criem uma.

    **Duas situacoes:**
    1. Orgaos COM politica de SI existente: devem adequar ao Decreto (sem prazo
       especifico, mas implicitamente imediato)
    2. Orgaos SEM politica de SI: prazo de 12 meses apos publicacao das normas
       metodologicas pelo GSI/PR

    **Escopo da adequacao:**
    A adequacao abrange politicas, planos, programas e normas, ou seja, todo o
    arcabouco documental de seguranca da informacao do orgao.

    **Gatilho do prazo:**
    O prazo de 12 meses so comeca a correr apos o GSI/PR publicar as normas de
    requisitos metodologicos (art. 7, II), nao a partir da publicacao do Decreto.
    Isso da tempo para que a metodologia esteja definida antes de exigir implementacao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de adequacao:**
      1. Template de politica de seguranca da informacao em formato machine-readable
         (YAML/JSON) conforme requisitos do GSI/PR, facilitando adocao por orgaos
         sem politica existente.
      2. Sistema de gestao documental para politicas de SI: criacao, revisao,
         aprovacao, publicacao, versionamento e comunicacao.
      3. Checklist automatizado de conformidade do orgao com o Decreto: itens
         obrigatorios, status, evidencias, gap analysis.
      4. Timeline de adequacao com marcos, responsaveis e alertas de prazo.
    tools:
      - policy-management
      - document-management
      - compliance-checklist
      - project-timeline
  devsecops:
    prose: |
      **Pipeline de conformidade com a PNSI:**
      1. Compliance-as-code: requisitos do Decreto codificados como politicas
         de pipeline, verificados a cada commit.
      2. Scan de conformidade que valida se artefatos de deploy estao alinhados
         com a politica de SI do orgao.
      3. Relatorio automatizado de conformidade gerado pelo pipeline para
         evidenciar adequacao ao Decreto.
      4. Gate de compliance: bloqueia deploy se politica de SI do orgao nao
         estiver publicada e vigente.
    tools:
      - gitlab-ci
      - compliance-as-code
      - compliance-reporting
      - compliance-gate
  secops:
    prose: |
      **Gestao da adequacao:**
      1. Gap analysis: mapeamento do estado atual de seguranca da informacao
         do orgao vs. requisitos do Decreto.
      2. Plano de adequacao com priorizacao baseada em risco: controles de
         maior impacto implementados primeiro.
      3. Auditoria interna de conformidade com o Decreto: ciclo anual,
         relatorio ao gestor de SI e ao comite de SI.
      4. Comunicacao institucional: publicacao da politica de SI para todos
         os servidores, com ciencia formal obrigatoria.
    tools:
      - grc-platform
      - gap-analysis
      - audit-management
      - communication-platform
