id: art-16
family: cap-6
title: "Vigencia e Disposicoes Transitorias"
class: PNSI
baselines: [apf-federal]
statement:
  prose: |
    Art. 16. Este Decreto entra em vigor na data de sua publicação.

    O Decreto 9.637/2018 revogou o Decreto 3.505, de 13 de junho de 2000, que
    instituía a Política de Segurança da Informação nos órgãos e entidades da
    Administração Pública Federal, e o Decreto 8.135, de 4 de novembro de 2013,
    que dispunha sobre comunicações de dados da administração pública federal.

    A vigência imediata a partir de 26 de dezembro de 2018 estabelece o marco
    temporal a partir do qual todos os órgãos e entidades da APF passam a estar
    vinculados à nova Política Nacional de Segurança da Informação.
guidance:
  prose: |
    O art. 16 trata da vigencia e das revogacoes.

    **Vigencia imediata:**
    O Decreto entrou em vigor na data de publicacao (26/12/2018), sem vacatio legis.
    Isso significa que os principios e objetivos da PNSI passaram a vincular a APF
    imediatamente, embora a implementacao pratica dependa de regulamentacao
    complementar.

    **Revogacoes:**
    O Decreto 9.637/2018 revogou dois decretos anteriores:
    1. Decreto 3.505/2000: antiga Politica de Seguranca da Informacao (18 anos
       de vigencia)
    2. Decreto 8.135/2013: regras sobre comunicacoes de dados da APF

    **Continuidade normativa:**
    As Instrucoes Normativas do GSI/PR anteriores ao Decreto 9.637/2018 permaneceram
    vigentes no que fossem compativeis, sendo gradualmente atualizadas para refletir
    a nova PNSI.

    **Marco temporal:**
    26/12/2018 e a data de referencia para conformidade com a PNSI. Auditorias
    de conformidade devem considerar este marco para avaliar adequacao dos orgaos.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de transicao normativa:**
      1. Inventario de normas internas do orgao que referenciam os decretos revogados
         (3.505/2000 e 8.135/2013): identificar e atualizar referencias.
      2. Versionamento de politicas com marcacao temporal: pre-PNSI vs. pos-PNSI
         para rastreabilidade de conformidade.
      3. Checklist de transicao: verificar que todas as politicas, sistemas e
         procedimentos foram atualizados para referenciar o Decreto 9.637/2018.
      4. Registro formal da data de adequacao do orgao a PNSI para fins de auditoria.
    tools:
      - norm-inventory
      - policy-versioning
      - transition-checklist
      - compliance-registry
  devsecops:
    prose: |
      **Transicao no pipeline:**
      1. Atualizar referencias normativas em comentarios de codigo, documentacao
         de pipeline e configuracoes de compliance.
      2. Compliance framework configurado no GitLab referenciando PNSI
         (Decreto 9.637/2018) como framework vigente.
      3. Pipeline de validacao de conformidade com data de referencia: alertar
         sobre componentes ou configuracoes anteriores ao marco da PNSI.
      4. Remover compliance checks referentes aos decretos revogados.
    tools:
      - gitlab-ci
      - compliance-framework
      - reference-updater
      - config-audit
  secops:
    prose: |
      **Conformidade com vigencia:**
      1. Auditoria de conformidade: verificar que o orgao esta em conformidade
         com a PNSI desde 26/12/2018 ou possui plano de adequacao documentado.
      2. Relatorio de gap com os decretos revogados: identificar praticas
         herdadas dos decretos anteriores que precisam de atualizacao.
      3. Comunicacao institucional sobre a nova PNSI: ciencia de todos os
         servidores sobre a mudanca normativa.
      4. Registro historico de conformidade: manter evidencias de adequacao
         ao longo do tempo para auditorias futuras.
    tools:
      - audit-management
      - gap-analysis
      - communication-platform
      - evidence-repository
