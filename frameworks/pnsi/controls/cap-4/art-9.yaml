id: art-9
family: cap-4
title: "Competencias dos Orgaos e Entidades da APF"
class: PNSI
baselines: [apf-federal]
statement:
  prose: |
    Art. 9. Aos órgãos e às entidades da administração pública federal, em seu âmbito
    de atuação, compete:
    I - implementar a PNSI;
    II - elaborar sua política de segurança da informação e as normas internas de
    segurança da informação, observadas as normas de segurança da informação editadas
    pelo Gabinete de Segurança Institucional da Presidência da República;
    III - designar um gestor de segurança da informação interno, indicado pela alta
    administração do órgão ou da entidade;
    IV - instituir comitê de segurança da informação ou estrutura equivalente, para
    deliberar sobre os assuntos relativos à PNSI;
    V - destinar recursos orçamentários para ações de segurança da informação;
    VI - promover ações de capacitação e profissionalização dos recursos humanos em
    temas relacionados à segurança da informação;
    VII - instituir e implementar equipe de tratamento e resposta a incidentes
    cibernéticos, que comporá a rede de resposta a incidentes cibernéticos da
    administração pública federal.

    Art. 10. Os órgãos e as entidades da administração pública federal deverão
    comunicar os incidentes cibernéticos ao CTIR Gov.
guidance:
  prose: |
    Os artigos 9 e 10 descentralizam a implementacao da PNSI, atribuindo obrigacoes
    concretas a cada orgao da APF.

    **Sete obrigacoes por orgao:**
    1. Implementar a PNSI (inciso I)
    2. Criar politica e normas internas de SI (inciso II)
    3. Designar gestor de SI (inciso III)
    4. Criar comite de SI (inciso IV)
    5. Alocar orcamento para SI (inciso V)
    6. Capacitar equipe (inciso VI)
    7. Criar ETIR (Equipe de Tratamento de Incidentes) (inciso VII)

    **Gestor de seguranca da informacao:**
    Deve ser indicado pela alta administracao, sinalizando que seguranca da
    informacao e responsabilidade do nivel estrategico, nao apenas operacional.

    **ETIR e rede federal:**
    Cada orgao deve manter uma ETIR que se integra a rede federal coordenada
    pelo CTIR Gov, criando capacidade distribuida de resposta a incidentes.

    **Notificacao obrigatoria (art. 10):**
    Incidentes ciberneticos devem ser comunicados ao CTIR Gov, alimentando a
    visao consolidada de ameacas ao governo federal.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura para conformidade do orgao:**
      1. GRC (Governance, Risk & Compliance) platform para gestao da politica
         de SI: documentacao, versoes, aprovacoes, comunicacao.
      2. Portal de seguranca da informacao do orgao: politica, normas, contatos
         da ETIR, canal de reporte de incidentes.
      3. Plataforma de gestao de incidentes integrada ao CTIR Gov via API:
         abertura automatica de chamados, categorizacao, SLA, notificacao.
      4. Dashboard do gestor de SI: visao consolidada de riscos, incidentes,
         conformidade, orcamento, capacitacao.
    tools:
      - grc-platform
      - security-portal
      - incident-management
      - security-dashboard
  devsecops:
    prose: |
      **Pipeline alinhado a politica do orgao:**
      1. Politica de SI do orgao traduzida em politicas de pipeline: cada
         requisito da norma interna mapeado para controle automatizado.
      2. ETIR integrada ao pipeline: alertas de vulnerabilidades criticas
         escalam automaticamente para a equipe de resposta.
      3. Metricas de seguranca do pipeline reportadas ao gestor de SI para
         tomada de decisao.
      4. Templates de pipeline padronizados conforme normas internas do orgao.
    tools:
      - gitlab-ci
      - incident-escalation
      - security-metrics
      - pipeline-templates
  secops:
    prose: |
      **Operacao da ETIR e conformidade:**
      1. ETIR operacional 24x7 ou conforme capacidade do orgao, com
         procedimentos documentados de resposta a incidentes.
      2. Notificacao automatica ao CTIR Gov em ate 24 horas para incidentes
         de media e alta severidade.
      3. Comite de SI com reunioes mensais, ata formal, deliberacoes
         registradas e acompanhamento de acoes.
      4. Plano de capacitacao anual em seguranca da informacao: no minimo
         40 horas por servidor da area de TI.
      5. Relatorio trimestral ao gestor de SI: incidentes, vulnerabilidades,
         conformidade, riscos residuais.
    tools:
      - incident-response-platform
      - ctir-gov-integration
      - committee-management
      - training-tracker
