id: art-11
family: cap-4
title: "Gestores de Seguranca da Informacao e Credencial de Seguranca"
class: PNSI
baselines: [apf-federal]
statement:
  prose: |
    Art. 11. Os gestores de segurança da informação dos órgãos e das entidades da
    administração pública federal serão designados conforme ato do Gabinete de
    Segurança Institucional da Presidência da República.

    Art. 12. O credenciamento de segurança de pessoas naturais, órgãos e entidades
    públicos e privados para o tratamento de informações classificadas em qualquer
    grau de sigilo será regulamentado pelo Gabinete de Segurança Institucional da
    Presidência da República.
guidance:
  prose: |
    Os artigos 11 e 12 tratam da governanca de pessoas na seguranca da informacao.

    **Gestor de seguranca da informacao (art. 11):**
    O GSI/PR define os requisitos e procedimentos para designacao do gestor de SI
    em cada orgao. Isso inclui perfil profissional, competencias minimas, posicao
    hierarquica e atribuicoes.

    **Credenciamento de seguranca (art. 12):**
    Para acesso a informacoes classificadas (reservado, secreto, ultra-secreto),
    pessoas e organizacoes precisam de credencial de seguranca emitida segundo
    regulamento do GSI/PR. Este mecanismo garante o principio da necessidade de
    conhecer (need-to-know).

    **Hierarquia de credenciais:**
    - Credencial para informacao reservada
    - Credencial para informacao secreta
    - Credencial para informacao ultra-secreta
    Cada nivel requer investigacao de seguranca proporcional ao grau de sigilo.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de identidade e credenciais:**
      1. IAM (Identity and Access Management) integrado com sistema de
         credenciamento de seguranca: nivel de acesso vinculado a credencial
         do usuario.
      2. RBAC com niveis de acesso correspondentes aos graus de sigilo:
         publico, restrito, reservado, secreto, ultra-secreto.
      3. Autenticacao forte (MFA) obrigatoria para acesso a sistemas com
         informacoes classificadas como reservadas ou superiores.
      4. Audit trail completo de acessos a informacoes classificadas: quem
         acessou, quando, por quanto tempo, qual informacao.
    tools:
      - iam-platform
      - mfa-provider
      - rbac-system
      - audit-trail
  devsecops:
    prose: |
      **Credenciamento no pipeline:**
      1. Acesso a repositorios com codigo de sistemas sigilosos restrito a
         desenvolvedores com credencial de seguranca compativel.
      2. Pipeline em ambiente segregado para sistemas que processam informacoes
         classificadas (runners dedicados, rede isolada).
      3. Code review obrigatorio por revisor com credencial de seguranca
         compativel com o nivel de classificacao do sistema.
      4. Secret management com HSM (Hardware Security Module) para sistemas
         que processam informacoes secretas ou ultra-secretas.
    tools:
      - gitlab-ci
      - hsm-integration
      - secure-runners
      - access-control
  secops:
    prose: |
      **Operacao de credenciamento:**
      1. Processo de investigacao de seguranca para concessao de credencial:
         verificacao de antecedentes, avaliacao de risco, renovacao periodica.
      2. Inventario de credenciais ativas: quem possui, nivel, validade,
         orgao, justificativa de necessidade.
      3. Revogacao imediata de credencial em caso de desligamento, mudanca
         de funcao ou incidente de seguranca.
      4. Treinamento obrigatorio sobre tratamento de informacoes classificadas
         antes da concessao de credencial.
      5. Auditoria anual de acessos a informacoes classificadas vs. credenciais.
    tools:
      - credential-management
      - background-check-system
      - access-review
      - training-platform
