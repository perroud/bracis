id: art-7
family: cap-4
title: "Competencias do GSI/PR"
class: PNSI
baselines: [apf-federal]
statement:
  prose: |
    Art. 7. Ao Gabinete de Segurança Institucional da Presidência da República, no
    âmbito da PNSI, compete:
    I - assessorar o Presidente da República nos assuntos relacionados à segurança
    da informação;
    II - estabelecer normas sobre a definição dos requisitos metodológicos para a
    implementação da PNSI;
    III - estabelecer os requisitos mínimos de segurança da informação para o uso dos
    sistemas de informação pelos órgãos e pelas entidades da administração pública
    federal;
    IV - elaborar e implementar programas sobre segurança da informação destinados
    à conscientização e à capacitação dos servidores públicos federais e da sociedade;
    V - acompanhar a evolução doutrinária e tecnológica, em âmbito nacional e
    internacional, de temas relacionados à segurança da informação;
    VI - elaborar e publicar a Estratégia Nacional de Segurança da Informação,
    em articulação com o Comitê de Gestão de Segurança da Informação;
    VII - orientar a condução da PNSI;
    VIII - articular-se com centros nacionais e internacionais de tratamento e
    resposta a incidentes cibernéticos.

    Art. 8. O GSI/PR manterá o Centro de Tratamento e Resposta a Incidentes
    Cibernéticos de Governo (CTIR Gov) para coordenar e integrar as ações de
    segurança cibernética no âmbito da APF.
guidance:
  prose: |
    Os artigos 7 e 8 concentram no GSI/PR o papel de autoridade central de
    seguranca da informacao no governo federal.

    **Funcoes do GSI/PR:**
    1. Assessoria presidencial (inciso I)
    2. Normativo: define metodologia e requisitos minimos (incisos II, III)
    3. Capacitacao: programas de conscientizacao (inciso IV)
    4. Inteligencia: acompanhamento de evolucao doutrinaria e tecnologica (inciso V)
    5. Estrategia: elabora a Estrategia Nacional (inciso VI)
    6. Coordenacao: orienta conducao da PNSI (inciso VII)
    7. Resposta a incidentes: articula com CERTs nacionais e internacionais (inciso VIII)

    **CTIR Gov (art. 8):**
    O CTIR Gov e o CSIRT governamental brasileiro, responsavel por coordenar a
    resposta a incidentes ciberneticos em toda a APF. Opera como hub central
    de deteccao, analise e resposta, articulando com CERT.br, CAIS/RNP e CERTs
    internacionais.

    **Autoridade normativa:**
    Os incisos II e III fundamentam a emissao das Instrucoes Normativas do GSI/PR
    (IN 1, IN 2, IN 3, etc.) que detalham controles de seguranca da informacao
    para a APF.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura para funcoes do GSI/PR:**
      1. Plataforma centralizada de gestao de normas de seguranca: publicacao,
         versionamento, consulta e rastreamento de conformidade com INs do GSI/PR.
      2. CTIR Gov como plataforma de compartilhamento de IOCs (Indicators of
         Compromise) e threat intelligence entre orgaos da APF.
      3. Plataforma de capacitacao em seguranca: LMS com trilhas por perfil
         funcional, certificacoes, metricas de participacao.
      4. Portal de acompanhamento de maturidade de seguranca por orgao:
         dashboard consolidado alimentado por APIs dos orgaos.
    tools:
      - norm-management-platform
      - threat-intelligence-platform
      - lms-security
      - maturity-dashboard
  devsecops:
    prose: |
      **Pipeline alinhado aos requisitos do GSI/PR:**
      1. Baseline de seguranca no pipeline conforme requisitos minimos definidos
         pelo GSI/PR (IN 1): SAST, DAST, secret detection, dependency scanning.
      2. Integracao do pipeline com CTIR Gov para report automatico de
         vulnerabilidades criticas descobertas em sistemas da APF.
      3. Templates de pipeline de referencia publicados pelo GSI/PR para
         adocao pelos orgaos da APF.
      4. Metricas de pipeline alimentam o portal de maturidade do GSI/PR.
    tools:
      - gitlab-ci
      - ctir-gov-api
      - pipeline-templates
      - security-metrics
  secops:
    prose: |
      **Operacao alinhada ao CTIR Gov:**
      1. Integracao do SOC institucional com CTIR Gov: notificacao de incidentes
         em ate 24 horas conforme IN 1 do GSI/PR.
      2. Adocao de IOCs publicados pelo CTIR Gov em regras de deteccao do SIEM.
      3. Participacao em exercicios ciberneticos coordenados pelo GSI/PR
         (Guardiao Cibernetico e similares).
      4. Implementacao de programa de conscientizacao alinhado as diretrizes
         do GSI/PR, com metricas de efetividade.
      5. Relatorio anual de conformidade com requisitos minimos do GSI/PR.
    tools:
      - siem-platform
      - ctir-gov-integration
      - exercise-platform
      - awareness-program
