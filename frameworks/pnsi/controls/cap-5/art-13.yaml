id: art-13
family: cap-5
title: "Composicao do Comite de Gestao de Seguranca da Informacao"
class: PNSI
baselines: [apf-federal]
statement:
  prose: |
    Art. 13. Fica instituído o Comitê de Gestão de Segurança da Informação (CGeSI)
    com a atribuição de assessorar o Gabinete de Segurança Institucional da Presidência
    da República nas atividades relacionadas à segurança da informação.

    Parágrafo 1. O Comitê de Gestão de Segurança da Informação será composto por um
    representante titular e respectivo suplente de cada órgão e entidade a seguir
    indicados:
    I - Gabinete de Segurança Institucional da Presidência da República, que o coordenará;
    II - Casa Civil da Presidência da República;
    III - Ministério da Justiça e Segurança Pública;
    IV - Ministério da Defesa;
    V - Ministério das Relações Exteriores;
    VI - Ministério da Economia;
    VII - Ministério da Infraestrutura;
    VIII - Ministério da Ciência, Tecnologia, Inovações e Comunicações;
    IX - Ministério de Minas e Energia;
    X - Controladoria-Geral da União;
    XI - Agência Brasileira de Inteligência;
    XII - Banco Central do Brasil.

    Parágrafo 2. O Comitê de Gestão de Segurança da Informação poderá convidar
    representantes de outros órgãos e entidades, públicos ou privados, para participar
    de suas reuniões, sem direito a voto.
guidance:
  prose: |
    O art. 13 cria o CGeSI como orgao colegiado de assessoramento ao GSI/PR
    em materias de seguranca da informacao.

    **Composicao estrategica:**
    Os 12 orgaos representados cobrem todas as dimensoes criticas:
    - Seguranca e defesa: MinDef, MJSP, ABIN
    - Relacoes exteriores: MRE (cooperacao internacional)
    - Infraestrutura critica: MinInfra, MME
    - Tecnologia e inovacao: MCTI
    - Economia e financas: MinEcon, BCB
    - Controle e transparencia: CGU
    - Coordenacao governamental: Casa Civil

    **Governanca interministerial:**
    O modelo de comite com representantes de alto nivel de 12 orgaos permite
    coordenacao transversal das acoes de seguranca da informacao, evitando
    silos ministeriais.

    **Flexibilidade:**
    O paragrafo 2 permite convite de representantes do setor privado e de
    outros orgaos, reconhecendo que seguranca da informacao requer cooperacao
    publico-privada.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de suporte ao CGeSI:**
      1. Portal seguro para o Comite: repositorio de documentos, atas, deliberacoes,
         pautas, votacoes, com acesso restrito e autenticado por certificado digital.
      2. Sistema de videoconferencia seguro (criptografado ponta-a-ponta) para
         reunioes do Comite quando nao presenciais.
      3. Dashboard consolidado de seguranca da informacao da APF para subsidiar
         deliberacoes: incidentes, maturidade por orgao, tendencias de ameacas.
      4. Workflow de deliberacoes: registro de decisoes, responsaveis, prazos,
         acompanhamento de implementacao.
    tools:
      - secure-portal
      - encrypted-videoconference
      - security-dashboard
      - deliberation-workflow
  devsecops:
    prose: |
      **Metricas para o CGeSI:**
      1. Consolidacao automatizada de metricas de seguranca de pipelines de
         todos os orgaos da APF para reporte ao Comite.
      2. Dashboard de maturidade DevSecOps por orgao: adocao de SAST, DAST,
         secret detection, container scanning, compliance gates.
      3. Relatorio automatizado de vulnerabilidades criticas nao corrigidas
         alem do SLA, consolidado por orgao.
      4. Metricas de adocao de pipelines seguros na APF como indicador de
         progresso da PNSI.
    tools:
      - gitlab-ci
      - metrics-consolidation
      - maturity-dashboard
      - vulnerability-reporting
  secops:
    prose: |
      **Suporte operacional ao CGeSI:**
      1. Relatorio mensal de incidentes ciberneticos na APF, consolidado pelo
         CTIR Gov, para apreciacao do Comite.
      2. Briefing de ameacas: analise de tendencias de ataques ciberneticos
         contra o governo federal e infraestruturas criticas.
      3. Acompanhamento de implementacao das deliberacoes do Comite: status
         por orgao, pendencias, bloqueios.
      4. Coordenacao de exercicios ciberneticos interministeriais sob
         orientacao do Comite.
    tools:
      - incident-reporting
      - threat-briefing
      - action-tracker
      - exercise-coordination
