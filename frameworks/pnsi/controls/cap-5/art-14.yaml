id: art-14
family: cap-5
title: "Atribuicoes do Comite de Gestao de Seguranca da Informacao"
class: PNSI
baselines: [apf-federal]
statement:
  prose: |
    Art. 14. Ao Comitê de Gestão de Segurança da Informação compete:
    I - assessorar o Gabinete de Segurança Institucional da Presidência da República
    na elaboração da Estratégia Nacional de Segurança da Informação e dos planos
    nacionais;
    II - propor alterações à Estratégia Nacional de Segurança da Informação e aos
    planos nacionais;
    III - avaliar periodicamente a implementação e a execução da Estratégia Nacional
    de Segurança da Informação e dos planos nacionais;
    IV - propor a elaboração ou a alteração de normas e de ações relacionadas à
    segurança da informação;
    V - propor estratégias de articulação e de cooperação internacional;
    VI - deliberar sobre outros assuntos relacionados à PNSI.
guidance:
  prose: |
    O art. 14 define seis atribuicoes do CGeSI, que cobrem todo o ciclo de
    gestao da PNSI.

    **Ciclo PDCA do CGeSI:**
    1. Plan: assessorar na elaboracao da Estrategia e planos (inciso I)
    2. Do: propor normas e acoes (inciso IV)
    3. Check: avaliar periodicamente a implementacao (inciso III)
    4. Act: propor alteracoes a Estrategia e planos (inciso II)

    **Cooperacao internacional (inciso V):**
    O CGeSI tem papel na articulacao internacional, incluindo cooperacao com
    organismos como OEA/CICTE, UIT, FIRST e governos parceiros em materia
    de seguranca cibernetica.

    **Amplitude deliberativa (inciso VI):**
    A clausula aberta do inciso VI permite ao Comite deliberar sobre qualquer
    assunto relacionado a PNSI, dando flexibilidade para tratar temas emergentes
    como inteligencia artificial, computacao quantica ou novas ameacas ciberneticas.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de gestao estrategica:**
      1. Sistema de gestao de estrategia e planos: OKRs, KPIs, roadmap,
         acompanhamento de marcos e entregas.
      2. Ferramenta de avaliacao de maturidade de seguranca: modelo de
         maturidade com niveis, criterios de avaliacao, evidencias.
      3. Portal de cooperacao internacional seguro: compartilhamento de
         informacoes com parceiros internacionais via canais criptografados.
      4. Base de conhecimento normativa: repositorio de todas as normas de
         seguranca da informacao vigentes na APF, com controle de versao.
    tools:
      - strategy-management
      - maturity-assessment
      - international-cooperation-portal
      - knowledge-base
  devsecops:
    prose: |
      **Avaliacao de implementacao via pipeline:**
      1. Metricas automatizadas de implementacao da Estrategia: percentual de
         orgaos com pipeline seguro, cobertura de scans, tempo de correcao.
      2. Benchmark de maturidade DevSecOps entre orgaos da APF: ranking
         anonimizado para estimular melhoria continua.
      3. Compliance checks automatizados alinhados as normas propostas pelo
         Comite, implementados como pipeline policies.
      4. Relatorio de tendencias de vulnerabilidades na APF para subsidiar
         propostas normativas do Comite.
    tools:
      - gitlab-ci
      - benchmark-dashboard
      - compliance-checks
      - trend-analysis
  secops:
    prose: |
      **Suporte operacional as atribuicoes:**
      1. Relatorio trimestral de avaliacao da implementacao da Estrategia:
         progresso por orgao, gaps identificados, recomendacoes.
      2. Analise de lacunas normativas: mapeamento de temas nao cobertos
         por normas vigentes para subsidiar propostas do Comite.
      3. Inteligencia de ameacas para cooperacao internacional: compartilhamento
         de IOCs e TTPs com parceiros via plataformas como MISP.
      4. Secretaria executiva do Comite: preparacao de pautas, consolidacao
         de relatorios, acompanhamento de deliberacoes.
    tools:
      - grc-platform
      - gap-analysis
      - misp-platform
      - committee-secretariat
