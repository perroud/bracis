id: art-1
family: cap-1
title: "Instituicao da PNSI e Abrangencia"
class: PNSI
baselines: [apf-federal]
statement:
  prose: |
    Art. 1. Fica instituída a Política Nacional de Segurança da Informação (PNSI)
    no âmbito da administração pública federal, com a finalidade de assegurar a
    disponibilidade, a integridade, a confidencialidade e a autenticidade da informação
    a nível nacional.

    Parágrafo único. A PNSI abrange:
    I - a segurança cibernética;
    II - a defesa cibernética;
    III - a segurança física e a proteção de dados organizacionais;
    IV - as ações destinadas a assegurar a disponibilidade, a integridade, a
    confidencialidade e a autenticidade da informação.
guidance:
  prose: |
    O art. 1 institui a PNSI como marco normativo central para seguranca da informacao
    no governo federal brasileiro.

    **Pilares da PNSI:**
    A politica abrange quatro dimensoes complementares:
    1. Seguranca cibernetica: protecao de ativos de informacao no ciberespaco
    2. Defesa cibernetica: acoes ofensivas e defensivas no contexto de defesa nacional
    3. Seguranca fisica e protecao de dados: controles fisicos e logicos para dados
       organizacionais
    4. Garantia DICA: disponibilidade, integridade, confidencialidade e autenticidade

    **Escopo de aplicacao:**
    A PNSI vincula toda a administracao publica federal direta e indireta,
    incluindo autarquias, fundacoes, empresas publicas e sociedades de economia mista
    controladas pela Uniao.

    **Alinhamento internacional:**
    Os pilares DICA alinham-se aos atributos de seguranca da informacao definidos
    pela ISO 27001, garantindo compatibilidade com frameworks internacionais.
implementation_guidance:
  platform_engineering:
    prose: |
      **Arquitetura para DICA (disponibilidade, integridade, confidencialidade, autenticidade):**
      1. Implementar classificacao de ativos de informacao com niveis de sensibilidade
         (publico, restrito, sigiloso, ultra-sigiloso) conforme LAI e PNSI.
      2. Arquitetura de alta disponibilidade com redundancia geografica para sistemas
         criticos da APF.
      3. Criptografia em transito (TLS 1.3) e em repouso (AES-256) para dados
         classificados como restritos ou superiores.
      4. Infraestrutura de PKI governamental integrada ao ICP-Brasil para autenticidade
         de documentos e comunicacoes.
      5. Segmentacao de rede com zero-trust architecture para isolar sistemas com
         diferentes niveis de classificacao.
    tools:
      - asset-classification-engine
      - pki-icp-brasil
      - zero-trust-gateway
      - encryption-at-rest
  devsecops:
    prose: |
      **Pipeline seguro para sistemas governamentais:**
      1. SAST e DAST obrigatorios em todo pipeline de sistemas que processam
         informacoes classificadas.
      2. Validacao automatica de conformidade com requisitos DICA antes de deploy.
      3. Secret detection para prevenir vazamento de credenciais e chaves
         criptograficas em repositorios.
      4. Container scanning para imagens Docker usadas em ambientes governamentais.
      5. Assinatura digital de artefatos de build com certificado ICP-Brasil.
    tools:
      - gitlab-ci
      - sast-scanner
      - dast-scanner
      - secret-detection
      - container-scanning
  secops:
    prose: |
      **Operacao de seguranca para APF:**
      1. SOC (Security Operations Center) 24x7 para monitoramento de incidentes
         ciberneticos em infraestruturas criticas.
      2. Integracao com CTIR Gov (Centro de Tratamento e Resposta a Incidentes
         Ciberneticos de Governo) para notificacao e resposta coordenada.
      3. Inventario continuo de ativos de informacao com classificacao de sensibilidade.
      4. Plano de continuidade de negocios e recuperacao de desastres para sistemas
         criticos.
      5. Monitoramento de ameacas ciberneticas com threat intelligence compartilhada
         entre orgaos da APF.
    tools:
      - soc-platform
      - ctir-gov-integration
      - asset-inventory
      - threat-intelligence
