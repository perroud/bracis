id: art-2
family: cap-1
title: "Definicoes e Conceitos Fundamentais"
class: PNSI
baselines: [apf-federal]
statement:
  prose: |
    Art. 2. Para os fins deste Decreto, considera-se:
    I - segurança da informação: ações que objetivam viabilizar e assegurar a
    disponibilidade, a integridade, a confidencialidade e a autenticidade das informações;
    II - defesa cibernética: ações realizadas no espaço cibernético, no contexto de um
    planejamento nacional de nível estratégico, coordenadas e integradas pelo Ministério
    da Defesa, com as finalidades de proteger os ativos de informação de interesse da
    defesa nacional, obter dados para a produção de conhecimento de inteligência e buscar
    superioridade cibernética sobre o oponente;
    III - segurança cibernética: ações voltadas para a segurança de operações, de forma a
    garantir que os sistemas de informação sejam capazes de resistir a eventos no espaço
    cibernético capazes de comprometer a disponibilidade, a integridade, a confidencialidade
    e a autenticidade dos dados armazenados, processados ou transmitidos e dos serviços
    que esses sistemas oferecem ou tornam acessíveis;
    IV - segurança das infraestruturas críticas: ações voltadas para a segurança e a
    resiliência das infraestruturas críticas, como instalações, serviços, bens e sistemas
    que, se forem interrompidos ou destruídos, provocarão sério impacto social, econômico,
    político, internacional ou à segurança do Estado e da sociedade;
    V - segurança das informações sigilosas: ações voltadas para assegurar que informações
    classificadas nos graus de sigilo ultrassecreto, secreto e reservado, e aquelas que
    recebam tratamento de acesso restrito, recebam proteção adequada.
guidance:
  prose: |
    O art. 2 estabelece o vocabulario tecnico-juridico da PNSI, diferenciando cinco
    dominios de seguranca da informacao que, embora relacionados, possuem escopos e
    responsabilidades distintos.

    **Hierarquia conceitual:**
    - Seguranca da informacao (conceito amplo, abrange todos os demais)
      - Seguranca cibernetica (protecao de sistemas no ciberespaco)
      - Defesa cibernetica (contexto militar, coordenacao MinDef)
      - Seguranca de infraestruturas criticas (resiliencia de servicos essenciais)
      - Seguranca de informacoes sigilosas (classificacao e acesso restrito)

    **Relevancia pratica:**
    A distincao entre seguranca cibernetica e defesa cibernetica e fundamental:
    seguranca cibernetica abrange toda a APF, enquanto defesa cibernetica e
    coordenada pelo Ministerio da Defesa em contexto estrategico-militar.

    **Alinhamento com LAI:**
    A definicao de informacoes sigilosas (inciso V) conecta-se diretamente a
    Lei de Acesso a Informacao (Lei 12.527/2011) que define os graus de sigilo
    ultra-secreto, secreto e reservado.
implementation_guidance:
  platform_engineering:
    prose: |
      **Taxonomia de seguranca em plataforma:**
      1. Implementar sistema de classificacao de ativos alinhado aos cinco dominios
         do art. 2: rotulagem automatica de dados conforme dominio de seguranca.
      2. Catalogo de servicos de infraestrutura critica com identificacao de
         dependencias e pontos unicos de falha.
      3. Metadata de classificacao de sigilo em todos os objetos de dados:
         publico, restrito, reservado, secreto, ultra-secreto.
      4. Separacao logica e fisica de ambientes conforme dominio de seguranca
         (cibernetico, infraestrutura critica, sigiloso).
    tools:
      - data-classification-engine
      - asset-catalog
      - metadata-tagging
      - network-segmentation
  devsecops:
    prose: |
      **Controles de pipeline por dominio:**
      1. Politicas de pipeline diferenciadas por classificacao de sigilo do sistema:
         sistemas sigilosos exigem ambientes air-gapped para build e deploy.
      2. Scan de dependencias com blocklist de componentes oriundos de paises
         com restricoes de seguranca nacional.
      3. Validacao de conformidade com requisitos do dominio de seguranca aplicavel
         antes de merge em branch protegida.
      4. Testes de resiliencia automatizados (chaos engineering) para sistemas
         classificados como infraestrutura critica.
    tools:
      - gitlab-ci
      - dependency-scanning
      - compliance-pipeline
      - chaos-engineering
  secops:
    prose: |
      **Operacao por dominio de seguranca:**
      1. Procedimentos de resposta a incidentes diferenciados por dominio:
         incidentes em infraestrutura critica requerem notificacao ao CTIR Gov
         e ao CAIS/RNP em ate 24 horas.
      2. Monitoramento continuo de ameacas ciberneticas com correlacao entre
         dominios (um ataque cibernetico pode escalar para ameaca a infraestrutura critica).
      3. Gestao de acesso a informacoes sigilosas com credencial de seguranca,
         necessidade de conhecer e registro de acesso.
      4. Exercicios de simulacao de incidentes por dominio, no minimo anuais.
    tools:
      - siem-platform
      - ctir-gov-integration
      - access-management
      - incident-response
