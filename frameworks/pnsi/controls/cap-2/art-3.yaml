id: art-3
family: cap-2
title: "Principios da PNSI"
class: PNSI
baselines: [apf-federal]
statement:
  prose: |
    Art. 3. São princípios da PNSI:
    I - soberania nacional;
    II - respeito e promoção dos direitos humanos e das garantias fundamentais,
    em especial a liberdade de expressão, a proteção de dados pessoais, a proteção
    da privacidade e o acesso à informação;
    III - visão abrangente e sistêmica da segurança da informação;
    IV - responsabilidade do País no âmbito internacional e articulação entre
    as esferas pública e privada na implementação da PNSI;
    V - educação como alicerce fundamental para o fomento da cultura em segurança
    da informação;
    VI - orientação à gestão de riscos e à prevenção de incidentes de segurança
    da informação;
    VII - prevenção e tratamento de incidentes de segurança da informação;
    VIII - articulação entre as ações de segurança cibernética e defesa cibernética
    e as demais ações de segurança da informação;
    IX - dever dos órgãos, das entidades e dos agentes públicos de garantir o
    sigilo das informações imprescindíveis à segurança da sociedade e do Estado e
    a inviolabilidade da vida privada, da honra e da imagem das pessoas.
guidance:
  prose: |
    O art. 3 enumera nove principios que fundamentam toda a atuacao governamental
    em seguranca da informacao.

    **Equilibrio fundamental:**
    Os principios equilibram duas tensoes:
    1. Soberania nacional e sigilo de Estado (incisos I, IX) vs. direitos
       fundamentais e transparencia (inciso II)
    2. Gestao de riscos e prevencao (incisos VI, VII) vs. abordagem sistemica
       e educacao (incisos III, V)

    **Gestao de riscos como principio:**
    O inciso VI posiciona a gestao de riscos como principio, nao apenas como
    pratica. Isso eleva o risk-based approach a diretriz estrategica nacional,
    alinhado com ISO 31000 e NIST RMF.

    **Cooperacao publico-privada:**
    O inciso IV reconhece que seguranca da informacao nacional depende de
    articulacao com o setor privado, especialmente operadores de infraestruturas
    criticas e provedores de servicos de telecomunicacoes.
implementation_guidance:
  platform_engineering:
    prose: |
      **Principios traduzidos em arquitetura:**
      1. Soberania de dados: manter dados classificados em datacenter em territorio
         nacional (nuvem soberana ou on-premises), evitando jurisdicao estrangeira.
      2. Privacy by design: integrar mecanismos de protecao de dados pessoais na
         arquitetura desde a concepcao (anonimizacao, pseudonimizacao, minimizacao).
      3. Risk-based architecture: classificar sistemas por nivel de risco e aplicar
         controles proporcionais (baseline minimo + controles adicionais por risco).
      4. Observabilidade sistemica: telemetria unificada para visao abrangente do
         estado de seguranca da informacao em toda a infraestrutura.
    tools:
      - sovereign-cloud
      - privacy-engine
      - risk-assessment-platform
      - observability-stack
  devsecops:
    prose: |
      **Principios no ciclo de desenvolvimento:**
      1. Security awareness no onboarding de desenvolvedores: treinamento obrigatorio
         sobre classificacao de informacoes e responsabilidades legais.
      2. Gestao de riscos no backlog: classificacao de risco de seguranca para cada
         user story que envolve dados sensíveis ou sistemas criticos.
      3. Verificacao de soberania de dados no pipeline: validar que deploys nao
         enviam dados classificados para infraestrutura fora do territorio nacional.
      4. Scan de conformidade com LGPD integrado ao pipeline para protecao de
         dados pessoais.
    tools:
      - gitlab-ci
      - security-training-platform
      - risk-backlog-integration
      - data-sovereignty-check
  secops:
    prose: |
      **Operacionalizacao dos principios:**
      1. Programa de conscientizacao em seguranca da informacao: campanhas
         periodicas, phishing simulado, treinamento por papel funcional.
      2. Framework de gestao de riscos institucional: identificacao, analise,
         avaliacao, tratamento e monitoramento continuo de riscos.
      3. Cooperacao com CTIR Gov e centros de resposta a incidentes setoriais.
      4. Relatorio periodico ao gestor de seguranca da informacao sobre o estado
         de conformidade com os principios da PNSI.
      5. Canal de denuncia para violacoes de sigilo de informacoes.
    tools:
      - grc-platform
      - awareness-training
      - risk-register
      - ctir-gov-integration
