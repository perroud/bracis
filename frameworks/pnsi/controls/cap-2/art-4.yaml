id: art-4
family: cap-2
title: "Objetivos da PNSI"
class: PNSI
baselines: [apf-federal]
statement:
  prose: |
    Art. 4. São objetivos da PNSI:
    I - contribuir para a segurança do indivíduo, da sociedade e do Estado, por meio
    da orientação das ações de segurança da informação, observados os direitos e as
    garantias fundamentais;
    II - fomentar as atividades de pesquisa científica, de desenvolvimento tecnológico
    e de inovação relacionadas à segurança da informação;
    III - aprimorar continuamente o arcabouço legal e normativo relacionado à segurança
    da informação;
    IV - fomentar a formação e a qualificação dos recursos humanos necessários à área
    de segurança da informação;
    V - fortalecer a cultura de segurança da informação na sociedade;
    VI - orientar ações relacionadas a:
    a) segurança dos dados custodiados por entidades públicas;
    b) segurança da informação das infraestruturas críticas;
    c) proteção das informações das pessoas físicas que possam ter sua segurança ou
    a segurança das suas atividades afetada, observada a legislação específica;
    VII - contribuir para a preservação da memória nacional.
guidance:
  prose: |
    O art. 4 define sete objetivos estrategicos que orientam toda a implementacao
    da PNSI.

    **Dimensoes dos objetivos:**
    1. Protecao (incisos I, VI): protecao de dados publicos, infraestruturas
       criticas e dados pessoais
    2. Desenvolvimento (incisos II, III): pesquisa, inovacao e evolucao normativa
    3. Capacitacao (incisos IV, V): formacao profissional e cultura de seguranca
    4. Preservacao (inciso VII): memoria nacional e patrimonio informacional

    **Convergencia com LGPD:**
    O inciso VI, alinea c, faz referencia explicita a protecao de dados pessoais,
    antecipando a convergencia com a LGPD (Lei 13.709/2018) que entrou em vigor
    em 2020.

    **Pesquisa e inovacao:**
    O inciso II posiciona a seguranca da informacao como area estrategica para
    desenvolvimento tecnologico nacional, alinhado com a Estrategia Nacional de
    Ciencia, Tecnologia e Inovacao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Objetivos traduzidos em capacidades tecnicas:**
      1. Plataforma de custodia segura de dados publicos: criptografia, controle de
         acesso granular, auditoria de acessos, retencao conforme tabela de
         temporalidade.
      2. Ambiente de sandbox seguro para pesquisa e inovacao em seguranca: laboratorio
         isolado para testes de vulnerabilidades e desenvolvimento de contramedidas.
      3. Plataforma de treinamento integrada ao ambiente de desenvolvimento: simulacoes
         de ataques, CTF (Capture the Flag), exercicios praticos de seguranca.
      4. Sistema de preservacao digital de longo prazo com garantia de integridade
         e autenticidade (assinatura digital, carimbo de tempo ICP-Brasil).
    tools:
      - data-custody-platform
      - security-sandbox
      - training-platform
      - digital-preservation
  devsecops:
    prose: |
      **Objetivos no ciclo DevSecOps:**
      1. Metricas de seguranca integradas ao pipeline: cobertura de testes de
         seguranca, tempo medio de correcao de vulnerabilidades, taxa de falsos
         positivos.
      2. Contribuicao para pesquisa: compartilhar dados anonimizados de
         vulnerabilidades encontradas com centros de pesquisa (CERT.br, RNP).
      3. Programa de capacitacao continua: treinamento obrigatorio anual em
         desenvolvimento seguro, com certificacao e avaliacao de competencias.
      4. Pipeline de conformidade que valida custodia adequada de dados publicos
         antes de deploy em producao.
    tools:
      - gitlab-ci
      - security-metrics-dashboard
      - vulnerability-sharing
      - training-tracker
  secops:
    prose: |
      **Objetivos operacionais:**
      1. Programa de cultura de seguranca: campanhas de conscientizacao, metricas de
         engajamento, gamificacao de boas praticas.
      2. Gestao de competencias em seguranca: mapeamento de skills necessarios,
         plano de capacitacao por papel funcional, trilhas de certificacao.
      3. Monitoramento de infraestruturas criticas: deteccao de anomalias,
         correlacao de eventos, resposta automatizada a incidentes de baixa
         complexidade.
      4. Cooperacao com academia e centros de pesquisa: compartilhamento de
         threat intelligence, participacao em exercicios ciberneticos nacionais.
    tools:
      - awareness-platform
      - competency-management
      - critical-infrastructure-monitoring
      - threat-intelligence-sharing
