id: art-5
family: cap-3
title: "Instrumentos da PNSI"
class: PNSI
baselines: [apf-federal]
statement:
  prose: |
    Art. 5. São instrumentos da PNSI:
    I - a Estratégia Nacional de Segurança da Informação;
    II - os planos nacionais;
    III - o Comitê de Gestão de Segurança da Informação.

    Parágrafo 1. A Estratégia Nacional de Segurança da Informação conterá as ações
    estratégicas e os objetivos relacionados à segurança da informação, em consonância
    com as políticas públicas e os programas do Governo federal, e será dividida nos
    seguintes módulos:
    I - segurança cibernética;
    II - defesa cibernética;
    III - segurança das infraestruturas críticas;
    IV - segurança das informações sigilosas;
    V - proteção contra vazamento de dados.

    Parágrafo 2. Os planos nacionais conterão:
    I - o planejamento de ações, os objetivos e as metas para implementação da
    Estratégia Nacional de Segurança da Informação;
    II - a definição e a delimitação de ações transversais e de temas de responsabilidade
    de órgãos e entidades da administração pública federal.
guidance:
  prose: |
    O art. 5 define a estrutura de instrumentos para implementar a PNSI em tres
    niveis hierarquicos.

    **Hierarquia de instrumentos:**
    1. Estrategia Nacional de Seguranca da Informacao (nivel estrategico):
       visao de longo prazo dividida em cinco modulos tematicos
    2. Planos nacionais (nivel tatico): planejamento de acoes, metas e
       responsabilidades para implementar a estrategia
    3. Comite de Gestao de Seguranca da Informacao (governanca): orgao
       de coordenacao e acompanhamento

    **Cinco modulos da Estrategia:**
    Cada modulo corresponde a um dominio de seguranca definido no art. 2,
    com adicao do modulo de protecao contra vazamento de dados, reconhecendo
    a crescente ameaca de data leaks no setor publico.

    **Evolucao normativa:**
    A Estrategia Nacional de Seguranca Cibernetica (E-Ciber) foi publicada pelo
    Decreto 10.222/2020, e a PNCiber pelo Decreto 11.856/2023, implementando
    parcialmente o art. 5.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma para gestao estrategica de seguranca:**
      1. Dashboard estrategico com visao dos cinco modulos de seguranca:
         indicadores-chave de desempenho (KPIs) por modulo, metas vs. realizado,
         maturidade por orgao.
      2. Sistema de gestao de planos nacionais: rastreamento de acoes, responsaveis,
         prazos, dependencias e status de implementacao.
      3. Plataforma anti-vazamento de dados (DLP): classificacao automatica,
         monitoramento de exfiltracao, bloqueio de transferencias nao autorizadas.
      4. Integracoes entre plataformas de seguranca para visao abrangente e
         sistemica (SIEM + DLP + IAM + GRC).
    tools:
      - strategic-dashboard
      - project-management
      - dlp-platform
      - security-integration-hub
  devsecops:
    prose: |
      **Alinhamento do pipeline com instrumentos da PNSI:**
      1. Politicas de pipeline alinhadas aos cinco modulos da Estrategia:
         cada sistema classificado por modulo(s) aplicavel(is).
      2. DLP no pipeline: scan de codigo e artefatos para prevenir inclusao
         de dados sensiveis em repositorios (credenciais, dados pessoais,
         informacoes classificadas).
      3. Metricas de pipeline alimentam KPIs dos planos nacionais:
         vulnerabilidades detectadas, tempo de correcao, cobertura de testes.
      4. Compliance gates alinhados aos objetivos da Estrategia por modulo.
    tools:
      - gitlab-ci
      - secret-detection
      - dlp-scanner
      - compliance-metrics
  secops:
    prose: |
      **Operacao alinhada aos instrumentos:**
      1. Plano operacional de seguranca cibernetica derivado do plano nacional,
         com acoes, responsaveis e metricas mensuráveis.
      2. Exercicios ciberneticos alinhados a cada modulo da Estrategia:
         simulacoes de ataque, exercicios de mesa, war games.
      3. Monitoramento de vazamento de dados: dark web monitoring, data
         breach detection, alerta automatizado.
      4. Relatorio periodico de progresso ao Comite de Gestao de Seguranca
         da Informacao com indicadores de cada modulo.
    tools:
      - grc-platform
      - cyber-exercise-platform
      - dark-web-monitoring
      - reporting-dashboard
