id: art-6
family: cap-3
title: "Planos Setoriais e Normas Tecnicas"
class: PNSI
baselines: [apf-federal]
statement:
  prose: |
    Art. 6. Os órgãos e as entidades da administração pública federal, em seu âmbito
    de atuação, poderão elaborar planos setoriais de segurança da informação com o
    objetivo de implementar a Estratégia Nacional de Segurança da Informação e os
    planos nacionais.

    Parágrafo único. O Gabinete de Segurança Institucional da Presidência da República
    editará normas e estabelecerá os requisitos metodológicos para a elaboração dos
    planos setoriais de que trata o caput.
guidance:
  prose: |
    O art. 6 descentraliza a implementacao da PNSI ao permitir que cada orgao
    da APF elabore planos setoriais adaptados a sua realidade.

    **Modelo de governanca distribuida:**
    - Nivel central (GSI/PR): define metodologia e requisitos
    - Nivel setorial (orgaos): elaboram planos adaptados ao seu contexto
    - Resultado: padronizacao metodologica com flexibilidade de implementacao

    **Normativo derivado:**
    O GSI/PR exerce papel regulamentador ao editar normas complementares
    (Instrucoes Normativas) que definem os requisitos metodologicos para os
    planos setoriais, garantindo consistencia entre orgaos.

    **Pratica:**
    As Instrucoes Normativas GSI/PR (IN 1, IN 3, etc.) sao os instrumentos
    pelos quais o GSI/PR cumpre o mandato deste artigo, definindo controles
    minimos e metodologias padronizadas.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma para planos setoriais:**
      1. Template padronizado de plano setorial em formato machine-readable (YAML/JSON)
         seguindo metodologia do GSI/PR.
      2. Repositorio centralizado de planos setoriais com versionamento, aprovacao
         e rastreabilidade de mudancas.
      3. Framework de metricas padronizado para acompanhamento de maturidade de
         seguranca por orgao/setor.
      4. API de integracao para alimentar dashboard centralizado do GSI/PR com
         dados de progresso de cada orgao.
    tools:
      - plan-management-platform
      - gitlab-repository
      - maturity-framework
      - api-integration
  devsecops:
    prose: |
      **Plano setorial no pipeline:**
      1. Baseline de seguranca no pipeline configuravel por setor: cada orgao
         ativa controles conforme seu plano setorial.
      2. Compliance-as-code: requisitos do plano setorial codificados como
         politicas de pipeline verificaveis automaticamente.
      3. Relatorios automatizados de conformidade do pipeline com o plano
         setorial do orgao, gerados a cada execucao.
      4. Compartilhamento de pipelines de referencia entre orgaos com desafios
         similares.
    tools:
      - gitlab-ci
      - compliance-as-code
      - pipeline-templates
      - compliance-reporting
  secops:
    prose: |
      **Gestao operacional de planos setoriais:**
      1. Implementacao dos controles definidos no plano setorial com cronograma
         de priorizacao baseado em risco.
      2. Auditoria interna periodica de conformidade com o plano setorial:
         checklist de controles, evidencias, gap analysis.
      3. Reporte semestral ao GSI/PR sobre o progresso de implementacao do
         plano setorial.
      4. Revisao anual do plano setorial com atualizacao de ameacas, riscos
         e controles.
    tools:
      - grc-platform
      - audit-management
      - reporting-dashboard
      - risk-assessment
