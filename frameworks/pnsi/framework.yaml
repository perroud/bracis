control_families:
  - id: cap-1
    title: "Disposicoes Gerais"
    description: >-
      Definicoes fundamentais e ambito de aplicacao da Politica
      Nacional de Seguranca da Informacao, abrangendo seguranca
      cibernetica, defesa cibernetica, seguranca de infraestruturas
      criticas e protecao de informacoes sigilosas
    articles: "art. 1 ao art. 2"
    control_count: 2
  - id: cap-2
    title: "Principios e Objetivos"
    description: "Principios norteadores e objetivos estrategicos da PNSI, incluindo soberania nacional, governanca, protecao da informacao e cooperacao internacional"
    articles: "art. 3 ao art. 4"
    control_count: 2
  - id: cap-3
    title: "Instrumentos da PNSI"
    description: "Instrumentos para implementacao da PNSI, incluindo a Politica Nacional de Ciberseguranca (PNCiber), planos nacionais e setoriais, e normas tecnicas"
    articles: "art. 5 ao art. 6"
    control_count: 2
  - id: cap-4
    title: "Competencias"
    description: >-
      Competencias do Gabinete de Seguranca Institucional da
      Presidencia da Republica (GSI/PR), do Comite de Governanca,
      dos orgaos e entidades da Administracao Publica Federal e seus
      gestores de seguranca da informacao
    articles: "art. 7 ao art. 12"
    control_count: 3
  - id: cap-5
    title: "Comite de Gestao de Seguranca da Informacao"
    description: "Composicao, atribuicoes e funcionamento do Comite de Gestao de Seguranca da Informacao (CGeSI) no ambito do GSI/PR"
    articles: "art. 13 ao art. 14"
    control_count: 2
  - id: cap-6
    title: "Disposicoes Finais"
    description: "Obrigacoes de implementacao nos orgaos da APF, prazos de adequacao e vigencia do Decreto"
    articles: "art. 15 ao art. 16"
    control_count: 2
related_frameworks:
  - framework_id: gsi-in1
    relationship: implements
    description: >-
      A GSI/PR IN 1 implementa as diretrizes da PNSI ao detalhar os
      controles de seguranca da informacao que os orgaos da APF devem
      adotar, conforme mandato do art. 7 do Decreto 9.637/2018.
  - framework_id: pnciber
    relationship: derived-from
    description: >-
      A PNSI (art. 5) determinou a criacao da Politica Nacional de
      Ciberseguranca (PNCiber), efetivada pelo Decreto 11.856/2023,
      como instrumento especifico para seguranca cibernetica nacional.
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD complementa a PNSI ao disciplinar o tratamento de dados
      pessoais no ambito da administracao publica, abrangendo aspectos
      de protecao da informacao pessoal previstos no Decreto
      9.637/2018.
  - framework_id: iso-27001-2022
    relationship: mapped
    description: "A ISO 27001:2022 fornece o framework internacional de gestao de seguranca da informacao que serve de referencia tecnica para implementacao das diretrizes da PNSI nos orgaos da APF."
