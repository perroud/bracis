id: fisma-supply-chain
family: supply-chain
title: "Supply Chain Risk Management"
class: FISMA

baselines: [low, moderate, high]

statement:
  prose: >-
    Each agency shall implement supply chain risk management practices
    to protect against supply chain threats to federal information systems,
    components, and services. FISMA, as reinforced by the FISMA Reform
    Act proposals and Executive Order 14028 (Improving the Nation's
    Cybersecurity), requires agencies to assess and manage risks associated
    with the supply chain for information and communications technology
    (ICT) products and services. Agencies must identify critical suppliers,
    assess supply chain risks, implement mitigations for identified risks,
    and monitor the supply chain for emerging threats. This includes
    requirements for software bill of materials (SBOM), secure software
    development attestations, and prohibition of high-risk suppliers
    as designated by federal authorities.

guidance:
  prose: >-
    Supply chain risk management has become increasingly prominent in FISMA
    compliance through EO 14028, OMB M-22-18 (Enhancing the Security of
    the Software Supply Chain), and NIST SP 800-161 (Supply Chain Risk
    Management Practices). Agencies must require software producers to
    attest to secure development practices and provide SBOMs for critical
    software. NIST SP 800-53 Rev 5 introduced the SR (Supply Chain Risk
    Management) control family specifically addressing these requirements.
    The Federal Acquisition Security Council (FASC) and CISA maintain
    lists of prohibited suppliers and high-risk components. Agencies
    must integrate supply chain risk considerations into acquisition
    processes, system development lifecycle, and continuous monitoring
    programs. The FISMA Reform Act proposals further codify SCRM
    requirements including mandatory SBOM provisions.

references:
  - citation: "Executive Order 14028 - Improving the Nation's Cybersecurity"
    url: "https://www.whitehouse.gov/briefing-room/presidential-actions/2021/05/12/executive-order-on-improving-the-nations-cybersecurity/"
  - citation: "OMB M-22-18 - Enhancing the Security of the Software Supply Chain"
    url: "https://www.whitehouse.gov/wp-content/uploads/2022/09/M-22-18.pdf"
  - citation: "NIST SP 800-161 Rev 1 - Cybersecurity Supply Chain Risk Management Practices"
    url: "https://doi.org/10.6028/NIST.SP.800-161r1"
  - citation: "NIST SP 800-53 Rev 5, SR Family"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"
  - citation: "NIST Secure Software Development Framework (SSDF) SP 800-218"
    url: "https://doi.org/10.6028/NIST.SP.800-218"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated supply chain security controls across the
      platform. Deploy software composition analysis that generates
      and validates SBOMs for all platform components and hosted
      applications. Maintain an approved software registry that
      validates components against known vulnerability databases,
      license compliance requirements, and prohibited supplier lists.
      Implement cryptographic verification of all software artifacts
      (container images, packages, IaC modules) through signing and
      attestation frameworks. Automate the detection of compromised
      or vulnerable dependencies through continuous monitoring of
      upstream supply chains. Enforce procurement policies that
      require supply chain risk assessments for all new ICT products
      and services onboarded to the platform.
    tools:
      - sigstore
      - cosign
      - syft
      - grype
      - trivy
      - opa-gatekeeper
      - backstage
      - harbor

  devsecops:
    prose: >-
      Embed supply chain security into every CI/CD pipeline stage.
      Implement mandatory software composition analysis (SCA) that
      blocks builds containing prohibited, end-of-life, or critically
      vulnerable components. Generate SBOMs in standardized formats
      (SPDX, CycloneDX) as build artifacts for all released software.
      Enforce software signing and provenance attestation (SLSA
      framework) for all build outputs. Implement dependency pinning
      and lock files to prevent supply chain injection attacks.
      Validate secure software development practice attestations
      from third-party suppliers as part of the procurement pipeline.
      Monitor open source dependencies for newly disclosed
      vulnerabilities with automated alerting and remediation tracking.
    tools:
      - trivy
      - grype
      - syft
      - cosign
      - gitlab-ci
      - dependabot
      - snyk
      - slsa-verifier

  secops:
    prose: >-
      Monitor the agency's software supply chain for threats and
      vulnerabilities through continuous scanning and threat
      intelligence integration. Track SBOM inventory across all
      agency systems and correlate with vulnerability disclosures
      for rapid impact assessment. Implement alerting for newly
      disclosed vulnerabilities in widely-deployed components across
      the agency's supply chain. Monitor for supply chain compromise
      indicators including unexpected dependency changes, compromised
      package registries, and typosquatting attacks. Generate supply
      chain risk reports for FISMA reporting including SBOM coverage,
      vulnerable component counts, and supplier risk assessments.
      Track compliance with OMB M-22-18 software supply chain
      security requirements.
    tools:
      - snyk
      - grype
      - splunk
      - crowdstrike
      - servicenow
      - dependency-track
