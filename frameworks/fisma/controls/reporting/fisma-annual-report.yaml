id: fisma-annual-report
family: reporting
title: "Annual Report to OMB"
class: FISMA

baselines: [low, moderate, high]

statement:
  prose: >-
    Each agency shall report annually to the Director of OMB, the
    Committees on Government Reform and Homeland Security of the House
    of Representatives, the Committees on Governmental Affairs and
    Homeland Security of the Senate, the appropriate authorization and
    appropriations committees of Congress, and the Comptroller General
    on the adequacy and effectiveness of information security policies,
    procedures, and practices, and compliance with FISMA requirements
    (44 USC 3554(c)). The annual report must include a summary of the
    agency's security program, the results of security testing and
    evaluation, remediation status, incident statistics, and the
    agency's progress in implementing continuous monitoring.

guidance:
  prose: >-
    OMB issues annual FISMA reporting guidance (typically through an
    OMB Memorandum) that specifies the metrics, data elements, and
    reporting formats required for each fiscal year. Agencies report
    through CyberScope (now transitioning to other platforms) with data
    covering information security program maturity, risk management,
    continuous monitoring capabilities, incident response, and
    supply chain risk management. The CISO is responsible for compiling
    and certifying the accuracy of FISMA reports. CIO and Inspector
    General reports are submitted separately, with the IG providing an
    independent assessment of the agency's security program. OMB uses
    FISMA reports to assess government-wide cybersecurity posture and
    inform budget decisions.

references:
  - citation: "44 USC 3554(c) - Annual Report"
    url: "https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title44-section3554"
  - citation: "OMB Circular A-130, Section 5"
    url: "https://www.whitehouse.gov/wp-content/uploads/legacy_drupal_files/omb/circulars/A130/a130revised.pdf"
  - citation: "OMB FISMA Annual Reporting Guidance"
    url: "https://www.whitehouse.gov/omb/management/egov/"

implementation_guidance:
  platform_engineering:
    prose: >-
      Automate the collection of FISMA reporting metrics from platform
      infrastructure data. Implement APIs and data pipelines that aggregate
      security posture data across all platform-managed systems including
      system inventories, categorization levels, authorization statuses,
      vulnerability counts, and POA&M statistics. Generate machine-readable
      FISMA report data in formats compatible with OMB reporting
      requirements. Maintain a real-time reporting dashboard that tracks
      FISMA metrics throughout the fiscal year, not just at annual
      reporting time. Automate the correlation between platform security
      controls and FISMA reporting categories.
    tools:
      - backstage
      - grafana
      - prometheus
      - oscal
      - powerbi
      - terraform

  devsecops:
    prose: >-
      Generate FISMA-reportable security metrics from CI/CD pipeline
      execution data including vulnerability discovery rates, remediation
      timelines, automated testing coverage, and deployment security
      compliance rates. Automate the extraction of control implementation
      evidence from pipeline configurations and security tool outputs.
      Maintain pipeline-generated compliance artifacts that feed directly
      into annual FISMA report generation. Track development security
      metrics (secure code training completion, security gate pass rates,
      vulnerability introduction rates) for inclusion in agency-wide
      FISMA reporting.
    tools:
      - gitlab-ci
      - sonarqube
      - trivy
      - grafana
      - powerbi

  secops:
    prose: >-
      Compile FISMA annual report data from security operations systems
      including incident counts and categories, vulnerability management
      statistics, continuous monitoring maturity metrics, and security
      program effectiveness indicators. Automate the generation of FISMA
      reporting artifacts from SIEM, vulnerability management, and
      incident response platforms. Maintain year-round tracking of all
      FISMA reporting metrics with automated alerts when metrics deviate
      from targets. Coordinate CIO and IG reporting timelines and ensure
      data consistency between reports. Archive all FISMA reports and
      supporting evidence for audit purposes.
    tools:
      - splunk
      - servicenow
      - tenable
      - powerbi
      - archer
