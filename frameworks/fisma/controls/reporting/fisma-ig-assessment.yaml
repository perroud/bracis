id: fisma-ig-assessment
family: reporting
title: "Inspector General Annual Assessment"
class: FISMA

baselines: [low, moderate, high]

statement:
  prose: >-
    The Inspector General of each agency shall conduct an annual independent
    evaluation of the information security program and practices of that
    agency to determine their effectiveness (44 USC 3555). The evaluation
    must include testing of the effectiveness of information security
    policies, procedures, and practices of a representative subset of
    the agency's information systems, an assessment of compliance with
    FISMA requirements and related policies, and assessment of the
    agency's compliance with NIST standards and OMB directives. The
    Inspector General shall submit the results to OMB as part of the
    annual FISMA reporting process.

guidance:
  prose: >-
    The IG assessment provides an independent evaluation of the agency's
    information security program, separate from the CIO/CISO self-assessment.
    OMB and CIGIE (Council of Inspectors General on Integrity and Efficiency)
    issue annual IG FISMA reporting metrics that define the maturity model
    used for assessment. The IG evaluates the agency across five security
    function areas: Identify, Protect, Detect, Respond, and Recover
    (aligned with NIST Cybersecurity Framework). Each function area is
    rated on a maturity scale. The IG assessment may be performed by the
    IG office directly or by an independent external assessor under IG
    oversight. Findings from the IG assessment often result in
    recommendations that the agency must track through corrective action
    plans.

references:
  - citation: "44 USC 3555 - Annual Independent Evaluation"
    url: "https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title44-section3555"
  - citation: "CIGIE Federal Information Security Modernization Act Reporting Metrics"
    url: "https://www.ignet.gov/content/fisma-reporting-metrics"
  - citation: "GAO Federal Information Security Reports"
    url: "https://www.gao.gov/information-technology"

implementation_guidance:
  platform_engineering:
    prose: >-
      Provide IG assessors with read-only access to platform security
      dashboards, configuration baselines, and compliance monitoring
      data. Automate the generation of assessment evidence packages
      that document platform security control implementations with
      supporting artifacts (configurations, scan results, audit logs).
      Maintain an assessment-ready evidence repository that is
      continuously updated from platform telemetry, eliminating the
      need for manual evidence collection during IG assessments.
      Implement automated maturity scoring against CIGIE FISMA metrics
      to enable continuous self-assessment between IG evaluations.
    tools:
      - backstage
      - grafana
      - oscal
      - tenable
      - open-policy-agent
      - elastic

  devsecops:
    prose: >-
      Generate automated evidence of secure development practices for
      IG assessment including pipeline security configurations, code
      review processes, automated testing results, and deployment
      approval workflows. Maintain audit trails of all CI/CD security
      activities in immutable logs accessible to assessors. Produce
      trend reports showing security maturity improvements across
      development practices. Automate the mapping of pipeline security
      controls to CIGIE FISMA assessment criteria for efficient
      evidence presentation during evaluations.
    tools:
      - gitlab-ci
      - sonarqube
      - trivy
      - git
      - oscal-cli

  secops:
    prose: >-
      Support IG assessments by maintaining comprehensive security
      operations documentation and evidence. Provide assessors with
      incident response metrics, vulnerability management statistics,
      continuous monitoring capabilities evidence, and security
      program maturity data aligned with CIGIE FISMA metrics. Track
      IG recommendations through formal corrective action plans with
      milestones and completion tracking. Generate comparison reports
      showing year-over-year maturity improvements across all FISMA
      function areas. Maintain a standing assessment evidence repository
      that is continuously refreshed from operational data.
    tools:
      - servicenow
      - splunk
      - tenable
      - archer
      - powerbi
