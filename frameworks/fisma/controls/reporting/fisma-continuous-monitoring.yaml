id: fisma-continuous-monitoring
family: reporting
title: "Continuous Monitoring"
class: FISMA

baselines: [low, moderate, high]

statement:
  prose: >-
    Each agency shall implement continuous monitoring of information
    security through the Continuous Diagnostics and Mitigation (CDM)
    program and agency-specific monitoring capabilities. Continuous
    monitoring provides ongoing awareness of information security
    vulnerabilities, threats, and the effectiveness of security controls
    to support risk management decisions (44 USC 3554(b)(5), OMB M-14-03).
    Agencies must automate the collection and analysis of security-related
    data, maintain near-real-time situational awareness of their security
    posture, and feed monitoring results into the agency's risk management
    process and FISMA reporting.

guidance:
  prose: >-
    OMB has shifted FISMA's emphasis from periodic assessment to continuous
    monitoring through OMB M-14-03 and subsequent guidance. The CDM
    program, managed by CISA, provides agencies with tools and dashboards
    for continuous monitoring across four capability areas: asset
    management, identity and access management, network security
    management, and data protection management. NIST SP 800-137 provides
    guidance on information security continuous monitoring. Agencies must
    develop continuous monitoring strategies that define monitoring
    frequencies, metrics, and thresholds for each security control based
    on system categorization. Continuous monitoring data feeds into
    agency-level and federal-level dashboards for real-time risk
    visibility.

references:
  - citation: "OMB M-14-03 - Enhancing the Security of Federal Information and Information Systems"
    url: "https://www.whitehouse.gov/wp-content/uploads/legacy_drupal_files/omb/memoranda/2014/m-14-03.pdf"
  - citation: "NIST SP 800-137 - Information Security Continuous Monitoring"
    url: "https://doi.org/10.6028/NIST.SP.800-137"
  - citation: "CISA Continuous Diagnostics and Mitigation (CDM) Program"
    url: "https://www.cisa.gov/cdm"
  - citation: "NIST SP 800-137A - Assessing Information Security Continuous Monitoring"
    url: "https://doi.org/10.6028/NIST.SP.800-137A"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement platform-wide continuous monitoring capabilities covering
      all four CDM capability areas. Deploy automated asset discovery and
      inventory management that maintains real-time visibility into all
      hardware and software assets. Implement continuous configuration
      assessment that compares running configurations against approved
      baselines. Deploy vulnerability scanning on continuous schedules
      (daily for critical systems, weekly for others). Integrate platform
      monitoring data with CISA CDM dashboards through standardized data
      feeds. Implement automated alerting when monitoring thresholds are
      breached, triggering remediation workflows.
    tools:
      - tenable
      - qualys
      - prometheus
      - grafana
      - open-policy-agent
      - backstage
      - openscap

  devsecops:
    prose: >-
      Embed continuous security monitoring into CI/CD pipelines through
      automated scanning at every pipeline stage. Implement dependency
      monitoring that continuously checks for newly disclosed
      vulnerabilities in deployed components. Deploy runtime application
      security monitoring that detects anomalous behavior in production
      applications. Feed pipeline security metrics into the agency's
      continuous monitoring dashboards. Automate the correlation of
      development-time findings with production monitoring data to
      identify drift between tested and deployed configurations.
    tools:
      - trivy
      - snyk
      - falco
      - gitlab-ci
      - dependabot
      - grafana

  secops:
    prose: >-
      Operate the agency's continuous monitoring program through
      centralized SIEM, vulnerability management, and compliance
      monitoring platforms. Implement automated data feeds to CISA CDM
      dashboards covering asset management, identity management, network
      security, and data protection metrics. Maintain continuous
      monitoring dashboards showing real-time security posture at
      system, mission area, and enterprise levels. Define and enforce
      monitoring thresholds that trigger automated alerts and
      remediation workflows. Generate continuous monitoring reports
      for FISMA compliance demonstrating ongoing security posture
      awareness. Track continuous monitoring maturity against NIST
      SP 800-137 guidelines.
    tools:
      - splunk
      - elastic-siem
      - tenable
      - crowdstrike
      - servicenow
      - cdm-dashboard
