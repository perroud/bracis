id: fisma-fips-200
family: categorization
title: "Minimum Security Requirements (FIPS 200)"
class: FISMA

baselines: [low, moderate, high]

statement:
  prose: >-
    Each agency shall meet the minimum security requirements for federal
    information and information systems as specified in FIPS 200
    (44 USC 3553(b)). FIPS 200 specifies minimum security requirements
    across seventeen security-related areas covering management,
    operational, and technical aspects of information security. Agencies
    must select and implement security controls from NIST SP 800-53
    that satisfy the minimum requirements, with the specific controls
    determined by the system's FIPS 199 categorization level. The
    seventeen areas include access control, awareness and training,
    audit and accountability, certification/accreditation/assessment,
    configuration management, contingency planning, identification and
    authentication, incident response, maintenance, media protection,
    physical and environmental protection, planning, personnel security,
    risk assessment, systems and services acquisition, system and
    communications protection, and system and information integrity.

guidance:
  prose: >-
    FIPS 200 bridges FIPS 199 categorization to NIST SP 800-53 control
    selection. Once a system is categorized, FIPS 200 mandates that the
    agency apply the corresponding NIST SP 800-53 baseline controls
    (low, moderate, or high). Agencies may tailor baselines through a
    documented process that includes scoping, compensating controls,
    and supplementary controls, but cannot reduce below the minimum
    baseline without documented risk acceptance by the authorizing
    official. NIST SP 800-53B provides the control baselines. The
    combination of FIPS 199 and FIPS 200 creates the mandatory minimum
    that all federal systems must meet, with agencies free to apply
    additional controls based on their specific risk assessments.

references:
  - citation: "FIPS Publication 200 - Minimum Security Requirements for Federal Information and Information Systems"
    url: "https://doi.org/10.6028/NIST.FIPS.200"
  - citation: "NIST SP 800-53B - Control Baselines for Information Systems and Organizations"
    url: "https://doi.org/10.6028/NIST.SP.800-53B"
  - citation: "NIST SP 800-53 Rev 5 - Security and Privacy Controls"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated baseline enforcement that applies the correct
      NIST SP 800-53 control set based on each system's FIPS 199
      categorization. Maintain machine-readable control baselines
      (OSCAL format) that map FIPS 200 requirements to specific
      platform configurations and policies. Deploy policy engines
      that enforce all seventeen security areas at the infrastructure
      level, preventing deployment of systems that do not meet minimum
      requirements for their categorization level. Provide common
      control implementations at the platform level (identity
      management, logging, network segmentation, encryption) that
      satisfy FIPS 200 requirements inherited by all hosted systems.
      Track baseline coverage metrics showing the percentage of
      required controls implemented for each system.
    tools:
      - open-policy-agent
      - kyverno
      - terraform
      - oscal
      - backstage
      - openscap
      - kubernetes

  devsecops:
    prose: >-
      Enforce FIPS 200 minimum security requirements through tiered
      CI/CD pipeline templates. Implement pipeline gates that validate
      compliance with all seventeen security areas before allowing
      production deployment. Automate control implementation evidence
      collection across all security areas from pipeline tools (SAST
      for system integrity, SCA for supply chain, access control
      validation for identity, etc.). Generate baseline compliance
      reports from pipeline execution data showing coverage across
      all FIPS 200 security areas. Block baseline deviations unless
      accompanied by approved tailoring documentation.
    tools:
      - gitlab-ci
      - checkov
      - inspec
      - oscal-cli
      - opa-gatekeeper
      - trivy

  secops:
    prose: >-
      Continuously assess compliance with FIPS 200 minimum requirements
      across all agency systems. Implement automated compliance scanning
      that maps assessment results to the seventeen FIPS 200 security
      areas. Generate compliance gap analysis reports showing which
      minimum requirements are not fully met for each system, prioritized
      by system categorization level. Track agency-wide FIPS 200
      compliance metrics for FISMA reporting. Alert on systems that
      fall below minimum baseline requirements due to configuration
      drift, missed patches, or expired controls.
    tools:
      - tenable
      - qualys
      - openscap
      - servicenow
      - splunk
      - archer
