id: fisma-fips-199
family: categorization
title: "System Categorization (FIPS 199)"
class: FISMA

baselines: [low, moderate, high]

statement:
  prose: >-
    Each agency shall categorize all federal information and information
    systems based on the objectives of providing appropriate levels of
    information security according to a range of risk levels, in
    accordance with standards promulgated under FIPS 199 (44 USC 3553(b)).
    Systems must be categorized based on the potential impact (low,
    moderate, or high) of a loss of confidentiality, integrity, or
    availability on organizational operations, organizational assets,
    or individuals. The overall system categorization is the high-water
    mark of the impact levels across all three security objectives for
    all information types processed, stored, or transmitted by the system.

guidance:
  prose: >-
    FIPS 199 establishes three security categories (low, moderate, high)
    for each of the three security objectives (confidentiality, integrity,
    availability). NIST SP 800-60 provides guidance on mapping information
    types to security categories. The system categorization drives all
    subsequent security decisions including control selection (FIPS 200
    and NIST SP 800-53), assessment rigor, continuous monitoring frequency,
    and authorization requirements. Categorization must be reviewed when
    significant changes occur to the system, its operational environment,
    or when new information types are introduced. The authorizing official
    must approve the system categorization as part of the authorization
    process. Incorrect categorization is one of the most common findings
    in IG assessments, as under-categorization leads to insufficient
    security controls.

references:
  - citation: "FIPS Publication 199 - Standards for Security Categorization"
    url: "https://doi.org/10.6028/NIST.FIPS.199"
  - citation: "NIST SP 800-60 Vol 1 Rev 1 - Guide for Mapping Types of Information and Information Systems to Security Categories"
    url: "https://doi.org/10.6028/NIST.SP.800-60v1r1"
  - citation: "NIST SP 800-60 Vol 2 Rev 1 - Appendices to Guide for Mapping Types"
    url: "https://doi.org/10.6028/NIST.SP.800-60v2r1"
  - citation: "CNSSI 1253 - Security Categorization and Control Selection for National Security Systems"
    url: "https://www.cnss.gov/CNSS/issuances/Instructions.cfm"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated system categorization workflows in the platform's
      service catalog. Require FIPS 199 categorization as a mandatory
      field during system registration, with guided questionnaires that
      help system owners identify information types and assess impact
      levels using NIST SP 800-60 mappings. Automatically apply
      corresponding security baselines to platform-managed systems based
      on their categorization. Tag all infrastructure resources with their
      system categorization level to enable policy enforcement proportional
      to impact level. Implement automated validation that prevents
      high-impact data from being processed on low-impact infrastructure.
    tools:
      - backstage
      - open-policy-agent
      - terraform
      - kubernetes
      - oscal

  devsecops:
    prose: >-
      Enforce categorization-appropriate security controls in CI/CD
      pipelines. Implement pipeline templates tiered by FIPS 199
      categorization that automatically include the appropriate level
      of security scanning, review requirements, and deployment
      approvals. Validate that system categorization metadata is
      maintained in version-controlled system documentation. Block
      deployments that would introduce higher-categorization data into
      lower-categorization environments. Automate categorization impact
      analysis when new data types or integrations are added to a system.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - checkov
      - oscal-cli
      - git

  secops:
    prose: >-
      Maintain and validate the agency's system categorization inventory.
      Conduct periodic reviews of system categorizations to ensure they
      remain accurate as systems evolve and new information types are
      introduced. Monitor for categorization violations where systems
      process data above their authorized categorization level. Generate
      categorization reports for FISMA reporting showing the distribution
      of agency systems across impact levels. Flag systems with
      potentially inaccurate categorizations based on observed data
      flows and usage patterns.
    tools:
      - servicenow
      - tenable
      - splunk
      - archer
      - oscal
