id: fisma-ciso
family: program
title: "Designation of Chief Information Security Officer"
class: FISMA

baselines: [low, moderate, high]

statement:
  prose: >-
    Each agency shall designate a senior agency information security officer
    (commonly referred to as the Chief Information Security Officer or CISO)
    who shall carry out the CIO's information security responsibilities under
    FISMA, possess professional qualifications and experience in information
    security, and have information security duties as the primary duty of
    that official (44 USC 3554(a)(2)). The CISO is responsible for developing
    and maintaining the agency-wide information security program, training
    and overseeing personnel with significant information security
    responsibilities, assisting senior officials with their security
    responsibilities, and reporting to the agency head on the effectiveness
    of the agency's information security program.

guidance:
  prose: >-
    FISMA requires a dedicated CISO role with authority, qualifications, and
    organizational positioning sufficient to manage the agency's security
    program effectively. The CISO must report directly to the CIO and have
    visibility into all agency information systems. OMB Circular A-130
    specifies that the CISO must coordinate with authorizing officials,
    system owners, common control providers, and information system security
    officers. The FISMA Reform Act proposals further strengthen the CISO
    role by requiring direct reporting to the agency head in certain
    circumstances and mandating specific cybersecurity qualifications.

references:
  - citation: "44 USC 3554(a)(2) - Senior Agency Information Security Officer"
    url: "https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title44-section3554"
  - citation: "OMB Circular A-130, Section 5.d"
    url: "https://www.whitehouse.gov/wp-content/uploads/legacy_drupal_files/omb/circulars/A130/a130revised.pdf"
  - citation: "NIST SP 800-100 - Information Security Handbook"
    url: "https://doi.org/10.6028/NIST.SP.800-100"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement role-based access control structures that reflect the CISO's
      authority over security governance. Configure the platform's policy
      engine to enforce CISO-approved security baselines across all managed
      systems. Provide the CISO with executive dashboards aggregating
      security posture, compliance status, risk metrics, and POA&M status
      across all platform-managed infrastructure. Automate escalation
      workflows that route critical security decisions and exceptions to
      the CISO for approval. Maintain an auditable record of all
      CISO-authorized policy exceptions and risk acceptances.
    tools:
      - backstage
      - grafana
      - open-policy-agent
      - hashicorp-vault
      - servicenow

  devsecops:
    prose: >-
      Integrate CISO-mandated security gates into all CI/CD pipelines.
      Implement approval workflows that require CISO or delegated security
      officer sign-off for high-impact deployments, security exceptions,
      and risk acceptances. Automate the generation of security metrics
      reports from pipeline execution data for CISO review. Configure
      notification channels that alert the CISO on critical security
      findings, failed compliance checks, and security incidents
      detected during builds and deployments.
    tools:
      - gitlab-ci
      - gitlab-approval-rules
      - github-actions
      - jira
      - servicenow

  secops:
    prose: >-
      Provide the CISO with unified visibility into security operations
      through executive dashboards and automated reporting. Configure SIEM
      alerting tiers that escalate critical incidents to the CISO within
      defined timeframes. Generate automated weekly and monthly security
      posture reports aligned with FISMA reporting requirements. Maintain
      audit trails of CISO-directed risk decisions, incident responses,
      and program changes. Support the CISO's annual FISMA reporting
      obligations with automated data collection from all security tools.
    tools:
      - splunk
      - elastic-siem
      - servicenow
      - powerbi
      - tableau
