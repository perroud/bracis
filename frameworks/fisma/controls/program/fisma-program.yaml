id: fisma-program
family: program
title: "Agency-Wide Information Security Program"
class: FISMA

baselines: [low, moderate, high]

statement:
  prose: >-
    Each federal agency shall develop, document, and implement an agency-wide
    information security program to provide information security for the
    information and information systems that support the operations and assets
    of the agency, including those provided or managed by another agency,
    contractor, or other source (44 USC 3554). The program must include
    protections commensurate with the risk and magnitude of harm resulting
    from unauthorized access, use, disclosure, disruption, modification, or
    destruction of information and information systems. The head of each
    agency is responsible for providing information security protections
    commensurate with the risk to organizational operations and assets.

guidance:
  prose: >-
    FISMA Section 3554 mandates that each agency head delegate authority to
    the agency CIO to ensure compliance with FISMA requirements. The
    information security program must encompass all FISMA statutory
    requirements including risk assessments, policies, subordinate plans,
    security awareness training, testing, remediation, incident response,
    and continuity of operations. OMB Circular A-130 Appendix I provides
    detailed responsibilities for agency heads, CIOs, senior agency
    information security officers, and authorizing officials. The program
    must be integrated into the agency's enterprise architecture and capital
    planning processes.

references:
  - citation: "44 USC 3554 - Federal Agency Responsibilities"
    url: "https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title44-section3554"
  - citation: "OMB Circular A-130, Appendix I"
    url: "https://www.whitehouse.gov/wp-content/uploads/legacy_drupal_files/omb/circulars/A130/a130revised.pdf"
  - citation: "NIST SP 800-39 - Managing Information Security Risk"
    url: "https://doi.org/10.6028/NIST.SP.800-39"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a centralized security governance platform that codifies
      the agency-wide information security program as policy-as-code. Use
      an internal developer portal (Backstage) to surface security program
      requirements, system inventories, and compliance status dashboards.
      Automate system registration and categorization workflows so that
      every platform component is tracked within the security program scope.
      Enforce baseline security configurations through GitOps-managed
      templates that automatically apply NIST 800-53 controls based on
      system categorization level. Maintain a machine-readable system
      inventory (OSCAL format) linked to the platform's service catalog.
    tools:
      - backstage
      - gitops
      - argocd
      - terraform
      - oscal
      - open-policy-agent

  devsecops:
    prose: >-
      Embed security program requirements into the CI/CD pipeline as
      automated policy gates. Implement pipeline templates that enforce
      mandatory security controls (vulnerability scanning, SAST, DAST,
      SCA) proportional to the system's FIPS 199 categorization. Maintain
      security program documentation in version-controlled repositories
      with automated compliance artifact generation. Use policy engines
      (OPA/Gatekeeper) to enforce program-wide security standards across
      all development and deployment activities. Automate the generation
      of System Security Plans from code-level metadata and infrastructure
      configurations.
    tools:
      - gitlab-ci
      - github-actions
      - opa-gatekeeper
      - checkov
      - trivy
      - sonarqube
      - oscal-cli

  secops:
    prose: >-
      Operate a centralized security operations center aligned with the
      agency's information security program requirements. Implement
      continuous monitoring capabilities that feed into the agency's
      risk management framework. Maintain real-time dashboards showing
      program-wide security posture across all agency systems categorized
      by FIPS 199 impact level. Generate automated compliance reports for
      OMB, Inspector General, and congressional oversight requirements.
      Integrate security operations metrics (MTTD, MTTR, vulnerability
      counts, POA&M status) into executive-level program reporting.
    tools:
      - splunk
      - elastic-siem
      - servicenow
      - tenable
      - crowdstrike
      - cyberark
