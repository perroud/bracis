id: fisma-awareness-training
family: program
title: "Security Awareness Training"
class: FISMA

baselines: [low, moderate, high]

statement:
  prose: >-
    Each agency shall provide security awareness training to inform
    personnel, including contractors and other users of information systems
    that support the operations and assets of the agency, of information
    security risks associated with their activities and their responsibilities
    in complying with agency policies and procedures designed to reduce
    these risks (44 USC 3554(b)(4)). Training must include role-based
    training for personnel with significant information security
    responsibilities, awareness of potential insider threats, and training
    on recognizing and reporting social engineering, phishing, and other
    cyber threats.

guidance:
  prose: >-
    FISMA requires both general security awareness training for all
    personnel and specialized role-based training for those with
    significant security responsibilities (system administrators, ISSOs,
    developers, authorizing officials). NIST SP 800-50 provides guidance
    on building an awareness and training program. OMB mandates annual
    security awareness training completion with tracking and reporting.
    Training content must be updated to address current threats and must
    cover the agency's specific policies and procedures. The CISO is
    responsible for overseeing the training program and reporting
    completion rates to OMB as part of annual FISMA reporting.

references:
  - citation: "44 USC 3554(b)(4) - Security Awareness Training"
    url: "https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title44-section3554"
  - citation: "NIST SP 800-50 - Building an Information Technology Security Awareness and Training Program"
    url: "https://doi.org/10.6028/NIST.SP.800-50"
  - citation: "NIST SP 800-53 Rev 5, AT Family"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"

implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate security training requirements into platform access
      controls, requiring completion of role-appropriate training before
      granting access to systems at each categorization level. Implement
      automated training status verification through identity provider
      attribute checks that gate platform access on current training
      completion. Provide platform-specific security training modules
      covering secure development on the platform, infrastructure-as-code
      security practices, and platform security features. Track training
      completion metrics through the internal developer portal and
      generate compliance reports for FISMA reporting.
    tools:
      - backstage
      - keycloak
      - okta
      - knowbe4
      - lms

  devsecops:
    prose: >-
      Require completion of secure development training before granting
      commit access to production-bound repositories. Embed just-in-time
      security training into the development workflow by providing
      contextual security guidance when pipeline security checks fail.
      Implement automated phishing simulation and social engineering
      awareness campaigns targeting development teams. Track developer
      security training metrics including training completion, security
      finding remediation rates, and pipeline failure resolution times
      as indicators of security competency.
    tools:
      - gitlab-ci
      - knowbe4
      - secure-code-warrior
      - snyk-learn
      - lms

  secops:
    prose: >-
      Monitor and report on agency-wide training completion rates for
      FISMA annual reporting. Track training effectiveness through
      correlation with security incident rates, phishing simulation
      results, and policy violation frequencies. Generate automated
      compliance reports showing training completion by organizational
      unit, role, and system access level. Implement escalation workflows
      for personnel who have not completed required training within
      defined timeframes. Maintain evidence of training program
      effectiveness for Inspector General assessments.
    tools:
      - servicenow
      - knowbe4
      - splunk
      - powerbi
      - lms
