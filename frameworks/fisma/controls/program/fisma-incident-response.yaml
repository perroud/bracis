id: fisma-incident-response
family: program
title: "Incident Response Procedures"
class: FISMA

baselines: [low, moderate, high]

statement:
  prose: >-
    Each agency shall develop and implement procedures for detecting,
    reporting, and responding to security incidents, consistent with
    standards and guidelines issued by NIST, including notification
    procedures for breaches of personally identifiable information
    (44 USC 3554(b)(7)). Agencies must notify the federal information
    security incident center (US-CERT/CISA) of any incident, implement
    mitigations, preserve evidence, and report incident details as
    required by OMB and CISA incident reporting guidelines. Major
    incidents must be reported to Congress within 7 days.

guidance:
  prose: >-
    FISMA incident response requirements are supplemented by NIST SP
    800-61 (Incident Handling Guide), OMB M-17-12 (Preparing for and
    Responding to a Breach of PII), and CISA's Federal Incident
    Notification Guidelines. Agencies must maintain incident response
    plans, establish incident response teams, and conduct regular
    incident response exercises. The 2014 FISMA amendments introduced
    mandatory breach notification requirements including reporting to
    affected individuals, Congress, and the public for major incidents
    involving PII. CISA operates the federal incident reporting portal
    and provides technical assistance to agencies during incidents.

references:
  - citation: "44 USC 3554(b)(7) - Incident Response Procedures"
    url: "https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title44-section3554"
  - citation: "NIST SP 800-61 Rev 2 - Computer Security Incident Handling Guide"
    url: "https://doi.org/10.6028/NIST.SP.800-61r2"
  - citation: "OMB M-17-12 - Preparing for and Responding to a Breach of PII"
    url: "https://www.whitehouse.gov/wp-content/uploads/legacy_drupal_files/omb/memoranda/2017/m-17-12_0.pdf"
  - citation: "CISA Federal Incident Notification Guidelines"
    url: "https://www.cisa.gov/incident-notification-guidelines"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated incident detection capabilities across the
      platform infrastructure using anomaly detection, intrusion
      detection systems, and security monitoring. Deploy platform-level
      incident response automation including automated containment
      actions (network isolation, account suspension, workload
      quarantine) triggered by detection rules. Maintain forensic
      readiness through centralized immutable logging, network traffic
      capture capabilities, and snapshot/backup automation. Integrate
      platform alerting with the agency's incident response ticketing
      system and CISA reporting workflows. Implement automated evidence
      preservation and chain-of-custody documentation.
    tools:
      - falco
      - crowdstrike
      - kubernetes
      - terraform
      - velero
      - backstage
      - pagerduty

  devsecops:
    prose: >-
      Embed incident detection capabilities into CI/CD pipelines
      including detection of compromised dependencies, unauthorized
      code changes, and credential exposure. Implement automated
      incident response playbooks for common development-related
      incidents (secret exposure, compromised packages, supply chain
      attacks). Maintain incident response runbooks in version control
      alongside application code. Automate rollback procedures for
      rapid recovery when security incidents affect production
      deployments. Integrate SAST/SCA findings with incident response
      workflows when critical zero-day vulnerabilities are disclosed.
    tools:
      - gitlab-ci
      - gitleaks
      - trivy
      - snyk
      - pagerduty
      - opsgenie

  secops:
    prose: >-
      Operate the agency's security incident response capability
      through a centralized SOC with defined procedures for detection,
      analysis, containment, eradication, and recovery. Implement SIEM
      correlation rules and automated alerting for security incidents
      aligned with CISA incident categories. Maintain automated CISA
      reporting workflows that generate incident notifications within
      required timeframes (1 hour for major incidents per BOD 22-01).
      Conduct regular incident response exercises (tabletop, functional,
      full-scale) and update procedures based on lessons learned. Track
      incident metrics including MTTD, MTTR, incident volumes by
      category, and reporting compliance rates.
    tools:
      - splunk
      - elastic-siem
      - crowdstrike
      - pagerduty
      - servicenow
      - thehive
      - misp
