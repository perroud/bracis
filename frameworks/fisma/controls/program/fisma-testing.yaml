id: fisma-testing
family: program
title: "Periodic Testing and Evaluation of Controls"
class: FISMA

baselines: [low, moderate, high]

statement:
  prose: >-
    Each agency shall perform periodic testing and evaluation of the
    effectiveness of information security policies, procedures, and
    practices, to be performed with a frequency depending on risk, but
    no less than annually, including testing of management, operational,
    and technical controls of every information system identified in the
    agency inventory (44 USC 3554(b)(5)). Testing must include assessment
    of security controls as defined in NIST SP 800-53A, penetration
    testing, and vulnerability assessments commensurate with the system's
    categorization level.

guidance:
  prose: >-
    FISMA requires testing at minimum annually, but risk-based frequency
    may require more frequent testing for high-impact systems. NIST SP
    800-53A provides the assessment procedures for each NIST SP 800-53
    control. Testing includes both automated and manual assessment methods:
    examine (review documentation), interview (discuss with responsible
    personnel), and test (exercise controls). OMB has increasingly
    emphasized continuous monitoring and automated assessment as
    complements to periodic manual assessments. Results must feed into
    the POA&M process and inform authorization decisions. Independent
    assessors should be used for authorization assessments per NIST
    SP 800-37.

references:
  - citation: "44 USC 3554(b)(5) - Periodic Testing and Evaluation"
    url: "https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title44-section3554"
  - citation: "NIST SP 800-53A Rev 5 - Assessing Security and Privacy Controls"
    url: "https://doi.org/10.6028/NIST.SP.800-53Ar5"
  - citation: "NIST SP 800-115 - Technical Guide to Information Security Testing"
    url: "https://doi.org/10.6028/NIST.SP.800-115"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement continuous automated security control testing across the
      platform using compliance-as-code frameworks. Deploy automated
      configuration assessment tools that validate NIST 800-53 control
      implementations against expected baselines on a continuous basis.
      Schedule periodic penetration testing of platform infrastructure
      and shared services. Automate evidence collection for control
      assessments by generating machine-readable assessment results
      (OSCAL Assessment Results format). Maintain a testing calendar
      that ensures all platform systems are assessed at the frequency
      required by their FIPS 199 categorization.
    tools:
      - inspec
      - openscap
      - oscal
      - tenable
      - terraform
      - open-policy-agent

  devsecops:
    prose: >-
      Integrate automated security testing into every stage of the CI/CD
      pipeline: SAST during code commit, SCA during build, container
      scanning during image creation, DAST during staging deployment,
      and compliance scanning during production deployment. Implement
      scheduled penetration testing pipelines that exercise application
      attack surfaces. Generate assessment evidence artifacts from
      pipeline security tool outputs in formats suitable for FISMA
      compliance reporting. Track testing coverage metrics to ensure
      all controls applicable to each system are tested within required
      timeframes.
    tools:
      - sonarqube
      - trivy
      - zap
      - burpsuite
      - gitlab-ci
      - inspec
      - checkov

  secops:
    prose: >-
      Coordinate periodic security control assessments across agency
      systems, tracking assessment schedules, findings, and remediation
      activities. Conduct vulnerability assessments and penetration
      testing at frequencies aligned with system categorization levels.
      Maintain a centralized assessment findings database that feeds
      into POA&M creation. Generate testing and evaluation reports for
      FISMA annual reporting, including control effectiveness metrics,
      assessment coverage, and year-over-year trend analysis. Coordinate
      with independent assessors for authorization-level assessments.
    tools:
      - tenable
      - qualys
      - burpsuite
      - cobalt
      - servicenow
      - splunk
