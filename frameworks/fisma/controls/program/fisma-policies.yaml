id: fisma-policies
family: program
title: "Risk-Based Policies and Procedures"
class: FISMA

baselines: [low, moderate, high]

statement:
  prose: >-
    Each agency shall develop, document, and implement policies and procedures
    that are based on risk assessments and that cost-effectively reduce
    information security risks to an acceptable level, ensuring that
    information security is addressed throughout the life cycle of each
    agency information system (44 USC 3554(b)(2)). Policies must address
    all applicable NIST SP 800-53 control families and be reviewed and
    updated at least annually or when significant changes occur to the
    threat environment or agency information systems.

guidance:
  prose: >-
    FISMA requires policies and procedures to be risk-based, not merely
    compliance-driven. Policies must cover all 20 NIST SP 800-53 control
    families and be tailored to the agency's specific mission, threat
    profile, and system categorizations. OMB Circular A-130 requires
    agencies to maintain current security and privacy policies that are
    consistent with applicable laws, executive orders, directives, and
    NIST guidelines. Policies must be disseminated to all affected
    personnel and contractors, and procedures must be sufficiently detailed
    to implement the policies. The CISO is responsible for ensuring
    policies remain current and aligned with the agency's risk posture.

references:
  - citation: "44 USC 3554(b)(2) - Policies and Procedures"
    url: "https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title44-section3554"
  - citation: "OMB Circular A-130, Appendix I, Section 4"
    url: "https://www.whitehouse.gov/wp-content/uploads/legacy_drupal_files/omb/circulars/A130/a130revised.pdf"
  - citation: "NIST SP 800-53 Rev 5, PL Family"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"

implementation_guidance:
  platform_engineering:
    prose: >-
      Codify security policies as machine-enforceable rules using policy
      engines (OPA/Rego, Kyverno). Maintain all security policies in
      version-controlled repositories with automated change tracking,
      review workflows, and approval gates. Implement a policy hierarchy
      that maps organizational policies to platform-level enforcement
      rules, ensuring every NIST 800-53 control family has corresponding
      technical enforcement where applicable. Use GitOps to deploy policy
      changes across the platform with full audit trails. Provide a
      self-service portal where development teams can view applicable
      policies and their current compliance status.
    tools:
      - open-policy-agent
      - kyverno
      - gitops
      - argocd
      - backstage
      - terraform

  devsecops:
    prose: >-
      Enforce security policies as automated pipeline gates that validate
      code, configurations, and deployments against documented policy
      requirements. Implement policy-as-code templates for each NIST
      800-53 control family that can be applied to CI/CD pipelines based
      on system categorization. Automate policy compliance evidence
      generation from pipeline execution logs. Maintain policy documents
      alongside code in version control with mandatory review processes
      for policy changes. Generate policy deviation reports that identify
      systems or components operating outside approved policy boundaries.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - checkov
      - conftest
      - git
      - markdown-lint

  secops:
    prose: >-
      Monitor compliance with security policies through continuous
      automated assessment. Configure SIEM correlation rules and
      compliance scanners to detect policy violations in real time.
      Generate periodic policy compliance reports showing adherence rates
      by system, control family, and organizational unit. Track policy
      exceptions and waivers with expiration dates and mandatory review
      cycles. Support the annual policy review cycle by providing
      security operations data on policy effectiveness, violation trends,
      and areas requiring policy updates.
    tools:
      - splunk
      - elastic-siem
      - tenable
      - servicenow
      - archer
