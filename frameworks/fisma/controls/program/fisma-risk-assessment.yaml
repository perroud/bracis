id: fisma-risk-assessment
family: program
title: "Periodic Risk Assessments"
class: FISMA

baselines: [low, moderate, high]

statement:
  prose: >-
    Each agency shall provide information security protections commensurate
    with the risk and magnitude of the harm resulting from unauthorized
    access, use, disclosure, disruption, modification, or destruction of
    information collected or maintained by or on behalf of the agency, and
    information systems used or operated by an agency or by a contractor
    of an agency (44 USC 3554(a)(1)). Agencies must perform periodic risk
    assessments that consider internal and external threats to the
    confidentiality, integrity, and availability of agency information
    systems, and determine the potential impact of identified risks on
    agency operations, assets, and individuals.

guidance:
  prose: >-
    FISMA requires risk assessments to be conducted periodically, not just
    at system authorization time. NIST SP 800-30 provides the methodology
    for conducting risk assessments, while NIST SP 800-39 establishes the
    multi-tiered risk management framework (organization, mission/business
    process, and information system tiers). Risk assessments must consider
    the current threat landscape, known vulnerabilities, existing controls,
    and the likelihood and impact of threat exploitation. Results feed
    directly into the agency's risk management decisions, control selection,
    and POA&M processes. OMB Circular A-130 requires agencies to integrate
    risk management into the system development life cycle.

references:
  - citation: "44 USC 3554(a)(1) - Risk-Based Protections"
    url: "https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title44-section3554"
  - citation: "NIST SP 800-30 Rev 1 - Guide for Conducting Risk Assessments"
    url: "https://doi.org/10.6028/NIST.SP.800-30r1"
  - citation: "NIST SP 800-39 - Managing Information Security Risk"
    url: "https://doi.org/10.6028/NIST.SP.800-39"
  - citation: "NIST SP 800-37 Rev 2 - Risk Management Framework"
    url: "https://doi.org/10.6028/NIST.SP.800-37r2"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated risk assessment capabilities integrated into
      the platform lifecycle. Deploy vulnerability management tools that
      continuously scan all platform components and map findings to risk
      levels based on FIPS 199 categorization. Automate threat modeling
      for platform services using infrastructure-as-code analysis to
      identify attack surfaces, trust boundaries, and data flows. Maintain
      a risk register as a version-controlled artifact that tracks
      identified risks, their scores (likelihood x impact), mitigations,
      and residual risk levels. Integrate risk assessment outputs with
      the platform's policy engine to automatically adjust security
      controls based on current risk posture.
    tools:
      - tenable
      - qualys
      - terraform
      - open-policy-agent
      - threatmodeler
      - backstage
      - oscal

  devsecops:
    prose: >-
      Embed risk assessment practices into the CI/CD pipeline through
      automated vulnerability scanning (SAST, DAST, SCA, container
      scanning) with risk scoring aligned to NIST SP 800-30 methodology.
      Implement pipeline gates that block deployments when risk thresholds
      are exceeded based on system categorization. Automate threat modeling
      as part of the design review process for new features and
      architectural changes. Generate risk assessment artifacts from
      pipeline execution data including vulnerability trends, remediation
      velocity, and residual risk metrics. Integrate with the agency's
      risk register to automatically create and update risk entries from
      automated findings.
    tools:
      - trivy
      - grype
      - sonarqube
      - zap
      - checkov
      - tfsec
      - gitlab-ci

  secops:
    prose: >-
      Conduct periodic risk assessments using automated data collection
      from vulnerability scanners, SIEM, and threat intelligence feeds.
      Correlate vulnerability data with threat intelligence to produce
      risk scores reflecting the current threat landscape. Maintain
      real-time risk dashboards showing risk levels by system, mission
      area, and FIPS 199 impact level. Automate risk assessment reporting
      for authorizing officials and the CISO. Track risk trends over time
      to identify systemic weaknesses in the agency's security posture.
      Feed risk assessment results into POA&M creation and prioritization
      workflows.
    tools:
      - tenable
      - qualys
      - splunk
      - elastic-siem
      - servicenow
      - mitre-attack
