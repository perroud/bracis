id: fisma-remediation
family: program
title: "Remediation Process for Deficiencies"
class: FISMA

baselines: [low, moderate, high]

statement:
  prose: >-
    Each agency shall implement a process for planning, implementing,
    evaluating, and documenting remedial action to address any deficiencies
    in the information security policies, procedures, and practices of the
    agency (44 USC 3554(b)(6)). This includes establishing Plans of Action
    and Milestones (POA&Ms) for all identified weaknesses, tracking
    remediation progress, and ensuring timely closure of identified
    deficiencies. Remediation activities must be prioritized based on risk
    and the potential impact to agency operations.

guidance:
  prose: >-
    The remediation process is closely tied to the POA&M requirement.
    NIST SP 800-37 defines POA&M as a key document in the Risk Management
    Framework. Agencies must establish remediation timelines based on the
    severity of the deficiency and the categorization of the affected
    system. OMB requires agencies to report POA&M status as part of
    FISMA reporting, including the number of open weaknesses, their
    severity, and remediation timelines. Inspector General annual
    assessments evaluate the effectiveness of the agency's remediation
    process. Deficiencies found during testing, continuous monitoring,
    and incident response must all feed into the remediation process.

references:
  - citation: "44 USC 3554(b)(6) - Remedial Action"
    url: "https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title44-section3554"
  - citation: "OMB Memorandum M-02-01 - Guidance for Preparing POA&Ms"
    url: "https://www.whitehouse.gov/wp-content/uploads/legacy_drupal_files/omb/memoranda/m02-01.pdf"
  - citation: "NIST SP 800-37 Rev 2, Chapter 3 - POA&M"
    url: "https://doi.org/10.6028/NIST.SP.800-37r2"

implementation_guidance:
  platform_engineering:
    prose: >-
      Automate the creation and tracking of remediation items from security
      findings. Integrate vulnerability scanner outputs with the platform's
      issue tracking system to automatically generate POA&M entries with
      severity-based due dates. Implement automated remediation where
      possible through self-healing infrastructure configurations that
      drift-correct back to approved baselines. Provide platform-level
      remediation dashboards showing open deficiencies by severity,
      system, and age. Enforce remediation SLAs through automated
      escalation workflows when deficiencies exceed their target
      remediation dates.
    tools:
      - servicenow
      - jira
      - terraform
      - argocd
      - backstage
      - open-policy-agent

  devsecops:
    prose: >-
      Integrate remediation workflows into the development lifecycle by
      automatically creating tracked issues from pipeline security
      findings. Implement severity-based remediation SLAs that gate
      deployments when critical or high findings exceed defined
      remediation windows. Automate POA&M entry creation from CI/CD
      security scan results, including vulnerability details, affected
      components, and recommended remediation actions. Track remediation
      velocity metrics (mean time to remediate by severity) across
      development teams. Provide developers with automated remediation
      guidance and fix suggestions within their development environment.
    tools:
      - gitlab-ci
      - jira
      - servicenow
      - trivy
      - snyk
      - sonarqube

  secops:
    prose: >-
      Manage the agency-wide remediation process through centralized
      POA&M tracking and reporting. Prioritize remediation activities
      based on risk scores derived from vulnerability severity, system
      categorization, and threat intelligence. Generate automated POA&M
      status reports for OMB, Inspector General, and CISO review.
      Track remediation metrics including total open POA&Ms, overdue
      items, mean time to remediate, and closure rates. Escalate
      overdue high-severity findings to authorizing officials for
      risk acceptance decisions.
    tools:
      - servicenow
      - tenable
      - splunk
      - archer
      - powerbi
