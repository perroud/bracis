id: fisma-continuity
family: program
title: "Continuity of Operations Plans"
class: FISMA

baselines: [low, moderate, high]

statement:
  prose: >-
    Each agency shall develop and maintain plans and procedures to ensure
    continuity of operations for information systems that support the
    operations and assets of the agency (44 USC 3554(b)(8)). Continuity
    plans must address system resilience, backup and recovery capabilities,
    alternate processing sites, and restoration priorities based on the
    system's FIPS 199 categorization and mission criticality. Plans must
    be tested at least annually and updated to reflect changes in the
    agency's IT infrastructure and mission requirements.

guidance:
  prose: >-
    FISMA continuity requirements align with NIST SP 800-34 (Contingency
    Planning Guide) and Federal Continuity Directives (FCD 1, FCD 2).
    Continuity of operations planning must address both information system
    contingency planning (technical recovery) and broader mission
    continuity. Plans must define recovery time objectives (RTOs) and
    recovery point objectives (RPOs) based on business impact analysis.
    Testing must validate that systems can be recovered within defined
    RTOs/RPOs. For high-impact systems, plans must include alternate
    processing site capabilities and real-time or near-real-time
    replication. OMB Circular A-130 requires integration of contingency
    planning into the system development lifecycle.

references:
  - citation: "44 USC 3554(b)(8) - Continuity of Operations"
    url: "https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title44-section3554"
  - citation: "NIST SP 800-34 Rev 1 - Contingency Planning Guide"
    url: "https://doi.org/10.6028/NIST.SP.800-34r1"
  - citation: "Federal Continuity Directive 1 (FCD 1)"
    url: "https://www.fema.gov/sites/default/files/2020-10/federal-continuity-directive1_june2017.pdf"
  - citation: "NIST SP 800-53 Rev 5, CP Family"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement platform-level high availability and disaster recovery
      capabilities using multi-region or multi-zone deployments. Automate
      backup and replication for all platform data stores with RPOs
      defined by system categorization (near-zero for high-impact,
      daily for low-impact). Deploy infrastructure-as-code for alternate
      processing site provisioning, enabling rapid standup of recovery
      environments. Implement automated failover mechanisms for critical
      platform services. Conduct regular DR testing through chaos
      engineering practices and automated failover drills. Document
      platform recovery procedures as runbooks in the service catalog.
    tools:
      - terraform
      - kubernetes
      - velero
      - argocd
      - crossplane
      - litmus-chaos

  devsecops:
    prose: >-
      Implement automated backup and recovery validation in CI/CD
      pipelines. Test disaster recovery procedures as part of the
      deployment pipeline by validating backup integrity and restore
      capabilities. Maintain infrastructure-as-code for rapid
      environment reconstruction. Implement blue-green and canary
      deployment strategies that enable rapid rollback during
      incidents. Automate the generation of continuity documentation
      from infrastructure configurations. Include DR testing
      scenarios in regular pipeline execution schedules.
    tools:
      - terraform
      - gitlab-ci
      - argocd
      - velero
      - kubernetes
      - helm

  secops:
    prose: >-
      Monitor backup and replication health across all agency systems.
      Validate that RPOs and RTOs are being met through automated
      monitoring and alerting. Coordinate annual continuity testing
      exercises across agency systems, documenting results and
      remediation actions for identified gaps. Track continuity
      readiness metrics including backup success rates, replication
      lag, DR test results, and time-to-recovery. Generate continuity
      status reports for FISMA annual reporting and Inspector General
      assessments.
    tools:
      - servicenow
      - splunk
      - zerto
      - veeam
      - pagerduty
