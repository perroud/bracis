id: fisma-subordinate-plans
family: program
title: "Subordinate Plans for Adequate Security"
class: FISMA

baselines: [low, moderate, high]

statement:
  prose: >-
    Each agency shall develop, document, and implement subordinate plans
    for providing adequate security for networks, facilities, and systems
    or groups of information systems, as appropriate (44 USC 3554(b)(3)).
    Subordinate plans must be consistent with the agency-wide information
    security program and address the specific security requirements of
    individual systems or groups of systems based on their FIPS 199
    categorization. Each plan must document the security controls selected,
    implemented, and planned for the information system, including the
    security categorization, system boundary, and interconnections.

guidance:
  prose: >-
    Subordinate plans are typically realized as System Security Plans (SSPs)
    for individual systems or common control packages for shared security
    capabilities. NIST SP 800-18 provides guidance on developing system
    security plans. Each plan must document the system environment, security
    categorization rationale, selected controls (from NIST SP 800-53),
    implementation status, and planned milestones for incomplete controls.
    Plans must be reviewed and updated at least annually or upon significant
    system or environmental changes. Authorizing officials must approve
    subordinate plans as part of the authorization process defined in
    NIST SP 800-37.

references:
  - citation: "44 USC 3554(b)(3) - Subordinate Plans"
    url: "https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title44-section3554"
  - citation: "NIST SP 800-18 Rev 1 - Guide for Developing Security Plans"
    url: "https://doi.org/10.6028/NIST.SP.800-18r1"
  - citation: "NIST SP 800-37 Rev 2 - Risk Management Framework"
    url: "https://doi.org/10.6028/NIST.SP.800-37r2"

implementation_guidance:
  platform_engineering:
    prose: >-
      Generate System Security Plans automatically from platform metadata,
      infrastructure-as-code configurations, and policy enforcement data.
      Maintain SSPs as machine-readable OSCAL artifacts in version-controlled
      repositories, enabling automated validation and continuous updates.
      Implement a platform service catalog that links each managed system
      to its SSP, categorization level, authorizing official, and current
      authorization status. Automate the identification and documentation
      of system boundaries, data flows, and interconnections from
      infrastructure topology. Provide common control inheritance
      documentation for platform-provided security capabilities (identity,
      logging, network segmentation) that subordinate systems can reference.
    tools:
      - oscal
      - backstage
      - terraform
      - gitops
      - argocd
      - kubernetes

  devsecops:
    prose: >-
      Automate SSP generation from CI/CD pipeline metadata, including
      control implementation evidence derived from automated security
      testing results. Implement templates for subordinate plans that
      auto-populate system boundary, technology stack, and control
      implementation details from code repositories and deployment
      configurations. Maintain SSP content as code artifacts that are
      updated automatically when infrastructure or application changes
      are deployed. Generate control implementation narratives from
      pipeline configurations and security scan results.
    tools:
      - oscal-cli
      - gitlab-ci
      - terraform
      - checkov
      - git
      - markdown

  secops:
    prose: >-
      Validate subordinate plans against actual system configurations
      through continuous monitoring and automated compliance assessment.
      Generate deviation reports comparing documented SSP controls against
      observed system behavior. Track SSP review and update cycles with
      automated reminders for annual reviews. Maintain a centralized
      inventory of all agency SSPs with their authorization status,
      review dates, and responsible officials. Feed continuous monitoring
      data into SSP updates to keep plans current with actual security
      posture.
    tools:
      - tenable
      - servicenow
      - splunk
      - archer
      - oscal
