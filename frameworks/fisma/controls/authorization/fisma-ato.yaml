id: fisma-ato
family: authorization
title: "Authorization to Operate (ATO) Process"
class: FISMA

baselines: [low, moderate, high]

statement:
  prose: >-
    Each agency shall ensure that all information systems have a current
    authorization to operate granted by an authorized senior official
    (the Authorizing Official) before being placed into operation, and
    that authorization is maintained through ongoing monitoring
    (44 USC 3554(a)(2)(B), OMB Circular A-130). The authorization
    process requires security categorization, control selection and
    implementation, security assessment by an independent assessor,
    risk determination, and a formal authorization decision documented
    in an Authorization to Operate letter. Authorizations must be
    reviewed and reauthorized at least every three years or when
    significant changes occur to the system or its operating environment.

guidance:
  prose: >-
    The ATO process follows the NIST Risk Management Framework (RMF)
    defined in NIST SP 800-37. The RMF consists of seven steps:
    Prepare, Categorize, Select, Implement, Assess, Authorize, and
    Monitor. The Authorizing Official (AO) is a senior official with
    the authority to accept risk on behalf of the agency. OMB has
    encouraged agencies to adopt ongoing authorization approaches
    where continuous monitoring data supports real-time risk decisions
    rather than relying solely on periodic reauthorization. The
    authorization package includes the System Security Plan, Security
    Assessment Report, and Plan of Action and Milestones. Systems
    operating without a valid ATO are in violation of FISMA and
    represent unaccepted risk to the agency.

references:
  - citation: "44 USC 3554(a)(2)(B) - Authorization of Information Systems"
    url: "https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title44-section3554"
  - citation: "NIST SP 800-37 Rev 2 - Risk Management Framework"
    url: "https://doi.org/10.6028/NIST.SP.800-37r2"
  - citation: "OMB Circular A-130, Appendix I, Section 5"
    url: "https://www.whitehouse.gov/wp-content/uploads/legacy_drupal_files/omb/circulars/A130/a130revised.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a platform-level authorization management system that
      tracks the ATO status of all hosted systems. Automate authorization
      package generation by assembling SSPs, assessment results, and
      POA&Ms from platform telemetry and compliance monitoring data.
      Enforce authorization boundaries through infrastructure isolation
      (namespaces, network policies, service mesh) that maps to documented
      system boundaries. Implement automated controls that prevent
      deployment of systems without valid ATO status. Support ongoing
      authorization by providing continuous monitoring data feeds to
      authorizing officials through real-time security posture dashboards.
      Automate reauthorization workflows with alerts at defined intervals
      before ATO expiration.
    tools:
      - backstage
      - kubernetes
      - istio
      - terraform
      - oscal
      - open-policy-agent
      - servicenow

  devsecops:
    prose: >-
      Integrate authorization lifecycle management into CI/CD workflows.
      Automate the generation of authorization artifacts (SSP, SAR,
      POA&M) from pipeline execution data, security scan results, and
      infrastructure configurations. Implement pipeline gates that
      validate ATO status before allowing production deployments.
      Support ongoing authorization by continuously generating
      assessment evidence from automated testing. Automate change
      impact analysis that identifies when code or configuration
      changes constitute significant changes requiring reauthorization.
      Maintain authorization documentation as code artifacts in version
      control with automated review and approval workflows.
    tools:
      - gitlab-ci
      - oscal-cli
      - checkov
      - inspec
      - terraform
      - git

  secops:
    prose: >-
      Manage the agency-wide authorization inventory, tracking ATO
      status, expiration dates, authorizing officials, and continuous
      monitoring compliance for all systems. Implement automated alerts
      for pending ATO expirations, triggering reauthorization workflows.
      Provide authorizing officials with risk dashboards showing the
      current security posture of systems under their authority.
      Coordinate security assessments with independent assessors and
      track assessment findings through remediation. Support ongoing
      authorization by feeding continuous monitoring data into
      authorization decision workflows. Generate authorization status
      reports for FISMA annual reporting.
    tools:
      - servicenow
      - archer
      - tenable
      - splunk
      - oscal
      - powerbi
