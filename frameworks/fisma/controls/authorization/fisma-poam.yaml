id: fisma-poam
family: authorization
title: "Plan of Action and Milestones (POA&M)"
class: FISMA

baselines: [low, moderate, high]

statement:
  prose: >-
    Each agency shall maintain Plans of Action and Milestones (POA&Ms)
    for all information systems that document the identified weaknesses,
    the planned remediation actions, the responsible parties, the
    milestones with scheduled completion dates, and the resources
    required to address the weaknesses (OMB M-02-01, 44 USC 3554(b)(6)).
    POA&Ms must be updated at least quarterly and must include all
    weaknesses identified through security assessments, continuous
    monitoring, audits, and incident response activities. Agencies
    must track POA&M items to closure and report aggregate POA&M
    statistics as part of FISMA annual reporting.

guidance:
  prose: >-
    OMB M-02-01 established the POA&M requirement and format. POA&Ms
    are a key component of the authorization package and the agency's
    risk management process. Each POA&M item must include: the weakness
    identified, the point of contact responsible for remediation, the
    planned remediation actions, the scheduled completion date, the
    actual completion date (when resolved), milestones, the source of
    the finding (assessment, scan, audit, incident), the severity or
    risk level, and the estimated cost of remediation. Authorizing
    officials must review POA&Ms and accept the risk of any unresolved
    weaknesses. OMB uses aggregate POA&M data to assess agency
    cybersecurity program effectiveness. Persistent overdue POA&M
    items indicate systemic weaknesses in the agency's remediation
    process.

references:
  - citation: "OMB M-02-01 - Guidance for Preparing and Submitting Security Plans of Action and Milestones"
    url: "https://www.whitehouse.gov/wp-content/uploads/legacy_drupal_files/omb/memoranda/m02-01.pdf"
  - citation: "NIST SP 800-37 Rev 2, Section 3.4 - Plan of Action and Milestones"
    url: "https://doi.org/10.6028/NIST.SP.800-37r2"
  - citation: "44 USC 3554(b)(6) - Remedial Action"
    url: "https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title44-section3554"

implementation_guidance:
  platform_engineering:
    prose: >-
      Automate POA&M creation and lifecycle management from platform
      security findings. Integrate vulnerability scanners, compliance
      assessment tools, and security monitoring systems with a
      centralized POA&M tracking system that automatically creates
      entries with severity-based due dates. Implement POA&M dashboards
      showing open items by system, severity, age, and responsible party.
      Automate quarterly POA&M reporting and status updates from
      remediation tracking systems. Enforce POA&M review workflows
      that route items to authorizing officials for risk acceptance
      when remediation timelines are exceeded. Track POA&M closure
      velocity as a platform security maturity metric.
    tools:
      - servicenow
      - jira
      - backstage
      - tenable
      - grafana
      - terraform

  devsecops:
    prose: >-
      Automate POA&M entry creation from CI/CD pipeline security
      findings. Map pipeline security scan results (vulnerabilities,
      misconfigurations, code quality findings) to POA&M entries with
      appropriate severity, responsible parties, and remediation
      milestones. Implement automated POA&M status updates when
      remediation is verified through subsequent pipeline executions.
      Track POA&M metrics per development team including open items,
      overdue items, and mean time to close. Integrate POA&M tracking
      with development sprint planning to ensure security remediation
      is prioritized alongside feature development.
    tools:
      - gitlab-ci
      - jira
      - servicenow
      - trivy
      - sonarqube
      - snyk

  secops:
    prose: >-
      Manage the agency-wide POA&M process through centralized tracking
      and reporting. Aggregate POA&M data from all agency systems and
      security tools into a single authoritative repository. Generate
      quarterly POA&M status reports for the CISO and authorizing
      officials. Track POA&M metrics including total open items by
      severity, overdue items, aging analysis, closure rates, and
      time-to-remediate distributions. Escalate overdue high-severity
      POA&M items to authorizing officials for risk acceptance or
      resource allocation decisions. Compile aggregate POA&M statistics
      for FISMA annual reporting and IG assessment support.
    tools:
      - servicenow
      - archer
      - splunk
      - tenable
      - powerbi
