baselines:
  - id: low
    title: "FISMA Low Impact"
    description: >-
      Applies to federal information systems categorized as low impact under
      FIPS 199. The loss of confidentiality, integrity, or availability would
      have a limited adverse effect on organizational operations, assets, or
      individuals. Agencies must implement the minimum security requirements
      defined in FIPS 200 and the corresponding NIST SP 800-53 Low baseline
      controls.
    impact_level: low
    source: "FIPS 199 / FIPS 200 / NIST SP 800-53 Low Baseline"
  - id: moderate
    title: "FISMA Moderate Impact"
    description: >-
      Applies to federal information systems categorized as moderate impact
      under FIPS 199. The loss of confidentiality, integrity, or availability
      would have a serious adverse effect on organizational operations, assets,
      or individuals. This is the most common categorization across federal
      agencies. Agencies must implement NIST SP 800-53 Moderate baseline
      controls.
    impact_level: moderate
    source: "FIPS 199 / FIPS 200 / NIST SP 800-53 Moderate Baseline"
    inherits_from: [low]
  - id: high
    title: "FISMA High Impact"
    description: >-
      Applies to federal information systems categorized as high impact under
      FIPS 199. The loss of confidentiality, integrity, or availability would
      have a severe or catastrophic adverse effect on organizational operations,
      assets, or individuals. Includes national security systems, law enforcement,
      emergency services, and critical infrastructure. Agencies must implement
      NIST SP 800-53 High baseline controls.
    impact_level: high
    source: "FIPS 199 / FIPS 200 / NIST SP 800-53 High Baseline"
    inherits_from: [moderate]

