control_families:
  - id: cap-1
    title: "Disposições Gerais"
    description: "Objeto e âmbito de aplicação do decreto que regulamenta o Marco Civil da Internet"
    articles: "art. 1º ao art. 2º"
    control_count: 2
  - id: cap-2
    title: "Neutralidade de Rede"
    description: "Requisitos técnicos para discriminação de pacotes, priorização de serviços de emergência, ofertas comerciais e transparência no gerenciamento de tráfego"
    articles: "art. 3º ao art. 9º"
    control_count: 7
  - id: cap-3
    title: "Proteção aos Registros, aos Dados Pessoais e às Comunicações Privadas"
    description: "Padrões de segurança e sigilo para guarda de registros, anonimização de dados pessoais, dados cadastrais e retenção"
    articles: "art. 11 ao art. 15"
    control_count: 5
  - id: cap-4
    title: "Fiscalização e Transparência"
    description: "Requisição de registros por autoridades, competências de fiscalização da ANATEL, Senacon e SBDC, e relatórios de transparência"
    articles: "art. 17 ao art. 19"
    control_count: 3
  - id: cap-5
    title: "Disposições Finais"
    description: "Vigência e aplicação subsidiária do decreto"
    articles: "art. 23 ao art. 24"
    control_count: 2
related_frameworks:
  - framework_id: marco-civil
    relationship: derived-from
    description: >-
      O Decreto 8.771/2016 regulamenta a Lei nº 12.965/2014 (Marco Civil da
      Internet), detalhando as condições técnicas para neutralidade de rede,
      guarda de registros, proteção de dados pessoais e fiscalização.
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD (Lei nº 13.709/2018) complementa o Decreto 8.771 ao estabelecer
      regime abrangente de proteção de dados pessoais, incluindo bases legais,
      direitos dos titulares e sanções administrativas.
  - framework_id: bacen-4893
    relationship: complements
    description: >-
      A Resolução BCB nº 4.893/2021 complementa o Decreto 8.771 no setor
      financeiro, especificando requisitos adicionais de segurança cibernética
      e guarda de registros para instituições reguladas pelo Banco Central.
