id: art-1
family: cap-1
title: "Objeto do Decreto"
class: Decreto-8771
baselines: [all]
statement:
  prose: >-
    Art. 1º Este Decreto trata das hipóteses admitidas de discriminação de
    pacotes de dados na internet e de degradação de tráfego, indica
    procedimentos para guarda e proteção de dados por provedores de conexão e
    de aplicações, aponta medidas de transparência na requisição de dados
    cadastrais pela administração pública e estabelece parâmetros para
    fiscalização e apuração de infrações contidas na Lei nº 12.965, de 23 de
    abril de 2014.
guidance:
  prose: >-
    Este artigo delimita o escopo de regulamentação do Decreto 8.771/2016 em
    quatro eixos temáticos: (1) neutralidade de rede — discriminação e
    degradação de pacotes; (2) proteção de dados — guarda e segurança por
    provedores; (3) transparência — requisição de dados cadastrais pelo poder
    público; (4) fiscalização — apuração de infrações ao Marco Civil. Toda
    organização que opere como provedor de conexão ou de aplicações de internet
    no Brasil precisa compreender o alcance integral deste decreto para
    dimensionar suas obrigações técnicas e jurídicas.
implementation_guidance:
  platform_engineering:
    prose: >-
      1. Mapear todos os serviços da organização que se enquadram como
         provisão de conexão ou de aplicações de internet.
      2. Criar inventário de obrigações regulatórias derivadas de cada eixo
         (neutralidade, proteção, transparência, fiscalização).
      3. Implementar painel de conformidade que rastreie o estado de cada
         obrigação do decreto em tempo real.
      4. Documentar a arquitetura de rede e os pontos onde ocorre
         gerenciamento de tráfego para fins de auditoria.
    tools:
      - compliance-dashboard
      - cmdb
      - asset-inventory
  devsecops:
    prose: >-
      1. Incluir verificações de conformidade com o decreto nos pipelines
         de CI/CD para serviços que processam dados de usuários.
      2. Automatizar auditorias de configuração de rede para detectar
         discriminação não autorizada de pacotes.
      3. Manter testes de integração que validem a correta guarda e
         proteção de registros.
    tools:
      - ci-cd-pipeline
      - compliance-as-code
      - configuration-auditor
  secops:
    prose: >-
      1. Estabelecer programa de conformidade contínua que cubra os quatro
         eixos do decreto.
      2. Realizar avaliações periódicas de conformidade com relatórios
         para a diretoria.
      3. Manter registro atualizado de todas as requisições de dados
         cadastrais recebidas de autoridades.
    tools:
      - grc-platform
      - audit-management
      - compliance-tracker
legal_references:
  - framework_id: marco-civil
    articles: ["art-1", "art-2", "art-3"]
    relationship: derived-from
