id: art-2
family: cap-1
title: "Definições e Conceitos"
class: Decreto-8771
baselines: [all]
statement:
  prose: >-
    Art. 2º Para fins deste Decreto, consideram-se:
    I - discriminação ou degradação de tráfego: qualquer conduta do
    responsável pela transmissão, pela comutação ou pelo roteamento que, sem
    justa causa, prejudique a qualidade da conexão dos pacotes de dados em
    relação a outros, tratamento que será avaliado levando em conta a
    repercussão concreta na fruição dos direitos dos usuários;
    II - requisitos técnicos indispensáveis à prestação adequada de
    serviços e aplicações: aqueles cujo descumprimento acarrete prejuízo ao
    provedor ou ao usuário;
    III - priorização de serviços de emergência: tratamento diferenciado
    de pacotes destinados a serviços de emergência.
guidance:
  prose: >-
    As definições do art. 2º são fundamentais para interpretar os demais
    dispositivos do decreto. A discriminação de tráfego abrange qualquer
    conduta que prejudique a qualidade de pacotes sem justa causa, avaliada
    pela repercussão concreta nos direitos dos usuários. Requisitos técnicos
    indispensáveis são aqueles cuja ausência causa prejuízo efetivo. O
    conceito de serviços de emergência recebe tratamento diferenciado
    explícito, permitindo priorização legítima.
implementation_guidance:
  platform_engineering:
    prose: >-
      1. Documentar todas as definições do decreto em glossário técnico
         compartilhado entre equipes de engenharia, jurídico e compliance.
      2. Classificar tipos de tráfego de rede conforme as definições
         legais para garantir que políticas de QoS estejam aderentes.
      3. Implementar classificação de serviços de emergência em
         infraestrutura de rede com prioridade adequada.
    tools:
      - knowledge-base
      - network-policy-manager
      - qos-classifier
  devsecops:
    prose: >-
      1. Codificar definições regulatórias como regras de validação em
         políticas de rede automatizadas.
      2. Criar testes que verifiquem se políticas de tráfego respeitam as
         definições de discriminação e degradação.
    tools:
      - policy-as-code
      - network-test-suite
  secops:
    prose: >-
      1. Treinar equipes de operações sobre as definições legais para
         identificar violações em tempo real.
      2. Manter documentação atualizada das definições para uso em
         incidentes e auditorias.
    tools:
      - training-platform
      - runbook-documentation
legal_references:
  - framework_id: marco-civil
    articles: ["art-5"]
    relationship: derived-from
