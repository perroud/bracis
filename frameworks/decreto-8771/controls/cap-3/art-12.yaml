id: art-12
family: cap-3
title: "Anonimização de Dados Pessoais"
class: Decreto-8771
baselines: [all]
statement:
  prose: >-
    Art. 12. A autoridade máxima de cada órgão da administração pública federal
    publicará anualmente, na internet, relatórios estatísticos de requisição de
    dados cadastrais, contendo: I - o número de pedidos realizados; II - a
    listagem dos provedores de conexão ou de acesso a aplicações aos quais os
    dados foram requeridos; III - o número de pedidos deferidos e indeferidos
    pelos provedores de conexão e de acesso a aplicações; e IV - o número de
    usuários afetados por tais solicitações. Parágrafo único. Os dados
    pessoais, quando do fornecimento de registros de conexão e de acesso a
    aplicações, devem ser fornecidos de forma desvinculada, quando não forem
    necessários à finalidade do requerente, de modo a preservar a privacidade
    dos usuários.
guidance:
  prose: >-
    O art. 12 estabelece dois princípios fundamentais: (1) transparência — a
    administração pública federal deve publicar relatórios anuais sobre
    requisições de dados cadastrais; (2) anonimização — quando dados pessoais
    forem fornecidos junto com registros de conexão ou de acesso, devem ser
    desvinculados sempre que não forem essenciais à finalidade do pedido. Isso
    impõe o princípio da minimização de dados antes mesmo da LGPD. Organizações
    devem implementar técnicas de desvinculação e anonimização como padrão no
    fornecimento de registros.
implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implementar camada de anonimização/pseudonimização nos sistemas de
         exportação de registros de conexão e acesso.
      2. Criar mecanismo de desvinculação que separe dados pessoais dos
         registros técnicos antes do fornecimento a terceiros.
      3. Garantir que APIs de exportação de dados apliquem filtros de
         minimização por padrão.
      4. Manter pipeline de anonimização que substitua identificadores
         pessoais por tokens irreversíveis quando a finalidade não exigir
         identificação.
    tools:
      - data-masking
      - anonymization-engine
      - data-export-api
      - tokenization-service
  devsecops:
    prose: >-
      1. Incluir testes automatizados que validem a desvinculação de dados
         pessoais em endpoints de exportação de registros.
      2. Implementar verificações de pipeline que detectem exposição de
         dados pessoais em respostas de API.
      3. Monitorar logs de exportação para identificar casos onde dados
         pessoais foram fornecidos sem necessidade.
    tools:
      - data-loss-prevention
      - api-security-testing
      - log-analyzer
  secops:
    prose: >-
      1. Auditar periodicamente os processos de fornecimento de registros
         para garantir que a anonimização é aplicada corretamente.
      2. Manter registro de todas as requisições atendidas, documentando
         quais dados pessoais foram fornecidos e a justificativa.
      3. Produzir relatórios estatísticos anuais conforme exigido pelo
         caput do artigo.
    tools:
      - audit-trail
      - data-governance
      - reporting-platform
legal_references:
  - framework_id: marco-civil
    articles: ["art-10", "art-15"]
    relationship: derived-from
