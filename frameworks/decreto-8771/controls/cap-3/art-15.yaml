id: art-15
family: cap-3
title: "Retenção e Eliminação de Dados Pessoais"
class: Decreto-8771
baselines: [all]
statement:
  prose: >-
    Art. 15. Os dados de que trata o art. 11 da Lei nº 12.965, de 2014,
    deverão ser mantidos em formato interoperável e estruturado, para
    facilitar o acesso decorrente de decisão judicial ou determinação legal,
    respeitadas as diretrizes elencadas no art. 13 deste Decreto. Parágrafo
    único. Os dados pessoais devem ser excluídos definitivamente tão logo
    atingida a finalidade de seu uso ou quando encerrado o prazo determinado
    por obrigação legal.
guidance:
  prose: >-
    O art. 15 estabelece dois requisitos complementares: (1) interoperabilidade
    e estruturação — registros de conexão e de acesso a aplicações devem ser
    mantidos em formato interoperável e estruturado para facilitar o
    atendimento de decisões judiciais; (2) eliminação definitiva — dados
    pessoais devem ser excluídos permanentemente quando atingida a finalidade
    ou expirado o prazo legal. A combinação impõe que organizações mantenham
    os dados em formato acessível durante o prazo de retenção, mas garantam
    eliminação irreversível após esse período. As diretrizes de segurança do
    art. 13 (criptografia, controle de acesso, inventário) devem ser
    observadas durante todo o ciclo de vida dos dados.
implementation_guidance:
  platform_engineering:
    prose: >-
      1. Armazenar registros de conexão e acesso em formatos interoperáveis
         (JSON, XML, CSV) com schemas documentados.
      2. Implementar mecanismo de exclusão definitiva (hard delete) com
         verificação de que dados foram removidos de todos os backups e
         réplicas dentro do prazo regulamentar.
      3. Manter catálogo de dados com metadados de finalidade, prazo legal
         de retenção e data prevista de eliminação.
      4. Automatizar processos de eliminação com gatilhos baseados em
         expiração de finalidade ou prazo legal.
    tools:
      - data-lifecycle-management
      - hard-delete-engine
      - data-catalog
      - backup-purge-automation
  devsecops:
    prose: >-
      1. Validar nos pipelines que novos schemas de dados incluem metadados
         de interoperabilidade e retenção.
      2. Implementar testes automatizados que verifiquem que a exclusão
         definitiva remove dados de todos os datastores e réplicas.
      3. Monitorar que formatos de exportação de registros atendem aos
         requisitos de interoperabilidade.
    tools:
      - schema-validator
      - deletion-completeness-tester
      - format-compliance-checker
  secops:
    prose: >-
      1. Auditar periodicamente se dados que excederam prazo de retenção
         foram efetivamente eliminados.
      2. Verificar que registros mantidos estão em formato interoperável
         e acessível para atendimento de decisões judiciais.
      3. Manter evidências de eliminação definitiva para fins de
         fiscalização e auditoria.
    tools:
      - retention-audit
      - deletion-evidence
      - interoperability-audit
legal_references:
  - framework_id: marco-civil
    articles: ["art-11", "art-13", "art-15"]
    relationship: derived-from
