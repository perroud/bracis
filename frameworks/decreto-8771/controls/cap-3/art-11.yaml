id: art-11
family: cap-3
title: "Autoridade Competente — CGI.br e Padrões de Segurança"
class: Decreto-8771
baselines: [all]
statement:
  prose: >-
    Art. 11. As autoridades administrativas a que se refere o art. 10, § 3º, da
    Lei nº 12.965, de 2014, indicarão o fundamento legal de competência expressa
    para o acesso e a motivação para o pedido de acesso aos dados cadastrais.
    § 1º O Comitê Gestor da Internet — CGI.br promoverá estudos e recomendará
    procedimentos, normas e padrões técnicos e de segurança para guarda,
    armazenamento e tratamento de dados pessoais e comunicações privadas.
    § 2º Os padrões e diretrizes estabelecidos pelo CGI.br servirão de
    parâmetro para a fiscalização pelo poder público.
guidance:
  prose: >-
    O art. 11 atribui ao CGI.br o papel de definir padrões técnicos e de
    segurança para guarda de dados pessoais e comunicações privadas. Esses
    padrões servem como referência para fiscalização pelo poder público.
    Organizações devem acompanhar as recomendações do CGI.br e incorporá-las em
    suas políticas de segurança. As autoridades administrativas que requisitarem
    dados cadastrais devem indicar fundamento legal e motivação expressa.
implementation_guidance:
  platform_engineering:
    prose: >-
      1. Acompanhar e implementar as recomendações técnicas publicadas pelo
         CGI.br para guarda e proteção de dados pessoais.
      2. Estabelecer políticas de segurança alinhadas aos padrões do CGI.br
         para armazenamento de registros e comunicações privadas.
      3. Manter inventário de normas e padrões do CGI.br aplicáveis à
         infraestrutura da organização.
      4. Implementar controles técnicos que garantam conformidade com os
         parâmetros de segurança recomendados.
    tools:
      - policy-as-code
      - compliance-dashboard
      - standards-tracker
  devsecops:
    prose: >-
      1. Integrar verificações de conformidade com padrões do CGI.br nos
         pipelines de CI/CD.
      2. Automatizar auditorias de configuração contra os padrões técnicos
         recomendados.
      3. Manter testes que validem a aderência a diretrizes de segurança
         publicadas pelo CGI.br.
    tools:
      - compliance-as-code
      - configuration-auditor
      - ci-cd-pipeline
  secops:
    prose: >-
      1. Manter registro atualizado das recomendações do CGI.br aplicáveis
         à organização.
      2. Verificar periodicamente a aderência das políticas internas aos
         padrões do CGI.br.
      3. Documentar todas as requisições administrativas de dados cadastrais
         recebidas, incluindo fundamento legal e motivação.
    tools:
      - grc-platform
      - audit-management
      - request-tracker
legal_references:
  - framework_id: marco-civil
    articles: ["art-10"]
    relationship: derived-from
