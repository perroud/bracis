id: art-13
family: cap-3
title: "Padrões de Segurança Obrigatórios"
class: Decreto-8771
baselines: [all]
statement:
  prose: >-
    Art. 13. Os provedores de conexão e de aplicações devem, na guarda,
    armazenamento e tratamento de dados pessoais e comunicações privadas,
    observar as seguintes diretrizes sobre padrões de segurança: I - o
    estabelecimento de controle estrito sobre o acesso aos dados mediante a
    definição de responsabilidades das pessoas que terão possibilidade de
    acesso e de privilégios de acesso exclusivo para determinados usuários;
    II - a previsão de mecanismos de autenticação de acesso aos registros,
    usando, por exemplo, sistemas de autenticação dupla para assegurar a
    individualização do responsável pelo tratamento dos registros; III - a
    criação de inventário detalhado dos acessos aos registros de conexão e
    de acesso a aplicações, contendo o momento, a duração, a identidade do
    funcionário ou do responsável pelo acesso designado pela empresa e o
    arquivo acessado, inclusive para cumprimento do disposto no art. 10,
    § 3º, da Lei nº 12.965, de 2014; IV - o uso de soluções de gestão dos
    registros por meio de técnicas que garantam a inviolabilidade dos dados,
    como encriptação ou medidas de proteção equivalentes; e V - a adoção de
    práticas que visem garantir que os dados pessoais sejam coletados em
    quantidade e qualidade não superiores às estritamente necessárias para a
    finalidade do tratamento.
guidance:
  prose: >-
    O art. 13 é o coração dos padrões de segurança do Decreto 8.771/2016,
    estabelecendo cinco diretrizes obrigatórias: (I) controle estrito de acesso
    com definição de responsabilidades e privilégios; (II) autenticação dupla
    (MFA) para individualizar o responsável pelo tratamento; (III) inventário
    detalhado de todos os acessos (momento, duração, identidade, arquivo);
    (IV) inviolabilidade por criptografia ou medida equivalente; (V) minimização
    de dados — coleta limitada ao estritamente necessário. Essas cinco diretrizes
    constituem o padrão mínimo de segurança exigido de todo provedor de conexão
    e de aplicações que opere no Brasil.
implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implementar RBAC (Role-Based Access Control) com definição explícita
         de responsabilidades e privilégios de acesso a dados pessoais e
         registros (diretriz I).
      2. Habilitar autenticação multifator (MFA) obrigatória para todos os
         usuários com acesso a registros de conexão e dados pessoais
         (diretriz II).
      3. Implementar sistema de auditoria que registre momento, duração,
         identidade do operador e arquivo/registro acessado em cada acesso
         (diretriz III).
      4. Aplicar criptografia AES-256 ou superior em repouso (at-rest) e
         TLS 1.3 em trânsito (in-transit) para todos os dados pessoais e
         registros (diretriz IV).
      5. Implementar políticas de minimização de dados com data retention
         policies automatizadas (diretriz V).
    tools:
      - iam-rbac
      - mfa-provider
      - audit-logging
      - encryption-at-rest
      - tls-management
      - data-retention-engine
  devsecops:
    prose: >-
      1. Integrar scanners SAST e secret detection nos pipelines para
         impedir que credenciais ou dados pessoais vazem no código-fonte.
      2. Automatizar verificação de que todos os endpoints que manipulam
         dados pessoais exigem autenticação MFA.
      3. Validar nos pipelines que criptografia está habilitada em todos
         os datastores que armazenam registros de conexão.
      4. Implementar testes que verifiquem que o inventário de acessos
         está sendo gerado corretamente.
      5. Incluir verificações de minimização de dados nos code reviews.
    tools:
      - sast-scanner
      - secret-detection
      - encryption-validator
      - access-log-tester
      - data-minimization-checker
  secops:
    prose: >-
      1. Auditar periodicamente as permissões de acesso para garantir que
         apenas pessoas autorizadas têm acesso a dados pessoais (diretriz I).
      2. Verificar que a autenticação dupla está ativa e funcional para
         todos os operadores de registros (diretriz II).
      3. Revisar o inventário de acessos para detectar acessos anômalos
         ou não autorizados (diretriz III).
      4. Validar que a criptografia está aplicada e que as chaves são
         gerenciadas de forma segura (diretriz IV).
      5. Monitorar a coleta de dados para garantir que não excede o
         estritamente necessário (diretriz V).
    tools:
      - access-review
      - mfa-audit
      - log-analysis
      - encryption-audit
      - data-collection-monitor
legal_references:
  - framework_id: marco-civil
    articles: ["art-10", "art-11"]
    relationship: derived-from
