id: art-14
family: cap-3
title: "Dados Cadastrais — Definição e Minimização"
class: Decreto-8771
baselines: [all]
statement:
  prose: >-
    Art. 14. Para os fins do disposto neste Decreto, considera-se dado
    cadastral: I - a filiação; II - o endereço; e III - a qualificação
    pessoal, entendida como nome, prenome, estado civil e profissão do
    usuário. Parágrafo único. Os provedores de conexão e de aplicações
    devem reter a menor quantidade possível de dados pessoais, comunicações
    privadas e registros de conexão e acesso a aplicações, os quais deverão
    ser excluídos: I - tão logo atingida a finalidade de seu uso; ou
    II - se encerrado o prazo determinado por obrigação legal.
guidance:
  prose: >-
    O art. 14 cumpre duas funções: (1) define taxativamente o que constitui
    dado cadastral — filiação, endereço e qualificação pessoal (nome, prenome,
    estado civil, profissão); (2) estabelece o princípio de retenção mínima —
    provedores devem reter a menor quantidade possível de dados pessoais,
    comunicações privadas e registros, excluindo-os quando atingida a
    finalidade ou encerrado o prazo legal. Essa definição é relevante porque
    dados cadastrais podem ser requisitados por autoridades administrativas
    sem ordem judicial, diferentemente de registros de conexão e conteúdo de
    comunicações.
implementation_guidance:
  platform_engineering:
    prose: >-
      1. Classificar campos de dados cadastrais (filiação, endereço,
         qualificação pessoal) de forma explícita no schema de banco de
         dados com tags de classificação.
      2. Implementar políticas automatizadas de retenção mínima com TTL
         (time-to-live) em registros de dados pessoais.
      3. Criar processos de exclusão automática de dados quando atingida a
         finalidade ou expirado o prazo legal.
      4. Segregar dados cadastrais dos registros de conexão em datastores
         distintos com controles de acesso diferenciados.
    tools:
      - data-classification
      - data-retention-policy
      - automated-deletion
      - data-segregation
  devsecops:
    prose: >-
      1. Implementar testes que validem que campos de dados cadastrais
         estão corretamente classificados.
      2. Automatizar verificação de que políticas de TTL estão ativas
         em todos os datastores que armazenam dados pessoais.
      3. Incluir nos pipelines verificações de que novos campos de dados
         pessoais possuem política de retenção definida.
    tools:
      - data-classification-scanner
      - retention-policy-validator
      - schema-compliance-checker
  secops:
    prose: >-
      1. Auditar periodicamente se os dados retidos excedem o mínimo
         necessário para a finalidade declarada.
      2. Verificar que os processos de exclusão automática estão
         funcionando corretamente.
      3. Manter inventário atualizado de todos os tipos de dados pessoais
         coletados e sua justificativa de retenção.
    tools:
      - data-inventory
      - retention-audit
      - deletion-verification
legal_references:
  - framework_id: marco-civil
    articles: ["art-10", "art-11"]
    relationship: derived-from
