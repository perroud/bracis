id: art-23
family: cap-5
title: "Vigência do Decreto"
class: Decreto-8771
baselines: [all]
statement:
  prose: >-
    Art. 23. Este Decreto entra em vigor na data de sua publicação.
guidance:
  prose: >-
    O art. 23 estabelece que o Decreto 8.771/2016 entrou em vigor na data
    de sua publicação, 11 de maio de 2016. Todas as obrigações nele
    previstas são exigíveis desde essa data. Organizações que operavam
    como provedores de conexão ou de aplicações de internet naquela data
    deviam estar em conformidade imediatamente, sem período de transição
    ou vacatio legis.
implementation_guidance:
  platform_engineering:
    prose: >-
      1. Documentar a data de vigência do decreto (11/05/2016) no
         catálogo de obrigações regulatórias da organização.
      2. Garantir que todos os controles técnicos exigidos pelo decreto
         estejam implementados e operacionais.
      3. Manter registro histórico de quando cada controle foi
         implementado para demonstrar conformidade temporal.
    tools:
      - compliance-catalog
      - control-implementation-tracker
  devsecops:
    prose: >-
      1. Incluir a data de vigência nas verificações de compliance-as-code
         que referenciam o decreto.
      2. Manter pipeline de verificação contínua de conformidade com
         todos os requisitos do decreto.
    tools:
      - compliance-as-code
      - continuous-compliance
  secops:
    prose: >-
      1. Manter cronograma de conformidade atualizado com todas as
         obrigações do decreto e status de implementação.
      2. Produzir relatório periódico de conformidade com o decreto
         para a alta administração.
    tools:
      - compliance-timeline
      - executive-reporting
legal_references:
  - framework_id: marco-civil
    articles: ["art-32"]
    relationship: derived-from
