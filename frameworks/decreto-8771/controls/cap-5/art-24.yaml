id: art-24
family: cap-5
title: "Aplicação Subsidiária"
class: Decreto-8771
baselines: [all]
statement:
  prose: >-
    Art. 24. As regras previstas neste Decreto se aplicam de forma
    subsidiária aos procedimentos previstos na legislação específica,
    incluindo as normas editadas pela ANATEL, pelo Ministério das
    Comunicações e demais órgãos e entidades com competência sobre a
    matéria.
guidance:
  prose: >-
    O art. 24 estabelece a aplicação subsidiária do Decreto 8.771/2016 em
    relação à legislação específica. Isso significa que: (1) quando existir
    norma setorial específica (ANATEL, Ministério das Comunicações, etc.),
    esta prevalece sobre o decreto; (2) o decreto preenche lacunas quando
    a legislação específica for omissa. Organizações reguladas por múltiplas
    autoridades devem mapear a hierarquia normativa aplicável, garantindo
    conformidade tanto com normas setoriais específicas quanto com os
    requisitos subsidiários do decreto.
implementation_guidance:
  platform_engineering:
    prose: >-
      1. Manter mapeamento completo das normas setoriais aplicáveis à
         organização (ANATEL, Ministério das Comunicações, etc.) e sua
         relação com o Decreto 8.771.
      2. Implementar controles que atendam tanto as normas setoriais
         específicas quanto os requisitos subsidiários do decreto.
      3. Documentar a hierarquia normativa aplicável em cada domínio
         técnico (neutralidade, proteção de dados, segurança).
    tools:
      - regulatory-mapping
      - norm-hierarchy-tracker
      - compliance-dashboard
  devsecops:
    prose: >-
      1. Incluir verificações de conformidade com normas setoriais e
         com o decreto nos pipelines de CI/CD.
      2. Manter configurações de compliance-as-code que reflitam a
         hierarquia normativa correta.
    tools:
      - compliance-as-code
      - multi-framework-validator
  secops:
    prose: >-
      1. Realizar análise de gap entre normas setoriais específicas e
         os requisitos do decreto para identificar quais regras do
         decreto se aplicam subsidiariamente.
      2. Manter matriz de conformidade cruzada que demonstre
         atendimento tanto a normas setoriais quanto ao decreto.
      3. Atualizar o mapeamento normativo sempre que novas normas
         setoriais forem publicadas.
    tools:
      - gap-analysis
      - cross-framework-matrix
      - regulatory-update-tracker
legal_references:
  - framework_id: marco-civil
    articles: ["art-1", "art-2"]
    relationship: derived-from
