id: art-9
family: cap-2
title: "Transparência sobre Gerenciamento de Tráfego"
class: Decreto-8771
baselines: [all]
statement:
  prose: >-
    Art. 9º Ficam vedadas condutas unilaterais ou acordos entre o responsável
    pela transmissão, pela comutação ou pelo roteamento e os provedores de
    aplicação que: I - comprometam o caráter público e irrestrito do acesso à
    internet e os fundamentos, os princípios e os objetivos do uso da internet
    no País; II - priorizem pacotes de dados em razão de arranjos comerciais;
    ou III - privilegiem aplicações ofertadas pelo próprio responsável pela
    transmissão, pela comutação ou pelo roteamento ou por empresas
    integrantes de seu grupo econômico.
guidance:
  prose: >-
    O art. 9º proíbe expressamente três condutas: (I) qualquer acordo ou
    conduta unilateral que comprometa o caráter público da internet;
    (II) priorização de pacotes motivada por arranjos comerciais (paid
    prioritization / fast lanes); (III) autofavorecimento — priorizar
    aplicações próprias ou de empresas do mesmo grupo econômico. Essa vedação
    atinge tanto provedores de conexão quanto de trânsito, e inclui acordos
    de peering assimétricos motivados por favorecimento comercial.
implementation_guidance:
  platform_engineering:
    prose: >-
      1. Garantir que políticas de peering e trânsito IP sejam baseadas em
         critérios técnicos, não comerciais.
      2. Segregar operações de conectividade das operações de conteúdo/
         aplicações quando a empresa atuar em ambos os mercados.
      3. Implementar controles que impeçam configurações de priorização
         vinculadas a acordos comerciais.
      4. Auditar automaticamente regras de QoS para detectar
         autofavorecimento.
    tools:
      - peering-policy-manager
      - network-segregation
      - qos-audit-engine
  devsecops:
    prose: >-
      1. Implementar verificações automatizadas de que nenhuma regra de
         rede prioriza tráfego por critério comercial.
      2. Monitorar configurações de roteamento para detectar tratamento
         preferencial de aplicações do grupo econômico.
      3. Manter teste contínuo de isonomia de tráfego entre aplicações
         próprias e de terceiros.
    tools:
      - traffic-equality-tester
      - routing-compliance-scanner
      - commercial-bias-detector
  secops:
    prose: >-
      1. Revisar periodicamente contratos de peering e trânsito para
         identificar cláusulas de priorização vedadas.
      2. Investigar denúncias de autofavorecimento.
      3. Manter evidências de tratamento isonômico para fiscalização.
    tools:
      - contract-review
      - complaint-investigation
      - evidence-management
legal_references:
  - framework_id: marco-civil
    articles: ["art-9"]
    relationship: derived-from
