id: art-3
family: cap-2
title: "Requisitos Técnicos para Discriminação de Pacotes"
class: Decreto-8771
baselines: [all]
statement:
  prose: >-
    Art. 3º A exigência de tratamento isonômico de que trata o art. 9º da
    Lei nº 12.965, de 2014, deve garantir a preservação do caráter público
    e irrestrito do acesso à internet e os fundamentos, princípios e
    objetivos do uso da internet no País, conforme previsto na Lei nº 12.965,
    de 2014.
guidance:
  prose: >-
    O art. 3º reforça que o princípio de neutralidade de rede exige tratamento
    isonômico de todo o tráfego de internet. Qualquer exceção deve estar
    fundamentada nos requisitos técnicos previstos no decreto e não pode
    comprometer o caráter público e irrestrito do acesso. Provedores devem
    demonstrar que suas práticas de gerenciamento de tráfego preservam os
    fundamentos da Lei 12.965/2014.
implementation_guidance:
  platform_engineering:
    prose: >-
      1. Configurar roteadores e switches para tratamento isonômico por padrão
         (best-effort para todo o tráfego).
      2. Documentar qualquer política de QoS (Quality of Service) e sua
         justificativa técnica.
      3. Implementar monitoramento contínuo de métricas de tráfego para
         detectar discriminação inadvertida.
      4. Manter baseline de desempenho de rede para comparação em auditorias.
    tools:
      - network-monitoring
      - qos-policy-engine
      - traffic-analytics
      - sdwan
  devsecops:
    prose: >-
      1. Validar configurações de rede contra políticas de neutralidade em
         cada deploy de infraestrutura.
      2. Implementar testes automatizados que verifiquem tratamento isonômico
         de diferentes tipos de tráfego.
      3. Monitorar drift de configuração em equipamentos de rede.
    tools:
      - infrastructure-as-code
      - network-compliance-scanner
      - config-drift-detector
  secops:
    prose: >-
      1. Auditar periodicamente as políticas de gerenciamento de tráfego.
      2. Investigar reclamações de usuários sobre degradação de serviço.
      3. Manter evidências de tratamento isonômico para fins de fiscalização.
    tools:
      - traffic-audit-tool
      - complaint-management
      - evidence-repository
legal_references:
  - framework_id: marco-civil
    articles: ["art-9"]
    relationship: derived-from
