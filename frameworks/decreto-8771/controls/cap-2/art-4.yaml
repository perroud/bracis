id: art-4
family: cap-2
title: "Requisitos Técnicos Indispensáveis e Segurança de Rede"
class: Decreto-8771
baselines: [all]
statement:
  prose: >-
    Art. 4º A discriminação ou a degradação de tráfego são medidas
    excepcionais, na medida em que somente poderão decorrer de requisitos
    técnicos indispensáveis à prestação adequada de serviços e aplicações
    ou de priorização de serviços de emergência, sendo necessário o
    cumprimento de todos os requisitos dispostos no art. 9º, § 2º, da Lei
    nº 12.965, de 2014.
guidance:
  prose: >-
    O art. 4º estabelece que discriminação e degradação de tráfego são
    exceções ao princípio de neutralidade, permitidas apenas em duas hipóteses:
    (1) requisitos técnicos indispensáveis — como tratamento de ataques DDoS,
    mitigação de código malicioso, gerenciamento de congestionamento em
    situações excepcionais; (2) priorização de serviços de emergência.
    Qualquer discriminação deve cumprir cumulativamente todos os requisitos
    do art. 9º, § 2º do Marco Civil: abstenção de causar danos, agir com
    proporcionalidade, transparência e isonomia, informar previamente os
    usuários, e oferecer serviços em condições comerciais não discriminatórias.
implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implementar sistemas de detecção e mitigação de DDoS que atuem
         apenas sobre tráfego malicioso, sem afetar tráfego legítimo.
      2. Configurar IDS/IPS para filtragem de código malicioso com regras
         proporcionais e documentadas.
      3. Implementar gerenciamento de congestionamento (fair queuing)
         que não discrimine por tipo de aplicação ou conteúdo.
      4. Documentar cada exceção à neutralidade com justificativa técnica
         e evidência de proporcionalidade.
    tools:
      - ddos-mitigation
      - ids-ips
      - fair-queuing
      - traffic-shaping
  devsecops:
    prose: >-
      1. Automatizar validação de regras de firewall e IDS/IPS para garantir
         que não excedam o estritamente necessário.
      2. Implementar testes de regressão para verificar que atualizações de
         regras de segurança não introduzam discriminação indevida.
      3. Manter pipeline de revisão de políticas de tráfego.
    tools:
      - firewall-audit
      - security-policy-validator
      - regression-test-suite
  secops:
    prose: >-
      1. Registrar todos os incidentes que justificaram discriminação de
         tráfego com documentação completa.
      2. Manter registro de exceções à neutralidade com prazo de validade.
      3. Revisar periodicamente se exceções ativas ainda se justificam.
    tools:
      - incident-management
      - exception-registry
      - compliance-review
legal_references:
  - framework_id: marco-civil
    articles: ["art-9"]
    relationship: derived-from
