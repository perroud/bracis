id: art-7
family: cap-2
title: "Vedação a Acordos entre Provedores"
class: Decreto-8771
baselines: [all]
statement:
  prose: >-
    Art. 7º O responsável pela transmissão, pela comutação ou pelo
    roteamento deverá adotar medidas de transparência para explicitar ao
    usuário os motivos do gerenciamento que implique a discriminação ou a
    degradação de que trata o art. 4º, tais como: I - a descrição dessas
    práticas; II - os efeitos de sua adoção para a qualidade de experiência
    dos usuários; III - os motivos e a necessidade da adoção dessas práticas.
    Parágrafo único. A Agência Nacional de Telecomunicações — ANATEL atuará na
    fiscalização e na apuração de infrações quanto aos aspectos técnicos e
    regulatórios previstos neste Decreto, consideradas as diretrizes
    estabelecidas pelo Comitê Gestor da Internet no Brasil — CGI.br.
guidance:
  prose: >-
    O art. 7º exige transparência ativa sobre práticas de gerenciamento de
    tráfego. O provedor deve informar ao usuário: descrição das práticas,
    seus efeitos na qualidade de experiência e os motivos que as justificam.
    A ANATEL é o órgão fiscalizador dos aspectos técnicos, seguindo
    diretrizes do CGI.br. Essa transparência permite ao usuário avaliar se
    seus direitos estão sendo respeitados e, se necessário, buscar a
    fiscalização adequada.
implementation_guidance:
  platform_engineering:
    prose: >-
      1. Publicar página de transparência de rede acessível a todos os
         usuários, detalhando práticas de gerenciamento.
      2. Implementar notificações em tempo real quando gerenciamento de
         tráfego afetar a experiência do usuário.
      3. Manter API pública com informações sobre estado de rede e
         práticas de gerenciamento vigentes.
      4. Criar dashboard interno para rastrear todas as práticas de
         gerenciamento ativas e seus impactos mensuráveis.
    tools:
      - transparency-portal
      - user-notification-system
      - public-api
      - network-dashboard
  devsecops:
    prose: >-
      1. Automatizar publicação de informações de transparência sempre que
         políticas de rede forem alteradas.
      2. Validar que documentação de transparência está atualizada em
         relação às configurações reais de rede.
      3. Testar acessibilidade das informações de transparência.
    tools:
      - documentation-sync
      - config-documentation-validator
      - accessibility-tester
  secops:
    prose: >-
      1. Manter registro histórico de todas as práticas de gerenciamento
         para fins de auditoria pela ANATEL.
      2. Monitorar conformidade com diretrizes do CGI.br.
      3. Preparar relatórios periódicos de transparência para publicação.
    tools:
      - audit-trail
      - regulatory-compliance
      - reporting-engine
legal_references:
  - framework_id: marco-civil
    articles: ["art-9"]
    relationship: derived-from
