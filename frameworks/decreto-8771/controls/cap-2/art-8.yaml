id: art-8
family: cap-2
title: "Comunicação ao Usuário sobre Práticas de Gerenciamento"
class: Decreto-8771
baselines: [all]
statement:
  prose: >-
    Art. 8º A degradação ou a discriminação decorrente da priorização de
    serviços de emergência somente poderá decorrer de: I - comunicações
    destinadas aos prestadores dos serviços de emergência, ou
    comunicação entre eles, conforme previsto na regulamentação da Agência
    Nacional de Telecomunicações — ANATEL; II - comunicações necessárias
    para informar a população em situações de risco de desastre, de
    emergência ou de estado de calamidade pública.
    Parágrafo único. A priorização a que se refere o caput não implicará
    em bloqueio, rebaixamento proposital da qualidade, ou qualquer forma
    de discriminação em relação aos demais tipos de tráfego.
guidance:
  prose: >-
    O art. 8º delimita a única exceção explícita à neutralidade: serviços
    de emergência. A priorização se restringe a comunicações destinadas a
    ou entre prestadores de serviços de emergência (conforme regulamentação
    da ANATEL) e comunicações para informar a população em situações de
    desastre, emergência ou calamidade. Mesmo nesse caso, a priorização não
    pode implicar bloqueio ou rebaixamento proposital de outros tipos de
    tráfego — apenas priorização relativa em cenários de congestionamento.
implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implementar classificação de tráfego de emergência conforme
         regulamentação ANATEL (DSCP marking, VLAN dedicada).
      2. Configurar QoS que priorize tráfego de emergência sem degradar
         demais tipos de tráfego em condições normais.
      3. Manter lista atualizada de endereços e serviços classificados
         como emergência.
      4. Implementar sistema de alertas de massa para situações de
         desastre integrado à infraestrutura de rede.
    tools:
      - qos-priority-engine
      - emergency-traffic-classifier
      - mass-notification-system
  devsecops:
    prose: >-
      1. Testar cenários de priorização de emergência para verificar que
         tráfego regular não é bloqueado ou rebaixado.
      2. Simular congestionamento para validar comportamento do QoS com
         tráfego de emergência ativo.
      3. Automatizar verificação de conformidade com regulamentação ANATEL.
    tools:
      - load-testing
      - qos-simulation
      - anatel-compliance-checker
  secops:
    prose: >-
      1. Manter registro de todas as ativações de priorização de
         emergência com evidências documentais.
      2. Coordenar com ANATEL e defesa civil os procedimentos de
         priorização.
      3. Revisar periodicamente a lista de serviços de emergência.
    tools:
      - emergency-log
      - regulatory-coordination
      - service-registry
legal_references:
  - framework_id: marco-civil
    articles: ["art-9"]
    relationship: derived-from
