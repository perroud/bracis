id: art-5
family: cap-2
title: "Requisitos Técnicos para Serviços de Emergência"
class: Decreto-8771
baselines: [all]
statement:
  prose: >-
    Art. 5º Os requisitos técnicos indispensáveis à prestação adequada de
    serviços e aplicações devem ser observados pelo responsável de
    atividades de transmissão, de comutação ou de roteamento, no âmbito de
    sua respectiva rede, e têm como objetivo manter sua estabilidade,
    segurança, integridade e funcionalidade.
    Parágrafo único. Os requisitos técnicos indispensáveis a que se refere
    o caput são aqueles decorrentes de: I - tratamento de questões de
    segurança de redes, tais como restrição ao envio de mensagens em massa
    (spam) e controle de ataques de negação de serviço (DDoS); II - tratamento
    de situações excepcionais de congestionamento de redes, tais como rotas
    alternativas em casos de interrupções da rota principal.
guidance:
  prose: >-
    O art. 5º especifica as únicas hipóteses técnicas que justificam
    discriminação de tráfego: (I) segurança de rede — spam e DDoS são citados
    como exemplos, mas o rol é exemplificativo (inclui código malicioso,
    exploits, varreduras de rede); (II) congestionamento excepcional — permite
    roteamento alternativo, não throttling seletivo de aplicações. O parágrafo
    único delimita que esses requisitos se aplicam no âmbito da rede do
    responsável, mantendo estabilidade, segurança, integridade e
    funcionalidade.
implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implementar filtros anti-spam em camada de rede com regras
         proporcionais e auditáveis.
      2. Configurar mitigação de DDoS com capacidade de distinguir tráfego
         legítimo de ataque (behavioral analysis, rate limiting).
      3. Implementar rotas alternativas automáticas (failover) para cenários
         de congestionamento com documentação de triggers.
      4. Monitorar estabilidade, segurança, integridade e funcionalidade
         como métricas contínuas de rede.
    tools:
      - anti-spam-gateway
      - ddos-protection
      - bgp-failover
      - network-monitoring
  devsecops:
    prose: >-
      1. Testar cenários de failover e congestionamento em ambiente controlado.
      2. Validar que regras anti-spam e anti-DDoS não bloqueiam tráfego
         legítimo (false positive analysis).
      3. Automatizar verificação de proporcionalidade das regras de
         segurança de rede.
    tools:
      - chaos-engineering
      - false-positive-analyzer
      - network-simulation
  secops:
    prose: >-
      1. Manter playbooks de resposta para eventos de segurança de rede
         que justifiquem discriminação de tráfego.
      2. Documentar cada ativação de rotas alternativas por congestionamento.
      3. Produzir relatórios periódicos de eventos de segurança de rede
         que resultaram em discriminação de tráfego.
    tools:
      - siem
      - incident-playbooks
      - event-correlation
legal_references:
  - framework_id: marco-civil
    articles: ["art-9"]
    relationship: derived-from
