id: art-6
family: cap-2
title: "Ofertas Comerciais e Modelos de Cobrança"
class: Decreto-8771
baselines: [all]
statement:
  prose: >-
    Art. 6º Para a adequada prestação de serviços e aplicações na internet,
    é permitida a adoção de técnicas de gerenciamento de tráfego de rede pelo
    responsável pela transmissão, pela comutação ou pelo roteamento, desde que:
    I - não comprometa o caráter público e irrestrito do acesso à internet e
    não implique restrição do direito do usuário de utilizar, enviar, receber
    ou ofertar qualquer conteúdo, aplicação ou serviço lícito na internet,
    bem como qualquer outro direito previsto na Lei nº 12.965, de 2014;
    II - respeite o direito dos usuários de internet à privacidade.
guidance:
  prose: >-
    O art. 6º permite gerenciamento de tráfego desde que não restrinja acesso
    a conteúdo, aplicação ou serviço lícito e respeite a privacidade. Práticas
    como zero-rating, bloqueio de aplicações, throttling seletivo de streaming
    ou VoIP são vedadas quando comprometem o caráter público e irrestrito do
    acesso. A análise de tráfego para gerenciamento não pode violar a
    privacidade do usuário — deep packet inspection (DPI) que inspecione
    conteúdo é vedada.
implementation_guidance:
  platform_engineering:
    prose: >-
      1. Projetar políticas de gerenciamento de tráfego que operem em camadas
         inferiores (L3/L4), sem inspeção de conteúdo (L7).
      2. Evitar implementação de DPI que acesse payload de pacotes de
         usuários para fins de gerenciamento comercial.
      3. Garantir que ofertas comerciais não condicionem acesso a
         aplicações específicas (zero-rating discriminatório).
      4. Documentar todas as técnicas de gerenciamento de tráfego com
         análise de impacto em neutralidade e privacidade.
    tools:
      - traffic-management
      - network-policy-engine
      - privacy-impact-assessment
  devsecops:
    prose: >-
      1. Auditar configurações de rede para identificar regras que
         discriminem por aplicação ou conteúdo.
      2. Verificar que ferramentas de monitoramento não capturem dados
         pessoais além do necessário para gerenciamento técnico.
      3. Implementar testes de privacidade em pipelines de deploy de
         infraestrutura de rede.
    tools:
      - network-audit
      - privacy-scanner
      - traffic-analysis
  secops:
    prose: >-
      1. Monitorar reclamações de usuários sobre bloqueio ou degradação
         de serviços específicos.
      2. Verificar periodicamente que ofertas comerciais estejam aderentes
         ao princípio de neutralidade.
      3. Manter inventário de todas as técnicas de gerenciamento de tráfego
         ativas e sua justificativa.
    tools:
      - complaint-tracking
      - commercial-compliance-audit
      - technique-inventory
legal_references:
  - framework_id: marco-civil
    articles: ["art-9"]
    relationship: derived-from
