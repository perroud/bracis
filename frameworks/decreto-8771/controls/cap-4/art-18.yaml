id: art-18
family: cap-4
title: "Competências de Fiscalização"
class: Decreto-8771
baselines: [all]
statement:
  prose: >-
    Art. 18. A Agência Nacional de Telecomunicações — ANATEL atuará na
    regulação, na fiscalização e na apuração de infrações, nos termos da
    Lei nº 9.472, de 16 de julho de 1997, quanto aos aspectos técnicos de
    telecomunicações, especialmente quanto ao disposto na Seção I do
    Capítulo III da Lei nº 12.965, de 2014. § 1º A Secretaria Nacional do
    Consumidor atuará na fiscalização e na apuração de infrações, nos
    termos da Lei nº 8.078, de 11 de setembro de 1990, quanto aos aspectos
    de defesa do consumidor. § 2º O Sistema Brasileiro de Defesa da
    Concorrência atuará na apuração de infrações à ordem econômica, nos
    termos da Lei nº 12.529, de 30 de novembro de 2011. § 3º O Comitê
    Gestor da Internet — CGI.br estabelecerá diretrizes quanto aos padrões
    de segurança e apurará, por meio dos órgãos técnicos integrantes do
    Grupo de Trabalho de Engenharia e Operação de Redes (GTER), as
    vulnerabilidades a que se refere o art. 16, promovendo ações junto aos
    prestadores de serviços e aplicações de internet.
guidance:
  prose: >-
    O art. 18 distribui as competências de fiscalização entre quatro
    entidades: (1) ANATEL — aspectos técnicos de telecomunicações,
    especialmente neutralidade de rede; (2) Secretaria Nacional do
    Consumidor (Senacon) — defesa do consumidor nos termos do CDC;
    (3) Sistema Brasileiro de Defesa da Concorrência (SBDC/CADE) —
    infrações à ordem econômica; (4) CGI.br — padrões de segurança e
    apuração de vulnerabilidades via GTER. Organizações devem estar
    preparadas para atender fiscalizações de múltiplas autoridades, cada
    uma com escopo e fundamento legal distintos.
implementation_guidance:
  platform_engineering:
    prose: >-
      1. Manter documentação técnica de infraestrutura de rede em formato
         auditável para atender fiscalização da ANATEL.
      2. Implementar controles de qualidade de serviço ao consumidor
         documentados para fiscalização da Senacon.
      3. Garantir que práticas comerciais de rede e aplicações não violem
         normas concorrenciais (SBDC/CADE).
      4. Acompanhar diretrizes de segurança do CGI.br e recomendações do
         GTER para correção de vulnerabilidades.
    tools:
      - network-documentation
      - consumer-service-monitoring
      - compliance-dashboard
      - vulnerability-management
  devsecops:
    prose: >-
      1. Manter relatórios automatizados de conformidade técnica prontos
         para apresentação à ANATEL.
      2. Implementar monitoramento de SLA e qualidade de serviço para
         evidenciar conformidade com o CDC.
      3. Automatizar detecção e correção de vulnerabilidades reportadas
         pelo GTER/CGI.br.
    tools:
      - compliance-reporting
      - sla-monitoring
      - vulnerability-scanner
      - patch-management
  secops:
    prose: >-
      1. Manter equipe ou responsável designado para cada ente
         fiscalizador (ANATEL, Senacon, SBDC, CGI.br).
      2. Estabelecer procedimentos de resposta a fiscalização com
         prazos e responsabilidades definidos.
      3. Realizar autoavaliações periódicas nos quatro eixos de
         fiscalização para identificar não conformidades proativamente.
    tools:
      - regulatory-management
      - inspection-response
      - self-assessment
legal_references:
  - framework_id: marco-civil
    articles: ["art-9", "art-10", "art-11"]
    relationship: derived-from
