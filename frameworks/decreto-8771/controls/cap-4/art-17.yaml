id: art-17
family: cap-4
title: "Requisição Judicial de Registros"
class: Decreto-8771
baselines: [all]
statement:
  prose: >-
    Art. 17. A autoridade judicial, para fins do disposto na Seção IV do
    Capítulo III da Lei nº 12.965, de 2014, poderá requerer, cautelarmente
    ou para instrução processual, os registros de conexão e de acesso a
    aplicações de internet de que trata o art. 10 da referida Lei. § 1º O
    requerimento deverá conter, sob pena de inadmissibilidade: I -
    fundamentos legais da competência da autoridade para acessar os registros;
    II - motivação para o pedido; III - período ao qual se referem os
    registros; e IV - a forma de apresentação dos registros, que deverá ser
    compatível com o formato interoperável a que se refere o art. 15 deste
    Decreto. § 2º Os mandados judiciais que tratarem de acesso a registros
    deverão especificar o tipo de registro requerido, sem possibilitar a
    realização de buscas genéricas.
guidance:
  prose: >-
    O art. 17 regula a requisição judicial de registros de conexão e de
    acesso, impondo quatro requisitos cumulativos de admissibilidade:
    (I) fundamento legal de competência; (II) motivação para o pedido;
    (III) período específico dos registros; (IV) formato de apresentação
    compatível com o padrão interoperável do art. 15. O § 2º veda buscas
    genéricas — mandados judiciais devem especificar o tipo de registro
    requerido. Organizações devem ter processos prontos para atender
    requisições judiciais de forma célere, mas também para recusar pedidos
    que não atendam aos requisitos de admissibilidade.
implementation_guidance:
  platform_engineering:
    prose: >-
      1. Manter sistema de exportação de registros em formato interoperável
         e estruturado, pronto para atender requisições judiciais.
      2. Implementar mecanismo de extração de registros por período
         específico, sem necessidade de exportação completa.
      3. Garantir que a infraestrutura suporte consultas por tipo de
         registro (conexão vs. acesso a aplicações) de forma segregada.
      4. Manter logs de auditoria de todas as exportações realizadas para
         atendimento de requisições judiciais.
    tools:
      - data-export-engine
      - query-by-period
      - audit-logging
      - record-segregation
  devsecops:
    prose: >-
      1. Automatizar a geração de relatórios de registros em formato
         interoperável para atendimento de requisições.
      2. Implementar testes que validem que a exportação de registros
         respeita o período especificado sem vazar dados fora do escopo.
      3. Manter pipeline de verificação de integridade dos registros
         exportados.
    tools:
      - report-generator
      - data-scope-validator
      - integrity-checker
  secops:
    prose: >-
      1. Estabelecer procedimento operacional padrão (SOP) para
         recebimento e atendimento de requisições judiciais.
      2. Verificar admissibilidade de cada requisição contra os quatro
         requisitos do § 1º antes de fornecer os dados.
      3. Manter registro completo de todas as requisições recebidas,
         atendidas e recusadas, com justificativa.
      4. Recusar mandados genéricos que não especifiquem o tipo de
         registro conforme § 2º.
    tools:
      - legal-request-management
      - admissibility-checklist
      - evidence-chain-of-custody
legal_references:
  - framework_id: marco-civil
    articles: ["art-10", "art-22", "art-23"]
    relationship: derived-from
