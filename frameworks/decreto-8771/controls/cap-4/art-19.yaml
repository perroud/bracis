id: art-19
family: cap-4
title: "Relatórios de Transparência"
class: Decreto-8771
baselines: [all]
statement:
  prose: >-
    Art. 19. Os provedores de conexão e de aplicações de internet poderão
    optar pela publicação de relatórios de transparência que contenham: I -
    dados quantitativos e qualitativos sobre requisições legais de dados
    cadastrais e registros de conexão e de acesso a aplicações que
    receberam; II - a quantidade de requisições integralmente atendidas,
    parcialmente atendidas e não atendidas; e III - informações agregadas
    sobre o tipo de dado requisitado e o tipo de autoridade requisitante.
    Parágrafo único. Os relatórios deverão diferenciar os tipos de
    requisições, conforme previsto na legislação vigente.
guidance:
  prose: >-
    O art. 19 estabelece a faculdade (não obrigação) de provedores
    publicarem relatórios de transparência sobre requisições legais de
    dados. Os relatórios devem conter: (I) dados quantitativos e
    qualitativos sobre requisições recebidas; (II) status de atendimento
    (integral, parcial, não atendida); (III) informações agregadas por
    tipo de dado e autoridade requisitante. Embora facultativo, a
    publicação desses relatórios é considerada boa prática de governança
    e demonstra compromisso com a transparência. A diferenciação por tipo
    de requisição (administrativa vs. judicial) é obrigatória nos
    relatórios publicados.
implementation_guidance:
  platform_engineering:
    prose: >-
      1. Implementar sistema de registro e classificação de todas as
         requisições legais recebidas (tipo de dado, autoridade, status).
      2. Criar painel de métricas que agregue dados sobre requisições
         para geração automatizada de relatórios de transparência.
      3. Garantir que o sistema de registro distinga entre requisições
         administrativas e judiciais.
      4. Automatizar geração periódica (semestral ou anual) de
         relatórios de transparência em formato publicável.
    tools:
      - request-tracking-system
      - transparency-dashboard
      - report-generator
      - data-aggregation
  devsecops:
    prose: >-
      1. Implementar testes automatizados que validem a completude e
         consistência dos dados do relatório de transparência.
      2. Automatizar verificação de que o relatório diferencia
         corretamente os tipos de requisição.
      3. Garantir que dados do relatório estejam anonimizados e
         agregados para não revelar informações de casos específicos.
    tools:
      - report-validator
      - data-anonymization
      - consistency-checker
  secops:
    prose: >-
      1. Definir processo de revisão jurídica dos relatórios de
         transparência antes da publicação.
      2. Monitorar tendências nas requisições recebidas para
         identificar padrões ou abusos.
      3. Comparar relatórios com os de outras organizações do setor
         para benchmarking de transparência.
    tools:
      - legal-review-workflow
      - trend-analysis
      - benchmarking-tool
legal_references:
  - framework_id: marco-civil
    articles: ["art-10", "art-12"]
    relationship: derived-from
