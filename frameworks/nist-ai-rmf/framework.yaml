id: nist-ai-rmf
title: "NIST AI Risk Management Framework (AI RMF 1.0)"
short_title: "NIST AI RMF"
version: "1.0"
publication_date: "2023-01-26"
last_updated: "2023-01-26"

authority:
  name: "National Institute of Standards and Technology"
  acronym: "NIST"
  country: US
  url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"

type: guideline
scope: ai-governance
mandatory: false

original_language: en
available_languages:
