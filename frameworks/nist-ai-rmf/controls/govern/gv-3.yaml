id: gv-3
family: govern
title: "Govern 3 — Workforce diversity, equity, inclusion, and accessibility processes are prioritized in the mapping, measuring, and managing of AI risks throughout the lifecycle"
class: AI-RMF

statement:
  prose: >-
    Workforce diversity, equity, inclusion, and accessibility processes are
    prioritized in the mapping, measuring, and managing of AI risks throughout
    the lifecycle.

guidance:
  prose: >-
    Organizations should integrate diversity, equity, inclusion, and accessibility
    (DEIA) principles into AI risk management practices. Diverse teams are better
    equipped to identify potential biases, anticipate impacts on different populations,
    and develop more equitable AI systems. DEIA considerations should influence
    team composition for AI development and oversight, data collection and labeling
    practices, model evaluation criteria, and stakeholder engagement processes.
    Organizations should assess whether their AI workforce reflects the diversity
    of the populations affected by their AI systems. Accessibility requirements
    should be built into AI system design from the outset, not retrofitted.

references:
  - citation: "NIST AI Risk Management Framework (AI RMF 1.0), GOVERN 3"
    url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build accessibility testing into the platform's AI deployment pipeline.
      Implement automated accessibility checks for AI-powered interfaces and outputs.
      Provide platform tooling that supports bias detection and fairness evaluation
      as standard capabilities available to all AI development teams. Ensure platform
      documentation and interfaces are accessible to users with diverse abilities.
      Track team composition metrics through the platform's organizational data.
    tools:
      - accessibility-testing-tools
      - fairlearn
      - aequitas
      - backstage-catalog

  devsecops:
    prose: >-
      Include bias and fairness evaluation as mandatory CI/CD pipeline stages for
      AI models. Implement automated checks that flag models with disparate impact
      across demographic groups. Require accessibility compliance testing before
      AI-powered features are deployed. Use diverse test datasets in automated
      testing pipelines to surface potential equity issues before production deployment.
    tools:
      - fairlearn
      - aequitas
      - axe-core
      - gitlab-ci

  secops:
    prose: >-
      Monitor production AI systems for emergent bias patterns and disparate outcomes
      across different user populations. Implement alerting on fairness metric
      degradation. Generate periodic reports on AI system performance across
      demographic groups. Track and investigate user complaints related to
      accessibility or discriminatory outcomes.
    tools:
      - datadog
      - grafana
      - elastic-siem

