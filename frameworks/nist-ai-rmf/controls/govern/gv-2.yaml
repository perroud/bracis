id: gv-2
family: govern
title: "Govern 2 — Accountability structures are in place so that the appropriate teams and individuals are empowered, responsible, and trained for mapping, measuring, and managing AI risks"
class: AI-RMF

statement:
  prose: >-
    Accountability structures are in place so that the appropriate teams and
    individuals are empowered, responsible, and trained for mapping, measuring,
    and managing AI risks effectively.

guidance:
  prose: >-
    Organizations must define clear accountability structures for AI risk management.
    This includes designating specific roles and responsibilities for AI oversight,
    such as AI ethics boards, model risk management teams, and data governance
    committees. Individuals tasked with AI risk management should receive adequate
    training on AI technologies, associated risks, and organizational policies.
    Accountability structures should include escalation paths for risk issues,
    decision-making authority at appropriate levels, and mechanisms for reporting
    AI incidents. The organization should ensure that accountability extends across
    the AI system lifecycle from design through deployment and decommissioning.

references:
  - citation: "NIST AI Risk Management Framework (AI RMF 1.0), GOVERN 2"
    url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement role-based access control (RBAC) for AI development and deployment
      infrastructure. Define platform roles that map to AI accountability structures:
      model developers, model reviewers, data stewards, and deployment approvers.
      Use the internal developer platform to enforce separation of duties between
      model training, validation, and production deployment. Maintain an ownership
      registry that maps every AI system to its accountable team and individuals.
      Integrate training completion tracking into platform access provisioning.
    tools:
      - backstage-catalog
      - kubernetes-rbac
      - vault
      - ldap
      - keycloak

  devsecops:
    prose: >-
      Enforce code ownership rules (CODEOWNERS) for AI model repositories to ensure
      appropriate reviewers are assigned. Implement mandatory approval workflows that
      require sign-off from designated AI risk management roles before model changes
      are merged or deployed. Track training certifications as prerequisites for
      pipeline access. Use merge request templates that require explicit accountability
      declarations for AI risk decisions.
    tools:
      - gitlab-ci
      - codeowners
      - merge-request-approvals
      - compliance-pipelines

  secops:
    prose: >-
      Monitor access patterns to AI systems and flag unauthorized access attempts.
      Implement audit trails that attribute all actions on AI systems to specific
      individuals. Generate accountability reports showing who approved, deployed,
      and monitored each AI system. Maintain incident response rosters with clear
      AI-specific escalation procedures. Track and report on training completion
      status for AI risk management personnel.
    tools:
      - splunk
      - elastic-siem
      - servicenow
      - pagerduty

