id: gv-1
family: govern
title: >-
  Govern 1 — Policies, processes, procedures, and practices across the organization related to the mapping,
  measuring, and managing of AI risks are in place, transparent, and implemented effectively
class: AI-RMF

statement:
  prose: >-
    Policies, processes, procedures, and practices across the organization related
    to the mapping, measuring, and managing of AI risks are in place, transparent,
    and implemented effectively. Legal and regulatory requirements involving AI are
    understood, managed, and documented.

guidance:
  prose: >-
    Organizations should establish and maintain a comprehensive governance structure
    for AI risk management. This includes formal policies that define roles,
    responsibilities, and accountability for AI systems throughout their lifecycle.
    Governance documentation should address data practices, model development and
    validation, deployment criteria, monitoring requirements, and decommissioning
    procedures. The governance structure must be responsive to evolving legal and
    regulatory requirements, industry standards, and organizational risk tolerance.
    Policies should be reviewed periodically and updated to reflect changes in
    technology, organizational context, and the regulatory landscape. Transparency
    in governance processes enables stakeholders to understand how AI risk decisions
    are made and provides a basis for trust.

references:
  - citation: "NIST AI Risk Management Framework (AI RMF 1.0), GOVERN 1"
    url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Encode AI governance policies as code artifacts in the platform layer. Implement
      policy-as-code frameworks (Open Policy Agent, Kyverno) to enforce AI-specific
      governance rules across the development and deployment pipeline. Maintain a
      centralized AI model registry that tracks model lineage, training data provenance,
      evaluation metrics, and approval status. Integrate governance checks into the
      internal developer platform so that AI workloads cannot be deployed without
      satisfying mandatory policy gates. Use GitOps workflows to version-control all
      governance policies, ensuring an auditable change history.
    tools:
      - open-policy-agent
      - kyverno
      - mlflow
      - backstage-catalog
      - gitops

  devsecops:
    prose: >-
      Integrate AI governance checkpoints into CI/CD pipelines. Require policy
      compliance scans before model artifacts are promoted to staging or production.
      Implement automated checks for data lineage documentation, model cards, and
      bias evaluation reports as mandatory pipeline stages. Use pre-commit hooks and
      merge request approvals to enforce peer review of AI model changes. Maintain
      governance documentation as code alongside model and application repositories.
    tools:
      - gitlab-ci
      - github-actions
      - checkov
      - pre-commit
      - model-cards

  secops:
    prose: >-
      Monitor deployed AI systems for compliance with governance policies. Implement
      alerting on policy violations such as unauthorized model deployments, data
      access anomalies, or drift from approved configurations. Maintain audit logs
      of all AI system changes and access events. Generate periodic governance
      compliance reports for leadership review. Track regulatory changes and assess
      their impact on existing AI deployments.
    tools:
      - splunk
      - elastic-siem
      - datadog
      - pagerduty

legal_references:
  - framework_id: eu-ai-act
    articles: ["Article 9", "Article 17"]
    relationship: mapped
  - framework_id: nist-800-53-rev5
    articles: ["PM-1", "PM-9", "PL-1"]
    relationship: mapped
  - framework_id: iso-27001-2022
    articles: ["A5.1", "A5.2"]
    relationship: supports
  - framework_id: nist-csf-v2
    articles: ["GV.PO-01", "GV.PO-02"]
    relationship: complements
