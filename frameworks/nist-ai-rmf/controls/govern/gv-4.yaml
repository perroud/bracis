id: gv-4
family: govern
title: "Govern 4 — Organizational teams are committed to a culture that considers and communicates AI risk"
class: AI-RMF

statement:
  prose: >-
    Organizational teams are committed to a culture that considers and communicates
    AI risk. Risk management processes and their outcomes are documented and
    integrated into organizational decision-making.

guidance:
  prose: >-
    A risk-aware culture is foundational to effective AI risk management. Organizations
    should foster an environment where AI risks are openly discussed, reported, and
    addressed without fear of reprisal. Leadership must actively champion AI risk
    awareness and demonstrate commitment through resource allocation and strategic
    priorities. Risk communication channels should be established at all organizational
    levels, enabling information to flow from front-line developers to executives and
    back. Documentation of risk management processes and outcomes should be maintained
    to support organizational learning and continuous improvement. Regular training
    and awareness programs should reinforce the importance of AI risk management across
    all functions.

references:
  - citation: "NIST AI Risk Management Framework (AI RMF 1.0), GOVERN 4"
    url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Embed risk communication artifacts into the platform layer. Implement AI risk
      dashboards that surface model performance, fairness metrics, and incident
      history to all stakeholders. Provide standardized templates for risk
      documentation (model cards, data sheets, impact assessments) through the
      developer platform. Integrate risk tracking into the service catalog so that
      every AI system has visible risk status. Enable anonymous reporting channels
      for AI risk concerns through the platform.
    tools:
      - backstage-catalog
      - grafana
      - model-cards
      - risk-dashboard

  devsecops:
    prose: >-
      Incorporate risk documentation requirements into the development workflow.
      Require model cards and risk assessments as merge request artifacts. Implement
      pipeline stages that validate risk documentation completeness before deployment.
      Use issue tracking to maintain a visible backlog of identified AI risks and
      their remediation status. Publish risk metrics as pipeline reports accessible
      to all team members.
    tools:
      - gitlab-ci
      - model-cards
      - issue-tracking
      - merge-request-templates

  secops:
    prose: >-
      Maintain centralized AI risk registers and incident databases. Implement
      real-time risk dashboards showing the status of all AI systems. Generate and
      distribute periodic AI risk reports to leadership and stakeholders. Monitor
      for risk events and ensure timely communication through established channels.
      Conduct post-incident reviews and disseminate lessons learned.
    tools:
      - servicenow
      - jira
      - grafana
      - pagerduty

