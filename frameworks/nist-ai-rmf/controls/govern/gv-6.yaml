id: gv-6
family: govern
title: "Govern 6 — Policies and procedures are in place to address AI risks and benefits arising from third-party software and data and other supply chain issues"
class: AI-RMF

statement:
  prose: >-
    Policies and procedures are in place to address AI risks and benefits arising
    from third-party software and data and other supply chain issues.

guidance:
  prose: >-
    Organizations increasingly rely on third-party AI components, including
    pre-trained models, training datasets, APIs, and cloud-based AI services.
    Third-party dependencies introduce risks that must be assessed and managed
    through formal policies and procedures. Organizations should evaluate the
    provenance, quality, and security of third-party AI components before adoption.
    Contracts with third-party AI providers should include requirements for
    transparency, accountability, and incident reporting. The organization must
    maintain visibility into its AI supply chain, track dependencies, and assess
    the cascading risks of third-party failures or compromises. Regular audits
    of third-party AI components should verify continued compliance with
    organizational standards.

references:
  - citation: "NIST AI Risk Management Framework (AI RMF 1.0), GOVERN 6"
    url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a curated catalog of approved third-party AI components and services
      in the platform layer. Enforce that only approved models, datasets, and AI
      services can be integrated into production systems. Use software composition
      analysis tools extended to cover AI model dependencies and training data
      provenance. Implement automated scanning of third-party AI components for
      known vulnerabilities, license compliance, and data quality issues. Maintain
      a software bill of materials (SBOM) that includes AI-specific artifacts.
    tools:
      - backstage-catalog
      - syft
      - grype
      - trivy
      - model-registry

  devsecops:
    prose: >-
      Integrate third-party AI component scanning into CI/CD pipelines. Implement
      dependency checks that flag unapproved or vulnerable third-party AI models
      and datasets. Require provenance documentation for all third-party AI
      components as a pipeline gate. Use automated license compliance checking
      for AI models and training data. Maintain an AI-specific SBOM generated
      and validated during the build process.
    tools:
      - gitlab-ci
      - trivy
      - syft
      - grype
      - dependency-scanning

  secops:
    prose: >-
      Monitor third-party AI component vulnerability databases and advisory feeds.
      Alert on newly discovered vulnerabilities in AI dependencies used by the
      organization. Conduct periodic audits of third-party AI vendors for
      compliance with contractual and policy requirements. Track third-party AI
      incidents and assess their potential impact on the organization. Maintain
      an inventory of all third-party AI components and their risk assessments.
    tools:
      - trivy
      - dependabot
      - snyk
      - servicenow

