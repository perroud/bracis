id: gv-5
family: govern
title: "Govern 5 — Processes are in place for robust engagement with relevant AI actors"
class: AI-RMF

statement:
  prose: >-
    Processes are in place for robust engagement with relevant AI actors.
    Stakeholder feedback is integrated into the design, implementation, and
    ongoing assessment of AI systems.

guidance:
  prose: >-
    Organizations should establish meaningful engagement processes with all relevant
    AI actors including internal teams, external partners, affected communities, and
    subject matter experts. Stakeholder engagement should occur throughout the AI
    system lifecycle, from initial conception and design through deployment and
    monitoring. Input from diverse stakeholders helps identify risks that technical
    teams alone may overlook, especially risks related to societal impacts, equity,
    and human rights. Engagement mechanisms should be accessible, inclusive, and
    designed to capture feedback from populations most likely to be affected by AI
    systems. Organizations should document how stakeholder input influences AI system
    design and risk management decisions.

references:
  - citation: "NIST AI Risk Management Framework (AI RMF 1.0), GOVERN 5"
    url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement feedback collection mechanisms within AI-powered applications and
      services deployed through the platform. Provide standardized APIs and
      interfaces for capturing user feedback on AI system outputs. Build stakeholder
      feedback aggregation dashboards that surface trends and concerns to AI
      development teams. Integrate feedback loops into the model monitoring pipeline
      so that stakeholder input can trigger model reviews and updates.
    tools:
      - backstage-catalog
      - grafana
      - feedback-apis
      - model-monitoring

  devsecops:
    prose: >-
      Incorporate stakeholder review stages into AI development workflows. Implement
      merge request workflows that require input from designated stakeholder
      representatives before AI system changes are approved. Use issue tracking to
      manage and respond to stakeholder feedback. Maintain feedback-driven test
      cases that validate AI systems against stakeholder-identified concerns.
    tools:
      - gitlab-ci
      - issue-tracking
      - merge-request-approvals

  secops:
    prose: >-
      Monitor AI systems for patterns of user complaints or negative feedback that
      may indicate emerging risks. Implement alerting on feedback volume spikes
      or sentiment shifts. Generate periodic stakeholder engagement reports
      summarizing feedback received and actions taken. Maintain accessible channels
      for external stakeholders to report AI-related concerns.
    tools:
      - servicenow
      - zendesk
      - datadog
      - grafana

