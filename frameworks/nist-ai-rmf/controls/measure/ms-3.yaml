id: ms-3
family: measure
title: "Measure 3 — Mechanisms for tracking identified AI risks over time are in place"
class: AI-RMF

statement:
  prose: >-
    Mechanisms for tracking identified AI risks over time are in place. Continuous
    monitoring of AI system performance and risk indicators enables timely detection
    of changes in risk profiles.

guidance:
  prose: >-
    Organizations should implement continuous monitoring and tracking mechanisms for
    AI risks throughout the operational lifecycle. Risk tracking should cover model
    performance degradation (drift), changes in data distributions, evolving threat
    landscapes, and shifts in the operating context. Monitoring should include both
    automated technical indicators (model accuracy, latency, resource consumption,
    fairness metrics) and human-reported signals (user complaints, incident reports,
    stakeholder feedback). Tracking mechanisms should maintain historical records
    that enable trend analysis and early warning detection. Risk tracking data should
    feed into the organization's risk register and trigger reassessment when
    predefined thresholds are breached. Organizations should establish clear
    escalation procedures for risk tracking alerts.

references:
  - citation: "NIST AI Risk Management Framework (AI RMF 1.0), MEASURE 3"
    url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement comprehensive AI system monitoring as a platform service. Deploy
      model monitoring agents that track performance metrics, data drift, concept
      drift, and prediction distribution changes in real time. Integrate monitoring
      data into centralized observability platforms. Provide drift detection
      algorithms and anomaly detection capabilities as reusable platform components.
      Implement automated alerting pipelines that notify responsible teams when
      risk indicators cross thresholds. Maintain long-term metric storage for
      trend analysis and regulatory reporting.
    tools:
      - evidently-ai
      - whylogs
      - prometheus
      - grafana
      - datadog
      - mlflow

  devsecops:
    prose: >-
      Implement monitoring-as-code patterns where monitoring configurations are
      version-controlled alongside AI model code. Deploy monitoring updates
      automatically through CI/CD pipelines when models are updated. Include
      monitoring validation tests in the pipeline to ensure coverage. Implement
      automated rollback triggers based on monitoring thresholds. Track monitoring
      coverage as a quality metric.
    tools:
      - gitlab-ci
      - evidently-ai
      - prometheus-rules
      - terraform
      - monitoring-as-code

  secops:
    prose: >-
      Operate centralized AI risk monitoring dashboards. Triage and investigate
      monitoring alerts for AI systems. Maintain AI risk trend reports and present
      findings to risk governance committees. Correlate AI monitoring alerts with
      security events to detect potential adversarial activity. Conduct periodic
      reviews of monitoring coverage and effectiveness.
    tools:
      - datadog
      - grafana
      - splunk
      - pagerduty
      - risk-register

