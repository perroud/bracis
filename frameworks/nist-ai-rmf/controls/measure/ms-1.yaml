id: ms-1
family: measure
title: "Measure 1 — Appropriate methods and metrics are identified and applied to measure AI risks and trustworthiness"
class: AI-RMF

statement:
  prose: >-
    Appropriate methods and metrics are identified and applied to measure AI risks
    and trustworthiness characteristics including validity, reliability, safety,
    fairness, security, resilience, accountability, transparency, explainability,
    interpretability, and privacy.

guidance:
  prose: >-
    Organizations should establish a comprehensive measurement framework for AI
    trustworthiness. This framework should include quantitative and qualitative
    metrics across all trustworthiness characteristics defined by the AI RMF.
    Measurement methods should be appropriate to the AI system type, risk level,
    and deployment context. Metrics should be validated for relevance and reliability,
    with clear thresholds that trigger risk management actions. Organizations should
    adopt established measurement standards where available and develop custom
    metrics where gaps exist. The measurement framework should be documented,
    including the rationale for metric selection, measurement methodology, data
    sources, and interpretation guidance. Measurement results should be comparable
    across time to support trend analysis and continuous improvement.

references:
  - citation: "NIST AI Risk Management Framework (AI RMF 1.0), MEASURE 1"
    url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a standardized AI metrics collection and reporting framework within
      the platform. Provide pre-built metric calculators for common trustworthiness
      characteristics (accuracy, fairness, robustness, explainability). Integrate
      model monitoring tools that continuously collect performance and fairness
      metrics in production. Expose metrics through dashboards and APIs for
      consumption by governance and oversight functions. Provide metric threshold
      configuration that triggers automated alerts and governance reviews.
    tools:
      - mlflow
      - prometheus
      - grafana
      - fairlearn
      - shap
      - lime

  devsecops:
    prose: >-
      Embed trustworthiness metric evaluation into CI/CD pipelines as mandatory
      stages. Implement automated benchmarking that measures model performance,
      fairness, and robustness against defined thresholds. Fail pipelines when
      trustworthiness metrics fall below acceptable levels. Generate metric reports
      as pipeline artifacts for review and audit. Track metric trends across
      model versions to detect degradation.
    tools:
      - gitlab-ci
      - mlflow
      - fairlearn
      - adversarial-robustness-toolbox
      - great-expectations

  secops:
    prose: >-
      Monitor trustworthiness metrics in production and alert on threshold
      violations. Implement anomaly detection on metric trends to catch gradual
      degradation. Generate periodic trustworthiness reports for each AI system.
      Track metric history to support trend analysis and regulatory reporting.
      Investigate and document root causes of metric threshold breaches.
    tools:
      - datadog
      - grafana
      - prometheus
      - elastic-siem

