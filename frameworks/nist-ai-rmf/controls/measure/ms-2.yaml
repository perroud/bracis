id: ms-2
family: measure
title: "Measure 2 — AI systems are evaluated for trustworthy characteristics"
class: AI-RMF

statement:
  prose: >-
    AI systems are evaluated for trustworthy characteristics. Evaluations are
    conducted by independent teams or entities where feasible and are documented
    for accountability.

guidance:
  prose: >-
    Organizations should conduct systematic evaluations of AI systems against
    trustworthiness characteristics throughout the lifecycle. Evaluations should
    be performed by individuals or teams with appropriate expertise and, where
    feasible, independence from the development team. Evaluation activities include
    testing for accuracy and reliability across diverse conditions, assessing
    fairness across demographic groups, testing for adversarial robustness, evaluating
    explainability of outputs, verifying privacy protections, and assessing safety
    under failure conditions. Evaluation results should be documented in standardized
    formats (e.g., model cards, audit reports) and made available to decision-makers.
    Red-teaming and adversarial testing should be employed for higher-risk AI systems.
    Evaluation criteria and results should be reviewed periodically and updated as
    the AI system and its operating context evolve.

references:
  - citation: "NIST AI Risk Management Framework (AI RMF 1.0), MEASURE 2"
    url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated evaluation pipelines within the platform that run
      comprehensive trustworthiness test suites against AI models. Provide
      standardized evaluation environments (sandboxes) that enable independent
      testing without access to production data. Integrate red-team tooling
      and adversarial testing frameworks as platform capabilities. Generate
      structured evaluation reports (model cards) automatically from pipeline
      outputs. Enforce separation of evaluation roles from development roles
      through platform RBAC.
    tools:
      - mlflow
      - adversarial-robustness-toolbox
      - fairlearn
      - shap
      - model-cards
      - kubernetes-rbac

  devsecops:
    prose: >-
      Implement independent evaluation stages in the CI/CD pipeline that are
      owned by a separate team from the development team. Include automated
      red-team testing for AI models above a defined risk threshold. Generate
      and archive model evaluation reports as pipeline artifacts. Implement
      evaluation checkpoints that require explicit approval from independent
      reviewers before promotion to production. Track evaluation coverage and
      flag gaps in trustworthiness testing.
    tools:
      - gitlab-ci
      - adversarial-robustness-toolbox
      - model-cards
      - compliance-pipelines
      - merge-request-approvals

  secops:
    prose: >-
      Conduct periodic independent evaluations of production AI systems. Implement
      continuous testing in production through canary evaluations and shadow
      scoring. Monitor for discrepancies between evaluation results and production
      behavior. Maintain an evaluation schedule and track completion status.
      Archive all evaluation reports for audit and regulatory compliance.
    tools:
      - red-team-tools
      - datadog
      - grafana
      - audit-management

