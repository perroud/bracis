id: mg-4
family: manage
title: "Manage 4 — Risk treatments, including response and recovery, and communication plans for the identified and measured AI risks are documented and monitored regularly"
class: AI-RMF

statement:
  prose: >-
    Risk treatments, including response and recovery, and communication plans for
    the identified and measured AI risks are documented and monitored regularly.
    Incident response and recovery procedures are established and tested.

guidance:
  prose: >-
    Organizations should maintain documented risk treatment plans that include
    specific response and recovery procedures for AI-related incidents. Risk
    treatments should address the range of potential AI failures including model
    malfunction, adversarial attacks, data breaches involving AI systems, biased
    outcomes causing harm, and safety-critical failures. Response plans should
    define roles and responsibilities, communication protocols for internal and
    external stakeholders, containment procedures, and recovery steps. Recovery
    plans should address system restoration, impact assessment, root cause analysis,
    and preventive measures. Communication plans should include notification
    requirements for affected individuals, regulators, and the public where
    appropriate. Plans should be regularly tested through tabletop exercises and
    simulations, and updated based on lessons learned from exercises and actual
    incidents.

references:
  - citation: "NIST AI Risk Management Framework (AI RMF 1.0), MANAGE 4"
    url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated incident response capabilities for AI systems in the
      platform layer. Deploy automated rollback and recovery mechanisms triggered
      by monitoring alerts. Implement kill switches and feature flags that enable
      rapid AI system deactivation. Provide runbook automation for common AI
      incident scenarios. Maintain disaster recovery configurations for AI
      infrastructure including model artifacts, training data references, and
      configuration state. Implement automated notification systems for stakeholder
      communication during AI incidents.
    tools:
      - backstage-catalog
      - argo-rollouts
      - feature-flags
      - pagerduty
      - runbook-automation
      - disaster-recovery

  devsecops:
    prose: >-
      Maintain incident response playbooks as code alongside AI system repositories.
      Implement automated rollback pipelines that can restore previous model versions
      rapidly. Include recovery testing in CI/CD pipelines through chaos engineering
      practices. Maintain deployment history and artifact archives that enable
      point-in-time recovery. Implement post-incident review workflows that
      capture lessons and generate improvement actions.
    tools:
      - gitlab-ci
      - argo-rollouts
      - chaos-engineering
      - incident-playbooks
      - artifact-management

  secops:
    prose: >-
      Operate AI incident response processes including detection, triage,
      containment, eradication, and recovery. Maintain AI-specific incident
      response plans and communication templates. Conduct regular incident
      response exercises focused on AI failure scenarios. Track incident metrics
      including response time, recovery time, and impact. Produce post-incident
      reports and track remediation actions to completion. Maintain
      communication channels for regulatory and public notification.
    tools:
      - pagerduty
      - servicenow
      - incident-management
      - communication-tools
      - tabletop-exercises

