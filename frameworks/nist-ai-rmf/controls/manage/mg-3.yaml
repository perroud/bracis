id: mg-3
family: manage
title: "Manage 3 — AI risks and benefits from third-party resources are regularly monitored, and risk controls are applied and documented"
class: AI-RMF

statement:
  prose: >-
    AI risks and benefits from third-party resources are regularly monitored,
    and risk controls are applied and documented. Third-party AI components
    are subject to the same risk management rigor as internally developed systems.

guidance:
  prose: >-
    Organizations must actively manage risks arising from third-party AI components,
    including pre-trained models, datasets, APIs, and cloud-based AI services.
    Third-party risk management extends the governance policies established in
    GOVERN 6 into operational practice. Organizations should continuously monitor
    third-party AI components for performance degradation, security vulnerabilities,
    bias, and compliance with contractual obligations. Risk controls should include
    input and output validation for third-party AI services, fallback mechanisms for
    service disruptions, and contractual protections for data handling and liability.
    Organizations should maintain the ability to replace or decommission third-party
    AI components when risks exceed acceptable levels. Regular audits of third-party
    AI components should verify continued alignment with organizational standards
    and risk tolerance.

references:
  - citation: "NIST AI Risk Management Framework (AI RMF 1.0), MANAGE 3"
    url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement third-party AI component monitoring as a platform service. Deploy
      proxy layers or API gateways that monitor input/output quality and performance
      of third-party AI services. Implement circuit breakers and fallback mechanisms
      for third-party AI service dependencies. Maintain an approved third-party AI
      component registry with automated vulnerability and compliance scanning.
      Track third-party component versions and alert on updates, deprecations,
      or security advisories.
    tools:
      - backstage-catalog
      - api-gateway
      - circuit-breaker
      - trivy
      - dependency-track
      - model-registry

  devsecops:
    prose: >-
      Include third-party AI component scanning in CI/CD pipelines. Implement
      automated tests that validate third-party AI service behavior against
      expected baselines. Use dependency management tools to track and update
      third-party AI components. Implement contract testing for third-party
      AI APIs. Require vendor risk assessments as documentation artifacts
      before integrating new third-party AI components.
    tools:
      - gitlab-ci
      - trivy
      - dependency-scanning
      - contract-testing
      - vendor-assessment

  secops:
    prose: >-
      Monitor third-party AI service SLAs and performance baselines. Alert on
      deviations from expected behavior. Track third-party vulnerability disclosures
      and assess impact on the organization. Conduct periodic vendor security
      assessments. Maintain incident response procedures specific to third-party
      AI component failures. Document third-party risk controls and audit results.
    tools:
      - datadog
      - pagerduty
      - vendor-management
      - risk-register

