id: mg-1
family: manage
title: "Manage 1 — AI risks based on assessments and other analytical output from the Map and Measure functions are prioritized, responded to, and managed"
class: AI-RMF

statement:
  prose: >-
    AI risks based on assessments and other analytical output from the Map and
    Measure functions are prioritized, responded to, and managed. Risk management
    is proactive, responsive, and adapted to the pace of AI system changes.

guidance:
  prose: >-
    Organizations should implement systematic processes for prioritizing and
    responding to identified AI risks. Prioritization should be based on the
    likelihood and impact assessments from the Map function and the measurement
    data from the Measure function. Risk responses may include mitigation (reducing
    likelihood or impact), transfer (sharing risk through insurance or contracts),
    avoidance (not deploying the AI system), or acceptance (acknowledging the risk
    with appropriate documentation). The risk management approach should be
    proportional to the risk level and responsive to changes in the risk profile.
    Organizations should maintain risk treatment plans that document the chosen
    response, responsible parties, timelines, and success criteria. Risk
    management decisions should be documented and communicated to relevant
    stakeholders.

references:
  - citation: "NIST AI Risk Management Framework (AI RMF 1.0), MANAGE 1"
    url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated risk response capabilities in the platform layer.
      Configure automated actions triggered by risk thresholds: traffic shifting,
      model rollback, feature flag disabling, or circuit breaking. Provide a
      risk management workflow engine that tracks risk treatment plans from
      identification through resolution. Integrate risk prioritization into
      the platform's service health dashboards. Implement graduated deployment
      strategies (canary, blue-green) that enable rapid risk response.
    tools:
      - backstage-catalog
      - argo-rollouts
      - feature-flags
      - circuit-breaker
      - risk-register

  devsecops:
    prose: >-
      Implement automated rollback capabilities in CI/CD pipelines triggered by
      risk threshold breaches. Use feature flags to enable rapid risk response
      without full redeployments. Implement risk-driven deployment strategies
      that progressively expand exposure based on monitoring results. Maintain
      risk treatment plans as tracked issues linked to AI system repositories.
      Use pipeline automation to enforce risk-based deployment gates.
    tools:
      - gitlab-ci
      - argo-rollouts
      - feature-flags
      - issue-tracking
      - deployment-gates

  secops:
    prose: >-
      Operate AI risk response procedures including escalation, containment,
      and remediation workflows. Maintain prioritized risk registers with
      treatment status tracking. Coordinate risk response across technical
      and business stakeholders. Generate risk management status reports for
      governance committees. Conduct post-response reviews to assess
      effectiveness and capture lessons learned.
    tools:
      - servicenow
      - pagerduty
      - risk-register
      - incident-management

