id: mg-2
family: manage
title: "Manage 2 — Strategies to maximize AI benefits and minimize negative impacts are planned, prepared, implemented, documented, and informed by input from relevant AI actors"
class: AI-RMF

statement:
  prose: >-
    Strategies to maximize AI benefits and minimize negative impacts are planned,
    prepared, implemented, documented, and informed by input from relevant AI
    actors. Post-deployment AI system monitoring plans are implemented.

guidance:
  prose: >-
    Organizations should develop and execute comprehensive strategies that optimize
    the balance between AI benefits and risks. Strategies should address the full
    AI lifecycle and include specific actions for benefit maximization (performance
    optimization, user experience improvement, positive societal impact) alongside
    risk minimization (bias mitigation, safety assurance, privacy protection).
    Post-deployment monitoring is essential for validating that intended benefits
    are realized and negative impacts remain within acceptable bounds. Monitoring
    plans should define key performance and risk indicators, monitoring frequency,
    responsible parties, and escalation triggers. Strategies should be informed by
    stakeholder input and updated based on monitoring outcomes. Documentation should
    be sufficient to support accountability and regulatory compliance.

references:
  - citation: "NIST AI Risk Management Framework (AI RMF 1.0), MANAGE 2"
    url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement end-to-end AI system lifecycle management through the platform.
      Provide post-deployment monitoring as a standard platform capability
      automatically provisioned with every AI deployment. Implement A/B testing
      and experimentation infrastructure for validating benefit optimization
      strategies. Provide tools for continuous model improvement including
      automated retraining pipelines, data quality monitoring, and performance
      benchmarking. Surface benefit and impact metrics alongside risk metrics
      in unified dashboards.
    tools:
      - mlflow
      - backstage-catalog
      - grafana
      - prometheus
      - argo-rollouts
      - feature-flags

  devsecops:
    prose: >-
      Implement continuous deployment pipelines that support iterative improvement
      of AI systems. Include benefit metrics alongside risk metrics in pipeline
      quality gates. Implement automated retraining and redeployment workflows
      triggered by performance degradation. Use experimentation frameworks to
      validate improvements before broad deployment. Maintain strategy documentation
      as versioned artifacts in the repository.
    tools:
      - gitlab-ci
      - mlflow
      - dvc
      - experimentation-framework

  secops:
    prose: >-
      Monitor post-deployment AI system performance against benefit and risk
      targets. Generate periodic benefit realization reports. Alert on negative
      impact indicators. Coordinate with development teams on remediation when
      monitoring reveals underperformance or negative impacts. Maintain
      documentation of monitoring outcomes for accountability.
    tools:
      - datadog
      - grafana
      - servicenow
      - reporting-tools

