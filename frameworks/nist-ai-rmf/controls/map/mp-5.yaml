id: mp-5
family: map
title: "Map 5 — Likelihood and impact of each identified AI risk is assessed"
class: AI-RMF

statement:
  prose: >-
    Likelihood and impact of each identified AI risk is assessed. Risk assessment
    results are used to prioritize risk management activities and resource
    allocation.

guidance:
  prose: >-
    For each identified AI risk, organizations should assess both the likelihood
    of occurrence and the potential impact if the risk materializes. Likelihood
    assessment should consider factors such as the maturity of the AI technology,
    the quality of training data, the robustness of testing performed, and the
    threat landscape. Impact assessment should evaluate consequences across multiple
    dimensions including safety, privacy, fairness, economic harm, and reputational
    damage. The combination of likelihood and impact determines the risk priority
    level, which guides resource allocation for risk mitigation. Organizations should
    use consistent risk scoring methodologies and calibrate assessments through
    expert judgment, historical data, and simulation where available.

references:
  - citation: "NIST AI Risk Management Framework (AI RMF 1.0), MAP 5"
    url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement risk scoring tools within the platform that calculate composite risk
      scores from likelihood and impact inputs. Provide risk heatmap visualizations
      that help prioritize across the AI system portfolio. Integrate automated
      risk indicators that contribute to likelihood assessment (model drift rates,
      data quality scores, vulnerability counts). Enable scenario modeling tools
      that help teams assess potential impact of AI system failures.
    tools:
      - risk-register
      - grafana
      - backstage-catalog
      - model-monitoring

  devsecops:
    prose: >-
      Implement automated risk indicators in the pipeline that feed into likelihood
      assessments (test coverage, code quality, dependency vulnerabilities). Use
      pipeline-generated metrics to update risk scores automatically. Require risk
      prioritization documentation before deploying AI systems with high composite
      risk scores. Implement deployment gates that prevent production release when
      risk scores exceed thresholds.
    tools:
      - gitlab-ci
      - sonarqube
      - risk-scoring
      - deployment-gates

  secops:
    prose: >-
      Maintain real-time risk dashboards that display likelihood and impact
      assessments for all AI systems. Monitor leading risk indicators and update
      likelihood assessments dynamically based on operational data. Conduct tabletop
      exercises to validate impact assessments for critical AI systems. Generate
      risk prioritization reports for leadership decision-making.
    tools:
      - risk-register
      - grafana
      - servicenow
      - tabletop-exercises

