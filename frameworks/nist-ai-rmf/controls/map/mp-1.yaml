id: mp-1
family: map
title: "Map 1 — Context is established and understood"
class: AI-RMF

statement:
  prose: >-
    Context is established and understood. The intended purposes, potentially
    beneficial uses, context-specific laws and regulations, and the organization's
    risk tolerance are identified and documented.

guidance:
  prose: >-
    Before developing or deploying an AI system, organizations must establish a clear
    understanding of the context in which it will operate. This includes defining the
    intended purpose and use cases, identifying the stakeholders and affected
    populations, understanding applicable laws and regulations, and documenting the
    organization's risk tolerance for the specific application. Context mapping should
    consider the sociotechnical environment, including how humans will interact with
    the AI system, the consequences of system failures, and the availability of
    alternatives. Organizations should document assumptions about the deployment
    context and validate them through stakeholder engagement. The context
    assessment should be revisited when conditions change.

references:
  - citation: "NIST AI Risk Management Framework (AI RMF 1.0), MAP 1"
    url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Require AI system context documentation as a prerequisite for platform
      resource provisioning. Implement standardized context assessment templates
      in the service catalog that capture intended use, target users, regulatory
      requirements, and risk tolerance. Enforce that every AI project registered
      on the platform includes a completed context assessment. Provide tooling to
      link AI projects to their regulatory context and applicable compliance
      frameworks automatically based on deployment region and industry classification.
    tools:
      - backstage-catalog
      - gitops
      - model-cards

  devsecops:
    prose: >-
      Incorporate context documentation as a mandatory artifact in the AI development
      pipeline. Use merge request templates that require context assessment completion
      before AI model development begins. Implement pipeline checks that validate
      the presence and completeness of context documentation. Maintain context
      assessments as versioned documents alongside the AI system codebase.
    tools:
      - gitlab-ci
      - merge-request-templates
      - model-cards

  secops:
    prose: >-
      Review AI system context assessments as part of security and risk reviews.
      Monitor for changes in regulatory requirements or operating context that may
      affect deployed AI systems. Maintain a registry of AI systems mapped to their
      regulatory and operational contexts. Generate alerts when regulatory changes
      affect AI systems in the inventory.
    tools:
      - servicenow
      - compliance-tracking
      - risk-register

legal_references:
  - framework_id: eu-ai-act
    articles: ["Article 6", "Article 9"]
    relationship: mapped
  - framework_id: nist-800-53-rev5
    articles: ["RA-1", "RA-3"]
    relationship: mapped
