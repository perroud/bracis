id: mp-4
family: map
title: "Map 4 — Risks and benefits of mapped AI systems are assessed and documented"
class: AI-RMF

statement:
  prose: >-
    Risks and benefits of mapped AI systems are assessed and documented.
    Technical, societal, and organizational risks are identified for each
    AI system based on its context and categorization.

guidance:
  prose: >-
    Building on the context established in MAP 1-3, organizations should conduct
    systematic risk assessments for each AI system. Risk identification should
    cover technical risks (model failure, data quality, adversarial attacks),
    societal risks (bias, discrimination, privacy violation, safety hazards),
    and organizational risks (reputational damage, legal liability, operational
    disruption). The assessment should consider risks across the full AI lifecycle
    including data collection, model training, deployment, and operation. Risk
    documentation should capture the risk description, likelihood, potential impact,
    affected stakeholders, and existing mitigations. Organizations should use
    structured risk assessment methodologies and maintain risk registers that
    enable tracking and comparison across AI systems.

references:
  - citation: "NIST AI Risk Management Framework (AI RMF 1.0), MAP 4"
    url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a centralized AI risk register within the platform that links to
      AI system entries in the service catalog. Provide standardized risk assessment
      templates and scoring methodologies. Enable automated risk scoring based on
      AI system metadata (data sensitivity, model complexity, deployment criticality).
      Integrate threat modeling tools adapted for AI-specific threats (data poisoning,
      model extraction, adversarial examples). Aggregate risk data across the AI
      portfolio to identify systemic risks.
    tools:
      - backstage-catalog
      - risk-register
      - threat-modeling
      - model-registry

  devsecops:
    prose: >-
      Include AI-specific threat modeling as a mandatory development phase. Implement
      automated security scanning for AI models including adversarial robustness
      testing. Require risk assessment documentation to be updated with each
      significant model change. Use pipeline stages to validate that risk assessments
      are current before deployment. Integrate AI-specific vulnerability scanners
      into the CI/CD pipeline.
    tools:
      - gitlab-ci
      - adversarial-robustness-toolbox
      - model-scanning
      - threat-modeling

  secops:
    prose: >-
      Continuously monitor deployed AI systems against their documented risk
      profiles. Implement anomaly detection on AI system behavior to identify
      emerging risks. Track risk metrics over time and alert on risk threshold
      breaches. Conduct periodic risk reassessments triggered by environmental
      changes, incidents, or time intervals. Maintain threat intelligence feeds
      specific to AI system vulnerabilities.
    tools:
      - risk-register
      - datadog
      - splunk
      - threat-intelligence

