id: mp-3
family: map
title: "Map 3 — AI benefits and costs for individuals, groups, communities, organizations, and society are assessed"
class: AI-RMF

statement:
  prose: >-
    AI benefits and costs for individuals, groups, communities, organizations,
    and society are assessed. The assessment considers both direct and indirect
    impacts across the AI system lifecycle.

guidance:
  prose: >-
    Organizations should conduct comprehensive benefit-cost assessments for AI
    systems that extend beyond financial considerations. Assessments should evaluate
    impacts on individuals, communities, and society, including effects on human
    autonomy, privacy, safety, and civil liberties. Both intended benefits and
    unintended negative consequences should be analyzed. The assessment should
    consider differential impacts on various population groups, with particular
    attention to vulnerable or historically marginalized communities. Costs should
    include environmental impacts such as energy consumption and resource usage
    for AI training and operation. Organizations should document the methodology
    used for benefit-cost assessment and make findings available to decision-makers
    and affected stakeholders.

references:
  - citation: "NIST AI Risk Management Framework (AI RMF 1.0), MAP 3"
    url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Provide impact assessment tooling as part of the AI development platform.
      Implement resource consumption tracking for AI workloads to quantify
      environmental costs (compute hours, energy usage, carbon footprint).
      Integrate fairness evaluation tools that measure differential impacts across
      population groups. Provide templates and calculators for structured
      benefit-cost analysis. Surface impact metrics in the service catalog alongside
      AI system entries.
    tools:
      - backstage-catalog
      - carbon-footprint-tracker
      - fairlearn
      - codecarbon
      - mlflow

  devsecops:
    prose: >-
      Require benefit-cost assessment documentation as a pipeline artifact for AI
      model deployments. Implement automated metrics collection for AI system resource
      consumption during training and inference. Include fairness evaluation reports
      as mandatory pipeline outputs. Use pipeline stages to validate that impact
      assessments are current and complete before production deployment.
    tools:
      - gitlab-ci
      - codecarbon
      - fairlearn
      - model-cards

  secops:
    prose: >-
      Monitor production AI systems for unexpected cost increases or benefit
      degradation. Track resource consumption trends and alert on anomalies.
      Generate periodic impact reports comparing projected benefits against
      realized outcomes. Monitor for disparate impact patterns across different
      user populations.
    tools:
      - datadog
      - grafana
      - prometheus
      - cost-management

