id: mp-2
family: map
title: "Map 2 — Categorization of the AI system is performed"
class: AI-RMF

statement:
  prose: >-
    Categorization of the AI system is performed. The AI system is classified
    according to its risk level, capabilities, data requirements, and deployment
    context.

guidance:
  prose: >-
    AI systems should be categorized based on their risk profile, which considers
    the potential impact on individuals and society, the level of autonomy in
    decision-making, the sensitivity of data processed, and the criticality of the
    application domain. Categorization informs the level of rigor required for
    risk management activities. Higher-risk systems demand more extensive testing,
    monitoring, and oversight. The categorization should account for the AI system's
    technical characteristics, including the type of AI technology used (e.g., machine
    learning, generative AI, rule-based systems), the complexity of the model, and
    the transparency of its decision-making process. Categorization should be reviewed
    when the system is modified or its deployment context changes.

references:
  - citation: "NIST AI Risk Management Framework (AI RMF 1.0), MAP 2"
    url: "https://www.nist.gov/artificial-intelligence/risk-management-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement an AI system classification framework within the platform that
      automatically assigns risk tiers based on metadata such as data sensitivity,
      decision autonomy level, and deployment domain. Enforce tiered governance
      controls through the platform based on the classification: higher-risk systems
      require additional approvals, monitoring, and testing. Provide classification
      questionnaires as part of the AI project onboarding workflow. Map risk tiers
      to platform resource policies and access controls.
    tools:
      - backstage-catalog
      - open-policy-agent
      - model-registry
      - risk-classification

  devsecops:
    prose: >-
      Implement pipeline configurations that adjust rigor based on AI system
      classification. Higher-risk systems should have additional testing stages,
      stricter approval requirements, and more comprehensive documentation gates.
      Use project labels or metadata to drive classification-aware pipeline behavior.
      Require classification documentation as a mandatory artifact before the
      first pipeline execution.
    tools:
      - gitlab-ci
      - compliance-pipelines
      - project-labels

  secops:
    prose: >-
      Maintain an inventory of AI systems annotated with their risk classifications.
      Apply monitoring intensity proportional to the risk tier: high-risk systems
      receive continuous monitoring, while lower-risk systems may have periodic
      reviews. Generate reports on the distribution of AI systems across risk
      categories. Alert when an AI system's operational characteristics suggest
      its risk classification may need updating.
    tools:
      - servicenow
      - risk-register
      - datadog
      - grafana

