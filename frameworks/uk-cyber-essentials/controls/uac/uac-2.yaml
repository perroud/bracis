id: uac-2
family: uac
title: "Administrative Account Controls and Separation of Duties"
class: UKCE
baselines: [cyber-essentials, cyber-essentials-plus]

statement:
  prose: >-
    Administrative accounts must only be used to perform administrative activities
    and must not be used for general business tasks such as email, web browsing, or
    document editing. Each administrator must have a separate standard user account
    for day-to-day activities. Administrative accounts must not be granted access to
    email or the internet directly. The number of administrative accounts must be
    kept to the minimum necessary. Administrative account credentials must be unique
    and not shared between individuals.

guidance:
  prose: >-
    Administrative accounts are high-value targets for attackers because they typically
    have unrestricted access to systems and data. Separating administrative activities
    from day-to-day tasks ensures that compromise of a user's standard account does not
    immediately grant administrative access. Administrators should use a dedicated
    administrative workstation or Privileged Access Workstation (PAW) for administrative
    tasks wherever possible. The use of administrative accounts should be logged and
    monitored with greater scrutiny than standard accounts.

references:
  - citation: "Cyber Essentials Requirements for IT Infrastructure, Section: User Access Control"
    url: "https://www.ncsc.gov.uk/cyberessentials/overview"
  - citation: "NCSC Guidance: Secure System Administration"
    url: "https://www.ncsc.gov.uk/collection/secure-system-administration"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement separate administrative accounts with naming conventions that clearly
      distinguish them from standard accounts (e.g., adm-username). Deploy Privileged
      Access Workstations (PAWs) or secure admin jump boxes for administrative tasks.
      Configure conditional access policies that restrict administrative accounts to
      managed devices and approved network locations only. Implement Privileged Identity
      Management (PIM) with time-limited role activation and approval workflows. Block
      administrative accounts from accessing email, web browsers, and general productivity
      applications through application control policies.
    tools:
      - azure-ad-pim
      - cyberark
      - beyondtrust
      - hashicorp-vault
      - intune
      - aws-sso

  devsecops:
    prose: >-
      Enforce separation of duties in version control and CI/CD systems — separate
      admin roles for repository management, pipeline configuration, and deployment
      approvals. Implement merge request approval rules that prevent administrators
      from self-approving changes. Use service accounts with minimal permissions for
      pipeline execution rather than personal administrative credentials. Audit CI/CD
      system permissions regularly to ensure administrative access is justified and
      current.
    tools:
      - gitlab-ci
      - gitlab-rbac
      - open-policy-agent
      - hashicorp-vault

  secops:
    prose: >-
      Monitor all administrative account activity with enhanced logging and alerting.
      Detect and alert on administrative accounts used for non-administrative activities
      (email access, web browsing, document editing). Track administrative account
      creation and deletion with mandatory approval workflows. Conduct monthly reviews
      of administrative account membership and remove unnecessary access promptly.
      Implement User and Entity Behaviour Analytics (UEBA) to detect anomalous
      administrative activity.
    tools:
      - splunk
      - elastic-siem
      - microsoft-sentinel
      - crowdstrike-falcon
      - cyberark-pta

