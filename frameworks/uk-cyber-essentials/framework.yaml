certification_levels:
  - id: cyber-essentials
    title: "Cyber Essentials"
    description: >-
      Self-assessment certification verified by an accredited Certification Body.
      Organisations complete an online questionnaire demonstrating they meet the
      five technical control themes. Provides a baseline level of assurance.
  - id: cyber-essentials-plus
    title: "Cyber Essentials Plus"
    description: >-
      Hands-on technical verification performed by an accredited Certification Body.
      Includes vulnerability scanning, configuration review, and simulated phishing
      exercises to confirm the controls are effectively implemented. Provides a
      higher level of assurance than the self-assessment route.

