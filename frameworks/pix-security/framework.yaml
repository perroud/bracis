id: pix-security
title: "Resolucao BCB n. 1/2020 -- Regulamento do Pix (Seguranca e Requisitos Tecnicos)"
short_title: "Pix Security"
version: "1/2020 (consolidado)"
publication_date: "2020-08-12"
last_updated: "2024-01-01"
effective_date: "2020-11-16"
authority:
  name: "Banco Central do Brasil"
  acronym: "BCB"
  country: "BR"
  url: "https://www.bcb.gov.br"
type: resolution
scope: financial
mandatory: true
original_language: pt-br
available_languages: [pt-br]
industries:
  - banking
  - payment-services
  - fintech
  - digital-wallets
  - financial-services
regions:
  - brazil
techstacks:
  - platform-engineering
  - devsecops
  - secops
