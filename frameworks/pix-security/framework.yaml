url: "https://www.bcb.gov.br/estabilidadefinanceira/exibenormativo?tipo=Resolu%C3%A7%C3%A3o%20BCB&numero=1"
control_families:
  - id: disp-gerais
    title: "Disposicoes Gerais"
    description: "Objeto, definicoes, arranjo Pix, participantes e papel do BCB como gestor do arranjo"
    articles: "art. 1 ao art. 5"
    control_count: 4
  - id: seg-spi
    title: "Seguranca do SPI"
    description: "Sistema de Pagamentos Instantaneos -- criptografia, assinatura digital, DICT, integridade de mensagens e seguranca da RSFN"
    articles: "art. 6 ao art. 10"
    control_count: 5
  - id: authn-authz
    title: "Autenticacao e Autorizacao"
    description: "Autenticacao do pagador, chaves Pix, portabilidade e reivindicacao de chaves, consentimento do usuario"
    articles: "art. 11 ao art. 14"
    control_count: 4
  - id: antifraude
    title: "Antifraude e Gestao de Risco"
    description: "Motores antifraude, limites transacionais, bloqueio cautelar, marcacao de fraude, gestao de risco operacional"
    articles: "art. 15 ao art. 19"
    control_count: 5
  - id: med
    title: "MED -- Mecanismo Especial de Devolucao"
    description: "Procedimentos, prazos, bloqueio de valores, analise de fraude, devolucao e responsabilidades do PSP"
    articles: "art. 20 ao art. 24"
    control_count: 4
  - id: req-tecnicos
    title: "Requisitos Tecnicos de Conectividade"
    description: "RSFN, certificados ICP-Brasil, SLAs, disponibilidade 24x7, tempos de resposta e contingencia"
    articles: "art. 25 ao art. 29"
    control_count: 4
  - id: ux-qrcode
    title: "Experiencia do Usuario e QR Code"
    description: "Padroes QR Code, Pix Copia e Cola, jornada de pagamento, acessibilidade e requisitos de UX"
    articles: "art. 30 ao art. 32"
    control_count: 2
  - id: disp-finais
    title: "Disposicoes Finais"
    description: "Penalidades, vigencia, atualizacoes normativas e responsabilidades dos participantes"
    articles: "art. 33 ao art. 34"
    control_count: 2
related_frameworks:
  - framework_id: bcb-85
    relationship: complements
    description: >-
      A Resolucao BCB 85 complementa o regulamento do Pix ao estabelecer a politica de
      seguranca cibernetica que os PSPs (instituicoes de pagamento) participantes do Pix
      devem implementar.
  - framework_id: open-finance
    relationship: complements
    description: "O Open Finance complementa o Pix ao compartilhar chaves, dados cadastrais e informacoes de consentimento que podem ser usados para iniciacao de pagamentos via Pix."
  - framework_id: lgpd
    relationship: complements
    description: "A LGPD complementa o regulamento do Pix na protecao de dados pessoais vinculados a chaves Pix, dados transacionais e informacoes do DICT."
  - framework_id: bacen-4893
    relationship: complements
    description: "A Resolucao CMN 4.893 complementa ao exigir politica de seguranca cibernetica das instituicoes financeiras que participam do SPI como participantes diretos ou indiretos."
  - framework_id: bcb-44
    relationship: complements
    description: "A Resolucao BCB 44 complementa ao dispor sobre requisitos tecnicos e operacionais para funcionamento do SPI e do DICT."
