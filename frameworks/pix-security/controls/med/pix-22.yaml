id: pix-22
family: med
title: "Responsabilidades do PSP no MED e Penalidades"
class: PIX-SECURITY
baselines: [participantes-pix]
statement:
  prose: |
    Cada PSP participante do arranjo Pix tem responsabilidades específicas no MED. O PSP
    pagador é responsável por facilitar a abertura do processo e creditar os valores
    devolvidos ao pagador. O PSP recebedor é responsável pelo bloqueio tempestivo, pela
    análise e pela efetivação da devolução. O descumprimento de prazos ou procedimentos
    do MED sujeita o PSP a penalidades aplicadas pelo BCB, incluindo multas e restrições
    operacionais.
guidance:
  prose: |
    **Responsabilidades do PSP pagador:**
    1. Disponibilizar canal para relato de fraude (app, telefone, agencia).
    2. Registrar notificacao de infracicao no DICT em tempo habil.
    3. Acompanhar o processo ate a conclusao.
    4. Creditar valores devolvidos na conta do pagador imediatamente.
    5. Comunicar o resultado ao pagador (vitima) de forma clara.

    **Responsabilidades do PSP recebedor:**
    1. Bloquear recursos em ate 30 minutos apos notificacao.
    2. Analisar o caso em ate 7 dias corridos.
    3. Efetivar devolucao se procedente.
    4. Desbloquear valores se improcedente.
    5. Notificar o titular da conta em todas as etapas.
    6. Reportar marcacao de fraude no DICT se confirmada.

    **Penalidades por descumprimento:**
    - Multa por bloqueio tardio (apos 30 minutos).
    - Multa por analise fora do prazo (apos 7 dias).
    - Multa por nao reporte de marcacao de fraude.
    - Restricao operacional (limitacao de funcionalidades Pix).
    - Em casos graves: suspensao ou exclusao do arranjo.

    **Metricas de performance:**
    O BCB monitora o desempenho de cada PSP no MED e publica rankings periodicos.
implementation_guidance:
  platform_engineering:
    prose: |
      **SLAs automatizados:**
      1. Alarmes para prazos criticos: 30 minutos (bloqueio), 7 dias (analise).
      2. Escalonamento automatico para equipe de gestao quando prazo esta proximo.
      3. Dashboard de compliance MED com metricas por prazo e por tipo.
      4. API de reporte ao BCB com dados de MED agregados.

      **Conciliacao:**
      5. Reconciliacao diaria entre notificacoes recebidas e bloqueios efetivados.
      6. Reconciliacao entre bloqueios e devolucoes/desbloqueios.
      7. Deteccao de casos pendentes ou esquecidos.
    tools:
      - workflow-engine
      - alerting
      - reconciliation-engine
      - reporting-api
  devsecops:
    prose: |
      **Testes de SLA:**
      1. Testes de prazo: simular cenarios onde prazo e excedido.
      2. Testes de escalonamento: verificar que alertas sao disparados.
      3. Testes de reporte: validar formato de dados para o BCB.
      4. Testes de reconciliacao: detectar inconsistencias automaticamente.
    tools:
      - gitlab-ci
      - integration-testing
      - reporting-testing
  secops:
    prose: |
      **Gestao de conformidade MED:**
      1. Relatorio semanal de aderencia a SLAs do MED.
      2. Root cause analysis para casos de descumprimento de prazo.
      3. Plano de acao corretiva para deficiencias recorrentes.
      4. Preparacao para auditorias do BCB sobre o MED.
      5. Benchmarking com outros PSPs (metricas publicas do BCB).
    tools:
      - grc-platform
      - analytics-dashboard
      - audit-preparation
legal_references:
  - framework_id: bcb-44
    articles: ["art-23", "art-24"]
    relationship: implements
  - framework_id: bcb-85
    articles: ["art-21"]
    relationship: complements
