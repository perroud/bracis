id: pix-29
family: disp-finais
title: "Penalidades e Sancoes do Arranjo"
class: PIX-SECURITY
baselines: [participantes-pix]
statement:
  prose: |
    O BCB, na qualidade de gestor do arranjo Pix, pode aplicar penalidades aos PSPs
    participantes que descumprirem as regras do regulamento, incluindo multas pecuniárias,
    restrições operacionais (limitação de funcionalidades ou volumes), suspensão temporária
    e exclusão do arranjo. As penalidades são proporcionais à gravidade da infração, ao
    impacto sobre os usuários e ao histórico de conformidade do PSP.
guidance:
  prose: |
    **Tipos de penalidades:**

    1. **Multas pecuniarias:**
       - Aplicadas por descumprimento de SLAs, prazos do MED, falhas de seguranca.
       - Valores proporcionais ao porte do PSP e a gravidade da infracicao.
       - Multas recorrentes para infracoes nao corrigidas.

    2. **Restricoes operacionais:**
       - Limitacao de volume transacional.
       - Desabilitacao de funcionalidades especificas (Pix Saque, QR Code dinamico).
       - Obrigatoriedade de autenticacao reforcada para todas as transacoes.

    3. **Suspensao temporaria:**
       - Impedimento de novas transacoes Pix por periodo determinado.
       - Aplicada em casos graves (falha critica de seguranca, fraude sistematica).

    4. **Exclusao do arranjo:**
       - Remocao definitiva do participante.
       - Aplicada em casos extremos e reincidentes.

    **Gatilhos de penalidade:**
    - Indisponibilidade acima do limiar por periodo.
    - Atraso sistematico em bloqueios MED.
    - Falha em reportar marcacoes de fraude no DICT.
    - Descumprimento de requisitos de seguranca.
    - Nao conformidade com diretrizes de UX.
    - Cobranca de tarifas indevidas.

    **Processo sancionatorio:**
    O BCB notifica o PSP, concede prazo para defesa, analisa e decide. Decisoes podem
    ser contestadas em instancia administrativa.
implementation_guidance:
  platform_engineering:
    prose: |
      **Monitoramento preventivo:**
      1. Dashboard de conformidade com todos os KPIs que podem gerar penalidades.
      2. Alertas proativos quando metricas se aproximam de limites de penalidade.
      3. Automacao de coleta de evidencias de conformidade.
      4. API de reporte ao BCB com dados de conformidade em tempo real.

      **Remediacao automatizada:**
      5. Runbooks automatizados para resolver violacoes de SLA rapidamente.
      6. Auto-scaling preventivo para evitar indisponibilidade.
      7. Circuit breakers que preservam conformidade mesmo sob falha parcial.
    tools:
      - monitoring-stack
      - alerting
      - runbook-automation
      - reporting-api
  devsecops:
    prose: |
      **Prevencao de penalidades:**
      1. Quality gates no pipeline que bloqueiam deploys que podem causar violacao de SLA.
      2. Testes de conformidade automatizados como parte do CI/CD.
      3. Canary releases para detectar degradacao antes de impactar todo o trafego.
      4. Rollback automatico quando metricas de conformidade degradam.
    tools:
      - gitlab-ci
      - canary-deployment
      - rollback-automation
      - quality-gates
  secops:
    prose: |
      **Gestao de penalidades:**
      1. Registro de todas as penalidades recebidas e acoes corretivas.
      2. Root cause analysis para cada penalidade.
      3. Plano de acao corretiva com prazos e responsaveis.
      4. Acompanhamento de processos sancionatorios em andamento.
      5. Relatorio trimestral de conformidade para a diretoria e para o BCB.
    tools:
      - grc-platform
      - incident-management
      - compliance-tracker
      - reporting-dashboard
