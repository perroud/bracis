id: pix-30
family: disp-finais
title: "Vigencia e Atualizacoes do Regulamento"
class: PIX-SECURITY
baselines: [participantes-pix]
statement:
  prose: |
    O regulamento do Pix entra em vigor na data de sua publicação e é atualizado
    periodicamente pelo BCB conforme evolução do arranjo. Os PSPs participantes devem
    acompanhar as atualizações normativas, implementar as mudanças dentro dos prazos
    definidos pelo BCB e manter conformidade contínua com a versão vigente do regulamento.
    As atualizações podem incluir novos requisitos de segurança, novas funcionalidades
    obrigatórias, alterações em prazos e limites, e novas penalidades.
guidance:
  prose: |
    **Historico de evolucao do Pix:**
    Desde o lancamento em novembro de 2020, o BCB tem atualizado continuamente o
    regulamento do Pix, incluindo:
    - 2020: Lancamento do Pix com funcionalidades basicas
    - 2021: Pix Saque, Pix Troco, limites noturnos, MED
    - 2022: Pix Cobranca com vencimento, melhorias de seguranca
    - 2023: MED 2.0, melhorias antifraude, DICT enriquecido
    - 2024: Pix Automatico, Pix por aproximacao (NFC), novas regras antifraude

    **Obrigacoes do PSP quanto a atualizacoes:**
    1. Acompanhar comunicados e circulares do BCB sobre o Pix.
    2. Avaliar impacto de cada atualizacao em sistemas e processos.
    3. Implementar mudancas dentro do prazo definido pelo BCB.
    4. Homologar no ambiente de homologacao antes de ativar em producao.
    5. Comunicar ao BCB a conclusao da implementacao quando exigido.

    **Risco de nao-conformidade:**
    A nao implementacao de atualizacoes dentro do prazo resulta em penalidades.
    Atualizacoes de seguranca (ex: novos requisitos antifraude) tipicamente tem
    prazos mais curtos e penalidades mais severas.

    **Gestao de mudancas:**
    O PSP deve ter processo estruturado de gestao de mudancas regulatorias que
    garanta rastreabilidade desde a publicacao da norma ate a implementacao em producao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de atualizacoes:**
      1. Repositorio de normas com versionamento de cada atualizacao do regulamento.
      2. Feature flags para ativacao de novas funcionalidades conforme cronograma do BCB.
      3. Ambiente de homologacao atualizado com as especificacoes mais recentes do SPI.
      4. Pipeline de validacao de conformidade com especificacoes tecnicas do BCB.

      **Automacao:**
      5. Schema registry atualizado com versoes de mensagens ISO 20022 do SPI.
      6. Backward compatibility durante periodos de transicao entre versoes.
      7. Testes de regressao automatizados apos cada atualizacao regulatoria.
    tools:
      - feature-flags
      - schema-registry
      - test-automation
      - configuration-management
  devsecops:
    prose: |
      **Pipeline de conformidade:**
      1. Compliance checks automatizados que validam requisitos do regulamento vigente.
      2. Testes de aceitacao mapeados a cada artigo do regulamento.
      3. Compliance-as-Code: regras de conformidade versionadas em repositorio.
      4. Alertas quando novas versoes de especificacoes tecnicas do BCB sao publicadas.
    tools:
      - gitlab-ci
      - compliance-as-code
      - test-automation
      - monitoring-stack
  secops:
    prose: |
      **Gestao regulatoria:**
      1. Processo de monitoramento de atualizacoes do regulamento Pix.
      2. Impact assessment para cada atualizacao publicada.
      3. Cronograma de implementacao com marcos e responsaveis.
      4. Relatorio de conformidade com versao vigente do regulamento.
      5. Treinamento da equipe sobre mudancas regulatorias relevantes.
    tools:
      - grc-platform
      - regulatory-change-management
      - training-platform
      - compliance-tracker
legal_references:
