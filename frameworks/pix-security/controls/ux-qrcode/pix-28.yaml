id: pix-28
family: ux-qrcode
title: "Jornada de Pagamento e Requisitos de UX"
class: PIX-SECURITY
baselines: [participantes-pix]
statement:
  prose: |
    O PSP deve implementar a jornada de pagamento Pix conforme diretrizes de experiência
    do usuário definidas pelo BCB, garantindo clareza na apresentação de informações,
    acessibilidade para pessoas com deficiência, tempo de processamento perceptivelmente
    instantâneo, confirmação visual e sonora do pagamento, e uso obrigatório da marca
    Pix conforme manual de identidade visual do BCB. O PSP não pode adicionar etapas
    desnecessárias que dificultem ou desincentivem o uso do Pix.
guidance:
  prose: |
    **Diretrizes de UX do BCB para o Pix:**

    1. **Simplicidade:** A jornada de pagamento deve ter o minimo de etapas possivel.
       O BCB define jornadas padrao que o PSP deve seguir.

    2. **Transparencia:** Antes da confirmacao, o pagador deve visualizar:
       - Valor da transacao
       - Nome do recebedor
       - Instituicao do recebedor
       - Chave Pix utilizada

    3. **Confirmacao:** O pagador deve confirmar com acao explicita (botao, biometria).

    4. **Feedback:** Apos a confirmacao:
       - Tela de comprovante com EndToEndId, data/hora, valor, dados do recebedor.
       - Comprovante disponivel no historico de transacoes.
       - Notificacao push para o recebedor (credito na conta).

    5. **Marca Pix:**
       - Uso obrigatorio do logotipo e identidade visual do Pix conforme manual BCB.
       - Nao e permitido alterar cores, proporcoes ou elementos da marca.

    6. **Acessibilidade:**
       - Compatibilidade com leitores de tela (VoiceOver, TalkBack).
       - Contraste adequado para usuarios com baixa visao.
       - Fontes ajustaveis.

    7. **Nao-discriminacao:**
       - O PSP nao pode cobrar tarifas diferenciadas para Pix vs outros meios.
       - O PSP nao pode tornar o Pix menos acessivel que outros meios de pagamento.
implementation_guidance:
  platform_engineering:
    prose: |
      **Implementacao de UX:**
      1. Componentes de UI padronizados para jornada Pix (design system).
      2. Tela de confirmacao com todos os campos obrigatorios do BCB.
      3. Tela de comprovante com EndToEndId e dados completos da transacao.
      4. Sistema de notificacao push para pagador e recebedor.

      **Performance de UX:**
      5. Latencia percebida: feedback visual em < 1 segundo apos confirmacao.
      6. Skeleton screens e loading indicators durante processamento.
      7. Tratamento de erros com mensagens claras e acoes sugeridas.

      **Acessibilidade:**
      8. Suporte a leitores de tela em todos os fluxos Pix.
      9. Testes automatizados de acessibilidade (axe, Lighthouse).
      10. Modo de alto contraste e fontes ajustaveis.
    tools:
      - design-system
      - push-notification
      - accessibility-framework
      - ui-component-library
  devsecops:
    prose: |
      **Testes de UX:**
      1. Testes automatizados de jornada Pix (todos os fluxos).
      2. Testes de acessibilidade automatizados no pipeline (axe-core, Lighthouse).
      3. Testes de performance de UI: tempo de renderizacao de telas criticas.
      4. Testes de marca: verificar que logotipo Pix esta conforme manual BCB.
      5. Visual regression testing para detectar alteracoes nao intencionais.
    tools:
      - gitlab-ci
      - accessibility-testing
      - visual-regression
      - ui-testing
  secops:
    prose: |
      **Conformidade de UX:**
      1. Auditoria periodica de conformidade com diretrizes de UX do BCB.
      2. Monitoramento de reclamacoes de usuarios sobre jornada Pix.
      3. Verificacao de conformidade com manual de marca Pix.
      4. Teste de acessibilidade com usuarios reais (pessoas com deficiencia).
    tools:
      - ux-audit
      - complaint-management
      - accessibility-audit
legal_references:
