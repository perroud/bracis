id: pix-04
family: disp-gerais
title: "Papel do BCB como Instituidor e Gestor do Arranjo"
class: PIX-SECURITY
baselines: [participantes-pix]
statement:
  prose: |
    O Banco Central do Brasil atua como instituidor e gestor do arranjo de pagamentos
    instantâneos Pix, sendo responsável por definir as regras do arranjo, operar a
    infraestrutura centralizada (SPI e DICT), homologar participantes, monitorar a
    operação do ecossistema, aplicar penalidades e promover a evolução contínua do arranjo
    com foco em segurança, eficiência e inclusão financeira.
guidance:
  prose: |
    **Funcoes do BCB no arranjo:**
    1. **Regulamentacao:** Define e atualiza o regulamento, manuais e especificacoes
       tecnicas do Pix.
    2. **Operacao:** Opera o SPI (liquidacao) e o DICT (diretorio de chaves).
    3. **Homologacao:** Certifica que cada participante atende aos requisitos tecnicos
       e de seguranca antes de entrar em producao.
    4. **Monitoramento:** Acompanha em tempo real a operacao de todos os participantes,
       incluindo disponibilidade, tempos de resposta e volumes transacionais.
    5. **Fiscalizacao:** Aplica penalidades (multas, suspensao, exclusao) a participantes
       que descumprirem o regulamento.
    6. **Evolucao:** Conduz melhorias continuas no arranjo (Pix Saque, Pix Troco,
       Pix Automatico, Pix por aproximacao).

    **Implicacao pratica para PSPs:**
    Os participantes devem manter conformidade continua com as regras do arranjo. O BCB
    monitora metricas operacionais e pode aplicar sancoes automaticas por descumprimento
    de SLAs.
implementation_guidance:
  platform_engineering:
    prose: |
      **Interfaces com o BCB:**
      1. APIs de reporte operacional para envio de metricas ao BCB.
      2. Sistema de recepcao de comunicados e atualizacoes normativas do BCB.
      3. Integracao com ambiente de homologacao para recertificacao periodica.
      4. Canal seguro para comunicacao de incidentes ao BCB.

      **Observabilidade para conformidade:**
      5. Metricas de disponibilidade, latencia e erro rate alinhadas aos KPIs do BCB.
      6. Exportacao automatica de indicadores operacionais no formato exigido pelo BCB.
      7. Retencao de logs e metricas pelo periodo minimo exigido.
    tools:
      - api-gateway
      - prometheus
      - grafana
      - log-aggregation
  devsecops:
    prose: |
      **Atualizacao continua:**
      1. Processo agil para incorporar mudancas normativas do BCB no codigo.
      2. Feature branches para novas funcionalidades Pix definidas pelo BCB.
      3. Testes de regressao automatizados apos cada atualizacao do regulamento.
      4. Changelog mapeando mudancas no regulamento a alteracoes de codigo.
    tools:
      - gitlab-ci
      - feature-flags
      - changelog-automation
  secops:
    prose: |
      **Governanca regulatoria:**
      1. Acompanhamento sistematico de comunicados do BCB sobre o Pix.
      2. Gap analysis apos cada atualizacao do regulamento.
      3. Relatorio de conformidade periodico para a diretoria e para o BCB.
      4. Plano de remediacao para gaps identificados com prazos alinhados ao BCB.
    tools:
      - grc-platform
      - compliance-tracker
      - documentation-platform
legal_references:
  - framework_id: bcb-44
    articles: ["art-1", "art-2", "art-8"]
    relationship: implements
  - framework_id: bcb-85
    articles: ["art-17", "art-18"]
    relationship: complements
