id: sds-1
family: sds
title: "Secure Development Lifecycle"
class: KISMSP
baselines:
  - k-isms-p

statement:
  prose: |
    The organization shall establish and apply secure coding standards and
    a secure software development lifecycle (SDLC) for the development and
    acquisition of information systems. Security requirements shall be
    identified and documented during the requirements phase. Security
    reviews and testing shall be performed at each stage of development,
    and vulnerabilities identified during testing shall be remediated
    before deployment to production environments.

guidance:
  prose: |
    K-ISMS-P requires that security is integrated throughout the software
    development process, not treated as an afterthought. KISA auditors
    examine the organization's SDLC documentation, evidence of security
    reviews at each phase, and testing records. Secure coding standards
    must be based on recognized sources such as OWASP or KISA's own
    secure coding guidelines. Organizations that outsource development
    must ensure that third-party developers also follow approved secure
    coding standards and that security testing is performed before
    acceptance of deliverables.

references:
  - citation: "K-ISMS-P Certification Criteria, Section 2.8 — System Development Security"
    url: "https://isms.kisa.or.kr/"

implementation_guidance:
  platform_engineering:
    prose: |
      Provide standardized development environments with pre-configured
      security tooling. Offer golden path templates that include secure
      defaults for authentication, authorization, input validation, and
      cryptography. Implement centralized artifact repositories with
      vulnerability scanning. Enforce separation of development, staging,
      and production environments through infrastructure-as-code.
    tools:
      - backstage
      - gitlab
      - sonarqube
      - artifactory

  devsecops:
    prose: |
      Implement automated security scanning at every stage of the CI/CD
      pipeline including static analysis (SAST), dynamic analysis (DAST),
      software composition analysis (SCA), and container scanning. Enforce
      quality gates that block promotion of builds with critical or high
      vulnerabilities. Conduct code reviews that include security-focused
      checklists. Integrate threat modeling into the design review process
      for new features.
    tools:
      - gitlab-ci
      - semgrep
      - trivy
      - zap

  secops:
    prose: |
      Monitor production environments for exploitation of known
      vulnerability patterns. Track security findings from development
      through to remediation. Conduct periodic penetration testing of
      production applications. Maintain metrics on mean time to remediation
      for security findings identified during development.
    tools:
      - defectdojo
      - splunk
      - burp-suite
      - elastic-siem

