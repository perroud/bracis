id: isp-1
family: isp
title: "Information Security Policy Document"
class: KISMSP
baselines:
  - k-isms-p

statement:
  prose: |
    The organization shall develop, document, and maintain an information
    security policy that addresses the organization's business requirements,
    relevant laws and regulations, and contractual obligations. The policy
    shall be approved by top management, communicated to all employees and
    relevant external parties, and reviewed at planned intervals or when
    significant changes occur to ensure its continuing suitability and
    effectiveness.

guidance:
  prose: |
    The information security policy serves as the top-level document that
    sets the direction for all security activities. Under K-ISMS-P, the
    policy must explicitly reference Korean regulatory requirements including
    the Personal Information Protection Act (PIPA), the Act on Promotion of
    Information and Communications Network Utilization, and sector-specific
    regulations. KISA auditors verify that the policy is not generic but
    tailored to the organization's specific risk profile, industry, and
    scope of certification. Policy communication must include evidence of
    employee acknowledgment.

references:
  - citation: "K-ISMS-P Certification Criteria, Section 2.1 — Information Security Policy"
    url: "https://isms.kisa.or.kr/"

implementation_guidance:
  platform_engineering:
    prose: |
      Host information security policies in a version-controlled repository
      with full change history. Implement automated distribution of policy
      updates to all relevant stakeholders via internal portals or wiki
      platforms. Enforce policy acknowledgment through identity management
      systems that track employee acceptance. Use policy-as-code frameworks
      to translate human-readable policies into enforceable technical
      controls.
    tools:
      - backstage
      - confluence
      - open-policy-agent
      - gitlab

  devsecops:
    prose: |
      Embed policy references in development workflows through merge request
      templates that require developers to confirm compliance with relevant
      policies. Implement pre-commit hooks that check for policy violations
      such as hardcoded credentials or insecure configurations. Include
      policy compliance verification as a stage in CI/CD pipelines.
    tools:
      - gitlab-ci
      - pre-commit
      - semgrep
      - conftest

  secops:
    prose: |
      Track policy compliance across the organization through centralized
      compliance management platforms. Generate automated reports showing
      policy adherence metrics for management review. Set up alerts for
      policy violations detected through monitoring systems. Maintain an
      archive of all policy versions for audit purposes.
    tools:
      - servicenow
      - splunk
      - drata
      - vanta

legal_references:
  - framework_id: iso-27001-2022
    articles: ["clause-5.2", "annex-a.5.1"]
    relationship: equivalent-to
  - framework_id: nist-800-53-rev5
    articles: ["PL-1", "PM-1"]
    relationship: mapped
