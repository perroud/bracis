id: isp-2
family: isp
title: "Compliance with Legal and Regulatory Requirements"
class: KISMSP
baselines:
  - k-isms-p

statement:
  prose: |
    The organization shall identify and document all applicable legal,
    regulatory, and contractual requirements related to information security
    and personal information protection. Procedures shall be established
    to ensure compliance with these requirements, including the Personal
    Information Protection Act (PIPA), the Act on Promotion of Information
    and Communications Network Utilization, and relevant sector-specific
    regulations. Compliance status shall be reviewed periodically.

guidance:
  prose: |
    K-ISMS-P certification requires organizations to demonstrate awareness
    of and compliance with the full spectrum of Korean information security
    and privacy regulations. This goes beyond PIPA to include industry-specific
    requirements such as the Electronic Financial Transactions Act for financial
    institutions or the Medical Service Act for healthcare providers. KISA
    auditors expect a documented legal register that maps each requirement
    to the organization's specific compliance measures. International
    organizations must also account for cross-border data transfer
    requirements.

references:
  - citation: "K-ISMS-P Certification Criteria, Section 2.1 — Legal and Regulatory Compliance"
    url: "https://isms.kisa.or.kr/"

implementation_guidance:
  platform_engineering:
    prose: |
      Maintain a compliance requirements database that maps regulations to
      technical controls implemented in the platform. Implement automated
      compliance checks that verify infrastructure configurations against
      regulatory requirements. Deploy data residency controls to enforce
      Korean data localization requirements where applicable. Use tagging
      and labeling systems to track which workloads fall under specific
      regulatory regimes.
    tools:
      - terraform
      - open-policy-agent
      - backstage
      - cloud-custodian

  devsecops:
    prose: |
      Integrate regulatory compliance checks into CI/CD pipelines. Maintain
      a compliance-as-code library that encodes regulatory requirements as
      automated test cases. Flag code changes that affect compliance-sensitive
      components for additional security review. Track third-party library
      licenses to ensure compliance with software licensing obligations.
    tools:
      - gitlab-ci
      - conftest
      - checkov
      - fossa

  secops:
    prose: |
      Conduct periodic compliance audits using automated scanning tools.
      Maintain dashboards that show real-time compliance posture against
      each applicable regulation. Generate audit-ready reports for KISA
      certification assessments. Monitor regulatory changes and assess
      their impact on the organization's compliance posture.
    tools:
      - drata
      - vanta
      - servicenow
      - splunk

legal_references:
  - framework_id: iso-27001-2022
    articles: ["annex-a.5.31", "annex-a.5.32"]
    relationship: equivalent-to
  - framework_id: nist-800-53-rev5
    articles: ["SA-9", "PM-8"]
    relationship: mapped
