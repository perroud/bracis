    articles: ["clause-7.3.4"]
    relationship: equivalent-to
  - framework_id: gdpr
    articles: ["art-7", "art-21"]
    relationship: mapped
  - framework_id: nist-800-53-rev5
    articles: ["IP-2", "IP-3"]
