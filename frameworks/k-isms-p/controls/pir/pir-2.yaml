id: pir-2
family: pir
title: "Right to Withdraw Consent and Restrict Processing"
class: KISMSP
baselines:
  - k-isms-p

statement:
  prose: |
    The organization shall ensure that data subjects can withdraw their
    consent for the processing of personal information at any time. The
    method for withdrawing consent shall be no more difficult than the
    method by which consent was originally given. Upon withdrawal of
    consent, the organization shall cease processing the data subject's
    personal information for the purpose to which consent was withdrawn
    and shall destroy the relevant personal information unless retention
    is required by law. The organization shall not impose disadvantages
    on data subjects who exercise their right to withdraw consent.

guidance:
  prose: |
    The right to withdraw consent is fundamental under Korean privacy law.
    K-ISMS-P auditors specifically verify that consent withdrawal mechanisms
    are as easy and accessible as the original consent collection mechanism.
    If consent was collected through a single click on a website, withdrawal
    must be equally simple. Organizations must not bury withdrawal options
    in complex menus or require phone calls when consent was collected
    online. The prohibition on disadvantages means organizations cannot
    deny core services or charge additional fees to data subjects who
    withdraw consent for optional data processing.

references:
  - citation: "K-ISMS-P Certification Criteria, Section 3.4 — Consent Withdrawal"
    url: "https://isms.kisa.or.kr/"

implementation_guidance:
  platform_engineering:
    prose: |
      Implement consent withdrawal functionality in the same user interfaces
      where consent was originally collected. Build automated processing
      cessation workflows that propagate consent withdrawal across all
      downstream systems. Deploy consent state management that integrates
      with all personal information processing systems. Ensure that
      consent withdrawal triggers automated data destruction workflows
      for non-legally-mandated retention.
    tools:
      - onetrust
      - custom-consent-api
      - backstage
      - terraform

  devsecops:
    prose: |
      Test consent withdrawal flows as part of CI/CD pipelines to verify
      that processing ceases correctly upon withdrawal. Implement automated
      validation that consent withdrawal mechanisms are accessible in all
      user interfaces where consent was collected. Scan for code paths
      that continue processing personal information without checking
      consent status. Include consent state in API contract tests.
    tools:
      - gitlab-ci
      - postman
      - semgrep
      - cypress

  secops:
    prose: |
      Monitor for personal information processing that continues after
      consent withdrawal. Audit consent withdrawal logs to verify timely
      cessation of processing and data destruction. Alert on access to
      personal information for data subjects who have withdrawn consent.
      Generate compliance reports on consent withdrawal volumes and
      processing cessation timelines.
    tools:
      - splunk
      - elastic-siem
      - onetrust
      - servicenow

legal_references:
