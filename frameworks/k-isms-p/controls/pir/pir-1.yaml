id: pir-1
family: pir
title: "Data Subject Access and Correction Rights"
class: KISMSP
baselines:
  - k-isms-p

statement:
  prose: |
    The organization shall establish and implement procedures to enable data
    subjects to exercise their rights to access, correct, and delete their
    personal information. Upon request from a data subject, the organization
    shall provide access to their personal information within 10 days and
    take corrective action within 10 days of receiving a correction request.
    The organization shall not restrict or deny legitimate rights requests
    and shall provide clear methods for data subjects to submit their
    requests.

guidance:
  prose: |
    Data subject rights under K-ISMS-P reflect the requirements of the
    Personal Information Protection Act (PIPA). The 10-day response
    deadline is strictly enforced, and KISA auditors may test the
    organization's ability to fulfill access requests during certification
    assessments. Organizations must provide multiple channels for rights
    requests including online, in-person, and written methods. The
    process must include identity verification to prevent unauthorized
    access while not creating unreasonable barriers for legitimate
    requests. Reasons for any denial must be communicated to the data
    subject with information about how to file a complaint.

references:
  - citation: "K-ISMS-P Certification Criteria, Section 3.4 — Data Subject Rights"
    url: "https://isms.kisa.or.kr/"

implementation_guidance:
  platform_engineering:
    prose: |
      Build self-service privacy portals that enable data subjects to view,
      download, correct, and request deletion of their personal information.
      Implement automated data subject access request (DSAR) fulfillment
      pipelines that aggregate personal information from all processing
      systems. Deploy identity verification mechanisms that balance
      security with accessibility. Maintain request tracking systems with
      SLA monitoring for the 10-day response deadline.
    tools:
      - onetrust
      - bigid
      - backstage
      - custom-privacy-portal

  devsecops:
    prose: |
      Implement and test API endpoints for data subject rights fulfillment
      as part of CI/CD pipelines. Include DSAR functionality in application
      architectures from the design phase. Automate testing of data export,
      correction, and deletion functions across all microservices. Maintain
      data mapping documentation that supports rapid DSAR fulfillment.
    tools:
      - gitlab-ci
      - postman
      - semgrep
      - sonarqube

  secops:
    prose: |
      Monitor DSAR processing metrics to ensure compliance with the 10-day
      response deadline. Audit access request logs for evidence of complete
      and accurate responses. Detect and escalate requests at risk of
      exceeding the response deadline. Generate compliance reports on
      rights request volumes, response times, and outcomes.
    tools:
      - servicenow
      - splunk
      - onetrust
      - elastic-siem

