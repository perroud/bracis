id: im-1
family: im
title: "Security Incident Response Procedures"
class: KISMSP
baselines:
  - k-isms-p

statement:
  prose: |
    The organization shall establish and implement incident management
    procedures for detecting, reporting, assessing, and responding to
    information security incidents. Roles and responsibilities for incident
    response shall be clearly defined. The organization shall maintain an
    incident response team with the authority and capability to contain
    and remediate security incidents. Incident response procedures shall
    be tested through regular exercises and updated based on lessons
    learned.

guidance:
  prose: |
    K-ISMS-P incident management requirements align closely with Korean
    regulatory obligations for breach notification. Under PIPA and the
    Network Act, organizations must notify the Korea Internet and Security
    Agency (KISA) and affected individuals within 72 hours of discovering
    a personal information breach. KISA auditors examine incident response
    plans, evidence of tabletop exercises or simulations, and records of
    past incidents. The incident response team must have 24/7 contact
    capability and predefined escalation procedures.

references:
  - citation: "K-ISMS-P Certification Criteria, Section 2.10 — Incident Management"
    url: "https://isms.kisa.or.kr/"

implementation_guidance:
  platform_engineering:
    prose: |
      Deploy automated incident detection through infrastructure monitoring
      and anomaly detection systems. Implement runbook automation for common
      incident types to accelerate containment. Provide forensic data
      collection tools that preserve evidence without disrupting running
      services. Build isolated incident response environments for malware
      analysis and investigation.
    tools:
      - pagerduty
      - opsgenie
      - grafana
      - velero

  devsecops:
    prose: |
      Implement automated rollback capabilities in CI/CD pipelines for
      rapid incident containment. Maintain pre-built forensic container
      images for incident investigation. Include security event triggers
      in deployment pipelines that halt deployments during active incidents.
      Document incident playbooks alongside application code for
      context-specific response procedures.
    tools:
      - gitlab-ci
      - argocd
      - falco
      - trivy

  secops:
    prose: |
      Operate a 24/7 security operations center (SOC) or managed detection
      and response (MDR) service. Implement SOAR playbooks for automated
      initial response to common incident types. Maintain chain-of-custody
      procedures for digital evidence. Conduct post-incident reviews and
      produce root cause analysis reports that feed into continuous
      improvement of security controls.
    tools:
      - splunk-soar
      - elastic-siem
      - thehive
      - cortex

legal_references:
