id: im-2
family: im
title: "Personal Information Breach Notification"
class: KISMSP
baselines:
  - k-isms-p

statement:
  prose: |
    In the event of a personal information breach, the organization shall
    notify the data subjects and the Korea Internet and Security Agency
    (KISA) without delay. The notification shall include the types of
    personal information breached, the estimated time and scope of the
    breach, measures taken by the organization in response, methods for
    data subjects to minimize damage, and contact information for the
    organization's response team. The organization shall also report to
    the Personal Information Protection Commission when required.

guidance:
  prose: |
    Breach notification under Korean law is one of the most scrutinized
    aspects of K-ISMS-P certification. Organizations must have pre-drafted
    notification templates and clearly defined criteria for what constitutes
    a reportable breach. KISA requires notification within 72 hours of
    becoming aware of a breach involving personal information. For breaches
    affecting 1,000 or more data subjects, notification to KISA and the
    Personal Information Protection Commission is mandatory. KISA auditors
    test the organization's ability to execute breach notification
    procedures through simulation exercises.

references:
  - citation: "K-ISMS-P Certification Criteria, Section 2.10 — Breach Notification"
    url: "https://isms.kisa.or.kr/"

implementation_guidance:
  platform_engineering:
    prose: |
      Implement data loss prevention (DLP) systems that detect and alert
      on unauthorized personal information exfiltration. Deploy automated
      breach assessment tools that can quickly determine the scope and
      impact of a breach. Maintain pre-configured notification channels
      including email templates and web portal announcements. Build
      automated reporting workflows that generate regulatory notifications
      with required data fields.
    tools:
      - dlp-solutions
      - pagerduty
      - servicenow
      - grafana

  devsecops:
    prose: |
      Implement data classification scanning in CI/CD pipelines to identify
      where personal information is stored and processed. Maintain up-to-date
      data flow diagrams generated from code analysis. Include breach
      notification requirements in incident response playbooks stored
      alongside application code. Test breach notification procedures as
      part of disaster recovery exercises.
    tools:
      - gitlab-ci
      - semgrep
      - trivy
      - falco

  secops:
    prose: |
      Maintain 24/7 monitoring for indicators of data breach including
      unusual data access patterns, large data exports, and unauthorized
      API access. Pre-stage breach notification templates for rapid
      deployment. Conduct quarterly breach notification drills with
      measured response times. Maintain relationships with KISA reporting
      contacts and ensure notification procedures are tested end-to-end.
    tools:
      - splunk
      - elastic-siem
      - thehive
      - servicenow

