id: mse-1
family: mse
title: "Establishment of Information Security Policy and Organization"
class: KISMSP
baselines:
  - k-isms-p

statement:
  prose: |
    The organization shall establish an information security policy approved by
    top management. The policy shall define objectives, scope, roles, and
    responsibilities for information security. A dedicated information security
    organization shall be formed with clearly assigned roles and accountability,
    and management shall demonstrate commitment through resource allocation and
    periodic review of the information security management system.

guidance:
  prose: |
    This control requires organizations to formalize their commitment to
    information security at the highest level. The policy must be a living
    document, reviewed at least annually or upon significant changes to the
    business environment. The information security organization should include
    a Chief Information Security Officer (CISO) or equivalent, with direct
    reporting to senior management. KISA auditors verify that the policy is
    not merely documented but actively communicated and enforced across the
    organization.

references:
  - citation: "K-ISMS-P Certification Criteria, Section 1.1 — Management System Establishment and Operation"
    url: "https://isms.kisa.or.kr/"

implementation_guidance:
  platform_engineering:
    prose: |
      Codify information security policies as policy-as-code using Open Policy
      Agent (OPA) or similar engines. Store policies in version-controlled
      repositories with mandatory approval workflows for changes. Implement
      automated enforcement of baseline security configurations across all
      platform components. Provide a centralized dashboard for policy
      compliance status across infrastructure and applications.
    tools:
      - open-policy-agent
      - backstage
      - gitlab-ci
      - terraform

  devsecops:
    prose: |
      Integrate policy checks into CI/CD pipelines to enforce organizational
      security standards at build and deploy time. Require merge request
      approvals from security team members for changes to security-sensitive
      code. Implement branch protection rules that enforce the governance
      model defined in the security policy. Maintain policy documentation
      in the same repositories as code for traceability.
    tools:
      - gitlab-ci
      - semgrep
      - checkov
      - conftest

  secops:
    prose: |
      Establish continuous monitoring to verify adherence to the information
      security policy. Configure SIEM dashboards that map security events to
      policy requirements. Conduct quarterly policy compliance reviews and
      generate reports for management review. Maintain an audit trail of all
      policy changes and approval decisions.
    tools:
      - splunk
      - elastic-siem
      - wazuh
      - servicenow

legal_references:
  - framework_id: iso-27001-2022
    articles: ["clause-5.1", "clause-5.2"]
    relationship: equivalent-to
  - framework_id: nist-800-53-rev5
    articles: ["PM-1", "PL-1"]
    relationship: mapped
