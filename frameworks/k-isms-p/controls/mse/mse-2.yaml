id: mse-2
family: mse
title: "Risk Assessment and Treatment"
class: KISMSP
baselines:
  - k-isms-p

statement:
  prose: |
    The organization shall establish and implement a risk management process
    that identifies, analyzes, and evaluates information security risks. Risk
    assessment shall be conducted at planned intervals and whenever significant
    changes occur. The organization shall determine risk treatment options,
    produce a risk treatment plan with assigned owners and timelines, and
    obtain management approval for residual risk acceptance.

guidance:
  prose: |
    Risk assessment under K-ISMS-P must be systematic and repeatable. KISA
    expects organizations to maintain a risk register that covers all assets
    within the certification scope. The methodology must define clear criteria
    for likelihood and impact assessment. Risk treatment plans must be
    actionable with specific deadlines and responsible parties. Unlike purely
    qualitative approaches, KISA auditors look for evidence that risk
    assessments drive actual security improvement decisions.

references:
  - citation: "K-ISMS-P Certification Criteria, Section 1.2 — Risk Management"
    url: "https://isms.kisa.or.kr/"

implementation_guidance:
  platform_engineering:
    prose: |
      Implement automated asset discovery and classification across cloud
      and on-premises infrastructure. Deploy vulnerability scanning tools
      that feed into a centralized risk register. Use infrastructure-as-code
      scanning to identify misconfigurations before deployment. Maintain a
      configuration management database (CMDB) that maps assets to risk
      assessments.
    tools:
      - tenable
      - qualys
      - terraform
      - servicenow-cmdb

  devsecops:
    prose: |
      Integrate vulnerability scanning into CI/CD pipelines with severity-based
      gates. Perform dependency analysis to identify supply chain risks in
      third-party libraries. Implement threat modeling as part of the design
      review process for new features. Automate risk scoring for identified
      vulnerabilities and track remediation through issue trackers.
    tools:
      - gitlab-ci
      - trivy
      - grype
      - threatmodeler

  secops:
    prose: |
      Maintain continuous risk monitoring through vulnerability management
      platforms. Correlate threat intelligence feeds with the organization's
      asset inventory to identify emerging risks. Produce periodic risk
      reports for management review. Track risk treatment plan progress and
      escalate overdue remediation items.
    tools:
      - tenable
      - qualys
      - splunk
      - elastic-siem

legal_references:
  - framework_id: iso-27001-2022
    articles: ["clause-6.1", "clause-8.2"]
    relationship: equivalent-to
  - framework_id: nist-800-53-rev5
    articles: ["RA-3", "RA-5"]
    relationship: mapped
