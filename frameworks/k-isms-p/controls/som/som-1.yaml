id: som-1
family: som
title: "System and Network Monitoring"
class: KISMSP
baselines:
  - k-isms-p

statement:
  prose: |
    The organization shall establish and implement procedures for monitoring
    information systems and networks. Monitoring shall include the detection
    of unauthorized access attempts, system anomalies, security events, and
    performance degradation. Audit logs shall be generated, protected from
    unauthorized modification, and retained for a sufficient period as
    required by applicable laws and regulations. Log review and analysis
    shall be performed on a regular basis.

guidance:
  prose: |
    Monitoring and logging are foundational to K-ISMS-P compliance. KISA
    requires that audit logs capture at minimum: user authentication events,
    administrative actions, access to personal information, system errors,
    and security events. Log retention periods must comply with Korean
    regulations, which typically require a minimum of one year for access
    logs and five years for personal information processing logs. KISA
    auditors verify that logs are not only collected but actively reviewed,
    with evidence of incident escalation based on log analysis.

references:
  - citation: "K-ISMS-P Certification Criteria, Section 2.9 — System Operations and Management"
    url: "https://isms.kisa.or.kr/"

implementation_guidance:
  platform_engineering:
    prose: |
      Deploy centralized logging infrastructure that aggregates logs from
      all systems within the certification scope. Implement immutable log
      storage to prevent tampering. Configure retention policies that meet
      Korean regulatory requirements. Provide standardized logging libraries
      and formats for application teams to ensure consistent log generation
      across all platform components.
    tools:
      - elastic-stack
      - grafana-loki
      - fluentd
      - prometheus

  devsecops:
    prose: |
      Enforce logging standards in CI/CD pipelines by scanning application
      code for adequate audit log generation. Require that all API endpoints
      produce audit-compliant logs. Implement pipeline monitoring to detect
      build and deployment anomalies. Include log output validation in
      automated testing suites.
    tools:
      - gitlab-ci
      - semgrep
      - trivy
      - falco

  secops:
    prose: |
      Operate a security information and event management (SIEM) platform
      with correlation rules tuned to detect K-ISMS-P relevant events.
      Conduct daily log reviews with documented findings. Implement
      automated alerting for critical security events. Produce periodic
      reports on monitoring effectiveness and incident detection metrics.
    tools:
      - splunk
      - elastic-siem
      - wazuh
      - grafana

legal_references:
  - framework_id: iso-27001-2022
    articles: ["annex-a.8.15", "annex-a.8.16"]
    relationship: equivalent-to
  - framework_id: nist-800-53-rev5
    articles: ["AU-2", "AU-6", "SI-4"]
    relationship: mapped
