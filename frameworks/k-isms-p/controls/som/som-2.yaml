id: som-2
family: som
title: "Vulnerability and Patch Management"
class: KISMSP
baselines:
  - k-isms-p

statement:
  prose: |
    The organization shall establish procedures for identifying, assessing,
    and remediating technical vulnerabilities in information systems.
    Vulnerability assessments shall be conducted at planned intervals and
    whenever significant changes are made to the system environment.
    Security patches shall be evaluated, tested, and applied in a timely
    manner. Where immediate patching is not feasible, compensating controls
    shall be implemented to mitigate the risk.

guidance:
  prose: |
    K-ISMS-P requires a proactive approach to vulnerability management.
    KISA expects organizations to perform vulnerability scans at least
    quarterly and after any significant system change. Critical
    vulnerabilities affecting personal information processing systems must
    be addressed within a defined timeline, typically within 30 days for
    critical and 90 days for high-severity findings. Organizations must
    demonstrate a patch management process that includes testing in a
    non-production environment before applying patches to production
    systems. KISA also reviews the organization's subscription to
    vulnerability notification services.

references:
  - citation: "K-ISMS-P Certification Criteria, Section 2.9 — Vulnerability Management"
    url: "https://isms.kisa.or.kr/"

implementation_guidance:
  platform_engineering:
    prose: |
      Implement automated vulnerability scanning across all infrastructure
      components including operating systems, container images, and cloud
      configurations. Deploy patch management automation that can apply
      updates across the fleet with staged rollouts. Maintain a golden
      image pipeline that produces pre-patched base images for all
      workloads. Use infrastructure-as-code to ensure consistent
      vulnerability remediation across environments.
    tools:
      - tenable
      - qualys
      - trivy
      - renovate

  devsecops:
    prose: |
      Integrate vulnerability scanning into CI/CD pipelines with automated
      dependency update proposals. Implement container image scanning in
      the build process and block deployment of images with critical
      vulnerabilities. Use software bill of materials (SBOM) generation
      to track all components and their vulnerability status. Automate
      dependency updates through merge requests with security advisories.
    tools:
      - gitlab-ci
      - trivy
      - grype
      - dependabot

  secops:
    prose: |
      Maintain a centralized vulnerability management dashboard with SLA
      tracking for remediation timelines. Correlate vulnerability scan
      results with threat intelligence to prioritize remediation. Conduct
      periodic penetration testing to validate vulnerability management
      effectiveness. Escalate overdue vulnerabilities to management with
      risk assessments.
    tools:
      - tenable
      - defectdojo
      - splunk
      - nessus

legal_references:
