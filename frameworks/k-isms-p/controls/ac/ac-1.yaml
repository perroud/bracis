id: ac-1
family: ac
title: "Access Control Policy and User Registration"
class: KISMSP
baselines:
  - k-isms-p

statement:
  prose: |
    The organization shall establish and enforce an access control policy
    based on business and security requirements. User access to information
    systems and services shall be granted through a formal registration and
    de-registration process. Access rights shall be assigned based on the
    principle of least privilege, with formal authorization required before
    granting access. User accounts shall be uniquely identifiable and shared
    accounts shall be prohibited unless explicitly justified and approved.

guidance:
  prose: |
    K-ISMS-P places strong emphasis on access control as a foundational
    protection measure. The certification criteria require organizations to
    maintain a complete inventory of all user accounts across all systems
    within scope. KISA auditors verify that formal procedures exist for
    requesting, approving, and revoking access. Special attention is given
    to privileged accounts, which must have additional controls including
    enhanced monitoring and regular review. The prohibition on shared accounts
    is strictly enforced, with any exceptions requiring documented justification
    and compensating controls.

references:
  - citation: "K-ISMS-P Certification Criteria, Section 2.5 — Access Control"
    url: "https://isms.kisa.or.kr/"

implementation_guidance:
  platform_engineering:
    prose: |
      Implement centralized identity and access management (IAM) through
      a single sign-on platform with multi-factor authentication. Use
      infrastructure-as-code to define role-based access control (RBAC)
      policies across all platform components. Automate user provisioning
      and de-provisioning through integration with HR systems. Deploy
      privileged access management (PAM) solutions for administrative
      accounts with session recording and just-in-time access.
    tools:
      - keycloak
      - hashicorp-vault
      - teleport
      - terraform

  devsecops:
    prose: |
      Enforce branch protection and merge request approval workflows that
      implement the principle of least privilege for code changes. Require
      multi-factor authentication for all contributors to code repositories.
      Implement code ownership rules that restrict modifications to sensitive
      components. Scan infrastructure-as-code for overly permissive access
      policies before deployment.
    tools:
      - gitlab-ci
      - checkov
      - tfsec
      - gitleaks

  secops:
    prose: |
      Monitor authentication events and detect anomalous access patterns.
      Conduct quarterly access reviews to verify that user rights remain
      appropriate. Alert on privileged account usage outside normal patterns.
      Maintain audit logs of all access control changes with sufficient
      detail for forensic analysis.
    tools:
      - splunk
      - elastic-siem
      - cyberark
      - sailpoint

