id: pic-1
family: pic
title: "Lawful Collection and Consent for Personal Information"
class: KISMSP
baselines:
  - k-isms-p

statement:
  prose: |
    The organization shall collect personal information only through lawful
    and fair means, within the minimum scope necessary for the specified
    purpose. Prior to collection, the organization shall obtain the data
    subject's informed consent by clearly notifying them of the purpose
    of collection, the items of personal information to be collected, the
    period of retention and use, and the right to refuse consent and any
    disadvantages resulting from refusal. Consent for collection of
    sensitive information and unique identifiers shall be obtained
    separately from general consent.

guidance:
  prose: |
    Personal information collection under K-ISMS-P must strictly adhere
    to the Personal Information Protection Act (PIPA) consent framework.
    KISA auditors verify that consent forms are written in clear, easily
    understandable language and that consent for mandatory and optional
    items is separated. Collection of resident registration numbers is
    prohibited unless specifically authorized by law. The organization
    must demonstrate data minimization by documenting the justification
    for each personal information item collected. Consent records must
    be retained for the duration of data retention.

references:
  - citation: "K-ISMS-P Certification Criteria, Section 3.1 — Personal Information Collection"
    url: "https://isms.kisa.or.kr/"

implementation_guidance:
  platform_engineering:
    prose: |
      Implement a centralized consent management platform that tracks
      consent status per data subject and purpose. Build consent collection
      APIs that enforce separation of mandatory and optional consent items.
      Deploy a privacy metadata registry that documents the purpose and
      legal basis for each personal information field. Implement automated
      data minimization validation that compares collected data against
      declared purposes.
    tools:
      - onetrust
      - cookiebot
      - backstage
      - custom-consent-api

  devsecops:
    prose: |
      Scan application code for personal information collection points
      and verify that each has corresponding consent validation logic.
      Implement automated tests that verify consent flows meet regulatory
      requirements. Include data mapping annotations in code that document
      personal information handling. Block deployment of new collection
      endpoints without associated consent configurations.
    tools:
      - gitlab-ci
      - semgrep
      - sonarqube
      - custom-privacy-linter

  secops:
    prose: |
      Monitor personal information collection events to verify consent
      was obtained before collection. Audit consent records for completeness
      and validity. Detect and alert on collection of personal information
      categories not covered by active consent. Generate compliance reports
      showing consent coverage across all collection channels.
    tools:
      - splunk
      - elastic-siem
      - onetrust
      - servicenow

legal_references:
