id: pic-2
family: pic
title: "Purpose Limitation and Restriction on Collection"
class: KISMSP
baselines:
  - k-isms-p

statement:
  prose: |
    The organization shall not collect personal information beyond what is
    necessary for the specified and declared purpose. Personal information
    collected for one purpose shall not be used for another purpose without
    obtaining separate consent from the data subject or unless permitted
    by law. The organization shall clearly define and document the purposes
    for which each category of personal information is collected and ensure
    that processing activities are confined to those stated purposes.

guidance:
  prose: |
    Purpose limitation is a core principle of Korean personal information
    protection law. K-ISMS-P auditors scrutinize whether organizations
    collect only the minimum personal information necessary for the stated
    purpose. Secondary use of personal information is a frequent compliance
    violation. Organizations must maintain a personal information processing
    register that documents the purpose, items collected, and retention
    period for each processing activity. Any change in purpose requires
    new consent from data subjects, with limited exceptions for compatible
    purposes defined by law.

references:
  - citation: "K-ISMS-P Certification Criteria, Section 3.1 — Purpose Limitation"
    url: "https://isms.kisa.or.kr/"

implementation_guidance:
  platform_engineering:
    prose: |
      Implement purpose-bound access controls that restrict data access
      based on the declared purpose of processing. Build data cataloging
      systems that tag personal information with its collection purpose
      and enforce access only for that purpose. Deploy automated data flow
      analysis tools that detect personal information usage outside
      declared purposes. Implement API gateways that enforce purpose-based
      data filtering.
    tools:
      - datahub
      - openmetadata
      - open-policy-agent
      - backstage

  devsecops:
    prose: |
      Implement code-level annotations that declare the purpose of personal
      information processing in each module. Scan for data flows that
      cross purpose boundaries without explicit authorization. Include
      purpose verification in API contract tests. Enforce data access
      patterns that pass purpose context through the request chain.
    tools:
      - gitlab-ci
      - semgrep
      - sonarqube
      - conftest

  secops:
    prose: |
      Monitor data access logs to detect personal information access that
      does not align with declared processing purposes. Conduct periodic
      audits of data processing activities against the personal information
      processing register. Alert on new data flows that involve personal
      information without documented purpose justification. Generate
      compliance reports on purpose adherence for management review.
    tools:
      - splunk
      - elastic-siem
      - onetrust
      - servicenow

legal_references:
  - framework_id: iso-27701
    articles: ["clause-7.2.1", "clause-7.4.1"]
    relationship: equivalent-to
  - framework_id: gdpr
    articles: ["art-5", "art-6"]
    relationship: mapped
  - framework_id: nist-800-53-rev5
    articles: ["IP-1", "DM-1"]
    relationship: mapped
