related_frameworks:
  - framework_id: cmn-4557
    relationship: complements
    description: >-
      A CMN 4.606 complementa a CMN 4.557 — a primeira trata de politica de
      conformidade (compliance) e a segunda de gestao integrada de riscos, ambas
      aplicaveis a instituicoes financeiras.
  - framework_id: cmn-4968
    relationship: complements
    description: "A CMN 4.968 (auditoria interna) complementa a CMN 4.606 (compliance) formando as tres linhas de defesa do sistema financeiro."
  - framework_id: bcb-3978
    relationship: complements
    description: "A BCB 3.978 (PLD/FT) exige funcao de compliance especifica para prevencao a lavagem de dinheiro, que se integra a funcao de conformidade da CMN 4.606."
  - framework_id: bacen-4893
    relationship: complements
    description: "A Bacen 4.893 (seguranca cibernetica) e complementada pela funcao de conformidade da CMN 4.606 no monitoramento de aderencia a politica de seguranca."
