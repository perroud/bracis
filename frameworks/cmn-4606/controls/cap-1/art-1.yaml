id: art-1
family: cap-1
title: "Objeto e Escopo de Aplicacao"
class: CMN-4606
baselines: [todas-ifs]
statement:
  prose: |
    Art. 1. Esta Resolução dispõe sobre a política de conformidade a ser mantida pelas
    instituições financeiras e demais instituições autorizadas a funcionar pelo Banco
    Central do Brasil.

    § 1. A política de conformidade deve ser compatível com a natureza, o porte,
    a complexidade, a estrutura, o perfil de risco e o modelo de negócio da instituição.

    § 2. As disposições desta Resolução aplicam-se também aos conglomerados prudenciais
    e financeiros, na forma da regulamentação específica.
guidance:
  prose: |
    O art. 1 estabelece o objeto central da CMN 4.606: a obrigacao de toda instituicao
    autorizada pelo BCB manter uma politica de conformidade (compliance) estruturada.

    **Escopo de aplicacao:**
    A resolucao abrange todas as instituicoes autorizadas pelo BCB: bancos multiplos,
    comerciais, de investimento, de desenvolvimento, caixas economicas, cooperativas de
    credito, corretoras, distribuidoras, administradoras de consorcio e demais entidades
    do Sistema Financeiro Nacional (SFN).

    **Principio da proporcionalidade (§ 1):**
    A politica de compliance nao e "tamanho unico". Ela deve ser calibrada conforme:
    - Natureza: banco de varejo vs. banco de atacado vs. cooperativa
    - Porte: segmentacao prudencial S1 a S5 do BCB
    - Complexidade: produtos derivativos, operacoes internacionais, conglomerados
    - Perfil de risco: apetite ao risco declarado, historico de sancoes, exposicoes
    - Modelo de negocio: digital, fisico, hibrido; segmentos de clientes atendidos

    **Conglomerados (§ 2):**
    Grupos financeiros devem ter politica de compliance consolidada no nivel do
    conglomerado, sem prejuizo das politicas especificas de cada entidade do grupo.
    A lideranca compliance do conglomerado e responsavel pela consistencia do programa.

    **Implicacao pratica:**
    Uma fintech de credito (SCD) do segmento S5 nao precisa do mesmo aparato de
    compliance de um banco S1 de varejo com milhoes de clientes. Porem ambos precisam
    de politica formalmente aprovada, funcao de conformidade e diretor designado.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de compliance como plataforma:**
      1. Plataforma centralizada de GRC (Governance, Risk, Compliance) com modulos
         para politica, controles, monitoramento e reporting regulatorio.
      2. Registro de conglomerado: visao consolidada de todas as entidades do grupo
         com hierarquia de politicas (grupo > entidade).
      3. API de compliance que permite integracao com sistemas core (core bancario,
         CRM, sistemas de credito) para captura automatica de eventos relevantes.
      4. Escalabilidade da plataforma conforme segmento prudencial — configuracao
         simplificada para S4/S5, configuracao completa para S1/S2.

      **Documentacao e versionamento:**
      5. Repositorio Git dedicado para documentos de politica com versionamento
         semantico e historico completo de alteracoes.
      6. Workflow de aprovacao documentado no sistema com rastreabilidade de quem
         aprovou cada versao da politica e quando.
    tools:
      - grc-platform
      - policy-management
      - git
      - document-management
  devsecops:
    prose: |
      **Compliance-as-Code para politica de conformidade:**
      1. Codificacao dos requisitos da CMN 4.606 em politicas executaveis (OPA/Rego)
         que verificam aderencia automaticamente no pipeline.
      2. Templates padronizados de politica de compliance versionados no repositorio
         corporativo, disponibilizados via self-service para todas as entidades do grupo.
      3. Pipeline de validacao de documentos de politica: verificacao de completude,
         assinaturas digitais, datas de vigencia e aprovacoes requeridas.
      4. Integracoes CI/CD: gates de compliance obrigam que mudancas em sistemas
         criticos passem por revisao de conformidade antes do deploy.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - policy-as-code
      - document-pipeline
  secops:
    prose: |
      **Programa de compliance operacional:**
      1. Inventario de todas as entidades do grupo com respectivo segmento prudencial
         e status de aderencia a CMN 4.606.
      2. Avaliacao de proporcionalidade: criterios documentados para determinar o nivel
         de sofisticacao exigido para cada entidade com base nos parametros do art. 1.
      3. Mapa de obrigacoes regulatorias cross-entidade: quais normas se aplicam a
         cada empresa do conglomerado.
      4. Processo de onboarding de novas entidades: checklist para garantir que
         novas empresas do grupo tenham politica de compliance implementada.
      5. Monitoramento do calendario regulatorio: atualizacoes de normas que impactam
         o escopo da politica de conformidade.
    tools:
      - grc-platform
      - regulatory-change-management
      - compliance-calendar
      - risk-register
