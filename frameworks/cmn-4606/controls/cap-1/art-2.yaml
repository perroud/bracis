id: art-2
family: cap-1
title: "Definicoes"
class: CMN-4606
baselines: [todas-ifs]
statement:
  prose: |
    Art. 2. Para os efeitos desta Resolução, define-se:

    I - política de conformidade: conjunto de princípios, regras e procedimentos que
    orienta as atividades da instituição no cumprimento de leis, regulamentos,
    códigos de conduta e boas práticas de mercado;

    II - função de conformidade: atividades realizadas para assegurar o cumprimento
    das obrigações estabelecidas na política de conformidade;

    III - diretor de conformidade: membro da diretoria responsável pela função de
    conformidade e pelo reporte ao conselho de administração ou órgão equivalente.
guidance:
  prose: |
    O art. 2 apresenta as tres definicoes nucleares da resolucao, formando o triplo
    estrutural do programa de compliance: politica, funcao e diretor.

    **I. Politica de conformidade:**
    Nao e apenas um documento — e um conjunto sistemico de elementos:
    - Principios: valores que orientam o comportamento (integridade, transparencia)
    - Regras: obrigacoes especificas derivadas de leis e regulamentos aplicaveis
    - Procedimentos: como as regras sao operacionalizadas no dia a dia
    - Codigos de conduta: expectativas comportamentais para colaboradores
    - Boas praticas: recomendacoes de autorregulacao e associacoes setoriais (ANBIMA, FEBRABAN)

    **II. Funcao de conformidade:**
    Distinta da "area de compliance" — a funcao pode ser exercida por estrutura interna
    ou terceirizada (para instituicoes menores), desde que mantenha independencia.
    As atividades tipicas incluem:
    - Identificacao e avaliacao de riscos de conformidade
    - Monitoramento do cumprimento de obrigacoes regulatorias
    - Orientacao e treinamento de colaboradores
    - Investigacao de potenciais violacoes
    - Reporte ao conselho e ao regulador

    **III. Diretor de conformidade (CCO):**
    Deve ser membro da diretoria estatutaria — nao pode ser apenas um gerente ou
    coordenador. O vinculo direto ao conselho garante independencia hierarquica.
    O CCO responde diretamente ao conselho, nao ao CEO ou CFO, para evitar conflito
    de interesses entre negocio e controle.

    **Interrelacao:**
    A politica define O QUE. A funcao garante O COMO. O diretor responde PELO RESULTADO.
    Sem um dos tres, o programa de compliance da CMN 4.606 esta incompleto.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de compliance estruturada em tres camadas:**
      1. Camada de politica: repositorio de documentos de politica, regras e
         procedimentos com versionamento, aprovacoes digitais e vigencia controlada.
      2. Camada de funcao: ferramentas de monitoramento de conformidade, workflow
         de investigacoes, sistema de treinamentos e certificacoes obrigatorias.
      3. Camada de direcao: dashboard executivo para o CCO com KPIs de compliance,
         relatorios para o conselho e registro de comunicacoes com o regulador.

      **Integracao com sistemas core:**
      4. Conexao entre a plataforma de GRC e sistemas transacionais para captura
         automatica de eventos relevantes para compliance (transacoes suspeitas,
         reclamacoes, incidentes operacionais).
      5. Single source of truth para obrigacoes regulatorias: cada obrigacao mapeada
         a uma regra na politica, a controles na funcao e a um responsavel na direcao.
    tools:
      - grc-platform
      - policy-management
      - compliance-training-platform
      - executive-dashboard
  devsecops:
    prose: |
      **Modelagem das definicoes em codigo:**
      1. Estrutura de dados padronizada para representar politicas, controles e
         responsaveis no repositorio de compliance-as-code.
      2. Schema YAML/JSON que captura os tres elementos (politica, funcao, direcao)
         com campos obrigatorios validados automaticamente no pipeline.
      3. Testes automatizados que verificam consistencia: toda obrigacao na politica
         deve ter controle mapeado na funcao e responsavel designado na direcao.
      4. Geracao automatica de relatorios de lacunas (gap analysis) quando a politica
         e atualizada mas os controles correspondentes ainda nao foram ajustados.
    tools:
      - gitlab-ci
      - yaml-validation
      - compliance-as-code
      - gap-analysis-tool
  secops:
    prose: |
      **Operacionalizacao das definicoes:**
      1. Inventario de obrigacoes regulatorias classificado por fonte (lei, resolucao,
         circular, instrucao normativa) e area de impacto.
      2. Registro de conflitos de interesse identificados e como foram tratados,
         vinculados a funcao de conformidade conforme definicao do art. 2, II.
      3. Processo de comunicacao entre funcao de conformidade e CCO: quais situacoes
         geram relatorio imediato ao diretor vs. inclusao no relatorio periodico.
      4. Criterios de escalacao: quando a funcao de conformidade deve escalar
         diretamente ao conselho sem passar pela diretoria executiva.
    tools:
      - grc-platform
      - incident-management
      - escalation-workflow
      - audit-trail
