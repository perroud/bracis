id: art-11
family: cap-3
title: "Reporte da Funcao de Conformidade ao Diretor"
class: CMN-4606
baselines: [todas-ifs]
statement:
  prose: |
    Art. 11. A função de conformidade deve reportar-se diretamente ao diretor
    de conformidade de que trata o art. 12.

    § 1. O reporte de que trata o caput deve ser realizado de forma tempestiva,
    abrangendo o resultado das atividades desenvolvidas e os riscos de conformidade
    identificados.

    § 2. Situações que representem risco relevante de conformidade devem ser
    reportadas imediatamente ao diretor de conformidade e, quando necessário,
    ao conselho de administração ou órgão equivalente.
guidance:
  prose: |
    O art. 11 define a linha de reporte da funcao de conformidade: direto ao CCO,
    com obrigacao de tempestividade e escalacao imediata em casos de risco relevante.

    **Reporte direto ao CCO (caput):**
    A funcao de conformidade nao pode se reportar ao CEO, ao CFO ou a qualquer
    area de negocio. O CCO e o unico destinatario hierarquico do reporte, garantindo
    que a linha de conformidade va diretamente ao responsavel regulatorio.

    **Tempestividade (§ 1):**
    O reporte nao pode ser episodico ou apenas no relatorio semestral (art. 9, V).
    "De forma tempestiva" significa:
    - Relatorio periodico: frequencia definida (mensal ou trimestral) para status
      das atividades e evolucao dos riscos
    - Relatorio ad hoc: quando houver resultado relevante de atividade (ex: conclusao
      de testing de controles, avaliacao de impacto de nova norma)
    - Registro continuo: tudo documentado no sistema de GRC para acesso do CCO

    **Escalacao imediata de riscos relevantes (§ 2):**
    Dois niveis de escalacao:
    1. **CCO**: qualquer risco relevante deve ser reportado imediatamente — nao espera
       o ciclo de reporte regular.
    2. **Conselho**: "quando necessario" — situacoes de alta materialidade, potencial
       de impacto sistemico, violacoes graves ou situacoes de conflito de interesse
       com a propria diretoria.

    **O que e "risco relevante"?**
    A resolucao nao define, cabendo a politica de conformidade estabelecer criterios.
    Parametros tipicos: (a) valor financeiro potencial acima de limiar; (b) risco de
    sancao administrativa; (c) risco reputacional material; (d) violacao de norma
    prudencial; (e) evento com potencial de impacto sistemico.

    **Pratica de mercado:**
    CCOs de bancos mantidos alertados via sistema de GRC em tempo real. Escalacao
    para o conselho normalmente via "Presidente do Conselho" ou "Comite de Auditoria
    do Conselho" com registro formal em acta.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de reporte:**
      1. Dashboard do CCO em tempo real: visao consolidada de todos os riscos de
         conformidade, atividades em andamento, KRIs e alertas criticos.
      2. Sistema de alertas escalonados: classificacao de riscos por criticidade
         (baixo/medio/alto/critico), com alertas automaticos ao CCO para cada
         risco novo classificado como alto ou critico.
      3. Relatorio periodico automatizado: geracao automatica de relatorio de status
         para o CCO, com dados pre-preenchidos do GRC para revisao e envio.
      4. Canal de escalacao ao conselho: funcionalidade no sistema para o CCO
         notificar formalmente o conselho sobre risco relevante, com registro
         de data/hora, conteudo e confirmacao de recebimento.
      5. Rastreabilidade de reporte: registro auditavel de cada reporte realizado
         (quem reportou, o que, quando, como, a quem e qual foi a resposta).
      6. Notificacoes push: alertas em dispositivos moveis do CCO para situacoes
         de risco critico que requerem acao imediata.
    tools:
      - grc-platform
      - executive-dashboard
      - notification-system
      - board-communication-platform
      - audit-trail
  devsecops:
    prose: |
      **Automacao de reporte e escalacao:**
      1. Motor de classificacao de risco: algoritmo que avalia novos riscos
         identificados e classifica por criticidade, ativando fluxo de escalacao
         adequado automaticamente.
      2. Alertas de KRI: quando indicador-chave de conformidade cruza limiar
         definido, alerta automatico e criado para a funcao de conformidade e,
         se critico, para o CCO diretamente.
      3. SLA de reporte: alertas automaticos se a funcao de conformidade nao
         reportar ao CCO dentro do prazo definido na politica.
      4. Integracao com agenda do CCO: criacao automatica de reunioes de reporte
         periodico com pauta pre-preenchida com base nos dados do GRC.
      5. Pipeline de comunicados ao conselho: documentos de escalacao ao conselho
         passam por processo formal de geracao, aprovacao do CCO e entrega registrada.
    tools:
      - grc-platform
      - workflow-automation
      - monitoring-alerting
      - calendar-integration
      - document-workflow
  secops:
    prose: |
      **Processo de reporte operacional:**
      1. Calendario de reporte: frequencia de relatorios periodicos definida
         (recomendado mensal para o CCO), com template padronizado e prazo de entrega.
      2. Criterios de risco relevante: politica interna definindo quais situacoes
         exigem escalacao imediata ao CCO e quais requerem posterior escalacao
         ao conselho — exemplos concretos por tipo de risco.
      3. Processo de escalacao ao conselho: fluxo documentado, com quem aciona,
         como aciona (email formal, reuniao extraordinaria, comunicado escrito),
         prazo para resposta do conselho e registro em ata.
      4. Teste do processo de escalacao: simulacao anual de cenario de risco
         relevante para verificar que o processo de escalacao funciona na pratica.
      5. Historico de reportes: arquivo de todos os reportes periodicos e ad hoc
         realizados, com evidencias de recebimento pelo CCO e, quando aplicavel,
         pelo conselho.
    tools:
      - grc-platform
      - reporting-platform
      - document-management
      - audit-trail
