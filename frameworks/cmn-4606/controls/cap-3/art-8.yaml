id: art-8
family: cap-3
title: "Estrutura e Independencia da Funcao de Conformidade"
class: CMN-4606
baselines: [todas-ifs]
statement:
  prose: |
    Art. 8. A função de conformidade deve ser estruturada de forma a garantir
    sua independência e autonomia em relação às unidades de negócios.

    § 1. A função de conformidade não pode estar subordinada a unidades de
    negócios, a unidades responsáveis pela realização de operações sujeitas
    ao risco de conformidade ou ao auditor interno.

    § 2. A função de conformidade deve ter acesso a todas as áreas, aos
    registros, dados, sistemas e informações necessários ao exercício de suas
    atribuições, incluindo aqueles pertencentes a empresas do conglomerado.
guidance:
  prose: |
    O art. 8 e a garantia estrutural do programa de compliance: sem independencia,
    a funcao de conformidade nao pode cumprir seu papel. Este artigo define onde
    a funcao pode e onde nao pode estar posicionada na estrutura da instituicao.

    **Independencia e autonomia (caput):**
    A funcao de conformidade precisa poder dizer "nao" sem risco de represalia.
    Isso exige independencia hierarquica das areas que gera as obrigacoes de
    conformidade. A autonomia tambem significa recursos proprios: orcamento, equipe
    e ferramentas nao controlados pelas areas de negocio que ela supervisiona.

    **Tres vedacoes de subordinacao (§ 1):**
    1. **Unidades de negocios**: a funcao nao pode se reportar ao responsavel por
       tesouraria, credito, gestao de ativos ou qualquer area que gere receita e
       ao mesmo tempo crie riscos de conformidade.
    2. **Unidades de operacoes sujeitas a risco de conformidade**: areas como cambio,
       mesa proprietaria, distribuicao de produtos — a funcao nao pode ser controlada
       por quem cria o risco que ela monitora.
    3. **Auditor interno**: as tres linhas de defesa devem ser separadas. Primeira
       linha (negocios), segunda linha (compliance/riscos), terceira linha (auditoria).
       Misturar segunda e terceira linha e vedado expressamente.

    **Modelo tipico de posicionamento:**
    A funcao de conformidade se reporta diretamente ao CCO (Diretor de Conformidade),
    que por sua vez se reporta ao conselho de administracao. O CEO pode ter acesso
    funcional, mas nao hierarquico sobre a funcao de conformidade.

    **Acesso irrestrito a informacoes (§ 2):**
    A funcao de conformidade nao pode ser bloqueada no acesso a dados. Isso inclui:
    - Sistemas transacionais e historicos
    - Dados de clientes (com protecao de dados pessoais onde aplicavel)
    - Registros contabeis e financeiros
    - Informacoes de empresas do conglomerado relevantes para compliance
    - Atas de reunioes da diretoria e do conselho
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de independencia:**
      1. Segregacao de ambientes: a funcao de conformidade opera em ambiente
         tecnologico separado das areas de negocio, com administracao de sistemas
         propria (nao dependente da TI de negocios).
      2. Permissoes de acesso read-only abrangentes: o time de compliance tem
         acesso de leitura a todos os sistemas core (core bancario, CRM, sistemas
         de credito, treasury) sem dependencia de aprovacao das areas de negocio.
      3. Data access layer dedicada: pipeline de dados exclusivo para compliance
         que nao pode ser bloqueado ou limitado pelas areas de negocio.
      4. Infraestrutura do canal de denuncias: gerenciada exclusivamente pelo CCO,
         sem acesso da TI geral ou de areas de negocio.
      5. Logs de acesso auditaveis: registro imutavel de quais acessos a funcao
         de conformidade realizou, para demonstrar exercicio independente da funcao.
      6. Segregacao no conglomerado: funcao de conformidade da holding tem acesso
         de leitura a sistemas de todas as subsidiarias dentro do perimetro.
    tools:
      - identity-governance
      - data-access-platform
      - audit-logging
      - grc-platform
      - read-only-access-management
  devsecops:
    prose: |
      **Automacao de segregacao e acesso:**
      1. Controle de acesso por atributo (ABAC): permissoes de compliance concedidas
         por atributo de funcao, nao por aprovacao manual da area de negocio.
      2. Revisao periodica de acessos: verificacao automatica semestral de que a
         funcao de conformidade mantem os acessos necessarios (nao foram revogados
         sem autorizacao do CCO).
      3. Alerta de bloqueio de acesso: se sistema critico tornar-se inacessivel
         para o time de compliance, alerta automatico ao CCO e ao conselho.
      4. Pipeline de auditoria: geracao automatica de evidencia de independencia
         (logs de acesso sem interferencia de negocios) para uso em auditorias
         internas e externas.
      5. Separacao de repositorios Git: repositorios de politicas e controles de
         compliance gerenciados pelo CCO, sem acesso de escrita de areas de negocio.
    tools:
      - identity-management
      - rbac-abac-platform
      - access-review-automation
      - monitoring-alerting
      - git
  secops:
    prose: |
      **Governanca da independencia:**
      1. Organograma formal: posicionamento da funcao de conformidade documentado
         no organograma corporativo e aprovado pelo conselho, evidenciando
         independencia das tres proibicoes do § 1.
      2. Segregacao de funcoes: politica clara de segregacao entre funcao de
         conformidade, auditoria interna e areas de negocio — sem duplas funcoes.
      3. Revisao anual de independencia: auditoria interna verifica anualmente
         que a funcao de conformidade mantem independencia real (nao apenas formal),
         incluindo entrevistas com o CCO sobre pressoes externas sofridas.
      4. Gestao de acessos da funcao de conformidade: inventario de todos os acessos
         concedidos, revisado semestralmente, com processo de escalacao se acesso
         necessario for negado.
      5. Gestao orcamentaria independente: orcamento da funcao de conformidade
         aprovado diretamente pelo conselho, sem intermediacao da area financeira
         ou de negocios.
    tools:
      - grc-platform
      - identity-governance
      - audit-management
      - budget-management
      - organizational-chart-tool
