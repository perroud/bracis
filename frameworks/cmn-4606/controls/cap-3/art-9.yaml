id: art-9
family: cap-3
title: "Atribuicoes da Funcao de Conformidade"
class: CMN-4606
baselines: [todas-ifs]
statement:
  prose: |
    Art. 9. São atribuições da função de conformidade:

    I - identificar, avaliar, monitorar, testar e reportar os riscos de conformidade
    da instituição, incluindo os riscos decorrentes de conflitos de interesses;

    II - identificar e avaliar o impacto de mudanças regulatórias sobre as atividades
    da instituição;

    III - orientar e treinar os colaboradores quanto às obrigações estabelecidas
    na política de conformidade;

    IV - assessorar as áreas de negócios no desenvolvimento de novos produtos,
    serviços e processos, com vistas à observância das obrigações de conformidade;

    V - elaborar relatório semestral sobre as atividades da função de conformidade
    e sobre a situação de conformidade da instituição, a ser apresentado ao
    conselho de administração ou órgão equivalente;

    VI - manter registros atualizados das atividades da função de conformidade.
guidance:
  prose: |
    O art. 9 e o "job description regulatorio" da funcao de conformidade. Seis
    atribuicoes mandatorias, cobrindo todo o ciclo de vida do compliance.

    **I. Ciclo de gestao de riscos de conformidade:**
    O inciso I replica o ciclo do art. 3, inciso V, mas agora como responsabilidade
    operacional da funcao (nao apenas como requisito da politica):
    - Identificar: mapeamento proativo de obrigacoes e riscos
    - Avaliar: scoring de risco com matriz probabilidade x impacto
    - Monitorar: KRIs continuos, indicadores de aderencia
    - Testar: verificacao da efetividade dos controles (compliance testing)
    - Reportar: comunicacao estruturada dos resultados

    **II. Gestao de mudancas regulatorias (regulatory change management):**
    A funcao precisa ter processo para: (1) capturar todas as normas publicadas
    pelo BCB, CMN, CVM, SUSEP e demais reguladores; (2) avaliar impacto em cada
    area da instituicao; (3) coordenar implementacao das mudancas necessarias.

    **III. Treinamento e orientacao:**
    A funcao de conformidade nao apenas policia — ela educa. Treinamentos devem
    ser: segmentados por publico, periodicos, registrados e com avaliacao de
    efetividade. Orientacao ad hoc e tambem atribuicao da funcao.

    **IV. Assessoria a novos produtos (compliance by design):**
    A funcao deve ser envolvida ANTES do lancamento de novos produtos, nao apenas
    apos. Isso e o "compliance by design" — identificar riscos de conformidade
    na fase de concepcao, quando o custo de correcao e minimo.

    **V. Relatorio semestral ao conselho:**
    Frequencia minima: dois relatorios por ano. Destinatario: conselho de
    administracao (nao apenas o CEO). Conteudo minimo: atividades realizadas e
    situacao de conformidade. A funcao de conformidade tem, portanto, acesso
    direto ao conselho para reportar — reforco da independencia.

    **VI. Registros e documentacao:**
    Obrigacao de manter registros atualizados de todas as atividades. Evidencia
    para auditorias internas, externas e para o BCB (que pode solicitar os
    registros conforme art. 16).
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de operacoes da funcao de conformidade:**
      1. Risk register de compliance: modulo dedicado para registro, avaliacao e
         monitoramento de riscos de conformidade com historico de evolucao.
      2. Regulatory change management: feed automatizado de normas publicadas,
         workflow de avaliacao de impacto, atribuicao de tarefas por area impactada
         e tracking de implementacao.
      3. Sistema de treinamentos: LMS (Learning Management System) com curriculo
         de compliance, inscricao obrigatoria por funcao, historico de conclusao
         e certificados.
      4. Portal de assessoria a produtos: processo estruturado de compliance review
         em SDLC (Software Development Life Cycle) e no processo de lancamento
         de novos produtos financeiros.
      5. Modulo de relatorios: geracao automatica de relatorio semestral com base
         nos dados do GRC, com template aprovado pelo CCO e historico de relatorios
         entregues ao conselho.
      6. Audit trail completo: registro imutavel de todas as atividades da funcao
         de conformidade, exportavel para auditoria.
    tools:
      - grc-platform
      - regulatory-change-management
      - learning-management-system
      - compliance-reporting
      - ticketing-system
      - audit-trail
  devsecops:
    prose: |
      **Automacao das atribuicoes:**
      1. Automacao de monitoramento de KRIs: coleta automatica de indicadores de
         conformidade de sistemas core, com alertas de desvio ao time de compliance.
      2. Pipeline de regulatory change: webhook para publicacoes do BCB/CMN,
         criacao automatica de issue para avaliacao de impacto, routing por area.
      3. Automacao de compliance testing: testes periodicos agendados verificam
         que controles continuam funcionando (ex: limites, vedacoes, relatorios
         regulatorios sendo entregues dentro do prazo).
      4. Geracao automatizada do relatorio semestral: coleta de metricas e
         atividades do periodo, geracao de draft com dados pre-preenchidos para
         revisao do CCO antes da apresentacao ao conselho.
      5. Integracao com sistemas de lancamento de produtos: nenhum novo produto
         pode ser lancado sem compliance review registrado no sistema.
    tools:
      - gitlab-ci
      - monitoring-alerting
      - regulatory-feed-api
      - reporting-automation
      - product-launch-workflow
  secops:
    prose: |
      **Operacionalizacao das seis atribuicoes:**
      1. Programa de compliance testing: plano anual com metodologia, frequencia,
         amostras e criterios de passa/falha para cada controle relevante.
      2. Processo de regulatory watch: monitoramento semanal de publicacoes do
         BCB, CMN, CVM e SUSEP; reuniao mensal de impacto; atualizacao do plano
         de acao por area.
      3. Calendario de treinamentos: programa anual diferenciado por publico
         (areas de negocio de alto risco, back-office, TI, lideranca); matricula
         obrigatoria com prazo definido.
      4. Processo de compliance review de produtos: checklist de compliance para
         cada etapa do ciclo de desenvolvimento de produto; "go/no-go" de compliance
         antes do lancamento.
      5. Processo de elaboracao do relatorio semestral: cronograma de coleta de
         dados, revisao pelo CCO, apresentacao ao conselho com registro em ata.
      6. Politica de retencao de registros: todos os registros da funcao de
         conformidade retidos por no minimo 5 anos (art. 15).
    tools:
      - grc-platform
      - compliance-training-platform
      - regulatory-watch-service
      - reporting-platform
      - document-management
