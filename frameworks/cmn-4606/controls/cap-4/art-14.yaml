id: art-14
family: cap-4
title: "Reporte do CCO ao Conselho e Protecao ao Cargo"
class: CMN-4606
baselines: [todas-ifs]
statement:
  prose: |
    Art. 14. O diretor de conformidade deve ter acesso direto ao conselho de
    administração ou órgão equivalente para tratar de questões relacionadas
    à função de conformidade.

    § 1. O diretor de conformidade deve ser capaz de exercer suas funções com
    independência e sem qualquer tipo de interferência ou restrição que possa
    comprometer a integridade da função de conformidade.

    § 2. O afastamento do diretor de conformidade de suas funções deve ser
    comunicado ao Banco Central do Brasil, no prazo de trinta dias, acompanhado
    das razões que motivaram o afastamento.
guidance:
  prose: |
    O art. 14 e o principal dispositivo de protecao institucional do CCO.
    Garante acesso direto ao conselho, independencia funcional e comunicacao
    ao BCB em caso de afastamento — criando custos para a instituicao que
    tentar interferir ou remover um CCO inconveniente.

    **Acesso direto ao conselho (caput):**
    O CCO pode e deve comunicar-se diretamente com o conselho, sem necessidade
    de autorizacao ou intermediacao do CEO ou da diretoria executiva. Isso e
    fundamental para casos em que a propria diretoria esta envolvida em violacoes.

    **Independencia funcional — vedacao de interferencia (§ 1):**
    A norma veda explicitamente "qualquer tipo de interferencia ou restricao".
    Interferencias tipicas que a norma proibe:
    - Pressao para nao reportar determinados riscos
    - Limitacao de acesso a informacoes ou sistemas
    - Reducao de orcamento ou headcount como represalia
    - Ameacas de remocao ou transferencia
    - Instrucao para emitir "pareceres favoraveis" sem base

    **Comunicacao de afastamento ao BCB (§ 2):**
    Qualquer afastamento — demissao, rescisao, renuncia, licenca prolongada —
    deve ser comunicado ao BCB em 30 dias. O prazo e curto e a obrigacao e da
    instituicao, nao do CCO. Mais importante: a comunicacao deve incluir as
    "razoes que motivaram o afastamento".

    **Por que o § 2 e poderoso:**
    A exigencia de informar as razoes do afastamento ao BCB torna muito mais
    arriscado para uma instituicao demitir um CCO que reportou problemas inconvenientes.
    O BCB pode investigar se o afastamento foi represalia por exercicio correto
    da funcao. Este mecanismo desincentiva o silenciamento de CCOs.

    **Pratica recomendada:**
    Muitas instituicoes adotam politica de "non-retaliation" explicita para o CCO,
    documentada na politica de compliance e aprovada pelo conselho.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de protecao do CCO:**
      1. Canal direto CCO-Conselho: sistema de board management com acesso especial
         do CCO para comunicacao direta com conselheiros, sem passar pelo CEO.
         Mensagens criptografadas e auditadas.
      2. Repositorio imutavel do CCO: todos os relatorios, alertas, escalacoes e
         comunicacoes emitidos pelo CCO armazenados em storage imutavel (WORM),
         garantindo evidencia de exercicio da funcao mesmo em caso de afastamento.
      3. Alerta de tentativa de interferencia: se qualquer alteracao nos acessos
         do CCO for feita sem aprovacao do conselho, alerta automatico ao comite
         de auditoria do conselho.
      4. Sistema de comunicacao ao BCB: workflow especifico para comunicacao de
         afastamento do CCO ao BCB com prazo monitorado (30 dias), template
         padronizado e registro de envio/protocolo.
    tools:
      - board-portal
      - immutable-storage
      - identity-governance
      - regulatory-reporting
      - audit-alerting
  devsecops:
    prose: |
      **Controles DevSecOps para protecao do cargo:**
      1. Acesso do CCO como codigo: permissoes do CCO definidas em IaC (Terraform/Pulumi),
         requerendo aprovacao do conselho para qualquer alteracao — nao podem ser
         mudadas pela TI ou pelo CEO unilateralmente.
      2. Monitoramento de integridade do perfil: alertas automaticos se permissoes
         do CCO forem alteradas, acessos bloqueados ou recursos da funcao de
         conformidade forem reduzidos.
      3. Pipeline de comunicacao ao BCB: processo automatizado para a comunicacao
         de afastamento, com contador de 30 dias, lembretes escalados ao juridico
         e registro de entrega confirmada.
      4. Backup de acesso do CCO substituto: provisionamento automatico de acesso
         para o CCO interino assim que o afastamento e registrado no sistema.
    tools:
      - iac-terraform
      - identity-management
      - monitoring-alerting
      - regulatory-reporting
      - access-lifecycle-management
  secops:
    prose: |
      **Governanca de protecao e independencia do CCO:**
      1. Politica de non-retaliation: politica formal aprovada pelo conselho proibindo
         qualquer represalia contra o CCO pelo exercicio legitimo de suas funcoes,
         com processo de denuncia ao comite de auditoria do conselho.
      2. Revisao anual de independencia: o comite de auditoria do conselho pergunta
         diretamente ao CCO se sofreu qualquer tentativa de interferencia no
         periodo, sem presenca do CEO ou da diretoria.
      3. Documentacao de acesso ao conselho: registro de todas as comunicacoes
         diretas entre o CCO e o conselho, com data, assunto e resultado.
      4. Processo de afastamento: protocolo formal para o caso de afastamento do CCO
         incluindo comunicacao ao BCB (prazo, responsavel, razoes), designacao
         de interino, transferencia de responsabilidades e investigacao se o
         afastamento ocorreu em contexto de divergencia regulatoria.
      5. Checklist de independencia: avaliacao trimestral pelo CCO de eventuais
         tentativas de interferencia, recursos bloqueados ou restricoes de acesso —
         arquivada e disponivel para o BCB.
    tools:
      - grc-platform
      - board-portal
      - audit-management
      - regulatory-reporting
      - legal-management
