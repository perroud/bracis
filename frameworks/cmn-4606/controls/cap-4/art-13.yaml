id: art-13
family: cap-4
title: "Responsabilidades do Diretor de Conformidade"
class: CMN-4606
baselines: [todas-ifs]
statement:
  prose: |
    Art. 13. São responsabilidades do diretor de conformidade:

    I - assegurar o cumprimento das obrigações estabelecidas na política de
    conformidade;

    II - supervisionar as atividades da função de conformidade;

    III - garantir o reporte de que trata o art. 11;

    IV - avaliar a adequação dos recursos humanos e materiais alocados à
    função de conformidade;

    V - apresentar ao conselho de administração ou órgão equivalente o relatório
    semestral de que trata o art. 9, V.
guidance:
  prose: |
    O art. 13 define as cinco responsabilidades legais do CCO. Nao sao sugestoes
    ou boas praticas — sao obrigacoes regulatorias do cargo.

    **I. Assegurar o cumprimento da politica (responsabilidade global):**
    O CCO e o responsavel final pelo programa de compliance. Nao pelo cumprimento
    tecnico de cada norma (isso e responsabilidade de cada area de negocio),
    mas pelo funcionamento do sistema que garante o cumprimento. Diferenca critica:
    o CCO nao e o "dono" do risco de conformidade de cada produto — e o "dono"
    do sistema de identificacao, monitoramento e correcao de desvios.

    **II. Supervisionar a funcao de conformidade:**
    O CCO supervisiona as atividades da equipe (ou prestador) que executa as
    funcoes do art. 9. Supervisao nao e delegacao total — o CCO precisa manter
    visibilidade e validar a qualidade do trabalho realizado.

    **III. Garantir o reporte (art. 11):**
    O CCO e pessoalmente responsavel por garantir que o reporte exigido no art. 11
    acontece: tempestivo, abrangente e com escalacao imediata quando necessario.
    Se o reporte falhar, o CCO falhou.

    **IV. Avaliar adequacao de recursos:**
    O CCO deve ter visao critica sobre se a funcao de conformidade tem o que precisa
    para funcionar. Se nao tiver — recursos humanos insuficientes, sistemas
    inadequados, orcamento cortado — o CCO deve escalar ao conselho. Esta
    responsabilidade protege o CCO: se a instituicao privar a funcao de conformidade
    de recursos, o CCO pode documentar que alertou o conselho.

    **V. Apresentar o relatorio semestral ao conselho:**
    O CCO apresenta PESSOALMENTE o relatorio ao conselho — nao delega ao CEO
    ou ao CFO. Isso e reforco da linha direta CCO-Conselho sem intermediacao
    da diretoria executiva.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de gestao do CCO:**
      1. Painel de responsabilidades: checklist das cinco responsabilidades do art. 13
         com status de cada uma, evidencias de cumprimento e historico.
      2. Supervisao da funcao: visao em tempo real de todas as atividades da funcao
         de conformidade no GRC — riscos identificados, controles testados, treinamentos
         realizados, normas avaliadas.
      3. Gestao de reporte: modulo especifico para controle dos reportes ao conselho
         e escalacoes criticas, com confirmacoes de recebimento e respostas registradas.
      4. Avaliacao de recursos: modulo de capacidade da funcao de conformidade —
         headcount, orcamento, ferramentas — com comparativos de mercado e
         funcionalidade para o CCO formalizar pedidos de recursos ao conselho.
      5. Sistema de apresentacao ao conselho: portal de board management com
         capacidade de upload e apresentacao do relatorio semestral, registro
         de aprovacao e distribuicao aos conselheiros.
    tools:
      - grc-platform
      - board-portal
      - compliance-monitoring
      - resource-management
      - executive-reporting
  devsecops:
    prose: |
      **Controles DevSecOps para as responsabilidades do CCO:**
      1. Dashboard de KPIs para o CCO: metricas automatizadas de cumprimento
         da politica por area, com evolucao temporal e alertas de desvio.
      2. Automation de supervisao: alertas automaticos ao CCO quando atividades
         da funcao de conformidade nao sao realizadas conforme plano (ex: teste
         de controle em atraso, relatorio periodico nao entregue).
      3. Pipeline de relatorio semestral: geracao automatica de draft do relatorio
         com dados do GRC, revisao pelo CCO, aprovacao formal e entrega ao board.
      4. Metricas de recursos da funcao: monitoramento automatico de headcount,
         orcamento consumido vs. aprovado e utilizacao de ferramentas de compliance.
      5. Auditoria de supervisao: trilha de auditoria mostrando que o CCO acessou,
         revisou e aprovou os resultados da funcao de conformidade regularmente.
    tools:
      - grc-platform
      - gitlab-ci
      - monitoring-alerting
      - reporting-automation
      - audit-trail
  secops:
    prose: |
      **Operacionalizacao das cinco responsabilidades:**
      1. Agenda do CCO: reunioes mensais de status com a funcao de conformidade,
         reunioes semestrais de apresentacao ao conselho, revisao trimestral
         de recursos — tudo agendado e registrado.
      2. Processo de avaliacao de recursos: pesquisa anual de benchmarking de
         equipes de compliance no setor financeiro, comparacao com o porte e
         complexidade da instituicao, formalizacao de pedidos de recursos ao conselho.
      3. Relatorio de supervisao: o CCO documenta sua supervisao da funcao —
         quais revisoes fez, quais ajustes solicitou, quais resultados validou.
      4. Politica de escalacao pessoal do CCO: criterios para o CCO escalar
         diretamente ao conselho sem passar pela diretoria executiva.
      5. Avaliacao de desempenho da funcao: o CCO realiza avaliacao formal anual
         da qualidade das entregas da funcao de conformidade (ou prestador),
         documentada e arquivada.
    tools:
      - grc-platform
      - board-portal
      - compliance-metrics
      - performance-management
      - audit-management
