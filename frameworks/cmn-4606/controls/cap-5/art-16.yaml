id: art-16
family: cap-5
title: "Acesso do Banco Central do Brasil"
class: CMN-4606
baselines: [todas-ifs]
statement:
  prose: |
    Art. 16. O Banco Central do Brasil pode, a qualquer tempo, solicitar às
    instituições informações e documentos sobre a política de conformidade e
    sobre as atividades desenvolvidas pela função de conformidade.

    Parágrafo único. As instituições devem disponibilizar, no prazo estabelecido
    pelo Banco Central do Brasil, as informações e documentos solicitados.
guidance:
  prose: |
    O art. 16 e o dispositivo de supervisao regulatoria da CMN 4.606. Cria o poder
    de acesso irrestrito do BCB ao programa de compliance de qualquer instituicao
    do SFN a qualquer momento.

    **"A qualquer tempo" — sem aviso previo:**
    O BCB pode solicitar documentos de compliance sem necessidade de aviso previo,
    sem limitacao de escopo e sem obrigacao de justificar a solicitacao. Isso cobre:
    - Supervisao de rotina (supervisao prudencial regular)
    - Investigacoes especificas decorrentes de denuncia ou incidente
    - Inspeções tematicas de compliance no setor
    - Pedidos relacionados a processos administrativos sancionadores

    **Escopo da solicitacao:**
    Qualquer documento listado na politica de conformidade e qualquer registro de
    atividade da funcao de conformidade esta sujeito ao acesso. Isso inclui:
    - Todas as versoes da politica
    - Relatorios de compliance
    - Registros de treinamentos
    - Investigacoes de denuncias
    - Avaliacao de mudancas regulatorias
    - Declaracoes de conflito de interesses

    **Prazo de atendimento (paragrafo unico):**
    O prazo e estabelecido pelo BCB na propria solicitacao. A instituicao nao pode
    definir unilateralmente um prazo maior. O descumprimento do prazo e uma
    violacao adicional da norma.

    **Implicacao critica:**
    A existencia do art. 16 significa que toda a documentacao de compliance deve
    estar sempre atualizada, organizada e recuperavel. Uma instituicao que "nao
    tem o documento" quando o BCB solicita esta em posicao regulatoria extremamente
    vulneravel — pode caracterizar inexistencia do programa de compliance.

    **Interacao com o art. 10 (terceirizacao):**
    Quando a funcao e terceirizada, o prestador tambem esta sujeito ao acesso direto
    do BCB (art. 10, IV). A instituicao nao pode usar a terceirizacao como escudo
    contra o acesso do supervisor.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de resposta ao BCB:**
      1. Portal de solicitacoes do BCB: sistema dedicado para receber, registrar
         e gerenciar solicitacoes de documentos e informacoes pelo BCB, com
         tracking de prazo e status de atendimento.
      2. Repositorio de producao rapida: toda a documentacao de compliance indexada
         de forma que qualquer tipo de documento possa ser localizado e exportado
         em menos de 30 minutos.
      3. Perfil de supervisao do BCB: credencial de acesso especifica para o BCB
         com escopo limitado, auditoria completa de cada acesso e controle de
         vigencia (ativada e desativada conforme necessidade de cada supervisao).
      4. Empacotamento automatico: ao receber solicitacao do BCB, sistema gera
         automaticamente pacote ZIP com os documentos solicitados, assinados
         digitalmente e com hash de integridade.
      5. SLA de atendimento: monitoramento automatico do prazo de cada solicitacao
         com alertas escalonados ao CCO e ao juridico conforme aproximacao do prazo.
    tools:
      - document-management
      - regulatory-portal
      - identity-governance
      - secure-file-transfer
      - sla-monitoring
  devsecops:
    prose: |
      **Automacao de resposta regulatoria:**
      1. Pipeline de coleta de documentos: script automatizado que, dada uma lista
         de tipos e periodos solicitados pelo BCB, coleta e empacota os documentos
         do repositorio de compliance.
      2. Verificacao de integridade: hash SHA-256 de cada documento enviado ao BCB,
         com registro imutavel do hash para prova futura de que o documento nao
         foi alterado apos envio.
      3. Testes de producao rapida: teste mensal verificando que o repositorio
         de compliance responde a queries de producao dentro do SLA de 30 minutos.
      4. Alerta de solicitacao critica: quando solicitacao do BCB e registrada no
         sistema, alerta imediato ao CCO, juridico e CEO, com classificacao de
         urgencia baseada no prazo estabelecido.
      5. Auditoria do acesso do BCB: log completo de todos os acessos do BCB ao
         sistema de compliance, com registro de quais documentos foram acessados/baixados.
    tools:
      - document-management
      - gitlab-ci
      - monitoring-alerting
      - digital-signature
      - audit-logging
  secops:
    prose: |
      **Gestao operacional de resposta ao BCB:**
      1. Processo de gestao de solicitacoes: fluxo documentado desde o recebimento
         da solicitacao ate a entrega, com responsaveis, prazos intermediarios e
         aprovacao do CCO e juridico antes do envio.
      2. Preparacao proativa: sem esperar solicitacao, manutencao continua do acervo
         organizado como se uma solicitacao do BCB pudesse chegar a qualquer momento.
      3. Exercicio de simulacao: simulacao anual de resposta a uma solicitacao
         ficta do BCB para testar o processo, identificar gargalos e corrigir
         antes de uma situacao real.
      4. Controle de qualidade pre-envio: revisao obrigatoria dos documentos pelo
         CCO e juridico antes de qualquer envio ao BCB — verificacao de completude,
         ausencia de documentos sensiveis fora do escopo e consistencia das informacoes.
      5. Registro de historico de solicitacoes: arquivo completo de todas as
         solicitacoes do BCB recebidas, documentos entregues e comunicacoes
         relacionadas, retido por no minimo 5 anos.
    tools:
      - grc-platform
      - document-management
      - legal-management
      - compliance-calendar
      - audit-management
