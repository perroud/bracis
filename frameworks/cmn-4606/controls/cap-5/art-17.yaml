id: art-17
family: cap-5
title: "Prazo de Adequacao, Revogacoes e Vigencia"
class: CMN-4606
baselines: [todas-ifs]
statement:
  prose: |
    Art. 17. As instituições devem adequar-se às disposições desta Resolução
    até 1° de abril de 2018.

    § 1. Ficam revogadas as disposições em contrário a esta Resolução, em especial
    o Capítulo VIII da Resolução CMN n° 3.380, de 29 de junho de 2006.

    § 2. Esta Resolução entra em vigor na data de sua publicação.
guidance:
  prose: |
    O art. 17 encerra a CMN 4.606 com as disposicoes formais de vigencia,
    prazo de adequacao e revogacoes.

    **Prazo de adequacao — 1° de abril de 2018:**
    A resolucao foi publicada em 19 de outubro de 2017 e deu as instituicoes
    aproximadamente 5 meses para se adequar. Para fins de compliance hoje
    (2026), este prazo ja passou — qualquer instituicao sem programa de
    compliance estruturado ja esta em violacao desde abril de 2018.

    **Revogacao do Capitulo VIII da CMN 3.380/2006:**
    A CMN 3.380/2006 tratava de risco operacional. Seu Capitulo VIII trazia
    disposicoes sobre compliance que foram substituidas integralmente pela
    CMN 4.606. A nova resolucao consolidou e aprofundou os requisitos.

    **Implicacao para analise historica:**
    Ao analisar o historico de compliance de uma instituicao pre-2018, a CMN 3.380
    (Capitulo VIII) era o arcabouco aplicavel. A CMN 4.606 substituiu e expandiu
    esses requisitos.

    **Vigencia a partir da publicacao:**
    A resolucao entrou em vigor em 19 de outubro de 2017, embora o prazo de
    adequacao das instituicoes seja 1° de abril de 2018. Isso significa que
    o BCB poderia, tecnicamente, iniciar supervisao do cumprimento a partir
    de 19/10/2017, mas sancoes por inadequacao so seriam cabidas apos 01/04/2018.

    **Status atual (2026):**
    A CMN 4.606 esta em pleno vigor. Nao houve alteracoes ou revogacoes desde
    sua publicacao. Qualquer atividade de compliance deve estar alinhada
    integralmente a esta resolucao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de conformidade com prazo e vigencia:**
      1. Historico de compliance: para instituicoes que estavam em operacao antes
         de 2018, o sistema deve ter registro da data de implementacao do programa
         de compliance, evidenciando que a adequacao foi realizada dentro do prazo.
      2. Monitoramento de atualizacoes normativas: processo de vigilancia para
         detectar eventuais alteracoes na CMN 4.606 (emendas, complementacoes,
         instrucoes normativas) que exijam atualizacao do programa.
      3. Controle de revogacoes: manter registro de que o Capitulo VIII da CMN
         3.380/2006 foi revogado, garantindo que nenhum sistema ou processo
         ainda referencie requisitos ultrapassados.
      4. Calendario de compliance: linha do tempo da evolucao regulatoria do
         compliance no SFN (CMN 3.380 → CMN 4.606), util para auditorias historicas
         e para entender o contexto regulatorio.
    tools:
      - grc-platform
      - regulatory-change-management
      - compliance-calendar
      - document-management
  devsecops:
    prose: |
      **Controle de versao regulatoria:**
      1. Mapeamento regulatorio versionado: a base de controles do compliance-as-code
         referencia a CMN 4.606 como norma vigente, com flag de substituicao
         da CMN 3.380/2006 (Capitulo VIII).
      2. Testes de aderencia continua: pipeline que verifica se o programa de
         compliance implementado continua alinhado a todos os artigos da CMN 4.606.
      3. Alertas de mudanca normativa: integracao com feed do Diario Oficial e
         portal do BCB para detectar alteracoes na CMN 4.606, gerando issue
         automatica para avaliacao de impacto.
      4. Deprecacao de referencias antigas: scan de repositorios e documentos
         que ainda referenciam a CMN 3.380/2006 (Capitulo VIII revogado),
         gerando alertas para atualizacao.
    tools:
      - gitlab-ci
      - regulatory-feed-api
      - compliance-as-code
      - document-scanner
  secops:
    prose: |
      **Gestao de adequacao e vigencia:**
      1. Certificado de adequacao: documento formal arquivado demonstrando que a
         instituicao se adequou a CMN 4.606 antes de 01/04/2018 (para instituicoes
         pre-existentes) ou na data de inicio de operacoes (para instituicoes novas).
      2. Processo de monitoramento de atualizacoes: responsavel designado para
         monitorar eventuais alteracoes na CMN 4.606, com processo de comunicacao
         ao CCO e avaliacao de impacto.
      3. Auditoria de conformidade regulatoria: auditoria interna anual verificando
         aderencia integral a todos os artigos da CMN 4.606, com relatorio de
         gaps e plano de acao para cada desvio identificado.
      4. Revisao de referencias normativas: garantia de que politicas internas,
         contratos e documentos de compliance referenciam a CMN 4.606 e nao
         a normativa revogada (CMN 3.380, Capitulo VIII).
    tools:
      - grc-platform
      - audit-management
      - regulatory-change-management
      - document-management
