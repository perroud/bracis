id: art-6
family: cap-2
title: "Divulgacao e Acesso a Politica de Conformidade"
class: CMN-4606
baselines: [todas-ifs]
statement:
  prose: |
    Art. 6. A política de conformidade deve ser amplamente divulgada internamente
    e estar acessível a todos os colaboradores da instituição.

    § 1. A política de conformidade, ou resumo de seus elementos essenciais,
    deve ser divulgada nos canais de comunicação da instituição, inclusive
    no seu sítio eletrônico na internet.

    § 2. As informações sobre o canal de recebimento de denúncias devem ser
    amplamente divulgadas, interna e externamente.
guidance:
  prose: |
    O art. 6 trata da transparencia e acessibilidade como componentes fundamentais
    do programa de compliance. Uma politica aprovada mas desconhecida nao funciona.

    **Divulgacao interna ampla (caput):**
    "Amplamente divulgada" e "acessivel a todos" sao padroes exigentes. Nao basta
    publicar no intranet e esperar que as pessoas encontrem. A instituicao deve:
    - Comunicar ativamente cada publicacao/revisao da politica
    - Garantir que colaboradores remotos, de filiais e terceirizados tenham acesso
    - Treinamentos de conscientizacao sobre o conteudo da politica
    - Certificacao de ciencia por todos os colaboradores

    **Divulgacao publica — site (§ 1):**
    A norma exige transparencia externa. O publico, clientes e reguladores devem
    poder verificar que a instituicao possui politica de compliance. A publicacao
    pode ser da politica completa ou de "resumo dos elementos essenciais" —
    abrindo espaco para que informacoes sensiveis (ex: detalhes do canal de
    denuncias e identidade dos investigadores) nao sejam publicadas.

    **Divulgacao do canal de denuncias — dupla obrigacao (§ 2):**
    O canal de denuncias deve ser amplamente divulgado em dois ambitos:
    1. **Internamente**: todos os colaboradores devem conhecer o canal e saber
       como usar (treinamentos, comunicados, cartazes, e-mail corporativo).
    2. **Externamente**: clientes, parceiros, fornecedores e o publico em geral
       devem poder reportar violacoes (link no site, mensagens em contratos, etc.)

    **Por que isso importa:**
    A divulgacao do canal externamente e especialmente relevante para: reclamacoes
    de clientes sobre praticas abusivas, denuncia de fraudes por fornecedores e
    relatos de violacoes por terceiros que interagem com a instituicao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de publicacao e acessibilidade:**
      1. Portal interno de compliance: pagina dedicada no intranet com a politica
         vigente, versoes anteriores (historico), treinamentos e link para o canal
         de denuncias.
      2. Site publico: secao "Governanca e Compliance" com a politica ou resumo
         publicado, data da ultima revisao e informacoes de contato para o canal
         de denuncias.
      3. Sistema de distribuicao: ao aprovar nova versao da politica, envio
         automatico de comunicado a todos os colaboradores com link para o documento.
      4. Tracking de acesso: registro de quais colaboradores acessaram e confirmaram
         ciencia da politica, para fins de auditoria.
      5. Acessibilidade digital: politica publicada em formato acessivel (PDF
         pesquisavel, nao apenas imagem), disponivel em dispositivos moveis.
      6. API publica: endpoint que retorna metadados da politica (versao vigente,
         data de aprovacao) para integracao com plataformas de due diligence de
         terceiros.
    tools:
      - intranet-platform
      - cms-platform
      - notification-system
      - access-tracking
      - whistleblowing-platform
  devsecops:
    prose: |
      **Pipeline de publicacao de documentos de compliance:**
      1. Pipeline automatizado: aprovacao do conselho → geracao de PDF assinado
         digitalmente → publicacao no intranet e site externo simultaneamente.
      2. Verificacao de disponibilidade: monitoramento automatico que alerta se
         as paginas de compliance (interna e externa) estiverem indisponiveis.
      3. Testes de acessibilidade: verificacao automatica de que PDFs sao pesquisaveis
         e que links do canal de denuncias estao funcionando.
      4. Auditoria de publicacao: log imutavel de cada publicacao com timestamp,
         versao publicada e canais onde foi divulgada.
      5. Deploy do canal de denuncias: infraestrutura do canal com uptime SLA de
         99.9%, monitoramento continuo, alertas de indisponibilidade.
    tools:
      - gitlab-ci
      - cdn-platform
      - uptime-monitoring
      - accessibility-testing
      - audit-logging
  secops:
    prose: |
      **Programa de divulgacao e conscientizacao:**
      1. Plano de comunicacao anual: cronograma de divulgacao da politica, treinamentos
         obrigatorios, campanhas de conscientizacao sobre compliance.
      2. Programa de onboarding: novos colaboradores recebem a politica no primeiro dia,
         com treinamento obrigatorio a ser concluido em 30 dias.
      3. Divulgacao do canal de denuncias: comunicacao trimestral lembrando o canal,
         como acessar e garantias de sigilo e nao-retaliacao.
      4. Comunicacao externa: inclusao de informacoes sobre o canal de denuncias
         em contratos de prestacao de servico, portal do fornecedor e comunicados
         a clientes.
      5. Metricas de divulgacao: percentual de colaboradores que acessaram a politica,
         percentual que completou o treinamento, numero de acessos ao canal de
         denuncias por periodo — reportado ao CCO mensalmente.
      6. Teste de conhecimento: questionario anual sobre o conteudo da politica
         para verificar que a divulgacao foi efetiva.
    tools:
      - compliance-training-platform
      - intranet-platform
      - whistleblowing-platform
      - compliance-metrics
      - learning-management-system
