id: art-4
family: cap-2
title: "Codigo de Conduta e Gestao de Conflito de Interesses"
class: CMN-4606
baselines: [todas-ifs]
statement:
  prose: |
    Art. 4. A política de conformidade deve contemplar, ainda:

    I - o código de conduta da instituição, incluindo as regras para prevenção
    e gestão de conflitos de interesses;

    II - os procedimentos para identificação e gestão de conflitos de interesses
    entre as atividades da instituição, entre a instituição e seus clientes,
    e entre as atividades dos administradores e funcionários e os interesses
    da instituição e de seus clientes.
guidance:
  prose: |
    O art. 4 trata dos dois elementos de maior impacto etico do programa de compliance:
    o codigo de conduta e a gestao de conflitos de interesses.

    **Codigo de conduta (inciso I):**
    Documento normativo que estabelece os padroes comportamentais esperados de
    administradores, colaboradores, parceiros e prestadores de servico. Elementos tipicos:
    - Politica de presentes e entretenimento (limites e vedacoes)
    - Politica de negociacao de valores mobiliarios (insider trading prevention)
    - Politica de atividades externas (vedacao de concorrencia, duplo emprego)
    - Regras de uso de recursos corporativos
    - Normas de confidencialidade e protecao de informacoes privilegiadas

    **Conflito de interesses (inciso II) — tres dimensoes:**
    1. **Institucional**: conflitos entre diferentes atividades da propria instituicao
       Ex: banco que atua como gestor de recursos e tambem como custodiante/distribuidor
       dos mesmos fundos — interesse em maximizar receita propria vs. interesse do cliente.

    2. **Instituicao vs. cliente**: conflitos onde os interesses da instituicao
       divergem dos interesses de seus clientes.
       Ex: recomendar produto proprio de maior margem vs. produto de terceiro mais
       adequado ao perfil de risco do cliente.

    3. **Pessoal**: conflitos de interesse dos administradores e funcionarios.
       Ex: funcionario com participacao societaria em fornecedor que concorre em
       licitacao; administrador com parente em empresa cliente.

    **Gestao de conflitos:**
    A norma exige dois niveis: (1) identificacao proativa — mapeamento estruturado
    de situacoes de conflito potencial; (2) gestao — procedimentos para mitigar,
    divulgar ou evitar o conflito identificado.

    **Relevancia setorial:**
    Particularmente critico para bancos multiplos com carteiras de investimento,
    corretoras, gestores de recursos e instituicoes que atuam em multiplos mercados
    simultaneamente.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de codigo de conduta e conflitos:**
      1. Portal digital do Codigo de Conduta com acesso publico (versao simplificada)
         e acesso autenticado para colaboradores (versao completa com procedimentos).
      2. Sistema de certificacao digital: todos os colaboradores certificam anualmente
         que leram, compreenderam e se comprometem com o Codigo de Conduta.
      3. Motor de deteccao de conflitos de interesses: regras configuradas para
         identificar automaticamente situacoes de conflito a partir de dados de
         RH (parentes em empresas relacionadas), patrimonio (participacoes societarias)
         e operacoes (transacoes com partes relacionadas).
      4. Registry de declaracoes de conflito: registro permanente de todos os
         conflitos declarados, decisoes tomadas e acoes de mitigacao.
      5. Mural de chinese walls: sistema de controle de acesso a informacoes
         privilegiadas com barreiras de informacao configuradas por area/produto.
    tools:
      - grc-platform
      - policy-management
      - identity-governance
      - chinese-wall-platform
      - conflict-of-interest-registry
  devsecops:
    prose: |
      **Automacao de codigo de conduta no ciclo de desenvolvimento:**
      1. Integracao de verificacao de conflitos de interesses nos workflows de
         aprovacao: sistemas de credito, gestao de ativos e treasury verificam
         automaticamente se usuarios envolvidos em transacoes possuem conflitos
         declarados.
      2. Pipeline de publicacao do Codigo de Conduta: atualizacoes passam por
         aprovacao digital do CCO e conselho antes de publicacao no portal.
      3. Testes automatizados nas barreiras de informacao (chinese walls): verificam
         periodicamente que permissoes de acesso estao corretas e segregadas.
      4. Scan de violacoes potenciais: monitoramento de acessos cruzados em sistemas
         onde um usuario nao deveria ter visibilidade (ex: gestor de recursos acessando
         dados de treasury de balcao simultaneamente).
    tools:
      - gitlab-ci
      - access-control-testing
      - policy-as-code
      - identity-management
      - audit-logging
  secops:
    prose: |
      **Operacionalizacao do programa de conduta e conflitos:**
      1. Programa de treinamento especifico sobre conflitos de interesses: obrigatorio
         para areas de maior risco (mesa proprietaria, gestao de ativos, credito).
      2. Processo de declaracao anual de conflitos: formulario padronizado onde
         colaboradores e administradores declaram participacoes societarias, cargos
         externos, relacionamentos relevantes.
      3. Avaliacao pre-operacao: checklist de conflitos de interesses antes de
         aprovacao de operacoes materiais (fusoes, aquisicoes, contratos relevantes).
      4. Processo de investigacao de violacoes do Codigo de Conduta: fluxo,
         responsaveis, prazo, escalacao ao CCO e ao conselho.
      5. Relatorio de conflitos ao conselho: relatorio semestral com casos
         identificados, tratamento aplicado e tendencias.
      6. Teste de efetividade das barreiras de informacao: simulacoes trimestrais
         para verificar que chinese walls estao funcionando corretamente.
    tools:
      - grc-platform
      - compliance-training-platform
      - conflict-registry
      - investigation-management
      - reporting-platform
