id: art-3
family: cap-2
title: "Requisitos Minimos da Politica de Conformidade"
class: CMN-4606
baselines: [todas-ifs]
statement:
  prose: |
    Art. 3. A política de conformidade deve contemplar, no mínimo:

    I - os objetivos da política de conformidade;

    II - o comprometimento da alta administração com a observância de leis,
    regulamentos, códigos de conduta e boas práticas de mercado;

    III - o escopo de atuação da função de conformidade;

    IV - as responsabilidades da função de conformidade;

    V - as ações e os procedimentos voltados à identificação, avaliação, monitoramento,
    teste e comunicação dos riscos de conformidade;

    VI - as medidas a serem adotadas em caso de violação da política de conformidade;

    VII - o canal de comunicação para o recebimento de denúncias de possíveis
    violações da política de conformidade, garantindo sigilo e proteção ao denunciante.
guidance:
  prose: |
    O art. 3 e o coracao operacional da CMN 4.606 — define os sete elementos
    minimos que toda politica de compliance deve conter.

    **I. Objetivos (inciso I):**
    Devem ser especificos e mensuraveleis: nao "cumprir as leis" genericamente, mas
    objetivos como "zero sancoes administrativas", "100% de colaboradores treinados",
    "resposta a reclamacoes em ate 5 dias uteis".

    **II. Comprometimento da alta administracao (inciso II):**
    O "tone at the top" e requisito regulatorio, nao apenas retórico. Deve estar
    documentado em atas do conselho, mensagens assinadas do CEO/presidente e
    declaracoes formais de compromisso.

    **III. Escopo da funcao (inciso III):**
    Quais leis, normas e regulamentos estao no perimetro da funcao de conformidade.
    Ex: CMN 4.606, CMN 4.557, BCB 3.978 (PLD/FT), LGPD, CVM 35, BACEN 4893, etc.

    **IV. Responsabilidades (inciso IV):**
    Mapa claro de quem faz o que: funcao de conformidade central vs. compliance
    descentralizado nas areas de negocio (modelo de "1.5 linha" ou "2a linha").

    **V. Ciclo de gestao de riscos de conformidade (inciso V):**
    Os cinco verbos do inciso definem o ciclo completo:
    - Identificar: mapeamento de obrigacoes e riscos de nao-conformidade
    - Avaliar: scoring de risco (probabilidade x impacto)
    - Monitorar: indicadores continuos de aderencia
    - Testar: verificacao periodica da efetividade dos controles
    - Comunicar: reporte ao CCO, conselho e regulador

    **VI. Medidas disciplinares (inciso VI):**
    Escalonamento de sancoes: advertencia, suspensao, rescisao, comunicacao ao
    regulador. Deve estar alinhado ao Codigo de Conduta e ao RH.

    **VII. Canal de denuncias (inciso VII):**
    O "whistleblowing channel" e requisito expresso. Deve garantir:
    - Anonimato opcional
    - Protecao contra retaliacao (anti-retaliation policy)
    - Prazo de resposta ao denunciante
    - Investigacao independente das denuncias recebidas
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma estruturada nos sete elementos do art. 3:**
      1. Modulo de objetivos: painel de OKRs/KPIs de compliance com metas,
         responsaveis e status de atingimento por periodo.
      2. Repositorio de comprometimento: atas digitalizadas, mensagens da alta
         administracao e declaracoes de compromisso com versionamento e assinatura
         eletronica certificada.
      3. Perimetro regulatorio: mapa interativo de normas aplicaveis com links
         para textos oficiais, data de vigencia e status de aderencia.
      4. RACI de conformidade: matriz de responsabilidades funcao central vs.
         areas de negocio, visualizavel por norma e por processo.

      **Gestao de riscos de conformidade (inciso V):**
      5. Risk register de compliance integrado ao GRC da instituicao.
      6. Workflow de avaliacao de risco com campos padronizados para probabilidade,
         impacto, controles existentes e acoes de mitigacao.
      7. Dashboard de monitoramento em tempo real com KRIs de conformidade.
      8. Modulo de testing de controles com agendamento, historico e evidencias.

      **Canal de denuncias (inciso VII):**
      9. Portal web dedicado com acesso por colaboradores, terceiros e clientes.
      10. Garantia tecnica de anonimato: sem logs de IP para denuncias anonimas,
          identificacao opcional pelo denunciante.
      11. Workflow de investigacao com segregacao de acesso: apenas investigadores
          designados acessam o conteudo das denuncias.
    tools:
      - grc-platform
      - whistleblowing-platform
      - policy-management
      - risk-register
      - compliance-monitoring
  devsecops:
    prose: |
      **Compliance-as-Code para os sete elementos:**
      1. Schema de politica que valida a presenca dos sete elementos obrigatorios
         do art. 3 — pipeline falha se algum elemento estiver ausente.
      2. Testes automatizados de completude da politica ativados a cada commit
         no repositorio de documentos de compliance.
      3. Notificacao automatica de revisao quando o perimetro regulatorio muda:
         nova circular BCB = issue automatica para atualizacao do escopo (inciso III).
      4. Pipeline para o canal de denuncias: deploy seguro, testes de anonimizacao,
          verificacao de ausencia de logs de identificacao.
      5. Automacao de geração de relatorio de aderencia aos sete incisos para
         auditoria interna e para o CCO.
    tools:
      - gitlab-ci
      - yaml-validation
      - policy-as-code
      - security-testing
      - compliance-reporting
  secops:
    prose: |
      **Operacionalizacao dos sete elementos:**
      1. Ciclo de revisao anual da politica: agendado, com checklist dos sete
         incisos, aprovacao do conselho e comunicacao a todos os colaboradores.
      2. Programa de treinamento: todos os colaboradores treinados nos objetivos
         e obrigacoes da politica; registro de conclusao por colaborador.
      3. Processo de gestao de riscos de conformidade: identificacao trimestral
         de novos riscos, avaliacao semestral do portfolio de riscos existentes.
      4. Testing de controles: plano anual de testes, metodologia documentada,
         evidencias retidas, resultados reportados ao CCO.
      5. Gestao do canal de denuncias: SLA de resposta inicial (5 dias uteis),
         SLA de conclusao de investigacao (60 dias), relatorio anual de denuncias
         ao conselho (sem identificacao dos denunciantes).
      6. Processo disciplinar documentado: fluxograma de escalacao, integrado
         ao RH e juridico, com registro de cada caso.
    tools:
      - grc-platform
      - compliance-training-platform
      - whistleblowing-platform
      - investigation-management
      - policy-management
