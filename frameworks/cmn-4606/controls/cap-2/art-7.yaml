id: art-7
family: cap-2
title: "Aplicacao da Politica a Conglomerados e Terceiros"
class: CMN-4606
baselines: [todas-ifs]
statement:
  prose: |
    Art. 7. A política de conformidade deve contemplar as empresas integrantes
    do conglomerado e as empresas nas quais a instituição detenha, direta ou
    indiretamente, participação societária relevante, bem como os prestadores
    de serviços relevantes.

    Parágrafo único. Para fins do disposto no caput, considera-se relevante a
    participação societária superior a vinte por cento do capital votante.
guidance:
  prose: |
    O art. 7 expande o perimetro da politica de compliance alem da propria instituicao,
    abrangendo o ecossistema completo: conglomerado, participadas e terceiros relevantes.

    **Empresas do conglomerado:**
    Todas as entidades do grupo financeiro — banco, corretora, distribuidora, gestora,
    seguradora, administradora de consorcio — devem estar cobertas pela politica de
    compliance do conglomerado. O compliance da holding responde pela consistencia
    do programa em todo o grupo.

    **Participacoes societarias relevantes (paragrafo unico):**
    Participacao superior a 20% do capital votante e considerada "relevante" para
    fins de extensao da politica de compliance. Isso inclui:
    - Coligadas com influencia significativa na gestao
    - Joint ventures financeiras
    - SPEs (Sociedades de Proposito Especifico) criadas para operacoes estruturadas

    **Prestadores de servicos relevantes:**
    Parceiros que executam atividades que a instituicao seria responsavel se executasse
    internamente. Exemplos:
    - Correspondentes bancarios (agentes de credito, casas de cambio)
    - Terceirizados de TI (processamento de pagamentos, data center)
    - Gestores de recursos terceirizados (quando a IF distribui)
    - Bureaus de credito e fornecedores de dados de clientes

    **Logica regulatoria:**
    A instituicao nao pode terceirizar sua responsabilidade regulatoria. Se um
    correspondente bancario pratica irregularidades em nome da IF, a IF responde
    perante o BCB. Logo, o programa de compliance deve alcanca-los.

    **Risco de cadeia de valor:**
    Risco de compliance de terceiros e um dos mais dificeis de gerir. O CCO precisa
    de processo sistematico de due diligence, monitoramento continuo e clausulas
    contratuais que permitam auditoria e rescisao por nao-conformidade.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de compliance de terceiros e conglomerado:**
      1. Cadastro de entidades em perimetro: mapa completo do conglomerado,
         participadas acima de 20% e prestadores de servicos relevantes, com
         status de aderencia a politica de compliance da IF.
      2. Portal do fornecedor: plataforma onde terceiros relevantes acessam a
         politica, declaram aderencia, submetem documentacao e recebem auditorias.
      3. Motor de due diligence: automacao de checks de compliance pre-contratacao
         (antecedentes regulatorios, sancoes, PEPs, listas restritivas).
      4. Modulo de monitoramento continuo de terceiros: alertas automaticos quando
         um prestador relevante sofre sancoes regulatorias, mudancas de controle,
         ou falhas de compliance conhecidas.
      5. Dashboard consolidado: visao unica do status de compliance de todo o
         ecossistema (conglomerado + participadas + terceiros) para o CCO.
    tools:
      - grc-platform
      - vendor-management
      - third-party-risk-management
      - sanctions-screening
      - compliance-monitoring
  devsecops:
    prose: |
      **Automacao de compliance de cadeia de valor:**
      1. API de verificacao de terceiros: integrada ao processo de onboarding de
         fornecedores — nenhum contrato e assinado sem checklist de compliance concluido.
      2. Automacao de screening continuo: batch diario que verifica todos os
         prestadores ativos contra listas de sancoes (OFAC, ONU, COAF, TCU).
      3. Pipelines de conformidade para sistemas de terceiros: acordos de servico
         (SLAs de compliance) monitorados automaticamente para prestadores de TI.
      4. Integracao com CNPJ e CVM: verificacao automatica de situacao regulatoria
         de prestadores junto a orgaos reguladores brasileiros.
      5. Controle de acesso de terceiros: todos os acessos de prestadores a
         sistemas da IF passam por processo de aprovacao com justificativa e
         prazo definido, com revogacao automatica.
    tools:
      - vendor-onboarding-platform
      - sanctions-api
      - identity-governance
      - third-party-monitoring
      - access-management
  secops:
    prose: |
      **Programa de gestao de risco de terceiros:**
      1. Inventario de terceiros: mapeamento anual de todos os prestadores de
         servicos relevantes com classificacao de risco (critico, alto, medio, baixo).
      2. Due diligence pre-contratacao: checklist padronizado incluindo verificacao
         de politica de compliance, certificacoes, sancoes e historico regulatorio.
      3. Clausulas contratuais de compliance: clausula padrao exigindo aderencia
         a politica da IF, direito de auditoria e rescisao por nao-conformidade.
      4. Monitoramento periodico: visitas de auditoria a correspondentes bancarios
         e terceiros de alta criticidade; questionario anual de auto-avaliacao
         para terceiros de media criticidade.
      5. Gestao de incidentes de terceiros: processo de resposta quando terceiro
         relevante reporta ou e identificado em situacao de nao-conformidade.
      6. Relatorio anual de terceiros: status do programa de gestao de risco de
         terceiros reportado ao CCO e ao conselho.
    tools:
      - third-party-risk-management
      - contract-management
      - audit-management
      - grc-platform
      - sanctions-screening
