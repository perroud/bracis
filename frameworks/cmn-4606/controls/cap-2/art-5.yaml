id: art-5
family: cap-2
title: "Aprovacao e Revisao da Politica de Conformidade"
class: CMN-4606
baselines: [todas-ifs]
statement:
  prose: |
    Art. 5. A política de conformidade deve ser aprovada pelo conselho de administração
    ou, na sua ausência, pelo órgão equivalente com função de supervisão da diretoria.

    § 1. A política de conformidade deve ser revisada ao menos uma vez por ano
    e sempre que houver mudanças relevantes na legislação, regulamentação, modelo de
    negócio, estrutura organizacional ou no perfil de risco da instituição.

    § 2. As alterações realizadas na política de conformidade devem ser aprovadas
    pelo conselho de administração ou órgão equivalente.
guidance:
  prose: |
    O art. 5 estabelece a governanca formal da politica de compliance: aprovacao
    no nivel mais alto e obrigacao de revisao periodica e por evento.

    **Aprovacao pelo conselho (caput):**
    A exigencia de aprovacao pelo conselho de administracao eleva o compliance de
    uma questao operacional para uma responsabilidade de governanca. O conselho
    responde solidariamente pela existencia e efetividade do programa de compliance.
    Em instituicoes sem conselho de administracao (ex: algumas cooperativas), o orgao
    equivalente (conselho fiscal, assembleia geral) exerce essa funcao.

    **Revisao anual obrigatoria (§ 1):**
    Minimo de uma revisao por ano, independentemente de mudancas. A logica e que
    o ambiente regulatorio e de negocios muda continuamente, e a politica precisa
    acompanhar essa dinamica.

    **Revisao por evento — cinco gatilhos (§ 1):**
    1. Mudancas na legislacao: nova lei, decreto ou resolucao que afete as obrigacoes
    2. Mudancas na regulamentacao: novas circulares, instrucoes normativas, orientacoes do BCB
    3. Mudancas no modelo de negocio: novo produto, novo segmento, nova linha de receita
    4. Mudancas na estrutura organizacional: fusao, aquisicao, reestruturacao
    5. Mudancas no perfil de risco: novos riscos materiais identificados, mudanca de apetite

    **Aprovacao de alteracoes (§ 2):**
    Cada mudanca, por menor que seja, exige aprovacao formal do conselho. Nao existe
    "ajuste editorial" — qualquer alteracao no conteudo da politica e uma revisao formal.

    **Implicacao pratica:**
    O conselho precisa ter processo estruturado para:
    - Receber a politica com tempo habil para analise (nao apenas "rubber stamp")
    - Registrar a aprovacao em ata com o texto aprovado e a data de vigencia
    - Monitorar o cumprimento do cronograma de revisao
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao do ciclo de aprovacao:**
      1. Workflow digital de aprovacao: proposta de revisao → revisao pelo CCO →
         apresentacao ao conselho → aprovacao registrada → publicacao automatica.
      2. Controle de vigencia: a politica so entra em vigor apos aprovacao formal
         registrada no sistema, com data e identificacao dos aprovadores.
      3. Notificacoes automaticas: alerta ao CCO quando a politica esta a 60 dias
         do vencimento do prazo anual de revisao.
      4. Gatilhos automaticos de revisao: integracoes com fontes de dados regulatorios
         (Diario Oficial, portal do BCB) detectam novas normas e criam issues de
         avaliacao de impacto na politica de compliance.
      5. Historico imutavel: registro permanente de todas as versoes aprovadas,
         com quem aprovou, quando e o que mudou em cada versao (diff auditavel).
      6. Distribuicao automatica: apos aprovacao, nova versao e distribuida
         automaticamente a todos os colaboradores com confirmacao de recebimento.
    tools:
      - policy-management
      - document-workflow
      - regulatory-change-management
      - notification-system
      - audit-trail
  devsecops:
    prose: |
      **Pipeline de versionamento e aprovacao:**
      1. A politica de compliance e gerenciada como codigo em repositorio Git:
         branch de desenvolvimento, review por CCO, merge aprovado pelo conselho.
      2. Tag semantica por versao aprovada: v1.0 (vigencia inicial), v1.1 (primeira
         revisao anual), v1.2 (revisao por evento), garantindo rastreabilidade.
      3. Pipeline de diff automatico: ao submeter nova versao, o pipeline gera
         relatorio de diferencas para facilitar a revisao pelo conselho.
      4. Integracao com calendario regulatorio: webhook que cria MR automatico
         quando norma relevante e publicada, sugerindo atualizacoes necessarias.
      5. Controle de acesso: apenas CCO pode criar propostas de revisao; apenas
         aprovacao registrada do conselho permite merge na branch principal.
    tools:
      - git
      - gitlab-ci
      - document-diff
      - regulatory-watch
      - access-control
  secops:
    prose: |
      **Processo de governanca da politica:**
      1. Calendario anual de compliance: revisao da politica agendada no 4T, com
         prazo para conclusao ate 31 de dezembro de cada ano.
      2. Pre-revisao: pesquisa de mudancas regulatorias, de negocio e de risco
         ocorridas no periodo, compilada pela funcao de conformidade para subsidiar
         a revisao.
      3. Processo de apresentacao ao conselho: material preparado com evidencias
         de necessidade de cada mudanca, impacto e risco de nao-aderir.
      4. Registro em ata: template padronizado para registro da aprovacao em ata
         do conselho, incluindo referencia a versao aprovada e data de vigencia.
      5. Monitoramento de gatilhos de revisao: processo continuo de avaliacao de
         eventos que ativam revisao nao-agendada (§ 1 do art. 5).
      6. Comunicacao aos colaboradores: programa de comunicacao interna para cada
         revisao com destaque para as principais mudancas.
    tools:
      - grc-platform
      - policy-management
      - compliance-calendar
      - board-portal
      - internal-communication
