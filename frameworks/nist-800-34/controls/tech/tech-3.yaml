id: tech-3
family: tech
title: "Mainframe and Legacy System Contingency"
class: NIST-800-34

statement:
  prose: >-
    Mainframe and legacy systems require specialized contingency planning
    due to their centralized architecture, unique hardware requirements,
    and often critical role in organizational operations. Contingency
    planning for these systems should address hardware compatibility and
    availability, specialized software licensing, data backup with
    platform-specific considerations, recovery procedures that account
    for system complexity, and the limited availability of qualified
    personnel for legacy technologies. Organizations should consider
    the long-term viability of contingency strategies for legacy systems
    and plan for eventual system modernization or replacement.

guidance:
  prose: >-
    Mainframe and legacy systems often process the most critical
    organizational data and support essential business functions. Their
    contingency planning presents unique challenges including limited
    hardware availability, specialized knowledge requirements, and
    proprietary backup/recovery tools. Organizations should maintain
    relationships with vendors and service providers who can supply
    compatible hardware and software on short notice. Knowledge
    management is critical as the pool of qualified personnel for
    legacy technologies diminishes over time. Organizations should
    document recovery procedures in extreme detail and invest in
    cross-training. Long-term strategies should include evaluation
    of migration to modern platforms while maintaining contingency
    capabilities during the transition period.

references:
  - citation: "NIST SP 800-34 Rev 1, Chapters 5-6"
    url: "https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Where possible, implement virtualization layers that abstract
      legacy hardware dependencies. Use terminal emulation and API
      gateway patterns to provide modern interfaces to legacy systems.
      Implement data replication from legacy systems to modern platforms
      to reduce dependency on legacy recovery. Deploy monitoring
      solutions compatible with legacy platforms to enable early
      detection of issues. Maintain infrastructure-as-code definitions
      for any supporting infrastructure around legacy systems.
    tools:
      - "z/VM, KVM (mainframe virtualization)"
      - "API gateways (legacy system abstraction)"
      - "Change data capture (legacy-to-modern replication)"
      - "Mainframe monitoring (BMC, Broadcom)"
      - "Terminal emulation services"
  devsecops:
    prose: >-
      Implement API layers that decouple applications from direct
      legacy system dependencies. Use strangler fig patterns to
      gradually migrate functionality from legacy to modern platforms.
      Implement automated testing of legacy system interfaces to
      validate recovery. Document legacy system integration points
      and data flows. Maintain compatibility libraries and middleware
      configurations under version control.
    tools:
      - "API gateways (MuleSoft, Kong)"
      - "Message queues (MQ Series, Kafka Connect)"
      - "Legacy testing frameworks"
      - "Integration middleware (version controlled)"
  secops:
    prose: >-
      Maintain detailed documentation of legacy system configurations,
      dependencies, and recovery procedures. Establish vendor
      agreements for emergency hardware and software supply.
      Implement knowledge management programs to retain legacy
      system expertise. Conduct regular recovery exercises specific
      to legacy systems. Evaluate and plan for system modernization
      to reduce long-term contingency risk. Maintain an inventory
      of legacy system dependencies and compatibility requirements.
    tools:
      - "Knowledge management systems"
      - "Vendor management platforms"
      - "Legacy system documentation"
      - "Modernization planning tools"

