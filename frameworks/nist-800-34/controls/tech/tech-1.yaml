id: tech-1
family: tech
title: "Client/Server and Cloud System Contingency"
class: NIST-800-34

statement:
  prose: >-
    Client/server systems and cloud-based systems present unique contingency
    planning considerations due to their distributed architecture, shared
    resources, and dependency on network connectivity. Contingency planning
    for these systems should address server hardware and software redundancy,
    data replication and synchronization, network connectivity, client
    access continuity, and cloud service provider contingency capabilities.
    Organizations using cloud services should understand the shared
    responsibility model and ensure that contingency planning addresses
    both provider and customer responsibilities. Cloud-specific
    considerations include multi-region deployment, service-level agreements,
    data portability, and vendor lock-in risks.

guidance:
  prose: >-
    Client/server and cloud environments require contingency planning that
    addresses both centralized server components and distributed client
    access. For traditional client/server systems, focus on server
    redundancy, data backup, and network resilience. For cloud systems,
    organizations must understand and document the shared responsibility
    model boundaries. Cloud provider SLAs should be evaluated against
    organizational RTO/RPO requirements. Organizations should implement
    multi-region architectures where feasible, maintain data portability
    capabilities, and avoid excessive vendor lock-in. Container orchestration
    platforms provide natural contingency capabilities through pod scheduling,
    self-healing, and multi-cluster deployments.

references:
  - citation: "NIST SP 800-34 Rev 1, Chapter 5"
    url: "https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement Kubernetes-based deployments with multi-cluster and
      multi-region capabilities. Use cloud-native services with built-in
      redundancy and failover. Deploy stateless applications that can be
      rescheduled across nodes and regions without data loss. Implement
      persistent storage solutions with cross-region replication. Use
      service mesh for traffic management and automatic failover between
      clusters. Monitor cloud provider health and implement automated
      responses to provider-level incidents.
    tools:
      - "Kubernetes (container orchestration)"
      - "Rancher / Anthos / EKS-A (multi-cluster management)"
      - "Cloud-native databases (Aurora, Cloud SQL, Cosmos DB)"
      - "Istio / Linkerd (service mesh)"
      - "Cloud provider status monitoring"
  devsecops:
    prose: >-
      Design applications using twelve-factor methodology for cloud
      portability and resilience. Implement containerized deployments
      that abstract infrastructure dependencies. Use configuration
      management to support deployment across multiple cloud providers
      or regions. Implement health checks, liveness probes, and readiness
      probes for automated recovery. Design data access layers that
      support multiple backend configurations for failover scenarios.
    tools:
      - "Docker (containerization)"
      - "Helm / Kustomize (multi-environment configuration)"
      - "GitLab CI/CD (multi-cloud deployment pipelines)"
      - "Application health check frameworks"
      - "Multi-cloud abstraction layers"
  secops:
    prose: >-
      Document cloud service provider shared responsibility boundaries
      for contingency planning. Evaluate cloud provider SLAs against
      organizational RTO/RPO requirements. Maintain cloud service
      provider contingency plan reviews and audit reports. Implement
      multi-cloud or hybrid strategies to reduce single-provider
      dependency risks. Establish vendor management procedures for
      cloud providers. Monitor cloud provider incident communications
      and integrate with organizational notification procedures.
    tools:
      - "Cloud provider management consoles"
      - "Vendor risk management platforms"
      - "SLA monitoring tools"
      - "Cloud security posture management (CSPM)"

