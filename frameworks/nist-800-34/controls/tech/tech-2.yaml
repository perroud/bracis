id: tech-2
family: tech
title: "Telecommunications System Contingency"
class: NIST-800-34

statement:
  prose: >-
    Telecommunications systems are critical to the operation of most
    information systems and require specific contingency planning
    considerations. Contingency planning for telecommunications should
    address network infrastructure redundancy, diverse routing,
    alternate service providers, and priority restoration services.
    Organizations should identify single points of failure in their
    telecommunications infrastructure and implement appropriate
    redundancy measures. The Telecommunications Service Priority (TSP)
    program provides for priority provisioning and restoration of
    telecommunications services for national security and emergency
    preparedness users.

guidance:
  prose: >-
    Telecommunications contingency planning should address local area
    networks, wide area networks, internet connectivity, voice
    communications, and specialized communications (e.g., VPN, satellite).
    Redundancy strategies include diverse cable routing (avoiding common
    pathways), multiple service providers, wireless backup connectivity,
    and satellite communications for extreme scenarios. Organizations
    should evaluate the telecommunications requirements for each critical
    system and match redundancy levels to system criticality. The TSP
    program is available to qualifying organizations and provides
    priority treatment for provisioning and restoration of
    telecommunications services.

references:
  - citation: "NIST SP 800-34 Rev 1, Chapter 6"
    url: "https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement multi-provider network architectures with automatic
      failover. Deploy SD-WAN for intelligent routing across multiple
      network paths. Use cloud-native networking services with built-in
      redundancy. Implement network monitoring with automated failover
      triggers. Deploy DNS-based load balancing across multiple ISP
      connections. Implement network segmentation to isolate failures
      and contain disruptions.
    tools:
      - "SD-WAN (Cisco Viptela, VMware VeloCloud)"
      - "Multi-provider BGP routing"
      - "Cloud networking (VPC, Transit Gateway)"
      - "DNS load balancing (Route 53, Cloudflare)"
      - "Network monitoring (ThousandEyes, Kentik)"
  devsecops:
    prose: >-
      Implement application-level network resilience including connection
      pooling, retry logic, and timeout management. Design microservices
      communication patterns that tolerate network partitions using
      eventual consistency and message queuing. Implement service mesh
      for automatic retry, circuit breaking, and traffic shifting.
      Test application behavior under network degradation conditions
      as part of CI/CD pipelines.
    tools:
      - "Istio / Linkerd (service mesh)"
      - "RabbitMQ / Kafka (message queuing for resilience)"
      - "Resilience4j (circuit breakers, retries)"
      - "tc / Toxiproxy (network simulation testing)"
  secops:
    prose: >-
      Document all telecommunications dependencies and single points
      of failure. Establish contracts with multiple telecommunications
      providers with diverse routing. Apply for the Telecommunications
      Service Priority (TSP) program where eligible. Test
      telecommunications failover procedures regularly. Maintain
      alternative communications methods (satellite phones, cellular,
      radio) for emergency scenarios. Monitor telecommunications
      provider performance and incident response capabilities.
    tools:
      - "Network documentation tools"
      - "TSP program registration"
      - "Alternative communications equipment"
      - "Provider performance monitoring"

