id: rec-4
family: rec
title: "Notification and Activation Procedures"
class: NIST-800-34

statement:
  prose: >-
    The notification/activation phase defines the initial actions taken once
    a system disruption or outage has been detected or appears to be imminent.
    This phase includes activities to notify recovery personnel, conduct an
    outage assessment, and activate the contingency plan. Notification
    procedures should define the criteria for plan activation, the personnel
    authorized to activate the plan, the notification chain (including
    alternates), and the methods of notification. Damage assessment procedures
    should enable rapid evaluation of the disruption scope to determine
    whether the contingency plan should be activated and which recovery
    procedures should be initiated.

guidance:
  prose: >-
    Effective notification and activation requires predefined criteria that
    clearly specify when the contingency plan should be activated. The
    notification chain should include primary and alternate contacts with
    multiple communication methods (phone, email, text, messaging apps).
    Damage assessment should evaluate the cause, scope, and expected duration
    of the disruption. The activation authority should be clearly defined,
    typically the contingency plan coordinator or a designated alternate.
    Organizations should implement automated notification systems that can
    reach all required personnel simultaneously. Notification procedures
    should be tested during contingency plan exercises to verify accuracy
    of contact information and effectiveness of communication methods.

references:
  - citation: "NIST SP 800-34 Rev 1, Section 3.4.3"
    url: "https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated incident detection and notification using monitoring
      and alerting platforms. Configure multi-channel notification systems that
      can escalate through phone, SMS, email, and messaging platforms.
      Implement automated runbooks that trigger initial assessment procedures
      upon detection of qualifying events. Use on-call management platforms
      to manage notification chains and escalation policies. Implement
      status pages that automatically update stakeholders on incident
      status and recovery progress.
    tools:
      - "PagerDuty / Opsgenie (incident notification and escalation)"
      - "Prometheus / Alertmanager (automated detection)"
      - "Statuspage / Cachet (status communication)"
      - "Slack / Microsoft Teams (team communication)"
      - "Rundeck (automated assessment runbooks)"
  devsecops:
    prose: >-
      Integrate application-level health monitoring with notification
      systems. Implement automated incident detection based on application
      metrics, error rates, and SLA violations. Configure CI/CD pipeline
      notifications that alert teams to deployment failures that may
      require contingency plan activation. Maintain notification
      configurations as code in version-controlled repositories. Implement
      ChatOps workflows for rapid team coordination during activation.
    tools:
      - "GitLab CI/CD (pipeline failure notifications)"
      - "Application monitoring (Datadog, New Relic)"
      - "ChatOps (Slack bots, Teams integrations)"
      - "Incident.io / Rootly (incident management)"
  secops:
    prose: >-
      Develop and maintain comprehensive notification and activation
      procedures with clear activation criteria. Maintain current contact
      lists with multiple communication methods for all contingency plan
      personnel and alternates. Define the notification chain and
      escalation procedures. Establish damage assessment procedures and
      templates. Conduct regular contact list verification exercises.
      Integrate notification procedures with the organization's overall
      emergency communication plan. Document decision criteria for
      contingency plan activation levels.
    tools:
      - "Emergency notification systems (Everbridge, AlertMedia)"
      - "Contact management databases"
      - "Damage assessment templates"
      - "Communication plan documents"

