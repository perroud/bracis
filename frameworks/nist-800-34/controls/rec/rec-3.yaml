id: rec-3
family: rec
title: "Alternate Processing and Telecommunications"
class: NIST-800-34

statement:
  prose: >-
    Organizations should establish alternate telecommunications services
    including necessary agreements to permit the resumption of information
    system operations for essential missions and business functions when
    the primary telecommunications capabilities are unavailable. Alternate
    telecommunications services should be sufficiently separated from
    primary telecommunications services so as not to be susceptible to the
    same hazards. Providers of alternate telecommunications services
    should have adequate contingency plans to ensure continuity of service.
    Organizations should consider the use of diverse routing, redundant
    providers, and priority-of-service agreements.

guidance:
  prose: >-
    Telecommunications continuity is critical because modern information
    systems depend heavily on network connectivity. Organizations should
    implement diverse routing to eliminate single points of failure in
    network paths. Using multiple telecommunications providers reduces
    the risk of a single provider failure disrupting operations. Priority-
    of-service agreements (such as the Telecommunications Service Priority
    program) can ensure critical government communications receive priority
    restoration. Organizations should consider both wired and wireless
    alternatives, including satellite communications for extreme scenarios.
    Network redundancy should be tested regularly and included in
    contingency plan exercises.

references:
  - citation: "NIST SP 800-34 Rev 1, Section 3.4.2"
    url: "https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement multi-provider network connectivity with automatic failover.
      Deploy SD-WAN solutions for intelligent traffic routing across
      multiple network paths. Use cloud provider transit gateways and
      direct connect links with redundant circuits. Implement network
      monitoring that detects and alerts on connectivity failures across
      all links. Configure BGP-based failover for internet-facing services.
      Deploy CDN services to maintain content availability during primary
      site network disruptions.
    tools:
      - "SD-WAN solutions (Cisco Viptela, VMware VeloCloud)"
      - "AWS Direct Connect / Azure ExpressRoute (redundant links)"
      - "BGP-based failover (network resilience)"
      - "Cloudflare / Akamai (CDN for content availability)"
      - "Network monitoring (ThousandEyes, PRTG)"
  devsecops:
    prose: >-
      Design applications to handle network disruptions gracefully using
      retry logic, circuit breakers, and offline-first patterns. Implement
      service mesh for automatic traffic rerouting and load balancing
      across available network paths. Use edge computing and CDN strategies
      to reduce dependency on central connectivity. Implement health check
      endpoints that test network connectivity to dependent services.
      Design APIs with timeout and retry configurations appropriate for
      degraded network conditions.
    tools:
      - "Istio / Linkerd (service mesh traffic management)"
      - "CDN providers (edge caching)"
      - "Circuit breaker libraries (Resilience4j)"
      - "Offline-first frameworks"
  secops:
    prose: >-
      Establish contracts with multiple telecommunications providers
      ensuring diverse routing. Document all network dependencies and
      single points of failure. Register for Telecommunications Service
      Priority (TSP) program where applicable. Test alternate
      telecommunications paths during contingency plan exercises.
      Monitor network provider performance and maintain escalation
      contacts. Review telecommunications continuity annually and
      update based on infrastructure changes.
    tools:
      - "Network documentation tools"
      - "TSP registration"
      - "Provider SLA management"
      - "Network testing tools"

