id: pol-1
family: pol
title: "Contingency Planning Policy"
class: NIST-800-34

statement:
  prose: >-
    To be effective and to ensure that personnel fully understand the organization's
    contingency planning requirements, the contingency plan must be based on a clearly
    defined policy. The contingency planning policy statement should define the
    organization's overall contingency objectives and establish the organizational
    framework and responsibilities for information system contingency planning.
    The policy should identify roles, responsibilities, assigned personnel by name,
    and the applicability of the policy. The policy should also address coordination
    among organizational entities. At a minimum, the policy should comply with
    applicable federal laws, directives, policies, regulations, standards, and guidance.

guidance:
  prose: >-
    The contingency planning policy provides the foundation for all contingency
    planning activities. It must be approved by senior management and disseminated
    to all relevant stakeholders. The policy should define the scope of systems
    covered, the frequency of plan reviews and updates, and the requirements for
    testing and training. Organizations should align the policy with their overall
    risk management strategy and ensure consistency with other organizational
    policies such as incident response, disaster recovery, and business continuity.
    The policy should be reviewed at least annually or whenever significant changes
    occur in the organization or its information systems.

references:
  - citation: "NIST SP 800-34 Rev 1, Section 3.1"
    url: "https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Codify contingency planning policies as version-controlled documents in a
      Git repository. Use policy-as-code frameworks such as Open Policy Agent (OPA)
      to enforce contingency planning requirements across infrastructure. Define
      infrastructure recovery tiers based on system criticality and map them to
      automated recovery procedures. Implement GitOps workflows so that
      infrastructure can be fully reconstructed from code in the event of a
      contingency. Maintain policy compliance dashboards to track adherence across
      all managed systems.
    tools:
      - "Git (policy version control)"
      - "Open Policy Agent (policy enforcement)"
      - "Backstage (service catalog with recovery metadata)"
      - "Terraform / Pulumi (infrastructure-as-code)"
      - "Grafana (compliance dashboards)"
  devsecops:
    prose: >-
      Store contingency planning policies and procedures in version-controlled
      repositories alongside application code. Use merge requests with mandatory
      approvals to manage policy changes. Implement CI/CD pipelines that validate
      contingency plan documentation completeness and consistency. Integrate
      contingency planning considerations into the software development lifecycle,
      ensuring that new applications include recovery requirements from design
      phase. Maintain runbooks as code that are automatically validated against
      policy requirements.
    tools:
      - "GitLab / GitHub (version-controlled policies)"
      - "GitLab CI/CD (policy validation pipelines)"
      - "Confluence / GitLab Wiki (policy documentation)"
      - "Jira / GitLab Issues (policy review tracking)"
  secops:
    prose: >-
      Develop and maintain a formal contingency planning policy approved by senior
      leadership. Ensure the policy defines clear roles and responsibilities for
      contingency planning, testing, training, and execution. Establish a policy
      review schedule with at least annual reviews. Coordinate with legal, compliance,
      and risk management teams to ensure alignment with regulatory requirements.
      Distribute the policy to all relevant personnel and maintain acknowledgment
      records. Track policy compliance metrics and report to senior management.
    tools:
      - "ServiceNow (policy management)"
      - "GRC platforms (policy compliance tracking)"
      - "Document management systems"
      - "NIST CSF 2.0 (framework alignment)"

