id: pol-2
family: pol
title: "Business Impact Analysis"
class: NIST-800-34

statement:
  prose: >-
    The Business Impact Analysis (BIA) is a key step in the contingency planning
    process. The BIA enables the contingency plan coordinator to fully characterize
    the information system requirements, processes, and interdependencies and use
    this information to determine contingency requirements and priorities. The BIA
    should identify critical information system resources, identify disruption
    impacts and allowable outage times, and develop recovery priorities. The BIA
    should consider the maximum tolerable downtime (MTD), recovery time objectives
    (RTO), and recovery point objectives (RPO) for each system component.

guidance:
  prose: >-
    The BIA is the foundation for recovery strategy selection and resource
    allocation. It quantifies the impact of disruptions to information systems and
    identifies which systems and processes are most critical to organizational
    operations. The analysis should consider financial impact, operational impact,
    regulatory/legal impact, and reputational impact. The BIA should involve key
    stakeholders from business units and IT to ensure completeness. Results should
    be documented and updated whenever significant changes occur to mission/business
    processes or information systems. The BIA directly informs the selection of
    recovery strategies, alternate processing sites, and backup solutions.

references:
  - citation: "NIST SP 800-34 Rev 1, Section 3.2"
    url: "https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated service dependency mapping to identify critical system
      interdependencies. Use service mesh telemetry and distributed tracing to
      understand real-time dependencies between microservices. Maintain service
      catalogs with criticality ratings, RTOs, and RPOs as metadata. Implement
      automated health checks and SLA monitoring that feeds into BIA assessments.
      Use chaos engineering experiments to validate BIA assumptions about failure
      impacts and recovery times. Tag infrastructure resources with criticality
      tiers to automate priority-based recovery.
    tools:
      - "Backstage / Compass (service catalog with BIA metadata)"
      - "Jaeger / Zipkin (distributed tracing for dependencies)"
      - "Istio / Linkerd (service mesh dependency mapping)"
      - "Gremlin / Chaos Monkey (chaos engineering validation)"
      - "Datadog / Dynatrace (SLA monitoring)"
  devsecops:
    prose: >-
      Document application-level RTO and RPO requirements in service metadata
      files within application repositories. Implement CI/CD pipeline stages that
      validate recovery configuration against BIA requirements. Create automated
      tests that verify backup frequency meets RPO requirements and recovery
      procedures meet RTO requirements. Maintain application dependency manifests
      that inform the BIA. Include BIA considerations in architecture decision
      records and design documents.
    tools:
      - "GitLab / GitHub (BIA documentation in repos)"
      - "GitLab CI/CD (recovery validation pipelines)"
      - "Application Performance Monitoring (impact measurement)"
      - "Architecture Decision Records (BIA documentation)"
  secops:
    prose: >-
      Conduct formal Business Impact Analyses for all information systems,
      identifying critical resources, allowable outage times, and recovery
      priorities. Interview key stakeholders across business and IT to quantify
      disruption impacts. Document maximum tolerable downtime (MTD), recovery
      time objectives (RTO), and recovery point objectives (RPO) for each system.
      Categorize systems into recovery tiers based on criticality. Review and
      update BIA results at least annually or when significant changes occur.
      Use BIA results to justify contingency planning investments and resource
      allocation to senior management.
    tools:
      - "BIA templates and worksheets"
      - "GRC platforms (risk and impact tracking)"
      - "ServiceNow (CMDB for system inventory)"
      - "Risk assessment tools"

