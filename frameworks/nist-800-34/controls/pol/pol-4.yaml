id: pol-4
family: pol
title: "Identify Preventive Controls"
class: NIST-800-34

statement:
  prose: >-
    In some cases, the outage impacts identified in the BIA may be mitigated or
    eliminated through preventive measures that deter, detect, or reduce impacts
    to the system. Where feasible and cost-effective, preventive methods are
    preferable to actions that may be needed to recover the system after a
    disruption. Preventive controls should be identified and implemented to
    reduce the effects of system disruptions, thereby increasing the availability
    of the system and reducing contingency life cycle costs. Preventive controls
    include measures such as appropriate capacity planning, environmental controls,
    fire suppression systems, water sensors, uninterruptible power supplies,
    generator fuel contracts, and access controls.

guidance:
  prose: >-
    Preventive controls are the first line of defense in contingency planning.
    They are typically less costly than recovery actions and should be prioritized
    based on the BIA results. Organizations should evaluate preventive controls
    against the identified risks and disruption scenarios to determine
    cost-effectiveness. Common categories include environmental controls (HVAC,
    fire suppression, water detection), physical security (access controls,
    surveillance), power protection (UPS, generators, redundant power feeds),
    network redundancy (diverse routing, load balancing), and data protection
    (RAID, mirroring, replication). The selection of preventive controls should
    be documented in the contingency plan and regularly validated.

references:
  - citation: "NIST SP 800-34 Rev 1, Section 3.3"
    url: "https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement infrastructure-level preventive controls including multi-region
      deployments, auto-scaling groups, load balancers, and health checks. Deploy
      redundant networking with multiple availability zones and diverse connectivity
      providers. Implement automated capacity planning using predictive scaling
      based on historical usage patterns. Configure infrastructure monitoring with
      automated remediation for common failure scenarios. Use immutable
      infrastructure patterns to ensure consistent and reproducible deployments
      that can be rapidly replaced.
    tools:
      - "Kubernetes (auto-scaling, self-healing)"
      - "AWS Auto Scaling / GCP Autoscaler (capacity management)"
      - "HAProxy / NGINX / Envoy (load balancing)"
      - "Prometheus / Grafana (monitoring and alerting)"
      - "Terraform / Pulumi (immutable infrastructure)"
  devsecops:
    prose: >-
      Implement application-level preventive controls including circuit breakers,
      retry mechanisms, graceful degradation, and bulkhead patterns. Design
      applications for resilience using microservices patterns that isolate
      failures. Implement comprehensive health check endpoints that enable
      automated detection and recovery. Use feature flags to disable non-critical
      functionality during degraded operations. Implement automated testing of
      failure scenarios in CI/CD pipelines.
    tools:
      - "Resilience4j / Hystrix (circuit breakers)"
      - "Envoy / Istio (service mesh resilience)"
      - "LaunchDarkly / Unleash (feature flags)"
      - "Chaos engineering frameworks (failure testing)"
      - "GitLab CI/CD (resilience testing pipelines)"
  secops:
    prose: >-
      Identify and document preventive controls based on BIA results and risk
      assessments. Implement environmental controls including fire suppression,
      water detection, temperature monitoring, and humidity controls. Ensure
      uninterruptible power supplies and backup generators are in place with
      regular testing schedules. Establish service level agreements with critical
      vendors and suppliers. Monitor preventive control effectiveness and
      report on control status to management. Conduct regular assessments of
      preventive control adequacy against evolving threats.
    tools:
      - "Building management systems (environmental monitoring)"
      - "UPS management software"
      - "Physical security systems (access control)"
      - "GRC platforms (control tracking)"

