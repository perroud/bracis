id: pol-3
family: pol
title: "Contingency Plan Development"
class: NIST-800-34

statement:
  prose: >-
    The contingency plan should contain detailed roles, responsibilities,
    teams, and procedures associated with restoring an information system
    following a disruption. The plan should be tailored to the organization
    and its requirements. The contingency plan should document the technical
    capabilities designed to support contingency operations. The plan should
    be developed in coordination with associated plans including the Business
    Continuity Plan (BCP), Disaster Recovery Plan (DRP), Continuity of
    Operations Plan (COOP), Crisis Communications Plan, Cyber Incident
    Response Plan, and Occupant Emergency Plan (OEP). Five major plan
    components address notification/activation, recovery, and reconstitution
    phases.

guidance:
  prose: >-
    The contingency plan is the central document that guides the organization's
    response to an information system disruption. It should include: supporting
    information (introduction, concept of operations), notification/activation
    procedures (damage assessment, plan activation, notification procedures),
    recovery phase activities (recovery sequence, procedures, escalation/notifications),
    and reconstitution phase activities (validation, deactivation, return to normal
    operations). The plan should be written clearly enough that any qualified person
    can execute it. The plan must identify the system boundary, key personnel with
    contact information, and the specific recovery strategies for the system. The
    plan should be stored in a location accessible during an emergency, including
    off-site copies.

references:
  - citation: "NIST SP 800-34 Rev 1, Section 3.4"
    url: "https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Maintain contingency plans as version-controlled infrastructure-as-code
      artifacts. Implement automated runbooks using tools like Ansible or Rundeck
      that codify recovery procedures. Define recovery playbooks that can be
      executed programmatically for each recovery tier. Use GitOps-based disaster
      recovery with tools like Velero for Kubernetes or AWS Backup for cloud
      resources. Ensure infrastructure definitions are stored in multiple
      geographically distributed repositories. Implement automated notification
      systems that trigger when contingency plan activation is required.
    tools:
      - "Ansible / Rundeck (automated recovery runbooks)"
      - "Velero (Kubernetes backup and recovery)"
      - "AWS Backup / Azure Backup (cloud DR)"
      - "Terraform / Pulumi (infrastructure reconstruction)"
      - "PagerDuty / Opsgenie (notification/activation)"
  devsecops:
    prose: >-
      Store contingency plans alongside application code in version-controlled
      repositories. Implement automated deployment pipelines that can rapidly
      redeploy applications to alternate environments. Document application-specific
      recovery procedures including database restoration, configuration management,
      and dependency resolution. Create automated smoke tests that validate
      application functionality after recovery. Maintain deployment manifests
      that enable rapid reconstruction of application environments.
    tools:
      - "GitLab / GitHub (plan version control)"
      - "GitLab CI/CD (automated recovery pipelines)"
      - "Helm / Kustomize (application deployment manifests)"
      - "ArgoCD / Flux (GitOps recovery)"
      - "Automated testing frameworks (post-recovery validation)"
  secops:
    prose: >-
      Develop comprehensive contingency plans that address all five components:
      supporting information, notification/activation, recovery, reconstitution,
      and plan appendices. Assign specific roles and responsibilities with backup
      personnel identified. Document detailed recovery procedures for each critical
      system. Maintain current contact lists for all contingency plan personnel.
      Store copies of the plan in secure, accessible locations including off-site
      facilities. Coordinate with related plans (BCP, DRP, COOP, Cyber IR) to
      ensure consistency and avoid gaps.
    tools:
      - "GRC platforms (plan management)"
      - "ServiceNow (workflow and notification)"
      - "Document management systems (plan storage)"
      - "Emergency notification systems"

