id: mnt-1
family: mnt
title: "Contingency Plan Testing"
class: NIST-800-34

statement:
  prose: >-
    Contingency plan testing is a critical element of a viable contingency
    capability. Testing enables plan deficiencies to be identified and
    addressed. Testing should be conducted periodically according to
    organizational requirements. Testing validates that the plan is
    complete, accurate, and effective. Several types of testing may be
    used, individually or in combination, including checklist/tabletop
    exercises, walkthrough/tabletop tests, simulation tests, parallel tests,
    and full-interruption tests. The testing type should be selected based
    on the system's FIPS 199 impact level and the organization's risk
    tolerance. Test results should be documented, and corrective actions
    should be incorporated into the contingency plan.

guidance:
  prose: >-
    Organizations should develop a testing schedule that includes progressively
    more rigorous test types. Tabletop exercises are useful for validating
    plan logic and identifying gaps in a low-risk environment. Simulation
    tests exercise portions of the plan without impacting production.
    Parallel tests activate recovery procedures at the alternate site while
    maintaining primary site operations. Full-interruption tests shut down
    the primary site and fully activate recovery procedures. NIST recommends
    testing frequency based on FIPS 199 impact level: high-impact systems
    annually, moderate-impact systems at least every two years, and low-impact
    systems at least every three years. All test results should be documented
    including identified deficiencies, corrective actions, and completion dates.

references:
  - citation: "NIST SP 800-34 Rev 1, Section 3.5.1"
    url: "https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated disaster recovery testing through scheduled chaos
      engineering exercises. Use tools like Gremlin or Chaos Monkey to simulate
      infrastructure failures and validate recovery procedures. Implement
      automated DR drills that failover to alternate processing sites and
      validate functionality. Create CI/CD pipelines that periodically test
      backup restoration and system recovery procedures. Maintain test result
      dashboards that track DR readiness metrics. Implement game day
      frameworks that structure regular DR testing exercises.
    tools:
      - "Gremlin / Chaos Monkey (chaos engineering)"
      - "Velero (backup restoration testing)"
      - "Terraform / Pulumi (environment reconstruction testing)"
      - "Grafana (DR readiness dashboards)"
      - "Game day frameworks"
  devsecops:
    prose: >-
      Integrate recovery testing into CI/CD pipelines with automated backup
      restoration and application validation tests. Implement canary deployments
      that test application recovery capabilities. Create automated test
      suites that validate application functionality after recovery from
      various failure scenarios. Use chaos engineering principles to inject
      failures in non-production environments and validate application
      resilience. Document test procedures and results in version-controlled
      repositories.
    tools:
      - "GitLab CI/CD (recovery testing pipelines)"
      - "Chaos engineering frameworks"
      - "Automated test suites (recovery validation)"
      - "k6 / Locust (load testing post-recovery)"
      - "Selenium / Cypress (functional testing post-recovery)"
  secops:
    prose: >-
      Develop and maintain a contingency plan testing schedule based on system
      impact levels. Conduct tabletop exercises at least annually for all
      critical systems. Progress to simulation and parallel tests based on
      organizational maturity. Document all test results including deficiencies
      identified, corrective actions planned, responsible parties, and
      completion dates. Track corrective action implementation to closure.
      Brief senior management on testing results and DR readiness. Coordinate
      testing with related plans (BCP, DRP, COOP) for comprehensive
      validation.
    tools:
      - "Tabletop exercise facilitation kits"
      - "Test result documentation templates"
      - "GRC platforms (corrective action tracking)"
      - "After-action review templates"

