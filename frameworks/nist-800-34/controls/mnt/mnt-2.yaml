id: mnt-2
family: mnt
title: "Contingency Plan Training"
class: NIST-800-34

statement:
  prose: >-
    Personnel with contingency plan responsibilities should be trained to
    execute the plan. Training should be provided to all new contingency
    plan team members and refresher training should be conducted annually
    or when significant changes are made to the plan. Training should
    familiarize personnel with their roles and responsibilities under the
    plan, the plan activation criteria and notification procedures, recovery
    and reconstitution procedures, and the location of backup media and
    alternate processing sites. Training exercises should reinforce the
    skills needed to execute the contingency plan effectively.

guidance:
  prose: >-
    Contingency plan training should be tailored to the specific roles and
    responsibilities of each team member. Recovery team members need detailed
    technical training on system restoration procedures. Management personnel
    need training on decision-making criteria and communication procedures.
    All personnel should understand the notification and activation process.
    Training should include hands-on exercises where possible, not just
    classroom instruction. Organizations should maintain training records
    and track completion. Training materials should be updated whenever the
    contingency plan changes. Cross-training is essential to ensure that
    backup personnel can perform critical recovery functions.

references:
  - citation: "NIST SP 800-34 Rev 1, Section 3.5.2"
    url: "https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement self-service training environments using infrastructure-as-code
      that replicate production for recovery practice. Create interactive
      runbooks that guide personnel through recovery procedures. Implement
      game day exercises where team members practice recovery procedures in
      simulated failure scenarios. Maintain training sandbox environments
      where personnel can practice without affecting production. Create
      automated onboarding workflows that include contingency plan training
      for new team members.
    tools:
      - "Terraform / Pulumi (training environment provisioning)"
      - "Rundeck (interactive runbooks)"
      - "Game day frameworks"
      - "Learning management systems"
      - "Documentation platforms (Backstage, Confluence)"
  devsecops:
    prose: >-
      Include contingency plan training in developer onboarding programs.
      Create hands-on labs where developers practice application recovery
      procedures including database restoration, configuration recovery,
      and deployment to alternate environments. Integrate recovery exercises
      into sprint activities. Maintain training documentation alongside
      application code. Use pair programming and mob programming sessions
      for complex recovery procedures to ensure knowledge sharing.
    tools:
      - "GitLab Wiki / Confluence (training materials)"
      - "Hands-on lab environments"
      - "GitLab CI/CD (training pipeline exercises)"
      - "Knowledge sharing platforms"
  secops:
    prose: >-
      Develop and deliver contingency plan training programs for all
      personnel with plan responsibilities. Provide initial training for
      new team members and annual refresher training. Include both classroom
      instruction and hands-on exercises. Track training completion and
      maintain training records. Update training materials whenever the
      plan changes. Implement cross-training programs to ensure backup
      personnel are prepared. Coordinate training with testing exercises
      to maximize effectiveness.
    tools:
      - "Learning management systems"
      - "Training record databases"
      - "Exercise facilitation kits"
      - "Knowledge assessment tools"

