id: mnt-3
family: mnt
title: "Contingency Plan Maintenance"
class: NIST-800-34

statement:
  prose: >-
    The contingency plan should be a living document that is updated regularly
    to remain current with system enhancements, organizational changes, and
    evolving threats. The contingency plan should be reviewed and updated at
    least annually, or whenever significant changes occur that affect the
    plan's assumptions or procedures. Changes that should trigger plan updates
    include system changes (hardware, software, or configuration), organizational
    changes (personnel, roles, responsibilities), policy changes, test results
    that identify deficiencies, and lessons learned from actual contingency
    events. The plan should be maintained under version control to track
    changes and ensure the current version is always available.

guidance:
  prose: >-
    Plan maintenance ensures the contingency plan remains accurate and
    actionable over time. Organizations should integrate plan maintenance
    into their change management process so that system and organizational
    changes automatically trigger plan reviews. Contact information is
    particularly prone to becoming outdated and should be verified
    quarterly. The plan should be reviewed after every contingency event,
    test, or exercise to incorporate lessons learned. Version control
    is essential for ensuring that all stakeholders have access to the
    current plan version. Organizations should maintain a distribution
    list and ensure updated copies reach all designated locations including
    the alternate processing site and off-site storage.

references:
  - citation: "NIST SP 800-34 Rev 1, Section 3.5.3"
    url: "https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Maintain contingency plans as version-controlled documents in Git
      repositories with automated change tracking. Implement CI/CD
      pipelines that validate plan documents for completeness and
      consistency whenever changes are committed. Use automated triggers
      from infrastructure change management systems to flag contingency
      plan review requirements. Implement automated contact information
      verification through integration with HR and identity management
      systems. Maintain plan distribution through automated publishing
      pipelines.
    tools:
      - "Git (version control)"
      - "GitLab CI/CD (validation pipelines)"
      - "Backstage (service catalog integration)"
      - "LDAP / Active Directory (contact verification)"
      - "Document publishing pipelines"
  devsecops:
    prose: >-
      Treat contingency plans as code artifacts subject to the same
      review and approval processes as application code. Use merge
      requests to manage plan changes with mandatory peer review.
      Implement automated checks that flag stale plan components.
      Integrate plan maintenance with application change management
      so that application changes trigger plan reviews. Maintain
      plan documentation alongside application code to ensure
      co-evolution.
    tools:
      - "GitLab / GitHub (plan version control and review)"
      - "GitLab CI/CD (staleness detection)"
      - "Automated link and reference checking"
      - "Change management integration"
  secops:
    prose: >-
      Establish a formal plan maintenance schedule with at least annual
      reviews. Integrate plan maintenance into the organization's change
      management process. Verify contact information quarterly. Review
      and update plans after every contingency event, test, or exercise.
      Maintain version control and distribution records. Ensure current
      copies are available at all designated locations. Assign a plan
      maintenance coordinator responsible for tracking and implementing
      updates. Report on plan currency to senior management.
    tools:
      - "Document management systems"
      - "Change management platforms"
      - "GRC platforms (plan currency tracking)"
      - "Distribution management tools"

