id: prev-2
family: prev
title: "Alternate Storage Site"
class: NIST-800-34

statement:
  prose: >-
    Organizations should identify and establish an alternate storage site for
    the storage of backup information. The alternate storage site should be
    geographically separated from the primary site so that it is not susceptible
    to the same hazards. The alternate storage site should provide information
    security safeguards equivalent to those of the primary site. Agreements
    should be established for alternate storage sites to ensure that backup
    information can be retrieved in a timely manner to meet the recovery time
    objectives. Transfer of backup information to the alternate storage site
    should be consistent with recovery time and recovery point objectives.

guidance:
  prose: >-
    The alternate storage site is essential for protecting backup data from
    the same disaster that may affect the primary site. Geographic separation
    should be sufficient to avoid common regional hazards (e.g., hurricanes,
    earthquakes, floods). The storage site must maintain equivalent security
    controls including physical security, access controls, and environmental
    protections. Organizations should consider both physical media transport
    and electronic transfer methods based on RPO requirements. Service level
    agreements with commercial storage providers should specify retrieval times,
    security requirements, and testing provisions. Organizations should verify
    that stored media remains readable and that retrieval procedures are effective.

references:
  - citation: "NIST SP 800-34 Rev 1, Section 3.4.2"
    url: "https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement multi-region cloud architectures with data replication across
      geographically distributed regions. Use cloud provider cross-region
      replication services for object storage, block storage, and databases.
      Configure automated failover for storage services using DNS-based routing
      or cloud-native failover mechanisms. Implement storage encryption with
      keys managed independently from the storage infrastructure. Monitor
      replication lag and alert when RPO thresholds are at risk. Validate
      data integrity at alternate storage locations through automated checksums.
    tools:
      - "AWS S3 Cross-Region Replication"
      - "Azure Geo-Redundant Storage (GRS)"
      - "GCP Multi-Region Storage"
      - "MinIO (self-hosted multi-site replication)"
      - "HashiCorp Vault (encryption key management)"
  devsecops:
    prose: >-
      Implement Git repository mirroring to multiple geographic locations to
      ensure code and configuration availability. Use container registry
      replication across regions for application images. Configure CI/CD
      artifact storage with geographic redundancy. Ensure database replication
      for application data stores meets RPO requirements. Document alternate
      storage locations and retrieval procedures in application runbooks.
    tools:
      - "GitLab Geo (repository replication)"
      - "Harbor (container registry replication)"
      - "GitLab CI/CD (artifact storage)"
      - "Database replication (PostgreSQL streaming, MySQL replication)"
  secops:
    prose: >-
      Identify and contract with alternate storage providers that meet security
      and geographic separation requirements. Ensure alternate storage sites
      have equivalent physical security, environmental controls, and access
      management. Establish and document service level agreements covering
      retrieval times, security controls, and testing provisions. Conduct
      periodic audits of alternate storage facilities. Test data retrieval
      from alternate storage sites as part of contingency plan testing.
      Maintain an inventory of all data stored at alternate locations.
    tools:
      - "Commercial off-site storage providers"
      - "Cloud storage services (encrypted)"
      - "Physical security assessment tools"
      - "SLA management platforms"

