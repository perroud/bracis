id: prev-4
family: prev
title: "Equipment and Supply Protection"
class: NIST-800-34

statement:
  prose: >-
    Organizations should establish procedures and mechanisms to protect
    information system equipment and supplies from damage resulting from
    environmental threats and unauthorized access. Protection of equipment
    and supplies includes environmental controls (e.g., fire suppression,
    temperature and humidity controls), physical access controls, and
    alternate telecommunications services. Organizations should also
    consider the availability of replacement equipment and supplies,
    including vendor agreements for priority delivery. Telecommunications
    services should include redundant or alternate connectivity to ensure
    continued operations during disruptions.

guidance:
  prose: >-
    Equipment protection encompasses both the physical environment and the
    supply chain for critical hardware and software components. Environmental
    controls should address temperature, humidity, fire, water damage, and
    electrical power quality. Physical security should restrict access to
    authorized personnel. Organizations should maintain service contracts
    with equipment vendors for rapid replacement. Alternate telecommunications
    planning should include diverse routing, redundant providers, and backup
    connectivity methods. Organizations should inventory all critical equipment
    and maintain spares for components with long lead times. Supply chain risk
    management is critical for ensuring availability of replacement components.

references:
  - citation: "NIST SP 800-34 Rev 1, Section 3.3"
    url: "https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement infrastructure redundancy across multiple cloud availability
      zones to mitigate equipment failures. Use auto-scaling groups that
      automatically replace failed instances. Deploy multi-path networking
      with redundant internet service providers. Implement monitoring for
      infrastructure health including hardware metrics, network connectivity,
      and environmental conditions in on-premises deployments. Maintain
      infrastructure-as-code definitions that enable rapid reprovisioning
      on replacement hardware or cloud instances.
    tools:
      - "Cloud provider multi-AZ deployments"
      - "Kubernetes node auto-repair"
      - "Network monitoring (Nagios, PRTG)"
      - "SNMP monitoring (environmental sensors)"
      - "Terraform / Pulumi (rapid reprovisioning)"
  devsecops:
    prose: >-
      Design applications to be infrastructure-agnostic using containerization
      and cloud-native patterns. Implement health checks and readiness probes
      that detect equipment-level failures. Use service mesh for automatic
      traffic rerouting around failed equipment. Maintain container images in
      multiple registries to ensure availability. Implement graceful degradation
      patterns that allow applications to function with reduced infrastructure
      capacity.
    tools:
      - "Docker / containerd (infrastructure abstraction)"
      - "Kubernetes (pod scheduling, node affinity)"
      - "Istio / Linkerd (traffic management)"
      - "Multiple container registries (redundancy)"
  secops:
    prose: >-
      Maintain an inventory of critical equipment with vendor contacts and
      service level agreements for rapid replacement. Implement and monitor
      environmental controls including HVAC, fire suppression, water detection,
      and uninterruptible power supplies. Establish contracts for alternate
      telecommunications services with diverse routing. Maintain critical
      spare parts inventory. Conduct regular assessments of physical security
      controls and environmental protection measures. Document equipment
      dependencies and single points of failure.
    tools:
      - "DCIM tools (data center infrastructure management)"
      - "Building management systems"
      - "Asset management systems"
      - "Vendor management platforms"

