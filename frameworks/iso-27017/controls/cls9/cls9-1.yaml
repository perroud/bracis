id: cls9.1
family: cls9
title: "Access control policy for cloud services"
class: ISO27017

statement:
  prose: >-
    An access control policy shall be established, documented and reviewed
    based on business and information security requirements. For cloud
    services, the access control policy shall address the roles and
    responsibilities of the cloud service provider and the cloud service
    customer for access control. The cloud service provider shall define
    and document the access control capabilities provided to the cloud
    service customer and shall ensure that the cloud service customer
    can implement access control policies consistent with the cloud
    service customer's security requirements. The access control policy
    should address the management of access credentials, multi-factor
    authentication, and privileged access management in the cloud
    environment.

guidance:
  prose: >-
    Cloud access control policies must address multiple layers: access
    to the cloud management plane, access to cloud services and APIs,
    access to customer data within cloud services, and access between
    cloud services. The policy should define requirements for
    authentication strength, session management, access review
    frequency, and privileged access management. Federation and
    single sign-on capabilities should be leveraged where possible
    to centralize identity management. The policy should also address
    machine-to-machine authentication using service accounts, API
    keys, and workload identity federation.

references:
  - citation: "ISO/IEC 27017:2015, Section 9.1.1"
    url: "https://www.iso.org/standard/43757.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement centralized identity and access management across all
      cloud environments using identity federation and single sign-on.
      Define RBAC models for cloud management plane access with
      least-privilege principles. Enforce multi-factor authentication
      for all human access to cloud services. Implement workload
      identity federation for machine-to-machine authentication,
      eliminating long-lived credentials. Use policy-as-code to enforce
      access control requirements across all cloud accounts and
      subscriptions automatically.
    tools:
      - keycloak
      - vault
      - aws-iam
      - azure-entra-id
      - open-policy-agent

  devsecops:
    prose: >-
      Integrate access control validation into CI/CD pipelines to ensure
      that deployed applications and infrastructure follow the
      organization's access control policy. Scan infrastructure-as-code
      for overly permissive IAM policies, public access configurations,
      and missing authentication requirements. Implement secret scanning
      to prevent hardcoded credentials in source code. Use dynamic
      short-lived credentials in deployment pipelines instead of
      static API keys.
    tools:
      - checkov
      - tfsec
      - gitleaks
      - gitlab-ci
      - snyk

  secops:
    prose: >-
      Monitor cloud access patterns for anomalies including unusual
      login locations, impossible travel, privilege escalation attempts,
      and use of stale credentials. Conduct periodic access reviews
      to verify that all cloud access grants remain justified and
      are at the minimum level required. Alert on creation of new
      privileged roles or expansion of existing permissions. Monitor
      for use of root or super-admin accounts outside of break-glass
      procedures.
    tools:
      - splunk
      - elastic-siem
      - aws-guardduty
      - azure-sentinel
      - crowdstrike

