id: cls9.3
family: cls9
title: "Privileged access management for cloud services"
class: ISO27017

statement:
  prose: >-
    The allocation and use of privileged access rights shall be restricted
    and controlled. For cloud services, the cloud service provider shall
    specify and document the privileged roles for the operation and
    administration of the cloud service, and shall identify and restrict
    the use of privileged access within the cloud computing environment.
    The cloud service customer shall manage and control the use of
    privileged access rights granted to them by the cloud service
    provider. Privileged access to cloud management interfaces, tenant
    administration consoles, and cloud APIs shall be subject to enhanced
    authentication, logging, and review.

guidance:
  prose: >-
    Privileged access in cloud environments includes access to cloud
    management consoles, administrative APIs, tenant configuration
    settings, and data management functions. Due to the potential
    blast radius of cloud administrative actions, privileged access
    should be subject to just-in-time elevation with time-limited
    grants, multi-party approval for destructive operations, enhanced
    monitoring and alerting, session recording for forensic purposes,
    and regular access certification. Cloud service providers should
    clearly document which privileged roles their staff require and
    implement controls to prevent unauthorized access to customer
    data through privileged cloud infrastructure accounts.

references:
  - citation: "ISO/IEC 27017:2015, Section 9.2.3"
    url: "https://www.iso.org/standard/43757.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement just-in-time privileged access management that grants
      elevated cloud permissions only when needed and automatically
      revokes them after a defined period. Use cloud-native privileged
      identity management features such as AWS IAM Access Analyzer,
      Azure PIM, or GCP IAM Recommender. Enforce multi-factor
      authentication for all privileged access. Implement break-glass
      procedures that require multi-party authorization for emergency
      access. Record all privileged sessions for audit and forensic
      purposes.
    tools:
      - vault
      - aws-iam
      - azure-pim
      - cyberark
      - open-policy-agent

  devsecops:
    prose: >-
      Scan infrastructure-as-code definitions for overly broad IAM
      policies and flag any use of wildcard permissions or administrative
      roles in non-emergency contexts. Implement pipeline controls that
      prevent deployment of IAM policies granting excessive privileges.
      Enforce the principle of least privilege by requiring explicit
      justification for any privileged access grants in code reviews.
      Use short-lived, scoped credentials for all pipeline operations.
    tools:
      - checkov
      - tfsec
      - parliament
      - gitlab-ci
      - snyk

  secops:
    prose: >-
      Monitor all privileged access events in cloud environments with
      enhanced alerting for activities such as root account usage,
      privilege escalation, cross-account role assumptions, and
      modifications to security controls. Implement anomaly detection
      for privileged user behavior patterns. Conduct periodic reviews
      of privileged access assignments and usage patterns. Alert on
      dormant privileged accounts and excessive permission accumulation.
    tools:
      - splunk
      - elastic-siem
      - aws-cloudtrail
      - azure-monitor
      - crowdstrike

