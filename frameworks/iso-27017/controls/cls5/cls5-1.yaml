id: cls5.1
family: cls5
title: "Information security policies for cloud services"
class: ISO27017

statement:
  prose: >-
    A set of policies for information security shall be defined, approved by
    management, published and communicated to employees and relevant external
    parties. Cloud service providers and cloud service customers shall define
    and implement information security policies that address cloud computing
    specific aspects, including the delineation of responsibilities between
    the cloud service provider and the cloud service customer.

guidance:
  prose: >-
    Organizations using or providing cloud services should extend their
    existing information security policies to address the unique aspects
    of cloud computing. The policies should clearly define roles and
    responsibilities for information security in the context of cloud
    services, covering areas such as data sovereignty, multi-tenancy,
    service level agreements, incident management, and exit strategies.
    Cloud service customers should ensure their policies address the
    selection and evaluation of cloud service providers, while cloud
    service providers should ensure their policies address the secure
    delivery of cloud services to multiple customers.

references:
  - citation: "ISO/IEC 27017:2015, Section 5.1.1"
    url: "https://www.iso.org/standard/43757.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Codify cloud-specific information security policies as policy-as-code
      artifacts stored in version-controlled repositories. Extend existing
      organizational policies with cloud-specific sections addressing
      shared responsibility models, tenant isolation, data residency, and
      cloud provider evaluation criteria. Maintain a central policy
      repository that defines which security controls are managed by the
      platform team versus the cloud service provider. Use OPA/Rego or
      Kyverno to enforce cloud security policies automatically across
      infrastructure provisioning.
    tools:
      - open-policy-agent
      - kyverno
      - hashicorp-sentinel
      - git
      - backstage

  devsecops:
    prose: >-
      Integrate cloud security policy validation into CI/CD pipelines to
      ensure that infrastructure-as-code definitions and application
      configurations comply with cloud-specific security policies before
      deployment. Use IaC scanning tools to verify that cloud resource
      configurations adhere to organizational policies for encryption,
      access control, network segmentation, and logging. Implement
      pre-commit hooks that check for policy violations in cloud
      configuration files.
    tools:
      - checkov
      - tfsec
      - trivy
      - semgrep
      - gitlab-ci

  secops:
    prose: >-
      Map cloud-specific information security policies to detection rules
      and compliance dashboards in the SIEM. Monitor cloud service provider
      compliance with agreed-upon security policies through continuous
      assessment. Create alerts for policy deviations detected across
      cloud environments. Maintain a cloud security posture management
      dashboard that shows real-time adherence status for both cloud
      service provider and cloud service customer responsibilities.
    tools:
      - splunk
      - elastic-siem
      - wazuh
      - prisma-cloud
      - aws-security-hub

