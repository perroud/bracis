id: cls5.2
family: cls5
title: "Review of the policies for information security in cloud services"
class: ISO27017

statement:
  prose: >-
    The policies for information security shall be reviewed at planned intervals,
    or if significant changes occur, to ensure their continuing suitability,
    adequacy and effectiveness. For cloud services, the review shall consider
    changes in the cloud computing environment, changes in the cloud services
    used or provided, and changes in the threat landscape specific to cloud
    computing. The review shall also consider changes to the shared responsibility
    model and the introduction of new cloud services or features.

guidance:
  prose: >-
    Policy reviews for cloud services should be triggered not only by planned
    intervals but also by significant changes such as migration to new cloud
    providers, adoption of new cloud service models (IaaS, PaaS, SaaS),
    changes in regulatory requirements affecting cloud data processing,
    significant cloud security incidents, and changes in the cloud service
    provider's terms of service or security posture. The review should
    assess whether existing policies adequately address current cloud risks
    and whether new policies are needed to cover emerging cloud technologies
    such as serverless computing, container orchestration, or edge computing.

references:
  - citation: "ISO/IEC 27017:2015, Section 5.1.2"
    url: "https://www.iso.org/standard/43757.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated policy drift detection that compares deployed
      cloud configurations against approved policy baselines. Schedule
      recurring platform review workflows that trigger reassessment of
      cloud security policies when infrastructure changes are detected.
      Maintain version history of all policy-as-code artifacts with
      change tracking and approval workflows. Use infrastructure scanning
      to identify newly provisioned cloud services that may not be covered
      by existing policies.
    tools:
      - open-policy-agent
      - conftest
      - git
      - backstage
      - terraform

  devsecops:
    prose: >-
      Implement pipeline stages that detect when cloud service configurations
      deviate from approved policy baselines and flag them for review.
      Automate the generation of compliance drift reports comparing
      current cloud resource configurations against policy requirements.
      Track policy version compliance across all deployment environments
      and alert when policies have not been reviewed within their
      scheduled review period.
    tools:
      - checkov
      - tfsec
      - gitlab-ci
      - sonarqube

  secops:
    prose: >-
      Schedule automated compliance assessments of cloud environments
      against published security policies. Generate periodic reports
      comparing actual cloud configurations against policy requirements
      and highlight deviations. Monitor cloud service provider security
      bulletins and assess their impact on existing policies. Track
      policy exception requests and ensure they are reviewed and
      reauthorized at defined intervals.
    tools:
      - prisma-cloud
      - aws-config
      - azure-policy
      - splunk

