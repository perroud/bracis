id: cls12.2
family: cls12
title: "Capacity management for cloud services"
class: ISO27017

statement:
  prose: >-
    The use of resources shall be monitored, tuned and projections made
    of future capacity requirements to ensure the required system
    performance. For cloud services, the cloud service provider shall
    monitor the capacity of the cloud services and make available to
    the cloud service customer the capacity management capabilities
    necessary for the cloud service customer to monitor the use of
    cloud services. The cloud service agreement shall specify the
    capacity levels provided and the actions to be taken when capacity
    thresholds are reached. The cloud service customer shall monitor
    its usage of cloud services against agreed capacity levels and
    implement measures to avoid exceeding those levels.

guidance:
  prose: >-
    Capacity management for cloud services differs from traditional
    capacity planning because cloud services offer on-demand scalability.
    However, this does not eliminate capacity concerns. Cloud service
    customers should monitor resource usage to detect anomalies that
    may indicate security incidents such as cryptomining, denial of
    service preparation, or data exfiltration. Budget limits and
    resource quotas should be configured to prevent runaway costs from
    compromised accounts. The cloud service provider should provide
    real-time visibility into capacity metrics and advance notice of
    any capacity constraints that may affect service delivery.

references:
  - citation: "ISO/IEC 27017:2015, Section 12.1.3"
    url: "https://www.iso.org/standard/43757.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement resource quotas and budget alerts across all cloud
      accounts to prevent uncontrolled resource consumption. Deploy
      auto-scaling configurations with defined upper bounds to maintain
      availability while preventing cost overruns. Configure cloud
      billing alerts and anomaly detection to identify unusual spending
      patterns. Implement resource tagging to enable cost allocation
      and capacity tracking per team, service, and environment.
    tools:
      - kubernetes
      - terraform
      - aws-cost-explorer
      - azure-cost-management
      - prometheus

  devsecops:
    prose: >-
      Include resource limit definitions in all infrastructure-as-code
      templates and enforce them through pipeline validation. Implement
      load testing in CI/CD pipelines to verify that applications
      scale correctly and that capacity limits are appropriate. Scan
      for missing resource limits in container and cloud resource
      configurations.
    tools:
      - checkov
      - gitlab-ci
      - k6
      - locust

  secops:
    prose: >-
      Monitor cloud resource consumption for anomalies that may
      indicate security incidents such as cryptocurrency mining,
      botnet activity, or data exfiltration staging. Alert on sudden
      increases in resource usage, unexpected new resource provisioning,
      or usage patterns outside of normal operational hours. Correlate
      capacity anomalies with other security indicators to identify
      potential compromises.
    tools:
      - splunk
      - prometheus
      - grafana
      - aws-cloudwatch
      - datadog

