id: cls12.3
family: cls12
title: "Event logging and monitoring for cloud services"
class: ISO27017

statement:
  prose: >-
    Event logs recording user activities, exceptions, faults and
    information security events shall be produced, kept and regularly
    reviewed. For cloud services, the cloud service provider shall
    provide logging capabilities to the cloud service customer,
    including the ability to capture, store, and retrieve logs for
    events within the cloud service customer's virtual environment.
    The cloud service customer and the cloud service provider shall
    define and agree upon which events are logged, the log retention
    period, and the protection of log data. The cloud service provider
    shall ensure that its logging facilities provide the cloud service
    customer with a consistent, reliable view of activity within the
    cloud service customer's scope.

guidance:
  prose: >-
    Cloud service logging must capture events across multiple layers
    including the cloud management plane, the data plane, the
    application layer, and the network layer. Logs should include
    administrative actions, authentication events, data access events,
    configuration changes, security events, and API calls. The cloud
    service provider should provide immutable, tamper-evident log
    storage and facilitate the export of logs to the customer's SIEM
    for centralized analysis. Log timestamps should be synchronized
    using authoritative time sources to enable accurate event
    correlation across distributed cloud services.

references:
  - citation: "ISO/IEC 27017:2015, Section 12.4.1"
    url: "https://www.iso.org/standard/43757.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement centralized log collection from all cloud services,
      forwarding logs to a SIEM or log management platform. Enable
      cloud provider audit logging for all accounts and services,
      including management plane actions, data access events, and
      network flow logs. Configure log retention policies that meet
      organizational and regulatory requirements. Implement log
      integrity protection to prevent tampering. Deploy structured
      logging standards across all platform services.
    tools:
      - fluentd
      - vector
      - aws-cloudtrail
      - azure-monitor
      - elastic

  devsecops:
    prose: >-
      Implement logging standards in application code with structured
      log formats that facilitate automated analysis. Include log
      configuration validation in CI/CD pipelines to ensure applications
      emit required security events. Deploy log aggregation sidecars
      in containerized environments. Ensure that sensitive data is not
      included in log output through automated log scrubbing and
      pipeline validation.
    tools:
      - gitlab-ci
      - fluentd
      - vector
      - semgrep

  secops:
    prose: >-
      Configure SIEM correlation rules for cloud security events
      including unauthorized access attempts, privilege escalation,
      data exfiltration indicators, and configuration tampering.
      Implement automated alerting for critical security events.
      Conduct regular log review and analysis to identify security
      trends and anomalies. Verify log completeness by checking for
      gaps in log coverage or evidence of log tampering.
    tools:
      - splunk
      - elastic-siem
      - chronicle
      - wazuh
      - aws-guardduty

