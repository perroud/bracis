id: cls12.1
family: cls12
title: "Change management for cloud services"
class: ISO27017

statement:
  prose: >-
    Changes to the organization, business processes, information
    processing facilities and systems that affect information security
    shall be controlled. For cloud services, the cloud service provider
    shall provide the cloud service customer with information about
    changes to the cloud service that could affect the cloud service
    customer's information security. The cloud service customer shall
    assess and manage the risks resulting from changes to the cloud
    service, including changes to the underlying infrastructure,
    service features, security controls, and terms of service. The
    cloud service provider shall have a change management process that
    ensures changes are authorized, tested, and documented before
    implementation.

guidance:
  prose: >-
    Change management in cloud environments must address changes made
    by both the cloud service provider and the cloud service customer.
    The cloud service provider should notify customers of planned
    changes that may affect their security posture, including
    infrastructure updates, feature changes, deprecations, and changes
    to security controls. The cloud service customer should monitor
    cloud service provider change notifications and assess their
    impact. Both parties should implement controlled change processes
    with authorization, testing, rollback capability, and
    documentation. Automated deployment pipelines with approval gates
    can enforce consistent change management practices.

references:
  - citation: "ISO/IEC 27017:2015, Section 12.1.2"
    url: "https://www.iso.org/standard/43757.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement GitOps-based change management where all infrastructure
      changes are made through version-controlled pull requests with
      mandatory review and approval. Deploy automated deployment
      pipelines with staging environments for testing changes before
      production. Implement rollback mechanisms for all cloud
      infrastructure changes. Subscribe to cloud service provider
      change notifications and integrate them into the organization's
      change management workflow. Use feature flags to decouple
      deployments from feature releases.
    tools:
      - argocd
      - flux
      - terraform
      - gitlab-ci
      - backstage

  devsecops:
    prose: >-
      Enforce that all code and infrastructure changes go through
      CI/CD pipelines with mandatory security testing before
      deployment. Implement approval gates that require separate
      individuals for authoring and approving changes. Run automated
      security scans on every change including SAST, dependency
      scanning, and IaC scanning. Implement canary deployments and
      automated rollback triggers based on security and performance
      metrics.
    tools:
      - gitlab-ci
      - checkov
      - semgrep
      - trivy
      - snyk

  secops:
    prose: >-
      Monitor all cloud environment changes through audit logs and
      change tracking systems. Alert on unauthorized changes or
      changes that bypass the approved change management process.
      Track cloud service provider change notifications and assess
      their security impact. Maintain a change log that records all
      modifications to cloud security controls with justification
      and approval evidence.
    tools:
      - splunk
      - aws-cloudtrail
      - azure-monitor
      - elastic-siem

