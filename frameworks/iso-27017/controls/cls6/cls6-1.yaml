id: cls6.1
family: cls6
title: "Information security roles and responsibilities for cloud services"
class: ISO27017

statement:
  prose: >-
    All information security responsibilities shall be defined and allocated.
    For cloud services, both the cloud service provider and the cloud service
    customer shall define and clearly communicate the information security
    roles and responsibilities that are specific to the provision and use
    of cloud services. The allocation of information security responsibilities
    between the cloud service provider and the cloud service customer shall
    be defined, documented, and communicated as part of the cloud service
    agreement. Responsibilities that are not clearly allocated to either
    party shall be addressed by the cloud service customer.

guidance:
  prose: >-
    The shared responsibility model is fundamental to cloud security. The
    cloud service provider and cloud service customer should jointly
    identify and document which party is responsible for each aspect of
    information security, including physical security, network security,
    operating system security, application security, data security, and
    identity management. The level of responsibility split varies by
    service model: in IaaS, the customer has more responsibilities than
    in SaaS. Organizations should maintain a responsibility matrix that
    maps each security control to the responsible party and verify that
    no security gaps exist at the boundaries between responsibilities.

references:
  - citation: "ISO/IEC 27017:2015, Section 6.1.1"
    url: "https://www.iso.org/standard/43757.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Document the shared responsibility model for each cloud service
      used by the organization in a machine-readable format stored in
      version control. Implement automated checks that verify platform
      team responsibilities are being fulfilled, such as network
      configuration, identity provider integration, and encryption key
      management. Use infrastructure-as-code to codify the security
      controls that fall under the organization's responsibility,
      ensuring they are consistently applied across all cloud environments.
      Maintain a service catalog that clearly labels which security
      controls are managed by the cloud provider versus the platform team.
    tools:
      - backstage
      - terraform
      - pulumi
      - open-policy-agent
      - confluence

  devsecops:
    prose: >-
      Embed shared responsibility awareness into the development workflow
      by providing clear documentation of which security controls
      developers are responsible for in each cloud service context.
      Implement pipeline checks that verify application-level security
      controls are in place, such as encryption of data before sending
      to cloud storage, proper use of cloud identity services, and
      correct configuration of cloud service access controls. Provide
      developer templates that pre-configure the security controls
      required by the organization's shared responsibility model.
    tools:
      - gitlab-ci
      - checkov
      - snyk
      - terraform

  secops:
    prose: >-
      Monitor compliance with the shared responsibility model by tracking
      which security controls are actively maintained by each party.
      Alert when responsibilities shift due to cloud service changes or
      when gaps in security coverage are detected. Verify that the cloud
      service provider is meeting its security obligations through
      regular assessment of their compliance certifications, audit
      reports, and security documentation. Maintain an inventory of
      all cloud service agreements and track their security
      responsibility allocations.
    tools:
      - prisma-cloud
      - aws-security-hub
      - azure-security-center
      - splunk

