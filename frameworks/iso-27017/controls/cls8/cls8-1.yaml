id: cls8.1
family: cls8
title: "Inventory of assets in cloud services"
class: ISO27017

statement:
  prose: >-
    Assets associated with information and information processing facilities
    shall be identified and an inventory of these assets shall be drawn up
    and maintained. For cloud services, the cloud service customer shall
    maintain an inventory of its information and other associated assets
    stored in or processed by the cloud service. The cloud service provider
    shall provide the cloud service customer with the capabilities and
    tools necessary to manage the inventory of the cloud service customer's
    assets. The cloud service customer and the cloud service provider
    should agree on and document the asset management responsibilities.

guidance:
  prose: >-
    Cloud asset inventory management requires visibility into assets
    that span both the cloud service provider's infrastructure and the
    cloud service customer's deployed resources. The inventory should
    include virtual machines, containers, serverless functions, storage
    buckets, databases, network configurations, API endpoints, encryption
    keys, and identity resources. Cloud service customers should use
    cloud-native asset discovery tools and third-party cloud security
    posture management solutions to maintain accurate, real-time
    inventories. The inventory should capture asset classification,
    ownership, geographic location, and the applicable security
    controls for each asset.

references:
  - citation: "ISO/IEC 27017:2015, Section 8.1.1"
    url: "https://www.iso.org/standard/43757.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated asset discovery and inventory management for
      all cloud resources using cloud provider APIs and infrastructure-as-code
      state files. Deploy a centralized service catalog that automatically
      registers and tracks all provisioned cloud resources. Use tagging
      policies enforced via policy-as-code to ensure every cloud resource
      is labeled with ownership, classification, cost center, and
      environment metadata. Implement drift detection to identify
      resources provisioned outside of the approved infrastructure-as-code
      workflows.
    tools:
      - terraform
      - backstage
      - aws-config
      - azure-resource-graph
      - steampipe

  devsecops:
    prose: >-
      Integrate cloud asset inventory validation into CI/CD pipelines to
      ensure all provisioned resources are tagged and registered before
      deployment completes. Implement pre-deployment checks that verify
      resource configurations match approved templates and that required
      metadata is present. Use infrastructure-as-code scanning to detect
      untagged or misconfigured resources before they are provisioned.
      Maintain a bill of materials for each deployed service that lists
      all cloud resources it depends on.
    tools:
      - checkov
      - tfsec
      - gitlab-ci
      - trivy

  secops:
    prose: >-
      Deploy cloud security posture management tools that continuously
      discover and inventory all cloud resources across all accounts
      and regions. Alert on unregistered or untagged resources that
      appear outside of approved provisioning workflows. Conduct
      periodic reconciliation between the infrastructure-as-code
      state and the actual cloud environment to detect shadow IT
      resources. Generate compliance reports showing asset inventory
      completeness and accuracy.
    tools:
      - prisma-cloud
      - aws-config
      - azure-security-center
      - wiz

