id: cld-12.4
family: cld
title: "Monitoring of cloud services"
class: ISO27017

statement:
  prose: >-
    The cloud service customer shall have the capability to monitor
    specified aspects of the operation of the cloud services it uses.
    The cloud service provider shall provide the cloud service customer
    with the capabilities necessary to monitor the availability,
    performance, and security of the cloud service. The monitoring
    capabilities shall include access to audit logs, security event
    logs, and operational metrics relevant to the cloud service
    customer's use of the cloud service. The cloud service provider
    shall also monitor its own infrastructure for security events
    that could affect cloud service customers and shall notify affected
    customers in a timely manner.

guidance:
  prose: >-
    Monitoring cloud services requires coordination between the cloud
    service provider and the cloud service customer. The customer
    needs visibility into service availability, performance metrics,
    security events, and configuration changes within their scope.
    The provider needs to monitor the underlying infrastructure and
    notify customers of events that may affect them. Monitoring
    should cover resource utilization, authentication and access
    events, data access patterns, network traffic, configuration
    changes, and compliance status. The monitoring architecture
    should support real-time alerting, historical analysis, and
    forensic investigation.

references:
  - citation: "ISO/IEC 27017:2015, CLD.12.4.5"
    url: "https://www.iso.org/standard/43757.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Deploy comprehensive monitoring infrastructure covering cloud
      service availability, performance, security, and compliance.
      Implement centralized observability using metrics, logs, and
      traces collected from all cloud services. Configure health
      checks and uptime monitoring for all cloud-hosted services.
      Deploy cloud security posture management tools that continuously
      assess cloud configuration compliance. Integrate cloud provider
      health dashboards and incident notifications into the
      organization's monitoring platform.
    tools:
      - prometheus
      - grafana
      - datadog
      - aws-cloudwatch
      - azure-monitor

  devsecops:
    prose: >-
      Embed monitoring configuration in infrastructure-as-code to
      ensure that all deployed services have appropriate monitoring
      from the start. Implement pipeline checks that verify monitoring
      and alerting are configured for every deployed service. Include
      observability requirements in service templates and golden
      paths. Deploy automated smoke tests post-deployment that verify
      monitoring endpoints are functional.
    tools:
      - gitlab-ci
      - terraform
      - prometheus
      - checkov

  secops:
    prose: >-
      Centralize cloud security monitoring in the SIEM with correlation
      rules that detect threats across cloud services. Monitor cloud
      service provider status pages and incident notifications.
      Implement automated compliance monitoring that continuously
      verifies cloud configurations against security baselines.
      Configure escalation procedures for cloud security incidents
      with defined response times and communication channels to
      cloud service providers.
    tools:
      - splunk
      - elastic-siem
      - prisma-cloud
      - wiz
      - chronicle

