id: cld-6.3
family: cld
title: "Relationship between cloud service customer and cloud service provider"
class: ISO27017

statement:
  prose: >-
    The cloud service customer and the cloud service provider shall
    identify and document the relevant information security aspects of
    the cloud service, including a definition of the cloud service being
    provided, the geographic location(s) of the cloud service
    infrastructure, the supply chain relationships involved in the
    provision of the cloud service, and the roles and responsibilities
    for information security. The cloud service provider shall designate
    a point of contact for the cloud service customer regarding
    information security aspects of the cloud service. The cloud
    service provider shall provide the cloud service customer with
    documentation about the security capabilities and features of
    the cloud service.

guidance:
  prose: >-
    This cloud-specific control addresses the unique relationship
    between cloud service providers and customers that does not exist
    in traditional IT environments. The documentation should include
    the shared responsibility model, the cloud service provider's
    security certifications and audit reports, the geographic
    locations where data may be processed and stored, the supply
    chain and sub-processor relationships, incident notification
    procedures, and the cloud service provider's data protection
    practices. Regular communication channels should be established
    for security-related matters, and the cloud service agreement
    should include provisions for security auditing and assessment.

references:
  - citation: "ISO/IEC 27017:2015, CLD.6.3.1"
    url: "https://www.iso.org/standard/43757.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Maintain a structured inventory of all cloud service provider
      relationships with documented security responsibilities, data
      processing locations, and supply chain dependencies. Implement
      automated collection of cloud service provider compliance
      certifications and security posture data. Configure cloud
      service agreements as code with versioned documentation of
      security requirements. Deploy monitoring dashboards that track
      cloud service provider SLA compliance and security metrics.
    tools:
      - backstage
      - servicenow
      - terraform
      - confluence

  devsecops:
    prose: >-
      Integrate cloud service provider security assessment into the
      service onboarding process. Require security review and approval
      before new cloud services are adopted. Maintain a registry of
      approved cloud services with their security characteristics
      and restrictions. Implement automated checks that prevent
      deployment to unapproved cloud services or regions.
    tools:
      - gitlab-ci
      - open-policy-agent
      - checkov

  secops:
    prose: >-
      Monitor cloud service provider security bulletins, incident
      notifications, and compliance status changes. Track cloud
      service provider audit reports and certifications, alerting
      when they expire or when significant findings are reported.
      Conduct periodic assessment of cloud service provider security
      practices against the organization's requirements. Maintain
      incident communication plans for coordinating security
      response with cloud service providers.
    tools:
      - splunk
      - servicenow
      - prisma-cloud

