id: cls13.1
family: cls13
title: "Network controls for cloud services"
class: ISO27017

statement:
  prose: >-
    Networks shall be managed and controlled to protect information in
    systems and applications. For cloud services, the cloud service
    provider shall define and document the network security controls
    it implements and shall communicate to the cloud service customer
    the network security capabilities available. The cloud service
    customer shall implement network controls appropriate for the
    classification of the information processed in the cloud service.
    Virtual network isolation shall be used to separate cloud service
    customer environments from each other and from the cloud service
    provider's management network.

guidance:
  prose: >-
    Network security in cloud environments must address virtual network
    segmentation, traffic filtering, encryption of data in transit,
    and monitoring of network flows. The cloud service customer should
    configure virtual private networks or virtual private clouds to
    isolate workloads and limit the attack surface. Network security
    groups and firewall rules should implement a default-deny posture.
    Network traffic between cloud services should be encrypted and
    authenticated. The organization should consider using private
    connectivity options such as dedicated connections or private
    endpoints to avoid traversing the public internet for sensitive
    communications.

references:
  - citation: "ISO/IEC 27017:2015, Section 13.1.1"
    url: "https://www.iso.org/standard/43757.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement network segmentation using virtual private clouds,
      subnets, and network security groups with a default-deny posture.
      Deploy service mesh for encrypted, authenticated service-to-service
      communication. Configure private endpoints for cloud service
      access to avoid exposure to the public internet. Implement
      centralized egress filtering through cloud NAT gateways or
      proxy services. Use infrastructure-as-code to define and enforce
      network topology with mandatory peer review for changes.
    tools:
      - terraform
      - istio
      - calico
      - aws-vpc
      - azure-vnet

  devsecops:
    prose: >-
      Scan infrastructure-as-code for network misconfigurations such
      as overly permissive security groups, public-facing resources
      without justification, and missing encryption for network
      traffic. Implement pipeline checks that validate network
      configurations against organizational policies before deployment.
      Test network isolation controls as part of the deployment
      validation process.
    tools:
      - checkov
      - tfsec
      - trivy
      - gitlab-ci

  secops:
    prose: >-
      Monitor network flow logs for anomalous traffic patterns including
      lateral movement, data exfiltration, and communication with known
      malicious endpoints. Deploy network intrusion detection within
      cloud virtual networks. Alert on changes to network security
      configurations such as security group modifications, route table
      changes, and VPN tunnel status changes. Conduct periodic network
      architecture reviews to verify segmentation controls.
    tools:
      - aws-vpc-flow-logs
      - azure-network-watcher
      - suricata
      - splunk
      - elastic-siem

