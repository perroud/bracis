id: cls13.2
family: cls13
title: "Segregation in networks for cloud services"
class: ISO27017

statement:
  prose: >-
    Groups of information services, users and information systems shall
    be segregated on networks. For cloud services, the cloud service
    provider shall ensure that the cloud computing environment provides
    secure isolation of each cloud service customer's network traffic
    from the network traffic of other cloud service customers. The cloud
    service customer shall implement network segregation within its
    allocated cloud service environment to separate different security
    domains, applications, and data classifications. The cloud service
    provider shall document the network isolation mechanisms used and
    shall inform the cloud service customer of any limitations.

guidance:
  prose: >-
    Network segregation in cloud environments relies on virtual network
    isolation technologies such as VLANs, VPCs, virtual networks, and
    software-defined networking. The cloud service provider is
    responsible for ensuring that multi-tenant network isolation prevents
    unauthorized traffic between customer environments. The cloud
    service customer is responsible for implementing micro-segmentation
    within their allocated environments to separate workloads based on
    sensitivity, function, and risk level. Zero-trust network
    architectures should be considered, where network location alone
    does not confer trust and all communication requires authentication
    and authorization.

references:
  - citation: "ISO/IEC 27017:2015, Section 13.1.3"
    url: "https://www.iso.org/standard/43757.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement multi-tier network architecture with separate subnets
      for public-facing, application, and data layers. Deploy network
      policies in Kubernetes environments to enforce pod-to-pod
      communication restrictions. Use cloud-native micro-segmentation
      features to isolate workloads based on security classification.
      Implement zero-trust network principles where every connection
      is authenticated and authorized regardless of network location.
      Configure separate cloud accounts or subscriptions for
      production, staging, and development environments.
    tools:
      - calico
      - cilium
      - istio
      - terraform
      - aws-transit-gateway

  devsecops:
    prose: >-
      Include network policy definitions in infrastructure-as-code
      and validate them through CI/CD pipelines. Test network
      segregation controls as part of the deployment process to verify
      that workloads cannot communicate outside of approved paths.
      Scan for overly permissive network policies and flag them for
      remediation before deployment.
    tools:
      - checkov
      - kubeval
      - gitlab-ci
      - trivy

  secops:
    prose: >-
      Monitor network traffic for evidence of cross-boundary
      communication that violates segregation policies. Deploy network
      detection tools that identify lateral movement attempts within
      cloud environments. Conduct periodic penetration testing of
      network segregation controls to verify their effectiveness.
      Alert on unauthorized changes to network isolation configurations.
    tools:
      - suricata
      - falco
      - aws-vpc-flow-logs
      - splunk
      - elastic-siem

