id: ctrl-22
family: fam-6
title: "Notificacao de Incidentes Ciberneticos ao ONS e a ANEEL"
class: ONS-ARCIBER
baselines:
  - sin-agents

statement:
  prose: >-
    O agente do SIN deve notificar o ONS e a ANEEL sobre incidentes cibernéticos
    que afetem ou possam afetar o ARCiber e a confiabilidade do SIN, nos prazos
    e formatos definidos pelos Procedimentos de Rede ONS e pela ANEEL 964/2021.
    A notificação inicial ao ONS deve ser realizada em no máximo 2 horas após
    a identificação de incidente cibernético com impacto real ou potencial no SIN.
    O relatório final de incidente deve ser submetido em até 72 horas após a
    contenção do incidente. O agente deve cooperar com investigações do ONS e
    da ANEEL relacionadas a incidentes no ARCiber.

guidance:
  prose: >-
    A notificacao tempestiva de incidentes e obrigacao regulatoria e instrumento
    essencial para que o ONS possa coordenar a resposta e proteger a confiabilidade
    do SIN. Os controles devem estabelecer: (i) criterios claros de classificacao
    de incidentes que requerem notificacao obrigatoria (impacto real ou potencial
    no SIN, comprometimento de sistemas criticos do ARCiber, incidentes com
    vetor de ameaca que possa afetar outros agentes do SIN); (ii) processo de
    notificacao ao ONS: canais de comunicacao pre-definidos, template de notificacao,
    contatos 24/7 do Centro de Operacoes do ONS; (iii) processo de notificacao
    a ANEEL com formato e conteudo minimo exigido; (iv) gerenciamento de
    informacoes sensiveis — dados de incidente que nao devem ser compartilhados
    publicamente mas devem ser compartilhados com reguladores; (v) coordenacao
    com CTIR Gov (Grupo de Resposta a Incidentes de Seguranca em Redes
    Telematicas do Governo Federal) para incidentes de relevancia nacional.

implementation_guidance:
  platform_engineering:
    prose: >-
      Implementar portal seguro de comunicacao de incidentes com o ONS e a ANEEL,
      operacional mesmo durante incidentes que possam comprometer sistemas corporativos.
      Configurar canal de comunicacao redundante (ex: sistema de comunicacao
      alternativo, linha dedicada segura) para notificacao emergencial ao ONS.
      Implementar template automatizado de relatorio de incidente preenchivel
      no SOAR/SIEM com todos os campos obrigatorios exigidos pelo ONS e ANEEL.
      Manter lista de contatos do ONS (Centro de Operacoes Nacional e Regionais)
      e ANEEL atualizada e acessivel offline (nao dependente de sistemas do ARCiber).
    tools:
      - cortex-xsoar
      - servicenow
      - pagerduty
      - email-seguro
  devsecops:
    prose: >-
      Automatizar a geracao de relatorios de incidente a partir dos dados coletados
      pelo SIEM/SOAR, preenchendo automaticamente os campos obrigatorios do
      formato de notificacao do ONS/ANEEL. Implementar rastreamento automatizado
      de SLAs de notificacao: alertar o RSCA quando o prazo de 2 horas para
      notificacao ao ONS esta se aproximando. Criar workflow no SOAR para gerenciar
      o ciclo de vida completo do incidente: deteccao, notificacao inicial,
      atualizacoes periodicas, notificacao final e fechamento.
    tools:
      - cortex-xsoar
      - splunk-soar
      - servicenow
      - gitlab
  secops:
    prose: >-
      Manter processo documentado e testado de notificacao de incidentes ao ONS
      e ANEEL, incluindo: contatos 24/7, canais alternativos, formato de notificacao
      e prazos. Incluir o processo de notificacao nos exercicios de simulacao de
      incidentes para testar a eficacia do procedimento. Manter historico de todas
      as notificacoes enviadas ao ONS e ANEEL para demonstracao de conformidade
      regulatoria. Designar substitutos para o RSCA com autoridade para notificar
      o ONS/ANEEL em caso de indisponibilidade do RSCA principal. Participar de
      exercicios de coordenacao de resposta a incidentes promovidos pelo ONS.
    tools:
      - servicenow
      - archer
      - pagerduty
      - cortex-xsoar

