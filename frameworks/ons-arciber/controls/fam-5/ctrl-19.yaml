id: ctrl-19
family: fam-5
title: "Protecao de Portas e Servicos de Rede no ARCiber"
class: ONS-ARCIBER
baselines:
  - sin-agents

statement:
  prose: >-
    O agente do SIN deve implementar controles para gerenciar e minimizar a
    superfície de ataque de rede dos sistemas do ARCiber, desabilitando ou
    bloqueando portas, protocolos e serviços de rede desnecessários para a
    operação do SIN. Deve ser mantida documentação atualizada de todas as
    portas e serviços ativos em cada sistema do ARCiber com justificativa
    operacional. Comunicações de rede no ARCiber devem utilizar protocolos
    seguros onde tecnicamente viável, e protocolos industriais legados sem
    mecanismos de segurança nativos (Modbus, DNP3 sem autenticação) devem
    ser compensados com controles de rede adicionais.

guidance:
  prose: >-
    Sistemas OT/ICS historicamente foram projetados para funcionalidade e
    disponibilidade, sem consideracao de seguranca cibernetica. Frequentemente
    possuem servicos desnecessarios habilitados (telnet, FTP, servicos web
    de administracao, protocolos legados). Os controles devem abranger:
    (i) varredura de portas e servicos ativos em todos os sistemas do ARCiber
    para identificar servicos desnecessarios; (ii) desabilitacao de servicos
    nao necessarios em sistemas OT: telnet (usar SSH), FTP (usar SFTP), HTTP
    sem criptografia, servicos de impressao e compartilhamento de arquivos;
    (iii) para protocolos industriais sem autenticacao nativa (Modbus/TCP,
    DNP3 sem SAv5): implementar controles de acesso na camada de rede
    (ACLs, firewall) para limitar quais sistemas podem iniciar comunicacao;
    (iv) documentar e justificar cada porta e servico necessario para operacao
    em cada sistema do ARCiber; (v) validar que firewalls industriais bloqueiam
    todos os fluxos de rede nao documentados (deny-all por padrao).

implementation_guidance:
  platform_engineering:
    prose: >-
      Implementar scanners de vulnerabilidade OT (Tenable.OT modo passivo,
      Nozomi) para identificar portas e servicos ativos nos sistemas do ARCiber
      sem necessidade de scan ativo invasivo. Configurar firewalls industriais
      com politica deny-all e regras de permissao minimas para cada fluxo de
      comunicacao justificado. Implementar IDS/IPS industrial no perimetro do
      ARCiber para detectar comunicacoes suspeitas em protocolos industriais.
      Automatizar a geracao de relatorio de portas e servicos ativos do ARCiber
      via ferramentas de descoberta passiva para comparacao com a documentacao
      aprovada.
    tools:
      - tenable-ot
      - nozomi-networks
      - claroty
      - palo-alto
      - fortinet-fortigate-rugged
  devsecops:
    prose: >-
      Implementar pipeline de validacao que compare os servicos ativos descobertos
      pelos scanners OT com o baseline aprovado de portas e servicos do ARCiber,
      alertando para desvios. Automatizar a revisao de regras de firewall industrial
      para identificar regras permissivas ou obsoletas que possam ser removidas.
      Manter documentacao de matriz de comunicacao do ARCiber (porta, protocolo,
      fonte, destino, justificativa) como documento versionado no repositorio
      GitLab, atualizado a cada mudanca aprovada.
    tools:
      - gitlab-ci
      - tenable-ot
      - algosec
      - ansible
  secops:
    prose: >-
      Realizar varredura semestral de portas e servicos nos sistemas do ARCiber
      para identificar desvios do baseline aprovado. Investigar qualquer servico
      ou porta ativa nao documentado como potencial incidente de seguranca ou
      mudanca nao autorizada. Monitorar trafego de protocolos industriais para
      deteccao de comandos anomaticos ou comunicacoes com destinos nao autorizados.
      Verificar anualmente que todos os protocolos industriais sem autenticacao
      nativa possuem controles de rede compensatorios adequados documentados
      e funcionando.
    tools:
      - nozomi-networks
      - tenable-ot
      - splunk
      - servicenow

