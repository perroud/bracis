id: ctrl-04
family: fam-1
title: "Gestao de Riscos Ciberneticos do ARCiber"
class: ONS-ARCIBER
baselines:
  - sin-agents

statement:
  prose: >-
    O agente do SIN deve implementar um processo formal e documentado de gestão
    de riscos cibernéticos para o ARCiber, incluindo identificação, análise,
    avaliação e tratamento de riscos para os sistemas OT/ICS/SCADA que integram
    o Ambiente Regulado Cibernético. O processo deve considerar o impacto
    potencial na confiabilidade operacional do SIN, na segurança de pessoas e
    na integridade dos equipamentos. A avaliação de riscos deve ser revisada
    ao menos anualmente, após mudanças significativas no ARCiber e após
    incidentes cibernéticos com impacto nos sistemas do SIN.

guidance:
  prose: >-
    A gestao de riscos para ambientes OT/ICS do setor eletrico deve considerar
    dimensoes especificas que diferem da gestao de riscos IT convencional:
    (i) impactos em Safety (seguranca de pessoas), Process (continuidade
    operacional do SIN), e Environment (meio ambiente); (ii) restricoes de
    disponibilidade dos sistemas — janelas de manutencao limitadas, impossibilidade
    de indisponibilidade nao planejada; (iii) longevidade dos ativos OT — sistemas
    com 15 a 25 anos de vida util, sem suporte do fabricante; (iv) interdependencia
    com sistemas fisicos — uma acao cibernetica pode causar impacto fisico
    catastrofico em equipamentos e pessoas. A metodologia deve ser baseada em
    IEC 62443-3-2 (avaliacao de riscos para sistemas IACS) e documentar
    claramente o nivel de risco aceitavel para o ARCiber.

implementation_guidance:
  platform_engineering:
    prose: >-
      Implementar plataforma de GRC (Governance, Risk and Compliance) integrada
      ao catalogo de ativos do ARCiber para gerenciamento continuo de riscos.
      Automatizar a coleta de dados de risco a partir de scanners de vulnerabilidade
      OT (Nozomi, Claroty, Tenable.OT) e alimentar o registro de riscos de forma
      continua. Integrar o registro de riscos ao processo de gestao de mudancas
      (Change Management) para avaliar riscos de novas implementacoes no ARCiber.
      Implementar dashboards de risco para visualizacao em tempo real do perfil
      de risco do ARCiber com alertas automaticos para riscos acima do limiar
      aceitavel.
    tools:
      - nozomi-networks
      - claroty
      - tenable-ot
      - servicenow-grc
      - archer
  devsecops:
    prose: >-
      Integrar analise de risco ao processo de aprovacao de mudancas no ARCiber
      via pipeline CI/CD. Para qualquer alteracao em sistemas OT do ARCiber,
      exigir avaliacao de impacto de seguranca documentada como pre-requisito
      para aprovacao. Implementar politicas OPA/Rego que bloqueiem o deploy de
      configuracoes que introduzam riscos acima do limiar aceitavel sem aprovacao
      formal do RSCA. Automatizar relatorios de risco como artefatos do pipeline
      para rastreabilidade e auditoria.
    tools:
      - gitlab-ci
      - opa
      - servicenow
      - jira
  secops:
    prose: >-
      Executar avaliacao de riscos ciberneticos do ARCiber ao menos anualmente,
      com metodologia documentada baseada em IEC 62443-3-2. Manter registro de
      riscos (risk register) atualizado com: ativo afetado, ameaca identificada,
      vulnerabilidade explorada, probabilidade, impacto (SIN, safety, ambiental),
      nivel de risco residual e plano de tratamento com prazo e responsavel.
      Integrar o processo de gestao de riscos com o programa de avaliacao de
      vulnerabilidades (ctrl-20) e com o plano de resposta a incidentes (ctrl-21).
      Compartilhar avaliacoes de risco anonimizadas com o ONS conforme solicitado.
    tools:
      - archer
      - servicenow-grc
      - nessus
      - tenable-ot

