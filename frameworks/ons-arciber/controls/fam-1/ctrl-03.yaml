id: ctrl-03
family: fam-1
title: "Conscientizacao e Treinamento em Seguranca Cibernetica para o ARCiber"
class: ONS-ARCIBER
baselines:
  - sin-agents

statement:
  prose: >-
    O agente do SIN deve implementar um programa formal de conscientização e
    treinamento em segurança cibernética para todos os colaboradores e
    prestadores de serviço com acesso ao ARCiber. O programa deve incluir
    treinamento específico sobre ameaças a sistemas OT/ICS/SCADA, políticas
    e procedimentos de segurança do ARCiber, reconhecimento e notificação de
    incidentes cibernéticos, e restrições de uso de dispositivos e mídias no
    ambiente regulado. O treinamento deve ser realizado no onboarding e
    renovado ao menos anualmente.

guidance:
  prose: >-
    O fator humano e um dos principais vetores de comprometimento em ambientes
    OT/ICS. O programa de treinamento deve ser adaptado aos perfis de usuarios:
    (i) operadores de sistema eletrico — foco em reconhecimento de anomalias em
    HMI/SCADA, procedimentos de notificacao de incidentes, restricoes de uso
    de midias removiveis; (ii) engenheiros de manutencao OT — seguranca em
    acesso a campo, gestao de laptops de engenharia, procedimentos de mudanca
    segura em PLCs/RTUs/IEDs; (iii) equipe de TI com acesso ao ARCiber — riscos
    especificos de convergencia IT/OT, restricoes de ferramentas padrao de TI
    em ambientes OT; (iv) terceiros e fornecedores — requisitos de seguranca
    contratuais, procedimentos de acesso remoto supervisionado. Manter registros
    de conclusao de treinamento como evidencia de conformidade.

implementation_guidance:
  platform_engineering:
    prose: >-
      Implementar plataforma de LMS (Learning Management System) integrada ao
      diretorio corporativo para gestao e rastreamento de treinamentos do ARCiber.
      Criar trilha de aprendizado especifica para acesso ao ARCiber como prerequisito
      tecnico para provisionamento de acesso logico aos sistemas. Integrar o
      sistema de treinamento com o IAM: acesso ao ARCiber so e provisionado apos
      confirmacao de conclusao de treinamento vigente. Automatizar notificacoes
      de renovacao de treinamento com 60 dias de antecedencia. Gerar relatorios
      automatizados de cobertura de treinamento para auditoria regulatoria.
    tools:
      - moodle
      - cornerstone
      - active-directory
      - gitlab
  devsecops:
    prose: >-
      Incluir modulo de seguranca para ARCiber no programa de onboarding de
      desenvolvedores e engenheiros que trabalham com sistemas do SIN. Criar
      repositorio de materiais de seguranca (playbooks, procedimentos, alertas
      de ameacas) no GitLab acessivel aos times relevantes. Integrar simulacoes
      de phishing e engenharia social ao programa de conscientizacao para
      testar a prontidao dos colaboradores com acesso ao ARCiber. Documentar
      licoes aprendidas de incidentes anteriores como casos de uso educativos.
    tools:
      - gitlab
      - proofpoint
      - knowbe4
  secops:
    prose: >-
      Realizar simulacoes de incidentes ciberneticos (tabletop exercises) ao
      menos uma vez ao ano envolvendo os perfis de usuarios do ARCiber.
      Manter catalogo atualizado de ameacas especificas a sistemas OT/ICS do
      setor eletrico (ex: Industroyer, Triton/TRISIS, BlackEnergy) como material
      de treinamento. Monitorar indicadores de eficacia do programa: taxa de
      cliques em phishing simulado, taxa de notificacao de incidentes, tempo
      de resposta em exercicios. Registrar e evidenciar treinamentos concluidos
      para demonstracao de conformidade em auditorias ANEEL/ONS.
    tools:
      - knowbe4
      - proofpoint
      - servicenow
      - splunk

