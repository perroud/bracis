id: ctrl-01
family: fam-1
title: "Politica de Seguranca Cibernetica do ARCiber"
class: ONS-ARCIBER
baselines:
  - sin-agents

statement:
  prose: >-
    O agente do SIN deve estabelecer, documentar, aprovar pela alta administração,
    publicar e manter atualizada uma Política de Segurança Cibernética que abranja
    o Ambiente Regulado Cibernético (ARCiber). A política deve definir o escopo
    do ARCiber, os objetivos de segurança cibernética, as responsabilidades dos
    papéis envolvidos, as diretrizes para gestão de riscos, e os requisitos de
    conformidade com a ANEEL 964/2021 e os Procedimentos de Rede ONS. A política
    deve ser revisada ao menos anualmente ou após incidentes cibernéticos
    relevantes.

guidance:
  prose: >-
    A Politica de Seguranca Cibernetica do ARCiber deve ser o documento de nivel
    mais alto da estrutura de governanca de seguranca cibernetica do agente para
    os sistemas OT/ICS/SCADA. Deve contemplar: (i) definicao do perimetro do
    ARCiber com listagem dos sistemas incluidos por nivel ISA-95; (ii) compromisso
    formal da alta administracao com a seguranca cibernetica; (iii) papeis e
    responsabilidades, incluindo designacao de Responsavel pela Seguranca
    Cibernetica do ARCiber (RSCA); (iv) requisitos de classificacao de ativos e
    informacoes; (v) obrigacoes de notificacao de incidentes ao ONS e a ANEEL;
    (vi) referencias aos demais documentos de nivel inferior (normas, procedimentos,
    instrucoes de trabalho). A politica deve ser comunicada a todos os colaboradores
    e prestadores de servico com acesso ao ARCiber.

implementation_guidance:
  platform_engineering:
    prose: >-
      Implementar o gerenciamento da politica como codigo (policy-as-code) usando
      repositorio GitLab dedicado com controle de versao e aprovacoes formais via
      merge request. Estruturar a politica em modulos YAML/JSON para facilitar
      auditoria automatizada de conformidade. Integrar o repositorio de politicas
      ao pipeline CI/CD para validacao automatica de consistencia e rastreabilidade.
      Publicar a politica no portal interno via GitLab Pages com historico de
      revisoes auditavel. Configurar alertas de revisao periodica via GitLab
      Scheduled Pipelines (frequencia minima: anual). Manter rastreabilidade
      bidirecional entre a politica e os controles tecnicos implementados no
      ARCiber usando labels e epics no GitLab.
    tools:
      - gitlab
      - gitlab-pages
      - opa
      - confluence
  devsecops:
    prose: >-
      Implementar gates no pipeline CI/CD que bloqueiem deploys em ambientes
      produtivos do ARCiber caso a politica de seguranca nao esteja vigente e
      aprovada. Criar checklist automatizado de conformidade com a politica como
      parte do processo de onboarding de novos projetos e sistemas no ARCiber.
      Integrar verificacoes de policy-as-code com frameworks como OPA/Conftest
      para validar que infraestrutura provisionada (IaC) esta em conformidade com
      as diretrizes da politica. Gerar relatorio de aderencia a politica como
      artefato do pipeline para auditoria.
    tools:
      - gitlab-ci
      - opa
      - conftest
      - pre-commit
  secops:
    prose: >-
      Estabelecer processo formal de revisao anual da politica com participacao
      do RSCA, equipe de OT/ICS, equipe de TI e representante da alta administracao.
      Manter registro de todas as versoes da politica com data de aprovacao,
      responsavel e justificativa de mudanca. Integrar a politica ao programa de
      conscientizacao em seguranca cibernetica — todo colaborador com acesso ao
      ARCiber deve confirmar leitura e entendimento anualmente. Criar mecanismo
      de excecoes formais para situacoes em que controles nao possam ser
      implementados, com analise de risco documentada e aprovacao do RSCA.
    tools:
      - servicenow
      - archer
      - sharepoint

