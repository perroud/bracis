id: ctrl-02
family: fam-1
title: "Papeis e Responsabilidades de Seguranca Cibernetica do ARCiber"
class: ONS-ARCIBER
baselines:
  - sin-agents

statement:
  prose: >-
    O agente do SIN deve definir, documentar e formalizar os papéis e
    responsabilidades de segurança cibernética para o ARCiber, designando
    formalmente o Responsável pela Segurança Cibernética do ARCiber (RSCA)
    com autoridade e recursos suficientes para implementar e manter os
    controles mínimos. Deve ser definida a estrutura de governança de segurança
    cibernética para sistemas OT/ICS/SCADA, incluindo a interface com as equipes
    de operação, manutenção e tecnologia da informação. O RSCA deve ter acesso
    direto à alta administração para escalonamento de questões críticas.

guidance:
  prose: >-
    A definicao clara de papeis evita lacunas de responsabilidade em ambientes
    convergentes IT/OT, onde fronteiras organizacionais podem criar pontos cegos
    de seguranca. O RSCA deve coordenar: (i) a implementacao e monitoramento dos
    24 controles minimos do ARCiber; (ii) a comunicacao com o ONS em situacoes
    de incidente ou nao conformidade; (iii) a interface com ANEEL para relatorios
    regulatorios; (iv) a integracao entre as equipes de operacao de sistemas
    eletricos (engenharia OT) e seguranca da informacao (TI). Recomenda-se a
    constituicao de um Comite de Seguranca Cibernetica do ARCiber com reunioes
    periodicas documentadas. As responsabilidades devem ser formalizadas em
    descricoes de cargo e contratos de prestadores de servico.

implementation_guidance:
  platform_engineering:
    prose: >-
      Implementar controle de acesso baseado em papeis (RBAC) nos sistemas de
      gerenciamento do ARCiber alinhado a estrutura organizacional definida.
      Configurar grupos e permissoes no GitLab espelhando os papeis definidos:
      RSCA (Owner), equipe OT (Maintainer), equipe IT-Security (Developer),
      auditores (Reporter). Integrar RBAC com o Active Directory ou LDAP
      corporativo para provisionamento automatizado de acessos conforme
      desligamentos e mudancas de funcao. Manter matriz RACI como documento
      versionado no repositorio de politicas.
    tools:
      - gitlab
      - active-directory
      - ldap
      - servicenow
  devsecops:
    prose: >-
      Configurar grupos de revisores e aprovadores no GitLab CI/CD alinhados
      aos papeis de seguranca cibernetica do ARCiber. Exigir aprovacao dupla
      (engenheiro OT + RSCA ou representante designado) para mudancas em
      infraestrutura critica do ARCiber. Implementar Code Owners no repositorio
      de configuracoes de sistemas do ARCiber para garantir que alteracoes
      criticas sejam revisadas pelos responsaveis designados. Automatizar
      notificacoes ao RSCA para eventos de seguranca criticos via webhooks.
    tools:
      - gitlab-ci
      - gitlab-codeowners
      - pagerduty
      - slack
  secops:
    prose: >-
      Definir matriz RACI para todos os 24 controles minimos do ARCiber,
      identificando para cada controle o Responsavel (executa), Aprovador
      (autoriza), Consultado (informa) e Informado (notificado). Realizar
      reunioes trimestrais do Comite de Seguranca Cibernetica do ARCiber com
      ata documentada. Manter registro atualizado de todos os profissionais
      designados para papeis de seguranca no ARCiber. Realizar exercicios
      de tabletop anuais para testar os fluxos de escalacao e comunicacao
      definidos na estrutura de governanca.
    tools:
      - servicenow
      - archer
      - jira

