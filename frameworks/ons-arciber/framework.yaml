description: >-
  O Procedimento de Rede ONS RO-CB.BR.01 define 24 Controles Minimos de Seguranca
  Cibernetica obrigatorios para os agentes do Setor Eletrico Brasileiro conectados
  ao Sistema Interligado Nacional (SIN). O ARCiber (Ambiente Regulado Cibernetico)
  delimita o perimetro dos sistemas ciberneticos cujo comprometimento pode afetar
  a confiabilidade e a seguranca operacional do SIN. Os controles sao baseados nas
  normas ISA/IEC 62443 e NERC CIP e se aplicam a sistemas OT/ICS/SCADA em usinas
  geradoras, subestacoes e centros de controle conectados ao SIN.

arciber_definition: >-
  O Ambiente Regulado Cibernetico (ARCiber) e o conjunto de sistemas ciberneticos
  de um agente cujo comprometimento pode afetar a confiabilidade e a seguranca da
  operacao do SIN. Inclui: Sistemas de Supervisao e Controle (SCADA/EMS/DMS),
  Sistemas de Protecao de Sistemas de Potencia (PSP), Sistemas de Telecomunicacao
  criticos para a operacao do SIN, e os sistemas de suporte direto a estes.

