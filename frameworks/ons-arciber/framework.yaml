control_families:
  - id: fam-1
    title: "Governanca e Politicas"
    description: "Politica de seguranca cibernetica, papeis e responsabilidades, programa de conscientizacao e treinamento para o ARCiber"
    control_count: 4
  - id: fam-2
    title: "Gestao de Ativos e Perimetro"
    description: "Inventario de ativos do ARCiber, segmentacao de redes, gestao do perimetro eletronico e zona desmilitarizada"
    control_count: 4
  - id: fam-3
    title: "Controle de Acesso"
    description: "Autenticacao, autorizacao, privilegio minimo, gestao de contas e controle de acesso remoto ao ARCiber"
    control_count: 4
  - id: fam-4
    title: "Protecao de Sistemas e Redes"
    description: "Gestao de configuracao, gestao de patches, protecao contra malware e seguranca de dispositivos portateis no ARCiber"
    control_count: 4
  - id: fam-5
    title: "Monitoramento e Deteccao"
    description: "Monitoramento continuo de seguranca, gestao de logs, avaliacao de vulnerabilidades e testes de seguranca no ARCiber"
    control_count: 4
  - id: fam-6
    title: "Resposta e Recuperacao"
    description: "Plano de resposta a incidentes ciberneticos, comunicacao ao ONS/ANEEL, backup e recuperacao de sistemas criticos do ARCiber"
    control_count: 4

