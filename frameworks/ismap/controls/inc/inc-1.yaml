id: inc-1
family: inc
title: "Incident Management Planning and Procedures"
class: ISMAP
baselines:
  - ismap
  - ismap-lcs

statement:
  prose: |
    The cloud service provider shall establish management responsibilities and
    procedures to ensure a quick, effective, and orderly response to information
    security incidents. Information security incidents shall be reported through
    appropriate management channels as quickly as possible. Employees and
    contractors shall be required to report observed or suspected information
    security weaknesses. The organization shall define and apply procedures
    for the identification, collection, acquisition, and preservation of
    information which can serve as evidence.

guidance:
  prose: |
    ISMAP incident management requirements mandate that cloud service providers
    have a mature incident response capability. Incidents affecting government
    tenants must be reported to the relevant government agency within timeframes
    defined in the service agreement, typically within hours of detection.
    The incident management plan must address the specific characteristics of
    cloud environments, including multi-tenant impact assessment and coordinated
    response with affected government agencies. Evidence preservation is
    critical, as incidents may require forensic investigation by government
    authorities. Incident response procedures must be tested through regular
    exercises.

references:
  - citation: "ISMAP Management Criteria, INC-01"
    url: "https://www.ismap.go.jp/"

implementation_guidance:
  platform_engineering:
    prose: |
      Implement automated incident detection and alerting at the platform
      level. Deploy centralized logging with immutable storage for forensic
      evidence. Implement automated incident response playbooks for common
      incident types. Provide self-service incident reporting interfaces
      for development teams.
    tools:
      - pagerduty
      - elastic-stack
      - terraform
      - backstage

  devsecops:
    prose: |
      Integrate security event detection into CI/CD pipelines to catch
      incidents during deployment. Implement automated rollback capabilities
      for security incidents. Maintain incident response runbooks alongside
      application code. Ensure pipeline logs are retained as potential
      incident evidence.
    tools:
      - gitlab-ci
      - argocd
      - falco
      - trivy

  secops:
    prose: |
      Operate a 24/7 security operations center with incident detection
      and response capabilities. Implement SOAR (Security Orchestration,
      Automation, and Response) for automated incident handling. Conduct
      regular incident response exercises and tabletop simulations.
      Maintain incident records and post-incident reports for ISMAP audit.
    tools:
      - splunk
      - xsoar
      - elastic-siem
      - thehive

