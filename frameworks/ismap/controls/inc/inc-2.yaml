id: inc-2
family: inc
title: "Incident Response, Recovery, and Lessons Learned"
class: ISMAP
baselines:
  - ismap

statement:
  prose: |
    The cloud service provider shall respond to information security incidents
    in accordance with documented procedures. The organization shall use
    knowledge gained from analyzing and resolving information security incidents
    to reduce the likelihood or impact of future incidents. Information security
    continuity shall be integrated into the organization's business continuity
    management. The organization shall verify the established and implemented
    information security continuity controls at regular intervals to ensure
    they are valid and effective during adverse situations.

guidance:
  prose: |
    ISMAP requires a closed-loop incident management process where lessons
    learned from incidents drive continuous improvement. Post-incident reviews
    must result in actionable improvements to controls, procedures, and
    monitoring capabilities. Business continuity planning must address
    scenarios specific to cloud services, including region-level failures,
    provider outages, and targeted attacks. Recovery time objectives (RTOs)
    and recovery point objectives (RPOs) must be defined for government
    tenants and validated through regular testing. Incident response
    capabilities must be demonstrated during ISMAP assessment through
    evidence of exercises and actual incident handling.

references:
  - citation: "ISMAP Management Criteria, INC-02"
    url: "https://www.ismap.go.jp/"

implementation_guidance:
  platform_engineering:
    prose: |
      Implement automated failover and disaster recovery at the platform
      level. Maintain infrastructure-as-code that enables rapid
      reconstruction of affected environments. Deploy multi-region
      architectures with automated health checks and traffic switching.
      Implement chaos engineering practices to validate resilience.
    tools:
      - terraform
      - argocd
      - litmus-chaos
      - velero

  devsecops:
    prose: |
      Implement automated rollback procedures in deployment pipelines.
      Maintain backup and restore procedures for all application data.
      Include recovery testing in CI/CD workflows. Document and version
      control incident response playbooks alongside application code.
    tools:
      - gitlab-ci
      - argocd
      - velero
      - helm

  secops:
    prose: |
      Conduct post-incident reviews and document lessons learned.
      Track remediation actions from incident reviews to completion.
      Execute regular disaster recovery and business continuity tests.
      Generate incident trend analysis reports for management review
      and ISMAP audit evidence.
    tools:
      - splunk
      - jira
      - confluence
      - thehive

