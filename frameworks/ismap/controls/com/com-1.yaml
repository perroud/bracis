id: com-1
family: com
title: "Network Security Management"
class: ISMAP
baselines:
  - ismap
  - ismap-lcs

statement:
  prose: |
    The cloud service provider shall manage and control networks to protect
    information in systems and applications. Network services shall be
    identified, and service level agreements for network services shall
    include security requirements. Networks shall be segmented to separate
    groups of information services, users, and systems based on their
    classification level. Information involved in application service
    transactions shall be protected to prevent incomplete transmission,
    misrouting, unauthorized message alteration, unauthorized disclosure,
    and unauthorized message duplication or replay.

guidance:
  prose: |
    ISMAP network security requirements emphasize tenant isolation and
    protection of government data in transit. Network segmentation must
    ensure that government tenants are logically or physically separated
    from other customers. Cloud service providers must demonstrate that
    network architecture prevents lateral movement between tenants and
    between management and data planes. Network security controls must
    cover both north-south and east-west traffic. DDoS protection is
    expected for all internet-facing services. Network monitoring must
    detect and alert on anomalous traffic patterns.

references:
  - citation: "ISMAP Management Criteria, COM-01"
    url: "https://www.ismap.go.jp/"

implementation_guidance:
  platform_engineering:
    prose: |
      Implement network segmentation using virtual private clouds, network
      policies, and service mesh. Define network architecture as code with
      enforced security groups and firewall rules. Deploy zero-trust
      network architecture with mutual TLS between services. Implement
      DDoS protection and web application firewalls for internet-facing
      endpoints.
    tools:
      - cilium
      - istio
      - terraform
      - calico

  devsecops:
    prose: |
      Validate network configurations in CI/CD pipelines before deployment.
      Scan infrastructure-as-code for overly permissive network rules.
      Test network segmentation as part of integration testing. Enforce
      that all service-to-service communication uses encrypted channels.
    tools:
      - checkov
      - tfsec
      - gitlab-ci
      - kube-bench

  secops:
    prose: |
      Monitor network traffic for intrusion attempts and anomalous
      patterns. Implement network detection and response (NDR) for
      cloud environments. Alert on unauthorized network connections
      between segments. Generate network security compliance reports
      showing segmentation effectiveness and encryption coverage.
    tools:
      - zeek
      - suricata
      - splunk
      - prisma-cloud

