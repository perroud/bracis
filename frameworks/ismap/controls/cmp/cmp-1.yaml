id: cmp-1
family: cmp
title: "Compliance with Legal and Regulatory Requirements"
class: ISMAP
baselines:
  - ismap
  - ismap-lcs

statement:
  prose: |
    The cloud service provider shall identify, document, and keep up to date
    all relevant legislative, statutory, regulatory, and contractual
    requirements and the organization's approach to meeting these requirements
    for each information system and the organization. Appropriate procedures
    shall be implemented to ensure compliance with legal, regulatory, and
    contractual requirements related to intellectual property rights and the
    use of proprietary software products. Records shall be protected from
    loss, destruction, falsification, unauthorized access, and unauthorized
    release in accordance with applicable laws and regulations.

guidance:
  prose: |
    ISMAP requires cloud service providers to demonstrate comprehensive
    compliance management, particularly with Japanese laws including the
    Act on the Protection of Personal Information (APPI), the Basic Act
    on Cybersecurity, and relevant sector-specific regulations. Cloud service
    providers must maintain a compliance register that maps all applicable
    requirements to implemented controls. Privacy requirements must address
    Japanese personal information protection standards. Compliance monitoring
    must be continuous, not periodic, and findings must be tracked to
    resolution. Auditors will verify that the compliance management process
    is systematic and covers all relevant jurisdictions.

references:
  - citation: "ISMAP Management Criteria, CMP-01"
    url: "https://www.ismap.go.jp/"

implementation_guidance:
  platform_engineering:
    prose: |
      Implement compliance-as-code frameworks that codify regulatory
      requirements as automated checks. Maintain a machine-readable
      compliance register linked to infrastructure configurations.
      Automate evidence collection for compliance requirements.
      Enforce data residency controls to comply with Japanese data
      sovereignty laws.
    tools:
      - open-policy-agent
      - terraform
      - backstage
      - kyverno

  devsecops:
    prose: |
      Integrate compliance checks into CI/CD pipelines that validate
      regulatory requirements before deployment. Enforce license
      compliance scanning for all third-party dependencies. Implement
      automated privacy checks that detect handling of personal
      information without appropriate controls.
    tools:
      - gitlab-ci
      - fossa
      - checkov
      - semgrep

  secops:
    prose: |
      Operate continuous compliance monitoring across all cloud services.
      Generate compliance dashboards that track adherence to all
      applicable regulations. Alert on compliance drift and deviations.
      Maintain audit-ready compliance evidence packages for ISMAP
      assessors and government agencies.
    tools:
      - prisma-cloud
      - splunk
      - wiz
      - drata

