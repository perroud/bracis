id: cmp-2
family: cmp
title: "Independent Review and Audit"
class: ISMAP
baselines:
  - ismap

statement:
  prose: |
    The organization's approach to managing information security and its
    implementation shall be reviewed independently at planned intervals or
    when significant changes occur. Management shall regularly review the
    organization's compliance with information security policies, standards,
    and any other security requirements. Information systems shall be regularly
    reviewed for compliance with the organization's information security
    policies and technical standards. The ISMAP-registered cloud service
    shall undergo annual assessment by an ISMAP-approved audit firm.

guidance:
  prose: |
    ISMAP certification requires annual independent assessment by an
    ISMAP-approved audit firm (typically a major audit firm registered with
    the ISMAP program). The assessment covers all management criteria and
    produces a detailed report that is submitted to the ISMAP Steering
    Committee. Cloud service providers must also conduct internal audits
    at planned intervals. The independent audit must verify that controls
    are not only designed appropriately but are operating effectively.
    Audit evidence must be preserved and made available to government
    agencies upon request. Non-conformities identified during audits must
    be remediated within defined timeframes.

references:
  - citation: "ISMAP Management Criteria, CMP-02"
    url: "https://www.ismap.go.jp/"

implementation_guidance:
  platform_engineering:
    prose: |
      Implement automated compliance evidence collection that generates
      audit artifacts continuously. Maintain infrastructure configurations
      in version control to provide complete audit trails. Deploy automated
      compliance scanning tools that generate reports aligned with ISMAP
      management criteria.
    tools:
      - prowler
      - wiz
      - backstage
      - terraform

  devsecops:
    prose: |
      Generate pipeline audit logs that serve as evidence of secure
      development practices. Implement automated compliance gates in
      CI/CD that produce auditable records. Maintain traceability from
      requirements through code changes to deployment evidence.
    tools:
      - gitlab-ci
      - checkov
      - trivy
      - cosign

  secops:
    prose: |
      Coordinate internal and external audit activities. Maintain an
      audit management system that tracks findings, remediation plans,
      and closure evidence. Generate continuous compliance status
      reports for management and ISMAP assessors. Support external
      audit activities with timely evidence provision.
    tools:
      - drata
      - splunk
      - jira
      - confluence

