id: sup-2
family: sup
title: "Supplier Service Monitoring and Change Management"
class: ISMAP
baselines:
  - ismap

statement:
  prose: |
    The cloud service provider shall regularly monitor, review, and audit
    supplier service delivery. Changes to the provision of services by
    suppliers, including changes to security policies, procedures, and
    controls, shall be managed taking into account the criticality of
    the business information, systems, and processes involved. The cloud
    service provider shall maintain visibility into the security practices
    of critical suppliers and shall evaluate the impact of supplier changes
    on the security of the cloud service.

guidance:
  prose: |
    ISMAP requires ongoing supplier oversight rather than point-in-time
    assessments. Cloud service providers must demonstrate continuous monitoring
    of critical suppliers, particularly those whose services directly impact
    government tenants. Supplier changes that could affect the security or
    availability of the cloud service must be evaluated before implementation.
    This includes changes to sub-processors, data center locations, and
    security architectures. Audit rights must be exercised regularly, and
    audit results must be documented for ISMAP assessors.

references:
  - citation: "ISMAP Management Criteria, SUP-02"
    url: "https://www.ismap.go.jp/"

implementation_guidance:
  platform_engineering:
    prose: |
      Implement automated monitoring of supplier service health and security
      posture. Integrate supplier change notifications into platform
      operations workflows. Maintain automated dependency tracking that
      alerts on supplier component updates and security advisories.
    tools:
      - backstage
      - prometheus
      - grafana
      - terraform

  devsecops:
    prose: |
      Automate dependency update workflows with security review gates.
      Track supplier component versions and alert on available security
      patches. Implement automated testing that validates supplier
      component updates do not introduce regressions or new
      vulnerabilities.
    tools:
      - dependabot
      - renovate
      - gitlab-ci
      - trivy

  secops:
    prose: |
      Monitor supplier security advisories and threat intelligence.
      Track supplier compliance with security requirements through
      periodic assessments. Alert on supplier security incidents
      that may impact the cloud service. Generate supplier monitoring
      reports for ISMAP audit evidence.
    tools:
      - splunk
      - elastic-siem
      - prisma-cloud
      - jira

