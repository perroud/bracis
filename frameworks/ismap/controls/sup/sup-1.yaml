id: sup-1
family: sup
title: "Supplier Security Policy and Agreements"
class: ISMAP
baselines:
  - ismap
  - ismap-lcs

statement:
  prose: |
    The cloud service provider shall establish an information security policy
    for supplier relationships that addresses the mitigation of risks associated
    with the supplier's access to the organization's assets. Relevant information
    security requirements shall be established and agreed with each supplier
    that may access, process, store, communicate, or provide IT infrastructure
    components for the organization's information. The supply chain for
    information and communications technology shall be managed to address
    risks related to the security of the cloud service.

guidance:
  prose: |
    ISMAP places significant emphasis on supply chain security, recognizing
    that cloud services depend on complex supplier ecosystems. Cloud service
    providers must maintain a comprehensive inventory of all suppliers that
    have access to or impact the security of government data. Supplier
    agreements must include specific security requirements, audit rights,
    breach notification obligations, and data handling restrictions. Japanese
    government agencies will evaluate the cloud service provider's supply
    chain management as part of ISMAP assessment. Subcontracting of services
    that handle government data requires explicit disclosure and approval.

references:
  - citation: "ISMAP Management Criteria, SUP-01"
    url: "https://www.ismap.go.jp/"

implementation_guidance:
  platform_engineering:
    prose: |
      Implement software bill of materials (SBOM) generation for all
      platform components. Maintain a supplier registry integrated into
      the platform catalog. Enforce that third-party components meet
      security requirements through automated scanning. Implement supply
      chain integrity verification using signed artifacts.
    tools:
      - syft
      - backstage
      - cosign
      - terraform

  devsecops:
    prose: |
      Scan dependencies for known vulnerabilities and license compliance
      issues. Verify the integrity of third-party packages through signature
      verification and checksum validation. Implement supply chain security
      controls in CI/CD pipelines including SBOM generation and artifact
      signing.
    tools:
      - gitlab-ci
      - trivy
      - grype
      - cosign

  secops:
    prose: |
      Monitor supplier security posture through continuous assessment.
      Track supplier security incidents and vulnerabilities that may
      impact the cloud service. Maintain supplier risk registers and
      conduct periodic supplier security reviews. Alert on newly
      disclosed vulnerabilities in supplier components.
    tools:
      - splunk
      - osv-scanner
      - elastic-siem
      - prisma-cloud

