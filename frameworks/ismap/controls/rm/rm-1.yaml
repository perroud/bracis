id: rm-1
family: rm
title: "Risk Assessment"
class: ISMAP
baselines:
  - ismap
  - ismap-lcs

statement:
  prose: |
    The cloud service provider shall define and apply an information security
    risk assessment process that establishes and maintains risk acceptance
    criteria, criteria for performing risk assessments, and ensures that
    repeated assessments produce consistent, valid, and comparable results.
    The risk assessment shall identify risks associated with the loss of
    confidentiality, integrity, and availability of information within the
    scope of the cloud service. Risk assessments shall be performed at
    planned intervals, when significant changes are proposed, or when
    significant incidents occur.

guidance:
  prose: |
    ISMAP risk assessment requirements are derived from ISO/IEC 27001 Clause 6.1.2
    and supplemented with Japan-specific requirements for government cloud services.
    The risk assessment must consider threats specific to the Japanese regulatory
    environment, including natural disasters (earthquakes, typhoons), supply chain
    risks, and cross-border data transfer implications. Cloud service providers
    must demonstrate that risk assessments cover all components of the cloud
    service stack, from physical infrastructure through application layers.
    Assessors will evaluate the methodology, scope, and thoroughness of risk
    assessments during the ISMAP audit.

references:
  - citation: "ISMAP Management Criteria, RM-01"
    url: "https://www.ismap.go.jp/"

implementation_guidance:
  platform_engineering:
    prose: |
      Implement automated risk assessment tooling integrated into the platform.
      Maintain a risk register as code, version-controlled alongside
      infrastructure definitions. Automate vulnerability scanning and threat
      modeling as part of the risk assessment process. Use cloud security
      posture management tools to continuously identify risks in infrastructure
      configurations.
    tools:
      - prowler
      - wiz
      - trivy
      - backstage

  devsecops:
    prose: |
      Embed threat modeling into the development lifecycle using structured
      methodologies such as STRIDE. Integrate automated risk scoring into
      CI/CD pipelines that flag high-risk changes for additional review.
      Maintain threat models alongside application code and update them
      when architectures change.
    tools:
      - threatspec
      - owasp-threat-dragon
      - gitlab-ci
      - semgrep

  secops:
    prose: |
      Operate continuous risk monitoring that feeds into the risk assessment
      process. Correlate vulnerability data, threat intelligence, and incident
      data to maintain an up-to-date risk profile. Generate risk dashboards
      for management review and ISMAP audit evidence.
    tools:
      - splunk
      - elastic-siem
      - tenable
      - qualys

