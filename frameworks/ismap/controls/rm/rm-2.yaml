id: rm-2
family: rm
title: "Risk Treatment"
class: ISMAP
baselines:
  - ismap
  - ismap-lcs

statement:
  prose: |
    The cloud service provider shall define and apply a risk treatment process
    to select appropriate risk treatment options, determine controls necessary
    to implement the chosen treatment options, and produce a Statement of
    Applicability that documents which controls are included, justified, and
    implemented, and which are excluded with justification. A risk treatment
    plan shall be formulated and approved by risk owners. Residual risks
    shall be formally accepted by authorized personnel.

guidance:
  prose: |
    ISMAP requires that risk treatment follows a structured process aligned with
    ISO/IEC 27001 Clause 6.1.3. The Statement of Applicability (SoA) is a key
    audit artifact that maps ISMAP management criteria to the organization's
    implemented controls. Cloud service providers must demonstrate that controls
    are selected based on risk assessment outcomes rather than applied generically.
    Risk treatment plans must be specific to the cloud service being assessed and
    must address government-specific requirements such as data sovereignty within
    Japanese jurisdiction. Risk acceptance must be documented with clear
    accountability.

references:
  - citation: "ISMAP Management Criteria, RM-02"
    url: "https://www.ismap.go.jp/"

implementation_guidance:
  platform_engineering:
    prose: |
      Implement controls as codified platform policies that directly address
      identified risks. Maintain the Statement of Applicability as a
      version-controlled document linked to infrastructure configurations.
      Use policy-as-code to enforce risk treatment controls at the platform
      level and generate evidence of implementation automatically.
    tools:
      - open-policy-agent
      - terraform
      - kyverno
      - backstage

  devsecops:
    prose: |
      Map risk treatment controls to pipeline enforcement points. Implement
      automated checks that verify each deployment includes the required
      controls from the risk treatment plan. Track control implementation
      status through code annotations and automated compliance scanning.
    tools:
      - gitlab-ci
      - checkov
      - tfsec
      - snyk

  secops:
    prose: |
      Monitor the effectiveness of implemented risk treatment controls
      through continuous compliance monitoring. Track residual risk levels
      and alert when they exceed accepted thresholds. Generate periodic
      risk treatment reports that document control effectiveness and
      residual risk status for management and auditor review.
    tools:
      - splunk
      - prisma-cloud
      - wiz
      - elastic-siem

legal_references:
