id: gov-2
family: gov
title: "Roles, Responsibilities, and Organizational Structure"
class: ISMAP
baselines:
  - ismap
  - ismap-lcs

statement:
  prose: |
    The cloud service provider shall define and assign information security roles
    and responsibilities across the organization. A dedicated information security
    management structure shall be established, including a Chief Information
    Security Officer (CISO) or equivalent role with sufficient authority.
    Segregation of duties shall be implemented to reduce opportunities for
    unauthorized or unintentional modification or misuse of organizational assets.
    The organizational structure shall ensure that information security is
    integrated into every phase of cloud service delivery.

guidance:
  prose: |
    ISMAP places strong emphasis on clear organizational accountability for
    information security. This aligns with ISO/IEC 27001 Clause 5.3 and the
    Japanese government's expectation that cloud service providers have a formal
    security governance hierarchy. The CISO must have direct reporting lines to
    executive management. Segregation of duties is particularly critical in cloud
    environments where a single administrator could potentially access multiple
    government tenants. Auditors will verify that the organizational chart,
    role definitions, and segregation controls are documented and operational.

references:
  - citation: "ISMAP Management Criteria, Gov-02"
    url: "https://www.ismap.go.jp/"

implementation_guidance:
  platform_engineering:
    prose: |
      Implement role-based access control (RBAC) at the platform level that
      enforces segregation of duties. Define infrastructure roles that map
      to organizational responsibilities. Use identity providers to manage
      role assignments centrally. Automate provisioning and deprovisioning
      of access based on organizational role changes.
    tools:
      - keycloak
      - backstage
      - terraform
      - vault

  devsecops:
    prose: |
      Enforce code ownership through CODEOWNERS files that align with
      organizational responsibilities. Require merge request approvals from
      designated security personnel. Implement pipeline controls that prevent
      a single individual from both authoring and approving changes to
      security-critical components.
    tools:
      - gitlab-ci
      - codeowners
      - opa-gatekeeper
      - git

  secops:
    prose: |
      Monitor for segregation of duties violations through continuous
      access reviews. Alert when individuals accumulate conflicting
      privileges. Generate periodic reports on role assignments and
      access patterns for management review.
    tools:
      - sailpoint
      - splunk
      - elastic-siem
      - prisma-cloud

