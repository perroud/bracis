id: gov-1
family: gov
title: "Information Security Policy"
class: ISMAP
baselines:
  - ismap
  - ismap-lcs

statement:
  prose: |
    The cloud service provider shall establish, approve, publish, and communicate
    an information security policy that is aligned with business objectives and
    applicable laws and regulations. The policy shall define the organization's
    approach to managing information security, assign responsibilities, and be
    reviewed at planned intervals or when significant changes occur. Management
    shall demonstrate leadership and commitment to the information security
    management system by ensuring resources are available and by communicating
    the importance of conforming to the policy.

guidance:
  prose: |
    ISMAP requires cloud service providers to maintain a top-level information
    security policy that is endorsed by executive management. This control is
    derived from ISO/IEC 27001 Clause 5.2 and JIS Q 27001. The policy must be
    specific to the cloud services offered and address the unique risks
    associated with multi-tenancy, shared infrastructure, and government data
    handling. Japanese government agencies will review this policy as part of
    the ISMAP registration assessment. The policy should explicitly reference
    ISMAP management criteria and be available in both Japanese and English
    where government agencies require it.

references:
  - citation: "ISMAP Management Criteria, Gov-01"
    url: "https://www.ismap.go.jp/"

implementation_guidance:
  platform_engineering:
    prose: |
      Codify the information security policy as a version-controlled document
      within the organization's infrastructure-as-code repository. Use policy-as-code
      frameworks to enforce policy requirements at the platform level. Implement
      automated checks that verify provisioned infrastructure conforms to the
      security policy. Maintain a centralized policy portal accessible to all
      engineers and auditors.
    tools:
      - open-policy-agent
      - backstage
      - confluence
      - gitops

  devsecops:
    prose: |
      Integrate policy compliance checks into CI/CD pipelines. Enforce that all
      deployments pass security policy gates before reaching production. Implement
      automated scanning that validates code and configuration against policy
      requirements. Maintain audit trails of policy enforcement in pipeline logs.
    tools:
      - gitlab-ci
      - checkov
      - kyverno
      - semgrep

  secops:
    prose: |
      Monitor compliance with the information security policy across all cloud
      services. Generate regular compliance reports for management review.
      Maintain dashboards that track policy adherence metrics. Alert on policy
      violations detected through continuous monitoring.
    tools:
      - splunk
      - elastic-siem
      - prisma-cloud
      - wiz

legal_references:
  - framework_id: iso-27001-2022
    articles: ["clause-5.2", "clause-5.1"]
    relationship: derived-from
  - framework_id: nist-800-53
    articles: ["PL-1", "PM-1"]
    relationship: mapped
  - framework_id: fedramp
    articles: ["PL-1"]
    relationship: mapped
