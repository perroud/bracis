id: dev-2
family: dev
title: "Security Testing and Code Review"
class: ISMAP
baselines:
  - ismap

statement:
  prose: |
    The cloud service provider shall define and implement security testing
    procedures during development and after changes. Test data shall be
    carefully selected, protected, and controlled. Security testing shall
    include static application security testing (SAST), dynamic application
    security testing (DAST), and penetration testing at planned intervals.
    Changes to software packages shall be controlled and limited to necessary
    modifications. Secure coding standards shall be enforced through
    automated tools and peer code review processes.

guidance:
  prose: |
    ISMAP requires comprehensive security testing that demonstrates the
    cloud service is resistant to common attack vectors. Penetration testing
    must be conducted by qualified assessors at least annually and after
    significant changes. Test results must be retained as audit evidence
    and remediation of identified vulnerabilities must be tracked to
    completion. Code review processes must ensure that at least one
    reviewer other than the author examines changes for security
    implications. Test data must not include actual government data
    unless explicitly authorized and properly controlled.

references:
  - citation: "ISMAP Management Criteria, DEV-02"
    url: "https://www.ismap.go.jp/"

implementation_guidance:
  platform_engineering:
    prose: |
      Provision dedicated testing environments with production-equivalent
      security controls. Implement test data management that generates
      synthetic data mimicking production characteristics without
      containing sensitive information. Provide penetration testing
      infrastructure that allows regular security assessments.
    tools:
      - terraform
      - backstage
      - kubernetes
      - vault

  devsecops:
    prose: |
      Integrate SAST and DAST tools into every CI/CD pipeline. Enforce
      that merge requests require at least one security-aware reviewer.
      Implement automated dependency vulnerability scanning with
      blocking thresholds. Run container scanning before deployment.
      Track security finding remediation SLAs in the pipeline.
    tools:
      - gitlab-ci
      - semgrep
      - zap
      - trivy

  secops:
    prose: |
      Coordinate and manage periodic penetration testing engagements.
      Track remediation of penetration testing findings. Monitor
      security testing coverage metrics across all cloud service
      components. Generate testing compliance reports for ISMAP
      audit evidence.
    tools:
      - defectdojo
      - burp-suite
      - splunk
      - jira

