id: dev-1
family: dev
title: "Secure Development Policy and Lifecycle"
class: ISMAP
baselines:
  - ismap
  - ismap-lcs

statement:
  prose: |
    The cloud service provider shall establish and apply rules for the
    secure development of software and systems. A secure system development
    lifecycle (SDLC) shall be defined that includes security requirements
    analysis, secure design principles, secure coding practices, security
    testing, and secure deployment procedures. Development, testing, and
    production environments shall be separated to reduce the risks of
    unauthorized access or changes to the production environment.
    Security requirements shall be included in the requirements for new
    information systems or enhancements to existing systems.

guidance:
  prose: |
    ISMAP requires a structured secure development lifecycle for all cloud
    service components. This extends ISO/IEC 27001 Annex A 8.25-8.31 with
    specific requirements for cloud service development. Cloud service
    providers must demonstrate that security is integrated into every phase
    of development, not applied retroactively. Environment separation must
    ensure that test data does not contain actual government data unless
    specifically authorized and controlled. Development environments must
    not have network connectivity to production systems processing
    government data.

references:
  - citation: "ISMAP Management Criteria, DEV-01"
    url: "https://www.ismap.go.jp/"

implementation_guidance:
  platform_engineering:
    prose: |
      Implement separate infrastructure environments for development,
      staging, and production using infrastructure-as-code. Enforce
      environment isolation through network policies and separate
      cloud accounts. Provide developer platforms with pre-hardened
      templates that embed security controls by default. Automate
      environment provisioning to ensure consistency.
    tools:
      - backstage
      - terraform
      - crossplane
      - argocd

  devsecops:
    prose: |
      Enforce the secure SDLC through CI/CD pipeline gates. Integrate
      SAST, DAST, dependency scanning, and container scanning into all
      pipelines. Require security review for changes to security-critical
      components. Implement automated code quality and security scoring
      that blocks deployment when thresholds are not met.
    tools:
      - gitlab-ci
      - semgrep
      - trivy
      - sonarqube

  secops:
    prose: |
      Monitor development and staging environments for security
      misconfigurations. Verify that production and non-production
      environments maintain proper isolation. Track security defect
      resolution rates and trends. Generate secure development
      compliance reports for ISMAP assessors.
    tools:
      - prisma-cloud
      - wiz
      - splunk
      - defectdojo

