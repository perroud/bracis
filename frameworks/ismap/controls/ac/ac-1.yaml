id: ac-1
family: ac
title: "Access Control Policy and User Access Management"
class: ISMAP
baselines:
  - ismap
  - ismap-lcs

statement:
  prose: |
    The cloud service provider shall establish, document, and review an access
    control policy based on business and information security requirements. A
    formal user registration and deregistration process shall be implemented
    to enable assignment of access rights. User access provisioning shall
    follow a formal process to assign or revoke access rights for all user
    types to all systems and services. Privileged access rights shall be
    restricted and controlled. Access rights shall be reviewed at regular
    intervals and adjusted or removed upon change of employment or contract.

guidance:
  prose: |
    ISMAP access control requirements are derived from ISO/IEC 27001 Annex A 5.15
    through 5.18 and supplemented with government-specific requirements. Cloud
    service providers must implement strong logical access controls that enforce
    tenant isolation in multi-tenant environments. Japanese government agencies
    expect that no cloud service provider personnel can access government data
    without explicit authorization and audit logging. Access reviews must be
    conducted at least annually, with privileged access reviewed more frequently.
    The access control policy must address both cloud service provider internal
    access and customer-facing access management capabilities.

references:
  - citation: "ISMAP Management Criteria, AC-01"
    url: "https://www.ismap.go.jp/"

implementation_guidance:
  platform_engineering:
    prose: |
      Implement centralized identity and access management (IAM) with
      role-based access control. Use infrastructure-as-code to define and
      enforce access policies declaratively. Automate user provisioning and
      deprovisioning through identity provider integration. Implement
      just-in-time access for privileged operations with automatic
      expiration.
    tools:
      - keycloak
      - vault
      - terraform
      - teleport

  devsecops:
    prose: |
      Enforce access control policies in CI/CD pipelines. Require
      multi-factor authentication for all repository access. Implement
      branch protection rules that restrict who can merge to production
      branches. Use code ownership to control access to security-critical
      code paths.
    tools:
      - gitlab-ci
      - codeowners
      - vault
      - opa-gatekeeper

  secops:
    prose: |
      Monitor access patterns and detect anomalous access behavior.
      Conduct automated access reviews by comparing actual access against
      approved access rights. Alert on unauthorized privilege escalation
      attempts. Generate access certification reports for periodic review
      cycles.
    tools:
      - sailpoint
      - splunk
      - elastic-siem
      - crowdstrike

