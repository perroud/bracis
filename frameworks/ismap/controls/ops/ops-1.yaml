id: ops-1
family: ops
title: "Operational Procedures and Change Management"
class: ISMAP
baselines:
  - ismap
  - ismap-lcs

statement:
  prose: |
    The cloud service provider shall document operating procedures and make
    them available to all personnel who need them. Changes to the organization,
    business processes, information processing facilities, and systems that
    affect information security shall be controlled through a formal change
    management process. The change management process shall include risk
    assessment of proposed changes, authorization requirements, testing and
    validation procedures, rollback capabilities, and post-implementation
    review.

guidance:
  prose: |
    ISMAP requires formalized change management that goes beyond typical
    ISO/IEC 27001 requirements by mandating specific controls for cloud
    service changes that could affect government tenants. All changes must
    be risk-assessed for their potential impact on service availability,
    data confidentiality, and compliance posture. Emergency changes must
    follow an expedited process with retrospective review. Cloud service
    providers must demonstrate that change management covers infrastructure,
    platform, and application layers, including automated deployments. Change
    records must be retained for the duration required by ISMAP.

references:
  - citation: "ISMAP Management Criteria, OPS-01"
    url: "https://www.ismap.go.jp/"

implementation_guidance:
  platform_engineering:
    prose: |
      Implement infrastructure-as-code with mandatory code review for all
      changes. Enforce GitOps workflows where infrastructure state is
      declared in version control and applied through automated pipelines.
      Implement change approval gates that require designated approvers
      for production changes. Maintain immutable audit logs of all
      infrastructure changes.
    tools:
      - argocd
      - terraform
      - flux
      - backstage

  devsecops:
    prose: |
      Enforce merge request workflows with mandatory approvals for all
      production-bound changes. Implement automated testing gates including
      security scans, integration tests, and compliance checks. Require
      signed commits and verified pipelines. Maintain deployment logs
      that link code changes to production deployments.
    tools:
      - gitlab-ci
      - argocd
      - cosign
      - selenium

  secops:
    prose: |
      Monitor production environments for unauthorized changes through
      file integrity monitoring and configuration drift detection. Alert
      on changes that bypass the approved change management process.
      Correlate change records with security events to identify
      change-related incidents. Generate change management compliance
      reports for audit.
    tools:
      - splunk
      - osquery
      - wazuh
      - prisma-cloud

