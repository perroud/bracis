baselines:
  - id: pii-controller
    title: "PII Controller"
    description: "Controls applicable to organizations acting as PII controllers that determine the purposes and means of processing personally identifiable information."
    clauses: [clause-5, clause-6, clause-7, clause-8]
    annexes: [annex-a]
  - id: pii-processor
    title: "PII Processor"
    description: "Controls applicable to organizations acting as PII processors that process personally identifiable information on behalf of and according to the instructions of a PII controller."
    clauses: [clause-5, clause-6, clause-7, clause-8]
    annexes: [annex-b]
  - id: combined
    title: "Combined Controller and Processor"
    description: "Full set of controls for organizations acting as both PII controller and PII processor."
    clauses: [clause-5, clause-6, clause-7, clause-8]
    annexes: [annex-a, annex-b]

control_families:
  - id: clause-5
    title: "PIMS-specific requirements related to ISO/IEC 27001"
    description: >-
      Extensions to ISO 27001 clauses 4-10 for privacy information management,
      including context determination, leadership, planning, support, operation,
      performance evaluation, and improvement.
    control_count: 2
  - id: clause-6
    title: "PIMS-specific guidance related to ISO/IEC 27002"
    description: "Privacy-specific guidance extending ISO 27002 controls for competence, awareness, and communication."
    control_count: 1
  - id: clause-7
    title: "Additional ISO/IEC 27002 guidance for PII controllers"
    description: "Operational planning, PII risk assessment, and PII risk treatment requirements for the PIMS."
    control_count: 3
  - id: clause-8
    title: "Additional ISO/IEC 27002 guidance for PII processors"
    description: "Performance evaluation, monitoring, measurement, analysis, and evaluation of the PIMS."
    control_count: 1
  - id: annex-a
    title: "PIMS-specific reference control objectives and controls (PII Controllers)"
    description: "Reference controls for PII controllers extending ISO 27002, covering conditions for collection, obligations to PII principals, privacy by design, PII sharing and transfer."
    control_count: 7
  - id: annex-b
    title: "PIMS-specific reference control objectives and controls (PII Processors)"
    description: "Reference controls for PII processors extending ISO 27002, covering customer agreement, processing purposes, obligations to PII principals, and PII transfer."
    control_count: 4

statistics:
  total_clauses: 4
  total_annex_a_controls: 31
  total_annex_b_controls: 18
  controls_in_this_encyclopedia: 18

related_frameworks:
  - framework_id: iso-27001-2022
    relationship: derived-from
    description: "ISO 27701 is an extension to ISO 27001 and ISO 27002, adding privacy-specific requirements to the ISMS to establish a PIMS."
    mapping_file: "mappings/iso-27701_to_iso-27001-2022.yaml"
  - framework_id: gdpr
    relationship: mapped
    description: "ISO 27701 Annex D provides detailed mapping between PIMS controls and GDPR articles. Certification to ISO 27701 can serve as evidence of GDPR compliance."
    mapping_file: "mappings/iso-27701_to_gdpr.yaml"
  - framework_id: lgpd
    relationship: mapped
    description: "ISO 27701 controls map to LGPD requirements. ANPD recognizes ISO 27701 certification as a governance mechanism under Article 50 of the LGPD."
    mapping_file: "mappings/iso-27701_to_lgpd.yaml"
  - framework_id: ccpa-cpra
    relationship: mapped
    description: "ISO 27701 controls address many of the same operational privacy requirements as CCPA/CPRA, particularly around PII principal rights and data handling obligations."
    mapping_file: "mappings/iso-27701_to_ccpa-cpra.yaml"

