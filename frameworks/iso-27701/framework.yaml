id: iso-27701
title: "ISO/IEC 27701:2019 — Privacy Information Management System (PIMS)"
short_title: "ISO 27701"
version: "2019"
publication_date: "2019-08-06"
last_updated: "2019-08-06"

authority:
  name: "International Organization for Standardization / International Electrotechnical Commission"
  acronym: "ISO/IEC"
  country: "INTL"
  url: "https://www.iso.org/standard/71670.html"

type: standard
scope: privacy
mandatory: false

