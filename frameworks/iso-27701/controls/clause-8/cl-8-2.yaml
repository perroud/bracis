id: cl-8.2
family: clause-8
title: "PIMS performance evaluation, monitoring, and measurement"
class: ISO27701
baselines: [pii-controller, pii-processor, combined]

statement:
  prose: >-
    The organization shall determine what needs to be monitored and measured regarding
    PII processing performance and the effectiveness of the PIMS, including the methods
    for monitoring, measurement, analysis, and evaluation to ensure valid results. The
    organization shall determine when the monitoring and measuring shall be performed,
    and when the results shall be analysed and evaluated. The organization shall conduct
    internal audits at planned intervals to provide information on whether the PIMS
    conforms to the organization's own requirements and the requirements of ISO 27701,
    and whether the PIMS is effectively implemented and maintained. Top management shall
    review the PIMS at planned intervals to ensure its continuing suitability, adequacy,
    and effectiveness, including consideration of PII processing performance metrics
    and privacy incident trends.

guidance:
  prose: >-
    This clause extends ISO 27001 Clauses 9 and 10 (Performance evaluation and
    Improvement) with privacy-specific monitoring requirements. Privacy performance
    metrics should include: number and severity of privacy incidents, PII principal
    rights request fulfillment rates and response times, DPIA completion rates,
    training completion rates, third-party processor compliance status, data retention
    policy adherence, consent management effectiveness, and cross-border transfer
    compliance. Internal audits should verify both procedural compliance (policies
    and procedures are followed) and technical compliance (controls are operational
    and effective). Management review should evaluate whether the PIMS achieves its
    objectives and whether the privacy risk landscape has changed, requiring updates
    to the risk assessment or treatment plan. Nonconformities identified through
    monitoring, audit, or management review must be addressed through corrective
    actions with root cause analysis.

references:
  - citation: "ISO/IEC 27701:2019, Clause 8.2"
    url: "https://www.iso.org/standard/71670.html"
  - citation: "ISO/IEC 27001:2022, Clauses 9-10"
    url: "https://www.iso.org/standard/27001"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build comprehensive PIMS monitoring as a platform observability capability.
      Implement privacy-specific metrics collection: PII access patterns, consent
      rates, rights request processing times, data deletion completion rates,
      retention policy compliance percentages, encryption coverage metrics.
      Provide centralized privacy compliance dashboards accessible to privacy
      officers, auditors, and management. Build automated audit evidence
      collection that continuously captures control operation data, system
      configurations, and policy enforcement logs. Implement self-service
      audit reporting that generates compliance evidence packages on demand.
      Build management review data aggregation that pulls metrics from all
      platform components into executive summary dashboards.
    tools:
      - prometheus
      - grafana
      - elastic-observability
      - compliance-dashboard-platform
      - audit-evidence-collector
      - automated-reporting

  devsecops:
    prose: >-
      Integrate PIMS performance metrics into CI/CD observability. Track
      privacy-related pipeline metrics: policy violation rates, risk assessment
      completion rates for PII-affecting changes, time-to-remediate privacy
      findings, privacy test coverage percentages. Build automated compliance
      reporting that aggregates pipeline data into audit-ready reports.
      Implement continuous compliance testing that validates PIMS controls
      as part of regular deployment cycles. Build audit trail generation
      from pipeline execution data, deployment records, and approval
      workflows. Track and trend privacy debt alongside technical debt
      in development dashboards.
    tools:
      - gitlab-ci
      - github-actions
      - compliance-as-code
      - inspec
      - audit-trail-generation
      - privacy-metrics-dashboards

  secops:
    prose: >-
      Implement comprehensive PIMS monitoring through SIEM and compliance
      platforms. Build privacy incident tracking and trending dashboards.
      Monitor PII principal rights request SLAs and alert on approaching
      deadlines. Track data breach metrics: detection time, containment
      time, notification time, resolution time. Implement automated audit
      evidence collection from security tooling: vulnerability scan results,
      penetration test findings, access review completions, configuration
      compliance scans. Build management review report automation that
      aggregates all privacy performance metrics into scheduled executive
      summaries. Implement nonconformity tracking with root cause analysis
      and corrective action verification.
    tools:
      - splunk
      - elastic-siem
      - privacy-incident-management
      - compliance-reporting-platform
      - grc-platform
      - audit-management-system

