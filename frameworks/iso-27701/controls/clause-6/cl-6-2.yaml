id: cl-6.2
family: clause-6
title: "PIMS competence, awareness, and training"
class: ISO27701
baselines: [pii-controller, pii-processor, combined]

statement:
  prose: >-
    The organization shall determine the necessary competence of persons doing work
    under its control that affects its PII processing performance, and ensure those
    persons are competent on the basis of appropriate education, training, or experience.
    The organization shall ensure that persons doing work under the organization's control
    are aware of the privacy policy, their contribution to the effectiveness of the PIMS
    including the benefits of improved privacy performance, the implications of not
    conforming with the PIMS requirements, and their roles and responsibilities regarding
    the processing and protection of PII. The organization shall determine the need for
    internal and external communications relevant to the PIMS, including what, when,
    with whom, and how to communicate on privacy matters.

guidance:
  prose: >-
    This clause extends ISO 27001 Clauses 7.2, 7.3, and 7.4 with privacy-specific
    competence and awareness requirements. Privacy competence goes beyond general
    security awareness. Personnel processing PII must understand privacy principles,
    lawful processing bases, PII principal rights, breach notification obligations,
    and the specific privacy requirements of applicable jurisdictions. Training must
    be role-specific: developers need to understand privacy by design and data
    minimization in code; operations staff need to understand data handling procedures
    and breach response; management needs to understand accountability obligations
    and risk governance. The organization must maintain training records as evidence
    for auditors and regulators. Communication protocols should cover both routine
    privacy communications (policy updates, awareness campaigns) and incident
    communications (breach notifications to authorities and PII principals).

references:
  - citation: "ISO/IEC 27701:2019, Clause 6.2"
    url: "https://www.iso.org/standard/71670.html"
  - citation: "ISO/IEC 27001:2022, Clauses 7.2-7.4"
    url: "https://www.iso.org/standard/27001"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build a privacy training management platform integrated with the identity
      provider and role-based access control system. Implement automated training
      assignment based on service registration metadata: developers of services
      processing PII are automatically enrolled in privacy engineering training.
      Block access to PII-processing environments for personnel who have not
      completed mandatory privacy training. Provide self-service privacy
      knowledge bases and reference architectures via the internal developer
      portal. Build automated onboarding workflows that include privacy policy
      acknowledgment as a prerequisite for access provisioning. Implement
      communication channels (Slack channels, wiki pages, notification systems)
      for privacy updates and policy changes. Track training completion metrics
      in the compliance dashboard.
    tools:
      - identity-provider
      - backstage-docs
      - learning-management-system
      - automated-onboarding-workflows
      - compliance-dashboards

  devsecops:
    prose: >-
      Integrate privacy awareness into the developer experience. Embed contextual
      privacy guidance in code review tools (e.g., automated comments explaining
      why a pattern violates data minimization when detected by static analysis).
      Build pre-commit hooks and CI checks that provide educational feedback
      alongside policy violations, linking to internal privacy engineering
      documentation. Require privacy training completion as a condition for
      merge request approval on repositories containing PII-processing code.
      Implement periodic privacy quizzes or challenges integrated into the
      development workflow. Track and report on privacy training metrics
      as part of the CI/CD dashboard.
    tools:
      - gitlab-ci
      - semgrep
      - pre-commit-hooks
      - training-verification-gates
      - developer-portal

  secops:
    prose: >-
      Monitor and enforce privacy training compliance across the organization.
      Implement automated alerts when personnel with access to PII systems have
      overdue training requirements. Build SIEM correlation rules that detect
      PII access by untrained personnel and escalate to management. Generate
      periodic compliance reports showing training completion rates by department,
      role, and risk level. Implement phishing simulation and privacy awareness
      testing programs with metrics tracking. Monitor internal communication
      channels for privacy policy violations that indicate awareness gaps.
      Maintain audit-ready training evidence repositories.
    tools:
      - siem-training-compliance-rules
      - identity-governance
      - phishing-simulation-platforms
      - compliance-reporting
      - audit-evidence-management

