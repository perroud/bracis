id: a-7.3.1
family: annex-a
title: "Obligations to PII principals — Determining and fulfilling transparency requirements"
class: ISO27701
baselines: [pii-controller, combined]

statement:
  prose: >-
    The organization shall determine and document its obligations to PII principals
    regarding the processing of their PII, and shall provide clear, accessible, and
    transparent information to PII principals about the processing of their PII. The
    information provided shall include: the identity and contact details of the PII
    controller, the purposes of processing, the categories of PII processed, the
    recipients or categories of recipients, the retention periods, the existence of
    PII principal rights and how to exercise them, the lawful basis for processing,
    whether PII will be transferred internationally and the safeguards in place,
    and the existence of automated decision-making including profiling. This information
    shall be provided at the time of collection or, where PII is not obtained directly
    from the PII principal, within a reasonable period.

guidance:
  prose: >-
    Transparency is a core privacy principle across all major privacy regulations.
    The obligation extends beyond publishing a privacy notice — it requires making
    privacy information genuinely accessible and understandable to PII principals.
    This means using clear, plain language; providing layered notices that allow
    both quick overview and detailed drill-down; delivering information through
    appropriate channels (web, mobile, in-person); and timing disclosures
    appropriately (at collection point, before processing begins). The organization
    must maintain accurate privacy notices that reflect actual processing practices
    — a common failure is having privacy notices that describe processing activities
    that no longer occur or omit new processing activities. Notice management must
    be integrated with the PII processing registry so that changes to processing
    activities automatically trigger privacy notice reviews. The organization should
    also consider accessibility requirements: multiple languages, screen reader
    compatibility, appropriate reading level.

references:
  - citation: "ISO/IEC 27701:2019, A.7.3.1"
    url: "https://www.iso.org/standard/71670.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build a privacy notice management system as a platform service. Implement
      a centralized privacy notice registry that generates notices dynamically
      based on the PII processing registry — when processing activities change,
      notices are automatically flagged for update. Provide APIs for rendering
      layered privacy notices in applications: summary layer (icons and short
      descriptions), detail layer (full legal text), and machine-readable layer
      (structured data for automated compliance checking). Implement consent
      collection UIs as reusable platform components that display purpose-specific
      information at the point of PII collection. Build notice versioning with
      PII principal notification workflows when material changes occur. Implement
      multi-language notice support with automated translation workflow
      integration. Track notice delivery and acknowledgment across all channels.
    tools:
      - privacy-notice-management-system
      - consent-management-platform
      - pii-processing-registry
      - multi-language-content-management
      - notice-delivery-tracking
      - backstage-catalog

  devsecops:
    prose: >-
      Integrate privacy notice compliance into the development workflow. Implement
      CI checks that verify all PII collection points have associated privacy
      notice displays. Build linting rules that detect new PII collection forms
      or API endpoints and verify they include privacy notice references. Code
      review automation should flag changes to PII processing logic that may
      require privacy notice updates. Build automated testing that validates
      privacy notice rendering across platforms (web, mobile, email). Implement
      notice content validation that checks for required information elements
      (controller identity, purposes, rights, contact information). Track
      notice-to-processing alignment as a compliance metric.
    tools:
      - gitlab-ci
      - github-actions
      - semgrep
      - accessibility-testing
      - notice-content-validators
      - ui-testing-frameworks

  secops:
    prose: >-
      Monitor privacy notice compliance and effectiveness. Track notice delivery
      metrics: view rates, acknowledgment rates, language preferences. Alert
      when processing activities in the registry lack corresponding privacy
      notice coverage. Monitor for privacy notice accuracy by comparing
      declared processing in notices against actual processing observed
      through data flow monitoring. Track PII principal complaints related
      to transparency as an effectiveness metric. Generate periodic transparency
      compliance reports showing notice coverage, freshness, and alignment
      with actual processing.
    tools:
      - splunk
      - elastic-siem
      - privacy-notice-analytics
      - complaint-tracking-system
      - compliance-reporting
      - data-flow-monitoring

