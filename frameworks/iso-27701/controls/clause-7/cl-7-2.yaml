id: cl-7.2
family: clause-7
title: "PII risk assessment"
class: ISO27701
baselines: [pii-controller, pii-processor, combined]

statement:
  prose: >-
    The organization shall perform PII risk assessments at planned intervals or when
    significant changes are proposed or occur, taking into account the criteria for
    risk assessment established in the PIMS planning phase. The PII risk assessment
    shall identify risks related to the loss of confidentiality, integrity, and
    availability of PII, as well as risks to the rights and freedoms of PII principals
    arising from PII processing. The risk assessment shall consider the likelihood and
    potential consequences of identified risks, taking into account the nature, scope,
    context, and purposes of PII processing. The organization shall retain documented
    information of the results of PII risk assessments.

guidance:
  prose: >-
    PII risk assessment differs from general information security risk assessment
    in its dual perspective: it must evaluate risks both to the organization and to
    PII principals. A privacy breach may have minimal financial impact on the
    organization but devastating consequences for individuals (identity theft,
    discrimination, reputational harm). The assessment must use a methodology that
    captures PII-specific risk factors: sensitivity of data categories (health,
    financial, biometric, children's data), volume of records, vulnerability of
    PII principal populations, processing context (employee monitoring, profiling,
    automated decision-making), and cross-border transfer risks. Results should
    feed directly into the risk treatment process (Clause 7.3) and inform the
    selection of controls from Annex A and Annex B. Risk assessments must be
    repeated when processing activities change, new regulations apply, or
    significant security incidents occur.

references:
  - citation: "ISO/IEC 27701:2019, Clause 7.2"
    url: "https://www.iso.org/standard/71670.html"
  - citation: "ISO/IEC 27001:2022, Clause 8.2"
    url: "https://www.iso.org/standard/27001"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build an automated PII risk assessment platform integrated with the PII
      processing registry. Implement risk scoring algorithms that automatically
      calculate risk levels based on PII processing metadata: data categories,
      volume, processing types, third-party involvement, and cross-border
      transfers. Provide self-service risk assessment workflows that guide
      development teams through structured risk identification based on their
      service's PII processing profile. Implement continuous risk re-evaluation
      triggers that automatically initiate reassessment when infrastructure
      changes affect PII processing patterns (new data stores, new network
      routes, new third-party integrations). Store risk assessment results as
      structured data in the risk registry, enabling automated reporting and
      trend analysis.
    tools:
      - risk-assessment-platform
      - pii-processing-registry
      - automated-risk-scoring
      - terraform-change-detection
      - risk-registry-api

  devsecops:
    prose: >-
      Integrate PII risk assessment triggers into the development workflow.
      Implement automated detection of changes that require risk reassessment:
      new PII data fields, changes to data flows, new third-party integrations,
      changes to retention policies, new automated decision-making logic.
      Build pipeline gates that require completed risk assessments before
      deploying changes that modify PII processing patterns. Provide risk
      assessment templates as code (YAML/JSON) that developers complete as
      part of their feature branches, reviewed alongside code changes.
      Implement automated risk impact analysis that compares proposed changes
      against the current risk profile and highlights risk delta.
    tools:
      - gitlab-ci
      - github-actions
      - risk-assessment-as-code
      - pii-change-detection
      - impact-analysis-automation

  secops:
    prose: >-
      Implement continuous risk monitoring that complements periodic risk
      assessments. Build SIEM correlation rules that detect risk indicator
      changes: increasing PII access volumes, new PII data flows, anomalous
      processing patterns, failed access controls. Maintain real-time risk
      dashboards that visualize current risk levels across all PII processing
      activities. Alert when risk indicators exceed defined thresholds,
      triggering formal reassessment workflows. Generate periodic risk
      assessment reports showing risk trends, treatment effectiveness, and
      residual risk levels. Monitor external threat intelligence for emerging
      risks relevant to the organization's PII processing profile.
    tools:
      - splunk
      - elastic-siem
      - risk-dashboards
      - threat-intelligence-feeds
      - soar-risk-workflows
      - compliance-reporting

