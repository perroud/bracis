id: cl-7.3
family: clause-7
title: "PII risk treatment"
class: ISO27701
baselines: [pii-controller, pii-processor, combined]

statement:
  prose: >-
    The organization shall implement a PII risk treatment plan and select appropriate
    controls to address identified PII risks. The organization shall determine all
    controls that are necessary to implement the PII risk treatment option(s) chosen,
    comparing them with the controls in Annex A (for PII controllers) and Annex B
    (for PII processors) to verify that no necessary controls have been omitted.
    The organization shall produce a Statement of Applicability that contains the
    necessary controls, justification for their inclusion, whether they are
    implemented or not, and the justification for excluding any controls from
    Annex A or Annex B. The organization shall formulate a PII risk treatment plan
    and obtain risk owner approval for the plan and acceptance of residual PII risks.

guidance:
  prose: >-
    PII risk treatment extends the ISO 27001 risk treatment process by requiring
    explicit consideration of Annex A (controller) and Annex B (processor) controls.
    The Statement of Applicability is a critical document that must be maintained
    alongside the ISO 27001 SoA, extending it with privacy-specific controls.
    Treatment options include: avoiding the risk by ceasing the processing activity,
    mitigating the risk by implementing controls, sharing the risk through insurance
    or contractual arrangements with processors, or accepting the risk with documented
    justification. For privacy risks, risk acceptance must consider not only
    organizational risk appetite but also the rights and freedoms of PII principals.
    Regulators may challenge risk acceptance decisions that inadequately protect
    individuals. The risk treatment plan must include clear timelines, resource
    allocation, control implementation responsibilities, and success criteria.

references:
  - citation: "ISO/IEC 27701:2019, Clause 7.3"
    url: "https://www.iso.org/standard/71670.html"
  - citation: "ISO/IEC 27001:2022, Clause 8.3"
    url: "https://www.iso.org/standard/27001"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement the Statement of Applicability as a machine-readable artifact
      (YAML/JSON) stored in version control, enabling automated compliance
      verification. Build a control implementation registry that maps each
      Annex A/B control to its technical implementation: infrastructure
      configurations, policy-as-code rules, platform services, and monitoring
      rules. Implement automated compliance verification that continuously
      validates whether declared controls are actually operational. Provide
      pre-built control implementation modules for common risk treatments:
      encryption at rest/transit, access control policies, retention enforcement,
      consent management, data masking. Track risk treatment plan progress
      through the platform's project management integration, with automated
      status updates from infrastructure deployment pipelines.
    tools:
      - statement-of-applicability-as-code
      - control-registry
      - terraform-compliance
      - open-policy-agent
      - automated-compliance-verification
      - project-management-integration

  devsecops:
    prose: >-
      Integrate control implementation verification into CI/CD pipelines.
      Build automated checks that validate whether the controls declared in
      the Statement of Applicability are actually implemented in the codebase
      and infrastructure configurations. Implement pipeline gates that verify
      risk treatment prerequisites before deployment: required controls are
      operational, risk assessments are current, risk owner approvals are
      recorded. Build compliance-as-code tests that verify control effectiveness
      (e.g., encryption is enforced, access controls are configured, audit
      logging is active). Maintain the risk treatment plan as a tracked
      artifact with automated progress reporting based on pipeline execution
      data and deployment records.
    tools:
      - gitlab-ci
      - github-actions
      - inspec
      - chef-compliance
      - checkov
      - compliance-as-code-tests

  secops:
    prose: >-
      Monitor the effectiveness of implemented risk treatments continuously.
      Build SIEM correlation rules that detect control failures: encryption
      disabled, access controls bypassed, audit logging gaps, retention
      violations. Implement control effectiveness dashboards showing real-time
      status of all controls in the Statement of Applicability. Alert when
      residual risk levels exceed accepted thresholds due to control
      degradation. Generate periodic risk treatment effectiveness reports
      for management review. Implement automated compliance evidence
      collection that captures control operation metrics for audit purposes.
    tools:
      - splunk
      - elastic-siem
      - control-effectiveness-dashboards
      - compliance-evidence-collection
      - soar-remediation-playbooks
      - audit-reporting

