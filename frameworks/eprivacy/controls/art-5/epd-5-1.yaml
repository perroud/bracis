id: epd-5-1
family: art-5
title: "Confidentiality of Communications"
class: ePrivacy
statement:
  prose: >-
    1. Member States shall ensure the confidentiality of communications and the related traffic data
    by means of a public communications network and publicly available electronic communications services,
    through national legislation. In particular, they shall prohibit listening, tapping, storage or other
    kinds of interception or surveillance of communications and the related traffic data by persons other
    than users, without the consent of the users concerned, except when legally authorised to do so in
    accordance with Article 15(1). This paragraph shall not prevent technical storage which is necessary
    for the conveyance of a communication without prejudice to the principle of confidentiality.
  parts:
    - id: epd-5.1
      label: "(1)"
      prose: >-
        Member States shall ensure the confidentiality of communications and the related traffic data
        by means of a public communications network and publicly available electronic communications services,
        through national legislation. In particular, they shall prohibit listening, tapping, storage or other
        kinds of interception or surveillance of communications and the related traffic data by persons other
        than users, without the consent of the users concerned, except when legally authorised to do so in
        accordance with Article 15(1). This paragraph shall not prevent technical storage which is necessary
        for the conveyance of a communication without prejudice to the principle of confidentiality.
guidance:
  prose: >-
    Article 5(1) is the foundational confidentiality principle of the ePrivacy Directive. It establishes
    that electronic communications and their associated traffic data are confidential. No one other than
    the communicating parties themselves may intercept, tap, store, or surveil these communications without
    consent or lawful authority under Article 15(1). The only exception is technical storage strictly
    necessary for the conveyance of a communication (e.g., buffering, routing). This article has been
    interpreted broadly by the CJEU to cover not just traditional telephony but also email, messaging,
    VoIP, and any form of electronic communication. For service providers, this means that any access to
    communications content or metadata beyond what is strictly necessary for service delivery requires
    either user consent or a specific legal basis. Deep packet inspection, traffic analysis for advertising
    purposes, and content scanning all fall under this prohibition unless properly authorized.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement strict access controls ensuring no system component can access communications content
      or traffic data beyond what is necessary for service delivery. Deploy end-to-end encryption where
      technically feasible to enforce confidentiality at the protocol level. Implement zero-knowledge
      architectures where the service provider cannot access plaintext communications content. Enforce
      network-level isolation for communications processing components. Implement strict data flow controls
      that prevent communications data from being routed to analytics, advertising, or any non-delivery
      system without explicit consent. Build technical barriers (not just policy) that prevent unauthorized
      access to communications data. Implement immutable audit logging for all access to communications
      content and traffic data.
    tools:
      - "End-to-end encryption protocols (Signal Protocol, MLS)"
      - "Kubernetes NetworkPolicies for strict communications data flow isolation"
      - "Service mesh with mTLS and strict authorization policies"
      - "Data flow control engines preventing unauthorized routing of communications data"
      - "Immutable audit logs for communications data access (append-only storage)"
  devsecops:
    prose: >-
      SAST rules must detect code patterns that access communications content or traffic data outside
      authorized processing paths. CI/CD pipeline gates must verify that new services do not introduce
      unauthorized access to communications data stores. Code review automation must flag any new data
      flows that touch communications content or metadata. Enforce architecture decision records (ADRs)
      for any component that accesses communications data. Deploy canary tokens in communications data
      stores to detect unauthorized access during development and testing.
    tools:
      - "Semgrep rules for communications data access pattern detection"
      - "Architecture fitness functions verifying data flow boundaries"
      - "Pipeline gates enforcing communications data isolation"
      - "Canary tokens and honeypot data for unauthorized access detection"
  secops:
    prose: >-
      Monitor all access to communications content and traffic data stores with real-time alerting on
      unauthorized access. Deploy data loss prevention (DLP) to detect communications data exfiltration.
      SIEM correlation rules must detect interception-like patterns (bulk access, unusual query patterns,
      cross-boundary data flows). Implement user and entity behavior analytics (UEBA) on systems handling
      communications data. Conduct regular access reviews for all systems that can access communications
      content. Monitor for insider threats targeting communications confidentiality.
    tools:
      - "SIEM with communications confidentiality violation detection rules"
      - "DLP for electronic communications data channels"
      - "UEBA for anomalous access to communications systems"
      - "Network Detection and Response (NDR) for interception attempt detection"
      - "Regular access certification campaigns for communications systems"
legal_references:
