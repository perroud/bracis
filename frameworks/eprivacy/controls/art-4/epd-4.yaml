id: epd-4
family: art-4
title: "Security of Processing"
class: ePrivacy
statement:
  prose: >-
    1. The provider of a publicly available electronic communications service must take appropriate technical
    and organisational measures to safeguard the security of its services, if necessary in conjunction with
    the provider of the public communications network with respect to network security. Having regard to the
    state of the art and the cost of their implementation, these measures shall ensure a level of security
    appropriate to the risk presented.

    2. In case of a particular risk of a breach of the security of the network, the provider of a publicly
    available electronic communications service must inform the subscribers concerning such risk and, where
    the risk lies outside the scope of the measures to be taken by the service provider, of any possible
    remedies, including an indication of the likely costs involved.
  parts:
    - id: epd-4.1
      label: "(1)"
      prose: >-
        The provider of a publicly available electronic communications service must take appropriate technical
        and organisational measures to safeguard the security of its services, if necessary in conjunction with
        the provider of the public communications network with respect to network security. Having regard to the
        state of the art and the cost of their implementation, these measures shall ensure a level of security
        appropriate to the risk presented.
    - id: epd-4.2
      label: "(2)"
      prose: >-
        In case of a particular risk of a breach of the security of the network, the provider of a publicly
        available electronic communications service must inform the subscribers concerning such risk and, where
        the risk lies outside the scope of the measures to be taken by the service provider, of any possible
        remedies, including an indication of the likely costs involved.
guidance:
  prose: >-
    Article 4 establishes a risk-based security obligation for electronic communications service providers.
    The standard is "appropriate to the risk presented," meaning the security measures must be proportionate
    to the threats faced. This is similar to GDPR Article 32 but specifically scoped to electronic
    communications infrastructure. Providers must also proactively warn subscribers when they face risks
    that the provider itself cannot mitigate (e.g., endpoint vulnerabilities on the subscriber side).
    The obligation extends to coordination with network providers when security depends on network-level
    measures.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement defence-in-depth security architecture for all electronic communications services.
      Deploy TLS 1.3 for all communications in transit. Implement mutual TLS (mTLS) between internal
      services handling communications data. Use hardware security modules (HSMs) for cryptographic key
      management. Deploy network segmentation to isolate communications processing systems from general
      infrastructure. Implement real-time security monitoring with anomaly detection on communications
      infrastructure. Build automated incident response pipelines that can isolate compromised components
      within seconds. Deploy intrusion detection systems (IDS) and intrusion prevention systems (IPS)
      on all network boundaries handling electronic communications.
    tools:
      - "Kubernetes NetworkPolicies for communications infrastructure segmentation"
      - "Istio/Linkerd service mesh for mTLS between communications services"
      - "HashiCorp Vault for HSM-backed key management"
      - "Falco for runtime security monitoring of communications workloads"
      - "Cilium for eBPF-based network security and observability"
  devsecops:
    prose: >-
      Enforce security scanning in CI/CD pipelines for all communications service code. SAST must detect
      cryptographic weaknesses, insecure protocol usage, and communications data leakage. DAST must test
      for interception vulnerabilities in deployed communications services. Dependency scanning must flag
      libraries with known vulnerabilities affecting communications confidentiality. Container scanning
      must verify base images meet security hardening standards for communications workloads. Infrastructure-as-code
      scanning must validate network security configurations, encryption settings, and access controls.
    tools:
      - "SAST scanners with communications protocol rules (SonarQube, Semgrep)"
      - "DAST for testing communications endpoints (OWASP ZAP, Nuclei)"
      - "Dependency scanning (Trivy, Grype) for cryptographic library vulnerabilities"
      - "IaC scanning (Checkov, tfsec) for network and encryption configuration"
      - "Container scanning for hardened communications workload images"
  secops:
    prose: >-
      Deploy continuous monitoring for security events on all electronic communications infrastructure.
      SIEM correlation rules must detect potential interception attempts, unauthorized access to communications
      data, and anomalous traffic patterns. Implement automated alerting for security threshold breaches.
      Maintain 24/7 security operations capability for communications infrastructure. Conduct regular
      penetration testing and red team exercises against communications services. Monitor for subscriber
      notification triggers when external risks are identified.
    tools:
      - "SIEM (Splunk/Elastic Security) with communications security correlation rules"
      - "Network Detection and Response (NDR) for communications infrastructure"
      - "Vulnerability management platform with communications asset inventory"
      - "Penetration testing frameworks (Metasploit, Burp Suite) for communications services"
