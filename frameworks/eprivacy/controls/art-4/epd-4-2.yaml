id: epd-4-2
family: art-4
title: "Breach Notification to Competent Authority"
class: ePrivacy
statement:
  prose: >-
    3. In the case of a personal data breach, the provider of publicly available electronic communications
    services shall, without undue delay, notify the personal data breach to the competent national authority.

    4. The notification made to the competent national authority shall include at least a description of the
    nature of the personal data breach, the contact point where more information can be obtained, the
    consequences of the breach, and the measures proposed or taken by the provider to address the breach.
  parts:
    - id: epd-4.3
      label: "(3)"
      prose: >-
        In the case of a personal data breach, the provider of publicly available electronic communications
        services shall, without undue delay, notify the personal data breach to the competent national authority.
    - id: epd-4.4
      label: "(4)"
      prose: >-
        The notification made to the competent national authority shall include at least a description of the
        nature of the personal data breach, the contact point where more information can be obtained, the
        consequences of the breach, and the measures proposed or taken by the provider to address the breach.
guidance:
  prose: >-
    Article 4(3)-(4) establishes mandatory breach notification to the competent national authority for
    electronic communications service providers. This was one of the first breach notification obligations
    in EU law, predating the GDPR equivalent. The notification must happen "without undue delay," which
    national implementations have generally interpreted as 24 to 72 hours depending on the member state.
    The notification must contain specific elements: nature of the breach, contact point, consequences,
    and remedial measures. Under Commission Regulation (EU) No 611/2013, the notification must be made
    within 24 hours of detection where feasible. This is stricter than the GDPR 72-hour window.
    Providers must maintain an inventory of all personal data breaches, including facts, effects, and
    remedial actions, to enable the competent authority to verify compliance.
implementation_guidance:
  platform_engineering:
    prose: >-
      Build an automated breach detection and notification pipeline. Implement real-time breach detection
      using SIEM correlation rules that identify personal data compromise events. Build a breach notification
      workflow system that automatically triggers when a breach is confirmed, capturing all required
      notification elements (nature, contact point, consequences, remedial measures). Implement a breach
      registry service that logs all incidents with full audit trail. Integrate with national authority
      notification APIs or portals where available. Build breach classification logic that determines
      notification obligations based on breach type and affected data categories. Implement automated
      evidence collection that preserves forensic data at breach detection time.
    tools:
      - "Incident management platform (PagerDuty, Opsgenie) with breach classification workflows"
      - "SIEM with breach detection correlation rules"
      - "Automated evidence collection and forensic preservation pipelines"
      - "Breach notification workflow engine with authority portal integration"
      - "Immutable audit log storage (WORM) for breach registry"
  devsecops:
    prose: >-
      Ensure all applications handling electronic communications data have breach detection instrumentation
      built in. CI/CD pipelines must verify that logging and monitoring hooks are present for data access
      events. Code review must verify that breach detection signals are properly emitted when unauthorized
      data access is detected. Deploy automated breach simulation tests to verify notification pipelines
      work end-to-end. Maintain pre-approved notification templates in version control.
    tools:
      - "Breach simulation testing frameworks in CI/CD"
      - "Logging instrumentation verification in pipeline gates"
      - "Pre-approved notification templates in version-controlled repositories"
      - "Integration tests for breach notification workflow"
  secops:
    prose: >-
      Maintain 24/7 breach detection capability with defined escalation procedures. SIEM must correlate
      events across all electronic communications systems to detect breaches in real time. SOC playbooks
      must include ePrivacy-specific breach classification and notification timelines. Maintain a tested
      breach notification process with pre-drafted authority communications. Conduct regular breach
      response exercises that include the full notification workflow. Track breach notification SLAs
      against the 24-hour target and maintain metrics on detection-to-notification time.
    tools:
      - "SOAR playbooks for ePrivacy breach notification workflow"
      - "SIEM breach detection correlation rules for communications data"
      - "Breach notification SLA tracking dashboard"
      - "Regular tabletop exercises and breach simulation drills"
