id: epd-15
family: art-15
title: "Lawful Interception and Restrictions"
class: ePrivacy
statement:
  prose: >-
    1. Member States may adopt legislative measures to restrict the scope of the rights and obligations
    provided for in Article 5, Article 6, Article 8(1), (2), (3) and (4), and Article 9 of this Directive
    when such restriction constitutes a necessary, appropriate and proportionate measure within a democratic
    society to safeguard national security (i.e. State security), defence, public security, and the
    prevention, investigation, detection and prosecution of criminal offences or of unauthorised use of
    the electronic communication system, as referred to in Article 13(1) of Directive 95/46/EC. To this
    end, Member States may, inter alia, adopt legislative measures providing for the retention of data
    for a limited period justified on the grounds laid down in this paragraph. All the measures referred
    to in this paragraph shall be in accordance with the general principles of Community law, including
    those referred to in Article 6(1) and (2) of the Treaty on European Union.

    1a. Paragraph 1 shall not apply to data specifically required by Directive 2006/24/EC to be retained
    for the purposes referred to in Article 1(1) of that Directive.

    1b. Providers shall establish internal procedures for responding to requests for access to users'
    personal data based on national provisions adopted pursuant to paragraph 1. They shall provide the
    competent national authority, on demand, with information about those procedures, the number of
    requests received, the legal justification invoked and their response.
  parts:
    - id: epd-15.1
      label: "(1)"
      prose: >-
        Member States may restrict the rights under Articles 5, 6, 8, and 9 when necessary, appropriate,
        and proportionate for national security, defence, public security, and prevention/investigation/
        detection/prosecution of criminal offences. Data retention measures must be for a limited period
        and in accordance with general principles of EU law.
    - id: epd-15.1b
      label: "(1b)"
      prose: >-
        Providers shall establish internal procedures for responding to lawful access requests. They must
        provide the competent national authority with information about procedures, request volumes, legal
        justifications, and responses.
guidance:
  prose: >-
    Article 15 is the exception regime that allows member states to derogate from the ePrivacy protections
    for law enforcement and national security purposes. It is not a blanket exception: restrictions must be
    "necessary, appropriate and proportionate within a democratic society." The CJEU has interpreted this
    strictly in landmark cases: Digital Rights Ireland (C-293/12, invalidating the Data Retention Directive),
    Tele2/Watson (C-203/15, prohibiting general and indiscriminate data retention), La Quadrature du Net
    (C-511/18, allowing targeted retention only), and SpaceNet (C-793/19, confirming the prohibition of
    general retention). For service providers, Article 15(1b) creates operational obligations: they must
    have documented procedures for handling lawful interception requests, track request volumes and legal
    bases, and report to competent authorities on demand. This requires a legal interception compliance
    program, trained personnel, secure handling procedures, and transparency reporting capabilities.
implementation_guidance:
  platform_engineering:
    prose: >-
      Build a lawful interception compliance platform with strict access controls and audit trails.
      Implement a request intake system that validates legal authority (warrant, court order, statutory
      basis) before any data is disclosed. Build a request tracking system that logs all lawful access
      requests with legal justification, requesting authority, scope, response, and timestamps. Implement
      technical capabilities for targeted data production (not bulk access) to support the proportionality
      requirement. Build secure data handoff mechanisms for lawful interception data delivery to authorized
      agencies. Implement statistical reporting capabilities for transparency reports (request volumes
      by type, legal basis, and response). Build role-based access ensuring only specifically authorized
      personnel can process lawful interception requests. Implement data minimization in lawful interception
      responses (only data within the scope of the legal authority).
    tools:
      - "Lawful interception request management platform with audit trail"
      - "Legal authority validation workflow (warrant/order verification)"
      - "Targeted data production APIs (no bulk access capabilities)"
      - "Secure data delivery channel for law enforcement handoff"
      - "Statistical reporting engine for transparency reports"
      - "RBAC with MFA for lawful interception personnel"
  devsecops:
    prose: >-
      Lawful interception code must be reviewed by specialized personnel with security clearance where
      required. CI/CD pipelines for lawful interception systems must include enhanced security scanning.
      Code review must verify that data production is scoped to the legal authority (no over-production).
      Automated tests must verify that lawful interception capabilities cannot be activated without
      proper authorization workflow completion. Lawful interception systems must be isolated from
      general-purpose data access systems.
    tools:
      - "Enhanced security scanning for lawful interception codebase"
      - "Authorization workflow verification tests"
      - "Data scope limitation verification (production matches legal authority scope)"
      - "Isolation verification between lawful interception and general systems"
  secops:
    prose: >-
      Monitor lawful interception system access with highest-priority alerting. All access to lawful
      interception systems must be logged and reviewed. Alert on unauthorized access attempts to lawful
      interception capabilities. Monitor for scope creep in data production (requests producing more data
      than legally authorized). Conduct regular audits of lawful interception procedures and compliance.
      Maintain chain-of-custody documentation for all lawful interception data. Generate periodic
      transparency reports for management and regulatory review.
    tools:
      - "Privileged access monitoring for lawful interception systems"
      - "Scope compliance verification for data production orders"
      - "Chain-of-custody tracking for intercepted data"
      - "Transparency reporting dashboard"
      - "Regular compliance audit program for lawful interception procedures"
