id: epd-14
family: art-14
title: "Technical Features and Standardisation"
class: ePrivacy
statement:
  prose: >-
    1. In implementing the provisions of this Directive, Member States shall ensure, subject to paragraphs
    2 and 3, that no mandatory requirements for specific technical features are imposed on terminal or other
    electronic communication equipment which could impede the placing of equipment on the market and the
    free circulation of such equipment in and between Member States.

    2. Where provisions of this Directive can be implemented only by requiring specific technical features
    in electronic communications networks, Member States shall inform the Commission in accordance with the
    procedure provided for by Directive 98/34/EC.

    3. Where required, measures may be adopted to ensure that terminal equipment is constructed in a way
    that is compatible with the right of users to protect and control the use of their personal data, in
    accordance with Directive 1999/5/EC and Council Decision 87/95/EEC.
  parts:
    - id: epd-14.1
      label: "(1)"
      prose: >-
        No mandatory requirements for specific technical features shall be imposed on terminal or electronic
        communication equipment that could impede market placement and free circulation.
    - id: epd-14.2
      label: "(2)"
      prose: >-
        Where provisions can only be implemented by requiring specific technical features in networks,
        Member States shall inform the Commission.
    - id: epd-14.3
      label: "(3)"
      prose: >-
        Measures may be adopted to ensure terminal equipment is constructed to be compatible with users'
        rights to protect and control the use of their personal data.
guidance:
  prose: >-
    Article 14 balances privacy requirements with the free circulation of goods in the single market.
    It prevents member states from imposing specific technical requirements on equipment that would
    fragment the market, while allowing standards to be developed that enable privacy protection at
    the hardware and protocol level. Paragraph 3 is forward-looking and has become increasingly
    relevant: it envisions terminal equipment (browsers, phones, IoT devices) being built with
    privacy controls. This relates to the ongoing discussion about browser-level cookie controls,
    privacy-by-design in device operating systems, and standardization efforts like the W3C Do Not
    Track (DNT) and Global Privacy Control (GPC) specifications. For service providers, this means
    respecting privacy signals sent by user agents and implementing standardized privacy protocols.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement support for standardized privacy signals from user agents. Detect and respect the
      Global Privacy Control (GPC) header signal. Implement Sec-GPC header parsing and map it to
      consent management decisions. Support Do Not Track (DNT) as a supplementary signal. Build
      platform capabilities that adapt behavior based on device-level privacy settings (e.g.,
      iOS App Tracking Transparency status, Android privacy dashboard settings). Implement open
      standards for privacy preference exchange. Design APIs that interoperate with privacy-enhancing
      technologies (PETs) at the terminal equipment level.
    tools:
      - "Global Privacy Control (GPC) header detection and enforcement middleware"
      - "User agent privacy signal parsing library"
      - "Platform adaptation layer for device-level privacy settings"
      - "Open standards implementation for privacy preference exchange"
  devsecops:
    prose: >-
      CI/CD pipelines must verify that privacy signal handling (GPC, DNT) is correctly implemented
      in all user-facing services. Automated tests must verify that privacy signals are respected
      across the full request lifecycle. Code review must verify that new features do not bypass
      device-level privacy settings. Pipeline gates must verify interoperability with standardized
      privacy protocols.
    tools:
      - "Automated privacy signal (GPC/DNT) compliance testing"
      - "User agent simulation testing for privacy setting interoperability"
      - "Pipeline gates verifying privacy signal handling"
  secops:
    prose: >-
      Monitor for privacy signal bypass in production services. Track GPC and DNT signal compliance
      rates across all endpoints. Alert on services that ignore device-level privacy settings. Audit
      interoperability with standardized privacy protocols. Monitor browser and device privacy feature
      adoption to anticipate compliance requirements.
    tools:
      - "Privacy signal compliance monitoring dashboard"
      - "Endpoint audit for GPC/DNT signal handling"
      - "Privacy protocol interoperability testing"
legal_references:
