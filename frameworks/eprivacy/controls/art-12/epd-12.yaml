id: epd-12
family: art-12
title: "Directories of Subscribers"
class: ePrivacy
statement:
  prose: >-
    1. Member States shall ensure that subscribers are informed, free of charge and before they are
    included in the directory, about the purpose(s) of a printed or electronic directory of subscribers
    available to the public or obtainable through directory enquiry services, in which their personal
    data can be included and of any further usage possibilities based on search functions embedded in
    electronic versions of the directory.

    2. Member States shall ensure that subscribers are given the opportunity to determine whether their
    personal data are included in a public directory, and if so, which, to the extent that such data
    are relevant to the purpose of the directory as determined by the provider of the directory, and to
    verify, correct or withdraw such data. Not being included in a public subscriber directory, verifying,
    correcting or withdrawing personal data from it shall be free of charge.

    3. Member States may require that for any purpose of a public directory other than the search of
    contact details of persons on the basis of their name and, where necessary, a minimum of other
    identifiers, additional consent be obtained from the subscribers.
  parts:
    - id: epd-12.1
      label: "(1)"
      prose: >-
        Subscribers must be informed, free of charge and before inclusion, about the purpose of public
        directories and any further usage possibilities based on search functions in electronic directories.
    - id: epd-12.2
      label: "(2)"
      prose: >-
        Subscribers must be given the opportunity to determine whether their data are included in a public
        directory, which data, and to verify, correct or withdraw such data, free of charge.
    - id: epd-12.3
      label: "(3)"
      prose: >-
        Additional consent may be required for directory purposes other than searching contact details
        by name.
guidance:
  prose: >-
    Article 12 governs subscriber directories (phone books, online directories, directory enquiry
    services). The core principle is informed choice: subscribers must be told about the directory before
    inclusion, understand what purposes their data will serve (including reverse lookup and other search
    functions), and have the right to opt out entirely or limit which data appears. All these rights must
    be exercisable free of charge. For electronic directories with advanced search capabilities (reverse
    lookup by number, search by address, etc.), additional consent may be required because these searches
    enable purposes beyond simple name-to-number lookup. This article is relevant for any service that
    maintains user directories, contact databases, or people-search functionality. Modern interpretations
    extend this to social platform user directories, business contact databases, and any publicly
    searchable user registry.
implementation_guidance:
  platform_engineering:
    prose: >-
      Build directory inclusion as an opt-in system with granular controls. Implement a subscriber
      preference interface that allows selection of which personal data fields appear in directories
      (name, number, address, email). Build separate consent flows for basic directory listing vs.
      advanced search features (reverse lookup, search by location). Implement real-time directory
      update propagation so that opt-out or data correction requests take effect immediately across
      all directory services and partners. Build automated information delivery that informs new
      subscribers about directory options before any data is published. Implement directory data
      verification workflows allowing subscribers to review and correct their entries.
    tools:
      - "Subscriber directory preference management API"
      - "Real-time directory update propagation service"
      - "Automated onboarding flow with directory consent collection"
      - "Directory data verification and correction workflow engine"
  devsecops:
    prose: >-
      Code review must verify that directory inclusion is opt-in by default. Automated tests must verify
      that opt-out requests propagate to all directory endpoints and partners. Pipeline gates must verify
      that new directory features do not expose subscriber data without consent verification. SAST rules
      must detect directory data exposure outside controlled directory APIs.
    tools:
      - "Automated directory consent verification tests"
      - "Opt-out propagation integration tests across all directory endpoints"
      - "SAST rules detecting unauthorized directory data exposure"
  secops:
    prose: >-
      Monitor directory services for data exposure beyond subscriber consent scope. Audit directory
      data accuracy against subscriber preferences. Alert on directory scraping attempts or bulk data
      extraction. Track opt-out effectiveness and propagation latency. Monitor for unauthorized reverse
      lookup or advanced search functionality deployment.
    tools:
      - "Directory data exposure monitoring"
      - "Scraping and bulk extraction detection"
      - "Opt-out propagation verification monitoring"
      - "Consent compliance auditing for directory entries"
legal_references:
  - framework_id: gdpr
    articles: ["art-6", "art-14", "art-17", "art-21"]
    relationship: complements