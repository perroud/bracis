id: epd-8
family: art-8
title: "Calling and Connected Line Identification"
class: ePrivacy
statement:
  prose: >-
    1. Where presentation of calling line identification is offered, the service provider must offer the
    calling user the possibility, using a simple means and free of charge, of preventing the presentation
    of the calling line identification on a per-call basis. The calling subscriber must have this possibility
    on a per-line basis.

    2. Where presentation of calling line identification is offered, the service provider must offer the
    called subscriber the possibility, using a simple means and free of charge for reasonable use of this
    function, of preventing the presentation of the calling line identification of incoming calls.

    3. Where presentation of connected line identification is offered, the service provider must offer
    the called subscriber the possibility, using a simple means and free of charge, of preventing the
    presentation of the connected line identification to the calling user.

    4. Where presentation of calling or connected line identification is offered, the provider of publicly
    available electronic communications services shall inform the public thereof and of the possibilities
    set out in paragraphs 1, 2 and 3.
  parts:
    - id: epd-8.1
      label: "(1)"
      prose: >-
        The calling user must be able to prevent the presentation of calling line identification on a
        per-call basis, and the calling subscriber on a per-line basis, using simple means and free of charge.
    - id: epd-8.2
      label: "(2)"
      prose: >-
        The called subscriber must be able to prevent the presentation of calling line identification
        of incoming calls, using simple means and free of charge for reasonable use.
    - id: epd-8.3
      label: "(3)"
      prose: >-
        The called subscriber must be able to prevent the presentation of connected line identification
        to the calling user, using simple means and free of charge.
    - id: epd-8.4
      label: "(4)"
      prose: >-
        Providers must inform the public about calling/connected line identification and the available
        restriction options.
guidance:
  prose: >-
    Article 8 governs Caller ID (CLI — Calling Line Identification) and Connected Line Identification
    (COLP). It establishes that users must have simple, free-of-charge controls to hide their number
    when making calls (per-call or per-line), and called subscribers must be able to reject anonymous calls
    or hide their connected line identity. This applies to traditional telephony, VoIP services, and
    increasingly to messaging platforms that display caller/sender identification. The "simple means"
    requirement means the functionality must be easily accessible (e.g., a prefix code, a settings toggle),
    not buried in complex menus. Service providers must proactively inform users about these capabilities.
    Exceptions exist under Article 10 for emergency services and malicious call tracing.
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement caller ID presentation and restriction as configurable features in the communications
      platform. Build per-call and per-line CLI restriction capabilities. Implement user-facing settings
      for CLI presentation preferences with simple toggle interfaces. Build connected line identification
      restriction for called parties. Implement anonymous call rejection functionality for called subscribers.
      Ensure CLI restriction overrides are properly handled for emergency calls (where CLI must be
      presented). Build information delivery systems (in-app notices, account settings descriptions)
      that inform users about CLI options.
    tools:
      - "SIP/VoIP signaling configuration for CLI presentation/restriction"
      - "User preference management API for caller ID settings"
      - "Emergency call override logic for CLI presentation"
      - "In-app notification system for CLI capability awareness"
  devsecops:
    prose: >-
      Code review must verify that CLI restriction functionality works correctly across all communication
      channels. Automated tests must verify per-call and per-line CLI restriction, anonymous call rejection,
      and connected line identification restriction. Pipeline gates must verify that emergency call CLI
      overrides are correctly implemented. Test that user preference changes take effect immediately.
    tools:
      - "Automated CLI functionality testing in CI/CD"
      - "Emergency call override verification tests"
      - "User preference propagation integration tests"
  secops:
    prose: >-
      Monitor for CLI restriction bypass attempts. Audit CLI preference handling to ensure user choices
      are respected. Alert on anomalous CLI override patterns that may indicate unauthorized caller
      identification. Monitor emergency services CLI override compliance. Track user awareness metrics
      for CLI restriction capabilities.
    tools:
      - "CLI restriction bypass detection monitoring"
      - "Preference compliance audit tooling"
      - "Emergency override audit trails"
legal_references:
  - framework_id: gdpr
    articles: ["art-12", "art-13"]
    relationship: complements