control_families:
  - id: cap-1
    title: "Disposicoes Gerais"
    description: "Objeto, definicoes, principios e diretrizes gerais de seguranca da informacao na Administracao Publica Federal"
    articles: "art. 1 ao art. 5"
    control_count: 5
  - id: cap-2
    title: "POSIC - Politica de Seguranca da Informacao e Comunicacoes"
    description: "Conteudo minimo, aprovacao, publicacao e revisao da Politica de Seguranca da Informacao dos orgaos e entidades da APF"
    articles: "art. 6 ao art. 10"
    control_count: 5
  - id: cap-3
    title: "Estrutura de Governanca de Seguranca da Informacao"
    description: "Gestor de SI, comite de SI, ETIR, responsabilidades e competencias na estrutura de governanca"
    articles: "art. 11 ao art. 16"
    control_count: 6
  - id: cap-4
    title: "Gestao de Riscos de Seguranca da Informacao"
    description: "Metodologia de gestao de riscos, inventario de ativos, classificacao e tratamento de riscos de SI"
    articles: "art. 17 ao art. 20"
    control_count: 4
  - id: cap-5
    title: "Gestao de Continuidade"
    description: "Plano de continuidade de negocios, analise de impacto, testes e exercicios de continuidade"
    articles: "art. 21 ao art. 24"
    control_count: 4
  - id: cap-6
    title: "Tratamento de Incidentes"
    description: "Equipe de tratamento de incidentes (ETIR), notificacao, comunicacao ao CTIR Gov e resposta a incidentes"
    articles: "art. 25 ao art. 30"
    control_count: 6
  - id: cap-7
    title: "Auditoria e Conformidade"
    description: "Verificacao de conformidade, auditorias periodicas, relatorios, indicadores e melhoria continua"
    articles: "art. 31 ao art. 35"
    control_count: 5
  - id: cap-8
    title: "Capacitacao e Conscientizacao"
    description: "Programa de capacitacao, treinamento, conscientizacao em seguranca da informacao e cultura de SI"
    articles: "art. 36 ao art. 40"
    control_count: 5
related_frameworks:
  - framework_id: pnsi
    relationship: derived-from
    description: "A IN GSI/PR 1 regulamenta e operacionaliza a Politica Nacional de Seguranca da Informacao (PNSI, Decreto 9.637/2018), detalhando a estrutura de governanca de SI nos orgaos federais."
  - framework_id: nist-800-53-rev5
    relationship: mapped
    description: >-
      Os controles da IN GSI/PR 1 possuem correspondencia com familias do NIST 800-53
      rev5, especialmente PM (Program Management), PL (Planning), IR (Incident Response),
      RA (Risk Assessment) e AT (Awareness and Training).
  - framework_id: iso-27001-2022
    relationship: mapped
    description: >-
      A estrutura de governanca de SI da IN GSI/PR 1 esta alinhada com os requisitos
      da ISO/IEC 27001:2022, especialmente clausulas 5 (Lideranca), 6 (Planejamento),
      7 (Apoio) e 8 (Operacao).
  - framework_id: gsi-in3
    relationship: complements
    description: "A IN GSI/PR 3 complementa a IN 1 detalhando processos operacionais de seguranca da informacao, incluindo controles tecnicos e procedimentos especificos."
  - framework_id: gsi-in5
    relationship: complements
    description: "A IN GSI/PR 5 complementa a IN 1 detalhando requisitos de seguranca da informacao para uso de computacao em nuvem pelos orgaos da APF."
