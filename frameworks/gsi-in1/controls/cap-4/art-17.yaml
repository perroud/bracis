id: art-17
family: cap-4
title: "Metodologia de Gestao de Riscos de SI"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 17. Cada órgão e entidade da Administração Pública Federal deverá adotar
    metodologia de gestão de riscos de segurança da informação que contemple, no mínimo:
    I - identificação dos ativos de informação e sua classificação quanto à
    criticidade e sensibilidade;
    II - identificação de ameaças e vulnerabilidades associadas aos ativos;
    III - avaliação de riscos considerando a probabilidade e o impacto;
    IV - definição de medidas de tratamento de riscos;
    V - monitoramento e revisão periódica dos riscos.

    Parágrafo único. A metodologia deve ser compatível com as diretrizes do
    GSI/PR e com normas de gestão de riscos reconhecidas internacionalmente.
guidance:
  prose: |
    O art. 17 exige metodologia formal de gestao de riscos de SI, alinhada
    com padroes internacionais.

    **Cinco etapas obrigatorias:**
    1. Identificacao e classificacao de ativos (o que proteger)
    2. Ameacas e vulnerabilidades (o que pode dar errado)
    3. Avaliacao de riscos (qual a probabilidade e impacto)
    4. Tratamento de riscos (o que fazer: mitigar, aceitar, transferir, evitar)
    5. Monitoramento e revisao (ciclo continuo)

    **Metodologias recomendadas:**
    - ISO 31000 (gestao de riscos)
    - ISO 27005 (gestao de riscos de SI)
    - NIST SP 800-30 (guia de avaliacao de riscos)
    - OCTAVE (Operationally Critical Threat, Asset, and Vulnerability Evaluation)

    **Mapeamento NIST:** RA-1 (Risk Assessment Policy), RA-3 (Risk Assessment)
    **Mapeamento ISO 27001:** Clausula 6.1 (Acoes para abordar riscos), 8.2 (Avaliacao de riscos)
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de gestao de riscos:**
      1. Ferramenta GRC para registro, avaliacao e monitoramento de riscos de SI.
      2. Integracao com CMDB para inventario automatizado de ativos.
      3. Integracao com scanners de vulnerabilidade para alimentar avaliacao de riscos.
      4. Dashboard de riscos com heat map, tendencias e status de tratamento.
      5. API de riscos que permite consulta por outros sistemas.
    tools:
      - grc-platform
      - cmdb
      - vulnerability-scanner
      - risk-dashboard
  devsecops:
    prose: |
      **Riscos no pipeline:**
      1. Avaliacao automatica de risco de mudancas baseada em classificacao
         do sistema afetado.
      2. Integracao de resultados de SAST/DAST/SCA com registro de riscos.
      3. Gate de deploy condicionado ao nivel de risco aceito.
      4. Rastreabilidade entre vulnerabilidades tecnicas e riscos de negocio.
    tools:
      - gitlab-ci
      - risk-scoring
      - security-gates
      - vulnerability-correlation
  secops:
    prose: |
      **Operacao de gestao de riscos:**
      1. Ciclo anual de avaliacao formal de riscos de SI.
      2. Revisao trimestral do registro de riscos com comite de SI.
      3. Monitoramento continuo de novas ameacas e vulnerabilidades.
      4. Relatorio de riscos residuais para apreciacao da autoridade maxima.
      5. Comunicacao de riscos criticos ao DSI/GSI/PR conforme orientacao.
    tools:
      - grc-platform
      - threat-intelligence
      - risk-reporting
