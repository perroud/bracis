id: art-18
family: cap-4
title: "Inventario e Classificacao de Ativos"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 18. Cada órgão e entidade deverá manter inventário atualizado de seus
    ativos de informação, contendo:
    I - identificação e descrição do ativo;
    II - proprietário ou custodiante responsável;
    III - classificação quanto à criticidade (alta, média, baixa);
    IV - classificação quanto ao sigilo conforme legislação vigente;
    V - localização física ou lógica do ativo;
    VI - interdependências com outros ativos.

    Parágrafo único. O inventário deve ser revisado no mínimo anualmente ou
    sempre que houver mudanças significativas nos ativos do órgão.
guidance:
  prose: |
    O art. 18 exige inventario estruturado de ativos como base para toda
    a gestao de riscos e de SI.

    **Seis atributos obrigatorios por ativo:**
    1. Identificacao: nome, descricao, tipo (hardware, software, dados, etc.)
    2. Proprietario: servidor responsavel (accountability)
    3. Criticidade: impacto da perda/comprometimento
    4. Sigilo: classificacao conforme Decreto 7.724/2012 e Lei 12.527/2011
    5. Localizacao: data center, nuvem, rede, estacao
    6. Interdependencias: mapa de relacoes entre ativos

    **Classificacao de sigilo (Lei 12.527/2011):**
    - Ultrassecreto (25 anos), Secreto (15 anos), Reservado (5 anos)
    - Informacao nao classificada: acesso publico por padrao (LAI)

    **Mapeamento NIST:** CM-8 (Information System Component Inventory), RA-2 (Security Categorization)
    **Mapeamento ISO 27001:** A.5.9 (Inventario de ativos), A.5.12 (Classificacao de informacoes)
implementation_guidance:
  platform_engineering:
    prose: |
      **CMDB e inventario automatizado:**
      1. CMDB centralizado com descoberta automatica de ativos (agent-based e
         agentless scanning).
      2. Integracao com cloud providers para inventario de ativos em nuvem.
      3. Classificacao automatica baseada em metadados e conteudo.
      4. Mapa de dependencias gerado automaticamente via service mesh e
         network discovery.
      5. API de consulta de inventario para outros sistemas.
    tools:
      - cmdb
      - asset-discovery
      - cloud-inventory
      - service-mesh
      - dependency-mapping
  devsecops:
    prose: |
      **Inventario no ciclo de desenvolvimento:**
      1. SBOM (Software Bill of Materials) gerado automaticamente no pipeline.
      2. Registro de componentes e dependencias por aplicacao.
      3. Tags de classificacao em repositorios (critico, medio, baixo).
      4. Pipeline que valida se todo sistema em producao esta no inventario.
    tools:
      - gitlab-ci
      - sbom-generator
      - dependency-tracker
      - asset-validation
  secops:
    prose: |
      **Gestao operacional do inventario:**
      1. Revisao anual completa do inventario de ativos.
      2. Reconciliacao entre inventario e ativos descobertos (detectar shadow IT).
      3. Verificacao de proprietarios atualizados (servidores transferidos/aposentados).
      4. Relatorio de ativos sem classificacao ou com classificacao desatualizada.
    tools:
      - grc-platform
      - asset-reconciliation
      - shadow-it-detection
