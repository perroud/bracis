id: art-20
family: cap-4
title: "Plano de Gestao de Riscos de SI"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 20. O órgão deverá elaborar e manter Plano de Gestão de Riscos de Segurança
    da Informação, aprovado pela autoridade máxima, contendo:
    I - contexto organizacional e escopo da gestão de riscos;
    II - critérios para avaliação e aceitação de riscos;
    III - metodologia de avaliação de riscos adotada;
    IV - responsáveis pela gestão de riscos;
    V - cronograma de avaliações periódicas;
    VI - resultados das avaliações de riscos realizadas;
    VII - plano de tratamento de riscos com prazos e responsáveis.

    Parágrafo único. O Plano de Gestão de Riscos deve ser revisado no mínimo
    anualmente e submetido ao comitê de segurança da informação.
guidance:
  prose: |
    O art. 20 exige documento formal de gestao de riscos, diferente da
    metodologia (art. 17). Aqui e o plano concreto, com resultados e acoes.

    **Sete elementos obrigatorios:**
    1. Contexto: ambiente organizacional, stakeholders, escopo
    2. Criterios: como medir probabilidade e impacto, niveis de aceitacao
    3. Metodologia: qual framework (ISO 31000, NIST 800-30, etc.)
    4. Responsaveis: quem faz o que na gestao de riscos
    5. Cronograma: datas de avaliacoes periodicas
    6. Resultados: achados das avaliacoes realizadas
    7. Plano de tratamento: acoes concretas com prazo e responsavel

    **Ciclo de revisao:**
    - Revisao minima anual
    - Submetido ao comite de SI para deliberacao
    - Aprovado pela autoridade maxima

    **Mapeamento NIST:** RA-1, PM-9
    **Mapeamento ISO 27001:** Clausula 6.1.2, 8.2, 8.3
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de gestao de riscos:**
      1. Plataforma GRC com modulo de gestao de riscos de SI.
      2. Templates de plano de gestao de riscos com campos obrigatorios.
      3. Workflow de aprovacao: gestor SI → comite → autoridade maxima.
      4. Dashboard com cronograma de avaliacoes e status de cumprimento.
      5. Historico de resultados de avaliacoes com tendencias.
    tools:
      - grc-platform
      - risk-management-module
      - approval-workflow
      - risk-dashboard
  devsecops:
    prose: |
      **Plano de riscos integrado ao desenvolvimento:**
      1. Resultados de avaliacao de riscos refletidos nos security gates do pipeline.
      2. Criterios de aceitacao de risco codificados como politicas de pipeline.
      3. Relatorio automatizado de riscos tecnicos (vulnerabilidades, debitos
         de seguranca) para alimentar o plano.
      4. Rastreabilidade entre riscos do plano e controles no pipeline.
    tools:
      - gitlab-ci
      - risk-policy-as-code
      - security-reporting
  secops:
    prose: |
      **Operacao do plano de riscos:**
      1. Avaliacao formal de riscos conforme cronograma do plano.
      2. Atualizacao do registro de riscos apos cada avaliacao.
      3. Monitoramento de plano de tratamento (prazos, responsaveis, status).
      4. Preparacao de material para revisao anual pelo comite de SI.
      5. Registro de aprovacao da autoridade maxima.
    tools:
      - grc-platform
      - risk-register
      - treatment-tracking
      - approval-records
