id: art-19
family: cap-4
title: "Tratamento de Riscos de SI"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 19. Para cada risco identificado, o órgão deverá definir uma das seguintes
    estratégias de tratamento:
    I - mitigar: implementar controles para reduzir a probabilidade ou o impacto
    do risco a um nível aceitável;
    II - aceitar: assumir formalmente o risco residual, com aprovação do nível
    gerencial competente;
    III - transferir: compartilhar o risco com terceiro, mediante contrato,
    seguro ou outro instrumento;
    IV - evitar: eliminar a atividade ou condição que gera o risco.

    Parágrafo único. A aceitação formal de riscos deverá ser documentada e
    aprovada pela autoridade competente do órgão.
guidance:
  prose: |
    O art. 19 define as quatro estrategias classicas de tratamento de riscos
    (mitigar, aceitar, transferir, evitar).

    **Estrategias e criterios de aplicacao:**
    1. Mitigar: estrategia mais comum; implementar controles ate nivel aceitavel
    2. Aceitar: quando custo de tratamento excede impacto; requer aprovacao formal
    3. Transferir: seguros, contratos de SLA, terceirizacao de custodia
    4. Evitar: descontinuar sistema/servico que gera risco inaceitavel

    **Requisito critico: documentacao da aceitacao de riscos**
    A aceitacao de risco nao pode ser informal. Deve haver documento formal
    assinado pela autoridade competente (gestor de SI, comite, autoridade maxima
    dependendo do nivel de risco).

    **Mapeamento NIST:** RA-7 (Risk Response), PM-9 (Risk Management Strategy)
    **Mapeamento ISO 27001:** Clausula 6.1.3 (Tratamento de riscos de SI)
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao de tratamento de riscos:**
      1. Workflow automatizado para cada estrategia de tratamento (mitigar,
         aceitar, transferir, evitar).
      2. Registro de riscos aceitos com prazo de reavaliacao automatico.
      3. Integracao com ferramentas de controle (WAF, IDS, MFA) para mitigacao
         automatizada.
      4. Dashboard de riscos com filtro por estrategia de tratamento.
    tools:
      - grc-platform
      - workflow-engine
      - risk-register
      - control-automation
  devsecops:
    prose: |
      **Tratamento de riscos no pipeline:**
      1. Vulnerabilidades criticas: mitigacao obrigatoria antes de deploy.
      2. Vulnerabilidades aceitas: registro formal com justificativa e prazo.
      3. Waivers de seguranca versionados em repositorio com aprovacao rastreavel.
      4. Pipeline que bloqueia deploy se risco nao tratado excede threshold.
    tools:
      - gitlab-ci
      - security-waivers
      - risk-gates
      - approval-workflow
  secops:
    prose: |
      **Gestao operacional de tratamento:**
      1. Registro formal de todas as aceitacoes de risco com aprovador e prazo.
      2. Revisao trimestral de riscos aceitos (ainda sao aceitaveis?).
      3. Monitoramento de eficacia dos controles de mitigacao.
      4. Relatorio de riscos residuais para o comite de SI.
    tools:
      - grc-platform
      - risk-acceptance-register
      - control-effectiveness
