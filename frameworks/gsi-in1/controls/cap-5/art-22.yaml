id: art-22
family: cap-5
title: "Plano de Continuidade de SI"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 22. O órgão deverá elaborar e manter Plano de Continuidade de Segurança
    da Informação, que contemple:
    I - procedimentos de resposta a disrupções que afetem a segurança da informação;
    II - procedimentos de recuperação de ativos de informação;
    III - definição de tempos de recuperação (RTO) e pontos de recuperação (RPO)
    para os ativos críticos;
    IV - procedimentos de comunicação durante e após a disrupção;
    V - papéis e responsabilidades durante a execução do plano;
    VI - relação de contatos de emergência internos e externos.
guidance:
  prose: |
    O art. 22 exige plano formal e documentado de continuidade, com procedimentos
    operacionais concretos.

    **Seis elementos obrigatorios do plano:**
    1. Resposta a disrupcoes: primeiras acoes apos identificacao do problema
    2. Recuperacao de ativos: restauracao de sistemas, dados, servicos
    3. RTO/RPO: metricas formais de tempo e ponto de recuperacao
    4. Comunicacao: quem avisa quem, por qual canal, com que mensagem
    5. Papeis: quem lidera, quem executa, quem decide durante a crise
    6. Contatos: lista atualizada de telefones, e-mails de emergencia

    **RTO e RPO:**
    - RTO (Recovery Time Objective): tempo maximo aceitavel de indisponibilidade
    - RPO (Recovery Point Objective): perda maxima aceitavel de dados
    - Sistemas criticos: RTO < 4h, RPO < 1h (referencia)

    **Mapeamento NIST:** CP-2 (Contingency Plan), CP-10 (System Recovery and Reconstitution)
    **Mapeamento ISO 27001:** A.5.29, A.5.30
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura para o plano:**
      1. Backup automatizado com RPO definido por classificacao do sistema.
      2. Procedimentos de failover documentados e automatizados.
      3. Runbooks de recuperacao em formato executavel (Ansible, Terraform).
      4. Lista de contatos de emergencia em sistema acessivel offline.
      5. Canal de comunicacao de emergencia independente da infraestrutura primaria.
    tools:
      - backup-automation
      - failover-runbooks
      - infrastructure-as-code
      - emergency-contacts
      - out-of-band-communication
  devsecops:
    prose: |
      **Plano de continuidade como codigo:**
      1. Runbooks de recuperacao versionados em repositorio Git.
      2. Pipeline de teste de DR (disaster recovery) automatizado.
      3. Validacao automatica de que RTO/RPO sao atingiveis com a infra atual.
      4. Documentacao de procedimentos de recuperacao por sistema no repositorio.
    tools:
      - gitlab-ci
      - dr-runbooks
      - rto-rpo-validation
      - recovery-documentation
  secops:
    prose: |
      **Manutencao do plano:**
      1. Revisao semestral do plano de continuidade.
      2. Atualizacao de contatos de emergencia a cada mudanca de pessoal.
      3. Verificacao de que RTO/RPO definidos sao atingiveis.
      4. Documentacao de disrupcoes reais e licoes aprendidas.
    tools:
      - grc-platform
      - plan-management
      - contact-management
      - lessons-learned
