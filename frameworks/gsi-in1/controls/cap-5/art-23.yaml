id: art-23
family: cap-5
title: "Testes e Exercicios de Continuidade"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 23. O Plano de Continuidade de Segurança da Informação deverá ser testado
    periodicamente por meio de:
    I - exercícios de simulação (tabletop exercises) com os responsáveis;
    II - testes funcionais dos procedimentos de recuperação;
    III - testes de restauração de backups;
    IV - exercícios integrados com outros planos de continuidade do órgão.

    Parágrafo único. Os resultados dos testes devem ser documentados e
    utilizados para aprimorar o plano de continuidade.
guidance:
  prose: |
    O art. 23 exige testes periodicos para garantir que o plano funciona
    na pratica, nao apenas no papel.

    **Quatro tipos de testes:**
    1. Tabletop exercises: simulacao em mesa com cenarios hipoteticos
    2. Testes funcionais: execucao real de procedimentos isolados
    3. Restauracao de backup: prova de que backups sao restauraveis
    4. Exercicios integrados: teste conjunto com planos de outras areas

    **Frequencia recomendada:**
    - Tabletop: semestral
    - Testes funcionais: trimestral
    - Restauracao de backup: mensal
    - Exercicios integrados: anual

    **Mapeamento NIST:** CP-4 (Contingency Plan Testing)
    **Mapeamento ISO 27001:** A.5.30 (Prontidao de TIC para continuidade)
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de testes:**
      1. Ambiente isolado para testes de DR que replica producao.
      2. Automacao de testes de restauracao de backup com verificacao de integridade.
      3. Chaos engineering framework para injecao controlada de falhas.
      4. Plataforma de simulacao de cenarios de disrupcao.
    tools:
      - dr-test-environment
      - backup-restore-automation
      - chaos-engineering
      - simulation-platform
  devsecops:
    prose: |
      **Testes automatizados de continuidade:**
      1. Pipeline mensal de restauracao de backup com relatorio automatico.
      2. Testes de failover automatizados em staging com metricas de RTO.
      3. Chaos testing integrado ao pipeline de deploy (pre-producao).
      4. Registro automatico de resultados de testes em repositorio versionado.
    tools:
      - gitlab-ci
      - backup-restore-pipeline
      - failover-testing
      - chaos-testing
  secops:
    prose: |
      **Gestao de exercicios:**
      1. Calendario anual de exercicios com tipos e frequencias definidos.
      2. Facilitacao de tabletop exercises com cenarios realistas.
      3. Registro de resultados, gaps identificados e acoes de melhoria.
      4. Relatorio pos-exercicio com recomendacoes para o comite de SI.
    tools:
      - exercise-management
      - tabletop-platform
      - findings-tracker
      - improvement-planning
