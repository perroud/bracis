id: art-21
family: cap-5
title: "Gestao de Continuidade de Negocios em SI"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 21. Cada órgão e entidade da Administração Pública Federal deverá
    implementar processo de gestão de continuidade de negócios relativo à segurança
    da informação, que inclua:
    I - identificação dos processos críticos de negócio e seus requisitos de
    segurança da informação;
    II - análise de impacto nos negócios (BIA) relacionada à segurança da informação;
    III - definição de estratégias de continuidade para os processos críticos;
    IV - alocação de recursos para a continuidade de negócios.
guidance:
  prose: |
    O art. 21 exige gestao de continuidade de negocios (GCN) sob a perspectiva
    de SI, garantindo que servicos criticos sejam resilientes.

    **Quatro elementos obrigatorios:**
    1. Processos criticos: identificar quais servicos nao podem parar
    2. BIA (Business Impact Analysis): qual o impacto de cada interrupção
    3. Estrategias de continuidade: redundancia, backup, site alternativo
    4. Recursos: orcamento, pessoal, infraestrutura para continuidade

    **Contexto APF:**
    Servicos publicos digitais (gov.br, sistemas ministeriais) tem
    expectativa de alta disponibilidade. Interrupções afetam cidadaos
    e a imagem do governo.

    **Mapeamento NIST:** CP-1 (Contingency Planning Policy), CP-2 (Contingency Plan)
    **Mapeamento ISO 27001:** A.5.29 (SI durante disrupcao), A.5.30 (Prontidao de TIC para continuidade)
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de continuidade:**
      1. Arquitetura multi-zona/multi-regiao para servicos criticos.
      2. Backup automatizado com politica 3-2-1 (3 copias, 2 midias, 1 offsite).
      3. Replicacao sincrona ou assincrona de dados conforme RTO/RPO definidos.
      4. Failover automatico para servicos criticos com health checks.
      5. Infraestrutura como codigo para reconstrucao rapida de ambientes.
    tools:
      - multi-az-architecture
      - backup-automation
      - data-replication
      - failover-automation
      - infrastructure-as-code
  devsecops:
    prose: |
      **Continuidade no pipeline:**
      1. Testes de disaster recovery automatizados no pipeline.
      2. Chaos engineering em staging para validar resiliencia.
      3. Pipeline de backup validation (restaurar e verificar integridade).
      4. Documentacao de RTO/RPO por sistema no repositorio.
    tools:
      - gitlab-ci
      - chaos-engineering
      - backup-validation
      - dr-testing
  secops:
    prose: |
      **Operacao de continuidade:**
      1. BIA anual para todos os processos criticos do orgao.
      2. Teste de restauracao de backup trimestral com registro de resultados.
      3. Inventario de dependencias criticas (fornecedores, links, data centers).
      4. Relatorio de prontidao de continuidade para o comite de SI.
    tools:
      - grc-platform
      - bia-tool
      - backup-testing
      - dependency-tracking
