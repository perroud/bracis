id: art-24
family: cap-5
title: "Revisao do Plano de Continuidade"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 24. O Plano de Continuidade de Segurança da Informação deverá ser revisado:
    I - no mínimo anualmente;
    II - após a ocorrência de incidentes significativos de segurança;
    III - após mudanças relevantes na infraestrutura de TIC;
    IV - após os resultados de testes e exercícios que indiquem necessidade de
    atualização;
    V - após mudanças significativas nos processos críticos do órgão.

    Parágrafo único. A revisão do plano deverá ser aprovada pelo comitê de
    segurança da informação e pela autoridade máxima do órgão.
guidance:
  prose: |
    O art. 24 garante que o plano de continuidade se mantenha atual e
    relevante, com gatilhos claros para revisao.

    **Cinco gatilhos de revisao:**
    1. Temporal: minimo anual (independente de outros gatilhos)
    2. Incidentes: qualquer incidente significativo expoe lacunas
    3. Mudancas de infra: migracao de DC, adocao de nuvem, novos sistemas
    4. Resultados de testes: gaps encontrados em exercicios
    5. Mudancas de processos: reorganizacao, novos servicos criticos

    **Fluxo de aprovacao:**
    Gestor de SI revisa → comite de SI delibera → autoridade maxima aprova

    **Mapeamento NIST:** CP-2 (revisao do plano de contingencia)
    **Mapeamento ISO 27001:** Clausula 10.2 (Melhoria continua)
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de ciclo de vida do plano:**
      1. Plano versionado com historico completo de alteracoes.
      2. Alertas automaticos para revisao anual e gatilhos de revisao.
      3. Workflow de aprovacao: gestor SI → comite → autoridade maxima.
      4. Integracao com sistema de incidentes para detectar gatilhos de revisao.
    tools:
      - document-management
      - alerting-system
      - approval-workflow
      - incident-integration
  devsecops:
    prose: |
      **Plano como codigo versionado:**
      1. Plano de continuidade em repositorio Git com pull requests para cada revisao.
      2. Review obrigatorio do gestor de SI.
      3. Pipeline que detecta mudancas de infraestrutura (Terraform diff) que
         podem impactar o plano de continuidade.
      4. Changelog automatico com cada revisao.
    tools:
      - gitlab-ci
      - git-repository
      - infrastructure-change-detection
      - changelog-generator
  secops:
    prose: |
      **Controle de revisoes:**
      1. Registro de gatilhos que originaram cada revisao.
      2. Rastreabilidade de alteracoes (o que mudou e por que).
      3. Verificacao de que licoes aprendidas de incidentes e exercicios foram
         incorporadas ao plano.
      4. Arquivo historico de versoes anteriores do plano.
    tools:
      - grc-platform
      - revision-tracking
      - lessons-integration
      - document-archive
