id: art-38
family: cap-8
title: "Capacitacao Tecnica Especializada"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 38. Os órgãos e entidades deverão promover capacitação técnica
    especializada para:
    I - membros da ETIR, em temas como análise de malware, forensics digital,
    resposta a incidentes e ferramentas de segurança;
    II - profissionais de TI, em temas como segurança de redes, criptografia,
    segurança de aplicações e segurança em nuvem;
    III - gestores de SI, em temas como gestão de riscos, governança de SI,
    auditoria e conformidade.

    Parágrafo único. O órgão deverá buscar parcerias com instituições de
    ensino, certificadoras e organizações especializadas em SI.
guidance:
  prose: |
    O art. 38 detalha a capacitacao tecnica por perfil profissional,
    reconhecendo que cada grupo precisa de competencias especificas.

    **Tres perfis de capacitacao tecnica:**
    1. ETIR: malware analysis, digital forensics, incident response, SIEM/SOAR
    2. Profissionais de TI: network security, crypto, appsec, cloud security
    3. Gestores de SI: risk management, governance, audit, compliance

    **Certificacoes relevantes:**
    - ETIR: GCIH, GCFA, GREM (SANS), CEH, ECIH
    - TI: CISSP, CCSP, CompTIA Security+, AWS Security Specialty
    - Gestores: CISM, CRISC, ISO 27001 Lead Implementer/Auditor

    **Parcerias sugeridas:**
    - ENAP (Escola Nacional de Administracao Publica)
    - ESAF, universidades federais
    - CERT.br, RNP (Rede Nacional de Ensino e Pesquisa)
    - Organizacoes internacionais (SANS, ISC2, ISACA)

    **Mapeamento NIST:** AT-3 (Role-Based Security Training)
    **Mapeamento ISO 27001:** Clausula 7.2 (Competencia)
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de capacitacao tecnica:**
      1. Cyber range para treinamento pratico da ETIR (lab de incidentes).
      2. Ambiente de sandbox para analise de malware.
      3. Plataforma de labs praticos para profissionais de TI.
      4. Trilhas de certificacao com acompanhamento de progresso.
    tools:
      - cyber-range
      - malware-sandbox
      - security-labs
      - certification-tracking
  devsecops:
    prose: |
      **Capacitacao tecnica no fluxo de desenvolvimento:**
      1. Treinamento de secure coding com exercicios praticos.
      2. Code review sessions com foco em seguranca.
      3. CTF (Capture The Flag) internos para desenvolvimento de skills.
      4. Pair programming com especialistas de seguranca.
    tools:
      - secure-coding-platform
      - code-review-training
      - ctf-platform
      - pair-programming
  secops:
    prose: |
      **Gestao de capacitacao tecnica:**
      1. Levantamento anual de necessidades de capacitacao por perfil.
      2. Plano de certificacao com orcamento e cronograma.
      3. Parcerias formalizadas com instituicoes de ensino e certificadoras.
      4. Registro de certificacoes obtidas e validade.
      5. Exercicios praticos periodicos (tabletop, blue team/red team).
    tools:
      - training-management
      - certification-management
      - partnership-registry
      - exercise-calendar
