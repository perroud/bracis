id: art-39
family: cap-8
title: "Periodicidade e Avaliacao de Capacitacao"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 39. O programa de capacitação e conscientização deverá:
    I - ser realizado no mínimo anualmente para todos os agentes públicos;
    II - incluir treinamento obrigatório no processo de integração de novos
    servidores e prestadores de serviços;
    III - ser atualizado conforme evolução das ameaças e mudanças normativas;
    IV - ser avaliado quanto à sua eficácia por meio de métricas definidas;
    V - ter seus resultados reportados ao gestor de SI e ao comitê de SI.
guidance:
  prose: |
    O art. 39 garante que o programa de capacitacao seja continuo,
    obrigatorio e mensuravel.

    **Cinco exigencias:**
    1. Anual para todos: nao e evento unico, e ciclo continuo
    2. Onboarding obrigatorio: antes de conceder acesso a sistemas
    3. Atualizacao: conteudo evolui com ameacas e normas
    4. Avaliacao de eficacia: medir se o treinamento funciona
    5. Reporte: resultados para gestor e comite (accountability)

    **Metricas de eficacia sugeridas:**
    - Taxa de conclusao de treinamentos
    - Score medio em avaliacoes pos-treinamento
    - Reducao na taxa de clique em phishing simulado
    - Aumento no numero de incidentes reportados voluntariamente
    - Reducao de violacoes de politica

    **Mapeamento NIST:** AT-2, AT-6 (Security Training Records)
    **Mapeamento ISO 27001:** Clausula 7.2, 7.3
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao de periodicidade e avaliacao:**
      1. LMS com atribuicao automatica de treinamentos anuais.
      2. Integracao com RH para onboarding automatico de novos servidores.
      3. Metricas de eficacia calculadas automaticamente.
      4. Alertas para servidores com treinamento vencido/pendente.
      5. Bloqueio de acesso condicional para quem nao completou treinamento.
    tools:
      - lms
      - hr-integration
      - effectiveness-metrics
      - access-conditioning
  devsecops:
    prose: |
      **Capacitacao no ciclo de desenvolvimento:**
      1. Onboarding de seguranca automatizado para novos membros de equipes.
      2. Metricas de maturidade de seguranca por equipe de desenvolvimento.
      3. Treinamento triggered por erros de seguranca no pipeline.
      4. Documentacao de padroes de seguranca acessivel no repositorio.
    tools:
      - developer-onboarding
      - security-maturity
      - triggered-training
      - security-patterns
  secops:
    prose: |
      **Controle de periodicidade:**
      1. Dashboard de compliance de treinamento (quem fez, quem falta).
      2. Relatorio mensal de pendencias para gestores de area.
      3. Avaliacao anual de eficacia do programa com recomendacoes de ajuste.
      4. Reporte semestral ao comite de SI com metricas de capacitacao.
    tools:
      - training-compliance
      - pending-alerts
      - effectiveness-evaluation
      - committee-reporting
