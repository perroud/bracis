id: art-36
family: cap-8
title: "Programa de Capacitacao e Conscientizacao"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 36. Cada órgão e entidade deverá instituir programa de capacitação e
    conscientização em segurança da informação, que contemple:
    I - ações de conscientização dirigidas a todos os agentes públicos e
    prestadores de serviços;
    II - capacitação técnica para os profissionais envolvidos diretamente com SI;
    III - capacitação gerencial para os gestores e membros do comitê de SI;
    IV - treinamento específico para os membros da ETIR.
guidance:
  prose: |
    O art. 36 exige programa formal e diferenciado de capacitacao,
    reconhecendo que diferentes publicos precisam de abordagens distintas.

    **Quatro niveis de capacitacao:**
    1. Conscientizacao (todos): conceitos basicos, phishing, senhas, POSIC
    2. Capacitacao tecnica (profissionais de SI): ferramentas, processos, normas
    3. Capacitacao gerencial (gestores/comite): governanca, riscos, decisao
    4. Treinamento ETIR: resposta a incidentes, forensics, ferramentas

    **Todos = todos mesmo:**
    Inclui servidores, comissionados, terceirizados, estagiarios — qualquer
    pessoa que use recursos de TIC do orgao.

    **Mapeamento NIST:** AT-1 (Security Awareness and Training Policy), AT-2 (Security Awareness Training), AT-3 (Role-Based Security Training)
    **Mapeamento ISO 27001:** Clausula 7.2 (Competencia), 7.3 (Conscientizacao)
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de capacitacao:**
      1. LMS (Learning Management System) com trilhas diferenciadas por perfil.
      2. Modulos de e-learning interativos sobre SI.
      3. Simulacoes de phishing integradas ao programa de conscientizacao.
      4. Sistema de certificacao e registro de completude de treinamentos.
      5. Dashboard de metricas de capacitacao (participacao, conclusao, score).
    tools:
      - lms
      - e-learning-platform
      - phishing-simulation
      - certification-system
      - training-dashboard
  devsecops:
    prose: |
      **Capacitacao para desenvolvedores:**
      1. Treinamento de secure coding integrado ao onboarding de devs.
      2. Exercicios praticos de identificacao e correcao de vulnerabilidades.
      3. CTF (Capture The Flag) internos para engajamento.
      4. Documentacao de boas praticas de seguranca no repositorio.
    tools:
      - secure-coding-training
      - vulnerability-labs
      - ctf-platform
      - security-documentation
  secops:
    prose: |
      **Gestao do programa de capacitacao:**
      1. Plano anual de capacitacao com calendario, publicos e conteudos.
      2. Registro de participacao e completude por servidor.
      3. Avaliacao de eficacia dos treinamentos (pre e pos-teste).
      4. Relatorio trimestral de metricas de capacitacao para o gestor de SI.
      5. Identificacao de gaps de conhecimento e acoes corretivas.
    tools:
      - training-management
      - attendance-tracking
      - effectiveness-evaluation
      - gap-analysis
