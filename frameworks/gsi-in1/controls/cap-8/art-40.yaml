id: art-40
family: cap-8
title: "Cultura de Seguranca da Informacao"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 40. Os órgãos e entidades deverão promover a cultura de segurança da
    informação por meio de:
    I - comprometimento da alta administração com a segurança da informação;
    II - comunicação contínua sobre boas práticas e ameaças;
    III - reconhecimento de comportamentos positivos em segurança;
    IV - integração da segurança da informação nos processos organizacionais;
    V - participação em eventos, seminários e comunidades de SI.

    Parágrafo único. O órgão deverá participar da Semana Nacional de Segurança
    da Informação promovida pelo GSI/PR, quando realizada.
guidance:
  prose: |
    O art. 40 vai alem do treinamento formal e busca construir CULTURA
    de SI — algo que permeia o dia a dia do orgao.

    **Cinco pilares culturais:**
    1. Tone from the top: autoridade maxima demonstra comprometimento
    2. Comunicacao continua: nao apenas treinamento anual, mas reforco constante
    3. Reconhecimento: valorizar quem reporta incidentes, quem segue boas praticas
    4. Integracao: SI nao e assunto da TI, e de todos os processos
    5. Comunidade: participar de eventos nacionais e internacionais

    **Semana Nacional de SI:**
    Evento promovido pelo GSI/PR para sensibilizar a APF sobre SI.
    Participacao e obrigatoria quando o evento e realizado.

    **Diferenca entre treinamento e cultura:**
    - Treinamento: transferir conhecimento (eu sei)
    - Cultura: mudar comportamento (eu faco porque e importante)

    **Mapeamento NIST:** AT-2, PM-13 (Information Security Workforce)
    **Mapeamento ISO 27001:** Clausula 7.3 (Conscientizacao), 5.1 (Lideranca)
implementation_guidance:
  platform_engineering:
    prose: |
      **Suporte tecnologico a cultura de SI:**
      1. Portal de SI com noticias, alertas, dicas e boas praticas atualizado
         semanalmente.
      2. Newsletter automatizada de SI com conteudo relevante.
      3. Sistema de gamificacao que recompensa comportamentos positivos.
      4. Canal de comunicacao direto entre servidores e ETIR.
    tools:
      - si-portal
      - newsletter-automation
      - gamification
      - communication-channel
  devsecops:
    prose: |
      **Cultura de seguranca no desenvolvimento:**
      1. Security champions em cada equipe de desenvolvimento.
      2. Reconhecimento publico de contribuicoes para seguranca (bug bounty interno).
      3. Participacao em comunidades de seguranca open source.
      4. Compartilhamento de aprendizados de incidentes e vulnerabilidades.
    tools:
      - security-champions
      - bug-bounty-internal
      - community-participation
      - knowledge-sharing
  secops:
    prose: |
      **Promocao da cultura de SI:**
      1. Campanhas de conscientizacao tematicas ao longo do ano.
      2. Participacao na Semana Nacional de SI do GSI/PR.
      3. Eventos internos de SI (palestras, workshops, hackathons).
      4. Pesquisa anual de cultura de SI para medir evolucao.
      5. Programa de reconhecimento de boas praticas em SI.
    tools:
      - campaign-management
      - event-management
      - culture-survey
      - recognition-program
