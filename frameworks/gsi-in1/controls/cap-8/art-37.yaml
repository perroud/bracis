id: art-37
family: cap-8
title: "Conteudo Minimo de Conscientizacao"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 37. O programa de conscientização em segurança da informação deverá
    abordar, no mínimo, os seguintes temas:
    I - princípios de segurança da informação (disponibilidade, integridade,
    confidencialidade e autenticidade);
    II - POSIC e normas internas de SI do órgão;
    III - classificação e tratamento da informação;
    IV - uso seguro de senhas e autenticação;
    V - identificação e reporte de incidentes de segurança;
    VI - proteção contra engenharia social e phishing;
    VII - uso adequado de recursos de TIC;
    VIII - responsabilidades dos agentes públicos em SI.
guidance:
  prose: |
    O art. 37 define o curriculo minimo de conscientizacao, garantindo que
    temas essenciais sejam cobertos.

    **Oito temas obrigatorios:**
    1. Principios DICA: base conceitual de SI
    2. POSIC: politica especifica do orgao
    3. Classificacao de informacao: como tratar dados conforme nivel de sigilo
    4. Senhas e autenticacao: higiene de credenciais, MFA
    5. Incidentes: como identificar e reportar suspeitas
    6. Engenharia social: reconhecer phishing, pretexting, tailgating
    7. Uso de TIC: uso aceitavel, BYOD, redes sociais
    8. Responsabilidades: obrigacoes legais e administrativas

    **Engajamento:**
    Treinamentos puramente teoricos sao ineficazes. Simualacoes de phishing,
    quizzes interativos e casos reais aumentam retencao.

    **Mapeamento NIST:** AT-2 (Security Awareness Training)
    **Mapeamento ISO 27001:** Clausula 7.3 (Conscientizacao)
implementation_guidance:
  platform_engineering:
    prose: |
      **Conteudo interativo de conscientizacao:**
      1. Modulos de e-learning para cada um dos 8 temas obrigatorios.
      2. Simulacao de phishing periodica (mensal ou trimestral).
      3. Quizzes e testes de conhecimento pos-treinamento.
      4. Videos curtos e infograficos para reforco continuo.
      5. Gamificacao para aumentar engajamento.
    tools:
      - lms
      - phishing-simulation
      - quiz-platform
      - gamification-engine
  devsecops:
    prose: |
      **Conscientizacao integrada ao fluxo de trabalho:**
      1. Mensagens de seguranca no pipeline (dicas, lembretes).
      2. Bot de seguranca que responde duvidas de SI no chat da equipe.
      3. Documentacao de boas praticas acessivel no repositorio.
      4. Alertas educativos quando desenvolvedor comete erro de seguranca.
    tools:
      - gitlab-ci
      - security-bot
      - documentation
      - educational-alerts
  secops:
    prose: |
      **Gestao de conteudo de conscientizacao:**
      1. Calendario de campanha com cobertura dos 8 temas ao longo do ano.
      2. Material atualizado conforme novas ameacas e tendencias.
      3. Avaliacao de retencao de conhecimento (testes periodicos).
      4. Metricas de eficacia de simulacoes de phishing (taxa de clique).
    tools:
      - awareness-management
      - content-library
      - knowledge-assessment
      - phishing-metrics
