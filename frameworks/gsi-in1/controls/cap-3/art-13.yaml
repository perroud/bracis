id: art-13
family: cap-3
title: "Comite de Seguranca da Informacao"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 13. O comitê de segurança da informação deverá ser instituído por ato da
    autoridade máxima, com caráter deliberativo, composto por representantes de
    áreas estratégicas do órgão, com as seguintes competências:
    I - assessorar a autoridade máxima na implementação da POSIC;
    II - deliberar sobre propostas de normas internas de segurança da informação;
    III - analisar e deliberar sobre os resultados da gestão de riscos de SI;
    IV - deliberar sobre os relatórios de auditoria de SI;
    V - propor ações de melhoria da segurança da informação;
    VI - deliberar sobre questões estratégicas de segurança da informação.
guidance:
  prose: |
    O art. 13 define o comite de SI como orgao colegiado deliberativo, nao apenas
    consultivo.

    **Composicao:**
    - Representantes de areas estrategicas (TI, juridico, RH, gestao,
      comunicacao, areas finalisticas)
    - Multidisciplinar: SI nao e responsabilidade apenas da TI
    - Presidido pelo gestor de SI ou por autoridade designada

    **Seis competencias:**
    1. Assessoria a autoridade maxima: suporte decisorio
    2. Normas internas: poder deliberativo (nao apenas consultivo)
    3. Riscos: analisa resultados da gestao de riscos
    4. Auditoria: avalia relatorios de auditoria de SI
    5. Melhoria: propoe acoes corretivas e preventivas
    6. Estrategia: questoes de alto nivel de SI

    **Mapeamento NIST:** PM-1, PM-2
    **Mapeamento ISO 27001:** Clausula 5.1 (Lideranca), 9.3 (Analise critica pela direcao)
implementation_guidance:
  platform_engineering:
    prose: |
      **Suporte tecnologico ao comite:**
      1. Portal do comite com pauta, atas, deliberacoes e acompanhamento.
      2. Dashboard de SI para subsidiar deliberacoes (riscos, incidentes, conformidade).
      3. Sistema de votacao e deliberacao seguro para reunioes remotas.
      4. Repositorio de documentos do comite com controle de acesso.
    tools:
      - committee-portal
      - grc-dashboard
      - secure-voting
      - document-management
  devsecops:
    prose: |
      **Insumos automatizados para o comite:**
      1. Relatorios automatizados de seguranca gerados antes de cada reuniao.
      2. Dashboard de conformidade com normas internas vigentes.
      3. Metricas de seguranca de desenvolvimento (vulnerabilidades, cobertura,
         tempo de remediacao).
      4. Propostas de normas em formato revisavel (MR/PR).
    tools:
      - gitlab-ci
      - security-metrics
      - compliance-reporting
  secops:
    prose: |
      **Operacao do comite:**
      1. Calendario de reunioes ordinarias (minimo trimestrais).
      2. Atas formais de todas as reunioes com deliberacoes registradas.
      3. Acompanhamento de deliberacoes pendentes e prazos.
      4. Relatorio anual de atividades do comite para a autoridade maxima.
    tools:
      - grc-platform
      - meeting-management
      - action-tracking
