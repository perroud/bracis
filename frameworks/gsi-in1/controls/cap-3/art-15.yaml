id: art-15
family: cap-3
title: "Agente Responsavel pela ETIR"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 15. A ETIR deverá possuir um agente responsável, servidor efetivo, designado
    pela autoridade máxima do órgão, com as seguintes atribuições:
    I - gerenciar as atividades da ETIR;
    II - distribuir e acompanhar as tarefas entre os membros da equipe;
    III - representar a ETIR junto ao gestor de SI e ao comitê de SI;
    IV - manter comunicação operacional com o CTIR Gov;
    V - garantir que os procedimentos de resposta a incidentes sejam seguidos;
    VI - promover a capacitação técnica dos membros da ETIR.
guidance:
  prose: |
    O art. 15 exige a formalizacao de um lider para a ETIR, diferente do
    gestor de SI (embora em orgaos pequenos possam ser a mesma pessoa).

    **Perfil do agente responsavel:**
    - Servidor efetivo (mesma exigencia do gestor de SI)
    - Perfil tecnico (diferente do gestor que e mais estrategico)
    - Experiencia em seguranca operacional e resposta a incidentes
    - Capacidade de coordenar equipe tecnica sob pressao

    **Relacao com estrutura de governanca:**
    Agente ETIR → reporta ao → Gestor de SI → reporta ao → Comite/Autoridade maxima

    **Mapeamento NIST:** IR-1, IR-2 (Incident Response Training)
    **Mapeamento ISO 27001:** A.5.24 (Planejamento de resposta a incidentes)
implementation_guidance:
  platform_engineering:
    prose: |
      **Ferramentas de gestao da ETIR:**
      1. Sistema de gerenciamento de tarefas para distribuicao e acompanhamento
         de atividades da equipe.
      2. Dashboard operacional com metricas da ETIR: tempo de resposta,
         incidentes abertos, SLA compliance.
      3. Plataforma de on-call management com escalacao automatica.
      4. Sistema de capacitacao tecnica com trilhas para membros da ETIR.
    tools:
      - task-management
      - etir-dashboard
      - on-call-management
      - training-platform
  devsecops:
    prose: |
      **Automacao de processos da ETIR:**
      1. Playbooks codificados para tipos de incidentes recorrentes.
      2. Pipeline de triagem automatica que classifica e prioriza incidentes.
      3. Integracao com CTIR Gov via API para comunicacao operacional.
      4. Ambiente de treinamento (cyber range) para capacitacao tecnica.
    tools:
      - soar
      - automated-triage
      - ctir-gov-api
      - cyber-range
  secops:
    prose: |
      **Operacao do agente responsavel:**
      1. Reuniao diaria de status da ETIR (daily standup de incidentes).
      2. Relatorio semanal para o gestor de SI.
      3. Plano anual de capacitacao tecnica dos membros da ETIR.
      4. Registro de todas as comunicacoes operacionais com CTIR Gov.
      5. Procedimento formal de escalacao para incidentes acima da capacidade da ETIR.
    tools:
      - incident-management
      - reporting-platform
      - training-tracking
