id: art-11
family: cap-3
title: "Estrutura Minima de Governanca de SI"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 11. Cada órgão e entidade da Administração Pública Federal deverá constituir
    a seguinte estrutura mínima de governança de segurança da informação:
    I - gestor de segurança da informação;
    II - comitê de segurança da informação;
    III - equipe de tratamento e resposta a incidentes cibernéticos (ETIR).

    Parágrafo único. A estrutura de governança de SI deve ser compatível com o
    porte, a natureza e a complexidade do órgão ou entidade.
guidance:
  prose: |
    O art. 11 define os tres pilares organizacionais obrigatorios da governanca
    de SI na APF.

    **Tres instancias obrigatorias:**
    1. Gestor de SI: coordenador, ponto focal, articulador
    2. Comite de SI: deliberativo, estrategico, multidisciplinar
    3. ETIR: operacional, tecnico, resposta a incidentes

    **Proporcionalidade:**
    Orgaos menores podem ter estruturas simplificadas, mas as tres instancias
    sao obrigatorias. Um orgao pequeno pode ter gestor de SI acumulando funcoes,
    comite com poucos membros e ETIR com equipe reduzida.

    **Mapeamento NIST:** PM-2 (Senior Information Security Officer), IR-10 (CSIRT)
    **Mapeamento ISO 27001:** Clausula 5.3 (Papeis organizacionais)
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de governanca:**
      1. Sistema de gestao de papeis e responsabilidades de SI com registro
         formal dos designados.
      2. Portal de governanca de SI com visibilidade da estrutura para todo o orgao.
      3. Canais de comunicacao seguros entre gestor, comite e ETIR.
      4. Dashboard de governanca com status de preenchimento dos papeis obrigatorios.
    tools:
      - identity-management
      - governance-portal
      - secure-communication
      - governance-dashboard
  devsecops:
    prose: |
      **Governanca refletida em processos:**
      1. Roles no GitLab/repositorios que refletem a estrutura de governanca
         (gestor SI como Owner, comite como Maintainers, ETIR com acesso a security).
      2. Aprovacoes de MR/PR roteadas conforme a estrutura de governanca.
      3. Notificacoes de seguranca direcionadas ao papel correto.
      4. Automacao de onboarding/offboarding de membros da estrutura.
    tools:
      - gitlab-roles
      - approval-rules
      - notification-routing
  secops:
    prose: |
      **Operacionalizacao da estrutura:**
      1. Registro formal (portaria/ato) de designacao de gestor, comite e ETIR.
      2. Verificacao semestral de que todos os papeis estao preenchidos.
      3. Relatorio de atuacao de cada instancia (reunioes do comite, atividades
         da ETIR, acoes do gestor).
      4. Plano de sucessao para papeis criticos.
    tools:
      - grc-platform
      - document-management
      - activity-tracking
