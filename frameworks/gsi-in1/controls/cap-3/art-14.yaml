id: art-14
family: cap-3
title: "Equipe de Tratamento e Resposta a Incidentes Ciberneticos (ETIR)"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 14. A equipe de tratamento e resposta a incidentes cibernéticos (ETIR)
    deverá ser instituída por ato da autoridade máxima, com as seguintes competências:
    I - receber, analisar, classificar e tratar as notificações e atividades
    relacionadas a incidentes de segurança da informação;
    II - executar as ações necessárias para o tratamento de incidentes de segurança;
    III - coordenar as atividades de tratamento de incidentes com o CTIR Gov;
    IV - manter registro de incidentes de segurança da informação;
    V - elaborar relatórios e estatísticas sobre incidentes tratados;
    VI - recomendar medidas de prevenção de incidentes ao gestor de SI.
guidance:
  prose: |
    O art. 14 define a ETIR como o braco operacional da governanca de SI,
    equivalente ao CSIRT/CERT no padrao internacional.

    **Modelo CSIRT:**
    - Recepcao de notificacoes (triagem)
    - Analise e classificacao (severidade)
    - Tratamento e contencao (resposta)
    - Coordenacao com CTIR Gov (comunicacao)
    - Registro (rastreabilidade)
    - Relatorios (accountability)
    - Prevencao (melhoria continua)

    **Relacao com CTIR Gov:**
    O CTIR Gov (Centro de Tratamento e Resposta a Incidentes Ciberneticos de
    Governo) e a entidade central da APF. As ETIRs locais devem comunicar
    incidentes e coordenar resposta com o CTIR Gov.

    **Mapeamento NIST:** IR-1 (Incident Response Policy), IR-10 (Integrated CSIRT)
    **Mapeamento ISO 27001:** A.5.24 (Planejamento de resposta a incidentes), A.5.25 (Avaliacao)
implementation_guidance:
  platform_engineering:
    prose: |
      **Stack de resposta a incidentes:**
      1. SIEM para coleta e correlacao de eventos de seguranca.
      2. SOAR (Security Orchestration, Automation and Response) para automacao
         de playbooks de resposta.
      3. Ticketing system integrado para registro e rastreamento de incidentes.
      4. Plataforma de threat intelligence para enrichment de IOCs.
      5. Canal seguro de comunicacao com CTIR Gov (MISP, STIX/TAXII).
    tools:
      - siem
      - soar
      - incident-ticketing
      - threat-intelligence
      - misp
  devsecops:
    prose: |
      **Integracao DevSecOps com ETIR:**
      1. Pipeline de notificacao automatica a ETIR quando vulnerabilidade critica
         e detectada em producao.
      2. Runbooks automatizados para incidentes recorrentes.
      3. Integracao de alertas de seguranca do pipeline com sistema de ticketing.
      4. Forensics pipeline para coleta de evidencias em ambientes containerizados.
    tools:
      - gitlab-ci
      - alerting-integration
      - forensics-pipeline
      - runbook-automation
  secops:
    prose: |
      **Operacao da ETIR:**
      1. Plantao 24/7 ou on-call rotation para incidentes criticos.
      2. Registro de todos os incidentes com classificacao, tratamento e resolucao.
      3. Relatorio mensal de incidentes para o gestor de SI e comite.
      4. Participacao em exercicios de simulacao (tabletop exercises) semestrais.
      5. Comunicacao imediata ao CTIR Gov de incidentes de alto impacto.
    tools:
      - soc
      - incident-management
      - ctir-gov-portal
      - exercise-platform
