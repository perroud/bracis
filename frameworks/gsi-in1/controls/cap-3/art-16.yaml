id: art-16
family: cap-3
title: "Responsabilidades dos Agentes Publicos"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 16. Todos os agentes públicos e prestadores de serviços que utilizem
    recursos de tecnologia da informação e comunicações do órgão são responsáveis
    por:
    I - conhecer e cumprir a POSIC e as normas internas de SI do órgão;
    II - proteger os ativos de informação sob sua guarda;
    III - comunicar ao gestor de SI ou à ETIR os incidentes de segurança da
    informação de que tenham conhecimento;
    IV - não compartilhar credenciais de acesso;
    V - utilizar os recursos de TIC exclusivamente para atividades institucionais;
    VI - manter sigilo sobre informações classificadas ou sigilosas.

    Parágrafo único. O descumprimento das obrigações previstas neste artigo
    sujeita o infrator às penalidades previstas em lei.
guidance:
  prose: |
    O art. 16 define responsabilidades individuais de TODOS os usuarios,
    nao apenas da area de TI.

    **Responsabilidades universais:**
    1. Conhecer e cumprir a POSIC: obrigacao de todo usuario
    2. Proteger ativos: cada um e guardiao do que acessa
    3. Comunicar incidentes: dever de notificacao (nao e opcao)
    4. Nao compartilhar credenciais: proibicao explicita
    5. Uso institucional: recursos de TIC nao sao para uso pessoal
    6. Sigilo: informacoes classificadas tem protecao legal

    **Penalidades:**
    Descumprimento pode gerar processo administrativo disciplinar (PAD)
    conforme Lei 8.112/90 e, em casos graves, responsabilizacao penal.

    **Mapeamento NIST:** AT-2 (Security Awareness Training), PS-6 (Access Agreements)
    **Mapeamento ISO 27001:** A.5.4 (Responsabilidades da direcao), A.6.2 (Termos de contratacao)
implementation_guidance:
  platform_engineering:
    prose: |
      **Controles tecnicos de responsabilidade:**
      1. Autenticacao individual (proibicao de contas genericas compartilhadas).
      2. Logs de auditoria por usuario para rastreabilidade individual.
      3. DLP para prevenir exfiltracao de informacoes classificadas.
      4. Controle de uso de recursos de TIC (web filtering, uso aceitavel).
    tools:
      - iam
      - audit-logging
      - dlp
      - web-filter
  devsecops:
    prose: |
      **Responsabilidade no desenvolvimento:**
      1. Commits individuais assinados (identidade verificavel).
      2. Code review obrigatorio (pelo menos dois pares de olhos).
      3. Secret detection para evitar exposicao de credenciais.
      4. Politica de branches protegidos (sem push direto em main/producao).
    tools:
      - gitlab-ci
      - signed-commits
      - secret-detection
      - branch-protection
  secops:
    prose: |
      **Monitoramento de responsabilidades:**
      1. Verificacao periodica de compartilhamento de credenciais (deteccao
         de multiplos logins simultaneos).
      2. Monitoramento de uso indevido de recursos de TIC.
      3. Canal anonimo de denuncias de violacao de SI.
      4. Registro de termos de responsabilidade assinados por todos os usuarios.
    tools:
      - siem
      - ueba
      - whistleblower-channel
      - compliance-tracking
