id: art-12
family: cap-3
title: "Gestor de Seguranca da Informacao"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 12. O gestor de segurança da informação deverá ser servidor efetivo do órgão,
    designado pela autoridade máxima, com as seguintes competências:
    I - coordenar a elaboração e a revisão da POSIC e das normas internas de SI;
    II - assessorar a autoridade máxima nas decisões relativas à segurança da informação;
    III - coordenar o comitê de segurança da informação;
    IV - acompanhar as investigações e as avaliações dos danos decorrentes de
    incidentes de segurança;
    V - coordenar as ações de capacitação e conscientização em segurança da informação;
    VI - propor recursos necessários para as ações de segurança da informação;
    VII - manter comunicação com o CTIR Gov e com o DSI/GSI/PR.
guidance:
  prose: |
    O art. 12 define o papel do gestor de SI como articulador central da
    governanca de SI no orgao.

    **Requisitos do gestor:**
    - DEVE ser servidor efetivo (nao terceirizado, nao comissionado)
    - Designacao formal pela autoridade maxima
    - Idealmente com formacao/experiencia em SI

    **Sete competencias:**
    1. POSIC: coordena elaboracao e revisao
    2. Assessoria: ponte entre tecnico e decisorio
    3. Comite: coordena (presidente ou secretario-executivo)
    4. Incidentes: acompanha investigacoes
    5. Capacitacao: coordena programa de conscientizacao
    6. Recursos: propoe orcamento e pessoal para SI
    7. Comunicacao: interface com CTIR Gov e GSI/PR

    **Mapeamento NIST:** PM-2 (Senior Information Security Officer)
    **Mapeamento ISO 27001:** Clausula 5.3 (Papeis, responsabilidades e autoridades)
implementation_guidance:
  platform_engineering:
    prose: |
      **Ferramentas para o gestor de SI:**
      1. Dashboard executivo com visao consolidada de seguranca: incidentes,
         vulnerabilidades, conformidade, riscos.
      2. Sistema de workflow para coordenacao de POSIC e normas internas.
      3. Canal seguro de comunicacao com CTIR Gov (e-mail cifrado, portal).
      4. Plataforma de gestao de capacitacao com metricas de participacao.
    tools:
      - grc-dashboard
      - workflow-engine
      - secure-email
      - training-management
  devsecops:
    prose: |
      **Suporte DevSecOps ao gestor:**
      1. Relatorios automatizados de postura de seguranca do orgao.
      2. Pipeline de revisao de POSIC e normas com aprovacao do gestor.
      3. Integracao com CTIR Gov para compartilhamento de IOCs.
      4. Metricas de seguranca por equipe/projeto para assessoramento.
    tools:
      - gitlab-ci
      - security-reporting
      - ioc-sharing
  secops:
    prose: |
      **Suporte operacional ao gestor:**
      1. Relatorio mensal de incidentes para assessoramento da autoridade maxima.
      2. Inventario de necessidades de recursos (pessoal, tecnologia, orcamento).
      3. Registro de todas as comunicacoes com CTIR Gov e DSI/GSI/PR.
      4. Plano anual de acoes de SI para apreciacao do comite.
    tools:
      - grc-platform
      - incident-reporting
      - resource-planning
