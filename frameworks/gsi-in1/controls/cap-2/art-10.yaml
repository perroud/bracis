id: art-10
family: cap-2
title: "Revisao Periodica da POSIC"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 10. A POSIC deverá ser revisada periodicamente, em intervalo não superior a
    três anos, ou sempre que ocorrer fato relevante que a torne inadequada, incluindo:
    I - mudanças significativas no ambiente de segurança da informação;
    II - incidentes de segurança graves;
    III - alterações na legislação ou normas aplicáveis;
    IV - recomendações de auditorias internas ou externas;
    V - mudanças na estrutura organizacional do órgão.

    Parágrafo único. O processo de revisão deve ser conduzido pelo gestor de segurança
    da informação e submetido à aprovação da autoridade máxima do órgão.
guidance:
  prose: |
    O art. 10 garante que a POSIC nao se torne obsoleta. O prazo maximo de
    tres anos e o limite, mas gatilhos podem antecipar a revisao.

    **Gatilhos de revisao antecipada:**
    1. Mudancas no ambiente: novas ameacas, tecnologias, servicos
    2. Incidentes graves: qualquer incidente que exponha lacunas na politica
    3. Legislacao: novas leis (ex: LGPD), novas INs do GSI/PR
    4. Auditorias: achados do TCU, CGU ou auditorias internas
    5. Reorganizacao: criacao/extincao de areas, fusoes de orgaos

    **Processo de revisao:**
    Gestor de SI conduz, comite de SI delibera, autoridade maxima aprova.

    **Mapeamento NIST:** PM-1 (revisao de programa)
    **Mapeamento ISO 27001:** Clausula 10.2 (Melhoria continua)
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de ciclo de vida da POSIC:**
      1. Sistema de versionamento da POSIC com diff entre versoes.
      2. Alertas automaticos quando POSIC se aproxima de 3 anos sem revisao.
      3. Workflow de revisao com etapas: rascunho > revisao > aprovacao > publicacao.
      4. Integracao com feed de legislacao para detectar mudancas normativas
         que possam impactar a POSIC.
    tools:
      - document-management
      - workflow-engine
      - legislative-monitoring
  devsecops:
    prose: |
      **Revisao rastreavel:**
      1. POSIC em repositorio Git com pull requests para cada alteracao.
      2. Review obrigatorio do gestor de SI e aprovacao do comite.
      3. Changelog automatico com cada revisao.
      4. Pipeline que valida formato e completude apos cada alteracao.
    tools:
      - gitlab-ci
      - git-repository
      - changelog-generator
  secops:
    prose: |
      **Calendario de revisao:**
      1. Dashboard com data da ultima revisao e prazo para proxima.
      2. Registro de gatilhos de revisao antecipada (incidentes, legislacao).
      3. Relatorio anual de aderencia e sugestoes de melhoria para a POSIC.
      4. Registro formal de todas as revisoes com justificativa e aprovacao.
    tools:
      - grc-platform
      - calendar-management
      - audit-trail
