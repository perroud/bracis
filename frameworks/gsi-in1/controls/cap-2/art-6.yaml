id: art-6
family: cap-2
title: "Instituicao da POSIC"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 6. Cada órgão e entidade da Administração Pública Federal deverá instituir
    a Política de Segurança da Informação e Comunicações (POSIC), formalizada em ato
    da autoridade máxima, como instrumento para disciplinar a segurança da informação
    no âmbito de sua atuação.

    Parágrafo único. A POSIC deve ser compatível com as diretrizes da Política
    Nacional de Segurança da Informação e com as normas e orientações do GSI/PR.
guidance:
  prose: |
    O art. 6 torna obrigatoria a POSIC em todos os orgaos federais. E o documento
    fundacional da governanca de SI.

    **Requisitos de formalizacao:**
    - Ato formal da autoridade maxima (portaria ministerial, resolucao)
    - Publicacao em boletim interno ou DOU
    - Compatibilidade com PNSI (Decreto 9.637/2018)
    - Compatibilidade com normas do GSI/PR (INs 1, 2, 3)

    **Problemas comuns:**
    - POSIC generica copiada de modelo sem adaptacao ao contexto do orgao
    - POSIC aprovada mas nao disseminada
    - POSIC desatualizada (sem revisao periodica)

    **Mapeamento NIST:** PL-1 (Security Planning Policy)
    **Mapeamento ISO 27001:** Clausula 5.2 (Politica)
implementation_guidance:
  platform_engineering:
    prose: |
      **POSIC como codigo:**
      1. Manter POSIC em repositorio versionado (GitOps) com historico completo
         de alteracoes.
      2. Portal interno de politicas com acesso universal para todos os servidores.
      3. Sistema de aceite eletronico da POSIC para novos servidores e terceirizados.
      4. Integrar POSIC com controles tecnicos: politica declara, automacao implementa.
    tools:
      - git-repository
      - policy-portal
      - electronic-acceptance
  devsecops:
    prose: |
      **Conformidade automatizada:**
      1. Pipeline que valida conformidade tecnica com as diretrizes da POSIC.
      2. Testes automatizados que verificam se controles tecnicos estao alinhados
         com a POSIC vigente.
      3. Alertas automaticos quando deploy viola diretriz da POSIC.
      4. Rastreabilidade entre controles tecnicos e secoes da POSIC.
    tools:
      - gitlab-ci
      - policy-as-code
      - compliance-scanner
  secops:
    prose: |
      **Gestao da POSIC:**
      1. Calendario de revisao da POSIC (minimo anual).
      2. Processo de coleta de sugestoes de atualizacao.
      3. Verificacao de compatibilidade com novas normas do GSI/PR.
      4. Relatorio de aderencia dos sistemas do orgao a POSIC.
    tools:
      - grc-platform
      - document-management
      - compliance-reporting
