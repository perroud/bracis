id: art-9
family: cap-2
title: "Publicacao e Divulgacao da POSIC"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 9. A POSIC deverá ser publicada e divulgada a todos os agentes públicos e
    prestadores de serviços do órgão, por meio de:
    I - publicação em boletim interno ou no Diário Oficial da União, conforme o caso;
    II - divulgação nos canais internos de comunicação do órgão;
    III - disponibilização no sítio eletrônico do órgão na internet;
    IV - inclusão no programa de capacitação e conscientização em segurança da informação.

    Parágrafo único. Os prestadores de serviços deverão tomar ciência da POSIC e
    assinar termo de responsabilidade.
guidance:
  prose: |
    O art. 9 garante que a POSIC nao seja apenas um documento formal, mas efetivamente
    conhecida por todos que interagem com os sistemas do orgao.

    **Canais de divulgacao obrigatorios:**
    1. Publicacao oficial (DOU ou boletim): da forca normativa
    2. Canais internos: intranet, e-mail, murais digitais
    3. Site na internet: transparencia publica
    4. Programa de capacitacao: garante entendimento

    **Termo de responsabilidade:**
    Prestadores de servico (terceirizados, consultores) DEVEM assinar termo
    especifico reconhecendo ciencia da POSIC e comprometimento.

    **Mapeamento NIST:** AT-1 (Security Awareness and Training Policy)
    **Mapeamento ISO 27001:** Clausula 7.3 (Conscientizacao), 7.4 (Comunicacao)
implementation_guidance:
  platform_engineering:
    prose: |
      **Divulgacao e aceite automatizados:**
      1. Portal de politicas com aceite eletronico obrigatorio no primeiro acesso.
      2. Sistema de notificacao automatica quando a POSIC e atualizada.
      3. Controle de acesso condicionado ao aceite da POSIC vigente.
      4. API de verificacao de aceite integravel com outros sistemas do orgao.
    tools:
      - policy-portal
      - notification-system
      - conditional-access
      - electronic-acceptance
  devsecops:
    prose: |
      **Compliance de divulgacao:**
      1. Pipeline que verifica se site do orgao possui POSIC publicada.
      2. Automacao de notificacao a equipes de desenvolvimento quando POSIC muda.
      3. Checklist de onboarding de novos membros inclui aceite da POSIC.
      4. Registro de evidencias de divulgacao para auditorias.
    tools:
      - gitlab-ci
      - notification-pipeline
      - onboarding-automation
  secops:
    prose: |
      **Controle de divulgacao:**
      1. Registro de todos os aceites (data, hora, pessoa, versao da POSIC).
      2. Relatorio de agentes que ainda nao aceitaram a POSIC vigente.
      3. Acompanhamento de prestadores de servico com termo de responsabilidade pendente.
      4. Bloqueio de acesso apos prazo sem aceite da POSIC.
    tools:
      - grc-platform
      - acceptance-tracking
      - access-control
