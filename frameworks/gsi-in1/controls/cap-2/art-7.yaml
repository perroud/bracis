id: art-7
family: cap-2
title: "Conteudo Minimo da POSIC"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 7. A POSIC deverá conter, no mínimo:
    I - escopo da política, incluindo os ativos de informação abrangidos;
    II - conceitos e definições utilizados no âmbito do órgão;
    III - estrutura de segurança da informação do órgão, incluindo a definição das
    competências de cada instância;
    IV - diretrizes de segurança da informação, incluindo tratamento da informação;
    V - responsabilidades dos agentes públicos e terceiros;
    VI - penalidades aplicáveis em caso de violação da política;
    VII - competências do gestor de segurança da informação;
    VIII - competências do comitê de segurança da informação;
    IX - competências da equipe de tratamento e resposta a incidentes cibernéticos.
guidance:
  prose: |
    O art. 7 define os nove elementos obrigatorios da POSIC, funcionando como
    checklist de completude.

    **Elementos obrigatorios:**
    1. Escopo e ativos (I): delimita o que esta coberto
    2. Conceitos (II): alinha terminologia do orgao com IN 1
    3. Estrutura (III): organograma de SI com competencias
    4. Diretrizes (IV): regras de uso e tratamento da informacao
    5. Responsabilidades (V): quem faz o que, incluindo terceiros
    6. Penalidades (VI): consequencias de violacao
    7-9. Competencias (VII-IX): gestor SI, comite, ETIR

    **Armadilha comum:**
    Muitos orgaos criam POSIC que copia o texto da IN 1 sem contextualizar.
    A POSIC deve ser especifica para o orgao, seus sistemas e seus riscos.

    **Mapeamento NIST:** PL-1, PM-1
    **Mapeamento ISO 27001:** Clausula 5.2, A.5.1 (Politicas de SI)
implementation_guidance:
  platform_engineering:
    prose: |
      **POSIC estruturada e validavel:**
      1. Modelar POSIC em formato estruturado (YAML/JSON) que permite validacao
         automatica de completude (todos os 9 itens presentes).
      2. Cada secao da POSIC vinculada a controles tecnicos rastreavei.
      3. Sistema de gestao documental com controle de versao e workflow de aprovacao.
      4. Template de POSIC com campos obrigatorios pre-definidos.
    tools:
      - document-management
      - policy-template-engine
      - compliance-validator
  devsecops:
    prose: |
      **Validacao continua da POSIC:**
      1. Checklist automatizado que valida completude da POSIC contra os 9 itens.
      2. Pipeline que verifica se controles tecnicos mapeiam para secoes da POSIC.
      3. Teste automatizado de cobertura: cada diretriz da POSIC tem pelo menos
         um controle tecnico correspondente.
      4. Alerta quando novo sistema e criado sem mapeamento para a POSIC.
    tools:
      - gitlab-ci
      - policy-validator
      - coverage-checker
  secops:
    prose: |
      **Manutencao da POSIC:**
      1. Revisao anual de cada secao da POSIC.
      2. Verificacao de que penalidades (inciso VI) estao alinhadas com regime
         disciplinar vigente.
      3. Atualizacao de responsabilidades quando ha mudanca organizacional.
      4. Validacao de que competencias do gestor, comite e ETIR estao claras.
    tools:
      - grc-platform
      - document-review
      - organizational-chart
