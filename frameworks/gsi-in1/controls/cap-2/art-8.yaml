id: art-8
family: cap-2
title: "Normas Complementares a POSIC"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 8. A POSIC poderá ser complementada por normas internas de segurança da
    informação que detalhem procedimentos e controles específicos, incluindo:
    I - normas de controle de acesso;
    II - normas de uso de recursos de TIC;
    III - normas de gestão de riscos de segurança da informação;
    IV - normas de tratamento de incidentes;
    V - normas de gestão de continuidade;
    VI - normas de criptografia;
    VII - normas de uso de dispositivos móveis;
    VIII - outras normas conforme a necessidade do órgão.
guidance:
  prose: |
    O art. 8 reconhece que a POSIC e documento estrategico e deve ser complementada
    por normas operacionais detalhadas.

    **Hierarquia documental:**
    - Nivel 1: POSIC (estrategico, aprovada pela autoridade maxima)
    - Nivel 2: Normas internas (tatico, aprovadas pelo comite de SI)
    - Nivel 3: Procedimentos operacionais (operacional, aprovados pelo gestor de SI)

    **Normas sugeridas (nao exaustivo):**
    - Controle de acesso: quem acessa o que, com que nivel
    - Uso de TIC: regras de uso aceitavel de recursos
    - Gestao de riscos: metodologia, periodicidade, responsaveis
    - Tratamento de incidentes: procedimentos da ETIR
    - Continuidade: BIA, planos de recuperacao
    - Criptografia: algoritmos, tamanhos de chave, gestao de certificados
    - Dispositivos moveis: BYOD, MDM, segmentacao

    **Mapeamento NIST:** PL-1, PM-1
    **Mapeamento ISO 27001:** A.5.1 (Politicas de SI)
implementation_guidance:
  platform_engineering:
    prose: |
      **Normas como codigo:**
      1. Repositorio hierarquico de normas versionado (POSIC > normas > procedimentos).
      2. Cada norma complementar traduzida em regras de policy-as-code executaveis.
      3. Norma de controle de acesso implementada em IAM (Identity and Access Management)
         com RBAC/ABAC automatizado.
      4. Norma de criptografia implementada como baseline de configuracao (TLS 1.3,
         AES-256, chaves RSA 4096).
    tools:
      - policy-as-code
      - iam
      - crypto-baseline
      - document-management
  devsecops:
    prose: |
      **Normas validadas em pipeline:**
      1. Cada norma complementar tem testes de conformidade automatizados.
      2. Pipeline verifica aderencia a norma de criptografia (ex: TLS minimo 1.2).
      3. Secret detection alinhado com norma de controle de acesso.
      4. Container security alinhado com norma de uso de recursos de TIC.
    tools:
      - gitlab-ci
      - policy-scanner
      - crypto-validator
      - compliance-tests
  secops:
    prose: |
      **Gestao de normas complementares:**
      1. Inventario de todas as normas complementares com data de ultima revisao.
      2. Calendario de revisao periodica (minimo anual).
      3. Verificacao de que normas estao acessiveis a todos os agentes publicos.
      4. Teste de conhecimento das normas em programas de conscientizacao.
    tools:
      - grc-platform
      - document-management
      - awareness-platform
