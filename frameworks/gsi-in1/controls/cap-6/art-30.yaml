id: art-30
family: cap-6
title: "Gestao de Vulnerabilidades"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 30. Os órgãos e entidades deverão implementar processo de gestão de
    vulnerabilidades, que inclua:
    I - varredura periódica de vulnerabilidades em sistemas e infraestrutura;
    II - classificação de vulnerabilidades por severidade e risco;
    III - tratamento tempestivo de vulnerabilidades conforme sua criticidade;
    IV - acompanhamento da aplicação de correções de segurança (patches);
    V - comunicação de vulnerabilidades críticas ao CTIR Gov.
guidance:
  prose: |
    O art. 30 exige programa formal de gestao de vulnerabilidades,
    fundamental para prevencao de incidentes.

    **Cinco elementos obrigatorios:**
    1. Varredura periodica: scanning ativo e continuo
    2. Classificacao: CVSS ou sistema equivalente de severidade
    3. Tratamento tempestivo: SLAs por criticidade
    4. Patch management: acompanhar aplicacao de correcoes
    5. Comunicacao ao CTIR Gov: vulnerabilidades criticas

    **SLAs recomendados de remediacao:**
    - Critico (CVSS 9.0-10.0): 24-48 horas
    - Alto (CVSS 7.0-8.9): 7 dias
    - Medio (CVSS 4.0-6.9): 30 dias
    - Baixo (CVSS 0.1-3.9): 90 dias

    **Mapeamento NIST:** RA-5 (Vulnerability Scanning), SI-2 (Flaw Remediation)
    **Mapeamento ISO 27001:** A.8.8 (Gestao de vulnerabilidades tecnicas)
implementation_guidance:
  platform_engineering:
    prose: |
      **Stack de gestao de vulnerabilidades:**
      1. Scanner de vulnerabilidades (Nessus, Qualys, OpenVAS) com varredura
         automatizada semanal.
      2. Plataforma de gestao de patches com deploy automatizado.
      3. Dashboard de vulnerabilidades com aging, SLA compliance e tendencias.
      4. Integracao com CMDB para priorizar remediacao por criticidade do ativo.
      5. Feed de vulnerabilidades do CTIR Gov integrado ao scanner.
    tools:
      - vulnerability-scanner
      - patch-management
      - vulnerability-dashboard
      - cmdb-integration
      - ctir-gov-feed
  devsecops:
    prose: |
      **Vulnerabilidades no pipeline:**
      1. SAST, DAST, SCA em todo pipeline CI/CD.
      2. Container scanning para imagens Docker.
      3. IaC scanning para infraestrutura como codigo.
      4. Gate de seguranca que bloqueia deploy com vulnerabilidades criticas.
      5. Dashboard de debito de seguranca por projeto.
    tools:
      - gitlab-ci
      - sast
      - dast
      - sca
      - container-scanning
      - iac-scanning
  secops:
    prose: |
      **Operacao de gestao de vulnerabilidades:**
      1. Varredura semanal de infraestrutura e mensal de aplicacoes.
      2. Monitoramento de SLAs de remediacao por severidade.
      3. Relatorio mensal de vulnerabilidades para o gestor de SI.
      4. Comunicacao imediata ao CTIR Gov de vulnerabilidades criticas em
         sistemas expostos a internet.
      5. Verificacao de completude de patch management.
    tools:
      - vulnerability-management
      - sla-tracking
      - patch-verification
      - ctir-gov-notification
