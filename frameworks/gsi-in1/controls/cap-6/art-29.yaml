id: art-29
family: cap-6
title: "Notificacao Interna de Incidentes"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 29. Os órgãos deverão estabelecer procedimentos de notificação interna
    de incidentes de segurança da informação, incluindo:
    I - canal de comunicação acessível a todos os agentes públicos para reporte
    de incidentes ou suspeitas;
    II - procedimento de escalação para incidentes de alta severidade;
    III - comunicação à autoridade máxima de incidentes com impacto significativo;
    IV - comunicação aos titulares de dados pessoais quando aplicável, conforme
    a Lei Geral de Proteção de Dados.
guidance:
  prose: |
    O art. 29 trata da comunicacao INTERNA de incidentes, complementando
    o art. 26 (notificacao ao CTIR Gov) e o art. 27 (registro).

    **Quatro obrigacoes de notificacao interna:**
    1. Canal acessivel: todos devem saber como reportar um incidente
    2. Escalacao: incidentes graves devem subir rapidamente na hierarquia
    3. Autoridade maxima: deve ser informada de incidentes significativos
    4. Titulares de dados: exigencia da LGPD (art. 48) quando ha vazamento
       de dados pessoais

    **Integracao com LGPD:**
    O inciso IV vincula o tratamento de incidentes com as obrigacoes da LGPD,
    exigindo notificacao a ANPD e aos titulares em caso de incidente com
    dados pessoais.

    **Mapeamento NIST:** IR-6 (Incident Reporting), IR-7 (Incident Response Assistance)
    **Mapeamento ISO 27001:** A.5.26 (Resposta a incidentes de SI)
implementation_guidance:
  platform_engineering:
    prose: |
      **Canais de notificacao interna:**
      1. Portal/formulario web acessivel na intranet para reporte de incidentes.
      2. Bot de chat (Slack/Teams/equivalente) para reporte rapido.
      3. Sistema de escalacao automatica baseado em severidade.
      4. Notificacao automatica a autoridade maxima para incidentes criticos.
      5. Integracao com modulo de LGPD para incidentes com dados pessoais.
    tools:
      - incident-reporting-portal
      - chatbot
      - auto-escalation
      - executive-notification
      - lgpd-module
  devsecops:
    prose: |
      **Notificacao automatizada:**
      1. Alertas de seguranca do pipeline roteados automaticamente para a ETIR.
      2. Integracao de alertas de monitoramento com sistema de escalacao.
      3. Runbook de notificacao para incidentes de dados pessoais (LGPD).
      4. Dashboard de incidentes abertos com status de notificacoes.
    tools:
      - gitlab-ci
      - alert-routing
      - lgpd-notification
      - incident-dashboard
  secops:
    prose: |
      **Gestao de notificacoes internas:**
      1. Procedimento documentado de escalacao com limites de tempo por severidade.
      2. Lista de contatos atualizada para cada nivel de escalacao.
      3. Verificacao de que todos os agentes publicos conhecem o canal de reporte.
      4. Procedimento especifico para incidentes com dados pessoais (LGPD art. 48).
    tools:
      - incident-management
      - escalation-matrix
      - lgpd-compliance
      - contact-management
