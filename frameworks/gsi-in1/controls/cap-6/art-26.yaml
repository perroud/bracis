id: art-26
family: cap-6
title: "Notificacao de Incidentes ao CTIR Gov"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 26. Os órgãos e entidades deverão notificar ao Centro de Tratamento e
    Resposta a Incidentes Cibernéticos de Governo (CTIR Gov) os incidentes de
    segurança da informação, observando:
    I - notificação imediata de incidentes de alto impacto;
    II - notificação em até 24 horas de incidentes de médio impacto;
    III - relatório consolidado mensal de incidentes de baixo impacto;
    IV - utilização dos canais e formatos definidos pelo CTIR Gov.

    Parágrafo único. O CTIR Gov poderá solicitar informações complementares
    sobre os incidentes notificados.
guidance:
  prose: |
    O art. 26 estabelece prazos e procedimentos de notificacao ao CTIR Gov,
    a entidade central de coordenacao de incidentes da APF.

    **Prazos de notificacao por impacto:**
    1. Alto impacto: imediato (tao logo quanto possivel)
    2. Medio impacto: ate 24 horas
    3. Baixo impacto: relatorio mensal consolidado

    **Canais do CTIR Gov:**
    - Portal: https://www.gov.br/ctir
    - E-mail: ctir@ctir.gov.br
    - Formulario padronizado de notificacao
    - MISP para compartilhamento de IOCs

    **Informacoes tipicas na notificacao:**
    - Descricao do incidente, data/hora, sistemas afetados
    - Impacto (dados comprometidos, indisponibilidade)
    - Acoes de contencao tomadas
    - IOCs identificados

    **Mapeamento NIST:** IR-6 (Incident Reporting)
    **Mapeamento ISO 27001:** A.5.26 (Resposta a incidentes de SI)
implementation_guidance:
  platform_engineering:
    prose: |
      **Integracao com CTIR Gov:**
      1. API de notificacao integrada ao sistema de incidentes para envio
         automatizado ao CTIR Gov.
      2. Templates de notificacao pre-preenchidos por tipo de incidente.
      3. MISP para compartilhamento automatizado de IOCs.
      4. Dashboard de status de notificacoes (enviadas, pendentes, com resposta).
    tools:
      - ctir-gov-api
      - notification-templates
      - misp
      - notification-dashboard
  devsecops:
    prose: |
      **Automacao de notificacao:**
      1. Pipeline que detecta incidentes de alto impacto e dispara notificacao
         automatica ao CTIR Gov.
      2. Coleta automatizada de IOCs (IPs, hashes, dominios) para notificacao.
      3. Relatorio mensal consolidado gerado automaticamente.
      4. Integracao STIX/TAXII para compartilhamento padronizado de inteligencia.
    tools:
      - gitlab-ci
      - ioc-collection
      - automated-reporting
      - stix-taxii
  secops:
    prose: |
      **Processo de notificacao:**
      1. Procedimento documentado de notificacao com fluxograma decisorio.
      2. Checklist de informacoes obrigatorias antes do envio.
      3. Registro de todas as notificacoes enviadas com protocolo de recebimento.
      4. Acompanhamento de solicitacoes de informacoes complementares do CTIR Gov.
      5. Participacao em alertas e orientacoes emitidos pelo CTIR Gov.
    tools:
      - incident-management
      - notification-tracking
      - ctir-gov-portal
