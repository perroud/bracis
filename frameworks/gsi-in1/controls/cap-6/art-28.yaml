id: art-28
family: cap-6
title: "Cooperacao no Tratamento de Incidentes"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 28. Os órgãos e entidades deverão cooperar entre si e com o CTIR Gov
    no tratamento de incidentes de segurança da informação, incluindo:
    I - compartilhamento de informações sobre ameaças e vulnerabilidades;
    II - coordenação de ações de resposta a incidentes que afetem múltiplos órgãos;
    III - participação na Rede Federal de Gestão de Incidentes Cibernéticos;
    IV - compartilhamento de boas práticas e lições aprendidas.
guidance:
  prose: |
    O art. 28 reforça o principio de cooperacao entre orgaos federais,
    reconhecendo que ameacas ciberneticas frequentemente afetam multiplos orgaos.

    **Formas de cooperacao:**
    1. Threat intelligence sharing: IOCs, TTPs, alertas
    2. Resposta coordenada: incidentes que afetam multiplos orgaos
    3. Rede Federal: participacao ativa na rede de gestao de incidentes
    4. Boas praticas: compartilhamento de controles eficazes, licoes aprendidas

    **Rede Federal de Gestao de Incidentes Ciberneticos:**
    Coordenada pelo CTIR Gov, conecta ETIRs de todos os orgaos federais
    para resposta coordenada e compartilhamento de inteligencia.

    **Mapeamento NIST:** PM-15 (Contacts with Security Groups), IR-7 (Incident Response Assistance)
    **Mapeamento ISO 27001:** A.5.5 (Contato com autoridades), A.5.6 (Contato com grupos especiais)
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de cooperacao:**
      1. Plataforma MISP para compartilhamento automatizado de IOCs.
      2. STIX/TAXII para interoperabilidade de inteligencia de ameacas.
      3. Canal seguro de comunicacao com CTIR Gov e outros orgaos.
      4. Portal de boas praticas acessivel a ETIRs de outros orgaos.
    tools:
      - misp
      - stix-taxii
      - secure-communication
      - best-practices-portal
  devsecops:
    prose: |
      **Automacao de cooperacao:**
      1. Feed de IOCs do CTIR Gov integrado aos scanners de seguranca do pipeline.
      2. Alertas automaticos baseados em threat intelligence compartilhada.
      3. Compartilhamento automatizado de vulnerabilidades zero-day detectadas.
      4. Participacao em exercicios ciberneticos coordenados pelo CTIR Gov.
    tools:
      - threat-intel-feed
      - ioc-integration
      - vulnerability-sharing
      - exercise-participation
  secops:
    prose: |
      **Operacao de cooperacao:**
      1. Ponto focal designado para a Rede Federal de Gestao de Incidentes.
      2. Participacao em reunioes periodicas da Rede Federal.
      3. Compartilhamento proativo de alertas e licoes aprendidas.
      4. Procedimento de resposta coordenada para incidentes multi-orgao.
    tools:
      - rede-federal-portal
      - threat-sharing
      - coordinated-response
