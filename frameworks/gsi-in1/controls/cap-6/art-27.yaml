id: art-27
family: cap-6
title: "Registro e Documentacao de Incidentes"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 27. A ETIR deverá manter registro detalhado de todos os incidentes de
    segurança da informação tratados, contendo:
    I - data e hora da detecção e do encerramento do incidente;
    II - descrição do incidente e dos ativos afetados;
    III - classificação de severidade;
    IV - ações de contenção, erradicação e recuperação realizadas;
    V - impacto confirmado ou estimado;
    VI - causa raiz identificada;
    VII - recomendações de melhoria.
guidance:
  prose: |
    O art. 27 exige documentacao completa de cada incidente para
    rastreabilidade, aprendizado e prestacao de contas.

    **Sete elementos obrigatorios do registro:**
    1. Datas: deteccao e encerramento (permite calcular MTTR)
    2. Descricao: o que aconteceu, o que foi afetado
    3. Severidade: critico, alto, medio, baixo
    4. Acoes: o que foi feito em cada fase
    5. Impacto: dados comprometidos, indisponibilidade, custos
    6. Causa raiz: root cause analysis (RCA)
    7. Recomendacoes: o que fazer para prevenir recorrencia

    **Metricas derivadas:**
    - MTTD (Mean Time to Detect): tempo medio de deteccao
    - MTTR (Mean Time to Respond/Recover): tempo medio de resposta/recuperacao
    - Tendencia de incidentes por tipo e severidade

    **Mapeamento NIST:** IR-5 (Incident Monitoring), IR-8 (Incident Response Plan)
    **Mapeamento ISO 27001:** A.5.27 (Aprendizado com incidentes)
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de registro de incidentes:**
      1. Ticketing system com campos obrigatorios alinhados aos 7 elementos do art. 27.
      2. Timeline automatica de eventos por incidente.
      3. Base de conhecimento de incidentes para consulta historica.
      4. Dashboard de metricas de incidentes (MTTD, MTTR, volume, tendencias).
    tools:
      - incident-ticketing
      - timeline-automation
      - knowledge-base
      - incident-metrics
  devsecops:
    prose: |
      **Registro integrado ao pipeline:**
      1. Incidentes de seguranca em producao automaticamente registrados no
         sistema de ticketing.
      2. Correlacao automatica entre vulnerabilidades do pipeline e incidentes.
      3. Template de post-mortem versionado em repositorio.
      4. Root cause analysis linkado a commits e mudancas de codigo.
    tools:
      - gitlab-ci
      - incident-correlation
      - postmortem-template
      - rca-tracking
  secops:
    prose: |
      **Operacao de registro:**
      1. Revisao de qualidade de registros de incidentes (completude dos 7 campos).
      2. Relatorio mensal de metricas de incidentes para gestor de SI e comite.
      3. Root cause analysis para todos os incidentes de severidade alta e critica.
      4. Revisao trimestral de recomendacoes de melhoria e status de implementacao.
    tools:
      - incident-management
      - metrics-reporting
      - rca-tool
      - improvement-tracking
