id: art-25
family: cap-6
title: "Processo de Tratamento de Incidentes"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 25. Cada órgão e entidade deverá implementar processo formal de tratamento
    de incidentes de segurança da informação, contemplando:
    I - detecção e registro de eventos de segurança;
    II - triagem e classificação de incidentes;
    III - análise e investigação de incidentes;
    IV - contenção, erradicação e recuperação;
    V - atividades pós-incidente, incluindo lições aprendidas;
    VI - preservação de evidências para eventual investigação.
guidance:
  prose: |
    O art. 25 define o ciclo completo de tratamento de incidentes, alinhado
    com o NIST Incident Response Lifecycle.

    **Seis fases obrigatorias:**
    1. Deteccao e registro: identificar e documentar o evento
    2. Triagem e classificacao: avaliar severidade e prioridade
    3. Analise e investigacao: entender o que aconteceu, como e por que
    4. Contencao/erradicacao/recuperacao: parar o ataque, remover a causa, restaurar
    5. Pos-incidente: licoes aprendidas, melhoria de controles
    6. Preservacao de evidencias: cadeia de custodia para investigacao

    **Classificacao de severidade (sugestao):**
    - Critico: comprometimento de dados classificados, indisponibilidade de servico critico
    - Alto: comprometimento de sistema importante, vazamento de dados pessoais
    - Medio: tentativa de ataque detectada e contida, vulnerabilidade explorada parcialmente
    - Baixo: eventos anomalos sem impacto confirmado

    **Mapeamento NIST:** IR-1, IR-4 (Incident Handling), IR-5 (Incident Monitoring)
    **Mapeamento ISO 27001:** A.5.24, A.5.25, A.5.26 (Resposta a incidentes), A.5.27 (Aprendizado)
implementation_guidance:
  platform_engineering:
    prose: |
      **Stack de tratamento de incidentes:**
      1. SIEM para deteccao e correlacao de eventos de seguranca.
      2. SOAR para automacao de playbooks de resposta.
      3. Ticketing system para registro e rastreamento de incidentes.
      4. Plataforma de forensics para investigacao e preservacao de evidencias.
      5. War room virtual para coordenacao de resposta a incidentes criticos.
    tools:
      - siem
      - soar
      - incident-ticketing
      - forensics-platform
      - war-room
  devsecops:
    prose: |
      **Resposta a incidentes no pipeline:**
      1. Alertas automaticos de seguranca do pipeline encaminhados a ETIR.
      2. Runbooks automatizados para tipos de incidentes comuns.
      3. Pipeline de forensics para coleta de logs e evidencias.
      4. Rollback automatizado como opcao de contencao rapida.
    tools:
      - gitlab-ci
      - alerting-pipeline
      - automated-runbooks
      - forensics-collection
      - rollback-automation
  secops:
    prose: |
      **Operacao de tratamento de incidentes:**
      1. Procedimento documentado para cada fase do ciclo de incidentes.
      2. Classificacao de severidade com SLAs de resposta definidos.
      3. Registro completo de cada incidente (timeline, acoes, resolucao).
      4. Reuniao de licoes aprendidas apos cada incidente significativo.
      5. Preservacao de evidencias conforme cadeia de custodia.
    tools:
      - incident-management
      - sla-management
      - evidence-preservation
      - lessons-learned
