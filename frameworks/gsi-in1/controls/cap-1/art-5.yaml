id: art-5
family: cap-1
title: "Responsabilidade da Autoridade Maxima"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 5. A autoridade máxima de cada órgão e entidade da Administração Pública
    Federal é responsável pela gestão de segurança da informação em seu âmbito de
    atuação, devendo:
    I - instituir a Política de Segurança da Informação e Comunicações (POSIC);
    II - designar o gestor de segurança da informação;
    III - instituir o comitê de segurança da informação;
    IV - instituir a equipe de tratamento e resposta a incidentes cibernéticos (ETIR);
    V - aprovar o plano de gestão de riscos de segurança da informação;
    VI - assegurar recursos adequados para a segurança da informação.
guidance:
  prose: |
    O art. 5 estabelece accountability no nivel mais alto do orgao. A autoridade
    maxima (ministro, presidente de autarquia, etc.) e pessoalmente responsavel.

    **Responsabilidades indelegaveis:**
    - Instituir POSIC (inciso I): documento formal, aprovado por ato da autoridade
    - Designar gestor de SI (inciso II): servidor efetivo, nomeado formalmente
    - Instituir comite de SI (inciso III): deliberativo, multidisciplinar
    - Instituir ETIR (inciso IV): operacional, tecnico
    - Aprovar gestao de riscos (inciso V): comprometimento formal
    - Assegurar recursos (inciso VI): orcamento, pessoas, tecnologia

    **Mapeamento NIST:** PM-2 (Senior Information Security Officer), PM-3 (Resources)
    **Mapeamento ISO 27001:** Clausula 5.1 (Lideranca), 5.3 (Papeis organizacionais)
implementation_guidance:
  platform_engineering:
    prose: |
      **Suporte a governanca:**
      1. Dashboard executivo de SI para a autoridade maxima com indicadores-chave.
      2. Portal de governanca com status de conformidade, riscos pendentes e
         incidentes criticos.
      3. Workflow automatizado de aprovacao de documentos de SI (POSIC, plano de
         riscos) com assinatura digital.
      4. Controle de acesso que reflete a estrutura de governanca (autoridade maxima,
         gestor SI, comite, ETIR).
    tools:
      - grc-dashboard
      - document-workflow
      - digital-signature
      - rbac
  devsecops:
    prose: |
      **Governanca em codigo:**
      1. Repositorio central de politicas de SI versionado (GitOps para politicas).
      2. Pipeline de aprovacao de politicas com revisao obrigatoria do gestor de SI.
      3. Rastreabilidade de aprovacoes via merge requests com assinatura digital.
      4. Relatorio automatizado de compliance para a autoridade maxima.
    tools:
      - gitlab-ci
      - policy-as-code
      - compliance-reporting
  secops:
    prose: |
      **Suporte operacional a governanca:**
      1. Relatorio mensal para autoridade maxima com metricas de SI.
      2. Briefing executivo trimestral de riscos ciberneticos.
      3. Acompanhamento de designacao formal de gestor de SI, comite e ETIR.
      4. Verificacao de que recursos orcamentarios para SI estao alocados.
    tools:
      - grc-platform
      - executive-reporting
      - resource-tracking
