id: art-1
family: cap-1
title: "Objeto e Ambito de Aplicacao"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 1. Esta Instrução Normativa dispõe sobre a Estrutura de Gestão da Segurança
    da Informação nos órgãos e entidades da Administração Pública Federal, direta e
    indireta, no âmbito da Política Nacional de Segurança da Informação.

    Parágrafo único. Aplica-se esta norma a todos os órgãos e entidades da Administração
    Pública Federal, direta e indireta, que utilizem recursos de tecnologia da
    informação e comunicações.
guidance:
  prose: |
    O art. 1 delimita o escopo da IN GSI/PR 1 como regulamentacao da PNSI
    (Decreto 9.637/2018) para toda a APF.

    **Abrangencia:**
    - Administracao direta: ministerios, secretarias, orgaos da Presidencia
    - Administracao indireta: autarquias, fundacoes, empresas publicas, sociedades
      de economia mista
    - Qualquer entidade que use recursos de TIC no ambito federal

    **Relacao com PNSI:**
    A IN 1 operacionaliza o Decreto 9.637/2018 que institui a PNSI,
    detalhando COMO os orgaos devem implementar a governanca de SI.

    **Mapeamento NIST:** PM-1 (Information Security Program Plan)
    **Mapeamento ISO 27001:** Clausula 1 (Escopo), Clausula 4 (Contexto da organizacao)
implementation_guidance:
  platform_engineering:
    prose: |
      **Inventario de ativos e escopo:**
      1. Manter catalogo centralizado de todos os sistemas e ativos de TIC do orgao.
      2. Implementar CMDB (Configuration Management Database) com classificacao de
         ativos por criticidade e sensibilidade.
      3. Integrar CMDB com ferramentas de descoberta automatica de ativos (network
         scanning, cloud asset inventory).
      4. Manter registro de todos os ambientes (producao, homologacao, desenvolvimento)
         sujeitos a esta norma.
    tools:
      - cmdb
      - asset-discovery
      - cloud-asset-inventory
  devsecops:
    prose: |
      **Compliance-as-code para escopo:**
      1. Codificar politicas de compliance em pipelines CI/CD para garantir que
         todos os repositorios do orgao estejam em conformidade.
      2. Implementar tags e labels nos repositorios para classificacao de criticidade.
      3. Pipeline de onboarding automatizado para novos sistemas que inclui
         checklist de conformidade com a IN 1.
      4. Dashboard de cobertura: percentual de sistemas do orgao cobertos pelos
         controles de SI.
    tools:
      - gitlab-ci
      - compliance-pipeline
      - policy-as-code
  secops:
    prose: |
      **Governanca e escopo operacional:**
      1. Manter inventario atualizado de orgaos e entidades sob escopo.
      2. Verificar periodicamente se novos sistemas foram incorporados ao escopo.
      3. Relatorio trimestral de cobertura da IN 1 sobre os ativos do orgao.
      4. Procedimento de inclusao/exclusao de ativos no escopo de SI.
    tools:
      - grc-platform
      - asset-inventory
      - compliance-dashboard
