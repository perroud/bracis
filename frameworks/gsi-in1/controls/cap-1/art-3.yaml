id: art-3
family: cap-1
title: "Principios de Seguranca da Informacao"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 3. A gestão de segurança da informação nos órgãos e entidades da Administração
    Pública Federal deve observar os seguintes princípios:
    I - disponibilidade: propriedade pela qual a informação esteja acessível e
    utilizável sob demanda por uma pessoa física ou por determinado sistema, órgão
    ou entidade devidamente autorizados;
    II - integridade: propriedade pela qual a informação não foi modificada ou destruída
    de maneira não autorizada ou acidental;
    III - confidencialidade: propriedade pela qual a informação não esteja disponível
    ou não seja revelada a pessoa física, sistema, órgão ou entidade não autorizados;
    IV - autenticidade: propriedade pela qual se pode garantir a identidade de uma
    pessoa física ou de determinado sistema, órgão ou entidade.
guidance:
  prose: |
    O art. 3 estabelece os quatro pilares fundamentais de SI (DICA) que fundamentam
    todos os demais controles da norma.

    **Os quatro pilares:**
    1. Disponibilidade (Availability): sistemas e dados acessiveis quando necessario
    2. Integridade (Integrity): dados nao alterados sem autorizacao
    3. Confidencialidade (Confidentiality): acesso restrito a autorizados
    4. Autenticidade (Authenticity): identidade verificavel de usuarios e sistemas

    **Diferenca para a triade CIA:**
    A IN 1 adiciona Autenticidade aos tres pilares tradicionais (CIA triad),
    alinhando-se com a doutrina brasileira de SI que trata DICA como conjunto
    indissociavel.

    **Mapeamento NIST:** Alinhado com NIST SP 800-53 Security Objectives
    **Mapeamento ISO 27001:** Clausula 5.2 (Politica), Annex A controles
implementation_guidance:
  platform_engineering:
    prose: |
      **Implementacao dos quatro pilares:**
      1. Disponibilidade: arquitetura com alta disponibilidade (HA), balanceamento
         de carga, replicacao de dados, failover automatico.
      2. Integridade: checksums, assinaturas digitais, controle de versao,
         immutable infrastructure.
      3. Confidencialidade: criptografia em repouso e transito, controle de acesso
         baseado em papeis (RBAC), segmentacao de rede.
      4. Autenticidade: autenticacao multifator (MFA), certificados digitais ICP-Brasil,
         tokens de autenticacao, SSO federado.
    tools:
      - load-balancer
      - encryption-at-rest
      - mfa-provider
      - pki-icp-brasil
  devsecops:
    prose: |
      **Pilares no pipeline:**
      1. Disponibilidade: testes de resiliencia, chaos engineering em staging.
      2. Integridade: assinatura de artefatos, SBOM (Software Bill of Materials),
         verificacao de integridade em deploy.
      3. Confidencialidade: secret detection no pipeline, varredura de dados
         sensiveis em repositorios.
      4. Autenticidade: commits assinados, verificacao de identidade em MR/PR.
    tools:
      - gitlab-ci
      - sigstore
      - secret-detection
      - sbom-generator
  secops:
    prose: |
      **Monitoramento dos pilares:**
      1. Disponibilidade: SLA monitoring, uptime dashboards, alertas de indisponibilidade.
      2. Integridade: FIM (File Integrity Monitoring), deteccao de alteracoes nao
         autorizadas, audit logs.
      3. Confidencialidade: DLP (Data Loss Prevention), monitoramento de vazamentos,
         classificacao de dados.
      4. Autenticidade: logs de autenticacao, deteccao de fraude de identidade,
         revisao de acessos.
    tools:
      - siem
      - fim
      - dlp
      - identity-monitoring
