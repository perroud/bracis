id: art-2
family: cap-1
title: "Definicoes e Conceitos"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 2. Para os efeitos desta Instrução Normativa, ficam estabelecidas as seguintes
    definições:
    I - ativo de informação: meios de armazenamento, transmissão e processamento da
    informação, os equipamentos necessários a isso, os sistemas utilizados para tal,
    os locais onde se encontram esses meios, os recursos humanos que a eles têm acesso
    e a informação propriamente dita;
    II - equipe de tratamento e resposta a incidentes cibernéticos (ETIR): grupo de
    pessoas com a responsabilidade de receber, analisar e responder a notificações e
    atividades relacionadas a incidentes de segurança da informação;
    III - gestor de segurança da informação: servidor efetivo designado pelo órgão para
    coordenar as ações de segurança da informação;
    IV - incidente de segurança da informação: qualquer evento adverso, confirmado ou
    sob suspeita, relacionado à segurança dos sistemas de informação;
    V - política de segurança da informação (POSIC): documento aprovado pela autoridade
    máxima do órgão que declara o comprometimento e as diretrizes de SI;
    VI - segurança da informação: ações que objetivam viabilizar e assegurar a
    disponibilidade, integridade, confidencialidade e autenticidade da informação.
guidance:
  prose: |
    O art. 2 padroniza a terminologia de SI para toda a APF, evitando ambiguidades
    entre orgaos.

    **Conceitos-chave:**
    1. Ativo de informacao: conceito amplo, inclui hardware, software, dados, pessoas
       e instalacoes fisicas
    2. ETIR: equivale ao CSIRT/CERT em terminologia internacional
    3. Gestor de SI: deve ser servidor efetivo (nao comissionado ou terceirizado)
    4. POSIC: documento de nivel estrategico, aprovado pela autoridade maxima

    **Alinhamento internacional:**
    - ETIR ≈ CSIRT (Computer Security Incident Response Team) do NIST
    - POSIC ≈ Information Security Policy da ISO 27001
    - Ativo de informacao ≈ Information asset da ISO 27001

    **Mapeamento NIST:** PM-1, PM-2 (Senior Information Security Officer)
    **Mapeamento ISO 27001:** Clausula 3 (Termos e definicoes)
implementation_guidance:
  platform_engineering:
    prose: |
      **Taxonomia e classificacao:**
      1. Implementar taxonomia padronizada de ativos no CMDB alinhada com as
         definicoes do art. 2.
      2. Classificar ativos em categorias: hardware, software, dados, pessoas,
         instalacoes, conforme definicao de ativo de informacao.
      3. Criar servico de glossario acessivel via API para padronizar termos
         em todos os sistemas do orgao.
      4. Manter modelo de dados que represente os papeis definidos (gestor SI,
         membros ETIR) com seus respectivos acessos.
    tools:
      - cmdb
      - identity-management
      - data-catalog
  devsecops:
    prose: |
      **Padronizacao em pipelines:**
      1. Templates de pipeline que referenciam terminologia padronizada da IN 1.
      2. Labels de classificacao de ativos nos repositorios (critico, alto, medio, baixo).
      3. Documentacao automatica de ativos de informacao por sistema via pipeline.
      4. Validacao de que cada repositorio tem proprietario e gestor definidos.
    tools:
      - gitlab-ci
      - documentation-pipeline
      - labeling-automation
  secops:
    prose: |
      **Operacionalizacao das definicoes:**
      1. Manter glossario de SI do orgao alinhado com art. 2 e acessivel a todos.
      2. Treinar equipes sobre a terminologia padronizada.
      3. Mapear todos os ativos de informacao conforme as categorias definidas.
      4. Registrar formalmente os papeis de gestor de SI e membros da ETIR.
    tools:
      - grc-platform
      - training-platform
      - asset-inventory
