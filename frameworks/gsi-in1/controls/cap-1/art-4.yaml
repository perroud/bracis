id: art-4
family: cap-1
title: "Diretrizes Gerais de Seguranca da Informacao"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 4. A gestão de segurança da informação nos órgãos e entidades da Administração
    Pública Federal deve observar as seguintes diretrizes:
    I - implementar controles de segurança da informação proporcionais ao risco;
    II - adotar medidas de proteção compatíveis com a classificação da informação;
    III - assegurar a continuidade do negócio e minimizar os danos decorrentes de
    incidentes de segurança;
    IV - prevenir e reduzir o impacto de incidentes de segurança da informação;
    V - promover a cooperação entre órgãos e entidades na gestão de segurança;
    VI - integrar a segurança da informação aos processos organizacionais.
guidance:
  prose: |
    O art. 4 estabelece as diretrizes que orientam a implementacao de SI em toda
    a APF, priorizando proporcionalidade e integracao.

    **Principio da proporcionalidade (inciso I):**
    Controles devem ser proporcionais ao risco — orgaos com dados mais sensiveis
    exigem controles mais rigorosos. Evita tanto sub-protecao quanto excesso de
    controle que paralisa operacoes.

    **Cooperacao (inciso V):**
    Orgaos devem compartilhar informacoes de ameacas e boas praticas, especialmente
    via CTIR Gov e Rede Federal de Gestao de Incidentes Ciberneticos.

    **Mapeamento NIST:** PM-1, PM-9 (Risk Management Strategy)
    **Mapeamento ISO 27001:** Clausula 5.1 (Lideranca e comprometimento), 6.1 (Riscos e oportunidades)
implementation_guidance:
  platform_engineering:
    prose: |
      **Proporcionalidade e integracao:**
      1. Implementar framework de classificacao de sistemas (baixo, medio, alto impacto)
         que determina automaticamente os controles aplicaveis.
      2. Automatizar provisionamento de controles por nivel de classificacao
         (ex: sistemas de alto impacto recebem WAF, IDS, MFA automaticamente).
      3. Integrar seguranca no ciclo de vida de desenvolvimento (security by design).
      4. Plataforma de compartilhamento de IOCs (Indicators of Compromise) entre orgaos.
    tools:
      - security-classification-engine
      - automated-provisioning
      - threat-intelligence-sharing
  devsecops:
    prose: |
      **Seguranca proporcional no pipeline:**
      1. Perfis de pipeline por classificacao de sistema (basico, avancado, critico).
      2. Sistemas criticos: SAST + DAST + SCA + container scan + secret detection.
      3. Sistemas basicos: SAST + secret detection como minimo.
      4. Gate de seguranca proporcional ao risco antes de deploy em producao.
    tools:
      - gitlab-ci
      - security-gates
      - risk-based-pipeline
  secops:
    prose: |
      **Operacoes de seguranca proporcionais:**
      1. Classificar todos os sistemas do orgao por nivel de impacto.
      2. SLAs de resposta a incidentes proporcionais a criticidade do sistema.
      3. Monitoramento intensificado para sistemas de alto impacto.
      4. Participacao ativa na Rede Federal de Gestao de Incidentes Ciberneticos.
    tools:
      - grc-platform
      - siem
      - threat-intelligence
