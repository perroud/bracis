id: art-31
family: cap-7
title: "Verificacao de Conformidade em SI"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 31. Cada órgão e entidade deverá realizar verificações periódicas de
    conformidade em segurança da informação, abrangendo:
    I - aderência à POSIC e às normas internas de SI;
    II - conformidade com as normas do GSI/PR;
    III - conformidade com legislação aplicável;
    IV - eficácia dos controles de segurança da informação implementados;
    V - status de implementação das recomendações de auditorias anteriores.
guidance:
  prose: |
    O art. 31 estabelece a obrigacao de verificacoes periodicas de
    conformidade como mecanismo de governanca.

    **Cinco dimensoes de verificacao:**
    1. POSIC: controles internos estao alinhados com a politica
    2. Normas GSI/PR: aderencia a IN 1, IN 3, e demais normas
    3. Legislacao: LGPD, LAI, Marco Civil, decretos
    4. Eficacia dos controles: controles implementados estao funcionando
    5. Recomendacoes: achados de auditorias anteriores foram tratados

    **Diferenca entre verificacao e auditoria:**
    - Verificacao: autoavaliacao do orgao (primeira linha)
    - Auditoria: avaliacao independente (segunda/terceira linha)

    **Mapeamento NIST:** CA-2 (Security Assessments), CA-7 (Continuous Monitoring)
    **Mapeamento ISO 27001:** Clausula 9.1 (Monitoramento e medicao), 9.2 (Auditoria interna)
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao de conformidade:**
      1. Plataforma GRC com modulo de compliance automatizado.
      2. Dashboards de conformidade com status por controle e por norma.
      3. Varredura automatizada de configuracoes contra baselines de seguranca.
      4. Integracao com scanners para alimentar verificacao de eficacia de controles.
      5. Rastreamento automatizado de recomendacoes de auditorias.
    tools:
      - grc-platform
      - compliance-scanner
      - configuration-audit
      - recommendation-tracker
  devsecops:
    prose: |
      **Conformidade continua no pipeline:**
      1. Compliance-as-code: politicas de SI codificadas e validadas em cada deploy.
      2. Security gates que verificam aderencia a baselines de seguranca.
      3. Relatorio automatizado de conformidade por projeto/sistema.
      4. Pipeline de auditoria que verifica estado de controles periodicamente.
    tools:
      - gitlab-ci
      - policy-as-code
      - security-gates
      - compliance-reporting
  secops:
    prose: |
      **Operacao de verificacao de conformidade:**
      1. Checklist de verificacao trimestral de aderencia a POSIC.
      2. Autoavaliacao anual de conformidade com normas do GSI/PR.
      3. Monitoramento de eficacia de controles com metricas definidas.
      4. Registro e acompanhamento de achados e recomendacoes.
    tools:
      - grc-platform
      - compliance-checklist
      - control-effectiveness
      - findings-management
