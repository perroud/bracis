id: art-35
family: cap-7
title: "Melhoria Continua de SI"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 35. Os órgãos e entidades deverão implementar processo de melhoria
    contínua da segurança da informação, baseado em:
    I - resultados de auditorias e verificações de conformidade;
    II - análise de incidentes e lições aprendidas;
    III - evolução das ameaças e do cenário de segurança cibernética;
    IV - mudanças tecnológicas e organizacionais;
    V - recomendações do GSI/PR e do CTIR Gov.

    Parágrafo único. O processo de melhoria contínua deve ser documentado e
    integrado ao ciclo PDCA (Plan-Do-Check-Act) de gestão de SI.
guidance:
  prose: |
    O art. 35 fecha o ciclo de governanca de SI com melhoria continua,
    alinhado ao PDCA da ISO 27001.

    **Cinco fontes de melhoria:**
    1. Auditorias: achados e recomendacoes alimentam melhorias
    2. Incidentes: cada incidente e oportunidade de aprendizado
    3. Ameacas: cenario muda, controles devem acompanhar
    4. Mudancas: novas tecnologias, novas estruturas
    5. GSI/PR e CTIR Gov: orientacoes e alertas

    **Ciclo PDCA:**
    - Plan: planejar controles e acoes de SI
    - Do: implementar os controles
    - Check: verificar eficacia (auditorias, indicadores)
    - Act: corrigir, melhorar, adaptar

    **Mapeamento NIST:** PM-4 (Plan of Action and Milestones)
    **Mapeamento ISO 27001:** Clausula 10 (Melhoria), 10.1 (Nao conformidade e acao corretiva), 10.2 (Melhoria continua)
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de melhoria continua:**
      1. Plataforma de gestao de acoes corretivas e preventivas (CAPA).
      2. Feed de threat intelligence para acompanhar evolucao de ameacas.
      3. Benchmarking de maturidade de SI com modelos reconhecidos.
      4. Integracao de todas as fontes de melhoria em registro centralizado.
    tools:
      - capa-system
      - threat-intelligence
      - maturity-model
      - improvement-registry
  devsecops:
    prose: |
      **Melhoria continua no desenvolvimento:**
      1. Retrospectivas de seguranca apos cada release significativa.
      2. Evolucao de baselines de seguranca conforme novas ameacas.
      3. Atualizacao de regras de SAST/DAST conforme novas vulnerabilidades.
      4. Pipeline de benchmark de seguranca (comparar com releases anteriores).
    tools:
      - gitlab-ci
      - security-retrospectives
      - baseline-evolution
      - security-benchmarking
  secops:
    prose: |
      **Operacao de melhoria continua:**
      1. Plano de acao com milestones para cada recomendacao de auditoria.
      2. Revisao trimestral do plano de acoes pelo comite de SI.
      3. Acompanhamento de orientacoes do GSI/PR e CTIR Gov.
      4. Relatorio de evolucao de maturidade de SI ao longo do tempo.
    tools:
      - grc-platform
      - action-plan
      - maturity-tracking
      - gsi-pr-monitoring
