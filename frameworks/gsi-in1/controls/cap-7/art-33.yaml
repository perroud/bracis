id: art-33
family: cap-7
title: "Indicadores de Seguranca da Informacao"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 33. Cada órgão e entidade deverá definir e acompanhar indicadores de
    desempenho de segurança da informação, incluindo no mínimo:
    I - nível de conformidade com a POSIC e normas internas;
    II - número e severidade de incidentes de segurança;
    III - tempo médio de resposta a incidentes;
    IV - percentual de ativos inventariados e classificados;
    V - percentual de agentes públicos capacitados em SI;
    VI - status de implementação dos controles de segurança.
guidance:
  prose: |
    O art. 33 exige metricas formais de SI, essenciais para gestao
    baseada em evidencias.

    **Seis indicadores minimos:**
    1. Conformidade: % de aderencia a POSIC e normas
    2. Incidentes: quantidade, tendencia, severidade
    3. Tempo de resposta: MTTD, MTTR (metricas operacionais)
    4. Inventario: % de ativos catalogados e classificados
    5. Capacitacao: % de servidores que completaram treinamento
    6. Controles: % de controles implementados vs. planejados

    **Boas praticas:**
    - KPIs com metas definidas e acompanhados mensalmente
    - Dashboard acessivel ao gestor de SI e comite
    - Tendencias (melhorando, piorando, estavel)
    - Benchmarking com outros orgaos (quando possivel)

    **Mapeamento NIST:** PM-6 (Measures of Performance)
    **Mapeamento ISO 27001:** Clausula 9.1 (Monitoramento, medicao, analise e avaliacao)
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de metricas de SI:**
      1. Dashboard centralizado com todos os indicadores do art. 33.
      2. Coleta automatizada de dados para calcular indicadores.
      3. Alertas quando indicadores caem abaixo de thresholds definidos.
      4. Relatorios periodicos automatizados para gestor de SI e comite.
      5. API de metricas para integracao com outros sistemas.
    tools:
      - metrics-dashboard
      - data-collection
      - alerting
      - automated-reporting
  devsecops:
    prose: |
      **Metricas de seguranca de desenvolvimento:**
      1. SAST/DAST findings por sprint/release.
      2. Tempo medio de remediacao de vulnerabilidades por severidade.
      3. Cobertura de testes de seguranca por projeto.
      4. Debito de seguranca (vulnerabilidades abertas por tempo).
    tools:
      - gitlab-ci
      - security-metrics
      - vulnerability-aging
      - coverage-tracking
  secops:
    prose: |
      **Operacao de indicadores:**
      1. Coleta mensal de dados para todos os indicadores obrigatorios.
      2. Analise de tendencias e identificacao de areas de melhoria.
      3. Relatorio trimestral de indicadores para o comite de SI.
      4. Relatorio anual de desempenho de SI para a autoridade maxima.
      5. Benchmark com indices do GSI/PR quando disponivel.
    tools:
      - grc-platform
      - metrics-collection
      - trend-analysis
      - benchmarking
