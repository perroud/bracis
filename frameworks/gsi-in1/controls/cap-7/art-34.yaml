id: art-34
family: cap-7
title: "Relatorio Anual de SI"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 34. O gestor de segurança da informação deverá elaborar relatório anual
    de segurança da informação, a ser submetido ao comitê de SI e à autoridade
    máxima, contendo:
    I - resumo executivo da postura de segurança da informação do órgão;
    II - resultados dos indicadores de desempenho;
    III - incidentes significativos e lições aprendidas;
    IV - resultados de auditorias e verificações de conformidade;
    V - ações realizadas e planejadas;
    VI - necessidades de recursos para o próximo período.
guidance:
  prose: |
    O art. 34 exige prestacao de contas formal e periodica da gestao de SI,
    consolidando um ano de atividades.

    **Seis secoes obrigatorias do relatorio:**
    1. Resumo executivo: visao geral da postura de SI (para autoridade maxima)
    2. Indicadores: resultados dos KPIs do art. 33
    3. Incidentes: casos significativos e aprendizados
    4. Auditorias: achados e status de remediacoes
    5. Acoes: o que foi feito e o que esta planejado
    6. Recursos: necessidades de orcamento, pessoal, tecnologia

    **Publico-alvo:**
    - Autoridade maxima: resumo executivo + necessidades de recursos
    - Comite de SI: relatorio completo para deliberacao
    - Gestor de SI: base para planejamento do proximo periodo

    **Mapeamento NIST:** PM-6 (Measures of Performance)
    **Mapeamento ISO 27001:** Clausula 9.3 (Analise critica pela direcao)
implementation_guidance:
  platform_engineering:
    prose: |
      **Geracao automatizada de relatorio:**
      1. Template de relatorio anual com dados coletados automaticamente
         de dashboards e sistemas de GRC.
      2. Consolidacao automatica de metricas do ano.
      3. Graficos e tendencias gerados automaticamente.
      4. Workflow de aprovacao: gestor SI → comite → autoridade maxima.
    tools:
      - report-generator
      - data-consolidation
      - visualization
      - approval-workflow
  devsecops:
    prose: |
      **Dados de seguranca para o relatorio:**
      1. Consolidacao automatizada de achados de seguranca do ano.
      2. Estatisticas de vulnerabilidades (encontradas, remediadas, pendentes).
      3. Metricas de maturidade de seguranca de desenvolvimento.
      4. Evolucao de cobertura de testes de seguranca.
    tools:
      - gitlab-ci
      - security-statistics
      - maturity-metrics
      - coverage-evolution
  secops:
    prose: |
      **Elaboracao do relatorio:**
      1. Consolidacao de dados de incidentes, auditorias, conformidade e capacitacao.
      2. Analise de tendencias e evolucao em relacao ao ano anterior.
      3. Proposta de necessidades de recursos fundamentada em dados.
      4. Apresentacao ao comite de SI e a autoridade maxima.
    tools:
      - grc-platform
      - annual-reporting
      - resource-justification
      - executive-presentation
