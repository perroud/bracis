id: art-32
family: cap-7
title: "Auditoria Interna de SI"
class: GSI-IN1
baselines: [apf-federal]
statement:
  prose: |
    Art. 32. Os órgãos e entidades deverão incluir a segurança da informação no
    plano anual de auditoria interna, contemplando:
    I - avaliação da eficácia da estrutura de governança de SI;
    II - verificação da implementação dos controles de segurança;
    III - avaliação da gestão de riscos de SI;
    IV - verificação do processo de tratamento de incidentes;
    V - avaliação do programa de capacitação e conscientização.

    Parágrafo único. As auditorias internas de SI devem ser conduzidas por
    profissionais independentes da área auditada.
guidance:
  prose: |
    O art. 32 exige que SI faca parte do plano de auditoria interna do
    orgao, com escopo definido.

    **Cinco areas de auditoria:**
    1. Governanca: gestor, comite, ETIR estao funcionando?
    2. Controles: controles tecnicos e processuais estao implementados?
    3. Riscos: metodologia aplicada, registro atualizado?
    4. Incidentes: processo funciona, notificacoes foram feitas?
    5. Capacitacao: programa existe, servidores participam?

    **Independencia:**
    Auditores nao podem auditar area onde atuam. Pode ser
    auditoria interna do orgao (CGU-setorial) ou externa.

    **Mapeamento NIST:** CA-2 (Security Assessments)
    **Mapeamento ISO 27001:** Clausula 9.2 (Auditoria interna)
implementation_guidance:
  platform_engineering:
    prose: |
      **Suporte tecnologico a auditoria:**
      1. Coleta automatizada de evidencias para auditoria (logs, configs, reports).
      2. Dashboard de auditoria com status de achados e remediacoes.
      3. Repositorio de evidencias com controle de integridade.
      4. Ferramentas de analise automatizada de configuracoes e logs.
    tools:
      - evidence-collection
      - audit-dashboard
      - evidence-repository
      - automated-analysis
  devsecops:
    prose: |
      **Evidencias automatizadas para auditoria:**
      1. Pipeline que gera relatorios de seguranca como evidencias de auditoria.
      2. Historico completo de scans de seguranca (SAST, DAST, SCA).
      3. Registros de aprovacoes e revisoes em merge requests.
      4. Logs de deploy com rastreabilidade de mudancas.
    tools:
      - gitlab-ci
      - security-reports
      - mr-audit-trail
      - deploy-logs
  secops:
    prose: |
      **Suporte operacional a auditoria:**
      1. Preparacao de evidencias conforme escopo da auditoria.
      2. Acompanhamento de achados e prazos de remediacao.
      3. Plano de acao para cada achado com responsavel e prazo.
      4. Relatorio de status de remediacoes para o comite de SI.
    tools:
      - grc-platform
      - findings-management
      - remediation-tracking
      - compliance-reporting
