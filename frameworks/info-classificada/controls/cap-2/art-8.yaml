id: art-8
family: cap-2
title: "Security Investigation Procedures"
class: INFO-CLASSIFICADA
baselines: [government-all, defense, intelligence]
statement:
  prose: |
    Art. 8. O procedimento de credenciamento de segurança incluirá
    investigação sobre a vida pregressa e o comportamento na sociedade
    e na vida funcional do pretendente, buscando verificar:

    I - a existência de antecedentes criminais;
    II - a existência de antecedentes negativos nos assentamentos
    funcionais;
    III - a existência de processos ou inquéritos de qualquer natureza;
    IV - a situação fiscal e financeira;
    V - a situação no serviço militar;
    VI - o vínculo ou relacionamento com governos e organizações
    estrangeiras; e
    VII - outros aspectos relevantes, a critério do Núcleo de Segurança
    e Credenciamento.

    Parágrafo único. O Gabinete de Segurança Institucional da Presidência
    da República regulamentará os procedimentos de investigação para
    credenciamento de segurança.
guidance:
  prose: |
    Article 8 defines the background investigation scope for security
    clearance candidates. The investigation covers seven mandatory areas:

    **Investigation checklist:**
    1. Criminal records
    2. Negative functional records (workplace incidents)
    3. Ongoing legal proceedings or inquiries
    4. Financial and tax standing
    5. Military service status
    6. Foreign government/organization ties
    7. Any other relevant aspects (catch-all clause)

    **Process ownership:**
    The NSC within GSI/PR conducts the investigation and establishes
    detailed procedures. Individual agencies cannot conduct their own
    clearance investigations.

    **Digital implications:**
    While the investigation itself is a human process, systems must
    support it by maintaining structured records and integrating with
    government databases for automated checks where available.
implementation_guidance:
  platform_engineering:
    prose: |
      **Clearance investigation support systems:**
      1. Implement a clearance request workflow that collects the required
         investigation data points from the candidate.
      2. Integrate with available government databases for automated
         preliminary checks (criminal records, tax status, military status).
      3. Implement secure document upload for investigation evidence
         with encryption at rest and strict access controls.
      4. Maintain investigation status tracking: pending, in-progress,
         approved, denied, expired.
    tools:
      - workflow-engine
      - government-api-integration
      - secure-document-store
      - status-tracking
  devsecops:
    prose: |
      **Investigation data protection:**
      1. Classify all investigation data as at least reservado — it
         contains sensitive personal information.
      2. Implement data retention policies for investigation records
         aligned with the decree and LGPD requirements.
      3. Ensure investigation databases have full audit trails and
         tamper-evident logging.
    tools:
      - data-classification
      - retention-policies
      - audit-logging
  secops:
    prose: |
      **Investigation process governance:**
      1. Coordinate with NSC/GSI for all clearance investigations,
         acting as the agency liaison.
      2. Maintain records of all investigation requests, outcomes,
         and timelines for compliance reporting.
      3. Implement periodic re-investigation triggers: role changes,
         reported incidents, or scheduled renewals.
      4. Protect investigation files with need-to-know access restricted
         to the security officer and designated investigators.
    tools:
      - grc-platform
      - investigation-management
      - secure-file-storage
