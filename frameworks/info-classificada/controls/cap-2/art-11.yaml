id: art-11
family: cap-2
title: "Organizational Security Clearance"
class: INFO-CLASSIFICADA
baselines: [government-all, defense, intelligence]
statement:
  prose: |
    Art. 11. O credenciamento de segurança de órgãos e entidades públicas
    ou privadas, para o tratamento de informação classificada, será
    concedido pelo Núcleo de Segurança e Credenciamento, do Gabinete de
    Segurança Institucional da Presidência da República, observados os
    seguintes requisitos:

    I - comprovação de aptidão para o tratamento de informação
    classificada, incluindo a existência de estrutura física e
    tecnológica adequada;

    II - designação de gestor de segurança e credenciamento no órgão
    ou entidade;

    III - assinatura de contrato sigiloso, quando aplicável;

    IV - realização de inspeção para verificação das condições de
    segurança, a critério do Núcleo de Segurança e Credenciamento.
guidance:
  prose: |
    Article 11 addresses organizational (not individual) clearance —
    the accreditation of agencies and entities to handle classified
    information.

    **Accreditation requirements:**
    1. **Physical and technological capability:** The organization must
       prove it has adequate infrastructure (secure rooms, COMSEC equipment,
       secure networks) for the classification level sought.
    2. **Designated security manager:** A specific person must be appointed
       as the organizational security and clearance manager.
    3. **Classified contracts:** When applicable, formal classified
       contracts (contrato sigiloso) must be in place.
    4. **Inspection:** NSC may conduct on-site inspections to verify
       security conditions before granting accreditation.

    **Private sector implications:**
    Private companies (e.g., defense contractors) can be accredited to
    handle classified information, but they must meet the same standards
    as government agencies.
implementation_guidance:
  platform_engineering:
    prose: |
      **Organizational accreditation infrastructure:**
      1. Deploy dedicated infrastructure segments for classified
         information processing, physically and logically isolated
         from general-purpose systems.
      2. Implement network segmentation with classified enclaves that
         meet the required physical and technological standards.
      3. Deploy dedicated identity provider for classified environments,
         separate from general-purpose IAM.
      4. Maintain infrastructure-as-code templates for classified
         environment provisioning that embed security controls.
    tools:
      - network-segmentation
      - classified-enclave
      - iac-templates
      - dedicated-iam
  devsecops:
    prose: |
      **Development environment accreditation:**
      1. Maintain separate CI/CD pipelines for classified projects,
         running on accredited infrastructure.
      2. Implement air-gapped or cross-domain solution for classified
         development when required by classification level.
      3. Ensure all development tools and dependencies are approved
         for use in the classified environment.
    tools:
      - classified-pipeline
      - air-gap-solution
      - approved-tools-registry
  secops:
    prose: |
      **Organizational accreditation governance:**
      1. Designate the organizational security and clearance manager
         (gestor de segurança e credenciamento) as required.
      2. Prepare and maintain accreditation documentation for NSC
         inspections: physical security plans, technology inventories,
         personnel clearance records.
      3. Conduct internal pre-inspection audits to ensure readiness
         for NSC verification visits.
      4. Manage classified contracts registry and renewal tracking.
    tools:
      - grc-platform
      - inspection-readiness
      - contract-management
      - facility-security
