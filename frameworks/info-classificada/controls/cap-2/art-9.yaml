id: art-9
family: cap-2
title: "Non-Disclosure Agreement and Confidentiality Obligations"
class: INFO-CLASSIFICADA
baselines: [government-all, defense, intelligence]
statement:
  prose: |
    Art. 9. A pessoa natural que, em razão de qualquer vínculo com o
    Poder Público, executar atividades de tratamento de informação
    classificada, assinará o Termo de Compromisso de Manutenção de
    Sigilo — TCMS, conforme modelo contido no Anexo, pelo qual se
    obrigará a manter o sigilo da informação, sob pena de
    responsabilidade penal, civil e administrativa, na forma da lei.

    § 1º O TCMS será assinado antes do acesso à informação classificada.

    § 2º A assinatura do TCMS não exime a pessoa da responsabilidade
    decorrente de eventual descumprimento do sigilo da informação.

    § 3º O TCMS permanecerá em vigor enquanto durar o sigilo da
    informação a que se refere.
guidance:
  prose: |
    Article 9 mandates the TCMS (Termo de Compromisso de Manutençao de
    Sigilo) — a legally binding confidentiality agreement that:

    **Key requirements:**
    - Must be signed BEFORE any access to classified information
    - Subjects the signer to criminal, civil, and administrative liability
    - Remains in force for the entire duration of the classification
      (not just during employment)
    - Does not limit liability — signing the TCMS does not cap or define
      the extent of legal responsibility

    **Distinction from credencial de segurança:**
    - Credencial de segurança: permanent authorization from NSC/GSI
    - TCMS: per-engagement confidentiality commitment

    Both are required. The TCMS is required even for credentialed personnel,
    and it is the mechanism used for exceptional access by non-credentialed
    persons (per art. 6, paragrafo unico).

    **Post-employment obligation:**
    The TCMS validity is tied to the classification duration, not to the
    person's employment. A former employee remains bound until the
    information is declassified.
implementation_guidance:
  platform_engineering:
    prose: |
      **Digital TCMS workflow:**
      1. Implement mandatory TCMS signing as a prerequisite in the access
         control workflow: no access token is issued without a signed TCMS.
      2. Deploy digital TCMS signing with qualified electronic signature
         (ICP-Brasil) for legal validity.
      3. Link TCMS records to specific classified information or projects
         to track the binding duration.
      4. Implement TCMS expiration monitoring: alert when the underlying
         classification expires so TCMS records can be archived.
    tools:
      - digital-signature
      - workflow-engine
      - access-control
      - icp-brasil-integration
  devsecops:
    prose: |
      **TCMS integration in development access:**
      1. Require TCMS acceptance (digital click-through with audit trail)
         before granting access to classified repositories.
      2. Implement TCMS renewal prompts when personnel access classified
         materials after extended periods of inactivity.
      3. Log TCMS acceptance events in the compliance audit trail.
    tools:
      - access-workflow
      - audit-logging
      - gitlab-access-control
  secops:
    prose: |
      **TCMS lifecycle governance:**
      1. Maintain a registry of all active TCMS agreements linked to
         personnel and classification records.
      2. Verify TCMS completion before granting any classified access,
         including temporary or exceptional access.
      3. Track post-employment TCMS obligations: former employees remain
         bound until classification expiration.
      4. Coordinate with legal counsel on TCMS enforcement actions when
         violations are detected.
    tools:
      - grc-platform
      - nda-registry
      - legal-management
      - access-review
