id: art-4
family: cap-1
title: "Classification Authority"
class: INFO-CLASSIFICADA
baselines: [government-all, defense, intelligence]
statement:
  prose: |
    Art. 4. A classificação de informação em qualquer grau de sigilo é de
    competência:

    I - no grau de ultrassecreto, das seguintes autoridades:
    a) Presidente da República;
    b) Vice-Presidente da República;
    c) Ministros de Estado e autoridades com as mesmas prerrogativas;
    d) Comandantes da Marinha, do Exército e da Aeronáutica; e
    e) Chefes de Missões Diplomáticas e Consulares permanentes no exterior;

    II - no grau de secreto, das autoridades referidas no inciso I, dos
    titulares de autarquias, fundações ou empresas públicas e sociedades
    de economia mista; e

    III - no grau de reservado, das autoridades referidas nos incisos I e
    II e das que exerçam funções de direção, comando ou chefia, nível DAS
    101.5, ou superior, e seus equivalentes.

    Parágrafo único. A competência prevista nos incisos I e II, no que se
    refere à classificação como ultrassecreta e secreta, poderá ser
    delegada pela autoridade responsável a agente público, inclusive em
    missão no exterior, vedada a subdelegação.
guidance:
  prose: |
    Article 4 defines who has the authority to classify information,
    creating a strict hierarchy:

    **Classification authority matrix:**
    | Level          | Who Can Classify                              |
    |----------------|-----------------------------------------------|
    | Ultrassecreta  | President, VP, Ministers, Military Commanders, |
    |                | Heads of diplomatic missions                  |
    | Secreta        | Above + heads of autarquias, foundations,      |
    |                | state enterprises                              |
    | Reservada      | Above + DAS 101.5+ or equivalent directors    |

    **Delegation rules:**
    - Ultrassecreta and secreta classification authority can be delegated
      to a public agent (including those on missions abroad)
    - Sub-delegation is prohibited
    - Reservada classification cannot be further delegated beyond DAS 101.5

    **Compliance implication:**
    Every classified document must be traceable to an authorized classifying
    authority. Systems must enforce that only authorized personnel can
    apply classification markings.
implementation_guidance:
  platform_engineering:
    prose: |
      **Classification authority enforcement:**
      1. Implement role-based classification assignment: only users mapped
         to authorized classification roles can apply or change classification
         markings in the system.
      2. Define three role tiers matching the decree hierarchy:
         - classificador-ultrassecreto: President, VP, Ministers, etc.
         - classificador-secreto: above + autarquia/foundation heads
         - classificador-reservado: above + DAS 101.5+ directors
      3. Enforce that classification actions are digitally signed with
         the classifying authority's credential.
      4. Implement delegation registry: track all active delegations with
         grantor, grantee, scope, and expiration.
    tools:
      - iam-platform
      - digital-signature
      - delegation-registry
      - rbac-engine
  devsecops:
    prose: |
      **Classification workflow in development:**
      1. Implement classification approval workflow in document management
         systems: classification requests must be routed to authorized
         classifiers for approval.
      2. Add audit logging for all classification actions (who classified,
         when, at what level, under which authority).
      3. Prevent unauthorized users from modifying classification metadata
         via repository access controls.
    tools:
      - approval-workflow
      - audit-logging
      - gitlab-ci
  secops:
    prose: |
      **Classification authority governance:**
      1. Maintain an up-to-date registry of all authorized classifying
         authorities and their active delegations.
      2. Audit classification decisions quarterly to verify they were
         made by authorized personnel.
      3. Review delegation records to ensure no sub-delegation violations.
      4. Report classification statistics by level and authority to
         senior management monthly.
    tools:
      - grc-platform
      - authority-registry
      - audit-management
legal_references:
  - framework_id: lai
    articles: ["art-27"]
    relationship: implements
  - framework_id: gsi-in1
    articles: ["art-3"]
    relationship: complements
