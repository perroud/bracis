id: art-20
family: cap-4
title: "Communications Security (COMSEC)"
class: INFO-CLASSIFICADA
baselines: [government-all, defense, intelligence]
statement:
  prose: |
    Art. 20. A segurança das comunicações que envolvam informação
    classificada em qualquer grau de sigilo compreende:

    I - a segurança criptográfica, destinada a garantir o sigilo da
    informação transmitida;

    II - a segurança da transmissão, destinada a garantir a integridade
    e a disponibilidade da informação durante a transmissão;

    III - a segurança contra emissões eletromagnéticas não intencionais,
    destinada a impedir a interceptação de sinais comprometedores;

    IV - a segurança física dos recursos criptográficos, destinada a
    garantir a integridade dos equipamentos e materiais criptográficos.
guidance:
  prose: |
    Article 20 defines the four pillars of COMSEC (Communications Security)
    for classified information:

    **COMSEC pillars:**
    1. **Cryptographic security (CRYPTOSEC):** Ensuring confidentiality
       through encryption of transmitted information.
    2. **Transmission security (TRANSEC):** Ensuring integrity and
       availability during transmission — protection against jamming,
       interception, and man-in-the-middle attacks.
    3. **TEMPEST (Emission Security):** Protection against unintentional
       electromagnetic emanations that could be intercepted. This is
       commonly known as TEMPEST in NATO terminology.
    4. **Physical security of cryptographic resources:** Protecting
       cryptographic hardware, software, and materials from physical
       compromise.

    **TEMPEST implications:**
    This is unique to classified information handling. Standard commercial
    IT does not address electromagnetic emanations. For ultrassecreta and
    secreta processing, TEMPEST-certified equipment and shielded facilities
    may be required.
implementation_guidance:
  platform_engineering:
    prose: |
      **COMSEC infrastructure:**
      1. Deploy COMSEC-grade encryption for all classified communications:
         state algorithm implementations for ultrassecreta/secreta.
      2. Implement redundant communication paths with failover for
         availability of classified communications (TRANSEC).
      3. For ultrassecreta/secreta facilities: deploy TEMPEST-rated
         equipment and consider facility shielding to prevent
         electromagnetic emanation leakage.
      4. Implement physical security controls for cryptographic
         equipment: tamper-evident enclosures, secure storage rooms,
         access logging.
    tools:
      - comsec-equipment
      - tempest-shielding
      - redundant-comms
      - tamper-detection
  devsecops:
    prose: |
      **COMSEC awareness in development:**
      1. Ensure development environments for classified software include
         COMSEC requirements in security architecture reviews.
      2. Test communications security controls in classified CI/CD
         pipelines: verify encryption, integrity, and availability.
      3. Document COMSEC dependencies in deployment manifests for
         classified applications.
    tools:
      - security-architecture-review
      - comsec-testing
      - deployment-docs
  secops:
    prose: |
      **COMSEC governance:**
      1. Designate a COMSEC custodian responsible for all cryptographic
         materials and equipment.
      2. Maintain COMSEC material accounting: track all cryptographic
         keys, devices, and materials with serial numbers and custodians.
      3. Conduct TEMPEST assessments for facilities processing
         ultrassecreta and secreta information.
      4. Implement COMSEC incident procedures for lost, stolen, or
         compromised cryptographic materials.
    tools:
      - comsec-accounting
      - tempest-assessment
      - incident-management
      - material-tracking
