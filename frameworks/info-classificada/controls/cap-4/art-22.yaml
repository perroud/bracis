id: art-22
family: cap-4
title: "Cryptographic Material Accountability and Disposal"
class: INFO-CLASSIFICADA
baselines: [government-all, defense, intelligence]
statement:
  prose: |
    Art. 22. Os recursos criptográficos em poder dos órgãos e entidades
    serão objeto de controle contábil e de segurança, incluindo:

    I - registro individualizado de cada recurso criptográfico, com
    identificação do tipo, número de série e órgão ou entidade
    responsável;

    II - armazenamento em condições de segurança compatíveis com o grau
    de sigilo da informação que protegem;

    III - destruição, quando inutilizados, de forma que impossibilite a
    recuperação de componentes criptográficos, sob supervisão da Agência
    Brasileira de Inteligência.

    Parágrafo único. O extravio, o furto ou o roubo de recurso
    criptográfico deverá ser comunicado imediatamente à Agência
    Brasileira de Inteligência e ao Gabinete de Segurança Institucional
    da Presidência da República.
guidance:
  prose: |
    Article 22 establishes the accountability and disposal requirements
    for cryptographic materials:

    **Accountability requirements:**
    1. Individual registration of each cryptographic resource with:
       type, serial number, and responsible agency
    2. Storage security matching the classification level of the
       protected information
    3. Supervised destruction when resources are decommissioned

    **Destruction supervision:**
    Destruction of cryptographic resources must be supervised by ABIN.
    This is more stringent than general classified material destruction
    (art. 17), which requires two designated personnel.

    **Incident reporting:**
    Loss, theft, or robbery of cryptographic resources requires
    IMMEDIATE notification to both ABIN and GSI/PR. This is a critical
    incident because compromised cryptographic material may allow
    decryption of previously encrypted classified information.
implementation_guidance:
  platform_engineering:
    prose: |
      **Cryptographic material asset management:**
      1. Implement dedicated CMDB entries for all cryptographic resources
         with: type, serial number, classification level, custodian,
         location, status (active, stored, pending-destruction).
      2. Deploy tamper-evident storage for cryptographic materials with
         access logging and intrusion detection.
      3. Implement cryptographic resource check-in/check-out workflow
         for physical cryptographic materials.
      4. Deploy automated alerting for missing or unaccounted
         cryptographic resources.
    tools:
      - crypto-cmdb
      - tamper-evident-storage
      - checkout-workflow
      - alerting
  devsecops:
    prose: |
      **Cryptographic resource tracking in development:**
      1. Track all cryptographic libraries and modules used in classified
         builds as managed dependencies with version pinning.
      2. Implement automated alerts when cryptographic dependencies are
         updated or removed.
      3. Ensure no cryptographic key material is included in code
         repositories — use runtime injection only.
    tools:
      - dependency-management
      - alert-automation
      - secret-scanning
  secops:
    prose: |
      **Cryptographic material governance:**
      1. Conduct monthly physical inventory of all cryptographic
         resources and reconcile against the registry.
      2. Implement immediate incident response for cryptographic
         resource loss: notify ABIN and GSI/PR within 1 hour.
      3. Coordinate with ABIN for supervised destruction of
         decommissioned cryptographic resources.
      4. Maintain chain-of-custody documentation for all cryptographic
         resource movements.
    tools:
      - crypto-inventory
      - incident-response
      - abin-coordination
      - chain-of-custody
