id: art-21
family: cap-4
title: "Cryptographic Equipment and Resource Control"
class: INFO-CLASSIFICADA
baselines: [government-all, defense, intelligence]
statement:
  prose: |
    Art. 21. Os recursos criptográficos utilizados na cifração de
    informação classificada em qualquer grau de sigilo serão controlados
    pelo Gabinete de Segurança Institucional da Presidência da República,
    por intermédio da Agência Brasileira de Inteligência — ABIN, a quem
    compete:

    I - definir os padrões de algoritmos e de recursos criptográficos
    para uso no tratamento de informação classificada;

    II - desenvolver e fornecer o algoritmo de Estado;

    III - realizar a certificação e a homologação de recursos
    criptográficos para uso governamental;

    IV - realizar a distribuição de recursos criptográficos para os
    órgãos e entidades credenciados.
guidance:
  prose: |
    Article 21 centralizes cryptographic resource control under ABIN
    (Brazilian Intelligence Agency), acting through GSI/PR:

    **ABIN responsibilities:**
    1. Define cryptographic standards and approved algorithms
    2. Develop and supply the state algorithm (algoritmo de Estado)
    3. Certify and approve (homologar) cryptographic resources for
       government use
    4. Distribute cryptographic resources to accredited agencies

    **Key implications:**
    - Organizations cannot choose their own cryptographic solutions for
      ultrassecreta and secreta data — they must use ABIN-certified
      and distributed resources
    - ABIN is the sole supplier of state algorithms
    - All cryptographic equipment must be certified (homologado) by ABIN
      before use with classified information
    - This creates a controlled supply chain for cryptographic materials

    **Practical limitation:**
    The dependency on ABIN for cryptographic resources can create
    procurement and deployment timelines that must be planned for.
implementation_guidance:
  platform_engineering:
    prose: |
      **ABIN-certified cryptographic deployment:**
      1. Use ONLY ABIN-certified cryptographic modules for ultrassecreta
         and secreta information processing.
      2. Maintain an inventory of all ABIN-distributed cryptographic
         resources: hardware, software, key material.
      3. Implement procurement workflow for cryptographic resources
         through ABIN channels with lead time planning.
      4. Deploy ABIN-certified HSMs and cryptographic accelerators
         in classified infrastructure.
    tools:
      - abin-certified-crypto
      - hsm
      - crypto-inventory
      - procurement-workflow
  devsecops:
    prose: |
      **Certified cryptographic integration:**
      1. Integrate ABIN-certified cryptographic libraries into classified
         application builds.
      2. Implement CI/CD checks that verify cryptographic module versions
         match ABIN-approved versions.
      3. Block deployment of applications using non-certified cryptographic
         modules to classified environments.
    tools:
      - crypto-library-management
      - version-verification
      - deployment-gates
  secops:
    prose: |
      **Cryptographic resource governance:**
      1. Maintain the ABIN-distributed resource inventory with serial
         numbers, assignment dates, and custodians.
      2. Track ABIN certification status of all cryptographic resources:
         ensure no expired certifications are in use.
      3. Coordinate with ABIN for resource distribution, renewal,
         replacement, and return of retired resources.
      4. Report cryptographic resource accounting to ABIN per their
         required schedule.
    tools:
      - crypto-inventory
      - certification-tracking
      - abin-coordination
      - resource-accounting
