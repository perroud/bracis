id: art-13
family: cap-3
title: "Secure Storage of Classified Information"
class: INFO-CLASSIFICADA
baselines: [government-all, defense, intelligence]
statement:
  prose: |
    Art. 13. A informação classificada em qualquer grau de sigilo será
    mantida ou armazenada em condições que restrinjam o acesso somente a
    pessoas autorizadas e que ofereçam segurança contra extravio, dano,
    furto, roubo, destruição não autorizada e acesso não autorizado.

    § 1º A informação classificada no grau de sigilo ultrassecreto será
    armazenada em cofre ou sala-cofre, com controle de acesso restrito
    e registro de entrada e saída.

    § 2º A informação classificada no grau de sigilo secreto será
    armazenada em cofre, arquivo de aço com chave ou outro recipiente
    que ofereça segurança equivalente.

    § 3º A informação classificada no grau de sigilo reservado será
    armazenada em local fechado, com acesso restrito a pessoas
    autorizadas.
guidance:
  prose: |
    Article 13 defines storage requirements proportional to classification
    level:

    **Storage requirements by level:**
    | Level          | Physical Storage                                |
    |----------------|-------------------------------------------------|
    | Ultrassecreta  | Safe (cofre) or vault room (sala-cofre) with    |
    |                | access control and entry/exit logging            |
    | Secreta        | Safe, steel cabinet with lock, or equivalent     |
    | Reservada      | Locked room with restricted access               |

    **Digital storage equivalents:**
    - Ultrassecreta: Dedicated encrypted storage in a physically secured
      data center with multi-factor access, full audit trail
    - Secreta: Encrypted storage with strong access controls
    - Reservada: Access-controlled storage with basic encryption

    **Key principle:**
    Storage must protect against: loss (extravio), damage (dano),
    theft (furto/roubo), unauthorized destruction, and unauthorized access.
implementation_guidance:
  platform_engineering:
    prose: |
      **Tiered secure storage architecture:**
      1. Implement classification-based storage tiers:
         - Ultrassecreta: HSM-backed encryption, dedicated storage nodes,
           multi-person access controls, immutable audit logs
         - Secreta: AES-256 encryption at rest, strong ACLs, audit logging
         - Reservada: Encryption at rest, role-based access controls
      2. Deploy physical security controls for storage infrastructure:
         secure data center rooms for ultrassecreta workloads.
      3. Implement entry/exit logging for all access to ultrassecreta
         storage (both physical and digital access).
      4. Use separate encryption keys per classification level managed
         through a dedicated key management system.
    tools:
      - hsm
      - encrypted-storage
      - key-management
      - audit-logging
  devsecops:
    prose: |
      **Secure storage in development:**
      1. Implement tiered artifact repositories: classified build artifacts
         are stored in access-controlled registries matching their level.
      2. Enforce encryption at rest for all classified artifacts in CI/CD
         storage (registry, artifact store, cache).
      3. Implement automated cleanup: classified artifacts are purged
         from ephemeral storage after pipeline completion.
    tools:
      - artifact-registry
      - encrypted-storage
      - pipeline-cleanup
  secops:
    prose: |
      **Storage security governance:**
      1. Maintain an inventory of all physical and digital storage
         locations for classified information, categorized by level.
      2. Conduct semi-annual physical security inspections of classified
         storage facilities (safes, vault rooms, server rooms).
      3. Verify that access logs for ultrassecreta storage are complete
         and tamper-evident.
      4. Test backup and recovery procedures for classified data annually.
    tools:
      - facility-security
      - storage-inventory
      - audit-management
      - backup-verification
