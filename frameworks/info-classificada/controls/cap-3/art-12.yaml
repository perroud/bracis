id: art-12
family: cap-3
title: "Marking and Labeling of Classified Information"
class: INFO-CLASSIFICADA
baselines: [government-all, defense, intelligence]
statement:
  prose: |
    Art. 12. A informação classificada em qualquer grau de sigilo será
    marcada com a indicação do grau de sigilo em local que possibilite
    a sua identificação, observado o seguinte:

    I - a marcação será feita em todas as páginas do documento e nas
    capas, se houver;

    II - as páginas serão numeradas seguidamente e conterão, também,
    indicação do total de páginas que compõem o documento;

    III - a marcação deverá ser feita de forma a não comprometer a
    leitura do documento;

    IV - a marcação será feita em local visível, preferêncialmente no
    cabeçalho e no rodapé de cada página;

    V - a informação classificada em grau de sigilo ultrassecreto
    conterá, adicionalmente, a marcação de forma individualizada, por
    meio de número único de protocolo.
guidance:
  prose: |
    Article 12 establishes mandatory marking (marcação) requirements
    for classified documents — the visual and metadata labeling that
    makes classification immediately apparent.

    **Marking rules:**
    - Every page must carry the classification marking
    - Pages must be numbered sequentially with total page count
    - Markings appear in headers and footers (visible, not hidden)
    - Must not impair readability
    - Ultrassecreta documents require an additional unique protocol number

    **Digital implications:**
    For digital documents, marking translates to:
    - Watermarks on rendered content
    - Metadata tags in file properties
    - Headers/footers in document templates
    - Unique protocol numbers for ultrassecreta in a tracking system

    **Failure to mark is a compliance violation** and can lead to
    inadvertent disclosure, which constitutes a compromise.
implementation_guidance:
  platform_engineering:
    prose: |
      **Automated document marking system:**
      1. Implement document templates with mandatory classification headers
         and footers that auto-populate from metadata.
      2. Deploy watermarking service that applies visual classification
         markings to all rendered documents (PDF, print, screen display).
      3. For ultrassecreta documents, implement a unique protocol number
         generator integrated with the document management system.
      4. Implement automated marking validation: scan documents for
         correct marking before allowing storage or transmission.
      5. Apply classification banners to all screens displaying classified
         content (top and bottom of viewport).
    tools:
      - document-management
      - watermarking-service
      - protocol-generator
      - banner-service
  devsecops:
    prose: |
      **Classification marking in code artifacts:**
      1. Implement pre-commit hooks that verify classification headers
         are present in all files within classified repositories.
      2. Add CI/CD pipeline steps that validate document marking
         compliance before artifact publishing.
      3. Generate automated classification cover sheets for build
         artifacts and deployment packages.
    tools:
      - pre-commit
      - gitlab-ci
      - cover-sheet-generator
  secops:
    prose: |
      **Marking compliance monitoring:**
      1. Conduct periodic spot checks of classified documents to verify
         correct marking on all pages.
      2. Audit ultrassecreta documents for unique protocol number
         compliance and tracking integrity.
      3. Train all personnel handling classified information on correct
         marking procedures.
      4. Maintain marking templates and distribute to all organizational
         units handling classified information.
    tools:
      - audit-management
      - marking-templates
      - training-records
      - document-tracking
