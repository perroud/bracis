id: art-17
family: cap-3
title: "Secure Destruction Procedures"
class: INFO-CLASSIFICADA
baselines: [government-all, defense, intelligence]
statement:
  prose: |
    Art. 17. A destruição de informação classificada em qualquer grau de
    sigilo será feita por método que impossibilite a sua recuperação,
    observando-se as seguintes condições:

    I - a destruição de informação classificada nos graus de sigilo
    ultrassecreto e secreto será registrada em termo próprio e comunicada
    à autoridade classificadora;

    II - a destruição de informação classificada no grau de sigilo
    reservado será registrada em termo próprio;

    III - a destruição será realizada por dois servidores especialmente
    designados.

    Parágrafo único. No caso de informação classificada contida em
    suporte magnético, óptico, eletrônico ou similar, a destruição
    incluirá a desmagnetização ou sobrescrita dos dados, de forma
    irrecuperável, ou a destruição física do suporte.
guidance:
  prose: |
    Article 17 establishes destruction procedures that ensure
    classified information cannot be recovered:

    **Destruction requirements:**
    | Level          | Two-person Rule | Record | Notify Authority |
    |----------------|-----------------|--------|------------------|
    | Ultrassecreta  | Yes             | Yes    | Yes              |
    | Secreta        | Yes             | Yes    | Yes              |
    | Reservada      | Yes             | Yes    | No               |

    **Destruction methods for digital media:**
    - Degaussing (desmagnetização) for magnetic media
    - Cryptographic erasure or multi-pass overwrite for electronic storage
    - Physical destruction of the storage medium

    **Two-person integrity rule:**
    All destruction must be performed by two specifically designated
    public servants — this prevents unauthorized destruction and provides
    witness verification.

    **Record keeping:**
    A formal destruction record (termo de destruição) must document:
    what was destroyed, when, by whom, method used, and witness signatures.
implementation_guidance:
  platform_engineering:
    prose: |
      **Digital destruction procedures:**
      1. Implement cryptographic erasure capabilities: when encryption keys
         are securely destroyed, encrypted data becomes unrecoverable.
      2. Deploy multi-pass overwrite tools (DoD 5220.22-M equivalent)
         for storage media sanitization.
      3. Implement two-person authorization for destruction operations:
         both designated persons must authenticate to trigger destruction.
      4. Generate tamper-evident destruction records with timestamps,
         method details, and digital signatures of both witnesses.
      5. Automate destruction notifications to the classifying authority
         for ultrassecreta and secreta data.
    tools:
      - cryptographic-erasure
      - media-sanitization
      - two-person-auth
      - destruction-records
  devsecops:
    prose: |
      **Pipeline artifact destruction:**
      1. Implement automated destruction of classified build artifacts
         after defined retention periods.
      2. Ensure CI/CD ephemeral environments securely wipe classified
         data upon termination (not just deletion, but overwrite).
      3. Implement destruction verification tests that confirm data
         is unrecoverable after sanitization.
    tools:
      - secure-wipe
      - retention-automation
      - destruction-verification
  secops:
    prose: |
      **Destruction governance:**
      1. Maintain a destruction log with formal records (termos de
         destruição) for all classified information destroyed.
      2. Designate destruction personnel pairs and maintain rotation
         schedules to ensure availability.
      3. Verify destruction methods are adequate for each media type:
         physical destruction for SSDs (overwrite is insufficient for
         wear-leveled media), degaussing for HDDs.
      4. Audit destruction records quarterly and verify against
         classified information inventory.
    tools:
      - destruction-log
      - media-sanitization
      - audit-management
      - inventory-reconciliation
