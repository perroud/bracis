id: art-30
family: cap-6
title: "Investigation and Accountability for Compromises"
class: INFO-CLASSIFICADA
baselines: [government-all, defense, intelligence]
statement:
  prose: |
    Art. 30. O procedimento de apuração de comprometimento de informação
    classificada terá por objetivo:

    I - identificar as causas e circunstâncias do comprometimento;

    II - identificar as pessoas envolvidas e apurar suas
    responsabilidades;

    III - avaliar os danos causados à segurança da sociedade e do Estado;

    IV - recomendar medidas corretivas e preventivas para evitar novos
    comprometimentos;

    V - subsidiar a decisão da autoridade competente sobre as medidas
    administrativas, civis e penais cabíveis.

    Parágrafo único. O resultado do procedimento de apuração será
    comunicado ao Núcleo de Segurança e Credenciamento do Gabinete de
    Segurança Institucional da Presidência da República.
guidance:
  prose: |
    Article 30 defines the objectives and outputs of the compromise
    investigation:

    **Investigation objectives:**
    1. **Root cause analysis:** Identify how and why the compromise occurred
    2. **Accountability:** Identify persons involved and determine their
       responsibility
    3. **Damage assessment:** Evaluate the impact on national security
    4. **Corrective/preventive measures:** Recommend improvements to
       prevent recurrence
    5. **Legal basis:** Provide evidence for administrative, civil,
       and criminal proceedings

    **Final report to NSC/GSI:**
    The investigation results must be communicated to the NSC/GSI,
    closing the loop opened by the initial notification (art. 29).

    **Legal consequences:**
    Compromise of classified information can lead to:
    - Administrative sanctions (disciplinary action, dismissal)
    - Civil liability (damages)
    - Criminal prosecution (Law 12.527/2011, Penal Code)

    This makes proper investigation procedure critical — findings must
    be legally defensible.
implementation_guidance:
  platform_engineering:
    prose: |
      **Digital forensics and investigation support:**
      1. Implement comprehensive logging that supports forensic
         investigation: all access, modification, transmission, and
         deletion events for classified data must be logged with
         tamper-evident integrity.
      2. Deploy forensic analysis tools: timeline reconstruction,
         access pattern analysis, data flow tracing.
      3. Implement evidence preservation system: secure, immutable
         storage for forensic evidence with chain-of-custody tracking.
      4. Generate automated damage assessment reports: identify all
         potentially compromised data based on access and exposure scope.
    tools:
      - forensic-tools
      - tamper-evident-logging
      - evidence-preservation
      - damage-assessment
  devsecops:
    prose: |
      **Investigation support in development:**
      1. Maintain immutable audit trails for all classified repository
         operations (git signed commits, protected audit logs).
      2. Implement automated evidence collection: export relevant
         CI/CD logs, access records, and artifact histories upon
         investigation trigger.
      3. Deploy code review forensics: trace who reviewed, approved,
         and merged changes to classified codebases.
    tools:
      - audit-trail
      - evidence-collection
      - code-review-forensics
  secops:
    prose: |
      **Investigation process governance:**
      1. Maintain investigation procedure documentation: step-by-step
         guide for the investigation commission including evidence
         collection, interview protocols, and report templates.
      2. Ensure investigation commission members have:
         - Appropriate security clearance
         - Training in digital forensics and investigation procedures
         - Independence from the persons under investigation
      3. Track investigation timelines: define SLAs for investigation
         completion and NSC reporting.
      4. Implement corrective action tracking: ensure recommendations
         from the investigation are implemented and verified.
      5. Maintain a database of past compromises and investigations
         for pattern analysis and institutional learning.
    tools:
      - investigation-management
      - corrective-action-tracking
      - forensic-training
      - pattern-analysis
