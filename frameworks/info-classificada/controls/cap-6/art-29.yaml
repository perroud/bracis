id: art-29
family: cap-6
title: "Compromise Procedures and Notification to GSI/PR"
class: INFO-CLASSIFICADA
baselines: [government-all, defense, intelligence]
statement:
  prose: |
    Art. 29. Verificada a ocorrência de comprometimento de informação
    classificada, a autoridade responsável adotará as seguintes
    providências:

    I - comunicará imediatamente o fato ao Núcleo de Segurança e
    Credenciamento do Gabinete de Segurança Institucional da
    Presidência da República;

    II - determinará a instauração de procedimento de apuração, a ser
    conduzido por comissão especialmente designada;

    III - adotará medidas para conter os efeitos do comprometimento e
    prevenir novos incidentes;

    IV - avaliará a necessidade de reclassificação da informação
    comprometida;

    V - comunicará o fato à autoridade classificadora, quando esta for
    diversa da autoridade responsável.

    Parágrafo único. O procedimento de apuração deverá observar os
    princípios do contraditório e da ampla defesa.
guidance:
  prose: |
    Article 29 defines the mandatory actions when a compromise of
    classified information is confirmed:

    **Mandatory response actions (in order):**
    1. **Immediate notification to NSC/GSI:** The central security
       authority must be informed immediately
    2. **Investigation:** A specially designated commission must be
       established to investigate the compromise
    3. **Containment:** Measures to limit the damage and prevent
       recurrence
    4. **Reclassification assessment:** Evaluate whether the compromised
       information needs to be reclassified (typically downgraded since
       the secrecy is already breached)
    5. **Notify classifying authority:** If different from the responsible
       authority

    **Due process guarantee:**
    The investigation must respect contraditorio (adversarial process)
    and ampla defesa (right to full defense) — persons implicated have
    the right to present their defense.

    **Timeline pressure:**
    Steps 1 and 3 are immediate. Step 2 must be initiated promptly.
    Steps 4 and 5 follow from the investigation findings.
implementation_guidance:
  platform_engineering:
    prose: |
      **Compromise response automation:**
      1. Implement automated NSC/GSI notification workflow: when a
         compromise is confirmed, generate and transmit a structured
         incident report to NSC immediately.
      2. Deploy automated containment actions:
         - Revoke all access to the compromised information
         - Isolate affected systems
         - Preserve forensic evidence
      3. Implement reclassification workflow: allow authorized personnel
         to reassess and update classification after compromise.
      4. Deploy investigation workspace: secure, isolated environment
         for the investigation commission to work with evidence.
    tools:
      - incident-response-automation
      - containment-playbooks
      - forensic-preservation
      - investigation-workspace
  devsecops:
    prose: |
      **Compromise response in development:**
      1. Implement repository lockdown capability: immediately freeze
         all operations on a compromised classified repository.
      2. Deploy forensic branch preservation: create protected copies
         of repository state at the time of compromise detection.
      3. Implement automated key rotation for any cryptographic keys
         that may be associated with the compromised information.
    tools:
      - repository-lockdown
      - forensic-preservation
      - key-rotation
  secops:
    prose: |
      **Compromise management governance:**
      1. Maintain pre-established compromise response procedures with
         defined roles: who notifies NSC, who leads investigation
         commission, who executes containment.
      2. Pre-designate investigation commission candidates with
         appropriate clearances for rapid mobilization.
      3. Implement compromise reporting templates aligned with NSC/GSI
         requirements for immediate notification.
      4. Track all compromise events and maintain lessons-learned
         database for continuous improvement.
    tools:
      - incident-management
      - investigation-commission
      - reporting-templates
      - lessons-learned
