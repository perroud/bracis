id: art-28
family: cap-6
title: "Security Incidents Involving Classified Information"
class: INFO-CLASSIFICADA
baselines: [government-all, defense, intelligence]
statement:
  prose: |
    Art. 28. Constitui incidente de segurança envolvendo informação
    classificada qualquer evento adverso, confirmado ou sob suspeita, que
    comprometa ou ameace comprometer a segurança da informação
    classificada, incluindo:

    I - o acesso não autorizado a informação classificada;

    II - a divulgação não autorizada de informação classificada;

    III - a perda, o extravio, o furto ou o roubo de informação
    classificada ou de recurso criptográfico;

    IV - a alteração não autorizada de informação classificada;

    V - a destruição não autorizada de informação classificada;

    VI - qualquer violação das normas de segurança estabelecidas neste
    Decreto.

    Parágrafo único. A ocorrência de incidente de segurança deverá ser
    imediatamente comunicada à autoridade responsável pela informação
    classificada e ao órgão de controle interno.
guidance:
  prose: |
    Article 28 defines what constitutes a security incident involving
    classified information. The definition is broad and covers both
    confirmed events and suspected events.

    **Incident categories:**
    1. **Unauthorized access:** Someone without clearance or need-to-know
       accessed classified information
    2. **Unauthorized disclosure:** Classified information was shared
       with unauthorized recipients
    3. **Loss/theft:** Physical or digital classified materials are
       missing, lost, or stolen
    4. **Unauthorized modification:** Classified information was altered
       without authorization
    5. **Unauthorized destruction:** Classified information was destroyed
       outside proper procedures
    6. **Any decree violation:** Catch-all for any breach of the decree's
       security norms

    **Immediate notification requirement:**
    Incidents must be reported IMMEDIATELY to:
    - The authority responsible for the classified information
    - The internal control body (orgao de controle interno)

    **"Confirmed or suspected" threshold:**
    The decree uses "confirmado ou sob suspeita" — this means suspected
    incidents trigger the same obligations as confirmed incidents.
implementation_guidance:
  platform_engineering:
    prose: |
      **Classified incident detection system:**
      1. Implement real-time monitoring for classified information access:
         - Unauthorized access attempts (clearance mismatch, need-to-know
           violation, expired credentials)
         - Data exfiltration indicators (unusual downloads, transfers to
           unclassified zones, large data movements)
         - Unauthorized modification (integrity check failures, unexpected
           changes to classified files)
      2. Deploy automated alerting for suspected incidents with
         classification context: alert includes the classification level
         of the potentially compromised information.
      3. Implement incident correlation: link related events across
         physical and digital security systems.
      4. Deploy automated notification to the responsible authority and
         internal control body upon incident detection.
    tools:
      - siem
      - dlp
      - fim
      - incident-alerting
  devsecops:
    prose: |
      **Incident detection in development pipelines:**
      1. Monitor for classified data leakage in CI/CD logs, build
         artifacts, and deployment outputs.
      2. Implement pipeline-level integrity checking: detect unauthorized
         modifications to classified artifacts.
      3. Alert on unauthorized repository access attempts for classified
         codebases.
    tools:
      - pipeline-monitoring
      - integrity-checking
      - access-alerting
  secops:
    prose: |
      **Classified incident response program:**
      1. Establish a classified incident response procedure separate from
         general cybersecurity incident response, with specific handlers
         cleared for the appropriate classification level.
      2. Define incident severity levels aligned with classification:
         ultrassecreta compromise is maximum severity.
      3. Implement 24/7 incident reporting capability with defined
         communication channels for immediate notification.
      4. Maintain incident response playbooks for each incident category
         defined in art. 28 (access, disclosure, loss, modification,
         destruction, policy violation).
    tools:
      - incident-management
      - classified-ir-playbooks
      - 24x7-reporting
      - communication-channels
