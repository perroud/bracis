id: art-25
family: cap-5
title: "Physical Security Measures for Classified Facilities"
class: INFO-CLASSIFICADA
baselines: [government-all, defense, intelligence]
statement:
  prose: |
    Art. 25. As áreas restritas serão dotadas de medidas de segurança
    física que incluam, conforme o caso:

    I - barreiras físicas, tais como muros, cercas, portas blindadas
    ou reforçadas;

    II - sistemas de detecção de intrusão, tais como alarmes, sensores
    de movimento e câmeras de vigilância;

    III - iluminação de segurança adequada;

    IV - sistema de controle de acesso eletrônico;

    V - proteção contra incêndio e inundação compatível com a
    importância da informação custódiada.

    Parágrafo único. As medidas de segurança física serão proporcionais
    ao grau de sigilo da informação tratada na área restrita.
guidance:
  prose: |
    Article 25 specifies the physical security measures required for
    restricted areas, proportional to classification level:

    **Physical security layers:**
    1. **Physical barriers:** Walls, fences, reinforced/armored doors
    2. **Intrusion detection:** Alarms, motion sensors, CCTV
    3. **Security lighting:** Adequate illumination for surveillance
    4. **Electronic access control:** Badge readers, biometrics
    5. **Environmental protection:** Fire and flood protection

    **Proportionality principle:**
    Measures must be proportional to the classification level:
    - Classe I (ultrassecreta/secreta): maximum physical security —
      vault rooms, armored doors, 24/7 monitoring, redundant systems
    - Classe II (reservada): standard reinforced security — locked
      rooms, alarm systems, access control

    **Data center implications:**
    For digital classified information, physical security of data centers
    and network infrastructure must match these requirements.
implementation_guidance:
  platform_engineering:
    prose: |
      **Data center physical security for classified workloads:**
      1. Deploy Classe I data center areas with:
         - Reinforced walls and armored access doors
         - 24/7 CCTV with recording retention per classification policy
         - Motion sensors and intrusion alarms with SOC integration
         - Redundant fire suppression (FM-200 or equivalent)
         - Flood detection and mitigation systems
      2. Deploy electronic access control integrated with IAM and
         clearance verification at all entry points.
      3. Implement security lighting with battery backup in all
         classified areas.
      4. Deploy tamper-evident controls on server racks and network
         equipment in classified zones.
    tools:
      - physical-security
      - cctv-system
      - intrusion-detection
      - environmental-controls
  devsecops:
    prose: |
      **Development facility security:**
      1. Ensure classified development workstations are in areas meeting
         the physical security requirements for their classification level.
      2. Implement physical port blocking on classified workstations
         (disable USB, external drives) to prevent data exfiltration.
      3. Deploy endpoint monitoring for classified development systems
         that detects physical tampering attempts.
    tools:
      - endpoint-management
      - port-blocking
      - tamper-detection
  secops:
    prose: |
      **Physical security governance:**
      1. Conduct semi-annual physical security assessments of all
         restricted areas against the article 25 checklist.
      2. Test intrusion detection systems monthly: verify alarms trigger
         correctly and are received by the monitoring center.
      3. Verify fire and flood protection systems are operational through
         quarterly testing.
      4. Maintain physical security incident records and trend analysis.
    tools:
      - physical-security-audit
      - ids-testing
      - fire-safety-inspection
      - incident-records
