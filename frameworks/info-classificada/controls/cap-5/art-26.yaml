id: art-26
family: cap-5
title: "Visitor Management in Restricted Areas"
class: INFO-CLASSIFICADA
baselines: [government-all, defense, intelligence]
statement:
  prose: |
    Art. 26. A entrada de visitantes em área restrita será precedida de
    autorização da autoridade responsável pela área e observará os
    seguintes procedimentos:

    I - identificação do visitante e registro de seus dados;

    II - assinatura de Termo de Compromisso de Manutenção de Sigilo —
    TCMS, quando o visitante tiver acesso a informação classificada;

    III - acompanhamento permanente por pessoa autorizada durante a
    permanência do visitante na área restrita;

    IV - uso de crachá de identificação de visitante, visivelmente
    diferenciado dos crachás de pessoal autorizado;

    V - restrição ao porte de equipamentos eletrônicos de gravação,
    transmissão de dados ou comunicação, salvo autorização expressa da
    autoridade responsável.
guidance:
  prose: |
    Article 26 establishes visitor management procedures for restricted
    areas with five mandatory controls:

    **Visitor management checklist:**
    1. **Identification and registration:** Full visitor data recorded
    2. **TCMS signing:** Required if visitor will access classified info
    3. **Permanent escort:** Visitor must be accompanied at all times
       by an authorized person
    4. **Visitor badge:** Visually distinct from regular personnel badges
    5. **Electronic device restrictions:** Recording, data transmission,
       and communication devices are prohibited unless explicitly
       authorized

    **Practical implications:**
    - No unescorted visitors in restricted areas — ever
    - Mobile phones and laptops must be secured at entry unless
      specifically authorized
    - Visitor logs must be retained for audit purposes
    - The escort is personally responsible for the visitor's actions
implementation_guidance:
  platform_engineering:
    prose: |
      **Visitor management system:**
      1. Deploy visitor management platform integrated with physical
         access control: pre-registration, identity verification,
         badge issuance, and escort assignment.
      2. Implement electronic device policy enforcement at area entry:
         device lockers with secure storage for mobile phones, laptops,
         and other electronic equipment.
      3. Deploy visitor tracking within restricted areas using escort
         badge pairing or indoor positioning.
      4. Implement digital TCMS signing workflow for visitors requiring
         access to classified information.
    tools:
      - visitor-management
      - device-lockers
      - indoor-tracking
      - digital-tcms
  devsecops:
    prose: |
      **Visitor access to development environments:**
      1. Block visitor accounts from accessing classified repositories
         and CI/CD systems entirely — all access is through the escort's
         supervised session.
      2. Implement temporary visitor network access that is isolated
         from classified network segments.
      3. Log all network activity during visitor presence in restricted
         development areas.
    tools:
      - network-isolation
      - supervised-access
      - activity-logging
  secops:
    prose: |
      **Visitor security governance:**
      1. Maintain visitor logs with: name, affiliation, purpose, escort,
         entry time, exit time, TCMS status, device disposition.
      2. Conduct post-visit verification: confirm no classified material
         was improperly disclosed or removed.
      3. Review visitor frequency and patterns: flag unusual visit
         patterns for security review.
      4. Train escorts on their responsibilities and liability during
         visitor accompaniment.
    tools:
      - visitor-log
      - post-visit-review
      - pattern-analysis
      - training-records
