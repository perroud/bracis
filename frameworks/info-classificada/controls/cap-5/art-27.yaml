id: art-27
family: cap-5
title: "Electronic Security Measures and TEMPEST"
class: INFO-CLASSIFICADA
baselines: [government-all, defense, intelligence]
statement:
  prose: |
    Art. 27. Os órgãos e entidades que tratam informação classificada
    nos graus de sigilo ultrassecreto e secreto deverão adotar medidas
    de segurança eletrônica que incluam:

    I - proteção contra interceptação de comunicações e sinais
    eletromagnéticos comprometedores;

    II - varredura periódica de segurança nos ambientes onde se trata
    informação classificada, para detecção de dispositivos de escuta
    ou vigilância não autorizados;

    III - uso de equipamentos e sistemas de tecnologia da informação
    homologados ou certificados pelo órgão competente para o tratamento
    de informação classificada;

    IV - controle de emissões eletromagnéticas em conformidade com as
    normas estabelecidas pelo Gabinete de Segurança Institucional da
    Presidência da República.
guidance:
  prose: |
    Article 27 mandates electronic security (EMSEC/TEMPEST) measures
    specifically for ultrassecreta and secreta environments:

    **Electronic security requirements:**
    1. **SIGINT protection:** Defense against interception of
       communications and compromising electromagnetic signals
    2. **Technical Surveillance Countermeasures (TSCM):** Periodic
       security sweeps to detect unauthorized listening/surveillance
       devices (bugs, hidden cameras, rogue wireless access points)
    3. **Certified equipment:** All IT equipment must be certified
       (homologado) for classified information processing
    4. **Electromagnetic emission control:** TEMPEST compliance per
       GSI/PR standards

    **TEMPEST context:**
    TEMPEST refers to the investigation and study of compromising
    emanations — unintentional electromagnetic signals that, if
    intercepted and analyzed, could reveal classified information.
    Standard commercial IT equipment emits electromagnetic signals
    that can be captured from a distance.

    **Practical scope:**
    This article applies to ultrassecreta and secreta environments only.
    Reservada environments do not require TEMPEST measures.
implementation_guidance:
  platform_engineering:
    prose: |
      **Electronic security infrastructure:**
      1. Deploy TEMPEST-rated equipment in Classe I areas:
         - TEMPEST-certified computers and monitors
         - Shielded cables and fiber optics where possible
         - EMI/RFI shielding for processing rooms
      2. Implement network intrusion detection specifically for
         classified network segments.
      3. Deploy wireless intrusion prevention to detect rogue access
         points and unauthorized wireless devices in restricted areas.
      4. Use certified IT equipment: maintain list of GSI/PR-homologated
         equipment and restrict procurement to approved models.
    tools:
      - tempest-equipment
      - emi-shielding
      - wireless-ids
      - certified-hardware
  devsecops:
    prose: |
      **Electronic security in development:**
      1. Ensure development environments for ultrassecreta/secreta
         projects use certified equipment only.
      2. Implement wireless signal monitoring during classified
         development sessions.
      3. Block wireless interfaces (Wi-Fi, Bluetooth) on workstations
         in Classe I development areas.
    tools:
      - wireless-control
      - equipment-compliance
      - device-lockdown
  secops:
    prose: |
      **Electronic security operations:**
      1. Conduct TSCM sweeps of Classe I areas at least quarterly and
         before sensitive meetings or operations.
      2. Monitor for electromagnetic emission anomalies using spectrum
         analysis equipment.
      3. Maintain an inventory of certified IT equipment and track
         certification expiration dates.
      4. Coordinate with GSI/PR for TEMPEST assessments and compliance
         verification.
    tools:
      - tscm-equipment
      - spectrum-analyzer
      - equipment-certification
      - gsi-coordination
