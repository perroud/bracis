id: art-23
family: cap-5
title: "Restricted Areas Designation"
class: INFO-CLASSIFICADA
baselines: [government-all, defense, intelligence]
statement:
  prose: |
    Art. 23. Os órgãos e entidades que tratam informação classificada
    deverão designar áreas restritas, nas quais o acesso será limitado a
    pessoas autorizadas.

    § 1º As áreas restritas serão classificadas segundo a natureza e o
    grau de sigilo da informação nelas tratada ou custódiada:

    I - Área Classe I: área em que se trata ou se custódia informação
    classificada no grau de sigilo ultrassecreto ou secreto;

    II - Área Classe II: área em que se trata ou se custódia informação
    classificada no grau de sigilo reservado.

    § 2º As áreas restritas serão claramente delimitadas e sinalizadas.
guidance:
  prose: |
    Article 23 establishes the concept of restricted areas with a
    two-tier classification:

    **Area classification:**
    | Area Class | Information Handled     | Security Level  |
    |------------|-------------------------|-----------------|
    | Classe I   | Ultrassecreta / Secreta | Maximum         |
    | Classe II  | Reservada               | Standard        |

    **Requirements:**
    - Areas must be clearly delimited (physical boundaries)
    - Areas must be signalized (visual indicators of restricted status)
    - Access limited to authorized persons only

    **Digital equivalent:**
    The concept of restricted areas translates to:
    - Network security zones (VLANs, micro-segmentation)
    - Classified processing enclaves
    - Secure workstation areas for classified data access
    - Logical separation matching physical area classifications
implementation_guidance:
  platform_engineering:
    prose: |
      **Physical and logical security zones:**
      1. Implement network security zones corresponding to area classes:
         - Classe I zone: isolated network segment with dedicated
           infrastructure for ultrassecreta/secreta processing
         - Classe II zone: restricted network segment for reservada
           processing with enhanced access controls
      2. Deploy physical access control systems (badge readers, biometrics)
         at zone boundaries integrated with IAM.
      3. Implement visual indicators on screens (banners) when users
         access systems in different security zones.
      4. Deploy environmental monitoring (cameras, motion sensors) in
         Classe I areas with 24/7 recording.
    tools:
      - network-segmentation
      - physical-access-control
      - environmental-monitoring
      - security-zones
  devsecops:
    prose: |
      **Development environment zoning:**
      1. Ensure classified development workstations are located in
         appropriately classified areas.
      2. Implement logical separation: classified CI/CD runners execute
         only within the appropriate security zone.
      3. Block network traffic between classified and unclassified zones
         except through approved cross-domain solutions.
    tools:
      - zone-isolation
      - classified-runners
      - network-policies
  secops:
    prose: |
      **Restricted area governance:**
      1. Maintain a registry of all designated restricted areas with
         their classification, physical boundaries, and access lists.
      2. Conduct monthly physical security inspections of all restricted
         areas to verify signage, boundary integrity, and access control
         functionality.
      3. Review area access lists quarterly and remove personnel who
         no longer require access.
      4. Ensure area classification matches the highest classification
         level of information processed within.
    tools:
      - area-registry
      - physical-inspection
      - access-list-management
      - grc-platform
