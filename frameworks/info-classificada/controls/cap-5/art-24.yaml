id: art-24
family: cap-5
title: "Access Control for Restricted Areas"
class: INFO-CLASSIFICADA
baselines: [government-all, defense, intelligence]
statement:
  prose: |
    Art. 24. O acesso a área restrita será controlado por meio de:

    I - identificação e autenticação do pessoal autorizado;

    II - registro de entrada e saída, com indicação de data, hora e
    identificação do visitante ou servidor;

    III - controle de materiais e equipamentos que entram e saem da
    área restrita;

    IV - inspeção de segurança, quando necessário.

    Parágrafo único. Na Área Classe I, o acesso será limitado a pessoal
    com credencial de segurança compatível e que possua necessidade de
    conhecer.
guidance:
  prose: |
    Article 24 defines the access control mechanisms for restricted areas:

    **Mandatory access controls:**
    1. **Identification and authentication:** Personnel must prove identity
       before entry (badge, biometrics, PIN).
    2. **Entry/exit logging:** All entries and exits are recorded with
       date, time, and person identification.
    3. **Material control:** Equipment and materials entering or leaving
       are tracked and inspected.
    4. **Security inspection:** When deemed necessary, additional
       inspection of persons and materials.

    **Classe I additional requirement:**
    Access requires BOTH:
    - Active security clearance at the appropriate level
    - Demonstrated need-to-know

    This mirrors the dual-gate access model from art. 6 applied
    specifically to physical areas.
implementation_guidance:
  platform_engineering:
    prose: |
      **Physical access control system (PACS):**
      1. Deploy multi-factor authentication at area entry points:
         - Classe I: badge + biometric + PIN
         - Classe II: badge + PIN or badge + biometric
      2. Implement real-time access logging system that captures:
         entry/exit timestamp, person ID, access method, duration.
      3. Deploy equipment/material tracking at entry/exit points:
         X-ray scanning, RFID tracking, or manual inspection logs.
      4. Integrate PACS with IAM to verify clearance level and
         need-to-know in real-time before granting entry.
    tools:
      - physical-access-control
      - biometric-readers
      - rfid-tracking
      - iam-integration
  devsecops:
    prose: |
      **Logical access controls for classified environments:**
      1. Mirror physical access controls in logical environments:
         classified system access requires clearance verification.
      2. Implement session recording for all activities within
         classified environments (screen recording, command logging).
      3. Deploy just-in-time access for classified systems: access
         expires after a defined period and requires re-authorization.
    tools:
      - session-recording
      - jit-access
      - clearance-verification
  secops:
    prose: |
      **Access control operations:**
      1. Review access logs daily for anomalies: access outside business
         hours, repeated failed attempts, unauthorized access attempts.
      2. Conduct weekly reconciliation of access logs against authorized
         personnel lists.
      3. Verify material control logs: ensure all equipment that entered
         a restricted area was properly tracked and authorized.
      4. Coordinate security inspections at Classe I areas monthly.
    tools:
      - log-analysis
      - access-review
      - material-tracking
      - inspection-schedule
