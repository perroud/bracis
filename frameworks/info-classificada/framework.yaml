control_families:
  - id: cap-1
    title: "General Provisions and Definitions"
    description: "Scope, definitions, classification levels (reservado, secreto, ultrassecreto), and relationship with the Access to Information Law (LAI)"
    articles: "art. 1 ao art. 5"
    control_count: 5
  - id: cap-2
    title: "Security Clearance"
    description: "Security clearance (credenciamento de seguranca) process, levels of clearance, investigation procedures, NDA requirements, and clearance renewal"
    articles: "art. 6 ao art. 11"
    control_count: 6
  - id: cap-3
    title: "Handling of Classified Information"
    description: "Marking and labeling, storage, transmission, reproduction, transport, and destruction procedures for classified information"
    articles: "art. 12 ao art. 17"
    control_count: 6
  - id: cap-4
    title: "Cryptographic Security"
    description: "Mandatory encryption, approved algorithms, key management, communications security (COMSEC), and cryptographic equipment requirements"
    articles: "art. 18 ao art. 22"
    control_count: 5
  - id: cap-5
    title: "Information Security Areas"
    description: "Restricted areas, access control zones, physical security, visitor management, and electronic security measures for classified information processing"
    articles: "art. 23 ao art. 27"
    control_count: 5
  - id: cap-6
    title: "Incidents and Compromise"
    description: "Security incidents involving classified information, compromise procedures, notification to GSI/PR, and investigation requirements"
    articles: "art. 28 ao art. 30"
    control_count: 3
related_frameworks:
  - framework_id: lai
    relationship: implements
    description: >-
      Decreto 7.845/2012 implements the classified information provisions of the LAI
      (Lei 12.527/2011, art. 23-25), establishing the operational procedures for handling
      information classified under the access-to-information law.
  - framework_id: gsi-in1
    relationship: complements
    description: >-
      Decreto 7.845/2012 complements GSI/PR IN 1 by providing the specific operational
      requirements for classified information that GSI/PR IN 1 references in its broader
      information security governance framework.
  - framework_id: pnsi
    relationship: complements
    description: >-
      Decreto 7.845/2012 complements the National Information Security Policy (PNSI) by
      operationalizing classified information protection requirements within the broader
      national security policy framework.
  - framework_id: nist-800-53-rev5
    relationship: mapped
    description: >-
      Decreto 7.845/2012 maps to the NIST 800-53 SC (System and Communications
      Protection) and MP (Media Protection) families, particularly in areas of
      cryptographic protection, information marking, and secure handling.
