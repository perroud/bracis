id: iot-16
family: vuln
title: "ANATEL Vulnerability Notification Compliance"
class: ANATEL-IOT
baselines: [equipamentos-telecom]
statement:
  prose: |
    A ANATEL poderá notificar os responsáveis pela homologação de
    equipamentos sobre a existência de vulnerabilidades de segurança
    cibernética identificadas. Os prazos para correção serão
    estabelecidos pela ANATEL com base na severidade da vulnerabilidade,
    avaliada conforme o Common Vulnerability Scoring System (CVSS).

    O não atendimento aos prazos de correção estabelecidos pela ANATEL,
    ou a recusa em corrigir vulnerabilidades críticas, poderá resultar
    na suspensão ou no cancelamento do certificado de homologação do
    equipamento.

    (Ato 77/2021 §4.3; Ato 2436/2023 §7)
guidance:
  prose: |
    This control addresses the regulatory enforcement mechanism: ANATEL
    can directly mandate vulnerability remediation with binding
    deadlines, and non-compliance carries the ultimate penalty —
    loss of the homologation certificate, which means the product
    can no longer be legally sold or operated in Brazil.

    **ANATEL's enforcement process:**
    1. ANATEL identifies or is notified of a vulnerability affecting
       a homologated device.
    2. ANATEL notifies the certificate holder (manufacturer/importer)
       with the vulnerability details and a remediation deadline.
    3. The deadline is set based on CVSS severity:
       - Critical (9.0–10.0): typically 30 days.
       - High (7.0–8.9): typically 60 days.
       - Medium (4.0–6.9): typically 90 days.
       - Low (0.1–3.9): next scheduled update cycle.
    4. The manufacturer must demonstrate remediation (firmware update
       released and deployed) within the deadline.
    5. Failure to remediate: ANATEL may suspend or cancel the
       homologation certificate.

    **Business impact of certificate loss:**
    - The product cannot be sold in Brazil.
    - Existing deployed devices may be required to be recalled or
      updated.
    - Reputational damage with operators and distributors.
    - Potential financial penalties.

    **Manufacturer's obligations:**
    - Maintain a process to receive and respond to ANATEL notifications
      within 24 hours.
    - Have engineering capacity to produce emergency firmware patches
      within the ANATEL-mandated timelines.
    - Demonstrate update deployment (fleet adoption metrics).
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement an emergency patch pipeline that can produce, sign,
         and deploy a firmware update within 72 hours for critical
         vulnerabilities.
      2. Maintain a pre-tested patch infrastructure: staging
         environment that mirrors production device configurations
         for rapid patch validation.
      3. Implement forced-update capability via TR-069/USP ACS for
         critical security patches — devices update automatically
         without requiring user action.
      4. Build fleet-wide firmware version tracking to demonstrate
         update adoption rates to ANATEL.
      5. Maintain a dedicated communication channel to ANATEL
         (designated contact, email, phone) for receiving and
         responding to notifications.
    tools:
      - emergency-patch-pipeline
      - tr-069-acs
      - fleet-management-dashboard
      - firmware-staging-environment
  devsecops:
    prose: |
      1. Maintain "always-ready" CI/CD pipelines for all products
         still within their support period — pipelines must be
         functional and testable at any time, not just during
         scheduled releases.
      2. Implement automated regression testing that can validate an
         emergency patch in <24 hours (subset of full test suite
         focused on critical functionality and the patched component).
      3. Create runbooks for emergency firmware releases: steps from
         vulnerability triage → patch development → testing → signing
         → staged deployment → ANATEL notification.
      4. Conduct quarterly emergency patch drills: simulate an ANATEL
         notification and execute the full response process.
    tools:
      - gitlab-ci
      - emergency-release-pipeline
      - automated-regression-testing
      - runbook-management
  secops:
    prose: |
      1. Designate an ANATEL liaison responsible for receiving and
         responding to regulatory notifications within 24 hours.
      2. Establish an internal severity-based escalation process that
         mirrors ANATEL's CVSS-based timeline requirements.
      3. Track all ANATEL notifications, response actions, and
         remediation evidence in a compliance management system.
      4. Prepare periodic compliance reports for ANATEL demonstrating:
         active product support status, vulnerability response
         history, fleet update adoption metrics.
      5. Conduct annual tabletop exercises simulating ANATEL
         enforcement actions to validate organizational readiness.
    tools:
      - grc-platform
      - incident-management
      - compliance-reporting
      - anatel-liaison-process
legal_references:
  - framework_id: r-ciber
    articles: ["art-14", "art-15", "art-16"]
    relationship: complements
