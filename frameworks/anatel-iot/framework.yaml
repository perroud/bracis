id: anatel-iot
title: "Ato ANATEL nº 77/2021 + Ato nº 2.436/2023 — Cybersecurity Requirements for Telecommunications Equipment and IoT Devices"
short_title: "ANATEL IoT Security"
version: "77/2021 + 2436/2023 (consolidated)"
publication_date: "2021-01-05"
last_updated: "2023-03-16"
effective_date: "2024-03-10"
authority:
  name: "Agência Nacional de Telecomunicações"
  acronym: "ANATEL"
  country: "BR"
  url: "https://www.anatel.gov.br"
type: regulation
scope: telecommunications
mandatory: true
original_language: pt-br
available_languages: [pt-br]
industries:
  - telecommunications
  - iot
  - consumer-electronics
  - networking
  - smart-devices
  - industrial-iot
regions:
