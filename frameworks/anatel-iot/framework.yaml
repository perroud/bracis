  - gitops
url: "https://informacoes.anatel.gov.br/legislacao/atos-de-certificacao-de-produtos/2021/1505-ato-77"
control_families:
  - id: auth
    title: "Authentication and Credentials"
    description: "Requirements for device authentication, prohibition of default/hardcoded passwords, unique per-device credentials, brute-force protection, and session management"
    sections: "Ato 77/2021 §5.1.4; Ato 2436/2023 §§4–5"
    control_count: 5
  - id: comms
    title: "Secure Communications"
    description: "Requirements for encrypted communications, TLS/DTLS usage, certificate validation, and prohibition of undocumented communication channels"
    sections: "Ato 77/2021 §§5.1.2, 5.1.5, 5.1.6"
    control_count: 3
  - id: update
    title: "Software Update Mechanism"
    description: "Requirements for secure firmware/software update mechanisms, integrity verification, rollback capability, and manufacturer support policy"
    sections: "Ato 77/2021 §§5.1.1, 6.1.1–6.1.4"
    control_count: 3
  - id: data
    title: "Data Protection"
    description: "Requirements for personal data handling on devices, encryption at rest and in transit, data deletion capability, and transparency on data collection"
    sections: "Ato 77/2021 §5.1.6"
    control_count: 2
  - id: vuln
    title: "Vulnerability Management and Disclosure"
    description: "Requirements for manufacturer vulnerability reporting mechanism, coordinated disclosure process, public vulnerability portal, and ANATEL notification compliance"
    sections: "Ato 77/2021 §§6.1.5–6.1.7; Ato 2436/2023 §7"
    control_count: 3
  - id: network
    title: "Network Security and Attack Surface"
    description: "Requirements for disabling unnecessary ports/services, minimal attack surface, anti-spoofing filters, and rate limiting"
    sections: "Ato 77/2021 §§5.1.5, 5.1.7"
    control_count: 2
  - id: resilience
    title: "Resilience and Secure Operation"
    description: "Requirements for secure boot, integrity verification, logging, restrictive default configuration, and graceful degradation"
    sections: "Ato 77/2021 §5.1.3"
    control_count: 2
related_frameworks:
  - framework_id: r-ciber
    relationship: complements
    description: "O R-Ciber (Resolução ANATEL 740/2020) complementa os Atos de certificação ao estabelecer os requisitos gerais de cibersegurança para prestadoras de serviços de telecomunicações."
  - framework_id: lgpd
    relationship: complements
    description: "A LGPD complementa os requisitos de cibersegurança de equipamentos ao exigir a proteção de dados pessoais coletados, armazenados ou processados por dispositivos IoT."
  - framework_id: gsi-in3
    relationship: complements
    description: "A IN GSI/PR 3/2021 complementa ao estabelecer processos operacionais de segurança da informação aplicáveis a equipamentos de telecomunicações utilizados pela administração pública."
