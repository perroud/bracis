id: cscf-2.7
family: obj-2
title: "Vulnerability Scanning"
class: SWIFT-CSP
classification: mandatory
architecture_types: [A1, A2, A3, A4]

statement:
  prose: >-
    Identify known vulnerabilities within the SWIFT secure zone by performing
    regular vulnerability scanning of all systems, applications, and network
    components. Discovered vulnerabilities must be assessed, prioritized,
    and remediated according to defined timelines.
  parts:
    - id: cscf-2.7.a
      label: "2.7.a"
      prose: >-
        Vulnerability scans are performed at least quarterly on all systems
        within the SWIFT secure zone, including operating systems,
        applications, databases, and network devices.
    - id: cscf-2.7.b
      label: "2.7.b"
      prose: >-
        Scan results are analyzed and vulnerabilities are categorized by
        severity (critical, high, medium, low). Remediation timelines are
        defined and tracked: critical within 30 days, high within 60 days.
    - id: cscf-2.7.c
      label: "2.7.c"
      prose: >-
        Vulnerability scans are performed after significant changes to the
        secure zone infrastructure (new systems, major patches, configuration
        changes).

guidance:
  prose: >-
    Vulnerability scanning provides visibility into the security posture of
    the secure zone. Without regular scanning, organizations cannot know
    whether patches have been successfully applied, whether new vulnerabilities
    affect their systems, or whether misconfigurations have introduced
    weaknesses. Scans should be both authenticated (with credentials for
    deeper inspection) and network-based. The scanning tool must be kept
    current with the latest vulnerability definitions. Results should feed
    into a centralized vulnerability management workflow with SLA tracking
    and executive reporting.

references:
  - citation: "SWIFT CSCF v2024 — Control 2.7"
    url: "https://www.swift.com/myswift/customer-security-programme-csp"
  - citation: "NIST SP 800-115 — Technical Guide to Information Security Testing and Assessment"
    url: "https://doi.org/10.6028/NIST.SP.800-115"

implementation_guidance:
  platform_engineering:
    prose: >-
      Deploy authenticated vulnerability scanners (Tenable Nessus, Qualys,
      Rapid7 InsightVM) with dedicated scan credentials for the secure zone.
      Integrate container image scanning (Trivy, Grype) into build pipelines.
      Schedule quarterly infrastructure scans and post-change scans via
      automation. Maintain a vulnerability management database tracking all
      findings with remediation status and SLA compliance.
    tools:
      - tenable-nessus
      - qualys
      - rapid7-insightvm
      - trivy
      - grype
      - defectdojo

  devsecops:
    prose: >-
      Integrate vulnerability scanning into CI/CD pipelines as a quality
      gate. Block deployment of container images or VM templates with
      critical or high CVEs. Automate post-deployment scans triggered by
      infrastructure changes. Generate SBOM artifacts and correlate with
      vulnerability databases automatically.
    tools:
      - trivy
      - grype
      - syft
      - snyk
      - gitlab-ci
      - github-actions

  secops:
    prose: >-
      Review vulnerability scan reports weekly. Escalate overdue critical
      and high findings. Correlate vulnerability data with threat intelligence
      to prioritize actively exploited vulnerabilities. Maintain metrics
      dashboards showing mean time to remediate, open vulnerability counts
      by severity, and SLA compliance rates.
    tools:
      - qualys
      - tenable-io
      - rapid7-insightvm
      - splunk
      - defectdojo

