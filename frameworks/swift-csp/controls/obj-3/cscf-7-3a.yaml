id: cscf-7.3a
family: obj-3
title: "Penetration Testing"
class: SWIFT-CSP
classification: advisory
architecture_types: [A1, A2, A3, A4]

statement:
  prose: >-
    Validate the effectiveness of security controls within the SWIFT secure
    zone through regular penetration testing. Penetration tests must simulate
    realistic attack scenarios targeting SWIFT infrastructure, including
    network-layer attacks, application-layer attacks, and social engineering
    vectors relevant to SWIFT operations.
  parts:
    - id: cscf-7.3a.a
      label: "7.3A.a"
      prose: >-
        Penetration tests targeting the SWIFT secure zone are conducted
        at least annually by qualified testers (internal red team or
        external firm) with experience in financial services and SWIFT
        environments.
    - id: cscf-7.3a.b
      label: "7.3A.b"
      prose: >-
        Test scope includes network segmentation validation, lateral
        movement attempts from general IT into the secure zone, privilege
        escalation, and application-level attacks against SWIFT interfaces.
    - id: cscf-7.3a.c
      label: "7.3A.c"
      prose: >-
        Penetration test findings are risk-rated, remediation plans are
        defined with timelines, and retesting is performed to validate
        remediation effectiveness.

guidance:
  prose: >-
    Penetration testing provides empirical validation that security controls
    work as intended under adversarial conditions. Vulnerability scanning
    (Control 2.7) identifies known vulnerabilities; penetration testing
    discovers how those vulnerabilities can be chained together into
    attack paths. Tests should simulate the tactics, techniques, and
    procedures (TTPs) documented in SWIFT-related breach reports and
    financial sector threat intelligence. Segmentation testing is
    particularly critical — verifying that an attacker who compromises
    a general IT system cannot reach the secure zone. Organizations should
    consider TIBER-EU or CBEST style threat-intelligence-led testing for
    maximum realism.

references:
  - citation: "SWIFT CSCF v2024 — Control 7.3A"
    url: "https://www.swift.com/myswift/customer-security-programme-csp"
  - citation: "NIST SP 800-115 — Technical Guide to Information Security Testing and Assessment"
    url: "https://doi.org/10.6028/NIST.SP.800-115"
  - citation: "TIBER-EU Framework"
    url: "https://www.ecb.europa.eu/paym/cyber-resilience/tiber-eu/html/index.en.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Maintain a staging environment that mirrors the secure zone topology
      for safe penetration testing. Deploy attack simulation platforms
      (Atomic Red Team, Caldera, SafeBreach) for continuous security
      validation between annual tests. Provide penetration testers with
      architecture documentation and network diagrams. Ensure test
      environment has equivalent security controls to production.
    tools:
      - atomic-red-team
      - mitre-caldera
      - safebreach
      - attack-iq
      - cobalt-strike

  devsecops:
    prose: >-
      Integrate automated security testing (DAST, SAST) into CI/CD
      pipelines to catch vulnerabilities before they reach the secure
      zone. Use infrastructure attack simulation tools in staging
      pipelines. Track penetration test findings in the same defect
      management system as code vulnerabilities for unified remediation
      tracking.
    tools:
      - owasp-zap
      - burp-suite
      - nuclei
      - gitlab-ci
      - github-actions
      - defectdojo

  secops:
    prose: >-
      Coordinate penetration test scheduling with operations teams.
      Monitor for testing activity to validate scope boundaries are
      respected. Review and validate penetration test reports. Track
      remediation progress and verify retesting results. Use findings
      to improve detection rules and incident response procedures.
    tools:
      - plextrac
      - defectdojo
      - jira
      - servicenow

