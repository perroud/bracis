id: cscf-3.1
family: obj-3
title: "Physical Security"
class: SWIFT-CSP
classification: mandatory
architecture_types: [A1, A2, A3, A4]

statement:
  prose: >-
    Prevent unauthorized physical access to sensitive SWIFT-related equipment,
    workplace environments, hosting sites, and storage. Physical security
    controls must protect SWIFT infrastructure components, operator
    workstations, network equipment, and any media containing SWIFT-related
    data from unauthorized access, tampering, and theft.
  parts:
    - id: cscf-3.1.a
      label: "3.1.a"
      prose: >-
        SWIFT infrastructure components (servers, network equipment,
        HSMs) are housed in physically secured areas with access restricted
        to authorized personnel via badge readers, biometric controls,
        or equivalent mechanisms.
    - id: cscf-3.1.b
      label: "3.1.b"
      prose: >-
        Physical access to secure areas is logged, and logs are reviewed
        at least monthly. Visitor access requires escort and is recorded.
    - id: cscf-3.1.c
      label: "3.1.c"
      prose: >-
        Operator workstations used for SWIFT operations are in controlled
        areas preventing unauthorized observation (shoulder surfing) and
        physical access by non-authorized individuals.

guidance:
  prose: >-
    Physical security is the foundation upon which all logical controls
    depend. An attacker with physical access to SWIFT servers can bypass
    network controls, extract encryption keys, install hardware keyloggers,
    or tamper with system configurations. Data center hosting SWIFT
    infrastructure should meet Tier II or higher physical security standards.
    Operator areas should have controlled entry, clear desk policies, and
    CCTV monitoring. Removable media policies must prevent unauthorized data
    extraction. Decommissioned hardware must be securely wiped before
    disposal.

references:
  - citation: "SWIFT CSCF v2024 — Control 3.1"
    url: "https://www.swift.com/myswift/customer-security-programme-csp"
  - citation: "NIST SP 800-53 Rev. 5 — PE Family (Physical and Environmental Protection)"
    url: "https://doi.org/10.6028/NIST.SP.800-53r5"

implementation_guidance:
  platform_engineering:
    prose: >-
      Deploy SWIFT infrastructure in data centers with SOC 2 Type II or
      ISO 27001 certified physical security. Use dedicated locked cabinets
      or cages for SWIFT equipment. Implement environmental monitoring
      (temperature, humidity, water detection) with automated alerting.
      If using cloud providers, select regions and availability zones with
      documented physical security certifications. Maintain asset inventory
      with physical location tracking for all secure zone components.
    tools:
      - asset-management-cmdb
      - dcim-tools
      - environmental-monitoring

  devsecops:
    prose: >-
      Maintain physical security configuration as code where applicable
      (access control lists, camera zone definitions). Automate asset
      inventory reconciliation between CMDB and deployed infrastructure.
      Include physical security requirements in infrastructure provisioning
      checklists enforced by pipeline gates.
    tools:
      - ansible
      - servicenow-cmdb
      - gitlab-ci

  secops:
    prose: >-
      Review physical access logs monthly. Investigate unauthorized access
      attempts or tailgating incidents. Conduct quarterly walkthroughs
      to verify physical controls (locks, cameras, badge readers) are
      functioning. Monitor CCTV for anomalous activity in SWIFT equipment
      areas. Verify that terminated employees' physical access is revoked
      within 24 hours.
    tools:
      - lenel-onguard
      - genetec
      - honeywell-pro-watch
      - splunk

