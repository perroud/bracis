id: cscf-7.4a
family: obj-3
title: "Scenario Risk Assessment"
class: SWIFT-CSP
classification: advisory
architecture_types: [A1, A2, A3, A4, B]

statement:
  prose: >-
    Conduct scenario-based risk assessments to evaluate the organization's
    exposure to SWIFT-related cyber threats. Risk assessments must consider
    realistic attack scenarios specific to the organization's SWIFT
    architecture type, threat landscape, and operational context, and
    must drive prioritization of security investments and control
    improvements.
  parts:
    - id: cscf-7.4a.a
      label: "7.4A.a"
      prose: >-
        Scenario-based risk assessments are conducted at least annually,
        covering threats specific to the organization's SWIFT architecture
        type (A1, A2, A3, A4, or B) and operational context.
    - id: cscf-7.4a.b
      label: "7.4A.b"
      prose: >-
        Risk scenarios include: operator credential compromise, malware
        injection in the secure zone, insider threat, service provider
        compromise, and supply chain attacks against SWIFT-related
        software.
    - id: cscf-7.4a.c
      label: "7.4A.c"
      prose: >-
        Risk assessment results are documented with likelihood and impact
        ratings, mapped to existing controls, and used to identify gaps
        that require additional mitigations or risk acceptance decisions.
    - id: cscf-7.4a.d
      label: "7.4A.d"
      prose: >-
        Risk assessment findings are presented to senior management and
        drive security investment priorities and control improvement
        roadmaps.

guidance:
  prose: >-
    Scenario-based risk assessments provide a structured approach to
    understanding how known attack patterns could affect the organization's
    specific SWIFT environment. Unlike generic risk assessments, scenario-based
    assessments walk through realistic attack chains step by step, evaluating
    the effectiveness of each control layer. Organizations should leverage
    threat intelligence from SWIFT ISAC, FS-ISAC, and publicly documented
    SWIFT breach reports to develop relevant scenarios. The MITRE ATT&CK
    framework for financial services provides a structured taxonomy for
    mapping attack techniques to defensive controls. Risk assessments should
    evaluate both technical and operational controls, including human
    factors such as operator fatigue and social engineering susceptibility.

references:
  - citation: "SWIFT CSCF v2024 — Control 7.4A"
    url: "https://www.swift.com/myswift/customer-security-programme-csp"
  - citation: "NIST SP 800-30 Rev. 1 — Guide for Conducting Risk Assessments"
    url: "https://doi.org/10.6028/NIST.SP.800-30r1"
  - citation: "MITRE ATT&CK for Financial Services"
    url: "https://attack.mitre.org/"

implementation_guidance:
  platform_engineering:
    prose: >-
      Maintain an up-to-date asset inventory and network topology of the
      SWIFT secure zone as input to risk assessments. Deploy attack path
      analysis tools (BloodHound, XM Cyber, Cymulate) to automatically
      map potential attack chains in the environment. Use infrastructure-as-code
      as a source of truth for architecture review during assessments.
      Document all compensating controls and risk acceptance decisions
      in a risk register.
    tools:
      - xm-cyber
      - cymulate
      - attackiq
      - bloodhound
      - terraform

  devsecops:
    prose: >-
      Incorporate risk assessment findings into CI/CD pipeline security
      gates. Prioritize security tool configuration updates based on
      identified risk scenarios. Automate control validation for
      risk-identified gaps. Maintain risk assessment artifacts in
      version-controlled repositories alongside infrastructure code.
    tools:
      - gitlab-ci
      - github-actions
      - defectdojo
      - opa

  secops:
    prose: >-
      Facilitate annual risk assessment workshops with SWIFT operations,
      IT security, and senior management. Use threat intelligence from
      SWIFT ISAC and FS-ISAC to inform scenario development. Map scenarios
      to MITRE ATT&CK techniques and validate detection coverage. Track
      risk treatment plans and report progress to senior management
      quarterly. Update risk scenarios when significant changes occur
      (new architecture, new threats, control changes).
    tools:
      - archer-grc
      - servicenow-grc
      - onetrust
      - riskonnect
      - mitre-attack-navigator

