id: cscf-7.1
family: obj-3
title: "Cyber Incident Response Planning"
class: SWIFT-CSP
classification: mandatory
architecture_types: [A1, A2, A3, A4, B]

statement:
  prose: >-
    Establish and maintain a cyber incident response plan that covers
    SWIFT-related security incidents. The plan must define roles,
    responsibilities, communication procedures, escalation paths, and
    recovery actions. It must be tested regularly and updated based on
    lessons learned from exercises and actual incidents.
  parts:
    - id: cscf-7.1.a
      label: "7.1.a"
      prose: >-
        A documented cyber incident response plan exists that specifically
        addresses SWIFT-related security incidents, including unauthorized
        transaction submission, credential compromise, malware detection
        in the secure zone, and infrastructure breach scenarios.
    - id: cscf-7.1.b
      label: "7.1.b"
      prose: >-
        The plan defines clear roles and responsibilities, including
        incident commander, technical investigators, communications lead,
        and executive escalation contacts. Contact information for SWIFT
        CSIRT and relevant law enforcement is included.
    - id: cscf-7.1.c
      label: "7.1.c"
      prose: >-
        The incident response plan is tested at least annually through
        tabletop exercises or simulations. Lessons learned are documented
        and incorporated into plan updates.
    - id: cscf-7.1.d
      label: "7.1.d"
      prose: >-
        SWIFT-related incidents are reported to SWIFT CSIRT within required
        timelines, and relevant information is shared with industry peers
        through SWIFT ISAC.

guidance:
  prose: >-
    Effective incident response can mean the difference between a contained
    security event and a catastrophic financial loss. SWIFT CSP requires
    organizations to have specific response procedures for SWIFT-related
    incidents, not just generic IT incident response. The plan must include
    immediate containment actions (disconnecting compromised systems from
    SWIFTNet), evidence preservation procedures, and communication
    protocols with SWIFT, regulators, correspondent banks, and law
    enforcement. Organizations should maintain a "go bag" of forensic
    tools pre-approved for use in the secure zone. SWIFT provides incident
    response resources through its CSIRT team that organizations should
    leverage during active incidents.

references:
  - citation: "SWIFT CSCF v2024 — Control 7.1"
    url: "https://www.swift.com/myswift/customer-security-programme-csp"
  - citation: "NIST SP 800-61 Rev. 2 — Computer Security Incident Handling Guide"
    url: "https://doi.org/10.6028/NIST.SP.800-61r2"

implementation_guidance:
  platform_engineering:
    prose: >-
      Maintain incident response runbooks as version-controlled documents.
      Pre-deploy forensic tools (Velociraptor, GRR, KAPE) in the secure
      zone for rapid evidence collection. Configure automated containment
      playbooks (isolate host, disable account, block IP) in SOAR
      platforms. Maintain pre-built forensic VM images for rapid
      deployment. Ensure network segmentation supports rapid isolation
      of compromised segments without disrupting the entire secure zone.
    tools:
      - velociraptor
      - grr
      - kape
      - palo-alto-xsoar
      - splunk-soar
      - tines

  devsecops:
    prose: >-
      Version-control incident response playbooks and automation scripts.
      Test containment automation in staging environments. Maintain
      infrastructure-as-code for rapid secure zone rebuild if needed.
      Automate evidence collection pipelines that preserve chain of
      custody.
    tools:
      - ansible
      - terraform
      - gitlab-ci
      - github-actions

  secops:
    prose: >-
      Conduct annual tabletop exercises with SWIFT-specific scenarios
      (fraudulent MT103 detection, operator account compromise, malware
      in secure zone). Maintain relationships with SWIFT CSIRT and law
      enforcement. Practice evidence preservation and forensic procedures.
      Track mean time to detect (MTTD) and mean time to respond (MTTR)
      metrics. Update runbooks after every incident or exercise.
    tools:
      - palo-alto-xsoar
      - splunk-soar
      - servicenow-sir
      - jira
      - confluence

