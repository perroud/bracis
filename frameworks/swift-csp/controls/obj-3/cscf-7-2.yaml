id: cscf-7.2
family: obj-3
title: "Security Training"
class: SWIFT-CSP
classification: mandatory
architecture_types: [A1, A2, A3, A4, B]

statement:
  prose: >-
    Ensure that all personnel involved in SWIFT operations, including
    operators, administrators, and management, receive regular security
    awareness training and role-specific training on SWIFT-related threats,
    policies, and procedures.
  parts:
    - id: cscf-7.2.a
      label: "7.2.a"
      prose: >-
        All SWIFT operators and administrators complete security awareness
        training at least annually, covering social engineering, phishing,
        insider threats, and SWIFT-specific attack scenarios.
    - id: cscf-7.2.b
      label: "7.2.b"
      prose: >-
        Role-specific training is provided: operators receive training on
        transaction verification procedures and fraud indicators;
        administrators receive training on secure configuration and
        incident response procedures.
    - id: cscf-7.2.c
      label: "7.2.c"
      prose: >-
        Training completion is tracked and enforced. Personnel who have
        not completed required training within defined timeframes have
        their SWIFT access suspended until training is completed.

guidance:
  prose: >-
    Human error and social engineering remain primary attack vectors
    against financial institutions. SWIFT operators are specifically
    targeted through spear-phishing campaigns designed to steal credentials
    or install malware on operator PCs. Training must go beyond generic
    security awareness to include SWIFT-specific scenarios: recognizing
    unauthorized transaction modifications, verifying unusual payment
    requests through out-of-band channels, and responding to suspicious
    system behavior. Management must understand the SWIFT CSP requirements
    and their compliance obligations. Training should include lessons
    learned from publicly documented SWIFT-related breaches.

references:
  - citation: "SWIFT CSCF v2024 — Control 7.2"
    url: "https://www.swift.com/myswift/customer-security-programme-csp"
  - citation: "NIST SP 800-50 — Building an Information Technology Security Awareness and Training Program"
    url: "https://doi.org/10.6028/NIST.SP.800-50"

implementation_guidance:
  platform_engineering:
    prose: >-
      Deploy a learning management system (LMS) to track training
      completion and enforce prerequisites for SWIFT system access.
      Integrate LMS with identity management to automatically suspend
      access for non-compliant personnel. Build SWIFT-specific training
      modules covering operational security procedures and threat
      scenarios. Automate training assignment based on role-based access
      control groups.
    tools:
      - knowbe4
      - proofpoint-sat
      - mimecast-awareness
      - sailpoint
      - okta

  devsecops:
    prose: >-
      Include security training verification as a gate in access
      provisioning workflows. Automate reporting of training compliance
      metrics. Integrate phishing simulation results with access risk
      scoring.
    tools:
      - knowbe4
      - gitlab-ci
      - servicenow

  secops:
    prose: >-
      Conduct quarterly phishing simulations targeting SWIFT operators.
      Track simulation click rates and report to management. Provide
      targeted remedial training for personnel who fail simulations.
      Review training content annually against emerging threat landscape.
      Maintain training records as audit evidence.
    tools:
      - knowbe4
      - proofpoint-sat
      - cofense
      - splunk

