id: swift-csp
title: "SWIFT Customer Security Programme — Customer Security Controls Framework (CSCF) v2024"
short_title: "SWIFT CSP"
version: "2024"
publication_date: "2024-07-01"
last_updated: "2024-07-01"

authority:
  name: "Society for Worldwide Interbank Financial Telecommunication"
  acronym: "SWIFT"
  country: BE
  url: "https://www.swift.com/myswift/customer-security-programme-csp"

type: standard
scope: cybersecurity
mandatory: true

original_language: en
available_languages:
  - en

industries:
  - banking
  - financial-services
  - capital-markets

regions:
  - global

techstacks:
  - platform-engineering
  - devsecops
  - secops
  - zero-trust

architecture_types:
  - id: A1
    title: "SWIFT On-Premises"
    description: "Users that run SWIFT infrastructure (messaging interface, communication interface, and connector) on premises."
  - id: A2
    title: "Partial On-Premises"
    description: "Users that run a communication interface and connector on premises but use an application hosted by a service provider."
  - id: A3
    title: "Connector Only"
    description: "Users that run a connector component on premises connecting to a SWIFT service provider."
  - id: A4
    title: "Customer-Managed Server"
    description: "Users that operate a server running SWIFT-related software outside the secure zone."
  - id: B
    title: "No Local SWIFT Footprint"
    description: "Users with no SWIFT-specific infrastructure; they rely entirely on a service bureau or similar provider."

objectives:
  - id: obj-1
    title: "Restrict Internet Access and Protect Critical Systems"
    principles:
      - id: principle-1
        title: "Restrict Internet Access"
        controls: [cscf-1.1, cscf-1.2, cscf-1.3, cscf-1.4]
  - id: obj-2
    title: "Reduce Attack Surface and Vulnerabilities"
    principles:
      - id: principle-2
        title: "Reduce Attack Surface"
        controls: [cscf-2.1, cscf-2.2, cscf-2.3, cscf-2.4a, cscf-2.6, cscf-2.7, cscf-2.8a]
  - id: obj-3
    title: "Secure the Environment"
    principles:
      - id: principle-3
        title: "Physically Secure the Environment"
        controls: [cscf-3.1]
      - id: principle-4
        title: "Prevent Credential Compromise"
        controls: [cscf-4.1, cscf-4.2]
      - id: principle-5
        title: "Manage Identities and Segregate Privileges"
        controls: [cscf-5.1, cscf-5.2, cscf-5.4]
      - id: principle-6
        title: "Detect Anomalous Activity to Systems or Transaction Records"
        controls: [cscf-6.1, cscf-6.2, cscf-6.3, cscf-6.4]
      - id: principle-7
        title: "Plan for Incident Response and Information Sharing"
        controls: [cscf-7.1, cscf-7.2, cscf-7.3a, cscf-7.4a]

control_families:
  - id: obj-1
    title: "Restrict Internet Access and Protect Critical Systems"
    description: "Controls ensuring that SWIFT-related components are isolated from general-purpose internet traffic and that critical systems within the secure zone are protected from compromise."
    control_count: 4
  - id: obj-2
    title: "Reduce Attack Surface and Vulnerabilities"
    description: "Controls that minimize exploitable entry points through patch management, hardening, secure data flows, vulnerability scanning, and outsourcing governance."
    control_count: 7
  - id: obj-3
    title: "Secure the Environment"
    description: >-
      Controls covering physical security, credential management,
      identity governance, anomaly detection, malware protection,
      integrity assurance, logging, incident response, training,
      and testing.
    control_count: 14

related_frameworks:
  - framework_id: nist-800-53-rev5
    relationship: mapped
    mapping_file: "mappings/swift-csp_to_nist-800-53-rev5.yaml"
  - framework_id: iso-27001-2022
    relationship: mapped
    mapping_file: "mappings/swift-csp_to_iso-27001-2022.yaml"
  - framework_id: pci-dss-v4
    relationship: complements
    mapping_file: "mappings/swift-csp_to_pci-dss-v4.yaml"

tags:
  - swift
  - banking
  - financial-messaging
  - interbank
  - secure-zone
  - cscf
  - payment-security
  - network-segmentation
  - multi-factor-authentication
