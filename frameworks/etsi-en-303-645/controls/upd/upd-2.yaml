id: upd-2
family: upd
title: "Support Period Publication for Software Updates"
class: ETSIEN303645
baselines: [mandatory]

statement:
  prose: >-
    The manufacturer shall publish, in an accessible way that is clear and transparent
    to the user, the defined support period. The defined support period shall be the
    minimum length of time for which the manufacturer will provide security updates.
    For each device and at the point of sale, the duration of security update support
    shall be made available to the consumer in a clear, accessible, and transparent manner.

guidance:
  prose: >-
    Consumers have a right to know how long their IoT device will receive security support
    before they purchase it. This provision addresses the lifecycle transparency problem:
    many IoT devices are abandoned by manufacturers with no indication of end-of-support
    dates, leaving consumers exposed to unpatched vulnerabilities. The support period must
    be communicated at the point of sale (product packaging, retail listing, and product
    webpage) and must represent a minimum commitment. The manufacturer is expected to provide
    security updates for at least this stated duration. This provision directly enables
    consumer purchasing decisions based on long-term security commitment.

references:
  - citation: "ETSI EN 303 645, Provision 5.3-13"
    url: "https://www.etsi.org/deliver/etsi_en/303600_303699/303645/02.01.01_60/en_303645v020101p.pdf"

implementation_guidance:
  platform_engineering:
    prose: >-
      Define a product lifecycle management system that tracks the support period for each
      device model and SKU. Publish the support end-date on the product's specification page,
      retail listings, and in the device's companion application. Implement an automated
      notification system that informs users when their device is approaching end-of-support
      with at least 6 months advance notice. Provide a public product security lifecycle
      page on the manufacturer's website listing all products and their support status.
      Integrate support period metadata into the device's firmware so the device itself can
      display its support status.
    tools:
      - product-lifecycle-management
      - cms
      - mobile-companion-app
      - notification-service

  devsecops:
    prose: >-
      Maintain a product matrix in the CI/CD configuration that maps each firmware branch
      to its support end-date. Automate alerts when a product branch is approaching its
      end-of-support date so the team can plan final security patches. Implement automated
      checks that prevent accidental feature additions to end-of-life branches (security
      fixes only). Ensure the build pipeline includes the support period metadata in firmware
      manifests and release notes.
    tools:
      - gitlab-ci
      - jira
      - confluence
      - release-management-tool

  secops:
    prose: >-
      Track the support lifecycle of all products in the fleet and escalate when devices
      are deployed beyond their supported period. Generate compliance reports showing the
      percentage of deployed devices within their support window. Plan decommissioning or
      replacement strategies for devices approaching end-of-support. Monitor for vulnerability
      disclosures affecting end-of-life products and coordinate risk-acceptance decisions
      with stakeholders.
    tools:
      - asset-management-system
      - servicenow
      - grafana
      - splunk

