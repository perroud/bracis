id: art-10
family: cap-3
title: "Information Request Procedure"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 10. Qualquer interessado poderá apresentar pedido de acesso a
    informações aos órgãos e entidades referidos no art. 1º desta Lei,
    por qualquer meio legítimo, devendo o pedido conter a identificação
    do requerente e a especificação da informação requerida.

    § 1º Para o acesso a informações de interesse público, a identificação
    do requerente não pode conter exigências que inviabilizem a solicitação.

    § 2º Os órgãos e entidades do poder público devem viabilizar alternativa
    de encaminhamento de pedidos de acesso por meio de seus sítios oficiais
    na internet.

    § 3º São vedadas quaisquer exigências relativas aos motivos
    determinantes da solicitação de informações de interesse público.
guidance:
  prose: |
    Article 10 establishes the fundamental rules for information requests:

    1. **Universal standing (caput):** Any interested person can submit a
       request — no need to demonstrate specific interest or standing.
    2. **Minimal identification (§ 1):** Requester identification cannot
       impose requirements that effectively prevent requests. Excessive
       documentation requirements violate this provision.
    3. **Online channel mandatory (§ 2):** Public bodies must provide an
       online request submission option through their official websites.
    4. **No motive required (§ 3):** Requesters cannot be asked to justify
       or explain why they want the information. This is an absolute
       prohibition.

    **System design implications:**
    - Request forms must accept minimal identification (name and contact)
    - No "reason for request" field should be mandatory
    - Anonymous requests may be technically possible but identification is
      legally required for response delivery
    - The system must be accessible without requiring complex registration
implementation_guidance:
  platform_engineering:
    prose: |
      **e-SIC request intake:**
      1. Implement a simplified request submission form requiring only name,
         contact method (email or address), and the information requested.
      2. Do NOT include mandatory fields for reason/justification of request
         (§ 3 violation).
      3. Implement authentication-optional submission — allow requests without
         complex account creation processes (§ 1 compliance).
      4. Build multi-channel request intake (web form, email, API) to
         ensure accessibility (§ 2).
    tools:
      - citizen-portal
      - api-gateway
      - form-builder
      - multi-channel-intake
  devsecops:
    prose: |
      **Request form compliance validation:**
      1. Implement automated tests verifying that request forms do not
         contain mandatory "reason" or "justification" fields (§ 3).
      2. Validate that identification requirements are minimal and do not
         include unnecessary documents (§ 1).
      3. Test online request submission flow end-to-end in CI/CD pipeline.
    tools:
      - gitlab-ci
      - e2e-testing
      - compliance-validation
  secops:
    prose: |
      **Request handling compliance:**
      1. Audit request rejection rates to detect improper rejections based
         on insufficient identification or missing motives.
      2. Monitor for patterns of excessive documentation requests that
         could violate § 1.
      3. Ensure personal data collected in requests is protected per LGPD
         and used only for response delivery.
    tools:
      - audit-platform
      - compliance-monitoring
      - data-protection
legal_references:
  - framework_id: lgpd
    articles: ["art-7", "art-11"]
    relationship: complements
