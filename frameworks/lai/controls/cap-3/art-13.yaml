id: art-13
family: cap-3
title: "Appeals Against Denial of Access"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 13. Quando se tratar de acesso a informações contidas em documento
    cuja manipulação possa prejudicar sua integridade, deverá ser oferecida
    a consulta de cópia, com certificação de que esta confere com o
    original.

    Parágrafo único. Na impossibilidade de obtenção de cópias, o
    interessado poderá solicitar que, a suas expensas e sob supervisão de
    servidor público, a reprodução seja feita por outro meio que não ponha
    em risco a conservação do documento original.
guidance:
  prose: |
    Article 13 addresses the preservation of original documents while
    maintaining access rights:

    1. **Certified copies:** When handling the original document could
       damage it, a certified copy must be provided instead.
    2. **Alternative reproduction (parágrafo único):** If copies cannot be
       obtained by the body, the requester can have reproduction done at
       their own expense under official supervision, using methods that
       do not risk the original.

    **Practical application:**
    This is particularly relevant for historical archives, fragile documents,
    and records not yet digitized. For digital systems, this article drives
    the need for digitization programs to make document access possible
    without physical handling.
implementation_guidance:
  platform_engineering:
    prose: |
      **Document preservation and access:**
      1. Implement digitization pipeline for physical documents to enable
         access without handling originals.
      2. Build digital certification capability (digital signatures) for
         copies to serve as certified reproductions.
      3. Maintain a registry of documents requiring special handling with
         their digitized equivalents.
    tools:
      - document-management
      - digital-signatures
      - digitization-pipeline
  devsecops:
    prose: |
      **Digitization quality assurance:**
      1. Implement quality validation for digitized documents (resolution,
         readability, completeness) in the digitization pipeline.
      2. Automate integrity verification between originals and digital
         copies using hash comparisons.
    tools:
      - image-quality-validation
      - integrity-verification
      - gitlab-ci
  secops:
    prose: |
      **Document access governance:**
      1. Track which documents require special handling and their
         digitization status.
      2. Maintain audit logs for supervised reproduction sessions
         (parágrafo único).
      3. Monitor digitization backlog to prioritize high-demand documents.
    tools:
      - document-tracking
      - audit-trail
      - digitization-dashboard
legal_references:
  - framework_id: info-classificada
    articles: ["art-6"]
    relationship: implements
