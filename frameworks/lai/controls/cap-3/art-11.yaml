id: art-11
family: cap-3
title: "Response Deadlines and Procedures"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 11. O órgão ou entidade pública deverá autorizar ou conceder o
    acesso imediato à informação disponível.

    § 1º Não sendo possível conceder o acesso imediato, na forma disposta
    no caput, o órgão ou entidade que receber o pedido deverá, em prazo
    não superior a 20 (vinte) dias:

    I - comunicar a data, local e modo para se realizar a consulta, efetuar
    a reprodução ou obter a certidão;

    II - indicar as razões de fato ou de direito da recusa, total ou
    parcial, do acesso pretendido; ou

    III - comunicar que não possui a informação, indicar, se for do seu
    conhecimento, o órgão ou a entidade que a detém, ou, ainda, remeter o
    requerimento a esse órgão ou entidade, cientificando o interessado da
    remessa de seu pedido de informação.

    § 2º O prazo referido no § 1º poderá ser prorrogado por mais 10 (dez)
    dias, mediante justificativa expressa, da qual será cientificado o
    requerente.

    § 3º Sem prejuízo da segurança e da proteção das informações e do
    cumprimento da legislação aplicável, o órgão ou entidade poderá
    oferecer meios para que o próprio requerente possa pesquisar a
    informação de que necessitar.

    § 4º Quando não for autorizado o acesso por se tratar de informação
    total ou parcialmente sigilosa, o requerente deverá ser informado sobre
    a possibilidade de recurso, prazos e condições para sua interposição,
    devendo, ainda, ser-lhe indicada a autoridade competente para sua
    apreciação.

    § 5º A informação armazenada em formato digital será fornecida nesse
    formato, caso haja anuência do requerente.

    § 6º Caso a informação solicitada esteja disponível ao público em
    formato impresso, eletrônico ou em qualquer outro meio de acesso
    universal, serão informados ao requerente, por escrito, o lugar e a
    forma de consultar, obter ou reproduzir a referida informação,
    procedimento esse que desindesobriga o órgão ou entidade pública da
    obrigação de seu fornecimento direto, salvo se o requerente declarar
    não dispor de meios para realizar por si mesmo tais procedimentos.
guidance:
  prose: |
    Article 11 establishes the response timeline and procedures:

    **Immediate access (caput):** If the information is readily available,
    access must be granted immediately — not queued or batched.

    **20-day deadline (§ 1):** When immediate access is not possible, the
    body has 20 calendar days to either:
    - Provide access instructions (I)
    - Formally refuse with legal justification (II)
    - Redirect to the correct body (III)

    **10-day extension (§ 2):** One extension of 10 days is possible, but
    requires explicit justification communicated to the requester.

    **Total maximum: 30 calendar days from receipt.**

    **Denial procedures (§ 4):** When access is denied (fully or partially),
    the response must include appeal information: which authority to appeal
    to, deadlines, and conditions.

    **Digital format preference (§ 5):** Digital information must be provided
    digitally if the requester agrees.

    **Already public information (§ 6):** If the information is already
    publicly available, the body can direct the requester to the source
    instead of providing it directly.
implementation_guidance:
  platform_engineering:
    prose: |
      **SLA-driven request workflow:**
      1. Implement automated SLA tracking with 20-day primary deadline and
         10-day extension, with escalation alerts at 15, 18, and 20 days.
      2. Build automated routing logic to redirect requests to the correct
         body when the receiving entity does not hold the information (§ 1, III).
      3. Implement response templates for the three outcomes: access granted
         (I), denial with justification (II), and redirect (III).
      4. Build appeal workflow triggered automatically when access is denied,
         providing requester with competent authority and deadline info (§ 4).
      5. Configure digital delivery as default format for digitally stored
         information (§ 5).
    tools:
      - workflow-engine
      - sla-monitoring
      - notification-service
      - document-delivery
  devsecops:
    prose: |
      **Workflow compliance testing:**
      1. Implement end-to-end tests for all three response paths (grant,
         deny, redirect) in the request management pipeline.
      2. Validate SLA calculation logic (20+10 days, calendar days, weekends,
         holidays) through automated testing.
      3. Test that denial responses automatically include appeal information
         as required by § 4.
    tools:
      - gitlab-ci
      - e2e-testing
      - sla-validation
  secops:
    prose: |
      **Deadline compliance monitoring:**
      1. Track and report SLA compliance rates — percentage of requests
         answered within 20 days, extended requests, and overdue requests.
      2. Monitor denial rates and verify that all denials include proper
         legal justification (§ 1, II) and appeal instructions (§ 4).
      3. Audit redirect requests to ensure they reach the correct body and
         are not lost in transit (§ 1, III).
    tools:
      - sla-dashboard
      - compliance-reporting
      - audit-trail
