id: art-12
family: cap-3
title: "Free Access and Reproduction Costs"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 12. O serviço de busca e fornecimento da informação é gratuito,
    salvo nas hipóteses de reprodução de documentos pelo órgão ou entidade
    pública consultada, situação em que poderá ser cobrado exclusivamente
    o valor necessário ao ressarcimento do custo dos serviços e dos
    materiais utilizados.

    Parágrafo único. Estará isento de ressarcir os custos previstos no
    caput todo aquele cuja situação econômica não lhe permita fazê-lo sem
    prejuízo do sustento próprio ou da família, declarada nos termos da
    Lei nº 7.115, de 29 de agosto de 1983.
guidance:
  prose: |
    Article 12 establishes the cost principle for information access:

    1. **Free by default:** Search and provision of information is free.
       No fees can be charged for processing requests.
    2. **Reproduction cost only:** When physical reproduction is needed
       (printing, copying), only the actual cost of materials and services
       can be charged — no profit, no administrative overhead.
    3. **Poverty exemption:** Persons who cannot afford reproduction costs
       without compromising their own or family sustenance are exempt,
       upon self-declaration per Lei 7.115/1983.

    **Digital delivery implication:**
    Since digital delivery has near-zero marginal cost, providing information
    digitally (per art. 11, § 5) effectively eliminates any cost barrier,
    making the poverty exemption moot for digital requests.
implementation_guidance:
  platform_engineering:
    prose: |
      **Cost-free digital delivery:**
      1. Prioritize digital delivery channels (email, portal download) to
         eliminate reproduction costs entirely.
      2. If physical reproduction is needed, implement a cost calculator
         based on actual material costs (per page, per copy) with no
         markup.
      3. Build a self-declaration workflow for poverty exemption, requiring
         only a simple declaration (not proof of income).
    tools:
      - document-delivery
      - cost-calculator
      - citizen-portal
  devsecops:
    prose: |
      **Delivery pipeline:**
      1. Automate document format conversion (PDF, CSV, HTML) to enable
         digital delivery as default.
      2. Test that cost calculations, when applicable, reflect only actual
         reproduction costs.
    tools:
      - document-conversion
      - gitlab-ci
  secops:
    prose: |
      **Cost compliance:**
      1. Audit any charges applied to information requests to verify they
         reflect only actual reproduction costs.
      2. Monitor for patterns of cost-based barriers to information access.
    tools:
      - audit-platform
      - compliance-monitoring
legal_references:
  - framework_id: gov-digital
    articles: ["art-3"]
    relationship: complements
