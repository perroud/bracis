id: art-14
family: cap-3
title: "Appeal and Review Process"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 14. É direito do requerente obter o inteiro teor de decisão de
    negativa de acesso, por certidão ou cópia.

    Art. 15. No caso de indeferimento de acesso a informações ou às razões
    da negativa do acesso, poderá o interessado interpor recurso contra a
    decisão no prazo de 10 (dez) dias a contar da sua ciência.

    Parágrafo único. O recurso será dirigido à autoridade hierarquicamente
    superior à que exarou a decisão impugnada, que deverá se manifestar
    no prazo de 5 (cinco) dias.

    Art. 16. Negado o acesso a informação pelos órgãos ou entidades do
    Poder Executivo Federal, o requerente poderá recorrer à
    Controladoria-Geral da União, que deliberará no prazo de 5 (cinco) dias
    se:

    I - o acesso à informação não classificada como sigilosa for negado;

    II - a decisão de negativa de acesso à informação total ou parcialmente
    classificada como sigilosa não indicar a autoridade classificadora ou
    a hierarquicamente superior a quem o pedido deve ser dirigido;

    III - os procedimentos de classificação de informação sigilosa
    estabelecidos nesta Lei não tiverem sido observados; e

    IV - estiverem sendo descumpridos prazos ou outros procedimentos
    previstos nesta Lei.

    § 1º O recurso previsto neste artigo somente poderá ser dirigido à
    Controladoria-Geral da União depois de submetido à apreciação de pelo
    menos uma autoridade hierarquicamente superior àquela que exarou a
    decisão impugnada, que deliberou no prazo de 5 (cinco) dias.

    § 2º Verificada a procedência das razões do recurso, a
    Controladoria-Geral da União determinará ao órgão ou entidade que
    adote as providências necessárias para dar cumprimento ao disposto
    nesta Lei.
guidance:
  prose: |
    Articles 14, 15, and 16 establish the multi-tier appeal process:

    **Tier 1 — Internal appeal (art. 15):**
    - Deadline: 10 days from notification of denial
    - Directed to: Hierarchically superior authority
    - Response deadline: 5 days

    **Tier 2 — CGU appeal (art. 16, federal executive only):**
    - Available after at least one internal appeal (§ 1)
    - CGU response deadline: 5 days
    - Grounds: denial of non-classified information (I), missing
      classification authority information (II), improper classification
      procedures (III), or procedural deadline violations (IV)

    **Right to full denial text (art. 14):**
    The requester has the right to obtain the complete text of the denial
    decision, as certified copy.

    **CGU enforcement power (§ 2):**
    If the CGU finds the appeal valid, it can order the body to comply
    with the LAI — this is an enforcement mechanism, not merely advisory.
implementation_guidance:
  platform_engineering:
    prose: |
      **Multi-tier appeal workflow:**
      1. Implement a tiered appeal system in the e-SIC platform:
         Tier 1 (internal superior, 10-day filing + 5-day response) and
         Tier 2 (CGU, 5-day response).
      2. Automate appeal routing to the hierarchically superior authority
         based on organizational hierarchy data.
      3. Generate certified copies of denial decisions automatically for
         requester download (art. 14).
      4. Implement CGU integration API for federal bodies to forward
         Tier 2 appeals electronically.
      5. Build SLA tracking for appeal deadlines (10 days for filing,
         5 days for each tier response).
    tools:
      - workflow-engine
      - organizational-hierarchy
      - document-certification
      - sla-monitoring
  devsecops:
    prose: |
      **Appeal workflow testing:**
      1. Test complete appeal lifecycle (denial, Tier 1, Tier 2) in CI/CD
         with automated assertions on deadline calculations and routing.
      2. Validate that denial notifications include all required information
         (full text, appeal instructions, competent authority, deadlines).
      3. Test CGU integration endpoints for federal executive bodies.
    tools:
      - gitlab-ci
      - e2e-testing
      - integration-testing
  secops:
    prose: |
      **Appeal compliance monitoring:**
      1. Track appeal rates (percentage of denials that are appealed) as
         a transparency health indicator.
      2. Monitor appeal resolution times against 5-day SLA.
      3. Analyze CGU appeal outcomes to identify systemic compliance issues
         in specific bodies.
      4. Report on the "overturn rate" — percentage of denials reversed
         on appeal — as a quality metric.
    tools:
      - compliance-dashboard
      - analytics
      - sla-monitoring
