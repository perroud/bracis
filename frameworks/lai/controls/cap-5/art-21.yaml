id: art-21
family: cap-5
title: "Protection of Personal Information in Public Records"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 31. O tratamento das informações pessoais deve ser feito de forma
    transparente e com respeito à intimidade, vida privada, honra e imagem
    das pessoas, bem como às liberdades e garantias individuais.

    § 1º As informações pessoais, a que se refere este artigo, relativas à
    intimidade, vida privada, honra e imagem:

    I - terão seu acesso restrito, independentemente de classificação de
    sigilo, pelo prazo máximo de 100 (cem) anos a contar da sua produção,
    a agentes públicos legalmente autorizados e à pessoa a que elas se
    referirem; e

    II - poderão ter autorizada sua divulgação ou acesso por terceiros
    diante de previsão legal ou consentimento expresso da pessoa a que
    elas se referirem.

    § 2º Aquele que obtiver acesso às informações de que trata este artigo
    será responsabilizado por seu uso indevido.

    § 3º O consentimento referido no inciso II do § 1º não será exigido
    quando as informações forem necessárias:

    I - à prevenção e diagnóstico médico, quando a pessoa estiver física
    ou legalmente incapaz, e para utilização única e exclusivamente para
    o tratamento médico;

    II - à realização de estatísticas e pesquisas científicas de evidente
    interesse público ou geral, previstos em lei, sendo vedada a
    identificação da pessoa a que as informações se referirem;

    III - ao cumprimento de ordem judicial;

    IV - à defesa de direitos humanos; ou

    V - à proteção do interesse público e geral preponderante.

    § 4º A restrição de acesso à informação relativa à vida privada, honra
    e imagem de pessoa não poderá ser invocada com o intuito de prejudicar
    processo de apuração de irregularidades em que o titular das informações
    estiver envolvido, bem como em ações voltadas para a recuperação de
    fatos históricos de maior relevância.

    § 5º Regulamento disporá sobre os procedimentos para tratamento de
    informação pessoal.
guidance:
  prose: |
    Article 31 is the LAI's primary personal data protection provision,
    predating the LGPD (2018). Key provisions:

    **100-year restriction (§ 1, I):**
    Personal information related to privacy, private life, honor, and image
    is restricted for up to 100 years — far longer than any classification
    level. This restriction is independent of the classification system.

    **Consent-based disclosure (§ 1, II):**
    Third-party access requires either legal authorization or express consent
    from the data subject.

    **Consent exceptions (§ 3):**
    Five situations where consent is not required:
    1. Medical prevention/diagnosis for incapacitated persons (I)
    2. Statistics and scientific research of public interest, anonymized (II)
    3. Judicial orders (III)
    4. Human rights defense (IV)
    5. Prevailing public interest (V)

    **Anti-abuse provision (§ 4):**
    Personal data protection cannot be used to obstruct investigations into
    irregularities involving the data subject, or to suppress historically
    significant facts.

    **LGPD interaction:**
    This article now operates alongside the LGPD. Where both apply, the
    more protective provision prevails. The LGPD's legal bases (art. 7)
    largely align with § 3's consent exceptions.
implementation_guidance:
  platform_engineering:
    prose: |
      **Personal data protection in government systems:**
      1. Implement 100-year access restriction for personal information
         related to privacy, private life, honor, and image, with
         automatic enforcement independent of classification system.
      2. Build consent management for personal data disclosure to third
         parties, with express consent capture and verification.
      3. Implement anonymization pipeline for statistical and research
         data releases (§ 3, II) — strip identifying information before
         publication.
      4. Deploy access controls that limit personal data access to
         authorized agents and the data subject themselves (§ 1, I).
      5. Build audit trail for all personal data accesses to support
         liability enforcement (§ 2).
    tools:
      - consent-management
      - anonymization
      - rbac
      - audit-trail
      - data-masking
  devsecops:
    prose: |
      **Personal data handling in pipelines:**
      1. Implement personal data detection in CI/CD to prevent personal
         information from being exposed in public datasets or logs.
      2. Validate anonymization quality in statistical data releases —
         verify that re-identification is not possible.
      3. Enforce data masking in non-production environments for personal
         data.
    tools:
      - pii-detection
      - anonymization-validation
      - data-masking
      - gitlab-ci
  secops:
    prose: |
      **Personal data governance:**
      1. Conduct Data Protection Impact Assessments (DPIAs) for systems
         processing personal information in government records.
      2. Monitor for unauthorized personal data disclosures through DLP
         and access monitoring.
      3. Track consent records and verify that all third-party disclosures
         have valid legal basis or consent.
      4. Implement data subject access request (DSAR) process for
         individuals to access their own personal data.
    tools:
      - dpia
      - dlp
      - consent-tracking
      - dsar-management
