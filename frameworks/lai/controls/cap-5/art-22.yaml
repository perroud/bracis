id: art-22
family: cap-5
title: "Public Agent Conduct and Remuneration Transparency"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 31, § 1º, [...] (continuação)

    Art. 22. O disposto nesta Lei não exclui as demais hipóteses legais de
    sigilo e de segredo de justiça nem as hipóteses de segredo industrial
    decorrentes da exploração direta de atividade econômica pelo Estado ou
    por pessoa física ou entidade privada que tenha qualquer vínculo com o
    poder público.

    Art. 21. Não poderá ser negado acesso à informação necessária à tutela
    judicial ou administrativa de direitos fundamentais.

    Parágrafo único. As informações ou documentos que versem sobre condutas
    que impliquem violação dos direitos humanos praticada por agentes
    públicos ou a mando de autoridades públicas não poderão ser objeto de
    restrição de acesso.
guidance:
  prose: |
    Articles 21 and 22 establish two critical limits on information
    restriction:

    **Article 21 — Fundamental rights protection:**
    - Information necessary for judicial or administrative protection of
      fundamental rights cannot be denied under any circumstances.
    - This is an absolute rule — it overrides classification, personal data
      protection, and any other restriction.

    **Article 21, parágrafo único — Human rights violations:**
    - Information about human rights violations by public agents or by
      order of public authorities can NEVER be restricted. This is a
      direct response to Brazil's military dictatorship history and the
      principle of transitional justice.

    **Article 22 — Coexistence with other secrecy regimes:**
    - The LAI does not replace other legal secrecy provisions (judicial
      secrecy, industrial secrecy for state economic activity).
    - These other regimes continue to apply independently.

    **System design implication:**
    Classification and access restriction systems must include override
    mechanisms for fundamental rights cases and human rights violation
    investigations. No technical control should be capable of blocking
    access in these situations.
implementation_guidance:
  platform_engineering:
    prose: |
      **Override mechanisms for fundamental rights:**
      1. Implement a classification override workflow for fundamental rights
         cases (art. 21) that allows authorized judicial/administrative
         authorities to access any information regardless of classification.
      2. Build a "human rights exception" flag that prevents information
         about human rights violations from being classified or restricted
         (art. 21, parágrafo único).
      3. Implement segregation of industrial secrecy from LAI classification
         to maintain separate access regimes (art. 22).
      4. Create audit trail for all override actions with full justification
         documentation.
    tools:
      - classification-engine
      - override-workflow
      - audit-trail
      - rbac
  devsecops:
    prose: |
      **Override and exception testing:**
      1. Test that fundamental rights override workflow correctly bypasses
         all classification levels.
      2. Validate that human rights violation documents cannot be classified
         or have access restrictions applied.
      3. Test boundary cases between LAI classification and other secrecy
         regimes (judicial, industrial).
    tools:
      - gitlab-ci
      - access-control-testing
      - integration-testing
  secops:
    prose: |
      **Restriction exception monitoring:**
      1. Monitor for attempts to classify or restrict information about
         human rights violations — these should trigger compliance alerts.
      2. Audit fundamental rights override usage to verify proper
         authorization and justification.
      3. Maintain clear documentation of the boundary between LAI
         restrictions and other legal secrecy regimes.
    tools:
      - compliance-monitoring
      - audit-platform
      - alerting
legal_references:
  - framework_id: lgpd
    articles: ["art-4", "art-7"]
    relationship: complements
  - framework_id: info-classificada
