id: art-24
family: cap-6
title: "Sanctions for Private Entities"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 33. A pessoa física ou entidade privada que detiver informações
    em virtude de vínculo de qualquer natureza com o poder público e deixar
    de observar o disposto nesta Lei estará sujeita às seguintes sanções:

    I - advertência;

    II - multa;

    III - rescisão do vínculo com o poder público;

    IV - suspensão temporária de participar em licitação e impedimento de
    contratar com a administração pública por prazo não superior a 2 (dois)
    anos; e

    V - declaração de inidoneidade para licitar ou contratar com a
    administração pública, até que seja promovida a reabilitação perante a
    própria autoridade que aplicou a penalidade.

    § 1º As sanções previstas nos incisos I, III e IV poderão ser aplicadas
    juntamente com a do inciso II, assegurado o direito de defesa.

    § 2º A sanção de multa poderá ser aplicada isoladamente ou cumulada com
    uma das sanções previstas nos incisos I, III e IV.

    § 3º A reabilitação do infrator referida no inciso V será autorizada
    somente quando o interessado efetivar o ressarcimento ao órgão ou
    entidade dos prejuízos resultantes e após decorrido o prazo da sanção
    aplicada com base no inciso IV.
guidance:
  prose: |
    Article 33 establishes a graduated sanctions regime for private entities
    handling government information:

    **Sanction levels (escalating):**
    1. Warning (I)
    2. Fine (II)
    3. Termination of the relationship with government (III)
    4. Temporary suspension from bidding/contracting — up to 2 years (IV)
    5. Declaration of unfitness to bid/contract — until rehabilitation (V)

    **Cumulation rules:**
    - Warning (I), termination (III), and suspension (IV) can be combined
      with fine (II).
    - Fine (II) can be applied alone or combined with I, III, or IV.

    **Rehabilitation (§ 3):**
    To be rehabilitated after unfitness declaration, the entity must:
    1. Compensate the government body for damages
    2. Wait for the suspension period to elapse

    **Contractor compliance implication:**
    Any entity handling government information under contract must comply
    with LAI obligations, or face sanctions ranging from warnings to
    permanent debarment.
implementation_guidance:
  platform_engineering:
    prose: |
      **Contractor compliance monitoring:**
      1. Implement compliance tracking for all private entities with
         access to government information, linked to contract management.
      2. Build sanctions registry integration to verify contractor status
         (active sanctions, debarment) before granting information access.
      3. Automate compliance reporting requirements for contractors
         handling government information.
    tools:
      - vendor-management
      - contract-management
      - sanctions-registry
      - compliance-tracking
  devsecops:
    prose: |
      **Contractor access management:**
      1. Implement automated access provisioning/deprovisioning for
         contractor personnel linked to contract lifecycle status.
      2. Enforce contractor compliance attestation in onboarding workflows
         before granting access to government systems.
    tools:
      - identity-management
      - access-lifecycle
      - gitlab-ci
  secops:
    prose: |
      **Contractor sanctions program:**
      1. Monitor contractor compliance with LAI obligations through
         periodic assessments and audit rights.
      2. Maintain a sanctions tracking system for penalties applied to
         contractors, with rehabilitation status.
      3. Implement contractor incident reporting for LAI violations
         with escalation to sanctioning authorities.
    tools:
      - vendor-assessment
      - sanctions-tracking
      - incident-management
legal_references:
  - framework_id: lgpd
    articles: ["art-52"]
