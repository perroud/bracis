id: art-23
family: cap-6
title: "Conduct Subject to Sanctions"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 32. Constituem condutas ilícitas que ensejam responsabilidade do
    agente público ou militar:

    I - recusar-se a fornecer informação requerida nos termos desta Lei,
    retardar deliberadamente o seu fornecimento ou fornecê-la
    intencionalmente de forma incorreta, incompleta ou imprecisa;

    II - utilizar indevidamente, bem como subtrair, destruir, inutilizar,
    desfigurar, alterar ou ocultar, total ou parcialmente, informação que
    se encontre sob sua guarda ou a que tenha acesso ou conhecimento em
    razão do exercício das atribuições de cargo, emprego ou função pública;

    III - agir com dolo ou má-fé na análise das solicitações de acesso à
    informação;

    IV - divulgar ou permitir a divulgação ou acessar ou permitir acesso
    indevido à informação sigilosa ou informação pessoal;

    V - impor sigilo à informação para obter proveito pessoal ou de
    terceiro, ou para fins de ocultação de ato ilegal cometido por si ou
    por outrem;

    VI - ocultar da revisão de autoridade superior competente informação
    sigilosa para beneficiar a si ou a outrem, ou em prejuízo de terceiros;
    e

    VII - destruir ou subtrair, por qualquer meio, documentos concernentes
    a possíveis violações de direitos humanos por parte de agentes do
    Estado.

    § 1º Atendido o princípio do contraditório, da ampla defesa e do
    devido processo legal, as condutas descritas no caput serão consideradas:

    I - para fins dos regulamentos disciplinares das Forças Armadas,
    transgressões militares médias ou graves, segundo os critérios neles
    estabelecidos, desde que não tipificadas em lei como crime ou
    contravenção penal; ou

    II - para fins do disposto na Lei nº 8.112, de 11 de dezembro de 1990,
    e suas alterações, infrações administrativas, que deverão ser apenadas,
    no mínimo, com suspensão, segundo os critérios nela estabelecidos.

    § 2º Pelas condutas descritas no caput, poderá o militar ou agente
    público responder, também, por improbidade administrativa, conforme o
    disposto nas Leis nºs 1.079, de 10 de abril de 1950, e 8.429, de 2 de
    junho de 1992.
guidance:
  prose: |
    Article 32 enumerates seven specific conducts that constitute violations:

    1. **Refusal, delay, or inaccurate provision (I):** Deliberate refusal,
       intentional delay, or providing incorrect/incomplete information.
    2. **Misuse, destruction, or concealment (II):** Any unauthorized
       manipulation of information under the agent's custody.
    3. **Bad faith analysis (III):** Intentional bias in evaluating
       information requests.
    4. **Unauthorized disclosure (IV):** Leaking classified or personal data.
    5. **Classification for personal gain (V):** Using classification to
       benefit oneself/others or to hide illegal acts.
    6. **Concealment from oversight (VI):** Hiding classified information
       from superior review authorities.
    7. **Destruction of human rights evidence (VII):** Destroying documents
       about potential human rights violations by state agents.

    **Sanctions:**
    - Military: medium to serious transgressions
    - Civilian: minimum suspension, per Lei 8.112/1990
    - Both: potential administrative improbity charges (Leis 1.079/1950
      and 8.429/1992)

    **Due process (§ 1):**
    All sanctions must observe adversarial proceedings, full defense, and
    due process of law.
implementation_guidance:
  platform_engineering:
    prose: |
      **Violation detection and evidence preservation:**
      1. Implement comprehensive audit logging for all information access,
         modification, classification, and disclosure actions.
      2. Build tamper-evident audit trails (append-only, cryptographically
         signed) to preserve evidence of potential violations.
      3. Deploy anomaly detection for patterns indicative of violations:
         bulk data access, unusual classification patterns, repeated
         request denials.
      4. Implement document integrity monitoring to detect unauthorized
         destruction or modification (inciso II).
    tools:
      - audit-trail
      - siem
      - anomaly-detection
      - fim
  devsecops:
    prose: |
      **Audit integrity in pipeline:**
      1. Ensure audit log infrastructure is deployed as immutable storage
         (write-once, read-many) to prevent evidence tampering.
      2. Implement automated tests verifying audit completeness for all
         information access paths.
      3. Deploy log integrity verification in CI/CD pipelines.
    tools:
      - immutable-storage
      - audit-testing
      - gitlab-ci
  secops:
    prose: |
      **Violation investigation support:**
      1. Establish investigation procedures for each of the seven violation
         types, with evidence collection checklists.
      2. Implement whistleblower channels for reporting LAI violations
         with identity protection.
      3. Conduct periodic analysis of audit logs to proactively detect
         potential violations before complaints are filed.
      4. Maintain liaison with CGU and oversight bodies for violation
         referrals.
    tools:
      - investigation-platform
      - whistleblower-channel
      - siem
      - compliance-reporting
legal_references:
