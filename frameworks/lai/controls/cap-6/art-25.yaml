id: art-25
family: cap-6
title: "Oversight Mechanisms and Mixed Commission (CMRI)"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 35. (VETADO).

    § 1º É instituída a Comissão Mista de Reavaliação de Informações, que
    decidirá, no âmbito da administração pública federal, sobre o
    tratamento e a classificação de informações sigilosas e terá competência
    para:

    I - requisitar da autoridade que classificar informação como
    ultrassecreta e secreta esclarecimento ou conteúdo, parcial ou
    integral da informação;

    II - rever a classificação de informações ultrassecretas ou secretas,
    de ofício ou mediante provocação de pessoa interessada, observado o
    disposto no art. 7º e demais dispositivos desta Lei; e

    III - prorrogar o prazo de sigilo de informação classificada como
    ultrassecreta, sempre por prazo determinado, enquanto o seu acesso ou
    divulgação puder ocasionar ameaça externa à soberania nacional ou à
    integridade do território nacional ou grave risco às relações
    internacionais do País, observado o prazo previsto no § 1º do art. 24.

    § 2º O prazo referido no inciso III é limitado a uma única renovação.

    § 3º A revisão de ofício a que se refere o inciso II do § 1º deverá
    ocorrer, no máximo, a cada 4 (quatro) anos, após a reavaliação prevista
    no art. 39, quando se tratar de informações classificadas como
    ultrassecretas.

    § 4º A não deliberação sobre a revisão pela Comissão Mista de
    Reavaliação de Informações nos prazos previstos no § 3º implicará a
    desclassificação automática das informações.

    Art. 40. No prazo de 60 (sessenta) dias, a contar da vigência desta
    Lei, o dirigente máximo de cada órgão ou entidade da administração
    pública federal direta e indireta designará autoridade que lhe seja
    diretamente subordinada para, no âmbito do respectivo órgão ou
    entidade, exercer as seguintes atribuições:

    I - assegurar o cumprimento das normas relativas ao acesso a
    informação, de forma eficiente e adequada aos objetivos desta Lei;

    II - monitorar a implementação do disposto nesta Lei e apresentar
    relatórios periódicos sobre o seu cumprimento;

    III - recomendar as medidas indispensáveis à implementação e ao
    aperfeiçoamento das normas e procedimentos necessários ao correto
    cumprimento do disposto nesta Lei; e

    IV - orientar as respectivas unidades no que se refere ao cumprimento
    do disposto nesta Lei e seus regulamentos.
guidance:
  prose: |
    Articles 35 and 40 establish the oversight architecture:

    **Mixed Commission for Information Reassessment (CMRI, art. 35):**
    - Federal-level oversight body for classified information
    - Powers: request classification details (I), review ultrassecreta/secreta
      classifications (II), extend ultrassecreta periods (III)
    - Extension of ultrassecreta: only once, only for specific threats to
      sovereignty, territorial integrity, or international relations (§ 2)
    - Mandatory 4-year review cycle for ultrassecreta information (§ 3)
    - Automatic declassification if CMRI fails to review on time (§ 4)

    **Internal oversight authority (art. 40):**
    Each federal body must designate a directly subordinate authority to:
    - Ensure LAI compliance (I)
    - Monitor implementation and produce periodic reports (II)
    - Recommend improvements (III)
    - Guide internal units (IV)

    **Automatic declassification safeguard (§ 4):**
    This is a critical "dead man's switch" — if the CMRI does not act
    within the 4-year review cycle, the information is automatically
    declassified. This prevents classification from becoming permanent
    through inaction.
implementation_guidance:
  platform_engineering:
    prose: |
      **Oversight and review infrastructure:**
      1. Implement CMRI integration for federal bodies — automated
         reporting of ultrassecreta and secreta classifications.
      2. Build 4-year review cycle scheduler for ultrassecreta information
         with automatic declassification trigger if review is not completed
         (§ 4).
      3. Implement single-renewal tracking for ultrassecreta extensions,
         blocking second renewal attempts (§ 2).
      4. Build compliance dashboard for the designated LAI oversight
         authority (art. 40) showing implementation metrics, pending
         reviews, and compliance status.
      5. Generate periodic compliance reports automatically (art. 40, II).
    tools:
      - classification-engine
      - scheduler
      - compliance-dashboard
      - reporting-automation
  devsecops:
    prose: |
      **Oversight automation testing:**
      1. Test automatic declassification trigger after 4-year review
         deadline expiry (§ 4).
      2. Validate single-renewal enforcement for ultrassecreta extensions.
      3. Test CMRI reporting integration for classification notifications.
    tools:
      - gitlab-ci
      - scheduler-testing
      - integration-testing
  secops:
    prose: |
      **LAI oversight program:**
      1. Support the designated LAI oversight authority (art. 40) with
         monitoring tools, reports, and compliance metrics.
      2. Track CMRI review cycle deadlines and alert on approaching
         4-year review deadlines for ultrassecreta information.
      3. Produce periodic compliance reports covering LAI implementation
         across all information systems.
      4. Coordinate with CGU for external oversight reporting.
    tools:
      - compliance-reporting
      - deadline-tracking
      - audit-platform
      - grc-platform
