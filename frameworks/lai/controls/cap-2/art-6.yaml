id: art-6
family: cap-2
title: "Duty of Active Disclosure by Public Bodies"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 6º Cabe aos órgãos e entidades do poder público, observadas as
    normas e procedimentos específicos aplicáveis, assegurar a:

    I - gestão transparente da informação, propiciando amplo acesso a ela
    e sua divulgação;

    II - proteção da informação, garantindo-se sua disponibilidade,
    autenticidade e integridade; e

    III - proteção da informação sigilosa e da informação pessoal,
    observada a sua disponibilidade, autenticidade, integridade e eventual
    restrição de acesso.
guidance:
  prose: |
    Article 6 establishes three concurrent obligations for all public bodies:

    1. **Transparent information management** (I): Broad access and proactive
       dissemination — not merely reactive disclosure upon request.
    2. **Information protection** (II): Security triad (availability,
       authenticity, integrity) for all public information.
    3. **Protection of classified and personal information** (III): The same
       security triad applies, plus access restriction controls.

    **Key tension:**
    This article explicitly acknowledges the tension between maximum
    transparency and information protection. Both obligations are concurrent,
    not alternative. Systems must simultaneously enable broad access and
    protect classified/personal data.

    **Security implications:**
    The explicit mention of availability, authenticity, and integrity
    establishes information security as a legal requirement for all
    government information systems, not just a best practice.
implementation_guidance:
  platform_engineering:
    prose: |
      **Dual-purpose information architecture:**
      1. Implement role-based access control (RBAC) that distinguishes between
         public, classified, and personal information with fine-grained
         permissions.
      2. Deploy integrity verification mechanisms (digital signatures, hash
         chains) for all stored and published government documents.
      3. Implement high-availability architectures for transparency portals
         with defined SLAs (99.9% minimum uptime).
      4. Build data segregation between public and restricted information
         at the infrastructure level (separate storage, encryption at rest).
    tools:
      - rbac
      - digital-signatures
      - ha-infrastructure
      - encryption-at-rest
  devsecops:
    prose: |
      **Security-integrated transparency pipeline:**
      1. Implement automated security scanning for all transparency portal
         deployments (SAST, DAST, dependency scanning).
      2. Enforce data classification validation in merge requests to ensure
         classified and personal data is not inadvertently exposed.
      3. Include integrity verification tests for document publishing
         pipelines.
    tools:
      - gitlab-ci
      - sast
      - dast
      - dependency-scanning
  secops:
    prose: |
      **Information protection monitoring:**
      1. Monitor transparency portals for unauthorized data exposure
         (classified or personal information leaks).
      2. Implement integrity monitoring to detect unauthorized modifications
         to published government documents.
      3. Conduct periodic access reviews to ensure RBAC configurations
         align with current classification policies.
    tools:
      - dlp
      - fim
      - access-review
      - siem
legal_references:
