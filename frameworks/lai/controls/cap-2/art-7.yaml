id: art-7
family: cap-2
title: "Right to Obtain Information"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 7º O acesso à informação de que trata esta Lei compreende, entre
    outros, os direitos de obter:

    I - orientação sobre os procedimentos para a consecução de acesso, bem
    como sobre o local onde poderá ser encontrada ou obtida a informação
    almejada;

    II - informação contida em registros ou documentos, produzidos ou
    acumulados por seus órgãos ou entidades, recolhidos ou não a arquivos
    públicos;

    III - informação produzida ou custodiada por pessoa física ou entidade
    privada decorrente de qualquer vínculo com seus órgãos ou entidades,
    mesmo que esse vínculo já tenha cessado;

    IV - informação primária, íntegra, autêntica e atualizada;

    V - informação sobre atividades exercidas pelos órgãos e entidades,
    inclusive as relativas à sua política, organização e serviços;

    VI - informação pertinente à administração do patrimônio público,
    utilização de recursos públicos, licitação, contratos administrativos; e

    VII - informação relativa:
    a) à implementação, acompanhamento e resultados dos programas, projetos
    e ações dos órgãos e entidades públicas, bem como metas e indicadores
    propostos;
    b) ao resultado de inspeções, auditorias, prestações e tomadas de contas
    realizadas pelos órgãos de controle interno e externo, incluindo
    prestações de contas relativas a exercícios anteriores.

    § 1º O acesso à informação previsto no caput não compreende as
    informações referentes a projetos de pesquisa e desenvolvimento
    científicos ou tecnológicos cujo sigilo seja imprescindível à segurança
    da sociedade e do Estado.

    § 2º Quando não for autorizado acesso integral à informação por ser ela
    parcialmente sigilosa, é assegurado o acesso à parte não sigilosa por
    meio de certidão, extrato ou cópia com ocultação da parte sob sigilo.

    § 3º O direito de acesso aos documentos ou às informações neles contidas
    utilizados como fundamento da tomada de decisão e do ato administrativo
    será assegurado com a edição do ato decisório respectivo.
guidance:
  prose: |
    Article 7 enumerates the specific types of information that citizens have
    the right to obtain, establishing a comprehensive but non-exhaustive list.

    **Critical provisions for system design:**
    - **Inciso II-III:** Information scope extends to records produced,
      accumulated, or held by third parties under any past or present
      relationship with government. This means contractor and vendor data
      may be in scope.
    - **Inciso IV:** Quality requirements — information must be primary
      (from source), complete, authentic, and current.
    - **Inciso VI:** Financial transparency — procurement, contracts, and
      public asset management are always subject to disclosure.
    - **§ 2:** Partial disclosure — when information is partially classified,
      the non-classified portion must still be provided (redacted copies).
    - **§ 3:** Decision-supporting documents become public upon the
      administrative decision being issued.

    **R&D exception (§ 1):**
    The only explicit exemption is for scientific/technological R&D projects
    essential to society and state security. This is narrow and must be
    justified case by case.
implementation_guidance:
  platform_engineering:
    prose: |
      **Comprehensive information retrieval:**
      1. Build search capabilities that span all information repositories
         (document management, databases, email archives, legacy systems)
         to fulfill the broad scope of obtainable information.
      2. Implement document redaction capabilities for partial disclosure
         (§ 2), allowing automated masking of classified portions while
         preserving the rest.
      3. Maintain data provenance metadata to satisfy the primary information
         requirement (inciso IV) — track original source, modification
         history, and currency.
      4. Implement contract and procurement data publishing pipelines that
         automatically expose licitação data (inciso VI).
    tools:
      - enterprise-search
      - document-redaction
      - data-provenance
      - open-data-portal
  devsecops:
    prose: |
      **Data quality pipeline:**
      1. Implement automated data freshness checks for published datasets
         to comply with the "atualizada" (current) requirement.
      2. Build integrity verification into document publishing workflows
         to ensure authenticity.
      3. Automate generation of redacted document versions when partial
         classification applies.
    tools:
      - data-quality
      - integrity-verification
      - gitlab-ci
  secops:
    prose: |
      **Disclosure completeness monitoring:**
      1. Audit information repositories periodically to verify that all
         categories listed in art. 7 are being proactively published.
      2. Monitor compliance with partial disclosure requirements (§ 2) to
         ensure classified portions are properly redacted rather than
         entire documents being withheld.
      3. Track third-party information holdings (inciso III) to ensure
         vendor and contractor data remains accessible.
    tools:
      - audit-platform
      - compliance-monitoring
      - vendor-management
