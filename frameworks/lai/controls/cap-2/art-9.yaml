id: art-9
family: cap-2
title: "Citizen Information Service (SIC)"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 9º O acesso a informações públicas será assegurado mediante:

    I - criação de serviço de informações ao cidadão, nos órgãos e
    entidades do poder público, em local com condições apropriadas para:

    a) atender e orientar o público quanto ao acesso a informações;

    b) informar sobre a tramitação de documentos nas suas respectivas
    unidades;

    c) protocolizar documentos e requerimentos de acesso a informações; e

    II - realização de audiências ou consultas públicas, incentivo à
    participação popular ou a outras formas de divulgação.
guidance:
  prose: |
    Article 9 mandates the creation of a Citizen Information Service (SIC —
    Serviço de Informações ao Cidadão) in every public body, with three
    specific functions:

    1. **Guidance (a):** Assist citizens in navigating information access
       procedures.
    2. **Tracking (b):** Provide status updates on document processing.
    3. **Protocol (c):** Receive and register information access requests.

    **Physical and digital SIC:**
    While the article references a physical location ("local com condições
    apropriadas"), the implementing regulation (Decreto 7.724/2012) also
    requires an electronic SIC (e-SIC) for online request submission and
    tracking.

    **Public participation (II):**
    Beyond reactive services, the article also mandates proactive engagement
    through public hearings, consultations, and other participatory
    mechanisms.
implementation_guidance:
  platform_engineering:
    prose: |
      **e-SIC platform architecture:**
      1. Deploy a request management system (e-SIC) with citizen-facing
         portal for submitting, tracking, and receiving responses to
         information requests.
      2. Implement workflow engine for routing requests to appropriate
         departments with SLA tracking (20+10 day deadlines per art. 11).
      3. Build notification system (email, SMS) for automatic status
         updates to requesters on document processing progress.
      4. Implement analytics dashboard for SIC managers showing request
         volumes, response times, and compliance metrics.
    tools:
      - workflow-engine
      - notification-service
      - analytics-dashboard
      - citizen-portal
  devsecops:
    prose: |
      **e-SIC deployment pipeline:**
      1. Automate deployment of e-SIC platform updates with zero-downtime
         releases to ensure continuous availability.
      2. Include integration tests validating the complete request lifecycle
         (submission, routing, response, appeal) in CI/CD.
      3. Implement security scanning for the citizen-facing portal to
         prevent data exposure or unauthorized access.
    tools:
      - gitlab-ci
      - integration-testing
      - security-scanning
  secops:
    prose: |
      **SIC operations monitoring:**
      1. Monitor SIC request volumes and response times in real-time to
         identify bottlenecks and SLA risks.
      2. Generate compliance reports on request fulfillment rates,
         denial rates, and appeal rates.
      3. Implement data protection controls for personal information
         submitted in information requests.
    tools:
      - sla-monitoring
      - compliance-reporting
      - data-protection
legal_references:
  - framework_id: gov-digital
    articles: ["art-5"]
    relationship: complements
