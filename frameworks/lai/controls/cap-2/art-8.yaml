id: art-8
family: cap-2
title: "Mandatory Proactive Disclosure via Internet"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 8º É dever dos órgãos e entidades públicas promover,
    independentemente de requerimentos, a divulgação em local de fácil
    acesso, no âmbito de suas competências, de informações de interesse
    coletivo ou geral por eles produzidas ou custodiadas.

    § 1º Na divulgação das informações a que se refere o caput, deverão
    constar, no mínimo:

    I - registro das competências e estrutura organizacional, endereços e
    telefones das respectivas unidades e horários de atendimento ao público;

    II - registros de quaisquer repasses ou transferências de recursos
    financeiros;

    III - registros das despesas;

    IV - informações concernentes a procedimentos licitatórios, inclusive
    os respectivos editais e resultados, bem como a todos os contratos
    celebrados;

    V - dados gerais para o acompanhamento de programas, ações, projetos e
    obras de órgãos e entidades; e

    VI - respostas a perguntas mais frequentes da sociedade.

    § 2º Para cumprimento do disposto no caput, os órgãos e entidades
    públicas deverão utilizar todos os meios e instrumentos legítimos de
    que dispuserem, sendo obrigatória a divulgação em sítios oficiais da
    rede mundial de computadores (internet).

    § 3º Os sítios de que trata o § 2º deverão, na forma de regulamento,
    atender, entre outros, aos seguintes requisitos:

    I - conter ferramenta de pesquisa de conteúdo que permita o acesso à
    informação de forma objetiva, transparente, clara e em linguagem de
    fácil compreensão;

    II - possibilitar a gravação de relatórios em diversos formatos
    eletrônicos, inclusive abertos e não proprietários, tais como planilhas
    e texto, de modo a facilitar a análise das informações;

    III - possibilitar o acesso automatizado por sistemas externos em
    formatos abertos, estruturados e legíveis por máquina;

    IV - divulgar em detalhes os formatos utilizados para estruturação da
    informação;

    V - garantir a autenticidade e a integridade das informações disponíveis
    para acesso;

    VI - manter atualizadas as informações disponíveis para acesso;

    VII - indicar local e instruções que permitam ao interessado comunicar-se,
    por via eletrônica ou telefônica, com o órgão ou entidade detentora do
    sítio; e

    VIII - adotar as medidas necessárias para garantir a acessibilidade de
    conteúdo para pessoas com deficiência, nos termos do art. 17 da Lei
    nº 10.098, de 19 de dezembro de 2000, e do art. 9º da Convenção sobre
    os Direitos das Pessoas com Deficiência, aprovada pelo Decreto
    Legislativo nº 186, de 9 de julho de 2008.

    § 4º Os Municípios com população de até 10.000 (dez mil) habitantes
    ficam dispensados da divulgação obrigatória na internet a que se refere
    o § 2º, mantida a obrigatoriedade de divulgação, em tempo real, de
    informações relativas à execução orçamentária e financeira, nos
    critérios e prazos previstos no art. 73-B da Lei Complementar nº 101,
    de 4 de maio de 2000 (Lei de Responsabilidade Fiscal).
guidance:
  prose: |
    Article 8 is the core provision for active (proactive) transparency. It
    mandates minimum content and technical requirements for government
    websites.

    **Minimum content (§ 1):**
    Six mandatory categories of information that every public body must
    proactively publish, including organizational structure, financial
    transfers, expenses, procurement data, program monitoring, and FAQs.

    **Technical requirements for websites (§ 3):**
    Eight requirements that define the technical standard for transparency
    portals:
    - Search functionality with plain language (I)
    - Downloadable reports in open formats (II)
    - Machine-readable APIs for automated external access (III)
    - Published data format documentation (IV)
    - Authenticity and integrity guarantees (V)
    - Current/up-to-date information (VI)
    - Contact information for electronic and phone communication (VII)
    - Accessibility for persons with disabilities (VIII)

    **Open data mandate (§ 3, III):**
    This provision effectively mandates open data APIs — structured,
    machine-readable, open-format access to government information.

    **Small municipality exception (§ 4):**
    Municipalities under 10,000 inhabitants are exempt from mandatory
    internet publication, except for real-time budget execution data
    required by the Fiscal Responsibility Law.
implementation_guidance:
  platform_engineering:
    prose: |
      **Transparency portal architecture:**
      1. Deploy full-text search engine (Elasticsearch/OpenSearch) indexing
         all published transparency content with plain language support.
      2. Implement open data API layer exposing all mandatory datasets in
         JSON, CSV, and XML formats with published schemas.
      3. Build automated data pipelines from source systems (ERP, procurement,
         HR) to the transparency portal with near-real-time refresh.
      4. Implement digital signature verification for published documents
         to guarantee authenticity and integrity (§ 3, V).
      5. Deploy accessibility testing as part of the portal infrastructure
         (WCAG 2.1 AA compliance, § 3, VIII).
    tools:
      - elasticsearch
      - api-gateway
      - etl-pipeline
      - digital-signatures
      - accessibility-testing
  devsecops:
    prose: |
      **Portal compliance pipeline:**
      1. Automate WCAG accessibility validation in CI/CD for every portal
         deployment.
      2. Implement data format validation ensuring all published datasets
         conform to documented schemas (§ 3, IV).
      3. Build automated freshness checks alerting when published data
         exceeds defined staleness thresholds (§ 3, VI).
      4. Include open format validation in pipelines — reject proprietary
         format outputs (§ 3, II).
    tools:
      - gitlab-ci
      - accessibility-scanner
      - schema-validation
      - data-freshness-monitor
  secops:
    prose: |
      **Active transparency compliance:**
      1. Monitor completeness of mandatory content categories (§ 1, I-VI)
         across all public body transparency portals.
      2. Verify API availability and response quality for machine-readable
         access (§ 3, III) through synthetic monitoring.
      3. Conduct periodic accessibility audits with assistive technology
         testing (§ 3, VIII).
      4. Track and report on data freshness metrics for all published
         datasets.
    tools:
      - compliance-monitoring
      - synthetic-monitoring
      - accessibility-audit
      - data-quality-dashboard
