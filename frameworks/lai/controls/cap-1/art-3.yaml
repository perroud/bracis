id: art-3
family: cap-1
title: "Guiding Principles and Directives"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 3º Os procedimentos previstos nesta Lei destinam-se a assegurar o
    direito fundamental de acesso à informação e devem ser executados em
    conformidade com os princípios básicos da administração pública e com
    as seguintes diretrizes:

    I - observância da publicidade como preceito geral e do sigilo como
    exceção;

    II - divulgação de informações de interesse público, independentemente
    de solicitações;

    III - utilização de meios de comunicação viabilizados pela tecnologia
    da informação;

    IV - fomento ao desenvolvimento da cultura de transparência na
    administração pública;

    V - desenvolvimento do controle social da administração pública.
guidance:
  prose: |
    Article 3 establishes the five guiding principles of the LAI, which form
    the interpretive foundation for all subsequent provisions.

    **Principle hierarchy:**
    1. **Publicity as default, secrecy as exception** (I): This inverts the
       traditional bureaucratic presumption. Information is public unless
       explicitly classified.
    2. **Proactive disclosure** (II): Government must publish information of
       public interest without waiting for requests.
    3. **Technology-enabled communication** (III): Digital channels and IT
       systems are the preferred means of disclosure.
    4. **Transparency culture** (IV): Not just compliance, but cultural
       transformation toward openness.
    5. **Social control** (V): Enabling citizens to oversee government actions.

    **System design implication:**
    Every information system in public administration should be designed with
    a "public by default" approach, requiring explicit justification and
    classification for any restriction on access.
implementation_guidance:
  platform_engineering:
    prose: |
      **Public-by-default architecture:**
      1. Design data models with a default visibility flag set to "public"
         for all government information, requiring explicit classification
         to restrict access.
      2. Implement automated publishing pipelines that push public datasets
         to open data portals without manual intervention.
      3. Build API-first architectures for government services, enabling
         programmatic access to public information.
      4. Deploy content delivery infrastructure optimized for high-volume
         public access to transparency portals.
    tools:
      - api-gateway
      - open-data-portal
      - cdn
      - metadata-management
  devsecops:
    prose: |
      **Transparency-first development:**
      1. Include transparency impact assessment as a mandatory step in the
         definition of done for government projects.
      2. Enforce documentation of data classification decisions in code
         reviews and merge requests.
      3. Automate publication of open API documentation for all public-facing
         government services.
    tools:
      - gitlab-ci
      - api-documentation
      - code-review
  secops:
    prose: |
      **Transparency governance:**
      1. Conduct periodic audits to verify that the "public by default"
         principle is being applied across all information systems.
      2. Monitor and report on the ratio of classified vs. public information
         to detect over-classification trends.
      3. Establish metrics for transparency culture adoption (e.g., proactive
         disclosure rates, request fulfillment times).
    tools:
      - audit-platform
      - compliance-dashboard
      - metrics-reporting
legal_references:
  - framework_id: gov-digital
    articles: ["art-1", "art-3"]
    relationship: complements
