id: art-2
family: cap-1
title: "Non-Profit Entities Receiving Public Funds"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 2º Aplicam-se as disposições desta Lei, no que couber, às entidades
    privadas sem fins lucrativos que recebam, para realização de ações de
    interesse público, recursos públicos diretamente do orçamento ou mediante
    subvenções sociais, contrato de gestão, termo de parceria, convênios,
    acordo, ajustes ou outros instrumentos congêneres.

    Parágrafo único. A publicidade a que estão submetidas as entidades
    citadas no caput refere-se à parcela dos recursos públicos recebidos e
    à sua destinação, sem prejuízo das prestações de contas a que estejam
    legalmente obrigadas.
guidance:
  prose: |
    Article 2 extends LAI obligations to private non-profit entities that
    receive public funds, but only regarding the portion of public resources
    received and their allocation.

    **Key distinctions:**
    - The obligation is proportional: it covers only the public funds portion,
      not the entity's entire operations.
    - This applies regardless of the legal instrument used to transfer funds
      (grants, management contracts, partnership terms, agreements, etc.).
    - Standard accountability obligations (prestação de contas) remain
      independently applicable.

    **Practical impact on systems:**
    Any platform managing grants, partnerships, or fund transfers to non-profit
    entities must support transparency reporting on the use of those funds.
implementation_guidance:
  platform_engineering:
    prose: |
      **Fund traceability infrastructure:**
      1. Implement data lineage tracking for all public fund transfers to
         non-profit entities, from disbursement to final expenditure.
      2. Create separate data partitions or tags for public-fund data versus
         private-fund data in non-profit entity systems.
      3. Build APIs that expose public-fund usage data for transparency portals
         in machine-readable formats (JSON, CSV).
    tools:
      - data-lineage
      - api-gateway
      - metadata-management
  devsecops:
    prose: |
      **Transparency reporting pipeline:**
      1. Automate generation of fund utilization reports as part of the
         deployment pipeline for grant management systems.
      2. Validate data completeness and consistency in fund tracking records
         before publishing to transparency portals.
      3. Implement automated tests verifying that all required fund disclosure
         fields are populated before release.
    tools:
      - gitlab-ci
      - data-validation
      - automated-testing
  secops:
    prose: |
      **Fund disclosure monitoring:**
      1. Monitor compliance of non-profit entities with fund reporting
         deadlines and completeness requirements.
      2. Maintain audit trails for all public fund transactions, accessible
         for oversight body review.
      3. Implement alerts for overdue or incomplete fund utilization reports.
    tools:
      - audit-trail
      - compliance-monitoring
      - alerting
legal_references:
  - framework_id: lgpd
    articles: ["art-7"]
    relationship: complements
