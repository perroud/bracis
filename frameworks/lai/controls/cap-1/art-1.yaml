id: art-1
family: cap-1
title: "Scope and Regulated Entities"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 1º Esta Lei dispõe sobre os procedimentos a serem observados pela
    União, Estados, Distrito Federal e Municípios, com o fim de garantir o
    acesso a informações previsto no inciso XXXIII do art. 5º, no inciso II
    do § 3º do art. 37 e no § 2º do art. 216 da Constituição Federal.

    Parágrafo único. Subordinam-se ao regime desta Lei:

    I - os órgãos públicos integrantes da administração direta dos Poderes
    Executivo, Legislativo, incluindo as Cortes de Contas, e Judiciário e
    do Ministério Público;

    II - as autarquias, as fundações públicas, as empresas públicas, as
    sociedades de economia mista e demais entidades controladas direta ou
    indiretamente pela União, Estados, Distrito Federal e Municípios.
guidance:
  prose: |
    Article 1 establishes the scope of the Freedom of Information Act, binding
    all levels of government (federal, state, district, and municipal) and all
    branches of power (executive, legislative, judiciary, and public prosecution).

    **Entities covered:**
    - Direct administration bodies across all branches and levels
    - Courts of accounts (Tribunais de Contas)
    - Autonomous agencies (autarquias) and public foundations
    - State-owned enterprises and mixed-economy companies
    - Any entity directly or indirectly controlled by the state

    **Constitutional basis:**
    The LAI implements three constitutional mandates:
    - Art. 5, XXXIII: fundamental right of access to information
    - Art. 37, § 3, II: public administration transparency
    - Art. 216, § 2: public document management

    **Practical implication:**
    Any system that processes, stores, or transmits government information
    falls under the LAI's disclosure obligations, regardless of the technology
    stack used.
implementation_guidance:
  platform_engineering:
    prose: |
      **Inventory of LAI-scoped systems:**
      1. Tag all infrastructure components that handle government information
         with a LAI-scope label in the service catalog or CMDB.
      2. Implement metadata on every data store indicating whether it contains
         information subject to LAI disclosure obligations.
      3. Create automated discovery rules to flag new services or databases
         deployed within government tenants as potentially in-scope.
      4. Maintain a dependency map linking data sources to public-facing
         transparency portals.
    tools:
      - cmdb
      - service-catalog
      - asset-discovery
      - opa-gatekeeper
  devsecops:
    prose: |
      **Compliance tagging in CI/CD:**
      1. Apply repository labels identifying systems subject to LAI obligations.
      2. Implement pipeline gates that verify LAI compliance metadata is present
         before deployment to production.
      3. Enforce documentation requirements in merge requests for any component
         that handles government information.
    tools:
      - gitlab-ci
      - compliance-pipeline
      - policy-as-code
  secops:
    prose: |
      **LAI governance program:**
      1. Designate a transparency officer (or equivalent role) responsible for
         LAI compliance across all systems.
      2. Maintain a formal register of all information systems subject to LAI.
      3. Map implemented controls against LAI requirements in a compliance
         matrix updated quarterly.
      4. Establish communication channels with oversight bodies (CGU, TCU)
         for transparency reporting.
    tools:
      - grc-platform
      - compliance-dashboard
      - regulatory-tracking
