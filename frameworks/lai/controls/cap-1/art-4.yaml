id: art-4
family: cap-1
title: "Definitions"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 4º Para os efeitos desta Lei, considera-se:

    I - informação: dados, processados ou não, que podem ser utilizados para
    produção e transmissão de conhecimento, contidos em qualquer meio,
    suporte ou formato;

    II - documento: unidade de registro de informações, qualquer que seja o
    suporte ou formato;

    III - informação sigilosa: aquela submetida temporariamente à restrição
    de acesso público em razão de sua imprescindibilidade para a segurança
    da sociedade e do Estado;

    IV - informação pessoal: aquela relacionada à pessoa natural identificada
    ou identificável;

    V - tratamento da informação: conjunto de ações referentes à produção,
    recepção, classificação, utilização, acesso, reprodução, transporte,
    transmissão, distribuição, arquivamento, armazenamento, eliminação,
    avaliação, destinação ou controle da informação;

    VI - disponibilidade: qualidade da informação que pode ser conhecida e
    utilizada por indivíduos, equipamentos ou sistemas autorizados;

    VII - autenticidade: qualidade da informação que tenha sido produzida,
    expedida, recebida ou modificada por determinado indivíduo, equipamento
    ou sistema;

    VIII - integridade: qualidade da informação não modificada, inclusive
    quanto à origem, trânsito e destino;

    IX - primariedade: qualidade da informação coletada na fonte, com o
    máximo de detalhamento possível, sem modificações.
guidance:
  prose: |
    Article 4 provides the legal definitions used throughout the LAI. These
    definitions are critical for system design because they determine what
    constitutes "information" and "documents" subject to disclosure.

    **Key definitions for system architects:**
    - **Information (I):** Extremely broad — includes processed and unprocessed
      data in any medium, support, or format. This means databases, logs,
      emails, documents, spreadsheets, and any digital artifact.
    - **Classified information (III):** Temporary restriction only, and solely
      for reasons of society and state security. Not applicable to embarrassing
      or inconvenient information.
    - **Personal information (IV):** Aligns with the LGPD concept of personal
      data (identified or identifiable natural person).
    - **Information processing (V):** Covers the entire information lifecycle,
      from creation to destruction.
    - **Quality attributes (VI-IX):** Availability, authenticity, integrity,
      and primacy are security and quality requirements for all government
      information systems.
implementation_guidance:
  platform_engineering:
    prose: |
      **Data classification infrastructure:**
      1. Implement metadata schemas that support the LAI classification
         taxonomy: public, classified (reservado/secreto/ultrassecreto),
         and personal.
      2. Build data lifecycle management capabilities covering all phases
         defined in inciso V (production through destruction).
      3. Implement integrity verification (checksums, digital signatures)
         for all stored documents to satisfy authenticity and integrity
         requirements (incisos VII-VIII).
      4. Ensure information systems preserve data primacy (inciso IX) by
         maintaining original source records alongside derived datasets.
    tools:
      - metadata-management
      - data-lifecycle
      - digital-signatures
      - data-lineage
  devsecops:
    prose: |
      **Classification-aware development:**
      1. Enforce data classification annotations in code for all data models
         that store government information.
      2. Implement automated validation that classified and personal data
         fields have appropriate access controls before deployment.
      3. Include integrity verification in CI/CD pipelines for document
         management systems.
    tools:
      - gitlab-ci
      - policy-as-code
      - data-validation
  secops:
    prose: |
      **Information lifecycle governance:**
      1. Maintain a data dictionary mapping all information assets to their
         LAI classification category.
      2. Monitor compliance with information lifecycle policies (retention,
         archival, destruction) as defined in inciso V.
      3. Conduct periodic audits of data integrity and authenticity controls
         across all government information systems.
    tools:
      - data-catalog
      - audit-platform
      - integrity-monitoring
legal_references:
