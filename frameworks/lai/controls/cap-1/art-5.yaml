id: art-5
family: cap-1
title: "Right of Access and State Duty to Inform"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 5º É dever do Estado garantir o direito de acesso à informação,
    que será franqueada, mediante procedimentos objetivos e ágeis, de forma
    transparente, clara e em linguagem de fácil compreensão.
guidance:
  prose: |
    Article 5 establishes two complementary obligations:
    1. **State duty:** The government must actively guarantee the right of
       access — it is not merely permissive but affirmative.
    2. **Quality of access:** Information must be provided through objective
       and agile procedures, in a transparent, clear manner using plain
       language.

    **Plain language requirement:**
    This is not merely a stylistic preference. The law mandates that
    information be provided in "linguagem de fácil compreensão" (easily
    understandable language). This has direct implications for:
    - Portal and API design (user experience)
    - Document format and structure
    - Response drafting for information requests

    **Agility requirement:**
    Procedures must be "objetivos e ágeis" (objective and agile), which
    implies that bureaucratic barriers, unnecessary steps, or slow-by-design
    processes violate this provision.
implementation_guidance:
  platform_engineering:
    prose: |
      **Accessible information infrastructure:**
      1. Design transparency portals with accessibility standards (WCAG 2.1 AA
         minimum) and plain language guidelines.
      2. Implement search and navigation features optimized for non-technical
         users accessing government information.
      3. Provide information in multiple machine-readable formats (JSON, CSV,
         XML) alongside human-readable formats (HTML, PDF).
      4. Deploy performance monitoring to ensure transparency portals meet
         responsiveness SLAs (agility requirement).
    tools:
      - accessibility-testing
      - search-engine
      - api-gateway
      - performance-monitoring
  devsecops:
    prose: |
      **User experience validation:**
      1. Include accessibility testing (WCAG compliance) in CI/CD pipelines
         for all public-facing transparency systems.
      2. Implement automated readability scoring for published content to
         enforce plain language requirements.
      3. Performance test transparency portals under load to verify agility
         requirements are met.
    tools:
      - accessibility-scanner
      - performance-testing
      - gitlab-ci
  secops:
    prose: |
      **Access quality monitoring:**
      1. Monitor transparency portal availability and response times,
         reporting SLA breaches as compliance incidents.
      2. Collect and analyze user feedback on information clarity and
         accessibility to identify improvement areas.
      3. Track metrics on request processing times to ensure "agile
         procedures" requirement compliance.
    tools:
      - uptime-monitoring
      - analytics
      - feedback-management
legal_references:
  - framework_id: gov-digital
    articles: ["art-3", "art-5"]
    relationship: complements
