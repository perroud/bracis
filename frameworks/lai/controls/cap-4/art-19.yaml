id: art-19
family: cap-4
title: "Reclassification and Declassification"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 29. A classificação das informações será reavaliada pela
    autoridade classificadora ou por autoridade hierarquicamente superior,
    mediante provocação ou de ofício, nos termos e prazos previstos em
    regulamento, com vistas à sua desclassificação ou à redução do prazo
    de sigilo, observado o disposto no art. 24.

    § 1º O regulamento a que se refere o caput deverá considerar as
    peculiaridades das informações produzidas no exterior por autoridades
    ou agentes públicos.

    § 2º Na reavaliação a que se refere o caput, deverão ser examinadas a
    permanência dos motivos do sigilo e a possibilidade de danos decorrentes
    do acesso ou da divulgação da informação.

    § 3º Na hipótese de redução do prazo de sigilo da informação, o novo
    prazo de restrição manterá como termo inicial a data da sua produção.
guidance:
  prose: |
    Article 29 establishes the reclassification and declassification review
    mechanism:

    1. **Review authority:** The classifying authority or a hierarchically
       superior authority can reclassify or declassify information.
    2. **Trigger:** Review can be initiated by request (provocação) or
       on the authority's own initiative (de ofício).
    3. **Review criteria (§ 2):** Two factors must be examined:
       - Whether the original classification grounds still exist
       - Whether disclosure would still cause harm
    4. **Period reduction (§ 3):** If the classification period is reduced,
       the new period still counts from the original production date, not
       from the reclassification date.

    **Downward bias:**
    The law's structure creates a deliberate bias toward declassification
    and period reduction. The review examines whether secrecy is still
    justified — the default trajectory is toward public access.
implementation_guidance:
  platform_engineering:
    prose: |
      **Reclassification workflow:**
      1. Build review workflow allowing classifying authorities and superiors
         to initiate reclassification or declassification.
      2. Implement a periodic review scheduler that triggers classification
         reviews at configurable intervals.
      3. Ensure that period reductions recalculate from original production
         date (§ 3), not from reclassification date.
      4. Maintain complete reclassification history with previous and new
         levels, authority, date, and justification.
    tools:
      - workflow-engine
      - classification-engine
      - scheduler
      - audit-trail
  devsecops:
    prose: |
      **Reclassification logic testing:**
      1. Test period recalculation after reclassification to verify it uses
         the original production date as term start (§ 3).
      2. Validate that only authorized officials can reclassify (classifying
         authority or superior).
      3. Test that reclassification history is immutably maintained.
    tools:
      - gitlab-ci
      - date-calculation-testing
      - rbac-testing
  secops:
    prose: |
      **Reclassification monitoring:**
      1. Track reclassification and declassification rates as indicators
         of classification health.
      2. Monitor for stale classifications that have not been reviewed
         within the prescribed intervals.
      3. Audit reclassification decisions for proper justification and
         authority.
    tools:
      - classification-dashboard
      - audit-platform
      - compliance-monitoring
legal_references:
  - framework_id: info-classificada
    articles: ["art-12", "art-13"]
    relationship: implements
