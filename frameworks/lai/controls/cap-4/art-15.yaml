id: art-15
family: cap-4
title: "Classification Criteria for Restricted Information"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 23. São consideradas imprescindíveis à segurança da sociedade ou
    do Estado e, portanto, passíveis de classificação as informações cuja
    divulgação ou acesso irrestrito possam:

    I - pôr em risco a defesa e a soberania nacionais ou a integridade do
    território nacional;

    II - prejudicar ou pôr em risco a condução de negociações ou as
    relações internacionais do País, ou as que tenham sido fornecidas em
    caráter sigiloso por outros Estados e organismos internacionais;

    III - pôr em risco a vida, a segurança ou a saúde da população;

    IV - oferecer elevado risco à estabilidade financeira, econômica ou
    monetária do País;

    V - prejudicar ou causar risco a planos ou operações estratégicos das
    Forças Armadas;

    VI - prejudicar ou causar risco a projetos de pesquisa e desenvolvimento
    científico ou tecnológico, assim como a sistemas, bens, instalações ou
    áreas de interesse estratégico nacional;

    VII - pôr em risco a segurança de instituições ou de altas autoridades
    nacionais ou estrangeiras e seus familiares; ou

    VIII - comprometer atividades de inteligência, bem como de investigação
    ou fiscalização em andamento, relacionadas com a prevenção ou repressão
    de infrações.
guidance:
  prose: |
    Article 23 defines the exhaustive list of grounds for information
    classification. This is the foundation for the entire classification
    regime — information can only be classified if it falls into one of
    these eight categories.

    **Critical interpretation:**
    - The list is exhaustive, not illustrative. Information that does not
      fit any of these eight categories cannot be classified.
    - "Embarrassing" or "inconvenient" information is NOT a valid
      classification ground.
    - The risk must be to society or the state, not to individuals or
      specific institutions (except as specified in VII and VIII).

    **Categories summary:**
    1. National defense and sovereignty (I)
    2. International relations (II)
    3. Public safety and health (III)
    4. Financial/economic stability (IV)
    5. Military strategic operations (V)
    6. Strategic R&D and national interest areas (VI)
    7. Security of high-ranking officials (VII)
    8. Intelligence and ongoing investigations (VIII)
implementation_guidance:
  platform_engineering:
    prose: |
      **Classification decision support:**
      1. Implement a classification wizard in document management systems
         that requires selection of one or more of the eight legal grounds
         when classifying information.
      2. Build validation rules that reject classifications not linked to
         at least one of the eight categories.
      3. Maintain a classification registry with the ground(s) cited for
         each classified document, enabling audit and review.
      4. Implement automated expiry alerts based on classification level
         timelines (per art. 24).
    tools:
      - document-management
      - classification-engine
      - audit-trail
      - alerting
  devsecops:
    prose: |
      **Classification validation in pipeline:**
      1. Enforce that all document uploads to restricted repositories include
         mandatory classification metadata (ground, level, authority).
      2. Implement automated checks that reject classification metadata
         missing the legal ground justification.
      3. Build integration tests for the classification wizard ensuring all
         eight categories are available and properly mapped.
    tools:
      - gitlab-ci
      - metadata-validation
      - integration-testing
  secops:
    prose: |
      **Classification audit program:**
      1. Conduct periodic audits of classified information to verify that
         classification grounds remain valid and have not expired.
      2. Analyze classification patterns across bodies to detect potential
         over-classification (e.g., disproportionate use of certain grounds).
      3. Report classification statistics by ground category to oversight
         bodies (CGU, CMRI).
    tools:
      - audit-platform
      - classification-analytics
      - compliance-reporting
legal_references:
  - framework_id: info-classificada
    articles: ["art-3", "art-4"]
    relationship: implements
