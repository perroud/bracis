id: art-17
family: cap-4
title: "Classification Authority"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 27. A classificação do sigilo de informações no âmbito da
    administração pública federal é de competência:

    I - no grau de ultrassecreto, das seguintes autoridades:

    a) Presidente da República;
    b) Vice-Presidente da República;
    c) Ministros de Estado e autoridades com as mesmas prerrogativas;
    d) Comandantes da Marinha, do Exército e da Aeronáutica; e
    e) Chefes de Missões Diplomáticas e Consulares permanentes no exterior;

    II - no grau de secreto, das autoridades referidas no inciso I, dos
    titulares de autarquias, fundações ou empresas públicas e sociedades de
    economia mista; e

    III - no grau de reservado, das autoridades referidas nos incisos I e
    II e das que exerçam funções de direção, comando ou chefia, nível
    DAS 101.5, ou superior, do Grupo-Direção e Assessoramento Superiores,
    ou de hierarquia equivalente, de acordo com regulamentação específica
    de cada órgão ou entidade, observado o disposto nesta Lei.

    § 1º A competência prevista nos incisos I e II, no que se refere à
    classificação como ultrassecreta e secreta, poderá ser delegada pela
    autoridade responsável a agente público, inclusive em missão no
    exterior, vedada a subdelegação.

    § 2º A classificação de informação no grau de sigilo ultrassecreto
    pelas autoridades previstas nas alíneas "d" e "e" do inciso I deverá
    ser ratificada pelos respectivos Ministros de Estado, no prazo previsto
    em regulamento.

    § 3º A autoridade ou outro agente público que classificar informação
    como ultrassecreta deverá encaminhar a decisão de que trata o art. 28
    à Comissão Mista de Reavaliação de Informações, a que se refere o
    art. 35, no prazo previsto em regulamento.
guidance:
  prose: |
    Article 27 establishes a strict hierarchy of classification authority:

    | Level | Who Can Classify |
    |-------|-----------------|
    | Ultrassecreta | President, VP, Ministers, Military Commanders, Diplomats |
    | Secreta | Above + heads of autarquias, foundations, state enterprises |
    | Reservada | Above + DAS 101.5+ officials or equivalent |

    **Key constraints:**
    - **Delegation allowed (§ 1):** Ultrassecreta and secreta classification
      can be delegated to a public agent, but subdelegation is prohibited.
    - **Military ratification (§ 2):** Classifications by military
      commanders and diplomats must be ratified by their respective Minister.
    - **CMRI notification (§ 3):** All ultrassecreta classifications must
      be reported to the Mixed Commission for Information Reassessment
      (CMRI) for oversight.

    **System implication:**
    Classification systems must enforce authority validation — only
    authorized officials (or their delegates) should be able to set
    classification levels, and the system must verify the classifying
    authority's rank against the level being assigned.
implementation_guidance:
  platform_engineering:
    prose: |
      **Classification authority enforcement:**
      1. Implement role-based classification permissions mapped to the
         three-tier authority hierarchy (ultrassecreta, secreta, reservada).
      2. Build delegation management — allow authorized officials to
         delegate classification authority to specific agents, with
         subdelegation blocked at system level.
      3. Automate CMRI notification workflow for all ultrassecreta
         classifications (§ 3).
      4. Implement ministerial ratification workflow for military and
         diplomatic ultrassecreta classifications (§ 2).
      5. Maintain immutable audit trail of who classified what, when,
         at what level, and under which authority.
    tools:
      - rbac
      - workflow-engine
      - delegation-management
      - audit-trail
  devsecops:
    prose: |
      **Authority validation testing:**
      1. Test that classification attempts by unauthorized users are
         blocked at each level.
      2. Validate delegation and subdelegation rules (delegation allowed,
         subdelegation blocked).
      3. Test CMRI notification and ministerial ratification workflows
         end-to-end.
    tools:
      - gitlab-ci
      - rbac-testing
      - integration-testing
  secops:
    prose: |
      **Classification authority audit:**
      1. Audit classification actions to verify that only authorized
         officials (or valid delegates) performed classifications.
      2. Monitor for classification authority anomalies (e.g., reservada
         classifications by unauthorized personnel).
      3. Track delegation status to ensure no expired or unauthorized
         delegations are in effect.
    tools:
      - audit-platform
      - rbac-review
      - compliance-monitoring
legal_references:
  - framework_id: info-classificada
    articles: ["art-8", "art-9"]
    relationship: implements
