id: art-16
family: cap-4
title: "Classification Levels and Maximum Restriction Periods"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 24. A informação em poder dos órgãos e entidades públicas,
    observado o seu teor e em razão de sua imprescindibilidade à segurança
    da sociedade ou do Estado, poderá ser classificada como ultrassecreta,
    secreta ou reservada.

    § 1º Os prazos máximos de restrição de acesso à informação, conforme
    a classificação prevista no caput, vigoram a partir da data de sua
    produção e são os seguintes:

    I - ultrassecreta: 25 (vinte e cinco) anos;

    II - secreta: 15 (quinze) anos;

    III - reservada: 5 (cinco) anos.

    § 2º As informações que puderem colocar em risco a segurança do
    Presidente e Vice-Presidente da República e respectivos cônjuges e
    filhos(as) serão classificadas como reservadas e ficarão sob sigilo
    até o término do mandato em exercício ou do último mandato, em caso
    de reeleição.

    § 3º Alternativamente aos prazos previstos no § 1º, poderá ser
    estabelecida como termo final de restrição de acesso a ocorrência de
    determinado evento, desde que este ocorra antes do transcurso do prazo
    máximo de classificação.

    § 4º Transcorrido o prazo de classificação ou consumado o evento que
    defina o seu termo final, a informação tornar-se-á, automaticamente,
    de acesso público.

    § 5º Para a classificação da informação em determinado grau de sigilo,
    deverá ser observado o interesse público da informação e utilizado o
    critério menos restritivo possível, considerados:

    I - a gravidade do risco ou dano à segurança da sociedade e do Estado; e

    II - o prazo máximo de restrição de acesso ou o evento que defina seu
    termo final.
guidance:
  prose: |
    Article 24 establishes the three-tier classification system:

    | Level | Portuguese | Max Period | Typical Use |
    |-------|-----------|-----------|-------------|
    | Top Secret | Ultrassecreta | 25 years | National defense, sovereignty |
    | Secret | Secreta | 15 years | International relations, strategic ops |
    | Restricted | Reservada | 5 years | Ongoing investigations, institutional security |

    **Key principles:**
    - **Automatic declassification (§ 4):** Upon expiry of the classification
      period, information becomes public automatically — no manual action
      required.
    - **Least restrictive criterion (§ 5):** Classification must use the
      lowest level sufficient to protect the interest at stake.
    - **Event-based termination (§ 3):** Classification can be tied to an
      event (e.g., end of an investigation) instead of a fixed period, if
      the event occurs before the maximum period.
    - **Presidential security exception (§ 2):** Information about
      presidential security is classified as "reservada" until end of term.

    **System design requirement:**
    Systems must implement automatic declassification — this is not
    discretionary. At period expiry, access controls must be removed
    without human intervention.
implementation_guidance:
  platform_engineering:
    prose: |
      **Automated classification lifecycle:**
      1. Implement three classification levels (ultrassecreta, secreta,
         reservada) with configurable maximum periods (25, 15, 5 years).
      2. Build automatic declassification engine that removes access
         restrictions upon period expiry (§ 4) without manual intervention.
      3. Support event-based declassification triggers (§ 3) alongside
         time-based expiry.
      4. Implement the "least restrictive" principle (§ 5) as a validation
         rule — require justification when higher classification levels
         are selected.
      5. Build classification dashboard showing upcoming declassifications
         and current classification inventory by level.
    tools:
      - document-management
      - classification-engine
      - scheduler
      - alerting
  devsecops:
    prose: |
      **Classification system testing:**
      1. Implement automated tests for declassification logic — verify that
         documents are automatically made public upon period expiry.
      2. Test event-based declassification triggers end-to-end.
      3. Validate that classification metadata includes all required fields
         (level, period, ground, authority) before acceptance.
    tools:
      - gitlab-ci
      - integration-testing
      - scheduler-testing
  secops:
    prose: |
      **Declassification governance:**
      1. Monitor upcoming declassifications (30, 60, 90 days ahead) and
         notify responsible authorities for review.
      2. Audit that automatic declassification is functioning correctly —
         no documents should remain classified beyond their maximum period.
      3. Report classification level distribution and average classification
         durations to detect over-classification trends.
    tools:
      - classification-dashboard
      - audit-platform
      - compliance-reporting
legal_references:
  - framework_id: info-classificada
    articles: ["art-5", "art-6", "art-7"]
    relationship: implements
