id: art-20
family: cap-4
title: "Handling of Classified Information"
class: LAI
baselines: [government-transparency]
statement:
  prose: |
    Art. 25. É dever do Estado controlar o acesso e a divulgação de
    informações sigilosas produzidas por seus órgãos e entidades,
    assegurando a sua proteção.

    § 1º O acesso, a divulgação e o tratamento de informação classificada
    como sigilosa ficarão restritos a pessoas que tenham necessidade de
    conhecê-la e que sejam devidamente credenciadas na forma do regulamento,
    sem prejuízo das atribuições dos agentes públicos autorizados por lei.

    § 2º O acesso à informação classificada como sigilosa cria a obrigação
    para aquele que a obteve de resguardar o sigilo.

    § 3º Regulamento disporá sobre procedimentos e medidas a serem adotados
    para o tratamento de informação sigilosa, de modo a protegê-la contra
    perda, alteração indevida, acesso, transmissão e divulgação não
    autorizados.

    Art. 26. As autoridades públicas adotarão as providências necessárias
    para que o pessoal a elas subordinado hierarquicamente conheça as normas
    e observe as medidas e procedimentos de segurança para tratamento de
    informações sigilosas.

    Parágrafo único. A pessoa física ou entidade privada que, em razão de
    qualquer vínculo com o poder público, executar atividades de tratamento
    de informações sigilosas adotará as providências necessárias para que
    seus empregados, prepostos ou representantes observem as medidas e
    procedimentos de segurança das informações resultantes da aplicação
    desta Lei.
guidance:
  prose: |
    Articles 25 and 26 establish the handling regime for classified
    information:

    **Need-to-know principle (art. 25, § 1):**
    Access to classified information is restricted to credentialed persons
    with a demonstrated need to know. This is the core access control
    principle.

    **Secrecy obligation (art. 25, § 2):**
    Anyone who accesses classified information is legally obligated to
    maintain its secrecy — this creates a personal liability.

    **Protection requirements (art. 25, § 3):**
    Classified information must be protected against: loss, unauthorized
    alteration, unauthorized access, unauthorized transmission, and
    unauthorized disclosure.

    **Training obligation (art. 26):**
    Authorities must ensure their subordinates know the security norms.

    **Contractor extension (art. 26, parágrafo único):**
    Private entities handling classified information on behalf of government
    must ensure their employees follow the same security procedures.
implementation_guidance:
  platform_engineering:
    prose: |
      **Classified information access controls:**
      1. Implement need-to-know access control for classified information,
         requiring explicit authorization for each access grant.
      2. Deploy credentialing system for users handling classified data,
         with periodic re-verification.
      3. Implement encryption at rest and in transit for all classified
         information stores and transfers.
      4. Build Data Loss Prevention (DLP) controls to prevent unauthorized
         transmission or disclosure of classified data.
      5. Implement access logging for all interactions with classified
         information (who accessed what, when, from where).
    tools:
      - rbac
      - encryption
      - dlp
      - access-logging
      - credentialing-system
  devsecops:
    prose: |
      **Classified data handling in pipelines:**
      1. Ensure CI/CD pipelines handling classified information run in
         isolated, credentialed environments.
      2. Implement secret scanning to detect classified information
         leaking into code repositories or logs.
      3. Validate that classified data is never exposed in test environments,
         CI artifacts, or deployment logs.
    tools:
      - secret-detection
      - isolated-runners
      - artifact-scanning
      - gitlab-ci
  secops:
    prose: |
      **Classified information protection program:**
      1. Conduct periodic security awareness training on classified
         information handling for all credentialed personnel (art. 26).
      2. Extend training and compliance requirements to contractor
         personnel handling classified data (art. 26, parágrafo único).
      3. Monitor for unauthorized access attempts and data exfiltration
         of classified information.
      4. Conduct periodic access reviews to verify need-to-know status
         of all credentialed users.
    tools:
      - security-training
      - siem
      - access-review
      - vendor-compliance
