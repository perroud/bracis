  - gitops
url: "https://www.planalto.gov.br/ccivil_03/_ato2011-2014/2011/lei/l12527.htm"
control_families:
  - id: cap-1
    title: "General Provisions"
    description: "Scope, definitions, guiding principles of transparency, and the distinction between active and passive disclosure obligations for public bodies"
    articles: "art. 1 to art. 5"
    control_count: 5
  - id: cap-2
    title: "Active Transparency"
    description: "Mandatory proactive disclosure of information, minimum content requirements, internet portals, and real-time publication of budgetary and financial data"
    articles: "art. 6 to art. 9"
    control_count: 4
  - id: cap-3
    title: "Passive Transparency and Information Requests"
    description: "Procedures for receiving and processing information requests, response deadlines (20 days extendable by 10), appeals process, and the role of the ombudsman"
    articles: "art. 10 to art. 14"
    control_count: 5
  - id: cap-4
    title: "Information Classification and Restricted Access"
    description: "Classification levels (reservado, secreto, ultrassecreto), classification authority, declassification timelines, and handling of restricted information"
    articles: "art. 15 to art. 20"
    control_count: 6
  - id: cap-5
    title: "Personal Data Protection"
    description: "Protection of personal data contained in public records, consent requirements, and limits on disclosure of personal information"
    articles: "art. 21 to art. 22"
    control_count: 2
  - id: cap-6
    title: "Accountability and Sanctions"
    description: "Penalties for non-compliance with transparency obligations, whistleblower protection, and oversight mechanisms"
    articles: "art. 23 to art. 25"
    control_count: 3
related_frameworks:
  - framework_id: lgpd
    relationship: complements
    description: >-
      The LGPD complements the LAI by establishing personal data protection
      rules that constrain transparency obligations when personal data is
      involved, requiring a balance between public access rights and data
      subject privacy.
  - framework_id: gov-digital
    relationship: complements
    description: "The Digital Government framework complements the LAI by mandating digital channels and interoperability standards for the proactive and passive disclosure of government information."
  - framework_id: info-classificada
    relationship: implements
    description: >-
      The information classification regulation (Decreto 7.724/2012) implements
      the LAI's classification and declassification provisions, detailing
      operational procedures for classified information handling.
