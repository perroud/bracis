id: lai
title: "Brazilian Freedom of Information Act (Lei 12.527/2011 — Lei de Acesso à Informação)"
short_title: "LAI"
version: "12.527/2011"
publication_date: "2011-11-18"
last_updated: "2011-11-18"
effective_date: "2012-05-16"
authority:
  name: "Presidência da República"
  acronym: "PR"
  country: "BR"
  url: "https://www.gov.br/planalto"
type: law
scope: freedom-of-information
mandatory: true
original_language: pt-br
available_languages: [pt-br]
industries:
  - government
  - public-sector
  - state-owned-enterprises
regions:
  - brazil
techstacks:
  - platform-engineering
  - devsecops
