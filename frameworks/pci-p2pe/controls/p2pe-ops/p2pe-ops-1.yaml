id: p2pe-ops-1
family: p2pe-ops
title: "Solution Provider Operational Procedures and Compliance"
class: PCI-P2PE

statement:
  prose: >-
    The solution provider shall maintain comprehensive documented
    operational procedures for all aspects of the P2PE solution, including
    device management, key management, application management, decryption
    operations, and merchant support. Personnel performing P2PE-related
    functions shall receive role-specific training on security procedures
    and shall acknowledge their responsibilities in writing. The solution
    provider shall undergo annual assessment by a PCI P2PE Qualified
    Security Assessor (P2PE QSA) and maintain a current P2PE validation
    listing on the PCI SSC website. Changes to the P2PE solution that
    affect the security of account data encryption, decryption, or key
    management shall trigger a reassessment.
  parts:
    - id: p2pe-ops-1.a
      label: "Domain 6, 6A"
      prose: >-
        Documented operational procedures cover all P2PE solution
        components, and personnel receive role-specific security training
        with written acknowledgment of responsibilities.
    - id: p2pe-ops-1.b
      label: "Domain 6, 6B"
      prose: >-
        The solution provider maintains current P2PE validation through
        annual QSA assessment and triggers reassessment for material
        changes to encryption, decryption, or key management components.

guidance:
  prose: >-
    Operational procedures are the connective tissue between technical
    controls and day-to-day operations. Without documented, trained, and
    enforced procedures, even strong technical controls will degrade over
    time. The P2PE standard requires solution providers to maintain a P2PE
    Instruction Manual (PIM) for merchants that details the merchant's
    responsibilities for maintaining their P2PE scope reduction. Training
    must be tailored to role — key custodians need different training than
    application developers or help desk staff. The annual P2PE QSA
    assessment validates the entire solution including encryption devices,
    applications, decryption environment, key management, and device
    management. Material changes that trigger reassessment include changes
    to POI device models, encryption algorithms, key management
    architecture, decryption HSM configuration, or the P2PE application
    version. Solution providers should implement a formal change management
    process that evaluates every change for P2PE impact.

references:
  - citation: "PCI P2PE v3.1, Domain 6 — P2PE Solution Provider Management"
    url: "https://www.pcisecuritystandards.org/"
  - citation: "PCI P2PE v3.1, Annex A — P2PE Instruction Manual Requirements"
    url: "https://www.pcisecuritystandards.org/"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a documentation-as-code system where operational procedures
      are version-controlled, reviewed, and approved through the same
      pipeline as technical changes. Deploy a training management platform
      that tracks completion rates, certification status, and renewal
      dates for all P2PE-related personnel. Build automated change impact
      analysis that evaluates infrastructure and application changes
      against P2PE scope to flag changes requiring reassessment. Maintain
      a compliance evidence repository that automatically collects logs,
      configurations, and test results needed for the annual QSA
      assessment.
    tools:
      - confluence
      - gitbook
      - gitlab-wiki
      - learning-management-system
      - servicenow
      - compliance-evidence-platform

  devsecops:
    prose: >-
      Integrate P2PE change impact assessment into pull request workflows.
      Tag all code and infrastructure changes with P2PE-impact labels.
      Require security team sign-off for any change tagged as P2PE-
      impacting. Automate evidence collection for the annual assessment
      by extracting relevant pipeline logs, scan results, and configuration
      snapshots. Build compliance dashboards that show current assessment
      status and upcoming renewal deadlines.
    tools:
      - gitlab-ci
      - jira
      - opa
      - inspec
      - compliance-as-code
      - drata

  secops:
    prose: >-
      Monitor for procedural compliance deviations (e.g., key operations
      performed without dual control, device deployments without
      inspection). Track training completion rates and alert on personnel
      with expired certifications performing sensitive P2PE functions.
      Maintain a calendar of compliance milestones (annual QSA assessment,
      quarterly scans, training renewals) with automated reminders.
      Conduct periodic unannounced audits of operational procedures to
      verify documented processes match actual practice.
    tools:
      - splunk
      - elastic-siem
      - servicenow
      - learning-management-system
      - compliance-management-platform

