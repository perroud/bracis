id: pci-p2pe
title: "PCI Point-to-Point Encryption Standard v3.1"
short_title: "PCI P2PE v3.1"
version: "3.1"
publication_date: "2022-06-01"
last_updated: "2022-06-01"

authority:
  name: "Payment Card Industry Security Standards Council"
  acronym: "PCI SSC"
  country: US
  url: "https://www.pcisecuritystandards.org/"

type: standard
scope: cybersecurity
mandatory: true

original_language: en
available_languages:
  - en

industries:
  - financial-services
  - retail
  - payment-processing
  - hospitality
  - fintech

regions:
  - global

techstacks:
  - platform-engineering
  - devsecops
  - secops
  - hardware-security
  - cryptography
  - encryption

baselines:
  - id: p2pe-solution-provider
    title: "P2PE Solution Provider"
  - id: p2pe-component-provider
    title: "P2PE Component Provider"
  - id: p2pe-application-vendor
    title: "P2PE Application Vendor"
  - id: p2pe-merchant
    title: "P2PE Merchant (Reduced PCI DSS Scope)"

goals:
  - id: goal-1
    title: "Ensure Secure Encryption at Point of Interaction"
    requirements: [p2pe-encrypt]
  - id: goal-2
    title: "Maintain Secure P2PE Application Development and Operations"
    requirements: [p2pe-app]
  - id: goal-3
    title: "Protect Decryption Environment Integrity"
    requirements: [p2pe-decrypt]
  - id: goal-4
    title: "Manage Cryptographic Key Lifecycle Securely"
    requirements: [p2pe-key]
  - id: goal-5
    title: "Control POI Device Lifecycle and Integrity"
    requirements: [p2pe-device]
  - id: goal-6
    title: "Maintain Operational Controls and Monitoring"
    requirements: [p2pe-ops]

control_families:
  - id: p2pe-encrypt
    title: "Encryption Device Management"
    description: >-
      Requirements for ensuring that POI devices encrypt account data
      using robust cryptographic methods at the point of interaction,
      rendering cleartext data inaccessible in the merchant environment.
    control_count: 3
  - id: p2pe-app
    title: "Application Security"
    description: >-
      Requirements for the secure development, deployment, and
      management of P2PE payment applications that handle encrypted
      account data, ensuring no cleartext exposure during processing.
    control_count: 3
  - id: p2pe-decrypt
    title: "Decryption Environment"
    description: >-
      Requirements for the physical and logical security of the
      decryption environment, including HSM-based decryption operations
      and the isolation of the decryption boundary from untrusted
      networks.
    control_count: 3
  - id: p2pe-key
    title: "Key Management"
    description: >-
      Requirements governing the full lifecycle of cryptographic keys
      used in P2PE solutions, including generation, distribution,
      loading, storage, rotation, and destruction within secure
      cryptographic devices.
    control_count: 3
  - id: p2pe-device
    title: "Device Management"
    description: "Requirements for the secure lifecycle management of POI devices from manufacturing and initial key injection through deployment, maintenance, tamper monitoring, and decommissioning."
    control_count: 2
  - id: p2pe-ops
    title: "Operational Controls"
    description: "Requirements for solution provider operational procedures, monitoring, incident response, and ongoing compliance activities that support the integrity of the P2PE solution."
    control_count: 2

related_frameworks:
  - framework_id: pci-dss-v4
