control_families:
  - id: sec-1
    title: "Disposicoes Gerais AVSEC Cibernetica"
    description: >-
      Obrigacoes gerais dos operadores de aerodromo em relacao a
      seguranca cibernetica aeroportuaria (AVSEC Cibernetica),
      incluindo o escopo de aplicacao, definicoes e a integracao do
      Plano de Seguranca Cibernetica ao PSAC (Programa de Seguranca
      Aeroportuaria contra Atos de Interferencia Ilicita)
    articles: "sec. 107.1 ao sec. 107.3"
    control_count: 2
  - id: sec-2
    title: "Requisitos de Seguranca Cibernetica para Aerodromos"
    description: >-
      Requisitos tecnicos e operacionais de seguranca cibernetica
      para protecao dos sistemas criticos de aeroportos, incluindo
      sistemas de check-in, controle de acesso, CFTV, comunicacoes
      aeronauticas e sistemas de TIC, bem como avaliacao de riscos
      ciberneticos e treinamento de pessoal
    articles: "sec. 107.4 ao sec. 107.9"
    control_count: 3
  - id: sec-3
    title: "Resposta a Incidentes e Continuidade Operacional"
    description: >-
      Requisitos para deteccao, notificacao a ANAC, resposta e
      recuperacao de incidentes ciberneticos em aerodromos, incluindo
      planos de continuidade operacional para manutencao das operacoes
      aeronauticas durante e apos incidentes ciberneticos
    articles: "sec. 107.10 ao sec. 107.15"
    control_count: 3
related_frameworks:
  - framework_id: rbac-108
    relationship: complements
    description: >-
      O RBAC 108 regula a seguranca AVSEC cibernetica dos operadores
      aereos (companhias aereas), enquanto o RBAC 107 regula os
      operadores de aerodromo, sendo frameworks complementares dentro
      do sistema AVSEC brasileiro.
  - framework_id: iso-27001-2022
    relationship: mapped
    description: >-
      A ISO 27001:2022 fornece o framework internacional de gestao de
      seguranca da informacao que serve de referencia tecnica para
      implementacao dos controles de AVSEC cibernetica exigidos pelo
      RBAC 107.
  - framework_id: gsi-in3
    relationship: mapped
    description: >-
      A IN3/GSI-PR estabelece requisitos de seguranca cibernetica para
      infraestruturas criticas nacionais, complementando e alinhando-se
      aos requisitos do RBAC 107 para aerodromos como infraestrutura
      critica de transporte.
  - framework_id: pnciber
    relationship: complements
    description: "A Politica Nacional de Ciberseguranca (PNCiber) fornece o marco estrategico nacional no qual o RBAC 107 se insere como regulacao setorial especifica para o setor de aviacao civil."
