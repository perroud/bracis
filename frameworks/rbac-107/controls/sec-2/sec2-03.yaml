id: sec2-03
family: sec-2
title: "Treinamento de Pessoal em AVSEC Cibernetica"
class: RBAC-107
baselines: [aerodrome-operators]
statement:
  prose: |
    O operador de aeródromo deve estabelecer e manter programa de treinamento
    em segurança cibernética (AVSEC cibernética) para o pessoal que opera,
    administra ou tem acesso privilegiado aos sistemas TIC críticos do aeródromo.

    O programa de treinamento deve:
    I - incluir treinamento inicial para novos funcionários antes da concessão
        de acesso a sistemas TIC críticos;
    II - contemplar treinamento de reciclagem com frequência mínima anual para
         todos os funcionários com acesso a sistemas TIC críticos;
    III - abordar ameaças específicas ao setor de aviação, incluindo engenharia
          social, phishing direcionado a funcionários de aeródromo e ataques
          a sistemas OT/IoT aeroportuários;
    IV - incluir treinamento especializado para a equipe de TIC responsável
         pela administração dos sistemas críticos do aeródromo;
    V - abranger conscientização de todos os funcionários do aeródromo sobre
        identificação e relato de comportamentos suspeitos relacionados a
        segurança cibernética;
    VI - ser documentado com registros de participação e avaliação de eficácia,
         mantidos disponível para auditoria pela ANAC.
guidance:
  prose: |
    O fator humano e reconhecidamente o vetor mais explorado em ataques
    ciberneticos contra infraestruturas criticas, incluindo aeroportos.

    **Especificidades do treinamento AVSEC cibernetico:**
    O treinamento de pessoal aeroportuario em seguranca cibernetica deve
    integrar o conceito de AVSEC (Aviation Security) ja consolidado no setor.
    Funcionarios treinados em seguranca fisica de AVSEC precisam entender
    que o ciberespaco e agora um vetor de ameacas equivalente.

    **Grupos de treinamento:**
    - Todos os funcionarios: conscientizacao basica sobre phishing, engenharia
      social e procedimentos de relato de incidentes ciberneticos
    - Equipes de TIC: treinamento tecnico avancado em defesa de sistemas
      aeroportuarios, resposta a incidentes e hardening de sistemas
    - Gerencia de AVSEC e seguranca: integracao de ameacas ciberneticas ao
      modelo de ameacas AVSEC, tomada de decisao durante crises ciberneticas
    - Operadores de check-in e controle de acesso: reconhecimento de anomalias
      em sistemas operacionais e procedimentos alternativos durante falhas

    **Alinhamento com ICAO:**
    O Doc 8973 da ICAO (Manual de Seguranca da Aviacao) dedica secao especifica
    ao treinamento de pessoal em seguranca cibernetica, que deve ser incorporado
    ao curriculo de treinamento AVSEC existente.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de gestao de treinamento em AVSEC cibernetica:**
      1. Implementar LMS (Learning Management System) para gestao do programa
         de treinamento, com controle de matriculas, progresso e certificacao
         por funcionario, integrado ao sistema de RH do aerodromo.
      2. Configurar alertas automaticos para identificar funcionarios com acesso
         a sistemas TIC criticos que estejam com treinamento vencido ou pendente,
         com bloqueio automatico de acesso apos periodo de graca definido.
      3. Integrar o modulo de treinamento de AVSEC cibernetica ao programa de
         treinamento AVSEC geral existente no LMS, aproveitando infraestrutura
         de certificacao ja estabelecida.
      4. Implementar simulacoes de phishing automatizadas e periodicas direcionadas
         a funcionarios do aerodromo, com metricas de clique e relato para
         avaliar eficacia do treinamento.
      5. Manter repositorio centralizado de materiais de treinamento, atualizados
         com base em novos alertas de ameacas ao setor de aviacao (A-ISAC, ANAC).
    tools:
      - lms-platform
      - phishing-simulation
      - training-management
  devsecops:
    prose: |
      **Integracao de conscientizacao de seguranca no desenvolvimento:**
      1. Incluir modulo de seguranca no onboarding de desenvolvedores e equipe
         de TIC, cobrindo boas praticas de desenvolvimento seguro aplicadas
         a sistemas aeroportuarios criticos.
      2. Manter base de conhecimento interna (wiki) sobre padroes de seguranca,
         licoes aprendidas de incidentes e guidelines de desenvolvimento seguro
         para sistemas TIC do aerodromo.
      3. Implementar programa de security champions dentro da equipe de TIC,
         com treinamento avancado para referencia em seguranca para os times
         de desenvolvimento e operacao.
      4. Realizar CTF (Capture the Flag) internos ou treinamentos hands-on
         em ambiente de laboratorio simulando sistemas aeroportuarios para
         desenvolvimento de habilidades praticas da equipe de TIC.
      5. Rastrear certificacoes de seguranca da equipe de TIC (CISSP, CEH,
         CompTIA Security+) e incluir como criterio de progressao de carreira.
    tools:
      - security-training-platform
      - knowledge-base
      - certification-tracker
  secops:
    prose: |
      **Operacao do programa de treinamento e medicao de eficacia:**
      1. Conduzir campanhas de phishing simulado trimestrais para toda a forca
         de trabalho do aerodromo, com relatorio de taxa de clique por
         departamento e evolucao ao longo do tempo para medir eficacia.
      2. Documentar e registrar todos os treinamentos concluidos por funcionario,
         mantendo historico para auditoria pela ANAC com evidencias de conclusao
         (certificados, assinaturas, registros de LMS).
      3. Realizar exercicios praticos de resposta a incidentes ciberneticos
         (tabletop exercises) pelo menos semestralmente, envolvendo equipes
         de TIC, AVSEC, operacoes e comunicacao.
      4. Revisar e atualizar o conteudo do treinamento anualmente ou apos
         incidentes significativos, incorporando novas ameacas e licoes aprendidas.
      5. Reportar metricas de eficacia do programa de treinamento (taxa de
         conclusao, resultados de phishing simulado, incidentes por fator humano)
         para a diretoria e para o responsavel pelo PSAC.
    tools:
      - soc-platform
      - training-metrics-dashboard
      - incident-tracking
      - phishing-simulation
