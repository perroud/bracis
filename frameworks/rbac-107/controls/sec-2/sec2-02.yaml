id: sec2-02
family: sec-2
title: "Seguranca de Sistemas de Comunicacoes Aeronauticas e Sistemas de TIC Aeroportuarios"
class: RBAC-107
baselines: [aerodrome-operators]
statement:
  prose: |
    O operador de aeródromo deve implementar controles de segurança cibernética
    para proteger os sistemas de comunicações aeronáuticas e demais sistemas de
    tecnologia da informação e comunicação (TIC) que suportam as operações
    aeroportuárias críticas.

    Os controles devem abranger:
    I - proteção dos sistemas de comunicação terra-ar e terra-terra utilizados
        no aeródromo, incluindo sistemas de ATIS (Automatic Terminal Information
        Service), ACARS e comunicações VHF/HF de apoio;
    II - segurança dos sistemas de informação de voo (FIDS), gestão de slots e
         coordenação de movimentos aeroportuários;
    III - proteção dos sistemas de raio-X e detecção de explosivos nos postos
          de inspeção de segurança aeroportuária;
    IV - controles de acesso lógico com autenticação forte para todos os sistemas
         TIC críticos do aeródromo;
    V - criptografia de comunicações de gerenciamento e dados sensíveis de
        operações aeroportuárias;
    VI - gestão de identidade e acesso privilegiado para administradores de
         sistemas TIC críticos.
guidance:
  prose: |
    Os sistemas de comunicacoes aeronauticas representam ativo critico de
    seguranca que, se comprometidos, podem afetar diretamente a seguranca
    das operacoes de voo.

    **Comunicacoes aeronauticas no contexto do aerodromo:**
    O operador de aerodromo e responsavel pela infraestrutura de suporte as
    comunicacoes (torres, equipamentos de radio, sistemas de transmissao de
    dados), e embora o controle operacional frequentemente seja do DECEA
    (Departamento de Controle do Espaco Aereo) para ATC, o aerodromo mantem
    responsabilidade por componentes de TIC que integram esses sistemas.

    **Sistemas de inspecao de seguranca:**
    Os equipamentos de raio-X e deteccao de explosivos sao cada vez mais
    informatizados e conectados em rede para gerenciamento centralizado,
    imagens, calibracao e relatorios. Seu comprometimento cibernetico pode
    afetar a eficacia da inspecao de seguranca de passageiros e bagagens.

    **Principio do menor privilegio:**
    O acesso a sistemas TIC criticos deve ser baseado no principio do menor
    privilegio, com contas de servico dedicadas, senhas fortes e unicas,
    e autenticacao multifator para acesso privilegiado.
implementation_guidance:
  platform_engineering:
    prose: |
      **Arquitetura segura para sistemas TIC aeroportuarios:**
      1. Implementar Zero Trust Architecture para acesso aos sistemas TIC criticos,
         eliminando confianca implicita baseada em localizacao de rede e exigindo
         autenticacao e autorizacao continua para cada acesso.
      2. Implantar IAM (Identity and Access Management) centralizado para todos
         os sistemas TIC criticos, com MFA obrigatorio para acesso privilegiado
         a sistemas de comunicacao, FIDS, e equipamentos de inspecao.
      3. Segmentar redes de sistemas de inspecao (raio-X, ETD) em zone dedicada,
         com acesso restrito e monitorado, separada da rede operacional geral.
      4. Implementar criptografia TLS 1.3 para todas as comunicacoes de
         gerenciamento de sistemas TIC criticos, eliminando protocolos legados
         inseguros (Telnet, FTP, HTTP, SNMPv1/v2).
      5. Manter topologia de rede documentada e atualizada de todos os sistemas
         TIC aeroportuarios, com revisao a cada mudanca de infraestrutura.
    tools:
      - zero-trust-gateway
      - iam-solution
      - network-segmentation
      - certificate-management
  devsecops:
    prose: |
      **Ciclo de vida seguro para sistemas TIC aeroportuarios:**
      1. Implementar processo formal de security review e aprovacao para
         integracao de novos sistemas TIC ao ambiente aeroportuario, incluindo
         revisao de contratos de fornecedores quanto a requisitos de seguranca.
      2. Exigir SAST e analise de composicao de software (SCA) para aplicacoes
         desenvolvidas internamente ou por fornecedores de sistemas aeroportuarios.
      3. Manter repositorio de configuracoes com controle de versao para todos
         os sistemas TIC criticos, com auditoria de alteracoes e aprovacao formal.
      4. Realizar testes de seguranca (penetration testing) periodicos dos
         sistemas TIC, priorizando sistemas de comunicacao e FIDS.
      5. Implementar processo de gestao de mudancas com avaliacao de impacto
         de seguranca antes de alteracoes em sistemas TIC criticos.
    tools:
      - gitlab-ci
      - sast-scanner
      - dependency-scanning
      - change-management
  secops:
    prose: |
      **Monitoramento e operacao segura dos sistemas TIC aeroportuarios:**
      1. Integrar logs de todos os sistemas TIC criticos ao SIEM com regras de
         correlacao especificas para deteccao de ataques a sistemas aeroportuarios
         (ex: acesso administrativo nao autorizado, alteracoes de configuracao,
         exfiltracao de dados operacionais).
      2. Implementar monitoramento de disponibilidade com SLA definido para
         cada sistema TIC critico, com escalacao automatica para operacoes e
         TIC em caso de indisponibilidade.
      3. Conduzir revisao semestral de contas e privilegios em todos os sistemas
         TIC criticos, com recertificacao formal de acessos privilegiados.
      4. Manter lista atualizada de fornecedores com acesso remoto a sistemas
         TIC criticos e monitorar todas as sessoes de acesso remoto de terceiros.
      5. Implementar deteccao de anomalias de rede para identificar trafego
         suspeito entre zonas de seguranca da rede aeroportuaria.
    tools:
      - siem
      - network-monitoring
      - privileged-access-management
      - third-party-access-monitoring
