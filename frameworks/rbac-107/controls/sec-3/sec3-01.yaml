id: sec3-01
family: sec-3
title: "Deteccao e Notificacao de Incidentes Ciberneticos a ANAC"
class: RBAC-107
baselines: [aerodrome-operators]
statement:
  prose: |
    O operador de aeródromo deve estabelecer capacidade de detecção de incidentes
    cibernéticos nos sistemas TIC críticos do aeródromo e procedimento formal de
    notificação à ANAC conforme prazos e critérios definidos pela agência.

    O procedimento de notificação deve:
    I - definir critérios claros para classificação de incidentes cibernéticos
        por nível de severidade e impacto nas operações aeroportuárias;
    II - estabelecer prazo de notificação inicial à ANAC de até 4 (quatro) horas
         após a confirmação de incidente cibernético que afete sistemas TIC
         críticos com potencial impacto em operações de voo ou segurança AVSEC;
    III - incluir procedimento de notificação complementar com detalhamento do
          incidente, sistemas afetados e medidas de mitigação adotadas, em
          prazo definido pela ANAC;
    IV - prever notificação ao CTIR.aer (Centro de Tratamento de Incidentes de
         Redes de Computadores da Aeronáutica) para incidentes que envolvam
         redes ou sistemas de interesse da defesa aérea;
    V - documentar todos os incidentes cibernéticos em registro formal com
        evidências preservadas para análise forense e auditoria.
guidance:
  prose: |
    A notificacao tempestiva de incidentes ciberneticos a ANAC e fundamental
    para coordenacao da resposta setorial e para que a agencia possa alertar
    outros operadores sobre ameacas comuns.

    **Criterios de notificacao obrigatoria:**
    Devem ser notificados a ANAC, no minimo, os seguintes tipos de incidentes:
    - Ransomware em qualquer sistema TIC critico do aerodromo
    - Comprometimento de sistemas de controle de acesso ou CFTV
    - Interrupcao de sistemas de check-in por causa cibernetica
    - Acesso nao autorizado a redes de sistemas criticos de voo
    - Vazamento de dados de passageiros ou dados operacionais sensiveis
    - Qualquer incidente cibernetico que resulte em interrupcao de operacoes
      aeroportuarias por mais de 30 minutos

    **Preservacao de evidencias:**
    Antes de qualquer acao de remediation, o operador deve garantir a preservacao
    de evidencias forenses (logs, imagens de disco, capturas de trafego de rede)
    para suportar a investigacao do incidente e eventual acao legal.

    **Articulacao com CTIR.aer:**
    O Centro de Tratamento de Incidentes de Redes da Aeronautica pode ser
    acionado para incidentes que envolvam sistemas de comunicacao aeronautica
    ou que possam ter implicacoes para a defesa nacional.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de deteccao e resposta a incidentes ciberneticos:**
      1. Implementar SIEM centralizado com cobertura de todos os sistemas TIC
         criticos do aerodromo, com retencao de logs minima de 12 meses para
         suporte a investigacoes forenses.
      2. Configurar playbooks automatizados de resposta a incidentes (SOAR)
         para os cenarios mais criticos (ransomware, acesso nao autorizado a
         ACS/CFTV), reduzindo o tempo de deteccao e contencao.
      3. Implementar sistema de ticket de incidentes integrado ao fluxo de
         notificacao a ANAC, com campos padronizados para registro das informacoes
         exigidas pela agencia nos relatorios de incidente.
      4. Garantir alta disponibilidade do SIEM e dos sistemas de monitoramento,
         com failover automatico, para que a capacidade de deteccao nao seja
         perdida durante incidentes que afetem a infraestrutura do aerodromo.
      5. Implementar coleta de logs imutavel (write-once) para garantir integridade
         das evidencias forenses e cadeia de custodia em investigacoes.
    tools:
      - siem
      - soar-platform
      - incident-management
      - log-management
  devsecops:
    prose: |
      **Integracao de deteccao de incidentes no ciclo de desenvolvimento:**
      1. Incluir metricas de deteccao de incidentes (MTTD, MTTR) como KPIs
         do pipeline de operacoes de seguranca, com alertas automaticos
         para degradacao dos indicadores.
      2. Implementar testes automatizados de alertas criticos do SIEM para
         garantir que as regras de deteccao estao funcionando corretamente
         e nao foram desativadas inadvertidamente.
      3. Versionar e revisar regras de deteccao do SIEM como codigo (detection-as-code),
         com processo de aprovacao formal antes de alteracoes em producao.
      4. Incluir procedimentos de notificacao a ANAC na documentacao do runbook
         de resposta a incidentes, acessivel pela equipe de plantao 24x7.
      5. Automatizar coleta e empacotamento de evidencias forenses como parte
         do playbook de resposta inicial, reduzindo risco de perda de evidencias.
    tools:
      - detection-as-code
      - runbook-automation
      - forensic-collection
  secops:
    prose: |
      **Operacao do processo de notificacao e resposta a incidentes:**
      1. Estabelecer plantao 24x7 para monitoramento de alertas criticos do SIEM,
         com escalacao clara para o responsavel pelo Plano de Seguranca Cibernetica
         e para a diretoria do aerodromo em casos de incidentes de alta severidade.
      2. Definir e treinar o time de resposta a incidentes ciberneticos (CIRT),
         com papeis claros para cada membro e contatos atualizados das autoridades
         de notificacao (ANAC, CTIR.aer, Policia Federal).
      3. Manter template padronizado de notificacao a ANAC com todos os campos
         exigidos, pre-preenchido com informacoes do aerodromo, para agilizar
         o processo durante a pressao de um incidente ativo.
      4. Conduzir simulacoes de notificacao a ANAC (exercicios tabletop) para
         treinar a equipe nos procedimentos e verificar que os canais de
         comunicacao com a agencia estao funcionando.
      5. Realizar analise pos-incidente (post-mortem) documentada apos cada
         incidente relevante, com licoes aprendidas e acoes de melhoria
         rastreadas no sistema de gestao de incidentes.
    tools:
      - soc-platform
      - incident-response-platform
      - communication-system
      - post-incident-management
