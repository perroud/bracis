id: sec3-02
family: sec-3
title: "Resposta a Incidentes Ciberneticos em Sistemas Aeroportuarios Criticos"
class: RBAC-107
baselines: [aerodrome-operators]
statement:
  prose: |
    O operador de aeródromo deve desenvolver, manter e testar planos de resposta
    a incidentes cibernéticos específicos para os sistemas TIC críticos do
    aeródromo, integrados ao plano de resposta a emergências aeroportuárias.

    O plano de resposta a incidentes cibernéticos deve:
    I - definir procedimentos específicos de contenção, erradicação e recuperação
        para cada categoria de sistema TIC crítico (check-in, CFTV, ACS,
        comunicações, sistemas de inspeção);
    II - estabelecer procedimentos operacionais alternativos (fallback) para
         manutenção das operações aeroportuárias durante indisponibilidade
         cibernética de sistemas críticos;
    III - definir papéis, responsabilidades e cadeia de decisão para ativação
          dos procedimentos de resposta, incluindo comunicação com companhias
          aéreas, ANAC, DECEA e autoridades de segurança;
    IV - incluir critérios e procedimentos para ativação de procedimentos
         manuais de segurança física AVSEC em caso de comprometimento dos
         sistemas digitais de controle de acesso ou CFTV;
    V - ser testado por meio de exercícios simulados com frequência mínima anual
        e atualizado com base nos resultados dos exercícios e em incidentes ocorridos.
guidance:
  prose: |
    A resposta a incidentes ciberneticos em aerodromos tem dimensao operacional
    critica que vai alem do dominio da TI tradicional: a falha de sistemas
    aeroportuarios pode ter impacto direto na seguranca das operacoes de voo.

    **Procedimentos operacionais alternativos:**
    Para cada sistema TIC critico, deve existir um procedimento manual ou
    alternativo que permita a operacao aeroportuaria continuar de forma segura.
    Exemplos:
    - Check-in manual com verificacao de documentos e listas em papel
    - Controle de acesso manual com guarda armado em pontos criticos
    - Inspecao de seguranca com verificacao dobrada de metodos manuais
    - Comunicacao por radio analogico como backup de sistemas digitais

    **Coordenacao com partes externas:**
    A resposta a um incidente cibernetico grave em aerodromo requer coordenacao
    com multiplas partes: companhias aereas operando no aeroporto, ANAC, DECEA,
    Policia Federal (agencia nacional de seguranca aeroportuaria no Brasil),
    fornecedores de tecnologia e eventualmente forcas de seguranca.

    **Classificacao de incidentes:**
    A classificacao rapida e correta da severidade do incidente determina
    o nivel de resposta ativado e os procedimentos de comunicacao a seguir.
    O plano deve incluir criterios claros e exemplos para cada nivel de severidade.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de recuperacao para sistemas aeroportuarios:**
      1. Implementar arquitetura de alta disponibilidade (HA) para sistemas TIC
         criticos com failover automatico, garantindo que a perda de um componente
         nao resulte em indisponibilidade total do sistema.
      2. Manter snapshots imutaveis e backups offsite de configuracoes e dados
         criticos de todos os sistemas TIC criticos, com teste de restauracao
         trimestral documentado.
      3. Implementar ambientes de DR (Disaster Recovery) para sistemas de check-in
         e ACS, com RTO (Recovery Time Objective) e RPO (Recovery Point Objective)
         definidos e testados regularmente.
      4. Manter imagens de recuperacao (golden images) atualizadas e pre-validadas
         para servidores dos sistemas criticos, acelerando o processo de rebuild
         em caso de comprometimento por ransomware ou outro malware.
      5. Documentar e testar procedimento de isolamento emergencial de rede
         (network kill switch) para isolar sistemas comprometidos sem afetar
         sistemas criticos independentes.
    tools:
      - backup-solution
      - disaster-recovery
      - high-availability
      - network-isolation
  devsecops:
    prose: |
      **Automacao de resposta a incidentes:**
      1. Implementar playbooks automatizados de resposta (SOAR) para os cenarios
         mais criticos, reduzindo o tempo de resposta e eliminando erros humanos
         em procedimentos de contencao de urgencia.
      2. Versionar e testar playbooks de resposta a incidentes como codigo,
         com simulacoes periodicas em ambiente de teste (chaos engineering).
      3. Automatizar coleta de evidencias forenses (logs, snapshots de memoria,
         capturas de trafego) como primeira acao nos playbooks de resposta,
         antes de qualquer acao de contencao que possa destruir evidencias.
      4. Implementar runbooks documentados e acessiveis offline para procedimentos
         criticos de resposta (em caso de o ambiente de TI estar comprometido).
      5. Integrar o sistema de gestao de incidentes ao pipeline CI/CD para
         rastreamento de patches e correcoes aplicados como remediation de incidentes.
    tools:
      - soar-platform
      - runbook-automation
      - forensic-automation
      - incident-tracking
  secops:
    prose: |
      **Operacao de resposta a incidentes aeroportuarios:**
      1. Manter plano de comunicacao de crise cibernetica com contatos atualizados
         de todas as partes relevantes (ANAC, DECEA, Policia Federal, companhias
         aereas, fornecedores de TIC) com procedimentos de ativacao 24x7.
      2. Conduzir exercicio de resposta a incidentes ciberneticos (tabletop exercise)
         anual envolvendo equipes de TIC, AVSEC, operacoes aeroportuarias, comunicacao
         e lideranca, com cenarios realistas baseados em incidentes do setor.
      3. Estabelecer procedimento especifico de transicao para operacao manual
         AVSEC em caso de comprometimento de sistemas digitais criticos, com
         treinamento periodico das equipes de seguranca fisica e operacoes.
      4. Definir criterios de declaracao de "incidente critico aeroportuario"
         de origem cibernetica, que ative o protocolo de notificacao a ANAC
         e o plano de comunicacao de crise.
      5. Realizar analise pos-incidente estruturada (post-mortem blameless) apos
         cada incidente e exercicio, com registro de acoes de melhoria e
         prazo de implementacao rastreado.
    tools:
      - incident-response-platform
      - crisis-communication
      - tabletop-platform
      - post-incident-management
