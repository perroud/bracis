id: sec1-01
family: sec-1
title: "Obrigacao de Implementacao de AVSEC Cibernetica pelo Operador de Aerodromo"
class: RBAC-107
baselines: [aerodrome-operators]
statement:
  prose: |
    O operador de aeródromo é obrigado a implementar medidas de segurança cibernética
    (AVSEC cibernética) para proteger os sistemas de tecnologia da informação e comunicação
    (TIC) que suportam as operações aeroportuárias contra atos de interferência ilícita.

    O Plano de Segurança Cibernética deve ser integrado ao Programa de Segurança
    Aeroportuária contra Atos de Interferência Ilícita (PSAC) e aprovado pela ANAC.

    São considerados sistemas críticos sujeitos ao escopo da AVSEC cibernética:
    I - sistemas de check-in e embarque de passageiros;
    II - sistemas de controle de acesso físico a áreas restritas do aeródromo;
    III - sistemas de circuito fechado de televisão (CFTV);
    IV - sistemas de comunicações aeronáuticas terra-ar e terra-terra;
    V - sistemas de navegação e aproximação;
    VI - redes de automação predial e utilidades aeroportuárias críticas.
guidance:
  prose: |
    Este controle estabelece a obrigacao fundamental do operador de aerodromo de
    implementar AVSEC cibernetica como componente indissociavel do programa geral
    de seguranca aeroportuaria.

    **Alinhamento com ICAO:**
    O RBAC 107 implementa as disposicoes do Anexo 17 da ICAO (Seguranca da Aviacao
    Civil) e do Doc 8973 (Manual de Seguranca da Aviacao), que passaram a exigir
    que os Estados membros abordem as ameacas ciberneticas como vetor de interferencia
    ilicita na aviacao civil.

    **Escopo dos sistemas criticos:**
    A identificacao dos sistemas TIC criticos e o ponto de partida para qualquer
    programa de AVSEC cibernetica. O operador deve mapear todos os sistemas que,
    se comprometidos, podem afetar a seguranca das operacoes de voo ou a integridade
    da area de seguranca aeroportuaria.

    **Integracao ao PSAC:**
    O Plano de Seguranca Cibernetica nao e um documento separado e sim um capitulo
    ou apendice do PSAC existente. Essa integracao garante que as ameacas ciberneticas
    sejam tratadas com o mesmo rigor e governanca que as ameacas fisicas tradicionais.
implementation_guidance:
  platform_engineering:
    prose: |
      **Inventario e classificacao de sistemas TIC criticos do aerodromo:**
      1. Implementar CMDB (Configuration Management Database) especifica para ativos
         TIC do aerodromo, com classificacao por criticidade operacional e de seguranca.
      2. Mapear dependencias entre sistemas: check-in, DCS (Departure Control System),
         CUTE/CUSS, FIDS (Flight Information Display System), BHS (Baggage Handling
         System), CFTV, ACS (Access Control System) e redes de comunicacao.
      3. Segmentar redes aeroportuarias em zonas de seguranca (OT/IT), isolando sistemas
         de controle operacional (SCADA, OT) dos sistemas de TI corporativos.
      4. Implementar inventario continuo com varredura automatizada para detectar
         dispositivos nao autorizados conectados as redes aeroportuarias.
      5. Documentar topologia de rede e fluxos de dados entre sistemas criticos como
         insumo para o Plano de Seguranca Cibernetica integrado ao PSAC.
    tools:
      - cmdb
      - network-segmentation
      - asset-discovery
      - ot-it-segmentation
  devsecops:
    prose: |
      **Pipeline seguro para sistemas aeroportuarios:**
      1. Estabelecer pipeline CI/CD dedicado para sistemas criticos do aerodromo com
         SAST obrigatorio antes de qualquer deploy em producao.
      2. Implementar SBOM (Software Bill of Materials) para todos os sistemas TIC
         criticos, com rastreabilidade de componentes e dependencias.
      3. Exigir security review formal com aprovacao de dois responsaveis para
         alteracoes em sistemas de check-in, CFTV e controle de acesso.
      4. Manter repositorio versionado de configuracoes de todos os sistemas criticos,
         com auditoria automatica de desvios de baseline (configuration drift).
      5. Integrar validacao automatica de conformidade com requisitos RBAC-107 no
         pipeline, bloqueando deploys que violem politicas de seguranca.
    tools:
      - gitlab-ci
      - sast-scanner
      - sbom-generator
      - configuration-management
  secops:
    prose: |
      **Operacao de seguranca cibernetica aeroportuaria:**
      1. Estabelecer SOC aeroportuario (ou contratar MSSP especializado) com
         capacidade de monitoramento 24x7 dos sistemas TIC criticos do aerodromo.
      2. Definir responsavel formal pelo Plano de Seguranca Cibernetica, com linha
         direta de reporte ao responsavel pelo PSAC e a diretoria do aerodromo.
      3. Implementar monitoramento de integridade de sistemas criticos com alertas
         em tempo real para desvios de configuracao ou comportamento anomalo.
      4. Manter registro atualizado de todos os sistemas TIC criticos com status
         de conformidade com os requisitos do RBAC 107.
      5. Conduzir revisao anual do Plano de Seguranca Cibernetica e submeter
         atualizacoes a ANAC conforme exigido pelo PSAC.
    tools:
      - soc-platform
      - siem
      - integrity-monitoring
      - asset-inventory
