id: sec1-02
family: sec-1
title: "Avaliacao de Riscos Ciberneticos em Infraestrutura Aeroportuaria"
class: RBAC-107
baselines: [aerodrome-operators]
statement:
  prose: |
    O operador de aeródromo deve conduzir avaliação periódica de riscos cibernéticos
    abrangendo todos os sistemas TIC críticos identificados no escopo do Plano de
    Segurança Cibernética, conforme metodologia aprovada pela ANAC.

    A avaliação de riscos deve:
    I - identificar ameaças cibernéticas específicas ao ambiente aeroportuário,
        incluindo vetores de ataque contra sistemas de check-in, CFTV, controle
        de acesso e comunicações aeronáuticas;
    II - avaliar vulnerabilidades técnicas e organizacionais dos sistemas TIC críticos;
    III - estimar o impacto potencial de incidentes cibernéticos nas operações de
         voo e na segurança dos passageiros;
    IV - definir medidas de mitigação priorizadas por nível de risco;
    V - ser revisada após incidentes significativos ou mudanças relevantes na
        infraestrutura tecnológica do aeródromo.

    A avaliação de riscos deve ser documentada e mantida disponível para auditoria
    pela ANAC e pelas autoridades de segurança aeronáutica competentes.
guidance:
  prose: |
    A avaliacao de riscos ciberneticos em aerodromos tem especificidades que a
    diferenciam de processos corporativos tradicionais de gestao de riscos.

    **Ameacas especificas ao ambiente aeroportuario:**
    O setor de aviacao e alvo de ameacas especificas, incluindo:
    - Ataques de ransomware a sistemas de check-in que paralisam operacoes
    - Comprometimento de sistemas de controle de acesso permitindo acesso nao
      autorizado a areas de seguranca restrita
    - Interferencia em sistemas de comunicacao aeronautica (falsificacao de mensagens)
    - Ataques a sistemas CFTV comprometendo vigilancia de areas criticas
    - Ataques a cadeia de suprimentos de fornecedores de tecnologia aeroportuaria

    **Integracao com gestao de ameacas AVSEC:**
    A avaliacao de riscos ciberneticos deve ser coordenada com a avaliacao de
    ameacas fisicas do PSAC, pois ataques ciberneticos podem ser usados como
    vetor para facilitar atos fisicos de interferencia ilicita.

    **Frequencia:**
    Recomenda-se avaliacao completa anual e avaliacoes parciais apos incidentes,
    mudancas significativas de infraestrutura ou alertas de ameacas emitidos
    pela ANAC ou por organismos internacionais de aviacao (ICAO, IATA).
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de gestao de riscos ciberneticos aeroportuarios:**
      1. Implementar plataforma de Cyber Risk Management integrada ao CMDB do
         aerodromo, com modelos de ameacas especificos para sistemas aeroportuarios
         (MITRE ATT&CK for ICS para sistemas OT/SCADA; MITRE ATT&CK Enterprise
         para sistemas de TI aeroportuarios).
      2. Automatizar varredura de vulnerabilidades nos sistemas TIC criticos com
         correlacao automatica ao catalogo de ameacas aeroportuarias.
      3. Implementar modelagem de ameacas (threat modeling) para novos sistemas
         antes da integracao ao ambiente de producao do aerodromo.
      4. Manter base de conhecimento de ameacas especificas ao setor de aviacao
         (feeds ISAC de aviacao, alertas ANAC, ICAO AVSEC alerts).
      5. Integrar resultados da avaliacao de riscos a plataforma de compliance
         para rastreamento de status das medidas de mitigacao.
    tools:
      - risk-management-platform
      - vulnerability-scanner
      - threat-modeling-tool
      - mitre-attack-navigator
  devsecops:
    prose: |
      **Integracao de avaliacao de riscos no ciclo de desenvolvimento:**
      1. Exigir Threat Modeling como gate obrigatorio antes do inicio do
         desenvolvimento de novos sistemas ou integracao de fornecedores TIC.
      2. Implementar DAST (Dynamic Application Security Testing) em sistemas
         web aeroportuarios (portais de check-in online, sistemas de gestao).
      3. Dependency scanning automatico para identificar vulnerabilidades conhecidas
         em componentes de terceiros usados nos sistemas aeroportuarios.
      4. Exigir penetration testing periodico (minimo anual) dos sistemas TIC
         criticos como parte da avaliacao de riscos.
      5. Rastrear remediation de vulnerabilidades identificadas com SLA definido
         por criticidade no pipeline de gestao de riscos.
    tools:
      - dast-scanner
      - dependency-scanning
      - pentest-orchestration
      - vulnerability-tracking
  secops:
    prose: |
      **Operacao de inteligencia de ameacas aeroportuarias:**
      1. Subscrever feeds de threat intelligence especificos ao setor de aviacao
         (A-ISAC - Aviation Information Sharing and Analysis Center) e integrar
         ao SIEM do aerodromo.
      2. Monitorar alertas da ANAC e do CSIRT do Ministerio da Infraestrutura
         sobre ameacas ciberneticas ao setor de aviacao.
      3. Conduzir exercicios de simulacao (tabletop exercises) com equipes de
         AVSEC e TIC para testar cenarios de ataques ciberneticos a sistemas criticos.
      4. Manter registro estruturado de todas as vulnerabilidades identificadas,
         medidas de mitigacao adotadas e status de remediation para auditoria ANAC.
      5. Documentar licoes aprendidas de incidentes setoriais (mesmo em outros
         aerodromos) para atualizar continuamente a avaliacao de riscos.
    tools:
      - threat-intelligence-platform
      - siem
      - tabletop-exercise-platform
      - vulnerability-register
