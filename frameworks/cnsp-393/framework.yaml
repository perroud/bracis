control_families:
  - id: infracoes
    title: "Tipificação de Infrações Administrativas"
    description: "Classification and typification of administrative infractions applicable to SUSEP-supervised entities, including severity levels and qualifying circumstances"
    articles: "art. 1 ao art. 10"
    control_count: 4
  - id: penalidades
    title: "Dosimetria e Penalidades"
    description: "Penalty framework and dosimetry criteria for administrative sanctions, including fines, suspensions, disqualifications, and license revocations"
    articles: "art. 11 ao art. 22"
    control_count: 4
  - id: processo
    title: "Processo Administrativo Sancionador"
    description: "Administrative sanctioning process, including investigation procedures, right of defense, appeals, and settlement agreements (termos de compromisso)"
    articles: "art. 23 ao art. 35"
    control_count: 4
  - id: compliance
    title: "Obrigações de Compliance e Controles Internos"
    description: "Compliance obligations and internal control requirements that SUSEP-supervised entities must maintain to avoid administrative sanctions"
    articles: "art. 36 ao art. 45"
    control_count: 4
  - id: responsabilidade
    title: "Responsabilidade de Administradores e Controladores"
    description: "Accountability framework for directors, officers, and controlling shareholders of supervised entities, including personal liability and disqualification criteria"
    articles: "art. 46 ao art. 55"
    control_count: 4
related_frameworks:
  - framework_id: susep-638
    relationship: complements
    description: >-
      A Circular SUSEP 638/2021 complementa a CNSP 393/2020 ao detalhar os requisitos
      de segurança cibernética cujo descumprimento configura infração administrativa
      passível das sanções previstas nesta resolução.
  - framework_id: cnsp-381
    relationship: complements
    description: "A CNSP 381/2020 (política de segurança cibernética) estabelece obrigações cujo descumprimento configura infrações sujeitas ao regime sancionatório da CNSP 393/2020."
  - framework_id: cnsp-416
    relationship: complements
    description: "A CNSP 416 complementa a CNSP 393 ao estabelecer requisitos de governança e gestão de riscos cujo descumprimento pode gerar sanções administrativas."
  - framework_id: susep-612
    relationship: complements
    description: "A Circular SUSEP 612/2020 detalha requisitos operacionais para seguradoras cujo descumprimento configura infrações sob o regime da CNSP 393/2020."
  - framework_id: lgpd
    relationship: complements
    description: "A LGPD complementa a CNSP 393/2020 ao estabelecer obrigações de proteção de dados pessoais cujo descumprimento pode configurar infração administrativa adicional."
