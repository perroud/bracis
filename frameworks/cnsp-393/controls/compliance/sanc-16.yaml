id: sanc-16
family: compliance
title: "Internal Audit and Independent Assessment"
class: CNSP-393
baselines: [supervisionadas-susep]
statement:
  prose: |
    A efetividade dos controles internos e do programa de compliance deverá ser
    objeto de avaliação periódica, observando-se:

    I — a auditoria interna deverá ser exercida por área independente, com
    reporte direto ao conselho de administração ou, na sua ausência, ao
    órgão máximo de deliberação da supervisionada;

    II — a auditoria interna deverá avaliar, no mínimo anualmente, a adequação
    e a efetividade dos controles internos, dos processos de gestão de riscos
    e do programa de compliance;

    III — os resultados da auditoria interna deverão ser documentados em
    relatórios formais, com recomendações e prazos para implementação de
    ações corretivas;

    IV — a supervisionada deverá manter auditor independente, devidamente
    registrado na CVM, para emissão de parecer sobre as demonstrações
    financeiras e sobre a adequação dos controles internos;

    V — a SUSEP poderá determinar a realização de auditoria especial, às
    expensas da supervisionada, quando identificar indícios de irregularidades
    ou insuficiência dos controles internos.
guidance:
  prose: |
    This control mandates periodic independent assessment of compliance program
    effectiveness, combining internal and external audit requirements.

    **Internal audit requirements:**
    - Must be an independent function with direct board reporting
    - Annual minimum assessment of internal controls, risk management, and compliance
    - Formal reports with recommendations and remediation timelines

    **External audit requirements:**
    - CVM-registered independent auditor
    - Opinion on financial statements and internal control adequacy

    **SUSEP special audit:**
    SUSEP can order a special audit at the entity's expense when it suspects
    irregularities or inadequate controls. This is a precursor to formal proceedings
    and signals elevated regulatory risk.

    **Technology audit scope:**
    Both internal and external audits increasingly cover technology controls:
    cybersecurity posture, data integrity, system availability, access controls,
    and IT governance. Technology teams should maintain audit-ready evidence and
    participate in audit planning to ensure technology risks are properly assessed.
implementation_guidance:
  platform_engineering:
    prose: |
      **Audit-ready infrastructure:**
      1. Implement automated control testing capabilities that internal
         auditors can leverage for continuous control monitoring.
      2. Deploy audit evidence dashboards with pre-built reports covering
         common audit scope areas (access controls, change management,
         availability, data integrity).
      3. Maintain automated compliance scanning that produces audit-grade
         evidence of control effectiveness.
      4. Build self-assessment tools that technology teams can run before
         formal audits to identify and remediate gaps proactively.
    tools:
      - compliance-scanning
      - audit-dashboards
      - control-testing
      - self-assessment
  devsecops:
    prose: |
      **Development audit support:**
      1. Generate automated reports from CI/CD pipeline data covering
         code quality, security scanning results, and deployment practices.
      2. Maintain audit-accessible records of all code review decisions,
         approval chains, and deployment authorizations.
      3. Implement audit trail exports that provide complete development
         lifecycle visibility for specific systems or time periods.
      4. Build automated compliance attestation for development practices
         that auditors can verify independently.
    tools:
      - gitlab-ci
      - audit-reports
      - compliance-attestation
      - development-metrics
  secops:
    prose: |
      **Audit program governance:**
      1. Maintain an annual internal audit plan approved by the board
         with technology control assessment as a standing scope item.
      2. Coordinate with external auditors on technology control scope
         and evidence requirements well in advance of audit periods.
      3. Track audit findings and remediation progress with board-level
         reporting on outstanding items.
      4. Prepare SUSEP special audit response playbooks with designated
         personnel and evidence preparation procedures.
    tools:
      - audit-management
      - finding-tracker
      - grc-platform
      - board-reporting
