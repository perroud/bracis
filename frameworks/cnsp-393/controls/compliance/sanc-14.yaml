id: sanc-14
family: compliance
title: "Transparency and Disclosure Obligations"
class: CNSP-393
baselines: [supervisionadas-susep]
statement:
  prose: |
    As supervisionadas deverão assegurar a transparência e a prestação de informações
    adequadas aos segurados, participantes, beneficiários e ao mercado, incluindo:

    I — disponibilização de informações claras, completas e tempestivas sobre produtos,
    serviços, coberturas, exclusões, carências e condições contratuais;

    II — publicação de demonstrações financeiras auditadas e relatórios de gestão de
    riscos nos prazos e formatos definidos pela SUSEP;

    III — divulgação de informações sobre a estrutura de governança corporativa,
    incluindo a composição dos órgãos de administração e fiscalização;

    IV — comunicação tempestiva de fatos relevantes que possam afetar a decisão de
    segurados, participantes e beneficiários ou a percepção do mercado sobre a
    situação da supervisionada;

    V — manutenção de canal de atendimento efetivo para esclarecimento de dúvidas
    e recebimento de reclamações, com registro e acompanhamento das manifestações.
guidance:
  prose: |
    This control mandates comprehensive transparency obligations toward policyholders,
    participants, beneficiaries, and the market. Failure to comply constitutes an
    administrative infraction under the severity classification framework.

    **Transparency requirements:**
    1. Clear, complete, timely information about products and contractual conditions
    2. Audited financial statements and risk management reports
    3. Corporate governance structure disclosure
    4. Material fact communication
    5. Effective customer service with complaint tracking

    **Technology-specific transparency obligations:**
    Digital channels (websites, apps, portals) must display required disclosures
    accurately and completely. Automated product configuration systems must ensure
    that contractual terms presented to customers match filed conditions. Data
    integrity in customer-facing systems is a regulatory compliance matter.

    **Infraction exposure:**
    Transparency failures can range from light (documentation format issues) to
    serious (material misrepresentation of product terms) depending on the impact
    to policyholders and market confidence.
implementation_guidance:
  platform_engineering:
    prose: |
      **Transparency infrastructure:**
      1. Implement content management systems with regulatory approval
         workflows ensuring all customer-facing content is reviewed and
         compliant before publication.
      2. Deploy automated consistency checks between product configuration
         systems and customer-facing disclosures.
      3. Implement financial reporting data pipelines with automated
         validation and format compliance for SUSEP submissions.
      4. Maintain customer service platforms with full interaction logging,
         SLA tracking, and regulatory reporting capabilities.
    tools:
      - cms
      - data-validation
      - reporting-pipelines
      - customer-service-platform
  devsecops:
    prose: |
      **Transparency compliance in development:**
      1. Implement automated testing of customer-facing disclosures to verify
         completeness and accuracy of required information.
      2. Build pipeline checks that validate product configuration changes
         against regulatory disclosure requirements.
      3. Implement content integrity verification in CI/CD pipelines to
         detect unauthorized or inconsistent customer-facing changes.
      4. Maintain automated accessibility testing ensuring disclosures are
         available to all customer segments.
    tools:
      - automated-testing
      - content-validation
      - gitlab-ci
      - accessibility-testing
  secops:
    prose: |
      **Transparency governance program:**
      1. Maintain a disclosure compliance matrix mapping all SUSEP-required
         disclosures to their publication channels and update frequencies.
      2. Conduct periodic mystery shopping exercises to verify customer-facing
         information accuracy and completeness.
      3. Monitor customer complaints for patterns indicating transparency
         failures requiring corrective action.
      4. Maintain evidence of timely material fact communication with
         timestamps and distribution records.
    tools:
      - grc-platform
      - complaints-management
      - disclosure-tracking
      - evidence-management
