id: sanc-13
family: compliance
title: "Mandatory Internal Controls and Compliance Programs"
class: CNSP-393
baselines: [supervisionadas-susep]
statement:
  prose: |
    As supervisionadas deverão manter estrutura de controles internos e programa
    de compliance adequados à natureza, porte e complexidade de suas operações,
    contemplando, no mínimo:

    I — políticas e procedimentos escritos e atualizados para todas as áreas de
    atuação da supervisionada;

    II — segregação de funções entre as áreas de negócio, gestão de riscos,
    compliance e auditoria interna;

    III — canais de comunicação efetivos para reporte de irregularidades, incluindo
    canal de denúncias anônimo;

    IV — programa de treinamento e capacitação periódico para colaboradores e
    administradores sobre obrigações regulamentares e conduta ética;

    V — monitoramento contínuo da conformidade regulatória com identificação
    tempestiva de desvios e planos de ação corretiva;

    VI — avaliação periódica da efetividade dos controles internos por área
    independente de auditoria interna ou auditoria externa.
guidance:
  prose: |
    This control mandates the minimum compliance infrastructure that SUSEP-supervised
    entities must maintain. The existence and effectiveness of these controls is a
    mitigating factor during penalty dosimetry (see sanc-3).

    **Required compliance components:**
    1. Written, updated policies and procedures for all operational areas
    2. Segregation of duties across business, risk, compliance, and audit functions
    3. Effective communication channels including anonymous whistleblower hotline
    4. Periodic training on regulatory obligations and ethical conduct
    5. Continuous regulatory compliance monitoring with timely deviation detection
    6. Periodic effectiveness assessment by independent audit

    **"Adequate to nature, size, and complexity":**
    The proportionality principle means that larger entities with more complex
    operations must have more sophisticated compliance programs. A large insurer
    needs dedicated compliance technology; a small capitalização company may use
    simpler controls.

    **Technology's role in demonstrating compliance effectiveness:**
    Automated monitoring, real-time dashboards, and continuous compliance scanning
    provide the strongest evidence of program effectiveness. Manual, periodic
    assessments alone are increasingly insufficient for larger entities.
implementation_guidance:
  platform_engineering:
    prose: |
      **Compliance infrastructure platform:**
      1. Deploy policy-as-code frameworks that enforce documented policies
         through automated technical controls rather than manual processes.
      2. Implement RBAC and segregation of duties controls at the
         infrastructure layer, preventing conflicting role assignments.
      3. Deploy a centralized compliance monitoring platform that
         aggregates control status across all technology systems.
      4. Implement automated compliance deviation detection with
         real-time alerting and automated corrective action workflows.
    tools:
      - opa-gatekeeper
      - rbac
      - compliance-platform
      - policy-as-code
  devsecops:
    prose: |
      **Compliance-integrated development lifecycle:**
      1. Implement compliance checks as mandatory pipeline stages that
         enforce policies before code reaches production.
      2. Enforce segregation of duties through merge request approval
         rules requiring separate authors and reviewers.
      3. Integrate compliance training verification into developer
         onboarding workflows — block production access until training
         is complete.
      4. Implement automated control effectiveness metrics derived from
         pipeline data (scan pass rates, review coverage, deployment
         success rates).
    tools:
      - gitlab-ci
      - compliance-pipeline
      - training-management
      - metrics-dashboard
  secops:
    prose: |
      **Compliance program governance:**
      1. Maintain a compliance program charter with board approval,
         resource allocation, and performance KPIs.
      2. Operate an anonymous whistleblower channel with independent
         investigation protocols and non-retaliation guarantees.
      3. Conduct annual compliance program effectiveness assessments
         with findings reported to the board and remediation tracked.
      4. Maintain regulatory training records with completion rates,
         assessment scores, and remedial training for non-compliant staff.
      5. Produce quarterly compliance monitoring reports with deviation
         trends, remediation status, and risk exposure assessments.
    tools:
      - grc-platform
      - whistleblower-platform
      - training-lms
      - compliance-dashboard
