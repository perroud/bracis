id: sanc-15
family: compliance
title: "Record-Keeping and Documentation Requirements"
class: CNSP-393
baselines: [supervisionadas-susep]
statement:
  prose: |
    As supervisionadas deverão manter registros e documentação adequados para fins
    de fiscalização pela SUSEP, observando:

    I — manutenção de registros contábeis, atuariais e operacionais completos,
    fidedignos e atualizados, em conformidade com as normas expedidas pela SUSEP;

    II — preservação de toda documentação relativa a contratos de seguro, previdência,
    capitalização e resseguro pelo prazo mínimo de 5 (cinco) anos após o término
    da vigência;

    III — manutenção de registros de comunicações com segurados, participantes e
    beneficiários, incluindo reclamações e manifestações;

    IV — guarda de documentos relativos às decisões dos órgãos de administração e
    fiscalização pelo prazo mínimo de 10 (dez) anos;

    V — adoção de sistemas de informação que garantam a integridade, disponibilidade
    e confidencialidade dos registros, com trilhas de auditoria e controles de acesso;

    VI — capacidade de produzir relatórios e informações solicitados pela SUSEP nos
    prazos estabelecidos.
guidance:
  prose: |
    This control specifies the record-keeping and documentation requirements that
    supervised entities must meet. Failure to maintain adequate records is itself
    an infraction and can also constitute obstruction of supervision (sanc-2).

    **Retention requirements:**
    - Accounting, actuarial, and operational records: complete and current
    - Insurance/pension/capitalization contracts: 5 years after expiry
    - Customer communications and complaints: throughout relationship + retention
    - Board and governance decisions: minimum 10 years
    - Must use information systems with integrity, availability, confidentiality
    - Must be able to produce SUSEP-requested reports on deadline

    **Technology system requirements (item V):**
    The regulation explicitly requires information systems with:
    - Integrity guarantees (data cannot be altered without detection)
    - Availability guarantees (data accessible when needed)
    - Confidentiality controls (appropriate access restrictions)
    - Audit trails (complete record of data access and modifications)
    - Access controls (role-based restrictions on record access)

    **Dual retention timelines:**
    The 5-year and 10-year retention periods create complex data lifecycle
    management requirements, especially for mixed datasets that contain both
    contract data and governance decision records.
implementation_guidance:
  platform_engineering:
    prose: |
      **Enterprise record management infrastructure:**
      1. Implement data classification systems that automatically tag records
         with the applicable retention period (5-year, 10-year, or longer).
      2. Deploy immutable storage for regulatory records with cryptographic
         integrity verification and automated retention enforcement.
      3. Build data lifecycle management pipelines that enforce retention
         policies and prevent premature deletion of regulated records.
      4. Implement comprehensive audit logging for all access to regulatory
         records, including read access, with tamper-proof log storage.
      5. Deploy backup and disaster recovery systems with verified
         restoration capabilities tested for data across all retention tiers.
    tools:
      - data-classification
      - immutable-storage
      - data-lifecycle
      - audit-logging
      - backup-dr
  devsecops:
    prose: |
      **Record integrity in development:**
      1. Implement database migration practices that preserve audit trail
         integrity when schema changes affect regulated record structures.
      2. Build automated tests verifying that data retention policies are
         correctly implemented and cannot be bypassed by application logic.
      3. Enforce code review requirements for any changes to data deletion,
         archival, or retention logic in regulated systems.
      4. Maintain development and staging environments with realistic
         data volumes to test report generation performance.
    tools:
      - database-migrations
      - automated-testing
      - code-review
      - performance-testing
  secops:
    prose: |
      **Record-keeping governance:**
      1. Maintain a master record retention schedule mapping all document
         types to their regulatory retention periods and responsible owners.
      2. Conduct annual record retention audits verifying compliance with
         5-year and 10-year requirements across all storage systems.
      3. Implement SUSEP report generation procedures with tested SLAs
         ensuring timely response to regulatory data requests.
      4. Maintain evidence of audit trail completeness and access control
         effectiveness for SUSEP inspection purposes.
    tools:
      - records-management
      - retention-audit
      - report-generation
      - grc-platform
