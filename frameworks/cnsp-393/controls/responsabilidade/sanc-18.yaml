id: sanc-18
family: responsabilidade
title: "Controlling Shareholder Accountability"
class: CNSP-393
baselines: [supervisionadas-susep]
statement:
  prose: |
    Os controladores das entidades supervisionadas respondem administrativamente
    quando:

    I — utilizarem a influência derivada de sua posição de controle para induzir
    administradores ou a própria supervisionada à prática de infrações
    administrativas;

    II — deixarem de exercer, com diligência, o poder de controle para impedir
    a prática de infrações pela supervisionada ou por seus administradores;

    III — atuarem em conflito de interesses com a supervisionada, em detrimento
    dos segurados, participantes, beneficiários ou do mercado;

    IV — concorrerem para a descapitalização da supervisionada ou para a
    insuficiência de provisões técnicas em prejuízo dos segurados, participantes
    e beneficiários;

    V — impedirem ou dificultarem a adoção, pela supervisionada, de medidas
    necessárias ao cumprimento das normas regulamentares ou das determinações
    da SUSEP.
guidance:
  prose: |
    This control extends administrative liability to controlling shareholders,
    preventing them from using their influence to cause or tolerate infractions
    while hiding behind the corporate structure.

    **Controlling shareholder liability triggers:**
    1. Using control influence to induce infractions
    2. Failure to exercise diligent oversight to prevent infractions
    3. Acting in conflict of interest against policyholders or market
    4. Contributing to undercapitalization or provision insufficiency
    5. Blocking the entity from complying with regulations or SUSEP orders

    **Technology governance relevance:**
    Controlling shareholders who underinvest in technology infrastructure,
    cybersecurity, or compliance systems — causing the entity to violate
    regulatory requirements — are directly liable. Budget decisions that
    prevent necessary technology investments are actionable under item V.

    **Practical implication:**
    Technology leaders who document that compliance failures stem from
    shareholder-imposed budget constraints are creating evidence that shifts
    liability from management to the controlling shareholder. Proper
    documentation of technology investment requests and denials is essential.
implementation_guidance:
  platform_engineering:
    prose: |
      **Technology investment documentation infrastructure:**
      1. Maintain formal technology investment request records with
         business justification linked to regulatory requirements.
      2. Implement budget tracking that correlates compliance spending
         with regulatory obligation coverage, identifying gaps.
      3. Deploy risk-based technology investment prioritization models
         that quantify regulatory exposure from deferred investments.
      4. Maintain evidence of technology resource constraints and their
         documented impact on regulatory compliance capabilities.
    tools:
      - investment-tracking
      - budget-management
      - risk-modeling
      - evidence-management
  devsecops:
    prose: |
      **Development resource constraint documentation:**
      1. Track technical debt metrics explicitly linked to regulatory
         compliance requirements, documenting resource-driven deferrals.
      2. Maintain records of security finding remediation delays caused
         by resource constraints with clear escalation trails.
      3. Document workarounds and compensating controls implemented due
         to budget limitations that prevent proper solutions.
      4. Generate periodic compliance gap reports attributing gaps to
         specific resource constraint decisions.
    tools:
      - technical-debt-tracking
      - issue-tracking
      - compliance-gap-reports
      - resource-planning
  secops:
    prose: |
      **Shareholder accountability governance:**
      1. Maintain formal risk acceptance records for all compliance gaps
         attributed to investment decisions, with shareholder visibility.
      2. Present quarterly board reports documenting regulatory compliance
         investment needs versus approved budgets.
      3. Escalate unfunded regulatory compliance requirements through
         formal governance channels with documented responses.
      4. Coordinate with legal counsel on liability allocation when
         compliance failures stem from shareholder-controlled decisions.
    tools:
      - grc-platform
      - board-reporting
      - risk-acceptance
      - legal-coordination
legal_references:
  - framework_id: cnsp-416
    articles: ["art-7", "art-8"]
    relationship: complements
  - framework_id: susep-638
    articles: ["art-20"]
    relationship: complements
