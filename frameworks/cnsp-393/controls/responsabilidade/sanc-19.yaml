id: sanc-19
family: responsabilidade
title: "Duty to Report and Whistleblower Protection"
class: CNSP-393
baselines: [supervisionadas-susep]
statement:
  prose: |
    Os administradores, membros de órgãos estatutários e responsáveis por áreas
    de compliance e auditoria interna têm o dever de comunicar à SUSEP
    irregularidades de que tenham conhecimento, observando-se:

    I — o dever de comunicação abrange fatos que configurem infrações
    administrativas, irregularidades contábeis, insuficiência de provisões
    técnicas, operações fraudulentas e qualquer situação que coloque em risco
    a solvência ou a liquidez da supervisionada;

    II — a comunicação deverá ser feita de forma tempestiva, por meio dos canais
    oficiais estabelecidos pela SUSEP;

    III — a omissão na comunicação de irregularidades conhecidas configura
    infração administrativa autônoma, sujeitando o responsável às penalidades
    previstas nesta Resolução;

    IV — é vedada qualquer forma de retaliação contra administradores,
    colaboradores ou terceiros que comuniquem irregularidades à SUSEP de boa-fé;

    V — a supervisionada deverá manter canal de denúncia interno, confidencial
    e acessível a todos os colaboradores, com garantia de não retaliação.
guidance:
  prose: |
    This control establishes the affirmative duty to report irregularities and
    provides whistleblower protections for those who do.

    **Mandatory reporting triggers:**
    - Administrative infractions
    - Accounting irregularities
    - Provision insufficiency
    - Fraudulent operations
    - Any threat to solvency or liquidity

    **Reporting obligations:**
    - Applies to officers, statutory members, compliance officers, and internal auditors
    - Must be timely through official SUSEP channels
    - Failure to report is an independent infraction (omission = new violation)

    **Whistleblower protections:**
    - Retaliation against good-faith reporters is prohibited
    - Entities must maintain internal confidential reporting channels
    - Non-retaliation guarantee must be enforced

    **Technology-specific reporting:**
    Technology leaders (CISO, CTO) who discover cybersecurity incidents,
    data breaches, or system integrity failures affecting regulatory compliance
    have a personal duty to report. Not reporting a known vulnerability or
    breach is itself an infraction.
implementation_guidance:
  platform_engineering:
    prose: |
      **Reporting and whistleblower infrastructure:**
      1. Deploy a secure, anonymous whistleblower reporting platform
         with encryption and access controls preventing identification
         of reporters.
      2. Implement automated incident detection systems that generate
         reportable condition alerts to compliance officers, creating
         timestamped evidence of awareness.
      3. Build regulatory reporting workflow automation for SUSEP
         submissions with deadline tracking and completion verification.
      4. Maintain separate access controls for whistleblower data
         preventing unauthorized identification of reporters.
    tools:
      - whistleblower-platform
      - incident-detection
      - regulatory-reporting
      - access-controls
  devsecops:
    prose: |
      **Security incident reporting in development:**
      1. Implement automated security finding escalation workflows that
         route reportable conditions to compliance officers within SLA.
      2. Build pipeline stages that flag security findings meeting
         regulatory reporting thresholds for immediate attention.
      3. Maintain tamper-proof records of when security findings were
         discovered, classified, and escalated, supporting timely
         reporting compliance.
      4. Implement confidential bug reporting channels within development
         teams with non-attribution capabilities.
    tools:
      - gitlab-ci
      - security-escalation
      - finding-classification
      - confidential-reporting
  secops:
    prose: |
      **Reporting duty governance:**
      1. Maintain a regulatory reporting decision matrix that defines
         which conditions trigger mandatory SUSEP reporting and by whom.
      2. Conduct annual training for all officers and compliance staff
         on their personal reporting obligations and liability for omission.
      3. Track all regulatory reports submitted to SUSEP with evidence
         of timeliness and completeness.
      4. Operate the internal whistleblower channel with independent
         investigation protocols, case tracking, and non-retaliation
         monitoring.
      5. Implement whistleblower case outcome tracking to demonstrate
         program effectiveness.
    tools:
      - regulatory-reporting
      - whistleblower-management
      - training-lms
      - case-management
