id: sanc-17
family: responsabilidade
title: "Personal Liability of Directors and Officers"
class: CNSP-393
baselines: [supervisionadas-susep]
statement:
  prose: |
    Os administradores e membros de órgãos estatutários ou contratuais das
    supervisionadas respondem pessoalmente pelas infrações administrativas que
    praticarem ou para as quais concorrerem, observando-se:

    I — respondem solidariamente os administradores que, por ação ou omissão,
    contribuírem para a prática da infração ou que, tendo conhecimento,
    deixarem de adotar as providências necessárias para impedi-la;

    II — a responsabilidade pessoal será apurada independentemente da
    responsabilidade da pessoa jurídica supervisionada;

    III — configura responsabilidade pessoal do administrador a aprovação de
    operações ou práticas em desacordo com a regulamentação, a omissão no
    exercício de suas atribuições de supervisão e controle, e a não
    implementação de deliberações dos órgãos colegiados;

    IV — a defesa do administrador poderá ser exercida separadamente da defesa
    da pessoa jurídica supervisionada;

    V — o exercício diligente e de boa-fé das atribuições do cargo, devidamente
    comprovado, poderá afastar a responsabilidade pessoal do administrador.
guidance:
  prose: |
    This control establishes the personal liability framework for directors and
    officers of SUSEP-supervised entities, separate from corporate liability.

    **Liability triggers:**
    - Direct commission of infraction
    - Contribution by action or omission
    - Knowledge of infraction without taking preventive measures
    - Approval of non-compliant operations
    - Failure to exercise supervisory and control duties
    - Non-implementation of board decisions

    **Joint and several liability:**
    Multiple officers can be held jointly liable for the same infraction if they
    each contributed through action or omission.

    **Separate proceedings:**
    Personal liability is assessed independently of corporate liability. An officer
    can be sanctioned even if the entity is acquitted, and vice versa.

    **Due diligence defense:**
    Diligent and good-faith exercise of duties, when demonstrably proven, can
    shield officers from personal liability. This creates a strong incentive for
    officers to maintain documented evidence of their oversight activities.

    **Technology governance implication:**
    CTOs, CISOs, and technology directors must demonstrate active oversight of
    technology compliance. Passive delegation without monitoring does not satisfy
    the diligence standard.
implementation_guidance:
  platform_engineering:
    prose: |
      **Officer oversight infrastructure:**
      1. Implement executive compliance dashboards providing real-time
         visibility into the compliance status of all regulated systems.
      2. Deploy automated notification systems that alert responsible
         officers when compliance deviations are detected, creating
         timestamped evidence of awareness.
      3. Build decision audit trails that record officer approvals,
         reviews, and directives related to compliance matters.
      4. Implement segregation of duties controls that enforce governance
         structures matching the regulatory responsibility framework.
    tools:
      - executive-dashboard
      - notification-system
      - decision-audit-trail
      - rbac
  devsecops:
    prose: |
      **Officer diligence evidence in development:**
      1. Implement officer sign-off workflows for technology risk
         acceptance decisions creating defensible evidence records.
      2. Maintain merge request approval records linking officer reviews
         to specific code changes in compliance-critical systems.
      3. Build periodic compliance attestation workflows where officers
         formally confirm their oversight of technology governance.
      4. Generate officer-specific compliance reports summarizing their
         oversight activities and documented decisions.
    tools:
      - gitlab-ci
      - approval-workflows
      - attestation-management
      - officer-reports
  secops:
    prose: |
      **Officer liability protection program:**
      1. Maintain individual officer compliance profiles documenting
         their areas of responsibility, oversight activities, and
         documented decisions.
      2. Conduct quarterly officer liability briefings reviewing current
         compliance status and emerging risks in their areas of
         responsibility.
      3. Implement D&O (Directors & Officers) insurance coordination
         ensuring coverage aligns with CNSP 393 liability exposure.
      4. Maintain pre-compiled defense evidence packages for each
         officer demonstrating diligent exercise of their duties.
    tools:
      - officer-profiles
      - liability-briefing
      - insurance-management
      - evidence-management
