id: sanc-20
family: responsabilidade
title: "Board Oversight and Governance Accountability"
class: CNSP-393
baselines: [supervisionadas-susep]
statement:
  prose: |
    O conselho de administração ou, na sua ausência, o órgão máximo de deliberação
    da supervisionada é responsável por:

    I — aprovar e supervisionar a implementação efetiva do programa de compliance
    e dos controles internos da supervisionada;

    II — definir o apetite de risco e os limites de tolerância da supervisionada,
    assegurando sua compatibilidade com as exigências regulamentares;

    III — designar o diretor responsável pelo cumprimento das obrigações
    regulamentares perante a SUSEP, assegurando-lhe autonomia e recursos adequados;

    IV — tomar conhecimento tempestivo de irregularidades identificadas pela
    auditoria interna, pela área de compliance ou por qualquer outro meio, e
    determinar as providências cabíveis;

    V — assegurar a alocação de recursos humanos, tecnológicos e financeiros
    adequados para o cumprimento das obrigações regulamentares pela supervisionada;

    VI — prestar contas à SUSEP, quando solicitado, sobre as medidas adotadas
    para o cumprimento das obrigações regulamentares e para a correção de
    irregularidades identificadas.
guidance:
  prose: |
    This control places ultimate regulatory accountability on the board of directors
    (or equivalent governance body) of supervised entities.

    **Board responsibilities:**
    1. Approve and supervise compliance program implementation
    2. Define risk appetite within regulatory boundaries
    3. Designate the compliance officer with autonomy and adequate resources
    4. Act promptly on identified irregularities
    5. Ensure adequate human, technology, and financial resources for compliance
    6. Report to SUSEP on corrective measures when requested

    **Technology resource adequacy (item V):**
    The board is explicitly required to ensure adequate technology resources for
    regulatory compliance. This creates board-level accountability for technology
    investment decisions that affect compliance posture. Documented board decisions
    denying technology investment requests create personal liability exposure.

    **Compliance officer designation (item III):**
    The designated compliance officer must have autonomy and resources. A compliance
    officer without authority or budget to address technology compliance gaps
    represents a governance failure attributable to the board.

    **Accountability chain:**
    Board → designated compliance officer → technology leadership → operational teams.
    Each level must demonstrate active oversight of the level below.
implementation_guidance:
  platform_engineering:
    prose: |
      **Board-level compliance visibility infrastructure:**
      1. Implement board compliance dashboards providing summarized real-time
         views of regulatory compliance status across all technology systems.
      2. Deploy automated board reporting that generates compliance status
         summaries at configurable frequencies (monthly/quarterly).
      3. Build resource adequacy tracking that correlates compliance
         investment levels with control effectiveness metrics.
      4. Implement risk appetite monitoring systems that alert when
         technology risk exposure approaches board-defined thresholds.
    tools:
      - executive-dashboard
      - board-reporting
      - resource-tracking
      - risk-monitoring
  devsecops:
    prose: |
      **Governance-integrated development:**
      1. Generate development compliance metrics suitable for board-level
         reporting (security scan pass rates, remediation SLAs, deployment
         success rates).
      2. Implement compliance framework assignment in GitLab ensuring
         all regulated repositories are governed by appropriate controls.
      3. Build automated compliance attestation for designated officers
         covering development lifecycle governance.
      4. Maintain evidence of resource allocation decisions and their
         impact on development team compliance capabilities.
    tools:
      - gitlab-ci
      - compliance-framework
      - metrics-reporting
      - resource-management
  secops:
    prose: |
      **Board governance support program:**
      1. Prepare board-ready compliance reports with clear risk ratings,
         trend analysis, and resource adequacy assessments.
      2. Maintain the compliance officer designation with documented
         authority, reporting lines, and resource allocation.
      3. Track board decisions on compliance matters with formal minutes
         and follow-up action monitoring.
      4. Conduct annual board compliance training covering CNSP 393
         personal liability framework and governance obligations.
      5. Maintain SUSEP communication response procedures ensuring
         board-level engagement within regulatory timelines.
    tools:
      - board-governance
      - grc-platform
      - training-management
      - regulatory-communication
