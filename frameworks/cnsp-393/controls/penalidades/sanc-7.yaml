id: sanc-7
family: penalidades
title: "Fine Calculation and Cumulative Application"
class: CNSP-393
baselines: [supervisionadas-susep]
statement:
  prose: |
    A multa será aplicada observando-se os seguintes parâmetros:

    I — o valor da multa será fixado entre R$ 1.000,00 (mil reais) e
    R$ 1.000.000,00 (um milhão de reais);

    II — em caso de reincidência, o valor da multa poderá ser duplicado,
    até o limite de R$ 2.000.000,00 (dois milhões de reais);

    III — a multa poderá ser aplicada cumulativamente com as penalidades
    de advertência, suspensão, inabilitação ou cassação;

    IV — na fixação do valor da multa, a SUSEP considerará a capacidade
    econômica do infrator e o potencial lesivo da conduta, de modo que a
    penalidade não se constitua em estímulo à prática reiterada da infração;

    V — a multa poderá ser aplicada diariamente, por período de atraso ou
    descumprimento continuado, até a regularização da situação;

    VI — o pagamento da multa não exime o infrator da obrigação de corrigir
    a irregularidade que deu origem à sanção.
guidance:
  prose: |
    This control details the mechanics of fine calculation and application
    under the CNSP 393 sanctioning regime.

    **Fine parameters:**
    - Base range: R$1,000 to R$1,000,000 per infraction
    - Recidivism doubling: up to R$2,000,000 for repeat offenders
    - Cumulative: fine can accompany any other penalty type
    - Economic capacity: fines must be proportional to the entity's size
    - Daily accrual: fines can accumulate per day of continued non-compliance
    - No substitution: paying the fine does not remove the obligation to correct

    **Daily fine mechanism:**
    The daily fine provision (item V) is particularly relevant for technology
    compliance. A system outage or data availability failure that persists
    generates cumulative daily fines until remediation. This creates urgent
    financial pressure for rapid incident resolution.

    **Correction obligation:**
    Even after paying fines, the entity must fix the underlying problem.
    This means that paying fines to avoid investing in proper technology
    infrastructure is not a viable strategy — the obligation remains.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infrastructure minimizing fine exposure:**
      1. Implement high-availability architectures for systems whose failure
         triggers daily fine accrual (SLA > 99.9% for regulated services).
      2. Deploy automated remediation runbooks that reduce mean time to
         recovery (MTTR) for compliance-critical system failures.
      3. Maintain capacity planning models that ensure infrastructure can
         meet regulatory SLAs under peak load conditions.
      4. Implement automated compliance status reporting that demonstrates
         daily compliance status, interrupting fine accrual when applicable.
    tools:
      - high-availability
      - auto-remediation
      - capacity-planning
      - uptime-monitoring
  devsecops:
    prose: |
      **Development practices reducing fine exposure:**
      1. Implement blue-green or canary deployment strategies for regulated
         systems to minimize downtime during updates.
      2. Maintain automated rollback capabilities that can restore compliant
         state within minutes of detecting a regression.
      3. Build health check endpoints that verify regulatory compliance
         status and can serve as evidence of daily compliance.
      4. Implement chaos engineering practices for critical regulated systems
         to identify failure modes before they cause non-compliance.
    tools:
      - gitlab-ci
      - canary-deployments
      - rollback-automation
      - chaos-engineering
  secops:
    prose: |
      **Fine exposure monitoring and management:**
      1. Maintain a real-time fine exposure calculator that projects daily
         accrual rates for all active non-compliance conditions.
      2. Implement immediate escalation procedures when any compliance
         deviation is detected that could trigger daily fine accrual.
      3. Track historical fine data from SUSEP enforcement actions to
         calibrate internal risk models and prioritize investments.
      4. Maintain documentation of all correction actions taken to support
         fine cessation arguments in regulatory proceedings.
    tools:
      - risk-calculator
      - compliance-monitoring
      - regulatory-intelligence
      - incident-management
