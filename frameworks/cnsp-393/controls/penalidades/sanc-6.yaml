id: sanc-6
family: penalidades
title: "Dosimetry Criteria for Penalty Application"
class: CNSP-393
baselines: [supervisionadas-susep]
statement:
  prose: |
    A dosimetria das penalidades administrativas observará os seguintes critérios:

    I — natureza e gravidade da infração;
    II — dano causado ao mercado de seguros, aos segurados, participantes,
    beneficiários ou a terceiros;
    III — vantagem auferida ou pretendida pelo infrator;
    IV — situação econômica do infrator;
    V — reincidência;
    VI — grau de lesão ou perigo de lesão ao bem jurídico tutelado;
    VII — efeito dissuasório da penalidade;
    VIII — antecedentes do infrator;
    IX — proporcionalidade entre a gravidade da falta e a intensidade da sanção;
    X — cooperação do infrator no curso do processo administrativo sancionador.

    A fundamentação da dosimetria será expressa na decisão administrativa,
    com a indicação dos critérios considerados e sua valoração no caso concreto.
guidance:
  prose: |
    This control establishes the ten dosimetry criteria SUSEP must consider when
    determining penalty severity. These criteria are also relevant for entities
    preparing their defense, as they can argue favorable positioning on each factor.

    **Dosimetry factors explained:**
    1. Nature and severity of the infraction (base classification)
    2. Harm caused (actual damages to market, policyholders, third parties)
    3. Benefit obtained or sought (profit motive analysis)
    4. Economic condition of the infractor (ability to pay)
    5. Recidivism (prior offenses)
    6. Degree of harm or danger to protected interests
    7. Deterrent effect (penalty must discourage future violations)
    8. Prior record of the infractor
    9. Proportionality (penalty must fit the offense)
    10. Cooperation during proceedings

    **Technology evidence value:**
    Factors 1, 2, 6, and 10 are areas where technology evidence is directly
    relevant. Automated monitoring data can demonstrate the actual scope of harm,
    the speed of detection and remediation, and the entity's cooperation through
    transparent data sharing with SUSEP.
implementation_guidance:
  platform_engineering:
    prose: |
      **Dosimetry evidence infrastructure:**
      1. Implement impact measurement capabilities that quantify the scope
         of any compliance incident (number of affected policyholders,
         financial impact, duration of exposure).
      2. Deploy automated incident timeline reconstruction tools that
         provide precise timestamps for detection, containment, and
         remediation — supporting favorable dosimetry arguments.
      3. Maintain real-time dashboards showing control effectiveness
         metrics that demonstrate the entity's compliance investment.
      4. Build automated evidence collection workflows that preserve
         dosimetry-relevant data immediately upon incident detection.
    tools:
      - siem
      - incident-timeline
      - impact-analysis
      - evidence-collection
  devsecops:
    prose: |
      **Development practices supporting favorable dosimetry:**
      1. Maintain comprehensive security scanning metrics demonstrating
         proactive vulnerability management (supports factors 1, 6, 8).
      2. Track mean time to remediation (MTTR) for security findings to
         demonstrate responsive correction capabilities.
      3. Implement automated change impact analysis that estimates the
         blast radius of potential failures before deployment.
      4. Generate periodic compliance posture reports from CI/CD pipeline
         data showing continuous improvement trends.
    tools:
      - gitlab-ci
      - security-metrics
      - change-impact-analysis
      - compliance-reporting
  secops:
    prose: |
      **Dosimetry defense preparation:**
      1. Maintain a dosimetry evidence repository organized by the ten
         regulatory criteria for rapid assembly during proceedings.
      2. Conduct annual dosimetry simulation exercises to identify gaps
         in evidence collection and presentation capabilities.
      3. Track cooperation metrics (response times to SUSEP requests,
         completeness of submissions, proactive disclosures) for use
         in factor 10 arguments.
      4. Maintain comparative analysis of penalties applied to similar
         entities for similar infractions to support proportionality
         arguments (factor 9).
    tools:
      - grc-platform
      - evidence-management
      - regulatory-intelligence
      - legal-case-management
