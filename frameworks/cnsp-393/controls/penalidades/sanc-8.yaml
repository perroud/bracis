id: sanc-8
family: penalidades
title: "Suspension, Disqualification, and License Revocation"
class: CNSP-393
baselines: [supervisionadas-susep]
statement:
  prose: |
    As penalidades de suspensão, inabilitação e cassação serão aplicadas
    observando-se os seguintes critérios:

    I — a suspensão do exercício de cargo ou função será aplicada quando a
    infração revelar inaptidão temporária do administrador para o exercício
    de suas atribuições, pelo prazo mínimo de 30 (trinta) e máximo de 180
    (cento e oitenta) dias;

    II — a inabilitação temporária será aplicada quando a gravidade da infração
    ou a reincidência demonstrar incompatibilidade do administrador com o
    exercício de cargo ou função em entidade supervisionada, pelo prazo
    mínimo de 2 (dois) e máximo de 10 (dez) anos;

    III — a cassação da autorização de funcionamento será aplicada quando
    verificada a inviabilidade de recuperação da entidade supervisionada ou
    a prática reiterada de infrações graves que comprometam a estabilidade
    do mercado de seguros;

    IV — a aplicação das penalidades de inabilitação e cassação dependerá de
    decisão do colegiado competente da SUSEP, assegurado o contraditório e
    a ampla defesa;

    V — a suspensão e a inabilitação serão comunicadas a todos os órgãos e
    entidades reguladores com os quais a SUSEP mantenha convênio de cooperação.
guidance:
  prose: |
    This control covers the three most severe penalties: suspension,
    disqualification, and license revocation.

    **Suspension (30-180 days):**
    Applied when an officer demonstrates temporary unfitness. The officer is
    barred from any role in SUSEP-supervised entities during the period.

    **Disqualification (2-10 years):**
    Applied for serious infractions or recidivism demonstrating fundamental
    incompatibility with supervisory roles. Requires collegial SUSEP decision
    with full adversarial proceedings.

    **License revocation (cassação):**
    The ultimate sanction — the entity loses its operating authorization.
    Applied when recovery is deemed unviable or when repeated serious
    infractions threaten market stability. Also requires collegial decision.

    **Cross-regulator communication:**
    Suspensions and disqualifications are shared with other regulators (BCB,
    CVM, PREVIC), preventing sanctioned individuals from migrating to other
    supervised sectors.

    **Technology governance implication:**
    CISOs, CTOs, and technology directors of supervised entities are personally
    subject to these penalties. Technology governance failures that cause
    serious infractions can result in personal suspension or disqualification
    from the entire supervised financial sector.
implementation_guidance:
  platform_engineering:
    prose: |
      **Governance infrastructure for officer accountability:**
      1. Implement role-based access controls that clearly delineate
         administrative responsibilities and create audit trails of
         decision-making authority for regulatory purposes.
      2. Maintain technology governance documentation linking system
         ownership to specific officers and their regulatory responsibilities.
      3. Deploy segregation of duties controls that prevent any single
         administrator from having unchecked authority over compliance-critical
         systems.
      4. Implement automated governance reporting that tracks officer
         responsibilities against regulatory requirements.
    tools:
      - iam
      - rbac
      - governance-dashboard
      - segregation-of-duties
  devsecops:
    prose: |
      **Development governance supporting officer defense:**
      1. Enforce approval workflows that document officer oversight of
         critical technology decisions via merge request approvals.
      2. Maintain signed-off deployment records for regulated systems
         that demonstrate due diligence by responsible officers.
      3. Implement technology risk acceptance workflows with officer
         sign-off creating defensible records of risk-informed decisions.
      4. Build compliance attestation checkpoints in release processes
         that officers can reference during regulatory proceedings.
    tools:
      - gitlab-ci
      - approval-workflows
      - risk-acceptance
      - compliance-attestation
  secops:
    prose: |
      **Officer protection and defense program:**
      1. Maintain officer regulatory exposure assessments identifying
         personal liability risks for each director and officer.
      2. Implement real-time compliance status notifications to officers
         so they can demonstrate awareness and responsive action.
      3. Build pre-compiled defense evidence packages for each officer
         documenting their compliance oversight activities.
      4. Maintain regulatory communication protocols that ensure officers
         are informed of SUSEP interactions within 4 hours.
    tools:
      - grc-platform
      - officer-liability-tracking
      - evidence-management
      - regulatory-communication
