id: sanc-5
family: penalidades
title: "Penalty Types and Applicable Ranges"
class: CNSP-393
baselines: [supervisionadas-susep]
statement:
  prose: |
    As penalidades aplicáveis às supervisionadas e seus administradores, pela prática
    de infrações administrativas, são:

    I — advertência;
    II — multa, no valor de R$ 1.000,00 (mil reais) até R$ 1.000.000,00
    (um milhão de reais), podendo ser aplicada cumulativamente com as demais
    penalidades, e duplicada em caso de reincidência;
    III — suspensão do exercício de cargo ou função em entidade supervisionada
    pela SUSEP, pelo prazo de até 180 (cento e oitenta) dias;
    IV — inabilitação temporária para o exercício de cargo ou função em
    entidade supervisionada pela SUSEP, pelo prazo de até 10 (dez) anos;
    V — cassação da autorização de funcionamento concedida pela SUSEP.

    As penalidades serão aplicadas de forma isolada ou cumulativa, conforme
    a gravidade da infração e as circunstâncias do caso concreto.
guidance:
  prose: |
    This control establishes the five types of administrative penalties SUSEP can
    impose, arranged in ascending order of severity.

    **Penalty spectrum:**
    1. Warning (advertência): formal notice for light infractions
    2. Fine (multa): R$1,000 to R$1,000,000, doubled for repeat offenses,
       cumulative with other penalties
    3. Suspension (suspensão): up to 180 days from roles in supervised entities
    4. Disqualification (inabilitação): up to 10 years from roles in supervised entities
    5. License revocation (cassação): ultimate sanction revoking operating authority

    **Cumulative application:**
    Penalties can be combined — for example, a fine plus suspension, or a fine
    plus disqualification. The fine is explicitly designed to be cumulative with
    any other penalty.

    **Doubling mechanism:**
    Repeat offenders face doubled fines (up to R$2,000,000). This creates
    a strong incentive for first-time correction and investment in prevention.

    **Practical implication:**
    The potential for license revocation (cassação) makes regulatory compliance
    an existential concern for supervised entities. Technology infrastructure
    failures that lead to very serious infractions can ultimately threaten the
    entity's ability to operate.
implementation_guidance:
  platform_engineering:
    prose: |
      **Penalty risk-aware infrastructure:**
      1. Implement service criticality tiers mapped to potential penalty
         exposure — systems whose failure could trigger license-threatening
         infractions must have the highest availability guarantees.
      2. Deploy financial impact modeling tools that calculate potential
         penalty exposure based on current compliance posture.
      3. Maintain infrastructure redundancy and failover capabilities
         proportional to the regulatory penalty risk of each system.
      4. Implement cost-of-non-compliance dashboards that quantify
         penalty exposure by system and control family.
    tools:
      - risk-modeling
      - availability-monitoring
      - disaster-recovery
      - compliance-dashboard
  devsecops:
    prose: |
      **Penalty-aware development practices:**
      1. Tag all repositories with penalty risk classification (light through
         license-threatening) based on the regulatory impact of failures.
      2. Enforce graduated code review requirements proportional to penalty
         risk — critical systems require multiple reviewers and security sign-off.
      3. Implement mandatory rollback procedures for deployments to
         penalty-critical systems with automated health checks.
      4. Maintain deployment frequency and failure metrics for systems
         mapped to serious and very serious infraction categories.
    tools:
      - gitlab-ci
      - feature-flags
      - canary-deployments
      - rollback-automation
  secops:
    prose: |
      **Penalty exposure management program:**
      1. Maintain a real-time penalty exposure register quantifying
         potential fines and sanctions across all compliance domains.
      2. Conduct quarterly penalty risk assessments with input from
         legal, compliance, and technology teams.
      3. Implement early warning indicators that detect control
         degradation before it crosses infraction thresholds.
      4. Maintain insurance coverage analysis for administrative penalty
         exposure where permitted by regulation.
    tools:
      - grc-platform
      - risk-register
      - compliance-dashboard
      - penalty-calculator
