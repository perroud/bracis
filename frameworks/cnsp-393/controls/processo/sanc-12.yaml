id: sanc-12
family: processo
title: "Statute of Limitations and Procedural Deadlines"
class: CNSP-393
baselines: [supervisionadas-susep]
statement:
  prose: |
    A pretensão punitiva da SUSEP prescreve nos seguintes prazos:

    I — 5 (cinco) anos, contados da data da prática do ato infracional ou, no
    caso de infração permanente ou continuada, do dia em que tiver cessado;

    II — a prescrição será interrompida pela instauração do processo administrativo
    sancionador, pela notificação do acusado ou por qualquer ato inequívoco de
    apuração da infração;

    III — a prescrição intercorrente ocorrerá quando o processo administrativo
    sancionador ficar paralisado por mais de 3 (três) anos, pendente de despacho
    ou julgamento;

    IV — a prescrição intercorrente não se aplica aos processos cuja paralisação
    decorra de ato do próprio acusado;

    V — os prazos processuais correrão em dias úteis, exceto quando expressamente
    fixados em dias corridos;

    VI — a supervisionada deverá manter à disposição da SUSEP toda a documentação
    necessária à comprovação do cumprimento das obrigações regulamentares pelo prazo
    mínimo de 5 (cinco) anos.
guidance:
  prose: |
    This control establishes the statute of limitations and procedural timeline
    framework for SUSEP administrative proceedings.

    **Statute of limitations:**
    - 5 years from the date of the infraction (or from cessation of ongoing
      infractions)
    - Interrupted by: process initiation, accused notification, or any unequivocal
      investigative act
    - Intercurrent prescription: 3-year stalling of proceedings (unless caused
      by the accused)

    **Document retention implication:**
    The 5-year retention requirement aligns with the 5-year statute of limitations.
    Entities must maintain ALL regulatory compliance documentation for at least
    5 years. For ongoing infractions, the clock only starts when the violation
    ceases, potentially requiring much longer retention.

    **Technology implications:**
    - Log retention policies must guarantee minimum 5 years for regulatory data
    - Configuration history must be preservable for the full limitation period
    - Evidence of compliance (or non-compliance) at specific historical dates
      must be reconstructible
    - For continuous infractions (e.g., persistent security vulnerabilities),
      the 5-year clock resets daily, requiring indefinite retention until fixed
implementation_guidance:
  platform_engineering:
    prose: |
      **5-year retention infrastructure:**
      1. Implement tiered storage architecture with hot/warm/cold tiers ensuring
         5-year minimum retention for all regulatory data at optimal cost.
      2. Deploy automated data lifecycle management that prevents premature
         deletion of records within the regulatory retention window.
      3. Maintain backup and archival systems with verified restoration
         capabilities tested annually for data up to 5 years old.
      4. Implement legal hold capabilities that extend retention beyond
         5 years when proceedings are initiated or anticipated.
    tools:
      - tiered-storage
      - data-lifecycle
      - backup-verification
      - legal-hold
  devsecops:
    prose: |
      **Development artifact retention:**
      1. Configure CI/CD artifact retention policies to maintain pipeline
         records for the full 5-year regulatory window.
      2. Implement git repository archival procedures that preserve complete
         history including branch and tag information.
      3. Maintain build reproducibility capabilities that allow reconstruction
         of historical software versions within the retention period.
      4. Archive security scan results and compliance reports with tamper-proof
         timestamps for the full retention window.
    tools:
      - artifact-retention
      - git-archive
      - build-reproducibility
      - compliance-archive
  secops:
    prose: |
      **Statute of limitations management:**
      1. Maintain a prescriptive timeline tracker for all identified infractions
         calculating limitation dates and interruption events.
      2. Implement document retention compliance monitoring that verifies
         all regulatory records meet the 5-year minimum requirement.
      3. Establish procedures for identifying and documenting ongoing
         infractions where the limitation clock has not started.
      4. Coordinate with legal counsel to manage limitation defense
         strategies when applicable.
    tools:
      - retention-compliance
      - legal-case-management
      - document-management
      - regulatory-calendar
