id: sanc-9
family: processo
title: "Administrative Investigation and Due Process"
class: CNSP-393
baselines: [supervisionadas-susep]
statement:
  prose: |
    O processo administrativo sancionador observará as seguintes fases:

    I — instauração, mediante a lavratura de auto de infração ou peça
    acusatória, contendo a descrição dos fatos, o enquadramento legal, a
    identificação do infrator e a indicação das sanções aplicáveis;

    II — defesa prévia, assegurada ao acusado o prazo de 30 (trinta) dias,
    contados da intimação, para apresentar defesa escrita e produzir provas;

    III — instrução, com a realização de diligências, perícias e demais
    atos necessários à apuração dos fatos;

    IV — relatório, com a análise das provas e das alegações apresentadas
    pelas partes;

    V — decisão, fundamentada, proferida pela autoridade competente.

    É assegurado ao acusado, em todas as fases do processo, o direito ao
    contraditório e à ampla defesa, podendo ser assistido por advogado.
guidance:
  prose: |
    This control establishes the five-phase administrative sanctioning process
    and the fundamental due process rights of the accused.

    **Process phases:**
    1. Initiation: formal infraction notice or accusatory instrument
    2. Preliminary defense: 30-day window for written defense and evidence
    3. Investigation: diligences, expert examinations, fact-finding
    4. Report: analysis of evidence and arguments
    5. Decision: reasoned ruling by competent authority

    **Due process guarantees:**
    - Right to adversarial proceedings (contraditório) in all phases
    - Right to full defense (ampla defesa) including legal counsel
    - 30-day defense preparation window
    - Right to produce evidence

    **Technology evidence in proceedings:**
    System logs, audit trails, configuration records, incident reports, and
    compliance dashboards are all admissible evidence. The quality, completeness,
    and integrity of technology evidence can be decisive in both prosecution
    and defense. Entities should maintain evidence in tamper-proof formats with
    proper chain of custody documentation.
implementation_guidance:
  platform_engineering:
    prose: |
      **Evidence-grade infrastructure:**
      1. Implement tamper-proof logging with cryptographic integrity
         verification (hash chains, digital signatures) for all
         compliance-critical systems.
      2. Deploy write-once-read-many (WORM) storage for regulatory
         evidence with guaranteed retention meeting SUSEP timelines.
      3. Maintain forensic-ready infrastructure that can produce complete
         system state snapshots on demand for investigation purposes.
      4. Implement evidence export capabilities generating court-admissible
         formats with chain of custody metadata.
    tools:
      - immutable-logging
      - worm-storage
      - forensic-tools
      - evidence-export
  devsecops:
    prose: |
      **Development evidence preservation:**
      1. Maintain complete Git history with signed commits and protected
         branches as tamper-proof evidence of code changes.
      2. Archive CI/CD pipeline logs and artifacts with retention policies
         aligned to regulatory proceedings timelines (minimum 5 years).
      3. Implement automated evidence packaging that bundles deployment
         records, test results, and approval chains for specific time windows.
      4. Maintain code review records and approval decisions as evidence
         of due diligence in technology governance.
    tools:
      - gitlab-ci
      - artifact-retention
      - signed-commits
      - evidence-packaging
  secops:
    prose: |
      **Regulatory proceedings response program:**
      1. Maintain a documented response playbook for SUSEP administrative
         proceedings with designated legal counsel and technical advisors.
      2. Implement evidence preservation holds that automatically lock
         relevant records when a proceeding is initiated or anticipated.
      3. Conduct annual administrative proceedings simulation exercises
         testing evidence retrieval, defense preparation, and timeline
         compliance.
      4. Maintain a regulatory proceedings tracker with deadline management
         for the 30-day defense window and subsequent procedural milestones.
    tools:
      - legal-case-management
      - evidence-hold
      - grc-platform
      - deadline-management
