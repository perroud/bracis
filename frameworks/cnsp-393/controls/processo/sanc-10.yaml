id: sanc-10
family: processo
title: "Settlement Agreement (Termo de Compromisso)"
class: CNSP-393
baselines: [supervisionadas-susep]
statement:
  prose: |
    A SUSEP poderá celebrar termo de compromisso com o acusado, antes ou durante
    o curso do processo administrativo sancionador, visando à cessação da prática
    sob investigação e à correção das irregularidades, observados os seguintes
    requisitos:

    I — cessação da prática investigada ou a correção das irregularidades, conforme
    o caso, inclusive com indenização dos prejuízos causados;

    II — o compromissado deverá apresentar cronograma para cumprimento das obrigações
    assumidas, com prazos e metas verificáveis;

    III — o termo de compromisso poderá prever obrigações de fazer ou não fazer,
    incluindo a adoção de programas de compliance, o fortalecimento de controles
    internos e a contratação de auditoria independente;

    IV — o descumprimento do termo de compromisso acarretará a retomada do processo
    administrativo sancionador, com a utilização das provas já produzidas;

    V — o termo de compromisso não importará confissão quanto à matéria de fato,
    nem reconhecimento da ilicitude da conduta analisada.
guidance:
  prose: |
    The settlement agreement (termo de compromisso) provides an alternative to
    full administrative proceedings, allowing entities to negotiate corrective
    measures directly with SUSEP.

    **Key features:**
    - Available before or during proceedings
    - Requires cessation of investigated conduct and correction of irregularities
    - Must include a verifiable timeline with milestones
    - May require compliance programs, strengthened controls, or independent audits
    - Non-compliance reopens proceedings with preserved evidence
    - Does not constitute confession or admission of wrongdoing

    **Technology compliance programs as settlement terms:**
    SUSEP frequently includes technology-related obligations in settlement terms,
    such as implementing specific security controls, deploying monitoring systems,
    hiring independent cybersecurity auditors, or strengthening internal controls.
    Technology teams should be prepared to rapidly scope and implement compliance
    programs as settlement deliverables.

    **Strategic consideration:**
    Settlement agreements are generally preferable to contested proceedings because
    they limit penalty exposure, avoid public sanctions, and allow the entity to
    control the narrative. However, the obligations assumed can be extensive and
    carry breach consequences.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infrastructure for settlement compliance:**
      1. Maintain modular compliance control libraries that can be rapidly
         deployed when settlement agreements require specific technology
         implementations.
      2. Implement milestone tracking dashboards that provide SUSEP-visible
         evidence of settlement timeline compliance.
      3. Deploy automated control verification mechanisms that prove
         continuous compliance with settlement obligations.
      4. Build audit-ready evidence packages that independent auditors
         can consume during settlement compliance verification.
    tools:
      - compliance-automation
      - milestone-tracking
      - control-verification
      - audit-evidence
  devsecops:
    prose: |
      **Settlement deliverable implementation:**
      1. Maintain pre-built compliance pipeline templates that can be
         deployed within days to satisfy settlement requirements.
      2. Implement rapid security control deployment playbooks for
         common settlement obligations (SAST, DAST, secrets detection).
      3. Build automated compliance attestation workflows that generate
         periodic evidence of settlement milestone achievement.
      4. Maintain resource allocation models that can estimate the
         engineering effort required for potential settlement terms.
    tools:
      - gitlab-ci
      - compliance-templates
      - security-scanning
      - resource-planning
  secops:
    prose: |
      **Settlement negotiation and compliance management:**
      1. Maintain a settlement strategy playbook with pre-analyzed
         acceptable and unacceptable terms for technology obligations.
      2. Implement settlement milestone tracking with automated
         alerts for approaching deadlines and evidence submission dates.
      3. Coordinate with independent auditors engaged under settlement
         terms, providing technology evidence packages as required.
      4. Maintain post-settlement monitoring to ensure sustained
         compliance beyond the formal settlement period.
    tools:
      - legal-case-management
      - milestone-management
      - audit-coordination
      - compliance-monitoring
