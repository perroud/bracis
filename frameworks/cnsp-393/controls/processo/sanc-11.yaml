id: sanc-11
family: processo
title: "Appeals and Administrative Review"
class: CNSP-393
baselines: [supervisionadas-susep]
statement:
  prose: |
    Das decisões proferidas no processo administrativo sancionador caberá recurso:

    I — recurso voluntário, ao Conselho de Recursos do Sistema Nacional de Seguros
    Privados, de Previdência Privada Aberta e de Capitalização (CRSNSP), no prazo
    de 30 (trinta) dias contados da intimação da decisão;

    II — recurso de ofício, obrigatório quando a decisão de primeira instância
    resultar em absolvição ou imposição de penalidade inferior à proposta pela
    área técnica;

    III — o recurso voluntário terá efeito suspensivo quanto às penalidades de
    suspensão, inabilitação e cassação;

    IV — o recurso voluntário não terá efeito suspensivo quanto à penalidade de
    multa, podendo o recorrente requerer a suspensão em caso de risco de dano
    irreparável;

    V — as decisões do CRSNSP são definitivas na esfera administrativa, ressalvada
    a revisão judicial.
guidance:
  prose: |
    This control establishes the appeals framework within the administrative
    sanctioning process.

    **Appeal types:**
    - Voluntary appeal (recurso voluntário): filed by the sanctioned party within
      30 days to the CRSNSP (specialized appeals council)
    - Mandatory appeal (recurso de ofício): automatic when first-instance
      decision is more favorable than prosecution's recommendation

    **Suspensive effect:**
    - Suspension, disqualification, and license revocation: appeal automatically
      suspends enforcement
    - Fines: appeal does NOT suspend enforcement unless irreparable harm risk
      is demonstrated

    **Finality:**
    CRSNSP decisions are final in the administrative sphere. The only recourse
    beyond CRSNSP is judicial review in federal courts.

    **Technology evidence in appeals:**
    Appeals frequently rely on re-examination of technical evidence. The quality
    of log data, audit trails, and system documentation produced during the
    original proceedings directly affects appeal outcomes. Technology teams
    should maintain evidence integrity throughout the full appellate timeline.
implementation_guidance:
  platform_engineering:
    prose: |
      **Long-term evidence preservation for appeals:**
      1. Extend evidence retention to cover the full appellate timeline,
         which can span 2-5 years beyond the original decision.
      2. Implement evidence integrity verification systems that can
         demonstrate non-tampering throughout the retention period.
      3. Maintain system configuration snapshots at the time of alleged
         infractions, preserved in read-only storage for appellate review.
      4. Deploy evidence access controls that maintain chain of custody
         integrity while allowing authorized access for appeal preparation.
    tools:
      - long-term-storage
      - integrity-verification
      - snapshot-management
      - access-controls
  devsecops:
    prose: |
      **Development evidence for appellate review:**
      1. Maintain git repository integrity with verifiable commit history
         spanning the entire appellate timeline.
      2. Archive pipeline execution logs and artifacts in tamper-proof
         storage with cryptographic verification capabilities.
      3. Implement evidence retrieval tools that can reconstruct the
         state of systems and code at specific historical dates.
      4. Maintain deployment history records with sufficient detail to
         support expert analysis during appellate proceedings.
    tools:
      - git-archive
      - artifact-archive
      - time-machine
      - deployment-history
  secops:
    prose: |
      **Appeals management program:**
      1. Maintain an appeals strategy playbook developed with legal counsel
         including technology evidence presentation guidelines.
      2. Implement evidence preservation holds that automatically extend
         retention when appeals are filed or anticipated.
      3. Coordinate with external experts who may provide technical
         opinions during appellate proceedings.
      4. Track CRSNSP precedent decisions to inform appeal strategy and
         improve compliance program design.
    tools:
      - legal-case-management
      - evidence-preservation
      - expert-coordination
      - regulatory-intelligence
