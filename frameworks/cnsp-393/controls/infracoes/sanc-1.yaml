id: sanc-1
family: infracoes
title: "Classification of Administrative Infractions"
class: CNSP-393
baselines: [supervisionadas-susep]
statement:
  prose: |
    As infrações administrativas praticadas pelas supervisionadas, seus administradores
    e membros de órgãos estatutários ou contratuais são classificadas, quanto à
    gravidade, em:

    I — infrações leves: descumprimento de obrigações acessórias, falhas formais em
    documentação e atrasos na prestação de informações que não comprometam a higidez
    patrimonial ou operacional da supervisionada;

    II — infrações médias: descumprimento de normas regulamentares que comprometam a
    transparência, a adequação de provisões técnicas ou a qualidade dos controles
    internos da supervisionada;

    III — infrações graves: práticas que coloquem em risco a solvência, a liquidez,
    os direitos dos segurados, participantes e beneficiários, ou que configurem
    embaraço à fiscalização da SUSEP;

    IV — infrações gravíssimas: fraudes, dissimulação de operações, gestão temerária
    ou qualquer prática que cause dano patrimonial relevante aos segurados,
    participantes, beneficiários ou ao mercado de seguros.
guidance:
  prose: |
    This control establishes the four-tier severity classification for administrative
    infractions within the SUSEP supervisory perimeter.

    **Severity tiers and their implications:**
    - Light (leves): procedural and documentation failures without material impact
    - Medium (médias): regulatory non-compliance affecting transparency or controls
    - Serious (graves): conduct threatening solvency, liquidity, or policyholder rights
    - Very serious (gravíssimas): fraud, reckless management, or material damages

    **Key considerations:**
    The classification directly determines the penalty range applicable under the
    dosimetry framework. A single act may be reclassified to a higher severity
    tier if aggravating circumstances are present (repeat offense, concealment,
    systemic impact).

    **Practical implication for technology teams:**
    Technology failures that compromise data integrity, availability of critical
    systems, or accuracy of technical provisions can escalate from medium to
    serious infractions depending on the impact to policyholders.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraction risk mapping in infrastructure:**
      1. Classify all platform services by regulatory risk tier based on their
         potential to cause infraction-qualifying failures (e.g., provisioning
         systems = serious risk; documentation portals = light risk).
      2. Implement SLA monitoring with thresholds aligned to infraction severity
         tiers — availability breaches on solvency-critical systems trigger
         immediate escalation.
      3. Deploy infrastructure-as-code guardrails that prevent deployment of
         non-compliant configurations for systems classified as serious or
         above.
      4. Maintain an immutable audit log of all infrastructure changes with
         retention sufficient for SUSEP inspection timelines (minimum 5 years).
    tools:
      - terraform
      - opa-gatekeeper
      - prometheus
      - audit-logging
  devsecops:
    prose: |
      **Infraction prevention in development lifecycle:**
      1. Integrate regulatory risk labels into the issue tracking system so
         developers understand which features touch infraction-sensitive areas.
      2. Enforce mandatory security review for merge requests affecting systems
         classified as serious or gravíssimas risk tier.
      3. Implement automated compliance checks in CI/CD pipelines that flag
         code changes potentially violating SUSEP regulatory requirements.
      4. Maintain traceability from code commits to regulatory obligations
         through structured commit metadata and linked issues.
    tools:
      - gitlab-ci
      - sonarqube
      - compliance-pipeline
      - policy-as-code
  secops:
    prose: |
      **Infraction detection and classification program:**
      1. Maintain a regulatory infraction taxonomy mapping SUSEP requirements
         to the four severity tiers defined in this resolution.
      2. Implement continuous compliance monitoring with automated alerts
         when control failures cross infraction thresholds.
      3. Establish an infraction triage process where compliance, legal, and
         technology teams jointly classify potential violations within 24 hours
         of detection.
      4. Maintain a formal infraction register with root cause analysis,
         remediation actions, and evidence preservation for SUSEP inspections.
    tools:
      - grc-platform
      - siem
      - compliance-dashboard
      - incident-management
