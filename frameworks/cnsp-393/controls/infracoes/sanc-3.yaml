id: sanc-3
family: infracoes
title: "Aggravating and Mitigating Circumstances"
class: CNSP-393
baselines: [supervisionadas-susep]
statement:
  prose: |
    Na aplicação das sanções administrativas, a SUSEP considerará as seguintes
    circunstâncias agravantes:

    I — reincidência específica ou genérica;
    II — vantagem auferida ou pretendida pelo infrator;
    III — dano causado aos segurados, participantes, beneficiários ou ao mercado;
    IV — dissimulação ou tentativa de ocultar a infração;
    V — efeito sistêmico da conduta sobre o mercado de seguros;
    VI — gravidade, duração e quantidade de pessoas afetadas pela infração.

    São circunstâncias atenuantes:

    I — a ação voluntária do infrator em corrigir a irregularidade antes de qualquer
    determinação da SUSEP;
    II — a comunicação espontânea da irregularidade à SUSEP;
    III — a colaboração efetiva do infrator com a apuração dos fatos;
    IV — a adoção de medidas concretas e eficazes para reparar o dano causado;
    V — a comprovada existência e efetividade de programa de compliance e controles
    internos.
guidance:
  prose: |
    This control defines the aggravating and mitigating factors SUSEP applies when
    determining penalty severity within the applicable range.

    **Aggravating factors:**
    - Repeat offenses (specific to the same rule or generic)
    - Benefits obtained or sought by the infractor
    - Harm to policyholders, participants, or beneficiaries
    - Concealment or attempts to hide the infraction
    - Systemic impact on the insurance market
    - Severity, duration, and number of affected persons

    **Mitigating factors:**
    - Voluntary correction before SUSEP directive
    - Spontaneous self-reporting to SUSEP
    - Effective cooperation with the investigation
    - Concrete reparation measures
    - Demonstrated existence and effectiveness of compliance programs

    **Critical technology implication:**
    The existence of a demonstrably effective compliance program (item V of mitigating
    factors) directly reduces penalties. This creates a strong business case for
    investing in automated compliance monitoring, proactive detection, and
    self-remediation capabilities. Technology evidence (logs, dashboards, automated
    alerts) serves as proof of compliance program effectiveness.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infrastructure supporting mitigation evidence:**
      1. Deploy automated compliance monitoring dashboards that demonstrate
         continuous oversight of regulatory obligations.
      2. Implement self-healing infrastructure that automatically remediates
         configuration drift, generating evidence of proactive correction.
      3. Maintain timestamped records of all compliance remediation actions
         to prove voluntary correction timelines.
      4. Build automated reporting pipelines that can generate compliance
         evidence packages for SUSEP on demand.
    tools:
      - compliance-dashboard
      - config-drift-detection
      - auto-remediation
      - evidence-collection
  devsecops:
    prose: |
      **Compliance program evidence in development:**
      1. Maintain automated security scanning reports as evidence of proactive
         vulnerability management (supports mitigating factor V).
      2. Implement compliance-as-code policies that demonstrate systematic
         enforcement of regulatory requirements.
      3. Track remediation SLAs for security findings and maintain metrics
         showing voluntary correction before regulatory action.
      4. Generate audit trails of security reviews and approvals for all
         changes to regulated systems.
    tools:
      - gitlab-ci
      - security-scanning
      - compliance-as-code
      - metrics-dashboard
  secops:
    prose: |
      **Compliance program governance:**
      1. Maintain a formal compliance program charter with board approval,
         resource allocation, and performance metrics.
      2. Implement proactive infraction detection capabilities that identify
         potential violations before they materialize or are detected by SUSEP.
      3. Document all self-correction and self-reporting activities with
         timestamps and evidence to support mitigating factor claims.
      4. Conduct annual compliance program effectiveness assessments with
         third-party validation to demonstrate program maturity.
      5. Maintain a regulatory communication log recording all spontaneous
         disclosures and cooperation activities with SUSEP.
    tools:
      - grc-platform
      - compliance-dashboard
      - regulatory-communication
      - audit-management
