id: sanc-4
family: infracoes
title: "Information Duty Violations"
class: CNSP-393
baselines: [supervisionadas-susep]
statement:
  prose: |
    Constitui infração administrativa o descumprimento do dever de informação perante
    a SUSEP, incluindo:

    I — deixar de encaminhar à SUSEP, nos prazos regulamentares, demonstrações
    financeiras, relatórios atuariais, quadros estatísticos e demais documentos e
    informações periódicas exigidos;

    II — deixar de publicar ou disponibilizar aos segurados, participantes e
    beneficiários as informações exigidas pela regulamentação;

    III — deixar de comunicar à SUSEP fatos relevantes que possam afetar a situação
    econômico-financeira ou operacional da supervisionada;

    IV — deixar de manter à disposição da SUSEP os documentos e registros necessários
    à comprovação do cumprimento das obrigações regulamentares;

    V — deixar de comunicar à SUSEP incidentes relevantes de segurança cibernética
    nos prazos e na forma previstos na regulamentação.
guidance:
  prose: |
    This control addresses the broad information duty (dever de informação) that
    SUSEP-supervised entities owe to the regulator, policyholders, and the market.

    **Categories of information duty violations:**
    - Failure to submit periodic financial and actuarial reports on time
    - Failure to publish or disclose required information to policyholders
    - Failure to communicate material facts affecting financial/operational status
    - Failure to maintain records available for SUSEP inspection
    - Failure to report cybersecurity incidents within regulatory deadlines

    **Technology relevance:**
    The cybersecurity incident reporting obligation (item V) directly ties to
    Circular SUSEP 638/2021 requirements. System outages, data breaches, and
    security incidents must be reported within the prescribed timelines. Automated
    incident detection and reporting workflows are essential to meet these deadlines.

    **Severity determination:**
    The severity classification depends on the nature of the withheld information
    and the resulting impact. Failure to report a material cybersecurity incident
    affecting policyholder data may be classified as a serious or very serious
    infraction.
implementation_guidance:
  platform_engineering:
    prose: |
      **Automated regulatory reporting infrastructure:**
      1. Build automated data pipelines that extract, transform, and stage
         regulatory reports (financial statements, actuarial reports, statistical
         tables) for SUSEP submission.
      2. Implement deadline monitoring with escalation alerts starting 30 days
         before each regulatory filing deadline.
      3. Deploy cybersecurity incident detection systems with automated
         severity classification and regulatory notification triggers.
      4. Maintain always-available data export capabilities for SUSEP-required
         records with automated completeness validation.
    tools:
      - etl-pipelines
      - scheduling-engine
      - siem
      - incident-detection
  devsecops:
    prose: |
      **Information duty compliance in development:**
      1. Implement automated security incident classification in the CI/CD
         pipeline that flags deployments creating reportable conditions.
      2. Build automated disclosure checks that verify public-facing
         applications display all required policyholder information.
      3. Maintain pipeline stages that validate regulatory reporting data
         integrity before submission.
      4. Implement automated testing of incident notification workflows
         to ensure they function within regulatory timelines.
    tools:
      - gitlab-ci
      - security-scanning
      - automated-testing
      - incident-workflow
  secops:
    prose: |
      **Information duty governance:**
      1. Maintain a regulatory filing calendar with all SUSEP submission
         deadlines, responsible owners, and escalation procedures.
      2. Implement a cybersecurity incident communication protocol aligned
         with Circular SUSEP 638 timelines and formats.
      3. Conduct quarterly completeness reviews of all regulatory records
         to ensure inspection readiness.
      4. Establish a material fact assessment committee that evaluates
         potential SUSEP reporting triggers within 24 hours of identification.
    tools:
      - grc-platform
      - incident-management
      - regulatory-calendar
      - document-management
