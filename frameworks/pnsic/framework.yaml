control_families:
  - id: cap-1
    title: "Disposicoes Gerais e Definicoes"
    description: >-
      Definicoes fundamentais de infraestrutura critica, ambito de
      aplicacao do Decreto 9.573/2018 e dos setores abrangidos pela
      PNSIC, incluindo energia, telecomunicacoes, transportes, agua
      e financas
    articles: "art. 1 ao art. 3"
    control_count: 3
  - id: cap-2
    title: "Principios e Objetivos da PNSIC"
    description: "Principios norteadores de prevencao, precaucao, resiliencia e cooperacao publico-privada, e objetivos estrategicos da Politica Nacional de Seguranca de Infraestruturas Criticas"
    articles: "art. 4 ao art. 6"
    control_count: 3
  - id: cap-3
    title: "Areas Prioritarias e Setores de Infraestrutura Critica"
    description: >-
      Definicao dos setores prioritarios de infraestrutura critica
      nacional — energia, telecomunicacoes, transportes, agua e
      financas — e suas areas especificas de atuacao conforme ENSIC
      (Decreto 10.569/2020)
    articles: "art. 7 ao art. 9"
    control_count: 3
  - id: cap-4
    title: "Gestao de Riscos e Resiliencia"
    description: "Requisitos de gestao de riscos para infraestruturas criticas, planos setoriais de seguranca, exercicios simulados, capacitacao e mecanismos de continuidade operacional"
    articles: "art. 10 ao art. 12"
    control_count: 3
  - id: cap-5
    title: "Governanca e Articulacao Institucional"
    description: "Estrutura de governanca da PNSIC, competencias do GSI/PR, articulacao entre orgaos publicos e setor privado, e integracao com demais politicas nacionais de seguranca"
    articles: "art. 13 ao art. 15"
    control_count: 3
related_frameworks:
  - framework_id: pnsi
    relationship: complements
    description: "A PNSI (Decreto 9.637/2018) complementa a PNSIC ao estabelecer a politica geral de seguranca da informacao, da qual a seguranca de infraestruturas criticas e componente especifico."
  - framework_id: pnciber
    relationship: complements
    description: "A PNCiber complementa a PNSIC ao tratar especificamente da dimensao cibernetica da seguranca de infraestruturas criticas, incluindo ameacas e incidentes ciberneticos."
  - framework_id: gsi-in1
    relationship: mapped
    description: "A GSI/PR IN 1 mapeia controles tecnicos de seguranca da informacao aplicaveis a orgaos que operam ou supervisionam infraestruturas criticas da APF."
  - framework_id: r-ciber
    relationship: complements
    description: "O R-Ciber (Resolucao ANATEL) complementa a PNSIC no setor de telecomunicacoes, estabelecendo requisitos especificos de seguranca cibernetica para operadoras."
  - framework_id: aneel-964
    relationship: complements
    description: "A Resolucao ANEEL 964/2021 complementa a PNSIC no setor de energia eletrica, detalhando requisitos de seguranca cibernetica para o setor eletrico nacional."
  - framework_id: nist-csf-v2
    relationship: mapped
    description: "O NIST CSF v2 fornece referencia internacional de framework de seguranca cibernetica para infraestruturas criticas, alinhando-se aos objetivos da PNSIC."
