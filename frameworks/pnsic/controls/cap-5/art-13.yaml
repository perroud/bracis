id: art-13
family: cap-5
title: "Competencias do GSI/PR na Governanca da PNSIC"
class: PNSIC
baselines: [critical-infrastructure]
statement:
  prose: |
    Art. 13. Compete ao Gabinete de Segurança Institucional da Presidência
    da República (GSI/PR):
    I - coordenar a implementação da PNSIC e da ENSIC no âmbito nacional;
    II - articular as ações dos órgãos reguladores setoriais na segurança
    de infraestruturas críticas;
    III - estabelecer diretrizes técnicas mínimas de segurança de IC,
    aplicáveis a todos os setores;
    IV - manter o registro nacional de infraestruturas críticas e dos
    planos setoriais de segurança;
    V - coordenar a resposta a incidentes de IC que afetam múltiplos setores
    ou que apresentem risco à segurança nacional;
    VI - reportar ao Presidente da República sobre o estado da segurança
    das infraestruturas críticas nacionais.
guidance:
  prose: |
    O art. 13 concentra no GSI/PR a funcao de coordenador nacional da
    seguranca de infraestruturas criticas, sem retirar as competencias
    especificas dos reguladores setoriais.

    **Modelo hub-and-spoke:**
    O modelo de governanca e hub-and-spoke: o GSI/PR e o hub central que
    coordena, e os reguladores setoriais (ANEEL, ANATEL, ANTAQ, ANA, BACEN)
    sao os spokes com autonomia regulatoria em seus setores. Este modelo
    evita duplicidade regulatoria enquanto garante coordenacao nacional.

    **Resposta a incidentes cross-setoriais:**
    O inciso V e especialmente relevante: incidentes que afetam multiplos
    setores (como um blackout eletrico que derruba telecomunicacoes e financas)
    exigem coordenacao centralizada. Sem autoridade clara, a resposta seria
    descoordenada e ineficiente.

    **Reporting ao Presidente:**
    O inciso VI estabelece a cadeia de prestacao de contas ao nivel mais alto
    do governo, sinalizando que seguranca de IC e prioridade de Estado, nao
    apenas de governo.
implementation_guidance:
  platform_engineering:
    prose: |
      **Arquitetura de governanca nacional de IC:**
      1. Portal nacional de IC do GSI/PR: plataforma centralizada com visibilidade
         do estado de seguranca de todos os setores criticos em tempo real.
      2. Sistema de registro nacional de infraestruturas criticas: catalogo oficial
         de todos os ativos de IC classificados, com acesso diferenciado por
         nivel de sensibilidade.
      3. Plataforma de emissao de diretrizes tecnicas: sistema de publicacao e
         distribuicao de normas e guias tecnicos do GSI/PR para operadores de IC.
      4. Sistema de notificacao e escalacao de incidentes cross-setoriais:
         workflows automatizados que garantem que incidentes de IC alcancem
         o nivel de decisao adequado dentro de prazos definidos.
      5. Dashboard executivo para o Presidente da Republica: indicadores sinteticos
         de alto nivel sobre estado da seguranca de IC nacional.
    tools:
      - national-ic-portal
      - ic-asset-registry-system
      - directive-publication-platform
      - cross-sector-incident-escalation
      - executive-security-dashboard
  devsecops:
    prose: |
      **Infraestrutura de desenvolvimento para o GSI/PR:**
      1. Plataforma de desenvolvimento e publicacao de diretrizes tecnicas em
         formato machine-readable (OSCAL, JSON, YAML): diretrizes do GSI/PR
         consumiveis automaticamente por ferramentas de conformidade dos operadores.
      2. API publica de conformidade: operadores de IC consultam via API o
         status de suas obrigacoes e recebem orientacoes personalizadas.
      3. Sistema de feedback de implementacao: operadores reportam dificuldades
         de implementacao das diretrizes, alimentando ciclo de revisao do GSI/PR.
      4. Repositorio de artefatos de seguranca do GSI/PR: templates de planos,
         checklists, runbooks disponibilizados para operadores de IC.
      5. Indicadores de conformidade em tempo real por setor: metricas coletadas
         automaticamente via APIs dos reguladores setoriais.
    tools:
      - oscal-directive-platform
      - compliance-api-gateway
      - feedback-management-system
      - security-artifacts-repository
      - realtime-compliance-metrics
  secops:
    prose: |
      **Operacao do GSI/PR como coordenador de IC:**
      1. Centro de coordenacao de seguranca de IC 24x7 no GSI/PR: equipe de
         plantao com autoridade para acionar protocolo de resposta cross-setorial.
      2. Reunioes mensais com representantes de todos os reguladores setoriais
         para alinhamento de ameacas, tendencias e acoes prioritarias.
      3. Processo anual de revisao das diretrizes tecnicas do GSI/PR: ciclo
         estruturado de atualizacao baseado em novas ameacas e tecnologias.
      4. Relatorio anual "Estado da Seguranca das ICs Nacionais": publicacao
         oficial com indicadores por setor, tendencias e recomendacoes.
      5. Representacao do Brasil em forums internacionais de seguranca de IC
         (UNECE, G20, OEA, OECD): disseminacao de boas praticas e alinhamento
         com padroes internacionais.
    tools:
      - gsi-pr-soc-coordination-center
      - stakeholder-meeting-platform
      - directive-review-cycle-management
      - annual-report-authoring-platform
      - international-forum-tracker
