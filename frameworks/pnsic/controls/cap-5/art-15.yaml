id: art-15
family: cap-5
title: "Integracao da PNSIC com Politicas Nacionais de Seguranca e Defesa"
class: PNSIC
baselines: [critical-infrastructure]
statement:
  prose: |
    Art. 15. A PNSIC integra-se com as seguintes políticas nacionais:
    I - Política Nacional de Segurança da Informação (PNSI, Decreto
    9.637/2018): instrumento guarda-chuva que engloba a PNSIC;
    II - Política Nacional de Cibersegurança (PNCiber, Decreto 11.856/2023):
    dimensão cibernética da proteção de IC;
    III - Política de Defesa Nacional e Estratégia de Defesa Nacional:
    dimensão de defesa e soberania nacional;
    IV - Política Nacional de Proteção e Defesa Civil (Lei 12.608/2012):
    resposta a desastres naturais que afetam IC;
    V - Plano Nacional de Redução de Riscos de Desastres: gestão de riscos
    de desastres em IC.

    Parágrafo único. A integração das políticas será coordenada pelo GSI/PR
    em articulação com o Ministério da Defesa, o Ministério da Justiça e
    Segurança Pública e a Casa Civil da Presidência da República.
guidance:
  prose: |
    O art. 15 posiciona a PNSIC no ecosistema mais amplo de politicas nacionais
    de seguranca, mapeando suas interfaces com politicas complementares.

    **Arquitetura normativa em camadas:**
    As politicas relacionadas formam uma arquitetura em camadas:
    - Camada 1 (guarda-chuva): PNSI — seguranca da informacao em geral
    - Camada 2 (especializacao): PNSIC — IC; PNCiber — ciberespaco
    - Camada 3 (dimensao militar): Politica de Defesa Nacional
    - Camada 3 (dimensao civil): Politica de Protecao e Defesa Civil

    **Sobreposicao de mandatos como risco:**
    A multiplicidade de politicas cria risco de sobreposicao e conflito de
    mandatos. O paragrafo unico cria a solucao: o GSI/PR como coordenador
    da integracao, atuando em articulacao com o Ministerio da Defesa e MJSP.

    **Integracao com defesa civil:**
    A inclusao da Lei 12.608/2012 (Defesa Civil) e significativa: reconhece
    que desastres naturais (enchentes, secas) sao tao ameacadores para IC
    quanto ataques ciberneticos. A PNSIC nao e apenas politica de cybersecurity,
    mas de seguranca fisica e operacional em sentido amplo.
implementation_guidance:
  platform_engineering:
    prose: |
      **Arquitetura de integracao entre politicas:**
      1. Plataforma unica de gestao de conformidade multi-framework para
         operadores de IC: mapear automaticamente requisitos da PNSIC,
         PNCiber, PNSI e regulamentacao setorial, eliminando duplicidades.
      2. Sistema de alerta integrado com defesa civil: sensores de desastres
         naturais (CEMADEN) integrados ao sistema de monitoramento de IC
         para antecipacao de impactos em infraestruturas.
      3. Protocolos de comunicacao compartilhados entre sistemas militares
         e civis para situacoes de emergencia nacional envolvendo IC.
      4. Framework de classificacao de incidentes que identifique quando
         um incidente de IC cruza o limiar de interesse de defesa nacional,
         acionando integracao com o Ministerio da Defesa.
      5. Mapa de dependencias entre IC e sistemas de defesa: identificacao
         de ativos de uso dual (civil e militar) que requerem protecao reforçada.
    tools:
      - multi-framework-compliance-platform
      - cemaden-integration
      - civil-military-comm-protocol
      - defense-threshold-classifier
      - dual-use-asset-registry
  devsecops:
    prose: |
      **Conformidade multi-framework no pipeline:**
      1. Mapeamento automatico de controles entre frameworks: quando um controle
         da PNSIC e implementado, identificar automaticamente controles
         equivalentes na PNCiber, PNSI e NIST CSF que tambem sao satisfeitos.
      2. Relatorio de conformidade cruzada: evidencia de conformidade com PNSIC
         reutilizada como evidencia parcial de conformidade com PNCiber,
         reduzindo overhead de auditoria.
      3. Pipeline de seguranca com perfil adaptado ao regime de ameaca nacional:
         em situacoes de alerta nacional elevado (definido pelo GSI/PR), o
         pipeline ativa controles adicionais automaticamente.
      4. Documentacao tecnica de sistemas de IC em formato padrao do governo:
         compativel com os sistemas do Ministerio da Defesa e GSI/PR.
      5. Validacao de cumprimento da politica de soberania digital: sistemas
         de IC de alta criticidade nao devem depender de software ou
         infraestrutura de paises classificados como risco a soberania nacional.
    tools:
      - cross-framework-control-mapper
      - unified-evidence-repository
      - threat-level-adaptive-pipeline
      - government-standard-documentation
      - digital-sovereignty-checker
  secops:
    prose: |
      **Operacao integrada entre politicas:**
      1. Comite de coordenacao inter-ministerial de IC: reunioes trimestrais
         com GSI/PR, Ministerio da Defesa, MJSP, Casa Civil e reguladores
         setoriais para alinhamento das politicas na pratica.
      2. Protocolo conjunto de resposta a crises nacionais envolvendo IC:
         definicao clara de quem lidera a resposta (civil ou militar) e
         quando ocorre a transicao de regime.
      3. Treinamento conjunto de profissionais civis e militares em seguranca
         de IC: exercicios que integram forças armadas, policia federal e
         operadores de IC privados.
      4. Indicadores de integracao das politicas: medir se os objetivos da
         PNSIC estao alinhados com os objetivos das politicas relacionadas,
         identificando divergencias que exigem harmonizacao normativa.
      5. Processo de revisao coordenada: atualizacoes na PNSI ou PNCiber
         devem automaticamente desencadear revisao da PNSIC para garantir
         coerencia do ecosistema normativo de seguranca nacional.
    tools:
      - interministerial-coordination-platform
      - crisis-regime-transition-protocol
      - joint-training-management
      - policy-alignment-indicators
      - coordinated-review-workflow
