id: art-14
family: cap-5
title: "Competencias dos Orgaos Reguladores Setoriais e Obrigacoes dos Operadores"
class: PNSIC
baselines: [critical-infrastructure]
statement:
  prose: |
    Art. 14. Compete aos órgãos reguladores setoriais:
    I - elaborar regulamentação setorial específica de segurança de IC em
    alinhamento com as diretrizes da PNSIC e do GSI/PR;
    II - supervisionar o cumprimento das obrigações de segurança de IC
    pelos operadores sob sua jurisdição;
    III - aplicar sanções aos operadores que não cumprirem as obrigações
    de segurança de IC, conforme previsto na legislação específica do setor;
    IV - reportar ao GSI/PR sobre o nível de conformidade dos operadores
    e os incidentes de IC ocorridos no setor.

    Art. 14-A. Os operadores de infraestruturas críticas são obrigados a:
    I - implementar as medidas de segurança previstas neste Decreto e na
    regulamentação setorial aplicável;
    II - notificar o órgão regulador setorial e o CTIR Gov de incidentes
    de segurança que afetem ou possam afetar a prestação de serviços essenciais;
    III - cooperar com as atividades de supervisão e auditoria dos órgãos
    competentes.
guidance:
  prose: |
    O art. 14 distribui responsabilidades entre os reguladores setoriais e
    estabelece as obrigacoes dos operadores de IC.

    **Principio da subsidiariedade regulatoria:**
    O modelo adotado segue o principio da subsidiariedade: o GSI/PR define
    as diretrizes gerais, e o regulador setorial (que conhece profundamente
    seu setor) define os requisitos especificos. Isso garante proporcionalidade
    e efetividade da regulacao.

    **Notificacao de incidentes como obrigacao:**
    O art. 14-A, inciso II, cria obrigacao formal de notificacao de incidentes
    ao regulador setorial e ao CTIR Gov. Esta obrigacao e fundamental para:
    - Alertar outros operadores sobre ameacas em andamento
    - Permitir resposta coordenada do governo federal
    - Alimentar a base de conhecimento nacional sobre ameacas a IC

    **Sancoes como mecanismo de enforcement:**
    O inciso III do art. 14 menciona a possibilidade de sancoes, mas remete
    a legislacao especifica de cada setor. A efetividade da PNSIC depende
    da eficacia dos mecanismos de enforcement dos reguladores setoriais.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de supervisao e notificacao:**
      1. Portal de notificacao de incidentes de IC do CTIR Gov: interface
         padronizada para todos os setores reportarem incidentes, com campos
         obrigatorios alinhados a taxonomias internacionais (STIX, TLP).
      2. Painel de conformidade por operador: regulador setorial visualiza
         o status de conformidade de cada operador sob sua jurisdicao, com
         alertas de nao conformidade.
      3. API de integracao entre sistemas dos operadores e o portal de notificacao:
         notificacao automatica de incidentes detectados por sistemas SIEM/SOC.
      4. Trilha de auditoria completa de todas as notificacoes e acoes tomadas,
         com imutabilidade e criptografia para garantir integridade das evidencias.
      5. Dashboard cruzado reguladores x GSI/PR: visao consolidada de conformidade
         e incidentes em todos os setores, atualizada em tempo real.
    tools:
      - ctir-gov-incident-portal
      - regulator-compliance-dashboard
      - siem-to-portal-integration-api
      - immutable-audit-trail
      - cross-sector-compliance-view
  devsecops:
    prose: |
      **Conformidade automatizada no pipeline:**
      1. Verificacao automatica de conformidade com requisitos do regulador
         setorial no pipeline de CI/CD: scan contra checklist ANEEL (energia),
         ANATEL (telecom), BACEN (financas) conforme o setor do operador.
      2. Notificacao automatica de vulnerabilidades criticas ao time de secops
         para avaliar necessidade de notificacao ao regulador (CVSSv3 >= 9.0
         em sistemas de IC = notificacao obrigatoria em 24h).
      3. Relatorio automatico de conformidade gerado a cada release: evidencias
         de execucao de testes de seguranca, resultados de scans, aprovacoes.
      4. Integracao do pipeline com portal do regulador: operadores enviam
         evidencias de conformidade digitalmente, reduzindo burocracia.
      5. Alert de degradacao de conformidade: qualquer mudanca que reduza o
         nivel de conformidade dispara alerta imediato ao CISO.
    tools:
      - sector-compliance-scanner
      - vulnerability-notification-rules
      - automated-compliance-report
      - regulator-portal-integration
      - compliance-degradation-alert
  secops:
    prose: |
      **Gestao de obrigacoes de notificacao:**
      1. Processo de triage de incidentes com criterio claro de notificacao
         obrigatoria: matriz de decisao (setor + impacto + probabilidade de
         afecao de servicos essenciais) que determina prazo de notificacao.
      2. Runbook de notificacao de incidentes ao CTIR Gov: procedimento
         passo-a-passo com template de relatorio e contatos emergenciais.
      3. Historico de notificacoes com status de resolucao: registro completo
         de todos os incidentes notificados, acoes tomadas e licoes aprendidas.
      4. Programa de supervisao proativa: auditoria interna semestral de
         conformidade com a PNSIC antes da auditoria do regulador setorial.
      5. Canal direto de comunicacao com o regulador setorial: gestor de
         seguranca de IC com acesso direto ao regulador para casos urgentes.
    tools:
      - incident-triage-matrix
      - ctir-gov-notification-runbook
      - incident-history-registry
      - internal-compliance-audit-tool
      - regulator-direct-communication-channel
