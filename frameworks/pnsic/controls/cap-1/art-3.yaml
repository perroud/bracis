id: art-3
family: cap-1
title: "Ambito de Aplicacao e Responsabilidades dos Operadores"
class: PNSIC
baselines: [critical-infrastructure]
statement:
  prose: |
    Art. 3. A PNSIC aplica-se a:
    I - órgãos e entidades da administração pública federal que operam,
    regulam ou supervisionam infraestruturas críticas nacionais;
    II - entidades do setor privado que operam infraestruturas críticas
    nacionais, inclusive concessionárias, permissionárias e autorizatárias
    de serviços públicos essenciais;
    III - organismos internacionais que operem infraestruturas críticas
    em território brasileiro.

    Parágrafo único. Os operadores de infraestruturas críticas deverão
    adotar medidas de proteção proporcionais ao nível de risco de cada
    ativo, em conformidade com as diretrizes estabelecidas pelos órgãos
    reguladores de cada setor e pelo GSI/PR.
guidance:
  prose: |
    O art. 3 define o escopo de aplicacao da PNSIC, abrangendo tanto
    atores publicos quanto privados que operem infraestruturas criticas
    em territorio nacional.

    **Aplicacao ao setor privado:**
    A extensao da PNSIC ao setor privado e elemento central da politica,
    reconhecendo que a maior parte das infraestruturas criticas brasileiras
    e operada por empresas privadas (concessionarias de energia, operadoras
    de telecomunicacoes, bancos, etc).

    **Principio de proporcionalidade:**
    O paragrafo unico estabelece o principio de proporcionalidade: as medidas
    de protecao devem ser calibradas pelo nivel de risco de cada ativo, evitando
    sobrecarga regulatoria em ativos de menor criticidade.

    **Papel dos orgaos reguladores:**
    Os reguladores setoriais (ANEEL, ANATEL, ANTAQ, ANA, BACEN) sao
    responsaveis por traduzir as diretrizes da PNSIC em requisitos especificos
    para cada setor, com supervisao e coordenacao do GSI/PR.
implementation_guidance:
  platform_engineering:
    prose: |
      **Arquitetura de conformidade proporcional ao risco:**
      1. Implementar framework de classificacao de risco em tres niveis
         (baixo, medio, alto) para cada ativo de infraestrutura critica,
         determinando os controles obrigatorios proporcionais.
      2. Plataforma unificada de gestao de conformidade que agregue requisitos
         do regulador setorial com as diretrizes do GSI/PR, evitando sobreposicao.
      3. APIs de integracao com sistemas de reguladores setoriais (ANEEL, ANATEL,
         BACEN) para receber e responder a requisicoes de conformidade automaticamente.
      4. Ambiente de nuvem soberana ou datacenter nacional para dados e sistemas
         de operadores privados classificados como IC, garantindo soberania territorial.
      5. Logs imutaveis e auditaveis de todas as operacoes em sistemas de IC,
         acessiveis pelos reguladores mediante requisicao formal.
    tools:
      - risk-classification-engine
      - compliance-aggregation-platform
      - regulator-api-integration
      - sovereign-cloud
      - immutable-audit-logs
  devsecops:
    prose: |
      **Pipeline adaptado ao nivel de risco:**
      1. Controles de pipeline escalados pelo nivel de risco do sistema:
         - Risco baixo: SAST + secret detection
         - Risco medio: + DAST + dependency scanning
         - Risco alto: + container scanning + fuzzing + penetration testing
      2. Ambiente de homologacao isolado e equivalente ao producao para
         sistemas de alto risco antes de qualquer mudanca em IC.
      3. Aprovacoes multiplas com segregacao de funcoes para deploys em
         sistemas de infraestrutura critica de alto risco.
      4. Auditoria automatica de acesso ao codigo-fonte de sistemas IC:
         cada acesso registrado com justificativa e aprovacao previa.
      5. Rotacao automatica de segredos e credenciais em ciclos mais curtos
         para sistemas de IC (maxima exposicao: 30 dias).
    tools:
      - risk-tiered-pipeline
      - isolated-staging-environment
      - multi-approval-workflow
      - code-access-audit
      - secrets-rotation-automation
  secops:
    prose: |
      **Gestao de conformidade para operadores privados:**
      1. Programa de auditoria periodica de conformidade com a PNSIC:
         auto-avaliacao semestral e auditoria independente anual.
      2. Reporte obrigatorio ao regulador setorial e ao GSI/PR de incidentes
         em IC dentro de prazos definidos (criticos: 2h; significativos: 24h).
      3. Plano de adequacao formal para operadores que nao atendam aos
         requisitos minimos, com cronograma e metas mensuravies.
      4. Cooperacao com GSI/PR em exercicios e simulacoes nacionais de
         seguranca de infraestruturas criticas.
      5. Designacao formal de gestor de seguranca de infraestrutura critica
         em cada operador privado, com contato direto com o regulador setorial.
    tools:
      - compliance-self-assessment-platform
      - incident-reporting-system
      - remediation-plan-tracker
      - security-officer-registry
