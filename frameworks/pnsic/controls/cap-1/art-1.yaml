id: art-1
family: cap-1
title: "Instituicao da PNSIC e Definicao de Infraestrutura Critica"
class: PNSIC
baselines: [critical-infrastructure]
statement:
  prose: |
    Art. 1. Fica instituída a Política Nacional de Segurança de Infraestruturas
    Críticas (PNSIC) com a finalidade de proteger as infraestruturas críticas
    nacionais contra ameaças, vulnerabilidades e desastres, garantindo a
    continuidade dos serviços essenciais ao funcionamento do Estado e da sociedade.

    Art. 2. Para os fins deste Decreto, considera-se:
    I - infraestrutura crítica: instalações, serviços, bens e sistemas cujas
    interrupções ou destruições, total ou parcialmente, provocarão sério impacto
    social, econômico, político, internacional ou à segurança nacional;
    II - setor de infraestrutura crítica: conjunto de ativos, sistemas e redes
    pertencentes a um mesmo ramo de atividade que presta serviços essenciais
    à população e ao Estado.
guidance:
  prose: |
    O art. 1 institui a PNSIC como instrumento normativo central para protecao
    das infraestruturas criticas nacionais, e o art. 2 estabelece as definicoes
    operacionais que delimitam o escopo de aplicacao da politica.

    **Criterio de criticidade:**
    Uma infraestrutura e considerada critica quando sua interrupcao ou destruicao
    — total ou parcial — provocaria impacto serio em pelo menos uma das seguintes
    dimensoes:
    1. Social: afetando servicos essenciais a populacao (saude, energia, agua)
    2. Economica: provocando perdas economicas significativas ao pais
    3. Politica: comprometendo a capacidade de governanca do Estado
    4. Internacional: afetando compromissos e relacoes diplomaticas do Brasil
    5. Seguranca nacional: ameacando a soberania e a defesa do territorio nacional

    **Dupla dimensao da PNSIC:**
    A politica atua em duas dimensoes complementares:
    - Dimensao preventiva: protecao contra ameacas e vulnerabilidades conhecidas
    - Dimensao reativa: garantia de continuidade mesmo apos incidentes ou desastres

    **Articulacao com PNSI:**
    A PNSIC e instrumento especifico da PNSI (Decreto 9.637/2018), aplicando
    os principios gerais de seguranca da informacao ao contexto especifico
    das infraestruturas criticas nacionais.
implementation_guidance:
  platform_engineering:
    prose: |
      **Identificacao e classificacao de infraestruturas criticas:**
      1. Implementar inventario centralizado de ativos com classificacao de
         criticidade baseada nos cinco criterios do art. 2 (social, economico,
         politico, internacional, seguranca nacional).
      2. Arquitetura de alta disponibilidade com topologia N+1 ou N+2 para
         sistemas identificados como infraestrutura critica, garantindo
         continuidade mesmo em falhas parciais.
      3. Segmentacao logica de redes por nivel de criticidade, isolando sistemas
         criticos em zonas protegidas com controles de acesso rigorosos.
      4. Mapeamento de dependencias entre infraestruturas criticas para identificar
         pontos unicos de falha (single points of failure) e cascata de impactos.
      5. Definicao formal de RTOs (Recovery Time Objective) e RPOs (Recovery Point
         Objective) por nivel de criticidade da infraestrutura.
    tools:
      - asset-inventory-platform
      - criticality-classification-engine
      - network-segmentation-tools
      - dependency-mapping
      - high-availability-cluster
  devsecops:
    prose: |
      **Pipeline para sistemas de infraestrutura critica:**
      1. Gate de classificacao de criticidade: todo sistema novo deve ser avaliado
         quanto aos criterios do art. 2 antes do primeiro deploy em producao.
      2. Controles de deploy reforcados para sistemas classificados como IC:
         aprovacoes multiplas, janelas de manutencao restritas, rollback automatico.
      3. Testes de resiliencia automatizados no pipeline (chaos engineering) para
         verificar que o sistema mantem servicos essenciais sob condicoes adversas.
      4. Versionamento imutavel de artefatos para infraestruturas criticas, garantindo
         rastreabilidade completa de cada versao em producao.
      5. Analise de impacto automatica: toda mudanca em sistema IC gera relatorio
         de impacto potencial nas dimensoes definidas no art. 2.
    tools:
      - gitlab-ci
      - chaos-engineering-tools
      - immutable-artifact-registry
      - impact-analysis-engine
  secops:
    prose: |
      **Operacao de seguranca para infraestruturas criticas:**
      1. Registro formal de todos os ativos classificados como infraestrutura critica,
         com atualizacao obrigatoria a cada mudanca significativa de escopo ou funcao.
      2. Monitoramento continuo 24x7 com alertas de prioridade maxima para qualquer
         anomalia em sistemas classificados como IC.
      3. Procedimentos de escalonamento especificos para incidentes em IC, com
         notificacao imediata ao GSI/PR e ao orgao regulador do setor afetado.
      4. Avaliacao periodica (minimo anual) dos criterios de criticidade para cada
         ativo, dado que novos riscos podem alterar o nivel de impacto potencial.
      5. Exercicios de continuidade simulando interrupcoes totais e parciais de
         cada infraestrutura critica identificada.
    tools:
      - soc-platform
      - asset-registry
      - incident-management
      - continuity-exercise-platform
