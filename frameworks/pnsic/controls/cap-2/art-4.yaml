id: art-4
family: cap-2
title: "Principios da PNSIC"
class: PNSIC
baselines: [critical-infrastructure]
statement:
  prose: |
    Art. 4. São princípios da PNSIC:
    I - prevenção: adoção antecipada de medidas para evitar incidentes
    em infraestruturas críticas;
    II - precaução: ação diante de ameaças de danos graves, mesmo na
    ausência de certeza científica absoluta sobre o risco;
    III - resiliência: capacidade de infraestruturas críticas de absorver
    perturbações e manter ou recuperar rapidamente funções essenciais;
    IV - cooperação: articulação entre órgãos públicos, setor privado e
    organismos internacionais para proteção das infraestruturas críticas;
    V - proporcionalidade: medidas de segurança calibradas ao nível de
    risco e ao impacto potencial de cada infraestrutura;
    VI - gradualidade: implementação progressiva dos requisitos, considerando
    a capacidade técnica e financeira dos operadores;
    VII - confidencialidade: proteção das informações sensíveis sobre
    infraestruturas críticas, restringindo acesso a quem necessitar.
guidance:
  prose: |
    O art. 4 estabelece os sete principios que orientam toda a politica
    de seguranca de infraestruturas criticas no Brasil.

    **Prevencao x precaucao:**
    A distincao entre os dois primeiros principios e fundamental:
    - Prevencao: atua sobre riscos conhecidos e quantificaveis
    - Precaucao: atua sobre riscos potenciais ainda nao completamente
      caracterizados, impedindo que a incerteza paralise a acao protetiva

    **Resiliencia como objetivo central:**
    O principio da resiliencia representa uma evolucao em relacao a modelos
    anteriores baseados apenas em prevencao. Reconhece-se que incidentes
    ocorrerao, e o objetivo e minimizar o impacto e maximizar a velocidade
    de recuperacao.

    **Tensao entre cooperacao e confidencialidade:**
    Os principios IV e VII criam tensao produtiva: cooperar exige compartilhar
    informacoes sobre vulnerabilidades e ameacas, mas confidencialidade exige
    proteger essas mesmas informacoes de atores mal-intencionados. O equilibrio
    e operacionalizado por canais seguros de compartilhamento (ex: MISP setorial).
implementation_guidance:
  platform_engineering:
    prose: |
      **Arquitetura baseada nos principios da PNSIC:**
      1. Prevencao por design: threat modeling obrigatorio na fase de arquitetura
         de todo sistema classificado como IC, identificando e mitigando ameacas
         antes da implementacao.
      2. Arquitetura resiliente: implementar padroes de resiliencia (circuit
         breaker, bulkhead, retry com backoff exponencial) em todos os servicos
         criticos para manter funcionalidade parcial sob falhas.
      3. Redundancia geografica: sistemas de IC com RPO zero devem operar em
         pelo menos dois datacenters distantes, com sincronizacao em tempo real.
      4. Degradacao gracosa: sistemas devem manter funcoes essenciais mesmo
         com perda de componentes nao criticos (design for failure).
      5. Gradualidade na migracao: planos de migracao para novos controles
         com fases definidas, priorizando sistemas de alto risco.
    tools:
      - threat-modeling-tools
      - resilience-patterns-library
      - geo-redundant-infra
      - graceful-degradation-framework
  devsecops:
    prose: |
      **Principios no ciclo de desenvolvimento:**
      1. Precaucao no code review: qualquer mudanca que afete sistemas IC deve
         incluir analise de impacto de seguranca, mesmo quando nao ha vulnerabilidade
         conhecida identificada.
      2. Testes de resiliencia automatizados: simulacao de falhas de componentes
         (chaos testing) como etapa obrigatoria no pipeline de sistemas IC.
      3. Feature flags com rollback instantaneo: toda mudanca em sistema IC
         deve ter mecanismo de desativacao imediata sem redeploy.
      4. Proporcionalidade no pipeline: o nivel de rigor dos controles de seguranca
         no CI/CD deve ser proporcional ao nivel de criticidade do sistema.
      5. Confidencialidade no pipeline: segredos de sistemas IC armazenados
         em cofre separado, com acesso auditado e rotacao automatica.
    tools:
      - chaos-testing-tools
      - feature-flag-platform
      - vault-secrets-manager
      - risk-proportional-pipeline
  secops:
    prose: |
      **Operacionalizacao dos principios:**
      1. Programa de threat intelligence proativo (prevencao): assinatura de
         feeds especializados em ameacas a infraestruturas criticas por setor.
      2. Processo de avaliacao de riscos emergentes (precaucao): reuniao mensal
         para avaliar novas ameacas mesmo sem incidentes confirmados.
      3. Metricas de resiliencia: MTTR (Mean Time To Recovery) e MTTD (Mean Time
         To Detect) como indicadores primarios de desempenho para equipe de secops.
      4. Protocolo de compartilhamento confidencial: canal seguro (TLP: RED/AMBER)
         para troca de informacoes sobre vulnerabilidades de IC com reguladores.
      5. Plano de graduacao de controles: roadmap documentado com prazos para
         atingir niveis mais elevados de maturidade de seguranca de IC.
    tools:
      - threat-intelligence-feeds
      - risk-assessment-platform
      - secops-metrics-dashboard
      - secure-sharing-platform-tlp
