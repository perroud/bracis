id: art-6
family: cap-2
title: "Cooperacao Publico-Privada para Protecao de Infraestruturas Criticas"
class: PNSIC
baselines: [critical-infrastructure]
statement:
  prose: |
    Art. 6. A cooperação entre o setor público e o setor privado para
    proteção das infraestruturas críticas nacionais será promovida mediante:
    I - compartilhamento de informações sobre ameaças, vulnerabilidades e
    incidentes em canais seguros e confidenciais;
    II - desenvolvimento conjunto de planos setoriais de segurança de
    infraestruturas críticas;
    III - realização de exercícios e simulações conjuntas para teste de
    planos de contingência e recuperação;
    IV - capacitação e treinamento de profissionais de segurança de IC
    em programas conjuntos;
    V - desenvolvimento colaborativo de normas técnicas e boas práticas
    setoriais em segurança de infraestruturas críticas.
guidance:
  prose: |
    O art. 6 operacionaliza o principio da cooperacao, definindo os cinco
    mecanismos concretos pelos quais a parceria publico-privada se realizara.

    **Modelo de parceria estruturado:**
    Os cinco mecanismos criam um ciclo virtuoso: o compartilhamento de
    informacoes (I) alimenta os planos setoriais (II), que sao testados
    em exercicios (III), com profissionais capacitados (IV) e apoiados
    por normas tecnicas (V).

    **Confianca como pre-requisito:**
    O compartilhamento de informacoes sobre vulnerabilidades entre concorrentes
    (ex: dois bancos) ou entre empresa privada e governo exige confianca mutua.
    O requisito de canais seguros e confidenciais e fundamental para que operadores
    privados se sintam protegidos ao reportar vulnerabilidades sem risco de
    exposicao competitiva ou reputacional.

    **Normas tecnicas setoriais:**
    O inciso V estabelece que normas devem ser desenvolvidas colaborativamente,
    evitando regulacao tecnica unilateral que ignore a realidade operacional dos
    setores. Isso segue o modelo do NIST nos EUA, onde o NIST CSF foi desenvolvido
    com ampla participacao da industria.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura para cooperacao publico-privada:**
      1. Plataforma de compartilhamento de inteligencia de ameacas (ISAC -
         Information Sharing and Analysis Center) por setor, operada com
         controles TLP (Traffic Light Protocol) para confidencialidade.
      2. API padronizada pelo GSI/PR para integracao de sistemas de diferentes
         operadores de IC em atividades de monitoramento colaborativo.
      3. Ambiente de exercicios simulados acessivel por operadores privados:
         sandbox com replicas de sistemas criticos para teste de cenarios
         sem risco de impacto em producao.
      4. Portal seguro de normas tecnicas setoriais, com versionamento e
         historico de contribuicoes de cada participante.
      5. Sistema de notificacao de incidentes anonimizavel: permite que
         operadores reportem incidentes ao CERT setorial sem exposicao
         de identidade competitiva.
    tools:
      - isac-platform
      - threat-intel-sharing-api
      - exercise-sandbox-environment
      - technical-standards-portal
      - anonymous-incident-reporting
  devsecops:
    prose: |
      **Ferramentas para cooperacao no desenvolvimento:**
      1. Repositorio compartilhado de regras de deteccao (Sigma, YARA, Snort)
         desenvolvidas colaborativamente entre operadores do mesmo setor.
      2. Templates de pipeline de seguranca padronizados por setor, disponibilizados
         pelo regulador setorial e adaptados pelos operadores.
      3. Biblioteca de testes de seguranca especificos por setor, compartilhada
         entre operadores via repositorio privado com acesso controlado.
      4. Programa de bug bounty setorial: recompensas por vulnerabilidades
         encontradas em infraestruturas criticas, coordenado pelo regulador.
      5. Simulacoes de ataque em ambiente isolado com participacao de red teams
         de diferentes operadores para compartilhamento de TTPs (Tactics,
         Techniques and Procedures).
    tools:
      - detection-rules-repository
      - sector-pipeline-templates
      - sector-security-tests-library
      - bug-bounty-platform
      - red-team-coordination-platform
  secops:
    prose: |
      **Operacao colaborativa de seguranca:**
      1. ISACs setoriais com reunioes mensais de compartilhamento de ameacas:
         ISAC Energia, ISAC Telecom, ISAC Financeiro, ISAC Agua, ISAC Transportes.
      2. Exercicio nacional anual de seguranca de IC com participacao obrigatoria
         dos operadores de cada setor, coordenado pelo GSI/PR.
      3. Trilha de certificacao conjunta publico-privada em seguranca de IC,
         reconhecida pelos reguladores setoriais como equivalente a credenciamento.
      4. Grupo de trabalho permanente por setor para desenvolvimento colaborativo
         de normas tecnicas, com participacao equilibrada de governo e industria.
      5. Dashboard publico de maturidade de seguranca por setor (anonimizado),
         incentivando melhoria continua por benchmark entre pares.
    tools:
      - isac-operations-platform
      - national-exercise-coordinator
      - certification-tracking-system
      - working-group-collaboration-platform
