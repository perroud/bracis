id: art-5
family: cap-2
title: "Objetivos Estrategicos da PNSIC"
class: PNSIC
baselines: [critical-infrastructure]
statement:
  prose: |
    Art. 5. São objetivos da PNSIC:
    I - identificar, prevenir, detectar, responder e recuperar infraestruturas
    críticas de ameaças, vulnerabilidades e desastres;
    II - promover a resiliência das infraestruturas críticas nacionais;
    III - fomentar a cultura de segurança de infraestruturas críticas entre
    operadores públicos e privados;
    IV - fortalecer a cooperação nacional e internacional para segurança
    de infraestruturas críticas;
    V - integrar as ações de segurança de infraestruturas críticas com as
    políticas de defesa nacional, segurança cibernética e segurança da informação;
    VI - promover o desenvolvimento de tecnologias e capacidades nacionais para
    proteção de infraestruturas críticas;
    VII - garantir a continuidade dos serviços essenciais prestados pelas
    infraestruturas críticas ao Estado e à sociedade.
guidance:
  prose: |
    O art. 5 traduz os principios do art. 4 em objetivos concretos e mensuraveis
    para a politica de seguranca de infraestruturas criticas.

    **Ciclo completo de seguranca:**
    O inciso I enumera o ciclo completo de resposta a ameacas: identificar,
    prevenir, detectar, responder e recuperar — alinhado ao ciclo do NIST CSF
    (Identify, Protect, Detect, Respond, Recover) e ao ciclo PDCA de qualidade.

    **Soberania tecnologica (inciso VI):**
    O objetivo de desenvolvimento de tecnologias nacionais e elemento estrategico:
    a dependencia de tecnologia estrangeira em sistemas de IC cria riscos de
    supply chain que comprometem a soberania nacional. O objetivo estimula
    P&D nacional em seguranca de IC.

    **Integracao com outras politicas (inciso V):**
    A PNSIC nao opera isolada: ela se integra com:
    - Politica de Defesa Nacional (Decreto 9.638/2018)
    - Politica Nacional de Ciberseguranca (PNCiber)
    - Politica Nacional de Seguranca da Informacao (PNSI)
    Esta integracao evita lacunas e sobreposicoes regulatorias.
implementation_guidance:
  platform_engineering:
    prose: |
      **Ciclo completo de seguranca na arquitetura:**
      1. Plataforma integrada de security operations com as cinco fases do
         ciclo (identificar, prevenir, detectar, responder, recuperar) como
         processos automatizados e mensurados.
      2. CMDB (Configuration Management Database) para identificacao continua
         de todos os ativos de IC, com atualizacao automatica via discovery.
      3. Plataforma de threat modeling e vulnerability management integrada
         ao ciclo de vida de desenvolvimento para prevencao sistematica.
      4. SOC com capacidades de deteccao em tempo real (SIEM + EDR + NDR)
         para todos os sistemas classificados como IC.
      5. Tecnologias nacionais preferidas (lista de produtos homologados pelo
         GSI/PR) para sistemas de IC de alto risco.
    tools:
      - integrated-security-operations-platform
      - cmdb-asset-discovery
      - siem-edr-ndr-stack
      - national-approved-products-registry
  devsecops:
    prose: |
      **Ciclo de desenvolvimento alinhado aos objetivos PNSIC:**
      1. Maturidade de seguranca medida em cada sprint: indicadores de prevencao
         (vulnerabilidades abertas), deteccao (MTTD) e recuperacao (MTTR) como
         metricas de qualidade do produto.
      2. Integracao de continuidade de servicos no design: toda funcionalidade
         de negocio deve ter modo degradado definido para manutencao do servico
         essencial em caso de falha.
      3. Pipeline de desenvolvimento que promove tecnologias open source nacionais
         (quando equivalentes em qualidade e seguranca) para reducao de dependencia
         de fornecedores estrangeiros.
      4. Testes de recuperacao automatizados: simulacao de perda de componente e
         validacao do tempo de recuperacao contra o RTO definido.
      5. Documentacao de seguranca obrigatoria em formato padronizado pelo GSI/PR
         para sistemas de IC, garantindo interoperabilidade entre orgaos.
    tools:
      - security-metrics-dashboard
      - service-degradation-patterns
      - open-source-preference-policy
      - recovery-test-automation
  secops:
    prose: |
      **Operacionalizacao dos objetivos estrategicos:**
      1. KPIs de seguranca de IC reportados trimestralmente ao GSI/PR:
         numero de incidentes, MTTD, MTTR, nivel de resiliencia por setor.
      2. Programa de capacitacao em seguranca de IC: certificacoes especializadas
         para profissionais de secops que atuam em setores criticos.
      3. Participacao em exercicios internacionais de seguranca de IC (ex: Cyber
         Storm, organizados pela CISA dos EUA, com participacao brasileira).
      4. Programa de fomento a P&D nacional: parcerias com universidades e
         centros de pesquisa para desenvolvimento de tecnologias de protecao
         de IC de origem brasileira.
      5. Relatorio anual de estado da seguranca de infraestruturas criticas
         nacionais, publicado pelo GSI/PR com indicadores por setor.
    tools:
      - kpi-reporting-platform
      - training-certification-management
      - international-exercise-coordination
      - rd-partnership-registry
