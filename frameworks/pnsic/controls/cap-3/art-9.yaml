id: art-9
family: cap-3
title: "Areas Prioritarias no Setor Financeiro e Planos Setoriais da ENSIC"
class: PNSIC
baselines: [critical-infrastructure]
statement:
  prose: |
    Art. 9. No setor financeiro, as áreas prioritárias de atuação da PNSIC
    são:
    I - segurança dos sistemas de liquidação e compensação financeira,
    incluindo o Sistema de Transferência de Reservas (STR) e o Sistema de
    Pagamentos Instantâneos (PIX);
    II - proteção de infraestruturas do mercado de capitais, incluindo
    bolsas de valores e sistemas de custódias;
    III - resiliência de sistemas de meios de pagamento de ampla adoção
    (cartões de crédito e débito, TED, DOC);
    IV - segurança das infraestruturas de open finance e de identidade
    digital do sistema financeiro nacional.

    Art. 9-A. A Estratégia Nacional de Segurança de Infraestruturas Críticas
    (ENSIC), instituída pelo Decreto 10.569/2020, define ações estratégicas
    específicas para cada setor, com prazos, responsáveis e metas mensuráveis,
    devendo ser revisada a cada quatro anos em ciclos alinhados ao planejamento
    governamental.
guidance:
  prose: |
    O art. 9 trata do setor financeiro, cuja particularidade e o papel central
    no funcionamento de toda a economia, e o art. 9-A apresenta a ENSIC como
    instrumento operacional da PNSIC.

    **Sistema Financeiro Nacional como IC de maxima criticidade:**
    O STR (Sistema de Transferencia de Reservas) e operado pelo Banco Central
    e processa bilhoes de reais por dia. Uma interrupcao do STR por horas
    causaria impacto economico sistemico. O PIX, lancado em 2020, criou nova
    dependencia critica com mais de 150 milhoes de usuarios.

    **Ameacas especificas ao setor financeiro:**
    - Ataques DDoS a infraestruturas de internet banking
    - Fraudes em sistemas de transferencia via engenharia social + malware
    - Ataques de supply chain a fornecedores de software financeiro (ex: caso
      SolarWinds com potencial impacto financeiro)
    - Ransomware direcionado a backups de dados de transacoes

    **ENSIC como instrumento de implementacao:**
    O Decreto 10.569/2020 (ENSIC) nao e uma politica nova, mas um plano de
    implementacao da PNSIC com acoes concretas, responsaveis designados e
    indicadores de desempenho por setor. Deve ser revisada a cada 4 anos
    para incorporar novas ameacas e tecnologias.
implementation_guidance:
  platform_engineering:
    prose: |
      **Arquitetura de seguranca para o setor financeiro:**
      1. Arquitetura de alta disponibilidade para o STR e PIX com redundancia
         em tres datacenters geograficamente distribuidos, garantindo RPO zero
         e RTO inferior a 30 minutos.
      2. Implementacao de HSMs (Hardware Security Modules) para protecao de
         chaves criptograficas em sistemas de transferencia financeira.
      3. Segregacao de redes de producao de sistemas financeiros criticos (STR,
         PIX, sistemas de custodias) com monitoramento de anomalias de comportamento.
      4. Infraestrutura de identidade digital robusta para open finance: FAPI
         (Financial-grade API) com autenticacao mutua TLS (mTLS).
      5. Plataforma de monitoramento de fraude em tempo real integrada ao
         monitoramento de seguranca (fraude e IC muitas vezes sao o mesmo ataque).
    tools:
      - hsm-infrastructure
      - financial-grade-api-platform
      - fraud-and-security-monitoring
      - geo-distributed-datacenters
      - fapi-mtls-implementation
  devsecops:
    prose: |
      **Pipeline de desenvolvimento para sistemas financeiros:**
      1. Conformidade com SWIFT Customer Security Programme (CSP) para
         sistemas que se integram com SWIFT, incluindo controles obrigatorios
         certificados anualmente.
      2. Testes de carga e resiliencia obrigatorios para sistemas de pagamento
         instantaneo: validar que o sistema mantem disponibilidade acima de 99.99%
         sob picos de demanda (ex: pagamento de beneficios sociais).
      3. Analise de seguranca de APIs financeiras: OWASP API Security Top 10 como
         checklist obrigatorio em todo pipeline de sistemas de open finance.
      4. Processo de patch emergencial acelerado para vulnerabilidades em sistemas
         de IC financeiros: janela de 24h para vulnerabilidades criticas.
      5. Testes de penetracao dedicados a sistemas de transferencia: red team
         com experiencia em fraudes financeiras e ataques a sistemas bancarios.
    tools:
      - swift-csp-compliance-scanner
      - load-resilience-testing
      - owasp-api-security-checker
      - emergency-patch-process
      - financial-red-team-tools
  secops:
    prose: |
      **Operacao de seguranca no setor financeiro:**
      1. SOC financeiro 24x7 com integracao ao FS-ISAC (Financial Services ISAC)
         internacional para compartilhamento de indicadores de ameaca.
      2. Protocolo de resposta a incidentes especifico para ataques ao STR e PIX:
         escalacao imediata ao BACEN e ao GSI/PR em ate 1 hora.
      3. Exercicio anual Cyber Guardian financeiro: simulacao de ataque sistemico
         coordenado ao sistema financeiro nacional com BACEN e principais bancos.
      4. Monitoramento de dark web para identificacao antecipada de vazamentos
         de dados e credenciais de sistemas financeiros criticos.
      5. Revisao e atualizacao da ENSIC: processo formal de revisao quadrienal
         com participacao dos reguladores setoriais, BACEN, CVM e operadores privados.
    tools:
      - fs-isac-integration
      - bacen-incident-protocol
      - dark-web-monitoring
      - ensic-review-governance-platform
