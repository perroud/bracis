id: art-12
family: cap-4
title: "Exercicios Simulados e Capacitacao em Seguranca de IC"
class: PNSIC
baselines: [critical-infrastructure]
statement:
  prose: |
    Art. 12. O GSI/PR, em cooperação com os órgãos reguladores setoriais
    e os operadores de infraestruturas críticas, promoverá:
    I - exercícios e simulações periódicos para teste dos planos setoriais
    de segurança e dos planos de continuidade operacional;
    II - programas de capacitação e treinamento de profissionais especializados
    em segurança de infraestruturas críticas;
    III - pesquisa e desenvolvimento de tecnologias para proteção de IC,
    em parceria com universidades, centros de pesquisa e setor privado;
    IV - exercícios cross-setoriais para testar a resposta coordenada a
    incidentes que afetam múltiplos setores simultaneamente;
    V - publicação de boas práticas e guias técnicos de segurança de IC
    para cada setor, em linguagem acessível aos operadores.
guidance:
  prose: |
    O art. 12 institui o programa de exercicios e capacitacao como elemento
    central do ciclo de melhoria continua da PNSIC.

    **Exercicios como mecanismo de validacao:**
    Planos de contingencia que nunca foram testados em exercicios nao sao
    planos confiavies. O art. 12 reconhece que a validade de qualquer plano
    de seguranca de IC depende de testes periodicos que revelem lacunas antes
    que incidentes reais as exponham.

    **Niveis de exercicio:**
    Os exercicios devem ocorrer em tres niveis:
    1. Intraorganizacional: cada operador testa seu proprio plano
    2. Setorial: todos os operadores do setor treinam juntos
    3. Cross-setorial: multiplos setores testam resposta coordenada

    **Capacitacao como investimento estrategico:**
    A escassez global de profissionais especializados em seguranca OT/ICS
    e um risco estrategico para o Brasil. O inciso II reconhece que a
    seguranca de IC depende de pessoas qualificadas, nao apenas de tecnologia.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura para exercicios e capacitacao:**
      1. Ambiente de exercicios (cyber range) especifico para IC: replicas
         de sistemas SCADA/ICS dos setores criticos para simulacoes realistas
         sem risco de impacto em infraestruturas reais.
      2. Plataforma de laboratorio virtual para capacitacao: acesso remoto
         a ambientes de pratica com sistemas industriais simulados.
      3. Infraestrutura de comunicacao de crise para exercicios: redes de
         comunicacao alternativas (VHF, satelite) para simular perda de
         comunicacao convencional durante exercicios.
      4. Repositorio de cenarios de exercicios: biblioteca de cenarios de
         ataque realistas baseados em incidentes historicos (adaptados para
         o contexto brasileiro).
      5. Sistema de medicao de desempenho em exercicios: coleta automatica
         de metricas (tempo de deteccao, tempo de resposta, acoes executadas)
         para relatorios de avaliacao pos-exercicio.
    tools:
      - cyber-range-ic-platform
      - virtual-lab-ot-ics
      - crisis-comm-infrastructure
      - exercise-scenario-repository
      - exercise-performance-measurement
  devsecops:
    prose: |
      **Integracao de exercicios no ciclo de desenvolvimento:**
      1. Simulacoes de ataque (red team exercises) integradas ao roadmap de
         releases de sistemas de IC: pre-release red team para sistemas de
         alto risco.
      2. Gamificacao do treinamento de seguranca de IC para desenvolvedores:
         CTF (Capture The Flag) especifico para vulnerabilidades de sistemas
         industriais e de infraestrutura critica.
      3. Trilha de aprendizagem em seguranca de OT/ICS para equipes de
         desenvolvimento que trabalham em sistemas de IC.
      4. Boas praticas setoriais integradas ao code review checklist: guias
         tecnicos da PNSIC convertidos em regras automatizadas de linting
         e analise estatica.
      5. Programa de mentoria entre especialistas de OT e desenvolvedores
         de TI: reduzir a lacuna de conhecimento entre as duas disciplinas.
    tools:
      - red-team-exercise-platform
      - ctf-ics-security-training
      - ot-ics-learning-path
      - security-best-practices-linting
      - mentoring-program-platform
  secops:
    prose: |
      **Programa de exercicios e capacitacao operacional:**
      1. Calendario nacional de exercicios de IC publicado anualmente pelo
         GSI/PR: exercicios setoriais (1 por setor/ano) e cross-setorial
         bienal com participacao obrigatoria.
      2. Certificacao profissional em seguranca de IC: trilha de certificacao
         reconhecida pelo GSI/PR para profissionais de secops em IC
         (equivalente ao GICSP - Global Industrial Cyber Security Professional).
      3. Programa de intercambio de profissionais: rotacao de analistas de
         seguranca entre diferentes setores de IC para disseminacao de
         conhecimento cross-setorial.
      4. Base de conhecimento de licoes aprendidas: repositorio de incidentes
         anonimizados e exercicios, acessivel a todos os operadores de IC.
      5. Parceria com ITA, UNICAMP e USP para P&D em seguranca de IC:
         programas de mestrado e doutorado em seguranca de sistemas ciber-fisicos.
    tools:
      - national-exercise-calendar
      - certification-management-system
      - professional-rotation-program
      - lessons-learned-repository
      - university-partnership-portal
