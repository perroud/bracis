id: art-10
family: cap-4
title: "Gestao de Riscos para Infraestruturas Criticas"
class: PNSIC
baselines: [critical-infrastructure]
statement:
  prose: |
    Art. 10. Os operadores de infraestruturas críticas deverão implementar
    processo sistemático de gestão de riscos que inclua:
    I - identificação e inventário de todos os ativos de IC, incluindo
    sistemas de TI e OT, instalações físicas e dependências de terceiros;
    II - análise e avaliação de riscos considerando ameaças intencionais
    (ciberataques, atos terroristas), acidentais (falhas técnicas, erros
    humanos) e desastres naturais;
    III - definição de tratamento de riscos com medidas de controle
    proporcionais ao nível de criticidade e ao impacto potencial;
    IV - monitoramento contínuo dos riscos e das medidas de controle
    implementadas, com revisão periódica do processo;
    V - documentação formal do processo de gestão de riscos e reporting
    ao órgão regulador setorial e ao GSI/PR.
guidance:
  prose: |
    O art. 10 institui o processo de gestao de riscos como obrigacao formal
    para todos os operadores de IC, seguindo abordagem estruturada e documentada.

    **Abrangencia IT + OT:**
    A gestao de riscos para IC e diferente da gestao de riscos de TI
    convencional por incluir obrigatoriamente os ativos de tecnologia
    operacional (OT). Muitos operadores de IC possuem maturidade em
    gestao de riscos de TI, mas negligenciam o inventario e analise de
    riscos dos sistemas SCADA/ICS, que frequentemente sao mais vulneraveis
    (sistemas legados, sem patches, com acesso remoto inseguro).

    **Tres tipos de ameaca:**
    O inciso II classifica ameacas em tres categorias que exigem abordagens
    distintas:
    - Intencionais: threat modeling, inteligencia de ameacas, adversary simulation
    - Acidentais: analise de modo de falha (FMEA), redundancia, treinamento
    - Desastres naturais: planos de contingencia geografica, backup offsite

    **Reporting como mecanismo de supervisao:**
    O inciso V cria obrigacao de reporting ao regulador e ao GSI/PR, essencial
    para que o governo federal tenha visao consolidada do nivel de risco das
    infraestruturas criticas nacionais e possa priorizar recursos e acoes.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de gestao de riscos para IC:**
      1. CMDB unificado abrangendo todos os ativos de TI e OT de infraestrutura
         critica, com atualizacao automatica via agentes de discovery e integracao
         com sistemas de gestao industrial (CMMS, EAM).
      2. Plataforma GRC (Governance, Risk and Compliance) especializada em IC:
         suporte a frameworks NIST CSF, IEC 62443 e PNSIC simultaneamente.
      3. Motor de calculo de risco quantitativo (FAIR - Factor Analysis of
         Information Risk) para priorizar investimentos em controles de seguranca.
      4. Dashboard de risco por setor com visibilidade para o GSI/PR: permite
         comparacao de niveis de risco entre operadores do mesmo setor.
      5. Integracao com sistemas de monitoring para alimentacao automatica
         de indicadores de risco em tempo real (risco dinamico vs. risco estatico).
    tools:
      - unified-cmdb-it-ot
      - grc-platform-pnsic
      - fair-risk-calculation
      - gsi-pr-risk-dashboard
      - dynamic-risk-monitoring
  devsecops:
    prose: |
      **Gestao de riscos no ciclo de desenvolvimento:**
      1. Risk register integrado ao backlog: toda mudanca em sistema IC deve
         ter risco associado avaliado antes de entrar no sprint.
      2. FMEA automatizado para mudancas em sistemas criticos: analise de
         modos de falha antes de qualquer deploy em producao.
      3. Analise de dependencias de terceiros (supply chain risk): todo
         novo fornecedor ou componente de software deve ser avaliado quanto
         ao risco de IC introduzido.
      4. Metricas de risco tecnico no pipeline: debt de seguranca, densidade
         de vulnerabilidades por componente, cobertura de testes de seguranca.
      5. Relatorio automatico de mudancas no perfil de risco ao CISO apos
         cada release, integrando resultados de scanners de seguranca.
    tools:
      - risk-register-backlog-integration
      - fmea-automation
      - supply-chain-risk-analyzer
      - security-debt-tracking
      - automated-risk-report
  secops:
    prose: |
      **Operacao baseada em risco:**
      1. Ciclo formal de gestao de riscos: identificacao (mensal), analise
         (trimestral), avaliacao (semestral), tratamento (continuo), revisao
         (anual) com documentacao auditavel.
      2. Threat intelligence especifica por setor alimentando o risk register:
         novos IOCs e TTPs identificados devem atualizar automaticamente o
         nivel de risco dos ativos relacionados.
      3. Relatorio trimestral de risco ao regulador setorial e anual ao GSI/PR,
         em formato padronizado definido pela PNSIC.
      4. Exercicios de avaliacao de risco com stakeholders tecnicos e de negocio:
         workshops de risk assessment que incluem especialistas de OT e de IC.
      5. Auditoria externa independente do processo de gestao de riscos a cada
         dois anos para validacao e credibilidade perante reguladores.
    tools:
      - grc-risk-lifecycle-platform
      - threat-intel-risk-integration
      - regulatory-reporting-templates
      - risk-workshop-facilitation
      - external-audit-coordination
