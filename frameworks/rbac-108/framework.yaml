control_families:
  - id: sec-1
    title: "Disposicoes Gerais AVSEC Cibernetica"
    description: "Escopo de aplicacao, definicoes e obrigacoes gerais dos operadores aereos em seguranca cibernetica de aviacao civil"
    articles: "108.1 ao 108.10"
    control_count: 2
  - id: sec-2
    title: "Requisitos de Seguranca Cibernetica para Operadores Aereos"
    description: "Plano de seguranca cibernetica, protecao de sistemas criticos, EFBs, DCS, redes aeronauticas e treinamento de pessoal"
    articles: "108.15 ao 108.35"
    control_count: 3
  - id: sec-3
    title: "Resposta a Incidentes e Continuidade Operacional"
    description: "Notificacao de incidentes ciberneticos a ANAC, plano de resposta, continuidade de operacoes de voo e alinhamento com ICAO"
    articles: "108.40 ao 108.55"
    control_count: 3
related_frameworks:
  - framework_id: rbac-107
    relationship: complements
    description: >-
      O RBAC 107 trata de seguranca cibernetica para aerodromos; o
      RBAC 108 trata especificamente dos operadores aereos (companhias
      aereas). Os dois regulamentos sao complementares no ecossistema
      AVSEC brasileiro.
  - framework_id: iso-27001-2022
    relationship: mapped
    description: >-
      A ISO 27001:2022 fornece o framework de gestao de seguranca da
      informacao que suporta a conformidade com o RBAC 108, em especial
      os controles do Anexo A relativos a seguranca de redes e
      sistemas.
  - framework_id: gsi-in3
    relationship: mapped
    description: "A Instrucao Normativa GSI/PR n. 3 estabelece requisitos de seguranca da informacao para a administracao publica federal que se alinham com os requisitos ciberneticos do RBAC 108."
  - framework_id: pnsic
    relationship: complements
    description: >-
      A Politica Nacional de Seguranca das Infraestruturas Criticas
      (PNSIC) enquadra a aviacao civil como infraestrutura critica
      nacional, complementando os requisitos ciberneticos do RBAC 108.
