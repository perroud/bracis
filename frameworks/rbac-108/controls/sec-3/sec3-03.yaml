id: sec3-03
family: sec-3
title: "Alinhamento com Padroes ICAO e Coordenacao Interinstitucional"
class: RBAC-108
baselines: [air-operators]
statement:
  prose: |
    O operador aéreo deve garantir que seu programa de segurança cibernética esteja alinhado
    com os padrões e práticas recomendadas da Organização Internacional da Aviação Civil (ICAO),
    em especial o Anexo 17 (Security) e o Doc 8973 (Aviation Security Manual), e participar
    de mecanismos de coordenação e compartilhamento de informações sobre ameaças cibernéticas
    no setor de aviação civil nacional e internacional, incluindo comunicação com a ANAC,
    DECEA, Ministério da Infraestrutura e entidades internacionais pertinentes.
guidance:
  prose: |
    O alinhamento com padroes ICAO nao e apenas uma obrigacao regulatoria, mas um
    mecanismo critico de protecao: as ameacas ciberneticas a aviacao sao globais e
    o compartilhamento de inteligencia entre operadores e autoridades e fundamental
    para defesa coletiva do ecossistema de aviacao.

    **Documentos ICAO relevantes:**
    - Anexo 17 — Security: Standards e Recommended Practices (SARPs) de seguranca da
      aviacao, incluindo secao sobre ciberseguranca incorporada a partir da Emenda 16.
    - Doc 8973 — Aviation Security Manual: guia de implementacao dos SARPs do Anexo 17,
      com capitulo dedicado a ciberseguranca (Cyber Security in Civil Aviation).
    - Circular ICAO 330 (Threats to Civil Aviation from Cyberattacks): orientacoes
      especificas sobre gestao de ameacas ciberneticas.
    - ICAO AVSEC Mechanism: framework de gestao de risco cibernetico especifico para aviacao.

    **Mecanismos de coordenacao nacionais:**
    - ANAC: regulador principal, canal de notificacao de incidentes, programas de AVSEC
    - DECEA: coordenacao em incidentes que afetam comunicacoes aeronauticas e ATM
    - CGNA (Centro de Gerenciamento da Navegacao Aerea): coordenacao operacional
    - GSI/PR / DSIC: infraestrutura critica nacional, quando aplicavel
    - CTIR.gov: Computer Emergency Response Team do governo federal

    **Mecanismos internacionais:**
    - A-ISAC (Aviation Information Sharing and Analysis Center): compartilhamento de
      inteligencia de ameacas com operadores aereos internacionais
    - ICAO CSET: Cybersecurity Strategic Action Plan for aviation
    - Grupos de trabalho IATA sobre ciberseguranca

    **Relatorio de conformidade ICAO:**
    Operadores que operam rotas internacionais devem estar preparados para demonstrar
    conformidade com os SARPs do Anexo 17 em auditorias USOAP da ICAO.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura para coordenacao e compartilhamento:**
      1. Subscricao e integracao de feeds do A-ISAC (Aviation ISAC) ao SIEM e
         plataforma de threat intelligence do operador.
      2. Canal seguro de comunicacao com a ANAC para troca de informacoes sobre
         ameacas e incidentes ciberneticos (conforme instrucoes do regulador).
      3. Taxonomia de classificacao de incidentes alinhada com o framework ICAO
         Doc 8973 para garantir comparabilidade e comunicacao eficiente.
      4. Plataforma de threat intelligence capaz de consumir IOCs (Indicators of
         Compromise) especificos do setor aeronautico e propagar alertas.
      5. Mecanismo de contribuicao anonimizada de dados de incidentes ao A-ISAC,
         respeitando confidencialidade e requisitos legais.
    tools:
      - threat-intelligence-platform
      - siem
      - secure-communication
      - isac-integration
  devsecops:
    prose: |
      **Alinhamento tecnico com padroes ICAO:**
      1. Mapeamento dos controles tecnicos implementados para os requisitos do
         Anexo 17 e Doc 8973, documentado como evidencia de conformidade.
      2. Monitoramento de atualizacoes dos documentos ICAO relevantes (emendas ao
         Anexo 17, novas circulares sobre ciberseguranca) e processo de avaliacao
         de impacto nas implementacoes tecnicas.
      3. Participacao em grupos de trabalho tecnicos da IATA sobre padroes de
         ciberseguranca para software aeronautico (ex: grupos de trabalho sobre
         EFB security, cybersecurity in aircraft systems).
      4. Security testing de sistemas aeronauticos baseado em cenarios de ameaca
         documentados no Doc 8973 e em boletins do A-ISAC.
    tools:
      - threat-intelligence-platform
      - vulnerability-management
      - compliance-scanner
      - document-management
  secops:
    prose: |
      **Gestao de conformidade com padroes ICAO e coordenacao interinstitucional:**
      1. Manter atualizado o mapeamento de conformidade do programa de seguranca
         cibernetica do operador com os SARPs do Anexo 17 e Doc 8973.
      2. Designar ponto focal para relacionamento com A-ISAC, com autorizacao para
         receber e compartilhar inteligencia de ameacas do setor.
      3. Estabelecer relacionamento proativo com a area de AVSEC da ANAC: participar
         de workshops, exercicios e consultas publica sobre seguranca cibernetica.
      4. Protocolo de coordenacao com DECEA para incidentes que afetem sistemas
         de comunicacao aeronautica ou navegacao aerea.
      5. Procedimento de comunicacao com GSI/PR em caso de incidente enquadrado
         como ataque a infraestrutura critica nacional.
      6. Relatorio anual de conformidade com os requisitos ICAO de ciberseguranca,
         produzido pelo SGSA e disponivel para auditoria da ANAC.
      7. Participacao em exercicios internacionais de gestao de crise AVSEC (quando
         convocado pela ANAC ou ICAO) que incluam cenarios ciberneticos.
    tools:
      - grc-platform
      - threat-intelligence-platform
      - communication-tools
      - audit-management
      - compliance-scanner
