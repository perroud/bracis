id: sec1-01
family: sec-1
title: "Escopo e Obrigacoes Gerais de Seguranca Cibernetica do Operador Aereo"
class: RBAC-108
baselines: [air-operators]
statement:
  prose: |
    O operador aéreo certificado ou autorizado a operar no território nacional deve implementar,
    manter e aprimorar continuamente medidas de segurança cibernética para proteger os sistemas,
    redes e dados críticos de suas operações de aviação civil contra atos de interferência ilícita
    de natureza cibernética. A segurança cibernética deve ser tratada como componente integrante do
    Programa de Segurança do Operador Aéreo contra Atos de Interferência Ilícita (PSAC), em
    conformidade com o RBAC 108 e os padrões internacionais do Anexo 17 da ICAO e do Doc 8973.
guidance:
  prose: |
    O RBAC 108 (EMD 06) incorporou requisitos especificos de AVSEC cibernetica para operadores
    aereos, reconhecendo que aeronaves modernas, sistemas de despacho, manutencao e ground
    handling estao crescentemente expostos a ameacas digitais.

    **Sistemas criticos abrangidos:**
    - Sistemas de operacao de voo: FMS, EFB (Electronic Flight Bags), sistemas de comunicacao
      aeronave-terra (ACARS, SATCOM, VHF Data Link)
    - Sistemas de manutenção aeronautica: MRO software, sistemas de monitoramento de aeronaves
      (ACMS, FOQA), ferramentas de diagnostico embarcado
    - Sistemas de handling: DCS (Departure Control System), sistemas de check-in, weight and
      balance, load control
    - Sistemas de despacho operacional: OCC (Operations Control Center), sistemas de planejamento
      de voo, meteorologia operacional
    - Sistemas de carga: cargo management systems, tracking de carga
    - Redes de comunicacao aeronautica: VPN corporativa, redes de solo, redes de bordo

    **Integracao com PSAC:**
    O plano de seguranca cibernetica deve ser parte formal do PSAC, aprovado pelo gestor de
    seguranca do operador aereo e revisado anualmente ou apos incidentes significativos.

    **Alinhamento ICAO:**
    O Anexo 17 da ICAO (Standards and Recommended Practices — Security) e o Doc 8973
    (Aviation Security Manual) fornecem a base doutrinaria para os requisitos do RBAC 108.
implementation_guidance:
  platform_engineering:
    prose: |
      **Inventario e classificacao de sistemas criticos:**
      1. Mapear todos os sistemas de TI e OT (Operational Technology) utilizados nas operacoes
         aereas: EFBs, DCS, sistemas de manutencao, OCC, redes de solo e bordo.
      2. Classificar cada sistema por criticidade operacional (nivel 1: seguranca de voo;
         nivel 2: regularidade operacional; nivel 3: comercial/administrativo).
      3. Documentar interfaces, fluxos de dados e dependencias entre sistemas de TI/OT
         aeronauticos.
      4. Implementar segmentacao de rede separando redes de operacao de voo de redes
         corporativas e de passageiros.
      5. Criar landing zone dedicada para sistemas aeronauticos criticos com controles
         de acesso e monitoramento elevados.
      6. Inventario centralizado (CMDB) com campos especificos para classificacao RBAC 108
         (nivel de criticidade, sistema PSAC, ultima revisao de seguranca).
    tools:
      - cmdb
      - network-segmentation
      - asset-inventory
      - ot-security-scanner
      - cloud-asset-inventory
  devsecops:
    prose: |
      **Seguranca no ciclo de vida de sistemas aeronauticos:**
      1. Processo formal de avaliacao de seguranca cibernetica antes da implantacao de qualquer
         novo sistema ou atualizacao em sistemas criticos de aviacao.
      2. Security requirements nos tickets de desenvolvimento e configuracao de sistemas
         aeronauticos (EFB apps, DCS customizacoes, integraces OCC).
      3. Pipeline de CI/CD com verificacoes de seguranca obrigatorias para softwares embarcados
         em EFBs e sistemas de manutencao.
      4. Gestao de vulnerabilidades especifica para software aeronautico, incluindo componentes
         de terceiros (avionic software vendors).
      5. Controle de versao e rastreabilidade de configuracoes de todos os sistemas criticos.
      6. Processo de patch management com janelas de manutencao que respeitem restricoes
         operacionais da aviacao (sem updates durante operacoes criticas).
    tools:
      - gitlab-ci
      - sast-scanner
      - dependency-scanning
      - secret-detection
      - change-management-tool
  secops:
    prose: |
      **Governanca e conformidade RBAC 108:**
      1. Nomear formalmente o Gestor de Seguranca Cibernetica do operador aereo, integrado ao
         PSAC e com reporte ao Gestor de Seguranca da Aviacao (SGSA).
      2. Elaborar e manter o Plano de Seguranca Cibernetica como anexo formal do PSAC.
      3. Realizar avaliacao de riscos ciberneticos anual cobrindo todos os sistemas criticos
         mapeados, com metodologia documentada.
      4. Manter registro de conformidade com cada requisito do RBAC 108, com evidencias
         auditaveis.
      5. Participar de exercicios AVSEC da ANAC que incluam cenarios ciberneticos.
      6. Revisao do Plano de Seguranca Cibernetica apos qualquer incidente significativo ou
         mudanca operacional relevante.
    tools:
      - grc-platform
      - risk-management-tool
      - compliance-scanner
      - audit-log-management
