id: sec1-02
family: sec-1
title: "Avaliacao de Riscos Ciberneticos em Operacoes Aereas"
class: RBAC-108
baselines: [air-operators]
statement:
  prose: |
    O operador aéreo deve conduzir avaliações periódicas de riscos cibernéticos que identifiquem,
    analisem e avaliem as ameaças e vulnerabilidades cibernéticas que possam afetar a segurança
    da aviação civil, a regularidade das operações de voo e a integridade dos sistemas críticos
    aeronáuticos. Os resultados das avaliações de risco devem subsidiar a definição, priorização
    e implementação de medidas de mitigação proporcionais ao nível de risco identificado.
guidance:
  prose: |
    A avaliacao de riscos ciberneticos no contexto de AVSEC difere de avaliacoes convencionais
    de TI por incorporar fatores especificos da aviacao:

    **Vetores de ameaca especificos da aviacao:**
    - Ataques a sistemas de comunicacao aeronave-terra (ACARS spoofing, interferencia em VDL)
    - Manipulacao de dados de planejamento de voo (weather data poisoning, NOTAM manipulation)
    - Comprometimento de EFBs para introducao de dados falsos na cabine de pilotagem
    - Ataques a sistemas de manutencao para injecao de dados falsos em registros de aeronave
    - Ransomware em sistemas DCS causando interrupcao de operacoes de despacho
    - Ataques a supply chain de software aeronautico (vendors MRO, avionics)
    - Interferencia em sistemas de carga para comprometimento de declaracoes de perigo

    **Metodologia de avaliacao:**
    A avaliacao deve considerar: probabilidade de ocorrencia, impacto na seguranca de voo,
    impacto na regularidade operacional, capacidade de deteccao e tempo de recuperacao.
    Recomenda-se o uso do framework ICAO AVSEC Cyber Risk Assessment Methodology.

    **Frequencia:**
    Avaliacao completa anual, mais avaliacoes pontuais apos mudancas significativas em
    sistemas criticos, apos incidentes ou quando novas ameacas forem identificadas.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de suporte a avaliacao de riscos:**
      1. Implementar threat intelligence feeds especializados em aviacao (ISAC da aviacao,
         CSIRT-Aviation, alertas ANAC/ICAO) integrados ao SIEM.
      2. Manter topologia atualizada de todos os sistemas criticos com fluxos de dados
         documentados, facilitando analise de superficies de ataque.
      3. Ferramentas de vulnerability scanning cobrindo ambientes IT e OT aeronauticos,
         com schedules que nao interferem em operacoes criticas.
      4. Monitoramento continuo de integridade de configuracoes de sistemas criticos
         (file integrity monitoring em EFBs, servidores DCS, OCC).
      5. Plataforma de gestao de riscos com taxonomia especifica para riscos de aviacao
         (integracao com categorias ICAO Doc 8973).
    tools:
      - vulnerability-scanner
      - threat-intelligence-platform
      - fim-tool
      - risk-management-platform
      - siem
  devsecops:
    prose: |
      **Gestao de riscos no desenvolvimento e mudancas:**
      1. Security impact assessment obrigatorio para qualquer mudanca em sistemas
         classificados como criticos (nivel 1 e nivel 2) no inventario PSAC.
      2. Threat modeling formal para novos sistemas ou funcionalidades em EFBs,
         DCS e sistemas de manutencao.
      3. Analise de composicao de software (SCA) para identificar vulnerabilidades
         em componentes de terceiros usados em sistemas aeronauticos.
      4. Processo de divulgacao responsavel para vulnerabilidades encontradas em
         software de fornecedores aeronauticos (coordenacao com vendor e ANAC).
      5. Registro de riscos ciberneticos integrado ao backlog de seguranca com
         SLAs de remediacao baseados na criticidade aeronautica.
    tools:
      - dependency-scanning
      - sast-scanner
      - threat-modeling-tool
      - risk-register
      - vulnerability-management
  secops:
    prose: |
      **Conducao e documentacao da avaliacao de riscos:**
      1. Metodologia documentada de avaliacao de riscos ciberneticos alinhada ao
         ICAO Doc 8973 e ao RBAC 108.
      2. Equipe multidisciplinar para avaliacao: seguranca da informacao, operacoes de
         voo, manutencao, TI e seguranca da aviacao (AVSEC).
      3. Catalogo de ameacas especifico para aviacao, atualizado com inteligencia de
         ameacas do setor (A-ISAC, ICAO AVSEC, ANAC).
      4. Registro de riscos com identificacao unica, descricao do cenario de ameaca,
         sistemas afetados, nivel de risco (probabilidade x impacto), controles existentes
         e plano de tratamento.
      5. Relatorio de avaliacao de riscos submetido ao Gestor de Seguranca da Aviacao
         (SGSA) e disponivel para auditoria da ANAC.
      6. Rastreamento de tratamento de riscos com indicadores de reducao ao longo do tempo.
    tools:
      - grc-platform
      - risk-register
      - threat-intelligence-platform
      - audit-management
