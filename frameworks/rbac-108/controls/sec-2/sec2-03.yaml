id: sec2-03
family: sec-2
title: "Treinamento de Pessoal em AVSEC Cibernetica"
class: RBAC-108
baselines: [air-operators]
statement:
  prose: |
    O operador aéreo deve implementar programa de treinamento e conscientização em segurança
    cibernética da aviação (AVSEC cibernética) para todo o pessoal que opera, administra ou
    tem acesso a sistemas críticos de operação aérea. O programa deve ser proporcional ao nível
    de acesso e responsabilidade de cada função, incluir conteúdo específico para tripulantes
    de cabine de pilotagem sobre ameaças cibernéticas em voo, e ser atualizado periodicamente
    para refletir novas ameaças e lições aprendidas de incidentes do setor.
guidance:
  prose: |
    O fator humano e frequentemente o vetor de ataque mais explorado em incidentes
    ciberneticos. No contexto da aviacao, as consequencias de erros humanos causados por
    engenharia social ou falta de treinamento podem afetar diretamente a seguranca de voo.

    **Categorias de pessoal e conteudo de treinamento:**

    1. Tripulantes de cabine de pilotagem (pilotos):
       - Reconhecimento de anomalias em dados recebidos via data link (ACARS, mensagens de despacho)
       - Procedimentos para mensagens suspeitas ou dados inconsistentes em EFBs
       - Politica de uso de EFBs e dispositivos pessoais na cabine
       - Relato de anomalias ciberneticas ao OCC e SGSA

    2. Despachistas operacionais (OCC):
       - Reconhecimento de tentativas de engenharia social via telefone, email ou chat
       - Procedimentos para dados de planejamento de voo suspeitos ou inconsistentes
       - Verificacao de identidade em solicitacoes operacionais criticas
       - Protocolo de resposta a anomalias em sistemas OCC

    3. Agentes de handling e check-in (DCS):
       - Seguranca de credenciais de acesso ao DCS
       - Reconhecimento de tentativas de acesso nao autorizado
       - Procedimentos para anomalias no sistema de check-in ou boarding

    4. Pessoal de manutencao (MRO):
       - Seguranca de laptops e tablets usados em manutencao aeronautica
       - Verificacao de integridade de software de diagnostico
       - Procedimentos para manutencao em ambientes potencialmente hostis (aeroportos estrangeiros)

    5. Gestores e SGSA:
       - Gestao de riscos ciberneticos em AVSEC
       - Lideranca de resposta a incidentes ciberneticos
       - Comunicacao com ANAC e autoridades em caso de incidente

    **Frequencia e documentacao:**
    Treinamento inicial (onboarding) + reciclagem anual minima. Registro de treinamentos
    por funcionario, com evidencia de conclusao e avaliacao de aproveitamento.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma e infraestrutura de treinamento:**
      1. Plataforma de LMS (Learning Management System) para gestao e rastreamento de
         treinamentos de AVSEC cibernetica com registro auditavel por funcionario.
      2. Trilhas de treinamento especificas por funcao: piloto, despachista, handling,
         manutencao, gestao — com conteudos e avaliacoes adequados a cada perfil.
      3. Simuladores de phishing e engenharia social especificos para o setor de aviacao
         (ex: emails falsos de autoridade de aviacao, solicitacoes urgentes de OPS).
      4. Dashboard de cobertura de treinamento com alertas para pessoal com treinamento
         vencido, integrado ao sistema de RH.
      5. Modulo de treinamento acessivel offline para tripulantes em operacao (sem
         dependencia de conexao constante).
    tools:
      - lms-platform
      - phishing-simulation
      - hr-integration
      - compliance-dashboard
      - e-learning-tools
  devsecops:
    prose: |
      **Integracao de conscientizacao no ciclo de desenvolvimento:**
      1. Modulo de treinamento em seguranca cibernetica de aviacao obrigatorio para
         todos os desenvolvedores que trabalham em sistemas aeronauticos (EFB apps,
         DCS, sistemas de manutencao).
      2. Treinamento especifico sobre ameacas a software aeronautico (avionics security,
         supply chain attacks em software aeronautico) para equipes tecnicas.
      3. Simulacoes de incidente cibernetico incluindo equipes de DevSecOps, testando
         procedimentos de resposta e comunicacao com operacoes.
      4. Documentacao de licoes aprendidas de incidentes do setor aeronautico
         compartilhada com equipes tecnicas como material de aprendizado.
      5. Champions de seguranca em cada equipe que desenvolve ou mantem sistemas
         aeronauticos, com formacao especifica em AVSEC cibernetica.
    tools:
      - lms-platform
      - security-champions-program
      - incident-simulation-tools
      - knowledge-base
  secops:
    prose: |
      **Gestao do programa de treinamento:**
      1. Elaborar curriculo anual de treinamento AVSEC cibernetica por categoria de
         pessoal, aprovado pelo SGSA e alinhado ao Plano de Seguranca Cibernetica.
      2. Registrar e manter evidencias de conclusao de treinamento por funcionario,
         disponiveis para auditoria da ANAC.
      3. Aplicar avaliacoes de aproveitamento com nota minima de aprovacao definida;
         reprovados devem repetir o treinamento.
      4. Conduzir exercicios de simulacao de incidente cibernetico (tabletop exercises)
         incluindo cenarios especificos de aviacao pelo menos uma vez por ano.
      5. Atualizar conteudo de treinamento quando novas ameacas relevantes forem
         identificadas ou apos incidentes no setor.
      6. Relatar cobertura de treinamento como indicador de desempenho do Plano de
         Seguranca Cibernetica (meta: 100% de pessoal critico treinado dentro do prazo).
    tools:
      - lms-platform
      - grc-platform
      - audit-management
      - tabletop-exercise-tools
