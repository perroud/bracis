id: sec2-01
family: sec-2
title: "Plano de Seguranca Cibernetica Integrado ao PSAC"
class: RBAC-108
baselines: [air-operators]
statement:
  prose: |
    O operador aéreo deve elaborar, implementar e manter um Plano de Segurança Cibernética
    formalmente integrado ao Programa de Segurança do Operador Aéreo contra Atos de Interferência
    Ilícita (PSAC). O Plano deve descrever os objetivos, escopo, responsabilidades, medidas de
    proteção, procedimentos de resposta a incidentes e indicadores de desempenho da segurança
    cibernética das operações aéreas, em conformidade com o RBAC 108 e os padrões ICAO Anexo 17
    e Doc 8973.
guidance:
  prose: |
    O Plano de Seguranca Cibernetica e o documento mestre que governa a postura cibernetica
    do operador aereo no contexto AVSEC. Diferencia-se de uma politica de seguranca da
    informacao corporativa por ser especifico para ameacas a seguranca da aviacao civil.

    **Conteudo obrigatorio do Plano:**
    1. Escopo: sistemas e redes cobertas, aeronaves, rotas e operacoes abrangidas
    2. Estrutura de governanca: responsabilidades do SGSA, gestor de TI/SI, tripulacao
    3. Inventario de sistemas criticos classificados por nivel de criticidade AVSEC
    4. Resultados da avaliacao de riscos ciberneticos e medidas de mitigacao adotadas
    5. Controles tecnicos implementados por categoria de sistema
    6. Procedimentos de resposta a incidentes ciberneticos
    7. Programa de treinamento e conscientizacao
    8. Processo de revisao e atualizacao do Plano
    9. Indicadores de desempenho (KPIs) de seguranca cibernetica

    **Aprovacao e revisao:**
    O Plano deve ser aprovado pela alta administracao do operador aereo, revisado anualmente
    e submetido a ANAC quando solicitado. Revisoes extraordinarias sao obrigatorias apos
    incidentes ciberneticos significativos ou mudancas relevantes na infraestrutura.

    **Confidencialidade:**
    O Plano e documento sensivel de seguranca da aviacao (SASI — Sensitive Aviation Security
    Information) e deve ter controles de acesso e manuseio equivalentes ao PSAC.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de suporte ao Plano:**
      1. Repositorio seguro e versionado para armazenamento do Plano e seus anexos
         tecnicos, com controle de acesso baseado em funcao.
      2. Inventario automatizado de sistemas criticos (CMDB) como base para o
         escopo do Plano, com reconciliacao periodica.
      3. Dashboard de KPIs de seguranca cibernetica em tempo real, referenciados
         no Plano (ex: tempo medio de deteccao de incidentes, cobertura de patches,
         disponibilidade de sistemas criticos).
      4. Gestao de mudancas formal para sistemas cobertos pelo Plano, garantindo
         que atualizacoes de infraestrutura sejam refletidas no documento.
      5. Integracao do Plano com a ferramenta de GRC para rastreamento automatico
         de conformidade com cada requisito do RBAC 108.
    tools:
      - cmdb
      - grc-platform
      - document-management
      - change-management-tool
      - security-dashboard
  devsecops:
    prose: |
      **Alinhamento do Plano com praticas de desenvolvimento:**
      1. Referencia ao Plano nos processos de desenvolvimento de software para
         sistemas aeronauticos: os requisitos de seguranca do Plano devem alimentar
         as user stories e acceptance criteria.
      2. Checklist de conformidade com o Plano integrado ao pipeline de CI/CD
         para sistemas criticos (EFB apps, DCS, integracoes OCC).
      3. Security gates no pipeline que verificam conformidade com os controles
         tecnicos descritos no Plano antes de qualquer deploy em producao.
      4. Documentacao de arquitetura de seguranca de sistemas aeronauticos mantida
         como "viva" e sincronizada com o Plano.
      5. Processo de revisao de codigo por security champions com conhecimento
         dos requisitos especificos do RBAC 108 e do Plano.
    tools:
      - gitlab-ci
      - policy-engine
      - security-scanning
      - document-management
      - code-review-tools
  secops:
    prose: |
      **Elaboracao, aprovacao e manutencao do Plano:**
      1. Definir responsavel formal pelo Plano (owner): recomendado o Gestor de
         Seguranca da Aviacao (SGSA) em conjunto com o CISO ou equivalente.
      2. Processo estruturado de elaboracao com participacao de: operacoes de voo,
         manutencao, TI, seguranca da aviacao e juridico.
      3. Aprovacao formal pela alta administracao com assinatura e data documentadas.
      4. Calendario de revisao anual com agenda definida, participantes convocados
         e producao de ata de revisao.
      5. Controle de versao do Plano com historico de alteracoes justificadas.
      6. Distribuicao controlada do Plano para destinatarios autorizados, com
         registro de quem recebeu qual versao.
      7. Processo de notificacao a ANAC da existencia e disponibilidade do Plano
         conforme instrucoes do regulador.
    tools:
      - grc-platform
      - document-management
      - audit-management
      - workflow-management
