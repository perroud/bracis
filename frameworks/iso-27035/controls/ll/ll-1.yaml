id: ll.1
family: ll
title: "Post-incident review"
class: ISO27035

statement:
  prose: >-
    The organization shall conduct a post-incident review after the resolution
    of each significant information security incident. The review shall analyze
    the incident timeline, the effectiveness of detection and response
    activities, the root cause, and the adequacy of existing controls. The
    review shall identify lessons learnt and produce actionable recommendations
    for improving the incident management process, security controls, and
    organizational resilience.

guidance:
  prose: >-
    Post-incident reviews should be conducted as soon as practical after
    incident closure, while details are still fresh. The review should
    involve all parties who participated in the incident response. The
    analysis should use a blameless approach that focuses on systemic
    improvements rather than individual fault. Key questions to address
    include: what happened and when, how was the incident detected, was
    the response effective, what could have prevented the incident, and
    what should be done differently. Review findings should be documented
    in a structured report and tracked through to implementation.

references:
  - citation: "ISO/IEC 27035-1:2023, Clause 9"
    url: "https://www.iso.org/standard/78973.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a post-incident review template in the incident management
      platform that captures timeline, impact, root cause, and action
      items. Integrate review findings with the service catalog to
      track improvements per service. Automate the scheduling of
      post-incident reviews within defined timeframes after incident
      closure. Publish anonymized post-incident reports to the internal
      developer portal for organizational learning.
    tools:
      - backstage
      - jira
      - confluence
      - pagerduty
      - notion
  devsecops:
    prose: >-
      Create post-incident review processes that include root cause
      analysis of any code or configuration changes that contributed
      to the incident. Track remediation items as tickets linked to
      the affected code repositories. Implement automated regression
      tests based on incident findings. Include security incident
      learnings in developer knowledge bases.
    tools:
      - gitlab-ci
      - jira
      - confluence
      - git
      - sonarqube
  secops:
    prose: >-
      Conduct structured post-incident reviews using the SOAR platform
      to extract timeline and response metrics automatically. Document
      root cause analysis and recommendations in the incident record.
      Track action items through completion and verify their
      effectiveness. Analyze trends across multiple incidents to
      identify systemic issues. Update detection rules, playbooks,
      and procedures based on review findings.
    tools:
      - cortex-xsoar
      - the-hive
      - splunk
      - jira
      - confluence

