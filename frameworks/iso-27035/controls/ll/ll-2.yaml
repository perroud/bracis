id: ll.2
family: ll
title: "Incident trend analysis and metrics"
class: ISO27035

statement:
  prose: >-
    The organization shall collect, analyze, and report metrics on information
    security incidents to identify trends, measure the effectiveness of the
    incident management process, and support risk management decisions. Metrics
    shall include the number and types of incidents, mean time to detect, mean
    time to respond, mean time to resolve, incident recurrence rates, and the
    effectiveness of implemented improvements. Trend analysis shall be
    conducted regularly and reported to management.

guidance:
  prose: >-
    Incident metrics should be collected automatically from incident
    management tools wherever possible. Key performance indicators (KPIs)
    and key risk indicators (KRIs) should be defined for the incident
    management process. Trend analysis should look for patterns such as
    recurring incident types, seasonal variations, and correlations with
    organizational changes. Metrics should be benchmarked against industry
    standards and peer organizations where possible. Management reports
    should translate technical metrics into business impact terms.

references:
  - citation: "ISO/IEC 27035-1:2023, Clause 9.2"
    url: "https://www.iso.org/standard/78973.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement dashboards that aggregate incident metrics from the
      incident management platform, SIEM, and SOAR systems. Automate
      the calculation of key metrics such as MTTD, MTTR, and MTTC.
      Build trend analysis visualizations that show incident volumes
      and categories over time. Integrate incident metrics with
      service reliability metrics (SLIs, SLOs) to provide a holistic
      view of service health.
    tools:
      - grafana
      - prometheus
      - backstage
      - elasticsearch
      - datadog
  devsecops:
    prose: >-
      Track security vulnerability metrics alongside incident data to
      identify correlations between unpatched vulnerabilities and
      incidents. Implement pipeline metrics that measure the rate of
      security findings over time. Create developer-facing dashboards
      that show incident trends related to their services.
    tools:
      - defectdojo
      - gitlab-ci
      - grafana
      - sonarqube
      - datadog
  secops:
    prose: >-
      Generate automated incident reports from the SOAR platform with
      metrics on detection effectiveness, response times, and resolution
      rates. Conduct monthly and quarterly trend analyses to identify
      patterns and emerging threats. Present management reports that
      include business impact analysis and recommendations. Use metrics
      to justify resource allocation and capability improvements.
    tools:
      - splunk
      - cortex-xsoar
      - the-hive
      - grafana
      - power-bi

