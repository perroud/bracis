id: ll.3
family: ll
title: "Continuous improvement of incident management"
class: ISO27035

statement:
  prose: >-
    The organization shall use the outcomes of post-incident reviews, trend
    analyses, and exercises to continually improve the information security
    incident management process. Improvements shall address gaps in policies,
    plans, procedures, tools, training, and organizational capabilities.
    Identified improvements shall be prioritized, assigned to responsible
    parties, tracked through implementation, and verified for effectiveness.
    The organization shall update its incident management documentation to
    reflect implemented improvements.

guidance:
  prose: >-
    Continuous improvement should follow a structured approach such as
    Plan-Do-Check-Act (PDCA). Improvement activities should be prioritized
    based on the potential to reduce incident likelihood or impact.
    Sources of improvement input include post-incident reviews, exercise
    findings, threat intelligence updates, technology changes, organizational
    changes, and regulatory developments. The organization should maintain
    an improvement backlog and regularly review progress. Improvements
    should be validated through subsequent exercises or real incident
    handling to confirm their effectiveness.

references:
  - citation: "ISO/IEC 27035-1:2023, Clause 9.3"
    url: "https://www.iso.org/standard/78973.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a continuous improvement tracking system integrated with
      the incident management platform. Automate the creation of
      improvement tickets from post-incident review findings. Track
      improvements through implementation using the project management
      system. Implement automated regression testing that validates
      improvements remain effective. Update infrastructure-as-code
      templates and platform configurations based on improvement
      findings.
    tools:
      - jira
      - backstage
      - terraform
      - gitlab-ci
      - confluence
  devsecops:
    prose: >-
      Incorporate incident learnings into CI/CD pipeline improvements,
      security gate configurations, and coding standards. Implement
      automated checks that prevent recurrence of previously identified
      issues. Update pipeline security templates based on incident
      findings. Track security debt alongside incident improvement
      items.
    tools:
      - gitlab-ci
      - jira
      - sonarqube
      - semgrep
      - defectdojo
  secops:
    prose: >-
      Maintain an improvement backlog in the SOAR platform linked to
      post-incident reviews. Update detection rules, correlation logic,
      and response playbooks based on improvement items. Track
      improvement effectiveness by monitoring whether similar incidents
      recur after improvements are implemented. Conduct periodic
      maturity assessments of the incident management capability to
      measure overall improvement trajectory.
    tools:
      - cortex-xsoar
      - splunk
      - the-hive
      - jira
      - confluence

