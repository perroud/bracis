id: resp.2
family: resp
title: "Incident eradication and recovery"
class: ISO27035

statement:
  prose: >-
    The organization shall eradicate the root cause of information security
    incidents and restore affected systems and services to normal operation.
    Eradication activities shall ensure that the threat has been completely
    removed and that the vulnerabilities exploited during the incident have
    been remediated. Recovery activities shall restore systems from known
    clean states and validate that restored systems are functioning correctly
    and securely before returning them to production.

guidance:
  prose: >-
    Eradication may involve removing malware, closing exploited
    vulnerabilities, resetting compromised credentials, rebuilding
    compromised systems from clean images, and applying patches. Recovery
    should follow a planned sequence that prioritizes critical business
    services. Restored systems should be monitored closely for signs of
    reinfection or persistent threats. Recovery validation should include
    integrity checks, vulnerability scans, and functional testing. The
    organization should maintain recovery procedures for different
    incident types and test them regularly.

references:
  - citation: "ISO/IEC 27035-1:2023, Clause 8.2"
    url: "https://www.iso.org/standard/78973.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement immutable infrastructure patterns that enable rapid
      rebuilding of compromised systems from known clean base images.
      Use infrastructure-as-code to ensure that recovered systems are
      provisioned with current security configurations. Implement
      automated vulnerability scanning of recovered systems before
      returning them to production. Maintain golden images and templates
      that are regularly patched and validated.
    tools:
      - terraform
      - ansible
      - packer
      - kubernetes
      - vault
      - trivy
  devsecops:
    prose: >-
      Implement blue-green or canary deployment strategies that enable
      rapid recovery to the last known good state. Ensure that CI/CD
      pipelines include security validation steps for recovery
      deployments. Maintain deployment artifacts and configuration
      history to support point-in-time recovery. Implement automated
      smoke tests and security scans as part of recovery verification.
    tools:
      - gitlab-ci
      - argocd
      - helm
      - trivy
      - selenium
  secops:
    prose: >-
      Define eradication and recovery playbooks for each incident type
      in the SOAR platform. Coordinate with IT operations for system
      rebuilding and credential rotation. Implement post-recovery
      monitoring with enhanced detection rules focused on the specific
      threat indicators from the incident. Validate recovery completeness
      through vulnerability scans and penetration testing of affected
      systems.
    tools:
      - cortex-xsoar
      - crowdstrike
      - nessus
      - qualys
      - velociraptor

