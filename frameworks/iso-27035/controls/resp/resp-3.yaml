id: resp.3
family: resp
title: "Incident communication and notification"
class: ISO27035

statement:
  prose: >-
    The organization shall establish and follow procedures for communicating
    information about incidents to internal and external stakeholders. Internal
    communications shall keep management, affected business units, and support
    functions informed throughout the incident lifecycle. External
    communications shall address regulatory notification requirements, law
    enforcement engagement, customer notification, media relations, and
    coordination with external incident response organizations as appropriate.

guidance:
  prose: >-
    Communication procedures should define who communicates, to whom, what
    information is shared, through which channels, and at what points during
    the incident lifecycle. Internal communication should use secure channels
    and follow need-to-know principles. External regulatory notifications
    should comply with applicable breach notification laws and timeframes
    (e.g., 72 hours under GDPR). The organization should have pre-approved
    communication templates for common scenarios. A designated spokesperson
    should handle media inquiries. Legal counsel should review external
    communications before dissemination.

references:
  - citation: "ISO/IEC 27035-1:2023, Clause 8.3"
    url: "https://www.iso.org/standard/78973.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated incident status pages and notification systems
      that keep stakeholders informed of service disruptions. Integrate
      incident communication workflows with the on-call management system
      to automatically notify affected service owners. Deploy secure
      communication channels (out-of-band) for incident response teams.
      Automate regulatory notification workflows with template-based
      reporting.
    tools:
      - statuspage
      - pagerduty
      - opsgenie
      - slack
      - mattermost
  devsecops:
    prose: >-
      Configure automated notifications to development teams when
      incidents affect their services. Implement deployment freeze
      communication mechanisms during critical incidents. Ensure that
      post-incident communications include technical details relevant
      to developers for preventing recurrence.
    tools:
      - slack
      - gitlab-ci
      - jira
      - pagerduty
      - teams
  secops:
    prose: >-
      Define communication playbooks in the SOAR platform that automate
      stakeholder notifications based on incident severity and type.
      Maintain pre-approved notification templates for regulatory
      bodies, customers, and media. Implement secure war room
      communications for critical incidents. Track notification
      compliance with regulatory timeframes. Coordinate with legal
      counsel for external communications involving data breaches.
    tools:
      - cortex-xsoar
      - the-hive
      - pagerduty
      - statuspage
      - servicenow

