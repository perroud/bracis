id: resp.1
family: resp
title: "Incident containment"
class: ISO27035

statement:
  prose: >-
    The organization shall implement containment measures to limit the scope
    and impact of information security incidents. Containment strategies shall
    be predefined for common incident types and shall balance the need to
    preserve evidence with the need to minimize business disruption. Short-term
    containment shall be applied immediately to stop the spread of the incident,
    followed by long-term containment measures that allow continued business
    operations while preparing for eradication.

guidance:
  prose: >-
    Containment strategies should be tailored to the type of incident. For
    network-based attacks, containment may involve blocking malicious IP
    addresses, isolating affected network segments, or disabling compromised
    accounts. For malware incidents, containment may involve quarantining
    infected systems, blocking command-and-control communications, and
    preventing lateral movement. For data breaches, containment focuses on
    stopping data exfiltration and revoking unauthorized access. The
    organization should predefine containment playbooks that authorize
    specific actions without requiring management approval to avoid delays.
    All containment actions should be documented with timestamps.

references:
  - citation: "ISO/IEC 27035-1:2023, Clause 8"
    url: "https://www.iso.org/standard/78973.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated containment capabilities including network
      microsegmentation controls that can isolate compromised workloads,
      automated credential rotation for compromised service accounts, and
      deployment rollback mechanisms. Use infrastructure-as-code to define
      containment configurations that can be applied rapidly. Implement
      kill switches for critical services that can be activated during
      incidents. Deploy network policies in Kubernetes that enable rapid
      pod isolation.
    tools:
      - cilium
      - calico
      - istio
      - vault
      - terraform
      - kubernetes
  devsecops:
    prose: >-
      Implement automated rollback capabilities in CI/CD pipelines that
      can revert to the last known good deployment. Configure feature
      flags that allow disabling compromised functionality without full
      rollback. Ensure that deployment pipelines support emergency
      hotfix workflows with expedited approval processes. Implement
      circuit breakers in service mesh configurations.
    tools:
      - gitlab-ci
      - argocd
      - flagger
      - launchdarkly
      - istio
  secops:
    prose: >-
      Define containment playbooks in the SOAR platform for each incident
      category. Implement automated containment actions such as firewall
      rule updates, account disabling, and endpoint isolation through
      SOAR integrations with network, identity, and endpoint management
      systems. Track containment effectiveness and time to contain
      metrics. Ensure all containment actions are logged and timestamped
      for post-incident review.
    tools:
      - cortex-xsoar
      - crowdstrike
      - palo-alto
      - sentinel-one
      - okta

