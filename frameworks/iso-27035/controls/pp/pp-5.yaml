id: pp.5
family: pp
title: "Awareness and training"
class: ISO27035

statement:
  prose: >-
    The organization shall ensure that all relevant personnel are aware of
    the incident management policy and their responsibilities within the
    incident management process. Personnel involved in incident management
    activities shall receive appropriate training to develop and maintain
    the competence necessary for their roles. Training shall be conducted
    regularly and updated to address emerging threats and changes in the
    incident management process.

guidance:
  prose: >-
    Awareness programs should ensure that all staff understand how to
    recognize and report potential security events. Training for incident
    management personnel should cover technical skills (forensic analysis,
    malware reverse engineering, network analysis), process skills
    (triage, escalation, communication), and soft skills (stakeholder
    management, crisis communication). Regular exercises, including
    tabletop exercises, simulations, and red team/blue team exercises,
    should be conducted to maintain readiness. Training records should be
    maintained and competence should be assessed periodically.

references:
  - citation: "ISO/IEC 27035-2:2023, Clause 5.5"
    url: "https://www.iso.org/standard/78974.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate incident response training modules into the developer
      onboarding process managed through the internal developer portal.
      Provide self-service access to incident simulation environments
      where teams can practice response procedures. Automate the scheduling
      of gameday exercises that test platform resilience and incident
      response capabilities. Track training completion through the
      platform's identity and access management system.
    tools:
      - backstage
      - chaos-monkey
      - gremlin
      - litmus-chaos
      - keycloak
  devsecops:
    prose: >-
      Conduct regular secure coding workshops that include incident
      identification and reporting procedures. Integrate security
      awareness quizzes into the developer workflow. Run capture-the-flag
      exercises that simulate real-world attack scenarios developers may
      encounter. Ensure that incident reporting procedures are documented
      in repository templates and developer guides.
    tools:
      - hackedu
      - secure-code-warrior
      - gitlab-ci
      - juice-shop
  secops:
    prose: >-
      Schedule regular SOC training exercises including purple team
      engagements and incident simulation drills. Maintain a training
      matrix that tracks analyst certifications, skill levels, and
      training history. Conduct after-action reviews of real incidents
      to extract training opportunities. Use SOAR platform analytics
      to identify skill gaps based on incident handling performance.
    tools:
      - attack-iq
      - caldera
      - cortex-xsoar
      - splunk
      - range-force

