id: pp.2
family: pp
title: "Incident management plan"
class: ISO27035

statement:
  prose: >-
    The organization shall establish and maintain an information security
    incident management plan that describes the processes, procedures, and
    resources needed to manage information security incidents throughout their
    lifecycle. The plan shall address detection and reporting, assessment and
    decision-making, response activities, and lessons learnt. The plan shall
    be tested and reviewed regularly to ensure its effectiveness.

guidance:
  prose: >-
    The incident management plan should be a living document that provides
    detailed operational procedures for each phase of incident management.
    It should define escalation paths, communication protocols (internal and
    external), and resource allocation strategies. The plan should include
    specific procedures for different incident categories and severity levels.
    Regular tabletop exercises and simulations should be conducted to validate
    the plan and identify gaps.

references:
  - citation: "ISO/IEC 27035-2:2023, Clause 5"
    url: "https://www.iso.org/standard/78974.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement incident management plans as structured documents within the
      internal developer portal. Define automated escalation paths using
      on-call management systems integrated with the platform's service
      catalog. Ensure each service registered in the platform has an
      associated incident response plan with defined runbooks. Use
      infrastructure-as-code to provision and maintain incident management
      tooling consistently across environments.
    tools:
      - backstage
      - pagerduty
      - opsgenie
      - terraform
      - ansible
  devsecops:
    prose: >-
      Include incident response procedures in the definition of done for
      every service. Ensure that deployment pipelines automatically configure
      alerting, monitoring, and incident notification channels for new
      services. Maintain runbooks as code alongside application repositories.
      Automate the creation of incident channels and war rooms when
      security-relevant pipeline failures are detected.
    tools:
      - gitlab-ci
      - github-actions
      - pagerduty
      - slack
      - runbook-automation
  secops:
    prose: >-
      Maintain the incident management plan as operational playbooks within
      the SOAR platform. Define automated workflows for each incident
      category that guide analysts through triage, containment, eradication,
      and recovery steps. Schedule quarterly tabletop exercises to test the
      plan and update playbooks based on findings. Track plan effectiveness
      through metrics dashboards.
    tools:
      - cortex-xsoar
      - splunk-soar
      - the-hive
      - pagerduty
      - jira

