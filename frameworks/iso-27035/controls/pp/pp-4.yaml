id: pp.4
family: pp
title: "Incident classification scheme"
class: ISO27035

statement:
  prose: >-
    The organization shall establish an incident classification scheme that
    defines categories and severity levels for information security events and
    incidents. The scheme shall enable consistent assessment of the impact
    and urgency of incidents, support prioritization of response activities,
    and facilitate meaningful reporting and trend analysis. The classification
    scheme shall be communicated to all personnel involved in incident
    management.

guidance:
  prose: >-
    The classification scheme should define incident categories based on the
    type of attack or event (e.g., malware, unauthorized access, denial of
    service, data breach, social engineering, insider threat). Severity
    levels should be based on factors such as the number of affected systems
    or users, the sensitivity of compromised data, the impact on business
    operations, and regulatory notification requirements. The scheme should
    align with the organization's risk management framework and be
    consistent with any sector-specific classification requirements.

references:
  - citation: "ISO/IEC 27035-1:2023, Clause 5.4"
    url: "https://www.iso.org/standard/78973.html"
  - citation: "ISO/IEC 27035-2:2023, Clause 7"
    url: "https://www.iso.org/standard/78974.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement the incident classification scheme as structured metadata
      in the incident management platform. Define severity levels as
      configuration in the alerting and on-call systems so that alerts are
      automatically classified and routed based on predefined criteria.
      Ensure that the classification scheme is enforced through mandatory
      fields in incident tickets. Integrate classification data into
      dashboards for real-time visibility.
    tools:
      - pagerduty
      - opsgenie
      - jira
      - backstage
      - servicenow
  devsecops:
    prose: >-
      Configure CI/CD pipeline security scanners to map findings to the
      incident classification scheme. Ensure that critical and high-severity
      vulnerability findings automatically trigger incident creation with
      the appropriate classification. Define classification criteria in
      pipeline templates so that security events from builds and deployments
      are consistently categorized.
    tools:
      - gitlab-ci
      - trivy
      - semgrep
      - snyk
      - defectdojo
  secops:
    prose: >-
      Configure SIEM correlation rules to automatically classify detected
      events according to the incident classification scheme. Define
      severity-based SLAs for response times in the SOAR platform. Create
      dashboards that show incident distribution by category and severity
      over time. Use classification data to prioritize analyst workload and
      escalation decisions.
    tools:
      - splunk
      - elastic-siem
      - cortex-xsoar
      - the-hive
      - chronicle

