id: pp.1
family: pp
title: "Incident management policy"
class: ISO27035

statement:
  prose: >-
    The organization shall establish an information security incident management
    policy that is approved by top management. The policy shall define the
    organization's commitment to managing information security events, incidents,
    and vulnerabilities, and shall set out the objectives and principles guiding
    the incident management process. The policy shall be communicated to all
    relevant personnel and interested parties.

guidance:
  prose: >-
    The incident management policy should clearly state the organization's
    approach to detecting, reporting, assessing, responding to, and learning
    from information security incidents. It should define roles, responsibilities,
    and authority for incident management activities. The policy should reference
    related policies such as information security, business continuity, and risk
    management. It should be reviewed and updated at planned intervals or when
    significant changes occur in the threat landscape or organizational structure.

references:
  - citation: "ISO/IEC 27035-1:2023, Clause 5"
    url: "https://www.iso.org/standard/78973.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Codify the incident management policy as a machine-readable document
      stored in version-controlled repositories. Use policy-as-code frameworks
      to enforce incident management requirements across infrastructure.
      Integrate incident management policy checks into platform onboarding
      workflows so that every new service or application is automatically
      enrolled in the incident management process. Maintain a central policy
      repository accessible to all platform teams.
    tools:
      - open-policy-agent
      - backstage
      - git
      - confluence
  devsecops:
    prose: >-
      Embed incident management policy references in CI/CD pipeline
      documentation and developer onboarding materials. Ensure that pipeline
      configurations include incident notification hooks for security-relevant
      failures. Integrate policy compliance checks that verify incident
      reporting endpoints are configured for each deployed service.
    tools:
      - gitlab-ci
      - github-actions
      - pagerduty
      - opsgenie
  secops:
    prose: >-
      Map the incident management policy to operational procedures in the
      SIEM and SOAR platforms. Create dashboards that track policy compliance
      metrics such as mean time to detect, mean time to respond, and incident
      closure rates. Ensure that the policy is reflected in runbook
      configurations and that all SOC analysts have access to the current
      version of the policy.
    tools:
      - splunk
      - elastic-siem
      - cortex-xsoar
      - pagerduty

legal_references:
