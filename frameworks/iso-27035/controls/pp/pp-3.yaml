id: pp.3
family: pp
title: "Incident response team establishment"
class: ISO27035

statement:
  prose: >-
    The organization shall establish one or more incident response teams (IRTs)
    or equivalent capabilities with clearly defined roles, responsibilities,
    and authority to manage information security incidents. The IRT shall have
    sufficient competence, resources, and organizational authority to carry out
    its functions effectively. The composition of the team shall reflect the
    types of incidents the organization may face.

guidance:
  prose: >-
    The incident response team may be a dedicated CSIRT (Computer Security
    Incident Response Team), CERT (Computer Emergency Response Team), or a
    virtual team assembled from existing staff. The team should include
    members with expertise in network security, application security, digital
    forensics, legal and regulatory compliance, and communications. Clear
    authority must be granted for containment actions such as isolating
    systems, revoking access, and engaging external parties. Team members
    should receive regular training and participate in exercises.

references:
  - citation: "ISO/IEC 27035-1:2023, Clause 5.3"
    url: "https://www.iso.org/standard/78973.html"
  - citation: "ISO/IEC 27035-2:2023, Clause 6"
    url: "https://www.iso.org/standard/78974.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Define IRT membership and escalation paths in the service catalog and
      on-call management systems. Ensure that the platform provides self-service
      capabilities for IRT members to isolate services, roll back deployments,
      and access forensic data. Implement role-based access controls that grant
      IRT members elevated privileges during active incidents. Maintain an
      up-to-date contact directory integrated with the identity provider.
    tools:
      - pagerduty
      - opsgenie
      - backstage
      - keycloak
      - vault
  devsecops:
    prose: >-
      Ensure that development teams have designated incident responders who
      understand the application architecture and can assist the IRT during
      application-level incidents. Include IRT contact information and
      escalation procedures in repository documentation. Provide IRT members
      with access to CI/CD pipelines for emergency deployments and rollbacks.
    tools:
      - gitlab-ci
      - pagerduty
      - slack
      - jira
  secops:
    prose: >-
      Staff the SOC with trained incident responders who follow defined
      escalation procedures. Implement shift handoff procedures that ensure
      continuity of incident management across time zones. Maintain a skills
      matrix for IRT members and schedule regular training on new threat
      types, forensic tools, and response procedures. Define clear
      interfaces between SOC analysts and the IRT for escalation.
    tools:
      - cortex-xsoar
      - the-hive
      - splunk
      - crowdstrike
      - pagerduty

