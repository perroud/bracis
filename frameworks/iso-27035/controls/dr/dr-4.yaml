id: dr.4
family: dr
title: "Threat intelligence integration"
class: ISO27035

statement:
  prose: >-
    The organization shall collect, process, and use threat intelligence to
    enhance the detection of information security events. Threat intelligence
    shall be obtained from multiple sources, including commercial feeds,
    open-source intelligence, industry sharing groups, and government
    advisories. The intelligence shall be operationalized by integrating
    indicators of compromise and threat patterns into detection systems.

guidance:
  prose: >-
    Threat intelligence should be integrated at strategic, operational, and
    tactical levels. Strategic intelligence informs risk assessments and
    policy decisions. Operational intelligence enhances understanding of
    adversary campaigns and techniques. Tactical intelligence provides
    indicators of compromise (IOCs) such as IP addresses, domains, file
    hashes, and behavioral patterns that can be directly consumed by
    detection systems. The organization should participate in information
    sharing communities relevant to its industry sector. Intelligence
    should be assessed for relevance and reliability before integration.

references:
  - citation: "ISO/IEC 27035-2:2023, Clause 5.7"
    url: "https://www.iso.org/standard/78974.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a threat intelligence platform (TIP) integrated with
      the centralized monitoring infrastructure. Automate the ingestion
      of IOC feeds into network and host-based detection systems. Deploy
      threat intelligence lookups at network boundaries, DNS resolvers,
      and web proxies. Use infrastructure-as-code to maintain consistent
      threat intelligence configurations across environments.
    tools:
      - misp
      - opencti
      - anomali
      - elasticsearch
      - suricata
  devsecops:
    prose: >-
      Integrate vulnerability intelligence feeds into CI/CD pipeline
      scanners to ensure that known exploited vulnerabilities are
      prioritized. Use threat intelligence to inform SAST and DAST rule
      updates. Monitor software supply chain threat intelligence for
      compromised packages and dependencies.
    tools:
      - gitlab-ci
      - snyk
      - trivy
      - grype
      - osv-scanner
  secops:
    prose: >-
      Operationalize threat intelligence by integrating IOC feeds into
      SIEM correlation rules and EDR detection policies. Implement
      automated IOC matching against historical logs to identify
      previously undetected compromises. Participate in ISACs and
      threat intelligence sharing communities. Use threat intelligence
      to prioritize alert triage and inform incident investigation.
    tools:
      - misp
      - splunk
      - crowdstrike
      - recorded-future
      - cortex-xsoar

