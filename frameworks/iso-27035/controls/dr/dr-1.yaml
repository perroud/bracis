id: dr.1
family: dr
title: "Event detection"
class: ISO27035

statement:
  prose: >-
    The organization shall implement mechanisms to detect information security
    events in a timely manner. Detection mechanisms shall cover network,
    system, application, and user activity monitoring. The detection capability
    shall be designed to identify known attack patterns, anomalous behavior,
    and policy violations. Detection mechanisms shall be continuously
    monitored and tuned to maintain effectiveness and reduce false positives.

guidance:
  prose: >-
    Detection mechanisms should include intrusion detection and prevention
    systems (IDS/IPS), security information and event management (SIEM)
    systems, endpoint detection and response (EDR) solutions, network
    traffic analysis, log monitoring, and user behavior analytics. The
    organization should leverage threat intelligence feeds to update
    detection signatures and rules. Detection coverage should be assessed
    against frameworks such as MITRE ATT&CK to identify gaps. Automated
    correlation of events from multiple sources improves detection
    accuracy and reduces mean time to detect.

references:
  - citation: "ISO/IEC 27035-1:2023, Clause 6"
    url: "https://www.iso.org/standard/78973.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Deploy centralized logging and monitoring infrastructure that
      collects telemetry from all platform services, including
      Kubernetes clusters, cloud provider APIs, service meshes, and
      databases. Implement structured logging standards across all
      services and route logs to a centralized SIEM. Deploy network
      monitoring at ingress/egress points and between service mesh
      segments. Use infrastructure-as-code to ensure consistent
      deployment of monitoring agents across all environments.
    tools:
      - prometheus
      - grafana
      - fluentd
      - elasticsearch
      - falco
      - cilium
  devsecops:
    prose: >-
      Integrate runtime application self-protection (RASP) and
      application-level monitoring into services deployed through CI/CD
      pipelines. Ensure that application logs include security-relevant
      events such as authentication failures, authorization violations,
      and input validation errors. Configure pipeline security scanners
      to detect vulnerabilities that could be exploited as attack vectors.
      Deploy canary analysis to detect anomalous behavior in new releases.
    tools:
      - gitlab-ci
      - datadog
      - sentry
      - trivy
      - falco
  secops:
    prose: >-
      Operate a centralized SIEM with correlation rules mapped to known
      threat patterns and the MITRE ATT&CK framework. Implement
      multi-layered detection using network IDS, endpoint EDR, and
      cloud workload protection. Tune detection rules regularly based
      on false positive analysis and emerging threat intelligence.
      Maintain 24/7 monitoring coverage through SOC staffing or
      managed detection and response (MDR) services.
    tools:
      - splunk
      - elastic-siem
      - crowdstrike
      - suricata
      - zeek
      - wazuh

