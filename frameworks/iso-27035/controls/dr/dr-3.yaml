id: dr.3
family: dr
title: "Event reporting"
class: ISO27035

statement:
  prose: >-
    The organization shall establish and communicate procedures for reporting
    information security events. All personnel and contractors shall be
    required to report observed or suspected information security events
    through designated reporting channels as quickly as possible. The
    reporting procedures shall be accessible, easy to follow, and available
    at all times. The organization shall ensure that reporters are not
    penalized for reporting in good faith.

guidance:
  prose: >-
    Reporting channels should include multiple methods such as email,
    phone hotline, web portal, chat, and ticketing system. Reporting
    procedures should be simple and require minimal technical knowledge
    to use. The organization should provide clear guidance on what
    constitutes a reportable event, including examples of common security
    events. Anonymous reporting options should be considered. Reporting
    metrics such as time to report and volume of reports should be tracked
    to assess the effectiveness of awareness programs.

references:
  - citation: "ISO/IEC 27035-1:2023, Clause 6.3"
    url: "https://www.iso.org/standard/78973.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Provide self-service incident reporting capabilities through the
      internal developer portal. Implement chatbot integrations that guide
      users through the reporting process and automatically create tickets
      in the incident management system. Ensure reporting channels are
      highly available and monitored for reliability. Integrate reporting
      endpoints with the on-call system for immediate notification of
      critical events.
    tools:
      - backstage
      - servicenow
      - jira
      - slack
      - pagerduty
  devsecops:
    prose: >-
      Configure automated reporting for security events detected in CI/CD
      pipelines, such as critical vulnerabilities, secret leaks, and
      supply chain compromises. Implement pipeline hooks that create
      incident tickets when security gates fail. Provide developers with
      clear documentation on how to manually report security events they
      observe during development and code review.
    tools:
      - gitlab-ci
      - defectdojo
      - jira
      - slack
      - snyk
  secops:
    prose: >-
      Implement automated alert-to-ticket workflows in the SOAR platform
      so that detected events are automatically reported and tracked.
      Provide a security event reporting portal accessible to all
      employees. Monitor reporting channels for availability and response
      times. Track reporting metrics and use them to improve awareness
      programs and reporting procedures.
    tools:
      - cortex-xsoar
      - the-hive
      - servicenow
      - splunk
      - jira

