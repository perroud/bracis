id: ad.1
family: ad
title: "Event assessment and triage"
class: ISO27035

statement:
  prose: >-
    The organization shall assess reported information security events to
    determine whether they constitute information security incidents. The
    assessment shall be performed by competent personnel using the
    established classification scheme. The assessment process shall
    determine the nature, scope, and potential impact of the event, and
    shall result in a decision to escalate, monitor, or close the event.
    Assessment shall be performed within defined timeframes based on the
    apparent severity.

guidance:
  prose: >-
    The assessment process should involve initial triage to determine
    if the reported event is a true positive, false positive, or requires
    further investigation. Triage criteria should include the affected
    assets and their criticality, the type of threat or vulnerability
    exploited, the extent of compromise, and potential business impact.
    Personnel performing triage should have access to asset inventories,
    network diagrams, and threat intelligence to support their assessment.
    Clear criteria should define when an event is escalated to incident
    status and when it is closed as a non-incident.

references:
  - citation: "ISO/IEC 27035-1:2023, Clause 7"
    url: "https://www.iso.org/standard/78973.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate asset inventory and service dependency data from the
      internal developer portal into the incident management platform
      to support rapid impact assessment. Implement automated enrichment
      workflows that attach relevant context (service owner, criticality
      rating, dependencies, recent changes) to reported events. Provide
      triage dashboards that show event queues prioritized by severity
      and affected asset criticality.
    tools:
      - backstage
      - servicenow
      - pagerduty
      - cmdb
      - jira
  devsecops:
    prose: >-
      Implement automated triage for security findings from CI/CD
      pipeline scanners based on vulnerability severity, exploitability,
      and the criticality of the affected service. Configure automated
      deduplication of findings to reduce triage workload. Provide
      developers with context-rich notifications that include remediation
      guidance alongside the finding details.
    tools:
      - defectdojo
      - gitlab-ci
      - snyk
      - trivy
      - semgrep
  secops:
    prose: >-
      Implement SOAR playbooks that automate initial triage steps
      including IOC enrichment, asset lookup, and reputation checking.
      Define SLA-based triage queues in the SIEM so that high-severity
      events are assessed first. Track triage metrics including time
      to triage, true positive rate, and escalation rate. Train analysts
      on the classification scheme and provide decision trees for
      consistent triage outcomes.
    tools:
      - cortex-xsoar
      - splunk
      - the-hive
      - virustotal
      - shodan

