id: ad.3
family: ad
title: "Evidence preservation and forensic readiness"
class: ISO27035

statement:
  prose: >-
    The organization shall establish procedures for the identification,
    collection, acquisition, and preservation of information that can serve
    as evidence during and after information security incidents. Evidence
    handling procedures shall ensure that the integrity and chain of custody
    of evidence are maintained. The organization shall maintain forensic
    readiness to ensure that evidence can be collected in a legally admissible
    manner when required.

guidance:
  prose: >-
    Forensic readiness involves having the tools, processes, and trained
    personnel in place before an incident occurs. Evidence collection
    procedures should follow recognized forensic standards such as
    ISO/IEC 27037 (guidelines for identification, collection, acquisition,
    and preservation of digital evidence). The chain of custody must be
    documented from the point of collection through storage, analysis,
    and eventual disposition. Evidence should be stored in tamper-evident
    containers or systems with access controls and audit trails. The
    organization should determine in advance which types of incidents
    may require forensic investigation and prepare accordingly.

references:
  - citation: "ISO/IEC 27035-1:2023, Clause 7.3"
    url: "https://www.iso.org/standard/78973.html"
  - citation: "ISO/IEC 27037:2012"
    url: "https://www.iso.org/standard/44381.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement immutable logging infrastructure that preserves audit
      trails in write-once storage. Deploy disk snapshot and memory dump
      capabilities that can be triggered automatically or on-demand during
      incidents. Ensure that infrastructure-as-code templates include
      forensic data collection agents. Maintain forensic-ready container
      images that include necessary tools for evidence collection.
      Implement automated evidence packaging workflows.
    tools:
      - velero
      - s3-object-lock
      - elasticsearch
      - falco
      - sysdig
  devsecops:
    prose: >-
      Ensure that application logs are written to immutable storage and
      include sufficient detail for forensic analysis. Implement pipeline
      artifact retention policies that preserve build artifacts,
      deployment records, and security scan results as potential evidence.
      Configure source code management systems to preserve complete
      audit trails of code changes.
    tools:
      - gitlab-ci
      - git
      - artifactory
      - s3
      - datadog
  secops:
    prose: >-
      Maintain a forensic toolkit with validated tools for disk imaging,
      memory analysis, network capture, and malware analysis. Define
      evidence collection procedures and chain of custody documentation
      templates. Implement automated evidence collection playbooks in the
      SOAR platform. Train incident responders on forensic evidence
      handling and legal requirements. Maintain relationships with
      external forensic service providers for complex investigations.
    tools:
      - autopsy
      - volatility
      - plaso
      - cortex-xsoar
      - the-hive
      - velociraptor

