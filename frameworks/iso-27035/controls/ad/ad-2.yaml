id: ad.2
family: ad
title: "Incident prioritization and escalation"
class: ISO27035

statement:
  prose: >-
    The organization shall prioritize confirmed information security incidents
    based on their assessed impact and urgency. Escalation procedures shall
    be defined and followed to ensure that incidents are handled by personnel
    with the appropriate authority and expertise. Escalation criteria shall
    address both functional escalation (to higher technical expertise) and
    hierarchical escalation (to management authority). Critical incidents
    shall be escalated to senior management and relevant external parties
    as required.

guidance:
  prose: >-
    Prioritization should consider the impact on business operations,
    the sensitivity of affected data, the number of affected systems and
    users, regulatory notification obligations, and reputational risk.
    Escalation procedures should define clear triggers, timeframes, and
    communication channels. Hierarchical escalation should be triggered
    when incidents exceed predefined thresholds, require executive
    decisions (e.g., public disclosure, law enforcement engagement), or
    when response teams require additional resources or authority.
    Escalation paths should be documented and tested regularly.

references:
  - citation: "ISO/IEC 27035-1:2023, Clause 7.2"
    url: "https://www.iso.org/standard/78973.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Configure escalation policies in the on-call management system with
      automatic escalation based on acknowledgment timeouts and severity
      levels. Integrate service criticality data from the service catalog
      to inform prioritization. Implement automated notifications to
      management stakeholders when incidents meet defined escalation
      criteria. Provide war room provisioning automation for critical
      incidents.
    tools:
      - pagerduty
      - opsgenie
      - backstage
      - slack
      - zoom
  devsecops:
    prose: >-
      Define escalation paths for security findings that cannot be
      resolved within the development team. Implement automated escalation
      for critical vulnerabilities that remain unpatched beyond defined
      SLAs. Configure pipeline gates that escalate to security teams
      when critical security checks fail during production deployments.
    tools:
      - gitlab-ci
      - jira
      - defectdojo
      - pagerduty
      - slack
  secops:
    prose: >-
      Configure SOAR workflows with automatic escalation based on
      incident severity and response SLAs. Define escalation matrices
      that map incident types and severity levels to specific response
      teams and management contacts. Implement automated management
      notifications for incidents meeting critical thresholds. Track
      escalation compliance metrics and identify bottlenecks in the
      escalation process.
    tools:
      - cortex-xsoar
      - pagerduty
      - the-hive
      - servicenow
      - splunk

