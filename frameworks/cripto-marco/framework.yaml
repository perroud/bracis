control_families:
  - id: cap-1
    title: "Definitions and Scope"
    description: "Definition of virtual assets, exclusions, and scope of the law governing virtual asset service providers in Brazil."
    articles: "art. 1 ao art. 3"
    control_count: 3
  - id: cap-2
    title: "Directives and Principles"
    description: "Core directives for virtual asset services: governance, transparency, consumer protection, information security, and AML/CFT alignment."
    articles: "art. 4"
    control_count: 1
  - id: cap-3
    title: "VASP Authorization and Regulatory Competence"
    description: "Authorization requirements for virtual asset service providers, regulatory authority competencies, supervision, and licensing of existing financial institutions."
    articles: "art. 5 ao art. 8"
    control_count: 4
  - id: cap-4
    title: "Transition Provisions"
    description: "Adequacy deadlines and transition rules for VASPs already operating prior to the law's enactment."
    articles: "art. 9"
    control_count: 1
  - id: cap-5
    title: "Criminal Penalties and AML/CFT Amendments"
    description: "Amendments to the Penal Code (fraud with virtual assets), financial crimes law, and the AML/CFT framework, including VASPs as obligated entities and the CNPEP registry."
    articles: "art. 10 ao art. 12"
    control_count: 4
  - id: cap-6
    title: "Consumer Protection and Effective Date"
    description: "Applicability of the Consumer Defense Code to virtual asset operations and the law's effective date."
    articles: "art. 13 ao art. 14"
    control_count: 2
related_frameworks:
  - framework_id: bcb-304
    relationship: implements
    description: "A Resolução BCB 304/2023 regulamenta a Lei 14.478/2022, detalhando requisitos para prestadoras de serviços de ativos virtuais (VASPs) autorizadas pelo BCB."
  - framework_id: pld-base
    relationship: complements
    description: "A Lei 9.613/1998 é complementada pela Lei 14.478/2022, que inclui prestadoras de serviços de ativos virtuais no rol de pessoas obrigadas à PLD/FT."
  - framework_id: lgpd
    relationship: complements
    description: "A LGPD complementa o Marco Legal Cripto na proteção de dados pessoais dos usuários de plataformas de criptoativos."
