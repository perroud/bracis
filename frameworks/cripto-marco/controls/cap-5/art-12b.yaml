id: art-12b
family: cap-5
title: "National PEP Registry (CNPEP)"
class: CRIPTO-MARCO
baselines: [vasps-reguladas]
statement:
  prose: |
    Art. 12-A. Ato do Poder Executivo federal regulamentará a disciplina e o
    funcionamento do Cadastro Nacional de Pessoas Expostas Politicamente (CNPEP),
    disponibilizado pelo Portal da Transparência.

    § 1º Os órgãos e as entidades de quaisquer Poderes da União, dos Estados,
    do Distrito Federal e dos Municípios deverão encaminhar ao gestor CNPEP,
    na forma e na periodicidade definidas no regulamento de que trata o caput
    deste artigo, informações atualizadas sobre seus integrantes ou
    ex-integrantes classificados como pessoas expostas politicamente (PEPs)
    na legislação e regulação vigentes.

    § 2º As pessoas referidas no art. 9º desta Lei incluirão consulta ao CNPEP
    entre seus procedimentos para cumprimento das obrigações previstas nos
    arts. 10 e 11 desta Lei, sem prejuízo de outras diligências exigidas na
    forma da legislação.

    § 3º O órgão gestor do CNPEP indicará em transparência ativa, pela internet,
    órgãos e entidades que deixem de cumprir a obrigação prevista no § 1º deste
    artigo.
guidance:
  prose: |
    Article 12-A (inserted into Lei 9.613/1998) establishes the National Registry
    of Politically Exposed Persons (CNPEP), hosted on the Transparency Portal.

    **CNPEP structure:**
    - Managed by the federal government via the Transparency Portal.
    - All government entities (federal, state, and municipal) must submit updated
      information about their current and former PEPs.
    - The registry is publicly accessible for consultation.

    **VASP obligations:**
    - VASPs (as obligated entities under Art. 9º, XIX) must consult CNPEP as
      part of their KYC and ongoing due diligence procedures.
    - CNPEP consultation is mandatory but does not replace other PEP screening
      obligations (commercial PEP databases, international lists).
    - Enhanced due diligence must be applied to customers identified as PEPs.

    **Compliance relevance:**
    PEPs represent higher money laundering risk due to their access to public
    funds and influence. VASPs must implement automated CNPEP checks in their
    onboarding and periodic review processes.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Integrate CNPEP API (Portal da Transparência) into the KYC onboarding
         workflow for automatic PEP screening of all new customers.
      2. Implement periodic batch CNPEP checks against the entire customer base
         to detect customers who become PEPs after onboarding.
      3. Build enhanced due diligence (EDD) workflows that are automatically
         triggered when a customer is identified as a PEP.
      4. Maintain a PEP customer registry with risk classification, approval
         records, and periodic review schedules.
      5. Implement fallback PEP screening using commercial databases when
         CNPEP is unavailable or for international PEP coverage.
    tools:
      - cnpep-api-integration
      - kyc-platform
      - pep-screening-service
      - edd-workflow-engine
  devsecops:
    prose: |
      1. Create automated tests for CNPEP integration including API availability
         checks, response parsing, and error handling.
      2. Implement CI/CD pipeline checks that verify PEP screening is active
         in all customer-facing service deployments.
      3. Build integration tests covering the full PEP detection workflow:
         initial screening, EDD trigger, approval workflow, and periodic review.
      4. Implement mock CNPEP services for testing environments to enable
         reliable automated testing without external dependencies.
    tools:
      - gitlab-ci
      - api-testing-framework
      - mock-service-framework
  secops:
    prose: |
      1. Establish PEP-specific compliance procedures including senior
         management approval for PEP customer onboarding.
      2. Implement periodic review schedules for all PEP customers (at minimum
         annually, or more frequently based on risk classification).
      3. Monitor CNPEP updates and changes to PEP definitions in Brazilian
         legislation and regulation.
      4. Maintain audit trails of all CNPEP consultations and EDD decisions
         for regulatory examination readiness.
    tools:
      - pep-management-system
      - grc-platform
      - audit-trail-system
