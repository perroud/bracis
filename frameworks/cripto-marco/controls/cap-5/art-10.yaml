id: art-10
family: cap-5
title: "Criminal Fraud with Virtual Assets"
class: CRIPTO-MARCO
baselines: [vasps-reguladas]
statement:
  prose: |
    Art. 10. O Decreto-Lei nº 2.848, de 7 de dezembro de 1940 (Código Penal),
    passa a vigorar acrescido do seguinte art. 171-A:

    "Fraude com a utilização de ativos virtuais, valores mobiliários ou ativos
    financeiros

    Art. 171-A. Organizar, gerir, ofertar ou distribuir carteiras ou intermediar
    operações que envolvam ativos virtuais, valores mobiliários ou quaisquer
    ativos financeiros com o fim de obter vantagem ilícita, em prejuízo alheio,
    induzindo ou mantendo alguém em erro, mediante artifício, ardil ou qualquer
    outro meio fraudulento.

    Pena — reclusão, de 4 (quatro) a 8 (oito) anos, e multa."
guidance:
  prose: |
    Article 10 introduces a new crime into the Brazilian Penal Code (Art. 171-A)
    specifically targeting fraud involving virtual assets, securities, and
    financial assets.

    **Criminal conduct elements:**
    - **Actions:** organizing, managing, offering, distributing wallets/portfolios,
      or intermediating operations.
    - **Subject matter:** virtual assets, securities, or any financial assets.
    - **Intent:** obtaining illicit advantage to the detriment of others.
    - **Means:** inducing or maintaining someone in error through artifice,
      deceit, or any other fraudulent means.

    **Penalty:** imprisonment from 4 to 8 years, plus a fine.

    **Practical scope:**
    This provision targets crypto pyramid schemes, Ponzi schemes, rug pulls,
    fraudulent ICOs/IEOs, fake exchanges, and any scheme that uses virtual
    assets as a vehicle for fraud. The penalty is significantly higher than
    ordinary fraud (Art. 171 CP: 1-5 years).

    **Compliance relevance:**
    VASPs must implement controls to detect and prevent their platforms from
    being used as instruments of fraud, and to avoid any business practices
    that could be construed as fraudulent.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement fraud detection systems using behavioral analytics and
         anomaly detection to identify potential pyramid/Ponzi patterns.
      2. Build transaction monitoring rules that flag suspicious patterns:
         rapid fund aggregation, uniform distribution to multiple wallets,
         and artificial volume generation.
      3. Implement token listing due diligence workflows that screen for
         fraudulent projects before allowing trading on the platform.
      4. Create whistleblower channels and automated reporting mechanisms
         for suspected fraudulent activities.
      5. Implement circuit breakers that automatically halt trading in
         assets showing characteristics of fraud (rug pulls, pump-and-dump).
    tools:
      - fraud-detection-engine
      - behavioral-analytics
      - transaction-monitoring-system
      - circuit-breaker-service
  devsecops:
    prose: |
      1. Implement automated tests for fraud detection rules to ensure
         they correctly identify known fraud patterns.
      2. Build security scanning for smart contracts before token listing,
         checking for known malicious patterns (honeypots, hidden mints).
      3. Create CI/CD pipeline stages that validate anti-fraud controls
         are active in all production environments.
      4. Implement red team exercises simulating fraud scenarios to test
         detection and response capabilities.
    tools:
      - gitlab-ci
      - smart-contract-scanner
      - fraud-rule-testing-framework
      - red-team-toolkit
  secops:
    prose: |
      1. Establish a fraud investigation team with clear escalation
         procedures and law enforcement liaison protocols.
      2. Maintain cooperation agreements with police (Polícia Federal)
         and prosecutors (Ministério Público) for fraud case referrals.
      3. Track fraud indicators across the platform and generate periodic
         fraud risk assessments.
      4. Implement evidence preservation procedures for fraud cases,
         including blockchain forensic analysis capabilities.
      5. Monitor industry intelligence on known crypto fraud schemes
         and update detection rules accordingly.
    tools:
      - fraud-investigation-system
      - blockchain-forensics
      - evidence-preservation-system
      - threat-intelligence-platform
