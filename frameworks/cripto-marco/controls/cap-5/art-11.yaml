id: art-11
family: cap-5
title: "VASPs as Financial System Entities"
class: CRIPTO-MARCO
baselines: [vasps-reguladas]
statement:
  prose: |
    Art. 11. O parágrafo único do art. 1º da Lei nº 7.492, de 16 de junho
    de 1986, passa a vigorar com as seguintes alterações:

    "Art. 1º ....................................................................

    Parágrafo único. ............................................................

    ................................................................................

    I-A — a pessoa jurídica que ofereça serviços referentes a operações com
    ativos virtuais, inclusive intermediação, negociação ou custódia;

    ................................................................................(NR)"
guidance:
  prose: |
    Article 11 amends Lei 7.492/1986 (Crimes Against the National Financial
    System) to include VASPs in the definition of entities subject to financial
    crimes legislation.

    **Key implications:**
    By adding inciso I-A to Art. 1º, parágrafo único, of Lei 7.492/1986,
    VASPs are now considered equivalent to financial institutions for the
    purpose of criminal liability. This means:

    - **Officers and directors of VASPs** can be personally criminally liable
      for financial crimes committed through the platform.
    - **All financial crimes** defined in Lei 7.492/1986 now apply to VASPs,
      including: unauthorized operation (Art. 16), mismanagement (Art. 17),
      insider trading (Art. 27), and others.
    - **Operating without authorization** (Art. 16) carries a penalty of
      1-4 years imprisonment — directly connecting to Art. 2's authorization
      requirement.

    **Compliance urgency:**
    This provision raises the stakes dramatically. Non-compliance with VASP
    regulations is no longer merely an administrative issue — it can trigger
    criminal prosecution of management.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement strong identity and access management (IAM) ensuring
         traceability of all actions by officers and directors.
      2. Build immutable audit logs for all critical operations (account
         creation, large transactions, system configuration changes).
      3. Implement segregation of duties controls preventing any single
         individual from having unchecked authority over critical functions.
      4. Create compliance dashboards for management showing real-time
         status of all legal obligations and potential exposure areas.
    tools:
      - iam-system
      - immutable-audit-log
      - segregation-of-duties-engine
      - compliance-dashboard
  devsecops:
    prose: |
      1. Implement four-eyes-principle enforcement in CI/CD pipelines for
         all changes to critical financial system components.
      2. Create automated compliance checks that validate all platform
         operations comply with Lei 7.492 requirements.
      3. Build tamper-proof deployment logs that provide evidence of who
         approved and deployed each change to production.
      4. Implement mandatory security reviews for all changes affecting
         financial transaction processing.
    tools:
      - gitlab-ci
      - approval-workflow
      - immutable-deployment-log
      - security-review-pipeline
  secops:
    prose: |
      1. Establish management liability awareness training covering Lei
         7.492 obligations and personal criminal exposure.
      2. Implement D&O (Directors and Officers) risk monitoring, tracking
         potential liability exposure for each management role.
      3. Maintain legal defense readiness with pre-engaged criminal defense
         counsel experienced in financial crimes.
      4. Create incident escalation procedures that immediately involve
         legal counsel when potential financial crimes are detected.
    tools:
      - training-management-system
      - grc-platform
      - incident-escalation-system
