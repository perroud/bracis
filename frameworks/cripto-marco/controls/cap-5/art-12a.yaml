id: art-12a
family: cap-5
title: "AML/CFT Amendments — VASPs as Obligated Entities"
class: CRIPTO-MARCO
baselines: [vasps-reguladas]
statement:
  prose: |
    Art. 12. A Lei nº 9.613, de 3 de março de 1998, passa a vigorar com as
    seguintes alterações:

    "Art. 1º ....................................................................

    ................................................................................

    § 4º A pena será aumentada de 1/3 (um terço) a 2/3 (dois terços) se os
    crimes definidos nesta Lei forem cometidos de forma reiterada, por
    intermédio de organização criminosa ou por meio da utilização de ativo
    virtual.

    ................................................................................(NR)"

    "Art. 9º ....................................................................

    ................................................................................

    Parágrafo único. ............................................................

    ................................................................................

    XIX — as prestadoras de serviços de ativos virtuais. (NR)"

    "Art. 10. ....................................................................

    ................................................................................

    II — manterão registro de toda transação em moeda nacional ou estrangeira,
    títulos e valores mobiliários, títulos de crédito, metais, ativos virtuais,
    ou qualquer ativo passível de ser convertido em dinheiro, que ultrapassar
    limite fixado pela autoridade competente e nos termos de instruções por
    esta expedidas;

    ................................................................................(NR)"
guidance:
  prose: |
    Article 12 makes three critical amendments to Lei 9.613/1998 (AML/CFT Law):

    **1. Enhanced penalties for crypto-facilitated money laundering (§ 4º):**
    Money laundering committed through virtual assets triggers an aggravating
    factor: penalty increase of 1/3 to 2/3. This also applies when the crime
    is committed repeatedly or through criminal organizations.

    **2. VASPs as obligated entities (Art. 9º, XIX):**
    VASPs are added to the list of obligated entities under the AML/CFT law.
    This triggers the full set of AML/CFT obligations:
    - Customer identification and due diligence (KYC)
    - Transaction monitoring and suspicious activity reporting to COAF
    - Record-keeping of transactions and client data
    - Internal AML/CFT policies and procedures
    - Employee training on AML/CFT
    - Compliance officer appointment

    **3. Transaction record-keeping expanded to virtual assets (Art. 10, II):**
    The mandatory transaction record-keeping requirement now explicitly includes
    virtual assets alongside traditional financial instruments, requiring
    registration of all transactions exceeding thresholds set by the competent
    authority.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement comprehensive KYC/KYB onboarding workflows with identity
         verification, document validation, and risk scoring.
      2. Build real-time transaction monitoring system with configurable rules
         for detecting suspicious patterns (structuring, layering, rapid
         movement through multiple wallets).
      3. Implement automated STR (Suspicious Transaction Report) generation
         and COAF SISCOAF filing integration.
      4. Build complete transaction record-keeping system maintaining all
         transactions above regulatory thresholds with full audit trail.
      5. Implement blockchain analytics integration for on-chain transaction
         tracing, wallet risk scoring, and counterparty identification.
      6. Deploy sanctions screening against OFAC, UN, EU, and Brazilian
         sanctions lists for all counterparties and wallet addresses.
    tools:
      - kyc-platform
      - transaction-monitoring-system
      - coaf-siscoaf-integration
      - blockchain-analytics
      - sanctions-screening-api
  devsecops:
    prose: |
      1. Create automated tests for all KYC workflow paths including edge
         cases (PEPs, high-risk jurisdictions, complex corporate structures).
      2. Implement pipeline stages that validate AML/CFT monitoring rules
         are active and correctly configured in all environments.
      3. Build regression tests for STR generation logic to ensure
         suspicious patterns are correctly identified and reported.
      4. Implement data retention validation in CI/CD ensuring transaction
         records meet the minimum 5-year retention requirement.
      5. Create load tests for transaction monitoring to ensure real-time
         processing capability under peak volumes.
    tools:
      - gitlab-ci
      - test-automation-framework
      - load-testing-tools
      - compliance-pipeline
  secops:
    prose: |
      1. Establish a dedicated AML/CFT compliance function with a designated
         compliance officer responsible for COAF communications.
      2. Implement ongoing customer due diligence (CDD) with periodic reviews
         based on customer risk classification.
      3. Maintain AML/CFT training programs for all employees with annual
         refresher courses and new-hire onboarding modules.
      4. Conduct periodic AML/CFT risk assessments covering all product lines,
         customer segments, and geographic exposures.
      5. Monitor COAF circulars and BCB guidance for updated reporting
         thresholds, typologies, and filing requirements.
      6. Implement PEP (Politically Exposed Person) screening using the
         CNPEP registry established by Art. 12-A of the amended law.
    tools:
      - aml-compliance-platform
      - coaf-reporting-system
      - training-management-system
      - risk-assessment-framework
      - pep-screening-service
