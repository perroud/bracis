id: art-6
family: cap-3
title: "Designation of Regulatory Authority"
class: CRIPTO-MARCO
baselines: [vasps-reguladas]
statement:
  prose: |
    Art. 6º Ato do Poder Executivo atribuirá a um ou mais órgãos ou entidades
    da Administração Pública federal a disciplina do funcionamento e a supervisão
    da prestadora de serviços de ativos virtuais.
guidance:
  prose: |
    Article 6 delegates to the Executive Branch (via decree) the designation of
    one or more federal agencies to regulate and supervise VASPs. This was
    subsequently fulfilled by Decree 11.563/2023, which designated:
    - **Banco Central do Brasil (BCB)** as the primary regulator and supervisor
      of VASPs for payment and exchange services.
    - **CVM** retains jurisdiction over virtual assets classified as securities.

    **Regulatory architecture:**
    The dual-regulator model means VASPs may be subject to BCB oversight for
    exchange/custody/transfer services and CVM oversight if they also deal with
    tokenized securities. This creates potential compliance complexity for
    multi-service platforms.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement a regulatory mapping service that tracks which regulator
         (BCB, CVM, or both) has jurisdiction over each platform service.
      2. Build compliance reporting modules that generate reports in the
         format required by each applicable regulator.
      3. Maintain separate regulatory communication channels and filing
         systems for BCB and CVM requirements.
      4. Implement role-based access controls for regulatory reporting
         functions, ensuring segregation between BCB and CVM compliance teams.
    tools:
      - regulatory-mapping-service
      - compliance-reporting-engine
      - rbac-system
  devsecops:
    prose: |
      1. Create pipeline configurations that include regulatory-specific
         compliance checks based on which regulator oversees each service.
      2. Implement automated regulatory filing validation before submission
         to ensure data format and content compliance.
      3. Maintain separate test environments mirroring regulatory reporting
         requirements for BCB and CVM.
      4. Build documentation-as-code for regulatory reporting schemas,
         version-controlled alongside the codebase.
    tools:
      - gitlab-ci
      - schema-validation-tools
      - documentation-as-code
  secops:
    prose: |
      1. Monitor official gazette (DOU) and regulatory websites for new
         decrees or amendments affecting regulator designation.
      2. Maintain a regulatory calendar with all filing deadlines for each
         designated authority (BCB, CVM).
      3. Track supervisory actions, inspections, and examination schedules
         from each regulator.
      4. Establish liaison protocols with designated regulatory contacts
         at BCB and CVM for compliance inquiries.
    tools:
      - regulatory-monitoring-service
      - compliance-calendar
      - grc-platform
legal_references:
  - framework_id: bcb-304
    articles: ["art-1"]
    relationship: implements
