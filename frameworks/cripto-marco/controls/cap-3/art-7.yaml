id: art-7
family: cap-3
title: "Regulatory Authority Competencies"
class: CRIPTO-MARCO
baselines: [vasps-reguladas]
statement:
  prose: |
    Art. 7º Compete ao órgão ou à entidade reguladora indicada em ato do Poder
    Executivo Federal:

    I — autorizar funcionamento, transferência de controle, fusão, cisão e
    incorporação da prestadora de serviços de ativos virtuais;

    II — estabelecer condições para o exercício de cargos em órgãos estatutários
    e contratuais em prestadora de serviços de ativos virtuais e autorizar a posse
    e o exercício de pessoas para cargos de administração;

    III — supervisionar a prestadora de serviços de ativos virtuais e aplicar as
    disposições da Lei nº 13.506, de 13 de novembro de 2017, em caso de
    descumprimento desta Lei ou de sua regulamentação;

    IV — cancelar, de ofício ou a pedido, as autorizações de que tratam os
    incisos I e II deste caput; e

    V — dispor sobre as hipóteses em que as atividades ou operações de que trata
    o art. 5º desta Lei serão incluídas no mercado de câmbio ou em que deverão
    submeter-se à regulamentação de capitais brasileiros no exterior e capitais
    estrangeiros no País.

    Parágrafo único. O órgão ou a entidade da Administração Pública federal de
    que trata o caput definirá as hipóteses que poderão provocar o cancelamento
    previsto no inciso IV do caput deste artigo e o respectivo procedimento.
guidance:
  prose: |
    Article 7 enumerates the five core competencies of the designated regulatory
    authority (BCB), covering the full lifecycle of VASP supervision.

    **Competency breakdown:**
    1. **Authorization** (I) — licensing of new VASPs and approval of corporate
       changes (M&A, spin-offs, control transfers).
    2. **Management fitness** (II) — fit-and-proper requirements for directors
       and officers, including background checks and qualifications.
    3. **Supervision and enforcement** (III) — ongoing oversight with enforcement
       powers under Lei 13.506/2017 (administrative penalties framework).
    4. **License revocation** (IV) — authority to cancel authorizations, either
       at the regulator's initiative or upon request.
    5. **Foreign exchange regulation** (V) — power to determine when crypto
       operations constitute foreign exchange transactions or cross-border
       capital flows, triggering additional compliance requirements.

    **Enforcement framework:**
    Lei 13.506/2017 provides the penalty toolkit: warnings, fines (up to
    R$ 2 billion or 0.5% of revenue), temporary or permanent bans from
    management positions, and restriction of activities.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build a corporate governance management system tracking all officers,
         directors, and key function holders with their BCB approval status.
      2. Implement automated notifications for corporate events that require
         regulatory approval (control changes, mergers, new officer appointments).
      3. Create a regulatory compliance dashboard showing authorization status,
         pending approvals, and any supervisory actions or restrictions.
      4. For cross-border operations (inciso V), implement transaction flagging
         that identifies operations potentially subject to foreign exchange rules.
    tools:
      - corporate-governance-system
      - regulatory-notification-engine
      - compliance-dashboard
      - fx-transaction-classifier
  devsecops:
    prose: |
      1. Implement access control policies ensuring only BCB-approved officers
         can access administrative and compliance-critical systems.
      2. Create audit trails for all corporate governance changes (officer
         appointments, corporate restructuring) with immutable logging.
      3. Build pipeline checks that validate management authorization before
         granting privileged system access.
      4. Implement change management workflows requiring compliance approval
         for modifications to foreign exchange classification rules.
    tools:
      - gitlab-ci
      - vault
      - immutable-audit-log
      - change-management-system
  secops:
    prose: |
      1. Monitor BCB supervisory actions database for any actions affecting
         the entity or its industry peers (precedent tracking).
      2. Maintain readiness for BCB on-site and remote examinations with
         pre-packaged evidence sets covering each competency area.
      3. Track management fitness requirements and renewal deadlines for
         all BCB-approved officers and directors.
      4. Monitor regulatory guidance on foreign exchange treatment of virtual
         asset operations, particularly cross-border transfers.
    tools:
      - grc-platform
      - examination-readiness-system
      - regulatory-monitoring-service
