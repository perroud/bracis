id: art-8
family: cap-3
title: "Existing Financial Institutions as VASPs"
class: CRIPTO-MARCO
baselines: [vasps-reguladas]
statement:
  prose: |
    Art. 8º As instituições autorizadas a funcionar pelo Banco Central do Brasil
    poderão prestar exclusivamente o serviço de ativos virtuais ou cumulá-lo com
    outras atividades, na forma da regulamentação a ser editada por órgão ou
    entidade da Administração Pública federal indicada em ato do Poder Executivo
    federal.
guidance:
  prose: |
    Article 8 allows institutions already authorized by BCB (banks, payment
    institutions, credit unions, etc.) to also provide virtual asset services,
    either as their sole activity or in combination with their existing
    licensed activities.

    **Key implications:**
    - Banks and payment institutions do not need a separate VASP license — they
      can add virtual asset services under their existing authorization.
    - This creates a competitive advantage for established financial institutions
      that already meet BCB's governance, capital, and compliance requirements.
    - The regulator will define the specific conditions for cumulative service
      provision, potentially requiring additional capital buffers or operational
      segregation.
    - This provision enables the integration of crypto services into traditional
      banking apps and payment platforms.

    **Operational segregation risk:**
    When combining traditional financial services with virtual asset services,
    the institution must ensure proper segregation of activities, risk management,
    and capital allocation to prevent contagion between business lines.
implementation_guidance:
  platform_engineering:
    prose: |
      1. For institutions adding VASP services, implement service isolation
         between traditional banking modules and virtual asset modules.
      2. Build separate risk engines for virtual asset operations to prevent
         risk contagion with traditional banking activities.
      3. Implement unified identity management that supports both traditional
         KYC and enhanced crypto-specific due diligence requirements.
      4. Create APIs that enable integration of virtual asset services into
         existing banking applications while maintaining regulatory segregation.
    tools:
      - microservices-architecture
      - risk-engine
      - identity-management-system
      - api-gateway
  devsecops:
    prose: |
      1. Implement separate deployment pipelines for virtual asset service
         modules versus traditional banking modules.
      2. Create security boundary tests verifying isolation between VASP
         services and traditional financial services.
      3. Build compliance gates specific to virtual asset services that run
         in addition to existing banking compliance checks.
      4. Implement code review policies requiring both traditional banking
         compliance and crypto-specific compliance team approvals for
         cross-cutting changes.
    tools:
      - gitlab-ci
      - container-isolation
      - compliance-pipeline
      - codeowners
  secops:
    prose: |
      1. Monitor combined risk exposure across traditional and virtual asset
         activities with separate risk reporting for each business line.
      2. Maintain separate incident response procedures for virtual asset
         service incidents versus traditional banking incidents.
      3. Track regulatory requirements specific to cumulative service provision,
         including additional capital requirements and operational segregation.
      4. Conduct periodic assessments of cross-contamination risk between
         traditional banking and virtual asset service operations.
    tools:
      - risk-management-platform
      - incident-management-system
      - grc-platform
legal_references:
  - framework_id: bcb-304
    articles: ["art-5", "art-6"]
    relationship: implements
