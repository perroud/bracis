id: art-5
family: cap-3
title: "Definition of Virtual Asset Service Provider and Services"
class: CRIPTO-MARCO
baselines: [vasps-reguladas]
statement:
  prose: |
    Art. 5º Considera-se prestadora de serviços de ativos virtuais a pessoa jurídica
    que executa, em nome de terceiros, pelo menos um dos serviços de ativos virtuais,
    entendidos como:

    I — troca entre ativos virtuais e moeda nacional ou moeda estrangeira;

    II — troca entre um ou mais ativos virtuais;

    III — transferência de ativos virtuais;

    IV — custódia ou administração de ativos virtuais ou de instrumentos que
    possibilitem controle sobre ativos virtuais; ou

    V — participação em serviços financeiros e prestação de serviços relacionados
    à oferta por um emissor ou venda de ativos virtuais.

    Parágrafo único. O órgão ou a entidade da Administração Pública federal indicado
    em ato do Poder Executivo poderá autorizar a realização de outros serviços que
    estejam, direta ou indiretamente, relacionados à atividade da prestadora de
    serviços de ativos virtuais de que trata o caput deste artigo.
guidance:
  prose: |
    Article 5 defines what constitutes a virtual asset service provider (VASP)
    and enumerates the five categories of regulated services. This definition is
    aligned with FATF Recommendation 15 on virtual asset service providers.

    **VASP definition:**
    Any legal entity that performs, on behalf of third parties, at least one of
    the listed virtual asset services. Key elements:
    - Must be a legal entity (pessoa jurídica) — natural persons cannot be VASPs.
    - Must act on behalf of third parties (em nome de terceiros) — self-custody
      and peer-to-peer transactions without intermediation are excluded.

    **Five regulated services:**
    1. **Fiat-crypto exchange** (I) — buying/selling crypto for BRL or foreign currency.
    2. **Crypto-crypto exchange** (II) — trading between different virtual assets.
    3. **Transfer** (III) — moving virtual assets between accounts or wallets.
    4. **Custody/administration** (IV) — holding assets or keys on behalf of clients.
    5. **Financial services/offering** (V) — participating in token offerings, ICOs,
       IEOs, and related distribution services.

    **Expandable scope:**
    The regulator may authorize additional services beyond the five listed categories,
    allowing the regulatory perimeter to evolve with the market.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Map each platform service to the five regulatory categories in Art. 5
         and maintain this mapping in a service registry.
      2. Implement service-level access controls that restrict each operational
         module to its authorized service category.
      3. Build a service inventory API that returns which Art. 5 services are
         active, enabling compliance verification.
      4. For custody services (inciso IV), implement dedicated key management
         infrastructure with HSM integration and multi-signature controls.
      5. For exchange services (incisos I and II), implement order book systems
         with full audit trails and trade matching transparency.
    tools:
      - service-registry
      - hsm-key-management
      - order-book-engine
      - audit-trail-system
  devsecops:
    prose: |
      1. Create automated compliance checks that verify each deployed service
         module maps to an authorized Art. 5 service category.
      2. Implement pipeline gates that require compliance review before
         deploying new service features that could expand the regulatory scope.
      3. Build integration tests verifying service boundaries — ensuring
         exchange, transfer, custody, and offering services operate within
         their defined regulatory perimeters.
      4. Implement code ownership rules requiring compliance team review for
         changes to custody and key management modules.
    tools:
      - gitlab-ci
      - codeowners
      - compliance-pipeline
      - integration-test-suite
  secops:
    prose: |
      1. Maintain a live inventory of all active services mapped to Art. 5
         categories, updated whenever new features are deployed.
      2. Monitor for unauthorized service provision — any platform feature
         that could constitute a regulated service without proper authorization.
      3. Track regulatory guidance on the scope of each service category,
         particularly custody (inciso IV) which has broad interpretation.
      4. Conduct annual reviews of service scope versus authorization to
         identify any drift or new services requiring additional licensing.
    tools:
      - service-inventory-system
      - grc-platform
      - regulatory-monitoring-service
legal_references:
