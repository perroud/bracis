id: art-9
family: cap-4
title: "Transition Provisions for Existing VASPs"
class: CRIPTO-MARCO
baselines: [vasps-reguladas]
statement:
  prose: |
    Art. 9º O órgão ou a entidade da Administração Pública federal de que trata
    o caput do art. 2º desta Lei estabelecerá condições e prazos, não inferiores
    a 6 (seis) meses, para adequação das prestadoras de serviços de ativos
    virtuais que estiverem em atividade às disposições desta Lei e às normas
    por ele estabelecidas.
guidance:
  prose: |
    Article 9 provides transition rules for VASPs that were already operating
    before the law's enactment. The designated regulator must grant a minimum
    of 6 months for existing operators to comply with the new requirements.

    **Key aspects:**
    - The minimum grace period is 6 months, but the regulator may grant longer
      periods depending on the complexity of compliance requirements.
    - BCB Resolução 304/2023 established specific transition timelines:
      existing VASPs had until June 2024 to submit authorization applications.
    - During the transition period, existing VASPs may continue operating but
      must demonstrate good faith efforts toward compliance.
    - VASPs that fail to apply for authorization within the transition period
      must cease operations or face enforcement action.

    **Practical implications:**
    The transition provision creates a "grandfathering" window but does not
    guarantee authorization. VASPs must meet all requirements to obtain
    permanent authorization, regardless of their pre-existing operations.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build a compliance readiness tracker that monitors progress toward
         meeting each regulatory requirement with timeline milestones.
      2. Implement a phased feature rollout system that can enable compliance
         features (KYC, AML monitoring, segregation) according to the
         transition timeline.
      3. Create a regulatory compliance API that reports current compliance
         status against each requirement, enabling automated progress tracking.
      4. Build data migration tools to restructure existing user data,
         transaction records, and custody arrangements to meet new requirements.
    tools:
      - compliance-tracker
      - feature-flag-system
      - data-migration-toolkit
  devsecops:
    prose: |
      1. Create a transition compliance pipeline that validates progress
         toward regulatory requirements at each sprint.
      2. Implement feature flags for compliance features that can be activated
         according to the transition timeline.
      3. Build automated tests for each compliance requirement, enabling
         continuous validation of readiness status.
      4. Implement a compliance debt tracker in the CI/CD pipeline that
         flags remaining non-compliant areas.
    tools:
      - gitlab-ci
      - feature-flags
      - compliance-debt-tracker
  secops:
    prose: |
      1. Maintain a compliance gap analysis document mapping each regulatory
         requirement to current status and remediation timeline.
      2. Track all regulatory deadlines and filing dates related to the
         transition period.
      3. Monitor BCB communications for extensions, clarifications, or
         modifications to transition requirements.
      4. Prepare evidence packages demonstrating good faith compliance efforts
         during the transition period for regulatory examinations.
    tools:
      - grc-platform
      - compliance-calendar
      - evidence-management-system
legal_references:
  - framework_id: bcb-304
    articles: ["art-25", "art-26"]
    relationship: implements
