id: art-4
family: cap-2
title: "Directives for Virtual Asset Services"
class: CRIPTO-MARCO
baselines: [vasps-reguladas]
statement:
  prose: |
    Art. 4º A prestação de serviço de ativos virtuais deve observar as seguintes
    diretrizes, segundo parâmetros a serem estabelecidos pelo órgão ou pela entidade
    da Administração Pública federal definido em ato do Poder Executivo:

    I — livre iniciativa e livre concorrência;

    II — boas práticas de governança, transparência nas operações e abordagem
    baseada em riscos;

    III — segurança da informação e proteção de dados pessoais;

    IV — proteção e defesa de consumidores e usuários;

    V — proteção à poupança popular;

    VI — solidez e eficiência das operações; e

    VII — prevenção à lavagem de dinheiro e ao financiamento do terrorismo e da
    proliferação de armas de destruição em massa, em alinhamento com os padrões
    internacionais.
guidance:
  prose: |
    Article 4 establishes the seven foundational directives that all virtual asset
    service providers must observe. These directives form the principled basis for
    all subsequent regulation by the designated authority (BCB).

    **Directive breakdown:**
    1. **Free enterprise and competition** (I) — prevents monopolistic practices
       and ensures market access.
    2. **Governance, transparency, and risk-based approach** (II) — requires
       corporate governance structures and risk management frameworks.
    3. **Information security and data protection** (III) — aligns with LGPD
       and cybersecurity best practices.
    4. **Consumer and user protection** (IV) — disclosure, suitability, and
       fair dealing obligations.
    5. **Protection of popular savings** (V) — safeguards against losses of
       retail investors' funds.
    6. **Operational soundness and efficiency** (VI) — operational resilience,
       business continuity, and system reliability.
    7. **AML/CFT compliance** (VII) — alignment with FATF standards for
       anti-money laundering and counter-terrorism financing.

    These directives are principles-based, with specific requirements to be
    defined by the regulator (BCB via Resolução BCB 304/2023 and subsequent norms).
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement a governance dashboard that tracks compliance status against
         each of the seven directives.
      2. Build a risk-based approach engine that classifies operations by risk
         level (low/medium/high) and applies proportional controls.
      3. Deploy information security controls aligned with ISO 27001 and LGPD,
         including encryption at rest and in transit for all user data.
      4. Implement consumer protection features: clear fee disclosure, risk
         warnings, order confirmation flows, and cooling-off periods.
      5. Build operational resilience infrastructure: redundant systems, failover
         mechanisms, and 99.9%+ SLA targets for critical services.
      6. Integrate AML/CFT screening APIs for real-time transaction monitoring
         and sanctions list checking.
    tools:
      - governance-dashboard
      - risk-engine
      - encryption-services
      - aml-screening-api
      - monitoring-stack
  devsecops:
    prose: |
      1. Implement security scanning in all CI/CD pipelines (SAST, DAST,
         dependency scanning, secret detection) to satisfy directive III.
      2. Create compliance-as-code policies enforcing governance requirements
         (mandatory code review, branch protection, approval workflows).
      3. Build automated tests for consumer protection features (fee display,
         risk disclosures, transaction confirmations).
      4. Implement chaos engineering practices to validate operational
         resilience and business continuity (directive VI).
      5. Add AML/CFT integration tests verifying sanctions screening and
         transaction monitoring are active in all environments.
    tools:
      - gitlab-ci
      - sonarqube
      - trivy
      - gitleaks
      - chaos-engineering-toolkit
  secops:
    prose: |
      1. Conduct periodic risk assessments mapping each directive to current
         control effectiveness and identifying gaps.
      2. Monitor regulatory publications for new parameters and requirements
         issued under each directive.
      3. Implement a GRC framework tracking compliance across all seven
         directives with evidence collection and audit readiness.
      4. Establish incident response procedures covering cybersecurity events
         (directive III), consumer complaints (directive IV), and suspicious
         transaction reports (directive VII).
      5. Generate quarterly compliance reports for each directive, including
         metrics, exceptions, and remediation plans.
    tools:
      - grc-platform
      - siem
      - incident-management-system
      - regulatory-monitoring-service
legal_references:
