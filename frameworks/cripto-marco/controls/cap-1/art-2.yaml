id: art-2
family: cap-1
title: "Prior Authorization Requirement for VASPs"
class: CRIPTO-MARCO
baselines: [vasps-reguladas]
statement:
  prose: |
    Art. 2º As prestadoras de serviços de ativos virtuais somente poderão funcionar
    no País mediante prévia autorização de órgão ou entidade da Administração
    Pública federal.

    Parágrafo único. Ato do órgão ou da entidade da Administração Pública federal
    a que se refere o caput estabelecerá as hipóteses e os parâmetros em que a
    autorização de que trata o caput deste artigo poderá ser concedida mediante
    procedimento simplificado.
guidance:
  prose: |
    Article 2 establishes the mandatory prior authorization regime for any entity
    wishing to operate as a VASP in Brazil. No virtual asset service provider may
    operate without prior authorization from the designated federal authority
    (subsequently defined as BCB by Decree 11.563/2023).

    **Key implications:**
    - Operating a VASP without authorization constitutes an illegal activity and
      may trigger criminal penalties under the financial crimes law (Lei 7.492/1986).
    - The regulator may establish simplified authorization procedures for certain
      categories of VASPs, allowing a tiered licensing approach.
    - Foreign VASPs serving Brazilian customers must also obtain authorization,
      as the law applies to services provided "in the Country" (no País).
    - The authorization requirement covers all services listed in Art. 5, including
      exchange, transfer, custody, and offering of virtual assets.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement a license verification system that validates VASP authorization
         status before enabling any production service endpoint.
      2. Store authorization credentials (BCB license number, authorization date,
         authorized services) in a secure configuration registry.
      3. Build automated health checks that verify continued authorization status
         by querying BCB's registry of authorized institutions.
      4. Implement geographic access controls to ensure only services authorized
         for Brazilian operations are accessible from BR IP ranges.
    tools:
      - license-management-system
      - configuration-registry
      - geo-access-control
  devsecops:
    prose: |
      1. Add pre-deployment checks in CI/CD pipelines that validate the platform's
         authorization status is current before any production deployment.
      2. Implement infrastructure-as-code templates that include authorization
         metadata as deployment prerequisites.
      3. Create automated compliance gates that block deployment of new services
         not covered by existing BCB authorization.
      4. Maintain audit trails of all authorization-related configuration changes
         in version-controlled repositories.
    tools:
      - gitlab-ci
      - terraform
      - vault
      - compliance-pipeline
  secops:
    prose: |
      1. Monitor BCB publications and circulars for changes to authorization
         requirements, simplified procedures, or new service categories.
      2. Maintain a calendar of authorization renewal deadlines and regulatory
         filing requirements.
      3. Implement alerting for any BCB administrative actions affecting the
         entity's authorization status.
      4. Conduct periodic internal audits to verify that all active services
         are covered by the current authorization scope.
    tools:
      - grc-platform
      - regulatory-calendar
      - audit-management-system
legal_references:
  - framework_id: bcb-304
    articles: ["art-5", "art-6", "art-7", "art-8"]
    relationship: implements
