id: art-3
family: cap-1
title: "Definition of Virtual Assets"
class: CRIPTO-MARCO
baselines: [vasps-reguladas]
statement:
  prose: |
    Art. 3º Para os efeitos desta Lei, considera-se ativo virtual a representação
    digital de valor que pode ser negociada ou transferida por meios eletrônicos e
    utilizada para realização de pagamentos ou com propósito de investimento, não
    incluídos:

    I — moeda nacional e moedas estrangeiras;

    II — moeda eletrônica, nos termos da Lei nº 12.865, de 9 de outubro de 2013;

    III — instrumentos que provejam ao seu titular acesso a produtos ou serviços
    especificados ou a benefício proveniente desses produtos ou serviços, a exemplo
    de pontos e recompensas de programas de fidelidade; e

    IV — representações de ativos cuja emissão, escrituração, negociação ou
    liquidação esteja prevista em lei ou regulamento, a exemplo de valores
    mobiliários e de ativos financeiros.

    Parágrafo único. Competirá a órgão ou entidade da Administração Pública federal
    definido em ato do Poder Executivo estabelecer quais serão os ativos financeiros
    regulados, para fins desta Lei.
guidance:
  prose: |
    Article 3 provides the legal definition of "virtual asset" for the purposes
    of the Brazilian crypto framework. The definition is aligned with FATF's
    concept of virtual asset but explicitly carves out several categories.

    **Positive definition:**
    A virtual asset is a digital representation of value that can be traded or
    transferred electronically and used for payments or investment purposes.

    **Exclusions (negative definition):**
    1. **Fiat currencies** — BRL and foreign currencies are not virtual assets.
    2. **Electronic money** — as defined by Lei 12.865/2013 (e.g., DREX/digital real).
    3. **Loyalty instruments** — airline miles, reward points, and similar programs
       that grant access to specific products/services.
    4. **Regulated financial instruments** — securities, financial assets, and other
       instruments whose issuance, bookkeeping, trading, or settlement is already
       governed by existing law (e.g., CVM-regulated tokens).

    **Classification challenge:**
    The boundary between "virtual asset" and "security token" is critical. Tokens
    that grant profit-sharing rights or represent equity may fall under CVM
    jurisdiction rather than this law.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build a token taxonomy service that classifies assets against the four
         exclusion categories defined in Art. 3 (fiat, e-money, loyalty, securities).
      2. Implement validation rules in the asset listing workflow that reject
         tokens matching any exclusion criterion.
      3. Create an API endpoint that returns the regulatory classification of any
         token, including the specific exclusion category if applicable.
      4. Maintain a whitelist/blacklist system for assets that have been
         definitively classified by the regulator.
      5. Integrate with CVM and BCB registries to cross-reference token
         classifications against official regulatory determinations.
    tools:
      - token-taxonomy-service
      - asset-classification-api
      - regulatory-registry-integration
  devsecops:
    prose: |
      1. Create automated tests covering classification logic for each exclusion
         category (fiat, e-money, loyalty programs, securities).
      2. Implement policy-as-code rules that block listing of tokens matching
         any exclusion criterion without explicit regulatory clearance.
      3. Add regression tests for edge cases: stablecoins pegged to BRL (potential
         e-money overlap), tokenized securities, and hybrid utility/security tokens.
      4. Build a CI pipeline stage that validates all listed assets against the
         current regulatory classification database before deployment.
    tools:
      - gitlab-ci
      - open-policy-agent
      - test-automation-framework
  secops:
    prose: |
      1. Monitor regulatory guidance from BCB and CVM on asset classification
         boundaries, particularly for stablecoins and tokenized assets.
      2. Track the Poder Executivo's designation of which financial assets are
         "regulated" for purposes of this law (Parágrafo único).
      3. Conduct quarterly reviews of all listed assets to verify their
         classification remains valid under current regulatory interpretation.
      4. Maintain documentation of classification rationale for each listed asset
         to support regulatory examinations and audits.
    tools:
      - grc-platform
      - regulatory-intelligence-service
      - audit-documentation-system
legal_references:
  - framework_id: bcb-304
    articles: ["art-1", "art-2"]
    relationship: implements
  - framework_id: lgpd
    articles: ["art-7"]
    relationship: complements
