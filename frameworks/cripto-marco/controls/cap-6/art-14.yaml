id: art-14
family: cap-6
title: "Effective Date"
class: CRIPTO-MARCO
baselines: [vasps-reguladas]
statement:
  prose: |
    Art. 14. Esta Lei entra em vigor após decorridos 180 (cento e oitenta) dias
    de sua publicação oficial.

    Brasília, 21 de dezembro de 2022; 201º da Independência e 134º da República.
guidance:
  prose: |
    Article 14 establishes the vacatio legis (effective date delay) of 180 days
    from the official publication date (December 22, 2022 — published in DOU).

    **Timeline:**
    - Publication: December 22, 2022 (DOU)
    - Effective date: June 20, 2023 (180 days later)
    - BCB designated as regulator: Decree 11.563/2023 (June 2023)
    - BCB Resolução 304 published: November 28, 2023
    - Transition deadline for existing VASPs: June 2024

    **Practical implication:**
    The 180-day vacatio legis provided time for:
    1. The Executive Branch to designate the regulatory authority (BCB).
    2. The regulator to begin developing implementing regulations.
    3. Market participants to begin preparing for the new regulatory framework.
    4. Existing VASPs to assess compliance gaps and begin remediation.

    Since the law is now fully in force, all provisions apply. VASPs that began
    operations after June 20, 2023 must have obtained prior authorization.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Ensure all platform systems are fully compliant with the law's
         requirements since the effective date has passed.
      2. Maintain a regulatory timeline tracker that monitors upcoming
         deadlines from implementing regulations (BCB resolutions, circulars).
      3. Implement automated compliance health checks that verify all
         mandatory controls are active and functioning.
      4. Build a regulatory change management system that tracks new
         requirements and their implementation deadlines.
    tools:
      - compliance-health-monitor
      - regulatory-timeline-tracker
      - change-management-system
  devsecops:
    prose: |
      1. Implement compliance validation as a mandatory CI/CD pipeline stage
         that blocks deployment if critical compliance controls are inactive.
      2. Create automated compliance regression tests that run on every
         deployment to ensure no compliance features are degraded.
      3. Maintain a compliance feature matrix in version control mapping
         each legal requirement to its implementing code and tests.
      4. Build alerting for compliance control degradation that triggers
         immediate incident response.
    tools:
      - gitlab-ci
      - compliance-regression-suite
      - alerting-system
  secops:
    prose: |
      1. Maintain awareness of all regulatory deadlines post-effective date,
         including BCB implementing regulation timelines.
      2. Conduct periodic compliance assessments verifying full adherence
         to all provisions of the law.
      3. Track any legislative amendments or judicial interpretations that
         may affect the law's application.
      4. Ensure all compliance documentation references the correct effective
         date and applicable regulatory timeline.
    tools:
      - regulatory-calendar
      - grc-platform
      - legal-monitoring-service
legal_references:
  - framework_id: bcb-304
    articles: ["art-25", "art-26"]
    relationship: implements
