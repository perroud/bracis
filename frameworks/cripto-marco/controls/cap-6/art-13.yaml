id: art-13
family: cap-6
title: "Consumer Protection in Virtual Asset Operations"
class: CRIPTO-MARCO
baselines: [vasps-reguladas]
statement:
  prose: |
    Art. 13. Aplicam-se às operações conduzidas no mercado de ativos virtuais,
    no que couber, as disposições da Lei nº 8.078, de 11 de setembro de 1990
    (Código de Defesa do Consumidor).
guidance:
  prose: |
    Article 13 explicitly extends the Brazilian Consumer Defense Code (CDC —
    Lei 8.078/1990) to virtual asset market operations. The expression
    "no que couber" (as applicable) acknowledges that not all CDC provisions
    may apply directly but establishes CDC as the baseline consumer protection
    framework.

    **Key CDC obligations now applicable to VASPs:**
    - **Right to information** (Art. 6, III CDC) — clear and adequate disclosure
      of risks, fees, and characteristics of virtual assets.
    - **Protection against deceptive practices** (Art. 37 CDC) — prohibition of
      misleading advertising about returns or security of crypto investments.
    - **Liability for defective services** (Art. 14 CDC) — VASPs are liable for
      damages caused by defects in their services (system failures, unauthorized
      transactions, custody losses).
    - **Contract transparency** (Art. 46 CDC) — terms of service must be clear,
      readable, and highlight onerous clauses.
    - **Right to withdraw** (Art. 49 CDC) — 7-day cooling-off period for contracts
      executed outside commercial establishments (online).

    **Enforcement:**
    PROCON (consumer protection agencies), Ministério Público, and SENACON can
    investigate and penalize VASPs for consumer rights violations, in addition
    to BCB's regulatory enforcement.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement comprehensive risk disclosure pages for each virtual asset,
         including volatility warnings, loss potential, and regulatory status.
      2. Build transparent fee display systems showing all applicable fees
         before transaction confirmation (spread, withdrawal fees, network fees).
      3. Implement a 7-day withdrawal/cancellation mechanism for applicable
         operations (e.g., subscription services, recurring purchases).
      4. Create a customer complaint management system with SLA tracking,
         escalation paths, and resolution monitoring.
      5. Build transaction confirmation flows with clear, plain-language
         summaries of what the user is about to execute.
    tools:
      - risk-disclosure-engine
      - fee-transparency-module
      - complaint-management-system
      - transaction-confirmation-ux
  devsecops:
    prose: |
      1. Implement automated UI tests verifying that risk disclosures,
         fee displays, and confirmation flows are present and functional.
      2. Create accessibility tests ensuring consumer-facing information
         meets WCAG standards for readability.
      3. Build compliance tests validating that terms of service contain
         required CDC disclosures and highlight onerous clauses.
      4. Implement canary deployments for consumer-facing features to catch
         UX regressions that could affect CDC compliance.
    tools:
      - gitlab-ci
      - ui-test-automation
      - accessibility-testing-tools
      - canary-deployment-pipeline
  secops:
    prose: |
      1. Monitor PROCON, SENACON, and consumer.gov.br for complaints filed
         against the platform and industry-wide consumer protection trends.
      2. Maintain CDC compliance documentation with evidence of all consumer
         protection measures implemented.
      3. Track consumer complaint metrics (volume, resolution time, satisfaction)
         and report to management quarterly.
      4. Conduct periodic reviews of marketing materials and communications
         to ensure compliance with CDC advertising rules (no misleading claims
         about returns or safety).
      5. Establish liaison protocols with PROCON agencies in key states.
    tools:
      - complaint-tracking-system
      - marketing-compliance-review
      - grc-platform
