related_frameworks:
  - framework_id: cnsp-381
    relationship: derived-from
    description: >-
      A Circular SUSEP 638 deriva da e detalha os requisitos de
      seguranca cibernetica estabelecidos pela Resolucao CNSP 381,
      que definiu as diretrizes gerais para o mercado supervisionado
      pela SUSEP.
  - framework_id: bacen-4893
    relationship: equivalent-to
    description: "A Circular SUSEP 638 espelha a Resolucao CMN 4.893/BCB 85 para o setor de seguros, com requisitos equivalentes adaptados ao mercado supervisionado pela SUSEP."
  - framework_id: lgpd
    relationship: complements
    description: "A LGPD complementa a Circular 638 na protecao de dados pessoais de segurados, beneficiarios e participantes de planos de previdencia."
  - framework_id: iso-27001-2022
    relationship: mapped
    description: "A ISO 27001:2022 fornece o framework de gestao de seguranca da informacao que suporta a conformidade com a Circular SUSEP 638."
    mapping_file: "mappings/susep-638_to_iso-27001-2022.yaml"
  - framework_id: nist-800-53-rev5
    relationship: mapped
    description: "Os controles do NIST 800-53 rev5 oferecem mapeamento detalhado para implementacao tecnica dos requisitos da Circular SUSEP 638."
    mapping_file: "mappings/susep-638_to_nist-800-53-rev5.yaml"
