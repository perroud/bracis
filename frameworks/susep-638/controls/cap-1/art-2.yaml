id: art-2
family: cap-1
title: "Principio da Proporcionalidade"
class: SUSEP-638
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 2. Os requisitos estabelecidos nesta Circular devem ser aplicados de forma
    proporcional ao porte, ao perfil de risco e ao modelo de negócio da supervisionada,
    à natureza de suas operações e à complexidade dos produtos, serviços, atividades
    e processos, bem como à sensibilidade dos dados e das informações sob sua
    responsabilidade.
guidance:
  prose: |
    O art. 2 estabelece o principio da proporcionalidade como criterio para
    dimensionamento dos controles de seguranca cibernetica.

    **Fatores de proporcionalidade:**
    1. Porte: uma grande seguradora com milhoes de segurados exige controles mais
       robustos do que uma seguradora de nicho com carteira reduzida
    2. Perfil de risco: seguradoras que operam em ramos de alta exposicao (grandes
       riscos, responsabilidade civil) podem ter maior superficie de ataque
    3. Modelo de negocio: insurtechs 100% digitais tem perfil de risco cibernetico
       diferente de seguradoras tradicionais com rede fisica
    4. Natureza das operacoes: operacoes que envolvem dados de saude (seguros de
       vida e saude), dados financeiros (capitalizacao) ou dados atuariais sensiveis
       exigem protecoes diferenciadas
    5. Complexidade dos produtos: seguros parametricos, unit-linked ou com componentes
       tecnologicos complexos aumentam a superficie de risco
    6. Sensibilidade dos dados: dados de segurados incluem informacoes pessoais,
       financeiras, de saude e habitos de vida

    **Aplicacao pratica:**
    A proporcionalidade nao e uma excecao para deixar de cumprir requisitos. E um
    criterio para dimensionar a profundidade e complexidade dos controles. Uma
    pequena seguradora ainda precisa de politica de seguranca cibernetica, mas
    pode ter uma politica mais simples e direta.

    **Dados sensiveis no mercado de seguros:**
    O setor securitario trata dados particularmente sensiveis:
    - Dados de saude (seguros de vida, saude, acidentes pessoais)
    - Dados financeiros (valores de premio, sinistros, reservas)
    - Dados comportamentais (telematica, habitos de vida para precificacao)
    - Dados atuariais (tabuas de mortalidade, fatores de risco)
    - Dados de sinistros (laudos, pericias, relatorios de investigacao)
implementation_guidance:
  platform_engineering:
    prose: |
      **Classificacao por proporcionalidade:**
      1. Framework de classificacao de ativos baseado nos fatores do art. 2:
         porte da supervisionada, volume de segurados, ramos de atuacao.
      2. Matriz de risco cibernetico por linha de negocio (vida, danos, previdencia,
         capitalizacao, resseguro).
      3. Controles diferenciados por classificacao de dados: dados-de-saude (nivel
         maximo), dados-financeiros (alto), dados-operacionais (medio).
      4. Automacao de enforcement de controles proporcionais ao nivel de classificacao.

      **Infraestrutura proporcional:**
      5. Tiers de infraestrutura: Tier-1 (sistemas core de seguros com dados de
         segurados), Tier-2 (sistemas de suporte), Tier-3 (sistemas administrativos).
      6. Controles de seguranca escalonados por tier: criptografia, segmentacao de
         rede, monitoramento, backup.
      7. Budget de seguranca proporcional ao porte e perfil de risco.
    tools:
      - risk-assessment-platform
      - data-classification
      - asset-inventory
      - compliance-scanner
  devsecops:
    prose: |
      **Pipeline proporcional:**
      1. Niveis de security gates baseados na classificacao do sistema:
         sistemas com dados de saude exigem SAST + DAST + pen test;
         sistemas internos podem ter SAST + SCA como minimo.
      2. Requisitos de code review proporcionais: quatro olhos para sistemas core
         de seguros, dois para sistemas de suporte.
      3. Frequencia de scans de vulnerabilidade proporcional a criticidade.

      **Classificacao de dados no pipeline:**
      4. Deteccao automatica de dados sensiveis em codigo (CPF, dados de saude,
         numeros de apolice).
      5. Bloqueio de commit com dados de segurados em repositorios nao autorizados.
      6. Mascaramento automatico de dados de segurados em ambientes nao-produtivos.
    tools:
      - gitlab-sast
      - gitlab-dast
      - gitlab-secret-detection
      - data-masking
      - dlp-scanner
  secops:
    prose: |
      **Avaliacao de proporcionalidade:**
      1. Assessment anual do perfil de risco cibernetico da supervisionada considerando
         todos os fatores do art. 2.
      2. Benchmark com pares do mercado de seguros de porte e perfil similares.
      3. Revisao da adequacao dos controles implementados versus perfil de risco.
      4. Recomendacoes de ajuste ao conselho de administracao.

      **Monitoramento proporcional:**
      5. Cobertura de monitoramento proporcional: 24x7 para sistemas core de seguros,
         horario comercial para sistemas administrativos.
      6. Metricas de efetividade dos controles por nivel de criticidade.
      7. Relatorio de proporcionalidade para auditoria da SUSEP.
    tools:
      - grc-platform
      - risk-assessment-platform
      - siem
      - vulnerability-scanner
