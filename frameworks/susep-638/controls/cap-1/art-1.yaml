id: art-1
family: cap-1
title: "Objeto da Circular"
class: SUSEP-638
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 1. Esta Circular dispõe sobre requisitos de segurança cibernética a serem
    observados pelas sociedades seguradoras, entidades abertas de previdência complementar,
    sociedades de capitalização e resseguradores locais, doravante denominadas supervisionadas.
guidance:
  prose: |
    O art. 1 define o objeto e o universo de entidades reguladas pela Circular 638.

    **Entidades supervisionadas:**
    A circular abrange quatro categorias de entidades do mercado de seguros:
    1. Sociedades seguradoras: empresas autorizadas a operar em seguros de danos e pessoas
    2. Entidades abertas de previdencia complementar (EAPCs): operadoras de planos PGBL, VGBL
       e similares
    3. Sociedades de capitalizacao: emissoras de titulos de capitalizacao
    4. Resseguradores locais: empresas sediadas no Brasil que operam em resseguro

    **Escopo regulatorio:**
    A circular trata exclusivamente de seguranca cibernetica, diferenciando-se de
    seguranca da informacao generica. O foco esta em:
    - Ameacas e ataques digitais a sistemas de seguros
    - Protecao de dados de segurados, beneficiarios e participantes
    - Resiliencia cibernetica de sistemas de cotacao, emissao, sinistros e atuariais
    - Seguranca de plataformas digitais de venda de seguros

    **Relacao com CNSP 381:**
    Esta circular implementa e detalha os requisitos gerais estabelecidos pela
    Resolucao CNSP 381. Enquanto a CNSP 381 define diretrizes, a Circular 638
    operacionaliza os requisitos especificos.

    **Paralelismo com BCB 4893:**
    A estrutura e conteudo da Circular 638 espelham a Resolucao CMN 4.893/BCB 85
    do Banco Central, adaptando-os ao mercado de seguros. Instituicoes que ja
    cumprem a 4.893 encontrarao requisitos familiares, porem com nuances especificas
    do setor securitario.
implementation_guidance:
  platform_engineering:
    prose: |
      **Mapeamento de escopo:**
      1. Inventario completo de todos os sistemas de seguranca cibernetica da supervisionada,
         incluindo sistemas de cotacao, emissao de apolices, gestao de sinistros e atuariais.
      2. Classificacao de cada sistema por criticidade: sistemas core de seguros (cotacao,
         emissao, sinistros, provisoes) como criticos; sistemas de suporte como secundarios.
      3. Mapeamento de integracao com corretores, resseguradores e orgaos reguladores
         (SUSEP, ANS quando aplicavel).
      4. Registro centralizado de todos os fluxos de dados de segurados e beneficiarios.

      **Infraestrutura de conformidade:**
      5. Landing zone segura com controles de seguranca cibernetica embutidos para
         workloads de seguros.
      6. Cloud Asset Inventory automatizado com classificacao regulatoria especifica
         para o mercado de seguros.
      7. Tagging obrigatorio de recursos com classificacao: dados-segurados,
         dados-atuariais, dados-sinistros, dados-financeiros.
      8. Dashboard de conformidade com a Circular 638 em tempo real, integrando
         status de cada capitulo da circular.
    tools:
      - cloud-asset-inventory
      - cmdb
      - compliance-scanner
      - tagging-policies
  devsecops:
    prose: |
      **Consciencia regulatoria no desenvolvimento:**
      1. Documentacao dos requisitos da Circular 638 acessivel a toda equipe de
         desenvolvimento de sistemas de seguros.
      2. Checklist de seguranca cibernetica integrado ao code review, com itens
         especificos para protecao de dados de segurados.
      3. Security champions com conhecimento da circular em cada squad que desenvolve
         sistemas core de seguros.

      **Pipeline com controles regulatorios:**
      4. Verificacao automatica de que todo deploy esta mapeado no inventario de ativos.
      5. Bloqueio de deploy em provedores ou regioes nao aprovados pela SUSEP.
      6. Tag enforcement no pipeline de IaC para rastreabilidade regulatoria.
      7. Alertas quando novo servico e provisionado fora do inventario aprovado.
    tools:
      - gitlab-ci
      - checkov
      - opa-gatekeeper
      - policy-engine
  secops:
    prose: |
      **Gestao do escopo regulatorio:**
      1. Inventario atualizado de todos os sistemas e servicos da supervisionada.
      2. Revisao trimestral do inventario para identificar shadow IT.
      3. Processo formal de aprovacao para novos sistemas que tratam dados de segurados.
      4. Comunicacao a SUSEP conforme exigido pela circular.

      **Monitoramento de conformidade:**
      5. Assessment periodico de conformidade com todos os capitulos da circular.
      6. Gap analysis com plano de remediacao priorizado por risco ao segurado.
      7. Relatorio de conformidade para o conselho de administracao.
      8. Retencao de evidencias de conformidade por 5 anos (minimo).
    tools:
      - grc-platform
      - cmdb
      - asset-inventory
      - compliance-scanner
