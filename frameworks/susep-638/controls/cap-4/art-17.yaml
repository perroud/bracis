id: art-17
family: cap-4
title: "Dados e Informacoes no Exterior"
class: SUSEP-638
statement:
  prose: |
    Art. 17. No caso de serviços prestados no exterior, a supervisionada deve
    assegurar que a legislação e a regulamentação nos países e nas regiões onde os
    serviços poderão ser prestados não restrinjam nem impeçam o acesso da
    supervisionada e da SUSEP aos dados e às informações.
guidance:
  prose: |
    O art. 17 estabelece a obrigacao de garantir que a legislacao do pais onde os
    dados serao armazenados nao impeca o acesso da supervisionada e da SUSEP.

    **Obrigacao dupla de acesso:**
    1. Acesso da supervisionada: deve ter acesso irrestrito aos seus dados
       independente da jurisdicao de armazenamento
    2. Acesso da SUSEP: o orgao regulador deve poder acessar os dados para
       fins de supervisao e auditoria

    **Riscos regulatorios por jurisdicao:**
    - Leis de bloqueio (blocking statutes): alguns paises impedem acesso de
      reguladores estrangeiros a dados armazenados localmente
    - Leis de protecao de dados: GDPR, CCPA e similares podem criar restricoes
      de acesso
    - Leis de vigilancia: CLOUD Act (EUA), investigatory Powers Act (UK) podem
      permitir acesso governamental a dados
    - Instabilidade regulatoria: mudancas na legislacao podem afetar acessos futuros

    **Implicacoes praticas para seguradoras:**
    - Dados de segurados brasileiros no exterior devem ser acessiveis pela SUSEP
    - Provisoes tecnicas e dados regulatorios devem estar sempre disponiveis
    - Em caso de disputa judicial no exterior, dados devem permanecer acessiveis
    - Selecao de jurisdicoes com adequacao reconhecida pela LGPD e compatibilidade
      com fiscalizacao da SUSEP

    **Analise obrigatoria:**
    Antes de contratar servico no exterior, a supervisionada deve realizar:
    - Analise juridica da legislacao do pais de destino
    - Parecer sobre riscos de bloqueio de acesso
    - Avaliacao de adequacao nos termos da LGPD (art. 33)
    - Plano de contingencia para perda de acesso
implementation_guidance:
  platform_engineering:
    prose: |
      **Controles de acesso a dados no exterior:**
      1. Acesso direto a dados em qualquer regiao via VPN site-to-site ou
         private connectivity (ExpressRoute, Direct Connect, Cloud Interconnect).
      2. APIs de extracacao de dados que funcionam independente da regiao.
      3. Replica local (Brasil) de dados criticos para garantir acesso em caso
         de restricao no exterior.
      4. Monitoramento de latencia e disponibilidade de acesso a dados no exterior.

      **Portabilidade e contingencia:**
      5. Capacidade tecnica de migrar dados de volta ao Brasil em prazo definido.
      6. Teste anual de extracacao completa de dados do provedor no exterior.
      7. Backup local de dados regulatorios (provisoes, apolices, sinistros).
      8. Multi-region deployment com capacidade de operar sem a regiao no exterior.
    tools:
      - cloud-governance
      - data-replication
      - vpn-connectivity
      - monitoring-platform
      - backup-solution
  devsecops:
    prose: |
      **Acesso a dados no pipeline:**
      1. Testes automatizados que validam acesso a dados em todas as regioes.
      2. Health checks de conectividade com regioes no exterior.
      3. Alertas quando acesso a regiao no exterior e degradado ou bloqueado.

      **Data portability:**
      4. Scripts de extracacao e migracao de dados entre regioes.
      5. Testes de portabilidade em pipeline de DR.
      6. Documentacao de formatos de dados para portabilidade entre provedores.
    tools:
      - gitlab-ci
      - monitoring-platform
      - terraform
  secops:
    prose: |
      **Analise juridica de jurisdicoes:**
      1. Parecer juridico sobre legislacao de cada pais onde dados sao armazenados.
      2. Avaliacao de riscos de bloqueio de acesso por jurisdicao.
      3. Monitoramento de mudancas legislativas nos paises de armazenamento.
      4. Atualizacao anual da analise juridica.

      **Garantia de acesso da SUSEP:**
      5. Clausula contratual explicita garantindo acesso da SUSEP a dados.
      6. Teste anual de acesso da SUSEP a dados no exterior (se solicitado).
      7. Processo de atendimento a demandas da SUSEP com SLA definido.

      **Plano de contingencia:**
      8. Plano de repatriacao de dados em caso de restricao de acesso.
      9. Teste anual de repatriacao de dados.
      10. Avaliacao de impacto em caso de perda de acesso: operacional, financeiro,
          regulatorio.
    tools:
      - grc-platform
      - vendor-risk-management
      - compliance-scanner
