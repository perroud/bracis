id: art-15
family: cap-4
title: "Requisitos Contratuais para Servicos em Nuvem"
class: SUSEP-638
statement:
  prose: |
    Art. 15. A contratação de serviços relevantes de processamento e armazenamento
    de dados e de computação em nuvem deve prever:
    I - a adoção de práticas de governança corporativa e de gestão proporcionais à
    relevância do serviço a ser contratado e aos riscos a que estejam expostas;
    II - a verificação da capacidade do potencial prestador de serviços de assegurar:
    a) o cumprimento da legislação e da regulamentação em vigor;
    b) o acesso da supervisionada aos dados e às informações a serem processados ou
    armazenados pelo prestador de serviço;
    c) a confidencialidade, a integridade, a disponibilidade e a recuperação dos
    dados e das informações processados ou armazenados pelo prestador de serviço;
    d) a sua aderência a certificações exigidas pela supervisionada para a prestação
    do serviço a ser contratado;
    e) o acesso da SUSEP aos contratos e aos acordos firmados para a prestação de
    serviços, à documentação e às informações referentes aos serviços prestados, aos
    dados armazenados e às informações processadas; e
    f) o provimento de informações e de recursos de gestão adequados ao monitoramento
    dos serviços a serem prestados;
    III - a definição de cláusulas contratuais que contemplem indicadores de níveis
    de serviço, mecanismos de gestão e alocação de responsabilidades entre a
    supervisionada e o prestador de serviço, e procedimentos em caso de interrupção
    ou descontinuidade do serviço contratado.
guidance:
  prose: |
    O art. 15 detalha os requisitos que devem estar presentes na contratacao de
    servicos em nuvem. E o artigo mais denso do capitulo de cloud, com exigencias
    contratuais e de due diligence.

    **Inciso I - Governanca proporcional:**
    A governanca sobre o provedor de nuvem deve ser proporcional a criticidade
    do servico. Para sistemas core de seguros (apolices, sinistros, provisoes),
    a governanca deve ser mais rigorosa.

    **Inciso II - Verificacao do provedor (due diligence):**
    Antes de contratar, a supervisionada deve verificar:
    a) Conformidade legal: o provedor cumpre LGPD, Circular 638, normas da SUSEP?
    b) Acesso a dados: a supervisionada mantem acesso irrestrito aos seus dados?
    c) CIA + recuperacao: o provedor garante confidencialidade, integridade,
       disponibilidade E recuperacao de dados?
    d) Certificacoes: SOC 2 Type II, ISO 27001, PCI DSS conforme necessidade
    e) Acesso da SUSEP: o contrato permite que a SUSEP acesse contratos,
       documentacao e dados armazenados - clausula regulatoria obrigatoria
    f) Recursos de monitoramento: o provedor fornece ferramentas para que a
       supervisionada monitore os servicos contratados

    **Inciso III - Clausulas contratuais:**
    O contrato deve incluir:
    - SLAs com indicadores mensuraveis (disponibilidade, latencia, recuperacao)
    - Mecanismos de gestao: relatorios, reunioes, escalacao
    - Alocacao de responsabilidades: modelo de responsabilidade compartilhada
    - Procedimentos para interrupcao: exit plan, portabilidade de dados

    **Especificidade para seguradoras:**
    - SLAs criticos para sistemas de assistencia 24h (99.99%)
    - Recuperacao de dados de provisoes tecnicas (RPO proximo de zero)
    - Portabilidade de dados atuariais entre provedores
    - Acesso a dados de sinistros por peritos e reguladores autorizados
implementation_guidance:
  platform_engineering:
    prose: |
      **Governanca de provedores (inciso I):**
      1. Framework de avaliacao de provedores de nuvem com criterios especificos
         para workloads de seguros.
      2. Tiering de provedores: Tier 1 (sistemas core - governanca maxima),
         Tier 2 (suporte - governanca padrao), Tier 3 (nao critico - governanca minima).
      3. Processo formal de aprovacao de novos provedores com checklist regulatorio.

      **Verificacao tecnica do provedor (inciso II):**
      4. Assessment tecnico do provedor: criptografia, segmentacao, controle de acesso,
         backup, disaster recovery.
      5. Validacao de certificacoes: SOC 2 Type II, ISO 27001, PCI DSS.
      6. Teste de acesso a dados: validar que a supervisionada consegue extrair
         todos os dados armazenados no provedor.
      7. Teste de recuperacao: validar RPO/RTO do provedor para dados de seguros.

      **Monitoramento do provedor (inciso II-f):**
      8. Dashboard de SLAs do provedor com monitoramento em tempo real.
      9. Alertas de violacao de SLA com escalacao automatica.
      10. Coleta automatica de metricas de disponibilidade e desempenho.
      11. Relatorio mensal de desempenho do provedor.

      **Exit strategy (inciso III):**
      12. Plano de saida documentado para cada provedor de nuvem.
      13. Teste anual de portabilidade de dados entre provedores.
      14. Backup independente do provedor para dados criticos de seguros.
    tools:
      - cspm
      - cloud-governance
      - monitoring-platform
      - compliance-scanner
      - vendor-risk-management
  devsecops:
    prose: |
      **Abstracacao de provedor no pipeline:**
      1. IaC multi-cloud com modules que abstraem especificidades do provedor.
      2. Container-based deployments para portabilidade entre provedores.
      3. Testes de portabilidade em pipeline: deploy em provedor alternativo em staging.
      4. Dependency management: minimizar vendor lock-in em servicos proprietarios.

      **Validacao de seguranca do provedor no pipeline:**
      5. CIS Benchmark compliance checks para configuracoes de cloud no pipeline.
      6. Verificacao de que recursos criticos usam regiao e criptografia aprovados.
      7. Alertas quando servicos sao provisionados em regioes nao autorizadas.
    tools:
      - terraform
      - pulumi
      - checkov
      - opa-gatekeeper
      - gitlab-ci
  secops:
    prose: |
      **Due diligence de provedores (inciso II):**
      1. Avaliacao inicial de risco do provedor com questionario especifico para
         seguradoras (cobrindo LGPD, Circular 638, dados de saude).
      2. Validacao de certificacoes antes da contratacao e anualmente.
      3. Revisao de relatorios SOC 2 Type II do provedor.
      4. Avaliacao de controles de acesso e segregacao de dados do provedor.

      **Gestao contratual (inciso III):**
      5. Revisao de contratos com area juridica para garantir clausulas obrigatorias.
      6. SLAs negociados e documentados para cada servico critico.
      7. Clausula de acesso pela SUSEP (inciso II-e) verificada em todos os contratos.
      8. Procedimentos de escalacao quando SLAs sao violados.

      **Monitoramento continuo:**
      9. Revisao trimestral de desempenho do provedor vs. SLAs contratados.
      10. Avaliacao anual de risco do provedor (recertificacao).
      11. Monitoramento de incidentes do provedor e impacto na supervisionada.
      12. Exercicio de exit strategy com simulacao de portabilidade.
    tools:
      - vendor-risk-management
      - grc-platform
      - monitoring-platform
      - contract-management
