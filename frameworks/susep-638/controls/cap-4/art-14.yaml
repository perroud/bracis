id: art-14
family: cap-4
title: "Requisitos para Contratacao de Servicos em Nuvem"
class: SUSEP-638
statement:
  prose: |
    Art. 14. As supervisionadas devem assegurar que suas políticas, estratégias e
    estruturas para gerenciamento de riscos previstas na regulamentação em vigor,
    especificamente no tocante aos critérios de decisão quanto à terceirização de
    serviços, contemplem a contratação de serviços relevantes de processamento e
    armazenamento de dados e de computação em nuvem, no País ou no exterior.

    Parágrafo único. As supervisionadas devem possuir recursos e competências
    necessários para a gestão dos serviços contratados e para a verificação do
    cumprimento dos requisitos previstos nesta Circular.
guidance:
  prose: |
    O art. 14 estabelece que a contratacao de servicos em nuvem deve estar inserida
    no framework de gestao de riscos da supervisionada, nao como excecao.

    **Integracao com gestao de riscos:**
    A contratacao de cloud para seguradoras nao pode ser decisao puramente tecnica.
    Deve passar pelo processo formal de gestao de riscos, incluindo:
    - Avaliacao de risco do provedor de nuvem
    - Due diligence de seguranca e conformidade regulatoria
    - Analise de concentracao de risco (dependencia de provedor unico)
    - Plano de contingencia e exit strategy
    - Avaliacao de impacto na solvencia (se aplicavel)

    **Servicos abrangidos:**
    - Processamento de dados de seguros (cotacao, emissao, sinistros)
    - Armazenamento de dados de segurados e beneficiarios
    - Sistemas atuariais em nuvem
    - Plataformas de venda digital de seguros
    - Computacao em nuvem para qualquer workload da supervisionada

    **Paragrafo unico - Competencia e recursos:**
    A supervisionada nao pode delegar a responsabilidade ao provedor. Deve:
    - Ter equipe capacitada para gerenciar servicos de nuvem
    - Monitorar continuamente o provedor
    - Verificar cumprimento de requisitos regulatorios
    - Manter capacidade de auditoria sobre o provedor

    **Especificidade para seguradoras:**
    Dados de seguros sao particularmente sensiveis:
    - Dados de saude (seguros de vida e saude) exigem controles adicionais
    - Provisoes tecnicas e dados atuariais sao informacoes financeiras criticas
    - Dados de sinistros podem conter laudos medicos, pericias, fotos
    - O Open Insurance aumenta a exposicao de dados em cloud
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de riscos de cloud:**
      1. Cloud governance framework documentado e implementado, com criterios
         especificos para workloads de seguros.
      2. Cloud Security Posture Management (CSPM) para monitoramento continuo
         de configuracoes de seguranca em nuvem.
      3. FinOps integrado com visao de risco para workloads de seguros.
      4. Multi-cloud strategy para evitar concentracao de risco em provedor unico,
         especialmente para sistemas core de seguros.

      **Competencia tecnica (paragrafo unico):**
      5. Equipe de cloud engineering com certificacoes relevantes (AWS, Azure, GCP).
      6. Runbooks especificos para operacao de sistemas de seguros em nuvem.
      7. Monitoramento de SLAs do provedor com alertas de desvio.
      8. Capacidade de operacao autonoma em caso de falha do provedor.

      **Seguranca em nuvem para seguros:**
      9. Landing zone segura com guardrails para workloads de seguros.
      10. Account/subscription segmentation: producao de seguros isolada.
      11. IAM centralizado com federacao de identidades.
      12. Private endpoints para servicos que tratam dados de segurados.
      13. Encryption at rest e in transit em todos os servicos.
      14. Data residency controls para dados de segurados brasileiros.
    tools:
      - cspm
      - cloud-governance
      - identity-provider
      - centralized-logging
      - asset-inventory
      - compliance-scanner
  devsecops:
    prose: |
      **Seguranca no desenvolvimento para cloud:**
      1. IaC scanning (Checkov, tfsec, KICS) em todo merge request que modifica
         infraestrutura de seguros em nuvem.
      2. Terraform/Pulumi modules pre-aprovados com controles de seguranca para
         workloads de seguros.
      3. GitOps com enforcement de politicas de cloud via OPA/Kyverno.
      4. Cloud-native security best practices em coding guidelines para seguros.

      **Gestao de credenciais cloud:**
      5. Workload identity (OIDC) em vez de chaves estaticas.
      6. Least privilege em IAM roles para pipelines de CI/CD.
      7. Rotacao automatica de credenciais cloud.
      8. Secret scanning para chaves de cloud em repositorios.

      **Verificacao de conformidade:**
      9. Policy-as-code que valida configuracoes de cloud no pipeline.
      10. Pre-deploy checks para cloud resources: networking, encryption, IAM.
      11. Drift detection para mudancas fora do pipeline.
    tools:
      - checkov
      - tfsec
      - kics
      - opa-gatekeeper
      - gitlab-secret-detection
      - terraform
      - pulumi
  secops:
    prose: |
      **Monitoramento de cloud:**
      1. Cloud-native SIEM integrado (AWS Security Hub, Azure Sentinel, GCP SCC).
      2. CSPM com alertas de misconfiguration em tempo real.
      3. CASB para detectar shadow IT em cloud.
      4. Monitoramento de API calls anomalas em provedores de nuvem.

      **Auditoria de provedores:**
      5. Revisao anual de certificacoes do provedor (SOC 2, ISO 27001).
      6. Verificacao de SLAs e incidentes reportados pelo provedor.
      7. Exercicio do direito de auditoria (right to audit clause).
      8. Avaliacao de risco de concentracao em provedor unico.

      **Competencia operacional:**
      9. Equipe de secops com expertise em cloud security para seguros.
      10. Playbooks de resposta a incidentes especificos de cloud.
      11. Exercicios de simulacao de incidentes em cloud.
      12. Exit strategy documentada e testada anualmente.
    tools:
      - cspm
      - casb
      - siem
      - cloud-security-hub
      - grc-platform
