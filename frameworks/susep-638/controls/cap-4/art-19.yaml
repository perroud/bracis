id: art-19
family: cap-4
title: "Responsabilidade da Supervisionada sobre Servicos em Nuvem"
class: SUSEP-638
statement:
  prose: |
    Art. 19. A contratação de serviços de processamento e armazenamento de dados
    e de computação em nuvem não exime a supervisionada da responsabilidade pelo
    cumprimento da legislação e da regulamentação em vigor.
guidance:
  prose: |
    O art. 19 estabelece principio fundamental: a terceirizacao de servicos de nuvem
    nao transfere a responsabilidade regulatoria da supervisionada para o provedor.

    **Principio da intransferibilidade:**
    A supervisionada permanece integralmente responsavel por:
    - Cumprimento da Circular 638 e demais normas da SUSEP
    - Protecao de dados de segurados conforme LGPD
    - Conformidade com requisitos de solvencia e provisoes tecnicas
    - Qualidade dos servicos prestados aos segurados
    - Comunicacao de incidentes a SUSEP

    **Implicacoes para a cadeia de valor de seguros:**
    Se um provedor de nuvem sofre um incidente que afeta dados de segurados:
    - A supervisionada deve comunicar a SUSEP (art. 12)
    - A supervisionada deve comunicar os segurados afetados (LGPD)
    - A supervisionada e responsavel pela remediacao
    - A SUSEP fiscaliza a supervisionada, nao o provedor de nuvem

    **Modelo de responsabilidade compartilhada:**
    Embora os provedores de nuvem operem modelos de responsabilidade compartilhada
    (shared responsibility model), perante a SUSEP a responsabilidade e da
    supervisionada. O contrato com o provedor define responsabilidades entre as
    partes, mas nao afeta a relacao regulatoria.

    **Na pratica:**
    A supervisionada deve:
    - Monitorar o provedor como se operasse internamente
    - Manter capacidade de auditoria e verificacao
    - Ter planos de contingencia para falha do provedor
    - Garantir que o provedor cumpra os requisitos regulatorios
    - Responder a SUSEP por qualquer nao conformidade
implementation_guidance:
  platform_engineering:
    prose: |
      **Supervisao do provedor:**
      1. Monitoramento independente da infraestrutura em nuvem (nao depender apenas
         de dashboards do provedor).
      2. Logging centralizado com copias independentes do provedor.
      3. Backup independente em infraestrutura separada do provedor principal.
      4. Health checks e synthetic monitoring de servicos em nuvem.

      **Capacidade de auditoria:**
      5. Cloud audit trail completo com retencao independente.
      6. Compliance scanning continuo de configuracoes de nuvem.
      7. Ferramentas de investigacao forense independentes do provedor.
      8. Capacidade de extracacao completa de dados em qualquer momento.

      **Plano de contingencia:**
      9. Multi-cloud ou hybrid-cloud para sistemas core de seguros.
      10. Disaster recovery independente do provedor principal.
      11. Teste semestral de operacao sem provedor principal.
    tools:
      - cspm
      - centralized-logging
      - backup-solution
      - monitoring-platform
      - compliance-scanner
  devsecops:
    prose: |
      **Independencia do provedor:**
      1. Aplicacoes cloud-agnostic usando containers e abstracoes de servicos.
      2. IaC modular com capacidade de deploy em multiplos provedores.
      3. Testes de portabilidade em pipeline de CI/CD.
      4. Abstracoes de servicos proprietarios (ex: wrapper para servicos de fila,
         storage, banco de dados).

      **Seguranca independente:**
      5. Camadas adicionais de seguranca alem das oferecidas pelo provedor.
      6. Criptografia client-side para dados sensiveis de segurados.
      7. Secret management independente do provedor.
    tools:
      - gitlab-ci
      - terraform
      - vault
      - container-registry
  secops:
    prose: |
      **Gestao de responsabilidade:**
      1. Documentacao clara do modelo de responsabilidade compartilhada por provedor.
      2. Matriz RACI para cada controle de seguranca: responsabilidade da supervisionada
         vs. responsabilidade do provedor.
      3. Gap analysis: controles que sao responsabilidade da supervisionada mas estao
         delegados ao provedor sem supervisao adequada.

      **Auditoria independente:**
      4. Auditoria anual independente dos servicos em nuvem.
      5. Verificacao de cumprimento dos requisitos da Circular 638 em ambientes cloud.
      6. Assessment de maturidade de cloud security da supervisionada.

      **Preparacao para fiscalizacao da SUSEP:**
      7. Documentacao organizada de conformidade cloud para auditoria da SUSEP.
      8. Evidencias de monitoramento e supervisao do provedor.
      9. Registros de acoes tomadas em caso de nao conformidade do provedor.
      10. Historico de incidentes em cloud e acoes de remediacao.
    tools:
      - grc-platform
      - compliance-scanner
      - cloud-security-hub
      - vendor-risk-management
