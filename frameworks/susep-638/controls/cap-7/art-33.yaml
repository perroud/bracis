id: art-33
family: cap-7
title: "Compatibilidade com Resolucao CNSP 381"
class: SUSEP-638
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 33. O cumprimento dos requisitos previstos nesta Circular deve ser
    compatível com o disposto na Resolução CNSP nº 381, de 2020.
guidance:
  prose: |
    O art. 33 estabelece que a Circular 638 deve ser interpretada e aplicada
    em compatibilidade com a Resolucao CNSP 381/2020, que e a norma hierarquicamente
    superior.

    **Hierarquia normativa:**
    - CNSP 381 (Resolucao do Conselho): norma de nivel superior, define diretrizes
    - SUSEP 638 (Circular da Superintendencia): norma de detalhamento, operacionaliza
      os requisitos da CNSP 381

    **Compatibilidade na pratica:**
    A supervisionada que cumpre integralmente a Circular 638 atende tambem aos
    requisitos da CNSP 381 no que se refere a seguranca cibernetica. Porem:
    - A CNSP 381 pode conter requisitos adicionais nao detalhados na Circular 638
    - Em caso de conflito, a CNSP 381 prevalece como norma superior
    - Novas resolucoes do CNSP podem criar obrigacoes adicionais

    **Implicacao para conformidade:**
    O programa de conformidade da supervisionada deve considerar ambas as normas:
    - Matriz de controles mapeando requisitos da Circular 638 e CNSP 381
    - Verificacao de que nenhum requisito da CNSP 381 ficou sem cobertura
    - Monitoramento de novas resolucoes do CNSP que possam afetar a conformidade
implementation_guidance:
  platform_engineering:
    prose: |
      **Mapeamento de conformidade dupla:**
      1. Matriz de rastreabilidade: requisitos da Circular 638 vs. CNSP 381.
      2. Dashboard de conformidade cobrindo ambas as normas.
      3. Alertas quando nova regulamentacao do CNSP afeta a conformidade.
    tools:
      - grc-platform
      - compliance-scanner
  devsecops:
    prose: |
      **Compliance-as-code abrangente:**
      1. Regras de compliance cobrindo requisitos de ambas as normas.
      2. Atualizacao de regras quando novas regulamentacoes sao publicadas.
    tools:
      - opa-gatekeeper
      - gitlab-ci
  secops:
    prose: |
      **Gestao regulatoria integrada:**
      1. Monitoramento de publicacoes do CNSP que afetem seguranca cibernetica.
      2. Gap analysis quando nova regulamentacao e publicada.
      3. Plano de adequacao a novos requisitos.
      4. Documentacao de conformidade com ambas as normas para auditoria.
    tools:
      - grc-platform
      - regulatory-monitoring
