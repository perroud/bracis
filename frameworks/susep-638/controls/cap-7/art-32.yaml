id: art-32
family: cap-7
title: "Adequacao Proporcional ao Porte"
class: SUSEP-638
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 32. A SUSEP poderá estabelecer prazos diferenciados para a adequação de
    supervisionadas de menor porte ou com operações menos complexas aos requisitos
    previstos nesta Circular.
guidance:
  prose: |
    O art. 32 confere a SUSEP flexibilidade para estabelecer prazos diferenciados
    para supervisionadas menores, reforcando o principio de proporcionalidade.

    **Proporcionalidade regulatoria:**
    Este artigo reconhece que o mercado segurador e heterogeneo:
    - Grandes seguradoras com milhoes de segurados e operacoes complexas
    - Seguradoras de nicho com carteiras especializadas
    - Micro seguradoras (microsseguros)
    - Pequenas EAPCs com carteira limitada
    - Sociedades de capitalizacao de menor porte

    **Criterios de diferenciacao:**
    A SUSEP pode considerar:
    - Volume de premios emitidos
    - Numero de segurados e beneficiarios
    - Complexidade dos produtos oferecidos
    - Grau de digitalizacao das operacoes
    - Volume de dados tratados

    **Implicacao pratica:**
    Mesmo com prazos diferenciados, os requisitos continuam sendo obrigatorios.
    A diferenciacao se aplica ao prazo de implementacao, nao ao escopo de
    conformidade.

    **Para supervisionadas de menor porte:**
    Pode ser mais eficiente:
    - Adotar politica simplificada mas completa
    - Utilizar servicos gerenciados de seguranca (MSSP)
    - Compartilhar infraestrutura de seguranca com grupo empresarial
    - Focar em controles essenciais proporcionais ao risco
implementation_guidance:
  platform_engineering:
    prose: |
      **Abordagem proporcional para menor porte:**
      1. Avaliacao do porte e complexidade para dimensionamento de controles.
      2. Uso de servicos gerenciados de seguranca (SaaS) em vez de infraestrutura
         propria: SIEM-as-a-Service, SOC-as-a-Service.
      3. Cloud-native security tools inclusos no provedor de nuvem.
      4. Templates simplificados de conformidade para supervisionadas menores.
    tools:
      - managed-security-services
      - cloud-native-security
      - compliance-scanner
  devsecops:
    prose: |
      **Pipeline simplificado mas completo:**
      1. Uso de ferramentas integradas do GitLab Ultimate em vez de stack complexo.
      2. Security scanning automatico com configuracao default (zero-config).
      3. Templates de pipeline pre-configurados para conformidade com Circular 638.
    tools:
      - gitlab-sast
      - gitlab-dependency-scanning
      - gitlab-secret-detection
      - gitlab-ci
  secops:
    prose: |
      **Estrategia para menor porte:**
      1. Avaliacao de risco simplificada mas abrangente.
      2. Contratacao de MSSP (Managed Security Service Provider) para
         monitoramento e resposta a incidentes.
      3. Politica e plano simplificados mas cobrindo todos os requisitos.
      4. Aproveitamento de recursos do grupo empresarial quando aplicavel.
    tools:
      - managed-security-services
      - grc-platform
      - compliance-scanner
