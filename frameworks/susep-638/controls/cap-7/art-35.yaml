id: art-35
family: cap-7
title: "Vigencia da Circular"
class: SUSEP-638
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 35. Esta Circular entra em vigor em 1 de setembro de 2021.
guidance:
  prose: |
    O art. 35 define a data de entrada em vigor da Circular 638.

    **Datas-chave derivadas:**
    Com a entrada em vigor em 01/09/2021, os prazos de adequacao foram:
    - Politica de seguranca (art. 28): 180 dias = ~28/02/2022
    - Diretor responsavel (art. 31): 180 dias = ~28/02/2022
    - Plano de acao (art. 29): 360 dias = ~27/08/2022
    - Contratos de nuvem (art. 30): 360 dias = ~27/08/2022

    **Situacao atual:**
    Todos os prazos estao vencidos. A circular esta plenamente vigente e todos
    os requisitos devem estar implementados.

    **Aplicacao imediata:**
    Desde 01/09/2021, a SUSEP pode fiscalizar o cumprimento da circular.
    As supervisionadas devem estar em conformidade total.

    **Novos entrantes:**
    Supervisionadas que obtenham autorizacao de funcionamento apos 01/09/2021
    devem estar em conformidade desde o inicio das operacoes.
implementation_guidance:
  platform_engineering:
    prose: |
      **Calendario regulatorio:**
      1. Data de vigencia e datas-chave registradas no sistema de GRC.
      2. Alertas de datas de revisao anual derivadas da vigencia.
      3. Dashboard de compliance com timeline de marcos regulatorios.
    tools:
      - grc-platform
      - compliance-scanner
  devsecops:
    prose: |
      **Baseline de conformidade:**
      1. Todos os repositorios com security scanning ativo desde a data de vigencia.
      2. Evidencias de conformidade com data posterior a vigencia.
    tools:
      - gitlab-ci
      - gitlab-sast
  secops:
    prose: |
      **Gestao de vigencia:**
      1. Monitoramento de alteracoes ou revogacao da circular.
      2. Acompanhamento de normas complementares da SUSEP.
      3. Historico de conformidade desde a data de vigencia.
    tools:
      - grc-platform
      - regulatory-monitoring
