id: art-34
family: cap-7
title: "Fiscalizacao pela SUSEP"
class: SUSEP-638
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 34. O descumprimento do disposto nesta Circular sujeita a supervisionada
    e seus administradores às sanções previstas na legislação e regulamentação em
    vigor.
guidance:
  prose: |
    O art. 34 explicita que o descumprimento da Circular 638 sujeita a
    supervisionada e seus administradores a sancoes legais e regulatorias.

    **Sancoes aplicaveis:**
    A SUSEP pode aplicar sancoes previstas no Decreto-Lei 73/1966 e na
    legislacao complementar:
    - Advertencia
    - Multa
    - Suspensao do exercicio de cargo
    - Inabilitacao temporaria para exercicio de cargo
    - Cassacao da autorizacao de funcionamento
    - Intervencao ou liquidacao extrajudicial (casos extremos)

    **Responsabilidade dos administradores:**
    O artigo menciona explicitamente "seus administradores", o que inclui:
    - Membros do conselho de administracao
    - Diretores (especialmente o diretor responsavel do art. 22)
    - Conselheiros fiscais
    - Administradores de fato

    **Agravantes e atenuantes:**
    A SUSEP considera na dosimetria:
    - Gravidade da infracao
    - Vantagem auferida ou pretendida
    - Dano a segurados e beneficiarios
    - Reincidencia
    - Circunstancias atenuantes (colaboracao, remediacao rapida)

    **Implicacoes para o mercado:**
    A sancao a uma seguradora afeta:
    - Reputacao e confianca do mercado
    - Capacidade de operar em determinados ramos
    - Rating e classificacao de risco
    - Relacoes com resseguradores e parceiros
implementation_guidance:
  platform_engineering:
    prose: |
      **Prevencao de sancoes via monitoramento continuo:**
      1. Dashboard de conformidade em tempo real com status de cada artigo.
      2. Alertas automaticos de nao conformidade para acao imediata.
      3. Compliance score calculado continuamente com trending.
      4. Relatorio de risco regulatorio para diretoria e conselho.
    tools:
      - compliance-scanner
      - grc-platform
      - dashboard-platform
  devsecops:
    prose: |
      **Evidencias de conformidade no pipeline:**
      1. Relatorios de seguranca de pipeline como evidencia de diligencia.
      2. Metricas de seguranca demonstrando melhoria continua.
      3. Historico de remediacao de vulnerabilidades.
    tools:
      - gitlab-ci
      - defectdojo
      - compliance-scanner
  secops:
    prose: |
      **Programa de conformidade:**
      1. Assessment de conformidade semestral com gap analysis.
      2. Plano de remediacao para gaps identificados com priorizacao.
      3. Relatorio de conformidade para conselho trimestral.
      4. Preparacao para fiscalizacao da SUSEP: documentos organizados,
         evidencias atualizadas, equipe treinada.

      **Gestao de risco regulatorio:**
      5. Matriz de risco regulatorio com impacto de nao conformidade.
      6. Plano de acao para areas de maior risco de sancao.
      7. Monitoramento de processos sancionatorios da SUSEP no mercado.
      8. Licoes aprendidas de sancoes aplicadas a outras supervisionadas.
    tools:
      - grc-platform
      - compliance-scanner
      - regulatory-monitoring
