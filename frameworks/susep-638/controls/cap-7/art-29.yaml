id: art-29
family: cap-7
title: "Prazo de Adequacao para o Plano de Acao"
class: SUSEP-638
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 29. O plano de ação e de resposta a incidentes mencionado no art. 10 deve
    ser elaborado e implementado no prazo de 360 (trezentos e sessenta) dias contados
    da data de entrada em vigor desta Circular.
guidance:
  prose: |
    O art. 29 estabeleceu o prazo para elaboracao e implementacao do plano de
    acao e de resposta a incidentes.

    **Prazo original:**
    360 dias apos a entrada em vigor (01/09/2021), ou seja, ate aproximadamente
    27 de agosto de 2022.

    **Nota importante:**
    O prazo para o plano (360 dias) e maior que o prazo para a politica (180 dias,
    art. 28). Isso reflete que o plano depende da politica: primeiro se define a
    politica, depois se elabora o plano de acao que a operacionaliza.

    **Situacao atual:**
    O prazo ja esta vencido. Qualquer supervisionada sem plano implementado
    esta em nao conformidade.

    **Elaborar E implementar:**
    A circular exige nao apenas a elaboracao, mas tambem a implementacao do plano
    dentro do prazo. Ter o plano documentado sem implementacao nao atende ao
    requisito.

    **Verificacao pela SUSEP:**
    A SUSEP verifica:
    - Se o plano existe e esta documentado
    - Se o plano foi efetivamente implementado (controles operacionais)
    - Se o plano e testado periodicamente
    - Se o relatorio anual (art. 13) demonstra efetividade
implementation_guidance:
  platform_engineering:
    prose: |
      **Tracking de implementacao:**
      1. Sistema de gestao de projetos com tracking de cada item do plano de acao.
      2. Dashboard de progresso de implementacao com status por controle.
      3. Alertas de itens atrasados ou bloqueados.
      4. Evidencias de implementacao vinculadas a cada item do plano.

      **Automacao de controles do plano:**
      5. Deployment automatizado de controles tecnicos previstos no plano.
      6. Verificacao continua de que controles implementados estao operacionais.
      7. Rollback automatico quando controles se tornam inoperantes.
    tools:
      - project-management
      - grc-platform
      - compliance-scanner
      - monitoring-platform
  devsecops:
    prose: |
      **Implementacao de controles de seguranca no pipeline:**
      1. Implementacao gradual de security gates conforme plano de acao.
      2. Metricas de adocao por equipe e por sistema.
      3. Evidencias de implementacao em logs de pipeline.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dependency-scanning
      - gitlab-secret-detection
  secops:
    prose: |
      **Gestao do plano de acao:**
      1. Acompanhamento mensal do progresso de implementacao.
      2. Relatorio a diretoria sobre status de cada item do plano.
      3. Gestao de riscos para itens atrasados ou nao implementados.
      4. Evidencias de implementacao organizadas para auditoria.

      **Testes de efetividade:**
      5. Teste de cada controle implementado para validar funcionamento.
      6. Exercicio de resposta a incidentes para validar o plano.
      7. Registros de testes e resultados retidos por 5 anos.
    tools:
      - grc-platform
      - incident-management
      - compliance-scanner
