id: art-28
family: cap-7
title: "Prazo de Adequacao para a Politica"
class: SUSEP-638
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 28. As supervisionadas que, na data de entrada em vigor desta Circular,
    não possuírem política de segurança cibernética aprovada na forma do art. 20
    devem aprová-la no prazo de 180 (cento e oitenta) dias contados da data de
    entrada em vigor desta Circular.
guidance:
  prose: |
    O art. 28 estabeleceu o prazo de adequacao para aprovacao da politica de
    seguranca cibernetica.

    **Prazo original:**
    180 dias apos a entrada em vigor da circular (01/09/2021), ou seja, ate
    aproximadamente 28 de fevereiro de 2022.

    **Situacao atual:**
    O prazo ja esta vencido. Qualquer supervisionada que nao possua politica
    de seguranca cibernetica aprovada esta em situacao de nao conformidade.

    **Para novas supervisionadas:**
    Entidades que obtenham autorizacao de funcionamento pela SUSEP apos a
    entrada em vigor devem ter a politica aprovada desde o inicio das operacoes.

    **Implicacao pratica:**
    Em fiscalizacao, a SUSEP verifica:
    - Se a politica existe e esta aprovada pelo conselho/diretoria
    - Data de aprovacao original e datas de revisoes subsequentes
    - Se a politica esta dentro do prazo de revisao anual (art. 9)
    - Se a politica cobre todos os requisitos minimos do art. 4
implementation_guidance:
  platform_engineering:
    prose: |
      **Conformidade com prazos:**
      1. Registro de data de aprovacao da politica em sistema de GRC.
      2. Alertas automaticos para revisao anual (90 dias antes do vencimento).
      3. Versionamento da politica com historico de aprovacoes.
      4. Dashboard de conformidade com datas-chave e status.

      **Para novas supervisionadas:**
      5. Template de politica de seguranca cibernetica alinhado a Circular 638.
      6. Checklist de implementacao com todos os artigos da circular.
      7. Automacao de deployment de controles baseline desde o dia um.
    tools:
      - grc-platform
      - document-management
      - compliance-scanner
  devsecops:
    prose: |
      **Implementacao desde o inicio:**
      1. Pipeline de CI/CD com security gates desde o primeiro dia de operacao.
      2. Templates de projeto com controles de seguranca embutidos.
      3. Security baseline automatizado para novos repositorios.
      4. SAST, SCA e secret scanning habilitados por padrao.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dependency-scanning
      - gitlab-secret-detection
  secops:
    prose: |
      **Gestao de prazos regulatorios:**
      1. Calendario regulatorio com todos os prazos da Circular 638.
      2. Controle de revisao periodica da politica (minimo anual).
      3. Evidencias de aprovacao pelo conselho/diretoria com atas.
      4. Retencao de todas as versoes da politica por 5 anos (art. 24).
    tools:
      - grc-platform
      - document-management
