id: art-30
family: cap-7
title: "Prazo para Adequacao de Contratos em Nuvem"
class: SUSEP-638
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 30. A adequação dos contratos de serviços de processamento e armazenamento
    de dados e de computação em nuvem vigentes na data de entrada em vigor desta
    Circular aos requisitos previstos nos arts. 14 a 19 deve ser concluída no
    prazo de 360 (trezentos e sessenta) dias contados da data de entrada em vigor
    desta Circular.
guidance:
  prose: |
    O art. 30 estabeleceu o prazo para adequacao de contratos de nuvem existentes
    aos requisitos da Circular 638.

    **Prazo original:**
    360 dias apos a entrada em vigor (01/09/2021), ou seja, ate aproximadamente
    27 de agosto de 2022.

    **Abrangencia:**
    Aplica-se a contratos de nuvem que ja estavam vigentes na data de entrada
    em vigor da circular. Novos contratos devem atender desde a celebracao.

    **Adequacoes tipicamente necessarias:**
    - Inclusao de clausula de acesso pela SUSEP (art. 15, II-e)
    - Definicao de SLAs de seguranca (art. 15, III)
    - Documentacao de exit strategy (art. 15, III)
    - Comunicacao a SUSEP de servicos no exterior (art. 16)
    - Garantia de acesso a dados em jurisdicoes estrangeiras (art. 17)
    - Garantia de nao-exoneracao de responsabilidade (art. 19)

    **Desafio pratico para seguradoras:**
    Contratos com grandes provedores de nuvem (AWS, Azure, GCP) sao tipicamente
    contratos de adesao dificeis de alterar. A supervisionada precisa:
    - Negociar addendums regulatorios
    - Utilizar acordos de uso empresarial (Enterprise Agreements)
    - Incluir clausulas em contratos locais com revendedores/parceiros
    - Documentar controles compensatorios quando adequacao contratual nao e possivel
implementation_guidance:
  platform_engineering:
    prose: |
      **Inventario de contratos:**
      1. Inventario completo de todos os contratos de nuvem vigentes com
         data de celebracao, escopo e provedor.
      2. Gap analysis: requisitos da circular vs. clausulas existentes em
         cada contrato.
      3. Priorizacao de adequacoes por risco e criticidade do servico.

      **Controles compensatorios:**
      4. Para contratos que nao podem ser alterados, documentar controles
         compensatorios: monitoramento adicional, backup independente, etc.
      5. Implementacao tecnica de controles que compensem lacunas contratuais.
    tools:
      - contract-management
      - grc-platform
      - compliance-scanner
  devsecops:
    prose: |
      **Verificacao tecnica de conformidade:**
      1. Validacao de que controles tecnicos exigidos pela circular estao
         implementados independente de clausula contratual.
      2. Testes de portabilidade de dados entre provedores.
      3. Verificacao de criptografia e controles de acesso.
    tools:
      - checkov
      - cspm
      - gitlab-ci
  secops:
    prose: |
      **Programa de adequacao contratual:**
      1. Projeto de adequacao com cronograma por contrato e provedor.
      2. Negociacao com provedores com apoio de area juridica.
      3. Priorizacao: contratos com dados de segurados primeiro.
      4. Acompanhamento de progresso e relatorio a diretoria.

      **Evidencias de adequacao:**
      5. Registro de cada contrato adequado com data e alteracoes realizadas.
      6. Documentacao de controles compensatorios quando adequacao nao e possivel.
      7. Comunicacao a SUSEP de servicos no exterior (art. 16) realizadas.
      8. Retencao de documentacao por 5 anos (art. 24).
    tools:
      - contract-management
      - grc-platform
      - vendor-risk-management
