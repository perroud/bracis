id: art-31
family: cap-7
title: "Designacao do Diretor no Prazo de Adequacao"
class: SUSEP-638
baselines: [todas-supervisionadas]
statement:
  prose: |
    Art. 31. A designação do diretor de que trata o art. 22 e a comunicação à
    SUSEP devem ser realizadas no prazo de 180 (cento e oitenta) dias contados
    da data de entrada em vigor desta Circular.
guidance:
  prose: |
    O art. 31 estabeleceu o prazo para designacao do diretor responsavel por
    seguranca cibernetica e comunicacao a SUSEP.

    **Prazo original:**
    180 dias apos a entrada em vigor (01/09/2021), ou seja, ate aproximadamente
    28 de fevereiro de 2022.

    **Dupla obrigacao:**
    1. Designar o diretor internamente (ata do conselho/diretoria)
    2. Comunicar a designacao a SUSEP

    **Situacao atual:**
    O prazo ja esta vencido. Toda supervisionada deve ter diretor designado
    e comunicado a SUSEP.

    **Para novas supervisionadas:**
    A designacao deve ser feita desde o inicio das operacoes, como parte do
    processo de autorizacao de funcionamento pela SUSEP.

    **Mudanca de diretor:**
    Quando houver mudanca do diretor responsavel, a nova designacao deve ser
    comunicada a SUSEP em prazo habil, conforme procedimentos da autarquia.
implementation_guidance:
  platform_engineering:
    prose: |
      **Registro de designacao:**
      1. Registro formal no sistema de GRC: nome, data de designacao, ata.
      2. Alerta automatico quando houver necessidade de atualizacao.
      3. Historico de designacoes mantido por 5 anos (art. 24).
    tools:
      - grc-platform
      - document-management
  devsecops:
    prose: |
      **Visibilidade organizacional:**
      1. Informacao do diretor responsavel documentada em wiki/docs de seguranca.
      2. Processo de escalacao para o diretor documentado em runbooks.
    tools:
      - gitlab-wiki
      - document-management
  secops:
    prose: |
      **Gestao da designacao:**
      1. Acompanhamento de prazos de designacao e comunicacao a SUSEP.
      2. Processo de transicao quando houver mudanca de diretor.
      3. Atualizacao de comunicacao a SUSEP em caso de substituicao.
      4. Retencao de atas de designacao por 5 anos.
    tools:
      - grc-platform
      - document-management
