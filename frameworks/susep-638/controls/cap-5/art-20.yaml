id: art-20
family: cap-5
title: "Aprovacao da Politica pelo Conselho de Administracao"
class: SUSEP-638
statement:
  prose: |
    Art. 20. A política de segurança cibernética e o plano de ação e de resposta a
    incidentes devem ser aprovados pelo conselho de administração ou, na sua
    inexistência, pela diretoria da supervisionada.
guidance:
  prose: |
    O art. 20 estabelece que a politica e o plano devem ter aprovacao no mais alto
    nivel de governanca da supervisionada.

    **Hierarquia de aprovacao:**
    1. Conselho de administracao: quando existente, e a instancia obrigatoria
       de aprovacao
    2. Diretoria: apenas quando nao existe conselho de administracao

    **Implicacoes de governanca:**
    A aprovacao pelo conselho/diretoria significa que:
    - A alta administracao conhece e assume responsabilidade pela politica
    - Os recursos necessarios para implementacao estao aprovados
    - A politica tem forca normativa interna
    - O conselho pode ser responsabilizado por omissao em caso de incidente

    **Processo de aprovacao:**
    A aprovacao deve ser:
    - Formal: registrada em ata do conselho ou da diretoria
    - Documentada: com data, participantes e decisao
    - Periodica: revisada anualmente conforme art. 9
    - Rastreavel: historico de versoes aprovadas mantido

    **Particularidades do mercado de seguros:**
    Muitas supervisionadas sao filiais de grupos internacionais. A politica pode
    ser unica para o grupo (art. 3, ss 2), mas a aprovacao deve ser feita pelo
    conselho/diretoria da entidade brasileira.

    Seguradoras de menor porte podem nao ter conselho de administracao formal,
    nesse caso a diretoria e responsavel pela aprovacao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Workflow de aprovacao digital:**
      1. Sistema de gestao documental com workflow de aprovacao formal para
         politica e plano de acao.
      2. Assinatura digital dos membros do conselho/diretoria na politica aprovada.
      3. Versionamento com historico de aprovacoes: quem aprovou, quando, versao.
      4. Notificacao automatica de vencimento da politica (anualidade do art. 9).

      **Dashboard para conselho:**
      5. Dashboard executivo de seguranca cibernetica para apresentacao ao conselho.
      6. Metricas de alto nivel: postura de seguranca, incidentes, conformidade.
      7. Comparativo ano-a-ano para demonstrar evolucao.
      8. Alertas de riscos criticos para escalacao ao conselho.
    tools:
      - document-management
      - grc-platform
      - dashboard-platform
      - e-signature
  devsecops:
    prose: |
      **Rastreabilidade de conformidade:**
      1. Status da politica aprovada visivel no pipeline como prerequisito para deploys.
      2. Verificacao automatica de que a politica vigente esta dentro do prazo de
         validade (menos de 1 ano desde ultima aprovacao).
      3. Link para politica aprovada em documentacao de projetos.
    tools:
      - gitlab-ci
      - document-management
  secops:
    prose: |
      **Gestao da aprovacao:**
      1. Preparacao de material para aprovacao pelo conselho: executive summary,
         principais riscos, investimentos necessarios, comparativo de mercado.
      2. Calendario de aprovacao: revisao anual da politica com data fixa.
      3. Registro formal de aprovacao em ata do conselho/diretoria.
      4. Comunicacao da aprovacao a todas as areas da supervisionada.

      **Evidencias para SUSEP:**
      5. Retencao de atas de aprovacao por 5 anos.
      6. Retencao de todas as versoes da politica aprovada.
      7. Registro de participacao dos conselheiros na deliberacao.
      8. Historico de apresentacoes ao conselho sobre seguranca cibernetica.
    tools:
      - grc-platform
      - document-management
      - board-management
