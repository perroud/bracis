id: art-21
family: cap-5
title: "Responsabilidades do Conselho de Administracao"
class: SUSEP-638
statement:
  prose: |
    Art. 21. O conselho de administração ou, na sua inexistência, a diretoria da
    supervisionada deve, no mínimo:
    I - aprovar a política de segurança cibernética e o plano de ação e de resposta
    a incidentes;
    II - assegurar a alocação de recursos humanos, financeiros e tecnológicos
    adequados à manutenção da segurança cibernética da supervisionada;
    III - assegurar a adequada capacitação e atualização técnica dos funcionários
    da supervisionada sobre segurança cibernética; e
    IV - avaliar, no mínimo anualmente, o relatório de que trata o art. 13.
guidance:
  prose: |
    O art. 21 detalha as responsabilidades minimas do conselho de administracao
    ou diretoria em materia de seguranca cibernetica.

    **Inciso I - Aprovacao formal:**
    Ja detalhado no art. 20. A aprovacao deve ser registrada em ata.

    **Inciso II - Alocacao de recursos:**
    O conselho/diretoria e responsavel por garantir que a supervisionada tenha:
    - Equipe de seguranca cibernetica dimensionada adequadamente
    - Orcamento para ferramentas e tecnologias de seguranca
    - Infraestrutura tecnologica para implementar os controles exigidos
    - Recursos para contratacao de servicos especializados (pen test, forense)

    Para seguradoras, isso inclui recursos especificos para:
    - Protecao de sistemas core de seguros
    - Seguranca de plataformas digitais de venda
    - Monitoramento de integracao com corretores e parceiros
    - Seguranca de dados atuariais e de provisoes tecnicas

    **Inciso III - Capacitacao:**
    Programa de capacitacao que inclua:
    - Treinamento de conscientizacao para todos os funcionarios
    - Capacitacao tecnica para equipes de TI e seguranca
    - Atualizacao sobre novas ameacas ao setor securitario
    - Certificacoes profissionais para equipe de seguranca

    **Inciso IV - Avaliacao do relatorio anual:**
    O conselho/diretoria deve avaliar o relatorio do art. 13, incluindo:
    - Efetividade da implementacao do plano
    - Incidentes ocorridos e acoes tomadas
    - Resultados de testes de continuidade
    - Gaps identificados e plano de correcao
implementation_guidance:
  platform_engineering:
    prose: |
      **Recursos tecnologicos (inciso II):**
      1. Infraestrutura de seguranca dimensionada para os controles exigidos:
         SIEM, EDR, WAF, CSPM, SOAR, vulnerability management.
      2. Ambientes de teste e staging para validacao de controles.
      3. Infraestrutura de monitoramento 24x7 para sistemas core de seguros.
      4. Plataforma de treinamento para capacitacao (inciso III).

      **Dashboard executivo para conselho (inciso IV):**
      5. Dashboard de seguranca cibernetica com metricas de alto nivel.
      6. Relatorio automatizado para o conselho com indicadores-chave.
      7. Comparativo de investimento em seguranca vs. efetividade.
      8. Risk heat map para visualizacao de riscos ciberneticos.
    tools:
      - siem
      - edr-xdr
      - waf
      - cspm
      - dashboard-platform
      - grc-platform
  devsecops:
    prose: |
      **Capacitacao de desenvolvedores (inciso III):**
      1. Programa de treinamento em secure coding para equipes de desenvolvimento.
      2. Plataforma de e-learning com trilhas de seguranca para seguros.
      3. Certificacoes incentivadas: CSSLP, GWEB, Security+.
      4. Hackathons internos de seguranca com premiacoes.

      **Metricas de capacitacao:**
      5. Dashboard de treinamentos realizados por equipe e por individuo.
      6. Metricas de evolucao: vulnerabilidades introduzidas antes e depois de
         treinamento por equipe.
      7. Cobertura de treinamento obrigatorio.
    tools:
      - lms-platform
      - gitlab-ci
      - dashboard-platform
  secops:
    prose: |
      **Programa de capacitacao (inciso III):**
      1. Treinamento anual obrigatorio de seguranca cibernetica para todos.
      2. Treinamento especifico por funcao: TI, subscricao, sinistros, atuarial.
      3. Simulacoes de phishing trimestrais com metricas de resultado.
      4. Capacitacao tecnica para equipe de seguranca: SANS, GIAC, ISC2.
      5. Treinamento de seguranca para corretores com acesso a sistemas.

      **Avaliacao do relatorio anual (inciso IV):**
      6. Preparacao de executive summary do relatorio para o conselho.
      7. Apresentacao presencial ao conselho com Q&A.
      8. Registro de deliberacoes do conselho sobre o relatorio.
      9. Follow-up de acoes determinadas pelo conselho.

      **Alocacao de recursos (inciso II):**
      10. Proposta orcamentaria anual de seguranca cibernetica fundamentada.
      11. Benchmark de investimento em seguranca com pares do mercado.
      12. Justificativa baseada em risco para cada investimento proposto.
    tools:
      - lms-platform
      - phishing-simulation
      - grc-platform
      - dashboard-platform
