id: art-22
family: cap-5
title: "Diretor Responsavel pela Seguranca Cibernetica"
class: SUSEP-638
statement:
  prose: |
    Art. 22. A supervisionada deve designar diretor responsável pela política de
    segurança cibernética e pela execução do plano de ação e de resposta a incidentes.

    § 1º O diretor mencionado no caput pode desempenhar outras funções na
    supervisionada, desde que não haja conflito de interesses.

    § 2º A supervisionada deve comunicar à SUSEP a designação do diretor
    responsável de que trata o caput.
guidance:
  prose: |
    O art. 22 exige a designacao formal de um diretor responsavel pela seguranca
    cibernetica, que funciona como o CISO (Chief Information Security Officer) da
    supervisionada perante a SUSEP.

    **Papel do diretor responsavel:**
    - Responsabilidade formal pela politica de seguranca cibernetica
    - Responsabilidade pela execucao do plano de acao e resposta a incidentes
    - Ponte entre a area tecnica e o conselho de administracao
    - Interlocutor com a SUSEP em materia de seguranca cibernetica

    **Acumulo de funcoes (ss 1):**
    O diretor pode exercer outras funcoes na supervisionada, porem sem conflito
    de interesses. Exemplos de potencial conflito:
    - Diretor de TI e diretor de seguranca (quem audita o auditor?)
    - Diretor de operacoes e diretor de seguranca (pressao por velocidade vs.
      seguranca)

    Em seguradoras de menor porte, o acumulo e mais comum e aceito, desde que
    o conflito de interesses seja gerenciado.

    **Comunicacao a SUSEP (ss 2):**
    A designacao do diretor deve ser formalmente comunicada a SUSEP, criando
    um registro oficial de quem e o responsavel perante o regulador.

    **Qualificacao esperada:**
    Embora a circular nao exija qualificacao especifica, o diretor deve ter:
    - Conhecimento de seguranca cibernetica compativel com a funcao
    - Autoridade para tomar decisoes de seguranca
    - Acesso direto ao conselho de administracao
    - Capacidade de gerenciar a equipe de seguranca
implementation_guidance:
  platform_engineering:
    prose: |
      **Ferramentas para o diretor responsavel:**
      1. Dashboard executivo de seguranca cibernetica com visao consolidada de
         riscos, incidentes, conformidade e investimentos.
      2. Alertas de incidentes criticos com escalacao direta ao diretor.
      3. Relatorios automatizados para apresentacao ao conselho e a SUSEP.
      4. Acesso privilegiado a sistemas de monitoramento e gestao de incidentes.

      **Suporte a decisao:**
      5. Risk scoring automatizado para priorizacao de acoes.
      6. Simulacao de cenarios de risco cibernetico para tomada de decisao.
      7. Benchmark de seguranca com pares do mercado segurador.
      8. Trending de metricas de seguranca para identificar tendencias.
    tools:
      - grc-platform
      - dashboard-platform
      - siem
      - risk-assessment-platform
  devsecops:
    prose: |
      **Visibilidade para o diretor:**
      1. Dashboard de seguranca de aplicacoes: vulnerabilidades por sistema,
         SLA de correcao, tendencias.
      2. Relatorio consolidado de pipeline de seguranca para revisao executiva.
      3. Alertas de vulnerabilidades criticas em sistemas core de seguros.

      **Governanca de desenvolvimento:**
      4. Processo de excecao de seguranca com aprovacao do diretor responsavel.
      5. Revisao periodica de excecoes ativas e riscos aceitos.
    tools:
      - defectdojo
      - dashboard-platform
      - gitlab-ci
  secops:
    prose: |
      **Designacao formal:**
      1. Ata de designacao do diretor responsavel pelo conselho/diretoria.
      2. Comunicacao formal a SUSEP com dados do diretor designado.
      3. Atualizacao da comunicacao quando houver mudanca de diretor.
      4. Definicao formal de autoridade e responsabilidades do diretor.

      **Rotina do diretor responsavel:**
      5. Reuniao mensal com equipe de seguranca cibernetica.
      6. Relatorio trimestral ao conselho de administracao.
      7. Avaliacao do relatorio anual (art. 13) com recomendacoes.
      8. Participacao em exercicios de crise e resposta a incidentes.
      9. Interlocucao com SUSEP quando solicitado.

      **Gestao de conflito de interesses (ss 1):**
      10. Documentacao de analise de conflito de interesses.
      11. Controles compensatorios quando ha acumulo de funcoes.
      12. Revisao periodica de potenciais conflitos.
    tools:
      - grc-platform
      - document-management
      - board-management
