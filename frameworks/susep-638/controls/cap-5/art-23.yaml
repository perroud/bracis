id: art-23
family: cap-5
title: "Auditoria Interna"
class: SUSEP-638
statement:
  prose: |
    Art. 23. A auditoria interna deve avaliar, periodicamente, a adequação e a
    efetividade da política de segurança cibernética, do plano de ação e de
    resposta a incidentes e dos controles internos relacionados à segurança
    cibernética da supervisionada.
guidance:
  prose: |
    O art. 23 atribui a auditoria interna um papel ativo na avaliacao da seguranca
    cibernetica, nao como executor de controles, mas como avaliador independente.

    **Escopo da auditoria interna:**
    A auditoria deve avaliar tres dimensoes:
    1. Adequacao: a politica e o plano estao alinhados com os requisitos da
       Circular 638 e com o perfil de risco da supervisionada?
    2. Efetividade: os controles implementados funcionam na pratica e atingem
       seus objetivos?
    3. Controles internos: os controles relacionados a seguranca cibernetica
       estao adequados e operando conforme projetado?

    **Periodicidade:**
    A circular nao define frequencia especifica, mas "periodicamente" implica:
    - Minimo anual para avaliacao abrangente
    - Mais frequente para areas de maior risco
    - Sob demanda apos incidentes relevantes

    **Independencia:**
    A auditoria interna deve atuar com independencia:
    - Nao pode ser responsavel pela implementacao dos controles que avalia
    - Deve ter acesso irrestrito a informacoes e sistemas
    - Deve reportar ao conselho de administracao ou comite de auditoria

    **Especificidade para seguradoras:**
    A auditoria interna deve ter competencia em:
    - Seguranca cibernetica e tecnologia
    - Regulamentacao do mercado de seguros (SUSEP, CNSP)
    - Riscos especificos do setor (fraude, dados de saude, provisoes)
    - Frameworks de referencia (ISO 27001, NIST CSF)
implementation_guidance:
  platform_engineering:
    prose: |
      **Suporte tecnologico a auditoria:**
      1. Acesso read-only da auditoria interna a todos os sistemas de monitoramento
         de seguranca: SIEM, CSPM, vulnerability scanner.
      2. Dashboards de auditoria com metricas de conformidade por controle.
      3. Trilhas de auditoria automatizadas e imutaveis para verificacao.
      4. Ferramentas de GRC com modulo de auditoria integrado.

      **Evidencias automatizadas:**
      5. Coleta automatica de evidencias de conformidade para auditoria.
      6. Repositorio centralizado de evidencias com classificacao por artigo.
      7. Historico de conformidade com timeline de evolucao.
    tools:
      - grc-platform
      - compliance-scanner
      - siem
      - dashboard-platform
  devsecops:
    prose: |
      **Evidencias de pipeline para auditoria:**
      1. Relatorios de pipeline de seguranca disponiveis para auditoria interna.
      2. Historico de vulnerabilidades encontradas, corrigidas e residuais.
      3. Metricas de adocao de praticas de seguranca no desenvolvimento.
      4. Logs de excecoes de seguranca aprovadas pelo diretor responsavel.
    tools:
      - gitlab-ci
      - defectdojo
      - compliance-scanner
  secops:
    prose: |
      **Plano de auditoria interna de seguranca cibernetica:**
      1. Plano anual de auditoria com escopo cobrindo todos os requisitos da
         Circular 638.
      2. Ciclo de auditoria que cobre todos os capitulos da circular em 3 anos.
      3. Auditorias focadas em areas de maior risco ou apos incidentes.

      **Metodologia de auditoria:**
      4. Avaliacao de adequacao: verificar se politica e plano cobrem todos os
         requisitos da circular.
      5. Avaliacao de efetividade: testes de controles (walkthrough, reperformance,
         testes substantivos).
      6. Avaliacao de controles internos: design e operacao dos controles.
      7. Benchmarking com frameworks de referencia (NIST CSF, ISO 27001).

      **Reporting:**
      8. Relatorio de auditoria para conselho/comite de auditoria.
      9. Findings com classificacao de risco e recomendacoes de remediacao.
      10. Acompanhamento de remediacoes de auditorias anteriores.
      11. Comunicacao de findings criticos ao diretor responsavel (art. 22).
    tools:
      - grc-platform
      - audit-management
      - compliance-scanner
