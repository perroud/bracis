id: art-24
family: cap-5
title: "Documentacao e Retencao"
class: SUSEP-638
statement:
  prose: |
    Art. 24. A supervisionada deve manter a documentação relativa aos requisitos
    de que trata esta Circular pelo prazo mínimo de cinco anos, contados a partir
    da data de sua elaboração, incluindo:
    I - a política de segurança cibernética e suas revisões;
    II - o plano de ação e de resposta a incidentes;
    III - o relatório anual de que trata o art. 13;
    IV - a documentação sobre os procedimentos e controles de que tratam os arts. 6
    e 7;
    V - os registros sobre incidentes relevantes;
    VI - a documentação sobre os serviços contratados de que tratam os arts. 14 a
    19; e
    VII - a ata de designação do diretor de que trata o art. 22.
guidance:
  prose: |
    O art. 24 estabelece requisitos de retencao documental com prazo minimo de
    5 anos. E um artigo critico para auditoria e fiscalizacao da SUSEP.

    **Prazo de retencao:**
    Minimo de 5 anos contados da data de elaboracao. Para documentos revisados
    periodicamente (como a politica), cada versao deve ser retida por 5 anos
    a partir de sua elaboracao.

    **Documentos de retencao obrigatoria:**

    I - Politica e revisoes: todas as versoes da politica de seguranca cibernetica,
        incluindo marcas de revisao (redlines) e justificativas de alteracao.

    II - Plano de acao: todas as versoes do plano, incluindo status de implementacao
         e evidencias de execucao.

    III - Relatorio anual: cada relatorio anual com data-base de 31/dezembro,
          incluindo anexos e evidencias referenciadas.

    IV - Procedimentos e controles: documentacao tecnica de implementacao dos
         controles do art. 6 (autenticacao, criptografia, IDS, DLP, etc.) e
         do art. 7 (tratamento de incidentes).

    V - Registros de incidentes: registros completos de cada incidente relevante,
        incluindo timeline, analise de causa raiz, impacto e acoes tomadas.

    VI - Documentacao de cloud: contratos, comunicacoes a SUSEP, avaliacoes de
         provedor, SLAs, registros de alteracoes.

    VII - Ata de designacao: ata do conselho/diretoria designando o diretor
          responsavel por seguranca cibernetica.

    **Implicacoes para seguradoras:**
    Dados de seguros tem ciclos longos (apolices de vida podem durar decadas).
    Embora a circular exija 5 anos, algumas informacoes de seguranca cibernetica
    podem ser relevantes por periodos maiores em contexto de sinistros ou
    litigios.
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de retencao documental:**
      1. Document management system (DMS) com politica de retencao automatizada
         de 5 anos para todos os documentos listados no art. 24.
      2. Storage imutavel (WORM) para documentos criticos: politicas, relatorios
         anuais, registros de incidentes.
      3. Indexacao por artigo da Circular 638 para facilitar auditoria.
      4. Alertas de expiracao do prazo de retencao antes de descarte.

      **Retencao de evidencias tecnicas:**
      5. Logs de seguranca retidos por 5 anos: SIEM, access logs, audit trails.
      6. Configuracoes de controles de seguranca versionadas e retidas.
      7. Relatorios de scans de vulnerabilidade e pen tests retidos.
      8. Evidencias de testes de continuidade retidas.

      **Integridade e autenticidade:**
      9. Assinatura digital em documentos retidos para garantir autenticidade.
      10. Checksums para verificacao de integridade periodica.
      11. Chain of custody documentada para registros de incidentes.
    tools:
      - document-management
      - object-storage-worm
      - compliance-scanner
      - audit-logging
  devsecops:
    prose: |
      **Retencao de artefatos de desenvolvimento:**
      1. Retencao de relatorios de SAST, DAST, SCA por 5 anos.
      2. Retencao de logs de pipeline de seguranca por 5 anos.
      3. Retencao de artefatos de build para analise forense retroativa.
      4. Archival automatico de evidencias de pipeline para storage de longo prazo.

      **Versionamento de politicas-como-codigo:**
      5. Historico completo de repositorio Git com todas as versoes de
         policies-as-code retidas.
      6. Tags de versao para cada aprovacao formal de politica.
    tools:
      - gitlab-ci
      - artifact-registry
      - object-storage-worm
  secops:
    prose: |
      **Programa de retencao documental:**
      1. Inventario de todos os documentos exigidos pelo art. 24 com data de
         elaboracao e data de expiracao da retencao.
      2. Responsavel designado para cada categoria de documento.
      3. Verificacao semestral de que todos os documentos estao retidos e acessiveis.
      4. Processo formal de descarte apos expiracao do prazo de 5 anos.

      **Organizacao para auditoria da SUSEP:**
      5. Pasta virtual por artigo da circular com todos os documentos relevantes.
      6. Indice de documentos com metadados: data, autor, versao, aprovacao.
      7. Acesso rapido a qualquer documento em caso de solicitacao da SUSEP.
      8. Processo de resposta a demandas da SUSEP com SLA definido.

      **Retencao especifica por categoria:**
      9. Inciso I (politica): cada versao com redlines e ata de aprovacao.
      10. Inciso V (incidentes): registros completos com timeline e post-mortem.
      11. Inciso VI (cloud): contratos, comunicacoes, avaliacoes de provedor.
      12. Inciso VII (designacao): ata e comunicacao a SUSEP.
    tools:
      - document-management
      - grc-platform
      - compliance-scanner
