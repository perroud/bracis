id: art-26
family: cap-6
title: "Convenios e Acordos de Compartilhamento"
class: SUSEP-638
statement:
  prose: |
    Art. 26. As supervisionadas podem celebrar convênios para o compartilhamento de
    informações sobre incidentes relevantes com outras entidades supervisionadas pela
    SUSEP, com o objetivo de aprimorar os mecanismos de prevenção e resposta a
    incidentes cibernéticos.
guidance:
  prose: |
    O art. 26 autoriza formalmente a celebracao de convenios de compartilhamento
    entre supervisionadas, removendo potenciais barreiras juridicas para cooperacao.

    **Natureza facultativa:**
    O compartilhamento via convenio e facultativo ("podem celebrar"), diferentemente
    da obrigacao de desenvolver iniciativas de compartilhamento do art. 25. Porem,
    a celebracao de convenios e a forma mais estruturada de atender ao art. 25.

    **Beneficios de convenios formais:**
    - Base juridica clara para troca de informacoes
    - Definicao de responsabilidades e limites de compartilhamento
    - Protecao juridica contra alegacoes de violacao de sigilo
    - Estrutura para compartilhamento recorrente e sistematico

    **Modelos de convenio no mercado de seguros:**
    - Convenio bilateral entre seguradoras parceiras
    - Convenio multilateral via Federacao Nacional de Seguros (FenSeg)
    - Participacao em ISACs do setor financeiro
    - Acordos de cooperacao com CERTs nacionais

    **Conteudo tipico de convenios:**
    - Escopo de informacoes compartilhaveis
    - Responsabilidades de cada parte
    - Clausulas de sigilo e confidencialidade
    - Mecanismos de compartilhamento (plataforma, formatos)
    - Prazo de vigencia e condicoes de rescisao
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de compartilhamento:**
      1. Plataforma de compartilhamento de IoCs (MISP, OpenCTI) configurada
         para troca com parceiros do convenio.
      2. APIs seguras para troca automatizada de informacoes entre signatarios.
      3. Canais criptografados para comunicacao de incidentes em tempo real.
      4. Formato padronizado de compartilhamento (STIX/TAXII).

      **Automacao:**
      5. Ingestao automatica de IoCs de parceiros no SIEM e ferramentas de defesa.
      6. Enriquecimento automatico de alertas com inteligencia compartilhada.
      7. Dashboards de inteligencia setorial com dados agregados do convenio.
    tools:
      - misp
      - threat-intelligence
      - siem
      - api-gateway
  devsecops:
    prose: |
      **Integracao de inteligencia compartilhada:**
      1. Feeds de IoCs do convenio integrados ao pipeline de seguranca.
      2. Regras de deteccao atualizadas com ameacas identificadas pelo convenio.
      3. Alertas de vulnerabilidades exploradas no setor para priorizacao de patches.
    tools:
      - gitlab-ci
      - threat-intelligence
      - gitlab-dependency-scanning
  secops:
    prose: |
      **Gestao de convenios:**
      1. Identificacao de potenciais parceiros de convenio no mercado segurador.
      2. Negociacao de termos com apoio juridico e de compliance.
      3. Formalizacao de convenios com clausulas de sigilo e TLP.
      4. Gestao de relacionamento com signatarios do convenio.

      **Operacionalizacao:**
      5. Processo de triagem de informacoes para compartilhamento.
      6. Responsavel designado para interface com parceiros do convenio.
      7. Frequencia de compartilhamento: imediato para ameacas ativas,
         periodico para inteligencia geral.
      8. Revisao anual da efetividade do convenio.
    tools:
      - grc-platform
      - threat-intelligence
      - misp
      - communication-platform
