id: art-25
family: cap-6
title: "Compartilhamento de Informacoes sobre Incidentes"
class: SUSEP-638
statement:
  prose: |
    Art. 25. As supervisionadas devem desenvolver iniciativas para o compartilhamento
    de informações sobre os incidentes relevantes de que trata o art. 12.

    § 1º O compartilhamento de que trata o caput deve abranger informações sobre
    incidentes relevantes recebidas de empresas prestadoras de serviços a
    supervisionadas.

    § 2º O compartilhamento deve garantir o sigilo das informações compartilhadas,
    ressalvada a hipótese de comunicação prevista no art. 12.
guidance:
  prose: |
    O art. 25 incentiva o compartilhamento de informacoes sobre incidentes
    ciberneticos entre supervisionadas, criando um ecossistema de defesa coletiva
    no mercado de seguros.

    **Objetivo do compartilhamento:**
    O mercado de seguros e interconectado (seguradoras, resseguradores, corretores,
    prestadores). Um ataque a uma entidade pode afetar outras. O compartilhamento
    permite:
    - Deteccao antecipada de ameacas que afetam o setor
    - Aprendizado coletivo com incidentes de pares
    - Melhoria de defesas baseada em inteligencia compartilhada
    - Resposta coordenada a ameacas setoriais

    **Abrangencia (ss 1):**
    O compartilhamento inclui informacoes de incidentes em prestadores de servicos:
    - Provedores de nuvem que atendem supervisionadas
    - Empresas de TI e outsourcing
    - Corretores com acesso a sistemas de seguradoras
    - Empresas de assistencia 24h

    **Sigilo (ss 2):**
    O compartilhamento deve preservar:
    - Dados de segurados e beneficiarios (nao compartilhar dados pessoais)
    - Informacoes proprietarias da supervisionada
    - Detalhes que possam comprometer investigacoes em curso
    - Identificacao da supervisionada afetada (quando nao for do interesse publico)

    **Mecanismos de compartilhamento:**
    - ISACs (Information Sharing and Analysis Centers) do setor financeiro
    - Grupos de trabalho setoriais (Federacao Nacional de Seguros)
    - Plataformas de threat intelligence compartilhadas
    - CERTs setoriais
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de compartilhamento:**
      1. Integracao com ISACs e CERTs do setor financeiro (ex: CAIS/RNP).
      2. Feed de threat intelligence compartilhado com indicadores de compromisso (IoCs).
      3. Plataforma MISP (Malware Information Sharing Platform) ou equivalente.
      4. Automacao de ingestao de IoCs compartilhados no SIEM e ferramentas de defesa.

      **Anonimizacao:**
      5. Pipeline de anonimizacao de dados antes do compartilhamento.
      6. Remocao automatica de dados de segurados e informacoes proprietarias.
      7. Classificacao automatica de informacoes compartilhaveis vs. confidenciais.
    tools:
      - threat-intelligence
      - misp
      - siem
      - data-anonymization
  devsecops:
    prose: |
      **Integracao de inteligencia no pipeline:**
      1. Feed de vulnerabilidades compartilhadas integrado ao SCA do pipeline.
      2. Alertas de supply chain threats compartilhadas pelo setor.
      3. Atualizacao automatica de regras de seguranca baseada em IoCs do setor.
    tools:
      - gitlab-dependency-scanning
      - threat-intelligence
      - gitlab-ci
  secops:
    prose: |
      **Programa de compartilhamento:**
      1. Participacao ativa em foruns e grupos de seguranca do setor segurador.
      2. Processo formalizado de compartilhamento: o que compartilhar, com quem,
         como, processo de aprovacao.
      3. Designacao de responsavel pelo compartilhamento de informacoes.
      4. Acordos de confidencialidade (NDA) com parceiros de compartilhamento.

      **Compartilhamento com prestadores (ss 1):**
      5. Clausula contratual exigindo que prestadores comuniquem incidentes.
      6. Processo de triagem de informacoes de prestadores antes do compartilhamento.
      7. Monitoramento de notificacoes de incidentes de provedores de nuvem.

      **Sigilo (ss 2):**
      8. Processo de revisao juridica antes de compartilhar informacoes sensveis.
      9. TLP (Traffic Light Protocol) para classificacao de informacoes compartilhadas.
      10. Auditoria de conformidade com sigilo no compartilhamento.
    tools:
      - threat-intelligence
      - grc-platform
      - misp
      - communication-platform
