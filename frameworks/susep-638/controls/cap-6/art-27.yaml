id: art-27
family: cap-6
title: "Informacoes para a SUSEP"
class: SUSEP-638
statement:
  prose: |
    Art. 27. A SUSEP poderá estabelecer requisitos adicionais para o compartilhamento
    de informações sobre incidentes relevantes, bem como solicitar informações e
    documentos adicionais às supervisionadas.
guidance:
  prose: |
    O art. 27 confere a SUSEP poder para estabelecer requisitos adicionais de
    compartilhamento e para solicitar informacoes complementares.

    **Poder normativo adicional:**
    A SUSEP pode, a qualquer momento, emitir normas complementares que:
    - Definam formatos padronizados de compartilhamento
    - Estabelecam prazos especificos para comunicacao
    - Exijam participacao em plataformas de compartilhamento
    - Definam metricas obrigatorias de reporte

    **Poder de solicitacao:**
    A SUSEP pode solicitar a qualquer supervisionada:
    - Informacoes detalhadas sobre incidentes ciberneticos
    - Documentacao de controles de seguranca implementados
    - Evidencias de conformidade com a Circular 638
    - Relatorios de auditoria interna de seguranca cibernetica
    - Planos de remediacao para vulnerabilidades identificadas

    **Implicacao pratica:**
    As supervisionadas devem estar preparadas para:
    - Responder a solicitacoes da SUSEP em prazo habil
    - Fornecer informacoes detalhadas e organizadas
    - Disponibilizar documentacao retida conforme art. 24
    - Demonstrar conformidade com todos os requisitos da circular

    **Relacao com Open Insurance:**
    O Open Insurance (Sistema de Seguros Aberto) aumenta a troca de dados
    no setor. A SUSEP pode estabelecer requisitos adicionais de seguranca
    cibernetica para o contexto de Open Insurance.
implementation_guidance:
  platform_engineering:
    prose: |
      **Preparacao para demandas da SUSEP:**
      1. Sistema de gestao de demandas regulatorias com SLA de resposta.
      2. Repositorio centralizado de evidencias de conformidade indexado por
         artigo da Circular 638.
      3. Capacidade de gerar relatorios sob demanda com informacoes consolidadas.
      4. APIs de extracao de dados de seguranca para atendimento a solicitacoes.

      **Automacao de reporte:**
      5. Templates de relatorio alinhados ao formato exigido pela SUSEP.
      6. Dashboards exportaveis para evidencia de conformidade.
      7. Pipeline automatizado de geracao de relatorios periodicos.
    tools:
      - grc-platform
      - compliance-scanner
      - dashboard-platform
      - document-management
  devsecops:
    prose: |
      **Evidencias de pipeline para SUSEP:**
      1. Relatorios de seguranca de pipeline exportaveis e formatados.
      2. Metricas de seguranca de desenvolvimento disponveis para solicitacao.
      3. Historico de vulnerabilidades e remediacao acessivel.
    tools:
      - gitlab-ci
      - defectdojo
      - compliance-scanner
  secops:
    prose: |
      **Processo de atendimento a SUSEP:**
      1. Processo formal de atendimento a solicitacoes da SUSEP com SLA definido.
      2. Equipe responsavel por interface com a SUSEP (compliance + seguranca).
      3. Revisao juridica de respostas antes do envio.
      4. Registro de todas as solicitacoes e respostas.

      **Monitoramento regulatorio:**
      5. Acompanhamento de novas normas e circulares da SUSEP sobre seguranca.
      6. Participacao em consultas publicas da SUSEP sobre seguranca cibernetica.
      7. Avaliacao de impacto de novos requisitos regulatorios.
      8. Plano de adequacao a novos requisitos com cronograma.
    tools:
      - grc-platform
      - regulatory-monitoring
      - document-management
