id: art-10
family: cap-3
title: "Plano de Acao e de Resposta a Incidentes"
class: SUSEP-638
statement:
  prose: |
    Art. 10. As supervisionadas devem estabelecer plano de ação e de resposta a
    incidentes, abrangendo, no mínimo:
    I - as ações a serem desenvolvidas pela supervisionada para adequar suas
    estruturas organizacional e operacional à política de segurança cibernética;
    II - as rotinas, os procedimentos, os controles e as tecnologias a serem
    utilizados na prevenção e na resposta a incidentes, em conformidade com as
    diretrizes da política de segurança cibernética; e
    III - a designação da área responsável pelo registro e controle dos efeitos de
    incidentes relevantes nas atividades da supervisionada.
guidance:
  prose: |
    O art. 10 exige um plano formal de resposta a incidentes ciberneticos que seja
    operacional, testado e mantido atualizado.

    **Diferenca entre politica e plano:**
    A politica (art. 3) define principios; o plano de acao (art. 10) operacionaliza
    a resposta. O plano deve ser executavel por equipes tecnicas em situacao de crise.

    **Inciso I - Adequacao organizacional:**
    - CSIRT (Computer Security Incident Response Team) formalmente constituido
    - Papeis e responsabilidades de cada membro durante um incidente
    - Estrutura de escalonamento: analista -> coordenador -> CISO -> diretoria -> SUSEP
    - Capacitacao e treinamento especificos para a equipe de resposta

    **Inciso II - Rotinas e tecnologias de resposta:**
    Playbooks especificos para o mercado de seguros:
    - Vazamento de dados de segurados (CPF, dados de saude, dados financeiros)
    - Ransomware em sistemas core (apolices, sinistros, provisoes)
    - Fraude em processamento de sinistros via comprometimento de sistemas
    - Comprometimento de portal de cotacao online
    - Ataque a integracao com corretores ou resseguradores
    - Indisponibilidade de sistemas de atendimento de emergencia (assistencia 24h)

    **Inciso III - Area de registro:**
    Area formalmente designada com responsabilidade explicita para:
    - Registrar todos os incidentes ciberneticos
    - Avaliar a relevancia de cada incidente
    - Controlar os efeitos do incidente nas operacoes da supervisionada
    - Manter historico e base de conhecimento de incidentes

    **Especificidade do setor:**
    Incidentes em seguradoras podem ter impacto direto em segurados:
    - Indisponibilidade de assistencia 24h em situacao de emergencia
    - Incapacidade de processar sinistros em momento de necessidade do segurado
    - Vazamento de dados de saude com dano irreversivel ao segurado
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de resposta a incidentes:**
      1. SOAR (Security Orchestration, Automation and Response) com playbooks
         automatizados para incidentes comuns em seguros.
      2. War room virtual com ferramentas de colaboracao dedicadas para crise.
      3. Ambiente forense isolado para analise de artefatos sem contaminacao.
      4. Canais de comunicacao de emergencia independentes da infraestrutura principal.

      **Tecnologias de deteccao e resposta (inciso II):**
      5. SIEM com regras de correlacao para ameacas ao setor segurador.
      6. EDR/XDR com capacidade de contencao automatica (isolamento de endpoint).
      7. NDR (Network Detection and Response) para deteccao de movimentacao lateral.
      8. CASB para deteccao de acesso anomalo a dados de segurados em cloud.

      **Adequacao organizacional (inciso I):**
      9. Plataforma de gestao de incidentes com workflow definido por severidade.
      10. Integracao com sistema de comunicacao a SUSEP (art. 12).
      11. Dashboard de status de incidente para executivos e diretoria.
      12. Sistema de on-call rotation para equipe de resposta 24x7.
    tools:
      - soar
      - siem
      - edr-xdr
      - ndr
      - incident-management
      - war-room-tools
  devsecops:
    prose: |
      **Resposta a vulnerabilidades em producao:**
      1. Processo de hotfix de emergencia com pipeline expedito para vulnerabilidades
         criticas em sistemas de seguros.
      2. Rollback automatizado quando deploy introduz vulnerabilidade.
      3. Feature flags para desabilitar funcionalidades comprometidas sem downtime.
      4. Canary deployments para validar fixes antes de rollout completo.

      **Forense em pipeline:**
      5. Retencao de artefatos de build para analise forense pos-incidente.
      6. Logs imutaveis de pipeline com rastreabilidade de quem fez o que.
      7. Container image history para identificar quando vulnerabilidade foi introduzida.

      **Playbooks de resposta para desenvolvimento:**
      8. Procedimento para vazamento de segredos em repositorio.
      9. Procedimento para dependencia comprometida (supply chain attack).
      10. Procedimento para comprometimento de pipeline CI/CD.
    tools:
      - gitlab-ci
      - feature-flags
      - container-registry
      - artifact-registry
      - gitlab-secret-detection
  secops:
    prose: |
      **Plano de resposta operacional:**
      1. Playbooks detalhados para cada tipo de incidente em seguros:
         - Vazamento de dados de segurados: contencao, avaliacao de impacto,
           notificacao ANPD/SUSEP, comunicacao a segurados
         - Ransomware: isolamento, avaliacao de backup, decisao de recovery,
           comunicacao a SUSEP
         - Fraude em sinistros: preservacao de evidencias, envolvimento de
           area antifraude, comunicacao a autoridades
      2. Escalation matrix com SLAs por severidade.
      3. Comunicacao de crise: templates para SUSEP, segurados, imprensa.
      4. Coordenacao com CSIRT externo e forcas de seguranca quando necessario.

      **Registro e controle (inciso III):**
      5. Sistema de registro de incidentes com campos obrigatorios: tipo, severidade,
         dados afetados, segurados impactados, cronologia, acoes tomadas.
      6. Base de conhecimento de incidentes anteriores para consulta rapida.
      7. Metricas de incidentes para melhoria continua.
      8. Retencao de registros de incidentes por 5 anos.

      **Testes do plano:**
      9. Tabletop exercise trimestral com cenarios do mercado de seguros.
      10. Simulacao anual de incidente real (purple team exercise).
      11. Teste de comunicacao de crise (incluindo comunicacao a SUSEP).
      12. Revisao pos-exercicio com atualizacao de playbooks.
    tools:
      - soar
      - siem
      - incident-management
      - grc-platform
      - communication-platform
