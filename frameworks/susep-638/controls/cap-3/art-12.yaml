id: art-12
family: cap-3
title: "Comunicacao de Incidentes a SUSEP"
class: SUSEP-638
statement:
  prose: |
    Art. 12. As supervisionadas devem comunicar à SUSEP a ocorrência de incidentes
    relevantes e das interrupções dos serviços relevantes, no prazo máximo previsto
    na regulamentação vigente.

    § 1º A comunicação de que trata o caput deve conter, no mínimo:
    I - a descrição do incidente;
    II - os riscos e os impactos já identificados;
    III - as medidas já adotadas para o tratamento do incidente; e
    IV - a data e hora do incidente e a da comunicação.

    § 2º A SUSEP poderá exigir informações adicionais sobre os incidentes
    comunicados.
guidance:
  prose: |
    O art. 12 estabelece a obrigacao de comunicacao de incidentes relevantes a SUSEP,
    com requisitos minimos de conteudo e prazo.

    **Criterios de relevancia:**
    Um incidente deve ser comunicado quando:
    - Afeta dados pessoais de segurados ou beneficiarios
    - Compromete a disponibilidade de servicos essenciais (emissao de apolices,
      liquidacao de sinistros, atendimento de emergencia)
    - Compromete a integridade de calculos atuariais ou provisoes tecnicas
    - Gera impacto financeiro significativo na supervisionada
    - Afeta a reputacao da supervisionada ou do mercado segurador
    - Configura violacao de dados pessoais nos termos da LGPD

    **Conteudo minimo da comunicacao (ss 1):**
    I - Descricao: tipo de incidente, vetor de ataque, sistemas afetados,
        dados comprometidos
    II - Riscos e impactos: numero de segurados afetados, dados expostos,
         impacto financeiro estimado, risco de continuidade operacional
    III - Medidas adotadas: contencao realizada, acoes de remediacao em curso,
          comunicacao a segurados (se aplicavel)
    IV - Cronologia: quando o incidente ocorreu, quando foi detectado, quando
         esta sendo comunicado

    **Informacoes adicionais (ss 2):**
    A SUSEP pode solicitar detalhes complementares, incluindo:
    - Analise forense detalhada
    - Plano de remediacao completo
    - Evidencias de contencao
    - Comunicacao realizada a segurados afetados
    - Medidas para prevenir recorrencia

    **Coordenacao com LGPD:**
    Se o incidente envolve dados pessoais, a comunicacao a SUSEP nao substitui
    a notificacao a ANPD prevista no art. 48 da LGPD. Ambas devem ser feitas.
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao de deteccao e comunicacao:**
      1. SIEM com regras de deteccao de incidentes relevantes para o mercado segurador.
      2. Workflow automatizado: incidente detectado -> triagem -> classificacao de
         relevancia -> preparacao de comunicacao -> aprovacao -> envio a SUSEP.
      3. Templates de comunicacao a SUSEP pre-aprovados pela area juridica.
      4. Sistema de tracking de comunicacoes a SUSEP com prazos e status.

      **Monitoramento de servicos relevantes:**
      5. Monitoramento de disponibilidade de servicos criticos: cotacao, emissao,
         sinistros, assistencia 24h, portal do segurado.
      6. Alertas automaticos de interrupcao com classificacao de impacto.
      7. SLAs de servicos relevantes documentados e monitorados.

      **Evidencias e rastreabilidade:**
      8. Logs imutaveis de deteccao, triagem e resposta ao incidente.
      9. Timestamp preciso de todas as etapas (NTP sincronizado).
      10. Retencao de evidencias por minimo 5 anos.
    tools:
      - siem
      - soar
      - incident-management
      - monitoring-platform
      - audit-logging
  devsecops:
    prose: |
      **Deteccao antecipada no pipeline:**
      1. Alertas de seguranca em producao integrados ao processo de comunicacao.
      2. Deteccao de deploy malicioso ou comprometido em pipeline.
      3. Monitoring de aplicacoes em producao com alertas de anomalia.
      4. Integracao de alertas de vulnerabilidade critica com processo de incidente.

      **Suporte a investigacao:**
      5. Logs de aplicacao estruturados para facilitar analise forense.
      6. Distributed tracing para rastrear impacto de incidentes em microsservicos.
      7. Retencao de artefatos de build e deploy para analise pos-incidente.
    tools:
      - gitlab-ci
      - monitoring-platform
      - distributed-tracing
      - log-aggregation
  secops:
    prose: |
      **Processo de comunicacao a SUSEP:**
      1. Fluxo documentado de comunicacao: CSIRT -> CISO -> Juridico -> Diretoria
         -> SUSEP.
      2. SLA de comunicacao: incidente relevante deve ser comunicado dentro do prazo
         regulamentar (verificar regulamentacao vigente da SUSEP).
      3. Templates de comunicacao pre-aprovados com campos obrigatorios dos incisos I-IV.
      4. Processo de atualizacao: comunicacoes subsequentes conforme evolucao do incidente.

      **Classificacao de relevancia:**
      5. Criterios objetivos de relevancia documentados e aprovados pela diretoria:
         - Numero de segurados afetados (threshold definido)
         - Tipo de dados comprometidos (saude, financeiro, pessoal)
         - Impacto financeiro estimado (threshold definido)
         - Duracaro de interrupcao de servico (threshold definido)
      6. Flowchart de decisao para classificacao rapida de relevancia.

      **Coordenacao regulatoria:**
      7. Processo de comunicacao paralela: SUSEP + ANPD (LGPD) quando aplicavel.
      8. Coordenacao com area juridica para comunicacao a segurados afetados.
      9. Processo de comunicacao a resseguradores quando incidente afeta contratos.
      10. Retencao de todas as comunicacoes e evidencias por 5 anos.
    tools:
      - incident-management
      - grc-platform
      - soar
      - communication-platform
