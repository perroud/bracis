id: art-13
family: cap-3
title: "Relatorio Anual sobre Incidentes"
class: SUSEP-638
statement:
  prose: |
    Art. 13. As supervisionadas devem elaborar relatório anual sobre a implementação
    do plano de ação e de resposta a incidentes, com data-base de 31 de dezembro,
    contendo:
    I - a efetividade da implementação das ações previstas no plano;
    II - o resumo dos resultados obtidos na implementação dos procedimentos e controles
    previstos no plano;
    III - os incidentes relevantes ocorridos no período; e
    IV - os resultados dos testes de continuidade de negócios, considerando cenários
    de incidentes.
guidance:
  prose: |
    O art. 13 exige um relatorio anual formal que consolide o status de implementacao
    do plano e os incidentes ocorridos durante o ano.

    **Caracteristicas do relatorio:**
    - Data-base: 31 de dezembro de cada ano
    - Periodicidade: anual
    - Destinatarios: diretoria, conselho de administracao, SUSEP (se solicitado)
    - Retencao: minimo 5 anos

    **Inciso I - Efetividade da implementacao:**
    Avaliacao de quao efetivas foram as acoes previstas no plano:
    - Status de cada acao: implementada, em andamento, nao iniciada
    - Percentual de conclusao do plano de acao
    - Justificativas para acoes nao concluidas
    - Plano revisado para o ano seguinte

    **Inciso II - Resultados dos procedimentos e controles:**
    Dados quantitativos e qualitativos sobre os controles:
    - Metricas de seguranca: MTTD, MTTR, vulnerabilidades encontradas/corrigidas
    - Resultados de auditorias e assessments de seguranca
    - Resultados de testes de penetracao
    - Evolucao da maturidade de seguranca cibernetica

    **Inciso III - Incidentes relevantes:**
    Consolidacao de todos os incidentes relevantes do periodo:
    - Numero total de incidentes por tipo e severidade
    - Impacto em segurados e operacoes
    - Acoes tomadas e resultados obtidos
    - Licoes aprendidas e melhorias implementadas

    **Inciso IV - Testes de continuidade:**
    Resultados dos testes de BCP/DRP com cenarios ciberneticos:
    - Cenarios testados (ransomware, DDoS, vazamento de dados)
    - Resultados: RPO/RTO atingidos vs. planejados
    - Gaps identificados e plano de correcao
    - Participacao de areas de negocio nos testes
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao de geracao de relatorio:**
      1. Pipeline automatizado de coleta de dados para o relatorio anual:
         metricas de SIEM, vulnerability scanner, compliance scanner.
      2. Dashboard consolidado com todos os indicadores exigidos nos incisos I-IV.
      3. Templates de relatorio com campos pre-preenchidos por dados automatizados.
      4. Workflow de aprovacao do relatorio: CISO -> Diretoria -> Conselho.

      **Coleta automatica de metricas (inciso II):**
      5. Metricas de controles de seguranca extraidas automaticamente de ferramentas.
      6. Trending anual de indicadores-chave de seguranca.
      7. Comparativo ano-a-ano para demonstrar evolucao.

      **Registros de incidentes (inciso III):**
      8. Sistema de gestao de incidentes com exportacao de dados para relatorio.
      9. Classificacao padronizada de incidentes para comparabilidade ano-a-ano.
      10. Anonimizacao de dados quando necessario para distribuicao do relatorio.
    tools:
      - grc-platform
      - siem
      - compliance-scanner
      - dashboard-platform
      - document-management
  devsecops:
    prose: |
      **Metricas de pipeline para o relatorio (inciso II):**
      1. Dados de vulnerabilidades encontradas/corrigidas por SAST, DAST, SCA.
      2. Evolucao do compliance score dos repositorios ao longo do ano.
      3. Metricas de tempo de correcao de vulnerabilidades.
      4. Taxa de bloqueio de deploys por falha de seguranca.

      **Evidencias de implementacao (inciso I):**
      5. Historico de ativacao de security gates no pipeline.
      6. Evolucao da cobertura de scans de seguranca.
      7. Adocao de praticas de seguranca por equipe de desenvolvimento.
    tools:
      - gitlab-ci
      - defectdojo
      - dashboard-platform
      - compliance-scanner
  secops:
    prose: |
      **Elaboracao do relatorio anual:**
      1. Calendario de preparacao do relatorio: coleta de dados (novembro),
         consolidacao (dezembro), revisao (janeiro), aprovacao (fevereiro).
      2. Coordenacao com todas as areas: TI, seguranca, compliance, negocio,
         atuarial, sinistros.
      3. Revisao por auditoria interna antes de apresentacao ao conselho.

      **Efetividade das acoes (inciso I):**
      4. Status de cada item do plano de acao com evidencias de implementacao.
      5. Analise de desvios: por que itens nao foram implementados, impacto.
      6. Plano revisado para o ano seguinte com priorizacao baseada em risco.

      **Incidentes relevantes (inciso III):**
      7. Consolidacao de incidentes com analise de tendencias.
      8. Impacto cumulativo em segurados: numero de afetados, tipo de dados.
      9. Efetividade da resposta: tempo de deteccao, contencao, recuperacao.
      10. Licoes aprendidas consolidadas.

      **Testes de continuidade (inciso IV):**
      11. Relatorio de cada teste realizado: cenario, participantes, resultados.
      12. Analise de RPO/RTO atingidos vs. exigidos para sistemas core de seguros.
      13. Gaps identificados e status de correcao.
      14. Plano de testes para o ano seguinte.
    tools:
      - grc-platform
      - incident-management
      - compliance-scanner
      - document-management
