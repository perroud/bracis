id: art-11
family: cap-3
title: "Cenarios de Incidentes em Testes de Continuidade"
class: SUSEP-638
statement:
  prose: |
    Art. 11. As supervisionadas devem instituir mecanismos de acompanhamento e de
    controle com vistas a assegurar a implementação e a efetividade da política de
    segurança cibernética e do plano de ação e de resposta a incidentes.
guidance:
  prose: |
    O art. 11 exige mecanismos formais de monitoramento e controle que garantam
    que tanto a politica quanto o plano de resposta a incidentes estejam efetivamente
    implementados e funcionando.

    **Mecanismos de acompanhamento:**
    Nao basta ter politica e plano documentados. A supervisionada deve comprovar que:
    - Os controles previstos na politica estao efetivamente operacionais
    - O plano de resposta a incidentes funciona na pratica (testado)
    - Desvios entre o previsto e o implementado sao detectados e corrigidos
    - A efetividade dos controles e medida continuamente

    **Diferenca entre implementacao e efetividade:**
    - Implementacao: o controle existe e esta ativo (ex: SIEM esta instalado)
    - Efetividade: o controle atinge seu objetivo (ex: SIEM detecta incidentes
      reais em tempo adequado)

    **Para seguradoras:**
    Mecanismos de acompanhamento devem cobrir toda a cadeia operacional:
    - Sistemas de cotacao e emissao online
    - Processamento de sinistros
    - Calculo de provisoes tecnicas
    - Integracao com corretores e resseguradores
    - Portal de autoatendimento do segurado
    - Sistemas de assistencia 24h

    **Indicadores de efetividade:**
    - Percentual de controles implementados vs. planejados
    - Tempo medio de deteccao de incidentes (MTTD)
    - Tempo medio de resposta a incidentes (MTTR)
    - Resultados de testes de penetracao e auditorias
    - Numero e impacto de incidentes ciberneticos
    - Cobertura de patching e gestao de vulnerabilidades
implementation_guidance:
  platform_engineering:
    prose: |
      **Monitoramento automatizado de controles:**
      1. Compliance-as-Code com verificacao continua de todos os controles da
         Circular 638.
      2. Dashboard de conformidade em tempo real com status de cada artigo.
      3. Alertas automaticos quando controles se tornam inoperantes ou degradados.
      4. Drift detection para identificar desvios de configuracao de seguranca.

      **Metricas de efetividade:**
      5. SLIs (Service Level Indicators) de seguranca para cada sistema core.
      6. Uptime de controles de seguranca (WAF, IDS, SIEM, EDR) monitorado.
      7. Latencia de deteccao de ameacas medida e rastreada.
      8. Cobertura de scans de vulnerabilidade por sistema.

      **Acompanhamento do plano de acao:**
      9. Tracking de implementacao de itens do plano de acao com progresso.
      10. Alertas de itens atrasados ou em risco.
      11. Relatorio executivo mensal de progresso.
    tools:
      - compliance-scanner
      - monitoring-platform
      - dashboard-platform
      - grc-platform
  devsecops:
    prose: |
      **Verificacao de efetividade no pipeline:**
      1. Metricas de pipeline de seguranca: taxa de bloqueio, tempo de correcao,
         vulnerabilidades encontradas vs. corrigidas.
      2. Quality gates que medem nao apenas presenca, mas efetividade de controles.
      3. Trending de vulnerabilidades: se o numero esta diminuindo ao longo do tempo.
      4. Compliance score por repositorio e por equipe.

      **Testes de efetividade:**
      5. Testes automatizados que validam que controles de seguranca estao ativos.
      6. Smoke tests de seguranca apos cada deploy em producao.
      7. Verificacao de que policies estao sendo enforced (nao apenas configuradas).
    tools:
      - gitlab-ci
      - compliance-scanner
      - defectdojo
      - dashboard-platform
  secops:
    prose: |
      **Programa de acompanhamento:**
      1. Assessment trimestral de conformidade com a Circular 638.
      2. Relatorio mensal de efetividade dos controles para a diretoria.
      3. Revisao semestral do plano de resposta a incidentes.
      4. Auditoria interna anual da implementacao da politica.

      **Indicadores-chave de desempenho:**
      5. Scorecard de seguranca cibernetica com KPIs por controle:
         - Controles do art. 6: autenticacao, criptografia, IDS, DLP, etc.
         - Plano de resposta: MTTD, MTTR, exercicios realizados
         - Gestao de vulnerabilidades: tempo de remediacao, cobertura
      6. Benchmark com pares do mercado quando disponivel.
      7. Tendencia de maturidade de seguranca ao longo do tempo.

      **Evidencias para SUSEP:**
      8. Documentacao de mecanismos de acompanhamento implementados.
      9. Relatorios de efetividade com evidencias de medicao.
      10. Registros de acoes corretivas tomadas quando desvios foram detectados.
    tools:
      - grc-platform
      - siem
      - compliance-scanner
      - vulnerability-scanner
