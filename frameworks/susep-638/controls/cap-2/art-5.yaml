id: art-5
family: cap-2
title: "Plano de Acao para Implementacao da Politica"
class: SUSEP-638
statement:
  prose: |
    Art. 5. As supervisionadas devem elaborar plano de ação para a implementação
    da política de segurança cibernética.

    § 1º O plano de ação mencionado no caput deve contemplar, no mínimo:
    I - as ações a serem desenvolvidas pela supervisionada para adequar suas
    estruturas organizacional e operacional aos princípios e às diretrizes da
    política de segurança cibernética;
    II - as rotinas, os procedimentos, os controles e as tecnologias a serem
    utilizados na prevenção e na resposta a incidentes, em conformidade com as
    diretrizes da política de segurança cibernética; e
    III - a área responsável pelo registro e controle dos efeitos de incidentes
    relevantes.
guidance:
  prose: |
    O art. 5 exige um plano de acao formal que transforme a politica (documento
    estrategico) em acoes concretas de implementacao.

    **Diferenca entre politica e plano:**
    - Politica (art. 3-4): o que deve ser feito e por que (principios e diretrizes)
    - Plano de acao (art. 5): como, quando e por quem sera implementado

    **Inciso I - Adequacao organizacional:**
    O plano deve detalhar como a supervisionada vai se organizar para cumprir a
    politica. Isso inclui:
    - Criacao ou fortalecimento de area de seguranca cibernetica
    - Contratacao de profissionais especializados
    - Reestruturacao de equipes de TI para incluir funcoes de seguranca
    - Definicao de papeis e responsabilidades especificos

    **Inciso II - Rotinas e tecnologias:**
    Descricao detalhada de:
    - Procedimentos operacionais padrao (SOPs) para seguranca cibernetica
    - Tecnologias a serem adquiridas ou implementadas (SIEM, EDR, WAF, etc.)
    - Controles a serem implementados por sistema e por risco
    - Cronograma de implementacao com marcos e responsaveis

    **Inciso III - Area de registro de incidentes:**
    Definicao explicita de qual area sera responsavel por:
    - Registrar todos os incidentes ciberneticos
    - Controlar os efeitos dos incidentes relevantes
    - Realizar analise de impacto e causa raiz
    - Comunicar a SUSEP quando necessario (art. 12)

    **Especificidade para seguradoras:**
    O plano de acao deve considerar a cadeia de valor do seguro:
    - Protecao de canais de venda digitais (cotacao online, apps)
    - Seguranca de integracao com corretores e parceiros
    - Protecao de sistemas de liquidacao de sinistros
    - Seguranca de portais de autoatendimento do segurado
implementation_guidance:
  platform_engineering:
    prose: |
      **Plano de implementacao tecnologica:**
      1. Roadmap de seguranca cibernetica com fases, marcos e dependencias para
         cada sistema core de seguros.
      2. Architecture Decision Records (ADRs) para cada decisao de seguranca.
      3. POCs (Proof of Concept) para tecnologias candidatas antes de aquisicao.
      4. Automacao de deployment de controles de seguranca via IaC.

      **Adequacao organizacional (inciso I):**
      5. Infraestrutura para Security Operations Center (SOC) com capacidade
         de monitoramento de sistemas de seguros.
      6. Plataforma de orquestracao de seguranca (SOAR) para automacao de resposta.
      7. Ferramentas de colaboracao para equipe de seguranca cibernetica.

      **Rotinas e tecnologias (inciso II):**
      8. SIEM com ingestao de logs de todos os sistemas core de seguros.
      9. EDR/XDR em endpoints que acessam sistemas de seguros.
      10. WAF para portais de cotacao, area do segurado e APIs de integracao.
      11. CSPM para monitoramento de postura de seguranca em nuvem.
      12. Vulnerability management automatizado com SLA de remediacao por criticidade.

      **Registro de incidentes (inciso III):**
      13. Plataforma de gestao de incidentes com workflow automatizado.
      14. Dashboard de incidentes com visao executiva para diretoria.
      15. Integracao entre gestao de incidentes e comunicacao a SUSEP.
    tools:
      - siem
      - soar
      - edr-xdr
      - waf
      - cspm
      - vulnerability-scanner
      - incident-management
  devsecops:
    prose: |
      **Implementacao de seguranca no SDLC (inciso II):**
      1. Phased rollout de security gates no pipeline: fase 1 (advisory), fase 2
         (soft block), fase 3 (hard block).
      2. Treinamento de desenvolvedores em secure coding para sistemas de seguros.
      3. Integracao gradual de ferramentas: SAST -> SCA -> DAST -> container scanning.
      4. Metricas de adocao e efetividade por squad.

      **Adequacao de equipes de desenvolvimento (inciso I):**
      5. Security champions designados em cada squad de desenvolvimento de seguros.
      6. Processo de security review para features que tratam dados de segurados.
      7. Runbooks de resposta a vulnerabilidades criticas em producao.

      **Automacao de controles (inciso II):**
      8. Policy-as-code para enforcement automatico de controles de seguranca.
      9. Compliance pipelines que validam conformidade com a Circular 638.
      10. Auto-remediation para vulnerabilidades conhecidas em dependencias.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dependency-scanning
      - gitlab-secret-detection
      - semgrep
      - defectdojo
  secops:
    prose: |
      **Gestao do plano de acao:**
      1. Acompanhamento do plano de acao com relatorio mensal a diretoria.
      2. KPIs de implementacao: percentual de controles implementados por capitulo
         da Circular 638.
      3. Risk register atualizado com status de mitigacao.
      4. Evidencias de implementacao organizadas para auditoria da SUSEP.

      **Area de registro de incidentes (inciso III):**
      5. CSIRT (Computer Security Incident Response Team) formalmente constituido
         com conhecimento do mercado de seguros.
      6. Processo de escalacao definido: analista -> coordenador -> CISO -> diretoria.
      7. SLAs de resposta por nivel de severidade e tipo de incidente.
      8. Repositorio de incidentes com historico, causa raiz e licoes aprendidas.

      **Operacionalizacao de rotinas (inciso II):**
      9. SOPs (Standard Operating Procedures) documentados para cada controle.
      10. Calendario de atividades recorrentes: scans, testes, revisoes, auditorias.
      11. Exercicios de table-top para cenarios de incidentes em seguros.
    tools:
      - grc-platform
      - incident-management
      - soar
      - vulnerability-scanner
      - risk-register
