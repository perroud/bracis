id: art-9
family: cap-2
title: "Revisao da Politica de Seguranca Cibernetica"
class: SUSEP-638
statement:
  prose: |
    Art. 9. A política de segurança cibernética deve ser revisada, no mínimo,
    anualmente.

    Parágrafo único. A revisão mencionada no caput deve contemplar, no mínimo:
    I - a adequação da política frente a novas ameaças cibernéticas e às evoluções
    tecnológicas;
    II - a adequação da política frente a alterações na regulamentação vigente; e
    III - os resultados obtidos com a implementação das ações e procedimentos
    previstos na política.
guidance:
  prose: |
    O art. 9 estabelece a obrigatoriedade de revisao anual da politica de seguranca
    cibernetica, com criterios especificos para a revisao.

    **Frequencia minima:**
    A revisao deve ocorrer no minimo anualmente. Eventos extraordinarios podem
    demandar revisao antecipada:
    - Incidente cibernetico relevante na supervisionada ou no mercado
    - Mudanca significativa no cenario de ameacas ao setor de seguros
    - Alteracao regulatoria pela SUSEP ou CNSP
    - Fusao, aquisicao ou mudanca significativa no modelo de negocio

    **Inciso I - Novas ameacas e evolucoes tecnologicas:**
    O mercado de seguros enfrenta ameacas especificas em evolucao:
    - Ataques direcionados a dados de saude de segurados (alto valor no mercado negro)
    - Fraudes ciberneticas em processamento de sinistros
    - Ataques a plataformas de seguro digital (insurtechs)
    - Deepfakes em processos de sinistro (fraude de identidade)
    - Ataques a IoT/telematica em seguros de auto e saude

    **Inciso II - Alteracoes regulatorias:**
    O ambiente regulatorio do setor de seguros e dinamico:
    - Novas circulares da SUSEP
    - Resolucoes do CNSP
    - Alteracoes na LGPD e regulamentacao da ANPD
    - Normas internacionais (IAIS, Solvency II)
    - Requisitos de compartilhamento de dados (Open Insurance)

    **Inciso III - Resultados da implementacao:**
    Avaliacao da efetividade dos controles implementados:
    - Metricas de incidentes (MTTD, MTTR, volume, impacto)
    - Resultados de testes de penetracao e auditorias
    - Gap analysis entre politica e implementacao real
    - Feedback de areas de negocio sobre efetividade dos controles
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao de revisao:**
      1. Calendario automatizado de revisao da politica com alertas antecipados
         (90 dias, 60 dias, 30 dias antes do vencimento).
      2. Dashboard de threat intelligence com ameacas relevantes ao mercado de seguros.
      3. Feed automatizado de alteracoes regulatorias da SUSEP e CNSP.
      4. Metricas automatizadas de efetividade dos controles para subsidiar a revisao.

      **Versionamento e historico:**
      5. Politica versionada em Git com diff entre versoes para auditoria.
      6. Changelog automatico com justificativas para cada alteracao.
      7. Aprovacao formal via merge request com assinatura digital.
      8. Historico de revisoes acessivel para auditoria da SUSEP.

      **Threat intelligence (inciso I):**
      9. Feeds de ameacas especificos do setor financeiro e segurador.
      10. Integracao com ISACs (Information Sharing and Analysis Centers).
      11. Monitoramento de CVEs relevantes para stack tecnologico da supervisionada.
      12. Alertas de novas tecnicas de ataque ao setor segurador.
    tools:
      - grc-platform
      - threat-intelligence
      - compliance-scanner
      - document-management
  devsecops:
    prose: |
      **Evolucao tecnologica no pipeline (inciso I):**
      1. Atualizacao periodica de ferramentas de seguranca no pipeline (SAST, DAST, SCA).
      2. Avaliacao de novas ferramentas e tecnicas de seguranca para o pipeline.
      3. Revisao de security gates conforme evolucao de ameacas.
      4. Benchmark de pipeline de seguranca com melhores praticas do setor.

      **Compliance regulatorio no pipeline (inciso II):**
      5. Atualizacao de regras de compliance-as-code quando regulamentacao muda.
      6. Testes automatizados de conformidade com requisitos atualizados.
      7. Notificacao a equipes de desenvolvimento sobre mudancas regulatorias.

      **Metricas de efetividade (inciso III):**
      8. Dashboard de vulnerabilidades: tendencias, SLA de correcao, reincidencia.
      9. Metricas de adocao de praticas de seguranca por equipe.
      10. Correlacao entre investimento em seguranca no pipeline e reducao de incidentes.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dast
      - defectdojo
      - compliance-scanner
  secops:
    prose: |
      **Processo de revisao anual:**
      1. Coordenacao da revisao anual pelo CISO com participacao de areas de negocio.
      2. Coleta de inputs: incidentes, auditorias, pen tests, regulatorios, ameacas.
      3. Avaliacao de efetividade dos controles existentes.
      4. Proposta de atualizacao da politica com justificativas.
      5. Aprovacao pela diretoria e/ou conselho de administracao.
      6. Comunicacao das alteracoes a todos os envolvidos (art. 8).

      **Analise de ameacas (inciso I):**
      7. Relatorio anual de ameacas ciberneticas ao setor de seguros.
      8. Analise de incidentes no mercado segurador nacional e internacional.
      9. Avaliacao de novas tecnicas de ataque relevantes para a supervisionada.
      10. Atualizacao de cenarios de risco cibernetico.

      **Resultados da implementacao (inciso III):**
      11. Relatorio de metricas de seguranca do ultimo ano.
      12. Resultados de auditorias internas e externas.
      13. Resultados de testes de penetracao e red team.
      14. Assessment de maturidade de seguranca (NIST CSF, CIS Controls).
    tools:
      - grc-platform
      - threat-intelligence
      - vulnerability-scanner
      - siem
      - compliance-scanner
