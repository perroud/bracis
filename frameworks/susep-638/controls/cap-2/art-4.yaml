id: art-4
family: cap-2
title: "Conteudo Minimo da Politica de Seguranca Cibernetica"
class: SUSEP-638
statement:
  prose: |
    Art. 4. A política de segurança cibernética deve contemplar, no mínimo:
    I - os objetivos de segurança cibernética da supervisionada;
    II - os procedimentos e controles adotados para reduzir a vulnerabilidade da
    supervisionada a incidentes e atender aos demais objetivos de segurança cibernética;
    III - os controles específicos, incluindo os voltados para a rastreabilidade da
    informação, que busquem garantir a segurança das informações sensíveis;
    IV - o registro, a análise da causa e do impacto, bem como o controle dos efeitos
    de incidentes relevantes para as atividades da supervisionada;
    V - as diretrizes para:
    a) a elaboração de cenários de incidentes considerados nos testes de continuidade
    de negócios;
    b) a definição de procedimentos e controles voltados à prevenção e ao tratamento
    dos incidentes a serem adotados por prestadores de serviços que manuseiem dados
    ou informações sensíveis ou que sejam relevantes para a condução das atividades
    operacionais da supervisionada;
    c) a classificação dos dados e das informações quanto à relevância; e
    d) a definição dos parâmetros a serem utilizados na avaliação da relevância dos
    incidentes;
    VI - os mecanismos para disseminação da cultura de segurança cibernética na
    supervisionada.
guidance:
  prose: |
    O art. 4 detalha o conteudo minimo obrigatorio que a politica de seguranca
    cibernetica deve conter. Cada inciso representa um requisito autonomo que deve
    estar presente no documento.

    **Inciso I - Objetivos:**
    A politica deve declarar objetivos especificos e mensuraveis de seguranca
    cibernetica, nao apenas genericos. Para seguradoras, os objetivos tipicamente incluem:
    - Protecao de dados de segurados e beneficiarios
    - Integridade de calculos atuariais e provisoes tecnicas
    - Disponibilidade de canais digitais de venda e atendimento
    - Resiliencia de sistemas de liquidacao de sinistros

    **Inciso II - Procedimentos e controles:**
    Descricao dos controles tecnicos e administrativos implementados, incluindo:
    - Controles de acesso a sistemas de seguros
    - Seguranca de aplicacoes de cotacao e emissao online
    - Protecao de APIs de integracao com corretores e parceiros

    **Inciso III - Rastreabilidade:**
    Controles especificos para garantir rastreabilidade de acesso a informacoes
    sensiveis do mercado segurador: dados de saude, dados financeiros, laudos
    periciais, documentos de sinistros.

    **Inciso IV - Registro de incidentes:**
    Processo formalizado para registro, analise de causa raiz e controle de
    impacto de incidentes ciberneticos. Critico para o setor por envolver
    dados pessoais sensiveis de segurados.

    **Inciso V - Diretrizes especificas:**
    a) Cenarios de incidentes para testes de continuidade: considerar ataques
       a sistemas de emissao de apolices, indisponibilidade de portais de
       sinistros, ransomware em bases atuariais
    b) Prestadores de servicos: corretores com acesso a sistemas, peritos,
       empresas de assistencia 24h, resseguradores
    c) Classificacao de dados: dados de saude (nivel maximo), dados financeiros,
       dados operacionais
    d) Parametros de relevancia: volume de segurados afetados, impacto financeiro,
       tipo de dados expostos

    **Inciso VI - Cultura de seguranca:**
    Programa de conscientizacao que abranja nao apenas funcionarios da
    supervisionada, mas tambem corretores, parceiros e prestadores de servicos.
implementation_guidance:
  platform_engineering:
    prose: |
      **Objetivos de seguranca (inciso I):**
      1. KPIs de seguranca cibernetica codificados em dashboards: MTTD, MTTR,
         numero de vulnerabilidades criticas, cobertura de patching.
      2. SLAs de seguranca por sistema: disponibilidade de 99.9% para cotacao online,
         RPO de 1h para sistemas de sinistros, RTO de 4h para emissao.
      3. Objetivos de seguranca vinculados a OKRs da supervisionada.

      **Controles tecnicos (inciso II):**
      4. WAF (Web Application Firewall) para portais de cotacao e area do segurado.
      5. API Gateway com rate limiting e autenticacao para integracao com corretores.
      6. Zero Trust Architecture para acesso a sistemas core de seguros.
      7. Microsegmentacao de rede entre sistemas de cotacao, emissao, sinistros e atuarial.

      **Rastreabilidade (inciso III):**
      8. Audit log centralizado e imutavel para todo acesso a dados de segurados.
      9. Data lineage para fluxos de dados entre sistemas (cotacao -> emissao -> sinistro).
      10. Monitoramento de acesso a dados sensiveis com alertas em tempo real.

      **Registro de incidentes (inciso IV):**
      11. Plataforma de gestao de incidentes integrada ao SIEM.
      12. Workflow automatizado: deteccao -> triagem -> resposta -> analise de causa raiz.
      13. Dashboards de incidentes com metricas de impacto por ramo de seguro.

      **Classificacao de dados (inciso V-c):**
      14. Sistema de classificacao automatica de dados: publico, interno, confidencial,
          restrito (dados de saude).
      15. Data Discovery automatizado para identificar dados sensiveis nao catalogados.
      16. Enforcement de politicas de acesso baseado na classificacao.
    tools:
      - waf
      - api-gateway
      - zero-trust-platform
      - siem
      - data-classification
      - audit-logging
      - network-policies
  devsecops:
    prose: |
      **Controles no pipeline (inciso II):**
      1. SAST obrigatorio em todo merge request para sistemas de seguros.
      2. DAST em ambientes de staging antes de deploy em producao.
      3. SCA (Software Composition Analysis) para dependencias de terceiros.
      4. Container scanning com bloqueio de imagens com vulnerabilidades criticas.

      **Rastreabilidade no desenvolvimento (inciso III):**
      5. Commit signing obrigatorio para alteracoes em sistemas core de seguros.
      6. Merge request com aprovacao de code owner para sistemas com dados de segurados.
      7. Audit trail de todas as alteracoes em IaC que afetam seguranca.

      **Cultura de seguranca (inciso VI):**
      8. Treinamento obrigatorio de secure coding para desenvolvedores de seguros.
      9. Security champions program com metricas de adocao.
      10. Gamificacao de seguranca: bug bounty interno, CTF events.
      11. Newsletter mensal de seguranca com ameacas relevantes ao setor segurador.
    tools:
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - gitlab-container-scanning
      - gitlab-secret-detection
      - semgrep
      - trivy
  secops:
    prose: |
      **Monitoramento (incisos II e III):**
      1. SIEM com use cases especificos do mercado de seguros: acesso anomalo a
         dados de segurados, alteracao de valores de sinistros, exportacao massiva
         de dados de apolices.
      2. UEBA (User and Entity Behavior Analytics) para detectar insider threats
         em sistemas de seguros.
      3. DLP monitorando exfiltracao de dados de segurados por email, cloud storage
         ou USB.

      **Gestao de incidentes (inciso IV):**
      4. Processo de gestao de incidentes documentado e testado trimestralmente.
      5. Equipe de resposta a incidentes com conhecimento do mercado de seguros.
      6. Playbooks especificos: vazamento de dados de segurados, ransomware em
         sistemas atuariais, comprometimento de portal de cotacao.
      7. Post-incident review com analise de causa raiz e licoes aprendidas.

      **Continuidade de negocios (inciso V-a):**
      8. Cenarios de incidentes ciberneticos para testes de BCP/DRP:
         - Ransomware em sistemas core de seguros
         - DDoS em portal de cotacao online
         - Comprometimento de bases atuariais
         - Vazamento massivo de dados de segurados
      9. Testes de continuidade semestrais com cenarios ciberneticos.

      **Cultura de seguranca (inciso VI):**
      10. Programa de conscientizacao com phishing simulations.
      11. Treinamento especifico para areas de negocio: subscricao, sinistros, atuarial.
      12. Metricas de maturidade da cultura de seguranca.
    tools:
      - siem
      - ueba
      - dlp
      - soar
      - grc-platform
      - phishing-simulation
