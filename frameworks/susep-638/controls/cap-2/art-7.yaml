id: art-7
family: cap-2
title: "Tratamento de Incidentes Relevantes"
class: SUSEP-638
statement:
  prose: |
    Art. 7. Os procedimentos e controles de que trata o art. 4, inciso IV, devem
    contemplar, no mínimo:
    I - a definição de processos, testes e trilhas de auditoria;
    II - a definição de métricas e indicadores adequados; e
    III - a identificação e a correção de eventuais deficiências.
guidance:
  prose: |
    O art. 7 detalha os requisitos para o tratamento de incidentes relevantes
    mencionados no art. 4, inciso IV. O foco esta na qualidade do processo de
    gestao de incidentes, nao apenas na capacidade de resposta.

    **Inciso I - Processos, testes e trilhas de auditoria:**
    A supervisionada deve ter:
    - Processo formal de gestao de incidentes com etapas definidas (deteccao,
      triagem, contencao, erradicacao, recuperacao, post-mortem)
    - Testes periodicos do processo (tabletop exercises, simulacoes)
    - Trilhas de auditoria que registrem todas as acoes tomadas durante um
      incidente, com timestamps e responsaveis

    **Inciso II - Metricas e indicadores:**
    KPIs mensuraveis para avaliar a efetividade da gestao de incidentes:
    - MTTD (Mean Time To Detect): tempo medio de deteccao
    - MTTR (Mean Time To Respond): tempo medio de resposta
    - MTTC (Mean Time To Contain): tempo medio de contencao
    - Numero de incidentes por severidade e tipo
    - Percentual de incidentes com analise de causa raiz concluida
    - Impacto financeiro e operacional por incidente

    **Inciso III - Identificacao e correcao de deficiencias:**
    Processo de melhoria continua:
    - Revisao pos-incidente (post-mortem/lessons learned)
    - Identificacao de gaps nos controles de seguranca
    - Plano de remediacao com cronograma e responsaveis
    - Validacao de que a correcao foi efetiva

    **Relevancia para seguradoras:**
    Incidentes no mercado de seguros podem afetar:
    - Dados de saude de segurados (dano reputacional severo)
    - Integridade de calculo de sinistros (risco financeiro)
    - Disponibilidade de atendimento em emergencias (risco vital)
    - Confianca do mercado na seguradora (risco de carteira)
implementation_guidance:
  platform_engineering:
    prose: |
      **Processos automatizados (inciso I):**
      1. Plataforma SOAR (Security Orchestration, Automation and Response) com
         playbooks automatizados para tipos comuns de incidentes em seguros.
      2. Integracao SIEM -> SOAR -> ticketing para workflow automatizado.
      3. Trilha de auditoria imutavel em storage WORM para todas as acoes de resposta.
      4. Ambiente de teste isolado para simulacao de incidentes sem impacto em producao.

      **Metricas automatizadas (inciso II):**
      5. Dashboard de metricas de incidentes em tempo real: MTTD, MTTR, MTTC.
      6. Trending de incidentes por tipo, severidade e sistema afetado.
      7. Alertas de degradacao de metricas (ex: MTTR aumentando).
      8. Relatorios automatizados para diretoria e SUSEP.

      **Correcao de deficiencias (inciso III):**
      9. Integracao de findings de post-mortem com backlog de seguranca.
      10. Automacao de remediacao para deficiencias recorrentes.
      11. Validation pipeline que verifica correcoes implementadas.
    tools:
      - soar
      - siem
      - incident-management
      - audit-logging
      - dashboard-platform
  devsecops:
    prose: |
      **Testes e trilhas de auditoria (inciso I):**
      1. Pipeline de testes de seguranca que simula cenarios de incidente.
      2. Chaos engineering com cenarios de seguranca: falha de autenticacao,
         indisponibilidade de WAF, comprometimento de container.
      3. Audit trail de pipeline com retencao para evidencia de conformidade.

      **Metricas de seguranca no pipeline (inciso II):**
      4. Metricas de vulnerabilidades por release: criticas abertas, SLA de fix.
      5. Dashboard DevSecOps com indicadores de seguranca por equipe/sistema.
      6. Trending de vulnerabilidades ao longo do tempo por tipo e severidade.

      **Correcao de deficiencias (inciso III):**
      7. Integracao de findings de incidentes com backlog de desenvolvimento.
      8. Priorizacao de fixes de seguranca baseada em risco ao segurado.
      9. Regression tests para garantir que vulnerabilidades corrigidas nao retornem.
    tools:
      - gitlab-ci
      - defectdojo
      - chaos-engineering
      - gitlab-sast
      - gitlab-dast
  secops:
    prose: |
      **Processo de gestao de incidentes (inciso I):**
      1. Playbooks de resposta para tipos de incidentes comuns em seguros:
         - Vazamento de dados de segurados
         - Ransomware em sistemas core
         - Fraude em processamento de sinistros
         - Comprometimento de portal de cotacao
         - Ataque a sistemas atuariais
      2. Testes trimestrais de tabletop exercise com cenarios do mercado segurador.
      3. Simulacao anual de incidente real (red team / blue team).
      4. Trilha de auditoria completa de cada incidente: timeline, acoes, decisoes.

      **Metricas e indicadores (inciso II):**
      5. Dashboard executivo com KPIs de incidentes: MTTD < 4h, MTTR < 24h.
      6. Relatorio mensal de incidentes para diretoria com analise de tendencias.
      7. Benchmark de metricas com pares do mercado de seguros.
      8. Metricas de maturidade do processo de gestao de incidentes.

      **Melhoria continua (inciso III):**
      9. Post-mortem obrigatorio para incidentes de severidade alta e critica.
      10. Registro de licoes aprendidas e difusao para toda a organizacao.
      11. Revisao trimestral de playbooks com base em incidentes recentes.
      12. Assessment anual de maturidade de resposta a incidentes.
    tools:
      - soar
      - siem
      - incident-management
      - grc-platform
      - red-team-tools
