id: art-8
family: cap-2
title: "Divulgacao da Politica"
class: SUSEP-638
statement:
  prose: |
    Art. 8. A política de segurança cibernética deve ser divulgada aos funcionários
    da supervisionada e às empresas prestadoras de serviços a supervisionadas,
    mediante linguagem clara, acessível e em nível de detalhe compatível com as
    funções desempenhadas e com a sensibilidade das informações de que disponham.
guidance:
  prose: |
    O art. 8 exige que a politica de seguranca cibernetica nao seja apenas um
    documento tecnico arquivado. Deve ser efetivamente divulgada e comunicada a
    todos os envolvidos.

    **Publicos-alvo:**
    1. Funcionarios da supervisionada: todos os niveis hierarquicos, desde a
       diretoria ate o operacional
    2. Prestadores de servicos: inclui corretores de seguros, empresas de
       assistencia 24h, peritos, reguladores de sinistros, empresas de TI,
       provedores de nuvem, empresas de cobranca

    **Principios de comunicacao:**
    - Linguagem clara: sem jargao tecnico excessivo para areas de negocio
    - Acessivel: disponivel em formatos e canais que todos possam acessar
    - Nivel de detalhe compativel: um desenvolvedor precisa ver controles
      tecnicos; um corretor precisa ver regras de manuseio de dados de
      segurados; um executivo precisa ver governanca e riscos

    **Especificidade para o mercado de seguros:**
    A cadeia de valor do seguro envolve muitos terceiros:
    - Corretores de seguros que acessam sistemas da seguradora
    - Empresas de assistencia que recebem dados de segurados
    - Peritos que acessam informacoes de sinistros
    - Oficinas e hospitais da rede credenciada
    - Resseguradores que recebem dados de carteira

    Cada um desses publicos precisa receber versao adequada da politica.

    **Diferenca pratica:**
    Nao basta enviar PDF da politica por email. A divulgacao deve ser:
    - Registrada (evidencia de que foi comunicada)
    - Compreendida (validacao de entendimento)
    - Atualizada (recomunicacao quando houver alteracoes)
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de divulgacao:**
      1. Portal interno de politicas de seguranca com controle de acesso por perfil.
      2. Versionamento de politicas com notificacao automatica de atualizacoes.
      3. Visualizacoes diferenciadas por publico-alvo: tecnico, negocio, executivo.
      4. Registro automatico de acesso e leitura da politica.

      **Integracao com prestadores:**
      5. Portal de terceiros com acesso restrito a politicas relevantes.
      6. APIs de integracao para distribucao de politicas a corretores.
      7. Aceitacao digital (e-signature) de termos de seguranca cibernetica.

      **Automacao de conformidade:**
      8. Alertas para funcionarios e prestadores que nao acessaram a politica.
      9. Bloqueio de acesso a sistemas para quem nao leu a politica atualizada.
      10. Dashboard de cobertura: percentual de funcionarios e prestadores que
          leram a politica vigente.
    tools:
      - document-management
      - identity-provider
      - lms-platform
      - compliance-scanner
  devsecops:
    prose: |
      **Politica acessivel aos desenvolvedores:**
      1. Politica de seguranca cibernetica disponivel no repositorio Git (versao tecnica).
      2. Security coding guidelines derivadas da politica em wiki/docs do projeto.
      3. Pre-commit hooks que referenciam a politica em mensagens de orientacao.
      4. Onboarding de desenvolvedores com sessao de seguranca cibernetica.

      **Nivel de detalhe tecnico:**
      5. Checklist de seguranca por tecnologia derivado da politica.
      6. Exemplos de codigo seguro e inseguro para contexto de seguros.
      7. Documentacao de padroes de seguranca em ADRs (Architecture Decision Records).
    tools:
      - gitlab-wiki
      - document-management
      - lms-platform
  secops:
    prose: |
      **Programa de divulgacao:**
      1. Plano anual de comunicacao da politica com calendario de acoes.
      2. Treinamento obrigatorio de seguranca cibernetica para todos os funcionarios.
      3. Treinamento especifico por area: TI, sinistros, subscricao, atuarial.
      4. Avaliacao de compreensao apos treinamento (quiz, teste pratico).

      **Gestao de prestadores:**
      5. Inclusao de clausula de ciencia da politica em todos os contratos.
      6. Treinamento de seguranca para corretores com acesso a sistemas.
      7. Comunicacao de atualizacoes da politica a todos os prestadores.
      8. Verificacao periodica de conformidade dos prestadores.

      **Evidencias de divulgacao:**
      9. Registro de treinamentos realizados com lista de presenca.
      10. Confirmacao de leitura digital da politica por todos os envolvidos.
      11. Metricas de divulgacao: cobertura, frequencia, compreensao.
      12. Retencao de evidencias por 5 anos para auditoria da SUSEP.
    tools:
      - lms-platform
      - grc-platform
      - phishing-simulation
      - document-management
