id: art-3
family: cap-2
title: "Politica de Seguranca Cibernetica"
class: SUSEP-638
statement:
  prose: |
    Art. 3. As supervisionadas devem implementar e manter política de segurança
    cibernética formulada com base em princípios e diretrizes que busquem assegurar
    a confidencialidade, a integridade e a disponibilidade dos dados e dos sistemas
    de informação utilizados.

    § 1º A política mencionada no caput deve ser compatível com:
    I - o porte, o perfil de risco e o modelo de negócio da supervisionada;
    II - a natureza das operações e a complexidade dos produtos, serviços, atividades
    e processos da supervisionada; e
    III - a sensibilidade dos dados e das informações sob responsabilidade da
    supervisionada.

    § 2º Admite-se a adoção de política de segurança cibernética única por
    conglomerado ou grupo prudencial.
guidance:
  prose: |
    O art. 3 estabelece a obrigacao fundamental: toda supervisionada deve ter uma
    politica de seguranca cibernetica formal, implementada e mantida continuamente.

    **Triade CIA como base normativa:**
    A circular explicita os tres pilares classicos de seguranca da informacao:
    - Confidencialidade: protecao contra acesso nao autorizado a dados de segurados,
      informacoes atuariais, dados de sinistros e informacoes financeiras
    - Integridade: protecao contra alteracao nao autorizada de apolices, calculos
      atuariais, valores de provisoes e registros de sinistros
    - Disponibilidade: garantia de acesso a sistemas de cotacao, emissao, sinistros
      e atendimento ao segurado quando necessario

    **Proporcionalidade (ss 1):**
    A politica deve ser proporcional a tres fatores especificos do mercado segurador:
    1. Porte e perfil de risco: seguradora lider de mercado exige politica mais robusta
       do que seguradora de nicho com carteira reduzida
    2. Complexidade operacional: supervisionadas com produtos complexos (unit-linked,
       seguros parametricos, microsseguros digitais) precisam de cobertura mais ampla
    3. Sensibilidade dos dados: dados de saude de segurados, informacoes atuariais
       proprietarias e dados de sinistros exigem protecoes adicionais

    **Conglomerado prudencial (ss 2):**
    Conglomerados podem adotar politica unica cobrindo seguradora, EAPC e
    sociedade de capitalizacao, desde que todas as entidades estejam contempladas.

    **Manutencao continua:**
    "Implementar e manter" significa revisao periodica (art. 9) e atualizacao
    conforme evolucao de ameacas ao setor securitario.
implementation_guidance:
  platform_engineering:
    prose: |
      **Politica como codigo (Policy-as-Code):**
      1. Codificar a politica de seguranca cibernetica em formatos auditaveis (OPA/Rego,
         Kyverno, Sentinel) com regras especificas para o mercado de seguros.
      2. Versionar a politica em repositorio Git com historico de alteracoes e aprovacoes.
      3. Implementar guardrails automatizados para sistemas de seguros: cotacao,
         emissao, sinistros, provisoes, atuarial.

      **Confidencialidade:**
      4. Criptografia em transito (TLS 1.3 minimo) para comunicacoes com segurados,
         corretores e resseguradores.
      5. Criptografia em repouso (AES-256) para dados de apolices, sinistros e
         informacoes atuariais.
      6. Gerenciamento de chaves com HSM ou cloud KMS com rotacao automatica.
      7. Segmentacao de rede entre sistemas core de seguros e sistemas de suporte.

      **Integridade:**
      8. Assinatura digital de apolices eletronicas e documentos de sinistro.
      9. Audit trail imutavel para alteracoes em apolices, endossos e sinistros.
      10. Checksums e verificacao de integridade em transferencias de dados atuariais.
      11. Controles de integridade para calculos de provisoes tecnicas (IBNR, IBNER).

      **Disponibilidade:**
      12. Arquitetura multi-AZ para sistemas de cotacao e emissao online.
      13. Auto-scaling para picos de demanda (renovacoes, catastrofes naturais).
      14. Disaster recovery com RPO/RTO definidos para sistemas core de seguros.
      15. Circuit breakers para integracao com corretores e resseguradores.
    tools:
      - opa-gatekeeper
      - kyverno
      - vault
      - kms-hsm
      - service-mesh
      - cert-manager
      - network-policies
  devsecops:
    prose: |
      **Pipeline alinhado a politica:**
      1. Security gates no CI/CD que validam conformidade com a politica para
         sistemas de seguros.
      2. SAST, DAST, SCA integrados ao pipeline como requisito obrigatorio para
         sistemas que tratam dados de segurados.
      3. Container scanning em todas as imagens de servicos core de seguros.
      4. IaC scanning (Checkov, tfsec) para infraestrutura de seguros.

      **Protecao de dados de segurados no pipeline:**
      5. Secret scanning em todo commit (prevencao de vazamento de dados de segurados).
      6. Deteccao de dados pessoais sensiveis (CPF, dados de saude) em codigo-fonte.
      7. Segregacao de segredos por ambiente (dev, staging, prod).
      8. Mascaramento de dados de segurados em ambientes nao-produtivos.

      **Compliance-as-Code:**
      9. Testes automatizados que validam controles de seguranca em cada release.
      10. Dashboard de conformidade com status em tempo real para cada sistema.
      11. Alertas automaticos quando configuracao viola a politica.
    tools:
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - gitlab-container-scanning
      - gitlab-secret-detection
      - checkov
      - tfsec
      - trivy
      - semgrep
  secops:
    prose: |
      **Monitoramento da triade CIA:**
      1. SIEM com regras de correlacao especificas para o mercado de seguros:
         acesso indevido a dados de segurados, alteracao de provisoes, indisponibilidade
         de sistemas de cotacao.
      2. DLP (Data Loss Prevention) para dados de segurados, beneficiarios e
         participantes de planos de previdencia.
      3. Database Activity Monitoring para acesso a bases de apolices e sinistros.
      4. Monitoramento de disponibilidade de sistemas de atendimento ao segurado.

      **Gestao da politica:**
      5. Revisao periodica da politica (minimo anual, conforme art. 9).
      6. Gap analysis entre politica e controles implementados.
      7. Metricas de efetividade dos controles de seguranca.

      **Auditoria e conformidade:**
      8. Auditoria independente da implementacao da politica.
      9. Testes de penetracao periodicos em sistemas de cotacao e emissao online.
      10. Inventario de ativos de informacao do mercado de seguros atualizado.
      11. Classificacao de dados com labels: dados-segurados, dados-atuariais,
          dados-sinistros, dados-financeiros.
    tools:
      - siem
      - dlp
      - dam
      - vulnerability-scanner
      - asset-inventory
