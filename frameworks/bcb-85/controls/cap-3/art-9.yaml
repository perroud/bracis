id: art-9
family: cap-3
title: "Plano de Resposta a Incidentes"
class: BCB-85
statement:
  prose: |
    Art. 9. As instituições de pagamento referidas no art. 1 devem elaborar e implementar
    plano de resposta a incidentes.

    Parágrafo único. O plano mencionado no caput deve definir, no mínimo:
    I - as ações a serem desenvolvidas para adequar as estruturas organizacional e
    operacional da instituição à política de segurança cibernética;
    II - os procedimentos e os controles adotados na prevenção e no tratamento de
    incidentes para reduzir a vulnerabilidade da instituição;
    III - a designação da área responsável pelo registro e pelo controle dos efeitos de
    incidentes relevantes.
guidance:
  prose: |
    O art. 9 estabelece a obrigatoriedade de um plano de resposta a incidentes formal e
    implementado. Diferencia-se do art. 6 por focar especificamente na resposta a incidentes
    (enquanto o art. 6 abrange tambem o plano de acao para adequacao).

    **Conteudo minimo do plano:**

    **I - Adequacao organizacional:**
    O plano deve prever como a estrutura organizacional sera mobilizada durante um
    incidente. Inclui:
    - Equipe de resposta (CSIRT) com papeis e responsabilidades definidos
    - Cadeia de comando e comunicacao durante incidentes
    - Recursos necessarios (humanos, tecnologicos, financeiros)
    - Treinamento e simulacoes periodicas

    **II - Procedimentos de prevencao e tratamento:**
    Playbooks operacionais para cada tipo de incidente relevante para IPs:
    - Deteccao e triagem inicial
    - Contencao (isolamento do incidente)
    - Erradicacao (remocao da causa)
    - Recuperacao (restauracao de servicos de pagamento)
    - Licoes aprendidas (melhoria continua)

    **III - Area responsavel:**
    Designacao formal de area responsavel pelo registro e controle de incidentes.
    Deve ter autoridade para tomar decisoes operacionais durante incidentes e
    acesso a recursos necessarios. Para IPs, a velocidade de resposta e critica
    dado o impacto direto em transacoes de pagamento.

    **Relacao com o NIST CSF:**
    Os incisos mapeiam diretamente para as funcoes Identify, Protect, Detect,
    Respond e Recover do NIST Cybersecurity Framework.
implementation_guidance:
  platform_engineering:
    prose: |
      **I - Estrutura organizacional na plataforma:**
      1. On-call rotation configurada com escalacao automatica.
      2. War room virtual com canal dedicado (Slack/Teams) provisionado
         automaticamente ao declarar incidente.
      3. Roles e permissoes de emergencia (break-glass access) com audit trail.
      4. Runbooks documentados e acessiveis na plataforma de incident management.

      **II - Prevencao automatizada:**
      5. Health checks e liveness probes em todos os servicos de pagamento.
      6. Alerting baseado em SLOs com thresholds de severidade.
      7. Auto-scaling para absorver picos de trafego anomalos de transacoes.
      8. Rate limiting e circuit breakers para contencao automatica.

      **II - Tratamento de incidentes:**
      9. Rollback automatizado com um clique para versao anterior estavel.
      10. Network isolation automatica de workloads comprometidos.
      11. Snapshot automatico de estado para analise forense.
      12. DNS failover automatico para sites de contingencia de pagamento.

      **III - Registro e controle:**
      13. Incident management platform com campos obrigatorios (timeline, impacto,
          acoes, causa raiz).
      14. Dashboards de incidentes em tempo real para stakeholders.
      15. Integracao automatica com SIEM para correlacao de eventos.
    tools:
      - incident-management
      - centralized-logging
      - service-mesh
      - dns-failover
      - auto-scaling
      - monitoring-alerting
  devsecops:
    prose: |
      **I - Preparacao no desenvolvimento:**
      1. Incident response playbooks versionados no repositorio.
      2. Treinamento de resposta a incidentes para desenvolvedores (game days).
      3. Documentacao de arquitetura atualizada para facilitar investigacao.

      **II - Prevencao no pipeline:**
      4. Canary deployments para deteccao precoce de problemas em pagamentos.
      5. Feature flags para desativar funcionalidades comprometidas sem deploy.
      6. Automated rollback baseado em metricas de erro de transacoes.
      7. Blue-green deployment para recuperacao rapida.

      **II - Tratamento no desenvolvimento:**
      8. Hotfix pipeline com processo acelerado de revisao e deploy.
      9. Cherry-pick workflow para aplicar fix sem regredir features.
      10. Post-mortem template no repositorio com checklist obrigatorio.

      **III - Registro no desenvolvimento:**
      11. Issue tracking vinculado a incidentes de seguranca.
      12. Metricas de MTTR por tipo de incidente.
      13. Lessons learned alimentando backlog de seguranca.
    tools:
      - feature-flags
      - canary-deployment
      - gitlab-ci
      - incident-management
  secops:
    prose: |
      **I - CSIRT operacional:**
      1. CSIRT formalmente constituido com charter documentado.
      2. Roles definidos: incident commander, technical lead, communications lead.
      3. Treinamento periodico da equipe de resposta.
      4. Exercicios de simulacao (tabletop e tecnico) trimestrais.

      **II - Playbooks operacionais:**
      5. Playbooks para: ransomware, DDoS em servicos de pagamento, vazamento de dados
         de transacoes, credential compromise, insider threat, fraude em lote,
         comprometimento de chaves criptograficas.
      6. SOAR automatizando acoes repetitivas de resposta.
      7. Processo de triagem com criterios de severidade documentados.
      8. Escalation matrix com contatos atualizados.

      **II - Ciclo de resposta:**
      9. Deteccao: SIEM + EDR + NDR com correlacao de eventos de pagamento.
      10. Contencao: isolamento de rede, bloqueio de contas, quarentena.
      11. Erradicacao: remocao de malware, patching, hardening.
      12. Recuperacao: restauracao de servicos de pagamento, validacao de integridade.
      13. Licoes aprendidas: post-mortem dentro de 72h do encerramento.

      **III - Registro formal:**
      14. Registro completo de cada incidente com timeline detalhada.
      15. Preservacao de evidencias para investigacao forense.
      16. Comunicacao ao BCB conforme art. 10.
      17. Relatorio anual conforme art. 11.
    tools:
      - soar
      - siem
      - edr-xdr
      - ndr
      - forensic-tools
      - incident-management
