id: art-17
family: cap-5
title: "Responsabilidades da Diretoria"
class: BCB-85
statement:
  prose: |
    Art. 17. A diretoria da instituição de pagamento deve:
    I - aprovar a política de segurança cibernética e o plano de ação e de resposta
    a incidentes;
    II - assegurar que a instituição mantenha estrutura de gerenciamento de riscos
    cibernéticos adequada a seus objetivos estratégicos;
    III - assegurar que a instituição possua recursos humanos e financeiros adequados
    à manutenção da segurança cibernética;
    IV - aprovar o relatório anual mencionado no art. 11.
guidance:
  prose: |
    O art. 17 eleva a seguranca cibernetica ao nivel de governanca corporativa. A
    diretoria tem responsabilidades diretas e intransferiveis.

    **Diferenca em relacao a CMN 4.893:**
    A CMN 4.893 (art. 17) atribui responsabilidades ao "conselho de administracao ou,
    na sua inexistencia, a diretoria". A BCB 85 atribui diretamente a diretoria,
    pois muitas IPs (especialmente fintechs) nao possuem conselho de administracao.

    **Responsabilidades da diretoria:**

    **I - Aprovacao da politica e do plano:**
    A politica de seguranca cibernetica (art. 3) e o plano de acao e resposta a
    incidentes (art. 6) devem ser formalmente aprovados pela diretoria. Nao pode ser
    aprovado apenas pela area tecnica ou pelo CISO.

    **II - Estrutura de gerenciamento de riscos:**
    A diretoria deve assegurar que existe uma estrutura adequada. Nao precisa
    operar, mas deve garantir que existe, esta funcionando e e proporcional
    aos riscos.

    **III - Recursos adequados:**
    Recursos humanos (equipe de seguranca dimensionada) e financeiros (budget
    de seguranca). A diretoria nao pode alegar desconhecimento se o budget de
    seguranca for insuficiente.

    **IV - Aprovacao do relatorio anual:**
    O relatorio anual de incidentes (art. 11) deve ser apresentado e aprovado
    pela diretoria. Isso garante que a diretoria tenha visibilidade sobre o estado
    da seguranca cibernetica.

    **Implicacoes praticas:**
    - Diretores precisam ter competencia minima em riscos ciberneticos
      ou contar com assessoria especializada
    - As reunioes da diretoria devem ter pauta especifica de seguranca cibernetica
    - As atas devem registrar as deliberacoes sobre seguranca cibernetica
    - A diretoria pode ser responsabilizada por falhas de seguranca se nao
      cumprir suas obrigacoes
implementation_guidance:
  platform_engineering:
    prose: |
      **Dashboards executivos para a diretoria:**
      1. Executive dashboard de seguranca cibernetica com KPIs de alto nivel.
      2. Risk heatmap atualizado em tempo real.
      3. Status de conformidade com a Resolucao BCB 85.
      4. Metricas de incidentes: volume, impacto, tendencias.
      5. Status de investimento em seguranca vs. planejado.

      **Estrutura de gerenciamento (II):**
      6. Plataforma de GRC integrada com dados de seguranca.
      7. Risk register cibernetico com link para controles implementados.
      8. Inventario de ativos criticos de pagamento com classificacao de risco.

      **Recursos (III):**
      9. Metricas de capacidade da equipe de seguranca (headcount vs. workload).
      10. Tracking de budget de seguranca vs. execucao.
      11. Benchmark de investimento em seguranca vs. peers do setor de pagamentos.
    tools:
      - grc-platform
      - monitoring-alerting
      - reporting-platform
      - risk-management-platform
  devsecops:
    prose: |
      **Visibilidade para governanca:**
      1. Security metrics dashboard exportavel para relatorios da diretoria.
      2. DORA metrics com perspectiva de seguranca.
      3. Vulnerability trends e MTTR por severidade.
      4. Supply chain security posture.

      **Evidencias de conformidade:**
      5. Compliance-as-code com reports automatizados.
      6. Audit trail de todas as decisoes de seguranca no pipeline.
      7. Historico de security gates e excecoes aprovadas.

      **Relatorio anual (IV):**
      8. Pipeline automatizado que agrega metricas de seguranca para o relatorio.
      9. Dados de SAST/DAST/SCA consolidados anualmente.
      10. Evolucao de postura de seguranca ao longo do ano.
    tools:
      - sonarqube
      - gitlab-ci
      - reporting-platform
  secops:
    prose: |
      **Suporte a diretoria:**
      1. Relatorio executivo trimestral de seguranca cibernetica para a diretoria.
      2. Briefing de ameacas relevantes para o setor de pagamentos.
      3. Comparacao de postura de seguranca com benchmarks do setor.
      4. Status de recomendacoes de auditorias anteriores.

      **I - Politica e plano:**
      5. Processo formal de aprovacao com ata registrada.
      6. Revisao anual da politica com recomendacoes para a diretoria.
      7. Atualizacoes intermediarias quando necessario (ex: nova ameaca relevante).

      **III - Recursos:**
      8. Assessment anual de adequacao de recursos de seguranca.
      9. Proposta de budget fundamentada em riscos e benchmarks.
      10. Relatorio de gap de competencias da equipe.

      **IV - Relatorio anual:**
      11. Elaboracao do relatorio conforme art. 11.
      12. Apresentacao a diretoria com tempo para deliberacao.
      13. Registro de aprovacao em ata.
      14. Retencao do relatorio e ata por 5 anos (minimo).
    tools:
      - grc-platform
      - siem
      - reporting-platform
      - threat-intelligence
