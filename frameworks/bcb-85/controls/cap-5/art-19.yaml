id: art-19
family: cap-5
title: "Comunicacao da Designacao do Diretor ao BCB"
class: BCB-85
statement:
  prose: |
    Art. 19. As instituições de pagamento referidas no art. 1 devem comunicar ao Banco
    Central do Brasil:
    I - a designação do diretor de que trata o art. 18; e
    II - as alterações na designação.
guidance:
  prose: |
    O art. 19 exige a comunicacao formal ao BCB sobre a designacao e alteracoes do
    diretor responsavel pela seguranca cibernetica.

    **Obrigacao de comunicacao:**
    - Designacao inicial: quando o diretor e nomeado
    - Alteracoes: quando ha substituicao do diretor responsavel

    **Importancia da comunicacao:**
    O BCB mantem registro de quem e o responsavel por seguranca cibernetica em cada
    IP. Isso permite:
    - Comunicacao direta em caso de incidentes setoriais
    - Responsabilizacao pessoal em caso de falhas graves
    - Acompanhamento de governance das IPs

    **Na pratica:**
    - A comunicacao deve ser feita atraves dos canais formais do BCB
    - Deve ser tempestiva — nao pode haver periodo sem diretor designado
    - Em caso de vacancia, a substituicao deve ser comunicada imediatamente
    - O diretor interino tambem deve ser comunicado

    **Diferenca em relacao a CMN 4.893:**
    Na BCB 85, a comunicacao da designacao esta em artigo separado (art. 19),
    enquanto na CMN 4.893, a comunicacao esta como paragrafo do art. 18. A
    separacao enfatiza a importancia da comunicacao para IPs.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de governance:**
      1. Registro centralizado de designacoes de diretores responsaveis.
      2. Alertas automaticos quando designacao esta pendente de comunicacao ao BCB.
      3. Tracking de prazos de comunicacao.
      4. Historico de designacoes com datas e evidencias.

      **Monitoramento de conformidade:**
      5. Dashboard de governance com status de designacoes.
      6. Verificacao automatica de que ha diretor designado a todo momento.
      7. Alertas de vacancia ou transicao pendente.
    tools:
      - grc-platform
      - document-management
      - compliance-scanner
  devsecops:
    prose: |
      **Rastreabilidade no pipeline:**
      1. Registro no pipeline de quem e o diretor responsavel por seguranca.
      2. Workflow de excecao de seguranca requer aprovacao do diretor designado.
      3. Audit trail de decisoes de seguranca vinculado ao diretor responsavel.

      **Continuidade:**
      4. Processo de handover documentado quando ha troca de diretor.
      5. Transferencia de acessos e responsabilidades no pipeline.
      6. Revisao de excecoes pendentes na transicao.
    tools:
      - gitlab-ci
      - grc-platform
      - identity-provider
  secops:
    prose: |
      **Processo de comunicacao ao BCB:**
      1. Template de comunicacao de designacao/alteracao pre-aprovado.
      2. Processo formal com aprovacao da diretoria antes da comunicacao.
      3. Registro de protocolo da comunicacao ao BCB.
      4. Retencao de evidencias de comunicacao por 5 anos.

      **Gestao de transicao:**
      5. Plano de transicao entre diretores responsaveis.
      6. Briefing de seguranca para novo diretor designado.
      7. Transferencia de conhecimento sobre status de conformidade.
      8. Revisao de pendencias regulatorias na transicao.

      **Monitoramento continuo:**
      9. Verificacao periodica de que a designacao esta atualizada no BCB.
      10. Reconciliacao entre registro interno e comunicacao ao BCB.
      11. Alerta para diretoria quando diretor designado se ausenta por longo periodo.
    tools:
      - grc-platform
      - document-management
      - communication-tools
