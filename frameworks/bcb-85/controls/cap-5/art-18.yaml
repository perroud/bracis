id: art-18
family: cap-5
title: "Diretor Responsavel pela Seguranca Cibernetica"
class: BCB-85
statement:
  prose: |
    Art. 18. As instituições de pagamento referidas no art. 1 devem designar diretor
    responsável pela política de segurança cibernética e pela execução do plano de ação
    e de resposta a incidentes.

    Parágrafo único. O diretor mencionado no caput pode desempenhar outras funções na
    instituição, desde que não haja conflito de interesses.
guidance:
  prose: |
    O art. 18 cria a figura obrigatoria do diretor responsavel pela seguranca cibernetica
    em instituicoes de pagamento. Na pratica, e a base legal para o CISO (Chief
    Information Security Officer) no setor de pagamentos brasileiro.

    **Designacao obrigatoria:**
    Deve ser um diretor da instituicao. Nao pode ser um gerente, coordenador ou
    consultor externo. E uma responsabilidade de nivel de diretoria.

    **Acumulacao de funcoes (paragrafo unico):**
    O diretor pode acumular outras funcoes, desde que nao haja conflito de
    interesses. Diferentemente da CMN 4.893, a BCB 85 nao menciona explicitamente
    a possibilidade de ser o mesmo diretor de riscos. Exemplos de conflito:
    - Diretor de TI que e responsavel por seguranca (marca a propria prova)
    - Diretor de operacoes que avalia riscos das proprias operacoes
    Para IPs de pequeno porte, o acumulo e mais comum e aceitavel.

    **Responsabilidades implicitas:**
    Embora o artigo nao detalhe, o diretor designado e responsavel por:
    - Implementacao e manutencao da politica (art. 3)
    - Execucao do plano de acao e resposta (art. 6)
    - Supervisao do programa de governanca (art. 8)
    - Comunicacao de incidentes ao BCB (art. 10)
    - Elaboracao do relatorio anual (art. 11)
    - Garantir conformidade com toda a resolucao

    **Risco pessoal:**
    O diretor designado pode ser responsabilizado pessoalmente por falhas de
    seguranca que decorram de negligencia no cumprimento de suas atribuicoes.
implementation_guidance:
  platform_engineering:
    prose: |
      **Ferramentas para o CISO:**
      1. Executive dashboard consolidado de seguranca cibernetica.
      2. Risk register cibernetico com visao executiva.
      3. Compliance dashboard com status de conformidade com BCB 85.
      4. Incident dashboard com metricas de resposta.

      **Estrutura de reporte:**
      5. Alertas de alta severidade direcionados ao CISO.
      6. Relatorios automatizados periodicos para o diretor responsavel.
      7. Workflow de aprovacao para decisoes de seguranca criticas.
      8. Painel de acompanhamento do plano de acao e resposta.

      **Governance automation:**
      9. Tracking automatizado de conformidade com cada artigo da resolucao.
      10. Alertas de vencimento de revisoes obrigatorias.
      11. Registro de decisoes de seguranca com trilha de auditoria.
    tools:
      - grc-platform
      - monitoring-alerting
      - reporting-platform
      - incident-management
  devsecops:
    prose: |
      **Visibilidade para o diretor responsavel:**
      1. Security posture dashboard agregando todas as ferramentas de seguranca.
      2. Vulnerability trends com projecao e SLA compliance.
      3. Security debt tracking (vulnerabilidades conhecidas nao remediadas).
      4. Pipeline security metrics: % de builds com scanning, bloqueios, excecoes.

      **Governance no pipeline:**
      5. Exception process formal para bypass de security gates (com aprovacao do CISO).
      6. Registro de todas as excecoes de seguranca com justificativa e prazo.
      7. Revisao periodica de excecoes pelo diretor responsavel.
    tools:
      - sonarqube
      - gitlab-ci
      - reporting-platform
      - grc-platform
  secops:
    prose: |
      **Suporte operacional ao CISO:**
      1. Briefings periodicos de seguranca para o diretor responsavel.
      2. Threat intelligence relevante para o setor de pagamentos.
      3. Status de incidentes abertos e metricas de resposta.
      4. Status de vulnerabilidades criticas e plano de remediacao.

      **Comunicacao ao BCB:**
      5. Processo formal de comunicacao de designacao/alteracao ao BCB.
      6. Registro historico de designacoes.
      7. Template de comunicacao pre-aprovado.

      **Evidencias para o diretor:**
      8. Dossie de conformidade com a Resolucao BCB 85 atualizado.
      9. Registro de todas as deliberacoes de seguranca.
      10. Historico de comunicacoes com BCB.
      11. Evidencias de treinamento e capacitacao da equipe.

      **Conflito de interesses (paragrafo unico):**
      12. Avaliacao anual de potencial conflito de interesses.
      13. Documentacao de segregacao de funcoes.
    tools:
      - grc-platform
      - siem
      - threat-intelligence
      - incident-management
