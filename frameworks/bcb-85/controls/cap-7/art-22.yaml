id: art-22
family: cap-7
title: "Instituicoes com Politica Preexistente"
class: BCB-85
baselines: [todas-ips]
statement:
  prose: |
    Art. 22. As instituições de pagamento referidas no art. 1 que, na data de entrada em
    vigor desta Resolução, já possuírem política de segurança cibernética aprovada devem
    adequá-la ao disposto nesta Resolução até 1º de julho de 2022.
guidance:
  prose: |
    O art. 22 trata especificamente das IPs que ja possuiam politica de seguranca
    cibernetica antes da entrada em vigor da resolucao. Essas instituicoes nao estavam
    isentas — precisavam adequar suas politicas existentes.

    **Diferenca entre art. 21 e art. 22:**
    - Art. 21: IPs SEM politica preexistente — devem CRIAR
    - Art. 22: IPs COM politica preexistente — devem ADEQUAR

    **O que significa "adequar":**
    A politica existente precisava ser revisada e ajustada para atender a TODOS os
    requisitos da resolucao, especificamente:
    - Conteudo minimo da politica (art. 3 e art. 4)
    - Plano de acao e resposta a incidentes (art. 6)
    - Procedimentos e controles (art. 7)
    - Programa de governanca (art. 8)

    **Prazo:**
    1 de julho de 2022. O prazo ja esta vencido.

    **Situacao atual:**
    Todas as IPs devem estar em conformidade plena. Politicas antigas que nao foram
    atualizadas para atender a resolucao estao em nao conformidade.

    **Particularidade para IPs:**
    Muitas IPs (especialmente fintechs) ja possuiam politicas de seguranca baseadas
    em frameworks internacionais (ISO 27001, SOC 2) mas nao necessariamente alinhadas
    aos requisitos especificos da BCB 85. A adequacao exige gap analysis entre a
    politica existente e os requisitos da resolucao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de versoes da politica:**
      1. Historico completo de versoes da politica de seguranca cibernetica.
      2. Comparativo entre versoes (diff) para evidenciar adequacoes realizadas.
      3. Rastreamento de requisitos da resolucao cobertos por cada versao.
      4. Alerta quando requisito da resolucao nao esta coberto pela politica vigente.

      **Conformidade continua:**
      5. Compliance-as-code que verifica se controles implementados cobrem a politica.
      6. Gap analysis automatizado: politica vs. controles ativos.
      7. Dashboard de cobertura da resolucao por artigo.
    tools:
      - grc-platform
      - document-management
      - compliance-scanner
  devsecops:
    prose: |
      **Alinhamento tecnico com a politica:**
      1. Verificacao de que pipelines de CI/CD implementam os controles previstos na politica.
      2. Mapeamento entre requisitos da politica e security gates do pipeline.
      3. Audit trail de evolucao dos controles no pipeline apos adequacao.

      **Evidencias de adequacao:**
      4. Historico de merge requests que implementaram controles exigidos pela resolucao.
      5. Registro de alteracoes em pipelines de seguranca apos entrada em vigor.
      6. Documentacao de controles adicionados para conformidade.
    tools:
      - gitlab-ci
      - compliance-scanner
      - document-management
  secops:
    prose: |
      **Verificacao de adequacao:**
      1. Checklist de todos os artigos da resolucao vs. politica atual.
      2. Identificacao de gaps residuais entre politica e resolucao.
      3. Plano de remediacao para gaps encontrados com prazos e responsaveis.
      4. Relatorio de adequacao para a diretoria.

      **Auditoria interna:**
      5. Auditoria independente de conformidade da politica com a resolucao.
      6. Teste de efetividade dos controles previstos na politica.
      7. Comparativo de maturidade antes e depois da adequacao.

      **Retencao:**
      8. Retencao da versao anterior a adequacao como evidencia.
      9. Retencao da versao adequada com data de aprovacao pela diretoria.
      10. Documentacao do processo de adequacao realizado.
    tools:
      - grc-platform
      - document-management
      - audit-platform
