id: art-25
family: cap-7
title: "Vigencia da Resolucao"
class: BCB-85
baselines: [todas-ips]
statement:
  prose: |
    Art. 25. Esta Resolução entra em vigor em 1º de novembro de 2021.
guidance:
  prose: |
    O art. 25 define a data de entrada em vigor da Resolucao BCB 85/2021:
    1 de novembro de 2021.

    **Cronologia regulatoria:**
    - 08/04/2021: Publicacao da Resolucao BCB 85
    - 01/11/2021: Entrada em vigor da Resolucao BCB 85
    - 01/07/2022: Prazo para adequacao de politica e plano (arts. 21-22)
    - 31/12/2023: Prazo para adequacao de contratos preexistentes (art. 24)

    **Vacatio legis:**
    A resolucao foi publicada em 08/04/2021 e entrou em vigor em 01/11/2021,
    concedendo aproximadamente 7 meses de vacatio legis para que as IPs
    se adaptassem.

    **Contexto regulatorio:**
    A Resolucao BCB 85 foi publicada apos a Resolucao CMN 4.893/2021
    (publicada em 26/02/2021), completando o arcabouco regulatorio de
    seguranca cibernetica para todo o ecossistema financeiro e de pagamentos.
    Com ambas as resolucoes em vigor:
    - CMN 4.893: regula instituicoes financeiras (bancos, cooperativas, corretoras)
    - BCB 85: regula instituicoes de pagamento (credenciadoras, emissores, fintechs)

    **Situacao atual:**
    A resolucao esta em plena vigencia desde 01/11/2021. Todos os artigos sao
    exigiveis e fiscalizaveis pelo BCB.

    **Implicacao pratica:**
    - Todos os prazos transitorios (arts. 21 a 24) ja estao vencidos
    - O BCB pode fiscalizar e sancionar nao conformidades desde 01/11/2021
    - Novas IPs autorizadas apos 01/11/2021 devem cumprir a resolucao desde o
      inicio de suas operacoes
    - A resolucao permanece vigente ate que seja revogada ou substituida por
      nova norma do BCB
implementation_guidance:
  platform_engineering:
    prose: |
      **Conformidade continua:**
      1. Monitoramento continuo de conformidade com todos os artigos da resolucao.
      2. Dashboard de status de conformidade atualizado em tempo real.
      3. Alertas para desvios de conformidade.
      4. Calendario regulatorio com datas-chave da resolucao.

      **Evolucao regulatoria:**
      5. Monitoramento de novas normas do BCB que possam alterar ou substituir
         a Resolucao BCB 85.
      6. Integracao com feeds regulatorios para deteccao precoce de mudancas.
      7. Processo de avaliacao de impacto de mudancas regulatorias.
    tools:
      - grc-platform
      - compliance-scanner
      - regulatory-feed
  devsecops:
    prose: |
      **Compliance continuo:**
      1. Security gates no pipeline alinhados aos requisitos vigentes da resolucao.
      2. Atualizacao de policies de compliance quando houver mudanca regulatoria.
      3. Versionamento de compliance rules com referencia a norma vigente.

      **Rastreabilidade:**
      4. Cada controle de seguranca no pipeline deve ser rastreavel a artigo especifico.
      5. Documentacao de cobertura: quais artigos da resolucao sao cobertos pelo pipeline.
      6. Relatorio automatizado de conformidade tecnica com a resolucao.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - compliance-scanner
  secops:
    prose: |
      **Gestao regulatoria:**
      1. Acompanhamento de evolucao regulatoria do BCB sobre seguranca cibernetica
         para IPs.
      2. Participacao em consultas publicas sobre novas normas.
      3. Assessment de impacto de mudancas regulatorias.
      4. Comunicacao tempestiva de mudancas regulatorias a diretoria.

      **Auditoria e fiscalizacao:**
      5. Preparacao continua para inspecao do BCB.
      6. Evidencias de conformidade organizadas e acessiveis.
      7. Processo de resposta a requisicoes do BCB documentado.
      8. Plano de remediacao rapida para nao conformidades identificadas.

      **Governanca regulatoria:**
      9. Comite de compliance regulatorio com representacao de seguranca cibernetica.
      10. Relatorio periodico de conformidade regulatoria para a diretoria.
      11. Monitoramento de sancoes aplicadas pelo BCB a outras IPs como
          benchmark de expectativas regulatorias.
    tools:
      - grc-platform
      - regulatory-feed
      - compliance-scanner
      - reporting-platform
