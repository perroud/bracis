id: art-7
family: cap-2
title: "Procedimentos e Controles para Reducao de Vulnerabilidades"
class: BCB-85
statement:
  prose: |
    Art. 7. Os procedimentos e os controles de que trata o art. 6, parágrafo único,
    inciso II, devem abranger, no mínimo:
    I - a autenticação, a criptografia, a prevenção e a detecção de intrusão, a
    prevenção de vazamento de informações, a realização periódica de testes e varreduras
    para detecção de vulnerabilidades, a proteção contra softwares maliciosos, o
    estabelecimento de mecanismos de rastreabilidade, os controles de acesso e de
    segmentação da rede de computadores e a manutenção de cópias de segurança dos
    dados e das informações;
    II - a definição dos processos, dos testes e das trilhas de auditoria;
    III - os mecanismos de controle voltados para a segurança do desenvolvimento de
    sistemas de informação;
    IV - as medidas de segurança relativas ao armazenamento de dados, incluindo dados
    em nuvem;
    V - os procedimentos e os controles em níveis de complexidade, abrangência e
    precisão compatíveis com os da instituição.
guidance:
  prose: |
    O art. 7 e o artigo mais tecnico da resolucao. Detalha os controles minimos
    obrigatorios que os procedimentos de prevencao e resposta devem contemplar.

    **Inciso I — Checklist tecnico obrigatorio:**
    A lista e extensa e abrange praticamente todo o espectro de seguranca:
    1. Autenticacao: MFA, SSO, gestao de identidades
    2. Criptografia: em transito e em repouso
    3. Prevencao de intrusao: IPS, WAF
    4. Deteccao de intrusao: IDS, SIEM, NDR
    5. Prevencao de vazamento: DLP
    6. Testes e varreduras periodicas: vulnerability scanning, penetration testing
    7. Protecao contra malware: EDR, antivirus
    8. Rastreabilidade: logging, audit trail
    9. Controles de acesso: RBAC, least privilege
    10. Segmentacao de rede: VLANs, firewalls, microsegmentacao
    11. Backup: copias de seguranca com teste de restauracao

    **Inciso II — Auditoria:**
    Processos formais de auditoria, testes e trilhas de auditoria. Nao basta ter
    controles; e preciso provar que funcionam.

    **Inciso III — Desenvolvimento seguro:**
    Seguranca no SDLC. Exige mecanismos especificos para o desenvolvimento de
    sistemas de informacao. E a base legal para DevSecOps em IPs.

    **Inciso IV — Armazenamento seguro:**
    Medidas especificas para armazenamento de dados, incluindo explicitamente
    cloud computing. Complementa o Capitulo IV.

    **Inciso V — Proporcionalidade:**
    Os controles devem ser proporcionais a complexidade da instituicao. Reitera
    o principio do art. 3, ss 1.

    **Particularidade para IPs:**
    O inciso I ganha relevancia adicional para IPs por conta da natureza das transacoes
    de pagamento: autenticacao forte para pagamentos (SCA), criptografia de dados de
    cartao (PCI DSS), rastreabilidade de transacoes financeiras e disponibilidade 24x7.
implementation_guidance:
  platform_engineering:
    prose: |
      **I - Autenticacao:**
      1. Identity Provider centralizado (Keycloak, Okta, Azure AD).
      2. MFA obrigatorio para todos os acessos a sistemas de pagamento.
      3. SSO com SAML/OIDC para reducao de superficie de ataque.
      4. Service accounts com rotacao automatica de credenciais.

      **I - Criptografia:**
      5. TLS 1.3 em todas as comunicacoes (minimo TLS 1.2).
      6. mTLS entre microservicos de pagamento via service mesh.
      7. AES-256 para dados em repouso.
      8. KMS/HSM para gerenciamento de chaves com rotacao automatica.

      **I - Prevencao e deteccao de intrusao:**
      9. WAF em todas as APIs de pagamento expostas.
      10. IDS/IPS em pontos estrategicos da rede.
      11. Network policies no Kubernetes para microsegmentacao.

      **I - Prevencao de vazamento:**
      12. DLP em endpoints e gateways de saida.
      13. Classificacao automatica de dados sensiveis de pagamento.

      **I - Varreduras periodicas:**
      14. Vulnerability scanning semanal em infraestrutura.
      15. Container image scanning em cada build e periodico em registries.
      16. Cloud security posture management (CSPM) continuo.

      **I - Protecao contra malware:**
      17. EDR em todos os endpoints e servidores.
      18. Container runtime security (Falco, Sysdig).

      **I - Rastreabilidade:**
      19. Centralized logging com retencao minima de 5 anos.
      20. Structured logging com correlation IDs para transacoes de pagamento.
      21. Audit trail imutavel para operacoes financeiras.

      **I - Controle de acesso e segmentacao:**
      22. RBAC com principio do menor privilegio.
      23. Just-in-time access para operacoes privilegiadas.
      24. Segmentacao de rede com firewalls e network policies.

      **I - Backup:**
      25. Backups automatizados, criptografados e testados periodicamente.
      26. RPO/RTO definidos por classificacao de dados.
      27. Replicacao geografica para dados criticos de pagamento.

      **IV - Armazenamento em nuvem:**
      28. Encryption at rest habilitado em todos os servicos de storage.
      29. Bucket policies e access controls restritos.
      30. Data residency controls conforme art. 15.
    tools:
      - identity-provider
      - service-mesh
      - kms-hsm
      - waf
      - ids-ips
      - dlp
      - vulnerability-scanner
      - edr-xdr
      - centralized-logging
      - backup-solution
      - cspm
      - container-runtime-security
  devsecops:
    prose: |
      **III - Desenvolvimento seguro (SDLC):**
      1. SAST em todo commit com bloqueio em vulnerabilidades criticas.
      2. DAST em staging antes de cada release.
      3. SCA para analise de dependencias e CVEs.
      4. Secret scanning para prevenir vazamento de credenciais no codigo.
      5. IaC scanning (Checkov, tfsec) para configuracoes de infraestrutura.
      6. Container scanning em todas as imagens Docker.

      **III - Secure coding:**
      7. Secure coding guidelines por linguagem/framework.
      8. Input validation e output encoding em todas as interfaces de pagamento.
      9. Parameterized queries obrigatorias.
      10. CSRF, XSS, SSRF protection implementados e testados.

      **III - Supply chain security:**
      11. SBOM gerado em cada release.
      12. Dependency pinning e lock files obrigatorios.
      13. Container image signing com Cosign.
      14. Signed commits obrigatorios.

      **II - Trilhas de auditoria no pipeline:**
      15. Audit trail completo de builds, testes e deploys.
      16. Approval gates com registro de quem aprovou.
      17. Artifact provenance com SLSA framework.

      **I - Testes periodicos:**
      18. Penetration testing integrado ao ciclo de release (DAST).
      19. Fuzzing para APIs de pagamento criticas.
      20. Regression testing de seguranca.
    tools:
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - gitlab-container-scanning
      - gitlab-secret-detection
      - checkov
      - tfsec
      - trivy
      - semgrep
      - cosign
      - syft
      - sonarqube
  secops:
    prose: |
      **I - Deteccao e monitoramento:**
      1. SIEM com correlacao de eventos em tempo real para sistemas de pagamento.
      2. NDR (Network Detection and Response) para trafego anomalo.
      3. UEBA para deteccao de comportamento anomalo de usuarios.
      4. EDR/XDR com deteccao e resposta automatizada.
      5. Threat intelligence feeds integrados ao SIEM.

      **I - Varreduras e testes:**
      6. Vulnerability scanning semanal em infraestrutura e aplicacoes.
      7. Penetration testing anual (minimo) por terceiro independente.
      8. Red team exercises semestrais.
      9. Bug bounty program (recomendado para IPs de grande porte).

      **I - Prevencao de vazamento:**
      10. DLP monitoring em email, web e endpoints.
      11. Cloud Access Security Broker (CASB) para shadow IT.

      **II - Auditoria:**
      12. Revisao periodica de logs e alertas.
      13. Auditoria de configuracoes de seguranca (hardening compliance).
      14. Relatorios de conformidade para auditoria interna e externa.

      **I - Backup e recuperacao:**
      15. Testes de restauracao de backup trimestrais.
      16. Disaster recovery drills semestrais para servicos de pagamento.
      17. Validacao de integridade de backups.
    tools:
      - siem
      - ndr
      - ueba
      - edr-xdr
      - vulnerability-scanner
      - penetration-testing
      - dlp
      - casb
      - threat-intelligence
