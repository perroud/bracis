id: art-8
family: cap-2
title: "Programa de Governanca em Seguranca Cibernetica"
class: BCB-85
statement:
  prose: |
    Art. 8. As instituições de pagamento referidas no art. 1 devem desenvolver e
    implementar programa de governança em segurança cibernética, conforme definido na
    política de segurança cibernética, que contemple o gerenciamento dos riscos de
    segurança cibernética.

    Parágrafo único. O programa mencionado no caput deve incluir, no mínimo:
    I - definição e documentação dos processos e dos procedimentos de gerenciamento de
    riscos de segurança cibernética;
    II - definição e atualização dos cenários de incidentes, considerados nos testes de
    continuidade de negócios, conforme o disposto no art. 4, inciso V, alínea "a";
    III - procedimentos de resposta a incidentes de segurança cibernética;
    IV - classificação dos incidentes quanto ao impacto e quanto à relevância para o
    funcionamento da instituição.
guidance:
  prose: |
    O art. 8 exige um programa formal de governanca em seguranca cibernetica, com foco
    no gerenciamento de riscos. Nao se trata apenas de ter controles, mas de ter um
    programa estruturado e documentado.

    **Programa de governanca vs. politica:**
    A politica (art. 3) define "o que" deve ser feito. O programa de governanca (art. 8)
    define "como" sera gerenciado continuamente. E a operacionalizacao da politica.

    **Conteudo minimo do programa:**

    **I - Processos de gestao de riscos:**
    Deve haver processos formais e documentados para:
    - Identificacao de riscos ciberneticos em servicos de pagamento
    - Analise e avaliacao de riscos (probabilidade x impacto)
    - Tratamento de riscos (mitigar, aceitar, transferir, evitar)
    - Monitoramento e revisao continua

    **II - Cenarios de incidentes:**
    Cenarios devem ser definidos, documentados e atualizados para testes de
    continuidade. Deve cobrir cenarios reais e plausiveis para IPs:
    - Indisponibilidade do sistema de pagamentos (PIX, TED)
    - Ransomware afetando processamento de transacoes
    - Fraude em lote via comprometimento de credenciais
    - DDoS em APIs de pagamento
    - Vazamento de dados de transacoes
    - Ataque a supply chain de processadores de pagamento

    **III - Procedimentos de resposta:**
    Playbooks detalhados para cada tipo de incidente. Deve definir papeis,
    responsabilidades, fluxos de comunicacao e acoes especificas.

    **IV - Classificacao de incidentes:**
    Taxonomia formal com criterios quantitativos para classificar incidentes
    por impacto (financeiro, operacional, reputacional) e relevancia para
    o funcionamento da IP.
implementation_guidance:
  platform_engineering:
    prose: |
      **I - Gestao de riscos na plataforma:**
      1. Risk register centralizado com riscos ciberneticos catalogados.
      2. Threat modeling integrado ao design de novos servicos de pagamento (STRIDE, PASTA).
      3. Risk scoring automatizado baseado em dados de vulnerabilidades e exposicao.
      4. Dashboards de risco cibernetico em tempo real.

      **II - Cenarios de incidentes:**
      5. Chaos engineering com cenarios mapeados para riscos de pagamento.
      6. Game days trimestrais simulando indisponibilidade de pagamentos.
      7. Failover testing automatizado para cenarios de indisponibilidade.
      8. Cenarios documentados no repositorio de DR/BCP.

      **III - Resposta automatizada:**
      9. Auto-remediation para incidentes de baixa complexidade.
      10. Circuit breakers que isolam servicos de pagamento comprometidos.
      11. Rollback automatizado quando anomalias sao detectadas pos-deploy.
      12. Network isolation automatica de workloads comprometidos.

      **IV - Classificacao automatizada:**
      13. Severity levels definidos na plataforma de incident management (P1-P4).
      14. Escalation automatica baseada em severidade e impacto em pagamentos.
      15. SLAs de resposta diferenciados por classificacao.
    tools:
      - risk-management-platform
      - chaos-engineering
      - incident-management
      - threat-modeling-tools
      - centralized-logging
  devsecops:
    prose: |
      **I - Riscos no ciclo de desenvolvimento:**
      1. Threat modeling obrigatorio para novos servicos de pagamento e features criticas.
      2. Risk assessment integrado ao design review.
      3. Security requirements derivados dos riscos identificados.
      4. Metricas de risco no dashboard de CI/CD (ex: MTTR de vulnerabilidades).

      **II - Cenarios no pipeline:**
      5. Testes de seguranca automatizados simulando cenarios de ataque a pagamentos.
      6. Fuzzing para APIs de pagamento que processam transacoes.
      7. Testes de resiliencia integrados ao pipeline.

      **III - Resposta no desenvolvimento:**
      8. Hotfix process com SLA definido por severidade.
      9. Playbooks de resposta para vulnerabilidades em producao de pagamentos.
      10. Comunicacao automatizada quando vulnerabilidade critica e detectada.

      **IV - Classificacao no desenvolvimento:**
      11. Severity classification para vulnerabilidades de codigo.
      12. Impact assessment automatizado baseado em blast radius em pagamentos.
      13. Priorizacao de remediacoes por risco residual.
    tools:
      - threat-modeling-tools
      - gitlab-sast
      - gitlab-dast
      - fuzzing-tools
      - incident-management
  secops:
    prose: |
      **I - Gestao de riscos operacional:**
      1. Risk assessment periodico (minimo anual) de riscos ciberneticos em pagamentos.
      2. Threat landscape monitoring com atualizacao de riscos para o setor de pagamentos.
      3. KRIs (Key Risk Indicators) monitorados continuamente.
      4. Integracao com risk management corporativo (GRC).

      **II - Cenarios e testes:**
      5. Tabletop exercises trimestrais com cenarios de pagamentos.
      6. Simulacoes tecnicas de incidentes (purple team exercises).
      7. Atualizacao de cenarios baseada em threat intelligence do setor de pagamentos.
      8. Documentacao formal de resultados e licoes aprendidas.

      **III - Resposta a incidentes:**
      9. SOAR com playbooks para cada cenario de incidente em pagamentos.
      10. Escalation matrix documentada e testada.
      11. Comunicacao de crise com stakeholders predefinidos.
      12. Forense digital com preservacao de cadeia de custodia.

      **IV - Classificacao operacional:**
      13. Taxonomia de incidentes padronizada (VERIS, MITRE ATT&CK).
      14. Matriz de impacto com criterios quantitativos para pagamentos.
      15. Relatorios de tendencias de incidentes para diretoria.
      16. Alimentacao do risk register com dados de incidentes reais.
    tools:
      - siem
      - soar
      - grc-platform
      - threat-intelligence
      - forensic-tools
      - penetration-testing
