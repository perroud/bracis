id: art-5
family: cap-2
title: "Divulgacao da Politica de Seguranca Cibernetica"
class: BCB-85
statement:
  prose: |
    Art. 5. A política de segurança cibernética deve ser divulgada aos funcionários da
    instituição de pagamento e às empresas prestadoras de serviços a terceiros, mediante
    linguagem clara, acessível e em nível de detalhamento compatível com as funções
    desempenhadas e com a sensibilidade das informações de que tenham conhecimento.
guidance:
  prose: |
    O art. 5 trata da divulgacao e conscientizacao sobre a politica de seguranca
    cibernetica para instituicoes de pagamento. Pontos criticos:

    **Publico-alvo obrigatorio:**
    1. Funcionarios da instituicao de pagamento (todos os niveis hierarquicos)
    2. Empresas prestadoras de servicos a terceiros (fornecedores, outsourcing,
       subadquirentes, processadoras)

    **Requisitos da divulgacao:**
    - Linguagem clara e acessivel: nao pode ser jargao tecnico incompreensivel
      para areas nao tecnicas
    - Nivel de detalhamento compativel com a funcao: um desenvolvedor precisa de
      mais detalhes tecnicos que um atendente
    - Compativel com a sensibilidade das informacoes: quem acessa dados de
      transacoes precisa de orientacoes mais detalhadas

    **Na pratica para IPs:**
    - A politica deve ter versoes ou extratos direcionados por publico
    - Terceiros que processam pagamentos ou acessam dados sensiveis precisam
      receber a politica e atestar conhecimento
    - O mero envio de email nao e suficiente; deve haver evidencia de que o
      conteudo foi compreendido
    - Treinamento e avaliacao periodica complementam a divulgacao (art. 4, VI, a)
    - Atencao especial para equipes de antifraude e suporte ao cliente
implementation_guidance:
  platform_engineering:
    prose: |
      **Divulgacao integrada a plataforma:**
      1. Portal interno de seguranca com a politica publicada e versionada.
      2. Banner de aceite no primeiro acesso a sistemas internos apos atualizacao
         da politica.
      3. Segregacao de conteudo por role: conteudo tecnico detalhado para engenharia,
         resumo executivo para areas de negocio.

      **Controle de acesso vinculado ao aceite:**
      4. Condicionar acesso a ambientes de producao a conclusao do treinamento de
         seguranca.
      5. Registro automatizado de aceite da politica por cada usuario.
      6. Revogacao automatica de acesso quando treinamento expira.

      **Terceiros na plataforma:**
      7. Onboarding de terceiros com aceite obrigatorio da politica antes de receber
         credenciais.
      8. Controles de acesso diferenciados para terceiros (least privilege, tempo
         limitado, monitoramento adicional).
      9. Termos de uso que referenciam a politica de seguranca cibernetica.
    tools:
      - identity-provider
      - learning-management-system
      - documentation-platform
  devsecops:
    prose: |
      **Politica no fluxo de desenvolvimento:**
      1. CONTRIBUTING.md e SECURITY.md no repositorio referenciando a politica.
      2. Pre-commit hooks que lembram desenvolvedores sobre secure coding guidelines.
      3. Merge request templates com checklist de seguranca.

      **Capacitacao tecnica:**
      4. Secure coding training especifico por linguagem/framework.
      5. Security champions que disseminam a politica dentro de cada squad.
      6. Workshops praticos de seguranca (hands-on labs) trimestrais.

      **Evidencias de divulgacao:**
      7. Quiz de seguranca obrigatorio no onboarding de novos devs.
      8. Registro de treinamentos concluidos por desenvolvedor.
      9. Metricas de cobertura de treinamento por equipe.

      **Terceiros desenvolvedores:**
      10. Contractual security requirements para fornecedores de software.
      11. Code review obrigatorio para contribuicoes de terceiros.
      12. Acesso limitado e monitorado para desenvolvedores externos.
    tools:
      - gitlab-merge-request-templates
      - learning-management-system
      - security-champions-program
  secops:
    prose: |
      **Programa de conscientizacao:**
      1. Security awareness training mensal com conteudo atualizado.
      2. Phishing simulation com metricas de taxa de clique por departamento.
      3. Newsletters de seguranca com alertas sobre ameacas a IPs (golpes PIX, fraudes).
      4. Campanhas tematicas (mes da seguranca, semana de privacidade).

      **Monitoramento de conformidade da divulgacao:**
      5. Dashboard de compliance: % de funcionarios que completaram treinamento.
      6. Alertas quando funcionarios ou terceiros nao concluem treinamento no prazo.
      7. Relatorios periodicos para diretoria sobre cobertura de conscientizacao.

      **Gestao de terceiros:**
      8. Inventario de terceiros com acesso a dados sensiveis de pagamento.
      9. Verificacao periodica de conformidade de terceiros com a politica.
      10. Processo de offboarding que revoga acessos e certifica devolucao de dados.
    tools:
      - phishing-simulation
      - learning-management-system
      - siem
      - vendor-risk-management
