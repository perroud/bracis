id: art-6
family: cap-2
title: "Plano de Acao e de Resposta a Incidentes"
class: BCB-85
statement:
  prose: |
    Art. 6. As instituições de pagamento referidas no art. 1 devem estabelecer plano de
    ação e de resposta a incidentes.

    Parágrafo único. O plano mencionado no caput deve abranger, no mínimo:
    I - as ações a serem desenvolvidas pela instituição para adequar suas estruturas
    organizacional e operacional aos princípios e às diretrizes da política de segurança
    cibernética;
    II - as rotinas, os procedimentos, os controles e as tecnologias a serem utilizados
    na prevenção e na resposta a incidentes, em conformidade com as diretrizes da política
    de segurança cibernética; e
    III - a área responsável pelo registro e controle dos efeitos de incidentes
    relevantes.
guidance:
  prose: |
    O art. 6 exige um plano de acao e de resposta a incidentes como documento obrigatorio
    separado (ou complementar) a politica de seguranca cibernetica.

    **Distincao entre plano de acao e plano de resposta:**
    O artigo combina dois conceitos:
    1. Plano de acao: como a IP vai adequar estruturas organizacional e operacional
       a politica (inciso I) — e um roadmap de implementacao
    2. Plano de resposta: como a IP vai prevenir e responder a incidentes
       (inciso II) — e o playbook operacional

    **Conteudo minimo:**
    - **Inciso I:** Acoes de adequacao. Deve conter cronograma, responsaveis, recursos
      e marcos de progresso. E a evidencia de que a IP esta ativamente implementando
      a politica, nao apenas documentando.
    - **Inciso II:** Rotinas, procedimentos, controles e tecnologias. Deve ser
      suficientemente detalhado para ser operacionalizado. Inclui prevencao (controles
      preventivos) e resposta (controles reativos).
    - **Inciso III:** Area responsavel. Deve existir uma area formalmente designada
      para registro e controle de efeitos de incidentes. Na pratica, e o SOC (Security
      Operations Center) ou CSIRT da IP.

    **Particularidade para IPs:**
    Incidentes em sistemas de pagamento podem ter impacto imediato em milhares de
    transacoes. O plano deve considerar cenarios como indisponibilidade do PIX,
    fraude em lote, comprometimento de chaves de criptografia de pagamento.

    **Relacao com outros artigos:**
    - Art. 9: detalha o plano de resposta a incidentes
    - Art. 10: comunicacao de incidentes ao BCB
    - Art. 11: relatorio anual de incidentes
implementation_guidance:
  platform_engineering:
    prose: |
      **I - Adequacao de estruturas (roadmap):**
      1. Roadmap de seguranca com milestones alinhados a politica, versionado em Git.
      2. Epics de seguranca no backlog da plataforma com tracking de progresso.
      3. Architecture Decision Records (ADRs) para decisoes de seguranca.
      4. Gap analysis automatizado entre estado atual e estado desejado da politica.

      **II - Prevencao:**
      5. WAF, IDS/IPS, DDoS protection em camadas de entrada de APIs de pagamento.
      6. Rate limiting e throttling em APIs de pagamento.
      7. Automated patching com janela de manutencao definida.
      8. Hardening automatizado de imagens base (CIS Benchmarks).

      **II - Resposta:**
      9. Incident management platform integrada com alerting.
      10. Runbooks automatizados para incidentes comuns (auto-remediation).
      11. Escalation policies com SLAs por severidade.
      12. War room virtual com comunicacao dedicada.

      **III - Area responsavel:**
      13. SOC/CSIRT com ferramentas integradas a plataforma.
      14. On-call rotation com cobertura 24x7 para sistemas de pagamento.
      15. Dashboards de incidentes em tempo real.
    tools:
      - incident-management
      - waf
      - ids-ips
      - ddos-protection
      - automated-patching
      - centralized-logging
  devsecops:
    prose: |
      **I - Adequacao no ciclo de desenvolvimento:**
      1. Security backlog com issues de adequacao priorizadas.
      2. Sprint allocation dedicado para remediacoes de seguranca.
      3. Metricas de progresso de adequacao nos dashboards de CI/CD.

      **II - Prevencao no pipeline:**
      4. SAST com bloqueio de merge em vulnerabilidades criticas.
      5. DAST automatizado em ambientes de staging.
      6. Dependency scanning com alertas de CVEs.
      7. Pre-commit hooks para prevencao de vazamento de segredos.

      **II - Resposta no desenvolvimento:**
      8. Processo de hotfix com SLA definido por severidade de vulnerabilidade.
      9. Rollback automatizado quando incidente e detectado em deploy.
      10. Feature flags para desativar funcionalidades de pagamento comprometidas.

      **III - Registro:**
      11. Integracao entre incident management e issue tracker.
      12. Post-mortem template obrigatorio para incidentes de seguranca.
      13. Lessons learned alimentando backlog de prevencao.
    tools:
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - feature-flags
      - incident-management
  secops:
    prose: |
      **II - Prevencao operacional:**
      1. Threat hunting proativo baseado em inteligencia de ameacas ao setor de pagamentos.
      2. Vulnerability management com ciclo de remediacao definido.
      3. Penetration testing periodico (minimo anual).
      4. Red team exercises para testar eficacia dos controles de pagamento.

      **II - Resposta a incidentes:**
      5. SOAR com playbooks para cada tipo de incidente (fraude, DDoS, ransomware,
         vazamento de dados de pagamento).
      6. Taxonomia de incidentes padronizada.
      7. Processo de triagem com criterios de severidade claros.
      8. Comunicacao de crise com templates pre-aprovados.
      9. Forense digital com preservacao de evidencias.

      **III - Registro e controle:**
      10. Incident tracking system com campos obrigatorios (causa, impacto, acoes).
      11. Metricas de incidentes: MTTD, MTTR, volume por tipo, tendencias.
      12. Relatorios periodicos para diretoria.
      13. Alimentacao do threat intelligence com indicadores de incidentes proprios.
    tools:
      - soar
      - siem
      - threat-intelligence
      - vulnerability-scanner
      - forensic-tools
      - penetration-testing
