id: art-14
family: cap-4
title: "Verificacao de Capacidade do Provedor de Nuvem"
class: BCB-85
statement:
  prose: |
    Art. 14. Previamente à contratação de serviços relevantes de processamento e
    armazenamento de dados e de computação em nuvem, as instituições de pagamento
    referidas no art. 1 devem verificar a capacidade do potencial prestador de serviços
    de assegurar:
    I - o cumprimento da legislação e da regulamentação em vigor;
    II - o acesso da instituição contratante aos dados e às informações a serem
    processados ou armazenados pelo prestador de serviços;
    III - a confidencialidade, a integridade, a disponibilidade e a recuperação dos
    dados e das informações processados ou armazenados pelo prestador de serviços;
    IV - a sua aderência às certificações exigidas pela instituição contratante para a
    prestação do serviço a ser contratado;
    V - o acesso do Banco Central do Brasil aos contratos e aos acordos firmados para a
    prestação de serviços, à documentação e às informações referentes aos serviços
    prestados, aos dados armazenados e às informações processadas; e
    VI - o provisionamento de recursos necessários à execução do plano de ação e de
    resposta a incidentes da instituição contratante.
guidance:
  prose: |
    O art. 14 exige due diligence previa a contratacao de servicos de nuvem.
    A IP deve verificar a capacidade do provedor ANTES de contratar.

    **Due diligence obrigatoria:**

    **I - Conformidade legal e regulatoria:**
    O provedor deve cumprir a legislacao brasileira e a regulamentacao do BCB.
    Inclui LGPD, Marco Civil da Internet, normas do BCB.

    **II - Acesso aos dados:**
    A IP deve ter acesso irrestrito aos seus proprios dados no provedor.
    Nao pode haver restricoes de acesso ou lock-in que impecam a IP de
    acessar, exportar ou migrar seus dados.

    **III - Triade CIA + recuperacao:**
    O provedor deve garantir confidencialidade, integridade, disponibilidade e
    capacidade de recuperacao. Para IPs, a disponibilidade e particularmente
    critica para servicos de pagamento 24x7.

    **IV - Certificacoes:**
    A IP define quais certificacoes exige do provedor. Comuns:
    - SOC 2 Type II
    - ISO 27001
    - PCI DSS (para provedores que processam dados de cartao)
    - CSA STAR

    **V - Acesso do BCB:**
    O provedor deve permitir acesso do BCB a contratos, documentacao e dados.
    Isso deve estar garantido contratualmente antes da contratacao.

    **VI - Suporte ao plano de resposta:**
    O provedor deve ter recursos para suportar o plano de resposta a incidentes
    da IP. Inclui capacidade de fornecer logs, snapshots, isolamento de recursos.
implementation_guidance:
  platform_engineering:
    prose: |
      **Due diligence tecnica:**
      1. Assessment de seguranca do provedor antes da contratacao.
      2. Verificacao de certificacoes (SOC 2, ISO 27001, PCI DSS).
      3. Teste de conectividade, latencia e disponibilidade.
      4. Avaliacao de SLAs oferecidos vs. requisitos da IP.

      **II - Acesso aos dados:**
      5. Teste de exportacao de dados em formato padrao.
      6. Verificacao de APIs de acesso e gerenciamento.
      7. Avaliacao de lock-in: formatos proprietarios, dependencias.
      8. Plano de migracao documentado antes da contratacao.

      **III - CIA + recuperacao:**
      9. Criptografia: verificacao de opcoes de criptografia em transito e repouso.
      10. Disponibilidade: SLA verificado com historico de uptime.
      11. Recuperacao: RPO/RTO do provedor documentado e validado.
      12. Backup: opcoes de backup e restauracao testadas.

      **IV - Certificacoes:**
      13. Repositorio de certificacoes de provedores.
      14. Alerta de vencimento de certificacoes.
      15. Verificacao anual de manutencao de certificacoes.

      **VI - Suporte a incidentes:**
      16. Verificacao de capacidade do provedor de fornecer logs e evidencias.
      17. Teste de isolamento de recursos em cenario de incidente.
      18. Verificacao de suporte tecnico e SLA de atendimento.
    tools:
      - cspm
      - cloud-governance
      - compliance-scanner
      - vendor-risk-management
  devsecops:
    prose: |
      **Avaliacao tecnica no pipeline:**
      1. Benchmark de seguranca do provedor (CIS Benchmarks) integrado ao pipeline.
      2. Verificacao automatica de configuracoes de seguranca do provedor.
      3. Testes de integracao com servicos do provedor incluindo cenarios de seguranca.

      **Portabilidade:**
      4. Avaliacao de portabilidade dos servicos do provedor.
      5. Abstraction layers para minimizar dependencia de servicos proprietarios.
      6. Testes de migracao entre provedores no pipeline.

      **Certificacoes no pipeline:**
      7. Policy-as-code que verifica se provedor possui certificacoes exigidas.
      8. Bloqueio de deploy em provedores sem certificacoes validas.
    tools:
      - checkov
      - tfsec
      - compliance-scanner
      - gitlab-ci
  secops:
    prose: |
      **Processo de due diligence:**
      1. Questionario de seguranca padronizado para provedores cloud.
      2. Assessment de riscos do provedor antes da contratacao.
      3. Verificacao de historico de incidentes do provedor.
      4. Analise de dependencias do provedor (subcontratados, cadeia de suprimentos).

      **Certificacoes e auditoria:**
      5. Coleta e revisao de relatorios SOC 2 Type II.
      6. Verificacao de certificacoes ISO 27001.
      7. Verificacao de conformidade PCI DSS quando aplicavel.
      8. Right to audit clause nos termos de servico.

      **Monitoramento pos-contratacao:**
      9. Revisao anual de certificacoes e status de conformidade do provedor.
      10. Monitoramento de incidentes reportados pelo provedor.
      11. Verificacao de SLAs contra metricas reais de disponibilidade.
      12. Reavaliacao de risco quando houver mudanca significativa no provedor.
    tools:
      - grc-platform
      - vendor-risk-management
      - compliance-scanner
      - penetration-testing
