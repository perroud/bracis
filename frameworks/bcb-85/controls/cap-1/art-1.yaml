id: art-1
family: cap-1
title: "Objeto da Resolucao"
class: BCB-85
baselines: [todas-ips]
statement:
  prose: |
    Art. 1. Esta Resolução dispõe sobre a política de segurança cibernética e sobre os
    requisitos para a contratação de serviços de processamento e armazenamento de dados e
    de computação em nuvem a serem observados pelas instituições de pagamento autorizadas
    a funcionar pelo Banco Central do Brasil.
guidance:
  prose: |
    O art. 1 define o objeto duplo da resolucao:
    1. Politica de seguranca cibernetica (Capitulos 2 e 3)
    2. Requisitos para contratacao de servicos de nuvem (Capitulo 4)

    **Escopo regulatorio:**
    A resolucao trata especificamente de seguranca cibernetica, que abrange ameacas
    digitais, ataques a sistemas, protecao de dados em meios eletronicos e resiliencia
    cibernetica. Nao se limita a seguranca da informacao generica.

    **Servicos abrangidos:**
    A resolucao cobre tres categorias de servicos em nuvem:
    - Processamento de dados: qualquer operacao computacional sobre dados (IaaS, PaaS, SaaS)
    - Armazenamento de dados: persistencia de dados em infraestrutura de terceiros
    - Computacao em nuvem: uso de recursos computacionais provisionados remotamente

    **Sujeitos regulados — Instituicoes de Pagamento (IPs):**
    Exclusivamente as instituicoes de pagamento autorizadas a funcionar pelo BCB, incluindo:
    - Emissores de moeda eletronica
    - Emissores de instrumento de pagamento pos-pago
    - Credenciadoras (adquirentes)
    - Iniciadores de transacao de pagamento
    - Fintechs de pagamento autorizadas
    - Demais IPs que participam de arranjos de pagamento

    **Distincao da Resolucao CMN 4.893:**
    A Resolucao BCB 85 espelha a estrutura e o conteudo da Resolucao CMN 4.893/2021,
    porem aplica-se especificamente a instituicoes de pagamento. A CMN 4.893 regula
    instituicoes financeiras (bancos, cooperativas de credito, corretoras). Ambas possuem
    exigencias substancialmente identicas, diferindo apenas no publico regulado.

    **Implicacao pratica:**
    Qualquer instituicao de pagamento que possua autorizacao de funcionamento pelo BCB
    deve cumprir integralmente esta resolucao. Nao ha excecao por porte, modelo de negocio
    ou tipo de servico oferecido — embora a proporcionalidade seja prevista no art. 2.
implementation_guidance:
  platform_engineering:
    prose: |
      **Mapeamento de escopo:**
      1. Inventario completo de todos os servicos de processamento, armazenamento e
         computacao em nuvem contratados pela instituicao de pagamento.
      2. Classificacao de cada servico nas categorias da resolucao (processamento,
         armazenamento, computacao).
      3. Mapeamento de provedores de nuvem (publicos, privados, hibridos) com
         detalhamento de servicos utilizados.
      4. Registro centralizado de contratos de servicos de nuvem com metadados
         regulatorios (data, provedor, localizacao, dados tratados).

      **Infraestrutura de conformidade:**
      5. Landing zone segura com controles de seguranca cibernetica embutidos.
      6. Cloud Asset Inventory automatizado (AWS Config, Azure Resource Graph, GCP Asset Inventory).
      7. Tagging obrigatorio de recursos com classificacao regulatoria.
      8. Dashboard de conformidade com a Resolucao BCB 85 em tempo real.

      **Particularidades de IPs:**
      9. Monitoramento especifico de infraestrutura que processa transacoes de pagamento
         (PIX, TED, cartoes, boletos).
      10. Segregacao de ambientes de producao para processamento de pagamentos.
      11. Garantia de disponibilidade de servicos de pagamento com SLAs regulatorios.
    tools:
      - cloud-asset-inventory
      - cmdb
      - compliance-scanner
      - tagging-policies
  devsecops:
    prose: |
      **Consciencia regulatoria no desenvolvimento:**
      1. Documentacao dos requisitos da Resolucao BCB 85 acessivel a toda equipe de
         desenvolvimento.
      2. Checklist de seguranca cibernetica integrado ao processo de code review.
      3. Security champions com conhecimento da resolucao em cada squad.

      **Pipeline com controles regulatorios:**
      4. Verificacao automatica de que todo deploy em nuvem esta mapeado no inventario.
      5. Bloqueio de deploy em provedores ou regioes nao aprovados.
      6. Tag enforcement no pipeline de IaC para garantir rastreabilidade regulatoria.
      7. Alertas quando novo servico de nuvem e provisionado fora do inventario.

      **Especificidades de pagamentos:**
      8. Testes de seguranca especificos para APIs de pagamento (PIX, Open Finance).
      9. Validacao de conformidade PCI DSS quando aplicavel a fluxos de cartao.
    tools:
      - gitlab-ci
      - checkov
      - opa-gatekeeper
      - policy-engine
  secops:
    prose: |
      **Gestao do escopo regulatorio:**
      1. Inventario atualizado de todos os servicos de nuvem da instituicao de pagamento.
      2. Revisao trimestral do inventario para identificar shadow IT em nuvem.
      3. Processo formal de aprovacao para contratacao de novos servicos de nuvem.
      4. Comunicacao ao BCB conforme art. 16 quando aplicavel.

      **Monitoramento de conformidade:**
      5. Assessment periodico de conformidade com todos os capitulos da resolucao.
      6. Gap analysis com plano de remediacao priorizado.
      7. Relatorio de conformidade para a diretoria (art. 17).
      8. Retencao de evidencias de conformidade por 5 anos (minimo).

      **Monitoramento de transacoes de pagamento:**
      9. Monitoramento de fraudes e transacoes anomalas em tempo real.
      10. Alertas para interrupcoes de servicos de pagamento criticos.
    tools:
      - grc-platform
      - cmdb
      - asset-inventory
      - compliance-scanner
