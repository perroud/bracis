id: art-2
family: cap-1
title: "Ambito de Aplicacao e Proporcionalidade"
class: BCB-85
baselines: [todas-ips]
statement:
  prose: |
    Art. 2. As instituições de pagamento referidas no art. 1 devem implementar a política
    de segurança cibernética e os requisitos para a contratação de serviços de processamento
    e armazenamento de dados e de computação em nuvem, observando o princípio da
    proporcionalidade ao:
    I - porte da instituição;
    II - perfil de risco da instituição;
    III - modelo de negócio da instituição;
    IV - natureza das operações e complexidade dos produtos, serviços, atividades
    e processos da instituição; e
    V - sensibilidade dos dados e das informações sob responsabilidade da instituição.
guidance:
  prose: |
    O art. 2 estabelece o principio da proporcionalidade, que e o calibrador de toda a
    resolucao. Nao exige controles identicos para todas as instituicoes de pagamento,
    mas sim controles proporcionais a cinco fatores.

    **Os cinco fatores de proporcionalidade:**

    **I - Porte:**
    Uma credenciadora que processa bilhoes em transacoes deve ter controles muito mais
    robustos que um pequeno emissor de moeda eletronica. Porte se mede por volume de
    transacoes processadas, numero de clientes, receita e ativos totais.

    **II - Perfil de risco:**
    Instituicoes de pagamento que operam com PIX instantaneo, transferencias
    internacionais ou criptoativos possuem perfil de risco distinto de uma IP que
    apenas emite boletos. O perfil de risco inclui risco operacional, risco cibernetico,
    risco de fraude e risco reputacional.

    **III - Modelo de negocio:**
    Uma IP 100% digital tem superficie de ataque diferente de uma que opera com
    maquininhas fisicas (POS). O modelo de negocio determina os vetores de ataque
    mais relevantes e os controles prioritarios.

    **IV - Natureza e complexidade:**
    Operacoes com PIX, Open Finance, cartoes pre-pagos, pos-pagos, contas de pagamento,
    transferencias internacionais — cada produto adiciona complexidade e exige controles
    especificos.

    **V - Sensibilidade dos dados:**
    Dados de transacoes de pagamento, dados de cartao, dados pessoais, dados biometricos
    utilizados em autenticacao de pagamentos exigem protecoes diferenciadas.

    **Implicacao pratica:**
    O principio da proporcionalidade nao e uma desculpa para fazer menos. E uma
    diretriz para fazer o que e adequado ao perfil da IP. Em auditoria, o BCB avalia
    se os controles sao proporcionais, e pode exigir mais se considerar que a
    instituicao subestimou seus riscos.
implementation_guidance:
  platform_engineering:
    prose: |
      **Framework de proporcionalidade:**
      1. Definir niveis de maturidade de seguranca (baseline, intermediario, avancado)
         alinhados ao porte e perfil de risco da instituicao de pagamento.
      2. Classificacao de ativos por criticidade (missao critica, importante, suporte).
      3. Classificacao de dados por sensibilidade (publico, interno, confidencial, restrito).
      4. Controles diferenciados por classificacao de ativo e dado.

      **Porte e complexidade (I, IV):**
      5. Arquitetura de seguranca escalavel conforme crescimento do volume de transacoes.
      6. Automacao de controles proporcional ao throughput de pagamentos processados.
      7. Capacidade de processamento de seguranca dimensionada ao volume de transacoes.

      **Perfil de risco e modelo de negocio (II, III):**
      8. Threat modeling especifico para o modelo de negocio da IP (PIX, cartoes, wallets).
      9. Controles de seguranca customizados por tipo de servico de pagamento.
      10. Segmentacao de rede proporcional a superficie de ataque.

      **Sensibilidade dos dados (V):**
      11. Data classification engine automatizado para dados de pagamento.
      12. Criptografia diferenciada por classificacao de dado.
      13. Controles de acesso granulares baseados em classificacao.
      14. DLP proporcional a sensibilidade dos dados de transacoes tratados.
    tools:
      - data-classification
      - risk-management-platform
      - network-policies
      - vault
      - dlp
  devsecops:
    prose: |
      **Proporcionalidade no pipeline:**
      1. Security gates diferenciados por criticidade do servico de pagamento.
      2. Servicos classificados como criticos (processamento de pagamentos) exigem
         SAST, DAST, SCA e penetration testing.
      3. Servicos de suporte podem ter gates simplificados (SAST + SCA).
      4. Scan de segredos obrigatorio para todos os servicos, independente da classificacao.

      **Classificacao no codigo:**
      5. Labels de classificacao em repositorios (critico, importante, suporte).
      6. Pipelines diferenciados por label de classificacao.
      7. Code review obrigatorio por security champion para servicos de pagamento.
      8. Aprovacao de CISO para deploy de servicos que processam dados de transacoes.

      **Threat modeling proporcional (II, III):**
      9. Threat modeling obrigatorio para features que afetam fluxos de pagamento.
      10. STRIDE analysis para novos servicos proporcionalmente ao risco.
      11. Revisao de seguranca proporcional ao impacto da mudanca em pagamentos.
    tools:
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - threat-modeling
      - semgrep
  secops:
    prose: |
      **Avaliacao de proporcionalidade:**
      1. Assessment anual dos cinco fatores de proporcionalidade (porte, risco, modelo,
         complexidade, sensibilidade).
      2. Benchmark com instituicoes de pagamento de perfil similar.
      3. Gap analysis entre controles implementados e nivel de proporcionalidade exigido.
      4. Relatorio de proporcionalidade para a diretoria.

      **Monitoramento proporcional:**
      5. Nivel de monitoramento em SIEM proporcional a criticidade do ativo.
      6. SLAs de resposta a incidentes diferenciados por impacto e criticidade.
      7. Equipe de seguranca dimensionada ao perfil de risco.
      8. Budget de seguranca proporcional ao porte e complexidade.

      **Revisao periodica:**
      9. Reavaliacao de proporcionalidade quando houver mudanca significativa
         (novo produto de pagamento, aquisicao, mudanca de porte).
      10. Documentacao das decisoes de proporcionalidade para auditoria.
      11. Justificativa formal quando controles forem simplificados por proporcionalidade.
    tools:
      - grc-platform
      - risk-management-platform
      - siem
      - reporting-platform
