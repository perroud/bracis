id: a7.1
family: a7
title: "Physical security perimeters"
class: ISO27001

statement:
  prose: >-
    Security perimeters shall be defined and used to protect areas that
    contain information and other associated assets.

guidance:
  prose: >-
    The following guidelines should be considered for physical security
    perimeters: defining security perimeters and the siting and strength
    of each of the perimeters depending on the security requirements of
    the assets within the perimeter and the results of a risk assessment;
    having physically sound perimeters for the building or site containing
    information processing facilities (i.e. there should be no gaps in
    the perimeter or areas where a break-in could easily occur); the
    external walls of the site should be of solid construction and all
    external doors should be suitably protected against unauthorized
    access, for example by control mechanisms such as bars, alarms,
    locks; doors and windows should be locked when unattended and
    external protection should be considered for windows, particularly
    at ground level. Physical access control should be provided by
    a manned reception area or other means to control physical access
    to the site or building. Access to sites and buildings should be
    restricted to authorized personnel only. Physical barriers should,
    where applicable, be built to prevent unauthorized physical access
    and environmental contamination. All fire doors on a security
    perimeter should be alarmed, monitored and tested in conjunction
    with the walls to establish the required level of resistance.
    Suitable intruder detection systems should be installed and
    regularly tested to cover all external doors and accessible windows.

references:
  - citation: "ISO/IEC 27002:2022, 7.1"
    url: "https://www.iso.org/standard/75652.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      For cloud and colocation deployments, verify cloud provider and
      data center physical security certifications (SOC 2 Type II,
      ISO 27001) as part of vendor assessment. Maintain an inventory
      of all physical locations where organizational data is processed
      or stored, including cloud regions. For on-premises infrastructure
      components (e.g., edge nodes, build runners), ensure they are
      deployed in physically secured areas with access logging.
      Implement infrastructure-as-code templates that tag cloud
      resources with their physical region and compliance zone.
    tools:
      - terraform
      - backstage
      - cloud-custodian

  devsecops:
    prose: >-
      Ensure build agents, self-hosted runners, and artifact repositories
      that handle sensitive code or secrets are deployed in physically
      secured environments. For on-premises GitLab runners or build
      infrastructure, verify they are within the physical security
      perimeter. Enforce that CI/CD pipelines processing classified
      or sensitive workloads execute only on runners located in
      approved physical zones. Document physical security requirements
      for build infrastructure in the pipeline security policy.
    tools:
      - gitlab-ci

  secops:
    prose: >-
      Integrate physical access control system (PACS) logs into the
      SIEM for correlation with logical access events. Configure
      alerts for after-hours physical access to data centers and
      server rooms. Implement video surveillance monitoring with
      retention policies aligned to the organization's requirements.
      Correlate physical access anomalies (e.g., tailgating, unusual
      hours) with network activity to detect potential insider threats.
    tools:
      - splunk
      - elastic-siem
      - genetec
      - lenel

legal_references:
