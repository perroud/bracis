id: a6.1
family: a6
title: "Screening"
class: ISO27001

statement:
  prose: >-
    Background verification checks on all candidates to become personnel
    shall be carried out prior to joining the organization and on an
    ongoing basis taking into consideration applicable laws, regulations
    and ethics and be proportional to the business requirements, the
    classification of the information to be accessed and the perceived
    risks.

guidance:
  prose: >-
    Verification checks should take into account all relevant privacy,
    protection of personally identifiable information, and employment-based
    legislation. Where legally permissible, verification checks should
    include the following: availability of satisfactory character references,
    verification of the applicant's curriculum vitae (completeness and
    accuracy), confirmation of claimed academic and professional
    qualifications, independent identity verification (passport or similar
    document), more detailed verification such as credit review or criminal
    record review. Where an individual is hired for a specific information
    security role, organizations should ensure that the candidate has the
    competence necessary to perform the security role and can be trusted
    to fulfil the role, especially if the role is critical for the
    organization. The same screening process should be applied to
    contractors and temporary staff. Where these are provided through
    an agency, the contract with the agency should clearly specify
    the agency's responsibilities for screening.

references:
  - citation: "ISO/IEC 27002:2022, 6.1"
    url: "https://www.iso.org/standard/75652.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      While screening is primarily an HR process, platform engineering
      supports it by maintaining identity lifecycle management systems
      that integrate with HR onboarding workflows. Ensure that access
      provisioning to platform resources is gated by completed screening
      status in the HR system. Implement automated workflows that
      prevent identity creation and access grants until screening
      clearance is confirmed. Maintain audit trails of the screening-to-access
      provisioning chain.
    tools:
      - keycloak
      - backstage
      - terraform

  devsecops:
    prose: >-
      Enforce that new developer accounts in source code management
      systems are only provisioned after HR screening clearance.
      Implement automated onboarding pipelines that gate repository
      access and CI/CD permissions on confirmed screening status.
      For contractors and external contributors, enforce separate
      access tiers with reduced permissions until full screening
      is completed. Require signed contributor license agreements
      (CLAs) for external contributors.
    tools:
      - gitlab-ci
      - keycloak

  secops:
    prose: >-
      Monitor for accounts provisioned without completed screening
      by correlating identity management system events with HR
      clearance records. Alert on access grants to sensitive
      systems for personnel whose screening status is incomplete
      or expired. Implement periodic reconciliation between HR
      screening records and active system accounts to identify
      gaps.
    tools:
      - splunk
      - elastic-siem

legal_references:
  - framework_id: nist-800-53
    articles: ["PS-3", "PS-7"]
    relationship: equivalent-to
  - framework_id: gdpr
    articles: ["art-6", "art-9"]
    relationship: supports
