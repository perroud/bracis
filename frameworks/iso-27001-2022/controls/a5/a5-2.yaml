id: a5.2
family: a5
title: "Information security roles and responsibilities"
class: ISO27001

statement:
  prose: >-
    Information security roles and responsibilities shall be defined and
    allocated.

guidance:
  prose: >-
    Allocation of information security roles and responsibilities should be
    done in accordance with the information security policy. Responsibilities
    for the protection of individual assets and for carrying out specific
    information security processes should be identified. Responsibilities for
    information security risk management activities and in particular for
    acceptance of residual risks should be defined. Activities that cannot
    be performed by the same person or group should be segregated to reduce
    opportunities for unauthorized or unintentional modification or misuse
    of the organization's assets. Areas and assets for which each person or
    role is responsible should be defined. Authorization levels should be
    defined and documented. Individuals assigned a security role should be
    competent in the area and given opportunities to keep up to date with
    developments.

references:
  - citation: "ISO/IEC 27002:2022, 5.2"
    url: "https://www.iso.org/standard/75652.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement role-based access control (RBAC) across the internal developer
      platform with clearly defined roles such as platform-admin, developer,
      security-reviewer, and auditor. Use Kubernetes RBAC, cloud IAM policies,
      and identity provider group mappings to enforce segregation of duties.
      Document role definitions in a central service catalog (e.g., Backstage)
      with ownership metadata for every service and infrastructure component.
      Enforce that infrastructure changes require approval from designated
      security roles.
    tools:
      - kubernetes-rbac
      - backstage
      - keycloak
      - vault
      - terraform

  devsecops:
    prose: >-
      Enforce segregation of duties in CI/CD pipelines by requiring that
      code authors cannot approve their own merge requests. Configure
      protected branches with mandatory code owners from security teams.
      Implement CODEOWNERS files that map security-sensitive directories
      to designated reviewers. Use pipeline permissions to restrict who
      can trigger production deployments versus development builds.
    tools:
      - gitlab-ci
      - github-actions
      - codeowners

  secops:
    prose: >-
      Define and enforce distinct roles within security operations: SOC
      analyst tiers (L1/L2/L3), incident commander, threat hunter, and
      forensic analyst. Configure SIEM and SOAR platforms with role-based
      dashboards and action permissions. Ensure that alert triage,
      escalation, and remediation follow defined responsibility
      assignments documented in runbooks. Audit role assignments quarterly
      and after any organizational change.
    tools:
      - splunk
      - cortex-xsoar
      - pagerduty
      - opsgenie

