id: a5.36
family: a5
title: "Compliance with policies, rules and standards for information security"
class: ISO27001

statement:
  prose: >-
    Compliance with the organization's established information security
    policy, topic-specific policies, rules and standards shall be
    regularly reviewed.

guidance:
  prose: >-
    Managers should regularly review the compliance of information
    processing and procedures within their area of responsibility with
    the appropriate security policies, standards and any other security
    requirements. If any non-compliance is found as a result of the
    review, managers should identify causes of the non-compliance,
    evaluate the need for actions to ensure that non-compliance does
    not recur, determine and implement appropriate corrective action,
    and review the corrective action taken. Results of reviews and
    corrective actions carried out by managers should be recorded
    and these records should be maintained. Managers should report
    the results of reviews to the person carrying out the independent
    review when independent review takes place in their area.
    Technical compliance should be reviewed, preferably with the
    assistance of automated tools which generate technical reports
    for subsequent interpretation by a technical specialist.

references:
  - citation: "ISO/IEC 27002:2022, 5.36"
    url: "https://www.iso.org/standard/75652.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement continuous compliance monitoring as a platform capability.
      Deploy policy-as-code engines (OPA Gatekeeper, Kyverno) that enforce
      compliance rules in real time and generate audit reports. Build
      compliance dashboards in the internal developer portal showing
      per-service and per-team compliance posture. Automate CIS benchmark
      scanning for all infrastructure components. Generate compliance
      drift reports that compare current state against defined baselines
      and send them to responsible managers on a scheduled cadence.
    tools:
      - open-policy-agent
      - kyverno
      - backstage
      - prowler
      - kube-bench
      - cloud-custodian

  devsecops:
    prose: >-
      Enforce compliance gates in CI/CD pipelines that block deployments
      when security policy violations are detected. Generate compliance
      reports as pipeline artifacts that auditors can review. Track
      compliance metrics over time: vulnerability SLA adherence,
      policy violation trends, and remediation timelines. Implement
      automated evidence collection that maps pipeline activities to
      specific compliance requirements, creating an auditable trail
      from code commit to production deployment.
    tools:
      - gitlab-ci
      - sonarqube
      - trivy
      - checkov
      - defectdojo

  secops:
    prose: >-
      Build compliance dashboards in the SIEM that show real-time
      adherence to security policies across the organization. Automate
      non-compliance detection with correlation rules that identify
      systems deviating from required configurations. Schedule and
      automate periodic compliance scans with results fed into the
      SIEM for trending analysis. Create automated workflows that
      notify responsible managers of non-compliance findings and
      track remediation through to closure.
    tools:
      - splunk
      - elastic-siem
      - wazuh
      - nessus
      - qualys

legal_references:
  - framework_id: nist-800-53
    articles: ["CA-2", "CA-7", "PM-6"]
    relationship: equivalent-to
  - framework_id: soc-2
    articles: ["CC4.1", "CC4.2"]
    relationship: supports
