id: a5.1
family: a5
title: "Policies for information security"
class: ISO27001

statement:
  prose: >-
    Information security policy and topic-specific policies shall be defined,
    approved by management, published, communicated to and acknowledged by
    relevant personnel and relevant interested parties, and reviewed at planned
    intervals or if significant changes occur.

guidance:
  prose: >-
    At the highest level, the organization should define an information security
    policy that is approved by top management and that sets out the organization's
    approach to managing its information security objectives. Topic-specific
    policies should address the needs of certain target groups within an
    organization or cover certain subjects. Topic-specific policies should
    typically address access control, physical and environmental security,
    asset management, information transfer, secure configuration and handling
    of user endpoint devices, networking security, information security incident
    management, backup, cryptography and key management, information classification
    and handling, management of technical vulnerabilities, and secure development.
    Policies should be reviewed at planned intervals, or if significant changes
    occur, to ensure their continuing suitability, adequacy, and effectiveness.

references:
  - citation: "ISO/IEC 27002:2022, 5.1"
    url: "https://www.iso.org/standard/75652.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Codify information security policies as machine-readable policy-as-code
      artifacts stored in version-controlled repositories. Use OPA/Rego,
      Kyverno, or Sentinel to enforce policies automatically across
      infrastructure provisioning and runtime. Maintain a central policy
      repository that serves as the single source of truth, with automated
      distribution to all platform components. Implement GitOps workflows
      where policy changes require pull request review and approval before
      being applied.
    tools:
      - open-policy-agent
      - kyverno
      - hashicorp-sentinel
      - git
      - backstage

  devsecops:
    prose: >-
      Integrate policy validation into CI/CD pipelines so that builds fail
      if they violate organizational security policies. Use linting and
      scanning tools to ensure code, infrastructure definitions, and
      container images comply with policy requirements before deployment.
      Store policies alongside application code with versioning, and trigger
      automated reviews when policies are updated. Ensure developers receive
      clear, actionable feedback when a policy violation is detected.
    tools:
      - gitlab-ci
      - checkov
      - tfsec
      - trivy
      - semgrep
      - sonarqube

  secops:
    prose: >-
      Map information security policies to detection rules and compliance
      dashboards in the SIEM. Create alerts for policy deviations detected
      at runtime. Maintain a policy compliance dashboard that shows
      real-time adherence status across the organization. Schedule
      periodic automated audits that compare actual system configurations
      against published policies and generate exception reports.
    tools:
      - splunk
      - elastic-siem
      - wazuh
      - chronicle

legal_references:
