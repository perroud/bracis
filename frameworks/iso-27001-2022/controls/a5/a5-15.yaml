id: a5.15
family: a5
title: "Access control"
class: ISO27001

statement:
  prose: >-
    Rules to control physical and logical access to information and other
    associated assets shall be established and implemented based on business
    and information security requirements.

guidance:
  prose: >-
    Asset owners should determine appropriate access control rules, access
    rights and restrictions for specific user roles towards their assets,
    with the amount of detail and the strictness of the controls reflecting
    the associated information security risks. Access controls are both
    logical and physical and these should be considered together. Users and
    service providers should be given a clear statement of the business
    requirements to be met by access controls. The policy should take
    account of the following: security requirements of business
    applications, consistency between the access rights and information
    classification, applicable legislation and any contractual
    obligations regarding limitation of access to data or services,
    management of access rights in a distributed and networked environment,
    segregation of access control roles (e.g. access request, access
    authorization, access administration), requirements for formal
    authorization of access requests, requirements for periodic review
    of access rights, and removal of access rights.

references:
  - citation: "ISO/IEC 27002:2022, 5.15"
    url: "https://www.iso.org/standard/75652.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a zero-trust access model across the platform using identity-aware
      proxies and service mesh authentication. Deploy centralized identity
      management (IdP) integrated with all platform services via OIDC/SAML.
      Enforce least-privilege access using Kubernetes RBAC, cloud IAM policies,
      and namespace-level isolation. Implement just-in-time (JIT) access for
      privileged operations with automatic expiration. Use admission controllers
      to prevent pods from running with elevated privileges unless explicitly
      approved. Maintain a complete inventory of access grants with automated
      periodic access reviews.
    tools:
      - keycloak
      - vault
      - kubernetes-rbac
      - istio
      - spiffe-spire
      - open-policy-agent
      - teleport

  devsecops:
    prose: >-
      Enforce access controls in the development lifecycle by configuring
      protected branches, requiring merge request approvals, and restricting
      direct pushes to production branches. Use project-level and group-level
      permissions to segregate access between development, staging, and
      production environments. Store secrets in vaults, never in code
      repositories. Implement pipeline-level access controls that restrict
      which jobs can access production credentials. Scan for hardcoded
      secrets in CI pipelines using secret detection tools.
    tools:
      - gitlab-ci
      - vault
      - git-secrets
      - gitleaks
      - trivy

  secops:
    prose: >-
      Monitor all access control events in the SIEM, including authentication
      successes and failures, privilege escalations, access right modifications,
      and anomalous access patterns. Implement user and entity behavior analytics
      (UEBA) to detect compromised credentials and insider threats. Automate
      access review workflows that flag dormant accounts, excessive privileges,
      and orphaned service accounts. Configure real-time alerts for
      unauthorized access attempts to critical assets.
    tools:
      - splunk
      - elastic-siem
      - crowdstrike
      - sentinel
      - wazuh

