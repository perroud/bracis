id: a8.25
family: a8
title: "Secure development life cycle"
class: ISO27001

statement:
  prose: >-
    Rules for the secure development of software and systems shall be
    established and applied.

guidance:
  prose: >-
    Secure development is a requirement for building secure service,
    architecture, software and systems. The following aspects should be
    considered within a topic-specific policy on secure development:
    security of the development environment; guidance on the security
    in the software development methodology (e.g. a secure software
    development life cycle); secure coding guidelines for each
    programming language used; security requirements in the
    specification and design phase; security checkpoints within the
    projects; system and security testing (e.g. regression testing,
    code scanning); secure repositories for source code and
    configuration; security in version control; required application
    security knowledge and training; developers' capability to avoid,
    finding and fixing vulnerabilities. Secure coding techniques
    should be used for both new developments as well as in code
    reuse situations. If code is obtained from external sources
    or open source, the organization should consider evaluating
    such code before using it.

references:
  - citation: "ISO/IEC 27002:2022, 8.25"
    url: "https://www.iso.org/standard/75652.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Provide secure-by-default development infrastructure through the
      internal developer platform: pre-hardened base images, golden
      path templates for new services, integrated security scanning
      in developer workflows, and centrally managed secrets injection.
      Implement a service catalog with security-reviewed blueprints
      that developers use to scaffold new applications. Enforce that
      all services deployed to the platform pass through a defined
      security pipeline that includes SAST, SCA, container scanning,
      and IaC scanning. Provide developers with self-service access
      to security tools integrated into their IDE and development
      workflow.
    tools:
      - backstage
      - harbor
      - vault
      - gitlab-ci
      - sonarqube
      - trivy

  devsecops:
    prose: >-
      Implement a full secure development pipeline with security gates
      at every stage. Pre-commit: secret detection, linting. Build:
      SAST, SCA/dependency scanning, license compliance. Package:
      container image scanning, SBOM generation, artifact signing.
      Deploy: IaC scanning, dynamic application security testing.
      Post-deploy: runtime monitoring, penetration testing. Enforce
      that security findings above a severity threshold block pipeline
      progression. Implement code review requirements that include
      security-focused reviewers for high-risk changes. Track security
      technical debt alongside functional debt with defined SLAs
      for remediation.
    tools:
      - gitlab-ci
      - sonarqube
      - semgrep
      - trivy
      - snyk
      - gitleaks
      - cosign
      - syft
      - defectdojo

  secops:
    prose: >-
      Monitor production applications for indicators of insecure
      development practices: runtime errors from missing input
      validation, SQL injection attempts succeeding, authentication
      bypass attempts. Integrate application security monitoring
      (ASM) and runtime application self-protection (RASP) into
      production deployments. Feed security test results from
      the SDLC into the SIEM for correlation with runtime
      events. Track the mean-time-to-fix for security findings
      across the development lifecycle and report trends to
      management.
    tools:
      - splunk
      - elastic-siem
      - defectdojo
      - datadog
      - dynatrace

legal_references:
  - framework_id: nist-800-53
    articles: ["SA-3", "SA-8", "SA-11", "SA-15"]
    relationship: equivalent-to
  - framework_id: soc-2
    articles: ["CC8.1"]
    relationship: supports
