id: a8.28
family: a8
title: "Secure coding"
class: ISO27001

statement:
  prose: >-
    Secure coding principles shall be applied to software development.

guidance:
  prose: >-
    The organization should establish organization-wide processes to
    provide governance and ensure that secure coding practices are being
    used. The organization should determine a minimum baseline of
    secure coding practices and apply them to all software development.
    Additional secure coding practices should be determined and
    required when the software is part of a critical information
    system, is processing personal data, or has a high business
    value. Secure coding principles include: planning and pre-coding
    (minimum security requirements, known attack patterns, threat
    modelling); coding (use of secure coding techniques such as
    input validation, secure error handling, cryptography usage,
    access control implementation, avoiding well-known vulnerabilities
    as documented in OWASP Top 10, SANS Top 25, etc.); review and
    maintenance (code reviews, secure coding verification, secure
    change management). Secure coding practices should address
    working with third-party libraries and open-source software:
    managing the use of external libraries and components,
    ensuring the integrity of external components, and license
    compliance.

references:
  - citation: "ISO/IEC 27002:2022, 8.28"
    url: "https://www.iso.org/standard/75652.html"
  - citation: "OWASP Top 10"
    url: "https://owasp.org/www-project-top-ten/"
  - citation: "CWE/SANS Top 25"
    url: "https://cwe.mitre.org/top25/"

implementation_guidance:
  platform_engineering:
    prose: >-
      Provide centrally maintained, security-hardened libraries and
      SDKs that implement common security patterns: authentication
      middleware, input validation libraries, secure logging wrappers,
      and cryptography abstractions. Maintain a curated internal
      package registry with pre-vetted dependencies. Enforce that
      all applications use platform-provided security libraries
      for authentication, authorization, and data encryption rather
      than implementing their own. Publish secure coding standards
      as documentation in the developer portal and validate
      adherence through automated pipeline checks.
    tools:
      - backstage
      - harbor
      - artifactory
      - sonarqube
      - semgrep

  devsecops:
    prose: >-
      Enforce secure coding standards through automated static analysis
      in CI pipelines. Configure SAST tools with custom rules aligned
      to the organization's secure coding guidelines. Implement
      multi-layer code scanning: IDE plugins for immediate developer
      feedback, pre-commit hooks for local validation, and CI pipeline
      gates for enforcement. Scan for OWASP Top 10 and CWE Top 25
      vulnerabilities at a minimum. Require security-focused code
      review for changes to authentication, authorization, input
      validation, cryptography, and data handling modules. Block
      merges when critical or high-severity SAST findings are
      present. Track secure coding metrics: finding density per
      line of code, fix rate, and recurrence rate.
    tools:
      - sonarqube
      - semgrep
      - codeql
      - gitlab-sast
      - snyk-code
      - checkmarx
      - bandit
      - eslint-security

  secops:
    prose: >-
      Monitor production for exploitation of coding vulnerabilities:
      SQL injection, cross-site scripting, command injection, and
      deserialization attacks. Deploy web application firewalls (WAF)
      as a defense layer and feed WAF logs into the SIEM for analysis.
      Correlate SAST findings from the development pipeline with
      runtime exploitation attempts to prioritize remediation of
      actually exploitable vulnerabilities. Conduct periodic
      penetration testing focused on application-layer vulnerabilities
      and feed results back into the secure coding improvement cycle.
    tools:
      - splunk
      - elastic-siem
      - cloudflare-waf
      - akamai
      - burp-suite
      - zap

