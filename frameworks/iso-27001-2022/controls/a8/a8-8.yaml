id: a8.8
family: a8
title: "Management of technical vulnerabilities"
class: ISO27001

statement:
  prose: >-
    Information about technical vulnerabilities of information systems
    in use shall be obtained, the organization's exposure to such
    vulnerabilities shall be evaluated and appropriate measures shall
    be taken.

guidance:
  prose: >-
    A current and complete inventory of assets is a prerequisite for
    effective technical vulnerability management. Specific information
    needed to support technical vulnerability management includes the
    software vendor, version numbers, current state of deployment,
    and the persons within the organization responsible for the software.
    The organization should define and establish the roles and
    responsibilities associated with technical vulnerability management
    including vulnerability monitoring, vulnerability risk assessment,
    patching, asset tracking, and any coordination responsibilities
    required. The organization should define a timeline to react to
    notifications of potentially relevant technical vulnerabilities.
    Once a potential technical vulnerability has been identified, the
    organization should identify the associated risks and the actions
    to be taken. Such action could involve patching of vulnerable
    systems, applying compensating controls, accepting the risk,
    or simply recording the vulnerability.

references:
  - citation: "ISO/IEC 27002:2022, 8.8"
    url: "https://www.iso.org/standard/75652.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated vulnerability scanning across all platform
      layers: container images, Kubernetes clusters, cloud infrastructure,
      and dependencies. Deploy continuous scanning in container registries
      so that vulnerable images are flagged before deployment. Use
      admission controllers to block deployment of images with critical
      or high-severity CVEs. Maintain a centralized vulnerability
      management dashboard that correlates findings from all scanners,
      tracks remediation SLAs, and provides risk-based prioritization.
      Automate patch management for base images and shared platform
      components with rolling update strategies.
    tools:
      - trivy
      - grype
      - harbor
      - kube-hunter
      - neuvector
      - defectdojo
      - backstage

  devsecops:
    prose: >-
      Integrate vulnerability scanning at every stage of the CI/CD
      pipeline: dependency scanning for application libraries (SCA),
      container image scanning for OS-level vulnerabilities, and
      infrastructure-as-code scanning for cloud misconfigurations.
      Enforce pipeline gates that fail builds when vulnerabilities
      above a defined severity threshold are detected. Implement
      automated dependency update tools (Renovate, Dependabot) that
      create merge requests for known vulnerable dependencies.
      Generate Software Bill of Materials (SBOM) for every release
      and store them alongside deployment artifacts for traceability.
    tools:
      - trivy
      - grype
      - snyk
      - gitlab-dependency-scanning
      - renovate
      - syft
      - cosign

  secops:
    prose: >-
      Aggregate vulnerability scan results from all sources into a
      centralized vulnerability management platform. Prioritize
      vulnerabilities using risk-based scoring that considers asset
      criticality, exploitability (EPSS), and exposure context.
      Track vulnerability remediation SLAs: critical (24h), high
      (7d), medium (30d), low (90d). Generate executive dashboards
      showing vulnerability trends, mean-time-to-remediate, and
      SLA compliance. Subscribe to threat intelligence feeds and
      zero-day advisories to enable proactive response.
    tools:
      - defectdojo
      - nessus
      - qualys
      - rapid7-insightvm
      - splunk
      - elastic-siem

