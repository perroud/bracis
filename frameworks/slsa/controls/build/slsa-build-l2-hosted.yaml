id: slsa-build-l2-hosted
family: build
title: "Build L2: Hosted Build Platform"
class: SLSA

baselines: [build-l2, build-l3]

statement:
  prose: >-
    The build must be executed on a hosted build platform — a service that runs the
    build process on infrastructure managed by the build platform provider, not on a
    developer's local workstation. The hosted platform must generate the provenance
    itself, rather than relying on the build tenant to produce it. This ensures that
    the provenance reflects the actual build process as observed by the platform,
    not merely what the developer claims occurred.

guidance:
  prose: >-
    Build L2 introduces a trust boundary between the developer and the build process.
    By requiring a hosted build platform, SLSA ensures that provenance is generated by
    an entity separate from the code author. This prevents a compromised developer
    machine from fabricating provenance for a malicious build. The hosted platform must
    be a recognized CI/CD service (GitHub Actions, GitLab CI, Google Cloud Build, etc.)
    that independently observes the build inputs and outputs. Self-hosted runners are
    acceptable only if they are managed by an operations team separate from the
    development team and meet the platform's security requirements.

references:
  - citation: "SLSA v1.0 Specification — Build L2"
    url: "https://slsa.dev/spec/v1.0/levels#build-l2"
  - citation: "SLSA v1.0 — Build Platform Requirements"
    url: "https://slsa.dev/spec/v1.0/requirements#build-requirements"

implementation_guidance:
  platform_engineering:
    prose: >-
      Enforce that all release builds execute on managed CI/CD infrastructure. Disable
      local build publishing by restricting artifact registry push credentials to CI/CD
      service accounts only. Deploy ephemeral build agents (GitHub-hosted runners, GitLab
      SaaS runners, Google Cloud Build workers) that are provisioned on-demand and
      destroyed after each build. For self-hosted runners, implement infrastructure-as-code
      provisioning with automated rotation and configuration hardening. Ensure build
      platforms generate provenance natively rather than relying on user-defined scripts.
    tools:
      - github-actions
      - gitlab-ci
      - google-cloud-build
      - tekton
      - buildkite
      - argo-workflows
      - terraform
      - pulumi

  devsecops:
    prose: >-
      Configure branch protection rules that require CI/CD pipeline completion before
      merge. Block direct pushes to release branches to ensure all artifacts are built
      by the hosted platform. Implement pipeline checks that verify the builder identity
      in provenance matches an approved hosted build platform. Remove artifact registry
      credentials from developer environments and restrict them to CI/CD service
      accounts. Add pipeline policies that reject artifacts built outside the approved
      hosted build infrastructure.
    tools:
      - github-actions
      - gitlab-ci
      - cosign
      - slsa-verifier
      - opa
      - kyverno
      - vault

  secops:
    prose: >-
      Audit artifact registry access logs to detect pushes from non-CI/CD identities.
      Monitor for artifacts whose provenance lists a builder outside the approved hosted
      platforms. Alert on self-hosted runner configuration changes that could weaken build
      isolation. Review CI/CD platform audit logs for unauthorized workflow modifications.
      Periodically verify that artifact registry push credentials are only held by
      authorized CI/CD service accounts.
    tools:
      - splunk
      - elastic-siem
      - slsa-verifier
      - falco
      - grafana

legal_references:
  - framework_id: nist-800-53-rev5
    articles: ["SR-4", "SR-4(1)", "SA-15"]
    relationship: implements
  - framework_id: nist-800-218
    articles: ["PO.3.1", "PO.3.2", "PS.1.1"]
    relationship: supports
  - framework_id: cis-controls-v8
    articles: ["16.2", "16.6"]
    relationship: supports
