id: slsa-build-l1-provenance
family: build
title: "Build L1: Provenance Exists"
class: SLSA

baselines: [build-l1, build-l2, build-l3]

statement:
  prose: >-
    The software package has provenance metadata that describes how the artifact was
    produced, including what build system was used, what inputs were consumed, and
    what process was invoked. At Build L1, the provenance does not need to be
    authenticated or generated by the build platform itself — it simply must exist
    and be available to consumers. The provenance must be complete enough for a
    consumer to determine the top-level build instructions that produced the artifact.

guidance:
  prose: >-
    Provenance is the foundational concept of SLSA. Without knowing how an artifact
    was built, consumers cannot assess its trustworthiness. Build L1 is the entry
    point: any provenance is better than none. The provenance should follow a
    recognized format (preferably in-toto SLSA Provenance) and should at minimum
    describe the builder, the source repository, and the build command. Organizations
    should treat this as the first step toward full supply-chain integrity and plan
    for progressive adoption of higher levels. Even self-attested provenance provides
    value by establishing a baseline that can be verified and audited over time.

references:
  - citation: "SLSA v1.0 Specification — Build L1"
    url: "https://slsa.dev/spec/v1.0/levels#build-l1"
  - citation: "SLSA Provenance Format"
    url: "https://slsa.dev/provenance/v1"

implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate provenance generation into every CI/CD pipeline as a mandatory post-build
      step. Use SLSA-compliant generators such as slsa-github-generator or slsa-verifier
      to produce in-toto provenance attestations automatically. Store provenance alongside
      artifacts in OCI registries using cosign attach or in a dedicated transparency log.
      Configure artifact repositories (Artifactory, Nexus, Harbor) to require provenance
      metadata on upload. Implement policy-as-code checks that reject artifacts without
      provenance at deployment time using admission controllers (Kyverno, OPA Gatekeeper).
    tools:
      - slsa-github-generator
      - slsa-verifier
      - cosign
      - in-toto
      - sigstore
      - harbor
      - kyverno
      - opa-gatekeeper

  devsecops:
    prose: >-
      Add provenance generation as a required pipeline stage that runs immediately after
      the build step. Use GitHub Actions reusable workflows or GitLab CI includes that
      invoke SLSA-compliant builders. Validate that provenance is generated for every build
      artifact before the pipeline is allowed to proceed to the publish/deploy stage. Store
      provenance in a tamper-evident log (Rekor) and reference it from the artifact metadata.
      Implement pipeline gates that fail if provenance is missing or malformed. Include
      provenance verification in pull request checks to shift-left validation.
    tools:
      - github-actions
      - gitlab-ci
      - slsa-github-generator
      - rekor
      - cosign
      - trivy

  secops:
    prose: >-
      Monitor artifact repositories for packages lacking provenance metadata. Configure
      alerting for any artifact promoted to production without associated provenance.
      Establish a provenance audit trail and periodically verify that stored provenance
      has not been tampered with using Rekor transparency log lookups. Include provenance
      verification in incident response runbooks to determine artifact origin during
      supply-chain investigations. Generate compliance reports showing provenance coverage
      across all production artifacts.
    tools:
      - rekor
      - slsa-verifier
      - cosign
      - splunk
      - elastic-siem
      - grafana

