id: art-9a
family: xborder
title: "Binding Undertaking for Cross-Border Transfers"
class: KVKK
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 9(2)(b) — Binding Undertaking for Cross-Border Transfers.
    In the absence of an adequacy determination by the Board, personal data may be
    transferred abroad without the explicit consent of the data subject provided that
    data controllers in Turkey and in the relevant foreign country provide adequate
    protection in writing and the Board grants permission. The written undertaking
    must demonstrate that both the Turkish and foreign data controllers commit to
    providing adequate protection for the personal data being transferred. The Board
    shall evaluate the undertaking and may approve or reject the transfer based on
    the adequacy of the protections described.

guidance:
  prose: >-
    The binding undertaking mechanism under Article 9(2)(b) is KVKK's equivalent of
    GDPR's Standard Contractual Clauses (SCCs) or Binding Corporate Rules (BCRs), but
    with a critical difference: each undertaking requires individual Board approval.
    This makes the process significantly more burdensome than GDPR's pre-approved
    mechanisms. The Board has published guidelines on the minimum content of binding
    undertakings, which must include: purpose and scope of transfer, data categories,
    data subject categories, recipient details, security measures, data subject rights
    mechanisms, and complaint procedures. Processing times for Board approval can be
    lengthy, so organizations should plan well in advance for any new cross-border
    data flows.

implementation_guidance:
  platform_engineering:
    prose: >-
      Build a binding undertaking management system that tracks the lifecycle of each
      undertaking: drafting, submission to Board, approval status, renewal dates, and
      revocation. Implement technical controls that block cross-border transfers until
      the corresponding undertaking is Board-approved. Maintain a registry linking each
      international data flow to its approved undertaking. Deploy automated monitoring
      that detects when data flows deviate from the scope of approved undertakings.
    tools:
      - "Contract lifecycle management (CLM) platforms"
      - "Board approval workflow tracking"
      - "Transfer-to-undertaking linkage registry"
      - "Automated scope compliance monitoring"
      - "Document management for undertaking versions"
  devsecops:
    prose: >-
      Pipeline gates must verify that new international integrations have a corresponding
      approved binding undertaking before deployment. CI checks must validate that data
      transfer scopes match the approved undertaking terms. Include undertaking compliance
      verification in deployment checklists.
    tools:
      - "Deployment gates for undertaking verification"
      - "Integration configuration validators"
      - "Undertaking scope compliance tests"
      - "Automated deployment checklist enforcement"
  secops:
    prose: >-
      Monitor international data transfers for scope compliance with approved
      undertakings. Alert when transfers occur outside the parameters specified in
      the undertaking. Track undertaking renewal dates and alert well in advance.
      Monitor Board decisions for changes affecting existing undertakings. Conduct
      annual audits of all active undertakings against actual data flows.
    tools:
      - "Undertaking compliance monitoring"
      - "Renewal tracking with advance alerting"
      - "Regulatory decision monitoring service"
      - "Annual undertaking audit tools"

