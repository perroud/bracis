id: art-9
family: xborder
title: "Transfer of Personal Data Abroad"
class: KVKK
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 9 — Transfer of Personal Data Abroad.
    (1) Personal data may not be transferred abroad without the explicit consent
    of the data subject.
    (2) Personal data may be transferred abroad without the explicit consent of the
    data subject where the conditions set forth in the second paragraph of Article 5
    and the third paragraph of Article 6 exist, and:
    (a) adequate protection exists in the country to which personal data will be
    transferred; or
    (b) in the absence of adequate protection, data controllers in Turkey and in the
    relevant foreign country provide adequate protection in writing and the Board
    grants permission.
    (3) The Board shall determine and announce the countries that have adequate
    protection. In determining the countries with adequate protection, the Board
    shall take into account: (a) reciprocity; (b) the legislation and practices of
    the relevant country on data protection; (c) whether an international organization
    relevant to the subject exists and Turkey's membership thereof; (d) the nature
    and volume of data transfers.
    (4) When there is a change in conditions, the Board may, ex officio or upon request,
    change or revoke the determination of adequacy.
    (5) The provisions of this article shall not prejudice the provisions of international
    agreements.

guidance:
  prose: >-
    Article 9 governs cross-border data transfers and is one of the most impactful
    provisions for multinational organizations operating in Turkey. The structure mirrors
    GDPR Chapter 5 but with notable differences: (1) Explicit consent is the default
    basis, unlike GDPR which offers multiple transfer mechanisms. (2) The adequacy
    determination process considers reciprocity — unique to KVKK. (3) In the absence
    of adequacy, a written binding undertaking between the Turkish and foreign controller
    must be approved by the Board — a process that can take months. (4) As of the law's
    implementation, the Board has been slow to issue adequacy decisions, creating
    significant practical challenges for international data flows. Organizations must
    map all cross-border data transfers, identify the legal basis for each, and implement
    technical controls to prevent unauthorized international transfers.

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement data residency controls that prevent personal data from leaving
      designated geographic boundaries without authorization. Deploy data localization
      by default — personal data of Turkish data subjects should be processed within
      Turkey unless a valid transfer mechanism exists. Build a cross-border transfer
      registry that documents: destination country, legal basis (consent, adequacy,
      or Board-approved undertaking), data categories, and recipients. Implement
      geo-fencing in cloud infrastructure to enforce data residency. Deploy encryption
      with Turkey-held keys for any data that must transit international networks.
    tools:
      - "Cloud data residency controls (AWS Region lock, Azure Policy, GCP Organization Policy)"
      - "Data localization enforcement (Kubernetes node affinity, cloud region restrictions)"
      - "Cross-border transfer registry and approval workflow"
      - "Geo-fencing and network policy enforcement"
      - "Encryption with local key management"
      - "Data flow mapping tools for international transfer visibility"
  devsecops:
    prose: >-
      CI pipelines must verify that infrastructure deployments comply with data
      residency requirements. IaC scanning must flag resources provisioned in
      non-approved regions. Pipeline gates must check that cross-border data
      transfers are registered and approved before deploying integration services.
      Automated tests must verify data localization controls are effective.
    tools:
      - "IaC scanning for region compliance (Checkov, tfsec)"
      - "Cloud configuration validators for data residency"
      - "Integration tests for geo-fencing effectiveness"
      - "Cross-border transfer approval verification in CI"
  secops:
    prose: >-
      Monitor network traffic for personal data leaving Turkey without authorization.
      Alert on cloud resource provisioning in non-approved regions. Track all
      cross-border data flows and verify each has a valid legal basis. Monitor
      Board adequacy decisions and adjust controls when new countries are approved
      or revoked. Conduct regular audits of international data transfer compliance.
    tools:
      - "DLP with geographic transfer monitoring"
      - "Cloud posture management for region compliance"
      - "Network traffic analysis for cross-border data flows"
      - "Regulatory change monitoring for Board adequacy decisions"
      - "Cross-border transfer audit tools"

