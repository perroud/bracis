id: art-10
family: rights
title: "Obligation of the Data Controller to Inform"
class: KVKK
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 10 — Obligation of the Data Controller to Inform.
    (1) At the time of collection of personal data, the data controller or the person
    authorized by the data controller shall inform the data subject of the following:
    (a) the identity of the data controller and, if any, of the representative of the
    data controller;
    (b) the purpose of processing personal data;
    (c) the persons to whom and the purposes for which personal data may be transferred;
    (d) the method and legal basis for the collection of personal data;
    (e) the rights of the data subject listed in Article 11.

guidance:
  prose: >-
    Article 10 creates a mandatory transparency obligation at the point of data
    collection. Unlike GDPR Articles 13-14, which distinguish between data obtained
    directly from the data subject versus other sources, KVKK Article 10 applies
    uniformly at the time of collection. The information must be provided proactively —
    not merely made available on request. All five elements (identity, purpose, recipients,
    method/legal basis, and data subject rights) must be communicated. The KVKK Board
    has issued secondary guidance on layered privacy notices and just-in-time notifications.
    Organizations must ensure this information is provided in clear, plain language
    and is accessible at every data collection point.

implementation_guidance:
  platform_engineering:
    prose: >-
      Build a centralized privacy notice management service that serves privacy
      information across all data collection points. Implement a privacy notice API
      that returns the required five elements for each processing activity. Deploy
      just-in-time privacy notices at every user-facing data collection form. Maintain
      version-controlled privacy notices with timestamps proving when each version
      was active. Build consent receipts that include all five elements as proof of
      information delivery.
    tools:
      - "Privacy notice management platforms"
      - "API-driven privacy notice delivery"
      - "Version-controlled notice repository (Git-backed)"
      - "Consent receipt generation service"
      - "Multi-language notice delivery for Turkish and English"
  devsecops:
    prose: >-
      CI checks must verify that every data collection endpoint includes a privacy
      notice integration. Automated tests must validate that privacy notices contain
      all five required elements. Code review must verify that new data collection
      points call the privacy notice API. E2E tests must confirm privacy notices are
      displayed before data submission.
    tools:
      - "E2E testing for privacy notice display (Cypress, Playwright)"
      - "API contract tests for privacy notice completeness"
      - "Custom linting rules for data collection form validation"
      - "Accessibility testing for privacy notices"
  secops:
    prose: >-
      Monitor for data collection points that do not display privacy notices. Alert
      when privacy notice API calls fail or time out. Audit privacy notice versions
      to ensure they reflect current processing activities. Track data collection
      points inventory and verify coverage.
    tools:
      - "Web application monitoring for privacy notice delivery"
      - "Privacy notice compliance scanners"
      - "Data collection point inventory management"
      - "Audit tools for notice accuracy verification"

