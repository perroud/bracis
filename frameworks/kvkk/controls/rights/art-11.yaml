id: art-11
family: rights
title: "Rights of the Data Subject"
class: KVKK
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 11 — Rights of the Data Subject.
    Everyone has the right to apply to the data controller and:
    (a) learn whether or not personal data relating to him/her are being processed;
    (b) request information if personal data relating to him/her have been processed;
    (c) learn the purpose of the processing of personal data and whether they are
    being used in accordance with their purpose;
    (d) know the third parties to whom personal data are transferred, domestically
    or abroad;
    (e) request the correction of personal data if they are incomplete or inaccurate;
    (f) request the erasure or destruction of personal data within the framework of
    the conditions set forth in Article 7;
    (g) request that the operations carried out pursuant to sub-paragraphs (e) and (f)
    be notified to third parties to whom personal data have been transferred;
    (h) object to the occurrence of a result against him/her through the analysis of
    processed data exclusively by automated means;
    (i) request compensation for damages arising from the unlawful processing of
    personal data.

guidance:
  prose: >-
    Article 11 enumerates nine distinct data subject rights. Compared to GDPR, KVKK
    consolidates multiple rights into a single article but covers similar ground.
    Notable aspects: (1) Right 11(h) — objection to automated decision-making —
    mirrors GDPR Article 22 but is framed as a right to object to results, not just
    to the decision itself. (2) Right 11(i) — compensation for damages — is explicitly
    stated as a data subject right, giving individuals a clear legal basis for civil
    claims. (3) The right to notification of corrections/deletions to third parties (11g)
    creates an obligation for controllers to maintain transfer records. Organizations
    must implement technical capabilities to fulfill each of these nine rights within
    the statutory response period.

implementation_guidance:
  platform_engineering:
    prose: >-
      Build a Data Subject Request (DSR) management platform that supports all nine
      KVKK rights. Implement automated data discovery that locates all personal data
      across systems for a given data subject. Deploy self-service portals for data
      subjects to exercise their rights. Build specific technical capabilities:
      (1) Data inventory API for rights (a)-(d), (2) Data correction API with
      propagation for right (e), (3) Deletion API with verification for right (f),
      (4) Third-party notification service for right (g), (5) Automated decision
      explanation service for right (h). Track request status and SLAs through the
      DSR platform.
    tools:
      - "DSR management platforms (OneTrust, Transcend, custom)"
      - "Automated data discovery and inventory (BigID, Informatica)"
      - "Self-service data subject portal"
      - "Data correction propagation service"
      - "Automated decision explanation engine"
      - "Third-party notification workflow"
  devsecops:
    prose: >-
      CI pipelines must verify that new data stores are discoverable by the DSR
      platform. Automated tests must validate end-to-end DSR workflows for each
      right type. Code review must ensure new data processing services integrate
      with the DSR platform. Integration tests must verify correction and deletion
      propagation to all downstream systems and third parties.
    tools:
      - "DSR workflow integration tests"
      - "Data store discoverability validators"
      - "Deletion propagation E2E tests"
      - "Automated decision explanation tests"
  secops:
    prose: >-
      Monitor DSR response SLAs. Alert when requests approach or exceed the
      30-day response deadline. Audit completed DSRs for completeness and accuracy.
      Track request volumes and types to identify patterns. Monitor for data
      subject complaints escalated to the KVKK Board.
    tools:
      - "DSR SLA monitoring and alerting"
      - "Request volume analytics dashboards"
      - "Complaint tracking integration with KVKK Board"
      - "DSR completion audit tools"

