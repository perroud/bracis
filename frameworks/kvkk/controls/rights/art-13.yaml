id: art-13
family: rights
title: "Application to the Data Controller"
class: KVKK
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 13 — Application to the Data Controller.
    (1) In exercising the rights set forth in this Law, the data subject shall first
    submit the request to the data controller in writing or through other methods
    determined by the Board.
    (2) The data controller shall conclude the requests included in the application
    free of charge and as soon as possible, and in any case within thirty days at the
    latest. However, if the operation requires an additional cost, the fee determined
    by the Board may be charged.
    (3) The data controller shall accept the request or refuse it by explaining the
    reasons, and shall notify the response to the data subject in writing or
    electronically. If the request in the application is accepted, the data controller
    shall fulfill the request. If the application has been made due to the fault of the
    data controller, the fee collected shall be returned to the data subject.

guidance:
  prose: >-
    Article 13 establishes the procedural framework for data subject requests. Key
    requirements: (1) Requests must be handled free of charge in principle, with fees
    only for operations incurring additional cost as determined by the Board. (2) The
    30-day maximum response period is mandatory — there is no extension mechanism as
    exists under GDPR. (3) Refusals must include reasoning and be communicated in
    writing or electronically. (4) This is a mandatory pre-step before escalation
    to the Board under Article 14 — data subjects must apply to the controller first.
    (5) If the controller was at fault (e.g., processing error), any fee collected
    must be refunded. Organizations must establish clear, accessible request channels
    and robust internal processes to meet the 30-day deadline.

implementation_guidance:
  platform_engineering:
    prose: >-
      Build a request intake system that supports written and electronic submissions.
      Implement automated request routing to the appropriate data processing team.
      Deploy SLA tracking with automatic escalation when requests approach the 30-day
      deadline. Build response generation templates that include reasoning for refusals.
      Implement fee management — calculate costs, charge only when authorized by Board
      tariff, and automate refunds when controller fault is established.
    tools:
      - "Request management system (ServiceNow, Zendesk with privacy module)"
      - "SLA tracking with automated escalation"
      - "Response template engine"
      - "Fee calculation and refund automation"
      - "Electronic notification service (email, registered mail)"
  devsecops:
    prose: >-
      CI pipeline must verify that request intake endpoints are properly authenticated
      but accessible without unnecessary barriers. Automated tests must validate the
      full request lifecycle from submission through response. Integration tests must
      verify SLA tracking accuracy and escalation triggers.
    tools:
      - "E2E tests for request submission flow"
      - "SLA timer accuracy tests"
      - "Response delivery verification tests"
      - "Access control tests for request endpoints"
  secops:
    prose: >-
      Monitor request volumes and response times. Alert when any request approaches
      the 25-day mark without resolution. Track refusal rates and reasons for
      compliance reporting. Audit completed requests for quality and completeness.
      Monitor for duplicate requests and potential abuse patterns.
    tools:
      - "Request SLA dashboard with real-time monitoring"
      - "Refusal reason analytics"
      - "Request audit trail verification"
      - "Compliance reporting tools"

