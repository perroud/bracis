id: art-16
family: obligations
title: "Data Controllers' Registry (VERBIS)"
class: KVKK
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 16 — Data Controllers' Registry.
    (1) Data controllers who process personal data shall register with the Data
    Controllers' Registry prior to commencing data processing.
    (2) In the application for the registry, the following information shall be included:
    (a) the identity and address of the data controller and, if any, of the representative;
    (b) the purpose of processing personal data;
    (c) an explanation on the groups of persons related to the data and the categories
    of data related to those persons;
    (d) the recipients or groups of recipients to whom personal data may be transferred;
    (e) personal data that are planned to be transferred abroad;
    (f) the measures taken regarding data security;
    (g) the maximum time period required for the purpose of processing personal data.
    (3) Changes in the information included in the registry shall be immediately notified
    to the Authority.
    (4) The Board shall determine the exemption criteria based on the nature and quantity
    of data processed, the legal basis for data processing, or the duration for which
    data will be retained, and may exempt certain data controllers from the registration
    obligation.

guidance:
  prose: >-
    Article 16 establishes VERBIS (Veri Sorumluları Sicili / Data Controllers' Registry),
    a unique feature of KVKK without a direct GDPR equivalent. VERBIS is a public
    registry managed by the KVKK Board where all data controllers must register before
    processing personal data. The registration must include seven categories of information
    that effectively constitute a processing activities inventory. Key points: (1) Registration
    is a prerequisite to processing — not a post-hoc obligation. (2) Changes must be
    reported immediately. (3) The Board can grant exemptions based on criteria like data
    volume or processing nature. (4) Failure to register is a separate offense with
    administrative penalties. The VERBIS system is accessible at verbis.kvkk.gov.tr and
    provides public transparency about who processes what data in Turkey.

implementation_guidance:
  platform_engineering:
    prose: >-
      Build an internal processing activities registry that mirrors the VERBIS
      registration requirements. This registry should automatically populate from
      the data governance platform and serve as the source of truth for VERBIS
      submissions. Implement change detection that triggers VERBIS update workflows
      when processing activities change. Maintain seven data elements for each
      processing activity: (1) controller identity, (2) processing purposes,
      (3) data subject categories and data types, (4) recipient categories,
      (5) cross-border transfer plans, (6) security measures, (7) retention periods.
      Build automated VERBIS submission and update capabilities.
    tools:
      - "Processing activities registry (custom or GRC platform)"
      - "Data governance platforms (Collibra, Alation)"
      - "Change detection and notification service"
      - "VERBIS integration API (if available)"
      - "Audit trail for registry changes"
  devsecops:
    prose: >-
      CI pipelines must verify that new data processing services are reflected in
      the processing activities registry. Deployment gates must check that VERBIS
      registration is current before deploying new processing capabilities. Automated
      tests must verify that changes to data processing trigger registry update
      workflows. Maintain pipeline templates that enforce registry compliance.
    tools:
      - "Registry compliance gates in CI/CD"
      - "Processing activity metadata validators"
      - "Change detection tests for registry triggers"
      - "Deployment manifest checks for registry linkage"
  secops:
    prose: >-
      Monitor for processing activities not reflected in the VERBIS registration.
      Alert when new data flows are detected that are not in the internal registry.
      Conduct quarterly audits comparing actual processing activities against VERBIS
      registration. Track registry update SLAs to ensure changes are reported immediately.
      Monitor the KVKK Board's exemption decisions that may affect registration obligations.
    tools:
      - "Processing activity vs. registry compliance scanner"
      - "VERBIS registration audit tools"
      - "Data flow monitoring for unregistered processing"
      - "Regulatory change monitoring for KVKK Board decisions"

