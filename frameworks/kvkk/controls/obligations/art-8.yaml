id: art-8
family: obligations
title: "Transfer of Personal Data"
class: KVKK
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 8 — Transfer of Personal Data.
    (1) Personal data may not be transferred without the explicit consent of the
    data subject.
    (2) Personal data may be transferred without the explicit consent of the data
    subject where the conditions set forth in the second paragraph of Article 5 and
    the third paragraph of Article 6 exist, and adequate measures determined by the
    Board are taken.
    (3) The provisions of this article shall not prejudice the provisions of other
    laws regarding the obligation or transfer of personal data.

guidance:
  prose: >-
    Article 8 governs domestic transfers of personal data between data controllers
    or to data processors. The default rule mirrors Article 5 — explicit consent is
    required. Transfers without consent are permitted only when the Article 5(2) or
    Article 6(3) exceptions apply AND the Board's adequate measures are implemented.
    This creates a dual-condition requirement for consent-free transfers: both a legal
    basis exception AND adequate technical/organizational measures. Note that Article 8
    covers domestic transfers only — cross-border transfers are governed separately by
    Article 9. Organizations must maintain a transfer registry documenting all data
    sharing relationships, the legal basis for each, and the adequate measures applied.

implementation_guidance:
  platform_engineering:
    prose: >-
      Build a data transfer registry that documents all data sharing relationships
      between controllers and processors. Implement transfer authorization middleware
      that verifies: (1) valid consent exists, or (2) a legal basis exception applies
      AND adequate measures are in place. Deploy data transfer logging that captures
      source, destination, legal basis, data categories, and volume for every transfer.
      Implement API gateways that enforce transfer policies — block unauthorized
      transfers at the network level. Build secure data exchange protocols with
      encryption in transit and recipient verification.
    tools:
      - "Data transfer registry and mapping tools"
      - "API gateway with transfer policy enforcement"
      - "Mutual TLS for inter-service data transfers"
      - "Transfer logging and audit service"
      - "Data sharing agreement management"
  devsecops:
    prose: >-
      CI pipelines must verify that new data transfer endpoints are registered in
      the transfer registry. Automated tests must validate transfer authorization
      checks before data is sent. Code review must flag direct database-to-database
      transfers that bypass the transfer authorization middleware. Secret detection
      must identify transfer credentials in source code.
    tools:
      - "Transfer endpoint registry validators"
      - "Integration tests for transfer authorization"
      - "Network policy validators (Kubernetes NetworkPolicy)"
      - "Secret detection for transfer credentials"
  secops:
    prose: >-
      Monitor all data transfers for compliance with registered purposes and legal
      bases. Alert on unauthorized transfers — data flowing to unregistered recipients.
      Track transfer volumes for anomaly detection. Audit data sharing agreements
      annually. Monitor for data exfiltration that could constitute unauthorized transfer.
    tools:
      - "DLP monitoring for unauthorized data transfers"
      - "Network traffic analysis for data flow mapping"
      - "Transfer volume anomaly detection"
      - "Data sharing agreement audit tools"

