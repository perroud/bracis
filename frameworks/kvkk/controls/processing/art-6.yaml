id: art-6
family: processing
title: "Special Categories of Personal Data"
class: KVKK
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 6 — Special Categories of Personal Data.
    (1) Data relating to race, ethnic origin, political opinions, philosophical beliefs,
    religion, sect, or other beliefs, appearance and clothing, membership in associations,
    foundations, or trade unions, health, sexual life, criminal convictions and security
    measures, and biometric and genetic data are considered as special categories of
    personal data.
    (2) Processing of special categories of personal data is prohibited without the
    explicit consent of the data subject.
    (3) Special categories of personal data other than those relating to health and
    sexual life may be processed without the explicit consent of the data subject in
    cases provided for by law. Special categories of personal data relating to health
    and sexual life may only be processed without the explicit consent of the data subject
    by persons or authorized institutions and organizations under the obligation of
    secrecy for the purposes of protection of public health, operation of preventive
    medicine, medical diagnosis, treatment and care services, planning and management
    of health services and financing.
    (4) The Board shall determine adequate measures to be taken in the processing of
    special categories of personal data.

guidance:
  prose: >-
    Article 6 defines special categories of personal data with a broader scope than
    GDPR Article 9. KVKK includes "appearance and clothing" and "membership in
    associations, foundations, or trade unions" as special categories — reflecting
    Turkey's specific cultural and legal context. The protection regime is strict:
    processing is prohibited by default and requires explicit consent. The exception
    for health and sexual life data is narrow — only authorized medical personnel
    bound by secrecy obligations may process it, and only for specified health-related
    purposes. The KVKK Board has authority to mandate additional safeguards. Organizations
    must identify all special category data they process and implement enhanced
    protections including stricter access controls, stronger encryption, and more
    detailed audit trails.

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement data classification that identifies and tags all special category data
      at the field level. Deploy enhanced access controls for special category data:
      (1) role-based access limited to authorized personnel, (2) break-glass procedures
      for emergency access, (3) mandatory audit logging for all access. Implement
      separate encryption keys for special category data using HSM-backed key management.
      Build health data processing services that enforce the secrecy obligation requirement
      through technical controls — only authenticated medical personnel with verified
      credentials may access health data. Deploy automated scanning to detect special
      category data in unclassified storage.
    tools:
      - "Data classification engines (Microsoft Purview, BigID)"
      - "HSM-backed key management (HashiCorp Vault, AWS CloudHSM)"
      - "RBAC with special category data access tiers"
      - "Automated PII/sensitive data discovery (Presidio, Macie)"
      - "Database column-level encryption for special categories"
  devsecops:
    prose: >-
      SAST rules must detect hardcoded special category data in source code. Pipeline
      gates must block deployments that store special category data without enhanced
      encryption. CI checks must verify that APIs handling special category data
      implement stricter authentication and authorization. Secret detection must
      flag any special category data (health records, biometric data) in code
      repositories or logs.
    tools:
      - "Semgrep rules for special category data detection"
      - "SAST with sensitive data rules (SonarQube, Checkmarx)"
      - "Secret detection extended for health/biometric data patterns"
      - "Infrastructure-as-code scanning for encryption verification"
  secops:
    prose: >-
      Implement enhanced monitoring for all special category data access. Alert on
      any access to health or sexual life data by non-medical personnel. Monitor for
      special category data leakage in logs, backups, and analytics systems. Conduct
      quarterly audits of special category data access patterns. Maintain separate
      incident response procedures for special category data breaches.
    tools:
      - "SIEM with special category data access rules"
      - "DLP policies specific to special category data"
      - "User behavior analytics for anomalous special data access"
      - "Special category data breach response playbooks"

