id: art-1
family: gen
title: "Purpose of the Law"
class: KVKK
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 1 — Purpose.
    The purpose of this Law is to protect the fundamental rights and freedoms of
    natural persons, in particular the right to privacy, with respect to the
    processing of personal data and to set forth the obligations and principles to
    be observed by natural and legal persons who process personal data as well as
    the procedures and principles regarding the regulation of the activities of the
    Personal Data Protection Authority.

guidance:
  prose: >-
    Article 1 establishes the foundational purpose of KVKK. The law is designed
    to protect fundamental rights and freedoms — specifically the right to privacy —
    in the context of personal data processing. It applies to both natural and legal
    persons who process personal data. Organizations must understand that KVKK
    creates a comprehensive framework governing not only how data is processed, but
    also how the supervisory authority (the KVKK Board) operates. The scope is broad:
    any entity processing personal data of natural persons in Turkey falls under this law.

implementation_guidance:
  platform_engineering:
    prose: >-
      Establish a data governance platform that tracks all personal data processing
      activities across the organization. Implement a centralized data catalog that
      classifies personal data and maps it to processing purposes. Deploy privacy-by-design
      patterns in all platform services — consent management, data classification labeling,
      and purpose-bound access controls. Maintain a processing activities registry as a
      platform service that all applications must integrate with before processing personal data.
    tools:
      - "Data catalog tools (Apache Atlas, OpenMetadata, Amundsen)"
      - "Kubernetes namespace isolation for data processing workloads"
      - "OPA/Gatekeeper for enforcing data governance policies"
      - "Centralized consent management API"
  devsecops:
    prose: >-
      Integrate KVKK compliance checks into CI/CD pipelines. Require all new services
      that process personal data to register in the processing activities inventory before
      deployment. Implement pre-commit hooks that detect personal data field patterns in
      code and flag them for privacy review. Include data classification metadata in
      deployment manifests.
    tools:
      - "GitLab CI/CD compliance pipeline templates"
      - "Semgrep rules for PII detection in source code"
      - "Pre-commit hooks for data classification enforcement"
      - "Deployment manifest validators for privacy metadata"
  secops:
    prose: >-
      Monitor for unregistered data processing activities. Alert when new data flows
      are detected that are not registered in the processing activities inventory.
      Conduct periodic audits to verify all personal data processing aligns with
      stated purposes. Maintain an incident response plan that addresses KVKK
      breach notification requirements.
    tools:
      - "SIEM (Splunk/Elastic Security) for processing activity monitoring"
      - "DLP solutions for detecting unauthorized personal data processing"
      - "GRC platforms (ServiceNow, Archer) for compliance tracking"
      - "Automated compliance audit scheduling"

