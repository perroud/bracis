id: art-3
family: gen
title: "Definitions"
class: KVKK
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 3 — Definitions.
    For the purposes of this Law:
    (a) Explicit consent: consent that is related to a specific subject, based on
    information, and given with free will;
    (b) Anonymization: rendering personal data such that it can in no way be associated
    with or linked to an identified or identifiable natural person, even by matching
    with other data;
    (c) Board: the Personal Data Protection Board;
    (d) Authority: the Personal Data Protection Authority;
    (e) Related person (data subject): the natural person whose personal data are processed;
    (f) Personal data: any information relating to an identified or identifiable natural person;
    (g) Processing of personal data: any operation which is performed on personal data such
    as collection, recording, storage, retention, alteration, reorganization, disclosure,
    transfer, taking over, making retrievable, classification, or prevention of use of
    personal data wholly or partly by automated means or by non-automated means provided
    that these form part of a data recording system;
    (h) Data controller: the natural or legal person who determines the purposes and means
    of processing personal data and is responsible for the establishment and management of
    the data recording system;
    (i) Data recording system: the recording system in which personal data are structured
    and processed according to specific criteria;
    (j) Data processor: the natural or legal person who processes personal data on behalf
    of the data controller based on the authority granted by the data controller.

guidance:
  prose: >-
    Article 3 definitions are critical for KVKK compliance. Key distinctions from GDPR:
    (1) "Explicit consent" in KVKK requires three elements — specificity, information-basis,
    and free will — making it a higher standard than basic consent. (2) The definition of
    "processing" is extremely broad, covering any operation from collection through
    prevention of use. (3) The "data controller" bears primary responsibility for the
    data recording system itself, not just the processing decisions. (4) "Anonymization"
    must render data irreversibly unidentifiable, even when combined with other datasets.
    Organizations must map their roles precisely: who is the data controller, who is the
    data processor, and ensure contracts reflect these designations correctly.

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a data glossary service that maps organizational data elements to KVKK
      definitions. Build role classification into the identity and access management
      platform — distinguish data controllers from data processors at the system level.
      Deploy anonymization services as a platform capability (k-anonymity, differential
      privacy, tokenization). Implement explicit consent collection that captures all
      three required elements: specificity (what), information (why), and free will
      (opt-in, not opt-out).
    tools:
      - "Data glossary and classification tools (Collibra, Alation)"
      - "Anonymization libraries (ARX, Google DP library, Microsoft SEAL)"
      - "Consent management platforms with KVKK-compliant consent flows"
      - "IAM role mapping for controller/processor designation"
  devsecops:
    prose: >-
      Enforce consistent use of KVKK-defined terms in code documentation and API
      specifications. CI checks should validate that consent collection endpoints
      capture all three required elements. Implement linting rules that flag personal
      data processing without controller/processor designation. Require anonymization
      impact assessments for any service claiming to use anonymized data.
    tools:
      - "API specification linters for consent endpoint validation"
      - "Code documentation validators for KVKK terminology"
      - "Anonymization verification tests in CI pipelines"
      - "Data role assignment validators"
  secops:
    prose: >-
      Monitor for personal data processing that does not conform to KVKK definitions.
      Verify that anonymized data cannot be re-identified through regular testing.
      Audit consent records to ensure all three elements are captured. Track and alert
      on controller/processor boundary violations.
    tools:
      - "Re-identification risk assessment tools"
      - "Consent audit tools"
      - "SIEM rules for controller/processor boundary monitoring"
      - "Periodic anonymization effectiveness testing"

