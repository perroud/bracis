id: art-2
family: gen
title: "Scope of the Law"
class: KVKK
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 2 — Scope.
    (1) This Law applies to natural persons whose personal data are processed and
    to natural and legal persons who process such data wholly or partly by automated
    means or by non-automated means provided that these form part of a data
    recording system.
    (2) The provisions of this Law shall not apply to the processing of personal data:
    (a) by natural persons in the course of purely personal or household activities;
    (b) for the purposes of official statistics, provided that personal data are
    anonymized;
    (c) for artistic, historical, literary, or scientific purposes, or within the
    scope of freedom of expression, provided that national defense, national security,
    public security, public order, economic security, the right to privacy, or personal
    rights are not violated;
    (d) for the purposes of preventive, protective, and intelligence activities carried
    out by public institutions and organizations authorized by law to maintain national
    defense, national security, public security, or public order;
    (e) by judicial authorities or enforcement authorities in connection with
    investigation, prosecution, judicial, or enforcement proceedings.

guidance:
  prose: >-
    Article 2 defines material scope. KVKK applies to all processing of personal data
    by automated means, or by non-automated means where data forms part of a filing
    system. The exemptions are narrow and specific: personal/household use, anonymized
    statistical data, artistic/scientific/literary expression (with caveats), national
    security activities, and judicial/law enforcement proceedings. Organizations must
    assess whether any of their processing activities fall under these limited exemptions.
    The automated processing threshold is very low — virtually any digital processing
    of personal data triggers KVKK applicability.

implementation_guidance:
  platform_engineering:
    prose: >-
      Build a scope assessment service that allows teams to evaluate whether their
      data processing falls under KVKK. Maintain a registry of processing activities
      categorized by scope applicability. Implement automated tagging of data flows
      as in-scope or out-of-scope based on data type and processing method. For any
      exempted processing, require documented justification stored in the governance
      platform.
    tools:
      - "Data flow mapping tools (OneTrust, BigID)"
      - "Processing activity registry with scope classification"
      - "Automated data flow discovery and tagging"
      - "Policy-as-code for scope determination rules"
  devsecops:
    prose: >-
      Include scope assessment as a required step in the development lifecycle for
      any service that handles data about natural persons. CI pipeline checks should
      verify that services processing personal data have a completed scope assessment.
      Maintain pipeline templates that automatically apply KVKK controls to in-scope
      services.
    tools:
      - "GitLab CI/CD with scope verification gates"
      - "Service metadata validators requiring KVKK scope declaration"
      - "Automated pipeline selection based on data classification"
  secops:
    prose: >-
      Monitor data flows to detect processing activities that may not have been
      assessed for KVKK scope. Alert on new data ingestion patterns involving
      personal data identifiers. Periodically audit scope exemption claims to
      ensure they remain valid.
    tools:
      - "Network traffic analysis for personal data flow detection"
      - "DLP monitoring for unclassified personal data processing"
      - "Audit tools for scope exemption review"

