id: art-18
family: enforcement
title: "Administrative Fines and Penalties"
class: KVKK
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 18 — Administrative Fines.
    (1) The Board shall impose an administrative fine:
    (a) from TRY 5,000 to TRY 100,000 on data controllers who fail to comply with
    the obligation to inform set forth in Article 10;
    (b) from TRY 15,000 to TRY 1,000,000 on data controllers who fail to comply with
    the data security obligations set forth in Article 12;
    (c) from TRY 25,000 to TRY 1,000,000 on data controllers who fail to comply with
    the decisions of the Board;
    (d) from TRY 20,000 to TRY 1,000,000 on data controllers who fail to comply with
    the obligation to register with the Data Controllers' Registry set forth in Article 16.
    (2) Administrative fines imposed under this article shall be applied to the data
    controller as a legal person.
    (3) The payment of the administrative fine shall not relieve the data controller of
    the obligation to fulfill the obligations set forth in this Law.

    Article 17 — Offenses.
    (1) In the event of acts contrary to the provisions on the protection of personal
    data, the provisions of Articles 135 to 140 of the Turkish Penal Code No. 5237
    dated 26 September 2004 shall apply.
    (2) The unlawful recording of personal data, illegal acquisition or transfer of
    personal data, and failure to destroy personal data within the prescribed time
    shall be subject to imprisonment ranging from one to four-and-a-half years under
    the Turkish Penal Code.

guidance:
  prose: >-
    Articles 17-18 establish KVKK's dual enforcement regime: administrative fines
    AND criminal penalties. This distinguishes KVKK from GDPR, which only imposes
    administrative fines. Key aspects: (1) Administrative fines are imposed by the
    Board and range from TRY 5,000 to TRY 1,000,000 depending on the violation type
    (amounts are updated annually). (2) Criminal penalties include imprisonment of
    1 to 4.5 years for specific offenses: unlawful recording, illegal acquisition/transfer,
    and failure to destroy data. (3) Fines apply to the legal entity, but criminal
    liability extends to natural persons (executives, DPOs). (4) Payment of fines does
    not exempt from compliance — the violation must still be remedied. (5) The criminal
    provisions reference the Turkish Penal Code Articles 135-140, which predate KVKK
    and cover broader privacy crimes. The combination of financial and criminal
    penalties creates strong deterrence and personal liability risk for management.

implementation_guidance:
  platform_engineering:
    prose: >-
      Build compliance dashboards that track organizational status against each
      penalty-triggering obligation: Article 10 (information), Article 12 (security),
      Article 16 (VERBIS registration), and Board decisions. Implement real-time
      compliance scoring that highlights gaps before they become violations. Deploy
      automated evidence collection for each obligation to support defense in
      enforcement proceedings. Build penalty risk assessment tools that calculate
      potential exposure based on current compliance gaps.
    tools:
      - "GRC compliance dashboards (ServiceNow GRC, Archer)"
      - "Real-time compliance scoring engines"
      - "Evidence collection and management platforms"
      - "Penalty risk assessment calculators"
      - "Board decision tracking and compliance verification"
  devsecops:
    prose: >-
      CI pipelines must generate evidence of compliance with Article 12 security
      obligations. Every deployment must produce auditable records of security scanning,
      code review, and approval. Maintain pipeline compliance reports that can be
      presented during Board examinations. Track and remediate all security findings
      with documented timelines.
    tools:
      - "Pipeline compliance reporting (GitLab compliance dashboard)"
      - "Security finding tracking and remediation timelines"
      - "Audit evidence generation from CI/CD"
      - "Compliance trend analysis from pipeline data"
  secops:
    prose: >-
      Implement compliance monitoring for all four fine-triggering obligations.
      Alert management when compliance gaps are detected that could trigger penalties.
      Maintain a board decision register and track implementation deadlines. Conduct
      regular compliance assessments and report results to executive leadership.
      Develop response plans for criminal investigation scenarios.
    tools:
      - "Compliance gap alerting and management reporting"
      - "Board decision implementation tracking"
      - "Executive compliance reporting dashboards"
      - "Criminal investigation response plan"
      - "Penalty exposure tracking and forecasting"

