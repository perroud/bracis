id: art-15
family: enforcement
title: "Examination by the Board"
class: KVKK
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 15 — Examination by the Board.
    (1) The Board shall examine the complaints received and the alleged violations
    that come to its attention and shall render its decision upon the completion of
    the examination. If the complaint is likely to cause irreparable or difficult-to-
    repair damage and is prima facie well-founded, the Board may take interim measures.
    (2) If the examination reveals a violation, the Board shall decide that the violation
    and, if any, the breach be remedied by the relevant party. This decision shall be
    notified to the relevant parties and shall be implemented without delay and in any
    case within thirty days at the latest.
    (3) If the complaint is made on behalf of the public, the Board shall take the
    necessary measures of its own accord.
    (4) The Board may hear the parties and third persons, obtain information, request
    documents from public institutions and organizations, and carry out or have carried
    out on-site inspections.
    (5) The examination procedure shall be carried out in accordance with the principles
    of due process.

guidance:
  prose: >-
    Article 15 grants the KVKK Board broad investigative and enforcement powers.
    Key aspects: (1) Interim measures — the Board can impose temporary restrictions
    on data processing during investigation if irreparable harm is likely. This is
    a significant operational risk. (2) Remediation orders must be implemented within
    30 days — failure to comply is a separate offense. (3) The Board can act on its
    own initiative for public interest matters. (4) On-site inspections give the Board
    physical access to premises and systems. (5) Due process protections apply but the
    Board has wide discretion. Organizations must prepare for Board examinations by
    maintaining: complete processing documentation, technical evidence of compliance,
    incident response records, and a cooperation protocol for on-site inspections.

implementation_guidance:
  platform_engineering:
    prose: >-
      Build a regulatory examination readiness platform that can generate compliance
      evidence packages on demand. Implement data processing documentation that is
      always current and exportable. Deploy an inspection readiness dashboard that
      shows the current compliance status across all processing activities. Build
      interim measure implementation capabilities — the ability to quickly suspend
      or restrict specific processing activities when ordered by the Board.
    tools:
      - "Compliance evidence generation platform"
      - "Real-time compliance dashboard"
      - "Processing activity suspension controls"
      - "Document management for Board correspondence"
      - "On-site inspection preparation toolkit"
  devsecops:
    prose: >-
      Maintain CI/CD pipeline evidence for all deployments affecting personal data
      processing. Build automated compliance reporting that demonstrates security
      scanning, code review, and testing practices. Ensure all pipeline artifacts
      are retained for the regulatory examination period. Implement feature flags
      that allow rapid suspension of processing activities if ordered by the Board.
    tools:
      - "Pipeline artifact retention and export"
      - "Automated compliance report generation"
      - "Feature flags for processing suspension (LaunchDarkly, Unleash)"
      - "Deployment history with evidence chain"
  secops:
    prose: >-
      Maintain a Board examination response plan. Designate a point of contact for
      Board communications. Ensure all compliance evidence is readily accessible and
      exportable. Practice examination scenarios through tabletop exercises. Monitor
      Board examination trends and precedent decisions. Implement 30-day remediation
      tracking for any Board orders.
    tools:
      - "Examination response plan and playbook"
      - "Evidence export and presentation tools"
      - "Remediation order tracking with SLA monitoring"
      - "Board precedent decision database"
      - "Tabletop exercise management"

