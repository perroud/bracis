id: art-14
family: enforcement
title: "Application to the Board"
class: KVKK
baselines: [privacy-baseline]

statement:
  prose: >-
    Article 14 — Application to the Board.
    (1) In the event that the application made under Article 13 is rejected, the
    response given is found insufficient, or no response is given within the
    specified period, the data subject may lodge a complaint with the Board within
    thirty days from the date of learning the response of the data controller and
    in any case within sixty days from the date of application.
    (2) The exhaustion of the application procedure under Article 13 is a prerequisite
    for lodging a complaint with the Board.

guidance:
  prose: >-
    Article 14 establishes the administrative complaint mechanism before the KVKK
    Board. Key procedural requirements: (1) Article 13 application to the controller
    must be exhausted first — the Board will reject complaints that skip this step.
    (2) The 30-day complaint window starts from learning of the controller's response
    (or 60 days from the original application if no response is received). (3) The
    Board has investigative and enforcement powers upon receiving a complaint.
    Organizations must track all data subject applications and ensure responses are
    provided within Article 13's 30-day deadline to avoid Board complaints. Maintaining
    detailed records of applications and responses is essential for defending against
    Board investigations.

implementation_guidance:
  platform_engineering:
    prose: >-
      Extend the DSR management platform to track the full complaint lifecycle including
      potential Board escalation. Implement automatic documentation of all Article 13
      interactions as evidence for Board proceedings. Build a legal case management
      module that activates when a Board complaint is filed. Maintain complete audit
      trails of all data subject interactions, decisions, and communications with
      timestamps.
    tools:
      - "Legal case management systems"
      - "DSR platform with Board complaint tracking"
      - "Evidence preservation and export tools"
      - "Communication logging with timestamp verification"
      - "Compliance reporting for Board investigations"
  devsecops:
    prose: >-
      Ensure all DSR interaction logs are immutable and tamper-proof. CI pipelines
      must verify that DSR audit logging is enabled and functioning. Implement
      automated evidence package generation that compiles all interactions for a
      given data subject into a Board-ready format.
    tools:
      - "Immutable audit log verification tests"
      - "Evidence package generation automation"
      - "Log integrity validation in CI"
      - "Compliance documentation generators"
  secops:
    prose: >-
      Monitor for Board complaints and trigger the investigation response workflow.
      Maintain a Board complaint register with status tracking. Alert legal teams
      immediately when a complaint is filed. Preserve all relevant evidence upon
      complaint notification. Track Board decisions for precedent that may affect
      organizational practices.
    tools:
      - "Board complaint notification and tracking"
      - "Evidence preservation triggers"
      - "Legal team alerting and escalation"
      - "Board decision tracking for compliance precedent"

