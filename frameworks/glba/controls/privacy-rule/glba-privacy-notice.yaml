id: glba-privacy-notice
family: privacy-rule
title: "Privacy Notice Requirements"
class: GLBA

statement:
  prose: >-
    Financial institutions shall provide clear and conspicuous privacy notices to
    customers describing the institution's information-sharing practices. An initial
    privacy notice must be delivered at the time the customer relationship is established,
    and annual notices must be provided thereafter. The notices must accurately describe
    the categories of nonpublic personal information (NPI) collected, the categories of
    NPI disclosed, the categories of affiliates and non-affiliated third parties to whom
    NPI is disclosed, and the institution's policies and practices for protecting the
    confidentiality and security of NPI.
  parts:
    - id: glba-privacy-notice.1
      label: "(1)"
      prose: >-
        An initial privacy notice shall be provided to each customer not later than
        the time the customer relationship is established. For existing customers,
        the institution must have provided the initial notice by the compliance date.
    - id: glba-privacy-notice.2
      label: "(2)"
      prose: >-
        An annual privacy notice shall be provided to each customer during the
        continuation of the customer relationship. The annual notice may be delivered
        by any method permitted under applicable regulations, including electronic
        delivery with appropriate consent.
    - id: glba-privacy-notice.3
      label: "(3)"
      prose: >-
        The privacy notice shall describe: (a) the categories of NPI collected;
        (b) the categories of NPI disclosed to non-affiliated third parties;
        (c) the categories of affiliates and non-affiliated third parties receiving NPI;
        (d) the institution's policies for protecting the confidentiality and security
        of NPI; and (e) any applicable opt-out rights.
    - id: glba-privacy-notice.4
      label: "(4)"
      prose: >-
        The privacy notice must be written in a clear and conspicuous manner that
        is reasonably understandable to the customer. Institutions may use the
        model privacy form provided by regulators to satisfy notice content requirements.

guidance:
  prose: >-
    The Financial Privacy Rule (Regulation P / Regulation S-P) is the cornerstone of
    GLBA's consumer protection framework. Regulators examine whether privacy notices are
    timely, accurate, and comprehensible. Common examination findings include: notices that
    do not reflect actual information-sharing practices, failure to deliver initial notices
    at account opening, failure to deliver annual notices within the required timeframe,
    and notices written in overly complex legal language. Financial institutions subject to
    SEC regulation follow Regulation S-P (17 CFR Part 248), while those under FTC
    jurisdiction follow 16 CFR Part 313. The model privacy form (Safe Harbor) provides
    a standardized format that satisfies content requirements if completed accurately.
    Institutions must maintain records of notice delivery sufficient to demonstrate
    compliance during examinations.

references:
  - citation: "Gramm-Leach-Bliley Act, Title V, Subtitle A — Disclosure of Nonpublic Personal Information"
    url: "https://www.ftc.gov/legal-library/browse/statutes/gramm-leach-bliley-act"
  - citation: "Regulation P — Privacy of Consumer Financial Information (12 CFR Part 1016)"
    url: "https://www.consumerfinance.gov/rules-policy/regulations/1016/"
  - citation: "Regulation S-P — Privacy of Consumer Financial Information (17 CFR Part 248)"
    url: "https://www.sec.gov/rules/final/34-42974.htm"
  - citation: "Model Privacy Form (Safe Harbor)"
    url: "https://www.federalregister.gov/documents/2009/12/01/E9-27882/final-model-privacy-form-under-the-gramm-leach-bliley-act"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement privacy notice delivery as a first-class event in the customer
      onboarding workflow. Integrate privacy notice generation into the account creation
      pipeline so that no customer relationship can be established without a privacy notice
      delivery event being recorded. Store notice delivery records (timestamp, customer ID,
      notice version, delivery method) in an immutable audit log. Implement a notice
      versioning system that tracks all privacy notice revisions with effective dates.
      Build automated annual notice distribution pipelines that trigger based on customer
      relationship anniversary dates or regulatory calendar. Implement consent management
      infrastructure that captures electronic delivery consent with timestamp, IP address,
      and user agent. Use feature flags to manage privacy notice content variations across
      jurisdictions and regulatory regimes (FTC, SEC, state-level requirements).
    tools:
      - kubernetes
      - terraform
      - vault
      - backstage
      - kafka
      - postgresql
  devsecops:
    prose: >-
      Implement CI/CD pipeline checks that validate privacy notice content against
      regulatory templates before deployment. Create automated tests that verify the
      privacy notice delivery workflow fires correctly during account creation. Implement
      integration tests that confirm notice delivery records are properly persisted to the
      audit log. Use infrastructure-as-code to manage privacy notice delivery infrastructure
      with version-controlled configurations. Implement canary deployments for privacy
      notice changes to detect delivery failures before full rollout. Add pipeline stages
      that validate notice content against the model privacy form schema when notice
      templates are modified.
    tools:
      - gitlab-ci
      - checkov
      - terraform
      - selenium
      - cypress
  secops:
    prose: >-
      Monitor privacy notice delivery rates and flag anomalies (sudden drops in delivery
      success rates, delivery failures for specific customer segments). Generate monthly
      compliance reports showing: total notices delivered, delivery method breakdown,
      delivery failures and remediation status, upcoming annual notice deadlines, and
      notice version currency. Implement alerting for annual notice delivery deadlines
      approaching without completed distribution. Track and report on customer opt-out
      response rates as an indicator of notice effectiveness. Maintain evidence packages
      for regulatory examinations including sample notices, delivery logs, and consent
      records.
    tools:
      - splunk
      - elastic-siem
      - grc-platform
      - servicenow

