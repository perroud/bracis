implementation_guidance:
  platform_engineering:
    prose: >-
      Implement tiered identity verification in customer-facing systems that escalates
      verification requirements based on the sensitivity of the requested information
      or action. Deploy knowledge-based authentication (KBA) with dynamic questions
      that cannot be answered from publicly available information. Implement out-of-band
      verification for high-risk requests (sending a verification code to the registered
      phone or email before processing address changes, beneficiary changes, or large
      transactions). Deploy call recording and analysis for customer service interactions
      with automated detection of social engineering indicators. Implement rate limiting
      on customer information lookups to detect systematic enumeration attacks.
      Build a pretexting incident tracking system that captures reported attempts,
      investigation results, and pattern analysis. Deploy customer notification
      systems that alert customers when sensitive changes are made to their accounts.
    tools:
      - kubernetes
      - kafka
      - vault
      - redis
      - postgresql
      - twilio
  devsecops:
    prose: >-
      Implement automated security testing that includes social engineering test
      scenarios against customer-facing APIs (authentication bypass, information
      disclosure without proper verification). Deploy phishing simulation tooling
      integrated into the CI/CD pipeline for employee security awareness testing.
      Implement automated tests that verify identity verification procedures are
      enforced across all customer information access endpoints. Add pipeline stages
      that scan customer-facing code for insufficient authentication or authorization
      checks on NPI access routes. Implement threat modeling for customer-facing
      features that specifically considers pretexting and social engineering vectors.
    tools:
      - gitlab-ci
      - burp-suite
      - gophish
      - selenium
      - open-policy-agent
  secops:
    prose: >-
      Operate the pretexting detection and response program including monitoring of
      customer service interactions for social engineering indicators, investigation
      of reported pretexting attempts, and trend analysis. Conduct periodic social
      engineering assessments (phone-based pretexting tests, phishing simulations)
      to evaluate employee resilience. Track and report pretexting metrics: reported
      attempts, confirmed incidents, successful vs. unsuccessful attempts, and response
      times. Manage the security awareness training program with specific focus on
      social engineering detection. Coordinate with law enforcement on confirmed
      pretexting incidents. Generate quarterly pretexting risk reports for the qualified
      individual.
    tools:
      - splunk
      - elastic-siem
      - grc-platform
      - gophish
      - knowbe4
      - servicenow
      - crowdstrike

