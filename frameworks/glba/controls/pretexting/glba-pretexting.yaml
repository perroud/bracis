id: glba-pretexting
family: pretexting
title: "Pretexting Protections"
class: GLBA

statement:
  prose: >-
    Financial institutions shall implement controls to protect customer information
    against unauthorized access through pretexting — the practice of obtaining customer
    information from a financial institution under false pretenses. The institution
    shall establish procedures to verify the identity and authority of individuals
    requesting customer information and shall train employees to recognize and resist
    social engineering attacks.
  parts:
    - id: glba-pretexting.1
      label: "(1)"
      prose: >-
        The institution shall implement identity verification procedures for all
        requests for customer information, whether received by telephone, in person,
        by mail, or electronically. Verification shall confirm both the identity of
        the requester and their authority to access the requested information.
    - id: glba-pretexting.2
      label: "(2)"
      prose: >-
        The institution shall train all employees who handle customer information
        or customer information requests to recognize social engineering techniques,
        including pretexting, phishing, vishing, and impersonation. Training shall
        include practical examples and shall be refreshed at least annually.
    - id: glba-pretexting.3
      label: "(3)"
      prose: >-
        The institution shall implement technical controls that limit the ability
        to access or disclose customer information in response to unverified
        requests, including call-back verification procedures, out-of-band
        authentication for sensitive requests, and restrictions on the types of
        information that can be disclosed over specific channels.
    - id: glba-pretexting.4
      label: "(4)"
      prose: >-
        The institution shall establish procedures for reporting suspected pretexting
        attempts to the institution's security team and, where appropriate, to law
        enforcement. Suspected pretexting attempts shall be investigated, documented,
        and used to improve training and detection capabilities.

guidance:
  prose: >-
    The GLBA pretexting provisions (15 U.S.C. §§ 6821-6827) make it a federal crime
    to obtain or attempt to obtain customer information from a financial institution
    through false pretenses. While the criminal penalties apply to the pretexters,
    financial institutions have an obligation to implement reasonable controls to detect
    and prevent pretexting. Regulators examine whether institutions have effective
    customer authentication procedures and whether employees are trained to recognize
    social engineering. Common findings include: customer service representatives
    disclosing account information based on easily obtained identifiers (name, address,
    last four digits of SSN), lack of out-of-band verification for high-risk requests
    (address changes, account transfers, new device registrations), employees who are
    not trained to recognize pretexting techniques, and no process for reporting and
    investigating suspected pretexting attempts. Modern pretexting extends beyond phone
    calls to include deepfake voice and video, AI-generated phishing emails, and
    business email compromise targeting employees with access to NPI. Institutions
    should continuously update their detection capabilities to address evolving social
    engineering techniques.

references:
  - citation: "Gramm-Leach-Bliley Act, Title V, Subtitle B — Fraudulent Access to Financial Information (15 U.S.C. §§ 6821-6827)"
