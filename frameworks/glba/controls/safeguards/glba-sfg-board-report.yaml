id: glba-sfg-board-report
family: safeguards
title: "Board Reporting"
class: GLBA

statement:
  prose: >-
    The qualified individual shall report in writing, at least annually, to the board
    of directors or equivalent governing body (or, if the institution has no board or
    equivalent, to a senior officer responsible for the information security program).
    The report shall address the overall status of the information security program
    and the institution's compliance with the Safeguards Rule.
  parts:
    - id: glba-sfg-board-report.1
      label: "(1)"
      prose: >-
        The report shall address the overall status of the information security
        program, including the current state of safeguard implementation, the
        effectiveness of key controls, and progress against program objectives.
    - id: glba-sfg-board-report.2
      label: "(2)"
      prose: >-
        The report shall describe material matters related to the information
        security program, including risk assessment results, risk management and
        control decisions, service provider arrangements, results of testing,
        security events or violations and management's responses thereto, and
        recommendations for changes to the information security program.
    - id: glba-sfg-board-report.3
      label: "(3)"
      prose: >-
        The report shall be a written document provided to each member of the
        board or governing body and shall be retained as a corporate record in
        accordance with the institution's document retention policy.
    - id: glba-sfg-board-report.4
      label: "(4)"
      prose: >-
        The board or governing body shall review the report, ask questions as
        appropriate, and document its receipt and review of the report in board
        minutes or equivalent governance records.

guidance:
  prose: >-
    The annual board report is a mandatory governance requirement under the 2023
    Safeguards Rule amendment. It serves as the primary mechanism for board-level
    oversight of the information security program. The FTC examines whether the report
    is substantive (not perfunctory), whether it covers all required topics, whether
    the board meaningfully engaged with the content, and whether board feedback resulted
    in program improvements. Common findings include: reports that are superficial
    summaries without actionable content, reports that do not address security incidents
    or program deficiencies, reports that are not formally presented to the board
    (merely emailed without discussion), boards that do not document their review and
    discussion of the report, and reports that do not include recommendations from the
    qualified individual. The report should be candid about program weaknesses and
    resource needs — it is the qualified individual's primary vehicle for requesting
    board support and resources. For institutions without a board, the report must be
    directed to the senior officer with functional responsibility for the program.

references:
  - citation: "FTC Safeguards Rule — 16 CFR § 314.4(i)"
    url: "https://www.ecfr.gov/current/title-16/chapter-I/subchapter-C/part-314/section-314.4"
  - citation: "FFIEC IT Examination Handbook — Board and Management Oversight"
    url: "https://ithandbook.ffiec.gov/it-booklets/management.aspx"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build automated board report generation pipelines that aggregate security metrics
      from all sources (SIEM, vulnerability management, access management, incident
      response, vendor management, compliance monitoring) into a structured report
      format. Implement dashboard-to-report automation that translates real-time
      security dashboards into board-readable executive summaries with trend analysis.
      Deploy report versioning and approval workflows in the document management system
      with digital signatures from the qualified individual. Implement automated data
      collection for all report sections: risk assessment status, control effectiveness
      metrics, testing results, incident summaries, vendor risk posture, and compliance
      status. Build a board report template as code that ensures all required topics
      are addressed in every annual report.
    tools:
      - backstage
      - grafana
      - grc-platform
      - terraform
  devsecops:
    prose: >-
      Maintain board report templates and data collection scripts in version control
      with change tracking. Implement automated data extraction from CI/CD security
      tools (SAST findings, DAST findings, dependency vulnerabilities, container
      vulnerabilities) for inclusion in the board report. Build automated compliance
      scoring that quantifies program maturity for board reporting. Deploy report
      generation pipelines that produce draft reports on a scheduled cadence with
      current data.
    tools:
      - gitlab-ci
      - gitlab-security-dashboard
      - defectdojo
      - terraform
  secops:
    prose: >-
      Prepare the annual board report in collaboration with the qualified individual,
      covering all required topics with supporting data and trend analysis. Manage the
      board report review and approval workflow. Maintain evidence of board presentation
      and discussion (board minutes, attendance records, Q&A documentation). Track board
      directives resulting from report review and ensure follow-through. Generate interim
      (quarterly) security reports for the qualified individual to support continuous
      board awareness. Maintain a repository of prior board reports to demonstrate
      year-over-year program evolution.
    tools:
      - grc-platform
      - servicenow
      - splunk
      - elastic-siem

