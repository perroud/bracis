id: glba-sfg-qualified
family: safeguards
title: "Qualified Individual (CISO Designation)"
class: GLBA

statement:
  prose: >-
    Financial institutions shall designate a single qualified individual responsible for
    overseeing, implementing, and enforcing the institution's information security program.
    The qualified individual may be an employee, affiliate, or service provider, but the
    institution retains responsibility for compliance. The qualified individual must have
    sufficient knowledge, experience, authority, and resources to perform the role
    effectively.
  parts:
    - id: glba-sfg-qualified.1
      label: "(1)"
      prose: >-
        The institution shall formally designate a qualified individual with
        documented authority over the information security program. The designation
        shall be approved by the board of directors or equivalent governing body.
    - id: glba-sfg-qualified.2
      label: "(2)"
      prose: >-
        The qualified individual shall oversee the development, implementation,
        and maintenance of the information security program, including the risk
        assessment, safeguard implementation, testing, and monitoring processes.
    - id: glba-sfg-qualified.3
      label: "(3)"
      prose: >-
        If the qualified individual is a service provider or employee of an affiliate,
        the institution shall designate a senior member of its own staff to oversee
        the service provider's performance and shall maintain the institution's own
        compliance accountability.
    - id: glba-sfg-qualified.4
      label: "(4)"
      prose: >-
        The qualified individual shall provide a written report to the board of
        directors or equivalent governing body at least annually, in accordance
        with the board reporting requirements of the Safeguards Rule.

guidance:
  prose: >-
    The 2023 Safeguards Rule amendment made the qualified individual designation
    mandatory. This role is functionally equivalent to a Chief Information Security
    Officer (CISO), though the rule does not prescribe a specific title. The FTC
    examines whether the qualified individual has actual authority to make security
    decisions and allocate resources, not merely a nominal title. Common enforcement
    issues include: designating an individual without security expertise, designating
    a service provider without maintaining institutional oversight, failing to provide
    the qualified individual with sufficient budget or authority, and failing to document
    the designation formally. For smaller institutions that use a third-party service
    provider as the qualified individual, the institution must still have an internal
    person who understands the program and can hold the service provider accountable.
    The qualified individual's accountability includes all elements of the information
    security program, including vendor oversight and incident response.

references:
  - citation: "FTC Safeguards Rule — 16 CFR § 314.4(a)"
    url: "https://www.ecfr.gov/current/title-16/chapter-I/subchapter-C/part-314/section-314.4"
  - citation: "FTC Safeguards Rule Final Rule — Qualified Individual Requirements"
    url: "https://www.ftc.gov/legal-library/browse/federal-register-notices/16-cfr-part-314-standards-safeguarding-customer-information"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement role-based access in the GRC platform that grants the qualified
      individual full visibility into all security controls, compliance dashboards,
      and risk metrics. Build automated reporting pipelines that aggregate security
      metrics from all sources (SIEM, vulnerability management, access management,
      incident response) into a unified dashboard for the qualified individual.
      Implement automated escalation workflows that route security decisions requiring
      authority approval directly to the qualified individual. Deploy access to all
      security tooling and audit logs under the qualified individual's oversight role.
      Maintain the qualified individual's designation document in the policy repository
      with version control and board approval records.
    tools:
      - backstage
      - grc-platform
      - terraform
      - vault
  devsecops:
    prose: >-
      Configure CI/CD security scanning results to be accessible to the qualified
      individual through aggregated dashboards. Implement pipeline policies that
      escalate critical security findings to the qualified individual for disposition.
      Maintain the qualified individual's authority documentation in version control
      alongside the information security program. Implement automated reporting that
      provides the qualified individual with pipeline security metrics (vulnerabilities
      found, remediation timelines, policy exceptions).
    tools:
      - gitlab-ci
      - gitlab-security-dashboard
      - defectdojo
  secops:
    prose: >-
      Operate the qualified individual's reporting infrastructure including automated
      board report generation, security metrics aggregation, and risk trending analysis.
      Maintain a rolling evidence package of the qualified individual's activities
      (decisions made, reports delivered, programs reviewed, incidents overseen) for
      examination purposes. Implement the annual board report workflow with automated
      data collection and standardized report templates. Track the qualified individual's
      program review activities and document completion of all required oversight functions.
    tools:
      - grc-platform
      - servicenow
      - splunk
      - elastic-siem

