id: glba-sfg-incident
family: safeguards
title: "Incident Response Plan"
class: GLBA

statement:
  prose: >-
    Financial institutions shall establish a written incident response plan designed to
    promptly respond to, and recover from, any security event materially affecting the
    confidentiality, integrity, or availability of customer information. The plan shall
    define roles and responsibilities, communication procedures, containment and
    remediation processes, documentation requirements, and post-incident review procedures.
  parts:
    - id: glba-sfg-incident.1
      label: "(1)"
      prose: >-
        The incident response plan shall define the goals of the plan, the internal
        processes for responding to a security event, clear roles and responsibilities
        and levels of decision-making authority, communication and information sharing
        procedures (internal and external), requirements for remediation of identified
        weaknesses, and documentation and reporting procedures.
    - id: glba-sfg-incident.2
      label: "(2)"
      prose: >-
        The plan shall address notification obligations, including notification to the
        FTC and other applicable regulators, affected customers, and law enforcement
        as required by applicable federal and state laws.
    - id: glba-sfg-incident.3
      label: "(3)"
      prose: >-
        The institution shall conduct post-incident reviews to identify the root cause
        of each security event, evaluate the effectiveness of the response, and
        implement corrective actions to prevent recurrence.
    - id: glba-sfg-incident.4
      label: "(4)"
      prose: >-
        The incident response plan shall be tested periodically through tabletop
        exercises or simulations, and updated based on the results of testing,
        post-incident reviews, and changes in the threat landscape.
    - id: glba-sfg-incident.5
      label: "(5)"
      prose: >-
        The institution shall maintain documentation of all security events, response
        actions, and post-incident findings sufficient to support regulatory
        examination and legal proceedings.

guidance:
  prose: >-
    The 2023 Safeguards Rule amendment requires a written incident response plan as
    a mandatory element of the information security program. Additionally, the FTC's
    Health Breach Notification Rule and various state breach notification laws impose
    specific notification requirements that must be addressed in the plan. Common
    examination findings include: plans that exist on paper but have never been tested,
    plans that do not define clear escalation paths and decision-making authority, plans
    that do not address regulatory notification requirements (FTC notification under
    the Safeguards Rule, state breach notification laws), plans that do not include
    communication procedures for customers and third parties, and plans that have not
    been updated after organizational changes or real incidents. The incident response
    plan should be integrated with the institution's business continuity and disaster
    recovery plans. The qualified individual must be informed of all security events
    affecting customer information and must oversee the response process.

references:
  - citation: "FTC Safeguards Rule — 16 CFR § 314.4(h)"
    url: "https://www.ecfr.gov/current/title-16/chapter-I/subchapter-C/part-314/section-314.4"
  - citation: "FTC Health Breach Notification Rule — 16 CFR Part 318"
    url: "https://www.ecfr.gov/current/title-16/chapter-I/subchapter-C/part-318"
  - citation: "NIST SP 800-61 Rev. 2 — Computer Security Incident Handling Guide"
    url: "https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated incident detection and response (SOAR) workflows that
      trigger playbooks based on event classification. Build automated containment
      capabilities that can isolate compromised systems, revoke compromised credentials,
      and block malicious network traffic within minutes of detection. Deploy forensic
      data collection automation that preserves evidence (memory dumps, disk images,
      network captures) when an incident is declared. Implement incident communication
      infrastructure (secure war room channels, out-of-band communication, stakeholder
      notification templates). Build automated incident timeline reconstruction from
      aggregated logs. Implement customer notification infrastructure that can execute
      mass notification within regulatory timeframes. Deploy incident metrics dashboards
      that track MTTD (mean time to detect), MTTR (mean time to respond), and MTTC
      (mean time to contain).
    tools:
      - splunk-soar
      - pagerduty
      - kubernetes
      - vault
      - kafka
      - terraform
  devsecops:
    prose: >-
      Implement incident response runbooks as code in version control, ensuring
      they are reviewed and updated through the same change management process as
      application code. Deploy automated rollback pipelines that can revert compromised
      deployments quickly. Implement pipeline controls that prevent deployment during
      active incidents affecting NPI systems. Maintain incident response tool chains
      (forensic tools, analysis scripts, communication templates) in version-controlled
      repositories. Build automated evidence collection into CI/CD artifacts for
      post-incident analysis of deployment-related incidents.
    tools:
      - gitlab-ci
      - argocd
      - terraform
      - vault
  secops:
    prose: >-
      Operate the incident response process including detection, triage, containment,
      eradication, recovery, and post-incident review. Maintain incident response team
      rosters with current contact information and escalation procedures. Conduct
      quarterly tabletop exercises that simulate realistic scenarios (ransomware
      affecting NPI systems, insider data exfiltration, third-party breach involving
      shared NPI). Track and report incident metrics to the qualified individual and
      board. Manage regulatory notification workflows including FTC notification,
      state attorney general notifications, and customer breach notifications within
      required timeframes. Maintain incident documentation packages for examination
      evidence. Conduct annual reviews of the incident response plan based on lessons
      learned from actual incidents and tabletop exercises.
    tools:
      - splunk-soar
      - pagerduty
      - grc-platform
      - servicenow
      - crowdstrike
      - elastic-siem

