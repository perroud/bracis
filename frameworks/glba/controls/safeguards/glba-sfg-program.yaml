id: glba-sfg-program
family: safeguards
title: "Written Information Security Program"
class: GLBA

statement:
  prose: >-
    Financial institutions shall develop, implement, and maintain a comprehensive written
    information security program that contains administrative, technical, and physical
    safeguards appropriate to the size and complexity of the institution, the nature and
    scope of its activities, and the sensitivity of the customer information it handles.
    The program shall be designed to ensure the security and confidentiality of customer
    information, protect against anticipated threats or hazards, and protect against
    unauthorized access to or use of customer information.
  parts:
    - id: glba-sfg-program.1
      label: "(1)"
      prose: >-
        The information security program shall be based on the results of the risk
        assessment required under the Safeguards Rule and shall address the risks
        identified therein with appropriate safeguards.
    - id: glba-sfg-program.2
      label: "(2)"
      prose: >-
        The program shall include policies, procedures, and standards that address
        all elements required by 16 CFR Part 314, including access controls, encryption,
        change management, monitoring, incident response, and vendor oversight.
    - id: glba-sfg-program.3
      label: "(3)"
      prose: >-
        The program shall be approved by the board of directors or equivalent governing
        body and shall be reviewed and updated at least annually, or more frequently when
        material changes occur to the institution's operations, technology, or threat
        landscape.
    - id: glba-sfg-program.4
      label: "(4)"
      prose: >-
        The institution shall implement security awareness training for all personnel
        who have access to customer information, including training on the information
        security program, the institution's policies and procedures, and the individual's
        role in protecting customer information.

guidance:
  prose: >-
    The 2023 FTC Safeguards Rule amendment (effective June 9, 2023) transformed the
    Safeguards Rule from a principles-based standard into a prescriptive technical
    standard. The written information security program is now required to address specific
    technical controls including encryption, MFA, access controls, penetration testing,
    and incident response. The FTC examines whether the program is a living document that
    reflects the institution's actual risk profile and operational environment, not a
    generic policy template. Common enforcement findings include: programs that do not
    reflect the institution's actual technology environment, programs that have not been
    updated after significant technology changes, programs that lack specific technical
    standards (relying on vague language like "appropriate controls"), and programs that
    have not been approved by senior leadership. The qualified individual designated under
    the rule must have sufficient authority and resources to implement the program
    effectively.

references:
  - citation: "FTC Safeguards Rule — 16 CFR Part 314"
    url: "https://www.ecfr.gov/current/title-16/chapter-I/subchapter-C/part-314"
  - citation: "FTC Standards for Safeguarding Customer Information — Final Rule (2021 Amendment)"
    url: "https://www.ftc.gov/legal-library/browse/federal-register-notices/16-cfr-part-314-standards-safeguarding-customer-information"
  - citation: "FFIEC Information Technology Examination Handbook — Information Security"
    url: "https://ithandbook.ffiec.gov/it-booklets/information-security.aspx"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement the information security program as a policy-as-code framework that
      translates written policies into enforceable technical controls. Maintain the
      program documentation in a version-controlled repository with review and approval
      workflows that track all changes. Implement automated compliance dashboards that
      map each program requirement to its implementing technical control and display
      real-time compliance status. Deploy a policy engine that enforces program standards
      across the infrastructure (access controls, encryption requirements, network
      segmentation). Implement automated evidence collection for each program requirement
      to streamline examination preparation. Build security awareness training into the
      onboarding pipeline with automated tracking of completion and periodic refresher
      requirements.
    tools:
      - kubernetes
      - terraform
      - open-policy-agent
      - backstage
      - vault
      - gitlab
  devsecops:
    prose: >-
      Encode information security program standards as CI/CD pipeline policies that
      prevent deployment of non-compliant configurations. Implement policy checks that
      validate infrastructure-as-code against program requirements (encryption enabled,
      access controls configured, logging enabled). Maintain program documentation
      alongside code in the same version control system with merge request reviews for
      policy changes. Implement automated compliance testing that exercises program
      controls and reports results. Build program change management into the existing
      change management workflow so that policy changes follow the same review and
      approval process as code changes.
    tools:
      - gitlab-ci
      - open-policy-agent
      - checkov
      - tfsec
      - terraform
  secops:
    prose: >-
      Operate a continuous compliance monitoring program that tracks implementation
      status of all program requirements. Generate quarterly compliance reports for the
      qualified individual and board showing: control implementation status, gap
      analysis, remediation timelines, and risk acceptance decisions. Manage the annual
      program review process including evidence collection, gap identification, and
      program update recommendations. Track security awareness training completion rates
      and generate compliance reports. Maintain examination-ready evidence packages that
      demonstrate program implementation across all required elements.
    tools:
      - grc-platform
      - servicenow
      - splunk
      - elastic-siem

