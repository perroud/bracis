id: glba-sfg-risk-assessment
family: safeguards
title: "Risk Assessment"
class: GLBA

statement:
  prose: >-
    Financial institutions shall conduct a written risk assessment that identifies
    reasonably foreseeable internal and external risks to the security, confidentiality,
    and integrity of customer information. The risk assessment shall evaluate the
    sufficiency of existing safeguards to control identified risks and shall be
    periodically updated to address changes in the institution's operations, technology,
    and threat landscape.
  parts:
    - id: glba-sfg-risk-assessment.1
      label: "(1)"
      prose: >-
        The risk assessment shall identify reasonably foreseeable internal and
        external risks to the security, confidentiality, and integrity of customer
        information that could result in the unauthorized disclosure, misuse,
        alteration, destruction, or other compromise of such information.
    - id: glba-sfg-risk-assessment.2
      label: "(2)"
      prose: >-
        The risk assessment shall assess the sufficiency of any safeguards already
        in place to control the identified risks, including consideration of the
        risks in each relevant area of the institution's operations, including
        employee training, information systems, and information processing,
        storage, transmission, and disposal.
    - id: glba-sfg-risk-assessment.3
      label: "(3)"
      prose: >-
        The risk assessment shall be written and shall include criteria for evaluating
        and categorizing identified security risks or threats, criteria for assessing
        the confidentiality, integrity, and availability of information systems and
        customer information, and requirements for how identified risks will be
        mitigated or accepted.
    - id: glba-sfg-risk-assessment.4
      label: "(4)"
      prose: >-
        The risk assessment shall be periodically performed, at minimum annually,
        and shall be updated whenever there are material changes to the institution's
        operations, technology environment, or threat landscape that could affect
        the security of customer information.

guidance:
  prose: >-
    The 2023 Safeguards Rule amendment requires that the risk assessment be written —
    a departure from the prior principles-based approach that did not explicitly require
    documentation. The FTC examines whether the risk assessment is comprehensive,
    methodology-based, and actionable. Common enforcement findings include: risk
    assessments that are generic templates not tailored to the institution, risk
    assessments that do not cover all systems handling customer information, risk
    assessments that identify risks but do not evaluate existing controls, risk
    assessments that have not been updated after significant technology changes, and
    risk assessments that lack a documented methodology for risk scoring and
    prioritization. The risk assessment should be the foundation of the information
    security program — all safeguards should be traceable to identified risks.
    Institutions must be able to articulate why each safeguard was selected and how
    it addresses specific identified risks.

references:
  - citation: "FTC Safeguards Rule — 16 CFR § 314.4(b)"
    url: "https://www.ecfr.gov/current/title-16/chapter-I/subchapter-C/part-314/section-314.4"
  - citation: "FFIEC IT Examination Handbook — Risk Management"
    url: "https://ithandbook.ffiec.gov/it-booklets/management.aspx"
  - citation: "NIST SP 800-30 Rev. 1 — Guide for Conducting Risk Assessments"
    url: "https://csrc.nist.gov/publications/detail/sp/800-30/rev-1/final"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated asset discovery that continuously identifies all systems,
      applications, and data stores handling customer information. Build a risk
      register as a structured data store that links identified risks to assets,
      controls, and residual risk ratings. Implement automated risk scoring that
      ingests threat intelligence feeds, vulnerability scan results, and control
      effectiveness data to maintain a current risk posture. Deploy infrastructure
      scanning tools that automatically detect configuration changes and trigger
      risk reassessment workflows. Build a control-risk mapping that traces each
      implemented safeguard back to the risk it addresses, enabling gap analysis
      and coverage reporting. Implement automated data flow mapping that discovers
      NPI transmission paths and storage locations across the infrastructure.
    tools:
      - kubernetes
      - terraform
      - backstage
      - open-policy-agent
      - vault
  devsecops:
    prose: >-
      Integrate risk assessment inputs into the CI/CD pipeline by surfacing
      vulnerability scan results, dependency analysis, and infrastructure configuration
      findings. Implement pipeline stages that flag new NPI data flows or new
      external integrations for risk assessment review. Maintain the risk register
      as code in version control with change tracking and review workflows.
      Implement automated threat modeling that analyzes architecture changes for
      security implications. Deploy infrastructure-as-code scanning that detects
      deviations from risk-assessed configurations.
    tools:
      - gitlab-ci
      - checkov
      - tfsec
      - trivy
      - defectdojo
  secops:
    prose: >-
      Operate the risk assessment lifecycle including annual full assessments,
      triggered reassessments, and continuous risk monitoring. Aggregate risk
      inputs from vulnerability management, threat intelligence, incident history,
      and control testing into a unified risk view. Generate quarterly risk reports
      for the qualified individual showing: current risk posture, risk trending,
      new risks identified, remediation progress, and risk acceptance decisions.
      Maintain the written risk assessment document with full version history and
      approval records for examination purposes.
    tools:
      - grc-platform
      - servicenow
      - splunk
      - elastic-siem
      - tenable
      - qualys

