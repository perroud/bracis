id: glba-sfg-vendor
family: safeguards
title: "Service Provider Oversight"
class: GLBA

statement:
  prose: >-
    Financial institutions shall take reasonable steps to select and retain service
    providers that are capable of maintaining appropriate safeguards for customer
    information, and shall require service providers by contract to implement and
    maintain such safeguards. The institution shall periodically assess service providers
    based on the risk they present and the continued adequacy of their safeguards.
  parts:
    - id: glba-sfg-vendor.1
      label: "(1)"
      prose: >-
        The institution shall conduct due diligence assessments of service providers
        before engagement to evaluate their ability to maintain appropriate safeguards
        for customer information. Due diligence shall be commensurate with the risk
        and sensitivity of the customer information to be shared.
    - id: glba-sfg-vendor.2
      label: "(2)"
      prose: >-
        The institution shall require service providers by contract to implement
        and maintain safeguards for customer information that are consistent with
        the institution's own information security program requirements.
    - id: glba-sfg-vendor.3
      label: "(3)"
      prose: >-
        Contractual provisions shall address: confidentiality obligations, permitted
        uses and disclosures of customer information, security requirements, incident
        notification requirements, audit rights, subcontractor oversight, and data
        return or destruction upon contract termination.
    - id: glba-sfg-vendor.4
      label: "(4)"
      prose: >-
        The institution shall periodically assess each service provider's continued
        ability to maintain appropriate safeguards, with the frequency and depth of
        assessment based on the risk presented by the service provider relationship.
    - id: glba-sfg-vendor.5
      label: "(5)"
      prose: >-
        The institution shall maintain an inventory of all service providers that
        have access to or receive customer information, including the categories of
        NPI shared and the contractual safeguards in place.

guidance:
  prose: >-
    Service provider oversight is a critical element of the Safeguards Rule because
    financial institutions frequently share customer information with third parties
    for processing, analytics, marketing, and operational support. The institution
    cannot delegate its compliance obligation — it remains responsible for the security
    of customer information regardless of where it is processed. Common examination
    findings include: service providers engaged without due diligence assessment,
    contracts that do not require specific security safeguards, contracts that do not
    include incident notification provisions (leaving the institution unaware of
    breaches at the service provider), failure to periodically reassess service provider
    security, inability to produce a complete inventory of service providers with NPI
    access, and subcontractor chains where the institution has no visibility into
    fourth-party handlers of customer information. The qualified individual is
    responsible for overseeing the service provider management program and should
    receive reports on service provider risk assessments and compliance status.

references:
  - citation: "FTC Safeguards Rule — 16 CFR § 314.4(f)"
    url: "https://www.ecfr.gov/current/title-16/chapter-I/subchapter-C/part-314/section-314.4"
  - citation: "FFIEC IT Examination Handbook — Outsourcing Technology Services"
    url: "https://ithandbook.ffiec.gov/it-booklets/outsourcing-technology-services.aspx"
  - citation: "OCC Bulletin 2013-29 — Third-Party Relationships Risk Management"
    url: "https://www.occ.gov/news-issuances/bulletins/2013/bulletin-2013-29.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a centralized vendor management platform that maintains the service
      provider inventory, contract metadata, risk ratings, assessment schedules, and
      compliance status. Build automated data flow monitoring that detects when customer
      information is transmitted to third-party endpoints and validates against the
      approved service provider inventory. Implement API gateway controls that enforce
      authentication, authorization, encryption, and logging for all data exchanges
      with service providers. Deploy network segmentation that isolates service provider
      connections from internal NPI systems. Implement automated contract compliance
      monitoring that tracks contractual requirements (encryption standards, access
      controls, incident notification SLAs) and validates service provider attestations.
      Build service provider risk scoring models that consider: NPI volume, NPI
      sensitivity, access type (direct vs. indirect), geographic location, and
      regulatory status.
    tools:
      - backstage
      - terraform
      - open-policy-agent
      - vault
      - kong
      - istio
  devsecops:
    prose: >-
      Implement CI/CD pipeline checks that detect new third-party integrations
      (new API endpoints, new external services, new data connections) and require
      vendor management review before deployment. Scan infrastructure-as-code for
      external service connections that are not registered in the service provider
      inventory. Implement automated security assessment tooling that evaluates
      service provider-provided APIs and integrations for common vulnerabilities.
      Deploy contract-as-code frameworks that encode contractual security requirements
      as testable policies. Implement supply chain security controls (dependency
      verification, artifact signing) for software components provided by service
      providers.
    tools:
      - gitlab-ci
      - checkov
      - open-policy-agent
      - trivy
      - cosign
  secops:
    prose: >-
      Operate the service provider assessment lifecycle including initial due
      diligence, periodic reassessment, continuous monitoring, and offboarding.
      Maintain a risk-tiered assessment schedule (critical: annual on-site or SOC 2
      review, high: annual questionnaire, medium: biennial questionnaire, low: contract
      review). Track service provider incidents and breaches that may affect customer
      information. Generate quarterly vendor risk reports for the qualified individual
      showing: total vendors with NPI access, risk distribution, overdue assessments,
      open findings, and contract renewal timeline. Monitor service provider security
      posture through external attack surface monitoring and threat intelligence feeds.
      Manage service provider offboarding including confirmation of data return or
      destruction.
    tools:
      - grc-platform
      - servicenow
      - bitsight
      - securityscorecard
      - splunk

