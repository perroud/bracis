rules:
  - id: financial-privacy-rule
    title: "Financial Privacy Rule"
    cfr: "12 CFR Part 1016 (Regulation P)"
    description: >-
      Requires financial institutions to provide customers with privacy notices
      explaining what nonpublic personal information (NPI) the institution collects,
      how it uses that information, and how it protects that information. Customers
      must receive initial and annual privacy notices, and must be given the right
      to opt out of information sharing with non-affiliated third parties.
  - id: safeguards-rule
    title: "Safeguards Rule"
    cfr: "16 CFR Part 314"
    description: >-
      Requires financial institutions to develop, implement, and maintain a
      comprehensive information security program with administrative, technical,
      and physical safeguards to protect customer information. The 2023 amendment
      added specific technical requirements including encryption, MFA, access
      controls, penetration testing, incident response, and board reporting.
  - id: pretexting-provisions
    title: "Pretexting Provisions"
    cfr: "15 U.S.C. § 6821-6827"
    description: >-
      Prohibits the practice of pretexting — obtaining customer information from
      financial institutions under false pretenses. Protects consumers against
      social engineering attacks targeting their financial data by making it a
      federal crime to use fraudulent statements, forged documents, or deceptive
      means to access another person's financial information.

