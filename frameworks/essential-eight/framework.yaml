maturity_levels:
  - id: ml0
    title: "Maturity Level Zero"
    description: >-
      Not aligned with the intent of the mitigation strategy. Weaknesses in the
      overall cyber security posture exist that, when exploited, could facilitate
      the compromise of data confidentiality, integrity, or availability.
  - id: ml1
    title: "Maturity Level One"
    description: >-
      Partly aligned with the intent of the mitigation strategy. Represents a
      baseline level of maturity for small and medium enterprises and organisations
      not considered high-value targets.
  - id: ml2
    title: "Maturity Level Two"
    description: >-
      Mostly aligned with the intent of the mitigation strategy. Represents a
      standard level of maturity appropriate for organisations that are potential
      targets of more sophisticated adversaries.
  - id: ml3
    title: "Maturity Level Three"
    description: >-
      Fully aligned with the intent of the mitigation strategy. Represents an
      advanced level of maturity appropriate for organisations subject to targeting
      by sophisticated adversaries, including nation-state actors.

control_families:
  - id: prevent
    title: "Prevent Malware Delivery and Execution"
    control_count: 4
  - id: limit
    title: "Limit the Extent of Cyber Security Incidents"
    control_count: 3
  - id: recover
    title: "Recover Data and System Availability"
