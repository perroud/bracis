control_families:
  - id: plataforma
    title: "Platform Registration and Obligations"
    description: "Registration requirements, operational obligations, and governance duties for electronic investment platforms"
    articles: "art. 2 ao art. 12"
    control_count: 5
  - id: oferta
    title: "Offering and Fundraising Limits"
    description: "Rules governing public offerings through crowdfunding platforms, fundraising caps, and offering structure"
    articles: "art. 13 ao art. 22"
    control_count: 4
  - id: investidor
    title: "Investor Protection"
    description: "Investment limits per investor, withdrawal rights, mandatory disclosures, and suitability requirements"
    articles: "art. 23 ao art. 32"
    control_count: 4
  - id: divulgacao
    title: "Information Disclosure"
    description: "Transparency requirements, mandatory informational materials, periodic reporting, and disclosure of risks"
    articles: "art. 33 ao art. 42"
    control_count: 4
  - id: tecnologia
    title: "Technology and Security Requirements"
    description: "Platform technology standards, cybersecurity controls, data protection, and system resilience"
    articles: "art. 43 ao art. 50"
    control_count: 4
  - id: pld-ft
    title: "Anti-Money Laundering and Counter-Terrorism Financing"
    description: "AML/CFT obligations for crowdfunding platforms, KYC procedures, suspicious transaction monitoring"
    articles: "art. 51 ao art. 58"
    control_count: 4
related_frameworks:
  - framework_id: cvm-175
    relationship: complements
    description: "CVM 175 regulates investment funds that may invest through crowdfunding platforms regulated by CVM 88. Both share investor protection and transparency requirements."
  - framework_id: cvm-50
    relationship: complements
    description: "CVM 50 establishes AML/CFT requirements for capital market participants. Crowdfunding platforms regulated by CVM 88 must comply with CVM 50 anti-money laundering controls."
  - framework_id: cvm-35
    relationship: complements
    description: "CVM 35 establishes cybersecurity requirements for capital market participants. Platforms regulated by CVM 88 must comply with cybersecurity controls from CVM 35."
  - framework_id: cvm-135
    relationship: complements
    description: "CVM 135 regulates public offerings of securities. CVM 88 provides a simplified regime for small offerings through crowdfunding platforms, complementing the general framework."
  - framework_id: lgpd
    relationship: complements
    description: "LGPD complements CVM 88 in the protection of personal data of investors using crowdfunding platforms, requiring legal basis, consent, and security measures."
  - framework_id: marco-civil
    relationship: complements
    description: "Marco Civil da Internet establishes principles for internet platforms that apply to electronic crowdfunding platforms regulated by CVM 88."
