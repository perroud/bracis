id: crowd-4
family: plataforma
title: "Syndication and Lead Investor Requirements"
class: CVM-88
baselines: [plataformas-crowdfunding]
statement:
  prose: |
    Art. 8º. A plataforma pode admitir a realização de ofertas com
    sindicação, nas quais um investidor líder participa da estruturação
    da oferta e lidera o investimento.

    § 1º O investidor líder deve: I — ser investidor qualificado nos
    termos da regulamentação da CVM; II — investir na oferta valor
    mínimo equivalente a 5% (cinco por cento) do valor total da
    captação; III — declarar que não possui conflito de interesses com
    a sociedade empresária emissora; IV — disponibilizar aos demais
    investidores análise detalhada da sociedade empresária e da oferta.

    § 2º A plataforma deve divulgar informações sobre o investidor líder,
    incluindo sua qualificação, experiência e o valor investido.

    § 3º Em caso de sindicação, a plataforma deve assegurar que o
    investidor líder exerça suas funções de forma independente e no
    interesse dos demais investidores.

    § 4º A remuneração do investidor líder e as condições do sindicato
    devem ser divulgadas de forma clara e destacada no material da oferta.
guidance:
  prose: |
    Article 8 regulates syndication in crowdfunding offerings, allowing a
    lead investor to structure and co-invest in deals alongside retail
    investors.

    **Lead investor requirements:**
    - Must be a qualified investor per CVM regulations (generally
      R$1M+ in financial investments or certified professionals)
    - Minimum 5% skin in the game (invests at least 5% of total raise)
    - No conflicts of interest with the issuer
    - Must provide detailed analysis of the issuer and offering

    **Platform obligations in syndicated offerings:**
    - Disclose lead investor qualifications, experience, and investment
      amount
    - Ensure lead investor independence
    - Clearly disclose lead investor compensation and syndicate terms

    **Risk mitigation:**
    Syndication provides investors with the benefit of professional due
    diligence while maintaining the democratic nature of crowdfunding.
    However, platforms must guard against lead investors becoming
    de facto advisors without proper registration.
implementation_guidance:
  platform_engineering:
    prose: |
      **Syndication module infrastructure:**
      1. Build a lead investor verification system that validates
         qualified investor status against CVM criteria (financial
         assets, certifications).
      2. Implement automated 5% minimum investment check that blocks
         syndicated offering publication if lead investor commitment
         is below threshold.
      3. Deploy conflict of interest declaration workflow with digital
         signature for lead investors.

      **Disclosure automation:**
      4. Template-driven disclosure system that automatically generates
         syndication disclosure pages with lead investor information.
      5. Implement document management for lead investor analysis
         reports with version control and access logging.
    tools:
      - postgresql
      - elasticsearch
      - minio
      - kubernetes
  devsecops:
    prose: |
      **Secure syndication development:**
      1. Implement comprehensive test suites for syndication business
         rules (5% threshold, qualified investor checks, conflict
         declarations).
      2. SAST scanning focused on financial calculation modules to
         prevent rounding errors or threshold bypass vulnerabilities.
      3. Code review by compliance-aware developers for any changes
         to syndication logic (CODEOWNERS enforcement).

      **Data integrity:**
      4. Implement database constraints and application-level validation
         for syndication parameters (double validation pattern).
      5. Automated integration tests simulating end-to-end syndicated
         offering workflow.
    tools:
      - gitlab-ci
      - gitlab-sast
      - jest
      - cypress
  secops:
    prose: |
      **Syndication oversight:**
      1. Monitor lead investor verification processes for anomalies
         (forged documentation, inconsistent financial declarations).
      2. Audit trail for all syndication decisions: who approved the
         lead investor, when, based on what evidence.
      3. Periodic review of lead investor independence — flag any
         recurring relationships between the same lead investor and
         issuers.

      **Regulatory compliance:**
      4. Generate syndication reports for CVM showing all syndicated
         offerings, lead investors, and compliance status.
      5. Monitor for unauthorized advisory activity by lead investors.
    tools:
      - grc-platform
      - siem
      - fraud-detection
