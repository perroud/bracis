id: crowd-1
family: plataforma
title: "Platform Registration and Authorization"
class: CVM-88
baselines: [plataformas-crowdfunding]
statement:
  prose: |
    Art. 2º. A plataforma eletrônica de investimento participativo deve ser
    registrada na CVM para exercer a atividade de intermediação de ofertas
    públicas de distribuição de valores mobiliários de emissão de sociedades
    empresárias de pequeno porte.

    § 1º O pedido de registro deve ser instruído com: I — ato constitutivo
    atualizado; II — demonstração de capacidade técnica e operacional para
    o exercício da atividade; III — descrição detalhada dos mecanismos de
    segurança da informação e de proteção de dados; IV — políticas e
    procedimentos internos relativos à prevenção à lavagem de dinheiro e ao
    financiamento do terrorismo; V — identificação dos controladores e
    administradores.

    § 2º A CVM pode indeferir o pedido de registro caso não estejam
    atendidos os requisitos estabelecidos nesta Resolução ou caso a
    concessão do registro possa representar risco ao regular funcionamento
    do mercado de valores mobiliários.
guidance:
  prose: |
    Article 2 establishes the mandatory registration of electronic investment
    platforms (crowdfunding platforms) with the CVM. No entity may operate as
    an intermediary for equity crowdfunding offerings without prior CVM
    registration.

    **Key requirements for registration:**
    - Updated corporate documents demonstrating legal constitution
    - Proof of technical and operational capacity (infrastructure, team,
      systems)
    - Detailed description of information security mechanisms and data
      protection controls
    - AML/CFT policies and procedures compliant with CVM 50
    - Full identification of controlling shareholders and executives

    **CVM discretion:**
    The CVM retains the authority to deny registration if requirements are
    unmet or if registration could pose systemic risk to the securities
    market. This includes assessment of the platform's technology stack,
    governance structure, and financial soundness.

    **Ongoing obligation:**
    Registration is not a one-time event. Platforms must maintain compliance
    with all registration requirements on an ongoing basis. Material changes
    to the information provided at registration must be communicated to CVM
    promptly.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infrastructure for CVM registration compliance:**
      1. Document the full technology stack and architecture in a
         machine-readable format (YAML/JSON) for CVM submission.
      2. Implement infrastructure-as-code (IaC) to demonstrate repeatable,
         auditable infrastructure provisioning.
      3. Deploy monitoring and observability stack (metrics, logs, traces)
         to evidence operational capacity.
      4. Maintain a configuration management database (CMDB) of all
         platform components.

      **Security mechanisms documentation:**
      5. Produce architecture diagrams showing security controls at each
         layer (network, application, data).
      6. Implement automated compliance scanning to continuously validate
         adherence to CVM requirements.
    tools:
      - terraform
      - pulumi
      - grafana
      - prometheus
      - elasticsearch
  devsecops:
    prose: |
      **DevSecOps evidence for registration:**
      1. Maintain a CI/CD pipeline with full security scanning (SAST, DAST,
         dependency scanning, secret detection) as evidence of secure
         development practices.
      2. Implement code review policies with mandatory approvals before
         merge to demonstrate governance.
      3. Track all changes to platform code and infrastructure via Git
         with signed commits and audit trail.

      **Continuous compliance:**
      4. Automate compliance checks in the pipeline that validate CVM 88
         requirements on every deployment.
      5. Generate compliance reports from pipeline artifacts for CVM
         submission.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - gitlab-secret-detection
  secops:
    prose: |
      **Security operations for platform registration:**
      1. Maintain a Security Operations Center (SOC) or equivalent
         monitoring capability as evidence of operational capacity.
      2. Document and implement an incident response plan specific to
         the crowdfunding platform.
      3. Conduct periodic penetration testing and maintain reports for
         CVM review.

      **Regulatory reporting:**
      4. Prepare quarterly compliance reports demonstrating ongoing
         adherence to registration requirements.
      5. Maintain an up-to-date risk register covering all platform
         operations.
    tools:
      - siem
      - grc-platform
      - vulnerability-scanner
legal_references:
  - framework_id: cvm-35
    articles: ["art-2"]
    relationship: complements
  - framework_id: cvm-50
    articles: ["art-1"]
    relationship: complements
