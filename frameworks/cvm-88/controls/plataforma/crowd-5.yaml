id: crowd-5
family: plataforma
title: "Secondary Market and Token Trading"
class: CVM-88
baselines: [plataformas-crowdfunding]
statement:
  prose: |
    Art. 10. A plataforma eletrônica de investimento participativo pode
    manter ambiente de negociação secundária dos valores mobiliários
    ofertados por seu intermédio, observados os seguintes requisitos:
    I — os valores mobiliários tenham sido objeto de oferta pública
    encerrada com sucesso na mesma plataforma; II — a negociação
    secundária seja realizada exclusivamente entre investidores
    cadastrados na plataforma; III — a plataforma disponibilize
    informações atualizadas sobre a sociedade empresária emissora;
    IV — a plataforma adote mecanismos de formação de preço transparentes.

    § 1º No caso de valores mobiliários representados por tokens em
    redes de registro distribuído, a plataforma deve assegurar:
    I — a correspondência entre o token e o valor mobiliário subjacente;
    II — a integridade e a segurança das transações realizadas;
    III — a rastreabilidade das operações; IV — mecanismos adequados de
    custódia dos tokens.

    § 2º A plataforma deve manter registro atualizado de todas as
    operações realizadas no mercado secundário, incluindo identificação
    das partes, valores e datas.
guidance:
  prose: |
    Article 10 is a landmark provision allowing crowdfunding platforms to
    operate secondary markets for securities originally offered through
    the platform. This addresses the historically illiquid nature of
    crowdfunding investments.

    **Secondary market requirements:**
    - Only securities from successful offerings on the same platform
    - Trading restricted to registered platform investors
    - Issuer information must be kept current
    - Transparent price formation mechanisms

    **Token-specific requirements:**
    When securities are tokenized (represented as tokens on distributed
    ledger technology), additional requirements apply:
    - Token-to-security correspondence must be verifiable
    - Transaction integrity and security
    - Full operational traceability
    - Adequate custody mechanisms for tokens

    **Record-keeping:**
    Complete records of all secondary market transactions must be
    maintained, including counterparty identification, amounts, and
    dates. This supports both AML/CFT obligations and CVM oversight.

    **Regulatory significance:**
    This provision positions CVM 88 as one of the most progressive
    crowdfunding regulations globally by explicitly addressing tokenized
    securities and secondary trading.
implementation_guidance:
  platform_engineering:
    prose: |
      **Secondary market infrastructure:**
      1. Build an order matching engine with transparent price discovery
         (order book or auction mechanism with full visibility).
      2. Implement investor verification at trade execution — validate
         both buyer and seller are registered on the platform.
      3. Deploy immutable transaction ledger for all secondary trades
         with full counterparty identification.

      **Token infrastructure:**
      4. Implement token-security mapping registry that maintains
         1:1 correspondence between tokens and underlying securities.
      5. Deploy smart contract or on-chain validation for token transfers
         that enforces platform rules (only registered investors,
         valid securities).
      6. Implement token custody solution with multi-signature or
         HSM-backed key management.
      7. Build blockchain indexer for full transaction traceability.
    tools:
      - postgresql
      - redis
      - ethereum
      - hardhat
      - hsm
      - vault
      - kubernetes
  devsecops:
    prose: |
      **Secure secondary market development:**
      1. Smart contract auditing: run automated analysis tools (Slither,
         Mythril) on all smart contracts before deployment.
      2. SAST and DAST for the trading engine to prevent price
         manipulation, race conditions, and front-running vulnerabilities.
      3. Comprehensive test suite covering edge cases: concurrent trades,
         partial fills, token-security mismatch scenarios.

      **Deployment safety:**
      4. Implement canary deployments for trading engine changes with
         automatic rollback on error rate increase.
      5. Mandatory code freeze and extended testing period for smart
         contract updates.
    tools:
      - gitlab-ci
      - slither
      - mythril
      - gitlab-sast
      - gitlab-dast
  secops:
    prose: |
      **Trading surveillance:**
      1. Monitor secondary market for suspicious trading patterns:
         wash trading, market manipulation, insider trading indicators.
      2. Real-time alerting for unusual price movements or volume spikes.
      3. Monitor token custody for unauthorized access or key compromise
         attempts.

      **Compliance monitoring:**
      4. Daily reconciliation between token registry and security
         records to ensure 1:1 correspondence.
      5. Generate regulatory reports on secondary market activity for
         CVM submission.
      6. Maintain complete audit trail of all trades accessible for
         5+ years.
    tools:
      - siem
      - blockchain-analytics
      - trade-surveillance
      - grc-platform
