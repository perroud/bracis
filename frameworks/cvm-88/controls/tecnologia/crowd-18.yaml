id: crowd-18
family: tecnologia
title: "Platform Cybersecurity and Information Security"
class: CVM-88
baselines: [plataformas-crowdfunding]
statement:
  prose: |
    Art. 43. A plataforma eletrônica de investimento participativo deve
    implementar e manter política de segurança cibernética que contemple,
    no mínimo: I — procedimentos e controles para redução da
    vulnerabilidade a incidentes cibernéticos; II — mecanismos de
    proteção de dados pessoais e financeiros de investidores e emissores;
    III — procedimentos de resposta a incidentes, incluindo plano de
    comunicação; IV — programa de testes periódicos de segurança,
    incluindo testes de intrusão; V — controles de acesso lógico aos
    sistemas e informações da plataforma.

    § 1º A política de segurança cibernética deve ser aprovada pelo
    órgão máximo de administração da plataforma e revisada, no mínimo,
    anualmente.

    § 2º A plataforma deve designar diretor ou pessoa responsável pela
    implementação e cumprimento da política de segurança cibernética.

    § 3º A plataforma deve manter registro de incidentes cibernéticos
    e das providências adotadas pelo prazo mínimo de 5 (cinco) anos.
guidance:
  prose: |
    Article 43 establishes comprehensive cybersecurity requirements for
    crowdfunding platforms. This aligns with CVM 35 (cybersecurity for
    capital market participants) but is tailored to the crowdfunding
    context.

    **Mandatory cybersecurity policy components:**
    1. Vulnerability reduction procedures and controls
    2. Data protection mechanisms (personal and financial data)
    3. Incident response procedures with communication plan
    4. Periodic security testing including penetration testing
    5. Logical access controls for systems and information

    **Governance requirements:**
    - Policy must be approved by the platform's highest governing body
    - Annual policy review is mandatory
    - A designated director or officer must be responsible for
      cybersecurity implementation and compliance

    **Record-keeping:**
    All cybersecurity incidents and remediation actions must be retained
    for minimum 5 years.

    **Regulatory alignment:**
    This article should be read together with CVM 35 and LGPD, which
    provide additional requirements for cybersecurity and data protection.
implementation_guidance:
  platform_engineering:
    prose: |
      **Cybersecurity infrastructure:**
      1. Deploy defense-in-depth architecture: WAF, IDS/IPS, network
         segmentation, and endpoint protection for all platform
         components.
      2. Implement encryption at rest (AES-256) and in transit (TLS 1.3)
         for all investor and issuer data.
      3. Deploy centralized secrets management with automatic rotation
         (Vault or equivalent).
      4. Implement RBAC with MFA for all platform administrative
         access.

      **Vulnerability management:**
      5. Deploy automated vulnerability scanning across all
         infrastructure components with weekly full scans.
      6. Implement patch management process with SLAs: critical
         (24h), high (72h), medium (7 days), low (30 days).
      7. Conduct annual penetration testing by qualified third party.
    tools:
      - vault
      - waf
      - ids-ips
      - vulnerability-scanner
      - terraform
      - kubernetes
  devsecops:
    prose: |
      **Secure development lifecycle:**
      1. Implement full security scanning pipeline: SAST, DAST,
         dependency scanning, container scanning, secret detection,
         and license scanning on every commit.
      2. Enforce branch protection with mandatory code review and
         security approval for changes to authentication, authorization,
         and payment modules.
      3. Implement security regression testing: maintain a suite of
         tests for previously discovered vulnerabilities to prevent
         reintroduction.

      **Continuous security:**
      4. Deploy automated security benchmarking (CIS Benchmarks) for
         infrastructure and application configurations.
      5. Implement software composition analysis (SCA) with automated
         alerts for known vulnerable dependencies.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - gitlab-container-scanning
      - gitlab-secret-detection
      - trivy
  secops:
    prose: |
      **Security operations center:**
      1. Deploy SIEM with correlation rules tailored to crowdfunding
         platform threats: account takeover, payment fraud, data
         exfiltration.
      2. Implement 24/7 monitoring for critical security events with
         automated incident creation and escalation.
      3. Maintain incident response playbooks specific to crowdfunding
         threats: investor data breach, payment system compromise,
         platform availability attack.

      **Compliance evidence:**
      4. Maintain incident register with 5-year retention covering all
         cybersecurity events, severity, impact, and resolution.
      5. Generate annual cybersecurity compliance report for board
         approval and CVM submission.
      6. Conduct annual tabletop exercises simulating major incident
         scenarios.
    tools:
      - siem
      - soar
      - grc-platform
      - edr
