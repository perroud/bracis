id: crowd-21
family: tecnologia
title: "Technology Outsourcing and Third-Party Risk"
class: CVM-88
baselines: [plataformas-crowdfunding]
statement:
  prose: |
    Art. 49. A contratação de serviços de tecnologia por terceiros pela
    plataforma não a exime de suas responsabilidades perante investidores,
    emissores e a CVM.

    § 1º A plataforma deve: I — avaliar previamente a capacidade técnica
    e a segurança do prestador de serviços de tecnologia; II — formalizar
    contratualmente os níveis de serviço, os requisitos de segurança e
    as responsabilidades do prestador; III — monitorar continuamente a
    qualidade e a segurança dos serviços prestados; IV — assegurar que
    o prestador de serviços adote medidas de proteção de dados compatíveis
    com as exigências aplicáveis à plataforma.

    § 2º A plataforma deve manter plano de contingência para a hipótese
    de interrupção ou encerramento dos serviços prestados por terceiros,
    incluindo estratégia de migração de dados e sistemas.

    § 3º A CVM pode requerer informações sobre os prestadores de serviços
    de tecnologia contratados pela plataforma e sobre os respectivos
    contratos.
guidance:
  prose: |
    Article 49 addresses technology outsourcing risk, establishing that
    platforms remain fully responsible for regulatory compliance
    regardless of outsourcing arrangements.

    **Non-transferable responsibility:**
    Outsourcing technology services does not transfer regulatory
    responsibility. The platform remains liable for all obligations under
    CVM 88 even when services are provided by third parties.

    **Due diligence requirements:**
    - Pre-contract assessment of technical capacity and security
    - Formal SLA contracts with security requirements
    - Continuous monitoring of service quality and security
    - Data protection requirements flowing down to service providers

    **Exit strategy:**
    Platforms must maintain a contingency plan for third-party service
    interruption or termination, including data and system migration
    strategy. This prevents vendor lock-in from becoming a regulatory risk.

    **CVM transparency:**
    The CVM can request information about technology service providers and
    their contracts at any time.
implementation_guidance:
  platform_engineering:
    prose: |
      **Third-party risk management infrastructure:**
      1. Implement vendor management platform tracking all technology
         service providers with security ratings, SLA compliance, and
         contract details.
      2. Deploy continuous monitoring for third-party services: uptime,
         response time, error rates, security posture.
      3. Implement API abstraction layers that enable switching between
         service providers without core platform changes.

      **Data portability:**
      4. Design data schemas and export capabilities that support
         migration to alternative providers.
      5. Maintain documented migration playbooks for each critical
         third-party service.
      6. Regular backup of all data held by third-party providers in
         platform-controlled storage.
    tools:
      - terraform
      - kubernetes
      - api-gateway
      - vendor-management
      - grafana
  devsecops:
    prose: |
      **Third-party integration security:**
      1. Security review for all third-party API integrations including
         authentication, data encryption, and error handling.
      2. Dependency scanning to identify vulnerabilities in third-party
         libraries and components.
      3. Container scanning for third-party container images used in
         the platform.

      **Vendor assessment automation:**
      4. Automated security questionnaire for technology vendors with
         scoring and risk classification.
      5. CI pipeline gates that block deployment of unapproved
         third-party components.
    tools:
      - gitlab-ci
      - gitlab-dependency-scanning
      - gitlab-container-scanning
      - snyk
  secops:
    prose: |
      **Third-party security monitoring:**
      1. Monitor third-party service security posture using security
         ratings platforms and vulnerability feeds.
      2. Include third-party services in incident response planning —
         define escalation paths for vendor-caused incidents.
      3. Annual security assessment of critical technology vendors.

      **Compliance documentation:**
      4. Maintain vendor register with contracts, SLAs, security
         assessments, and CVM-reportable information.
      5. Conduct annual vendor risk assessment with documented
         findings and remediation tracking.
      6. Maintain tested migration playbook for critical vendor
         replacement.
    tools:
      - vendor-risk-platform
      - grc-platform
      - siem
