id: crowd-22
family: pld-ft
title: "AML/CFT Policy and Program"
class: CVM-88
baselines: [plataformas-crowdfunding]
statement:
  prose: |
    Art. 51. A plataforma eletrônica de investimento participativo deve
    implementar e manter política e procedimentos de prevenção à lavagem
    de dinheiro e ao financiamento do terrorismo (PLD/FT) compatíveis com
    a natureza, o porte e a complexidade de suas operações.

    § 1º A política de PLD/FT deve contemplar, no mínimo: I — identificação
    e qualificação de investidores e de sociedades empresárias emissoras
    (Know Your Customer — KYC); II — monitoramento de operações com o
    objetivo de detectar operações suspeitas; III — comunicação de operações
    suspeitas ao Conselho de Controle de Atividades Financeiras (COAF);
    IV — treinamento periódico de funcionários e colaboradores sobre
    procedimentos de PLD/FT; V — avaliação interna de riscos de lavagem
    de dinheiro e financiamento do terrorismo.

    § 2º A política de PLD/FT deve ser aprovada pela administração da
    plataforma e revisada, no mínimo, anualmente.

    § 3º A plataforma deve designar diretor ou pessoa responsável pelo
    cumprimento das obrigações de PLD/FT.
guidance:
  prose: |
    Article 51 mandates a comprehensive AML/CFT program for crowdfunding
    platforms. This aligns with CVM 50 (AML/CFT for capital market
    participants) and COAF regulations.

    **Core AML/CFT program components:**
    1. KYC — identification and qualification of investors and issuers
    2. Transaction monitoring for suspicious activity detection
    3. SAR (Suspicious Activity Report) filing with COAF
    4. Periodic employee AML/CFT training
    5. Internal AML/CFT risk assessment

    **Governance:**
    - Policy must be approved by platform management
    - Annual review is mandatory
    - A designated officer must be responsible for AML/CFT compliance

    **Proportionality:**
    The program must be proportional to the nature, size, and complexity
    of the platform's operations. A platform handling R$50M annually
    needs more sophisticated controls than one handling R$5M.

    **Regulatory coordination:**
    Crowdfunding platforms interact with both CVM (securities regulator)
    and COAF (financial intelligence unit). Compliance obligations from
    both must be addressed.
implementation_guidance:
  platform_engineering:
    prose: |
      **AML/CFT technology infrastructure:**
      1. Deploy KYC onboarding system with identity verification
         (document validation, facial recognition, sanctions screening)
         for both investors and issuers.
      2. Implement transaction monitoring engine with rule-based and
         behavioral analysis for suspicious activity detection.
      3. Build COAF reporting integration for automated SAR (Suspicious
         Activity Report) generation and submission.

      **Risk assessment:**
      4. Implement risk scoring model for investors and issuers based
         on: geography, transaction patterns, PEP status, sanctions
         lists, and behavioral indicators.
      5. Deploy watchlist screening (OFAC, UN, EU, Brazilian PEP lists)
         with real-time and batch matching.
      6. Build AML/CFT case management system for investigation and
         documentation of suspicious activities.
    tools:
      - kyc-service
      - transaction-monitoring
      - sanctions-screening
      - postgresql
      - elasticsearch
      - kubernetes
  devsecops:
    prose: |
      **AML/CFT system security:**
      1. SAST and secret detection for AML/CFT code to prevent data
         leakage of suspicious activity indicators or COAF
         communications.
      2. Comprehensive testing of transaction monitoring rules with
         known scenarios (structuring, layering, unusual patterns).
      3. Integration tests for COAF reporting pipeline end-to-end.

      **Data integrity:**
      4. Database integrity constraints for KYC records (prevent
         modification of verified identity data without audit trail).
      5. Code review by AML/CFT compliance team for changes to
         monitoring rules or risk scoring algorithms.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-secret-detection
      - jest
      - sonarqube
  secops:
    prose: |
      **AML/CFT operations:**
      1. Monitor transaction monitoring system for effectiveness:
         alert volumes, false positive rates, investigation outcomes.
      2. Daily review of high-risk alerts and suspicious activity
         indicators.
      3. Track COAF reporting compliance: timeliness of SAR
         submissions, completeness of reports.

      **Compliance evidence:**
      4. Maintain AML/CFT program documentation with annual review
         evidence, training records, and risk assessment results.
      5. Generate regulatory compliance dashboards for management
         and CVM/COAF reporting.
      6. Conduct annual independent AML/CFT program effectiveness
         review.
    tools:
      - siem
      - grc-platform
      - case-management
      - transaction-monitoring
