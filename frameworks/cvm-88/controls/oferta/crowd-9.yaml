id: crowd-9
family: oferta
title: "Permitted Securities and Offering Restrictions"
class: CVM-88
baselines: [plataformas-crowdfunding]
statement:
  prose: |
    Art. 19. Podem ser ofertados por meio de plataforma eletrônica de
    investimento participativo os seguintes valores mobiliários:
    I — ações; II — debêntures; III — debêntures conversíveis em ações;
    IV — cotas de sociedades limitadas; V — contratos de investimento
    coletivo; VI — títulos de dívida; VII — tokens representativos de
    valores mobiliários previstos nos incisos anteriores.

    § 1º Os valores mobiliários ofertados podem ser representados por
    tokens registrados em sistemas de registro distribuído, desde que
    a plataforma assegure a correspondência entre o token e o valor
    mobiliário subjacente.

    § 2º A plataforma deve manter registro atualizado de todos os valores
    mobiliários ofertados e de seus respectivos titulares.

    § 3º É vedada a oferta de valores mobiliários de emissão de
    instituições financeiras, seguradoras, sociedades de capitalização e
    entidades de previdência complementar aberta por meio de plataforma
    eletrônica de investimento participativo.
guidance:
  prose: |
    Article 19 defines the types of securities that may be offered through
    crowdfunding platforms, providing a comprehensive list that includes
    both traditional instruments and tokenized representations.

    **Permitted securities:**
    - Equity: shares (ações) and limited company quotas (cotas de limitada)
    - Debt: debentures, convertible debentures, debt securities
    - Hybrid: collective investment contracts (contratos de investimento
      coletivo)
    - Tokenized: tokens representing any of the above securities

    **Tokenization:**
    Securities may be represented as tokens on distributed ledger systems,
    provided the platform ensures verifiable correspondence between the
    token and the underlying security.

    **Prohibited issuers:**
    Financial institutions, insurers, capitalization companies, and open
    pension entities are expressly prohibited from issuing through
    crowdfunding platforms. This prevents regulated financial entities
    from using the simplified regime.

    **Registry obligation:**
    Platforms must maintain an updated registry of all offered securities
    and their holders — essentially acting as the book-entry registrar
    for crowdfunding securities.
implementation_guidance:
  platform_engineering:
    prose: |
      **Securities management system:**
      1. Build a multi-instrument offering engine supporting all 7
         permitted security types with type-specific workflows and
         validation rules.
      2. Implement securities registry (cap table management) with
         real-time holder tracking, transfer recording, and ownership
         verification.
      3. Deploy token-security correspondence system for tokenized
         offerings with on-chain and off-chain reconciliation.

      **Issuer restriction enforcement:**
      4. Integrate with BCB and SUSEP registries to automatically
         verify issuers are not financial institutions, insurers, or
         pension entities.
      5. Implement CNAE code validation in issuer onboarding to flag
         prohibited industry codes.
    tools:
      - postgresql
      - ethereum
      - hardhat
      - api-gateway
      - kubernetes
  devsecops:
    prose: |
      **Securities type validation:**
      1. Comprehensive test suites for each security type workflow
         with type-specific business rules and edge cases.
      2. Smart contract security auditing for tokenized securities
         using automated analysis tools.
      3. SAST scanning for registry management code focusing on
         data integrity and access control vulnerabilities.

      **Registry integrity:**
      4. Database constraint enforcement for securities registry
         (prevent duplicate entries, orphaned records, invalid states).
      5. Automated reconciliation tests between on-chain token state
         and off-chain registry records.
    tools:
      - gitlab-ci
      - gitlab-sast
      - slither
      - mythril
      - jest
  secops:
    prose: |
      **Securities compliance monitoring:**
      1. Monitor the securities registry for anomalies: unauthorized
         transfers, holder record modifications, orphaned tokens.
      2. Periodic reconciliation between token ledger and securities
         registry to detect discrepancies.
      3. Monitor issuer eligibility continuously to detect if an
         issuer subsequently becomes a prohibited entity type.

      **Regulatory reporting:**
      4. Generate periodic reports of all securities offered by type,
         amount, and holder count for CVM submission.
      5. Maintain immutable audit trail of all registry modifications
         with full change history.
    tools:
      - grc-platform
      - blockchain-analytics
      - siem
