id: crowd-13
family: investidor
title: "Investor Complaints and Dispute Resolution"
class: CVM-88
baselines: [plataformas-crowdfunding]
statement:
  prose: |
    Art. 30. A plataforma deve manter canal de atendimento aos
    investidores para recebimento de dúvidas, reclamações e sugestões,
    com prazo máximo de resposta de 5 (cinco) dias úteis.

    § 1º A plataforma deve manter procedimento interno para tratamento
    e resolução de reclamações, incluindo: I — registro e protocolo de
    todas as manifestações recebidas; II — análise e encaminhamento para
    área responsável; III — acompanhamento do prazo de resposta;
    IV — comunicação do resultado ao investidor.

    § 2º A plataforma deve disponibilizar, em seu sítio eletrônico,
    informações sobre os canais de atendimento e sobre os procedimentos
    para apresentação de reclamações à CVM.

    § 3º A plataforma deve manter registro de todas as reclamações
    recebidas e das providências adotadas pelo prazo mínimo de 5
    (cinco) anos, disponibilizando-as à CVM quando solicitado.

    § 4º A plataforma deve adotar mecanismo de mediação ou arbitragem
    para resolução de conflitos entre investidores e sociedades
    empresárias emissoras, quando aplicável.
guidance:
  prose: |
    Article 30 establishes requirements for investor support, complaint
    handling, and dispute resolution. This is an operational compliance
    requirement that directly impacts investor experience and trust.

    **Response SLA:**
    Maximum 5 business days for all investor inquiries, complaints, and
    suggestions. This is a hard regulatory deadline.

    **Structured complaint process:**
    Platforms must implement a formal complaint handling process with:
    registration, routing, SLA tracking, and resolution communication.

    **Transparency:**
    The platform website must display contact channels and instructions
    for filing complaints with the CVM directly.

    **Record retention:**
    All complaints and their resolutions must be retained for minimum
    5 years and be available for CVM inspection.

    **Alternative dispute resolution:**
    Platforms should provide mediation or arbitration mechanisms for
    disputes between investors and issuers.
implementation_guidance:
  platform_engineering:
    prose: |
      **Complaint management system:**
      1. Deploy a ticketing/case management system with SLA tracking
         (5-business-day response deadline), automatic escalation, and
         resolution workflow.
      2. Implement multi-channel investor support: email, in-app chat,
         phone, and web form — all feeding into the same case
         management system.
      3. Build complaint analytics dashboard tracking volume, category,
         resolution time, and satisfaction metrics.

      **Dispute resolution:**
      4. Integrate with mediation/arbitration service providers for
         formal dispute resolution workflows.
      5. Implement 5-year retention policy for all complaint records
         with immutable storage.
      6. Build CVM complaint redirect page showing how investors can
         file complaints directly with the regulator.
    tools:
      - case-management
      - postgresql
      - elasticsearch
      - minio
      - kubernetes
  devsecops:
    prose: |
      **Complaint system quality:**
      1. Automated testing for SLA calculation logic including business
         day computation (holidays, weekends).
      2. Load testing for complaint handling system to ensure
         responsiveness during high-volume periods (e.g., after a
         failed offering).
      3. Integration tests for the full complaint lifecycle:
         submission -> routing -> investigation -> response -> archive.

      **Data protection:**
      4. SAST scanning for complaint handling code to prevent PII
         exposure in logs or error messages.
      5. Secret detection to ensure investor personal data in
         complaints is not leaked.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-secret-detection
      - k6
  secops:
    prose: |
      **SLA compliance monitoring:**
      1. Real-time dashboard showing open complaints, SLA status, and
         aging analysis — alert when any complaint approaches the
         5-day deadline.
      2. Daily report on complaint volume trends and resolution
         metrics.
      3. Monitor complaint content for security incident indicators
         (complaints about unauthorized access, data breaches, etc.).

      **CVM readiness:**
      4. Generate quarterly complaint compliance reports for CVM
         showing SLA adherence, complaint categories, and resolution
         outcomes.
      5. Maintain export capability for complaint records in
         CVM-requested format for inspection responses.
    tools:
      - grc-platform
      - siem
      - case-management
