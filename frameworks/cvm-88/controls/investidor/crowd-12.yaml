id: crowd-12
family: investidor
title: "Risk Awareness and Investor Education"
class: CVM-88
baselines: [plataformas-crowdfunding]
statement:
  prose: |
    Art. 27. A plataforma deve adotar procedimentos para verificar se o
    investidor compreende as características e os riscos do investimento
    em valores mobiliários de sociedades empresárias de pequeno porte,
    incluindo: I — a possibilidade de perda total do capital investido;
    II — a dificuldade de alienação dos valores mobiliários adquiridos;
    III — a ausência de obrigação de a sociedade empresária emissora
    distribuir dividendos ou efetuar pagamento aos investidores;
    IV — os riscos inerentes ao investimento em sociedades empresárias
    de pequeno porte em estágio inicial.

    § 1º A plataforma deve disponibilizar questionário de avaliação de
    conhecimento e adequação do perfil do investidor, cujo resultado deve
    ser considerado na aceitação do investimento.

    § 2º A plataforma deve manter, em local de fácil acesso em seu sítio
    eletrônico, seção educacional com informações sobre o funcionamento
    do investimento participativo, riscos envolvidos e direitos dos
    investidores.

    § 3º O investidor deve declarar expressamente, antes de cada
    investimento, que compreende e aceita os riscos envolvidos.
guidance:
  prose: |
    Article 27 requires platforms to implement investor education and risk
    awareness mechanisms. This goes beyond simple disclosure — platforms
    must actively verify investor comprehension.

    **Mandatory risk disclosures:**
    - Total capital loss is possible
    - Securities may be illiquid (difficult to sell)
    - No guarantee of dividends or payments
    - Early-stage company risks (high failure rate)

    **Suitability assessment:**
    Platforms must administer a knowledge and suitability questionnaire.
    The result must be factored into investment acceptance — though the
    regulation does not mandate blocking unsuitable investors, it requires
    the assessment to be "considered."

    **Educational content:**
    The platform website must include an easily accessible educational
    section covering: how crowdfunding works, risks involved, and investor
    rights.

    **Explicit risk acceptance:**
    Before each investment, the investor must explicitly declare
    understanding and acceptance of risks. This is a per-investment
    requirement, not a one-time onboarding step.
implementation_guidance:
  platform_engineering:
    prose: |
      **Risk awareness system:**
      1. Build a risk disclosure module that presents mandatory risk
         factors (capital loss, illiquidity, no dividends, early-stage
         risk) in a clear, non-dismissible format before investment.
      2. Implement investor suitability questionnaire with scoring
         algorithm that classifies investor knowledge level.
      3. Deploy per-investment risk acceptance workflow requiring
         explicit checkbox confirmation and digital signature.

      **Educational platform:**
      4. Build educational content section with articles, videos, and
         FAQs about crowdfunding mechanics, risks, and investor rights.
      5. Implement knowledge tracking that records which educational
         content each investor has accessed.
      6. Deploy multilingual support for risk disclosures to ensure
         accessibility.
    tools:
      - cms
      - postgresql
      - digital-signature
      - analytics
      - kubernetes
  devsecops:
    prose: |
      **Suitability system quality:**
      1. Test suitability questionnaire scoring logic covering all
         edge cases and classification boundaries.
      2. Automated UI testing to verify risk disclosures are displayed
         correctly and cannot be bypassed.
      3. Accessibility testing (WCAG 2.1 AA) for all risk disclosure
         and educational content.

      **Content integrity:**
      4. Version control for all educational and risk disclosure content
         with compliance team review required for changes.
      5. Automated broken link and content completeness checks for the
         educational section.
    tools:
      - gitlab-ci
      - cypress
      - axe-accessibility
      - jest
  secops:
    prose: |
      **Investor protection monitoring:**
      1. Track suitability questionnaire completion rates and scores
         to identify patterns (e.g., investors consistently scoring
         low but still investing).
      2. Monitor risk acceptance declarations for completeness — flag
         any investments that proceeded without proper declaration.
      3. Review educational content engagement metrics quarterly to
         assess effectiveness.

      **Compliance reporting:**
      4. Generate suitability compliance reports showing questionnaire
         completion rates, score distributions, and any investment
         decisions overriding low suitability scores.
      5. Maintain evidence of risk acceptance declarations for each
         investment (timestamped, with IP and device information).
    tools:
      - grc-platform
      - analytics
      - siem
