id: crowd-14
family: divulgacao
title: "Mandatory Offering Informational Material"
class: CVM-88
baselines: [plataformas-crowdfunding]
statement:
  prose: |
    Art. 33. A plataforma deve disponibilizar, em sua página na internet,
    material informativo sobre cada oferta contendo, no mínimo:
    I — identificação completa da sociedade empresária emissora, incluindo
    CNPJ, endereço, objeto social, capital social e composição societária;
    II — descrição do negócio, do mercado-alvo e da estratégia de
    crescimento; III — plano de negócios detalhado e projeções financeiras;
    IV — demonstrações financeiras da sociedade empresária emissora,
    auditadas quando o valor da oferta exceder R$ 10.000.000,00;
    V — descrição dos valores mobiliários ofertados, incluindo direitos
    e restrições associados; VI — valor alvo e valor mínimo de captação;
    VII — prazo de captação; VIII — destinação dos recursos captados;
    IX — remuneração da plataforma; X — fatores de risco da oferta e
    do negócio.

    § 1º O material informativo deve ser redigido em linguagem clara,
    objetiva e acessível ao público-alvo.

    § 2º A plataforma é responsável por verificar a consistência das
    informações prestadas pela sociedade empresária emissora.

    § 3º Qualquer alteração nas informações do material informativo
    durante o período de captação deve ser imediatamente comunicada aos
    investidores que já tenham confirmado investimento.
guidance:
  prose: |
    Article 33 specifies the minimum content for offering informational
    materials. This is the primary disclosure document for crowdfunding
    offerings — the equivalent of a simplified prospectus.

    **Mandatory content (10 items):**
    1. Complete issuer identification (CNPJ, address, business purpose,
       share capital, ownership structure)
    2. Business description, target market, growth strategy
    3. Detailed business plan and financial projections
    4. Financial statements (audited if offering > R$10M)
    5. Securities description including rights and restrictions
    6. Target and minimum fundraising amounts
    7. Offering period
    8. Use of proceeds
    9. Platform fees
    10. Risk factors

    **Audit threshold:**
    Financial statements must be audited when the offering exceeds
    R$10M. Below this threshold, unaudited statements are acceptable.

    **Plain language requirement:**
    Materials must be written in clear, objective, accessible language.
    This is not optional — dense legal or financial jargon violates the
    regulation.

    **Platform responsibility:**
    The platform must verify information consistency. While issuers are
    liable for truthfulness, platforms have due diligence obligations.

    **Material changes:**
    Any changes to offering materials during the fundraising period
    must be immediately communicated to existing investors.
implementation_guidance:
  platform_engineering:
    prose: |
      **Offering page infrastructure:**
      1. Build a structured offering page template that enforces all 10
         mandatory content items — the system should not allow offering
         publication if any required field is missing.
      2. Implement document management system for financial statements,
         business plans, and supporting documents with version control.
      3. Deploy automated audit threshold checker: flag offerings > R$10M
         that lack audited financial statements.

      **Change management:**
      4. Build offering material versioning system that detects changes
         to published content and triggers automated notifications to
         existing investors.
      5. Implement real-time change diff viewer so investors can see
         exactly what changed in offering materials.
      6. Deploy CMS with approval workflow for offering content
         publications and modifications.
    tools:
      - cms
      - minio
      - postgresql
      - notification-service
      - elasticsearch
      - kubernetes
  devsecops:
    prose: |
      **Content integrity and validation:**
      1. Automated validation tests for offering page completeness —
         verify all 10 mandatory fields are populated before publication
         is allowed.
      2. Content security testing: prevent XSS, injection, and other
         attacks through offering material upload/display.
      3. SAST scanning for document rendering and PDF generation code.

      **Accessibility:**
      4. Automated readability scoring for offering materials (e.g.,
         Flesch-Kincaid adapted for Portuguese) to enforce plain
         language requirement.
      5. Accessibility testing (WCAG 2.1 AA) for offering pages.
    tools:
      - gitlab-ci
      - gitlab-sast
      - cypress
      - axe-accessibility
  secops:
    prose: |
      **Disclosure compliance monitoring:**
      1. Audit all active offerings for completeness of mandatory
         information — flag any offering missing required disclosures.
      2. Monitor offering material changes and verify investor
         notifications were sent for each change.
      3. Verify audit threshold compliance: confirm offerings > R$10M
         have audited financial statements.

      **Quality assurance:**
      4. Periodic review of offering materials for misleading claims,
         omitted risk factors, or inconsistent information.
      5. Maintain evidence of all offering materials, versions, and
         change notifications for CVM inspection.
    tools:
      - grc-platform
      - cms
      - siem
