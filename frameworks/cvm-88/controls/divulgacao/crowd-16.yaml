id: crowd-16
family: divulgacao
title: "Advertising and Marketing Restrictions"
class: CVM-88
baselines: [plataformas-crowdfunding]
statement:
  prose: |
    Art. 38. O material publicitário e de divulgação das ofertas deve:
    I — ser consistente com o material informativo disponibilizado na
    plataforma; II — conter informação equilibrada, sem privilegiar
    aspectos positivos em detrimento de riscos e limitações;
    III — incluir advertência, de forma destacada, sobre os riscos do
    investimento; IV — não conter promessa ou garantia de rentabilidade;
    V — identificar claramente a plataforma responsável pela oferta.

    § 1º A veiculação de material publicitário e de divulgação das ofertas
    é de responsabilidade da plataforma, que deve aprovar previamente
    todo material antes de sua divulgação.

    § 2º É vedada a divulgação de ofertas por meio que não a plataforma
    eletrônica de investimento participativo, exceto para fins de
    direcionamento de potenciais investidores à página da oferta na
    plataforma.

    § 3º A plataforma deve manter registro de todo material publicitário
    veiculado, pelo prazo mínimo de 5 (cinco) anos.
guidance:
  prose: |
    Article 38 regulates advertising and marketing of crowdfunding
    offerings, establishing strict requirements to prevent misleading
    promotions.

    **Content requirements:**
    - Consistency with official offering materials on the platform
    - Balanced presentation (positive aspects must be offset by risk
      disclosures)
    - Prominent risk warning
    - No return guarantees or promises
    - Clear platform identification

    **Platform gatekeeping:**
    The platform must pre-approve ALL marketing materials before
    publication. The platform bears responsibility for marketing
    compliance, even for issuer-created materials.

    **Channel restriction:**
    Offerings may only be marketed through the platform itself. External
    advertising (social media, email, etc.) is limited to directing
    potential investors to the offering page on the platform.

    **Retention:**
    All advertising materials must be retained for 5 years minimum.
implementation_guidance:
  platform_engineering:
    prose: |
      **Advertising compliance system:**
      1. Build a marketing material review and approval workflow
         requiring platform compliance team sign-off before any
         advertising is published.
      2. Implement content consistency checker that compares advertising
         claims against official offering materials for discrepancies.
      3. Deploy mandatory risk warning template injection that
         automatically adds required risk disclaimers to all
         advertising materials.

      **Channel enforcement:**
      4. Implement UTM tracking and referral monitoring to ensure
         external marketing only redirects to the platform.
      5. Build advertising material archive with 5-year retention,
         versioning, and approval history.
    tools:
      - cms
      - minio
      - postgresql
      - elasticsearch
      - kubernetes
  devsecops:
    prose: |
      **Marketing system security:**
      1. Content security testing for marketing material upload and
         rendering (prevent XSS, malicious file injection).
      2. Automated tests for risk warning injection ensuring
         disclaimers cannot be removed or hidden.
      3. SAST scanning for content management and approval workflow
         code.

      **Consistency validation:**
      4. Automated content comparison tools that flag discrepancies
         between marketing materials and official offering documents.
      5. Code review for changes to marketing approval workflows.
    tools:
      - gitlab-ci
      - gitlab-sast
      - jest
      - cypress
  secops:
    prose: |
      **Advertising compliance monitoring:**
      1. Monitor external channels (social media, search engines) for
         unauthorized advertising of platform offerings.
      2. Audit marketing materials for compliance: balanced content,
         risk warnings present, no return promises.
      3. Track approval workflow compliance — flag any marketing
         material published without proper approval.

      **Regulatory evidence:**
      4. Maintain complete advertising archive with approval chain
         evidence for CVM inspection.
      5. Generate quarterly advertising compliance report showing
         approval rates, non-compliance incidents, and corrective
         actions.
    tools:
      - grc-platform
      - social-media-monitoring
      - siem
