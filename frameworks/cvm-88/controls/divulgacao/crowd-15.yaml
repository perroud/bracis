id: crowd-15
family: divulgacao
title: "Issuer Periodic Reporting Obligations"
class: CVM-88
baselines: [plataformas-crowdfunding]
statement:
  prose: |
    Art. 36. A sociedade empresária emissora que tenha realizado oferta
    por meio de plataforma eletrônica de investimento participativo deve
    fornecer aos investidores, por intermédio da plataforma, informações
    periódicas contendo, no mínimo: I — demonstrações financeiras anuais,
    auditadas quando o valor total captado pela sociedade empresária
    emissora por meio de plataformas exceder R$ 10.000.000,00;
    II — relatório de atividades descrevendo a evolução do negócio, o
    uso dos recursos captados e os principais eventos ocorridos no
    período; III — informações sobre eventuais alterações relevantes no
    quadro societário, na administração ou no plano de negócios.

    § 1º As informações periódicas devem ser disponibilizadas no prazo
    de até 6 (seis) meses após o encerramento do exercício social da
    sociedade empresária emissora.

    § 2º A obrigação de fornecer informações periódicas perdura enquanto
    houver valores mobiliários emitidos em circulação.

    § 3º A plataforma deve disponibilizar as informações periódicas em
    local de fácil acesso em seu sítio eletrônico.
guidance:
  prose: |
    Article 36 establishes ongoing reporting obligations for issuers that
    have successfully raised capital through crowdfunding. This is a
    post-offering requirement that continues for the life of the securities.

    **Annual reporting requirements:**
    - Financial statements (audited if total crowdfunding raises > R$10M)
    - Activity report covering business evolution, use of proceeds, and
      material events
    - Disclosure of changes to ownership, management, or business plan

    **Deadline:**
    Reports must be published within 6 months after the end of the
    issuer's fiscal year.

    **Duration:**
    Reporting obligations continue as long as crowdfunding-issued
    securities remain outstanding. There is no sunset clause.

    **Platform role:**
    The platform serves as the distribution channel for periodic reports,
    making them available in an easily accessible location on its website.
    The platform has a responsibility to follow up with issuers who fail
    to submit reports on time.
implementation_guidance:
  platform_engineering:
    prose: |
      **Post-offering reporting infrastructure:**
      1. Build an issuer reporting portal where issuers can upload
         annual financial statements, activity reports, and material
         change notifications.
      2. Implement automated reporting deadline tracker that sends
         reminders to issuers at 3 months, 4 months, and 5 months
         after fiscal year end.
      3. Deploy investor notification system that alerts all investors
         in an offering when periodic reports are published.

      **Content management:**
      4. Build a structured report archive accessible to investors with
         search and filter capabilities by issuer, year, and report type.
      5. Implement audit threshold tracking: flag issuers exceeding
         R$10M in cumulative raises that need audited financials.
      6. Deploy document versioning for reports with change tracking.
    tools:
      - cms
      - minio
      - postgresql
      - notification-service
      - cron-scheduler
      - kubernetes
  devsecops:
    prose: |
      **Reporting system quality:**
      1. Automated tests for deadline calculation logic including
         fiscal year variations and holiday calendars.
      2. Integration tests for the full reporting workflow: issuer
         upload -> validation -> publication -> investor notification.
      3. SAST scanning for document upload and rendering code.

      **Data integrity:**
      4. Automated validation of uploaded documents (format, size,
         mandatory fields).
      5. Content security testing for document upload functionality
         to prevent malicious file uploads.
    tools:
      - gitlab-ci
      - gitlab-sast
      - jest
      - cypress
  secops:
    prose: |
      **Reporting compliance monitoring:**
      1. Dashboard tracking all issuers with outstanding reporting
         obligations, deadlines, and compliance status.
      2. Escalation procedure for issuers that miss the 6-month
         reporting deadline (platform notification, CVM report).
      3. Monitor report content for material adverse events that may
         require investor alerts beyond the periodic schedule.

      **Regulatory evidence:**
      4. Maintain complete archive of all periodic reports with
         submission timestamps and investor access logs.
      5. Generate CVM compliance report showing reporting rates,
         delinquent issuers, and escalation actions taken.
    tools:
      - grc-platform
      - case-management
      - siem
