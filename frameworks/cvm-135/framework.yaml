control_families:
  - id: cap-1
    title: "Disposicoes Gerais"
    description: "Definicoes, classificacao de mercados organizados, ambito de aplicacao e principios gerais de funcionamento de bolsas, mercados de balcao e infraestruturas de mercado"
    articles: "art. 1 ao art. 5"
    control_count: 3
  - id: cap-2
    title: "Bolsa de Valores"
    description: "Requisitos operacionais para bolsas de valores, sistemas de negociacao, formacao de precos, transparencia pre e pos-negociacao, e acesso equitativo"
    articles: "art. 6 ao art. 15"
    control_count: 4
  - id: cap-3
    title: "Mercado de Balcao Organizado"
    description: "Regras de funcionamento do mercado de balcao organizado, intermediacao, registro de operacoes e requisitos de transparencia"
    articles: "art. 16 ao art. 22"
    control_count: 3
  - id: cap-4
    title: "Entidades de Registro"
    description: "Requisitos para entidades de registro de operacoes, centralizacao de informacoes, interoperabilidade entre registradores e acesso regulatorio"
    articles: "art. 23 ao art. 30"
    control_count: 3
  - id: cap-5
    title: "Camaras e Prestadores de Compensacao e Liquidacao"
    description: "Requisitos para camaras de compensacao e liquidacao, gestao de garantias, gerenciamento de risco de contraparte e continuidade operacional"
    articles: "art. 31 ao art. 40"
    control_count: 3
  - id: cap-6
    title: "Tecnologia e Seguranca"
    description: "Requisitos para sistemas eletronicos de negociacao, contingencia operacional, continuidade de negocios, ciberseguranca e resiliencia tecnologica"
    articles: "art. 41 ao art. 50"
    control_count: 3
  - id: cap-7
    title: "Tokenizacao de Valores Mobiliarios"
    description: "Requisitos para negociacao de valores mobiliarios tokenizados, uso de tecnologia de registro distribuido (DLT), ativos digitais e sandbox regulatorio"
    articles: "art. 51 ao art. 58"
    control_count: 3
  - id: cap-8
    title: "Supervisao e Autorregulacao"
    description: "Requisitos de supervisao de mercado, autorregulacao por BSM Supervisao de Mercados, monitoramento de operacoes, enforcement e mecanismo de ressarcimento"
    articles: "art. 59 ao art. 68"
    control_count: 3
  - id: cap-9
    title: "Governanca e Controles Internos"
    description: "Requisitos de governanca corporativa, conflitos de interesse, segregacao de funcoes, auditoria interna e compliance para infraestruturas de mercado"
    articles: "art. 69 ao art. 78"
    control_count: 3
  - id: cap-10
    title: "Disposicoes Finais e Transitorias"
    description: "Regras de transicao, cronograma de implantacao, penalidades e revogacoes de normas anteriores"
    articles: "art. 79 ao art. 85"
    control_count: 2
related_frameworks:
  - framework_id: cvm-175
    relationship: complements
    description: >-
      A Resolucao CVM 175 disciplina os fundos de investimento que negociam nos mercados
      organizados regulados pela CVM 135, sendo complementares na cadeia de valor do
      mercado de capitais.
  - framework_id: cvm-50
    relationship: complements
    description: >-
      A CVM 50 trata de PLD/FT para participantes do mercado de capitais, incluindo as
      bolsas e infraestruturas de mercado reguladas pela CVM 135, sendo complementar na
      gestao de riscos regulatorios.
  - framework_id: cvm-35
    relationship: complements
    description: >-
      A CVM 35 estabelece requisitos de seguranca cibernetica para o mercado de capitais,
      complementando os requisitos tecnologicos e de resiliencia exigidos pela CVM 135
      para infraestruturas de mercado.
  - framework_id: bcb-304
    relationship: complements
    description: >-
      A Resolucao BCB 304 regula o arranjo de pagamentos e infraestruturas financeiras
      supervisionadas pelo Banco Central, complementando a CVM 135 que regula as
      infraestruturas do mercado de valores mobiliarios.
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD complementa a CVM 135 na protecao de dados pessoais tratados pelas
      infraestruturas de mercado, especialmente cadastro de participantes, registros
      de operacoes e dados de investidores.
