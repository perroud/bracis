id: art-23
family: cap-4
title: "Requisitos para Entidades de Registro"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 23. As entidades de registro de operações com valores mobiliários devem:
    I - manter sistema eletrônico de registro que garanta a constituição, validade
    e eficácia dos negócios registrados;
    II - assegurar a unicidade do registro, impedindo que a mesma operação seja
    registrada em mais de uma entidade sem a devida identificação;
    III - manter base de dados centralizada com informações completas de todas
    as operações registradas, incluindo dados das contrapartes, ativo, valor,
    data e condições;
    IV - disponibilizar informações agregadas e individualizadas à CVM, ao
    Banco Central e a outras autoridades competentes; e
    V - implementar padrões de dados e protocolos de comunicação que permitam
    interoperabilidade com outras entidades de registro e infraestruturas.

    § 1. O registro de operações com valores mobiliários de renda fixa,
    derivativos e demais ativos definidos pela CVM é obrigatório.
    § 2. A entidade de registro deve manter mecanismos de validação que
    confirmem a autenticidade e integridade dos dados registrados.
guidance:
  prose: |
    O art. 23 regula as entidades de registro (trade repositories no jargao
    internacional), que desempenham papel fundamental na transparencia e
    supervisao do mercado de valores mobiliarios.

    **Papel dos registradores:**
    No mercado brasileiro, entidades como a CETIP (hoje B3) e a CVM
    desenvolveram o conceito de registro obrigatorio, que confere validade
    juridica e eficacia as operacoes registradas -- diferente do simples
    reporte (trade reporting) de outras jurisdicoes.

    **Unicidade do registro:**
    O risco de duplo registro e significativo em mercados com multiplos
    registradores. A CVM exige mecanismos que impecam registros duplicados
    ou que os identifiquem claramente.

    **Interoperabilidade:**
    Com a possibilidade de multiplas entidades de registro no mesmo
    mercado, a interoperabilidade de dados e protocolos e essencial
    para a eficiencia e para a supervisao consolidada pela CVM.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de registro:**
      1. Implementar sistema de registro com validacao de unicidade usando
         identificadores unicos de operacao (UTI - Unique Transaction
         Identifier) conforme padroes internacionais.
      2. Base de dados centralizada com modelo de dados padronizado (ISO
         20022 ou FpML) para garantir interoperabilidade.
      3. APIs de consulta e reporte para autoridades regulatorias com
         capacidade de busca por multiplos criterios e agregacoes.

      **Interoperabilidade:**
      4. Protocolos padronizados de comunicacao com outras entidades de
         registro e infraestruturas, usando formatos como FIX ou ISO 20022.
    tools:
      - trade-repository-platform
      - data-standardization
      - api-gateway
      - interoperability-hub
  devsecops:
    prose: |
      **Integridade e validacao de registros:**
      1. Validacao automatizada de dados de registro contra schema definido,
         com rejeicao de registros incompletos ou inconsistentes.
      2. Testes de interoperabilidade automatizados com simulacao de
         comunicacao entre entidades de registro.
      3. Pipeline de reconciliacao de unicidade que detecte e alerte
         sobre potenciais registros duplicados.
    tools:
      - gitlab-ci
      - schema-validation
      - interoperability-testing
      - deduplication-engine
  secops:
    prose: |
      **Supervisao de registros:**
      1. Monitoramento diario de integridade da base de registros com
         verificacao de completude e consistencia.
      2. Teste periodico de acesso regulatorio para garantir que CVM e
         BCB possam consultar dados conforme exigido.
      3. Auditoria anual de unicidade de registros e eficacia dos
         mecanismos de prevencao de duplicidade.
    tools:
      - data-quality-monitoring
      - regulatory-access-testing
      - audit-management
