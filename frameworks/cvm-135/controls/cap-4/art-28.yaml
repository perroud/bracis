id: art-28
family: cap-4
title: "Interoperabilidade entre Entidades de Registro"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 28. As entidades de registro devem implementar mecanismos de
    interoperabilidade que assegurem:
    I - padronização de dados e protocolos de comunicação entre entidades
    de registro e entre estas e as infraestruturas de pós-negociação;
    II - transmissão tempestiva de dados de operações para câmaras de
    compensação e liquidação;
    III - reconciliação periódica de posições entre entidades de registro
    que operem no mesmo mercado ou com os mesmos ativos;
    IV - unicidade de identificação de operações, participantes e ativos
    por meio de códigos universais (UTI, LEI, ISIN); e
    V - capacidade de portabilidade de registros entre entidades em caso
    de transferência, encerramento ou intervenção.

    Parágrafo único. A CVM poderá estabelecer padrões técnicos obrigatórios
    para garantir a interoperabilidade entre entidades de registro.
guidance:
  prose: |
    O art. 28 endereca um dos desafios mais complexos da infraestrutura
    de mercado: a interoperabilidade entre registradores.

    **Padronizacao de dados:**
    A adocao de padroes internacionais (ISO 20022, FpML, FIX) e essencial
    para que dados fluam entre entidades sem necessidade de mapeamento
    manual ou conversao lossy.

    **Identificadores universais:**
    - UTI (Unique Transaction Identifier): identificador unico global
      de cada transacao
    - LEI (Legal Entity Identifier): identificador unico de cada
      entidade juridica
    - ISIN (International Securities Identification Number): identificador
      unico de cada valor mobiliario

    **Portabilidade:**
    A capacidade de transferir registros entre entidades e fundamental
    para competicao no mercado de registradores e para resiliencia em
    caso de falha ou intervencao em uma entidade.

    **Reconciliacao:**
    Quando multiplas entidades registram operacoes sobre os mesmos ativos,
    a reconciliacao periodica garante consistencia e integridade do
    universo de registros.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de interoperabilidade:**
      1. Implementar camada de integracao baseada em padroes abertos
         (ISO 20022, FpML) com mapeamento de schemas e transformacao.
      2. Gateway de interoperabilidade com conectores para cada entidade
         de registro e infraestrutura de pos-negociacao.
      3. Sistema de reconciliacao automatizada com deteccao e resolucao
         de divergencias entre bases de registros.

      **Identificadores universais:**
      4. Catalogo centralizado de mapeamento UTI, LEI e ISIN com
         validacao automatica e desduplicacao.
    tools:
      - integration-platform
      - data-transformation
      - reconciliation-engine
      - identifier-management
  devsecops:
    prose: |
      **Testes de interoperabilidade:**
      1. Suite de testes de integracao que simule comunicacao com todas
         as entidades de registro conectadas.
      2. Validacao automatica de conformidade de mensagens com schemas
         ISO 20022 ou FpML.
      3. Pipeline de reconciliacao com alertas para divergencias acima
         de limiar toleravel.
    tools:
      - gitlab-ci
      - schema-validation
      - integration-testing
      - reconciliation-monitoring
  secops:
    prose: |
      **Governanca de interoperabilidade:**
      1. Monitoramento de SLA de comunicacao com entidades de registro
         parceiras, com escalacao para falhas.
      2. Teste semestral de portabilidade de registros com simulacao
         de transferencia entre entidades.
      3. Auditoria anual de qualidade de identificadores universais
         (UTI, LEI, ISIN) nos registros.
    tools:
      - sla-monitoring
      - portability-testing
      - data-quality-audit
