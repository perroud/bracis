id: art-25
family: cap-4
title: "Centralizacao de Informacoes e Acesso Regulatorio"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 25. A entidade de registro deve manter estrutura de centralização de
    informações que permita:
    I - visão consolidada de posições e exposições por participante, ativo e
    mercado;
    II - geração de relatórios agregados sobre volumes, preços e tendências
    de mercado;
    III - detecção de concentração excessiva de posições por participante
    ou grupo econômico;
    IV - compartilhamento tempestivo de informações com a CVM, o Banco Central
    e a BSM Supervisão de Mercados; e
    V - atendimento a requisições de dados de autoridades estrangeiras no
    âmbito de acordos de cooperação.

    Parágrafo único. A entidade de registro deve implementar mecanismos de
    proteção de dados que garantam a confidencialidade das informações
    individualizadas, permitindo acesso apenas a autoridades competentes
    e mediante justificativa regulatória.
guidance:
  prose: |
    O art. 25 trata da funcao de centralizacao de dados do registrador,
    que vai alem do simples registro individual de operacoes.

    **Visao consolidada:**
    A capacidade de agregar posicoes por participante e ativo e essencial
    para a supervisao de risco sistemico. Permite identificar, por exemplo,
    se um participante acumula posicao excessiva em derivativos.

    **Deteccao de concentracao:**
    A concentracao excessiva de posicoes e um indicador de risco que pode
    sinalizar manipulacao de mercado ou exposicao sistemica perigosa.

    **Cooperacao internacional:**
    O compartilhamento de dados com autoridades estrangeiras segue os
    memorandos de entendimento (MoU) da IOSCO, permitindo supervisao
    transfronterica de operacoes com valores mobiliarios.

    **Protecao de dados:**
    O registrador mantem dados extremamente sensiveis sobre posicoes e
    estrategias de participantes, exigindo controles robustos de acesso
    e confidencialidade.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de centralizacao:**
      1. Data warehouse com capacidade de agregar posicoes em tempo real
         por participante, ativo, mercado e grupo economico.
      2. Motor de deteccao de concentracao com limites configuraveis e
         alertas automaticos para posicoes excessivas.
      3. Portal de acesso regulatorio com autenticacao multifator,
         autorizacao granular e log de auditoria de todas as consultas.

      **Compartilhamento de dados:**
      4. APIs seguras para compartilhamento automatizado de dados com
         CVM, BCB e BSM, com criptografia em transito e repouso.
    tools:
      - data-warehouse
      - concentration-monitoring
      - regulatory-portal
      - secure-api
  devsecops:
    prose: |
      **Seguranca e integridade de dados centralizados:**
      1. Criptografia de dados em repouso e em transito com gestao
         centralizada de chaves.
      2. Testes automatizados de consistencia entre dados agregados
         e registros individuais.
      3. Pipeline de validacao de controles de acesso com simulacao
         de tentativas nao autorizadas.
    tools:
      - gitlab-ci
      - encryption-management
      - data-consistency-testing
      - access-control-testing
  secops:
    prose: |
      **Governanca de dados centralizados:**
      1. Auditoria trimestral de acessos a dados individualizados com
         verificacao de justificativa regulatoria.
      2. Monitoramento de alertas de concentracao com escalacao para
         CVM em caso de posicoes que ameacem o mercado.
      3. Revisao anual de acordos de compartilhamento de dados com
         autoridades estrangeiras.
    tools:
      - data-governance
      - access-audit
      - regulatory-reporting
