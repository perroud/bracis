id: art-75
family: cap-9
title: "Auditoria Interna e Controles Internos"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 75. As entidades administradoras de mercados organizados e infraestruturas
    de mercado devem manter:
    I - área de auditoria interna independente, com reporte direto ao conselho
    de administração ou ao comitê de auditoria;
    II - plano anual de auditoria baseado em avaliação de riscos, cobrindo
    todas as áreas críticas da entidade;
    III - área de controles internos responsável por verificação contínua do
    cumprimento de normas, regulamentos e procedimentos;
    IV - função de compliance independente com responsabilidade por monitorar
    o cumprimento das obrigações regulatórias perante a CVM e demais
    autoridades;
    V - avaliação anual da efetividade dos controles internos pelo comitê
    de auditoria, com relatório à CVM; e
    VI - auditoria externa independente anual, com escopo que inclua
    avaliação dos controles internos e da adequação dos sistemas de
    gestão de risco.

    Parágrafo único. A entidade deve manter registro completo e acessível
    de todas as recomendações de auditoria e das ações corretivas
    implementadas, com prazos e responsáveis.
guidance:
  prose: |
    O art. 75 estabelece a trifeta de defesas internas: auditoria interna,
    controles internos e compliance, fundamentais para infraestruturas
    de mercado.

    **Modelo de tres linhas:**
    1. Primeira linha: areas de negocio com controles operacionais
    2. Segunda linha: controles internos e compliance com supervisao
    3. Terceira linha: auditoria interna com avaliacao independente

    **Auditoria interna independente:**
    O reporte direto ao conselho garante que a auditoria interna nao
    sofra influencia da diretoria nas suas avaliacoes e recomendacoes.

    **Avaliacao baseada em risco:**
    O plano de auditoria deve priorizar areas de maior risco, nao
    simplesmente cobrir todas as areas igualmente. Para infraestruturas
    de mercado, areas de maior risco incluem: sistemas de negociacao,
    gestao de garantias, seguranca cibernetica e surveillance.

    **Auditoria externa:**
    A auditoria externa traz perspectiva independente e e requisito
    regulatorio para todas as infraestruturas de mercado.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de auditoria e controles:**
      1. Sistema de gestao de auditoria com planejamento, execucao,
         acompanhamento de recomendacoes e relatorios.
      2. Plataforma de controles internos com mapeamento de riscos,
         testes de controles e registro de evidencias.
      3. Dashboard de compliance com visao consolidada de obrigacoes
         regulatorias e status de cumprimento.

      **Gestao de recomendacoes:**
      4. Sistema de tracking de recomendacoes de auditoria com prazos,
         responsaveis e status de implementacao.
    tools:
      - audit-management
      - internal-controls-platform
      - compliance-dashboard
      - recommendation-tracking
  devsecops:
    prose: |
      **Automacao de controles:**
      1. Testes automatizados de controles internos com coleta
         automatica de evidencias para auditoria.
      2. Pipeline de compliance que verifique cumprimento de
         obrigacoes regulatorias antes de cada deploy.
      3. Scanning automatizado de configuracoes de sistema contra
         baselines de controles internos.
    tools:
      - gitlab-ci
      - automated-testing
      - compliance-pipeline
      - configuration-scanning
  secops:
    prose: |
      **Operacoes de auditoria e compliance:**
      1. Execucao do plano anual de auditoria com cobertura de todas
         as areas criticas e relatorio ao conselho.
      2. Monitoramento continuo de obrigacoes regulatorias com alertas
         para prazos e novas exigencias.
      3. Acompanhamento mensal de implementacao de recomendacoes de
         auditoria com escalacao para atrasos.
    tools:
      - grc-platform
      - regulatory-obligation-management
      - recommendation-monitoring
