id: art-72
family: cap-9
title: "Conflitos de Interesse e Segregacao de Funcoes"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 72. As entidades administradoras de mercados organizados e infraestruturas
    de mercado devem implementar política de gestão de conflitos de interesse que:
    I - identifique e catalogue os principais conflitos de interesse inerentes
    à atividade, incluindo conflitos entre a função de mercado e a função de
    supervisão, entre interesses de acionistas e de participantes, e entre
    atividades de negociação e de pós-negociação;
    II - estabeleça barreiras de informação (chinese walls) entre áreas que
    possam gerar conflitos de interesse;
    III - implemente segregação funcional e física entre atividades de
    negociação, registro, compensação, liquidação e supervisão;
    IV - proíba ou restrinja atividades que gerem conflitos irreconciliáveis,
    como negociação por conta própria pela entidade administradora;
    V - exija declaração periódica de conflitos de interesse por
    administradores, empregados e colaboradores; e
    VI - submeta conflitos material à avaliação do comitê de auditoria
    ou do conselho de administração.

    Parágrafo único. A entidade que acumule funções de negociação e
    pós-negociação (integração vertical) deve demonstrar à CVM que os
    conflitos são adequadamente geridos.
guidance:
  prose: |
    O art. 72 endereca um dos temas mais complexos da regulacao de
    infraestruturas de mercado: a gestao de conflitos de interesse.

    **Integracao vertical:**
    No Brasil, a B3 acumula funcoes de bolsa, camara de compensacao,
    central depositaria e entidade de registro. Essa integracao vertical
    gera conflitos potenciais que exigem gestao rigorosa.

    **Chinese walls:**
    Barreiras de informacao devem impedir que informacoes de uma area
    (ex: dados de posicoes de clientes na clearing) sejam usadas por
    outra (ex: area de produtos da bolsa).

    **Segregacao funcional:**
    A segregacao vai alem da barreira de informacao: exige equipes
    diferentes, reporte independente e, idealmente, localizacao
    fisica separada para areas que possam ter conflitos.

    **Negociacao por conta propria:**
    A entidade administradora nao pode usar informacoes privilegiadas
    sobre fluxo de ordens e posicoes para operar em beneficio proprio.
implementation_guidance:
  platform_engineering:
    prose: |
      **Barreiras de informacao e segregacao:**
      1. Implementar controles de acesso baseados em funcao (RBAC) que
         reforcam chinese walls entre areas com potencial conflito.
      2. Segregacao logica de bancos de dados e sistemas entre areas de
         negociacao, pos-negociacao e supervisao.
      3. Monitoramento de acessos cross-area com alertas para violacoes
         de barreiras de informacao.

      **Gestao de declaracoes:**
      4. Sistema eletronico de declaracao de conflitos de interesse com
         verificacao cruzada e workflow de aprovacao.
    tools:
      - identity-access-management
      - data-segregation
      - access-monitoring
      - conflict-declaration-system
  devsecops:
    prose: |
      **Enforcamento tecnico de segregacao:**
      1. Testes automatizados que verifiquem que controles de acesso
         entre areas sao efetivos e nao contornaveis.
      2. Pipeline de validacao de chinese walls com testes de penetracao
         especificos para violacao de segregacao.
      3. Revisao de codigo que identifique acesso indevido a dados
         de outras areas em novos desenvolvimentos.
    tools:
      - gitlab-ci
      - access-control-testing
      - code-review
      - segregation-validation
  secops:
    prose: |
      **Governanca de conflitos:**
      1. Revisao semestral da efetividade das barreiras de informacao
         com relatorio para comite de auditoria.
      2. Monitoramento continuo de violacoes de segregacao com
         investigacao e relatorio de cada caso.
      3. Avaliacao anual da politica de conflitos de interesse com
         atualizacao conforme novos riscos identificados.
    tools:
      - grc-platform
      - segregation-monitoring
      - audit-management
