id: art-69
family: cap-9
title: "Governanca Corporativa de Infraestruturas de Mercado"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 69. As entidades administradoras de mercados organizados e infraestruturas
    de mercado devem adotar estrutura de governança corporativa que assegure:
    I - conselho de administração com membros independentes representando pelo
    menos 1/3 (um terço) do total, com competência e experiência em mercado
    de capitais, tecnologia e gestão de riscos;
    II - comitês de assessoramento ao conselho, incluindo comitê de riscos,
    comitê de auditoria e comitê de tecnologia;
    III - separação clara entre funções de administração e funções de
    supervisão/autorregulação;
    IV - diretoria com atribuições definidas, incluindo diretor de riscos,
    diretor de tecnologia e diretor de compliance;
    V - código de conduta e ética para administradores, empregados e
    colaboradores, com mecanismos de enforcement; e
    VI - canal de denúncias (whistleblowing) acessível e com garantia
    de confidencialidade e proteção ao denunciante.

    § 1. Os membros independentes do conselho não podem ter vínculo com
    participantes do mercado administrado pela entidade.
    § 2. A entidade deve submeter à CVM informações sobre composição
    e alterações na administração.
guidance:
  prose: |
    O art. 69 estabelece o framework de governanca corporativa para
    infraestruturas de mercado, refletindo sua importancia sistemica.

    **Independencia do conselho:**
    A exigencia de 1/3 de independentes visa mitigar conflitos de
    interesse entre a funcao de administracao do mercado e os
    interesses comerciais dos participantes.

    **Comites especializados:**
    A complexidade e criticidade de infraestruturas de mercado exigem
    comites especializados que aprofundem temas de risco, tecnologia
    e auditoria alem da capacidade do conselho pleno.

    **Segregacao administracao/supervisao:**
    A funcao de supervisao (surveillance, enforcement) deve ser
    independente da funcao de administracao (negocio, comercial)
    para evitar que interesses de receita prejudiquem a fiscalizacao.

    **Canal de denuncias:**
    O whistleblowing e mecanismo fundamental de deteccao de
    irregularidades internas, complementando os controles formais
    de compliance e auditoria.
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistemas de governanca:**
      1. Portal de governanca corporativa com informacoes sobre
         composicao do conselho, comites, politicas e atas.
      2. Sistema de gestao de conflitos de interesse com declaracao
         periodica e verificacao automatizada de vinculos.
      3. Plataforma de canal de denuncias com anonimato garantido,
         gestao de casos e rastreabilidade de tratamento.

      **Segregacao de funcoes:**
      4. Controles de acesso que garantam segregacao entre areas de
         negocio e areas de supervisao/autorregulacao.
    tools:
      - governance-portal
      - conflict-management
      - whistleblowing-platform
      - access-control
  devsecops:
    prose: |
      **Automacao de governanca:**
      1. Verificacao automatizada de vinculos entre conselheiros
         independentes e participantes do mercado.
      2. Workflow de aprovacao de politicas e regulamentos com
         versionamento e trilha de auditoria.
      3. Pipeline de publicacao de informacoes de governanca no
         portal corporativo com revisao obrigatoria.
    tools:
      - gitlab-ci
      - background-check-integration
      - policy-management
      - content-publishing
  secops:
    prose: |
      **Governanca e compliance:**
      1. Avaliacao anual de efetividade da governanca corporativa
         com relatorio para CVM.
      2. Monitoramento de declaracoes de conflitos de interesse
         com verificacao cruzada periodica.
      3. Gestao do canal de denuncias com SLA de tratamento e
         relatorio trimestral ao comite de auditoria.
    tools:
      - grc-platform
      - compliance-monitoring
      - whistleblowing-management
