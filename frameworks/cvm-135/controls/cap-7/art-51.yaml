id: art-51
family: cap-7
title: "Negociacao de Valores Mobiliarios Tokenizados"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 51. A negociação de valores mobiliários representados em tokens digitais
    (tokenizados) em mercados organizados deve observar:
    I - os mesmos requisitos de transparência, formação de preços e proteção ao
    investidor aplicáveis aos valores mobiliários não tokenizados;
    II - requisitos adicionais de segurança de tecnologia de registro distribuído
    (DLT - Distributed Ledger Technology) utilizada, incluindo consenso,
    imutabilidade e resistência à manipulação;
    III - interoperabilidade entre a infraestrutura de DLT e os sistemas
    tradicionais de pós-negociação (registro, compensação, liquidação);
    IV - mecanismos de custódia de chaves criptográficas que garantam a
    segurança e a recuperabilidade dos ativos tokenizados;
    V - procedimentos de emissão, resgate e transferência de tokens que
    garantam a correspondência entre o token e o valor mobiliário subjacente; e
    VI - divulgação clara aos investidores sobre os riscos específicos dos
    ativos tokenizados, incluindo riscos tecnológicos e de custódia.

    Parágrafo único. A CVM poderá autorizar ambientes de experimentação
    regulatória (sandbox) para modelos inovadores de negociação de ativos
    tokenizados.
guidance:
  prose: |
    O art. 51 regula a tokenizacao de valores mobiliarios, um dos temas
    mais inovadores do mercado de capitais brasileiro.

    **Principio de neutralidade tecnologica:**
    Valores mobiliarios tokenizados estao sujeitos aos mesmos requisitos
    regulatorios dos tradicionais. A tokenizacao e uma forma de representacao,
    nao uma nova classe de ativos.

    **DLT (Distributed Ledger Technology):**
    A tecnologia de registro distribuido (blockchain e similares) traz
    beneficios potenciais (transparencia, imutabilidade, programabilidade)
    mas tambem riscos especificos (smart contract bugs, ataques de consenso,
    gestao de chaves, irreversibilidade).

    **Custodia de chaves:**
    A custodia de chaves criptograficas e o ponto critico da tokenizacao.
    A perda de uma chave privada pode significar a perda irrecuperavel
    do ativo. Custodiantes devem implementar HSMs, multi-signature e
    mecanismos de recuperacao.

    **Sandbox regulatorio:**
    A CVM permite experimentacao em ambiente controlado (sandbox) para
    modelos inovadores que nao se enquadram plenamente na regulacao
    vigente, com limites de volume e prazo.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de tokenizacao:**
      1. Implementar plataforma de tokenizacao com suporte a multiplos
         protocolos DLT (Ethereum, Hyperledger, Solana ou proprietarios)
         com camada de abstracao.
      2. Sistema de custodia de chaves com HSM (Hardware Security Module)
         e esquemas multi-signature (ex: 3-of-5) para chaves de alto valor.
      3. Camada de interoperabilidade (bridge) entre DLT e sistemas
         tradicionais de pos-negociacao.

      **Correspondencia token-ativo:**
      4. Oraculo ou mecanismo de verificacao que garanta correspondencia
         1:1 entre tokens emitidos e valores mobiliarios subjacentes.
    tools:
      - blockchain-platform
      - hsm
      - key-management
      - interoperability-bridge
      - oracle-service
  devsecops:
    prose: |
      **Seguranca de smart contracts e DLT:**
      1. Auditoria de smart contracts por empresa independente antes
         de deploy em producao.
      2. Testes automatizados de smart contracts incluindo fuzzing,
         formal verification e simulacao de cenarios de ataque.
      3. Pipeline de deploy de smart contracts com multisig approval
         e verificacao de estado consistente.
    tools:
      - gitlab-ci
      - smart-contract-audit
      - formal-verification
      - blockchain-testing
  secops:
    prose: |
      **Governanca de ativos tokenizados:**
      1. Monitoramento continuo da blockchain/DLT para transacoes
         anomalas, ataques de consenso ou forks inesperados.
      2. Procedimento de recuperacao de chaves com mecanismo seguro
         e auditado (ex: social recovery, time-locked recovery).
      3. Comunicacao aos investidores sobre riscos especificos com
         material educativo e termos de aceite explicitos.
    tools:
      - blockchain-monitoring
      - key-recovery
      - investor-communication
