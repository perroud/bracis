id: art-57
family: cap-7
title: "Sandbox Regulatorio para Inovacao em Mercados"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 57. A CVM poderá autorizar a operação de ambientes de experimentação
    regulatória (sandbox) para modelos inovadores de negociação, registro ou
    liquidação de valores mobiliários, observando:
    I - delimitação clara do escopo, prazo e limites operacionais do sandbox,
    incluindo volume máximo de operações e valor máximo de ativos;
    II - requisitos mínimos de proteção ao investidor, incluindo divulgação
    de riscos específicos e mecanismo de ressarcimento;
    III - relatório periódico do participante do sandbox à CVM sobre operações
    realizadas, incidentes, reclamações e lições aprendidas;
    IV - critérios objetivos de avaliação para concessão de autorização
    definitiva ou encerramento do sandbox;
    V - mecanismos de saída que protejam investidores em caso de encerramento
    antecipado, incluindo procedimentos de liquidação ordenada; e
    VI - compartilhamento de aprendizados com o mercado e com outras
    autoridades reguladoras.

    Parágrafo único. O prazo máximo do sandbox é de 2 (dois) anos,
    prorrogável por igual período mediante justificativa fundamentada.
guidance:
  prose: |
    O art. 57 regulamenta o sandbox regulatorio da CVM para inovacao
    em infraestruturas de mercado e tokenizacao.

    **Conceito de sandbox:**
    O sandbox regulatorio permite que empresas inovadoras testem novos
    modelos de negocio em ambiente real, porem com limites de escala
    e supervisao intensificada, sem necessidade de cumprir integralmente
    a regulacao vigente.

    **Limites operacionais:**
    A CVM define limites de volume e valor para cada sandbox, garantindo
    que o risco para investidores e para o mercado seja controlado.

    **Protecao ao investidor:**
    Mesmo em sandbox, investidores devem ser informados sobre os riscos
    especificos e ter mecanismo de ressarcimento em caso de prejuizo
    causado por falha do modelo experimental.

    **Criterios de graduacao:**
    Ao final do sandbox, a CVM avalia se o modelo pode receber
    autorizacao definitiva (graduacao) ou se deve ser encerrado.
    Criterios incluem viabilidade, seguranca, protecao ao investidor
    e aprendizados gerados.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de sandbox:**
      1. Ambiente isolado com limites de volume e valor configurados
         conforme autorizacao da CVM.
      2. Monitoramento em tempo real de metricas do sandbox (volume,
         valor, participantes, incidentes) com dashboard para CVM.
      3. Mecanismo de circuit breaker que suspenda operacoes
         automaticamente se limites forem excedidos.

      **Mecanismo de saida:**
      4. Procedimento automatizado de liquidacao ordenada para
         encerramento de sandbox, com migracao ou resgate de
         posicoes de investidores.
    tools:
      - sandbox-platform
      - limit-management
      - monitoring-dashboard
      - orderly-wind-down
  devsecops:
    prose: |
      **Gestao de experimentos em sandbox:**
      1. Pipeline de deploy isolado para ambiente de sandbox com
         controles de seguranca equivalentes a producao.
      2. Relatorio automatizado de metricas do sandbox para CVM
         com frequencia definida na autorizacao.
      3. Testes automatizados de limites operacionais e mecanismos
         de circuit breaker.
    tools:
      - gitlab-ci
      - sandbox-monitoring
      - automated-reporting
      - limit-testing
  secops:
    prose: |
      **Governanca de sandbox:**
      1. Comite de acompanhamento do sandbox com representantes de
         compliance, tecnologia, juridico e gestao de riscos.
      2. Avaliacao periodica de criterios de graduacao com relatorio
         para CVM sobre progresso e licoes aprendidas.
      3. Plano de saida documentado e testado antes do inicio do
         sandbox, com cenarios de encerramento antecipado.
    tools:
      - grc-platform
      - sandbox-governance
      - regulatory-reporting
