id: art-1
family: cap-1
title: "Objeto, Definicoes e Ambito de Aplicacao"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 1. Esta Resolução dispõe sobre as normas gerais aplicáveis aos mercados
    organizados de valores mobiliários e às infraestruturas de mercado, incluindo
    bolsas de valores, entidades do mercado de balcão organizado, entidades de
    registro, câmaras e prestadores de serviços de compensação e liquidação.

    Parágrafo único. Para os fins desta Resolução, consideram-se:
    I - mercado organizado: ambiente de negociação de valores mobiliários mantido
    por entidade administradora autorizada pela CVM, com regras próprias de
    funcionamento e acesso;
    II - bolsa de valores: entidade administradora de mercado organizado que
    proporciona ambiente para negociação de valores mobiliários com sistema
    de formação de preços por mecanismo competitivo;
    III - mercado de balcão organizado: entidade que mantém sistema de negociação
    ou registro de operações com valores mobiliários, com regras próprias
    de funcionamento;
    IV - entidade de registro: entidade que realiza o registro de operações com
    valores mobiliários para fins de constituição, validade e eficácia;
    V - infraestrutura de mercado: câmaras e prestadores de serviços de
    compensação, liquidação e depósito centralizado de valores mobiliários;
    VI - participante: pessoa física ou jurídica admitida a operar diretamente
    nos mercados organizados ou infraestruturas de mercado.
guidance:
  prose: |
    O art. 1 delimita o universo de entidades e mercados regulados pela CVM 135,
    que constitui o marco regulatorio consolidado para toda a cadeia de pos-negociacao
    e infraestrutura do mercado de capitais brasileiro.

    **Classificacao dos mercados organizados:**
    A resolucao distingue claramente entre bolsas (com mecanismo competitivo de
    formacao de precos) e mercados de balcao organizados (sem necessidade de
    book centralizado). Essa distincao e fundamental porque define os requisitos
    diferenciados de transparencia e acesso aplicaveis a cada ambiente.

    **Infraestruturas de mercado:**
    O conceito de infraestrutura de mercado segue os principios PFMI (Principles
    for Financial Market Infrastructures) do BIS/IOSCO, abrangendo camaras de
    compensacao (CCPs), sistemas de liquidacao e repositorios de transacoes.
    No Brasil, isso inclui a B3 nas funcoes de CCP, clearing e depositaria.

    **Relevancia regulatoria:**
    A CVM 135 consolida diversas normas anteriores sobre mercados organizados,
    criando um unico arcabouco que cobre desde a admissao de participantes
    ate os requisitos tecnologicos e de governanca para todas as infraestruturas.
implementation_guidance:
  platform_engineering:
    prose: |
      **Mapeamento de entidades e classificacoes:**
      1. Manter catalogo atualizado de todas as entidades do grupo economico
         sujeitas a CVM 135, classificadas por tipo (bolsa, balcao, registro,
         camara, depositaria).
      2. Implementar API de classificacao que identifique automaticamente qual
         regime regulatorio da CVM 135 aplica-se a cada operacao ou servico.
      3. Configurar metadata em servicos e microsservicos que referenciem a
         classificacao regulatoria aplicavel.

      **Modelo de dados:**
      4. Modelar banco de dados com entidades para cada tipo de mercado
         organizado e infraestrutura, garantindo rastreabilidade de quais
         capitulos da CVM 135 se aplicam a cada componente.
    tools:
      - api-gateway
      - service-catalog
      - metadata-management
  devsecops:
    prose: |
      **Governanca de escopo regulatorio no ciclo de desenvolvimento:**
      1. Manter documento de escopo regulatorio em repositorio Git com
         mapeamento de componentes para requisitos da CVM 135.
      2. Labels em issues e merge requests que referenciem capitulos
         aplicaveis da CVM 135.
      3. Testes automatizados que verifiquem a completude do mapeamento
         regulatorio em cada deploy.
    tools:
      - gitlab-ci
      - compliance-as-code
      - policy-engine
  secops:
    prose: |
      **Governanca de conformidade:**
      1. Revisao anual do mapeamento de entidades sujeitas com participacao
         da area juridica, compliance e regulatorio.
      2. Processo formal para avaliar impacto regulatorio quando novas
         atividades ou servicos sao lancados.
      3. Monitoramento de alteracoes normativas da CVM que possam ampliar
         ou restringir o escopo de aplicacao.
    tools:
      - grc-platform
      - regulatory-change-management
