id: art-2
family: cap-1
title: "Autorizacao para Funcionamento de Mercados Organizados"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 2. O funcionamento de mercados organizados de valores mobiliários e de
    infraestruturas de mercado depende de prévia autorização da CVM, que avaliará:
    I - a capacidade técnica e operacional da entidade requerente;
    II - a idoneidade e a qualificação dos administradores;
    III - a adequação das regras e procedimentos operacionais propostos;
    IV - a viabilidade econômico-financeira;
    V - a existência de mecanismos eficazes de gestão de riscos;
    VI - a adequação dos sistemas de tecnologia da informação; e
    VII - a existência de plano de continuidade de negócios.

    § 1. A CVM poderá condicionar a autorização ao cumprimento de requisitos
    adicionais, considerando a natureza e a complexidade das atividades.
    § 2. A entidade deverá manter permanentemente os requisitos que fundamentaram
    a concessão da autorização.
guidance:
  prose: |
    O art. 2 estabelece um regime de licenciamento previo para mercados organizados,
    exigindo que a CVM avalie multiplas dimensoes antes de autorizar o funcionamento.

    **Dimensoes da avaliacao:**
    1. Capacidade tecnica: infraestrutura de TI, sistemas de negociacao, plataformas
       de registro e clearing devem ser comprovadamente robustos
    2. Idoneidade de administradores: verificacao de antecedentes, qualificacao
       profissional e ausencia de impedimentos legais
    3. Regras operacionais: manual de procedimentos, regulamentos de negociacao,
       regras de admissao de participantes e de resolucao de disputas
    4. Viabilidade financeira: capital minimo, reservas operacionais e capacidade
       de suportar perdas sem comprometer a operacao
    5. Gestao de riscos: framework de risco que cubra riscos de credito, liquidez,
       operacional, de mercado e sistemico
    6. Tecnologia: avaliacao de resiliencia, capacidade, seguranca e disponibilidade
    7. Continuidade: plano de continuidade testado e atualizado

    **Manutencao permanente:**
    Os requisitos nao sao apenas para a autorizacao inicial. A entidade deve
    demonstrar continuamente que os mantem, sob pena de revogacao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de requisitos de autorizacao:**
      1. Implementar sistema de gestao documental que rastreie todos os requisitos
         da autorizacao e seu status de conformidade corrente.
      2. Dashboard de indicadores que monitore em tempo real cada dimensao
         exigida (capacidade tecnica, viabilidade financeira, gestao de riscos).
      3. Automatizar coleta de evidencias para relatorio periodico a CVM.

      **Baseline de capacidade tecnica:**
      4. Documentar e versionar a arquitetura de referencia que sustenta a
         autorizacao, com diagramas de infraestrutura e capacidade.
    tools:
      - document-management
      - observability-platform
      - capacity-planning
  devsecops:
    prose: |
      **Rastreabilidade de requisitos de autorizacao:**
      1. Manter requirements traceability matrix (RTM) em repositorio Git
         vinculando cada requisito da autorizacao a componentes do sistema.
      2. Testes de regressao automatizados que verifiquem se alteracoes de
         codigo ou infraestrutura nao comprometem requisitos da autorizacao.
      3. Pipeline de compliance que valide pre-requisitos antes de deploys
         em ambientes de producao.
    tools:
      - gitlab-ci
      - compliance-pipeline
      - infrastructure-as-code
  secops:
    prose: |
      **Monitoramento de conformidade permanente:**
      1. Auditoria interna semestral que avalie manutencao dos requisitos
         de autorizacao.
      2. Processo de notificacao a CVM em caso de descumprimento material
         de qualquer requisito.
      3. Plano de acao corretiva com prazos e responsaveis para quaisquer
         desvios identificados.
    tools:
      - grc-platform
      - audit-management
      - corrective-action-tracking
