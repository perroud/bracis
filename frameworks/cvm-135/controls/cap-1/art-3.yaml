id: art-3
family: cap-1
title: "Principios de Acesso Equitativo e Nao Discriminacao"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 3. As entidades administradoras de mercados organizados e infraestruturas
    de mercado devem assegurar:
    I - acesso equitativo e não discriminatório aos seus serviços e sistemas,
    observados critérios objetivos de admissão;
    II - tratamento igualitário entre participantes com o mesmo perfil de risco
    e atividade;
    III - transparência nos critérios de admissão, permanência e exclusão de
    participantes;
    IV - disponibilização de informações sobre regras, tarifas e serviços de
    forma clara e acessível; e
    V - mecanismos eficazes de resolução de conflitos entre participantes.

    Parágrafo único. As restrições de acesso devem ser fundamentadas em critérios
    objetivos relacionados à capacidade técnica, operacional e financeira do
    participante, vedada qualquer forma de discriminação arbitrária.
guidance:
  prose: |
    O art. 3 traduz para o contexto brasileiro o principio fundamental de
    acesso justo e equitativo a infraestruturas de mercado, alinhado com
    os principios PFMI do BIS/IOSCO e com as melhores praticas internacionais.

    **Acesso equitativo:**
    Entidades de infraestrutura sao monopolios naturais ou quase-monopolios
    (caso da B3 no Brasil). Por isso, acesso discriminatorio geraria distorcoes
    de mercado e potenciais abusos de posicao dominante.

    **Criterios objetivos:**
    Os criterios de admissao devem ser documentados, publicados e aplicados
    uniformemente. Exemplos: capital minimo, certificacao de operadores,
    infraestrutura tecnologica compativel, compliance com PLD/FT.

    **Resolucao de conflitos:**
    A exigencia de mecanismos de resolucao de conflitos e essencial para
    que participantes tenham recurso contra decisoes da entidade administradora,
    incluindo exclusao, suspensao ou restricoes de acesso.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de acesso equitativo:**
      1. Implementar sistema de onboarding de participantes com checklist
         automatizado baseado em criterios objetivos documentados.
      2. Motor de regras (rules engine) que avalie admissao de participantes
         de forma padronizada e auditavel.
      3. Portal de transparencia com regras, tarifas e criterios de acesso
         publicados e versionados.

      **Monitoramento de equidade:**
      4. Metricas de SLA por participante para detectar tratamento desigual
         em latencia, acesso a dados ou servicos.
    tools:
      - rules-engine
      - participant-portal
      - sla-monitoring
  devsecops:
    prose: |
      **Transparencia e rastreabilidade de decisoes de acesso:**
      1. Versionamento Git de todos os regulamentos de acesso e criterios
         de admissao, com historico de alteracoes.
      2. Testes automatizados que verifiquem se regras de acesso sao
         aplicadas uniformemente a todos os participantes.
      3. Pipeline de validacao que rejeite alteracoes de regras de acesso
         que nao tenham sido aprovadas por compliance.
    tools:
      - gitlab-ci
      - policy-as-code
      - audit-trail
  secops:
    prose: |
      **Fiscalizacao de equidade:**
      1. Auditoria periodica de decisoes de admissao e exclusao de
         participantes, verificando aplicacao uniforme de criterios.
      2. Canal de denuncias e ouvidoria para participantes que se sintam
         discriminados.
      3. Relatorio semestral sobre tratamento equitativo de participantes
         para o conselho de administracao e para a CVM.
    tools:
      - grc-platform
      - complaint-management
      - reporting-platform
