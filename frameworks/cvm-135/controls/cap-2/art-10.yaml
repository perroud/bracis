id: art-10
family: cap-2
title: "Admissao e Exclusao de Valores Mobiliarios"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 10. A bolsa de valores deve estabelecer regras claras e objetivas para:
    I - admissão de valores mobiliários à negociação, incluindo requisitos de
    registro, divulgação de informações e governança do emissor;
    II - manutenção de valores mobiliários admitidos, com requisitos contínuos
    de divulgação e liquidez mínima;
    III - suspensão temporária de negociação em caso de fato relevante não
    divulgado, irregularidade ou para proteção dos investidores; e
    IV - exclusão de valores mobiliários (delisting), com mecanismo de proteção
    aos investidores minoritários e prazo adequado para liquidação de posições.

    § 1. Os critérios de admissão devem considerar a natureza do valor
    mobiliário, o perfil do emissor e o segmento de listagem.
    § 2. A bolsa deve manter e divulgar catálogo atualizado de todos os
    valores mobiliários admitidos à negociação.
guidance:
  prose: |
    O art. 10 regula o ciclo de vida de um valor mobiliario no ambiente de bolsa,
    desde a admissao (listing) ate a exclusao (delisting).

    **Admissao (listing):**
    Os requisitos de admissao sao diferenciados por segmento de listagem
    (Novo Mercado, Nivel 2, Nivel 1, Basico na B3), com governanca
    corporativa e transparencia crescentes.

    **Manutencao:**
    Emissores devem manter requisitos continuos de divulgacao (demonstracoes
    financeiras, fatos relevantes, formulario de referencia) e liquidez
    minima para que os investidores possam negociar.

    **Suspensao:**
    O halt de negociacao e ferramenta de protecao que impede negociacao
    com informacao assimetrica quando ha fato relevante pendente.

    **Delisting:**
    A exclusao deve proteger minoritarios, geralmente via OPA (oferta
    publica de aquisicao) obrigatoria ou periodo de transicao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao do ciclo de vida de ativos:**
      1. Implementar sistema de gestao de listings com workflow automatizado
         para admissao, manutencao e exclusao de valores mobiliarios.
      2. Catalogo eletronico de valores mobiliarios admitidos, atualizado
         em tempo real e acessivel via API.
      3. Motor de regras para verificacao automatica de requisitos continuos
         de listagem (divulgacao, liquidez, governanca).

      **Mecanismos de suspensao:**
      4. Sistema de halt automatico integrado ao matching engine, com
         gatilhos configuraveis e logs auditaveis.
    tools:
      - listing-management
      - rules-engine
      - asset-catalog
      - workflow-automation
  devsecops:
    prose: |
      **Automacao de compliance de listagem:**
      1. Pipelines que verifiquem automaticamente se emissores cumprem
         requisitos continuos de divulgacao e governanca.
      2. Testes de integracao para mecanismos de halt e resumo de
         negociacao com cenarios de fatos relevantes.
      3. Versionamento de regras de admissao e exclusao em repositorio
         Git com historico de alteracoes.
    tools:
      - gitlab-ci
      - compliance-automation
      - integration-testing
  secops:
    prose: |
      **Supervisao de listings:**
      1. Monitoramento continuo de requisitos de listagem com alertas
         automaticos para descumprimentos.
      2. Processo formal de avaliacao de delisting com analise de impacto
         em investidores minoritarios.
      3. Relatorio periodico a CVM sobre admissoes, suspensoes e
         exclusoes realizadas.
    tools:
      - grc-platform
      - market-surveillance
      - regulatory-reporting
