id: art-12
family: cap-2
title: "Admissao e Monitoramento de Participantes da Bolsa"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 12. A bolsa de valores deve estabelecer requisitos e procedimentos para:
    I - admissão de participantes, incluindo corretoras, distribuidoras e
    demais intermediários autorizados pela CVM;
    II - verificação da capacidade técnica, operacional e financeira dos
    participantes;
    III - monitoramento contínuo do cumprimento dos requisitos de participação;
    IV - suspensão e exclusão de participantes em caso de descumprimento
    de obrigações ou risco para o mercado; e
    V - gestão de acesso direto ao mercado (DMA) e co-location.

    § 1. A bolsa deve manter programa de certificação de operadores e
    sistemas de acesso dos participantes.
    § 2. O acesso direto ao mercado por investidores qualificados deve
    ser supervisionado pelo intermediário responsável.
guidance:
  prose: |
    O art. 12 trata do controle de acesso ao ambiente de negociacao,
    essencial para a integridade do mercado.

    **Admissao de participantes:**
    A bolsa deve verificar que participantes possuem autorizacao CVM,
    capital adequado, sistemas compativeis e pessoal qualificado.

    **DMA (Direct Market Access):**
    O acesso direto ao mercado permite que investidores qualificados
    enviem ordens diretamente ao sistema da bolsa, sem intermediacao
    manual da corretora. Isso exige controles de risco pre-trade
    robustos tanto na corretora quanto na bolsa.

    **Co-location:**
    A colocacao de servidores de participantes no data center da bolsa
    deve ser oferecida de forma equitativa, sem discriminacao entre
    participantes do mesmo perfil.

    **Certificacao:**
    Operadores devem ser certificados (no Brasil, via ANCORD/APIMEC)
    e sistemas de acesso devem ser homologados pela bolsa.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de participantes:**
      1. Sistema de onboarding de participantes com verificacao automatizada
         de autorizacao CVM, capital e infraestrutura tecnica.
      2. Plataforma de homologacao de sistemas de acesso (DMA, HFT, co-location)
         com testes de conformidade e performance.
      3. Monitoramento em tempo real de limites de risco pre-trade por
         participante com bloqueio automatico em caso de violacao.

      **Gestao de co-location:**
      4. Inventario e monitoramento de conectividade de co-location com
         metricas de latencia por participante.
    tools:
      - participant-management
      - risk-management-system
      - pre-trade-risk
      - co-location-management
  devsecops:
    prose: |
      **Automacao de admissao e monitoramento:**
      1. Pipeline de homologacao de sistemas de acesso com testes
         automatizados de conformidade de protocolos e limites.
      2. Monitoramento automatizado de certificacoes de operadores
         com alertas de vencimento.
      3. Testes de regressao para regras de pre-trade risk em cada
         alteracao de parametros.
    tools:
      - gitlab-ci
      - certification-management
      - automated-testing
  secops:
    prose: |
      **Supervisao de participantes:**
      1. Revisao periodica da conformidade de todos os participantes
         com requisitos de admissao e permanencia.
      2. Monitoramento de indicadores de risco por participante com
         escalacao automatica para casos criticos.
      3. Processo formal de suspensao e exclusao com garantia de
         contraditorio e defesa.
    tools:
      - grc-platform
      - risk-monitoring
      - case-management
