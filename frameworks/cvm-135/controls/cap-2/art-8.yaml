id: art-8
family: cap-2
title: "Transparencia Pre e Pos-Negociacao"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 8. A bolsa de valores deve assegurar a transparência de informações de
    negociação, garantindo:
    I - transparência pré-negociação: divulgação em tempo real das melhores
    ofertas de compra e venda, com preço, quantidade e identificação do
    intermediário, ressalvadas as exceções previstas nesta Resolução;
    II - transparência pós-negociação: divulgação imediata do preço, quantidade,
    horário e demais características dos negócios realizados;
    III - disponibilização de dados de mercado em formato padronizado e
    acessível, com latência equitativa entre contratantes;
    IV - política de distribuição de dados de mercado que não discrimine
    entre participantes do mesmo segmento; e
    V - retenção de dados históricos de negociação por prazo mínimo de
    10 (dez) anos, em formato que permita auditoria e reconstrução.

    Parágrafo único. A CVM poderá autorizar exceções à transparência pré-negociação
    para operações de grande porte (block trades) ou para ativos de baixa liquidez,
    desde que haja transparência pós-negociação adequada.
guidance:
  prose: |
    O art. 8 estabelece o regime de transparencia de mercado, fundamental para
    a eficiencia da formacao de precos e a protecao dos investidores.

    **Transparencia pre-negociacao:**
    A divulgacao em tempo real do livro de ofertas (order book) permite que
    todos os participantes tomem decisoes informadas. Excecoes sao admitidas
    para evitar impacto de mercado em operacoes de grande porte.

    **Transparencia pos-negociacao:**
    A divulgacao imediata dos negocios realizados e essencial para a descoberta
    de precos e para que o mercado reflita informacoes corretas.

    **Dados de mercado:**
    A politica de dados de mercado e tema sensivel, pois a bolsa tem monopolio
    sobre esses dados. A CVM exige que a distribuicao seja equitativa e que
    os dados sejam acessiveis em formato padronizado.

    **Retencao de 10 anos:**
    O prazo de retencao de 10 anos e significativamente longo e exige
    planejamento de armazenamento, migracao de dados e formatos auditaveis.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de disseminacao de dados:**
      1. Implementar sistema de distribuicao de market data com latencia
         equitativa via multicast ou feed handler padronizado.
      2. APIs publicas e privadas para acesso a dados pre e pos-negociacao
         em formato FIX, FIXML ou protocolo proprietario documentado.
      3. Armazenamento de dados historicos por 10+ anos com compressao,
         indexacao e capacidade de reconstrucao do book a qualquer momento.

      **Monitoramento de equidade:**
      4. Metricas de latencia de distribuicao de dados por participante
         para garantir ausencia de discriminacao.
    tools:
      - market-data-platform
      - data-warehouse
      - api-gateway
      - time-series-database
  devsecops:
    prose: |
      **Integridade de dados de mercado:**
      1. Checksums e assinatura digital de feeds de dados para garantir
         integridade end-to-end.
      2. Testes automatizados que validem completude e consistencia de
         dados pre e pos-negociacao.
      3. Pipeline de backup e verificacao de integridade de dados historicos
         com teste de restauracao semestral.
    tools:
      - gitlab-ci
      - data-integrity-testing
      - backup-verification
  secops:
    prose: |
      **Governanca de dados de mercado:**
      1. Auditoria anual da politica de distribuicao de dados para
         verificar tratamento equitativo entre participantes.
      2. Monitoramento de acessos a dados historicos com controle de
         autorizacao granular.
      3. Processo formal de resposta a requisicoes regulatorias de
         dados historicos com SLA definido.
    tools:
      - data-governance
      - access-management
      - audit-management
