id: art-82
family: cap-10
title: "Penalidades e Medidas Administrativas"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 82. O descumprimento das disposições desta Resolução sujeita a entidade
    e seus administradores às seguintes sanções administrativas, sem prejuízo de
    responsabilidade civil e penal:
    I - advertência;
    II - multa, no valor máximo de R$ 50.000.000,00 (cinquenta milhões de reais)
    por infração;
    III - suspensão do exercício de cargo de administração;
    IV - inabilitação temporária para o exercício de cargos de administração;
    V - suspensão da autorização para funcionamento;
    VI - cassação da autorização para funcionamento; e
    VII - proibição temporária de praticar determinadas atividades.

    § 1. Na aplicação das sanções, a CVM considerará:
    a) a gravidade e a natureza da infração;
    b) a vantagem auferida ou prejuízo evitado;
    c) a situação econômica do infrator;
    d) os antecedentes do infrator;
    e) a cooperação do infrator com a investigação; e
    f) o impacto da infração para o mercado e para os investidores.

    § 2. A CVM poderá adotar medidas cautelares, incluindo suspensão
    imediata de atividades, quando houver risco iminente ao mercado ou
    aos investidores.
guidance:
  prose: |
    O art. 82 estabelece o regime sancionatorio aplicavel as infraestruturas
    de mercado, com sancoes proporcionais a importancia sistemica dessas
    entidades.

    **Escala de sancoes:**
    As sancoes vao de advertencia (menor gravidade) ate cassacao da
    autorizacao (maxima gravidade), passando por multa que pode chegar
    a R$ 50 milhoes -- valor elevado que reflete a criticidade das
    infraestruturas de mercado.

    **Criterios de dosimetria:**
    A CVM aplica criterios de proporcionalidade na dosimetria da sancao,
    considerando gravidade, vantagem, capacidade economica, antecedentes,
    cooperacao e impacto no mercado.

    **Medidas cautelares:**
    A CVM pode agir preventivamente, suspendendo atividades quando houver
    risco iminente. Isso e particularmente relevante para infraestruturas
    de mercado, onde uma falha pode ter impacto sistemico.

    **Responsabilidade pessoal:**
    Administradores sao individualmente responsaveis e podem sofrer
    sancoes pessoais (inabilitacao, suspensao de cargo) alem das
    sancoes impostas a entidade.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de conformidade preventiva:**
      1. Dashboard de compliance com indicadores de risco regulatorio
         por area e por requisito da CVM 135.
      2. Sistema de alertas precoces que identifique tendencias de
         descumprimento antes que se materializem em infracoes.
      3. Repositorio de evidencias de conformidade organizado por
         artigo da CVM 135 para resposta rapida a fiscalizacoes.

      **Gestao de processos sancionatorios:**
      4. Sistema de gestao de processos administrativos com tracking
         de prazos, defesas e recursos.
    tools:
      - compliance-dashboard
      - early-warning-system
      - evidence-repository
      - administrative-process-management
  devsecops:
    prose: |
      **Automacao de conformidade:**
      1. Testes automatizados de conformidade mapeados contra cada
         artigo da CVM 135 com coleta de evidencias.
      2. Pipeline de verificacao pre-deploy que identifique potenciais
         violacoes regulatorias antes de entrar em producao.
      3. Relatorio automatizado de status de conformidade com drill-down
         por area e por requisito.
    tools:
      - gitlab-ci
      - compliance-testing
      - evidence-collection
      - compliance-reporting
  secops:
    prose: |
      **Governanca de risco regulatorio:**
      1. Avaliacao trimestral de risco regulatorio com classificacao
         por probabilidade e impacto de sancoes.
      2. Programa de treinamento para administradores sobre
         responsabilidade pessoal e regime sancionatorio.
      3. Plano de resposta a fiscalizacao da CVM com equipe dedicada,
         repositorio de evidencias e canal de comunicacao.
    tools:
      - grc-platform
      - training-management
      - inspection-response
