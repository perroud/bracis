id: art-79
family: cap-10
title: "Regras de Transicao e Cronograma de Implantacao"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 79. As entidades administradoras de mercados organizados e infraestruturas
    de mercado devem adequar-se aos requisitos desta Resolução observando:
    I - prazo de 180 (cento e oitenta) dias contados da publicação para
    adaptação de regras operacionais e regulamentos internos;
    II - prazo de 360 (trezentos e sessenta) dias para adequação de sistemas
    de tecnologia, contingência e cibersegurança;
    III - prazo de 180 (cento e oitenta) dias para submissão à CVM do plano
    de adequação de governança corporativa;
    IV - entrada em vigor da resolução em 1 de novembro de 2022, sem
    prejuízo dos prazos de adequação acima;
    V - manutenção da validade de autorizações concedidas antes desta
    Resolução, devendo as entidades adequar-se aos novos requisitos nos
    prazos estabelecidos; e
    VI - revogação das normas anteriores sobre mercados organizados e
    infraestruturas de mercado, incluindo instruções CVM que tratavam do
    tema de forma fragmentada.

    Parágrafo único. A CVM poderá conceder prazo adicional para adequação,
    mediante requerimento fundamentado da entidade, considerando a
    complexidade das mudanças necessárias.
guidance:
  prose: |
    O art. 79 estabelece o cronograma de transicao para a CVM 135, que
    consolidou diversas normas anteriores.

    **Prazos diferenciados:**
    A CVM reconheceu que diferentes aspectos da regulacao exigem prazos
    distintos de adequacao:
    - Regras operacionais (180 dias): menor complexidade tecnica
    - Sistemas de TI (360 dias): maior complexidade de implementacao
    - Governanca (180 dias para plano): requer reestruturacoes societarias

    **Consolidacao normativa:**
    A CVM 135 revogou e consolidou diversas instrucoes que regulavam
    mercados organizados de forma fragmentada, criando um unico
    arcabouco regulatorio.

    **Autorizacoes anteriores:**
    Entidades ja autorizadas nao precisam de nova autorizacao, mas
    devem adequar-se aos novos requisitos dentro dos prazos.

    **Prazo adicional:**
    A CVM pode conceder extensao de prazo caso a entidade demonstre
    que a adequacao exige tempo adicional por complexidade tecnica
    ou estrutural justificada.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plano de adequacao tecnologica:**
      1. Inventario de gaps entre sistemas atuais e requisitos da CVM 135,
         com priorizacao por criticidade e prazo regulatorio.
      2. Roadmap de adequacao com marcos (milestones) alinhados aos
         prazos regulatorios de 180 e 360 dias.
      3. Dashboard de acompanhamento do plano de adequacao com status
         por requisito e alertas para atrasos.

      **Migracao de sistemas:**
      4. Plano de migracao de sistemas legados para novas arquiteturas,
         com testes de regressao e rollback.
    tools:
      - project-management
      - gap-analysis
      - migration-planning
      - compliance-dashboard
  devsecops:
    prose: |
      **Gestao do plano de adequacao:**
      1. Tracking de requisitos regulatorios em board (Kanban/Scrum)
         com sprints alinhados aos prazos da CVM.
      2. Pipeline de validacao de conformidade que verifique se cada
         deploy aproxima a entidade da plena adequacao.
      3. Testes de aceitacao regulatoria (regulatory acceptance tests)
         para cada requisito da CVM 135.
    tools:
      - gitlab-ci
      - project-tracking
      - regulatory-testing
      - acceptance-testing
  secops:
    prose: |
      **Governanca da transicao:**
      1. Comite de transicao regulatoria com representantes de todas
         as areas impactadas pela CVM 135.
      2. Relatorio mensal de progresso de adequacao para diretoria
         e para a CVM.
      3. Avaliacao de risco de descumprimento de prazos com plano
         de contingencia e pedido de extensao se necessario.
    tools:
      - grc-platform
      - regulatory-transition
      - risk-assessment
