id: art-20
family: cap-3
title: "Registro e Confirmacao de Operacoes de Balcao"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 20. A entidade administradora do mercado de balcão organizado deve manter
    sistema de registro de operações que assegure:
    I - registro tempestivo de todas as operações realizadas, com dados completos
    de contrapartes, ativo, preço, quantidade, data e horário;
    II - confirmação bilateral das operações entre as contrapartes ou seus
    intermediários, em prazo compatível com o ciclo de liquidação;
    III - integração com entidades de registro e câmaras de compensação para
    transmissão automática de dados de operações;
    IV - retenção de registros por prazo mínimo de 10 (dez) anos, em formato
    que permita auditoria regulatória; e
    V - mecanismos de resolução de divergências entre contrapartes sobre
    termos de operações registradas.

    Parágrafo único. A entidade deve disponibilizar à CVM acesso irrestrito
    e tempestivo aos dados de operações registradas para fins de supervisão.
guidance:
  prose: |
    O art. 20 trata da infraestrutura de registro de operacoes de balcao,
    essencial para a rastreabilidade e supervisao regulatoria.

    **Registro tempestivo:**
    O registro deve ocorrer em tempo real ou quase real, garantindo que
    a posicao de risco das contrapartes esteja sempre atualizada.

    **Confirmacao bilateral:**
    A confirmacao e o processo pelo qual ambas as contrapartes concordam
    com os termos da operacao. Falhas de confirmacao sao fonte de risco
    operacional e podem gerar divergencias na liquidacao.

    **Integracao com infraestruturas:**
    A transmissao automatica (STP - Straight Through Processing) de dados
    de operacoes para registradores e camaras elimina reprocessamento
    manual e reduz risco operacional.

    **Acesso regulatorio:**
    A CVM deve ter acesso irrestrito e tempestivo, o que exige interfaces
    tecnicas de consulta com capacidade de busca por multiplos criterios.
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de registro e confirmacao:**
      1. Implementar plataforma de registro com STP (Straight Through
         Processing) para transmissao automatica a registradores e camaras.
      2. Motor de confirmacao bilateral com matching automatico de termos
         e workflow de resolucao de divergencias.
      3. Armazenamento de longo prazo (10+ anos) com indexacao para
         consulta rapida por multiplos criterios.

      **Acesso regulatorio:**
      4. API de acesso regulatorio para a CVM com autenticacao robusta
         e capacidade de consulta por periodo, ativo, contraparte.
    tools:
      - trade-repository
      - confirmation-platform
      - data-warehouse
      - regulatory-api
  devsecops:
    prose: |
      **Integridade e rastreabilidade:**
      1. Logs de registro inalteraveis com assinatura digital e
         timestamp de autoridade certificadora.
      2. Testes de integracao para STP com registradores e camaras
         com validacao de completude de dados.
      3. Pipeline de reconciliacao diaria entre registros internos
         e repositorios centrais.
    tools:
      - gitlab-ci
      - digital-signature
      - reconciliation-testing
      - integration-testing
  secops:
    prose: |
      **Supervisao de registros:**
      1. Monitoramento diario de taxa de confirmacao de operacoes
         com escalacao para divergencias nao resolvidas.
      2. Teste periodico do acesso regulatorio da CVM para garantir
         funcionalidade e desempenho.
      3. Auditoria anual da integridade de registros historicos com
         verificacao de completude e acessibilidade.
    tools:
      - operational-monitoring
      - audit-management
      - compliance-testing
