id: art-18
family: cap-3
title: "Intermediacao e Acesso ao Mercado de Balcao"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 18. A entidade administradora do mercado de balcão organizado deve:
    I - definir os tipos de participantes admitidos a operar, podendo incluir
    corretoras, distribuidoras, bancos de investimento e market makers;
    II - estabelecer requisitos de intermediação adequados à natureza dos
    ativos negociados e ao perfil dos investidores;
    III - manter controles de risco pré-trade proporcionais ao modelo de
    negociação adotado;
    IV - assegurar que investidores não qualificados somente acessem o mercado
    de balcão por meio de intermediários autorizados; e
    V - implementar mecanismos de best execution, garantindo que intermediários
    busquem as melhores condições disponíveis para seus clientes.

    Parágrafo único. Market makers devem cumprir obrigações de cotação
    contínua conforme parâmetros definidos pela entidade administradora,
    contribuindo para a liquidez dos ativos.
guidance:
  prose: |
    O art. 18 regula a cadeia de intermediacao no mercado de balcao,
    focando na protecao do investidor e na qualidade da execucao.

    **Intermediacao obrigatoria:**
    Investidores nao qualificados devem acessar o mercado de balcao
    exclusivamente via intermediarios autorizados, que assumem
    responsabilidade pela adequacao (suitability) do investimento.

    **Best execution:**
    A obrigacao de melhor execucao exige que intermediarios busquem
    o melhor preco, custo e velocidade de execucao disponiveis,
    considerando os venues acessiveis.

    **Market makers:**
    Market makers desempenham papel fundamental no balcao, provendo
    liquidez com cotacoes bilaterais continuas. Seus parametros
    (spread maximo, tamanho minimo de cotacao) devem ser definidos
    e monitorados pela entidade administradora.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de intermediacao:**
      1. Sistema de gerenciamento de participantes com classificacao por tipo
         (corretora, banco, market maker) e permissoes diferenciadas.
      2. Controles de risco pre-trade por participante com limites de
         posicao, valor e quantidade ajustaveis em tempo real.
      3. Motor de best execution que avalie e registre a qualidade de
         execucao de cada ordem.

      **Gestao de market makers:**
      4. Monitoramento automatizado de cumprimento das obrigacoes de
         cotacao por market maker (tempo em tela, spread, tamanho).
    tools:
      - order-management-system
      - pre-trade-risk
      - best-execution-engine
      - market-maker-management
  devsecops:
    prose: |
      **Automacao de controles de intermediacao:**
      1. Testes automatizados para validar que controles de risco pre-trade
         funcionam corretamente para cada tipo de participante.
      2. Pipeline de monitoramento de qualidade de dados de best execution
         com reconciliacao diaria.
      3. Versionamento de parametros de market making em repositorio Git
         com aprovacao obrigatoria para alteracoes.
    tools:
      - gitlab-ci
      - data-quality-testing
      - parameter-management
  secops:
    prose: |
      **Supervisao de intermediacao:**
      1. Relatorio diario de qualidade de execucao por intermediario
         com identificacao de desvios de best execution.
      2. Monitoramento do cumprimento de obrigacoes de market makers
         com penalidades automaticas para descumprimento.
      3. Verificacao de que investidores nao qualificados acessam o
         mercado exclusivamente via intermediarios autorizados.
    tools:
      - market-surveillance
      - compliance-monitoring
      - regulatory-reporting
