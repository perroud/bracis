id: art-16
family: cap-3
title: "Funcionamento do Mercado de Balcao Organizado"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 16. O mercado de balcão organizado deve manter sistema de negociação ou
    registro de operações com valores mobiliários que assegure:
    I - regras próprias de funcionamento aprovadas pela CVM;
    II - mecanismos de formação de preços adequados à natureza dos ativos
    negociados, podendo adotar modelos de cotação (quote-driven), leilão
    ou negociação bilateral;
    III - registro de todas as operações realizadas, com identificação
    completa das contrapartes, preço, quantidade e horário;
    IV - divulgação de informações sobre operações realizadas, observado
    prazo e formato definidos pela CVM; e
    V - acesso a participantes conforme critérios objetivos previamente
    estabelecidos.

    Parágrafo único. O mercado de balcão organizado pode adotar níveis
    diferenciados de transparência conforme a natureza do ativo e o
    perfil dos participantes, mediante autorização da CVM.
guidance:
  prose: |
    O art. 16 regula o mercado de balcao organizado, que se diferencia da bolsa
    por permitir maior flexibilidade na formacao de precos e transparencia.

    **Modelos de negociacao:**
    Diferentemente da bolsa (order-driven com livro centralizado), o balcao
    pode adotar modelos quote-driven (market makers cotam precos), leilao
    periodico ou negociacao bilateral. Essa flexibilidade e adequada para
    ativos de menor liquidez como debentures, CRIs, CRAs e cotas de fundos.

    **Registro obrigatorio:**
    Mesmo sem livro centralizado, todas as operacoes devem ser registradas
    para fins de rastreabilidade, supervisao e liquidacao.

    **Transparencia diferenciada:**
    A CVM reconhece que o mesmo nivel de transparencia da bolsa pode ser
    inadequado para certos mercados de balcao, permitindo regimes
    diferenciados conforme tipo de ativo e perfil de investidor.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de mercado de balcao:**
      1. Implementar sistema de negociacao com suporte a multiplos modelos
         (quote-driven, leilao, bilateral) configuraveis por ativo.
      2. Motor de registro de operacoes com captura completa de dados de
         contrapartes, preco, quantidade, horario e condicoes.
      3. Configuracao de regimes de transparencia diferenciados por tipo
         de ativo e segmento, com parametros auditaveis.

      **Integracao com pos-negociacao:**
      4. Conectividade com camaras de liquidacao e entidades de registro
         para transmissao automatica de operacoes.
    tools:
      - trading-platform
      - trade-repository
      - market-data-platform
      - clearing-gateway
  devsecops:
    prose: |
      **Integridade de registros de operacoes:**
      1. Logs de operacoes inalteraveis com hash encadeado para garantir
         que nenhuma operacao seja alterada retroativamente.
      2. Testes automatizados de conformidade de registros contra
         requisitos regulatorios de completude.
      3. Pipeline de reconciliacao que compare registros internos com
         repositorios centrais e camaras de liquidacao.
    tools:
      - gitlab-ci
      - immutable-logging
      - reconciliation-engine
  secops:
    prose: |
      **Supervisao de mercado de balcao:**
      1. Monitoramento de operacoes para detectar precos fora de mercado,
         concentracao excessiva ou operacoes suspeitas.
      2. Verificacao periodica de que participantes cumprem criterios
         de admissao ao mercado de balcao.
      3. Relatorio periodico a CVM sobre volumes, tipos de ativos e
         incidentes de mercado.
    tools:
      - market-surveillance
      - grc-platform
      - regulatory-reporting
