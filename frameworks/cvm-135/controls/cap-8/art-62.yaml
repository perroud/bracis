id: art-62
family: cap-8
title: "Enforcement e Mecanismo de Ressarcimento de Prejuizos"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 62. As entidades administradoras de mercados organizados devem implementar:
    I - regras e procedimentos sancionatórios para participantes que descumpram
    regulamentos, incluindo advertência, multa, suspensão e exclusão;
    II - mecanismo de ressarcimento de prejuízos (MRP) que garanta aos investidores
    o direito de serem ressarcidos por prejuízos decorrentes de erros operacionais
    ou falhas de intermediários;
    III - fundo garantidor de operações com recursos suficientes para cobrir
    reclamações de investidores, conforme parâmetros definidos pela CVM;
    IV - processo de reclamação e arbitragem acessível aos investidores,
    com prazos definidos para análise e decisão;
    V - publicidade das decisões sancionatórias e das reclamações procedentes,
    como mecanismo de transparência e prevenção; e
    VI - relatório periódico à CVM sobre processos sancionatórios, reclamações
    e ressarcimentos realizados.

    Parágrafo único. O MRP deve ser administrado por entidade independente da
    área de negociação, com governança própria e autonomia decisória.
guidance:
  prose: |
    O art. 62 trata do poder sancionatorio das bolsas e do MRP, que e o
    mecanismo brasileiro de protecao ao investidor contra falhas de
    intermediarios.

    **Poder sancionatorio:**
    As bolsas, como entidades de autorregulacao, possuem poder de
    punir participantes que descumpram regras. As sancoes vao de
    advertencia a exclusao, passando por multa e suspensao.

    **MRP (Mecanismo de Ressarcimento de Prejuizos):**
    O MRP e uma inovacao do mercado brasileiro que permite ao investidor
    ser ressarcido por prejuizos causados por erros ou falhas de
    intermediarios, sem necessidade de processo judicial. O limite
    atual e de R$ 120.000,00 por reclamacao.

    **Fundo garantidor:**
    O fundo que suporta o MRP e constituido por contribuicoes dos
    participantes e administrado pela BSM com autonomia.

    **Transparencia:**
    A publicidade das decisoes cria efeito pedagogico e preventivo,
    permitindo que participantes e investidores conhcam as consequencias
    de descumprimentos.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de enforcement e MRP:**
      1. Sistema de gestao de processos sancionatorios com workflow
         completo (abertura, investigacao, defesa, decisao, recurso).
      2. Portal de reclamacoes para investidores com protocolo eletronico,
         acompanhamento de status e documentacao online.
      3. Sistema de gestao do fundo garantidor com controle de saldo,
         contribuicoes e pagamentos de ressarcimento.

      **Transparencia:**
      4. Portal publico de decisoes sancionatorias e reclamacoes
         procedentes com busca e filtros.
    tools:
      - case-management
      - investor-portal
      - fund-management
      - transparency-portal
  devsecops:
    prose: |
      **Automacao de processos de enforcement:**
      1. Workflow automatizado de processos sancionatorios com controle
         de prazos e notificacoes automaticas.
      2. Testes de integridade do portal de reclamacoes e do sistema
         de protocolo eletronico.
      3. Pipeline de publicacao de decisoes com revisao e aprovacao
         antes da divulgacao publica.
    tools:
      - gitlab-ci
      - workflow-automation
      - portal-testing
      - content-management
  secops:
    prose: |
      **Governanca de enforcement:**
      1. Monitoramento de SLA de processos sancionatorios e reclamacoes,
         com escalacao para atrasos.
      2. Auditoria anual do MRP incluindo adequacao do fundo garantidor
         e eficacia dos procedimentos.
      3. Relatorio trimestral a CVM sobre processos, reclamacoes e
         ressarcimentos realizados.
    tools:
      - sla-monitoring
      - audit-management
      - regulatory-reporting
