id: art-65
family: cap-8
title: "Monitoramento Cross-Market e Cooperacao Internacional"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 65. As entidades administradoras de mercados organizados devem:
    I - implementar sistemas de vigilância que permitam correlacionar operações
    entre diferentes mercados e segmentos (cross-market surveillance);
    II - compartilhar informações de surveillance com entidades administradoras
    de outros mercados, conforme acordos de cooperação;
    III - manter mecanismos de detecção de manipulação que considerem operações
    com o mesmo ativo ou ativos correlacionados em mercados distintos;
    IV - cooperar com autoridades reguladoras estrangeiras no âmbito de
    memorandos de entendimento (MoU) da IOSCO; e
    V - reportar à CVM operações com valores mobiliários cross-listed ou
    dual-listed que apresentem padrões atípicos de negociação.

    Parágrafo único. A entidade deve manter controles que identifiquem
    operações potencialmente coordenadas entre mercado à vista, derivativos,
    opções e mercado fracionário.
guidance:
  prose: |
    O art. 65 endereca a supervisao cross-market, essencial em mercados
    modernos onde estrategias de manipulacao podem envolver operacoes
    coordenadas em multiplos venues.

    **Cross-market surveillance:**
    Estrategias de manipulacao frequentemente envolvem operacoes em
    mercados diferentes (ex: comprar no a vista e manipular preco
    de opcoes, ou operar cross-listed em bolsas diferentes).

    **Cooperacao internacional:**
    Valores mobiliarios brasileiros listados em bolsas estrangeiras
    (ADRs) e valores estrangeiros listados no Brasil (BDRs) exigem
    vigilancia coordenada entre jurisdicoes.

    **Correlacao entre ativos:**
    Alem do mesmo ativo em mercados diferentes, a surveillance deve
    cobrir ativos correlacionados (ex: acoes e derivativos da mesma
    empresa, indices e seus componentes).
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de cross-market surveillance:**
      1. Sistema de surveillance que correlacione dados de negociacao
         entre mercado a vista, derivativos, opcoes e fracionario.
      2. Conectividade com feeds de dados de bolsas internacionais
         para monitoramento de cross-listed securities.
      3. Motor de correlacao que identifique operacoes potencialmente
         coordenadas entre mercados e ativos correlacionados.

      **Compartilhamento de dados:**
      4. APIs seguras para compartilhamento bilateral de dados de
         surveillance com bolsas parceiras.
    tools:
      - cross-market-surveillance
      - market-data-aggregation
      - correlation-engine
      - secure-data-sharing
  devsecops:
    prose: |
      **Testes de deteccao cross-market:**
      1. Cenarios de teste com dados sinteticos que simulem manipulacao
         cross-market para validar capacidade de deteccao.
      2. Pipeline de atualizacao de regras de correlacao com validacao
         de eficacia antes de deploy.
      3. Monitoramento de qualidade de dados de feeds internacionais
         com alertas para gaps ou atrasos.
    tools:
      - gitlab-ci
      - synthetic-testing
      - data-quality-monitoring
      - rule-validation
  secops:
    prose: |
      **Operacoes de cross-market surveillance:**
      1. Analise de alertas cross-market com equipe que compreenda
         estrategias multi-asset e multi-venue.
      2. Processo formal de cooperacao com autoridades estrangeiras
         via MoU da IOSCO, com prazos de resposta definidos.
      3. Relatorio mensal de operacoes cross-market atipicas com
         analise de tendencias e novos padroes.
    tools:
      - investigation-platform
      - international-cooperation
      - trend-analysis
