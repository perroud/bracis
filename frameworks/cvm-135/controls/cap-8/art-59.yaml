id: art-59
family: cap-8
title: "Supervisao de Mercado e Autorregulacao"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 59. As bolsas de valores e entidades administradoras de mercados
    organizados devem manter estrutura de supervisão de mercado que assegure:
    I - monitoramento em tempo real de todas as operações realizadas nos
    mercados sob sua administração;
    II - detecção de operações atípicas, manipulação de mercado, uso de
    informação privilegiada e demais ilícitos de mercado;
    III - sistemas de vigilância (market surveillance) com capacidade de
    reconstrução do livro de ofertas e análise de padrão de negociação;
    IV - equipe qualificada de analistas de mercado com independência
    funcional em relação às áreas de negócio;
    V - procedimentos de investigação de operações suspeitas com prazo
    definido e comunicação à CVM quando confirmados indícios de
    irregularidade; e
    VI - delegação de funções de autorregulação a entidade independente
    (BSM Supervisão de Mercados) quando aplicável.

    § 1. A BSM Supervisão de Mercados deve ter autonomia funcional e
    orçamentária para exercer suas atribuições de supervisão.
    § 2. A entidade administradora deve cooperar plenamente com a CVM
    e a BSM no fornecimento de dados e informações para investigações.
guidance:
  prose: |
    O art. 59 trata da primeira linha de defesa contra irregularidades
    no mercado: a supervisao realizada pela propria bolsa e pela BSM.

    **Market surveillance:**
    Sistemas de vigilancia de mercado devem ser capazes de:
    1. Reconstruir o livro de ofertas a qualquer momento no tempo
    2. Identificar padroes de spoofing, layering, wash trading
    3. Detectar uso de informacao privilegiada por padroes de negociacao
    4. Correlacionar operacoes entre mercados (cross-market surveillance)
    5. Identificar front-running por intermediarios

    **BSM Supervisao de Mercados:**
    No modelo brasileiro, a BSM e a entidade de autorregulacao que
    exerce funcoes de supervisao delegadas pela B3, com autonomia
    funcional. A BSM pode instaurar processos administrativos
    sancionadores contra participantes do mercado.

    **Independencia funcional:**
    Os analistas de surveillance devem ser independentes das areas
    comerciais da bolsa, evitando conflitos de interesse entre
    gerar receita de negociacao e investigar irregularidades.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de surveillance:**
      1. Sistema de market surveillance com capacidade de analise em
         tempo real e historico de todas as operacoes.
      2. Motor de deteccao de anomalias com regras pre-definidas
         (threshold-based) e modelos de machine learning para
         padroes complexos.
      3. Ferramenta de reconstrucao de order book (market replay) com
         capacidade de visualizacao temporal de ofertas e negocios.

      **Integracao com BSM:**
      4. Canal seguro de comunicacao com BSM para transmissao de
         alertas e dados de investigacao.
    tools:
      - market-surveillance
      - anomaly-detection
      - market-replay
      - secure-communication
  devsecops:
    prose: |
      **Automacao de vigilancia:**
      1. Pipeline de atualizacao de regras de surveillance com
         versionamento e testes de eficacia antes de deploy.
      2. Testes automatizados com dados sinteticos que simulem
         cenarios de manipulacao para validar deteccao.
      3. Monitoramento de taxa de falsos positivos e negativos
         dos alertas de surveillance com tuning continuo.
    tools:
      - gitlab-ci
      - surveillance-rule-engine
      - synthetic-data-testing
      - alert-tuning
  secops:
    prose: |
      **Operacoes de supervisao:**
      1. Triagem diaria de alertas de surveillance com classificacao
         por prioridade e atribuicao a analistas qualificados.
      2. Procedimento formal de investigacao com prazos, escalacao
         e comunicacao a CVM para indicios confirmados.
      3. Relatorio mensal de atividade de surveillance (alertas,
         investigacoes, comunicacoes) para diretoria e CVM.
    tools:
      - case-management
      - investigation-platform
      - regulatory-reporting
