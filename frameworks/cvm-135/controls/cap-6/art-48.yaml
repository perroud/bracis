id: art-48
family: cap-6
title: "Contingencia Operacional e Plano de Continuidade"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 48. As entidades administradoras de mercados organizados devem implementar
    e manter plano de contingência operacional que contemple:
    I - identificação e classificação de cenários de contingência, incluindo
    falhas de sistema, desastres naturais, ataques cibernéticos e pandemias;
    II - procedimentos alternativos de negociação em caso de indisponibilidade
    do sistema eletrônico principal;
    III - comunicação imediata aos participantes, investidores, CVM e demais
    autoridades em caso de ativação do plano de contingência;
    IV - critérios claros para suspensão e retomada de negociações, com
    procedimentos de reconciliação e ajuste pós-contingência;
    V - acordos operacionais com outros mercados organizados para absorver
    negociações em caso de indisponibilidade prolongada; e
    VI - revisão e teste do plano com frequência mínima semestral, incluindo
    testes com participantes do mercado.

    Parágrafo único. A retomada de negociações após contingência deve incluir
    leilão de abertura e período de verificação para garantir a integridade
    do livro de ofertas e das posições dos participantes.
guidance:
  prose: |
    O art. 48 complementa o art. 38 (continuidade de camaras) com requisitos
    especificos para a continuidade dos ambientes de negociacao.

    **Cenarios de contingencia:**
    A identificacao de cenarios deve ser abrangente e considerar:
    1. Falhas de sistema (matching engine, conectividade, dados)
    2. Desastres naturais (incendio, inundacao, terremoto)
    3. Ataques ciberneticos (DDoS, ransomware, sabotagem)
    4. Pandemias (continuidade com equipe remota)
    5. Falhas de fornecedores criticos (telecom, energia, cloud)

    **Procedimentos alternativos:**
    Quando o sistema eletronico principal falha, devem existir alternativas
    como sistema de backup, negociacao via telefone (viva-voz) ou
    transferencia para outro mercado organizado.

    **Retomada com integridade:**
    A retomada apos contingencia exige leilao de abertura para reestabelecer
    precos de referencia e verificacao de posicoes para garantir que nenhuma
    operacao foi perdida ou duplicada.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de contingencia de negociacao:**
      1. Sistema de negociacao de backup em site de DR com capacidade
         de assumir em ate 2 horas (alinhado com art. 38).
      2. Mecanismo de leilao de reabertura automatizado que reestabeleca
         precos de referencia apos contingencia.
      3. Sistema de reconciliacao que compare posicoes pre e pos-
         contingencia para identificar e corrigir divergencias.

      **Comunicacao de contingencia:**
      4. Sistema de broadcast multicanal (email, SMS, API, portal) para
         comunicacao imediata com participantes e autoridades.
    tools:
      - disaster-recovery
      - auction-engine
      - reconciliation-engine
      - emergency-communication
  devsecops:
    prose: |
      **Automacao de contingencia:**
      1. Runbooks automatizados de failover e failback com testes
         de regressao em cada alteracao.
      2. Pipeline de teste de contingencia que simule cenarios de
         falha e valide procedimentos alternativos.
      3. Monitoramento automatizado de integridade de dados de
         reconciliacao pos-contingencia.
    tools:
      - gitlab-ci
      - chaos-engineering
      - runbook-automation
      - reconciliation-testing
  secops:
    prose: |
      **Governanca de contingencia:**
      1. Testes semestrais de contingencia de negociacao com
         participantes, documentados e avaliados.
      2. Revisao pos-incidente de cada ativacao do plano de
         contingencia com identificacao de melhorias.
      3. Relatorio anual a CVM sobre resultados de testes de
         contingencia e plano de acao para gaps.
    tools:
      - bcm-platform
      - incident-review
      - regulatory-reporting
