id: art-45
family: cap-6
title: "Ciberseguranca e Resiliencia Tecnologica"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 45. As entidades administradoras de mercados organizados e infraestruturas
    de mercado devem implementar programa de cibersegurança que inclua:
    I - política de segurança cibernética aprovada pela diretoria, com revisão
    anual e conteúdo mínimo definido pela CVM;
    II - classificação e proteção de informações e ativos de tecnologia conforme
    sua criticidade e sensibilidade;
    III - monitoramento contínuo de ameaças e detecção de intrusões com
    capacidade de resposta 24 horas por dia, 7 dias por semana;
    IV - gestão de incidentes cibernéticos com plano de resposta, equipe
    dedicada (CSIRT) e comunicação tempestiva à CVM;
    V - programa de conscientização e treinamento em segurança cibernética
    para todos os colaboradores, com frequência mínima anual;
    VI - gestão de riscos de terceiros e fornecedores críticos de tecnologia,
    incluindo avaliação de segurança antes da contratação e monitoramento
    contínuo; e
    VII - participação em centros de compartilhamento de informações sobre
    ameaças cibernéticas (ISACs) do setor financeiro.

    Parágrafo único. Incidentes cibernéticos relevantes devem ser comunicados
    à CVM em até 24 horas, com relatório detalhado em 72 horas.
guidance:
  prose: |
    O art. 45 estabelece um programa abrangente de ciberseguranca especifico
    para infraestruturas de mercado, complementando a CVM 35.

    **CSIRT dedicado:**
    A criticidade sistemica de infraestruturas de mercado exige equipe
    dedicada de resposta a incidentes (CSIRT/CERT), com capacidade de
    resposta 24/7 e procedimentos documentados.

    **Comunicacao a CVM:**
    O prazo de 24 horas para comunicacao inicial e de 72 horas para
    relatorio detalhado e mais rigoroso que o prazo generico da CVM 35,
    refletindo a importancia sistemica das infraestruturas.

    **Gestao de terceiros:**
    Infraestruturas de mercado dependem de fornecedores criticos
    (provedores de rede, hardware, software). A falha de um fornecedor
    pode impactar todo o mercado, exigindo due diligence rigorosa.

    **ISACs:**
    A participacao em centros de compartilhamento como o CERT.br e
    ISACs do setor financeiro permite inteligencia coletiva sobre
    ameacas especificas ao mercado de capitais.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de seguranca:**
      1. Implementar SOC (Security Operations Center) com capacidade 24/7,
         SIEM correlacionando eventos de todos os sistemas criticos.
      2. Plataforma de deteccao e resposta (EDR/XDR) em todos os endpoints
         e servidores de infraestrutura de mercado.
      3. Segmentacao de rede com microsegmentacao para sistemas criticos
         e zero trust para acessos internos.

      **Gestao de terceiros:**
      4. Plataforma de avaliacao de risco de terceiros com questionarios
         padronizados e monitoramento continuo.
    tools:
      - siem
      - edr-xdr
      - network-segmentation
      - third-party-risk-platform
  devsecops:
    prose: |
      **Seguranca no ciclo de desenvolvimento:**
      1. Scanning automatizado de seguranca em toda a pipeline (SAST,
         DAST, SCA, container scanning, secret detection).
      2. Infraestrutura como codigo com scanning de configuracao
         (IaC scanning) antes de provisionamento.
      3. Programa de bug bounty ou vulnerability disclosure para
         sistemas publicos da infraestrutura de mercado.
    tools:
      - gitlab-ci
      - sast
      - dast
      - sca
      - container-scanning
      - secret-detection
      - iac-scanning
  secops:
    prose: |
      **Operacoes de seguranca:**
      1. CSIRT dedicado com plantao 24/7 e playbooks documentados
         para os principais cenarios de incidentes.
      2. Comunicacao a CVM em 24h com template padronizado e canal
         seguro de reporte.
      3. Exercicios de tabletop e simulacao de incidentes com
         frequencia trimestral, incluindo cenarios de ransomware,
         DDoS e comprometimento de supply chain.
    tools:
      - incident-response-platform
      - csirt-management
      - threat-intelligence
      - tabletop-exercises
