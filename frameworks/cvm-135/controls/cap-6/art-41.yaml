id: art-41
family: cap-6
title: "Sistemas Eletronicos de Negociacao e Processamento"
class: CVM-135
baselines: [infraestruturas-mercado]
statement:
  prose: |
    Art. 41. As entidades administradoras de mercados organizados e infraestruturas
    de mercado devem implementar e manter sistemas eletrônicos que:
    I - possuam capacidade de processamento suficiente para o volume de operações,
    incluindo picos e cenários de estresse, com margem de segurança mínima de
    100% sobre o pico histórico;
    II - apresentem latência adequada e monitorada, com métricas publicadas de
    desempenho e disponibilidade;
    III - implementem controles de acesso lógico baseados em princípio de menor
    privilégio, com autenticação multifator para acesso administrativo;
    IV - mantenham trilhas de auditoria completas e inalteráveis de todas as
    operações, acessos e alterações de configuração;
    V - adotem práticas de desenvolvimento seguro de software, incluindo revisão
    de código, testes de segurança e gestão de vulnerabilidades; e
    VI - sejam submetidos a testes de penetração e avaliação de segurança
    independente com frequência mínima anual.

    Parágrafo único. Alterações em sistemas críticos devem seguir processo
    formal de gestão de mudanças com aprovação independente e testes em
    ambiente segregado antes da implantação em produção.
guidance:
  prose: |
    O art. 41 estabelece os requisitos tecnologicos fundamentais para todos
    os sistemas das infraestruturas de mercado.

    **Capacidade e performance:**
    A margem de 100% sobre o pico historico reflete a experiencia de
    eventos como flash crashes, IPOs massivos e crises de mercado que
    geram volumes multiplos do normal. A B3, por exemplo, ja processou
    mais de 30 milhoes de negocios/dia em picos.

    **Desenvolvimento seguro:**
    A exigencia de praticas de secure SDLC (Security Development
    Lifecycle) inclui revisao de codigo, SAST, DAST, gestao de
    dependencias e testes de seguranca automatizados.

    **Gestao de mudancas:**
    Alteracoes em sistemas criticos de infraestrutura de mercado
    exigem processo formal com aprovacao independente (segregacao entre
    quem desenvolve e quem aprova), testes em ambiente segregado e
    plano de rollback documentado.

    **Pentests:**
    A avaliacao de seguranca independente anual complementa os testes
    automatizados, trazendo perspectiva ofensiva e identificando
    vulnerabilidades que ferramentas automaticas podem nao detectar.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de alto desempenho:**
      1. Dimensionar infraestrutura para 2x o pico historico de
         mensagens/segundo com autoscaling e monitoramento de capacidade.
      2. Implementar observabilidade completa com metricas de latencia
         (p50, p95, p99), throughput e disponibilidade publicadas.
      3. Arquitetura de microsservicos com circuit breakers e graceful
         degradation para isolamento de falhas.

      **Seguranca de plataforma:**
      4. Autenticacao multifator obrigatoria para acesso administrativo.
      5. Trilhas de auditoria imutaveis em armazenamento append-only.
    tools:
      - observability-platform
      - capacity-management
      - identity-management
      - immutable-audit-log
  devsecops:
    prose: |
      **Secure SDLC para infraestruturas criticas:**
      1. Pipeline de CI/CD com SAST, DAST, dependency scanning e
         container scanning obrigatorios antes de merge em main.
      2. Revisao de codigo obrigatoria por dois revisores independentes
         para alteracoes em sistemas criticos.
      3. Testes de performance automatizados em pipeline que validem
         capacidade e latencia antes de cada release.

      **Gestao de mudancas:**
      4. Workflow de aprovacao em GitLab com segregacao entre
         desenvolvedor, revisor e aprovador de deploy.
    tools:
      - gitlab-ci
      - sast
      - dast
      - dependency-scanning
      - container-scanning
      - performance-testing
  secops:
    prose: |
      **Seguranca e compliance operacional:**
      1. Pentest anual por empresa independente com escopo que cubra
         todos os sistemas criticos de negociacao e pos-negociacao.
      2. Monitoramento continuo de vulnerabilidades com SLA de correcao
         baseado em severidade (critica: 24h, alta: 7 dias).
      3. Revisao trimestral de acessos administrativos com recertificacao
         de privilegios e revogacao de acessos desnecessarios.
    tools:
      - vulnerability-management
      - pentest-management
      - access-certification
      - siem
