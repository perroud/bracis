baselines:
  - id: saq-a
    title: "SAQ A - Card-not-present Merchants (Outsourced)"
  - id: saq-a-ep
    title: "SAQ A-EP - E-commerce Merchants (Partial Outsource)"
  - id: saq-d-merchant
    title: "SAQ D - Merchants (All Other)"
  - id: saq-d-sp
    title: "SAQ D - Service Providers"
  - id: roc
    title: "Report on Compliance (Full Assessment)"

goals:
  - id: goal-1
    title: "Build and Maintain a Secure Network and Systems"
    requirements: [req-1, req-2]
  - id: goal-2
    title: "Protect Account Data"
    requirements: [req-3, req-4]
  - id: goal-3
    title: "Maintain a Vulnerability Management Program"
    requirements: [req-5, req-6]
  - id: goal-4
    title: "Implement Strong Access Control Measures"
    requirements: [req-7, req-8, req-9]
  - id: goal-5
    title: "Regularly Monitor and Test Networks"
    requirements: [req-10, req-11]
  - id: goal-6
    title: "Maintain an Information Security Policy"
    requirements: [req-12]

control_families:
  - id: req-1
    title: "Install and Maintain Network Security Controls"
    description: >-
      Network security controls (NSCs) such as firewalls and other network security
      technologies are points of policy enforcement that control network traffic between
      two or more logical or physical network segments.
    control_count: 5
  - id: req-2
    title: "Apply Secure Configurations to All System Components"
    description: "Malicious individuals exploit vendor default settings, account names, and passwords to compromise systems. Applying secure configurations reduces the attack surface."
    control_count: 3
  - id: req-3
    title: "Protect Stored Account Data"
    description: "Protection methods such as encryption, truncation, masking, and hashing are critical components of account data protection."
    control_count: 7
  - id: req-4
    title: "Protect Cardholder Data with Strong Cryptography During Transmission Over Open, Public Networks"
    description: "Use of strong cryptography provides greater assurance in preserving data confidentiality, integrity, and non-repudiation during transmission."
    control_count: 2
  - id: req-5
    title: "Protect All Systems and Networks from Malicious Software"
    description: "Malicious software (malware) is software or firmware intentionally designed to perform an unauthorized and typically harmful action on a target system."
    control_count: 4
  - id: req-6
    title: "Develop and Maintain Secure Systems and Software"
    description: "Security vulnerabilities in systems and software may allow criminals to access cardholder data. Many vulnerabilities are eliminated by installing vendor security patches."
    control_count: 5
  - id: req-7
    title: "Restrict Access to System Components and Cardholder Data by Business Need to Know"
    description: "To ensure critical data can only be accessed by authorized personnel, access to systems and data must be limited to those individuals whose job requires such access."
    control_count: 3
  - id: req-8
    title: "Identify Users and Authenticate Access to System Components"
    description: "Two fundamental principles of identifying and authenticating users are: establish the identity of all users, and verify users are who they claim to be."
    control_count: 6
  - id: req-9
    title: "Restrict Physical Access to Cardholder Data"
    description: >-
      Any physical access to cardholder data or systems that store, process, or transmit
      cardholder data provides the opportunity for individuals to access and/or remove
      systems or hardcopies.
    control_count: 5
  - id: req-10
    title: "Log and Monitor All Access to System Components and Cardholder Data"
    description: "Logging mechanisms and the ability to track user activities are critical for effective forensics and vulnerability management."
    control_count: 7
  - id: req-11
    title: "Test Security of Systems and Networks Regularly"
    description: "Vulnerabilities are continually discovered by malicious individuals and researchers. System components, processes, and bespoke and custom software should be tested frequently."
    control_count: 6
  - id: req-12
    title: "Support Information Security with Organizational Policies and Programs"
    description: "An organization's overall information security policy sets the tone for the whole entity and informs personnel what is expected of them."
    control_count: 10

