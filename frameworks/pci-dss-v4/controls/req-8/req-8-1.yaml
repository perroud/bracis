id: req-8.1
family: req-8
title: "Identify Users and Authenticate Access to System Components"
class: PCI-DSS-v4

statement:
  prose: >-
    Processes and mechanisms for identifying users and authenticating access to system
    components are defined and understood. User identification and related accounts for
    users and administrators are strictly managed throughout an account's lifecycle.
    Strong authentication for users and administrators is established and managed.
    Multi-factor authentication (MFA) is implemented to secure access into the CDE.
    Group, shared, or generic accounts, or other shared authentication credentials
    are only used when necessary on an exception basis and are managed accordingly.
  parts:
    - id: req-8.1.a
      label: "8.1.1"
      prose: >-
        All security policies and operational procedures identified in Requirement 8
        are documented, kept up to date, in use, and known to all affected parties.
    - id: req-8.1.b
      label: "8.1.2"
      prose: >-
        Roles and responsibilities for performing activities in Requirement 8 are
        documented, assigned, and understood.

guidance:
  prose: >-
    Unique identification ensures that actions taken on critical data and systems are
    performed by, and can be traced to, known and authorized users and processes. PCI DSS
    v4.0.1 requires MFA for all access into the CDE, not just remote access. Passwords
    must be at least 12 characters (or 8 if the system cannot support 12) containing both
    numeric and alphabetic characters. Passwords must be changed at least once every
    90 days unless dynamic analysis of password security posture is implemented. Account
    lockout mechanisms must lock accounts after no more than 10 invalid logon attempts
    and remain locked for a minimum of 30 minutes or until an administrator resets the
    account. Service accounts and application accounts used for automated access must be
    managed with the same rigor as interactive accounts.

references:
  - citation: "PCI DSS v4.0.1, Requirement 8"
    url: "https://docs-prv.pcisecuritystandards.org/PCI%20DSS/Standard/PCI-DSS-v4_0_1.pdf"
  - citation: "NIST SP 800-63B - Digital Identity Guidelines: Authentication and Lifecycle Management"
    url: "https://doi.org/10.6028/NIST.SP.800-63b"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement centralized identity management using an identity provider (IdP) such
      as Keycloak, Okta, or Azure AD that enforces MFA for all CDE access. Use OIDC
      or SAML federation for all platform services to eliminate local accounts. Deploy
      hardware security key support (WebAuthn/FIDO2) as the preferred MFA method.
      Implement automated account lifecycle management that disables accounts upon
      HR termination events. Use short-lived certificates or tokens instead of
      long-lived passwords for service-to-service authentication. Enforce password
      complexity policies at the IdP level. Implement account lockout and brute-force
      protection at the authentication gateway.
    tools:
      - keycloak
      - okta
      - azure-ad
      - vault
      - teleport
      - yubikey
      - dex

  devsecops:
    prose: >-
      Enforce MFA for all access to source code repositories containing CDE-related
      code. Use short-lived CI/CD tokens that expire after pipeline completion instead
      of long-lived credentials. Scan code repositories for hardcoded credentials and
      authentication bypass patterns. Implement automated credential rotation for
      service accounts used in CI/CD pipelines. Enforce that all pipeline access to
      production CDE environments requires MFA-verified identity. Block deployment
      pipelines from using shared or generic accounts.
    tools:
      - gitlab-ci
      - gitlab-secret-detection
      - vault
      - aws-sts
      - gitleaks
      - trufflehog

  secops:
    prose: >-
      Monitor authentication events across all CDE systems for anomalies including
      brute-force attacks, credential stuffing, impossible travel, and MFA bypass
      attempts. Alert on and investigate shared account usage. Track account
      lifecycle events to ensure timely deprovisioning. Monitor for password reuse
      by comparing password hashes against known breach databases. Audit MFA
      enrollment status for all CDE users and alert on accounts without MFA.
      Review service account inventories quarterly, validating each account's
      necessity and access scope.
    tools:
      - splunk
      - elastic-siem
      - crowdstrike-falcon
      - microsoft-sentinel
      - haveibeenpwned-api
      - sailpoint

