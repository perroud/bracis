id: req-12.1
family: req-12
title: "Support Information Security with Organizational Policies and Programs"
class: PCI-DSS-v4

statement:
  prose: >-
    A comprehensive information security policy that governs and provides direction for
    protection of the entity's information assets is known and current. Acceptable use
    policies for end-user technologies are defined and implemented. Risks to the
    cardholder data environment are formally identified, evaluated, and managed. PCI DSS
    compliance is managed through an established program. PCI DSS scope is documented
    and validated. Security awareness education is an ongoing activity. Personnel are
    screened to reduce risks from insider threats. Third-party service providers (TPSPs)
    are managed to protect account data. Suspected and confirmed security incidents that
    could impact the CDE are responded to immediately.
  parts:
    - id: req-12.1.a
      label: "12.1.1"
      prose: >-
        An overall information security policy is established, published, maintained,
        and disseminated to all relevant personnel and to relevant vendors and
        business partners.
    - id: req-12.1.b
      label: "12.1.2"
      prose: >-
        The information security policy is reviewed at least once every 12 months
        and updated as needed to reflect changes to business objectives or the
        risk environment.
    - id: req-12.1.c
      label: "12.1.3"
      prose: >-
        The security policy clearly defines information security roles and
        responsibilities for all personnel and communicates those responsibilities
        to all personnel upon hire and at least annually.

guidance:
  prose: >-
    A strong security policy sets the security tone for the whole entity and informs
    personnel what is expected. The policy must address all PCI DSS requirements and
    include an annual risk assessment process that identifies critical assets, threats,
    and vulnerabilities. The policy must define acceptable use of technologies, require
    personnel screening (background checks), and establish a security awareness program
    that is delivered upon hire and at least annually. Third-party service providers with
    access to cardholder data must be managed through written agreements that acknowledge
    their responsibility for data security. An incident response plan must be established,
    tested annually, and include specific procedures for responding to a suspected or
    confirmed cardholder data breach, including notification of payment brands and
    acquirers within required timeframes.

references:
  - citation: "PCI DSS v4.0.1, Requirement 12"
    url: "https://docs-prv.pcisecuritystandards.org/PCI%20DSS/Standard/PCI-DSS-v4_0_1.pdf"
  - citation: "NIST SP 800-61 Rev. 2 - Computer Security Incident Handling Guide"
    url: "https://doi.org/10.6028/NIST.SP.800-61r2"

implementation_guidance:
  platform_engineering:
    prose: >-
      Codify the information security policy as machine-readable artifacts in version-
      controlled repositories. Implement policy-as-code that enforces organizational
      policies across the platform automatically. Use the internal developer platform
      to distribute security awareness materials and track training completion. Maintain
      a living CDE scope document in the repository with automated discovery of CDE
      components using infrastructure inventory tools. Implement automated TPSP risk
      monitoring that tracks vendor security posture changes. Build an incident
      response automation framework (SOAR) integrated with the platform alerting
      system to trigger response playbooks automatically.
    tools:
      - backstage
      - opa
      - kyverno
      - terraform
      - argocd
      - pagerduty
      - opsgenie
      - security-awareness-platform

  devsecops:
    prose: >-
      Embed security policy compliance checks into the CI/CD pipeline as mandatory
      gates. Implement automated CDE scope validation that detects when new system
      components interact with cardholder data without being in the documented scope.
      Track TPSP dependencies in the SBOM and monitor for security incidents affecting
      third-party components. Include incident response testing in the release pipeline
      through chaos engineering and tabletop exercises. Enforce security awareness
      training completion as a prerequisite for production deployment access.
    tools:
      - gitlab-ci
      - gitlab-compliance-framework
      - conftest
      - syft
      - gamesec

  secops:
    prose: >-
      Manage the overall PCI DSS compliance program including scope validation,
      risk assessments, and evidence collection for QSA assessments. Conduct annual
      risk assessments using a formal methodology (NIST RMF, ISO 31000, FAIR).
      Manage the security awareness training program with tracked completion and
      periodic phishing simulations. Maintain the incident response plan and
      conduct annual IR tabletop exercises. Manage TPSP risk through annual
      assessments, AOC/SOC report reviews, and contractual security requirements.
      Maintain a compliance evidence repository with artifacts mapped to each
      PCI DSS requirement.
    tools:
      - grc-platform
      - servicenow
      - archer
      - knowbe4
      - proofpoint-security-awareness
      - splunk
      - pagerduty
      - jira

