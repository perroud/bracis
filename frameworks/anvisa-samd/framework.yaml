id: anvisa-samd
title: "RDC ANVISA 657/2022 -- Requisitos para Software como Dispositivo Medico (SaMD)"
short_title: "ANVISA SaMD"
version: "657/2022"
publication_date: "2022-03-24"
last_updated: "2022-03-24"
effective_date: "2022-09-24"
authority:
  name: "Agencia Nacional de Vigilancia Sanitaria"
  acronym: "ANVISA"
  country: "BR"
  url: "https://www.gov.br/anvisa"
type: regulation
scope: software-as-medical-device
mandatory: true
original_language: pt-br
available_languages: [pt-br]
industries:
  - healthtech
  - medical-devices
  - life-sciences
  - digital-health
regions:
  - brazil
techstacks:
  - platform-engineering
  - devsecops
  - secops
  - gitops
url: "https://anvisalegis.datalegis.net/action/ActionDatalegis.php?acao=abrirTextoAto&tipo=RDC&numeroAto=00000657&seqAto=000&valorAno=2022&orgao=RDC/DC/ANVISA/MS"
control_families:
  - id: cap-1
    title: "Disposicoes Gerais e Classificacao"
    description: "Escopo de aplicacao, definicoes tecnicas e classificacao de risco de SaMD conforme categorias I, II, III e IV baseadas no framework IMDRF"
    articles: "art. 1 ao art. 4"
    control_count: 4
  - id: cap-2
    title: "Requisitos de Seguranca e Eficacia"
    description: "Evidencia clinica, validacao clinica, engenharia de usabilidade e seguranca cibernetica by design para SaMD"
    articles: "art. 5 ao art. 9"
    control_count: 5
  - id: cap-3
    title: "Ciclo de Vida do Software"
    description: "Processo de ciclo de vida conforme IEC 62304, controles de design, processo de desenvolvimento e verificacao e validacao de SaMD"
    articles: "art. 10 ao art. 14"
    control_count: 5
  - id: cap-4
    title: "Gestao de Riscos"
    description: "Gestao de riscos conforme ISO 14971, analise e avaliacao de riscos, medidas de mitigacao e aceitacao de risco residual"
    articles: "art. 15 ao art. 18"
    control_count: 4
  - id: cap-5
    title: "Registro e Pos-Mercado"
    description: "Registro e notificacao junto a ANVISA, vigilancia pos-mercado, gestao de atualizacoes e procedimentos de recall de software"
    articles: "art. 19 ao art. 22"
    control_count: 4
  - id: cap-6
    title: "Inteligencia Artificial e Machine Learning"
    description: "Requisitos especificos para SaMD baseado em IA/ML, transparencia algoritmica, monitoramento de drift e revalidacao de modelos"
    articles: "art. 23 ao art. 25"
    control_count: 3
related_frameworks:
  - framework_id: iec-62443
    relationship: mapped
    description: >-
      A IEC 62443 mapeia para os requisitos de seguranca cibernetica de dispositivos
      medicos conectados exigidos pela RDC 657, especialmente nos controles de seguranca
      by design, defesa em profundidade e gestao de vulnerabilidades em SaMD.
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD complementa a RDC 657 ao disciplinar o tratamento de dados pessoais de
      saude coletados e processados por SaMD, impondo requisitos adicionais de
      consentimento, anonimizacao e direitos dos titulares.
  - framework_id: hipaa
    relationship: mapped
    description: >-
      O HIPAA mapeia para a RDC 657 nos requisitos de protecao de informacoes de saude
      processadas por SaMD, especialmente em integridade de dados clinicos, controle de
      acesso e auditoria de operacoes sobre dados de pacientes.
  - framework_id: eu-ai-act
    relationship: mapped
    description: >-
      O EU AI Act mapeia para os requisitos de IA/ML da RDC 657, especialmente na
      classificacao de risco de sistemas de IA em saude, transparencia algoritmica,
      supervisao humana e documentacao tecnica de modelos.
  - framework_id: cfm-ia
    relationship: complements
    description: >-
      A Resolucao CFM sobre IA complementa a RDC 657 ao disciplinar o uso de
      inteligencia artificial na pratica medica, incluindo requisitos de supervisao do
      profissional de saude sobre decisoes clinicas assistidas por SaMD com IA.
