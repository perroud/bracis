id: art-11
family: cap-3
title: "Controles de Design e Documentacao Tecnica"
class: ANVISA-SAMD
baselines: [samd-all]
statement:
  prose: |
    Art. 11. O fabricante deve manter controles de design ao longo
    de todo o processo de desenvolvimento do SaMD, incluindo:

    I - design input: requisitos de sistema derivados de necessidades
    clínicas, requisitos regulatórios, requisitos de segurança e
    requisitos de usabilidade;
    II - design output: especificações de software, código fonte,
    documentação de arquitetura e artefatos de verificação que atendem
    aos design inputs;
    III - design review: revisão formal e documentada de resultados
    de design em pontos predeterminados do desenvolvimento;
    IV - design verification: confirmação por exame e provisão de
    evidência objetiva de que os design outputs atendem aos design inputs;
    V - design validation: confirmação de que o SaMD atende às
    necessidades e requisitos do usuário pretendido;
    VI - design transfer: processo controlado de transferência do
    design para produção, incluindo configuração de ambientes,
    deployment e monitoramento.

    Parágrafo único. Toda alteração de design deve seguir processo
    formal de controle de mudanças, com avaliação de impacto em
    segurança e eficácia do SaMD.
guidance:
  prose: |
    O art. 11 exige controles de design alinhados com 21 CFR 820.30
    (FDA Design Controls) e ISO 13485:2016, adaptados para SaMD.

    **Design Controls no contexto de SaMD:**
    Em SaMD, design controls devem cobrir nao apenas o software em si,
    mas tambem: algoritmos clinicos, modelos de IA/ML, interfaces de
    usuario, integracoes com sistemas externos e infraestrutura de
    producao (incluindo cloud).

    **Rastreabilidade de design:**
    A rastreabilidade bidirecional e fundamental:
    Necessidade clinica -> Requisito -> Design -> Implementacao -> Teste -> Validacao
    Cada elo deve ser documentado e auditavel.

    **Design Review:**
    Revisoes formais devem ocorrer em marcos definidos:
    - Apos analise de requisitos (requirements review)
    - Apos design de arquitetura (architecture review)
    - Antes de freeze de codigo (code freeze review)
    - Antes de liberacao (release readiness review)

    **Controle de mudancas:**
    Toda alteracao apos design freeze deve seguir processo formal de
    change control com: descricao da mudanca, justificativa, analise
    de impacto em seguranca/eficacia, aprovacao por RT e reavaliacao
    de risco conforme ISO 14971.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de controles de design:**
      1. Implementar sistema de gestao de requisitos (GitLab Requirements,
         Jama Connect, Polarion) integrado ao repositorio de codigo,
         com rastreabilidade bidirecional automatizada.
      2. Configurar branch protection com merge request obrigatorio,
         reviewers minimos e checklist de design review derivado de
         IEC 62304 e controles de design.
      3. Implementar processo de design transfer automatizado via
         pipeline CI/CD, com deployment controlado e reproducivel
         para ambiente de producao.
      4. Manter template de Design History File (DHF) como parte do
         repositorio, atualizado automaticamente com artefatos de
         cada fase do design.
    tools:
      - requirements-management
      - gitlab
      - design-history-file
      - deployment-pipeline
  devsecops:
    prose: |
      **Pipeline de controles de design:**
      1. Implementar traceability matrix automatizada que vincula
         requisitos (design input) a artefatos de codigo e testes
         (design output/verification), com relatorio de cobertura.
      2. Criar gate de design review no pipeline que exige aprovacao
         formal de reviewers designados antes de merge em branch de
         release.
      3. Automatizar verificacao de design output: todo requisito
         deve ter pelo menos um teste associado, todo teste deve
         estar vinculado a pelo menos um requisito.
      4. Implementar processo de change control no pipeline: alteracoes
         apos code freeze geram merge request especial que exige
         analise de impacto e aprovacao do RT.
    tools:
      - gitlab-ci
      - requirements-tracing
      - code-review
      - change-control
  secops:
    prose: |
      **Governanca de controles de design:**
      1. Manter Design History File (DHF) completo para cada SaMD,
         incluindo design input, design output, design reviews,
         verification reports e validation reports.
      2. Implementar processo de design review formal com ata,
         participantes, decisoes e acoes, vinculado ao DHF.
      3. Auditar trimestralmente rastreabilidade de design (input ->
         output -> verification -> validation) para detectar lacunas.
      4. Manter processo de controle de mudancas com formulario
         padronizado, analise de impacto mandatoria e registro de
         aprovacoes para todas as alteracoes de design.
    tools:
      - qms-platform
      - document-management
      - audit-trail
      - change-management
