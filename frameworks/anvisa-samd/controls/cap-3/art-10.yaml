id: art-10
family: cap-3
title: "Ciclo de Vida do Software -- IEC 62304"
class: ANVISA-SAMD
baselines: [samd-all]
statement:
  prose: |
    Art. 10. O fabricante deve implementar e manter processo de ciclo
    de vida do software conforme IEC 62304, abrangendo:

    I - planejamento do desenvolvimento de software, incluindo definição
    de atividades, tarefas, cronograma e recursos necessários;
    II - análise de requisitos de software, derivados dos requisitos
    de sistema e dos requisitos regulatórios aplicáveis;
    III - projeto de arquitetura de software, documentando decomposição
    em componentes, interfaces e dependências;
    IV - implementação e verificação de unidades de software;
    V - integração de software e verificação de integração;
    VI - teste de sistema de software;
    VII - liberação de software para produção.

    Parágrafo único. O nível de rigor do processo de ciclo de vida
    deve ser proporcional à classe de segurança do software conforme
    IEC 62304, sendo:
    a) Classe A: nenhuma lesão ou dano à saúde possível;
    b) Classe B: lesão não séria possível;
    c) Classe C: morte ou lesão séria possível.
guidance:
  prose: |
    O art. 10 exige conformidade com IEC 62304:2006/Amd1:2015, o padrao
    internacional para processo de ciclo de vida de software de
    dispositivos medicos.

    **Mapeamento classe ANVISA para classe IEC 62304:**
    - ANVISA Classe I -> IEC 62304 Classe A ou B
    - ANVISA Classe II -> IEC 62304 Classe B
    - ANVISA Classe III -> IEC 62304 Classe B ou C
    - ANVISA Classe IV -> IEC 62304 Classe C

    **Atividades por classe IEC 62304:**
    | Atividade                    | Classe A | Classe B | Classe C |
    |------------------------------|----------|----------|----------|
    | Planejamento                 | Sim      | Sim      | Sim      |
    | Requisitos                   | Sim      | Sim      | Sim      |
    | Arquitetura                  | Nao      | Sim      | Sim      |
    | Design detalhado             | Nao      | Nao      | Sim      |
    | Verificacao de unidade       | Nao      | Sim      | Sim      |
    | Teste de integracao          | Nao      | Sim      | Sim      |
    | Teste de sistema             | Sim      | Sim      | Sim      |

    **Relacao com metodologias ageis:**
    A IEC 62304 e agniostica quanto a metodologia de desenvolvimento.
    Equipes ageis podem manter conformidade desde que documentem
    atividades exigidas em cada sprint/iteracao e mantenham
    rastreabilidade de requisitos.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de ciclo de vida IEC 62304:**
      1. Configurar repositorio Git com branch strategy que reflita
         o ciclo de vida IEC 62304: development, integration, validation,
         release branches com politicas de protecao adequadas.
      2. Implementar sistema de gestao de requisitos integrado ao Git
         (ex: GitLab Requirements Management) com rastreabilidade
         bidirecional para codigo, testes e verificacao.
      3. Provisionar ambientes isolados para cada fase do ciclo de vida:
         desenvolvimento, integracao, validacao/verificacao e producao,
         com promocao controlada entre ambientes.
      4. Configurar artifact registry com classificacao de maturity
         (development, candidate, validated, released) e politica de
         retencao permanente para artefatos released.
    tools:
      - gitlab
      - requirements-management
      - environment-management
      - artifact-registry
  devsecops:
    prose: |
      **Pipeline IEC 62304 compliant:**
      1. Implementar pipeline multi-stage que mapeia para fases do
         IEC 62304: build -> unit-test -> integration-test -> system-test
         -> security-scan -> release-candidate -> validation -> release.
      2. Criar gates automaticos entre fases que verificam completude
         de atividades IEC 62304 (ex: todos os requisitos rastreados,
         todos os testes executados, todas as revisoes completas).
      3. Automatizar geracao de evidencias de verificacao e validacao
         como artefatos assinados do pipeline (test reports, coverage
         reports, traceability matrices).
      4. Implementar processo de code review obrigatorio com checklist
         derivado de IEC 62304 (verificacao de unidade para Classe B/C,
         design review para Classe C).
    tools:
      - gitlab-ci
      - requirements-tracing
      - test-management
      - code-review
  secops:
    prose: |
      **Governanca do ciclo de vida:**
      1. Manter Software Development Plan (SDP) documentado conforme
         IEC 62304 clause 5.1, com definicao de atividades, tarefas
         e responsaveis para cada fase.
      2. Implementar processo de configuracao management conforme
         IEC 62304 clause 8, incluindo identificacao de itens de
         configuracao, controle de mudancas e status accounting.
      3. Realizar auditorias internas semestrais de conformidade com
         IEC 62304, verificando completude de atividades por classe
         de seguranca do software.
      4. Manter registro de problemas (problem resolution) conforme
         IEC 62304 clause 9, com classificacao de severidade e
         rastreabilidade para correcoes.
    tools:
      - grc-platform
      - qms-platform
      - audit-management
      - problem-tracking
