id: art-15
family: cap-4
title: "Gestao de Riscos -- ISO 14971"
class: ANVISA-SAMD
baselines: [samd-all]
statement:
  prose: |
    Art. 15. O fabricante deve implementar e manter processo de gestão
    de riscos conforme ISO 14971 ao longo de todo o ciclo de vida do
    SaMD, incluindo:

    I - estabelecimento de política de gestão de riscos que defina
    critérios de aceitabilidade de risco, incluindo risco residual
    aceitável e relação benefício-risco;
    II - designação de pessoal qualificado para conduzir atividades
    de gestão de riscos, com competência técnica e clínica adequada;
    III - elaboração e manutenção de plano de gestão de riscos
    específico para cada SaMD, definindo escopo, atividades, critérios
    e responsáveis;
    IV - documentação de todo o processo em arquivo de gestão de riscos
    (risk management file) rastreável e auditável;
    V - revisão periódica da gestão de riscos durante todo o ciclo de
    vida do SaMD, incluindo dados de pós-mercado.

    Parágrafo único. O processo de gestão de riscos deve ser integrado
    ao processo de ciclo de vida do software (IEC 62304) e aos controles
    de design, garantindo que riscos identificados sejam tratados por
    controles de design verificáveis.
guidance:
  prose: |
    O art. 15 exige conformidade com ISO 14971:2019, o padrao internacional
    para gestao de riscos de dispositivos medicos.

    **Processo ISO 14971:**
    1. Analise de riscos: identificacao de perigos e situacoes perigosas
    2. Avaliacao de riscos: estimativa de severidade e probabilidade
    3. Controle de riscos: medidas de mitigacao
    4. Avaliacao de risco residual: aceitabilidade apos mitigacao
    5. Relatorio de gestao de riscos: consolidacao e revisao
    6. Atividades de producao e pos-producao: monitoramento continuo

    **Riscos especificos de SaMD:**
    - Falso positivo: resultado clinico incorretamente positivo
    - Falso negativo: resultado clinico incorretamente negativo
    - Atraso de resultado: latencia que impacta decisao clinica
    - Indisponibilidade: SaMD nao disponivel quando necessario
    - Corrupcao de dados: dados clinicos corrompidos ou perdidos
    - Ciberataque: comprometimento do SaMD por agente malicioso
    - Vies algoritmico: desempenho desigual entre subpopulacoes
    - Drift de modelo: degradacao de desempenho ao longo do tempo

    **Integracao risco-design:**
    Cada risco identificado deve ser rastreavel a pelo menos um controle
    de design que o mitiga, e cada controle deve ser verificavel por
    teste ou analise documentada.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de gestao de riscos:**
      1. Implementar risk register centralizado e versionado para cada
         SaMD, integrado ao sistema de requisitos e rastreavel para
         controles de design e testes.
      2. Configurar monitoramento de riscos em producao: alertas para
         indicadores de risco (taxa de erros, latencia de resultado,
         falsos positivos/negativos, disponibilidade).
      3. Implementar mecanismo de circuit breaker clinico que desabilita
         funcionalidades do SaMD automaticamente quando indicadores
         de risco ultrapassam limiares predefinidos.
      4. Manter dashboard de risco em tempo real por SaMD, com
         visualizacao de: riscos ativos, controles implementados,
         indicadores de monitoramento e tendencias.
    tools:
      - risk-register
      - monitoring
      - circuit-breaker
      - risk-dashboard
  devsecops:
    prose: |
      **Pipeline de gestao de riscos:**
      1. Integrar analise de risco ao processo de merge request: toda
         funcionalidade nova ou alteracao deve incluir analise de impacto
         no perfil de risco do SaMD (template automatico).
      2. Implementar verificacao automatica de rastreabilidade risco ->
         controle -> teste no pipeline, bloqueando release se houver
         riscos sem controle ou controles sem verificacao.
      3. Automatizar coleta de indicadores de risco do ambiente de
         producao e alimentacao do risk register com dados reais
         (post-market risk monitoring).
      4. Criar gate de pipeline que verifica se avaliacao de risco
         residual esta atualizada e aprovada antes de release.
    tools:
      - gitlab-ci
      - risk-traceability
      - monitoring-integration
      - release-gate
  secops:
    prose: |
      **Governanca de gestao de riscos:**
      1. Manter risk management file (RMF) completo para cada SaMD
         conforme ISO 14971, incluindo: plano de gestao de riscos,
         analise de riscos, avaliacao de riscos, controles, risco
         residual e relatorio de gestao de riscos.
      2. Realizar revisao formal da gestao de riscos em marcos
         predefinidos: pos-design, pre-release, anualmente e apos
         eventos adversos ou queixas tecnicas relevantes.
      3. Implementar processo de escalacao de riscos com criterios
         claros para envolvimento de direcao, RT e comite clinico.
      4. Monitorar dados de pos-mercado (reclamacoes, eventos adversos,
         literatura) para retroalimentar analise de riscos e identificar
         novos perigos ou mudancas de probabilidade/severidade.
    tools:
      - grc-platform
      - risk-management
      - post-market-surveillance
      - escalation-management
