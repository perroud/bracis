id: art-18
family: cap-4
title: "Risco Residual e Relacao Beneficio-Risco"
class: ANVISA-SAMD
baselines: [samd-all]
statement:
  prose: |
    Art. 18. O fabricante deve avaliar e documentar o risco residual
    global do SaMD após implementação de todas as medidas de controle,
    demonstrando que:

    I - cada risco residual individual está dentro dos critérios de
    aceitabilidade definidos na política de gestão de riscos;
    II - o risco residual global do SaMD é aceitável, considerando o
    efeito cumulativo de todos os riscos residuais;
    III - os benefícios clínicos do SaMD superam os riscos residuais
    globais, com justificativa baseada em evidência clínica;
    IV - riscos residuais não aceitáveis que permanecem após controles
    de design e proteção são comunicados ao usuário de forma clara
    e acessível nas instruções de uso e rotulagem.

    Parágrafo único. O fabricante deve revisar a avaliação de risco
    residual quando dados de pós-mercado indicarem que a frequência
    ou severidade de danos difere das estimativas pré-mercado.
guidance:
  prose: |
    O art. 18 trata da fase final do processo de gestao de riscos: a
    avaliacao de risco residual e a decisao de aceitabilidade.

    **Risco residual individual vs. global:**
    - Individual: risco que permanece apos controles para cada perigo
    - Global: efeito cumulativo de todos os riscos residuais do SaMD
    Mesmo que cada risco individual seja aceitavel, o efeito cumulativo
    pode tornar o risco global nao aceitavel.

    **Relacao beneficio-risco:**
    A ANVISA exige que o fabricante demonstre que beneficios clinicos
    superam riscos. Isso exige:
    - Quantificacao de beneficios (sensibilidade, especificidade, tempo
      de diagnostico, melhoria de outcomes)
    - Quantificacao de riscos residuais (probabilidade x severidade)
    - Comparacao com alternativas clinicas (tratamento padrao sem SaMD)
    - Contexto brasileiro (prevalencia, acesso, infraestrutura)

    **Comunicacao de riscos residuais:**
    Para riscos residuais que requerem acao do usuario:
    - Rotulagem: limitacoes claramente declaradas
    - IFU: instrucoes especificas para mitigar riscos residuais
    - Interface: avisos contextuais quando SaMD opera em zona de risco

    **Revisao pos-mercado:**
    Dados reais de uso podem revelar que riscos foram subestimados ou
    superestimados. O fabricante deve manter processo de revisao
    continua da avaliacao de risco residual.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de monitoramento de risco residual:**
      1. Implementar dashboard de risco residual em tempo real que
         consolida metricas de producao (taxa de erros, latencia,
         disponibilidade) e as compara com estimativas pre-mercado.
      2. Configurar alertas automaticos quando indicadores de risco
         em producao divergem significativamente das estimativas do
         risk management file (ex: taxa de falso negativo 2x acima
         do esperado).
      3. Implementar sistema de coleta de feedback clinico integrado
         ao SaMD, permitindo que usuarios reportem discrepancias
         entre resultado do SaMD e realidade clinica.
      4. Manter infraestrutura de analise de dados de pos-mercado
         com capacidade de recalcular metricas de risco residual com
         base em dados reais de uso.
    tools:
      - risk-dashboard
      - monitoring
      - clinical-feedback
      - analytics-platform
  devsecops:
    prose: |
      **Pipeline de avaliacao de risco residual:**
      1. Automatizar calculo de risco residual como parte do pipeline
         de release: agregar resultados de testes, metricas de seguranca,
         metricas clinicas e calcular risco residual atualizado.
      2. Implementar gate de release que verifica se risco residual
         global esta dentro dos criterios de aceitabilidade antes de
         liberar nova versao.
      3. Criar pipeline de revisao periodica de risco residual que
         compara estimativas pre-mercado com dados reais de producao
         e gera relatorio de desvios.
      4. Automatizar geracao de documentacao de risco residual para
         inclusao no dosie tecnico ANVISA (risk management report).
    tools:
      - gitlab-ci
      - risk-calculation
      - release-gate
      - documentation-generator
  secops:
    prose: |
      **Governanca de risco residual:**
      1. Manter Risk Management Report (RMR) completo conforme ISO 14971,
         com avaliacao de risco residual individual, risco residual
         global e analise beneficio-risco.
      2. Implementar processo de revisao de risco residual acionado por:
         (a) dados de pos-mercado, (b) alteracoes de software, (c)
         mudancas no estado da arte clinico, (d) eventos adversos.
      3. Garantir que riscos residuais sao comunicados adequadamente:
         rotulagem atualizada, IFU revisado, avisos na interface do
         SaMD conforme necessidade.
      4. Submeter avaliacao de relacao beneficio-risco como parte do
         dosie tecnico para registro e alteracao de registro ANVISA.
    tools:
      - grc-platform
      - risk-management
      - labeling-management
      - regulatory-submission
