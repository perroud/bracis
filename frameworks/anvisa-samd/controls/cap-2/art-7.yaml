id: art-7
family: cap-2
title: "Engenharia de Usabilidade -- IEC 62366"
class: ANVISA-SAMD
baselines: [samd-all]
statement:
  prose: |
    Art. 7. O fabricante deve aplicar processo de engenharia de
    usabilidade ao SaMD conforme IEC 62366-1, demonstrando que:

    I - a interface do usuário foi projetada para minimizar riscos
    de uso relacionados a erros de usuário previsíveis;
    II - o SaMD pode ser utilizado de forma segura e eficaz pelos
    usuários pretendidos (profissionais de saúde e/ou pacientes)
    no ambiente de uso declarado;
    III - as informações apresentadas ao usuário são claras, não
    ambíguas e adequadas ao nível de conhecimento do usuário pretendido;
    IV - foram realizados testes de usabilidade formativa e somativa
    com usuários representativos do perfil declarado.

    Parágrafo único. Para SaMD destinado a uso direto pelo paciente
    (sem intermediação de profissional de saúde), os requisitos de
    usabilidade devem considerar o público leigo, incluindo acessibilidade
    para pessoas com deficiência.
guidance:
  prose: |
    O art. 7 exige conformidade com IEC 62366-1:2015 (engenharia de
    usabilidade para dispositivos medicos), reconhecendo que erros
    de uso sao fonte primaria de risco em SaMD.

    **Processo de engenharia de usabilidade (IEC 62366-1):**
    1. Especificacao de uso: perfil do usuario, ambiente de uso, interface
    2. Analise de riscos de uso: riscos associados a interface e interacao
    3. Design iterativo: prototipos e avaliacoes formativas
    4. Validacao somativa: teste com usuarios reais em cenarios realistas

    **Usuarios pretendidos:**
    - Profissionais de saude: medicos, enfermeiros, tecnicos
    - Pacientes: uso domiciliar, automonitoramento
    - Hibrido: paciente opera, profissional interpreta

    **Erros de uso previsiveis:**
    - Entrada de dados incorreta (erro de digitacao, unidade errada)
    - Interpretacao errada de resultado (confusao com escala de risco)
    - Omissao de passo critico (nao confirmar identidade do paciente)
    - Uso em condicoes nao previstas (iluminacao inadequada, dispositivo
      nao suportado)

    **Acessibilidade (paragrafo unico):**
    SaMD para pacientes deve seguir WCAG 2.1 nivel AA ou equivalente,
    garantindo uso por pessoas com deficiencia visual, auditiva, motora
    e cognitiva.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de usabilidade e acessibilidade:**
      1. Implementar design system padronizado para SaMD com componentes
         pre-validados para usabilidade clinica (alertas, escalas de
         risco, visualizacao de dados clinicos).
      2. Configurar ambiente de testes de usabilidade com capacidade
         de gravacao de sessao, eye-tracking e analise de clickstream.
      3. Implementar verificacao automatica de acessibilidade WCAG 2.1
         nivel AA em pipeline de build para SaMD de uso pelo paciente.
      4. Manter catalogo de padroes de interface clinica (clinical UI
         patterns) validados por processo de engenharia de usabilidade.
    tools:
      - design-system
      - accessibility-testing
      - usability-lab
      - component-library
  devsecops:
    prose: |
      **Pipeline de verificacao de usabilidade:**
      1. Integrar testes automatizados de acessibilidade (axe-core,
         Lighthouse accessibility) como gate obrigatorio no pipeline
         para SaMD de uso pelo paciente.
      2. Implementar testes de regressao visual automatizados para
         detectar alteracoes nao intencionais na interface clinica.
      3. Criar checklist automatizado de usabilidade derivado da
         IEC 62366 que deve ser completado antes de merge request
         que altera interface do usuario.
      4. Gerar relatorio de conformidade de usabilidade como artefato
         de release, incluindo resultados de testes automatizados
         e referencia a testes manuais com usuarios.
    tools:
      - axe-core
      - lighthouse
      - visual-regression
      - gitlab-ci
  secops:
    prose: |
      **Governanca de engenharia de usabilidade:**
      1. Manter arquivo de engenharia de usabilidade (usability
         engineering file) conforme IEC 62366 para cada SaMD, incluindo
         especificacao de uso, analise de riscos de uso, relatorios
         de testes formativos e somativos.
      2. Implementar programa de testes de usabilidade com usuarios
         reais, com frequencia minima anual e apos alteracoes
         significativas na interface.
      3. Monitorar queixas tecnicas e eventos adversos relacionados
         a erros de uso para retroalimentar o processo de design.
      4. Garantir que rotulagem e instrucoes de uso (IFU) sejam
         revisadas por profissional de comunicacao em saude e validadas
         com usuarios representativos.
    tools:
      - grc-platform
      - usability-testing
      - complaint-management
      - document-management
