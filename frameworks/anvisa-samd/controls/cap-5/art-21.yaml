id: art-21
family: cap-5
title: "Gestao de Atualizacoes e Alteracoes de Registro"
class: ANVISA-SAMD
baselines: [samd-all]
statement:
  prose: |
    Art. 21. O fabricante deve comunicar à ANVISA alterações no SaMD
    registrado conforme classificação regulatória da alteração:

    I - alteração que exige peticionamento de alteração de registro:
    a) mudança de indicação de uso ou finalidade médica;
    b) alteração de algoritmo clínico que impacte saída clínica;
    c) alteração de classe de risco;
    d) mudança de plataforma tecnológica que impacte segurança;
    e) incorporação de funcionalidade de IA/ML não prevista no registro;

    II - alteração que exige notificação à ANVISA:
    a) correção de defeito com impacto em segurança ou eficácia;
    b) alteração de interface que impacte usabilidade clínica;
    c) atualização de dependências com impacto em funcionalidade;

    III - alteração que requer apenas registro interno:
    a) correção de defeito sem impacto clínico;
    b) melhoria de desempenho sem alteração funcional;
    c) atualização de segurança sem impacto em funcionalidade clínica.

    Parágrafo único. O fabricante deve manter registro documentado de
    todas as alterações realizadas no SaMD, independentemente da
    classificação regulatória, com rastreabilidade para análise de
    impacto e aprovação.
guidance:
  prose: |
    O art. 21 define a classificacao regulatoria de alteracoes em SaMD,
    determinando quando o fabricante deve solicitar alteracao de registro,
    notificar a ANVISA ou apenas registrar internamente.

    **Criterio de classificacao:**
    O fator determinante e o impacto da alteracao na seguranca e/ou
    eficacia do SaMD. Alteracoes que potencialmente impactam o perfil
    de risco exigem acao regulatoria.

    **Desafio especifico de SaMD:**
    Software recebe atualizacoes com frequencia muito maior que
    dispositivos medicos de hardware. O fabricante deve ter processo
    eficiente de classificacao para nao criar gargalo regulatorio
    que atrase correcoes de seguranca, mas tambem nao submeter
    alteracoes significativas sem avaliacao adequada.

    **Alteracoes de IA/ML:**
    SaMD com IA/ML que faz retraining ou adaptacao continua de modelo
    e caso especial: cada versao de modelo retreinado pode ser
    considerada alteracao se mudar comportamento clinico. O fabricante
    deve definir envelope de mudanca (predetermined change control plan)
    aprovado no registro.

    **Documentacao de alteracoes:**
    Toda alteracao deve ter:
    - Descricao tecnica da mudanca
    - Analise de impacto em seguranca e eficacia
    - Classificacao regulatoria com justificativa
    - Aprovacao do RT
    - Evidencia de revalidacao proporcional
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao de classificacao regulatoria:**
      1. Implementar sistema de classificacao automatica de alteracoes
         baseado em analise de impacto: componentes clinicos afetados,
         algoritmos modificados, interfaces alteradas, dependencias
         atualizadas.
      2. Configurar pipeline de change impact analysis que analisa
         diff de codigo e sugere classificacao regulatoria (alteracao
         de registro / notificacao / registro interno).
      3. Manter registry de predetermined change control plan para
         SaMD com IA/ML, com envelope de mudanca aprovado e validacao
         automatica de que alteracao esta dentro do envelope.
      4. Implementar dashboard de alteracoes regulatorias pendentes,
         com status de cada alteracao e prazos de submissao a ANVISA.
    tools:
      - change-classification
      - impact-analysis
      - change-control-plan
      - regulatory-dashboard
  devsecops:
    prose: |
      **Pipeline de gestao de alteracoes regulatorias:**
      1. Implementar gate de merge request que exige classificacao
         regulatoria da alteracao antes de merge, com template
         estruturado de analise de impacto.
      2. Automatizar geracao de pacote de documentacao para alteracao
         de registro: delta report, analise de impacto, evidencias de
         revalidacao, SBOM atualizado.
      3. Criar pipeline de validacao de predetermined change control
         plan para SaMD com IA/ML: verificar automaticamente se
         modelo retreinado esta dentro do envelope aprovado.
      4. Implementar rastreabilidade completa: issue -> MR -> commit ->
         change classification -> regulatory action -> ANVISA submission.
    tools:
      - gitlab-ci
      - change-management
      - pccp-validation
      - traceability-tools
  secops:
    prose: |
      **Governanca de alteracoes regulatorias:**
      1. Manter processo formal de classificacao regulatoria com
         formulario padronizado, revisao por RT e aprovacao por
         equipe regulatoria.
      2. Implementar registro auditavel de todas as alteracoes
         realizadas no SaMD, com classificacao, justificativa,
         aprovacao e evidencia de acao regulatoria quando aplicavel.
      3. Realizar auditoria trimestral de classificacao de alteracoes
         para verificar consistencia e adequacao das classificacoes
         realizadas.
      4. Manter processo de comunicacao com ANVISA para submissao de
         alteracoes de registro e notificacoes, com tracking de status
         e prazos.
    tools:
      - change-control-board
      - regulatory-submission
      - audit-management
      - grc-platform
