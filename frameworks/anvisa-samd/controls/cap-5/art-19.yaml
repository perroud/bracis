id: art-19
family: cap-5
title: "Registro e Notificacao junto a ANVISA"
class: ANVISA-SAMD
baselines: [samd-all]
statement:
  prose: |
    Art. 19. O SaMD somente pode ser comercializado ou disponibilizado
    no território brasileiro após obtenção de registro junto à ANVISA,
    conforme procedimentos e requisitos desta Resolução.

    Parágrafo 1. O pedido de registro deve incluir:
    I - identificação do fabricante e do responsável técnico;
    II - descrição do SaMD, incluindo finalidade médica declarada,
    indicação de uso e população alvo;
    III - classificação de risco conforme art. 3 desta Resolução;
    IV - dossiê técnico contendo: arquitetura de software, evidência
    clínica, resultados de verificação e validação, arquivo de gestão
    de riscos e documentação de usabilidade;
    V - instruções de uso e rotulagem;
    VI - declaração de conformidade com requisitos essenciais de
    segurança e eficácia.

    Parágrafo 2. O registro de SaMD tem validade de 10 (dez) anos,
    renovável por períodos iguais mediante revalidação.

    Parágrafo 3. Para SaMD Classe I, é admitido procedimento de cadastro
    simplificado conforme regulamentação específica.
guidance:
  prose: |
    O art. 19 estabelece o registro ANVISA como pre-requisito para
    comercializacao de SaMD no Brasil, definindo o conteudo obrigatorio
    do dosie tecnico.

    **Modalidades de regularizacao:**
    - Classe I: cadastro simplificado (autodeclaracao)
    - Classe II: registro com dosie tecnico reduzido
    - Classe III: registro com dosie tecnico completo
    - Classe IV: registro com dosie tecnico completo + inspecao BPF

    **Dosie tecnico (STED - Summary Technical Documentation):**
    Baseado no modelo IMDRF STED, inclui:
    - Descricao do dispositivo e indicacao de uso
    - Principios de funcionamento e algoritmos
    - Requisitos de hardware e software
    - Arquitetura de software e diagramas
    - Evidencia clinica (analise de desempenho)
    - Resultados de V&V (testes, cobertura, metricas)
    - Arquivo de gestao de riscos (ISO 14971)
    - Arquivo de usabilidade (IEC 62366)
    - Documentacao de seguranca cibernetica
    - SBOM (Software Bill of Materials)
    - Rotulagem e instrucoes de uso

    **Prazos ANVISA:**
    - Cadastro Classe I: ate 60 dias
    - Registro Classe II: ate 120 dias
    - Registro Classe III/IV: ate 365 dias
    - Revalidacao: solicitar ate 12 meses antes do vencimento
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao de dosie tecnico:**
      1. Implementar pipeline de geracao automatica de dosie tecnico
         que compila artefatos de desenvolvimento (arquitetura, SBOM,
         test reports, risk file) em formato STED submissivel a ANVISA.
      2. Configurar sistema de gestao documental regulatorio com
         workflow de revisao, aprovacao e versionamento de documentos
         do dosie tecnico.
      3. Manter repositorio centralizado de templates regulatorios
         (formularios ANVISA, templates STED, checklists) versionados
         e atualizados conforme mudancas regulatorias.
      4. Implementar dashboard de status regulatorio por SaMD:
         registro vigente, data de vencimento, alteracoes pendentes,
         prazos de revalidacao.
    tools:
      - documentation-generator
      - document-management
      - regulatory-dashboard
      - template-repository
  devsecops:
    prose: |
      **Pipeline de preparacao para registro:**
      1. Automatizar coleta e compilacao de artefatos de pipeline
         necessarios para o dosie tecnico: SBOM, test reports,
         coverage reports, security scan results, clinical validation.
      2. Implementar gate de pre-submissao que verifica completude
         do dosie tecnico contra checklist ANVISA antes de release
         de versao candidata a registro.
      3. Gerar automaticamente delta de alteracoes entre versoes
         registradas e versao atual, para suportar pedidos de
         alteracao de registro.
      4. Criar pipeline de revalidacao que gera pacote de evidencias
         atualizado para suportar pedido de revalidacao de registro.
    tools:
      - gitlab-ci
      - sbom-generator
      - completeness-check
      - delta-generator
  secops:
    prose: |
      **Governanca de registro regulatorio:**
      1. Designar equipe de assuntos regulatorios responsavel por
         submissoes ANVISA, com conhecimento especifico de RDC 657
         e processos de registro de SaMD.
      2. Manter calendario regulatorio com datas de vencimento de
         registros, prazos de revalidacao, e marcos de submissao.
      3. Implementar processo de revisao pre-submissao por RT,
         qualidade e regulatorio antes de qualquer submissao a ANVISA.
      4. Manter historico de interacoes com ANVISA (exigencias,
         respostas, aprovacoes, condicionantes) para cada registro.
    tools:
      - regulatory-tracking
      - calendar-management
      - submission-management
      - grc-platform
