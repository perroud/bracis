id: art-20
family: cap-5
title: "Vigilancia Pos-Mercado de SaMD"
class: ANVISA-SAMD
baselines: [samd-all]
statement:
  prose: |
    Art. 20. O fabricante deve implementar e manter sistema de vigilância
    pós-mercado (Post-Market Surveillance - PMS) para cada SaMD
    registrado, incluindo:

    I - coleta proativa e sistemática de dados de desempenho e segurança
    do SaMD em uso clínico real;
    II - monitoramento de eventos adversos, queixas técnicas e desvios
    de qualidade, com investigação e documentação de cada ocorrência;
    III - análise periódica de dados coletados para identificar
    tendências, novos riscos ou degradação de desempenho clínico;
    IV - atualização da análise de riscos e da evidência clínica com
    base em dados de pós-mercado;
    V - comunicação à ANVISA de eventos adversos graves dentro de 72
    horas e de queixas técnicas dentro de 30 dias, conforme regulamentação
    de tecnovigilância vigente;
    VI - elaboração de relatório periódico de segurança (PSUR - Periodic
    Safety Update Report) conforme periodicidade definida pela ANVISA.

    Parágrafo único. Para SaMD Classe III e IV, o fabricante deve
    implementar plano de acompanhamento clínico pós-mercado (PMCF -
    Post-Market Clinical Follow-up) com coleta ativa de dados clínicos.
guidance:
  prose: |
    O art. 20 estabelece o sistema de vigilancia pos-mercado, que e
    a continuacao do ciclo de gestao de riscos apos liberacao do SaMD
    para uso clinico.

    **Componentes do PMS para SaMD:**
    1. Coleta passiva: recebimento de reclamacoes, eventos adversos
    2. Coleta ativa: monitoramento de desempenho, pesquisas com usuarios
    3. Analise: identificacao de tendencias e sinais de risco
    4. Acao: correcao, atualizacao, comunicacao, recall se necessario
    5. Reporte: PSUR, notificacoes ANVISA, comunicacao a usuarios

    **PMCF (Post-Market Clinical Follow-up):**
    Para SaMD Classe III e IV, o PMCF inclui:
    - Coleta prospectiva de dados de desempenho clinico
    - Comparacao com benchmark clinico e dados pre-mercado
    - Identificacao proativa de riscos emergentes
    - Validacao continua de relacao beneficio-risco

    **Tecnovigilancia ANVISA:**
    O fabricante deve utilizar o sistema NOTIVISA para notificacao de:
    - Evento adverso grave: 72 horas (morte, risco de morte, dano
      permanente, hospitalizacao)
    - Queixa tecnica: 30 dias
    - Acao de campo (recall): imediatamente

    **Especificidades de SaMD:**
    Diferente de dispositivos fisicos, SaMD permite monitoramento
    continuo e automatizado de desempenho em producao, tornando
    possivel PMS ativo e em tempo real.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de vigilancia pos-mercado:**
      1. Implementar sistema de monitoramento de desempenho clinico
         em producao com metricas: acuracia, sensibilidade,
         especificidade, tempo de resposta, disponibilidade, taxa
         de erro, feedback do usuario.
      2. Configurar pipeline de coleta e analise de dados de pos-mercado:
         logs de uso, metricas de desempenho, feedback clinico, dados
         de eventos adversos, integrados em data warehouse analitico.
      3. Implementar sistema de deteccao de anomalias que identifica
         automaticamente degradacao de desempenho ou padroes incomuns
         de uso que possam indicar risco emergente.
      4. Provisionar infraestrutura de reporte automatizado: dashboards
         de PMS, geracao de PSUR, alertas de tecnovigilancia, com
         integracao a NOTIVISA.
    tools:
      - monitoring
      - analytics-platform
      - anomaly-detection
      - reporting-system
  devsecops:
    prose: |
      **Pipeline de vigilancia continua:**
      1. Implementar telemetria de desempenho clinico no SaMD (com
         consentimento do usuario conforme LGPD) que alimenta pipeline
         de analise de pos-mercado.
      2. Criar pipeline de analise automatizada de dados de pos-mercado
         que executa periodicamente: calculo de metricas de desempenho,
         deteccao de tendencias, comparacao com baseline pre-mercado.
      3. Automatizar geracao de PSUR com dados coletados pelo pipeline,
         incluindo analise de tendencias e recomendacoes.
      4. Implementar pipeline de resposta rapida que pode gerar e
         deployar patches de seguranca para SaMD em producao dentro
         de 24 horas para riscos criticos.
    tools:
      - telemetry
      - analytics-pipeline
      - psur-generator
      - hotfix-pipeline
  secops:
    prose: |
      **Governanca de vigilancia pos-mercado:**
      1. Manter plano de PMS documentado para cada SaMD, com definicao
         de metricas, frequencia de analise, responsaveis e criterios
         de escalacao.
      2. Implementar processo de tecnovigilancia com fluxo de triagem,
         investigacao, classificacao e notificacao NOTIVISA dentro
         dos prazos legais.
      3. Elaborar PSUR com periodicidade definida pela ANVISA (tipicamente
         anual para Classe II, semestral para Classe III/IV) com
         analise de tendencias e conclusoes sobre relacao beneficio-risco.
      4. Realizar PMCF para SaMD Classe III e IV com protocolo clinico
         aprovado, coleta prospectiva de dados e analise estatistica.
    tools:
      - pms-platform
      - notivisa-integration
      - psur-management
      - pmcf-platform
