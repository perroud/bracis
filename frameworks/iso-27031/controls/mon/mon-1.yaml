id: mon-1
family: mon
title: "Monitoring and measurement of IRBC performance"
class: ISO27031

statement:
  prose: >-
    The organization shall establish and implement procedures for monitoring,
    measuring, and evaluating the performance of its IRBC program. Monitoring
    shall include the availability and performance of critical ICT services,
    the readiness of recovery infrastructure, and the currency of continuity
    plans. Measurement shall track key performance indicators including actual
    vs. target RTO and RPO, backup success rates, and the results of
    continuity exercises.

guidance:
  prose: >-
    Monitoring should be continuous and automated where possible. Key metrics
    to track include service availability percentages, backup completion
    rates, recovery test success rates, mean time to recovery (MTTR) in
    actual incidents and exercises, and the age of continuity plans and
    procedures. Measurement results should be compiled into regular reports
    for management review. Trends should be analyzed to identify improvements
    or degradation in IRBC capability over time.

references:
  - citation: "ISO/IEC 27031:2011, Section 8.2"
    url: "https://www.iso.org/standard/44374.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement comprehensive monitoring of all critical ICT services using
      metrics, logs, and traces. Build IRBC dashboards that display real-time
      service health, recovery infrastructure readiness, backup status, and
      compliance with RTO/RPO targets. Automate the collection of performance
      data and generate periodic reports. Use SLO-based monitoring to track
      service reliability against business requirements.
    tools:
      - prometheus
      - grafana
      - datadog
      - thanos
      - victoria-metrics

  devsecops:
    prose: >-
      Instrument applications with metrics that reflect continuity-relevant
      performance indicators (error rates, latency, availability). Include
      SLO definitions in application manifests and validate compliance in
      CI/CD pipelines. Automate the generation of continuity performance
      reports from monitoring data.
    tools:
      - opentelemetry
      - prometheus
      - gitlab-ci
      - sentry

  secops:
    prose: >-
      Aggregate IRBC performance metrics into executive dashboards for
      management review. Track and report on continuity exercise results,
      incident recovery times, and plan currency. Generate compliance
      reports that demonstrate adherence to IRBC performance criteria.
      Alert when performance metrics indicate degradation in recovery
      capability.
    tools:
      - grafana
      - splunk
      - elastic-siem
      - servicenow

