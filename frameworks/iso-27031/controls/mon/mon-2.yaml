id: mon-2
family: mon
title: "IRBC exercising and testing"
class: ISO27031

statement:
  prose: >-
    The organization shall conduct regular exercises and tests of its ICT
    continuity plans to verify that they are effective and that personnel can
    execute recovery procedures within defined objectives. Exercises shall
    include a range of scenarios from tabletop discussions to full-scale
    recovery simulations. The scope, frequency, and complexity of exercises
    shall be appropriate to the organization's risk profile and IRBC maturity.
    Exercise results shall be documented, reviewed, and used to improve
    plans and procedures.

guidance:
  prose: >-
    A progressive exercise program should be maintained, starting with
    tabletop walkthroughs and progressing through simulation exercises to
    full-scale tests. Each critical ICT service should be tested at least
    annually. Exercises should validate not only technical recovery
    capabilities but also communication procedures, decision-making processes,
    and coordination with external parties. Test scenarios should include
    realistic failure modes such as data center loss, ransomware attack,
    cloud provider outage, and cascading infrastructure failures. Exercise
    reports should document what worked, what failed, and recommended
    improvements.

references:
  - citation: "ISO/IEC 27031:2011, Section 8.3"
    url: "https://www.iso.org/standard/44374.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement chaos engineering practices to continuously test infrastructure
      resilience. Schedule regular disaster recovery drills that exercise
      automated failover and recovery procedures. Use tools like Chaos Mesh or
      Gremlin to inject controlled failures and measure recovery performance.
      Maintain a testing calendar and automate the execution of recovery
      validation tests.
    tools:
      - chaos-mesh
      - gremlin
      - litmus
      - aws-fault-injection-simulator
      - velero

  devsecops:
    prose: >-
      Include resilience testing in the CI/CD pipeline using chaos testing
      frameworks. Automate recovery scenario testing for critical applications
      in staging environments. Maintain a library of failure scenarios that
      are periodically executed as part of the release validation process.
      Document test results alongside application code.
    tools:
      - gitlab-ci
      - chaos-mesh
      - toxiproxy
      - istio
      - k6

  secops:
    prose: >-
      Coordinate and facilitate tabletop exercises for ICT disruption
      scenarios. Document exercise plans, participants, observations, and
      recommendations. Track the implementation of improvement actions
      identified during exercises. Report exercise results to management
      and include them in the IRBC management review.
    tools:
      - servicenow
      - confluence
      - jira
      - pagerduty

