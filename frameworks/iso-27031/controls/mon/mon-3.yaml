id: mon-3
family: mon
title: "Management review of IRBC"
class: ISO27031

statement:
  prose: >-
    Top management shall review the organization's IRBC program at planned
    intervals to ensure its continuing suitability, adequacy, and effectiveness.
    The management review shall consider the results of IRBC exercises and
    tests, actual ICT disruption incidents and their outcomes, changes to the
    organization's business environment and ICT landscape, audit findings,
    and the status of corrective actions. The review shall produce decisions
    and actions related to opportunities for improvement and any need for
    changes to the IRBC program.

guidance:
  prose: >-
    Management reviews should be conducted at least annually, with more
    frequent reviews if significant changes or incidents occur. Review inputs
    should include IRBC performance metrics, exercise results and lessons
    learned, incident reports and post-incident reviews, internal and external
    audit findings, changes in business requirements or risk profile, and
    feedback from stakeholders. Review outputs should include decisions on
    resource allocation, policy updates, strategy changes, and improvement
    priorities. Review records should be maintained as evidence of management
    oversight.

references:
  - citation: "ISO/IEC 27031:2011, Section 8.4"
    url: "https://www.iso.org/standard/44374.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Generate automated reports that aggregate IRBC performance data for
      management review, including service availability metrics, recovery
      test results, infrastructure health trends, and capacity projections.
      Provide self-service dashboards that allow management to explore IRBC
      metrics interactively. Automate the tracking of improvement actions
      assigned during reviews.
    tools:
      - grafana
      - datadog
      - backstage
      - confluence

  devsecops:
    prose: >-
      Produce engineering metrics that contribute to management review inputs,
      including deployment frequency, change failure rate, mean time to
      recovery, and SLO compliance. Track and report on the resolution of
      continuity-related technical debt and improvement items.
    tools:
      - gitlab-ci
      - dora-metrics
      - prometheus
      - grafana

  secops:
    prose: >-
      Prepare management review packages that consolidate IRBC performance
      data, exercise results, incident summaries, audit findings, and
      improvement recommendations. Facilitate management review meetings and
      track action items to completion. Maintain review records as audit
      evidence.
    tools:
      - servicenow
      - confluence
      - jira
      - splunk

