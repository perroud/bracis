id: imp-3
family: imp
title: "ICT service recovery and restoration procedures"
class: ISO27031

statement:
  prose: >-
    The organization shall establish and implement documented procedures for
    the recovery and restoration of ICT services following a disruption. Recovery
    procedures shall address the prioritized sequence of service restoration,
    data recovery and integrity verification, system validation before returning
    to normal operations, and fallback procedures if primary recovery methods
    fail. Restoration procedures shall ensure that recovered services meet
    minimum acceptable service levels and that data integrity is confirmed
    before services are declared operational.

guidance:
  prose: >-
    Recovery procedures should follow a prioritized sequence aligned with the
    business impact analysis, restoring the most critical services first.
    Procedures should include pre-recovery checks (verifying infrastructure
    readiness), recovery execution (restoring systems, data, and connectivity),
    post-recovery validation (verifying service functionality and data
    integrity), and return-to-normal operations (transitioning from recovery
    mode to steady state). Each procedure should have defined success criteria
    and rollback steps in case recovery introduces new issues.

references:
  - citation: "ISO/IEC 27031:2011, Section 7.4"
    url: "https://www.iso.org/standard/44374.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated recovery orchestration using infrastructure-as-code
      and configuration management. Build recovery playbooks that can restore
      infrastructure in a defined sequence with automated validation at each
      step. Use Velero for Kubernetes workload recovery, database-native
      restore tools for data recovery, and DNS failover for traffic management.
      Implement automated smoke tests that verify service health after
      recovery.
    tools:
      - velero
      - terraform
      - ansible
      - rundeck
      - aws-systems-manager
      - argocd

  devsecops:
    prose: >-
      Build applications with automated health verification endpoints that
      confirm functional correctness after recovery. Include data integrity
      validation scripts in the deployment repository. Implement blue-green
      or canary deployment patterns that enable controlled restoration with
      rollback capability. Test recovery procedures in CI/CD pipelines using
      staging environments.
    tools:
      - gitlab-ci
      - helm
      - istio
      - flagger
      - argocd

  secops:
    prose: >-
      Coordinate recovery activities through the incident management system.
      Verify that security controls are intact after recovery, including
      access controls, encryption, and monitoring. Conduct post-recovery
      security assessments to ensure that the recovery process did not
      introduce vulnerabilities. Document recovery timeline and outcomes
      for post-incident review.
    tools:
      - servicenow
      - pagerduty
      - splunk
      - wazuh
      - qualys

