id: imp-1
family: imp
title: "IRBC plans development and documentation"
class: ISO27031

statement:
  prose: >-
    The organization shall develop, document, and maintain ICT continuity plans
    that describe the procedures for responding to, recovering, and restoring
    ICT services following a disruption. Plans shall include activation
    criteria, roles and responsibilities, communication procedures, step-by-step
    recovery procedures, and resource requirements. Plans shall be accessible
    to authorized personnel during a disruption, including when primary ICT
    systems are unavailable.

guidance:
  prose: >-
    ICT continuity plans should be structured, practical, and actionable.
    Each plan should clearly define who has authority to activate it, the
    conditions under which it should be activated, and the escalation
    procedures. Recovery procedures should be documented in sufficient detail
    to be followed by qualified personnel who may not be the primary plan
    owners. Plans should be stored in multiple locations and formats to ensure
    availability during disruptions, including printed copies, offline storage,
    and cloud-based repositories independent of the primary infrastructure.

references:
  - citation: "ISO/IEC 27031:2011, Section 7.2"
    url: "https://www.iso.org/standard/44374.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Maintain ICT continuity runbooks as code in version-controlled
      repositories. Implement automated runbook execution using tools like
      Rundeck or AWS Systems Manager. Store runbooks in multiple locations
      including an out-of-band repository independent of primary
      infrastructure. Use GitOps practices to ensure runbooks are reviewed,
      approved, and versioned. Include automated health checks and validation
      steps in recovery procedures.
    tools:
      - rundeck
      - aws-systems-manager
      - ansible
      - terraform
      - git
      - backstage

  devsecops:
    prose: >-
      Include recovery runbooks as part of the application delivery lifecycle.
      Require that all production services have documented recovery procedures
      in the deployment repository. Validate runbook completeness and accuracy
      as part of the release checklist. Automate recovery procedure testing in
      staging environments.
    tools:
      - gitlab-ci
      - helm
      - ansible
      - markdown-lint

  secops:
    prose: >-
      Ensure ICT continuity plans are integrated with the incident management
      system. Maintain an out-of-band communication plan for use when primary
      channels are unavailable. Conduct regular plan walkthrough exercises with
      recovery teams. Update plans based on lessons learned from incidents and
      exercises.
    tools:
      - pagerduty
      - opsgenie
      - servicenow
      - confluence
      - statuspage

