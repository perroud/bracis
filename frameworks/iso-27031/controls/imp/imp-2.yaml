id: imp-2
family: imp
title: "Incident response and escalation for ICT disruptions"
class: ISO27031

statement:
  prose: >-
    The organization shall establish and implement incident response procedures
    specifically for ICT service disruptions. Procedures shall define how
    incidents are detected, reported, assessed, escalated, and communicated.
    The organization shall establish criteria for classifying the severity of
    ICT disruptions and define escalation paths including the activation of
    ICT continuity plans. Communication procedures shall address internal
    stakeholders, external parties, and regulatory authorities as required.

guidance:
  prose: >-
    Incident response procedures for ICT disruptions should be integrated with
    the organization's overall incident management framework but include
    specific provisions for technology failures. Severity classification should
    consider the number of affected users, the criticality of affected business
    processes, data loss or corruption, and the estimated time to recovery.
    Escalation criteria should clearly define when a disruption transitions from
    a routine incident to a business continuity event requiring plan activation.
    Communication templates should be prepared in advance for different
    scenarios and audiences.

references:
  - citation: "ISO/IEC 27031:2011, Section 7.3"
    url: "https://www.iso.org/standard/44374.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated incident detection and alerting using monitoring
      stacks. Configure severity-based routing and escalation in alerting
      tools. Deploy automated remediation for known failure scenarios using
      self-healing patterns. Implement status pages that automatically reflect
      service health and communicate disruptions to stakeholders.
    tools:
      - pagerduty
      - opsgenie
      - prometheus
      - alertmanager
      - statuspage
      - datadog

  devsecops:
    prose: >-
      Build observability into applications with structured logging, metrics
      emission, and distributed tracing. Implement health check endpoints that
      enable automated detection of service degradation. Include incident
      response documentation in the application repository. Define SLOs and
      error budgets that trigger escalation when breached.
    tools:
      - opentelemetry
      - prometheus
      - gitlab-ci
      - sentry
      - jaeger

  secops:
    prose: >-
      Operate a centralized incident management process with defined roles
      (incident commander, communications lead, technical lead). Maintain
      up-to-date escalation matrices and contact lists. Use SIEM correlation
      to detect ICT disruptions that may indicate security incidents. Document
      all incidents and conduct post-incident reviews.
    tools:
      - splunk
      - elastic-siem
      - pagerduty
      - servicenow
      - jira

