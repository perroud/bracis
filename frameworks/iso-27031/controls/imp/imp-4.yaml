id: imp-4
family: imp
title: "ICT continuity awareness, skills, and training"
class: ISO27031

statement:
  prose: >-
    The organization shall ensure that personnel involved in IRBC activities
    possess the necessary awareness, knowledge, and skills to fulfil their
    roles. The organization shall establish a training and awareness program
    that covers the IRBC policy, roles and responsibilities, recovery
    procedures, and communication protocols. Training shall be conducted
    periodically and when significant changes occur to the IRBC program.
    The effectiveness of training shall be evaluated.

guidance:
  prose: >-
    The awareness and training program should be tailored to different audience
    levels: general awareness for all staff, specialized training for ICT
    continuity team members, and advanced training for plan owners and incident
    commanders. Training should include practical exercises such as tabletop
    scenarios and recovery simulations. New personnel should receive IRBC
    training as part of onboarding. Training records should be maintained,
    and competency assessments should verify that personnel can execute their
    assigned recovery roles.

references:
  - citation: "ISO/IEC 27031:2011, Section 7.5"
    url: "https://www.iso.org/standard/44374.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Conduct regular game day exercises and chaos engineering experiments to
      develop team skills in recovering infrastructure. Document recovery
      procedures as executable runbooks that serve both as training materials
      and operational tools. Implement pair operations and on-call rotations
      that ensure knowledge transfer across the team. Use infrastructure
      sandboxes for hands-on recovery training.
    tools:
      - chaos-mesh
      - gremlin
      - litmus
      - rundeck
      - backstage

  devsecops:
    prose: >-
      Include recovery procedure training in the developer onboarding process.
      Conduct periodic recovery drills in staging environments where developers
      practice deploying from backup, failing over, and validating service
      health. Maintain training documentation alongside application code in
      the repository.
    tools:
      - gitlab-ci
      - confluence
      - markdown-lint

  secops:
    prose: >-
      Conduct tabletop exercises for ICT disruption scenarios at least
      quarterly. Maintain a training calendar and track attendance and
      competency assessments. Include lessons learned from real incidents
      in training materials. Evaluate the effectiveness of training by
      measuring performance in exercises and actual incident response.
    tools:
      - servicenow
      - confluence
      - jira

