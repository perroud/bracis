id: ctx-3
family: ctx
title: "ICT risk assessment for business continuity"
class: ISO27031

statement:
  prose: >-
    The organization shall conduct and document risk assessments to identify
    threats and vulnerabilities that could cause disruption to ICT services
    supporting critical business processes. The risk assessment shall evaluate
    the likelihood and impact of identified risks, taking into account single
    points of failure, capacity constraints, and dependencies on external
    providers. The results shall inform the development of IRBC strategies
    and plans.

guidance:
  prose: >-
    The ICT risk assessment should consider a wide range of threat scenarios
    including natural disasters, cyberattacks, hardware failures, software
    defects, human errors, supply chain disruptions, and utility failures. For
    each critical ICT service, the assessment should identify single points of
    failure and assess the adequacy of existing controls. The assessment should
    be conducted using a structured methodology consistent with ISO 27005 or
    equivalent, and should be updated whenever significant changes occur to the
    ICT environment or threat landscape.

references:
  - citation: "ISO/IEC 27031:2011, Section 5.4"
    url: "https://www.iso.org/standard/44374.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated infrastructure scanning to identify single points of
      failure, misconfigured redundancy, and capacity risks. Use chaos
      engineering practices to validate resilience assumptions. Deploy
      infrastructure-as-code with built-in high-availability patterns and
      automated failover testing. Maintain risk registers as code, linked to
      specific infrastructure components.
    tools:
      - chaos-mesh
      - litmus
      - gremlin
      - terraform
      - aws-resilience-hub

  devsecops:
    prose: >-
      Integrate resilience testing into CI/CD pipelines. Run automated
      dependency analysis to identify single points of failure in application
      architectures. Include failure-mode analysis as part of the design review
      process. Validate that applications implement circuit breakers, retries,
      and graceful degradation patterns.
    tools:
      - gitlab-ci
      - trivy
      - dependency-track
      - istio
      - envoy

  secops:
    prose: >-
      Maintain a risk register that correlates ICT vulnerabilities with business
      impact. Use SIEM data to identify emerging threats and attack patterns
      that could disrupt ICT services. Conduct periodic vulnerability
      assessments and penetration tests focused on continuity-critical systems.
      Report risk assessment findings to management for review.
    tools:
      - splunk
      - qualys
      - tenable
      - rapid7
      - wazuh

