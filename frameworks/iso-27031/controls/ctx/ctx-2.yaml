id: ctx-2
family: ctx
title: "Scope of ICT readiness for business continuity"
class: ISO27031

statement:
  prose: >-
    The organization shall define and document the scope of its ICT readiness
    for business continuity (IRBC) program. The scope shall identify which ICT
    services, systems, and infrastructure components are included, taking into
    account the organization's business continuity requirements, regulatory
    obligations, and contractual commitments. The scope shall be reviewed
    periodically and updated when significant changes occur to the
    organization's business environment or ICT landscape.

guidance:
  prose: >-
    The IRBC scope should be defined based on the results of the business impact
    analysis and risk assessment. It should clearly delineate which ICT services
    are in-scope, including those provided by third parties and cloud service
    providers. The scope document should address geographic boundaries,
    organizational units, and technology domains. Exclusions should be
    explicitly stated and justified. The scope should be communicated to all
    relevant stakeholders and reviewed at least annually.

references:
  - citation: "ISO/IEC 27031:2011, Section 5.3"
    url: "https://www.iso.org/standard/44374.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Define the IRBC scope as a configuration artifact in the infrastructure
      repository. Use resource tagging and labeling to mark all in-scope
      systems. Implement automated inventory scripts that enumerate all ICT
      assets and classify them against the defined scope. Maintain scope
      documentation alongside infrastructure-as-code definitions so that scope
      changes are version-controlled and auditable.
    tools:
      - terraform
      - pulumi
      - backstage
      - aws-config
      - azure-resource-graph

  devsecops:
    prose: >-
      Enforce scope compliance in CI/CD pipelines by validating that all
      deployments to production environments are tagged with IRBC scope
      metadata. Reject deployments that introduce new services without scope
      classification. Use policy-as-code to ensure that in-scope services meet
      minimum continuity requirements before deployment.
    tools:
      - gitlab-ci
      - open-policy-agent
      - kyverno
      - checkov

  secops:
    prose: >-
      Monitor for changes to the ICT landscape that may affect the IRBC scope,
      such as new services, decommissioned systems, or changes in third-party
      providers. Generate alerts when unclassified assets are detected in
      production. Conduct quarterly reviews of the scope against the current
      asset inventory.
    tools:
      - servicenow
      - qualys
      - tenable
      - splunk

