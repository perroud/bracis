id: ctx-1
family: ctx
title: "Understanding the organization and its requirements"
class: ISO27031

statement:
  prose: >-
    The organization shall identify and document its ICT services and the
    infrastructure that supports them. The organization shall understand the
    role of ICT in supporting critical business processes and identify the
    dependencies between business processes and ICT services. This includes
    determining the impact of ICT service disruptions on the organization's
    ability to deliver products and services, and establishing ICT continuity
    requirements based on the results of a business impact analysis (BIA).

guidance:
  prose: >-
    The organization should conduct a systematic assessment of all ICT services
    that underpin critical business operations. This includes mapping each
    business process to the ICT services it depends on, documenting dependencies
    between ICT components (networks, servers, applications, data stores), and
    quantifying the impact of ICT disruptions in terms of financial loss,
    reputational damage, regulatory penalties, and operational impairment. The
    BIA should establish recovery time objectives (RTO) and recovery point
    objectives (RPO) for each critical ICT service.

references:
  - citation: "ISO/IEC 27031:2011, Section 5.2"
    url: "https://www.iso.org/standard/44374.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build and maintain a service dependency map using infrastructure-as-code
      and service catalogs. Use tools like Backstage or ServiceNow to document
      all ICT services, their interdependencies, and the business processes they
      support. Implement automated discovery of infrastructure components and
      their relationships. Tag all resources with business-criticality labels
      and RTO/RPO metadata. Maintain topology diagrams as code in version
      control.
    tools:
      - backstage
      - servicenow
      - terraform
      - pulumi
      - cloudquery

  devsecops:
    prose: >-
      Integrate service dependency tracking into CI/CD pipelines. Require that
      all deployed applications declare their upstream and downstream
      dependencies in metadata files. Enforce labeling standards for
      business-criticality and recovery objectives as part of deployment
      validation. Use distributed tracing to automatically discover runtime
      dependencies.
    tools:
      - gitlab-ci
      - opentelemetry
      - jaeger
      - zipkin
      - helm

  secops:
    prose: >-
      Maintain a real-time CMDB (configuration management database) that
      reflects current ICT service topology. Correlate monitoring alerts with
      business impact assessments to prioritize incident response based on
      criticality. Conduct periodic reviews to validate that documented
      dependencies remain accurate and that RTO/RPO targets are achievable.
    tools:
      - servicenow
      - splunk
      - datadog
      - pagerduty

