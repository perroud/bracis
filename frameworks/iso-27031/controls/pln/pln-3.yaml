id: pln-3
family: pln
title: "Performance criteria and metrics for IRBC"
class: ISO27031

statement:
  prose: >-
    The organization shall establish measurable performance criteria for
    evaluating the effectiveness of its IRBC program. Criteria shall include
    recovery time objectives (RTO), recovery point objectives (RPO), maximum
    tolerable period of disruption (MTPD), and minimum business continuity
    objectives (MBCO) for each critical ICT service. These criteria shall be
    derived from the business impact analysis and approved by management.

guidance:
  prose: >-
    Performance criteria should be specific, measurable, and aligned with
    business requirements. RTO defines the maximum acceptable time to restore
    an ICT service after a disruption. RPO defines the maximum acceptable data
    loss measured in time. MTPD defines the maximum time the organization can
    survive without the ICT service. MBCO defines the minimum level of service
    that must be provided during recovery. These criteria should be documented
    for each critical ICT service and used as the basis for strategy selection,
    testing, and performance measurement.

references:
  - citation: "ISO/IEC 27031:2011, Section 6.4"
    url: "https://www.iso.org/standard/44374.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Encode RTO, RPO, MTPD, and MBCO as metadata on infrastructure resources
      using tags and annotations. Implement automated monitoring that measures
      actual recovery capabilities against defined objectives. Use synthetic
      failover testing to validate that recovery times meet targets. Build
      dashboards that display real-time compliance with performance criteria.
    tools:
      - datadog
      - prometheus
      - grafana
      - terraform
      - aws-resilience-hub

  devsecops:
    prose: >-
      Include recovery performance criteria in application deployment manifests.
      Validate during CI/CD that backup schedules meet RPO requirements and
      that recovery automation can achieve RTO targets. Implement automated
      recovery testing that measures and reports actual recovery times.
    tools:
      - gitlab-ci
      - velero
      - helm
      - kubernetes

  secops:
    prose: >-
      Track and report on actual vs. target recovery metrics. Generate
      compliance reports showing adherence to RTO, RPO, MTPD, and MBCO for
      each critical service. Alert when monitoring indicates that recovery
      capabilities may not meet defined objectives. Present metrics in
      management review reports.
    tools:
      - grafana
      - splunk
      - servicenow
      - elastic-siem

