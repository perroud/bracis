id: pln-2
family: pln
title: "Resource requirements for IRBC"
class: ISO27031

statement:
  prose: >-
    The organization shall identify and allocate the resources required to
    implement and maintain the IRBC program. Resources shall include personnel
    with appropriate skills and competencies, technology infrastructure for
    recovery, financial budget for continuity measures, and external service
    agreements. The adequacy of resources shall be reviewed periodically to
    ensure they remain sufficient to meet recovery objectives.

guidance:
  prose: >-
    Resource planning should cover human resources (including training and
    succession planning for key ICT roles), technical resources (hardware,
    software, network capacity, and recovery infrastructure), and contractual
    resources (service-level agreements with vendors, cloud providers, and
    recovery service providers). The organization should maintain a skills
    matrix for ICT continuity roles and ensure that no single individual
    represents a single point of failure. Budget allocations should account
    for periodic testing, maintenance, and updating of recovery capabilities.

references:
  - citation: "ISO/IEC 27031:2011, Section 6.3"
    url: "https://www.iso.org/standard/44374.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Provision and maintain dedicated recovery infrastructure using
      infrastructure-as-code. Implement cost tagging and budget tracking for
      all continuity-related resources. Automate capacity planning with
      monitoring tools that project resource utilization trends. Maintain
      spare capacity or burst capabilities in cloud environments to accommodate
      recovery workloads.
    tools:
      - terraform
      - pulumi
      - kubecost
      - infracost
      - cloudhealth

  devsecops:
    prose: >-
      Document resource requirements in project manifests and deployment
      specifications. Implement resource quotas and limits in container
      orchestration platforms to ensure recovery workloads have guaranteed
      resources. Include resource validation checks in CI/CD pipelines to
      prevent deployments that would exceed recovery capacity.
    tools:
      - kubernetes
      - helm
      - gitlab-ci
      - kyverno

  secops:
    prose: >-
      Monitor resource utilization across continuity infrastructure and alert
      when capacity thresholds are approached. Track vendor SLA compliance for
      recovery services. Maintain an up-to-date inventory of recovery resources
      including contact information for key personnel and vendor escalation
      paths.
    tools:
      - datadog
      - prometheus
      - grafana
      - servicenow
      - pagerduty

