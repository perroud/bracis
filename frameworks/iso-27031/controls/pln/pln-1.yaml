id: pln-1
family: pln
title: "IRBC strategy development"
class: ISO27031

statement:
  prose: >-
    The organization shall develop and document ICT readiness for business
    continuity strategies that address the recovery of ICT services within
    the timeframes established by the business impact analysis. Strategies
    shall consider options for maintaining, resuming, and recovering ICT
    services, including the use of alternative sites, redundant systems,
    cloud-based recovery, and manual workarounds. The selected strategies
    shall be approved by management and aligned with the overall business
    continuity strategy.

guidance:
  prose: >-
    IRBC strategies should be developed for each critical ICT service and should
    address both preventive measures (to reduce the likelihood and impact of
    disruptions) and recovery measures (to restore services after a disruption).
    Strategy options may include hot, warm, or cold standby sites; active-active
    or active-passive clustering; cloud-based disaster recovery; data
    replication; and service-level agreements with third-party recovery
    providers. The cost-effectiveness of each option should be evaluated against
    the RTO and RPO requirements. Strategies should also address the recovery
    of supporting infrastructure including networks, storage, and security
    systems.

references:
  - citation: "ISO/IEC 27031:2011, Section 6.2"
    url: "https://www.iso.org/standard/44374.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Design infrastructure with built-in resilience patterns including
      multi-region deployment, automated failover, and infrastructure
      replication. Implement disaster recovery as code, with automated
      provisioning of recovery environments. Use Terraform or Pulumi modules
      that encode recovery strategies as reusable templates. Maintain
      active-passive or active-active configurations for critical services
      with automated health checks and failover triggers.
    tools:
      - terraform
      - pulumi
      - crossplane
      - aws-cloudformation
      - velero
      - argocd

  devsecops:
    prose: >-
      Build applications with resilience patterns including circuit breakers,
      bulkheads, and graceful degradation. Include disaster recovery runbooks
      as part of the deployment documentation. Automate the provisioning and
      validation of recovery environments in CI/CD pipelines. Test recovery
      procedures as part of the release process.
    tools:
      - gitlab-ci
      - helm
      - kustomize
      - istio
      - velero

  secops:
    prose: >-
      Document and maintain recovery strategies in the incident management
      system. Ensure that recovery procedures are accessible during disruptions
      (not solely dependent on the systems being recovered). Monitor the
      readiness of recovery infrastructure and alert on degradation. Conduct
      tabletop exercises to validate strategy effectiveness.
    tools:
      - pagerduty
      - opsgenie
      - servicenow
      - confluence

