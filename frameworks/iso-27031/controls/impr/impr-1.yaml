id: impr-1
family: impr
title: "Corrective actions for IRBC nonconformities"
class: ISO27031

statement:
  prose: >-
    The organization shall identify and address nonconformities in its IRBC
    program through corrective actions. When a nonconformity is identified
    through exercises, tests, audits, incidents, or management review, the
    organization shall react to the nonconformity, evaluate the need for
    action to eliminate the causes, implement corrective actions, review the
    effectiveness of corrective actions taken, and make changes to the IRBC
    program if necessary. Records of nonconformities and corrective actions
    shall be maintained.

guidance:
  prose: >-
    Nonconformities may be identified from multiple sources including failed
    recovery tests, actual incident responses that did not meet objectives,
    audit findings, management review decisions, and stakeholder feedback. For
    each nonconformity, the organization should perform root cause analysis to
    determine the underlying causes, define corrective actions that address
    the root causes (not just symptoms), assign responsibility and timelines
    for implementation, and verify that corrective actions are effective. A
    corrective action tracking system should be maintained to ensure that
    identified issues are resolved in a timely manner.

references:
  - citation: "ISO/IEC 27031:2011, Section 9.2"
    url: "https://www.iso.org/standard/44374.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement blameless post-incident review processes that identify
      infrastructure improvements. Track corrective actions as engineering
      work items with defined acceptance criteria. Automate the validation
      of corrective actions through infrastructure tests and monitoring
      improvements. Use infrastructure-as-code to implement corrective
      changes with full audit trail.
    tools:
      - jira
      - gitlab-issues
      - terraform
      - ansible
      - prometheus

  devsecops:
    prose: >-
      Integrate corrective action tracking into the development workflow.
      Create engineering tickets for IRBC-related improvements and track them
      through the standard development lifecycle. Implement automated tests
      that verify corrective actions are effective and prevent regression.
      Include corrective action status in CI/CD pipeline reporting.
    tools:
      - gitlab-ci
      - gitlab-issues
      - jira
      - sonarqube

  secops:
    prose: >-
      Maintain a corrective action register that tracks all IRBC
      nonconformities from identification through resolution. Conduct root
      cause analysis for all significant incidents and exercise failures.
      Monitor corrective action implementation timelines and escalate
      overdue items. Report corrective action status in management reviews.
    tools:
      - servicenow
      - jira
      - confluence
      - splunk

