id: impr-2
family: impr
title: "Continual improvement of IRBC"
class: ISO27031

statement:
  prose: >-
    The organization shall continually improve the suitability, adequacy, and
    effectiveness of its IRBC program. Continual improvement shall be driven
    by the analysis of monitoring data, exercise results, incident lessons
    learned, audit findings, management review outcomes, technological
    developments, and changes in the organization's business environment and
    risk profile. The organization shall identify opportunities for improvement
    and implement changes to enhance ICT continuity capability.

guidance:
  prose: >-
    Continual improvement should be systematic and evidence-based. The
    organization should use the Plan-Do-Check-Act (PDCA) cycle to drive
    improvement of the IRBC program. Improvement opportunities may include
    adopting new technologies that enhance recovery capabilities, optimizing
    recovery procedures to reduce recovery times, expanding the scope of
    continuity coverage, enhancing automation to reduce human error, and
    improving integration between ICT continuity and business continuity
    programs. Improvement initiatives should be prioritized based on their
    potential impact on recovery capability and cost-effectiveness.

references:
  - citation: "ISO/IEC 27031:2011, Section 9.3"
    url: "https://www.iso.org/standard/44374.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Continuously evolve infrastructure resilience by adopting new patterns
      and technologies. Track reliability metrics over time and set improvement
      targets. Implement progressive automation of recovery procedures to
      reduce manual steps and recovery times. Conduct regular architecture
      reviews to identify opportunities for improved redundancy and fault
      tolerance. Benchmark recovery capabilities against industry standards.
    tools:
      - backstage
      - terraform
      - grafana
      - prometheus
      - argocd

  devsecops:
    prose: >-
      Track and improve DORA metrics (deployment frequency, lead time for
      changes, change failure rate, mean time to recovery) as indicators of
      continuity capability. Continuously refine CI/CD pipelines to improve
      deployment reliability and recovery speed. Implement feature flags and
      progressive delivery to reduce the blast radius of failures.
    tools:
      - gitlab-ci
      - dora-metrics
      - flagger
      - argocd
      - launchdarkly

  secops:
    prose: >-
      Analyze trends in incident data, exercise results, and monitoring
      metrics to identify systemic improvement opportunities. Maintain an
      improvement backlog prioritized by impact on recovery capability.
      Report improvement progress to management and stakeholders. Benchmark
      IRBC maturity against industry frameworks and peer organizations.
    tools:
      - servicenow
      - jira
      - confluence
      - grafana
      - splunk

