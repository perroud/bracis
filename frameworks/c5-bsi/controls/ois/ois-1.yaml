id: ois-1
family: ois
title: "Information Security Management System"
class: C5BSI
baselines: [c5-basic]

statement:
  prose: >-
    The cloud provider shall establish, implement, maintain, and continually
    improve an information security management system (ISMS) that includes
    the processes and documentation needed to fulfil the security requirements.
    The scope of the ISMS shall cover all cloud services offered and the
    supporting infrastructure, organisation, and locations. The ISMS shall
    be based on a risk assessment methodology appropriate to the cloud
    provider's context and shall define criteria for risk acceptance and
    the acceptable levels of risk.

guidance:
  prose: >-
    This control requires the cloud service provider to have a formal ISMS
    in place that is scoped to cover all cloud service offerings. The ISMS
    should follow a recognized standard such as ISO/IEC 27001 and include
    a systematic approach to managing sensitive information so that it
    remains secure. The risk assessment methodology must be documented and
    consistently applied, with clear thresholds for risk acceptance. The
    ISMS should be subject to regular management review and continuous
    improvement cycles (Plan-Do-Check-Act).

references:
  - citation: "C5:2020, OIS-01"
    url: "https://www.bsi.bund.de/EN/Themen/Unternehmen-und-Organisationen/Informationen-und-Empfehlungen/Empfehlungen-nach-Angriffszielen/Cloud-Computing/Kriterienkatalog-C5/kriterienkatalog-c5_node.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Codify ISMS policies as machine-readable policy-as-code artifacts stored in
      version-controlled repositories. Use OPA/Rego or Kyverno to enforce
      baseline security policies across all cloud infrastructure provisioning.
      Maintain a central policy repository serving as the single source of truth
      for the ISMS scope, with automated distribution to all platform components.
      Implement GitOps workflows where ISMS policy changes require pull request
      review and approval before deployment. Track risk acceptance decisions as
      code-reviewed records in the repository.
    tools:
      - open-policy-agent
      - kyverno
      - hashicorp-sentinel
      - git
      - backstage
      - terraform

  devsecops:
    prose: >-
      Integrate ISMS policy validation into CI/CD pipelines so that deployments
      are blocked when they violate established security policies. Enforce
      infrastructure-as-code scanning to verify that provisioned resources align
      with the ISMS scope and risk acceptance criteria. Store ISMS documentation
      alongside application code with versioning to maintain an auditable trail
      of changes. Implement automated compliance checks that map pipeline
      activities to ISMS controls.
    tools:
      - gitlab-ci
      - checkov
      - tfsec
      - trivy
      - semgrep

  secops:
    prose: >-
      Map ISMS controls to detection rules and compliance dashboards in the SIEM.
      Create alerts for deviations from the defined ISMS scope or risk acceptance
      thresholds. Maintain a real-time compliance dashboard showing adherence
      status across all cloud services within the ISMS scope. Schedule periodic
      automated audits comparing actual system configurations against the
      documented ISMS policies and generate exception reports for management
      review.
    tools:
      - splunk
      - elastic-siem
      - wazuh
      - microsoft-sentinel

legal_references:
