id: sp-1
family: sp
title: "Information Security Policy"
class: C5BSI
baselines: [c5-basic]

statement:
  prose: >-
    The cloud provider shall define and document an information security
    policy. This policy shall be approved by management, published, and
    communicated to all employees and relevant external parties. The
    policy shall contain, among others, the objectives and scope of
    information security, the commitment of management to information
    security, and the framework for setting information security
    objectives. The policy shall be reviewed at planned intervals or
    when significant changes occur.

guidance:
  prose: >-
    The information security policy is the top-level document that sets
    the direction for the entire security programme. It must clearly
    articulate management's commitment to information security, define
    the scope (covering all cloud services), and establish the basis
    for setting security objectives. The policy should be accessible
    to all employees and contractors, and its review cycle must be
    defined (typically annual or upon significant organizational or
    technical changes).

references:
  - citation: "C5:2020, SP-01"
    url: "https://www.bsi.bund.de/EN/Themen/Unternehmen-und-Organisationen/Informationen-und-Empfehlungen/Empfehlungen-nach-Angriffszielen/Cloud-Computing/Kriterienkatalog-C5/kriterienkatalog-c5_node.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Store the information security policy as a versioned document in a
      central repository accessible to all teams. Use GitOps workflows to
      manage policy updates with full audit trails. Implement automated
      policy distribution through internal developer portals (e.g.,
      Backstage) so that all teams have access to the current version.
      Enforce policy acknowledgment through automated onboarding workflows.
    tools:
      - git
      - backstage
      - confluence
      - terraform

  devsecops:
    prose: >-
      Translate policy requirements into enforceable pipeline checks. For
      each policy statement, create corresponding CI/CD validation rules
      that verify compliance during build and deployment. Ensure policy
      documents are version-controlled with the same rigor as source code,
      with change history and approval records maintained in the repository.
    tools:
      - gitlab-ci
      - open-policy-agent
      - checkov

  secops:
    prose: >-
      Map security policy requirements to monitoring rules and compliance
      dashboards. Track policy review cycles and send automated reminders
      when reviews are due. Monitor for policy violations across the
      environment and generate reports for management review. Maintain
      evidence of policy communication and acknowledgment for audit
      purposes.
    tools:
      - splunk
      - elastic-siem
      - servicenow

