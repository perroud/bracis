id: sp-2
family: sp
title: "Review of Security Policies"
class: C5BSI
baselines: [c5-basic]

statement:
  prose: >-
    The cloud provider shall review the information security policies at
    planned intervals or if significant changes occur in order to ensure
    their continuing suitability, adequacy, and effectiveness. The
    results of the reviews, including decisions and actions, shall be
    documented. Changes to policies shall be communicated to all
    affected employees and relevant external parties.

guidance:
  prose: >-
    Regular policy reviews ensure that security policies remain aligned
    with the evolving threat landscape, business requirements, and
    regulatory obligations. Significant changes that trigger a review
    include organizational restructuring, new cloud service offerings,
    major security incidents, or changes in applicable legislation.
    The review process should involve relevant stakeholders and result
    in documented decisions about necessary updates.

references:
  - citation: "C5:2020, SP-02"
    url: "https://www.bsi.bund.de/EN/Themen/Unternehmen-und-Organisationen/Informationen-und-Empfehlungen/Empfehlungen-nach-Angriffszielen/Cloud-Computing/Kriterienkatalog-C5/kriterienkatalog-c5_node.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated policy review reminders using ticketing systems
      integrated with the policy repository. Track policy document age
      and trigger review workflows when the planned review interval
      expires. Use merge request workflows to document review decisions
      and maintain a complete audit trail of all policy changes. Automate
      notifications to affected teams when policies are updated.
    tools:
      - git
      - gitlab
      - jira
      - backstage

  devsecops:
    prose: >-
      Integrate policy version tracking into the CI/CD pipeline metadata
      so that deployed services can be correlated with the policy version
      in effect at deployment time. Use automated scanning to detect
      when pipeline configurations no longer align with updated policies
      and flag them for remediation. Maintain policy change logs as
      part of the release documentation.
    tools:
      - gitlab-ci
      - open-policy-agent
      - checkov

  secops:
    prose: >-
      Create dashboards that track policy review status, overdue reviews,
      and policy change history. Implement automated alerting when
      planned review intervals are exceeded. Correlate security incidents
      with policy gaps identified during reviews to demonstrate the
      effectiveness of the review process. Archive review records for
      audit evidence.
    tools:
      - splunk
      - servicenow
      - elastic-siem

