id: am-2
family: am
title: "Classification of Information"
class: C5BSI
baselines: [c5-basic]

statement:
  prose: >-
    Information shall be classified in terms of legal requirements,
    value, criticality, and sensitivity to unauthorised disclosure or
    modification. The classification scheme shall include a set of
    rules for handling and labelling of information in accordance with
    the classification scheme adopted by the cloud provider. The cloud
    provider shall ensure that cloud customer data is classified and
    handled in accordance with agreed security requirements.

guidance:
  prose: >-
    Information classification is a prerequisite for applying appropriate
    protection measures. Cloud providers must establish a classification
    scheme that addresses both their own corporate data and the data
    they process on behalf of customers. The classification scheme
    must define labelling requirements, handling procedures for each
    classification level (storage, transmission, retention, disposal),
    and the mapping to technical controls. Customer data classification
    must be agreed upon in the service contract.

references:
  - citation: "C5:2020, AM-02"
    url: "https://www.bsi.bund.de/EN/Themen/Unternehmen-und-Organisationen/Informationen-und-Empfehlungen/Empfehlungen-nach-Angriffszielen/Cloud-Computing/Kriterienkatalog-C5/kriterienkatalog-c5_node.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement data classification labels as metadata tags on all storage
      resources (databases, object stores, file systems). Use admission
      controllers and policy engines to enforce that all new data stores
      are tagged with a classification level. Deploy data loss prevention
      (DLP) tools that enforce handling rules based on classification
      labels. Implement automated data discovery and classification
      tools to identify and label sensitive data across the platform.
    tools:
      - aws-macie
      - azure-purview
      - open-policy-agent
      - kyverno
      - terraform

  devsecops:
    prose: >-
      Integrate data classification checks into CI/CD pipelines to ensure
      that application configurations correctly reference classified data
      stores and apply appropriate protection measures. Scan code
      repositories for hardcoded sensitive data that should be classified
      and protected. Enforce encryption requirements for data stores
      classified above a defined threshold.
    tools:
      - gitlab-ci
      - checkov
      - trivy
      - gitleaks
      - semgrep

  secops:
    prose: >-
      Monitor data access patterns against classification levels to detect
      anomalous access to highly classified data. Generate compliance
      reports showing classification coverage across all data stores.
      Alert on data stores that lack classification labels or have
      mismatched protection measures relative to their classification.
    tools:
      - splunk
      - elastic-siem
      - aws-macie
      - microsoft-sentinel

legal_references:
  - framework_id: iso-27001-2022
    articles: ["a5.12", "a5.13"]
    relationship: equivalent-to
  - framework_id: nist-800-53
    articles: ["RA-2", "SC-16"]
    relationship: mapped
  - framework_id: csa-ccm-v4
    articles: ["DSP-01", "DSP-04"]
    relationship: mapped
