id: ps-2
family: ps
title: "Protection Against Environmental Threats"
class: C5BSI
baselines: [c5-basic]

statement:
  prose: >-
    The cloud provider shall design and apply physical protection against
    natural disasters, malicious attacks, or accidents. Facilities shall
    be designed and equipped with measures to protect against fire,
    flooding, earthquake, explosion, civil unrest, and other forms of
    natural or man-made disaster. The cloud provider shall implement
    environmental monitoring to detect conditions that could affect
    the availability of cloud services.

guidance:
  prose: >-
    Environmental protection for data centres encompasses both prevention
    and detection measures. Prevention includes fire suppression systems,
    flood barriers, seismic reinforcement, and redundant power and cooling.
    Detection includes environmental sensors for temperature, humidity,
    water ingress, smoke, and power anomalies. The cloud provider should
    consider geographic risks when selecting data centre locations and
    implement redundancy across geographically diverse sites to mitigate
    regional environmental risks.

references:
  - citation: "C5:2020, PS-02"
    url: "https://www.bsi.bund.de/EN/Themen/Unternehmen-und-Organisationen/Informationen-und-Empfehlungen/Empfehlungen-nach-Angriffszielen/Cloud-Computing/Kriterienkatalog-C5/kriterienkatalog-c5_node.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Design multi-region and multi-availability-zone architectures that
      provide resilience against environmental threats affecting a single
      location. Implement automated failover mechanisms that redirect
      workloads to unaffected regions when environmental conditions
      degrade. Use infrastructure-as-code to define and enforce geographic
      distribution requirements for critical services. Monitor cloud
      provider status pages and integrate them into platform health
      dashboards.
    tools:
      - terraform
      - kubernetes
      - aws-route53
      - azure-traffic-manager
      - backstage

  devsecops:
    prose: >-
      Enforce multi-region deployment configurations in CI/CD pipelines
      for services classified as critical. Validate that disaster recovery
      configurations are deployed alongside primary infrastructure. Include
      environmental resilience testing (chaos engineering) in the release
      process to verify that applications can survive region-level failures.
    tools:
      - gitlab-ci
      - terraform
      - chaos-mesh
      - litmus

  secops:
    prose: >-
      Integrate environmental sensor data from data centres into the
      central monitoring platform. Create alerting rules for environmental
      threshold breaches (temperature, humidity, power anomalies). Monitor
      cloud provider incident communications and correlate them with
      service availability metrics. Conduct periodic reviews of
      environmental risk assessments.
    tools:
      - splunk
      - datadog
      - pagerduty
      - elastic-siem

