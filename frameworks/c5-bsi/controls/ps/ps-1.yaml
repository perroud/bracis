id: ps-1
family: ps
title: "Physical Security Perimeter"
class: C5BSI
baselines: [c5-basic]

statement:
  prose: >-
    The cloud provider shall define security perimeters to protect areas
    that contain information processing facilities used to provide the
    cloud services. The physical security perimeters shall be designed
    and applied taking into account the security requirements of the
    assets within the perimeter. Physical access to data centres shall
    be restricted to authorised personnel only. Physical barriers shall
    be in place to prevent unauthorised physical access, and entry
    controls shall be implemented at all access points.

guidance:
  prose: >-
    Data centre physical security is critical for cloud providers because
    a physical breach can compromise the confidentiality, integrity, and
    availability of all hosted customer data simultaneously. Security
    perimeters should include multiple layers (fences, walls, locked
    doors, mantrap entries) with increasing restriction levels as one
    approaches the most sensitive areas (server rooms, network
    infrastructure rooms). Access control mechanisms must include
    authentication (badge, biometric) and logging of all entries and
    exits.

references:
  - citation: "C5:2020, PS-01"
    url: "https://www.bsi.bund.de/EN/Themen/Unternehmen-und-Organisationen/Informationen-und-Empfehlungen/Empfehlungen-nach-Angriffszielen/Cloud-Computing/Kriterienkatalog-C5/kriterienkatalog-c5_node.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      When selecting cloud infrastructure providers (IaaS), verify that
      their data centres meet the physical security perimeter requirements
      of C5. Document the physical security controls provided by the
      infrastructure provider as part of the shared responsibility model.
      For co-located or owned facilities, implement physical access
      control systems integrated with the identity management platform
      to ensure consistent access governance across logical and physical
      boundaries.
    tools:
      - aws-artifact
      - azure-compliance-manager
      - gcp-compliance-reports
      - access-control-systems

  devsecops:
    prose: >-
      Include physical security validation in the cloud provider selection
      checklist within the deployment pipeline. When provisioning
      infrastructure-as-code, enforce region and zone constraints that
      align with physical security requirements (e.g., only deploy to
      data centres with C5 attestation). Document physical security
      dependencies in deployment runbooks.
    tools:
      - terraform
      - checkov
      - gitlab-ci

  secops:
    prose: >-
      Integrate physical access control logs with the SIEM for unified
      monitoring of both physical and logical access events. Correlate
      physical access events with logical access events to detect
      anomalies (e.g., VPN login from one country while badge access
      is in another). Review physical access logs periodically and
      investigate unauthorized access attempts.
    tools:
      - splunk
      - elastic-siem
      - physical-access-control

