id: hr-2
family: hr
title: "Security Awareness and Training"
class: C5BSI
baselines: [c5-basic]

statement:
  prose: >-
    The cloud provider shall ensure that all employees and, where relevant,
    contractors receive appropriate awareness education and training, and
    regular updates on the organisation's policies and procedures, as
    relevant for their job function. The awareness and training programme
    shall cover the security risks associated with cloud services, the
    employees' responsibilities and obligations, and the consequences
    of violating security policies.

guidance:
  prose: >-
    Cloud-specific security awareness training must go beyond generic
    corporate security training. It should address the shared responsibility
    model, data isolation in multi-tenant environments, secure handling of
    customer data, incident reporting procedures, and the specific threats
    facing cloud infrastructure. Training frequency should be at least
    annual, with role-specific modules for administrators, developers,
    and operations staff. Effectiveness of training should be measured
    and documented.

references:
  - citation: "C5:2020, HR-02"
    url: "https://www.bsi.bund.de/EN/Themen/Unternehmen-und-Organisationen/Informationen-und-Empfehlungen/Empfehlungen-nach-Angriffszielen/Cloud-Computing/Kriterienkatalog-C5/kriterienkatalog-c5_node.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate security training completion status into the platform's
      access governance system so that access to sensitive resources requires
      up-to-date training records. Build automated onboarding pipelines
      that include mandatory security training modules before granting
      platform access. Use internal developer portals to surface security
      guidelines and best practices contextually when developers interact
      with sensitive services.
    tools:
      - backstage
      - okta
      - confluence
      - learning-management-system

  devsecops:
    prose: >-
      Embed security training references into CI/CD pipeline feedback.
      When a security scan identifies a common vulnerability pattern,
      include links to relevant training materials in the pipeline output.
      Require security training completion as a prerequisite for obtaining
      elevated pipeline permissions (e.g., production deployment rights).
    tools:
      - gitlab-ci
      - semgrep
      - sonarqube

  secops:
    prose: >-
      Track training completion metrics and correlate them with security
      incident data to measure training effectiveness. Generate compliance
      reports showing training coverage by role and department. Implement
      automated reminders for overdue training and escalate non-compliance
      to management. Use phishing simulation results as a training
      effectiveness metric.
    tools:
      - splunk
      - knowbe4
      - servicenow

legal_references:
