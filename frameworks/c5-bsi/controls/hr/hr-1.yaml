id: hr-1
family: hr
title: "Security Screening"
class: C5BSI
baselines: [c5-basic]

statement:
  prose: >-
    Background verification checks on all candidates for employment
    shall be carried out in accordance with relevant laws, regulations,
    and ethics, and shall be proportional to the business requirements,
    the classification of the information to be accessed, and the
    perceived risks. The checks shall be carried out prior to joining
    or upon a change of role.

guidance:
  prose: >-
    Pre-employment screening is essential for cloud providers because
    employees may have access to customer data and critical infrastructure.
    The depth of screening should be proportional to the sensitivity of
    the role — roles with administrative access to production systems
    or customer data require more thorough verification. Screening
    should cover identity verification, qualification checks, employment
    history, and where legally permitted, criminal background checks.
    The process must comply with applicable data protection legislation
    (e.g., GDPR).

references:
  - citation: "C5:2020, HR-01"
    url: "https://www.bsi.bund.de/EN/Themen/Unternehmen-und-Organisationen/Informationen-und-Empfehlungen/Empfehlungen-nach-Angriffszielen/Cloud-Computing/Kriterienkatalog-C5/kriterienkatalog-c5_node.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate HR screening status into the identity provisioning workflow
      so that access to production systems and sensitive environments is
      only granted after background checks are confirmed complete. Use
      identity governance platforms to enforce role-based access provisioning
      that maps to screening levels. Implement automated workflows that
      trigger re-screening when employees change to more sensitive roles.
    tools:
      - okta
      - azure-ad
      - sailpoint
      - backstage

  devsecops:
    prose: >-
      Ensure that CI/CD pipeline service accounts and deployment credentials
      are only accessible to personnel who have completed appropriate
      background screening. Restrict access to production deployment
      pipelines based on verified screening status. Maintain segregation
      between development and production access tiers with screening
      requirements encoded in access policies.
    tools:
      - gitlab-ci
      - vault
      - access-management

  secops:
    prose: >-
      Monitor and audit access grants against HR screening records to
      detect cases where access was provisioned before screening completion.
      Create compliance reports showing screening status for all personnel
      with privileged access. Implement alerting for expired or incomplete
      background checks for personnel in sensitive roles.
    tools:
      - splunk
      - servicenow
      - sailpoint

legal_references:
