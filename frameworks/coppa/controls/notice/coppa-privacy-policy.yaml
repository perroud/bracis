id: coppa-privacy-policy
family: notice
title: "Online Privacy Policy"
class: COPPA

statement:
  prose: |
    An operator of a website or online service directed to children, or any operator that has
    actual knowledge that it is collecting personal information from a child, must post a clear,
    understandable, and complete online privacy policy describing its information practices for
    personal information collected online from children.

    The privacy policy must include (16 CFR § 312.4(b)):
    (1) The name, address, telephone number, and email address of all operators collecting or
        maintaining personal information from children through the website or online service,
        or the contact information of one operator who will respond to all inquiries on behalf
        of all operators.
    (2) A description of the types of personal information collected from children and whether
        the information is collected directly or passively.
    (3) How the operator uses (or may use) the personal information.
    (4) Whether the operator discloses personal information collected from children to third
        parties, and if so, the types of businesses to which the information is disclosed, the
        general purposes for disclosure, and whether the third parties have agreed to maintain
        confidentiality and security of the information.
    (5) That the parent can review the child's personal information, direct the operator to
        delete the information, and refuse further collection or use of the child's information.
    (6) That the operator may not condition a child's participation in an activity on the child
        disclosing more personal information than is reasonably necessary.
    (7) The procedures the parent should follow to exercise their rights.

    The link to the privacy policy must be clearly labeled, placed prominently on the homepage
    and at each area where personal information is collected from children.

guidance:
  prose: |
    Section 312.4(b) and (d) require a comprehensive, accessible privacy policy specifically
    addressing children's data practices. Key requirements:

    1. **Prominence:** The privacy policy link must be clearly labeled and placed at the
       homepage and at every point where children's data is collected. It cannot be buried
       in general terms of service.

    2. **Clarity:** The policy must be written in language understandable to the general public
       — not legal jargon. Given the audience involves children, plain language is essential.

    3. **Completeness:** Every category of PI collected, every use, every third-party disclosure
       must be documented. Omissions constitute violations.

    4. **Operator identification:** All operators collecting data must be identified, or one
       designated operator must respond on behalf of all.

    5. **Parental rights disclosure:** The policy must explicitly inform parents of their
       rights to review, delete, and refuse further collection.

    The 2013 Rule expanded the definition of personal information to include persistent
    identifiers (cookies, device IDs), photographs, videos, audio files, and geolocation
    data — all of which must be disclosed in the privacy policy.

implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement age-gating or age verification at user registration to identify child users
         and trigger COPPA-specific privacy flows.
      2. Build a privacy policy management system that maintains versioned privacy policies
         and tracks which version each user consented to.
      3. Create a content management workflow for privacy policies that requires legal review
         before publication and maintains an audit trail of all changes.
      4. Deploy prominent privacy policy links on homepage and at every data collection point
         (registration forms, in-app purchase flows, contact forms, chat features).
      5. Implement a data inventory system that automatically catalogs all personal information
         collected from children across all services, including passive collection (cookies,
         device fingerprinting, analytics).
      6. Build operator identification registry for multi-operator platforms where multiple
         entities collect children's data.
    tools:
      - consent-management-platform
      - content-management-system
      - age-verification-sdk
      - data-catalog
      - privacy-portal

  devsecops:
    prose: |
      1. Integrate privacy policy link validation into CI/CD — scan all pages and collection
         points to verify privacy policy links are present, visible, and functional.
      2. Implement automated checks that any new data collection endpoint or form includes
         a privacy policy disclosure.
      3. Test that age-gating logic correctly routes child users to COPPA-compliant flows.
      4. Validate privacy policy content against a structured schema to ensure all required
         disclosures (operator info, data types, uses, third parties, parental rights) are present.
      5. Scan for undisclosed tracking or analytics SDKs that may collect personal information
         from children without disclosure in the privacy policy.
    tools:
      - semgrep
      - gitlab-ci
      - accessibility-scanner
      - link-checker
      - sdk-audit

  secops:
    prose: |
      1. Monitor for new data collection mechanisms (new forms, APIs, third-party SDKs) that
         may require privacy policy updates.
      2. Audit privacy policy completeness quarterly — verify all data types, uses, and third
         parties are accurately disclosed.
      3. Track privacy policy versions and ensure all active users have been notified of
         material changes.
      4. Monitor third-party scripts and SDKs for changes that may introduce new data
         collection not covered by the current privacy policy.
      5. Alert on any collection of children's personal information from endpoints not
         covered by a COPPA privacy policy disclosure.
    tools:
      - web-monitoring
      - compliance-dashboard
      - third-party-risk-management
      - data-discovery

