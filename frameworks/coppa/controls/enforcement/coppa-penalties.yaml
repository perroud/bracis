id: coppa-penalties
family: enforcement
title: "Civil Penalties for COPPA Violations"
class: COPPA

statement:
  prose: |
    Violations of the COPPA Rule are treated as unfair or deceptive acts or practices in
    violation of Section 5(a)(1) of the Federal Trade Commission Act (15 U.S.C. § 45(a)(1)).

    The FTC may seek civil penalties of up to $50,120 per violation (as of 2024, adjusted
    annually for inflation per the Federal Civil Penalties Inflation Adjustment Act).

    Each instance of collecting, using, or disclosing a child's personal information in
    violation of COPPA constitutes a separate violation. The FTC calculates penalties based on:
    (1) The number of children affected.
    (2) The nature and severity of the violation.
    (3) The operator's history of prior violations.
    (4) The operator's financial condition and ability to pay.
    (5) Whether the operator acted in good faith and made efforts to comply.
    (6) The egregiousness of the violation — knowing violations receive higher penalties.

    In addition to civil penalties, the FTC may seek:
    - Injunctive relief (orders to stop violating practices)
    - Data deletion orders
    - Compliance monitoring and reporting requirements
    - Independent third-party audits (typically 20 years)
    - Prohibition on future data collection from children

guidance:
  prose: |
    COPPA enforcement has escalated significantly in recent years, with record-breaking
    penalties. Key enforcement trends and considerations:

    1. **Penalty escalation:** Major enforcement actions include:
       - Epic Games / Fortnite: $275 million (2022) — largest COPPA penalty ever
       - Google / YouTube: $170 million (2019)
       - Musical.ly / TikTok: $5.7 million (2019)
       - Yelp: $11.2 million (2014)
       The per-violation penalty is multiplied by the number of children affected,
       producing enormous total penalties for services with large child user bases.

    2. **Per-violation calculation:** Each child whose PI was collected without consent
       constitutes a separate violation. For a service with 1 million child users, even
       a single noncompliant practice generates 1 million violations.

    3. **Consent decree duration:** FTC consent decrees typically span 20 years and include
       independent audit requirements, reporting obligations, and the threat of contempt
       proceedings for violations.

    4. **State AG enforcement:** In addition to FTC enforcement, state attorneys general
       can bring COPPA actions under 15 U.S.C. § 6504. Multiple states acting together
       can compound penalties.

    5. **No private right of action:** Unlike CCPA/CPRA, COPPA does not provide a private
       right of action. Enforcement is exclusively through the FTC and state AGs.

    6. **Actual knowledge standard:** COPPA applies when an operator has "actual knowledge"
       of collecting children's PI, or when the service is "directed to children." The FTC
       has interpreted "actual knowledge" broadly — ignoring clear signals that users are
       children can itself constitute actual knowledge.

    7. **Proposed 2024 updates:** The FTC has proposed rule changes that would expand the
       definition of personal information, strengthen consent requirements, and increase
       operator obligations. Operators should plan for these changes proactively.

implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement comprehensive COPPA compliance logging that creates an evidence trail
         demonstrating good-faith compliance efforts — this directly impacts penalty
         calculations.
      2. Build a compliance metrics dashboard tracking: consent rates, policy publication,
         parental requests fulfilled, deletion completeness, and third-party oversight.
      3. Implement automated compliance reporting that can generate evidence packages for
         FTC inquiries, including historical data showing consistent compliance.
      4. Build incident detection and response capabilities specific to COPPA violations —
         unauthorized data collection from children, consent bypass, third-party
         noncompliance.
      5. Implement a compliance change management system that tracks regulatory updates
         (including the 2024 proposed rule changes) and maps them to required system changes.
      6. Build financial exposure modeling — calculate potential penalty exposure based on
         the number of child users and any compliance gaps, to inform remediation priority.
    tools:
      - compliance-dashboard
      - audit-log
      - incident-response
      - reporting-platform
      - risk-management
      - change-management

  devsecops:
    prose: |
      1. Implement COPPA compliance gates in CI/CD that block deployment of child-directed
         features that fail compliance validation.
      2. Build automated compliance test suites covering all COPPA requirements — run as
         part of release testing for any service handling children's data.
      3. Implement evidence-preserving test infrastructure that logs compliance test
         results with timestamps for audit purposes.
      4. Create compliance regression tests — when a COPPA control is implemented, add
         a regression test to ensure it is not inadvertently removed or weakened.
      5. Track compliance test coverage — measure what percentage of COPPA requirements
         have automated test coverage.
    tools:
      - gitlab-ci
      - compliance-testing
      - test-management
      - evidence-collection

  secops:
    prose: |
      1. Maintain COPPA incident response procedures — define severity levels, response
         timelines, escalation paths, and remediation procedures for COPPA violations.
      2. Monitor for FTC enforcement trends and guidance updates — adjust compliance
         posture proactively based on enforcement signals.
      3. Conduct annual COPPA compliance assessments — identify gaps before the FTC does.
      4. Maintain relationships with legal counsel experienced in FTC enforcement — time
         to engage counsel is before an investigation, not after.
      5. Track compliance metrics over time to demonstrate continuous improvement and
         good faith — this directly impacts penalty calculations.
      6. Calculate and report financial exposure quarterly — number of child users
         multiplied by per-violation penalty provides the maximum exposure figure.
    tools:
      - compliance-dashboard
      - incident-response
      - risk-management
      - legal-management
      - reporting-platform

