id: coppa-security
family: obligations
title: "Confidentiality, Security, and Integrity of Personal Information"
class: COPPA

statement:
  prose: |
    The operator must establish and maintain reasonable procedures to protect the
    confidentiality, security, and integrity of personal information collected from children
    (16 CFR § 312.8).

    This obligation requires the operator to implement administrative, technical, and physical
    safeguards appropriate to the sensitivity of the information and the risks posed by
    unauthorized access, use, modification, destruction, or disclosure.

guidance:
  prose: |
    Section 312.8 imposes an affirmative security obligation on operators collecting
    children's PI. The FTC evaluates compliance based on the totality of the operator's
    security program. Key considerations:

    1. **Reasonableness standard:** Security measures must be "reasonable" given the
       sensitivity of children's data, the volume of data collected, the size and
       complexity of the operator's business, and the cost of available security tools.
       Children's data is inherently sensitive, so a higher standard applies.

    2. **Administrative safeguards:** Written security policies, employee training on
       children's data handling, access control policies, incident response procedures,
       and vendor security assessments.

    3. **Technical safeguards:** Encryption at rest and in transit, access controls with
       least privilege, authentication requirements, intrusion detection, vulnerability
       management, secure coding practices, and logging/monitoring.

    4. **Physical safeguards:** Physical access controls to systems storing children's data,
       secure disposal of media, and environmental protections.

    5. **Third-party security:** Operators must ensure third parties receiving children's
       PI maintain adequate security. This requires contractual provisions and periodic
       assessment.

    6. **Breach notification:** While COPPA itself does not include a breach notification
       requirement, state breach notification laws apply to children's PI, and a breach
       evidences a failure of "reasonable procedures."

    The FTC has brought enforcement actions for specific security failures including: lack
    of encryption, default credentials, excessive employee access, unpatched systems, and
    inadequate vendor security oversight.

implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement encryption at rest (AES-256 or equivalent) for all data stores containing
         children's PI — databases, object storage, backups, and archives.
      2. Enforce TLS 1.2+ for all data in transit, including internal service-to-service
         communication handling children's PI.
      3. Implement role-based access control (RBAC) with least privilege for all systems
         containing children's data. Require MFA for access to these systems.
      4. Deploy data loss prevention (DLP) controls to detect and prevent unauthorized
         exfiltration of children's PI.
      5. Implement network segmentation to isolate systems processing children's data from
         general-purpose infrastructure.
      6. Build automated vulnerability management — continuous scanning, prioritized
         remediation, and patch management with SLAs based on severity.
      7. Implement secure development lifecycle (SDLC) practices including threat modeling,
         secure code review, and security testing for features handling children's data.
    tools:
      - encryption-service
      - vault
      - rbac-system
      - dlp
      - network-segmentation
      - vulnerability-scanner
      - waf

  devsecops:
    prose: |
      1. Run SAST, DAST, and dependency scanning in CI/CD for all code handling children's
         PI — block deployment if critical or high vulnerabilities are found.
      2. Implement secret detection to prevent credentials and API keys from entering
         source control.
      3. Run container scanning for all container images deployed in child-directed services.
      4. Enforce code review with security-focused reviewers for changes to code handling
         children's data.
      5. Implement infrastructure-as-code scanning to verify encryption, access controls,
         and network segmentation configurations.
      6. Run penetration testing against child-directed services at least annually.
    tools:
      - semgrep
      - gitlab-ci
      - sonarqube
      - trivy
      - snyk
      - owasp-zap
      - secret-detection

  secops:
    prose: |
      1. Monitor access to systems containing children's PI — alert on anomalous access
         patterns, off-hours access, and bulk data retrieval.
      2. Implement SIEM with correlation rules specific to children's data access.
      3. Maintain an incident response plan with specific procedures for breaches involving
         children's PI, including expedited notification timelines.
      4. Conduct tabletop exercises for breach scenarios involving children's data.
      5. Monitor third-party security posture — track vendor security assessments, breach
         notifications, and compliance certifications.
      6. Audit access logs quarterly — verify all access to children's PI was authorized
         and justified.
    tools:
      - siem
      - elastic-siem
      - edr
      - soar
      - vulnerability-management
      - third-party-risk-management

