id: coppa-safe-harbor
family: obligations
title: "FTC-Approved Self-Regulatory Safe Harbor Programs"
class: COPPA

statement:
  prose: |
    Industry groups or other persons may apply to the FTC for approval of self-regulatory
    guidelines that implement the protections of COPPA and the COPPA Rule (16 CFR § 312.11).

    An operator that complies with an FTC-approved safe harbor program will be deemed in
    compliance with the requirements of the COPPA Rule, subject to the safe harbor program's
    independent review and disciplinary procedures.

    Safe harbor programs must:
    (1) Include a comprehensive set of guidelines that, when followed, comply with all
        requirements of 16 CFR Part 312.
    (2) Include an effective, mandatory mechanism for the independent assessment of
        subject operators' compliance with the guidelines.
    (3) Include effective incentives for subject operators' compliance with the guidelines,
        including mandatory sanctions for noncompliance.
    (4) Be administered by a governing body that acts independently and resolves conflicts
        of interest.
    (5) Provide the Commission with annual reports on compliance assessments and actions taken.

    As of 2024, FTC-approved safe harbor programs include: CARU (Children's Advertising
    Review Unit), ESRB Privacy Certified, kidSAFE Seal Program, Aristotle Inc. COPPA
    Safe Harbor, PRIVO, and TrustArc.

guidance:
  prose: |
    Safe harbor programs provide a structured path to COPPA compliance with independent
    oversight. Key considerations:

    1. **Not a free pass:** Safe harbor membership does not immunize operators from FTC
       enforcement. If the safe harbor program fails to adequately police its members,
       the FTC can and has taken direct action against operators in safe harbor programs.

    2. **Compliance benefits:** Operators in good standing with an approved safe harbor
       benefit from the presumption of compliance. This can be valuable in FTC
       investigations and provides structured guidance.

    3. **Independent assessment:** Safe harbor programs must conduct independent reviews
       of member compliance. This typically involves annual audits, spot checks, and
       complaint investigation.

    4. **Disciplinary authority:** Programs must have the power to discipline noncompliant
       members, including suspension, expulsion, and referral to the FTC.

    5. **Program selection:** Different safe harbor programs have different strengths:
       - **CARU:** Focuses on advertising to children
       - **ESRB Privacy Certified:** Specialized for gaming and interactive entertainment
       - **kidSAFE:** Broad applicability, certification-based
       - **PRIVO:** Technology-focused, offers age verification tools
       - **TrustArc:** Enterprise-focused, integrates with broader privacy programs

    6. **Cost-benefit analysis:** Safe harbor membership involves fees, compliance costs,
       and audit obligations. Operators should evaluate whether the compliance benefits
       justify the costs relative to self-assessment.

implementation_guidance:
  platform_engineering:
    prose: |
      1. Evaluate safe harbor programs based on industry alignment, service offerings, cost,
         and audit requirements. Select the program that best matches the operator's
         business model and risk profile.
      2. Implement the safe harbor program's technical requirements — these typically include
         specific privacy policy formats, consent mechanisms, data handling procedures,
         and reporting capabilities.
      3. Build compliance monitoring dashboards that track the specific metrics required
         by the safe harbor program for annual assessments.
      4. Implement automated evidence collection for safe harbor audits — consent records,
         privacy policy versions, data handling logs, incident reports, and training records.
      5. Integrate safe harbor seal display on child-directed pages as required by the
         program (typically a visible badge linking to the program's verification page).
      6. Build internal audit capabilities that mirror the safe harbor program's assessment
         methodology, enabling continuous compliance monitoring between formal audits.
    tools:
      - compliance-dashboard
      - audit-log
      - evidence-collection
      - badge-management
      - reporting-platform

  devsecops:
    prose: |
      1. Automate safe harbor compliance checks in CI/CD — verify privacy policy links,
         consent flows, and data handling procedures match safe harbor requirements.
      2. Implement automated testing for safe harbor-specific requirements that may exceed
         baseline COPPA (some programs have additional requirements).
      3. Validate safe harbor seal display — verify the seal is visible on all required
         pages and links to the correct verification URL.
      4. Build automated compliance reporting that generates safe harbor audit evidence
         in the required format.
      5. Test that all COPPA controls are functioning as required by the specific safe
         harbor program guidelines.
    tools:
      - gitlab-ci
      - compliance-testing
      - link-checker
      - report-generator

  secops:
    prose: |
      1. Maintain continuous compliance with safe harbor program requirements — do not
         treat compliance as an annual event.
      2. Prepare for safe harbor audits proactively — compile evidence, remediate known
         gaps, and conduct internal pre-audits.
      3. Monitor safe harbor program updates — requirements change periodically, and
         operators must adapt.
      4. Track safe harbor program communications — respond promptly to inquiries,
         complaint investigations, and compliance requests.
      5. Report COPPA incidents to the safe harbor program as required by program
         guidelines (typically within 24-72 hours).
    tools:
      - compliance-dashboard
      - audit-management
      - incident-response
      - notification-service

