control_families:
  - id: notice
    title: "Notice Requirements"
    description: "Requirements for operators to provide clear, comprehensive privacy policies and direct notice to parents before collecting personal information from children under 13"
    sections: "16 CFR § 312.4"
    control_count: 2
  - id: consent
    title: "Parental Consent"
    description: "Requirements for obtaining verifiable parental consent before collecting, using, or disclosing children's personal information, including approved methods and exceptions"
    sections: "16 CFR § 312.5"
    control_count: 3
  - id: rights
    title: "Parental Rights"
    description: "Rights of parents to review, revoke consent, and delete their child's personal information, and prohibition on conditioning participation on excessive collection"
    sections: "16 CFR § 312.6"
    control_count: 3
  - id: obligations
    title: "Operator Obligations"
    description: "Obligations for data minimization, security, retention limits, third-party oversight, and participation in safe harbor programs"
    sections: "16 CFR §§ 312.8 - 312.11"
    control_count: 4
  - id: enforcement
    title: "Enforcement"
    description: "Civil penalties and enforcement mechanisms under the FTC Act for COPPA violations"
    sections: "15 U.S.C. § 6505"
    control_count: 1
