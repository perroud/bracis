related_frameworks:
  - framework_id: ccpa-cpra
    relationship: complements
    description: >-
      CCPA/CPRA provides broad consumer privacy rights that apply in addition to COPPA
      protections. When a child's data is involved, both frameworks may apply
      simultaneously — COPPA governs consent for children under 13, while CCPA/CPRA
      grants additional rights to all California consumers including minors.
  - framework_id: ferpa
    relationship: complements
    description: >-
      FERPA governs education records held by schools receiving federal funding. When
      edtech operators collect children's data on behalf of schools, both FERPA and COPPA
      may apply. The 'school official' exception under FERPA does not exempt operators
      from COPPA obligations.
  - framework_id: gdpr
    relationship: mapped
    description: >-
      GDPR Article 8 requires parental consent for information society services offered
      to children (member states may set age between 13-16). COPPA's verifiable parental
      consent maps to GDPR's consent requirements for children, though GDPR applies a
      broader definition of personal data.
    mapping_file: "mappings/coppa_to_gdpr.yaml"
  - framework_id: lgpd
    relationship: mapped
    description: >-
      Brazil's LGPD Article 14 establishes specific protections for children's and
      adolescents' personal data, requiring consent from a parent or legal guardian.
      This maps directly to COPPA's verifiable parental consent requirements.
    mapping_file: "mappings/coppa_to_lgpd.yaml"
