control_families:
  - id: cap-1
    title: "Disposicoes Preliminares"
    description: "Objeto, definicoes e escopo de aplicacao da resolucao sobre auditoria interna"
    articles: "art. 1 ao art. 3"
    control_count: 3
  - id: cap-2
    title: "Da Atividade de Auditoria Interna"
    description: "Independencia, objetividade, competencia tecnica, abordagem baseada em riscos e planejamento da atividade de auditoria interna"
    articles: "art. 4 ao art. 9"
    control_count: 6
  - id: cap-3
    title: "Do Plano de Auditoria"
    description: "Elaboracao do plano anual de auditoria, avaliacao de riscos, cobertura do escopo e alocacao de recursos"
    articles: "art. 10 ao art. 13"
    control_count: 4
  - id: cap-4
    title: "Da Execucao e Comunicacao dos Resultados"
    description: "Execucao dos trabalhos, documentacao de achados, recomendacoes, acompanhamento e reporte aos orgaos de governanca"
    articles: "art. 14 ao art. 18"
    control_count: 5
  - id: cap-5
    title: "Das Disposicoes Finais"
    description: "Retencao de documentacao, acesso do BCB, terceirizacao da auditoria interna e disposicoes transitorias"
    articles: "art. 19 ao art. 22"
    control_count: 4
related_frameworks:
  - framework_id: cmn-4557
    relationship: complements
    description: >-
      A CMN 4.968 complementa a CMN 4.557: a primeira trata de auditoria interna e a
      segunda de gestao integrada de riscos, ambas aplicaveis a instituicoes financeiras
      autorizadas pelo BCB.
  - framework_id: cnsp-416
    relationship: equivalent-to
    description: "A CNSP 416 e o analogo da CMN 4.968 para o mercado segurador, com requisitos semelhantes de auditoria interna aplicados as seguradoras."
  - framework_id: bacen-4893
    relationship: complements
    description: "A auditoria interna da CMN 4.968 inclui avaliacao dos controles de seguranca cibernetica exigidos pela Resolucao BCB 4.893, integrando a agenda de auditoria de TI."
  - framework_id: sox
    relationship: supports
    description: "A SOX fornece referencia internacional para requisitos de auditoria interna e controles internos sobre relatorios financeiros que suportam a implementacao da CMN 4.968."
