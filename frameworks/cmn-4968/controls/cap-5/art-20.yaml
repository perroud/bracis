id: art-20
family: cap-5
title: "Acesso do Banco Central do Brasil"
class: CMN-4968
baselines: [todas-ifs]
statement:
  prose: |
    Art. 20. A instituição deve assegurar ao Banco Central do Brasil acesso irrestrito
    a toda a documentação referente à atividade de auditoria interna, incluindo os
    relatórios de auditoria, os papéis de trabalho e as informações sobre as
    recomendações formuladas e o status de sua implementação.

    Parágrafo único. As informações solicitadas pelo Banco Central do Brasil devem
    ser fornecidas no prazo por ele estabelecido.
guidance:
  prose: |
    O art. 20 e o mecanismo regulatorio que garante ao BCB supervisionar efetivamente
    a funcao de auditoria interna das instituicoes. E um dispositivo de accountability:
    a auditoria interna nao e apenas interna -- ela e supervisionada externamente pelo BCB.

    **Acesso irrestrito do BCB (cabecalho):**
    O BCB pode acessar tudo sem excecao:
    - Relatorios de auditoria (inclusive relatorios de achados criticos)
    - Papeis de trabalho completos (evidencias, programas de trabalho, notas)
    - Informacoes sobre recomendacoes e status (o que foi feito ou nao foi feito)
    - Plano de auditoria e avaliacoes de risco
    - Documentacao sobre restricoes de escopo ou independencia

    **Prazo do BCB (paragrafo unico):**
    A instituicao nao pode negociar o prazo -- deve ser o prazo estabelecido pelo BCB.
    Em supervisoes de rotina, o BCB tipicamente concede 5-10 dias uteis. Em situacoes
    de urgencia (ex: suspeita de fraude, falha sistemica), pode ser prazo de 24-48 horas.

    **Implicacoes estrategicas:**
    O art. 20 significa que a documentacao de auditoria interna deve estar sempre
    organizada, indexada e prontamente recuperavel -- nao apenas teoricamente disponivel.
    Uma instituicao que demora semanas para recuperar papeis de trabalho esta em
    desconformidade, mesmo que a documentacao exista.

    Tambem significa que a auditoria interna deve ser honesta em seus relatorios:
    suavizar achados para nao "expor" a instituicao pode se tornar evidencia de
    conduta inadequada se o BCB acessar a documentacao e comparar com a realidade.
implementation_guidance:
  platform_engineering:
    prose: |
      **Preparacao para acesso regulatorio:**
      1. Funcionalidade de exportacao massiva no audit management system: exportar
         todos os trabalhos de um periodo (ex: ano) em formato padronizado com
         indice navegavel, em no maximo 2 horas.
      2. Acesso de leitura provisorio para o BCB: capacidade de criar usuario temporario
         somente-leitura no audit management system para acesso direto durante supervisao.
      3. Inventario acessivel de toda a documentacao de auditoria: pesquisa por periodo,
         area, tipo de trabalho, auditor, nivel de achado.
      4. Processo documentado e testado de entrega de documentacao ao regulador:
         steps, responsaveis, formatos, prazo de entrega.
      5. Sistema de rastreamento de requisicoes regulatorias: registro de cada
         solicitacao do BCB, data de recebimento, prazo, status de entrega.
    tools:
      - audit-management-system
      - document-management
      - regulatory-request-tracker
  devsecops:
    prose: |
      **Acesso do BCB a evidencias de TI:**
      1. Garantir que relatorios de auditoria de TI estejam arquivados em formato
         acessivel (PDF/A) e localizavel pelo inventario de documentacao.
      2. Logs de sistemas de TI usados como evidencia em trabalhos de auditoria devem
         estar preservados e acessiveis durante o periodo de retencao.
      3. Relatorios do compliance management platform arquivados como parte dos workpapers
         devem ser recuperaveis por trabalho de auditoria especifico.
    tools:
      - document-management
      - siem
      - gitlab-export
  secops:
    prose: |
      **Prontidao para supervisao regulatoria:**
      1. Realizar simulacao anual de supervisao do BCB (dry run): simular recebimento
         de requisicao de documentacao e medir tempo de entrega real.
      2. Definir ponto focal para requisicoes do BCB: uma pessoa (diretor de auditoria
         ou compliance officer) e o responsavel por receber, coordenar e entregar.
      3. Checklist de documentacao a ser entregue ao BCB: relatorios, workpapers, plano,
         avaliacao de riscos, status de recomendacoes, atas de reunioes com CA.
      4. Garantir que toda documentacao de auditoria esta indexada e localizavel em
         no maximo 1 hora -- nao 1 semana.
      5. Politica interna clara sobre o que e confidencial vs. o que vai ao BCB: o BCB
         tem acesso a tudo; confidencialidade interna nao se aplica ao regulador.
    tools:
      - audit-management-system
      - grc-platform
      - document-management
