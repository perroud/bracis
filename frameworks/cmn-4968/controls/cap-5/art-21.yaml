id: art-21
family: cap-5
title: "Terceirizacao da Auditoria Interna"
class: CMN-4968
baselines: [todas-ifs]
statement:
  prose: |
    Art. 21. A atividade de auditoria interna pode ser exercida, total ou parcialmente,
    por empresa especializada contratada para esse fim, desde que:

    I - a responsabilidade pela atividade seja mantida pela instituição;

    II - seja assegurada a independência da empresa contratada em relação à instituição
    e aos auditores externos;

    III - a empresa contratada disponha de profissionais com competência técnica
    compatível com as atividades a serem desenvolvidas;

    IV - seja mantida documentação suficiente para avaliar a qualidade e os resultados
    dos trabalhos realizados.

    Parágrafo único. No caso de terceirização total, a instituição deve designar
    profissional interno responsável pela supervisão e gerenciamento da atividade
    de auditoria interna.
guidance:
  prose: |
    O art. 21 permite a terceirizacao da auditoria interna, mas com condicoes que
    preservam a essencia da governanca. A terceirizacao nao e uma "saida facil" --
    ela transfere a execucao, nao a responsabilidade.

    **Responsabilidade permanece na instituicao (inciso I):**
    O CA da instituicao continua sendo responsavel pela auditoria interna, mesmo
    quando terceirizada. Se a empresa contratada falha, a instituicao e responsavel
    perante o BCB. Isso exige gestao rigorosa do prestador.

    **Independencia do prestador (inciso II):**
    A empresa de auditoria interna terceirizada nao pode ser:
    - A mesma firma que faz a auditoria externa (risco critico de conflito)
    - Uma empresa com relacionamentos comerciais relevantes com a instituicao
    - Uma firma em que gestores da instituicao tem participacao societaria

    Esta vedacao e especialmente importante para as Big 4 (Deloitte, EY, KPMG, PWC):
    se uma delas faz a auditoria externa, outra pode fazer a auditoria interna
    (independencia entre firmas), mas nao a mesma.

    **Profissional interno supervisor (paragrafo unico):**
    Na terceirizacao total, a instituicao precisa de pelo menos um profissional
    interno que: receba os relatorios, supervisione a qualidade do trabalho,
    interaja com o CA e seja o ponto de contato regulatorio.
    Esse profissional nao pode ser da propria empresa terceirizada.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao tecnologica da terceirizacao:**
      1. Acesso controlado para equipe terceirizada: permissoes identicas as de auditores
         internos (somente-leitura), mas com monitoramento adicional de acessos.
      2. Ambiente seguro de colaboracao com o prestador: nao usar sistemas da empresa
         terceirizada para documentacao de trabalhos -- tudo deve ficar nos sistemas
         da instituicao (audit management system proprio).
      3. Logs detalhados de todos os acessos do prestador a sistemas da instituicao,
         revisados mensalmente pelo supervisor interno.
      4. Offboarding de acessos do prestador imediatamente ao encerramento do contrato
         ou de trabalhos especificos.
    tools:
      - iam-platform
      - audit-management-system
      - audit-log-management
      - privileged-access-management
  devsecops:
    prose: |
      **Auditores terceirizados e sistemas de TI:**
      1. Aplicar os mesmos controles de acesso somente-leitura a auditores terceirizados
         que a auditores internos para sistemas de TI.
      2. Acordo contratual de confidencialidade abrangendo: codigo-fonte, configuracoes
         de sistemas, dados de clientes, resultados de scans de seguranca.
      3. Proibicao contratual de auditores terceirizados extrairem dados de TI para
         sistemas externos a instituicao (dados devem permanecer no ambiente da IF).
      4. Revisao de NDAs e clausulas de seguranca da informacao antes de conceder
         acesso a sistemas de TI a prestadores de auditoria.
    tools:
      - iam-platform
      - dlp-solution
      - contract-management
  secops:
    prose: |
      **Governanca da terceirizacao da auditoria interna:**
      1. Processo de selecao do prestador com criterios objetivos: certificacoes
         (IIA, ISACA), experiencia em financeiro, independencia verificada, referencias.
      2. Due diligence de independencia: confirmar que o prestador nao tem relacionamentos
         que criem conflito de interesses com a instituicao ou com o auditor externo.
      3. Contrato formal com SLAs de qualidade: prazos de entrega de relatorios,
         qualificacao minima dos profissionais alocados, taxa de turnover aceitavel.
      4. Designar formalmente o supervisor interno do art. 21 com responsabilidades
         definidas em job description: revisao de trabalhos, interface com CA,
         aprovacao de relatorios antes de distribuicao.
      5. Avaliacao anual do prestador: qualidade dos trabalhos, cumprimento de prazos,
         independencia mantida, feedbacks do CA.
    tools:
      - vendor-management
      - contract-management
      - grc-platform
