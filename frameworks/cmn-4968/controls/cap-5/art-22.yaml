id: art-22
family: cap-5
title: "Disposicoes Transitorias e Vigencia"
class: CMN-4968
baselines: [todas-ifs]
statement:
  prose: |
    Art. 22. As instituições financeiras e demais instituições autorizadas a funcionar
    pelo Banco Central do Brasil devem adaptar suas estruturas e processos ao disposto
    nesta Resolução até 1° de julho de 2022.

    § 1. O Banco Central do Brasil poderá prorrogar o prazo previsto no caput em
    casos excepcionais, a critério do regulador.

    § 2. Esta Resolução entra em vigor na data de sua publicação, revogando as
    disposições em contrário.
guidance:
  prose: |
    O art. 22 e a disposicao final que estabelece o prazo de adequacao e a entrada
    em vigor. Para instituicoes que leram este artigo apos julho de 2022, o prazo
    de adequacao ja expirou -- a conformidade e obrigatoria desde essa data.

    **Vigencia desde julho de 2022:**
    Qualquer trabalho de auditoria realizado apos 1 de julho de 2022 deve estar
    em conformidade com a CMN 4.968. Isso inclui:
    - Estrutura da unidade de auditoria interna
    - Plano anual de auditoria aprovado pelo CA
    - Programas de trabalho por auditoria
    - Relatorios com classificacao de risco de achados
    - Follow-up formal de recomendacoes
    - Retencao de documentacao por 5 anos

    **Implicacoes para o prazo de retencao:**
    O primeiro plano anual sujeito a resolucao foi o PAA 2022 (segundo semestre).
    A documentacao de 2022 deve ser retida ate pelo menos julho de 2027.

    **Status atual (2026):**
    Todas as instituicoes deveriam estar em plena conformidade. O BCB ja pode --
    e deve -- supervisionar o cumprimento da resolucao em suas inspeccoes ordinarias.
    A nao conformidade apos o prazo e sujeita as penalidades do art. 65 da Lei 4.595/1964
    e da Resolucao CMN 4.122/2012 (processo administrativo sancionador).

    **Revisao periodica da adequacao:**
    A conformidade nao e um projeto com data de encerramento -- e um estado permanente
    que deve ser monitorado. Cada mudanca estrutural (nova diretoria, terceirizacao,
    novo produto) pode exigir revisao da conformidade com a resolucao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Checklist de conformidade tecnica pos-julho/2022:**
      1. Verificar que o audit management system esta configurado para o workflow
         completo exigido pela CMN 4.968: plano, programa de trabalho, execucao,
         relatorio, follow-up, retencao de 5 anos.
      2. Confirmar que todos os controles de acesso da equipe de auditoria (somente
         leitura) estao implementados e documentados.
      3. Validar que a infraestrutura de retencao de documentacao atende ao art. 19:
         integridade (WORM), seguranca (criptografia, backup) e disponibilidade.
      4. Checar que a plataforma de board portal permite o reporte formal do diretor
         de auditoria ao CA, com registro de entrega.
    tools:
      - audit-management-system
      - compliance-checker
      - document-management
      - board-portal
  devsecops:
    prose: |
      **Verificacao de conformidade de TI da auditoria:**
      1. Self-assessment anual da funcao de auditoria interna contra os requisitos
         da CMN 4.968: lista de verificacao por artigo.
      2. Incluir a CMN 4.968 no escopo de auditorias de compliance internas para
         verificar que a propria funcao de auditoria esta em conformidade.
      3. Monitorar eventuais alteracoes normativas do BCB que possam atualizar
         os requisitos da CMN 4.968 ou criar normas complementares.
    tools:
      - audit-management-system
      - regulatory-watch-service
      - compliance-checker
  secops:
    prose: |
      **Gestao continua da conformidade:**
      1. Realizar self-assessment anual da funcao de auditoria interna contra a CMN 4.968,
         usando o proprio framework como criterio de avaliacao.
      2. Documentar o resultado do self-assessment e apresentar ao CA, com plano de
         acao para eventuais lacunas identificadas.
      3. Incluir a conformidade com a CMN 4.968 no escopo do programa de auditoria
         interna (a auditoria se avalia periodicamente).
      4. Monitorar continuamente: circulares e comunicados do BCB que complementem
         ou alterem os requisitos da CMN 4.968.
      5. Registrar data de vigencia (01/07/2022) na documentacao interna de governance
         como referencia para auditorias e supervisoes do BCB.
    tools:
      - grc-platform
      - regulatory-watch-service
      - audit-management-system
      - board-portal
