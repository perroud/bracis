id: art-17
family: cap-4
title: "Acompanhamento da Implementacao das Recomendacoes"
class: CMN-4968
baselines: [todas-ifs]
statement:
  prose: |
    Art. 17. A unidade de auditoria interna deve acompanhar a implementação das
    recomendações formuladas nos relatórios de auditoria, devendo:

    I - verificar periodicamente o status de implementação das recomendações pelas
    áreas auditadas;

    II - comunicar ao conselho de administração ou órgão equivalente as recomendações
    não implementadas nos prazos acordados, especialmente as de maior risco;

    III - avaliar se as ações implementadas pelas áreas auditadas são efetivas para
    mitigar os riscos identificados.
guidance:
  prose: |
    O art. 17 fecha o ciclo de auditoria: sem acompanhamento, as recomendacoes sao
    apenas sugestoes que as areas podem ignorar. O follow-up e o mecanismo que
    transforma achados em mudanca real.

    **Verificacao periodica (inciso I):**
    O acompanhamento deve ser sistematico, nao ad hoc. Recomendacoes criticas devem
    ser acompanhadas mensalmente; recomendacoes de menor risco, trimestralmente.
    O auditor deve verificar: a acao foi realmente implementada? ou apenas prometida?

    **Escalacao ao CA (inciso II):**
    Se uma area nao implementou uma recomendacao no prazo acordado (especialmente
    as de alto risco), isso deve ser reportado ao CA. Isso cria pressao institucional
    para implementacao e responsabiliza a gestao perante o CA.

    O relatorio de acompanhamento ao CA deve incluir:
    - Recomendacoes em atraso (com responsavel e novo prazo proposto)
    - Recomendacoes criticas nao implementadas (com nivel de risco atual)
    - Justificativas apresentadas pelas areas e avaliacao do auditor

    **Avaliacao de efetividade (inciso III):**
    "Implementado" nao e suficiente -- o auditor deve avaliar se a acao foi
    realmente efetiva. Uma area pode implementar um controle que nao resolve
    o problema subjacente. O auditor deve testar a efetividade, nao apenas
    verificar a existencia da acao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema automatizado de follow-up:**
      1. Modulo de gestao de recomendacoes no audit management system: registro de cada
         recomendacao com responsavel, prazo, tipo de evidencia de conclusao, status.
      2. Notificacoes automaticas para areas auditadas: alertas de vencimento de prazo
         (30 dias antes, 7 dias antes, no dia do vencimento, no dia seguinte ao vencimento).
      3. Dashboard de status de recomendacoes com KPIs: taxa de implementacao no prazo,
         aging de recomendacoes em atraso, distribuicao por nivel de risco.
      4. Relatorio automatico de follow-up para o CA: gerado mensalmente com todas
         as recomendacoes criticas/altas em atraso ou com risco de atraso.
      5. Workflow de validacao da efetividade: apos a area registrar a conclusao,
         gatilho automatico para o auditor realizar a validacao dentro de X dias.
    tools:
      - audit-management-system
      - workflow-engine
      - notification-system
      - reporting-platform
  devsecops:
    prose: |
      **Follow-up de recomendacoes de TI:**
      1. Integrar o sistema de recomendacoes de auditoria com o issue tracker de TI
         (Jira, GitLab Issues): cada recomendacao de TI gera automaticamente um ticket
         com assignee, due date e prioridade correspondente ao nivel de risco.
      2. Monitoramento automatico de status: quando o ticket de TI e fechado, notificacao
         automatica ao auditor para validacao da efetividade.
      3. Para vulnerabilidades de seguranca: integrar com o scanner de vulnerabilidades
         para verificar automaticamente se a CVE foi remediada (reacan do scanner).
      4. SLAs de remediacao de vulnerabilidades monitorados como indicador de implementacao:
         critico <= 7 dias, alto <= 30 dias, medio <= 90 dias.
    tools:
      - audit-management-system
      - issue-tracker
      - vulnerability-scanner
      - notification-system
  secops:
    prose: |
      **Processo rigoroso de follow-up:**
      1. Atribuir proprietario de recomendacao em cada area auditada: uma pessoa
         especifica e responsavel por cada recomendacao, nao apenas "a area".
      2. Reunioes mensais de follow-up com areas que tem recomendacoes abertas:
         30 minutos, discutir status e remover bloqueios.
      3. Relatorio trimestral de status de recomendacoes para o CA: categorizado
         por nivel de risco, area e aging.
      4. Processo de escalacao gradual para recomendacoes criticas em atraso:
         semana 1 apos vencimento: notificacao ao gestor da area; semana 2: notificacao
         ao diretor da area; semana 3: relatorio ao CA.
      5. Fechar formalmente uma recomendacao apenas apos evidencia de efetividade
         validada pelo auditor -- nunca com base apenas na declaracao da area.
    tools:
      - audit-management-system
      - grc-platform
      - board-portal
      - calendar-system
