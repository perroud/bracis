id: art-18
family: cap-4
title: "Reporte ao Conselho e Comite de Auditoria"
class: CMN-4968
baselines: [todas-ifs]
statement:
  prose: |
    Art. 18. O diretor da unidade de auditoria interna deve reportar periodicamente
    ao conselho de administração ou órgão equivalente sobre:

    I - o status de execução do plano de auditoria;

    II - os resultados dos trabalhos de auditoria concluídos;

    III - o status de implementação das recomendações de auditoria;

    IV - as principais deficiências identificadas no sistema de controles internos
    e de gerenciamento de riscos;

    V - quaisquer restrições ao escopo ou à independência da atividade de auditoria
    interna.

    Parágrafo único. O reporte deve ser realizado em periodicidade compatível com
    o porte e o perfil de risco da instituição, sendo recomendada a periodicidade
    trimestral para a maioria das instituições.
guidance:
  prose: |
    O art. 18 estabelece o reporte periodico como obrigacao formal, nao como boa
    pratica opcional. O CA precisa de visibilidade continua sobre a auditoria interna
    para cumprir seu papel de supervisao.

    **Cinco temas obrigatorios (incisos I a V):**
    Cada reuniao de reporte deve cobrir todos os cinco temas. A ausencia de qualquer
    um deles e uma lacuna de governanca.

    I. Status do plano: execucao vs. planejado, desvios e justificativas
    II. Resultados: sumario dos trabalhos concluidos, achados e opiniao
    III. Recomendacoes: taxa de implementacao, aging, recomendacoes em atraso
    IV. Deficiencias relevantes: riscos materiais no sistema de controles
    V. Restricoes: qualquer limitacao a independencia ou ao escopo (CRITICO)

    **Restricoes de escopo/independencia (inciso V):**
    Este e o item mais sensivel. Se uma area bloqueou o acesso da auditoria, se um
    gestor pressionou para suavizar um achado, se o orcamento foi cortado unilateralmente
    -- tudo isso deve ser reportado ao CA. Silencio nesse tema e comprometedor.

    **Periodicidade (paragrafo unico):**
    Para a maioria das instituicoes: trimestral. Para instituicoes S1/S2 com alto
    volume de trabalhos e riscos: pode ser mais frequente. Para S5 mais simples:
    minimo semestral, mas o CA pode exigir mais frequencia.
implementation_guidance:
  platform_engineering:
    prose: |
      **Preparacao automatizada de relatorio para o CA:**
      1. Geracao automatica do relatorio trimestral de auditoria para o CA a partir
         dos dados do audit management system: status do plano, achados por risco,
         recomendacoes por status, metricas de qualidade.
      2. Dashboard executivo no board portal com KPIs de auditoria atualizados em
         tempo real: percentual do plano executado, taxa de implementacao de recomendacoes,
         numero de achados criticos/altos abertos.
      3. Integracao do board portal com o audit management system para distribuicao
         automatica de relatorios ao CA com notificacao de entrega.
      4. Historico de todos os relatorios ao CA com busca e comparativo periodo a periodo.
    tools:
      - audit-management-system
      - board-portal
      - reporting-platform
      - bi-platform
  devsecops:
    prose: |
      **Metricas de TI no reporte ao CA:**
      1. Incluir no relatorio trimestral ao CA uma secao de auditoria de TI com:
         - Numero de vulnerabilidades criticas/altas abertas vs. fechadas no periodo
         - Status de controles do compliance management platform
         - Incidentes de seguranca relevantes e acoes da auditoria
         - Status de implementacao de recomendacoes de seguranca cibernetica
      2. Scorecard de seguranca de TI automatizado: coleta de metricas de pipeline
         (cobertura de scans, taxa de remediacao) para o relatorio ao CA.
    tools:
      - audit-management-system
      - gitlab-compliance-center
      - siem
      - reporting-platform
  secops:
    prose: |
      **Excelencia no reporte ao CA:**
      1. Definir template padronizado do relatorio trimestral ao CA cobrindo os 5 temas
         do art. 18, com secao de "principais pontos de atencao" no inicio.
      2. Calibrar o nivel de detalhe ao CA: executivo e focado em riscos e decisoes;
         detalhes tecnicos ficam nos apendices ou em relatorios especificos.
      3. Estabelecer reuniao formal com o CA para apresentacao do relatorio (nao apenas
         envio do documento): 30-60 minutos, com espaco para perguntas do CA.
      4. Apresentar tendencias ao longo do tempo: a taxa de implementacao de recomendacoes
         melhora ou piora? O CA deve ver a evolucao, nao apenas snapshots.
      5. Reportar proativamente ao CA qualquer restricao ou pressao sobre a independencia,
         mesmo que aparentemente menor -- isso e protecao institucional para o auditor.
    tools:
      - audit-management-system
      - board-portal
      - presentation-tool
