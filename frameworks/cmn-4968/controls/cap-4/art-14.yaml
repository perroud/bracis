id: art-14
family: cap-4
title: "Execucao dos Trabalhos de Auditoria"
class: CMN-4968
baselines: [todas-ifs]
statement:
  prose: |
    Art. 14. Os trabalhos de auditoria interna devem ser executados de acordo com
    programa de trabalho previamente elaborado, que contenha:

    I - os objetivos do trabalho e o escopo da auditoria;

    II - os procedimentos de auditoria a serem realizados, incluindo natureza, extensão
    e oportunidade;

    III - os critérios de avaliação a serem utilizados;

    IV - as fontes de evidências a serem consultadas.

    Parágrafo único. Os programas de trabalho podem ser ajustados durante a execução
    quando houver fatos ou circunstâncias que justifiquem tais ajustes, devendo os
    ajustes ser devidamente documentados.
guidance:
  prose: |
    O art. 14 formaliza a disciplina de execucao de auditoria. Cada trabalho comeca
    com um programa escrito -- nao com conversas informais ou checklist mental do auditor.

    **Programa de trabalho (cabecalho):**
    O programa e o "script" de cada auditoria. Deve ser elaborado antes do inicio
    da execucao (field work). E diferente do plano anual: o plano lista QUAIS trabalhos
    serao feitos; o programa define COMO cada trabalho sera executado.

    **Natureza, extensao e oportunidade dos procedimentos (inciso II):**
    - Natureza: tipo de procedimento (inspecao fisica, confirmacao, recalculo, reexecucao,
      observacao, indagacao, procedimentos analiticos)
    - Extensao: tamanho da amostra, profundidade dos testes
    - Oportunidade: quando sera feito (ex: visita presencial em fevereiro, analise
      de dados em marco)

    **Criterios de avaliacao (inciso III):**
    O auditor precisa definir previamente o que considera "adequado" ou "inadequado".
    Os criterios sao: normas regulatorias, politicas internas, melhores praticas
    do setor, contratos, etc. Sem criterios pre-definidos, a avaliacao e subjetiva.

    **Fontes de evidencias (inciso IV):**
    Onde o auditor vai buscar as evidencias: sistemas de informacao, contratos,
    atas de reuniao, entrevistas com gestores, relatorios de sistemas, logs de acesso.

    **Ajustes documentados (paragrafo unico):**
    A realidade pode ser diferente do planejado. Ajustes sao permitidos, mas devem
    ser documentados: o que mudou, por que mudou e como isso afeta os objetivos do trabalho.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de programas de trabalho:**
      1. Templates de programa de trabalho no audit management system por tipo de auditoria:
         credito, tesouraria, TI, compliance, controles internos, seguranca cibernetica.
      2. Workflow de aprovacao do programa de trabalho: elaborado pelo auditor sênior,
         revisado e aprovado pelo coordenador/diretor antes do inicio do field work.
      3. Vinculacao do programa de trabalho ao trabalho do plano: rastreabilidade
         completa de planejamento ate execucao.
      4. Modulo de coleta de evidencias: upload de documentos, screenshots, extratos
         de sistemas diretamente vinculados a cada procedimento do programa.
      5. Controle de ajustes: registro de todas as modificacoes ao programa durante
         a execucao, com campo de justificativa obrigatorio.
    tools:
      - audit-management-system
      - evidence-management
      - workflow-engine
  devsecops:
    prose: |
      **Execucao de auditoria de TI com programa estruturado:**
      1. Templates de programa para auditoria de TI cobrindo areas especificas:
         - Gestao de acessos e privilegios (IAM)
         - Ciclo de desenvolvimento seguro (SDLC)
         - Gestao de vulnerabilidades
         - Seguranca cibernetica (Bacen 4.893)
         - Continuidade de TI
         - Gestao de mudancas
      2. Procedimentos especificos de auditoria de pipeline: verificar se controles
         de branch protection, code review, SAST, DAST e secret detection estao ativos.
      3. Coleta automatizada de evidencias de TI: logs de pipeline, resultados de scans,
         relatorios de compliance do GitLab exportados automaticamente para a plataforma
         de auditoria.
      4. Criterios de avaliacao de TI documentados: ex: "CVSS >= 7 sem plano de remediacao
         em 30 dias = achado critico".
    tools:
      - audit-management-system
      - gitlab-compliance-center
      - siem
      - evidence-management
  secops:
    prose: |
      **Qualidade na execucao dos trabalhos:**
      1. Instituir revisao de qualidade dos programas de trabalho antes do inicio
         de cada auditoria (quality review gate).
      2. Definir e documentar biblioteca de criterios de avaliacao por area: lista de
         normas e politicas que servem como benchmark para cada tipo de auditoria.
      3. Padronizar fontes de evidencias por tipo de procedimento: qual sistema consultar
         para cada tipo de verificacao (ex: sistema de credito para avaliar aprovacoes).
      4. Treinar auditores em tecnicas de obtencao de evidencias suficientes e adequadas.
      5. Revisao do supervisor ao final de cada campo: verificar que todos os procedimentos
         do programa foram executados ou os ajustes foram justificados.
    tools:
      - audit-management-system
      - training-platform
      - quality-management
