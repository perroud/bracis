id: art-16
family: cap-4
title: "Relatorio de Auditoria Interna"
class: CMN-4968
baselines: [todas-ifs]
statement:
  prose: |
    Art. 16. Os resultados dos trabalhos de auditoria interna devem ser comunicados
    por meio de relatório escrito, que contemple:

    I - o objetivo e o escopo do trabalho;

    II - os achados e as respectivas classificações de risco;

    III - as recomendações formuladas e os comentários das áreas auditadas;

    IV - o plano de ação para implementação das recomendações aceitas;

    V - a opinião geral do auditor sobre a área ou processo auditado.

    § 1. Os relatórios de auditoria devem ser distribuídos ao conselho de administração
    ou órgão equivalente, à diretoria e às áreas auditadas.

    § 2. A distribuição dos relatórios deve ser tempestiva, de modo a permitir a
    adoção de ações corretivas em tempo hábil.
guidance:
  prose: |
    O art. 16 define o produto final de cada trabalho de auditoria: o relatorio.
    E o documento que concretiza o valor da auditoria -- sem relatorio claro,
    os achados ficam no "ar" e nao geram mudanca.

    **Classificacao de risco dos achados (inciso II):**
    Cada achado deve ser classificado por nivel de risco/gravidade. Classificacao
    tipica (alinhada ao IIA):
    - Critico: risco imediato, acao urgente necessaria
    - Alto: risco significativo, acao prioritaria em 30-60 dias
    - Medio: risco moderado, acao necessaria em 90-180 dias
    - Baixo: melhoria desejavel, prazo de 6-12 meses

    Sem classificacao, o CA nao consegue priorizar as acoes.

    **Opiniao geral (inciso V):**
    O auditor deve emitir uma opinia geral sobre a area auditada:
    - Efetiva: controles funcionam bem, riscos gerenciados adequadamente
    - Parcialmente efetiva: melhorias necessarias mas nao criticas
    - Inefetiva: controles com falhas significativas, risco nao gerenciado adequadamente

    **Distribuicao ao CA (paragrafo 1):**
    Os relatorios vao ao CA, nao apenas a diretoria. O CA precisa saber o que foi
    encontrado para cumprir seu papel de supervisao. Relatorios enviados apenas
    a diretoria sao insuficientes.

    **Tempestividade (paragrafo 2):**
    Achados criticos nao podem esperar o ciclo normal de relatorio. Devem ser
    comunicados imediatamente ao CA (comunicado especial/flash report).
implementation_guidance:
  platform_engineering:
    prose: |
      **Geracao e distribuicao automatizada de relatorios:**
      1. Modulo de geracao de relatorio no audit management system: template padronizado
         com todos os campos obrigatorios do art. 16, pre-populado a partir dos dados
         dos workpapers.
      2. Workflow de revisao do relatorio: redacao pelo auditor, revisao pelo supervisor,
         aprovacao pelo diretor de auditoria, envio formal.
      3. Distribuicao automatica via portal seguro: envio para CA, diretoria e areas
         auditadas com notificacoes de entrega e leitura.
      4. Classificacao automatica sugerida de risco de achados com base em criterios
         pre-definidos, com possibilidade de ajuste pelo auditor.
      5. Dashboard de achados abertos: visibilidade consolidada para CA e diretor
         de auditoria de todos os achados por nivel de risco e status.
      6. Flash report automatico: quando achado critico e identificado durante campo,
         notificacao imediata ao diretor de auditoria para comunicado urgente ao CA.
    tools:
      - audit-management-system
      - board-portal
      - notification-system
      - reporting-platform
  devsecops:
    prose: |
      **Relatorios de auditoria de TI:**
      1. Template especifico de relatorio de auditoria de TI com secoes para:
         controles avaliados, resultados de scans integrados, vulnerabilidades criticas,
         nao conformidades com Bacen 4.893, recomendacoes tecnicas.
      2. Integracao automatica de metricas de TI no relatorio: numero de vulnerabilidades
         por severidade, taxa de remediacao, cobertura de scans de seguranca.
      3. Classificacao de risco de achados de TI vinculada ao framework de vulnerabilidades
         (ex: CVSS) para objetividade e consistencia.
      4. Relatorio de compliance do compliance management platform incluido como apendice
         do relatorio de auditoria de TI.
    tools:
      - audit-management-system
      - gitlab-compliance-center
      - vulnerability-scanner
      - reporting-platform
  secops:
    prose: |
      **Qualidade e tempestividade dos relatorios:**
      1. Definir SLA de emissao de relatorio: draft disponivel para contraditorio em
         X dias apos o encerramento do trabalho de campo, relatorio final em Y dias.
         Recomendacao: draft em 5 dias, relatorio final em 15 dias.
      2. Definir processo de flash report para achados criticos: comunicacao informal
         imediata ao diretor de auditoria e ao CA dentro de 24-48 horas do achado.
      3. Manter lista de distribuicao atualizada de cada tipo de relatorio, com
         aprovacao do CA sobre quem recebe o que.
      4. Incluir no relatorio anual consolidado: sumario de todos os trabalhos realizados,
         achados por nivel de risco, taxa de implementacao de recomendacoes, conclusao
         sobre a adequacao geral do sistema de controles internos.
    tools:
      - audit-management-system
      - board-portal
      - notification-system
