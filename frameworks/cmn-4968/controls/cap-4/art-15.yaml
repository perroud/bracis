id: art-15
family: cap-4
title: "Documentacao dos Trabalhos de Auditoria"
class: CMN-4968
baselines: [todas-ifs]
statement:
  prose: |
    Art. 15. Os trabalhos de auditoria interna devem ser documentados de forma
    suficiente para suportar as conclusões, as recomendações e os resultados comunicados,
    devendo a documentação conter:

    I - o programa de trabalho e suas eventuais alterações;

    II - as evidências obtidas e os procedimentos realizados;

    III - as conclusões alcançadas e as recomendações formuladas;

    IV - os comentários das áreas auditadas em relação aos achados e às recomendações;

    V - o plano de ação para implementação das recomendações, quando aplicável.
guidance:
  prose: |
    O art. 15 estabelece os requisitos de documentacao que transformam o trabalho de
    auditoria em evidencia regulatoria. A documentacao nao e burocracia -- e a prova
    de que a auditoria foi feita com qualidade e de que as conclusoes sao sustentadas.

    **Suficiencia para suportar conclusoes (cabecalho):**
    Um terceiro experiente (outro auditor, o BCB) deve conseguir, olhando apenas a
    documentacao do trabalho, chegar as mesmas conclusoes do auditor. Se a documentacao
    nao permite essa reproducibilidade, ela e insuficiente.

    **Evidencias (inciso II):**
    As evidencias sao a base factual das conclusoes. Devem ser:
    - Suficientes: quantidade adequada para suportar as conclusoes
    - Competeentes: confiabilidade das fontes (evidencia documental > evidencia testemunhal)
    - Relevantes: relacionadas aos objetivos do trabalho

    **Contraditorio (inciso IV):**
    As areas auditadas devem ter oportunidade de comentar os achados antes do relatorio
    final. Isso e principio do contraditorio: garante que o auditor nao inclua
    informacoes factualmente incorretas no relatorio por falta de contexto.

    **Plano de acao (inciso V):**
    Para cada recomendacao aceita, deve haver plano de acao com: responsavel, prazo
    e acoes especificas. Sem plano de acao, a recomendacao nao sai do papel.

    **Retencao:**
    A documentacao deve ser retida conforme art. 19 (minimo 5 anos), e deve ser
    acessivel ao BCB conforme art. 20.
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de gestao de documentacao de auditoria:**
      1. Audit management system com modulo de workpapers (papeis de trabalho):
         estrutura hierarquica por trabalho, por objetivo e por procedimento.
      2. Upload e indexacao de evidencias com metadados: fonte, data de obtencao,
         procedimento vinculado, auditor responsavel.
      3. Workflow de contraditorio digital: envio automatico de draft de achados
         para a area auditada, captura de comentarios no sistema com prazo configuravel.
      4. Modulo de plano de acao: registro de responsavel, prazo, acoes e status
         de implementacao vinculado a cada recomendacao.
      5. Controle de versao de todos os documentos do trabalho, com historico de
         modificacoes e responsavel por cada alteracao.
      6. Exportacao do pacote completo de documentacao em formato arquivavel (PDF/A)
         para retencao de longo prazo.
    tools:
      - audit-management-system
      - evidence-management
      - document-management
      - workflow-engine
  devsecops:
    prose: |
      **Documentacao especifica de auditoria de TI:**
      1. Captura automatizada de screenshots e relatorios de sistemas de TI como
         evidencias: resultados de scans, logs de acesso, configuracoes de sistemas.
      2. Exportacao de relatorios de compliance do compliance management platform como
         evidencias de auditoria com timestamp e assinatura digital.
      3. Logs de consulta da equipe de auditoria a sistemas de TI como evidencia de
         que os procedimentos foram executados (trilha de auditoria de acesso).
      4. Relatorios de SIEM exportados e arquivados como parte dos workpapers de
         auditoria de seguranca cibernetica.
      5. Evidencias de gestao de vulnerabilidades: historico de CVEs identificadas,
         status de remediacao, SLAs cumpridos/violados.
    tools:
      - gitlab-compliance-center
      - siem
      - evidence-management
      - vulnerability-scanner
  secops:
    prose: |
      **Cultura e pratica de documentacao de qualidade:**
      1. Definir padroes de suficiencia de documentacao por tipo de procedimento
         (ex: minimo de evidencias para teste de controle automatizado vs. manual).
      2. Implementar revisao de workpapers pelo supervisor antes do relatorio final:
         check de completude, consistencia entre evidencias e conclusoes.
      3. Padronizar o processo de contraditorio: prazo de 5 dias uteis para comentarios
         da area auditada, extensao de mais 3 dias se justificado.
      4. Template padronizado de plano de acao: responsavel, descricao da acao, prazo,
         indicador de conclusao, validacao prevista pela auditoria.
      5. Revisao de qualidade (QA) de 10-15% dos papeis de trabalho pelo propio
         diretor de auditoria ou revisor designado.
    tools:
      - audit-management-system
      - quality-management
      - workflow-engine
