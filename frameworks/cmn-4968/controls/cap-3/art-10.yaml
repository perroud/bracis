id: art-10
family: cap-3
title: "Plano Anual de Auditoria"
class: CMN-4968
baselines: [todas-ifs]
statement:
  prose: |
    Art. 10. A atividade de auditoria interna deve ser baseada em plano de auditoria,
    elaborado com periodicidade anual, que contemple:

    I - os objetivos, o escopo e os recursos necessários para cada trabalho de auditoria
    previsto;

    II - o cronograma de realização dos trabalhos de auditoria;

    III - os critérios utilizados para a priorização das áreas, dos processos e das
    atividades incluídas no plano, com base na abordagem orientada a riscos;

    IV - a forma de cobertura do universo de auditoria no ciclo plurianual.
guidance:
  prose: |
    O art. 10 formaliza o plano anual de auditoria (PAA) como documento obrigatorio
    e estruturado. Nao e uma lista informal de incontencoes -- e um documento de
    governanca submetido e aprovado pelo CA.

    **Elaboracao anual (cabecalho):**
    O ciclo e anual: um novo plano para cada exercicio. Mas o plano deve ser dinamico:
    a resolucao permite e exige revisoes durante o ano para capturar riscos emergentes
    (ex: incidente de fraude, nova regulacao, fusao/aquisicao).

    **Objetivos e recursos (inciso I):**
    Cada trabalho previsto no plano deve ter: objetivo especifico, escopo definido e
    estimativa de horas/recursos necessarios. Isso permite ao CA avaliar se a equipe
    de auditoria tem capacidade para executar o plano proposto.

    **Cronograma (inciso II):**
    Distribuicao temporal dos trabalhos ao longo do ano, considerando sazonalidade
    (ex: auditoria de fechamento em dezembro, provisoes no 1T).

    **Criterios de priorizacao documentados (inciso III):**
    A avaliacao de riscos que fundamenta o plano deve ser documentada e apresentada
    ao CA. O CA precisa entender por que certas areas foram incluidas e outras
    postergadas -- e concordar com essa logica.

    **Ciclo plurianual (inciso IV):**
    Nenhuma area significativa pode ficar indefinidamente fora do escopo. O plano
    anual e parte de um ciclo plurianual (tipicamente 3-5 anos) que cobre o universo
    completo de auditoria.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma para gestao do plano anual:**
      1. Modulo de planejamento de auditoria no audit management system com campos
         obrigatorios: objetivo, escopo, recursos alocados, cronograma por trabalho.
      2. Workflow de aprovacao do plano: elaboracao pelo diretor de auditoria, revisao
         pelo comite de auditoria, aprovacao formal pelo CA com registro de data e ata.
      3. Modulo de ciclo plurianual: visualizacao da cobertura do universo de auditoria
         nos ultimos 3-5 anos e lacunas de cobertura.
      4. Controle de capacidade: calculo automatico de horas disponiveis vs. horas
         planejadas, alertando sobre sobrecargas ou subutilizacao de recursos.
      5. Processo de aditamento do plano: workflow para revisoes do PAA durante o ano,
         com registro de justificativa e aprovacao do CA.
    tools:
      - audit-management-system
      - workflow-engine
      - resource-planning
      - document-management
  devsecops:
    prose: |
      **Planejamento de auditoria de TI no PAA:**
      1. Incluir no PAA trabalhos especificos de auditoria de TI com escopo definido:
         ex: "Auditoria de gestao de acessos privilegiados", "Auditoria do pipeline
         de CI/CD", "Auditoria de seguranca cibernetica (Bacen 4.893)".
      2. Estimar horas para auditoria de TI com base no inventario de sistemas criticos
         e na maturidade dos controles avaliada na avaliacao de riscos.
      3. Cronograma de auditoria de TI considerando: janelas de menor atividade,
         periodos apos grandes releases de software, apos incidentes de seguranca.
      4. No ciclo plurianual: garantir cobertura de todos os sistemas criticos de TI
         a cada 2-3 anos no minimo.
    tools:
      - audit-management-system
      - cmdb
      - resource-planning
  secops:
    prose: |
      **Processo de elaboracao e aprovacao do PAA:**
      1. Definir calendario: inicio de elaboracao do PAA em setembro, aprovacao pelo CA
         em novembro, vigencia a partir de janeiro do ano seguinte.
      2. Elaborar o PAA com base na avaliacao de riscos atualizada: mapear risco por
         area e definir trabalhos priorizados por nivel de risco.
      3. Incluir no documento do PAA a secao de criterios de priorizacao, explicitando
         a metodologia de avaliacao de riscos utilizada.
      4. Apresentar o PAA ao comite de auditoria antes da submissao ao CA para pre-aprovacao.
      5. Documentar no PAA a cobertura plurianual projetada: quais areas serao auditadas
         nos proximos 3 anos e a logica de rotacao.
      6. Revisar o PAA trimestralmente: verificar execucao vs. planejado e propor
         ajustes ao CA quando necessario.
    tools:
      - audit-management-system
      - grc-platform
      - board-portal
