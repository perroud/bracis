id: art-12
family: cap-3
title: "Aprovacao e Revisao do Plano de Auditoria"
class: CMN-4968
baselines: [todas-ifs]
statement:
  prose: |
    Art. 12. O plano de auditoria deve ser aprovado pelo conselho de administração
    ou órgão equivalente antes do início de sua execução.

    § 1. O plano de auditoria deve ser revisado sempre que necessário para refletir
    mudanças nos riscos ou nas prioridades da instituição, sendo as revisões comunicadas
    ao conselho de administração ou órgão equivalente.

    § 2. O conselho de administração ou órgão equivalente deve avaliar periodicamente
    a consistência do plano de auditoria com os riscos relevantes da instituição.
guidance:
  prose: |
    O art. 12 estabelece o processo de aprovacao e governanca continuada do plano
    de auditoria. Tres pontos criticos:

    **Aprovacao previa (cabecalho):**
    O plano deve estar aprovado antes da execucao comecar. Nao e valido comecar
    trabalhos de auditoria sem plano aprovado. A aprovacao formal pelo CA cria
    o mandato da auditoria para o exercicio.

    **Revisoes durante o ano (paragrafo 1):**
    O mundo nao para em janeiro. Se um incidente critico ocorre em junho, a auditoria
    deve poder incluir uma revisao nao planejada. Mas isso exige comunicacao formal
    ao CA -- nao e decisao unilateral do diretor de auditoria.

    Gatilhos para revisao do plano:
    - Incidente relevante (fraude, vazamento de dados, falha de sistema critico)
    - Nova regulacao que exige auditoria de uma area especifica
    - Mudanca de estrategia da instituicao (novo produto, aquisicao, desinvestimento)
    - Resultado de auditoria que revela risco maior do que o avaliado em uma area adjacente
    - Rotatividade significativa de pessoal em areas criticas

    **Avaliacao periodica pelo CA (paragrafo 2):**
    O CA nao aprova o plano uma vez e esquece. Deve avaliar periodicamente se o plano
    continua alinhado com os riscos reais. Isso e governanca ativa, nao passiva.
    Recomenda-se avaliacao trimestral junto ao reporte de resultados de auditoria.
implementation_guidance:
  platform_engineering:
    prose: |
      **Workflow de aprovacao e gestao de revisoes:**
      1. Implementar workflow formal de aprovacao do PAA no audit management system:
         submissao digital pelo diretor, aprovacao formal pelo CA com assinatura eletronica
         e registro imutavel de data/hora de aprovacao.
      2. Versao aprovada do PAA deve ser arquivada em formato imutavel (PDF/A assinado),
         com hash criptografico para garantia de integridade.
      3. Workflow de aditamento do plano: formulario estruturado para solicitar revisao,
         justificativa, impacto em outros trabalhos e aprovacao do CA.
      4. Notificacoes automaticas ao CA quando o plano e submetido para aprovacao,
         com prazo de resposta configuravel.
      5. Historico de todas as versoes do PAA e seus aditamentos, mantido por no minimo
         5 anos (alinhado ao art. 19 sobre retencao).
    tools:
      - audit-management-system
      - document-management
      - e-signature
      - board-portal
  devsecops:
    prose: |
      **Revisao do plano por eventos de TI:**
      1. Configurar alertas no SIEM que automaticamente notificam o diretor de auditoria
         quando incidentes criticos de seguranca de TI ocorrem, como gatilho para
         avaliar necessidade de revisao do PAA.
      2. Integracao: quando vulnerabilidade critica (CVSS >= 9) e detectada em sistema
         em producao e nao remediada em X dias, notificacao automatica a auditoria.
      3. Processo de comunicacao ao CA de revisoes do plano por eventos de TI: template
         padronizado com descricao do evento, impacto avaliado e trabalho adicional proposto.
    tools:
      - siem
      - audit-management-system
      - board-portal
  secops:
    prose: |
      **Governanca do processo de aprovacao:**
      1. Incluir a aprovacao do PAA na agenda formal do CA: uma reuniao especifica
         para apresentacao e aprovacao do plano (recomendado: novembro/dezembro).
      2. Preparar apresentacao do PAA ao CA com: sumario executivo, principais riscos
         identificados, areas priorizadas, areas postergadas com justificativa,
         recursos necessarios e orcamento.
      3. Estabelecer SLA de resposta do CA para aprovacao do PAA: maximo 15 dias
         apos submissao pelo diretor de auditoria.
      4. Documentar em ata do CA a aprovacao do plano e o racional das discussoes.
      5. Realizar reuniao trimestral do CA para avaliacao de execucao do plano e
         alinhamento com riscos emergentes (paragrafo 2).
    tools:
      - board-portal
      - audit-management-system
      - document-management
