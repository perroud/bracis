id: art-11
family: cap-3
title: "Avaliacao de Riscos para o Plano de Auditoria"
class: CMN-4968
baselines: [todas-ifs]
statement:
  prose: |
    Art. 11. A elaboração do plano de auditoria deve ser fundamentada em avaliação de
    riscos realizada pela unidade de auditoria interna, que considere:

    I - o risco inerente das áreas, dos processos e das atividades da instituição;

    II - a qualidade e a efetividade dos controles internos existentes;

    III - os resultados de trabalhos de auditoria anteriores, incluindo as deficiências
    identificadas e o status de implementação das recomendações;

    IV - as expectativas do conselho de administração, da diretoria e de outras partes
    interessadas;

    V - as mudanças no ambiente de negócios, regulatório, operacional e tecnológico
    da instituição e do setor financeiro.
guidance:
  prose: |
    O art. 11 especifica os insumos obrigatorios para a avaliacao de riscos que
    fundamenta o plano de auditoria. E um processo estruturado, nao uma impressao
    intuitiva do diretor de auditoria.

    **Risco inerente (inciso I):**
    Avaliacao objetiva do risco de cada area sem considerar controles. Fatores a
    considerar: volume de transacoes, complexidade de produtos, historico de perdas,
    exposicao regulatoria, criticidade para a estrategia da instituicao.

    **Qualidade de controles (inciso II):**
    O risco residual = risco inerente - efetividade dos controles. Areas com risco
    inerente alto mas controles excelentes podem ter menor prioridade que areas com
    risco moderado mas controles frageis.

    **Historico de auditoria (inciso III):**
    Areas com achados recorrentes ou recomendacoes nao implementadas sao de maior
    risco e exigem acompanhamento prioritario. O historico e "memoria institucional"
    que o auditor nao pode ignorar.

    **Expectativas de partes interessadas (inciso IV):**
    O CA, a diretoria e reguladores podem ter preocupacoes especificas que devem
    ser consideradas no plano. Isso nao significa que a auditoria e "orientada" pela
    gestao -- significa que ela considera as perspectivas relevantes sem perder
    independencia na prioridade.

    **Mudancas no ambiente (inciso V):**
    Novos riscos emergem de: novos produtos (ex: crypto), mudancas regulatorias
    (ex: open finance), incidentes setoriais (ex: fraude em outro banco), mudancas
    tecnologicas (ex: migracao para cloud), ameacas ciberneticas emergentes.
implementation_guidance:
  platform_engineering:
    prose: |
      **Automatizacao da avaliacao de riscos:**
      1. Integracao da plataforma de auditoria com o sistema de GRC da instituicao para
         importar automaticamente a avaliacao de riscos da segunda linha (CMN 4.557).
      2. Scoring automatizado de risco inerente por area/sistema baseado em:
         volume de transacoes, criticidade, historico de incidentes, exposicao regulatoria.
      3. Dashboard de status de recomendacoes de auditoria: visualizacao em tempo real
         do percentual de recomendacoes implementadas por area.
      4. Feed automatico de noticias/alertas regulatorios para capturar mudancas de
         ambiente relevantes para a avaliacao de riscos.
      5. Modulo de consulta estruturada as partes interessadas (questionarios online)
         para capturar expectativas do CA e diretoria no processo de planejamento.
    tools:
      - grc-platform
      - audit-management-system
      - risk-scoring-engine
      - regulatory-watch-service
  devsecops:
    prose: |
      **Insumos de TI para a avaliacao de riscos:**
      1. Relatorio de vulnerabilidades abertas por sistema: integracao automatica com
         o scanner de vulnerabilidades para alimentar o scoring de risco de TI.
      2. Historico de incidentes de seguranca do SIEM: numero e gravidade de incidentes
         por sistema como insumo para risco inerente de TI.
      3. Metricas de debito tecnico e cobertura de testes: sistemas com alto debito
         tecnico tem maior risco inerente de TI.
      4. Status de patches e atualizacoes: sistemas desatualizados tem maior risco.
      5. Resultados de scans de seguranca anteriores: tendencia de melhora ou piora.
      Todos esses dados devem ser integrados automaticamente na avaliacao de riscos
      da auditoria interna.
    tools:
      - vulnerability-scanner
      - siem
      - sonarqube
      - patch-management
      - audit-management-system
  secops:
    prose: |
      **Processo de avaliacao de riscos para o PAA:**
      1. Executar avaliacao de riscos estruturada em setembro/outubro, antes da elaboracao
         do PAA, envolvendo toda a equipe de auditoria.
      2. Para cada area do universo de auditoria, documentar: risco inerente (1-5),
         qualidade dos controles (1-5), risco residual calculado e justificativa.
      3. Realizar entrevistas com o CA, diretoria e comite de auditoria para coletar
         preocupacoes e expectativas (inciso IV).
      4. Analisar mudancas no ambiente: novas normas do BCB/CMN/CVM publicadas nos
         ultimos 12 meses, incidentes setoriais, novos produtos lancados pela instituicao.
      5. Documentar toda a avaliacao de riscos como parte integrante do PAA, para
         apresentacao ao CA.
    tools:
      - audit-management-system
      - grc-platform
      - regulatory-watch-service
      - survey-tool
