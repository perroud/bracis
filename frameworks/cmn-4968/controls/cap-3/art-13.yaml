id: art-13
family: cap-3
title: "Recursos e Orcamento da Auditoria Interna"
class: CMN-4968
baselines: [todas-ifs]
statement:
  prose: |
    Art. 13. A instituição deve alocar recursos humanos, tecnológicos e financeiros
    suficientes para o desempenho da atividade de auditoria interna, compatível com
    o porte, a complexidade e o perfil de risco da instituição.

    Parágrafo único. A suficiência de recursos deve ser avaliada periodicamente pelo
    conselho de administração ou órgão equivalente, considerando o plano de auditoria
    e as demandas da atividade.
guidance:
  prose: |
    O art. 13 estabelece que a auditoria interna nao pode ser uma funcao subfinanciada.
    Recursos insuficientes comprometem a qualidade dos trabalhos e, em ultima instancia,
    a seguranca da instituicao.

    **Tres dimensoes de recursos (cabecalho):**
    1. Humanos: numero adequado de auditores com as competencias necessarias para
       cobrir o universo de auditoria na frequencia requerida pelo risco.
    2. Tecnologicos: ferramentas de auditoria adequadas (audit management system,
       ferramentas de data analytics, CAATs, acesso a sistemas).
    3. Financeiros: orcamento para pessoal, treinamento, ferramentas, viagens (auditorias
       presenciais), especialistas externos quando necessario.

    **Suficiencia avaliada pelo CA (paragrafo unico):**
    Nao e a diretoria que decide se a auditoria tem recursos suficientes -- e o CA.
    Isso evita que gestores cortem recursos da auditoria para reduzir custos ou
    para limitar a abrangencia das investigacoes.

    O CA deve avaliar suficiencia considerando:
    - Tamanho do universo de auditoria vs. capacidade da equipe
    - Complexidade dos temas (ex: auditoria de modelos de AI exige especialistas)
    - Resultados da avaliacao de riscos: mais riscos = mais recursos necessarios
    - Benchmarks de mercado (ex: razao de auditores/FTEs em bancos similares)

    **Implicacao regulatoria:**
    Se a auditoria interna nao consegue executar o plano aprovado por falta de recursos,
    isso e evidencia de governanca deficiente que o BCB pode questionar em inspeções.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura tecnologica adequada:**
      1. Audit management system com capacidade compativel ao volume de trabalhos
         da instituicao: numero de licencas, storage, desempenho de queries de analytics.
      2. Ferramentas de data analytics capazes de processar volumes de dados das
         operacoes da instituicao: Tableau, Power BI, ACL Analytics, IDEA, etc.
      3. Acesso a plataforma de teste de penetracao para auditoria de seguranca cibernetica
         (ambiente de sandbox, nao producao).
      4. Plataforma de gestao de evidencias com storage seguro e indexado.
      5. Ferramentas de colaboracao remota para trabalhos de auditoria em filiais.
      6. Dimensionamento anual da infraestrutura tecnologica de auditoria junto
         com o processo de aprovacao do PAA.
    tools:
      - audit-management-system
      - data-analytics-platform
      - evidence-management
      - collaboration-tools
  devsecops:
    prose: |
      **Recursos para auditoria de TI:**
      1. Licencas adequadas de ferramentas de auditoria de TI: scanners de vulnerabilidades,
         ferramentas de analise de logs, plataformas de pentest.
      2. Acesso a ambiente de treinamento/laboratorio para os auditores de TI praticarem
         tecnicas de auditoria sem impacto em producao.
      3. Subscricao a servicos de inteligencia de ameacas (threat intelligence) para
         manter a equipe de auditoria atualizada sobre ameacas emergentes.
      4. Orcamento para certificacoes de auditoria de TI (CISA, ISO 27001 Lead Auditor)
         e treinamentos tecnicos (cloud security, DevSecOps, AI security).
    tools:
      - vulnerability-scanner
      - threat-intelligence-platform
      - lms-platform
      - certification-tracker
  secops:
    prose: |
      **Gestao e avaliacao de suficiencia de recursos:**
      1. Elaborar anualmente dimensionamento de recursos necessarios para executar o PAA:
         horas por trabalho, competencias requeridas, custo estimado.
      2. Apresentar ao CA a analise de suficiencia de recursos junto com o PAA, incluindo
         gaps identificados e plano para supri-los (contratacao, terceirizacao, treinamento).
      3. Benchmark: comparar o ratio de auditores/FTEs totais com bancos de porte similar
         (referencia IIA: 1 auditor para cada 100-150 FTEs em bancos de medio porte).
      4. Monitorar mensalmente a taxa de execucao do plano vs. capacidade disponivel;
         se a taxa cair abaixo de 80%, escalar ao CA como sinal de insuficiencia de recursos.
      5. Incluir a avaliacao de suficiencia de recursos na pauta trimestral do CA.
    tools:
      - audit-management-system
      - resource-planning
      - hr-system
      - board-portal
