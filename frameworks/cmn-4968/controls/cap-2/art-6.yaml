id: art-6
family: cap-2
title: "Abordagem Baseada em Riscos"
class: CMN-4968
baselines: [todas-ifs]
statement:
  prose: |
    Art. 6. A atividade de auditoria interna deve ser desenvolvida com base em abordagem
    orientada a riscos, que consiste na priorização das áreas, processos e atividades
    de maior risco para a instituição, compreendendo:

    I - avaliação dos riscos relevantes da instituição, considerando os riscos inerentes,
    os controles existentes e o apetite ao risco da instituição;

    II - identificação das áreas, processos, atividades e sistemas de maior risco,
    para fins de priorização no planejamento dos trabalhos de auditoria;

    III - consideração do risco de auditoria na definição dos procedimentos de auditoria
    e do tamanho das amostras.
guidance:
  prose: |
    O art. 6 consagra o risk-based auditing como metodologia obrigatoria no Brasil.
    Nao e mais aceitavel o modelo de auditoria por ciclo fixo (ex: "auditamos credito
    todo ano independente do risco"); o ciclo deve ser guiado pelo risco.

    **Avaliacao de riscos (inciso I):**
    O ponto de partida e a avaliacao de riscos da instituicao como um todo. Os auditores
    nao fazem sua propria avaliacao do zero -- eles partem da avaliacao de riscos feita
    pela gestao (CMN 4.557) e pela segunda linha de defesa, e a confrontam criticamente.

    Componentes da avaliacao:
    - Risco inerente: o risco da area sem considerar controles (volatilidade, volume,
      complexidade, historico de perdas, mudancas regulatorias)
    - Controles existentes: qualidade e efetividade dos controles mitigadores
    - Risco residual: risco que permanece apos os controles
    - Apetite ao risco: niveis aceitos pela instituicao conforme aprovado pelo CA

    **Priorizacao (inciso II):**
    Areas de alto risco residual recebem mais atencao e frequencia de auditoria.
    Areas de baixo risco podem ter frequencia reduzida ou ser cobertas por
    procedimentos simplificados (ex: acompanhamento de indicadores sem visita fisica).

    **Risco de auditoria na execucao (inciso III):**
    Mesmo definida a area, o auditor calibra os procedimentos pelo risco:
    - Areas de alto risco: amostra maior, mais testes substantivos, maior documentacao
    - Areas de baixo risco: amostra menor, maior dependencia em testes de controles
    Isso otimiza o uso de recursos sem sacrificar qualidade onde mais importa.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura para abordagem baseada em riscos:**
      1. Plataforma de auditoria com modulo de avaliacao de riscos integrado, permitindo
         scoring automatizado de riscos por area/processo/sistema.
      2. Integracao com o sistema de GRC da instituicao para consumir a avaliacao de
         riscos da gestao (CMN 4.557) como base para a avaliacao da auditoria.
      3. Dashboard de calor de riscos (risk heatmap) atualizavel, vinculando risco
         avaliado ao planejamento de auditoria.
      4. Modulo de analytics para identificar anomalias e indicadores de risco em
         dados transacionais, auxiliando a priorizacao.
      5. Historico de avaliacao de riscos ao longo do tempo para identificar tendencias
         e areas com deterioracao de controles.
    tools:
      - grc-platform
      - audit-management-system
      - risk-scoring-engine
      - data-analytics-platform
  devsecops:
    prose: |
      **Risk-based auditing aplicado a TI:**
      1. Classificar sistemas de TI por nivel de risco: critico (producao, dados sensiveis),
         alto (sistemas de suporte a negocio), medio e baixo.
      2. Definir frequencia de auditoria de TI por nivel de risco:
         - Critico: auditoria anual ou continua via monitoramento
         - Alto: auditoria bienal com monitoramento continuo de KCIs
         - Medio/Baixo: auditoria trienal ou sob demanda (por incidente ou mudanca)
      3. Integracao de alertas do SIEM com o audit management system: eventos de
         seguranca criticos desencadeiam abertura automatica de trabalho de auditoria.
      4. Score de risco automatico para repositorios: baseado em cobertura de scans,
         vulnerabilidades abertas, frequencia de mudancas e criticidade do sistema.
    tools:
      - siem
      - audit-management-system
      - risk-scoring-engine
      - cmdb
  secops:
    prose: |
      **Implementacao da metodologia risk-based:**
      1. Desenvolver e documentar metodologia de avaliacao de riscos de auditoria
         com criterios explicitos de scoring para risco inerente e qualidade de controles.
      2. Executar avaliacao de riscos do universo de auditoria anualmente (antes de
         preparar o plano anual de auditoria).
      3. Documentar o racional de priorizacao no plano de auditoria: por que certas areas
         foram incluidas e outras postergadas, com base na avaliacao de riscos.
      4. Usar tecnicas de Data Analytics para identificar anomalias que sinalizem riscos
         nao evidentes na avaliacao qualitativa (ex: transacoes fora de padrao).
      5. Revisar a avaliacao de riscos trimestralmente para capturar eventos emergentes
         (novo produto, incidente de fraude, mudanca regulatoria, etc.).
    tools:
      - grc-platform
      - audit-management-system
      - data-analytics-platform
      - risk-assessment-tool
