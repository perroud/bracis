id: art-7
family: cap-2
title: "Escopo da Atividade de Auditoria Interna"
class: CMN-4968
baselines: [todas-ifs]
statement:
  prose: |
    Art. 7. A atividade de auditoria interna abrange, no mínimo:

    I - a avaliação da eficiência e da eficácia dos controles internos e dos sistemas
    de gerenciamento de riscos e de capital;

    II - a avaliação do cumprimento das políticas, dos procedimentos e das normas
    internas e externas aplicáveis;

    III - a avaliação da confiabilidade, da integridade e da tempestividade das
    informações financeiras e operacionais;

    IV - a avaliação da proteção dos ativos da instituição, incluindo ativos de
    informação e sistemas de tecnologia da informação;

    V - a avaliação da adequação dos processos de governança corporativa.
guidance:
  prose: |
    O art. 7 define o escopo minimo obrigatorio da auditoria interna. A palavra "minimo"
    e deliberada: a instituicao pode ampliar o escopo, mas nao pode restringi-lo abaixo
    desses cinco dominios.

    **Controles internos e gerenciamento de riscos (inciso I):**
    A auditoria interna e a terceira linha de defesa. Ela avalia se a primeira linha
    (negocio) e a segunda linha (riscos e compliance) estao funcionando. Isso inclui
    avaliar se o framework de riscos da CMN 4.557 esta implementado efetivamente.

    **Conformidade normativa (inciso II):**
    Auditoria de compliance: verificar se a instituicao cumpre suas proprias politicas
    e as normas do BCB, CMN, CVM, BACEN, LGPD, COAF, etc. Nao e funcao do compliance,
    mas a auditoria deve validar que o compliance esta funcionando.

    **Confiabilidade de informacoes (inciso III):**
    Auditoria de dados: verificar se os dados financeiros e operacionais sao corretos,
    completos e tempestivos. Inclui auditoria dos processos de reporte regulatorio
    (ex: SCR, CCS, PCAM, COSIF).

    **Protecao de ativos e TI (inciso IV):**
    Auditoria de TI com foco especifico em seguranca de ativos de informacao.
    Inclui avaliacao dos controles da Resolucao BCB 4.893 (seguranca cibernetica)
    e protecao de dados (LGPD).

    **Governanca corporativa (inciso V):**
    A auditoria interna avalia o proprio processo de governanca: funcionamento do CA,
    comites, segregacao de funcoes, etica e cultura de compliance.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma para cobertura do escopo minimo:**
      1. Modulo de auditoria de controles internos: avaliacao sistematica da efetividade
         de controles com registro de testes e resultados.
      2. Modulo de auditoria de TI: cobertura de controles de seguranca cibernetica,
         gestao de acessos, mudancas de sistemas e continuidade.
      3. Modulo de audit analytics: analise de dados financeiros e transacionais para
         identificar anomalias, erros e fraudes potenciais.
      4. Integracao com sistemas de informacao para extrato de dados para analise
         (contabilidade, credito, tesouraria, cambio, PIX).
      5. Dashboard de cobertura de escopo: visualizacao dos 5 dominios e percentual
         de cobertura no ciclo atual de auditoria.
    tools:
      - audit-management-system
      - data-analytics-platform
      - grc-platform
      - bi-platform
  devsecops:
    prose: |
      **Cobertura do inciso IV (protecao de ativos de TI):**
      1. Incluir no escopo de auditoria interna de TI a avaliacao de:
         - Controles de SAST/DAST/dependency scanning no pipeline
         - Gestao de vulnerabilidades: tempo de remediacao e cobertura
         - Controles de acesso ao codigo-fonte e ambientes
         - Gestao de segredos (secrets management)
         - Seguranca de containers e Kubernetes
      2. Auditoria de mudancas: revisar processo de aprovacao de merge requests,
         branch protection, code owners e assinatura de commits.
      3. Auditoria de cloud security posture: configuracoes de seguranca em AWS/GCP/Azure.
      4. Relatorio de auditoria de TI deve cobrir todos os controles GitLab Compliance
         Center aplicaveis a instituicao.
    tools:
      - gitlab-compliance-center
      - scanner-sast
      - scanner-dast
      - cloud-security-posture-management
      - secrets-management
  secops:
    prose: |
      **Garantia de cobertura do escopo minimo:**
      1. Mapear os 5 dominios do art. 7 a programas de auditoria especificos no plano
         anual, garantindo que todos estao cobertos no ciclo plurianual.
      2. Para o inciso I: avaliar a estrutura de gerenciamento de riscos da CMN 4.557
         como trabalho obrigatorio do ciclo de auditoria.
      3. Para o inciso II: incluir auditoria de compliance regulatorio com foco nas
         principais normas aplicaveis (BCB, CMN, CVM, COAF, LGPD, BACEN 4.893).
      4. Para o inciso III: incluir auditoria de qualidade de informacoes e reporte
         regulatorio (COSIF, SCR, CCS, DOC59, etc.).
      5. Para o inciso IV: incluir auditoria de TI e seguranca cibernetica com cobertura
         dos controles da Resolucao BCB 4.893.
      6. Para o inciso V: incluir avaliacao da governanca corporativa e funcionalidade
         dos orgaos de governanca (CA, comites).
    tools:
      - audit-management-system
      - grc-platform
      - compliance-management
