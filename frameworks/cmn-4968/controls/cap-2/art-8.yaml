id: art-8
family: cap-2
title: "Responsabilidades do Diretor de Auditoria Interna"
class: CMN-4968
baselines: [todas-ifs]
statement:
  prose: |
    Art. 8. A unidade de auditoria interna deve ser dirigida por profissional indicado
    pelo conselho de administração ou órgão equivalente, ao qual se reporta diretamente,
    cabendo-lhe:

    I - garantir a independência e a objetividade da atividade de auditoria interna;

    II - elaborar e submeter ao conselho de administração o plano de auditoria;

    III - coordenar a execução dos trabalhos de auditoria e supervisionar a equipe;

    IV - comunicar ao conselho de administração os resultados dos trabalhos de auditoria,
    incluindo as deficiências identificadas e as recomendações formuladas;

    V - acompanhar a implementação das recomendações de auditoria pelas áreas auditadas;

    VI - estabelecer e manter programa de garantia e melhoria da qualidade da atividade
    de auditoria interna.
guidance:
  prose: |
    O art. 8 define as responsabilidades do Chief Audit Executive (CAE) -- o termo
    internacional para o responsavel pela auditoria interna. A indicacao pelo conselho
    (nao pela diretoria executiva) reafirca a independencia estrutural.

    **Indicacao pelo conselho (cabecalho):**
    O processo de selecao e nomeacao do diretor de auditoria interna deve ser conduzido
    pelo CA ou pelo comite de auditoria, com criterios de competencia tecnica documentados.
    A diretoria executiva pode participar do processo, mas a decisao final e do CA.

    **Garantia de independencia (inciso I):**
    O diretor e o guardiao da independencia da funcao. Deve identificar e tratar
    ameacas a independencia: pressao de gestores para suavizar achados, limitacao
    de acesso a areas sensiveis, interferencia no escopo dos trabalhos.

    **Plano de auditoria ao CA (inciso II):**
    O plano nao e aprovado pela diretoria -- e submetido diretamente ao CA. Isso garante
    que a gestao nao possa excluir areas inconvenientes do escopo de auditoria.

    **Comunicacao de resultados ao CA (inciso IV):**
    Resultados de auditoria, incluindo achados criticos e deficiencias, vao diretamente
    ao CA -- nao apenas a diretoria. Isso e fundamental: a gestao nao filtra os achados
    que chegam ao conselho.

    **Programa de qualidade (inciso VI):**
    O QAIP (Quality Assurance and Improvement Program) e requisito do IIA e agora
    da CMN 4.968. Inclui avaliacoes internas continuas e avaliacoes externas periodicas.
implementation_guidance:
  platform_engineering:
    prose: |
      **Suporte tecnologico as responsabilidades do diretor:**
      1. Dashboard executivo do diretor de auditoria com visao consolidada: andamento
         do plano, status de trabalhos, achados abertos, implementacao de recomendacoes.
      2. Portal de comunicacao seguro para entrega de relatorios de auditoria diretamente
         ao CA e comite de auditoria (acesso restrito, com trilha de auditoria).
      3. Workflow de aprovacao do plano de auditoria: submissao formal pelo sistema
         ao CA, com registro de aprovacao e versao aprovada imutavel.
      4. Modulo de QAIP: registro de avaliacoes de qualidade, acoes de melhoria e
         resultados de avaliacoes externas.
    tools:
      - audit-management-system
      - board-portal
      - workflow-engine
      - document-management
  devsecops:
    prose: |
      **Acesso do diretor a informacoes de TI:**
      1. O diretor de auditoria deve ter acesso de leitura a todos os relatorios de
         compliance de TI: scans, vulnerabilidades, logs de pipeline.
      2. Configurar notificacoes automaticas ao diretor quando alertas criticos de
         seguranca de TI forem identificados (integracao SIEM -> audit management).
      3. Relatorios de auditoria de TI enviados automaticamente ao portal do CA
         apos aprovacao do diretor de auditoria.
      4. Rastreamento de recomendacoes de auditoria de TI com status de implementacao
         visivel ao diretor e ao CA.
    tools:
      - siem
      - audit-management-system
      - board-portal
      - issue-tracker
  secops:
    prose: |
      **Execucao das responsabilidades do diretor:**
      1. Formalizar em estatuto/charter as responsabilidades listadas no art. 8,
         com poderes explicitos de acesso a qualquer area, sistema e documento.
      2. Estabelecer calendario de reunioes do diretor de auditoria com o CA:
         minimo trimestral para reporte de resultados (mais urgente quando necessario).
      3. Implementar processo formal de escalacao: o diretor pode acionar o CA
         diretamente quando houver obstrucao de acesso ou pressao sobre a independencia.
      4. Documentar o QAIP (programa de qualidade): avaliacoes internas mensais/trimestrais
         e avaliacao externa pelo menos a cada 5 anos.
      5. Manter registro de todos os relatorios enviados ao CA com data, destinatario
         e conteudo (para fins de evidencia regulatoria).
    tools:
      - audit-management-system
      - board-portal
      - grc-platform
      - document-management
