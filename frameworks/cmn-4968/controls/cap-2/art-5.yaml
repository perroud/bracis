id: art-5
family: cap-2
title: "Competencia Tecnica e Profissionalismo"
class: CMN-4968
baselines: [todas-ifs]
statement:
  prose: |
    Art. 5. A atividade de auditoria interna deve ser executada por profissionais com
    competência técnica e profissionalismo adequados, o que inclui:

    I - conhecimento, habilidades e outras competências necessárias ao desempenho das
    responsabilidades individuais e coletivas da unidade;

    II - manutenção e aprimoramento contínuos do conhecimento, habilidades e competências
    por meio de desenvolvimento profissional contínuo;

    III - observância de normas profissionais aplicáveis, incluindo as emitidas por
    organismos nacionais e internacionais de auditoria interna reconhecidos.
guidance:
  prose: |
    O art. 5 estabelece que a auditoria interna deve ser exercida com competencia
    tecnica, nao apenas boa vontade ou disponibilidade. Isso tem implicacoes diretas
    na selecao, treinamento e avaliacao das equipes de auditoria.

    **Competencias coletivas (inciso I):**
    A unidade como um todo deve cobrir todos os dominios relevantes para a instituicao.
    Para uma instituicao financeira moderna, isso inclui:
    - Auditoria de processos financeiros (credito, tesouraria, cambio)
    - Auditoria de TI e seguranca cibernetica
    - Auditoria de compliance regulatorio (LGPD, CMN 4.557, Bacen 4.893)
    - Auditoria de controles internos e SOX (se aplicavel)
    - Auditoria de fornecedores e terceiros

    Nenhum auditor precisa dominar tudo; a coletividade da equipe deve cobrir os dominios.
    Para areas especializadas (ex: auditoria de modelos de risco), pode-se contratar
    especialistas externos pontualmente sem comprometer a independencia.

    **Desenvolvimento profissional continuo (inciso II):**
    O mercado financeiro e de TI muda continuamente. Auditores devem se atualizar em:
    - Novas normas regulatorias do BCB/CMN/CVM
    - Novas tecnologias (cloud, AI, open banking, PIX)
    - Novas ameacas ciberneticas e tecnicas de ataque
    - Evolucao das metodologias de auditoria (IIA, ISACA, AICPA)

    **Normas profissionais (inciso III):**
    O BCB reconhece implicitamente o framework do IIA (Institute of Internal Auditors)
    como referencia internacional. As normas internacionais de pratica profissional
    (IPPF - International Professional Practices Framework) do IIA sao o padrao
    de facto para auditoria interna no Brasil e no mundo.
implementation_guidance:
  platform_engineering:
    prose: |
      **Competencia tecnica em auditoria de TI:**
      1. Definir perfil tecnico minimo para auditores de TI: conhecimento em seguranca
         cibernetica, redes, sistemas operacionais, desenvolvimento de software e cloud.
      2. Ferramentas de auditoria de TI que os profissionais devem dominar: CAATs
         (Computer-Assisted Audit Techniques), ferramentas de analise de dados, SIEM.
      3. Plataforma de gestao de competencias para rastrear certificacoes e treinamentos
         da equipe de auditoria (CISA, CISSP, CIA, CFE, etc.).
      4. Acesso da equipe de auditoria a laboratorio de treinamento tecnico para
         praticar tecnicas de auditoria em ambiente controlado.
    tools:
      - lms-platform
      - competency-management
      - caat-tools
      - audit-data-analytics
  devsecops:
    prose: |
      **Competencias especificas para auditoria do ciclo de desenvolvimento:**
      1. Auditores de TI devem compreender o pipeline de CI/CD para auditar controles
         de desenvolvimento de software: revisao de codigo, testes, deployment.
      2. Capacitacao em interpretacao de resultados de scans de seguranca:
         SAST (SonarQube), DAST, dependency scanning, secret detection.
      3. Conhecimento de controles de compliance management platform relevantes para
         avaliacao de maturidade de seguranca do desenvolvimento.
      4. Habilidade para auditar IAM (gestao de identidade e acesso) em ambientes
         de cloud e Kubernetes.
      5. Certificacoes recomendadas para auditores de TI: CISA, ISO 27001 Lead Auditor,
         AWS/GCP/Azure Security Specialty.
    tools:
      - lms-platform
      - gitlab-audit-logs
      - sonarqube
      - certification-tracker
  secops:
    prose: |
      **Gestao de competencias da unidade de auditoria:**
      1. Elaborar matriz de competencias da unidade de auditoria, mapeando dominios
         necessarios vs. competencias atuais da equipe (gap analysis).
      2. Definir plano de desenvolvimento individual anual para cada auditor interno,
         com metas de certificacao e treinamento.
      3. Alocar orcamento especifico para treinamento e certificacoes da equipe de
         auditoria (recomendacao IIA: 40 horas/ano por auditor).
      4. Monitorar a conformidade com as normas profissionais do IIA (IPPF), incluindo
         aplicacao dos padroes de atributo e de desempenho.
      5. Realizar avaliacao de qualidade periodica (QAR - Quality Assurance Review),
         incluindo avaliacao externa pelo menos a cada 5 anos conforme IIA.
      6. Registrar treinamentos e certificacoes no sistema de gestao de competencias.
    tools:
      - grc-platform
      - lms-platform
      - competency-management
      - hr-system
