id: art-2
family: cap-1
title: "Definicoes da Atividade de Auditoria Interna"
class: CMN-4968
baselines: [todas-ifs]
statement:
  prose: |
    Art. 2. Para efeitos desta Resolução, define-se:

    I - atividade de auditoria interna: função de avaliação independente, estabelecida no
    âmbito da instituição, para examinar e avaliar as atividades desenvolvidas, com o objetivo
    de agregar valor e melhorar as operações da instituição;

    II - risco de auditoria: risco de que a atividade de auditoria interna expresse conclusão
    inadequada em decorrência de falhas de planejamento, execução ou documentação dos
    trabalhos de auditoria;

    III - universo de auditoria: conjunto de todas as áreas, processos, atividades e sistemas
    da instituição que podem ser objeto de auditoria interna;

    IV - programa de trabalho: documento que detalha os procedimentos a serem executados
    durante a realização de cada trabalho de auditoria interna.
guidance:
  prose: |
    O art. 2 fornece o vocabulario normativo da resolucao. Cada definicao tem implicacoes
    praticas na implementacao da funcao de auditoria interna.

    **Atividade de auditoria interna (inciso I):**
    A definicao e alinhada com o Institute of Internal Auditors (IIA). Tres elementos-chave:
    - Independencia: a unidade nao pode auditar o que ela mesma criou ou controla
    - Agregar valor: nao e apenas conformidade, mas melhoria continua das operacoes
    - Carater interno: e funcao da propria instituicao, diferente de auditoria externa

    **Risco de auditoria (inciso II):**
    O conceito e critico para o planejamento. Risco de auditoria tem tres componentes:
    - Risco inerente: risco proprio da area auditada independente dos controles
    - Risco de controle: risco de os controles internos nao detectarem erros materiais
    - Risco de deteccao: risco de os procedimentos de auditoria nao identificarem problemas

    **Universo de auditoria (inciso III):**
    Todo processo, sistema e atividade da instituicao e auditavel. Nao ha areas imunes
    a auditoria interna. O planejamento (art. 10) define quais areas serao auditadas no
    ciclo anual com base em avaliacao de riscos.

    **Programa de trabalho (inciso IV):**
    Cada trabalho individual de auditoria exige programa especifico documentando:
    objetivos, escopo, procedimentos, amostras, criterios de teste e responsaveis.
implementation_guidance:
  platform_engineering:
    prose: |
      **Implementacao das definicoes na plataforma de auditoria:**
      1. Cadastro do universo de auditoria na plataforma de GRC com todos os processos,
         sistemas e areas da instituicao catalogados e classificados por nivel de risco.
      2. Modelo de dados para representar risco de auditoria: campo de risco inerente,
         risco de controle e risco de deteccao por area auditada.
      3. Templates de programa de trabalho pre-configurados por tipo de auditoria
         (TI, credito, tesouraria, compliance, etc.) com checklist de procedimentos.
      4. Workflow de aprovacao de programas de trabalho antes do inicio de cada auditoria.

      **Rastreabilidade:**
      5. Linkage automatico entre universo de auditoria, plano anual, programas de trabalho
         e relatorios finais para rastreabilidade completa.
    tools:
      - grc-platform
      - audit-management-system
      - workflow-engine
  devsecops:
    prose: |
      **Universo de auditoria de TI:**
      1. Mapeamento de todos os sistemas de TI, pipelines e repositorios como parte do
         universo de auditoria da instituicao.
      2. Inventario automatico de sistemas via CMDB (Configuration Management Database)
         integrado com a plataforma de auditoria.
      3. Templates de programa de trabalho especificos para auditoria de TI cobrindo:
         controles de acesso, gestao de mudancas, continuidade, seguranca cibernetica.
      4. Coleta automatizada de evidencias de controles de TI (ex: logs de acesso,
         resultados de scans, aprovacoes de merge requests) para suporte a auditoria.
    tools:
      - cmdb
      - gitlab-audit-logs
      - audit-management-system
      - log-aggregator
  secops:
    prose: |
      **Aplicacao pratica das definicoes:**
      1. Elaborar e publicar internamente glossario de auditoria interna alinhado ao art. 2
         e ao IIA (Institute of Internal Auditors), em portugues.
      2. Mapear o universo de auditoria completo da instituicao, incluindo: areas de negocio,
         processos de suporte, sistemas de TI, fornecedores criticos e filiais.
      3. Definir metodologia de avaliacao de risco de auditoria por area, com criterios
         documentados para classificar risco inerente (alto/medio/baixo).
      4. Padronizar estrutura de programas de trabalho com elementos obrigatorios:
         objetivo, escopo, criterios, procedimentos, responsavel, prazo e referencias.
      5. Capacitar a equipe de auditoria nas definicoes e metodologia.
    tools:
      - grc-platform
      - document-management
      - training-platform
