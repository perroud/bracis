id: art-1
family: cap-1
title: "Objeto e Escopo da Resolucao"
class: CMN-4968
baselines: [todas-ifs]
statement:
  prose: |
    Art. 1. Esta Resolução dispõe sobre a atividade de auditoria interna a ser mantida pelas
    instituições financeiras e demais instituições autorizadas a funcionar pelo Banco Central
    do Brasil.

    Parágrafo único. A atividade de auditoria interna deve ser exercida por unidade específica,
    conforme disposto nesta Resolução.
guidance:
  prose: |
    O art. 1 estabelece o objeto da resolucao: regulamentar a atividade de auditoria interna
    nas instituicoes autorizadas pelo BCB. O alcance e amplo e inclui bancos multiplos,
    comerciais, de investimento, cooperativas de credito, sociedades de credito direto (SCD),
    sociedades de emprestimo entre pessoas (SEP), corretoras e demais autorizadas.

    **Unidade especifica obrigatoria:**
    O paragrafo unico determina que a auditoria interna deve ser exercida por uma unidade
    dedicada, ou seja, nao pode ser uma funcao informal ou atribuida ad hoc a qualquer
    colaborador. Isso estabelece a auditoria interna como funcao estruturada e permanente.

    **Proporcionalidade:**
    Embora a resolucao exija unidade especifica, a sofisticacao e o tamanho dessa unidade
    devem ser proporcionais ao porte, complexidade e perfil de risco da instituicao. Uma
    cooperativa de credito S5 pode ter uma pessoa dedicada; um banco S1 precisa de equipe
    robusta com especialistas setoriais.

    **Terceirizacao:**
    A resolucao permite, em determinadas condicoes (art. 19 e seguintes), a terceirizacao
    parcial da atividade de auditoria interna, desde que mantida a supervisao e responsabilidade
    institucional.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura dedicada para a funcao de auditoria interna:**
      1. Provisionamento de ambiente isolado para a unidade de auditoria interna, com acesso
         controlado aos sistemas da instituicao sem capacidade de modificacao (somente leitura).
      2. Plataforma de gerenciamento de auditoria (audit management system) para registro,
         acompanhamento e arquivo de trabalhos de auditoria.
      3. Segregacao de rede e permissoes: a equipe de auditoria nao deve ter acesso de escrita
         a sistemas de producao, apenas leitura para fins de exame.
      4. Repositorio de documentacao de auditoria com controle de versao e acesso restrito.

      **Integracao com sistemas core:**
      5. APIs de leitura para sistemas de contabilidade, credito, tesouraria e operacoes,
         permitindo que auditores extraiam dados sem interferir no ambiente produtivo.
      6. Ambiente de sandbox para testes de auditoria em dados anonimizados.
    tools:
      - audit-management-system
      - grc-platform
      - read-only-db-replica
      - document-management
  devsecops:
    prose: |
      **Auditoria interna de TI no ciclo de desenvolvimento:**
      1. A funcao de auditoria interna deve ter visibilidade sobre o pipeline de CI/CD,
         incluindo execucao de scans de seguranca e resultados de testes.
      2. Configuracao de dashboards somente-leitura para a equipe de auditoria visualizar
         metricas de qualidade e seguranca do software.
      3. Acesso somente-leitura a repositorios de codigo-fonte para revisao de controles
         implementados.
      4. Relatorios automatizados de conformidade do pipeline exportados para a plataforma
         de auditoria.
    tools:
      - gitlab-audit-logs
      - sonarqube
      - dependency-track
      - audit-management-system
  secops:
    prose: |
      **Estruturacao da funcao de auditoria interna:**
      1. Formalizar em estatuto interno (charter de auditoria) a criacao, missao, poderes
         e responsabilidades da unidade de auditoria interna.
      2. Definir organograma com posicionamento da unidade de auditoria interna reportando
         diretamente ao conselho de administracao ou comite de auditoria.
      3. Alocar recursos humanos dedicados, separados das areas de negocio e controle.
      4. Estabelecer politica de auditoria interna aprovada pelo conselho definindo escopo,
         metodologia e criterios de qualidade.
      5. Documentar formalmente a decisao sobre estrutura propria vs. terceirizada (ou hibrida),
         com justificativa baseada em analise de risco e proporcionalidade.
    tools:
      - grc-platform
      - document-management
      - org-chart-tool
