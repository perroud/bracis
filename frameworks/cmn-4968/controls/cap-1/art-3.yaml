id: art-3
family: cap-1
title: "Aplicabilidade e Proporcionalidade"
class: CMN-4968
baselines: [todas-ifs]
statement:
  prose: |
    Art. 3. As disposições desta Resolução aplicam-se a todas as instituições financeiras
    e demais instituições autorizadas a funcionar pelo Banco Central do Brasil, observada
    a proporcionalidade em relação ao porte, perfil de risco e complexidade das operações
    de cada instituição.

    Parágrafo único. O Banco Central do Brasil poderá estabelecer requisitos adicionais
    ou simplificados em função do porte, do modelo de negócio ou do perfil de risco
    da instituição.
guidance:
  prose: |
    O art. 3 consagra o principio da proporcionalidade, eixo fundamental do modelo
    regulatorio prudencial brasileiro. Nao existe um modelo unico de auditoria interna
    para todas as instituicoes: a resolucao estabelece um piso minimo que se expande
    conforme o porte e a complexidade da instituicao.

    **Segmentacao prudencial e auditoria interna:**
    O BCB classifica as instituicoes em segmentos de S1 a S5 com base em porte e
    relevancia sistemica. As expectativas de auditoria interna variam significativamente:

    - S1 (grandes bancos sistemicamente importantes): equipe robusta, especialistas
      setoriais (credito, mercado, TI, compliance), metodologia sofisticada, auditoria
      continua, comite de auditoria independente obrigatorio.
    - S2/S3: equipe dedicada com cobertura de todos os riscos relevantes, plano anual
      estruturado, relatorios periodicos ao conselho.
    - S4/S5 (cooperativas e microinstituicoes): equipe minima ou funcao compartilhada,
      plano simplificado, possibilidade ampliada de terceirizacao.

    **Parametro de avaliacao do BCB:**
    O paragrafo unico reserva ao BCB a competencia para ajustar requisitos por segmento,
    o que e feito por meio de comunicados, cartas-circulares e normas complementares.
    O auditor interno deve monitorar continuamente as normas do BCB aplicaveis ao seu
    segmento especifico.

    **Implicacao para o planejamento:**
    A proporcionalidade nao e isencao. Toda instituicao deve ter auditoria interna funcional.
    O que varia e a escala, sofisticacao e frequencia dos trabalhos.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura proporcional ao porte:**
      1. S1/S2: plataforma dedicada de audit management com modulos de GRC, workflow,
         reporting e analytics. Integracao via API com todos os sistemas core.
      2. S3/S4: plataforma de GRC compartilhada ou solucao SaaS de audit management,
         com modulos essenciais de planejamento, execucao e relatorio.
      3. S5: ferramenta simplificada (pode ser planilha avancada ou ferramenta leve de
         GRC) com controles minimos de documentacao e rastreabilidade.
      4. Em qualquer segmento: ambiente de armazenamento seguro para documentacao
         de auditoria com controle de acesso e retencao minima de 5 anos.
    tools:
      - grc-platform
      - audit-management-system
      - document-management
      - cloud-storage
  devsecops:
    prose: |
      **Escopo de auditoria de TI proporcional:**
      1. S1/S2: cobertura integral de auditoria de TI incluindo: desenvolvimento de software,
         operacoes de infraestrutura, seguranca cibernetica, gestao de fornecedores de TI.
         Frequencia: anual para todas as areas criticas, continua para areas de alto risco.
      2. S3/S4: auditoria de TI cobrindo sistemas criticos e controles de seguranca basicos.
         Frequencia: anual para sistemas criticos.
      3. S5: revisao simplificada de controles de TI, focada em acesso e continuidade.
      4. Definir criterios de criticidade de sistemas de TI na metodologia de auditoria.
    tools:
      - audit-management-system
      - cmdb
      - siem
  secops:
    prose: |
      **Calibragem da estrutura de auditoria ao perfil da instituicao:**
      1. Realizar avaliacao de proporcionalidade documentada: mapear porte, segmento BCB,
         perfil de risco e complexidade operacional para definir estrutura adequada.
      2. Documentar formalmente a estrutura escolhida e a justificativa de proporcionalidade
         para apresentacao ao BCB em eventuais supervisoes.
      3. Revisar a calibragem da estrutura anualmente ou quando houver mudanca relevante
         no porte, modelo de negocio ou perfil de risco.
      4. Monitorar comunicados do BCB sobre requisitos especificos por segmento.
      5. Garantir que mesmo a estrutura minima (S5) atenda aos requisitos essenciais:
         plano de auditoria, execucao documentada e reporte ao conselho.
    tools:
      - grc-platform
      - regulatory-watch-service
      - document-management
