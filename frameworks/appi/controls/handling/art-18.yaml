id: art-18
family: handling
title: "Restriction on Utilization Beyond the Purpose"
class: APPI
baselines:
  - privacy-baseline

statement:
  prose: |
    (1) A business operator handling personal information shall not handle personal
    information beyond the scope necessary to achieve the purpose of utilization
    without obtaining the prior consent of the data subject, except in the following
    cases:
    (i) Cases based on laws and regulations;
    (ii) Cases in which it is necessary for the protection of the life, body, or
    property of an individual and it is difficult to obtain the consent of the data
    subject;
    (iii) Cases in which it is especially necessary for improving public health or
    promoting the sound growth of children and it is difficult to obtain the consent
    of the data subject;
    (iv) Cases in which it is necessary to cooperate with a national organ or a local
    government, or a person entrusted thereby, in executing affairs prescribed by laws
    and regulations, and obtaining the consent of the data subject would impede the
    execution of said affairs.

    (2) When a business operator handling personal information has succeeded to
    personal information from another business operator through merger or other
    succession, it shall not handle such personal information beyond the scope
    necessary to achieve the purpose of utilization that existed prior to the
    succession, without obtaining the prior consent of the data subject, except in
    the cases listed in the items of the preceding paragraph.

guidance:
  prose: |
    Article 18 enforces purpose limitation as a binding constraint. Personal
    information may only be used for the specified purpose unless one of the four
    enumerated exceptions applies, or the data subject has given prior consent for
    the new purpose. The exceptions are narrowly defined and cover legal obligations,
    protection of life, public health, and government cooperation. Notably, legitimate
    interest (as recognized under the GDPR) is not an independent legal basis under
    the APPI. In the context of corporate mergers or acquisitions, the successor
    entity inherits the original purpose of utilization and cannot expand it without
    fresh consent.

implementation_guidance:
  platform_engineering:
    prose: |
      Enforce purpose limitation at the infrastructure level through policy
      engines. Implement attribute-based access control (ABAC) that validates
      the requester's declared purpose against the data's authorized purposes.
      Build purpose inheritance logic for data derived from personal
      information — derived datasets inherit the purpose limitations of their
      source data. Create automated workflows for consent collection when
      new purposes are required.
    tools:
      - open-policy-agent
      - kyverno
      - backstage
      - keycloak

  devsecops:
    prose: |
      Enforce purpose limitation in code through static analysis rules that
      detect unauthorized data access patterns. Require purpose declarations
      in data access code annotations. Validate that database queries include
      purpose context in CI/CD pipeline checks. Block deployments that
      introduce new data usage without corresponding purpose declarations.
    tools:
      - gitlab-ci
      - semgrep
      - sonarqube
      - checkov

  secops:
    prose: |
      Detect and alert on data access patterns that violate purpose
      limitations. Implement anomaly detection for unusual data access by
      services or users. Maintain an audit trail of all purpose-boundary
      violations for regulatory reporting. Review purpose limitation
      compliance during M&A due diligence processes.
    tools:
      - splunk
      - elastic-siem
      - wazuh
      - servicenow

legal_references:
  - framework_id: gdpr
    articles: ["art-5", "art-6"]
    relationship: equivalent-to
  - framework_id: pipl
    articles: ["art-6", "art-7"]
    relationship: mapped
