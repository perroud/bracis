id: art-17
family: handling
title: "Specifying the Purpose of Utilization"
class: APPI
baselines:
  - privacy-baseline

statement:
  prose: |
    (1) A business operator handling personal information shall specify the purpose
    of utilization of personal information (hereinafter referred to as the "purpose of
    utilization") as specifically as possible when handling personal information.

    (2) A business operator handling personal information shall not change the purpose
    of utilization beyond the scope that is reasonably considered to be related to the
    purpose of utilization before the change.

guidance:
  prose: |
    Article 17 requires purpose specification, which is the cornerstone of APPI
    compliance. The purpose must be specific enough that the data subject can
    reasonably foresee how their information will be used. Vague statements such as
    "to improve our services" are insufficient. The 2022 amendment further clarified
    that purposes involving profiling or automated decision-making must be specifically
    disclosed. Changes to the purpose of utilization are permitted only if they fall
    within a scope reasonably related to the original purpose — this is narrower than
    some interpretations allow, and any material change typically requires fresh
    consent or notification.

implementation_guidance:
  platform_engineering:
    prose: |
      Implement a purpose-of-utilization registry as a centralized service.
      Each data processing activity must declare its purpose and be linked to
      the corresponding consent or legal basis. Build purpose limitation
      enforcement into data access APIs — services may only access personal
      information for their declared purpose. Integrate purpose checks into
      data pipeline orchestration to prevent purpose creep.
    tools:
      - backstage
      - datahub
      - open-policy-agent
      - apache-atlas

  devsecops:
    prose: |
      Require purpose-of-utilization declarations in service manifests and
      API specifications. Validate in CI/CD that data access patterns align
      with declared purposes. Implement automated tests that verify services
      do not access personal information outside their declared scope. Review
      data flow diagrams as part of merge request approval processes.
    tools:
      - gitlab-ci
      - semgrep
      - spectral
      - swagger-cli

  secops:
    prose: |
      Monitor data access logs to detect access patterns inconsistent with
      declared purposes of utilization. Alert on services accessing personal
      information categories outside their declared scope. Conduct periodic
      audits comparing actual data usage against purpose-of-utilization
      declarations. Track changes to purpose declarations and verify
      corresponding consent updates.
    tools:
      - splunk
      - elastic-siem
      - datahub
      - servicenow

legal_references:
  - framework_id: gdpr
    articles: ["art-5", "art-6"]
    relationship: equivalent-to
  - framework_id: pipl
    articles: ["art-6"]
    relationship: mapped
