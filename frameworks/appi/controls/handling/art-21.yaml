id: art-21
family: handling
title: "Notification of Purpose of Utilization upon Acquisition"
class: APPI
baselines:
  - privacy-baseline

statement:
  prose: |
    (1) When having acquired personal information, a business operator handling
    personal information shall promptly notify the data subject of the purpose of
    utilization or publicly announce the purpose of utilization, except in the
    following cases:
    (i) Cases in which the purpose of utilization has been publicly announced in
    advance;
    (ii) Cases in which notification to or public announcement of the purpose of
    utilization to the data subject may harm the life, body, property, or other rights
    or interests of the data subject or a third party;
    (iii) Cases in which notification to or public announcement of the purpose of
    utilization to the data subject may harm the rights or legitimate interests of the
    business operator handling personal information;
    (iv) Cases in which it is necessary to cooperate with a national organ or a local
    government in executing affairs prescribed by laws and regulations, and
    notification to or public announcement of the purpose of utilization to the data
    subject would impede the execution of such affairs.

    (2) Notwithstanding the provisions of the preceding paragraph, when a business
    operator handling personal information acquires personal information through the
    conclusion of a contract or other similar means directly from the data subject in
    writing (including electronic or magnetic records), it shall expressly state the
    purpose of utilization to the data subject in advance; provided, however, that
    this does not apply in cases in which there is an urgent need to protect the life,
    body, or property of an individual.

    (3) When having changed the purpose of utilization, a business operator handling
    personal information shall notify the data subject of the changed purpose of
    utilization or publicly announce the changed purpose of utilization.

guidance:
  prose: |
    Article 21 mandates transparency about data use at the point of collection. There
    are two tiers: (1) for indirect collection, notification or public announcement is
    required promptly after acquisition; (2) for direct collection via contracts or
    written means, the purpose must be expressly stated in advance. This creates a
    higher transparency standard for direct interactions. Privacy policies on websites
    typically satisfy the "public announcement" requirement, but only if they are
    specific enough per Article 17. The 2022 amendment added requirements around
    notifying data subjects when their information is used for profiling or is combined
    with information from other sources.

implementation_guidance:
  platform_engineering:
    prose: |
      Build privacy notice delivery into all data collection touchpoints.
      Implement a centralized privacy notice management system that ensures
      consistency across channels (web, mobile, API, in-person). Create
      templated notice components that automatically include the declared
      purpose of utilization from the purpose registry. Build versioned
      privacy policies with change tracking and notification capabilities
      for purpose changes.
    tools:
      - backstage
      - onetrust
      - cookiebot
      - contentful

  devsecops:
    prose: |
      Enforce that all data collection forms and API endpoints include
      privacy notice references in merge request reviews. Validate that
      direct collection mechanisms (forms, contracts) include purpose of
      utilization statements before data submission. Test privacy notice
      rendering across all supported platforms and locales. Automate
      verification that privacy notices reference current purpose
      declarations.
    tools:
      - gitlab-ci
      - cypress
      - playwright
      - semgrep

  secops:
    prose: |
      Monitor compliance with notice delivery requirements across all
      collection channels. Alert on data collection occurring without
      corresponding privacy notices. Audit that purpose-of-utilization
      changes are properly communicated to affected data subjects. Track
      notice delivery rates and investigate failures.
    tools:
      - splunk
      - elastic-siem
      - onetrust
      - servicenow

legal_references:
  - framework_id: gdpr
    articles: ["art-13", "art-14"]
    relationship: equivalent-to
  - framework_id: pipl
    articles: ["art-17"]
    relationship: mapped
