id: art-20
family: handling
title: "Proper Acquisition of Personal Information"
class: APPI
baselines:
  - privacy-baseline

statement:
  prose: |
    (1) A business operator handling personal information shall not acquire personal
    information by deception or other improper means.

    (2) A business operator handling personal information shall not acquire special
    care-required personal information without obtaining the prior consent of the data
    subject, except in the following cases:
    (i) Cases based on laws and regulations;
    (ii) Cases in which it is necessary for the protection of the life, body, or
    property of an individual and it is difficult to obtain the consent of the data
    subject;
    (iii) Cases in which it is especially necessary for improving public health or
    promoting the sound growth of children and it is difficult to obtain the consent
    of the data subject;
    (iv) Cases in which it is necessary to cooperate with a national organ or a local
    government, or a person entrusted thereby, in executing affairs prescribed by laws
    and regulations, and obtaining the consent of the data subject would impede the
    execution of said affairs;
    (v) Cases in which the special care-required personal information has been made
    public by the data subject, a national organ, a local government, or other person
    prescribed by the Rules of the Personal Information Protection Commission;
    (vi) Other cases prescribed by Cabinet Order as being equivalent to those listed in
    each of the preceding items.

guidance:
  prose: |
    Article 20 prohibits acquiring personal information through deception, fraud,
    or coercion. This applies to both direct collection from data subjects and
    indirect acquisition from third parties. For special care-required personal
    information (sensitive data such as health records, race, criminal history), prior
    consent is mandatory with only narrow exceptions. The 2022 amendment strengthened
    this by requiring business operators to confirm the lawfulness of the source when
    acquiring personal data from third parties, effectively creating a due diligence
    obligation on the data supply chain.

implementation_guidance:
  platform_engineering:
    prose: |
      Implement consent management infrastructure that captures and stores
      consent records with timestamps, scope, and method of acquisition.
      Build data intake pipelines that require provenance verification before
      ingesting third-party data. Deploy consent gates at all data collection
      points — web forms, APIs, mobile SDKs. Ensure special care-required
      personal information collection triggers enhanced consent workflows.
    tools:
      - backstage
      - onetrust
      - cookiebot
      - keycloak

  devsecops:
    prose: |
      Validate that all data collection endpoints include consent mechanisms
      in code reviews and CI/CD pipeline checks. Enforce that forms and APIs
      collecting special care-required personal information implement explicit
      consent flows. Scan for third-party SDKs or libraries that may collect
      personal information without proper consent mechanisms.
    tools:
      - gitlab-ci
      - semgrep
      - eslint
      - snyk

  secops:
    prose: |
      Monitor data acquisition channels for anomalous or unauthorized data
      collection. Audit consent records for completeness and validity. Detect
      instances where special care-required personal information is acquired
      without corresponding consent records. Investigate third-party data
      sources for compliance with proper acquisition requirements.
    tools:
      - splunk
      - elastic-siem
      - onetrust
      - servicenow

legal_references:
  - framework_id: gdpr
    articles: ["art-6", "art-9"]
    relationship: equivalent-to
  - framework_id: pipl
    articles: ["art-13"]
    relationship: mapped
