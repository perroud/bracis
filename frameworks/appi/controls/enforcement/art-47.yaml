id: art-47
family: enforcement
title: "Safety Management Measures and Supervision of Employees and Contractors"
class: APPI
baselines:
  - privacy-baseline

statement:
  prose: |
    Article 23 (Safety management measures): A business operator handling personal
    information shall take necessary and appropriate measures for the security control
    of personal data, including preventing the leakage, loss, or damage of personal
    data.

    Article 24 (Supervision of employees): A business operator handling personal
    information shall exercise necessary and appropriate supervision over its employees
    to ensure the security control of personal data.

    Article 25 (Supervision of contractors): When a business operator handling personal
    information entrusts a third party with the handling of personal data, in whole or
    in part, it shall exercise necessary and appropriate supervision over the
    contractor to ensure the security control of the entrusted personal data. Such
    supervision includes selecting an appropriate contractor, entering into necessary
    contracts, and confirming the status of measures taken by the contractor.

    The Personal Information Protection Commission has issued guidelines specifying
    that safety management measures must address the following domains:
    (i) Formulation of basic policies;
    (ii) Organizational safety management measures (appointment of a responsible
    person, establishment of handling rules, regular audits);
    (iii) Human resource safety management measures (employee training, confidentiality
    obligations);
    (iv) Physical safety management measures (access control to facilities, device
    management);
    (v) Technical safety management measures (access control, encryption, monitoring,
    vulnerability management);
    (vi) Understanding of the foreign environment when handling personal data in a
    foreign country.

guidance:
  prose: |
    Articles 23-25 (renumbered in the 2022 consolidated text as Articles 47-49 in
    some reference systems) establish the security framework for personal data. The PPC
    guidelines provide detailed implementation requirements across six domains. The
    2022 amendment added the sixth domain — understanding the foreign data handling
    environment — requiring business operators to assess and document the data
    protection regime of any foreign country where personal data is processed. The
    contractor supervision obligation extends throughout the entire chain of
    subcontracting, requiring the original business operator to maintain oversight even
    when processing is re-delegated.

implementation_guidance:
  platform_engineering:
    prose: |
      Implement comprehensive security controls across all six PPC-defined
      domains. Deploy infrastructure-as-code security baselines that enforce
      encryption at rest and in transit, network segmentation, and access
      control for personal data stores. Implement secrets management for
      all credentials and API keys. Build automated compliance dashboards
      that track adherence to PPC safety management guidelines. Deploy
      vulnerability scanning across all infrastructure components.
    tools:
      - hashicorp-vault
      - terraform
      - open-policy-agent
      - kyverno
      - falco
      - trivy

  devsecops:
    prose: |
      Integrate security scanning into CI/CD pipelines covering SAST, DAST,
      dependency scanning, container scanning, and IaC scanning. Enforce
      code review requirements for changes affecting personal data handling.
      Implement secret detection to prevent credential leakage. Validate
      encryption configurations for data stores containing personal data.
      Enforce role-based access control in application code.
    tools:
      - gitlab-ci
      - semgrep
      - trivy
      - gitleaks
      - checkov
      - tfsec
      - snyk

  secops:
    prose: |
      Monitor for data leakage, unauthorized access, and security incidents
      affecting personal data. Implement intrusion detection and response
      capabilities. Conduct regular security audits covering all six PPC
      safety management domains. Monitor employee access patterns for
      anomalies. Audit contractor security measures and data handling
      practices. Maintain incident response procedures specific to personal
      data breaches.
    tools:
      - splunk
      - elastic-siem
      - wazuh
      - falco
      - prisma-cloud
      - crowdstrike

