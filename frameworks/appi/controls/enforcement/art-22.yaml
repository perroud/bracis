id: art-22
family: enforcement
title: "Data Breach Notification and Penal Provisions"
class: APPI
baselines:
  - privacy-baseline

statement:
  prose: |
    Article 22-2 (Notification of data breach): When a situation prescribed by the
    Rules of the Personal Information Protection Commission as likely to harm the
    rights and interests of individuals has occurred with respect to personal data
    handled by a business operator handling personal information, the business operator
    shall report to the Personal Information Protection Commission and notify the data
    subject to that effect, pursuant to the Rules of the Personal Information
    Protection Commission.

    The Rules of the Personal Information Protection Commission prescribe the
    following categories of reportable breaches:
    (i) Leakage or likely leakage of special care-required personal information;
    (ii) Leakage or likely leakage of personal data that may cause property damage
    through unauthorized use (e.g., credit card numbers, login credentials);
    (iii) Leakage or likely leakage involving wrongful intent (e.g., unauthorized
    access, ransomware);
    (iv) Leakage or likely leakage affecting more than 1,000 individuals.

    Preliminary report: Must be submitted to the PPC within approximately 3-5 days
    of becoming aware of the breach.
    Full report: Must be submitted to the PPC within 30 days (60 days for breaches
    involving wrongful intent) of becoming aware of the breach.

    Penal provisions (Articles 83-87):
    Article 83: Any person who has provided or used personal information databases,
    etc. for the purpose of seeking illicit profits shall be punished by imprisonment
    of not more than one year or a fine of not more than 500,000 yen, or both.
    Article 84: Any person who has violated an order issued by the Commission pursuant
    to Article 42, paragraph (2) or (3) shall be punished by imprisonment of not more
    than one year or a fine of not more than 1,000,000 yen.
    Article 87: When the representative of a corporation, or an agent, employee, or
    other worker of a corporation or an individual has committed a violation prescribed
    in any of the preceding articles in connection with the business of the corporation
    or individual, the corporation shall be punished by a fine of not more than
    100,000,000 yen (JPY 100 million) in addition to the punishment of the offender.

guidance:
  prose: |
    The 2022 amendment made data breach notification mandatory — previously it was only
    recommended by PPC guidelines. There are four categories of reportable breaches,
    and the timeline is strict: preliminary report within 3-5 days, full report within
    30 days (60 for malicious breaches). Data subjects must also be notified. The penal
    provisions are significant: while individual penalties are modest, the corporate
    fine of up to JPY 100 million (approximately USD 670,000) was introduced in the
    2022 amendment as a deterrent against organizational failures. The PPC can also
    issue compliance orders, and violation of such orders carries criminal penalties.
    This represents a substantial increase in enforcement power compared to the
    original Act.

implementation_guidance:
  platform_engineering:
    prose: |
      Implement automated breach detection and response infrastructure.
      Deploy data loss prevention (DLP) systems that detect unauthorized
      data exfiltration in real-time. Build automated breach assessment
      workflows that classify incidents against the four PPC-defined
      categories. Implement automated PPC reporting templates with
      pre-populated fields. Create a breach notification pipeline that
      can identify and notify affected data subjects at scale. Maintain
      a breach register with full incident documentation.
    tools:
      - splunk
      - elastic-siem
      - pagerduty
      - opsgenie
      - backstage

  devsecops:
    prose: |
      Implement security monitoring hooks in CI/CD pipelines that detect
      potential data exposure events during deployment. Deploy automated
      vulnerability scanning that flags critical issues in personal data
      handling code. Implement canary detection mechanisms for credential
      exposure. Build breach simulation and tabletop exercise infrastructure
      to test incident response capabilities.
    tools:
      - gitlab-ci
      - trivy
      - gitleaks
      - snyk
      - falco

  secops:
    prose: |
      Implement 24/7 breach detection and monitoring. Maintain incident
      response playbooks specific to APPI breach notification requirements
      including PPC reporting timelines. Conduct regular breach simulation
      exercises. Monitor dark web and threat intelligence feeds for
      indications of data exposure. Maintain relationships with PPC for
      incident reporting. Track regulatory enforcement actions for
      compliance lessons.
    tools:
      - splunk
      - elastic-siem
      - crowdstrike
      - pagerduty
      - servicenow
      - wazuh

