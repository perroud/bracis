id: art-26
family: xborder
title: "Confirmation and Record of Receipt of Personal Data from Third Parties"
class: APPI
baselines:
  - privacy-baseline

statement:
  prose: |
    (1) When a business operator handling personal information receives personal data
    from a third party, it shall confirm the following matters in accordance with the
    Rules of the Personal Information Protection Commission:
    (i) The name and address of the third party, and in the case of a corporation, the
    name of its representative;
    (ii) The circumstances under which the third party acquired the personal data.

    (2) When a business operator handling personal information receives personal data
    pursuant to the preceding paragraph, it shall create and maintain a record of the
    following matters in accordance with the Rules of the Personal Information
    Protection Commission:
    (i) The date of receipt;
    (ii) The matters confirmed pursuant to the items of the preceding paragraph;
    (iii) The name of the data subject and other matters prescribed by the Rules of the
    Personal Information Protection Commission as being sufficient to identify the
    retained personal data pertaining to the data subject;
    (iv) The items of personal data received;
    (v) When the data subject has given consent pursuant to paragraph (1) of
    Article 23, the purport thereof.

    (3) A business operator handling personal information shall maintain the records
    prescribed in the preceding paragraph for a period prescribed by the Rules of the
    Personal Information Protection Commission.

guidance:
  prose: |
    Article 26 creates the counterpart obligation to Article 25 — recipients of
    personal data must verify the source and create records of receipt. This imposes
    due diligence on data recipients: they must confirm the provider's identity and
    the circumstances of data acquisition (i.e., was the data lawfully obtained?). The
    2022 amendment strengthened this by requiring recipients to confirm that the
    provider had lawful authority to transfer the data, effectively making recipients
    co-responsible for data provenance. Records must be retained for the PPC-prescribed
    period. This bilateral record-keeping system enables end-to-end traceability of
    personal data flows.

implementation_guidance:
  platform_engineering:
    prose: |
      Build a data intake governance pipeline that enforces provenance
      verification before ingesting third-party personal data. Implement
      automated source verification checks that validate the provider's
      identity and data acquisition circumstances. Create receipt records
      automatically at data ingress points with all required fields.
      Maintain a registry of approved data providers with their verified
      credentials and data acquisition methods.
    tools:
      - kafka
      - datahub
      - backstage
      - elasticsearch
      - open-policy-agent

  devsecops:
    prose: |
      Enforce that all data intake APIs and pipelines include provenance
      verification steps. Validate that receipt records are generated for
      every third-party data ingestion. Test that provenance verification
      rejects data from unverified sources. Implement schema validation
      ensuring receipt records contain all required fields including consent
      status.
    tools:
      - gitlab-ci
      - postman
      - newman
      - semgrep

  secops:
    prose: |
      Monitor data intake channels for personal data received without
      corresponding receipt records or provenance verification. Alert on
      data from unregistered providers. Audit data provenance claims by
      cross-referencing receipt records with provider provision records.
      Detect patterns of data acquisition that may indicate unlawful
      sourcing.
    tools:
      - splunk
      - elastic-siem
      - onetrust
      - servicenow

legal_references:
  - framework_id: gdpr
    articles: ["art-30"]
    relationship: mapped
  - framework_id: pipl
    articles: ["art-55"]
    relationship: mapped
