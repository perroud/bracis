id: art-30
family: rights
title: "Right to Request Disclosure of Retained Personal Data"
class: APPI
baselines:
  - privacy-baseline

statement:
  prose: |
    (1) A data subject may request that a business operator handling personal
    information disclose the retained personal data that can identify the data
    subject. In this case, the business operator shall, pursuant to procedures
    established by the Rules of the Personal Information Protection Commission,
    disclose the retained personal data to the data subject without delay.

    (2) The disclosure pursuant to the preceding paragraph shall be made by a method
    prescribed by the Rules of the Personal Information Protection Commission,
    including the provision of electromagnetic records; provided, however, that if
    making such disclosure by the requested method would require a large expenditure
    or is otherwise difficult, the disclosure may be made in writing.

    (3) When a business operator handling personal information decides not to disclose
    all or part of the retained personal data pursuant to any of the following items,
    it shall promptly notify the data subject to that effect and the reason:
    (i) Cases in which the disclosure is likely to harm the life, body, property, or
    other rights or interests of the data subject or a third party;
    (ii) Cases in which the disclosure is likely to seriously impede the proper
    implementation of the business of the business operator handling personal
    information;
    (iii) Cases in which the disclosure would violate other laws or regulations.

    (4) When, pursuant to the provisions of other laws and regulations, all or part of
    the retained personal data is disclosed to the data subject by a method equivalent
    to the disclosure prescribed in paragraph (1), the business operator handling
    personal information may decide not to disclose all or part of such retained
    personal data.

guidance:
  prose: |
    Article 30 establishes the data subject's right to disclosure (access), a
    fundamental privacy right under the APPI. The 2022 amendment significantly
    expanded this right by requiring electronic/digital disclosure when requested,
    rather than limiting it to written copies. Business operators must respond
    "without delay" — while no specific deadline is set in the statute, PPC guidance
    indicates that two weeks is a reasonable timeframe, with extensions possible for
    complex requests. The right has narrow exceptions for harm to the data subject or
    third parties, serious business impediment, or legal conflicts.

implementation_guidance:
  platform_engineering:
    prose: |
      Build a data subject access request (DSAR) fulfillment platform.
      Implement automated data discovery across all personal information
      databases to locate retained personal data for a given data subject.
      Provide data export in machine-readable formats (JSON, CSV) and
      electromagnetic record delivery options. Build workflow automation
      for DSAR processing with tracking, approval, and delivery stages.
      Implement a self-service portal for data subjects to submit and
      track disclosure requests.
    tools:
      - backstage
      - datahub
      - onetrust
      - custom-dsar-api

  devsecops:
    prose: |
      Ensure all services implement data export endpoints for DSAR
      fulfillment. Validate that database schemas support efficient retrieval
      of retained personal data by data subject identifier. Test DSAR
      fulfillment workflows in CI/CD pipelines including response time SLAs.
      Verify that data export includes all retained personal data categories
      across all systems.
    tools:
      - gitlab-ci
      - postman
      - newman
      - playwright

  secops:
    prose: |
      Monitor DSAR fulfillment timelines and alert on requests approaching
      deadlines. Maintain audit trails for all DSAR processing activities
      including decisions to deny disclosure. Track DSAR volumes and response
      times for regulatory reporting. Investigate and document all denial
      decisions with supporting justification per Article 30(3).
    tools:
      - servicenow
      - jira
      - splunk
      - onetrust

