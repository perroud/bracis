id: art-37
family: rights
title: "Right to Request Disclosure of Third-Party Provision Records"
class: APPI
baselines:
  - privacy-baseline

statement:
  prose: |
    (1) A data subject may request that a business operator handling personal
    information disclose records created pursuant to Article 25 (records of provision
    to third parties) and Article 26 (records of receipt from third parties) that
    pertain to the data subject's retained personal data.

    (2) When a business operator handling personal information has received a request
    pursuant to the preceding paragraph, it shall disclose the records to the data
    subject without delay; provided, however, that the business operator may decide
    not to disclose all or part of the records in any of the following cases:
    (i) Cases in which disclosure is likely to harm the life, body, property, or other
    rights or interests of the data subject or a third party;
    (ii) Cases in which disclosure is likely to seriously impede the proper
    implementation of the business of the business operator;
    (iii) Cases in which disclosure would violate other laws or regulations.

    (3) When a business operator handling personal information has decided not to
    disclose all or part of the records pursuant to the preceding paragraph, it shall
    promptly notify the data subject to that effect and the reason.

guidance:
  prose: |
    Article 37, introduced in the 2022 amendment, grants data subjects the right to
    see who their data has been shared with — a transparency mechanism for the
    third-party provision ecosystem. Business operators must maintain records under
    Articles 25 and 26 documenting every instance of providing or receiving personal
    data from third parties, and data subjects can now access these records. This is
    more granular than the GDPR's requirement to disclose categories of recipients,
    as it requires disclosure of actual provision records. The same narrow exceptions
    apply as for the general disclosure right under Article 30.

implementation_guidance:
  platform_engineering:
    prose: |
      Build a third-party provision audit log system that records all
      instances of providing or receiving personal data from third parties.
      Implement a searchable index of provision records by data subject
      identifier. Create APIs that enable data subjects to request and
      receive their third-party provision history. Store provision records
      with immutable audit trails including timestamps, recipients, data
      categories, and legal basis.
    tools:
      - backstage
      - datahub
      - elasticsearch
      - onetrust

  devsecops:
    prose: |
      Enforce that all third-party data exchange integrations generate
      provision records in the audit log. Validate provision record
      completeness in integration tests. Test that provision record
      disclosure APIs return accurate and complete data. Implement
      schema validation for provision records to ensure required fields
      are captured.
    tools:
      - gitlab-ci
      - postman
      - newman
      - semgrep

  secops:
    prose: |
      Monitor provision record generation to detect gaps — third-party
      data transfers without corresponding records. Alert on disclosure
      requests for provision records and track fulfillment. Audit provision
      records for completeness and accuracy on a periodic basis. Investigate
      discrepancies between observed data flows and recorded provisions.
    tools:
      - splunk
      - elastic-siem
      - onetrust
      - servicenow

legal_references:
  - framework_id: gdpr
    articles: ["art-15"]
    relationship: mapped
  - framework_id: pipl
    articles: ["art-44"]
    relationship: mapped
