id: art-35
family: rights
title: "Right to Request Cessation of Use, Erasure, or Cessation of Provision to Third Parties"
class: APPI
baselines:
  - privacy-baseline

statement:
  prose: |
    (1) When retained personal data is being handled in violation of Article 18 or
    has been acquired in violation of Article 20, or when retained personal data is
    being provided to a third party in violation of Article 23, paragraph (1), or
    Article 24, the data subject may request that the business operator handling
    personal information cease using or erase such retained personal data, or cease
    providing it to a third party.

    (2) In addition to the cases set forth in the preceding paragraph, when a data
    subject's retained personal data is no longer necessary to be utilized for
    achieving the purpose of utilization, when the situation prescribed in Article 22-2
    (data breach notification) has occurred with respect to the retained personal data,
    or when there is any other reason by which the handling of the retained personal
    data is likely to harm the rights or legitimate interests of the data subject, the
    data subject may request that the business operator handling personal information
    cease using or erase such retained personal data, or cease providing it to a third
    party.

    (3) When a business operator handling personal information has found that a request
    pursuant to paragraph (1) or paragraph (2) has merit, it shall, without delay,
    cease using, erase, or cease providing to a third party the retained personal data
    to the extent necessary to redress the violation or address the situation.
    Provided, however, that when such cessation of use, erasure, or cessation of
    provision to a third party would require a large expenditure or is otherwise
    difficult, and alternative measures necessary to protect the rights and interests
    of the data subject can be taken, the business operator may take such alternative
    measures.

    (4) When the business operator has taken the measures pursuant to the preceding
    paragraph or has decided not to do so, it shall promptly notify the data subject
    to that effect and the reason.

guidance:
  prose: |
    Article 35, significantly expanded in the 2022 amendment, grants data subjects the
    right to erasure and cessation of use — equivalent to the GDPR's "right to be
    forgotten" but with broader trigger conditions. The 2022 amendment added three new
    grounds: (1) data no longer needed for its purpose, (2) a data breach has occurred,
    and (3) any handling that may harm the data subject's rights. This is a substantial
    expansion from the original version, which only covered violations of Articles 18,
    20, 23, and 24. The business operator may take alternative measures if cessation is
    disproportionately costly, but must justify this decision.

implementation_guidance:
  platform_engineering:
    prose: |
      Implement a data erasure and cessation pipeline that can locate and
      remove personal data across all systems. Build cascading deletion
      capabilities that propagate erasure requests to all downstream systems,
      backups, and third-party recipients. Implement data retention policies
      as code that automatically trigger erasure when data is no longer needed
      for its purpose. Create a cessation of third-party provision mechanism
      that can halt data flows to specific recipients.
    tools:
      - backstage
      - datahub
      - onetrust
      - debezium
      - custom-erasure-api

  devsecops:
    prose: |
      Implement erasure endpoints in all services that store retained personal
      data. Validate cascading deletion through integration tests that verify
      data is removed from all storage locations. Test that third-party data
      flows can be halted per-recipient. Ensure backup erasure processes are
      tested and documented.
    tools:
      - gitlab-ci
      - postman
      - newman
      - playwright

  secops:
    prose: |
      Monitor erasure request processing and verify complete data removal
      across all systems. Alert on data that persists after an approved
      erasure request. Audit third-party cessation to confirm data flows
      have been halted. Track data breach events that trigger automatic
      notification to affected data subjects about their expanded cessation
      rights.
    tools:
      - servicenow
      - jira
      - splunk
      - elastic-siem
      - onetrust

