id: art-33
family: rights
title: "Right to Request Correction, Addition, or Deletion"
class: APPI
baselines:
  - privacy-baseline

statement:
  prose: |
    (1) When a data subject has found, as a result of disclosure pursuant to
    Article 30, paragraph (1), that the retained personal data contains information
    that is not true, the data subject may request that the business operator handling
    personal information make a correction, addition, or deletion (hereinafter referred
    to as "correction, etc.") of the content of the retained personal data to the
    extent necessary to achieve the purpose of utilization.

    (2) When a business operator handling personal information has received a request
    under the preceding paragraph, it shall, except in cases in which special
    procedures are prescribed by other laws and regulations for making the requested
    correction, etc., conduct a necessary investigation without delay, and on the basis
    of the results, make the correction, etc. of the content of the retained personal
    data.

    (3) When a business operator handling personal information has made the correction,
    etc. of the content of the retained personal data pursuant to the preceding
    paragraph in whole or in part, or has decided not to make the correction, etc., it
    shall promptly notify the data subject to that effect (including the content of the
    correction, etc. if it has been made) and the reason in cases where it has decided
    not to make the correction, etc.

guidance:
  prose: |
    Article 33 grants data subjects the right to rectification of inaccurate personal
    data. This right is conditional on the data subject first exercising the right to
    disclosure under Article 30 — the request must be based on information found to be
    untrue. The business operator must investigate and either make the correction or
    explain its refusal. The scope of correction is limited to what is necessary for
    the purpose of utilization. Unlike the GDPR's right to rectification, which is
    unconditional, the APPI ties correction to accuracy relative to the declared
    purpose.

implementation_guidance:
  platform_engineering:
    prose: |
      Extend the DSAR platform to support correction, addition, and deletion
      requests. Implement data correction workflows that propagate changes
      across all systems storing the affected retained personal data. Build
      audit trails that capture the before and after states of corrected data.
      Ensure data correction cascades to downstream systems, derived datasets,
      and backup systems within defined timeframes.
    tools:
      - backstage
      - datahub
      - onetrust
      - debezium

  devsecops:
    prose: |
      Implement correction APIs in all services that manage retained personal
      data. Validate that data correction propagates correctly through
      integration tests. Ensure database schemas support correction audit
      trails (before/after values with timestamps). Test that correction
      requests are processed within SLA timeframes.
    tools:
      - gitlab-ci
      - postman
      - newman
      - flyway

  secops:
    prose: |
      Monitor correction request processing timelines and alert on overdue
      requests. Audit that corrections propagate to all downstream systems.
      Track denial decisions and their justifications for regulatory review.
      Detect inconsistencies where corrected data has not been updated in
      all relevant systems.
    tools:
      - servicenow
      - jira
      - splunk
      - elastic-siem

legal_references:
  - framework_id: gdpr
    articles: ["art-16"]
    relationship: equivalent-to
  - framework_id: pipl
    articles: ["art-46"]
    relationship: mapped
