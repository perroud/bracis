id: art-3
family: gen
title: "Extraterritorial Application and Scope"
class: APPI
baselines:
  - privacy-baseline

statement:
  prose: |
    This Act applies to a business operator handling personal information that has
    acquired personal information, etc. in connection with the provision of goods or
    services to a person in Japan, if such business operator handles such personal
    information, etc. in a foreign country. In such cases, the provisions of this Act
    relating to business operators handling personal information shall apply to such
    business operator handling personal information in respect of such handling of
    personal information, etc.

    The Personal Information Protection Commission may, with respect to a business
    operator handling personal information that falls under the preceding paragraph,
    exercise its authority under the provisions of this Act. When it is necessary to
    exercise such authority, the Commission may request the provision of information
    from foreign governments or take other necessary measures.

guidance:
  prose: |
    Article 3 (as amended in 2022) introduces extraterritorial application of the
    APPI, similar to the GDPR's Article 3. Any foreign business operator that handles
    personal information of individuals in Japan — whether through goods, services, or
    data processing — falls under APPI jurisdiction. The PPC has enforcement authority
    over foreign operators and can coordinate with foreign data protection authorities.
    This is a significant expansion from the original 2003 Act. Foreign operators must
    appoint a representative in Japan if they meet certain thresholds, and the PPC can
    issue orders and impose penalties on non-compliant foreign operators.

implementation_guidance:
  platform_engineering:
    prose: |
      Implement geo-detection and data residency controls to identify when
      personal information of Japan-based individuals is being processed.
      Deploy data sovereignty tagging that flags Japan-origin data for APPI
      compliance requirements. Ensure infrastructure-as-code templates
      include regional compliance checks. Maintain an inventory of services
      accessible from Japan and their data handling characteristics.
    tools:
      - terraform
      - pulumi
      - open-policy-agent
      - backstage

  devsecops:
    prose: |
      Integrate geographic scope checks into CI/CD pipelines for services
      accessible from Japan. Validate that application configurations include
      appropriate data handling controls for Japan-origin data. Enforce
      privacy-by-design reviews for new services targeting Japan-based users.
      Test data residency controls as part of deployment verification.
    tools:
      - gitlab-ci
      - checkov
      - tfsec
      - semgrep

  secops:
    prose: |
      Monitor network traffic and API access patterns to detect Japan-origin
      data flows. Maintain compliance dashboards showing which services
      process data of Japan-based individuals. Alert on unauthorized
      cross-border transfers of Japan-origin personal information. Track
      PPC regulatory actions and guidance relevant to extraterritorial
      application.
    tools:
      - splunk
      - elastic-siem
      - prisma-cloud
      - cloudflare

legal_references:
