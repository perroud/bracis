id: art-1
family: gen
title: "Purpose of the Act"
class: APPI
baselines:
  - privacy-baseline

statement:
  prose: |
    In view of the fact that the appropriate handling of personal information has
    become increasingly important in consideration of the significant increase in the
    use of personal information associated with the advancement of the information and
    communications technology of society in recent years, this Act aims to protect the
    rights and interests of individuals while taking into consideration the usefulness
    of personal information, by clarifying the responsibilities and obligations of the
    national government and local governments with respect to the proper handling of
    personal information, by providing for the basic matters concerning the protection
    of personal information, and by establishing obligations that business operators
    handling personal information, anonymously processed information, or
    pseudonymously processed information must comply with.

guidance:
  prose: |
    Article 1 establishes the foundational purpose of the APPI: balancing the
    protection of individual rights with the utility of personal information. This
    dual purpose is central to interpreting all other provisions. Unlike the GDPR,
    which is primarily rights-focused, the APPI explicitly recognizes the economic
    value of data. Business operators must understand that compliance is not merely
    about restriction but about enabling responsible data use. The 2022 amendment
    expanded scope to include pseudonymously processed information as a distinct
    category, reflecting the growing importance of data utility mechanisms.

implementation_guidance:
  platform_engineering:
    prose: |
      Establish a data governance platform that supports both privacy protection
      and data utility. Implement a centralized data catalog that classifies data
      by type (personal information, anonymously processed information,
      pseudonymously processed information). Provide self-service tools for data
      stewards to tag and manage data classifications. Integrate privacy-by-design
      principles into platform provisioning templates.
    tools:
      - datahub
      - openmetadata
      - backstage
      - apache-atlas

  devsecops:
    prose: |
      Embed data classification checks into CI/CD pipelines. Scan code and
      configuration for handling of personal information without proper
      classification. Enforce tagging of data stores with sensitivity labels.
      Implement automated checks that verify data handling code paths align
      with declared data classifications.
    tools:
      - gitlab-ci
      - semgrep
      - checkov
      - trivy

  secops:
    prose: |
      Monitor data access patterns across all systems to detect unauthorized
      handling of personal information. Maintain dashboards showing data
      classification coverage across the organization. Alert on unclassified
      data stores or data flows that handle personal information without
      proper governance controls.
    tools:
      - splunk
      - elastic-siem
      - datahub
      - prisma-cloud

legal_references:
  - framework_id: gdpr
    articles: ["art-1"]
    relationship: equivalent-to
  - framework_id: pipl
