id: art-2
family: gen
title: "Definitions — Personal Information and Individual Identification Codes"
class: APPI
baselines:
  - privacy-baseline

statement:
  prose: |
    (1) "Personal information" in this Act means information relating to a living
    individual that falls under either of the following items:
    (i) Information that can identify a specific individual by name, date of birth,
    or other description contained in the information (including information that can
    be readily collated with other information and thereby identify a specific
    individual);
    (ii) Information that contains an individual identification code.

    (2) "Individual identification code" means a character, letter, number, symbol, or
    other code prescribed by Cabinet Order that falls under either of the following
    items:
    (i) A code that is able to identify a specific individual and is obtained by
    converting a bodily characteristic of the individual into a code for use by
    computers (including DNA, facial features, iris, voiceprint, gait, vein patterns,
    and fingerprint/palmprint data);
    (ii) A code assigned for use in relation to the provision of a service or the
    purchase of goods that is allocated to enable identification of a specific user or
    purchaser (including passport number, basic pension number, driver's license
    number, My Number, and health insurance card number).

    (3) "Personal information database, etc." means a database or other collection of
    information arranged so as to be able to retrieve specific personal information by
    using a computer, or a collection of information that is systematically arranged so
    that specific personal information can be readily retrieved.

    (4) "Business operator handling personal information" means a business operator
    that uses a personal information database, etc. in connection with its business.

guidance:
  prose: |
    Article 2 defines the material scope of the APPI. "Personal information" is
    broadly defined and includes any information that can identify a living individual,
    either directly or through collation with other data. This is notably broader than
    some jurisdictions in that it includes biometric identifiers as "individual
    identification codes." The 2022 amendment clarified that even pseudonymized data
    may still constitute personal information if re-identification is possible. All
    business operators that maintain any personal information database fall under APPI
    obligations — there is no size threshold as existed before 2017.

implementation_guidance:
  platform_engineering:
    prose: |
      Build and maintain a personal information discovery and classification
      system. Implement automated scanning of databases, object stores, and
      application data to identify personal information and individual
      identification codes. Create a data inventory that maps all personal
      information databases and their business owners. Deploy data loss
      prevention (DLP) rules that detect individual identification codes
      (My Number, passport numbers, health insurance numbers).
    tools:
      - datahub
      - openmetadata
      - aws-macie
      - google-dlp
      - presidio

  devsecops:
    prose: |
      Integrate personal information detection into development workflows.
      Scan application schemas, API contracts, and test fixtures for personal
      information. Block commits that include individual identification codes
      in plaintext. Enforce encryption requirements for fields identified as
      personal information through schema validation in CI/CD pipelines.
    tools:
      - gitlab-ci
      - semgrep
      - gitleaks
      - detect-secrets
      - trivy

  secops:
    prose: |
      Continuously monitor for unregistered personal information databases.
      Detect shadow IT systems that may contain personal information outside
      the data inventory. Alert on data flows that transmit individual
      identification codes without encryption. Audit data classification
      accuracy on a quarterly basis.
    tools:
      - splunk
      - elastic-siem
      - aws-macie
      - prisma-cloud
      - wazuh

