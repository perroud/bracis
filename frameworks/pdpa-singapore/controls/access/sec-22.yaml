id: sec-22
family: access
title: "Correction of Personal Data"
class: PDPA-SG
baselines: [privacy-baseline]

statement:
  prose: |
    (1) An individual may request an organisation to correct an error or omission
    in the personal data about the individual that is in the possession or under
    the control of the organisation.

    (2) Unless the organisation is satisfied on reasonable grounds that a correction
    should not be made, the organisation shall —
    (a) correct the personal data as soon as practicable; and
    (b) send the corrected personal data to every other organisation to which the
    personal data was disclosed by the organisation within a year before the date
    the correction was made, unless that other organisation does not need the
    corrected personal data for any legal or business purpose.

    (3) Where the organisation is satisfied on reasonable grounds that a correction
    should not be made, the organisation shall, if requested by the individual,
    annotate the personal data in its possession or under its control with the
    correction that was requested but not made.

    (4) An organisation is not required to correct or annotate personal data under
    this section in respect of —
    (a) opinion data kept solely for an evaluative purpose; or
    (b) any examination conducted by an educational institution, examination scripts
    and examination results.

guidance:
  prose: |
    Section 22 grants individuals the right to request correction of inaccurate
    personal data. Key elements:

    1. **Correction obligation:** Organizations must correct errors or omissions
       "as soon as practicable" unless they have reasonable grounds to refuse.

    2. **Propagation requirement:** Corrected data must be sent to all organizations
       that received the data in the past year, unless those organizations no longer
       need it.

    3. **Annotation alternative:** If the organization refuses to correct, it must
       annotate the data with the individual's requested correction — preserving the
       individual's objection on record.

    4. **Limited exceptions:** Only evaluative opinions and educational examination
       data are exempt.

    The propagation requirement is particularly significant for organizations that
    share data with multiple third parties — they must maintain records of disclosures
    to fulfill this obligation.

references:
  - citation: "PDPA 2012, Section 22"
    url: "https://sso.agc.gov.sg/Act/PDPA2012"

implementation_guidance:
  platform_engineering:
    prose: |
      1. Build a correction request portal integrated with the access request system,
         allowing individuals to identify and request corrections to specific data fields.
      2. Implement correction propagation workflows that automatically notify and send
         corrected data to all organizations that received the data in the past year.
      3. Maintain a disclosure registry that tracks all third parties to whom personal
         data was disclosed, enabling targeted correction propagation.
      4. Build annotation capabilities — if correction is refused, the system records
         the requested correction alongside the original data.
      5. Create audit trails for all correction requests, decisions, propagation actions,
         and annotation records.
    tools:
      - dsar-automation
      - privacy-portal
      - disclosure-registry
      - event-driven-architecture
      - backstage

  devsecops:
    prose: |
      1. Test correction workflows end-to-end including propagation to downstream
         systems and third parties.
      2. Validate that annotation logic correctly appends individual's requested
         corrections without altering the original data.
      3. Verify that correction propagation reaches all registered disclosure
         recipients within the defined SLA.
      4. Implement data integrity tests to confirm corrections are consistently
         applied across all copies of the data.
    tools:
      - gitlab-ci
      - playwright
      - api-testing
      - data-integrity-validation

  secops:
    prose: |
      1. Monitor correction request fulfillment SLAs and propagation completion.
      2. Audit the disclosure registry quarterly for completeness — verify all
         third-party disclosures are tracked.
      3. Track correction refusal rates and review justifications for reasonableness.
      4. Verify that annotations are preserved and visible when data is accessed.
    tools:
      - dsar-tracking
      - compliance-dashboard
      - siem
      - audit-management

