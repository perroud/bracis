id: sec-24
family: protection
title: "Protection Obligation"
class: PDPA-SG
baselines: [privacy-baseline]

statement:
  prose: |
    An organisation shall protect personal data in its possession or under its
    control by making reasonable security arrangements to prevent —
    (a) unauthorised access, collection, use, disclosure, copying, modification,
    disposal or similar risks; and
    (b) the loss of any storage medium or device on which personal data is stored.

guidance:
  prose: |
    Section 24 is the PDPA's core security obligation. It requires organizations to
    implement "reasonable security arrangements" — a standard that is context-dependent
    and proportionate to:

    1. The nature and sensitivity of the personal data
    2. The potential harm from unauthorized access or disclosure
    3. The volume of personal data
    4. The cost and feasibility of security measures
    5. Industry standards and best practices

    The PDPC has issued Advisory Guidelines on Key Concepts that clarify "reasonable
    security arrangements" include both technical measures (encryption, access controls,
    firewalls, intrusion detection) and organizational measures (security policies,
    employee training, incident response procedures).

    The protection obligation covers the full lifecycle — from collection through
    storage, processing, transmission, and disposal. It applies to both electronic
    and physical data.

    This is one of the most frequently enforced provisions of the PDPA. The PDPC has
    imposed financial penalties for failures including unpatched systems, weak
    passwords, inadequate access controls, and failure to encrypt sensitive data.

references:
  - citation: "PDPA 2012, Section 24"
    url: "https://sso.agc.gov.sg/Act/PDPA2012"

implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement encryption at rest (AES-256) for all personal data stores including
         databases, object storage, backups, and logs.
      2. Enforce encryption in transit (TLS 1.2+) for all data transmissions containing
         personal data.
      3. Implement role-based access control (RBAC) with least-privilege principles for
         all systems containing personal data.
      4. Deploy intrusion detection and prevention systems (IDS/IPS) for networks
         handling personal data.
      5. Implement network segmentation to isolate personal data processing environments.
      6. Build centralized secrets management to prevent credential leakage.
      7. Implement automated patch management with SLAs for critical vulnerability
         remediation.
      8. Deploy data loss prevention (DLP) tools to detect unauthorized data exfiltration.
      9. Implement device management and encryption for storage media containing
         personal data.
    tools:
      - vault
      - aws-kms
      - gcp-kms
      - falco
      - calico
      - cilium
      - cert-manager
      - opa
      - backstage

  devsecops:
    prose: |
      1. Run SAST, DAST, and dependency scanning in CI/CD pipelines for all
         applications handling personal data.
      2. Implement secret detection to prevent credentials and encryption keys from
         being committed to repositories.
      3. Scan container images for vulnerabilities before deployment.
      4. Implement infrastructure-as-code scanning to detect insecure configurations.
      5. Run penetration tests quarterly against systems handling personal data.
      6. Validate encryption configurations in automated tests.
      7. Implement code review requirements with mandatory approval for changes to
         data-handling code.
    tools:
      - gitlab-ci
      - semgrep
      - trivy
      - grype
      - checkov
      - tfsec
      - gitleaks
      - zap

  secops:
    prose: |
      1. Monitor for unauthorized access attempts to personal data stores with
         real-time alerting.
      2. Implement 24/7 security monitoring with SIEM correlation rules for personal
         data breach indicators.
      3. Conduct vulnerability assessments monthly and penetration tests quarterly.
      4. Track patch compliance SLAs — critical patches within 7 days, high within
         30 days.
      5. Monitor for data exfiltration indicators (unusual data volumes, off-hours
         access, new export destinations).
      6. Audit access logs for personal data stores monthly.
      7. Maintain and test incident response procedures specific to personal data
         breaches.
    tools:
      - siem
      - elastic-siem
      - splunk
      - crowdstrike
      - qualys
      - nessus
      - dlp
      - soar

