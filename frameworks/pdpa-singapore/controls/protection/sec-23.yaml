id: sec-23
family: protection
title: "Accuracy Obligation"
class: PDPA-SG
baselines: [privacy-baseline]

statement:
  prose: |
    An organisation shall make a reasonable effort to ensure that personal data
    collected by or on behalf of the organisation is accurate and complete —
    (a) if the personal data is likely to be used by the organisation to make a
    decision that affects the individual to whom the personal data relates; or
    (b) if the personal data is likely to be disclosed by the organisation to
    another organisation.

guidance:
  prose: |
    Section 23 imposes an accuracy obligation that is triggered in two scenarios:

    1. **Decision-making:** When personal data will influence a decision affecting
       the individual (e.g., credit decisions, employment decisions, service eligibility).

    2. **Disclosure to third parties:** When personal data will be shared with other
       organizations.

    The obligation is to make "reasonable effort" — not to guarantee absolute accuracy.
    What constitutes reasonable effort depends on the context, the nature of the data,
    and the potential impact of inaccuracy.

    The PDPC has indicated that organizations should implement processes to verify data
    at the point of collection and periodically thereafter, particularly for data used
    in automated decision-making.

references:
  - citation: "PDPA 2012, Section 23"
    url: "https://sso.agc.gov.sg/Act/PDPA2012"

implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement data validation rules at collection points to catch common errors
         (format validation, range checks, referential integrity).
      2. Build data quality monitoring dashboards that track completeness, accuracy,
         and freshness of personal data across systems.
      3. Implement periodic data verification workflows — prompt individuals to
         review and confirm their data at regular intervals.
      4. Create data quality scores for personal data records, flagging records with
         low quality for review before use in decision-making or disclosure.
      5. Build pre-disclosure validation checks that verify data accuracy before
         sharing with third parties.
    tools:
      - great-expectations
      - dbt
      - datahub
      - data-quality-engine
      - backstage

  devsecops:
    prose: |
      1. Implement data validation tests in CI/CD pipelines for all data ingestion
         and transformation code.
      2. Create automated tests that verify data quality checks are in place for
         decision-making and disclosure workflows.
      3. Validate that data quality monitoring alerts are configured for all personal
         data stores.
      4. Test data verification prompts and correction workflows.
    tools:
      - gitlab-ci
      - great-expectations
      - dbt-test
      - data-validation

  secops:
    prose: |
      1. Monitor data quality metrics and investigate significant drops in accuracy
         or completeness.
      2. Audit decision-making processes quarterly to verify data accuracy checks
         are in place.
      3. Track data correction request volumes as an indicator of systemic accuracy
         issues.
      4. Review data quality reports before scheduled third-party disclosures.
    tools:
      - data-quality-monitoring
      - compliance-dashboard
      - siem
      - reporting-engine

