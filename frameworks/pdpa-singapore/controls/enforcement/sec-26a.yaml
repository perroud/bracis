id: sec-26a
family: enforcement
title: "Mandatory Data Breach Notification"
class: PDPA-SG
baselines: [privacy-baseline]

statement:
  prose: |
    (1) An organisation shall, on or after the appointed day, notify the Commission
    as soon as is practicable, but in any case no later than 3 calendar days after
    the day the organisation assesses the data breach to be a notifiable data breach.

    (2) A data breach is a notifiable data breach if the data breach —
    (a) results in, or is likely to result in, significant harm to an affected
    individual; or
    (b) is, or is likely to be, of a significant scale.

    (3) A data breach is of a significant scale if the number of affected individuals
    is 500 or more.

    (4) An organisation that has assessed a data breach to be a notifiable data breach
    under subsection (2)(a) shall also notify each affected individual in any manner
    that is reasonable in the circumstances.

    (5) The notification to the Commission must include —
    (a) the nature of the data breach;
    (b) the circumstances of the data breach;
    (c) the personal data or classes of personal data affected;
    (d) the number of affected individuals;
    (e) the potential harm to affected individuals;
    (f) what the organisation has done or intends to do to address the data breach;
    (g) whether the organisation has notified or intends to notify affected individuals
    and, if so, how; and
    (h) any other information prescribed by the Commission.

guidance:
  prose: |
    Section 26A (introduced by the 2021 amendments) establishes mandatory data breach
    notification — one of the most significant additions to the PDPA.

    Key requirements:

    1. **3-day notification deadline:** Organizations must notify the PDPC within 3
       calendar days of assessing a breach as notifiable. This is one of the shortest
       notification deadlines globally (GDPR allows 72 hours).

    2. **Notifiable breach triggers:**
       - Significant harm: breaches likely to result in significant harm to individuals
         (e.g., financial loss, identity theft, reputational damage)
       - Significant scale: breaches affecting 500 or more individuals

    3. **Individual notification:** If the breach triggers the significant harm test,
       affected individuals must also be notified.

    4. **Comprehensive notification content:** The notification must include detailed
       information about the breach, its scope, impact, and remediation measures.

    5. **Assessment obligation:** Organizations are expected to assess whether a breach
       is notifiable promptly — typically within 30 days of becoming aware of the
       breach.

    The PDPC may direct organizations to take specific remedial actions and can
    impose financial penalties for failure to notify.

references:
  - citation: "PDPA 2012, Sections 26A-26E"
    url: "https://sso.agc.gov.sg/Act/PDPA2012"

implementation_guidance:
  platform_engineering:
    prose: |
      1. Build a data breach management platform with detection, assessment, and
         notification workflows aligned to the 3-day notification deadline.
      2. Implement breach detection systems — SIEM correlation rules, anomaly
         detection, and data loss prevention alerts that trigger breach assessment.
      3. Create breach assessment frameworks with automated triage for significant
         harm and significant scale (500+ individuals) thresholds.
      4. Build PDPC notification templates pre-populated with required information
         elements (nature, circumstances, affected data, individual count, harm
         assessment, remediation steps).
      5. Implement individual notification systems capable of mass notification via
         email, SMS, and postal mail.
      6. Create a breach response timeline tracker with automated escalation at
         Day 1 and Day 2 after assessment.
      7. Build forensic evidence preservation capabilities to support breach
         investigations.
    tools:
      - incident-response-platform
      - siem
      - soar
      - breach-notification-engine
      - forensic-toolkit
      - backstage

  devsecops:
    prose: |
      1. Implement breach detection test scenarios in CI/CD — simulate breach
         conditions and verify detection alerts fire.
      2. Create breach notification integration tests — verify PDPC notification
         submissions are formatted correctly.
      3. Test individual notification delivery for various channels (email, SMS).
      4. Validate breach assessment logic against test cases for significant harm
         and significant scale thresholds.
      5. Run tabletop exercises as code — automated breach scenario simulations
         testing the full notification pipeline.
    tools:
      - gitlab-ci
      - chaos-engineering
      - notification-testing
      - incident-simulation

  secops:
    prose: |
      1. Maintain 24/7 breach detection and monitoring capabilities.
      2. Conduct breach response drills quarterly to verify the 3-day notification
         SLA can be met.
      3. Track mean time to detect (MTTD) and mean time to notify (MTTN) for
         all security incidents.
      4. Maintain relationships with the PDPC for notification submissions.
      5. Conduct post-incident reviews for all data breaches, documenting lessons
         learned and control improvements.
      6. Monitor threat intelligence feeds for indicators of compromise specific
         to the organization.
    tools:
      - siem
      - soar
      - incident-response-platform
      - threat-intelligence
      - compliance-dashboard

