id: sec-29
family: enforcement
title: "Powers of the PDPC — Directions and Enforcement"
class: PDPA-SG
baselines: [privacy-baseline]

statement:
  prose: |
    (1) The Commission may, on its own motion or on receiving a complaint, conduct
    an investigation to determine if an organisation is complying with the provisions
    of this Act.

    (2) If the Commission determines that an organisation is not complying with any
    provision of this Act, the Commission may give the organisation such directions
    as the Commission thinks fit to ensure compliance, including directions to —
    (a) stop collecting, using or disclosing personal data in contravention of
    this Act;
    (b) destroy personal data collected in contravention of this Act;
    (c) comply with any direction of the Commission;
    (d) pay a financial penalty of an amount not exceeding the higher of —
    (i) $1,000,000; or
    (ii) 10% of the organisation's annual turnover in Singapore, as determined in
    the prescribed manner, if the organisation's annual turnover in Singapore
    exceeds $10,000,000.

    (3) The Commission may require an organisation to conduct a review of its data
    protection policies, practices and procedures and provide a report of that
    review to the Commission.

    (4) An organisation that fails to comply with a direction of the Commission
    shall be guilty of an offence and shall be liable on conviction to a fine not
    exceeding $100,000 or to imprisonment for a term not exceeding 2 years or to
    both, and in the case of a continuing offence, to a further fine not exceeding
    $10,000 for every day or part of a day during which the offence continues after
    conviction.

guidance:
  prose: |
    Sections 28-48 establish the PDPC's enforcement powers. Key elements:

    1. **Investigation powers:** The PDPC can investigate on its own motion or upon
       complaint. It has powers to compel production of documents and attendance at
       hearings.

    2. **Directions:** The PDPC can issue binding directions requiring organizations
       to stop non-compliant processing, destroy data, or take other corrective actions.

    3. **Financial penalties (2021 enhancement):**
       - Up to SGD 1,000,000 for organizations with annual turnover below SGD 10M
       - Up to 10% of annual turnover in Singapore for organizations with turnover
         exceeding SGD 10M
       - This turnover-based penalty was introduced by the 2021 amendments, bringing
         Singapore closer to the GDPR's penalty regime

    4. **Criminal liability:** Failure to comply with PDPC directions is a criminal
       offence with fines up to SGD 100,000 and/or imprisonment up to 2 years.

    5. **Mandatory review:** The PDPC can require organizations to conduct and report
       on reviews of their data protection practices.

    The PDPC publishes enforcement decisions, creating a body of precedent that
    organizations should monitor and incorporate into their compliance programs.

references:
  - citation: "PDPA 2012, Sections 28-48"
    url: "https://sso.agc.gov.sg/Act/PDPA2012"

implementation_guidance:
  platform_engineering:
    prose: |
      1. Build a compliance management platform that tracks PDPA obligations, maps
         them to technical controls, and generates evidence of compliance.
      2. Implement automated compliance monitoring that continuously verifies data
         protection controls are operational.
      3. Create a regulatory response workflow — procedures and templates for
         responding to PDPC investigations, including document production.
      4. Build a data protection policy management system with version control,
         approval workflows, and distribution tracking.
      5. Implement compliance dashboards showing real-time status of all PDPA
         obligations.
    tools:
      - compliance-management
      - backstage
      - policy-engine
      - evidence-collection
      - grc-platform

  devsecops:
    prose: |
      1. Implement compliance-as-code — encode PDPA requirements as automated
         checks in CI/CD pipelines.
      2. Generate compliance evidence automatically from pipeline execution logs,
         test results, and deployment records.
      3. Create automated compliance reports that can be produced on demand for
         PDPC investigations.
      4. Validate that all data protection controls are tested and passing as part
         of every release.
    tools:
      - gitlab-ci
      - compliance-as-code
      - opa
      - audit-logging
      - evidence-generation

  secops:
    prose: |
      1. Monitor PDPC enforcement decisions and update compliance program to address
         new precedents and guidance.
      2. Conduct annual PDPA compliance audits using the PDPC's published assessment
         frameworks.
      3. Maintain a regulatory response team with defined roles, escalation paths,
         and communication templates for PDPC interactions.
      4. Track all PDPC inquiries, complaints, and investigations with full
         documentation of responses and outcomes.
      5. Conduct data protection impact assessments for new processing activities.
    tools:
      - grc-platform
      - compliance-dashboard
      - audit-management
      - regulatory-change-tracker
      - siem

