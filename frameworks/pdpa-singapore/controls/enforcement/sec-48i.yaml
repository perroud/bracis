id: sec-48i
family: enforcement
title: "Data Intermediary Obligations — Ninth Schedule"
class: PDPA-SG
baselines: [privacy-baseline]

statement:
  prose: |
    (1) A data intermediary that processes personal data on behalf of and for the
    purposes of another organisation pursuant to a contract which is evidenced or
    made in writing must —
    (a) make reasonable security arrangements to protect the personal data in its
    possession or under its control in order to prevent unauthorised access,
    collection, use, disclosure, copying, modification, disposal or similar risks;
    (b) not retain the personal data, or a document containing the personal data,
    for any period longer than is necessary for the purposes for which the personal
    data was processed on behalf of the other organisation.

    (2) For the purposes of subsection (1), a data intermediary processes personal
    data on behalf of another organisation only if the data intermediary processes
    the personal data solely for the purposes of and pursuant to its contract with
    the other organisation and does not process that data for its own purposes.

    (3) The organisation on whose behalf a data intermediary processes personal data
    shall be responsible for ensuring that the data intermediary complies with the
    obligations set out in subsection (1).

guidance:
  prose: |
    The Ninth Schedule (referenced by Section 4(6A)) imposes direct obligations on
    data intermediaries (processors). Key points:

    1. **Direct obligations:** Data intermediaries are directly bound by the protection
       obligation (Section 24) and retention limitation obligation (Section 25), even
       though other PDPA obligations fall on the contracting organization.

    2. **Written contract required:** The relationship must be evidenced by a written
       contract. Verbal processing agreements are insufficient.

    3. **Purpose restriction:** Data intermediaries must process data solely for the
       purposes specified in the contract. They cannot use the data for their own
       purposes.

    4. **Controller responsibility:** The contracting organization remains responsible
       for ensuring its data intermediaries comply. This creates a due diligence
       obligation in vendor selection and ongoing monitoring.

    This framework is functionally similar to the GDPR's controller-processor
    relationship, but with fewer prescriptive requirements for the content of the
    processing agreement.

references:
  - citation: "PDPA 2012, Ninth Schedule; Section 4(6A)"
    url: "https://sso.agc.gov.sg/Act/PDPA2012"

implementation_guidance:
  platform_engineering:
    prose: |
      1. Build a vendor management platform that tracks all data intermediaries,
         their contracts, processing scope, and compliance status.
      2. Implement automated vendor risk assessments that evaluate data intermediary
         security posture before onboarding.
      3. Create data processing agreement templates that include PDPA-required
         clauses (protection, retention, purpose limitation).
      4. Build monitoring dashboards for data intermediary compliance — track security
         certifications, audit reports, and incident history.
      5. Implement data flow tracking that maps personal data flows to and from
         each data intermediary.
    tools:
      - vendor-management
      - backstage
      - risk-assessment-platform
      - contract-management
      - data-flow-monitoring

  devsecops:
    prose: |
      1. Implement third-party dependency scanning to identify data intermediary
         SDKs and libraries processing personal data.
      2. Validate that API integrations with data intermediaries use approved
         endpoints and authentication methods defined in processing agreements.
      3. Test data flows to data intermediaries for scope compliance — verify only
         contracted data categories are transmitted.
      4. Scan for unauthorized data intermediary integrations in code.
    tools:
      - gitlab-ci
      - semgrep
      - dependency-scanning
      - api-contract-testing

  secops:
    prose: |
      1. Conduct annual security assessments of data intermediaries.
      2. Monitor data intermediary access patterns for anomalies indicating
         unauthorized processing.
      3. Track data intermediary security incidents and breach notifications.
      4. Audit data intermediary contracts annually for compliance with current
         PDPA requirements.
      5. Verify data intermediary retention practices — confirm data is deleted
         or returned upon contract termination.
    tools:
      - vendor-risk-management
      - siem
      - compliance-dashboard
      - audit-management

