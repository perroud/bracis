id: sec-31
family: dnc
title: "Do Not Call Registry — Prohibition on Specified Messages"
class: PDPA-SG
baselines: [privacy-baseline]

statement:
  prose: |
    (1) An organisation must not send any specified message to a Singapore telephone
    number that is listed in the applicable do not call register unless the
    organisation —
    (a) has obtained clear and unambiguous consent in evidenced form from the
    subscriber of that Singapore telephone number or the user of that Singapore
    telephone number for the sending of the specified message to that number; or
    (b) has an ongoing relationship with the subscriber or user.

    (2) In this Part —
    "specified message" means —
    (a) a voice call, whether live or by means of a voice recording, made to a
    Singapore telephone number to promote goods or services or to promote the
    supplier of those goods or services;
    (b) a text message (including an SMS message or MMS message) sent to a Singapore
    telephone number to promote goods or services or to promote the supplier of those
    goods or services; or
    (c) a fax message sent to a Singapore telephone number to promote goods or
    services or to promote the supplier of those goods or services.

    (3) The do not call registers are —
    (a) the no voice call register;
    (b) the no text message register; and
    (c) the no fax message register.

guidance:
  prose: |
    Part IV of the PDPA establishes the Do Not Call (DNC) Registry — a system
    allowing Singapore telephone number subscribers to register their preference not
    to receive unsolicited marketing messages.

    Key requirements:

    1. **Three registers:** Voice calls, text messages, and fax messages each have
       separate registers. Individuals can register for one or more.

    2. **Check before sending:** Organizations must check the relevant DNC register
       before sending marketing messages. Sending to a registered number without
       consent is an offence.

    3. **Consent exception:** If the organization has clear and unambiguous consent
       in evidenced form (not just verbal), the DNC restriction does not apply.

    4. **Ongoing relationship exception:** Organizations with an ongoing relationship
       (e.g., existing customers) may send messages, but this exception has limits
       and the individual can still opt out.

    Financial penalties for DNC violations can be up to SGD 1,000,000 per breach.
    The PDPC maintains the registry and provides a checking service for organizations.

references:
  - citation: "PDPA 2012, Sections 31-38"
    url: "https://sso.agc.gov.sg/Act/PDPA2012"

implementation_guidance:
  platform_engineering:
    prose: |
      1. Integrate the PDPC DNC Registry API into marketing automation systems to
         check numbers before sending any specified messages.
      2. Build an automated DNC checking workflow — all outbound marketing messages
         must pass DNC verification before dispatch.
      3. Implement consent management for marketing communications — track evidenced
         consent (written, electronic) separately from general PDPA consent.
      4. Build an ongoing relationship tracker that identifies which contacts qualify
         for the relationship exception and when the relationship lapses.
      5. Create suppression list management that combines DNC registry data with
         internal opt-out preferences.
    tools:
      - marketing-automation
      - pdpc-dnc-api
      - consent-management-platform
      - crm
      - backstage

  devsecops:
    prose: |
      1. Implement automated tests verifying that all marketing message dispatch
         paths check the DNC registry before sending.
      2. Create integration tests for the PDPC DNC API, including handling of API
         failures (fail-safe — do not send if cannot verify).
      3. Validate that consent evidence is captured and stored for all marketing
         opt-ins.
      4. Test suppression list logic to ensure DNC-registered numbers are never
         contacted without valid consent.
    tools:
      - gitlab-ci
      - api-testing
      - postman
      - custom-dnc-validators

  secops:
    prose: |
      1. Monitor DNC compliance rates — percentage of marketing messages checked
         against the DNC registry before sending.
      2. Audit marketing campaigns for DNC violations on a monthly basis.
      3. Track DNC-related complaints and investigate root causes.
      4. Generate compliance reports for PDPC inquiries showing DNC check volumes,
         consent records, and violation investigations.
    tools:
      - compliance-dashboard
      - marketing-analytics
      - siem
      - complaint-tracker

legal_references:
