id: sec-37
family: dnc
title: "Do Not Call Registry — Identification and Contact Information"
class: PDPA-SG
baselines: [privacy-baseline]

statement:
  prose: |
    (1) An organisation that sends a specified message to a Singapore telephone
    number shall include in every such specified message —
    (a) the full name of the organisation sending the message, or on whose behalf the
    message is sent;
    (b) contact information (being a valid Singapore telephone number, postal address
    or electronic mail address) of the organisation that is sending the message, or
    on whose behalf the message is sent; and
    (c) in the case of a text message — clear and simple instructions for the
    recipient to opt out of receiving further specified messages from that
    organisation.

    (2) An organisation shall provide a functional unsubscribe facility for all
    specified messages sent by or on behalf of the organisation.

    (3) If a recipient of a specified message opts out using the unsubscribe
    facility provided, the organisation shall not send any further specified
    messages to that recipient within 30 days of receiving the opt-out request
    and shall permanently cease such messages within that period.

guidance:
  prose: |
    Section 37 imposes sender identification and opt-out requirements on all
    marketing messages:

    1. **Mandatory identification:** Every marketing message must identify the
       sender by full name and provide valid Singapore contact information.

    2. **Opt-out mechanism:** Text messages must include clear opt-out instructions.
       All specified messages must have a functional unsubscribe facility.

    3. **Opt-out honoring:** Organizations must stop sending messages within 30 days
       of receiving an opt-out request.

    These requirements apply regardless of whether the recipient is on the DNC
    registry — they apply to ALL marketing messages.

    Failure to include identification or opt-out mechanisms is a separate offence
    from DNC violations, and can result in additional penalties.

references:
  - citation: "PDPA 2012, Section 37"
    url: "https://sso.agc.gov.sg/Act/PDPA2012"

implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement message templates that automatically include sender identification
         (organization name, Singapore contact information) in all marketing messages.
      2. Build one-click unsubscribe functionality for email and text message
         marketing campaigns.
      3. Create an opt-out processing pipeline that propagates unsubscribe requests
         across all marketing channels within 30 days.
      4. Implement message validation that rejects outbound marketing messages missing
         required identification or opt-out elements.
      5. Build an opt-out audit trail tracking receipt, processing, and completion of
         all unsubscribe requests.
    tools:
      - marketing-automation
      - email-service-provider
      - sms-gateway
      - consent-management-platform
      - backstage

  devsecops:
    prose: |
      1. Create automated tests verifying that all marketing message templates include
         required sender identification and opt-out mechanisms.
      2. Test opt-out workflows end-to-end — verify that unsubscribing stops messages
         within the 30-day window.
      3. Validate that message validation logic correctly rejects non-compliant
         messages before dispatch.
      4. Implement visual regression tests for marketing email templates to ensure
         opt-out links render correctly.
    tools:
      - gitlab-ci
      - email-testing
      - playwright
      - template-validation

  secops:
    prose: |
      1. Monitor opt-out processing SLAs — verify all unsubscribe requests are
         honored within 30 days.
      2. Audit outbound marketing messages for sender identification and opt-out
         compliance.
      3. Track opt-out request volumes and processing times.
      4. Investigate complaints about continued messages after opt-out.
    tools:
      - compliance-dashboard
      - marketing-analytics
      - complaint-tracker
      - siem

