id: sec-15
family: collection
title: "Deemed Consent"
class: PDPA-SG
baselines: [privacy-baseline]

statement:
  prose: |
    (1) An individual is deemed to have consented to the collection, use or disclosure
    of personal data about the individual by an organisation for a purpose if —
    (a) the individual voluntarily provides the personal data to the organisation for
    that purpose; and
    (b) it is reasonable that the individual would voluntarily provide the data.

    (1A) An individual is deemed to have consented to the collection, use or disclosure
    of personal data about the individual by an organisation for a purpose (called in
    this section the new purpose) if —
    (a) the organisation has informed the individual of the new purpose;
    (b) the organisation has given the individual a reasonable period to opt out of
    the collection, use or disclosure of the personal data for the new purpose;
    (c) the individual has not opted out within that period; and
    (d) certain prescribed conditions are satisfied.

    (1B) An individual is deemed to have consented to the disclosure of personal data
    about the individual by an organisation to another organisation for a purpose if —
    (a) the disclosure is reasonably necessary for the performance of a contract or
    proposed contract between the individual and the first-mentioned organisation; and
    (b) the first-mentioned organisation has informed the individual of the disclosure.

guidance:
  prose: |
    Section 15 (as amended in 2021) establishes three forms of deemed consent:

    1. **Deemed consent by voluntary provision (subsection 1):** If an individual
       voluntarily provides data for a stated purpose, consent is deemed given. This
       is the most common form — e.g., providing an email address during registration.

    2. **Deemed consent by notification (subsection 1A — 2021 amendment):** Organizations
       can deem consent if they notify the individual of a new purpose and provide a
       reasonable opt-out period. If the individual does not opt out, consent is deemed.
       This is similar to a "legitimate interest" approach with an opt-out mechanism.

    3. **Deemed consent by contractual necessity (subsection 1B — 2021 amendment):**
       Consent is deemed for disclosures reasonably necessary to perform a contract with
       the individual, provided the individual is informed.

    The 2021 amendments significantly expanded the deemed consent framework, providing
    organizations with more flexibility while maintaining individual awareness and
    opt-out rights.

references:
  - citation: "PDPA 2012, Sections 15, 15A, 15B"
    url: "https://sso.agc.gov.sg/Act/PDPA2012"

implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement distinct consent pathways in the consent management platform for
         each deemed consent type (voluntary, notification-based, contractual).
      2. Build notification-and-opt-out workflows for deemed consent by notification —
         including configurable opt-out periods, reminder notifications, and status tracking.
      3. Create contract-consent linkages that automatically associate deemed consent
         by contractual necessity with specific service agreements.
      4. Implement audit trails that record the basis of deemed consent (voluntary
         provision, notification opt-out expiry, or contractual necessity) for each
         data processing activity.
      5. Build opt-out mechanisms accessible via email links, account settings, and
         mobile app, with clear instructions and deadlines.
    tools:
      - consent-management-platform
      - notification-service
      - contract-management
      - event-driven-architecture
      - backstage

  devsecops:
    prose: |
      1. Test opt-out workflows end-to-end — verify that opting out during the
         notification period prevents the new processing activity.
      2. Validate that deemed consent by voluntary provision is correctly recorded
         when users submit forms or provide data through APIs.
      3. Test notification delivery mechanisms (email, SMS, in-app) for deemed
         consent by notification flows.
      4. Verify opt-out period timing — ensure the system respects the configured
         opt-out window before proceeding with processing.
    tools:
      - gitlab-ci
      - playwright
      - api-testing
      - email-testing

  secops:
    prose: |
      1. Monitor opt-out rates for deemed consent by notification to detect patterns
         that may indicate insufficient notification clarity.
      2. Audit deemed consent records to verify that the basis is correctly documented.
      3. Track notification delivery failures that may invalidate deemed consent.
      4. Review contractual necessity assessments annually to ensure they remain valid.
    tools:
      - consent-analytics
      - compliance-dashboard
      - siem
      - notification-monitoring

