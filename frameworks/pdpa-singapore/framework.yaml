statistics:
  total_parts: 10
  total_sections: 67
  total_control_families: 6
  total_controls: 20
  original_enactment: "2012-10-15"
  phased_commencement_date: "2014-07-02"
  amendment_2021_date: "2021-02-01"
  applicability: "All private-sector organizations in Singapore collecting, using, or disclosing personal data"
  excluded: "Public agencies, individuals acting in personal or domestic capacity, employees acting in course of employment with the organization, business contact information"
  max_penalty_turnover: "10% of annual turnover in Singapore"
  max_penalty_fixed: "SGD 1,000,000"
related_frameworks:
  - framework_id: gdpr
    relationship: mapped
    description: >-
      The PDPA shares conceptual overlap with the GDPR in areas
      including consent, data protection obligations, breach
      notification, and cross-border transfers. Key differences
      include PDPA's deemed consent model and the GDPR's broader
      scope of individual rights.
  - framework_id: iso-27701
    relationship: complements
    description: "ISO 27701 provides a privacy information management system (PIMS) that supports PDPA compliance through structured privacy controls and data processing governance."
  - framework_id: mas-trm
    relationship: complements
    description: "MAS Technology Risk Management Guidelines complement the PDPA for financial institutions in Singapore, providing sector-specific technical controls."
  - framework_id: ccpa-cpra
    relationship: mapped
    description: "Both laws address consumer data protection rights including access, correction, and breach notification, though CCPA/CPRA follows an opt-out model while PDPA uses opt-in consent."
  - framework_id: lgpd
    relationship: mapped
    description: "Brazil's LGPD and Singapore's PDPA share similar consent-based frameworks for personal data protection with comparable enforcement mechanisms."
