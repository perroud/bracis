related_frameworks:
  - framework_id: pnsi
    relationship: derived-from
    description: "O Decreto 10.748/2021 deriva da Politica Nacional de Seguranca da Informacao (Decreto 9.637/2018), implementando o eixo de gestao de incidentes ciberneticos no ambito federal."
  - framework_id: pnciber
    relationship: complements
    description: "A ReGIC complementa a Politica Nacional de Ciberseguranca (Decreto 11.856/2023) ao operacionalizar a coordenacao de resposta a incidentes entre orgaos federais."
  - framework_id: gsi-in1
    relationship: complements
    description: "A IN1/GSI-PR define requisitos de seguranca da informacao e criacao de ETIRs que a ReGIC coordena como rede federal integrada."
  - framework_id: gsi-in3
    relationship: complements
    description: "A IN3/GSI-PR complementa a ReGIC ao estabelecer niveis de criticidade e procedimentos de resposta a incidentes de seguranca cibernetica no governo federal."
