id: art-5
family: cap-2
title: "CTIR Gov — Centro de Coordenacao"
class: REGIC
baselines: [apf-federal]
statement:
  prose: |
    Art. 5. O CTIR Gov, vinculado ao Gabinete de Segurança Institucional da
    Presidência da República, atuará como centro de coordenação operacional
    da ReGIC, competindo-lhe:

    I — coordenar e executar as ações de prevenção, tratamento e resposta a
    incidentes cibernéticos no âmbito da ReGIC;

    II — promover a cooperação entre as ETIRs participantes;

    III — consolidar e analisar dados relativos a incidentes cibernéticos
    notificados pelos participantes da rede;

    IV — emitir alertas e recomendações de segurança cibernética;

    V — prestar apoio técnico às ETIRs dos órgãos e entidades participantes;

    VI — representar a ReGIC junto a organismos nacionais e internacionais
    de segurança cibernética.
guidance:
  prose: |
    O art. 5 detalha o papel do CTIR Gov como hub operacional da ReGIC.

    **CTIR Gov como CSIRT nacional de governo:**
    O CTIR Gov funciona como o Government CSIRT do Brasil, exercendo papel
    equivalente ao:
    - US-CERT (Estados Unidos)
    - CERT-EU (Uniao Europeia)
    - CERT-Bund (Alemanha)
    - ASD ACSC (Australia)

    **Competencias criticas:**
    - Coordenacao (inciso I): nao apenas reativa, mas proativa (prevencao)
    - Cooperacao (inciso II): facilitador entre ETIRs
    - Inteligencia (inciso III): consolidacao de dados para threat intelligence
    - Comunicacao (inciso IV): emissao de advisories (equivalente a CISA Alerts)
    - Suporte (inciso V): apoio tecnico a ETIRs com menos capacidade
    - Representacao (inciso VI): interface com FIRST, OEA CICTE, ONU

    **Subordinacao:**
    O CTIR Gov e vinculado ao GSI/PR (Gabinete de Seguranca Institucional),
    que e orgao da Presidencia da Republica com status ministerial.
implementation_guidance:
  platform_engineering:
    prose: |
      **Integracao tecnica com o CTIR Gov:**
      1. Implementar API de notificacao automatica de incidentes para o CTIR Gov
         usando protocolos padronizados (STIX/TAXII, IODEF/RID).
      2. Consumir feeds de alertas e IoCs emitidos pelo CTIR Gov e aplicar
         automaticamente em sistemas de defesa (SIEM, IDS/IPS, WAF).
      3. Manter sistema de ticketing integrado para rastreamento end-to-end
         de incidentes coordenados pelo CTIR Gov.
      4. Implementar mecanismo de solicitacao de apoio tecnico ao CTIR Gov
         com workflow de escalonamento.
    tools:
      - stix-taxii-client
      - iodef-rid-connector
      - siem
      - ticketing-system
  devsecops:
    prose: |
      **Automacao de interacao com CTIR Gov:**
      1. Pipeline que transforma alertas do CTIR Gov em regras de deteccao
         automaticamente aplicadas no ambiente.
      2. Automacao de compliance check que valida se todos os advisories do
         CTIR Gov foram implementados no ambiente.
      3. Integracao de vulnerability scanning com base de vulnerabilidades
         priorizadas pelo CTIR Gov.
      4. Report automatizado de postura de seguranca para auditorias do CTIR Gov.
    tools:
      - gitlab-ci
      - advisory-compliance-checker
      - vulnerability-scanner
      - security-posture-reporter
  secops:
    prose: |
      **Relacionamento operacional com CTIR Gov:**
      1. Manter canal de comunicacao dedicado e seguro com o CTIR Gov
         (24x7 para incidentes criticos).
      2. Participar das reunioes de coordenacao da ReGIC convocadas pelo CTIR Gov.
      3. Fornecer dados de incidentes ao CTIR Gov para consolidacao e analise
         de inteligencia (conforme formatos definidos).
      4. Aplicar alertas e recomendacoes do CTIR Gov com SLAs definidos
         conforme nivel de criticidade.
      5. Solicitar apoio tecnico ao CTIR Gov quando a capacidade da ETIR
         local for insuficiente para o incidente.
    tools:
      - secure-communication
      - siem
      - incident-management-platform
      - grc-platform
