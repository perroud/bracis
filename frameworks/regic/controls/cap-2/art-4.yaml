id: art-4
family: cap-2
title: "Composicao da ReGIC"
class: REGIC
baselines: [apf-federal]
statement:
  prose: |
    Art. 4. A ReGIC será composta:

    I — pelo CTIR Gov, como órgão central de coordenação;

    II — pelas ETIRs dos órgãos e entidades da administração pública federal direta,
    autárquica e fundacional;

    III — pelas equipes de segurança cibernética dos órgãos e entidades participantes.

    Parágrafo único. O CTIR Gov exercerá a função de coordenação técnica e operacional
    da ReGIC, sem prejuízo das competências dos órgãos e entidades participantes.
guidance:
  prose: |
    O art. 4 define a estrutura hierarquica da ReGIC como rede hub-and-spoke.

    **Modelo hub-and-spoke:**
    - Hub central: CTIR Gov (coordenacao)
    - Spokes: ETIRs setoriais de cada orgao federal
    - Apoio: equipes de seguranca cibernetica locais

    **Hierarquia operacional:**
    O CTIR Gov coordena tecnicamente, mas nao comanda operacionalmente as ETIRs.
    Cada ETIR mantem subordinacao administrativa ao seu orgao de origem.
    Este modelo e similar ao da rede CERT-EU, onde o CERT-EU coordena mas
    cada instituicao europeia mantem seu proprio CERT.

    **Obrigacao implicita:**
    Todo orgao da APF deve ter uma ETIR constituida. Se nao possui, a
    IN1/GSI-PR (art. 12) exige sua criacao. A ReGIC pressupoe a existencia
    dessas equipes.

    **ETIRs vs. equipes de seguranca:**
    ETIRs sao especializadas em resposta a incidentes. Equipes de seguranca
    cibernetica sao mais amplas (gestao de vulnerabilidades, hardening, compliance).
    Ambas participam da ReGIC com papeis distintos.
implementation_guidance:
  platform_engineering:
    prose: |
      **Arquitetura de rede para a ReGIC:**
      1. Implementar portal centralizado de gestao de incidentes que permita
         comunicacao bidirecional entre ETIR local e CTIR Gov.
      2. API de integracao com o sistema de ticketing do CTIR Gov para
         abertura, atualizacao e fechamento de incidentes.
      3. Dashboard de situacao que apresente status consolidado dos incidentes
         sob gestao da ETIR local e visibilidade dos incidentes da ReGIC.
      4. Sistema de escalonamento automatico para o CTIR Gov quando o incidente
         ultrapassar a capacidade da ETIR local.
    tools:
      - incident-management-platform
      - api-gateway
      - situation-dashboard
      - escalation-engine
  devsecops:
    prose: |
      **Integracao pipeline-ReGIC:**
      1. Pipeline CI/CD que reporta automaticamente vulnerabilidades criticas
         descobertas na infraestrutura ao sistema da ETIR local.
      2. Automacao de triagem que classifica achados de security scanning
         como potenciais incidentes ciberneticos para a ReGIC.
      3. Integracao com container scanning e infrastructure-as-code scanning
         para deteccao precoce de vetores de ataque.
      4. Testes de conectividade periodicos com os sistemas do CTIR Gov.
    tools:
      - gitlab-ci
      - vulnerability-management
      - container-scanning
      - iac-scanning
  secops:
    prose: |
      **Participacao operacional na ReGIC:**
      1. Constituir formalmente a ETIR do orgao com designacao de membros,
         responsabilidades e regime de plantao (conforme IN1/GSI-PR).
      2. Registrar a ETIR junto ao CTIR Gov e manter dados de contato atualizados.
      3. Estabelecer procedimentos de comunicacao com o CTIR Gov (canais primario
         e secundario, procedimento de emergencia).
      4. Manter a equipe de seguranca cibernetica informada sobre alertas e
         diretrizes emanadas da ReGIC.
      5. Realizar exercicios conjuntos de simulacao de incidentes com a ReGIC.
    tools:
      - grc-platform
      - secure-communication
      - on-call-management
      - exercise-simulation
