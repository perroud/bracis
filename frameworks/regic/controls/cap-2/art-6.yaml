id: art-6
family: cap-2
title: "ETIRs Setoriais — Organizacao"
class: REGIC
baselines: [apf-federal]
statement:
  prose: |
    Art. 6. As ETIRs dos órgãos e entidades da administração pública federal direta,
    autárquica e fundacional deverão:

    I — atuar na prevenção, no tratamento e na resposta a incidentes cibernéticos
    no âmbito de suas respectivas organizações;

    II — colaborar com o CTIR Gov na gestão de incidentes cibernéticos;

    III — comunicar ao CTIR Gov a ocorrência de incidentes cibernéticos, conforme
    procedimentos definidos;

    IV — compartilhar informações relevantes sobre ameaças e vulnerabilidades
    com os demais participantes da ReGIC, por intermédio do CTIR Gov;

    V — manter atualizados os dados de contato e a capacidade operacional
    registrados junto ao CTIR Gov.
guidance:
  prose: |
    O art. 6 estabelece as obrigacoes minimas de cada ETIR setorial como
    participante da ReGIC.

    **ETIR como unidade operacional:**
    Cada ETIR funciona como um CSIRT setorial. Conforme RFC 2350 e FIRST
    Best Practice Guide, uma ETIR deve ter:
    - Mandato claro (inciso I)
    - Mecanismos de cooperacao (inciso II)
    - Procedimentos de notificacao (inciso III)
    - Capacidade de compartilhamento (inciso IV)
    - Dados de contato atualizados (inciso V)

    **Obrigacao de notificacao (inciso III):**
    A notificacao ao CTIR Gov nao e opcional. Todo incidente cibernetico
    deve ser reportado conforme procedimentos que o CTIR Gov define.
    Isso cria trilha de auditoria nacional e permite visao consolidada.

    **Modelo CSIRT maturity:**
    ETIRs podem estar em diferentes niveis de maturidade. O SIM3 (Security
    Incident Management Maturity Model) da OpenCSIRT Foundation e referencia
    para avaliar e desenvolver a capacidade de cada ETIR.

    **Compartilhamento via CTIR Gov (inciso IV):**
    O modelo nao permite compartilhamento direto entre ETIRs — deve passar
    pelo CTIR Gov. Isso garante controle de qualidade, desidentificacao
    quando necessario e visao consolidada.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura da ETIR:**
      1. Sistema de gestao de incidentes dedicado para a ETIR com workflow
         completo: deteccao, triagem, contencao, erradicacao, recuperacao, licoes.
      2. Integracao automatica com SIEM para deteccao de incidentes e
         correlacao de eventos.
      3. Portal de notificacao ao CTIR Gov com campos obrigatorios conforme
         formato definido (tipo, criticidade, sistemas afetados, acoes tomadas).
      4. Base de conhecimento interna com playbooks, IoCs historicos e
         licoes aprendidas da ETIR.
      5. Mecanismo de atualizacao automatica de dados de contato e capacidade
         operacional junto ao CTIR Gov.
    tools:
      - incident-management-platform
      - siem
      - notification-portal
      - knowledge-base
      - contact-registry
  devsecops:
    prose: |
      **Automacao da ETIR:**
      1. Pipeline de resposta automatizada (SOAR) que executa contencao
         inicial de incidentes comuns (bloqueio de IP, isolamento de host).
      2. Automacao de notificacao ao CTIR Gov acionada por regras de
         criticidade no SIEM.
      3. Pipeline de validacao de playbooks de resposta com cenarios de teste.
      4. Integracao de threat intelligence feeds com atualizacao automatica
         de regras de deteccao.
    tools:
      - gitlab-ci
      - soar
      - playbook-testing
      - threat-intel-feed
  secops:
    prose: |
      **Operacao da ETIR:**
      1. Manter regime de plantao (on-call) para cobertura 24x7 de incidentes
         criticos, conforme capacidade do orgao.
      2. Documentar e treinar procedimentos de notificacao ao CTIR Gov com
         SLAs definidos por nivel de criticidade.
      3. Realizar triagem de todos os alertas de seguranca e classificar
         conforme taxonomia da ReGIC (art. 2).
      4. Compartilhar IoCs e informacoes de ameacas com CTIR Gov quando
         aplicavel, respeitando classificacao TLP.
      5. Manter inventario de capacidade operacional atualizado (ferramentas,
         equipe, cobertura) junto ao CTIR Gov.
    tools:
      - on-call-management
      - siem
      - threat-intelligence-platform
      - grc-platform
