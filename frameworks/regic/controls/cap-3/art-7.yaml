id: art-7
family: cap-3
title: "Competencias do GSI/PR"
class: REGIC
baselines: [apf-federal]
statement:
  prose: |
    Art. 7. Ao Gabinete de Segurança Institucional da Presidência da República compete:

    I — estabelecer normas e procedimentos para o funcionamento da ReGIC;

    II — definir os requisitos mínimos de segurança cibernética para os órgãos e
    entidades participantes da rede;

    III — promover a capacitação dos agentes públicos em segurança cibernética e
    gestão de incidentes;

    IV — coordenar a elaboração de planos de resposta a incidentes cibernéticos
    de grande impacto que afetem a administração pública federal;

    V — avaliar periodicamente a eficácia da ReGIC e propor aprimoramentos.
guidance:
  prose: |
    O art. 7 estabelece o GSI/PR como autoridade normativa e estrategica da ReGIC.

    **GSI/PR como regulador:**
    O GSI/PR nao opera incidentes diretamente (isso e papel do CTIR Gov e das ETIRs),
    mas define as regras do jogo: normas, procedimentos, requisitos minimos.

    **Requisitos minimos (inciso II):**
    O GSI/PR define o baseline de seguranca que todos os orgaos devem atender
    para participar efetivamente da ReGIC. Isso se materializa nas Instrucoes
    Normativas do GSI (IN1, IN2, IN3).

    **Capacitacao (inciso III):**
    O governo federal reconhece que falta mao de obra qualificada em seguranca
    cibernetica. O GSI/PR coordena programas de formacao (ex: CEGSIC/UnB,
    cursos ENAP, exercicios Guardiao Cibernetico do ComDCiber).

    **Planos de grande impacto (inciso IV):**
    Para incidentes que afetem multiplos orgaos ou infraestrutura critica federal,
    o GSI/PR coordena o plano de resposta nacional. Similar ao papel do CISA
    nos EUA para Major Cyber Incidents (PPD-41).

    **Avaliacao periodica (inciso V):**
    A ReGIC deve passar por revisoes de eficacia. O GSI/PR pode usar metricas
    como: tempo medio de deteccao (MTTD), tempo medio de resposta (MTTR),
    taxa de notificacao, participacao em exercicios.
implementation_guidance:
  platform_engineering:
    prose: |
      **Aderencia aos requisitos do GSI/PR:**
      1. Implementar controles de seguranca que atendam os requisitos minimos
         definidos pelo GSI/PR (IN1, IN2, IN3).
      2. Manter compliance dashboard que rastreie aderencia aos requisitos
         minimos do GSI/PR em tempo real.
      3. Automatizar coleta de metricas de seguranca cibernetica exigidas
         pelo GSI/PR para avaliacao da ReGIC (MTTD, MTTR, cobertura).
      4. Implementar controles de baseline conforme normas do GSI/PR com
         validacao automatizada.
    tools:
      - compliance-dashboard
      - security-metrics-collector
      - baseline-validator
      - grc-platform
  devsecops:
    prose: |
      **Pipeline de conformidade GSI/PR:**
      1. Pipeline de compliance-as-code que valida automaticamente se a
         infraestrutura atende os requisitos minimos do GSI/PR.
      2. Scans de configuracao (CIS Benchmarks) mapeados para requisitos
         do GSI/PR.
      3. Testes automatizados de aderencia a normas do GSI/PR executados
         periodicamente.
      4. Report de gaps de conformidade gerado automaticamente para
         gestao de riscos.
    tools:
      - gitlab-ci
      - compliance-as-code
      - cis-benchmark-scanner
      - gap-analysis-reporter
  secops:
    prose: |
      **Gestao de conformidade GSI/PR:**
      1. Manter mapeamento atualizado entre controles implementados e
         requisitos minimos do GSI/PR.
      2. Participar de programas de capacitacao promovidos pelo GSI/PR
         (CEGSIC, ENAP, Guardiao Cibernetico).
      3. Contribuir com dados e metricas para avaliacao periodica da
         eficacia da ReGIC conforme solicitado pelo GSI/PR.
      4. Implementar planos de resposta a incidentes de grande impacto
         conforme diretrizes do GSI/PR.
      5. Acompanhar publicacoes normativas do GSI/PR e garantir
         implementacao tempestiva.
    tools:
      - grc-platform
      - training-management
      - metrics-reporting
      - regulatory-monitoring
