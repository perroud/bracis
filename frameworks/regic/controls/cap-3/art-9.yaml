id: art-9
family: cap-3
title: "Responsabilidades dos Orgaos Participantes"
class: REGIC
baselines: [apf-federal]
statement:
  prose: |
    Art. 9. Os órgãos e entidades participantes da ReGIC deverão:

    I — constituir e manter ETIR com capacidade operacional adequada;

    II — elaborar e manter atualizado plano de gestão de incidentes cibernéticos;

    III — designar servidor responsável pela interlocução com o CTIR Gov e com
    os demais participantes da ReGIC;

    IV — adotar as normas, os procedimentos e as boas práticas de segurança
    cibernética emanados do GSI/PR;

    V — disponibilizar recursos humanos e tecnológicos necessários ao
    funcionamento da ETIR;

    VI — promover a conscientização em segurança cibernética de seus
    servidores e colaboradores.
guidance:
  prose: |
    O art. 9 define as obrigacoes de cada orgao para garantir participacao
    efetiva na ReGIC.

    **ETIR com capacidade adequada (inciso I):**
    Nao basta criar a ETIR formalmente — ela precisa ter capacidade operacional.
    Conforme SIM3 (Security Incident Management Maturity Model), a ETIR deve ter:
    - Equipe dedicada ou parcialmente dedicada
    - Ferramentas adequadas (SIEM, SOAR, forense)
    - Processos documentados
    - Capacidade de resposta em tempo habil

    **Plano de gestao de incidentes (inciso II):**
    O plano deve cobrir o ciclo completo conforme NIST SP 800-61:
    1. Preparacao
    2. Deteccao e analise
    3. Contencao, erradicacao e recuperacao
    4. Atividade pos-incidente (licoes aprendidas)

    **Ponto focal (inciso III):**
    Deve haver servidor formalmente designado como ponto de contato com a
    ReGIC. Essa pessoa precisa ter acesso aos canais de comunicacao do
    CTIR Gov e autoridade para tomar decisoes de resposta.

    **Conscientizacao (inciso VI):**
    O elo mais fraco da seguranca cibernetica e o fator humano. Phishing,
    engenharia social e uso inadequado de sistemas sao vetores comuns.
    Programas de awareness sao obrigatorios.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura para atendimento ao art. 9:**
      1. SIEM centralizado com capacidade de deteccao, correlacao e alerta
         de incidentes ciberneticos em tempo real.
      2. Plataforma SOAR (Security Orchestration, Automation and Response)
         com playbooks automatizados para incidentes comuns.
      3. Sistema de gestao de incidentes com workflow completo (NIST 800-61)
         e integracao com CTIR Gov.
      4. Plataforma de conscientizacao com campanhas de phishing simulado,
         treinamentos e metricas de adesao.
      5. Ferramenta de forense digital para coleta e preservacao de evidencias.
    tools:
      - siem
      - soar
      - incident-management-platform
      - security-awareness-platform
      - digital-forensics-toolkit
  devsecops:
    prose: |
      **Pipeline de suporte a ETIR:**
      1. Pipeline CI/CD que alimenta o SIEM com dados de build, deploy e
         alteracoes de configuracao para correlacao de incidentes.
      2. Automacao de contencao inicial (SOAR) acionada por alertas do
         pipeline de seguranca.
      3. Testes automatizados de plano de resposta a incidentes (tabletop
         exercises codificados).
      4. Pipeline de validacao de playbooks de resposta com cenarios de teste
         para cada tipo de incidente.
    tools:
      - gitlab-ci
      - soar
      - playbook-testing
      - incident-simulation
  secops:
    prose: |
      **Operacionalizacao das obrigacoes:**
      1. Constituir ETIR formalmente com portaria de designacao, definindo
         membros, regime de trabalho e responsabilidades.
      2. Elaborar e manter plano de gestao de incidentes ciberneticos
         alinhado ao NIST SP 800-61 e as normas do GSI/PR.
      3. Designar servidor como ponto focal da ReGIC com acesso aos canais
         do CTIR Gov e capacidade de decisao.
      4. Garantir recursos minimos: equipe treinada, SIEM, SOAR, ferramentas
         de forense, canal seguro com CTIR Gov.
      5. Executar programa de conscientizacao em seguranca cibernetica com
         metricas de eficacia (taxa de clique em phishing simulado, conclusao
         de treinamentos, reporte de incidentes por usuarios).
    tools:
      - grc-platform
      - siem
      - soar
      - security-awareness-platform
      - on-call-management
