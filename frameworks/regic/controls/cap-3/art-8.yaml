id: art-8
family: cap-3
title: "Atribuicoes do CTIR Gov"
class: REGIC
baselines: [apf-federal]
statement:
  prose: |
    Art. 8. Ao CTIR Gov, no exercício da coordenação operacional da ReGIC, compete:

    I — receber, analisar e responder a notificações de incidentes cibernéticos
    encaminhadas pelos participantes da rede;

    II — consolidar dados e estatísticas sobre incidentes cibernéticos na
    administração pública federal;

    III — emitir alertas, recomendações e orientações técnicas de segurança
    cibernética;

    IV — coordenar ações de resposta a incidentes cibernéticos que envolvam
    mais de um órgão ou entidade;

    V — manter base de conhecimento sobre ameaças, vulnerabilidades e
    boas práticas de segurança cibernética;

    VI — promover o intercâmbio de informações com centros de tratamento de
    incidentes cibernéticos nacionais e internacionais;

    VII — apoiar tecnicamente as ETIRs na resposta a incidentes cibernéticos
    complexos.
guidance:
  prose: |
    O art. 8 detalha as atribuicoes operacionais do CTIR Gov como hub da ReGIC.

    **Funcao SOC nacional de governo:**
    O CTIR Gov opera como um SOC (Security Operations Center) de nivel federal,
    com funcoes de:
    - Triage e analise (inciso I)
    - Intelligence (incisos II e V)
    - Advisory (inciso III)
    - Coordenacao (inciso IV)
    - Knowledge management (inciso V)
    - Liaison (inciso VI)
    - Suporte (inciso VII)

    **Base de conhecimento (inciso V):**
    O CTIR Gov mantem repositorio de TTPs (Tactics, Techniques, Procedures),
    IoCs, e CVEs relevantes para o governo federal. Equivale ao MITRE ATT&CK
    adaptado para o contexto governamental brasileiro.

    **Intercambio internacional (inciso VI):**
    O CTIR Gov participa de redes internacionais como:
    - FIRST (Forum of Incident Response and Security Teams)
    - OEA/CICTE (Comite Interamericano contra o Terrorismo)
    - Cooperacao bilateral com US-CERT, CERT-EU, outros

    **Apoio tecnico (inciso VII):**
    ETIRs de orgaos menores ou com menos maturidade podem solicitar apoio
    tecnico do CTIR Gov para incidentes complexos (APT, ransomware, supply chain).
implementation_guidance:
  platform_engineering:
    prose: |
      **Integracao com servicos do CTIR Gov:**
      1. Implementar connector para receber alertas e advisories do CTIR Gov
         em formato padronizado (STIX/TAXII, email cifrado, RSS seguro).
      2. Automatizar ingestao de IoCs do CTIR Gov na base de threat intelligence
         local com aplicacao automatica em controles de defesa.
      3. Implementar sistema de notificacao bidirecional com o CTIR Gov para
         gestao de incidentes coordenados.
      4. Consumir base de conhecimento do CTIR Gov e integrar com playbooks
         locais de resposta a incidentes.
    tools:
      - stix-taxii-client
      - threat-intelligence-platform
      - incident-management-platform
      - knowledge-base
  devsecops:
    prose: |
      **Automacao baseada em inteligencia do CTIR Gov:**
      1. Pipeline que converte advisories do CTIR Gov em verificacoes automaticas
         de seguranca aplicadas no ambiente.
      2. Automacao de patching priorizado baseado em alertas de vulnerabilidades
         emitidos pelo CTIR Gov.
      3. Integracao de CVEs priorizados pelo CTIR Gov com dependency scanning
         e container scanning no pipeline CI/CD.
      4. Report automatizado de aderencia as recomendacoes tecnicas do CTIR Gov.
    tools:
      - gitlab-ci
      - patch-management
      - dependency-scanner
      - advisory-tracker
  secops:
    prose: |
      **Operacao alinhada ao CTIR Gov:**
      1. Encaminhar notificacoes de incidentes ao CTIR Gov conforme
         procedimentos definidos, com dados completos (tipo, impacto,
         sistemas afetados, acoes de contencao).
      2. Aplicar alertas e recomendacoes do CTIR Gov com prioridade
         definida pelo nivel de criticidade.
      3. Consultar base de conhecimento do CTIR Gov durante investigacao
         de incidentes para contexto adicional.
      4. Solicitar apoio tecnico do CTIR Gov para incidentes que excedam
         a capacidade da ETIR local (APT, zero-day, ransomware).
      5. Contribuir com informacoes de incidentes para estatisticas
         consolidadas da administracao federal.
    tools:
      - siem
      - soar
      - incident-management-platform
      - secure-communication
