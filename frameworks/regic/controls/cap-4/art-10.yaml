id: art-10
family: cap-4
title: "Notificacao de Incidentes Ciberneticos"
class: REGIC
baselines: [apf-federal]
statement:
  prose: |
    Art. 10. Os órgãos e entidades participantes da ReGIC deverão notificar ao CTIR Gov
    a ocorrência de incidentes cibernéticos, observados os seguintes procedimentos:

    I — a notificação deverá ser realizada de forma tempestiva, tão logo o incidente
    seja identificado;

    II — a notificação deverá conter, no mínimo: a descrição do incidente, os sistemas
    e serviços afetados, a gravidade estimada, as ações de contenção adotadas e o
    ponto de contato responsável;

    III — atualizações sobre a evolução do incidente deverão ser encaminhadas ao
    CTIR Gov até a resolução completa;

    IV — ao término do tratamento do incidente, deverá ser encaminhado relatório
    final ao CTIR Gov com as ações realizadas e as lições aprendidas.
guidance:
  prose: |
    O art. 10 estabelece o fluxo obrigatorio de notificacao de incidentes, que e
    o nucleo operacional da ReGIC.

    **Notificacao tempestiva (inciso I):**
    Nao ha prazo exato em horas definido no decreto, mas "tao logo identificado"
    implica notificacao imediata. Na pratica, o CTIR Gov orienta:
    - Incidentes criticos: notificacao em ate 1 hora
    - Incidentes altos: notificacao em ate 4 horas
    - Incidentes medios/baixos: notificacao em ate 24 horas

    **Conteudo minimo (inciso II):**
    A notificacao deve conter dados suficientes para o CTIR Gov avaliar impacto
    e necessidade de coordenacao. Alinha-se com RFC 7970 (IODEF) que define
    formato padrao para reporte de incidentes.

    **Atualizacoes continuas (inciso III):**
    O CTIR Gov precisa de visibilidade continua para coordenar multiplos orgaos
    afetados pelo mesmo incidente. Similar ao conceito de Situation Report (SITREP)
    em gestao de crises.

    **Relatorio final (inciso IV):**
    O post-incident report (PIR) e obrigatorio e deve incluir licoes aprendidas.
    Segue o modelo NIST SP 800-61 Phase 4: Post-Incident Activity, incluindo
    root cause analysis e recomendacoes de melhoria.
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de notificacao automatizada:**
      1. Implementar workflow de notificacao ao CTIR Gov integrado ao sistema
         de gestao de incidentes, com campos obrigatorios conforme inciso II.
      2. Automacao de notificacao inicial acionada por regras de criticidade
         no SIEM (alertas P1/P2 geram notificacao automatica).
      3. Mecanismo de atualizacao periodica (SITREP) com envio automatico
         baseado em mudancas de status do incidente.
      4. Template de relatorio final (PIR) com campos obrigatorios: timeline,
         root cause, acoes realizadas, licoes aprendidas, recomendacoes.
      5. Dashboard de rastreamento de notificacoes enviadas, com SLA tracking.
    tools:
      - incident-management-platform
      - siem
      - notification-automation
      - pir-template-engine
      - sla-tracker
  devsecops:
    prose: |
      **Pipeline de suporte a notificacao:**
      1. Pipeline que coleta automaticamente dados relevantes para notificacao:
         versoes de software, logs de deploy, configuracoes de seguranca.
      2. Automacao de coleta de evidencias forenses no momento da deteccao
         para subsidiar notificacao ao CTIR Gov.
      3. Integracao com ferramenta de timeline que reconstroi cronologia do
         incidente automaticamente a partir de logs.
      4. Validacao automatica de completude da notificacao antes do envio.
    tools:
      - gitlab-ci
      - forensic-evidence-collector
      - timeline-reconstruction
      - notification-validator
  secops:
    prose: |
      **Procedimento operacional de notificacao:**
      1. Procedimento documentado de notificacao ao CTIR Gov com checklist
         de informacoes obrigatorias (inciso II).
      2. SLAs internos de notificacao por nivel de criticidade:
         - Critico: 1 hora | Alto: 4 horas | Medio: 24 horas.
      3. Designar responsavel por cada notificacao (ponto de contato do inciso II).
      4. Enviar atualizacoes (SITREP) a cada mudanca significativa de status:
         nova contencao, novo sistema afetado, escalonamento, resolucao parcial.
      5. Elaborar relatorio final (PIR) dentro de 5 dias uteis apos resolucao,
         com analise de causa raiz e licoes aprendidas.
      6. Treinar equipe da ETIR no procedimento de notificacao com exercicios
         periodicos de simulacao.
    tools:
      - incident-management-platform
      - secure-communication
      - pir-template
      - exercise-simulation
