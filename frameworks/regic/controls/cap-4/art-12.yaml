id: art-12
family: cap-4
title: "Cooperacao e Atuacao Coordenada"
class: REGIC
baselines: [apf-federal]
statement:
  prose: |
    Art. 12. A cooperação entre os participantes da ReGIC será promovida por meio de:

    I — exercícios simulados de resposta a incidentes cibernéticos;

    II — compartilhamento de boas práticas, ferramentas e metodologias de
    gestão de incidentes;

    III — apoio mútuo entre ETIRs na resposta a incidentes cibernéticos;

    IV — reuniões periódicas de coordenação promovidas pelo CTIR Gov;

    V — grupos de trabalho temáticos para tratamento de assuntos específicos
    de segurança cibernética.
guidance:
  prose: |
    O art. 12 define os mecanismos praticos de cooperacao entre os participantes.

    **Exercicios simulados (inciso I):**
    Equivalentes aos Cyber Defense Exercises internacionais:
    - Guardiao Cibernetico (ComDCiber/EB): exercicio anual de defesa cibernetica
    - Locked Shields (CCDCOE/OTAN): referencia internacional
    - Cyber Storm (CISA/EUA): exercicio nacional americano
    Os exercicios testam comunicacao, coordenacao e capacidade tecnica das ETIRs.

    **Boas praticas (inciso II):**
    O CTIR Gov funciona como repositorio central de boas praticas, similar
    ao papel do MITRE com o ATT&CK framework e o NIST com o CSF.

    **Apoio mutuo (inciso III):**
    ETIRs mais maduras podem apoiar ETIRs com menos capacidade. Similar ao
    conceito de Mutual Aid Agreements (MAA) em gestao de emergencias.

    **Reunioes de coordenacao (inciso IV):**
    Reunioes periodicas para alinhamento estrategico e operacional, similar
    ao modelo do US Federal CISO Council.

    **Grupos de trabalho (inciso V):**
    GTs tematicos para tratar assuntos como: ransomware, supply chain attacks,
    cloud security, IoT/OT security. Segue modelo do FIRST SIG (Special
    Interest Groups).
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de cooperacao:**
      1. Plataforma de exercicios simulados (Cyber Range) para execucao de
         tabletop exercises e exercicios tecnicos com a ReGIC.
      2. Repositorio compartilhado de playbooks, ferramentas e metodologias
         de gestao de incidentes acessivel aos participantes da ReGIC.
      3. Plataforma de comunicacao segura para reunioes de coordenacao e
         grupos de trabalho tematicos.
      4. Portal de apoio mutuo para solicitacao e oferta de assistencia
         tecnica entre ETIRs.
    tools:
      - cyber-range
      - playbook-repository
      - secure-conferencing
      - mutual-aid-portal
  devsecops:
    prose: |
      **Automacao de cooperacao:**
      1. Pipeline de compartilhamento de playbooks e ferramentas com
         versionamento e controle de qualidade.
      2. Automacao de cenarios de exercicio simulado com injecao de
         eventos e avaliacao automatica de resposta.
      3. Integracao de ferramentas compartilhadas pela ReGIC no pipeline
         CI/CD local com validacao de compatibilidade.
      4. Report automatizado de participacao em exercicios e reunioes
         de coordenacao.
    tools:
      - gitlab-ci
      - exercise-automation
      - tool-sharing-pipeline
      - participation-tracker
  secops:
    prose: |
      **Participacao ativa na cooperacao:**
      1. Participar de exercicios simulados promovidos pelo CTIR Gov e
         pelo ComDCiber (Guardiao Cibernetico) com documentacao de licoes.
      2. Contribuir com boas praticas e ferramentas para o repositorio
         compartilhado da ReGIC.
      3. Oferecer e solicitar apoio mutuo entre ETIRs conforme capacidade
         e necessidade.
      4. Participar de reunioes periodicas de coordenacao e grupos de
         trabalho tematicos relevantes ao orgao.
      5. Documentar resultados de exercicios e cooperacao para melhoria
         continua dos processos da ETIR.
    tools:
      - exercise-documentation
      - grc-platform
      - secure-communication
      - knowledge-base
