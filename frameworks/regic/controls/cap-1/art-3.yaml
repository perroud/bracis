id: art-3
family: cap-1
title: "Principios e Diretrizes"
class: REGIC
baselines: [apf-federal]
statement:
  prose: |
    Art. 3. A ReGIC observará os seguintes princípios e diretrizes:

    I — compartilhamento de alertas, ameaças e informações relativas a incidentes
    cibernéticos entre os participantes da rede;

    II — cooperação entre os participantes da rede na prevenção, no tratamento e
    na resposta a incidentes cibernéticos;

    III — atuação coordenada para gestão de incidentes cibernéticos que envolvam
    mais de um órgão ou entidade da administração pública federal;

    IV — preservação do sigilo das informações compartilhadas na rede;

    V — respeito à autonomia técnica das ETIRs setoriais;

    VI — alinhamento com a Política Nacional de Segurança da Informação e com
    a Estratégia Nacional de Segurança Cibernética.
guidance:
  prose: |
    O art. 3 define os principios fundamentais que orientam a operacao da ReGIC.

    **Compartilhamento de informacoes (inciso I):**
    Alinhado com o conceito de Cyber Threat Intelligence (CTI) sharing, equivalente
    ao Traffic Light Protocol (TLP) e aos mecanismos de ISACs (Information Sharing
    and Analysis Centers) internacionais.

    **Cooperacao (inciso II):**
    Segue o modelo de cooperacao do FIRST (Forum of Incident Response and Security
    Teams) para coordenacao entre CSIRTs governamentais.

    **Atuacao coordenada (inciso III):**
    Incidentes que afetam multiplos orgaos exigem coordenacao central pelo CTIR Gov,
    similar ao modelo do US-CERT para incidentes federais nos EUA.

    **Sigilo (inciso IV):**
    As informacoes compartilhadas na ReGIC possuem protecao especial. Equivale
    ao conceito de TLP:AMBER ou TLP:RED dependendo do nivel de sensibilidade.

    **Autonomia das ETIRs (inciso V):**
    O CTIR Gov coordena, mas nao substitui as ETIRs setoriais. Cada orgao
    mantem autonomia operacional sobre sua infraestrutura.

    **Alinhamento estrategico (inciso VI):**
    A ReGIC opera sob o guarda-chuva da PNSI (Decreto 9.637/2018) e da
    E-Ciber (Decreto 10.222/2020).
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de compartilhamento:**
      1. Implementar plataforma de compartilhamento de IoCs (Indicators of Compromise)
         usando STIX/TAXII interoperavel com o CTIR Gov.
      2. Feed automatizado de threat intelligence que recebe e distribui alertas
         da ReGIC para os sistemas de defesa (SIEM, WAF, IDS/IPS).
      3. Sistema de classificacao de informacoes compartilhadas com niveis de
         sensibilidade alinhados ao TLP (Traffic Light Protocol).
      4. Canal seguro de comunicacao (VPN, mensageria cifrada) dedicado a ReGIC.
    tools:
      - stix-taxii-server
      - threat-intelligence-platform
      - tlp-classification-engine
      - encrypted-messaging
  devsecops:
    prose: |
      **Automacao de cooperacao:**
      1. Pipeline que ingere IoCs da ReGIC e automaticamente atualiza regras de
         deteccao no SIEM, WAF e IDS/IPS.
      2. Automacao de report de vulnerabilidades criticas detectadas no pipeline
         CI/CD que atendam criterios de compartilhamento com a ReGIC.
      3. Testes de integracao com a plataforma de compartilhamento de informacoes
         do CTIR Gov.
      4. Validacao automatica de que informacoes classificadas nao vazam para
         canais nao autorizados.
    tools:
      - gitlab-ci
      - ioc-ingestion-pipeline
      - siem-rules-updater
      - data-loss-prevention
  secops:
    prose: |
      **Operacao dos principios:**
      1. Designar ponto focal para o compartilhamento de informacoes com a ReGIC,
         com autorizacao para classificar e disseminar alertas.
      2. Estabelecer SLAs internos para compartilhamento de informacoes com o
         CTIR Gov conforme niveis de criticidade.
      3. Participar de reunioes periodicas de coordenacao da ReGIC.
      4. Documentar e revisar procedimentos de sigilo das informacoes recebidas
         da rede, aplicando TLP conforme orientacao do CTIR Gov.
      5. Manter registro de todas as informacoes compartilhadas e recebidas
         para auditoria e prestacao de contas.
    tools:
      - grc-platform
      - secure-communication
      - audit-trail
      - threat-intelligence-platform
