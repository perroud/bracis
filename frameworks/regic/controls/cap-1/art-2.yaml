id: art-2
family: cap-1
title: "Definicoes"
class: REGIC
baselines: [apf-federal]
statement:
  prose: |
    Art. 2. Para os fins deste Decreto, considera-se:

    I — equipe de prevenção, tratamento e resposta a incidentes cibernéticos — ETIR:
    grupo de agentes públicos com a responsabilidade de prestar serviços relacionados
    à segurança cibernética para a comunidade de sua área de atuação;

    II — incidente cibernético: toda e qualquer ação ou evento que comprometa a
    disponibilidade, a integridade, a confidencialidade ou a autenticidade de
    informações e sistemas de informação;

    III — Rede Federal de Gestão de Incidentes Cibernéticos — ReGIC: conjunto de órgãos
    e entidades da administração pública federal direta, autárquica e fundacional
    responsáveis pela gestão de incidentes cibernéticos no âmbito de suas áreas de atuação;

    IV — Centro de Prevenção, Tratamento e Resposta a Incidentes Cibernéticos de
    Governo — CTIR Gov: centro do Gabinete de Segurança Institucional da Presidência
    da República responsável pela coordenação técnica e operacional da ReGIC.
guidance:
  prose: |
    O art. 2 estabelece o glossario oficial da ReGIC, padronizando terminologia
    para toda a administracao federal.

    **ETIR (equivalente a CSIRT):**
    Cada orgao federal deve manter sua ETIR setorial. Equivale ao conceito
    internacional de CSIRT (Computer Security Incident Response Team) ou CERT
    (Computer Emergency Response Team). Segue o modelo do FIRST e RFC 2350
    (Expectations for Computer Security Incident Response).

    **Incidente cibernetico:**
    A definicao e ampla e abrange os quatro pilares da seguranca da informacao:
    Disponibilidade, Integridade, Confidencialidade e Autenticidade (DICA).
    Alinha-se com ISO 27035 (Information security incident management) e
    NIST SP 800-61 (Computer Security Incident Handling Guide).

    **CTIR Gov:**
    Funciona como o CSIRT nacional de governo, equivalente ao US-CERT nos
    Estados Unidos ou ao CERT-EU na Uniao Europeia. Subordinado ao GSI/PR.
implementation_guidance:
  platform_engineering:
    prose: |
      **Padronizacao de taxonomia:**
      1. Implementar taxonomia de incidentes alinhada com as definicoes do art. 2
         no sistema de tickets e SIEM.
      2. Categorizar eventos usando os quatro pilares: disponibilidade, integridade,
         confidencialidade e autenticidade.
      3. Manter catalogo de tipos de incidentes compativel com a taxonomia do
         CTIR Gov e referencia cruzada com MITRE ATT&CK.
      4. Implementar campos obrigatorios em sistemas de gestao de incidentes que
         reflitam as definicoes do decreto.
    tools:
      - incident-taxonomy-engine
      - siem
      - mitre-attack-mapping
      - ticketing-system
  devsecops:
    prose: |
      **Classificacao automatica de eventos:**
      1. Pipeline de classificacao automatica que categoriza alertas de seguranca
         conforme a taxonomia do art. 2.
      2. Regras de correlacao no SIEM que identificam automaticamente incidentes
         ciberneticos conforme definicao legal.
      3. Testes automatizados que validam correta classificacao de eventos de
         seguranca usando cenarios de cada pilar (DICA).
      4. Dashboards que apresentam metricas por tipo de incidente conforme taxonomia.
    tools:
      - gitlab-ci
      - siem-rules-engine
      - classification-pipeline
      - monitoring-dashboard
  secops:
    prose: |
      **Operacionalizacao das definicoes:**
      1. Treinar equipe da ETIR na taxonomia oficial da ReGIC e nas definicoes
         do art. 2 para classificacao uniforme.
      2. Manter playbooks de resposta alinhados com cada tipo de incidente
         definido (DICA: disponibilidade, integridade, confidencialidade, autenticidade).
      3. Documentar e comunicar definicoes ao corpo tecnico do orgao para
         garantir notificacao consistente.
      4. Revisar periodicamente se a classificacao de incidentes esta aderente
         as definicoes do decreto.
    tools:
      - playbook-repository
      - training-platform
      - grc-platform
      - knowledge-base
