id: art-1
family: cap-1
title: "Objeto e Instituicao da ReGIC"
class: REGIC
baselines: [apf-federal]
statement:
  prose: |
    Art. 1. Fica instituída a Rede Federal de Gestão de Incidentes Cibernéticos — ReGIC,
    no âmbito da administração pública federal direta, autárquica e fundacional.

    Parágrafo único. A ReGIC tem por finalidade promover a coordenação entre os órgãos
    e as entidades da administração pública federal direta, autárquica e fundacional
    para a prevenção, o tratamento e a resposta a incidentes cibernéticos, de modo a
    elevar o nível de resiliência em segurança cibernética de seus ativos de informação.
guidance:
  prose: |
    O art. 1 institui formalmente a ReGIC como rede de coordenacao para gestao de
    incidentes ciberneticos na esfera federal.

    **Escopo de aplicacao:**
    A ReGIC abrange toda a administracao publica federal direta (ministerios, secretarias),
    autarquica (agencias reguladoras, INSS, universidades federais) e fundacional
    (fundacoes publicas federais). Nao inclui empresas estatais, estados ou municipios
    (estes podem aderir voluntariamente).

    **Alinhamento com NIST CSF:**
    A ReGIC implementa na esfera federal brasileira os conceitos do NIST Cybersecurity
    Framework, especialmente as funcoes Detect (DE) e Respond (RS), ao criar estrutura
    coordenada de deteccao e resposta a incidentes.

    **Modelo CSIRT nacional:**
    O decreto formaliza o modelo de CSIRTs (Computer Security Incident Response Teams)
    governamentais, seguindo as boas praticas do FIRST (Forum of Incident Response and
    Security Teams) e do ENISA (European Union Agency for Cybersecurity).
implementation_guidance:
  platform_engineering:
    prose: |
      **Integracao com a ReGIC:**
      1. Implementar endpoints de comunicacao com o CTIR Gov para notificacao
         automatizada de incidentes ciberneticos detectados na infraestrutura.
      2. Padronizar formato de notificacao usando STIX/TAXII para interoperabilidade
         com a rede federal.
      3. Manter inventario atualizado de ativos de informacao (CMDB) com classificacao
         de criticidade conforme exigido pela ReGIC.
      4. Implementar health checks e status pages internos que alimentem o
         painel de situacao da ReGIC.
    tools:
      - stix-taxii-connector
      - cmdb
      - incident-management-platform
      - status-page
  devsecops:
    prose: |
      **Pipeline de deteccao e notificacao:**
      1. Integrar ferramentas de SAST, DAST e dependency scanning no pipeline CI/CD
         para deteccao preventiva de vulnerabilidades reportaveis a ReGIC.
      2. Automatizar triagem de vulnerabilidades criticas com notificacao ao CTIR Gov
         quando atenderem criterios de incidente cibernetico.
      3. Manter logs de build e deploy imutaveis para subsidiar investigacao de
         incidentes pela ReGIC.
      4. Pipeline de validacao de conformidade com os requisitos minimos da ReGIC.
    tools:
      - gitlab-ci
      - sast-scanner
      - dast-scanner
      - dependency-scanner
  secops:
    prose: |
      **Operacao na ReGIC:**
      1. Designar equipe responsavel pela interface com o CTIR Gov e a ReGIC.
      2. Manter canal de comunicacao seguro com o CTIR Gov para notificacao
         de incidentes (email cifrado, portal web, API).
      3. Documentar e testar procedimentos de notificacao ao CTIR Gov conforme
         prazos definidos pela ReGIC.
      4. Participar de exercicios simulados de resposta a incidentes promovidos
         pela ReGIC.
    tools:
      - siem
      - soar
      - encrypted-communication
      - grc-platform
