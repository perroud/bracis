id: art-14
family: cap-5
title: "Revisao Periodica e Aprimoramento"
class: REGIC
baselines: [apf-federal]
statement:
  prose: |
    Art. 14. O GSI/PR promoverá a revisão periódica das normas e dos procedimentos
    da ReGIC, com o objetivo de:

    I — manter a compatibilidade com a evolução das ameaças cibernéticas;

    II — incorporar boas práticas nacionais e internacionais de gestão de
    incidentes cibernéticos;

    III — aprimorar os mecanismos de cooperação e compartilhamento de informações;

    IV — avaliar a eficácia dos procedimentos de notificação e resposta.

    Parágrafo único. A revisão de que trata o caput será realizada, no mínimo,
    a cada dois anos, podendo ocorrer em prazo inferior caso haja necessidade
    justificada.
guidance:
  prose: |
    O art. 14 garante que a ReGIC evolua continuamente e nao se torne obsoleta.

    **Ciclo de melhoria continua:**
    Segue o modelo PDCA (Plan-Do-Check-Act) aplicado a gestao de incidentes:
    - Plan: normas e procedimentos da ReGIC
    - Do: operacao da rede (notificacao, compartilhamento, cooperacao)
    - Check: revisao periodica (art. 14)
    - Act: aprimoramento baseado nas licoes aprendidas

    **Evolucao das ameacas (inciso I):**
    O cenario de ameacas evolui rapidamente. Novos vetores de ataque (AI-powered
    attacks, supply chain, ransomware-as-a-service) exigem atualizacao constante
    dos procedimentos.

    **Boas praticas (inciso II):**
    Incorporar frameworks como NIST CSF 2.0, ISO 27035:2023, FIRST CSIRT
    Services Framework, e licoes de outros governos.

    **Prazo de revisao (paragrafo unico):**
    Revisao obrigatoria a cada dois anos, no minimo. Revisao antecipada pode
    ser acionada por:
    - Incidente de grande impacto que revele deficiencias
    - Mudanca significativa no cenario de ameacas
    - Atualizacao de frameworks internacionais de referencia
    - Alteracao legislativa relevante
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de melhoria continua:**
      1. Sistema de coleta de metricas de eficacia da ReGIC (MTTD, MTTR,
         taxa de notificacao, cobertura de exercicios) para subsidiar revisoes.
      2. Dashboard de evolucao de ameacas com dados do CTIR Gov, CERT.br
         e fontes internacionais para identificar tendencias.
      3. Plataforma de gestao de mudancas para atualizar procedimentos e
         normas da ReGIC com controle de versao.
      4. Sistema de feedback dos participantes para coletar sugestoes de
         aprimoramento entre revisoes formais.
    tools:
      - metrics-dashboard
      - threat-landscape-monitor
      - change-management-platform
      - feedback-system
  devsecops:
    prose: |
      **Pipeline de revisao e atualizacao:**
      1. Pipeline de compliance-as-code que valida aderencia a versao mais
         recente das normas e procedimentos da ReGIC.
      2. Testes automatizados que detectam quando controles ficam
         desatualizados em relacao a nova versao dos procedimentos.
      3. Automacao de report de metricas de eficacia para subsidiar o
         processo de revisao bienal do GSI/PR.
      4. Pipeline de atualizacao de playbooks e regras de deteccao quando
         novos procedimentos sao publicados pelo GSI/PR.
    tools:
      - gitlab-ci
      - compliance-as-code
      - metrics-reporter
      - playbook-updater
  secops:
    prose: |
      **Participacao no ciclo de revisao:**
      1. Manter registro de licoes aprendidas de todos os incidentes para
         contribuir com o processo de revisao da ReGIC.
      2. Participar de consultas e grupos de trabalho convocados pelo
         GSI/PR para revisao dos procedimentos.
      3. Implementar tempestivamente atualizacoes de procedimentos
         publicadas pelo GSI/PR apos revisao.
      4. Monitorar evolucao do cenario de ameacas e reportar ao GSI/PR
         necessidade de revisao antecipada quando identificada.
      5. Revisar internamente playbooks e procedimentos da ETIR apos cada
         revisao dos procedimentos da ReGIC pelo GSI/PR.
    tools:
      - grc-platform
      - lessons-learned-repository
      - regulatory-monitoring
      - change-management
