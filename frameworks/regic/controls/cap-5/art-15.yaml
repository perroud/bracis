id: art-15
family: cap-5
title: "Vigencia e Disposicoes Finais"
class: REGIC
baselines: [apf-federal]
statement:
  prose: |
    Art. 15. Este Decreto entra em vigor na data de sua publicação.

    Parágrafo 1. Os órgãos e entidades da administração pública federal direta,
    autárquica e fundacional terão o prazo de cento e oitenta dias, contado da
    data de publicação deste Decreto, para adequar-se às suas disposições.

    Parágrafo 2. O GSI/PR editará, no prazo de noventa dias, contado da data
    de publicação deste Decreto, as normas complementares necessárias ao
    funcionamento da ReGIC.

    Parágrafo 3. Os casos omissos serão resolvidos pelo GSI/PR.
guidance:
  prose: |
    O art. 15 define vigencia, prazos de adequacao e competencia residual.

    **Vigencia imediata (caput):**
    O decreto entrou em vigor em 16 de julho de 2021, data de sua publicacao
    no Diario Oficial da Uniao.

    **Prazo de adequacao (par. 1):**
    Orgaos federais tiveram 180 dias (ate janeiro de 2022) para:
    - Constituir ou fortalecer ETIRs
    - Implementar procedimentos de notificacao ao CTIR Gov
    - Designar ponto focal para a ReGIC
    - Adequar processos de gestao de incidentes

    **Normas complementares do GSI/PR (par. 2):**
    O GSI/PR deveria editar normas complementares em 90 dias (ate outubro 2021).
    Isso se materializou nas revisoes das Instrucoes Normativas do GSI
    (IN1, IN2, IN3) e em orientacoes operacionais do CTIR Gov.

    **Competencia residual (par. 3):**
    Situacoes nao previstas pelo decreto ou pelas normas complementares
    sao decididas pelo GSI/PR, consolidando seu papel como autoridade
    maxima de seguranca cibernetica do governo federal.

    **Status atual:**
    Desde 2021, a ReGIC esta em pleno funcionamento. O CTIR Gov
    coordena a rede e publica relatorios periodicos sobre incidentes
    ciberneticos na APF.
implementation_guidance:
  platform_engineering:
    prose: |
      **Conformidade e adequacao:**
      1. Verificar e documentar conformidade com todas as disposicoes do
         decreto e normas complementares do GSI/PR.
      2. Implementar checklist automatizado de conformidade que valide
         atendimento aos requisitos minimos da ReGIC.
      3. Manter evidencias de conformidade em repositorio auditavel para
         demonstrar adequacao ao decreto.
      4. Sistema de acompanhamento de normas complementares do GSI/PR
         com alertas de novas publicacoes.
    tools:
      - compliance-checker
      - evidence-repository
      - regulatory-tracker
      - audit-platform
  devsecops:
    prose: |
      **Validacao de conformidade:**
      1. Pipeline de compliance check que valida se todas as disposicoes
         do decreto e normas do GSI/PR estao implementadas.
      2. Testes automatizados de conformidade executados periodicamente
         com report de gaps.
      3. Pipeline de atualizacao acionado quando novas normas complementares
         sao publicadas pelo GSI/PR.
      4. Integracao com GRC platform para rastreamento de conformidade
         end-to-end.
    tools:
      - gitlab-ci
      - compliance-as-code
      - gap-analysis
      - grc-integration
  secops:
    prose: |
      **Gestao de conformidade:**
      1. Manter mapa de conformidade atualizado com status de implementacao
         de cada disposicao do decreto.
      2. Acompanhar publicacoes do GSI/PR para normas complementares e
         atualizacoes que afetem a operacao da ReGIC.
      3. Documentar e manter evidencias de adequacao para auditorias do
         GSI/PR e orgaos de controle (TCU, CGU).
      4. Reportar casos omissos ao GSI/PR quando situacoes nao previstas
         surgirem na operacao da ReGIC.
      5. Manter plano de acao para gaps de conformidade identificados
         com prazos e responsaveis.
    tools:
      - grc-platform
      - regulatory-monitoring
      - evidence-management
      - action-plan-tracker
