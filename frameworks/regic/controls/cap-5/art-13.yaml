id: art-13
family: cap-5
title: "Adesao Voluntaria"
class: REGIC
baselines: [apf-federal]
statement:
  prose: |
    Art. 13. Poderão participar da ReGIC, de forma voluntária e mediante
    acordo de cooperação:

    I — órgãos e entidades da administração pública estadual, distrital e municipal;

    II — empresas públicas e sociedades de economia mista federais;

    III — entidades privadas que operem infraestruturas críticas;

    IV — instituições de ensino e pesquisa;

    V — organizações do terceiro setor que atuem na área de segurança cibernética.

    Parágrafo único. A adesão voluntária de que trata este artigo deverá observar
    os requisitos mínimos de segurança cibernética estabelecidos pelo GSI/PR e
    os termos do acordo de cooperação firmado com o CTIR Gov.
guidance:
  prose: |
    O art. 13 permite a expansao da ReGIC alem da APF direta, por adesao voluntaria.

    **Expansao da rede (incisos I a V):**
    A ReGIC reconhece que incidentes ciberneticos nao respeitam fronteiras
    organizacionais. A adesao voluntaria permite:
    - Governos subnacionais (estados/municipios) que possuam ETIRs
    - Estatais federais (Petrobras, BB, CEF, Correios) que tem infraestrutura critica
    - Operadores de infraestrutura critica privados (energia, telecom, financeiro)
    - Universidades e centros de pesquisa (CERT.br, RNP, LNCC)
    - ONGs e associacoes de seguranca cibernetica

    **Requisitos de adesao (paragrafo unico):**
    A adesao nao e incondicional. O aderente deve:
    1. Atender requisitos minimos de seguranca cibernetica do GSI/PR
    2. Firmar acordo de cooperacao com o CTIR Gov
    3. Observar as regras de compartilhamento de informacoes da ReGIC

    **Modelo internacional:**
    Redes como o US-CERT Extended Network e o CERT-EU tambem permitem
    adesao de entidades nao obrigadas, criando ecossistema colaborativo
    mais amplo.

    **Infraestrutura critica (inciso III):**
    Alinha-se com a Politica Nacional de Seguranca de Infraestruturas Criticas
    (Decreto 9.573/2018) ao incluir operadores privados de infraestrutura critica.
implementation_guidance:
  platform_engineering:
    prose: |
      **Suporte a participantes voluntarios:**
      1. Arquitetura multi-tenant para a plataforma de compartilhamento que
         suporte participantes com diferentes niveis de acesso (federais
         obrigatorios vs. voluntarios).
      2. Sistema de onboarding para novos participantes com validacao de
         requisitos minimos de seguranca cibernetica.
      3. Controle de acesso granular que permita compartilhamento seletivo
         conforme tipo de participante e acordo de cooperacao.
      4. API de integracao flexivel que suporte diferentes niveis de
         maturidade dos participantes voluntarios.
    tools:
      - multi-tenant-platform
      - onboarding-system
      - rbac-engine
      - api-gateway
  devsecops:
    prose: |
      **Validacao de requisitos para adesao:**
      1. Pipeline de validacao automatizada dos requisitos minimos de
         seguranca cibernetica para candidatos a adesao voluntaria.
      2. Testes de conectividade e interoperabilidade com sistemas do
         novo participante antes da adesao formal.
      3. Pipeline de avaliacao de postura de seguranca (security assessment)
         para candidatos a adesao.
      4. Automacao de provisionamento de acesso para novos participantes
         apos aprovacao do acordo de cooperacao.
    tools:
      - gitlab-ci
      - security-assessment-pipeline
      - connectivity-testing
      - access-provisioning
  secops:
    prose: |
      **Gestao de participantes voluntarios:**
      1. Manter registro atualizado de todos os participantes voluntarios
         da ReGIC com dados de contato e escopo do acordo de cooperacao.
      2. Monitorar aderencia dos participantes voluntarios aos requisitos
         minimos do GSI/PR.
      3. Gerenciar acordos de cooperacao com renovacao periodica e revisao
         de termos.
      4. Incluir participantes voluntarios em exercicios simulados e
         programas de capacitacao da ReGIC quando aplicavel.
      5. Avaliar periodicamente a contribuicao efetiva de cada participante
         voluntario para a rede.
    tools:
      - grc-platform
      - agreement-management
      - compliance-monitoring
      - participant-registry
