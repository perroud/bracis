rules:
  - id: student-rights
    title: "Student Rights (34 CFR § 99.10 - 99.12)"
    description: >-
      Establishes the rights of eligible students and parents to inspect, review,
      and request amendment of education records maintained by educational
      agencies and institutions receiving federal funding.
    effective_date: "1974-11-19"
  - id: consent-and-disclosure
    title: "Consent and Disclosure (34 CFR § 99.30 - 99.39)"
    description: >-
      Defines the conditions under which prior written consent is required for
      disclosure of personally identifiable information from education records,
      and enumerates the exceptions to the consent requirement including directory
      information, legitimate educational interest, transfers, health/safety
      emergencies, judicial orders, and research.
    effective_date: "1974-11-19"
  - id: recordkeeping-and-security
    title: "Recordkeeping and Security (34 CFR § 99.32 - 99.33)"
    description: >-
      Requires institutions to maintain a record of each disclosure of personally
      identifiable information from education records and to provide annual
      notification to parents and eligible students of their rights under FERPA.
    effective_date: "1974-11-19"

