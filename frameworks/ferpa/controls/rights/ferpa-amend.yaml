id: ferpa-amend
family: rights
title: "Right to Request Amendment of Education Records"
class: FERPA

statement:
  prose: >-
    An eligible student or parent has the right to request that an educational agency
    or institution amend education records that the student or parent believes to be
    inaccurate, misleading, or in violation of the student's rights of privacy.
    The institution must decide whether to amend the record within a reasonable time
    after receiving the request.
  parts:
    - id: ferpa-amend-1
      label: "34 CFR § 99.20(a)"
      prose: >-
        If an eligible student or parent believes the education records relating to the
        student contain information that is inaccurate, misleading, or in violation of
        the student's rights of privacy, the student or parent may ask the educational
        agency or institution to amend the record.
    - id: ferpa-amend-2
      label: "34 CFR § 99.20(b)"
      prose: >-
        The educational agency or institution shall decide whether to amend the record
        as requested within a reasonable time after receiving the request.
    - id: ferpa-amend-3
      label: "34 CFR § 99.21"
      prose: >-
        If the educational agency or institution decides not to amend the record, it
        shall inform the parent or eligible student of the decision and the right to
        a hearing under 34 CFR § 99.22.
    - id: ferpa-amend-4
      label: "34 CFR § 99.22"
      prose: >-
        The educational agency or institution shall, on request, provide an opportunity
        for a hearing to challenge the content of the student's education records on the
        grounds that the information is inaccurate, misleading, or in violation of the
        privacy rights of the student.

guidance:
  prose: >-
    The amendment right does not allow students or parents to contest grades or other
    substantive decisions — it specifically addresses factual inaccuracies, misleading
    information, and privacy violations in the record itself. Institutions must have a
    clear amendment request process with defined timelines for response. If the
    institution refuses to amend, it must notify the requester of their right to a
    formal hearing. After a hearing, if the institution still declines to amend, the
    parent or eligible student has the right to insert a statement in the record
    commenting on the contested information. That statement must be maintained with
    the record and disclosed whenever the contested portion of the record is disclosed.

references:
  - citation: "34 CFR § 99.20 - Request to amend education records"
    url: "https://www.ecfr.gov/current/title-34/subtitle-A/part-99/subpart-C/section-99.20"
  - citation: "34 CFR § 99.21 - Right to a hearing"
    url: "https://www.ecfr.gov/current/title-34/subtitle-A/part-99/subpart-C/section-99.21"
  - citation: "34 CFR § 99.22 - Conduct of a hearing"
    url: "https://www.ecfr.gov/current/title-34/subtitle-A/part-99/subpart-C/section-99.22"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build a records amendment request workflow within the student records portal.
      Implement a ticketing system that tracks amendment requests through their
      lifecycle: received, under review, approved/denied, hearing requested,
      hearing completed. Store amendment history as immutable audit records —
      never delete original data but maintain versioned records with change
      tracking. Implement the ability to attach student/parent statements to
      contested records. Ensure amendment status notifications are sent
      automatically at each stage. Build hearing scheduling and documentation
      capabilities integrated with the records system.
    tools:
      - postgresql
      - elasticsearch
      - keycloak
      - vault

  devsecops:
    prose: >-
      Test amendment workflow end-to-end in CI/CD pipelines including the
      hearing request path. Verify that amendment audit trails are immutable
      and cannot be tampered with. Ensure that student statements attached to
      contested records are included in all subsequent disclosures of those
      records. Test that original records are preserved (not deleted) when
      amendments are applied. Validate role-based access controls on the
      amendment workflow.
    tools:
      - gitlab-ci
      - sonarqube
      - checkov

  secops:
    prose: >-
      Monitor amendment request queues and alert on aging requests that risk
      exceeding reasonable response timelines. Audit amendment processing to
      ensure consistent handling. Track hearing requests and outcomes for
      compliance reporting. Detect unauthorized modifications to education
      records outside the formal amendment process. Alert on bulk amendment
      patterns that could indicate system abuse.
    tools:
      - splunk
      - elastic-siem
      - datadog

