id: ferpa-complaint
family: rights
title: "Right to File Complaint with the Department of Education"
class: FERPA

statement:
  prose: >-
    A parent or eligible student has the right to file a complaint with the
    U.S. Department of Education concerning alleged failures by an educational
    agency or institution to comply with FERPA requirements. Complaints must
    be filed with the Family Policy Compliance Office (FPCO) within 180 days
    of the date of the alleged violation or within 180 days of the date that
    the complainant knew or reasonably should have known of the alleged violation.
  parts:
    - id: ferpa-complaint-1
      label: "34 CFR § 99.63"
      prose: >-
        A parent or eligible student may file a written complaint with the
        Office regarding an alleged violation under the Act and this part.
    - id: ferpa-complaint-2
      label: "34 CFR § 99.64(a)"
      prose: >-
        A complaint must contain specific allegations of fact giving reasonable
        cause to believe that a violation of the Act or this part has occurred.
    - id: ferpa-complaint-3
      label: "34 CFR § 99.64(b)"
      prose: >-
        A complaint must be filed within 180 days of the date of the alleged
        violation or of the date that the complainant knew or reasonably should
        have known of the alleged violation.

guidance:
  prose: >-
    The complaint mechanism is the enforcement pathway for FERPA. Unlike some
    privacy laws, FERPA does not provide a private right of action — the only
    enforcement mechanism is through the Department of Education. Institutions
    should be aware that the ultimate penalty for FERPA violations is the loss
    of federal funding, which for most educational institutions is existential.
    The FPCO investigates complaints, and institutions must cooperate with
    investigations. Institutions should maintain comprehensive compliance
    documentation to respond effectively to complaints. The annual notification
    requirement (34 CFR § 99.7) must include information about the right to
    file a complaint. Proactive compliance programs significantly reduce
    complaint risk and improve outcomes when complaints are filed.

references:
  - citation: "34 CFR § 99.63 - Filing a complaint"
