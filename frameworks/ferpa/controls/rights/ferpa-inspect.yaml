implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a self-service student records portal that provides authenticated
      students and authorized parents direct access to their education records.
      Build record retrieval APIs with response time SLAs to meet the 45-day
      statutory requirement. Implement role-based access control (RBAC) ensuring
      students can only view their own records. Deploy data masking and redaction
      capabilities to automatically remove other students' information from shared
      records. Implement audit logging for all records access requests and
      fulfillment activities. Build export functionality supporting multiple
      formats (PDF, CSV) for record copies.
    tools:
      - keycloak
      - okta
      - azure-ad
      - vault
      - postgresql
      - elasticsearch

  devsecops:
    prose: >-
      Implement automated testing to verify that records access controls correctly
      restrict access to only the requesting student's records. Include integration
      tests that validate redaction of multi-student records. Scan for authorization
      bypass vulnerabilities (IDOR) that could expose other students' records.
      Enforce that all records access APIs require proper authentication and
      authorization. Test response time SLAs in CI/CD pipelines to ensure the
      45-day compliance window is achievable.
    tools:
      - gitlab-ci
      - gitlab-dast
      - owasp-zap
      - checkov
      - sonarqube

  secops:
    prose: >-
      Monitor records access request queues and alert when requests approach the
      45-day deadline. Track and audit all access to education records systems.
      Detect unauthorized access attempts to student records. Monitor for bulk
      data access patterns that could indicate data exfiltration. Generate
      compliance reports showing average and maximum fulfillment times. Alert on
      access attempts where a user tries to view another student's records.
    tools:
      - splunk
      - elastic-siem
      - datadog
      - pagerduty

