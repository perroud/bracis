id: ferpa-inspect
family: rights
title: "Right to Inspect and Review Education Records"
class: FERPA

statement:
  prose: >-
    Each eligible student or parent of a student has the right to inspect and review
    the student's education records maintained by the educational agency or institution.
    The institution must comply with a request to inspect and review records within a
    reasonable period of time, but not more than 45 days after the request is received.
  parts:
    - id: ferpa-inspect-1
      label: "34 CFR § 99.10(a)"
      prose: >-
        An educational agency or institution shall comply with a request for access to
        records within a reasonable period of time, but not more than 45 days after it
        has received the request.
    - id: ferpa-inspect-2
      label: "34 CFR § 99.10(b)"
      prose: >-
        The educational agency or institution shall respond to reasonable requests for
        explanations and interpretations of the records.
    - id: ferpa-inspect-3
      label: "34 CFR § 99.11"
      prose: >-
        If the education records of a student contain information on more than one
        student, the parent or eligible student may inspect and review or be informed
        of only the specific information about that student.

guidance:
  prose: >-
    The right to inspect and review is the foundational right under FERPA. Institutions
    must have a clear, documented process for receiving and fulfilling records access
    requests. The 45-day deadline is a maximum — institutions should aim to respond
    significantly faster. Records must be presented in a form intelligible to the
    requester, with explanations provided as needed. When records contain information
    about multiple students, the institution must redact or segregate other students'
    information before providing access. This right extends to all education records,
    regardless of format (paper, electronic, audio, video). Institutions cannot charge
    a fee for searching or retrieving records, but may charge for copies if the fee
    does not effectively prevent access.

references:
  - citation: "34 CFR § 99.10 - Right to inspect and review education records"
