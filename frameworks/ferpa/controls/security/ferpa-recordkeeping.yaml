id: ferpa-recordkeeping
family: security
title: "Record of Disclosures"
class: FERPA

statement:
  prose: >-
    An educational agency or institution must maintain a record of each request
    for access to and each disclosure of personally identifiable information from
    the education records of each student. The record must include the parties who
    have requested or received PII, and the legitimate interests the parties had
    in requesting or obtaining the information.
  parts:
    - id: ferpa-recordkeeping-1
      label: "34 CFR § 99.32(a)(1)"
      prose: >-
        An educational agency or institution must maintain a record of each request
        for access to and each disclosure of PII from the education records of each
        student.
    - id: ferpa-recordkeeping-2
      label: "34 CFR § 99.32(a)(2)"
      prose: >-
        The record must include the parties who have requested or received PII from
        the education records, and the legitimate interests the parties had in
        requesting or obtaining the information.
    - id: ferpa-recordkeeping-3
      label: "34 CFR § 99.32(a)(3)"
      prose: >-
        If a third party outside the institution permits access to PII received
        under 34 CFR § 99.33(a), the record of the initial disclosure must include
        the names of the additional parties to whom the receiving party may disclose
        the information and the legitimate interests under 34 CFR § 99.31 which
        each of the additional parties has in requesting or obtaining the information.
    - id: ferpa-recordkeeping-4
      label: "34 CFR § 99.32(b)"
      prose: >-
        The record of disclosures may be inspected by the parent or eligible student,
        the school official responsible for custody of the records, and the officials
        of the Department of Education for FERPA enforcement purposes.

guidance:
  prose: >-
    The disclosure recordkeeping requirement is one of FERPA's most important
    compliance obligations. Every disclosure of PII from education records must
    be logged — the only exceptions are disclosures to the student themselves,
    disclosures with consent, disclosures of directory information, and disclosures
    to school officials with legitimate educational interest. The disclosure record
    must be maintained with the student's education records and must be available
    for inspection by the student/parent. The record must include: who received the
    data, when, what was disclosed, and the legal basis (legitimate interest).
    Institutions should implement automated disclosure logging in all systems that
    handle education records. Manual disclosure tracking is error-prone and
    insufficient for institutions handling large volumes of records. Disclosure
    records must be maintained for as long as the education records are maintained.

references:
  - citation: "34 CFR § 99.32 - Record of disclosures"
    url: "https://www.ecfr.gov/current/title-34/subtitle-A/part-99/subpart-D/section-99.32"
  - citation: "34 CFR § 99.33 - Limitations on redisclosure"
    url: "https://www.ecfr.gov/current/title-34/subtitle-A/part-99/subpart-D/section-99.33"
  - citation: "PTAC Guidance on Disclosure Records"
    url: "https://studentprivacy.ed.gov/resources"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a centralized, immutable disclosure logging system that
      automatically captures all disclosures of education records PII across
      all institutional systems. Each disclosure record must capture: student
      ID, recipient identity, date/time, records disclosed, legal basis
      (consent, exception type), and the requesting party's legitimate
      interest. Deploy append-only storage for disclosure logs to prevent
      tampering. Build a student-facing disclosure log viewer in the records
      portal. Implement cross-system disclosure aggregation to provide a
      complete view even when records are distributed across multiple systems.
      Integrate disclosure logging with consent management to automatically
      link disclosures to their consent basis. Build retention policies that
      maintain disclosure logs for the lifetime of the education records.
    tools:
      - postgresql
      - elasticsearch
      - kafka
      - vault
      - grafana

  devsecops:
    prose: >-
      Test that all disclosure events are captured in the disclosure log.
      Verify log immutability — test that disclosure records cannot be
      modified or deleted. Validate that disclosure logs include all required
      fields. Test the student-facing disclosure log viewer for accuracy and
      completeness. Implement integration tests that trigger disclosures and
      verify corresponding log entries. Scan for disclosure code paths that
      bypass the logging mechanism.
    tools:
      - gitlab-ci
      - sonarqube
      - checkov
      - owasp-zap

  secops:
    prose: >-
      Monitor disclosure logging system health and alert on logging failures.
      Audit disclosure logs for completeness by comparing against known
      disclosure events. Alert on disclosures that lack a documented legal
      basis. Monitor for gaps in disclosure logging that could indicate
      bypass. Generate periodic disclosure reports for institutional
      compliance review. Track disclosure log access and alert on
      unauthorized access attempts.
    tools:
      - splunk
      - elastic-siem
      - datadog
      - grafana

