id: ferpa-annual-notice
family: security
title: "Annual Notification of Rights"
class: FERPA

statement:
  prose: >-
    An educational agency or institution must annually notify parents of students
    currently in attendance, or eligible students currently in attendance, of their
    rights under FERPA. The notice must inform parents or eligible students of their
    right to inspect and review education records, their right to seek amendment,
    the conditions under which the institution may disclose PII without consent, and
    the right to file a complaint with the Department of Education.
  parts:
    - id: ferpa-annual-notice-1
      label: "34 CFR § 99.7(a)"
      prose: >-
        An educational agency or institution shall annually notify parents of students
        currently in attendance, or eligible students currently in attendance, of their
        rights under the Act and this part.
    - id: ferpa-annual-notice-2
      label: "34 CFR § 99.7(a)(1)"
      prose: >-
        The notification must include the right to inspect and review the student's
        education records.
    - id: ferpa-annual-notice-3
      label: "34 CFR § 99.7(a)(2)"
      prose: >-
        The notification must include the right to seek amendment of the student's
        education records that the parent or eligible student believes to be
        inaccurate, misleading, or otherwise in violation of the student's
        privacy rights.
    - id: ferpa-annual-notice-4
      label: "34 CFR § 99.7(a)(3)"
      prose: >-
        The notification must include the right to consent to disclosures of PII
        contained in the student's education records, except to the extent that
        FERPA and the regulations authorize disclosure without consent.
    - id: ferpa-annual-notice-5
      label: "34 CFR § 99.7(a)(4)"
      prose: >-
        The notification must include the right to file a complaint with the
        Department of Education under 34 CFR §§ 99.63 and 99.64 concerning
        alleged failures by the educational agency or institution to comply
        with the requirements of the Act and this part.

guidance:
  prose: >-
    The annual notification is a fundamental compliance requirement. It must be
    provided through means reasonably likely to inform parents and eligible students
    of their rights — this can include direct mail, email, inclusion in student
    handbooks, posting on the institutional website, or publication in the student
    newspaper. The notice must be provided in a language and form that is
    understandable. For institutions with significant non-English-speaking populations,
    translations should be provided. The notice must also include the institution's
    directory information policy and the opt-out procedure, the definition of "school
    official" and "legitimate educational interest," and the institution's procedure
    for exercising each right. Institutions should retain proof of annual notification
    delivery. The notice must be effective — merely having a policy posted somewhere
    obscure is insufficient.

references:
  - citation: "34 CFR § 99.7 - Annual notification"
    url: "https://www.ecfr.gov/current/title-34/subtitle-A/part-99/subpart-B/section-99.7"
  - citation: "FPCO Model Notification of Rights"
    url: "https://studentprivacy.ed.gov/resources/ferpa-model-notification-rights"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement an automated annual notification system that delivers FERPA
      rights notices to all currently enrolled students and parents at the
      start of each academic year. Build multi-channel notification delivery
      (email, portal notification, SMS) with delivery confirmation tracking.
      Implement a FERPA rights page in the student/parent portal that is
      always accessible. Build notification templates with versioning to
      track changes year-over-year. Implement language localization for
      notifications based on student/parent language preferences. Build
      directory information opt-out workflows triggered from the annual
      notification. Track notification delivery rates and follow up on
      undelivered notifications.
    tools:
      - postgresql
      - redis
      - sendgrid
      - keycloak

  devsecops:
    prose: >-
      Test annual notification delivery workflows end-to-end. Verify that
      notifications include all required content elements. Test multi-
      language notification rendering. Validate delivery confirmation
      tracking. Test opt-out workflow integration. Verify that notification
      templates are versioned and changes are tracked. Implement automated
      content validation to ensure notifications include all required
      rights (inspect, amend, consent, complaint).
    tools:
      - gitlab-ci
      - sonarqube

  secops:
    prose: >-
      Monitor annual notification delivery rates and alert on significant
      non-delivery. Track opt-out rates from annual notifications. Audit
      notification content for compliance with regulatory requirements.
      Generate compliance evidence reports showing notification delivery
      dates, rates, and follow-up actions. Alert when the annual
      notification cycle has not been initiated by the required date.
    tools:
      - splunk
      - datadog
      - grafana

