implementation_guidance:
  platform_engineering:
    prose: >-
      Implement centralized identity and access management (IAM) with multi-factor
      authentication for all users accessing education records. Deploy role-based
      access control (RBAC) that limits access based on legitimate educational
      interest definitions. Implement encryption at rest (AES-256) for all
      education records storage and encryption in transit (TLS 1.3) for all
      data transmissions. Deploy session management with configurable timeouts
      and automatic logoff. Implement network segmentation to isolate education
      records systems. Build periodic access review workflows that verify
      access assignments remain appropriate. Deploy intrusion detection and
      prevention systems. Implement data loss prevention (DLP) controls to
      prevent unauthorized exfiltration of education records.
    tools:
      - keycloak
      - okta
      - azure-ad
      - vault
      - aws-kms
      - azure-key-vault
      - open-policy-agent
      - istio

  devsecops:
    prose: >-
      Implement security scanning across the education records technology stack.
      Run SAST, DAST, and dependency scanning in CI/CD pipelines. Test
      authentication and authorization controls for vulnerabilities. Verify
      encryption configuration for all storage and transmission paths. Scan
      infrastructure-as-code for security misconfigurations. Test session
      management including timeout enforcement. Implement secret scanning to
      prevent credential exposure. Conduct periodic penetration testing of
      education records systems.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - gitlab-secret-detection
      - checkov
      - tfsec
      - owasp-zap

  secops:
    prose: >-
      Monitor authentication events across all education records systems.
      Alert on authentication failures, brute force attempts, and credential
      stuffing. Monitor access patterns and detect anomalies. Track
      encryption status across all storage and verify compliance. Conduct
      periodic access reviews and report on findings. Monitor for data
      exfiltration attempts. Track security control effectiveness and
      report to institutional leadership. Alert on configuration changes
      to access control, encryption, or authentication systems.
    tools:
      - splunk
      - elastic-siem
      - qualys
      - tenable
      - crowdstrike
      - datadog

