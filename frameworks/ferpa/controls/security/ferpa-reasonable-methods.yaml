id: ferpa-reasonable-methods
family: security
title: "Reasonable Methods to Ensure Access Is Limited"
class: FERPA

statement:
  prose: >-
    An educational agency or institution must use reasonable methods to ensure
    that school officials obtain access to only those education records in which
    they have a legitimate educational interest. The institution must use reasonable
    methods to identify and authenticate the identity of parents, students, school
    officials, and any other parties to whom it discloses PII from education records.
  parts:
    - id: ferpa-reasonable-methods-1
      label: "34 CFR § 99.31(a)(1)(ii)"
      prose: >-
        An educational agency or institution must use reasonable methods to ensure
        that school officials obtain access to only those education records in which
        they have legitimate educational interests.
    - id: ferpa-reasonable-methods-2
      label: "34 CFR § 99.31(c)"
      prose: >-
        An educational agency or institution must use reasonable methods to identify
        and authenticate the identity of parents, students, school officials, and
        any other parties to whom the agency or institution discloses PII from
        education records.
    - id: ferpa-reasonable-methods-3
      label: "34 CFR § 99.31(c) (continued)"
      prose: >-
        The reasonable methods may include, but are not limited to, using personal
        identification numbers, passwords, or other factors known or possessed
        only by the authorized user, along with methods to protect passwords and
        other authentication credentials from unauthorized disclosure.

guidance:
  prose: >-
    While FERPA does not prescribe specific technical security measures (unlike
    HIPAA), it requires "reasonable methods" — a standard that evolves with
    technology and threats. In modern contexts, reasonable methods include strong
    authentication (multi-factor authentication), role-based access control,
    encryption, network security, and monitoring. The Department of Education has
    indicated that what constitutes "reasonable" depends on the institution's
    size, resources, and the sensitivity of the data. At minimum, institutions
    should implement: unique user identification, strong passwords or MFA,
    session management with timeouts, access logging, and periodic access
    reviews. For electronic records, encryption at rest and in transit is
    increasingly considered a baseline reasonable method. Institutions must also
    verify the identity of individuals requesting records — this includes in-
    person verification, authentication for electronic access, and verification
    procedures for phone and mail requests.

