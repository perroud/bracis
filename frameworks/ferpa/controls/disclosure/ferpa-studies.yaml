implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a research data sharing platform with de-identification
      capabilities. Build automated de-identification pipelines that remove
      or pseudonymize PII before data is shared with researchers. Implement
      data use agreement (DUA) management with automated enforcement of
      agreement terms (data access expiration, scope limitations). Deploy
      secure research data environments (data clean rooms) where researchers
      can analyze data without extracting identified records. Build data
      destruction workflows that verify and certify destruction when studies
      conclude. Implement re-identification risk assessment tools to validate
      de-identification effectiveness.
    tools:
      - postgresql
      - vault
      - keycloak
      - jupyter
      - apache-spark

  devsecops:
    prose: >-
      Test de-identification pipelines to verify that PII is effectively
      removed or pseudonymized. Validate that research data environments
      prevent data exfiltration. Test data access expiration enforcement.
      Verify that data destruction workflows completely remove data and
      certify destruction. Implement re-identification attack testing to
      validate de-identification robustness. Scan research data exports
      for residual PII.
    tools:
      - gitlab-ci
      - sonarqube
      - checkov

  secops:
    prose: >-
      Monitor research data access for compliance with DUA terms. Alert on
      data access beyond authorized scope or after agreement expiration.
      Track data destruction activities and verify completion. Audit
      de-identification processes for effectiveness. Monitor for re-
      identification attempts. Generate compliance reports showing active
      research agreements, data access activity, and destruction status.
    tools:
      - splunk
      - elastic-siem
      - datadog

