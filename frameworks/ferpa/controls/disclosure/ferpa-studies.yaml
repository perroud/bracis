id: ferpa-studies
family: disclosure
title: "Studies and Research Exception"
class: FERPA

statement:
  prose: >-
    An educational agency or institution may disclose personally identifiable
    information from education records without consent to organizations conducting
    studies for, or on behalf of, educational agencies or institutions to develop,
    validate, or administer predictive tests, administer student aid programs, or
    improve instruction, provided that the study is conducted in a manner that does
    not permit personal identification of parents and students by individuals other
    than representatives of the organization, and the information is destroyed when
    no longer needed for the purposes of the study.
  parts:
    - id: ferpa-studies-1
      label: "34 CFR § 99.31(a)(6)(i)"
      prose: >-
        An educational agency or institution may disclose PII without consent to
        organizations conducting studies for, or on behalf of, educational agencies
        or institutions to develop, validate, or administer predictive tests;
        administer student aid programs; or improve instruction.
    - id: ferpa-studies-2
      label: "34 CFR § 99.31(a)(6)(ii)(A)"
      prose: >-
        The study must be conducted in a manner that does not permit personal
        identification of parents and students by individuals other than
        representatives of the organization that have legitimate interests in
        the information.
    - id: ferpa-studies-3
      label: "34 CFR § 99.31(a)(6)(ii)(B)"
      prose: >-
        The information must be destroyed when no longer needed for the purposes
        for which the study was conducted.
    - id: ferpa-studies-4
      label: "34 CFR § 99.31(a)(6)(iii)"
      prose: >-
        The educational agency or institution must enter into a written agreement
        with the organization that specifies the purpose, scope, and duration of
        the study, the information to be disclosed, and requires the organization
        to use PII only to meet the purpose of the study and to conduct the study
        in a manner that does not permit personal identification.

guidance:
  prose: >-
    The studies exception enables educational research while protecting student
    privacy. It requires a formal written agreement between the institution and
    the research organization. The agreement must specify: purpose, scope, duration,
    information to be disclosed, data security requirements, and destruction
    obligations. The research must serve one of three purposes: developing/validating
    predictive tests, administering student aid, or improving instruction. The
    institution retains oversight responsibility — it must ensure the research
    organization complies with the agreement terms. Personal identification of
    students must not be possible by anyone outside the authorized research team.
    De-identification or pseudonymization should be used where feasible. Data
    must be destroyed when the study concludes. Institutions should conduct
    periodic compliance reviews of active research agreements.

