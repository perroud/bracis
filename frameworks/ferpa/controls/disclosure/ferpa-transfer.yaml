id: ferpa-transfer
family: disclosure
title: "Transfer to Other Schools"
class: FERPA

statement:
  prose: >-
    An educational agency or institution may disclose personally identifiable
    information from education records without consent to officials of another
    school, school system, or institution of postsecondary education where the
    student seeks or intends to enroll, or where the student is already enrolled,
    so long as the disclosure is for purposes related to the student's enrollment
    or transfer.
  parts:
    - id: ferpa-transfer-1
      label: "34 CFR § 99.31(a)(2)"
      prose: >-
        An educational agency or institution may disclose PII from education records
        without consent to officials of another school, school system, or institution
        of postsecondary education where the student seeks or intends to enroll, or
        where the student is already enrolled, if the disclosure is for purposes
        related to the student's enrollment or transfer.
    - id: ferpa-transfer-2
      label: "34 CFR § 99.34(a)"
      prose: >-
        An educational agency or institution that discloses education records under
        this exception must make a reasonable attempt to notify the parent or eligible
        student of the disclosure, unless the institution states in its annual
        notification that it forwards education records to other agencies or
        institutions upon request.
    - id: ferpa-transfer-3
      label: "34 CFR § 99.34(b)"
      prose: >-
        An educational agency or institution that discloses education records under
        this section must provide the parent or eligible student, upon request, with
        a copy of the record that was disclosed and an opportunity for a hearing
        if applicable.

guidance:
  prose: >-
    The transfer exception facilitates student mobility between educational
    institutions. It applies when a student is seeking to enroll, intending to
    enroll, or is already enrolled at the receiving institution. The sending
    institution must either notify parents/students of the transfer or include
    a general notice about record forwarding in its annual FERPA notification.
    Institutions should implement secure transfer mechanisms — education records
    should not be transmitted via unencrypted email or unsecured channels.
    The receiving institution becomes subject to FERPA requirements for the
    transferred records. Institutions should establish data sharing agreements
    with frequent transfer partners that define security requirements, permitted
    uses, and retention/destruction obligations.

references:
  - citation: "34 CFR § 99.31(a)(2) - Transfer exception"
    url: "https://www.ecfr.gov/current/title-34/subtitle-A/part-99/subpart-D/section-99.31"
  - citation: "34 CFR § 99.34 - Conditions for disclosure to other schools"
    url: "https://www.ecfr.gov/current/title-34/subtitle-A/part-99/subpart-D/section-99.34"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement secure record transfer APIs using encrypted channels (TLS 1.3
      minimum) with mutual authentication between institutions. Build a records
      transfer workflow that tracks outbound transfers including: records sent,
      receiving institution, purpose, date, and notification status. Implement
      automated notification to parents/eligible students when records are
      transferred. Deploy data sharing agreement management with technical
      controls enforcing agreement terms. Build interoperability with standard
      education data exchange formats (e.g., PESC, SIF, Ed-Fi). Implement
      record packaging that includes only data relevant to the transfer purpose.
    tools:
      - vault
      - postgresql
      - keycloak
      - aws-kms

  devsecops:
    prose: >-
      Test transfer API security including authentication, authorization, and
      encryption. Verify that transfer notifications are sent to parents/students.
      Scan transfer packages for data leakage (inclusion of records beyond the
      transfer scope). Test that transfer audit logs capture all required
      information. Validate TLS configuration on transfer endpoints. Implement
      integration tests with mock receiving institutions.
    tools:
      - gitlab-ci
      - gitlab-dast
      - owasp-zap
      - checkov

  secops:
    prose: >-
      Monitor record transfer activities and verify compliance with data sharing
      agreements. Alert on transfers to unrecognized institutions. Track transfer
      notification delivery and confirm parent/student acknowledgment where
      required. Detect bulk transfer patterns that could indicate unauthorized
      data export. Audit transfer logs for completeness and accuracy. Monitor
      transfer channel security (TLS versions, certificate validity).
    tools:
      - splunk
      - elastic-siem
      - datadog

