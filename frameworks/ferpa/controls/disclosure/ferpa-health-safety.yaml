id: ferpa-health-safety
family: disclosure
title: "Health or Safety Emergency Exception"
class: FERPA

statement:
  prose: >-
    An educational agency or institution may disclose personally identifiable
    information from education records without consent to appropriate parties,
    including parents of an eligible student, in connection with a health or
    safety emergency if knowledge of the information is necessary to protect
    the health or safety of the student or other individuals.
  parts:
    - id: ferpa-health-safety-1
      label: "34 CFR § 99.31(a)(10)"
      prose: >-
        An educational agency or institution may disclose PII from education records
        to appropriate parties in connection with an emergency if knowledge of the
        information is necessary to protect the health or safety of the student or
        other individuals.
    - id: ferpa-health-safety-2
      label: "34 CFR § 99.36(a)"
      prose: >-
        An educational agency or institution may disclose PII from education records
        to appropriate parties, including parents of an eligible student, in connection
        with an emergency, if knowledge of the information is necessary to protect the
        health or safety of the student or other individuals.
    - id: ferpa-health-safety-3
      label: "34 CFR § 99.36(c)"
      prose: >-
        In making a determination under this section, an educational agency or
        institution may take into account the totality of the circumstances pertaining
        to a threat to the health or safety of a student or other individuals. If
        the agency or institution determines that there is an articulable and
        significant threat to the health or safety of a student or other individuals,
        it may disclose information from education records to any person whose
        knowledge of the information is necessary to protect the health or safety
        of the student or other individuals.

guidance:
  prose: >-
    The health or safety emergency exception is narrowly construed and time-limited.
    It applies only during the period of the emergency and only to the extent that
    disclosure is necessary to address the emergency. The Department of Education's
    2008 and 2011 amendments clarified that institutions should apply a "totality of
    the circumstances" test, providing more flexibility than the prior "strict
    construction" standard. However, institutions should not treat this as a broad
    exception — it requires an articulable and significant threat. Appropriate parties
    include law enforcement, public health authorities, medical personnel, and parents
    (including parents of eligible students in genuine emergencies). Institutions must
    document the emergency, the basis for the determination, and the parties to whom
    disclosure was made. This exception intersects with HIPAA when health records are
    maintained by the educational institution — FERPA generally takes precedence for
    records maintained by the institution.

