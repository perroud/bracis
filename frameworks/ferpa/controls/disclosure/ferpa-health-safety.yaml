implementation_guidance:
  platform_engineering:
    prose: >-
      Implement an emergency disclosure workflow with escalation and approval
      mechanisms. Build a break-glass access procedure that allows authorized
      officials to access student records during emergencies with enhanced
      logging and mandatory post-event review. Implement emergency disclosure
      documentation templates that capture: the nature of the emergency, the
      articulable and significant threat, the records disclosed, the recipients,
      and the official who authorized the disclosure. Build time-limited
      emergency access tokens that automatically expire when the emergency
      period ends. Integrate with campus emergency management and notification
      systems.
    tools:
      - keycloak
      - vault
      - postgresql
      - pagerduty

  devsecops:
    prose: >-
      Test break-glass access procedures to verify they work correctly under
      emergency conditions. Verify that emergency access is properly logged
      with enhanced audit detail. Test that emergency access tokens expire
      correctly. Ensure post-event review workflows are triggered automatically
      after emergency access. Validate that emergency disclosure documentation
      captures all required fields.
    tools:
      - gitlab-ci
      - checkov
      - sonarqube

  secops:
    prose: >-
      Alert immediately on any emergency disclosure activation. Monitor
      emergency access for duration and scope — flag if access extends beyond
      the emergency period. Conduct mandatory post-event reviews of all
      emergency disclosures. Audit emergency disclosure documentation for
      completeness. Track emergency disclosure patterns and report to
      institutional leadership. Ensure all emergency disclosures are
      recorded in the required disclosure log per 34 CFR § 99.32.
    tools:
      - splunk
      - elastic-siem
      - pagerduty
      - datadog

