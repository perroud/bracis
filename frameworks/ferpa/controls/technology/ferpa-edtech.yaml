implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a vendor management platform that tracks all EdTech providers
      with access to education records. Build a vendor onboarding workflow that
      verifies FERPA compliance requirements: data use agreements, direct
      control provisions, use limitations, redisclosure restrictions, data
      destruction obligations, and audit rights. Implement API gateways that
      mediate vendor access to education records with granular access controls,
      rate limiting, and comprehensive logging. Deploy data classification
      tagging so systems can enforce which data elements vendors can access.
      Build vendor access monitoring dashboards. Implement data flow mapping
      to track where education records are transmitted to vendor systems.
      Enforce data residency requirements through infrastructure controls.
      Build automated vendor compliance assessment tools.
    tools:
      - keycloak
      - okta
      - kong
      - open-policy-agent
      - vault
      - postgresql
      - grafana

  devsecops:
    prose: >-
      Test vendor API integrations for data leakage beyond contracted scope.
      Verify that vendor access controls enforce data use limitations. Scan
      vendor integration code for hardcoded credentials or excessive data
      sharing. Test that vendor access is properly scoped and logged.
      Implement integration tests that verify vendors cannot access records
      beyond their authorized scope. Validate that data flow to vendors
      is encrypted in transit. Review vendor SDKs and libraries for
      security vulnerabilities and data collection behaviors.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dependency-scanning
      - owasp-zap
      - checkov

  secops:
    prose: >-
      Monitor vendor access patterns to education records. Alert on vendor
      access anomalies (unusual volumes, off-hours access, access to
      unauthorized data). Track vendor compliance with data use agreements.
      Audit vendor sub-processor relationships. Monitor for data exfiltration
      through vendor integrations. Generate vendor access reports for
      institutional compliance review. Track vendor contract expiration and
      ensure data destruction obligations are met upon contract termination.
      Alert on vendor security incidents that could affect education records.
    tools:
      - splunk
      - elastic-siem
      - datadog
      - pagerduty

