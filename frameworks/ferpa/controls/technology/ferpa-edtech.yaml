id: ferpa-edtech
family: technology
title: "EdTech and Third-Party Service Providers"
class: FERPA

statement:
  prose: >-
    When an educational institution outsources institutional services or functions
    to third-party service providers, including educational technology (EdTech)
    vendors, those providers may be considered "school officials" under FERPA and
    may access education records without consent, provided they meet specific
    criteria: the provider performs an institutional service or function for which
    the institution would otherwise use employees, the provider is under the direct
    control of the institution with respect to the use and maintenance of education
    records, and the provider is subject to the same conditions governing use and
    redisclosure of PII as institutional employees.
  parts:
    - id: ferpa-edtech-1
      label: "34 CFR § 99.31(a)(1)(i)(B)"
      prose: >-
        A contractor, consultant, volunteer, or other party to whom an agency or
        institution has outsourced institutional services or functions may be
        considered a school official under this paragraph if the outside party
        performs an institutional service or function for which the agency or
        institution would otherwise use employees.
    - id: ferpa-edtech-2
      label: "34 CFR § 99.31(a)(1)(i)(B)(1)"
      prose: >-
        The outside party is under the direct control of the agency or institution
        with respect to the use and maintenance of education records.
    - id: ferpa-edtech-3
      label: "34 CFR § 99.31(a)(1)(i)(B)(2)"
      prose: >-
        The outside party is subject to the requirements of 34 CFR § 99.33(a)
        governing the use and redisclosure of PII from education records.

guidance:
  prose: >-
    EdTech vendors have become ubiquitous in education, and FERPA compliance for
    these relationships is critical. The "school official" designation for vendors
    is not automatic — institutions must establish contractual controls that meet
    the three statutory criteria. Key compliance considerations: (1) The institution
    must maintain "direct control" over how the vendor uses and maintains education
    records — this requires contractual provisions, audit rights, and oversight
    mechanisms. (2) The vendor must be limited to using PII only for the contracted
    purpose — they cannot use student data for their own commercial purposes
    (targeted advertising, product improvement with identified data, sale of data).
    (3) The vendor must comply with the same redisclosure restrictions as
    institutional employees. Institutions should conduct due diligence on vendors'
    data practices, including their privacy policies, data storage locations, sub-
    processor relationships, and data retention/destruction practices. State student
    privacy laws (e.g., SOPIPA, state-level student data privacy acts) may impose
    additional requirements beyond FERPA.

