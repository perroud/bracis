id: ferpa-cloud
family: technology
title: "Cloud Storage of Education Records"
class: FERPA

statement:
  prose: >-
    When an educational institution uses cloud computing services to store, process,
    or transmit education records, the cloud service provider may be considered a
    "school official" under FERPA's outsourced services provision. The institution
    must maintain direct control over the cloud provider's use and maintenance of
    education records, ensure the provider is contractually bound to the same use
    and redisclosure restrictions as institutional employees, and implement
    reasonable methods to protect education records in cloud environments.
  parts:
    - id: ferpa-cloud-1
      label: "34 CFR § 99.31(a)(1)(i)(B) — Applied to Cloud Services"
      prose: >-
        Cloud service providers storing or processing education records must meet
        the same criteria as other outsourced service providers: perform an
        institutional service or function, operate under the institution's direct
        control with respect to education records, and comply with use and
        redisclosure restrictions.
    - id: ferpa-cloud-2
      label: "34 CFR § 99.31(c) — Applied to Cloud Security"
      prose: >-
        The institution must use reasonable methods to protect education records
        in cloud environments, including measures to identify and authenticate
        users accessing cloud-stored records and to protect authentication
        credentials from unauthorized disclosure.
    - id: ferpa-cloud-3
      label: "34 CFR § 99.32 — Applied to Cloud Access"
      prose: >-
        Disclosure records must be maintained for education records stored in
        cloud environments, including logging of all access to cloud-stored
        records by cloud provider personnel and authorized institutional users.

guidance:
  prose: >-
    Cloud storage of education records introduces specific compliance challenges
    that institutions must address. Key considerations: (1) Data sovereignty —
    institutions must know where cloud providers store education records and ensure
    data residency requirements are met. (2) Encryption — education records should
    be encrypted at rest in cloud storage using keys controlled by the institution,
    not solely the cloud provider (BYOK/HYOK where possible). (3) Access control —
    the institution must control who can access education records in the cloud,
    including limiting cloud provider personnel access to the minimum necessary
    for service delivery. (4) Data portability — institutions must retain the
    ability to retrieve and migrate their education records, ensuring they are
    not locked into a specific cloud provider. (5) Data destruction — when
    the cloud contract ends, the provider must certify complete destruction
    of education records from all storage (including backups). (6) Incident
    response — the cloud provider must notify the institution promptly of any
    security incident affecting education records. (7) Sub-processors — the
    institution must approve and maintain oversight of any sub-processors
    the cloud provider uses for education records.

