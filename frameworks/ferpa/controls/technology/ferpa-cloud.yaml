  - citation: "PTAC Data Security Checklist"
    url: "https://studentprivacy.ed.gov/resources/data-security-checklist"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement cloud security controls specific to education records protection.
      Deploy encryption at rest using customer-managed keys (BYOK/HYOK) with
      AWS KMS, Azure Key Vault, or GCP Cloud KMS. Enforce encryption in transit
      with TLS 1.3 for all cloud communications. Implement cloud identity and
      access management (IAM) with least-privilege policies for all roles
      accessing education records. Deploy cloud-native logging and monitoring
      (CloudTrail, Azure Monitor, GCP Cloud Audit Logs) for all access to
      education records. Implement data residency controls to ensure education
      records are stored only in approved regions. Build automated compliance
      scanning of cloud configurations using cloud security posture management
      (CSPM) tools. Deploy data loss prevention (DLP) policies to prevent
      unauthorized export of education records from cloud environments.
      Implement backup and disaster recovery with encryption and access
      controls equivalent to production. Build data portability capabilities
      to avoid vendor lock-in.
    tools:
      - aws-kms
      - azure-key-vault
      - gcp-cloud-kms
      - vault
      - terraform
      - pulumi
      - keycloak
      - istio

  devsecops:
    prose: >-
      Scan infrastructure-as-code for cloud security misconfigurations before
      deployment. Verify encryption at rest and in transit for all education
      records storage. Test IAM policies for least-privilege compliance. Scan
      for publicly accessible cloud storage containing education records.
      Validate cloud logging configurations capture all required audit events.
      Test data residency controls. Implement automated cloud security
      benchmarks (CIS Benchmarks) in CI/CD pipelines. Verify backup encryption
      and access controls.
    tools:
      - gitlab-ci
      - checkov
      - tfsec
      - trivy
      - gitlab-sast
      - gitlab-secret-detection

  secops:
    prose: >-
      Monitor cloud environments continuously for security misconfigurations
      affecting education records. Alert on public access to education records
      storage. Monitor cloud provider access to institutional data. Track
      encryption key usage and rotation. Alert on data transfer outside
      approved regions. Monitor for unusual cloud API calls that could indicate
      compromise. Implement cloud security posture management (CSPM) with
      continuous assessment. Track cloud provider security incidents and
      assess impact on education records. Monitor cloud costs for anomalies
      that could indicate data exfiltration (high egress).
    tools:
      - splunk
      - elastic-siem
      - aws-guardduty
      - azure-sentinel
      - gcp-security-command-center
      - prisma-cloud
      - datadog

