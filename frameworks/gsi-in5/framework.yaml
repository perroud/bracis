url: "https://www.legisweb.com.br/legislacao/?id=419510"
control_families:
  - id: cap-1
    title: "Disposicoes Gerais"
    description: "Objeto, definicoes, classificacao de modelos de nuvem e abrangencia da norma para orgaos e entidades da APF"
    articles: "art. 1 ao art. 4"
    control_count: 4
  - id: cap-2
    title: "Classificacao de Dados para Nuvem"
    description: "Niveis de classificacao da informacao, restricoes por tipo de dado e criterios para definicao de dados passiveis de armazenamento em nuvem"
    articles: "art. 5 ao art. 8"
    control_count: 4
  - id: cap-3
    title: "Requisitos de Seguranca"
    description: "Criptografia, autenticacao, registros de auditoria, backup, gestao de vulnerabilidades e hardening de ambientes em nuvem"
    articles: "art. 9 ao art. 14"
    control_count: 6
  - id: cap-4
    title: "Localizacao e Soberania de Dados"
    description: "Territorialidade dos dados, jurisdicao aplicavel, transferencia internacional e restricoes de armazenamento"
    articles: "art. 15 ao art. 18"
    control_count: 4
  - id: cap-5
    title: "Requisitos Contratuais"
    description: "SLA, responsabilidades do provedor, auditoria, portabilidade e clausulas obrigatorias em contratos de nuvem"
    articles: "art. 19 ao art. 23"
    control_count: 5
  - id: cap-6
    title: "Gestao e Monitoramento"
    description: "Monitoramento continuo de servicos em nuvem, gestao de incidentes, indicadores de desempenho e relatorios periodicos"
    articles: "art. 24 ao art. 27"
    control_count: 4
  - id: cap-7
    title: "Disposicoes Finais"
    description: "Cronograma de adequacao dos orgaos, revisao periodica da norma e responsabilidades de fiscalizacao"
    articles: "art. 28 ao art. 30"
    control_count: 3
related_frameworks:
  - framework_id: gsi-in1
    relationship: derived-from
    description: >-
      A IN GSI/PR 5 deriva da IN GSI/PR 1 (Politica Nacional de Seguranca da
      Informacao), detalhando os requisitos minimos de seguranca para computacao
      em nuvem previstos no framework geral de seguranca da informacao da APF.
  - framework_id: gsi-in3
    relationship: complements
    description: >-
      A IN GSI/PR 3 (Credenciamento de seguranca e tratamento de informacao
      classificada) complementa a IN GSI/PR 5 ao disciplinar o tratamento de
      informacoes classificadas que impactam diretamente as restricoes de uso
      de nuvem para dados senssiveis da APF.
  - framework_id: csa-ccm-v4
    relationship: mapped
    description: >-
      Os controles da IN GSI/PR 5 possuem mapeamento direto com os dominios do
      CSA Cloud Controls Matrix v4, especialmente nos dominios de Data Security,
      Infrastructure & Virtualization Security, e Identity & Access Management.
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD complementa a IN GSI/PR 5 ao disciplinar o tratamento de dados
      pessoais em ambientes de nuvem, exigindo base legal, consentimento e
      medidas de protecao especificas para dados pessoais armazenados em nuvem
      pela APF.
  - framework_id: pnsi
    relationship: derived-from
    description: "A IN GSI/PR 5 implementa os principios da Politica Nacional de Seguranca da Informacao (PNSI, Decreto 9.637/2018) no contexto especifico de computacao em nuvem para a APF."
