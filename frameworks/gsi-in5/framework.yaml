id: gsi-in5
title: "Instrucao Normativa GSI/PR n. 5/2021 -- Requisitos Minimos de Seguranca da Informacao para Utilizacao de Solucoes de Computacao em Nuvem pelos Orgaos e Entidades da APF"
short_title: "IN GSI/PR 5"
version: "5/2021"
publication_date: "2021-08-30"
last_updated: "2021-08-30"
effective_date: "2021-08-30"
authority:
  name: "Gabinete de Seguranca Institucional da Presidencia da Republica"
  acronym: "GSI/PR"
  country: "BR"
  url: "https://www.gov.br/gsi"
type: normative-instruction
scope: cloud-computing-security-federal
mandatory: true
original_language: pt-br
available_languages: [pt-br]
industries:
