id: art-8
family: cap-2
title: "Inventario de Dados em Nuvem"
class: GSI-IN5
baselines: [apf-federal]
statement:
  prose: |
    Art. 8. Os órgãos e entidades devem manter inventário atualizado de todas as
    informações e dados armazenados ou processados em soluções de computação em nuvem,
    contendo, no mínimo:
    I - descrição do dado ou conjunto de dados;
    II - classificação da informação;
    III - provedor de serviços de computação em nuvem responsável;
    IV - modelo de nuvem e modelo de serviço utilizados;
    V - localização geográfica do armazenamento dos dados;
    VI - responsável pela gestão do dado no órgão ou entidade.

    Parágrafo único. O inventário deve ser revisado, no mínimo, anualmente e sempre
    que houver alteração significativa nos serviços de nuvem contratados.
guidance:
  prose: |
    O art. 8 exige inventario completo e atualizado de todos os dados em nuvem,
    essencial para controle e auditoria.

    **Seis campos obrigatorios do inventario:**
    1. Descricao: o que e o dado (ex: base de CPFs de beneficiarios)
    2. Classificacao: ostensivo, pessoal, reservado, etc.
    3. Provedor: AWS, Azure, GCP, SERPRO, etc.
    4. Modelo: IaaS + nuvem publica, SaaS + nuvem comunitaria, etc.
    5. Localizacao: regiao/datacenter onde os dados residem
    6. Responsavel: servidor publico responsavel no orgao

    **Revisao obrigatoria:**
    - Minimo anual
    - Imediata apos mudancas significativas (migracao, novo provedor, etc.)

    **Mapeamento CSA CCM v4:**
    - DSP-02: Data Inventory
    - DSP-05: Data Flow Documentation

    **Mapeamento ISO 27017:**
    - A.8.1.1: Inventory of Assets (cloud context)
implementation_guidance:
  platform_engineering:
    prose: |
      **Inventario automatizado:**
      1. CMDB integrada com APIs dos provedores de nuvem para discovery automatico
         de recursos e dados.
      2. Tags obrigatorias em todos os recursos de nuvem: classificacao, responsavel,
         descricao, provedor, regiao.
      3. Dashboard consolidado com visao de todos os dados em nuvem, filtros por
         classificacao, provedor, modelo e localizacao.
      4. Alertas para recursos sem tags obrigatorias (nao-conformidade).
      5. Integracao com data catalog para mapeamento de dados estruturados
         e nao-estruturados.
    tools:
      - cmdb
      - cloud-inventory
      - data-catalog
      - tagging-policy
      - asset-management
  devsecops:
    prose: |
      **Inventario no pipeline:**
      1. Validacao de tags obrigatorias em todos os recursos provisionados via IaC.
      2. Pipeline que rejeite provisionamento sem tags de classificacao e responsavel.
      3. Geracao automatica de registro de inventario a cada deployment.
      4. Testes de conformidade que verifiquem completude do inventario.
    tools:
      - gitlab-ci
      - terraform
      - opa-gatekeeper
      - inventory-pipeline
  secops:
    prose: |
      **Auditoria de inventario:**
      1. Revisao anual completa do inventario com validacao de cada registro.
      2. Reconciliacao mensal entre inventario registrado e recursos reais em nuvem.
      3. Deteccao de shadow IT: identificar recursos em nuvem nao registrados
         no inventario.
      4. Relatorio de gaps no inventario para o gestor de seguranca.
    tools:
      - cmdb
      - casb
      - grc-platform
      - shadow-it-detection
