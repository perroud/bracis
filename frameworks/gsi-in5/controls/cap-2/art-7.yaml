id: art-7
family: cap-2
title: "Avaliacao de Risco para Migracao"
class: GSI-IN5
baselines: [apf-federal]
statement:
  prose: |
    Art. 7. Previamente à contratação ou migração de dados para soluções de computação
    em nuvem, os órgãos e entidades devem realizar avaliação de risco que considere:
    I - a classificação da informação a ser armazenada ou processada;
    II - os requisitos legais e regulamentares aplicáveis;
    III - o impacto potencial de incidentes de segurança da informação;
    IV - a capacidade do provedor de atender aos requisitos de segurança;
    V - a dependência tecnológica (vendor lock-in) e os riscos de continuidade
    do serviço;
    VI - os riscos associados ao modelo de nuvem e ao modelo de serviço selecionados.

    Parágrafo único. A avaliação de risco deve ser documentada e aprovada pelo
    gestor de segurança da informação do órgão ou entidade.
guidance:
  prose: |
    O art. 7 exige avaliacao de risco formal, documentada e aprovada antes de
    qualquer migracao para nuvem.

    **Seis dimensoes de risco obrigatorias:**
    1. Classificacao: dados classificados = maior risco
    2. Legal/regulamentar: LGPD, LAI, normas setoriais
    3. Impacto de incidentes: disponibilidade, confidencialidade, integridade
    4. Capacidade do provedor: certificacoes, SLAs, historico de incidentes
    5. Vendor lock-in: portabilidade, interoperabilidade, custo de saida
    6. Modelo de nuvem/servico: riscos especificos de IaaS vs. PaaS vs. SaaS

    **Mapeamento CSA CCM v4:**
    - GRC-02: Risk Management Program
    - STA-09: Supply Chain Risk Management

    **Mapeamento NIST SP 800-53:**
    - RA-3: Risk Assessment
    - SA-9: External Information System Services

    **Aprovacao obrigatoria:**
    O gestor de seguranca da informacao DEVE aprovar formalmente a avaliacao,
    criando registro auditavel da decisao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Framework de avaliacao de risco:**
      1. Template padronizado de avaliacao de risco para nuvem com as seis
         dimensoes obrigatorias do art. 7.
      2. Ferramenta de scoring de risco que calcule nivel de risco automaticamente
         com base nas respostas do questionario de avaliacao.
      3. Integracao com catalogo de provedores pre-avaliados com score de
         seguranca atualizado.
      4. Workflow digital de aprovacao com assinatura do gestor de seguranca.
    tools:
      - grc-platform
      - risk-assessment-tool
      - vendor-management
      - approval-workflow
  devsecops:
    prose: |
      **Avaliacao de risco no pipeline:**
      1. Gate de aprovacao no pipeline de provisionamento que exija avaliacao
         de risco aprovada antes de criar recursos em nuvem.
      2. Checklist automatizado de vendor lock-in: validar se IaC usa abstracoes
         multi-cloud e se dados sao exportaveis em formatos abertos.
      3. Testes de portabilidade que verifiquem se aplicacoes e dados podem
         ser migrados entre provedores.
      4. Analise automatica de dependencias proprietarias do provedor.
    tools:
      - gitlab-ci
      - terraform
      - portability-tests
      - dependency-analysis
  secops:
    prose: |
      **Gestao continua de riscos:**
      1. Reavaliacao anual de riscos para todos os servicos de nuvem contratados.
      2. Reavaliacao imediata apos incidentes de seguranca ou mudancas significativas
         no servico do provedor.
      3. Registro historico de avaliacoes de risco com versionamento.
      4. Monitoramento de indicadores de risco do provedor (uptime, incidentes
         publicos, mudancas de TOS).
    tools:
      - grc-platform
      - vendor-risk-monitoring
      - risk-register
      - audit-trail
