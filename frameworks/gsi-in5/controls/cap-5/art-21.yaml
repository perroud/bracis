id: art-21
family: cap-5
title: "Direito de Auditoria"
class: GSI-IN5
baselines: [apf-federal]
statement:
  prose: |
    Art. 21. Os contratos de serviços de computação em nuvem devem assegurar ao
    órgão ou entidade contratante o direito de:
    I - realizar auditorias de segurança da informação nos ambientes de nuvem
    utilizados pelo órgão, diretamente ou por meio de terceiro designado;
    II - acessar relatórios de auditoria independente realizados sobre o provedor,
    incluindo relatórios SOC 2, ISO 27001 e CSA STAR;
    III - solicitar testes de penetração nos ambientes de nuvem do órgão, mediante
    acordo prévio com o provedor;
    IV - acessar informações sobre a arquitetura de segurança, controles
    implementados e processos de gestão de riscos do provedor.

    Parágrafo único. A recusa do provedor em permitir auditorias ou fornecer
    informações de segurança constitui motivo para rescisão contratual.
guidance:
  prose: |
    O art. 21 garante direito de auditoria robusto, incluindo pen testing e
    acesso a relatorios de auditoria independente.

    **Quatro direitos de auditoria:**
    1. Auditoria direta: orgao pode auditar o provedor (ou designar terceiro)
    2. Relatorios independentes: acesso a SOC 2, ISO 27001, CSA STAR
    3. Pen testing: direito de realizar testes de invasao
    4. Transparencia: acesso a arquitetura e controles de seguranca

    **Clausula de rescisao:**
    Recusa em permitir auditorias = motivo de rescisao. Isso da poder real
    ao orgao para exigir transparencia.

    **Pratica de mercado:**
    - AWS: AWS Artifact para relatorios de compliance, pen testing permitido
      sem autorizacao previa para a maioria dos servicos
    - Azure: Microsoft Trust Center, pen testing permitido sem notificacao
    - GCP: Google Cloud Trust Center, pen testing permitido

    **Mapeamento CSA CCM v4:**
    - A&A-01: Audit and Assurance Policy
    - A&A-02: Independent Assessments
    - A&A-06: Remediation
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de auditoria:**
      1. Acesso centralizado a relatorios de compliance dos provedores
         (AWS Artifact, Azure Trust Center, GCP Compliance Reports).
      2. Ambiente de staging dedicado para testes de penetracao que simule
         producao sem riscos ao ambiente real.
      3. Ferramentas de auditoria de configuracao (ScoutSuite, Prowler,
         CloudSploit) para validacao continua.
      4. Repositorio de evidencias de auditoria com versionamento.
    tools:
      - compliance-portal
      - pen-testing-environment
      - cloud-audit-tools
      - evidence-repository
  devsecops:
    prose: |
      **Auditoria no pipeline:**
      1. Scan automatizado de compliance (Prowler, ScoutSuite) em pipeline CI/CD.
      2. Geracao automatica de relatorio de postura de seguranca para auditoria.
      3. Pipeline de pen testing automatizado com DAST e fuzzing.
      4. Testes de conformidade que mapeiem controles exigidos vs. implementados.
    tools:
      - gitlab-ci
      - prowler
      - scoutsuite
      - dast-scanner
      - compliance-reporter
  secops:
    prose: |
      **Programa de auditoria:**
      1. Programa anual de auditoria de seguranca dos provedores de nuvem.
      2. Revisao semestral de relatorios SOC 2 e certificacoes ISO 27001.
      3. Pen testing externo anual por firma independente.
      4. Registro de findings de auditoria com plano de remediacao e follow-up.
      5. Exercicio de direito de auditoria direta pelo menos bienalmente.
    tools:
      - audit-management
      - pen-testing-firm
      - finding-tracker
      - grc-platform
