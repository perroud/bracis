id: art-23
family: cap-5
title: "Clausulas Contratuais Obrigatorias"
class: GSI-IN5
baselines: [apf-federal]
statement:
  prose: |
    Art. 23. Além dos requisitos previstos nos artigos anteriores, os contratos de
    serviços de computação em nuvem devem conter, no mínimo, as seguintes cláusulas:
    I - descrição detalhada dos serviços contratados, incluindo modelo de nuvem e
    modelo de serviço;
    II - delimitação clara de responsabilidades entre o órgão e o provedor
    (modelo de responsabilidade compartilhada);
    III - cláusula de confidencialidade e não-divulgação (NDA);
    IV - cláusula de proteção de dados pessoais, nos termos da LGPD;
    V - cláusula de notificação de incidentes de segurança, com prazos e
    procedimentos definidos;
    VI - cláusula de cooperação em investigações de incidentes de segurança;
    VII - cláusula de subcontratação, exigindo autorização prévia do órgão
    para uso de subprocessadores;
    VIII - foro da justiça brasileira para resolução de disputas.

    Parágrafo único. O órgão ou entidade deve consultar a assessoria jurídica
    previamente à assinatura de contratos de serviços de computação em nuvem.
guidance:
  prose: |
    O art. 23 consolida todas as clausulas contratuais obrigatorias em contratos
    de nuvem da APF.

    **Oito clausulas obrigatorias:**
    1. Descricao de servicos: escopo claro e detalhado
    2. Responsabilidade compartilhada: quem faz o que (shared responsibility)
    3. NDA: confidencialidade dos dados do orgao
    4. Protecao de dados: alinhamento com LGPD
    5. Notificacao de incidentes: prazos e procedimentos
    6. Cooperacao em investigacoes: provedor colabora em forense
    7. Subcontratacao: autorizacao previa para subprocessadores
    8. Foro brasileiro: disputas resolvidas na justica brasileira

    **Subprocessadores (inciso VII):**
    Provedores de nuvem frequentemente usam subcontratados. O orgao deve
    saber e aprovar quem tem acesso aos seus dados.

    **Mapeamento CSA CCM v4:**
    - STA-04: Supply Chain Service Agreement
    - STA-05: Supply Chain Data Security Assessment
    - STA-11: Subcontractor Management

    **Alinhamento LGPD:**
    Art. 39 da LGPD exige que operador (provedor) trate dados apenas
    conforme instrucoes do controlador (orgao).
implementation_guidance:
  platform_engineering:
    prose: |
      **Template contratual automatizado:**
      1. Template de contrato de nuvem com todas as clausulas obrigatorias
         do art. 23 pre-preenchidas.
      2. Checklist digital de clausulas obrigatorias integrado ao sistema
         de gestao de contratos.
      3. Repositorio de contratos com versionamento e trilha de auditoria.
      4. Registro de subprocessadores autorizados por provedor de nuvem.
    tools:
      - contract-management
      - clause-checklist
      - subprocessor-registry
      - document-management
  devsecops:
    prose: |
      **Validacao contratual no pipeline:**
      1. Pipeline de onboarding de novo provedor que valide todas as clausulas
         obrigatorias antes de liberar provisionamento.
      2. Automacao que verifique se subprocessadores declarados pelo provedor
         estao na lista aprovada.
      3. Checklist de compliance contratual integrado ao pipeline de compras.
      4. Notificacao automatica quando provedor altera termos de servico.
    tools:
      - gitlab-ci
      - onboarding-pipeline
      - tos-monitor
      - compliance-checklist
  secops:
    prose: |
      **Gestao contratual de seguranca:**
      1. Revisao anual de contratos de nuvem por equipe juridica + seguranca.
      2. Monitoramento de mudancas em termos de servico dos provedores.
      3. Inventario de subprocessadores com avaliacao de risco de cada um.
      4. Verificacao de que NDA cobre todos os colaboradores do provedor
         com acesso a dados do orgao.
      5. Registro de incidentes contratuais (violacoes de SLA, NDA, etc.).
    tools:
      - contract-management
      - legal-review
      - subprocessor-assessment
      - grc-platform
