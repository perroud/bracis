id: art-19
family: cap-5
title: "Acordo de Nivel de Servico (SLA)"
class: GSI-IN5
baselines: [apf-federal]
statement:
  prose: |
    Art. 19. Os contratos de serviços de computação em nuvem firmados por órgãos e
    entidades da administração pública federal devem conter acordo de nível de serviço
    (SLA) que estabeleça, no mínimo:
    I - percentual mínimo de disponibilidade do serviço, compatível com a criticidade
    das informações e processos suportados;
    II - tempo máximo de resposta e resolução para incidentes de segurança;
    III - tempo máximo para restauração de serviços em caso de desastres;
    IV - métricas e indicadores de desempenho mensuráveis e verificáveis;
    V - penalidades em caso de descumprimento dos níveis de serviço acordados;
    VI - procedimentos de comunicação e escalonamento de incidentes.

    Parágrafo único. Os níveis de serviço devem ser monitorados continuamente
    pelo órgão ou entidade e revisados, no mínimo, anualmente.
guidance:
  prose: |
    O art. 19 exige SLA formal e mensuravel em contratos de nuvem, com penalidades
    por descumprimento.

    **Seis elementos obrigatorios do SLA:**
    1. Disponibilidade: 99.9% (3 nines) para servicos criticos, 99.5% para demais
    2. Tempo de resposta a incidentes: P1 (15min), P2 (1h), P3 (4h), P4 (24h)
    3. RTO (Recovery Time Objective): tempo maximo para restauracao
    4. Metricas: SLIs (Service Level Indicators) mensuráveis
    5. Penalidades: creditos financeiros ou multas por descumprimento
    6. Escalonamento: matriz de comunicacao por severidade

    **Mapeamento CSA CCM v4:**
    - STA-04: Supply Chain Service Agreement
    - STA-06: Supply Chain Governance Review
    - BCR-02: Business Continuity Risk Assessment

    **Benchmark de mercado:**
    - AWS: 99.99% para maioria dos servicos
    - Azure: 99.95% a 99.99%
    - GCP: 99.95% a 99.99%
implementation_guidance:
  platform_engineering:
    prose: |
      **Monitoramento de SLA:**
      1. Dashboard de SLA em tempo real com metricas de disponibilidade,
         latencia, throughput e taxa de erros.
      2. Monitoramento sintetico (synthetic monitoring) com probes em multiplas
         regioes que verifiquem disponibilidade e performance.
      3. Alertas automaticos quando SLIs se aproximam dos thresholds do SLA.
      4. Integracao com ITSM para abertura automatica de tickets quando SLA
         e violado.
      5. Status page interna que mostre saude dos servicos de nuvem contratados.
    tools:
      - monitoring-platform
      - synthetic-monitoring
      - sla-dashboard
      - itsm
      - status-page
  devsecops:
    prose: |
      **SLA no pipeline:**
      1. Testes de performance que validem SLIs antes de deploy em producao.
      2. Load testing que simule carga esperada e verifique se metricas de
         SLA sao atingidas.
      3. Chaos engineering para validar RTO em cenarios de falha.
      4. Pipeline de DR drill que simule desastres e meça tempo de recuperacao.
    tools:
      - gitlab-ci
      - load-testing
      - chaos-engineering
      - dr-testing
  secops:
    prose: |
      **Gestao operacional de SLA:**
      1. Relatorio mensal de cumprimento de SLA por provedor e servico.
      2. Processo de reivindicacao de creditos quando SLA e violado.
      3. Revisao anual de SLAs com renegociacao baseada em historico.
      4. Registro de todos os incidentes que impactaram SLA com root cause analysis.
      5. Benchmarking de SLAs contratados vs. mercado.
    tools:
      - sla-reporting
      - incident-management
      - contract-management
      - grc-platform
