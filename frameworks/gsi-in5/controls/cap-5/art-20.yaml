id: art-20
family: cap-5
title: "Responsabilidades do Provedor"
class: GSI-IN5
baselines: [apf-federal]
statement:
  prose: |
    Art. 20. Os contratos de serviços de computação em nuvem devem definir
    claramente as responsabilidades do provedor, incluindo:
    I - manter certificações de segurança reconhecidas internacionalmente,
    compatíveis com o tipo de serviço prestado (ISO 27001, SOC 2, CSA STAR);
    II - notificar o órgão ou entidade contratante sobre incidentes de segurança
    que afetem seus dados ou serviços, em prazo compatível com a criticidade;
    III - permitir a realização de auditorias de segurança pelo órgão ou entidade
    contratante ou por terceiro por ele designado;
    IV - manter plano de continuidade de negócios e de recuperação de desastres
    testado e atualizado;
    V - garantir a segregação lógica dos dados do órgão ou entidade em relação
    aos dados de outros clientes do provedor.

    Parágrafo único. O provedor deve fornecer evidências periódicas do
    cumprimento de suas responsabilidades de segurança.
guidance:
  prose: |
    O art. 20 define obrigacoes minimas de seguranca do provedor de nuvem,
    que devem constar em contrato.

    **Cinco obrigacoes do provedor:**
    1. Certificacoes: ISO 27001, SOC 2 Type II, CSA STAR como minimo
    2. Notificacao de incidentes: em prazo definido (tipicamente 24-72h)
    3. Direito de auditoria: orgao pode auditar o provedor
    4. BCP/DRP: plano de continuidade e DR testado
    5. Segregacao multi-tenant: isolamento logico entre clientes

    **Certificacoes relevantes:**
    - ISO 27001: sistema de gestao de seguranca da informacao
    - SOC 2 Type II: controles de seguranca com evidencia operacional
    - CSA STAR: certificacao especifica de seguranca em nuvem
    - ISO 27017: codigo de pratica para seguranca em nuvem
    - ISO 27018: protecao de dados pessoais em nuvem

    **Mapeamento CSA CCM v4:**
    - STA-07: Supply Chain Compliance and Due Diligence
    - STA-08: Supply Chain Data Governance
    - BCR-01: Business Continuity Planning
    - SEF-01: Security Incident Management
implementation_guidance:
  platform_engineering:
    prose: |
      **Validacao tecnica do provedor:**
      1. Repositorio de certificacoes e relatorios de auditoria dos provedores
         (SOC 2, ISO 27001, pentest reports).
      2. Integracao com APIs de status dos provedores para monitoramento de
         incidentes do provedor em tempo real.
      3. Validacao tecnica de segregacao multi-tenant: testes de isolamento
         entre tenants em ambientes compartilhados.
      4. Acesso a logs de auditoria do provedor via API (CloudTrail, Activity
         Log, Cloud Audit Logs).
    tools:
      - vendor-management
      - provider-status-api
      - tenant-isolation-tests
      - audit-log-api
  devsecops:
    prose: |
      **Due diligence no pipeline:**
      1. Checklist automatizado de certificacoes obrigatorias do provedor.
      2. Validacao de que configuracoes de multi-tenancy estao corretas.
      3. Testes de segregacao de dados entre tenants.
      4. Pipeline de verificacao periodica de validade de certificacoes.
    tools:
      - gitlab-ci
      - vendor-checklist
      - isolation-tests
      - certification-tracker
  secops:
    prose: |
      **Gestao de provedores:**
      1. Revisao anual de certificacoes e relatorios de auditoria dos provedores.
      2. Exercicio de direito de auditoria: auditoria tecnica bienal do provedor.
      3. Monitoramento de incidentes publicos dos provedores.
      4. Acompanhamento de testes de BCP/DRP do provedor.
      5. Registro de evidencias de cumprimento de responsabilidades.
    tools:
      - vendor-risk-management
      - audit-management
      - incident-monitoring
      - grc-platform
