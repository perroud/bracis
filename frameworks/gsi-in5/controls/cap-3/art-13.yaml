id: art-13
family: cap-3
title: "Gestao de Vulnerabilidades"
class: GSI-IN5
baselines: [apf-federal]
statement:
  prose: |
    Art. 13. Os órgãos e entidades devem implementar processo de gestão de
    vulnerabilidades para os ambientes de computação em nuvem, incluindo:
    I - varredura periódica de vulnerabilidades nos recursos sob responsabilidade
    do órgão ou entidade;
    II - aplicação tempestiva de correções de segurança (patches) nos sistemas
    operacionais, aplicações e componentes de software;
    III - monitoramento de alertas de segurança emitidos pelos provedores de
    serviços de computação em nuvem;
    IV - avaliação periódica da configuração de segurança dos ambientes de nuvem
    em relação às melhores práticas (hardening).

    Parágrafo único. Os órgãos e entidades devem definir prazos máximos para
    correção de vulnerabilidades, conforme a criticidade identificada.
guidance:
  prose: |
    O art. 13 exige processo formal de gestao de vulnerabilidades, com SLAs de
    correcao definidos por criticidade.

    **Quatro pilares:**
    1. Varredura: scanning periodico de infraestrutura e aplicacoes
    2. Patching: aplicacao tempestiva de correcoes
    3. Alertas do provedor: monitoramento de advisories
    4. Hardening: baseline de configuracao segura

    **SLAs recomendados para correcao:**
    - Critica (CVSS >= 9.0): 24-48 horas
    - Alta (CVSS 7.0-8.9): 7 dias
    - Media (CVSS 4.0-6.9): 30 dias
    - Baixa (CVSS < 4.0): 90 dias

    **Mapeamento CSA CCM v4:**
    - TVM-01: Threat and Vulnerability Management Policy
    - TVM-02: Vulnerability Remediation Schedule
    - TVM-04: Detection Updates
    - TVM-09: Vulnerability Management Reporting

    **Mapeamento NIST SP 800-53:**
    - RA-5: Vulnerability Scanning
    - SI-2: Flaw Remediation
    - CM-6: Configuration Settings
implementation_guidance:
  platform_engineering:
    prose: |
      **Stack de gestao de vulnerabilidades:**
      1. Scanner de vulnerabilidades: Qualys, Tenable, AWS Inspector, Azure
         Defender, GCP Security Command Center.
      2. Patching automatizado: AWS Systems Manager Patch Manager, Azure Update
         Management, Google OS Patch Management.
      3. CIS Benchmarks como baseline de hardening para todos os workloads.
      4. Dashboard de vulnerabilidades com aging, SLA tracking e tendencias.
      5. Integracao com ITSM para abertura automatica de tickets de remediacao.
    tools:
      - vulnerability-scanner
      - patch-management
      - cis-benchmark
      - vulnerability-dashboard
      - itsm
  devsecops:
    prose: |
      **Vulnerabilidades no pipeline:**
      1. SAST e DAST em todo pipeline CI/CD, com bloqueio para vulnerabilidades
         criticas e altas.
      2. Dependency scanning com SCA (Software Composition Analysis) para
         detectar CVEs em bibliotecas de terceiros.
      3. Container scanning para imagens Docker antes do deploy.
      4. Infrastructure as Code scanning (Checkov, tfsec, KICS) para detectar
         misconfiguration antes do provisionamento.
      5. Geracao automatica de SBOM (Software Bill of Materials).
    tools:
      - gitlab-ci
      - sast-scanner
      - dast-scanner
      - sca-scanner
      - container-scanner
      - iac-scanner
  secops:
    prose: |
      **Operacao de vulnerabilidades:**
      1. Varredura semanal de infraestrutura e mensal de aplicacoes.
      2. Tracking de SLAs de remediacao por criticidade.
      3. Monitoramento de advisories dos provedores (AWS Security Bulletins,
         Azure Security Advisories, GCP Security Bulletins).
      4. Pen testing anual por firma externa especializada.
      5. Relatorio mensal de metricas: MTTR por criticidade, aging, backlog.
    tools:
      - vulnerability-management
      - pen-testing
      - security-advisories
      - metrics-dashboard
