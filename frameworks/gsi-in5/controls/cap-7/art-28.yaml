id: art-28
family: cap-7
title: "Cronograma de Adequacao"
class: GSI-IN5
baselines: [apf-federal]
statement:
  prose: |
    Art. 28. Os órgãos e entidades da administração pública federal que já utilizam
    soluções de computação em nuvem na data de publicação desta Instrução Normativa
    deverão adequar-se aos requisitos nela previstos no prazo de até 12 (doze) meses,
    contados da data de sua publicação.

    Parágrafo 1. O gestor de segurança da informação do órgão ou entidade deverá
    elaborar plano de adequação com cronograma, responsáveis e recursos necessários.

    Parágrafo 2. O plano de adequação deverá ser aprovado pela alta administração
    do órgão ou entidade.

    Parágrafo 3. Novas contratações de serviços de computação em nuvem, a partir
    da data de publicação desta Instrução Normativa, deverão atender integralmente
    aos requisitos nela previstos.
guidance:
  prose: |
    O art. 28 estabelece o cronograma de adequacao: 12 meses para servicos
    existentes, compliance imediato para novas contratacoes.

    **Cronograma:**
    - Publicacao: 30/08/2021
    - Prazo de adequacao: 30/08/2022
    - Novas contratacoes: compliance imediato a partir de 30/08/2021

    **Plano de adequacao (obrigatorio):**
    1. Elaborado pelo gestor de seguranca
    2. Com cronograma, responsaveis e recursos
    3. Aprovado pela alta administracao

    **Risco de nao-adequacao:**
    Orgaos que nao se adequaram no prazo estao em situacao de nao-conformidade,
    sujeitando gestores a responsabilizacao administrativa.

    **Mapeamento CSA CCM v4:**
    - GRC-01: Governance Program
    - GRC-06: Governance Responsibility Model

    **Recomendacao:**
    Priorizar adequacao por criticidade: dados classificados e infraestrutura
    critica primeiro, depois dados pessoais, por ultimo dados publicos.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plano de adequacao tecnica:**
      1. Gap analysis: mapear controles exigidos pela IN vs. controles
         implementados em cada servico de nuvem.
      2. Priorizacao por risco: adequar primeiro servicos com dados classificados,
         depois dados pessoais, por ultimo dados publicos.
      3. Roadmap tecnico com milestones: criptografia, IAM, logging, network
         segmentation, backup, monitoramento.
      4. Orcamento de investimento em ferramentas de seguranca (CSPM, SIEM,
         DLP, CASB) necessarias para adequacao.
    tools:
      - gap-analysis
      - project-management
      - roadmap-tool
      - budget-planning
  devsecops:
    prose: |
      **Adequacao no pipeline:**
      1. Implementar compliance checks gradualmente no pipeline, comecando
         com checks nao-bloqueantes (warn) e evoluindo para bloqueantes (fail).
      2. Dashboard de progresso de adequacao por servico e controle.
      3. Priorizacao de automacao de controles mais criticos primeiro.
      4. Documentacao de excecoes temporarias com plano de remediacao.
    tools:
      - gitlab-ci
      - compliance-dashboard
      - exception-management
      - progress-tracker
  secops:
    prose: |
      **Gestao do plano de adequacao:**
      1. Acompanhamento mensal do progresso de adequacao com relatorio ao
         gestor de seguranca e alta administracao.
      2. Registro de riscos aceitos durante o periodo de transicao.
      3. Auditoria de progresso trimestral com evidencias de implementacao.
      4. Escalonamento imediato caso prazo esteja em risco.
    tools:
      - project-management
      - risk-register
      - progress-reporting
      - grc-platform
