id: art-29
family: cap-7
title: "Revisao Periodica da Norma"
class: GSI-IN5
baselines: [apf-federal]
statement:
  prose: |
    Art. 29. Esta Instrução Normativa será revisada periodicamente pelo Gabinete de
    Segurança Institucional da Presidência da República, considerando:
    I - a evolução tecnológica das soluções de computação em nuvem;
    II - mudanças no cenário de ameaças cibernéticas;
    III - alterações na legislação e regulamentação aplicáveis;
    IV - lições aprendidas com incidentes de segurança em ambientes de nuvem;
    V - contribuições de órgãos e entidades da administração pública federal.

    Parágrafo único. Os órgãos e entidades poderão encaminhar sugestões de
    aprimoramento ao GSI/PR, que serão consideradas nas revisões periódicas.
guidance:
  prose: |
    O art. 29 preve mecanismo de revisao periodica da norma, garantindo que
    acompanhe a evolucao tecnologica e de ameacas.

    **Cinco gatilhos de revisao:**
    1. Evolucao tecnologica: novos modelos de nuvem, serverless, edge computing
    2. Cenario de ameacas: novos vetores de ataque em nuvem
    3. Legislacao: alteracoes em LGPD, Marco Civil, novas normas
    4. Licoes aprendidas: incidentes reais em orgaos da APF
    5. Contribuicoes: feedback dos orgaos que implementam a norma

    **Canal de sugestoes:**
    Orgaos podem enviar sugestoes de melhoria ao GSI/PR.

    **Mapeamento CSA CCM v4:**
    - GRC-05: Policy Review
    - GRC-08: Governance Responsibility Model

    **Observacao:**
    A norma data de 2021. Desde entao, surgiram temas como IA generativa em
    nuvem, zero trust architecture, e confidential computing que poderiam
    ser incorporados em revisao futura.
implementation_guidance:
  platform_engineering:
    prose: |
      **Acompanhamento de mudancas regulatorias:**
      1. Sistema de monitoramento de alteracoes regulatorias que alerte quando
         a IN GSI/PR 5 for revisada ou complementada.
      2. Avaliacao de impacto automatizada: quando nova versao for publicada,
         gerar gap analysis entre versao anterior e nova.
      3. Repositorio de sugestoes de melhoria baseadas na experiencia de
         implementacao do orgao.
    tools:
      - regulatory-monitoring
      - gap-analysis
      - feedback-system
  devsecops:
    prose: |
      **Compliance evolutivo:**
      1. Pipeline de compliance versionado: cada versao da norma tem seu
         conjunto de checks, facilitando atualizacao.
      2. Feature flags para novos controles, permitindo implementacao gradual.
      3. Testes de regressao que garantam que atualizacao de norma nao
         quebre compliance com versao anterior durante periodo de transicao.
    tools:
      - gitlab-ci
      - compliance-versioning
      - feature-flags
      - regression-tests
  secops:
    prose: |
      **Gestao de mudancas regulatorias:**
      1. Processo formal de acompanhamento de revisoes da norma.
      2. Avaliacao de impacto de cada revisao nos controles implementados.
      3. Canal estruturado para coleta de sugestoes de melhoria dos usuarios.
      4. Participacao em consultas publicas do GSI/PR sobre revisoes da norma.
    tools:
      - regulatory-tracking
      - impact-assessment
      - feedback-portal
      - grc-platform
