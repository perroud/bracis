id: art-30
family: cap-7
title: "Vigencia e Disposicoes Finais"
class: GSI-IN5
baselines: [apf-federal]
statement:
  prose: |
    Art. 30. Esta Instrução Normativa entra em vigor na data de sua publicação.

    Parágrafo 1. Os casos omissos serão resolvidos pelo Gabinete de Segurança
    Institucional da Presidência da República, em articulação com os órgãos e
    entidades da administração pública federal.

    Parágrafo 2. O descumprimento das disposições desta Instrução Normativa
    sujeita os responsáveis às sanções previstas na legislação vigente, incluindo
    a Lei n. 8.112, de 11 de dezembro de 1990 (Regime Jurídico dos Servidores
    Públicos Civis da União).

    Parágrafo 3. O GSI/PR poderá editar normas complementares necessárias à
    aplicação desta Instrução Normativa.
guidance:
  prose: |
    O art. 30 estabelece a vigencia imediata, responsabilizacao por descumprimento
    e competencia do GSI/PR para casos omissos.

    **Vigencia:**
    Imediata a partir de 30/08/2021.

    **Casos omissos:**
    Resolvidos pelo GSI/PR em articulacao com orgaos. Na pratica, orgaos devem
    consultar o GSI/PR quando encontrarem situacoes nao previstas na norma.

    **Sancoes por descumprimento:**
    Lei 8.112/1990 preve:
    - Advertencia
    - Suspensao
    - Demissao
    - Cassacao de aposentadoria
    O descumprimento pode gerar responsabilidade administrativa do servidor
    responsavel pela gestao de seguranca da informacao.

    **Normas complementares:**
    O GSI/PR pode editar normas adicionais que detalhem requisitos especificos,
    como guias de implementacao ou orientacoes tecnicas.

    **Mapeamento CSA CCM v4:**
    - GRC-01: Governance Program
    - GRC-03: Information Security Management Program
implementation_guidance:
  platform_engineering:
    prose: |
      **Compliance e rastreabilidade:**
      1. Dashboard de conformidade que mostre status de cada controle da IN
         GSI/PR 5 para o orgao.
      2. Registro de consultas ao GSI/PR sobre casos omissos com respostas
         recebidas.
      3. Sistema de notificacao para normas complementares editadas pelo GSI/PR.
      4. Trilha de auditoria completa de todas as acoes de conformidade.
    tools:
      - compliance-dashboard
      - query-register
      - regulatory-notification
      - audit-trail
  devsecops:
    prose: |
      **Compliance continuo:**
      1. Pipeline de compliance que valide todos os 30 controles da IN GSI/PR 5.
      2. Relatorio automatico de conformidade por controle e por familia.
      3. Integracao com normas complementares do GSI/PR conforme publicadas.
      4. Evidencias de compliance geradas automaticamente e armazenadas
         para auditoria.
    tools:
      - gitlab-ci
      - compliance-reporter
      - evidence-collector
      - regulatory-feed
  secops:
    prose: |
      **Gestao de conformidade:**
      1. Monitoramento de publicacoes do GSI/PR sobre normas complementares.
      2. Processo de escalonamento para casos omissos ao GSI/PR.
      3. Registro de riscos de nao-conformidade com planos de remediacao.
      4. Capacitacao periodica de servidores sobre obrigacoes da IN GSI/PR 5
         e consequencias de descumprimento.
      5. Preparacao para auditorias externas do GSI/PR.
    tools:
      - grc-platform
      - training-management
      - risk-register
      - audit-readiness
