id: art-4
family: cap-1
title: "Responsabilidades do Gestor de Seguranca da Informacao"
class: GSI-IN5
baselines: [apf-federal]
statement:
  prose: |
    Art. 4. O gestor de segurança da informação do órgão ou entidade é responsável por:
    I - avaliar os riscos de segurança da informação associados à utilização de
    soluções de computação em nuvem;
    II - definir os requisitos de segurança da informação aplicáveis à contratação
    de soluções de computação em nuvem;
    III - aprovar a utilização de soluções de computação em nuvem, considerando a
    classificação das informações e os riscos identificados;
    IV - monitorar o cumprimento dos requisitos de segurança da informação pelo
    provedor de serviços de computação em nuvem;
    V - comunicar incidentes de segurança da informação relacionados à utilização
    de soluções de computação em nuvem ao Centro de Prevenção, Tratamento e Resposta
    a Incidentes Cibernéticos de Governo (CTIR Gov).
guidance:
  prose: |
    O art. 4 define as responsabilidades do gestor de seguranca da informacao,
    figura obrigatoria em orgaos da APF conforme IN GSI/PR 1.

    **Cinco responsabilidades essenciais:**
    1. Avaliacao de riscos: analise previa de riscos antes de adotar nuvem
    2. Definicao de requisitos: traduzir esta IN em requisitos tecnicos de contratacao
    3. Aprovacao de uso: gate de aprovacao antes de migrar dados para nuvem
    4. Monitoramento de provedores: fiscalizacao continua do cumprimento contratual
    5. Comunicacao de incidentes: notificacao ao CTIR Gov

    **CTIR Gov:**
    Centro de Prevencao, Tratamento e Resposta a Incidentes Ciberneticos de Governo,
    subordinado ao GSI/PR, responsavel por coordenar a resposta a incidentes
    ciberneticos na APF.

    **Mapeamento CSA CCM v4:**
    - GRC-03: Information Security Management Program
    - SEF-01: Security Incident Management (gestao de incidentes)

    **Mapeamento NIST SP 800-53:**
    - RA-3: Risk Assessment
    - IR-6: Incident Reporting
implementation_guidance:
  platform_engineering:
    prose: |
      **Ferramentas de suporte ao gestor:**
      1. Dashboard de postura de seguranca em nuvem (CSPM) com visibilidade
         consolidada de todos os ambientes.
      2. Plataforma de gestao de riscos com registro de avaliacoes de risco
         para cada servico de nuvem.
      3. Workflow de aprovacao digital para solicitacoes de uso de nuvem,
         com checklist de requisitos de seguranca.
      4. Integracao automatica com CTIR Gov para notificacao de incidentes.
    tools:
      - cspm
      - grc-platform
      - approval-workflow
      - incident-notification
  devsecops:
    prose: |
      **Automacao de conformidade:**
      1. Pipeline de avaliacao de riscos que executa antes de provisionamento
         de novos recursos em nuvem.
      2. Checklist automatizado de requisitos de seguranca da IN GSI/PR 5
         integrado ao processo de contratacao.
      3. Testes automatizados de conformidade que alimentam relatorios para
         o gestor de seguranca.
      4. Notificacao automatica ao gestor quando desvios de conformidade
         sao detectados.
    tools:
      - gitlab-ci
      - compliance-pipeline
      - opa-gatekeeper
      - notification-system
  secops:
    prose: |
      **Operacao de seguranca para o gestor:**
      1. Relatorio mensal consolidado de postura de seguranca em nuvem.
      2. Painel de incidentes com status, severidade e acoes tomadas.
      3. Processo formal de comunicacao ao CTIR Gov com templates padronizados.
      4. Registro de todas as aprovacoes de uso de nuvem com justificativa
         e avaliacao de risco.
      5. Auditoria trimestral de cumprimento de requisitos pelos provedores.
    tools:
      - grc-platform
      - siem
      - incident-management
      - ctir-gov-integration
