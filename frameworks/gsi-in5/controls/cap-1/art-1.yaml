id: art-1
family: cap-1
title: "Objeto e Abrangencia"
class: GSI-IN5
baselines: [apf-federal]
statement:
  prose: |
    Art. 1. Esta Instrução Normativa dispõe sobre os requisitos mínimos de segurança
    da informação para utilização de soluções de computação em nuvem pelos órgãos e
    entidades da administração pública federal direta, autárquica e fundacional.

    Parágrafo único. As disposições desta Instrução Normativa aplicam-se a todos os
    órgãos e entidades da administração pública federal que utilizem, contratem ou
    pretendam contratar soluções de computação em nuvem, independentemente do modelo
    de implantação ou de serviço adotado.
guidance:
  prose: |
    O art. 1 delimita o escopo da IN GSI/PR 5, abrangendo toda a APF direta,
    autarquica e fundacional.

    **Abrangencia universal:**
    A norma e obrigatoria para TODOS os orgaos federais, sem excecao, incluindo
    autarquias (ex: INSS, IBAMA) e fundacoes (ex: Fiocruz, FUNAI).

    **Independencia de modelo:**
    Aplica-se a qualquer modelo de nuvem: IaaS, PaaS, SaaS, nuvem publica,
    privada, hibrida ou comunitaria.

    **Mapeamento CSA CCM v4:**
    - GRC-01: Governance Program (programa de governanca que abrange nuvem)
    - GRC-02: Risk Management Program (gestao de riscos em nuvem)

    **Mapeamento NIST SP 800-144:**
    - Secao 3: Guidelines on Security and Privacy in Public Cloud Computing
implementation_guidance:
  platform_engineering:
    prose: |
      **Inventario de servicos em nuvem:**
      1. Manter catalogo centralizado de todos os servicos de nuvem contratados
         pelo orgao, incluindo provedor, modelo (IaaS/PaaS/SaaS), classificacao
         de dados armazenados e data de contratacao.
      2. Implementar CMDB (Configuration Management Database) com registro de
         todos os ativos em nuvem e suas dependencias.
      3. Dashboard de visibilidade que mostre consumo, custos e postura de
         seguranca de cada servico de nuvem.
      4. Automacao de discovery de shadow IT via CASB (Cloud Access Security Broker).
    tools:
      - cmdb
      - casb
      - cloud-inventory
      - cost-management
  devsecops:
    prose: |
      **Governanca de provisionamento:**
      1. Pipeline de aprovacao para provisionamento de novos servicos de nuvem,
         incluindo validacao de requisitos de seguranca da IN GSI/PR 5.
      2. Politicas de IaC (Infrastructure as Code) que garantam que todo recurso
         de nuvem seja provisionado com controles de seguranca minimos.
      3. Checklist automatizado de conformidade com a IN GSI/PR 5 integrado ao
         pipeline de provisionamento.
      4. Bloqueio automatico de provisionamento que nao atenda aos requisitos minimos.
    tools:
      - gitlab-ci
      - terraform
      - opa-gatekeeper
      - compliance-pipeline
  secops:
    prose: |
      **Conformidade continua:**
      1. Auditoria periodica de todos os servicos de nuvem contratados vs.
         requisitos da IN GSI/PR 5.
      2. Inventario atualizado de contratos vigentes com provedores de nuvem.
      3. Relatorio semestral de conformidade para o gestor de seguranca da
         informacao do orgao.
      4. Plano de adequacao para servicos em nuvem que nao atendam aos
         requisitos minimos, com cronograma e responsaveis.
    tools:
      - grc-platform
      - contract-management
      - audit-trail
