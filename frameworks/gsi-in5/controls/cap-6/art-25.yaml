id: art-25
family: cap-6
title: "Gestao de Incidentes de Seguranca"
class: GSI-IN5
baselines: [apf-federal]
statement:
  prose: |
    Art. 25. Os órgãos e entidades devem implementar processo de gestão de
    incidentes de segurança da informação específico para os ambientes de
    computação em nuvem, incluindo:
    I - procedimentos de detecção, classificação, resposta e recuperação
    de incidentes;
    II - definição de papéis e responsabilidades na resposta a incidentes,
    incluindo a interface com o provedor de serviços de computação em nuvem;
    III - comunicação de incidentes ao CTIR Gov conforme prazos e procedimentos
    definidos pelo GSI/PR;
    IV - preservação de evidências digitais para análise forense;
    V - análise pós-incidente (post-mortem) com identificação de lições
    aprendidas e ações de melhoria.

    Parágrafo único. O plano de resposta a incidentes para ambientes de nuvem
    deve ser testado, no mínimo, anualmente, por meio de exercícios simulados.
guidance:
  prose: |
    O art. 25 exige processo formal de incident response adaptado para nuvem,
    com comunicacao ao CTIR Gov e preservacao forense.

    **Cinco pilares do IR:**
    1. Deteccao → classificacao → resposta → recuperacao
    2. Papeis e responsabilidades: RACI entre orgao e provedor
    3. Comunicacao ao CTIR Gov: obrigatoria para incidentes relevantes
    4. Forense digital: preservacao de evidencias em nuvem
    5. Post-mortem: licoes aprendidas e melhoria continua

    **Teste anual obrigatorio:**
    Exercicio simulado (tabletop exercise ou simulacao tecnica) pelo menos
    anualmente para validar o plano de IR.

    **Desafios de forense em nuvem:**
    - Volatilidade: instancias podem ser encerradas, perdendo evidencias
    - Compartilhamento: logs do provedor podem incluir dados de outros clientes
    - Jurisdicao: evidencias podem estar em multiplas regioes/paises
    - Snapshot e memory dump podem exigir coordenacao com provedor

    **Mapeamento CSA CCM v4:**
    - SEF-01: Security Incident Management
    - SEF-02: Incident Response Plans
    - SEF-03: Incident Response Testing
    - SEF-05: Incident Response Notification
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de IR para nuvem:**
      1. SOAR platform com playbooks automatizados para incidentes em nuvem
         (ex: isolamento de instancia comprometida, revogacao de credenciais).
      2. Snapshot automatizado de instancias comprometidas para preservacao
         de evidencias (EBS snapshot, disk snapshot).
      3. IR toolkit em nuvem: AMIs/images pre-configuradas com ferramentas
         forenses (Volatility, SANS SIFT).
      4. Canal de comunicacao seguro com CTIR Gov (e-mail cifrado, portal).
      5. Runbooks de IR especificos por tipo de incidente em nuvem.
    tools:
      - soar
      - forensic-toolkit
      - snapshot-automation
      - ctir-gov-integration
      - incident-runbooks
  devsecops:
    prose: |
      **IR no pipeline:**
      1. Automacao de resposta: pipeline que execute containment automatico
         quando incidente e detectado (isolar VPC, revogar credenciais).
      2. Testes de IR automatizados: simulacao de incidentes em staging.
      3. Validacao de que ferramentas forenses estao disponiveis e funcionais.
      4. Pipeline de post-mortem que gere template de RCA (Root Cause Analysis).
    tools:
      - gitlab-ci
      - ir-automation
      - chaos-engineering
      - rca-template
  secops:
    prose: |
      **Operacao de IR:**
      1. Plano de IR especifico para nuvem, testado anualmente.
      2. Tabletop exercise semestral com cenarios de nuvem.
      3. Comunicacao ao CTIR Gov em ate 24h apos deteccao de incidente relevante.
      4. Preservacao de cadeia de custodia de evidencias digitais.
      5. Post-mortem formal com licoes aprendidas documentadas e acoes de
         melhoria rastreadas ate conclusao.
    tools:
      - incident-management
      - tabletop-exercise
      - forensic-chain-of-custody
      - lessons-learned
      - ctir-gov-reporting
