id: art-24
family: cap-6
title: "Monitoramento Continuo"
class: GSI-IN5
baselines: [apf-federal]
statement:
  prose: |
    Art. 24. Os órgãos e entidades devem implementar monitoramento contínuo dos
    serviços de computação em nuvem, incluindo:
    I - monitoramento de disponibilidade e desempenho dos serviços contratados;
    II - monitoramento de segurança, incluindo detecção de ameaças, anomalias
    e tentativas de intrusão;
    III - monitoramento de conformidade com os requisitos de segurança da
    informação estabelecidos nesta Instrução Normativa;
    IV - monitoramento de custos e consumo de recursos de nuvem;
    V - correlação de eventos de segurança de múltiplas fontes para detecção
    de incidentes complexos.

    Parágrafo único. Os resultados do monitoramento devem ser reportados
    periodicamente ao gestor de segurança da informação do órgão ou entidade.
guidance:
  prose: |
    O art. 24 exige monitoramento continuo em cinco dimensoes: disponibilidade,
    seguranca, conformidade, custos e correlacao de eventos.

    **Cinco dimensoes de monitoramento:**
    1. Disponibilidade: uptime, latencia, taxa de erros
    2. Seguranca: IDS/IPS, anomalias, ameacas
    3. Conformidade: postura de seguranca vs. requisitos da IN
    4. Custos: consumo, anomalias de billing, shadow IT
    5. Correlacao: SIEM com dados de multiplas fontes

    **Mapeamento CSA CCM v4:**
    - LOG-03: Security Monitoring and Alerting
    - LOG-04: Logging Monitoring and Continuous Assessment
    - TVM-07: Vulnerability Identification

    **Mapeamento NIST SP 800-53:**
    - CA-7: Continuous Monitoring
    - SI-4: Information System Monitoring
    - AU-6: Audit Review, Analysis, and Reporting

    **Ferramentas essenciais:**
    CSPM para conformidade, SIEM para seguranca, APM para disponibilidade,
    FinOps para custos.
implementation_guidance:
  platform_engineering:
    prose: |
      **Stack de monitoramento:**
      1. SIEM centralizado (Splunk, Elastic SIEM, Microsoft Sentinel) com
         ingestao de logs de todos os provedores de nuvem.
      2. CSPM (Prisma Cloud, AWS Security Hub, Azure Defender) para monitoramento
         continuo de postura de seguranca.
      3. APM (Datadog, New Relic, Dynatrace) para monitoramento de disponibilidade
         e performance de aplicacoes.
      4. FinOps (CloudHealth, Kubecost) para monitoramento de custos e deteccao
         de anomalias de consumo.
      5. SOAR (Security Orchestration, Automation and Response) para automacao
         de resposta a incidentes.
    tools:
      - siem
      - cspm
      - apm
      - finops
      - soar
  devsecops:
    prose: |
      **Monitoramento no pipeline:**
      1. Deployment de agentes de monitoramento automaticamente com cada deploy.
      2. Testes de smoke que validem que monitoramento esta ativo apos deploy.
      3. Pipeline de compliance-as-code que execute verificacoes CSPM
         periodicamente.
      4. Dashboards de monitoramento gerados automaticamente por servico/equipe.
    tools:
      - gitlab-ci
      - monitoring-agents
      - compliance-as-code
      - dashboard-generator
  secops:
    prose: |
      **Operacao de monitoramento:**
      1. SOC com monitoramento 24x7 ou MSSP (Managed Security Service Provider).
      2. Revisao diaria de alertas criticos e altos.
      3. Tuning continuo de regras de deteccao para reduzir falsos positivos.
      4. Relatorio semanal de metricas de monitoramento para o gestor de seguranca.
      5. Correlacao de eventos de seguranca com ameacas conhecidas (threat
         intelligence feeds).
    tools:
      - soc
      - siem
      - threat-intelligence
      - alert-management
