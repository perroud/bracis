id: art-26
family: cap-6
title: "Indicadores de Desempenho e Conformidade"
class: GSI-IN5
baselines: [apf-federal]
statement:
  prose: |
    Art. 26. Os órgãos e entidades devem definir e acompanhar indicadores de
    desempenho e conformidade para os serviços de computação em nuvem, incluindo:
    I - percentual de disponibilidade efetiva vs. SLA contratado;
    II - número e severidade de incidentes de segurança;
    III - tempo médio de detecção e resposta a incidentes (MTTD/MTTR);
    IV - percentual de conformidade com os requisitos de segurança desta
    Instrução Normativa;
    V - número de vulnerabilidades identificadas e tempo médio de correção;
    VI - resultados de auditorias e testes de segurança.

    Parágrafo único. Os indicadores devem ser consolidados em relatório
    periódico e apresentados ao comitê de segurança da informação do
    órgão ou entidade, quando existente.
guidance:
  prose: |
    O art. 26 exige metricas quantitativas de seguranca e desempenho,
    reportadas ao comite de seguranca.

    **Seis KPIs obrigatorios:**
    1. Disponibilidade: uptime real vs. SLA (ex: 99.95% vs. 99.9% contratado)
    2. Incidentes: quantidade e distribuicao por severidade (P1-P4)
    3. MTTD/MTTR: velocidade de deteccao e resposta
    4. Conformidade: % de controles implementados vs. exigidos pela IN
    5. Vulnerabilidades: backlog e SLA de remediacao
    6. Auditorias: resultados e remediacao de findings

    **Metricas de referencia (benchmarks):**
    - MTTD: <24h para P1, <72h para P2
    - MTTR: <4h para P1, <24h para P2
    - Conformidade: target de 95%+ dos controles implementados
    - Vulnerabilidades criticas: 0 backlog >30 dias

    **Mapeamento CSA CCM v4:**
    - GRC-04: Information Security Metrics
    - GRC-07: Information Security Reporting

    **Mapeamento NIST SP 800-55:**
    - Performance Measurement Guide for Information Security
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de metricas:**
      1. Dashboard executivo com os seis KPIs obrigatorios, atualizado em
         tempo real para disponibilidade e diariamente para demais.
      2. Coleta automatizada de metricas a partir de SIEM, CSPM, ITSM e
         ferramentas de vulnerability management.
      3. Trending e analise de tendencias para identificar degradacao antes
         que se torne incidente.
      4. Relatorio automatizado mensal/trimestral para o comite de seguranca.
    tools:
      - metrics-dashboard
      - siem
      - cspm
      - reporting-engine
  devsecops:
    prose: |
      **Metricas no pipeline:**
      1. Pipeline de compliance que calcule percentual de conformidade
         automaticamente a cada execucao.
      2. Coleta automatizada de metricas de seguranca do pipeline (SAST findings,
         DAST findings, dependency vulnerabilities).
      3. Quality gates que bloqueiem deploy se KPIs estiverem abaixo do threshold.
      4. Geracao automatizada de SBOM e metricas de supply chain security.
    tools:
      - gitlab-ci
      - compliance-metrics
      - quality-gates
      - sbom-generator
  secops:
    prose: |
      **Reporting de seguranca:**
      1. Relatorio mensal de KPIs para o gestor de seguranca.
      2. Relatorio trimestral consolidado para o comite de seguranca.
      3. Dashboard operacional para SOC com metricas em tempo real.
      4. Analise de tendencias para identificar areas que precisam de atencao.
      5. Benchmark dos KPIs com padroes de mercado e maturidade.
    tools:
      - grc-platform
      - siem
      - reporting-engine
      - benchmark-data
