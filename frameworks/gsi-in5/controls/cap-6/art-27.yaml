id: art-27
family: cap-6
title: "Relatorios Periodicos"
class: GSI-IN5
baselines: [apf-federal]
statement:
  prose: |
    Art. 27. Os órgãos e entidades devem elaborar relatórios periódicos sobre a
    utilização de soluções de computação em nuvem, contendo, no mínimo:
    I - inventário atualizado dos serviços de computação em nuvem contratados;
    II - status de conformidade com os requisitos desta Instrução Normativa;
    III - incidentes de segurança ocorridos e ações tomadas;
    IV - resultados do monitoramento de nível de serviço (SLA);
    V - avaliações de risco atualizadas;
    VI - recomendações de melhoria.

    Parágrafo 1. Os relatórios devem ser elaborados, no mínimo, semestralmente
    e encaminhados ao gestor de segurança da informação e à alta administração
    do órgão ou entidade.

    Parágrafo 2. O GSI/PR poderá solicitar a qualquer tempo informações sobre
    a utilização de soluções de computação em nuvem pelos órgãos e entidades.
guidance:
  prose: |
    O art. 27 exige relatorios semestrais com seis componentes obrigatorios,
    dirigidos ao gestor de seguranca e a alta administracao.

    **Seis componentes do relatorio:**
    1. Inventario de servicos de nuvem (atualizado)
    2. Status de conformidade com a IN GSI/PR 5
    3. Incidentes de seguranca (resumo executivo)
    4. Desempenho de SLA
    5. Avaliacoes de risco
    6. Recomendacoes de melhoria

    **Periodicidade:**
    Minimo semestral, dirigido a gestor de seguranca + alta administracao.

    **Transparencia ao GSI/PR:**
    O GSI/PR pode solicitar informacoes a QUALQUER momento, o que exige
    que o orgao tenha dados atualizados e facilmente acessiveis.

    **Mapeamento CSA CCM v4:**
    - GRC-07: Information Security Reporting
    - GRC-08: Governance Responsibility Model

    **Mapeamento NIST SP 800-53:**
    - PM-6: Information Security Measures of Performance
    - PM-10: Security Authorization Process
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao de relatorios:**
      1. Template padronizado de relatorio semestral com os seis componentes
         obrigatorios pre-definidos.
      2. Coleta automatizada de dados a partir de CMDB, CSPM, SIEM, ITSM
         e ferramentas de vulnerability management.
      3. Dashboard executivo que possa ser exportado como relatorio PDF.
      4. Portal de transparencia para o GSI/PR com acesso sob demanda
         a dados de conformidade.
    tools:
      - reporting-engine
      - grc-platform
      - dashboard-export
      - transparency-portal
  devsecops:
    prose: |
      **Relatorios no pipeline:**
      1. Pipeline de geracao automatica de relatorio semestral.
      2. Coleta automatizada de metricas de compliance do pipeline CI/CD.
      3. Integracao com ferramentas de auditoria para consolidar findings.
      4. Versionamento de relatorios em repositorio Git para rastreabilidade.
    tools:
      - gitlab-ci
      - report-generator
      - compliance-metrics
      - git-versioning
  secops:
    prose: |
      **Gestao de relatorios:**
      1. Calendario de relatorios com responsaveis e prazos.
      2. Processo de revisao e aprovacao de relatorios antes da entrega.
      3. Registro de recomendacoes de melhoria com tracking de implementacao.
      4. Preparacao para solicitacoes ad-hoc do GSI/PR.
      5. Arquivo de relatorios historicos para analise de tendencias.
    tools:
      - grc-platform
      - task-management
      - document-archive
      - compliance-calendar
