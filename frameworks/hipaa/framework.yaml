rules:
  - id: privacy-rule
    title: "Privacy Rule (45 CFR Part 160 and Subparts A and E of Part 164)"
    description: >-
      Establishes national standards to protect individuals' medical records and other
      individually identifiable health information (PHI). Requires appropriate safeguards
      to protect the privacy of PHI, sets limits and conditions on the uses and disclosures
      of PHI without individual authorization, and gives individuals rights over their
      health information.
    effective_date: "2003-04-14"
  - id: security-rule
    title: "Security Rule (45 CFR Part 160 and Subparts A and C of Part 164)"
    description: >-
      Establishes national standards to protect electronic protected health information
      (ePHI) that is created, received, used, or maintained by a covered entity. Requires
      appropriate administrative, physical, and technical safeguards to ensure the
      confidentiality, integrity, and availability of ePHI.
    effective_date: "2005-04-20"
  - id: breach-notification-rule
    title: "Breach Notification Rule (45 CFR Part 164, Subpart D)"
    description: >-
      Requires covered entities and business associates to provide notification following
      a breach of unsecured PHI. Notifications must be provided to affected individuals,
      the Secretary of HHS, and in certain circumstances, to the media.
    effective_date: "2009-09-23"

control_families:
  - id: privacy-rule
    title: "Privacy Rule"
    description: "Standards for the use and disclosure of protected health information (PHI)"
    control_count: 18
  - id: security-rule-administrative
    title: "Security Rule - Administrative Safeguards"
    description: "Administrative actions, policies, and procedures to manage the selection, development, implementation, and maintenance of security measures to protect ePHI"
    control_count: 9
  - id: security-rule-physical
    title: "Security Rule - Physical Safeguards"
    description: >-
      Physical measures, policies, and procedures to protect electronic information
      systems and related buildings and equipment from natural and environmental hazards
      and unauthorized intrusion
    control_count: 4
  - id: security-rule-technical
    title: "Security Rule - Technical Safeguards"
    description: "The technology and the policy and procedures for its use that protect electronic protected health information and control access to it"
    control_count: 5
  - id: breach-notification
    title: "Breach Notification Rule"
    description: "Requirements for notification following a breach of unsecured PHI"
    control_count: 4

