id: 164.408
family: breach-notification
title: "Notification to the Secretary"
class: HIPAA-Breach-Notification

statement:
  prose: >-
    A covered entity shall notify the Secretary of breaches of unsecured protected
    health information. For breaches involving 500 or more individuals, notification
    shall be provided contemporaneously with individual notification. For breaches
    involving fewer than 500 individuals, the covered entity may maintain a log and
    submit it annually within 60 days after the end of the calendar year.
  parts:
    - id: 164.408-a
      label: "164.408(a)"
      prose: >-
        Breaches involving 500 or more individuals. For breaches of unsecured protected
        health information involving 500 or more individuals, a covered entity shall
        provide notification to the Secretary contemporaneously with the notice required
        by 164.404 and in the manner specified on the HHS web site.
    - id: 164.408-b
      label: "164.408(b)"
      prose: >-
        Breaches involving fewer than 500 individuals. For breaches of unsecured
        protected health information involving fewer than 500 individuals, a covered
        entity shall maintain a log or other documentation of such breaches and,
        not later than 60 days after the end of each calendar year, provide the
        notification required by submitting the log to the Secretary in the manner
        specified on the HHS web site.
    - id: 164.408-c
      label: "164.408(c)"
      prose: >-
        Content of Notification. The notification shall include the information
        required by 164.404(c) and the identification of each individual whose
        unsecured protected health information has been, or is reasonably believed
        to have been, accessed, acquired, used, or disclosed during the breach.

guidance:
  prose: >-
    Notification to the Secretary of HHS serves the public accountability function
    and enables HHS to monitor breach trends. For large breaches (500+ individuals),
    the notification must be submitted contemporaneously with individual notifications,
    and these breaches are posted on the HHS "Wall of Shame" (Breach Portal). The
    notification is submitted through the HHS HIPAA Breach Reporting Portal. For
    smaller breaches (fewer than 500 individuals), organizations may maintain a log
    throughout the year and submit it annually by March 1 (within 60 days after the
    end of the calendar year in which the breach was discovered). The log must contain
    sufficient detail for HHS to understand the nature and scope of each breach.
    Organizations should treat the breach log as a living compliance document reviewed
    regularly by the privacy officer.

references:
  - citation: "45 CFR 164.408"
    url: "https://www.ecfr.gov/current/title-45/subtitle-A/subchapter-C/part-164/subpart-D/section-164.408"
  - citation: "HHS Breach Reporting Portal"
    url: "https://ocrportal.hhs.gov/ocr/breach/wizard_breach.jsf"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated breach scope assessment tools that can quickly determine
      the number of individuals affected by a breach. Integrate breach incident
      management with the HHS reporting workflow, including pre-populated notification
      forms. Build automated breach log management that tracks all breaches (large
      and small) with required documentation fields. Implement automated reminders
      for the annual breach log submission deadline (March 1). Deploy data flow
      mapping tools that help determine breach scope by identifying all systems and
      data stores that may have been affected.
    tools:
      - servicenow
      - cortex-xsoar
      - tines
      - data-flow-mapping
      - asset-management

  devsecops:
    prose: >-
      Build automated tools for breach impact assessment that can query systems
      to determine the scope of affected records. Implement data lineage tracking
      in the application architecture to enable rapid identification of all systems
      that processed affected PHI. Maintain breach notification workflows as code
      with version-controlled templates and procedures. Include breach scope
      assessment capabilities in the monitoring infrastructure.
    tools:
      - gitlab-ci
      - data-lineage-tools
      - jira
      - servicenow

  secops:
    prose: >-
      Manage the HHS notification process for all breaches. For large breaches
      (500+ individuals), submit notification to HHS contemporaneously with
      individual notification through the HHS Breach Reporting Portal. For
      smaller breaches, maintain a detailed breach log and submit it annually
      by March 1. Track all breaches in the breach log regardless of size,
      including the four-factor risk assessment, notification decisions, and
      remediation actions. Coordinate with legal counsel for breach
      classification and notification content. Monitor the HHS Breach Portal
      for organizational submissions and verify accuracy.
    tools:
      - servicenow
      - archer
      - riskwatch
      - jira
      - hhs-breach-portal

