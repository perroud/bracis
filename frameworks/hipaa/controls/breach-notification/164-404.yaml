id: 164.404
family: breach-notification
title: "Notification to Individuals"
class: HIPAA-Breach-Notification

statement:
  prose: >-
    A covered entity shall, following the discovery of a breach of unsecured protected
    health information, notify each individual whose unsecured protected health
    information has been, or is reasonably believed by the covered entity to have been,
    accessed, acquired, used, or disclosed as a result of such breach.
  parts:
    - id: 164.404-a1
      label: "164.404(a)(1)"
      prose: >-
        Timeliness of Notification. A covered entity shall provide the notification
        required without unreasonable delay and in no case later than 60 calendar days
        after the discovery of a breach.
    - id: 164.404-a2
      label: "164.404(a)(2)"
      prose: >-
        A breach shall be treated as discovered by a covered entity as of the first
        day on which such breach is known to the covered entity, or, by exercising
        reasonable diligence, would have been known to the covered entity. A covered
        entity shall be deemed to have knowledge of a breach if such breach is known,
        or by exercising reasonable diligence would have been known, to any person,
        other than the person committing the breach, who is a workforce member or
        agent of the covered entity.
    - id: 164.404-b
      label: "164.404(b)"
      prose: >-
        Content of Notification. The notification shall include, to the extent possible:
        a brief description of what happened including the date of the breach and date
        of discovery; a description of the types of unsecured PHI involved; any steps
        individuals should take to protect themselves; a brief description of what the
        covered entity is doing to investigate, mitigate harm, and prevent future
        breaches; and contact procedures including a toll-free telephone number, email
        address, postal address, or web address.
    - id: 164.404-d
      label: "164.404(d)"
      prose: >-
        Methods of Individual Notification. The notification shall be provided in the
        form of written notice by first-class mail or, if the individual agrees,
        by electronic mail. If there is insufficient contact information for 10 or
        more individuals, substitute notice shall be provided through conspicuous
        posting on the home page of the covered entity's web site or through major
        print or broadcast media.

guidance:
  prose: >-
    The Breach Notification Rule requires covered entities to notify affected individuals
    when a breach of unsecured PHI occurs. A "breach" is the acquisition, access, use,
    or disclosure of PHI in a manner not permitted under the Privacy Rule that compromises
    the security or privacy of the PHI. The 60-day notification deadline runs from the
    date the breach was discovered or should have been discovered with reasonable diligence,
    not from the date it occurred. A risk assessment using four factors determines whether
    a breach occurred: the nature and extent of PHI involved, the unauthorized person who
    used or received the PHI, whether the PHI was actually acquired or viewed, and the
    extent to which the risk to the PHI has been mitigated. Notifications must be written
    in plain language and include specific content elements to enable individuals to
    protect themselves.

references:
  - citation: "45 CFR 164.404"
    url: "https://www.ecfr.gov/current/title-45/subtitle-A/subchapter-C/part-164/subpart-D/section-164.404"
  - citation: "HHS Breach Notification Rule Guidance"
