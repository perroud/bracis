implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated breach detection capabilities through security monitoring
      that identifies unauthorized access to, use of, or disclosure of PHI. Deploy
      data loss prevention (DLP) tools that detect and alert on potential PHI
      exfiltration. Build automated incident classification workflows that evaluate
      whether a security incident constitutes a reportable breach using the four-factor
      risk assessment. Maintain pre-configured notification templates in the incident
      response automation platform ready for immediate deployment when a breach is
      confirmed. Integrate breach tracking with the ticketing system to enforce the
      60-day notification deadline with automated escalations.
    tools:
      - cortex-xsoar
      - tines
      - pagerduty
      - servicenow
      - symantec-dlp
      - digital-guardian
      - forcepoint-dlp

  devsecops:
    prose: >-
      Implement automated PHI detection in CI/CD pipelines that scan code, logs,
      and configurations for unintentional PHI exposure. Build automated breach
      impact assessment tools that can quickly determine the scope of affected
      records when a breach is detected. Maintain notification template repositories
      with version-controlled content. Include breach response testing in release
      processes through tabletop exercises that validate notification workflows
      from detection through individual notification within 60 days.
    tools:
      - gitlab-ci
      - gitlab-secret-detection
      - dlp-scanning
      - jira
      - servicenow

  secops:
    prose: >-
      Maintain and execute the breach notification plan including individual
      notification procedures, media notification for breaches affecting 500+
      individuals in a state, and HHS notification. Track the 60-day notification
      deadline from date of discovery with automated escalations at 30, 45, and
      55 days. Conduct the four-factor breach risk assessment for every security
      incident involving PHI. Coordinate with legal counsel, communications teams,
      and affected business units. Maintain a breach log documenting all breaches
      including those determined not to require notification. Prepare substitute
      notice procedures for situations where individual contact information is
      insufficient.
    tools:
      - servicenow
      - archer
      - splunk
      - pagerduty
      - jira
      - communication-platform

