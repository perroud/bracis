id: 164.308-a5
family: security-rule-administrative
title: "Security Awareness and Training"
class: HIPAA-Security-Rule

statement:
  prose: >-
    Implement a security awareness and training program for all members of the workforce
    (including management). The program must address security reminders, protection from
    malicious software, login monitoring, and password management.
  parts:
    - id: 164.308-a5-ii-A
      label: "164.308(a)(5)(ii)(A)"
      prose: >-
        Security Reminders (Addressable). Periodic security updates provided to
        all workforce members.
    - id: 164.308-a5-ii-B
      label: "164.308(a)(5)(ii)(B)"
      prose: >-
        Protection from Malicious Software (Addressable). Procedures for guarding
        against, detecting, and reporting malicious software.
    - id: 164.308-a5-ii-C
      label: "164.308(a)(5)(ii)(C)"
      prose: >-
        Log-in Monitoring (Addressable). Procedures for monitoring login attempts and
        reporting discrepancies.
    - id: 164.308-a5-ii-D
      label: "164.308(a)(5)(ii)(D)"
      prose: >-
        Password Management (Addressable). Procedures for creating, changing, and
        safeguarding passwords.

guidance:
  prose: >-
    Security awareness training is critical because workforce members are both the first
    line of defense and the most common vector for security incidents. Training should be
    role-appropriate: clinical staff need different training than IT staff. The program
    must cover the organization's security policies and procedures, current threats
    (phishing, ransomware, social engineering), proper handling of ePHI, incident
    reporting procedures, and consequences of non-compliance. Training must occur upon
    hire and periodically thereafter. Security reminders (newsletters, posters, email
    bulletins) reinforce training between formal sessions. Organizations should track
    training completion and assess effectiveness through phishing simulations and
    knowledge assessments.

references:
  - citation: "45 CFR 164.308(a)(5)"
    url: "https://www.ecfr.gov/current/title-45/subtitle-A/subchapter-C/part-164/subpart-C/section-164.308"

implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate security training tracking into the identity management platform.
      Enforce that workforce members must complete security training before receiving
      access to ePHI systems by linking training completion status to access
      provisioning workflows. Deploy automated security reminders through the
      internal communication platform. Implement login monitoring as a platform
      service with automated anomaly detection. Enforce password policies at the
      IdP level including minimum complexity, rotation requirements, and breach
      detection (haveibeenpwned integration).
    tools:
      - keycloak
      - okta
      - knowbe4
      - proofpoint-security-awareness
      - elasticsearch
      - grafana

  devsecops:
    prose: >-
      Include secure coding training requirements for developers working on ePHI
      applications. Track training completion as a gate for merge request approval
      privileges on ePHI repositories. Implement automated login monitoring alerts
      in the CI/CD system for suspicious access patterns. Enforce password/credential
      management best practices through secret scanning and credential rotation
      automation in pipelines. Provide developers with security-focused code review
      checklists specific to ePHI handling.
    tools:
      - gitlab-ci
      - gitlab-secret-detection
      - securecodewarrior
      - hackedu
      - vault

  secops:
    prose: >-
      Manage the security awareness training program including content development,
      delivery, tracking, and effectiveness measurement. Conduct regular phishing
      simulations and track click rates by department. Monitor login activity across
      all ePHI systems and investigate anomalies (impossible travel, brute force,
      off-hours access). Distribute security reminders on a regular cadence covering
      current threats and best practices. Audit password policy compliance across
      all systems and enforce remediation for non-compliant accounts. Report training
      metrics and phishing simulation results to management quarterly.
    tools:
      - knowbe4
      - proofpoint-security-awareness
      - cofense
      - splunk
      - elastic-siem
      - microsoft-sentinel

