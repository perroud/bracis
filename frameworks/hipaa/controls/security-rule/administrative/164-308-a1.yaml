id: 164.308-a1
family: security-rule-administrative
title: "Security Management Process"
class: HIPAA-Security-Rule

statement:
  prose: >-
    Implement policies and procedures to prevent, detect, contain, and correct security
    violations. A covered entity or business associate must implement a security
    management process that includes: risk analysis, risk management, sanction policy,
    and information system activity review.
  parts:
    - id: 164.308-a1-i-A
      label: "164.308(a)(1)(ii)(A)"
      prose: >-
        Risk Analysis (Required). Conduct an accurate and thorough assessment of the
        potential risks and vulnerabilities to the confidentiality, integrity, and
        availability of electronic protected health information held by the covered
        entity or business associate.
    - id: 164.308-a1-i-B
      label: "164.308(a)(1)(ii)(B)"
      prose: >-
        Risk Management (Required). Implement security measures sufficient to reduce
        risks and vulnerabilities to a reasonable and appropriate level to comply with
        45 CFR 164.306(a).
    - id: 164.308-a1-i-C
      label: "164.308(a)(1)(ii)(C)"
      prose: >-
        Sanction Policy (Required). Apply appropriate sanctions against workforce
        members who fail to comply with the security policies and procedures of the
        covered entity or business associate.
    - id: 164.308-a1-i-D
      label: "164.308(a)(1)(ii)(D)"
      prose: >-
        Information System Activity Review (Required). Implement procedures to regularly
        review records of information system activity, such as audit logs, access reports,
        and security incident tracking reports.

guidance:
  prose: >-
    The Security Management Process is the foundational administrative safeguard under
    HIPAA. It requires organizations to establish a comprehensive security program
    encompassing risk analysis, risk management, workforce sanctions, and ongoing
    monitoring. The risk analysis must be thorough and accurate, identifying all ePHI
    the organization creates, receives, maintains, or transmits, the threats and
    vulnerabilities to that ePHI, and the potential impact of a breach. Risk management
    involves implementing security measures that reduce identified risks to a reasonable
    and appropriate level, considering the organization's size, complexity, and
    capabilities; technical infrastructure, hardware, and software security capabilities;
    the cost of security measures; and the probability and criticality of potential risks.
    This is an ongoing process, not a one-time activity.

references:
  - citation: "45 CFR 164.308(a)(1)"
    url: "https://www.ecfr.gov/current/title-45/subtitle-A/subchapter-C/part-164/subpart-C/section-164.308"
  - citation: "HHS Guidance on Risk Analysis"
    url: "https://www.hhs.gov/hipaa/for-professionals/security/guidance/guidance-risk-analysis/index.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated asset discovery and inventory to identify all systems that
      create, receive, maintain, or transmit ePHI. Deploy vulnerability scanners and
      configuration compliance tools across the infrastructure to feed continuous risk
      assessments. Use infrastructure-as-code to enforce security baselines derived from
      the risk analysis. Implement automated security controls that address identified
      risks: network segmentation for ePHI workloads, encryption at rest and in transit,
      access controls, and monitoring. Maintain a risk register as a living document
      linked to infrastructure components through the service catalog. Use policy engines
      (OPA, Kyverno) to enforce risk mitigation controls automatically.
    tools:
      - terraform
      - opa
      - kyverno
      - qualys
      - tenable
      - backstage
      - vault
      - falco

  devsecops:
    prose: >-
      Embed risk assessment artifacts into the development lifecycle. Maintain threat
      models for applications handling ePHI and update them when significant changes
      occur. Integrate vulnerability scanning (SAST, DAST, SCA) into CI/CD pipelines
      as risk mitigation controls. Generate risk reports from pipeline scan results and
      feed them into the organizational risk register. Enforce that applications
      handling ePHI pass all security scans before deployment. Track sanction-relevant
      events (policy bypass attempts, unauthorized access) through pipeline audit logs.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - threatmodeler
      - owasp-threat-dragon
      - defectdojo

  secops:
    prose: >-
      Conduct formal risk analyses at least annually and whenever significant changes
      occur to the environment. Use a structured methodology (NIST SP 800-30, OCTAVE,
      FAIR) to assess threats, vulnerabilities, likelihood, and impact. Maintain
      continuous monitoring of information system activity through SIEM with dashboards
      tracking ePHI access patterns, failed login attempts, privilege changes, and
      policy violations. Review audit logs regularly to detect security incidents.
      Enforce the sanction policy by tracking compliance violations and coordinating
      with HR for enforcement. Generate monthly risk posture reports for management.
    tools:
      - splunk
      - elastic-siem
      - archer
      - servicenow-grc
      - riskwatch
      - nist-rmf-tools
      - wazuh

