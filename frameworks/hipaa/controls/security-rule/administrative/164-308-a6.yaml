id: 164.308-a6
family: security-rule-administrative
title: "Security Incident Procedures"
class: HIPAA-Security-Rule

statement:
  prose: >-
    Implement policies and procedures to address security incidents. Identify and respond
    to suspected or known security incidents; mitigate, to the extent practicable, harmful
    effects of security incidents that are known to the covered entity or business
    associate; and document security incidents and their outcomes.
  parts:
    - id: 164.308-a6-ii
      label: "164.308(a)(6)(ii)"
      prose: >-
        Response and Reporting (Required). Identify and respond to suspected or known
        security incidents; mitigate, to the extent practicable, harmful effects of
        security incidents that are known to the covered entity or business associate;
        and document security incidents and their outcomes.

guidance:
  prose: >-
    Security incident procedures require organizations to have a formal, documented
    incident response plan that covers detection, analysis, containment, eradication,
    recovery, and post-incident activities. A security incident under HIPAA is defined
    as the attempted or successful unauthorized access, use, disclosure, modification,
    or destruction of information or interference with system operations. The incident
    response plan must define roles and responsibilities, communication procedures,
    escalation paths, and evidence preservation requirements. Documentation of all
    incidents, including those that do not result in a breach, is required. Organizations
    must also evaluate whether an incident constitutes a breach requiring notification
    under the Breach Notification Rule.

references:
  - citation: "45 CFR 164.308(a)(6)"
    url: "https://www.ecfr.gov/current/title-45/subtitle-A/subchapter-C/part-164/subpart-C/section-164.308"
  - citation: "NIST SP 800-61 Rev. 2 - Computer Security Incident Handling Guide"
    url: "https://doi.org/10.6028/NIST.SP.800-61r2"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build automated incident detection and response capabilities into the platform.
      Deploy runtime threat detection (Falco, Sysdig) that triggers automated incident
      response playbooks. Implement automated evidence collection that captures system
      state (memory dumps, logs, network captures) when an incident is detected.
      Use SOAR platforms to orchestrate incident response workflows including
      containment actions (network isolation, credential rotation, pod termination).
      Maintain incident runbooks as code in version-controlled repositories with
      tested automation for common incident types.
    tools:
      - falco
      - sysdig-secure
      - pagerduty
      - opsgenie
      - cortex-xsoar
      - tines
      - velociraptor

  devsecops:
    prose: >-
      Implement automated alerting for security events detected in CI/CD pipelines.
      Include incident response testing in release processes through chaos engineering
      and game day exercises. Maintain incident response playbooks alongside
      application code. Implement automated rollback capabilities for rapid
      containment when a security incident involves a deployed application. Track
      incident-related code changes (fixes, patches) through the standard merge
      request workflow with expedited review processes for emergency changes.
    tools:
      - gitlab-ci
      - argocd
      - fluxcd
      - pagerduty
      - jira

  secops:
    prose: >-
      Maintain and test the incident response plan at least annually through
      tabletop exercises and simulated incident drills. Implement 24/7 security
      monitoring with defined escalation procedures. Detect and classify security
      incidents using SIEM correlation rules and anomaly detection. Document all
      incidents in an incident tracking system with standardized fields (timeline,
      impact, root cause, remediation actions). Conduct post-incident reviews and
      update controls based on lessons learned. Evaluate all security incidents for
      potential breach notification requirements. Maintain chain of custody for
      forensic evidence.
    tools:
      - splunk
      - elastic-siem
      - cortex-xsoar
      - resilient
      - thehive
      - servicenow
      - pagerduty

