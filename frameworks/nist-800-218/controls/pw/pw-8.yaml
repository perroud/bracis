id: pw-8
family: pw
title: "Test Executable Code"
class: SP800-218
statement:
  prose: >-
    Help identify vulnerabilities so that they can be corrected before the software is released
    to prevent exploitation. Test executable code to identify vulnerabilities and verify
    compliance with security requirements using dynamic analysis, penetration testing, and
    fuzz testing.
  parts:
    - id: pw-8_smt.a
      label: "a."
      prose: >-
        Perform dynamic application security testing (DAST) on running applications to identify
        runtime vulnerabilities including injection flaws, authentication issues, and
        configuration weaknesses.
    - id: pw-8_smt.b
      label: "b."
      prose: >-
        Conduct fuzz testing on software components that process untrusted input to discover
        unexpected behavior, crashes, and potential security vulnerabilities.
    - id: pw-8_smt.c
      label: "c."
      prose: >-
        Perform penetration testing on high-risk applications before release and on a recurring
        basis, simulating real-world attack techniques to identify exploitable vulnerabilities.
guidance:
  prose: >-
    Testing executable code complements static analysis by finding vulnerabilities that only
    manifest at runtime. DAST tools test running applications from the outside, simulating
    attacker behavior to find injection flaws, authentication bypasses, and other runtime
    issues. Fuzz testing generates random or semi-random inputs to discover unexpected behavior
    and edge cases. Penetration testing combines human expertise with tooling to simulate
    sophisticated attacks. These testing approaches should be used in combination, as each
    finds different classes of vulnerabilities. Testing should be integrated into the SDLC
    at appropriate stages rather than performed only before release.
references:
  - citation: "NIST SP 800-218 Section 2.3"
    url: "https://csrc.nist.gov/pubs/sp/800/218/final"
  - citation: "OWASP Testing Guide"
    url: "https://owasp.org/www-project-web-security-testing-guide/"
implementation_guidance:
  platform_engineering:
    prose: >-
      Provide DAST scanning as a platform service that development teams can integrate into
      their pipelines with minimal configuration. Maintain pre-configured DAST scan profiles
      for common application types (web applications, APIs, microservices). Provide fuzzing
      infrastructure as a shared platform service. Configure staging environments that enable
      automated security testing before production deployment.
    tools:
      - "OWASP ZAP"
      - "Nuclei"
      - "OSS-Fuzz / ClusterFuzz"
      - "AFL++ / libFuzzer"
      - "Kubernetes (staging environments)"
  devsecops:
    prose: >-
      Integrate DAST scanning into CI/CD pipelines, running against deployed staging
      environments after each deployment. Automate API security testing using OpenAPI/Swagger
      specifications as input to DAST tools. Implement continuous fuzz testing for
      security-critical components that process untrusted input (parsers, deserializers,
      protocol handlers). Schedule periodic automated penetration testing as part of the
      release pipeline for high-risk applications. Track and triage all findings through the
      standard vulnerability management workflow.
    tools:
      - "OWASP ZAP (CI/CD integration)"
      - "Nuclei (automated pentesting)"
      - "GitLab DAST"
      - "AFL++ / go-fuzz / cargo-fuzz"
      - "Burp Suite (manual pentesting)"
      - "Postman / Newman (API testing)"
  secops:
    prose: >-
      Coordinate penetration testing engagements and track findings to remediation. Monitor
      DAST and fuzz testing results across the organization and escalate critical findings.
      Validate that testing coverage meets organizational requirements and that all high-risk
      applications have been tested. Report on testing metrics including vulnerability density,
      finding severity distribution, and remediation timelines.
    tools:
      - "DefectDojo"
      - "Cobalt / HackerOne (bug bounty)"
      - "SIEM (Splunk, Elastic Security)"
      - "Jira / GitLab Issues (finding tracking)"
