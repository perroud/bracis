id: pw-2
family: pw
title: "Review the Software Design to Verify Compliance with Security Requirements"
class: SP800-218
statement:
  prose: >-
    Help ensure that the software will meet the security requirements and satisfactorily address
    the security risks identified during design. Review the software design to verify that it
    meets all documented security requirements and adequately mitigates identified security risks.
  parts:
    - id: pw-2_smt.a
      label: "a."
      prose: >-
        Conduct security-focused design reviews at key milestones in the development process,
        evaluating the design against documented security requirements and identified threats.
    - id: pw-2_smt.b
      label: "b."
      prose: >-
        Verify that the design addresses all applicable security requirements and that threat
        model mitigations are adequately reflected in the design. Document review findings
        and track remediation.
    - id: pw-2_smt.c
      label: "c."
      prose: >-
        Require re-review of the design when significant changes are made to the architecture,
        threat model, or security requirements.
guidance:
  prose: >-
    Design reviews are a critical quality gate that catches security issues before they are
    implemented in code. Reviews should involve security-knowledgeable personnel and should
    evaluate the design holistically, considering how components interact and how the design
    addresses the threat model. Reviews should verify that security controls are implemented
    at appropriate trust boundaries, that data protection requirements are met, and that the
    design follows the principle of least privilege. Review findings should be tracked to
    resolution, and the design should be re-reviewed when significant changes occur.
references:
  - citation: "NIST SP 800-218 Section 2.3"
    url: "https://csrc.nist.gov/pubs/sp/800/218/final"
implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate design review gates into the platform's project lifecycle workflow. Provide
      design review checklists and templates through the developer portal. Configure approval
      workflows that require security team sign-off for architecture-changing proposals.
      Maintain a registry of approved design patterns and reference architectures that serve
      as the baseline for design reviews. Track design review status as a service maturity
      metric in the platform.
    tools:
      - "Backstage TechDocs"
      - "GitLab Design Management"
      - "Architecture Decision Records (ADRs)"
      - "Backstage Scorecards"
      - "Confluence / Wiki"
  devsecops:
    prose: >-
      Require design review documentation as part of merge request workflows for significant
      architectural changes. Implement automated checks that flag merge requests introducing
      new dependencies, API endpoints, or infrastructure components for security design review.
      Use architecture-as-code tools that enable automated validation of design compliance.
      Track design review completion as a required step before major feature branches can merge.
    tools:
      - "GitLab Merge Request Approvals"
      - "GitHub Pull Request Reviews"
      - "Architectural Fitness Functions"
      - "Structurizr (C4 model)"
      - "ADR Tools"
  secops:
    prose: >-
      Participate in design reviews for high-risk applications and provide security architecture
      guidance. Track design review findings and their remediation status. Audit that design
      reviews are conducted for all significant changes and that findings are addressed before
      implementation proceeds. Report on design review coverage and effectiveness metrics.
    tools:
      - "Jira / GitLab Issues (finding tracking)"
      - "GRC Platforms (ServiceNow, Archer)"
      - "Confluence / Wiki"
      - "SIEM (Splunk, Elastic Security)"
