id: pw-1
family: pw
title: "Design Software to Meet Security Requirements and Mitigate Security Risks"
class: SP800-218
statement:
  prose: >-
    Identify and evaluate the security requirements for the software and incorporate them into
    the software design. Apply secure design principles to the software architecture and design,
    including threat modeling, attack surface analysis, and defense-in-depth strategies.
  parts:
    - id: pw-1_smt.a
      label: "a."
      prose: >-
        Use threat modeling methodologies (STRIDE, PASTA, Attack Trees) to identify potential
        threats and design appropriate mitigations during the software design phase.
    - id: pw-1_smt.b
      label: "b."
      prose: >-
        Apply secure design principles including least privilege, defense in depth, fail-safe
        defaults, separation of duties, and minimal attack surface to the software architecture.
    - id: pw-1_smt.c
      label: "c."
      prose: >-
        Document security design decisions, threat models, and risk mitigations as part of
        the software architecture documentation, and review them when the design changes
        significantly.
guidance:
  prose: >-
    Secure design is the most cost-effective point to address security issues — fixing design
    flaws after implementation is orders of magnitude more expensive. Threat modeling should be
    conducted early in the design phase and updated as the design evolves. The threat model
    should identify trust boundaries, data flows, entry points, and assets, then systematically
    identify threats and design mitigations. Secure design principles should be applied
    consistently, and design decisions should be documented for traceability. Organizations
    should maintain a library of approved security design patterns and anti-patterns to guide
    developers.
references:
  - citation: "NIST SP 800-218 Section 2.3"
    url: "https://csrc.nist.gov/pubs/sp/800/218/final"
  - citation: "OWASP Threat Modeling"
    url: "https://owasp.org/www-community/Threat_Modeling"
implementation_guidance:
  platform_engineering:
    prose: >-
      Provide threat modeling templates and tooling as part of the platform's service creation
      workflow. Embed secure design patterns into software templates and golden paths so that
      new services inherit secure-by-design architectures. Maintain a platform-wide library of
      approved security patterns (authentication, authorization, encryption, logging) that
      development teams can reuse. Enforce architecture decision records (ADRs) for
      security-relevant design choices.
    tools:
      - "OWASP Threat Dragon"
      - "Microsoft Threat Modeling Tool"
      - "Backstage TechDocs (ADRs)"
      - "PlantUML / Mermaid (architecture diagrams)"
      - "Backstage Software Templates"
  devsecops:
    prose: >-
      Integrate threat model review into the merge request workflow for architecture-changing
      modifications. Require threat model updates as part of the definition of done for features
      that introduce new trust boundaries, data flows, or external integrations. Use
      infrastructure-as-code scanning to validate that deployed architectures match approved
      security designs. Automate detection of common design anti-patterns through architectural
      fitness functions in CI/CD pipelines.
    tools:
      - "Threagile (threat modeling as code)"
      - "Checkov / tfsec (IaC scanning)"
      - "Semgrep (architecture rules)"
      - "GitLab Merge Request Templates"
      - "ArchUnit / Fitness Functions"
  secops:
    prose: >-
      Review and validate threat models for high-risk applications as part of security
      assessments. Track threat model currency, ensuring models are updated when significant
      design changes occur. Correlate security incidents with threat model gaps to improve
      future threat modeling effectiveness. Maintain a threat intelligence feed that informs
      threat model updates based on emerging attack techniques.
    tools:
      - "OWASP Threat Dragon"
      - "MITRE ATT&CK Framework"
      - "Threat Intelligence Platforms"
      - "GRC Platforms (ServiceNow, Archer)"
