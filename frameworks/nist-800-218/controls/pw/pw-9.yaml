id: pw-9
family: pw
title: "Configure Software to Have Secure Settings by Default"
class: SP800-218
statement:
  prose: >-
    Help improve the security of the software at the time of installation to reduce the
    likelihood of the software being deployed with weak security settings, putting it at
    greater risk of compromise. Configure software to have secure settings by default.
  parts:
    - id: pw-9_smt.a
      label: "a."
      prose: >-
        Configure all software to use secure default settings that minimize attack surface,
        including disabling unnecessary features, enabling encryption by default, enforcing
        strong authentication, and using least-privilege service accounts.
    - id: pw-9_smt.b
      label: "b."
      prose: >-
        Document all security-relevant configuration options and their default values, making
        it clear to administrators which settings affect the security posture of the software.
    - id: pw-9_smt.c
      label: "c."
      prose: >-
        Provide configuration hardening guides for each software product that describe
        recommended secure configurations for various deployment scenarios.
guidance:
  prose: >-
    Secure defaults ensure that software is protected even when administrators do not explicitly
    configure security settings. The principle of "secure by default" means that the software's
    out-of-the-box configuration should be as restrictive as reasonable, with administrators
    explicitly opting in to less secure configurations when needed. This includes TLS enabled
    by default, debug interfaces disabled, default credentials removed, unnecessary ports
    closed, and verbose error messages suppressed. Configuration options that affect security
    should be clearly documented and easily auditable.
references:
  - citation: "NIST SP 800-218 Section 2.3"
    url: "https://csrc.nist.gov/pubs/sp/800/218/final"
  - citation: "CIS Benchmarks"
    url: "https://www.cisecurity.org/cis-benchmarks"
implementation_guidance:
  platform_engineering:
    prose: >-
      Enforce secure default configurations through platform policies and software templates.
      Provide hardened base configurations for common infrastructure components (databases,
      message queues, web servers) as platform-managed services. Implement configuration
      validation that checks deployed configurations against CIS benchmarks or organizational
      standards. Use admission controllers to reject deployments with insecure configurations.
    tools:
      - "Kyverno / OPA Gatekeeper"
      - "CIS Benchmarks"
      - "Kubernetes Security Context"
      - "Backstage Software Templates"
      - "Helm Chart Defaults"
      - "Crossplane Compositions"
  devsecops:
    prose: >-
      Validate configurations in CI/CD pipelines using policy-as-code tools that check
      Kubernetes manifests, Helm charts, and application configurations against security
      baselines. Implement automated CIS benchmark scanning for container images and
      infrastructure configurations. Block deployments that fail configuration security checks.
      Maintain configuration baselines as code and detect drift from approved configurations.
    tools:
      - "Checkov / tfsec (IaC)"
      - "Kubesec / Polaris (Kubernetes)"
      - "Docker Bench for Security"
      - "Conftest (policy-as-code)"
      - "InSpec / ServerSpec"
  secops:
    prose: >-
      Monitor for configuration drift from approved security baselines. Conduct periodic
      configuration audits against CIS benchmarks and organizational standards. Alert on
      configuration changes that weaken security settings. Track configuration compliance
      across the software portfolio and report on hardening coverage.
    tools:
      - "CIS-CAT Pro"
      - "Chef InSpec / Compliance"
      - "SIEM (Splunk, Elastic Security)"
      - "AWS Config / Azure Policy"
