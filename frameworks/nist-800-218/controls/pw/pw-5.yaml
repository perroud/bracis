id: pw-5
family: pw
title: "Create Source Code by Adhering to Secure Coding Practices"
class: SP800-218
statement:
  prose: >-
    Decrease the number of security vulnerabilities in the software, and reduce costs by
    eliminating vulnerabilities before testing. Create source code by adhering to secure coding
    practices defined by the organization, including language-specific secure coding standards,
    input validation, output encoding, and proper error handling.
  parts:
    - id: pw-5_smt.a
      label: "a."
      prose: >-
        Follow secure coding practices that are applicable to the development languages and
        environments, including OWASP guidelines, CERT Secure Coding Standards, and
        language-specific security best practices.
    - id: pw-5_smt.b
      label: "b."
      prose: >-
        Implement input validation, output encoding, parameterized queries, proper error handling,
        and secure session management to prevent common vulnerability classes (injection, XSS,
        CSRF, authentication bypass).
    - id: pw-5_smt.c
      label: "c."
      prose: >-
        Prohibit the use of banned or dangerous functions and APIs that are known to introduce
        security vulnerabilities, and enforce these prohibitions through tooling.
guidance:
  prose: >-
    Secure coding practices are the first line of defense against software vulnerabilities.
    Most vulnerabilities are introduced during coding, and the cost of finding and fixing them
    increases dramatically as they progress through the SDLC. Organizations should establish
    secure coding standards that address the most common vulnerability classes (OWASP Top 10,
    CWE Top 25) and enforce them through a combination of developer training, automated tools
    (linters, SAST), and code review. Standards should be language-specific and regularly updated
    to address new vulnerability patterns and language features.
references:
  - citation: "NIST SP 800-218 Section 2.3"
    url: "https://csrc.nist.gov/pubs/sp/800/218/final"
  - citation: "OWASP Secure Coding Practices"
    url: "https://owasp.org/www-project-secure-coding-practices-quick-reference-guide/"
  - citation: "CWE Top 25"
    url: "https://cwe.mitre.org/top25/archive/2023/2023_top25_list.html"
implementation_guidance:
  platform_engineering:
    prose: >-
      Embed secure coding standards into software templates and golden paths provided by the
      platform. Configure platform-wide linting rules and SAST policies that enforce secure
      coding practices across all projects. Provide secure-by-default libraries for common
      security-sensitive operations (authentication, encryption, input validation, logging)
      through internal SDKs. Maintain a banned function/API list enforced through automated
      tooling at the platform level.
    tools:
      - "Semgrep (custom rules)"
      - "ESLint Security Plugins"
      - "SonarQube / SonarCloud"
      - "Backstage Software Templates"
      - "Internal Security SDKs"
  devsecops:
    prose: >-
      Integrate SAST tools into CI/CD pipelines that check for secure coding violations at
      every commit. Configure pre-commit hooks that run fast security linters locally before
      code is pushed. Enforce secure coding rules as pipeline gates that block merges when
      critical secure coding violations are detected. Maintain and distribute custom SAST rule
      sets that encode the organization's secure coding standards. Track secure coding violation
      trends to identify areas where additional developer training is needed.
    tools:
      - "Semgrep (SAST)"
      - "CodeQL (SAST)"
      - "Bandit (Python)"
      - "Brakeman (Ruby)"
      - "gosec (Go)"
      - "GitLab SAST"
      - "Pre-commit framework"
  secops:
    prose: >-
      Monitor SAST findings across the organization and identify recurring vulnerability
      patterns that indicate gaps in secure coding practices. Report on secure coding compliance
      metrics including violation rates, remediation velocity, and trend analysis by team and
      vulnerability class. Use findings data to drive targeted secure coding training
      initiatives. Correlate production security incidents with coding practice deficiencies.
    tools:
      - "DefectDojo"
      - "GitLab Security Dashboard"
      - "SonarQube (centralized dashboard)"
      - "SIEM (Splunk, Elastic Security)"
