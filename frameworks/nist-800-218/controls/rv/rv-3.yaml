id: rv-3
family: rv
title: "Analyze Vulnerabilities to Identify Their Root Causes"
class: SP800-218
statement:
  prose: >-
    Help reduce the frequency of vulnerabilities in the future. Analyze identified
    vulnerabilities to determine their root causes and use the findings to improve the
    organization's secure software development practices, tools, and training.
  parts:
    - id: rv-3_smt.a
      label: "a."
      prose: >-
        Perform root cause analysis on confirmed vulnerabilities to identify the underlying
        process, tooling, training, or design deficiency that allowed the vulnerability to be
        introduced.
    - id: rv-3_smt.b
      label: "b."
      prose: >-
        Analyze vulnerability trends across the software portfolio to identify systemic issues,
        recurring vulnerability classes, and teams or components that consistently produce
        higher vulnerability rates.
    - id: rv-3_smt.c
      label: "c."
      prose: >-
        Feed root cause analysis findings back into the organization's secure software
        development practices by updating coding standards, SAST rules, training materials,
        design patterns, and quality gate criteria.
guidance:
  prose: >-
    Root cause analysis transforms vulnerability remediation from a reactive cycle into a
    continuous improvement process. Without understanding why vulnerabilities are introduced,
    organizations are condemned to repeatedly fix the same classes of issues. Root causes often
    fall into categories: inadequate training (developers unaware of vulnerability patterns),
    missing tooling (no SAST rule for the vulnerability class), process gaps (no security
    review for the affected component), or design flaws (insecure architecture patterns).
    Analysis should examine both individual vulnerabilities and aggregate trends. Findings
    should drive concrete improvements: new SAST rules, updated training modules, revised
    coding standards, or architectural changes. The feedback loop from vulnerability discovery
    to prevention improvement is the key to a maturing secure development program.
references:
  - citation: "NIST SP 800-218 Section 2.4"
    url: "https://csrc.nist.gov/pubs/sp/800/218/final"
  - citation: "CWE/SANS Top 25"
    url: "https://cwe.mitre.org/top25/"
implementation_guidance:
  platform_engineering:
    prose: >-
      Build analytics dashboards in the platform that correlate vulnerability data with code
      repositories, teams, languages, and development practices to identify systemic patterns.
      Implement automated CWE classification of findings to enable trend analysis by
      vulnerability class. Feed root cause findings into platform-maintained SAST rule sets,
      software templates, and golden paths so that improvements automatically propagate to all
      teams. Track the effectiveness of improvements by monitoring vulnerability recurrence
      rates.
    tools:
      - "DefectDojo (analytics)"
      - "Grafana (trend dashboards)"
      - "Backstage Scorecards"
      - "Semgrep (custom rules from RCA)"
      - "GitLab Value Stream Analytics"
  devsecops:
    prose: >-
      Implement post-incident review workflows that require root cause analysis for all
      critical and high-severity vulnerabilities. Create automated metrics that track
      vulnerability introduction rates by CWE category, repository, and team. Update CI/CD
      pipeline SAST rules and policies based on root cause findings to prevent recurrence.
      Add regression tests for each vulnerability class identified through root cause analysis.
      Measure the effectiveness of improvements by tracking whether specific vulnerability
      classes decrease over time.
    tools:
      - "Semgrep (custom rule authoring)"
      - "SonarQube (trend analysis)"
      - "GitLab CI/CD (updated policies)"
      - "Jira / GitLab Issues (RCA tracking)"
      - "CWE Database"
  secops:
    prose: >-
      Coordinate root cause analysis for high-severity vulnerabilities and security incidents.
      Generate periodic vulnerability trend reports that identify the most common vulnerability
      classes, highest-risk teams, and most effective interventions. Use root cause data to
      prioritize security training investments. Report on the maturity of the root cause
      analysis program, including analysis completion rates, improvement implementation rates,
      and recurrence reduction metrics.
    tools:
      - "SIEM (Splunk, Elastic Security)"
      - "DefectDojo (trend reports)"
      - "GRC Platforms (ServiceNow, Archer)"
      - "CWE / MITRE ATT&CK"
      - "Confluence / Wiki (lessons learned)"
