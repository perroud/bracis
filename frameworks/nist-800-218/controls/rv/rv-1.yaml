id: rv-1
family: rv
title: "Identify and Confirm Vulnerabilities on an Ongoing Basis"
class: SP800-218
statement:
  prose: >-
    Help ensure that vulnerabilities are identified more quickly so that they can be remediated
    more quickly in accordance with risk, reducing the window of opportunity for attackers.
    Identify and confirm vulnerabilities on an ongoing basis through multiple discovery channels.
  parts:
    - id: rv-1_smt.a
      label: "a."
      prose: >-
        Gather information from internal and external sources to identify potential
        vulnerabilities in the software, including vulnerability databases, security advisories,
        threat intelligence feeds, and bug bounty programs.
    - id: rv-1_smt.b
      label: "b."
      prose: >-
        Review, analyze, and/or test the software to identify or confirm the presence of
        reported vulnerabilities, determine their severity, and assess their exploitability.
    - id: rv-1_smt.c
      label: "c."
      prose: >-
        Establish and operate a vulnerability disclosure program that enables external
        researchers and users to report vulnerabilities securely and receive timely
        acknowledgment and updates.
guidance:
  prose: >-
    Ongoing vulnerability identification is essential because new vulnerabilities are discovered
    continuously — both in an organization's own code and in the third-party components it
    depends on. Organizations should implement multiple discovery channels: automated scanning
    (SAST, DAST, SCA), penetration testing, security research, vulnerability disclosure
    programs, and monitoring of external vulnerability databases (NVD, OSV). Reported
    vulnerabilities should be triaged promptly, confirmed through analysis or testing, and
    classified by severity using a consistent methodology (CVSS, SSVC). Vulnerability
    disclosure programs are increasingly required by regulation and provide a critical channel
    for external researchers to report issues.
references:
  - citation: "NIST SP 800-218 Section 2.4"
    url: "https://csrc.nist.gov/pubs/sp/800/218/final"
  - citation: "ISO/IEC 29147:2018"
    url: "https://www.iso.org/standard/72311.html"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement continuous vulnerability scanning as a platform service that covers all deployed
      software and infrastructure. Aggregate vulnerability data from all scanning tools into a
      centralized vulnerability management platform. Provide automated correlation between
      vulnerability disclosures and the organization's SBOM inventory to rapidly identify
      affected software. Operate a platform-wide vulnerability disclosure endpoint with
      automated routing to responsible teams.
    tools:
      - "Trivy / Grype (continuous scanning)"
      - "DefectDojo (aggregation)"
      - "OSV.dev / NVD (vulnerability feeds)"
      - "GitLab Security Dashboard"
      - "HackerOne / Bugcrowd (VDP)"
  devsecops:
    prose: >-
      Run vulnerability scans continuously in CI/CD pipelines and on deployed environments.
      Automate matching of newly disclosed CVEs against project SBOMs and trigger alerts to
      development teams when their dependencies are affected. Implement automated triage
      workflows that classify findings by severity and route them to appropriate teams. Maintain
      a security.txt file and vulnerability disclosure policy for each public-facing application.
      Integrate external vulnerability feeds into the development workflow.
    tools:
      - "GitLab Dependency Scanning"
      - "Snyk / Grype (continuous SCA)"
      - "Trivy (runtime scanning)"
      - "OSV-Scanner"
      - "security.txt (RFC 9116)"
      - "GitLab Issues (vulnerability tracking)"
  secops:
    prose: >-
      Monitor vulnerability feeds, threat intelligence, and security advisories for newly
      disclosed vulnerabilities relevant to the organization's software inventory. Operate
      the vulnerability disclosure program, triaging incoming reports and coordinating with
      development teams. Track vulnerability identification metrics including mean time to
      detect, discovery channel effectiveness, and false positive rates. Escalate critical
      vulnerabilities for emergency response.
    tools:
      - "SIEM (Splunk, Elastic Security)"
      - "Threat Intelligence Platforms"
      - "NIST NVD / MITRE CVE"
      - "HackerOne / Bugcrowd"
      - "DefectDojo"
