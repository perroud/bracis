id: ps-1
family: ps
title: "Protect All Forms of Code from Unauthorized Access"
class: SP800-218
statement:
  prose: >-
    Help prevent unauthorized changes to code, both inadvertent and intentional, which could
    circumvent or negate the intended security characteristics of the software. Protect all
    forms of code — including source code, executable code, and configuration-as-code — from
    unauthorized access and tampering throughout the development lifecycle.
  parts:
    - id: ps-1_smt.a
      label: "a."
      prose: >-
        Store all forms of code, including source code, executable code, configuration-as-code,
        and infrastructure-as-code, in version-controlled repositories with access control,
        authentication, and authorization mechanisms.
    - id: ps-1_smt.b
      label: "b."
      prose: >-
        Implement branch protection rules, require code reviews and approvals before merging,
        and enforce commit signing to ensure the integrity and authenticity of code changes.
    - id: ps-1_smt.c
      label: "c."
      prose: >-
        Apply the principle of least privilege to code repository access, granting write access
        only to authorized personnel and using just-in-time access for elevated permissions.
guidance:
  prose: >-
    Code is the fundamental building block of software and must be protected throughout its
    lifecycle. Unauthorized modifications to code — whether by external attackers, malicious
    insiders, or accidental changes — can introduce vulnerabilities, backdoors, or functionality
    that undermines the software's security posture. All code, including infrastructure-as-code
    and configuration-as-code, should be treated as a critical asset. Organizations should
    implement defense-in-depth controls including access controls, integrity verification,
    change management, and audit logging. Commit signing provides cryptographic proof of
    authorship and integrity.
references:
  - citation: "NIST SP 800-218 Section 2.2"
    url: "https://csrc.nist.gov/pubs/sp/800/218/final"
implementation_guidance:
  platform_engineering:
    prose: >-
      Enforce organization-wide repository policies through the platform, including mandatory
      branch protection, required reviewers, and commit signing requirements. Implement
      centralized identity management for repository access using SSO and SCIM provisioning.
      Configure automated access reviews that periodically validate repository permissions.
      Provide golden repository templates with pre-configured protection rules that all new
      projects inherit. Implement repository mirroring and backup strategies for business
      continuity.
    tools:
      - "GitLab Protected Branches"
      - "GitHub Branch Protection Rules"
      - "GitLab Push Rules (commit signing)"
      - "LDAP / SCIM / SSO"
      - "HashiCorp Vault (SSH key management)"
      - "Backstage Software Catalog"
  devsecops:
    prose: >-
      Configure branch protection rules requiring minimum reviewer approvals before merge to
      protected branches. Enforce signed commits using GPG or SSH keys for all contributors.
      Implement CODEOWNERS files to require domain-expert review for security-critical paths.
      Use pre-receive hooks to block force pushes, unsigned commits, and commits containing
      secrets. Audit all repository access and changes through webhook integrations with logging
      systems.
    tools:
      - "GitLab Merge Request Approvals"
      - "GitHub CODEOWNERS"
      - "Git Commit Signing (GPG/SSH)"
      - "GitLeaks (pre-commit)"
      - "GitLab Audit Events"
      - "Gitleaks / TruffleHog"
  secops:
    prose: >-
      Monitor repository access logs for unauthorized access attempts, unusual access patterns,
      and privilege escalation. Alert on branch protection rule modifications, repository
      visibility changes, and unauthorized force pushes. Conduct periodic repository access
      reviews and remove stale permissions. Investigate anomalous commit patterns that may
      indicate compromised developer credentials.
    tools:
      - "SIEM (Splunk, Elastic Security)"
      - "GitLab Audit Events"
      - "GitHub Audit Log"
      - "CrowdStrike / SentinelOne (endpoint)"
