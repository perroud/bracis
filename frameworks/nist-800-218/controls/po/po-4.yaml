id: po-4
family: po
title: "Define and Use Criteria for Software Security Checks"
class: SP800-218
statement:
  prose: >-
    Define criteria for software security checks and track throughout the SDLC. Establish and
    use minimum acceptable security standards and quality gates that software must pass before
    release, including criteria for code review, testing, vulnerability assessment, and risk
    acceptance.
  parts:
    - id: po-4_smt.a
      label: "a."
      prose: >-
        Define criteria for software security checks, including criteria for code review
        findings, testing results, vulnerability scan results, and compliance with security
        requirements.
    - id: po-4_smt.b
      label: "b."
      prose: >-
        Implement mechanisms to enforce the criteria throughout the SDLC, preventing software
        that does not meet the criteria from progressing to the next stage or being released.
    - id: po-4_smt.c
      label: "c."
      prose: >-
        Define and document the process for handling exceptions and risk acceptances when
        software does not meet all security criteria, including required approvals and
        time-bounded remediation plans.
guidance:
  prose: >-
    Software security checks provide measurable assurance that security requirements are being
    met. Criteria should be objective and automatable wherever possible, covering static analysis
    findings, dynamic testing results, dependency vulnerability counts, code coverage minimums,
    and compliance with secure coding standards. The criteria should define clear severity
    thresholds: for example, no critical or high severity vulnerabilities may be present at
    release, and medium severity findings must have remediation plans. Exception processes
    should require security team approval and enforce time limits on accepted risks.
references:
  - citation: "NIST SP 800-218 Section 2.1"
    url: "https://csrc.nist.gov/pubs/sp/800/218/final"
implementation_guidance:
  platform_engineering:
    prose: >-
      Embed security quality gates into the platform's CI/CD pipeline templates as non-bypassable
      stages. Define platform-wide security policies that set minimum thresholds for vulnerability
      severity, code coverage, and scan completion. Expose security check results through
      developer portal scorecards that show each service's compliance status. Provide self-service
      exception request workflows that route through security team approval before allowing
      gate bypass.
    tools:
      - "Open Policy Agent (OPA)"
      - "Backstage Scorecards"
      - "GitLab Compliance Pipelines"
      - "Kyverno Policies"
      - "SonarQube Quality Gates"
  devsecops:
    prose: >-
      Configure pipeline quality gates that automatically fail builds when security criteria
      are not met. Implement graduated severity thresholds: block on critical/high findings,
      warn on medium, and inform on low. Require all security scans (SAST, SCA, container
      scanning) to complete successfully before artifact promotion. Track and enforce exception
      expiration dates through pipeline logic. Generate compliance evidence reports automatically
      from pipeline execution data.
    tools:
      - "GitLab CI/CD (allow_failure rules)"
      - "SonarQube / SonarCloud"
      - "Semgrep (custom rules)"
      - "Trivy (severity thresholds)"
      - "Snyk (policy engine)"
  secops:
    prose: >-
      Monitor security check pass/fail rates across the organization and identify systemic
      issues. Track exception requests, approvals, and expiration dates to ensure risk
      acceptances are time-bounded and reviewed. Audit security gate bypass events and escalate
      unauthorized bypasses. Generate executive dashboards showing security check compliance
      trends across the software portfolio.
    tools:
      - "GitLab Security Dashboard"
      - "DefectDojo"
      - "Jira (exception tracking)"
      - "GRC Platforms (ServiceNow, Archer)"
