id: po-3
family: po
title: "Implement Supporting Toolchains"
class: SP800-218
statement:
  prose: >-
    Use automation to reduce human effort and improve the accuracy, reproducibility, usability,
    and comprehensiveness of security practices throughout the software development lifecycle.
    Specify and implement supporting toolchains covering the build, deployment, testing, and
    security analysis processes.
  parts:
    - id: po-3_smt.a
      label: "a."
      prose: >-
        Specify the tools to be used within each stage of the software development lifecycle and
        how they are to be configured, deployed, and maintained. Include tools for building,
        testing, deploying, scanning, and monitoring software.
    - id: po-3_smt.b
      label: "b."
      prose: >-
        Evaluate and select tools that can automate security checks, generate security artifacts
        (SBOMs, provenance data), and enforce security policies consistently across development
        teams.
    - id: po-3_smt.c
      label: "c."
      prose: >-
        Configure and maintain tools to generate artifacts and data that provide evidence of
        secure software development practices, including build provenance, dependency inventories,
        and security scan results.
guidance:
  prose: >-
    The supporting toolchain is the technical backbone of the SSDF. Automation reduces the
    potential for human error and ensures consistent application of security practices.
    Toolchains should cover the entire software development lifecycle including code analysis
    (SAST, DAST, SCA), build integrity (reproducible builds, signed artifacts), deployment
    (infrastructure as code, immutable deployments), and monitoring (runtime protection,
    vulnerability scanning). Tool selection should consider integration capabilities, scalability,
    and alignment with the organization's technology stack. Tools should be regularly updated
    and their configurations reviewed for effectiveness.
references:
  - citation: "NIST SP 800-218 Section 2.1"
    url: "https://csrc.nist.gov/pubs/sp/800/218/final"
  - citation: "SLSA Framework"
    url: "https://slsa.dev/spec/v1.0/"
implementation_guidance:
  platform_engineering:
    prose: >-
      Build a standardized, opinionated toolchain into the internal developer platform so that
      every service inherits security tooling by default. Provide golden CI/CD pipeline templates
      that include SAST, SCA, container scanning, SBOM generation, and artifact signing as
      built-in stages. Manage toolchain versions centrally and roll out updates across all
      projects via shared pipeline libraries. Expose toolchain outputs through a unified developer
      portal for visibility and compliance evidence.
    tools:
      - "Backstage Software Templates"
      - "Tekton Pipelines"
      - "GitLab CI/CD Component Catalog"
      - "Sigstore (cosign, Rekor)"
      - "Syft / Trivy"
      - "ArgoCD"
  devsecops:
    prose: >-
      Integrate security tools into every stage of the CI/CD pipeline: pre-commit hooks for
      secret detection, SAST in build stages, SCA for dependency analysis, container scanning
      before registry push, DAST in staging environments, and SBOM generation at build time.
      Enforce that all pipeline runs produce security scan results and that results are centrally
      aggregated. Block pipeline progression when critical vulnerabilities are detected. Ensure
      build provenance data is generated and stored for each release.
    tools:
      - "GitLab CI/CD"
      - "Semgrep (SAST)"
      - "Snyk / Grype (SCA)"
      - "Trivy (container scanning)"
      - "GitLeaks / TruffleHog (secret detection)"
      - "Cosign (artifact signing)"
      - "OWASP ZAP (DAST)"
  secops:
    prose: >-
      Monitor toolchain health and coverage, ensuring all projects are using the required
      security tools. Aggregate security scan results from all toolchain components into a
      centralized security dashboard. Track toolchain compliance metrics including adoption
      rate, scan coverage, and remediation velocity. Alert when projects bypass or disable
      required security tooling.
    tools:
      - "GitLab Security Dashboard"
      - "DefectDojo"
      - "SIEM (Splunk, Elastic Security)"
      - "Grafana (toolchain metrics)"
