id: po-2
family: po
title: "Implement Roles and Responsibilities"
class: SP800-218
statement:
  prose: >-
    Ensure that the organization's people, processes, and technology are prepared to perform
    secure software development at the organization level. Define and assign roles and
    responsibilities for secure software development to all personnel involved in the software
    development lifecycle, including security champions, code reviewers, and release managers.
  parts:
    - id: po-2_smt.a
      label: "a."
      prose: >-
        Create new roles and alter responsibilities for existing roles as needed to encompass
        all parts of the SSDF. Ensure that personnel are qualified for the roles and provide
        role-based training.
    - id: po-2_smt.b
      label: "b."
      prose: >-
        Identify and document the security-related roles and responsibilities for all positions
        involved in software development, including developers, testers, architects, operations
        staff, and management.
    - id: po-2_smt.c
      label: "c."
      prose: >-
        Provide role-based training to all personnel with security-related responsibilities,
        covering secure coding practices, secure design principles, security testing, and
        incident response procedures.
guidance:
  prose: >-
    Clearly defined roles and responsibilities ensure accountability and coverage for all
    aspects of secure software development. Organizations should establish security champion
    programs where designated developers serve as the security point of contact within each
    development team. Role-based training should be tailored to the specific responsibilities
    of each role, and training effectiveness should be measured through assessments and practical
    exercises. Roles should be regularly reviewed and updated as the organization's software
    development practices evolve.
references:
  - citation: "NIST SP 800-218 Section 2.1"
    url: "https://csrc.nist.gov/pubs/sp/800/218/final"
  - citation: "NIST SP 800-181"
    url: "https://csrc.nist.gov/pubs/sp/800/181/r1/final"
implementation_guidance:
  platform_engineering:
    prose: >-
      Implement role-based access control (RBAC) in the internal developer platform that maps
      to defined security responsibilities. Configure platform permissions so that security-critical
      actions (release approvals, infrastructure changes, secret management) require appropriate
      role assignments. Use the service catalog to document security ownership for each service.
      Automate role assignment workflows and periodic access reviews through the platform.
    tools:
      - "Backstage Ownership Model"
      - "Kubernetes RBAC"
      - "GitLab Group/Project Roles"
      - "HashiCorp Vault (identity)"
      - "LDAP / SCIM Provisioning"
  devsecops:
    prose: >-
      Enforce role-based pipeline permissions ensuring only authorized personnel can approve
      security-sensitive changes. Implement code ownership rules (CODEOWNERS) that require
      security team review for security-critical components. Configure merge request approval
      rules that map to defined roles, requiring security champion approval for changes affecting
      authentication, authorization, cryptography, and data handling. Track security training
      completion as a prerequisite for certain pipeline permissions.
    tools:
      - "GitLab Protected Branches"
      - "GitHub CODEOWNERS"
      - "GitLab Merge Request Approvals"
      - "LMS Integration (security training)"
      - "OPA/Gatekeeper (RBAC enforcement)"
  secops:
    prose: >-
      Maintain a registry of personnel with security-related roles and their current training
      status. Automate reminders for training renewals and role certifications. Monitor for
      privilege escalation or role assignment anomalies. Generate reports on role coverage
      ensuring all development teams have assigned security champions and that critical functions
      are not single points of failure.
    tools:
      - "Identity Governance (SailPoint, Saviynt)"
      - "SIEM (Splunk, Elastic Security)"
      - "HR/Training Systems"
      - "GRC Platforms (ServiceNow, Archer)"
