id: po-1
family: po
title: "Define Security Requirements for Software Development"
class: SP800-218
statement:
  prose: >-
    Define security requirements for software development and maintenance and include requirements
    in contractual agreements, internal development standards, and vendor selection criteria.
    Ensure that security requirements address the software throughout its entire lifecycle,
    including secure design principles, secure coding practices, software verification,
    configuration management, vulnerability management, and incident response.
  parts:
    - id: po-1_smt.a
      label: "a."
      prose: >-
        Identify and document all security requirements for the organization's software development
        infrastructure and processes, including those addressing secure software development,
        security of the development environment, and risk tolerance.
    - id: po-1_smt.b
      label: "b."
      prose: >-
        Identify and document all security requirements for the organization's software, including
        applicable government regulations, industry standards, and organizational policies, and
        update them at an organization-defined frequency.
    - id: po-1_smt.c
      label: "c."
      prose: >-
        Communicate requirements to all third parties who will provide commercial software to the
        organization, including SBOM requirements, vulnerability disclosure requirements, and
        secure development attestation requirements.
guidance:
  prose: >-
    Security requirements for software development provide the foundation for all other SSDF
    practices. These requirements should be derived from applicable laws, regulations, standards,
    and organizational policies. Requirements should address the entire software development
    lifecycle, including design, development, testing, deployment, operations, and
    decommissioning. The requirements should be specific enough to be actionable and measurable,
    and should be reviewed and updated regularly to address emerging threats and changes in the
    regulatory landscape. Organizations should consider Executive Order 14028 requirements for
    software supply chain security, including SBOM generation and vulnerability disclosure
    policies.
references:
  - citation: "NIST SP 800-218 Section 2.1"
    url: "https://csrc.nist.gov/pubs/sp/800/218/final"
  - citation: "Executive Order 14028"
    url: "https://www.whitehouse.gov/briefing-room/presidential-actions/2021/05/12/executive-order-on-improving-the-nations-cybersecurity/"
implementation_guidance:
  platform_engineering:
    prose: >-
      Codify security requirements as policy-as-code artifacts in version-controlled repositories.
      Implement automated guardrails in internal developer platforms (IDPs) that enforce security
      requirements by default. Define golden paths and software templates that embed security
      requirements into project scaffolding. Use service catalogs to ensure all new services
      inherit mandatory security configurations. Maintain a central security requirements registry
      accessible to all development teams through the platform.
    tools:
      - "Open Policy Agent (OPA)"
      - "Backstage Software Catalog"
      - "Kyverno"
      - "Crossplane"
      - "HashiCorp Sentinel"
  devsecops:
    prose: >-
      Integrate security requirements validation into CI/CD pipelines as mandatory gates.
      Implement pre-commit hooks and pipeline checks that enforce security requirements at
      code commit and build time. Use merge request templates that include security requirement
      checklists. Automate the generation and validation of SBOMs as part of the build process.
      Enforce security requirements through pipeline policies that block non-compliant artifacts
      from progressing to production.
    tools:
      - "GitLab CI/CD"
      - "GitHub Actions"
      - "Conftest"
      - "Checkov"
      - "Syft (SBOM generation)"
      - "Grype (vulnerability scanning)"
  secops:
    prose: >-
      Maintain a centralized requirements management system that tracks all security requirements,
      their applicability, and compliance status. Monitor regulatory changes that may impact
      security requirements and initiate update workflows. Generate compliance reports that
      demonstrate adherence to security requirements across the software portfolio. Conduct
      periodic assessments to verify that security requirements remain current and effective.
    tools:
      - "GRC Platforms (ServiceNow, Archer)"
      - "SIEM (Splunk, Elastic Security)"
      - "Jira / GitLab Issues"
      - "Confluence / Wiki"
