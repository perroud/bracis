id: art-6
family: cap-2
title: "Revisao Periodica da Politica de Seguranca da Informacao"
class: CVM-35
baselines: [all]
statement:
  prose: |
    Art. 6. A política de segurança da informação deve ser revisada, no mínimo,
    anualmente, ou sempre que houver alteração relevante nos produtos, serviços,
    atividades ou processos da entidade.

    Parágrafo único. A revisão de que trata o caput deve considerar, além das
    alterações mencionadas, as mudanças no cenário de ameaças cibernéticas e os
    resultados de avaliações de segurança realizadas.
guidance:
  prose: |
    O art. 6 determina a periodicidade minima de revisao da PSI e as condicoes
    que disparam revisoes extraordinarias.

    **Revisao anual obrigatoria:**
    No minimo uma vez por ano, a PSI deve passar por revisao formal. Isso nao
    significa apenas "ler e assinar". A revisao deve avaliar se os controles
    continuam adequados, se novos riscos surgiram e se as diretrizes refletem
    a realidade operacional da entidade.

    **Gatilhos de revisao extraordinaria:**
    - Lancamento de novos produtos ou servicos
    - Mudanca significativa na infraestrutura tecnologica
    - Aquisicao ou fusao com outra entidade
    - Mudanca no modelo de negocio (ex: migracao para digital-first)
    - Incidente de seguranca grave
    - Alteracoes regulatorias relevantes

    **Paragrafo unico — Cenario de ameacas e avaliacoes:**
    A revisao deve incorporar:
    - Evolucao do cenario de ameacas (novas tecnicas de ataque, vulnerabilidades
      zero-day exploradas no setor)
    - Resultados de pentests, vulnerability assessments, auditorias
    - Incidentes ocorridos no periodo e licoes aprendidas
    - Benchmarking com peers do setor

    **Evidencia de revisao:**
    A CVM espera documento formal de revisao com data, participantes, alteracoes
    realizadas, justificativas e aprovacao da diretoria.
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao do ciclo de revisao:**
      1. PSI versionada em Git com historico completo de alteracoes.
      2. Tag anual obrigatoria (ex: psi-v2026, psi-v2027) marcando cada revisao.
      3. Merge request de revisao com aprovacao formal da diretoria via pipeline.
      4. Diff automatico entre versoes para evidenciar exatamente o que mudou.

      **Gatilhos automatizados:**
      5. Webhook ou alerta quando novos servicos sao provisionados (trigger de
         revisao por mudanca em produtos/servicos).
      6. Integracao com threat intelligence para alertar sobre mudancas relevantes
         no cenario de ameacas.
      7. Dashboard de mudancas na infraestrutura que possam exigir revisao da PSI.

      **Metricas de revisao:**
      8. Tempo desde ultima revisao (alerta se > 11 meses).
      9. Numero de alteracoes por revisao.
      10. Cobertura de controles novos vs. riscos novos identificados.
    tools:
      - git
      - gitlab-ci
      - threat-intelligence-platform
      - asset-inventory
  devsecops:
    prose: |
      **Integracao da revisao com desenvolvimento:**
      1. Resultados de SAST, DAST e dependency scanning como input para revisao
         anual (tendencias de vulnerabilidades, categorias recorrentes).
      2. Metricas de seguranca do pipeline como evidencia de efetividade dos
         controles da PSI.
      3. Relatorio automatizado de cobertura de scanning por repositorio.

      **Rastreabilidade de mudancas:**
      4. Changelog automatico da PSI vinculado a merge requests.
      5. Audit trail de quem revisou, aprovou e publicou cada versao.
      6. Notificacao automatica a equipes de desenvolvimento quando a PSI muda.

      **Melhoria continua:**
      7. Retrospectiva de seguranca anual com times de desenvolvimento.
      8. Incorporacao de findings de code review e pentests na revisao da PSI.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - sonarqube
  secops:
    prose: |
      **Processo formal de revisao:**
      1. Calendario regulatorio com data de revisao da PSI agendada.
      2. Checklist de revisao cobrindo todos os artigos da CVM 35.
      3. Compilacao de inputs: incidentes do periodo, resultados de testes,
         mudancas no cenario de ameacas, novas regulamentacoes.

      **Analise de cenario de ameacas (paragrafo unico):**
      4. Relatorio de threat landscape do periodo (ameacas ao setor financeiro
         e mercado de capitais).
      5. Analise de incidentes em peers e no setor como benchmarking.
      6. Revisao de advisories e alertas do CERT.br e ANBIMA.

      **Documentacao e evidencias:**
      7. Ata de reuniao de revisao com participantes e decisoes.
      8. Documento formal de revisao assinado pela diretoria.
      9. Registro de alteracoes aprovadas com justificativa tecnica.
      10. Plano de acao para gaps identificados durante a revisao.
    tools:
      - grc-platform
      - threat-intelligence-platform
      - siem
      - compliance-scanner
