id: art-8
family: cap-2
title: "Documentacao e Evidencias de Implementacao"
class: CVM-35
baselines: [all]
statement:
  prose: |
    Art. 8. A entidade deve manter documentação e evidências da efetiva
    implementação da política de segurança da informação, que devem ficar
    disponíveis para a CVM em processo de supervisão ou fiscalização.

    Parágrafo único. A documentação de que trata o caput deve incluir, no
    mínimo:
    I - versão vigente da política de segurança da informação;
    II - registro das revisões realizadas;
    III - evidências da implementação dos controles previstos na política;
    IV - registros do programa de conscientização em segurança da informação;
    V - relatórios de testes e avaliações de segurança realizados.
guidance:
  prose: |
    O art. 8 estabelece a obrigacao de documentacao e produção de evidencias.
    Nao basta implementar controles — e necessario provar que estao
    implementados e funcionando.

    **Disponibilidade para a CVM:**
    A documentacao deve estar pronta para apresentacao imediata em caso de
    supervisao direta (inspecao in loco) ou indireta (oficio). Nao ha prazo
    para compilacao — a expectativa e que esteja organizada permanentemente.

    **Conteudo minimo (paragrafo unico):**
    I - PSI vigente: versao atualizada, aprovada e publicada.
    II - Registro de revisoes: historico de alteracoes, datas, aprovacoes,
         justificativas.
    III - Evidencias de controles: logs, relatorios de ferramentas,
          screenshots, dashboards, registros de configuracao.
    IV - Registros de conscientizacao: listas de presenca, certificados,
         resultados de avaliacoes, relatorios de simulacoes de phishing.
    V - Relatorios de testes: pentests, vulnerability assessments, auditorias
        de seguranca, resultados de exercicios de resposta a incidentes.

    **Prazo de retencao:**
    A resolucao nao define prazo especifico, mas a pratica do mercado e
    manter por no minimo 5 anos, alinhado com prazos prescricionais de
    processos administrativos da CVM.

    **Risco de nao ter evidencias:**
    A ausencia de documentacao adequada e tratada pela CVM como
    descumprimento da resolucao, mesmo que os controles estejam
    implementados na pratica. "Se nao esta documentado, nao existe."
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao de coleta de evidencias:**
      1. Dashboard centralizado de conformidade com coleta automatica de
         metricas de seguranca de todas as ferramentas.
      2. Exportacao programada de relatorios de controles para repositorio
         de evidencias.
      3. GitLab como fonte de evidencias automaticas: merge requests aprovados,
         pipelines executados, scanning results, audit events.

      **Repositorio de evidencias:**
      4. Repositorio Git dedicado para documentacao de conformidade CVM 35.
      5. Estrutura de pastas por artigo da resolucao para facil navegacao.
      6. Retencao minima de 5 anos com backup automatizado.
      7. Controle de acesso restrito ao repositorio de evidencias.

      **Versao vigente da PSI (I):**
      8. PSI publicada com versionamento semantico e tag de vigencia.
      9. Link permanente para versao vigente acessivel pela diretoria e CVM.

      **Registro de revisoes (II):**
      10. Git log como registro imutavel de todas as alteracoes na PSI.
      11. Merge requests de revisao com aprovacao formal documentada.
    tools:
      - git
      - gitlab-ci
      - compliance-dashboard
      - backup-solution
      - grc-platform
  devsecops:
    prose: |
      **Evidencias automatizadas do pipeline (III):**
      1. Artefatos de SAST, DAST, dependency scanning e container scanning
         retidos por no minimo 5 anos.
      2. Relatorios de seguranca por merge request como evidencia de
         controles implementados.
      3. Dashboard de vulnerabilidades com historico temporal.
      4. Metricas de cobertura de scanning por repositorio e por periodo.

      **Rastreabilidade completa:**
      5. Audit events do GitLab exportados e armazenados em formato imutavel.
      6. Historico de aprovacoes, deployments e alteracoes de configuracao.
      7. Compliance framework status por projeto no GitLab Ultimate.

      **Relatorios automatizados (V):**
      8. Relatorio mensal automatico de postura de seguranca.
      9. Sumario de vulnerabilidades encontradas e remediadas por periodo.
      10. Tempo medio de remediacao (MTTR) como evidencia de gestao ativa.
    tools:
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - gitlab-container-scanning
      - gitlab-audit-events
      - gitlab-compliance-dashboard
  secops:
    prose: |
      **Gestao de documentacao regulatoria:**
      1. Plataforma GRC como repositorio centralizado de evidencias.
      2. Workflow de coleta de evidencias com responsaveis e prazos por controle.
      3. Revisao trimestral de completude das evidencias.

      **Evidencias por item do paragrafo unico:**
      I - PSI vigente: documento PDF assinado + versao em repositorio.
      II - Revisoes: atas de reuniao, diff entre versoes, aprovacoes.
      III - Controles: dashboards de ferramentas, relatorios de configuracao,
            logs de monitoramento.
      IV - Conscientizacao: certificados de treinamento, listas de presenca,
           relatorios de phishing simulado, avaliacoes de conhecimento.
      V - Testes: relatorios de pentest, vulnerability assessment, exercicios
          de resposta a incidentes, auditorias.

      **Preparacao para fiscalizacao:**
      4. Dossie de conformidade CVM 35 atualizado permanentemente.
      5. Indice de documentos por artigo para localizacao rapida.
      6. Simulacao interna de fiscalizacao (dry run) anualmente.
      7. Ponto focal designado para atendimento a demandas da CVM.
    tools:
      - grc-platform
      - compliance-scanner
      - document-management
      - siem
